</span><h2 class="page-title" data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Allied Command Transformation Strategic Foresight Work</span></h2><span data-dcnode-id="2609" instrument_node="">
</span></div></div></div><span data-dcnode-id="2605" instrument_node="">
</span><div class="container" data-dcnode-id="2582"><div class="row" data-dcnode-id="2583"><div class="col-sm-12" data-dcnode-id="2584"><span data-dcnode-id="2604" instrument_node=""> </span><p data-dcnode-id="2596"><picture data-dcnode-id="2597"><source data-dcnode-id="2602" media="(min-width: 900px)" srcset="/application/files/thumbnails/large/6116/2430/8760/Banner.jpg"><source data-dcnode-id="2601" media="(min-width: 768px)" srcset="/application/files/thumbnails/medium/6116/2430/8760/Banner.jpg"><source data-dcnode-id="2600" srcset="/application/files/thumbnails/small/6116/2430/8760/Banner.jpg"><img alt="ltmt.jpg" data-dcnode-id="2598" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/thumbnails/small/6116/2430/8760/Banner.jpg&amp;raw" style="float: left;"></picture></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2592"><strong data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">NATO Long-Term Military Transformation</span></strong></p><span data-dcnode-id="2591" instrument_node="">
</span><p data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">The Long-Term Military Transformation programme is Allied Command Transformation’s process for anticipating and preparing for the ambiguous, complex and rapidly changing future security environment. The first component is the Strategic Foresight Analysis. The second component is the Framework for Future Alliance Operations. The Long-Term Military Transformation informs decisions and actions that are required to prepare the Alliance for tomorrow’s security challenges.</span></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2585" instrument_node="">
</span></div></div></div><span data-dcnode-id="2581" instrument_node="">
</span><div class="container" data-dcnode-id="2550"><div class="row" data-dcnode-id="2551"><div class="col-sm-12" data-dcnode-id="2552"><span data-dcnode-id="2580" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="2554" id="vivid-simple-accordion-2536"><span data-dcnode-id="2579" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="2556"><span data-dcnode-id="2578" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="2573"><span data-dcnode-id="2577" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Learn more about NATO Long-Term Military Transformation</span></h2><span data-dcnode-id="2574" instrument_node=""> </span></div><span data-dcnode-id="2572" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="2558"><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">As NATO’s Warfare Development Command, Allied Command Transformation leads the military adaptation of the Alliance. Through Long-Term Military Transformation, Allied Command Transformation contributes to the orientation of nations’ efforts, ensuring coherence, assuring interoperability and delivering the connecting tissue that makes the Alliance’s capability greater than the sum of its individual parts. In an unpredictable world, NATO remains an anchor of international stability.</span></p><p data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">Allied Command Transformation explores emerging trends and technologies, supports current and future operations, increases interoperability and readiness, and mitigates the risk of strategic surprise.  ACT draws from the benefits of cooperation and preserves the military edge to position the Alliance to deter, and as needed defeat, all potential adversaries.</span></p><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Allied Command Transformation scans, investigates, and informs. Allied Command Transformation defines the future military context, assesses risks, threats and opportunities, investigates alternatives and provides appropriate strategic military advice to ensure that the Alliance Military Instrument of Power remains relevant in the current and future security environments. By doing that, we improve the awareness, understanding and unity of effort among the members of the Alliance in order to strengthen the Alliance’s capabilities to address the challenges of today and tomorrow.</span></p><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">To provide a foundation for this work, Allied Command Transformation conducts strategic foresight analysis to identify future global trends and to identify potential military implications for the Alliance. This foresight work is known as Allied Command Transformation’s Long-Term Military Transformation programme, or LTMT. Within the Long-Term Military Transformation programme, every four years and linked with the NATO Defence Planning Process cycle, Allied Command Transformation conducts a comprehensive look at the global security environment and describes it in two visionary, forward looking documents. These documents are the Strategic Foresight Analysis and the Framework for Future Alliance Operations.</span></p><p data-dcnode-id="2560"><span data-dcnode-id="2562" instrument_node="">The foresight work takes a global approach that brings together the Allied Nations, NATO Organizations and Centres of Excellence, and other key stakeholders, including members of academia and industry. The overall purpose of Long-Term Military Transformation is to describe the trends, future security challenges, potential opportunities and the related military implications that shape the future security environment, and to recommend the abilities that NATO forces may need to address them.</span><br data-dcnode-id="2561"></p><span data-dcnode-id="2559" instrument_node=""> </span></div><span data-dcnode-id="2557" instrument_node="">
</span></div><span data-dcnode-id="2555" instrument_node="">
</span></div><span data-dcnode-id="2553" instrument_node="">
</span></div></div></div><span data-dcnode-id="2549" instrument_node="">
</span><div class="container" data-dcnode-id="2543"><div class="row" data-dcnode-id="2544"><div class="col-sm-12" data-dcnode-id="2545"><span data-dcnode-id="2548" instrument_node=""> </span><hr data-dcnode-id="2547"><span data-dcnode-id="2546" instrument_node="">

</span><p data-dcnode-id="2528"><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1291/262" target="_blank"><img alt="icon sfa new 300x250" data-dcnode-id="2535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-sfa-new-300x250.jpg&amp;raw" style="width: 200px; height: 167px; float: left; margin-right: 10px;"></a><span data-dcnode-id="2533" instrument_node="">Strategic Foresight Analysis Reports provide a wide-ranging shared understanding of the future security environment that is expected to unfold over the long-term horizon. The Reports depict political, social, technological, economic, and environmental trends and their implications. </span><a data-dcnode-id="2530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/171004_sfa_2017_report_hr.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">The 2017 Report, released October 2017</span></strong></a><span data-dcnode-id="2529" instrument_node="">,&nbsp; builds upon the Strategic Foresight Analysis 2013 and 2015 Update Reports. Work is currently underway to develop the next version of the Strategic Foresight Analysis Report scheduled for publication in late 2021.</span></p><span data-dcnode-id="2527" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Learn more about the Strategic Foresight Analysis Report</span></h2><span data-dcnode-id="2387" instrument_node=""> </span></div><span data-dcnode-id="2385" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="2350"><span data-dcnode-id="2384" instrument_node="">
</span><ul data-dcnode-id="2368"><li data-dcnode-id="2380"><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/sfa_security_implications.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">SFA 2013 Report</span></strong></a></li><li data-dcnode-id="2375"><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/160121sfa.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">SFA 2015 Interim Update</span></strong></a><span class="redactor-invisible-space" data-dcnode-id="2376"></span></li><li data-dcnode-id="2369"><span class="redactor-invisible-space" data-dcnode-id="2370"><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/171004_sfa_2017_report_hr.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">SFA 2017 Report</span></strong></a><span class="redactor-invisible-space" data-dcnode-id="2371"></span></span></li></ul><p data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">The aim of the Strategic Foresight Analysis Report is to identify trends that will shape the future strategic context and derive implications for the Alliance out to 2035 and beyond.</span></p><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">The Strategic Foresight Analysis does not attempt to predict the future, for the future is neither predictable nor predetermined.</span></p><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">It provides an iterative assessment of trends and their implications to understand and visualise the nature of the dynamic and complex security environment.</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">The Strategic Foresight Analysis is the initial phase of the ongoing Long-Term Military Transformation efforts at Allied Command Transformation and sets the intellectual foundation for a follow-on report, the Framework for Future Alliance Operations.</span></p><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">The Strategic Foresight Analysis Report examines the main trends of global change and the resultant defence and security implications for NATO, highlighting challenges as well as opportunities. It is structured along the following themes: political, human, technology, economics/resources and environment.</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2357" instrument_node="">The new Strategic Foresight Analysis 2017 Report has been released. The glossy print version is available by clicking the link on the left. The text version is available </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/171004_sfa_2017_report_txt.pdf" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">here</span></strong></a><span data-dcnode-id="2353" instrument_node="">.</span></p><span data-dcnode-id="2351" instrument_node=""> </span></div><span data-dcnode-id="2349" instrument_node="">
</span></div><span data-dcnode-id="2347" instrument_node="">
</span></div><span data-dcnode-id="2345" instrument_node="">
</span></div></div></div><span data-dcnode-id="2341" instrument_node="">
</span><hr data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">
</span><div class="container" data-dcnode-id="1804"><div class="row" data-dcnode-id="1805"><div class="col-sm-12" data-dcnode-id="1806"><span data-dcnode-id="2338" instrument_node=""> </span><div class="row" data-dcnode-id="1808"><div class="col-sm-9" data-dcnode-id="2326"><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2334"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Strategic Foresight Analysis Regional Reports and Papers</span></strong></p><span data-dcnode-id="2333" instrument_node="">
</span><p data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">In 2018, the Strategic Foresight Branch introduced a new element to Long-Term Military Transformation, conducting strategic foresight analysis of specific regions of importance to the Alliance. The purpose of these reports is to contribute to a better visualization and understanding of the future security environment in regions relevant to NATO and Euro-Atlantic security and inform the development of the next versions of the Strategic Foresight Analysis and Framework for Future Alliance Operations.</span></p><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">In 2020, the Strategic Foresight team changed updated its programme of work to support the NATO Warfighting Capstone Concept and Warfare Development Agenda development timeline. The two-year process required to deliver one Perspectives Report every 2 years was amended in order to produce up to three Perspectives Papers per year. Perspectives papers will have a tighter focus, will require only one vice three workshops to produce, and have a condensed review and approval process, often the longest phase of the traditional Perspectives Reports.</span></p><span data-dcnode-id="2327" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Learn more about the Strategic Foresight Analysis Regional Perspectives Reports and Papers</span></h2><span data-dcnode-id="1796" instrument_node=""> </span></div><span data-dcnode-id="1794" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="1723"><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1789"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Strategic Foresight Analysis Regional Perspectives Report on North Africa and the Sahel</span></strong><span data-dcnode-id="1790" instrument_node="">
</span></p><p data-dcnode-id="1785"><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1294" target="_blank"><img alt="regional-perspectives-2020-07.png" data-dcnode-id="1788" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1292&amp;raw" style="float: left; width: 257px; height: 290px; margin-right: 10px;"></a><span data-dcnode-id="1786" instrument_node="">North Africa and the Sahel, increasingly recognised as a crucial region influencing the current and future security perspective of Europe and the NATO Alliance as a whole, have demonstrated the potential to alter the political and economic status quo of the European continent. While there are positive trends in North Africa and the Sahel economically, socially, and technologically, they will not overcome the inertia of more challenging and longer-term problems, leaving the region struggling with instability and stagnation over the next two decades.
</span></p><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Not only are there significant differences between each country across the region, there are significant differences between North Africa and the Sahel, which makes forming collective conclusions about the two sub-regions difficult. North Africa will likely continue its current trajectory of closer integration with more developed countries. In most areas, the Sahel will continue to lag behind the countries in North Africa in terms of modernization, integration, security and stability, and economic development. However, as a whole and not entirely driven by negative circumstances or events, North Africa and the Sahel will require continuing focus and attention from Europe and NATO for the next 20 years and beyond.
</span></p><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Overall, the most significant trends affecting all other trends in North Africa and the Sahel are expected population growth, climate change, and challenges in politics and governance. The confluence of these trends could significantly challenge governments, economies, societies, and food and water resources, contributing to instability and uncertainty in certain countries in the region for at least the next two decades.
</span></p><p data-dcnode-id="1774"><span data-dcnode-id="1780" instrument_node="">The glossy print version is available by clicking the report image above, and the text version with footnotes is available </span><em data-dcnode-id="1776"><strong data-dcnode-id="1777"><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1323/0" target="_blank"><span data-dcnode-id="1779" instrument_node="">here</span></a></strong></em><span data-dcnode-id="1775" instrument_node="">.
</span></p><hr data-dcnode-id="1773"><p data-dcnode-id="1769"><strong data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Regional Perspectives Report on Russia</span></strong><span data-dcnode-id="1770" instrument_node="">
</span></p><p data-dcnode-id="1765"><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1378" target="_blank"><img alt="regional-perspectives-2021-01.png" data-dcnode-id="1768" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1293&amp;raw" style="float: left; width: 257px; height: 290px; margin-right: 10px;"></a><span data-dcnode-id="1766" instrument_node="">The end of the Cold War marked a great success for the West, although it resulted in an increasingly complex relationship with Russia. Russia’s aggressive actions and assertive rhetoric over the last two decades, such as the use of military power for illegal annexation of Crimea, increased and sometimes provoked military activities in the Euro-Atlantic area.
</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Russia’s continued involvement in Libya, Syria and the wider Middle East to reclaim its status as a global power broker has generated greater concern. The resurgence of Russia should be considered with the redistribution of geostrategic power from the West to the East and the continued rise of China with increasing political and military influence over global affairs. Thus, the trends affecting and emanating from Russia cannot be analysed in isolation. Russia’s relationships with China, the United States, India, and Europe, are expected to be key for understanding the global strategic context over the next two decades.
</span></p><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Immediately following the Cold War, Russia attempted to build an alliance with the United States and became involved in European affairs. Russia hoped that partnerships and cooperation would result in resources and capital to preserve its own economic and political standing. Owing to domestic developments and other external factors, Russia ultimately abandoned this strategy when leadership realized that Russia would not receive the economic and political privileges they had hoped to gain from the West, and that NATO would continue to expand and strengthen its presence in Central and Eastern Europe. Increasing Western/NATO soft power further challenged the Russian regime. These developments led to the deterioration of Russia-NATO/West relations.
</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1760" instrument_node="">The glossy print version is available by clicking the report image above.</span><br data-dcnode-id="1759"><span data-dcnode-id="1758" instrument_node="">
</span></p><hr data-dcnode-id="1756"><p data-dcnode-id="1752"><strong data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Regional Perspectives Report on the Arctic</span></strong><span data-dcnode-id="1753" instrument_node="">
</span></p><p data-dcnode-id="1745"><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1740" target="_blank"><img alt="regional-perspectives-2021-01.png" data-dcnode-id="1751" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1739&amp;raw" style="float: left; width: 257px; margin-right: 10px;"></a><span data-dcnode-id="1749" instrument_node="">The Strategic Foresight branch has released the third in a series of foresight reports -  </span><strong data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">The SFA Regional Perspectives Report on the Arctic</span></strong><span data-dcnode-id="1746" instrument_node="">. At a time of significant global transformation, this latest report analyses the strategic importance of the Arctic to the Alliance.  While NATO Allies among the Arctic littoral states hold different views on whether or not there should be a role for the Alliance to play with respects to security of the region, this report finds that geopolitical completion, accelerated climate change impacts, and economic imperatives in the region require that NATO, at the very least, have the capacity and resources to monitor and consider developments in the Arctic. As the strategic relevance of the High North increases in the future, the Arctic littoral states of the Alliance, and indeed all Allies, can ill afford to postpone an evaluation of NATO’s approach to the region indefinitely. Russia is already expanding its military footprint in the Arctic by establishing infrastructure along the Northern Sea Route and non-littoral countries like the People’s Republic of China are becoming more engaged.  The behaviour of China and Russia in the Arctic should be of concern to the Alliance.
</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">The accelerated pace of climate change has transformed Arctic societies. The prospect of surging commercial activity and rapid technological advancement, combined with growing extra-regional interest and the proliferation of the knowledge, experience and capabilities needed to operate in the Arctic, means that the region is becoming more connected and integral to global life. As this process unfolds, the Arctic will make itself felt in ways that could significantly alter the global balance of power and the terms of great power rivalry and competition.
</span></p><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">While the trends outlined in this report may unfold peacefully, the potential for sudden and rapid change, as well as unpredictable shocks, do not guarantee stability.  The Arctic should, therefore, be included within the Warfighting Development Agenda and as a potential topic of importance for future Chief/Head of Defence discussions.  Aspects of this report undoubtedly will be included within the development of the next NWCC Future Operating Environment.
</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The glossy print version is available by clicking the report image above.
</span></p><hr data-dcnode-id="1738"><p data-dcnode-id="1734"><strong data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Strategic Foresight Analysis Perspectives Paper: The Indo-Pacific</span></strong><span data-dcnode-id="1735" instrument_node="">
</span></p><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">For the SFA Perspective Paper: The Indo-Pacific, a webinar was held 29-30 June 2021. Development and publication are planned for late 2021.
</span></p><hr data-dcnode-id="1731"><p data-dcnode-id="1727"><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Strategic Foresight Analysis Perspectives Paper: The Black Sea</span></strong><span data-dcnode-id="1728" instrument_node="">

</span><p data-dcnode-id="1707"><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Framework for Future Alliance Operations</span></strong></p><span data-dcnode-id="1706" instrument_node="">
</span><p data-dcnode-id="1702"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/180514_ffao18.pdf" rel="noreferrer" target="_blank"><img alt="180514 ffao18" data-dcnode-id="1705" data-save-url="https://www.act.nato.int/images/stories/media/doclibrary/180514_ffao18.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/180514_ffao18.png&amp;raw" style="width: 200px; height: 167px; float: left; margin-right: 10px;"></a><span data-dcnode-id="1703" instrument_node="">As part of NATO’s Warfare Development and Long Term Military Transformation, and using the Strategic Foresight Analysis Report as its foundation, the Framework for Future Alliance Operations, or FFAO, provides best military advice to NATO from Supreme Allied Commander Transformation and Supreme Allied Commander Europe. The purpose of the Framework for Future Alliance Operations Report is to identify the required characteristics and abilities that NATO forces need to develop over the next 20 years to retain the military edge and the ability to prevail in future operations; address and respond to future challenges and surprises; and seize upon future opportunities. The Framework for Future Alliance Operations serves to inform the NATO Military Strategy, Military Committee input to the NATO Political Guidance, and the long-term considerations of the NATO Defence Planning Process.</span></p><span data-dcnode-id="1701" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Learn more about the Framework for Future Alliance Operations Report</span></h2><span data-dcnode-id="1561" instrument_node=""> </span></div><span data-dcnode-id="1559" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="1532"><span data-dcnode-id="1558" instrument_node="">
</span><ul data-dcnode-id="1548"><li data-dcnode-id="1554"><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/ffao-2015.pdf" rel="noreferrer" target="_blank"><strong data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">FFAO 2015 Report</span></strong></a></li><li data-dcnode-id="1549"><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/180514_ffao18.pdf" rel="noreferrer" target="_blank"><strong data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">FFAO 2018 Report</span></strong></a><span class="redactor-invisible-space" data-dcnode-id="1550"></span></li></ul><p data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">Today, the Alliance military forces face a challenge in that they should adapt, evolve and innovate to meet an ambiguous, complex, and rapidly changing security environment. The Framework for Future Alliance Operations is a document that seeks to identify the abilities of a future Alliance pool of forces to meet the potential demands of the security environment from today through to the foreseeable future, 2035 and beyond. The Framework for Future Alliance Operations is designed to improve the Alliance’s long-term perspective of the future security environment to support and inform the NATO Defence Planning Process, as well as other NATO and national processes that require an assessment of the long-term future.</span></p><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Overall, the future security environment through 2035 and beyond will likely be increasingly complex and present both challenges and opportunities to NATO’s military forces. A wide variety of drivers could lead to instability situations resulting in the Alliance’s decision to employ military forces. NATO military forces will need to apply the existing tenets of the law of armed conflict in new contexts, including emerging areas of ethical concern (e.g., human enhancement, cyber, the employment of automation/artificial intelligence, and blurring lines between combatants and non-combatants). However, NATO military forces could seize many opportunities in the future, including building and strengthening relationships, capitalising on innovative technology, ideas to maintain the military edge, as well as understanding and influencing the human aspects of conflict.</span></p><p data-dcnode-id="1534"><span data-dcnode-id="1543" instrument_node="">The Framework for Future Alliance Operations (FFAO) 2018 Report has been approved and signed by both SACT and SACEUR. The report was sent to the NATO Secretary General to the NATO Military Authorities and to the NATO and Partner nations. The FFAO provides the Bi-SC’s best military advice that identifies the required characteristics and abilities of forces that need to be available to the Alliance to retain the military edge and prevail in future operations, address challenges, and seize opportunities of the future. Building on the foundation of the FFAO 2015, this edition includes new discussion on the nature of war and character of conflict, Instability Situations, legal and ethical questions, and opportunities. The FFAO 2018 also includes an overarching Central Idea, refined Strategic Military Perspectives, Enabling Elements, and refined Military Implications. In addition, this document includes new emphasis on nuclear issues, terrorism, human capital, mission command, cross-domain operations and effects, full-spectrum cyberspace operations and space issues, and new disruptive technologies including artificial intelligence as a game-changer. The FFAO 2018 Report can be used to inform the NATO Defence Planning Process and might be taken into consideration during the development of the Military Committee recommendation to the next Political Guidance. The glossy print version is available by clicking the </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/180514_ffao18.pdf" target="_blank"><strong data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">FFAO 2018 Report</span></strong></a><span data-dcnode-id="1539" instrument_node=""> link on the left. The text version is available </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/180514_ffao18-txt.pdf" target="_blank"><strong data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">here</span></strong></a><span data-dcnode-id="1535" instrument_node="">.</span></p><span data-dcnode-id="1533" instrument_node=""> </span></div><span data-dcnode-id="1531" instrument_node="">
</span></div><span data-dcnode-id="1529" instrument_node="">

</span><p data-dcnode-id="1517"><strong data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">What's New - What's Hot</span></strong></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1513"><img alt="icon whatsnew" data-dcnode-id="1515" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-whatsnew.png&amp;raw" style="width: 200px; height: 167px; float: left; margin-right: 10px;"><span data-dcnode-id="1514" instrument_node="">This section contains a list of upcoming workshops and future products, with details and relevant links, as well as related news and events.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">For each event, a list of available documents is provided.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">Older events are available in the archive sections below: NATO'S Long-term Military Transformation Workshops Archive.</span></p><span data-dcnode-id="1506" instrument_node="">

</span><p data-dcnode-id="1489"><picture data-dcnode-id="1491"><source data-dcnode-id="1496" media="(min-width: 900px)" srcset="https://www.act.nato.int/application/files/7216/2438/7305/china-graphic.jpg"><source data-dcnode-id="1495" media="(min-width: 768px)" srcset="https://www.act.nato.int/application/files/7216/2438/7305/china-graphic.jpg"><source data-dcnode-id="1494" srcset="https://www.act.nato.int/application/files/7216/2438/7305/china-graphic.jpg"><img alt="china-graphic.jpg" data-dcnode-id="1492" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/7216/2438/7305/china-graphic.jpg&amp;raw" style="float: left; margin-right: 10px;" width="320"></picture><span data-dcnode-id="1490" instrument_node="">In 2020, Supreme Allied Commander Transformation directed the Headquarters to continue the focus and enhance the ability to do future assessments on China.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Since June 2021, the Strategic Foresight Branch publishes a bi-weekly China Newsletter and a monthly China report. The Newsletter is a review of relevant tailored articles from military journals and think tanks, providing insights on China's military activities and strategy. The Report contains a monthly Bottom Line/Up Front assessment on China relevant to Allied Command Transformation and an update on other works across NATO related to China.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">The newsletters and the reports will be added below as they become available.</span></p><span data-dcnode-id="1482" instrument_node="">

</span><div class="container" data-dcnode-id="1257"><div class="row" data-dcnode-id="1258"><div class="col-sm-12" data-dcnode-id="1259"><span data-dcnode-id="1268" instrument_node=""> </span><h3 data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Strategic Foresight Branch New Programme of Work</span></h3><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1261"><a data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1526/0" target="_blank"><img alt="sfa pow 2021 2026" data-dcnode-id="1264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.act.nato.int/embed/download_file/1527/0&amp;raw" style="float: left; width: 250px; height: 141px; margin-right: 10px;"></a><span data-dcnode-id="1262" instrument_node="">While we know this past year brought significant change to all of our lives, we want to update you, our ACT Strategic Foresight (SF) Branch community of interest, on coming changes to our foresight work. Changes notwithstanding, we look forward to your continued participation and support for our projects and workshops. This update will enable you to understand how you will continue to play a role in our foresight work. As well, you will also receive in the coming days invitations to workshops we are planning for June 2021. This update will help you to understand how those workshops fit into the SF Branch led Long-Term Military Transformation (LTMT) Programme.</span></p><span data-dcnode-id="1260" instrument_node="">
</span></div></div></div><span data-dcnode-id="1256" instrument_node="">
</span><div class="container" data-dcnode-id="1216"><div class="row" data-dcnode-id="1217"><div class="col-sm-12" data-dcnode-id="1218"><span data-dcnode-id="1255" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="1220" id="vivid-simple-accordion-3799"><span data-dcnode-id="1254" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="1222"><span data-dcnode-id="1253" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="1248"><span data-dcnode-id="1252" instrument_node="">
</span><h4 class="panel-title" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Continue Reading 'Strategic Foresight Branch New Programme of Work'</span></h4><span data-dcnode-id="1249" instrument_node=""> </span></div><span data-dcnode-id="1247" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="1224"><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">To understand why the LTMT Programme is changing, you must first be aware that earlier this year ACT released the first ever NATO Warfighting Capstone Concept (NWCC). This classified document, along with Allied Command Operations’ Concept for Deterrence and Defence of the Euro-Atlantic Area (DDA) released in 2020, implement and advance the 2019 NATO Military Strategy. Accordingly, ACT has begun a process to align its numerous work strands and efforts with the NWCC. In anticipation for this and over the past year, the SF Branch examined how its foresight work and related products should align with the ACT Campaign Plan, Supreme Allied Commander Transformation’s (SACT) objectives, the NWCC, and the higher-level NATO strategic documents and planning processes. Additionally, in the wake of the COVID-19 pandemic and the changes it caused to the ways ACT conducts business, the Branch sought how to best adapt to the new requirements and environment. As many of you may be aware, also over the past year, the Branch delivered a Post COVID-19 Food-for-Thought Paper; conducted a series of classified virtual engagements and workshops; solicited input to the LTMT Programme through an on-line questionnaire; initiated work on the next cycle of the Strategic Foresight Analysis (SFA) with a series of webinars; conducted roundtable discussions to adapt the next Framework for Future Alliance Operations (FFAO); and even scheduled, then cancelled the first FFAO workshop in January 2021. We apologize for any confusion or consternation that may have been caused by the starts, stops, and changes to SF Branch work in recent months. Thank you to those who contributed to our work over the past year and for those who helped the Branch consider our way ahead and through this period of ‘path-finding.’</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">In March of this year, SACT approved the new LTMT Programme of work. The changes will enable the Branch to continue to provide the high quality foresight work to which NATO, the Nations, and our community of interest have become accustomed. The SF Branch will also be able to provide more timely results and foresight products and allow a greater degree of flexibility and responsiveness to emerging topics of importance to ACT and the Alliance. Importantly, the new way ahead will retain the SF Branch’s proven collaborative methodology working with the Nations and a wide community of interest, while continuing to contribute to ACT’s external strategic communication messaging.</span></p><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The key takeaway is that the primary foresight work will be fully integrated with and serve as a foundational element of ACT’s NWCC and Warfare Development Agenda (WDA, which is the NWCC implementation plan). These two documents are ACT’s primary ‘Tier 1’ products and outputs. The SF Branch will continue to provide horizon scanning and the long-term perspective/vision for ACT, but directly as part of and supporting the NWCC and WDA and in accordance with SACT’s objectives and priorities. Going forward, the SF Branch products will not have the same names as in the years past, but will still provide the same body of foresight analysis and work that will support other discussions and work within NATO and the Nations. The analysis of global trends and implications (formerly contained in the SFA), and the military implications work (formerly contained in the FFAO) will be developed through an integrated, combined effort essentially serving as ACT’s initiation for the planned four year NWCC cycle. This effort will result in an understanding and description of the ‘Future Operating Environment.’ It will provide analysis and a description of global trends, the future character of warfare, and the military implications for the Alliance. This work by the SF Branch will be the 20-year horizon warfighting perspective in the NWCC.</span></p><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">To achieve this, The SF Branch will continue to use its established proven collaborative process, employing workshops and engagements with the Nations and the broad community of interest. The new ‘Future Operating Environment’ Report will be captured in two matching, synchronized outputs. The first of these will be the specific section describing the future environment in the NWCC. It will be a relatively short synopsis of the main ideas on the future operating environment and the future of warfare. It can and will likely include classified material and will provide a threat informed foundation for the rest of the work in the NWCC. The NWCC will then go on to build on this vision of the future laying out the concepts for the design, develop, and delivery of NATO’s future military instrument of power. The second output of the foresight and implications work will be an unclassified, publicly released version of the same ideas on the future operating environment and the future of warfare and will contain more in-depth discussion and analysis. The plan is for it to be published every four years, beginning at the end of 2023 or early 2024 as a publicly disclosed glossy cover report, similar to the previous SFA and FFAO reports, but combined into one.</span></p><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">The SF Branch will also implement significant changes to the topical foresight reports from those previously published (such as the Regional Perspectives Reports on North Africa and the Sahel, on Russia, and on the Arctic). The idea is that since our foresight work is now supporting and integrated with the NWCC, the topical reports, or Foresight Topical Papers as they will become, are tertiary level products supporting the larger SF Branch foresight work. They will serve as ‘stepping stones’ leading to the ‘Future Operating Environment Report’ for the NWCC. They will be shorter, more succinct products focused only on the few most important issues related to each topic. The Foresight Topical Papers will employ the same proven methodology with workshops, seeking input from the Nations and the broad community of interest, and will also be publicly disclosed.  However, unlike previous workshops where research and ideas were gathered to support initiating report writing, the new workshops will be based on reasonably well developed draft versions of the papers, which will be provided to participants in advance.  Thus, workshop output will shift from generating ideas to validating findings on research completed prior to the workshop. Therefore, maximum participation and representation from Nations as well as the community of interest will be important to capture inputs and concerns on each respective topic.</span></p><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The SF Branch is also building into its programme of work direct involvement and support for a new effort – annual Chiefs’ of Defence (CHODs) Strategic Conversations as established by the NWCC. This support will come in the form of organizing and hosting a workshop, or workshops if needed, leveraging the broad foresight community of interest. The intent of these workshops is to optimize the understanding of the topic and enrich the eventual discussion and longer term influence on each respective topic. This annual work will also influence and provide additive value to the military implications work that is part of the NWCC ‘Future Operating Environment Report.’ More information to follow in the coming days on the upcoming SF Branch workshops related to the first CHODs’ Strategic Conversation planned for January 2022.</span></p><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Finally, The SF Branch is providing ongoing support and involvement in the NATO HQ led efforts on a NATO Net Assessment, the Military Strategy Task Force, and the Chiefs of Defence (CHOD’s) Risk Assessment. What these efforts require and become over time is yet to be determined but are at a minimum directly linked to each other. Each, however, will inform the Branch’s work on understanding the future operating environment and the related military implications for the NWCC.</span></p><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Overall, the bottom line is that even though the familiar form of SF Branch’s foresight work is changing, we will continue to provide the same long-term horizon scanning to enhance the understanding of the future and its implications for NATO and the Nations. Our foresight work will be in direct support to the NWCC and WDA employing the same proven methodology, rigorous analysis, and collaborative input.</span></p><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Again, thank you for your continued support to the SF Branch’s LTMT Programme.</span></p><p data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node=""> Please feel free to reach out to us if you have any questions.</span></p><span data-dcnode-id="1225" instrument_node=""> </span></div><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span></div><span data-dcnode-id="1219" instrument_node="">
</span></div></div></div><span data-dcnode-id="1215" instrument_node="">
</span><div class="container" data-dcnode-id="1179"><div class="row" data-dcnode-id="1180"><div class="col-sm-12" data-dcnode-id="1181"><span data-dcnode-id="1214" instrument_node=""> </span><h3 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">The Black Sea: Strategic Foresight Validation Webinar</span></h3><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1201"><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1798/262" target=""><picture data-dcnode-id="1204"><source data-dcnode-id="1209" media="(min-width: 900px)" srcset="https://www.act.nato.int/application/files/6316/3495/3412/2021116sfa-webinar-black-sea.jpg"><source data-dcnode-id="1208" media="(min-width: 768px)" srcset="https://www.act.nato.int/application/files/6316/3495/3412/2021116sfa-webinar-black-sea.jpg"><source data-dcnode-id="1207" srcset="https://www.act.nato.int/application/files/6316/3495/3412/2021116sfa-webinar-black-sea.jpg"><img alt="2021116sfa-webinar-black-sea.jpg" data-dcnode-id="1205" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/6316/3495/3412/2021116sfa-webinar-black-sea.jpg&amp;raw" style="float: left; margin-right: 15px;" width="250"></picture></a><span data-dcnode-id="1202" instrument_node="">The Strategic Plans &amp; Policy – Strategic Foresight team ran a very successful webinar event on 16 November 2021 in support of the validation the draft Strategic Foresight Analysis (SFA) Perspective Paper: The Black Sea.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">We were pleased to have 113 registered attendees from nations and organizations not only from across the Alliance, but from many nations within the Black Sea region as well. We were especially fortunate to have Mr Sinan Ulgen as a webinar moderator.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The wide variety of topics and perspectives on issues facing NATO in relation to the Black Sea region that were presented and discussed over the course of the webinar will be important to the continued development and refinement of the SFA Perspectives Paper. In coming weeks and months, the Strategic Foresight team will be analysing key points from the webinar discussions and comments in order to release the final Strategic Foresight Analysis Perspective Paper: The Black Sea in March 2022.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Our distinguished group of panellists and contributors to the webinar included Dr Ian Bond on Russia’s Ukraine approach, Dr Ian Anthony on Russia’s Defence Spending, Dr Arnold C. Dupuy on Russia’s use of hybrid warfare tools, Mr Benjamin Hautecouverture on future of Russian EDTs in the region, Dr Aura Sabadus on Russian influence on energy security, Mr Laurentiu Pachiu on energy competition and alternatives, Mr Mykhailo Samus on demographic transition in occupied Ukrainian territories, Dr Gustav Gressel on Western approach to The Black Sea region and Prof Firat Purtas on The Future of Russia-Ukraine Conflict. For those unable to attend the webinar, a recording of the event can be accessed through the link below:</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">https://drive.google.com/file/d/1wlsSfZe0sle4veir9MwcNb-1njKSY_MP/view?usp=sharing</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">The SFA Perspectives Paper: The Black Sea lead and main POC is </span><a data-dcnode-id="1184" href="mailto:atahan.guncu@act.nato.int"><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Major Atahan Guncu</span></strong></a></p><span data-dcnode-id="1182" instrument_node="">

</span><ul data-dcnode-id="1129"><li data-dcnode-id="1163"><span data-dcnode-id="1167" instrument_node="">Aggressive activities in </span><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Ukraine, Georgia and Moldova</span></strong><span data-dcnode-id="1164" instrument_node=""> will depend upon Russian domestic politics.</span></li><li data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">Russia will seek to continue to affect those countries’ governmental systems by implementing cyber-attacks, along with hybrid activities and grey zone operations.  </span><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">A comprehensive approach towards cyber defence</span></strong><span data-dcnode-id="1159" instrument_node=""> could protect those nations from aggressive cyber activities.</span></li><li data-dcnode-id="1153"><span data-dcnode-id="1157" instrument_node="">Western sanctions and economical countermeasures are </span><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">unlikely to constrain</span></strong><span data-dcnode-id="1154" instrument_node=""> Russia’s ability to exercise territorial control but has the potential to generate new conflict areas in the Black Sea region.</span></li><li data-dcnode-id="1148"><span data-dcnode-id="1152" instrument_node="">Increasing dependence on Russian natural gas creates a vulnerability </span><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">to energy exploitation</span></strong><span data-dcnode-id="1149" instrument_node="">.</span></li><li data-dcnode-id="1144"><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Re-routing of energy transit routes away from Ukraine</span></strong><span data-dcnode-id="1145" instrument_node=""> will ensure this country is dependent on Russia.</span></li><li data-dcnode-id="1140"><strong data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Regional country unwillingness</span></strong><span data-dcnode-id="1141" instrument_node=""> to cooperate in addressing any vulnerabilities may further isolate Ukraine, Georgia and Moldova, and increase dependence upon Russia.</span></li><li data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">Russian aggression aims to </span><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">re-engineer the demographic composition</span></strong><span data-dcnode-id="1136" instrument_node=""> within Donbas and Crimea provinces to its favour, trying to intimidate and force migration of Ukrainian and Tatar populations.</span></li><li data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">Tipping the balance through increased Russian population may create an ethnic majority, </span><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">allowing Russia to organise a plebiscite</span></strong><span data-dcnode-id="1131" instrument_node=""> to legitimate the annexation of Crimea and its involvement in Donbas.</span></li></ul><span data-dcnode-id="1128" instrument_node=""> </span></div><span data-dcnode-id="1126" instrument_node="">

</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The archive below encompasses all strands of NATO's Long-Term Military Transformation and is organized chronologically, from the most recent event down to the oldest event.</span></p><span data-dcnode-id="1074" instrument_node="">
