</span><h2 class="panel-title" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">NATO'S Long-term Military Transformation Workshops Archive</span></h2><span data-dcnode-id="1063" instrument_node=""> </span></div><span data-dcnode-id="1061" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="212"><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1057"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">ACT Workshop Report - Assuring Credible Deterrence: Balancing Offensive and Defensive Approaches</span></strong></p><p data-dcnode-id="1051"><img alt="20210427_ACD-workshop.jpg" data-dcnode-id="1056" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1553&amp;raw" style="margin-right: 15px; float: left; width: 100px; height: 149px;"><span data-dcnode-id="1055" instrument_node="">On behalf of Supreme Allied Commander Transformation (SACT), the Strategic Foresight (SF) Branch hosted two virtual Workshops titled "</span><em data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Assuring Credible Deterrence: Balancing Offensive vs Defensive Approaches</span></em><span data-dcnode-id="1052" instrument_node="">". The first workshop on 22 June 2021 was unclassified while the following workshop, on 7 July 2021, covered classified aspects of the subject.</span></p><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">The unclassified workshop was attended by 160 participants from 21 Nations, including NATO HQ, NATO Commands and Agencies, Centres of Excellence, the European Union, think tanks, academia and industry. The following keynote speaker, panellists were contributing to the workshop: USAF retired General Frank Gorenc, Dr. David Killcullen, Dr. Brad Roberts and Mr. Stephan de Spiegeleire. The workshop was moderated by Mr. Bruno Tertrais.</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">The aim of the workshops was to develop an understanding of the issues related to balancing offensive and defensive approaches and how the resultant balance of capabilities contribute to NATO’s defence and deterrence.</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">The unclassified workshop was attended by 160 participants coming from 21 Nations and including several organizations such as NATO HQ, NATO Commands and Agencies, Centres of Excellence, the European Union, think tanks, academia and industry. USAF(retired) General Frank Gorenc introduced the discussions as a keynote speaker, giving the floor to  Dr. Bruno Tertrais (moderator, FRA) and the three following subject matter experts: Dr. David Killcullen (AUST), Dr. Brad Roberts (US) and Mr. Stephan de Spiegeleire (BEL). </span></p><p data-dcnode-id="1041"><span data-dcnode-id="1044" instrument_node="">Many points were discussed, among which were the actual balance of Offense and Defence capabilities; NATO’s predictability; NATO’s lengthy decision-making process; budget constraints; escalation management; and integration of Emerging Disruptive Technologies in deterrence. Based on the viewpoints from the panellists, the audience had the opportunity to further discuss those topics in small virtual groups, providing their additive inputs and remarks.</span><br data-dcnode-id="1043"><span data-dcnode-id="1042" instrument_node="">The classified workshop was smaller due to the nature of the topics discussed and the difficulty for participants to have access to NATO secured means of communication. A group of 35 representatives from eight Nations and seven NATO organizations participated. This event was an opportunity for those entities to share comments or concerns about the findings of the 22 June workshop. </span></p><p data-dcnode-id="1037"><span data-dcnode-id="1040" instrument_node="">After the workshops, the Military Implications Section of the SF Branch released a workshop report. The unclassified part of the report is available here.</span><br data-dcnode-id="1039"><span data-dcnode-id="1038" instrument_node="">The findings of both workshops will contribute to inform the 2022 Chiefs’ of Defence strategic military conversation on Offence and Defence convergence.</span></p><hr data-dcnode-id="1036"><p data-dcnode-id="1033"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Strategic Foresight Analysis Webinar - Indo-Pacific: A Future Perspective</span></strong></p><p data-dcnode-id="1030"><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1561"><img alt="20210521_SFA-webinar-icon.jpg" data-dcnode-id="1032" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1562&amp;raw" style="margin-right: 15px; float: left; width: 100px; height: 130px;"></a></p><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">The Strategic Plans &amp; Policy – Strategic Foresight team ran a very successful webinar event on 29-30 June 2021 in support of the validation of drafting the Strategic Foresight Analysis Perspective Paper on the Indo-Pacific.</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">On behalf of the Supreme Allied Commander Transformation, we would like to thank all of the panelists who shared their expertise and the attendees who contributed to the robust and fruitful discussion.</span></p><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Contributor and panelist Professor Adrian Kendry noted "the thorough, meticulous preparations over many months were translated into a smooth, highly professional and enjoyable set of presentations over the two days. Cleo Paskal’s moderating of the entire event was marvelous with knowledge, energy and engagement beautifully combined! All of the presenters were extremely informative, provocative and insightful. The panelists outlined, in imaginative and convincing contributions, different perspectives on the range of security challenges and opportunities confronting NATO and NATO allies and partners during the next two decades. As the unfolding events accompanying CCP100 and the US and Japan military exercises in the South China Sea demonstrate, the geopolitical and strategic environment for NATO allies and partners is becoming more complex, intense and threatening."</span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">We were pleased to have 109 registered attendees from nations and organizations not only across the alliance, but from many nations within the Indo-Pacific region as well. We were especially fortunate to have Ms. Cleo Paskal, an Associate Fellow in the Asia-Pacific program at Chatham House and Non-resident Senior Fellow for the Indo-Pacific at the Center on Military and Political Power at the Foundation for the Defense of Democracies moderate the GoToWebinar.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">This discussion came at an opportune time, soon after the 14 June NATO summit in Brussels, a summit, which reaffirmed NATO unity and solidarity against global concerns including China’s challenges to alliance security interests. Long-term challenges such as the effects of climate change, the accelerating development of artificial intelligence, the potential weaponisation of outer space, nuclear proliferation, and cyber issues all confirm why NATO has strong geostrategic interest in the Indo-Pacific region.</span></p><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">The wide variety of topics and perspectives on issues facing NATO in relation to the Indo-Pacific region that were presented and discussed over the course of the webinar will be important to the continued development and refinement of the SFA Indo-Pacific Perspectives Paper. In coming weeks and months, the Strategic Foresight team will be analysing key points from the webinar discussions and comments in order to release the final Strategic Foresight Analysis Perspective Paper on the Indo-Pacific in mid-October 2021.</span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Our distinguished group of panelists and contributors on the first day of the webinar included Professor Jonathan Holslag discussing power politics, CAPT James Fanell (ret) on military security matters, Mr. Alexander Gray on democracy vs autocracy, Mr. Richard Cincotta analysing demographic patterns, Dr. Rand Waltzman addressing polarisation, and Professor Kerry Gershaneck on political warfare. On the second day, we had Mr. Andy Purdy discussing differing standards, RADM Mark Montgomery (ret) on commercialisation, Dr. Jody Westby discussing technological innovation and artificial intelligence, Dr. Uttam Sinha addressing the effects of climate change on the region, COL Joachim Isacsson discussing the effects of natural disasters in the region, Mr. Hunter Stires on the strategic areas of the South China Sea, COL Grant Newsham on economic implications, Professor Adrian Kendry addressing the competition for natural resources, and Mr. Rick Fisher on the trends of military expenditures.</span></p><hr data-dcnode-id="1015"><p data-dcnode-id="1012"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">ACT Strategic Foresight Branch, Strategic Military Implications Section Update</span></strong></p><p data-dcnode-id="1009"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Summer 2020 - Spring 2021</span></strong></p><p data-dcnode-id="1006"><img alt="ffao" data-dcnode-id="1008" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1653/0&amp;raw" style="float: left; margin: 0px 10px 0px 0px;"><span data-dcnode-id="1007" instrument_node="">The Framework for Future Alliance Operations (FFAO), developed and written by the ACT Strategic Foresight (SF) Branch Military Implications Section was last published in early 2018. That publication, the companion document to the 2017 Strategic Foresight Analysis (SFA) presented a shared understanding and view for the Alliance and the Nations the military ‘so what’ of the future described in the SFA. While the 2018 FFAO differed somewhat in content from the 2015 FFAO (the first publication of the FFAO), its purpose was to identify characteristics and abilities of future Alliance forces that would be required to retain the military edge, address challenges, and seize opportunities of the future through 2035 and beyond. As most of you may be aware, the 2018 was the last stand-alone foresight military implications report planned to be published by Allied Command Transformation (ACT). However, the SF Branch Military Implications Section will continue to provide the foresight military ‘so what’ as part of the newly planned Future Operating Environment (FOE) section of the NATO Warfighting Capstone Concept (NWCC) and the parallel publicly disclosed FOE Report (please see the article on our futures page entitled “Strategic Foresight Branch New Programme of Work” for the complete background of this change).</span></p><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">The decision to no longer publish a stand-alone FFAO was not made lightly nor without consideration of possible options and the concerns of our community of interest. In the months leading up to the SACT decision to no longer publish a stand-alone SFA or FFAO, the SF Branch Military Implications Section was actively involved in supporting the development and completion of the NWCC. As directed by SACT, the main part of this effort was the form of conducting a series of engagements with the Nations and NATO organizations throughout summer 2020. This led up to and culminated in the Future Threats and Opportunities Workshops in October 2020. The purpose of the Future Threats and Opportunities engagements and workshops was to provide a classified, threat informed assessment of the future security environment specifically considering Russia, China, hybrid threats and circumventing strategies including terrorism, other sources of strategic surprise, and opportunities for NATO.</span></p><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Following the completion of the Future Threats and Opportunities reports, the Military Implications Section turned its attention to developing proposals for what was then the next planned version of the FFAO. Given the content of the new NWCC, many comments were received by ACT over the preceding months from NATO organizations and the Nations about expressing concern about overlap and redundancy in the FFAO and the NWCC on the ideas on the design, development, and delivery of NATO’s future Military Instrument of Power (MIoP). During the last quarter of 2020 one of the first steps taken by the Military Implications Section to ensure there was a thorough understanding of the function and utility of the FFAO for the Nations and NATO was to conduct a survey asking for input. In response to the survey, 10 Nations and 1 NATO partner, 1 International Organization, 4 Think tanks and 5 Academia provided a variety of comments and recommendations, but generally confirming the utility of a foresight military implications type of report. During the same time frame while conducting the survey, the Military Implications Section conducted a series of ‘roundtable’ meetings with stakeholders from our community of interest to discuss and gather ideas and input on the possible future of the FFAO. There was discussion of a range of options from no longer producing the FFAO to producing a FFAO-like report but with significantly modified content. These ‘roundtable’ meetings led to the development of a proposal to continue to produce a foresight military implications report though with somewhat different content than previous focusing on describing the future military operating environment and the related implications for NATO.</span></p><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Although the proposal for developing a modified version of the FFAO received initial approval and the first workshop was scheduled for the end of January 2021, that decision was reconsidered and changed just prior to the execution of the workshop. The ACT leadership directed the SF Branch to pause its work that had begun on both the SFA and FFAO to examine its entire programme of work in light of how it was connected to and would support the NWCC and ACT Warfare Development Agenda. Following the analysis, a recommendation was made and approved by SACT to streamline and combine the SFA and FFAO development work and products into one seamless process and product incorporated as an integrated part of the NWCC. The ACT will no longer produce a stand-alone FFAO, the same analysis will be conducted and included as part of the NWCC and as the new FOE Report.</span></p><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Thank you to those who have contributed to our work over the past year and for those who helped the Branch consider our way ahead and through this period of path-finding.</span></p><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">If you have any questions, the SF Branch primary points of contact are listed above in the "Contacts" area.</span></p><hr data-dcnode-id="995"><p data-dcnode-id="992"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Strategic Foresight Analysis Webinars</span></strong></p><p data-dcnode-id="989"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">October-November 2020</span></strong></p><p data-dcnode-id="986"><img alt="sfa webinars" data-dcnode-id="988" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1394/0&amp;raw" style="float: left; margin: 0px 10px 0px 0px;"><span data-dcnode-id="987" instrument_node="">ACT Strategic Plans and Policy, Strategic Foresight Branch held a series of webinars along Political, Human, Technology, Economics/Resources and Environment Themes during the months of October and November in 2020.  HQ SACT’s policy is to adapt to the COVID pandemic environment as best possible to continue our important work.  As such, instead of running the effective, in-person, conferences as done so often in the past, the Strategic Foresight Team utilised ACT GoToWebinar capability to continue its engagements with subject matter experts and a vast community of interest.   These events proved as successful as in-person conferences, with attendance consisting of approximately 100 participants from HQ NATO, NATO and Partner Nations, NATO Centres of Excellence, international organizations such as the EU/EC, think tanks, academia and industry at each webinar.</span></p><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">The aim of the webinars was to examine the SFA 2017 Report trends and implications across each of the five themes in order to determine their on-going relevance.  Concurrently, the group was tasked to identify any important changes in the original findings and introduce new emerging trends not previously considered.</span></p><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">The five workshops were each three hours in length, divided into two panel session with SME presentations and Q&amp;A periods that allowed any participant of the webinar to engage the panel.  The five webinars occurred on the following dates:</span></p><ul data-dcnode-id="971"><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Political – 8 October 2020</span></li><li data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Human – 14 October 2020</span></li><li data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Technology – 21 October 2020</span></li><li data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Economics/Resources – 4 November 2020</span></li><li data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Environment – 12 November 2020</span></li></ul><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Each webinar commenced with DCOS SPP, RADM Tammen, and the Strategic Foresight Branch Head, COL Wolhram, providing an opening welcome, instructions and theme overviews.  In his remarks, DCOS SPP highlighted his vision for each specific theme area when stressing the importance of a consolidated effort to develop an in-depth understanding of trends and implications, for the Alliance as well as adversaries, if NATO could expect to meet its three core tasks while remaining resilient in the future.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">SME moderators then took over to orchestrate the webinar’s two panels of discussions.  USN Reservists, as well as students from Old Dominion University, joined the SF team as webinar observers in order to help capture, and later examine in further detail, many of the points covered.</span></p><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Some of the key Political theme trends covered were the redistribution of geostrategic power (shift of global power), use of power politics, and the increasing role of non-state actors in domestic and international affairs.  The political theme SMEs also discussed USA-China relations, Russia and the EU.</span></p><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">During the Human theme, the main trends discussed by the panel of SMEs were demographic transition, international migration, uncontrolled urbanization, vertical and/or horizontal inequality, effects of technology on human actions.  A week later the Technology theme webinar renewed the notion of how this fast changing realm will affect the Alliance, the characteristics of Emerging/Disruptive Technology and how they differ from the past, the challenges in a NATO response, and NATO’s strength in address technology challenges.  Future warfighting technologies will challenge the understanding and application of long held rules of war, and will impose greater demands and responsibilities on soldiers.</span></p><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">The Economics/Resources webinar saw Economic and Security experts on China, Europe, the US, and Russia offer insights into the short-term and medium-term configuration of the global economy in the shadow of the COVID-19 pandemic in 2021 and what we might expect through the decades up to 2040.  The consequences of these insights will be the illumination of the challenges of global economic and social inequality, defense spending and other economic security issues that will drive the discussions about upcoming trends NATO must be prepared to address.</span></p><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The last webinar was potentially the most compelling, since it covered a theme in which we are all interested – the environment and what the future may mean for our planet’s climate.  The panel discussed future environmental concerns for the Alliance, including how the environment could be impacted by climate change, the expected population growth, natural and man-made disasters, food and energy needs, water scarcity and pollution as we progress towards 2040.</span></p><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Overall, the most important aspect and ultimate success of the workshops was the same as any workshop the team may have held in person; the ability to bring together a large group of experts for the free exchange of ideas.  To have a common understanding of the future trends and their military implications will enable the Alliance to improve the coordination of national defence plans to face future challenges, and to grasp new opportunities.</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">The SF Branch Program of Work currently is being redesigned to ensure all work strands align properly with the NWCC timelines.  Though the future of the SFA 2021 and FFAO 2022 Reports may remain in question, the SF Branch foresight work continues.  Every aspect of the insights gained from these webinars will support a vast amount of SF Branch foresight efforts, from the potential development of a combined SFA/FFAO effort which will be the Future Operating Environment of the next version of NWCC and individual WDA areas, to narrowly-focused topical foresight reports on specific regions or subjects such as China, the Black Sea or Climate Change.   The world is transforming at an exponential pace and the Alliance needs to understand what/how things are going to affect the future security environment that will shape the world.  The SF Branch work continues to help develop that understanding.</span></p><hr data-dcnode-id="954"><p data-dcnode-id="951"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Food For Thought (FFT) Paper - POST COVID-19 GLOBAL SECURITY LANDSCAPE</span></strong></p><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">In the early months of the COVID crisis in 2020, it soon became apparent that the pandemic might have significant implications for the Alliance over the mid- to long-term planning horizon across a variety of themes relative to the areas researched during many foresight efforts. The Strategic Foresight Branch, as the office focused on delivering the Long-Term Military Transformation programme for Allied Command Transformation, was the obvious choice to lead an effort to assess pandemic impacts on a future landscape accepted already as ambiguous, complex and changing rapidly. Additionally, at the same time that the pandemic was spreading across the globe, the initial planning was underway for the next iteration of the Strategic Foresight Analysis. Therefore, any research accomplished or subsequent findings could be reflected and refined as the pandemic matures past its early stage. In fact, the SFA 2021 webinar that followed in Oct and Nov discussed how many of the FFT findings would impact SFA trends and implications.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">COVID-19 is likely to accelerate changes in many of the global trends found within the heart of SFA on-going research, with likely severe economic, social and geopolitical consequences. Some trends may converge and have compounded impacts. The FFT paper you will find here captures the idea that the convergence of trends such as shifts in global power, the relative decline of the West, increasing nationalistic sentiments and polarization within and between states, compounded by the economic challenges, is likely to increase potential for confrontation and conflict. Members of the Alliance may adjust their national priorities, turning inward to protect their populations through expanded national healthcare efforts, sacrificing defence investments on both national and international requirements. Nations may even need reminding that the unity of NATO, its cohesion and solidarity, may provide the greatest forum for addressing pandemic challenges, let alone assuring that Euro­Atlantic stability and security is preserved throughout and long after the pandemic is gone.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">The COVID FFT paper provides a useful assessment of the potential impacts of the pandemic. As with all the foresight work produced within the Strategic Foresight Branch, the FFT is not a prediction of the future, but rather an assessment of what challenges and opportunities may lay ahead for the Alliance. Opportunities of which to take advantage, and challenges of which the Alliance should try to avoid. The future holds potential for an unlimited number of possible scenarios, but this paper presents three fairly plausible outcomes. Again, not as predictions, but to provide some food for thought to Alliance decision-makers such that they might be better informed on the impacts of the pandemic.</span></p><p data-dcnode-id="931"><span data-dcnode-id="944" instrument_node="">Please </span><strong data-dcnode-id="941"><a data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1500/0" target="_blank"><span data-dcnode-id="943" instrument_node="">click here</span></a></strong><span data-dcnode-id="940" instrument_node=""> to access the Food for Thought Paper. Any questions or queries related to this or any other foresight work may be directed to the SF Branch Head, </span><strong data-dcnode-id="937"><a data-dcnode-id="938" href="mailto:gyula.wohlram@act.nato.int"><span data-dcnode-id="939" instrument_node="">Col Gyula Wohlram</span></a></strong><span data-dcnode-id="936" instrument_node="">, or the Strategic Trends Section Head, </span><strong data-dcnode-id="933"><a data-dcnode-id="934" href="mailto:geoffrey.wallington@act.nato.int"><span data-dcnode-id="935" instrument_node="">Cdr Geoffrey Wallington</span></a></strong><span data-dcnode-id="932" instrument_node="">.</span></p><hr data-dcnode-id="930"><p data-dcnode-id="927"><strong data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Strategic Foresight Analysis Workshop on the Arctic and the High North</span></strong></p><p data-dcnode-id="924"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Oslo, Norway, 17-19 September 2019</span></strong></p><p data-dcnode-id="921"><img alt="sfa workshop arctic" data-dcnode-id="923" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1388/0&amp;raw" style="float: left; margin: 0px 10px 0px 0px;"><span data-dcnode-id="922" instrument_node="">ACT Strategic Plans and Policy, Strategic Foresight Branch held the Strategic Foresight Analysis Regional Report on the Arctic and the High North regional workshop in Oslo 17-19 Sep 2019. The aim of the Oslo workshop was to develop an understanding of the trends, issues, and implications both within and emanating from the region; focusing on the future of the Arctic and High North.</span></p><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Although the workshop was a NATO SF Branch led event, collaboration with the co-hosts Norway and Denmark provided an excellent source of knowledge on the region while ensuring the very highest level of debate among a forward thinking community of experts was achieved. These findings were critical for, first and foremost, providing the information backbone of what would be the Arctic Regional report, as well as providing substantive information supporting foresight efforts required by the NWCC and the WDA.</span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">The workshop commenced with a Keynote Address by GEN Paolo Ruggiero, Deputy SACT. GEN Ruggiero emphasised the importance of holding such workshops, as they are an imperative to facilitate the discussion and interaction between NATO Command Structure and Agencies, NATO and Partner Nations, NATO COEs, International Organizations, Industry, Think Tanks and Academia on developments in regions relevant to NATO and Euro-Atlantic security.  Following a brief overview of the relevant trends and implications within the region, GEN Ruggiero closed with a very salient point; the Arctic of today can no longer be assumed to be the Arctic of the future, too much is changing, too rapidly.</span></p><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Following GEN Ruggiero, Co-Host Nation welcoming remarks were presented by RAdm Frank Trojahn, Acting Chief of Defence Staff, DNK and Lt. Gen. Rune Jakobsen, Commander Norwegian Joint Headquarters, NOR.  Additionally, Mrs. Tone Skogen, State Secretary of the Royal Norwegian Ministry of Defence, provided a keynote speech to wrap up the morning events.</span></p><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Opening remarks from DCOS SPP, RAdm John W. Tammen, highlighted the current security environment, one which is characterised by complexity, uncertainty and unpredictability.  RAdm Tammen described how the Alliance faces a range of security challenges and threats that originate both from the east and from the south; from state and non-state actors; from military forces and from terrorist, cyber, or hybrid attacks. Russia's aggressive actions, including provocative military activities on the periphery of NATO territory and its demonstrated willingness to attain political goals by the threat and use of force, are a source of regional instability, fundamentally challenge the Alliance. In order to respond to these challenges, RAdm Tammen stressed that NATO is required to adapt continuously to the changing security environment with the resources and the resolve to ensure a leading role on the world stage.  He stated that SFA/FFAO provide a unique added value by supporting the development of a shared understanding of the strategic future security environment, describing the most significant political, social, technological, economic and environmental trends, and their relevant military and security implications for the Alliance, out to the next two decades.</span></p><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">The opening session was followed by panel sessions over the next two days with distinguished speakers and moderators from governments, academia and think tanks.  Topics for the panels were:</span></p><ul data-dcnode-id="898"><li data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Flag Officer / Executive Panel – NATO’s Role in the Arctic and High North</span></li><li data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Geopolitics in the Arctic</span></li><li data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Russia and the Arctic</span></li><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Environmental and economic drivers of change in the Arctic</span></li><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Human and Machine in the Arctic</span></li><li data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Future Security Environment Discussion</span></li></ul><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Each of these panel sessions were followed by plenary discussion Q&amp;A sessions to fine tune and discuss the findings.Overall, the most important aspect and ultimate success of the workshop was the ability to gain a shared perspective from not just Alliance nations, but so many experts from external agencies and organizations. To have a common understanding of the future trends and their military implications will enable the Alliance to coordinate national defence plans better to face future challenges, and to grasp new opportunities.</span></p><hr data-dcnode-id="895"><p data-dcnode-id="892"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Strategic Foresight Analysis Workshop on the Russia from Euro-Atlantic Perspective</span></strong></p><p data-dcnode-id="888"><strong data-dcnode-id="891"></strong><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Helsinki, Finland, 17-19 June 2019</span></strong></p><p data-dcnode-id="885"><img alt="190617 sfa ws tn" data-dcnode-id="887" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/190617_sfa_ws_tn.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"><span data-dcnode-id="886" instrument_node="">ACT Strategic Plans and Policy, Strategic Foresight Branch held ‘Russia from a Euro-Atlantic Perspective’ regional workshop in Helsinki co-hosted by Finland and Sweden. There were more than 130 participants in total from NATO and Partner Nations, NATO international staff, NATO command structures and agencies, COEs, the EU and EDA, industry and academia.</span></p><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">After welcoming remarks of MG Jari Kallio, Commandant, Finnish National Defence University, co-hosts of the workshop, Ms. Helena Partanen from Finnish MoD and MG Michael Claesson from Swedish Armed Forces provided keynote addresses. This was followed by opening remarks provided by DCOS SPP MG Hickman. MG Hickman highlighted that ‘the Alliance faces a range of security challenges and threats that originate both from the east and from the south; from state and non-state actors; from military forces and from terrorist, cyber, or hybrid attacks. Russia's aggressive actions, including provocative military activities in the periphery of NATO territory, and its demonstrated willingness to attain political goals by the threat and use of force, are a source of regional instability, fundamentally challenge the Alliance.’ He stated that SFA/FFAO provide a unique added value by supporting the development of a shared understanding of the strategic future security environment, describing the most significant political, social, technological, economic and environmental trends, and their relevant military and security implications for the Alliance, out to the next two decades.’</span></p><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">This was followed by four panel sessions provided by distinguish speakers and moderators from governments, academia and think tanks:</span></p><ul data-dcnode-id="872"><li data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Resurgent Russia: Russia’s foreign policy ambitions to reach and maintain great power status and the consequences for NATO and Euro-Atlantic security.</span></li><li data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Russian sphere of influence: Russian economic and energy strategies and their implications foreign policy.</span></li><li data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Russia’s Innovation Edge: The development of new technologies and how they will be exploited for strategic and tactical goals.</span></li><li data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">The Future of Russia: Moscow’s domestic policies and strategies for regime survival.</span></li></ul><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">This workshop also marks the first time that a Future Exploration Game was conducted in a Strategic Foresight context. The aim of the game was to allow participants to explore a potential future scenario out to the next two decades to identify trends and their implications while encouraging strategic conversation to reduce uncertainty. It also contributed to the development of non-linear thinking to improve our understanding of future eventualities. The Strategic Foresight Team received support from CAPDEV AOA Branch, NCIA SMEs, and wargaming experts.</span></p><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">We received a lot of good feedback for the high-quality speakers and moderators. We also received positive feedback for the Future Exploration Game. There are certain areas for improvement but this event set an excellent start for the use of exploration games. Overall, the workshop was a great success setting up the foundation for the development of the ‘Russia from a Euro-Atlantic Perspective’ report.</span></p><hr data-dcnode-id="867"><p data-dcnode-id="864"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Strategic Foresight Analysis Workshop on the Future Security Environment in North Africa and the Sahel</span></strong></p><p data-dcnode-id="860"><strong data-dcnode-id="863"></strong><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Madrid, Spain, 2-4 April 2019</span></strong></p><p data-dcnode-id="857"><img alt="190430 sfa ws tn" data-dcnode-id="859" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/190430_sfa_ws_tn.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"><span data-dcnode-id="858" instrument_node="">HQ Allied Commander Transformation is pleased to report the findings of the Strategic Foresight Analysis (SFA) North Africa and the Sahel Regional Perspectives Workshop held at the Centro Superior de Estudios de la Defensa Nacional (CESEDEN) in Madrid, Spain on 2-4 April 2019. Building on the discussions from the previous SFA workshops in 2018 in Cadiz and Budapest, the aim of this workshop was to develop an understanding of key trends, issues, and implications both within and emanating from North Africa and the Sahel regions. This event was supported by over 150 participants from 29 different nations including 25 NATO and Partner Nations, and 4 Mediterranean Dialogue Nations (Algeria, Mauritania, Morocco, and Tunisia). Participants represented a diverse array of organizations including NATO HQ, NATO Commands and Agencies, Centres of Excellence (COEs), the United Nations, European Defence Agency, industry, think tanks, and academia.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The North Africa and the Sahel Regional Perspectives Workshop provided an open and transparent environment that enabled extremely useful discussions on the key trends, concerns, and issues related to these regions. It is clear from the workshop discussions that there are numerous diverging views and interests on these trends, implications, and their potential outcomes in the next twenty years. Therefore, the workshop report should be read as a reflection of the discussions held during the workshop and should not be perceived as the views of the Alliance or ACT on any particular subject.</span></p><p data-dcnode-id="850"><strong data-dcnode-id="852"><span data-dcnode-id="854" instrument_node="">Way ahead</span><br data-dcnode-id="853"></strong><span data-dcnode-id="851" instrument_node="">The results of the workshop will be reflected in and serve as a foundation for the Regional Perspectives Report on North Africa and the Sahel scheduled for release in the summer of 2019. During the report development process, we will invite and will provide opportunity for national input and collaboration. The North Africa and the Sahel regional report, along with other separate regional reports to follow, will serve to inform the next SFA scheduled for release in 2021 and Framework for Future Alliance Operations (FFAO) scheduled for release in 2022.</span></p><p data-dcnode-id="837"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Workshop Documents</span></strong><br data-dcnode-id="847"><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/190430_sfa_madrid-ws-agenda.pdf" target="_blank"><span data-dcnode-id="846" instrument_node="">Agenda</span></a><span data-dcnode-id="844" instrument_node=""> ~ </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/190430_sfa_madrid-ws-report.pdf" target="_blank"><span data-dcnode-id="843" instrument_node="">First Impressions Report</span></a><span data-dcnode-id="841" instrument_node=""> ~ </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/190430_sfa_madrid-ws-presentations.zip" target="_blank"><span data-dcnode-id="840" instrument_node="">Presentations</span></a><span data-dcnode-id="838" instrument_node=""> (as far as made available; ZIP file ~14MB)</span></p><hr data-dcnode-id="836"><p data-dcnode-id="832"><strong data-dcnode-id="835"></strong><strong data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Visions of Warfare 2036</span></strong></p><p data-dcnode-id="815"><em data-dcnode-id="828"><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/visions-of-warfare-2036.pdf" target="_blank"><img alt="icon visions of warfare" data-dcnode-id="831" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-visions-of-warfare.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></a><span data-dcnode-id="829" instrument_node="">"This anthology of stories was developed as a proof of concept that futurist prototyping would be a useful tool to advance our thinking around the future.</span></em><br data-dcnode-id="827"><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Many inventions and innovations were described in stories many years before they became a reality. Advanced submarines, flying to the moon, flip phones, iPads and the Internet itself were foretold decades before the underlying scientific challenges were solved. That futurist literature informs or inspires product design has become an established practice. The foundational hypothesis for this project is that leveraging the rich tradition of futurist storytelling will assist innovative and transformational thinking. I hope that the broader and imaginative ideas provided here can be assessed by those at the cutting edge of technology delivery and conceptual thinking and will be useful in postulating possible future evolutions of technology and the environments enabled by them.</span></em><br data-dcnode-id="824"><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">SciFutures brought together a group of talented futurist authors and gave them a profile of the future developed from Allied Command Transformation’s broad library of futures work including the Strategic Foresight Analysis, Framework for Future Alliance Operations, Technology Trends Survey and Long Term Aspects of requirements. With this profile in mind, but unbounded by military strictures or the subliminal requirement to be “realistic”, the authors began a journey of envisioning the future, and exploring and imagining how technology and trends could affect future operations. This anthology is the result of that journey.</span></em><br data-dcnode-id="821"><em data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">These stories will incite inventive thinking and discussion about future possibilities and add to the toolbox that the Alliance military and others can leverage to imagine and contemplate how NATO will undertake operations in the coming decades. Insights ranging from human enhancement to advanced weaponry, robotics, artificial intelligence and atypical soldiers will enlighten and colour how we think about future military engagements, and inform new iterations of intellectual thought on long-term military transformation within Allied Command Transformation.</span></em><br data-dcnode-id="818"><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">This project has literally taken on the challenge levied by Sergey Brin, one of the founders of Google, who said, “If what we are doing is not seen by some people as science fiction, it’s probably not transformative enough.” Allied Command Transformation offers this anthology to provoke a rich debate on the future. I hope that you enjoy reading these stories and I encourage you to engage actively in coming discussions."</span></em></p><p data-dcnode-id="812"><em data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">(Foreword to the book by Lieutenant General Jeffrey Lofgren, United States Air Force, Former Deputy Chief of Staff Capability Development)</span></em></p><hr data-dcnode-id="811"><p data-dcnode-id="806"><strong data-dcnode-id="808"><span data-dcnode-id="810" instrument_node="">Second Strategic Foresight Analysis Workshop on Regional Perspectives</span><br data-dcnode-id="809"></strong><span data-dcnode-id="807" instrument_node="">Budapest, Hungary, 6-8 November 2018</span></p><p data-dcnode-id="802"><a class="wfpopup" data-dcnode-id="804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-sfa-ws-2018.jpg"><img alt="icon sfa ws 2018 300x450" data-dcnode-id="805" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-sfa-ws-2018-300x450.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></a><span data-dcnode-id="803" instrument_node="">Headquarters, Supreme Allied Command Transformation is pleased to report the findings of the Strategic Foresight Analysis workshop in Budapest, Hungary, at the National Public University on 6-8 November 2018. Building on the discussions at the previous Strategic Foresight Analysis workshop in Cadiz, Spain, the aim of this workshop was to set the foundation for the three Regional Perspectives Workshops that are planned for 2019; respectively on North Africa, Russia and Eastern Europe, and the Arctic/High North. These workshops will contribute to the development of Regional Perspectives Reports for each region. The Budapest workshop also provided an opportunity to demonstrate potential use of data science applications to improve the efficiency and increase the capacity of Allied Command Transformation's foresight methodology.</span></p><p data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">WORKSHOP SUMMARY</span></strong></p><p data-dcnode-id="791"><span data-dcnode-id="798" instrument_node="">The workshop was opened by Dr. Csaba Vezekenyi, Hungarian Deputy State Secretary on defence policy followed by a presentation on the National University of Public Service by Dr. Nyikos Gyorgyi PhD, Vice-Rector for International Affairs. After the opening we had an overviews of Hungarian transformational efforts by Dr. Gyorgy Rabai, Hungarian Ministry of Defence - Defence Policy Branch, branch head and by Dr. Gergely Nemeth Hungarian Ministry of Defence J5. After that, a short summary of the Long Term Military Transformation program was presented to inform first-time attendees on Allied Command Transformation’s foresight work and the purpose of the Regional Perspectives Reports. The morning session concluded with a short lead-in briefing focused on the aim, objectives and desired outcomes of the first breakout sessions on North Africa.</span><br data-dcnode-id="797"><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">Over the following two days, participants worked in breakout sessions along the five themes of the Strategic Foresight Analysis (Political, Human/Social, Technology, Economics/Resources, and Environment) to analyse trends and implications, and to identify key areas, concerns, issues for the different regions. They were also asked to determine initial ideas that will require in-depth analysis These ideas will be distributed to a wider audience for their inputs which will serve as the basis for call for papers in development of the Regional Perspectives Reports. The participants were also requested to identify potential Subject Matter Experts that could support the Regional Perspectives workshops and reports. Before the breakout sessions on Russia and Eastern Europe and the Arctic/High North regions, the Host Nation presentation on “Defence capability development challenges and opportunities in Hungary” was provided by Imre Porkolab PhD. This was followed by briefing from Microsoft Solutions Group on their applications to conduct large data analytics and a presentation on Space by Lt Col Ryan Snider member of the SCO group.</span><br data-dcnode-id="794"><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">On the last day, the breakout section were finalised and the workshop continued with a breakout presentations. The breakout session leaders/Subject Matter Experts provided back briefs of their respective regional discussions. Finally, the workshop concluded with closing remarks provided by Col Tibor Szabo, Allied Command Transformation, Strategic Foresight Branch, branch head.</span></p><p data-dcnode-id="788"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">WAY AHEAD</span></strong></p><p data-dcnode-id="784"><span data-dcnode-id="787" instrument_node="">The Budapest workshop provided valuable input to the development of the respective Regional Perspectives Workshops. The detailed Workshop report will be published and send to nations and workshop participants at the beginning of December 2018. </span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">Moving forward with Regional Perspectives Reports, the Strategic Foresight Analysis / Framework for Future Alliance Operations teams will continue to plan and organize the Regional Perspectives workshops in close coordination with the respective host nations: Spain, Finland, and Norway. The results of the workshops will be reflected in and establish the foundation of the Regional Perspectives Reports. These reports will inform the development of Strategic Foresight Analysis 2021 and to the Framework for Future Alliance Operations 2022 reports.</span></p><p data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">WORKSHOP DOCUMENTS</span></strong></p><p data-dcnode-id="712"><a data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180420_inv_letter.pdf" target="_blank"><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Invitation Letter to Ministry of Defence</span></strong></a><span data-dcnode-id="777" instrument_node=""> ~ </span><a data-dcnode-id="774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180916_inv_response.pdf" target="_blank"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Invitation Letter Response</span></strong></a><span data-dcnode-id="773" instrument_node=""> ~ </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180917_inv_letter_3.pdf" target="_blank"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Invitation Letter v3.0</span></strong></a><br data-dcnode-id="769"><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180918_agenda.pdf" target="_blank"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Agenda</span></strong></a><span data-dcnode-id="765" instrument_node=""> ~ </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180918_read_ahead.pdf" target="_blank"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Read Ahead</span></strong></a><br data-dcnode-id="761"><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181106_00_keynote.pdf" target="_blank"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Plenary Keynote - Hungarian Deputy State Secretary</span></strong></a><span data-dcnode-id="757" instrument_node=""> (Dr Csaba Vezekenyi)</span><br data-dcnode-id="756"><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181106_01_vr.pdf" target="_blank"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Plenary - University Vice Rector</span></strong></a><span data-dcnode-id="752" instrument_node=""> (Dr Nyikos Györgyi)</span><br data-dcnode-id="751"><a data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181106_02_admin.pdf" target="_blank"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Plenary - Admin Brief</span></strong></a><span data-dcnode-id="747" instrument_node=""> (Col Sven Szabo)</span><br data-dcnode-id="746"><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181106_03_ltmt.pdf" target="_blank"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Plenary - Opening LTMT Brief</span></strong></a><span data-dcnode-id="742" instrument_node=""> (Col Tibor Szabo, Mr Mehmet Kinaci, LtCol Rik Pleijsant)</span><br data-dcnode-id="741"><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181106_04_north-africa.pdf" target="_blank"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Plenary - North-Africa Brief</span></strong></a><span data-dcnode-id="737" instrument_node=""> (LtCol Rik Pleijsant)</span><br data-dcnode-id="736"><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181107_05_russia.pdf" target="_blank"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Plenary - Russia Brief</span></strong></a><span data-dcnode-id="732" instrument_node=""> (Dr Regian Karp)</span><br data-dcnode-id="731"><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181107_06_space.pdf" target="_blank"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Plenary - Space Brief</span></strong></a><span data-dcnode-id="727" instrument_node=""> (LtCol Ryan Snider)</span><br data-dcnode-id="726"><a data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181108_07_arctic.pdf" target="_blank"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Plenary - Arctic Brief</span></strong></a><span data-dcnode-id="722" instrument_node=""> (Cdr Geir Hestvik)</span><br data-dcnode-id="721"><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181108_08_outbriefs.pdf" target="_blank"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Plenary - Breakout Session out-briefs</span></strong></a><br data-dcnode-id="717"><strong data-dcnode-id="713"><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/181217_sfa-ws-report.pdf" target="_blank"><span data-dcnode-id="716" instrument_node="">Workshop Report</span></a><br data-dcnode-id="714"></strong></p><hr data-dcnode-id="711"><p data-dcnode-id="708"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Framework for Future Alliance Operations 2018</span></strong></p><p data-dcnode-id="705"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">NATO Strategic Foresight Analysis Workshop in Cadiz, Spain</span></strong></p><p data-dcnode-id="701"><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180430_sfa-ws-report.pdf" target="_blank"><img alt="icon sfa ws 300x450" data-dcnode-id="704" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-sfa-ws-300x450.png&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></a><span data-dcnode-id="702" instrument_node="">The Strategic Foresight Analysis Workshop in Cadiz has been an initial attempt to share ideas and objectives for the 2018 and 2019 timeframe with the Strategic Foresight Analysis community of interest.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">In the next two years, the convergence of the technology trends and their implications on all other trends in the political, human, economy/resources and environment domains will be analysed and a test report, using computing power in the analysis process, will be developed.</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Additionally, short regional reports on Russia-Eastern Europe, the Arctic, Asia-Pacific and the Middle East and North Africa and the Sahel will be provided as an outcome of regional workshops.</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">In this work, computing power will be used to support the research and analysis phases, development of scenarios to validate and inform trend analysis, and identification of implications. This process will provide an example of using technology and innovative approaches in staff processes, and of testing new ground to make an end product that adds value to NATO and Nations.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The aim of the Strategic Foresight Analysis workshop was to take stock, review methodology, discuss best practices and to outline a proposed way ahead toward the development of future Reports, while maintaining collaboration with NATO and Partner Nations, NATO Command and Agencies, Centres of Excellence, academia and industry.</span></p><p data-dcnode-id="679"><span data-dcnode-id="692" instrument_node="">Click </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180430_sfa-ws-report.pdf" target="_blank"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">HERE</span></strong></a><span data-dcnode-id="688" instrument_node=""> for the report, </span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180424_sfa-ws-briefs.pdf" target="_blank"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">HERE</span></strong></a><span data-dcnode-id="684" instrument_node=""> for the presentations, </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/180313_sfa-ws-invitation-letter.pdf" target="_blank"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">HERE</span></strong></a><span data-dcnode-id="680" instrument_node=""> for the invitation letter.</span></p><hr data-dcnode-id="678"><p data-dcnode-id="673"><strong data-dcnode-id="675"><span data-dcnode-id="677" instrument_node="">Strategic Foresight Analysis 2017 Report Launch in Europe</span><br data-dcnode-id="676"></strong><span data-dcnode-id="674" instrument_node="">Europe under pressure – security and defence in unpredictable times</span></p><p data-dcnode-id="669"><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" rel="noopener" target="_blank"><img "="" ""="" alt="2017 sfa launch berlin" data-dcnode-id="672" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/2017-sfa-launch-berlin.jpg&amp;raw" target="_blank" www.euro-defence.eu=""><span data-dcnode-id="671" instrument_node="">Prof. Ioan Mircea Pașcu MEP, Vice-President of the European Parliament, former Defence Minister of Romania</span></a></p><li data-dcnode-id="666"><a data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="668" instrument_node="">Dr. Hans-Gert Pöttering, Chairman of the Konrad Adenauer Foundation and former President of the European Parliament</span></a></li><li data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="665" instrument_node="">Michael Roth, MP, Minister of State for Europe, Commissioner for Franco-German Cooperation, German Federal Foreign Office</span></a></li><li data-dcnode-id="660"><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="662" instrument_node="">Jiri Sedivý, Permanent Representative of the Czech Republic to NATO, former Minister of Defence, Congress President BSC 2015-2017</span></a></li><li data-dcnode-id="657"><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="659" instrument_node="">Dr. Karl von Wogau, Secretary General of the Kangaroo Group and Congress President 2001-2011</span></a></li><li data-dcnode-id="654"><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="656" instrument_node="">Robert Walter, President of the Assembly of the Western European Union 2008 – 2011, President of the European Security and Defence Association (ESDA), Congress President BSC 2012 – 2014</span></a></li><p data-dcnode-id="651"><a data-dcnode-id="652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><span data-dcnode-id="653" instrument_node="">The Congress addresses the European armed forces and the security organisations in Europe and those Non-European organisations that cooperate with them. It addresses also the respective ministries and agencies, the embassies in Berlin and the national and international companies. A special invitation goes also to the members of all national parliaments and those of the European Parliament. This event is open to press and on the record.</span></a></p><hr data-dcnode-id="650"><p data-dcnode-id="644"><a data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.euro-defence.eu/" target="_blank"><strong data-dcnode-id="647"><span data-dcnode-id="649" instrument_node="">Strategic Foresight Analysis 2017 Report Launch in Washington D.C.</span><br data-dcnode-id="648"></strong><span data-dcnode-id="646" instrument_node="">Opportunities and Challenges of a Complex Future</span></a></p><p data-dcnode-id="641"><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atlanticcouncil.org/events/upcoming-events/detail/nato-act-report-launch" target="_blank"><img alt="2017 sfa launch dc" data-dcnode-id="643" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/2017-sfa-launch-dc.jpg&amp;raw"></a></p><p data-dcnode-id="638"><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">November 16, 2017 - 5:00 pm, 1957 E Street NW, City View Room, Elliott School of International Affairs, the George Washington University Washington, DC</span></em></p><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">The shift toward multi-polarity and a growing potential for major power conflict, combined with increasing populism, rapidly changing demographics, and emerging technologies, is presenting unique challenges to governments, militaries, and societies around the world. Allied Command Transformations’ (ACT) 2017 Strategic Foresight Analysis report identifies the key drivers of these global trends and their implications for NATO and the Alliance. The panel – featuring US and European experts on security, strategy, and foresight – will discuss how NATO and the Alliance can use insights from the analysis to help prepare itself for a future that is more complex, interconnected, and unpredictable.</span></p><hr data-dcnode-id="635"><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Framework for Future Alliance Operations 2017</span></p><p data-dcnode-id="630"><strong data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">NATO Shares Strategic Foresight Analysis 2017 with the Public</span></strong></p><p data-dcnode-id="628"><img alt="icon sfa 300x250" data-dcnode-id="629" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/icon-sfa-300x250.png&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">NATO ACT will publicly launch its Strategic Foresight Analysis for 2017 this fall in Washington, DC as well as in Berlin.</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">NATO ACT is hosting launch events to give this report the widest dissemination in the United States and Europe. This will apprise leaders and influencers of the dynamic and complex future security environment and identify challenges and opportunities to peace and security that lie on the horizon and beyond.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The Strategic Foresight Analysis 2017 is the only NATO report of its kind and is a shared vision for the future authored by Allied Nations, Partner Nations, academia, and industry to foster a common understanding of the future that NATO expects to face out to 2035.</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Allied Command Transformation is keen to share the report as widely as possible, to act as a foundation for wider debate about subject of our future.</span></p><hr data-dcnode-id="619"><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Framework for Future Alliance Operations 2017</span></p><p data-dcnode-id="611"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Framework for Future Alliance Operations Workshop #1 2017</span></strong><br data-dcnode-id="614"><em data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">2-5 October 2017, NATO JWC, Stavanger, Norway</span></em></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Supreme Allied Commander Transformation is pleased to report the findings of the Framework for Future Alliance Operations workshop held in Stavanger, Norway from 3-5 October 2017.</span></p><p data-dcnode-id="606"><strong data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">WORKSHOP SUMMARY</span></strong></p><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The Framework for Future Alliance Operations workshop was a two-and-a-half-day working-level event held at the Joint Warfare Centre which brought together 87 participants from 18 Nations (15 NATO &amp; 3 Partner Nations), NATO Commands and Agencies, 16 Centres of Excellence, European Committee and Defence Agency, think tanks and academia. The primary deliverable for this conference were recommended changes to the draft Chapter 3 of Framework for Future Alliance Operations 2018.</span></p><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The workshop began with a plenary session for introductory remarks, discussion of workshop concept and objectives, survey results, and discussion of applicable lessons learned. Then the workshop participants broke down into small syndicates for facilitated syndicate work to address the core question: In 2035 and beyond, what abilities will NATO forces require in the areas of prepare, project, engage, sustain, C3, protect, and inform in order to accomplish NATO core tasks? The first day concluded with a brief icebreaker event. The second day of the workshop began with a plenary session on SAS-123 brief panel followed by continued syndicate work. The last day consisted of out-briefs and discussion commencing in a plenary session. Closing remarks from Colonel Szabo concluded the workshop around noon.</span></p><p data-dcnode-id="599"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">WAY AHEAD</span></strong></p><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The Long-Term Military Transformation Programme will continue with the aim of completing the Framework for Future Alliance Operations in 2018. Moving forward, the Framework for Future Alliance Operations team will incorporate recommended changes into the draft Chapter 3 of the document. In October 2017, this document will be submitted for full staffing and review, followed by Bi-SC review in early 2018.</span></p><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Moving forward with this project the Framework for Future Alliance Operations team will incorporate recommended changes into the draft Chapter 3 of the document. After this the fullFramework for Future Alliance Operations-2018 Report will be transmitted to stakeholders for red-line comments. All stakeholders will have about six weeks from end of November 2017 until 06 of January 2018 to provide final comments. Framework for Future Alliance Operations team is going to have a review with Allied Command Transformation and Allied Command Operations stakeholders in the same time and the Team will have a Line-by-Line Review of full Framework for Future Alliance Operations final draft with small group from Allied Command Operations in Brussels 12-16 February 2018. After this review the Framework for Future Alliance Operations Writing team will develop the final draft and will start the Bi-SC approval process. According to our timeline the Framework for Future Alliance Operations Report will be Bi-SC approved at mid-March.</span></p><p data-dcnode-id="592"><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">WORKSHOP DOCUMENTS</span></strong></p><p data-dcnode-id="570"><strong data-dcnode-id="571"><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/171002ws8-letter.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="591" instrument_node="">Workshop Invitation Letter</span></a><span data-dcnode-id="589" instrument_node=""> | </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/171002ws8-agenda.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="588" instrument_node="">Agenda</span></a><span data-dcnode-id="586" instrument_node=""> | </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/171002ws8-readahead.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="585" instrument_node="">Read Ahead</span></a><span data-dcnode-id="583" instrument_node=""> | </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2012/fc_ipr/171002ws8-admin.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="582" instrument_node="">Admin Instructions</span></a><span data-dcnode-id="580" instrument_node=""> | </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.n
