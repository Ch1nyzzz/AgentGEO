</span><div class="horizontal-w-c-circular s-share-w-c" data-dcnode-id="5284" id="s-share-buttons"><a class="s3-facebook hint--top tooltipstered" data-dcnode-id="5297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/" target="_blank"></a><a class="s3-twitter hint--top tooltipstered" data-dcnode-id="5296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/intent/tweet%3Ftext%3DNATO%25E2%2580%2599s%2520Plans%2520to%2520Hack%2520Your%2520Brain%26url%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/" target="_blank"></a><a class="s3-google-plus hint--top tooltipstered" data-dcnode-id="5295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/share%3Furl%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/" target="_blank"></a><a class="s3-digg hint--top tooltipstered" data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digg.com/submit%3Furl%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/" target="_blank"></a><a class="s3-reddit hint--top tooltipstered" data-dcnode-id="5293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reddit.com/submit%3Furl%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/%26title%3DNATO%25E2%2580%2599s%2520Plans%2520to%2520Hack%2520Your%2520Brain" target="_blank"></a><a class="s3-linkedin hint--top tooltipstered" data-dcnode-id="5292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/" target="_blank"></a><a class="s3-stumbleupon hint--top tooltipstered" data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stumbleupon.com/submit%3Furl%3Dhttps%3A//consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/%26title%3DNATO%25E2%2580%2599s%2520Plans%2520to%2520Hack%2520Your%2520Brain" target="_blank"></a><a class="s3-tumblr hint--top tooltipstered" data-dcnode-id="5290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tumblr.com/share/link%3Furl%3Dhttps%253A%252F%252Fconsortiumnews.com%252F2021%252F10%252F13%252Fnatos-plans-to-hack-your-brain%252F%26name%3DNATO%2526%25238217%253Bs%2BPlans%2Bto%2BHack%2BYour%2BBrain" target="_blank"></a><div class="pinit-btn-div" data-dcnode-id="5287"><span class="PIN_1650779581809_button_pin PIN_1650779581809_save" data-dcnode-id="5288" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet"><span data-dcnode-id="5289" instrument_node="">Save</span></span></div><span data-dcnode-id="5286" instrument_node="">
</span><a class="s3-email hint--top tooltipstered" data-dcnode-id="5285" href="mailto:?Subject=NATO%E2%80%99s%20Plans%20to%20Hack%20Your%20Brain&amp;Body=Here%20is%20the%20link%20to%20the%20article:%20https://consortiumnews.com/2021/10/13/natos-plans-to-hack-your-brain/"></a></div><p data-dcnode-id="5280" style="text-align: justify;"><span data-dcnode-id="5281" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><strong data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">NATO is spinning out an entirely new kind of combat it has branded cognitive warfare, Ben Norton reports.&nbsp;</span></strong></span></p><span data-dcnode-id="5279" instrument_node="">
</span><p data-dcnode-id="5276" style="text-align: justify;"><span data-dcnode-id="5277" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5278" id="more-69609"></span></span></p><span data-dcnode-id="5275" instrument_node="">
</span><p data-dcnode-id="5260" style="text-align: justify;"><strong data-dcnode-id="5267"><span data-dcnode-id="5268" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><img alt="" class="aligncenter wp-image-69613" data-dcnode-id="5274" height="622" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-brain.jpg&amp;raw" width="1084"><span data-dcnode-id="5273" instrument_node="">By&nbsp;</span><span data-dcnode-id="5269" style="color: #ff0000;"><a data-dcnode-id="5271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/tag/ben-norton/" style="color: #ff0000;"><span data-dcnode-id="5272" instrument_node="">Ben Norton</span></a><span data-dcnode-id="5270" instrument_node=""> </span></span></span></strong><br data-dcnode-id="5266"><span data-dcnode-id="5265" instrument_node="">
</span><span data-dcnode-id="5261" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><a data-dcnode-id="5262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thegrayzone.com/2021/10/08/nato-cognitive-warfare-brain/" style="color: #000000;"><em data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">The Grayzone</span></em></a></span></p><span data-dcnode-id="5259" instrument_node="">
</span><p data-dcnode-id="5252" style="text-align: justify;"><span data-dcnode-id="5253" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5255" style="font-size: 18pt;"><strong data-dcnode-id="5256"><img alt="" class="alignleft size-thumbnail wp-image-32750" data-dcnode-id="5258" height="100" loading="lazy" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2019/01/Ben-Norton-100x100.jpeg&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2019/01/Ben-Norton-100x100.jpeg 100w, https://consortiumnews.com/wp-content/uploads/2019/01/Ben-Norton-160x160.jpeg 160w, https://consortiumnews.com/wp-content/uploads/2019/01/Ben-Norton.jpeg 200w" width="100"><span data-dcnode-id="5257" instrument_node="">N</span></strong></span><span data-dcnode-id="5254" instrument_node="">ATO is developing new forms of warfare to wage a “battle for the brain,” as the military alliance put it.</span></span></p><span data-dcnode-id="5251" instrument_node="">
</span><p data-dcnode-id="5248" style="text-align: justify;"><span data-dcnode-id="5249" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5250" instrument_node="">The U.S.-led NATO military cartel has tested novel modes of hybrid warfare against its self-declared adversaries, including economic warfare, cyber warfare, information warfare and psychological warfare.</span></span></p><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5240" style="text-align: justify;"><span data-dcnode-id="5241" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><em data-dcnode-id="5243"><strong data-dcnode-id="5244"><a class="image-anchor" data-dcnode-id="5245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//org.salsalabs.com/o/1868/p/salsa/donation/common/public/%3Fdonate_page_KEY%3D14124%26okay%3DTrue" style="color: #000000;"><img alt="" class="alignright size-full wp-image-68564" data-dcnode-id="5246" height="120" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/09/Fall-Fund-Drive2-1.gif&amp;raw" width="212"></a></strong></em><span data-dcnode-id="5242" instrument_node="">Now, NATO is spinning out an entirely new kind of combat it has branded cognitive warfare. Described as the “weaponization of brain sciences,” the new method involves “hacking the individual” by exploiting “the vulnerabilities of the human brain” in order to implement more sophisticated “social engineering.”</span></span></p><span data-dcnode-id="5239" instrument_node="">
</span><p data-dcnode-id="5236" style="text-align: justify;"><span data-dcnode-id="5237" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5238" instrument_node="">Until recently, NATO had divided war into five different operational domains: air, land, sea, space, and cyber. But with its development of cognitive warfare strategies, the military alliance is discussing a new, sixth level: the “human domain.”</span></span></p><span data-dcnode-id="5235" instrument_node="">
</span><p data-dcnode-id="5229" style="text-align: justify;"><span data-dcnode-id="5230" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5234" instrument_node="">A&nbsp;</span><a data-dcnode-id="5232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.innovationhub-act.org/content/cw-documents" style="color: #000000;"><span data-dcnode-id="5233" instrument_node="">2020 NATO-sponsored study</span></a><span data-dcnode-id="5231" instrument_node="">&nbsp;of this new form of warfare clearly explained, “While actions taken in the five domains are executed in order to have an effect on the human domain, cognitive warfare’s objective is to make everyone a weapon.”</span></span></p><span data-dcnode-id="5228" instrument_node="">
</span><p data-dcnode-id="5225" style="text-align: justify;"><span data-dcnode-id="5226" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5227" instrument_node="">“The brain will be the battlefield of the 21st century,” the report stressed. “Humans are the contested domain,” and “future conflicts will likely occur amongst the people digitally first and physically thereafter in proximity to hubs of political and economic power.”</span></span></p><span data-dcnode-id="5224" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="5219" id="attachment_69615" style="width: 1210px"><img alt="" aria-describedby="caption-attachment-69615" class="size-full wp-image-69615" data-dcnode-id="5223" height="789" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report.png&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report.png 1200w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report-500x329.png 500w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report-1000x658.png 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report-768x505.png 768w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-report-160x105.png 160w" width="1200"><p class="wp-caption-text" data-dcnode-id="5220" id="caption-attachment-69615"><span data-dcnode-id="5221" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="5222" instrument_node="">The 2020 NATO-sponsored study on cognitive warfare.</span></span></p></div><span data-dcnode-id="5218" instrument_node="">
</span><p data-dcnode-id="5215" style="text-align: justify;"><span data-dcnode-id="5216" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5217" instrument_node="">While the NATO-backed study insisted that much of its research on cognitive warfare is designed for defensive purposes, it also conceded that the military alliance is developing offensive tactics, stating, “The human is very often the main vulnerability and it should be acknowledged in order to protect NATO’s human capital but also to be able to benefit from our adversaries’ vulnerabilities.”</span></span></p><span data-dcnode-id="5214" instrument_node="">
</span><p data-dcnode-id="5211" style="text-align: justify;"><span data-dcnode-id="5212" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5213" instrument_node="">In a chilling disclosure, the report said explicitly that “the objective of Cognitive Warfare is to harm societies and not only the military.”</span></span></p><span data-dcnode-id="5210" instrument_node="">
</span><p data-dcnode-id="5207" style="text-align: justify;"><span data-dcnode-id="5208" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5209" instrument_node="">With entire civilian populations in NATO’s crosshairs, the report emphasized that Western militaries must work more closely with academia to weaponize social sciences and human sciences and help the alliance develop its cognitive warfare capacities.</span></span></p><span data-dcnode-id="5206" instrument_node="">
</span><p data-dcnode-id="5203" style="text-align: justify;"><span data-dcnode-id="5204" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5205" instrument_node="">The study described this phenomenon as “the militarization of brain science.” But it appears clear that NATO’s development of cognitive warfare will lead to a militarization of all aspects of human society and psychology, from the most intimate of social relationships to the mind itself.</span></span></p><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5199" style="text-align: justify;"><span data-dcnode-id="5200" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5201" instrument_node="">Such all-encompassing militarization of society is reflected in the paranoid tone of the NATO-sponsored report, which warned of “an embedded fifth column, where everyone, unbeknownst to him or her, is behaving according to the plans of one of our competitors.” The study makes it clear that those “competitors” purportedly exploiting the consciousness of Western dissidents are China and Russia.</span></span></p><span data-dcnode-id="5198" instrument_node="">
</span><p data-dcnode-id="5195" style="text-align: justify;"><span data-dcnode-id="5196" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5197" instrument_node="">In other words, this document shows that figures in the NATO military cartel increasingly see their own domestic population as a threat, fearing civilians to be potential Chinese or Russian sleeper cells, dastardly “fifth columns” that challenge the stability of “Western liberal democracies.”</span></span></p><span data-dcnode-id="5194" instrument_node="">
</span><p data-dcnode-id="5175" style="text-align: center;"><span data-dcnode-id="5176" style="font-size: 24pt;"><em data-dcnode-id="5177"><span data-dcnode-id="5178" style="font-family: georgia, palatino, serif;"><strong data-dcnode-id="5179"><span data-dcnode-id="5180" style="color: #008000;"><span data-dcnode-id="5192" style="color: #000000;"><span data-dcnode-id="5193" instrument_node="">Please</span></span><span data-dcnode-id="5191" instrument_node=""> </span><span data-dcnode-id="5188" style="color: #ff6600;"><a data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//org.salsalabs.com/o/1868/p/salsa/donation/common/public/%3Fdonate_page_KEY%3D14124%26okay%3DTrue" style="color: #ff6600;"><span data-dcnode-id="5190" instrument_node="">Support</span></a></span><span data-dcnode-id="5187" instrument_node=""> </span><span data-dcnode-id="5185" style="color: #000000;"><span data-dcnode-id="5186" instrument_node="">CN’s </span></span><span data-dcnode-id="5183" style="color: #ff6600;"><span data-dcnode-id="5184" instrument_node="">Fall </span></span><span data-dcnode-id="5181" style="color: #000000;"><span data-dcnode-id="5182" instrument_node="">Fund Drive!</span></span></span></strong></span></em></span></p><span data-dcnode-id="5174" instrument_node="">
</span><p data-dcnode-id="5171" style="text-align: justify;"><span data-dcnode-id="5172" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5173" instrument_node="">NATO’s development of novel forms of hybrid warfare come at a time when member states’ military campaigns are targeting domestic populations on an unprecedented level.</span></span></p><span data-dcnode-id="5170" instrument_node="">
</span><p data-dcnode-id="5160" style="text-align: justify;"><span data-dcnode-id="5161" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><em data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">The</span></em><span data-dcnode-id="5167" instrument_node="">&nbsp;</span><a data-dcnode-id="5163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ottawacitizen.com/news/national/defence-watch/military-leaders-saw-pandemic-as-unique-opportunity-to-test-propaganda-techniques-on-canadians-forces-report-says" style="color: #000000;"><em data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">Ottawa Citizen</span></em><span data-dcnode-id="5164" instrument_node=""> reported</span></a><span data-dcnode-id="5162" instrument_node="">&nbsp;this September that the Canadian military’s Joint Operations Command took advantage of the Covid-19 pandemic to wage an information war against its own domestic population, testing out propaganda tactics on Canadian civilians.</span></span></p><span data-dcnode-id="5159" instrument_node="">
</span><p data-dcnode-id="5156" style="text-align: justify;"><span data-dcnode-id="5157" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5158" instrument_node="">Internal NATO-sponsored reports suggest that this disclosure is just scratching the surface of a wave of new unconventional warfare techniques that Western militaries are employing around the world.</span></span></p><span data-dcnode-id="5155" instrument_node="">
</span><h3 data-dcnode-id="5151" style="text-align: justify;"><strong data-dcnode-id="5152"><span data-dcnode-id="5153" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5154" instrument_node="">Canada Hosts Cognitive Warfare Event</span></span></strong></h3><span data-dcnode-id="5150" instrument_node="">
</span><p data-dcnode-id="5147" style="text-align: justify;"><span data-dcnode-id="5148" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5149" instrument_node="">Twice each year, NATO holds a “pitch-style event” that it brands as an “Innovation Challenge.” These campaigns — one hosted in the Spring and the other in the Fall, by alternating member states — call on private companies, organizations, and researchers to help develop new tactics and technologies for the military alliance.</span></span></p><span data-dcnode-id="5146" instrument_node="">
</span><p data-dcnode-id="5143" style="text-align: justify;"><span data-dcnode-id="5144" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5145" instrument_node="">The shark tank-like challenges reflect the predominant influence of neoliberal ideology within NATO, as participants mobilize the free market, public-private partnerships and the promise of cash prizes to advance the agenda of the military-industrial complex.</span></span></p><span data-dcnode-id="5142" instrument_node="">
</span><p data-dcnode-id="5137" style="text-align: justify;"><span data-dcnode-id="5138" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><a data-dcnode-id="5140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/department-national-defence/campaigns/fall-2021-nato-innovation-challenge.html" style="color: #000000;"><span data-dcnode-id="5141" instrument_node="">NATO’s Fall 2021 Innovation Challenge is hosted by Canada</span></a><span data-dcnode-id="5139" instrument_node="">, and is titled “The invisible threat: Tools for countering cognitive warfare.”</span></span></p><span data-dcnode-id="5136" instrument_node="">
</span><p data-dcnode-id="5134" style="text-align: justify;"><img alt="" class="aligncenter size-full wp-image-69616" data-dcnode-id="5135" height="694" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare.png&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare.png 1200w, https://consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare-500x289.png 500w, https://consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare-1000x578.png 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare-768x444.png 768w, https://consortiumnews.com/wp-content/uploads/2021/10/Canada-NATO-innovation-challenge-cognitive-warfare-160x93.png 160w" width="1200"></p><span data-dcnode-id="5133" instrument_node="">
</span><p data-dcnode-id="5130" style="text-align: justify;"><span data-dcnode-id="5131" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5132" instrument_node="">“Cognitive warfare seeks to change not only what people think, but also how they act,” the Canadian government wrote in its official statement on the challenge. “Attacks against the cognitive domain involve the integration of cyber, disinformation/misinformation, psychological, and social-engineering capabilities.”</span></span></p><span data-dcnode-id="5129" instrument_node="">
</span><p data-dcnode-id="5126" style="text-align: justify;"><span data-dcnode-id="5127" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5128" instrument_node="">Ottawa’s press release continued: “Cognitive warfare positions the mind as a battle space and contested domain. Its objective is to sow dissonance, instigate conflicting narratives, polarize opinion, and radicalize groups. Cognitive warfare can motivate people to act in ways that can disrupt or fragment an otherwise cohesive society.”</span></span></p><span data-dcnode-id="5125" instrument_node="">
</span><h3 data-dcnode-id="5121" style="text-align: justify;"><strong data-dcnode-id="5122"><span data-dcnode-id="5123" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5124" instrument_node="">NATO-Backed Panel</span></span></strong></h3><span data-dcnode-id="5120" instrument_node="">
</span><p data-dcnode-id="5117" style="text-align: justify;"><span data-dcnode-id="5118" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5119" instrument_node="">An advocacy group called the NATO Association of Canada has mobilized to support this Innovation Challenge, working closely with military contractors to attract the private sector to invest in further research on behalf of NATO — and its own bottom line.</span></span></p><span data-dcnode-id="5116" instrument_node="">
</span><p data-dcnode-id="5110" style="text-align: justify;"><span data-dcnode-id="5111" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5115" instrument_node="">While the NATO Association of Canada (NAOC) is technically an independent NGO, its mission is to promote NATO, and the organization boasts on its website, “The&nbsp;</span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//natoassociation.ca/about-us/" style="color: #000000;"><span data-dcnode-id="5114" instrument_node="">NAOC has strong ties with the Government of Canada</span></a><span data-dcnode-id="5112" instrument_node="">&nbsp;including Global Affairs Canada and the Department of National Defence.”</span></span></p><span data-dcnode-id="5109" instrument_node="">
</span><p data-dcnode-id="5103" style="text-align: justify;"><span data-dcnode-id="5104" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5108" instrument_node="">As part of its efforts to promote Canada’s NATO Innovation Challenge, the&nbsp;</span><a data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eventbrite.ca/e/canada-nato-innovation-challenge-fall-2021-cognitive-warfare-tickets-181243302597" style="color: #000000;"><span data-dcnode-id="5107" instrument_node="">NAOC held a panel discussion on cognitive warfare</span></a><span data-dcnode-id="5105" instrument_node="">&nbsp;on Oct. 5.</span></span></p><span data-dcnode-id="5102" instrument_node="">
</span><p data-dcnode-id="5099" style="text-align: justify;"><span data-dcnode-id="5100" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5101" instrument_node="">The researcher who wrote the definitive 2020 NATO-sponsored study on cognitive warfare, François du Cluzel, participated in the event, alongside NATO-backed Canadian military officers.</span></span></p><span data-dcnode-id="5098" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="5093" id="attachment_69617" style="width: 1210px"><img alt="" aria-describedby="caption-attachment-69617" class="size-full wp-image-69617" data-dcnode-id="5097" height="675" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel.jpg&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel.jpg 1200w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel-500x281.jpg 500w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel-1000x563.jpg 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel-768x432.jpg 768w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Canada-panel-160x90.jpg 160w" width="1200"><p class="wp-caption-text" data-dcnode-id="5094" id="caption-attachment-69617"><span data-dcnode-id="5095" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="5096" instrument_node="">Oct. 5 panel on cognitive warfare, hosted by the NATO Association of Canada.</span></span></p></div><span data-dcnode-id="5092" instrument_node="">
</span><p data-dcnode-id="5089" style="text-align: justify;"><span data-dcnode-id="5090" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5091" instrument_node="">The panel was overseen by Robert Baines, president of the NATO Association of Canada. It was moderated by Garrick Ngai, a marketing executive in the weapons industry who serves as an adviser to the Canadian Department of National Defense and vice president and director of the NAOC.</span></span></p><span data-dcnode-id="5088" instrument_node="">
</span><p data-dcnode-id="5085" style="text-align: justify;"><span data-dcnode-id="5086" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5087" instrument_node="">Baines opened the event noting that participants would discuss “cognitive warfare and new domain of competition, where state and non-state actors aim to influence what people think and how they act.”</span></span></p><span data-dcnode-id="5084" instrument_node="">
</span><p data-dcnode-id="5081" style="text-align: justify;"><span data-dcnode-id="5082" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5083" instrument_node="">The NAOC president also happily noted the lucrative “opportunities for Canadian companies” that this NATO Innovation Challenge promised.</span></span></p><span data-dcnode-id="5080" instrument_node="">
</span><h3 data-dcnode-id="5076" style="text-align: justify;"><strong data-dcnode-id="5077"><span data-dcnode-id="5078" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5079" instrument_node="">&nbsp;‘Ways of Harming the Brain’</span></span></strong></h3><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5069" style="text-align: justify;"><span data-dcnode-id="5070" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5074" instrument_node="">The Oct. 5 panel kicked off with François du Cluzel, a former French military officer who in 2013 helped to create the&nbsp;</span><a data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//act.nato.int/innovationhub" style="color: #000000;"><span data-dcnode-id="5073" instrument_node="">NATO Innovation Hub</span></a><span data-dcnode-id="5071" instrument_node="">&nbsp;(iHub), which he has since then managed from its base in Norfolk, Virginia.</span></span></p><span data-dcnode-id="5068" instrument_node="">
</span><p data-dcnode-id="5062" style="text-align: justify;"><span data-dcnode-id="5063" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5067" instrument_node="">Although the iHub insists on its website, for legal reasons, that the “opinions expressed on this platform don’t constitute NATO or any other organization points of view,” the organization is sponsored by the&nbsp;</span><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natolive/topics_52092.htm" style="color: #000000;"><span data-dcnode-id="5066" instrument_node="">Allied Command Transformation</span></a><span data-dcnode-id="5064" instrument_node="">&nbsp;(ACT), described as “one of two Strategic Commands at the head of NATO’s military command structure.”</span></span></p><span data-dcnode-id="5061" instrument_node="">
</span><p data-dcnode-id="5058" style="text-align: justify;"><span data-dcnode-id="5059" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5060" instrument_node="">The Innovation Hub, therefore, acts as a kind of in-house NATO research center or think tank. Its research is not necessarily official NATO policy, but it is directly supported and overseen by NATO.</span></span></p><span data-dcnode-id="5057" instrument_node="">
</span><p data-dcnode-id="5054" style="text-align: justify;"><span data-dcnode-id="5055" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5056" instrument_node="">In 2020, NATO’s Supreme Allied Commander Transformation (SACT) tasked du Cluzel, as manager of the iHub, to conduct a six-month study on cognitive warfare.</span></span></p><span data-dcnode-id="5053" instrument_node="">
</span><p data-dcnode-id="5050" style="text-align: justify;"><span data-dcnode-id="5051" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5052" instrument_node="">Du Cluzel summarized his research in the panel this October. He initiated his remarks noting that cognitive warfare “right now is one of the hottest topics for NATO,” and “has become a recurring term in military terminology in recent years.”</span></span></p><span data-dcnode-id="5049" instrument_node="">
</span><p data-dcnode-id="5046" style="text-align: justify;"><span data-dcnode-id="5047" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5048" instrument_node="">Although French,&nbsp;Du Cluzel emphasized that cognitive warfare strategy “is being currently developed by my command here in Norfolk, U.S.A.”</span></span></p><span data-dcnode-id="5045" instrument_node="">
</span><p data-dcnode-id="5042" style="text-align: justify;"><span data-dcnode-id="5043" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5044" instrument_node="">The NATO Innovation Hub manager spoke with a PowerPoint presentation, and opened with a provocative slide that described cognitive warfare as “A Battle for the Brain.”</span></span></p><span data-dcnode-id="5041" instrument_node="">
</span><p data-dcnode-id="5037" style="text-align: justify;"><span data-dcnode-id="5038" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><img alt="" class="aligncenter wp-image-69618" data-dcnode-id="5040" height="585" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-Cognitive-Warfare.png&amp;raw" width="1021"><span data-dcnode-id="5039" instrument_node="">“Cognitive warfare is a new concept that starts in the information sphere, that is a kind of hybrid warfare,” du Cluzel said.</span></span></p><span data-dcnode-id="5036" instrument_node="">
</span><p data-dcnode-id="5033" style="text-align: justify;"><span data-dcnode-id="5034" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5035" instrument_node="">“It starts with hyper-connectivity. Everyone has a cell phone,” he continued. “It starts with information because information is, if I may say, the fuel of cognitive warfare. But it goes way beyond solely information, which is a standalone operation — information warfare is a standalone operation.”</span></span></p><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5029" style="text-align: justify;"><span data-dcnode-id="5030" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5031" instrument_node="">Cognitive warfare overlaps with Big Tech corporations and mass surveillance, because&nbsp;“it’s all about leveraging the Big Data,” du Cluzel explained. “We produce data everywhere we go. Every minute, every second we go, we go online. And this is extremely easy to leverage those data in order to better know you and use that knowledge to change the way you think.”</span></span></p><span data-dcnode-id="5028" instrument_node="">
</span><p data-dcnode-id="5025" style="text-align: justify;"><span data-dcnode-id="5026" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5027" instrument_node="">Naturally, the NATO researcher claimed foreign “adversaries” are the supposed aggressors employing cognitive warfare. But at the same time, he made it clear that the Western military alliance is developing its own tactics.</span></span></p><span data-dcnode-id="5024" instrument_node="">
</span><p data-dcnode-id="5021" style="text-align: justify;"><span data-dcnode-id="5022" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5023" instrument_node="">Du Cluzel defined cognitive warfare as the “art of using technologies to alter the cognition of human targets.”</span></span></p><span data-dcnode-id="5020" instrument_node="">
</span><p data-dcnode-id="5017" style="text-align: justify;"><span data-dcnode-id="5018" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5019" instrument_node="">Those technologies, he noted, incorporate the fields of NBIC — nanotechnology, biotechnology, information technology, and cognitive science. All together, “it makes a kind of very dangerous cocktail that can further manipulate the brain,” he said.</span></span></p><span data-dcnode-id="5016" instrument_node="">
</span><p data-dcnode-id="5012" style="text-align: justify;"><span data-dcnode-id="5013" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><img alt="" class="aligncenter wp-image-69620" data-dcnode-id="5015" height="601" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-human-targets.png&amp;raw" width="1049"><span data-dcnode-id="5014" instrument_node="">Du Cluzel went on to explain that the exotic new method of attack “goes well beyond” information warfare or psychological operations (psyops).</span></span></p><span data-dcnode-id="5011" instrument_node="">
</span><p data-dcnode-id="5002" style="text-align: justify;"><span data-dcnode-id="5003" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5010" instrument_node="">“Cognitive warfare is not only a fight against&nbsp;</span><em data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">what</span></em><span data-dcnode-id="5007" instrument_node="">&nbsp;we think, but it’s rather a fight against the&nbsp;</span><em data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">way</span></em><span data-dcnode-id="5004" instrument_node="">&nbsp;we think, if we can change the way people think,” he said. “It’s much more powerful and it goes way beyond the information [warfare] and psyops.”</span></span></p><span data-dcnode-id="5001" instrument_node="">
</span><p data-dcnode-id="4998" style="text-align: justify;"><span data-dcnode-id="4999" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="5000" instrument_node="">De Cluzel continued: </span></span></p><span data-dcnode-id="4997" instrument_node="">
</span><blockquote data-dcnode-id="4987"><span data-dcnode-id="4996" instrument_node="">
</span><p data-dcnode-id="4993" style="text-align: justify;"><span data-dcnode-id="4994" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4995" instrument_node="">“It’s crucial to understand that it’s a game on our cognition, on the way our brain processes information and turns it into knowledge, rather than solely a game on information or on psychological aspects of our brains. It’s not only an action against what we think, but also an action against the way we think, the way we process information and turn it into knowledge.</span></span></p><span data-dcnode-id="4992" instrument_node="">
</span><p data-dcnode-id="4989" style="text-align: justify;"><span data-dcnode-id="4990" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4991" instrument_node="">In other words, cognitive warfare is not just another word, another name for information warfare. It is a war on our individual processor, our brain.”</span></span></p><span data-dcnode-id="4988" instrument_node="">
</span></blockquote><span data-dcnode-id="4986" instrument_node="">
</span><p data-dcnode-id="4983" style="text-align: justify;"><span data-dcnode-id="4984" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4985" instrument_node="">The NATO researcher stressed that “this is extremely important for us in the military,” because&nbsp;“it has the potential, by developing new weapons and ways of harming the brain, it has the potential to engage neuroscience and technology in many, many different approaches to influence human ecology… because you all know that it’s very easy to turn a civilian technology into a military one.”</span></span></p><span data-dcnode-id="4982" instrument_node="">
</span><p data-dcnode-id="4980" style="text-align: justify;"><img alt="" class="aligncenter size-full wp-image-69621" data-dcnode-id="4981" height="675" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops.png&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops.png 1200w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops-500x281.png 500w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops-1000x563.png 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops-768x432.png 768w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-psyops-160x90.png 160w" width="1200"></p><span data-dcnode-id="4979" instrument_node="">
</span><p data-dcnode-id="4976" style="text-align: justify;"><span data-dcnode-id="4977" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4978" instrument_node="">As for who the targets of cognitive warfare could be, du Cluzel revealed that anyone and everyone is on the table.</span></span></p><span data-dcnode-id="4975" instrument_node="">
</span><p data-dcnode-id="4972" style="text-align: justify;"><span data-dcnode-id="4973" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4974" instrument_node="">“Cognitive warfare has universal reach, from starting with the individual to states and multinational organizations,” he said. “Its field of action is global and aim to seize control of the human being, civilian as well as military.”</span></span></p><span data-dcnode-id="4971" instrument_node="">
</span><p data-dcnode-id="4968" style="text-align: justify;"><span data-dcnode-id="4969" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4970" instrument_node="">And the private sector has a financial interest in advancing cognitive warfare research, he noted: “The massive worldwide investments made in neurosciences suggests that the cognitive domain will probably one of the battlefields of the future.”</span></span></p><span data-dcnode-id="4967" instrument_node="">
</span><p data-dcnode-id="4964" style="text-align: justify;"><span data-dcnode-id="4965" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4966" instrument_node="">The development of cognitive warfare totally transforms military conflict as we know it, du Cluzel said, adding “a third major combat dimension to the modern battlefield: to the physical and informational dimension is now added a cognitive dimension.”</span></span></p><span data-dcnode-id="4963" instrument_node="">
</span><p data-dcnode-id="4960" style="text-align: justify;"><span data-dcnode-id="4961" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4962" instrument_node="">This “creates a new space of competition beyond what is called the five domains of operations – or land, sea, air, cyber, and space domains. Warfare in the cognitive arena mobilizes a wider range of battle spaces than solely the physical and information dimensions can do.”</span></span></p><span data-dcnode-id="4959" instrument_node="">
</span><p data-dcnode-id="4956" style="text-align: justify;"><span data-dcnode-id="4957" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4958" instrument_node="">In short, humans themselves are the new contested domain in this novel mode of hybrid warfare, alongside land, sea, air, cyber, and outer space.</span></span></p><span data-dcnode-id="4955" instrument_node="">
</span><p data-dcnode-id="4953"><img alt="" class="aligncenter wp-image-69625" data-dcnode-id="4954" height="599" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-humans-domain.png&amp;raw" width="1046"></p><span data-dcnode-id="4952" instrument_node="">
</span><h3 data-dcnode-id="4945" style="text-align: justify;"><strong data-dcnode-id="4946"><span data-dcnode-id="4947" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4951" instrument_node="">‘Embedded 5</span><sup data-dcnode-id="4949"><span data-dcnode-id="4950" instrument_node="">th</span></sup><span data-dcnode-id="4948" instrument_node=""> Column’</span></span></strong></h3><span data-dcnode-id="4944" instrument_node="">
</span><p data-dcnode-id="4938" style="text-align: justify;"><span data-dcnode-id="4939" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4943" instrument_node="">The study that NATO Innovation Hub manager&nbsp;François du Cluzel conducted, from June to November 2020, was sponsored by the military cartel’s Allied Command Transformation, and published as a 45-page report in January 2021 (</span><a data-dcnode-id="4941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.innovationhub-act.org/sites/default/files/2021-01/20210122_CW%2520Final.pdf" style="color: #000000;"><span data-dcnode-id="4942" instrument_node="">PDF</span></a><span data-dcnode-id="4940" instrument_node="">).</span></span></p><span data-dcnode-id="4937" instrument_node="">
</span><p data-dcnode-id="4934" style="text-align: justify;"><span data-dcnode-id="4935" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4936" instrument_node="">It shows how contemporary warfare has reached the kind of dystopian stage, once only imaginable in science fiction.</span></span></p><span data-dcnode-id="4933" instrument_node="">
</span><p data-dcnode-id="4930" style="text-align: justify;"><span data-dcnode-id="4931" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4932" instrument_node="">“The nature of warfare has changed,” the report emphasized. “The majority of current conflicts remain below the threshold of the traditionally accepted definition of warfare, but new forms of warfare have emerged such as Cognitive Warfare (CW), while the human mind is now being considered as a new domain of war.”</span></span></p><span data-dcnode-id="4929" instrument_node="">
</span><p data-dcnode-id="4926" style="text-align: justify;"><span data-dcnode-id="4927" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4928" instrument_node="">For NATO, research on cognitive warfare is not just defensive; it is very much offensive as well.</span></span></p><span data-dcnode-id="4925" instrument_node="">
</span><p data-dcnode-id="4922" style="text-align: justify;"><span data-dcnode-id="4923" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4924" instrument_node="">“Developing capabilities to harm the cognitive abilities of opponents will be a necessity,” du Cluzel’s report stated clearly. “In other words, NATO will need to get the ability to safeguard her decision making process and disrupt the adversary’s one.”</span></span></p><span data-dcnode-id="4921" instrument_node="">
</span><p data-dcnode-id="4918" style="text-align: justify;"><span data-dcnode-id="4919" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4920" instrument_node="">And anyone could be a target of these cognitive warfare operations: “Any user of modern information technologies is a potential target. It targets the whole of a nation’s human capital,” the report ominously added.</span></span></p><span data-dcnode-id="4917" instrument_node="">
</span><p data-dcnode-id="4914" style="text-align: justify;"><span data-dcnode-id="4915" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4916" instrument_node="">“As well as the potential execution of a cognitive war to complement to a military conflict, it can also be conducted alone, without any link to an engagement of the armed forces,” the study went on. “Moreover, cognitive warfare is potentially endless since there can be no peace treaty or surrender for this type of conflict.”</span></span></p><span data-dcnode-id="4913" instrument_node="">
</span><p data-dcnode-id="4910" style="text-align: justify;"><span data-dcnode-id="4911" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4912" instrument_node="">Just as this new mode of battle has no geographic borders, it also has no time limit: “This battlefield is global via the internet. With no beginning and no end, this conquest knows no respite, punctuated by notifications from our smartphones, anywhere, 24 hours a day, 7 days a week.”</span></span></p><span data-dcnode-id="4909" instrument_node="">
</span><p data-dcnode-id="4906" style="text-align: justify;"><span data-dcnode-id="4907" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4908" instrument_node="">The NATO-sponsored study noted that “some NATO Nations have already acknowledged that neuroscientific techniques and technologies have high potential for operational use in a variety of security, defense and intelligence enterprises.”</span></span></p><span data-dcnode-id="4905" instrument_node="">
</span><p data-dcnode-id="4902" style="text-align: justify;"><span data-dcnode-id="4903" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4904" instrument_node="">It spoke of breakthroughs in “neuroscientific methods and technologies” (neuroS/T), and said&nbsp;“uses of research findings and products to directly facilitate the performance of combatants, the integration of human machine interfaces to optimise combat capabilities of semi autonomous vehicles (e.g., drones), and development of biological and chemical weapons (i.e., neuroweapons).”</span></span></p><span data-dcnode-id="4901" instrument_node="">
</span><p data-dcnode-id="4898" style="text-align: justify;"><span data-dcnode-id="4899" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4900" instrument_node="">The Pentagon is among the primary institutions advancing this novel research, as the report highlighted:</span></span></p><span data-dcnode-id="4897" instrument_node="">
</span><blockquote data-dcnode-id="4891"><span data-dcnode-id="4896" instrument_node="">
</span><p data-dcnode-id="4893" style="text-align: justify;"><span data-dcnode-id="4894" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4895" instrument_node="">“Although a number of nations have pursued, and are currently pursuing neuroscientific research and development for military purposes, perhaps the most proactive efforts in this regard have been conducted by the United States Department of Defense; with most notable and rapidly maturing research and development conducted by the Defense Advanced Research Projects Agency (DARPA) and Intelligence Advanced Research Projects Activity (IARPA).”</span></span></p><span data-dcnode-id="4892" instrument_node="">
</span></blockquote><span data-dcnode-id="4890" instrument_node="">
</span><p data-dcnode-id="4887" style="text-align: justify;"><span data-dcnode-id="4888" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4889" instrument_node="">Military uses of neuroS/T research, the study indicated, include intelligence gathering, training, “optimising performance and resilience in combat and military support personnel,” and of course “direct weaponisation of neuroscience and neurotechnology.”</span></span></p><span data-dcnode-id="4886" instrument_node="">
</span><p data-dcnode-id="4883" style="text-align: justify;"><span data-dcnode-id="4884" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4885" instrument_node="">This weaponization of neuroS/T can and will be fatal, the NATO-sponsored study was clear to point out. The research can “be utilised to mitigate aggression and foster cognitions and emotions of affiliation or passivity; induce morbidity, disability or suffering; and ‘neutralise’ potential opponents or incur mortality” — in other words, to maim and kill people.</span></span></p><span data-dcnode-id="4882" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="4875" id="attachment_69623" style="width: 1072px"><img alt="" aria-describedby="caption-attachment-69623" class="wp-image-69623" data-dcnode-id="4881" height="588" loading="lazy" sizes="(max-width: 1062px) 100vw, 1062px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1.png&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1.png 1365w, https://consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1-500x277.png 500w, https://consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1-1000x554.png 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1-768x425.png 768w, https://consortiumnews.com/wp-content/uploads/2021/10/Screen-Shot-2021-10-12-at-6.22.10-PM-1-160x89.png 160w" width="1062"><p class="wp-caption-text" data-dcnode-id="4876" id="caption-attachment-69623"><span data-dcnode-id="4877" style="font-family: georgia, palatino, serif; font-size: 12pt;"><span data-dcnode-id="4880" instrument_node="">Retired General Robert Scales in 2011. </span><span data-dcnode-id="4878" style="font-size: 10pt;"><span data-dcnode-id="4879" instrument_node="">(C-Span)</span></span></span></p></div><span data-dcnode-id="4874" instrument_node="">
</span><p data-dcnode-id="4871" style="text-align: justify;"><span data-dcnode-id="4872" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4873" instrument_node="">The report quoted U.S. Major General Robert H. Scales, who summarized NATO’s new combat philosophy: “Victory will be defined more in terms of capturing the psycho-cultural rather than the geographical high ground.”</span></span></p><span data-dcnode-id="4870" instrument_node="">
</span><p data-dcnode-id="4867" style="text-align: justify;"><span data-dcnode-id="4868" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4869" instrument_node="">And as NATO develops tactics of cognitive warfare to “capture the psycho-cultural,” it is also increasingly weaponizing various scientific fields.</span></span></p><span data-dcnode-id="4866" instrument_node="">
</span><p data-dcnode-id="4863" style="text-align: justify;"><span data-dcnode-id="4864" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4865" instrument_node="">The study spoke of “the crucible of data sciences and human sciences,” and stressed that “the combination of Social Sciences and System Engineering will be key in helping military analysts to improve the production of intelligence.”</span></span></p><span data-dcnode-id="4862" instrument_node="">
</span><p data-dcnode-id="4859" style="text-align: justify;"><span data-dcnode-id="4860" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4861" instrument_node="">“If kinetic power cannot defeat the enemy,” it said, “psychology and related behavioural and social sciences stand to fill the void.”</span></span></p><span data-dcnode-id="4858" instrument_node="">
</span><p data-dcnode-id="4855" style="text-align: justify;"><span data-dcnode-id="4856" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4857" instrument_node="">“Leveraging social sciences will be central to the development of the Human Domain Plan of Operations,” the report went on. “It will support the combat operations by providing potential courses of action for the whole surrounding Human Environment including enemy forces, but also determining key human elements such as the Cognitive center of gravity, the desired behaviour as the end state.”</span></span></p><span data-dcnode-id="4854" instrument_node="">
</span><p data-dcnode-id="4851" style="text-align: justify;"><span data-dcnode-id="4852" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4853" instrument_node="">All academic disciplines will be implicated in cognitive warfare, not just the hard sciences. “Within the military, expertise on anthropology, ethnography, history, psychology among other areas will be more than ever required to cooperate with the military,” the NATO-sponsored study stated.</span></span></p><span data-dcnode-id="4850" instrument_node="">
</span><p data-dcnode-id="4847" style="text-align: justify;"><span data-dcnode-id="4848" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4849" instrument_node="">The report nears its conclusion with an eerie quote: “Today’s progresses in nanotechnology, biotechnology, information technology and cognitive science (NBIC), boosted by the seemingly unstoppable march of a triumphant troika made of Artificial Intelligence, Big Data and civilisational ‘digital addiction’ have created a much more ominous prospect: an embedded fifth column, where everyone, unbeknownst to him or her, is behaving according to the plans of one of our competitors.”</span></span></p><span data-dcnode-id="4846" instrument_node="">
</span><p data-dcnode-id="4843" style="text-align: justify;"><span data-dcnode-id="4844" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4845" instrument_node="">“The modern concept of war is not about weapons but about influence,” it posited. “Victory in the long run will remain solely dependent on the ability to influence, affect, change or impact the cognitive domain.”</span></span></p><span data-dcnode-id="4842" instrument_node="">
</span><p data-dcnode-id="4839" style="text-align: justify;"><span data-dcnode-id="4840" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4841" instrument_node="">The NATO-sponsored study then closed with a final paragraph that makes it clear beyond doubt that the Western military alliance’s ultimate goal is not only physical control of the planet, but also control over people’s minds:</span></span></p><span data-dcnode-id="4838" instrument_node="">
</span><blockquote data-dcnode-id="4832"><span data-dcnode-id="4837" instrument_node="">
</span><p data-dcnode-id="4834" style="text-align: justify;"><span data-dcnode-id="4835" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4836" instrument_node="">“Cognitive warfare may well be the missing element that allows the transition from military victory on the battlefield to lasting political success. The human domain might well be the decisive domain, wherein multi-domain operations achieve the commander’s effect. The five first domains can give tactical and operational victories; only the human domain can achieve the final and full victory.”</span></span></p><span data-dcnode-id="4833" instrument_node="">
</span></blockquote><span data-dcnode-id="4831" instrument_node="">
</span><h3 data-dcnode-id="4827" style="text-align: justify;"><strong data-dcnode-id="4828"><span data-dcnode-id="4829" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4830" instrument_node="">Canadian Special Ops Officer</span></span></strong></h3><span data-dcnode-id="4826" instrument_node="">
</span><p data-dcnode-id="4822" style="text-align: justify;"><span data-dcnode-id="4823" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><img alt="" class="aligncenter wp-image-69626" data-dcnode-id="4825" height="625" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Andy-Bonvie.jpg&amp;raw" width="1091"><span data-dcnode-id="4824" instrument_node="">When François du Cluzel, the NATO researcher who conducted the study on cognitive warfare, concluded his remarks in the Oct. 5 NATO Association of Canada panel, he was followed by Andy Bonvie, a commanding officer at the Canadian Special Operations Training Centre.</span></span></p><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4818" style="text-align: justify;"><span data-dcnode-id="4819" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4820" instrument_node="">With more than 30 years of experience with the Canadian Armed Forces, Bonvie spoke of how Western militaries are making use of research by du Cluzel and others, and incorporating novel cognitive warfare techniques into their combat activities.</span></span></p><span data-dcnode-id="4817" instrument_node="">
</span><p data-dcnode-id="4814" style="text-align: justify;"><span data-dcnode-id="4815" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4816" instrument_node="">“Cognitive warfare is a new type of hybrid warfare for us,” Bonvie said. “And it means that we need to look at the traditional thresholds of conflict and how the things that are being done are really below those thresholds of conflict, cognitive attacks, and non-kinetic forms and non-combative threats to us. We need to understand these attacks better and adjust their actions and our training accordingly to be able to operate in these different environments.”</span></span></p><span data-dcnode-id="4813" instrument_node="">
</span><p data-dcnode-id="4810" style="text-align: justify;"><span data-dcnode-id="4811" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4812" instrument_node="">Although he portrayed NATO’s actions as “defensive,” claiming “adversaries” were using cognitive warfare against them, Bonvie was unambiguous about the fact that Western militaries are developing these techniques themselves, to maintain a “tactical advantage.”</span></span></p><span data-dcnode-id="4809" instrument_node="">
</span><p data-dcnode-id="4806" style="text-align: justify;"><span data-dcnode-id="4807" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4808" instrument_node="">“We cannot lose the tactical advantage for our troops that we’re placing forward as it spans not only tactically, but strategically,” he said. “Some of those different capabilities that we have that we enjoy all of a sudden could be pivoted to be used against us. So we have to better understand how quickly our adversaries adapt to things, and then be able to predict where they’re going in the future, to help us be and maintain the tactical advantage for our troops moving forward.”</span></span></p><span data-dcnode-id="4805" instrument_node="">
</span><h3 data-dcnode-id="4801" style="text-align: justify;"><strong data-dcnode-id="4802"><span data-dcnode-id="4803" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4804" instrument_node="">‘Most Advanced Form of Manipulation’</span></span></strong></h3><span data-dcnode-id="4800" instrument_node="">
</span><p data-dcnode-id="4797" style="text-align: justify;"><span data-dcnode-id="4798" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4799" instrument_node="">Marie-Pierre Raymond, a retired Canadian lieutenant colonel who currently serves as a “defence scientist and innovation portfolio manager” for the Canadian Armed Forces’ Innovation for Defence Excellence and Security Program, also joined the Oct. 5 panel.</span></span></p><span data-dcnode-id="4796" instrument_node="">
</span><p data-dcnode-id="4793" style="text-align: justify;"><span data-dcnode-id="4794" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4795" instrument_node="">“Long gone are the days when war was fought to acquire more land,” Raymond said. “Now the new objective is to change the adversaries’ ideologies, which makes the brain the center of gravity of the human. And it makes the human the contested domain, and the mind becomes the battlefield.”</span></span></p><span data-dcnode-id="4792" instrument_node="">
</span><p data-dcnode-id="4789" style="text-align: justify;"><span data-dcnode-id="4790" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4791" instrument_node="">“When we speak about hybrid threats, cognitive warfare is the most advanced form of manipulation seen to date,” she added, noting that it aims to influence individuals’ decision-making and “to influence a group of a group of individuals on their behavior, with the aim of gaining a tactical or strategic advantage.”</span></span></p><span data-dcnode-id="4788" instrument_node="">
</span><p data-dcnode-id="4785" style="text-align: justify;"><span data-dcnode-id="4786" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4787" instrument_node="">Raymond noted that cognitive warfare also heavily overlaps with&nbsp;artificial intelligence, big data, and social media, and reflects “the rapid evolution of neurosciences as a tool of war.”</span></span></p><span data-dcnode-id="4784" instrument_node="">
</span><p data-dcnode-id="4781" style="text-align: justify;"><span data-dcnode-id="4782" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4783" instrument_node="">Raymond is helping to oversee the NATO Fall 2021 Innovation Challenge on behalf of Canada’s Department of National Defence, which delegated management responsibilities to the military’s Innovation for Defence Excellence and Security (IDEaS) Program, where she works.</span></span></p><span data-dcnode-id="4780" instrument_node="">
</span><p data-dcnode-id="4777" style="text-align: justify;"><span data-dcnode-id="4778" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4779" instrument_node="">In highly technical jargon, Raymond indicated that the cognitive warfare program is not solely defensive, but also offensive: “This challenge is calling for a solution that will support NATO’s nascent human domain and jump-start the development of a cognition ecosystem within the alliance, and that will support the development of new applications, new systems, new tools and concepts leading to concrete action in the cognitive domain.”</span></span></p><span data-dcnode-id="4776" instrument_node="">
</span><p data-dcnode-id="4773" style="text-align: justify;"><span data-dcnode-id="4774" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4775" instrument_node="">She emphasized that this “will require sustained cooperation between allies, innovators, and researchers to enable our troops to fight and win in the cognitive domain. This is what we are hoping to emerge from this call to innovators and researchers.”</span></span></p><span data-dcnode-id="4772" instrument_node="">
</span><p data-dcnode-id="4769" style="text-align: justify;"><span data-dcnode-id="4770" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4771" instrument_node="">To inspire corporate interest in the NATO Innovation Challenge, Raymond enticed, “Applicants will receive national and international exposure and cash prizes for the best solution.” She then added tantalizingly, “This could also benefit the applicants by potentially providing them access to a market of 30 nations.”</span></span></p><span data-dcnode-id="4768" instrument_node="">
</span><h3 data-dcnode-id="4764" style="text-align: justify;"><strong data-dcnode-id="4765"><span data-dcnode-id="4766" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4767" instrument_node="">Call for Investment &nbsp;</span></span></strong></h3><span data-dcnode-id="4763" instrument_node="">
</span><p data-dcnode-id="4759" style="text-align: justify;"><span data-dcnode-id="4760" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><img alt="" class="aligncenter size-full wp-image-69627" data-dcnode-id="4762" height="675" loading="lazy" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi.png&amp;raw" srcset="https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi.png 1200w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi-500x281.png 500w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi-1000x563.png 1000w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi-768x432.png 768w, https://consortiumnews.com/wp-content/uploads/2021/10/NATO-cognitive-warfare-Shekhar-Gothi-160x90.png 160w" width="1200"><span data-dcnode-id="4761" instrument_node="">The other institution that is managing the Fall 2021 NATO Innovation Challenge on behalf of Canada’s Department of National Defense is the Special Operations Forces Command (CANSOFCOM).</span></span></p><span data-dcnode-id="4758" instrument_node="">
</span><p data-dcnode-id="4755" style="text-align: justify;"><span data-dcnode-id="4756" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4757" instrument_node="">A Canadian military officer who works with CANSOFCOM, Shekhar Gothi, was the final panelist in the Oct. 5 NATO Association of Canada event. Gothi serves as CANSOFCOM’s “innovation officer” for Southern Ontario.</span></span></p><span data-dcnode-id="4754" instrument_node="">
</span><p data-dcnode-id="4751" style="text-align: justify;"><span data-dcnode-id="4752" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4753" instrument_node="">He concluded the event appealing for corporate investment in NATO’s cognitive warfare research.</span></span></p><span data-dcnode-id="4750" instrument_node="">
</span><p data-dcnode-id="4747" style="text-align: justify;"><span data-dcnode-id="4748" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4749" instrument_node="">The bi-annual Innovation Challenge is “part of the NATO battle rhythm,” Gothi declared enthusiastically.</span></span></p><span data-dcnode-id="4746" instrument_node="">
</span><p data-dcnode-id="4740" style="text-align: justify;"><span data-dcnode-id="4741" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4745" instrument_node="">He noted that, in the spring of 2021,&nbsp;</span><a data-dcnode-id="4743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/articles/share-my-space-wins-nato-challenge-spring-2021" style="color: #000000;"><span data-dcnode-id="4744" instrument_node="">Portugal held a NATO Innovation Challenge</span></a><span data-dcnode-id="4742" instrument_node="">&nbsp;focused on warfare in outer space.</span></span></p><span data-dcnode-id="4739" instrument_node="">
</span><p data-dcnode-id="4733" style="text-align: justify;"><span data-dcnode-id="4734" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4738" instrument_node="">In spring 2020, the&nbsp;</span><a data-dcnode-id="4736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/news_175199.htm" style="color: #000000;"><span data-dcnode-id="4737" instrument_node="">Netherlands hosted a NATO Innovation Challenge</span></a><span data-dcnode-id="4735" instrument_node=""> focused on Covid-19.</span></span></p><span data-dcnode-id="4732" instrument_node="">
</span><p data-dcnode-id="4729" style="text-align: justify;"><span data-dcnode-id="4730" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4731" instrument_node="">Gothi reassured corporate investors that NATO will bend over backward to defend their bottom lines: “I can assure everyone that the NATO innovation challenge indicates that all innovators will maintain complete control of their intellectual property. So NATO won’t take control of that. Neither will Canada. Innovators will maintain their control over their IP.”</span></span></p><span data-dcnode-id="4728" instrument_node="">
</span><p data-dcnode-id="4725" style="text-align: justify;"><span data-dcnode-id="4726" style="font-family: georgia, palatino, serif; font-size: 14pt; color: #000000;"><span data-dcnode-id="4727" instrument_node="">The comment was a fitting conclusion to the panel, affirming that NATO and its allies in the military-industrial complex not only seek to dominate the world and the humans that inhabit it with unsettling cognitive warfare techniques, but to also ensure that corporations and their shareholders continue to profit from these imperial endeavors.</span></span></p><span data-dcnode-id="4724" instrument_node="">

</span><img alt="" class="avatar avatar-60 photo" data-dcnode-id="4422" height="60" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5eb0d9447a6376ab73f0c537e8da31e3%3Fs%3D60%26d%3Didenticon%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/5eb0d9447a6376ab73f0c537e8da31e3?s=120&amp;d=identicon&amp;r=pg 2x" width="60"><span data-dcnode-id="4421" instrument_node=""> </span></div><span data-dcnode-id="4419" instrument_node="">

</span><div class="comment-text" data-dcnode-id="4365"><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Da Rehearsal is now Over. </span></p><span data-dcnode-id="4408" instrument_node="">
</span><p data-dcnode-id="4406"><span data-dcnode-id="4407" instrument_node="">A return to sanity? Sanity will not be restored for us by others. We are the ones that must restore it. We cannot wait for others to be brave on our behalf. We are here in this initiatory moment to choose who we are. The choice of whether to capitulate or to act is a declaration: Who am I to be? What is the world to be? Am I serious enough about my vision for the world to risk my security for it? That is not a challenge meant to goad myself into action. It is simply true. Through my choice, I will know myself as I am. I will become as I choose. The rehearsal is over.</span></p><span data-dcnode-id="4405" instrument_node="">
</span><p data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">* * *</span></p><span data-dcnode-id="4402" instrument_node="">
</span><p data-dcnode-id="4400"><span data-dcnode-id="4401" instrument_node="">Many people trust the authorities and willingly comply with their rules. They face no dilemma, no initiatory moment, no self-defining world-creating choice point, not yet.</span></p><span data-dcnode-id="4399" instrument_node="">
</span><p data-dcnode-id="4397"><span data-dcnode-id="4398" instrument_node="">But as the authorities’ narratives devolve into absurdity and their rules devolve into oppression, more and more of us face this choice:</span></p><span data-dcnode-id="4396" instrument_node="">
</span><p data-dcnode-id="4388"><span data-dcnode-id="4395" instrument_node="">To live your truth out loud, or</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">
To live by a lie, consoling yourself with secret protest.</span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">
To do what you know is right, or</span><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">
To cave in to the pressure, consoling yourself with words you don’t believe. “I had no choice.”</span></p><span data-dcnode-id="4387" instrument_node="">
</span><p data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Yes, for many of us it has come to such a choice. The rehearsal is over.</span></p><span data-dcnode-id="4384" instrument_node="">
</span><p data-dcnode-id="4382"><span data-dcnode-id="4383" instrument_node="">* * *</span></p><span data-dcnode-id="4381" instrument_node="">
</span><p data-dcnode-id="4379"><span data-dcnode-id="4380" instrument_node="">Maybe, I think, maybe now is not the time to be brave. Maybe now is not the time to speak out. I’ll wait until it is a little safer.</span></p><span data-dcnode-id="4378" instrument_node="">
</span><p data-dcnode-id="4376"><span data-dcnode-id="4377" instrument_node="">But it will never be safe to be brave. Never.</span></p><span data-dcnode-id="4375" instrument_node="">
</span><p data-dcnode-id="4373"><span data-dcnode-id="4374" instrument_node="">If not now, when? If not I, who?</span></p><span data-dcnode-id="4372" instrument_node="">
</span><p data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Shall I wait for others to do what I dare not do? We are ready. we’ve been preparing and being prepared for a long time. The rehearsal is over.</span></p><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node="">Perhaps u r NATO???</span></p><span data-dcnode-id="4366" instrument_node="">

</span><p data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">The assurances given corporations for their “intellectual property rights” speaks volumes to your point about yet another source to fill the coffers of the diabolical.  The fundamental flaw in their logic is how many people are more unplugged than they imagine.  Short of surgery to implant nano technology or irradiating our brains directly or wiping us literally off the face of the planet, much of their technology relies on us being glued to our screens and the sources they want us to connect with.  Granted, no small number give them just what they wish in this regard, but much of the world’s population is much less connected than we western fools are who can’t live without it.  </span></p><span data-dcnode-id="4142" instrument_node="">
