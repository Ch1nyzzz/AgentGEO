</span><h2 class="page-title" data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Federated Interoperability</span></h2><span data-dcnode-id="1002" instrument_node="">
</span></div></div></div><span data-dcnode-id="998" instrument_node="">
</span><div class="container" data-dcnode-id="972"><div class="row" data-dcnode-id="973"><div class="col-sm-12" data-dcnode-id="974"><span data-dcnode-id="997" instrument_node=""> </span><p data-dcnode-id="988"><picture data-dcnode-id="990"><source data-dcnode-id="995" media="(min-width: 900px)" srcset="https://www.act.nato.int/application/files/2816/2014/3805/Interoperability_logo.png"><source data-dcnode-id="994" media="(min-width: 768px)" srcset="https://www.act.nato.int/application/files/2816/2014/3805/Interoperability_logo.png"><source data-dcnode-id="993" srcset="https://www.act.nato.int/application/files/2816/2014/3805/Interoperability_logo.png"><img alt="Interoperability_logo.png" data-dcnode-id="991" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/2816/2014/3805/Interoperability_logo.png&amp;raw" style="margin-right: 10px; float: left;"></picture><span data-dcnode-id="989" instrument_node="">How much do you know about interoperability and the meaning of federated interoperability? Did you know that NATO has one of the best definitions of interoperability around?</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="984" style="text-align: center;"><em data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">“The ability to act together coherently, effectively and efficiently to achieve Allied objectives”</span></em></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">This sums what we do as an Alliance and is a cornerstone of our work in ACT. We see federated interoperability as a collective effort shared between Alliance and Partner Nations and other organizations. For those involved in Federated Mission Networking (or “FMN”) you know that, through FMN, we are on a path toward ‘day zero’ interoperability. This means that in the long-term, Alliance nations and partners, will ‘hard-wire’ interoperability into their capabilities ready for the very first day of a NATO mission.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">The ‘Interoperability Continuum’ enables federated interoperability by linking three major HQ SACT interoperability events; the Coalition Warrior Interoperability Exercise (CWIX), The Think-Tank for Information Decision and Execution (TIDE) Sprint, and the TIDE Hackathon. Its purpose is to ensure that our command and control capabilities can exchange operational information in the right format, to the right person at the right time so that NATO commanders and decision makers have the situational awareness needed to make good decisions, quickly! This is what our three Interoperability Continuum events do:</span></p><span data-dcnode-id="977" instrument_node="">
</span><hr data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">
</span></div></div></div><span data-dcnode-id="971" instrument_node="">
</span><div class="container" data-dcnode-id="441"><div class="row" data-dcnode-id="442"><div class="col-sm-12" data-dcnode-id="443"><span data-dcnode-id="970" instrument_node=""> </span><div class="row" data-dcnode-id="445"><div class="col-sm-8" data-dcnode-id="963"><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="965"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">CWIX</span></strong><span data-dcnode-id="966" instrument_node=""> – is the biggest interoperability event of its kind in NATO. It is where Alliance and partner nations make sure that their command and control capabilities de-risk interoperability as an essential first-step toward NATO missions such as the NRF or VJTF. At the same time, CWIX is a testbed for interoperability specifications that are hard-wired into experimental and near-fielded capabilities, ready for future NATO missions.</span></p><span data-dcnode-id="964" instrument_node="">
</span></div><div class="col-sm-4" data-dcnode-id="446"><span data-dcnode-id="962" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Coalition Warrior Interoperability Exercise - CWIX</span></h2><span data-dcnode-id="433" instrument_node=""> </span></div><span data-dcnode-id="431" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="376"><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="424"><a class="popoverimg" data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/824" rel="noopener noreferrer" target="_blank" title="CWIX Logo" type="image/jpeg"><img alt="cwix-logo.png" data-dcnode-id="429" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/824&amp;raw" style="float: left; margin-right: 10px; width: 263px; height: 261px;"></a><strong data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">CWIX - Achieving Federated Interoperability now!</span></strong><span data-dcnode-id="425" instrument_node="">
</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="419"><em data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Federated interoperability is a key part of every capability and has a force multiplying effect in terms of operational effectiveness and cost efficiency.</span></em><span data-dcnode-id="420" instrument_node="">
</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="417" instrument_node="">CWIX is NATO's premier interoperability event, operationally driven and technically supported, that meets a broad spectrum of </span><strong data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">interoperability validation and verification requirements</span></strong><span data-dcnode-id="414" instrument_node="">. The Command &amp; Control (C2) capabilities present at CWIX span the complete Communications and Information Systems (CIS) spectrum and represent the current, near-term, future and experimental capabilities of NATO and its Partner Nations. CWIX puts an emphasis on systems that will </span><strong data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">deploy with NATO-led operations</span></strong><span data-dcnode-id="411" instrument_node="">, particularly those related to Federated Mission Networking (FMN) as a major component of the enhanced NATO Response Force (eNRF), Very High Readiness Joint Task Force (VJTF), and Initial Follow on Forces Group (IFFG) roadmap to </span><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">support military readiness</span></strong><span data-dcnode-id="408" instrument_node="">.
</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">At the highest levels, NATO recognises that interoperability enhances information sharing between NATO and partner nations and that interoperability is the key enabler that improves situational awareness, so we can make better decisions faster. Not only does this increase the likelihood of success, but it also serves the men and women of our militaries by reducing operational risk and keeping them safe.
</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">CWIX allows nations to experiment, test and de-risk their deployable systems before undertaking missions such as the NATO Response Force. It allows commanders to 'fine-tune' their Command and Control capabilities before achieving combat readiness at the Steadfast Cobalt and Trident Juncture exercises. Nations also test interoperability between mobile tactical radios in preparation for the Very High Readiness Task Force, they test and improve cyber awareness and confirm 'day zero' readiness of deployable Command and Control capabilities.
</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">CWIX addresses a wide spectrum of technical and procedural interoperability between currently deployed, near-term, future and experimental capabilities. Interoperability testing before and during development reduces deployment times and cost, minimizes system failure in NATO missions and allows nations to design interoperability into their systems. At the same time, CWIX fosters innovation by identifying and solving interoperability shortfalls, experimenting with alternative approaches, and exploring emerging technologies. Altogether, CWIX helps maintain the military advantage of NATO and national troops in an increasingly complex and uncertain global security environment.
</span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="396" instrument_node="">CWIX culminates in an annual execution event, primarily at the Joint Force Training Centre (JFTC) in Bydgoszcz, Poland but with participants also testing from national locations across the classified Combined Federated Battle-Lab (CFBL) Network and purpose-built unclassified networks. CWIX provides NATO, member and partner nations and other organizations with a controlled environment to </span><strong data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">test, identify and fix</span></strong><span data-dcnode-id="393" instrument_node=""> their interoperability issues </span><strong data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">to continuously improve NATO interoperability and resilience in future crisis</span></strong><span data-dcnode-id="390" instrument_node="">.
</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="387" instrument_node="">For further information about CWIX, please contact the CWIX Management Team: </span><strong data-dcnode-id="382"><a data-dcnode-id="384" href="mailto:sactcwix@act.nato.int"><span data-dcnode-id="386" instrument_node="">sactcwix@act.nato.int</span><br data-dcnode-id="385"></a><br data-dcnode-id="383"></strong><span data-dcnode-id="381" instrument_node="">
</span></p><span data-dcnode-id="379" instrument_node="">
</span><span data-dcnode-id="377" instrument_node=""> </span></div><span data-dcnode-id="375" instrument_node="">
</span></div><span data-dcnode-id="373" instrument_node="">
</span></div><span data-dcnode-id="371" instrument_node="">
</span></div></div></div><span data-dcnode-id="367" instrument_node="">
</span><div class="container" data-dcnode-id="347"><div class="row" data-dcnode-id="348"><div class="col-sm-12" data-dcnode-id="349"><span data-dcnode-id="366" instrument_node=""> </span><hr data-dcnode-id="365"><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="360"><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">TIDE Sprint</span></strong><span data-dcnode-id="361" instrument_node=""> – brings together operators, engineers, scientists and managers from governments, military, academia and industry to collaborate and contribute to future concepts, requirements and interoperability specifications. TIDE Sprint allows NATO’s communities of interest to jump-start new ideas and connect with experts to accelerate the development of interoperable capabilities.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="351" style="text-align: center;"><mark data-dcnode-id="353"><span data-dcnode-id="358" instrument_node="">The Spring TIDE Sprint Registration link is open and will allow you to register as either an in-person, or online participant.</span><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node="">
The registration link and calling notice are available on </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tide.act.nato.int/mediawiki/tidepedia/index.php/TIDE_Sprint_39" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="355" instrument_node="">Tidepedia</span></a></mark><span data-dcnode-id="352" instrument_node="">.</span></p><span data-dcnode-id="350" instrument_node="">
</span></div></div></div><span data-dcnode-id="346" instrument_node="">
</span><div class="container" data-dcnode-id="265"><div class="row" data-dcnode-id="266"><div class="col-sm-12" data-dcnode-id="267"><span data-dcnode-id="345" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="269" id="vivid-simple-accordion-6653"><span data-dcnode-id="344" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="271"><span data-dcnode-id="343" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="338"><span data-dcnode-id="342" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">TIDE Sprint</span></h2><span data-dcnode-id="339" instrument_node=""> </span></div><span data-dcnode-id="337" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="273"><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334" style="text-align: center;"><img alt="tide sprint generic banner" data-dcnode-id="335" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/events/2017/tide/tide-sprint-generic-banner.jpg&amp;raw" width="926"></p><p data-dcnode-id="331"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">NATO defines interoperability as “The ability to act together coherently, effectively and efficiently to achieve Allied objectives”. It is the foundation of all NATO operations and a cornerstone of the Alliance.</span></strong></p><p data-dcnode-id="329"><img alt="tide-sprint-generic-banner.jpg" data-dcnode-id="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/286&amp;raw" style="margin-right: 15px; width: 160px; height: 133px; float: left;"></p><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">The ‘Think-Tank for Information Decision and Execution’ (TIDE) Sprint is a bi-annual event that drives capability development to advance federated interoperability between NATO and Partner Nations' Command &amp; Control capabilities and IT services.</span></p><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">As a critical event in Allied Command Transformation’s Interoperability Continuum, which also includes the TIDE Hackathon and the Coalition Warrior Interoperability Exercise (CWIX), TIDE Sprint is a week of collaboration, ideation, and innovation to generate ideas, develop concepts and specifications and support programs of work.</span></p><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Each TIDE Sprint event provides a range of functional ‘tracks,’ led by experienced Subject Matter Experts and supported by a NATO community of interest.</span></p><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Operators, engineers, scientists and technicians from nations’ governments, military, academia and industry come together to advance in one week what would otherwise take many months to achieve. The outcomes and recommendations from TIDE Sprint events shape NATO capability development efforts and programmes of work.</span></p><p data-dcnode-id="315"><span data-dcnode-id="320" instrument_node="">TIDE Sprint events are open to NATO, partner nations and Non-NATO entities (NNEs). They take place in an unclassified environment and all sessions are conducted in English. Additional information on event administration, registration, past presentations and reports is available on the password protected </span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tide.act.nato.int/mediawiki/tidepedia/index.php/TIDE_Sprints" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">TIDEPEDIA</span></strong></a><span data-dcnode-id="316" instrument_node=""> website.</span></p><p data-dcnode-id="309"><span data-dcnode-id="314" instrument_node="">For access to Tidepedia, please email </span><strong data-dcnode-id="311"><a data-dcnode-id="312" href="mailto:tide@act.nato.int"><span data-dcnode-id="313" instrument_node="">tide@act.nato.int</span></a></strong><span data-dcnode-id="310" instrument_node="">, and include your first and last name, email address and the government or military organisation you represent. Industry and academia are encouraged to participate but require sponsorship from NATO, or from a national government or military representative.</span></p><p data-dcnode-id="306" style="text-align: center;"><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Spring 2022 TIDE Sprint</span></strong></p><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">The Spring 2022 edition of TIDE Sprint is set for 4-8 April 2022 in Sopot, Poland. Following the COVID pandemic and the disruption of the past two years, we now face a new crisis on NATO’s Eastern Border that, more than ever, requires an Alliance that is responsive, resilient, and ready to confront all security challenges of today and tomorrow. At TIDE Sprint, we look toward the future to ensure that as we develop command and control capabilities they remain interoperable and able to exchange the right information at the right time to the right commanders and decision makers. By aligning our communities of interest at TIDE Sprint, we maintain our ability to operate within the Alliance and with a network of partners, and ultimately strengthen the Alliance.</span></p><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">No matter what your interest, if you are an operator, scientist or engineer with ideas to share, systems to demonstrate, or experience to contribute – we have a track for you. At this TIDE Sprint we are very excited to introduce a Science and Technology Track track, led by NATO’s Science and Technology Organization (STO) in partnership with ACT’s own Innovation Branch. The S&amp;T Track will explore a range of technologies from Quantum, to Artificial Intelligence all the way out to Space systems. Participants will explore how NATO can exploit these technologies in a way that supports the Alliance and maintains our technological edge.</span></p><p data-dcnode-id="298"><span data-dcnode-id="301" instrument_node="">Other highlights include the Operational Command and Control (OC2) track, which will look at Multi Domain Operations (MDO) and the impact of the Space Domain and the Cyber Domain on how we should be conducting joint warfare in increasingly complex environments, and how NATO must develop its future capabilities to be interoperable in MDO. As always, a core theme of our work is interoperability and Federated Mission Networking (FMN) in particular. FMN allows us to be interoperable before the start of a mission, so that our forces can connect and act as one from the very first day of a NATO operation. If you need to know more about FMN and the steps you need to take to make your capabilities ‘FMN-ready’, this TIDE Sprint is for you.</span><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">The list of Spring 2022 TIDE Sprint tracks is below. Detailed agendas are in the final stages of development, so if you have something to contribute to a particular track, please contact the track lead:</span></p><ul data-dcnode-id="275"><li data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Communications</span></li><li data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Cyberspace</span></li><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Data Centric Security (DCS)</span></li><li data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Data Science &amp; Artificial Intelligence</span></li><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Enterprise Architecture</span></li><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Federated Mission Networking (FMN)</span></li><li data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Federated Service Management and Control</span></li><li data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Maritime Services</span></li><li data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Medical</span></li><li data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Operational Command and Control</span></li><li data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Science &amp; Technology</span></li></ul><span data-dcnode-id="274" instrument_node=""> </span></div><span data-dcnode-id="272" instrument_node="">
</span></div><span data-dcnode-id="270" instrument_node="">
</span></div><span data-dcnode-id="268" instrument_node="">
</span></div></div></div><span data-dcnode-id="264" instrument_node="">
</span><div class="container" data-dcnode-id="253"><div class="row" data-dcnode-id="254"><div class="col-sm-12" data-dcnode-id="255"><span data-dcnode-id="263" instrument_node=""> </span><hr data-dcnode-id="262"><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="257"><strong data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">TIDE Hackathon</span></strong><span data-dcnode-id="258" instrument_node=""> – is a ‘deep-dive’ into difficult interoperability problems to see if new or emerging technologies will provide the solution. We bring teams of enthusiastic IT and software experts into a competitive environment for a 1-week period of intense ‘hacking’. What they achieve over such a short time is surprising, with rapid demonstrations of novel technologies to help understand technology, identify future requirements, or even develop software solutions!</span></p><span data-dcnode-id="256" instrument_node="">
</span></div></div></div><span data-dcnode-id="252" instrument_node="">
</span><div class="container" data-dcnode-id="204"><div class="row" data-dcnode-id="205"><div class="col-sm-12" data-dcnode-id="206"><span data-dcnode-id="251" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="208" id="vivid-simple-accordion-6654"><span data-dcnode-id="250" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="210"><span data-dcnode-id="249" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="244"><span data-dcnode-id="248" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">TIDE Hackathon</span></h2><span data-dcnode-id="245" instrument_node=""> </span></div><span data-dcnode-id="243" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="212"><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="239" style="text-align: justify;"><img alt="hackathon-logo.png" data-dcnode-id="241" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/751&amp;raw" style="margin-left: 15px; margin-right: 15px; float: left; width: 200px; height: 200px;"><span data-dcnode-id="240" instrument_node="">In response to the dynamically changing geopolitical environment we face today, NATO conducts a process of continuous transformation guided by a high-level political agenda. Bringing effective change to such a large organization is, however, a complex endeavor. It involves many actors and typically a lengthy procurement process. This significantly hampers innovation, especially in the area of Information and Communications Technology where rapid, agile methods have proven to be much more effective.</span></p><p data-dcnode-id="234" style="text-align: justify;"><span data-dcnode-id="238" instrument_node="">Allied Command Transformation, as NATO’s Warfare Development Command, has developed the </span><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">TIDE Hackathon</span></strong><span data-dcnode-id="235" instrument_node=""> to innovate and to promote the idea of federating "Interoperability by Design" between the NATO Alliance, its Partner Nations and Non-NATO Entities. TIDE Hackathons address future needs by applying a proven hackathon format to engage diverse groups of experts in a competitive and highly intensive work environment, over a limited period to focus on specific challenges related to interoperability and to develop innovative solutions that provide a deeper understanding of the impact that emerging and disruptive technologies have on federated interoperability. TIDE Hackathons also provide an opportunity for small teams to demonstrate and improve their skill, and to learn more about the challenges facing NATO.</span></p><p data-dcnode-id="229" style="text-align: justify;"><span data-dcnode-id="233" instrument_node="">The TIDE Hackathon is embedded into Allied Command Transformation's </span><strong data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Interoperability Continuum</span></strong><span data-dcnode-id="230" instrument_node="">, a series of related and connected events (that include the bi-annual TIDE Spring and the annual CWIX Exercise), that allow the NATO Alliance, Partner Nations and other Organizations to continually develop and improve federated interoperability between deployable command and control capabilities. Teams consisting of 2 to 4 experts from NATO and partner nations' government, industry or academic organizations are welcome to apply. Teams are expected to work competitively, but in the spirit of collaboration.</span></p><p data-dcnode-id="224"><span data-dcnode-id="228" instrument_node="">The overarching theme of all TIDE Hackathons is to “</span><strong data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">demonstrate how EDTs can improve multi-domain interoperability between command and control systems within a federation</span></strong><span data-dcnode-id="225" instrument_node="">”. TIDE Hackathon Challenges are defined in late October (after the Fall TIDE Sprint), and we ask teams to register from November onwards. We will then work with them so they are fully prepared for the TIDE Hackathon competition in late February.</span></p><p data-dcnode-id="214"><span data-dcnode-id="223" instrument_node="">The TIDE Hackathon is open to NATO, partner nations and other organisations; events take place in an unclassified environment and all sessions are conducted in English. Additional information on the challenges, event administration, registration, past presentations and reports are available on the password protected </span><strong data-dcnode-id="220"><a data-dcnode-id="221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tide.act.nato.int/tidepedia/index.php/TIDE_Sprint_%2825-29_Mar_2019%29" target="_blank"><span data-dcnode-id="222" instrument_node="">TIDEPEDIA</span></a></strong><span data-dcnode-id="219" instrument_node=""> website. For access to Tidepedia, please send an email to </span><strong data-dcnode-id="216"><a data-dcnode-id="217" href="mailto:mailto:tide@act.nato.int"><span data-dcnode-id="218" instrument_node="">tide@act.nato.int</span></a></strong><span data-dcnode-id="215" instrument_node="">, including your first and last name, your telephone number, email address and the government or military organisation you represent. Industry and academia are encouraged to participate but require sponsorship from NATO, or from a national government or military representative.</span></p><span data-dcnode-id="213" instrument_node=""> </span></div><span data-dcnode-id="211" instrument_node="">
