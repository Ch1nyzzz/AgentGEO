</span><font data-dcnode-id="773" size="-1"><font data-dcnode-id="775" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="776" instrument_node="">In 1991, with the collapse of the Soviet Union, US-NATO foreign policy had to re-imagine its role in the world. The Cold War served as a means of justifying US imperialist expansion across the globe with the aim of "containing" the Soviet threat. NATO itself was created and existed for the sole purpose of forging an anti-Soviet alliance. With the USSR gone, NATO had no reason to exist, and the US had to find a new purpose for its imperialist strategy in the world. ... The wars in Yugoslavia throughout the 1990s served as a justification for the continued existence of NATO in the world, and to expand American imperial interests in Eastern Europe.</span></font><span data-dcnode-id="774" instrument_node="">
</span></font><p data-dcnode-id="768"><font data-dcnode-id="769" size="-1"><span data-dcnode-id="772" instrument_node="">—&nbsp;Andrew Gavin Marshall: </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.globalresearch.ca/index.php%3Fcontext%3Dva%26aid%3D15686"><span data-dcnode-id="771" instrument_node="">An Imperial Strategy for a New World Order: The Origins of World War III, Part 1</span></a></font></p><p data-dcnode-id="767"></p></blockquote><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">
</span></p><hr data-dcnode-id="763"><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">

"The pilot attacked what he believed to be military
vehicles," said Mr Shea (spokesman for NATO, as reported on 1999-04-15 by the BBC). "He dropped his bomb in good
faith, as you would expect of a trained pilot from a democratic country. ... The bomb destroyed the lead vehicle, which we now believe to have been a&nbsp;civilian vehicle."</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">
</span></p><hr data-dcnode-id="758" width="50%"><p data-dcnode-id="754"><span data-dcnode-id="757" instrument_node="">
</span><font color="#000000" data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">"NATO deeply regrets" the death of five people when missiles fell 600m short of their target and hit residences in the mining town of Aleksinac on April&nbsp;5.</span></font></p><p data-dcnode-id="750"><span data-dcnode-id="753" instrument_node="">
</span><font color="#000000" data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">"NATO deeply regrets" the death of at least ten people when NATO jets hit a Yugoslav passenger train travelling from Belgrade to Salonika on a bridge near Leskovac on April&nbsp;12.</span></font></p><p data-dcnode-id="746"><span data-dcnode-id="749" instrument_node="">
</span><font color="#000000" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">"NATO deeply regrets" the deaths of 80 people which occurred when NATO attacked two refugee columns in Western Kosovo on April&nbsp;14.</span></font></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">
</span></p><hr data-dcnode-id="743" width="50%"><p data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">

At the conclusion of the NATO bombing campaign (instigated, like the bombing of Afghanistan and the War on Iraq, by the United States and Britain, and planned and carried out by then </span><a data-dcnode-id="740" href="#wesley_clark"><span data-dcnode-id="741" instrument_node="">General Wesley Clark</span></a><span data-dcnode-id="739" instrument_node="">) several thousand Yugoslavs had been killed, about 1600 of them civilians.  Not a single NATO soldier died in action.  As with the Gulf "War", this was not a war but a campaign of destruction and murder carried out from a safe distance (and under the hypocritical pretence of conducting a "humanitarian war").  It&nbsp;was in fact a&nbsp;terrorist campaign directed against the Serb people and its political leadership.</span></p><p data-dcnode-id="730"><span data-dcnode-id="737" instrument_node="">

In this disgraceful action NATO displayed no honor, and its troops exhibited no bravery.  In the end it was a war to save NATO itself (since defeat would have been a fatal blow to its credibility). To the politicians of Britain and the United States of America who brought us to this point, to the politicians of the European countries who collaborated with them and to the American generals who directed this war, only </span><i data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">dishonor</span></i><span data-dcnode-id="734" instrument_node=""> and </span><i data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">disgrace</span></i><span data-dcnode-id="731" instrument_node=""> is due, and the blame for creating a humanitarian disaster which did not end with the bombing.</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
</span></p><hr data-dcnode-id="727"><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">
</span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mawitb.freeserve.co.uk/home.htm"><img align="right" alt="Stop NATO bombing of Yugoslavia" border="0" data-dcnode-id="725" height="285" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/apr11.jpg&amp;raw" width="180"></a><span data-dcnode-id="723" instrument_node="">

On March 24, 1999, NATO attacked the Republic of Serbia with bombers and cruise missiles.  The&nbsp;"war" (really more of a bombing campaign) marked the first time in over fifty years that European powers (as part of the U.S.-dominated NATO) attacked another European country.  The bombing and missile attacks initially occured nightly, then day-and-night, and went on for eleven weeks, causing major damage to Yugoslav society.  NATO deliberately bombed water and power supplies, hospitals and prisons, knowing full well that without electricity and water the people of Yugoslavia would suffer great hardship and some (such as people in hospitals with no power) would die.  This war was illegal under international law from the beginning.  Deliberate infliction of suffering upon civilians is a war crime, and the U.S. generals who planned and carried out this war (in particular, Gen. Wesley Clark) are war criminals.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">
</span></p><hr data-dcnode-id="719"><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">
How did this barbarity arise?  Traditional Serb-Albanian ethnic hostility was a factor, but it was the callousness and stupidity of American and British political leaders that allowed it to become what it did.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">

Serbs and Albanians had long lived together in harmony in Kosovo.  At the end of the 1980s Slobodan Milosevic felt the need to buttress his power by inducing in the Serb minority in Kosovo a fear of the Albanian majority.  The Albanians began to feel they were victims of injustice.  They organized themselves into paramilitary units, the KLA (or&nbsp;UCK) and attacked Serb police.  The Serbs, not known for their gentle ways, retaliated.  The hostilities escalated.  The Albanians had a brilliant idea: Provoke the Serbs to murder, play it up in the Western media, cry "Hitler!" and "Genocide" and — bingo! — the Western moralists become instant allies.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">

And so it went.  The Serb police ambushed a KLA operation which was smuggling arms over the border from Albania.  Next day Albanian terrorists entered a bar in Pec and sprayed the occupants with machine-gun fire, killing six Serb teenagers.  In the village of Recak the KLA killed four Serbs.  The Serb police attacked the village (from which the KLA had fled) and killed 15 Albanians.  Soon after, numerous Albanians were found shot dead in a ravine near the village.  The Western TV crews were on the scene surprisingly quickly.  William Walker, head of the Kosovo Verification Mission (OSCE), was invited to see the bodies, and without proof, declared in shocked tones that the Serbian police and army were responsible for this "massacre".  </span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">
The KLA initiated battles in civilian areas knowing that the Serbs would retaliate and civilians would be killed.  Incidents such as that at Recak gave the U.S. the green light to present itself as the defender of morality and to enter the conflict on the side of the KLA.  The KLA thugs rubbed their hands with glee.  Their plan was working.</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">
</span></p><hr data-dcnode-id="708" width="50%"><p data-dcnode-id="704"><span data-dcnode-id="707" instrument_node="">
</span><font color="#000000" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">"NATO deeply regrets" the deaths of at least ten people killed in the bombing of a Serbian television station in Belgrade on April&nbsp;23.</span></font></p><p data-dcnode-id="700"><span data-dcnode-id="703" instrument_node="">
</span><font color="#000000" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">"NATO deeply regrets" the deaths of twenty civilians which occurred when a laser-guided bomb lost its target lock over Surdulica on April&nbsp;27.</span></font></p><p data-dcnode-id="696"><span data-dcnode-id="699" instrument_node="">
</span><font color="#000000" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">"NATO deeply regrets" the deaths of thirty nine civilians killed when a NATO missile hit a bus crossing a bridge at Luzane on May&nbsp;1.</span></font></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">
</span></p><hr data-dcnode-id="693" width="50%"><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">
NATO's war seemed to some incredible.  It was the result either of cynical calculation or amazing stupidity.  It did make sense as part of a U.S. plan for military domination of Europe (and Russia) under the guise of NATO (at least for as long as the U.S. could maintain this fiction).  Was the U.S. aiming to acquire a military stronghold in the heart of Europe from which it could, if and when it deemed necessary, threaten any European or Middle Eastern nation with the devastation of Yugoslavia and of Iraq as examples to those not inclined to accept U.S. domination?  Appendix&nbsp;B of the so-called Rambouillet Accord can be seen as justifying this suspicion.</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">
</span></p><hr data-dcnode-id="688"><a data-dcnode-id="687" name="rambouillet_diktat"></a><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">
</span></p><h3 align="center" data-dcnode-id="681"><span data-dcnode-id="684" instrument_node="">The Rambouillet </span><i data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Diktat</span></i></h3><span data-dcnode-id="680" instrument_node="">

The Rambouillet "Accord" is entitled an "Agreement", but the term "Parties to the Agreement" means representatives of the Federal Republic of Yugoslavia, the Republic of Serbia and Kosovo.  All three such representatives are required to sign at the conclusion of the text of the "agreement" but </span><b data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">there is no place for a signature by a representative of NATO or of any Western country</span></b><span data-dcnode-id="677" instrument_node="">.  Thus </span><b data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">this is not an "agreement" but a statement of surrender</span></b><span data-dcnode-id="674" instrument_node=""> imposed upon Yugoslavia.  Had the Serbs signed this "agreement" they would effectively have handed control over all of Yugoslavia to NATO.  Is it any wonder that they didn't sign?  And because they quite rightly refused to sign away the sovereignty of their country, the Western powers began to try to bomb Serbia into submission.</span><p data-dcnode-id="668"><span data-dcnode-id="673" instrument_node="">

John Pilger: </span><font color="#0000FF" data-dcnode-id="670"><u data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Revealed: the amazing NATO plan,
tabled at Rambouillet, to occupy Yugoslavia</span></u></font><span data-dcnode-id="669" instrument_node=""> (link expired)</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">
</span></p><blockquote data-dcnode-id="662"><font data-dcnode-id="663" size="-1"><font data-dcnode-id="664" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="665" instrument_node="">Nothing like this ultimatum has been put to a modern,
sovereign European state. Of all the Hitler and Nazi analogies
that have peppered the west's propaganda, one is never
mentioned — Hitler's proposal in 1938 to the British prime
minister, Neville Chamberlain, that Germany occupy
Czechoslovakia because ethnic Germans there had been
"tortured", "forced to flee the country" and "prevented from
realising the right of nations to self-determination". As a
cover for German expansion, Hitler was laying the basis for a
"humanitarian intervention", whose fraudulence was no
greater than NATO's cover for its own worldwide expansion.</span></font></font></blockquote><span data-dcnode-id="661" instrument_node="">

The full text of the Rambouillet "Accord" is available at:</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">
</span></p><center data-dcnode-id="656"><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//peacemaker.un.org/kosovo-rambouilletagreement99"><span data-dcnode-id="658" instrument_node="">Interim Agreement for Peace and Self-Government In Kosovo</span></a></center><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">

Here is the full text of the infamous Appendix B:</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">
</span></p><center data-dcnode-id="649"><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/app_b.htm"><span data-dcnode-id="651" instrument_node="">Appendix B: Status of Multi-National Military Implementation Force</span></a></center><p data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">

It is interesting to note that the 3-part TV program </span><i data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">War in Europe</span></i><span data-dcnode-id="645" instrument_node=""> (by Eamon Matthews) has a lot of footage of Madeleine Albright and Tony Blair attempting to justify their waging of war upon Yugoslavia (a war which was illegal under international law), and of the gilded interior of the chateau at Rambouillet, but it makes no mention at all of Madeleine Albright's demand that Serbia surrender its sovereignty, as set out in Appendix B, allowing NATO to occupy all of Yugoslavia — a demand conveniently ignored in this program (which, although quite interesting, was basically propaganda on behalf of NATO).</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">
</span></p><center data-dcnode-id="639"><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//accuracy.org/release/173-despite-denials-from-nato-official-questions-emerging/"><span data-dcnode-id="641" instrument_node="">Did Allies Demand Right to Occupy All of Yugoslavia? </span></a></center><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">
</span></p><blockquote data-dcnode-id="630"><font data-dcnode-id="631" size="-1"><font data-dcnode-id="635" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="636" instrument_node="">Appendix B of the Rambouillet Accord — the United States/NATO "peace plan" for Kosovo — would have opened the door for NATO to occupy all of Yugoslavia. </span></font><span data-dcnode-id="634" instrument_node=""> — </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20010303110610/http%3A//www.workers.org/ww/1999/rambo20506.html"><span data-dcnode-id="633" instrument_node="">Rambouillet: Blueprint for Conquest</span></a></font></blockquote><p data-dcnode-id="625"><span data-dcnode-id="629" instrument_node="">

Had the Americans succeeded (via the Rambouillet </span><i data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Diktat</span></i><span data-dcnode-id="626" instrument_node="">) in gaining control of Kosovo you can be sure that a huge military build-up in its newly acquired territory would have occurred.  The Serbs, of course, knew this.</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">

Or if you can't imagine that the U.S. motive was basically military conquest then how about
capitalist exploitation of resources?</span></p><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">
</span></p><blockquote data-dcnode-id="607"><font data-dcnode-id="618" size="-1"><font data-dcnode-id="619" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="620" instrument_node="">Many key aspects of the accord have been given very little or no
    coverage in the corporate media.</span></font></font><p data-dcnode-id="609"><font data-dcnode-id="610" size="-1"><font data-dcnode-id="614" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="617" instrument_node="">

    Chapter 4a, Article I — "The economy of Kosovo, shall function
    in accordance with free market principles."</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
    Kosovo has vast mineral resources, including the richest mines for
    lead, molybdenum, mercury and other metals in all of Europe.
    The capital to exploit these resources, which are today mainly
    state-owned, would undoubtedly come from the U.S. and western
    European imperialists.</span></font><span data-dcnode-id="613" instrument_node=""> —&nbsp;</span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20000310024357/http%3A//iacenter.org/rambou.htm"><span data-dcnode-id="612" instrument_node="">The&nbsp;Rambouillet Accord: A&nbsp;Declaration of War Disguised as a Peace Agreement</span></a></font></p><p data-dcnode-id="608"></p></blockquote><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">

John Pilger: </span><a data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.recrea.org/rrf/johnp/rambouillet.htm"><span data-dcnode-id="605" instrument_node="">What really happened at Rambouillet?&nbsp; And what else is being kept under wraps by our selective media?</span></a><span data-dcnode-id="603" instrument_node="">
</span></p><blockquote data-dcnode-id="598"><font data-dcnode-id="599" size="-1"><font data-dcnode-id="600" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="601" instrument_node="">It seems to me that a vital wider question has yet to be
asked: is NATO really bombing Yugoslavia, or is the bombing
aimed at the emerging European superstate, which offers a
clear threat to the US as a new economic superpower? Who
will pay the huge inflationary bill for rebuilding what was
Yugoslavia? The EU is the answer. A crusade for "human
rights" can provide a new cloak for a project as old as
imperialism itself.</span></font></font></blockquote><span data-dcnode-id="597" instrument_node=""> </span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">

Madeleine Albright set the Serbs up.  Her plan was for the Albanians to sign the Accord (thus appearing to be "reasonable") but for the Serbs to refuse, thereby allowing her to demonize them and "justifying" American aggression (under the guise of NATO) against Serbia.  Madeleine knew that the Serbs would never agree to the terms of Appendix B (if they did then Kosovo would become a U.S.-controlled territory), and they did not.  Madeleine was about to get her war.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">
</span></p><hr data-dcnode-id="592"><p data-dcnode-id="588"><span data-dcnode-id="591" instrument_node="">
</span><font color="#000000" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">"NATO deeply regrets" killing at least seventeen people when a NATO bomb hit a bus packed with women and children near Pec on May&nbsp;3.</span></font></p><p data-dcnode-id="584"><span data-dcnode-id="587" instrument_node="">
</span><font color="#000000" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">"NATO deeply regrets" killing fifteen people when a cluster bomb exploded over a market and a hospital in Nis on May&nbsp;6.</span></font></p><p data-dcnode-id="580"><span data-dcnode-id="583" instrument_node="">
</span><font color="#000000" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">"NATO deeply regrets" killing three Chinese diplomats when NATO bombers hit the Chinese embassy in Belgrade on May&nbsp;7.</span></font></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">
</span></p><hr data-dcnode-id="577" width="50%"><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">
Albright apparently believed that a few days of bombing would be all that was necessary to cause Milosevic to surrender.  If so she miscalculated badly.  Not only did Milosevic not surrender but he counter-attacked, in the form of executions of Albanian men and forced expulsion of the Albanian population.  Hundreds of thousands became refugees, on trucks, tractors and trains headed for the borders with Albania and Macedonia.  And there was nothing that the NATO generals could do to stop this.</span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">

NATO's generals then took to bombing Belgrade, the bridges over the Danube, the hospitals, the fuel depots and the power stations.  Serb television ridiculed Clinton, Albright, Blair and Robin Cook, so it was bombed (16 people died in an attack that was perhaps expected by the Yugoslav government, which certainly used it to good propaganda effect).</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">

As the bombing continued into April, with no sign of surrender by Milosevic, the political leaders of the West (and many ordinary people) became very nervous.  The leaders were forced to face up to the possibility of embarking on a ground war in Europe (using Hungary as a staging area), with the major risk of bringing the Russians into the conflict on a large scale, and possibly precipitating nuclear war.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">

Milosevic had been hoping that the Russians would intervene to defend Yugoslavia against NATO.  Eventually he was told by them that this would not happen, and that he'd better settle for what he could get, which included a cease-fire under United Nations auspices and a pledge that Kosovo would remain part of Yugoslavia.</span></p><p data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">

On June 6th 1999, on the border with Macedonia, talks between generals of NATO and of the Yugoslav army, in which the Serbs were presented with a 6-page document to sign, were begun but soon broke down.  The text of this original document was not released, but it may have contained all the NATO demands contained in </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/app_b.htm"><span data-dcnode-id="567" instrument_node="">Appendix B: Status of Multi-National Military Implementation Force
</span></a><span data-dcnode-id="565" instrument_node="">.</span></p><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">

Talks resumed the next day. On June 9th, after negotiations, the Serb generals signed the </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/mta.htm"><span data-dcnode-id="562" instrument_node="">Military Technical Agreement</span></a><span data-dcnode-id="560" instrument_node="">.  Belgrade claimed a victory.  NATO proceeded to occupy Kosovo.  The Russians (who quickly transferred forces from Bosnia) beat them to the occupation of Pristina airport.</span></p><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">

The Russians had been planning to airlift a few thousand paratroopers to Pristina before NATO took control of central Kosovo.  They were prevented from doing so only by the refusal of the governments of Eastern European countries to allow the Russians to use their airspace.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">

The politicians Madeleine Albright, Bill Clinton, Tony Blair and Robin Cook, and the NATO generals, with Wesley Clark at their head, had brought the situation to a point where a nuclear war between Russia and the West might easily have come about.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">
</span></p><hr data-dcnode-id="552"><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">
</span></p><h4 align="center" data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Stupidity of the Week</span></h4><span data-dcnode-id="547" instrument_node="">

"War can be necessary sometimes to uphold civilisation, and this one was" said Tony Blair.  "Nothing we do or say can compensate for the loss of loved ones who died, but we can say they did not die in vain." (As reported in </span><i data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">The&nbsp;Independent,</span></i><span data-dcnode-id="544" instrument_node=""> 1999-06-11, page&nbsp;2.)</span><p data-dcnode-id="539"><span data-dcnode-id="543" instrument_node="">

Was Tony Blair reading from some old post-World-War-II Churchillian speech that his handlers had dredged up for the occasion?  Which loved ones is he referring to?  </span><b data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">No</span></b><span data-dcnode-id="540" instrument_node=""> NATO soldiers, or civilians of NATO countries, died in combat.  Does he mean, then, the Yugoslavs who were killed, such as Milena Malobabic, the teenage girl who died (along with seventeen other patients) when NATO bombed the tuberculosis sanatorium at Surdulica on May&nbsp;31?  Does he mean the other 1600 or so Yugoslav civilians killed by NATO bombs and missiles?  If so, what does he mean that "they did not die in vain"?  Does he mean that their deaths, and NATO's "victory", allowed morally bankrupt politicians such as himself and Clinton to trumpet that "good has triumphed over evil"?  Those who died would, I'm sure, be glad to know that "they did not die in vain".</span></p><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">
</span></p><hr data-dcnode-id="536"><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">

In June and July 1999 the KFOR forces from NATO countries attempted to impose NATO control over Kosovo, with limited success, as shown by the murder one afternoon (presumably by Albanians) of fourteen Serbian farmers.  The real victors in Kosovo, thanks to NATO, have been the KLA, which aims to take control by means of a </span><i data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">de facto</span></i><span data-dcnode-id="532" instrument_node=""> administration, eventually forcing NATO out.  The KLA plan to enlist NATO on their side against the Serbs paid off handsomely for them.  The resulting situation is not exactly what the U.S. had planned.  However, we need shed no tears that the plans of the U.S. imperialists have been frustrated, except that this whole affair has been a tragedy which need never have happened.</span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">
</span></p><hr data-dcnode-id="528"><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">

Since September 2001 the U.S.A. has been loud in its condemnation of terrorism, waging a so-called "War on Terror", directed particularly against Islamic countries.  But the U.S.A. is itself a terrorist state, and this is shown clearly by the nature of the war that NATO (dominated by the U.S.) conducted against Serbia.</span></p><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">

Terrorism is the practice of the deliberate infliction of harm, injury, death and/or destruction upon a civilian target sufficient to cause horror, revulsion or despair among the civilian population and/or their political leaders, with the goal of causing those populations or political leaders to act in a way desired by the terrorists.</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">

In the case of Serbia the Americans, day and night for over two months, bombed bridges, hospitals, fuel depots, railway lines and power stations.  The aim, as in Vietnam, was to destroy so much civilian infrastructure, and to make life so miserable for civilians, that they would force their government to surrender.  It did not work in Vietnam but it worked in Serbia.</span></p><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">
</span></p><hr data-dcnode-id="519"><p data-dcnode-id="515"><span data-dcnode-id="518" instrument_node="">
</span><img align="right" alt="Nazi-American stars and stripes" data-dcnode-id="517" height="70" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/jsmill/hk_us.gif&amp;raw" vspace="8" width="123"><span data-dcnode-id="516" instrument_node="">
The peoples of Europe should feel especially threatened by the U.S.-led aggression against Serbia.  It was the latest move in the long-running attempt by the U.S. to impose its will upon the entire world by the use of military force.  The last such attempt was made by Nazi Germany sixty years ago, an attempt which led to the deaths of over forty million people.  Under the guise of hypocritical declarations of a "humanitarian" war to "save" the Kosovan Albanians the U.S. was in fact attempting to dominate the whole of Europe by its military power (and ultimately the whole world).  If&nbsp;it had succeeded in its aims in Kosovo then Europe would have been under the U.S. gun for a long time.</span></p><p data-dcnode-id="507"><span data-dcnode-id="514" instrument_node="">

The plans of the U.S. imperialists did not work out in Kosovo as they had hoped.  Since October 2001 they have been making another attempt at world domination, this time on a much larger scale.  The bombing of Afghanistan was the opening shot (unless you count their </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/wtc.html"><span data-dcnode-id="513" instrument_node="">bombing of the World Trade Center</span></a><span data-dcnode-id="511" instrument_node=""> on September 11th).  And with the </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/iraqwar.htm"><span data-dcnode-id="510" instrument_node="">War on Iraq</span></a><span data-dcnode-id="508" instrument_node=""> it has become obvious to all but the most dim-witted American that the U.S. seeks to control the entire world by means of military force.</span></p><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">
</span></p><hr data-dcnode-id="504"><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">

The consequences of NATO's war have been a disaster for Kosovo.  Bombed and burnt-out buildings (people's former homes) were still to be seen everywhere a year later.  Civil government is rudimentary, there are few public services and the economy is controlled by the Albanian mafia.  Pre-war discrimination of Serbs against Albanians has been replaced by post-war intimidation and brutality of Albanians toward Serbs (or rather, the few Serbs who remain, the majority, hundreds of thousands, having fled Kosovo in fear of being killed by the Albanians).  The Serbs and the Albanians hate each other much more now than they ever did before America's military aggression.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">

NATO, under the pretext of saving Albanians from Serb hostility, bombed Serbia into relinquishing control over Kosovo, and now only the heavily armed presence of KFOR troops prevents the Albanians from murdering every Serb in the province.  As BBC journalist Jonathan Dimbleby remarked, anyone who thinks that Kosovo represents the success of an "ethical foreign policy" or the triumph of the "New World Order" had better think again.</span></p><p data-dcnode-id="481"><span data-dcnode-id="499" instrument_node="">
</span><table align="RIGHT" data-dcnode-id="487"><tbody data-dcnode-id="488"><tr data-dcnode-id="489"><td data-dcnode-id="490"><form action="taf.php" data-dcnode-id="491" method="post"><span data-dcnode-id="498" instrument_node="">

</span></p><center data-dcnode-id="401"><span data-dcnode-id="404" instrument_node="">John Bart Gerald: </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/jbg04.htm"><span data-dcnode-id="403" instrument_node="">On Crimes of Power: The Bombing of Yugoslavia, 1999</span></a></center><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">

</span></p><blockquote data-dcnode-id="383"><font data-dcnode-id="389" size="-1"><font data-dcnode-id="394" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="395" instrument_node="">According to Military Commission Charges filed against him, [Australian Guantanamo prisoner David] Hicks "traveled to Tirana, Albania and joined the Kosovo Liberation Army (KLA) ... Hicks completed basic military training at a KLA camp and engaged in hostile action before returning to Australia."

</span></font><p data-dcnode-id="390"><font data-dcnode-id="392" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="393" instrument_node="">Gee, I&nbsp;wonder if this is the same Kosovo where NATO and the US State Department sent Mujahideen mercenaries back in 1998-99 (matching Hicks' timeframe)? "The US DIA approached MI6 to arrange a training programme for the KLA, said a senior British military source. 'MI6 then sub-contracted the operation to two British security companies, who in turn approached a number of former members of the (22 SAS) regiment. Lists were then drawn up of weapons and equipment needed by the KLA.'" (The Scotsman, Glasgow, 29 August 1999) This operation was akin to what the CIA and Pakistan's ISI had done in Afghanistan a decade before, even though officially the KLA was listed as "a terrorist organization [that] was financing its operations with money from the international heroin trade and loans from Islamic countries and individuals, among them allegedly Usama bin Laden ... Another link to bin Laden is the fact that the brother of a leader in an Egyptian Jihad organization and also a military commander of Usama bin Laden, was leading an elite KLA unit during the Kosovo conflict." But don't believe me; the previous quote is not from some paranoid conspiracy theorist, but taken from the testimony of Ralf Mutschke of Interpol's Criminal Intelligence Division to the House Judicial Committee, 13 December 2000. (See Michel Chossudovsky, "OsamaGate", Centre for Research on Globalisation, October 9, 2001.)</span></font><span data-dcnode-id="391" instrument_node="">
</span></p></font><p data-dcnode-id="384"><font data-dcnode-id="385" size="-1"><span data-dcnode-id="388" instrument_node="">— Kurt Nimmo, </span><a data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.serendipity.li/nato/nimmo.htm"><span data-dcnode-id="387" instrument_node="">Fast Track Tribunals?</span></a></font></p></blockquote><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">

</span><font data-dcnode-id="195" size="-1"><font data-dcnode-id="196" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="197" instrument_node="">Clark's real notoriety came in 1999 when, as NATO Commander under Bill Clinton, he led another US military invasion, which the UN also refused to sanction, into Bosnia and Kosovo. Clark's aggressive command nearly resulted in a military confrontation with a Russian armored column. As it turns out, the reasons for that invasion were as fabricated as were the reasons for Bush's invasion of Iraq.</span></font></font></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">

</span><font data-dcnode-id="184" size="-1"><font data-dcnode-id="185" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="186" instrument_node="">Clark waged a brutal air war against Serbia that brought death and destruction mostly to civilians and the infrastructure that was their life support but, by most post-war accounts, left the Serbian military relatively unscathed. "We’re going to systematically and progressively attack, disrupt, degrade, devastate and ultimately, unless President Milosevic complies with the demands of the international community, we’re going to destroy his forces and their facilities and support." It’s clear that Clark included as legitimate targets schools, bridges, hospitals, electrical facilities, market places, trains, refugee convoys, and media outlets. Clark bombed Serbia with "an almost sadistic fanaticism" (William Blum), making profligate use of deadly cluster bombs and depleted uranium shells, of the sort now ravaging Iraq.&nbsp; ...</span></font></font></p><p data-dcnode-id="179"><font data-dcnode-id="180" size="-1"><font data-dcnode-id="181" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="182" instrument_node="">

Clark's attempts to cover up instances of intentional NATO bombings of civilian targets have been exposed, though not properly publicized. In one case, fourteen people were killed in a Grdenicka, Serbia on April&nbsp;12, 1999 when a US&nbsp;jet bombed a passenger train crossing a bridge. Clark claimed the atrocity was a tragic mistake, as the pilot was firing on the bridge and the train only came into view after the bombs had been dropped. He showed two video films shot from the nose of the remote control-guided bombs to support his claim, which were later found to have been doctored. In fact, the train could be seen on the bridge when the pilot bombed it, and he turned around to make a second sweep on the burning bridge, dropping a bomb directly on the carriage.</span></font></font></p><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">

</span></p><h3 align="CENTER" data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Milosevic Dies</span></h3><span data-dcnode-id="166" instrument_node="">
</span><font data-dcnode-id="155" size="-1"><font data-dcnode-id="156" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="165" instrument_node="">The death of former Yugoslav President Slobodan Milosevic in his jail cell at the Hague on Saturday [2006-03-11] has unleashed a torrent of historical distortions and outright lies that echo the propaganda campaign waged more than seven years ago to justify the US-NATO war against the country.</span><p data-dcnode-id="163"><span data-dcnode-id="164" instrument_node="">

... [The trial] had turned into a political embarrassment, producing no real proof of Milosevic's direct responsibility for the terrible crimes carried out during the civil wars that erupted in Yugoslavia in the 1990s. It had threatened to become even more of a problem for those who organized it after Milosevic, at the end of February, asked the tribunal to issue a subpoena ordering former US President Bill Clinton to testify, apparently with the aim of showing that Washington itself was responsible for crimes against humanity in waging an illegal war against Yugoslavia and conducting a sustained bombing campaign against civilian targets.&nbsp;...</span></p><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">

That the US has been a principal organizer of this trial exposes the fraud of the entire enterprise. Washington itself accepts neither international law nor the jurisdiction of any international court over its own actions on the world arena. It has boycotted the International Criminal Court and strong-armed governments around the world into signing waivers exempting US officials and US troops from any liability for war crimes carried out against their peoples.</span></p><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">

If, moreover, the trial of Milosevic were really about human rights and international justice, the obvious question is: Why has the UN not put George W. Bush in the dock?</span></p><p data-dcnode-id="157"><span data-dcnode-id="158" instrument_node="">

There is no question that Bush, Cheney, Rumsfeld and others in the current US administration are responsible for far greater war crimes and a far greater loss of innocent human life in waging an unprovoked and illegal war against Iraq than anything perpetrated by Milosevic.</span></p></font></font><p data-dcnode-id="148"><font data-dcnode-id="149" size="-1"><font data-dcnode-id="153" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="154" instrument_node="">

</span></p><center data-dcnode-id="109"><b data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">Richard Holbrooke and the War on Serbia</span></b></center><p data-dcnode-id="104"><span data-dcnode-id="108" instrument_node="">
</span><font data-dcnode-id="105" size="-1"><font data-dcnode-id="106" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="107" instrument_node="">The 1990s would be the decade in which Holbrooke would gain his fame. As the former Yugoslavia unraveled in ethnic and religious conflict, the U.S. looked to assert its dominance in the region. That decade’s Balkan wars were a brutal and complex affair, but to Holbrooke and the Clinton administration it was all quite simple: the Serbs must be cut down to size. Here, too, was the perfect opportunity wield American power for the sake of human progress. In the mountain valleys of southeastern Europe, history’s ghosts could only be exorcised with a resounding show of force. As a prophet from Washington, Holbrooke would light the path to the Open Society with laser-guided munitions.&nbsp; ... Holbrooke’s favored formula of intimidation and aerial bombardment was applied repeatedly to force Belgrade into accommodation of U.S. demands, first to create the Bosnian state and then to detach Kosovo from Serbia itself in 1999.&nbsp; ... The entire style and substance of Holbrooke’s work can be distilled to one quality: not compassion, but aggression. The ancient imperial practice of divide-and-rule was only enhanced by the discourse of “human rights” ideology, and CNN clips of refugees made for a convenient excuse to launch cruise missiles against civilian infrastructure.</span></font></font></p><p data-dcnode-id="99"><font data-dcnode-id="100" size="-1"><span data-dcnode-id="103" instrument_node="">

</span><font data-dcnode-id="87" size="-1"><font data-dcnode-id="88" face="Verdana, Arial, Helvetica, sans-serif"><span data-dcnode-id="89" instrument_node="">Bombing Serbia was a family affair in the Clinton White House. Hillary Clinton revealed to an interviewer in the summer of 1999, “I urged him to bomb. You cannot let this go on at the end of a century that has seen the major holocaust of our time. What do we have NATO for if not to defend our way of life?” A biography of Hillary Clinton, written by Gail Sheehy and published in late 1999, stated that Mrs.&nbsp;Clinton had refused to talk to the president for eight months after the Monica Lewinsky scandal broke. She resumed talking to her husband only when she phoned him and urged him in the strongest terms to begin bombing Serbia; the president began bombing within 24&nbsp;hours.</span></font></font></p><p data-dcnode-id="81"><font data-dcnode-id="82" size="-1"><span data-dcnode-id="85" instrument_node="">
—  James Bovard, </span><a data-dcnode-id="83" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lewrockwell.com/2019/08/james-bovard/americas-benevolent-bombing-of-serbia/"><span data-dcnode-id="84" instrument_node="">America’s Benevolent Bombing of Serbia</span></a></font></p><p data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">
