</span><div class="thumb tright" data-dcnode-id="3751"><div class="thumbinner" data-dcnode-id="3752" style="width:452px;"><a class="image" data-dcnode-id="3758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_2013_World_Map_of_National_Guard_State_Partnerships.png"><img alt="" class="thumbimage" data-dcnode-id="3759" data-file-height="1027" data-file-width="2000" decoding="async" height="231" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/A_2013_World_Map_of_National_Guard_State_Partnerships.png/450px-A_2013_World_Map_of_National_Guard_State_Partnerships.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e0/A_2013_World_Map_of_National_Guard_State_Partnerships.png/675px-A_2013_World_Map_of_National_Guard_State_Partnerships.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e0/A_2013_World_Map_of_National_Guard_State_Partnerships.png/900px-A_2013_World_Map_of_National_Guard_State_Partnerships.png 2x" width="450"></a><span data-dcnode-id="3757" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3753"><div class="magnify" data-dcnode-id="3755"><a class="internal" data-dcnode-id="3756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AA_2013_World_Map_of_National_Guard_State_Partnerships.png" title="Enlarge"></a></div><span data-dcnode-id="3754" instrument_node="">2013 world map of National Guard State Partnerships and year of origin</span></div></div></div><span data-dcnode-id="3750" instrument_node="">
</span><p data-dcnode-id="3721"><span data-dcnode-id="3749" instrument_node="">The </span><b data-dcnode-id="3747"><span data-dcnode-id="3748" instrument_node="">State Partnership Program</span></b><span data-dcnode-id="3746" instrument_node=""> (</span><b data-dcnode-id="3744"><span data-dcnode-id="3745" instrument_node="">SPP</span></b><span data-dcnode-id="3743" instrument_node="">) is a joint program of the </span><a data-dcnode-id="3741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Defense" title="United States Department of Defense"><span data-dcnode-id="3742" instrument_node="">United States Department of Defense</span></a><span data-dcnode-id="3740" instrument_node=""> (DoD) and the individual </span><a data-dcnode-id="3738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._state" title="U.S. state"><span data-dcnode-id="3739" instrument_node="">states</span></a><span data-dcnode-id="3737" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unincorporated_territories_of_the_United_States" title="Unincorporated territories of the United States"><span data-dcnode-id="3736" instrument_node="">territories</span></a><span data-dcnode-id="3734" instrument_node="">, and </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="3733" instrument_node="">District of Columbia</span></a><span data-dcnode-id="3731" instrument_node="">. The program and the concept are entirely new, originating in 1993 as a simplified form of the previously established (1992) Joint Contact Team Program (JCTP). The JCTP aimed at assisting former </span><a data-dcnode-id="3729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="3730" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="3728" instrument_node=""> and </span><a data-dcnode-id="3726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3727" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3725" instrument_node=""> Republics, now independent, to form democracies and defense forces of their own. It featured long-term presence of extensive and expensive teams of advisory specialists. The SPP shortened the advisory presence to a </span><a class="mw-redirect" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_National_Guard" title="United States National Guard"><span data-dcnode-id="3724" instrument_node="">United States National Guard</span></a><span data-dcnode-id="3722" instrument_node=""> unit of a designated state, called a partner, which would conduct joint exercises with the host. It is cheaper, has a lesser American presence, and can comprise contacts with civilian agencies. Today both programs are funded.
</span></p><p data-dcnode-id="3713"><span data-dcnode-id="3720" instrument_node="">The SPP is widespread. The JCTP is recommended when more extensive support is needed. Sometimes the names are interchangeable. A large share of originally JCTP activity was subsumed by the </span><a data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="3719" instrument_node="">NATO</span></a><span data-dcnode-id="3717" instrument_node=""> </span><a data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" title="Partnership for Peace"><span data-dcnode-id="3716" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="3714" instrument_node=""> (PfP) program made active in 1994. It prepares nations for membership in NATO. A typical path for a candidate has been SPP, PfP and then NATO. Once started, SPP activities appear to continue regardless of what other memberships a host nation may have. By nature the program creates close friends and allies.
</span></p><p data-dcnode-id="3696"><span data-dcnode-id="3712" instrument_node="">Previously, and currently outside the program, the Guard was and is subject to a jurisdictional duality: it can be either Federally active or not. If inactive it is a </span><a data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reserve_components_of_the_United_States_Armed_Forces" title="Reserve components of the United States Armed Forces"><span data-dcnode-id="3711" instrument_node="">reserve component</span></a><span data-dcnode-id="3709" instrument_node=""> only of the DoD. Its main function is as a state </span><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Militia" title="Militia"><span data-dcnode-id="3708" instrument_node="">militia</span></a><span data-dcnode-id="3706" instrument_node=""> under the command of the </span><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Governor_%28United_States%29" title="Governor (United States)"><span data-dcnode-id="3705" instrument_node="">Governor</span></a><span data-dcnode-id="3703" instrument_node=""> through the </span><a data-dcnode-id="3701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_adjutant_general" title="State adjutant general"><span data-dcnode-id="3702" instrument_node="">Adjutant General</span></a><span data-dcnode-id="3700" instrument_node=""> of the state or equivalent officer of the Territory or D.C. If active, it is entirely out of the jurisdiction of the state and under the DoD, which might or might not keep its original identity, but more likely plunders it for replacements or special units of the </span><a data-dcnode-id="3698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regular_Army_%28United_States%29" title="Regular Army (United States)"><span data-dcnode-id="3699" instrument_node="">Regular Army</span></a><span data-dcnode-id="3697" instrument_node=""> or Air Force.
</span></p><p data-dcnode-id="3687"><span data-dcnode-id="3695" instrument_node="">In the SPP, the State (or territory, etc.) and the DoD collaborate in the deployment of the unit, through the </span><a data-dcnode-id="3693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Guard_Bureau" title="National Guard Bureau"><span data-dcnode-id="3694" instrument_node="">National Guard Bureau</span></a><span data-dcnode-id="3692" instrument_node="">, and the Adjutant General of the State. The unit keeps its State identity. In the words of one source, it is "managed by the National Guard Bureau, but executed by the states."</span><sup class="reference" data-dcnode-id="3689" id="cite_ref-marshall_3-0"><a data-dcnode-id="3690" href="#cite_note-marshall-3"><span data-dcnode-id="3691" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3688" instrument_node=""> In that case there is collaboration between the state Adjutant General and the commander in the field.
</span></p><p data-dcnode-id="3682"><span data-dcnode-id="3686" instrument_node="">The "partners" of the partnerships are the Guard units of various states and foreign nations that have requested and been granted partnerships. The program links National  Guard units of U.S. States with partner countries around the world for the purpose of supporting the security cooperation objectives of the </span><a class="mw-redirect" data-dcnode-id="3684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unified_Combatant_Command" title="Unified Combatant Command"><span data-dcnode-id="3685" instrument_node="">geographic Combatant Commands</span></a><span data-dcnode-id="3683" instrument_node=""> (CCMDs). It is not quite so cut-and-dried as pure security. There are quite a number of crisis relief and humanitarian activities.
</span></p><span data-dcnode-id="3681" instrument_node="">

</span><h2 data-dcnode-id="3419"><span class="mw-headline" data-dcnode-id="3427" id="Legal_basis_for_the_program"><span data-dcnode-id="3428" instrument_node="">Legal basis for the program</span></span><span class="mw-editsection" data-dcnode-id="3420"><span class="mw-editsection-bracket" data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">[</span></span><a data-dcnode-id="3423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D1" title="Edit section: Legal basis for the program"><span data-dcnode-id="3424" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3421"><span data-dcnode-id="3422" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3418" instrument_node="">
</span><h3 data-dcnode-id="3408"><span class="mw-headline" data-dcnode-id="3416" id="Title_10_authorization"><span data-dcnode-id="3417" instrument_node="">Title 10 authorization</span></span><span class="mw-editsection" data-dcnode-id="3409"><span class="mw-editsection-bracket" data-dcnode-id="3414"><span data-dcnode-id="3415" instrument_node="">[</span></span><a data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D2" title="Edit section: Title 10 authorization"><span data-dcnode-id="3413" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3407" instrument_node="">
</span><p data-dcnode-id="3398"><span data-dcnode-id="3406" instrument_node="">The deployment authorized by the SPP under the joint management of State and Federal governments can only be in the "State Partnership" relationship, which according to the current </span><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Code" title="United States Code"><span data-dcnode-id="3405" instrument_node="">United States Code</span></a><span data-dcnode-id="3403" instrument_node=""> (USC)</span><sup class="reference" data-dcnode-id="3400" id="cite_ref-4"><a data-dcnode-id="3401" href="#cite_note-4"><span data-dcnode-id="3402" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3399" instrument_node=""> is defined as a "program of activities." The Secretary of Defense is authorized to establish it between the "military forces," the "security forces," or the "governmental organizations" designed to respond to disasters or other emergencies, and the "National Guard of a state or territory." The nature of the activities is that they must support United States "Security Cooperation" (SC) objectives.
</span></p><p data-dcnode-id="3396"><span data-dcnode-id="3397" instrument_node="">A State Partnership is thus an agreement between the United States and a foreign government to conduct joint security operations with the United States National Guard. These are mainly training exercises. They may (or may not) lead to membership of the partner in regional defense organizations.
</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3395" instrument_node="">"For SPP events conducted overseas, National Guard members are typically placed in a duty status by orders issued under the authority of 10 U.S.C. 12301,"</span><sup class="reference" data-dcnode-id="3392" id="cite_ref-KandS2011p11_5-0"><a data-dcnode-id="3393" href="#cite_note-KandS2011p11-5"><span data-dcnode-id="3394" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3391" instrument_node=""> which is a list of various circumstances in which Secretary of Defense may issue an involuntary activation of the Guard as a Reserve Component of the DoD.</span><sup class="reference" data-dcnode-id="3388" id="cite_ref-6"><a data-dcnode-id="3389" href="#cite_note-6"><span data-dcnode-id="3390" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3387" instrument_node=""> The permission of the Governor may be required in some cases. "For SPP events conducted within the United States, National Guard members are placed in a duty status by orders issued under 32 U.S.C. 502.</span><sup class="reference" data-dcnode-id="3384" id="cite_ref-7"><a data-dcnode-id="3385" href="#cite_note-7"><span data-dcnode-id="3386" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3383" instrument_node=""> This permits the participating members to receive appropriate military pay and benefits." 32 U.S. Code § 502 specifies that the uard must attend regular training exercises, for which they get paid.
</span></p><p data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">In summary, the Guard is either activated for out-of-country activities or regularly trained within it. No special SPP legislation is required.
</span></p><span data-dcnode-id="3379" instrument_node="">
</span><h3 data-dcnode-id="3369"><span class="mw-headline" data-dcnode-id="3377" id="Statutory_authority"><span data-dcnode-id="3378" instrument_node="">Statutory authority</span></span><span class="mw-editsection" data-dcnode-id="3370"><span class="mw-editsection-bracket" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">[</span></span><a data-dcnode-id="3373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D3" title="Edit section: Statutory authority"><span data-dcnode-id="3374" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3367" instrument_node="">Although authorized to carry out a program of activities in general, "the SPP has no dedicated statutory authority; rather, SPP activities are currently carried out under one or more </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Title_10_of_the_United_States_Code" title="Title 10 of the United States Code"><span data-dcnode-id="3366" instrument_node="">Title 10</span></a><span data-dcnode-id="3364" instrument_node=""> (Armed Forces), </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Title_32_of_the_United_States_Code" title="Title 32 of the United States Code"><span data-dcnode-id="3363" instrument_node="">Title 32</span></a><span data-dcnode-id="3361" instrument_node=""> (National Guard) and </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Defense_Authorization_Act" title="National Defense Authorization Act"><span data-dcnode-id="3360" instrument_node="">National Defense Authorization Act</span></a><span data-dcnode-id="3358" instrument_node=""> authorities that are related to the types of missions conducted. The main authorities that may be used by SPP are:"</span><sup class="reference" data-dcnode-id="3355" id="cite_ref-8"><a data-dcnode-id="3356" href="#cite_note-8"><span data-dcnode-id="3357" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3354" instrument_node="">
</span></p><span data-dcnode-id="3352" instrument_node="">
</span><div class="div-col" data-dcnode-id="3300"><span data-dcnode-id="3349" instrument_node="">
</span><ul data-dcnode-id="3302"><li data-dcnode-id="3344"><span data-dcnode-id="3348" instrument_node="">10 U.S.C. 1051 (Multilateral, bilateral, or regional cooperation programs: payment of personnel expenses) "authorizes the Secretary of Defense to pay the travel, subsistence, and similar personal expenses of defense personnel of developing countries in connection with their attendance at a multilateral, bilateral, or regional conference, seminar, or similar meeting," with certain restrictions.</span><sup class="reference" data-dcnode-id="3345" id="cite_ref-9"><a data-dcnode-id="3346" href="#cite_note-9"><span data-dcnode-id="3347" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="3343" instrument_node="">
</span><li data-dcnode-id="3338"><span data-dcnode-id="3342" instrument_node="">10 U.S. Code § 321 (Training with friendly foreign countries: payment of training and exercise expenses),  changed from 10 U.S.C. 2010 (Combined Exercises), states  "The armed forces under the jurisdiction of the Secretary of Defense may train with the military forces or other security forces of a friendly foreign country...."</span><sup class="reference" data-dcnode-id="3339" id="cite_ref-10"><a data-dcnode-id="3340" href="#cite_note-10"><span data-dcnode-id="3341" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="3337" instrument_node="">
</span><li data-dcnode-id="3332"><span data-dcnode-id="3336" instrument_node="">10 U.S.C. 401 (Humanitarian and civic assistance provided in conjunction with military operations) authorizes the DOD "to carry out humanitarian and civic assistance activities in host nations in conjunction with military operations," defined to include "medical, surgical, dental, and veterinary professionals ... construction of rudimentary surface transportation systems ... well drilling and construction of basic sanitation facilities ... rudimentary construction and repair of public facilities."</span><sup class="reference" data-dcnode-id="3333" id="cite_ref-11"><a data-dcnode-id="3334" href="#cite_note-11"><span data-dcnode-id="3335" instrument_node="">[11]</span></a></sup></li><span data-dcnode-id="3331" instrument_node="">
</span><li data-dcnode-id="3326"><span data-dcnode-id="3330" instrument_node="">10 U.S.C. 2561 (Humanitarian Assistance) authorizes the expenditure of humanitarian assistance funds for the "transportation of humanitarian relief and other humanitarian purposes...."</span><sup class="reference" data-dcnode-id="3327" id="cite_ref-12"><a data-dcnode-id="3328" href="#cite_note-12"><span data-dcnode-id="3329" instrument_node="">[12]</span></a></sup></li><span data-dcnode-id="3325" instrument_node="">
</span><li data-dcnode-id="3320"><span data-dcnode-id="3324" instrument_node="">10 U.S.C. 2249c, renumbered to 345. Establishes the  Regional Defense Combating Terrorism Fellowship Program (CTFP). This organization is described in a report to Congress: "The Regional Defense Combating Terrorism Fellowship Program (CTFP) was established to meet an emerging and urgent defense requirement to build partnerships in the struggle against violent extremism through targeted, non-lethal, combating terrorism (CbT) education and training. The CTFP directly supports DoD’s efforts by providing CbT education and training for mid- to senior-level international military officers, ministry of defense civilians, and security officials."</span><sup class="reference" data-dcnode-id="3321" id="cite_ref-13"><a data-dcnode-id="3322" href="#cite_note-13"><span data-dcnode-id="3323" instrument_node="">[13]</span></a></sup></li><span data-dcnode-id="3319" instrument_node="">
</span><li data-dcnode-id="3308"><span data-dcnode-id="3318" instrument_node="">"Section 1206 of the </span><a data-dcnode-id="3316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Defense_Authorization_Act" title="National Defense Authorization Act"><span data-dcnode-id="3317" instrument_node="">National Defense Authorization Act</span></a><span data-dcnode-id="3315" instrument_node=""> (NDAA) for Fiscal Year 2006 ... provides the </span><a class="mw-redirect" data-dcnode-id="3313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_of_Defense" title="Secretary of Defense"><span data-dcnode-id="3314" instrument_node="">Secretary of Defense</span></a><span data-dcnode-id="3312" instrument_node=""> with authority to train and equip foreign military forces for two specified purposes — counterterrorism and stability operations — and foreign security forces for counterterrorism operations. Section 1206 authority now extends through FY2017."</span><sup class="reference" data-dcnode-id="3309" id="cite_ref-14"><a data-dcnode-id="3310" href="#cite_note-14"><span data-dcnode-id="3311" instrument_node="">[14]</span></a></sup></li><span data-dcnode-id="3307" instrument_node="">
</span><li data-dcnode-id="3303"><a data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nunn%25E2%2580%2593Lugar_Cooperative_Threat_Reduction" title="Nunn–Lugar Cooperative Threat Reduction"><span data-dcnode-id="3306" instrument_node="">Nunn–Lugar Cooperative Threat Reduction</span></a><span data-dcnode-id="3304" instrument_node=""> Program provides funding related to preventing weapons proliferation and other activities.</span></li></ul><span data-dcnode-id="3301" instrument_node="">
</span></div><span data-dcnode-id="3299" instrument_node="">
</span><h2 data-dcnode-id="3289"><span class="mw-headline" data-dcnode-id="3297" id="Financial_basis_for_the_program"><span data-dcnode-id="3298" instrument_node="">Financial basis for the program</span></span><span class="mw-editsection" data-dcnode-id="3290"><span class="mw-editsection-bracket" data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">[</span></span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D4" title="Edit section: Financial basis for the program"><span data-dcnode-id="3294" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3288" instrument_node="">
</span><p data-dcnode-id="3278"><span data-dcnode-id="3287" instrument_node="">Expenses for the SPP partnerships are the standard maintenance required to keep Guard units in the field, the standard maintenance required by the partner units, which must be paid by the partner governments, and the "travel-related expenses" above and beyond them.</span><sup class="reference" data-dcnode-id="3284" id="cite_ref-KandS2011p11_5-1"><a data-dcnode-id="3285" href="#cite_note-KandS2011p11-5"><span data-dcnode-id="3286" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3283" instrument_node=""> The Guard units are maintained by "Army or Air Force Personal Accounts," including "pay and allowances." The travel-related expenses are paid from separate funds, the Operations and Maintenance (O&amp;M) accounts, of which there are many, such as the following:</span><sup class="reference" data-dcnode-id="3280" id="cite_ref-15"><a data-dcnode-id="3281" href="#cite_note-15"><span data-dcnode-id="3282" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3279" instrument_node="">
</span></p><span data-dcnode-id="3277" instrument_node="">
</span><link data-dcnode-id="3276" href="mw-data:TemplateStyles:r998391716" rel="mw-deduplicated-inline-style"><div class="div-col" data-dcnode-id="3225"><span data-dcnode-id="3275" instrument_node="">
</span><ul data-dcnode-id="3264"><li data-dcnode-id="3271"><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Guard_Bureau" title="National Guard Bureau"><span data-dcnode-id="3274" instrument_node="">National Guard Bureau</span></a><span data-dcnode-id="3272" instrument_node="">’s International Affairs Division funds.</span></li><span data-dcnode-id="3270" instrument_node="">
</span><li data-dcnode-id="3265"><span data-dcnode-id="3269" instrument_node="">Combatant Commander’s Initiative Fund (CCIF), established under 10 U.S. Code 166a. Accessed only by the CJCS or someone designated by him, the fund is used for payments on request to a "commander of a combatant command" for a number of specified activities, such as joint exercises.</span><sup class="reference" data-dcnode-id="3266" id="cite_ref-16"><a data-dcnode-id="3267" href="#cite_note-16"><span data-dcnode-id="3268" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="3263" instrument_node="">
</span><ul data-dcnode-id="3227"><li data-dcnode-id="3252"><span data-dcnode-id="3262" instrument_node="">The Wales Initiative Fund (WIF) is a yearly amount voted by Congress to be used in support of </span><a class="mw-redirect" data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Treaty_Organization" title="North Atlantic Treaty Organization"><span data-dcnode-id="3261" instrument_node="">NATO</span></a><span data-dcnode-id="3259" instrument_node="">'s </span><a data-dcnode-id="3257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" title="Partnership for Peace"><span data-dcnode-id="3258" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="3256" instrument_node=""> (PfP) Program.</span><sup class="reference" data-dcnode-id="3253" id="cite_ref-17"><a data-dcnode-id="3254" href="#cite_note-17"><span data-dcnode-id="3255" instrument_node="">[17]</span></a></sup></li><span data-dcnode-id="3251" instrument_node="">
</span><li data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">Combating Terrorism Fellowship Program (CFTP)</span></li><span data-dcnode-id="3248" instrument_node="">
</span><li data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">Cooperative Threat Reduction Program (CTR)</span></li><span data-dcnode-id="3245" instrument_node="">
</span><li data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">Asia-Pacific Regional Initiative Fund (APRI)</span></li><span data-dcnode-id="3242" instrument_node="">
</span><li data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">Latin American Cooperation (LATAM COOP)</span></li><span data-dcnode-id="3239" instrument_node="">
</span><li data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">Overseas Humanitarian, Disaster, and Civic Assistance (OHDCA)</span></li><span data-dcnode-id="3236" instrument_node="">
</span><li data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Minuteman Fellowship (MMF; no longer in existence)</span></li><span data-dcnode-id="3233" instrument_node="">
</span><li data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">Building Partner Capacity (BPC)</span></li><span data-dcnode-id="3230" instrument_node="">
</span><li data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Overseas Humanitarian Assistance (OHA)</span></li></ul><span data-dcnode-id="3226" instrument_node="">
