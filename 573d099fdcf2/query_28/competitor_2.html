</span><h2 data-dcnode-id="2081"><span class="mw-headline" data-dcnode-id="2089" id="Development_of_the_State_Partnership_Program"><span data-dcnode-id="2090" instrument_node="">Development of the State Partnership Program</span></span><span class="mw-editsection" data-dcnode-id="2082"><span class="mw-editsection-bracket" data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">[</span></span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D17" title="Edit section: Development of the State Partnership Program"><span data-dcnode-id="2086" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2083"><span data-dcnode-id="2084" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">The SPP began and developed as a streamlined program to assist the former satellite republics of the Soviet Union to find stability and acceptance by NATO after the demise of the Warsaw Pact on July 1, 1991, and the dissolution of the Soviet Union on December 26 of that year. Its scope was originally limited to that theater under the jurisdiction of EUCOM.
</span></p><span data-dcnode-id="2077" instrument_node="">
</span><h3 data-dcnode-id="2066"><span data-dcnode-id="2076" id="Reagan.27s_change_of_policy"></span><span class="mw-headline" data-dcnode-id="2074" id="Reagan's_change_of_policy"><span data-dcnode-id="2075" instrument_node="">Reagan's change of policy</span></span><span class="mw-editsection" data-dcnode-id="2067"><span class="mw-editsection-bracket" data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">[</span></span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D18" title="Edit section: Reagan's change of policy"><span data-dcnode-id="2071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2030"><span data-dcnode-id="2064" instrument_node="">The first move in the direction of the Partnership Program was a change in U.S. policy toward </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="2063" instrument_node="">Eastern-bloc</span></a><span data-dcnode-id="2061" instrument_node=""> countries under President </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="2060" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="2058" instrument_node="">. The previous policy had been a consequence of the </span><a data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Revolution_of_1956" title="Hungarian Revolution of 1956"><span data-dcnode-id="2057" instrument_node="">Hungarian Revolution of 1956</span></a><span data-dcnode-id="2055" instrument_node="">, a bloody suppression of a native Hungarian uprising by forces of the </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="2054" instrument_node="">Soviet Union</span></a><span data-dcnode-id="2052" instrument_node="">. Soviet tanks in the streets of Budapest were a scene depicted by the media of the times. The Soviets under </span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="2051" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="2049" instrument_node=""> seemed implacable in their resolution to pursue and eliminate all the revolutionaries they could find. Former co-nationals of </span><a data-dcnode-id="2047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austria" title="Austria"><span data-dcnode-id="2048" instrument_node="">Austria</span></a><span data-dcnode-id="2046" instrument_node=""> in the </span><a class="mw-redirect" data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Austro-Hungarian_Empire" title="Austro-Hungarian Empire"><span data-dcnode-id="2045" instrument_node="">Austro-Hungarian Empire</span></a><span data-dcnode-id="2043" instrument_node="">, Hungary had been an ally of the </span><a class="mw-redirect" data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Reich" title="Third Reich"><span data-dcnode-id="2042" instrument_node="">Third Reich</span></a><span data-dcnode-id="2040" instrument_node="">, contributing some ten divisions to the invasion of Russia. They recanted in 1944, following the model of Italy's recantation, but it was too late. Overrun by Soviet forces on the way to Berlin, they became a </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellite_state" title="Satellite state"><span data-dcnode-id="2039" instrument_node="">satellite</span></a><span data-dcnode-id="2037" instrument_node=""> of the Soviet Union and member of the </span><a data-dcnode-id="2035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="2036" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="2034" instrument_node="">. They were behind the </span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="2033" instrument_node="">Iron Curtain</span></a><span data-dcnode-id="2031" instrument_node="">.
</span></p><p data-dcnode-id="2025"><span data-dcnode-id="2029" instrument_node="">The revolutionaries called upon the United States for support. It offered them assurances of backing in the event of victory; however, no actual combat support was forthcoming. The CIA appeared to have lost all its arms caches. Khrushchev at last quipped that American support might be compared to the support of a rope suspending a hanged man; i.e., the Americans would encourage the Hungarians to hang themselves by revolting but would make no move to assist them. As a result of this American fiasco the government adopted a policy of never communicating with countries behind the Iron Curtain but always approaching the Soviet Union first. The gates between east and west were resolutely shut. The </span><a class="mw-redirect" data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_war" title="Cold war"><span data-dcnode-id="2028" instrument_node="">cold war</span></a><span data-dcnode-id="2026" instrument_node=""> was on.
</span></p><p data-dcnode-id="2002"><span data-dcnode-id="2024" instrument_node="">Over three decades later, President Reagan, standing near the </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlin_Wall" title="Berlin Wall"><span data-dcnode-id="2023" instrument_node="">Berlin Wall</span></a><span data-dcnode-id="2021" instrument_node="">, delivered what has been called his Berlin Wall speech addressing </span><a data-dcnode-id="2019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="2020" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="2018" instrument_node=""> (not there in person), then </span><a data-dcnode-id="2016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union" title="General Secretary of the Communist Party of the Soviet Union"><span data-dcnode-id="2017" instrument_node="">General Secretary of the Communist Party of the Soviet Union</span></a><span data-dcnode-id="2015" instrument_node="">: "... If you seek prosperity for the Soviet Union ... if you seek liberalization ... </span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tear_down_this_wall%21" title="Tear down this wall!"><span data-dcnode-id="2014" instrument_node="">tear down this wall!</span></a><span data-dcnode-id="2012" instrument_node="">" He had no idea how close it was to being torn down, and with it the Iron Curtain and the Cold War. The cost of maintaining the Soviet Union and its satellites against widespread dissent was too great. The economy was beyond control. Communist Party membership was falling off. As the region was falling into poverty and cynicism, Gorbachev had proposed to the </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/27th_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="27th Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="2011" instrument_node="">27th Congress of the Communist Party of the Soviet Union</span></a><span data-dcnode-id="2009" instrument_node=""> on March 6, 1986, policies of </span><a data-dcnode-id="2007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="2008" instrument_node="">glasnost</span></a><span data-dcnode-id="2006" instrument_node="">, or candidness of governmental process, and </span><a class="mw-redirect" data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peristroika" title="Peristroika"><span data-dcnode-id="2005" instrument_node="">peristroika</span></a><span data-dcnode-id="2003" instrument_node="">, reorganization.
</span></p><p data-dcnode-id="1991"><span data-dcnode-id="2001" instrument_node="">The sibling policies amounted to a license to self-determine. In May, 1989, Hungary, acting on its own, opened the border between itself and Austria, negating the Berlin wall, as Germans could travel between the two Germanies via Hungary and Austria. Its demolition began on November 9. </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_reunification" title="German reunification"><span data-dcnode-id="2000" instrument_node="">German reunification</span></a><span data-dcnode-id="1998" instrument_node=""> was declared complete (and is celebrated as such) on October 3, 1990, considered the final settlement of World War II after 45 years of occupation. Russian troops everywhere were going home. Without fear of military intervention, the republics of the Soviet Union were negotiating their release and declaring independence. The </span><a data-dcnode-id="1996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="1997" instrument_node="">dissolution of the Soviet Union</span></a><span data-dcnode-id="1995" instrument_node=""> was declared by itself on December 26, 1991. Gorbachev had been its last President. He was to recede gradually into obscurity. The President of Russia, </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="1994" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="1992" instrument_node="">, came to the fore. The Russian flag flew that evening at the Kremlin. The nations of the Warsaw Pact were no less eager to escape from it. The Pact declared itself dissolved on July 1, 1991, from lack of members.
</span></p><p data-dcnode-id="1967"><span data-dcnode-id="1990" instrument_node="">In 1990, with the collapse of the Warsaw Pact impending, the United States reversed its "hands-off" policy and began to seek military-to-military contacts with individual nations of the Eastern Bloc through </span><a data-dcnode-id="1988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_European_Command" title="United States European Command"><span data-dcnode-id="1989" instrument_node="">EUCOM</span></a><span data-dcnode-id="1987" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unified_Combatant_Command" title="Unified Combatant Command"><span data-dcnode-id="1986" instrument_node="">Unified Combatant Command</span></a><span data-dcnode-id="1984" instrument_node=""> that would logically have jurisdiction over such contacts. The </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_Defense" title="United States Department of Defense"><span data-dcnode-id="1983" instrument_node="">DoD</span></a><span data-dcnode-id="1981" instrument_node=""> was encouraged to do so by </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Palmer" title="Mark Palmer"><span data-dcnode-id="1980" instrument_node="">Robie Palmer</span></a><span data-dcnode-id="1978" instrument_node="">, ambassador to Hungary, supported by </span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caspar_Weinberger" title="Caspar Weinberger"><span data-dcnode-id="1977" instrument_node="">Caspar Weinberger</span></a><span data-dcnode-id="1975" instrument_node="">.</span><sup class="reference" data-dcnode-id="1972" id="cite_ref-22"><a data-dcnode-id="1973" href="#cite_note-22"><span data-dcnode-id="1974" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1971" instrument_node=""> Palmer's new views were based on his observation of the "regime change" associated with the </span><a class="mw-redirect" data-dcnode-id="1969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/End_of_communism_in_Hungary_%281989%29" title="End of communism in Hungary (1989)"><span data-dcnode-id="1970" instrument_node="">end of communism in Hungary (1989)</span></a><span data-dcnode-id="1968" instrument_node="">. Despite the fiasco of 1956, the Hungarians were still interested in the support of the United States. They had nothing to fear from Soviet tanks now.
</span></p><p data-dcnode-id="1956"><span data-dcnode-id="1966" instrument_node="">A former member of the </span><a class="mw-redirect" data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_Rights_Movement" title="Civil Rights Movement"><span data-dcnode-id="1965" instrument_node="">Civil Rights Movement</span></a><span data-dcnode-id="1963" instrument_node=""> and the </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Student_Nonviolent_Coordinating_Committee" title="Student Nonviolent Coordinating Committee"><span data-dcnode-id="1962" instrument_node="">Student Nonviolent Coordinating Committee</span></a><span data-dcnode-id="1960" instrument_node="">, as well as being co-founder of the </span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Endowment_for_Democracy" title="National Endowment for Democracy"><span data-dcnode-id="1959" instrument_node="">National Endowment for Democracy</span></a><span data-dcnode-id="1957" instrument_node="">, Palmer was idealistically motivated to help bring about democracy in the Eastern Bloc nations. In 1988 and 1989 he had already initiated friendly visits between five NATO nations and five Warsaw Pact nations, which impressed both sides with their spirit of conviviality. These experiences were building confidence in amicable partnership. Both sides were learning that they did not need to be enemies.
</span></p><span data-dcnode-id="1955" instrument_node="">
</span><h3 data-dcnode-id="1945"><span class="mw-headline" data-dcnode-id="1953" id="Pre-partnership_programs_and_problems"><span data-dcnode-id="1954" instrument_node="">Pre-partnership programs and problems</span></span><span class="mw-editsection" data-dcnode-id="1946"><span class="mw-editsection-bracket" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">[</span></span><a data-dcnode-id="1949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D19" title="Edit section: Pre-partnership programs and problems"><span data-dcnode-id="1950" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">As the Soviet Union disintegrated between 1989 and 1991, U.S. government officials explored options to minimize instability and encourage democratic governments in the former Soviet bloc nations. One effort to address these policy goals was to expand military-to-military contacts with the newly independent states of Central and Eastern Europe. At the time the United States cautiously put the new policy before the Soviet Union. There would be in fact a failed attempt at a military coup in favor of restoring the old Soviet Union. The Americans not only found ready assent from the new Soviet Union, but that Union itself was asking for the assistance Reagan had promised if democratic and humanitarian measures were taken, such as tearing down the wall.
</span></p><p data-dcnode-id="1932"><span data-dcnode-id="1941" instrument_node="">In 1989 the DOD sponsored the Interagency Working Groups (IWG's) for the purpose of developing mil-to-mil contacts, one with the Soviet Union and one with Eastern and Central Europe. They were to be the oversight, or steering groups. The US-Soviet Union IWG did not outlast the break-up of the Soviet Union. The East Europe IWG met on August 15, 1990, to formulate objectives, of which the first was "Promoting development of non-political militaries accountable to democratically elected civilian leadership."</span><sup class="reference" data-dcnode-id="1938" id="cite_ref-23"><a data-dcnode-id="1939" href="#cite_note-23"><span data-dcnode-id="1940" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1937" instrument_node=""> In November, 1990, the East Europe IWG initiated a two-year program of "confidence-building visits" by staff members of EUCOM: the legal advisor, the chaplain, the surgeon, etc., with reciprocal visits to EUCOM headquarters.</span><sup class="reference" data-dcnode-id="1934" id="cite_ref-24"><a data-dcnode-id="1935" href="#cite_note-24"><span data-dcnode-id="1936" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1933" instrument_node=""> The purpose of the visits was to open and maintain dialogues on various special topics. In November, 1991, the IWG delegated the authority to initiate such contacts in Europe to EUCOM.
</span></p><p data-dcnode-id="1921"><span data-dcnode-id="1931" instrument_node="">As the Soviet Union defeated an </span><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1991_Soviet_coup_d%27%25C3%25A9tat_attempt" title="1991 Soviet coup d'état attempt"><span data-dcnode-id="1930" instrument_node="">attempted military coup in August, 1991</span></a><span data-dcnode-id="1928" instrument_node="">, which was attempting a restoration, and began to lose its Republics at an accelerated pace, the DoD became embued with a sense of urgency that outran the two-year program. </span><a data-dcnode-id="1926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dick_Cheney" title="Dick Cheney"><span data-dcnode-id="1927" instrument_node="">Dick Cheney</span></a><span data-dcnode-id="1925" instrument_node="">, </span><a data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Secretary_of_Defense" title="United States Secretary of Defense"><span data-dcnode-id="1924" instrument_node="">United States Secretary of Defense</span></a><span data-dcnode-id="1922" instrument_node="">, created independently a program of Bilateral Working Groups (BWG's), one per nation. A BWG would consist of senior officers in EUCOM and others from the host nation. They would agree to discuss "defense restructuring and reorganization." The BWG's began in September, 1992. In November, Cheney turned the program over to the remaining IWG.
</span></p><p data-dcnode-id="1915"><span data-dcnode-id="1920" instrument_node="">Meanwhile, elated by its success, EUCOM went what turned out to be a bridge too far in proposing the EUCOM Coordination and Assistance Program (EUCAP), which would take the contact initiative away from the Eastern Bloc countries. The Americans themselves would identify and approach candidates instead of waiting for their applications. The Americans would on their own approach the country to discuss its "interests and capabilities," offering a total package of military reconstruction.</span><sup class="reference" data-dcnode-id="1917" id="cite_ref-25"><a data-dcnode-id="1918" href="#cite_note-25"><span data-dcnode-id="1919" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1916" instrument_node="">
</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1914" instrument_node="">After consultation with the </span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Department_of_State" title="United States Department of State"><span data-dcnode-id="1913" instrument_node="">United States Department of State</span></a><span data-dcnode-id="1911" instrument_node="">, EUCOM forwarded its ambitious proposal to </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colin_Powell" title="Colin Powell"><span data-dcnode-id="1910" instrument_node="">Colin Powell</span></a><span data-dcnode-id="1908" instrument_node="">, CJCS, on February 27, 1992. On December 16, 1991, Powell had already presented to his staff his idea of "contact teams." One team of about 50 specialists would spend 6–12 months helping a host country reorganize its military.</span><sup class="reference" data-dcnode-id="1905" id="cite_ref-26"><a data-dcnode-id="1906" href="#cite_note-26"><span data-dcnode-id="1907" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1904" instrument_node=""> The program's written goals aimed at every conceivable ideal from respect for human rights, the rule of law, political democracy, and a market economy, to a complete understanding of and sensitivity to American culture; in short, total Americanization. They would in fact be trying to redefine the national culture.
</span></p><p data-dcnode-id="1898"><span data-dcnode-id="1902" instrument_node="">In the Spring of 1992, all the proposals arrived at the President's desk in Washington. The Presidential watch had changed. </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_H._W._Bush" title="George H. W. Bush"><span data-dcnode-id="1901" instrument_node="">George H. W. Bush</span></a><span data-dcnode-id="1899" instrument_node="">, Reagan's Vice President, was President since January, 1989. He was concerned about political stability and the disposition of the nuclear weapons in the possession of the former Soviet republics. Aiming at creating a stable policy for the region, he affirmed the IWG as the steering organization and turned over all the relevant programs to it.
</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1897" instrument_node="">During the previous year, meanwhile, Gorbachev, seeing the end coming, had been struggling to create some portable unity that would carry on after the fall of the Soviet Union. He proposed changing the government to a federation called the </span><a class="mw-redirect" data-dcnode-id="1895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Sovereign_States" title="Union of Sovereign States"><span data-dcnode-id="1896" instrument_node="">Union of Sovereign States</span></a><span data-dcnode-id="1894" instrument_node="">, a less centralized government in which the Republics would have more independence. It failed to win the unanimous approval of the nine loyal Republics (out of 15, the other six abstaining from the vote). A second proposal for the </span><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="1893" instrument_node="">Commonwealth of Independent States</span></a><span data-dcnode-id="1891" instrument_node=""> (CIS) was accepted and co-existed temporarily with the Soviet Union. It was an agreement to act together in matters of trade and security. Its core was the loyal nine, but the total membership would grow to 12.
</span></p><p data-dcnode-id="1864"><span data-dcnode-id="1889" instrument_node="">The difference between the 12 and the 15 was the three </span><a class="mw-redirect" data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_States" title="Baltic States"><span data-dcnode-id="1888" instrument_node="">Baltic States</span></a><span data-dcnode-id="1886" instrument_node="">: </span><a data-dcnode-id="1884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lithuania" title="Lithuania"><span data-dcnode-id="1885" instrument_node="">Lithuania</span></a><span data-dcnode-id="1883" instrument_node="">, </span><a data-dcnode-id="1881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvia" title="Latvia"><span data-dcnode-id="1882" instrument_node="">Latvia</span></a><span data-dcnode-id="1880" instrument_node="">, and </span><a data-dcnode-id="1878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estonia" title="Estonia"><span data-dcnode-id="1879" instrument_node="">Estonia</span></a><span data-dcnode-id="1877" instrument_node="">. They had been part of the </span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="1876" instrument_node="">Russian Empire</span></a><span data-dcnode-id="1874" instrument_node="">, which inherited them from the </span><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish%25E2%2580%2593Lithuanian_Commonwealth" title="Polish–Lithuanian Commonwealth"><span data-dcnode-id="1873" instrument_node="">Polish–Lithuanian Commonwealth</span></a><span data-dcnode-id="1871" instrument_node="">. The Russian Empire ended in 1917. The Baltics were ceded to Germany by the </span><a data-dcnode-id="1869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brest-Litovsk" title="Treaty of Brest-Litovsk"><span data-dcnode-id="1870" instrument_node="">Treaty of Brest-Litovsk</span></a><span data-dcnode-id="1868" instrument_node="">, March 3, 1918. When Germany conceded the loss of World War I, it attempted to retain the Baltics, who had been the left flank of the Eastern Front, through the use of </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freikorps" title="Freikorps"><span data-dcnode-id="1867" instrument_node="">Freikorps</span></a><span data-dcnode-id="1865" instrument_node="">, supposedly non-national mercenary volunteers.
</span></p><p data-dcnode-id="1849"><span data-dcnode-id="1863" instrument_node="">The </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="1862" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="1860" instrument_node=""> began shortly and was settled by the </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="1859" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="1857" instrument_node="">, which lasted November, 1917, through October, 1922. Units from the Baltic states fought on both sides, red (Bolshevik) and white (Czarist). The predominant theme in the states themselves was independence.</span><sup class="reference" data-dcnode-id="1854" id="cite_ref-27"><a data-dcnode-id="1855" href="#cite_note-27"><span data-dcnode-id="1856" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1853" instrument_node=""> The western victors of WW I withheld any interference in the Russian Civil War, except for a disastrous attempted rescue of the Czar by British forces, which ended in the massacre of the Czar and all his family. At the end of the Civil War the Baltics were independent. The new Soviet Union was not strong enough to recapture them. On September 22, 1921, the </span><a data-dcnode-id="1851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="1852" instrument_node="">League of Nations</span></a><span data-dcnode-id="1850" instrument_node=""> made a statement of its own by admitting the Baltic states.
</span></p><p data-dcnode-id="1844"><span data-dcnode-id="1848" instrument_node="">The Baltics were recaptured by invasion after the </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="1847" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="1845" instrument_node=""> (popularly known as the Stalin–Hitler Pact) of August 23, 1939, in which Stalin and Hitler divided Poland into spheres of influence. Hitler's invasion of Poland was the immediate cause of WW II. The Baltics considered Stalin's invasion and therefore his acquisition of their countries illegal and invalid acts. On March 11, 1990, Lithuania redeclared independence, Latvia on August 21, 1991, and Estonia on August 20, 1991. Russian troops still occupied the countries. The Russians owned much of the industrial capacities. There was some Russian resistance to their departure, but Gorbachev was obliged to follow his policies. In 1991 the Russians abroad were left hanging without authorization, as their current country had not stationed them there. It was to be years before national partitions were complete, during which Russians and Americans coexisted in the same countries.
</span></p><p data-dcnode-id="1836"><span data-dcnode-id="1843" instrument_node="">The United States, under some urgency to forestall any Eastern-bloc backsliding, accelerated its IWG Program. Combining EUCOM's EUCAP with his own Contact Teams concept, on April 22, 1992, </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colin_Powell" title="Colin Powell"><span data-dcnode-id="1842" instrument_node="">Colin Powell</span></a><span data-dcnode-id="1840" instrument_node=""> presented the Charter of a new program, the Joint Contact Team Program (JCTP). Command was to be entrusted to USCINCEUR (U.S. Command-in-Chief Europe, then Army General </span><a data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Shalikashvili" title="John Shalikashvili"><span data-dcnode-id="1839" instrument_node="">John Shalikashvili</span></a><span data-dcnode-id="1837" instrument_node="">), the head of EUCOM. Contact Teams were to be sent forthwith to Hungary, Poland, and Czechoslovakia. The JCTP was to feature a Headquarters Contact Team Program Office (CCTPO), as many Military Liaison Teams (MLT's) as there were host countries contacted, and the first contact personnel, the Traveling Contact Teams (TCT's).
</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1835" instrument_node="">Attempted implementation of the program revealed its weaknesses immediately. Planned in the halls of </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Pentagon" title="The Pentagon"><span data-dcnode-id="1834" instrument_node="">the Pentagon</span></a><span data-dcnode-id="1832" instrument_node="">, it was somewhat too grandiose for the field. Initially not enough qualified persons bilingual in the desired languages could be found even to begin the program. The DoD advertised for bilingual volunteers, conducting telephone interviews with the few bilinguals they did have. Eventually a concentration was found in the </span><a data-dcnode-id="1830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/10th_Special_Forces_Group_%28United_States%29" title="10th Special Forces Group (United States)"><span data-dcnode-id="1831" instrument_node="">10th Special Forces Group</span></a><span data-dcnode-id="1829" instrument_node="">, a unit that had been working with EUCOM in Europe. They were recruited, but with an unforeseen effect in public relations. They were not hired for their fighting skills, yet it appeared that the program was preparing for some sort of invasive effort, which served to delay their acceptance. A sufficient number of bilinguals was not recruited until late in 1993. Meanwhile, they had to begin with what they had.
</span></p><p data-dcnode-id="1820"><span data-dcnode-id="1827" instrument_node="">By 1992, the MLT for the first country, Hungary, was only partly in place. Pushing on, the IWG was planning to send MLT's to Czechoslovakia and Poland, but the split of Czechoslovakia into the </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czech_Republic" title="Czech Republic"><span data-dcnode-id="1826" instrument_node="">Czech Republic</span></a><span data-dcnode-id="1824" instrument_node=""> and </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slovakia" title="Slovakia"><span data-dcnode-id="1823" instrument_node="">Slovakia</span></a><span data-dcnode-id="1821" instrument_node=""> caused them to be deferred until 1993. Plans were made to extend invitations to all the Central and Eastern European countries, but the State Department reneged temporarily. The ambassadors believed it was too precipitous. Unrest in Romania and potential unrest in Albania caused their deferment. Despite the delays the IWG gradually began to approve countries for MLT's.
</span></p><p data-dcnode-id="1814"><span data-dcnode-id="1819" instrument_node="">With the expansion, a second difficulty began to appear, this time within the DoD. The Joint Staff was having a problem finding funds for the large budget submitted by EUCOM for only three host countries.</span><sup class="reference" data-dcnode-id="1816" id="cite_ref-28"><a data-dcnode-id="1817" href="#cite_note-28"><span data-dcnode-id="1818" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1815" instrument_node=""> It was at this time that CJCS initiated a search for special funds to enhance the regular budgets of the agencies involved. By 1994 the cost had run so high, 13 million as opposed to 1993's 6 million, that obtaining any money from Washington was an uncertain and tedious process, not one which would secure reliable funds. To fund all the liaisons planned for the JCTP was unthinkable.
</span></p><p data-dcnode-id="1808"><span data-dcnode-id="1813" instrument_node="">The final nail in the coffin of the program as it was then might be termed psycho-political. It was based on fear and mistrust of the United States. EUCOM attempting to extend the JCTP to the CIS, the nine plus Republics loyal to Russia, was being stone-walled. An interest was overtly expressed, but no approvals seemed to be able to be secured, which could only be the result of clandestine rejection by Russia. The JCTP was giving the wrong impression. The CIS did not want Americanization, and certainly did not want a longer-term American presence. It appeared as though the Americans wished to take the place of the Soviet Union. Russia was having second thoughts.</span><sup class="reference" data-dcnode-id="1810" id="cite_ref-29"><a data-dcnode-id="1811" href="#cite_note-29"><span data-dcnode-id="1812" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1809" instrument_node=""> The JCTP was at an impasse.
</span></p><span data-dcnode-id="1807" instrument_node="">
</span><h3 data-dcnode-id="1797"><span class="mw-headline" data-dcnode-id="1805" id="Partnership_Program_solution"><span data-dcnode-id="1806" instrument_node="">Partnership Program solution</span></span><span class="mw-editsection" data-dcnode-id="1798"><span class="mw-editsection-bracket" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">[</span></span><a data-dcnode-id="1801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D20" title="Edit section: Partnership Program solution"><span data-dcnode-id="1802" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1796" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1795" instrument_node="">The solution to the impasse, as far as it could be solved, was already within the JCTP. Success was a matter of its being recognized by the senior officers. It had begun as an attempt to add the Baltic states to the list of prospective hosts. An MLT was already partly established in Hungary, the first host country. The Czech Republic, Slovakia, and Poland were deferred pending their achievement of stability. Romania, Bulgaria, and Albania were next, to be followed by the Baltic states.</span><sup class="reference" data-dcnode-id="1792" id="cite_ref-30"><a data-dcnode-id="1793" href="#cite_note-30"><span data-dcnode-id="1794" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1791" instrument_node="">
</span></p><p data-dcnode-id="1775"><span data-dcnode-id="1789" instrument_node="">Meanwhile, NATO was not waiting for the United States to solve its impasses. At its </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1990_London_summit" title="1990 London summit"><span data-dcnode-id="1788" instrument_node="">July, 1990, Summit Meeting</span></a><span data-dcnode-id="1786" instrument_node="">, it had determined to extend "the hand of friendship" to the Eastern Bloc. Over the course of the next year, a new organization was proposed, the </span><a class="mw-redirect" data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Cooperation_Council" title="North Atlantic Cooperation Council"><span data-dcnode-id="1785" instrument_node="">North Atlantic Cooperation Council</span></a><span data-dcnode-id="1783" instrument_node=""> (NACC) to include Warsaw Pact and CIS nations.</span><sup class="reference" data-dcnode-id="1780" id="cite_ref-31"><a data-dcnode-id="1781" href="#cite_note-31"><span data-dcnode-id="1782" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1779" instrument_node=""> Its Charter was presented at the </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1991_Rome_summit" title="1991 Rome summit"><span data-dcnode-id="1778" instrument_node="">1991 Rome summit</span></a><span data-dcnode-id="1776" instrument_node=""> in November. By providing mutual consultation services it would smooth over and help to stabilize the end of the Soviet Union. Its first meeting, on December 20, 1991, was interrupted by a message informing the Soviet ambassador his country did not exist any longer.
</span></p><p data-dcnode-id="1760"><span data-dcnode-id="1774" instrument_node="">Latvia had belonged to the NACC from its very beginning. As the reputation of the JCTP began to spread, Latvia made an unusual request in July, 1992, to the NACC, with which it was familiar, rather than to the JCTP itself. It wanted to join, but it did not want the coaching of an active United States Army unit. Instead it passed the word to the NACC that it would prefer a National Guard unit.</span><sup class="reference" data-dcnode-id="1771" id="cite_ref-32"><a data-dcnode-id="1772" href="#cite_note-32"><span data-dcnode-id="1773" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1770" instrument_node=""> This was a surprise because in the past Latvia had recruited some of Europe's best elite professional troops, such as the </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvian_Riflemen" title="Latvian Riflemen"><span data-dcnode-id="1769" instrument_node="">Latvian Rifles</span></a><span data-dcnode-id="1767" instrument_node="">. There were but few in Latvia who remembered them. They fought for the </span><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsar" title="Tsar"><span data-dcnode-id="1766" instrument_node="">Tsar</span></a><span data-dcnode-id="1764" instrument_node="">, then for the </span><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsheviks" title="Bolsheviks"><span data-dcnode-id="1763" instrument_node="">Bolsheviks</span></a><span data-dcnode-id="1761" instrument_node="">. Detained subsequently in Russia, most never got home again.
</span></p><p data-dcnode-id="1739"><span data-dcnode-id="1759" instrument_node="">The military needs of all the Baltic states are far different now than they were in 1915. The states are too small to put up much of a defense as individual countries; moreover, the terrain is mainly indefensible. Any defense force could be easily outflanked by a larger army.</span><sup class="reference" data-dcnode-id="1756" id="cite_ref-33"><a data-dcnode-id="1757" href="#cite_note-33"><span data-dcnode-id="1758" instrument_node="">[33]</span></a></sup><span data-dcnode-id="1755" instrument_node=""> It is true that the retreating army of the 3rd Reich for a time formed a </span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redoubt" title="Redoubt"><span data-dcnode-id="1754" instrument_node="">redoubt</span></a><span data-dcnode-id="1752" instrument_node=""> on the </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Courland" title="Courland"><span data-dcnode-id="1751" instrument_node="">Kurland</span></a><span data-dcnode-id="1749" instrument_node=""> Peninsula, but it had no hope of victory, and was forced to surrender. It is also true that the extensive forest of the </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valdai_Hills" title="Valdai Hills"><span data-dcnode-id="1748" instrument_node="">Valdai Hills</span></a><span data-dcnode-id="1746" instrument_node=""> in adjoining Russia gave shelter to </span><a class="mw-redirect" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forest_Brothers" title="Forest Brothers"><span data-dcnode-id="1745" instrument_node="">various successful partisan groups</span></a><span data-dcnode-id="1743" instrument_node="">. Wars are not won by partisans alone. The Latvian Rifles only fought for Latvia as units in the Tsar's army. They were expected to hold their sector of the </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Front_%28World_War_I%29" title="Eastern Front (World War I)"><span data-dcnode-id="1742" instrument_node="">Eastern Front</span></a><span data-dcnode-id="1740" instrument_node="">, but as the war retreated from there, so did they.
</span></p><p data-dcnode-id="1734"><span data-dcnode-id="1738" instrument_node="">Baltic military experts, still expert, were perfectly familiar with these well-known circumstances. The Latvians did not therefore plan for more than a token professional army as a sort of inner guiding corps. With the defeat of the Russian coup in August, 1991, they knew that they would be allowed to rebuild a military. Their very first unit of August was the </span><a data-dcnode-id="1736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latvian_National_Guard" title="Latvian National Guard"><span data-dcnode-id="1737" instrument_node="">Latvian National Guard</span></a><span data-dcnode-id="1735" instrument_node="">, a contingent of citizen-soldiers. They were not first of all outsiders. They would be defending the country in which they were born and raised, nor could any foreign power remove them from there for missions not their own. Second, they were needed to work with civilian authorities for solving domestic problems of security and order. The requirement did not fit the mold of mil-to-mil associations; therefore, they requested an American unit that could work with civilians.
</span></p><p data-dcnode-id="1716"><span data-dcnode-id="1733" instrument_node="">The DoD response to a request from the new Latvian Republic through the JACC for assistance building a National Guard called </span><i data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Zemessargi</span></i><span data-dcnode-id="1730" instrument_node="">, "Land National Guard," to distinguish it from the previous </span><i data-dcnode-id="1727"><a data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aizsargi" title="Aizsargi"><span data-dcnode-id="1729" instrument_node="">Aizsargi</span></a></i><span data-dcnode-id="1726" instrument_node="">, "National Guard," which had served the German occupation army until its dissolution by the Soviets in 1945, developed from suggestion to real beginning between January and November, 1992. Learning by some means that the JCTP would need a Guard unit, </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_B._Conaway" title="John B. Conaway"><span data-dcnode-id="1725" instrument_node="">John B. Conaway</span></a><span data-dcnode-id="1723" instrument_node="">, Chief of the </span><a data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Guard_Bureau" title="National Guard Bureau"><span data-dcnode-id="1722" instrument_node="">National Guard Bureau</span></a><span data-dcnode-id="1720" instrument_node="">, wrote to </span><a data-dcnode-id="1718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colin_Powell" title="Colin Powell"><span data-dcnode-id="1719" instrument_node="">Colin Powell</span></a><span data-dcnode-id="1717" instrument_node=""> offering the services of the United States National Guard. Having already taken the initiative to develop a Guard solution to the impasse, he had been waiting for some such opportunity as this.
</span></p><p data-dcnode-id="1706"><span data-dcnode-id="1715" instrument_node="">He, Vance Renfroe (a senior officer in the ANG), Wayne Gosnell (a senior officer in the ARNG), Max Alston (Army Reserve, retired), and staff, had been planning a new form of assistance, later to be called the SPP. For now, it was simply "the Baltic initiative." In retropect, Air Force Col. Joey Booher, Chief of International Affairs for the NGB, said: “The U.S. was trying to engage with the former communist nations that were in the Warsaw Pact, and using active duty troops might have been a little too offensive to the Russians or the folks that were in there, so the idea was to use the small footprint of National Guard troops."</span><sup class="reference" data-dcnode-id="1712" id="cite_ref-marshall_3-1"><a data-dcnode-id="1713" href="#cite_note-marshall-3"><span data-dcnode-id="1714" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1711" instrument_node=""> The "small footprint" also included an economic smallness. The Boehm source reports that "In the United States, it had been shown that operating a standing army costs 80 percent more than a reserve element.</span><sup class="reference" data-dcnode-id="1708" id="cite_ref-34"><a data-dcnode-id="1709" href="#cite_note-34"><span data-dcnode-id="1710" instrument_node="">[34]</span></a></sup><span data-dcnode-id="1707" instrument_node="">
</span></p><p data-dcnode-id="1700"><span data-dcnode-id="1705" instrument_node="">The plan was considered complete in January (even though the best was yet to come). Conaway was able to write to Powell, "The National Guard stands ready to advise and assist in the formation of U.S.-style National Guard military structures in the countries of the former Soviet Union, the Baltic Republics and the former Warsaw Pact, and to assist authorities in cooperative self-help projects to enhance democratization and stabilization of the countries of the region." Powell replied on 24 January, "I appreciate your insights and offer of assistance. Your expertise will be invaluable as we enhance our contacts with the former Soviet-bloc countries."</span><sup class="reference" data-dcnode-id="1702" id="cite_ref-35"><a data-dcnode-id="1703" href="#cite_note-35"><span data-dcnode-id="1704" instrument_node="">[35]</span></a></sup><span data-dcnode-id="1701" instrument_node="">
</span></p><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">In a conference of February 18, Conaway further explained that possible areas of cooperation included "civil affairs," and "teams for cooperative humanitarian or civic assistance projects." He suggested the employment of "personnel with civilian sector skills." These paternalistic goals went far beyond the usual combat role of soldiers and were not aptly described by "mil-to-mil contacts." To support them Conaway used the description "a decentralized system of deployable resources" without any necessary implication of military resources.
</span></p><p data-dcnode-id="1692"><span data-dcnode-id="1697" instrument_node="">On April 1 Dick Cheney added "humanitarian assistance" and "crisis management" in an address to NATO at Brussels redefining U.S. goals for East Europe. He was careful to reassert that these were roles of the military: "Helping to build democracy through the appropriate roles for European militaries including civilian command, a hallmark of Western democracies."</span><sup class="reference" data-dcnode-id="1694" id="cite_ref-36"><a data-dcnode-id="1695" href="#cite_note-36"><span data-dcnode-id="1696" instrument_node="">[36]</span></a></sup><span data-dcnode-id="1693" instrument_node=""> Some weeks after, the U.S. Embassy in Stockholm received a letter from the Latvian Deputy Minister of Defense, Valdis Pavlovskis, inviting USCOM to assist Latvia in implementing the deployable reserve.
</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1691" instrument_node="">The show was on, so to speak. It was to be presented to the three clients that November in a special visit of select top DoD officials to the Baltic capital cities. It was not complete yet, the most characteristic feature developing at the last moment. The NGB published a paper on November 4 referring to "the Baltic Initiative" of the JCPT. As a sort of afterthought, it suggested that each Baltic country be assigned a "partnership state," the Guard of which would take charge of mil-to-mil (or mil-to-civilian) exchanges. Shortly the suggestion became a full-blown proposal of the program, with Michigan to be assigned to Latvia, Pennsylvania to Lithuania, and less certainly New Jersey or New York to Estonia. Maryland was the final choice for Estonia, based on the existence of a large Estonian immigrant community there, who could provide bilinguals. The NGB called these relationships "sustaining partnerships."</span><sup class="reference" data-dcnode-id="1688" id="cite_ref-37"><a data-dcnode-id="1689" href="#cite_note-37"><span data-dcnode-id="1690" instrument_node="">[37]</span></a></sup><span data-dcnode-id="1687" instrument_node="">
</span></p><p data-dcnode-id="1680"><span data-dcnode-id="1685" instrument_node="">In the last few weeks of November, 1992, a visitation of 38 interagency dignitaries alighted upon the Baltics by air with full authority to unroll the program as persuasively as they could. They had no authority to implement it. The delegation included Lieutenant General John Conaway, the Chief of the National Guard Bureau, and Brigadier General Thomas Lennon, head of the JCTP.</span><sup class="reference" data-dcnode-id="1682" id="cite_ref-38"><a data-dcnode-id="1683" href="#cite_note-38"><span data-dcnode-id="1684" instrument_node="">[38]</span></a></sup><span data-dcnode-id="1681" instrument_node=""> They were very persuasive. All three Baltic states signed on enthusiastically, professing a readiness to start immediately. The delegation was not ready to start. First it must acquire authority from the United States Government, which, apparently, was cautiously testing their interest.
</span></p><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Encouraged by the success of the mission, the IWG approved the SPP on 27 January 1993. Subsequently, the DoD changed the traditional reserve role of the Guard for this case, to permit it to undertake "an active component mission." John Shalikashvili, head of EUCOM, briefed NATO and Russia's military, to avoid any sudden changes that might be misinterpreted. Having completed these steps, he added his approval in March. The State Department was asked to arrange the details through the ambassadors. Conaway gave the final NGB approval on April 27, after which the process, finally considered approved, moved rapidly. So far the dignitaries on both sides had planned and communicated but no active partnership had taken place.
</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1677" instrument_node="">Finally in April the first members of the MLT for Estonia arrived in </span><a data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tallinn" title="Tallinn"><span data-dcnode-id="1676" instrument_node="">Tallinn</span></a><span data-dcnode-id="1674" instrument_node=""> with members of the New York NG. The MLT for Latvia, including members of the Michigan NG, arrived in </span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Riga" title="Riga"><span data-dcnode-id="1673" instrument_node="">Riga</span></a><span data-dcnode-id="1671" instrument_node=""> in early May, a few days after the Estonian team in Tallinn. Uniformed Russians were still in the country. Some of the Estonian clients had recently been officers of the Soviet Union. The Lithuanian MLT was the last to arrive, in Vilnius, in mid-May, bringing a few members of the Pennsylvania NG. These delegates were planners. It was their task to set up joint events.</span><sup class="reference" data-dcnode-id="1668" id="cite_ref-39"><a data-dcnode-id="1669" href="#cite_note-39"><span data-dcnode-id="1670" instrument_node="">[39]</span></a></sup><span data-dcnode-id="1667" instrument_node=""> The concept meanwhile was vending itself. By July 14 nine more paper partnerships were added, to be physically realized in 1994. They included three of the CIS: Kazakhstan, Ukraine, and Belarus. Later Belarus had second thoughts.
</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">The non-paper beginning of the SPP as a distinct program therefore is counted by the major Internet military sources as April, 1993, with Estonia taking the lead by a few days. It was not the first effort in the collusion direction. It did modify the first effort, which was the JCTP. It had already taken practical measures the year before. A TCT had been sent to Hungary in October, 1992. An MLT was started in Poland in February, 1993. These early JCTP countries converted to the SPP in the summer of 1993, not necessarily with a change of personnel, as the institutions of the JCTP were turned to the SPP.
</span></p><span data-dcnode-id="1663" instrument_node="">
</span><h2 data-dcnode-id="1653"><span class="mw-headline" data-dcnode-id="1661" id="Global_expansion_of_the_SPP"><span data-dcnode-id="1662" instrument_node="">Global expansion of the SPP</span></span><span class="mw-editsection" data-dcnode-id="1654"><span class="mw-editsection-bracket" data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">[</span></span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D21" title="Edit section: Global expansion of the SPP"><span data-dcnode-id="1658" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1651" instrument_node="">Having been recognized as a success under EUCOM, the SPP was in demand by other republics of the world in a variety of different security and humanitarian crises. The United States' response was to import the program to the five other Commands. Not all five existed at the time. The growth of the SPP is a sideshow (albeit an important one) of the growth of the new military signalled by the </span><a class="mw-redirect" data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Goldwater-Nichols_Act" title="Goldwater-Nichols Act"><span data-dcnode-id="1650" instrument_node="">Goldwater-Nichols Act</span></a><span data-dcnode-id="1648" instrument_node=""> of 1986, which put aside a long but often troublesome military tradition in favor of centralization, quick response, efficiency of joint operations (which nearly all were) and accountability. The act was one substantive answer to all questions of </span><a class="mw-redirect" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperial_presidency" title="Imperial presidency"><span data-dcnode-id="1647" instrument_node="">imperial presidency</span></a><span data-dcnode-id="1645" instrument_node=""> or any quasi-autonomous functioning of military or intelligence units.
</span></p><span data-dcnode-id="1643" instrument_node="">
</span><h3 data-dcnode-id="1633"><span class="mw-headline" data-dcnode-id="1641" id="Reorganization_of_the_military"><span data-dcnode-id="1642" instrument_node="">Reorganization of the military</span></span><span class="mw-editsection" data-dcnode-id="1634"><span class="mw-editsection-bracket" data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">[</span></span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D22" title="Edit section: Reorganization of the military"><span data-dcnode-id="1638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1631" instrument_node="">The immediate trigger of the change was the </span><a data-dcnode-id="1629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran_hostage_crisis" title="Iran hostage crisis"><span data-dcnode-id="1630" instrument_node="">Iran hostage crisis</span></a><span data-dcnode-id="1628" instrument_node=""> of 1979-1981, which began with the seizure of the American Embassy in </span><a data-dcnode-id="1626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tehran" title="Tehran"><span data-dcnode-id="1627" instrument_node="">Tehran</span></a><span data-dcnode-id="1625" instrument_node=""> by radical Islamic students (and others) contrary to International Law. On April 24, 1980, a military rescue operation was launched, </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Eagle_Claw" title="Operation Eagle Claw"><span data-dcnode-id="1624" instrument_node="">Operation Eagle Claw</span></a><span data-dcnode-id="1622" instrument_node="">, authorized by President </span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jimmy_Carter" title="Jimmy Carter"><span data-dcnode-id="1621" instrument_node="">Jimmy Carter</span></a><span data-dcnode-id="1619" instrument_node="">, which never arrived in Tehran, but ended in the desert, with some accidental loss of life. The expedition was troubled by poor planning, bad communications, and bad luck. It did not have enough momentum to carry through. The failure ended the careers of the officers in charge, but the consequences reached much further.
</span></p><p data-dcnode-id="1613"><span data-dcnode-id="1617" instrument_node="">The American public had before it a paradigm of how a hostage extraction should be conducted in </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Entebbe" title="Operation Entebbe"><span data-dcnode-id="1616" instrument_node="">Operation Entebbe</span></a><span data-dcnode-id="1614" instrument_node=""> on July 4, 1976. Airline passenger hostages were removed from an African airport after the defeat of their captors. The rescuing Israeli commandos simply flew into the airport in a surprise attack. The fact that their much more powerful and resourceful nation could not stage a reasonable facsimile was something of a scandal to Americans and a topic of ridicule to their allies. There were also rumors of inordinate spending, with inflated prices being set for everyday cheap items.
</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1612" instrument_node="">The new President Reagan did not hesitate. In 1981 he initiated a from-the-ground-up investigation of the entire military by the </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Packard_Commission" title="Packard Commission"><span data-dcnode-id="1611" instrument_node="">Packard Commission</span></a><span data-dcnode-id="1609" instrument_node="">. They were to look into the root causes of inefficiency and ineffectiveness and make recommendations to remedy them. They finished in 1985. Their recommendations were incorporated into the Goldwater-Nichols Act of 1986.
</span></p><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The Packard Commission reported that  the lack of communication and lack of cooperation came from a lack of "a rational system" rather than from criminal conspiracy or incompetence. Their analysis was primarily a business one, which was to be expected, as their numbers were culled from corporate leaders. In business, questions of system are primarily addressed by changing the management. In the DoD the management were the service chiefs, whose acronyms were preceded by CINC, "commander-in-chief." The Commission was recommending that they be taken out of the chain of command, popularly known as being "fired," and replaced by a "rational system."
</span></p><p data-dcnode-id="1601"><span data-dcnode-id="1605" instrument_node="">Accordingly, the Goldwater-Nichols Act summarized the independent actions of units that were supposed to be operating jointly under the terms "inter-service rivalry." Because of it, no joint system could be developed. As remedy, it altered the regular chain of command of the services by removing the </span><a data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_Chiefs_of_Staff" title="Joint Chiefs of Staff"><span data-dcnode-id="1604" instrument_node="">Joint Chiefs of Staff</span></a><span data-dcnode-id="1602" instrument_node=""> from it.
</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">Henceforward the former commanders of the armed services were to be only an advisory body to the President. The term CINC was dropped. Their importance in strategic planning was just as great as ever. Their authority, however, had been centralized and placed in another. The CJCS was made the President's chief military advisor. The </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chief_of_the_National_Guard_Bureau" title="Chief of the National Guard Bureau"><span data-dcnode-id="1599" instrument_node="">Chief of the National Guard Bureau</span></a><span data-dcnode-id="1597" instrument_node=""> also was made a joint chief, taking away his command of the Guard and rendering him into an advisor. The NGB does not "command" the NG.
</span></p><p data-dcnode-id="1591"><span data-dcnode-id="1595" instrument_node="">The President alone was not given the additional power quasi-imperial. The post of </span><a class="mw-redirect" data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secretary_of_Defense" title="Secretary of Defense"><span data-dcnode-id="1594" instrument_node="">Secretary of Defense</span></a><span data-dcnode-id="1592" instrument_node=""> was strengthened into the actual commander of the DoD. He (or she) must accept orders from the President. The President must have a Secretary of Defense, and must command through him. He must have been a civilian for at least seven years. Appointment to the position is subject to Congressional approval.
</span></p><span data-dcnode-id="1590" instrument_node="">
</span><h2 data-dcnode-id="1580"><span class="mw-headline" data-dcnode-id="1588" id="Footnotes"><span data-dcnode-id="1589" instrument_node="">Footnotes</span></span><span class="mw-editsection" data-dcnode-id="1581"><span class="mw-editsection-bracket" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">[</span></span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DState_Partnership_Program%26action%3Dedit%26section%3D23" title="Edit section: Footnotes"><span data-dcnode-id="1585" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1579" instrument_node="">

</span><li data-dcnode-id="1183" id="cite_note-17"><span class="mw-cite-backlink" data-dcnode-id="1207"><b data-dcnode-id="1208"><a aria-label="Jump up" data-dcnode-id="1209" href="#cite_ref-17" title="Jump up"><span data-dcnode-id="1210" instrument_node="">^</span></a></b></span><span data-dcnode-id="1206" instrument_node=""> </span><span class="reference-text" data-dcnode-id="1185"><span data-dcnode-id="1205" instrument_node="">The program was established in 1994 by NATO as an alternative to itself for new European nations formerly in </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yugoslavia" title="Yugoslavia"><span data-dcnode-id="1204" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="1202" instrument_node=""> or the </span><a data-dcnode-id="1200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="1201" instrument_node="">Soviet Union</span></a><span data-dcnode-id="1199" instrument_node="">, who were not qualified, not yet qualified, or did not prefer membership in NATO but needed some coaching and other assistance in maintaining their "sovereignty and territorial integrity," especially in the counter-terrorist field. Then President Clinton in a supportive speech given in </span><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw" title="Warsaw"><span data-dcnode-id="1198" instrument_node="">Warsaw</span></a><span data-dcnode-id="1196" instrument_node=""> in January 1994, proposed an annual fund subsequently dubbed the "Warsaw Initiative Fund," which began with FY 1996 and has not missed a year. Poland left the PfP in 1999 in favor of NATO. At the Wales NATO summit of September 2015, NATO voted to include Mediterranean nations in PfP. In 2015 the name of the fund was redubbed Wales Initiative Fund. Refer to </span><link data-dcnode-id="1195" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation report cs1" data-dcnode-id="1187" id="CITEREFSerafino,_Nina_M.2016"><span data-dcnode-id="1194" instrument_node="">Serafino, Nina M. (26 May 2016). </span><a class="external text" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fas.org/sgp/crs/natsec/R44444.pdf" rel="nofollow"><span data-dcnode-id="1193" instrument_node="">Security Assistance and Cooperation: Shared Responsibility of the Departments of State and Defense</span></a><span data-dcnode-id="1191" instrument_node=""> </span><span class="cs1-format" data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">(PDF)</span></span><span data-dcnode-id="1188" instrument_node=""> (Report). Congressional Research Service. p.&nbsp;55. R44444.</span></cite><span class="Z3988" data-dcnode-id="1186" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=report&amp;rft.btitle=Security+Assistance+and+Cooperation%3A+Shared+Responsibility+of+the+Departments+of+State+and+Defense&amp;rft.pages=55&amp;rft.pub=Congressional+Research+Service&amp;rft.date=2016-05-26&amp;rft.au=Serafino%2C+Nina+M.&amp;rft_id=https%3A%2F%2Ffas.org%2Fsgp%2Fcrs%2Fnatsec%2FR44444.pdf&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AState+Partnership+Program"></span></span><span data-dcnode-id="1184" instrument_node="">
