</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">The Legal Assistance Section, Office of the Legal Advisor, provides individualized legal support and personal transition information to HQ personnel and their dependents.</span></p><p data-dcnode-id="525"><img alt="legal logo" data-dcnode-id="527" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1117/0&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"><span data-dcnode-id="526" instrument_node="">We have a wealth of information and resources available to assist you before, during and after your move to the United States. We have developed a series of topical guides focused on legal-related matters and personal transition issues routinely encountered by staff and their family members. While this nine volume series contains information primarily relevant for staff members arriving from Europe and Canada, we are confident that Americans will also benefit given the variety of topics and issues addressed in this series. Our guides contain practical advise on preparations prior to your departure from your current assignment, what to expect upon arrival in the United States/Hampton Roads area, issues and matters you will likely encounter during your assignment, as well as issues encountered when preparing for departure for your next assignment.</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Our guides are not intended to provide a complete analysis of the subjects referenced therein (Arrivals and Staff Guide, Housing, Customs, Visa and Immigration, Healthcare, Vehicles and Driving, Education, Money Matters, Pets and Departure). They are rather a compilation of information assembled utilising United States Federal and Virginia State laws and regulations, lessons learned and best practices presented in a question and answer format. The information in our publications is believed accurate as of the date of the specific guide, but is subject to change as local regulations and policies become known. Efforts are made to keep the electronic versions posted on this website up to date.</span></p><p data-dcnode-id="517"><span data-dcnode-id="522" instrument_node="">These guides are password protected; please contact your national liaison representative or representatives in the Office of the Legal Advisor (</span><strong data-dcnode-id="519"><a data-dcnode-id="520" href="mailto:SACTHQPTS@act.nato.int"><span data-dcnode-id="521" instrument_node="">SACTHQPTS@act.nato.int</span></a></strong><span data-dcnode-id="518" instrument_node="">) for the current password.</span></p><p data-dcnode-id="512"><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//act.nato.int/newcomers-legal"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Click here</span></strong></a><span data-dcnode-id="513" instrument_node=""> to access the guides.</span></p><table data-dcnode-id="491"><tbody data-dcnode-id="492"><tr data-dcnode-id="493"><td data-dcnode-id="494"><p data-dcnode-id="502" style="text-align: center;"><span data-dcnode-id="511" instrument_node="">Legal and Personal Transition Information</span><br data-dcnode-id="510"><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Orientation for Newcomers</span></strong><br data-dcnode-id="507"><strong data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">will be conducted on scheduled dates in 2022.</span></strong><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">Spouses and partners are welcome!</span></p><p data-dcnode-id="495" style="text-align: center;"><span data-dcnode-id="501" instrument_node="">For further information please contact</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">+1 757 747 3900 or email </span><strong data-dcnode-id="496"><a data-dcnode-id="497" href="mailto:SACTHQPTS@act.nato.int"><span data-dcnode-id="498" instrument_node="">SACTHQPTS@act.nato.int</span></a></strong></p></td></tr></tbody></table><p data-dcnode-id="488"><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">We have walk-in legal assistance hours from 0900 to 1130 daily (no appointment or advance notification necessary) – other times are available by appointment.</span></strong></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Please do not hesitate to contact us if you have any legal-related or personal transition questions.</span></p><p data-dcnode-id="480"><span data-dcnode-id="485" instrument_node="">We can be reached at +1 757 747 3900 or by email: </span><strong data-dcnode-id="482"><a data-dcnode-id="483" href="mailto:SACTHQPTS@act.nato.int"><span data-dcnode-id="484" instrument_node="">SACTHQPTS@act.nato.int</span></a></strong><span data-dcnode-id="481" instrument_node="">.</span></p><span data-dcnode-id="479" instrument_node=""> </span></div><span data-dcnode-id="477" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Military Personnel (MILPERS)</span></h2><span data-dcnode-id="470" instrument_node=""> </span></div><span data-dcnode-id="468" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="295"><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">The Military Personnel Section mission is to focus business practices that support military personnel and their Families by delivering effective and sustainable human resources services and support.</span></p><p data-dcnode-id="462" style="text-align: center;"><strong data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Military Personnel Section Staff:</span></strong></p><table data-dcnode-id="418"><tbody data-dcnode-id="419"><tr data-dcnode-id="455"><td data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Section Head:</span></td><td data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">LCDR Lassiter</span></td><td data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">757-747-3954</span></td></tr><tr data-dcnode-id="448"><td data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Personnel Services Officer:</span></td><td data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">CW4 Urbina</span></td><td data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">757-747-4092</span></td></tr><tr data-dcnode-id="441"><td data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Superintendent:</span></td><td data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">SMSgt Morganfield</span></td><td data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">757-747-3531</span></td></tr><tr data-dcnode-id="434"><td data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">NCO:</span></td><td data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">SFC Shepard</span></td><td data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">757-747-3665</span></td></tr><tr data-dcnode-id="427"><td data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">NCO:</span></td><td data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">PSC Dittmer</span></td><td data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">757-747-4363</span></td></tr><tr data-dcnode-id="420"><td data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">NCO:</span></td><td data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">PSC Parsons</span></td><td data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">757-747-4164</span></td></tr></tbody></table><p data-dcnode-id="415" style="text-align: center;"><strong data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">WELCOME ABOARD</span></strong></p><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">The Military Personnel Section would like to extend to you an extremely warm welcome to Allied Command on behalf of the Staff of the Supreme Allied Command Transformation.</span></p><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">You are assigned to one of two strategic commands of the North Atlantic Treaty Organization (NATO), and for sure you will find the tour of duty to be very rewarding. You will have the opportunity to work with professionals from 30 NATO nations, 22 Partnership for Peace nations, all branches of the Armed Forces, and NATO civilians/contractors that comprise the staff of the Supreme Allied Command Transformation. The Alliance nations and their Partners have assembled a rich mix of talented and experienced staff to take on complex and demanding tasks, both here at Norfolk and at our subordinate organizations in Europe.</span></p><p data-dcnode-id="408" style="text-align: center;"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">MILITARY PERSONNEL CHECK IN</span></strong></p><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Upon arrival at the Headquarters, all military personnel must visit the Military Personnel Office to begin the check-in process. During this visit you will receive your "check-in sheet", which is a step-by-step in-processing document. You will also be provided with important information and documentation so you can begin obtaining your U.S. issued Common Access Card (CAC) and Headquarters' identification card.</span></p><table data-dcnode-id="345"><tbody data-dcnode-id="346"><tr data-dcnode-id="385"><td colspan="4" data-dcnode-id="386"><p data-dcnode-id="403" style="text-align: center;"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">International Military Personnel Documentation Requirements</span></strong></p><p data-dcnode-id="387"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Service Member:</span></strong><span data-dcnode-id="400" instrument_node=""> Valid Passport; Valid Visa; NATO Orders; Security Clearance; Original Marriage Certificate (if married) with English Translation</span><br data-dcnode-id="399"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Dependent (Spouse):</span></strong><span data-dcnode-id="396" instrument_node=""> Valid Passport; Valid Visa</span><br data-dcnode-id="395"><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Dependent (Child under 21 years of age):</span></strong><span data-dcnode-id="392" instrument_node=""> Valid Passport; Valid Visa; Original Birth Certificate with English Translation</span><br data-dcnode-id="391"><strong data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Dependent (Child 21-23 years of age):</span></strong><span data-dcnode-id="388" instrument_node=""> Valid Passport, Valid Visa; Original Birth Certificate with English Translation; Proof of certification from the school’s registrar’s office stating they are enrolled in full-time post-secondary education with anticipated graduation date, and provide proof that the education institution they are attending is accredited in accordance with U.S. requirements.</span></p></td></tr><tr data-dcnode-id="372"><td data-dcnode-id="382"><strong data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">U.S. Air Force</span></strong></td><td data-dcnode-id="379"><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">U.S. Army</span></strong></td><td data-dcnode-id="376"><strong data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">U.S. Navy</span></strong></td><td data-dcnode-id="373"><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">U.S. Marines</span></strong></td></tr><tr data-dcnode-id="347"><td data-dcnode-id="366"><span data-dcnode-id="371" instrument_node="">PCS/TDY Orders</span><br data-dcnode-id="370"><span data-dcnode-id="369" instrument_node="">Medical Record</span><br data-dcnode-id="368"><span data-dcnode-id="367" instrument_node="">Training Record</span></td><td data-dcnode-id="358"><span data-dcnode-id="365" instrument_node="">PCS/TDY Orders</span><br data-dcnode-id="364"><span data-dcnode-id="363" instrument_node="">DA 31</span><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node="">OER/NCOER</span><br data-dcnode-id="360"><span data-dcnode-id="359" instrument_node="">Current Clothing and Equipment Inventory</span></td><td data-dcnode-id="350"><span data-dcnode-id="357" instrument_node="">PCS Orders</span><br data-dcnode-id="356"><span data-dcnode-id="355" instrument_node="">SGLI</span><br data-dcnode-id="354"><span data-dcnode-id="353" instrument_node="">NAVPERS 1070/602 (Page 2)</span><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node="">NSIPS Loss Document from Detaching Command</span></td><td data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">PCS Orders</span></td></tr></tbody></table><p data-dcnode-id="342" style="text-align: center;"><strong data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">U.S. CAC CARD PROCEDURES</span></strong></p><p data-dcnode-id="338"><strong data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">FOR INTERNATIONAL PERSONNEL ONLY:</span></strong><span data-dcnode-id="339" instrument_node=""> The Military Personnel Office is responsible for obtaining all personal information to the staff member and his/her eligible dependents, and certify that information to U.S. authorities. By providing this information a representative of the Military Personnel Office will create and sign form DD-1172 for you, and your dependents to apply for U.S. Department of Defense (DoD) Identification (ID) cards after you are given your HQ badge. Upon arrival, international military personnel should coordinate the translation of original birth and marriage certificates into the English language with HQ SACT Legal. The DoD ID cards will grant access to local military installations/bases and facilities including the Commissary, Navy Exchange, Morale, Welfare, and Recreation (MWR) facilities and military treatment facilities for healthcare.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">ID Card Processing Office Locations for International Military Personnel:</span></p><ul data-dcnode-id="326"><li data-dcnode-id="331"><span data-dcnode-id="335" instrument_node="">Norfolk Navy Exchange (NEX) ID Lab (</span><strong data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">is the only location newcomers can obtain initial in-processing appointments for ID Card issuance</span></strong><span data-dcnode-id="332" instrument_node="">) located inside the NEX (retail store) (Building CD-13), 1560 Mall Drive, Suite 202, outside the Norfolk Naval Base;</span></li><li data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Naval Base Personnel Support Detachment (PSD) Oceana, the ID Card Lab is located inside the PSD at 1161 D Avenue, Building 326, Virginia Beach, and</span></li><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Norfolk Naval Base Personnel Support Detachment (PSD) Joint Expeditionary Base (JEB) Little Creek, the ID Card Lab is located inside the PSD at 1155 Nider Boulevard, Building 3510 Virginia Beach.</span></li></ul><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">These are the only approved ID Card locations that can be used.</span></p><p data-dcnode-id="318"><span data-dcnode-id="323" instrument_node="">You must make an appointment for issuance of the DoD ID card for each family member 45 to 60 days prior to arrival by visiting </span><strong data-dcnode-id="320"><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idco.dmdc.osd.mil/idco/%23/locator" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="322" instrument_node="">https://idco.dmdc.osd.mil/idco/#/locator</span></a></strong><span data-dcnode-id="319" instrument_node=""> and following the on-screen instructions to make an appointment with the NEX ID Lab location for initial issuance. You will need to make an appointment for each family member to receive the DoD ID card.</span></p><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Dependent family members who are receiving an identification card must accompany you. Dependent children age 10 and up to the age of 21 years will receive a dependent ID card, and must also attend the appointment. Dependent children 21 years of age, and less than 23 years of age, are eligible for an ID card, provided they are enrolled in full-time post-secondary education, and provide proof in accordance with U.S. requirements. Children under the age of 10 years are not required to attend the appointment as they are not ordinarily issued an identification card, but must be listed by the Military Personnel Office on Form DD-1172-2 to be properly registered for benefits, including healthcare.</span></p><p data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">Documentation Requirements for ID Card Lab Appointment:</span><br data-dcnode-id="314"><span data-dcnode-id="313" instrument_node="">For International Military Personnel ONLY, provide the following:</span></p><ul data-dcnode-id="297"><li data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">Original birth certificates for all family members applying (</span><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">with English translation signed by HQ SACT Legal, see NLR/PNLR office for requirements</span></strong><span data-dcnode-id="308" instrument_node="">);</span></li><li data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">Original marriage certificate if married (</span><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">with English translation signed by HQ SACT Legal, see NLR/PNLR office for requirements</span></strong><span data-dcnode-id="303" instrument_node="">);</span></li><li data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Valid passports and visas;</span></li><li data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Signed DoD 1172 from HQ SACT MILPERS Office.</span></li></ul><span data-dcnode-id="296" instrument_node=""> </span></div><span data-dcnode-id="294" instrument_node="">
</span></div><span data-dcnode-id="292" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="233"><span data-dcnode-id="291" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="286"><span data-dcnode-id="290" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Staff Training Coordination Section</span></h2><span data-dcnode-id="287" instrument_node=""> </span></div><span data-dcnode-id="285" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="235"><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Headquarters Supreme Allied Commander Transformation, Staff Training Coordination Section is an enabler and a vehicle for the individual education and training delivered to all staff personnel serving with the Command.</span></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">The Staff Training Coordination Section mission is to plan, coordinate and deliver in-house as well as external educational and training events for staff personnel, in order to ensure that every member of the Command possesses the required knowledge, skills and attributes to work efficiently throughout their tour of duty.</span></p><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Essential role of the Section is to provide prompt and effective educational and training events for the newcomers to make familiar with NATO Alliance and Allied Command Transformation. Specifically, facilitate a thorough understanding about Allied Commander Transformation’s structure, its outputs and methods of working.</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Upon arrival to the Command, and as part of the newcomers’ in-processing sessions, you will be enrolled in the Newcomers’ Orientation Training, which will provide you a comprehensive view on Allied Command Transformation and help you in finding your role inside the command.</span></p><p data-dcnode-id="273"><span data-dcnode-id="275" instrument_node="">As you will need more information about NATO and some of its core programs and principles, the following courses, which are both informational and imperative subjects, are provided to you to accomplish on the NATO’s Joint Advanced Distributed Learning portal:</span><br data-dcnode-id="274"></p><ul data-dcnode-id="253"><li data-dcnode-id="268"><strong data-dcnode-id="270"><i data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">ADL 037 - Introduction to NATO</span></i></strong><span data-dcnode-id="269" instrument_node="">,</span></li><li data-dcnode-id="264"><em data-dcnode-id="265"><strong data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">ADL 209 - Security and Non-NATO Nationals at HQ SACT,</span></strong></em></li><li data-dcnode-id="259"><strong data-dcnode-id="261"><i data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">ADL 169 - Gender awareness</span></i></strong><span data-dcnode-id="260" instrument_node="">,</span></li><li data-dcnode-id="254"><strong data-dcnode-id="256"><i data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">ADL 336 - Building Integrity Awareness courses</span></i></strong><span data-dcnode-id="255" instrument_node="">.</span></li></ul><p data-dcnode-id="247"><span data-dcnode-id="252" instrument_node="">     These courses are for informational purposes prior to your arrival, but will be required to be completed before your participation in the Newcomers’ Orientation Training. To get access to these courses, first please visit the </span><strong data-dcnode-id="249"><a data-dcnode-id="250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jadl.act.nato.int/"><span data-dcnode-id="251" instrument_node="">JADL Portal</span></a></strong><span data-dcnode-id="248" instrument_node=""> in order to create a user log in account.</span></p><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">We are looking forward to you joining the Allied Command Transformation Team and are standing by to provide any assistance you need.</span></p><p data-dcnode-id="239"><span data-dcnode-id="244" instrument_node="">Staff Training Coordination Section can be reached by email (</span><strong data-dcnode-id="241"><a data-dcnode-id="242" href="mailto:mailto:SACTRMHRMSTAFFTRNG@act.nato.int"><span data-dcnode-id="243" instrument_node="">SACTRMHRMSTAFFTRNG@act.nato.int</span></a></strong><span data-dcnode-id="240" instrument_node="">) and its staff personnel at: +1 757 747 3365/4034/4327 extension numbers.</span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Please don't hesitate to contact us even before your arrival in Norfolk.</span></p><span data-dcnode-id="236" instrument_node=""> </span></div><span data-dcnode-id="234" instrument_node="">
</span></div><span data-dcnode-id="232" instrument_node="">
</span></div><span data-dcnode-id="230" instrument_node="">
</span></div></div></div><span data-dcnode-id="226" instrument_node="">
</span><div class="container" data-dcnode-id="204"><div class="row" data-dcnode-id="205"><div class="col-sm-12" data-dcnode-id="206"><span data-dcnode-id="225" instrument_node=""> </span><hr data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Norfolk is Virginia's second-largest city behind neighbouring Virginia Beach with a population of approx. 43,000. It is one of nine cities, seven counties that constitute the Hampton Roads metro area; Norfolk, Virginia Beach, Suffolk, Portsmouth, Chesapeake, Hampton, Newport News. The city has a long history as a strategic military and transportation point and Wikipedia boasts that the "world's largest military alliance, the North Atlantic Treaty Organization has its defence headquarters here".</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="219" instrument_node="">Headquarters Supreme Allied Command Transformation was activated in June 2003 to be </span><em data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">NATO's forcing agent for change, leading the continuous improvement of Alliance capabilities to uphold NATO's global security interests</span></em><span data-dcnode-id="216" instrument_node="">. </span><a data-dcnode-id="213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/newsroom/our-story" target="_blank"><strong data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Click here to learn more about Allied Command Transformation's story</span></strong></a><span data-dcnode-id="212" instrument_node="">.</span></p><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Allied Command Transformation is situated on Naval Support Activity, Norfolk, VA, which has the largest concentration of fleet headquarters administrative and communication facilities outside of Washington DC. Home to over 6,000 personnel that includes major tenant commands, US Fleet Forces Command, Joint Staff Hampton Roads, US Marine Corps Forces Command, Naval Submarine Forces, Atlantic and Naval Surfaces Forces and Joint Forces Staff College.</span></p><span data-dcnode-id="207" instrument_node="">
</span></div></div></div><span data-dcnode-id="203" instrument_node=""> </span><span data-dcnode-id="201" instrument_node="">
