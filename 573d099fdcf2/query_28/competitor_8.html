</span><main data-dcnode-id="200"><span data-dcnode-id="629" instrument_node="">
</span><div class="container" data-dcnode-id="622"><div class="row" data-dcnode-id="623"><div class="col-sm-12" data-dcnode-id="624"><span data-dcnode-id="628" instrument_node=""> </span><h2 class="page-title" data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">HQ SACT Office of the Gender Advisor</span></h2><span data-dcnode-id="625" instrument_node="">
</span></div></div></div><span data-dcnode-id="621" instrument_node="">
</span><div class="container" data-dcnode-id="587"><div class="row" data-dcnode-id="588"><div class="col-sm-12" data-dcnode-id="589"><span data-dcnode-id="620" instrument_node=""> </span><hr data-dcnode-id="619"><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="612" style="text-align: center;"><strong data-dcnode-id="613"><em data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">The review of this webpage is ongoing;</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
the review of the "Gender Education &amp; Training Package for Nations", to include the latest NATO policies, action plans and Bi-SC directives about gender-related topics is expected by mid-2022.</span></em></strong></p><span data-dcnode-id="611" instrument_node="">
</span><hr data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Following the violent experience of wars in the 20th century and the changing global context of peace and security, in the late 1990s women’s groups came together and pushed for gender perspective to be included in the United Nations Security Council (UNSC) international peace and security agenda.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">In 2000, the UNSC unanimously adopted Resolution 1325 on Women, Peace and Security recognizing for the first time that gender inequalities exacerbated during the conflict impede the establishment of sustainable peace and development. The UNSCR 1325 and related resolutions acknowledge the disproportionate impact that armed conflict has on women and children, and calls upon international actors to introduce specific measures to remedy this.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">NATO as an intergovernmental military alliance committed to international peace, sees the integration of gender perspective as one of the methods to improve its operational effectiveness and to help provide the most appropriate response to a crisis.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="599" instrument_node="">In 2007, NATO and the Euro-Atlantic Partnership Council (EAPC) adopted its first policy on the implementation of UNSCR 1325. The policy paved the way for further integration of gender perspective and gender balance within NATO military and civilian structure, and gender mainstreaming within the NATO policies and programmes. In 2010 the North Atlantic Council adopted the first result-oriented&nbsp;</span><strong data-dcnode-id="596"><a data-dcnode-id="597" data-mediabox-title="The NATO Action Plan" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/nato_action_plan.jpg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="598" instrument_node="">NATO Action Plan</span></a></strong><span data-dcnode-id="595" instrument_node="">&nbsp;for the implementation of the NATO/EAPC Policy on Women, Peace and Security, which is revised every two years. Finally, in 2012 the NATO Secretary General appointed a first NATO Special Representative for Women, Peace, and Security – the position held by Mrs. Clare Hutchinson.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Whereas the above-mentioned developments occurred at the political level, the adoption of the Bi-SC Directive 40-1 in 2009 was a milestone achievement for the NATO military component. The Directive gives clear guidelines and instructions for the implementation of Resolution 1325 at all levels of the NATO military structure. It also provides for the integration of gender perspective into NATO planning, operations, missions, education, training, exercises and evaluation, and for gender mainstreaming in all NATO policies and programmes in all areas and at all levels. Implementation needs to be matched with institutionalisation, and the latter is enabled through the establishment of gender advisory positions throughout the organization. Therefore, the Directive establishes and clarifies the role of Gender Advisors and Gender Focal Points, who are responsible for providing advice and operational support on the implementation of the Resolution 1325 to the Commander and NATO personnel.</span></p><span data-dcnode-id="590" instrument_node="">
</span></div></div></div><span data-dcnode-id="586" instrument_node="">
</span><div class="container" data-dcnode-id="204"><div class="row" data-dcnode-id="205"><div class="col-sm-12" data-dcnode-id="206"><span data-dcnode-id="585" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="208" id="vivid-simple-accordion-5587"><span data-dcnode-id="584" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="548"><span data-dcnode-id="583" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Gender and Gender Advisors</span></h2><span data-dcnode-id="579" instrument_node=""> </span></div><span data-dcnode-id="577" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="550"><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="575" instrument_node="">NATO defines </span><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">gender</span></strong><span data-dcnode-id="572" instrument_node=""> as the social attributes associated with being male and female learned through socialisation and determines a person’s position and value in a given context. Given that social value and positions are always defined and negotiated between men, women, boys and girls, </span><strong data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">gender does not exclusively refer to women</span></strong><span data-dcnode-id="569" instrument_node="">.</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Gender, together with other factors such as ethnicity, religion, age and economic situation shape and regulate social relationships, expected behavioural norms, and gendered roles within a given community that will expose men, women, boys and girls to different threats to varying degrees, depending on a variety of factors. The vulnerability of particular groups within a community is exacerbated when it comes to particular forms of violence, for instance the risk of Conflict-Related Sexual and Gender-Based Violence (CRSGBV) to women and children. Therefore, understanding such intersecting factors and social dynamics within a population or community is crucial for understanding how the security needs of different groups develop and change, and how military operations and armed conflict affect them.</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">This understanding is crucial for the effective analysis, planning, conduct, and evaluation of military operations. Armed conflicts and crisis situations create different gender experiences for men, women, boys and girls; their security needs will be different and they will be affected differently by NATO and NATO-led military operations. NATO uses the integration of gender perspective as a way of assessing gender-based differences between women and men as reflected in their social roles and interactions, in the distribution of power and access to resources.</span></p><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">The primary job of the </span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Gender Advisor</span></strong><span data-dcnode-id="560" instrument_node=""> is to provide guidance and advice to NATO commanders on how to integrate gender perspective into operations and missions, crisis and conflict analysis, concepts, doctrine, procedures, and education and training. Even though there are these specialists working with a gender perspective within the command and force structure, it is always the responsibility of the Commander to make sure that a gender perspective is properly integrated.</span></p><p data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Gender Advisors also represent the Office of Primary Responsibility regarding United Nations Security Council Resolution 1325 and related Resolutions on Women, Peace and Security. Please see the ‘</span><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Women, Peace and Security</span></strong><span data-dcnode-id="555" instrument_node="">’ below for more information.</span></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Gender Advisors are supported in their work by Gender Focal Points (GFP), the Gender Advisors’ ‘eyes and ears on the ground’. GFPs are located in each division of the respective Headquarter.</span></p><span data-dcnode-id="551" instrument_node=""> </span></div><span data-dcnode-id="549" instrument_node="">
</span></div><span data-dcnode-id="547" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="445"><span data-dcnode-id="546" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Women, Peace and Security</span></h2><span data-dcnode-id="542" instrument_node=""> </span></div><span data-dcnode-id="540" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="447"><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Women’s rights organizations have always been very active in making sure that the protection of women and children is on and remains part of the international agenda. First, during the course of the 1993 World Conference on Human Rights in Vienna, women’s organizations successfully lobbied for the inclusion of wartime rape and sexual violence against women on the agenda. As a result, the Vienna Declaration and Program of Action reaffirmed that women’s rights are human rights and that sexual violence against women is a dire violation of these. Second, the 1995 Beijing Platform, with an exceptionally large number of NGO representatives present, included “Women and Armed Conflict” as one of its twelve strategic objectives and actions.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">As a culmination of the efforts of NGOs, various UN bodies, and the contribution of a number of smaller member states and non-permanent members of the Security Council, including Namibia, Bangladesh, Jamaica, Mali, and Canada, the UN Security Council adopted resolution 1325, a landmark resolution on women, peace and security on 31 October 2000.</span></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Resolution 1325 has four fundamental pillars to implementing the work on women peace and security:</span></p><ol data-dcnode-id="516"><li data-dcnode-id="529"><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Prevention</span></strong><span data-dcnode-id="530" instrument_node=""> – All efforts should be implemented to prevent violations of men and women’s human rights. Efforts can include preventing gender-based sexual violence, prosecute offenders of sexual violence and strengthen legal support for women’s rights.</span></li><li data-dcnode-id="525"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Protection</span></strong><span data-dcnode-id="526" instrument_node=""> – Since armed conflict affects men, women, boys and girls differently, they may need different sorts of protection.</span></li><li data-dcnode-id="521"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Participation</span></strong><span data-dcnode-id="522" instrument_node=""> – Women and men should participate on equal terms in all levels of the peace process, in the post-conflict work and before, during and after the conflict. At the moment, this is rarely the case and women often have less influence than men in these processes. The results of the misrepresentation of women in peace processes is that their rights often are overlooked in the post-conflict work.</span></li><li data-dcnode-id="517"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Relief &amp; Recovery</span></strong><span data-dcnode-id="518" instrument_node=""> – Gender-sensitive humanitarian programming needs to be considered during and after disasters/crises. Special attention should be directed to the communities with the most vulnerable situations, which includes but not limited to, women and children who are displaced, persons with disabilities, and the needs of women transitioning during the Demobilisation, Disarmament and Reintegration (DDR) process.</span></li></ol><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">The UNSCR 1325 states that the method to achieve protection, prevention and participation is through gender mainstreaming of all activities. This means that a gender perspective should be used in all activities in order to address the whole population (men, women, boys and girls).</span></p><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Currently, there are ten resolutions on the topic of Women, Peace and Security. The landmark resolution 1325 came in 2000 but the progress with the implementation was slow. Nine more resolutions have been adopted since 2008 to promote the implementation of the founding UNSCR 1325.</span></p><p data-dcnode-id="470"><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">UNSCR 1325 (2000)</span></strong><span data-dcnode-id="509" instrument_node="">: Prevention, protection and participation</span><br data-dcnode-id="508"><strong data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">UNSCR 1820 (2008)</span></strong><span data-dcnode-id="505" instrument_node="">: Protection against sexual violence (systematic)</span><br data-dcnode-id="504"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">UNSCR 1888 (2009)</span></strong><span data-dcnode-id="501" instrument_node="">: Reaffirms the importance of 1325 and 1820</span><br data-dcnode-id="500"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">UNSCR 1889 (2009)</span></strong><span data-dcnode-id="497" instrument_node="">: Peace building, anniversary of 1325 &amp; indicators</span><br data-dcnode-id="496"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">UNSCR 1960 (2010)</span></strong><span data-dcnode-id="493" instrument_node="">: Monitoring and reporting system on CRSV</span><br data-dcnode-id="492"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">UNSCR 2106 (2013)</span></strong><span data-dcnode-id="489" instrument_node="">: Need for gender education and gender advisors, and CRSGBV recognized as affecting boys and men as well</span><br data-dcnode-id="488"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">UNSCR 2122 (2013)</span></strong><span data-dcnode-id="485" instrument_node="">: Female Participation, gaps in WPS implementation</span><br data-dcnode-id="484"><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">UNSCR 2242 (2015)</span></strong><span data-dcnode-id="481" instrument_node="">: Addressed women’s role in countering terrorism</span><br data-dcnode-id="480"><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">UNSCR 2467 (2019)</span></strong><span data-dcnode-id="477" instrument_node="">: Sexual violence in conflict</span><br data-dcnode-id="476"><strong data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">UNSCR 2493 (2019)</span></strong><span data-dcnode-id="473" instrument_node="">: Urges member states to commit to implementing the nine previously adopted resolutions</span><strong data-dcnode-id="472"></strong><br data-dcnode-id="471"></p><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Furthermore, while they are not part of the WPS framework, it is important to mention two additional resolutions:</span></p><p data-dcnode-id="460"><strong data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">UNSCR 2272 (2016)</span></strong><span data-dcnode-id="465" instrument_node="">: Sexual exploitation and abuse in peace operations</span><br data-dcnode-id="464"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">UNSCR 2331 (2016)</span></strong><span data-dcnode-id="461" instrument_node="">: First resolution on human trafficking and its impact</span></p><p data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">The implementation of these Resolutions is governed by a variety of documents in NATO, please see ‘</span><strong data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">NATO Key documents</span></strong><span data-dcnode-id="456" instrument_node="">’ below for more information.</span></p><p data-dcnode-id="449"><span data-dcnode-id="454" instrument_node="">For further information, please see </span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.natolibguides.info/women" rel="noopener" target="_blank"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Recommended Reading on NATO and Women, Peace and Security</span></strong></a><span data-dcnode-id="450" instrument_node="">.</span></p><span data-dcnode-id="448" instrument_node=""> </span></div><span data-dcnode-id="446" instrument_node="">
</span></div><span data-dcnode-id="444" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="407"><span data-dcnode-id="443" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">NATO Key Documents</span></h2><span data-dcnode-id="439" instrument_node=""> </span></div><span data-dcnode-id="437" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="409"><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="430"><span data-dcnode-id="435" instrument_node="">In 2007, NATO and the Euro-Atlantic Partnership Council (EAPC) adopted its first policy on the implementation of UNSCR 1325. The policy paved the way for further integration of gender perspective and gender balance within NATO military and civilian structure, and gender mainstreaming within the NATO policies and programmes. In 2010 the North Atlantic Council adopted the first result-oriented </span><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/nato_static_fl2014/assets/pdf/pdft_2016_07/160718-wps-action-plan.pdf" rel="noopener" target="_blank"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">NATO/EAPC Action Plan</span></strong></a><span data-dcnode-id="431" instrument_node=""> for the implementation of the revised NATO/EAPC Policy for the Implementation of UNSCR 1325 on Women, Peace and Security and Related Resolutions.</span></p><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The NATO/EAPC Action Plan supports greater synergy and more effective implementation of UNSCR 1325 and related Resolutions through cooperation with and between international organisations. The plan also supports the integration of UNSCR 1325 and related Resolutions into curricula of training and education activities at all levels. Such integrated gender training should also include modules on analytical methods and approaches for understanding the level of risks for conflict-related sexual and gender-based violence, as well as modules on how to counter such behaviour, including measures that take the protection needs of the civilian population into account, in particular the needs of women and girls.</span></p><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Finally, in 2012 the NATO Secretary General appointed a first NATO Special Representative for Women, Peace, and Security.</span></p><p data-dcnode-id="420"><span data-dcnode-id="425" instrument_node="">Whereas the above-mentioned developments occurred at the political level, the adoption of the </span><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/1938/0" target="_blank"><strong data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Bi-SC Directive 040-001</span></strong></a><span data-dcnode-id="421" instrument_node=""> in 2009 further revised in 2012, 2017 and 2021, was a milestone achievement for the NATO military component. The Directive gives clear guidelines and instructions for the implementation of the United Nations Council Resolution 1325 at all levels of the NATO military structure. The directive provides guidance on the effective and continued practical implementation and institutionalization of gender perspective in all activities within the Strategic Commands. In line with the NATO/EAPC Action Plan, the document draws attention to the integration of gender perspectives both internally within NATO forces and externally with regard to the operations and missions. It highlights the integration of gender perspective as an operational tool to be used at all levels and at all stages of operational analysis, planning, conduct and evaluation, in order to enhance Operational Effectiveness and Situational Awareness. The directive also details the utility of integrating gender perspective in the development of gender-related Early Warning Indicators that may provide assistance in identifying and preventing emerging conflicts or security threats.</span></p><p data-dcnode-id="411"><span data-dcnode-id="419" instrument_node="">Crucially, the directive operationalises </span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nato.int/issues/women_nato/2015/MCM-0009-2015_ENG_PDP.pdf" rel="noopener" target="_blank"><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">MCM-0009-2015 Military Guidelines on the Prevention of, and Response to, Conflict-related Sexual and Gender-Based Violence</span></strong></a><span data-dcnode-id="415" instrument_node=""> </span><em data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">(the review of these guidelines is ongoing; next version is expected by mid-2022)</span></em><span data-dcnode-id="412" instrument_node="">; providing advice on understanding the dire impact CR-SGBV has on peacebuilding efforts, and practical solutions to preventing/addressing CR-SGBV. Lastly, the directive also puts forward a proposed NATO-wide Standards of Behaviour and Code of Conduct for the reference of commanders, while emphasizing that the Standards of Behaviour and Code of Conduct is not currently enforceable. Personnel are bound by the regulations outlined by their respective Troop Contributing Nations, and the nations have the authority for taking disciplinary action. Nevertheless, commanders are free to impose stricter regulations than those outlined by the Bi-SC Directive 40-1 Rev 2. Furthermore, the directive outlines the tasks and roles of the Gender Advisor (GENAD) and the Gender Focal Point (GFP). It explains why Gender Advisors (GENADs) are needed to ensure that gender perspective is an integral part of the planning of operations, that can contribute to mission success. It emphasizes that the integration of gender perspective should not be a separate, one-time occasion, but an integral and continuous effort by all personnel. GENAD positions are full-time positions that require adequate training, education and experience.</span></p><span data-dcnode-id="410" instrument_node=""> </span></div><span data-dcnode-id="408" instrument_node="">
</span></div><span data-dcnode-id="406" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="332"><span data-dcnode-id="405" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Gender Education &amp; Training Package for Nations</span></h2><span data-dcnode-id="401" instrument_node=""> </span></div><span data-dcnode-id="399" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="334"><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><img alt="gender advisor wordcloud" data-dcnode-id="397" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/gender-advisor-wordcloud.png&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></p><p data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">HQ SACT supports NATO Nations and Partners in their efforts to deliver education and training. Based on Training Needs Analysis, HQ SACT developed in 2015 and updated in 2017, with the full support of the Nordic Centre for Gender in Military Operations (NCGM) as a Department Head, a package of training materials known as </span><strong data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Gender Education and Training Package for Nations</span></strong><span data-dcnode-id="392" instrument_node="">.</span></p><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">The Gender Education and Training Package for Nations is provided as guidance to nations and partners, offering best practice examples and advice from different nations on the institutionalization of gender perspective. It is a training tool composed of series of Power Point presentations. The presentations constitute a major tool with detailed guidelines for instructors on how to proceed with the lesson. It is important to remember that these are only guidelines on how the material can be presented, and when used it should be tailored to the specific training audience.</span></p><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">The package is designed to support increased awareness on gender perspective in military operations and to assist NATO Allies and Partners to build their gender related capacities and capabilities and successfully integrate gender perspective within the three core tasks of the alliance: collective defence, crisis management and cooperative security.</span></p><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">The Gender Education and Training Package for Nations has three modules:</span></p><ul data-dcnode-id="378"><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Module 1 - Strategic-Operational Level: to strengthen the integration of gender perspective at the national level for the staff in national military headquarters </span></li><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Module 2 - Tactical Level: to strengthen integration of gender perspective at national level for the personnel at the tactical level </span></li><li data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Module 3 - Pre-Deployment: for the national armed forces personnel deploying to operations and missions</span></li></ul><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node=""> Every module consists of two lessons. At the strategic-operational and tactical levels the lessons have been broadly divided into the categories per individual training audience and are considered to be ‘standalone’. The pre-deployment module builds upon knowledge from one lesson to the next and is to be treated as a single module with two dependent lessons, while also including a short presentation which covers the essential elements of gender mainstreaming.</span></p><ul data-dcnode-id="353"><li data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">National and international legal framework relevant for integration of gender perspective into military operations (e.g. UN Security Council Resolution 1325 and Women, Peace and Security Agenda)</span></li><li data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Key terminology related to integration of gender perspective (e.g. sex, gender, integration of gender perspective or gender equality) </span></li><li data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Topics related to Conflict-Related Sexual and Gender Based Violence, and Exploitation </span></li><li data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Implementation of the Women, Peace and Security Agenda within the NATO structure </span></li><li data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Gender perspective in Code of Conduct and Standards of Behaviour </span></li><li data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Gender perspective in Standard Operating Procedures </span></li><li data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Gender perspective in the military Education, Training and Exercises </span></li><li data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Gender perspective in planning, execution and assessment of military operations </span></li><li data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Host Nation history, gender roles, gender analysis and Key Leader Engagement </span></li><li data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Operational Impact of gender perspective </span></li><li data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Liaison and Coordination with Key Leaders and external actors</span></li></ul><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">In 2017 HQ SACT added 3 more modules on gender perspective and terrorism with a specific focus on</span></p><ul data-dcnode-id="338"><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">How groups integrate gender perspective into their strategies</span></li><li data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">The role of men and women and how they change within groups</span></li><li data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">CR-SGBV as a tool of terror,</span></li><li data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Gendered assumptions and force protection,</span></li><li data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Protection of Civilians and mitigating harm to avoid radicalisation,</span></li><li data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Conducting operations with a Counter Terrorism component in urban operational environments</span></li></ul><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Please find the whole package below.</span></p><span data-dcnode-id="335" instrument_node=""> </span></div><span data-dcnode-id="333" instrument_node="">
</span></div><span data-dcnode-id="331" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="304"><span data-dcnode-id="330" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Gender Education &amp; Training Package for Nations - Documents</span></h2><span data-dcnode-id="326" instrument_node=""> </span></div><span data-dcnode-id="324" instrument_node="">

</span><p data-dcnode-id="316"><span data-dcnode-id="322" instrument_node="">The Gender Education and Training Package for Nations was last updated on December 2017. Being an evolving product, we greatly appreciate your feedback </span><em data-dcnode-id="317"><strong data-dcnode-id="319"><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/index.php%3FcID%3D336"><span data-dcnode-id="321" instrument_node="">HERE</span></a></strong><span data-dcnode-id="318" instrument_node="">.</span></em></p><p data-dcnode-id="312"><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/training/getpn.zip" target="_blank"><strong data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Click here to open the Gender Education and Training Package for Nations.</span></strong></a></p><p data-dcnode-id="308"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/training/gct.zip" target="_blank"><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Click here to open the Gender in Terrorism Education and Training Package for Nations.</span></strong></a></p><span data-dcnode-id="307" instrument_node=""> </span></div><span data-dcnode-id="305" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The Nordic Centre for Gender in Military Operations (NCGM), Department Head (DH)</span></h2><span data-dcnode-id="250" instrument_node=""> </span></div><span data-dcnode-id="248" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="212"><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><img alt="swedint" data-dcnode-id="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/swedint.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></p><p data-dcnode-id="239"><span data-dcnode-id="244" instrument_node="">On 22 February 2013, the Memorandum of Understanding (MOU) for Gender Education and Training between the Swedish Armed Forces, Headquarters Supreme Allied Commander Transformation (HQ SACT) and Supreme Headquarters Allied Powers Europe (SHAPE) was signed by the Swedish Chief of Defence. The MOU serves as a blueprint for co-operation by formalising the designation of </span><strong data-dcnode-id="241"><a data-dcnode-id="242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.forsvarsmakten.se/en/swedint/nordic-centre-for-gender-in-military-operations/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="243" instrument_node="">the Nordic Centre for Gender in Military Operations (NCGM)</span></a></strong><span data-dcnode-id="240" instrument_node=""> as Department Head (DH) for the delivery of all Gender Education and Training.</span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">As the NATO DH for gender education and training, the NCGM, under HQ SACT guidance:</span></p><ol data-dcnode-id="224"><li data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Translates operational requirements into education and training objectives within the subject of gender and related programmes, modules and courses that are delivered by NCGM with the objective to support NATO on both the operational and tactical levels;</span></li><li data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Establishes training standards to which the NATO gender programme courses adhere;</span></li><li data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Collaborates with both HQ SACT and SHAPE to ensure courses and curricula conform to NATO requirements;</span></li><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Recommends Gender E&amp;T Programme changes to HQ SACT and SHAPE;</span></li><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Collaborates with HQ SACT to coordinate an annual Gender Discipline/Education and Training Conference to discuss NATO Gender E&amp;T programme changes;</span></li><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Collaborates with other NATO Education and Training Facilities (NETFs) on a case-by-case as coordinated with HQ SACT.</span></li></ol><p data-dcnode-id="221"><img alt="201506gender seminar" data-dcnode-id="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/genderadvisor/201506gender_seminar.jpg&amp;raw" style="float: right; margin: 0px 0px 10px 10px;"><span data-dcnode-id="222" instrument_node="">The NCGM has several more tasks (other than courses and education):</span></p><ol data-dcnode-id="214"><li data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">NCGM as the Gender DH and recognized expert for gender in operations supports HQ SACT and SHAPE, upon request, with analysis of gender related Lessons Identified by Gender Advisors (GENADs) and Gender Field Advisors (GFAs) deployed to NATO-led operations;</span></li><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">NCGM, as the Gender DH, supports other NATO-led tasks related to gender in military operations on a case by case basis upon request from HQ SACT or SHAPE;</span></li><li data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">NCGM, as the Gender DH, supports individual and collective NATO-led training with Subject Matter Experts and/or other gender-specific advice at exercises and pre-deployment training.</span></li></ol><span data-dcnode-id="213" instrument_node=""> </span></div><span data-dcnode-id="211" instrument_node="">
