</span><h2 class="panel-title" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Legal Gazette</span></h2><span data-dcnode-id="836" instrument_node=""> </span></div><span data-dcnode-id="834" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="469"><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">The </span><strong data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">NATO Legal Gazette</span></strong><span data-dcnode-id="829" instrument_node=""> is an educational outreach publication produced by the HQ SACT Legal Offices in Norfolk and Staff Element Europe co-located at SHAPE in Mons, Belgium.
</span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">The NATO Legal Gazette contains thematically organized articles usually written by authors who are military or civilian legal personnel working at NATO or in the governments NATO and partner nations.
</span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Its purpose is to share articles of significance for the large NATO legal community and connect legal professionals of the Alliance.
</span></p><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">The NATO Legal Gazette is not a formal NATO document. Its articles do not represent the official opinions or positions of NATO or individual governments.
</span></p><hr data-dcnode-id="821"><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Please be on the lookout for Issue 43 of NATO Legal Gazette in 2022 focusing on legal aspects of climate change’s effects on international security.
</span></p><hr data-dcnode-id="818"><p data-dcnode-id="812"><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1974" rel="noreferrer" target="_blank"><img alt="legal_gazette_42.jpg" data-dcnode-id="817" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1973&amp;raw" style="float: left; clear: both; margin-bottom: 30px; margin-right: 15px; width: 200px; height: 283px;"><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">NATO Legal Gazette Issue 42</span></strong></a><span data-dcnode-id="813" instrument_node="">
</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Issue 42 of NATO Legal Gazette covers the legal aspects of NATO’s newest domain, space.  It is meant to complement other strands of work in NATO on space, framing some important and sometimes vexing legal issues pertaining to space operations (both military and “dual-use” activities), presence, exploitation of resources, the application of terrestrial law in space, and the intersection of the law governing space and cyber.
</span></p><p data-dcnode-id="777"><span data-dcnode-id="809" instrument_node="">We are particularly fortunate to have a foreword including an update on the space law manuals projects convened by two consortia of organizers – </span><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Professor Dale Stephens</span></strong><span data-dcnode-id="806" instrument_node=""> of the University of Adelaide offers a succinct description of the work ongoing on the </span><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Woomera Manual</span></strong><span data-dcnode-id="803" instrument_node="">, and </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Professors David Kuan-Wei Chen, Roy Ballest, Ram Jakhu</span></strong><span data-dcnode-id="800" instrument_node="">, and </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Steven Freedland</span></strong><span data-dcnode-id="797" instrument_node=""> explain the scope and progress of the </span><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">MILAMOS</span></strong><span data-dcnode-id="794" instrument_node=""> (McGill Manual on the International Law Applicable to Military Uses of Outer Space) </span><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">project</span></strong><span data-dcnode-id="791" instrument_node="">.  Both these manuals will follow the model of the Tallinn Manual on cyber law, describing the current state of space law in the view of the manual’s contributors.</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node=""> </span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">We are grateful in particular for the contribution of our team of editors, with key contributions by HQ SACT’s </span><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Galateia Gialitaki</span></strong><span data-dcnode-id="784" instrument_node=""> and our legal interns, </span><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Muge Karatas</span></strong><span data-dcnode-id="781" instrument_node=""> and </span><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Davis Wright</span></strong><span data-dcnode-id="778" instrument_node="">.  Galateia’s tireless efforts in leading the organization and editing process ensured this significant editorial undertaking spanning three continents and 14 time zones was a success.
</span></p><hr data-dcnode-id="776"><p data-dcnode-id="770"><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1226" rel="noreferrer" target="_blank"><img alt="legal-gazette-41" data-dcnode-id="775" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/651&amp;raw" style="float: left; margin-right: 15px; margin-bottom: 30px; width: 200px; height: 300px; clear: both;"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">NATO Legal Gazette Issue 41</span></strong></a><span data-dcnode-id="771" instrument_node="">
</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">This issue of the NATO Legal Gazette is the brain child of Robert (Butch) Bracknell who advocated using the Gazette to share and socialise innovative legal transformational ideas from legal advisors in academia, international organizations, commercial practice, and industry.
</span></p><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">Issue 41 begins with a </span><strong data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Preface</span></strong><span data-dcnode-id="764" instrument_node=""> by Geoffrey and Gary Corn, retired U.S. Army Judge Advocates and now noted academics. They consider technological changes from the 1980s to the present and incisively invite our attention to: “1) the development of the cyber domain and the adoption of cyber operations as a means and method of military and other security related operations; 2) the movement towards the development of lethal autonomous weapon systems (LAWS); and 3) the reshaping of the information environment and the attendant impact on perceptions of strategic legitimacy,” knowing that “NATO's best minds must stake out the cutting edge territory of these innovations.”
</span></p><p data-dcnode-id="755"><span data-dcnode-id="762" instrument_node="">Antoaneta Boeva is a lawyer for the ITER Organization in Saint-Paul-lès-Durance, France. Her article, </span><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Innovation for peaceful purposes only: Where there is the will, there is ITER</span></strong><span data-dcnode-id="759" instrument_node=""> describes the remarkable engineering and legal efforts to create a star on Earth in the International Thermonuclear Experimental Reactor. Lauren Brown, an Associate in the International Trade Group of Squire Patton Boggs, a full-service global law firm, writes about the power of innovation in NATO’s relationships in </span><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Partnership, Not Pivot, NATO’s Legal Answer to China</span></strong><span data-dcnode-id="756" instrument_node="">.
</span></p><p data-dcnode-id="747"><span data-dcnode-id="754" instrument_node="">Theodora Vassilika Ogden, a Fellow at the Human Security Centre in London who is currently studying at Leiden University, and Gregg Curley, a Judge Advocate in the U.S. Marine Corps, accept the challenge to stake out their perspectives on LAWS and autonomous weapons. Ms. Ogden’s article considers </span><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Responsibility, Liability and Lethal Autonomous Weapon Systems</span></strong><span data-dcnode-id="751" instrument_node=""> and Major Curley provides his views in </span><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Autonomous Weapons: A Pragmatic Approach</span></strong><span data-dcnode-id="748" instrument_node="">.
</span></p><p data-dcnode-id="739"><span data-dcnode-id="746" instrument_node="">Christopher Timura, Judith Alison Lee, R.L. Pratt and Scott Toussaint, who are attorneys in the Washington D.C. office of Gibson, Dunn &amp; Crutcher LLP and members of the firm’s International Trade Practice Group provide us an important article on the interplay between industry and national security is </span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">U.S. Export Controls: The Future of Disruptive Technologies</span></strong><span data-dcnode-id="743" instrument_node="">. Martijn Antzoulatos-Borgstein, the Trade Compliance Manager for Rockwell Automation for Europe, Middle East and Africa, follows by proposing collective actions by NATO and partner nations to better manage the industry-security interplay in </span><strong data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">The Relevance and Benefits of Integrated Compliance Strategy (ICS) for NATO Defence Forces</span></strong><span data-dcnode-id="740" instrument_node="">.
</span></p><p data-dcnode-id="734"><span data-dcnode-id="738" instrument_node="">Rodrigo Vázquez Benítez is an Assistant Legal Advisor in the Allied Command Operations Office of Legal Affairs at the NATO Supreme Headquarters Allied Powers Europe. He addresses the reshaping of the information environment by providing a description of the exploitation of the legal domain in a context of strategic competition in </span><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Legal Operations: The Use of Law as an Instrument of Power in the Context of Hybrid Threats and Strategic Competition</span></strong><span data-dcnode-id="735" instrument_node="">.
</span></p><p data-dcnode-id="729"><span data-dcnode-id="733" instrument_node="">Brett Sander, a US legal practitioner and principal at Vendor Clearance LLC, provides our final thoughtful article, </span><strong data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The Road to Hell is Paved with Bad Contractors: Vendor Vetting is a Better Path</span></strong><span data-dcnode-id="730" instrument_node="">.
</span></p><hr data-dcnode-id="728"><p data-dcnode-id="722"><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/652" rel="noreferrer" target="_blank"><img alt="legal-gazette-40" data-dcnode-id="727" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1360&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">NATO Legal Gazette Issue 40</span></strong></a><span data-dcnode-id="723" instrument_node="">
</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Issue 40 of the NATO Legal Gazette Environmental Protection: NATO Policies and National Views returns our practice of publishing thematically organized issues that we adopted in 2013. The intent behind publishing this issue is the same as it was with the other topics that we previously addressed: to provide the readers of the NATO Legal Gazette detailed knowledge about a subject that requires legal attention. As an international organization dedicated to the rule of law, this issue examines Environmental Protection (EP) from the perspective of international law, NATO’s policies and national views.
</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">The 1972 Stockholm Declaration, endorsed by the General Assembly of the United Nations, declared that States have “the responsibility to ensure that activities within their jurisdiction or control do not cause damage to the environment of other States or of areas beyond the limits of national jurisdiction.” The 1992 Rio Declaration in 1992 repeated the prevention principle which the International Court of Justice confirmed in the Gabčíkovo- Nagymaros case. The Court held, “in the field of environmental protection, vigilance and prevention are required on account of the often irreversible character of damage to the environment and of the limitations inherent in the very mechanism of reparation of this type of damage.” The prevention principle is now accepted as a norm of customary international law.4 This approach underlies NATO’s environmental protection policies, doctrine, and standardization agreements.
</span></p><p data-dcnode-id="711"><span data-dcnode-id="717" instrument_node="">We present Issue 40 to provide legal advisors and environmental protection specialists a reference for their common use. It starts with four articles offering a comprehensive overview of the rules and policies on environmental protection a legal advisor should know when taking part in an exercise or a mission. Ms. Lisa Weihser, former NATO Legal Intern at the International Military Staff Office of the Legal Advisor, first reviews the events leading to the emergence of environmental protection during international armed conflicts and then analyses this topic through Human Rights norms. Lieutenant-Colonel David J. Burbridge, the SHAPE environmental officer, contributes an article on NATO operational responsibility for environmental protection. He reviews NATO’s evolution in developing current NATO environmental protection policies, standards and regulations. Next, Lieutenant Colonel Ben Valk, the former Deputy Legal Advisor of the International Military Staff, describes how NATO mainstreams environmental protection policies. He also presents an overview of the main documents a Legal Advisor is likely to use during a mission or an operation to ensure compliance with environmental regulations. Finally, Mr. Jeroen Rottink, Head of the Quality, Occupational Safety &amp; Health, Environmental Protection Section (QOSHEP) of the Netherlands Defence Materiel Organization, offers his perspective on </span><em data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">What NATO and National Legal Advisors Should Know about the Application of NATO Environmental Protection Policy, Doctrine and Standardization Agreements</span></em><span data-dcnode-id="714" instrument_node="">.</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node="">
</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Major Ross Franklin is an Environmental Engineer in the Joint Engineer branch, Canadian Joint Operations Command and the Canadian Head of Delegation to the NATO Environmental Protection and Petroleum Handling Equipment Working Groups. Major Franklin argues in his essay that renewed collective defence measures in Europe are revealing the many capabilities and, sometimes, limitations of the current NATO EP framework in supporting the spirit of the North Atlantic Treaty, the NATO SOFA, and other foundations of the Alliance.
</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">The next two articles are an illustration of national environmental protection framework. As visiting nations have to respect the Host Country’s environmental law when operating in another country, Dr. Jean Rhéaume, environmental law advisor for the Department of National Defence and Canadian Forces, presents a meticulous summary of the Canadian environmental provisions applicable to military activities taking place in Canada to familiarise legal advisors with the environmental law in Canada. Major Shane Drew, Deputy Director Environmental Governance, presents the Australian environmental legislative framework the Australian Defence Force must consider in the planning, conduct and remediation phases of combined and unilateral military exercises to minimise the impact on the environment.
</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">This issue then focuses on specific areas of environmental protection. Colonel Jody M. Prescott, U.S. Army Judge Advocate Corps (retired) Army military attorney and lecturer at the University of Vermont, explores the links between armed conflict, gender and climate change, and addresses gender considerations issues in NATO Environmental Protection doctrine and practice. Mr. Nathaniel L Whelan, Chief of Training Support System Division, 7th Army Training Command, approaches the question of Environmental Protection from a different angle: as a hybrid threat. He describes how some entities use environmental protection and associated regulations to disrupt military operations and handicap NATO’s military training capability. He also suggests a multi-faceted solution set to mitigate this threat.
</span></p><p data-dcnode-id="701"><span data-dcnode-id="704" instrument_node="">This issue concludes with current observations from the 2018 Trident Juncture exercise and NATO Resolute Support mission in Afghanistan. Through her experience in NATO-exercise Trident Juncture 2018, Major Marianne R. Bø, engineering officer in the Norwegian Armed Forces posted as Staff Officer Environmental Protection at the Norwegian Joint Headquarters, shares her hands-on perspective on managing the environmental impacts resulting from such a large joint exercise. Despite an intensive preparation and engagement with the visiting countries, this article reports that 1069 cases, 49 complaints and 1020 damage cases, arose during Trident Juncture 2018. This raises the question of how to better ensure respect of environmental regulations and policies in NATO Exercises. Our last article provides insight on the environmental impacts of the NATO Resolute Support mission in Afghanistan. Mr. Chris Ingoe, the NATO Environmental Protection Staff Officer, identifies, with words and pictures, the challenges surrounding the management of these environmental efforts to protect the force the environment and the civilian population.</span><br data-dcnode-id="703"><span data-dcnode-id="702" instrument_node="">
</span></p><hr data-dcnode-id="700"><p data-dcnode-id="694"><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1359" rel="noreferrer" target="_blank"><img alt="legal-gazette-39" data-dcnode-id="699" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1357&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">NATO Legal Gazette Issue 39</span></strong></a><span data-dcnode-id="695" instrument_node="">
</span></p><p data-dcnode-id="683"><span data-dcnode-id="693" instrument_node="">Issue 39 of the NATO Legal Gazette contains eight articles that address issues of legal significance to NATO. The first two are from presentations that merit broader distribution. Steven Hill, the Legal Adviser and Director of the Office of Legal Affairs at NATO Headquarters contributes, </span><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Current International Law Challenges Facing NATO</span></strong><span data-dcnode-id="690" instrument_node=""> from his 2017 address to United Kingdom’s Government Legal Services Conference. Andres Munoz Mosquera, the Director of the Office of Legal Affairs NATO Supreme Headquarters Allied Powers, Europe (SHAPE) and the Legal Advisor of Allied Command Operations the Allied Command Operations and SHAPE Legal Advisor, provides his presentation, </span><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Some Notes on NATO‘s Institutionalisation</span></strong><span data-dcnode-id="687" instrument_node=""> from the 2015 Workshop, </span><em data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">"Tackling 21st Century Challenges Faced by International Organizations."</span></em><span data-dcnode-id="684" instrument_node="">
</span></p><p data-dcnode-id="663"><span data-dcnode-id="682" instrument_node="">The next six articles address discrete topics of legal significance to NATO. Steven Hill and his colleague, David Lemétayer, Assistant Legal Advisor, Office of Legal Affairs have authored, </span><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The Treaty on the Prohibition of Nuclear Weapons: A NATO View</span></strong><span data-dcnode-id="679" instrument_node="">. Jan Raats, Legal Advisor of the NATO Airborne Early Warning &amp; Control Programme Management Agency (NAPMA) delivers, </span><strong data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">An update on NATO cooperative Memorandum of Understand (MOU) Guidance</span></strong><span data-dcnode-id="676" instrument_node="">. Zdeněk Hýbl, Legal Advisor of the Joint Chemical, Biological, Radiological, and Nuclear Defence Centre of Excellence (JCBRN Defence COE) presents a timely essay, </span><strong data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">GDPR and NATO Centres of Excellence</span></strong><span data-dcnode-id="673" instrument_node="">. Major Arn Oosterveer, Legal Advisor, German-Netherlands Corps and Mrs. Kelly Telen, Legal Assistant, Joint Force Command Headquarters Brunssum share their insights on the </span><strong data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Legal Considerations of the Accession of France to the Protocol on the Status of International Military Headquarters set up pursuant to the North Atlantic Treaty</span></strong><span data-dcnode-id="670" instrument_node="">. Karol Karski, Head of the Department of Public International Law, Chairman of the Academic Council of the Institute of International Law, Faculty of Law and Administration, University of Warsaw, Poland and Paweł Mielniczek, Ph.D. in Law, University of Warsaw, address </span><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The Notion of Hybrid Warfare In International Law and its importance for NATO</span></strong><span data-dcnode-id="667" instrument_node="">. We close this issue with the kind submission of Ludwig Vandder Veken, the Secretary-General of the International Society for Military Law and the Law of War who invites attention to </span><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The Leuven Manual on the International Law Applicable to Peace Operations</span></strong><span data-dcnode-id="664" instrument_node="">, Cambridge University Press December 2017 which is open to digital access through Cambridge Core.
</span></p><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">In 2019, we look forward to sending two thematic issues to you: Issue 40, which will address environmental topics and Issue 41, which will focus on the legal aspects of innovation. 2019 is the 70th anniversary year of signing of the North Atlantic Treaty. The </span><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Emory International Law Review</span></em><span data-dcnode-id="659" instrument_node="">, an open-source online publication of the Emory University Law School in Atlanta, Georgia, USA, has graciously agreed to publish a collection of essays and commentaries on specific articles of the North Atlantic Treaty contributed by noted academic authors and NATO practitioners. We will share the expected date of their publication in our next NATO Legal Gazette.
</span></p><hr data-dcnode-id="657"><p data-dcnode-id="651"><a data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1358" rel="noreferrer" target="_blank"><img alt="legal-gazette-38" data-dcnode-id="656" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1355&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">NATO Legal Gazette Issue 38</span></strong></a><span data-dcnode-id="652" instrument_node="">
</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Twelve articles compose this 38th Issue of the NATO Legal Gazette, the most substantive issue we’ve yet published. Credit for this must be given to Ms. Mette Prassé Hartov, our co-editor, who recommended we address as our theme Cultural Property Protection (CPP). Because much of the discussion of CPP is treaty based, to aid those who may be new to CPP, the last article of this issue, “Cultural Property Protection during Armed Conflict under the 1954 Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict and its Second Protocol: A Comprehensive Guide” was authored by our co-editor and former SHAPE Legal Intern, Zarghoen Rawan, as a quick reference to this large topic that may be consulted while reading the other eleven articles in this issue.
</span></p><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Second, in recognition of the 70th Anniversary of the North Atlantic Treaty, a special edition of the NATO Legal Gazette will be published in 2019. On page 124, the Legal Advisers at NATO Headquarters, Allied Command Operations, and Allied Command Transformation are pleased to issue a Call for Papers on the theme “The North Atlantic Treaty at 70 – Selected Legal Perspectives.”
</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Third, the fourteen contributing authors to Issue 38 include many luminaries in the field of CPP. We begin with Lieutenant-Colonel David Burbridge, an Engineering Officer in the Canadian Armed Forces presently posted as the Environmental Management officer at SHAPE. He begins this issue with his insightful article on cultural property protection as an essential part of the NATO Environmental Protection policy. Dr. Frederik Rosén, Senior Researcher at the Danish Institute for International Studies, provides a clarifying overview of the progress undertaken during the NATO Science for Peace and Security workshops and shares practical recommendations for NATO policy and doctrine enhancement. Mr. Jan Hladík, Chief of UNESCO’s Cultural Heritage Protection Treaties Section, presents the 1954 Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict and its 1999 Additional Protocol, and shares his views on peacetime responsibilities regarding CPP.
</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">From University College London, Professor Roger O’Keefe addresses the relationship between the law of war crimes and the intentional destruction, damage or appropriation of cultural property during armed conflict. Whilst doing this, Professor O’Keefe provides a meticulous analysis of the rich case law on crimes against cultural property. Mr. Mark Vlasic, Senior Fellow and Adjunct Professor of Law at Georgetown University and Ms. Helga Turku, a rule of law consultant for US government funded projects in Africa and Latin America, jointly contributed an article that sheds light on the destruction of cultural property in Syria and addresses the ways in which international law could be utilised to hold the perpetrators of these heinous crimes accountable. Specifically focussing on ISIS’ use of cultural property to finance its terrorist activities, Ms. Turku provides an additional article on the instrumental role of cultural property in terrorism and the international community’s approach to prosecuting war crimes, crimes against humanity and genocide in light of crimes against cultural property.
</span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Dr. Patty Gerstenblith, Distinguished Research Professor at DePaul University College of Law and Secretary of the U.S. Committee of the Blue Shield, together with Dr. Nancy C. Wilkie, Professor of Classics, Anthropology and the Liberal Arts and President of the U.S. Committee of the Blue Shield contribute to this edition an article on the Blue Shield Movement, an international NGO concerned with CPP in the event of armed conflict. Dr. Laurie Rush, the Cultural Resources Manager and installation Archaeologist of the US Army 10th Mountain Division at Fort Drum, zooms in on the importance of training members of the armed forces in CPP and provides a sharp overview of very practical steps that were taken by the United States Army in order to integrate CPP into the training of its personnel. From the United States Army Corps of Engineers, Dr. Kathryn Fay, a Post-Doctoral Researcher at the US Army Construction Engineering Research Laboratory (ERDC-CERL), and Dr. George Calfas, ERDC-CERL Program Manager, address the development of the Contingency Base Site Identification for the Tactical Environment (CB- SITE); a new tool that assists in avoiding inflicting damage to cultural sites during the construction of overseas bases.
</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">The Deputy Legal Advisor for HQ SACT, Ms. Mette Prassé Hartov presents a welcome review of the November 2016 launched UNESCO Military Manual on Cultural Property Protection. Drafted under the auspices of UNESCO and the International Institute of Humanitarian Law (Sanremo, Italy), the Manual aims to serve as a practical guide for military forces in their implementation efforts of CPP-related international law. Mr. Zarghoen Rawan who, as a SHAPE Legal Intern co-edited this issue, contributed two articles: “Great, Greatest or Outstanding: Defining Cultural Property in NATO Operational Context” and — as previously mentioned, “Cultural Property Protection during Armed Conflict under the 1954 Hague Convention for the Protection of Cultural Property in the Event of Armed Conflict and its Second Protocol: A Comprehensive Guide.”
</span></p><hr data-dcnode-id="638"><p data-dcnode-id="632"><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1354" rel="noreferrer" target="_blank"><img alt="legal-gazette-37" data-dcnode-id="637" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1353&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">NATO Legal Gazette Issue 37</span></strong></a><span data-dcnode-id="633" instrument_node="">
</span></p><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Issue 37 of the NATO Legal Gazette departs from our practice of publishing thematically organized issues which we adopted in 2013 with Issue 32. The reason for this change is that we have received five articles that merit publication now.
</span></p><p data-dcnode-id="622"><span data-dcnode-id="629" instrument_node="">Mr. Andrés B. Muñoz Mosquera, Legal Advisor, Supreme Headquarters Allied Powers Europe (SHAPE), continues to provide valuable articles as the most prolific contributor to the NATO Legal Gazette. In this issue he provides two articles. He and Dr. Sascha Dominik Bachmann, Associate Professor in International Law at Bournemouth University, United Kingdom, provide an overview of the legal scholarship on the concept of lawfare in hybrid warfare in their article, </span><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Understanding Lawfare in a Hybrid Warfare Context</span></strong><span data-dcnode-id="626" instrument_node="">. Mr. Muñoz also offers Part II of his article, </span><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Memorandum Of Understanding (MOU): A Philosophical and Empirical Approach</span></strong><span data-dcnode-id="623" instrument_node="">. Here he discusses the characterisation of MOUs, how national or international courts view them and dedicates the last section of this article to assist practitioners with comments about MOU structure.
</span></p><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">Mr. Jean-Michel Baillat, when serving as a Commissaire en chef de 1ere classe and the Head of the Operational Section in the SHAPE Legal Office, asked the question, </span><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Hybrid Warfare, a new challenge to the Law of Armed Conflicts?</span></strong><span data-dcnode-id="618" instrument_node=""> He builds his article around three more questions: “What is hybrid warfare;” “Is hybrid warfare contrary to the Law of Armed Conflict (LOAC)?,” and “How to tackle Hybrid Warfare and stay within Legal Boundaries?” Readers are encouraged to consider Jean-Michel’s answers to these questions and his conclusion.
</span></p><p data-dcnode-id="610"><span data-dcnode-id="616" instrument_node="">Mr. Eduardo Martinez Llarena is the logistical coordinator for NATO’s Readiness Action Plan (RAP) Agreements Implementation Office (RAIO) at SHAPE. Mr. Ignacio Fonseca Lindez is an assistant legal advisor at the SHAPE Legal Office and serves as the legal coordinator for RAIO. Their joint article, </span><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">NATO Readiness Action Plan: The Legal and Host Nation Support Architecture</span></strong><span data-dcnode-id="613" instrument_node="">, surveys the development of the RAP, its genesis as a response to Hybrid Warfare announced at NATO’s 2014 Wales Summit, and its four pillar architecture: 1) Supplementary agreements (SAs) to the 1952 Paris Protocol to the North Atlantic Treaty; 2) Memoranda of understanding (MOUs) for the NATO Force Integration Units (NFIU) Headquarters and the Headquarters Multinational Division Southeast (HQ MND SE); 3) Accessions by all Nations of the Alliance to the Host Nations Support Memorandums of Understanding for Exercises, Operations, and Disaster Relief Operations; and, 4) Border crossings and freedom of movement.</span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">Finally, LTC Keirsten Kenned, U.S. Army Judge Advocate, serving as a NATO Legal Advisor in 1 (German-Netherlands) Corp in Münster, Germany, gives us a concise presentation of the NATO Exercise program, its purpose and structure, and the various challenges that a Legal Advisor will face when involved in a NATO exercise.
</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">We will be returning to a thematic format with Issue 38 on the Protection of Cultural Property.
</span></p><hr data-dcnode-id="607"><p data-dcnode-id="601"><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1350" rel="noreferrer" target="_blank"><img alt="legal-gazette-36" data-dcnode-id="606" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1349&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">NATO Legal Gazette Issue 36</span></strong></a><span data-dcnode-id="602" instrument_node="">
</span></p><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">The theme of our 36th issue, </span><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">NATO Training and Exercises</span></strong><span data-dcnode-id="597" instrument_node="">, is driven by current events and decisions made by the North Atlantic Council (NAC) at the Chicago Summit in 2012. At that meeting the Heads of State and Government of the Alliance, “confidently set ourselves the goal of NATO Forces 2020: modern, tightly connected forces equipped, trained, exercised and commanded so that they can operate together and with partners in any environment.”
</span></p><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">At the 2014 Wales Summit the NAC endorsed the Connected Forces Initiative (CFI) as a key enabler in developing the goal NATO Forces 2020. CFI combines a comprehensive education, training, exercise, and evaluation programme with the use of cutting-edge technology to ensure that Allied forces remain prepared to engage cooperatively in the future. The CFI package approved in Wales included six measures: 1) an updated NATO Education, Training, Exercise and Evaluation (ETEE) Policy; 2) a broader NATO Training Concept 2015-2020; 3) a 2015 high-visability exercise; 4) Major NATO Exercises from 2016 Onwards Programme; 5) Continued progress in implementing the technological aspects of CFI; and 6) A Special Operations Component Command headquarters capability under operational command of SACEUR. As noted by the former Supreme Allied Commander Transformation, General Jean-Paul Palomeros, “The aim of CFI is to help reorient our training and exercises towards more demanding, high intensity operations and manoeuvre warfare while capitalizing on the experience gained through recent operational commitments.”
</span></p><p data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">The consequence of these decisions made by the Alliance has been to increase the number of exercises from 115 in 2014 to 280 in 2015, with NATO’s largest exercise since 2002, </span><strong data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Trident Juncture 15</span></strong><span data-dcnode-id="590" instrument_node="">, held in October and November in Italy, Portugal, and Spain. More than 36,000 participants from more than 30 nations trained together at 18 exercise locations in a Non- Article V Crisis Response Operation focused on a high intensity modern warfare setting featuring a near peer opponent. And in all of these exercises the role played by legal professionals both as trainers and as members of the exercise audience significantly contributes to the realism of the events and the precision of the Alliance actions.
</span></p><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">Thanks to the dedication of the seven authors who contributed articles to this issue: Ms. Victoria Baquerizo Lozano, Commander Svein Lystrup, Mr. Vincent Roobaert, Captain Audun Westgaard, Mr. David Nauta, Commander Wiesław Goździewicz and Colonel Gilles Castel, we are able to produce this 54 page edition offering three articles about training and exercises and one about the topic of self-defence from a French perspective that is consistent with the thematic approach of this issue. Additionally, we’re publishing the results of the survey that shows your views about the NATO Legal Gazette, providing an article about the NATO legal knowledge sharing portal —</span><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">LAWFAS</span></strong><span data-dcnode-id="585" instrument_node="">— that is open to NATO personnel and legal personnel in NATO nations, description of the NATO Special Operations Headquarters (NSHQ), spotlighting three members of our NATO legal community, saying hail and farewell to our arriving and departing colleagues, and close with a calendar of a few upcoming NATO events.
</span></p><hr data-dcnode-id="583"><p data-dcnode-id="577"><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1352" rel="noreferrer" target="_blank"><img alt="legal-gazette-36special" data-dcnode-id="582" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1351&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">NATO Legal Gazette Issue 36 Special</span></strong></a><span data-dcnode-id="578" instrument_node="">
</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">In this special edition, we bring to you a collection of articles from the thirty-eight published issues of the NATO Legal Gazette so far. These articles were recently referenced, as reading material, at the “NATO Legal Advisor Course” (4-8 April 2016) and “NATO Operational Law Course” (18-22 April 2016), in NATO School Oberammergau, Germany, and are listed here in a thematic order.
</span></p><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">The “NATO Legal Advisor Course” and the “NATO Operational Law Course” at the NATO School Oberammergau are the only courses available in NATO that provide education and training tailored to a NATO lawyer’s needs. NATO legal advisors and legal personnel, as well as national lawyers working closely with NATO, are introduced to the NATO structure and the role of a NATO legal advisor. They are acquainted with the NATO Treaties and International Agreements and the main issues arising from their implementation. They benefit from the lectures of experienced speakers, all of which are Subject Matter Experts (SMEs) in specific fields of NATO Administrative Law and NATO Operational Law, such as visiting forces jurisdiction, NATO claims, NATO operations and exercises, targeting, rules of engagement, NATO cyber law and others.
</span></p><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">To complement the lectures and the material provided during the NATO School legal courses, the NATO Legal Gazette is a very useful tool of reference. Throughout ten years of publication, the NATO Legal Gazette has presented high quality articles and thorough reviews on various issues of concern to NATO. The NATO Legal Gazette authors are highly experienced legal practitioners and scholars with wide knowledge on NATO Legal matters.
</span></p><p data-dcnode-id="567"><span data-dcnode-id="570" instrument_node="">Their articles remain valuable as they comprise the expertise of NATO practice and academic research and understanding that a new NATO lawyer could use to build his/her future career. In this way, the NATO Legal Gazette achieves its main goal and reason of existence; to serve as an educational tool in the NATO legal community and beyond.</span><br data-dcnode-id="569"><span data-dcnode-id="568" instrument_node="">
</span></p><hr data-dcnode-id="566"><p data-dcnode-id="560"><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1348" rel="noreferrer" target="_blank"><img alt="legal-gazette-35" data-dcnode-id="565" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1347&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">NATO Legal Gazette Issue 35</span></strong></a><span data-dcnode-id="561" instrument_node="">
</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Autumn brought us a number of interesting developments in the international legal scene. In September the United Kingdom hosted in Wales the NATO summit. Due to Russia’s continued aggressive actions against Ukraine, as well as turbulent developments in the Middle East and growing instability in North Africa, the North Atlantic Council met at the Heads of State and Government level to declare the need for a stronger and more effective Alliance.
</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The world leaders discussed a number of important issues, including greater readiness, the area of cyber, and the need to increase national defence spending. Cyber threats, attacks and fundamental cyber defence responsibility of NATO to defend its own networks and assist Allies received a detailed discussion. You may read about the outcomes of their discussion in four paragraphs focused on cyberspace in the Wales Summit Declaration.
</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Because of the growing importance of cyber issues we are bringing you the 35th issue of the NATO Legal Gazette topically focused on Legal Issues related to Cyber.
</span></p><p data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">As an introduction to the topic, our colleague from JFC Brunssum CAPT Enrico Cossidente provides you with a snapshot of the legal aspects of cyber and cyber-related issues affecting NATO. The </span><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Jus Ad Bellum</span></em><span data-dcnode-id="550" instrument_node=""> part of cyber is addressed by Ms Florentine de Boer in her article examining the threshold of armed attack in light of collective defence. Our colleagues from NATO Cooperative Cyber Defence Centre of Excellence (CCD COE) Mr Pascal Brangetto, Mr Tomáš Minárik and Mr Jan Stinissen bring you their views on the legal implications of a shift from active cyber defence to responsive cyber defence.
</span></p><p data-dcnode-id="545"><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Jus In Bello</span></em><span data-dcnode-id="546" instrument_node=""> area is covered by one of the internationally recognised experts on the Law of Armed Conflict, Dr Gary Solis, who contributed with an article about cyber warfare and NATO legal advisors. In addition, Ms Hanneke Pitters provides her views on the significant differences amongstscholars as to what constitutes direct participation in hostilities in cyberwarfare.
</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">As usual, we provide you with an article about a NATO entity. This timeour colleague from the CLOVIS team Ms Annabelle Thibault prepared anarticle about Allied Command Transformation Staff Element Europe (ACT SEE).
</span></p><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Furthermore, because of the importance of better understanding thehuge topic of cyber, we bring you two book reviews. One is provided by MrVincent Roobaert who examines Marco Roscini’s book “Cyber Operationsand the Use of Force in International Law” and the second is by Ms StanilaDimitrova who examines a book edited by our former CCD COE colleague DrKatharina Ziolkowski “Peacetime Regime for State Activities in Cyberspace:International Law, International Relations and Diplomacy.” This is followed byour regular sections like the Spotlight that introduces our new NATOcolleagues, the Hail &amp; Farewells, and information about upcoming events oflegal interest.
</span></p><hr data-dcnode-id="540"><p data-dcnode-id="534"><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1356" rel="noreferrer" target="_blank"><img alt="legal-gazette-34" data-dcnode-id="539" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1346&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">NATO Legal Gazette Issue 34</span></strong></a><span data-dcnode-id="535" instrument_node="">
</span></p><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Continuing developments in Ukraine require NATO’s vigilance as do the many other security threats that serve to remind NATO of its core principles and legal basis, such as democracy, individual liberty, and the rule of law, as enshrined in the North Atlantic Treaty.
</span></p><p data-dcnode-id="527"><span data-dcnode-id="531" instrument_node="">Spurred on by the recent developments on the international scene and also by the celebration of the North Atlantic Treaty’s sixty-fifth anniversary, we offer you one of our most substantive issues yet. The first article by Sylvain Fournier and Lewis Bumgardner, titled </span><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Article 5 of the North Atlantic Treaty: The Cornerstone of the Alliance</span></strong><span data-dcnode-id="528" instrument_node="">, inspired this issue of the Legal Gazette dedicated to “NATO Legal Cornerstones.”
</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Although Article 5 of the North Atlantic Treaty is the most well-known, it is not the Alliance’s sole legal cornerstone. To highlight other legal foundations, we present an article on NATO Status Agreements as well as Memorandum of Understanding, NATO’s most frequent tool for concluding agreements. These are written by two of NATO’s leading practitioners on this topic, Mette Hartov and Andres Munoz. Finally, in our “Questions On” section, Frederic Tuset-Anres provides an illuminating viewpoint to key legal questions on NATO Centres of Excellence.
</span></p><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">In the operational law arena, I authored a short overview on the evolution and legal framework for conducting NATO operations. The ACO Legal Adviser, Thomas Randall contributs his views on the legal authority of NATO Commanders. With Mr. Randall’s retirement this summer, after 40 years of exceptional service and professional experience at US and NATO posts, it is an honour to provide his article on the legally delicate role of the NATO commander. And by its publication capturing his masterful knowledge and experience as SACEUR’s Legal Adviser.
</span></p><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">As usual, we provide an article about CLOVIS with an update of its 2014 activities; a book review on the International Court of Justice (an international legal cornerstone in its own right); a Spotlight introducing our new NATO colleagues; Hail &amp; Farewells; and, finally, information about upcoming events of legal interest.
</span></p><hr data-dcnode-id="520"><p data-dcnode-id="514"><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1344" rel="noreferrer" target="_blank"><img alt="legal-gazette-33" data-dcnode-id="519" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1343&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">NATO Legal Gazette Issue 33</span></strong></a><span data-dcnode-id="515" instrument_node="">
</span></p><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Issue 33 of the NATO Legal Gazette is the first of our four 2014 planned Gazettes’ issues on NATO and EU relations.
</span></p><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">NATO and the EU each have 28 member nations. 22 of these nations are members of both organizations, while six members of each organization are not members of the other.1 This mixed representation naturally causes overlaps in the legal regimes that apply to some but not all of the NATO and EU members.
</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">In four different articles we present you with different points of view on NATO and EU relations. Firstly, Mr. Catalin Graure provides you an analysis of the compatibility of legal regimes surrounding both international organisations. Secondly, Dr. Frederik Naert provides you with an EU perspective on general and legal considerations related to EU and NATO relations. Thirdly, our NATO practitioners Ms. Mette Hartov and Mr. Andres Munoz describe the EU’s exemption of NATO International Military Headquarters from its residency and visa requirements. Finally, Mr. Siegfried Dohr provides an overview of NATO and EU cooperation from a military perspective.
</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The interactions of NATO with the EU are not a matter of academic discussion but rather of significantly increasing practical importance. Under the new heading of “Practitioner’s Corner,” Ms. Mette Hartov kindly shares with us her reflections on current issues encountered in the NATO legal practice. We are fully aware of your need of a pragmatic approach towards a number of topics that you are addressing daily. For this reason, we are hoping to keep delivering to you future articles from a practitioner’s perspective.
</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Issue 34 will discuss NATO’s legal cornerstones. Following our usual structure, this issue provides an article about a NATO organisation: Questions on NCI Agency; information about a CLOVIS feature called Workspace; a book review of International Law and the Classification of Conflicts; Spotlight introducing our new colleagues in NATO, hail &amp; farewells and information about upcoming events.
</span></p><hr data-dcnode-id="503"><p data-dcnode-id="497"><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1345" rel="noreferrer" target="_blank"><img alt="legal-gazette-32" data-dcnode-id="502" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1342&amp;raw" style="float: left; width: 200px; margin: 0px 10px 10px 0px;"><strong data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">NATO Legal Gazette Issue 32</span></strong></a><span data-dcnode-id="498" instrument_node="">
</span></p><p data-dcnode-id="483"><span data-dcnode-id="496" instrument_node="">The 32nd issue of the NATO Legal Gazette is focused solely on the NATO Legal Conference hosted by the Ministry of Defence of Estonia. The extraordinary support and personal attention provided by the Minister of Defence </span><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Mr Urmas Reinsalu</span></strong><span data-dcnode-id="493" instrument_node=""> and the Ministry’s high-level conference team composed of </span><strong data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Ms Mari Kruus</span></strong><span data-dcnode-id="490" instrument_node="">, Adviser to the Ministry, </span><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Ms Ingrid Muul</span></strong><span data-dcnode-id="487" instrument_node="">, Deputy Director of the Legal Department, and </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Ms Silvi Palmet</span></strong><span data-dcnode-id="484" instrument_node="">, Chief Protocol, ensured the Conference’s great success as a memorable professional event.
</span></p><p data-dcnode-id="478"><span data-dcnode-id="482" instrument_node="">This, our eighth annual Conference, took place in beautiful Tallinn from 24 to 28 June with the topic </span><em data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">“Responding to Change – Legal Challenges in the Future Security Environment.”</span></em><span data-dcnode-id="479" instrument_node=""> Just nine months after the successful 2012 NATO Legal Conference in Tirana, Albania, a record 142 participants journeyed north to enjoy the hospitality, friendship and wonderfully long summer days in this historic capital of Estonia.
</span></p><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">For all of you who attended and all of you who could not be with us physically in Tallinn to benefit from the excellent speakers and discussions this issue provides highlights of the Conference.
</span></p><p data-dcnode-id="472"><span data-dcnode-id="475" instrument_node="">First, the Executive Summary Report will provide you an overview of each speaker and panelist. Second, you will have pleasure of reading contributions from three senior legal authorities: Mr. Peter Olson, Legal Adviser and Director of Legal Affairs, NATO HQ, Brussels; Mr. Stephen Rose, former Allied Command Transformation (ACT) Legal Adviser, Norfolk; Mr. Stephen Mathias, the Assistant Secretary-General for Legal Affairs in the UN Office of Legal Affairs, New York.</span><br data-dcnode-id="474"><span data-dcnode-id="473" instrument_node="">
</span></p><hr data-dcnode-id="471"><span data-dcnode-id="470" instrument_node=""> </span></div><span data-dcnode-id="468" instrument_node="">
</span></div><span data-dcnode-id="466" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="439"><span data-dcnode-id="465" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Emory International Law Review - Special Edition</span></h2><span data-dcnode-id="461" instrument_node=""> </span></div><span data-dcnode-id="459" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="441"><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="455"><img alt="emory-law.png" data-dcnode-id="457" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/690&amp;raw" style="margin-right: 15px; float: left;"><span data-dcnode-id="456" instrument_node="">NATO’s primary purpose and values are set out in the North Atlantic Treaty, first signed on 4 April 1949 in Washington D.C. by representatives of its twelve founding member nations.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The intervening decades have seen the accession of further members, and a series of changes to the security environment and to the technological means of warfare, to name only a few. Yet, the North Atlantic Treaty with its 14 brief articles remains the bedrock document of the Alliance.</span></p><p data-dcnode-id="447"><span data-dcnode-id="452" instrument_node="">In order to mark the 70th anniversary of the signing of the Washington Treaty, the Legal Offices in NATO Headquarters International Staff, in SHAPE, and in HQ SACT have, in cooperation with Emory Law School, </span><a data-dcnode-id="449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//law.emory.edu/eilr/content/volume-34/issue-special/index.html" target="_blank"><strong data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">coordinated a publication providing a current commentary to the Washington Treaty</span></strong></a><span data-dcnode-id="448" instrument_node="">.</span></p><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">The publication is a special edition of Emory International Law Review and it would not have been possible without the tireless and meticulous editing and assistance provided by the editorial board of the Emory International Law Review.</span></p><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">The special edition is an Emory International Law Review publication and remains subject to Emory International Law Review copyright and permissions policy. All articles bear a disclaimer and while this is not an official NATO publication or collection of official NATO positions it is regarded to be a welcome contribution to understanding the context of the North Atlantic Treaty and the origins of what we now simply refer to as NATO.</span></p><span data-dcnode-id="442" instrument_node=""> </span></div><span data-dcnode-id="440" instrument_node="">
</span></div><span data-dcnode-id="438" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="407"><span data-dcnode-id="437" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Concept Development and Experimentation Handbook</span></h2><span data-dcnode-id="433" instrument_node=""> </span></div><span data-dcnode-id="431" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="409"><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="426"><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1177" target="_blank"><img alt="cde-hb-2020.png" data-dcnode-id="429" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1085&amp;raw" style="float: left; margin-right: 10px;"></a><span data-dcnode-id="427" instrument_node="">Concept Development and Experimentation (CD&amp;E) is a fundamental process which enables transformation activities.</span></p><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The CD&amp;E Handbook provides basic information for the concept developer based on approved NATO guidance and policy as well as best practice derived from a rich history of CD&amp;E experience.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Although designed to address Alliance CD&amp;E activities, it has been developed with a vision of informing NATO nations, our partners and other nations and organizations.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Accordingly, significant effort has been taken to ensure applicability of the methodology across the broadest user community.</span></p><p data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">You can download the handbook in pdf format by clicking the icon on the left, or </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1177" target="_blank"><span data-dcnode-id="418" instrument_node="">here</span></a><span data-dcnode-id="416" instrument_node="">.</span></p><p data-dcnode-id="411"><span data-dcnode-id="414" instrument_node="">To be informed on the revisions of the handbook and on CD&amp;E in NATO you can request to be added to our mailing list by sending an e-mail to </span><a data-dcnode-id="412" href="mailto:ConceptDevelopment@act.nato.int"><span data-dcnode-id="413" instrument_node="">ConceptDevelopment@act.nato.int</span></a></p><span data-dcnode-id="410" instrument_node=""> </span></div><span data-dcnode-id="408" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Strategic Foresight Analysis</span></h2><span data-dcnode-id="401" instrument_node=""> </span></div><span data-dcnode-id="399" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="380"><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395"><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Regional Perspectives Report on the Arctic</span></strong></p><p data-dcnode-id="388"><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view/1740" target="_blank"><img alt="regional-perspectives-2021-01.png" data-dcnode-id="394" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1739&amp;raw" style="float: left; width: 257px; margin-right: 10px;"></a><span data-dcnode-id="392" instrument_node="">The Strategic Foresight branch has released the third in a series of foresight reports -  </span><strong data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">The SFA Regional Perspectives Report on the Arctic</span></strong><span data-dcnode-id="389" instrument_node="">. At a time of significant global transformation, this latest report analyses the strategic importance of the Arctic to the Alliance.  While NATO Allies among the Arctic littoral states hold different views on whether or not there should be a role for the Alliance to play with respects to security of the region, this report finds that geopolitical completion, accelerated climate change impacts, and economic imperatives in the region require that NATO, at the very least, have the capacity and resources to monitor and consider developments in the Arctic. As the strategic relevance of the High North increases in the future, the Arctic littoral states of the Alliance, and indeed all Allies, can ill afford to postpone an evaluation of NATO’s approach to the region indefinitely. Russia is already expanding its military footprint in the Arctic by establishing infrastructure along the Northern Sea Route and non-littoral countries like the People’s Republic of China are becoming more engaged.  The behaviour of China and Russia in the Arctic should be of concern to the Alliance.</span></p><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">The accelerated pace of climate change has transformed Arctic societies. The prospect of surging commercial activity and rapid technological advancement, combined with growing extra-regional interest and the proliferation of the knowledge, experience and capabilities needed to operate in the Arctic, means that the region is becoming more connected and integral to global life. As this process unfolds, the Arctic will make itself felt in ways that could significantly alter the global balance of power and the terms of great power rivalry and competition.</span></p><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">While the trends outlined in this report may unfold peacefully, the potential for sudden and rapid change, as well as unpredictable shocks, do not guarantee stability.  The Arctic should, therefore, be included within the Warfighting Development Agenda and as a potential topic of importance for future Chief/Head of Defence discussions.  Aspects of this report undoubtedly will be included within the development of the next NWCC Future Operating Environment.</span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">The glossy print version is available by clicking the report image above.</span></p><span data-dcnode-id="381" instrument_node=""> </span></div><span data-dcnode-id="379" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Innovation in Capability Development</span></h2><span data-dcnode-id="372" instrument_node=""> </span></div><span data-dcnode-id="370" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="322"><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="366"><strong data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">Innovation in Capability Development Publication</span></strong></p><p data-dcnode-id="361"><em data-dcnode-id="363"><strong data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Innovation in NATO — Ideas need time to mature</span></strong></em><span data-dcnode-id="362" instrument_node=""> ~ Innovative ideas are often challenging to implement in formal processes, policies, or technologies, especially in large and complex organisations such as NATO. To prevent innovative ideas being shelved prematurely, we must have avenues for their acceptation, socialisation, sharing, and development. As NATO's transformation agent, ACT is uniquely placed to achieve this aim.</span></p><p data-dcnode-id="354"><em data-dcnode-id="358"><strong data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">What is the Innovation in Capability Development Publication?</span></strong></em><span data-dcnode-id="357" instrument_node=""> HQ SACT's Capability Engineering and Innovation Division has developed the Innovation in Capability Development Publication Series to capture and socialise innovative transformational ideas. The publication series will be a record of innovative thinking by a diverse network of experts, facilitated by ACT.</span><br data-dcnode-id="356"><span data-dcnode-id="355" instrument_node="">The publication is a professionally produced, edited volume on a single topic relevant to NATO and national work. Intended for both policy makers and practitioners in that particular field, the publication contains substantial detail and forward-thinking, cutting edge ideas. Under guidance from a subject-matter expert editorial team, contributions are solicited from expert authors from NATO, academia, national defence organisations, and industry. All contributions are reviewed by the editorial team as well as being blind reviewed by external experts.</span></p><h2 data-dcnode-id="352" itemprop="headline"><span data-dcnode-id="353" instrument_node="">Volume 1 – Innovation in Operations Assessment: Recent Developments in Measuring Progress in Conflict Environments</span></h2><h3 data-dcnode-id="348"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/capdev/capdev_01.pdf" target="_blank"><img alt="capdev 01" data-dcnode-id="351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/capdev_01.jpg&amp;raw" style="float: left; margin-left: 10px; margin-right: 10px;"></a><span data-dcnode-id="349" instrument_node="">Transformational Activities in Operations Assessment</span></h3><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">This first volume is on the concepts and processes used to measure the progress and results of military operations—called "Operations Assessment" in NATO. In the past two decades, NATO operations assessment has undergone substantial development, driven partly by the experience of the international missions in Bosnia, Kosovo, Iraq, and Afghanistan. This volume reviews recent practices, and suggests ways the process could be improved, including potential future innovations and capability developments.</span></p><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">This work was generated out of the large amount of worked conducted by ACT and partners on developing the NATO Operations Assessment Handbook, sections of the ACO Comprehensive Operations Planning Directive, and a training course for NATO School. This work was supported by a variety of analytical studies, concept development, and experimentation.</span></p><h2 data-dcnode-id="342" itemprop="headline"><span data-dcnode-id="343" instrument_node="">Volume 2 – Autonomous Systems – a Transformation in Warfare?</span></h2><h3 data-dcnode-id="338"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/capdev/capdev_02.pdf" target="_blank"><img alt="capdev 02" data-dcnode-id="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/capdev_02.jpg&amp;raw" style="float: left; margin-left: 10px; margin-right: 10px;"></a><span data-dcnode-id="339" instrument_node="">Autonomous Systems – a Transformation in Warfare?</span></h3><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Volume 2 of the Innovation in Capability Development covers the subject of autonomous systems, which stand potentially to transform the way in which warfare is conducted. Advances in sensors, robotics and computing are permitting the development of a whole new class of systems, which offer a wide range of military benefits including the ability to operate without personnel on board the platform, novel human-machine teaming concepts, and "swarm" operating methods. With any such transformation advances, there are unique operational, legal, ethical and design issues.</span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">This volume brings together a group of international experts who were participants in various ACT initiatives in order to share their perspectives, in a multidisciplinary approach, on the wide ranging opportunities, implications and challenges that autonomous systems will bring, and ensure that the Alliance is ready to address the forthcoming issues of terminology, standardisation, interoperability and military operational conduct.</span></p><h2 data-dcnode-id="332" itemprop="headline"><span data-dcnode-id="333" instrument_node="">Volume 3 – Advances in Defence Analysis, Concept Development and Experimentation</span></h2><h3 data-dcnode-id="328"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/capdev/capdev_03.pdf" target="_blank"><img alt="capdev 03" data-dcnode-id="331" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/capdev_03.jpg&amp;raw" style="float: left; margin-left: 10px; margin-right: 10px;"></a><span data-dcnode-id="329" instrument_node="">Advances in Defence Analysis, Concept Development and Experimentation</span></h3><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Innovation for the Future, presents a number of thought provoking ideas and elaborates on CD&amp;E experiences for a wide range of topics. CD&amp;E has a pivotal role in supporting the development and adaptation of allied forces by advancing our knowledge of future requirements, systems and capabilities, and shortening the distance between users and designers.</span></p><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">This volume brings together a group of international experts who participated in various ACT initiatives in order to share their perspectives, in a multidisciplinary approach, on the wide ranging opportunities, implications and challenges that CD&amp;E will bring, and ensure that the Alliance is ready to address the forthcoming challenges.</span></p><span data-dcnode-id="323" instrument_node=""> </span></div><span data-dcnode-id="321" instrument_node="">

</span><h2 class="panel-title" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">OPEN Publications</span></h2><span data-dcnode-id="314" instrument_node=""> </span></div><span data-dcnode-id="312" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="238"><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="306"><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/open-publications.png" rel="noreferrer noopener" target="_blank"><img alt="open publications 300x250" data-dcnode-id="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/open-publications-300x250.png&amp;raw" style="float: left; margin-left: 10px; margin-right: 10px;"></a><strong data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">The NATO Open Perspectives Exchange Network (OPEN)</span></strong></p><p data-dcnode-id="301"><span data-dcnode-id="305" instrument_node="">OPEN stands for </span><strong data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">OPEN Perspectives Exchange Network</span></strong><span data-dcnode-id="302" instrument_node="">, which is a network for understanding the modern security environment from other than military point of view run by NATO Allied Command Transformation’s Plans and Policy Branch.</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">OPEN is a strategic thinking tool that seeks alternative perspectives on matters of importance to NATO and others. OPEN aims to share quality products on important topics and understand things from our reader's points of view. OPEN is based on a model that was extremely successful - the Civil Military Fusion Centre (CFC) and works with freelance expert writers who may fit into the following criteria: non-conventional military expert, non-NATO employee, published and proven author, and an acknowledged subject matter expert in their field.</span></p><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">OPEN products are not classified and openly sourced.</span></p><p data-dcnode-id="291"><span data-dcnode-id="296" instrument_node="">For more information on OPEN, contact us by < </span><h2 class="panel-title" data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">Stability Policing</span></h2><span data-dcnode-id="230" instrument_node=""> </span></div><span data-dcnode-id="228" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="214"><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="224"><a data-dcnode-id="225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/stability_policing.pdf"><img alt="" data-dcnode-id="226" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/media/doclibrary/stability-policing-300x200.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"></a></p><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Allied Command Transformation launched the Stability Policing initiative to provide a forum for the study and exploration of innovative ideas to guide NATO’s capability development in this area.</span></p><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">At the Warsaw Summit in 2016, the Alliance took action based on the complexity driven by the emergence or resurgence of state actors as potential peer competitors coupled with the increasing threat of terrorism. These changes to the strategic environment drove a renewed emphasis on deterrence and defence while at the same time underscoring the importance of projecting stability.</span></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">This volume covers the subject of Stability Policing, which allows NATO to operate in a proactive posture in order to prevent escalation of conflict, changing the way in which the Alliance engages in this complex strategic environment. In line with the larger summit aspirations for Projecting Stability, Stability Policing capabilities based on future requirements must be driven by a functional analysis approach.</span></p><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">This compilation explores and examines Stability Policing from multiple perspectives. It provides insights into some of the many challenges associated with conducting Stability Policing operations, as well as NATO’s efforts to develop a capability in this area as part of the larger “Projecting Stability” aspirations of the Warsaw Summit.</span></p><span data-dcnode-id="215" instrument_node=""> </span></div><span data-dcnode-id="213" instrument_node="">
</span></div><span data-dcnode-id="211" instrument_node="">
