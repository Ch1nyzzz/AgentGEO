</span><h2 data-dcnode-id="1204" style="text-align: center;"><span data-dcnode-id="1205" instrument_node="">Partnership Training and Education Centres Info</span></h2><span data-dcnode-id="1203" instrument_node="">
</span></div></div></div><span data-dcnode-id="1199" instrument_node="">
</span><div class="container" data-dcnode-id="1053"><div class="row" data-dcnode-id="1054"><div class="col-sm-12" data-dcnode-id="1055"><span data-dcnode-id="1198" instrument_node=""> </span><div class="vivid-simple-accordion" data-dcnode-id="1057" id="vivid-simple-accordion-3236"><span data-dcnode-id="1197" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="1172"><span data-dcnode-id="1196" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">About PTECs</span></h2><span data-dcnode-id="1192" instrument_node=""> </span></div><span data-dcnode-id="1190" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="1174"><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1186"><img alt="ptec logo" data-dcnode-id="1188" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/jft/ptecs/ptec_logo.png&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"><span data-dcnode-id="1187" instrument_node="">The Partnership Training and Education Centres (PTECs) are nationally or multi-nationally sponsored education and training institutions which are united under a single concept that is endorsed by the North Atlantic Council and recognized by NATO.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">The PTECs offer courses, seminars, and workshops to both military and civilian personnel in order to provide education, training and instruction in diverse areas consistent with the objectives and priorities of NATO's policy on partnerships. They also provide a platform for operational training by offering both classroom and field venues for exercises.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">Partnership Training and Education Centres (PTEC) play an essential role in supporting NATO's objectives for partnership with non-member countries. Initially launched in 1998, PTECs were formally established in 1999 under the Partnership for Peace programme to develop training and education activities with Euro-Atlantic partners.</span></p><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">To reflect the changes in the Alliance's Global Partnerships, the PTEC Concept was extended to the Mediterranean Dialogue (MD) and the Istanbul Cooperation Initiative (ICI) countries in 2008. Since 2012, a single concept for all centres hosted by Allies, EAPC/PfP, MD and ICI partners, as well as partners across the Globe with a partnership programme with NATO, while respecting the specificity of the different partnership frameworks, is in place.</span></p><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">As a result, the opening of facilities for Education and Training (E&amp;T) in NATO Nations and Partner Countries has led to enhanced interoperability for NATO-led multinational operations.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">The Partnership Training and Education Centres Commandants Conference (PTEC CC) was established by NATO in November 2000 to coordinate the work amongst the Centres and NATO. The first PTEC community was administered by the Supreme Headquarters Allied Powers Europe (SHAPE) Partnership Coordination Cell (PCC) from 2000 until 2002. The NATO School became the Chairman in 2002 and HQ SACT became Co-Chairman in 2013.</span></p><span data-dcnode-id="1175" instrument_node=""> </span></div><span data-dcnode-id="1173" instrument_node="">
</span></div><span data-dcnode-id="1171" instrument_node="">
</span><div class="simple-accordion-group closed" data-dcnode-id="1131"><span data-dcnode-id="1170" instrument_node="">
</span><div class="simple-accordion-title-shell" data-dcnode-id="1165"><span data-dcnode-id="1169" instrument_node="">
</span><h2 class="panel-title" data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Who's Who</span></h2><span data-dcnode-id="1166" instrument_node=""> </span></div><span data-dcnode-id="1164" instrument_node="">
</span><div class="simple-accordion-description" data-dcnode-id="1133"><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1158"><strong data-dcnode-id="1160"><img alt="act logo" data-dcnode-id="1162" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/images/stories/structure/jft/ptecs/act_logo.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;"><span data-dcnode-id="1161" instrument_node="">Headquarters Supreme Allied Commander Transformation (HQ SACT)</span></strong><span data-dcnode-id="1159" instrument_node=""> has the overall responsibility for the management of NATO E&amp;T and its delivery through the NATO E&amp;T Facilities, supported by COEs', PTECs' and National Training Institutions' activities. Effective relationships between Strategic Commands and Education and Individual Training (E&amp;IT) Institutions are necessary in order to ensure that new ideas, procedures, tactics and lessons learned are injected into NATO's education structure. HQ SACT executes the following division of responsibilities:</span></p><ul data-dcnode-id="1139"><li data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Manage and lead the execution of education and individual training as well as collective training and exercises;</span></li><li data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">Manage NATO’s Global Programming;</span></li><li data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Maintain, review and publish the annual Bi-SC comprehensive list of disciplines;</span></li><li data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Assist NATO Headquarters in the recognition process of a national training and education facility as a PTEC by providing subject matter expertise support, building on the experience and expertise of the NATO School and the existing centres;</span></li><li data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Offer support and guidance to recognized PTECs to ensure that courses in support of NATO are in compliance with NATO standards;</span></li><li data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Accredit education and individual training institutions;</span></li><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Certify courses;</span></li><li data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Develop and maintain Quality Standards for NATO education and training;</span></li><li data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Co-chair the PTEC Conference of Commandants and the PTEC Working Group, and manages the PTEC website.</span></li></ul><p data-dcnode-id="1135"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">NATO School Oberammergau (NSO)</span></strong><span data-dcnode-id="1136" instrument_node="">, with support from relevant NATO bodies, supports and helps further develop, as needed, a mechanism for cooperation, coordination, information exchange and sharing of lessons learned among all Partnership Training and Education Centres, including the co-chairing of the PTEC Commandants Conference and focused Working Groups. The NATO School also supports the promotion of each Centre and the community by organizing the annual PTEC Marketplace. The management of the Train the Trainer (TtT) and the Instructor Exchange Program (IEP) are also the responsibility of the NATO School.</span></p><span data-dcnode-id="1134" instrument_node=""> </span></div><span data-dcnode-id="1132" instrument_node="">

</span><h2 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">PTEC Announcements</span></h2><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1029"><a data-concrete5-link-lightbox="image" data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1400"><picture data-dcnode-id="1032"><source data-dcnode-id="1037" media="(min-width: 900px)" srcset="/application/files/thumbnails/large/7416/1586/3832/20210312_075926.jpg"><source data-dcnode-id="1036" media="(min-width: 768px)" srcset="/application/files/thumbnails/medium/7416/1586/3832/20210312_075926.jpg"><source data-dcnode-id="1035" srcset="/application/files/thumbnails/small/7416/1586/3832/20210312_075926.jpg"><img alt="ra forum" data-dcnode-id="1033" height="112" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/thumbnails/small/7416/1586/3832/20210312_075926.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;" width="160"></picture></a><span data-dcnode-id="1030" instrument_node="">On March 12th 2021, ACT organised the first virtual conference for Partner Training and Education Centres.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">After more than one year of suspension of the activities of the conferences and working groups, almost all of them were able to participate virtually. Initially launched in 1999, the concept of PTEC was created in order to develop training and education activities among NATO nations, Partners for Peace and other partner nations. More than 40 attendees of this very diversified community used this unique opportunity to share knowledge and experience related to military training and force development.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The agenda was focused on the management of the adaptation to the pandemic. From the latest member, the Colombian International Demining Centre, to the most eastern, the Five Hills Peace support Operations Training Centre in Mongolia, all PTEC have been dramatically disrupted by the COVID19 crisis.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1012"><a data-concrete5-link-lightbox="image" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/download_file/view_inline/1401"><picture data-dcnode-id="1015"><source data-dcnode-id="1020" media="(min-width: 900px)" srcset="/application/files/thumbnails/large/1916/1586/4346/20210315_051201.jpg"><source data-dcnode-id="1019" media="(min-width: 768px)" srcset="/application/files/thumbnails/medium/1916/1586/4346/20210315_051201.jpg"><source data-dcnode-id="1018" srcset="/application/files/thumbnails/small/1916/1586/4346/20210315_051201.jpg"><img alt="ra forum" data-dcnode-id="1016" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.act.nato.int/application/files/thumbnails/small/1916/1586/4346/20210315_051201.jpg&amp;raw" style="float: left; margin: 0px 10px 10px 0px;" width="160"></picture></a><span data-dcnode-id="1013" instrument_node="">Regardless of the unique missions of each centre, there are three common conclusions that could be drawn. First, the non-residential training solutions have a promising future after the pandemic. Second, the switch from residential to virtual is not easy and requires specific agile methodology and quality management (on these topics, PTECs have high expectations for HQ SACT). Third, there will always be a need for residential training because force development also means community and team building.</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Not everyone easily learns remotely, we will blend learning methods to achieve gains in both areas.</span></p><span data-dcnode-id="1008" instrument_node="">
