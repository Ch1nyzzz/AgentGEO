</span><h2 data-dcnode-id="685"><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicoer.com/opinion/"><span data-dcnode-id="690" instrument_node="">Opinion</span></a><span class="icon-arrow-right" data-dcnode-id="688"></span><a class="category-letters-to-the-editor" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicoer.com/opinion/letters-to-the-editor/"><span data-dcnode-id="687" instrument_node="">Letters to the Editor</span></a></h2></div><span data-dcnode-id="683" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">
</span><span class="dfm-title metered" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">
			NATO’s promise | Your opinions		</span></span><span data-dcnode-id="678" instrument_node="">
</span></h1><span data-dcnode-id="676" instrument_node="">
</span></div></div><div class="article-share" data-dcnode-id="651"><div class="sharedaddy sd-sharing-enabled" data-dcnode-id="652"><div class="robots-nocontent sd-block sd-social sd-social-icon sd-sharing" data-dcnode-id="653"><h3 class="sd-title" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Share this:</span></h3><div class="sd-content" data-dcnode-id="654"><ul data-dcnode-id="655" data-sharing-events-added="true"><li class="share-facebook" data-dcnode-id="667"><a class="share-facebook sd-button share-icon no-text" data-dcnode-id="668" data-shared="sharing-facebook-3662228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicoer.com/2022/01/01/natos-promise-your-opinions/%3Fshare%3Dfacebook%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Facebook"><span data-dcnode-id="671"></span><span class="sharing-screen-reader-text" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Click to share on Facebook (Opens in new window)</span></span></a></li><li class="share-twitter" data-dcnode-id="662"><a class="share-twitter sd-button share-icon no-text" data-dcnode-id="663" data-shared="sharing-twitter-3662228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicoer.com/2022/01/01/natos-promise-your-opinions/%3Fshare%3Dtwitter%26nb%3D1" rel="nofollow noopener noreferrer" target="_blank" title="Click to share on Twitter"><span data-dcnode-id="666"></span><span class="sharing-screen-reader-text" data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Click to share on Twitter (Opens in new window)</span></span></a></li><li class="share-print" data-dcnode-id="657"><a class="share-print sd-button share-icon no-text" data-dcnode-id="658" data-shared="" href="#print" rel="nofollow noopener noreferrer" target="_blank" title="Click to print"><span data-dcnode-id="661"></span><span class="sharing-screen-reader-text" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Click to print (Opens in new window)</span></span></a></li><li class="share-end" data-dcnode-id="656"></li></ul></div></div></div></div></div></header><div class="article-content" data-dcnode-id="443"><div class="article-content-wrapper" data-dcnode-id="604"><div class="header-features default" data-dcnode-id="639"><div class="meta" data-dcnode-id="640"><div class="byline" data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">By </span><a class="author-name" data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicoer.com/author/letters-to-the-editor/" rel="author" title="Posts by Letters to the Editor"><span data-dcnode-id="647" instrument_node="">Letters to the Editor</span></a><span data-dcnode-id="645" instrument_node=""> | </span></div><div class="time" data-dcnode-id="641"><time data-dcnode-id="642" datetime="2022-01-01 03:00:34"><span data-dcnode-id="643" instrument_node="">January 1, 2022 at 3:00 a.m.</span></time></div></div></div><div class="article-body" data-dcnode-id="605"><div class="body-copy" data-dcnode-id="606"><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">It is time for the U.S. to acknowledge that Russia was promised that NATO would move “not one inch eastward”.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">U.S. Secretary of State James Baker’s famous “not one inch eastward” assurance about NATO expansion in his meeting with Soviet leader Mikhail Gorbachev on Feb. 9, 1990, was part of many assurances about Soviet security given by Western leaders to Gorbachev and other Soviet officials throughout the process of German unification in 1990 and on into 1991, according to declassified U.S., Soviet, German, British and French documents posted December 2017 by the National Security Archive at George Washington University http://nsarchive.gwu.edu.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Declassified documents from U.S. and Russian archives show that U.S. officials led Russian President Boris Yeltsin to believe in 1993 that the Partnership for Peace was the alternative to NATO expansion, rather than a precursor to it, while simultaneously planning for expansion after Yeltsin’s re-election bid in 1996 and telling the Russians repeatedly that the future European security system would include, not exclude, Russia, https://nsarchive.gwu.edu/briefing-book/russia-programs/2018-03-16/nato-expansion-what-yeltsin-heard.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">It is up to NATO, not Ukraine, whether or not they join NATO.</span></p><span data-dcnode-id="627" instrument_node=""> </span><div class="dfp-ad dfp-Outstream_Video" data-dcnode-id="623" id="div-gpt-ad-Outstream_Video" style="visibility: visible;"><span data-dcnode-id="626" instrument_node="">
</span><zeus-ad aria-hidden="true" data-dcnode-id="625" data-json="{&quot;targeting&quot;:{&quot;POS&quot;:[&quot;Outstream_Video&quot;],&quot;zeus_rendercount&quot;:&quot;1&quot;,&quot;zeus_slot&quot;:&quot;zeus_Outstream_Video.init.dsk&quot;}}" data-keyvalues="{&quot;POS&quot;:[&quot;Outstream_Video&quot;]}" data-refresh="true" data-renderbehavior="lazy" data-slot="/8013/chicoer.com/opinion/letters-to-the-editor/Outstream_Video" id="zeus_Outstream_Video" style="margin: auto; width: 1px; display: block;"></zeus-ad><span data-dcnode-id="624" instrument_node="">
</span></div><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">The U.S. could care less if Ukraine ends up like Syria, as long as they have a chance to force Russian President Vladimir Putin to submit to U.S. dictates.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">President Joe Biden could be wiser, but does he have the courage to acknowledge the U.S.’s broken promise, and to choose peace.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="613" style="text-align: right"><em data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">— Lucy Cooke, Chico</span></em></p><span data-dcnode-id="612" instrument_node="">
