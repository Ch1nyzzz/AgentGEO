</span><div class="publication-text longtext" data-dcnode-id="2926"><h1 data-dcnode-id="2933"><strong data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Introduction</span></strong></h1><span data-dcnode-id="2932" instrument_node="">
</span><p class="ingress" data-dcnode-id="2930"><span data-dcnode-id="2931" instrument_node="">This CMI report takes a snapshot of a few of Turkey’s most important international relations and vital issues that frame these relationships. Obviously, this report cannot cover everything, as Turkey is a dynamic international actor situated in the center one of the world`s most fluid regions, where the situation both in the region and also within Turkey itself can change and does change from one day to another.</span></p><span data-dcnode-id="2929" instrument_node="">
</span><p data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">Additionally, the structures and processes of foreign policy decision-making within the Presidential System are new, and the effect that this has on the development of foreign policy in “New Turkey” needs more attention and research. The aim of this part of the study has been to take stock of (some) of Turkey`s international relations and the Turkish perspective on international issues that impact upon these relations, to put all of this into an analytical and theoretical context, and finally to identify some directions of future developments. The study is based on desk studies, the author’s collective knowledge, as well as conversations with our networks within Turkey. Fieldwork and consulting with networks was conducted in November- December 2018 and the report written in January – February 2019.</span></p></div><span data-dcnode-id="2925" instrument_node="">
</span><div class="longtext" data-dcnode-id="479"><span data-dcnode-id="2924" instrument_node="">
</span><h1 data-dcnode-id="2922" id="toc-1"><span data-dcnode-id="2923" instrument_node="">Turkey’s international relations – taking stock</span></h1><span data-dcnode-id="2921" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2920" instrument_node="">To narrow our focus at the outset of writing this report the authors discussed what we thought would be the top targets for Turkey’s foreign policy moving forward. At the top of our list was </span><strong data-dcnode-id="2918"><span data-dcnode-id="2919" instrument_node="">Russia</span></strong><span data-dcnode-id="2917" instrument_node="">, because of the multifaceted strategic partnership Turkey has with that country. Next on our list was the </span><strong data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">United States of America</span></strong><span data-dcnode-id="2914" instrument_node="">, thanks to the longstanding, but difficult, alliance Turkey has with the US. Third, we expected that the </span><strong data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Mediterranean </span></strong><span data-dcnode-id="2911" instrument_node="">situation would intensify and therefore that the countries involved would demand Turkey's attention. Finally, </span><strong data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">European</span></strong><span data-dcnode-id="2908" instrument_node=""> countries would still be important to Turkey, especially with regards to the economy.</span></p><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2889"><span data-dcnode-id="2905" instrument_node="">We decided to discuss Turkey's </span><strong data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">regional aspirations</span></strong><span data-dcnode-id="2902" instrument_node=""> within the contexts of &nbsp;(1) the case of </span><strong data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">Syria</span></strong><span data-dcnode-id="2899" instrument_node="">, (2) the politics of the </span><strong data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">Eastern Mediterranean</span></strong><span data-dcnode-id="2896" instrument_node="">, and (3) the politics of the </span><strong data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Black Sea</span></strong><span data-dcnode-id="2893" instrument_node=""> </span><strong data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Region</span></strong><span data-dcnode-id="2890" instrument_node="">. In the upcoming conference at Chr. Michelsen Institute, we will discuss more comprehensively Turkey's regional aspirations, its positions towards other regional actors such as Iran, Saudi Arabia, and Qatar, and its position with respect to regional struggles and ideological foundations (such as for example, Eurasianism, Islamism etc.).</span></p><span data-dcnode-id="2888" instrument_node="">
</span><p data-dcnode-id="2871"><span data-dcnode-id="2887" instrument_node="">&nbsp;We also discussed what issues might impact Turkey's relationship with other countries.&nbsp; Here, the </span><strong data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Kurdish issue</span></strong><span data-dcnode-id="2884" instrument_node=""> stands out as the top issue to impact upon Turkey's foreign relations, especially in the context of the </span><strong data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">Syrian war</span></strong><span data-dcnode-id="2881" instrument_node=""> and Turkey's cross- border fight against PKK and the definition of YPG as PKK’s partner. Thereafter, </span><strong data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">energy</span></strong><span data-dcnode-id="2878" instrument_node=""> is one topic that impacts relations with the US (over Iranian gas/oil), with Russia (from which Turkey imports most of its oil and gas), and not least with the countries involved in the Mediterranean situation, where the potential for energy exploration and extraction is a large part of the picture. We also anticipated that Turkey’s need for </span><strong data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">foreign investments </span></strong><span data-dcnode-id="2875" instrument_node="">would influence Turkish foreign policies. </span><strong data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Syrian refugees</span></strong><span data-dcnode-id="2872" instrument_node=""> would also have an impact upon Turkish policies in Syria and also the relationship with European countries, but maybe not to the same degree as before.</span></p><span data-dcnode-id="2870" instrument_node="">
</span><p data-dcnode-id="2855"><span data-dcnode-id="2869" instrument_node="">Finally, we identified domestic issues that we expect might have implications for Turkish foreign policy. With regards to the national debate amongst the different political parties in the upcoming </span><strong data-dcnode-id="2863"><span data-dcnode-id="2868" instrument_node="">local elections</span><sup data-dcnode-id="2865"><a class="ftnref" data-dcnode-id="2866" href="#ftn1" name="ftnref1" title="http://www.hurriyetdailynews.com/opinion/serkan-demirtas/key-foreign-policy-messages-by-turkeys-Erdoğan -141453"><span data-dcnode-id="2867" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2864" instrument_node="">,</span></strong><span data-dcnode-id="2862" instrument_node=""> we anticipate that Turkey's foreign relations would be a contentious issue that would play into the rhetoric, especially from the MHP/AKP camp. </span><strong data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">The implementation of the Presidential system</span></strong><span data-dcnode-id="2859" instrument_node="">, especially with regards to the processes of decision-making could be a factor, insofar as the workings between the Ministry of Foreign Affairs (MFA ) and the Presidency affects the quality of the information on the basis of which the President makes his decisions. Finally, the </span><strong data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">ideological struggle </span></strong><span data-dcnode-id="2856" instrument_node="">on issues such as religion and nationalism, and between AKP and MHP on foreign policy issues, could also be influential and set constraints upon the preferred policies of the President.&nbsp;</span></p><span data-dcnode-id="2854" instrument_node="">
</span><h1 data-dcnode-id="2850" id="toc-2"><strong data-dcnode-id="2852"><span data-dcnode-id="2853" instrument_node="">Turkey’s relations with Russia; Is Turkey turning towards the East</span></strong><span data-dcnode-id="2851" instrument_node="">?</span></h1><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2841"><em data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">“Turkey’s relationship with neighboring Russian Federation will remain as one of the fundamental elements of our foreign policy”.</span></em><span data-dcnode-id="2846" instrument_node=""> These were the words of Turkey's Foreign Minister at the Ambassadors’ Conference in August 2018,</span><sup data-dcnode-id="2843"><a class="ftnref" data-dcnode-id="2844" href="#ftn2" name="ftnref2" title="https://www.telegraph.co.uk/news/2018/09/11/Erdoğan -warns-attack-idlib-will-send-syrian-refugees-heading/"><span data-dcnode-id="2845" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2842" instrument_node=""> and they highlight the importance of Russia’s relationship to Turkey. Nevertheless, the Foreign Minister continued to point out that Turkey would not stand back from addressing issues of disagreement.</span></p><span data-dcnode-id="2840" instrument_node="">
</span><p data-dcnode-id="2823"><span data-dcnode-id="2839" instrument_node="">Russia has been classified as </span><strong data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">a strategic partner</span></strong><span data-dcnode-id="2836" instrument_node=""> (not an ally) to Turkey, and cooperation with Russia is and will remain for the foreseeable future especially important to Turkey with regards to </span><strong data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">Energy, Trade, and the Syrian conflict.</span></strong><span data-dcnode-id="2833" instrument_node=""> Presently, the planned purchase of S-400 Triumf (SA-21 Growler) medium range ballistic missiles and air defense systems is also framing the relationship and has become an area where Turkey needs to balance Russian interests and demands with those of NATO. In the </span><strong data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Black Sea</span></strong><span data-dcnode-id="2830" instrument_node=""> region, Balkans, Central Asia,&nbsp; and the Caucasus where Russia and Turkey have competitive and often conflicting interests the relations, it is important for Turkey to get insights into Russian thinking and maneuvering. Turkey's </span><strong data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">East/West balancing</span></strong><span data-dcnode-id="2827" instrument_node=""> is a difficult factor in Russian-Turkish relations and one where Russia has much to gain by splitting Turkey from its western allies and alliances. Moving forward Russia’s growing influence in the </span><strong data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Mediterranean </span></strong><span data-dcnode-id="2824" instrument_node="">might also provide a source of concern for Turkey. Below we present a discussion of some of the major issues in Turkey-Russia relations: the nature of the partnership, trade, defense and security, energy, and the Black Sea Region. East/West balancing and the Mediterranean will be discussed later in the report.</span></p><span data-dcnode-id="2822" instrument_node="">
</span><h2 data-dcnode-id="2819" id="toc-3"><strong data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">The nature of the partnership</span></strong></h2><span data-dcnode-id="2818" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">The relationship between Turkey and Russia is characterized by being an elite-driven process mainly shaped by the agencies of Erdoğan and Putin, meaning that it is not institutionalized.&nbsp; We observe some sort of a “strongman brotherhood” between Putin and Erdoğan, creating a unified front against Western criticisms regarding their domestic and foreign policies. Yet, this brotherhood lacks institutionalization/institution-building mechanisms in the sphere of economy (particularly energy, agriculture, tourism), defense, and security. It is also the case that the relationship has a short term focus, issues of discussion are time-framed around weeks rather than years, the relationship is pragmatic, both actors prioritize their self-interest first, and the relationship is characterized by a mutual reactionist attitude towards the West, where the EU and the US are of main concern.</span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Despite it being driven by elites, short-termist, pragmatist, and reactionary, the relationship between Turkey and Russia has been growing stronger. In Ankara’s bureaucratic circles, Russia’s influence is increasing. Also note that Russians know very well how to “empower” those pro-Russian actors/groups and networks in Turkey in the eye of state’s bureaucratic cadres. However, we have serious doubts as to what extent these institutionalization efforts would yield a long-term strategic alliance between Turkey and Russia in the near future.</span></p><span data-dcnode-id="2812" instrument_node="">
</span><p data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">In Ankara the strategic thinking seems to be revolving around the need for diversification of economic and strategic ties to soften the impacts of deteriorating relations with the Western block and to sustain Erdoğan’s rule in Turkey.</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Turkey and Russia’s strategic relations have grown closer in four distinct ways.</span></p><span data-dcnode-id="2806" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">First, relations between Turkey and Russia have slowly grown in response to Turkey’s disengagement (rhetorically) from EU, NATO and the US, particularly since the failed coup attempt. Immediately after the coup, Erdoğan received strong support from Putin, in contrast to what was seen as half-hearted support from Western countries. Although US leadership has rejected the accusations, AKP cadres remain skeptical of US involvement in the coup attempt. This critical issue has given Russia much leverage in strengthening its ties with Turkey.</span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">The second way is future defense cooperation between the two countries. In late 2017, Turkey’s Presidency for Defense Industries, now directly attached to the presidential palace, announced that it had signed a contract with a Russian defense firm to purchase two S–400 air defense systems. The agreement received disapproval from the West, particularly the US, which criticized Turkey’s shifting toward Russia’s sphere of influence. The main problem is that the S–400 is not integrated into NATO’s defense systems. Here, Putin’s game plan might be, through the debate about the defense cooperation between Ankara and Moscow, to keep Ankara questioning its traditional NATO-centric geostrategic orientation so as to hold the Western security bloc in a chronic stalemate on the southern flank.</span></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2794"><span data-dcnode-id="2799" instrument_node="">Third, economic parameters also play a huge role in the Turkey-Russia relationship. Turkey is Russia’s second largest natural gas market after the EU. For Russia, Turkey offers an alternative gas transportation route for Russian gas to going through Ukraine</span><sup data-dcnode-id="2796"><a class="ftnref" data-dcnode-id="2797" href="#ftn3" name="ftnref3" title="https://www.ft.com/content/60d234fa-3e6a-11e9-9bee-efab61506f44"><span data-dcnode-id="2798" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2795" instrument_node="">. In addition to that, Turkey’s first nuclear power plant is being built by Russia’s Rosatom, which is expected to become a significant player in Turkey’s energy sector.</span></p><span data-dcnode-id="2793" instrument_node="">
</span><p data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">Finally, Moscow’s continuous emphasis on its regional Kurdish vision is respectful of the existing political borders and sovereignty of the host states of Turkey, Iraq, Iran, and Syria. Moscow has not established military ties with the YPG in Syria, and this fact, together with Moscow’s assurances to resolve the center-periphery problem between Damascus and the Syrian Kurds through a form of regional autonomy limited by a new constitution, would seem to make Russia a more reliable partner for Ankara in Syria than the US.</span></p><span data-dcnode-id="2790" instrument_node="">
</span><p data-dcnode-id="2788"><span data-dcnode-id="2789" instrument_node="">In sum, Turkish relations with Russia are of both great value and a source of concern (which will be discussed below) for Turkey. This relationship has grown to be more important over the recent years, largely due to the geopolitical shifts in the region. An illustration of this is seen in the increasing frequency of contact between Putin and Erdoğan, as demonstrated in the graphic below.</span></p><span data-dcnode-id="2787" instrument_node="">
</span><figure class="image img13139" data-dcnode-id="2781"><span data-dcnode-id="2786" instrument_node="">
</span><img border="0" class="fullwidth" data-dcnode-id="2785" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cmi.no/img/800/13139-President-Erdogan-Putin-Potus.jpg&amp;raw" srcset="//www.cmi.no/img/800/13139-President-Erdogan-Putin-Potus.jpg 400w, //img.cmi.no/img/800/13139-President-Erdogan-Putin-Potus.jpg 800w, //img.cmi.no/img/1600/13139-President-Erdogan-Putin-Potus.jpg 1600w" title="President-Erdogan-Putin-Potus"><span data-dcnode-id="2784" instrument_node="">
</span><figcaption data-dcnode-id="2783"></figcaption><span data-dcnode-id="2782" instrument_node="">
</span></figure><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2777" instrument_node="">
</span><h2 data-dcnode-id="2774" id="toc-4"><strong data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">Trade</span></strong></h2><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2767"><span data-dcnode-id="2772" instrument_node="">Before the downing of Russian jet in November 2015,</span><sup data-dcnode-id="2769"><a class="ftnref" data-dcnode-id="2770" href="#ftn4" name="ftnref4" title="https://aawsat.com/english/home/article/1563776/damascus-criticizes-turkey’s-reference-adana-treaty-justify-military"><span data-dcnode-id="2771" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2768" instrument_node=""> Russia was Turkey’s second largest economic partner, after Germany. Trade, infrastructure, transportation, energy (see below for a separate discussion on this), agriculture, and tourism are pivotal areas of cooperation. Trade barriers between the two countries have been lifted. Turkey was, for example, Russia's fifth biggest trading partner in the first half of 2018, and trade between Turkey and Russia has increased 37 percent year-on-year, reaching $13.3 billion. Turkey's exports to Russia soared 47 percent, while imports from Russia rose 36 percent. As could be seen from the high profile summits between Putin and Erdoğan and the meetings between the foreign ministers, the renewed Turkish Stream Project and the construction of the Akkuyu Nuclear Power Plant are the most important issues. Tourism, where Turkey enjoys a comparative advantage, is also a critical sector for Turkey.</span></p><span data-dcnode-id="2766" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2765" instrument_node="">In Moscow’s view, the improvement of trade and economic ties with Ankara is now highly dependent on possible cooperation with respect to critical regional issues, specifically in </span><strong data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Syria</span></strong><span data-dcnode-id="2762" instrument_node=""> on one hand, and with respect to </span><strong data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">energy politics</span></strong><span data-dcnode-id="2759" instrument_node=""> on the other. One should also note that Turkey-Russia bilateral relations on economy are not developing via institutional links, but rather are being steered by the political leaders in Russia and Turkey. In this sense, bilateral relations are more actor-driven.</span></p><span data-dcnode-id="2757" instrument_node="">
</span><h2 data-dcnode-id="2754" id="toc-5"><strong data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Defense and security</span></strong></h2><span data-dcnode-id="2753" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">We don’t expect Turkey to leave NATO in the foreseeable future. The Shangai Cooperation Organization (SCO) does not have the structure that can provide an alternative to NATO. But if there is to become a security-defense split, our network attributes this to a refusal of Western allies to understand Turkey and its concerns.</span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">There are several issues that complicate defense cooperation between Russia and Turkey: Turkey’s NATO membership, the Ukraine crisis, and the Crimea annexation. Also note that one of the most interesting outcomes of the improvement in Turkish-Russian relations has been Turkey’s interest in the Russian air defense system S-400 (NATO reporting name: SA-21 Grumble).</span></p><span data-dcnode-id="2747" instrument_node="">
</span><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">First, one should remember that Turkey’s main argument about the S-400 procurement was centered on the West’s reluctance in military cooperation, especially when it comes to defensive strategic weapons. Open-source pieces of evidence suggest that the Russians offered no co-production, offsets, or tech-transfer for the S-400 sale, whereas certain levels of offset prospects are on the table with the Patriot offer. If Washington and Ankara could negotiate good offset options for Turkey’s burgeoning defense industry, and if the problems related to the F-35 deliveries could be ironed-out, the Turkish administration could find a face-saving way out of the S-400 deal without upsetting the critical bilateral ties with Russia.</span></p><span data-dcnode-id="2744" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2743" instrument_node="">The military cooperation with Russia could focus on short- to medium-range mobile air defense systems that combine anti-aircraft artillery and surface-to-air missiles. The Russian defense industry is also very capable of producing this class of weaponry. Acquiring such a capability would provide ground troops with reliable protection, especially when conducting cross-border incursions. Such a capacity, for example, could have prevented the Baath regime’s 24 November 2016 attack on the Turkish troops and the incidents that claimed four lives during Operation Euphrates Shield.</span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Overall, “ideal world” scenarios seem far from the present reality in the Turkey – Russia – US strategic weapons triangle. Most likely by some point in the 2020s, we will not see the Turkish Air Force flying ALIS-connected F-35s, deploying the Patriot PAC-3 MSE systems against ballistic missile threats, and fielding the S-400s for building A2/AD to be used as stand-alone systems at the same time. While all these arms are very capable and even inspiring to any military expert, they do not mix well due to political and technical reasons. Therefore, Ankara will eventually make a decision to go one direction or the other, depending on its foreign policy and defense modernization priorities. Forecasting this decision is not easy at the moment, yet we think that Ankara has recently been very eager to procure both Patriots and S400s.</span></p><span data-dcnode-id="2738" instrument_node="">
</span><h3 data-dcnode-id="2735" id="toc-6"><strong data-dcnode-id="2736"><span data-dcnode-id="2737" instrument_node="">Energy</span></strong></h3><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">Turkish-Russian relations have always been characterized by a complex set of geopolitical issues, in which energy “interdependence” has decreased the possibility of divergence between the two countries. Turkey is dependent on Russia to secure her energy needs. Today, Turkey buys about 55 percent of its natural gas and about 12 percent of its oil from Russia. This supply cannot (easily) be substituted from elsewhere. This fact, and the attendant risk of energy shortage, is such a major threat to Turkey that in many cases it hinders diplomatic maneuvers. For example, Ankara has remained passive with respect to Russia, opting not to protest too much at the Kremlin's assertive policies in the region and deciding to pursue its own political goals pragmatically.&nbsp; On the other side, Turkey is one of the countries that exports a significant percentage of Russian natural gas, second only to Germany. And in total Turkey is one of the foremost receivers of Russian energy export.&nbsp;</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">The Turkey-Russia-EU energy triangle is a relationship of interdependence and strategic compromise. Turkey has argued and will continue to argue vis-à-vis the West for their position (including relations with Russia) and relevance in a strategic energy relationship with the EU.</span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">Russia and Turkey have also created a Joint Fund to arrange their economic relations. The mutual fund is a crucial step for both bilateral relations and the closure of the current account deficit. For officials in Ankara, the aim of this fund is to strengthen local currencies against the dollar. Energy security has long been a vital priority in Ankara’s foreign policy making. Its relationship with regional producers has been shaped by Turkey’s goal to be a transit country linking Russia, the Middle East, and the Caspian Sea to Europe. The aim has been twofold: (1) to diversify energy suppliers in order to meet its own needs, and (2) to increase the country’s relevance as a transit zone.</span></p><span data-dcnode-id="2725" instrument_node="">
</span><p data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">The energy sphere, in particular, highlights several contradictions. Turkey’s national security relies on its ability to diversify its energy sources, yet Turkey has taken steps in recent years that have increased its reliance on Russian energy and technology.</span></p><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2721" instrument_node="">Erdoğan’s decision to grant Rosatom the rights to build the Akkuyu nuclear power plant in southern Turkey is controversial and, according to a Brookings Institute article,</span><sup data-dcnode-id="2718"><a class="ftnref" data-dcnode-id="2719" href="#ftn5" name="ftnref5" title="https://www.setav.org/en/turkey-to-take-matters-into-own-hands-against-terror/"><span data-dcnode-id="2720" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2717" instrument_node=""> it would give Russia “control over a significant portion of Turkey’s electricity production.”&nbsp; In 2003, completion of the Blue Stream pipeline increased exports of Russian gas to Turkey, which now accounts for over 50 percent of Turkey’s overall gas resources. More recently, Erdoğan has signaled his approval for the Turkish Stream pipeline, which, as the paper highlights, will deliver 15.75 billion cubic meters of gas to Turkey and southeastern Europe by 2020. Interest in Turkish Stream could skyrocket if European Union countries decide to buy gas from Turkish Stream. The Russians are still planning to construct two pipes in the first phase. One of them will supply Turkey, and 16 billion cubic meters of gas from the other will be sold to Europe, Gokhan Yardim, the former CEO of BOTAS said in an interview with Al-Monitor.</span><sup data-dcnode-id="2714"><a class="ftnref" data-dcnode-id="2715" href="#ftn6" name="ftnref6" title="https://www.aa.com.tr/en/info/infographic/12924"><span data-dcnode-id="2716" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2713" instrument_node=""> However, if the EU does not turn out to be a good customer, gas from the second pipe could be sold to the Balkan states through bilateral deals. It is not possible to determine how lucrative the Turkish Stream will be as long as European demand remains unspecified. Next year, Turkish Stream will be entering the European arena as a producer and carrier when the TANAP, Trans Anatolian Natural Gas Pipeline, becomes operational.</span></p><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2706"><span data-dcnode-id="2710" instrument_node="">In contrast to Turkey’s goals of diversification, both projects will aggravate Turkey’s dependence on Russian energy. Russia, by contrast, is interested in the stable export of hydrocarbons, the diversification of oil and gas transport routes linking it to external markets, and the export of nuclear technologies. As such, it has always regarded Turkey as one of its key energy partners in Europe.</span><sup data-dcnode-id="2707"><a class="ftnref" data-dcnode-id="2708" href="#ftn7" name="ftnref7" title="https://data2.unhcr.org/en/situations/syria/location/113"><span data-dcnode-id="2709" instrument_node="">[7]</span></a></sup></p><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2704" instrument_node="">According to the Russian International Affairs Council,</span><sup data-dcnode-id="2701"><a class="ftnref" data-dcnode-id="2702" href="#ftn8" name="ftnref8" title="Erdoğan, Emre. 2014. “Unwanted, Unwelcome: Anti-Immigration Attitudes in Turkey.” The German Marshall Fund of the United States Analysis. http://www.gmfus.org/publications/unwanted-unwelcome-anti-immigration-attitudes-turkey. (Retrieved January 10, 2017)."><span data-dcnode-id="2703" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2700" instrument_node=""> energy cooperation between the two nations can be split into four major areas: (1) trade in energy products, primarily the flow of Russian natural gas to Turkey, which is the fastest developing area; (2) Russia’s oil and petroleum products that are shipped through the Turkish Straits, with a similar transit route for natural gas being a future possibility; (3) Russia’s foreign direct investment in the country’s energy industry, including the power generation sector, which has been increasing, specifically in nuclear energy, energy equipment supplies, and maintenance services; and (4) joint projects being carried out in the exploration and production of hydrocarbon resources in Russia and in third countries.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">As long as Erdoğan “challenges” the Western world, particularly by challenging existing relationships with the US, NATO, and EU, Russia’s interest in being a “good friend” to Turkey will likely continue. But despite the efforts of “elites” to elevate the flourishing economic ties into a “strategic alliance,” in the long term such a move seems highly unlikely mainly due to the different (and, most of the time, conflicting) strategic cultures of the two countries.</span></p><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">The relationship could prove more difficult to balance against relationships with Turkey's Western allies and NATO membership as the conflict between Russia and the West intensifies. A close eye should be kept on developments in the Black Sea Region, a region that sometimes is overshadowed by the more explosive and rapidly developing issues in Syria. For Norway, this region is important with regards to Norway's NATO membership and multifaceted relations with European countries and the EU.</span></p><span data-dcnode-id="2692" instrument_node="">
</span><h3 data-dcnode-id="2689" id="toc-7"><strong data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">Black Sea Region</span></strong></h3><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">The security environment in the Black Sea region is rapidly changing. This region brings together Bulgaria, Georgia, Romania, Russia, Turkey, Ukraine, and a hinterland region, including the South Caucasus and Moldova. The situation in the Black Sea has been rather tense since Russia annexed Crimea in March 2014. The United States deployed some warships in the Black Sea after the Russian move. NATO refused to recognize the annexation.</span></p><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2676"><span data-dcnode-id="2684" instrument_node="">The United States has been trying to counterbalance Russia’s growing military and logistics activities in the Black Sea by using NATO. In June 2016, NATO decided to boost its deterrence role in the Black Sea. This, after Erdoğan allegedly told the NATO general: </span><em data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">“the Black Sea has almost become a Russian lake. If we don't act now, history will not forgive us.”</span></em><span data-dcnode-id="2681" instrument_node=""> NATO has become more and more important to Turkey in the Black Sea, irrespective of Turkey's rift with Western partners. Our interviewees told us that before 2014, Turkey could balance Russia in the Black Sea, but not any more, thanks to Russia’s military build-up in the region. For example, Russian cruise missiles cover the entire Black Sea and their air defense missiles range over 40-50%. Sevastopol (Russia's deep water port) has furthermore been a facilitator for Russian raids through the Bosporus into the Mediterranean and for quick supply runs to Russian forces in Syria. Turkey and other NATO members earlier favored a plan to anchor NATO institutionally in the Black Sea, with one example being a proposed naval task force that Romania, Turkey, and Bulgaria would form together with German, Italian, and US support. However, this initiative fell through. But again in 2017, NATO defense ministers endorsed an enhanced presence on the sea, in the air, and on land. Prior to 2014, NATO formulated their strategy with non-traditional security threats such as terrorism and trafficking in mind; now, NATO’s strategy focuses largely on Russian expansionism. According to Mustafa Aydin,</span><sup data-dcnode-id="2678"><a class="ftnref" data-dcnode-id="2679" href="#ftn9" name="ftnref9" title="Göker, Göksel, and Savaş Keskin. 2016. “Haber Medyası ve Mülteciler: Suriyeli Mültecilerin Türk Yazılı Basınındaki Temsili.” İletişim Kuram ve Araştırma Dergisi (41). http://iletisimdergisi.gazi.edu.tr/site/index.php/IKAD/article/view/204."><span data-dcnode-id="2680" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2677" instrument_node=""> project member and Turkey's leading expert on Black Sea studies,</span></p><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2672"><em data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">NATO’s current objective is to find a credible yet unthreatening strategy to deter Russia&nbsp;in its eastern and southern flanks. It is clear that further militarisation of the&nbsp;Black Sea will create an unstable environment that can bring Russia and NATO to the brink of a potential conflict. Though nobody benefits from such an escalation, we should remember that force projections in international relations, which are not countered properly, would eventually lead to further force projections and an eventual showdown.</span></em></p><span data-dcnode-id="2671" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2670" instrument_node="">The Black Sea brings together militarized confrontations, involving multiple actors and complex security and conflict dynamics, including those that stretch beyond the region to the Middle East and Europe. According to SIPRI,</span><sup data-dcnode-id="2667"><a class="ftnref" data-dcnode-id="2668" href="#ftn10" name="ftnref10" title="Preliminary review of the news coverage by Hasret Dikici Bilgin."><span data-dcnode-id="2669" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2666" instrument_node=""> protracted conflicts in the area have recently developed an external dimension in that they have become a source of political dispute between Russia and NATO, and furthermore, there is now increased military support for and military engagement with the different sides in the conflicts. With the Arab Spring, the boundaries between Middle Eastern and Black Sea security areas have blurred; some this development is due to the involvement of Russia and Turkey in the Syrian conflict.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Russian military involvement in Syria, Armenia, Georgia's breakaway regions of Abkhazia and South Ossetia, and on the Crimean peninsula has fueled Turkish fears of encirclement.</span></p><span data-dcnode-id="2661" instrument_node="">
</span><p data-dcnode-id="2655"><span data-dcnode-id="2660" instrument_node="">Turkey, as mentioned earlier, has stayed away from being too vocal on Russia's annexation of Crimea and the Donbas conflict: for example, Turkey did not support Western sanctions, yet opposed the annexation of Crimea and supported the territories of the Tatar minority. This support increased during the Russia-Turkey crisis. However, the Crimea issue and the plight of the Tartars have little impact upon Turkish foreign policy. MHP is the only political party that has traditionally focused on Turkic communities abroad, and apart from within their base, typically has little domestic appeal in Turkey. Thus, although MHP is the “kingmaker” in the parliament, it is not likely that The Tartars is one issue for which they would try to exploit their leverage with AKP. Following Russian moves, Turkey also placed limits on shipping, but it seems like Turkish ships registered in other jurisdictions continue to break the ban.</span><sup data-dcnode-id="2657"><a class="ftnref" data-dcnode-id="2658" href="#ftn11" name="ftnref11" title="This report is based on the research by Hasret Dikici Bilgin and presented as ‘What to do with the Syrians? Party Policies towards the Syrian Refugees in Turkey’, at ISA’s 58th Annual Convention ‘Understanding Change in World Politics’, February 22-25, 2017, Baltimore, Maryland, USA."><span data-dcnode-id="2659" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2656" instrument_node=""> Thus, although Turkey would prefer a stronger Ukraine that could act as an ally in the region, Turkey has for the most part stayed out of the conflict.</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">South Caucasus is another area where Russian and Turkish interests clash and where there is a potential for the two actors to be dragged into opposite sides of existing conflicts.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">The Turkish tree-way partnership with Azerbaijan and Georgia has since the 1990s focused on energy, infrastructure, security, and defense. The near completed Southern Gas Corridor (expected to become operative in 2020), an initiative from the European Commission that is to link the Caspian Sea (and Middle Eastern) gas fields to EU countries, is one especially successful outcome of this partnership.</span></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2647" instrument_node="">Since 2015 Ankara has both supported Georgia’s NATO application and signed defense agreements with Ukraine. But as partner in this region, Azerbaijan is the most important one. And on this issue the public supports the government. A study from Kadir Has University (2019)</span><sup data-dcnode-id="2644"><a class="ftnref" data-dcnode-id="2645" href="#ftn12" name="ftnref12" title="Dr. Bilgin has over the years since the start of the Syrian war collected the data as they appeared and not in retrospect. This report focuses on the results from 2017 onwards, however, Dr. Bilgin study encompass data and analysis from the start of the Syrian war until the present."><span data-dcnode-id="2646" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2643" instrument_node=""> showed that most of the respondents—63,6 %—regarded Azerbaijan as Turkey’s ally</span></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2639"><span data-dcnode-id="2640" instrument_node="">and/or friend. Next on the list was Northern Cyprus with 59,1 %. Given that Turkey is a nation that wishes to become an energy hub, exerting influence over Azerbaijan's oil production and export as well as working together on different energy projects such as the Southern Gas Corridor are both important.</span></p><span data-dcnode-id="2638" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2637" instrument_node="">In 2010, Turkey and Azerbaijan signed an agreement on Strategic Partnership and Mutual Support that includes obligations to assist each other using “all possibilities” in the event of military attack on either by a third country.</span><sup data-dcnode-id="2634"><a class="ftnref" data-dcnode-id="2635" href="#ftn13" name="ftnref13" title="Henceforth referred as the Sub-Commission."><span data-dcnode-id="2636" instrument_node="">[13]</span></a></sup></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">Turkey knows that Russia is the dominant actor in the Black Sea region, and consequently Turkey maneuvers to achieve its interests in the region without making too much noise.</span></p><span data-dcnode-id="2629" instrument_node="">
</span><p data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">The conflict between Armenia and Azerbaijan is a particular challenge to the Turkey-Russian relationship. Russia supports Armenia through defense cooperation and through the Collective Security Treaty Organization. Russia, however, also sells weapons to Azerbaijan and is moving closer to Baku for example through the Azerbaijan-Russia-Iran initiative.&nbsp;</span></p><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">The Nagorno-Karabakh conflict is one that does not often hit the international headlines. It is a low intensity conflict that has had regular flare-ups since the ceasefire agreement in 1994, the most dangerous being the flare-up in April 2016. Exchanges of angry words between Turkey and Russia initiated by the flare-up in Nagorno-Karabakh illustrate the commitments on both sides. However, the rhetoric did not fuel further escalations: Turkey at the time was preoccupied with domestic and other regional problems, and Russia was able to renew the ceasefire between Azerbaijan and Armenia within days. While violence was relatively quickly controlled in 2016, it is important to remember that both Azerbaijan and Armenia are among the ten most militarized countries in the world. Azerbaijan has increased its military capability twenty-fold since 2004, and Armenia gets regularly military support from Russia. The conflict has the potential to draw in Russia and Turkey, but also other international and regional actors such as Iran and the US. The worst-case scenario is one where the conflict escalates out of control and melts together with conflicts in the Middle East, especially the one in Syria. Nagorno-Karabakh also has security and political implications for Europe. OSCE is involved as a facilitator and leads the Minsk group that, together with France, Russia, and the US, seeks to broker a peaceful resolution of the conflict.</span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2622" instrument_node="">With the relations improved between Russia and Turkey, they could use their rapprochement to, if not solve the conflict in the Black Sea Region, at least diffuse violent outbreaks as ICG has argued.</span><sup data-dcnode-id="2619"><a class="ftnref" data-dcnode-id="2620" href="#ftn14" name="ftnref14" title="The sub-commission files can be accessed at https://www.tbmm.gov.tr/komisyon/insanhaklari/altkom1.htm."><span data-dcnode-id="2621" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2618" instrument_node=""> However, according to Gürcan,</span><sup data-dcnode-id="2615"><a class="ftnref" data-dcnode-id="2616" href="#ftn15" name="ftnref15" title="TGNA Internal Regulation, Article 99, https://www.tbmm.gov.tr/ictuzuk/ictuzuk.htm"><span data-dcnode-id="2617" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2614" instrument_node=""> a cooperative attitude in the Black Sea between Turkey and Russia will not be easy to achieve as long as it does not include other coastal countries.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><h2 data-dcnode-id="2609" id="toc-8"><strong data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Concluding</span></strong></h2><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2607" instrument_node="">Turkey will continue to reaffirm its relations with Russia. Erdoğan also has the backing of the Turkish people on this front. In a recent Kadir Has study</span><sup data-dcnode-id="2604"><a class="ftnref" data-dcnode-id="2605" href="#ftn16" name="ftnref16" title="AKP, Cumhurbaşkanlığı Seçimleri ve Genel Seçimler Seçim Beyannamesi, 2018."><span data-dcnode-id="2606" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2603" instrument_node=""> on foreign policy attitudes, 4,1%</span><sup data-dcnode-id="2600"><a class="ftnref" data-dcnode-id="2601" href="#ftn17" name="ftnref17" title="Türkiye ve Göç, Göç İdaresi Genel Müdürlüğü Yayınları No: 18, Temmuz 2014. Accessed at www.goc.gov.tr/files/files/goc_tasarım_icler.pdf on December 16, 2016."><span data-dcnode-id="2602" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2599" instrument_node=""> considered Russia to be a friend of Turkey and placed Russia number two on the list of friendly countries (59,0% answered Azerbaijan and 22% answered that Turkey has no friends). 46,5% of the respondents, compared to 28,4 % in 2017, defined Russian-Turkish relations as cooperative. The top three ways in which Turkey was seen as benefiting from the relationship were energy cooperation, cooperation in tourism, and trade/economic cooperation. Top three sources of enmity were Russia's support to PYD/YPG forces in Syria, the historical rivalry and enmity between the two countries, and Turkey’s shooting down a Russian aircraft.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><p data-dcnode-id="2595"><span data-dcnode-id="2596" instrument_node="">Turkey's dependence on Russia when it comes to energy and to reaching its objectives in Syria are the fundamental drivers when it comes to keeping the relationship on track. Ankara and Moscow will have to control negative impacts of external factors upon its relationship. The parties work on an ad hoc basis, rather than seeking to build new institutional mechanisms. It is also hard to ignore the importance of backdoor diplomacy, but the pace of bilateral steps taken for turning back to pre-crisis level cooperation seems to be falling behind the prevailing rhetoric.&nbsp;</span></p><span data-dcnode-id="2594" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2593" instrument_node="">There is little evidence to suggest that Turkey will opt to enter an alliance with Russia at the cost of its NATO membership. Turkey could use its relations with Russia to diffuse tension between East and West </span><em data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">as well as</span></em><span data-dcnode-id="2590" instrument_node=""> to further its strategy to balance its relationship with Russia and with Western partners so as to (try to) maximize its interests. Andrey Kortunov, Director General of the Russian International Affairs Council asks, </span><em data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">”</span></em><em data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Why doesn’t Ankara take an initiative in promoting more confidence-building measures between Russia and NATO in the Black Sea?”</span></em><span data-dcnode-id="2585" instrument_node=""> And then he continues, </span><em data-dcnode-id="2580"><span data-dcnode-id="2584" instrument_node="">“Thinking strategically, one can even imagine a more important role for Turkey as a country that might be best suited to facilitate a renewal of the currently nearly dormant NATO-Russian Council.”</span><sup data-dcnode-id="2581"><a class="ftnref" data-dcnode-id="2582" href="#ftn18" name="ftnref18" title="Yabancılar ve Uluslararası Koruma Kanunu, No: 6458, Acceptance Date: April 4, 2013, published at the Official Gazette no 28615, date April 11, 2013. The official English translation of the law (The Law on Foreigners and International Protection, LFIP) is available at http://www.goc.gov.tr/icerik6/yabancilar-ve-uluslararasi-koruma-kanunu-10-dilde-tercume-edildi_350_361_1176_icerik. Henceforth, referred as the LFIP."><span data-dcnode-id="2583" instrument_node="">[18]</span></a></sup></em><span data-dcnode-id="2579" instrument_node="">&nbsp; Our assessment is that in theory, Turkey could aspire to such a role, but at the moment we do not foresee such a move by Ankara due to: (1) the Presidency’s anti-Western rhetoric and, Turkey’s estrangement from certain NATO members; (2) its lack of institutionalized connection to Russia; (3) the implementation of the presidential system that makes foreign policy strategic planning difficult, and (4) the weight of domestic and other foreign policy issues.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2574"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="2573" instrument_node="">
</span><h1 data-dcnode-id="2570" id="toc-9"><strong data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">Turkey's relations with the US</span></strong></h1><span data-dcnode-id="2569" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2568" instrument_node="">By the end of the 2</span><sup data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">nd</span></sup><span data-dcnode-id="2565" instrument_node=""> World War, Turkey chose to side with the Western alliance and moved close to the new superpower, the United States. When Stalin in 1946 opted for Turkish territory, the Turkish leadership’s alliance-forming initiatives with the US picked up speed. The threat posed by Russia aligned Turkey completely with the US, who in return granted Turkey security guarantees. The relationship with Washington became a bulwark of Turkish foreign policy and a crucial insurance policy against the Soviet Union. In 1952 Turkey became full member of NATO, thereby cementing Turkey's Cold War alliance with the US. During this period there were intermittent problems in the relationship, such as the 1974 Cyprus War. Still, the Turkish leadership placed trust in its close alliance with the United States to guarantee its security throughout the Cold War. According to Cagaptay,</span><sup data-dcnode-id="2562"><a class="ftnref" data-dcnode-id="2563" href="#ftn19" name="ftnref19" title="LFIP, Article 61."><span data-dcnode-id="2564" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2561" instrument_node=""> while Erdoğan, like his predecessors, has sought to reclaim great power status for Turkey, he has departed from previous strategy in one significant way:</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2556"><em data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Erdoğan has rejected the idea of tying Turkey to great powers while working toward his goal. He has instead moved to cast Turkey as an autarchic power wielding influence over its neighbors, occasionally rejecting traditional Western partners, and seeking new relationships with Russia, Iran, and China.</span></em></p><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">From our contacts we learned that with the election of Trump and his apparent fascination with authoritarian leaders, some government officials hoped for an improvement in the relationship, after a rather cold period at during the end of the Obama period. This has proven at times to be the case: Erdoğan and Trump seem to get along on a personal level. Nevertheless, the relationship between the two countries has had some serious troubles in recent times.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><h2 data-dcnode-id="2549" id="toc-10"><strong data-dcnode-id="2550" style="font-size: 1em;"><span data-dcnode-id="2551" instrument_node="">The Andrew Brunson Case.</span></strong></h2><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Andrew Brunson, a pastor who had for about twenty years been living in Turkey and who worked as a pastor of the Izmir Resurrection Church, in October 2016 was arrested and charged with espionage and links to the Gülen network and the PKK. In August 2018, after rounds of unfruitful diplomacy, the US Treasury Department imposed sanctions on two Turkish Ministers, and Trump announced sanctions on Turkish aluminum and steel imports. This move sent the Turkish Lira in a tailspin, and finally in October 2018, Brunson was released and sent back to the US and sanctions partly lifted.&nbsp;&nbsp;</span></p><span data-dcnode-id="2545" instrument_node="">
</span><h2 data-dcnode-id="2540" id="toc-11"><strong data-dcnode-id="2543" style="font-size: 1em;"><span data-dcnode-id="2544" instrument_node="">Fethulla </span></strong><strong data-dcnode-id="2541" style="font-size: 1em;"><span data-dcnode-id="2542" instrument_node="">Gülen</span></strong></h2><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2538" instrument_node="">Shortly after the botched coup attempt of 15 July 2016, the Turkish government stated that Fethullah Gülen and/or his movement had organized the coup attempt. Fethullah Gülen, an earlier strategic partner of the AKP, has lived in the US since 1999. After the failed coup, the Turkish government has made Gülen's extradition one of the central points of its foreign policy towards the US. The United States has demurred, claiming that Turkey has not presented sufficient evidence against Gülen to justify extradition proceedings. Trump has promised to look into the matter as White House spokeswoman Sarah Huckabee Sanders stated on 18 December 2018</span><sup data-dcnode-id="2535"><a class="ftnref" data-dcnode-id="2536" href="#ftn20" name="ftnref20" title="TBMM İnsan Haklarını İnceleme Komisyonu Raporu, Esas no: 1/619, Karar No: 21, May 30, 2012."><span data-dcnode-id="2537" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2534" instrument_node="">, however Turkish diplomats have claimed that Trump promised Erdoğan, at the G20 summit in Argentina, to extradite Gülen to Turkey. Early in January a special team from FBI came to Ankara on a special visit arranged by the Trump administration after the phone call with Erdoğan on 14 December 20118. The team visited prisons and interviewed the high profile figures who allegedly masterminded and commanded the coup attempt, such as Kemal Batmaz and some top generals. The team also visited Turkey's Ministry of Justice and was given some reportedly solid evidence to Gülen's involvement in the failed coup. Our perception is that the Trump administration is looking for solid evidence, if any, of Gülen's direct involvement to increase pressure on the Gülenist network in the US and possibly pressure the US legal system to extradite Gülen. As Sinan Ülgen has argued,</span><sup data-dcnode-id="2531"><a class="ftnref" data-dcnode-id="2532" href="#ftn21" name="ftnref21" title="Türkiye ve Göç, p. 14."><span data-dcnode-id="2533" instrument_node="">[21]</span></a></sup><span data-dcnode-id="2530" instrument_node=""> </span><em data-dcnode-id="2527"><span data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">”What Trump could do is press the US Justice Department to review and work more collaboratively with the Turkish authorities to build a case. They could work with their Turkish counterparts to prepare a file that would be sufficient for the US courts.”</span></span></em></p><span data-dcnode-id="2525" instrument_node="">
</span><h2 data-dcnode-id="2522" id="toc-12"><strong data-dcnode-id="2523" style="font-size: 1em;"><span data-dcnode-id="2524" instrument_node="">Problems with the US Congress.</span></strong></h2><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2507"><span data-dcnode-id="2520" instrument_node="">When Erdoğan's security detail beat up protesters in Washington, DC in May 2017, it caused heavy criticism from the Congress and prompted Senator John McCain to state that the US should expel the Turkish Ambassador. The Michael Flynn case, which involved an allegation that Mr. Flynn had lobbied the Congress for the extradition of Gülen and allegedly had a plan to “kidnap” Gülen and deliver him to Turkish authorities,</span><sup data-dcnode-id="2517"><a class="ftnref" data-dcnode-id="2518" href="#ftn22" name="ftnref22" title="‘Turkish Perceptions Survey 2015’, the German Marshall Fund of the United States, accessed at http://www.gmfus.org/search/turkey%20perceptions%20survey (on February 10, 2017). I would like to thank Dr. Emre Erdoğan for his guidance on the survey data."><span data-dcnode-id="2519" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2516" instrument_node=""> also did not sit well with members of Congress. Connected with the release of Mr. Brunson, Ankara tried to secure the transfer of a Turkish banker, Mehmet Hakan Atilla.</span><sup data-dcnode-id="2513"><a class="ftnref" data-dcnode-id="2514" href="#ftn23" name="ftnref23" title="‘CHP: AKP Türkiye’yi Ortadoğu Bataklığına Sürüklüyor’, Milliyet, August 9, 2011."><span data-dcnode-id="2515" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2512" instrument_node=""> The deal was simple, but it failed. US sources suggested that Turkey added a demand at the last minute regarding Halkbank (a Turkish state-controlled bank) – asking for leniency in paying a US Treasury fine on the bank and for there to be no new indictment. Meanwhile, Turkish media reported that it fell through due to new investigations by the Department of the Treasury’s Office of Foreign Assets Control (OFAC). In 2012, Atilla was, according to the charge, involved in a scheme to help Iran spend oil and gas revenues abroad using fraudulent gold and food transactions through Halkbank, violating US sanctions. The delicate diplomatic twist to this case involves the wealthy Turkish-Iranian gold trader Reza Zarrab. He testified during the trial in New York that he bribed Turkish officials and that Erdoğan personally signed off on parts of the scheme while serving as Turkey’s prime minister. Atilla was sentenced to thirty-two months in prison. In July 2018, Legislation was introduced in the Senate that seeks to restrict loans from international financial institutions to Turkey until the Turkish government stops its “unjust” detention of American citizens.</span><sup data-dcnode-id="2509"><a class="ftnref" data-dcnode-id="2510" href="#ftn24" name="ftnref24" title="MHP, Toplumsal Onarım ve Huzurlu Gelecek: Bizimle Yürü Türkiye, May 2015."><span data-dcnode-id="2511" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2508" instrument_node=""> This bill suggests directing the World Bank and European Bank for Reconstruction and Development (EBRD) to oppose future loans to Turkey, except for humanitarian purposes. The EBRD invested 1.5 billion Euros in Turkey in 2017.</span></p><span data-dcnode-id="2506" instrument_node="">
</span><h2 data-dcnode-id="2503" id="toc-13"><strong data-dcnode-id="2504" style="font-size: 1em;"><span data-dcnode-id="2505" instrument_node="">S-400 (SA-21 Grumble)</span></strong></h2><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">The US Congress seeks to prevent Turkey from purchasing F-35 Joint Strike Fighter Jets should Ankara decide to go for the S400 (a long range surface-to-air missile systems) deal with Russia. Forecasting this decision is not easy at the moment, yet we think that Ankara has been very eager to procure both Patriots and S400s. The real question is whether or not this endeavor would be tolerable in Washington. The US Congress, the Pentagon, and many circles in NATO have been very disturbed by Ankara’s decision to procure these two systems together. Many factors, ranging from the US support to the YPG / PYD in Syria to Russia’s stance in Idlib, could affect the Turkish administration’s roadmap on this front. One thing is certain, though: Turkey is a powerful G-20 and NATO member with a game-changing regional posture. Whatever the decision between the Patriot and the S-400 is, it will have broad geopolitical ramifications.</span></p><span data-dcnode-id="2499" instrument_node="">
</span><h2 data-dcnode-id="2496" id="toc-14"><strong data-dcnode-id="2497" style="font-size: 1em;"><span data-dcnode-id="2498" instrument_node="">The Joint Comprehensive Plan of Action (JCPOA)</span></strong></h2><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2494" instrument_node="">Trump's disregard for the Iran-deal (JCPOA) is another area where Turkey and the US don't see eye to eye. Erdoğan wants the deal to stay in place, in line with the wishes of the other partners in this deal and of several others. Turkey has many interests in trading with Iran, especially in Iranian oil and gas. On 25 July 2018, Turkey’s Foreign Minister Mevlüt Çavuşoğlu rejected US sanctions against Iran: </span><em data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">“We have no obligation to support the unilateral sanctions of one country against another country, especially when we think they are inappropriate,”</span></em><span data-dcnode-id="2491" instrument_node=""> he said, adding</span><em data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">, “If we do not buy oil and gas from Iran, where should we provide our needs from?”</span></em><sup data-dcnode-id="2486"><a class="ftnref" data-dcnode-id="2487" href="#ftn25" name="ftnref25" title="Minutes from the meeting dated February 24, 2016."><span data-dcnode-id="2488" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2485" instrument_node=""> Turkey is on the list of countries that is temporarily exempted from secondary sanctions imposed by the US. However, we expect the JCPOA to be a source of disagreement and tension in the future.&nbsp;</span></p><span data-dcnode-id="2483" instrument_node="">
</span><h2 data-dcnode-id="2480" id="toc-15"><strong data-dcnode-id="2481" style="font-size: 1em;"><span data-dcnode-id="2482" instrument_node="">Jerusalem Peace Plan</span></strong></h2><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Just as we are about to conclude this report, the news broke that Jared Kushner (US senior advisor in charge of brokering peace in Israeli–Palestinian conflict and son-in-law of President Trump) met with Erdoğan and Albayrak (Minister of Finance and Treasury and son-in-law of President Erdoğan) at the Presidential Palace in Ankara. One of our contacts in Ankara informed us that the following topics were on the table at that meeting:</span></p><span data-dcnode-id="2476" instrument_node="">
</span><ol data-dcnode-id="2455"><span data-dcnode-id="2475" instrument_node="">
</span><li data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Ankara’s support for Trump’s Jerusalem peace plan, as well as Kushner’s asking for Ankara’s support to influence Palestinians.</span></li><span data-dcnode-id="2472" instrument_node="">
</span><li data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Iran and US’s economic sanctions: Kushner warned Ankara that, in the post-ISIS setting, both in Iraq and Syria, Iran is the emerging enemy and the Trump will not tolerate Ankara’s attempts to break US-imposed economic sanctions against Iran.</span></li><span data-dcnode-id="2469" instrument_node="">
</span><li data-dcnode-id="2463"><span data-dcnode-id="2468" instrument_node="">Ways to boost economic ties between Turkey and the US, and Ankara’s attempts to boost American investments in Turkey (we think this is why Albayrak attended the meeting</span><sup data-dcnode-id="2465"><a class="ftnref" data-dcnode-id="2466" href="#ftn26" name="ftnref26" title="Minutes from the meeting dated February 24, 2016."><span data-dcnode-id="2467" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2464" instrument_node="">)</span></li><span data-dcnode-id="2462" instrument_node="">
</span><li data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Potential removal of Turkey from the F-35 consortium and the possible second order impact on legacy licensing, both of which hit right at the post-1980 framing of the bilateral relationship. We perceive this problem to be the most explosive issue in the bilateral ties between Turkey and the US in the coming months. We expect that Erdoğan asked for Kushner’s help to defend Turkey in Washington, DC against the Congress and US’s security bureaucracy.</span></li><span data-dcnode-id="2459" instrument_node="">
</span><li data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Halkbank/Zerrab case and Trump’s backing for the possible return of Hakan Atilla, the deputy president of Halkbank currently imprisoned in the US.</span></li><span data-dcnode-id="2456" instrument_node="">
</span></ol><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">We expect that if there were to be presented a new peace plan for the Israel – Palestine conflict, that this will result in substantial disagreement between the two countries. President Erdoğan will advocate for the Palestinian case in the international, regional and domestic arena if he sees/perceives that the plan fails to accommodate the Palestinian's claims/rights. A counter-argument to this involves the mediation aspirations of The Turkish government. If there were a role for Turkey to assume in this peace process, this prospect would put a temporarily lid on criticism coming out of Ankara.&nbsp;&nbsp;</span></p><span data-dcnode-id="2451" instrument_node="">
</span><h2 data-dcnode-id="2448" id="toc-16"><strong data-dcnode-id="2449" style="font-size: 1em;"><span data-dcnode-id="2450" instrument_node="">Syria: Disengagement and Pullout</span></strong></h2><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">First, Turkey perceived that is was left alone in advocating that the Assad regime had to step down after the US disengagement from Syria (apart from ousting/fighting ISIS). Now Turkey is “forced” to work with Iran and Russia. Turkey perceives that it does not have the option to leave Syria militarily or otherwise, since the developments there are closely linked to Turkey's security. The latest cooperative plan of Iran, Russia, and Turkey has come via the Astana process (see image below).</span></p><span data-dcnode-id="2444" instrument_node="">
</span><figure class="image img13140" data-dcnode-id="2434"><span data-dcnode-id="2443" instrument_node="">
</span><img border="0" class="fullwidth" data-dcnode-id="2442" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cmi.no/img/800/13140-Astana-Peace-Talks.jpg&amp;raw" srcset="//www.cmi.no/img/800/13140-Astana-Peace-Talks.jpg 400w, //img.cmi.no/img/800/13140-Astana-Peace-Talks.jpg 800w, //img.cmi.no/img/1600/13140-Astana-Peace-Talks.jpg 1600w" title="Astana-Peace-Talks"><span data-dcnode-id="2441" instrument_node="">
</span><figcaption data-dcnode-id="2436"><span data-dcnode-id="2440" instrument_node="">
</span><strong data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Astana Peace Talks</span></strong><span data-dcnode-id="2437" instrument_node="">
</span></figcaption><span data-dcnode-id="2435" instrument_node="">
</span></figure><span data-dcnode-id="2433" instrument_node="">
</span><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2425"><span data-dcnode-id="2429" instrument_node="">Second, the US has demonstrated a lack of sensitivity toward an ally's national security concerns by partnering with YPG (against ISIS) in Syria. YPG, which has (strong) connections with the PKK, has been designated a terrorist group by both Turkey and the US. Washington and Ankara have strongly disagreed about whether YPG is connected to PKK, Interestingly, in their yearly threat assessment the US intelligence community confirms this connection.</span><sup data-dcnode-id="2426"><a class="ftnref" data-dcnode-id="2427" href="#ftn27" name="ftnref27" title="See Metin Gürcan, project member, for an analysis in Al-Monitor on the issue of the Greek-Turkish meeting: https://www.al-monitor.com/pulse/originals/2019/02/turkey-greece-tsipras-visit-laden-symbolic-gestures.html"><span data-dcnode-id="2428" instrument_node="">[27]</span></a></sup></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Third, on 16 January 2019, President Trump announced that the US would withdraw from Syria through this Twitter:</span></p><span data-dcnode-id="2421" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2418" instrument_node="">
</span><figure class="image img13132" data-dcnode-id="2408"><span data-dcnode-id="2417" instrument_node="">
</span><img border="0" class="fullwidth" data-dcnode-id="2416" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cmi.no/img/800/13132-Twitter.jpg&amp;raw" srcset="//www.cmi.no/img/800/13132-Twitter.jpg 400w, //img.cmi.no/img/800/13132-Twitter.jpg 800w, //img.cmi.no/img/1600/13132-Twitter.jpg 1600w" title="Twitter"><span data-dcnode-id="2415" instrument_node="">
</span><figcaption data-dcnode-id="2410"><span data-dcnode-id="2414" instrument_node="">
</span><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Twitter</span></strong><span data-dcnode-id="2411" instrument_node="">
</span></figcaption><span data-dcnode-id="2409" instrument_node="">
</span></figure><span data-dcnode-id="2407" instrument_node="">
</span><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">President Erdoğan responded through an Op-Ed in New York Times:</span><sup data-dcnode-id="2400"><a class="ftnref" data-dcnode-id="2401" href="#ftn28" name="ftnref28" title="https://www.nytimes.com/2019/01/07/opinion/Erdoğan-turkey-syria.html"><span data-dcnode-id="2402" instrument_node="">[28]</span></a></sup></p><span data-dcnode-id="2398" instrument_node="">
</span><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Erdoğan gives Trump right in his decision to depart Syria, but that it should be done so as to to meet “interests of US, international community and Syrians”</span></p><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">Erdoğan argues: (1) Turkey is the only actor that can lay claim to “American Succession” in Syria, because it’s a loyal, combat-capable NATO member safeguarding its southern borders from ISIS terrorists. (2) Turkey is the only one who simultaneously works both with the US and Russia; on both Geneva and Astana processes – the US needs Turkey to understand Moscow’s moves. (3) Turkey is also a victim of ISIS, Erdoğan is their personal sworn enemy, and thus the policy to finish them has a deep personal dimension to Ankara – and employing this argument, he dismissed arguments of those criticizing Ankara for collaboration with terrorists. Erdoğan also made three arguments disparaging the US: (1) unlike the US, Turkey knows how to operate carefully (points to destruction of Raqqa, Mosul, and preservation of Al Bab); (2) unlike the US, Turkey has a “comprehensive strategy;” and (3) the US didn't learn lessons from the Iraqi campaign, but Turkey did. Here he addresses nationalists at home and seeks to make align with skeptics of the US government. Finally, Erdoğan offered reassurance: Turkey is not what “Turkey-haters” imagine. Turkey hosted both Christians and Yezidis when they had to flee from ISIS. Turkey is no enemy to Kurds. Those who joined YPG are just prodigal kids who will be accommodated. And he reiterated that YPG is a branch of PKK, which is recognized as a terrorist organization by US as well.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><h2 data-dcnode-id="2389" id="toc-17"><strong data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Anti-US/West sentiments</span></strong></h2><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2387" instrument_node="">Amongst the nationalists and in the press close to Erdoğan, the US pullout was seen as a result of Turkey’s policies in Syria, as Yeni Safak illustrates:</span><sup data-dcnode-id="2384"><a class="ftnref" data-dcnode-id="2385" href="#ftn29" name="ftnref29" title="The following analysis is by project member Metin Gürcan. See full text in Al-Monitor https://www.al-monitor.com/pulse/originals/2018/09/turkey-why-ankara-wants-permanent-naval-base-in-cyprus.html"><span data-dcnode-id="2386" instrument_node="">[29]</span></a></sup></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2376"><em data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Trump's decision to withdraw from Syria, even if only seemingly, is a result of Turkey's determined attitude since Operation Euphrates Shield; it is the US faltering and taking a step back.” </span></em><span data-dcnode-id="2379" instrument_node="">But also with skepticism: </span><em data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">”if US troops withdraw from Syria, even partially, it is going to continue its plans with organizations, terrorists, hypocritical evil forces and countries that are its puppets.</span></em></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2374" instrument_node="">Anti-American sentiment rose in Turkey, with the Turkish president blaming Washington for the collapse of Turkey’s currency. Consider the following example of his fierce rhetoric from August 2018: </span><em data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">”An attack on our economy is no different from a direct strike against our flag and call to prayer. The aim is no different. It is to bring Turkey and the Turkish people to their knees.”</span><sup data-dcnode-id="2370"><a class="ftnref" data-dcnode-id="2371" href="#ftn30" name="ftnref30" title="https://www.hegnar.no/Nyheter/Boers-finans/2018/10/Tyrkisk-selskap-kan-vaere-kjoeperen-av-miliardrigg ; https://www.odfjelldrilling.com/globalassets/news/brochures/rig-brochures-odfjell-drilling-rig-brochure-skjermvisning.pdf ; https://www.offshoreenergytoday.com/tpaos-fatih-drillship-heads-offshore-to-drill-for-oil-and-gas/"><span data-dcnode-id="2372" instrument_node="">[30]</span></a></sup></em></p><span data-dcnode-id="2367" instrument_node="">
