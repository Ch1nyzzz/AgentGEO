</span><p data-dcnode-id="1827"><span data-dcnode-id="1835" instrument_node="">After various operations by the Syrian regime (and Russian) forces, during the first 6 months of 2018, to take back territory held by ISIL and other rebel groups, fighters who did not surrender were captured and transported to the province of Idlib. In August the regime forces set up troops outside Idlib and started bombarding rebel-concentrated areas. As the Russian airpower and the Syrian air force bombarded Idlib, the international fear over a grand offensive increased. The UN warned of a massacre if the offensive were to be carried out, and Turkey warned of a possible new wave of refugees and relocated troops to the frontlines.</span><sup data-dcnode-id="1832"><a class="ftnref" data-dcnode-id="1833" href="#ftn77" name="ftnref77" title="Foreign Minister Mevlüt Çavuşoğlu speach at the 10th Ambassadors’ Conference, Ankara, August 2018."><span data-dcnode-id="1834" instrument_node="">[77]</span></a></sup><span data-dcnode-id="1831" instrument_node=""> In September it was announced that Russia and Turkey had brokered a deal to create a demilitarized zone in the northwest Idlib region that would be free of all heavy weapons and jihadist fighters. In this deal, Russia agreed to stop the planned offensive, while Turkey agreed to remove extremists from the area vis-à-vis the territories held by the regime. Turkey has had great difficulties upholding its side of the deal, and the last weeks have seen a range of meetings on Idlib. The last development is an agreement on joint patrols by Turkey and Russia, where Russia patrols outside and Turkey inside Idlib. Turkey fears that Russia and Syrian regime forces are going to undertake a military operation to clear out the remaining rebels, whereas Russia wants the war to end with the elimination of the extremists.</span><sup data-dcnode-id="1828"><a class="ftnref" data-dcnode-id="1829" href="#ftn78" name="ftnref78" title="https://www.oxfordenergy.org/wpcms/wp-content/uploads/2016/02/Russian-Gas-Transit-Across-Ukraine-Post-2019-NG-105.pdf"><span data-dcnode-id="1830" instrument_node="">[78]</span></a></sup></p><span data-dcnode-id="1826" instrument_node="">
</span><h2 data-dcnode-id="1823" id="toc-33"><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Concluding</span></strong></h2><span data-dcnode-id="1822" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Ankara is concerned about existential security threats arising from the Syrian conflict, and their strategy towards the Syrian war is focused on eliminating these threats. However, their actions are constrained by other power actors with blurred intentions. The US seems unable (within the administration) to put forward a coherent strategy, and President Trump keeps changing his mind on the matter. Meanwhile, Moscow is much more concerned about its geopolitical influence in security and energy architecture in the Middle East.</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1816" instrument_node="">
</span><h1 data-dcnode-id="1813" id="toc-34"><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">The Syrian refugees</span></strong></h1><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">The Syrian refugees have, since the war in Syria began, sparked much international debate, including in Norway. In the context of Turkey, which has taken care of most of the refugees coming out of Syria, the EU-Turkey Statement marked a relatively new way of managing refugees. This deal incorporates the idea of “Helping refugees where they are,” that is, assisting forcibly displaced persons as close to their previous homes as possible, which some argue is the best option for the refugees and most cost-effective for humanitarian donors (Betts &amp; Collier, 2017).</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Norway is not part of the EU-Turkey agreement, but provides a total of 58 million NOK (2017 numbers) of funding for the refugees through NGOs and international organizations like UNICEF. The Office of the Auditor General of Norway has noted that it is challenging to trace the money from donor (Norway) to the refugees in Turkey.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1805" instrument_node="">Syrians constitute today the world’s largest group of refugees, the majority living in Turkey (about 3,7 mill).</span><sup data-dcnode-id="1802"><a class="ftnref" data-dcnode-id="1803" href="#ftn79" name="ftnref79" title="http://russiancouncil.ru/en/analytics-and-comments/analytics/sostoyanie-i-perspektivy-rossiysko-turetskikh-otnosheniy-v-e/"><span data-dcnode-id="1804" instrument_node="">[79]</span></a></sup><span data-dcnode-id="1801" instrument_node=""> The EU-Turkey Statement, although heavily criticized, is an important case of current efforts to focus assistance in regions of refugee origin. According to this agreement, Turkey agreed to block onward flight in return for certain benefits from the EU, including financial support for hosting refugees. European politicians have argued that regionally focused aid to refugees is in the best interest of beneficiaries, Europe, and the host nation. At the same time, Turkey has its own strategic interests including military involvement in Syria as well as the fact that the government’s refugee policy and the presence of refugees themselves are becoming increasingly unpopular within Turkey. This, of course, influences the quality and durability of the protection Turkey is willing to provide.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1798" instrument_node="">In this section of the report we devote much space to discussion of </span><strong data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">the different political parties’ stances, towards the refugees in Turkey</span></strong><span data-dcnode-id="1795" instrument_node="">. We also discuss here how they assess the status of the Syrian refugees; whether they take a rights-based or security-based approach as the foundation for their policies; how they view integration, assimilation, or return as options for the Syrian refugees in the future; and how they assess the relationship between local communities and refugees. We further highlight two issues that we have not seen much reported elsewhere</span><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">: </span></strong><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">the altering of the relationship between Turkish men and </span></strong><span data-dcnode-id="1790" instrument_node="">women, as well as the </span><strong data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">lost generation of Syrian youth</span></strong><span data-dcnode-id="1787" instrument_node=""> that lives in Turkey. Finally, we take a short look at how the </span><strong data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">EU evaluates the EU-Turkey Statement</span></strong><span data-dcnode-id="1784" instrument_node="">. </span><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1779" instrument_node="">The first group of Syrians arrived in Turkey in April 2011 as Turkey opened its Cilvegözü border and identified its newly designated policy as the “Open Door Policy.” Turkish public opinion was at first sympathetic to the Syrians who had been forced to leave their homes as the civil war erupted. There was a general expectation at the elite and mass level that the Syrian regime would change in a few months and the “guests” would return immediately. However, as the civil war lingered and the number of refugees mounted, the initial public response of sympathy to the humanitarian drama gradually faded into a sense of unease, to say the least, just as the economic and social consequences of the refugees’ presence became evident. The attitudes of the politicians and the media coverage have reinforced each other, which has strengthened the overall negative perception of the migrants.</span><sup data-dcnode-id="1776"><a class="ftnref" data-dcnode-id="1777" href="#ftn80" name="ftnref80" title="http://russiancouncil.ru/en/analytics-and-comments/analytics/sostoyanie-i-perspektivy-rossiysko-turetskikh-otnosheniy-v-e/"><span data-dcnode-id="1778" instrument_node="">[80]</span></a></sup><span data-dcnode-id="1775" instrument_node=""> A brief review of the news coverage indeed reveals that the Syrians in Turkey have been projected as both the victims and the primary source of the major socio-economic problems.</span><sup data-dcnode-id="1772"><a class="ftnref" data-dcnode-id="1773" href="#ftn81" name="ftnref81" title="Mustafa Aydın, “Power struggle in the Black Sea”, Hürriyet Daily News, 30 March 2017."><span data-dcnode-id="1774" instrument_node="">[81]</span></a></sup><span data-dcnode-id="1771" instrument_node=""> The press statements of the political parties do not seem much different. Any search of the party declarations on the Syrian migrants turns up calls for assistance and to charity organizations in general, as well as criticisms of the internal and external policy failures (here, in the case of the opposition parties).</span><sup data-dcnode-id="1768"><a class="ftnref" data-dcnode-id="1769" href="#ftn82" name="ftnref82" title="https://www.sipri.org/sites/default/files/2018-12/sipripp50_0.pdf"><span data-dcnode-id="1770" instrument_node="">[82]</span></a></sup><span data-dcnode-id="1767" instrument_node=""> In other words, the Syrian migrants again emerge as passive victims and malefactors. What does not take place in the news coverage is any indication of how the parties really perceive the migration issue and what kind of solid policies they are preparing, if any.</span><sup data-dcnode-id="1764"><a class="ftnref" data-dcnode-id="1765" href="#ftn83" name="ftnref83" title="ICG; https://www.crisisgroup.org/europe-central-asia/western-europemediterranean/turkey/250-russia-and-turkey-black-sea-and-south-caucasus"><span data-dcnode-id="1766" instrument_node="">[83]</span></a></sup><span data-dcnode-id="1763" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1761" instrument_node="">
</span><h2 data-dcnode-id="1758" id="toc-35"><em data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Party positions</span></em></h2><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">The perceptions and (proposed) policies of the different political parties are discussed in this section of the report. This discussion is based on the results from a study by project member Hasret Dikici Bilgin. The uniqueness of this analysis is that the documents upon which to a large degree the analysis is based have since been removed from the official archives.</span><sup data-dcnode-id="1753"><a class="ftnref" data-dcnode-id="1754" href="#ftn84" name="ftnref84" title="Mustafa Aydin, Mitat Celikpala, Cihan Dizdaroglu, Murat Guvenc, Banu Baybars Hawks, Emrah Karaoguz, Osman Zaim, Mustafa Gökcan Kösen, Basri Alp Akıncı, Survey Report on Social-Political Trends in Turkey – 2018, Istanbul, Kadir Has University, Center for Turkish Studies, 30 January 2019"><span data-dcnode-id="1755" instrument_node="">[84]</span></a></sup></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1734"><span data-dcnode-id="1750" instrument_node="">In addition to the different party’s election manifestos, we looked at the minutes of the meetings of the Refugee Rights Sub-Commission of the Turkish Grand National Assembly (TGNA) as well as the written interpellations to the government. The Sub-Commission</span><sup data-dcnode-id="1747"><a class="ftnref" data-dcnode-id="1748" href="#ftn85" name="ftnref85" title="ICG p.15"><span data-dcnode-id="1749" instrument_node="">[85]</span></a></sup><span data-dcnode-id="1746" instrument_node=""> was established in late 2015 and is comprised of four AKP deputies, and one from each of CHP, MHP, and HDP. The commission has held 13 sessions since then with the representatives of NGOs, legal experts, and relevant ministries.</span><sup data-dcnode-id="1743"><a class="ftnref" data-dcnode-id="1744" href="#ftn86" name="ftnref86" title="ICG; https://www.crisisgroup.org/europe-central-asia/western-europemediterranean/turkey/250-russia-and-turkey-black-sea-and-south-caucasus"><span data-dcnode-id="1745" instrument_node="">[86]</span></a></sup><span data-dcnode-id="1742" instrument_node=""> As most of these sessions are briefings by the interested groups, the issues at hand are not analyzed; rather the party positions are traced during the discussions. The written interpellations form an integral mechanism for the legislative control over the activities of the government in the Turkish system. The scope and means of the interpellations are determined by the TGNA’s internal regulations, according to which the addressed ministries have to respond in fifteen days.</span><sup data-dcnode-id="1739"><a class="ftnref" data-dcnode-id="1740" href="#ftn87" name="ftnref87" title="https://www.al-monitor.com/pulse/originals/2016/12/turkey-russia-nato-is-ankara-changing-black-sea-policy.html"><span data-dcnode-id="1741" instrument_node="">[87]</span></a></sup><span data-dcnode-id="1738" instrument_node=""> However, as lack of response receive no sanction, the ministries tend to ignore or provide rhetorical answers at best. The other relevant party documents such as booklets and reports are consulted whenever possible. In the case of AKP the analysis of the party’s attitude towards the Syrian migrants has been built on the activities and documents of the Directorate General of Migration Management (</span><em data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Göç İdaresi Genel Müdürlüğü</span></em><span data-dcnode-id="1735" instrument_node="">, DGMM), which was established in April 2013.</span></p><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1730"><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">AKP</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1725" instrument_node="">The research findings indicate that the incumbent AKP’s position towards the Syrian refugees can be identified as “Selective Integration.” The open door policy towards the migrants from Syria is built on humanitarian and conscience factors, emphasizing the singularity of Turkey in assuming the financial burden as well as the lack of substantial aid from the advanced democracies and international organizations. In the election manifesto of </span><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">2018,</span></strong><span data-dcnode-id="1722" instrument_node=""> the focus is on Turkey’s military operations in Syria against PKK/PYD, documenting the public services to the Syrian migrants from a financial perspective. This manifesto emphasizes that Turkey will receive 6 billion Euros of EU aid within the context of the Turkey-EU Joint Action Plan (though it does not mention how much has already been received). This manifesto also mentions that Turkey has already spent 31 billion dollars.</span><sup data-dcnode-id="1719"><a class="ftnref" data-dcnode-id="1720" href="#ftn88" name="ftnref88" title="Mustafa Aydın, Sinem Akgül Açıkmeşe, Cihan Dizdaroğlu and Onur Kara, “Research on Public Perceptions on Turkish Foreign Policy”, Center for Turkish Studies – Kadir Has University, 6 June 2018."><span data-dcnode-id="1721" instrument_node="">[88]</span></a></sup></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1716" instrument_node="">The government handles the migration issues through the Ministry of Internal Affairs. The Migration Policy Board, composed of the undersecretaries of relevant ministries as well as the DGMM, assumes the task of developing strategies and following up the implementation of the policies. DGMM was established as the chief executive body for the migration policies. The booklet entitled, </span><em data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">Turkey and Migration,</span></em><span data-dcnode-id="1713" instrument_node=""> published by the DGMM, indeed provides valuable insight into the government’s and thus the incumbent party’s approach to the Syrians in Turkey. The contours of the contemporary migration policy have been placed within a historical framework, emphasizing that the open door policy has been a traditional aspect of foreign policy that traces back to the 15</span><sup data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">th</span></sup><span data-dcnode-id="1710" instrument_node=""> century.</span><sup data-dcnode-id="1707"><a class="ftnref" data-dcnode-id="1708" href="#ftn89" name="ftnref89" title="It might look like this percentage is incorrect. It is not. The top five on the list is Azerbaijan (59,0), Russia (4,1), Turkic Republic of North Cyprus (3,7), Pakistan (1,4), Bosnia Herzegovina ( 1,2)."><span data-dcnode-id="1709" instrument_node="">[89]</span></a></sup><span data-dcnode-id="1706" instrument_node=""> The more interesting aspect of historical contextualization is that the contemporary migration policy has also been framed as a continuation of the republican policy. The current regulation, which also established the DGMM,</span><sup data-dcnode-id="1703"><a class="ftnref" data-dcnode-id="1704" href="#ftn90" name="ftnref90" title="http://russiancouncil.ru/en/analytics-and-comments/analytics/russia-turkey-relations-need-a-stronger-foundation/"><span data-dcnode-id="1705" instrument_node="">[90]</span></a></sup><span data-dcnode-id="1702" instrument_node=""> retains the geographical limitation of the refugee status traced back to the 1951 UN Geneva Convention Relating to the Status of Refugees.</span><sup data-dcnode-id="1699"><a class="ftnref" data-dcnode-id="1700" href="#ftn91" name="ftnref91" title="https://www.washingtoninstitute.org/uploads/Documents/opeds/Cagaptay20190206-FletcherForum.pdf"><span data-dcnode-id="1701" instrument_node="">[91]</span></a></sup><span data-dcnode-id="1698" instrument_node=""> The booklet implies a connection with the 1994 Regulation and justifies the FLIP on the basis of the unresponsiveness of the current legislative framework as well as the EU Harmonization Process. The report of the parliament’s human rights commission, dated May 2012, also emphasizes that the justification of the need for a comprehensive migration law on the basis of the negotiation process,</span><sup data-dcnode-id="1695"><a class="ftnref" data-dcnode-id="1696" href="#ftn92" name="ftnref92" title="https://www.whitehouse.gov/briefings-statements/press-briefing-by-press-secretary-sarah-sanders-121818/"><span data-dcnode-id="1697" instrument_node="">[92]</span></a></sup><span data-dcnode-id="1694" instrument_node=""> though the process has been at standstill. In other words, both the general framework of the migration policy and the new law are projected as the continuation of the state policy, though in a more responsive and problem-solving way given the recent developments.</span><sup data-dcnode-id="1691"><a class="ftnref" data-dcnode-id="1692" href="#ftn93" name="ftnref93" title="https://www.aljazeera.com/news/2019/01/officials-visit-turkey-gulen-extradition-request-190102155042596.html"><span data-dcnode-id="1693" instrument_node="">[93]</span></a></sup></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1688" instrument_node="">Analysis of the activities of the policy-making and implementation bodies, combined with the electoral statements and party members’ statements in the minutes of the Sub-Commission, indicate that the party might be pursuing a two-pronged policy due its position as the governing party. In the first dimension, it seems that AKP intends to refrain from publicly acknowledging that the majority of the Syrian migrants would not return. The public opinion polls indicate that barely 7 percent of the population seems to think that the Syrian migrants should be given the legal status to stay in Turkey by 2015.</span><sup data-dcnode-id="1685"><a class="ftnref" data-dcnode-id="1686" href="#ftn94" name="ftnref94" title="https://www.bbc.com/news/world-asia-41947451"><span data-dcnode-id="1687" instrument_node="">[94]</span></a></sup><span data-dcnode-id="1684" instrument_node=""> It is not, thus, surprising that the party aims to refrain from whole-scale legal arrangements for permanent integration. Second, it appears the government might also be aiming to retain the migration flow issue as part of its bargaining power with the EU and other international organizations.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node="">After</span><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node=""> 2018</span></strong><span data-dcnode-id="1678" instrument_node=""> elections, government officials acknowledged granting citizenship to a limited number of Syrians on a selective basis, but the debate has died since then. While the official status of the Syrians continues to be one of “guest,” selective integration continues in this respect. Given the escalation of the conflict and occasional violence between the local population and the Syrian migrants in the mixed neighborhoods, it can be argued that the party tries to keep the Syrian refugees issue out of the political agenda as much as possible. The fact that the press statements after the social clashes are made at the lowest possible level of the party would seem to support this claim.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">CHP</span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1672" instrument_node="">The main opposition party CHP’s attitude towards the Syrians in general has gone through a “Discursive Shift” from the early period of migration influx until today as the party at the same time shifted more towards a social democratic discourse as well. CHP’s initial response to the migration flow and the AKP’s Middle Eastern policy has been consistent. Indeed, the foreign policy repercussions of the open door policy (in particular, that it might lure Turkey into the Syrian war) formed the primary nexus of the party’s criticisms, while they neglected discussion of the social and economic consequences of migration.</span><sup data-dcnode-id="1669"><a class="ftnref" data-dcnode-id="1670" href="#ftn95" name="ftnref95" title="Mehmet Hakan Atilla an executive at Halkbank was accused (and sentenced for)of conspiring with Iranian-Turkish businessman Reza Zarrab, using the US financial system to conduct transactions on behalf of Iran and other Iranian entities, (bypass US sanctions), and to delude US financial institutions by concealing the true nature of these transactions."><span data-dcnode-id="1671" instrument_node="">[95]</span></a></sup><span data-dcnode-id="1668" instrument_node=""> This attitude can be located within the wider republican foreign policy principle of non-interventionism and anti-revisionism.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1665" instrument_node="">In the </span><strong data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">2018 </span></strong><span data-dcnode-id="1662" instrument_node="">manifesto, it appears that discursive shift continued in the sense of avoiding a discriminatory language; yet, the party strongly emphasized that it would restore relations with Syria so the refugees would return safely. </span><em data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Interestingly, the party’s manifesto abandons the earlier recognition that the Syrians might be remaining in Turkey, and it emphasizes the conditions of return instead. </span></em></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">MHP</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1651" instrument_node="">In the June 2015 manifesto, MHP promises to prevent “unconscious and uncontrolled migration” to begin with.</span><sup data-dcnode-id="1648"><a class="ftnref" data-dcnode-id="1649" href="#ftn96" name="ftnref96" title="https://bipartisanpolicy.org/escalating-steps-in-the-us-turkish-crisis/"><span data-dcnode-id="1650" instrument_node="">[96]</span></a></sup><span data-dcnode-id="1647" instrument_node=""> The document identifies external migration and uncontrolled refugee influx as major security threats to be prevented. Further, it describes restoration of Syria’s territorial integrity as a foreign policy measure; and although it is considered as a humanitarian responsibility to host the Syrian migrants, the manifesto emphasizes that the shelter should be temporary and be within the financial network of international organizations. In this respect, AKP and MHP share the vision of considering the Syrian migrants as temporary for national security and welfare reasons, as well as of sharing the financial burden with international organizations.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1644" instrument_node="">MHP draws attention to the threats and risks posed by the migrants. Unlike the threat perception observed in CHP documents mentioned above, the distinction of MHP lies in the contextualization of </span><em data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">the threat as a social and cultural</span></em><span data-dcnode-id="1641" instrument_node=""> </span><em data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">one</span></em><span data-dcnode-id="1638" instrument_node="">. MHP actually recommends policies for social-cultural harmonization.</span><sup data-dcnode-id="1635"><a class="ftnref" data-dcnode-id="1636" href="#ftn97" name="ftnref97" title="https://www.al-monitor.com/pulse/originals/2018/12/iran-turkey-bilateral-trade-trump-sanction-saudi-arabia.html#ixzz5gCRGfIxs"><span data-dcnode-id="1637" instrument_node="">[97]</span></a></sup><span data-dcnode-id="1634" instrument_node=""> Such policies, if proposed by another party, might mean policies of integration. However, closer scrutiny reveals that by “harmonization,” the party rather means forced assimilation of the migrants. The deputy refers to the differences in life-style and the incompatibility of customs and behavior of the Syrian migrants and suggests formulating policies in which the migrants would be taught about the proper code of conduct in the Turkish society.</span><sup data-dcnode-id="1631"><a class="ftnref" data-dcnode-id="1632" href="#ftn98" name="ftnref98" title="Apart from maybe also the ”son in-law symbolic factor” and from the perception of Albayrak gaining increased influence in foreign policy matters (see report 1)"><span data-dcnode-id="1633" instrument_node="">[98]</span></a></sup></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1628" instrument_node="">Interestingly, the party’s </span><strong data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">2018</span></strong><span data-dcnode-id="1625" instrument_node=""> manifesto does not even refer to the Syrian refugees at all. The only reference is to the security threats within Syria with respect to the Kurdish insurgency. While this can be due to the party leadership’s perception of them as more pressing issues, it can also be seen as an effort to downplay the problems between the Syrians and Turkish population, since the MHP electorate is strictly negative towards the Syrian refugees.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1620"><strong data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">HDP</span></p><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1615" instrument_node="">HDP fills an intriguing space in the Turkish politics from a party politics perspective. On the one hand, within the current parameters of parliamentary politics, the party does not have any virtual coalition potential, as any party suggesting government partnership is highly likely to be punished severely by its voters. On the other hand, HDP has a solid electorate base, which has facilitated substantial organizational continuity to the party despite several party closures among its predecessors. In the party’s November 2015 manifesto, the party’s position becomes more explicit and detailed on the Syrians in Turkey. Under the heading of “Asylum-Seekers and Refugees,” HDP outlines the abuse and mistreatment the Syrians have suffered in Turkey, and clarifies its </span><em data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">rights-based approach</span></em><span data-dcnode-id="1612" instrument_node="">.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">The party’s parliamentary questions on citizenship focus more on the ethnic and sectarian aspects in that it will be very likely that those who are granted citizenship will be settled in Kurdish-majority and/or Alevi-majority districts—and will also be instrumental in assimilation policies. There is almost no reference to the economic- or security-related threat perceptions that might arise from refugees’ acquiring citizenship. By</span><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node=""> 2018</span></strong><span data-dcnode-id="1606" instrument_node=""> elections, we observe that the refugees disappear also from the HDP documents, as the entire document is focused on the repressive political environment.</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">By</span><strong data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node=""> 2019</span></strong><span data-dcnode-id="1597" instrument_node="">, we can say that the ruling alliance of AKP and MHP consistently refrains from discussing the Syrian refugees at the public level. The agenda of CHP and HDP in opposition is overwhelmed with pressing political and economic turmoil. Therefore, at the elite level, we see that even the opposition does not give place to the problems of or regarding the Syrians in Turkey. At the mass level, there seems to be a societal consensus among the otherwise diverging local groups that stigmatize the Syrians as economically and socially dangerous outsiders. As to whether this commonly shared negative attitude influences the electorate towards the AKP, the election results indicate otherwise. It can be argued that as the period from 2015 to 2019 is marred with terrorist attacks, constitutional crisis, erosion of civil liberties, exacerbation of repressive policies, and finally with economic crisis, the issue of Syrian refugees is relegated to the lower ranks of the agenda for both the masses and the elites.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1594" instrument_node="">From discussing this issue with our contacts in Turkey (amongst them, people working with the refugees on the ground and academics focusing on the Syrian refugees), we came across two issues that we have not seen discussed in the literature: </span><strong data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">(1)</span></strong><span data-dcnode-id="1591" instrument_node=""> The overwhelming numbers of refugees in some areas of Turkey, mainly in the south east, has led </span><strong data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">to the altering of the relationship between Turkish men and women.</span></strong><span data-dcnode-id="1588" instrument_node=""> The imbalance in the number of men (low) versus women (high) amongst Syrian refugees where Syrian women often are fleeing without their husbands leads to the women having to provide for themselves and often their children as well. In many cases prostitution or marriage to Turkish men is the only option. In local, rural societies where such practices widespread, Turkish women report that this situation has led to Turkish women losing bargaining power vis-à-vis Turkish men. This has consequences such as infidelity, divorce or abandonment, instability and economic challenges that affect the children, polygamy (a custom that has no cultural ground in Turkey), and difficulties in marriage that stem from power inequalities (the man has other “options” and uses this fact against his wife). Turkish women also report that the men now “have the option” not to marry, but rather to stay in relationships both with Syrian and Turkish women, something that previously was almost unthinkable.&nbsp;</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1582"><strong data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">(2) There is a lost generation of Syrian youth that has not been educated either in Syria or in Turkey.</span></strong><span data-dcnode-id="1583" instrument_node=""> After the first wave of Syrian refugees, much due to the pace with which and the large numbers in which the refugees arrived to Turkey, it understandingly took some time before educational programmes were in place offering Syrian children basic education. However, the unfortunate result of this is that a generation of Syrian youth are left with no education or training in basic skills that can secure their economic future. With nowhere to go and no future prospects, these young adults, mostly boys/men, are attracted to religious radicalization, terrorism, and criminal networks.</span></p><span data-dcnode-id="1581" instrument_node="">
</span><h2 data-dcnode-id="1578" id="toc-36"><strong data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">The EU-Turkey Statement</span></strong></h2><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1576" instrument_node="">The European funding for refugees was considered to be important for the Turkish economy in the earlier period of the Readmission Agreement. AKP had capitalized on the financial aid by the EU arguing that the Syrians would not be a burden to the Turkish economy, as European governments would undertake their expenditures. In the time span, there have been various statements by the incumbent party at the top level to the effect that the EU had not kept its promise, framing it as stemming from anti-Western sentiment. The latest </span><strong data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">2018</span></strong><span data-dcnode-id="1573" instrument_node=""> manifesto of the party also emphasizes this point. The opposition criticized the Readmission Agreement as a dirty deal without transparency, yet we have come across no reference to the EU funding in the recent period in Turkish documents. Recently, President Erdoğan stated that Turkey had spent over $37 billion of its own national resources sheltering refugees and that Turkey could not take on any more refugees.</span><sup data-dcnode-id="1570"><a class="ftnref" data-dcnode-id="1571" href="#ftn99" name="ftnref99" title="Ibid."><span data-dcnode-id="1572" instrument_node="">[99]</span></a></sup></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">In the report from the EU Commission the EU on its part state that:</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1561"><em data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">”The EU is supporting Syrian refugees in Turkey with €3 billion for 2016 and 2017 through its Facility (the agreement) for Refugees in Turkey - €1 billion from the EU budget and €2 billion contributed by EU Member States. By the end of 2017, the EU had fully committed and contracted the €3 billion under the Facility - €1.85 billion has already been paid out so far. The money goes to projects to address the needs of refugees and host communities with a focus on humanitarian assistance, education, health, municipal infrastructure and socio-economic support.</span></em><span data-dcnode-id="1562" instrument_node="">”</span></p><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1559" instrument_node="">The European Court of Auditors special report from 2018 on The Facility for Refugees in Turkey</span><sup data-dcnode-id="1556"><a class="ftnref" data-dcnode-id="1557" href="#ftn100" name="ftnref100" title="Gives 20 examples to why talks should be suspended"><span data-dcnode-id="1558" instrument_node="">[100]</span></a></sup><span data-dcnode-id="1555" instrument_node=""> takes note of some room for improvement in the cooperation between the EU and Turkey. The commission, for example, points to disagreements between Turkey and the EU as to how to address the priority needs in municipal infrastructure and socio-economic support, and that these disagreements have resulted in these areas being insufficiently covered. They also underline the difficulties in some projects to track the project beneficiaries from their registration to the payment. Furthermore the commission underlines structural consequences of the July 2016 attempted coup concerning the functioning of the Turkish government system. As an example they highlight the assistance of the DGMM with the verification, updating, and correction of the registration data of Syrian refugees. Due to internal changes within government institutions following the suspension of senior officials in the DGMM and additional security constraints, this project was delayed. They also stress the difficulties international NGOs have with regard to operating within Turkey and in obtaining the cooperation permits necessary to work with local NGOs. As an overall recommendation, the commission advises the EU to use policy and high-level political dialogue with the Turkish authorities to improve the operating environment for (I)NGOs in Turkey.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1552" instrument_node="">The EU Commission confirms that the EU-Turkey Statement has become an important element of the EU’s comprehensive approach on migration and praises Turkey for its commitment to step up measures against people smuggling and cooperation with various partners on resettlement and return. However, it also states that the management of refugees and returns from Greece is insufficient and highlights that only 2,164 migrants have returned since March 2016. In addition, 2,401 migrants have returned voluntarily from the islands since June 2016, supported by the Assisted Voluntary Return and Reintegration Programme.</span><sup data-dcnode-id="1549"><a class="ftnref" data-dcnode-id="1550" href="#ftn101" name="ftnref101" title="see previous footnote"><span data-dcnode-id="1551" instrument_node="">[101]</span></a></sup></p><span data-dcnode-id="1547" instrument_node="">
</span><h2 data-dcnode-id="1544" id="toc-37"><strong data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Concluding</span></strong></h2><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1542" instrument_node="">Since the start of the Syrian war and as a part of the EU-Turkey Statement, Turkey is now sheltering almost 3,7 million Syrian refugees. Over the years the different political parties in Turkey have come to some sort of common perception (and policy) on the Syrian refugees residing in Turkey. All of the political parties are aware of how unpopular the refugees are amongst the Turkish population. In its recent study Kadir Has University found that 66,6 % of those surveyed were unhappy with the Syrian refugees situation (54,5% in 2017).</span><sup data-dcnode-id="1539"><a class="ftnref" data-dcnode-id="1540" href="#ftn102" name="ftnref102" title="http://www.europarl.europa.eu/doceo/document/A-8-2019-0091_EN.pdf?redirect"><span data-dcnode-id="1541" instrument_node="">[102]</span></a></sup><span data-dcnode-id="1538" instrument_node=""> This is one of the main reasons why the debate is almost non-existent on a political level, while being most certainly present, however, on the Internet and in social media. There are reports of societal consequences such as the power-shifts between Turkish men and women as well as the radicalization and recruitment to criminal networks of first generation young adult Syrian refugees. We expect in the foreseeable future that the government will transfer Syrian refugees back to Syria provided that Turkey manages to establish safe zones.</span></p><span data-dcnode-id="1536" instrument_node="">

</span><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">PYD&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Democratic Union Party</span></p><span data-dcnode-id="1506" instrument_node="">

</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">HDP&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; The Peoples' Democratic Party</span></p><span data-dcnode-id="1500" instrument_node="">
