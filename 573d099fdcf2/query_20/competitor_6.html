</span><p data-dcnode-id="2359"><span data-dcnode-id="2366" instrument_node="">Ibrahim Kalin offered a typical follow up on this line of argument when, in a written statement to Reuters</span><sup data-dcnode-id="2363"><a class="ftnref" data-dcnode-id="2364" href="#ftn31" name="ftnref31" title="Mustafa Aydin, Mitat Celikpala, Cihan Dizdaroglu, Murat Guvenc, Banu Baybars Hawks, Emrah Karaoguz, Osman Zaim, Mustafa Gökcan Kösen, Basri Alp Akıncı, Survey Report on Social-Political Trends in Turkey – 2018, Istanbul, Kadir Has University, Center for Turkish Studies, 30 January 2019"><span data-dcnode-id="2365" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2362" instrument_node=""> Kalin responded to John R. Bolton, National Security Advisor of the United States, commenting on the sanctions. There Kalin claimed: </span><em data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">“His statement is proof that the Trump administration is targeting a NATO ally as part of an economic war”</span></em></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2357" instrument_node="">One of the more explicit examples of anti-American rhetoric in the Turkish press came from Ibrahim Karagul, editor in chief of the pro-government Yeni Safak:</span><sup data-dcnode-id="2354"><a class="ftnref" data-dcnode-id="2355" href="#ftn32" name="ftnref32" title="https://sputniknews.com/middleeast/201902041072097127-ankara-damascus-relations-Erdoğan /"><span data-dcnode-id="2356" instrument_node="">[32]</span></a></sup></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2349"><em data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">What’s more, the US is now the closest, greatest and most open threat for Turkey. It is an enemy country. It is a serious threat to our country’s existence, its unity, integrity, present and the future. It is carrying out an open attack, and an undeclared war against Turkey.</span></em></p><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2347" instrument_node="">Ankara seems to have no appetite for keeping pro-Western sentiment strong throughout Turkey. The “New Turkey” and its motto </span><em data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">“Yerli ve Milli Turkiye”</span></em><span data-dcnode-id="2344" instrument_node=""> (Local and National Turkey) constitute the foundational theme of Turkey’s new executive presidential system, which revolves solely around President Erdoğan’s persona. However, the heart of the issue is the multilayered relationship between the AKPs new self-image project, neo-Ottomanism, and the international developments shaping it. Just after the 15 July 2016 military uprising, the AKP, leaning on existential anxiety, retreated to survival mode, making a U-turn from the inclusive internationalist discourse it began peddling in 2002 and turning toward the </span><em data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">“yerli ve milli”</span></em><span data-dcnode-id="2341" instrument_node=""> route of ultra-nationalists. Unfortunately, the perceived other—or the enemy—of this new national identity and collective memory construction process has become the collective image of the West, thus diluting pro-Western sentiment among Turkish citizens.</span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2322"><span data-dcnode-id="2338" instrument_node="">International image theory endorses a functional approach in suggesting that images, such as the image of another country an enemy, serve to justify behavioral tendencies toward other nations, as well as maintain a positive and moral image of one’s own nation.</span><sup data-dcnode-id="2335"><a class="ftnref" data-dcnode-id="2336" href="#ftn33" name="ftnref33" title="https://www.reuters.com/article/us-turkey-syria-assad-us/turkey-would-consider-working-with-assad-if-he-won-a-democratic-syrian-election-idUSKBN1OF0DP"><span data-dcnode-id="2337" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2334" instrument_node=""> Specifically, the enemy image has the power to unite people against a mutual enemy. Erdoğan has over the years consistently used both outside and inside enemy-images to energize politics for domestic political consumption. After consuming the energy of all domestic rivals, his new enemy is pro-Western sentiment in Turkey. To weed out the West and its ideas, President Erdoğan’s “other-ification” of NATO, for example, has come to the fore of his political agenda. Domestically, he is merging the established Kemalist-leftist discourse and the conservative-nationalist discourse controlling his powerbase so as to create a “nationalist bloc” around his persona as Turkey speedily heads toward local elections in March 2019. According to image theory, for people who highly identify with one's country (e.g., nationalists), the intensity of emotional responses to threats or opportunities will be strong.</span><sup data-dcnode-id="2331"><a class="ftnref" data-dcnode-id="2332" href="#ftn34" name="ftnref34" title="The Adana protocol of 1998 is a deal signed by Turkish and Syrian diplomats at a time when relations between Turkey and Syria were strained and the neighbors were on the brink of war. Damascus had been allowing Abdullah Ocalan, the leader of the Kurdistan Workers’ Party (PKK), to take shelter and direct his activities from within the Syrian borders for several years. When Turkey threatened military action, Damascus deported Ocalan and closed the PKK camps in the country."><span data-dcnode-id="2333" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2330" instrument_node=""> Some analysts have pointed to this wave of nationalist sentiments as proof that the Eurasianist ideology has gained popularity in the population and in Ankara. The Eurasianist advocates argue that the international geo-economic and geo-strategic center is shifting to the East and, as a consequence, Turkey is becoming a new strategic geographical center. Second, they argue that global security issues are not something that the West is capable of resolving. They warn further that Turkey's two-century Westernization process should undergo a critical review so as to not end up with a new Treaty of Sevres (1920). The EU and NATO are currently struggling with structural crisis, and globalization is deepening inequalities in the world at the benefit of the West. Turkey's position is clearly becoming one situated within the clash between global capitalism and national state structures. And finally, since NATO, the US, and Europe are not supporting Turkey’s security concerns, Ankara needs to draw up its own strategic vision, relying on its own power. In political circles, the marginal Vatan Party</span><sup data-dcnode-id="2327"><a class="ftnref" data-dcnode-id="2328" href="#ftn35" name="ftnref35" title="http://vatanpartisi.org.tr/english/haberler/brief-history-of-the-patriotic-party-turkey-10962"><span data-dcnode-id="2329" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2326" instrument_node=""> led by Doğu Perinçek is perhaps the best representation of this ideology. Turkish think tanks such as the Anka Institute, 21st Century Turkey Institute, Center for Middle Eastern Strategic Studies, Turkish Asian Center for Strategic Studies, and the Institute of Strategic Thinking have increasingly come to articulate the idea that the West is broken and that it is time for Turkey to turn towards the East. We should note, however, that this rising trend is more apparent in terms of foreign policy, defense, and security rather than economic and social life.</span><sup data-dcnode-id="2323"><a class="ftnref" data-dcnode-id="2324" href="#ftn36" name="ftnref36" title="https://www.al-monitor.com/pulse/originals/2017/05/turkey-rise-of-euroasianist-vision.html"><span data-dcnode-id="2325" instrument_node="">[36]</span></a></sup></p><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">So does this mean that Turkey will take a Eurasian turn at the expense of relations with the US, EU, NATO, and other Western nations? We think such a move is not very likely, as described when it comes to security and defense above (p. 8,17). Another significant argument against this position is the fact that Turkish Islamists, although they may reject the Western culture, embrace the capitalist economic order, which they see as necessary for Turkey's exports and capital accumulation. Also, remember that the Islamist-conservative movement grew up with and benefited from Turkey’s economic liberalization and its deepening integration with the capitalist world economy.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><h2 data-dcnode-id="2315" id="toc-18"><strong data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Public perceptions of the US</span></strong></h2><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2301"><span data-dcnode-id="2313" instrument_node="">In a recent survey of social and political trends in Turkey (2019) conducted by Kadir Has University and led by Mustafa Aydin</span><sup data-dcnode-id="2310"><a class="ftnref" data-dcnode-id="2311" href="#ftn37" name="ftnref37" title="Mustafa Aydin, Mitat Celikpala, Cihan Dizdaroglu, Murat Guvenc, Banu Baybars Hawks, Emrah Karaoguz, Osman Zaim, Mustafa Gökcan Kösen, Basri Alp Akıncı, Survey Report on Social-Political Trends in Turkey – 2018, Istanbul, Kadir Has University, Center for Turkish Studies, 30 January 2019"><span data-dcnode-id="2312" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2309" instrument_node="">, the US is ranked as the greatest threat to Turkey (in response to the question: Do you think the following countries pose a threat to Turkey?). Before commenting on this result, it is worth noticing that the inclusion of respondents along political party affiliation in this study provide a quite accurate mirror of the actual election results from 2018 general election.</span><sup data-dcnode-id="2306"><a class="ftnref" data-dcnode-id="2307" href="#ftn38" name="ftnref38" title="When the respondents were asked: ”Which party did you vote in 24 June 2018?” the dispersion of results was (the actual election results from 2018 general election in parenthesis): AKP: 41,2 (42,6); CHP: 24,3 (22,6);HDP 11,2 (11,7); MHP: 10,6 (11,1); IYI Party: 10,4 (10,0)."><span data-dcnode-id="2308" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2305" instrument_node=""> The perception of the US as the number one threat to Turkey, in the context of foreign relations, has been consistent throughout the past three years. However, during the last year there was a significant rise: from 64,3% of the surveyed in 2017 to </span><strong data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">81,9 %</span></strong><span data-dcnode-id="2302" instrument_node=""> of the surveyed in 2018 (2016: 60,4 %).</span></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2299" instrument_node="">In another Kadir Has survey (summer 2018)</span><sup data-dcnode-id="2296"><a class="ftnref" data-dcnode-id="2297" href="#ftn39" name="ftnref39" title="Mustafa Aydın, Sinem Akgül Açıkmeşe, Cihan Dizdaroğlu and Onur Kara, “Research on Public Perceptions on Turkish Foreign Policy”, Center for Turkish Studies – Kadir Has University, 6 June 2018."><span data-dcnode-id="2298" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2295" instrument_node="">, specifically focusing on foreign policy, 79,3 % of the respondents reported that they found that the relationship between the US and Turkey had problems. The top three problematic issues were listed as (1) Counterterrorism, (2) Extradition of Fethullah Gülen, and (3) US support of PYD. When it comes to the most important areas of cooperation between Turkey and the US, the respondents listed Economic cooperation, Military Cooperation and Counterterrorism. When the respondents were asked to define the US in its relations with Turkey, 84, 2% used negative characteristics to describe the relation, while 15,5 % used positive terms: Unreliable country (38,9%), Imperialist country (29,1 %), Hostile country (16,2%), Strategic partner (11,4%), Ally (3,0%), and Friendly country (1,1%). While reading these results as an indicator of how a cross-section of the population perceive the relations with the US, it is also important to notice that 15% of the respondents thought that Turkey should act alone on the international arena. No country apart from Azerbaijan (38,9%), Turkic republics (31,8%) and Muslim countries</span><sup data-dcnode-id="2292"><a class="ftnref" data-dcnode-id="2293" href="#ftn40" name="ftnref40" title="Note that here Turkic republics and Muslim countries here are grouped together and that had individual countries been listed, it may not have yielded this high percentage"><span data-dcnode-id="2294" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2291" instrument_node=""> (23,4%) got over 15% (Turkey should act alone).</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">All in all, these results (and similar results for other Western allies) suggest that political leaders like President Erdoğan, who stir up tensions with the West, highlight connections with the Muslim world, and promote military operations outside Turkey, are likely to receive public support. However, given the importance of Western countries to the Turkish economy and security, to fully act on the apparent preferences of the people would likely prove too costly. Although political leaders and the public are likely to maintain their anti-Western stance for ideological reasons, we expect that the leadership will continue to manage its economy and security predominantly via its relations with the West.</span></p><span data-dcnode-id="2286" instrument_node="">
</span><h2 data-dcnode-id="2283" id="toc-19"><strong data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Changing perceptions in the US? </span></strong></h2><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2273"><span data-dcnode-id="2281" instrument_node="">There are signs emerging in the US that foreign policy political elites also are re-evaluating the partnership with Turkey. It is argued that Turkey and the US do not share interests or values and that their ties are characterized by ambivalence and mistrust. When it comes to economic relations, according to Khush Choksy (senior vice president for Middle East and Turkey Affairs at the US Chamber of Commerce),</span><sup data-dcnode-id="2278"><a class="ftnref" data-dcnode-id="2279" href="#ftn41" name="ftnref41" title="http://www.hurriyetdailynews.com/opinion/khush-choksy/renewed-vision-for-us-turkey-relations-141197"><span data-dcnode-id="2280" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2277" instrument_node=""> significant challenges exist and are preventing the US-Turkey commercial relationship from reaching its full potential. Turkey maintains a spot in the G20 as the 17th largest economy in the world, but the $20 billion in trade volume between the US and Turkey is lower than that of US trade with smaller economies, such as Belgium, Colombia, and the Philippines. High tariffs and market access barriers on both sides of the Atlantic limit the free-flow of goods and services. Steven Cook argues in his latest Council of Foreign Relations Report that we are witnessing the gradual but steady demise of a relationship: Turkey may be an ally in the formal sense, but it is no partner.</span><sup data-dcnode-id="2274"><a class="ftnref" data-dcnode-id="2275" href="#ftn42" name="ftnref42" title="https://www.cfr.org/report/future-US-turkey"><span data-dcnode-id="2276" instrument_node="">[42]</span></a></sup></p><span data-dcnode-id="2272" instrument_node="">
</span><h2 data-dcnode-id="2269" id="toc-20"><strong data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Concluding</span></strong></h2><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Perceptions in international relations are often shaped in terms of mirror images: while considering one’s own action good, moral, and just, the enemy is automatically found to be evil, immoral, and unjust. This might be what is happening in the Turkish – US relations, where the two actors seems to mirror one another in important areas in undermining the idea that the United States and Turkey share interests and goals. US and Turkish officials believe their counterparts support terrorists, abet the exercise of Russian power, and pursue policies that destabilize the Middle East.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><h1 data-dcnode-id="2262" id="toc-21"><strong data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">Turkey's relations with the EU</span></strong></h1><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2246"><em data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">“The EU will never allow Turkey inside because of its religion and big population”,</span></em><span data-dcnode-id="2258" instrument_node=""> Erdoğan recently stated.</span><sup data-dcnode-id="2255"><a class="ftnref" data-dcnode-id="2256" href="#ftn43" name="ftnref43" title="http://www.hurriyetdailynews.com/opinion/serkan-demirtas/key-foreign-policy-messages-by-turkeys-Erdoğan-141453"><span data-dcnode-id="2257" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2254" instrument_node=""> But he should have added that Turkey’s departure from fundamental EU standards makes an entry into the Union impossible. The most recent breaking point of the relationship can be attributed to the failed coup d’état in Turkey in 2016. The perception advanced by Ankara is that the EU did not and still does not understand the seriousness of the failed coup to the country’s security and democracy, and that the EU applied double standards in its condemnation of post-coup actions taken by the government. Amongst the people there is a feeling of abandonment—that European countries don’t really care about Turkey and the trauma that people experienced the night of the coup and in the following days. They point to the unity and compassion that was extended to France, both from world leaders and people, in the aftermath of the Charlie Hebdo (2015) attack. Although not similar events, the psychology of experiencing a national trauma and receiving support and empathy versus experiencing a national trauma and receiving only conditional support or indifference helps create negative images of other countries as well as shape the self-images Turks hold of their own country and fellow countrymen</span><sup data-dcnode-id="2251"><a class="ftnref" data-dcnode-id="2252" href="#ftn44" name="ftnref44" title="In this case shapes the perception of Turkey as a country that is alone (with no true allies) and that Turks both can and that have to fend for themselves. Consult also the survey from Kadir Has University"><span data-dcnode-id="2253" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2250" instrument_node="">.</span><sup data-dcnode-id="2247"><a class="ftnref" data-dcnode-id="2248" href="#ftn45" name="ftnref45" title="See report 1 for more on how images of other nations and self images are one factor shaping conjunctural and structural variables in foreign policy making."><span data-dcnode-id="2249" instrument_node="">[45]</span></a></sup></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Following the failed coup the Turkey - EU relations fell into its most difficult period since the accession negotiations were opened for Turkey in 2005, and perhaps even in its history.</span></p><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2236"><span data-dcnode-id="2241" instrument_node="">The most difficult issue of divergence was the degree to which the coup attempt and the coup-plotters posed a threat to the Turkish political system. Ankara claimed that Turkey confronted an existential threat that warranted extensive actions that the government undertook by declaring state of emergency and implementing an unprecedented crack-down on people who could have had something to do with the coup or the Gülen-movement in general (and many others in opposition to the regime). Turkish commentators throughout the Turkish media-spectrum noted the lack of understanding EU officials demonstrated to the dangers Gülenists posed. When the European Parliament voted to suspend negotiations in November 2016 and on 6 July 2017,</span><sup data-dcnode-id="2238"><a class="ftnref" data-dcnode-id="2239" href="#ftn46" name="ftnref46" title="http://www.europarl.europa.eu/sides/getDoc.do?pubRef=-//EP//TEXT+TA+P8-TA-2017-0306+0+DOC+XML+V0//EN"><span data-dcnode-id="2240" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2237" instrument_node=""> this was seen as further proof that the EU was clueless about political struggles in Turkey.</span></p><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2221"><span data-dcnode-id="2234" instrument_node="">Within the EU member states, the Turkish question can be seen as a fault line, where Central and Eastern European, Baltic, and Mediterranean member states are more in favor of keeping the accession framework in place, whereas Germany from 2017 became </span><strong data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">highly </span></strong><span data-dcnode-id="2231" instrument_node="">vocal about its opposition to Turkey’s EU accession. Angela Merkel went as far as stating</span><em data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">, “There cannot be a Turkish accession to the EU.”</span></em><sup data-dcnode-id="2226"><a class="ftnref" data-dcnode-id="2227" href="#ftn47" name="ftnref47" title="https://www.dw.com/en/can-merkel-push-the-eu-toward-a-new-turkey-policy/a-40360392"><span data-dcnode-id="2228" instrument_node="">[47]</span></a></sup><span data-dcnode-id="2225" instrument_node=""> By that time the relations between Turkey and Germany had already hit an absolute low point, with Erdoğan calling the German position towards Turkey's accession comparable to “Nazi Germany” in the context of Turkey’s accusing Germany of harboring terrorists behind the coup attempt and Germany’s criticizing Turkey for arresting German nationals without due process.</span><sup data-dcnode-id="2222"><a class="ftnref" data-dcnode-id="2223" href="#ftn48" name="ftnref48" title="https://www.dw.com/en/germany-and-turkey-in-2017-a-rollercoaster-relationship/a-41897041"><span data-dcnode-id="2224" instrument_node="">[48]</span></a></sup></p><span data-dcnode-id="2220" instrument_node="">
</span><p data-dcnode-id="2206"><span data-dcnode-id="2219" instrument_node="">The Turkish people have over the years varied in how they view Turkish potential EU membership. After the coup attempt in 2016, the percentage of the respondents in favor of membership hit an all time low since Kadir Has and Prof. Aydin had started the surveys in 2012, with only 45,7 % favoring</span><sup data-dcnode-id="2216"><a class="ftnref" data-dcnode-id="2217" href="#ftn49" name="ftnref49" title="Mustafa Aydin, Mitat Celikpala, Cihan Dizdaroglu, Murat Guvenc, Banu Baybars Hawks, Emrah Karaoguz, Osman Zaim, Mustafa Gökcan Kösen, Basri Alp Akıncı, Survey Report on Social-Political Trends in Turkey – 2018, Istanbul, Kadir Has University, Center for Turkish Studies, 30 January 2019"><span data-dcnode-id="2218" instrument_node="">[49]</span></a></sup><span data-dcnode-id="2215" instrument_node="">.&nbsp; Compared to a similar study</span><sup data-dcnode-id="2212"><a class="ftnref" data-dcnode-id="2213" href="#ftn50" name="ftnref50" title="Mustafa Aydın, Sinem Akgül Açıkmeşe, Cihan Dizdaroğlu and Onur Kara, “Research on Public Perceptions on Turkish Foreign Policy”, Center for Turkish Studies – Kadir Has University, 6 June 2018."><span data-dcnode-id="2214" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2211" instrument_node=""> surveying foreign policy perceptions conducted before the coup attempt showing that 61, 8 % of the surveyed were favorable, we can assume the response from the EU on the coup attempt and the following deterioration in relations along with the government's rhetoric had an clear effect on public opinion. The latest survey (2018)</span><sup data-dcnode-id="2208"><a class="ftnref" data-dcnode-id="2209" href="#ftn51" name="ftnref51" title="http://www.hurriyetdailynews.com/amp/turkey-no-longer-able-to-face-new-refugee-flow-Erdoğan -141349"><span data-dcnode-id="2210" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2207" instrument_node=""> on foreign policy perception show that 55,1% is in favor of a membership. 50,8% agree that being an EU member would be beneficial to Turkey and of those 73,4 % think economic standards would improve, 46,1 % that democracy would improve, and 37,8 % that human rights would improve. The two latter results serve as an indicator that the Turkish people still assess that the EU would have an ability to convey normative and value-based change in Turkey. However, in a more pessimistic assessment 71,7 % think that Turkey will never become a full member. 64,4% of the respondents believe that Turkey's membership is being blocked and 58,7% (of those 64,4%) attributes this to religious and identity differences.</span></p><span data-dcnode-id="2205" instrument_node="">
</span><p data-dcnode-id="2199"><span data-dcnode-id="2204" instrument_node="">Recent developments in Turkish –EU relations have been rather negative on the part of Turkey. On 19 February 2019 the Foreign Affairs Committee of the European Parliament told the European Commission and EU member states to freeze accession talks with Ankara over amongst other issues:</span><sup data-dcnode-id="2201"><a class="ftnref" data-dcnode-id="2202" href="#ftn52" name="ftnref52" title="http://publications.europa.eu/webpub/eca/special-reports/refugees-turkey-27-2018/en/"><span data-dcnode-id="2203" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2200" instrument_node=""> its human rights record, partisan judiciary, and the Cyprus case. There, the Committee stated:</span></p><span data-dcnode-id="2198" instrument_node="">
</span><p data-dcnode-id="2187"><em data-dcnode-id="2188"><span data-dcnode-id="2197" instrument_node="">Taking all of the above into account</span><sup data-dcnode-id="2194"><a class="ftnref" data-dcnode-id="2195" href="#ftn53" name="ftnref53" title="https://ec.europa.eu/home-affairs/sites/homeaffairs/files/what-we-do/policies/european-agenda-migration/20180314_eu-turkey-two-years-on_en.pdf"><span data-dcnode-id="2196" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2193" instrument_node="">, recommends that the Commission and the Council of the European Union, in accordance with the Negotiating Framework, formally suspend the accession negotiations with Turkey; remains, however, committed to democratic and political dialogue with Turkey (…).</span><sup data-dcnode-id="2190"><a class="ftnref" data-dcnode-id="2191" href="#ftn54" name="ftnref54" title="Mustafa Aydin, Mitat Celikpala, Cihan Dizdaroglu, Murat Guvenc, Banu Baybars Hawks, Emrah Karaoguz, Osman Zaim, Mustafa Gökcan Kösen, Basri Alp Akıncı, Survey Report on Social-Political Trends in Turkey – 2018, Istanbul, Kadir Has University, Center for Turkish Studies, 30 January 2019"><span data-dcnode-id="2192" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2189" instrument_node=""> </span></em></p><span data-dcnode-id="2186" instrument_node="">
</span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">As only the EU heads of state have the power to freeze or end Turkey’s accession process and given that such a decision would have to be unanimous, this decision of the Foreign Affairs Committee is just a recommendation, but it is an indication of current attitudes within the Union. In the same document the committee stresses that:</span></p><span data-dcnode-id="2183" instrument_node="">
</span><p data-dcnode-id="2180"><em data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">(…) the modernisation of the Customs Union would further strengthen the already strong ties between Turkey and the EU and would keep Turkey economically anchored to the EU; believes, therefore, that a door should be left open for the modernisation and upgrade of the 1995 Customs Union between the EU and Turkey (…).</span></em></p><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2175"><em data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2176" instrument_node="">and furthermore:</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2171"><em data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Notes the importance for both the EU and its Member States and Turkey of maintaining close dialogue and cooperation on foreign policy and security issues; encourages cooperation and further alignment on foreign policy, defence and security issues, including counter-terrorism cooperation (…).</span></em></p><span data-dcnode-id="2170" instrument_node="">
</span><p data-dcnode-id="2159"><em data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2167" instrument_node="">The Foreign Affairs Committee is also highlighting the importance of the “EU-Turkey joint action plan”</span><sup data-dcnode-id="2164"><a class="ftnref" data-dcnode-id="2165" href="#ftn55" name="ftnref55" title="http://europa.eu/rapid/press-release_MEMO-15-5860_en.htm"><span data-dcnode-id="2166" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2163" instrument_node=""> by asking the Council of the European Union to recall </span><em data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">“the important role played by Turkey in responding to the migration crisis resulting from the war in Syria (…)”. </span></em><span data-dcnode-id="2160" instrument_node="">The three highlighted area-recommendations for further cooperation, in case of suspension of the accession talks, displays the weight that the EU puts on strong ties with Turkey on the commercial, economic, military, counterterrorism, and humanitarian fronts.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><h2 data-dcnode-id="2155" id="toc-22"><strong data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">What kind of partnership?</span></strong></h2><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2153" instrument_node="">The European Union is Turkey’s irreplaceable partner for exports, service provision, and foreign direct investment. With regard to foreign direct investment, of which Turkey is in dire need given its economic situation, 63, 4 % came from the EU in the period from January to April (2018), with Austria, the Netherlands, and the U.K. being the top three European sources.</span><sup data-dcnode-id="2150"><a class="ftnref" data-dcnode-id="2151" href="#ftn56" name="ftnref56" title="http://www.hurriyetdailynews.com/turkey-sees-22-percent-yearly-decline-in-fdi-data-shows-133626"><span data-dcnode-id="2152" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2149" instrument_node="">&nbsp; Turkey says joining the affluent bloc remains one of its strategic goals. As stated by the Turkish Foreign Minister: </span><em data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">“In Europe we are at home, just like the EU countries are”, </span></em><span data-dcnode-id="2146" instrument_node="">and furthermore:</span><em data-dcnode-id="2140"><span data-dcnode-id="2145" instrument_node=""> “Both the NATO alliance and the EU membership will continue to be our key direction.”</span><sup data-dcnode-id="2142"><a class="ftnref" data-dcnode-id="2143" href="#ftn57" name="ftnref57" title="Foreign Minister Mevlüt Çavuşoğlu speach at the 10th ambassadors conference, Ankara, August 2018."><span data-dcnode-id="2144" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2141" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2139" instrument_node="">And in light of recent developments it is worth remembering that in the Turkish diplomatic context, tensions with Washington regularly lead Ankara to look to Europe instead. Past difficulties with the European Union appear on hold and shared anger directed at US President Donald Trump is providing a helpful common ground. Turkey has sought to repair ties over the past year, especially commercial links with its biggest trading partner during a harsh economic downturn. However, given Turkey’s current differences with Europe, Ankara may have to pay a high diplomatic price for any reduction in diplomatic tensions. Turkey will have to demonstrate some improvements in its governance system if it wants to see progress in even limited areas such as the Customs Union and visas.</span><sup data-dcnode-id="2136"><a class="ftnref" data-dcnode-id="2137" href="#ftn58" name="ftnref58" title="http://www.europarl.europa.eu/doceo/document/A-8-2019-0091_EN.pdf?redirect"><span data-dcnode-id="2138" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2135" instrument_node=""> Through our network we have also been informed that Turkey-EU ties have recently been warming and Ankara seems to have no appetite for scapegoating European countries, even though it is “election season” in Turkey. Furthermore, somewhat to our surprise, many in Ankara believe that, if Erdoğan were to get what he wanted, he would over time initiate a big normalization process with the EU, leading to the reemergence of pro-EU sentiment in Turkey.</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2132" instrument_node="">Consequently, the vital interests of the EU and Turkey are in many areas intertwined, and even if there is an termination of the accession talks, the two parties must find ways to move forward with the relationship. There has been talk that Turkey could acquire a “privileged partnership” that the German Chancellor Angela Merkel contemplated in 2005</span><sup data-dcnode-id="2129"><a class="ftnref" data-dcnode-id="2130" href="#ftn59" name="ftnref59" title="https://www.reuters.com/article/us-europe-migrants-germany-turkey/merkel-says-still-against-turkey-joining-the-eu-idUSKCN0S12RD20151007"><span data-dcnode-id="2131" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2128" instrument_node=""> and which the Turkish government vehemently opposed.</span><sup data-dcnode-id="2125"><a class="ftnref" data-dcnode-id="2126" href="#ftn60" name="ftnref60" title="https://www.euractiv.com/section/enlargement/interview/turkey-s-chief-negotiator-privileged-partnership-is-an-insult/"><span data-dcnode-id="2127" instrument_node="">[60]</span></a></sup><span data-dcnode-id="2124" instrument_node=""> Turkey already has a high degree of functional cooperation with the EU, which takes multiple forms in terms of economic, political, judicial and internal affairs, energy, and environmental cooperation.</span><sup data-dcnode-id="2121"><a class="ftnref" data-dcnode-id="2122" href="#ftn61" name="ftnref61" title="Cemal Karakaş, “EU-Turkey: Integration without Full membership or Membership without Full integration: A Conceptual Framework for Accession Alternatives,” Journal of Common Market Studies, Vol. 51, No. 6 (2013), pp. 1057-73.; Meltem Müftüler-Baç, “Turkey’s Future with the European Union: Alternative Modes of Differentiated Integration.” Turkish Studies, Vol. 18, No. 3 (September 2017), pp. 416-439."><span data-dcnode-id="2123" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2120" instrument_node=""> According to Meltem Müftüler-Baç Professor at Sabancı University in Istanbul:</span><sup data-dcnode-id="2117"><a class="ftnref" data-dcnode-id="2118" href="#ftn62" name="ftnref62" title="Müftüler-Baç, M. (2018). Remolding the Turkey-EU relationship. Turkish policy quarterly, 17(1), 119-128."><span data-dcnode-id="2119" instrument_node="">[62]</span></a></sup></p><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2110"><em data-dcnode-id="2113"><span data-dcnode-id="2114" instrument_node="">&nbsp;</span></em><em data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">External differentiated integration for a non-EU member such as Turkey might involve temporal alignment to EU policies and territorial inclusions—such as security cooperation, its Customs Union or visa rules for third parties and policy opt-ins such as the adoption of EU regulations in electricity, telecommunications, and education. These multiple layers of integration between Turkey and the EU keep their functional cooperation on track.</span></em></p><span data-dcnode-id="2109" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2108" instrument_node="">From the Kadir Has survey on foreign policy perceptions</span><sup data-dcnode-id="2105"><a class="ftnref" data-dcnode-id="2106" href="#ftn63" name="ftnref63" title="Mustafa Aydın, Sinem Akgül Açıkmeşe, Cihan Dizdaroğlu and Onur Kara, “Research on Public Perceptions on Turkish Foreign Policy”, Center for Turkish Studies – Kadir Has University, 6 June 2018."><span data-dcnode-id="2107" instrument_node="">[63]</span></a></sup><span data-dcnode-id="2104" instrument_node=""> we see that the idea, although not popular, has attracted more support over time. Answering the question </span><em data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Should Turkey and the EU establish a model of relationship other than membership?</span></em><span data-dcnode-id="2101" instrument_node=""> 30,4% of the respondents answered yes in 2017 and 32,1% in 2018. Comparably, the idea of a “privileged partnership” received positive reaction of 22.8% in 2015, and of 23.8% in 2016. Some analysts also seem to conclude that President Erdoğan seems to have warmed up to the idea when he recently stressed, in the context of EU membership, that: </span><em data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">“We should obviously have Plan B, Plan C,”</span></em><span data-dcnode-id="2098" instrument_node=""> although it is not fully clear what he meant by this statement.</span><sup data-dcnode-id="2095"><a class="ftnref" data-dcnode-id="2096" href="#ftn64" name="ftnref64" title="http://www.hurriyetdailynews.com/opinion/serkan-demirtas/key-foreign-policy-messages-by-turkeys-Erdoğan-141453"><span data-dcnode-id="2097" instrument_node="">[64]</span></a></sup></p><span data-dcnode-id="2093" instrument_node="">
</span><h2 data-dcnode-id="2090" id="toc-23"><strong data-dcnode-id="2091"><span data-dcnode-id="2092" instrument_node="">Concluding</span></strong></h2><span data-dcnode-id="2089" instrument_node="">
</span><p data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">The Brexit process (should it be concluded) indicates that different models of integration are possible for the countries that either is unwilling or unfit for EU membership, as is the EEA of which Norway is a member state. On the side of the European Union, they know that for the next five years they would have to deal with President Erdoğan. If they decide to end Turkey’s accession process talks, reinstating them would require unanimity, which would be almost impossible to attain again. This makes suspension a highly risky path to pursue. So the safe thing to do might be to treat Turkey with a privileged partner status, if not formally stated, at least in practice. The project members do not in any case foresee a break in relations moving forward and developments should be read through the high level of interdependent interests between the two actors.</span></p><span data-dcnode-id="2086" instrument_node="">
</span><h1 data-dcnode-id="2083" id="toc-24"><strong data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">Eastern Mediterranean</span></strong></h1><span data-dcnode-id="2082" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">The Eastern Mediterranean forms a geostrategic fault line between Europe and the Middle East. Wars, genocidal acts, nationalist movements, and upheavals have scarred the region over centuries and have presented the international system with some of its most vexing strategic challenges.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><p data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Today, the Eastern Mediterranean Sea is also a very busy place, and tensions abound among coastal neighbors there. In addition, the involvement of several “outside” powers such as Russia, Iran, China, and the US is not making the situation any easier.</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2075" instrument_node="">The area has been and still is burdened with: </span><strong data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">State fragmentation</span></strong><span data-dcnode-id="2072" instrument_node=""> as for example in Libya and Syria, where the situations are made worse by non-state actors like ISIS. </span><strong data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">Migration </span></strong><span data-dcnode-id="2069" instrument_node="">from conflicts in Syria, Iraq, and Afghanistan, creating one of the largest refugee crises since World War II and resulting in nationalist and xenophobic political sentiment that has strengthened ultranationalist political parties. </span><strong data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">Geostrategic rivalry</span></strong><span data-dcnode-id="2066" instrument_node=""> between the US-led Western Security block and Russia, particularly, over the control of sea routes and air space over the Eastern Mediterranean. </span><strong data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">Economic crises</span></strong><span data-dcnode-id="2063" instrument_node=""> as in Greece, Cyprus, Lebanon, and Egypt; countries that have faced destabilizing economic crises in the last decade that have created deep political and strategic vulnerabilities, and Turkey could possibly face similar challenges. </span><strong data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Energy prospects as </span></strong><span data-dcnode-id="2060" instrument_node="">for example gas discoveries outside Israel, Cyprus, and Egypt that have boosted economic prospects in the region and drawn the attention of external actors.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">In the sections following we will take a look at the East Mediterranean from the viewpoint of Turkey, focusing on energy and security.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2054" instrument_node="">With the discovery of natural gas and the prospects of further discoveries, costal governments are declaring exclusive economic zones (EEZs), but the problem is that those zones overlap. States are granting duplicate licenses for natural gas exploration and drilling. Mammoth energy corporations and coastal states are signing hundreds of millions of dollars’ worth of hydrocarbon agreements that cover contested research zones, the legal status of which remains fuzzy. Frequent maritime safety broadcasts inform citizens of endless military exercises.</span><sup data-dcnode-id="2051"><a class="ftnref" data-dcnode-id="2052" href="#ftn65" name="ftnref65" title="Metin Gürcan in: https://www.al-monitor.com/pulse/originals/2018/03/turkey-mediterranean-resembling-south-china-sea.html"><span data-dcnode-id="2053" instrument_node="">[65]</span></a></sup></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">The energy issue has been seen as one factor that could aid the unification of Cyprus, as the two parts of that nation realized the potential economic benefits to a unified island. But the energy issue has become a negative factor, problemazing the negotiations and leading to intense conflict between Turkey and the Greek Cypriots. Turkey does not recognize the Republic of Cyprus (RoC) and argues that the Greek Cypriots cannot conclude agreements, such as the delineation of an EEZ, or issue licenses for the exploration of natural resources without the Turkish Cypriots’ consent or participation. The Greek Cypriots, however, point to past ”understandings” reached under negotiations that any revenues from resources would be shared with all Cypriots. The admission of RoC to the EU in 2004 turned this bilateral crisis into a more complex one, operating at multiple levels of analysis. The United States and the EU have long supported the RoC's right to explore for energy in its EEZ, but both have expressed their hope that the economic benefits of such exploration could eventually redound to everyone on the island. In 2004, after the admission, the European Union had declared the Greek Cypriots the sole entity representing the island of Cyprus. Feeling their strength following the EU decision, the Greek Cypriots claimed the right to natural resources exploration in the EEZ around Cyprus. Turkey, however, has been insisting that the Greek Cypriot administration in Nicosia cannot unilaterally “adopt laws regarding the exploitation of natural resources on behalf of the entire island,” as it doesn’t represent the Turkish Cypriots.</span></p><span data-dcnode-id="2046" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">Turkey has not declared EEZs, but one map (below) showing a maximalist viewpoint and circulated amongst nationalists has been mentioned as being used to pressure the government to declare one.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Greece and Turkey have its own disagreements beside the Cyprus case. The very first issue in this context is the question of if or not the Greek islands of Crete and Rhodes have their EEZs around them. For Greece, these two bid islands have separate EEZs and Greece has right to announce EEZ around them. In contrast to this claim, Turkey suggests that these two islands have no EEZs and Turkey has sovereign right to announce 200-mile long EEZ in the Mediterranean.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2031"><span data-dcnode-id="2039" instrument_node="">There are some positive signals on the Greek-Turkish relations. Greek Prime Minister Alexis Tsipras recently (Febr, 5</span><sup data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">th</span></sup><span data-dcnode-id="2036" instrument_node="">) meet with President Erdoğan in Ankara</span><sup data-dcnode-id="2033"><a class="ftnref" data-dcnode-id="2034" href="#ftn66" name="ftnref66" title="https://www.dni.gov/files/documents/Newsroom/Testimonies/2018-ATA---Unclassified-SSCI.pdf Page 21."><span data-dcnode-id="2035" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2032" instrument_node="">. Such meetings are always useful, as is bolstering the lines of communication between the two neighbors at every level. In this regard, the invitation extended by Turkish Defense Minister Hulusi Akar to his recently appointed Greek counterpart Evangelos Apostolakis is also a positive development. Carrying its own special weight, the language of military men – the former is a general, the latter an admiral – sometimes proves more effective than that of politicians.</span></p><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Territorial disputes and their tussle over oil and gas riches off the coast of Cyprus were on the agenda, in addition to the thorny issue of Greece providing sanctuary to Turkish army officers who fled the failed coup. The Greek PM described his relationship with Erdoğan as one of «respect, honesty, and directness» but noted that those ties were «challenged in very difficult moments».</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Keeping channels of communication between Athens and Ankara at every moment because problems can be solved only with dialogue is the overarching message of the Greek side on this trip, as was confirmed by government representative Dimitris Tzanakopoulos.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">It is indeed a pressing message at a time when Turkey is challenging Greek sovereignty in the Aegean and is interfering with the gas exploration program of the Republic of Cyprus on the grounds that Turkey and the Turkish Cypriots must be a partner to and approve of initiatives in Cyprus’ energy program.</span></p><span data-dcnode-id="2021" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">We perceive that one important reason for this visit is Greece’s eagerness to be a part of Turkish Stream. Athen has been lobbying about this in Moscow and Moscow may very well have asked Tsipras to ‘normalize’ ties with Ankara to make Greece’s involvement to the project possible. Time to see when Erdoğan plans to visit to Athen in return.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><h2 data-dcnode-id="2016" id="toc-25"><span data-dcnode-id="2017" instrument_node="">Military involvement</span></h2><span data-dcnode-id="2015" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2014" instrument_node="">The crisis between Greek Cyprus and Turkey is becoming increasingly militarized as is the whole situation in the Eastern Mediterranean. For example, according to our contacts within military and political circles in Ankara, Turkey is about to launch its largest naval exercise of the past 20 years. It is planned by the navy and air force and take place in the Aegean, eastern Mediterranean and Black Sea. The exercise is called Blue Homeland (Mavi Vatan) and will be held between Feb. 27 and March 3 in an area of 462,000 square kilometers.&nbsp; According to the Turkish media the exercise is also a message to the Eastern Mediterranean Gas Forum (EMGF), that is planning to explore energy sources, including in disputed areas in the Mediterranean. EMGF is a coalition formed recently by Egypt, Israel, Cyprus, Greece, Italy, Jordan and the Palestinian Authority. This forum is long wished for by Greek Cyprus and the hope is that it may offer support for its political and energy related positions possibly also in physical defense against Turkish confrontational actions. To top off the military exercise the Turkish foreign minister announced on 21</span><sup data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">st</span></sup><span data-dcnode-id="2011" instrument_node=""> of February that Turkey would begin drilling for oil and gas near Cyprus with two new exploration ships; stating firmly that: "</span><em data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Nothing at all can be done in the Mediterranean without Turkey</span></em><span data-dcnode-id="2008" instrument_node="">,</span><em data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node=""> we will not allow that</span></em><span data-dcnode-id="2005" instrument_node="">," The move is expected to inflame regional tensions with Greece. Currently Turkey is conducting several seismic surveys within Cypriotes declared EEZ's The seismic surveys are considered illegal by the Republic of Cyprus, as under international law a foreign state must request permission from the country of jurisdiction (Cyprus) to conduct any economic activity within its waters. Turkey does not recognize the Republic of Cyprus. The Turkish warship shadowing the Turkish ships is not in violation of international law as it is sailing in international waters.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">In August (2018) the Turkish government decided that it will establish a naval base in Northern Cyprus in order to protect its rights and interests in the Eastern Mediterranean and to guarantee the sovereign rights of the Turkish republic of Northern Cyprus (TRNC). The location of the new base will be Yeni Iskele and an agreement between Turkey and the TRNC is forecasted to be signed within 2019.</span></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1999" instrument_node="">So why does Ankara want a naval base in Northern Cyprus?</span><sup data-dcnode-id="1996"><a class="ftnref" data-dcnode-id="1997" href="#ftn67" name="ftnref67" title="https://www.yenisafak.com/en/columns/yusufkaplan/what-does-trumps-we-will-withdraw-from-syria-statement-signify-2046829"><span data-dcnode-id="1998" instrument_node="">[67]</span></a></sup><span data-dcnode-id="1995" instrument_node="">&nbsp; International waters of the Eastern Mediterranean Sea are running out of free space and becoming more crowded with elements of the US 6th Fleet, a plethora of naval vessels with the Russian Mediterranean Task Force, UK submarines, French frigates and others. The crisis in Syria and rivalry over hydrocarbon reserves are the main causes of this unprecedented military naval concentration and activity.</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Rising tensions and naval movements have rekindled the debate in Turkey on whether to set up a permanent naval base in the Turkish part of Cyprus (the Turkish Republic of Northern Cyprus, or Northern Cyprus). According to reports initially leaked to Turkish media, the Turkish navy has submitted a report and recommendation to the Ministry of Foreign Affairs on the urgent need to set up a naval base at an appropriate location there.</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">The report noted that in addition to ensuring the sovereign rights of Northern Cyprus, such a naval base would also guard the rights and interests of Northern Cyprus and Turkey in the Eastern Mediterranean, prevent violations of maritime energy zones, and equip Northern Cyprus and Turkey with stronger cards in any negotiations that may resume.</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">According to Gürcan, the Turkish navy’s recommendation for a permanent naval base in Northern Cyprus is an important geopolitical development. Because such a base in Northern Cyprus will provide significant facilities for the Turkish navy. Naval experts in Ankara also believe that setting up a naval base outside of Turkish borders will provide serious self-confidence not only to the Turkish navy but also to the entire Turkish Armed Forces.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1983" instrument_node="">Of interest to Norway, is Turkey’s purchase of Fatih (Deep Sea Metro II) and Deep Sea Metro I from Norway</span><sup data-dcnode-id="1980"><a class="ftnref" data-dcnode-id="1981" href="#ftn68" name="ftnref68" title="http://www.hurriyetdailynews.com/attack-on-economy-like-attack-on-turkish-flag-Erdoğan-135989"><span data-dcnode-id="1982" instrument_node="">[68]</span></a></sup><span data-dcnode-id="1979" instrument_node=""> for deep sea drilling up to 3500 meters down to sea surface. With the purchase of these ships, Ankara has started to claim that it has sovereign right to conduct exploratory deep-sea drillings in the high seas around the island. We expect that, in the summer of 2019, these two ships are to be sent to the south of Cyprus so as to conduct deep sea drillings in the RoC’s self-declared EEZ zones. If Turkish naval elements escorts to these ships, then this move would escalate the existing tension in a rapid fashion.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><h2 data-dcnode-id="1975" id="toc-26"><span data-dcnode-id="1976" instrument_node="">Turkey - Russia</span></h2><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">What is clear is that Ankara worries the operations of the Greek, Greek Cypriot, Israeli and Egyptian bloc (as described above) and Russian activities.&nbsp; Russia has eight warships operating near Syria’s coast and has has secured forty-nine-year leases for two military bases in Syria—the Khmeimim air base near Latakia and the Tartous naval base. These bases restore Russia’s capacity to maintain an enduring presence in the Mediterranean and enable power-projection capabilities into the Persian Gulf and Red Sea. There are several factors that cannot be ignored and emphasizing the significance of Russian military presence in the Eastern Mediterranean vis-a vis Turkey’s reach to the East Mediterranean. First, the hydrocarbon reserves in the Eastern Mediterranean could reduce Turkey’s external dependence on energy. Second, the area east of Cyprus and the region to the west of Hatay and Syria constitute one of the few navigational routes Turkey can use to reach open seas without potential interference from another country. Third, a major segment of Turkey’s energy imports and exports are transported via the Gulf of Iskenderun, which, until now, the Turkish navy appeared to be keeping calm. Turkey's navy has also been protecting Turkish seismic exploration vessels and intercepting foreign seismic research vessels entering exclusive economic zones belonging to Turkey and northern Cyprus. RoC &amp; Greece has full support of Israel and Egypt against Turkey. At the moment, Lebanon seeks to stay neutral in the rivalry between Turkey and RoC-Greece-Israel-Egypt block. If Syria and Lebanon join this anti-Turkish block, Turkey’s claim for EEZ in the Eastern Mediterranean would drastically weaken, as any coastal country does not accept Turkey’s suggestion. The ongoing contacts between Greek Cyprus, Israel and Egypt to share the sea’s hydrocarbon reserves will be even more complex with the arrival of Russian warships in the region. It is likely that Russia, by offering military and political backing to Greece, Greek Cyprus and Egypt, will try to dominate the navigational routes of the Eastern Mediterranean. This in turn will make Turkey’s access to open seas more difficult.</span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1968" instrument_node="">
</span><h1 data-dcnode-id="1965" id="toc-27"><strong data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">The case of Syria</span></strong></h1><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">At first it may seem easy to ascertain the Turkish government’s goals with respect to the Syrian war. The apparent easy answer is that it aims to eliminate the threat posed by YPG in northern Syria by denying YPG territorial control and PKK strategic depth. But it is not that simple. The Turkish government also has fears of Kurdish self-rule from where the security perception stretches to include Iraq, Iran, and also Iraqi Kurds even though they oppose PKK. Turkey also has concerns about the Syrian refugees that are becoming more and more unpopular within the Turkish societies in which they reside as well as within the larger population. And this problem is one that is only going to intensify with the expected economic contraction after the local elections in March 2019. Turkey also wants to position itself vis-à-vis Russia and Iran with regards to the post-conflict reconstruction of Syria, where there is a potential for economic gains for Turkish businesses as well as the possibility of increased political influence over regional power struggles. The overall goals in Syria need to be balanced vis-à-vis the Turkish domestic situation. Political constraints might come from the nationalist party, MHP, AKP’s coalition party and “kingmaker” in the parliament. President Erdoğan also needs to keep an eye on his electoral base, which has grown ever so nationalistic and critical towards Syrian refugees, which would feel the first effects of a worsening economic situation, and which are (slightly) more critical of the government's Syria policy: 61,1 % of AKP voters thought it was successful in 2018 versus 63,6% in 2017.</span><sup data-dcnode-id="1960"><a class="ftnref" data-dcnode-id="1961" href="#ftn69" name="ftnref69" title="https://af.reuters.com/article/worldNews/idAFKCN1L729N?feedType=RSS&amp;feedName=worldNews&amp;utm_source=feedburner&amp;utm_medium=feed&amp;utm_campaign=Feed%3A+reuters%2FAFRICAWorldNews+%28News+%2F+AFRICA+%2F+World+News%29"><span data-dcnode-id="1962" instrument_node="">[69]</span></a></sup></p><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1941"><span data-dcnode-id="1957" instrument_node="">In this section of the report we focus on </span><strong data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Turkey’s position with respect to the Syrian regime</span></strong><span data-dcnode-id="1954" instrument_node="">, Turkey’s </span><strong data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">strategic and tactical moves</span></strong><span data-dcnode-id="1951" instrument_node=""> in the context of fighting YPG, and how Russia and the US pose </span><strong data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">constraints </span></strong><span data-dcnode-id="1948" instrument_node="">upon Turkey's preferred policies and </span><strong data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">the</span></strong><span data-dcnode-id="1945" instrument_node=""> </span><strong data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">balance</span></strong><span data-dcnode-id="1942" instrument_node=""> Turkey tries to strike between these two actors.</span></p><span data-dcnode-id="1940" instrument_node="">
</span><h2 data-dcnode-id="1937" id="toc-28"><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Turkey’s stance towards the Assad regime </span></strong></h2><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">When the Syrian civil war erupted, President Erdoğan stated that Turkey’s firm priority was to oust Bashar Al Assad. But the failure of a quick solution left Turkey with over 3,5 million Syrian refugees as well as several terror attacks in Turkey’s major cities. Then, one can argue that Ankara’s initial hesitancy in working with Washington in the fight against ISIS led the US to develop a strategic partnership with YPG in the north of Syria instead.</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1932" instrument_node="">With regards to Turkey’s initial demand of the removal of Assad, we have for some time now seen a back-peddling on the part of Ankara. Ankara and Damascus broke off diplomatic relations in 2012 after the outbreak of the armed conflict in Syria. President Erdoğan, however, admitted in February of this year that the government had been maintaining low-level contacts with Damascus through the two countries’ intelligence agencies,</span><sup data-dcnode-id="1929"><a class="ftnref" data-dcnode-id="1930" href="#ftn70" name="ftnref70" title="https://www.yenisafak.com/en/columns/ibrahimkaragul/us-is-the-enemy-for-turkey-one-day-thousands-of-people-will-siege-incirlik-as-well-2042300"><span data-dcnode-id="1931" instrument_node="">[70]</span></a></sup><span data-dcnode-id="1928" instrument_node=""> something that was not a surprise to people who follow the situation closely since there have been reports of back-channels since 2016. In the beginning of the Astana process with Russia and Iran, Ankara might have been hoping that Russia would put pressure on Assad in some cases at least where Turkey’s interests were at stake. But there has been little evidence of such pressure from Moscow.&nbsp;</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1925" instrument_node="">On the contrary, in December last year, the Turkish foreign minister Mevlüt Çavusoğlu admitted that Ankara could work with Assad, provided he won a democratic election. This stands in stark contrast to President Erdoğan's statement a year earlier that he considered Assad a terrorist and that there could be no peace in Syria as long as he was in power.</span><sup data-dcnode-id="1922"><a class="ftnref" data-dcnode-id="1923" href="#ftn71" name="ftnref71" title="Herrmann, R. K., Voss, J. F., Schooler, T. Y., &amp; Ciarrochi, J. (1997). Images in international relations: An experimental test of cognitive schemata. International Studies Quarterly, 41(3), 403-433."><span data-dcnode-id="1924" instrument_node="">[71]</span></a></sup></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1919" instrument_node="">Turkey has since 2013 advocated a safe zone along its borders in northeast of Syria, but has received no support from either Russia or the US for this zone until recently. However, in January Russia brought up the Adana protocol</span><sup data-dcnode-id="1916"><a class="ftnref" data-dcnode-id="1917" href="#ftn72" name="ftnref72" title="Cottam, M. L., Cottam, M. L., &amp; Cottam, R. W. (2001). Nationalism &amp; Politics: The political behavior of nation states. Lynne Rienner Publishers."><span data-dcnode-id="1918" instrument_node="">[72]</span></a></sup><span data-dcnode-id="1915" instrument_node=""> as the basis for a deal allowing the Turkish armed forces to set up a buffer zone in northeast Syria.&nbsp;</span></p><span data-dcnode-id="1913" instrument_node="">
</span><p data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">The Adana protocol, here showing the original text- agreement concerning the rights of Turkey in this context.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1909" instrument_node="">The US and Turkey are discussing the establishment of a safe zone and we suspect that by reviving the Adana protocol, Russia is trying to counter the possibility of a deal between Turkey and the US. Assad has protested the very idea of Adana, saying that Turkey for years has violated the agreement with their military operations into Syria</span><sup data-dcnode-id="1906"><a class="ftnref" data-dcnode-id="1907" href="#ftn73" name="ftnref73" title="A Turkish Air Force F-16 fighter jet shot down a Russian attack aircraft near the Syria–Turkey border on 24 November 2015. According to Turkey, the aircraft violated the Turkish border and continued to do so even after it was warned several times. The Russia Defense Ministry denied the aircraft ever left Syrian airspace."><span data-dcnode-id="1908" instrument_node="">[73]</span></a></sup><span data-dcnode-id="1905" instrument_node="">. We further assess that in return for Russian cooperation on Turkey's goal on pushing back YPG forces, Moscow wants to see movement towards normalization between Turkey and the Assad regime.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><h2 data-dcnode-id="1898" id="toc-29"><strong data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Turkey versus YPG/PKK in Syria:&nbsp; </span></strong><strong data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Strategy and tactical moves - Constraints by other actors.</span></strong></h2><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1896" instrument_node="">In an interview recently, Fahrettin Altun, newly appointed communication director to the President and SETA affiliate stated: </span><em data-dcnode-id="1891"><span data-dcnode-id="1895" instrument_node="">“Our aim in Syria is very clear: To drain the terror swamp which is near our border, protection of Syria’s territorial integrity and ensuring political stability.”</span><sup data-dcnode-id="1892"><a class="ftnref" data-dcnode-id="1893" href="#ftn74" name="ftnref74" title="https://www.brookings.edu/blog/order-from-chaos/2017/10/04/the-serpentine-trajectory-of-turkish-russian-relations/"><span data-dcnode-id="1894" instrument_node="">[74]</span></a></sup></em></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">Translated, this means: (1) Push YPG forces east of the Euphrates River in Syria's northeast, (2) establish a safe zone that runs along Turkey's border with Syria (on the Syrian side), and (3) prevent Syrian territories from being split up, either through Kurdish self-rule or the establishment of some other autonomous area.</span></p><span data-dcnode-id="1886" instrument_node="">
</span><h2 data-dcnode-id="1882" id="toc-30"><span data-dcnode-id="1885" instrument_node="">Military</span><em data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node=""> intervention</span></em></h2><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">This statement came in the context of a possible military operation east of the Euphrates River. During February, Turkey took all necessary steps to intervene militarily in this area. According to the project member, Metin Gürcan a military expert who follows the situation in Syria closely;, When or if Ankara realizes that US’s backing of the YPG is weakening, the most likely scenario involves Turkey’s military intervention into the north of Syria and her opening a conventional front.&nbsp; In addition, if Turkey ends up in a conflict with the YPG in Syria, this will most likely be a high-tempo conventional armed confrontation urban in nature, not traditional low-intensity rural guerilla warfare the Turkish ‘military machine’ has got used to. One should also note that, in Ankara, the prevailing feeling is that the US has been deliberately enhancing the YPG’s military capabilities and turning it into a standing military force. When/if an armed confrontation between Turkish military and the YPG initiated in the north of Syria, then the US, with its direct support for YPG, will probably find itself stuck between Turkey and YPG. In the best-case scenario, already unstable relations between the US and Turkey will deteriorate to a level where the options the US has kept in its back pocket could come into play, including questioning Turkey’s NATO membership, the closure of Incirlik air base, and cutting or sharply curtailing defense and security contracts between the US and Turkey. One should also note that, in the worst-case scenario, a conventional armed confrontation between Turkish forces and the YPG, whether intentional or unintentional, would also entail both Turkey and the US targeting each other’s military assets, including personnel, with the possibility of significant casualties mounting on each side. Gürcan further expects that sooner or later we will witness local armed clashes between the Turkish military and/or Turkish military-backed FSA forces and the YPG in the north east of Syria. It would then be up to the US and Russia to decide whether or not those local clashes turn into a conventional confrontation.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">When assessing what Ankara can or cannot do in the northwest of Syria (particularly in/around Idlib), Gürcan advises that one should not focus on the power struggle on the ground. Moscow giving the green light to Turkish air force (TAF) to use the airspace over Afrin and Idlib is of critical importance to Turkey. With the Turkish ground forces currently serving in the northwest of Syria, Ankara has no capacity to change the operational picture in this area. The game-changer would be Ankara's capability to dominate the air space in the northwest of Syria, even if happens temporarily.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Recently the Turkish Defense Minister said in an interview with Anadolu Agency that the no-fly zone for Turkish planes in Idlib and Afrin had been lifted. However, the confirmation of the entrance of a Turkish aircraft, drone, and/or helicopter into this area would validate Akar’s remarks. If confirmed we expect that Ankara would try to bend this permission towards Manbij. Turkey has vowed to carry out what they call a counter-terrorist operation in Manbij and east of Euphrates following two similar successful operations since 2016 (Euphrates Shield and Olive Branch).</span></p><span data-dcnode-id="1872" instrument_node="">
</span><h2 data-dcnode-id="1869" id="toc-31"><em data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Safe Zone</span></em></h2><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Turkey has advocated since 2013 the establishment of a safe zone (on the Syrian side) along its border. There are at least four reasons for this: (1) in order to prevent YPG/PKK to maintain presence close to Turkey's border; (2) in order to prevent more Syrian refugees from entering Turkey by providing a safe area within the zone; (3) for the resettlement of Syrian refugees; and (4) in order to exert leverage against the Assad regime.</span></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1864" instrument_node="">The map below provided by Anadolu Agency</span><sup data-dcnode-id="1861"><a class="ftnref" data-dcnode-id="1862" href="#ftn75" name="ftnref75" title="https://www.al-monitor.com/pulse/originals/2017/07/turkey-russia-accelerator-partners-for-nuclear-power-plant.html"><span data-dcnode-id="1863" instrument_node="">[75]</span></a></sup><span data-dcnode-id="1860" instrument_node="">, illuminates Turkey's proposal for a safe zone:</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1844"><span data-dcnode-id="1857" instrument_node="">Turkey is currently discussing the makeup of this safe zone with Washington. And to create a “buffer zone” with its Russian counterparts (as discussed above), Erdoğan has long proclaimed that Turkey needs to be in control of the safe zone. In fact, Erdoğan recently underlined this point when he stated: </span><em data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">“It will </span></em><em data-dcnode-id="1853"><span data-dcnode-id="1854" instrument_node="">be unacceptable for us if the security zone would be shaped in a way that contradicts with our own strategic understanding.</span></em><span data-dcnode-id="1852" instrument_node=""> </span><em data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">If there will be a security zone on my border, it has to be under our control</span></em><span data-dcnode-id="1849" instrument_node="">.”</span><sup data-dcnode-id="1846"><a class="ftnref" data-dcnode-id="1847" href="#ftn76" name="ftnref76" title="31.03.19"><span data-dcnode-id="1848" instrument_node="">[76]</span></a></sup><span data-dcnode-id="1845" instrument_node=""> The strategy is to push YPG away from the border, and then set up a civil administration and local security forces under Turkish control. The idea is then to use the territory to resettle Syrian refugees now living inside Turkey. Being in control of such an area could also give Ankara some leverage vis-à-vis Damascus.</span></p><span data-dcnode-id="1843" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">Washington, on the other side, is concerned about their YPG allies and the predominantly Kurdish population within these areas, and thus does not want to give Turkish forces full control. But at the same time, President Trump does not want to go back on his earlier decision to pull out of Syria. The US has not publicly put forward a deal. There have been talks about an international force made up by the US and other NATO members such as the French and the British, but the proposed participant countries have not enthusiastically embraced the idea. Analysts has also made the argument for the US and Turkey together to continue their cooperation on Manbij to extend the safe zone, however this would lead to the US’s maintaining a presence beyond the troops that the Trump administration has advocated and would lead to Trump’s having to substantially go back on his promise. The third option seems to be to give Turkey the responsibility and try to persuade Turkey to moderate its strategy towards the YPG. However, this is an option that does not sound likely given both the dominant rhetoric in Turkey and the MHP’s small but vital influence on foreign policy. In any case Turkey would most likely not be able to set up a safe zone without the consent and cooperation of either Russia or the US and would have to find a way to get one of the two actors to agree. Presently, Turkey is trying to play the US and Russia against each other to safeguard their interests, but Ankara will most likely have to realize that it has to make concessions to get what it wants. In the case of cooperation of the US, such a concession could be moderation on the YPG case. In the case of cooperation with Russia this could mean an effort on the part of Ankara to normalize ties with the Assad-regime.</span></p><span data-dcnode-id="1840" instrument_node="">
</span><h2 data-dcnode-id="1837" id="toc-32"><em data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">Idlib </span></em></h2><span data-dcnode-id="1836" instrument_node="">
