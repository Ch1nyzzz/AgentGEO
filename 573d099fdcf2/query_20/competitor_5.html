</span><div class="body" data-dcnode-id="1918"><span data-dcnode-id="1923" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-summary field--type-text-long field--label-hidden field__item" data-dcnode-id="1920"><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">The overarching question imparting urgency to this exploration is: Can U.S.-Russian contention in cyberspace cause the two nuclear superpowers to stumble into war? In considering this question we were constantly reminded of recent comments by a prominent U.S. arms control expert: At least as dangerous as the risk of an actual cyberattack, he observed, is cyber operations’ “blurring of the line between peace and war.” Or, as Nye wrote, “in the cyber realm, the difference between a weapon and a non-weapon may come down to a single line of code, or simply the intent of a computer program’s user.”</span></p></div><span data-dcnode-id="1919" instrument_node="">

</span><div class="body" data-dcnode-id="1874"><span data-dcnode-id="1879" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-summary field--type-text-long field--label-hidden field__item" data-dcnode-id="1876"><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Renewables are widely perceived as an opportunity to shatter the hegemony of fossil fuel-rich states and democratize the energy landscape. Virtually all countries have access to some renewable energy resources (especially solar and wind power) and could thus substitute foreign supply with local resources. Our research shows, however, that the role countries are likely to assume in decarbonized energy systems will be based not only on their resource endowment but also on their policy choices.</span></p></div><span data-dcnode-id="1875" instrument_node="">

</span><p class="pub-type-and-name" data-dcnode-id="1395"><span data-dcnode-id="1399" instrument_node="">
</span><span class="pub-type journal-article" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">  Journal Article
</span></span><span data-dcnode-id="1396" instrument_node="">
</span></p><span data-dcnode-id="1394" instrument_node="">
</span><h1 class="page-title" data-dcnode-id="1391"><span class="field field--name-title field--type-string field--label-hidden" data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">NATO’s Lessons from Afghanistan</span></span></h1><span data-dcnode-id="1390" instrument_node="">
</span><div class="view-publication-author-and-date" data-dcnode-id="1372"><span data-dcnode-id="1389" instrument_node="">
</span><ul class="people-group author-group" data-dcnode-id="1380"><span data-dcnode-id="1388" instrument_node="">
</span><span class="author-label" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Author:</span></span><span data-dcnode-id="1385" instrument_node="">
</span><li class="author" data-dcnode-id="1382"><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.belfercenter.org/person/seth-johnston" rel="author"><span data-dcnode-id="1384" instrument_node="">Seth Johnston</span></a></li><span data-dcnode-id="1381" instrument_node="">
</span></ul><span data-dcnode-id="1379" instrument_node="">
</span><span class="pub-date" data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">
</span><span class="divider" data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node=""> | </span></span><span data-dcnode-id="1375" instrument_node="">    Autumn 2019

            </span></span><span data-dcnode-id="1373" instrument_node="">
</span></div><span data-dcnode-id="1371" instrument_node="">
</span><div data-dcnode-id="1012" id="field-page-content"><span data-dcnode-id="1370" instrument_node="">
</span><div class="abstract" data-dcnode-id="1364"><p data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Published by</span></strong><span data-dcnode-id="1367" instrument_node="">: The US Army War College Quarterly Parameters</span></p><span data-dcnode-id="1365" instrument_node="">
</span></div><span data-dcnode-id="1363" instrument_node="">
</span><div class="field field--name-field-page-content field--type-entity-reference-revisions field--label-hidden field__items" data-dcnode-id="1018"><span data-dcnode-id="1362" instrument_node="">
</span><div class="paragraph paragraph--type--full-text paragraph--view-mode--default" data-dcnode-id="1020"><span data-dcnode-id="1361" instrument_node="">
</span><div class="clearfix text-formatted field field--name-field-text field--type-text-long field--label-hidden field__item" data-dcnode-id="1022"><p data-dcnode-id="1357"><strong data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">ABSTRACT</span></strong><span data-dcnode-id="1358" instrument_node="">: This article identifies the importance of NATO’s role as a facilitator of multinational collaboration. The Alliance’s established processes and standards worked well, enabling countries whose available resources might otherwise prohibit their participation to fully-contribute to the mission in Afghanistan.</span></p><p data-dcnode-id="1346"><span data-dcnode-id="1356" instrument_node="">Today’s North Atlantic Treaty Organization is no Cold War alliance. Few developments illustrate NATO’s capacity for adaptation more than its 21st century role in Afghanistan.</span><sup data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">1</span></sup><span data-dcnode-id="1353" instrument_node=""> NATO allies invoked the collective defense provision—Article 5—of its founding treaty for the first and only time just one day after the September 11, 2001, terrorist attacks.</span><sup data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">2</span></sup><span data-dcnode-id="1350" instrument_node=""> Few present at the signing of the North Atlantic Treaty in 1949 could have imagined it would be invoked by European countries and Canada seeking to support the United States or that the Alliance’s largest and longest military operation would occur in central Asia. Fewer still might have predicted NATO allies would agree to the mission so soon after the US-led invasion of Iraq in 2003, a crisis the then US ambassador to NATO described as a “near death experience” for the Alliance.</span><sup data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">3</span></sup><span data-dcnode-id="1347" instrument_node=""> Yet NATO assumed control of the International Security Assistance Force (ISAF) in 2003 and has remained in Afghanistan for the better part of two decades.</span></p><p data-dcnode-id="1339"><span data-dcnode-id="1345" instrument_node="">As the United States has begun negotiating a political settlement to the Afghanistan conflict with a view to the eventual withdrawal of international forces there, an assessment from the overall NATO perspective will complement the national initiatives.</span><sup data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">4</span></sup><span data-dcnode-id="1342" instrument_node=""> This effort will also support ongoing efforts to reassess NATO’s priorities in the face of other security challenges.</span><sup data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">5</span></sup></p><p data-dcnode-id="1334"><span data-dcnode-id="1338" instrument_node="">Although NATO has undertaken formal studies of its activities in Afghanistan, recent scholarship by Heidi Hardt, Jörg Noll, and Sebastiaan Rietjens cast doubt on the efficacy of formal lessons learned processes in international organizations generally and in NATO specifically.</span><sup data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">6</span></sup><span data-dcnode-id="1335" instrument_node=""> This article offers an external and an unofficial assessment of the Alliance’s efforts and provides initial suppositions. In sum, NATO’s impact in Afghanistan may not have been enough to mitigate national shortcomings or to achieve victory on its own, but it was significant and positive. The Alliance’s adaptability and highly institutionalized character are at the root of these contributions.</span></p><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Moreover, the mission in Afghanistan affected NATO in ways that promoted allied political cohesion, organizational effectiveness, and military interoperability. The chief implications of these findings are that while national political leadership and strategy formulation remain paramount in war, NATO remains a proven and effective instrument of organizing and implementing coordinated multinational efforts. The most important lesson learned from NATO in Afghanistan may therefore be about NATO’s more general value to the United States and other members.</span></p><p data-dcnode-id="1329"><strong data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">NATO: Alliance and International Organization</span></strong></p><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">In contrast to national assessments, this analysis focuses on the formal institutions of the Alliance. NATO is unique among alliances in that it is not only a treaty-based agreement among member states, but also an international organization—and a highly institutionalized one at that. Since its early years, NATO has been comprised of a permanently staffed formal political headquarters supported by a network of military and civilian organizations. Particularly noteworthy is NATO’s integrated joint multinational military structure, a unique innovation without equivalent among other alliances or international organizations.</span></p><p data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">This integration, capped by the Supreme Headquarters Allied Powers Europe (SHAPE) in Belgium, extends through various echelons and included the ISAF headquarters and other NATO structures in Afghanistan.</span><sup data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">7</span></sup><span data-dcnode-id="1323" instrument_node=""> Thus, for this article, “NATO” refers to the various formal institutions and not the group of allied countries. Likewise, the focus is on the collaborative conduct and not that of the United States, other allies or partners, the government of Afghanistan, or other regional actors. Nor does the article address the efficacy of counterinsurgency warfare.</span></p><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">International relations theory would emphasize the formal institutions of NATO have very weak independent power and agency.</span></p><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">But although NATO consists of such formal institutions, the Alliance remains an alliance among states. All decisions at NATO Headquarters are taken by consensus among member states (which will soon number 30). Politics among those countries happens, and the relative influence of individual member states is closely associated with their power. NATO’s institutions matter chiefly because of how they facilitate and structure the relations among the states. Like any other international organization, states may derive value from such institutions because they provide benefits such as establishing predictable structures and routines for decision-making; increasing information sharing; improving efficiency and reducing transaction costs; and defining roles, status, and identity. The most important questions for NATO in the context of assessing its role in the Afghanistan conflict is whether and how well it has performed these functions.</span></p><p data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node="">An important theme in the assessment of NATO’s role in Afghanistan regards the reciprocal impact of the Alliance and Afghanistan, as Alexander Mattelaer and others have noted.</span><sup data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">8</span></sup><span data-dcnode-id="1314" instrument_node=""> Thus, one kind of lesson relates to NATO’s effect on the mission and the implications for future coalition expeditionary warfare; another, the future of the transatlantic Alliance.</span></p><p data-dcnode-id="1310"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">NATO and Strategy in Afghanistan</span></strong></p><p data-dcnode-id="1305"><span data-dcnode-id="1309" instrument_node="">The causes of NATO’s involvement in Afghanistan appear logical: an international terrorist group based in Afghanistan attacked the United States. Citing the North Atlantic Treaty, NATO allies declared the attack on the United States as an attack on all allies. The participation of allied countries or the whole-of-NATO in a US-led response in Afghanistan seemed straightforward. How NATO became involved in Afghanistan was in fact murkier. The United States initially preferred not to involve established alliances after 9/11. As then US Secretary of Defense Donald Rumsfeld memorably explained, “The mission determines the coalition, and the coalition must not determine the mission.”</span><sup data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">9</span></sup><span data-dcnode-id="1306" instrument_node=""> When the United Nations authorized the ISAF in 2001, with a limited functional and geographic mandate around Kabul, the lead countries of the ISAF coincidentally tended to be members of NATO.</span></p><p data-dcnode-id="1301"><span data-dcnode-id="1304" instrument_node="">In planning for an ISAF rotation in 2003, the lead nations realized they could achieve some capability enhancements and cost savings by applying NATO resources. Still struggling meaningfully to demonstrate the consequences of its post-9/11 invocation of Article 5 and searching for a way to reconcile allies divided over the Iraq War, NATO saw an opportunity: supporting or participating in the Afghanistan campaign could reinvigorate the Alliance; encourage rapprochement between the United States and those (mostly western European) allies opposed to&nbsp;the Iraq War; and offer others (mostly newer eastern European allies, NATO aspirants, and global partners) an occasion to cultivate even more positive relations with the United States and NATO.</span><sup data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">10</span></sup></p><p data-dcnode-id="1297"><span data-dcnode-id="1300" instrument_node="">For its part, the United States warmed to the idea of greater allied involvement in Afghanistan as the cost of the Iraq War increased. For the allied institution, therefore, the initial entry into Afghanistan had broad politico-diplomatic benefits for transatlantic relations as well as some small practical advantages for some countries. But it occurred without much clear debate or unified strategic ends in Afghanistan. Tellingly, the North Atlantic Council, NATO’s top political decisionmaking body, did not issue an “initiating directive” with guidance for the development of military plans for Afghanistan. This decision may be understandable insofar as NATO deferred thinking about those ends to the United States, and the UN authorization of ISAF, which NATO was taking over. But Afghanistan itself may have been a secondary concern. Evidence suggests at least some NATO countries explicitly expressed reservations about the purpose of the Alliance’s involvement in Afghanistan but supported it anyway.</span><sup data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">11 </span></sup></p><p data-dcnode-id="1290"><span data-dcnode-id="1296" instrument_node="">Such early inattention to strategy in Afghanistan caused at least two major problems. The first concerned time. As the years passed, NATO was drawn incrementally further into the conflict and the lack of clear and agreed strategic ends at the institutional level became increasingly troublesome. Expanding the ISAF from an organization with a predominantly noncombat and geographically limited mandate around Kabul to one responsible for conducting a full range of military operations throughout Afghanistan by the end of 2006 elevated the prominence of this issue. The confusion over NATO’s strategic ends became most apparent in southern Afghanistan where the insurgency raged but different ISAF countries acted almost autonomously within their respective areas of responsibility, with greatly varying priorities in counterterrorism, local security, development, security force and governance assistance, counternarcotics, and other aspects of the counterinsurgency approach that had gained currency in US military circles by this time but were not widely shared among NATO allies.</span><sup data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">12</span></sup><span data-dcnode-id="1293" instrument_node=""> Short tour lengths and frequent changes in commanders compounded&nbsp;these problems, as new personnel naturally applied their own priorities and interpretations of strategic ends.</span><sup data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">13</span></sup></p><p data-dcnode-id="1282"><span data-dcnode-id="1289" instrument_node="">NATO had embarked on a security assistance mission but ended up in a war without much discussion of war aims. The Alliance ultimately confronted this problem and, by 2008, had achieved consensus on a clear and detailed strategy.</span><sup data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">14</span></sup><span data-dcnode-id="1286" instrument_node=""> But this occurred five years after NATO’s initial involvement in Afghanistan and seven years into the conflict. The duration of the war was becoming a significant political concern by this point, and following the entrance of a new US presidential administration in 2009, the United States soon adopted a new strategy that called for large troop increases and a goal of starting troop withdrawals by 2011.</span><sup data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">15</span></sup><span data-dcnode-id="1283" instrument_node=""> The international mission was thereafter extended only incrementally two or three years at a time, reflecting tension between the domestic political reality among allies and the ambition of the strategy and its counterinsurgency approach.</span></p><p data-dcnode-id="1278"><span data-dcnode-id="1281" instrument_node="">The second, related problem with NATO strategic ends concerned their suitability in Afghanistan. The agreed strategic goals depended on the creation of effective and sustainable Afghan government and security institutions. The 2009 Afghan presidential election debacle underscored the difficulty of such a goal. ISAF commander General Stanley McChrystal rightly recognized this difficulty in describing the capability of the Afghan government and the Taliban as obstacles to victory.</span><sup data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">16</span></sup></p><p data-dcnode-id="1271"><span data-dcnode-id="1277" instrument_node="">Proponents of counterinsurgency in general may conclude the Afghan government’s troubles in this case were so great that a strategy may have required resources beyond what NATO and ISAF member countries would be able to give. Those more skeptical about the general efficacy of counterinsurgency may conclude Afghanistan is yet another case demonstrating the inherent limitations of foreign powers to reshape other nations. Either way, the lesson for NATO’s strategic ends recalls the idea from Carl von Clausewitz that policy ought not ask of strategy that which its chosen means cannot deliver.</span><sup data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">17</span></sup><span data-dcnode-id="1274" instrument_node=""> Admittedly, this question may be less about NATO specifically and more about counterinsurgency and other such missions in general. Yet this question has resonance not only because of Afghanistan but also because of the demand for NATO&nbsp;involvement in similar situations. In Kosovo, for example, the Alliance has maintained a peacekeeping force and imperfect relationship with local government for 20 years after the 1999 intervention. Allied countries also grapple with such questions and the prospect of similar calls arising from elsewhere. Thus, the Alliance has a stake in the debate.</span><sup data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">18</span></sup></p><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">A ready critique of the conflict in Afghanistan is that resources were either too small or too slowly applied to bring about the desired strategic ends. This critique might point out NATO’s original 2003 involvement in the ISAF was motivated by short-term cost savings on the part of a few allies; the expansion of ISAF under NATO leadership was a tacit acknowledgment that the United States chose to economize its commitments in Afghanistan as an effort to address the concurrent deteriorating situation in Iraq; and the buildup of US forces in 2009–10 may have been too little, too late—unpersuasive to a Taliban adversary that viewed the time-limited withdrawal intentions as its own plausible path to victory. But this critique of means has less to do with NATO than with the impracticality of matching means to uncertain ends, as described above. Moreover, the provision of means to any allied initiative or strategy depends less on the Alliance and more on the will of participating countries. National responsibility for resources is the essence of the burden-sharing issue not just for Afghanistan but for all NATO activities.</span></p><p data-dcnode-id="1259"><span data-dcnode-id="1268" instrument_node="">The Alliance’s main role in resourcing a strategy is therefore to clarify and organize what countries provide. NATO deserves credit for its positive contributions in this respect. The Alliance’s overarching NATO defense planning process (NDPP) and the mission-specific combined joint statement of requirements (CJSOR) for Afghanistan are well-organized processes for identifying and communicating requirements as well as integrating resources provided.</span><sup data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">19</span></sup><span data-dcnode-id="1265" instrument_node=""> Even when nations did not always fully resource every requirement in the CJSOR, which was usually the case, the process helped serve as an assessment tool and benchmark for intra-alliance politics and negotiations.</span><sup data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">20</span></sup><span data-dcnode-id="1262" instrument_node=""> The United States, for example, has used information from the CJSOR to tailor specific requests to other countries in bilateral diplomacy with a view to filling out the comprehensive statement of means. Moreover, NATO offered common doctrine, standards, and even some training to facilitate interoperability for allies and nonmember partners participating in the coalition. This architecture facilitated the integration of forces&nbsp;and capabilities from the more than 40 countries that participated in the NATO-led mission in Afghanistan.</span><sup data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">21</span></sup></p><p data-dcnode-id="1249"><span data-dcnode-id="1258" instrument_node="">The effect of the mission on the Alliance is a more positive story in several respects. First is the durable commitment of NATO and its allies to the campaign, which includes remaining in Afghanistan as long as the United States does. Non-US members of the coalition have suffered more than 1,000 combat fatalities, spent billions of dollars, and maintained this commitment for more than 15 years.</span><sup data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">22</span></sup><span data-dcnode-id="1255" instrument_node=""> This commitment is even more remarkable given the domestic political unpopularity of the conflict in many of the participating countries and the absence of a direct interest in Afghanistan for most of them. As one senior European official said to a group of Americans at a recent meeting of the NATO Military Committee, “My country had no direct security interest in going to Afghanistan. We did it for you [the United States].”</span><sup data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">23</span></sup><span data-dcnode-id="1252" instrument_node=""> The maintenance of the allied cohesion on involvement in Afghanistan thus benefited the United States. It also says something larger about the convening and staying power of NATO in general. The allies’ commitment to an unpopular conflict that was at best tied only indirectly to most countries’ security interests is an indicator of the importance states attach to the Alliance in general.</span><sup data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">24</span></sup></p><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">Notwithstanding conclusions about the quality of the strategy for the Afghanistan conflict, NATO played a positive and useful role in offering a structured forum for the strategy-making process. The Alliance demonstrated the potential for aggregating this process— always complex and difficult, even for one nation—among all the allies and partners in the coalition. The institutions, including the various committees at NATO headquarters, as well as higher-level foreign and defense ministers meetings and summits, provided both a structure for deliberation and routine political accountability.</span><sup data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">25</span></sup><span data-dcnode-id="1245" instrument_node=""> This structure facilitated the articulation of strategic ends as well as the iterative process of matching ways and means to those ends.</span></p><p data-dcnode-id="1237"><span data-dcnode-id="1243" instrument_node="">Compared to ad hoc multinational coalitions, the NATO structure encourages political cohesion and staying power because nations have a mechanism for their interests and concerns to be heard on a political as well as a military level.</span><sup data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">26</span></sup><span data-dcnode-id="1240" instrument_node=""> Compare, for example, the NATO effort in Afghanistan with the Global Coalition to Defeat ISIS (Islamic State in Iraq and Syria): all NATO allies and the institution are members of the coalition devised during the 2014 NATO Summit in Wales. And the military forces of the coalition are interoperable, to a great degree, because of the members’ common NATO experiences. But there is no inherent mechanism for political consultation among the coalition’s members. Arrangement of coalition meetings thus fell to the United States and other countries on a multilateral basis. A significant part of the rationale for NATO institutions joining the coalition was so the Alliance could host or convene meetings of the coalition, again often on the sidelines of a NATO-only meeting.</span><sup data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">27</span></sup></p><p data-dcnode-id="1232"><span data-dcnode-id="1236" instrument_node="">The Alliance extended this deliberative structure to include the participating nonmember partners in the Afghanistan mission.</span><sup data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">28</span></sup><span data-dcnode-id="1233" instrument_node=""> The increased prominence of the office of an ambassador-level NATO senior civilian representative in Afghanistan after 2010 further institutionalized this political coordination. These derivative benefits of NATO’s partnership program and longstanding tradition of civilian engagement and political dialog facilitated multinational contributions to the mission in Afghanistan. Even with the elusiveness of victory and the marginal significance of Afghanistan in the direct national security interests of coalition members, the longstanding commitment of allies to the NATO mission in Afghanistan reflects positively on the perceived value of the Alliance.</span></p><p data-dcnode-id="1229"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Organizing for Afghanistan</span></strong></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">An advantage of NATO has been its role as a forum for coordinating decision-making and action among allies. Results depend mostly on what allies decide and do. But NATO institutions can assist countries in collective decisions and facilitate implementation. Though NATO’s role in offering a process for strategy-making in Afghanistan has been positive, aspects of organization and implementation in the Afghanistan conflict, particularly in the military area, deserve closer examination.</span></p><p data-dcnode-id="1219"><span data-dcnode-id="1226" instrument_node="">Command authority is one such issue. The political reality of coalition warfare necessarily complicates military authority and gave rise to several challenges in Afghanistan. One prominent challenge concerned the caveats imposed by most troop contributing nations on the employment of their forces. Some limitations affected material capabilities, such as the range of vehicles or equipment to operate at night. Legal or political considerations, such as rules of engagement or the taking and treatment of prisoners also played a role. Many of these restrictions stemmed from the lack of consensus on strategy, especially during the first years of NATO involvement. National caveats, especially the previously unstated or those not specified in advance, were some of the clearest consequences of strategic differences and frustrated NATO&nbsp;commanders in the field.</span><sup data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">29</span></sup><span data-dcnode-id="1223" instrument_node=""> Successful commanders made the most of the available resources, of course, but the caveats increased the burdens for planning staff, reduced commanders’ flexibility, and negatively affected camaraderie and perceptions of fairness among the troops.</span><sup data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">30</span></sup><span data-dcnode-id="1220" instrument_node=""> Yet they were the price of broad international participation and political cohesion. Stronger political agreement and strategic clarity may reduce the salience of caveats. But risk discouraged broad participation. Similar trade-offs will continue in Afghanistan and in future missions.</span></p><p data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Another problem involved overlapping authorities. “Dual-hatting” is a common practice in NATO that can produce neutral if not positive effects. A prominent example is the role of Supreme Allied Commander Europe (SACEUR), who is customarily an American who also commands the US European Command. Although this officer must split time between the two responsibilities, each headquarters has its own staff and the authorities of each office tend to reinforce the other. The SACEUR can prioritize and lead NATO military efforts to reinforce US initiatives, and vice versa.</span></p><p data-dcnode-id="1210"><span data-dcnode-id="1216" instrument_node="">In Afghanistan, however, the greater number and types of hats placed on senior leaders did not always produce reinforcing effects. To take one example from the air domain, a single US Air Force general officer toward the end of the ISAF mission in 2014 was wearing at least five hats representing various command and staff duties in both national and multinational NATO contexts.</span><sup data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">31</span></sup><span data-dcnode-id="1213" instrument_node=""> Particularly when roles did not come with additional resources, such as the dual-hatting of entire staffs or organizations, the unavoidable practical effect was prioritizing some roles and inattention to others. This challenge especially affected US service members who were relatively less familiar or experienced in NATO doctrine and standards compared to their counterparts from other countries in the Alliance.</span><sup data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">32</span></sup></p><p data-dcnode-id="1202"><span data-dcnode-id="1209" instrument_node="">A compounding factor in Afghanistan was the relatively distinct missions of the NATO-led ISAF and the US-led Operation Enduring Freedom, with the latter placing greater emphasis on counterterrorism.</span><sup data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">33</span></sup><span data-dcnode-id="1206" instrument_node=""> The United States largely tolerated the separation between NATO and US missions until the approach approved by President Barack Obama in 2009 enabled General Stanley McChrystal to enforce a degree of&nbsp;previously unseen integration. This change was due in no small measure to McChrystal’s credibility within the US special operations community as well as his understanding of the NATO mission and counterinsurgency approach.</span><sup data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">34</span></sup><span data-dcnode-id="1203" instrument_node=""> But however commendable this integration was, one of the leading methods for achieving it was through dual-hatting.</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1201" instrument_node="">The Alliance’s organization and chain of command outside the theater further frustrated NATO’s efforts in Afghanistan.</span><sup data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">35</span></sup><span data-dcnode-id="1198" instrument_node=""> Formally, the chain of command ran from the commander of the ISAF through the Netherlands headquarters of NATO Allied Joint Force Command Brunssum (JFCBS) and then to SHAPE and SACEUR. Yet the commander of JFCBS had little practical authority and headquarters was not resourced to provide much support to the Afghan theater. By subordinating ISAF to an operational-level JFC headquarters, the NATO chain of command implied ISAF was tactical, a classification that made little sense even before the creation of the ISAF Joint Command in 2009 expressly facilitated the higher ISAF Headquarters’ focus on operational and strategic matters.</span><sup data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">36</span></sup><span data-dcnode-id="1195" instrument_node=""> Moreover, four-star US commanders in Afghanistan reported in their national capacity to the commander US Central Command, who could provide significant enabling resources and was a peer to the US European Command commander, the SACEUR. Bypassing JFCBS in the NATO chain of command may have seemed sensible or appropriate from a nationally oriented resource and protocol point of view, but the practice reflected negatively on the NATO command structure.</span><sup data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">37</span></sup></p><p data-dcnode-id="1188"><span data-dcnode-id="1191" instrument_node="">One non-US member of the NATO military structure who had a prominent supporting role for the Afghanistan mission was the Deputy Supreme Allied Commander (DSACEUR), customarily a British officer. The principal role for DSACEUR involved force generation, and specifically management of the CJSOR process, which to some extent, reflected the importance of the process to NATO’s overall contribution to strategy in Afghanistan being procedural rather than substantive. But this trend may have created unintended consequences for the future capability or readiness of the DSACEUR office actually to command, as envisaged for example in the case of a European Union mission using NATO resources as agreed under the Berlin Plus agreement or successor arrangements.</span><sup data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">38</span></sup></p><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Another component of NATO organization relevant to Afghanistan concerned training, doctrine, and lessons learned. Allied Command Transformation (ACT) plays a large role in the NATO exercise program&nbsp;and maintains training institutions such as the Joint Warfare Centre in Stavanger, Norway, and the Joint Force Training Centre in Bydgoszcz, Poland. In theory, these resources can and do prepare allied forces. In practice, training is predominantly a national responsibility, and national commitment to NATO standards is often a more important factor in determining the readiness and interoperability of forces.</span></p><p data-dcnode-id="1179"><span data-dcnode-id="1185" instrument_node="">NATO established a Joint Analysis and Lessons Learned Centre (JALLC) in Monsanto, Portugal, under the auspices of ACT in 2002. Originally intended to assess NATO exercises, the JALLC adapted to take stock of real operational lessons learned from Afghanistan and other places. But, as with training, the real impact of the lessons depends largely on national priorities.</span><sup data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">39</span></sup><span data-dcnode-id="1182" instrument_node=""> Finally, formal changes to NATO doctrine and standards is often slow. The first edition of its doctrine for counterinsurgency, for example, Allied Joint Publication (AJP) 3.4.4, was not published until 2011, years after NATO had adopted such an approach in Afghanistan.</span><sup data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">40</span></sup></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">A final critique of NATO composition concerns the complexity of relationships with non-NATO organizations in Afghanistan. In the efforts to develop the Afghan government and its security forces, for example, allied and coalition organizations included the ISAF mission broadly, the NATO Training Mission–Afghanistan, the US-led Combined Security Transition Command–Afghanistan, the provincial reconstruction teams, and bespoke organizations such as the anticorruption Combined Joint Interagency Task Force Shafafiyat. Coordination with other nonNATO actors in the environment such as the UN Assistance Mission in Afghanistan, nongovernmental organizations, third countries (such as Iran, Pakistan, India, China, and Russia), and above all, the Afghan government compounded the complexity.</span></p><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">The current NATO Resolute Support Mission focus on “train, advise, assist” is less ambitious and less complex, but also more reliant on the actions of non-NATO entities to achieve its goals. NATO acknowledged as much by greatly increasing its emphasis on external partnerships in its 2010 Strategic Concept, which was promulgated concurrent to that year’s Lisbon Summit decision to terminate the ISAF combat mission by 2014. NATO reaffirmed this emphasis through the establishment of the aforementioned office of the NATO Senior Civilian Representative and by the unprecedented step of inviting the governments of Afghanistan and ISAF countries to participate in its 2012 summit deliberations and declarations on Afghanistan in Chicago.</span></p><p data-dcnode-id="1172"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Field Support Services </span></strong></p><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Some of the most significant developments of NATO’s involvement in the Afghanistan conflict have been in the lesser-known areas of support and sustainment services. Logistics may be the most notable of these developments, particularly given the challenges of Afghanistan’s rough and landlocked topography and the remoteness of central Asia from NATO’s traditional geographic area. According to the principle of “costs lie where they fall,” transportation and sustainment in NATO is a national responsibility. But few NATO nations possessed the capability to transport their forces to Afghanistan and to supply them once there. Yet NATO troops in Afghanistan have rarely suffered for want of fuel, ammunition, spare parts, food, water, or other supplies in Afghanistan. Successful diplomacy deserves credit for keeping supply lines open through neighboring countries that have not always had smooth relations with NATO and the mission in Afghanistan, including Pakistan and Russia. NATO’s role in the allocation of common logistic services in Afghanistan is one of the clearest examples of how the Alliance can facilitate multinational cooperation.</span></p><p data-dcnode-id="1166"><span data-dcnode-id="1169" instrument_node="">Particularly for countries with a light footprint in Afghanistan, the burden of establishing independent supply chains for a small national contingent may be prohibitive. But the ability to access a common logistics system relieves those concerns by lowering costs and increasing the potential for broad international participation. Benefits existed for larger countries as well. American and British logistics systems at the beginning of the conflict were, for example, initially incompatible with NATO systems but later reconciled.</span><sup data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">41</span></sup></p><p data-dcnode-id="1159"><span data-dcnode-id="1165" instrument_node="">In 2009, the United States decided to rely on a NATO platform for fuel acquisition and distribution in Afghanistan, expanding access from large installations to forward operating bases. This measure increased both the amount of fuel delivered and the flexible capacity to sustain other allies and partners in those locations.</span><sup data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">42</span></sup><span data-dcnode-id="1162" instrument_node=""> The key NATO institution for organizing many of these logistic services is the NATO Support and Procurement Agency, which had its origins in Cold War era supply organizations but was reorganized in 2010 with a clearer focus on support to operations like Afghanistan. Notwithstanding the direct success of these efforts to keep NATO forces supplied, negative consequences included the distorting effect of foreign money and goods&nbsp;on the Afghan economy and the attendant potential for crime and corruption—a problem hardly unique to NATO.</span><sup data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">43</span></sup></p><p data-dcnode-id="1155"><span data-dcnode-id="1158" instrument_node="">Intelligence is another example of the potential for NATO to offer a process for multinational cooperation that also depends on national participation. NATO offered a system and the standards for classifying intelligence at the institutional and ISAF mission levels as well as an architecture for sharing that intelligence. The mixed results of this effort in Afghanistan likely occurred because the quality of such allied intelligence depends largely on input from each nation. Countries were usually willing to share low-level information related to force protection, but tended to guard higher-level intelligence and information that might reveal capabilities, sources, or methods. This reluctance is inherent in multinational environments, and there are often trade-offs between the number of countries participating in a mission and the willingness of those countries to share intelligence with the entire group.</span><sup data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">44</span></sup></p><p data-dcnode-id="1151"><span data-dcnode-id="1154" instrument_node="">NATO and ISAF experimented with several different models for facilitating intelligence sharing given these constraints. Models that were more likely to result in sharing involved a NATO or ISAF hub with spokes to national intelligence cells that shared what they could. The more common model of intelligence organization was housing the institution’s intelligence function within a national structure. The latter model prevails at the highest echelons of the NATO mission in Afghanistan, where the NATO intelligence staff is dual-hatted with that of US Forces-Afghanistan.</span><sup data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">45</span></sup></p><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Another lesson from Afghanistan involved communications, which further exemplifies some of the challenges identified above, including unity of command and intelligence sharing. Throughout the conflict in Afghanistan, headquarters personnel often monitored more than four communications and information technology systems representing various coalition groupings, classifications, and technical capabilities. This fragmented information environment was inefficient and taxed users, even though it created a redundancy that guaranteed a working communications channel. Early in the coalition expansion effort, NATO realized a single, secure network for missions would be necessary for NATO and non-NATO partners. Fielding of the network demonstrated NATO’s capability as a process facilitator.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Best practices from NATO Europe, such as the creation of the Afghan Mission Network Operations Centre in Kabul, were implemented in theater. Countries or organizations that had built their own classified networks, such as the battlefield information collection and exploitation system [BICES], to NATO standards had interoperable field-ready systems, demonstrating the potential value of NATO standards and processes. But ISAF also relied on Afghanistan’s civilian wireless communications backbone. The relative luxury of confronting an adversary that was not a significant cyberthreat, however, limits the application of any technical lessons learned from Afghanistan to contexts involving advanced cyber and electronic warfare capabilities.</span></p><p data-dcnode-id="1144"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">NATO Is Not a Shooter </span></strong></p><p data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">NATO’s command of the International Security Assistance Force mission from 2003 to 2014 was the largest and longest running conflict the Alliance has faced in its 70-year history. That mission continues today under the more modest Resolute Support Mission to train, advise, and assist the Afghan government and security institutions. This article offers a preliminary Alliance-wide assessment of NATO institutions as well as some initial suppositions that may complement national initiatives to learn from Afghanistan as well as efforts addressing future NATO adaptation.</span><sup data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">46</span></sup><span data-dcnode-id="1140" instrument_node=""> In terms of strategy and organization, NATO’s contributions to the international effort in Afghanistan were procedural rather than substantive. Its structures and processes facilitated multinational cooperation. But national actions mattered most. Although NATO’s efforts did not entirely mitigate each nation’s shortcomings, they were effective.</span></p><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Perhaps the most significant example of NATO’s value is the fact that allies remained cohesive and committed in Afghanistan over such a long period, and in spite of so many political and strategic obstacles. On an implementation level, NATO’s involvement in Afghanistan both demonstrated and spurred further development of its field support services, especially logistics, which enabled many countries to participate and facilitated cost sharing. Furthermore, the mission in Afghanistan provided training and experience to the participating national militaries, promoted their interoperability, and led to the development of several NATO functions and common standards. The chief implications of these conclusions are that while national political leadership and strategy-making remain paramount in war, NATO remains a proven and effective instrument of organizing and implementing coordinated multinational efforts.</span></p><p data-dcnode-id="1132"><span data-dcnode-id="1136" instrument_node="">But will NATO ever attempt something like its Afghanistan mission again? The answer may be different for the territorial defense of a NATO&nbsp;member state than for an expeditionary operation. Today the Alliance is understandably focused on threats closer to home, and its attention to future challenges will be increasingly motivated by technological changes and looming shifts in the global balance of power, such as the rise of China.</span><sup data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">47</span></sup><span data-dcnode-id="1133" instrument_node=""> Variation in the capabilities and the investments of each nation’s defenses is a contention within the Alliance. Yet nearly every source consulted or interviewed for this article judged that only two entities in the world are capable of running a large-scale multinational military campaign: the United States and NATO. This reality and recent history strongly suggest NATO will at least be considered when its European or North American members seek to undertake military action.</span></p><p data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">The cases of Libya in the Arab Spring, the Global Coalition to Defeat ISIS, and even current attempts to provide maritime security in Strait of Hormuz demonstrate this lesson in different ways.48 Many of the basic questions for evaluating the appropriateness of NATO involvement are political: does a mission require the participation of non-NATO countries or entities? If so, do the benefits of NATO’s convening power and institutional capacities outweigh the costs of adapting NATO to something new? Does a consensus exist among allies to address the issue through NATO and to involve the necessary non-NATO partners?</span></p><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Such questions are reasonable and would need to be addressed and decided based upon the merits of future cases. In many situations, the best answer may be no. But reflexive complaints about NATO bureaucracy or process are less well-founded. Some kind of process or method will be needed for any multinational activity. If not NATO, then the United States and other countries would need to establish something that offers many of the same features. In the likelihood that such a coalition would be composed substantially of NATO member countries or global partners, those countries would benefit from the interoperability of NATO’s common standards. As the counter-ISIS campaign illustrates, even a well-developed multinational military coalition is unlikely to have the built-in political consultative mechanisms. And the often overlooked but essential logistics, communications, and field-support services that NATO developed and improved in Afghanistan facilitates countries’ participation and cost sharing.</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">So, if NATO did not exist or was not involved, the United States and other allies would need to create it or something like it to carry out the mission. This all argues powerfully for the value of NATO in Afghanistan as well as future conflicts.</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">------------------------</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">1 Seth A. Johnston, How NATO Adapts: Strategy and Organization in the Atlantic Alliance since 1950 (Baltimore: Johns Hopkins University Press, 2017), 1–15, 40–42.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">2 The September 12, 2001 decision was contingent on evidence that the attacks originated from a foreign source. When US officials confirmed this condition to the North Atlantic Council early in October 2001, invocation of Article 5 became official. “Statement by the North Atlantic Council,” Press Release (2001) 124, NATO, September 12, 2001; and George Robertson, “Statement by NATO Secretary General, Lord Robertson,” NATO, October 2, 2001.</span></p><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">3 R. Nicholas Burns, “NATO Has Adapted: An Alliance with a New Mission,” New York Times, May 24, 2003.</span></p><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">4 Afghanistan: Lessons Learned (conference, University of St. Andrews, Fife, Scotland, February 11–13, 2019).</span></p><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">5   For a recent official summary of NATO’s agenda on current challenges, see “Brussels Summit Declaration,” Press Release (2018) 074, NATO, July 11, 2018.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">6 Heidi Hardt, NATO’s Lessons in Crisis: Institutional Memory in International Organizations (New York: Oxford University Press, 2018); Jörg Noll and Sebastiaan Rietjens, “Learning the Hard Way: NATO’s Civil-Military Cooperation,” in Theorising NATO: New Perspectives on the Atlantic Alliance, ed. Mark Webber and Adrian Hyde-Price (New York: Routledge, 2016).</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">7   NATO’s integrated military command structure technically boasts two strategic commands of officially equivalent status: Allied Command Transformation, based in Norfolk, Virginia, and Allied Command Operations at SHAPE.</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">8 Alexander Mattelaer, “How Afghanistan Has Strengthened NATO,” Survival 53, no. 6 (December 2011–January 2012): 127–40; and senior NATO official 2, interview by the author, February 8, 2019.</span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">9 &nbsp;Donald Rumsfeld, “Text: Rumsfeld’s Pentagon News Conference,” Washington Post, October 18, 2001.</span></p><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">10 Afghanistan: Lessons Learned; Ryan C. Hendrickson, Diplomacy and War at NATO: The Secretary General and Military Action after the Cold War (Columbia: University of Missouri Press, 2006), 120; and Seth A. Johnston, No Longer Obsolete: How NATO Endures in the Twenty-First Century (West Point, NY: Modern War Institute, 2017), 14–17.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">11 Judy Dempsey, “France Bars Moves for Greater Alliance Role,” Financial Times, February 10, 2003.</span></p><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">12 &nbsp;Benjamin Schreer, “The Evolution of NATO’s Strategy in Afghanistan,” in Pursuing Strategy: NATO Operations from the Gulf War to Gaddafi, ed. Håkan Edström and Dennis Gyllensporre (Basingstoke, UK: Palgrave Macmillan, 2012), 144–45.</span></p><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">13   Theo Farrell and Sten Rynning, “NATO’s Transformation Gaps: Transatlantic Differences and the War in Afghanistan,” Journal of Strategic Studies 33, no. 5 (October 2010): 673–99; and Stephen M. Saideman and David P. Auerswald, “Comparing Caveats: Understanding the Sources of National Restrictions upon NATO’s Mission in Afghanistan,” International Studies Quarterly 56, no. 1 (March 2012): 67–84.</span></p><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">14  The confidential Comprehensive Strategic Political-Military Plan was announced publicly at the 2008 NATO Summit in Bucharest. “ISAF’s Strategic Vision,” Press Release (2008) 052, NATO, April 3, 2008.</span></p><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">15  Barack H. Obama, “Remarks by the President in Address to the Nation on the Way Forward in Afghanistan and Pakistan” (speech, United States Military Academy, West Point, NY, December 1, 2009).</span></p><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">16 Stanley McChrystal, Commander’s Initial Assessment (Kabul, Afghanistan: International Security Assistance Force, August 30, 2009).</span></p><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">17  Carl von Clausewitz, On War, trans. and ed. Michael Howard and Peter Paret (Princeton, NJ: Princeton University Press, 1976), 87.</span></p><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">18   Official 2, interview. As in Afghanistan, local actors in Kosovo have frustrated NATO efforts to achieve its strategic goals for lasting peace and stability. Kosovo’s assertion of national independence through its intention to create an army has enflamed relations with Serbia and occurred despite NATO’s protest, to cite a recent example.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">19 “NATO Defence Planning Process,” NATO, June 28, 2018; and NATO, Allied Joint Doctrine for the Planning of Operations, Allied joint publication (AJP)-5 (Brussels: NATO Standardization Agency, 2013).</span></p><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">20 &nbsp;John R. Deni, “Perfectly Flawed? The Evolution of NATO’s Force Generation Process,” in NATO’s Post-Cold War Politics: The Changing Provision of Security, ed. Sebastian Mayer, (Basingstoke: Palgrave Macmillan, 2014), 176–93.</span></p><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">21      Official 2, interview. For an archival list of contributing countries to the NATO mission see “Meetings of NATO Ministers of Defence: Resolute Support Mission (RSM): Key Facts and Figures Placemat,” NATO, June 25, 2019.</span></p><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">22 Douglas Lute and Nicholas Burns, NATO at Seventy: An Alliance in Crisis (Cambridge, MA: Belfer Center for Science and International Affairs, Harvard Kennedy School, 2019), 2.</span></p><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">23 &nbsp;NATO Military Committee meeting, Washington, DC, March 14, 2019.</span></p><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">24 Afghanistan: Lessons Learned.</span></p><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">25 &nbsp;Nicholas Burns et al., “NATO’s Leadership Crisis” (seminar, Harvard Kennedy School, Cambridge, MA, September 18, 2018).</span></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">26   Official 2, interview.</span></p><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">27   Official 1, interview by the author, May 22, 2019; and “Meeting of the Ministers of the Global Coalition to Defeat ISIS” (US Department of State, Washington, DC, February 6, 2019).</span></p><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">28 The inclusion of non-NATO contributing partners in political deliberations at NATO Headquarters was not immediate. Australia, one of the larger non-NATO participants in the Afghanistan mission, made a particular point of advocating for the opening these discussions to partner nations. The effect of this effort has been significant, as nonmember partners are now routinely included in relevant NATO deliberations and information on a range of allied initiatives. Afghanistan: Lessons Learned.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">29   Official 1, interview; and Saideman and Auerswald, “Comparing Caveats,” 67–84.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">30   Official 4, correspondence with the author, February 9, 2019.</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">31  &nbsp;Kenneth S. Wilsbach and David J. Lyle, “NATO Air Command-Afghanistan: The Continuing Evolution of Airpower Command and Control,” Air &amp; Space Power Journal 28, no. 1 (January– February 2014): 12.</span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">32 In the words of one (American) NATO commander, “The NATO country whose troops understand NATO the least is the United States.” This difference in familiarity with NATO practices is an understandable consequence of the global nature of US military commitments; US servicemembers are more likely to serve in Asia or other non-NATO environments. But insofar as the learning curve for NATO leadership was steep compared with other national roles, the incentives to “go with what you know” did not favor the prioritization of NATO responsibilities for US leaders dual-hatted in NATO positions. Official 3, interview by author, June 6, 2018.</span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">33 This distinction remains an issue in Afghanistan today as the NATO-led Resolute Support is a noncombat “train, advise, assist” mission while that of US Forces-Afghanistan has broader authorities. Many Resolute Support and US Forces-Afghanistan key leaders are dual-hatted.</span></p><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">34  &nbsp;Official 1, interview. This distinction between US and NATO mission roles has reemerged since the end of ISAF and launch of the expressly noncombat NATO Resolute Support Mission after 2014.</span></p><p data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">35   Sten Rynning, “ISAF and NATO: Campaign Innovation and Organizational Adaptation,” in Military Adaptation in Afghanistan ed. Theo Farrell, Frans Osinga, and James A. Russell (Stanford, CA: Stanford University Press, 2013).</span></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">36 &nbsp;Schreer, “Evolution of NATO’s Strategy,” in Edström and Gyllensporre, Pursuing Strategy, 140.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">37   Official 4, correspondence.</span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">38   “Washington Summit Communiqué,” Press Release NAC-S(99)64, NATO, April 24, 1999.</span></p><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">39 Tom Dyson, Organisational Learning and the Modern Army: A New Model for Lessons-Learned Processes (New York: Routledge, 2019); and Hardt, NATO’s Lessons in Crisis.</span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">40 NATO, Allied Joint Doctrine for Counterinsurgency (COIN), AJP-3.4.4 (Brussels: NATO Standardization Agency, February 4, 2011); and NATO, “Allied Joint Doctrine for CounterInsurgency (COIN),” NATO Standardization Agreement 2611 (Brussels: NATO Standardization Agency, February 4, 2011).</span></p><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">41 Heidi Reisinger, Not only “Containerspotting”—NATO’s Redeployment from Landlocked Afghanistan, NATO Defense College Research Paper No. 98 (Rome, Italy: NATO Defense College October 2013), 4.</span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">42 Logistics and fuel in particular offered ample opportunity for fraud and corruption in Afghanistan. Official 1, interview; and Michael J. Evans and Stephen W. Masternak, “The Silent Revolution within NATO Logistics: A Study in Afghanistan Fuel and Future Applications” (master’s thesis, US Naval Postgraduate School, December 2012), 120.</span></p><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">43 Furthermore, much of the NATO logistics work was contracted to private companies which were largely responsible for their own security. The profusion of armed private contractors was yet another challenge to unity of command and created at least the potential for violence or destabilizing effects that worked at cross purposes to NATO’s overarching campaign objectives. See Elke Krahmann, “NATO Contracting in Afghanistan: the Problem of Principal-Agent Networks,” International Affairs 92, no. 6 (2016): 1401–26.</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">44   James Igoe Walsh, The International Politics of Intelligence Sharing (New York: Columbia University Press, 2009); Helge Arnli, “Intelligence Sharing with Host Nations in Multinational Operations: Hurdles and Dilemmas in Afghanistan” (master’s thesis, Norwegian Defense Command and Staff College, Spring 2010); and James L. Mader, “Diplomat Soldiers: A Study of Military Counterintelligence Cooperation in NATO, 1951–1960” (dissertation, University of Utrecht, 2017).</span></p><p data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">45  &nbsp;Cleared US veterans of the Afghanistan campaign may recall the common but bizarre prevalence of “NATO” documents classified or processed on US systems labeled “Not Releasable to Foreign Nationals” (NOFORN).</span></p><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">46 For an up-to-date summary of challenges facing NATO, see Lute and Burns, NATO at Seventy. Significant for NATO not only because of the official end of the ISAF mission, 2014 also marked the rise of Islamic State terrorist attacks in Europe, Russia’s annexation of Crimea, and Russian aggression against Ukraine. These events refocused the attention of NATO allies on security threats closer to NATO’s traditional geographic area.</span></p><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">47 Lute and Burns, NATO at Seventy, 35–38.</span></p><p data-dcnode-id="1023"><span data-dcnode-id="1029" instrument_node="">48  “Statement by the NATO Spokesperson on the Seizure of Two Ships in the Strait of Hormuz,” NATO, July 20, 2019; Benjamin Mueller, “U.K. Joins U.S.-Led Effort to Protect Ships in Strait of Hormuz,” New York Times, August 5, 2019; and Jeffrey H. Michaels, “A Model Intervention? Reflections on NATO’s Libya ‘Success’,” in NATO Beyond 9/11: The Transformation of the Atlantic Alliance, ed. Ellen Hallams, Luca Ratti, and Ben Zyla (London: Palgrave Macmillan, 2013). See also, Johnston, How NATO Adapts, 148–51, 166.</span><span data-dcnode-id="1024" id="via-original-pub"><span data-dcnode-id="1028" instrument_node="">&nbsp; – Via </span><a data-dcnode-id="1026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ssi.armywarcollege.edu/pubs/Parameters/Issues/Autumn_2019/5_Johnston.pdf" rel="external" target="_blank"><span data-dcnode-id="1027" instrument_node="">the original publication source</span></a><span data-dcnode-id="1025" instrument_node="">.</span></span></p></div><span data-dcnode-id="1021" instrument_node="">
