</span><p data-dcnode-id="1135"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">ADRIAN WOOLDRIDGE, THE ECONOMIST:</span></strong><span data-dcnode-id="1136" instrument_node=""> There is a danger in being too parochial about this, and I think if you look at America versus Europe, it is quite evident that there is a culture war and that it is an incredibly powerful and important thing. I wonder if you can address the issue of why America is so exceptional, so different from Europe when it comes to abortion, the death penalty and the world of religion. And also if the real question is not whether the culture war is dying down in the United States, but whether we are going to see the culture war exported to Europe, whether we are going to actually see European politics going in the same direction, particularly over the Muslim question.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1130"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1131" instrument_node=""> Europe is bitterly divided over issues involving head scarves, issues involving religion – those are essential to Europe. And it seems to me to bear a striking resemblance to the kinds of things that we struggle with. If anything, I think we do a better job than the Europeans have done on many of these issues because of our different kinds of traditions, because of the separation of church and state. We don’t have the question that you would have in Europe where there is a state church with its ability to lavish funds on one particular religion, which has consequences for others. It almost automatically makes them second-class citizens in a way that doesn’t arise when you have separation of church and state. So I see Europe struggling with many, many similar kinds of issues.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1125"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">MR. WOOLDRIDGE:</span></strong><span data-dcnode-id="1126" instrument_node=""> What I am saying is exactly that. They are moving into a position where we’re beginning to see the igniting of the culture wars in Europe.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1120"><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1121" instrument_node=""> I think you’re right. It’s over different kinds of issues, but religion and politics is now on the agenda of every society; they are struggling with where you draw the lines between one and the other, what it means to have religious minorities and so on. We all have these things in common.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1115"><strong data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1116" instrument_node=""> It is commonly observed in the social sciences that the amount of law in a society is inversely related to the amount of common culture that exists. The more litigation, the more law, the less of a common culture that you have, shared understanding, the habits of the heart, and so on. And my sense is that – and again, this sounds grandiose – but it seems to me that if one can speak of a master narrative, certainly in the Western world, it is one of fragmentation. And that fragmentation oftentimes – not always, but oftentimes – manifests itself in polarization. And I think that that fragmentation is certainly something we are seeing in Europe and the attempt to define Europe, but that will play out as polarization as well.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1110"><strong data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">LISA ANDERSON, CHICAGO TRIBUNE:</span></strong><span data-dcnode-id="1111" instrument_node=""> I believe the creationist problem has recently surfaced in England as well. Answers in Genesis just had their first international conference in England. And I think the Royal Society made a statement two weeks ago about creationism.</span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1105"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">MR. WOOLDRIDGE:</span></strong><span data-dcnode-id="1106" instrument_node=""> What you’re seeing in England is not just the growth of an immigration-based Muslim argument; there is also an immigration-based Christian argument – large, large numbers of Christians coming from the southern world and very much more traditionalist than just on the issue of creationism.</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1100"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">MS. ANDERSON:</span></strong><span data-dcnode-id="1101" instrument_node=""> Professor Wolfe, I wanted to ask you a little bit about the idea that Protestants are the religious right, and if they would rethink their close identity with politics after having spent over 40 years developing a fabulous organization to move things along in the direction they want. Why do you think they might suddenly feel sullied by this association to the point that they would want to back away from what they have achieved?</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1095"><strong data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1096" instrument_node=""> Because I think that if religion is really central to your life, at some point there is going to be a call that is going to tell you that you have been going down the wrong road. And I think that some of the most prominent evangelicals in America have begun to hear that call. I have gotten to know Rick Warren pretty well over the last few years. I am absolutely and thoroughly persuaded that he has genuinely been called to serve the cause of poverty and AIDS and the devastation of AIDS in Africa – that it is what he thinks he should be doing as a Christian. Fighting for domestic politics, against issues like gay marriage, is not what he thinks he should be doing as a Christian. And it seems to me to be as simple as that.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">We are talking about people who are motivated by their love of God and by what they believe Jesus tells them they ought to do.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1087"><strong data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">MS. ANDERSON:</span></strong><span data-dcnode-id="1088" instrument_node=""> But what about the people who are motivated by the very seductive allure of political power?</span></p><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1082"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1083" instrument_node=""> There certainly are people holding positions of religious authority in the United States who are. In my view, another person that I would see as a political as well as a religious figure is Richard Land of the Southern Baptist Convention. The world isn’t going too well for him right now. His president is doing pretty badly. Whether there is a sense that he bet on the wrong horse – whether all this will cause him to have second thoughts – I don’t know; it is possible. But I’m speaking more about the first kind. I am thinking more about the people in the National Association of Evangelicals like Richard Cizik whose call to save the earth is, again, I think genuinely inspired by religion.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">But I think the point you raised about the younger generation is crucial here. I think there is a danger of losing the younger generation. We have already talked about E.J.’s book </span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Why Americans Hate Politics</span></em><span data-dcnode-id="1077" instrument_node="">. They love God but they hate politics. And it has always struck me as funny that if you love one and hate the other you would see them working along similar paths. And I sense among younger evangelicals a sense that that is not what it is all about.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">And then finally you have this fascinating phenomenon in the evangelical world of being born again. It is a transformative experience. What makes someone an evangelical is that they went through a life-changing experience, they rejected what their parents had taught them, they looked inside themselves, they struggled for a more authentic, more moving and powerful faith. And if one generation does that, what is the next generation going to do when they come along? The whole churning and process of evangelicalism is like that; it is very unstable.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1065"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1069" instrument_node=""> Just a historical footnote. First of all, I think both things are going to happen simultaneously, but I think the disaffection from politics will also be animated by historical reasons. The trajectory of evangelicals in America for the last 150 years has been a movement from the center to the periphery, from the center of reality, defining institutions and education and so on, to the periphery. And I think so much of the religious politics of the 20th century, from </span><em data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Scopes</span></em><span data-dcnode-id="1066" instrument_node=""> all the way to the present, has been an attempt to find someplace within the center, or to defend its place within the center.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">I promised myself I would not use the word “hegemony,” but nevertheless – Catholics, of course, came to the United States as strangers, but evangelicals felt that this was their baby from the beginning. My sense is that particularly on issues of the family, the younger generation is feeling so marginalized and that politics has been such a failure to achieve their aims, that they will be disaffected from politics altogether. But, again, it’s part of this historical movement that we have been seeing now for 150 years.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1057"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">ROD DREHER, DALLAS MORNING NEWS:</span></strong><span data-dcnode-id="1058" instrument_node=""> On the question of fragmentation, the philosopher Alasdair MacIntyre observed that you can only have true community built around a shared moral sense. The culture wars are about authority and where it is properly located. If we keep going down this path of culture war, given the radical individualism that characterizes American society, I don’t really see how we can avoid this. How do you see the question of authority playing out politically? What interests me is MacIntyre’s point that Americans, absent a commonly held moral sense, increasingly feel less loyal to their country, but merely obedient to their government as a procedural democratic entity. Is that a valid concern?</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1053" instrument_node=""> Why don’t we think about that question while we get a couple more questions in. I am just trying to gather up some together, because we have got such a long list. Carl Cannon is next.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">CARL CANNON, NATIONAL JOURNAL:</span></strong><span data-dcnode-id="1048" instrument_node=""> I have one comment and one question, both directed towards Alan. The first thing is, in your response to Lisa Anderson’s question, you cited Rick Warren on why evangelicals might rethink being so closely identified with Republicans. Rick Warren was here last year, and he was asked how many people in his church voted for Kerry. And he doesn’t even talk politics but he guessed about 15 percent. Well, he didn’t sound unhappy about it.</span></p><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1042"><strong data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1043" instrument_node=""> He is a Republican.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1034"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">MR. CANNON:</span></strong><span data-dcnode-id="1038" instrument_node=""> But you cited his push to fight AIDS in Africa and world poverty. Well, from his standpoint he has got a Republican president to do those things. With input from another guest we had at this conference, Mike Gerson, Bush tripled the budget for AIDS in Africa from what it was under a Democratic president. I don’t think the evangelicals think that they are compromising themselves; rather, they are moving the Republican Party in a particular direction even as they are changing direction. That was the comment I wanted to make.</span><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1035" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-cannon.jpg&amp;raw" width="250"></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The question I wanted to ask you is this: I share your optimism, I want to believe what you say. But I want you to respond to this: You said that the good news is – I am paraphrasing – that politics can regain some of its equilibrium – that was the word you used – and you seemed to cite two reasons. The first one is that politics itself is now returning to some of the most divisive and polarizing debates it’s ever had, like during the Vietnam era, and that this is a good thing because I guess it will get out of the churches and back into politics, to the point where John McCain, a war hero, can go to a school, a college in New York, and be called a war criminal to his face. Now, we are going back to that in politics. That is the first thing.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">And the second reason you cited was that we are also going to return to the worst sectarian feelings we have ever had in this country. What is reassuring about that? (Laughter.)</span></p><span data-dcnode-id="1027" instrument_node="">
</span><p data-dcnode-id="1023"><strong data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1024" instrument_node=""> I didn’t say anything reassuring. I thought I said pretty explicitly that I wasn’t taking a position on whether it’s better to have intra-religious conflict or inter-religious conflict. That wasn’t my point. By the way, it was Bob Kerrey who was called the war criminal. I used to work at that school; that is one reason why I don’t anymore.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Returning to Rick Warren, his feelings on gay marriage are pretty much the same as most evangelicals. His position on the culture war issues is a very conservative one. He doesn’t tell me how he votes, but I have no doubt about how he votes, and I’m sure his estimate on the number of people in his church who voted for Kerry is correct. He is consciously and deliberately being the anti-Falwell and anti-Robertson. He knows full well that there is no future in American politics for that kind of public face of his religious tradition, and that is the point I was trying to make.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1018" instrument_node="">By the way, I had a small group of my students this semester read your book, Rod [</span><em data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Crunchy Cons: How Birkenstocked Burkeans, Gun-Loving Organic Gardeners, Evangelical Free-Range Farmers, Hip Homeschooling Mamas, Right-Wing Nature Lovers, and Their Diverse Tribe of Countercultural Conservatives Plan to Save America (or At Least the Republican Party)</span></em><span data-dcnode-id="1015" instrument_node="">], and talk about it with the class. So I feel like I’m expert on Crunchy Cons. We also read Alasdair MacIntyre’s book, </span><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">After Virtue</span></em><span data-dcnode-id="1012" instrument_node="">. It’s almost like an epic poem. It’s brilliantly written. It’s an extraordinarily wonderful book to use when you teach, but it almost has no grain of truth in it as far as the actual world that I live in is concerned.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">So I think the question of whether or not we can live together without a common morality is an empirical question and not a philosophical question. I think we pretty much do. If you believe, as our founders and as George Washington put it in his farewell address, that you need to have a common religion to have a common reality, we have not had a common religion for a very long time, but I think we have a moral consensus in this country. Until recently it has held together pretty well. So I just find MacIntyre’s views on these things overly dramatic and I think he needs a good sociologist.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1003"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1004" instrument_node=""> I think that the question is empirical as well. Can an Enlightenment-era institution, namely modern American democracy, survive in an increasingly post-Enlightenment culture? The fact is, we don’t know. We will find out, however. As to predictions, I’m a little less sanguine. It’s not because you have to have a common religion or anything like that. At the same time, you have to have something normative that holds it all together. Again, my sense of the center right now is that it is incoherent and that it isn’t vibrant. Moreover there are all sorts of other things going on in the center of culture that are deeply problematic for what center we would hope could emerge, including the commodification of everything, the politicization of everything, and so on.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">So at the end of the day, in my most pessimistic moments I would say – and I’m a very hopeful person – but in my most pessimistic moments, I sense that authority is devolving into power. And I see that, again, with the increase in law. It’s a straightforward measure; law is the language of the state, and the state is many things. But at the end of the day, the state is about coercion; legitimate coercion. And that’s why it seems to me that opponents in the culture war appeal to law so quickly: because what they’re doing is appealing to the patronage of the state, and when you have the patronage of the state, it means that you don’t need a moral consensus; you force it.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="995"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="996" instrument_node=""> A question that recently came up among three or four of us, Alan, is this: There seems to be sometimes a tendency to use the word “theocratic” or “theocracy,” for instance, when sincere believers – in this case evangelicals or conservative Protestants – get involved in politics and want to bring their principles or concerns into the public arena and apply them to, say, same-sex marriage or abortion or any number of issues. This is called a theocratic takeover. You don’t believe that, do you?</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="990"><strong data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="991" instrument_node=""> No, not at all.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="986" instrument_node=""> Because you used the words “theocracy” and “theocratic” a couple times in your presentation, but I don’t think you agree with Kevin Phillips on that.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="980"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="981" instrument_node=""> Oh, no. Based on what I’ve read about Kevin Phillips’ book, rather than the book itself, because I haven’t read it, Phillips’ idea does seem to me to be wrong and unfair. I’m a strong supporter of the First Amendment and of freedom to petition, freedom to assemble, religious liberty and so on. There is a tendency that I was talking about when I used the term theocratic to explicitly rely on governments to promote a religious position, which is a totally different kind of phenomenon, it seems to me, than all the questions you’re raising about the rights of all religious believers to petition the government to allow their organization the freedom of association to join together.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="975"><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="976" instrument_node=""> But to work together for concerns about bioethical questions, for instance –</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="970"><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="971" instrument_node=""> Oh, absolutely. You know, I think of myself as a classical philosophical liberal, and such a liberal position seems to me on the one hand to be strongly supportive of all those rights of individuals and at the same time to worry about an explicit connection between religion and politics.</span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="965"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">BILL GALSTON, UNIVERSITY OF MARYLAND:</span></strong><span data-dcnode-id="966" instrument_node=""> I’m going to begin with a brief academic observation that you may choose to respond to or not, and then segue to a political question. The academic observation is this: I found at the theoretical level something deeply paradoxical about both arguments. Paradox one, James, if we take your point seriously that culture is a battle to define reality, right, that culture in this fundamental sense is inevitably a zone of contestation, then when you use the word “culture,” isn’t it tautologically the case that you’re talking about a culture war? So, you know, that wouldn’t be news exactly. (Laughter.) Which is not to say it is wrong, but it’s simply to say it would be part of the human condition and not a change in that condition.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="960"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="961" instrument_node=""> That’s right. Which is why I’ve said where there’s culture there is struggle.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="955"><strong data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">MR. GALSTON:</span></strong><span data-dcnode-id="956" instrument_node=""> Right, exactly. So culture equals culture war. It’s true by definition.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="950"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="951" instrument_node=""> Or struggle anyway.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="945"><strong data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">MR. GALSTON:</span></strong><span data-dcnode-id="946" instrument_node=""> Alan, here’s what I found paradoxical about your position. You said something with which I sort of agree intuitively; namely, that the idea simply of culture driving politics – culture as this sort of quasi-Marxist structure, that politics is epiphenomenal – is just not adequate to the phenomena. I agree with you about that. But then as you went on you segued into a discussion which used phrases like “enduring Catholic sensibility,” which struck me as a kind of culturalist argument. And if that’s the case, then maybe there is something to the notion that these cultural, symbolic and belief systems underneath politics are in some sense more important than the political contestation. So that’s paradox number two.</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Here’s my question, and this is really addressed to both of you. “The vital center” wasn’t simply a slogan that Arthur Schlesinger invented. It pointed to a reality, a reality of a specific point in American history where, despite deep religious differences on the one hand and political squabbles on the other hand, there was a rough-and-ready agreement among elites about the way the world worked. Call it a public philosophy if you want. You know, the Republicans accepted the New Deal; that was Eisenhower. A few years later they accepted Keynesian economics, and so economics became a technical question, not an ideological question. There was a foreign policy consensus, you know, until it was shattered by Vietnam. And there was an elite agreement to keep the divisive cultural issues off the public agenda. And so this entire stratum of contestation that we’ve now become awfully familiar with was simply not part of American politics when I was growing up. It doesn’t mean the differences didn’t exist, but they weren’t overtly political.</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">So it’s against that backdrop, it seems to me, that we think about the question of where we stand now. It’s a comparative judgment. And I have to say I think something fairly basic has changed since then. But it’s not so much at the level of culture as it is at the level of, you know, the collapse of a shared understanding between the political parties and among elites about the way the world works. And you can see this writ large, it seems to me, in the extraordinary conceptual divisions that have arisen between the parties over the Iraq war.</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="934"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="935" instrument_node=""> If I may, Bill, to me this is – and you won’t be surprised to hear this – this is just a much more profitable way of talking about divisions in American society than what we are calling culture war talk, because I think you’re right; we’ve been through a period that’s very different. And I think you’re absolutely right that the reason why it’s different – and I tried to say this earlier in my response to a question from Amy – is that this notion of having some kind of disinterested elite that can keep really divisive issues off the table is what’s happened over the course of the last 30 or 40 years. That elite no longer exists and can no longer do that, and we’re paying the price.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">So the only thing I would add – and this is really somewhat of an autobiographical reflection for me; I don’t know if it is for you as well – but it was the “new left” and the ’60s and the counterculture that was the first to really question whether such an elite was desirable, and that played a major role, I think, in slaying it. By itself that probably wouldn’t have had such a devastating effect on our politics if it weren’t for the fact that the “new right” came along and actually was much more successful in many ways in undermining that ideal. But that’s what I think we’ve witnessed in this historical period.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">There’s a quite extraordinary book that I would recommend to anyone who hasn’t read it, by someone named Geoffrey Kabaservice, about Kingman Brewster and his presidency at Yale. It’s really a book about the decline of the elite in the United States, about the decline of these kinds of patrician New England bipartisan-type figures and the way they saw their institutions as playing a leadership role in American society. And, you know, the demonstrations against Kingman Brewster, of which my friends were so much a part on the New Haven Common and so on, really did play a role in undermining that.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">But it was a dual insurgency, and we’re still living with the consequences of this dual insurgency. And so that’s what I think has happened.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="920"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="921" instrument_node=""> What’s the name of that book again?</span></p><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="915"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="916" instrument_node=""> I can’t remember the name. Geoffrey Kabaservice is the guy’s name. It was really quite an impressive book about the John Lindsays, the Nelson Rockefellers, that whole class of people.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="907"><strong data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">JOHN DICKERSON, SLATE:</span></strong><span data-dcnode-id="911" instrument_node=""> It’s called </span><em data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">The Guardians</span></em><span data-dcnode-id="908" instrument_node="">.</span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="902"><strong data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="903" instrument_node=""> Just very quickly on the paradox. You’re absolutely right, Bill, and in my presentation I sort of stated it that way. The question is, how does that struggle manifest itself? How do the institutions that produce culture mobilize resources? A lot of time, to the extent that there is cultural struggle or tension, it manifests itself at a very, very low level of intensity. And so what I’ve called the culture war I believe has roots at the deepest level of culture in terms of, again, the social imaginaries based upon different conceptions of moral authority and so on. You can trace this back a couple of hundred years. But it has manifested itself in the last 30 or so years through the configuration of different institutions, the emergence of new institutions, and that’s something that was new and it was rooted in what I believe is a fundamental realignment in public culture.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">But I think, as to the “vital center,” the agreements that you talked about among those elites were not just political agreements; they were shared sensibilities as well. We can talk about it as a kind of WASP sensibility, but that WASP sensibility – which is, again, not just political but cultural – disintegrated, which in a way created the context where this new set of positioning could take place.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">I think what has also changed is not just the disappearance of these disinterested elites, but I think the elites themselves have changed. There are different kinds of actors on the stage, and that makes a difference too.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="891"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">BILL ADAIR, ST. PETERSBURG TIMES:</span></strong><span data-dcnode-id="892" instrument_node=""> I wanted to see if you could speak a little bit about your interpretation of the public’s reaction to Terry Schiavo. Alan, I wanted to challenge your comment that it was a major war that didn’t happen, that the public was just totally indifferent, because it seemed to me that the public was not indifferent, that it paid attention and that the middle said, You know, this is just not something the government should be doing. And it gets back to your other comments that I agree with that the public is conflicted and sometimes incoherent but that this was a case where the middle said, We’re siding on this side of this one.</span></p><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="886"><strong data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="887" instrument_node=""> You’re right; I stand corrected.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="881"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="882" instrument_node=""> Wait, hold it. That’s a historical moment. In the history of these seminars, no one has ever done that. You’re to be commended, Alan. (Laughter.) Those of us who have been to all of these might even start applauding. One of the best answers I’ve ever heard.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Okay, James.</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="873"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="874" instrument_node=""> Just briefly, I think that the cultural differences are still there and I think those cultural differences are reflected in the attitudes and opinions of ordinary Americans in the ways that we can talk about in survey research. They’re distributed unevenly in the ways that I mentioned. One of the things that was interesting about the Terry Schiavo case was that Republicans have been very, very effective at instrumentalizing these cultural issues for political gain, and they tried to do it there and totally failed. That doesn’t mean that those cultural differences weren’t still there and couldn’t be mobilized in some way, but the Republican attempt to mobilize, to generate anger and fear, simply failed.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">MICHAEL LUO, THE NEW YORK TIMES:</span></strong><span data-dcnode-id="869" instrument_node=""> I guess I just feel a lot of resonance with both of what you guys have said and I’ve read your books and I think my opinion is whichever one I’ve read last is the one I agree with. (Laughter)</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="866" instrument_node="">On the one hand, working at </span><em data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The New York Times</span></em><span data-dcnode-id="863" instrument_node=""> and covering religion, I’ve definitely sensed that there is a culture war. (Laughter.) You know, the survey data that we went through yesterday seemed to articulate this, especially with the Pew data that got more precise in terms of getting beyond labels and getting into church attendance, and it seemed to be so compelling. But then on the other hand, I’ve read the other data and I’ve read Alan’s book and Morris Fiorina’s book, and that’s really compelling to me too, that we have remarkable commonality, that there is this center.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">And I guess I just wanted to hear each of you respond to the survey data challenge. So, Alan, how do you respond to the very real sort of linear relationship there seems to be with church attendance and how things line up? And, James, how do you respond to the survey data that show that there is a lot of commonality? And maybe it’s owing to the fact that no one has risen to the moment or articulated the center and led the center, and just because there has been no one who exists doesn’t mean it’s not possible.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="855" instrument_node=""> I have to accept the church attending findings; religion really has become a predictor of how people vote in a way that social class may have been in the past. So it’s a very real phenomenon. And, you know, to some degree it does seem to challenge some of the things I write about, but I’ve never said that we shouldn’t have Republicans and Democrats, that they shouldn’t disagree with each other, that people shouldn’t be attached to one political party or the other and that’s the essence of democracy. The question is, is the term “culture war,” or the way the culture war argument has been used, which suggests something far deeper than just the ordinary partisan conflict – is that justified?</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">We are seeing some real changes in American politics, and to some degree they are orthogonal to what I’ve been arguing. And the fact that the Republicans are lining up as a very conservative party, having gotten rid of many of their more liberal people, and that the Democrats jettisoned the conservative factor – I mean, we now really are witnessing the Europeanization of our political parties, standing for very different conceptions of the world. Party discipline and the way they vote in Congress is now British style in terms of one unified party after another, and they are divided over issues.</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">So there are factors that suggest much more intense partisanship in the country, much more intense political division in the country. “Culture war,” though, I think, is just not a helpful term when what we’re witnessing can be discussed in so many other terms.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="846" instrument_node="">Regarding your comment about </span><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">The New York Times</span></em><span data-dcnode-id="843" instrument_node="">, I have to add this as well: We’ve been exceptionally polite today. In </span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">One Nation After All</span></em><span data-dcnode-id="840" instrument_node=""> I say that it’s the elites that are fighting the culture war, and specifically included are newspapers, magazines and so on, and yet I’ll refrain today from saying anything about the role that reporters might play in the culture war. But let me just put it this way: I love reading your stuff and I’m so glad </span><em data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">The New York Times</span></em><span data-dcnode-id="837" instrument_node=""> is paying attention to this beat. How many – five or six full-time reporters are now writing about religion?</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">But as I said – E.J.’s heard this before – one of the real scandals in American journalism is the fact that when the evangelicals were developing their political views, this was almost completely ignored in the press. And by the way, also among political scientists. In my field we totally didn’t pay attention to this earth-shattering transformation in American society. Now I worry that we’re paying much too much attention to it, that </span><em data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">The New York Times</span></em><span data-dcnode-id="831" instrument_node=""> sees religion everywhere. It can’t run a story without bringing in the religious angle. So if it’s a shopping mall story, there’s religion in it.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Again, religion is a wonderful topic; that’s why I study it. And it poses all kinds of fascinating stories and dramatic incidents and so on. But we are divided over our religion, as Carl pointed out. You know, to say that we’re moving from fighting within to fighting between religions is anything but a hopeful story. It suggests where we have serious divisions. My only question is whether “culture war” and all the things that sort of go along with that best capture the conflict.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="822"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">MR. LUO:</span></strong><span data-dcnode-id="823" instrument_node=""> Let me just follow up on that, Alan, before James responds. I guess I’ve been looking for this centrist evangelical that John Green has articulated in his survey data. And I wrote a story recently about the documentation of evangelicalism and I asked John Green who might represent this country’s evangelical movement, and he said maybe Rick Warren or Leith Anderson in Minnesota. But then I hear – I think Adrian had raised this at one point to me, and you raised it too – that he is quite conservative. And maybe just because he speaks better or sounds better in terms of relating to the press and the public – I mean, maybe in the end their people aren’t going to really vote differently. And I just wonder, beyond someone like Rick Warren, what does a centrist have to look like? And maybe it’s not the leaders but maybe it’s some of the people that you met in your travels or –</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="818" instrument_node=""> By the way, Hannah Rosin’s writing a book on this right now, on a sort of kinder, softer evangelical.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="813" instrument_node=""> I just don’t think the term “centrist evangelical” makes sense because it implies a movement from one political view that is sharply conservative to another political view that is centrist. It’s much more likely to become non-political. When I talk about renormalizing, it’s back to a tradition where politics was just not compelling. I don’t necessarily think that what we’re going to witness, if we see a disaffection of evangelicals in the Republican Party, is necessarily a swing to the Democratic Party or even more selective voting, but non-voting.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="807"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="808" instrument_node=""> Just a couple of comments, first of all about the term “culture war.” I spent the first two years of graduate school wandering the corridors of phenomenology, for better or for worse, but one of the basic lessons of phenomenology is that you try to understand the intentionality of the social actor – of all your actors that you want to understand. And as I was doing the research for this book, again and again and again the actors were saying, “It feels like war. It feels like war.” And, you know, organizations like the National Organization for Women have their war room. So, is it a good metaphor? Is it a good term? That’s probably debatable; it’s more or less useful. But I think it was certainly an accurate term for describing the experience of many of the people who find themselves caught up in this or who are leading it.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Because this conflict is primarily cultural in the sense that I’ve described it, and not merely about attitudes – it’s a cultural conflict, not just an attitudinal conflict – it seems to me that the culture war is always there below the surface of public life. And there are events that act like triggers – the retirement of a Supreme Court justice, a controversial decision in Massachusetts or California or Texas, or, say, locally, a controversial curriculum – and these events act as triggers that bring that conflict up to the surface and politicize it in the ways that we’re most familiar with. And once it gets to the surface, I think it’s important to say that our public discourse is far more polarized than we as a people are, though I do think it is reflected in attitudes and opinions.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="802" instrument_node="">As to the vital center, I don’t know. To me polarization is not a bad thing in and of itself. To me it represents an opportunity within American democracy right now. In fact, I said this in the book, </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Culture Wars</span></em><span data-dcnode-id="799" instrument_node=""> – the middle has no special interest group, or very few. So, I don’t know where it’s going to come from, where you’re going to find it.</span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="793"><strong data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="794" instrument_node=""> Just a quick comment. Obviously you want a debate; I’ll try. (Laughter.) I don’t know; if the president says we’re in a war on terror, I don’t think it necessarily means we’re in a war on terror. And if people say they’re in a culture war, I don’t think it necessarily means that we’re in a culture war. Granted, earlier I talked about surveys, and Bill Galston will find another what he politely calls paradox but really means contradictions in what I said. (Laughter.)</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">“Cultural war” – there’s something narcissistic about the term. There’s something spoiled about the term. We’re a country that had a huge war called the Civil War – bloody, horrifying massacres – and other countries have had the same. I mean, “war” is just one of those terms that I think should be reserved for very, very extreme circumstances in which horrible things happen to people. And to use this term “cultural war” to describe what strikes me as still a country that’s relatively unified – in the world’s history of great democracies, we are one of the great, enduring, long-standing democracies – I just feel it is narcissistic.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="785"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="786" instrument_node=""> But the Civil War, when it finally broke out, was preceded by 30 years of a culture war on precisely the issue that the real war was fought over. And the Civil War wouldn’t have happened had it not been for the kinds of polarizations that had happened culturally, symbolically, 30 years prior. This is why real wars don’t always follow culture wars, but you never have a real war without a prior culture war.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">And it seems to me that the kinds of realignments in public culture, the kind of conflict, the way in which this is driven by the extremes – this is something that democracy, especially in the context of a post-Enlightenment world, needs to pay attention to.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">I believe that political institutions of American democracy have a lot of momentum behind them. They have a lot of strength. There is memory there. But one should never, ever take for granted their long-term vitality. They constantly need to be renewed and it seems to me this represents a fundamental challenge –</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="774"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">DELIA RIOS, NEWHOUSE NEWS SERVICE:</span></strong><span data-dcnode-id="775" instrument_node=""> Is there any single issue like slavery that is driving the current culture war?</span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="769"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="770" instrument_node=""> Well, I think culture wars become especially bloody over one issue in particular, and that is the issue of who is a member of the political community – who is a member of a common community and therefore worthy of its protections? You start excluding people and culture wars tend to become violent wars. And you see this, of course, in all sorts of cases historically.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="764"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">MS. RIOS:</span></strong><span data-dcnode-id="765" instrument_node=""> But that period leading up to the Civil War was dominated by slavery and there isn’t any parallel central issue.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="760" instrument_node=""> I think that the reason why the abortion issue has been the longest standing and the most contentious, and quite frankly the most violent part of the culture war, is for precisely that reason.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="754"><strong data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="755" instrument_node=""> I don’t want to get into that analogy between abortion and slavery. I don’t accept it at all, but I don’t want to get into the reason.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">I want to say one other thing, and this is meant to provoke debate. I don’t think the term “culture war” is a neutral term. I think there is a long-standing division philosophically between liberals and conservatives over the appropriate use of the word “war” to describe domestic politics. Liberals have traditionally viewed the purpose and function of politics to be to create true government, a way of calming passions domestically to enable some kind of neutral rules to work so that domestic passions never get out of control. Whereas, for much of conservative thought, especially in Europe and especially among a group of writers I could name, but the most prominent of whom is Carl Schmitt, all politics is war. And civil war is the inevitable condition of domestic politics.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">So to call something warlike in domestic politics is in a sense to take a conservative view of politics over a liberal view of politics. And I’m struck by the degree to which so many prominent conservatives that I know and respect are insistent that there is a culture war. I had a debate at Harvard this year with James Q. Wilson, who is, I think, one of the most thoughtful conservatives in America, and he was insistent that the culture war is real and going on, and what was really going on in the debate between him and me were two different conceptions of politics.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Now, sometimes war really does break out. Liberal institutions fail and politics really does become a Hobbesian struggle of all against all. But I think one way that you try to avoid that is by using careful terminology that doesn’t anticipate the very position you’re trying to analyze. And I worry that the term “culture war” leaps us to a conception of politics in which we’re at each other’s throats; that just the use of the term brings that situation one step closer, and I don’t want to do that.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="740"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="741" instrument_node=""> What would you have titled James’s book then?</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="735"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="736" instrument_node=""> Well, there’s “Kultur Kamph.” (Laughter.)</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="730"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="731" instrument_node=""> That would have been a big seller. Nina Easton, you’ve been very patient.</span></p><span data-dcnode-id="729" instrument_node="">
</span><p data-dcnode-id="725"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">NINA EASTON, THE BOSTON GLOBE:</span></strong><span data-dcnode-id="726" instrument_node=""> I’m going to use the words “cultural divide.”</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="720"><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="721" instrument_node=""> Oh, thank you.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="709"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">MS. EASTON:</span></strong><span data-dcnode-id="716" instrument_node=""> I want to respectfully agree and disagree with Professor Wolfe. You brought up the Southern Baptist Convention and its endorsement of </span><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Roe</span></em><span data-dcnode-id="713" instrument_node=""> in ’73. But to me, the Southern Baptist Convention is in fact a crucible of the culture divide, war, whatever you want to call it, because as you know, the conservative wing, led by Richard Land, took over. And I was at the Southern Baptist Convention last year; I saw no sign of anybody ready to lay down arms.</span><br data-dcnode-id="712"><span data-dcnode-id="711" instrument_node="">
</span><img alt="" class="alignleft" data-dcnode-id="710" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-easton.jpg&amp;raw" width="250"></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">What I did see was an increasing sense of sophistication, an increasing sense of public relations, which we saw pieces of with the Christian Coalition in the ’90s. But they dropped the boycott of Disney, which was clearly a PR move. There was talk about human rights abroad. On the issue of gays, it’s very interesting; they’re releasing these videos to churches to try to transform gays; that seemed to be the focus much more than legislation. But, again, there was no sense that they were going to lay down arms in the Washington culture wars.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">That said, this is not the growth sector. You know, the Southern Baptist Convention has peaked in terms of growth. And just going back to this point that we keep returning to about the Rick Warrens of the world, wasn’t Rick Warren’s book the largest non-fiction best seller of all time or something? You add that with the televangelists we see now and their style, which is very much non-political, it’s living the good life, it’s also a form of therapy. It’s very much a therapy-style religion. And these may be conservative folks but they are not overtly political, and I do think that changes the dynamic of the conservative Christian piece of the so-called culture divide/culture war. I wanted to see if there’s anything either one of you wanted to add to that.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="698"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="699" instrument_node=""> Well, just one thing about Rick’s book – he’s got a problem. As a Bible-reading Christian he has to believe the Bible is non-fiction. And his book hasn’t sold quite as many copies as that one. (Chuckles.)</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">No, you know, my sense is you’ve described a very complicated situation correctly. And so let me go on record as saying a nice thing about Richard Land, and that is that when the Bush-Cheney administration tried to use churches explicitly to contact registered Republican voters, Richard Land opposed that. That was really too close to something theocratic, I think, and he rightly and properly condemned it.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">But to me the story of what happened in the Southern Baptist Convention has been very well told in a number of books. And I see it as primarily a political movement, a movement that had strong support among the ordinary church-going Baptists. And one of the questions I’m always asking leaders of the Southern Baptist Convention when I talk with them is, to what degree in the pews, among ordinary churchgoers, is there a lingering historical memory of the long tradition of church-state separationism that marked this church? And the answer I often get is that most of the people in the pews weren’t born and raised Baptist.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">We haven’t talked about the tremendous amount of religious switching in America, which I think encourages the more therapeutic approach that you’re talking about, where people are constantly searching for something and not rooted in the particular historic traditions of their denominations.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="684"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="685" instrument_node=""> Look, in Protestantism as well as Catholicism, in the history of Christianity you find these periodic swings toward pietism and isolationism, and my sense is that we’re seeing that in the Neo-Anabaptist vision of Stanley Hauerwas and others, which is proving very attractive to many young evangelicals, and that’s the most sophisticated form of it. But it also plays out in Pentecostal parts of the movement, which are very oriented toward a kind of insularity within the community; very, very family oriented, highly therapeutic and psychologized in their ideology. So I think those are larger forces in the culture that are outside of politics and are pushing toward a kind of inward-looking set of practices and beliefs.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="679"><strong data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">JOHN SINIFF, USA TODAY:</span></strong><span data-dcnode-id="680" instrument_node=""> Mr. Hunter, I’d like you expand on a point that you made earlier. You said, “What conservatives have gained in politics they have lost in culture.” And you said that would catch up politically. So, one, I’d like you to expand on that and explain what you mean and what you see to indicate that; and two, is there a discernable historical cycle in this, or is this today’s phenomenon?</span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="674"><strong data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="675" instrument_node=""> Actually, Alan would be very good on this point as well because it’s a point he makes explicitly in his paper for this project. But we agree on it. Look, I think that evangelicals have been playing a defensive game in this conflict. And the strategy of their defense has been a political one. They say to themselves, If we can just get our person into the White House, if we can just get our people onto the Supreme Court, if we can just get our people in Congress and so on, we can halt this slippery slide into a kind of libertarian decadence.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">That’s a caricature, of course, but they are trying to hold back something that is taking place culturally, a certain vulgarization of popular entertainment and things like that, certainly a sense of disintegration of the family. They’re trying to halt those things politically, and they’ve become very expert at doing so. They’ve become extremely sophisticated in how to mobilize money, people and other resources to achieve those political ends.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">This comes back to the question of culture and politics and the priority of culture over politics, and I don’t want to separate those things too much, but it seems to me that the culture, especially among cultural elites, had come to a consensus about the legitimacy of homosexuality, of gay rights and of gay marriage, far earlier than any kind of legislation or court decision that would ratify that consensus.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">So it seems to me that politics is a short-term solution, and because it’s a short-term solution, it’s a failed solution. Nothing is challenging what I think is an emerging or already established consensus among cultural elites for the kinds of things that evangelicals and other religious conservatives really find worrisome. There is no de-census at that level.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="660"><strong data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="661" instrument_node=""> But, James, can I challenge you on that one point? “A short-term solution is a failed solution.” You wouldn’t say that, for instance, about any civil rights laws that were passed. Why would you want to say it about other laws? Is it an overstatement to say it’s a failed solution? You might want to say it’s a short-term solution to a larger problem.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="652"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="656" instrument_node=""> Again, I think, as Bill said yesterday, civil rights needs to be considered separately. But here’s where I would say that it supports my argument: I think that there’s an underlining narrative in our culture at the deepest levels about freedom. And it seems to me that in </span><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Brown v. the Board of Education</span></em><span data-dcnode-id="653" instrument_node="">, the court decision was ahead of the culture in many respects, certainly ahead of public opinion. But it was still part of a deeper narrative in our culture, a narrative about a long trajectory toward freedom. This is clearly one reason for the success of the gay rights movement. They have understood that there is this underlying narrative flow in American culture; there is a deep structure that they have tapped into very successfully. So when conservatives challenge gay rights, whatever rights they are, it sounds like they’re against freedom. And that’s a losing proposition.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="647"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="648" instrument_node=""> If I could just add, with respect to this question, that one of the things that has really fascinated me in the research I do among conservative Christians is why certain issues rise to the level of such importance and others don’t; why issues involving gay marriage, abortion and so on – in other words, issues involving the body – seem to be so prominent, whereas issues like torture and economic inequality don’t.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">And I’m persuaded from talking to lots of people that that’s not just cherry picking; that this is genuine. The feeling that gay marriage or abortion represents the true decline in the morality of the United States is as strong and sincere a feeling as one can have. I’ve heard people speak in the most moving language about how horribly difficult it is to raise children in this atmosphere, exposed to Hollywood and its totally pervasive, decadent sexuality. And I believe it’s real and genuine.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">The idea, however, that this is the fault of liberals is what is going to make that whole point of view increasingly problematic in the future. For a long time it was possible to blame it all on liberals – liberals on the Supreme Court, the lecherous president of the United States, and so on. But how much longer can you tie the genuine conviction that moral decadence and sexual decadence is so prevalent in our society to liberals when the government is conservative? At what point do you have to raise the issue if you are a conservative evangelical in Oklahoma that divorce rates in Oklahoma are so much higher than they are in Massachusetts, that broken families are so much higher in our world than they are actually in the world in which liberals live? You can’t say, if you’re a conservative, well, that’s just because people are richer in Massachusetts, because Charles Murray would never accept that explanation about people on welfare.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">You have to at some point say, do we have a problem? Is it our problem? Is there something wrong with the way we’re raising our children? Is there something wrong closer to home? I think that recognition is inevitable. And that’s what I mean by turning away from politics. I think it was a false avenue in some ways to think that we could solve this problem just by replacing one political party with another. After all, look who pays to the Republicans – Comcast – and it sponsors pornography and all kinds of morally dubious gambling industries and so on. It just seems to me it’s got to come home at some point.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="633"><strong data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">MR. DICKERSON:</span></strong><span data-dcnode-id="634" instrument_node=""> Two points; one’s an observation about Rick Warren, who seems to be – I don’t know – can he be the elephant in the room? Anyway, he’s in the room. It struck me that he may be flying under the radar but he’s just under it. He may not want to be full well Anne Robertson, but his being on the conference call that the RNC put together to build support for Harriet Miers was, I thought, extraordinary, and his comments on that conference call were used within that community in a failed effort.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="628"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="629" instrument_node=""> You’re talking about Jim Dobson now.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="620"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">MR. DICKERSON:</span></strong><span data-dcnode-id="624" instrument_node=""> No, no. Rick Warren was on the conference call about Harriet Miers. Now, Dobson they used publicly, but when that flamed out, they got Warren on the second round of conference calls and he asked a question about Miers and ultimately said that if it’s good enough for the president, it’s good enough for me. That was used quietly and not publicly, and I don’t know where that broke down. And he may be figuring out his relationship with politics, but I think if you’re on a Harriet Miers conference call you’re very, very involved.</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="621" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-dickerson.jpg&amp;raw" width="250"></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">So, that’s one observation. I guess the other question is, turning away from politics, if people of faith or conservative Christians or whatever we want to call them may be disappointed with the results they’re getting, it seems to me that one of the things that struck me the most about covering George Bush when he was governor was what I would hear from people of faith. Most of the time I heard, “He’s one of us.” They recognized and felt an affinity for his personal story.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">They felt the same about John Ashcroft. And what was so extraordinary about Ashcroft for many of them when Governor Bush picked him was not “He’s going to do X, Y and Z on these specific things,” although surely they were excited about that; they felt that it was a sign to them that the president was embracing another one like them. It was a very personal thing I was hearing from a lot of these voters.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">And so I wanted to get your reactions to that notion, which is that they may be disappointed, but as a political force they’re still going to be making judgments about candidates based on this kind of gut level association. And candidates – we talked about Tim Kaine yesterday – will still appeal to them, if not specifically on certain issues, they’ll still be trying to send these kinds of signals, which come very strongly from their faith and connect at this faith level.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="606"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="607" instrument_node=""> I’ll just say very quickly I think you’re exactly right. I think that there are limits, though, to loyalty based upon certain personal affinities. And we saw that with Jimmy Carter, and I think we’re already seeing that right now in the religious right, such as it is – not just a disappointment but a real disaffection, I think, with the Bush administration on certain issues.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="601"><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="602" instrument_node=""> I remember saying about Sandy Koufax what your evangelicals say about George W. Bush: He’s one of us. And when he wouldn’t pitch on Yom Kippur, my god, what that meant to the Jews in America was huge. But I bring up the Jews because there was a way in which Jewish identity went through a process of a strong ethnic identity with people as a way of discovering your identity which is now behind us. And we don’t think that way so much anymore. And I wonder if it isn’t the same with evangelicals, that evangelicals have recently in American history awakened politically, and so there is an inevitable tendency to practice a kind of identity politics as the first stage in your political awakening. But then, as with all other groups, Catholics used to say Kennedy was one of ours, then they don’t vote for Kerry. But, you know, you will get beyond that as you grow and mature politically and it just won’t be so important.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="596"><strong data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">MICHAEL PAULSON, THE BOSTON GLOBE:</span></strong><span data-dcnode-id="597" instrument_node=""> I guess I have to jump in on Rick Warren as well because I find myself not really agreeing with much of what has been said about him this morning. I feel like the point that many of his congregants vote Republican is essentially irrelevant. I mean, his church is in one of the most affluent corners of this country by his own admission. And the fact that a large group of very wealthy people living in Orange County, California, are voting for the GOP just doesn’t strike me as illustrating anything about where he is on the religious or political spectrum.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">I think the point about Rick Warren, conservative as he may be, is that the set of issues that he articulates, the priority list that he publicly spells out, is different from that which is articulated by most of the more familiar evangelical Protestant leaders in America over the last several years. So even if he and his congregants remain within the Republican Party, if he has some influence, as it appears he does, on the sets of issues that people are talking about, to me that is a significant political development.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">That is what I would say about Rick Warren. But that sort of leads me to my question, which is about something that I think both of our speakers alluded to, which is the suggestion that evangelical Protestants might be drifting toward some kind of unhappiness that translates into a disengagement from the political process. And if that is what you are saying – and I’m not sure it is – I’m struggling to accept that, because I can’t really think of a precedent in which a group that has once become engaged by democracy has pulled out.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">It seems to me that what is far more likely is what you see with Jews and maybe with Muslims and various other constituencies, which is a growing concern with over-identification with one political party – in other words, the emergence of more diversity in political views, political expression, political affiliation. And that as the Rick Warrens and others contribute to a diversification of the set of issues that evangelicals are concerned about, you will see a greater diversity of political behavior by evangelicals, but not a return to the point in time where they were not participating. But I’m open to being told that I am wrong about that.</span></p><span data-dcnode-id="586" instrument_node="">
