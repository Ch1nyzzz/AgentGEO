</span><h1 class="ui post header" data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Is There A Culture War?</span></h1><span data-dcnode-id="1664" instrument_node=""> </span></header><span data-dcnode-id="1662" instrument_node="">
</span><div data-dcnode-id="1661" id="prc-mobile-toc"></div><span data-dcnode-id="1660" instrument_node="">
</span><div class="post-content" data-dcnode-id="509"><span data-dcnode-id="1659" instrument_node="">
</span><p data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">Key West, Florida</span></p><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1655" instrument_node="">Some of the nation’s leading journalists gathered in Key West, Florida, in May 2006 for the Pew Forum’s biannual Faith Angle Conference on religion, politics and public life. Conference speakers James Davison Hunter, author of the widely acclaimed </span><em data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Culture Wars: The Struggle to Define America</span></em><span data-dcnode-id="1652" instrument_node="">, and long-time critic Alan Wolfe, author of </span><em data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">One America After All</span></em><span data-dcnode-id="1649" instrument_node="">, discussed whether America really is polarized by a “culture war” over key moral issues like abortion and homosexuality.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1634"><strong data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">Speakers:</span></strong><br data-dcnode-id="1644"><span data-dcnode-id="1643" instrument_node="">
</span><em data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">James Davison Hunter</span></em><span data-dcnode-id="1640" instrument_node="">, Labrosse-Levinson Professor of Religion, Culture, &amp; Social Theory, University of Virginia.</span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node="">
</span><em data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Alan Wolfe</span></em><span data-dcnode-id="1635" instrument_node="">, Professor of Political Science and Director of the Boisi Center for Religion and American Public Life, Boston College.</span></p><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1625"><strong data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">Moderator:</span></strong><br data-dcnode-id="1630"><span data-dcnode-id="1629" instrument_node="">
</span><em data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Michael Cromartie</span></em><span data-dcnode-id="1626" instrument_node="">, Vice President, Ethics &amp; Public Policy Center; Senior Advisor, Pew Forum on Religion &amp; Public Life.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><hr data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">
</span><p data-dcnode-id="1598"><strong data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">MICHAEL CROMARTIE:</span></strong><span data-dcnode-id="1619" instrument_node=""> As you know, the two gentlemen who will be speaking to you today are two of the leading sociologists and political scientists thinking about this subject of the culture war. We are delighted to have James Hunter and Alan Wolfe with us. This discussion is actually an advertisement for a wonderful book that is coming out called </span><em data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">Is There a Culture War?</span></em><span data-dcnode-id="1616" instrument_node="">, which will include essays by today’s speakers. The book, co-edited by E.J. Dionne and I and published by Brookings Press, should be out in September.</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1613" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-cromartie.jpg&amp;raw" width="250"><br data-dcnode-id="1612"><span data-dcnode-id="1611" instrument_node="">
James is a professor of sociology and religious studies at the University of Virginia. As many of you know and some of you have read, he is the author of the book </span><em data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1608" instrument_node="">, which was the finalist for the 1992 </span><em data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">L.A. Times</span></em><span data-dcnode-id="1605" instrument_node=""> Book Prize. He also won a Distinguished Book Award for his book </span><em data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Evangelicalism: The Coming Generation</span></em><span data-dcnode-id="1602" instrument_node="">. James did his Ph.D. at Rutgers University under Peter Berger. James, we are looking forward to hearing your update on </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1599" instrument_node="">. Thank you for coming.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1587"><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">JAMES HUNTER:</span></strong><span data-dcnode-id="1594" instrument_node=""> Thanks, Mike. I published </span><em data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1591" instrument_node=""> in late 1991, early 1992, and it seemed to be a bit of a sleeper. It slowly caught on, and gained some traction within academia and in public discourse. But it wasn’t until the mid 1990s that what seemed to me to be a cottage industry of criticism started to emerge within sociology, primarily academic sociology, and political science. And so when E.J. approached me about this, I thought my life was beginning to open up a little bit so that I could actually address some of these things. So E.J., thanks for the opportunity to do this.</span><br data-dcnode-id="1590"><span data-dcnode-id="1589" instrument_node="">
</span><img alt="" class="alignleft" data-dcnode-id="1588" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-hunter1.jpg&amp;raw" width="250"></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1585" instrument_node="">I have to say that at some level I’ve always been mystified by the debate. I wasn’t sure why there was a debate to begin with. I read Alan’s book. I read many of the articles that were written on the criticism of the </span><em data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1582" instrument_node=""> hypothesis, and I found myself not disagreeing very much with the analysis at all. I did disagree quite a bit and emphatically with the conclusions. The conclusions they came to were that there was no culture war, or very little, or if it existed, it didn’t matter.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">My opening gambit is this: Politics is sexier than culture; it is certainly more immediate that culture. Its movements are more obvious. But culture is more profound than politics. It is prior to and it leads politics. Therefore, in my opinion, it is more important than politics in tracking the nature of the social order and its changes. What I want to do in the next 20 minutes is to lay out four points where I think this debate exists, and through those four points make the case that we are still in the midst of a culture war. Then I want to conclude by talking a little bit about what is at stake, in my opinion, in this debate.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The four points are these: The first point is conceptual and methodological. The second point is empirical. The third point is theoretical. The fourth point is perspectival. So let me just jump right in and talk about concept and method.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">The issue of concept and method is really a query about the nature of culture and culture wars – a pretty important question, it seems to me. How do we understand culture conceptually, and how do we measure it? How do we think about it methodologically?</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">In the social sciences, there are a number of discrete views, but two general tendencies. In the early 1960s, as survey research was emerging as a major field and a major methodological strategy within the social sciences, it was capitalizing on a view called the culture and personality school of thought that essentially equated culture with values and beliefs. So a culture is essentially the sum total of values and beliefs held by individuals. These norms, these values, these moral preferences of individuals – again, cumulatively – amount to American culture or any culture.</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">This is what social scientists call methodological individualism. Over the course of the 1960s and 1970s, even as survey research got better and much more capable of refined analysis, it became clear among those who do the sociology of culture and who study culture anthropologically and otherwise that this kind of methodological individualism is fairly limited in its scope. Surveys are good, but they don’t tell the whole story of culture.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">And so toward the end of the 1970s and into the 1980s, the social sciences were rediscovering the neoclassical view of culture, coming back to structuralist and post-structuralist views of culture that tend to emphasize a different part of what culture is. They emphasize the production of culture and look at the artifacts of culture, the resources and institutions that produce those artifacts, the elites who are disproportionately involved in running those institutions and producing that culture. It’s an approach that looked seriously at public symbols and rituals, collective narrative, public discourse, the structures of authority that under-gird cultural systems and collective identity. All of these things are extremely important, but you can’t get at them very easily through survey research; you have to go a different route.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">So at one level, just to cut right to the chase here, the debate over the culture wars – does it exist or does it not? – hinges on these different views of culture. The bottom line is that every single one of the criticisms of the culture wars hypothesis has been based upon survey data, rooted in an approach to the study of culture that is highly individualistic, that looks exclusively at the beliefs, values and moral preferences of individuals.</span><br data-dcnode-id="1560"><span data-dcnode-id="1559" instrument_node="">
</span><img alt="" class="alignleft" data-dcnode-id="1558" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-hunter2.jpg&amp;raw" width="250"></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The argument that I laid out focused primarily upon a public discourse, the public symbols and rituals surrounding that discourse and how that discourse gets polarized within competing institutions and among the elites that run them. As I argued, public discourse is a discourse of elites. That is where you find this conflict at its most incendiary.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">So in my view, the critics all looked for conflict where it was weakest. From my vantage point, none was addressing the culture in culture wars, or at least the more complex elements of culture in culture wars. So on the face of it, the disagreement would seem to be conceptual and methodological and not substantive.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Indeed, in the book I too argue that the average American was not really caught up very much in the conflict. Most people live their lives away from the front lines. But on occasion, episodically, something will happen: a daughter will get pregnant out of wedlock; a son will come out of the closet; an issue will come up in the local school. And all of a sudden, even ordinary individuals find themselves caught up in a drama that is already present, scripts that are already pretty well worked out and written. And so that story can be told locally as well as nationally.</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">So as I said, when I read Alan’s book, I found myself not disagreeing very much with his analysis at all. In fact, I have done work that very much is in sympathy with it. It was the conclusions that he was drawing from his analysis – and from, again, other analysis that was based primarily upon survey research, focus groups and personal interviews – that I disagreed with.</span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">The second point is empirical, and here I want to come back to survey data itself. It seems to me that in looking at the culture war in terms of survey data, you actually have to know where to look for conflict, where to look for polarization. There are different ways to approach this. But it seems to me that no matter how you slice the pie statistically, you end up with about 5 to 7 percent of the American population on each side who represent the white hot core of opposition. And this is based upon random public opinion surveys.</span></p><span data-dcnode-id="1541" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">These people are disproportionately motivated, disproportionately active. They are the ones who send in money to special interest groups. They write their congressperson and so on. Beyond that 5 to 7 percent at each end, there is probably another 12 to 15 percent on each end that lean strongly, though are less motivated. So right now you are up to about 18 to 20 percent of the population, at each end, who are pretty well located culturally at opposite ends. Beyond that 18 to 20 percent on each end, it seems to me that there is probably a larger public, maybe an additional 15 or 20 percent, who tilt one way or another, and in an election likely turn one way or another depending on the issues.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">So it seems to me that one can in fact find conflict and polarization on cultural kinds of issues within survey data and within public opinion, but you have to know where to look for it. Now, that 5 to 7 percent may seem like a small number at each end. But we are really talking about 10 to 12 million people on each end. That is a lot. And when you expand it out in concentric circles, you are probably talking about 60 million people oriented in one way or another.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1534" instrument_node="">What I have left out of this empirical part so far is the role of elites, the political professionals, the special interest leaders. The critics of the </span><em data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1531" instrument_node=""> hypothesis tend to minimize their role or to dismiss it all together. I find the role of elites to be extremely important, and it’s precisely because of the disproportionate role that they play in framing public discussion. It’s they who lead the institutions, who have the resources available to them, who have a disproportionate access to the media. It is their sound bites that frame the debate. From my vantage point, the power of culture is the power to define reality, the power to frame the debate, and that power resides among the elites. But they are supported in concentric circles by increasingly large numbers, though of less and less passion.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Steven Brint, a sociologist at the University of California, posed the question in his review of my book, Can you have a proper war when two-thirds of the army are non-combatants? And the answer is, in fact, you can. In fact, total war is a fairly recent and a rare phenomenon in history. Through most of history, war has been a minority affair, and there are all sorts of illustrations one could call attention to.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1525" instrument_node="">So even within the framework of survey data – that is, on the terms that the critics are using to challenge the </span><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1522" instrument_node=""> hypothesis – I actually think the data show very clearly that there is far more polarization, far more mobilization, than one might imagine.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">My third point is theoretical and I’ll keep it fairly short. As I say, the power of culture is first and foremost symbolic. It’s the power to name things; it’s to define reality, to frame debate. There are different actors in any culture; even in the most homogeneous culture, there are different actors, different institutions that do this, that have differential access to resources. But this is especially true in a society as diverse and complex as ours.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">So culture by its very nature is contested. As Philip Rieff has put it, where there is culture, there is struggle. It is the form of fighting before the fighting begins. And this is so even if it is not always reflected in public opinion. And when there is a real war, the culture part of it is the center-most part of the war. The bloodiest conflicts, it seems to me, are fought over symbols.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">The fourth point I want to make is perspectival. It seems to me that in looking at this debate, a lot of the difference of opinion can be understood in terms of the distinction between the politics of culture on the one hand and the culture of politics on the other. The politics of culture is primarily about the push and pull of the mechanisms of power over cultural issues. The focus is primarily upon the mobilization of parties, the creation of coalitions among interest groups, the manipulation of public rhetoric over cultural issues such as abortion, same-sex marriage, funding for the arts and so on.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">The culture of politics perspective is fundamentally different. The focus here is on the symbolic environment within which political institutions are embedded and political action occurs. In other words, the culture of politics perspective focuses on the frameworks of meaning that make particular political arrangements understandable, desirable and so on. What I am getting at in the culture of politics side of things has a lot to do with what the French sociologist Pierre Bourdieu called “habitas,” what the Canadian moral philosopher Charles Taylor called “social imaginaries.”</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The culture of politics perspective reflects what Michael Oakeshott famously said. He said a political system presupposes a civilization. It has a function to perform in regard to that civilization, but it is mainly a function of protection, and to a minor degree mechanical interpretation and expression. Thus political activity may have given us the Magna Carta and the Bill of Rights, but it did not give us the contents of those documents, which came from a stratum of social thought far too deep to be influenced by the actions of politicians.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">The debate over the culture war in some respects is a debate between those who take the politics of culture perspective versus people like me who take the culture of politics perspective. So as I see it, in many respects the debate is a non-debate. There is a lot of talking past each other. The real debate is over the conclusions that we draw from all of this.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">So what is at stake? It seems to me that liberalism as a philosophical movement and as a cluster of political ideas and ideals is rooted in the challenge of difference. Liberalism sought to provide a human solution to the challenge of different communities and shared political space. And this is at least one subtext of the culture wars debate. What is legitimate difference? Because, again, liberalism seeks to offer in new and challenging contexts a framework for toleration, freedom and justice.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Who is a member of the political community? Whose voices are taken seriously and whose grievances are legitimate? When new claims are made and criticisms expressed, how do the institutions of liberal democracy integrate them and mediate them? When liberalism was first imagined, the context was, of course, deep, primarily religious, difference. It has seemed over the last 200 years that those differences have disappeared. They have certainly waned quite a bit.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">The argument of my book was essentially the argument that maybe those differences have not disappeared after all. Maybe those deep ontological and religious differences remain very present and maybe they still animate different political visions. And it seems to me if that is true, then liberalism itself faces a new challenge of how to reconcile, how to negotiate those differences. I’ll leave that there.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1489"><strong data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1490" instrument_node=""> Thank you, James. Thank you very much.</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1480"><span data-dcnode-id="1487" instrument_node="">Alan Wolfe is a professor of political science and director of the Boisi Center on Religion and American Public Life at Boston College. The book that James was referring to was </span><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">One Nation After All</span></em><span data-dcnode-id="1484" instrument_node="">, which came out in the late ’90s. Alan has written several very important books more recently, including </span><em data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The Transformation of American Religion: How We Actually Practice Our Faith</span></em><span data-dcnode-id="1481" instrument_node="">.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1472"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">ALAN WOLFE:</span></strong><span data-dcnode-id="1476" instrument_node=""> Thank you. I feel somewhat the same as James. Sometimes I think our differences are just so profound that we are talking about different worlds, and then sometimes I think we agree on a lot of things. And it is hard to separate some of these issues. I don’t want to spend that much time on the conceptual and theoretical issues that James raised; I’ll just say that he argues that there is something called methodological individualism, which looks at how individuals think and act, and that tends to downplay the importance of more timeless and permanent institutions and structures.</span><br data-dcnode-id="1475"><span data-dcnode-id="1474" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1473" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-wolfe1.jpg&amp;raw" width="250"></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">But there is also something called structuralism that focuses on timeless institutions and structures and tends to negate the extreme importance of individuals and their behavior. And it seems to me that in a democratic society, the votes and opinions of individuals matter greatly, and that not only is it normatively important to take what people say in surveys as valuable because this a democracy and we do base our decisions on public opinions, but also that what people say and how people think in a democracy does shape their culture and does shape their institutions.</span></p><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">So to me, rather than saying that surveys are kind of a flawed or second-best way of looking at how divided we are, I think they are absolutely essential to framing the kinds of issues that we are concerned about. But rather than reply to James at that conceptual level, let me try to do it through examples of some of the issues that are going on in American society at the present time.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1464" instrument_node="">In </span><em data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">One Nation After All</span></em><span data-dcnode-id="1461" instrument_node=""> I argued that the culture war was definitely something that happens kind of “inside the beltway,” among intellectuals and elites – and now, since the book was written, on cable television – but that it did not have deep roots in the culture. I spent time in four different communities in the United States – in Oklahoma, Georgia, California and Massachusetts – talking with people about the big sort of culture war issues.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">And the bottom line was that I found this notion that we’re somehow divided between traditionalists, who want to get back to the old-time religion and old moral values, and more modern people, who are much more individualistic and kind of libertarian in their social views, actually characterizes most people in the United States, that it is not a division between red state and blue state America; it’s a division inside every person, or at least almost every person in the United States. And so I tended to argue that the culture war would not be a permanent and long-term force in American life.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">I’ve gone up and down on that since. When there was this effort to remove President Clinton from his office as president of the United States, the public seemed to respond with a big shrug and I said, “Hey, look at that; I was right; there isn’t this furious thing.” But then the 2000 election happened with the red states and the blue states, and I said, “Well, golly, maybe I was wrong.” But then Terri Schiavo happened and there was very little public outcry and I said, “Hey, I’m right again.” (Laughter.) So I tend to go up and down on these kinds of things.</span></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">But at the moment I think I am pretty correct. I think that Terri Schiavo was a kind of major war that didn’t happen. In the ’60s when I carried all of those signs in the protest, one of them said, “Suppose they gave a war and no one came.” And that really did seem to me to characterize the Terri Schiavo affair. Everyone was geared up to fight this huge culture war and the public was just totally indifferent. It is also very hard for me to imagine that at this point, given everything that is going on in this country, failing to pass a gay marriage amendment will suddenly rally the electorate out in the mid-term congressional elections and produce some kind of Republican triumph. I just don’t see it happening. I think that even at the elite level, our culture war is increasingly something we are going to talk about in the past tense.</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">In order to explain why I think that is happening, I will try to engage some of the arguments that James raises. First of all, James raises this very interesting point: Does politics drive culture or does culture drive politics? I’m not at all persuaded that culture is the sort of indelible unchanging thing within which politics then operates because these things – these so-called cultural values, these moral values, these religiously inspired values – are not at all timeless in our country but change very, very dramatically.</span></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node="">To cite my favorite example – and any of you who has heard me speak before has heard this example, so I apologize for that – in 1973 when the infamous decision of </span><em data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Roe v. Wade</span></em><span data-dcnode-id="1443" instrument_node=""> came down, the Southern Baptist Convention, which is America’s largest evangelical Protestant denomination, endorsed it. That is a remarkable fact that is almost totally neglected given the fact that the Southern Baptist convention sort of embodies everything that we think of when we think about being on the right side of the culture war issues.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">But there were a number of reasons why the SBC endorsed </span><em data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">Roe v. Wade</span></em><span data-dcnode-id="1437" instrument_node="">. One of them was that they knew Catholics were opposed to abortion, and in our country if Catholics are in favor of one thing, the Baptists are always in favor of the opposite. But even more seriously, the Baptists in America have had a very long history and tradition of separating church and state and of being strong believers in religious liberty.</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Roger Williams was one of our great philosophers in the separation of church and state tradition, contrasting the garden of religious faith against the wilderness of politics and upholding the garden over the wilderness. And John Leland, who inherited in the Baptist tradition Roger Williams’ ideals, was a close friend of Thomas Jefferson’s and was instrumental in the passage of the First Amendment to the American Constitution.</span></p><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">And I think for many Baptists in America, as recently as the 1970s, the idea that the state could tell the woman what to do with her body was not all that different from the idea that the state could tell a religious believer what to do with his or her mind. There is a libertarian impulse in the American Baptist tradition, a distrust of the idea of the established state. And certainly American Baptist history is filled with a kind of anti-theocratic sense, a sense that the blending of church and state is something that any good Baptist should be instinctively suspicious of.</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">So there were perfectly valid theological and religious reasons for the Southern Baptist Convention when </span><em data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">Roe v. Wade</span></em><span data-dcnode-id="1425" instrument_node=""> came down to say, Hey, this is something we can support. But 10 years later they repudiated their support. They issued all kinds of apologies for what they had done. And they wound up on the other side of the issue. I don’t want to get into the politics of why they did that. Personally I think it reeked of political opportunism, but that is not the point I want to make.</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">The point I want to make is this: if the notion of the right to life is so culturally embedded, if it is supposed to have such deep religious roots, if it is supposed to be one of those timeless things and then politics is epiphenomenal against that, how could it possibly change so radically? It seems to me that what we witnessed in this shift from one side to the other on this issue was in fact politics becoming much more important than religion. It wasn’t that religion was the timeless thing at all. In its new formulation of these issues, the Southern Baptist Convention and its leaders talk about accommodationism between state and church rather than strict separation of state and church.</span></p><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">But, again, all of these things suggest to me that what happened in the United States, using this as an example, is that politics was enormously important for people, to the point where their position on a political issue determined their theological and religious views, and not the other way around. It couldn’t have been that religious and theological views came first and political views came second and led to this change. It had to be the other way around.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1412"><span data-dcnode-id="1416" instrument_node="">And because it’s the other way around, I think it has important consequences. It was a huge step for conservative Protestantism in the United States to reverse its usual hostility towards blending state and church, to become more theocratic in orientation. And whether that will persist is an open question. I strongly feel – but this is, of course, just a hunch – that over time we are likely to see a return within conservative Protestantism to the position that used to exist throughout most of its history, which is a suspicion of politics, a suspicion of too much of a worldly engagement in what are very much political rather than timeless matters.</span><br data-dcnode-id="1415"><span data-dcnode-id="1414" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1413" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-wolfe2.jpg&amp;raw" width="250"></p><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">If you were a conservative Protestant, is this what your religion would really mean to you – that politics comes first? Wouldn’t it instead seem to be a concern with the activities of people like Ralph Reed, who is corrupt and who would use religion for corrupt purposes? It suggests to me that there will be a rethinking of this close identification between politics and religion among conservative Protestants in America.</span></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">So if James is right and the culture comes first and things are timeless, don’t we have to view the culture war as the aberration? If the timeless things are really there, won’t people go back to the suspicion of politics? And then we’ll look back and say, Well, conservative Protestantism has always been suspicious of too much active political engagement, except for that brief period when they sort of allied themselves with the Republican Party in the culture war, but now we are back to religion as usual.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">There is another aspect of this discussion that James brings out in his book on the culture war, which, if I may say so, I think was the single best thing in the book and really the most lasting contribution of all of the things that James has written on this topic. And that is the idea that the culture war in its essence is really about how conservatives within each religious tradition have found more in common with each other than they’ve found with liberals within their own tradition. Historically, religion and politics in America has been characterized by differences between religions. And so Protestants were hostile to Catholics and Protestants and Catholics together were hostile to Jews, and Protestants and Catholics and Jews together were hostile to Muslims and so on. So it was a conflict between one religion and another.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">But James pointed out that some of the most increasingly divisive conflicts in the United States are within particular religions. All you have to do is look at the Episcopal Church now; here is a church really seemingly about to engage in a world historical schism over the issue of the ordination of gay priests. And obviously a liberal Episcopalian and a conservative Episcopalian are at odds with each other, and it just seems logical to suggest that people who have strong feelings about abortion or gay marriage or whatever within each religious tradition will seek people who feel the same way and feel a strength of identity with those from other traditions who share those views.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">This seems so insightful and also so axiomatic that we have come to accept it as true. I am not at all sure it’s true. Or perhaps I should say if it </span><em data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">was</span></em><span data-dcnode-id="1395" instrument_node=""> true, I am not sure it’s going to continue to be true. And in fact, I think under the surface, what we are witnessing in the United States now is something of a return to a situation in which the more united religions are among themselves, the more hostile to people of different religious traditions they are than we have seen for some period of time.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">This is, in other words, a kind of reassertion of Catholic-Protestant hostility as well as hostility between Christians, Jews and so on. All of these are really tentative indications, tealeaves, if you wish. But I raise them for your consideration. If it is true, it’s the most significant development that may happen over the next couple of decades with respect to religion and politics in the United States.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">One is this widely shared view that the Republican success has been fueled by a combination of both conservative Protestantism and conservative Catholicism. And I wasn’t here yesterday, but I know Bill Galston touched on some of these things. I am pretty persuaded from what I heard about what he said that a very, very significant aspect of the 2004 Republican victory was a shift among Catholics toward a more conservative point of view. But I think it would be wrong to conclude from that that conservative Catholics and conservative Protestants are forming some kind of broader Christian alliance in American politics.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Certainly at the elite level, I think we are actually seeing the opposite. I think at the elite level, we see this very, very interesting phenomenon that we now have five Catholics on the U.S. Supreme Court, that when President Bush looked for conservatives to appoint to the Supreme Court, he found two people, John Roberts and Samuel Alito, both of whom were Catholic.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">And this has fueled the sense that perhaps Catholics can provide the intellectual argumentation that conservative Protestants seem unable to provide – or at least unable to provide at the level of people qualified to be on the U.S. Supreme Court. But this in turn exposes a kind of long-standing but somewhat suppressed tension between Catholic intellectuals and Protestant intellectuals over indeed whether or not Catholics can provide the theology necessary for the more theocratic-leaning orientations of some of the American Protestants in our nation.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Richard John Neuhaus is in many ways a key figure in this. Neuhaus almost sees his role as relying upon Catholic intellectual resources and traditions to provide the intellectual ammunition that I believe Neuhaus thinks Protestants simply can’t come up with. And Neuhaus seems to be somewhat intemperate from time to time, and in some of his more intemperate moments, he pretty much comes right out and says something like that, which is not exactly a way to win strong friends and allies in the evangelical camp in the United States.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">Protestant evangelicals have always been somewhat insecure about their own intellectual accomplishments. Mark Noll wrote the well-known book </span><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">The Scandal of the Evangelical Mind</span></em><span data-dcnode-id="1374" instrument_node="">. And there has been this sense that evangelicals have had a tradition of anti-intellectualism, certainly even the opposite of Catholic intellectualism. But I see more and more – again, at the elite level – a sense of Protestant-Catholic hostility towards some of these things.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">There is also this real issue in American politics that conservative Protestants – and I think this is part of the </span><em data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Culture Wars</span></em><span data-dcnode-id="1368" instrument_node=""> hypothesis too – have now become best friends with the State of Israel, and that evangelical Protestantism, which has had a history of being anti-Semitic just as it has been anti-Catholic throughout the American experience, is now celebrating its new-found alliance with American Jews.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">That too, if it happened, is in danger of crumbling. In the last year, two very prominent spokesmen for the American Jewish community, Abraham Foxman and Eric Yoffee, have given speeches saying, “Beware of conservative Protestants who say that they are friends of the State of Israel; their real effort is to Christianize the United States, and no good American Jew can welcome that prospect with equanimity. They are historically anti-Semitic and now they are philo-Semitic, but really there is no difference at all.” And so once again, there is a reemergence of a certain kind of tension.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">If some Jews are not happy with conservative Christians, others are made uncomfortable with Islam. Among these people, it isn’t that they feel that the Christian right is not an enemy to the Jews; they actually do feel that. It is that they feel the Muslims are a so much greater threat to the Jews, so why focus on the Christian right.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">That is interesting because it then brings up one more reemergence of some of these hostilities. Muslims have not reached the level of political importance in terms of representation in Congress that other religious groups in the United States have. But part of the realignment of the religion hypothesis attributed to Grover Norquist was that Muslims would make good Republican voters and Michigan would be a crucial state in that and so on. But I think we see anything but an alliance between conservative Muslims and conservative Jews and conservative Christians. In fact, conservatives in those three camps are bitterly divided these days. And so under the surface I kind of return to one religion being against another. Whether this is a good thing or not, that is not my business to talk about.</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Finally, one last point with respect to some of these things. This is that if religions are reemerging with some of their sense of distrust of each other, it follows that within each religion there may be greater unity than we have come to imagine, and again, I would say that despite some of the evidence of Catholics, for example, becoming more willing to vote Republican, I see these religious labels – Catholic, Protestant and so on – as retaining a tremendous amount of importance.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">This, again, is anecdotal evidence and it’s pretty much based upon the Catholic institution in which I teach, but Catholics at Boston College are very noticeably and distinguishably Catholic. Irrespective of whether Republican or Democrat, conservative or liberal, there is something about their Catholicism that simply stamps them. And it’s interesting because it’s not necessarily religion. I’m not talking about people who attend mass regularly. I am talking about kids who tell me they are Catholic but don’t know the century in which Aquinas lived, kids whose theological knowledge of their own church is much lower than mine and I’m not Catholic.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">But there is a clear Catholic sensibility. And it takes the form that even though I have students at both ends of the political spectrum, Republicans and Democrats, conservatives and liberals, my conservative Catholic students are never quite as conservative as the conservative Protestants I run into in evangelical America, and my liberal Catholic students are never as liberal as the liberals among my Jewish friends in Brookline and Cambridge.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">And it is that distinctively Catholic perspective that will make my liberal Catholic students always have qualms about abortion and euthanasia and other moral issues, and my most conservative Catholic students somewhat sympathetic to measures that promote equality, very uncomfortable about the Bush tax cuts, and even have mixed feelings about Clinton’s welfare reform and other such issues. And so the idea that they are going to automatically seek out allies elsewhere in other religious traditions – maybe they will, but I wouldn’t be too quick to rush to that conclusion.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">So to close, I argue in the contribution I make to this book on the culture war that I still think the idea that the culture war never took deep roots is true. Why then did it take place among the elite? I actually think that the years in which the culture war predominated among the political elite were years in which no other issues did. We had a remarkable vacuum of political issues in the United States. Communism collapsed in 1989. Our foreign policy, which had been so long based upon the Cold War against communism, lost its rationale. During the ’90s we had this remarkable economic growth. Remember Clinton and remember economic growth and prosperity.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">So there wasn’t an overwhelming and burning foreign policy issue; there wasn’t an overwhelming and burning domestic issue. And in that environment, the elite jumped off of the culture wars. But look at what has happened since. Foreign policy issues have emerged with a vengeance: terrorism, the war in Iraq and so on. The Bush tax cuts have raised major issues about the kind of domestic society we want to be. Certainly Social Security and the efforts to transform or even in some cases seemingly abolish Social Security aroused a public that has been somewhat uninterested in domestic politics for a long time to prevent the president and his Republican allies from doing that.</span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">So I think we had this interregnum in which the big issues weren’t there and the culture wars just filled in. But the big issues are back, and now I think politics in the United States is going to return to the more normal state that I have outlined in my remarks.</span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1332"><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1333" instrument_node=""> Thank you, Alan. E.J., you are first.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1324"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">E.J. DIONNE JR., THE WASHINGTON POST:</span></strong><span data-dcnode-id="1328" instrument_node=""> First of all, I want to thank James and Alan for engaging in this whole project because I have always had this dream of having the two of them carry out this argument in the next stage. And it’s not for a Clintonion I-agree-with-everybody reason that I wanted this, or a Rodney King why-can’t-we-just-get-along reason, but it does seem to me, and it came out again today, that they are both right at a key level – that if one looks at the 5 to 7 percent or the 18 percent on either side, however one counts it, there clearly is a deep rift at the ends of the spectrum. On the other hand, Alan is clearly right that some 60, 70 percent of Americans are, as David Brooks once put it, flexidox – that this culture war is carried out within each of us at some level.</span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1325" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-dionne.jpg&amp;raw" width="250"></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">I want to ask two questions. The first will provide James an opportunity to reply to Alan. I want to ask if the frame of what they said – oversimplified, to be sure – is true, what are the implications of that fact, that there is some level of cultural conflict at the ends of the spectrum, but something much more like consensus or internal conflict in the middle?</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">I’m glad Alan pointed to the emergence of new issues because I think something is changing, and that seems to be a theme of this set of sessions. Tony Fabrizio, a very good Republican pollster, once argued that you have to make a distinction between two kinds of conservatives. There are the religious conservatives whose focus is on abortion and gay marriage, but then there is this other strand of conservatism which is a kind of social or backlash conservatism associated with race, crime and the like. It’s sort of the distinction between, say, a George Wallace voter and a Pat Robertson voter in the primaries back in 1988.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">And so the short way of asking my second question is, where does this new immigration fight fit into the culture war analysis? Because I think the immigration fight crisscrosses the old culture war fights and divides people who are allies within one set of fights; they find themselves split now. And, again, thank you both for doing this.</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1311" instrument_node=""> What are the implications? Again, let me just affirm that to the point we have a disagreement, I think it is rooted methodologically and conceptually. And that difference ought to be explored. I don’t want to deny the importance of public opinion or of the electorate in shaping the culture, but my main point is that it’s not enough. The heart of my argument is that what animates these conflicts is in fact something that goes far deeper. When you read Peter Gay’s wonderful history of the Enlightenment written a couple of decades ago, the debates among the clerics versus the philosophes are, in fact, the same kinds of debates that are taking place today. There is a reason for that.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">But it does play out in public opinion and it does play out in voting patterns and so on. And it certainly plays out in the kinds of strategies that are used by traditionalists and cultural conservatives. The main strategy that cultural conservatives have embraced – that I think everyone has embraced – is to find political solutions to the things that trouble them the most. They have sought political solutions to the issues of abortion and women’s rights and gay marriage and a whole range of other issues. And it is precisely because they have chosen a political strategy, which is in effect a short-term strategy, which is primarily about the instrumentality of power rather than building a foundational normative consensus, that I think conservatives are going to lose.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">I think Alan is exactly right in the paper that he wrote when he says that conservatives have done extremely well in mobilizing within the Republican Party. They have had huge successes over the last several decades in this way. But these are short-term successes. And while they have gained in politics, they have lost in the culture, and it is precisely for that reason that they will lose politics eventually as well. So I actually think we are kind of agreed in terms of where this is going in the long-term.</span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1302" instrument_node="">It does raise another question, though. You asked about the implications of this. We are going to see these conflicts for a long, long time. I don’t doubt that. But I do think there is a movement in the direction of all of this. I think the bigger question in many respects is not about the polarization but about the center itself. Schlesinger wrote that interesting book mid-century called </span><em data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">The Vital Center</span></em><span data-dcnode-id="1299" instrument_node="">, and it is suggested in the title, </span><em data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">One Nation After All</span></em><span data-dcnode-id="1296" instrument_node="">.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">What about this center? To say that conflict is not the main story is not the same as saying that citizens are becoming civic minded or that political participation is increasing, or that concern for the most vulnerable members of our society is increasing as well. My sense is that what is referred to as the center is a statistical phenomenon. It is not rooted in a common sensibility or in common political ideals; it is not animated and motivated in those ways. I think, in fact, that your argument about why Americans hate politics gets at that very well: that is, the center is not clear and purposeful; it is, rather, a kind of statistical phenomenon and not much more than that.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1288" instrument_node=""> One word about immigration. One of the things I think we tend to forget when we just lump different religious groups together is that Catholicism has been a universal church, while Protestant churches grew up closely tied to the nation states in which they flourished. And so nationalism has always been much more important in the Protestant tradition than it has been in the Catholic tradition, and American Protestants have in particular identified the American nation as God’s will, a chosen nation, whereas most Catholics are proudly and deeply patriotic but think of the American nation as one nation among many. So being more open to immigration isn’t just a politically opportunistic move but reflects a kind of Catholic universalistic sensibility, whereas opposition to immigration, putting up borders around the nation states, is much more rooted in various Protestant national traditions. So on this issue I see a huge divide between conservative Protestants and Catholics on immigration.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1279"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">AMY SULLIVAN, THE WASHINGTON MONTHLY:</span></strong><span data-dcnode-id="1283" instrument_node=""> I have a question that I want to pose to both of you. It’s something I think you both seem to agree on, which is that there is this middle. James, you don’t seem to think that there is necessarily a unifying philosophy that draws this middle together. And certainly your focus on the elites would show that the elites tend to be in those tails. They are the ones who frame the debates and drive the debates. And perhaps it doesn’t matter if there is a middle that tends to agree on a lot of things. Take abortion. You know, the vast majority of Americans want abortion to be legal, but they don’t like it; they want to see it reduced. But if the elites are on either side and are driving that argument, there is a culture war regardless.</span><br data-dcnode-id="1282"><span data-dcnode-id="1281" instrument_node="">
</span><img alt="" class="alignleft" data-dcnode-id="1280" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-sullivan.jpg&amp;raw" width="250"></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">And I would like to hear from both of you whether you think that is something that is just inevitable in a political system like ours that is driven so much by interest groups. That you can at times have a leader like Clinton who seems to speak for that middle, but it doesn’t last, it doesn’t hold. And whether if there aren’t any kind of institutional structures to represent that middle voice, if there isn’t a platform for them to be heard and there are no leaders who are visible for them, if that means that this type of polarization is inevitable at least in terms of how it plays out on a political stage.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1271"><strong data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1272" instrument_node=""> I think the center is vital and strong, powerful and determinate of what happens in politics in the long run, but totally incoherent. That is one of the problems of the middle: its positions are completely incoherent. Now, I happen to share almost all of that incoherence – (laughter) – that is, I think women should have the right to have an abortion but I think there is something morally problematic about it. I think that if we go to war in Iraq we should also consult the United Nations. I think that Social Security needs to be changed, but it shouldn’t be abolished. I mean, you name the issue and the middle position is completely and totally incoherent, but I think that is its strength.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">It’s a very important question: Do we have institutions that can protect the incoherence in the middle? And part of what we talk about when we talk about the culture war is the decline of what were once more neutral kinds of institutions, disinterested kinds of institution, really elite institutions – in another sense of the word “elite” – that essentially took politics out of things in a certain kind of way.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1266" instrument_node="">If the Supreme Court hadn’t ruled nine to nothing in </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Brown v. the Board of Education</span></em><span data-dcnode-id="1263" instrument_node="">, if we didn’t have that kind of elite that said, “Here we are; we are unanimous; we just simply impose this,” we would have probably fought, and the questions about racial segregation would have gone on for another 20 years. An elite can kind of stop that. But when courts are divided five to four, when there is no sort of authoritative neutral position that can just put an end to politics, then politics becomes a Kentucky blood feud and goes on and on and on. That is what I think is happening.</span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1257"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1258" instrument_node=""> If the center was that vital, why can’t it get any of its candidates elected? Why are there so few people who represent a vital middle ground? It seems to me that it’s not just the parties and the party activists and the party professionals who are polarized, but even the institutions of civil society are increasingly lining up this way. I mean, even philanthropy gets divided; philanthropy tends to fund the culture war in interesting ways. Professional organizations will oftentimes align themselves. I wish that the center were more vital. I don’t know how it could be vital and incoherent, but that is another question.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1255" instrument_node="">So my answer to your question, Amy, is that, yes, I do think that it is inevitable. I think it’s partly inevitable right now because of the growth of special interest groups in the post-World War II period. And it’s not just the character of the special interest groups that take a winner-take-no-prisoners policy, but also the fact that litigation becomes the first and primary means of negotiating these conflicts: the first thing that happens is to take it to a court room, to litigate, and in that context, it’s a zero-sum logic, which again polarizes. It is very hard, it seems to me, in that discursive and that public arena to create a discourse that is principled but somehow not at either extreme. So I think that the structural tendencies toward polarization are very strong, but that also represents an opportunity.</span><br data-dcnode-id="1254"><span data-dcnode-id="1253" instrument_node="">
</span><img alt="" class="alignleft" data-dcnode-id="1252" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-mallen.jpg&amp;raw" width="250"></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1246"><strong data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">MIKE ALLEN, TIME:</span></strong><span data-dcnode-id="1247" instrument_node=""> I was electrified regarding your point about the rethinking of the close identification between Republicans and conservative Protestants. And I wonder if you feel like the church or the party has been more damaged by that. And also, I was intrigued by your point about the lack of cohesion between conservative Catholics and conservative Protestants, at least at the intellectual level. And thinking about Governor Romney, I wonder if you could imagine any bridge between evangelicals and the LDS Church, which, if you look at family values and social issues, have more in common than I think is typically portrayed.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1242" instrument_node=""> I should defer to Amy since she has been writing about all that – Amy just published the article on how Democrats might make some inroads among evangelicals.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1236"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">MS. SULLIVAN:</span></strong><span data-dcnode-id="1237" instrument_node=""> Just very briefly on the Mormon question. I do think that this is something that will possibly kind of break down during the 2008 primaries, not just with Mormons and evangelicals, but if you have some Catholic candidates running on the Republican side, some evangelicals and a Mormon, that could be what you are talking about in terms of this coalition that has come together around shared political interests.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">But when you look theologically – I mean, this is one of the reasons that liberals have been able to form stronger religious coalitions, because the theological issues just are not as important as they are to people who are Catholics and think that Protestants aren’t really Christians, or Protestants who think that Catholics aren’t really Christians, and everybody thinks that the Mormons are a cult.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1228"><strong data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">MR. ALLEN:</span></strong><span data-dcnode-id="1229" instrument_node=""> And Professor Wolfe, what about the rethinking of the close identification between Republicans and conservative Protestants?</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1224" instrument_node=""> That is actually what I thought I was deferring on. (Chuckles.) Well, I think if Romney is a serious candidate, he is going to have to give his Kennedy speech about his Mormonism, and then when some Karl Rove-type operator starts in South Carolina we’re going to hear the most horrendous things you have ever heard about Mormons, which are going to resonate in some deep unexplored recess of the American mind. I don’t think Romney has a chance once that happens. When I am around Catholics they all tell me how there is so much anti-Catholicism in America and I say nonsense; anti-Mormonism is the most powerful thing in American religious history.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">On the conservative question, I think the church actually gets hurt much more than politics by this close alliance.</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1216" instrument_node=""> You wrote a book about it.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1210"><strong data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1211" instrument_node=""> Yeah, you know, I did. And it’s hard for me to answer that because I’m not myself a religious believer, so offering advice to conservative Protestants about their religion is a bit awkward for me.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1205"><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1206" instrument_node=""> Oh, but you are glad to do it anyway. (Chuckles.)</span></p><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1200"><strong data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1201" instrument_node=""> You know, if I were one of them, I would be enormously worried about the price that is paid in the life of the spirit for what seem to be very Faustian bargains that are made in the rough-and-tumble world of politics.</span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1195"><strong data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1196" instrument_node=""> Do you feel the same way about African-American churches too?</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1190"><strong data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="1191" instrument_node=""> Actually, yes, very much so, and I feel very much the same way about the Jim-Wallis-type efforts on the left, which I think is a bad strategy for religion and probably for politics.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1186" instrument_node=""> James, I know you have some comments.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1180"><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1181" instrument_node=""> No, I agree.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><strong data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="1176" instrument_node=""> There you go. Terry Mattingly?</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1167"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">TERRY MATTINGLY, SCRIPPS HOWARD:</span></strong><span data-dcnode-id="1171" instrument_node=""> As someone who has been reading about the work of Dr. Hunter for a long time, I think a crucial point to understand is how small his camp of the orthodox is in terms of people who actually accept a concept of transcendent eternal doctrines and truths. And I would urge you to read </span><em data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Evangelicalism: The Coming Generation</span></em><span data-dcnode-id="1168" instrument_node="">, which actually shows, I think, the roots of a strong evangelical left somewhere down the road.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">Here is my question: I wanted your reactions to something that happened quietly by George Barna, the evangelical pollster, a couple of years ago when he changed his definition of evangelicalism. He was dealing with about 35 to 38 percent of the American population, and he decided they were not all the same believers at all. And he ended up with a group that he calls the Bible-believing Christians, which is about 8 percent of the American public, and he defines it according to their beliefs on some classic Christian doctrines. Then he has a camp he calls the born-again, whose faith is totally defined by an emotional experience and spiritual experience.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">And I simply wanted to ask Dr. Hunter whether Barna is in effect already now wrestling with your thesis within evangelicalism. Is the larger point of evangelicalism emotionally driven, experientially driven, and thus already leaning toward the camp of the progressives?</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1156"><strong data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1157" instrument_node=""> Yes.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1151"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">MR. MATTINGLY:</span></strong><span data-dcnode-id="1152" instrument_node=""> So that 8-percent figure – (laughter) – that 8-percent figure is the camp of the orthodox because they are defined by eternal doctrines, and then the large 25 to 28 percent is the flexidox evangelicals.</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1146"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="1147" instrument_node=""> Well, this is why I find Kevin Phillips’ argument in his book on theocracy – and other associations with not just evangelicals, but Protestant fundamentalists with other kinds of fundamentalists in the world today – to be just utterly ludicrous. Even at their most militant and even at their most highly politicized, conservative Protestants, whether fundamentalists or evangelicals, have accommodated quite easily to contemporary American culture and are in many respects very, very comfortable. There are certain things that they don’t like. There are certain things that they are very worried about. And my sense is that the trajectory of that community is a trajectory where the tension is dissipating, that is, the tension between what they believe and who they have been historically.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1144" instrument_node="">This was partly the point of the book that I wrote on evangelicals; you see this very clearly among the emerging evangelical elite. Of the evangelicals I know at the University of Virginia – especially graduate students because they can vote – I only know one who voted for Bush in the last election.</span><br data-dcnode-id="1143"><span data-dcnode-id="1142" instrument_node="">
</span><img alt="" class="alignright" data-dcnode-id="1141" height="166" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/11/2012/07/052306-wooldridge.jpg&amp;raw" width="250"></p><span data-dcnode-id="1139" instrument_node="">
