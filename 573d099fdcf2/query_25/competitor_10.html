</span><p data-dcnode-id="582"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="583" instrument_node=""> Well, the only historical parallel I can think of, of a group that was active withdrawing, is evangelicals themselves, who were active in the abolitionist movement and others in the 19th century and then withdrew later in the century.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="577"><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">TERRY EASTLAND, THE WEEKLY STANDARD:</span></strong><span data-dcnode-id="578" instrument_node=""> I want to go back to a different point. Listening to both of you, I get the sense that there has been a decline in institutions, and particularly those with authority to make statements that are compelling across the country. Alan Wolfe mentioned Kingman Brewster as an authority figure in a certain context.</span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">As I listen to you, though, I wonder if there is not a sort of contrary piece of evidence. I would like for you to perhaps address the Supreme Court as an institution. The court is at the heart of many of these issues that we have been discussing here. But what I am struck by is a decision like </span><em data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Planned Parenthood v. Casey</span></em><span data-dcnode-id="572" instrument_node="">, in which the joint opinion is written by three justices, and it explicitly caused the nation, the contending parties, to come together and to abide, if you will, by this decision.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">The court has confidence apparently to do that. The court had confidence to decide Bush v. Gore as it did. There has been a lot of criticism of the court on these grounds. Ken Starr in fact wrote a book called </span><em data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">First Among Equals</span></em><span data-dcnode-id="566" instrument_node=""> and led a certain kind of criticism of the court. But I guess what I’m asking here is how is it that the court seems not to have suffered a decline? How is it that the court seems to have the confidence to settle all these issues? And by the way, the joint opinion was written, of course, by three Republican appointees of President Reagan and the first Bush.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">And I guess related to that, if I could just ask for your opinion as to whether that center, if you regard the joint opinion in </span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Casey</span></em><span data-dcnode-id="560" instrument_node=""> as a center – by the way, Alan, I would say it’s in the middle and it is incoherent, that particular opinion – (laughter) – but be that as it may – I’m wondering if you think that that opinion will endure, and perhaps also whether the partial birth abortion opinion will endure. Will the court perhaps moderate its course in this area?</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="551"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="555" instrument_node=""> You may know more about this than I, but I’ve always heard that one of the reasons those three judges wrote the opinion in </span><em data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Casey</span></em><span data-dcnode-id="552" instrument_node=""> as they did was that they were feeling explicit pressure from “Bush I” and wanted to really make the point that the court is an independent branch of government. And they made it very, very strongly. Whether that’s true or not, I don’t know.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">John Roberts evidently made a speech just in the last couple of days talking about the need for fewer 5-4 decisions on the court. I think the court’s legitimacy is at stake to the degree that all of its decisions are 5-4, 5-4. I don’t think you can have a country in which Sandra Day O’Connor and now Anthony Kennedy decides all these issues of such importance to people.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="546" instrument_node="">So I think the court is definitely wrapped up in this, but I think if Roberts is serious – and Scalia has made some interesting noises in the last few days as well – we just might see an attempt to really strengthen the court as a kind of above-the-fray sort of entity. I wouldn’t have put </span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Bush v. Gore</span></em><span data-dcnode-id="543" instrument_node=""> as a decision that contributed to that, but then again, what was it going to do? It had to decide.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="537"><strong data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="538" instrument_node=""> I think the legitimacy of the court is both stable and tenuous at the same time, and its legitimacy is challenged mainly at the level of political appointment before the judge or judges get confirmed. But once a judge gets confirmed, most of these justices, at whatever level, are not nearly the demonic figures that people make them out to be during the political process. And I think most justices – again, whether they’re conservative or liberal, however they would identify themselves – take the pedagogic role of the court very seriously. And its ongoing legitimacy, it seems to me, depends in part on taking that role ever more seriously, being above the fray, trying to articulate a kind of historical consciousness: how we got to this decision and why it’s the right decision. That’s a pedagogic role that you don’t find in very many places in American politics.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="532"><strong data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">GREG ALLEN, NATIONAL PUBLIC RADIO:</span></strong><span data-dcnode-id="533" instrument_node=""> I have a question about the possibility of evangelicals disengaging. I wanted to ask you about this thing that’s coming up at the Southern Baptist Convention meeting again this year, for the third year in a row. They’re looking at this exit strategy from public schools. A guy I was talking to in Missouri said that the reason they feel a need for this is that clearly they have a crisis: 88 percent, they say, of kids are leaving the evangelical church at age 18, and they see that what they’re doing is not working. And so you say, why don’t you try to change the public schools? They say, well, we’re frustrated; the separation of church and state makes it really hard to do what we want to do to get the education we want for our kids, so we’re just saying, let’s start a strategy to get kids out of the public schools. They’re asking for all Southern Baptists to do that. So I’m wondering if that is part of this disengagement, do you think, in some sort of way?</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="521"><strong data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">MR. WOLFE:</span></strong><span data-dcnode-id="528" instrument_node=""> It’s an interesting question. It seems like a political strategy, so it would seem to me to be not a </span><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">dis</span></em><span data-dcnode-id="525" instrument_node="">engagement, but an </span><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">en</span></em><span data-dcnode-id="522" instrument_node="">gagement.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="516"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">MR. HUNTER:</span></strong><span data-dcnode-id="517" instrument_node=""> I think it’s an indicator, though. It’s certainly a move from the center to the periphery. To me it speaks of being beleaguered. On the one hand it is an alternative to the public schools, but it is also taking themselves out of the mainstream.</span></p><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="511"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">MR. CROMARTIE:</span></strong><span data-dcnode-id="512" instrument_node=""> Ladies and gentlemen, let’s thank both of our presenters for an excellent discussion. We hope to see you again soon. Thank you, folks.</span></p><span data-dcnode-id="510" instrument_node="">
</span></div><span data-dcnode-id="507" instrument_node="">
