</span><div class="ui text menu share-tools" data-dcnode-id="1443"><span data-dcnode-id="1455" instrument_node=""> </span><a class="item social-link facebook" data-dcnode-id="1453" data-share-description="1. Emerging change" data-share-url="https://pewrsr.ch/3u5Qn6l" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2021/02/18/emerging-change"><i class="facebook icon" data-dcnode-id="1454"></i></a><span data-dcnode-id="1452" instrument_node=""> </span><a class="item social-link twitter" data-dcnode-id="1450" data-share-description="1. Emerging change" data-share-url="https://pewrsr.ch/3u5Qn6l" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2021/02/18/emerging-change"><i class="twitter icon" data-dcnode-id="1451"></i></a><span data-dcnode-id="1449" instrument_node=""> </span><a class="item social-link linkedin" data-dcnode-id="1447" data-share-description="1. Emerging change" data-share-url="https://pewrsr.ch/3u5Qn6l" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2021/02/18/emerging-change"><i class="linkedin icon" data-dcnode-id="1448"></i></a><span data-dcnode-id="1446" instrument_node=""> </span><a class="item social-link print" data-dcnode-id="1444" data-share-description="1. Emerging change" data-share-url="" href="javascript:window.print();"><i class="print icon" data-dcnode-id="1445"></i></a></div><span data-dcnode-id="1442" instrument_node=""> </span></div><span data-dcnode-id="1440" instrument_node="">
</span></div><span data-dcnode-id="1438" instrument_node="">
</span><a class="ui large kicker" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2021/02/18/experts-say-the-new-normal-in-2025-will-be-far-more-tech-driven-presenting-more-big-challenges/"><span data-dcnode-id="1437" instrument_node="">Experts Say the ‘New Normal’ in 2025 Will Be Far More Tech-Driven, Presenting More Big Challenges</span></a><h1 class="ui post small header" data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">1. Emerging change</span></h1><div class="bylines" data-dcnode-id="1421"><span data-dcnode-id="1433" instrument_node="">By </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/janna-anderson"><span class="author" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Janna Anderson</span></span></a><span data-dcnode-id="1429" instrument_node="">, </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/lee-rainie"><span class="author" data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Lee Rainie</span></span></a><span data-dcnode-id="1425" instrument_node=""> and </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/emily-a-vogels"><span class="author" data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Emily A. Vogels</span></span></a></div><span data-dcnode-id="1420" instrument_node=""> </span></header><span data-dcnode-id="1418" instrument_node="">
</span><div data-dcnode-id="1417" id="prc-mobile-toc"></div><span data-dcnode-id="1416" instrument_node="">
</span><div class="post-content" data-dcnode-id="792"><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">A large share of expert respondents in this canvassing expect some already evident trends to extend and expand through 2025. They said the greatest needs include more refined and responsive global governance of the complex systems on which people depend, as telemedicine, telework, tele-learning and tele-life spread. These dependences will increase demands for expansion of secure digital communications systems and will inspire education systems focused on digital literacy.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">As they were responding to this canvassing, many of these experts noted the broad calls in the United States and elsewhere for elimination of social inequities in the aftermath of the killing of George Floyd by a police officer in Minneapolis. They said this incident and others sparked global cries for greater diversity, equality and inclusion that will be a potent force in the coming years. At the same time, some respondents said the near future will also bring more crime and threats to civil liberties, arguing that times of crisis bring out the best and the worst in people.</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1405"><strong data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">Larry Irving,</span></strong><span data-dcnode-id="1406" instrument_node=""> Internet Hall of Fame member and former head of the National Telecommunications &amp; Information Administration, predicted, “There will be considerable change. The new normal will include using technology more extensively for most facets of American life, but particularly for education/remote learning; medical diagnostics; news, information and entertainment; and for business and commercial activities. It simply isn’t realistic to believe that now that folks have found out they can travel less, commute for fewer hours, study or review educational materials on their own time and obtain a medical opinion or diagnosis without sitting for endless hours in a doctor’s office waiting room that they will return willingly to the old normal.</span></p><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">“To meet these new demands on the internet we will see more copious and ubiquitous networks, as consumers won’t tolerate less. You also will see much more continuous monitoring of health metrics, particularly if the suspicions that vaccines for the virus will need to be updated on yearly or half yearly basis hold true. The measured life will become much more real if failure to measure could lead to death. I hope that greater access to copious broadband will allow for a revolution in education as people figure out new pedagogical models to help personalize learning, to allow people to learn at their pace and to allow collaboration by connected students and teachers and professors. Remote learning has great potential benefit for training, retraining and upskilling workers. I believe that medical diagnoses will be more accurate and more timely. I worry deeply about: security, privacy, AI being used to make assumptions, the proliferation of wrong or misleading information, exploitation of the naivete of young audiences. These are serious problems that we haven’t had the will to address.”</span></p><span data-dcnode-id="1401" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1395"><blockquote data-dcnode-id="1396"><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">We’ll be leaning on technology, including artificial intelligence, at an accelerating rate. This acceleration has been going on since the invention of agriculture or the breakdown of the bicameral mind, but it is an exponential process which looks like an explosion to us – whether beneficiaries or victims.</span></p><cite data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">James Morris, professor of computer science at Carnegie Mellon University</span></cite></blockquote></figure><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1390"><strong data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">James Morris,</span></strong><span data-dcnode-id="1391" instrument_node=""> professor of computer science at Carnegie Mellon University, wrote, “We’ll be leaning on technology, including artificial intelligence, at an accelerating rate. This acceleration has been going on since the invention of agriculture or the breakdown of the bicameral mind, but it is an exponential process which looks like an explosion to us – whether beneficiaries or victims. The better/worse question comes down to who is in control, humankind as a democracy, a super-race as a totalitarian system, or (strangely, improbably, but hopefully) the technology itself.”</span></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1382"><strong data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Michael R. Nelson,</span></strong><span data-dcnode-id="1386" instrument_node=""> research associate at CSC Leading Edge Forum, observed, “In the first four months of the crisis, in most countries, we have seen four years’ worth of digitization. We have had the technology for telework, online learning, e-commerce and much more – but now </span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">everyone</span></em><span data-dcnode-id="1383" instrument_node=""> wants to use it, so the inertia and regulations that were barriers are disappearing. And internet policy could move in a better direction as governments realize connecting the unconnected is critical if everyone is going to prosper in the post-COVID-19 economy. Likewise, there will be more public pressure to ensure privacy online. If you spend hours each day in your ‘Zoom room,’ you want as much privacy as you have in your own living room.”</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1377"><strong data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Henning Schulzrinne,</span></strong><span data-dcnode-id="1378" instrument_node=""> Internet Hall of Fame member and former chief technology officer for the Federal Communications Commission, said, “The epidemic has accelerated the awareness of technologies that were previously only known to early adopters. In particular, remote-interaction technologies, whether video conferencing or various virtual reality applications, seem likely to be more commonly used by many employees outside the technology sector. This might allow at least partial work-from-home for many back-office jobs, whether customer-service or business-process jobs. These tools will also likely persist as add-ons to family life, allowing families to stay connected when travel is difficult due to age or lack of financial resources. Better collaboration technologies could improve traditional education and human interaction by making them more accessible even to people who cannot travel or cannot attend a regular classroom.”</span></p><span data-dcnode-id="1376" instrument_node="">
</span><h3 class="wp-block-prc-block-chapter" data-dcnode-id="1374" id="tele-everything-is-embraced"><span data-dcnode-id="1375" instrument_node="">Tele-everything is embraced</span></h3><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">These experts broadly affirm that the adoption of “remote” processes – telework, telemedicine, virtual schooling, e-commerce and more – is growing. They argue that in 2025, there will be more people working from home, reconfigured work spaces, more virtual social and entertainment interactions and fewer forays in public than in 2020. They said they see a new societal focus on the power and performance of technology companies and their leaders. Additionally, they noted that the pandemic proves that anything that happens anywhere can influence life everywhere. The turn to living and working more intensively within digital communications networks shows the value of these complex systems on which billions of people depend and brings more focus on both the upsides and downsides of digital life.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1366"><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Gary A. Bolles,</span></strong><span data-dcnode-id="1367" instrument_node=""> chair for the future of work at Singularity University, observed, “This transition period is ‘The Great Reset.’ It has been suggested for some time that people need to leverage digital technologies more in their personal and professional lives. The pandemic response has accelerated a range of uses of certain technologies.”</span></p><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1358"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Terri Horton,</span></strong><span data-dcnode-id="1362" instrument_node=""> futures strategist and founder and CEO of FuturePath, wrote, “The COVID-19 pandemic has forever changed how we will work, live and play. In particular, COVID-19 exponentially accelerated digital transformation as organizations moved swiftly to harness the power of artificial intelligence platforms and systems across the enterprise. In turn, investment and implementation of AI systems and automation to support operational continuity, pivot to remote work, improve processes, reinvent business models and capitalize on emerging revenue streams accelerated the unfolding of the future of work by five to seven years. Now, as we move through what </span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/featured-insights/future-of-work/from-surviving-to-thriving-reimagining-the-post-covid-19-return"><span data-dcnode-id="1361" instrument_node="">McKinsey &amp; Company refers to as the ‘unfreezing period</span></a><span data-dcnode-id="1359" instrument_node="">,’ many organizations have realized that they were able to shift, pivot and reimagine operational efficiency and agility rather well and were far more resilient than they had imagined. To that end, the new normal is about fully actualizing the enterprise by operationalizing new knowledge and insights, leveraging more AI aimed at growth and heavily investing in people strategy, reskilling and humanizing work, particularly as we move through the decade where Millennials, Generation Z and Gen Alpha will dominate the workforce.”</span></p><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1353"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Cliff Lynch,</span></strong><span data-dcnode-id="1354" instrument_node=""> director at the Coalition for Networked Information and adjunct professor at the University of California, Berkeley, said, “Our world is forever changed. The new normal is not a full return to the old normal, though to the extent that we’ve had to put some basic human needs, behaviors and impulses on hold we’ll hopefully find a way to re-accommodate them in the new normal. There are some changes that are clear in the new normal: Working from home has been widely accepted (along with rather ambiguous and expansive working hours), and that isn’t going to be fully reversed, though there will be certainly some role for offices and bringing people together to work together. And there are issues with work-life balance that are simmering. The implications around workspace and getting people together aren’t just about offices, but about performance spaces of various kinds: college campuses, schools, shopping malls, bars and restaurants, social spaces, etc. This will have huge implications for the future of cities, mass transit, infrastructure, and all the economics, demographics and other things that follow from this. There are massive implications for employers in regard to the workforce available and the jobs available to many people who don’t live in urban centers (keep broadband inconsistencies in mind). We’ll see more robots and automation; they don’t get COVID-19, they don’t unionize, they don’t demand pay raises, among other desirable characteristics. Meat-packing companies are already investing more in these technologies – this will only grow. The tougher things to predict are the second- and third-order effects from these obvious fundamental shifts. The really hard things to predict are how fundamental human behavior changes as we come through this, not just patterns of commerce. I’m trying to figure out how the public might view science and medicine by the end of this. Or how higher education will be perceived. It feels like trust in government is pretty bankrupt, certainly at the federal level. The pandemic experience accelerates the move from physical content carriers (like traditional print books or newspapers) to electronic ones. Due to the stay-at-home orders we have largely lost access to our physical collections (in libraries, museums, etc.) for the duration of the pandemic, and there’s lots of concern about books and the like as disease vectors. This is probably a behavior change that stays. … One can hope that institutions like higher education, the arts and the like will pull through. … A lot of things from the old world won’t come back, at least anytime soon.”</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1348"><strong data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Michael G. Dyer,</span></strong><span data-dcnode-id="1349" instrument_node=""> a professor emeritus of computer science at UCLA expert in natural language processing, predicted, “The major change due to COVID-19 five years from now will have been the acceleration of the already ongoing trend of many transactions moving from physical to virtual, of those transactions that can move. The process of virtualizing business will have been accelerated by the COVID-19 experience. More people will order products online and have them delivered than going to stores to shop. More food will be delivered to the home. Those involved in areas of virtualization will be better off. A larger percentage of the educational experience will be virtual. Many educational institutions (the smaller ones) will have gone bankrupt, but new ones will rise up because students want largely a social educational experience, not one just through a screen. Consider music, already 99.9% of all music is experienced virtually; less than 0.1% of music is experienced by physically listening to physical musicians physically performing in real time. Is the world worse or better because of this fact? Music has been virtual for so long (with the advent of records, then CDs, then thumb drives, then downloading, then streaming) that no one is even old enough to bemoan the transition of music to ‘virtuality.’ Traditions on their way out already will be accelerated, such as viewing films in movie theaters.”</span></p><span data-dcnode-id="1347" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1341"><blockquote data-dcnode-id="1342"><p data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">The transformations we are experiencing in the U.S. are just at their beginning. Any aspect of human life that depends on high-density co-presence is going to change.</span></p><cite data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Ethan Zuckerman, director of MIT’s Center for Civic Media and associate professor at the MIT Media Lab</span></cite></blockquote></figure><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Ethan Zuckerman,</span></strong><span data-dcnode-id="1337" instrument_node=""> director of MIT’s Center for Civic Media and associate professor at the MIT Media Lab, commented, “Recent research suggests that it is unrealistic to expect a ‘polio-type’ vaccine for COVID-19 – take it once and enjoy long-term immunity, instead, we can expect a flu vaccine path forward, which means multiple shots per year and partial immunity. As a result, the transformations we are experiencing in the U.S. are just at their beginning. Any aspect of human life that depends on high-density co-presence is going to change. That likely means prolonged unemployment for people in entertainment, the restaurant business, tourism, hospitality and dozens of other areas. While there may be some upsides for people in white-collar, fully virtualizable industries, on the whole the transition is going to be difficult, draining and economically catastrophic.”</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1325"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">William L. Schrader</span></strong><span data-dcnode-id="1332" instrument_node=""> an internet pioneer, mentor, adviser and consultant best known as founder and CEO of PSINet, predicted, “Governments and corporations will still work from home in 2025. Home offices will be a planned and built-out quiet room for the working parents, and children will respect it during the day. Learners from elementary through continuing education will suffer greatly in the next five years. Higher learning must calculate what to do with their campus when their only income for 72 months is from online services. Do they maintain the ivy? … The internet is the only solution to our future. Increasing simplicity of use for computing power is needed to allow the disenfranchised to avail themselves of all that is available. The parts and pieces that feed that internet are what matter. How they use renewable energy </span><em data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">must</span></em><span data-dcnode-id="1329" instrument_node=""> be addressed. I’d like FTH (fiber to the home, </span><em data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">everyone’s</span></em><span data-dcnode-id="1326" instrument_node=""> home). I expect global warming to worsen materially due to the fascist regimes such as in the U.S., Brazil, Russia and China. This means we need low-cost, high-productivity solar – with battery systems for any home that wants it. Including the data centers that will control 100% of our education, commerce, control of our borders and all other communications for the foreseeable future.”</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1320"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Marc Brenman,</span></strong><span data-dcnode-id="1321" instrument_node=""> managing member at IDARE, a transformational training and leadership development consultancy based in Washington, D.C., wrote, “The pandemic will not be the only influence on life in 2025. There will be more virtual mobility (telecommuting, telemedicine, online shopping, etc.) and our electronic devices will have more bells and whistles. There will be even less privacy. … Artificial intelligence may help make medical diagnoses and selections of treatments better, faster, more accurately. Cars will continue to become safer due to high-tech devices. Privacy will decrease. Hacking, worms, trojans, phishing, etc., will increase. In other words, our devices will ‘bite’ us.”</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1315"><strong data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">Randy Marchany,</span></strong><span data-dcnode-id="1316" instrument_node=""> an information technology security officer at Virginia Tech who has worked with the White House Partnership for Critical Infrastructure Security, commented, “The pandemic has demonstrated the need for ‘universal’ high-speed internet access. Work from home will continue, and school from home may become more prevalent as school staffs’ health concerns can’t be addressed. Internet access has been shown to be a vital component in a post-pandemic world. It’s become a utility like power, water, etc., and will need to be regulated as such.”</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1310"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Michael Zimmer,</span></strong><span data-dcnode-id="1311" instrument_node=""> director of data science and associate professor in the department of computer science at Marquette University, responded, “The ‘new normal’ will have both positive and negative aspects, and these will be unevenly distributed, thus in my assessment things will be generally worse off. Those with jobs and home situations that allow for flexible and remote work and learning might benefit. There will be fewer miles driven on highways, a re-centering of life around the home and micro-local neighborhoods, and technology can help motivate these changes through improvements in video conferencing, remote learning, distributed play and entertainment, etc. But for a larger and more vulnerable segment of society, these same changes will point to their fragile place in the economy. Reductions in public transit schedules might put pressure on their mobility; reduced in-person schooling might put pressure on their ability to ensure their kids are taught and fed adequately, plus make it harder to leave the home to work in jobs that can’t be performed remotely. Continued enhancements to digital learning platforms, reading and writing, creative game-playing and coding might emerge as institutions and platforms try to innovate given the ‘new normal.’ A key worry is the potential expanded role of technology in monitoring and regulating our work and personal lives. Workplace-surveillance technologies are already entering the home as employers seek to monitor and ensure their staff is maintaining sufficient productivity and attentiveness to their work duties. This will only increase in the years to come, combining video monitoring, wearables, and other smart devices that ‘report’ on your attentiveness and activities while working at home.”</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1305"><strong data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Miguel Alcaine,</span></strong><span data-dcnode-id="1306" instrument_node=""> head of the International Telecommunication Union area office in Central America, said, “The status of digital transformation before COVID-19 was directly proportional to a country’s resilience. The digital world has shown us preexisting human conditions on steroids. Unconnected people living in urban areas have been the most affected. Vulnerable groups have been the most affected, as is always the case during catastrophes. In contrast, the better-connected a country is or a people are, the better their resilience. One thing that has changed for the time being as the pandemic evolves is the general awareness is that digital transformation is a must. Even those in politics realize that now. We need to work to take advantage of this window of opportunity, which might close after the emergency abates.”</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1300"><strong data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Jon Stine,</span></strong><span data-dcnode-id="1301" instrument_node=""> executive director of the Open Voice Network, wrote, “The new normal will be an accelerated arrival of trends that were forming pre-pandemic. Examples: The digital divide between rich and non-rich; digital grocery shopping; the failure of retail real estate in first-ring suburbs; remote- and from-home-working; streaming, on-demand, and cord-cutting entertainment. From a technology perspective, we will see the accelerated arrival of video-heavy internet traffic (what was forecast for 2027, even 2025 will be here in 2021) and voice assistance.”</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1292"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Jonathan Taplin,</span></strong><span data-dcnode-id="1296" instrument_node=""> author of “</span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/31420725-move-fast-and-break-things"><span data-dcnode-id="1295" instrument_node="">Move Fast and Break Things: How Google, Facebook and Amazon Cornered Culture and Undermined Democracy</span></a><span data-dcnode-id="1293" instrument_node="">,” observed, “The pandemic’s economic damage is, even now, not well understood. Business travel will be sharply curtailed as Zoom meetings are an acceptable substitute. The airline business will shrink. The retail business will wither, and malls will close, as e-commerce will be an acceptable substitute. Commercial office space will go unused, because many companies will find it more productive to let their employees work from home. All of this may bring some benefits to air quality and even white-collar quality of life, but it will not make up for the continued unemployment and increasing economic inequality. I worry that everything I wrote in my book ‘Move Fast and Break Things’ comes to pass. The tech giants get bigger and more powerful; surveillance capitalism becomes pervasive and our media culture and politics become more Balkanized.”</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Edson Prestes,</span></strong><span data-dcnode-id="1288" instrument_node=""> a professor of computer science at Federal University of Rio Grande do Sul, Brazil, commented, “COVID-19 showed us how dependent we are on technology. Access to the internet as a human right is an urgent subject that should be included in the agendas of all governments as a priority. Although I understand and, in fact, most of us have understood the benefit of technology to restructure the way we do business, access public and private services and get information, some governments do not provide adequate infrastructure for all of their citizens. As they see it, easy access to information and to doing business gives people the power to tear down governments and/or big corporations. Unfortunately, this is a reality in countries that do not put their citizens in the center of their political debates. If nothing is done, we will witness an amplification of existing inequalities and an increase in poverty. I believe that countries with adequate digital services infrastructure and access to the internet will reshape their lives with technology. Across the globe, anyone, independent of gender, abilities or race, can do business, make money, create new jobs and have a comfortable life. It is not difficult to picture a world where digital infrastructure is available and everyone has digital skills. Telemedicine has proved to be a key technology for diagnosing patients with COVID-19 and is crucial to all aspects of health. My mother lives along the Amazon. She receives medical advice via mobile platform. The use of digital tools allows governments to make agile decisions. Restaurants and supermarkets are now rethinking their business models and delivering food and services. Even gyms are helping some people to get in shape via internet.”</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Mirielle Hildebrandt,</span></strong><span data-dcnode-id="1283" instrument_node=""> expert in cultural anthropology and the law and editor of “Law, Human Agency and Autonomic Computing,” predicted, “The architecture of ‘office space’ will probably evolve towards:</span></p><span data-dcnode-id="1281" instrument_node="">
</span><ol data-dcnode-id="1272" type="1"><li data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">a space to meet up for an appointment,</span></li><li data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">to have a meeting,</span></li><li data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">to withdraw, or to</span></li><li data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">have access to high-quality video conferencing.</span></li></ol><span data-dcnode-id="1271" instrument_node="">
</span><p data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">“This will have consequences for the distance between office or workspace and home, with a shift away from urbanisation. People may prefer to move to what used to be called ‘the countryside,’ to have a more quiet life in less densely populated areas – while being able to connect with work/family/friends via myriad applications, both to get work done and to develop and maintain connections within their private sphere. I think that there will be simultaneously: 1) a much greater appreciation and awareness of the nondigital (real-time, embodied proximity, gardening and small-time farming, walking and biking, home cooking, enjoying the stillness that is largely absent in urban hubs) and 2) a much greater appreciation and awareness of the connectivity and productivity offered by various applications, with less attention to false promises and more attention to issues of security, privacy, nondiscrimination, freedom of information, but also much more attention to applications that are generative of new products and services without being focused on extraction. Let’s hope that there is 1) a strong, democratic government that takes care of basic goods (economic security and access to good-quality education and health care), while otherwise sustaining a level playing field for businesses, and 2) a fairly-instituted marketplace that thrives on creative (not destructive) invention and a new understanding of the idea of ‘added value.’”</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1264"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Philip M. Neches,</span></strong><span data-dcnode-id="1265" instrument_node=""> lead mentor at Enterprise Roundtable Accelerator and longtime trustee at California Institute of Technology, commented, “The impact will vary greatly. Some people, particularly those in tech-heavy fields, will be better off, earning more, working from home, commuting less. Some fields will be permanently scarred. Business travel will not recover to pre-pandemic levels. Leisure travel will not fully recover. Hotels, airlines, rental car agencies, travel agencies, etc., will remain depressed. Many jobs in these industries will be permanently lost. Many restaurants and retail establishments will be permanently closed, with resulting loss of jobs. Demand for oil and gasoline will not recover to pre-pandemic levels. Nor will sales and service of automobiles. Construction and infrastructure will grow, some by new demand, some by government stimulus to rebuild old infrastructure. Demand for commercial real estate will remain depressed, particularly for Class A office space. Residential real estate demand in the suburbs and exurbs will be strong, at the expense of core cities. Many businesses will change to mostly work-from-home, cutting down on commuting and giving workers up to two hours per day more time for family and other pursuits. Schools will continue to offer more than half of all instruction remotely. All-remote college-prep and university programs will start to emerge at price points more favorable to the bottom 90%. The debate between whether we want a service society or a surveillance society will be in full swing. Also, serious debate about breaking up the Big Four (Amazon, Facebook, Google, Microsoft) will ramp up.”</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1259"><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">R. “Ray” Wang,</span></strong><span data-dcnode-id="1260" instrument_node=""> principal analyst, founder and CEO of Silicon Valley-based Constellation Research, predicted, “In general, the view on technology will go from negative to even. The trade-off between privacy and health, privacy and security, privacy and convenience remain to be determined. We saw an ideological shift on how much privacy we were willing to give up to government control for the promise of better health via contact-tracing app adoption as well as location data being used in aggregate to track spread. The public will probably become more vigilant on how privacy data is being used for public good. Given social distancing, potential labor disputes and lawsuits for safety for return to work, fear of density, we can expect more work to be automated. Machine learning, automation and artificial intelligence adoption will increase as we find ways to reduce human contact and mitigate risk. Autonomous vehicle adoption will increase as workers fear mass transit, an exodus from the cities to the suburbs and exurbs picks up pace due to COVID-19. New networks of delivery and development around regional hubs will emerge. The big fear is that too much concentration of power in one individual’s hands will be possible, as the power of tech increases the ability for one individual to scale. We will see that with the power of automation, bots and AI. We need to ensure that checks and balances are in place.”</span></p><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1254"><strong data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Gus Hosein,</span></strong><span data-dcnode-id="1255" instrument_node=""> executive director of Privacy International, based in the UK, said, “People’s sense of space will become interesting. Will they want restaurants, cinemas and outdoor spaces more because of being locked in; or will they have enjoyed not having to travel for events as much? That will determine the tech that shapes markets for some time to come. I’m not sure that people will rush to queue again or to be in shops and other establishments, but when they do it will be more worthwhile. I also think that there’s a limit to logistics and efficiencies for every person everywhere to be able to receive deliveries and personalisation.”</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1249"><strong data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Laurie L. Putnam,</span></strong><span data-dcnode-id="1250" instrument_node=""> an educator and communications consultant, commented, “We need to stop looking for a ‘new normal,’ as though life will find stasis after COVID-19 is tamed. Eventually, yes, the virus will become manageable, but life will remain in flux. This pandemic is demonstrating that we must learn to adapt or we will not survive. Think of it as a trial run for the crisis of climate change. What we need to look at now are the hard truths the virus is exposing: that some of our social structures and technologies can work and others are failing. Some of our digital tools are supporting our society and others are breaking it down. Tech tools can be repaired and social structures can be rebuilt, but we have to do that work collectively, and it will take time. I hope we take a hard look at what we can do better and differently, because the problems COVID-19 has exposed will not vanish with a vaccine. Our technology, and our relationship to it, will have to evolve.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">“I hope we will retain the best (and fix the worst) tech tools for flexible learning and work and find positive ways to remix our physical and digital experiences of life. I hope we will realize that maybe we don’t need to consume as much, and our technologies can be more sustainable than disposable. I hope we will face, head on, the effects of digital misinformation and surveillance, and take serious steps to protect ourselves. I hope more of us will understand that tech businesses driven by financial returns need to be held accountable for harms their products inflict. And I hope more of those leading and funding the tech businesses will process how their impact on society goes beyond the bottom line. These are hopes we can make real if we care to. At some point, technology leaders and the political leaders who fail to regulate them (because, the money) will face a reckoning. In the meantime, serious damage is being done to our individual well-being and to the health of our society, and it’s going to take a long time to repair that damage.”</span></p><span data-dcnode-id="1245" instrument_node="">
</span><h3 class="wp-block-prc-block-chapter" data-dcnode-id="1243" id="humans-yearning-for-convenience-and-safety-fuels-reliance-on-digital-tools"><span data-dcnode-id="1244" instrument_node="">Humans’ yearning for convenience and safety fuels reliance on digital tools</span></h3><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">The experts canvassed here note that the pandemic has rearranged incentives so that consumers will be more willing in the coming years to seek out smart gadgets, apps and systems. They expect this will speed up adoption of new education and learning platforms, rearrange work patterns and workplaces, change family life and upend living arrangements and community structures. Here are a number of the expert responses speaking to these issues:</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1235"><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Carol Woody,</span></strong><span data-dcnode-id="1236" instrument_node=""> technical manager for the Cyber Security Engineering (CSE) team at Carnegie Mellon University’s Software Engineering Institute, predicted, “By 2025 there is much less fear of technology by the typical citizen. With the sudden shift, people in church, school, office, family, friends are all using more technology and recognizing its limitations as well as its value. There is a growing recognition that the tools can be improved, and that using them is not magic, but requires some investment of time. Privacy has been slipping away slowly for a long time, and this is not widely recognized as a bad thing. Too many artificial constructs have been put in place to respond to privacy efforts like the Health Insurance Portability and Accountability Act (HIPAA) that are seen to only hinder information sharing and create added paperwork and delay for every step. Adoption of new technology for its own sake seems to be weakening. Buying the next version does not seem to be an automatic need. Autonomous vehicles can create a public transportation system that is door-to-door and not limited by bus routes and the cost of drivers. This will help with an elderly population who should not drive and are not mobile enough to walk blocks to a bus stop. Smaller vehicles that support social distancing limitations are feasible. More effective online meeting environments that are widely known and supported will make connecting remotely easier. More people will move to where they want to be instead of having to move to where the job is based. I am also looking forward to better ‘out-of-the-box’ solutions for phones, cameras, connections and other Internet of Things products that support better security of solutions to reduce the risk of compromise.”</span></p><span data-dcnode-id="1234" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1228"><blockquote data-dcnode-id="1229"><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">With adequate access to broadband, new technology, the right regulatory environment and concerted investment and innovation, the new normal could mean more-personalized and intensive education for more students and better learning outcomes.</span></p><cite data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Beth Noveck, director, NYU Governance Lab and its MacArthur Research Network on Opening Governance</span></cite></blockquote></figure><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1223"><strong data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Beth Noveck,</span></strong><span data-dcnode-id="1224" instrument_node=""> director, NYU Governance Lab and its MacArthur Research Network on Opening Governance, observed, “Much will depend on governance and leadership, especially who is elected in November 2020, but the hope is that the shift to more online work, online education, online services and online life will lead to significant innovation. This could create the opportunity for dramatic and expanded upskilling and the preparation of more workers for a new future of work. It could create the opportunity to personalize and customize education for students and deliver better learning. The shift to more work online and less travel could have a significant impact on climate change and carbon emission reductions. But all of these positive possibilities depend entirely on political leadership and a willingness to invest in innovation. The need for more socially distant ways of learning, working and playing could create the impetus for positive change if the public and private sector choose to make the right investments in this future. With adequate access to broadband, new technology, the right regulatory environment and concerted investment and innovation, the new normal could mean more-personalized and intensive education for more students and better learning outcomes.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">“Imagine every kid being able to have a tutor – both human and AI – available to her at all times. It could mean better access to telehealth and tele-mental health services, where people can get cheaper and better access to care from home. It could mean a future where more workers are trained for jobs that can be done at a distance, which will create opportunities for good work, a living wage and safer working conditions. But with a shift to life online, we will have to make new plans for and redesign our urban infrastructure. We will have to rethink the design of public transit and public buildings. We will have to come up with new ways to create civic engagement and civic cohesion. And we will have to ensure that people have access to the tools and the skills they need to take advantage of these opportunities. There’s so much promise and far too little political will to realize it.”</span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1215"><strong data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Barry Chudakov</span></strong><span data-dcnode-id="1216" instrument_node="">, founder and principal of Sertain Research, said, “My hopes for tech-related changes that might make life better in the coming years are focused on reimagining education. With massive funding for reeducating and bringing innovation to the educational process, we can change the world for good in untold ways. As XPRIZE Chairman, Peter Diamandis, describes it, reimagined education means rapid reskilling on a continuum of constant education. The notion of high school and four years of general (college or university) as preparation for the new world is hopelessly outdated. In a tech-enabled world, learning is a lifelong endeavor and we need to structure our lives and education accordingly. Embracing interconnectedness, we can use the dynamics of technology, and the data that drives technology advancement, as a paradigm to reimagine education. </span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">“To do so, it is useful to recall that our educational paradigms were built on the alphabetic order of linearity, one-at-a-timeness, patriarchy and holy books. Without abandoning that order, we must reimagine education as an ongoing interactivity with the real world, so our perception of the real world is clear, accurate, undistorted by cultural, religious or political misrepresentations. As our engagement with the real world becomes increasingly data-driven, and as our datasets become impracticably large, education reimagined must include universal data and computational literacy. This is more or less standard operating procedure in China, which has made it a national initiative to bring 5G to everyone in China by 2025. </span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">“We need a broad swath of our population – not a slim class of techno-overlords – who understand the potential and biases of algorithms, machine learning, quantum computing, artificial intelligence, the Internet of Things and qubits. At the same time, we must reimagine education to include a foundation of tool awareness and meta realization. Now that our tools are more powerful and pervasive than ever, we must build curriculum focusing on the basics of their logics and the ability of tools to influence (and distort) our perceptions. This is as fundamental to education as weightlessness training is to become an astronaut. Our tools and technologies are now more sophisticated, and their influence in our lives is now too pervasive to adopt a use-it-and-ignore-it approach. Ignoring the effects of our tools on our minds and behaviors ensures we will become their slaves, not their masters.”</span></p><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1204"><strong data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Frank Kaufmann,</span></strong><span data-dcnode-id="1205" instrument_node=""> president of the Twelve Gates Foundation, said, “The great many (far greater on balance) positive tech-related developments that arose include, to briefly name only a few:</span></p><span data-dcnode-id="1203" instrument_node="">
</span><ul data-dcnode-id="1186"><li data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">International cooperation in science and medicine sharing and in general information sharing.</span></li><li data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">The rise in the understanding of humans as human, and not as Balkanized by gender, race, nationality, class, age. Tech cooperation is ‘division-divisive’ blind, seeking to protect and promote health and life and such. This is a great gift from the pandemic.</span></li><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Superfluous and unnecessary time away from family love was unavoidably diminished during the lockdown.</span></li><li data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">The extreme wastefulness of bogus ‘business travel,’ ‘late nights in the office’ and all other fake, artificial and disingenuous excuses to not tend to family relations conscientiously and sincerely was undermined by the lockdown.</span></li><li data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Commutes – the two-, three-, five-hour chunks of life lost daily – were recognized as wastes of life and wastes of natural resources.</span></li><li data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">The lockdown allowed Earth’s environment to recover. We learned about normal, human, daily impact on Earth’s environment from the lockdown and the tech substitutes we quickly put in place to sustain our productivity.</span></li><li data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">The flexibility of tech to quickly compensate for those important, needed and desired parts of life were rapidly discovered and developed: banking, telemedicine, dance lessons, time with friends and colleagues.</span></li><li data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">The limitations of physical geography were dismantled as people discovered a ‘wider circle of friends,’ a more available chance to ‘renew old friendships’ and the chance to bring in or attend professional speakers; all arose rapidly during the COVID-19 lockdown.</span></li></ul><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">“This is a quick, superficial and undeveloped list. But millions quickly discovered massive promise to rewrite life in the world in positive and enduring ways. I can only imagine the vast explosion of tech discoveries, new uses and advances to increase exponentially and expand on this very trend which has triggered a new, more friendly human-tech interface and integration. Prior to COVID-19, people were intuitive about the personal use of tech for convenience and efficiency. But because what the lockdown primarily undermined was our softer humanness related to creative dreams, and love and friendship, the benefits of tech entered into a new relationship with us; how tech supports our ‘humanness’ (we like to dance, we like to sing), not just our convenience and efficiency (how do I get the best seat on the plane, how do I know when an Amazon price has dropped). Humans, being natural entrepreneurs and profit-seekers, should see an infinite horizon to develop a hitherto untapped universe of tech-human relations and integration. A new universe was born through this.”</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1178"><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Perry Hewitt,</span></strong><span data-dcnode-id="1179" instrument_node=""> an executive with Ithaka, an organization advancing global higher education through innovative use of digital technology, commented, “My greatest hope would be that technology will enable high-quality, engaging and affordable online learning at scale. For higher education in particular, I hope we can use technology effectively to deliver, measure and credential learning in a way that is meaningful for individuals, beneficial to communities and recognized by employers. Few would dispute that the current model is broken from a cost perspective, or that the benefit of one-time, on-campus learning is an effective approach for a 21st-century workforce. We now have enough examples of universities like Georgia Tech to know we can deliver value at a lower cost; how can we extend this to greater and lesser public universities before access to education, like health care, is in the hands of employers?”</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1173"><strong data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Alex Halavais,</span></strong><span data-dcnode-id="1174" instrument_node=""> associate professor of critical data studies, Arizona State University, predicted, “Our memory of the pandemic will be short, but the impact on our institutions will be long. The pandemic was a catalyst for changes that had long been in play and it has sent unbalanced institutions toppling. Nowhere is that more clear than in education. Schools and universities find themselves reeling, and it seems they have difficulty looking more than a few weeks into the future. In terms of school, it has made parents rethink the role of school and think seriously in a way that they have not before about the value of schooling. Is it a place for learning fixed curricula? Is it a place for learning to socialize in certain ways? Is it a way to care for children while the parents work? It is, of course, all of these things and more, but the sudden cancellation of school for many parents has led them to think about what functions it plays in their lives and what alternatives there may be. It has also, by necessity, made them confront the reality of online school. For parents who have the privilege to now work from home, they have entered into a new set of expectations around parenting while working. Just as work-from-home has gained more acceptance (and, indeed, as many employers and workers find that they can be at least as effective working from home and that this reduces many of the traditional expenses of employers), they are thrust into an environment in which they must also be teachers and caretakers throughout the day. These new stresses, nonetheless, have opened up opportunities for those who offer online learning experiences for young students. The shift has been rapid, and while there will certainly be a swing back toward in-person teaching and activities, many will come away from the current changes with more robust online offerings that will continue through to 2025. Indeed, as the children of more well-off and professional parents are more likely to stay away from school as it reopens in 2020, I think we will see a refocusing of financial resources toward online learning at that level. This will come through at the university level as well. A number of universities were already well-situated to transition to online and ‘flexible’ learning. The latter will be the legacy of the pandemic for universities and further accelerate the concentration of the industry in the U.S. By 2025, a much larger number of students will attend universities in more flexible ways, taking the majority of their courses online. Much of this was a move that was already underway. As a people in a larger number of professional roles are expected to work from home or at a distance, online education will better prepare them for that role.”</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1168"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Amy Zalman,</span></strong><span data-dcnode-id="1169" instrument_node=""> global futurist and founder and CEO of Prescient, responded, “For those who have access to digital technologies in the first place – the global middle class – such technologies seem poised to be more pervasively part of the daily weave than at present. Daily work routines, forms of entertainment and peer connection and security will be augmented by the same technologies as at present, but more intensively. As a global collective, our current focus on data analytics of all sorts to help us navigate the present crisis will make its way into the way many more people experience the world, even if they were not analytics focused previously. For example, I may be accustomed to checking the weather and the stock market now, but might add to my day five to 10 other near-term trend lines to try to understand and help me navigate whether I should see people, go to a particular location, buy tickets to an event, start worrying about my employment status, enroll my child in college, etc.”</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Aram Sinnreich,</span></strong><span data-dcnode-id="1164" instrument_node=""> a professor of communication studies at American University who specializes in law and technology, commented, “As harmful as it has been to our health and our economy, I think COVID-19 has the potential to inspire significant change for the better in America and throughout the world at large. It exposes the limitations of authoritarian political regimes. It reveals the human toll of disinformation and science denialism. It has illuminated the limited utility of strong intellectual property controls, such as the patents preventing scientists from developing effective therapies. It has shown us how effectively cities can function without automobile traffic. It has revealed to us how delicate and costly our global supply chains are. It has shown us how essential online community is and how important it is that we close gaps in accessibility and expertise. It has revealed how bias may be engineered into digital communications platforms. It has shown how useful economic safety nets – both existing ones, such as Medicare, and prospective ones, like health care for all and universal basic income – are in maintaining the peace and stability of a large, complex society. I believe we have an opportunity to rethink our social, technological, economic and political values in light of these revelations, and that our responses to these crises may contribute to making the world more equitable, and to raising the quality of life for all humans. I hope for more accessible and egalitarian online communications. More distributed and efficient global supply chains. Open-source solutions for medical research. Accountability for online disinformation. More focus on engineering privacy into digital platforms. Less tech-solutionism and more holistic approaches to understanding sociotechnical challenges.”</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1158"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Narelle Clark,</span></strong><span data-dcnode-id="1159" instrument_node=""> a longtime network technology administrator and leader based in Australia, said, “I hope that we can develop privacy-respecting apps that can support a populace that is weatherworn and damaged by the pandemic. One major need is apps that assist in supporting mental health that have a basis in science and assist in procuring goods and services without disclosing rafts of private data without consent and for no good purpose. Telehealth uptake will continue and be delivered in increasingly reliable ways with vastly better diagnostic tools via image-recognition and access to AI and bigger data sets for machine learning. Hopefully this will be done in privacy-protecting ways. The pandemic has also driven open sourcing of vital medical technology so that local people can repair and replace worn parts of critical items such as ventilators – I hope this opening up of access continues. The closed-supply-chain approach where the supplier controls vital medical equipment from origin to end of life has worked against the skilling up of local biomedical engineers, and it has driven up prices of vital equipment when things could have been simpler and easier to support locally with local know-how and locally sourced parts. Opening up of educational resources in order to stimulate the economy may improve access to knowledge and information. Perhaps we will see an increase in trust of scientific institutions and actual science because pandemics expose the need for fact-based approaches.”</span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1153"><strong data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Soraya Chemaly,</span></strong><span data-dcnode-id="1154" instrument_node=""> an advocate and activist with The Representation Project working to change attitudes about gender norms, predicted, “There will be technology related to better health outcomes, built with a greater awareness of how biases infuse standards, diagnoses, remedies and solutions, could make life better. Also, given the pandemic’s effects on all kinds of travel, tech that creates new and different forms of community-building and travel both might evolve in ways it might not have for years. Technology that enables more widespread political engagement and counters some of the more primitive forms of voter suppression. Reproductive health care technologies, biotech, might also benefit from the necessary restraints on medically unnecessary, paternalistic and oppressive in-person consultations for women. Additionally, I don’t see how American colleges and universities can sustain their economic models without long-term adaptations that incorporate better remote learning.”</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1148"><strong data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Donald A. Hicks,</span></strong><span data-dcnode-id="1149" instrument_node=""> a professor of public policy and political economy at the University of Dallas whose research specialty is technological innovation, observed, “Ever more opportunities to participate in an economy are being revealed by the current quarantine requirements. Organizations’ ‘footprints’ are likely to be permanently reconfigured to allow some portion of their employees to eliminate the time and cost of commuting from their budgets and still develop a career using new technologies. This will reduce the barriers to participation for young parents, the disabled, the elderly, etc. With a broader and more diverse set of skills available, one can expect new varieties of entrepreneurship and new ties between larger organizations and heretofore ‘fringe’ talents left unattached to organizations previously. From these expanded human capital resources, expect new goods and services, new business models and new definitions of ‘career.’ And, especially, a new openness to alternative ways to connect to an economy. This will require a new breed of leadership, new models for continuing education, etc.</span></p><span data-dcnode-id="1147" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1141"><blockquote data-dcnode-id="1142"><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Organizations’ ‘footprints’ are likely to be permanently reconfigured to allow some portion of their employees to eliminate the time and cost of commuting from their budgets and still develop a career using new technologies. This will reduce the barriers to participation for young parents, the disabled, the elderly, etc.</span></p><cite data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Donald A. Hicks, a professor of public policy and political economy at the University of Dallas whose research specialty is technological innovation</span></cite></blockquote></figure><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1139" instrument_node="">“Digital technologies, not unlike all previous technologies that have changed the world, will succeed as they become more invisible, part of the leitmotif of an evolving society/civilization. Think of electricity, wireless connectivity, etc. Without anyone noticing it except in the rearview mirror, the intangible share of U.S. investment (value-added) overtook the tangible share by the early 1990s, a quarter-century ago! (See page 40 of]Haskel, Jonathan, Westlake and Stians’ ‘</span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gatesnotes.com/books/capitalism-without-capital"><span data-dcnode-id="1138" instrument_node="">Capitalism Without Capital</span></a><span data-dcnode-id="1136" instrument_node="">,’ Princeton University Press.) The resulting recombinant innovations have expanded exponentially ever since and can be expected to continue to do so. There are always trade-offs associated with technical advances. Some people, places and activities will be left behind on any such journey. However, in all previous technology transitions, the net benefits have made the changes worthwhile. There have always been increases in health, wealth and welfare, although some of these changes are not appreciated until well after the fact. Political economist Joseph Schumpeter’s work is a good guide here.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">“Expect significant opposition to changes that are unfolding from the American Medical Association, media and political jurisdictions from local to federal, as new technologies redistribute power and resources. The real worry is what can happen to individual liberty when new technology is in the hands of ruthless regimes such as those in Russia, China, Iran, North Korea, etc. – or even malign groups in Western nations like our own. Digital technologies in and of themselves are neutral forces; their potential negative impacts become apparent when put to malign use. Over the long term, however, new technologies will inevitably erode the power of even the most tyrannical regime as their capabilities are undercut and/or eliminated.”</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1127"><strong data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Holmes Wilson,</span></strong><span data-dcnode-id="1128" instrument_node=""> co-director of Fight for the Future, said, “My biggest hope is that a developer revolt and antitrust campaign against Apple will begin to end the period of intense centralized control that the iPhone and App Store ushered in. When you trace it back, most of the problems we’re seeing with persistent monopoly power in the tech space really accelerated in the late 2000s with the rise of the iPhone. Mobile devices made computing vastly more accessible, but they also vastly increased the barriers to entry, introducing new gatekeepers, less organic discovery, higher-stakes winner-take-all dynamics, a much more constrained space for digital creation and a tendency towards pure consumption or highly mediated creation. I’m fairly sure that if you remove the underlying bottleneck of the app store and make mobile app development and distribution work more like desktop apps or the open web, this will start to erode. I also hope advances coming from the cryptocurrency space make it more possible to build complex modern applications on peer-to-peer networks, and that just as computing moved from the web to mobile, computing will move from centralized clouds to peer-to-peer networks built with free and open source software.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1120"><blockquote data-dcnode-id="1121"><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">My final hope is that the trend line from Occupy Wall Street and the Arab Spring to #BlackLivesMatter to #MeToo to the Hong Kong protests to #DefundThePolice continues and the internet continues to create ever more miraculous social movements that achieve shocking new milestones in how they’re able to change debate and rewrite rules of public discourse.</span></p><cite data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Holmes Wilson, co-director of Fight for the Future</span></cite></blockquote></figure><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">“My final hope is that the trend line from Occupy Wall Street and the Arab Spring to #BlackLivesMatter to #MeToo to the Hong Kong protests to #DefundThePolice continues and the internet continues to create ever more miraculous social movements that achieve shocking new milestones in how they’re able to change debate and rewrite rules of public discourse. … The days of mandatory commuting for three or more hours, five days a week just to be in an office are behind us. Office presence will start to be more optional, partial, negotiated and used sparingly in the moments where it matters most, even after we all have been vaccinated. Supermarkets have always been a disaster for human health and well-being. I expect that many people who have transitioned to grocery delivery services, community-supported agriculture groups and outdoor farmers markets will only sparingly return to supermarkets, and the groceries delivered will increasingly come more directly from suppliers. For high-end and environmentally conscious consumers, in season at least, food will increasingly come directly from farmers. This will take some time, but COVID-19 accelerated it.”</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1111"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Meryl Alper,</span></strong><span data-dcnode-id="1113" instrument_node=""> a professor of communication studies at Northeastern University expert in children and families’ uses of technology, wrote, “My hopes center on new forms of care and mutual aid that technology has the potential to enable. I hope that a greater percentage of people telecommuting to work leads to more value placed on child care, elder care and personal care attendants. This includes higher pay within the profession and opportunities for professional advancement, particularly as these workers are more likely to be women of color. I also hope that non-disabled people develop a greater appreciation for and prioritize the skills and talents of disabled people, and in doing so, extend the opportunity to telecommute from home to this population beyond a period in which it is deemed necessary for the non-disabled. Post-coronavirus, more people will be living with the chronic health conditions that it increasingly appears come with surviving the virus. It is my hope that broader disability solidarity forms online and offline in response, a solidarity that is critical of all the ways in which technological ‘innovation’ has also generated disabling conditions, especially for those already marginalized by their race, ethnicity, sexuality, gender and country of origin.”</span><strong data-dcnode-id="1112"></strong></p><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1106"><strong data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Melissa R. Michelson,</span></strong><span data-dcnode-id="1107" instrument_node=""> a professor of political science at Menlo College, commented, “People will be more able to access health care and other services without needing to find transportation. There will be more events online, such as dance performances, musical performances, etc. There will be more access to events that used to be expensive and require tickets and travel to broader swaths of Americans.”</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1101"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Michael Muller,</span></strong><span data-dcnode-id="1102" instrument_node=""> a researcher for a top global technology company whose work is focused on human aspects of data science and ethics and values, said, “The privileged among us are developing new skills in working virtually or remotely. These skills with technologies of virtuality will allow us to live where we want, rather than being constrained by proximity to workplaces. I hope that conferences and other gatherings will continue to allow remote participation. If we can reduce travel and lodging costs for conferences, then we can include people from poorer countries and poorer institutions. We need the benefits of their ideas! And they need the opportunities of full participation.”</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Stowe Boyd,</span></strong><span data-dcnode-id="1097" instrument_node=""> a consulting futurist expert in technological evolution and the future of work, wrote, “We frame the discussion about ‘working from home’ in the wrong way. It’s not that we’re ‘working from home,’ which many of us did relatively regularly before the plague. It’s that we are not working at the office, at all. Unlike some, I don’t think that the new norm will be zero time in the office, it will be minimum office. Research has shown that the people who are most productive and engaged are those who spend 60% to 80% working out of office. That translates to 20% to 40% in the office. So, ‘remote’ – </span><em data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">isn’t</span></em><span data-dcnode-id="1094" instrument_node="">, it isn’t remote, I mean, psychologically or emotionally. Management has wised up and seen that what was formerly considered impossible, isn’t. Connecting the dots, businesses are likely to consider downtown office space a costly indulgence rather than a necessary requirement, so they will decrease that cash outlay as an obsolete cultural belief. This will translate to increased use of communication and community-cation technologies: most obviously video conferencing, but work technologies across the board will be more widely adopted and provide a basis for deep analytics and AI underlying the post-normal workspace (no longer a ‘workplace’). These techniques will see more of the work of managers being taken up by the machinery of what can best be considered business-operating systems. There was a time when a customer on one cell network could not text message someone on a competitor network. That was overturned by legal requirements from governmental bodies. Today, if I am a user of Slack and you are a user of Microsoft Teams, we can’t share a chat room. This is an artificial barrier to cross-company collaboration, and I hope that the (minimal) technological barriers to fixing this will be overcome, perhaps by government intervention.”</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1088"><strong data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">Howard Rheingold,</span></strong><span data-dcnode-id="1089" instrument_node=""> an internet pioneer expert in exposing the social and political implications of modern communication media, said, “Several changes that have been forced by the pandemic could lead to positive trends:</span></p><span data-dcnode-id="1087" instrument_node="">
