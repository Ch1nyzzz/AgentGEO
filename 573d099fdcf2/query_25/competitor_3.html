</span><ul data-dcnode-id="1067"><li data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Face-to-face conferences where thousands of people fly hundreds and thousands of miles to gather together will disappear or be severely reduced, with online conferences often substituted – thus reducing a significant amount of carbon pollution.</span></li><li data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">From my own experience, working from home can be more productive, but total absence from the office can be counterproductive. However, if one in four office workers worked from home one day out of four, traffic and carbon pollution reduction would be significant.</span></li><li data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">In the absence of federal leadership and a cacophony of state and municipal leaderships during the COVID-19 pandemic, </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/posts/mutual-aid-power-34918526"><span data-dcnode-id="1081" instrument_node="">mutual aid – often facilitated online</span></a><span data-dcnode-id="1079" instrument_node=""> – is thriving. Perhaps that will continue.</span></li><li data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">With more and more people socializing online, perhaps it is an opportunity to build out a ‘green space’ of social networks and online communities outside the paralyzing and toxic enclosure of Facebook.</span></li><li data-dcnode-id="1068"><span data-dcnode-id="1075" instrument_node="">Teaching online is not a matter of delivering your normal curriculum via videoconference but instead is a powerful pedagogy when it is done right. Universities without endowments are in trouble, and unfortunately, many will go under if they can’t get tuition-paying students back on campus soon. I </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/posts/34742477"><span data-dcnode-id="1074" instrument_node="">taught blended courses</span></a><span data-dcnode-id="1072" instrument_node=""> at Berkeley and Stanford for 10 years: three hours of face-to-face each week combined with six to nine hours online during the week between classes. I hope to see more online socializing outside of Facebook. More telecommuting. Fewer face-to-face conferences. Better preparation for, and awareness of, potential pandemics. More </span><a data-dcnode-id="1070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//peeragogy.org/"><span data-dcnode-id="1071" instrument_node="">peer learning</span></a><span data-dcnode-id="1069" instrument_node=""> online. I am concerned about facial recognition, universal CCTV surveillance, hacking of essential services and uses of AI in warfare and law enforcement.”</span></li></ul><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Marjory S. Blumenthal,</span></strong><span data-dcnode-id="1063" instrument_node=""> director of the science, technology and policy program at RAND Corporation, observed, “The pandemic has shifted the balance in favor of tech-mediated interactions – more online shopping, more delivery, more telework, more telehealth, more uses of video in socializing (and work), more online learning (including about how to troubleshoot when things go wrong). … Although today’s apps relating to contact-tracing leave room for improvement, in five years there should be more meaningful tech support for coping with infectious disease in a privacy-preserving way. And five years should be enough time to redress the uneven access to the broadband capacity that is needed to achieve the benefits listed above, as well as to develop bandwidth-conserving approaches. Finally, other kinds of technologies (involving physical equipment and facilities) should be more available to provide safety to people whose jobs require physical presence in a shared space, as well as at least some reengineering of how those jobs get done.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1055"><blockquote data-dcnode-id="1056"><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Today’s jokes about the three most often-heard words being ‘you’re on mute’ demonstrate that everyone has moments of needing to adapt to technology, and more thought about design that anticipates or at least adapts to different behaviors would be good</span></p><cite data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Marjory S. Blumenthal, director of the science, technology and policy program at RAND Corporation</span></cite></blockquote></figure><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">“I expect progress to facilitate more – and more extensive – use of technology by people with differing abilities (both cognitive and physical). Today’s jokes about the three most often-heard words being ‘you’re on mute’ demonstrate that everyone has moments of needing to adapt to technology, and more thought about design that anticipates or at least adapts to different behaviors would be good – such design is certainly possible. There are also opportunities to use tech to help people who feel disempowered have a voice, beginning with people in positions on the lower economic rungs who may hesitate to speak up about workplace concerns or to help those knocked off their anticipated paths by the pandemic to find another path. Perhaps today’s crisis will also help to achieve more of the long-touted potential of open data and open systems (especially if some of the pandemic-motivated systems and ventures endure). From today’s vantage point, the addictive qualities of technology may have been exacerbated by extended stay-at-home routines, something that may endure even with less physical distancing. Meanwhile, the challenges of proliferating modes of deception (deepfakes, bots, fake news and so on) call for new mindsets that will take time and likely greater public awareness to set in. Tech companies have choices to make; we can already see some responsiveness to policymaker and public-interest advocate concerns.”</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1047"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Andy Opel,</span></strong><span data-dcnode-id="1048" instrument_node=""> professor of communications at Florida State University, said, “The virus has revealed the deep inequalities in our economic system. This embodied learning at a global scale is going to prompt a rearrangement of economic rewards, recognizing and rewarding what is widely seen as ‘essential’ and putting limits on speculation and the financialization of life that has played such a powerful role in the widening inequality of our time. The power of virtual collaboration is being felt in meaningful ways, but, at the same time, there is a deep longing for physical presence and intimacy that cannot be replaced. I don’t think the changes in the role of digital technologies will be as profound as the recognition of the power of personal interaction, the shared experience of an audience, or the breaking of bread with family, friends and colleagues. Technology has the potential to make our lives more efficient, reducing energy consumption and fostering a connection to how our daily decisions impact the natural systems that sustain life. The electrification of transportation is one example of the move toward a low-carbon economy where digital technology will reward efficiency.”</span></p><span data-dcnode-id="1046" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1040"><blockquote data-dcnode-id="1041"><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">‘Low-tech’ changes may be just as important as ‘high-tech’ improvements. For example, states can protect voters from COVID-19 while simultaneously bolstering democratic participation in the long term by switching from in-person voting to vote-by-mail systems.</span></p><cite data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Benjamin Shestakofsky, assistant professor of sociology at the University of Pennsylvania</span></cite></blockquote></figure><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Benjamin Shestakofsky,</span></strong><span data-dcnode-id="1036" instrument_node=""> assistant professor of sociology at the University of Pennsylvania, commented, “The COVID-19 crisis has already spurred new organizing efforts among essential workers in sectors including logistics, food service and education. The impact of social movements supporting workers’ demands for improved compensation, working conditions and recognition in the workplace is likely to extend far beyond it. The lasting impact of the crisis on our use of digital technologies is likely to depend on the duration of the pandemic itself. The longer it lasts, the more governments, businesses and individuals will generate and maintain new, digitally mediated routines (e.g., increased telework, increased use of tracking technologies in the workplace). The most vulnerable workers are most likely to see their privacy, well-being and economic security threatened by digital technologies. ‘Low-tech’ changes may be just as important as ‘high-tech’ improvements. For example, states can protect voters from COVID-19 while simultaneously bolstering democratic participation in the long term by switching from in-person voting to vote-by-mail systems. By 2025, the increased appetite for regulating tech giants could result in an industry that is more accountable to principles of democratic discourse (e.g., Facebook) and workers’ rights (e.g., Amazon).”</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1030"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Ebenezer Baldwin Bowles,</span></strong><span data-dcnode-id="1031" instrument_node=""> an advocate/activist, predicted, “Digital technology will dominate all aspects of life, further detaching humans from one another. There will not be a ‘new normal,’ but rather a continuously changing abnormal as humans and institutions draw further and further apart in a radically fragmented society. Eyeball-to-eyeball professional and personal contact will be intentionally set aside in deference to digital video communication. Diminishing resources will lead to a national mood of scarcity, giving rise to aggressive competition between individuals and groups. Economic security will become a dream for the great majority of the citizenry. Tech-related changes in medicine will lead to a continual state of breakthrough developments for the betterment of humankind, but fewer and fewer citizens will be able to afford the new diagnostic and treatment regimens. Positive developments in broadband accessibility will be the Trojan Horse of the era, transforming the digital realm into a force of control by corporate and governmental entities. By inviting technology into their homes, working class and middle-class individuals will be totally relieved of their privacy. What, me worry? It makes little sense to worry about the inevitable. Five years from now, more and more homes will become beholden to technology and the technicians who operate it. Big data will be drilled down into almost every aspect of daily life. Video interfaces between home and governmental/corporate interests will be all-pervasive. There is no escape from Big Brother, once ago a fiction and now a reality.”</span></p><span data-dcnode-id="1029" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="1023"><blockquote data-dcnode-id="1024"><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Technology will obsolete more of society’s worst jobs, which could be good news for some people but may be bad news for the people currently occupying those jobs. The richer society that results could enable them to do more rewarding jobs, or it could leave them in a permanent underclass.</span></p><cite data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Charlie Kaufman, a security architect with Dell EMC</span></cite></blockquote></figure><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1018"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Charlie Kaufman,</span></strong><span data-dcnode-id="1019" instrument_node=""> a security architect with Dell EMC, said, “Once COVID-19 stops being a direct major influence on society – which is probably at least two years away, but probably fewer than five – it will have accelerated changes that would have happened eventually anyway. The biggest of these is that more of our lives will take place in cyberspace, with more people telecommuting from home using conferencing tools for meetings. This will be a huge benefit for the environment, reducing both carbon emissions from commuting and the need for the duplicate indoor space we consume having both an office and a home. This will benefit the people who thrive in such an environment and hurt the people who don’t. Also important is the continuing trend of physical stores disappearing, as people favor ordering things on the web and having them delivered. In social interactions, being tall, big and loud will no longer give people the ability to dominate an interaction. On the other hand, being aggressive and rude will probably still win out. For people who live alone, it could be a very lonely existence, and there will likely be an increase in mental health problems. Technology will obsolete more of society’s worst jobs, which could be good news for some people but may be bad news for the people currently occupying those jobs. The richer society that results could enable them to do more rewarding jobs, or it could leave them in a permanent underclass. The increase in telecommuting will be a boon to the economy and the environment.”</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1010"><strong data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Vincent Alcazar,</span></strong><span data-dcnode-id="1014" instrument_node=""> a retired U.S. military strategist experienced in global intelligence, wrote, “COVID-19 is the catalyst for displacement, dislocation and more marginalization. The human toll itself will affect two to three following generations. It is those generations whose following effects will be what we might best see and measure to understand impact. However, that will all successfully evade measurement because what will lie hidden are all of the events and opportunities that did </span><em data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">not</span></em><span data-dcnode-id="1011" instrument_node=""> accrue in people’s lives.”</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1005"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Andre Popov,</span></strong><span data-dcnode-id="1006" instrument_node=""> a principal software engineer for a large technology company, predicted, “Remote/off-site work will become more acceptable to businesses. Generally, this will probably lead to more atomization of society, weaker interpersonal interactions. Internet infrastructure companies and large datacenter operators are the winners. Transportation, entertainment, hospitality, etc., are the obvious losers, although, e.g., the entertainment industry can transform to meet the new reality. In a way, this is a trimming-down of nonessential businesses. It makes for more efficiency, but also detracts. We are probably living the ‘new normal’ right now: Microbial life mutates rapidly, and we will surely see COVID-20 and so on. There is a growing accumulation of power and resources within the corporations that own the internet infrastructure. Content delivery networks, cloud companies and telecom companies are the world’s computer and data storage. An individual has zero privacy from these corporations. And that’s the case now, even before the wide spread of Internet of Things devices.”</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1000"><strong data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Sean Mead,</span></strong><span data-dcnode-id="1001" instrument_node=""> senior director of strategy and analytics at Interbrand, said, “The average person will have less income, worse access to credit and greater job insecurity. There will be massive economic dislocation as continuing aftershocks from the large number of small-business failures and the collapse of financial markets affect people for years. People will offload more of their administrative activities and communications with others to digital assistants. Legislatures will be confronted with the need for clearer laws around the responsibilities for, use of, and problems caused by digital agents. We’ll see the start of the fracturing of the internet into geographically bordered networks and into separations between secure networks that require positive identification and less-trustworthy networks. Many parts of the digital economy benefit so strongly from network effects that the market leaders become natural monopolies. This is particularly true with distribution platforms for communications, the monopolization of which are particularly pernicious. Because of widespread phone installations and voluntary grants of phone permissions, the Googles and Facebooks of the world can build intelligence tools like association networks and location history tracking that would be the envy of NSA and GCHQ planners from the near past. There are few real controls on how this information is utilized.”</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="995"><strong data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Gerry Ellis,</span></strong><span data-dcnode-id="996" instrument_node=""> an accessibility and usability consultant, commented, “Employers will try to set the balance at a point where people spend most time at home as this can save the organization money. This will suit some employees fine – e.g., those who live far away from their office – so they do not have a long daily commute, and those with adequate physical space in which to work who do not have children or other caring responsibilities at home. However, for many it will not suit. They may not have a large living space and thus nowhere from which to work. Their Wi-Fi connection may be poor. They may have children at home who interrupt them as they work. They may not wish to interrupt others in the home. They may miss the personal collegiality of working in an office. They may miss the technical support or support of others when an issue arises, particularly if they are new to the organization. Some may find it difficult to learn and adopt to the particular ways of working of the organization if they are not physically working close to their peers, again particularly for new employees. There are also costs to staying at home rather than going to an office such as those for extra food, heating, lighting and insurance costs. Insurance is a particular issue of concern; if an employee does not inform their insurer that they are working from home, is their insurance valid should they – for instance – have a fall during normal working hours? If they do inform the insurer, will their insurance costs rise as their home is being used as an office? Working from home for people with disabilities has its own particular issues. Reasonable accommodations that may be available in the office may not be available at home, e.g., adapted furniture and specialized technical support. I would expect that there will be conflict in the next number of years between employers who wish to make savings and the unions representing employees who may not wish to be at home full time because of the issues raised above. The final point I would make is that line managers may find it much more difficult to build good teamwork, brainstorm and assess employee performance if regular physical meetings do not occur.”</span></p><span data-dcnode-id="994" instrument_node="">
</span><h3 class="wp-block-prc-block-chapter" data-dcnode-id="992" id="the-best-and-worst-of-human-nature-are-amplified"><span data-dcnode-id="993" instrument_node="">The best and worst of human nature are amplified</span></h3><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">These experts see evidence that both sides of human nature are being amplified by the pandemic. The crisis is enhancing digital interconnectedness that engenders empathy, better awareness of the ills facing humanity and positive public action. On the flip side, they said they expect that some individuals, cities and nation-states will become more insular and competitive as survival mode kicks in. Some say xenophobia, bigotry and closed communities will also increase and these changes will cascade through all aspects of society – including international relations, the composition of social and economic safety nets for vulnerable citizens and basic human relations.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="984"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Steven Miller,</span></strong><span data-dcnode-id="985" instrument_node=""> professor emeritus of information systems at Singapore Management University, observed, “The worst of it: The source of income was either stopped or substantially reduced for a lot of industries, organisations and individuals. It will take several years for these entities to recover or they may never fully recover. A number of them – small, medium and large – will cease to exist. This will be painful economically and in other emotional and behavioural ways for the people involved. There is no denying there will be a thread of impact along this ‘worse-off’ line. The better things to emerge arise from the fact that COVID led people to change things they never thought they could change, at least not in such a short time period. COVID has led people to try things, to reimagine things and to do things. Specialists in evolutionary biology and related aspects of geology and climate history refer to this as ‘punctuated equilibrium.’ COVID will have that type of effect on how we live in the broad sense of things, including all levels of analysis from individuals to groups, to organisations, to institutions, to societies. We know the terrible things about COVID – the large number of deaths, the huge amount of suffering, the many examples of dislocation. There will be endless examples of the harsh realities and byproducts.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">“Exactly because it has been such an extreme situation it will catalyze new ways of thinking and doing, new approaches, new things, and all of these changes will persist beyond the period of medical threat, and will undoubtedly change the way we live, both directly and indirectly. For more than a decade to come or a decade after the medical threat eventually subsides – however long that may take – we will see the equivalent of a ‘Cambrian explosion’ of innovation catalyzed by COVID. These changes and innovations will go well beyond things directly related to dealing with the medical threats and contagion now or in other pandemics to follow. They will open up countless new possibilities for the way we work, live, learn and play. We will have the Dickensian ‘worst of times’ and ‘best of times.’ Both forces will propagate across various societies simultaneously. Those looking to be optimistic as well as those looking to be pessimistic will find ample examples and supporting evidence for their point of view. While COVID is extraordinary in some senses relative to contemporary history in recent decades, it is not so different than situations the world has encountered throughout the arc of history in a set of forces [that] simultaneously propel change. Somehow, the human species adapts, as it always seems to do, and things keep on keeping on, though in different ways.”</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="976"><strong data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">John Harlow,</span></strong><span data-dcnode-id="977" instrument_node=""> smart cities research specialist at the Engagement Lab @ Emerson College, explained how complicated things are in 2020, “We are stacking crises here: state violence, climate change, opioid epidemic, COVID-19 pandemic, historic unemployment and the disastrous Trump presidency’s effects on geopolitics. I’m sure you could name more. The ‘new normal’ in 2025 seems most likely to be constant change to absorb historically unusual threats, zoonotic pandemics, extreme weather, food insecurity, housing insecurity, unstable political systems, etc. I think the world will be less stable because of these drivers. … There are so many paths from here to 2025. Could we all be on Signal, Protonmail and Mastodon, or literally raising a generation of teens addicted to a Chinese Communist Party intelligence agency spy platform? The internet could cease to exist as we know it due to trolls, the concentration of everything into walled gardens or infrastructure challenges. Could we all be deep into solving climate change problems? 2025 feels like 2020, constant change and uncertainty. …</span></p><span data-dcnode-id="975" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="969"><blockquote data-dcnode-id="970"><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">The ‘new normal’ in 2025 seems most likely to be constant change to absorb historically unusual threats, zoonotic pandemics, extreme weather, food insecurity, housing insecurity, unstable political systems, etc.</span></p><cite data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">John Harlow, smart cities research specialist at the Engagement Lab @ Emerson College</span></cite></blockquote></figure><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">“The ongoing Black Lives Matter protests against a half millennium of white-supremacist state violence and extrajudicial killings have amassed support and momentum for change beyond anything I can remember from my lifetime. The premise of abolition invites us to imagine a world without police and policing, and there is building to be done to replace those retributive oppressive structures with care-based, harm-reducing alternatives.”</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="961"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Ethan Zuckerman,</span></strong><span data-dcnode-id="962" instrument_node=""> director of MIT’s Center for Civic Media and associate professor at the MIT Media Lab, commented, “We have the chance to build a different type of internet around video co-presence and sustained online interaction. The systems we’re using now to create public spaces online are either extensions of social networks built around surveillance capitalism, or they’re simple extensions of two-way video chat. We have the opportunity to design and build spaces that have a variety of uses, support different behaviors and norms and operate on academic, civic and other logics, rather than a market logic. As we learn to teach, meet, brainstorm, hang out and govern in these new spaces, we may start designing a digital future that’s radically different from the one we’re starting to fight against.”</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="956"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Bill Dutton,</span></strong><span data-dcnode-id="957" instrument_node=""> professor of media and information policy at Michigan State University and former director of the Oxford Internet Institute, pointed out that people must be connected to participate but many are not. “The pandemic has underscored the centrality of the internet and related digital media to everyday life and work, so that efforts to paint digital media as harmful will face increased scrutiny, along with the policies and regulations that a harm model is fostering, such as censorship of online content. There may also be more acknowledgment of and awareness of the importance of grappling with the digital divides locally and globally. Efforts to recover revenues and institute more governmental regulation of digital media will undermine innovation and the promises of an open, global internet.”</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="951"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Ian O’Byrne,</span></strong><span data-dcnode-id="952" instrument_node=""> assistant professor of education at the College of Charleston, said, “I worry that humans will move away from physical interactions and spend more time socializing via digital tools and spaces. The algorithms and echo chambers will continue to distance social groups as the machines consider how best to keep us satiated and always clicking in. Attention is the new economy, and when people are enraged they’re more entrenched in these platforms. Social distancing could lead to community distancing, as neighbors may feel that they have even less in common with their peers as they only see what they want to see online. It may seem as if we all live in different media, information and social spaces that rarely, if ever intersect.”</span></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="943"><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Maggie Jackson,</span></strong><span data-dcnode-id="947" instrument_node=""> former Boston Globe columnist and author of “</span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/2602456-distracted"><span data-dcnode-id="946" instrument_node="">Distracted Reclaiming Our Focusina World of Lost Attention</span></a><span data-dcnode-id="944" instrument_node="">,” wrote, “I am deeply concerned that the move to an even greater reliance on virtual relationships during the pandemic will inspire people to increasingly accept the diminished standards of togetherness that technology offers. The definition of a Dark Age in part is a ‘forgetting’ – and it’s possible that at least some sectors of society will be increasingly tempted to leave behind the discomfiting hard work of trying to understand one another fully. Relating fully takes lifelong practice, and humans even in the best of times often fail to do so well; an over-reliance on technology socially may leave us less and less able to work past difference and deliberately pursue complexity in relations.”</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="938"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Rebecca Theobald,</span></strong><span data-dcnode-id="939" instrument_node=""> assistant research professor at the University of Colorado, Colorado Springs, observed, “The way societies are responding to the challenges faced by the pandemic reflects their willingness to invest in the future. This is demonstrated by the sacrifices or inconveniences the people living in a country agree to undertake; the amount of resources designated for children, young people and the disadvantaged; and the ability of the community to discuss differences in a rational manner, starting by agreement about basic frameworks of the state, whether that is democracy, theocracy or autocracy. In 2025, the ‘new normal’ will be most affected by the changes brought about by rising seas, warming temperatures, changing habitats, increasing vulnerability to disease and multiple other issues documented by scientists across the world. The communities that will be most successful – countries, provinces, cities or towns – are those that are able to examine the facts of a situation, whether it be details of insufficient wealth due to systemic discrimination based on a characteristic the dominant group finds abhorrent or irritating or the evidence of how common food sources are no longer producing the nutrition necessary for a society to subsist and alter their activities so that all people in their community benefit.”</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="933"><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Miguel Alcaine,</span></strong><span data-dcnode-id="934" instrument_node=""> head of the International Telecommunication Union area office in Central America, said, “The status of digital transformation before COVID-19 was directly proportional to a country’s resilience. The digital world has shown us preexisting human conditions on steroids. Unconnected people living in urban areas have been the most affected. Vulnerable groups have been the most affected, as is always the case during catastrophes. In contrast, the better-connected a country is or a people are, the better their resilience. One thing that has changed for the time being as the pandemic evolves is the general awareness is that digital transformation is a must. Even those in politics realize that now. We need to work to take advantage of this window of opportunity, which might close after the emergency abates.”</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="919"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">William L. Schrader,</span></strong><span data-dcnode-id="929" instrument_node=""> an internet pioneer, mentor, advisor and consultant best known as founder and CEO of PSINet, wrote, “Look at the drivers of mankind first: safety, health, wealth. For those without safety and health, while wealth can help them gain safety and health, they cannot possibly achieve wealth without the first two. Thus, fear becomes the primary driver for most of mankind – 99.5%? As for drivers of business which includes technology, the concepts of global warming and global supply chains to optimize both costs and time to market will wane due to pressure from nationalist governments like [the] U.S., UK, Brazil, China and so many others. Most countries will attempt to move to pure domestic production, or at most, regional production and supply chains. </span><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">That</span></em><span data-dcnode-id="926" instrument_node=""> drives the reciprocal for the consumption side; people will buy domestically or regionally prior to buying the best. That goes for auto, telephones, computers, home gadgets of all kinds and even planes (but I doubt any firm, including airlines, will buy planes very soon). Economic security is gone, </span><em data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">especially</span></em><span data-dcnode-id="923" instrument_node=""> in America, due to Trump. Yes, personal and professional lives are altered permanently, routines will be all new, fear and anger will drive most people globally. The rich will get richer and the poor will riot and be killed by law enforcement and the military will stand by and wait. </span><em data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">If </span></em><span data-dcnode-id="920" instrument_node="">the military engages, then the rules of engagement will change.”</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="914"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Jim Witte,</span></strong><span data-dcnode-id="915" instrument_node=""> director of the Center for Social Science Research at George Mason University, predicted, “Many people will be somewhat worse off in 2025 as a result of the pandemic. Disruption is never easy – particularly when it is rapid. Lives will be upended in the transition to a ‘new normal.’ Jobs have been lost and many will never come back. I do believe the economy will recover – at least in the developed world, but many will be left behind. Many older Americans will face an uncertain retirement, particularly as the cost of living rises with inflation driven by higher levels of government spending and the economic costs of the pandemic. Just like other businesses, many colleges and universities will not survive. Those that do survive will be transformed – businesses and providers of higher education. In this disruption, where physical distancing will still be a part of the new normal, digital technologies will play a critical role. These technologies have already transformed the way we live and work, but the ‘demands of the day’ (a la Max Weber) will dramatically accelerate this transformation. Some will thrive, some will cope and some will be left behind.</span></p><span data-dcnode-id="913" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="907"><blockquote data-dcnode-id="908"><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">These technologies have already transformed the way we live and work, but the ‘demands of the day’ (a la Max Weber) will dramatically accelerate this transformation. Some will thrive, some will cope and some will be left behind.</span></p><cite data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Jim Witte, director of the Center for Social Science Research at George Mason University</span></cite></blockquote></figure><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">“The very real health risks associated with COVID-19 are likely to lead [the] developed world to become more insular, and the bits of prosperity that trickled down to the developing world will become leaner. Not a pretty picture. To mitigate the negative consequences will require strong leadership on the international stage with the willingness and authority to speak out for ‘positive-sum solutions’ in contrast to zero-sum thinking. This kind of leadership – from the U.S. but also in collaboration with others in the developed and developing world – will be essential to manage this disruption while averting disaster.”</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="899"><strong data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Bill Woodcock,</span></strong><span data-dcnode-id="900" instrument_node=""> executive director at Packet Clearing House, commented, “While there are a number of unexpected beneficial outcomes of the COVID-19 pandemic, they’re being learned at great cost in human life and well-being, not to mention economic cost. We’ve learned that we can make immense gains in global inclusivity in newly virtualized events that previously required expensive, time-consuming and carbon-heavy air travel, and in allowing people to work from home rather than make daily commutes. The meetings at which important decisions are made should remain virtual. They should remain equally accessible to those from developing countries. They should remain open, and not return to their previously behind-closed-doors ways. We’ve learned that being more careful about our hygiene benefits us with respect to many diseases, not just the one of most pressing immediate concern. But these lessons could easily be lost, and the 600,000 lives that have been lost to learn them will have been wasted if we don’t take them to heart. At the same time, the inequality of distribution of wealth, which I consider our second-greatest problem after the destruction of the environment, has been severely exacerbated by COVID-19. The rich use ‘disaster capitalism’ to ensure that they profit regardless of the situation, while the poor are most heavily impacted by both the disease and its economic effects. I worry that the intersection of the surveillance economy, omnipresent data-brokering, AI and the pragmatic psychology of getting-people-to-do-things-they-ought-not is really coming to a head. The worries of skeptics of even five years ago now seem quaint. The machinations of evil capitalists of 15 years ago now seem benign, in a Nixon-goes-to-China sort of way. Although there are quite a few people within the industry who recognize this, too many of them are happy to profit from it and not enough are bringing the danger to the attention of the public, regulators or policymakers. Unless these practices are curbed, we’re headed for a really dystopian nightmare.”</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="894"><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Patrick Larvie,</span></strong><span data-dcnode-id="895" instrument_node=""> global lead for the workplace user experience team at one of the world’s largest technology companies, observed, “We are seeing a breakdown in international cooperation (e.g., weakness in the European Union, the U.S. pulling out temporarily from the World Health Organization), and this will make cross-border coordination of epidemiological surveillance much more difficult. While the world will be connected, people will be less mobile than before. I fear that this will lead to increasing restrictions on travel and a rollback of international trade. Cross-border distrust and suspicion may lead to increasing nationalism. Technology will be leveraged as part of a surveillance strategy. Communication will likely be less free and far more subject to search and seizure, whether that means the devices or the medium.”</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="889"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Michael Froomkin,</span></strong><span data-dcnode-id="890" instrument_node=""> professor of law at University of Miami Law School, expert in legal and policy issues relating to new technologies, said, “Even in the best case, the economic consequences of the pandemic will take a long time to heal. Meanwhile, subsidies are going more to the wealthy than neediest. They’ll need to be paid for eventually, and probably not by the wealthiest. Changes in terms of work also won’t work to the workers’ advantage. Efforts will be made to offload as many costs as possible onto the worker (e.g., home office when applicable). I do expect one good thing: This will accelerate the push for full national health coverage in the U.S. The digital divide will be more serious as we move more and more services and public and private life online.”</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="881"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Michael Marien,</span></strong><span data-dcnode-id="885" instrument_node=""> director of Global Foresight Books, futurist and compiler of the annual list of the best futures books of the year, wrote, “The ‘new normal’ will certainly include more emphasis on health security and may include more emphasis on the UN’s Sustainable Development Goals. On the other hand, there may be more authoritarian regimes based on empty slogans such as ‘Make America Great Again’ and ‘America First.’ In contrast, there may be more emphasis on the slogan proposed in a column by Thomas Friedman: </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/06/30/opinion/biden-trump-respect.html"><span data-dcnode-id="884" instrument_node="">‘Respect science (RS), respect nature (RN), respect each other (REA).’</span></a><span data-dcnode-id="882" instrument_node=""> It is highly uncertain as to which set of slogans will prevail, where and for how long. … Good public policy is needed far more than new technology – policy based on RS, RN and REA. The most important tech-related change could well be creating a global technology assessment organization such as the IPCC, modeled on the U.S. Congress’ Office of Technology Assessment, which did excellent work in the 1990s.”</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="876"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Bryan Alexander,</span></strong><span data-dcnode-id="877" instrument_node=""> a higher education futures consultant and senior scholar at Georgetown University, responded, “The new normal will mean changes to personal and social lives: greater suspicion of other people and reduced social engagement. … Technology use will be strongly split by national borders, political ideology and views of technology.”</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="871"><strong data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Leslie Daigle,</span></strong><span data-dcnode-id="872" instrument_node=""> a longtime leader in the organizations building the internet and making it secure, said, “2025 will feature a mixed bag of changes due to the COVID-19 pandemic. The reason it’s going to be overall worse for the average person is mostly because of economic impact. I am also concerned that necessary geographic isolation is going to breed more isolationism and xenophobia. While people are anxious to get back to their vacationing habits around the globe, and businesses desperately need to be able to have people travel for work purposes, at the same time people are twitching when they see out-of-state license plates or hear nonlocal accents. On the plus side, we’ve already seen a reduction of seasonal flu impacts (all that hand-washing paid off!) and we can certainly hope that people’s habits have changed for the better, and that medical research is going to achieve not only a vaccine and/or better treatments for COVID-19, but also better knowledge about how this and other viruses work.”</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Melissa R. Michelson,</span></strong><span data-dcnode-id="867" instrument_node=""> a professor of political science at Menlo College, wrote, “Digital technology is being used to help connect people who otherwise might be isolated. Many older people are being taught by younger friends and family members to use Zoom and other video tools to visit with one another. Their comfort levels with these technologies are increasing.”</span></p><span data-dcnode-id="865" instrument_node="">
</span><figure class="wp-block-prc-block-pullquote alignright" data-dcnode-id="859"><blockquote data-dcnode-id="860"><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Do we move to manifest revolutionary change at a global scale, or do we stand by as people who are already vulnerable are made expendable in the name of profit and White supremacy?</span></p><cite data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Meredith Whittaker, a research professor and co-director of NYU’s AI Now research institute</span></cite></blockquote></figure><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="854"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Meredith Whittaker,</span></strong><span data-dcnode-id="855" instrument_node=""> a research professor and co-director of NYU’s AI Now research institute, commented, “A primary lesson from the failed U.S. response to COVID-19 is that the ruling class will not act on a crisis if they can protect themselves from said crisis (by quarantining, by divesting risk onto primarily BIPOC [Black, Indigenous and people of color] essential workers), and if addressing the crisis would perturb the functioning of capitalism. In this sense, COVID-19 provides an ominous warning about what will happen if we don’t adopt significant structural changes soon, in the face of the looming climate crisis. Climate chaos is already harming people who have suffered from colonialism and structural racism, while those most responsible for climate change – wealthier people in the global north – are more easily able to protect themselves. We are facing a fundamental choice: Do we move to manifest revolutionary change at a global scale, or do we stand by as people who are already vulnerable are made expendable in the name of profit and White supremacy?”</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="849"><strong data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Glenn Edens,</span></strong><span data-dcnode-id="850" instrument_node=""> professor at Thunderbird School of Global Management, Arizona State University, previously a vice president at PARC, wrote, “Technology can increase the resiliency of individuals as well as firms, societies, geographic regions and nations – we might find a better balance between globalization versus populism.”</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="844"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Sean D. Young,</span></strong><span data-dcnode-id="845" instrument_node=""> executive director at the Institute for Prediction Technology in the University of California–Los Angeles Center for Digital Behavior, responded, “People are being forced to find creative ways to use technologies. The positive side of this is that tech for good will rapidly advance.”</span></p><span data-dcnode-id="843" instrument_node="">
</span><p data-dcnode-id="839"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Judith Schoßböck,</span></strong><span data-dcnode-id="840" instrument_node=""> research fellow at Danube University, Krems, said, “I have hopes in the area of urban planning, smart cities and in general a more energy-efficient way of living together. I also hope that better digital literacy will lead to better options of networking and more personalized ways of living together, particularly for certain groups of society like the elderly.”</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="834"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Joshua Hatch,</span></strong><span data-dcnode-id="835" instrument_node=""> a journalist who covers technology issues, commented, “I hope that there’s a recognition that high-speed internet isn’t just a luxury; it’s a necessity for connecting people and providing access to tools and information. I’m not terribly optimistic that leaders will take the steps necessary to provide it, though. Ultimately, there’s an imbalance between technology companies and the public at large. The public can’t have expertise in the issues around technology, so at some point they throw up their hands and give in. A lack of trust in government, and a government that can be bought off, means the public’s guardian won’t be there to protect them. So, ultimately, the public is going to have a difficult time fighting off unscrupulous technology companies – a problem we already see.”</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="829"><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Steve Jones,</span></strong><span data-dcnode-id="830" instrument_node=""> professor of communication at the University of Illinois at Chicago and editor of New Media and Society, responded, “I hope for a greater understanding among the general population of the complicated and prominent role that social media plays in knowledge and action. I’ve long believed and argued that in many ways there is less difference between the online and offline worlds than we seem to admit, and I’d like to see greater acknowledgment of the blurring of that boundary. Will that make life better? Well … not in a techno-utopian sense, I suppose, but it might make us better users of technology, particularly social media, and it might make for more sensible policy discussions, too.”</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="823"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">John Laudun,</span></strong><span data-dcnode-id="825" instrument_node=""> professor of culture analytics, wrote, “Yes, things will be worse, but that was already our path. I worry less about any given technology and more about who is wielding it and how. … Thanks to the reversed consumer model on which media production and consumption is based, where users are the product sold to advertisers, and to the pinched wallets of most Americans (thanks to depressed wages), I don’t see most of us escaping the information bubbles of our own making in which so many of us now live. Fairness has been overwhelmed by a sense that the only thing that matters is competition. I do not see this trend declining. The result is that the current path we are on, where inequality increases, will only continue.”</span><strong data-dcnode-id="824"></strong></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="818"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Andrea Romaoli Garcia,</span></strong><span data-dcnode-id="819" instrument_node=""> an international tax lawyer active in multistakeholder activities of the International Telecommunication Union and Internet Society, observed, “COVID-19 brings changes that will be different depending on each country and culture. In Europe and Asia, people will embrace social detachment easily even after everyone has been vaccinated. This stems from historical learning from previous pandemics. In the Americas and Africa, social life will not be affected, and after vaccination, people will continue to touch each other as they do today. Despite this, prejudice between races grows and the ‘new normal’ imposes more barriers to migration, economics and education. The gaps in different cultures reacting to pandemic coronavirus will justify more bureaucracy and barriers. … In the socioeconomic field, the ‘new normal’ brings grave retrocession, inequality and racial prejudice. This is a very negative post-pandemic effect that puts global security at risk. We will see more countries closing borders and more cultures being banned. The ‘new normal’ is instigating new laws and procedures for exclusion under COVID-19’s false justification. The question that the ‘new normal’ poses is: ‘How much more can society peacefully carry out?’ I would suggest new discussions and measures on international cooperation to recover rights. The people involved in this effort should not only include the young, rich or White people. Remember, we all share the same planet and we are all affected by events that occur within any single country.”</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="810"><strong data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Rosalie Day,</span></strong><span data-dcnode-id="814" instrument_node=""> a policy leader and consultancy owner specializing in system approaches to data ethics, compliance and trust, predicted, “Individual isolation is going to become ever more of a problem. Meeting people who don’t share your hobbies or religion will be exacerbated even more than the filter bubble of values and political ideology. People meet people by engaging – for example, on public transit – and they mutually benefit (see the work of</span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pewrsr.ch/2NF2w0Y" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="813" instrument_node=""> Dr. Nicholas Eppley</span></a><span data-dcnode-id="811" instrument_node="">). People will become more sedentary, and obesity will grow from not having to commute and not having to leave your chair. You can ask Alexa to do your shopping and to change your music selection. Further, general nutrition will suffer, because as exposure decreases – becomes less diverse – the individuals and communities eating junk food will know nothing else.”</span></p><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="805"><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">The director of a major strategic project, recipient of the U.S. National Intelligence Exceptional Achievement Medal,</span></strong><span data-dcnode-id="806" instrument_node=""> responded, “Back in 2013, and again in 2016, a proposal informed by the anthrax events of 2001, West Nile virus in 2002, severe acute respiratory syndrome (SARS) and an outbreak of monkeypox in the United States in 2003 was shared with the Defense Advanced Research Projects Agency (DARPA). The proposal at the time was something seen as a safeguard against a ‘low-probability, high-consequence’ event – a natural or human-caused pandemic. The solution was a series of proposals centered around the concept of building an ‘immune system for the planet’ that could detect a novel pathogen in the air, water or soil of the Earth and rapidly sequence its DNA or RNA. … At a minimum, such an immune system for the planet would overcome the limits of waiting for nation-states themselves to alert the international community of outbreaks within their borders. A second reason also was associated with this proposal, namely: exponential changes in technology and create pressures for representative democracies, republics and other forms of deliberative governments to keep up – both at home and abroad. In an era in which precision medicine will be possible, so too will be precision poison, tailored and at a distance. As proposed both in 2013 and again in 2016, this will become a national security issue if we don’t figure out how to better use technology to do the work of deliberative governance at the necessary speed needed to keep up with threats associated with pandemics. The world needs a collective effort to gather and share data to steer society and nations back to full operations, and to provide early indicators and warnings of future pandemics. Current methods for accessing data owned by public and private institutions and private citizens today are not able to guide COVID-19 recovery. The new data-access frameworks in this initiative could succeed while strengthening societal welfare, prosperity and peace around the world.”</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">David Krieger,</span></strong><span data-dcnode-id="801" instrument_node=""> director of the Institute for Communication and Leadership, based in Switzerland, commented, “One of the results of the pandemic is that it is finally obvious to everyone that we are global. Not only did global connectivity and flows of people spread the virus throughout the world in a matter of weeks, but subsequent shortages of protective materials and medical equipment showed international dependencies. The nationalist reaction of closing borders and blocking flows of people and materials represents a ‘lockdown’ mentality aimed to disrupt connectivity and stop the flow of the virus, but at the cost of disrupting the economic, social and political foundations of the globally networked society. Politically, anti-globalist factions see themselves justified, whereas those who see the nation-state and its populist supporters as outdated point to the need to strengthen international organizations, such as the World Health Organization and the United Nations.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">“Following these two possible trajectories into the economic realm, some expect a reorganization of supply chains and production favoring national independence under the regime of stronger centralized control and regulation even to the point of nationalizing some industries, while others look to decentralized and networked organizations that alone are capable of dealing with the complexity of the situation. The left is calling for a universal basic income and increased government support for those who have lost jobs and income, while the right is calling for deregulation to spur innovation and the quick development and deployment of new business models and new products and services.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">“More interesting than the rehearsal of well-known political mythologies is the role of science and technology in the post-pandemic world. Some see the growing dependence of politics on science as a trend toward technocracy, whereas others see how science is unable to deal with pressing moral and social concerns the pandemic raises. On the one hand, society must be guided by scientific evidence and not political ideology, while on the other hand, scientists cannot tell us what values and visions for the future society should follow. Is it right to ‘sacrifice’ lives to ‘preserve’ economic prosperity? How much money is a human life worth? When is life no longer ‘worth’ living? Calls for economic sacrifices in the name of generational solidarity no longer go unquestioned. And these are questions that cannot be answered by science.”</span></p><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="790" instrument_node="">
</span></article><span data-dcnode-id="787" instrument_node="">
</span><div class="clearfix" data-dcnode-id="786"></div><span data-dcnode-id="785" instrument_node="">
</span><div data-dcnode-id="730" id="js-pagination"><span data-dcnode-id="784" instrument_node="">
