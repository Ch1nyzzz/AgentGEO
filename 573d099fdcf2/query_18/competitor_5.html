</span><h1 class="fs-huge" data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Agreement</span></h1><span data-dcnode-id="1394" instrument_node="">
</span><h2 data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">between the Parties to the North Atlantic Treaty regarding the Status of their Forces</span></h2><span data-dcnode-id="1391" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1375"><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">
            19 Jun. 1951 - 
          </span></li><span data-dcnode-id="1387" instrument_node="">
</span><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node=""> | </span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Last updated: 14 Oct. 2009 15:46</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li class="last" data-dcnode-id="1377"><span data-dcnode-id="1380" instrument_node="">
</span><span class="icon icon-print" data-dcnode-id="1379"></span><span data-dcnode-id="1378" instrument_node="">
</span></li><span data-dcnode-id="1376" instrument_node="">
</span></ul><span data-dcnode-id="1374" instrument_node="">
</span><ul class="list-i18n" data-dcnode-id="1357"><span data-dcnode-id="1373" instrument_node="">
</span><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">English</span></li><span data-dcnode-id="1370" instrument_node="">
</span><li data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">
</span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/official_texts_17265.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1368" instrument_node="">French</span></a><span data-dcnode-id="1366" instrument_node="">
</span></li><span data-dcnode-id="1364" instrument_node="">
</span><li data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">
</span><a data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/official_texts_17265.htm%3FselectedLocale%3Dru"><span data-dcnode-id="1362" instrument_node="">Russian</span></a><span data-dcnode-id="1360" instrument_node="">
</span></li><span data-dcnode-id="1358" instrument_node="">
</span></ul><span data-dcnode-id="1356" instrument_node="">
</span><div class="socialbar" data-dcnode-id="1346"><span data-dcnode-id="1355" instrument_node="">
</span><span data-dcnode-id="1353" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="1352" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="1351" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="1350" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="1349" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="1348" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="1347" instrument_node="">
</span></div><span data-dcnode-id="1345" instrument_node=""> </span><span data-dcnode-id="1343" instrument_node="">
</span><section class="content cf" data-dcnode-id="502"><span data-dcnode-id="1342" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node=""> </span></p><span data-dcnode-id="1339" instrument_node="">
</span><span data-dcnode-id="1337" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">
</span></div><span data-dcnode-id="1334" instrument_node="">
</span><div data-dcnode-id="504"><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1332" instrument_node="">The parties to the North Atlantic Treaty signed in Washington on 4 April, 1949,</span><br data-dcnode-id="1331"><span data-dcnode-id="1330" instrument_node="">Considering that the forces of one Party may be sent, by arrangement, to serve in the territory of another Party;</span><br data-dcnode-id="1329"><span data-dcnode-id="1328" instrument_node="">Bearing in mind that the decision to send them and the conditions under which they will be sent, in so far as such conditions are not laid down by the present Agreement, will continue to be the subject of separate arrangements between the Parties concerned;</span><br data-dcnode-id="1327"><span data-dcnode-id="1326" instrument_node="">Desiring, however, to define the status of such forces while in the territory of another Party;</span><br data-dcnode-id="1325"><span data-dcnode-id="1324" instrument_node="">Have agreed as follows:</span></p><span data-dcnode-id="1322" instrument_node="">
</span><h4 data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Article I</span></h4><span data-dcnode-id="1319" instrument_node="">
</span><ol data-dcnode-id="1280" type="1"><span data-dcnode-id="1318" instrument_node="">
</span><li data-dcnode-id="1284"><span data-dcnode-id="1317" instrument_node="">In this Agreement the expression 
</span><p data-dcnode-id="1316"></p><span data-dcnode-id="1315" instrument_node="">
</span><ol data-dcnode-id="1287" type="a"><span data-dcnode-id="1314" instrument_node="">
</span><li data-dcnode-id="1311"><span data-dcnode-id="1313" instrument_node="">'force' means the personnel belonging to the land, sea or air armed services of one Contracting Party when in the territory of another Contracting Party in the North Atlantic Treaty area in connexion with their official duties, provided that the two Contracting Parties concerned may agree that certain individuals, units or formations shall not be regarded as constituting or included in a 'force' for the purpose of the present Agreement; 
</span><p data-dcnode-id="1312"></p></li><span data-dcnode-id="1310" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1309" instrument_node="">'civilian component' means the civilian personnel accompanying a force of a Contracting Party who are in the employ of an armed service of that Contracting Party, and who are not stateless persons, nor nationals of any State which is not a Party to the North Atlantic Treaty, nor nationals of, nor ordinarily resident in, the State in which the force is located. 
</span><p data-dcnode-id="1308"></p></li><span data-dcnode-id="1306" instrument_node="">
</span><li data-dcnode-id="1303"><span data-dcnode-id="1305" instrument_node="">'dependent' means the spouse of a member of a force or a civilian component, or a child of such member depending on him or her for support; 
</span><p data-dcnode-id="1304"></p></li><span data-dcnode-id="1302" instrument_node="">
</span><li data-dcnode-id="1299"><span data-dcnode-id="1301" instrument_node="">'sending State' means the Contracting Party to which the force belongs; 
</span><p data-dcnode-id="1300"></p></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1295"><span data-dcnode-id="1297" instrument_node="">'receiving State' means the Contracting Party in the territory of which the force or civilian component is located, whether it be stationed there or passing in transit; 
</span><p data-dcnode-id="1296"></p></li><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1291"><span data-dcnode-id="1293" instrument_node="">'military authorities of the sending State' means those authorities of a sending State who are empowered by its law to enforce the military law of that State with respect to members of its forces or civilian components; 
</span><p data-dcnode-id="1292"></p></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">'North Atlantic Council' means the Council established by Article 9 of the North Atlantic Treaty or any of its subsidiary bodies authorised to act on its behalf.</span></li></ol><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1285"></p></li><span data-dcnode-id="1283" instrument_node="">
</span><li data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">This Agreement shall apply to the authorities of political sub-divisions of the Contracting Parties, within their territories to which the Agreement applies or extends in accordance with Article XX, as it applies to the central authorities of those Contracting Parties, provided, however, that property owned by political sub-divisions shall not be considered to be property owned by a Contracting Party within the meaning of Article VIII.</span></li></ol><span data-dcnode-id="1279" instrument_node="">
</span><h4 data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Article II</span></h4><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">It is the duty of a force and its civilian component and the members thereof as well as their dependents to respect the law of the receiving State, and to abstain from any activity inconsistent with the spirit of the present Agreement, and, in particular, from any political activity in the receiving State. It is also the duty of the sending State to take necessary of measures to that end.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><h4 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Article III</span></h4><span data-dcnode-id="1270" instrument_node="">
</span><ol data-dcnode-id="1239" type="1"><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1268" instrument_node="">On the conditions specified in paragraph 2 of this Article and subject to compliance with the formalities established by the receiving State relating to entry and departure of a force or the members thereof, such members shall be exempt from passport and visa regulations and immigration inspection on entering or leaving the territory of a receiving State. They shall also be exempt from the regulations of the receiving State on the registration and control of aliens, but shall not be considered as acquiring any right to permanent residence or domicile in the territories of the receiving State 
</span><p data-dcnode-id="1267"></p></li><span data-dcnode-id="1265" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1264" instrument_node="">The following documents only will be required in respect of members of a force. They must be presented on demand: 
</span><p data-dcnode-id="1263"></p><span data-dcnode-id="1262" instrument_node="">
</span><ol data-dcnode-id="1254" type="a"><span data-dcnode-id="1261" instrument_node="">
</span><li data-dcnode-id="1258"><span data-dcnode-id="1260" instrument_node="">personal identity card issued by the sending State showing names, date of birth, rank and number (if any), service, and photograph; 
</span><p data-dcnode-id="1259"></p></li><span data-dcnode-id="1257" instrument_node="">
</span><li data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">individual or collective movement order, in the language of the sending State and in the English and French languages, issued by an appropriate agency of the sending State or of the North Atlantic Treaty Organization and certifying to the status of the individual or group as a member or members of a force and to the movement ordered. The receiving State may require a movement order to be countersigned by its appropriate representative.</span></li></ol><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1252"></p></li><span data-dcnode-id="1250" instrument_node="">
</span><li data-dcnode-id="1247"><span data-dcnode-id="1249" instrument_node="">Members of a civilian component and dependents shall be so described in their passports. 
</span><p data-dcnode-id="1248"></p></li><span data-dcnode-id="1246" instrument_node="">
</span><li data-dcnode-id="1243"><span data-dcnode-id="1245" instrument_node="">If a member of a force or a civilian component leaves the employ of the sending State and is not repatriated, the authorities of the sending State shall immediately inform the authorities of the receiving State, giving such particulars as may be required. The authorities of the sending State shall similarly inform the authorities of the receiving State of any member who has absented himself for more than twenty-one days. 
</span><p data-dcnode-id="1244"></p></li><span data-dcnode-id="1242" instrument_node="">
</span><li data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">If the receiving State has requested the removal from its territory of a member of a force or civilian component or has made an expulsion order against an ex-member of a force or of a civilian component or against a dependent of a member or ex-member, the authorities of the sending State shall be responsible for receiving the person concerned within their own territory or otherwise disposing of him outside the receiving State. This paragraph shall apply only to persons who are not nationals of the receiving State and have entered the receiving State as members of a force or civilian component or for the purpose of becoming such members, and to the dependents of such persons.</span></li></ol><span data-dcnode-id="1238" instrument_node="">
</span><h4 data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">Article IV</span></h4><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">The receiving State shall either 
</span></p><p data-dcnode-id="1232"></p><span data-dcnode-id="1231" instrument_node="">
</span><ol data-dcnode-id="1223" type="a"><span data-dcnode-id="1230" instrument_node="">
</span><li data-dcnode-id="1227"><span data-dcnode-id="1229" instrument_node="">accept as valid, without a driving test or fee, the driving permit or licence or military driving permit issued by the sending State or a sub-division thereof to a member of a force or of a civilian component; or 
</span><p data-dcnode-id="1228"></p></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">issue its own driving permit or licence to any member of a force or civilian component who holds a driving permit or licence or military driving permit issued by the sending State or a sub-division thereof, provided that no driving test shall be required.</span></li></ol><span data-dcnode-id="1222" instrument_node="">
</span><h4 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Article V</span></h4><span data-dcnode-id="1219" instrument_node="">
</span><ol data-dcnode-id="1211" type="1"><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1215"><span data-dcnode-id="1217" instrument_node="">Members of a force shall normally wear uniform. Subject to any arrangement to the contrary between the authorities of the sending and receiving States, the wearing of civilian dress shall be on the same conditions as for members of the forces of the receiving State. Regularly constituted units or formations of a force shall be in uniform when crossing a frontier. 
</span><p data-dcnode-id="1216"></p></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Service vehicles of a force or civilian component shall carry, in addition to their registration number, a distinctive nationality mark.</span></li></ol><span data-dcnode-id="1210" instrument_node="">
</span><h4 data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Article VI</span></h4><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Members of a force may possess and carry arms, on condition that they are authorized to do so by their orders. The authorities of the sending State shall give sympathetic consideration to requests from the receiving State concerning this matter.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><h4 data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">Article VII</span></h4><span data-dcnode-id="1201" instrument_node="">
</span><ol data-dcnode-id="1024" type="1"><span data-dcnode-id="1200" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1199" instrument_node="">Subject to the provisions of this Article, 
</span><p data-dcnode-id="1198"></p><span data-dcnode-id="1197" instrument_node="">
</span><ol data-dcnode-id="1189" type="a"><span data-dcnode-id="1196" instrument_node="">
</span><li data-dcnode-id="1193"><span data-dcnode-id="1195" instrument_node="">the military authorities of the sending State shall have the right to exercise within the receiving State all criminal and disciplinary jurisdiction conferred on them by the law of the sending State over all persons subject to the military law of that State; 
</span><p data-dcnode-id="1194"></p></li><span data-dcnode-id="1192" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">the authorities of the receiving State shall have jurisdiction over the members of a force or civilian component and their dependents with respect to offences committed within the territory of the receiving State and punishable by the law of that State.</span></li></ol><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1187"></p></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1159"><span data-dcnode-id="1184" instrument_node="">
</span><ol data-dcnode-id="1162" type="a"><span data-dcnode-id="1183" instrument_node="">
</span><li class="article" data-dcnode-id="1180"><span data-dcnode-id="1182" instrument_node="">The military authorities of the sending State shall have the right to exercise exclusive jurisdiction over persons subject to the military law of that State with respect to offences, including offences relating to its security, punishable by the law of the sending State, but not by the law of the receiving State. 
</span><p data-dcnode-id="1181"></p></li><span data-dcnode-id="1179" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1178" instrument_node="">The authorities of the receiving State shall have the right to exercise exclusive jurisdiction over members of a force or civilian component and their dependents with respect to offences, including offences relating to the security of that State, punishable by its law but not by the law of the sending state. 
</span><p data-dcnode-id="1177"></p></li><span data-dcnode-id="1175" instrument_node="">
</span><li class="article" data-dcnode-id="1163"><span data-dcnode-id="1174" instrument_node="">For the purposes of this paragraph and of paragraph 3 of this Article a security offence against a State shall include: 
</span><p data-dcnode-id="1173"></p><span data-dcnode-id="1172" instrument_node="">
</span><ol data-dcnode-id="1164" type="i"><span data-dcnode-id="1171" instrument_node="">
</span><li data-dcnode-id="1168"><span data-dcnode-id="1170" instrument_node="">treason against the State; 
</span><p data-dcnode-id="1169"></p></li><span data-dcnode-id="1167" instrument_node="">
</span><li class="article" data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">sabotage, espionage or violation of any law relating to official secrets of that State, or secrets relating to the national defence of that State</span></li></ol></li></ol><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1160"></p></li><span data-dcnode-id="1158" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1157" instrument_node="">In case where the right to exercise jurisdiction is concurrent the following rules shall apply: 
</span><p data-dcnode-id="1156"></p><span data-dcnode-id="1155" instrument_node="">
</span><ol data-dcnode-id="1132" type="a"><span data-dcnode-id="1154" instrument_node="">
</span><li data-dcnode-id="1140"><span data-dcnode-id="1153" instrument_node="">The military authorities of the sending State shall have the primary right to exercise jurisdiction over a member of a force or of a civilian component in relation to 
</span><p data-dcnode-id="1152"></p><span data-dcnode-id="1151" instrument_node="">
</span><ol data-dcnode-id="1143" type="i"><span data-dcnode-id="1150" instrument_node="">
</span><li data-dcnode-id="1147"><span data-dcnode-id="1149" instrument_node="">offences solely against the property or security of that State, or offences solely against the person or property of another member of the force or civilian component of that State or of a dependent; 
</span><p data-dcnode-id="1148"></p></li><span data-dcnode-id="1146" instrument_node="">
</span><li data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">offences arising out of any act or omission done in the performance of official duty.</span></li></ol><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1141"></p></li><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1136"><span data-dcnode-id="1138" instrument_node="">In the case of any other offence the authorities of the receiving State shall have the primary right to exercise jurisdiction. 
</span><p data-dcnode-id="1137"></p></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">If the State having the primary right decides not to exercise jurisdiction, it shall notify the authorities of the other State as soon as practicable. The authorities of the State having the primary right shall give sympathetic consideration to a request from the authorities of the other State for a waiver of its right in cases where that other state considers such waiver to be of particular importance.</span></li></ol><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1130"></p></li><span data-dcnode-id="1128" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1127" instrument_node="">The foregoing provisions of this Article shall not imply any right for the military authorities of the sending State to exercise jurisdiction over persons who are nationals of or ordinarily resident in the receiving State, unless they are members of the force of the sending State. 
</span><p data-dcnode-id="1126"></p></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1106"><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1122"></p><span data-dcnode-id="1121" instrument_node="">
</span><ol data-dcnode-id="1109" type="a"><span data-dcnode-id="1120" instrument_node="">
</span><li data-dcnode-id="1117"><span data-dcnode-id="1119" instrument_node="">The authorities of the receiving and sending states shall assist each other in the arrest of members of a force or civilian component or their dependents in the territory of the receiving State and in handing them over to the authority which is to exercise jurisdiction in accordance with the above provisions. 
</span><p data-dcnode-id="1118"></p></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1115" instrument_node="">The authorities of the receiving State shall notify promptly the military authorities of the sending State of the arrest of any member of a force or civilian component or a dependent. 
</span><p data-dcnode-id="1114"></p></li><span data-dcnode-id="1112" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">The custody of an accused member of a force or civilian component over whom the receiving state is to exercise jurisdiction shall, if he is in the hands of the sending State, remain with that State until he is charged by the receiving State.</span></li></ol><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1107"></p></li><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1091"><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1103"></p><span data-dcnode-id="1102" instrument_node="">
</span><ol data-dcnode-id="1094" type="a"><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1098"><span data-dcnode-id="1100" instrument_node="">The authorities of the receiving and sending States shall assist each other in the carrying out of all necessary investigations into offences, and in the collection and production of evidence, including the seizure and, in proper cases, the handing over of objects connected with an offence. The handing over of such objects may, however, be made subject to their return within the time specified by the authority delivering them. 
</span><p data-dcnode-id="1099"></p></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">The authorities of the Contracting parties shall notify one another of the disposition of all cases in which there are concurrent rights to exercise jurisdiction.</span></li></ol><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1092"></p></li><span data-dcnode-id="1090" instrument_node="">
</span><li data-dcnode-id="1076"><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1088"></p><span data-dcnode-id="1087" instrument_node="">
</span><ol data-dcnode-id="1079" type="a"><span data-dcnode-id="1086" instrument_node="">
</span><li data-dcnode-id="1083"><span data-dcnode-id="1085" instrument_node="">A death sentence shall not be carried out in the receiving State by the authorities of the sending State if the legislation of the receiving state does not provide for such punishment in a similar case. 
</span><p data-dcnode-id="1084"></p></li><span data-dcnode-id="1082" instrument_node="">
</span><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">The authorities of the receiving State shall give sympathetic consideration to a request from the authorities of the sending State for assistance in carrying out a sentence of imprisonment pronounced by the authorities of the sending State under the provision of this Article within the territory of the receiving State.</span></li></ol><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1077"></p></li><span data-dcnode-id="1075" instrument_node="">
</span><li data-dcnode-id="1072"><span data-dcnode-id="1074" instrument_node="">Where an accused has been tried in accordance with the provisions of this Article by the authorities of one Contracting Party and has been acquitted, or has been convicted and is serving, or has served, his sentence or has been pardoned, he may not be tried again for the same offence within the same territory by the authorities of another Contracting Party. However, nothing in this paragraph shall prevent the military authorities of the sending State from trying a member of its force for any violation of rules of discipline arising from an act or omission which constituted an offence for which he was tried by the authorities of another Contracting Party. 
</span><p data-dcnode-id="1073"></p></li><span data-dcnode-id="1071" instrument_node="">
</span><li data-dcnode-id="1043"><span data-dcnode-id="1070" instrument_node="">Whenever a member of a force or civilian component of a dependent is prosecuted under the jurisdiction of a receiving State he shall be entitled: 
</span><p data-dcnode-id="1069"></p><span data-dcnode-id="1068" instrument_node="">
</span><ol data-dcnode-id="1046" type="a"><span data-dcnode-id="1067" instrument_node="">
</span><li data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">to a prompt and speedy trial; </span></li><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">to be informed, in advance of trial, of the specific charge or charges made against him; </span></li><span data-dcnode-id="1061" instrument_node="">
</span><li data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">to be confronted with the witnesses against him; </span></li><span data-dcnode-id="1058" instrument_node="">
</span><li data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">to have compulsory process for obtaining witnesses in his favour, if they are within the jurisdiction of the receiving State; </span></li><span data-dcnode-id="1055" instrument_node="">
</span><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">to have legal representation of his own choice for his defence or to have free or assisted legal representation under the conditions prevailing for the time being in the receiving State; </span></li><span data-dcnode-id="1052" instrument_node="">
</span><li data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">if he considers it necessary, to have the services of a competent interpreter; and </span></li><span data-dcnode-id="1049" instrument_node="">
</span><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">to communicate with a representative of the Government of the sending State and when the rules of the court permit, to have such a representative present at his trial.</span></li></ol><span data-dcnode-id="1045" instrument_node="">
</span><p data-dcnode-id="1044"></p></li><span data-dcnode-id="1042" instrument_node="">
</span><li data-dcnode-id="1028"><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1040"></p><span data-dcnode-id="1039" instrument_node="">
</span><ol data-dcnode-id="1031" type="a"><span data-dcnode-id="1038" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1037" instrument_node="">Regularly constituted military units or formations of a force shall have the right to police any camps, establishment or other premises which they occupy as the result of an agreement with the receiving State. The military police of the force may take all appropriate measures to ensure the maintenance of order and security on such premises. 
</span><p data-dcnode-id="1036"></p></li><span data-dcnode-id="1034" instrument_node="">
</span><li data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Outside these premises, such military police shall be employed only subject to arrangements with the authorities of the receiving State and in liaison with those authorities, and in so far as such employment is necessary to maintain discipline and order among the members of the force.</span></li></ol><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1029"></p></li><span data-dcnode-id="1027" instrument_node="">
</span><li data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Each Contracting Party shall seek such legislation as it deems necessary to ensure the adequate security and protection within its territory of installations, equipment, property, records and official information of other Contracting Parties, and the punishment of persons who may contravene laws enacted for that purpose.</span></li></ol><span data-dcnode-id="1023" instrument_node="">
</span><h4 data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Article VIII</span></h4><span data-dcnode-id="1020" instrument_node="">
</span><ol data-dcnode-id="769" type="1"><span data-dcnode-id="1019" instrument_node="">
</span><li data-dcnode-id="1002"><span data-dcnode-id="1018" instrument_node="">Each Contracting Party waives all its claims against any other Contracting Party for damage to any property owned by it and used by its land; sea or air armed services, if such damage: 
</span><p data-dcnode-id="1017"></p><span data-dcnode-id="1016" instrument_node="">
</span><ol data-dcnode-id="1008" type="i"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1012"><span data-dcnode-id="1014" instrument_node="">was caused by a member or an employee of the armed services of the other Contracting Party in the execution of his duties in connection with the operation of the North Atlantic Treaty; or 
</span><p data-dcnode-id="1013"></p></li><span data-dcnode-id="1011" instrument_node="">
</span><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">arose from the use of any vehicle, vessel or aircraft owned by the other Contracting Party and used by its armed services, provided either that the vehicle, vessel or aircraft causing the damage was being used in connection with the operation of the North Atlantic Treaty, or that the damage was caused to property being so used.</span></li></ol><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Claims for maritime salvage by one Contracting Party against any other Contracting Party shall be waived, provided that the vessel or cargo salvaged was owned by a contracting Party and being used by its armed services in connection with the operation of the North Atlantic Treaty.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1003"></p></li><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="880"><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="999"></p><span data-dcnode-id="998" instrument_node="">
</span><ol data-dcnode-id="883" type="a"><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="996" instrument_node="">In the case of damage caused or arising as stated in paragraph 1 to other property owned by a Contracting Party and located in its territory, the issue of the liability of any other Contracting Party shall be determined and the amount of damage shall be assessed, unless the Contracting Parties concerned agree otherwise, by a sole arbitrator selected in accordance with sub-paragraph b. of this paragraph. The arbitrator shall also decide any counter-claims arising out of the same incident. 
</span><p data-dcnode-id="995"></p></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="990"><span data-dcnode-id="992" instrument_node="">The arbitrator referred to in sub-paragraph a. above shall be selected by agreement between the Contracting Parties concerned from amongst the nationals of the receiving State who hold or have held high judicial office. If the Contracting Parties concerned are unable, within two months, to agree upon the arbitrator, either may request the Chairman of the North Atlantic Council Deputies to select a person with the aforesaid qualifications. 
</span><p data-dcnode-id="991"></p></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="988" instrument_node="">Any decision taken by the arbitrator shall be binding and conclusive upon the Contracting Parties. 
</span><p data-dcnode-id="987"></p></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="982"><span data-dcnode-id="984" instrument_node="">The amount of any compensation awarded by the arbitrator shall be distributed in accordance with the provisions of paragraph 5 e. (i), (ii) and (iii) of this Article. 
</span><p data-dcnode-id="983"></p></li><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="978"><span data-dcnode-id="980" instrument_node="">The compensation of the arbitrator shall be fixed by agreement between the Contracting Parties concerned and shall, together with the necessary expenses incidental to performance of his duties, be defrayed in equal proportions by them. 
</span><p data-dcnode-id="979"></p></li><span data-dcnode-id="977" instrument_node="">
</span><span data-dcnode-id="976" instrument_node="">Nevertheless, each Contracting Party waives its claim in any such case where the damage is less than: 
</span><p data-dcnode-id="975"></p><span data-dcnode-id="974" instrument_node="">
</span><span data-dcnode-id="973" instrument_node="">
</span><span data-dcnode-id="972" instrument_node="">
</span><span data-dcnode-id="971" instrument_node="">
</span><span data-dcnode-id="968" instrument_node="">
</span><span data-dcnode-id="965" instrument_node="">
</span><span data-dcnode-id="962" instrument_node="">
</span><span data-dcnode-id="958" instrument_node="">
</span><span data-dcnode-id="957" instrument_node="">
</span><span data-dcnode-id="954" instrument_node="">
</span><span data-dcnode-id="951" instrument_node="">
</span><span data-dcnode-id="948" instrument_node="">
</span><span data-dcnode-id="944" instrument_node="">
</span><span data-dcnode-id="943" instrument_node="">
</span><span data-dcnode-id="940" instrument_node="">
</span><span data-dcnode-id="937" instrument_node="">
</span><span data-dcnode-id="934" instrument_node="">
</span><span data-dcnode-id="930" instrument_node="">
</span><span data-dcnode-id="929" instrument_node="">
</span><span data-dcnode-id="926" instrument_node="">
</span><span data-dcnode-id="923" instrument_node="">
</span><span data-dcnode-id="920" instrument_node="">
</span><span data-dcnode-id="916" instrument_node="">
</span><span data-dcnode-id="915" instrument_node="">
</span><span data-dcnode-id="912" instrument_node="">
</span><span data-dcnode-id="909" instrument_node="">
</span><span data-dcnode-id="906" instrument_node="">
</span><span data-dcnode-id="902" instrument_node="">
</span><span data-dcnode-id="901" instrument_node="">
</span><span data-dcnode-id="898" instrument_node="">
</span><span data-dcnode-id="895" instrument_node="">
</span><span data-dcnode-id="892" instrument_node="">
</span><table border="0" cellpadding="5" cellspacing="0" data-dcnode-id="887" width="400"><tbody data-dcnode-id="888"><tr data-dcnode-id="959"><td class="article" data-dcnode-id="969" width="100"><span data-dcnode-id="970" instrument_node="">Belgium:</span></td><td class="article" data-dcnode-id="966" width="100"><span data-dcnode-id="967" instrument_node="">B. fr. 70,000.</span></td><td class="article" data-dcnode-id="963" width="100"><span data-dcnode-id="964" instrument_node="">Luxembourg:</span></td><td class="article" data-dcnode-id="960" width="100"><span data-dcnode-id="961" instrument_node="">L. fr. 70,000.</span></td></tr><tr data-dcnode-id="945"><td class="article" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Canada:</span></td><td class="article" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">$ 1,460.</span></td><td class="article" data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Netherlands:</span></td><td class="article" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Fl. 5,320</span></td></tr><tr data-dcnode-id="931"><td class="article" data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Denmark:</span></td><td class="article" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Kr. 9,670.</span></td><td class="article" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Norway:</span></td><td class="article" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Kr. 10,000.</span></td></tr><tr data-dcnode-id="917"><td class="article" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">France:</span></td><td class="article" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">F. fr. 490,000.</span></td><td class="article" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Portugal:</span></td><td class="article" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Es. 40,250.</span></td></tr><tr data-dcnode-id="903"><td class="article" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Iceland:</span></td><td class="article" data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">Kr. 22,800.</span></td><td class="article" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">United Kingdom:</span></td><td class="article" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">£ 500.</span></td></tr><tr data-dcnode-id="889"><td class="article" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Italy:</span></td><td class="article" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Li. 850,000.</span></td><td class="article" data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">United States:</span></td><td class="article" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">$ 1,400.</span></td></tr></tbody></table><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Any other Contracting Party whose property has been damaged in the same incident shall also waive its claim up to the above amount. In the case of considerable variation in the rates of exchange between these currencies the Contracting Parties shall agree on the appropriate adjustments of these amounts.</span></p></ol><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="881"></p></li><span data-dcnode-id="879" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="878" instrument_node="">For the purposes of paragraphs 1 and 2 of this Article the expression "owned by a Contacting Party" in the case of a vessel includes a vessel on bare boat charter to that Contracting Party or requisitioned by it on bare boat terms or seized by it in prize (except to the extent that the risk of loss or liability is borne by some person other than such Contracting Party). 
</span><p data-dcnode-id="877"></p></li><span data-dcnode-id="875" instrument_node="">
</span><li data-dcnode-id="872"><span data-dcnode-id="874" instrument_node="">Each Contracting Party waives all its claims against any other Contracting Party for injury or death suffered by any member of its armed services while such member was engaged in the performance of his official duties. 
</span><p data-dcnode-id="873"></p></li><span data-dcnode-id="871" instrument_node="">
</span><li data-dcnode-id="814"><span data-dcnode-id="870" instrument_node="">Claims (other than contractual claims and those to which paragraphs 6 or 7 of this Article apply) arising out of acts or omissions of members of a force or civilian component done in the performance of official duty, or out of any other act, omission or occurrence for which a force or civilian component is legally responsible, and causing damage in the territory of the receiving State to third parties, other than any of the Contracting Parties, shall be dealt with by the receiving State in accordance with the following provisions: 
</span><p data-dcnode-id="869"></p><span data-dcnode-id="868" instrument_node="">
</span><ol data-dcnode-id="817" type="a"><span data-dcnode-id="867" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="866" instrument_node="">Claims shall be filed, considered and settled or adjudicated in accordance with the laws and regulations of the receiving State with respect to claims arising from the activities of its own armed forces. 
</span><p data-dcnode-id="865"></p></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="860"><span data-dcnode-id="862" instrument_node="">The receiving State may settle any such claims, and payment of the amount agreed upon or determinated by adjudication shall be made by the receiving State in its currency. 
</span><p data-dcnode-id="861"></p></li><span data-dcnode-id="859" instrument_node="">
</span><li data-dcnode-id="856"><span data-dcnode-id="858" instrument_node="">Such payment, whether made pursuant to a settlement or to adjudication of the case by a competent tribunal of the receiving State, or the final adjudication by such a tribunal denying payment, shall be binding and conclusive upon the Contracting Parties. 
</span><p data-dcnode-id="857"></p></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="854" instrument_node="">Every claim paid by the receiving State shall be communicated to the sending States concerned together with full particulars and a proposed distribution in conformity with sub-paragraphs e. (i), (ii) and (iii) below. In default of a reply within two months, the proposed distribution shall be regarded as accepted. 
</span><p data-dcnode-id="853"></p></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="850" instrument_node="">The cost incurred in satisfying claims pursuant to the preceding sub-paragraphs and para. 2 of this Article shall be distributed between the Contracting Parties, as follows: 
</span><p data-dcnode-id="849"></p><span data-dcnode-id="848" instrument_node="">
</span><ol data-dcnode-id="832" type="i"><span data-dcnode-id="847" instrument_node="">
</span><li data-dcnode-id="844"><span data-dcnode-id="846" instrument_node="">Where one sending State alone is responsible, the amount awarded or adjudged shall be distributed in the proportion of 25 per cent. chargeable to the receiving State and 75 per cent. chargeable to the sending State. 
</span><p data-dcnode-id="845"></p></li><span data-dcnode-id="843" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="842" instrument_node="">Where more than one State is responsible for the damage, the amount awarded or adjudged shall be distributed equally among them: however, if the receiving State is not one of the States responsible, its contribution shall be half that of each of the sending States. 
</span><p data-dcnode-id="841"></p></li><span data-dcnode-id="839" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="838" instrument_node="">Where the damage was caused by the armed services of the Contracting Parties and it is not possible to attribute it specifically to one or more of those armed services, the amount awarded or adjudged shall be distributed equally among the Contracting Parties concerned: however, if the receiving State is not one of the States by whose armed services the damage was caused, its contribution shall be half that of each of the sending States concerned. 
</span><p data-dcnode-id="837"></p></li><span data-dcnode-id="835" instrument_node="">
</span><li data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Every half-year, a statement of the sums paid by the receiving State in the course of the half-yearly period in respect of every case regarding which the proposed distribution on a percentage basis has been accepted, shall be sent to the sending States concerned, together with a request for reimbursement. Such reimbursement shall be made within the shortest possible time, in the currency of the receiving State.</span></li></ol><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="830"></p></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="827" instrument_node="">In cases where the application of the provisions of sub-paragraphs b. and e. of this paragraph would cause a Contracting Party serious hardship, it may request the North Atlantic Council to arrange a settlement of a different nature. 
</span><p data-dcnode-id="826"></p></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="821"><span data-dcnode-id="823" instrument_node="">A member of a force or civilian component shall not be subject to any proceedings for the enforcement of any judgment given against him in the receiving State in a matter arising from the performance of his official duties. 
</span><p data-dcnode-id="822"></p></li><span data-dcnode-id="820" instrument_node="">
</span><li data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Except in so far as sub-paragraph e. of this paragraph applies to claims covered by paragraph 2 of this Article, the provisions of this paragraph shall not apply to any claim arising out of or in connexion with the navigation or operation of a ship or the loading, carriage, or discharge of a cargo, other than claims for death or personal injury to which paragraph 4 of this Article does not apply.</span></li></ol><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="815"></p></li><span data-dcnode-id="813" instrument_node="">
</span><li data-dcnode-id="785"><span data-dcnode-id="812" instrument_node="">Claims against members of a force or civilian component arising out of tortious acts or omissions in the receiving State not done in the performance of official duty shall be dealt with in the following manner: 
</span><p data-dcnode-id="811"></p><span data-dcnode-id="810" instrument_node="">
</span><ol data-dcnode-id="788" type="a"><span data-dcnode-id="809" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="808" instrument_node="">The authorities of the receiving State shall consider the claim and assess compensation to the claimant in a fair and just manner, taking into account all the circumstances of the case, including the conduct of the injured person, and shall prepare a report on the matter. 
</span><p data-dcnode-id="807"></p></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="799"><span data-dcnode-id="804" instrument_node="">The report shall be delivered to the authorities of the sending State, who shall then decide without delay whether they will offer an </span><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">ex gratia</span></em><span data-dcnode-id="801" instrument_node=""> payment, and if so, of what amount. 
</span><p data-dcnode-id="800"></p></li><span data-dcnode-id="798" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="797" instrument_node="">If an offer of </span><em data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">ex gratia</span></em><span data-dcnode-id="794" instrument_node=""> payment is made, and accepted by the claimant in full satisfaction of his claim, the authorities of the sending State shall make the payment themselves and inform the authorities of the receiving State of their decision and of the sum paid. 
</span><p data-dcnode-id="793"></p></li><span data-dcnode-id="791" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Nothing in this paragraph shall affect the jurisdiction of the courts of the receiving State to entertain an action against a member of a force or of a civilian component unless and until there has been payment in full satisfaction of the claim.</span></li></ol><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="786"></p></li><span data-dcnode-id="784" instrument_node="">
</span><li data-dcnode-id="781"><span data-dcnode-id="783" instrument_node="">Claims arising out of the unauthorized use of any vehicle of the armed services of a sending State shall be dealt with in accordance with paragraph 6 of this Article, except in so far as the force or civilian component is legally responsible. 
</span><p data-dcnode-id="782"></p></li><span data-dcnode-id="780" instrument_node="">
</span><li data-dcnode-id="777"><span data-dcnode-id="779" instrument_node="">If a dispute arises as to whether a tortious act or omission of a member of a force or civilian component was done in the performance of official duty or as to whether the use of any vehicle of the armed services of a sending State was unauthorized, the question shall be submitted to an arbitrator appointed in accordance with paragraph 2 b. of this Article, whose decision on this point shall be final and conclusive. 
</span><p data-dcnode-id="778"></p></li><span data-dcnode-id="776" instrument_node="">
</span><li data-dcnode-id="773"><span data-dcnode-id="775" instrument_node="">The sending State shall not claim immunity from the jurisdiction of the courts of the receiving State for members of a force or civilian component in respect of the civil jurisdiction of the courts of the receiving State except to the extent provided in paragraph 5 g. of this Article. 
</span><p data-dcnode-id="774"></p></li><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The authorities of the sending State and of the receiving State shall co-operate in the procurement of evidence for a fair hearing and disposal of claims in regard to which the Contracting Parties are concerned.</span></li></ol><span data-dcnode-id="768" instrument_node="">
</span><h4 data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Article IX</span></h4><span data-dcnode-id="765" instrument_node="">
</span><ol data-dcnode-id="733" type="1"><span data-dcnode-id="764" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="763" instrument_node="">Members of a force or of a civilian component and their dependents may purchase locally goods necessary for their own consumption, and such services as they need, under the same conditions as the nationals of the receiving State. 
</span><p data-dcnode-id="762"></p></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="757"><span data-dcnode-id="759" instrument_node="">Goods which are required from local sources for the subsistence of a force or civilian component shall normally be purchased through the authorities which purchase such goods for the armed services of the receiving State. In order to avoid such purchases having any adverse effect on the economy of the receiving State, the competent authorities of that State shall indicate, when necessary, any articles the purchase of which should be restricted or forbidden. 
</span><p data-dcnode-id="758"></p></li><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="755" instrument_node="">Subject to agreements already in force or which may hereafter be made between the authorised representatives of the sending and receiving States, the authorities of the receiving State shall assume sole responsibility for making suitable arrangements to make available to a force or a civilian component the buildings and grounds which it requires, as well as facilities and services connected therewith. These agreements and arrangements shall be, as far as possible, in accordance with the regulations governing the accommodation and billeting of similar personnel of the receiving State. In the absence of a specific contract to the contrary, the laws of the receiving State shall determine the rights and obligations arising out of the occupation or use of the buildings, grounds, facilities or services. 
</span><p data-dcnode-id="754"></p></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="749"><span data-dcnode-id="751" instrument_node="">Local civilian labour requirements of a force or civilian component shall be satisfied in the same way as the comparable requirements of the receiving State and with the assistance of the authorities of the receiving State through the employment exchanges. The conditions of employment and work, in particular wages, supplementary payments and conditions for the protection of workers, shall be those laid down by the legislation of the receiving State. Such civilian workers employed by a force or civilian component shall not be regarded for any purpose as being members of that force or civilian component. 
</span><p data-dcnode-id="750"></p></li><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="747" instrument_node="">When a force or a civilian component has at the place where it is stationed inadequate medical or dental facilities, its members and their dependents may receive medical and dental care, including hospitalization, under the same conditions as comparable personnel of the receiving State. 
</span><p data-dcnode-id="746"></p></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="743" instrument_node="">The receiving State shall give the most favourable consideration to requests for the grant to members of a force or of a civilian component of travelling facilities and concessions with regard to fares. These facilities and concessions will be the subject of special arrangements to be made between the Governments concerned. 
</span><p data-dcnode-id="742"></p></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="737"><span data-dcnode-id="739" instrument_node="">Subject to any general or particular financial arrangements between the Contracting Parties, payment in local currency for goods, accommodation and services furnished under paragraphs, 2, 3, 4 and, if necessary, 5 and 6, of this Article shall be made promptly by the authorities of the force. 
</span><p data-dcnode-id="738"></p></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Neither a force, nor a civilian component, nor the members thereof, nor their dependents, shall by reason of this Article enjoy any exemption from taxes or duties relating to purchases and services chargeable under the fiscal regulations of the receiving State.</span></li></ol><span data-dcnode-id="732" instrument_node="">
</span><h4 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Article X</span></h4><span data-dcnode-id="729" instrument_node="">
</span><ol data-dcnode-id="713" type="1"><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="725"><span data-dcnode-id="727" instrument_node="">Where the legal incidence of any form of taxation in the receiving State depends upon residence or domicile, periods during which a member of a force or civilian component is in the territory of that State by reason solely of his being a member of such force or civilian component shall not be considered as periods of residence therein, or as creating a change of residence or domicile, for the purposes of such taxation. Members of a force or civilian component shall be exempt from taxation in the receiving State on the salary and emoluments paid to them as such members by the sending State or on any tangible movable property the presence of which in the receiving State is due solely to their temporary presence there. 
</span><p data-dcnode-id="726"></p></li><span data-dcnode-id="724" instrument_node="">
</span><li data-dcnode-id="721"><span data-dcnode-id="723" instrument_node="">Nothing in this Article shall prevent taxation of a member of a force or civilian component with respect to any profitable enterprise, other than his employment as such member, in which he may engage in the receiving State, and, except as regards his salary and emoluments and the tangible movable property referred to in paragraph I, nothing in this Article shall prevent taxation to which, even if regarded as having his residence or domicile outside the territory of the receiving State, such a member is liable under the law of that State. 
</span><p data-dcnode-id="722"></p></li><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="717"><span data-dcnode-id="719" instrument_node="">Nothing in this Article shall apply to 'duty' as defined in paragraph 12 of Article XI. 
</span><p data-dcnode-id="718"></p></li><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">For the purposes of this Article the term 'member of a force' shall not include any person who is a national of the receiving State.</span></li></ol><span data-dcnode-id="712" instrument_node="">
</span><h4 data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Article XI</span></h4><span data-dcnode-id="709" instrument_node="">
</span><ol data-dcnode-id="625" type="1"><span data-dcnode-id="708" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="707" instrument_node="">Save as provided expressly to the contrary in this Agreement, members of a force and of a civilian component as well as their dependents shall be subject to the laws and regulations administered by the customs authorities of the receiving State. In particular the customs authorities of the receiving State shall have the right, under the general conditions laid down by the laws and regulations of the receiving State, to search members of a force or civilian component and their dependents and to examine their luggage and vehicles, and to seize articles pursuant to such laws and regulations. 
</span><p data-dcnode-id="706"></p></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="686"><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="702"></p><span data-dcnode-id="701" instrument_node="">
</span><ol data-dcnode-id="689" type="a"><span data-dcnode-id="700" instrument_node="">
</span><li data-dcnode-id="697"><span data-dcnode-id="699" instrument_node="">The temporary importation and the re-exportation of service vehicles of a force or civilian component under their own power shall be authorized free of duty on presentation of a triptyque in the form shown in the Appendix to this Agreement. 
</span><p data-dcnode-id="698"></p></li><span data-dcnode-id="696" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="695" instrument_node="">The temporary importation of such vehicles not under their own power shall be governed by paragraph 4 of this Article and the re-exportation thereof by paragraph 8. 
</span><p data-dcnode-id="694"></p></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Service vehicles of a force or civilian component shall be exempt from any tax payable in respect of the use of vehicles on the roads.</span></li></ol><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="687"></p></li><span data-dcnode-id="685" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="684" instrument_node="">Official documents under official seal shall not be subject to customs inspection. Couriers, whatever their status, carrying these documents must be in possession of an individual movement order, issued in accordance with paragraph 2 b. of Article III. This movement order shall show the number of despatches carried and certify that they contain only official documents. 
</span><p data-dcnode-id="683"></p></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="680" instrument_node="">A force may import free of duty the equipment for the force and reasonable quantities of provisions, supplies and other goods for the exclusive use of the force and, in cases where such use is permitted by the receiving State, its civilian component and dependents. This duty-free importation shall be subject to the deposit, at the customs office for the place of entry, together with such customs documents as shall be agreed, of a certificate in a form agreed between the receiving State and the sending State signed by a person authorized by the sending State for that purpose. The designation of the person authorised to sign the certificates as well as specimens of the signatures and stamps to be used, shall be sent to the customs administration of the receiving State. 
</span><p data-dcnode-id="679"></p></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="674"><span data-dcnode-id="676" instrument_node="">A member of a force or civilian component may, at the time of his first arrival to take up service in the receiving State or at the time of the first arrival of any dependent to join him, import his personal effects and furniture free of duty for the term of such service. 
</span><p data-dcnode-id="675"></p></li><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="670"><span data-dcnode-id="672" instrument_node="">Members of a force or civilian component may import temporarily free of duty their private motor vehicles for the personal use of themselves and their dependents. There is no obligation under this Article to grant exemption from taxes payable in respect of the use of roads by private vehicles. 
</span><p data-dcnode-id="671"></p></li><span data-dcnode-id="669" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="668" instrument_node="">Imports made by the authorities of a force other than for the exclusive use of that force and its civilian component, and imports, other than those dealt with in paragraphs 5 and 6 of this Article, effected by members of a force or civilian component are not, by reason of this Article, entitled to any exemption from duty or other conditions. 
</span><p data-dcnode-id="667"></p></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="664" instrument_node="">Goods which have been imported duty-free under paragraphs 2 b., 4, 5 or 6 above: 
</span><p data-dcnode-id="663"></p><span data-dcnode-id="662" instrument_node="">
</span><ol data-dcnode-id="654" type="a"><span data-dcnode-id="661" instrument_node="">
</span><li data-dcnode-id="658"><span data-dcnode-id="660" instrument_node="">may be re-exported freely, provided that, in the case of goods imported under paragraph 4, a certificate, issued in accordance with that paragraph, is presented to the customs office: the customs authorities, however, may verify that goods re-exported are as described in the certificate, if any, and have in fact been imported under the conditions of paragraphs 2 b., 4, 5 or 6 as the case may be; 
</span><p data-dcnode-id="659"></p></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">shall not normally be disposed of in the receiving State by way of either sale or gift: however, in particular cases such disposal may be authorized on conditions imposed by the authorities concerned of the receiving State (for instance, on payment of duty and tax and compliance with the requirements of the controls of trade and exchange).</span></li></ol><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="652"></p></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="647"><span data-dcnode-id="649" instrument_node="">Goods purchased in the receiving State shall be exported therefrom only in accordance with the regulations in force in the receiving State. 
</span><p data-dcnode-id="648"></p></li><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="645" instrument_node="">Special arrangements for crossing frontiers shall be granted by the customs authorities to regularly constituted units or formations, provided that the customs authorities concerned have been duly notified in advance. 
</span><p data-dcnode-id="644"></p></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="639"><span data-dcnode-id="641" instrument_node="">Special arrangements shall be made by the receiving State so that fuel, oil and lubricants for use in service vehicles, aircraft and vessels of a force or civilian component, may be delivered free of all duties and taxes. 
</span><p data-dcnode-id="640"></p></li><span data-dcnode-id="638" instrument_node="">
</span><li data-dcnode-id="629"><span data-dcnode-id="637" instrument_node="">In paragraphs 1-10 of this Article: 
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">'duty' means customs duties and all other duties and taxes payable on importation or exportation. as the case may be. except dues and taxes which are no more than charges for services rendered;</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">'importation' includes withdrawal from customs warehouses or continuous customs custody, provided that the goods concerned have not been grown, produced or manufactured in the receiving State.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="630"></p></li><span data-dcnode-id="628" instrument_node="">
</span><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">The provisions of this Article shall apply to the goods concerned not only when they are imported into or exported from the receiving State but also when they are in transit through the territory of a Contracting Party, and for this purpose the expression 'receiving State' in this Article shall be regarded as including any Contracting Party through whose territory the goods are passing in transit.</span></li></ol><span data-dcnode-id="624" instrument_node="">
</span><h4 data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Article XII</span></h4><span data-dcnode-id="621" instrument_node="">
</span><ol data-dcnode-id="613"><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="617"><span data-dcnode-id="619" instrument_node="">The customs or fiscal authorities of the receiving State may, as a condition of the grant of any customs or fiscal exemption or concession provided for in this Agreement, require such conditions to be observed as they may deem necessary to prevent abuse. 
</span><p data-dcnode-id="618"></p></li><span data-dcnode-id="616" instrument_node="">
</span><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">These authorities may refuse any exemption provided for by this Agreement in respect of the importation into the receiving State of articles grown, produced or manufactured in that State which have been exported therefrom without payment of, or upon repayment of, taxes or duties which would have been chargeable but for such exportation. Goods removed from a customs warehouse shall be deemed to be imported if they were regarded as having been exported by reason of being deposited in the warehouse.</span></li></ol><span data-dcnode-id="612" instrument_node="">
</span><h4 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Article XIII</span></h4><span data-dcnode-id="609" instrument_node="">
</span><ol data-dcnode-id="593" type="1"><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="605"><span data-dcnode-id="607" instrument_node="">In order to prevent offences against customs and fiscal laws regulations, the authorities of the receiving and of the sending States shall assist each other in the conduct of enquiries and the collection of evidence. 
</span><p data-dcnode-id="606"></p></li><span data-dcnode-id="604" instrument_node="">
</span><li data-dcnode-id="601"><span data-dcnode-id="603" instrument_node="">The authorities of a force shall render all assistance within their power to ensure that articles liable to seizure by, or on behalf of, the customs or fiscal authorities of the receiving State are handed to those authorities. 
</span><p data-dcnode-id="602"></p></li><span data-dcnode-id="600" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="599" instrument_node="">The authorities of a force shall render all assistance within their power to ensure the payment of duties, taxes and penalties payable by members of the force or civilian component or their dependents. 
</span><p data-dcnode-id="598"></p></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Service vehicles and articles belonging to a force or to its civilian component, and not to a member of such force or civilian component, seized by the authorities of the receiving State in connection with an offence against its customs or fiscal laws or regulations shall be handed over to the appropriate authorities of the force concerned.</span></li></ol><span data-dcnode-id="592" instrument_node="">
</span><h4 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Article XIV</span></h4><span data-dcnode-id="589" instrument_node="">
</span><ol data-dcnode-id="581" type="a"><span data-dcnode-id="588" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="587" instrument_node="">A force, a civilian component and the members thereof, as well as their dependents, shall remain subject to the foreign exchange regulations of the sending State and shall also be subject to the regulations of the receiving State. 
</span><p data-dcnode-id="586"></p></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">The foreign exchange authorities of the sending and the receiving States may issue special regulations applicable to a force or civilian component or the members thereof as well as to their dependents.</span></li></ol><span data-dcnode-id="580" instrument_node="">
</span><h4 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Article XV</span></h4><span data-dcnode-id="577" instrument_node="">
</span><ol data-dcnode-id="569" type="1"><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="575" instrument_node="">Subject to paragraph 2 of this Article, this Agreement shall remain in force in the event of hostilities to which the North Atlantic Treaty applies, except that the provisions for settling claims in paragraphs 2 and 5 of Article VIII shall not apply to war damage, and that the provisions of the Agreement, and, in particular of Articles III and VII, shall immediately be reviewed by the Contracting Parties concerned, who may agree to such modifications as they may consider desirable regarding the application of the Agreement between them. 
</span><p data-dcnode-id="574"></p></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">In the event of such hostilities, each of the Contracting Parties shall have the right, by giving 60 days' notice to the other Contracting Parties, to suspend the application of any of the provisions of this Agreement so far as it is concerned. If this right is exercised, the Contracting Parties shall immediately consult with a view to agreeing on suitable provisions to replace the provisions suspended.</span></li></ol><span data-dcnode-id="568" instrument_node="">
</span><h4 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Article XVI</span></h4><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">All differences between the Contracting Parties relating to the interpretation or application of this Agreement shall be settled by negotiation between them without recourse to any outside jurisdiction. Except where express provision is made to the contrary in this Agreement, differences which cannot be settled by direct negotiation shall be referred to the North Atlantic Council.</span></p><span data-dcnode-id="562" instrument_node="">
</span><h4 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Article XVII</span></h4><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Any Contracting Party may at any time request the revision of any Article of this Agreement. The request shall be addressed to the North Atlantic Council.</span></p><span data-dcnode-id="556" instrument_node="">
</span><h4 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Article XVIII</span></h4><span data-dcnode-id="553" instrument_node="">
</span><ol data-dcnode-id="541"><span data-dcnode-id="552" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="551" instrument_node="">The present Agreement shall be ratified and the instruments of ratification shall be deposited as soon as possible with the Government of the United States of America, which shall notify each signatory State of the date of deposit thereof. 
</span><p data-dcnode-id="550"></p></li><span data-dcnode-id="548" instrument_node="">
</span><li data-dcnode-id="545"><span data-dcnode-id="547" instrument_node="">Thirty days after four signatory States have deposited their instruments of ratification the present Agreement shall come into force between them. It shall come into force for each other signatory State thirty days after the deposit of its instrument of ratification. 
</span><p data-dcnode-id="546"></p></li><span data-dcnode-id="544" instrument_node="">
</span><li data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">After it has come into force, the present Agreement shall, subject to the approval of the North Atlantic Council and to such conditions as it may decide, be open to accession on behalf of any State which accedes to the North Atlantic Treaty. Accession shall be effected by the deposit of an instrument of accession with the Government of the United States of America, which shall notify each signatory and acceding State of the date of deposit thereof. In respect of any State on behalf of which an instrument of accession is deposited, the present Agreement shall come into force thirty days after the date of the deposit of such instrument.</span></li></ol><span data-dcnode-id="540" instrument_node="">
</span><h4 data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Article XIX</span></h4><span data-dcnode-id="537" instrument_node="">
</span><ol data-dcnode-id="525" type="1"><span data-dcnode-id="536" instrument_node="">
</span><li data-dcnode-id="533"><span data-dcnode-id="535" instrument_node="">The present Agreement may be denounced by any Contracting Party after the expiration of a period of four years from the date on which the Agreement comes into force. 
</span><p data-dcnode-id="534"></p></li><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="531" instrument_node="">The denunciation of the Agreement by any Contracting Party shall be effected by a written notification addressed by that Contracting Party to the Government of the United States of America which shall notify all the other Contracting Parties of each such notification and the date of receipt thereof. 
</span><p data-dcnode-id="530"></p></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The denunciation shall take effect one year after the receipt of the notification by the Government of the United States of America. After the expiration of this period of one year, the Agreement shall cease to be in force as regards the Contracting Party which denounces it, but shall continue in force for the remaining Contracting Parties.</span></li></ol><span data-dcnode-id="524" instrument_node="">
</span><h4 data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Article XX</span></h4><span data-dcnode-id="521" instrument_node="">
</span><ol data-dcnode-id="509" type="1"><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="517"><span data-dcnode-id="519" instrument_node="">Subject to the provisions of paragraphs 2 and 3 of this Article, the present Agreement shall apply only to the metropolitan territory of a Contracting Party. 
</span><p data-dcnode-id="518"></p></li><span data-dcnode-id="516" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="515" instrument_node="">Any State may, however, at the time of the deposit of its instrument of ratification or accession or at any time thereafter, declare by notification given to the Government of the United States of America that the present Agreement shall extend (subject, if the State making the declaration considers it to be necessary, to the conclusion of a special agreement between that State and each of the sending States concerned), to all or any of the territories for whose international relations it is responsible in the North Atlantic Treaty area. The present Agreement shall then extend to the territory or territories named therein thirty days after the receipt by the Government of the United States of America of the notification, or thirty days after the conclusion of the special agreements if required, or when it has come into force under Article XVIII, whichever is the later. 
</span><p data-dcnode-id="514"></p></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">A State which has made a declaration under paragraph 2 of this Article extending the present Agreement to any territory for whose international relations it is responsible may denounce the Agreement separately in respect of that territory in accordance with the provisions of Article XIX.</span></li></ol><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">In witness whereof the undersigned Plenipotentiaries have signed the present Agreement. Done in London this nineteenth day of June, 1951, in the English and French languages, both texts being equally authoritative, in a single original which shall be deposited in the archives of the Government of the United States of America. The Government of the United States of America shall transmit certified copies thereof to all the signatory and acceding States.</span></p><span data-dcnode-id="505" instrument_node="">
</span></div><span data-dcnode-id="503" instrument_node="">
