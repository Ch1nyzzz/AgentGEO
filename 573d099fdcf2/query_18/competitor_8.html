</span><center data-dcnode-id="669"><h2 data-dcnode-id="670"><span data-dcnode-id="673" instrument_node="">The U.S. Department of State:</span><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node="">

Structure and Organization</span></h2></center><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">
</span></p><center data-dcnode-id="662"><i data-dcnode-id="663"><font data-dcnode-id="664" size="2"><span data-dcnode-id="665" instrument_node="">Released by the Bureau of Public Affairs

May 26, 1995</span></font></i></center><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">
</span></p><blockquote data-dcnode-id="86"><span data-dcnode-id="658" instrument_node="">

The United States maintains diplomatic relations with some 180 countries and also maintains relations with many international organizations.  It has more than 250 diplomatic and consular posts around the world: country mission components--which may include embassies, consulates, or other posts; and delegations and missions to international organizations.

</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The Department of State is the lead U.S. foreign affairs agency.  It advances U.S. objectives and interests in shaping a freer, more secure, and more prosperous world through formulating, representing, and implementing the President's foreign policies.  The Secretary of State, the ranking member of the Cabinet and fourth in line of presidential succession, is the President's principal adviser on foreign policy and the person chiefly responsible for U.S. representation abroad.  Several related foreign affairs agencies--the Arms Control and Disarmament Agency (ACDA), the Agency for International Development (USAID), and the U.S. Information Agency (USIA)--are under the general direction and overall foreign policy guidance of the Secretary of State.

</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">The Department of State carries out its mission through overseas posts; its Washington, DC, headquarters; and other offices in the U.S.  Its employees in the U.S. and abroad include political appointees as well as career Civil Service and Foreign Service personnel.

</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">In addition to representing U.S. policy and interests at these posts, the Department of State is the primary provider of foreign affairs information used by the U.S. Government in policy formulation. Information received from U.S. posts--including in-depth analyses of the politics, economic trends, and social forces at work in foreign countries--is provided to some 60 federal agencies dealing with national security, intelligence, economic and commercial matters, or science and technology. </span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node=""> </span></p><h3 data-dcnode-id="647"><i data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Overview of the State Department's Organization</span></i></h3><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="645"></p><h4 data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Mandate for Change</span></h4><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Under Vice President Gore's National Performance Review (NPR) initiative, the State Department in October 1994 began to redefine which roles it needs to fulfill and which structures are required to support those roles.  In response to the Vice President's effort to redefine what the U.S. Government does and who in government does it, the Department undertook its  Strategic Management Initiative (SMI).

</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">SMI reinforces the direction of steps taken beginning in 1993 to reorganize the Department to respond to post-Cold War foreign policy challenges.  These changes included creating a fifth Under Secretary position to coordinate global affairs issues and forming several new bureaus through consolidation and realignment.  Overall, the reorganization served to:

</span></p><p data-dcnode-id="637"></p><blockquote data-dcnode-id="629"><span data-dcnode-id="636" instrument_node=""> --  Emphasize the Department's full engagement in promoting U.S. interests abroad, reinforced by Secretary Christopher's concept that it is "America's desk;"

</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">  --  Position the Department to act effectively on key regional developments and other critical foreign affairs issues; </span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node=""> --  Adapt the Department to the increasing globalization of many foreign policy matters; and

</span><br data-dcnode-id="631"><span data-dcnode-id="630" instrument_node="">--  Reflect the growing importance of developing options for multilateral approaches in the conduct of foreign relations.

</span></blockquote><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">The SMI process continues the Department's review of how to streamline its organization around its core mission, which is to:

</span></p><p data-dcnode-id="625"></p><blockquote data-dcnode-id="617"><span data-dcnode-id="624" instrument_node=""> --  Ensure national security by building and maintaining alliances and defusing and preventing crises;

</span><br data-dcnode-id="623"><span data-dcnode-id="622" instrument_node="">--  Advance the economic interests of the American people by promoting free trade and assisting American businesses;

</span><br data-dcnode-id="621"><span data-dcnode-id="620" instrument_node=""> --  Promote democratic values and respect for human rights; and

</span><br data-dcnode-id="619"><span data-dcnode-id="618" instrument_node=""> --  Provide protection and services to Americans abroad and control access to the United States.</span></blockquote><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">SMI's second phase builds on the Vice President's January 1995 decisions that emphasized the unique and independent role of each of the foreign affairs agencies under the overall leadership of the Department of State.  SMI aims to achieve the goals of NPR and enhance the Department's ability to promote America's interest and maintain America's leadership in the world.  This initiative builds on the core strengths of the State Department:  the geographic, economic, and political expertise of its employees; its management of embassies abroad; and its skills at reporting and policy formulation and integration.

</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Key decisions made by the Secretary of State in SMI's second phase include:

</span></p><p data-dcnode-id="611"></p><blockquote data-dcnode-id="599"><span data-dcnode-id="610" instrument_node=""> --  Continuing consolidation of the Department's overseas presence by closing 20-25 posts in addition to the 17 already closed;

</span><br data-dcnode-id="609"><span data-dcnode-id="608" instrument_node=""> --  Streamlining the policy formulation and implementation process through making greater use of special teams of officers to handle high- priority issues;

</span><br data-dcnode-id="607"><span data-dcnode-id="606" instrument_node="">  --  Increasing interagency coordination;

</span><br data-dcnode-id="605"><span data-dcnode-id="604" instrument_node="">  --  Eliminating unnecessary reports and modernizing information technology;

</span><br data-dcnode-id="603"><span data-dcnode-id="602" instrument_node=""> --  Enhancing customer service; and

</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node="">  --  Exploring the privatization of some functions.</span></blockquote><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="597"></p><h3 data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Current Structure </span></h3><span data-dcnode-id="594" instrument_node=""> The Department of State is headed by the Secretary (S) aided by a Deputy Secretary (D), five Under Secretaries, and 19 Assistant Secretaries. The Chief of Staff (S/COS) and Executive Secretariat (S/S) closely support the Secretary and Deputy Secretary.  Several specialized offices and bureaus--headed by top aides and key advisers to the Secretary--help the Department focus on certain critical foreign policy areas and on important management issues.

</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">The Department's Under Secretaries act as the "corporate board" of key advisers to the Secretary.  They oversee the activities of most of the Department's bureaus and offices--which are organized under them to support their policy planning, coordination, and implementation activities.  The Under Secretaries are those for Political Affairs (P); Economic, Business, and Agricultural Affairs (E); Arms Control and International Security Affairs (T); Management (M); and Global Affairs (G).

</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">An Assistant Secretary or the equivalent runs each of the Department's regional, functional, and management bureaus; most bureaus comprise several offices headed by directors.

</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">As part of SMI's second phase, more decision-making power at the level of Assistant Secretaries and below will enhance Under Secretaries' focus on broad policy oversight of key issues and their role as the Secretary's guarantors of policy coherence.  Under Secretaries may also, as a result of SMI Phase Two, head special cross-cutting teams which handle high-priority issues. </span></p><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node=""> </span></p><h3 data-dcnode-id="583"><i data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Units Attached to the Office of the Secretary</span></i></h3><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">The following units are attached to the Office of the Secretary.

</span></p><p data-dcnode-id="575"><span data-dcnode-id="579" instrument_node="">The </span><b data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Operations Center</span></b><span data-dcnode-id="576" instrument_node="">--or "the Watch"--(S/S-O) is part of the Executive Secretariat.  It is open around the clock to alert and brief Department officials on overseas news and events and to coordinate the Department's response to emergency situations.  The Watch also provides selected communications support to Department officials.

</span></p><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">The </span><b data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Policy Planning Staff</span></b><span data-dcnode-id="571" instrument_node=""> (S/P) is responsible for developing and proposing to the Secretary of State strategic political and economic policies.

</span></p><p data-dcnode-id="565"><span data-dcnode-id="569" instrument_node="">The </span><b data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Office of Resources, Plans, and Policy</span></b><span data-dcnode-id="566" instrument_node=""> (S/RPP) is responsible for coordinating policy formulation with resource planning activities.  The office develops for the Secretary's decision recommendations on international affairs resource issues, allocates funds in accordance with the Secretary's decisions, and conducts periodic program reviews.

</span></p><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">The </span><b data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Office of the Chief of Protocol</span></b><span data-dcnode-id="561" instrument_node=""> (S/CPR) advises the President, Vice President, Secretary of State, and others on matters of national and international protocol; supports ceremonial events and functions in the U.S. and abroad; manages Blair House--the President's guest house; and is responsible for accreditation activities.

</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Also attached to the Office of the Secretary are a number of offices headed by ambassadors-at-large, special advisers, and senior coordinators for such foreign policy areas and issues as the Middle East Peace Process, Russia and the other New Independent States of the former Soviet Union, Haiti, North Korea, and counter-terrorism.  Other offices attached to the Office of the Secretary deal with personnel issues, including the Equal Employment Opportunity and Civil Rights Office, the Civil Service Ombudsman, and the Foreign Service Grievance Board. </span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">
</span></p><h3 data-dcnode-id="553"><i data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Units Outside the Office of the Secretary</span></i></h3><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The following offices and bureaus, while not attached to the Office of the Secretary, report directly to the Secretary.  As part of the Department's streamlining efforts, certain administrative functions for some of these units have been consolidated.

</span></p><p data-dcnode-id="545"><span data-dcnode-id="549" instrument_node="">The</span><b data-dcnode-id="547"><span data-dcnode-id="548" instrument_node=""> Office of the Permanent Representative to the United Nations</span></b><span data-dcnode-id="546" instrument_node=""> (USUN/W) is headed by the Permanent Representative, a Cabinet member who represents the United States at the UN.  This office shapes U.S. policy at the UN, working for multilateral policy formulation and implementation where possible and seeking to make the UN and its agencies more effective instruments for advancing U.S. interests and addressing global needs.

</span></p><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">The </span><b data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Bureau of Public Affairs</span></b><span data-dcnode-id="541" instrument_node=""> (PA) interaction with the American public is key to the Secretary's America's Desk concept--the Department's commitment to relating foreign policy goals to the American people and keeping the public involved in the foreign policy process.

</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">The bureau does this in a variety of ways:

</span></p><p data-dcnode-id="522"><span data-dcnode-id="537" instrument_node="">--  Conducting daily press briefings and arranging interviews for the Secretary and other Department principals with television, radio, and print media;

</span><br data-dcnode-id="536"><span data-dcnode-id="535" instrument_node=""> --  Drafting speeches and testimonies for the Secretary of State;

</span><br data-dcnode-id="534"><span data-dcnode-id="533" instrument_node="">  --  Releasing material on current and historical U.S. foreign policy in hard copy and electronically;

</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">  --  Promoting Department relations with state and local elected officials;

</span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">  --  Holding briefing programs in the Department and throughout the Washington metropolitan area;

</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">  --  Conducting regional town meetings;

</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node=""> --  Sending speakers around the country; and

</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node=""> --  Answering the public's phone calls and mail to the Secretary and Deputy Secretary.

</span></p><p data-dcnode-id="517"><span data-dcnode-id="521" instrument_node="">The </span><b data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Bureau of Legislative Affairs</span></b><span data-dcnode-id="518" instrument_node=""> (H) serves as liaison between the State Department and the Congress.  The bureau performs a critical role in advancing the President's and the Department's legislative agenda in the area of foreign policy.

</span></p><p data-dcnode-id="512"><span data-dcnode-id="516" instrument_node="">The </span><b data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Bureau of Intelligence and Research</span></b><span data-dcnode-id="513" instrument_node=""> (INR), drawing on all-source intelligence, provides value-added independent analysis of events to Department policymakers; ensures that intelligence activities support foreign policy and national security purposes; and coordinates issues involving intelligence, security, and counterintelligence.  INR's primary mission is to harness intelligence to serve U.S. diplomacy.

</span></p><p data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">The </span><b data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Office of Inspector General </span></b><span data-dcnode-id="508" instrument_node="">(OIG) is an independent office that audits, inspects, and investigates the activities of all elements of the Department.  The Inspector General reports directly to the Secretary and the Congress on the results of this work and makes recommendations to promote economy and efficiency and to prevent fraud, waste, and abuse in Department programs and operations.

</span></p><p data-dcnode-id="502"><span data-dcnode-id="506" instrument_node="">The </span><b data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Office of the Legal Adviser</span></b><span data-dcnode-id="503" instrument_node=""> (L) counsels the Secretary and Department on legal considerations regarding foreign policy issues and the management of the Department.

 </span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node=""> </span></p><h3 data-dcnode-id="497"><i data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Under Secretaries and Their Group Components</span></i></h3><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Most of the Department's bureaus and offices are organized in groups to support policy planning, coordination, and execution by the five Under Secretaries.  As part of the Department's streamlining efforts, certain administrative functions have been consolidated in some groups.

</span></p><p data-dcnode-id="493"></p><h4 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Under Secretary for Political Affairs (P) Group</span></h4><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">The Under Secretary for Political Affairs is the Department's crisis manager and also is responsible for integrating political, economic, global, and security issues into the United States' bilateral relationships.

</span></p><p data-dcnode-id="483"><span data-dcnode-id="487" instrument_node="">The</span><b data-dcnode-id="485"><span data-dcnode-id="486" instrument_node=""> geographic bureaus</span></b><span data-dcnode-id="484" instrument_node=""> coordinate the conduct of U.S. foreign relations in six world regions.  They are:</span></p><p data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">
</span></p><blockquote data-dcnode-id="451"><span data-dcnode-id="480" instrument_node=""> --The Bureau of </span><b data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">African Affairs</span></b><span data-dcnode-id="477" instrument_node=""> (AF);

</span><br data-dcnode-id="476"><span data-dcnode-id="475" instrument_node="">  --The Bureau of </span><b data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">East Asian and Pacific Affairs</span></b><span data-dcnode-id="472" instrument_node=""> (EAP);

</span><br data-dcnode-id="471"><span data-dcnode-id="470" instrument_node=""> --The Bureau of </span><b data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">European and Canadian Affairs</span></b><span data-dcnode-id="467" instrument_node=""> (EUR);

</span><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">  --The </span><b data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Bureau of Inter-American Affairs </span></b><span data-dcnode-id="462" instrument_node="">(for Latin America and the Caribbean--ARA);

</span><br data-dcnode-id="461"><span data-dcnode-id="460" instrument_node=""> --The </span><b data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Bureau of Near Eastern Affairs</span></b><span data-dcnode-id="457" instrument_node=""> (NEA); and

</span><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node=""> --The </span><b data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Bureau of South Asian Affairs</span></b><span data-dcnode-id="452" instrument_node=""> (SA).

</span></blockquote><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">The Assistant Secretaries of these bureaus advise the Secretary and guide the operation of the U.S. diplomatic establishments within their regional jurisdiction.  They are assisted by Deputy Assistant Secretaries, office directors, post management officers, and country desk officers to ensure interdepartmental coordination.  These officials work closely with U.S. embassies and consulates overseas and with foreign embassies in Washington, DC.

</span></p><p data-dcnode-id="443"><span data-dcnode-id="447" instrument_node="">The </span><b data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Bureau of International Organization Affairs</span></b><span data-dcnode-id="444" instrument_node=""> (IO) builds the coalitions necessary to advance U.S. policies in the United Nations and UN specialized and technical agencies.  Its concerns include such issues as refugees, human rights, food production, air safety, health, terrorism, and the environment.  A focus for IO is the UN Security Council and the maintenance of international peace and security.  As part of its mandate, the bureau has an office for managing U.S. participation in multilateral peace-keeping activities.  The bureau works closely with the U.S. Mission to the UN in New York and its Washington, DC, office to shape U.S. policy at the UN and to make it a more effective instrument for advancing U.S. interests.

</span></p><p data-dcnode-id="442"></p><h4 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Under Secretary for Economic, Business, and Agricultural Affairs (E) Group</span></h4><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Economics and trade are assuming greater importance in U.S. foreign policy.  There is increasing demand for the "E" Group's services as more and more countries--including emerging democracies--move to open their markets to international trade and investment.  An Office of the Coordinator for Business Affairs (E/CBA) has been established as part of the Department's emphasis on being America's Desk.  This office is located in the Office of the Under Secretary and it:

</span></p><p data-dcnode-id="436"></p><ul data-dcnode-id="424"><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">  Coordinates State Department advocacy on behalf of U.S. businesses;

</span></li><li data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">  Provides problem-solving assistance to U.S. companies in opening markets, leveling playing fields, and resolving trade and investment disputes;

</span></li><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">  Ensures that appropriate U.S. business interests are taken into account in the foreign policy process;

</span></li><li data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">  Develops and implements internal policies, procedures, and training to improve the Department's support for U.S. businesses; and

</span></li><li data-dcnode-id="425"><span data-dcnode-id="427" instrument_node="">  Coordinates support with the Commerce Department's U.S. and Foreign Commercial Service for posts where the State Department is directly responsible for trade promotion and commercial services.</span><p data-dcnode-id="426"></p></li></ul><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">The </span><b data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Bureau of Economic and Business Affairs</span></b><span data-dcnode-id="419" instrument_node=""> (EB) deals with issues of trade, international finance and development, energy, commodities, transportation, economic sanctions, and telecommunications policy.  It also promotes U.S. business opportunities overseas.

</span></p><p data-dcnode-id="417"></p><h4 data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Under Secretary for Arms Control and International Security Affairs (T) Group</span></h4><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">The</span><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node=""> Bureau of Political-Military Affairs </span></b><span data-dcnode-id="410" instrument_node="">(PM) advises the Secretary and other Department principals on security and defense issues worldwide, including arms control negotiations; non-proliferation of weapons of mass destruction and the means to deliver them; regional security arrangements; programs for selected foreign security assistance; conventional arms sales; peaceful uses of nuclear energy and nuclear reactor safety; dual use and technology transfers; and international space issues involving military systems and controlled technologies. The bureau also is responsible for licensing and regulating commercial exports of military equipment and services.

</span></p><p data-dcnode-id="408"></p><h4 data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Under Secretary for Management (M) Group</span></h4><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">In addition to overseeing the State Department's traditional management issues, the Under Secretary for Management is responsible for the Department's recent management improvement initiatives, including the SMI process.  The Office of Management Policy and Planning (M/P), reporting directly to the Under Secretary, serves as the focal point for these initiatives.  It provides dedicated policy, planning, and analytical support to the Under Secretary on management issues in the three broad areas of M responsibility--human resources, financial management and operations, and support services--and supports Department-wide strategic planning activities as well as the implementation of initiatives arising from the National Performance Review.  It also performs the functions associated with National Security Decision Directive 38 and chiefs of mission authority, implements the Government Performance and Results Act, and provides other staff support for the Under Secretary.

</span></p><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">The </span><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Office of Foreign Missions</span></b><span data-dcnode-id="399" instrument_node=""> (M/OFM) is responsible for oversight of foreign missions in the United States.  It employs reciprocity to ensure equitable treatment for U.S. diplomatic and consular missions abroad and regulates selected activities of foreign missions in the United States to protect foreign policy and national security interests and to protect the public from abuses of diplomatic privileges and immunities by foreign mission members.  It has regional offices in Chicago, San Francisco, New York, and Los Angeles.

</span></p><p data-dcnode-id="393"><span data-dcnode-id="397" instrument_node="">The</span><b data-dcnode-id="395"><span data-dcnode-id="396" instrument_node=""> Foreign Service Institute </span></b><span data-dcnode-id="394" instrument_node="">(M/FSI) is the federal government's primary foreign affairs training institution.  In addition to Department of State and foreign affairs community personnel, the Institute provides professional and job-related training to the employees of more than 40 other government agencies in more than 300 courses, including some 60 foreign languages, at its National Foreign Affairs Training Center.

</span></p><p data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">The </span><b data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Director General of the Foreign Service and Director of Personnel</span></b><span data-dcnode-id="389" instrument_node=""> (M/DGP) oversees the medical services office; the family liaison office; and the Bureau of Personnel (PER), which determines employment requirements and administers recruitment, evaluation, assignment, career development, and retirement policies and programs for the Department's employees.

</span></p><p data-dcnode-id="383"><span data-dcnode-id="387" instrument_node="">The </span><b data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Bureau of Administration </span></b><span data-dcnode-id="384" instrument_node="">(A) provides administrative support for the Department and overseas posts.  Its responsibilities include both domestic and foreign building operations; acquisition management; supply and transportation; travel support for the White House; overseas schools assistance; establishing allowance rates; and providing translation, safety, and occupational health services.

</span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Other services include maintaining the Department's library, overseeing the printing of Department publications, and responding to requests under privacy acts and the Freedom of Information Act.  The bureau also provides domestic and worldwide information services for the Department, which includes managing a secure global communications network and maintaining the Department's central automated data processing system.

</span></p><p data-dcnode-id="376"><span data-dcnode-id="380" instrument_node="">The </span><b data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Bureau of Consular Affairs </span></b><span data-dcnode-id="377" instrument_node="">(CA) assists American citizens traveling or living abroad and issues visas to foreign nationals who wish to visit or reside in the United States.  The 13 passport agencies and one processing center--in the United States--and the U.S. posts overseas issue about 4 million passports each year.  Annually, the Office of Overseas Citizens Services in the State Department monitors the cases of an estimated 2,500 Americans arrested in other countries, responds to 21,000 welfare and whereabouts inquiries, repatriates about 1,000 U.S. citizens, assists about 3,000 returnees with family/friend prepaid trust funds, and deals with crises--such as hostage-taking and natural disasters.

</span></p><p data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">The </span><b data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Bureau of Diplomatic Security's </span></b><span data-dcnode-id="372" instrument_node="">(DS) regional security officers and engineers protect U.S. personnel and missions overseas, advising U.S. ambassadors on all security matters and establishing and maintaining an effective security program against terrorist, espionage, and criminal threats at U.S. diplomatic facilities.  In the U.S., the bureau's special agents investigate passport and visa fraud, conduct personnel security investigations, issue security clearances, and provide protection for the Secretary of State and many visiting foreign dignitaries .

</span></p><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">The bureau helps foreign embassies and consulates in the U.S. protect their diplomats and facilities, manages the Counter-terrorism Rewards Program, and trains foreign civilian police under the Anti-Terrorism Assistance Program.  It also chairs the Overseas Security Advisory Council, a joint venture between the Department and the U.S. private sector to exchange timely information on security problems with U.S. businesses.

</span></p><p data-dcnode-id="364"><span data-dcnode-id="368" instrument_node="">The</span><b data-dcnode-id="366"><span data-dcnode-id="367" instrument_node=""> Bureau of Financial Management and Policy</span></b><span data-dcnode-id="365" instrument_node=""> (FMP) oversees the Department's worldwide financial and asset management activities.  This includes establishing, maintaining, and enhancing management control policies, standards, and compliance guidelines as well as developing and operating an integrated system for accounting and financial management. The bureau develops annual budget requests to the Office of Management and Budget and Congress; monitors financial execution of the budget; and reviews, on a biennial basis, the fees, royalties, rents, and other charges imposed by the Department for goods and services it provides.

</span></p><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">In addition to administering the Department's financial accounting and disbursement program, the bureau performs payroll services--such as foreign currency management and accounting, payroll, and fiscal records monitoring--and provides pension services for Foreign Service employees.

</span></p><p data-dcnode-id="358"><b data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Under Secretary for Global Affairs (G) Group</span></b><span data-dcnode-id="359" instrument_node="">
</span></p><p data-dcnode-id="353"><span data-dcnode-id="357" instrument_node="">The </span><b data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Bureau of Democracy, Human Rights, and Labor</span></b><span data-dcnode-id="354" instrument_node=""> (DRL) oversees initiatives and policies to promote and strengthen democratic institutions, civil society, and respect for human and worker rights. The bureau ensures that human rights and labor conditions in foreign countries are taken into account in the U.S. policy-making process and submits an annual report to the Congress extensively reviewing human rights practices in each country.

</span></p><p data-dcnode-id="348"><span data-dcnode-id="352" instrument_node="">The </span><b data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Bureau for International Narcotics and Law Enforcement Affairs</span></b><span data-dcnode-id="349" instrument_node=""> (INL) works with foreign governments to increase awareness of the importance of global narcotics control.  It coordinates efforts with other governments and international organizations to halt the flow of illegal drugs into the United States by providing assistance to foreign governments to:  eradicate narcotics crops, destroy illicit laboratories, train interdiction personnel, and develop education programs to counter drug abuse by their populations.

</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The bureau also has an international criminal justice office, dedicated to development and coordination of U.S. policy on:  combating international organized crime's involvement in financial crime and illicit drug trafficking, strengthening judicial institutions and assisting foreign law enforcement agencies, and coordination with the UN.

</span></p><p data-dcnode-id="341"><span data-dcnode-id="345" instrument_node="">The </span><b data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Bureau of Oceans and International Environmental and Scientific Affairs</span></b><span data-dcnode-id="342" instrument_node=""> (OES) melds an emphasis on environmental issues and science and technology with traditional diplomacy.  The bureau and the environment, science, and technology officers at embassies overseas deal with such global issues as trade and environment; biodiversity; global climate change; environmental pollution; oceans policy, fisheries, and marine conservation; international civil and commercial space cooperation; technology; and health.

</span></p><p data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">The </span><b data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Bureau of Population, Refugees, and Migration</span></b><span data-dcnode-id="337" instrument_node=""> (PRM) is responsible for coordinating the Department's policy on global population, refugees, and migration issues and for managing Migration and Refugee Assistance appropriations.  As part of its work, the bureau is at the center of a cooperative effort among the State Department, other U.S. Government agencies, private voluntary organizations, and international agencies to:  implement a more comprehensive international population policy, including broadening of population assistance programs to cover a wider range of reproductive health services; provide assistance to refugees in first-asylum countries and admit refugees to the United States for permanent resettlement; and develop bilateral and multilateral approaches to international migration issues. </span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node=""> </span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node=""> </span></p><h3 data-dcnode-id="329"><i data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">U.S. Missions</span></i></h3><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">To support its relations with other countries and international organizations, the United States maintains diplomatic and consular posts around the world.  Under the President's direction, the Secretary of State is responsible for the overall coordination and supervision of U.S. Government activities abroad.  Country missions and missions to international organizations are headed by Chiefs of Mission.  Chiefs of Mission are considered the President's personal representatives and, with the Secretary of State, assist in implementing the President's constitutional responsibilities for the conduct of U.S. foreign relations.

</span></p><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Most missions have personnel assigned from other executive branch agencies in addition to those from the Department of State; in some cases, State Department employees may account for less than one-half of the mission staff.  Department of State employees at missions comprise U.S.-based political appointees and career diplomats; and Foreign Service nationals.  The last are local residents, who provide continuity for the transient American staff and have language and cultural expertise; they also are employed at post by other agencies.

</span></p><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node=""> Other executive branch agencies represented may include the Departments of Commerce, Agriculture, Defense, and Justice (the Immigration and Naturalization Service, the Drug Enforcement Administration, and the Federal Bureau of Investigation); the U.S. Agency for International Development; and the U.S. Information Agency.  Other U.S. Government agencies also make vital contributions to the success of U.S. foreign relations and in promoting U.S. interests. </span></p><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node=""> </span></p><h4 data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Country Missions</span></h4><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">In most countries with which it has diplomatic relations, the U.S. maintains an embassy, which usually is located in the host country capital.  The U.S. also may have consulates in other large commercial centers or in dependencies of the country.  Several countries have U.S. ambassadors accredited to them who are not resident in the country.  In a few special cases--such as when it does not have full diplomatic relations with a country--the U.S. may be represented by only a U.S. Liaison Office or U.S. Interests Section, which may be headed by a Principal Officer rather than a Chief of Mission.

</span></p><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">The Chief of Mission--with the title of Ambassador, Minister, or Charge d'Affaires--and the Deputy Chief of Mission are responsible for and head the mission's "country team" of U.S. Government personnel.

</span></p><p data-dcnode-id="309"><b data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Consular Affairs.</span></b><span data-dcnode-id="310" instrument_node="">  Whether in a U.S. embassy or a consulate, consular officers at post are the State Department employees that American citizens overseas are most likely to meet.  Consular officers extend to U.S. citizens and their property abroad the protection of the U.S. Government.  They are involved in protecting and assisting millions of Americans living and traveling abroad.

</span></p><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Consular officers help transfer personal funds to those in financial difficulty, search for missing Americans, issue Consular Information Sheets and Travel Warnings, visit Americans in prison, maintain lists of local attorneys, act as liaison with police and other officials, assist hospitalized Americans, re-issue lost or stolen passports, and assist next of kin in the United States when relatives die abroad.

</span></p><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">They also perform non-emergency services--dispensing information on absentee voting, international parental kidnaping and child custody, selective service registration, and acquisition and loss of U.S. citizenship; providing U.S. tax forms; notarizing documents; issuing passports; and processing estate and property claims.  U.S. consular officers also issue about 6 million visas annually to foreign nationals who wish to visit the United States and almost 500,000 immigrant visas to those who wish to reside here permanently.

</span></p><p data-dcnode-id="301"><b data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Commercial, Economic, and Financial Affairs.</span></b><span data-dcnode-id="302" instrument_node="">  Commercial officers advise U.S. businesses on local trade and tariff laws, government procurement procedures, and business practices; identify potential importers, agents, distributors, and joint venture partners; and assist with resolution of trade and investment disputes.  At larger posts, trade specialists of the Commerce Department's U.S. and Foreign Commercial Service perform these functions.  At smaller posts, commercial interests are represented by economic/commercial officers from the Department of State.  Commerce Department officers for tourism promote the U.S. travel and tourism industry.

</span></p><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Economic officers advise U.S. businesses on the local investment climate and economic trends; negotiate trade and investment agreements to open markets and level the playing field; analyze and report on macroeconomic trends and trade policies and their potential impact on U.S. interests; and promote adoption of economic policies by foreign countries which further U.S. interests.

</span></p><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Resource officers counsel U.S. businesses on issues of natural resources--including minerals, oil, and gas and energy--and analyze and report on local natural resource trends and trade policies and their potential impact on U.S. interests.

</span></p><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Financial attaches analyze and report on major financial developments as well as the host country's macro-economic condition.

</span></p><p data-dcnode-id="291"><b data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Agricultural and Scientific Matters.</span></b><span data-dcnode-id="292" instrument_node="">  Agricultural officers promote the export of U.S. agricultural products and report on agricultural production and market developments in their area.  Animal and Plant Health Inspection Service officers are responsible for animal and plant health issues that affect U.S. trade and the protection of U.S. agriculture from foreign pests and diseases.  They expedite U.S. exports affected by technical sanitary and phytosanitary regulations.

</span></p><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Environment, science, and technology (EST) officers analyze and report on EST developments and their potential impact on U.S. policies and programs.

</span></p><p data-dcnode-id="285"><b data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Political, Labor, and Defense Assistance Issues.</span></b><span data-dcnode-id="286" instrument_node="">  Political officers analyze political developments and their potential impact on U.S. interests; promote adoption by the host country of foreign policy decisions which support U.S. interests; and advise U.S. business executives on the local political climate.

</span></p><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Labor officers promote labor policies in countries to support U.S. interests and provide information on local labor laws and practices, including wages, non-wage costs, social security regulations, the political activities of local labor organizations, and labor attitudes toward American investments.

</span></p><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Many posts have defense attaches from the Department of Defense. Security assistance officers are responsible for Defense Cooperation in Armaments and foreign military sales and function as the primary in- country point of contact for U.S. defense industry and businesses.

</span></p><p data-dcnode-id="277"><b data-dcnode-id="279"><span data-dcnode-id="280" instrument_node=""> Administrative Support and Security Functions. </span></b><span data-dcnode-id="278" instrument_node=""> Administrative officers are responsible for normal business operations of the post, including overall management of:  personnel; budget and fiscal matters; real and expendable property; motor pools; and acquisitions.

</span></p><p data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Information management officers are responsible for the post's unclassified information systems, database management, programming, and operational needs.  They also are responsible for the telecommunications, telephone, radio, diplomatic pouches, and records management programs within the diplomatic mission and maintain close contact with the host government's communications authorities on operational matters.

</span></p><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Regional security officers are responsible for providing physical, procedural, and personnel security services to U.S. diplomatic facilities and personnel; they also provide local in-country security briefings and threat assessments to business executives.

</span></p><p data-dcnode-id="269"><b data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Public Affairs</span></b><span data-dcnode-id="270" instrument_node=""> U.S. Information Service (USIS) officers of the U.S. Information Agency serve as the public affairs officers, information officers, and cultural affairs officers of U.S. missions overseas.  They are the public affairs advisers for the U.S. ambassador and all elements of the country team, serving as press spokespersons and as administrators of such official U.S. exchange programs as those for Fulbright scholars, Humphrey and Muskie fellows, and foreign participants in International Visitor consultations in the United States.  USIS officers also direct the overseas U.S. Speakers program and international electronic linkages such as the Worldnet TV satellite teleconferencing network at more than 200 posts.

</span></p><p data-dcnode-id="265"><b data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Legal and Immigration Matters and USAID Programs.</span></b><span data-dcnode-id="266" instrument_node="">  Legal attaches serve as Department of Justice representatives on criminal matters.

</span></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Immigration and Naturalization Service officers are responsible for administering the laws regulating the admission of foreign-born persons (aliens) to the United States and for administering various immigration benefits.

</span></p><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">USAID mission directors are responsible for USAID programs, including dollar and local currency loans, grants, and technical development assistance. </span></p><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">
</span></p><h4 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Chiefs of Mission--Authorities And Responsibilities</span></h4><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Authorities and responsibilities of Chiefs of Mission at post include:

</span></p><p data-dcnode-id="253"></p><blockquote data-dcnode-id="235"><span data-dcnode-id="252" instrument_node="">--  Following, articulating, and speaking with one voice to others on U.S. policy--and ensuring mission staff do likewise--while also providing to the President and Secretary of State expert guidance and frank counsel and seeking the same from mission staff;

</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">--  Directing, coordinating, and supervising all executive branch offices and personnel, except for personnel under the command of a U.S. area military commander, under another chief of mission, or on the staff of an international organization;

</span></p><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">--  Cooperating with U.S. legislative and judicial branch personnel so that U.S. foreign policy goals are advanced, security is maintained, and executive, legislative, and judicial responsibilities are carried out;

</span></p><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">--  Reviewing all communications to or from mission elements, however transmitted, except those specifically exempted by law or executive decision;

</span></p><p data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">--  Taking direct responsibility for the security of the mission--including security from terrorism--and protecting all U.S. Government personnel on official duty (other than those personnel under the command of a U.S. area military commander) and their accompanying dependents;

</span></p><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">--  Viewing budgetary stringency as an incentive to innovate and to exercise careful stewardship of mission resources, including carrying out regular reviews of programs, personnel, and funding levels and cooperating with other departments and agencies in downsizing efforts;

</span></p><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">--  Using given Chief-of-Mission authorities to reshape the mission in ways that directly serve American interests and values and ensuring that all executive branch agencies attached to the mission do likewise by obtaining Chief-of-Mission approval to change the size, composition, or mandate of their staffs within the mission;

</span></p><p data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">--  Serving the people of the U.S. with professional excellence, the highest standards of ethical conduct, and diplomatic discretion and ensuring that mission staff adhere to the same strict standards and maintain a shared commitment to equal opportunity and against discrimination and harassment. </span></p><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node=""> </span></p></blockquote><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node=""> </span></p><h3 data-dcnode-id="229"><i data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">The Conduct of U.S. Foreign Relations</span></i></h3><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="227"></p><h4 data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Executive Branch</span></h4><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">The conduct of U.S. foreign relations is centered in the executive branch and flows from the constitutional responsibilities of the President.  The President has the authority to conclude treaties and appoint diplomatic and consular officials--with the advice and consent of the Senate; to receive foreign emissaries; and to exercise other authority provided by legislation.

</span></p><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">To assist the President in these duties, Congress created the Department of State in 1789; this replaced the Department of Foreign Affairs, established in 1781.  As head of the Department, the Secretary of State was made the President's principal adviser on foreign affairs and the person chiefly responsible for U.S. representation abroad.

</span></p><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">After World War II, U.S. global responsibilities expanded greatly.  The Departments of Agriculture, Commerce, and the Treasury acquired new duties in world economic affairs.  The Department of Defense was created in 1947--consolidating the functions previously carried out by the War Department and the individual services--and assumed duties for military aid and cooperation.

</span></p><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">The 1947 National Security Act created the National Security Council (NSC), which assists the President on foreign policy and coordinates the work of the many agencies involved in foreign relations.  Chaired by the President, the NSC includes the Vice President and the Secretaries of State and Defense as regular members.  Presidents have shaped NSC functions and made use of the position of Special Assistant to the President for National Security Affairs, established in 1951, to suit their administrative preferences.

</span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">During the Cold War, new foreign affairs agencies were placed under the general direction of the Secretary of State:  the United States Information Agency (1953), the Arms Control and Disarmament Agency (1961), and the Agency for International Development (1961).  They remain under the Secretary's overall foreign policy guidance.

</span></p><p data-dcnode-id="213"></p><h4 data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Congress</span></h4><span data-dcnode-id="210" instrument_node="">
</span><p data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Congress, too, has constitutional responsibilities for U.S. foreign policy.  As noted, the Senate must provide its advice and consent to treaties and to diplomatic and consular appointments.  Other major congressional powers include providing for the common defense and general welfare of the United States, regulating international commerce, and declaring war.

</span></p><p data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Congressional influence on U.S. foreign policy rests in part on legislative control over the federal budget.  Congress:

</span></p><p data-dcnode-id="200"><span data-dcnode-id="205" instrument_node="">--  Appropriates the money needed to run the agencies which handle foreign affairs;

</span><br data-dcnode-id="204"><span data-dcnode-id="203" instrument_node="">--  Provides funds to finance U.S. foreign assistance programs carried out by executive agencies; and

</span><br data-dcnode-id="202"><span data-dcnode-id="201" instrument_node="">--  Legislates in such areas as immigration, foreign trade, and international monetary arrangements.

</span></p><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Congressional committees most directly involved in the conduct of foreign relations include the House International Relations and Senate Foreign Relations Committees; the House National Security and Senate Armed Services Committees; the Appropriations Committees of both Houses; and relevant subcommittees.  The Secretary of State and other Administration officials consult with, testify before, and brief these bodies on foreign policy developments.  Members of Congress make trips abroad to inspect U.S. programs and also may serve as delegates to the United Nations and international conferences and commissions. </span></p><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">
</span></p><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node=""> </span></p><h4 data-dcnode-id="191"><i data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">President's Letter to Chiefs of Mission</span></i></h4><span data-dcnode-id="190" instrument_node="">
</span><p data-dcnode-id="188"><span data-dcnode-id="189" instrument_node="">Excerpts from the text of President Clinton's Letter of Instruction to Chiefs of Mission, September 16, 1994.

</span></p><p data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">. . . We are at a moment of unique historic opportunity for the United States and the world.  With the end of the Cold War, we are entering an era so new that it has yet to acquire a name.  Our task as a Nation, and yours as Chief of the United States Mission, is to ensure that this new era is one conducive to American prosperity, to American security, and to the values America seeks to exemplify.  To accomplish this task I need your full support for the three goals of my foreign policy that aim to keep our Nation strong at home and abroad:  renewing and adapting America's security alliances and structures; rebuilding and revitalizing the American economy; and promoting democracy, human rights, and sustainable development.

</span></p><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">You should give special attention in the security realm to halting arms proliferation, preventing, resolving, and containing conflict, and to countering terrorism and international crime; and in the economic arena, to opening and expanding markets for America's exports.  No country can be exempt from upholding the basic principles in the Universal Declaration of Human Rights; all should understand that shared democratic values are the most reliable foundation for good relations with the United States.  Finally, I will need your help as my Administration seeks to promote international cooperation to address global problems including the environment and population, narcotics production and trafficking, refugees, migration, and humanitarian assistance.

</span></p><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Achieving these goals will demand a dynamic diplomacy that harnesses change in the service of our national interests and values.  It will require us to meet threats to our security and practice preventive diplomacy, to anticipate threats to our interests and to peace in the world before they become crises and drain our human and material resources in wasteful ways.  I have asked you to represent the United States . . .  because I am confident that you possess the skills, dedication, and experience necessary to meet the many challenges that this new and complex era presents. . . .

</span></p><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">I charge you to exercise your authority with wisdom, justice, and imagination.  Dramatic change abroad and austerity here at home have put a premium on leadership and teamwork. . . .

</span></p><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Always keep in mind that . . . you and your Mission symbolize the United States of America and its values.  Never forget the solemn duty that we, as public servants, owe to the citizens of America:  the active protection and promotion of their well-being, safety, and ideals.  There is no better definition of American national interest and no loftier object for our efforts. </span></p><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node=""> </span></p><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node=""> </span></p><h3 data-dcnode-id="171"><i data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">U.S. Representation at International Organizations</span></i></h3><span data-dcnode-id="170" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="169" instrument_node="">U.S. representation at international organizations reflects the growing importance of seeking multilateral approaches in the conduct of U.S. foreign relations.  In addition to its country missions, the U.S. has several delegations to international organizations, most of which are located outside the United States.  Some of these delegations are designated as "U.S. missions"; others are called delegations, such as those to the Conference on Disarmament or to the Organization for Security and Cooperation in Europe.

</span></p><p data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">U.S. missions to international organizations are:

</span></p><p data-dcnode-id="165"></p><blockquote data-dcnode-id="145"><span data-dcnode-id="164" instrument_node=""> --  U.S. Mission to the United Nations (New York);

</span><br data-dcnode-id="163"><span data-dcnode-id="162" instrument_node=""> --  U.S. Mission to the Organization of American States (Washington);

</span><br data-dcnode-id="161"><span data-dcnode-id="160" instrument_node=""> --  U.S. Mission to International Organizations in Vienna (Vienna);

</span><br data-dcnode-id="159"><span data-dcnode-id="158" instrument_node=""> --  U.S. Mission to the North Atlantic Treaty Organization (Brussels);

</span><br data-dcnode-id="157"><span data-dcnode-id="156" instrument_node=""> --  U.S. Mission to the Organization for Economic Cooperation and Development (Paris);

</span><br data-dcnode-id="155"><span data-dcnode-id="154" instrument_node=""> --  U.S. Mission to the European Office of the UN and Other International Organizations (Geneva);

</span><br data-dcnode-id="153"><span data-dcnode-id="152" instrument_node=""> --  U.S. Mission to the European Union (Brussels);

</span><br data-dcnode-id="151"><span data-dcnode-id="150" instrument_node=""> --  U.S. Mission to the International Civil Aviation Organization (Montreal); --  U.S. Mission to the United Nations Agencies for Food and Agriculture (Rome); and

</span><br data-dcnode-id="149"><span data-dcnode-id="148" instrument_node=""> --  U.S. Observer Mission to the United Nations Educational, Scientific, and Cultural Organization (Paris). </span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node=""> </span></p></blockquote><span data-dcnode-id="144" instrument_node="">
</span><p data-dcnode-id="142"><span data-dcnode-id="143" instrument_node=""> </span></p><h3 data-dcnode-id="139"><i data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Related Foreign Affairs Agencies</span></i></h3><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="136"><span data-dcnode-id="137" instrument_node="">As noted, there are several related foreign affairs agencies which, while independent, come under the general direction and overall foreign policy guidance of the Secretary of State.  All are headquartered in Washington, DC.

</span></p><p data-dcnode-id="135"></p><h4 data-dcnode-id="133"><span data-dcnode-id="134" instrument_node="">The Arms Control and Disarmament Agency</span></h4><span data-dcnode-id="132" instrument_node="">
</span><p data-dcnode-id="130"><span data-dcnode-id="131" instrument_node="">ACDA's mandate deals with arms control, non-proliferation, and disarmament policies, advancing the U.S. foreign policy objective of shaping a more secure world.  ACDA's director reports directly to the President, the National Security Adviser, and the Secretary of State on arms control and non-proliferation matters.  The agency's concerns include conventional, nuclear, chemical, and biological weapons as well as the means for delivering them.  It manages U.S. participation in negotiations on arms control, non-proliferation, and disarmament; engages in international negotiations on nuclear safety; evaluates U.S. ability to verify agreements, assesses compliance with existing agreements; monitors arms transfers worldwide; conducts research; and coordinates and disseminates information to the public.

</span></p><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">ACDA has led all of the U.S. delegations to what is now known as the Conference on Disarmament--the principal forum for negotiating multilateral arms control agreements such as a comprehensive test ban treaty and a fissile material cutoff.  Since ACDA's creation in 1961, some of the agreements negotiated in that forum include the Limited Test Ban Treaty, the Nuclear Non-Proliferation Treaty, the Seabed Arms Control Treaty, the Biological Weapons Convention, the Chemical Weapons Convention, the Conventional Armed Forces in Europe Treaty, the Open Skies Treaty, and the Environmental Modification Convention.  In addition, ACDA led or actively participated in all major U.S.-Soviet arms negotiations beginning in 1961, such as the Threshold Test Ban Treaty, the Anti-Ballistic Missile Treaty, the Strategic Arms Limitation Talks, the Strategic Arms Reduction Treaty, talks on defense and space issues, and the Intermediate-Range Nuclear Forces Treaty.

</span></p><p data-dcnode-id="127"></p><h4 data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">The U.S. Agency for International Development</span></h4><span data-dcnode-id="124" instrument_node="">
</span><p data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">USAID administers U.S. economic and humanitarian assistance designed to promote sustainable development in countries in Africa, Asia, the Near East, Latin America and the Caribbean, Central and Eastern Europe, and the New Independent States of the former Soviet Union.

</span></p><p data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">USAID works to advance U.S. foreign policy objectives of shaping a freer, more secure, and more prosperous world by focusing its programs in four interrelated areas:  improving health and population conditions, protecting the environment, promoting economic growth, and supporting democracy.  In addition to providing humanitarian assistance, USAID promotes democratic values and international cooperation and helps establish economic conditions that expand markets for U.S. goods and services in developing countries.

</span></p><p data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">USAID funds technical assistance and commodity assistance, trains thousands of foreign students each year at American colleges, and supports development research.  USAID also enlists the collaboration of the American for-profit private sector, non-governmental and private organizations, and universities in its programs.

</span></p><p data-dcnode-id="116"><span data-dcnode-id="117" instrument_node="">USAID assistance programs are administered through overseas missions that work in close coordination with U.S. embassies.

</span></p><p data-dcnode-id="115"></p><h4 data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">The U.S. Information Agency</span></h4><span data-dcnode-id="112" instrument_node="">
</span><p data-dcnode-id="110"><span data-dcnode-id="111" instrument_node="">USIA's mission is to understand, inform, and influence foreign publics in promotion of the national interest and to broaden the dialogue between Americans and U.S. institutions and their counterparts abroad.

</span></p><p data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">

With the spread of democracy and popular politics and the revolution in communications and information worldwide, the organization and policy emphases of the agency have changed significantly, but the core purposes have remained constant:

</span></p><p data-dcnode-id="107"></p><blockquote data-dcnode-id="99"><span data-dcnode-id="106" instrument_node=""> --  To explain and advocate U.S. policies in terms that are credible and meaningful in foreign cultures;

</span><br data-dcnode-id="105"><span data-dcnode-id="104" instrument_node=""> --  To provide information about the United States and its people, values, and institutions;

</span><br data-dcnode-id="103"><span data-dcnode-id="102" instrument_node=""> --  To build lasting relationships and understanding between Americans and U.S. institutions and their counterparts overseas through the exchange of people and ideas; and

</span><br data-dcnode-id="101"><span data-dcnode-id="100" instrument_node=""> --  To advise the President and other policymakers on foreign attitudes and their implications for U.S. policies.</span></blockquote><span data-dcnode-id="98" instrument_node="">
</span><p data-dcnode-id="96"><span data-dcnode-id="97" instrument_node="">USIA's programs include the Voice of America; Radio and TV Marti; Worldnet TV; the Fulbright scholarship program; the U.S. Speakers program; the International Visitors program; the Wireless File newswire, transmitted daily in five languages to USIS press officers overseas; Foreign Press Centers in Washington, New York, and Los Angeles; and an overseas network of professionally staffed, computer-linked information resource and cultural centers.

</span></p><p data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">USIA has U.S. and foreign national professionals in more than 200 U.S. embassies and consulates in more than 140 countries.

</span></p><p data-dcnode-id="89"><span data-dcnode-id="93" instrument_node="">
