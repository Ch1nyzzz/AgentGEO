</span><h5 data-dcnode-id="2113"><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2021/07/online-conference-amb-baiba-braze-importance-natos-efp-bg-countries/"><span data-dcnode-id="2115" instrument_node="">Online conference: Amb. Baiba Braže on the importance of NATO’s eFP BG countries</span></a></h5><span data-dcnode-id="2112" instrument_node="">
</span><div class="separator" data-dcnode-id="2111"></div><span data-dcnode-id="2110" instrument_node="">
</span><div class="news_text" data-dcnode-id="2103"><span data-dcnode-id="2109" instrument_node="">
</span><sup data-dcnode-id="2107"><span data-dcnode-id="2108" instrument_node="">PUBLISHED: July 28, 2021</span></sup><span data-dcnode-id="2106" instrument_node="">
</span><div class="clearfix" data-dcnode-id="2105"></div><span data-dcnode-id="2104" instrument_node="">
                    A project sponsored and supported by NATO PDD&nbsp;with&nbsp;the main topic:&nbsp;“NATO 2030 – ATA TALKS” held on 1 July 2021.&nbsp;This event focused on the importance of NATO's eFP BG countries and was represented by members of the ATA’s youth wing – YATA.

Under the topic of this online conference:&nbsp;“NATO 2030 – Raising awareness about the importance of NATO’s eFP BG countries”&nbsp;and through discussions by moderator&nbsp;Juxhina Sotiri Gjoni, President YATA, hosted by&nbsp;James Townsend, ATA President with experts’ presentations, ATA and YATA contributes to exchanging ideas, knowledge and opinions giving new perspectives of security challenges and threats.

Speaker at this online conference was Amb. Baiba Braže,&nbsp;Assistant Secretary-General for Public Diplomacy.&nbsp;She discussed with YATA chapter representatives about the future of NATO, providing new information and predictions.

James Townsend started by mentioning that, “it is Important for chapters and YATA to expand the understanding in our align countries, that there is an important role we all can play to support NATO and make sure people understand and respect what NATO does, the importance of NATO to our countries for the stability in Europe, and to understand that for the alliance to remain strong the people of the alliance need to remain engaged and supporting NATO”. In the same line Amb. Braze said, “our mandate is to raise awareness and support for NATO, because our mission is to maintain peace and security in our countries. NATO is the strongest defence alliance in the world”.

As Juxhina Sotiri Gjoni stressed “our association draws together more than 37 ATA national chapters and 25 YATA national chapter expanding its outreach efforts amongst member and partner countries. Throughout many different languages of each national chapters YATA impose an important and unique platform committed to disseminating NATO messages”. In the same way Amb. Braze said that “YATA play a very important role as well as ATA”. Juxhina Sotiri Gjoni stated that “YATA’s role in this process is essential and we all are committed to further strengthen our cooperation with the Public Diplomacy Division”. This program provided a vehicle for the youth of the Alliance to express their vision for the importance of NATO's eFP BG countries – raising awareness.&nbsp;Indeed, according to Gjoni, “In this framework we closely worked together to bring to our young audience attention the importance of NATO’s Enhanced Forward Presence deployed in the eastern part of the Alliance. With four multinational battlegroups, combat-ready, NATO eFP is a demonstration of our alliance’s strength and its transatlantic bond”.

NATO will continue to adapt. As Amb. Braze said, “NATO Summit addressed some very important issues and those include the fact that leaders recognized we are in a systemic competition”. In response to a more dangerous and unpredictable security environment, NATO strengthens its deterrence and defence capabilities, posture and resilience, more capable and ready forces, significant deployments in missions and operations, and deeper engagement with partners. With the accent on NATO 2030, and new challenges and threats which discussed on Summit 2021, Russia was on the agenda.&nbsp; Amb. Braze said about Russia that, “we clearly signal to Russia that on the one hand our channels of communication are open including the NATO-RUSSIA council in Brussels, but on the other hand we clearly show that we are very serious about defence and deterrence, that’s why the battle groups are there”.

At the end of the event, YATA-ATA senior representatives from eFP BG countries like Lithuania, Montenegro, Norway, and Spain participated in a quick round of final words and in a quick Q&amp;A session. During this part, they provided their visions of its future and what it means for them the NATO's battle groups form as a part of the biggest reinforcement of&nbsp;NATO's collective defence&nbsp;in a generation.

From this Q&amp;A session some key points that came out from Amb. Braze were:

“eFP is not called an operation but is an action, is an everyday work of our soldiers and our civilians on the ground to ensure that they are able to understand and act on plans that are ready to meet the challenges and threats. Adding that one of the biggest challenges will always be around the hybrid developments (cyber, disinformation and energy security)”.

“The challenges and threats we face are global and also the US needs a transatlantic alliance to help it meet these global challenges”.

“Covid affected a number of exercises on NATO’s side…. some became smaller, and some other took a different expression”.

“On youth and how to integrate NATO into youth YATA INTERNATIONAL and YATA members play an important role and should be a NATO ambassador, promoted NATO”.

At the end James Townsend pointed up that “is important for YATA to know what the ambassadors doing at NATO PDD…. and their staff is really breaking new ground when it comes to evolving next generation in what NATO was all about”. He also spoken about the resilience stating that “the resilience is YATA, ATA, NATO and what we are doing in our societies” concluding “ATA is looking forward to closer cooperation with YATA and NATO”.                </span></div><span data-dcnode-id="2102" instrument_node="">

</span><h5 data-dcnode-id="2068"><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2021/07/ata-ambassador-brussels-summit-side-event-nato-2030-brussels-forum/"><span data-dcnode-id="2070" instrument_node="">ATA as Ambassador of Brussels Summit side event 'NATO 2030 at Brussels Forum’</span></a></h5><span data-dcnode-id="2067" instrument_node="">
</span><div class="separator" data-dcnode-id="2066"></div><span data-dcnode-id="2065" instrument_node="">
</span><div class="news_text" data-dcnode-id="2058"><span data-dcnode-id="2064" instrument_node="">
</span><sup data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">PUBLISHED: July 23, 2021</span></sup><span data-dcnode-id="2061" instrument_node="">

                    As a reliable NATO partner and an international organization with the aim of promoting Euro-Atlantic values and the global importance of NATO, connecting associations from 37 countries in the world, Atlantic Treaty Association (ATA) was chosen as the Ambassador of Brussels Summit side event 'NATO 2030 at Brussels Forum', organized on 14th of June by NATO and German Marshall Fund of the United States.

The aim of this side-event was to discuss the issues that were topics in the Summit, i.e. future of the transatlantic relations and security challenges that the world and NATO will face in the coming decade. Discussions were focused on a wide range of topics, such as defence and deterrence, global partnerships, innovation, resilience, climate change, cyber, energy security. This public event had an aim to enhance the transparency and visibility of the process, and it brought together government leaders, international experts, representatives from civil society, private sector and young professionals.



Together with its designated members, ATA, together with YATA, was the ‘influential voice’ and it promoted the event. In preparation for the event, ATA and YATA joined their efforts to reach out to key audiences and engage them to the discussion on NATO 2030 and the Summit’s outcomes. Having long lasting relationships with NATO, ATA is a trusted partner of NATO, thus acted as an ambassador of this event across the member states, helping NATO PDD to reach out to a variety of audiences by amplifying the event among the network and through social media accounts, with engaged cooperation, such as:

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; access to the Communication Toolkit of the event containing messages, channels and all amplification elements;

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; constant connection with NATO PDD through a shared platform (Google Drive) with all the graphic and video materials prepared in the run-up of the event;

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; chance to communicate on digital advertising in a synchronised manner together with NATO and the other Ambassador organisations.

After the event an assessment form was sent out with the information generated by member organizations, in order NATO PDD to be able to analyse the impact of ATA’s endeavour into promoting the ‘NATO 2030 at Brussels Forum’ event and also to analyse the impact of the event promotion and the outcomes generated by the discussions along the Summit decisions.

With this important role, ATA showed a strong commitment in giving visibility to the public diplomacy event organized by NATO. During the event ATA, with its impressive network, and intuitively knowing how to get a positive brand message across, spread the message by using its platform and strong network to support those efforts.

ATA’s and YATA’s, responsibilities included, but were not limited to, the following:

 	Representing the event positively in a multitude of settings
 	Assisting in content creation (ie. reviews, etc.)
 	Generating brand awareness through word-of-mouth marketing
 	Being a ‘leader’ in our community
 	Providing feedback and insight to NATO
 	Promoting the event via our personal social media accounts

It is important to mention that this Summit came at a pivotal moment for the Alliance, as NATO adapts to growing global competition and more unpredictable threats, including terrorism, cyber-attacks, disruptive technologies, climate change, and Russia and China’s challenges to the rules-based international order. Standing strong together to face a more unpredictable and competitive world is what the NATO 2030 initiative was about.

ATA has shown its quick reflexes and readiness to support NATO whenever needed.

ATA was the voice of #NATO2030 at #BrusselsForum across the Alliance.

June 2021                </span></div><span data-dcnode-id="2057" instrument_node="">

</span><h5 data-dcnode-id="2022"><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2022/04/webinar-1952-2022-70-years-greece-turkey-nato/"><span data-dcnode-id="2024" instrument_node="">Webinar: 1952-2022, 70 years of Greece and Turkey in NATO.</span></a></h5><span data-dcnode-id="2021" instrument_node="">
</span><div class="separator" data-dcnode-id="2020"></div><span data-dcnode-id="2019" instrument_node="">
</span><div class="news_text" data-dcnode-id="2012"><span data-dcnode-id="2018" instrument_node="">
</span><sup data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">PUBLISHED: April 19, 2022</span></sup><span data-dcnode-id="2015" instrument_node="">

                    ”1952-2022, 70 years of Greece and Turkey in NATO” was the topic of an ‘ATA TALKS’ webinar on 18 February. This online conference was organized by the Atlantic Treaty Association with the &nbsp;Atlantic Council of Turkey. The guests speakers were Mr. Nicola de Santis, Head of the Engagements Section of NATO Public Diplomacy Division, Amb. Ioannis Alexios Zepos, Former Representative of Greece to NATO, and Amb. Tacan İldem, Former Representative of Turkey to NATO. The discussion was moderated by Mr. Theodossios Georgiou, President of the Greek Association for Atlantic and European Cooperation, Counsellor, and former President of the Atlantic Treaty Association, and Mr. &nbsp;Mustafa Veysel Güldoğan, President of the Atlantic Council of Turkey. Ms. Monica Begovic, ATA Secretary

In his opening statement, Mr. Georgiou pointed out “public support is the most fundamental issue since public support guarantees the political will of the governmental signature to be a member of the Alliance. Public support requires an educated public, a public that understands the reason for being a NATO member and how this issue affects their lives”. As he mentioned “we in ATA, strongly believe that without recognition and public support NATO's future could be at risk, not because there is no role and task for NATO, but because sufficient public recognition and support are essential requirements for the long-term survival of any organization in democratic societies. We Live in a world where legitimacy matters as much as power. This exactly was the mission of our ATA since its establishment in 1954 and continues until today”. Today, NATO is confronted by several defining challenges. Mr. Georgiou also analyzed the importance of the Madrid Strategic Concept. “The Madrid Strategic Concept next June&nbsp;will update and align NATO’s political and military directives to the new strategic concept after a decade of tremendous changes. This new Concept will reflect the new security environment, recommit our values, and reaffirm our unity, ensuring that our Alliance is fit for the future”. Concluding by saying that keeping the good memories of the past with the contributions of our speakers we want to take a look at the future.

Mr. Güldoğan, started by mentioning that both countries have had some common goals in terms of defense and security policies. During the last few decades, this has brought even bigger achievements. As he stressed, “Turkey and Greece were leading the emerging cooperation in the region thus guaranteeing the security. We can look at three case concepts in this regard, first of all is the growth of the organization both geographically and materially, second is the experience gained by working together, and third is guaranteeing the security in the region with all the experience gained”.

Mr. de Santis, in his presentation, explained that: “Greece and Turkey are two of the pillars of the cooperation in NATO. Their ambassadors have made history in the alliance not only because of their distinguished diplomatic careers for the leadership position that they occupied at the top level of the decision-making process of the alliance but also for their contribution to the strategic vision of the alliance, the revision of the strategic concept”.

He noted that NATO exists to protect its member's countries so that they could protect their societies and that their democracies could flourish in a framework of security. As he stressed, since the beginning Russia was included in this security equation we see today. As he reminded since the establishment of the Atlantic operation council in November 1991, the strategic concept, Russia was the extended end of friendships with NATO. In December 1994, at the Brussels Summit, Russia was invited to participate in the Partnership for Peace, which had three key features to help build security in Europe. First, is the democratic control of the armed and security services and structures to democratically elected leaders. Second is the transparency of the defense budget, the defense budget in democracies is discussed in parliament where the opposition together with the majority will discuss how human and financial resources are allocated to promote the strategic concept of each. Last, the third aspect of the partnership is the possibility for countries to work together in this sense of partnership.

The example of Greece and Turkey is a great example of two countries that have contributed to the Alliance in different ways but have also stressed the importance of its political dimension.

ATA has been involved in this work in all NATO member countries and partner countries because promotes a better mutual organization, promotes an understanding of NATO, its values, and an understanding of our countries' security policies.

Mr. Zepos&nbsp;pointed out that&nbsp;in 1952 the idea of joining the alliance between Greece and Turkey was very important to peace because along with the Marshall Plan and the Truman doctrine these allowed Greece to slowly rebuild and recover its balance after so many years of a very negative outcome.

According to him,&nbsp;“NATO played an important role in Greece as to providing security on the one hand and second into modernizing its armed forces which was a totally new way of doing things compared to the past. Over the years Greece participated in all of the NATO missions and operations”.

As he mentioned there have been a lot of talks about whether NATO is alive or clinically dead,&nbsp;“I think that the latest events in Ukraine and the reaction that NATO showed made proof to all, that NATO is still there, and wants to cooperate and find solutions, trying to build a steady and stable Europe. I think that the new strategic concept as its coming up and accepted in Madrid in June probably would be looking towards new security threats and new security challenges and ways to deal with them ”

Mr. Ildem congratulated the ATA for organizing this event, as he said: we need to have such events more often to create a better understanding in the public.

As he pointed out, “Ataturk and Venizelos were the pioneers of a new era for a friendly and good neighborly relationship between Greece and Turkey. Greece and Turkey have been contributing to NATO’s collective defense, operations and missions, and they both are trying their best to meet the requirements that are felt with the evolving secuırity environment”.

In the same line as Mr. Zepos, he touched upon&nbsp;the importance of the support the US gave through the Marshall Plan and the Truman doctrine.

“From a historical perspective, Turkey's aspiration to join NATO cannot be strictly viewed as a necessity because of the territorial claims of the expansionist Soviet Union during the Stalin era. It ıs rather a reflection of its deliberate choice to have its place among the democratic family of nations. That is why Turkey became a founding member of the Council of Europe in 1949 that also paved the way for its membership at NATO”.

“Given the complex security environment that we are in, NATO, as a politico-military Alliance, should remain strong militarily, to become stronger politically and to adopt a more global approach. For the foreseeable future Russia, with its revisionist and aggressive pattern of behaviour that challenges the rules based international order and terrorism in all its forms and manifestations will remain to be the main sources of threat that Allies will need to address. China being a rising power with its economic heft and military might should be approached from a prism of both challenges and opportunities. With the use of hybrid concepts that include cyber-attacks and disinformation campaigns, the line between peace and conflict has been blurred. This requires NATO to have a more global approach in addressing those threats and challenges that do not recognize any geographical boundary and for Allied nations to strengthen their societal resilience. Emerging and disruptive technologies (EDTs) can be a game-changer since potential adversaries and systemic rivals, both States and non-state actors, have access to EDTs. Therefore, maintaining NATO’s technological edge and putting innovation at the center of all NATO activities is of paramount importance. NATO should also make its contribution in areas such as the security implications of climate change. NATO should be used more as a unique and essential transatlantic consultation forum where the security concerns of any Ally could be discussed. The next NATO Strategic Concept to be adopted at the NATO Summit in Madrid will project a future-oriented vision to guide NATO’s activities in 2030 and beyond.”

Ms. Begovic, congratulated the organizers of the conference which as she said shows actually the partnership of Associations from two neighboring countries members of the ATA.

</span><h5 data-dcnode-id="1932"><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2022/02/statement-james-joye-townsend-president-atlantic-treaty-association-russias-attack-ukraine/"><span data-dcnode-id="1934" instrument_node="">Statement by James Joye Townsend, President of the Atlantic Treaty Association, on Russia's attack on Ukraine</span></a></h5><span data-dcnode-id="1931" instrument_node="">

                    24 February 2022

I, as President of the Atlantic Treaty Association, with the full support of the ATA Bureau after today’s special meeting, firmly condemn the brutal attack upon the sovereign nation of Ukraine.

This attack is a clear and flagrant violation of international laws and treaties, including the UN Charter, the Helsinki Final Act, the Charter of Paris, the Budapest Memorandum, and the NATO-Russia Founding Act.

This unprecedented act of aggression by the Russian Federation, with the full support of Belarus, violates Ukraine’s territorial integrity. It is a shameful return to an era of war and destruction on the European continent, which threatens the fundamental security of the Euro-Atlantic region. It is utterly without justification.

I am sure our governments can rely on their national ATA bodies - dedicated to building public support for NATO - to support their firm condemnations of the ongoing violent attacks and their calls for an immediate cessation of military hostilities against civilian and military targets.

Through consultations under Article 4 of the Washington Treaty allies should seek preventive, proportionate and non-escalatory measures. Our alliance’s commitment to Article 5 of the Washington Treaty is an iron-clad commitment to defend each other and our common values, our citizens, and our societies.

I am sure that all ATA national bodies in member and partner countries will join me in declaring support and solidarity with the people of Ukraine and with Ukrainian civil society.

As the Secretary General of NATO, Jens Stoltenberg stated, “this is the most dangerous moment in European Security for a Generation”. &nbsp;We must all in the Euro Atlantic community stand united and voice our condemnation of brutal acts of force and transgression.

-------------------------------------------------------------------------------

The Atlantic Treaty Association is an independent organization designed to support the values and enshrined. Its role is to educate and inform the public of NATO’s activities and responsibilities, to promote democracy, and to uphold the values of the North Atlantic Treaty. It is active in 37 countries across and beyond the Atlantic Alliance and includes the Youth Atlantic Treaty Association.                </span></div><span data-dcnode-id="1921" instrument_node="">

Good morning to everyone joining us today here at NATO HQ and for those who are
joining us through the online channels. I am&nbsp;Juxhina Gjoni, the President of Youth
Atlantic Treaty Association.&nbsp;Dear Deputy Asisstant Secretary General Miss Carmen
Romero, dear Founder of YATA, President Fabrizio Luccioli, dearf friends and
colleagues. First of all, allow me to&nbsp;thank you all for being here with us today, and in
my capacity of YATA President, I would like to thank in the name of the association I
represent, NATO leadership for hosting us here today and for accepting our kind
invitation to celebrate together the 25th anniversary of YATA. I am proud and grateful
for the support coming from our colleagues at NATO PDD and their strong
understanding of YATAs role.&nbsp;YATA has played in years and continues to play an important role in the dissemination of the transatlantic values. &nbsp;In an era of fast-changing&nbsp;threats and challenges&nbsp;to security,&nbsp;and raising strategic competition, we as YATA remain focused on informing and developing educational and communication strategies throughout our network of young professionals and
experts.

More than seven decades since its founding NATO remains the world's most
successful alliance in contemporary history. &nbsp;Raising in the midst of the Cold War
as a deterrence alliance its has undergone several adaptations.&nbsp;A lot has happened
also within our association likewise NATO accepting and accomodating also new
members&nbsp;expanding our outreach efforts amongst member and partner
countries.&nbsp;Youth Atlantic Treaty Association continues to promote active participation
in society through youth dialogue.&nbsp;In a changing world one thing remains sure:
Strengthening, Fostering transatlantic values is foremost a&nbsp;prerequisite and the
benchmark for guaranteeing our alliance’s success in the upcoming
decades.&nbsp;Our&nbsp;efforts in&nbsp;building resilient societies through education and raising
awareness to its younger generation.&nbsp;But at the same way the open approach to
involve and integrate youth in the decision-making process by making their voice
heard raises the demand for a more educated and responsible generation.&nbsp;This is
where YATA becomes instrumental to inform and educate young professionals in
the earliest stage of their future careers.

During these 25 years, YATA has grown to 28 national chapters across and beyond
the alliance. Our association draws together countries from the west side of the
Atlantic to the eastern part of Europe and from Nordic countries to southern Europe.
We greeted our newest members last year: Israel and Austria and I hope our
association will be growing in the future as well.
To celebrate with us today it is my honor to introduce to you NATO ADSG for PDD
Miss&nbsp;Carmen Romero. Miss Romero was appointed NATO Deputy Assistant
Secretary-General for Public Diplomacy in October 2016. She joined NATO in May
2004 as Deputy Spokesperson and Head of Press and Media, a position she held for
12 years.

President of the Italian Atlantic Committee and former President of the Atlantic Treaty
Association (2015-2020). He is a regular lecturer in various national and
international, military, and academic institutions. Coordinator of Training Courses for
military officers and diplomats in the Western Balkans and the Middle East.                </span></div><span data-dcnode-id="1876" instrument_node="">

                    [gallery link="none" size="full" columns="1" ids="2213,2214"]

Youth Atlantic Treaty Association (YATA) with the support of NATO PDD and Atlantic Treaty Association (ATA), organized a successful Hybrid 2 days conference at NATO HQ for the 25th anniversary of YATA, on the 26th and 27th of November.

YATA and ATA during all these years managed to promote NATO and transatlantic values to the next generation. YATA by organizing this conference gave to interested people and especially young people, the opportunity to discuss and understand NATO’s values and core principles. NATO, as an Alliance and military-political organization, will continue to play a key role as an effective crisis manager and as a framework for security cooperation across the Euro-Atlantic area, public opinion should help reshape the alliance to meet future challenges.

During the first day of the event the youth had the opportunity to be briefed by high officials of NATO such as the DSG, the DASG and other NATO Officials which shared some of their thoughts about what kind of future we will be living in by 2030, and about what kind of NATO we want.

The second day, YATA had internal meetings among its national chapters with distinguished speakers such as the Secretary General at NATO Parliamentary Assembly, and the Head, Policy Planning, Office of the Secretary General at NATO and organized a real platform for new programs and developments.

During these two days our participants had also the opportunity to make questions to our distinguished speakers.

The mission of this event was to set the table for discussion and to bridge the gap between those active chapters and the one that are struggling with existing. The mission of the young representatives during this event was to communicate messages with youth, to talk about the importance of NATO, taking into account opinion of youth and their vision of NATO’s future mission, and the future of YATA.

With the organisation of these two days conference YATA aimed to encourage the participants to actively supply their ideas on what should be done to ensure that our vision of ‘NATO 2030’ becomes reality. For YATA was also a unique opportunity to take a few days to assess and debate the current status of their association and its future outlook. The number of participants was 24 young representatives, one from each YATA national chapter and the EB.

More specifically During the first day at NATO HQ,

Opening session:

[gallery link="none" size="plus-small" ids="2205,2202,2204,2203,2201"]

The president of YATA, Juxhina Gjoni, on her opening remarks said that: “YATA has played in years and continue to play an important role in the dissemination of the transatlantic values. In an era of fast changing threats and challenges to security, and raising strategic competition, we as YATA remain focused in informing and developing educational and communication strategies throughout our network of young professionals and experts’’.

In the same line The Deputy Assistant Secretary General, Ms. Carmen Romero, in its remarks, has expressed gratitude for the work done by YATA over these 25 years and for have bring NATO closer to its people, helping NATO to understand the youth audience better. NATO and YATA have evolved together during this quarter of a century of changes in the security environment. We look forward to continuing our journey of cooperation together for the future of the alliance.

Prof. Fabrizio Luciolli, Founder of YATA, President of the Comitato Atlantico Italiano and former president of Atlantic Treaty Association, retraced the milestones that led to the creation of YATA and its growth over these 25 years. President Luciolli invite us in continuing our action in the years to come to reinforce and promote the Atlantic values. According to Prof. Luciolli, YATA’s daily works represent an extraordinary added value to the work made by NATO, and the hope is that the collaboration will continue to intensify and strengthen YATA.

Reflecting on today’s security challenges such as Russia, China, cyber and hybrid attacks, terrorist threats and threats to democratic values, the Deputy Secretary General, Mr. Mircea Geoana, said that these are not short-term problems with easy fixes, but multi-generational challenges, which no country can face alone. He said that in a dangerous world, solidarity is strength, underscoring the important role that YATA and its young members can play.

I Session

Mr. Nicola de Santis, Head of the Engagement section of NATO PDD and one of the original members of YATA, in his remarks, has underlined the importance of investing in the new generations as multipliers of the voice of NATO and transatlantic values within a contemporary civil society born and rose in a period of peace. At the end of his speech, Mr. de Santis received a plaque from the President of YATA in the name of the YATA to commemorate these 25 years of cooperation.

II Session

[gallery link="none" size="plus-small" ids="2206"]

Mr. Bruno Lété, from the The German Marshall Fund of the United States, has identified three primary issues on which NATO needs to concentrate in the next decade: power, tech, and politics; and keep open the dialogue on defence and security with the EU. Mr. Benjamin Haddad, from the Atlantic Council, gave us an overview of the perceptions about the alliance and its needs from the United States perspective

III Session

[gallery size="plus-small" ids="2207"]

Mr. Gabriele Cascone, Head of Counter-terrorism Section at NATO, gave us the sense of how the topic of countering terrorism is relevant. NATO developed a set of principles and parameters for its commitment:

1) NATO sees itself as part of a broader effort by the international community

2) helping in counterterrorism in areas in which it has expertise

3)countering terrorism is firstly a national responsibility

4) cooperating with international partners

5) 3 main pillars “ACE” Awarnes, Capabilities, engagement

Ms. Chelsey Slack, Deputy Head of the Cyber Security Section, in her remarks, has introduced us to the strategic components that characterise cyberspace and how NATO has adapted its Strategic approach over the years. From a technical issue, cyberspace being recognized as forth domain in 2016, allowing the Alliance to apply art 5 in case of cyberattack. Furthermore, Mr. Daniel Black, Senior cyber threat analyst, provided us with an overview of the concept of “cyber-Threat”, defining #cyberspace not only as a domain, but also as a medium for all the other domains

[gallery size="plus-small" columns="2" ids="2208,2209"]

Closing remarks

The president of the ATA, Mr. James Townsend, pointed that YATA is the engine of ATA. YATA is becoming important, addressing all of these current issues such as Russia and China. He also thanked YATA for the hard work it has done all those past 25 years.

Day two:

[gallery size="plus-small" link="none" ids="2210,2211,2212"]

I Session

In celebrating #YATA25, we had the honour of hosting Ms Ruxandra Popa, Secretary-General of NATO Parliamentary Assembly / Assemblée parlementaire de l’OTAN. Ms Popa explained the NATO PA perspective on the New Strategic Concept and how the Parliamentary Assembly support NATO in its strategic revision.

Ms. Benedetta Berti, Head of Policy Planning at NATO, guided us in an in-depth explanation of NATO’s New Strategic Concept, allowing us to understand its mechanisms, evolutions and concretely the work behind the definition of the new NATO strategy.

II Session

During the 25th anniversary celebration, we had the pleasure to hear the inspiring words of Ms Aliki Mitsakos, founding member and Secretary-General of GAAEC and President / WIIS-Hellas, about the role of women in Peace and Security.

The event wοuld not have been achieved without the participation and involvement of our speakers, participants and the Support of NATO, YATA and ATA. The engagement of young in the life of the YATA is the only recipe for our success. We would like to give a special thanks to all those amongst you who contribute with suggestions proposals and comments on how to improve YATA. So, we are looking forward to welcoming you to our future events.

</span><h5 data-dcnode-id="1797"><a data-dcnode-id="1798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2021/09/webinar-general-sir-nick-carter-defence-era-strategic-competition/"><span data-dcnode-id="1799" instrument_node="">Webinar: General Sir Nick Carter on ''Defence in an era of strategic competition”</span></a></h5><span data-dcnode-id="1796" instrument_node="">
</span><div class="separator" data-dcnode-id="1795"></div><span data-dcnode-id="1794" instrument_node="">

</span><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">PUBLISHED: September 30, 2021</span></sup><span data-dcnode-id="1790" instrument_node="">

                    ''Defence in an era of strategic competition” was the topic of an 'ATA TALKS' webinar on 27 September with a special and highly knowledgeable guest speaker, General Sir Nick Carter, Chief of the UK Defence Staff. This online conference, organized by the Atlantic Treaty Association and the Youth Atlantic Treaty Association, with the help of ATA UK, attracted many participants from around the world.

General Carter has been the professional head of the United Kingdom’s Armed Forces for more than three years, and before that, he was the head of the British Army. He served repeatedly in Iraq and Afghanistan between 2002 and 2013. That included commanding 55,000 NATO troops during the Afghan “surge” in 2009 and 2010, and then three years later as the Deputy Commander of all NATO-led forces in Afghanistan.&nbsp; He has also held top policy positions, as well as senior command positions.

His tenure as Chief of the Defence Staff covers the period of the Covid-19 pandemic, the end of NATO's Resolute Support mission in Afghanistan, and the conduct of the United Kingdom's Integrated Review of Security, Defence and Foreign Policy.

This latter process included General Carter's acclaimed "Integrated Operating Concept", which charts a course for the Armed Forces to adapt to the new era of strategic competition.

The discussion was moderated by ATA Secretary-General Monika Begovic Ph.D. and CEO of the ATA UK David Hobbs. Opening remarks were made by Juxhina Gjoni, YATA President, and closing remarks by ATA President Jim Townsend.

The webinar had around 200 participants who were eager to learn more about the multipolar world we live in and how modern democracies face new security challenges and threats.

In her opening statement, Juxhina Gjoni mentioned that “recognizing the increasingly complex security environment, our topic of today’s webinar is defence in an era of strategic competition”. She also congratulated the CEO of ATA UK, Mr. Hobbs, for contributing to ATA’s mission in educating, and raising awareness of our societies on foreign affairs and security issues.

&nbsp;

In his presentation, General Carter explained the idea behind the Integrated Operating Concept for the UK’s Armed Forces. In doing so, he tackled the key features of today’s international security environment and ways of addressing the challenges and threats it presents.

He noted that increasingly assertive, authoritarian regimes saw themselves in competition with democratic nations, which they sought to undermine using all the military and non-military instruments of statecraft, and to achieve their objectives by operating under the threshold that would prompt a traditional military response.

“I cannot remember time in my career when the operating environment of the strategic context was more complex or dynamic than it is now”, he observed.

General Carter pointed out that the world is now multipolar, and the distinctions between peace and war, foreign and domestic policy, state and non-state, virtual and reality, have all become blurred. Consequently, the starting point for the Integrated Operating Concept was the need to adapt to this competitive environment and the rapid technological changes that affect the security agenda. The goal was to produce a new strategic culture that was fit for purpose in an era of strategic competition, and which would meet the challenges of technological modernization.

Deterrence could no longer be considered as a static posture, but in terms of competition, more intelligent escalation management, integration, and across multiple domains.

All this means engaging Allies and partners, developing hard and soft military power, modernizing – from platforms to systems – and becoming more adaptable and agile.

Strategic communication is also vital in order to address multiple audiences and address the key problem of ensuring that societies are aware of efforts to undermine their way of life and ideology.

During the Q&amp;A session, General Carter noted that while the Alliance’s military leaders would concur with the assessment of the strategic environment described in the UK’s Integrated Operating Concept, it is inevitably more complicated to draw up a common view among 30 nations, each with its own particular perspectives and preoccupations, with, for example, some nations differing in their willingness to be politically proactive.&nbsp; Another challenge is that some external challenges to individual nations take place below the level that might traditionally be brought to NATO’s attention, a matter which was being studied carefully by SHAPE.

General Carter also noted that the United States and the United Kingdom have a deep partnership and that the two nations are traditionally close, and that like all Allies, they see their security within the NATO “wrap”.

Regarding the recent agreement between Australia, the United Kingdom and the United States (AUKUS), he underlined that this was not a new sort of alliance, but rather a military-industrial agreement, heavily focussed on sharing submarine technology in order to provide Australia with the relevant capability rapidly.

He also stressed that the UK continued to cooperate with the EU, and that all NATO’s members recognized that NATO is the best mechanism for assuring European security.&nbsp; It was also important to remember that some instruments of statecraft were easier to bring to bear in the EU context.

Regarding the importance of values, he noted that the Alliance was founded upon common values, and that there were “like-minded” nations who might not be as democratic but could still be good partners.&nbsp; It was important not to categorize nations in terms of two blocs, but to think in terms of communities of interests.

On the lessons for the international community’s involvement in Afghanistan, he suggested that areas for reflection might be the nature of political guidance during the early stages of involvement, and whether the international community can exercise the strategic patience necessary for nation building.&nbsp; Other areas could include understanding of overall goals, and the understanding of the local context.&nbsp; He also noted that the Taliban would have to reflect on how to build an inclusive government if it wishes to prevent civil strife returning to Afghanistan.

Closing this online conference, Jim Townsend pointed that these kind of webinars are to raise the awareness of the security agenda of today, but mostly to be educational for young people, inviting everyone interested to join ATA and YATA and work in their local communities with the same mission and vision ATA has.  &nbsp;                </span></div><span data-dcnode-id="1786" instrument_node="">

                    Council meeting of the Atlantic Treaty Association was held on 29th July 2021, online, as per the Article 15A of the ATA Constitution. Council adopted the Agenda, previously sent via e-mail to all Council members, as well as Minutes from the last Council meeting held in 2020.

Concerning the discussion on the status of the new Constitution, ATA President Jim Townsend, together with ATA Vice-President Alex Serban explained the process behind the work on the new Constitution, adding that the process was and is in line with the strategic review agreed by all members last year. Council members were introduced into the ATA finances by Treasurer Johannes Kahrs, who stressed that the new Bureau managed to keep expenditures low and accountability high, at the same time stressing the importance of paying dues by ATA members. YATA President Juxhina Sotiri Gjoni gave an overview of YATA since YATA election in September 2020, and mentioned activities that YATA is organizing, for now only online. ATA Secretary General Monika Begovic stressed the regained positive image ATA has with its activities in building good relations with NATO, which was confirmed by Theodossis Georgiou, Counsellor and Legal Advisor and ATA Vice-President Werner Fasslabend, who added that the new Bureau will continue in the new positive direction.

ATA President thanked the Bureau and Council members for the work they were doing, expressing belief in further enhancement of good image and “new” ATA.

</span><h5 data-dcnode-id="1662"><a data-dcnode-id="1663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2021/07/online-conference-amb-baiba-braze-importance-natos-efp-bg-countries/"><span data-dcnode-id="1664" instrument_node="">Online conference: Amb. Baiba Braže on the importance of NATO’s eFP BG countries</span></a></h5><span data-dcnode-id="1661" instrument_node="">
</span><div class="separator" data-dcnode-id="1660"></div><span data-dcnode-id="1659" instrument_node="">
</span><div class="news_text" data-dcnode-id="1652"><span data-dcnode-id="1658" instrument_node="">
</span><sup data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">PUBLISHED: July 28, 2021</span></sup><span data-dcnode-id="1655" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1654"></div><span data-dcnode-id="1653" instrument_node="">
                    A project sponsored and supported by NATO PDD&nbsp;with&nbsp;the main topic:&nbsp;“NATO 2030 – ATA TALKS” held on 1 July 2021.&nbsp;This event focused on the importance of NATO's eFP BG countries and was represented by members of the ATA’s youth wing – YATA.

Under the topic of this online conference:&nbsp;“NATO 2030 – Raising awareness about the importance of NATO’s eFP BG countries”&nbsp;and through discussions by moderator&nbsp;Juxhina Sotiri Gjoni, President YATA, hosted by&nbsp;James Townsend, ATA President with experts’ presentations, ATA and YATA contributes to exchanging ideas, knowledge and opinions giving new perspectives of security challenges and threats.

Speaker at this online conference was Amb. Baiba Braže,&nbsp;Assistant Secretary-General for Public Diplomacy.&nbsp;She discussed with YATA chapter representatives about the future of NATO, providing new information and predictions.

James Townsend started by mentioning that, “it is Important for chapters and YATA to expand the understanding in our align countries, that there is an important role we all can play to support NATO and make sure people understand and respect what NATO does, the importance of NATO to our countries for the stability in Europe, and to understand that for the alliance to remain strong the people of the alliance need to remain engaged and supporting NATO”. In the same line Amb. Braze said, “our mandate is to raise awareness and support for NATO, because our mission is to maintain peace and security in our countries. NATO is the strongest defence alliance in the world”.

As Juxhina Sotiri Gjoni stressed “our association draws together more than 37 ATA national chapters and 25 YATA national chapter expanding its outreach efforts amongst member and partner countries. Throughout many different languages of each national chapters YATA impose an important and unique platform committed to disseminating NATO messages”. In the same way Amb. Braze said that “YATA play a very important role as well as ATA”. Juxhina Sotiri Gjoni stated that “YATA’s role in this process is essential and we all are committed to further strengthen our cooperation with the Public Diplomacy Division”. This program provided a vehicle for the youth of the Alliance to express their vision for the importance of NATO's eFP BG countries – raising awareness.&nbsp;Indeed, according to Gjoni, “In this framework we closely worked together to bring to our young audience attention the importance of NATO’s Enhanced Forward Presence deployed in the eastern part of the Alliance. With four multinational battlegroups, combat-ready, NATO eFP is a demonstration of our alliance’s strength and its transatlantic bond”.

NATO will continue to adapt. As Amb. Braze said, “NATO Summit addressed some very important issues and those include the fact that leaders recognized we are in a systemic competition”. In response to a more dangerous and unpredictable security environment, NATO strengthens its deterrence and defence capabilities, posture and resilience, more capable and ready forces, significant deployments in missions and operations, and deeper engagement with partners. With the accent on NATO 2030, and new challenges and threats which discussed on Summit 2021, Russia was on the agenda.&nbsp; Amb. Braze said about Russia that, “we clearly signal to Russia that on the one hand our channels of communication are open including the NATO-RUSSIA council in Brussels, but on the other hand we clearly show that we are very serious about defence and deterrence, that’s why the battle groups are there”.

At the end of the event, YATA-ATA senior representatives from eFP BG countries like Lithuania, Montenegro, Norway, and Spain participated in a quick round of final words and in a quick Q&amp;A session. During this part, they provided their visions of its future and what it means for them the NATO's battle groups form as a part of the biggest reinforcement of&nbsp;NATO's collective defence&nbsp;in a generation.

From this Q&amp;A session some key points that came out from Amb. Braze were:

“eFP is not called an operation but is an action, is an everyday work of our soldiers and our civilians on the ground to ensure that they are able to understand and act on plans that are ready to meet the challenges and threats. Adding that one of the biggest challenges will always be around the hybrid developments (cyber, disinformation and energy security)”.

“The challenges and threats we face are global and also the US needs a transatlantic alliance to help it meet these global challenges”.

“Covid affected a number of exercises on NATO’s side…. some became smaller, and some other took a different expression”.

“On youth and how to integrate NATO into youth YATA INTERNATIONAL and YATA members play an important role and should be a NATO ambassador, promoted NATO”.

At the end James Townsend pointed up that “is important for YATA to know what the ambassadors doing at NATO PDD…. and their staff is really breaking new ground when it comes to evolving next generation in what NATO was all about”. He also spoken about the resilience stating that “the resilience is YATA, ATA, NATO and what we are doing in our societies” concluding “ATA is looking forward to closer cooperation with YATA and NATO”.                </span></div><span data-dcnode-id="1651" instrument_node="">

</span><h5 data-dcnode-id="1617"><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.atahq.org/2021/07/ata-ambassador-brussels-summit-side-event-nato-2030-brussels-forum/"><span data-dcnode-id="1619" instrument_node="">ATA as Ambassador of Brussels Summit side event 'NATO 2030 at Brussels Forum’</span></a></h5><span data-dcnode-id="1616" instrument_node="">
</span><div class="separator" data-dcnode-id="1615"></div><span data-dcnode-id="1614" instrument_node="">
</span><div class="news_text" data-dcnode-id="1607"><span data-dcnode-id="1613" instrument_node="">
</span><sup data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">PUBLISHED: July 23, 2021</span></sup><span data-dcnode-id="1610" instrument_node="">
</span><div class="clearfix" data-dcnode-id="1609"></div><span data-dcnode-id="1608" instrument_node="">
                    As a reliable NATO partner and an international organization with the aim of promoting Euro-Atlantic values and the global importance of NATO, connecting associations from 37 countries in the world, Atlantic Treaty Association (ATA) was chosen as the Ambassador of Brussels Summit side event 'NATO 2030 at Brussels Forum', organized on 14th of June by NATO and German Marshall Fund of the United States.

The aim of this side-event was to discuss the issues that were topics in the Summit, i.e. future of the transatlantic relations and security challenges that the world and NATO will face in the coming decade. Discussions were focused on a wide range of topics, such as defence and deterrence, global partnerships, innovation, resilience, climate change, cyber, energy security. This public event had an aim to enhance the transparency and visibility of the process, and it brought together government leaders, international experts, representatives from civil society, private sector and young professionals.



Together with its designated members, ATA, together with YATA, was the ‘influential voice’ and it promoted the event. In preparation for the event, ATA and YATA joined their efforts to reach out to key audiences and engage them to the discussion on NATO 2030 and the Summit’s outcomes. Having long lasting relationships with NATO, ATA is a trusted partner of NATO, thus acted as an ambassador of this event across the member states, helping NATO PDD to reach out to a variety of audiences by amplifying the event among the network and through social media accounts, with engaged cooperation, such as:

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; access to the Communication Toolkit of the event containing messages, channels and all amplification elements;

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; constant connection with NATO PDD through a shared platform (Google Drive) with all the graphic and video materials prepared in the run-up of the event;

-&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; chance to communicate on digital advertising in a synchronised manner together with NATO and the other Ambassador organisations.

After the event an assessment form was sent out with the information generated by member organizations, in order NATO PDD to be able to analyse the impact of ATA’s endeavour into promoting the ‘NATO 2030 at Brussels Forum’ event and also to analyse the impact of the event promotion and the outcomes generated by the discussions along the Summit decisions.

With this important role, ATA showed a strong commitment in giving visibility to the public diplomacy event organized by NATO. During the event ATA, with its impressive network, and intuitively knowing how to get a positive brand message across, spread the message by using its platform and strong network to support those efforts.

ATA’s and YATA’s, responsibilities included, but were not limited to, the following:

 	Representing the event positively in a multitude of settings
 	Assisting in content creation (ie. reviews, etc.)
 	Generating brand awareness through word-of-mouth marketing
 	Being a ‘leader’ in our community
 	Providing feedback and insight to NATO
 	Promoting the event via our personal social media accounts

It is important to mention that this Summit came at a pivotal moment for the Alliance, as NATO adapts to growing global competition and more unpredictable threats, including terrorism, cyber-attacks, disruptive technologies, climate change, and Russia and China’s challenges to the rules-based international order. Standing strong together to face a more unpredictable and competitive world is what the NATO 2030 initiative was about.

ATA has shown its quick reflexes and readiness to support NATO whenever needed.

ATA was the voice of #NATO2030 at #BrusselsForum across the Alliance.

June 2021                </span></div><span data-dcnode-id="1606" instrument_node="">

                    ”1952-2022, 70 years of Greece and Turkey in NATO” was the topic of an ‘ATA TALKS’ webinar on 18 February. This online conference was organized by the Atlantic Treaty Association with the &nbsp;Atlantic Council of Turkey. The guests speakers were Mr. Nicola de Santis, Head of the Engagements Section of NATO Public Diplomacy Division, Amb. Ioannis Alexios Zepos, Former Representative of Greece to NATO, and Amb. Tacan İldem, Former Representative of Turkey to NATO. The discussion was moderated by Mr. Theodossios Georgiou, President of the Greek Association for Atlantic and European Cooperation, Counsellor, and former President of the Atlantic Treaty Association, and Mr. &nbsp;Mustafa Veysel Güldoğan, President of the Atlantic Council of Turkey. Ms. Monica Begovic, ATA Secretary

In his opening statement, Mr. Georgiou pointed out “public support is the most fundamental issue since public support guarantees the political will of the governmental signature to be a member of the Alliance. Public support requires an educated public, a public that understands the reason for being a NATO member and how this issue affects their lives”. As he mentioned “we in ATA, strongly believe that without recognition and public support NATO's future could be at risk, not because there is no role and task for NATO, but because sufficient public recognition and support are essential requirements for the long-term survival of any organization in democratic societies. We Live in a world where legitimacy matters as much as power. This exactly was the mission of our ATA since its establishment in 1954 and continues until today”. Today, NATO is confronted by several defining challenges. Mr. Georgiou also analyzed the importance of the Madrid Strategic Concept. “The Madrid Strategic Concept next June&nbsp;will update and align NATO’s political and military directives to the new strategic concept after a decade of tremendous changes. This new Concept will reflect the new security environment, recommit our values, and reaffirm our unity, ensuring that our Alliance is fit for the future”. Concluding by saying that keeping the good memories of the past with the contributions of our speakers we want to take a look at the future.

Mr. Güldoğan, started by mentioning that both countries have had some common goals in terms of defense and security policies. During the last few decades, this has brought even bigger achievements. As he stressed, “Turkey and Greece were leading the emerging cooperation in the region thus guaranteeing the security. We can look at three case concepts in this regard, first of all is the growth of the organization both geographically and materially, second is the experience gained by working together, and third is guaranteeing the security in the region with all the experience gained”.

Mr. de Santis, in his presentation, explained that: “Greece and Turkey are two of the pillars of the cooperation in NATO. Their ambassadors have made history in the alliance not only because of their distinguished diplomatic careers for the leadership position that they occupied at the top level of the decision-making process of the alliance but also for their contribution to the strategic vision of the alliance, the revision of the strategic concept”.

He noted that NATO exists to protect its member's countries so that they could protect their societies and that their democracies could flourish in a framework of security. As he stressed, since the beginning Russia was included in this security equation we see today. As he reminded since the establishment of the Atlantic operation council in November 1991, the strategic concept, Russia was the extended end of friendships with NATO. In December 1994, at the Brussels Summit, Russia was invited to participate in the Partnership for Peace, which had three key features to help build security in Europe. First, is the democratic control of the armed and security services and structures to democratically elected leaders. Second is the transparency of the defense budget, the defense budget in democracies is discussed in parliament where the opposition together with the majority will discuss how human and financial resources are allocated to promote the strategic concept of each. Last, the third aspect of the partnership is the possibility for countries to work together in this sense of partnership.

The example of Greece and Turkey is a great example of two countries that have contributed to the Alliance in different ways but have also stressed the importance of its political dimension.

ATA has been involved in this work in all NATO member countries and partner countries because promotes a better mutual organization, promotes an understanding of NATO, its values, and an understanding of our countries' security policies.

Mr. Zepos&nbsp;pointed out that&nbsp;in 1952 the idea of joining the alliance between Greece and Turkey was very important to peace because along with the Marshall Plan and the Truman doctrine these allowed Greece to slowly rebuild and recover its balance after so many years of a very negative outcome.

According to him,&nbsp;“NATO played an important role in Greece as to providing security on the one hand and second into modernizing its armed forces which was a totally new way of doing things compared to the past. Over the years Greece participated in all of the NATO missions and operations”.

As he mentioned there have been a lot of talks about whether NATO is alive or clinically dead,&nbsp;“I think that the latest events in Ukraine and the reaction that NATO showed made proof to all, that NATO is still there, and wants to cooperate and find solutions, trying to build a steady and stable Europe. I think that the new strategic concept as its coming up and accepted in Madrid in June probably would be looking towards new security threats and new security challenges and ways to deal with them ”

Mr. Ildem congratulated the ATA for organizing this event, as he said: we need to have such events more often to create a better understanding in the public.

As he pointed out, “Ataturk and Venizelos were the pioneers of a new era for a friendly and good neighborly relationship between Greece and Turkey. Greece and Turkey have been contributing to NATO’s collective defense, operations and missions, and they both are trying their best to meet the requirements that are felt with the evolving secuırity environment”.

In the same line as Mr. Zepos, he touched upon&nbsp;the importance of the support the US gave through the Marshall Plan and the Truman doctrine.

“From a historical perspective, Turkey's aspiration to join NATO cannot be strictly viewed as a necessity because of the territorial claims of the expansionist Soviet Union during the Stalin era. It ıs rather a reflection of its deliberate choice to have its place among the democratic family of nations. That is why Turkey became a founding member of the Council of Europe in 1949 that also paved the way for its membership at NATO”.

“Given the complex security environment that we are in, NATO, as a politico-military Alliance, should remain strong militarily, to become stronger politically and to adopt a more global approach. For the foreseeable future Russia, with its revisionist and aggressive pattern of behaviour that challenges the rules based international order and terrorism in all its forms and manifestations will remain to be the main sources of threat that Allies will need to address. China being a rising power with its economic heft and military might should be approached from a prism of both challenges and opportunities. With the use of hybrid concepts that include cyber-attacks and disinformation campaigns, the line between peace and conflict has been blurred. This requires NATO to have a more global approach in addressing those threats and challenges that do not recognize any geographical boundary and for Allied nations to strengthen their societal resilience. Emerging and disruptive technologies (EDTs) can be a game-changer since potential adversaries and systemic rivals, both States and non-state actors, have access to EDTs. Therefore, maintaining NATO’s technological edge and putting innovation at the center of all NATO activities is of paramount importance. NATO should also make its contribution in areas such as the security implications of climate change. NATO should be used more as a unique and essential transatlantic consultation forum where the security concerns of any Ally could be discussed. The next NATO Strategic Concept to be adopted at the NATO Summit in Madrid will project a future-oriented vision to guide NATO’s activities in 2030 and beyond.”

Ms. Begovic, congratulated the organizers of the conference which as she said shows actually the partnership of Associations from two neighboring countries members of the ATA.
