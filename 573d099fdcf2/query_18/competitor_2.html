d.wikimedia.org/wikipedia/commons/thumb/4/4c/Wikisource-logo.svg/32px-Wikisource-logo.svg.png 2x" width="16"><span data-dcnode-id="4737" instrument_node=""> </span><a class="extiw" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikisource.org/wiki/North_Atlantic_Treaty" title="wikisource:North Atlantic Treaty"><span data-dcnode-id="4736" instrument_node="">North Atlantic Treaty</span></a><span data-dcnode-id="4734" instrument_node=""> at </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikisource" title="Wikisource"><span data-dcnode-id="4733" instrument_node="">Wikisource</span></a></td></tr></tbody></table><span data-dcnode-id="4727" instrument_node="">
</span><p data-dcnode-id="4710"><span data-dcnode-id="4726" instrument_node="">The </span><b data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">North Atlantic Treaty</span></b><span data-dcnode-id="4723" instrument_node="">, also referred to as the </span><b data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">Washington Treaty</span></b><span data-dcnode-id="4720" instrument_node="">, is the </span><a data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty" title="Treaty"><span data-dcnode-id="4719" instrument_node="">treaty</span></a><span data-dcnode-id="4717" instrument_node=""> that forms the legal basis of, and is implemented by, the </span><a data-dcnode-id="4715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="4716" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="4714" instrument_node=""> (NATO). The treaty was signed in </span><a data-dcnode-id="4712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="4713" instrument_node="">Washington, D.C.</span></a><span data-dcnode-id="4711" instrument_node="">, on 4 April 1949.

</span><h2 data-dcnode-id="4519"><span class="mw-headline" data-dcnode-id="4527" id="Background"><span data-dcnode-id="4528" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="4520"><span class="mw-editsection-bracket" data-dcnode-id="4525"><span data-dcnode-id="4526" instrument_node="">[</span></span><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="4524" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4518" instrument_node="">
</span><p data-dcnode-id="4513"><span data-dcnode-id="4517" instrument_node="">The treaty was signed in Washington, D.C., on 4 April 1949 by a committee which was chaired by US diplomat </span><a data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Achilles" title="Theodore Achilles"><span data-dcnode-id="4516" instrument_node="">Theodore Achilles</span></a><span data-dcnode-id="4514" instrument_node="">. Earlier secret talks had been held at the Pentagon between 22 March and 1 April 1948, of which Achilles said:
</span></p><span data-dcnode-id="4512" instrument_node="">
</span><blockquote data-dcnode-id="4497"><p data-dcnode-id="4498"><span data-dcnode-id="4511" instrument_node="">The talks lasted about two weeks and by the time they finished, it had been secretly agreed that there would be a treaty, and I had a draft of one in the bottom drawer of my safe. It was never shown to anyone except Jack [</span><a data-dcnode-id="4509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_D._Hickerson" title="John D. Hickerson"><span data-dcnode-id="4510" instrument_node="">Hickerson</span></a><span data-dcnode-id="4508" instrument_node="">]. I wish I had kept it, but when I left the Department in 1950, I dutifully left it in the safe and I have never been able to trace it in the archives. It drew heavily on the </span><a class="mw-redirect" data-dcnode-id="4506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rio_Treaty" title="Rio Treaty"><span data-dcnode-id="4507" instrument_node="">Rio Treaty</span></a><span data-dcnode-id="4505" instrument_node="">, and a bit of the </span><a class="mw-redirect" data-dcnode-id="4503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brussels_Treaty" title="Brussels Treaty"><span data-dcnode-id="4504" instrument_node="">Brussels Treaty</span></a><span data-dcnode-id="4502" instrument_node="">, which had not yet been signed, but of which we were being kept heavily supplied with drafts. The eventual North Atlantic Treaty had the general form, and a good bit of the language of my first draft, but with a number of important differences.</span><sup class="reference" data-dcnode-id="4499" id="cite_ref-trumanlibrary1_1-0"><a data-dcnode-id="4500" href="#cite_note-trumanlibrary1-1"><span data-dcnode-id="4501" instrument_node="">[1]</span></a></sup></p></blockquote><span data-dcnode-id="4496" instrument_node="">
</span><p data-dcnode-id="4491"><span data-dcnode-id="4495" instrument_node="">According to Achilles, another important author of the treaty was </span><a data-dcnode-id="4493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_D._Hickerson" title="John D. Hickerson"><span data-dcnode-id="4494" instrument_node="">John D. Hickerson</span></a><span data-dcnode-id="4492" instrument_node="">:
</span></p><span data-dcnode-id="4490" instrument_node="">
</span><blockquote data-dcnode-id="4484"><p data-dcnode-id="4485"><span data-dcnode-id="4489" instrument_node="">More than any human being Jack was responsible for the nature, content, and form of the Treaty...It was a one-man Hickerson treaty.</span><sup class="reference" data-dcnode-id="4486" id="cite_ref-trumanlibrary1_1-1"><a data-dcnode-id="4487" href="#cite_note-trumanlibrary1-1"><span data-dcnode-id="4488" instrument_node="">[1]</span></a></sup></p></blockquote><span data-dcnode-id="4483" instrument_node="">
</span><p data-dcnode-id="4450"><span data-dcnode-id="4482" instrument_node="">As a fundamental component of NATO, the North Atlantic Treaty is a product of the US' desire to avoid overextension at the end of World War II, and consequently pursue multilateralism in Europe.</span><sup class="reference" data-dcnode-id="4479" id="cite_ref-2"><a data-dcnode-id="4480" href="#cite_note-2"><span data-dcnode-id="4481" instrument_node="">[2]</span></a></sup><span data-dcnode-id="4478" instrument_node=""> It is part of the US' collective defense arrangement with Western European powers, following a long and deliberative process.</span><sup class="reference" data-dcnode-id="4475" id="cite_ref-3"><a data-dcnode-id="4476" href="#cite_note-3"><span data-dcnode-id="4477" instrument_node="">[3]</span></a></sup><span data-dcnode-id="4474" instrument_node=""> The treaty was created with an armed attack by the </span><a data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="4473" instrument_node="">Soviet Union</span></a><span data-dcnode-id="4471" instrument_node=""> against </span><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="4470" instrument_node="">Western Europe</span></a><span data-dcnode-id="4468" instrument_node=""> in mind,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4461" style="white-space:nowrap;"><span data-dcnode-id="4467" instrument_node="">[</span><i data-dcnode-id="4463"><a data-dcnode-id="4464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4465" title="This claim needs references to reliable sources. (March 2022)"><span data-dcnode-id="4466" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4462" instrument_node="">]</span></sup><span data-dcnode-id="4460" instrument_node=""> but the mutual self-defense clause was never invoked during the </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="4459" instrument_node="">Cold War</span></a><span data-dcnode-id="4457" instrument_node="">. Rather, it was invoked for the first and only time in 2001 during </span><a data-dcnode-id="4455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Eagle_Assist" title="Operation Eagle Assist"><span data-dcnode-id="4456" instrument_node="">Operation Eagle Assist</span></a><span data-dcnode-id="4454" instrument_node=""> in response to the </span><a class="mw-redirect" data-dcnode-id="4452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/11_September_2001_attacks" title="11 September 2001 attacks"><span data-dcnode-id="4453" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="4451" instrument_node="">.
</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4449" instrument_node="">By signing the North Atlantic Treaty, parties are "determined to safeguard the freedom, common heritage and civilization of the peoples, founded on the principles of democracy, individual liberty and the rule of law."</span><sup class="reference" data-dcnode-id="4446" id="cite_ref-:0_4-0"><a data-dcnode-id="4447" href="#cite_note-:0-4"><span data-dcnode-id="4448" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4445" instrument_node="">
</span></p><span data-dcnode-id="4443" instrument_node="">

</span><p data-dcnode-id="3932"><span data-dcnode-id="3937" instrument_node="">Article 1 of the treaty states that member parties "settle any international disputes in which they may be involved by peaceful means in such a manner that international peace and security, and justice, are not endangered, and to refrain in their international relations from the threat or use of force in any manner inconsistent with the purposes of the United Nations."</span><sup class="reference" data-dcnode-id="3934" id="cite_ref-:0_4-1"><a data-dcnode-id="3935" href="#cite_note-:0-4"><span data-dcnode-id="3936" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3933" instrument_node="">
</span></p><p data-dcnode-id="3923"><span data-dcnode-id="3931" instrument_node="">Members seek to promote stability and well-being in the North Atlantic area through preservation of peace and security in accordance with the </span><a data-dcnode-id="3929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charter_of_the_United_Nations" title="Charter of the United Nations"><span data-dcnode-id="3930" instrument_node="">Charter of the United Nations</span></a><span data-dcnode-id="3928" instrument_node="">.</span><sup class="reference" data-dcnode-id="3925" id="cite_ref-:0_4-2"><a data-dcnode-id="3926" href="#cite_note-:0-4"><span data-dcnode-id="3927" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3924" instrument_node="">
</span></p><span data-dcnode-id="3922" instrument_node="">
</span><h3 data-dcnode-id="3912"><span class="mw-headline" data-dcnode-id="3920" id="Article_2"><span data-dcnode-id="3921" instrument_node="">Article 2</span></span><span class="mw-editsection" data-dcnode-id="3913"><span class="mw-editsection-bracket" data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">[</span></span><a data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D9" title="Edit section: Article 2"><span data-dcnode-id="3917" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3911" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3910" instrument_node="">Article 2 of the treaty stipulates that "The Parties will contribute toward the further development of peaceful and friendly international relations by strengthening their free institutions, by bringing about a better understanding of the principles upon which these institutions are founded, and by promoting conditions of stability and well-being. They will seek to eliminate conflict in their international economic policies and will encourage economic collaboration between any or all of them."</span><sup class="reference" data-dcnode-id="3907" id="cite_ref-9"><a data-dcnode-id="3908" href="#cite_note-9"><span data-dcnode-id="3909" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3906" instrument_node="">  This is sometimes referred to as the "Canadian Clause" after </span><a data-dcnode-id="3904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lester_B._Pearson" title="Lester B. Pearson"><span data-dcnode-id="3905" instrument_node="">Pearson</span></a><span data-dcnode-id="3903" instrument_node=""> pushed for its inclusion in the treaty.</span><sup class="reference" data-dcnode-id="3900" id="cite_ref-10"><a data-dcnode-id="3901" href="#cite_note-10"><span data-dcnode-id="3902" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3899" instrument_node="">  This included proposals for a trade council, cultural program, technological sharing, and an information program.  Of those, only the latter two were passed.</span><sup class="reference" data-dcnode-id="3896" id="cite_ref-11"><a data-dcnode-id="3897" href="#cite_note-11"><span data-dcnode-id="3898" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="3893" id="cite_ref-12"><a data-dcnode-id="3894" href="#cite_note-12"><span data-dcnode-id="3895" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3892" instrument_node="">  Nonetheless, it has been brought up during trade disputes between members.</span><sup class="reference" data-dcnode-id="3889" id="cite_ref-13"><a data-dcnode-id="3890" href="#cite_note-13"><span data-dcnode-id="3891" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3888" instrument_node="">
</span></p><span data-dcnode-id="3886" instrument_node="">
</span><h3 data-dcnode-id="3876"><span class="mw-headline" data-dcnode-id="3884" id="Article_3"><span data-dcnode-id="3885" instrument_node="">Article 3</span></span><span class="mw-editsection" data-dcnode-id="3877"><span class="mw-editsection-bracket" data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">[</span></span><a data-dcnode-id="3880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D10" title="Edit section: Article 3"><span data-dcnode-id="3881" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3875" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3874" instrument_node="">Article 3 of the treaty states that "In order more effectively to achieve the objectives of this Treaty, the Parties, separately and jointly, by means of continuous and effective self-help and mutual aid, will maintain and develop their individual and collective capacity to resist armed attack."</span><sup class="reference" data-dcnode-id="3871" id="cite_ref-:0_4-3"><a data-dcnode-id="3872" href="#cite_note-:0-4"><span data-dcnode-id="3873" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3870" instrument_node="">
</span></p><p data-dcnode-id="3856"><span data-dcnode-id="3868" instrument_node="">Recently, this has been interpreted as the basis for the target for a 2% GDP expenditure rule,</span><sup class="reference" data-dcnode-id="3865" id="cite_ref-14"><a data-dcnode-id="3866" href="#cite_note-14"><span data-dcnode-id="3867" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3864" instrument_node=""> which was established as a loose guideline in 2006.</span><sup class="reference" data-dcnode-id="3861" id="cite_ref-15"><a data-dcnode-id="3862" href="#cite_note-15"><span data-dcnode-id="3863" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3860" instrument_node="">  This metric was confirmed again during the </span><a data-dcnode-id="3858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2014_Wales_summit" title="2014 Wales summit"><span data-dcnode-id="3859" instrument_node="">2014 Wales summit</span></a><span data-dcnode-id="3857" instrument_node="">.
</span></p><p data-dcnode-id="3844"><span data-dcnode-id="3855" instrument_node="">It has also been used as a core concept for a mandate to strengthen member resilience:  the ability to resist and recover from a major disasters, failures in infrastructure, or traditional armed attack.  This commitment was first accept during the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Warsaw_summit" title="2016 Warsaw summit"><span data-dcnode-id="3854" instrument_node="">2016 Warsaw summit</span></a><span data-dcnode-id="3852" instrument_node="">, and further reiterated and clarified due to the COVID-19 pandemic in 2021.</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-16"><a data-dcnode-id="3850" href="#cite_note-16"><span data-dcnode-id="3851" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3846" id="cite_ref-17"><a data-dcnode-id="3847" href="#cite_note-17"><span data-dcnode-id="3848" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3845" instrument_node="">  Per NATO documents, this has been understood to include seven key areas:
</span></p><span data-dcnode-id="3843" instrument_node="">
</span><ul data-dcnode-id="3819"><li data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Continuity of government during a crisis</span></li><span data-dcnode-id="3840" instrument_node="">
</span><li data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Energy and power grid infrastructure resilience</span></li><span data-dcnode-id="3837" instrument_node="">
</span><li data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">Immigration control</span></li><span data-dcnode-id="3834" instrument_node="">
</span><li data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Food and water security</span></li><span data-dcnode-id="3831" instrument_node="">
</span><li data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">Medical emergencies</span></li><span data-dcnode-id="3828" instrument_node="">
</span><li data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Resilient civil communications</span></li><span data-dcnode-id="3825" instrument_node="">
</span><li data-dcnode-id="3820"><span data-dcnode-id="3824" instrument_node="">Effective transportation networks</span><sup class="reference" data-dcnode-id="3821" id="cite_ref-18"><a data-dcnode-id="3822" href="#cite_note-18"><span data-dcnode-id="3823" instrument_node="">[16]</span></a></sup></li></ul><span data-dcnode-id="3818" instrument_node="">
</span><h3 data-dcnode-id="3808"><span class="mw-headline" data-dcnode-id="3816" id="Article_4"><span data-dcnode-id="3817" instrument_node="">Article 4</span></span><span class="mw-editsection" data-dcnode-id="3809"><span class="mw-editsection-bracket" data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">[</span></span><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D11" title="Edit section: Article 4"><span data-dcnode-id="3813" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3790"><span data-dcnode-id="3806" instrument_node="">Article 4 is generally considered the starting point for major NATO operations, and therefore is intended for either emergencies or situations of urgency.  It officially calls for consultation over military matters when "the territorial integrity, political independence or security of any of the parties is threatened."</span><sup class="reference" data-dcnode-id="3803" id="cite_ref-19"><a data-dcnode-id="3804" href="#cite_note-19"><span data-dcnode-id="3805" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3802" instrument_node="">  Upon its invocation, the issue is discussed in the </span><a data-dcnode-id="3800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Atlantic_Council" title="North Atlantic Council"><span data-dcnode-id="3801" instrument_node="">NAC</span></a><span data-dcnode-id="3799" instrument_node="">, and can formally lead into a joint decision or action (logistic, military, or otherwise) on behalf of the Alliance.</span><sup class="reference" data-dcnode-id="3796" id="cite_ref-dt26_20-0"><a data-dcnode-id="3797" href="#cite_note-dt26-20"><span data-dcnode-id="3798" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3795" instrument_node=""> It has been invoked seven times since the alliance's creation.</span><sup class="reference" data-dcnode-id="3792" id="cite_ref-art4_21-0"><a data-dcnode-id="3793" href="#cite_note-art4-21"><span data-dcnode-id="3794" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3791" instrument_node="">
</span></p><span data-dcnode-id="3789" instrument_node="">

</span><p data-dcnode-id="3400"><span data-dcnode-id="3415" instrument_node="">There have also been instances where Article 4 was not formally invoked, but instead threatened.  In fact, this was viewed as one of the original intentions for Article 4: as a means to elevate issues and provide member nations a means of deterrence.</span><sup class="reference" data-dcnode-id="3412" id="cite_ref-48"><a data-dcnode-id="3413" href="#cite_note-48"><span data-dcnode-id="3414" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3411" instrument_node="">  For example, in November of 2021, the Polish foreign ministry—along with Estonia, Lithuania, and Latvia—briefly considered triggering article 4 due to the </span><a data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021%25E2%2580%25932022_Belarus%25E2%2580%2593European_Union_border_crisis" title="2021–2022 Belarus–European Union border crisis"><span data-dcnode-id="3410" instrument_node="">Belorussian migrant crisis</span></a><span data-dcnode-id="3408" instrument_node="">, but it was not formally requested.</span><sup class="reference" data-dcnode-id="3405" id="cite_ref-49"><a data-dcnode-id="3406" href="#cite_note-49"><span data-dcnode-id="3407" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="3402" id="cite_ref-50"><a data-dcnode-id="3403" href="#cite_note-50"><span data-dcnode-id="3404" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3401" instrument_node="">
</span></p><span data-dcnode-id="3399" instrument_node="">
</span><h3 data-dcnode-id="3389"><span class="mw-headline" data-dcnode-id="3397" id="Article_5"><span data-dcnode-id="3398" instrument_node="">Article 5</span></span><span class="mw-editsection" data-dcnode-id="3390"><span class="mw-editsection-bracket" data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">[</span></span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D12" title="Edit section: Article 5"><span data-dcnode-id="3394" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3388" instrument_node="">
</span><p data-dcnode-id="3382"><span data-dcnode-id="3387" instrument_node="">The key section of the treaty is Article 5. Its commitment clause defines the </span><i data-dcnode-id="3384"><a data-dcnode-id="3385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Casus_foederis" title="Casus foederis"><span data-dcnode-id="3386" instrument_node="">casus foederis</span></a></i><span data-dcnode-id="3383" instrument_node="">. It commits each member state to consider an armed attack against one member state, in Europe or North America, to be an armed attack against them all.  Upon such attack, each member state is to assist by taking "such action as [the member state] deems necessary, including the use of armed force, to restore and maintain the security of the North Atlantic area."
</span></p><p data-dcnode-id="3353"><span data-dcnode-id="3381" instrument_node="">It has been invoked only once in NATO history: by the United States after the </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="3380" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="3378" instrument_node=""> in 2001.</span><sup class="reference" data-dcnode-id="3375" id="cite_ref-51"><a data-dcnode-id="3376" href="#cite_note-51"><span data-dcnode-id="3377" instrument_node="">[49]</span></a></sup><sup class="reference" data-dcnode-id="3372" id="cite_ref-52"><a data-dcnode-id="3373" href="#cite_note-52"><span data-dcnode-id="3374" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3371" instrument_node=""> The invocation was confirmed on 4 October 2001, when NATO determined that the attacks were indeed eligible under the terms of the North Atlantic Treaty.</span><sup class="reference" data-dcnode-id="3368" id="cite_ref-53"><a data-dcnode-id="3369" href="#cite_note-53"><span data-dcnode-id="3370" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3367" instrument_node=""> The eight official actions taken by NATO in response to the 9/11 attacks included </span><a data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Eagle_Assist" title="Operation Eagle Assist"><span data-dcnode-id="3366" instrument_node="">Operation Eagle Assist</span></a><span data-dcnode-id="3364" instrument_node=""> and </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Active_Endeavour" title="Operation Active Endeavour"><span data-dcnode-id="3363" instrument_node="">Operation Active Endeavour</span></a><span data-dcnode-id="3361" instrument_node="">, a naval operation in the </span><a class="mw-redirect" data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean" title="Mediterranean"><span data-dcnode-id="3360" instrument_node="">Mediterranean</span></a><span data-dcnode-id="3358" instrument_node=""> which was designed to prevent the movement of terrorists or weapons of mass destruction, as well as enhancing the security of shipping in general. Active Endeavour began on 4&nbsp;October 2001.</span><sup class="reference" data-dcnode-id="3355" id="cite_ref-54"><a data-dcnode-id="3356" href="#cite_note-54"><span data-dcnode-id="3357" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3354" instrument_node="">
</span></p><p data-dcnode-id="3265"><span data-dcnode-id="3352" instrument_node="">In April 2012, Turkish Prime Minister </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Recep_Tayyip_Erdo%25C4%259Fan" title="Recep Tayyip Erdoğan"><span data-dcnode-id="3351" instrument_node="">Recep Tayyip Erdoğan</span></a><span data-dcnode-id="3349" instrument_node=""> considered invoking Article 5 of the NATO treaty to protect Turkish national security in a dispute over the </span><a class="mw-redirect" data-dcnode-id="3347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Civil_War" title="Syrian Civil War"><span data-dcnode-id="3348" instrument_node="">Syrian Civil War</span></a><span data-dcnode-id="3346" instrument_node="">.</span><sup class="reference" data-dcnode-id="3343" id="cite_ref-55"><a data-dcnode-id="3344" href="#cite_note-55"><span data-dcnode-id="3345" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="3340" id="cite_ref-56"><a data-dcnode-id="3341" href="#cite_note-56"><span data-dcnode-id="3342" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3339" instrument_node=""> The alliance responded quickly and a spokesperson said the alliance was "monitoring the situation very closely and will continue to do so" and "takes it very seriously protecting its members."</span><sup class="reference" data-dcnode-id="3336" id="cite_ref-57"><a data-dcnode-id="3337" href="#cite_note-57"><span data-dcnode-id="3338" instrument_node="">[55]</span></a></sup><span data-dcnode-id="3335" instrument_node=""> On 17 April, Turkey said it would raise the issue quietly in the next NATO ministerial meeting.</span><sup class="reference" data-dcnode-id="3332" id="cite_ref-58"><a data-dcnode-id="3333" href="#cite_note-58"><span data-dcnode-id="3334" instrument_node="">[56]</span></a></sup><span data-dcnode-id="3331" instrument_node=""> On 29 April, the Syrian foreign ministry wrote that it had received Erdoğan's message, which he had repeated a few days before, loud and clear.</span><sup class="reference" data-dcnode-id="3328" id="cite_ref-59"><a data-dcnode-id="3329" href="#cite_note-59"><span data-dcnode-id="3330" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3327" instrument_node=""> On 25 June, the Turkish Deputy Prime Minister said that he intended to raise Article 5</span><sup class="reference" data-dcnode-id="3324" id="cite_ref-60"><a data-dcnode-id="3325" href="#cite_note-60"><span data-dcnode-id="3326" instrument_node="">[58]</span></a></sup><span data-dcnode-id="3323" instrument_node=""> at a specially-convened NATO meeting</span><sup class="reference" data-dcnode-id="3320" id="cite_ref-61"><a data-dcnode-id="3321" href="#cite_note-61"><span data-dcnode-id="3322" instrument_node="">[59]</span></a></sup><span data-dcnode-id="3319" instrument_node=""> because of the downing of an "unarmed" Turkish military jet which was "13 sea miles" from Syria over "international waters" on a "solo mission to test domestic radar systems".</span><sup class="reference" data-dcnode-id="3316" id="cite_ref-62"><a data-dcnode-id="3317" href="#cite_note-62"><span data-dcnode-id="3318" instrument_node="">[60]</span></a></sup><span data-dcnode-id="3315" instrument_node=""> A Syrian Foreign Ministry spokesman insisted that the plane was "flying at an altitude of 100 meters inside the Syrian airspace in a clear breach of Syrian sovereignty" and that the "jet was shot down by anti-aircraft fire," the bullets of which "only have a range of 2.5 kilometers (1.5 miles)" rather than by radar-guided missile.</span><sup class="reference" data-dcnode-id="3312" id="cite_ref-63"><a data-dcnode-id="3313" href="#cite_note-63"><span data-dcnode-id="3314" instrument_node="">[61]</span></a></sup><span data-dcnode-id="3311" instrument_node=""> On 5 August, Erdoğan stated, "The </span><a data-dcnode-id="3309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tomb_of_Suleyman_Shah" title="Tomb of Suleyman Shah"><span data-dcnode-id="3310" instrument_node="">tomb of Suleyman Shah</span></a><span data-dcnode-id="3308" instrument_node=""> [in Syria] and the land surrounding it is our territory. We cannot ignore any unfavorable act against that monument, as it would be an attack on our territory, as well as an attack on NATO land... Everyone knows his duty, and will continue to do what is necessary."</span><sup class="reference" data-dcnode-id="3305" id="cite_ref-64"><a data-dcnode-id="3306" href="#cite_note-64"><span data-dcnode-id="3307" instrument_node="">[62]</span></a></sup><span data-dcnode-id="3304" instrument_node=""> NATO Secretary-General </span><a data-dcnode-id="3302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anders_Fogh_Rasmussen" title="Anders Fogh Rasmussen"><span data-dcnode-id="3303" instrument_node="">Rasmussen</span></a><span data-dcnode-id="3301" instrument_node=""> later said in advance of the October 2012 ministerial meeting that the alliance was prepared to defend Turkey, and acknowledged that this border dispute concerned the alliance, but underlined the alliance's hesitancy over a possible intervention: "A military intervention can have unpredicted repercussions. Let me be very clear. We have no intention to interfere militarily [at present with Syria]."</span><sup class="reference" data-dcnode-id="3298" id="cite_ref-65"><a data-dcnode-id="3299" href="#cite_note-65"><span data-dcnode-id="3300" instrument_node="">[63]</span></a></sup><span data-dcnode-id="3297" instrument_node=""> On 27 March 2014, recordings were released on YouTube</span><sup class="reference" data-dcnode-id="3294" id="cite_ref-66"><a data-dcnode-id="3295" href="#cite_note-66"><span data-dcnode-id="3296" instrument_node="">[64]</span></a></sup><span data-dcnode-id="3293" instrument_node=""> of a conversation purportedly involving then Turkish foreign minister </span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahmet_Davuto%25C4%259Flu" title="Ahmet Davutoğlu"><span data-dcnode-id="3292" instrument_node="">Ahmet Davutoğlu</span></a><span data-dcnode-id="3290" instrument_node="">, Foreign Ministry Undersecretary </span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feridun_Sinirlio%25C4%259Flu" title="Feridun Sinirlioğlu"><span data-dcnode-id="3289" instrument_node="">Feridun Sinirlioğlu</span></a><span data-dcnode-id="3287" instrument_node="">, then </span><a class="mw-redirect" data-dcnode-id="3285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Intelligence_Organization_%28Turkey%29" title="National Intelligence Organization (Turkey)"><span data-dcnode-id="3286" instrument_node="">National Intelligence Organization</span></a><span data-dcnode-id="3284" instrument_node=""> (MİT) head </span><a data-dcnode-id="3282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hakan_Fidan" title="Hakan Fidan"><span data-dcnode-id="3283" instrument_node="">Hakan Fidan</span></a><span data-dcnode-id="3281" instrument_node="">, and Deputy Chief of General Staff General Yaşar Güler. The recording has been reported as being probably recorded at Davutoğlu's office at the Foreign Ministry on 13 March.</span><sup class="reference" data-dcnode-id="3278" id="cite_ref-67"><a data-dcnode-id="3279" href="#cite_note-67"><span data-dcnode-id="3280" instrument_node="">[65]</span></a></sup><span data-dcnode-id="3277" instrument_node=""> Transcripts of the conversation reveal that as well as exploring the options for Turkish forces engaging in </span><a data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/False_flag" title="False flag"><span data-dcnode-id="3276" instrument_node="">false flag</span></a><span data-dcnode-id="3274" instrument_node=""> operations inside Syria, the meeting involved a discussion about using the threat to the tomb as an excuse for Turkey to intervene militarily inside Syria. Davutoğlu stated that Erdoğan told him that he saw the threat to the tomb as an "opportunity".</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3267" style="white-space:nowrap;"><span data-dcnode-id="3273" instrument_node="">[</span><i data-dcnode-id="3269"><a data-dcnode-id="3270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3271" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="3272" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3268" instrument_node="">]</span></sup><span data-dcnode-id="3266" instrument_node="">
</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3264" instrument_node="">Prior to the meeting of defence ministers and recently appointed Secretary-General </span><a data-dcnode-id="3262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jens_Stoltenberg" title="Jens Stoltenberg"><span data-dcnode-id="3263" instrument_node="">Jens Stoltenberg</span></a><span data-dcnode-id="3261" instrument_node=""> at Brussels in late June 2015,</span><sup class="reference" data-dcnode-id="3258" id="cite_ref-68"><a data-dcnode-id="3259" href="#cite_note-68"><span data-dcnode-id="3260" instrument_node="">[66]</span></a></sup><sup class="reference" data-dcnode-id="3255" id="cite_ref-69"><a data-dcnode-id="3256" href="#cite_note-69"><span data-dcnode-id="3257" instrument_node="">[67]</span></a></sup><span data-dcnode-id="3254" instrument_node=""> it was stated by a journalist, who referenced an off-the-record interview with an official source, that "Entirely legal activities, such as running a pro-Moscow TV station, could become a broader assault on a country that would require a NATO response under Article Five of the Treaty... A final strategy is expected in October 2015."</span><sup class="reference" data-dcnode-id="3251" id="cite_ref-70"><a data-dcnode-id="3252" href="#cite_note-70"><span data-dcnode-id="3253" instrument_node="">[68]</span></a></sup><span data-dcnode-id="3250" instrument_node=""> In another report, the journalist reported that "as part of the hardened stance, the UK has committed £750,000 of its money to support a counter-propaganda unit at NATO's headquarters in Brussels."</span><sup class="reference" data-dcnode-id="3247" id="cite_ref-71"><a data-dcnode-id="3248" href="#cite_note-71"><span data-dcnode-id="3249" instrument_node="">[69]</span></a></sup><span data-dcnode-id="3246" instrument_node="">
</span></p><p data-dcnode-id="3236"><span data-dcnode-id="3244" instrument_node="">According to a 2019 </span><a class="mw-redirect" data-dcnode-id="3242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pew_Research" title="Pew Research"><span data-dcnode-id="3243" instrument_node="">Pew Research</span></a><span data-dcnode-id="3241" instrument_node=""> poll, citizens of most member states do not support their country adhering to Article 5 obligations in the event of an attack from Russia.</span><sup class="reference" data-dcnode-id="3238" id="cite_ref-72"><a data-dcnode-id="3239" href="#cite_note-72"><span data-dcnode-id="3240" instrument_node="">[70]</span></a></sup><span data-dcnode-id="3237" instrument_node="">
</span></p><p data-dcnode-id="3231"><span data-dcnode-id="3235" instrument_node="">The United States and other countries have </span><a data-dcnode-id="3233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Defense_pact" title="Defense pact"><span data-dcnode-id="3234" instrument_node="">defense pacts</span></a><span data-dcnode-id="3232" instrument_node=""> with similar requirements as Article 5.
</span></p><span data-dcnode-id="3230" instrument_node="">
</span><h3 data-dcnode-id="3220"><span class="mw-headline" data-dcnode-id="3228" id="Article_6"><span data-dcnode-id="3229" instrument_node="">Article 6</span></span><span class="mw-editsection" data-dcnode-id="3221"><span class="mw-editsection-bracket" data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">[</span></span><a data-dcnode-id="3224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D13" title="Edit section: Article 6"><span data-dcnode-id="3225" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3218" instrument_node="">Article 6 states that the treaty covers only member states' territories in Europe and North America, Turkey and islands in the North Atlantic north of the </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tropic_of_Cancer" title="Tropic of Cancer"><span data-dcnode-id="3217" instrument_node="">Tropic of Cancer</span></a><span data-dcnode-id="3215" instrument_node="">, plus </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Algeria" title="French Algeria"><span data-dcnode-id="3214" instrument_node="">French Algeria</span></a><span data-dcnode-id="3212" instrument_node="">. It was the opinion in August 1965 of the US State Department, the US Defense Department and the legal division of NATO that an attack on the </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._state" title="U.S. state"><span data-dcnode-id="3211" instrument_node="">U.S. state</span></a><span data-dcnode-id="3209" instrument_node=""> of </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hawaii" title="Hawaii"><span data-dcnode-id="3208" instrument_node="">Hawaii</span></a><span data-dcnode-id="3206" instrument_node=""> would not trigger the treaty, but an attack on the other 49 would.</span><sup class="reference" data-dcnode-id="3203" id="cite_ref-hall19650808_73-0"><a data-dcnode-id="3204" href="#cite_note-hall19650808-73"><span data-dcnode-id="3205" instrument_node="">[71]</span></a></sup><span data-dcnode-id="3202" instrument_node="">
The Spanish cities of </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ceuta" title="Ceuta"><span data-dcnode-id="3201" instrument_node="">Ceuta</span></a><span data-dcnode-id="3199" instrument_node=""> and </span><a data-dcnode-id="3197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Melilla" title="Melilla"><span data-dcnode-id="3198" instrument_node="">Melilla</span></a><span data-dcnode-id="3196" instrument_node=""> on the North African shore are thus not under NATO protection in spite of </span><a data-dcnode-id="3194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Morocco" title="Greater Morocco"><span data-dcnode-id="3195" instrument_node="">Moroccan claims to them</span></a><span data-dcnode-id="3193" instrument_node="">.
Legal experts have interpreted that other articles could cover the Spanish North African cities but this take has not been tested in practice.</span><sup class="reference" data-dcnode-id="3190" id="cite_ref-Newtral_74-0"><a data-dcnode-id="3191" href="#cite_note-Newtral-74"><span data-dcnode-id="3192" instrument_node="">[72]</span></a></sup><span data-dcnode-id="3189" instrument_node="">  This is also why events such as </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020_Balyun_airstrikes" title="2020 Balyun airstrikes"><span data-dcnode-id="3188" instrument_node="">the Balyun airstrikes</span></a><span data-dcnode-id="3186" instrument_node=""> did not trigger Article 5, as the Turkish troops that were attacked were in Syria, not Turkey.</span><sup class="reference" data-dcnode-id="3183" id="cite_ref-75"><a data-dcnode-id="3184" href="#cite_note-75"><span data-dcnode-id="3185" instrument_node="">[73]</span></a></sup><span data-dcnode-id="3182" instrument_node="">
</span></p><p data-dcnode-id="3169"><span data-dcnode-id="3180" instrument_node="">On 16 April 2003, NATO agreed to take command of the </span><a data-dcnode-id="3178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Security_Assistance_Force" title="International Security Assistance Force"><span data-dcnode-id="3179" instrument_node="">International Security Assistance Force</span></a><span data-dcnode-id="3177" instrument_node=""> (ISAF) in </span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="3176" instrument_node="">Afghanistan</span></a><span data-dcnode-id="3174" instrument_node="">, which includes troops from 42 countries. The decision came at the request of Germany and the Netherlands, the two states leading ISAF at the time of the agreement, and all nineteen NATO ambassadors approved it unanimously. The handover of control to NATO took place on 11 August, and marked the first time in NATO's history that it took charge of a mission outside the north Atlantic area.</span><sup class="reference" data-dcnode-id="3171" id="cite_ref-76"><a data-dcnode-id="3172" href="#cite_note-76"><span data-dcnode-id="3173" instrument_node="">[74]</span></a></sup><span data-dcnode-id="3170" instrument_node="">
</span></p><span data-dcnode-id="3168" instrument_node="">
</span><h3 data-dcnode-id="3158"><span class="mw-headline" data-dcnode-id="3166" id="Article_10"><span data-dcnode-id="3167" instrument_node="">Article 10</span></span><span class="mw-editsection" data-dcnode-id="3159"><span class="mw-editsection-bracket" data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">[</span></span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D14" title="Edit section: Article 10"><span data-dcnode-id="3163" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3157" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3151" role="note"><span data-dcnode-id="3154" instrument_node="">Main article: </span><a data-dcnode-id="3152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enlargement_of_NATO%23Article_10" title="Enlargement of NATO"><span data-dcnode-id="3153" instrument_node="">Enlargement of NATO §&nbsp;Article 10</span></a></div><span data-dcnode-id="3150" instrument_node="">
</span><p data-dcnode-id="3140"><span data-dcnode-id="3149" instrument_node="">Article 10 dictates the process by which other countries may join NATO, which is by unanimous agreement by current NATO members.  Further, new NATO members can only consist of other European nations.  In practice, this has turned into a set of action plans which an aspiring nation must follow in order to become a member.  Including the Membership Action Plan (MAP) mechanism,</span><sup class="reference" data-dcnode-id="3146" id="cite_ref-77"><a data-dcnode-id="3147" href="#cite_note-77"><span data-dcnode-id="3148" instrument_node="">[75]</span></a></sup><span data-dcnode-id="3145" instrument_node=""> and Intensified Dialog formula.</span><sup class="reference" data-dcnode-id="3142" id="cite_ref-78"><a data-dcnode-id="3143" href="#cite_note-78"><span data-dcnode-id="3144" instrument_node="">[76]</span></a></sup><span data-dcnode-id="3141" instrument_node="">
</span></p><span data-dcnode-id="3139" instrument_node="">
</span><h3 data-dcnode-id="3129"><span class="mw-headline" data-dcnode-id="3137" id="Changes_since_signing"><span data-dcnode-id="3138" instrument_node="">Changes since signing</span></span><span class="mw-editsection" data-dcnode-id="3130"><span class="mw-editsection-bracket" data-dcnode-id="3135"><span data-dcnode-id="3136" instrument_node="">[</span></span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DNorth_Atlantic_Treaty%26action%3Dedit%26section%3D15" title="Edit section: Changes since signing"><span data-dcnode-id="3134" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3122"><span data-dcnode-id="3127" instrument_node="">Three official footnotes have been released to reflect the changes made since the treaty was written:</span><sup class="reference" data-dcnode-id="3124" id="cite_ref-79"><a data-dcnode-id="3125" href="#cite_note-79"><span data-dcnode-id="3126" instrument_node="">[77]</span></a></sup><span data-dcnode-id="3123" instrument_node="">
</span></p><span data-dcnode-id="3121" instrument_node="">
</span><ul data-dcnode-id="3118"><li data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">The definition of the territories to which Article 5 applies was revised by Article 2 of the Protocol to the North Atlantic Treaty on the accession of Greece and Turkey signed on 22 October 1951.</span></li></ul><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Regarding Article 6:
</span></p><span data-dcnode-id="3114" instrument_node="">
</span><ul data-dcnode-id="3111"><li data-dcnode-id="3112"><span data-dcnode-id="3113" instrument_node="">On 16 January 1963, the North Atlantic Council noted that insofar as the former Algerian Departments of France were concerned, the relevant clauses of this Treaty had become inapplicable as from 3 July 1962.</span></li></ul><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">Regarding Article 11:
</span></p><span data-dcnode-id="3107" instrument_node="">
</span><ul data-dcnode-id="3104"><li data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">The Treaty came into force on 24 August 1949, after the deposition of the ratifications of all signatory states.</span></li></ul><span data-dcnode-id="3103" instrument_node="">

 the basis of a full awareness of the attitudes and interests of all the members of NATO. While all members of NATO have a responsibility to consult with their partners on appropriate matters, a large share of responsibility for such consultation necessarily rests on the more powerful members of the Community.</span></q></cite><span class="Z3988" data-dcnode-id="2624" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=NATO.int&amp;rft.atitle=Report+of+the+Committee+of+Three+on+Non-Military+Cooperation+in+NATO&amp;rft.date=1956-12-13&amp;rft_id=https%3A%2F%2Fwww.nato.int%2Fcps%2Fen%2Fnatohq%2Fofficial_texts_17481.htm&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ANorth+Atlantic+Treaty"></span></span><span data-dcnode-id="2622" instrument_node="">
