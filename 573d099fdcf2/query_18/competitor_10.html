</span><h1 class="fs-huge" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">North Atlantic Council </span></h1><span data-dcnode-id="839" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="829"><span data-dcnode-id="838" instrument_node="">
</span><li data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Last updated: 10 Oct. 2017 16:05</span></li><span data-dcnode-id="835" instrument_node="">
</span><li class="last" data-dcnode-id="831"><span data-dcnode-id="834" instrument_node="">
</span><span class="icon icon-print" data-dcnode-id="833"></span><span data-dcnode-id="832" instrument_node="">
</span></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span><ul class="list-i18n" data-dcnode-id="805"><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">English</span></li><span data-dcnode-id="824" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">
</span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49763.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="822" instrument_node="">French</span></a><span data-dcnode-id="820" instrument_node="">
</span></li><span data-dcnode-id="818" instrument_node="">
</span><li data-dcnode-id="813"><span data-dcnode-id="817" instrument_node="">
</span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49763.htm%3FselectedLocale%3Dru"><span data-dcnode-id="816" instrument_node="">Russian</span></a><span data-dcnode-id="814" instrument_node="">
</span></li><span data-dcnode-id="812" instrument_node="">
</span><li data-dcnode-id="807"><span data-dcnode-id="811" instrument_node="">
</span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/topics_49763.htm%3FselectedLocale%3Duk"><span data-dcnode-id="810" instrument_node="">Ukrainian</span></a><span data-dcnode-id="808" instrument_node="">
</span></li><span data-dcnode-id="806" instrument_node="">

</span><div class="socialbar" data-dcnode-id="794"><span data-dcnode-id="803" instrument_node="">
</span><span data-dcnode-id="801" instrument_node="">
</span><a class="icon icon-facebook" data-dcnode-id="800" data-utm-medium="smcweb" data-utm-source="facebook" href="#"></a><span data-dcnode-id="799" instrument_node="">
</span><a class="icon icon-twitter" data-dcnode-id="798" data-utm-medium="smcweb" data-utm-source="twitter" href="#"></a><span data-dcnode-id="797" instrument_node="">
</span><a class="icon icon-linkedin" data-dcnode-id="796" data-utm-medium="smcweb" data-utm-source="linkedin" href="#"></a><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node=""> </span><span data-dcnode-id="791" instrument_node="">
</span><section class="content cf" data-dcnode-id="614"><span data-dcnode-id="790" instrument_node="">
</span><p class="introtxt" data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The North Atlantic Council is the principal political decision-making body within NATO. It oversees the political and military process relating to security issues affecting the whole Alliance. It brings together representatives of each member country to discuss policy or operational questions requiring collective decisions, providing a forum for wide-ranging consultation between members on all issues affecting their peace and security.</span></p><span data-dcnode-id="787" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="781"><span data-dcnode-id="786" instrument_node="">
</span><span data-dcnode-id="784" instrument_node="">
</span><img alt="General view of the meeting" data-dcnode-id="783" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/2019_02_190214a-mod-nac1/20190214_190214a-025_rdax_775x517s.jpg&amp;raw"><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span><div data-dcnode-id="746"><span data-dcnode-id="779" instrument_node="">
</span><br data-dcnode-id="778"><span data-dcnode-id="777" instrument_node="">
</span><div class="box--highlight" data-dcnode-id="751"><span data-dcnode-id="776" instrument_node="">
</span><h3 data-dcnode-id="774"><span data-dcnode-id="775" instrument_node=""> Highlights</span></h3><span data-dcnode-id="773" instrument_node="">
</span><ul data-dcnode-id="753"><span data-dcnode-id="772" instrument_node="">
</span><li data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The North Atlantic Council (NAC) is the principal political       decision-making body within NATO and is the ultimate authority at the head       of a network of committees.</span></li><span data-dcnode-id="769" instrument_node="">
</span><li data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">NAC discussions and decisions       cover all aspects of the Organization's activities and are often based on       reports and recommendations prepared by subordinate committees, at the       Council's request. </span></li><span data-dcnode-id="766" instrument_node="">
</span><li data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">The Nuclear Planning Group has comparable authority to the NAC, but       only for matters within its specific area of competence, i.e., nuclear       policies, planning and consultation procedures. </span></li><span data-dcnode-id="763" instrument_node="">
</span><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Policies decided in the NAC are the expression of the collective       will of all member countries of the Alliance since decisions are made on       the basis of unanimity and common accord. </span></li><span data-dcnode-id="760" instrument_node="">
</span><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">The Secretary General chairs the NAC and its decisions have the       same status and validity at whatever level it meets. </span></li><span data-dcnode-id="757" instrument_node="">
</span><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">It was the only body established by the North Atlantic Treaty       (Article 9) in 1949 and the only one with the authority to set up       subsidiary bodies. </span></li><span data-dcnode-id="754" instrument_node="">
</span></ul><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">&nbsp;</span></p><span data-dcnode-id="747" instrument_node="">
</span></div><span data-dcnode-id="745" instrument_node="">
</span><div class="purehtml" data-dcnode-id="743"><br data-dcnode-id="744"></div><span data-dcnode-id="742" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="701"><span data-dcnode-id="741" instrument_node="">
</span><ul class="accordion" data-dcnode-id="703"><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="739" instrument_node="">
</span><h2 data-dcnode-id="735"><a data-dcnode-id="736" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="738"></span><span data-dcnode-id="737" instrument_node="">Effective political authority and powers of decision</span></a></h2><span data-dcnode-id="734" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="708"><span data-dcnode-id="733" instrument_node="">
</span><div class="inner-content" data-dcnode-id="710"><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">The NAC has effective political authority and powers of decision. It is the only body that was established by the North Atlantic Treaty, under Article 9:</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="727"><em data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">“The Parties hereby establish a council, on which each of them shall be represented, to consider matters concerning the implementation of this Treaty. The council shall be so organized as to be able to meet promptly at any time. The council shall set up such subsidiary bodies as may be necessary; in particular it shall establish immediately a defense committee which shall recommend measures for the implementation of Articles 3 and 5.”</span></em></p><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">In addition to being the only body invested with the authority to set up “such subsidiary bodies as may be necessary”, it is also the ultimate authority at the head of a large, intricate network of committees and working groups. It is often referred to as “the Council”.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The NAC is the principal political decision-making body and oversees the political and military process relating to security issues affecting the whole Alliance. </span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Items discussed and decisions taken at meetings of the Council cover all aspects of the Organization's activities and are frequently based on reports and recommendations prepared by subordinate committees at the Council's request. Equally, subjects may be raised by the Secretary General or any one of the national representatives, in particular under Article 4 of the Washington Treaty: </span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="714"><em data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">“The Parties will consult together whenever, in the opinion of any of them, the territorial integrity, political independence or security of any of the Parties is threatened.”</span></em></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Decisions are agreed upon on the basis of unanimity and common accord. There is no voting or decision by majority. This means that policies decided upon by the NAC are supported by and are the expression of the collective will of all the sovereign states that are members of the Alliance and are accepted by all of them. All members have an equal right to express their views and share in the consensus on which decisions are based. </span></p></div><span data-dcnode-id="709" instrument_node="">
</span></div><span data-dcnode-id="706" instrument_node="">
</span></li><span data-dcnode-id="704" instrument_node="">
</span></ul><span data-dcnode-id="702" instrument_node="">
</span></div><span data-dcnode-id="700" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="670"><span data-dcnode-id="699" instrument_node="">
</span><ul class="accordion" data-dcnode-id="672"><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="674"><span data-dcnode-id="697" instrument_node="">
</span><h2 data-dcnode-id="693"><a data-dcnode-id="694" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="696"></span><span data-dcnode-id="695" instrument_node="">Representation at different levels</span></a></h2><span data-dcnode-id="692" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="677"><span data-dcnode-id="691" instrument_node="">
</span><div class="inner-content" data-dcnode-id="679"><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Representatives of all member countries of NATO have a seat at the NAC. It can meet at the level of “permanent representatives” (or “ambassadors”), at the level of foreign and defence ministers, and at the level of heads of state and government. </span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Its decisions have the same status and validity at whatever level it meets.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The Secretary General chairs the NAC. In his absence, the Deputy Secretary General chairs the meetings. The longest serving ambassador on the Council assumes the title of dean of the Council. Primarily a ceremonial function, the dean may be called upon to play a more specific presiding role, for example in convening meetings and chairing discussions at the time of the selection of a new Secretary General. At ministerial meetings of foreign ministers, one country's foreign minister assumes the role of honorary president. The position rotates annually among members in the order of the English alphabet. </span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The ambassadors sit round the table in order of nationality, following the English alphabetical order. The same procedure is followed throughout the NATO committee structure.</span></p></div><span data-dcnode-id="678" instrument_node="">
</span></div><span data-dcnode-id="675" instrument_node="">
</span></li><span data-dcnode-id="673" instrument_node="">
</span></ul><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span><div class="accordion-wrapper" data-dcnode-id="616"><span data-dcnode-id="668" instrument_node="">
</span><ul class="accordion" data-dcnode-id="618"><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="620"><span data-dcnode-id="666" instrument_node="">
</span><h2 data-dcnode-id="662"><a data-dcnode-id="663" href="#"><span class="icon icon-arrow_accordion" data-dcnode-id="665"></span><span data-dcnode-id="664" instrument_node="">Working procedures</span></a></h2><span data-dcnode-id="661" instrument_node="">
</span><div class="accordion-content" data-dcnode-id="623"><span data-dcnode-id="660" instrument_node="">
</span><div class="inner-content" data-dcnode-id="625"><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">The NAC meets at least every week and often more frequently, at the level of permanent representatives; it meets twice a year at the level of ministers of foreign affairs, three times a year at the level of ministers of defence, and occasionally at the summit level with the participation of heads of state and government. </span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Permanent representatives act on instruction from their capitals, informing and explaining the views and the policy decisions of their governments to their colleagues around the table. Conversely, they report back to their national authorities on the views expressed and positions taken by other governments, informing them of new developments and keeping them abreast of movement toward consensus on important issues or areas where national positions diverge. </span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Each country represented at the Council table or on any of its subordinate committees retains complete sovereignty and responsibility for its own decisions.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="648"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Preparing the Council's work</span></strong></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">The work of the Council is prepared by subordinate committees that are responsible for specific areas of policy. Much of this work involves the Deputies Committee, consisting of Deputy Permanent Representatives.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The Council has an important public profile and issues declarations and communiqués explaining the Alliance's policies and decisions. These documents are normally published after ministerial or summit meetings. The Deputies Committee has particular responsibility for preparing such documents and meets in advance of ministerial meetings to draft the texts for Council approval. The Nuclear Planning Staff Group plays a similar role on behalf of the Nuclear Planning Group. </span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">The Political and Partnerships Committee may handle other aspects of political work. Depending on the topic under discussion, the respective senior committee with responsibility for the subject assumes the leading role in preparing Council meetings and following up on Council decisions.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">When the Council meets at the level of defence ministers, or is dealing with defence matters and questions relating to defence strategy, senior committees such as the Defence Policy and Planning Committee may be involved as principal advisory bodies. If financial matters are on the Council's agenda, the Resource Policy and Planning Board will be responsible to the Council for preparing relevant aspects of its work. </span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Supporting the Council</span></strong></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Direct support to the Council is provided by the Secretary of the Council, who ensures that Council mandates are executed and decisions recorded and circulated. A small Council Secretariat handles the organisational and logistical aspects of the NAC's work, while the relevant divisions of the International Staff support the work of committees reporting to the NAC.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Generally speaking, the entire International Staff at NATO Headquarters supports the work of the Council, either directly or indirectly, and helps to ensure that Council decisions are implemented.</span></p></div><span data-dcnode-id="624" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span></li><span data-dcnode-id="619" instrument_node="">
</span></ul><span data-dcnode-id="617" instrument_node="">
