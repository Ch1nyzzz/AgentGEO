</span><article class="post-2058 page type-page status-publish has-post-thumbnail mv-content-wrapper ast-article-single" data-dcnode-id="273" id="post-2058" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1030" instrument_node="">
</span><header class="entry-header ast-no-thumbnail ast-no-meta" data-dcnode-id="1025"><span data-dcnode-id="1029" instrument_node="">
</span><h1 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">North Atlantic Treaty Organization (NATO)/NATO Map</span></h1><span data-dcnode-id="1026" instrument_node=""> </span></header><span data-dcnode-id="1023" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="276" itemprop="text"><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1015"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">NATO</span></strong><span data-dcnode-id="1019" instrument_node="">, in its full name, is an international military alliance of the “</span><strong data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">North Atlantic Treaty Organization</span></strong><span data-dcnode-id="1016" instrument_node="">“. It was founded on April 4, 1949, based on the North Atlantic Treaty signed by 12 countries. More than 17 countries have joined over the years. </span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1007"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">NATO member states</span></strong><span data-dcnode-id="1011" instrument_node=""> have a common defense mechanism against an attack from any external force. The center of the association is located in Brussels, the </span><a data-dcnode-id="1009" data-id="3669" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/capital-cities/belgium/"><span data-dcnode-id="1010" instrument_node="">capital of Belgium</span></a><span data-dcnode-id="1008" instrument_node="">.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">While 20 countries are part of NATO’s “</span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partnership_for_Peace" rel="noopener" target="_blank"><span data-dcnode-id="1004" instrument_node="">Partnership for Peace</span></a><span data-dcnode-id="1002" instrument_node="">” initiative, 15 other countries take part in ongoing institutionalized dialogue programs. </span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The total military spending of NATO members is more than 70% of the defense spending in the world. The members’ defense spending goal is 2% of the Gross Domestic Product.</span></p><span data-dcnode-id="997" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="992"><a data-dcnode-id="995" data-pgc-sgb-id="sl_0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/11/image-1.jpeg"><img alt="NATO Map" class="wp-image-9075" data-dcnode-id="996" data-pgc-sgb-id="sl_0" height="797" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/11/image-1.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/11/image-1.jpeg 1000w, https://cdn.mappr.co/wp-content/uploads/2021/11/image-1.jpeg?w=300&amp;h=239&amp;scale.option=fill&amp;cw=300&amp;ch=239&amp;cx=center&amp;cy=center 300w, https://cdn.mappr.co/wp-content/uploads/2021/11/image-1.jpeg?w=768&amp;h=612&amp;scale.option=fill&amp;cw=768&amp;ch=612&amp;cx=center&amp;cy=center 768w" title="North Atlantic Treaty Organization (NATO)/NATO Map 1" width="1000"></a><figcaption data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">NATO Map</span></figcaption></figure><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">On the map above, you can see the NATO countries from all over the world. The USA and Canada in North America, and all other members are located on the European continent.</span></p><span data-dcnode-id="988" instrument_node="">
</span><h2 data-dcnode-id="986" id="nato-members-in-europe"><span data-dcnode-id="987" instrument_node="">Nato Members in Europe</span></h2><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">In the below map of Europe, you can see the countries with and without NATO membership:</span></p><span data-dcnode-id="982" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="974"><a data-dcnode-id="980" data-pgc-sgb-id="sl_1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-292.jpeg"><img alt="Nato Members in Europe" class="wp-image-2080" data-dcnode-id="981" data-pgc-sgb-id="sl_1" height="797" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-292.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-292.jpeg 1000w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-292.jpeg?w=300&amp;h=239&amp;scale.option=fill&amp;cw=300&amp;ch=239&amp;cx=center&amp;cy=center 300w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-292.jpeg?w=768&amp;h=612&amp;scale.option=fill&amp;cw=768&amp;ch=612&amp;cx=center&amp;cy=center 768w" title="North Atlantic Treaty Organization (NATO)/NATO Map 2" width="1000"></a><figcaption data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">NATO members in Europe. </span><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Please note</span></strong><span data-dcnode-id="976" instrument_node="">: this map is from 2016. Montenegro joined in 2017 and North Macedonia joined in 2020.</span></figcaption></figure><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="970"><strong data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Current NATO members in Europe:</span></strong></p><span data-dcnode-id="969" instrument_node="">
</span><ol data-dcnode-id="912"><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Albania</span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Belgium</span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Bulgaria</span></li><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Croatia</span></li><li data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The Czech Republic</span></li><li data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Denmark</span></li><li data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Estonia</span></li><li data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">France</span></li><li data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Germany</span></li><li data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Greece</span></li><li data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Hungary</span></li><li data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Iceland</span></li><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Italy</span></li><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Latvia</span></li><li data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Lithuania</span></li><li data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Luxembourg</span></li><li data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Montenegro</span></li><li data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">Netherlands</span></li><li data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">North Macedonia</span></li><li data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Norway</span></li><li data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Poland</span></li><li data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Portugal</span></li><li data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Romania</span></li><li data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Slovakia</span></li><li data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Slovenia</span></li><li data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Spain</span></li><li data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Turkey</span></li><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The United Kingdom</span></li></ol><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Austria, Belarus, Bosnia and Herzegovina, Finland, Ireland, Kosovo, Moldova, Serbia, Sweden, Switzerland, and Ukraine are not NATO members.</span></p><span data-dcnode-id="908" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="901"><a data-dcnode-id="906" data-pgc-sgb-id="sl_2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 1" class="wp-image-10730" data-dcnode-id="907" data-pgc-sgb-id="sl_2" height="1024" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2022/03/nato-expansion-map-1024x1024.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg?w=1024&amp;h=1024&amp;scale.option=fill&amp;cw=1024&amp;ch=1024&amp;cx=center&amp;cy=center 1024w, https://cdn.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg?w=300&amp;h=300&amp;scale.option=fill&amp;cw=300&amp;ch=300&amp;cx=center&amp;cy=center 300w, https://cdn.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg?w=150&amp;h=150&amp;scale.option=fill&amp;cw=150&amp;ch=150&amp;cx=center&amp;cy=center 150w, https://cdn.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg?w=768&amp;h=768&amp;scale.option=fill&amp;cw=768&amp;ch=768&amp;cx=center&amp;cy=center 768w, https://cdn.mappr.co/wp-content/uploads/2022/03/nato-expansion-map.jpeg 1200w" title="North Atlantic Treaty Organization (NATO)/NATO Map 3" width="1024"></a><figcaption data-dcnode-id="902"><span data-dcnode-id="905" instrument_node="">How NATO Expanded Eastwards. Source: </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.statista.com/chart/26674/european-countries-by-year-of-joining-nato/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="904" instrument_node="">Statista</span></a></figcaption></figure><span data-dcnode-id="900" instrument_node="">
</span><h2 data-dcnode-id="898" id="nato-non-members-in-europe"><span data-dcnode-id="899" instrument_node="">NATO Non-Members in Europe</span></h2><span data-dcnode-id="897" instrument_node="">
</span><ul data-dcnode-id="849"><li data-dcnode-id="893"><strong data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Austria: </span></strong><span data-dcnode-id="894" instrument_node="">A country with a Permanent Nongovernmental Policy.</span></li><li data-dcnode-id="889"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Belarus: </span></strong><span data-dcnode-id="890" instrument_node="">At the same time, this country, called Small Russia, is not a NATO member due to its proximity to Russia. The foundations of NATO are based on Russian antagonism.</span></li><li data-dcnode-id="885"><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Bosnia and Herzegovina: </span></strong><span data-dcnode-id="886" instrument_node="">Serbian Member of the Bosnian Herzegovina Council; Bosnia and Herzegovina’s accession to NATO, the three founding elements of the country, Bosniak, Serbs, and Croats that there was no compromise, said for a long time.</span></li><li data-dcnode-id="881"><strong data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Finland: </span></strong><span data-dcnode-id="882" instrument_node="">Finland is not a member of the NATO union because of its proximity to Russia and the fact that Sweden is not a NATO member.</span></li><li data-dcnode-id="877"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Ireland: </span></strong><span data-dcnode-id="878" instrument_node="">Ireland is not a member of NATO, but Ireland has been a partner of NATO since the 1990s.</span></li><li data-dcnode-id="870"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Kosovo: </span></strong><span data-dcnode-id="874" instrument_node="">In 2017, Kosovo Prime Minister Haradinaj said, “We aim to finalize NATO membership by 2020.” said. Read more about the </span><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/thematic-maps/international-recognition-of-kosovo/"><span data-dcnode-id="873" instrument_node="">international recognition of Kosovo</span></a><span data-dcnode-id="871" instrument_node="">.</span></li><li data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Moldova: </span></strong><span data-dcnode-id="867" instrument_node="">Moldova President Igor Dodon said it was absolutely unacceptable for his country to be a NATO member. This is why they do not want to deteriorate their relations with Russia.</span></li><li data-dcnode-id="862"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Serbia: </span></strong><span data-dcnode-id="863" instrument_node="">Serbia’s Foreign Minister Ivica Dacic has said Serbia is not planning to join the sanctions imposed by the EU on Russia and become a NATO member.</span></li><li data-dcnode-id="858"><strong data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Sweden: </span></strong><span data-dcnode-id="859" instrument_node="">It is a country advancing with the neutrality principle. Although it is not a NATO member, it is NATO’s partner.</span></li><li data-dcnode-id="854"><strong data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Switzerland: </span></strong><span data-dcnode-id="855" instrument_node="">A country with a Permanent Neutrality Policy.</span></li><li data-dcnode-id="850"><strong data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Ukraine: </span></strong><span data-dcnode-id="851" instrument_node="">In June 2017, Ukraine continues its steps towards integration into the West. Furthermore, the Ukrainian Parliament has adopted a law that allows the country to become a member of NATO.</span></li></ul><span data-dcnode-id="848" instrument_node="">
</span><h2 data-dcnode-id="846" id="more-about-nato"><span data-dcnode-id="847" instrument_node="">More about NATO</span></h2><span data-dcnode-id="845" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="843"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 2" class="wp-image-2059" data-dcnode-id="844" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-271.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-271.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-271.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 4" width="580"></figure><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">There have been periodic disagreements among NATO members, and as a result, there has been a problem of trust. The Cold War process led to conflicts with the members of the Warsaw Pact. </span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">The foundation date of the </span><a data-dcnode-id="836" data-id="2701" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/historical-maps/warsaw-pact-members/"><span data-dcnode-id="837" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="835" instrument_node=""> is 1955. The doubts over the strength of the relations between European countries and the United States have increased from time to time. There have been doubts about the credibility of NATO’s defense against a possible Soviet occupation, which led to the withdrawal of France from NATO’s military wing in 1966.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">After the fall of the Berlin Wall in 1989, the organization was involved in the disintegration of Yugoslavia and its first military interventions in 1992-1995 in Bosnia and Herzegovina and then in 1999 in Yugoslavia. </span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Politically, the NATO set out to establish a good relationship with the former Warsaw Pact countries. In fact, some of these countries joined the alliance in 1999 and 2004.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h2 data-dcnode-id="825" id="similar-unions"><span data-dcnode-id="826" instrument_node="">Similar Unions</span></h2><span data-dcnode-id="824" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="822"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 3" class="wp-image-2060" data-dcnode-id="823" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-272.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-272.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-272.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 5" width="580"></figure><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="817"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Shanghai Five</span></strong><span data-dcnode-id="818" instrument_node="">: In 1996, a union was established in Shanghai, with the participation of “Russia, Kazakhstan, Kyrgyzstan, China, and Tajikistan”, foreseeing a deep cooperation in the field of regional security called “Shanghai Five”. </span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">Also in 2001, Uzbekistan joined this formation and changed its name to “</span><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Shanghai Cooperation Organization</span></strong><span data-dcnode-id="812" instrument_node="">”. The formation, from predominantly in the 2000s, has shown a stern attitude to the military presence in the territories of the United States and has opposed the “unipolar world order”.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="803"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Arab League</span></strong><span data-dcnode-id="807" instrument_node="">: The </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/thematic-maps/arab-league-members/"><span data-dcnode-id="806" instrument_node="">Arab League</span></a><span data-dcnode-id="804" instrument_node=""> is an international organization in which 22 Arab countries are members. Furthermore, the first alliance between Arab countries occurred between Iraq and Saudi Arabia in 1936. The Alexandrian Protocol signed in 1944 laid the foundations of the Arab League. </span></p><span data-dcnode-id="802" instrument_node="">
</span><h2 data-dcnode-id="800" id="history-of-nato"><span data-dcnode-id="801" instrument_node="">History of NATO</span></h2><span data-dcnode-id="799" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="797"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 4" class="wp-image-2061" data-dcnode-id="798" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-273.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-273.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-273.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 6" width="580"></figure><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="795" instrument_node="">NATO was born in 1949 with the North Atlantic Treaty, where 12 countries came together and agreed to the conditions for non-aggression and cooperation. This military alliance expanded by 18 countries over time. As of March 2022, </span><strong data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">the NATO consists of 30 countries</span></strong><span data-dcnode-id="792" instrument_node=""> (28 from Europe and 2 from North America).</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">The main aim of the organization is to ensure that the participating countries have the right to form an alliance in an attack against them. In addition, each member country is being assured of non-aggression against each other. </span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">The center of the union is located in Brussels, the capital of Belgium. NATO member states have to pay special attention to defense spending. The total expenditure of NATO member states is 70% higher than the defense spending of all states in the world.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">As an organization, the NATO did not go beyond the promises of the member states under the political and treaty conditions. These political partnerships were motivated by two US ranking commanders during the Korean War, when a common military force was created and gained a military identity. </span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">During the Cold War era and the membership of the Warsaw Pact, which was established in 1955, the member states were in great competition. These controversies subsequently led to doubts among the member countries. How much would the US support NATO? Or, how could the organization be able to carry out an active policy against the Soviet threat after France withdrew from NATO’s military wing in 1966?</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">After the fall of the Berlin Wall and the breakup of Yugoslavia in 1989, the organization dragged it into a major European civil war. In this internal turmoil, the organization had to use its power of military intervention in Bosnia and Herzegovina and in Yugoslavia in 1992-1995.</span></p><span data-dcnode-id="775" instrument_node="">
</span><h3 data-dcnode-id="773" id="nato-and-soviet-threat"><span data-dcnode-id="774" instrument_node="">Nato and Soviet Threat</span></h3><span data-dcnode-id="772" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="770"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 5" class="wp-image-2062" data-dcnode-id="771" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-274.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-274.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-274.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 7" width="580"></figure><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The founding text of the organization is the Brussels Treaty, an alliance agreement between Belgium, the United Kingdom, France, the Netherlands, and Luxembourg on 17 March 1948. This unification became a source of inspiration for Europe, and the Western European Union was established during the siege of the Soviets in Berlin. </span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">But in order for this defensive unit to be successful, both the military authority and the support of the US to prevent the formation of a nationalist character had become necessary. With this initiative, </span><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">the North Atlantic Treaty was signed in Washington DC on April 4, 1949</span></strong><span data-dcnode-id="762" instrument_node=""> and a cooperation was established in the field of defense and cooperation.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">In addition to the five countries involved in the Treaty of Brussels the United States, Denmark, Italy, Iceland, Canada, Norway, and Portugal, signed the North Atlantic treaty. </span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">In 1949, Lord Ismay, the first NATO Secretary General of the period, outlined the organization’s tasks as follows:</span></p><span data-dcnode-id="754" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="749"><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">The purpose of the Alliance was to keep the Soviet Union out, the Americans in, and the Germans down. </span></p><cite data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Lord Hastings Lionel Ismay, NATO’s first Secretary General</span></cite></blockquote><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Although countries have signed the treaty in political terms, some people have opposed the alliance. In Iceland, for example, a group of people joined the supporters of neutrality.</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">This treaty text represents the notion of Atlanticism and the idea of a cooperation and alliance between North America and Europe.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h3 data-dcnode-id="740" id="the-content-of-the-treaty"><span data-dcnode-id="741" instrument_node="">The content of the Treaty</span></h3><span data-dcnode-id="739" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="737"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 6" class="wp-image-2063" data-dcnode-id="738" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-275.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-275.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-275.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 8" width="580"></figure><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">In the context of the agreement, the military cooperation of the member countries has attracted attention. Because in case of an attack on the member countries, the other member countries will recognize the attacking country as a common enemy and impose sanctions. </span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">This sanction may be in the form of a union or direct participation in the military intervention. The same cooperation will also apply to the protection of the North Atlantic region. This does not mean that the organization is an attack unit. On the contrary, the nature and formation of the attack is a long time. Because the aggressive country will be warned first and military assistance will be given to the allied country.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">NATO has had a great impact on member states’ weapon terminology, inventories and military strategies. Because the European countries participating in the organization and especially the USA are very specialized in this regard.</span></p><span data-dcnode-id="727" instrument_node="">
</span><h3 data-dcnode-id="725" id="cold-war-era-and-nato-interventions"><span data-dcnode-id="726" instrument_node="">Cold War Era and NATO Interventions</span></h3><span data-dcnode-id="724" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="722"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 7" class="wp-image-2064" data-dcnode-id="723" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-276.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-276.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-276.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 9" width="580"></figure><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">In the 1950s, with the increasing threat of the Communist countries between the countries and the Korean War in the same period, the organization started to adopt a military intervention. Supreme Headquarters Allied Powers Europe (SHAPE) was established under the roof of the military intervention, and in January 1951 Dwight Eisenhower, the high-ranking commander, started his first work. Then, the idea of increasing the number of divisions to 96 in terms of having a long-term defense plan during the 1952 Lisbon Conference came up. But the proposal was rejected the following year. Instead, they decided to establish 35 divisions supported by nuclear weapons.</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">In the 1950s, NATO had 15 divisions in Central Europe and 10 in Italy and Scandinavia. In 1952 there was another development. The rank of Secretary General of NATO, the highest rank of the organization, was created and Hastings Ismay was appointed to this position. After this period, the organization has made a trial against a possible enemy attack by doing exercises and also showed a host of enemy countries with such exercises. Some of these exercises include:</span></p><span data-dcnode-id="715" instrument_node="">
</span><ul data-dcnode-id="694"><li data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Exercise Mainbrace</span></strong><span data-dcnode-id="712" instrument_node=""> – was made for the defense of Denmark and Norway with 200 ships and 50,000 soldiers.</span></li><li data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Exercise Grand Slam and Longstep</span></strong><span data-dcnode-id="708" instrument_node=""> – Sea and amphibious forces in the Mediterranean.</span></li><li data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Italic Weld</span></strong><span data-dcnode-id="704" instrument_node=""> – coordinated with air-sea-land elements in Northern Italy.</span></li><li data-dcnode-id="699"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Grand Repulse</span></strong><span data-dcnode-id="700" instrument_node=""> – British Army of the Rhine (BAOR), Dutch Corps and Allied Air Forces Central Europe (AAFCE).</span></li><li data-dcnode-id="695"><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Weldfast</span></strong><span data-dcnode-id="696" instrument_node=""> – USA, United Kingdom, Italy, Turkey and Greece with the participation of elements of the sea and the Mediterranean focused landings trial is held.</span></li></ul><span data-dcnode-id="693" instrument_node="">
</span><h3 data-dcnode-id="691" id="greece-and-turkey-joins-nato"><span data-dcnode-id="692" instrument_node="">Greece and Turkey Joins NATO</span></h3><span data-dcnode-id="690" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="688"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 8" class="wp-image-2065" data-dcnode-id="689" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-277.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-277.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-277.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 10" width="580"></figure><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Following the incorporation into the Organization in 1952, Turkey and Greece were left in suspense on how to ensure the use of the military in these countries. These debates were particularly moving towards a distinct crossroads between the United Kingdom and the United States. While these debates were under way, Operation Gladio and the secret protocols of “stay-behind” arrangements, which were prepared and hidden by the European Union for the continuation of the continent’s war after a possible Soviet occupation, were controlled by NATO.</span></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">After this process, NATO, in its military competitions, was actually discussing the combat capabilities and military capabilities of some member countries. NATO has begun to organize competitions to measure military capabilities. Maroon Berets, the Turkish Special Forces, won the first place in the International Special Forces Competition in 2004, which was attended by 25 military teams from eight countries. When Maroon Berets won these competitions 4 times in a row, NATO canceled the 5th year.</span></p><span data-dcnode-id="681" instrument_node="">
</span><h3 data-dcnode-id="679" id="soviet-proposal"><span data-dcnode-id="680" instrument_node="">Soviet Proposal</span></h3><span data-dcnode-id="678" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="676"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 9" class="wp-image-2066" data-dcnode-id="677" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-278.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-278.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-278.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 11" width="580"></figure><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">In 1954, a surprising offer came from the Soviets. A year after Stalin’s dead, the Soviets made some intents to join the NATO to keep Germany in check. Not very surprisingly the NATO members states rejected the request and two years later, in 1955, West Germany joined the organization.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">The decision to bind with Germany was a decisive turning point in the history of the continent. The Norwegian Foreign Minister Halvard Lange said:</span></p><span data-dcnode-id="669" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="664"><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">… one should not risk repeating the mistakes of the First World War, […] the only way to help create a democratic and cooperative Germany was to take them into cooperation.</span></p><cite data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Halvard M. Lange, Minister of Foreign Affairs, Norway,</span></cite></blockquote><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">The Soviet Union, with a decision dated May 14, 1955, founded the </span><a data-dcnode-id="660" data-id="2701" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/historical-maps/warsaw-pact-members/"><span data-dcnode-id="661" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="659" instrument_node=""> attended by Hungary, Czechoslovakia, Poland, Bulgaria, Romania, Albania, and East Germany. Even if there was no clear attack, the efforts of the two unions to continue their armaments and demonstrations would continue. In this way, a power imbalance has identified both sides of the Cold War era.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">According to the logic of Cold War, the main purpose was to be a deterrent force by showing the forces in exercises. In 1957, in an area from Norway to Turkey, the NATO conducted the </span><em data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Operation Strikeback</span></em><span data-dcnode-id="653" instrument_node=""> with 300 ships, 1500 aircraft, and 250,000 man to show the strength of the NATO. </span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">In the same year of 1957 the NATO performed two more operations: the </span><em data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Operation Counter Punch</span></em><span data-dcnode-id="647" instrument_node=""> and the </span><em data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Operation Deep Water</span></em><span data-dcnode-id="644" instrument_node="">.</span></p><span data-dcnode-id="642" instrument_node="">
</span><h3 data-dcnode-id="640" id="relations-between-nato-and-france-and-separation-of-the-country-from-the-military-wing"><span data-dcnode-id="641" instrument_node="">Relations Between NATO and France and Separation of the Country From the Military Wing</span></h3><span data-dcnode-id="639" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="637"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 10" class="wp-image-2067" data-dcnode-id="638" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-279.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-279.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-279.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 12" width="580"></figure><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">France has suffered a great deal in the early years of the union. A period of long-standing relations had led France to take an attitude. France was at first opposed to the US being the first power in the organization and an alliance with Britain.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Following this, US President Dwight D. Eisenhower and British Prime Minister Harold Macmillan, on 17 September 1958, proposed that France be admitted to a tripartite structure equivalent to them. When a satisfactory situation did not arise in the face of this proposal (Memorandum), France began to form its own independent troops.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Military segregation continued in February 1959 when France separated its naval elements from NATO forces in the Mediterranean. Later, alienated from the military wing, de Gaulle prevented the deployment of foreign countries’ nuclear weapons in his country. The most affected state was the US. After the decision to purge foreign agents, the US was obliged to remove 200 military aircraft from the country and to deliver military-owned airports from 1950 to the French in 1967.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h3 data-dcnode-id="625" id="independent-defense-thought-of-france"><span data-dcnode-id="626" instrument_node="">Independent Defense Thought of France</span></h3><span data-dcnode-id="624" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="622"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 11" class="wp-image-2068" data-dcnode-id="623" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-280.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-280.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-280.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 13" width="580"></figure><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">France has defended its idea of independent defense by withdrawing its NATO fleet from the Atlantic Ocean and the English Channel. However, during the Cuban missile crisis that erupted in 1962 when Cuba received missiles from the Soviet Union, de Gaulle acted in a spirit of solidarity with NATO. By 1966, France was completely withdrawn from NATO’s military wing and warned NATO forces in the country to leave the country.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Now the organization had to comply with this decision of France, and on October 16, 1967, Supreme Headquarters removed Allan Powers Europe from Rocquencourt’s position near Paris and moved to Casteau north of Mons, in Belgium. The separation of France from military sanctions does not mean that it has left the membership. The country’s membership continued and contributed to the defense of European territory in the event of an attack against the German Federal Republic.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">In this case, members of the Warsaw Pact were happy with France’s decision to disarm. But it didn’t take too long to break through this vulnerable environment. It is evident that it provides a suitable environment for changing situations in favor of the parties with secret protocols during the Cold War period. This is exactly what happened on the French front. In the historical literature, with the secret protocols known as Lemnitzer-Ailleret, the United States made a kind of negotiation of how France would contribute to the military in a possible attack.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h3 data-dcnode-id="610" id="relations-between-the-warsaw-pact-and-nato"><span data-dcnode-id="611" instrument_node="">Relations between the Warsaw Pact and NATO</span></h3><span data-dcnode-id="609" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="607"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 12" class="wp-image-2069" data-dcnode-id="608" height="797" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-281.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-281.jpeg 1000w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-281.jpeg?w=300&amp;h=239&amp;scale.option=fill&amp;cw=300&amp;ch=239&amp;cx=center&amp;cy=center 300w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-281.jpeg?w=768&amp;h=612&amp;scale.option=fill&amp;cw=768&amp;ch=612&amp;cx=center&amp;cy=center 768w" title="North Atlantic Treaty Organization (NATO)/NATO Map 14" width="1000"></figure><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="605" instrument_node="">During the Cold War period, the </span><a data-dcnode-id="603" data-id="1588" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/historical-maps/soviet-union-ussr/"><span data-dcnode-id="604" instrument_node="">Soviet Union</span></a><span data-dcnode-id="602" instrument_node=""> and the Warsaw Pact members, who were the co-operatives, were arrested for the absence of an attack on European soil. In July 1968, member states agreed to take preventive measures against nuclear weapons.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">After the Warsaw Pact, the </span><a data-dcnode-id="597" data-id="8496" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/thematic-maps/countries-with-nuclear-weapons/"><span data-dcnode-id="598" instrument_node="">capacity of nuclear weapons</span></a><span data-dcnode-id="596" instrument_node=""> on the European continent increased. NATO received Pershing II nuclear weapons with GLCM cruise missiles by the US, deployed in Europe on December 12, 1979, approval. </span></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">This policy of disarmament, as well as the deployment of nuclear weapons on European soil, was a Bi-Directional policy in political jargon. But on the other hand, there was an armed movement. During the period 1983-1984, the Warsaw Pact members were ordered to fire the Pershing missiles if an attack by NATO would happen. This would take place by the deployment of SS-20 medium-range missiles on European soil. European public didn’t welcome these mutual armaments.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">The expansion of the organization within this war environment also came to a halt. In 1974, Turkey launched a campaign to Cyprus, Greece decided to withdraw from NATO’s military wing. Greece returned to the military wing after the parties declared a peace in 1980 again. Moreover, during the Falklands War between the United Kingdom and Argentina, NATO members were not in this war.</span></p><span data-dcnode-id="588" instrument_node="">
</span><h3 data-dcnode-id="586" id="post-cold-war-nato-policies"><span data-dcnode-id="587" instrument_node="">Post-Cold War NATO Policies</span></h3><span data-dcnode-id="585" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="583"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 13" class="wp-image-2070" data-dcnode-id="584" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-282.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-282.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-282.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 15" width="580"></figure><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">After the </span><strong data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Warsaw Pact broke out in 1991</span></strong><span data-dcnode-id="578" instrument_node="">, the biggest obstacle to NATO ended. The dissolution of this enemy made it necessary for the organization to make changes in new targets, new policies, and duties in the European continent. </span></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">This change between countries began with an attempt to alleviate military armaments and military deployments in the Soviet Union in Paris. At that time, NATO’s focus was on military defense and military spending rose to 34%. But by 2012, they reduced these military expenditures to 21%. After this period, NATO directed its military and military interventions to peaceful and humanitarian purposes.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">After the Cold War, NATO won a great alliance with Germany’s unification. East Germany and West Germany were finally united. To avoid a possible Russian objection, NATO offered a guarantee that they would not deploy foreign troops and nuclear weapons in the eastern region.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568" id="nato-reduces-military-power"><span data-dcnode-id="569" instrument_node="">NATO Reduces Military Power</span></h3><span data-dcnode-id="567" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="565"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 14" class="wp-image-2071" data-dcnode-id="566" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-283.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-283.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-283.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 16" width="580"></figure><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="563" instrument_node="">At the end of the Cold War, they reduced NATO’s military wing. Because in this war-free environment the organization had to obey the conjuncture. In this context, they revised the military units and created new forces in the form of the </span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">European Allied Command Emergency Response Corps</span></strong><span data-dcnode-id="560" instrument_node="">. </span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">After the collapse of the Soviet Union, the organization has made even more significant changes and in 1999. Nicolas Sarkozy, the French President, made a great contribution to France’s return to the military wing of the organization. With the decision of April 4, 2009, the country gained full membership in NATO relations and maintained its attitude towards nuclear disarmament.</span></p><span data-dcnode-id="555" instrument_node="">
</span><h3 data-dcnode-id="553" id="nato-s-enlargement-policies-after-1994"><span data-dcnode-id="554" instrument_node="">NATO’s Enlargement Policies After 1994</span></h3><span data-dcnode-id="552" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="550"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 15" class="wp-image-2072" data-dcnode-id="551" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-284.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-284.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-284.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 17" width="580"></figure><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">In 1994 and 1997, NATO tried to consolidate its coordination and cooperation with the forums it established. They further strengthened these regional development efforts by more comprehensive efforts such as Partnership for Peace, Mediterranean Dialogue and Euro-Atlantic Partnership Council. </span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">In 1998, with the idea of the creation of a Permanent Joint Council with Russia, the organization became stronger.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="542" instrument_node="">On July 8, 1997, the </span><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Czechs</span></strong><span data-dcnode-id="539" instrument_node="">, formerly a Soviet subordinate, won the status of a member state of the organization in 1999 with the invitation of NATO. </span><strong data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Bulgaria, Estonia, Latvia, Lithuania, Romania, Slovakia and Slovenia</span></strong><span data-dcnode-id="536" instrument_node="">, which later became members of the organization, enhanced this large turnout. </span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">The membership applications of the six countries were first during the 2002 Prague Summit. NATO approved these applications shortly before the Istanbul Summit on March 29, 2004. At the summit in Istanbul, the organization launched a new study called the Istanbul Cooperation Initiative (ICI) with four countries on the Persian Gulf coast.</span></p><span data-dcnode-id="531" instrument_node="">
</span><h3 data-dcnode-id="529" id="nato-s-military-operations"><span data-dcnode-id="530" instrument_node="">NATO’s Military Operations</span></h3><span data-dcnode-id="528" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="526"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 16" class="wp-image-2073" data-dcnode-id="527" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-285.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-285.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-285.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 18" width="580"></figure><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">During the Cold War period, the organization never attempted military operations. But after the Cold War ended, the first operation was in the 1990-1991 period with the invasion of Iraq by Kuwait.</span></p><span data-dcnode-id="522" instrument_node="">
</span><ol data-dcnode-id="509"><li data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Intervention in Bosnia and Herzegovina</span></li><li data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Kosovo Intervention</span></li><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Afghanistan Intervention</span></li><li data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">NATO’s Mission to Iraq</span></li><li data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Anti-piracy in the Gulf of Aden by NATO</span></li><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">NATO’s Libyan Intervention</span></li></ol><span data-dcnode-id="508" instrument_node="">
</span><h3 data-dcnode-id="506" id="nato-s-enlargement-policy"><span data-dcnode-id="507" instrument_node="">Nato’s Enlargement Policy</span></h3><span data-dcnode-id="505" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="503"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 17" class="wp-image-2074" data-dcnode-id="504" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-286.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-286.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-286.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 19" width="580"></figure><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="501" instrument_node="">Recent members to join the NATO were post-member states of the Warsaw Pact in the Baltic Sea (Estonia, Lithuania, Latvia joined in 2004) or in the </span><a data-dcnode-id="499" data-id="1779" data-type="page" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/thematic-maps/balkan-countries-map/"><span data-dcnode-id="500" instrument_node="">Balkan Region</span></a><span data-dcnode-id="498" instrument_node=""> (Slovenia and Romania also joined in 2004).</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="495" instrument_node="">Albania and Croatia fulfilled the requirements of membership, and both countries joined NATO in 2009. </span><strong data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">The most recent countries joining the NATO was Montenegro (2017) and North Macedonia (2020)</span></strong><span data-dcnode-id="492" instrument_node="">.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">For the approval of the membership of these countries, NATO arranged a Membership Action Plans. The membership of Bosnia and Herzegovina, which want to join NATO, is still being discussed.</span></p><span data-dcnode-id="487" instrument_node="">
</span><h3 data-dcnode-id="485" id="nato-s-external-links"><span data-dcnode-id="486" instrument_node="">Nato’s External Links</span></h3><span data-dcnode-id="484" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="482"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 18" class="wp-image-2075" data-dcnode-id="483" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-287.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-287.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-287.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 20" width="580"></figure><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">The first initiative of the organization in foreign relations was under the name Partnership for Peace. This partnership, which was launched in 1994, was built on the member countries’ relations with NATO. </span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="477" instrument_node="">Furthermore, countries that are part of the </span><em data-dcnode-id="474"><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sto.nato.int/Pages/partnership-for-peace.aspx" rel="noopener" target="_blank"><span data-dcnode-id="476" instrument_node="">Partnership for Peace platform</span></a></em><span data-dcnode-id="473" instrument_node=""> are all old and new states that are members of the Commonwealth of Independent States. In addition, NATO merged with European states on 29 May 1997 to form a partnership council (Euro-Atlantic Partnership Council).</span></p><span data-dcnode-id="471" instrument_node="">
</span><h2 data-dcnode-id="469" id="structural-characteristics-of-nato"><span data-dcnode-id="470" instrument_node="">Structural Characteristics of NATO</span></h2><span data-dcnode-id="468" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="466"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 19" class="wp-image-2076" data-dcnode-id="467" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-288.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-288.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-288.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 21" width="580"></figure><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Employees in the center of the organization are national delegates of the member states. These include:</span></p><span data-dcnode-id="462" instrument_node="">
</span><ul data-dcnode-id="453"><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">civil and military representatives</span></li><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">diplomats guiding the diplomatic relations of the member states</span></li><li data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">members of the armed forces of the member states</span></li><li data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">international staff and military personnel</span></li></ul><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">In addition, there are non-governmental organizations in parallel with the Atlantic Council / Atlantic Treaty Association.</span></p><span data-dcnode-id="449" instrument_node="">
</span><h2 data-dcnode-id="447" id="nato-council-and-meetings"><span data-dcnode-id="448" instrument_node="">NATO Council and Meetings</span></h2><span data-dcnode-id="446" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="444"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 20" class="wp-image-2077" data-dcnode-id="445" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-289.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-289.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-289.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 22" width="580"></figure><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">NATO’s decisions are according to the provisions of the North Atlantic Treaty in the meetings of 28 members. In this structure, each member country must send a delegate and a mission to Brussels, which is the NATO center. Delegates sent by countries are usually ambassadors under high civil servant status. Most Member States have a mission to manage diplomatic relations at the headquarters in Berlin.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">The North Atlantic Council meet once a week by permanent members. Furthermore, it is the most effective unit of the organization, including decision and management powers. </span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">In some crises, the Council convenes at critical summits gathered by the countries’ Foreign Ministers, Defense Ministers, and the top executives of the state. In these critical meetings, they reached a common decision on NATO-related issues. However, the status of those attending the meeting cannot limit the council’s decision-making and management powers in any way. In addition to these meetings, they discuss the enlargement policies of the organization at the NATO Summits.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">The presidency of North Atlantic Council belongs to Secretary General of NATO. Their main objective is to reach an agreement on unanimity and common thought in the decisions taken. There is no vote or decision in this council. None of the members participating in the council and its subcommittees has the right to lose their independence or to lose their obligation.</span></p><span data-dcnode-id="431" instrument_node="">
</span><h2 data-dcnode-id="429" id="nato-parliamentary-assembly-nato-pa"><span data-dcnode-id="430" instrument_node="">NATO Parliamentary Assembly (NATO-PA)</span></h2><span data-dcnode-id="428" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="426"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 21" class="wp-image-2078" data-dcnode-id="427" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-290.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-290.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-290.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 23" width="580"></figure><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Parliamentary Assembly determines the most important strategic objectives of the organization. The unit meets on an annual basis and tries to communicate directly with the parliamentary structures of the members of the organization or the members who have appointed ambassadors for relations with NATO. </span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">The NATO Parliamentary Assembly consists of the legislators of the members of the North Atlantic Treaty Organization and 13 substitute members. NATO Parliamentary Assembly is essentially a structure different from NATO.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">The structure collects members to discuss security policies set by the NATO Council. In fact, it is a political and diplomatic consultant of the Assembly. Mutual communication and interaction of institutions and members are vital for the organization. This interaction with the political mission follows the reports of five committees for the NATO Council’s political policies and strategies.</span></p><span data-dcnode-id="416" instrument_node="">
</span><h3 data-dcnode-id="414" id="the-five-committees-of-nato"><span data-dcnode-id="415" instrument_node="">The Five Committees of NATO</span></h3><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The five committees of NATO are:</span></p><span data-dcnode-id="410" instrument_node="">
</span><ol data-dcnode-id="399"><li data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Committee on the Civil Dimension of Security</span></li><li data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">Defense and Security Committee</span></li><li data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Economics and Security Committee</span></li><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Political Committee</span></li><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Science and Technology Committee</span></li></ol><span data-dcnode-id="398" instrument_node="">
</span><h2 data-dcnode-id="396" id="nato-s-military-structure-and-unions"><span data-dcnode-id="397" instrument_node="">NATO’s Military Structure and Unions</span></h2><span data-dcnode-id="395" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="393"><img alt="North Atlantic Treaty Organization (NATO)/NATO Map 22" class="wp-image-2079" data-dcnode-id="394" height="375" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mappr.co/wp-content/uploads/2021/01/image-291.jpeg&amp;raw" srcset="https://cdn.mappr.co/wp-content/uploads/2021/01/image-291.jpeg 580w, https://cdn.mappr.co/wp-content/uploads/2021/01/image-291.jpeg?w=300&amp;h=194&amp;scale.option=fill&amp;cw=300&amp;ch=194&amp;cx=center&amp;cy=center 300w" title="North Atlantic Treaty Organization (NATO)/NATO Map 24" width="580"></figure><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">NATO Military Committee commands the military interventions of the organization. The military units of the organization consist of two Strategic Union, led by a senior officer from the United States and a senior French officer. The commanders who are at the head of the unions are responsible for the military committee of all military operations.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">The military wing contains a military representative representing the member states and a senior officer from the armed forces supported by International Military Staff. </span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Military representatives are sent by the member states have set up the Military Committee. The main task of the Committee is to direct the military policies of the organization. </span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Furthermore, to provide opinions on these issues. The committee also provides guidance to the Strategic Commanders who take part in NATO alliances and who are active in the military wing of the organization.</span></p><span data-dcnode-id="380" instrument_node="">
