</span><meta content="International organizations (IOs) experience significant variation in their decision-making performance, or the extent to which they produce policy output. While some IOs are efficient decision-making machineries, others are plagued by deadlock. How can such variation be explained? Examining this question, the article makes three central contributions. First, we approach performance by looking at IO decision-making in terms of policy output and introduce an original measure of decision-making performance that captures annual growth rates in IO output. Second, we offer a novel theoretical explanation for decision-making performance. This account highlights the role of institutional design, pointing to how majoritarian decision rules, delegation of authority to supranational institutions, and access for transnational actors (TNAs) interact to affect decision-making. Third, we offer the first comparative assessment of the decision-making performance of IOs. While previous literature addresses single IOs, we explore decision-making across a broad spectrum of 30 IOs from 1980 to 2011. Our analysis indicates that IO decision-making performance varies across and within IOs. We find broad support for our theoretical account, showing the combined effect of institutional design features in shaping decision-making performance. Notably, TNA access has a positive effect on decision-making performance when pooling is greater, and delegation has a positive effect when TNA access is higher. We also find that pooling has an independent, positive effect on decision-making performance. All-in-all, these findings suggest that the institutional design of IOs matters for their decision-making performance, primarily in more complex ways than expected in earlier research." data-dcnode-id="4570" name="dc.description"><span data-dcnode-id="4569" instrument_node="">

</span><meta content="Decision-making in international organizations: institutional design and performance - The Review of International Organizations" data-dcnode-id="4312" property="og:title"><span data-dcnode-id="4311" instrument_node="">
</span><meta content="International organizations (IOs) experience significant variation in their decision-making performance, or the extent to which they produce policy output. While some IOs are efficient decision-making machineries, others are plagued by deadlock. How can such variation be explained? Examining this question, the article makes three central contributions. First, we approach performance by looking at IO decision-making in terms of policy output and introduce an original measure of decision-making performance that captures annual growth rates in IO output. Second, we offer a novel theoretical explanation for decision-making performance. This account highlights the role of institutional design, pointing to how majoritarian decision rules, delegation of authority to supranational institutions, and access for transnational actors (TNAs) interact to affect decision-making. Third, we offer the first comparative assessment of the decision-making performance of IOs. While previous literature addresses single IOs, we explore decision-making across a broad spectrum of 30 IOs from 1980 to 2011. Our analysis indicates that IO decision-making performance varies across and within IOs. We find broad support for our theoretical account, showing the combined effect of institutional design features in shaping decision-making performance. Notably, TNA access has a positive effect on decision-making performance when pooling is greater, and delegation has a positive effect when TNA access is higher. We also find that pooling has an independent, positive effect on decision-making performance. All-in-all, these findings suggest that the institutional design of IOs matters for their decision-making performance, primarily in more complex ways than expected in earlier research." data-dcnode-id="4310" property="og:description"><span data-dcnode-id="4309" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="1256" data-track-component="article body"><span data-dcnode-id="3859" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="3852" data-gtm-vis-first-on-screen-50443292_562="744" data-gtm-vis-first-on-screen-50443292_563="744" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="744" data-gtm-vis-recent-on-screen-50443292_563="744" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="3853" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3857" id="Abs1"><span data-dcnode-id="3858" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="3854" id="Abs1-content"><p data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">International organizations (IOs) experience significant variation in their decision-making performance, or the extent to which they produce policy output. While some IOs are efficient decision-making machineries, others are plagued by deadlock. How can such variation be explained? Examining this question, the article makes three central contributions. First, we approach performance by looking at IO decision-making in terms of policy output and introduce an original measure of decision-making performance that captures annual growth rates in IO output. Second, we offer a novel theoretical explanation for decision-making performance. This account highlights the role of institutional design, pointing to how majoritarian decision rules, delegation of authority to supranational institutions, and access for transnational actors (TNAs) interact to affect decision-making. Third, we offer the first comparative assessment of the decision-making performance of IOs. While previous literature addresses single IOs, we explore decision-making across a broad spectrum of 30 IOs from 1980 to 2011. Our analysis indicates that IO decision-making performance varies across and within IOs. We find broad support for our theoretical account, showing the combined effect of institutional design features in shaping decision-making performance. Notably, TNA access has a positive effect on decision-making performance when pooling is greater, and delegation has a positive effect when TNA access is higher. We also find that pooling has an independent, positive effect on decision-making performance. All-in-all, these findings suggest that the institutional design of IOs matters for their decision-making performance, primarily in more complex ways than expected in earlier research.</span></p></div></div></section><span data-dcnode-id="3851" instrument_node="">
</span><div class="c-article-section__content c-article-section__content--separator" data-dcnode-id="3848"><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">International organizations (IOs) vary significantly in their decision-making performance, or the extent to which they produce policy output. Some IOs, such as the United Nations (UN), have principal decision-making bodies prone to deadlock and are best known for their failures to deliver. Other IOs, such as the European Union (EU), produce hundreds of decisions every year. At the same time, IOs experience variation over time in their decision-making output. Some IOs, like the Association of Southeast Asian Nations (ASEAN), have witnessed a growth in their policy output over time, while others, such as the International Monetary Fund (IMF) have had relatively stable levels of output from year to year.</span></p></div><div class="c-article-section__content" data-dcnode-id="3833"><p data-dcnode-id="3834"><span data-dcnode-id="3847" instrument_node="">How can we explain such variation in the decision-making performance of IOs? What factors make IOs efficient decision-making machineries or, alternatively, generate gridlock? Gaining a better understanding of this issue is important for both research and policy-making. Decision-making performance matters because it sheds light on IO performance more broadly. Existing research typically distinguishes between two main aspects of IO performance—process and outcome—where the first mainly entails a focus on organizational efficiency and the latter a focus on organizational goal achievement (e.g., Gutner &amp; Thompson </span><a aria-label="Reference 2010" data-dcnode-id="3845" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d31239012e397" title="Gutner, T., &amp; Thompson, A. (2010). The Politics of IO performance (Special Issue). Review of International Organizations, 5(3), 227–385."><span data-dcnode-id="3846" instrument_node="">2010</span></a><span data-dcnode-id="3844" instrument_node="">; Lall, </span><a aria-label="Reference 2017" data-dcnode-id="3842" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e400" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="3843" instrument_node="">2017</span></a><span data-dcnode-id="3841" instrument_node="">; Squatrito et al., </span><a aria-label="Reference 2018" data-dcnode-id="3839" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d31239012e403" title="Squatrito, T., Young, O., Follesdal, A., &amp; Ulfstein, G. (Eds.). (2018). The performance of international courts and tribunals. Cambridge University Press."><span data-dcnode-id="3840" instrument_node="">2018</span></a><span data-dcnode-id="3838" instrument_node="">). In privileging decision-making performance, we focus on an intermediate step between process and outcome, namely, IOs’ ability to adopt policy decisions (see also Pollack &amp; Hafner-Burton, </span><a aria-label="Reference 2010" data-dcnode-id="3836" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d31239012e406" title="Pollack, M., &amp; Hafner-Burton, E. (2010). Mainstreaming international governance: The environment, gender, and IO performance in the European Union. Review of International Organizations, 5(3), 285–313."><span data-dcnode-id="3837" instrument_node="">2010</span></a><span data-dcnode-id="3835" instrument_node="">). IO policy output in most instances temporally precedes outcomes while also being indicative of process; without efficient processes, outputs are unlikely and without outputs, outcomes are difficult for IOs to produce. Decision-making performance, however, is not equivalent to IO performance as a whole. Rather, it is one crucial piece of the broader picture that is IO performance.</span></p></div><div class="c-article-section__content" data-dcnode-id="3806"><p data-dcnode-id="3807"><span data-dcnode-id="3832" instrument_node="">Decision-making performance also matters because it relates to regime effectiveness. Regime effectiveness refers to the extent to which international cooperation succeeds in reducing or solving societal problems (Young, </span><a aria-label="Reference 1999" data-dcnode-id="3830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d31239012e412" title="Young, O. (1999). Governance in world affairs. Cornell University Press."><span data-dcnode-id="3831" instrument_node="">1999</span></a><span data-dcnode-id="3829" instrument_node="">). While enforcing peace, reducing poverty, liberalizing trade, and preventing the spread of infectious diseases will require more than IO decision-making, arriving at decisions is a first and necessary requirement if regimes are to be effective (Gutner &amp; Thompson </span><a aria-label="Reference 2010" data-dcnode-id="3827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d31239012e415" title="Gutner, T., &amp; Thompson, A. (2010). The Politics of IO performance (Special Issue). Review of International Organizations, 5(3), 227–385."><span data-dcnode-id="3828" instrument_node="">2010</span></a><span data-dcnode-id="3826" instrument_node="">; Tallberg et al., </span><a aria-label="Reference 2016a" data-dcnode-id="3824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d31239012e418" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Lundgren, M. (2016a). The performance of international organizations: A policy output approach. Journal of European Public Policy, 23(7), 1077–1096."><span data-dcnode-id="3825" instrument_node="">2016a</span></a><span data-dcnode-id="3823" instrument_node="">). Stated differently, gaining insights into decision-making performance constitutes an important step toward understanding how IOs contribute to the problem-solving effectiveness of regimes, a question that is increasingly relevant as IOs have grown more numerous, (Shanks et al., </span><a aria-label="Reference 1996" data-dcnode-id="3821" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d31239012e421" title="Shanks, C., Jacobson, H. K., &amp; Kaplan, J. H. (1996). Inertia and change in the constellation of international governmental organizations, 1981–1992. International Organization, 50(4), 593–627."><span data-dcnode-id="3822" instrument_node="">1996</span></a><span data-dcnode-id="3820" instrument_node="">; Pevehouse et al., </span><a aria-label="Reference 2020" data-dcnode-id="3818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d31239012e424" title="Pevehouse, J. C., Nordstrom, T., McManus, R. W., &amp; Jamison, A. S. (2020). Tracking organizations in the world: The Correlates of War IGO version 3.0 datasets. Journal of Peace Research, 57(3), 492–503."><span data-dcnode-id="3819" instrument_node="">2020</span></a><span data-dcnode-id="3817" instrument_node="">), gained increasing political authority (Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="3815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e428" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="3816" instrument_node="">2017</span></a><span data-dcnode-id="3814" instrument_node="">; Zürn, </span><a aria-label="Reference 2018" data-dcnode-id="3812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d31239012e431" title="Zürn, M. (2018). A Theory of Global Governance: Authority, Legitimacy, and Contestation. Oxford University Press."><span data-dcnode-id="3813" instrument_node="">2018</span></a><span data-dcnode-id="3811" instrument_node="">), and regime complexes have evolved (Alter &amp; Raustiala, </span><a aria-label="Reference 2018" data-dcnode-id="3809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d31239012e434" title="Alter, K., &amp; Raustiala, K. (2018). The rise of international regime complexity. Annual Review of Law and Social Science, 14(1), 329–349."><span data-dcnode-id="3810" instrument_node="">2018</span></a><span data-dcnode-id="3808" instrument_node="">).</span></p></div><div class="c-article-section__content" data-dcnode-id="3782"><p data-dcnode-id="3783"><span data-dcnode-id="3805" instrument_node="">This article makes three central contributions. First, we advance a novel focus in the study of IO performance, examining </span><i data-dcnode-id="3803"><span data-dcnode-id="3804" instrument_node="">decision-making performance</span></i><span data-dcnode-id="3802" instrument_node=""> as a component of the broader phenomenon of IO performance (Tallberg et al., </span><a aria-label="Reference 2016a" data-dcnode-id="3800" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d31239012e443" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Lundgren, M. (2016a). The performance of international organizations: A policy output approach. Journal of European Public Policy, 23(7), 1077–1096."><span data-dcnode-id="3801" instrument_node="">2016a</span></a><span data-dcnode-id="3799" instrument_node="">).</span><sup data-dcnode-id="3794"><a data-dcnode-id="3795" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Footnote </span></span><span data-dcnode-id="3796" instrument_node="">1</span></a></sup><span data-dcnode-id="3793" instrument_node=""> Our focus on decision-making to shed light on IO performance is inspired by the study of domestic legislative performance (e.g., Olson &amp; Nonidez, </span><a aria-label="Reference 1972" data-dcnode-id="3791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d31239012e461" title="Olson, D. M., &amp; Nonidez, C. T. (1972). Measures of legislative performance in the US house of representatives. Midwest Journal of Political Science, 16(2), 269–277."><span data-dcnode-id="3792" instrument_node="">1972</span></a><span data-dcnode-id="3790" instrument_node="">; Arter, </span><a aria-label="Reference 2006" data-dcnode-id="3788" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d31239012e464" title="Arter, D. (2006). Introduction: Comparing the legislative performance of legislatures. Journal of Legislative Studies, 12(3–4), 245–257."><span data-dcnode-id="3789" instrument_node="">2006</span></a><span data-dcnode-id="3787" instrument_node="">; Damgaard &amp; Jensen, </span><a aria-label="Reference 2006" data-dcnode-id="3785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d31239012e468" title="Damgaard, E., &amp; Jensen, H. (2006). Assessing strength and weakness in legislatures: The case of Denmark’. Journal of Legislative Studies, 12(3–4), 426–442."><span data-dcnode-id="3786" instrument_node="">2006</span></a><span data-dcnode-id="3784" instrument_node="">), which conceives of performance in terms of decision-making capacity. Decision-making performance describes the extent to which an IO is capable of producing policy output through its main decision-making body, given pressures to address problems. To empirically capture decision-making performance, we introduce a new measure based on the annual growth rate in policy output. This measure recognizes that IOs display considerable heterogeneity in their policy output, and therefore normalizes policy output by focusing on growth curves rather than absolute numbers. This measure thereby enables a systematic analysis of variation in decision-making performance over time and across IOs with different output baselines, offering a key tool for future research on IO performance.</span></p></div><div class="c-article-section__content" data-dcnode-id="3737"><p data-dcnode-id="3738"><span data-dcnode-id="3781" instrument_node="">Second, we build on rational institutionalism to develop a theoretical account that focuses on institutional design to explain IO decision-making performance. While recent literature cast doubts on the centrality of institutional design for performance (Barnett &amp; Finnemore, </span><a aria-label="Reference 2004" data-dcnode-id="3779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d31239012e474" title="Barnett, M., &amp; Finnemore. (2004). Rules for the World: International Organizations in Global Politics. Cornell University Press."><span data-dcnode-id="3780" instrument_node="">2004</span></a><span data-dcnode-id="3778" instrument_node="">; Gray, </span><a aria-label="Reference 2018" data-dcnode-id="3776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e477" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="3777" instrument_node="">2018</span></a><span data-dcnode-id="3775" instrument_node="">), we argue that institutional design indeed matters, but in ways more complex than previously understood (see also Lall, </span><a aria-label="Reference 2017" data-dcnode-id="3773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e480" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="3774" instrument_node="">2017</span></a><span data-dcnode-id="3772" instrument_node="">).</span><sup data-dcnode-id="3767"><a data-dcnode-id="3768" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="3770"><span data-dcnode-id="3771" instrument_node="">Footnote </span></span><span data-dcnode-id="3769" instrument_node="">2</span></a></sup><span data-dcnode-id="3766" instrument_node=""> Specifically, features of institutional design affect IO decision-making performance by way of their interaction rather than independent effects. Some design features combine to enable collective decision-making by mutually reinforcing efficiency gains, such as reduced transaction costs. Other constellations of design features undermine one another to minimize their benefits to collective decision-making. We theorize interactions between three design features: (1) </span><i data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node="">pooling</span></i><span data-dcnode-id="3763" instrument_node="">—the surrender of states’ decision-making veto; (2) </span><i data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">delegation</span></i><span data-dcnode-id="3760" instrument_node="">—the granting of authority to an independent supranational body; and (3) </span><i data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">access for transnational actors</span></i><span data-dcnode-id="3757" instrument_node=""> (TNAs)—the granting of privileges to TNAs, such as opportunities to be present, make statements, and even vote in interstate decision-making. Pooling, delegation, and TNA access represent the most profound changes to institutional design that have occurred in recent decades, and have received much scholarly attention. We consider how the shift away from purely member-driven IOs affects the strategic setting within which states, supranational, and transnational actors exercise entrepreneurship to influence decision-making. While previous literature focuses on how individual features of institutional design shape interstate bargaining dynamics (e.g., Boehmer et al., </span><a aria-label="Reference 2004" data-dcnode-id="3755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d31239012e505" title="Boehmer, C., Gartzke, E., &amp; Nordstrom, T. (2004). Do intergovernmental organizations promote peace? World Politics, 57(1), 1–38."><span data-dcnode-id="3756" instrument_node="">2004</span></a><span data-dcnode-id="3754" instrument_node="">; Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="3752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e508" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="3753" instrument_node="">2006</span></a><span data-dcnode-id="3751" instrument_node="">; Hansen et al., </span><a aria-label="Reference 2008" data-dcnode-id="3749" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d31239012e511" title="Hansen, H. E., McLaughlin Mitchell, S., &amp; Nemeth, S. C. (2008). IO Mediation of interstate conflicts: Moving beyond the global versus regional dichotomy. Journal of Conflict Resolution, 52(2), 295–325."><span data-dcnode-id="3750" instrument_node="">2008</span></a><span data-dcnode-id="3748" instrument_node="">; Slapin, </span><a aria-label="Reference 2008" data-dcnode-id="3746" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d31239012e514" title="Slapin, J. B. (2008). Bargaining power at Europe's intergovernmental conferences: testing institutional and intergovernmental theories. International Organization, 62(1), 131–162."><span data-dcnode-id="3747" instrument_node="">2008</span></a><span data-dcnode-id="3745" instrument_node="">; Finke &amp; Bailer, </span><a aria-label="Reference 2019" data-dcnode-id="3743" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d31239012e518" title="Finke, D., &amp; Bailer, S. (2019). Crisis bargaining in the European Union: Formal rules or market pressure? European Union Politics, 20(1), 109–133."><span data-dcnode-id="3744" instrument_node="">2019</span></a><span data-dcnode-id="3742" instrument_node="">), we theorize how pooling, delegation, and TNA access </span><i data-dcnode-id="3740"><span data-dcnode-id="3741" instrument_node="">combine</span></i><span data-dcnode-id="3739" instrument_node=""> to shape the effects of state, supranational, and transnational entrepreneurship on policy output by way of their net effect on cooperation problems. This perspective resonates with institutional practice, where IO reforms often involve changes to several design features simultaneously, rather than modifications of one at a time. We argue that reaping the resource benefits of TNA access depends on higher levels of pooling, and that lower levels of delegation to supranational bodies will make it easier to realize the positive effects of pooling. Moreover, we expect that delegation’s effects on decision-making should be reinforced by extensive TNA access.</span></p></div><div class="c-article-section__content" data-dcnode-id="3701"><p data-dcnode-id="3702"><span data-dcnode-id="3736" instrument_node="">Third, we offer the first comparative assessment of the decision-making performance of IOs. While existing research analyzes the decision-making of individual IOs, such as the UN (Holloway &amp; Tomlinson, </span><a aria-label="Reference 1995" data-dcnode-id="3734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d31239012e528" title="Holloway, S., &amp; Tomlinson, R. (1995). The new world order and the general assembly: Bloc realignment at the UN in the Post-Cold War world. Canadian Journal of Political Science, 28(2), 227–254."><span data-dcnode-id="3735" instrument_node="">1995</span></a><span data-dcnode-id="3733" instrument_node="">; Allen &amp; Yuen </span><a aria-label="Reference 2014" data-dcnode-id="3731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d31239012e531" title="Allen, S. H., &amp; Yuen, A. T. (2014). The politics of peacekeeping: UN Security Council oversight across peacekeeping missions. International Studies Quarterly, 58(3), 621–632."><span data-dcnode-id="3732" instrument_node="">2014</span></a><span data-dcnode-id="3730" instrument_node="">; Vreeland &amp; Dreher, </span><a aria-label="Reference 2014" data-dcnode-id="3728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d31239012e534" title="Vreeland, J., &amp; Dreher, A. (2014). The political economy of the United Nations Security Council: Money and influence. Cambridge University Press."><span data-dcnode-id="3729" instrument_node="">2014</span></a><span data-dcnode-id="3727" instrument_node="">), EU (Schulz &amp; König, </span><a aria-label="Reference 2000" data-dcnode-id="3725" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d31239012e537" title="Schulz, H., &amp; König, T. (2000). Institutional reform and decision-making efficiency in the European Union. American Journal of Political Science, 44(4), 653–666."><span data-dcnode-id="3726" instrument_node="">2000</span></a><span data-dcnode-id="3724" instrument_node="">; Thomson et al.&nbsp;</span><a aria-label="Reference 2006" data-dcnode-id="3722" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d31239012e540" title="Thomson, R., Stokman, F. N., Achen, C. H., &amp; König, T. (Eds.). (2006). The European Union decides. Cambridge University Press."><span data-dcnode-id="3723" instrument_node="">2006</span></a><span data-dcnode-id="3721" instrument_node="">; Naurin &amp; Wallace </span><a aria-label="Reference 2008" data-dcnode-id="3719" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d31239012e544" title="Naurin, D., &amp; Wallace, H. (Eds). (2008). Unveiling the Council of the European Union: Games Governments Play in Brussels. Basingstoke: Palgrave."><span data-dcnode-id="3720" instrument_node="">2008</span></a><span data-dcnode-id="3718" instrument_node="">), and World Trade Organization (WTO) (Ehlermann &amp; Ehring, </span><a aria-label="Reference 2005" data-dcnode-id="3716" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d31239012e547" title="Ehlermann, C.-D., &amp; Ehring, L. (2005). Decision-making in the world trade organization. is the consensus practice of the world trade organization adequate for making, revising and implementing rules on international trade? Journal of International Economic Law, 8(1), 51–75."><span data-dcnode-id="3717" instrument_node="">2005</span></a><span data-dcnode-id="3715" instrument_node="">; Elsig, </span><a aria-label="Reference 2010" data-dcnode-id="3713" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d31239012e550" title="Elsig, M. (2010). The World Trade Organization at work: performance in a member-driven milieu. Review of International Organizations, 5(3), 345–363."><span data-dcnode-id="3714" instrument_node="">2010</span></a><span data-dcnode-id="3712" instrument_node="">), these studies tell us little about general patterns and explanations of IO decision-making performance. The broad comparative studies that do exist focus on aspects of IO performance other than decision-making (Gutner &amp; Thompson </span><a aria-label="Reference 2010" data-dcnode-id="3710" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d31239012e553" title="Gutner, T., &amp; Thompson, A. (2010). The Politics of IO performance (Special Issue). Review of International Organizations, 5(3), 227–385."><span data-dcnode-id="3711" instrument_node="">2010</span></a><span data-dcnode-id="3709" instrument_node="">; Lall, </span><a aria-label="Reference 2017" data-dcnode-id="3707" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e556" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="3708" instrument_node="">2017</span></a><span data-dcnode-id="3706" instrument_node="">; Gray, </span><a aria-label="Reference 2018" data-dcnode-id="3704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e559" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="3705" instrument_node="">2018</span></a><span data-dcnode-id="3703" instrument_node="">). Our data cover 30 IOs from 1980 to 2011, and captures tens of thousands of decisions of the main decision-making body of these IOs.</span></p></div><div class="c-article-section__content" data-dcnode-id="3698"><p data-dcnode-id="3699"><span data-dcnode-id="3700" instrument_node="">Our analysis produces several important findings. Decision-making performance varies both across and within IOs, and institutional design helps to account for this variation. Increased pooling has a positive independent effect on IO decision-making performance in the long run, making it less cumbersome to arrive at collective decisions. Increased delegation and TNA access do not have similar independent effects. Yet more important than the effect of any one institutional design feature is how pooling, delegation, and TNA access interact to shape decision-making performance. We find support for two particular constellations of institutional design: TNA access has a positive effect on decision-making performance when pooling is greater, and the effect of delegation varies with the extent of TNA access. All-in-all, these findings suggest that when design features are viewed in isolation of one another, we miss crucial explanations of performance.</span></p></div><div class="c-article-section__content" data-dcnode-id="3695"><p data-dcnode-id="3696"><span data-dcnode-id="3697" instrument_node="">This article proceeds in four parts. First, we theorize how institutional design affects IO decision-making, emphasizing the role of pooling, delegation, and TNA access. Second, we present the research design, describing our dataset and introducing our measures of decision-making performance. Third, we present the results of our multivariate analysis of the effects of institutional design on IO decision-making performance. We end with a brief conclusion.</span></p></div><section data-dcnode-id="3416" data-gtm-vis-first-on-screen-50443292_562="744" data-gtm-vis-first-on-screen-50443292_563="744" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="744" data-gtm-vis-recent-on-screen-50443292_563="744" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Institutional design and IO decision-making"><div class="c-article-section" data-dcnode-id="3417" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3693" id="Sec1"><span data-dcnode-id="3694" instrument_node="">Institutional design and IO decision-making</span></h2><div class="c-article-section__content" data-dcnode-id="3418" id="Sec1-content"><p data-dcnode-id="3668"><span data-dcnode-id="3692" instrument_node="">The institutional setting within which IO decision-making occurs has profoundly changed in recent decades, potentially affecting if and how decisions are made. Three changes have moved IOs from pure intergovernmental forms of cooperation toward more complex institutional designs. First, the national veto has in many instances been replaced by a pooling of authority through majority voting (Blake &amp; Payton, </span><a aria-label="Reference 2015" data-dcnode-id="3690" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d31239012e575" title="Blake, D. J., &amp; Payton, A. L. (2015). Balancing design objectives: Analyzing new data on voting rules in intergovernmental organizations. Review of International Organizations, 10(3), 377–402."><span data-dcnode-id="3691" instrument_node="">2015</span></a><span data-dcnode-id="3689" instrument_node="">; Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="3687" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e578" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="3688" instrument_node="">2017</span></a><span data-dcnode-id="3686" instrument_node="">). Second, IOs nowadays often involve some delegation of independent authority to international bureaucrats (Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="3684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e581" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="3685" instrument_node="">2006</span></a><span data-dcnode-id="3683" instrument_node="">; Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="3681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e584" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="3682" instrument_node="">2017</span></a><span data-dcnode-id="3680" instrument_node="">). Third, IOs increasingly provide some access to policy-making for TNAs such as non-governmental organizations (NGOs), business actors, scientific experts, and philanthropic foundations (Steffek et al., </span><a aria-label="Reference 2008" data-dcnode-id="3678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d31239012e587" title="Steffek, J., Kissling, C., &amp; Nanz, P. (Eds.). (2008). Civil society participation in european and global governance: A cure for the democratic deficit? Palgrave Macmillan."><span data-dcnode-id="3679" instrument_node="">2008</span></a><span data-dcnode-id="3677" instrument_node="">; Tallberg et al., </span><a aria-label="Reference 2014" data-dcnode-id="3675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d31239012e591" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Jönsson, C. (2014). The transnational design of international organizations. International Organization, 68(4), 741–774."><span data-dcnode-id="3676" instrument_node="">2014</span></a><span data-dcnode-id="3674" instrument_node="">). These expansions in pooling, delegation, and TNA access are significant developments in the institutional design of IOs. Each contributes to a reduction in member state control. Together, they define the new strategic landscapes in which IOs make decisions.</span><sup data-dcnode-id="3669"><a data-dcnode-id="3670" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">Footnote </span></span><span data-dcnode-id="3671" instrument_node="">3</span></a></sup></p><p data-dcnode-id="3663"><span data-dcnode-id="3667" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="3665" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3666" instrument_node="">1</span></a><span data-dcnode-id="3664" instrument_node=""> illustrates these changes by positioning 30 IOs in a three-dimensional space at three points in time. The figure shows how many of these IOs already in 1980 used designs that did not conform to the intergovernmental end of the spectrum (lower left-hand corner, represented by ASEAN), and how these IOs then successively expanded pooling, delegation, and TNA access up to 2010, approaching the opposite end (upper right-hand corner, represented by the EU). In addition, the figure illustrates how these developments have contributed to greater diversity in the design of IOs over time, as these organizations to varying extents have expanded pooling, delegation, and TNA access.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3639" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="3640"><figcaption data-dcnode-id="3660"><b class="c-article-section__figure-caption" data-dcnode-id="3661" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3662" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3651"><div class="c-article-section__figure-item" data-dcnode-id="3655"><a class="c-article-section__figure-link" data-dcnode-id="3656" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/1" rel="nofollow"><picture data-dcnode-id="3657"><source data-dcnode-id="3659" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11558-021-09445-x/MediaObjects/11558_2021_9445_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3658" height="1678" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11558-021-09445-x/MediaObjects/11558_2021_9445_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3652" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3653"><span data-dcnode-id="3654" instrument_node="">Constellations of IO design: pooling, delegation, and TNA access</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3641"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3642" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/1" rel="nofollow"><span data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3643" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3644" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3645" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3648" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3647" fill-rule="evenodd"></path><span data-dcnode-id="3646" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3622"><span data-dcnode-id="3638" instrument_node="">Our account focuses on these developments to generate expectations about the effects of institutional design on decision-making within IOs. It moves beyond a conventional treatment of IOs as arenas for pure intergovernmental bargaining to theorize how these three design features—on their own and in combination—affect IOs’ capacity to come to agreement in the face of pressures to address societal problems. Our account is rooted analytically in rational choice institutionalism, which assumes that decision outcomes are the result of strategic interactions between goal-oriented actors operating within institutional constraints (Scharpf, </span><a aria-label="Reference 1997" data-dcnode-id="3636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d31239012e631" title="Scharpf, F. W. (1997). Games real actors play. Westview Press."><span data-dcnode-id="3637" instrument_node="">1997</span></a><span data-dcnode-id="3635" instrument_node="">; Lake &amp; Powell, </span><a aria-label="Reference 1999" data-dcnode-id="3633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d31239012e634" title="Lake, D. A., &amp; Powell, R. (1999). Strategic choice and international cooperation. Princeton University Press."><span data-dcnode-id="3634" instrument_node="">1999</span></a><span data-dcnode-id="3632" instrument_node="">; Shepsle, </span><a aria-label="Reference 2008" data-dcnode-id="3630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d31239012e637" title="Shepsle, K. (2008). Rational Choice Institutionalism. In S. H. Binder, R. A. W. Rhodes, &amp; B. A. Rockman (Eds.), Oxford handbook of political institutions (pp. 23–38). Oxford University Press."><span data-dcnode-id="3631" instrument_node="">2008</span></a><span data-dcnode-id="3629" instrument_node="">; Martin &amp; Simmons, </span><a aria-label="Reference 2012" data-dcnode-id="3627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d31239012e640" title="Martin, L. A., &amp; Simmons, B. A. (2012). International organizations and institutions. In W. Carlsnaes, T. Risse, &amp; B. A. Simmons (Eds.), Handbook of international relations (2nd ed., pp. 326–351). SAGE."><span data-dcnode-id="3628" instrument_node="">2012</span></a><span data-dcnode-id="3626" instrument_node="">). Moreover, we assume that institutional designers adopt certain institutional features in order to mitigate cooperation problems (Koremenos et al., </span><a aria-label="Reference 2001" data-dcnode-id="3624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d31239012e643" title="Koremenos, B., Lipson, C., &amp; Snidal, D. (2001). The rational design of international institutions. International Organization, 55(4), 761–799."><span data-dcnode-id="3625" instrument_node="">2001</span></a><span data-dcnode-id="3623" instrument_node="">). Whether IOs perform well, in our account, is therefore a result of how design features are combined in ways that mitigate barriers to collective decision-making, such as high transaction costs, information asymmetries, or resource deficits. In the remainder of this section, we discuss how pooling, delegation, and TNA access affect barriers to cooperation to alter the strategic setting in which decisions are made, and derive testable hypotheses about their independent and interdependent effects on IO decision-making performance.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3620" id="Sec2"><span data-dcnode-id="3621" instrument_node="">Pooling</span></h3><p data-dcnode-id="3615"><span data-dcnode-id="3619" instrument_node="">Pooling occurs when “authority to make decisions is removed from individual states” (Keohane &amp; Hoffman </span><a aria-label="Reference 1991" data-dcnode-id="3617" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d31239012e653" title="Keohane, R., &amp; Hoffmann, S. (Eds.). (1991). The new European community: Decisionmaking and institutional. Westview Press."><span data-dcnode-id="3618" instrument_node="">1991</span></a><span data-dcnode-id="3616" instrument_node="">, p. 7) and it requires a coalition of states to block decisions. We can observe pooling through majority and weighted voting rules. Pooling is greatest when decisions are based on a simple majority, requiring a larger coalition of states to block a decision. Pooling is slightly lower when a qualified majority is required, as the blocking coalition necessary to stop a decision is smaller. Finally, when unanimity or consensus is required, pooling is at its lowest, as each state retains the formal ability to veto a decision.</span></p><p data-dcnode-id="3604"><span data-dcnode-id="3614" instrument_node="">Comparative analysis reveals that pooling varies across IOs and has increased over time (Hooghe et al., </span><a aria-label="Reference 2019" data-dcnode-id="3612" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d31239012e659" title="Hooghe, L., Lenz, T., &amp; Marks, G. (2019). A theory of international organization. Oxford University Press."><span data-dcnode-id="3613" instrument_node="">2019</span></a><span data-dcnode-id="3611" instrument_node="">, p. 39), as reflected in Fig.&nbsp;</span><a data-dcnode-id="3609" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3610" instrument_node="">1</span></a><span data-dcnode-id="3608" instrument_node="">. Cross-sectional data suggest that pooling is a feature of the majority of IOs. Blake and Payton (</span><a aria-label="Reference 2015" data-dcnode-id="3606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d31239012e665" title="Blake, D. J., &amp; Payton, A. L. (2015). Balancing design objectives: Analyzing new data on voting rules in intergovernmental organizations. Review of International Organizations, 10(3), 377–402."><span data-dcnode-id="3607" instrument_node="">2015</span></a><span data-dcnode-id="3605" instrument_node="">) show that among 266 IOs in 2004, 44 percent featured majority voting and 18 percent weighted voting. By comparison, 35 percent of IOs featured no pooling, making decisions by unanimity or consensus.</span></p><p data-dcnode-id="3593"><span data-dcnode-id="3603" instrument_node="">We would expect increased pooling to lower transaction costs and thus have a positive effect on decision-making. The absence of pooling can invite gridlock because any state can block a decision process by wielding the veto. As Blake and Payton (</span><a aria-label="Reference 2015" data-dcnode-id="3601" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d31239012e671" title="Blake, D. J., &amp; Payton, A. L. (2015). Balancing design objectives: Analyzing new data on voting rules in intergovernmental organizations. Review of International Organizations, 10(3), 377–402."><span data-dcnode-id="3602" instrument_node="">2015</span></a><span data-dcnode-id="3600" instrument_node="">, p. 383) explain: “The need to find a universally acceptable outcome means that unanimity is often associated with gridlock, hindering the ability of IGOs to respond quickly and effectively to the shifting demands of their members.” In comparison, pooling, which lowers the institutional hurdles to agreement, is more permissive to decision-making. In the language of formal modelling, majority voting enlarges the win-set, increases the proportion of winning coalitions, and expedites decisions (Golub, </span><a aria-label="Reference 2008" data-dcnode-id="3598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d31239012e674" title="Golub, J. (2008). The study of decision-making speed in the European Union. European Union Politics, 9(1), 167–179."><span data-dcnode-id="3599" instrument_node="">2008</span></a><span data-dcnode-id="3597" instrument_node="">, p. 169). Scharpf (</span><a aria-label="Reference 1997" data-dcnode-id="3595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d31239012e677" title="Scharpf, F. W. (1997). Games real actors play. Westview Press."><span data-dcnode-id="3596" instrument_node="">1997</span></a><span data-dcnode-id="3594" instrument_node="">, p. 151) arrives at the same conclusion based on a consideration of transaction costs: “[T]he choices of very large numbers of actors may be coordinated at very moderate transaction costs if collectively binding decisions can be imposed by majority rule.” Therefore, we expect:</span></p><blockquote class="c-blockquote" data-dcnode-id="3585"><div class="c-blockquote__body" data-dcnode-id="3586"><span data-dcnode-id="3592" instrument_node="">
</span><p data-dcnode-id="3588"><i data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Hypothesis 1</span></i><span data-dcnode-id="3589" instrument_node="">: Increased pooling will have a positive effect on decision-making performance.</span></p><span data-dcnode-id="3587" instrument_node="">
</span></div></blockquote><h3 class="c-article__sub-heading" data-dcnode-id="3583" id="Sec3"><span data-dcnode-id="3584" instrument_node="">Delegation</span></h3><p data-dcnode-id="3581"><span data-dcnode-id="3582" instrument_node="">Delegation is present when states grant authority to a supranational body to take actions and contribute to decision-making on their behalf. Supranational bodies can be tasked with a variety of functions, such as setting an agenda for decision-making, implementing policy through day-to-day managerial decisions, or monitoring compliance through rule interpretation and dispute settlement. In order to carry out these tasks, these bodies have some autonomy or independence from states in the areas of agenda-setting, policy implementation and dispute settlement.</span></p><p data-dcnode-id="3573"><span data-dcnode-id="3580" instrument_node="">Like with pooling, delegation varies across IOs and has increased over time, as shown in Fig.&nbsp;</span><a data-dcnode-id="3578" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3579" instrument_node="">1</span></a><span data-dcnode-id="3577" instrument_node=""> (see also Hooghe et al., </span><a aria-label="Reference 2019" data-dcnode-id="3575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d31239012e702" title="Hooghe, L., Lenz, T., &amp; Marks, G. (2019). A theory of international organization. Oxford University Press."><span data-dcnode-id="3576" instrument_node="">2019</span></a><span data-dcnode-id="3574" instrument_node="">). For example, the EU and the Economic Community of West African States (ECOWAS) have high delegation, while the International Whaling Commission (IWC) and the Organization of Islamic Cooperation (OIC) have low delegation as the autonomy and tasks assigned to an international body are limited.</span></p><p data-dcnode-id="3559"><span data-dcnode-id="3572" instrument_node="">We would expect increased delegation to reduce barriers to cooperation and thus improve the decision-making performance of an IO. Rational institutionalist scholarship suggests that delegation provides several benefits to international cooperation by way of addressing collective-action problems. Supranational bodies can reduce transaction costs that hinder collective decision-making, reduce information asymmetries, improve the credibility of commitments by monitoring and enforcement, resolve problems arising from incomplete contracts, or enable blame shifting for unpopular or failed policy (Pollack, </span><a aria-label="Reference 1997" data-dcnode-id="3570" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d31239012e708" title="Pollack, M. (1997). Delegation, agency, and agenda setting in the European community. International Organization, 51(1), 99–134."><span data-dcnode-id="3571" instrument_node="">1997</span></a><span data-dcnode-id="3569" instrument_node="">; Tallberg, </span><a aria-label="Reference 2002" data-dcnode-id="3567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d31239012e711" title="Tallberg, J. (2002). Delegation to supranational institutions: Why, how, and with what consequences? West European Politics, 25(1), 23–46."><span data-dcnode-id="3568" instrument_node="">2002</span></a><span data-dcnode-id="3566" instrument_node="">; Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="3564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e714" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="3565" instrument_node="">2006</span></a><span data-dcnode-id="3563" instrument_node="">; Bradley &amp; Kelley, </span><a aria-label="Reference 2008" data-dcnode-id="3561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d31239012e717" title="Bradley, C., &amp; Kelley, J. (2008). The concept of international delegation. Law and Contemporary Problems, 71(1), 1–36."><span data-dcnode-id="3562" instrument_node="">2008</span></a><span data-dcnode-id="3560" instrument_node="">). By addressing collective-action problems that might otherwise impede decision-making, supranational bodies improve IOs’ ability to conclude decisions. We therefore expect:</span></p><blockquote class="c-blockquote" data-dcnode-id="3551"><div class="c-blockquote__body" data-dcnode-id="3552"><span data-dcnode-id="3558" instrument_node="">
</span><p data-dcnode-id="3554"><i data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">Hypothesis 2</span></i><span data-dcnode-id="3555" instrument_node="">: Increased delegation will have a positive effect on decision-making performance.</span></p><span data-dcnode-id="3553" instrument_node="">
</span></div></blockquote><p data-dcnode-id="3540"><span data-dcnode-id="3550" instrument_node="">This expectation is based on the widely-held rationalist view that delegation improves decision-making. Nonetheless, two additional factors bear mention. First, the impact of delegation on decision-making may vary depending on whether supranational bodies have independence in agenda-setting, implementation, or dispute settlement. In some areas, it is conceivable that delegation could reduce intergovernmental decision-making as well. For example, delegation of implementation to a supranational bureaucracy could supplant intergovernmental decision-making, and delegation of dispute settlement could lead an intergovernmental body to defer difficult decisions to a supranational interpretive body. Second, some scholarship suggests that delegation can have perverse effects. Empowering an autonomous supranational body can lead it to pursue its own agenda (Pollack, </span><a aria-label="Reference 1997" data-dcnode-id="3548" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d31239012e730" title="Pollack, M. (1997). Delegation, agency, and agenda setting in the European community. International Organization, 51(1), 99–134."><span data-dcnode-id="3549" instrument_node="">1997</span></a><span data-dcnode-id="3547" instrument_node="">; Barnett &amp; Finnemore, </span><a aria-label="Reference 2004" data-dcnode-id="3545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d31239012e733" title="Barnett, M., &amp; Finnemore. (2004). Rules for the World: International Organizations in Global Politics. Cornell University Press."><span data-dcnode-id="3546" instrument_node="">2004</span></a><span data-dcnode-id="3544" instrument_node="">). Preventing and countering such pathologies is politically costly and resource intensive (Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="3542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e736" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="3543" instrument_node="">2006</span></a><span data-dcnode-id="3541" instrument_node="">). Delegation in this view might encumber decision-making because state monitoring of supranational organs increases transaction costs and demands resources.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3538" id="Sec4"><span data-dcnode-id="3539" instrument_node="">TNA access</span></h3><p data-dcnode-id="3533"><span data-dcnode-id="3537" instrument_node="">TNA access is defined by formal privileges for transnational actors to participate in decision-making and other governance functions. It enables TNA involvement through opportunities to observe, address, or even vote in interstate decision-making (Tallberg et al., </span><a aria-label="Reference 2014" data-dcnode-id="3535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d31239012e747" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Jönsson, C. (2014). The transnational design of international organizations. International Organization, 68(4), 741–774."><span data-dcnode-id="3536" instrument_node="">2014</span></a><span data-dcnode-id="3534" instrument_node="">). TNA access provides such opportunities to a variety of actors, from scientific experts and professional organizations to business associations, NGOs, and advocacy groups.</span></p><p data-dcnode-id="3522"><span data-dcnode-id="3532" instrument_node="">TNA access has expanded greatly in recent decades, yet continues to vary across IOs, as shown in Fig.&nbsp;</span><a data-dcnode-id="3530" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3531" instrument_node="">1</span></a><span data-dcnode-id="3529" instrument_node=""> (see also Steffek et al., </span><a aria-label="Reference 2008" data-dcnode-id="3527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d31239012e756" title="Steffek, J., Kissling, C., &amp; Nanz, P. (Eds.). (2008). Civil society participation in european and global governance: A cure for the democratic deficit? Palgrave Macmillan."><span data-dcnode-id="3528" instrument_node="">2008</span></a><span data-dcnode-id="3526" instrument_node="">; Tallberg et al., </span><a aria-label="Reference 2014" data-dcnode-id="3524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d31239012e759" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Jönsson, C. (2014). The transnational design of international organizations. International Organization, 68(4), 741–774."><span data-dcnode-id="3525" instrument_node="">2014</span></a><span data-dcnode-id="3523" instrument_node="">). While some IOs have become open to the involvement of TNAs, others remain more closed.</span></p><p data-dcnode-id="3502"><span data-dcnode-id="3521" instrument_node="">We would expect increased TNA access to have a positive effect on decision-making. Previous research suggests that an IO’s cooperation with TNAs can improve its performance (Lall, </span><a aria-label="Reference 2017" data-dcnode-id="3519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e765" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="3520" instrument_node="">2017</span></a><span data-dcnode-id="3518" instrument_node="">). TNAs can provide resources that affect whether collective solutions are reached. When IOs address complex problems, finding collective solutions may require expert or local information and resources. IOs often lack such information and resources, and distributional problems can prevent states from individually providing them. TNAs can fill these gaps and thus enable decision-making (Raustiala, </span><a aria-label="Reference 1997" data-dcnode-id="3516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d31239012e768" title="Raustiala, K. (1997). States, NGOs, and international environmental institutions. International Studies Quarterly, 41(4), 719–740."><span data-dcnode-id="3517" instrument_node="">1997</span></a><span data-dcnode-id="3515" instrument_node="">; Betsill &amp; Corell, </span><a aria-label="Reference 2008" data-dcnode-id="3513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d31239012e771" title="Betsill, M., &amp; Corell, E. (2008). NGO Diplomacy: The influence of nongovernmental organizations in international environmental negotiations. MIT Press."><span data-dcnode-id="3514" instrument_node="">2008</span></a><span data-dcnode-id="3512" instrument_node="">; Abbott et al., </span><a aria-label="Reference 2015" data-dcnode-id="3510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d31239012e774" title="Abbott, K. W., Genschel, P., Snidal, D., &amp; Zangl, B. (2015). International Organizations as Orchestrators. Cambridge University Press."><span data-dcnode-id="3511" instrument_node="">2015</span></a><span data-dcnode-id="3509" instrument_node="">). In addition, TNA access can improve decision-making performance by reducing IO legitimacy deficits. As the legitimacy standards for IOs have shifted toward norms of inclusiveness (Dingwerth et al., </span><a aria-label="Reference 2019" data-dcnode-id="3507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d31239012e777" title="Dingwerth, K., Witt, A., Lehmann, I., Reichel, E., &amp; Weise, T. (Eds.). (2019). International organizations under pressure: legitimating global governance in challenging times. Oxford University Press."><span data-dcnode-id="3508" instrument_node="">2019</span></a><span data-dcnode-id="3506" instrument_node="">), organizations that exclude TNAs from participation often face internal or external criticism and contestation, making it more difficult or costly for member states to enact decisions (O’Brien et al., </span><a aria-label="Reference 2000" data-dcnode-id="3504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d31239012e781" title="O’Brien, R., Goetz, A. M., Scholte, J. A., &amp; Williams, M. (2000). Contesting global governance: Multilateral economic institutions and global social movements. Cambridge University Press."><span data-dcnode-id="3505" instrument_node="">2000</span></a><span data-dcnode-id="3503" instrument_node="">). Overall, TNA access provides several benefits to decision-making. Consequently, we expect:</span></p><blockquote class="c-blockquote" data-dcnode-id="3494"><div class="c-blockquote__body" data-dcnode-id="3495"><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3497"><i data-dcnode-id="3499"><span data-dcnode-id="3500" instrument_node="">Hypothesis 3</span></i><span data-dcnode-id="3498" instrument_node="">: Increased TNA access will have a positive effect on decision-making performance.</span></p><span data-dcnode-id="3496" instrument_node="">
</span></div></blockquote><p data-dcnode-id="3489"><span data-dcnode-id="3493" instrument_node="">While most understandings of the role of TNA access would lead us to expect a positive effect, it is possible that TNA access could constrain efficient decision-making as well. Transaction costs may be greater because access implies more actors are involved in decision-making and typically will present additional preferences and positions. For example, Rasmussen and Toshkov (</span><a aria-label="Reference 2013" data-dcnode-id="3491" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d31239012e794" title="Rasmussen, A., &amp; Toshkov, D. (2013). The effect of stakeholder involvement on legislative duration: consultation of external actors and legislative duration in the European Union. European Union Politics, 14(3), 366–387."><span data-dcnode-id="3492" instrument_node="">2013</span></a><span data-dcnode-id="3490" instrument_node="">) find that TNA consultation processes slow down EU decision-making because of the heightened transaction costs.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3487" id="Sec5"><span data-dcnode-id="3488" instrument_node="">Combinations of pooling, delegation, and TNA access</span></h3><p data-dcnode-id="3477"><span data-dcnode-id="3486" instrument_node="">Pooling, delegation, and TNA access are distinct dimensions of institutional design, each with its own potential independent effects on the decision-making performance of IOs. Yet IOs combine these three design features in a variety of constellations (as illustrated in Fig.&nbsp;</span><a data-dcnode-id="3484" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3485" instrument_node="">1</span></a><span data-dcnode-id="3483" instrument_node="">). This raises the question of how pooling, delegation, and TNA access interact to affect decision-making. Are some combinations of these three features particularly beneficial or unhelpful for decision-making in IOs? Surprisingly, the interplay between these three design features has received very limited attention in previous scholarship. This is puzzling, since these three dimensions can be expected to affect each other in theory and often are reformed together in practice. For instance, when the decision-making arrangements of the EU were revised in the 1990s and 2000s, the reforms involved carefully calibrated changes to all three features: pooling, through an expansion of qualified majority voting; delegation, through more delegation of authority to the European Commission and the European Parliament, and TNA access, through greater involvement of interest groups and civil society. In the following, we offer a first attempt to theorize the interplay between pooling, delegation, and TNA access. Building on our general theoretical framework, we develop expectations about three interaction effects that we find particularly plausible. Each expectation focuses specifically one of our key design features and how it interacts with another design feature to affect IO decision-making performance.</span><sup data-dcnode-id="3478"><a data-dcnode-id="3479" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">Footnote </span></span><span data-dcnode-id="3480" instrument_node="">4</span></a></sup></p><p data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">First, TNA access coincides with different levels of pooling. For example, TNA access and pooling are both relatively high in United Nations Educational, Scientific and Cultural Organisation (UNESCO), while the International Labour Organization (ILO) features high TNA access combined with low levels of pooling. We expect that pooling will have a positive influence on the effects of TNA access on IO decision-making. TNA access can provide resources that enable IO decision-making, but these benefits are more easily realized when pooling is extensive. A higher level of pooling raises the threshold for states to block TNAs’ contributions. In contrast, an absence of pooling means that any single state can block a decision, and thereby undermine the contributions made by TNAs. Returning to our examples, UNESCO’s higher degree of pooling may thus increase the benefits of TNA access for decision-making compared to the ILO’s lower level of pooling, all else equal. Overall, reaping the resource benefits of TNA access may depend on having less onerous voting rules. Thus, we would expect:</span></p><blockquote class="c-blockquote" data-dcnode-id="3467"><div class="c-blockquote__body" data-dcnode-id="3468"><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3470"><i data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">Hypothesis 4</span></i><span data-dcnode-id="3471" instrument_node="">: Increased TNA access will have a stronger positive effect on decision-making performance at higher levels of pooling.</span></p><span data-dcnode-id="3469" instrument_node="">
</span></div></blockquote><p data-dcnode-id="3456"><span data-dcnode-id="3466" instrument_node="">Second, pooling is combined with different degrees of delegation. For example, the Food and Agriculture Organization (FAO) and the International Criminal Court (ICC) have similar levels of pooling, but the latter has considerably higher levels of delegation. We expect that delegation will negatively influence the effects of pooling on IO decision-making. When delegation is higher, it will be more difficult to realize the benefits of pooling. Supranational bodies often develop preferences that diverge from those of states (Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="3464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e826" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="3465" instrument_node="">2006</span></a><span data-dcnode-id="3463" instrument_node="">). When delegation expands the authority of supranational actors, it therefore increases the preference heterogeneity among decision-makers, reducing the benefits of pooling for the IO’s ability to come to agreement. For example, König (</span><a aria-label="Reference 2007" data-dcnode-id="3461" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d31239012e829" title="König, T. (2007). Divergence or convergence? From ever-growing to ever-slowing european legislative decision making. European Journal of Political Research, 46(3), 417–444."><span data-dcnode-id="3462" instrument_node="">2007</span></a><span data-dcnode-id="3460" instrument_node="">; see also Golub, </span><a aria-label="Reference 2008" data-dcnode-id="3458" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d31239012e832" title="Golub, J. (2008). The study of decision-making speed in the European Union. European Union Politics, 9(1), 167–179."><span data-dcnode-id="3459" instrument_node="">2008</span></a><span data-dcnode-id="3457" instrument_node="">) finds that greater delegation of decision-making authority to the European Parliament reduced the decision-making benefits of the simultaneous shift toward qualified majority voting, or more pooling, in the Council of the EU. Conversely, the benefits of pooling are more likely to be realized when delegation is lower and decision-making largely or exclusively is a question of interstate bargaining. In this case, it matters greatly for an IO’s ability to come to agreement whether decisions require the support of a simple majority, a qualified majority or the entire membership. Thus, we expect:</span></p><span data-dcnode-id="3455" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="3445"><div class="c-blockquote__body" data-dcnode-id="3446"><span data-dcnode-id="3454" instrument_node="">
</span><p data-dcnode-id="3448"><i data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">Hypothesis 5</span></i><span data-dcnode-id="3451" instrument_node="">: Increased pooling will have a stronger positive effect on decision-making performance at lower levels of delegation</span><i data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">.</span></i></p><span data-dcnode-id="3447" instrument_node="">
</span></div></blockquote><span data-dcnode-id="3444" instrument_node="">
