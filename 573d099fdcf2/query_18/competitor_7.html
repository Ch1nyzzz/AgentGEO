</span></a></div></figure></div><p data-dcnode-id="2825"><span data-dcnode-id="2835" instrument_node="">We do not find significant results for our second hypothesized interaction effect—that increased </span><i data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">pooling</span></i><span data-dcnode-id="2832" instrument_node=""> would have a stronger positive effect on decision-making at lower levels of </span><i data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">delegation</span></i><span data-dcnode-id="2829" instrument_node=""> (H5) (Models 8 and 11, Table </span><a data-dcnode-id="2827" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2828" instrument_node="">2</span></a><span data-dcnode-id="2826" instrument_node="">). With strong independent effects in opposite directions, this does not come as a surprise. What is worth noting, however, is that the independent effect—positive for pooling (Model 8 and Model 11) and negative for delegation (Model 8)—disappears when we add the interaction term. This suggests that increases in pooling do not have a positive effect on long-term decision performance in the absence of delegation. A relevant example would be the OIC, whose decision-making output declined following a 2007 shift to an institutional setup with practically no delegation (0.05) and more pooling, compared to the situation at the turn of the millennium, when delegation was higher.</span></p><p data-dcnode-id="2796"><span data-dcnode-id="2824" instrument_node="">Finally, we find support for the expectation that increased </span><i data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">delegation</span></i><span data-dcnode-id="2821" instrument_node=""> will have a stronger positive effect on decision-making performance at higher levels of </span><i data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">TNA access</span></i><span data-dcnode-id="2818" instrument_node=""> (H6). Although the independent effect of </span><i data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">delegation</span></i><span data-dcnode-id="2815" instrument_node=""> was negative, we note a significant coefficient for the interaction term of both variables, once again both for </span><i data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">short-term performance</span></i><span data-dcnode-id="2812" instrument_node=""> and, at a lower significance level, for </span><i data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">long-term performance</span></i><span data-dcnode-id="2809" instrument_node=""> (Table </span><a data-dcnode-id="2807" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2808" instrument_node="">2</span></a><span data-dcnode-id="2806" instrument_node="">, Models 9 and 12). And without TNA access, we find the negative effect of increased delegation reported above. The predicted means plot in the appendix (Figure </span><a data-dcnode-id="2804" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2805" instrument_node="">A.6</span></a><span data-dcnode-id="2803" instrument_node=""> in the online appendix) shows that a growth of delegation actually has a positive effect on decision-making performance at very high levels of TNA access, and the downturn in decision-making performance caused by increased delegation is mainly observed for IOs with low levels of TNA access.</span><sup data-dcnode-id="2798"><a data-dcnode-id="2799" href="#Fn23"><span class="u-visually-hidden" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">Footnote </span></span><span data-dcnode-id="2800" instrument_node="">23</span></a></sup><span data-dcnode-id="2797" instrument_node=""> For instance, the Commonwealth’s reforms in 2005 combined greater access for TNAs with more delegation, which had a positive impact on decision-making performance in the following years. As another example, when the Council of Europe experienced a growth in the level of delegation in the 1990s, the decision-making index stabilized after an initial drop; then, a decade later, when the already high level of TNA access was further expanded, we observe several years of positive growth rates for both short-term and long-term performance.</span></p><p data-dcnode-id="2788"><span data-dcnode-id="2795" instrument_node="">To summarize, the results thus far are consistent with considerable portions of our theoretical argument (H1, H4, H6), while some parts receive only weak (H5) or no support (H2, H3).</span><sup data-dcnode-id="2790"><a data-dcnode-id="2791" href="#Fn24"><span class="u-visually-hidden" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Footnote </span></span><span data-dcnode-id="2792" instrument_node="">24</span></a></sup><span data-dcnode-id="2789" instrument_node=""> Three results stand out in particular. First, IOs that reform to pool decision-making powers can expect improvements in long-run decision-making performance (H1). Second, increases in TNA access yield larger performance benefits if implemented in IOs that pool decision-making to a greater extent (H4). Third, while greater delegation of authority to supranational institutions on its own is associated with drops in performance, it can have a positive effect in combination with very high levels of access for TNAs (H6). In all, these findings suggest that these institutional design features primarily matter by way of how they combine to shape decision-making performance.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2786" id="Sec12"><span data-dcnode-id="2787" instrument_node="">Control variables</span></h3><p data-dcnode-id="2757"><span data-dcnode-id="2785" instrument_node="">We evaluated a number of additional variables to control for systematic differences across IOs. We find a significant result for the </span><i data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">number of relevant IOs</span></i><span data-dcnode-id="2782" instrument_node=""> in the system (Model 4–6, Table </span><a data-dcnode-id="2780" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2781" instrument_node="">1</span></a><span data-dcnode-id="2779" instrument_node="">). In contrast with existing claims (Gray, </span><a aria-label="Reference 2018" data-dcnode-id="2777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e4697" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="2778" instrument_node="">2018</span></a><span data-dcnode-id="2776" instrument_node="">), this suggests that higher institutional density—and thus competition—within a world region makes IOs more likely to increase decision-making activities in the long-term. The absolute </span><i data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">number of decisions</span></i><span data-dcnode-id="2773" instrument_node=""> in the previous year varies greatly across IOs. As the negative coefficients in Models 1–3 (Table </span><a data-dcnode-id="2771" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2772" instrument_node="">1</span></a><span data-dcnode-id="2770" instrument_node="">) indicate, IOs producing many decisions on a yearly basis are more likely to go through short-term dips in decision-making, and IOs producing fewer decisions on an annual basis are more likely to improve their performance in the short-term. However, producing a larger number of annual decisions has a positive effect on </span><i data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">long-term performance</span></i><span data-dcnode-id="2767" instrument_node=""> (Models 4–6). Our results hence suggest that IOs adopting many decisions are more sensitive to crisis, but also are more capable of improving their decision-making performance in the long run. Against common expectations, the coefficient for our variable on the </span><i data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">bindingness</span></i><span data-dcnode-id="2764" instrument_node=""> of decisions is positive across all models in Table </span><a data-dcnode-id="2762" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2763" instrument_node="">1</span></a><span data-dcnode-id="2761" instrument_node=""> (but only significant for the long-term measure). It seems that IOs with binding decisions are more prone to expand the number of decisions in the long run—maybe because they assume binding output will be more effective or because states that agree to binding decisions are more likely to agree in general. For IOs with </span><i data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">communiqué-based</span></i><span data-dcnode-id="2758" instrument_node=""> decisions, we observe positive and significant effects across all models, suggesting that IOs with such output have higher performance relative to other IOs, all else equal.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2755" id="Sec13"><span data-dcnode-id="2756" instrument_node="">Robustness</span></h3><p data-dcnode-id="2708"><span data-dcnode-id="2754" instrument_node="">We conduct a set of robustness checks. Following Hooghe et al., (</span><a aria-label="Reference 2017" data-dcnode-id="2752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e4728" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="2753" instrument_node="">2017</span></a><span data-dcnode-id="2751" instrument_node="">: 107ff), we disaggregate delegation across phases of the decision-making process and apply separate indicators for </span><i data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">delegation of agenda-setting</span></i><span data-dcnode-id="2748" instrument_node="">, </span><i data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">delegation of final decision-making</span></i><span data-dcnode-id="2745" instrument_node=""> and </span><i data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">delegation of dispute settlement</span></i><span data-dcnode-id="2742" instrument_node="">. The results (Table </span><a data-dcnode-id="2740" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2741" instrument_node="">A.4</span></a><span data-dcnode-id="2739" instrument_node=""> in the online appendix) suggest that the negative effect of delegation found above (Models 1 and 4) does not reflect a substitution effect, that is, when delegation of implementation to a supranational bureaucracy supplants intergovernmental decision-making: the coefficient for </span><i data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">delegation on final decision-making</span></i><span data-dcnode-id="2736" instrument_node=""> is not significant (Model 14). Furthermore, a negative significant coefficient suggests that IOs with decreasing </span><i data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">delegation of agenda-setting</span></i><span data-dcnode-id="2733" instrument_node=""> have greater chances for short-term improvements of their decision-making performance (Model 13), whereas the significant negative effect for long-term performance is only found for </span><i data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">delegation on dispute settlement</span></i><span data-dcnode-id="2730" instrument_node=""> (Model 18, Table </span><a data-dcnode-id="2728" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2729" instrument_node="">A.4</span></a><span data-dcnode-id="2727" instrument_node=""> in the online appendix). We also re-estimate our models on interdependent effects with the disaggregated delegation measure and find strong support for a combined effect of </span><i data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">pooling</span></i><span data-dcnode-id="2724" instrument_node=""> and </span><i data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">delegation on agenda-setting</span></i><span data-dcnode-id="2721" instrument_node=""> (H5) for both short-term and long-term performance (Model 19 and 25, Table </span><a data-dcnode-id="2719" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2720" instrument_node="">A.5</span></a><span data-dcnode-id="2718" instrument_node=""> and Figure </span><a data-dcnode-id="2716" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2717" instrument_node="">A.7</span></a><span data-dcnode-id="2715" instrument_node=""> in the online appendix). Finally, we only find a weakly significant result for the interaction between delegation and access when we use the measure for </span><i data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">delegation on dispute settlement</span></i><span data-dcnode-id="2712" instrument_node=""> (Model 24, Table </span><a data-dcnode-id="2710" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2711" instrument_node="">A.5</span></a><span data-dcnode-id="2709" instrument_node=""> in the online appendix). These results suggest that delegation of dispute settlement and agenda setting, in particular, encumber decision-making as intergovernmental decision-making bodies become concerned with monitoring supranational bodies.</span></p><p data-dcnode-id="2673"><span data-dcnode-id="2707" instrument_node="">In Table </span><a data-dcnode-id="2705" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2706" instrument_node="">A.6</span></a><span data-dcnode-id="2704" instrument_node=""> in the online appendix, we present alternative specifications of our main models. Overall, our main results are robust. Above, we explained why our two indices give a good representation of decision-making performance. In Model 31, we show that a simpler version of our dependent variable with a shorter reference period (previous year) leads to robust results for our main independent variables.</span><sup data-dcnode-id="2699"><a data-dcnode-id="2700" href="#Fn25"><span class="u-visually-hidden" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Footnote </span></span><span data-dcnode-id="2701" instrument_node="">25</span></a></sup><span data-dcnode-id="2698" instrument_node=""> In Model 32, we then substitute our dependent variable with a non-logged version of our measure for long-term decision-making performance. This model mainly confirms the above results for institutional design, but together with Model 31, it also suggests that we may underestimate the effect of other covariates when we log the performance measure. We find significant coefficients for a positive effect of </span><i data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">TNA access</span></i><span data-dcnode-id="2695" instrument_node="">, </span><i data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">membership</span></i><span data-dcnode-id="2692" instrument_node="">, </span><i data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">IO staff</span></i><span data-dcnode-id="2689" instrument_node="">, and </span><i data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">preference heterogeneity</span></i><span data-dcnode-id="2686" instrument_node=""> on decision-making. As even our logged indices show high volatility—as exemplified by the AU in the early 1980s (Fig.&nbsp;</span><a data-dcnode-id="2684" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="2685" instrument_node="">3</span></a><span data-dcnode-id="2683" instrument_node="">), Models 33 and 34 (Table </span><a data-dcnode-id="2681" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2682" instrument_node="">A.6</span></a><span data-dcnode-id="2680" instrument_node=""> in the online appendix) exclude extreme values of the dependent variable on both ends of the scale. We find robust results, and again, more significant covariates. In this case, there is support for a positive effect of politicization—in terms of </span><i data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">IO media visibility</span></i><span data-dcnode-id="2677" instrument_node="">—and </span><i data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">democratic density</span></i><span data-dcnode-id="2674" instrument_node=""> (for long-term performance).</span></p><p data-dcnode-id="2635"><span data-dcnode-id="2672" instrument_node="">Table </span><a data-dcnode-id="2670" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2671" instrument_node="">A.6</span></a><span data-dcnode-id="2669" instrument_node=""> in the online appendix also shows two models based on an OLS estimator (Models 35 and 36) that leads to highly similar results. As we outlined above, we see strong reasons for the use of fixed effects. Models 37 and 38 (Table </span><a data-dcnode-id="2667" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2668" instrument_node="">A.6</span></a><span data-dcnode-id="2666" instrument_node=""> in the online appendix) illustrate what happens if we drop this assumption for year-fixed effects that account for unmodeled events like the global economic crisis in 2009 or 9/11.</span><sup data-dcnode-id="2661"><a data-dcnode-id="2662" href="#Fn26"><span class="u-visually-hidden" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Footnote </span></span><span data-dcnode-id="2663" instrument_node="">26</span></a></sup><span data-dcnode-id="2660" instrument_node=""> We get a highly similar outcome, except for the independent effect of </span><i data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">pooling</span></i><span data-dcnode-id="2657" instrument_node=""> on </span><i data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">long-term performance</span></i><span data-dcnode-id="2654" instrument_node=""> that is still positive, but no longer significant. If we exclude unit dummies, </span><i data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">delegation</span></i><span data-dcnode-id="2651" instrument_node=""> is still significant for </span><i data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">long-term performance</span></i><span data-dcnode-id="2648" instrument_node="">, whereas </span><i data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">pooling</span></i><span data-dcnode-id="2645" instrument_node=""> is not (Model 39 and 40, Table </span><a data-dcnode-id="2643" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2644" instrument_node="">A.6</span></a><span data-dcnode-id="2642" instrument_node=""> in the online appendix). The short-term model performs overall poorly, but </span><i data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">TNA access</span></i><span data-dcnode-id="2639" instrument_node=""> and several control variables become significant for </span><i data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">long-term performance</span></i><span data-dcnode-id="2636" instrument_node="">.</span></p><p data-dcnode-id="2606"><span data-dcnode-id="2634" instrument_node="">In Models 41, 42, and 43 in Table </span><a data-dcnode-id="2632" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2633" instrument_node="">A.7</span></a><span data-dcnode-id="2631" instrument_node=""> in the online appendix, we add a lagged version of the dependent variable. The main results are robust. For </span><i data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">short-term performance</span></i><span data-dcnode-id="2628" instrument_node="">, we find additional significant coefficients for </span><i data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">membership</span></i><span data-dcnode-id="2625" instrument_node=""> (negative), </span><i data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">policy scope</span></i><span data-dcnode-id="2622" instrument_node="">, </span><i data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">IO staff</span></i><span data-dcnode-id="2619" instrument_node="">, and </span><i data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">democratic density</span></i><span data-dcnode-id="2616" instrument_node=""> (all positive) For </span><i data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">long-term performance</span></i><span data-dcnode-id="2613" instrument_node="">, the absolute </span><i data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">number of decisions</span></i><span data-dcnode-id="2610" instrument_node=""> is correlated with the lagged dependent variable. In the end, Models 41 and Model 43 (without </span><i data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">N. of decisions</span></i><span data-dcnode-id="2607" instrument_node="">) add robustness to our main results.</span></p><p data-dcnode-id="2586"><span data-dcnode-id="2605" instrument_node="">Finally, we control for the composition of our sample. Models 44 and 45 present the results for Models 1 and 4 from Table </span><a data-dcnode-id="2603" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2604" instrument_node="">1</span></a><span data-dcnode-id="2602" instrument_node=""> without communiqué-based IOs. Again, we find robust results. When we drop the years before the end of the Cold War, the main results remain robust (Model 46 and 47, Table </span><a data-dcnode-id="2600" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2601" instrument_node="">A.7</span></a><span data-dcnode-id="2599" instrument_node=""> in the online appendix). In this case, we even find support for a positive effect of </span><i data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">media coverage</span></i><span data-dcnode-id="2596" instrument_node=""> on </span><i data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">long-term performance</span></i><span data-dcnode-id="2593" instrument_node="">, and a negative effect of </span><i data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">preference heterogeneity</span></i><span data-dcnode-id="2590" instrument_node=""> and </span><i data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">democratic density</span></i><span data-dcnode-id="2587" instrument_node=""> in the short term. The same holds when we exclude large IOs (i.e., the UN and EU) from our sample, since these IOs are often described as special cases (Models 48 and 49).</span></p></div></div></section><section data-dcnode-id="2553" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="2554" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2581" id="Sec14"><span data-dcnode-id="2582" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="2555" id="Sec14-content"><p data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Arriving at decisions is a first and necessary requirement for IOs to make a difference in world politics. Yet, so far, our understanding of the factors contributing to decision-making performance in IOs has been limited. This article attempts to address this gap.</span></p><p data-dcnode-id="2577"><span data-dcnode-id="2578" instrument_node="">We arrive at several key findings. Importantly, we establish that variation in decision-making performance across and within IOs is systematically shaped by features of institutional design. Yet institutional design features tend to shape decision-making performance in more complex ways than typically anticipated. Independently, only pooling has a positive effect on IO decision-making. Delegation in fact appears to have a negative average effect. Instead, we find that the most substantial effects of these design features reside in how they interact with one another. TNA access has a more positive effect on decision-making performance when pooling is greater. Without pooling, the resources that TNAs offer to decision-making can be easily outweighed by the power of the national veto. Also, the effect of increased delegation is conditional on the extent of TNA access—its observed independent negative effect is reduced or even turned around for very high values of TNA access. These findings suggest that viewing design features in isolation of one another underestimates the importance of institutional design for IO decision-making performance.</span></p><p data-dcnode-id="2566"><span data-dcnode-id="2576" instrument_node="">In all, this article makes three broader contributions. First, inspired by the study of domestic legislative performance, we approach performance by looking at IO decision-making in terms of policy output. This approach is advanced by an original measure of decision-making performance based on the annual growth rate in output. It means that cross-sectionally, we compare IOs in terms of their output growth and not their absolute levels of output. Using this measure, we are able to make meaningful, systematic comparisons of the decision-making performance of IOs, both over time and across organizations. We argue that this approach sheds light on IO performance more broadly because IO decision-making is a crucial intermediate step between process and outcome (Gutner &amp; Thompson </span><a aria-label="Reference 2010" data-dcnode-id="2574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d31239012e4924" title="Gutner, T., &amp; Thompson, A. (2010). The Politics of IO performance (Special Issue). Review of International Organizations, 5(3), 227–385."><span data-dcnode-id="2575" instrument_node="">2010</span></a><span data-dcnode-id="2573" instrument_node="">). Future research, however, is necessary to more adequately understand how decision-making performance relates to other aspects of IO performance and regime effectiveness, such as goal attainment and problem-solving. In this respect, the study of decision-making performance can also contribute to the growing scholarship on the termination and death of IOs (Debre &amp; Dijkstra, </span><a aria-label="Reference 2021" data-dcnode-id="2571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d31239012e4927" title="Debre, M. J., &amp; Dijkstra, H. (2021). Institutional design for a post-liberal order: Why some international organizations live longer than others. European Journal of International Relations, 27(1), 311–339."><span data-dcnode-id="2572" instrument_node="">2021</span></a><span data-dcnode-id="2570" instrument_node="">; Eilstrup-Sangiovanni, </span><a aria-label="Reference 2021" data-dcnode-id="2568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d31239012e4930" title="Eilstrup-Sangiovanni, M. (2021). What kills international organisations? When and why international organisations terminate. European Journal of International Relations, 27(1), 281–310."><span data-dcnode-id="2569" instrument_node="">2021</span></a><span data-dcnode-id="2567" instrument_node="">), by linking dynamics of policy output to the risk of organizational failure.</span></p><p data-dcnode-id="2558"><span data-dcnode-id="2565" instrument_node="">Second, we provide an explanation for IO decision-making performance. While previous research calls into question the role of institutional design for performance (Barnett &amp; Finnemore, </span><a aria-label="Reference 2004" data-dcnode-id="2563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d31239012e4936" title="Barnett, M., &amp; Finnemore. (2004). Rules for the World: International Organizations in Global Politics. Cornell University Press."><span data-dcnode-id="2564" instrument_node="">2004</span></a><span data-dcnode-id="2562" instrument_node="">; Gray, </span><a aria-label="Reference 2018" data-dcnode-id="2560" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e4939" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="2561" instrument_node="">2018</span></a><span data-dcnode-id="2559" instrument_node="">), we renew claims of the significance of institutional design by considering how pooling, delegation, and TNA access affect decision-making performance. In particular, we examine how the shift away from purely member-driven IOs affects the strategic setting within which decision-making occurs. While previous literature focuses on how individual features of institutional design have independent effects on IO performance, we have taken the additional step to theorize and examine how different design features interact to shape decision-making. Our findings suggest that future research should pay greater attention to how rules combine to have an impact on IOs. While we assume these interactions reflect rational combinations of design elements, it may also prove fruitful to explore potential unintended consequences. Moreover, as pooling, delegation, and TNA access are among the most profound developments in IO design in recent decades, this article contributes to understanding how these developments have transformed the impact of IOs.</span></p><p data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Third, we offer the first comparative assessment of the decision-making performance of IOs. Going beyond analysis of an individual IO, we identify general patterns and explanations of IO decision-making performance across a broad spectrum of 30 IOs from 1980 to 2011. While comparative studies of IO performance do exist, none focuses on decision-making. Consequently, this article makes a significant empirical contribution to comparative research on IOs. One question our analysis raises is whether the general patterns we observe transcend issue areas, or if they further interact with problem structures as may be inferred from rational institutionalist assumptions. Possible next steps for future research could also include in-depth case studies on how the interactions between pooling, delegation, and TNA access unfold in specific IOs, and on how de facto governance practices interfere with the effect of formal rules.</span></p></div></div></section><span data-dcnode-id="2552" instrument_node="">
</span><section data-dcnode-id="2362" data-title="Notes"><div class="c-article-section" data-dcnode-id="2363" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2550" id="notes"><span data-dcnode-id="2551" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="2364" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="2365"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="2537" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="2538"><p data-dcnode-id="2539"><span data-dcnode-id="2549" instrument_node="">We define international organizations as formal intergovernmental, multilateral and bureaucratic organizational structures established to further cooperation among states (Martin and Simmons </span><a aria-label="Reference 2012" data-dcnode-id="2547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d31239012e450" title="Martin, L. A., &amp; Simmons, B. A. (2012). International organizations and institutions. In W. Carlsnaes, T. Risse, &amp; B. A. Simmons (Eds.), Handbook of international relations (2nd ed., pp. 326–351). SAGE."><span data-dcnode-id="2548" instrument_node="">2012</span></a><span data-dcnode-id="2546" instrument_node="">; Rittberger et al., </span><a aria-label="Reference 2012" data-dcnode-id="2544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d31239012e453" title="Rittberger, V., Zangl, B., &amp; Kruck, A. (2012). International organization (2nd ed.). Palgrave Macmillan."><span data-dcnode-id="2545" instrument_node="">2012</span></a><span data-dcnode-id="2543" instrument_node="">; Hooghe and Marks </span><a aria-label="Reference 2015" data-dcnode-id="2541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d31239012e456" title="Hooghe, L., &amp; Marks, G. (2015). Delegation and pooling in international organizations. Review of International Organizations, 10(3), 305–328."><span data-dcnode-id="2542" instrument_node="">2015</span></a><span data-dcnode-id="2540" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="2527" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="2528"><p data-dcnode-id="2529"><span data-dcnode-id="2536" instrument_node="">Lall (</span><a aria-label="Reference 2017" data-dcnode-id="2534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e487" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="2535" instrument_node="">2017</span></a><span data-dcnode-id="2533" instrument_node="">) speaks about instiutional design in terms of </span><i data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">de jure</span></i><span data-dcnode-id="2530" instrument_node=""> political autonomy and finds that only de facto autonomy will result in better IO performance. However, his understanding of IO performance differs from our concept of decision-making performance.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="2517" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="2518"><p data-dcnode-id="2519"><span data-dcnode-id="2526" instrument_node="">These three features of institutional design overlap with core components of the </span><i data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">rational design of international institutions</span></i><span data-dcnode-id="2523" instrument_node=""> framework (Koremenos et al., </span><a aria-label="Reference 2001" data-dcnode-id="2521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d31239012e601" title="Koremenos, B., Lipson, C., &amp; Snidal, D. (2001). The rational design of international institutions. International Organization, 55(4), 761–799."><span data-dcnode-id="2522" instrument_node="">2001</span></a><span data-dcnode-id="2520" instrument_node="">). In our empirical analysis, we control for the effects of two components that are not captured by our privileged features (membership and scope).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="2513" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="2514"><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">We do not theorize on 3-way interaction effects. In the following, we theorize the two-way interactions in ways that are most theoretically grounded. But as with all interactions, they can go the other way. Alternative interpretations will be discussed for significant interaction terms in the results section.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="2507" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="2508"><p data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">The data on decision-making is available for a longer time period, but data for the main independent</span></p><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">variables is limited to 2011 when we use a time lag of one year.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="2500" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="2501"><p data-dcnode-id="2502"><span data-dcnode-id="2506" instrument_node="">The online appendix is available on the </span><i data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Review of International Organizations'</span></i><span data-dcnode-id="2503" instrument_node=""> webpage.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="2496" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="2497"><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Global IOs have members from more than two world regions. Multi-issue IOs operate in several policy fields and lack a single dominant issue area.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="2492" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="2493"><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">In the case of the UN, we select the Security Council over the General Assembly.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="2488" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="2489"><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Where data were not electronically available, we contacted IO secretariats and repository libraries or used secondary sources to complete the information.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="2484" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="2485"><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Excluding decision summaries from the sample would lead to a biased representation of decision-making in global governance. We control for type of decision (i.e., output) in the explanatory analysis.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="2477" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="2478"><p data-dcnode-id="2479"><span data-dcnode-id="2483" instrument_node="">For an illustration of the trend for all 30 IOs, see Figure </span><a data-dcnode-id="2481" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2482" instrument_node="">A.2</span></a><span data-dcnode-id="2480" instrument_node="">&nbsp;in the online appendix).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="12." data-dcnode-id="2455" id="Fn12"><div class="c-article-footnote--listed__content" data-dcnode-id="2456"><p data-dcnode-id="2457"><span data-dcnode-id="2476" instrument_node="">Alesina et al. (</span><a aria-label="Reference 2005" data-dcnode-id="2474" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d31239012e4122" title="Alesina, A., Angeloni, I., &amp; Schuknecht, L. (2005). What does the European Union do? Public Choice, 123(3–4), 275–319."><span data-dcnode-id="2475" instrument_node="">2005</span></a><span data-dcnode-id="2473" instrument_node="">) have mapped the expansion of EU legislation by the number of legal acts (see also Golub1999; Christensen </span><a aria-label="Reference 2010" data-dcnode-id="2471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d31239012e4125" title="Christensen, J. G. (2010). EU legislation and national regulation: Uncertain steps towards a european public policy. Public Administration, 88(1), 3–17."><span data-dcnode-id="2472" instrument_node="">2010</span></a><span data-dcnode-id="2470" instrument_node="">). Similarly, scholars have assessed the policy volume of the UN General Assembly (Marín-Bosch 1987; Holloway and Tomlinson </span><a aria-label="Reference 1995" data-dcnode-id="2468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d31239012e4128" title="Holloway, S., &amp; Tomlinson, R. (1995). The new world order and the general assembly: Bloc realignment at the UN in the Post-Cold War world. Canadian Journal of Political Science, 28(2), 227–254."><span data-dcnode-id="2469" instrument_node="">1995</span></a><span data-dcnode-id="2467" instrument_node="">) and the UN Security Council (Allen and Yuen </span><a aria-label="Reference 2014" data-dcnode-id="2465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d31239012e4131" title="Allen, S. H., &amp; Yuen, A. T. (2014). The politics of peacekeeping: UN Security Council oversight across peacekeeping missions. International Studies Quarterly, 58(3), 621–632."><span data-dcnode-id="2466" instrument_node="">2014</span></a><span data-dcnode-id="2464" instrument_node="">). In studies of international courts, the volume of decisions often features as an indicator of their effectiveness, like in the case of the European Court of Human Rights (Alter </span><a aria-label="Reference 2014" data-dcnode-id="2462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d31239012e4134" title="Alter, K. (2014). The New Terrain of International Law: Courts. Princeton University Press."><span data-dcnode-id="2463" instrument_node="">2014</span></a><span data-dcnode-id="2461" instrument_node="">; Cichowski </span><a aria-label="Reference 2006" data-dcnode-id="2459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d31239012e4138" title="Cichowski, R. A. (2006). Courts, rights and democratic participation. Comparative Political Studies, 39(1), 50–75."><span data-dcnode-id="2460" instrument_node="">2006</span></a><span data-dcnode-id="2458" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="13." data-dcnode-id="2451" id="Fn13"><div class="c-article-footnote--listed__content" data-dcnode-id="2452"><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">In our modelling approach, we adjust for IO heterogeneity by including IO fixed effects and control variables for bindingness, style, and number of decisions.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="14." data-dcnode-id="2441" id="Fn14"><div class="c-article-footnote--listed__content" data-dcnode-id="2442"><p data-dcnode-id="2443"><span data-dcnode-id="2450" instrument_node="">This means that more output is equivalent to higher decision-making performance, but only for overtime comparisons within an IO. We do not argue that a higher volume of output in IO</span><sub data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">x</span></sub><span data-dcnode-id="2447" instrument_node=""> indicates that its decision-making performance is greater than that of IO</span><sub data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">y</span></sub><span data-dcnode-id="2444" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="15." data-dcnode-id="2437" id="Fn15"><div class="c-article-footnote--listed__content" data-dcnode-id="2438"><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">In the few cases when an IO body did not meet in the preceding year, we extend the reference period by one year.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="16." data-dcnode-id="2433" id="Fn16"><div class="c-article-footnote--listed__content" data-dcnode-id="2434"><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">For the beginning of the observation period, we allow for a shorter reference period of two years to minimize the loss of information.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="17." data-dcnode-id="2429" id="Fn17"><div class="c-article-footnote--listed__content" data-dcnode-id="2430"><p data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Similar to the first measure, we allow for a shorter reference period in the beginning of the observation period. Again, we use the logged version of the absolute count to calculate the change rate.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="18." data-dcnode-id="2416" id="Fn18"><div class="c-article-footnote--listed__content" data-dcnode-id="2417"><p data-dcnode-id="2418"><span data-dcnode-id="2428" instrument_node="">See Figure </span><a data-dcnode-id="2426" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2427" instrument_node="">A.1</span></a><span data-dcnode-id="2425" instrument_node="">, </span><a data-dcnode-id="2423" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2424" instrument_node="">A.2</span></a><span data-dcnode-id="2422" instrument_node="">, and </span><a data-dcnode-id="2420" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2421" instrument_node="">A.3</span></a><span data-dcnode-id="2419" instrument_node=""> in the online appendix for an overview of the index scores for the full sample.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="19." data-dcnode-id="2409" id="Fn19"><div class="c-article-footnote--listed__content" data-dcnode-id="2410"><p data-dcnode-id="2411"><span data-dcnode-id="2415" instrument_node="">Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="2413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e4271" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="2414" instrument_node="">2017</span></a><span data-dcnode-id="2412" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="20." data-dcnode-id="2402" id="Fn20"><div class="c-article-footnote--listed__content" data-dcnode-id="2403"><p data-dcnode-id="2404"><span data-dcnode-id="2408" instrument_node="">For a full description of the coding of this variable, see Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="2406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e4280" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="2407" instrument_node="">2017</span></a><span data-dcnode-id="2405" instrument_node="">, 213–217.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="21." data-dcnode-id="2398" id="Fn21"><div class="c-article-footnote--listed__content" data-dcnode-id="2399"><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Bindingness is coded in a binary way for each type of decision instrument. In some cases, bindingness varies within instruments. For the analysis later on, we operate with the rate of binding decisions at the body-level.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="22." data-dcnode-id="2394" id="Fn22"><div class="c-article-footnote--listed__content" data-dcnode-id="2395"><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">A Hausmann test supports this theoretical argument.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="23." data-dcnode-id="2387" id="Fn23"><div class="c-article-footnote--listed__content" data-dcnode-id="2388"><p data-dcnode-id="2389"><span data-dcnode-id="2393" instrument_node="">In the robustness section, we disaggregate the </span><i data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">delegation</span></i><span data-dcnode-id="2390" instrument_node=""> variable for this interaction.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="24." data-dcnode-id="2377" id="Fn24"><div class="c-article-footnote--listed__content" data-dcnode-id="2378"><p data-dcnode-id="2379"><span data-dcnode-id="2386" instrument_node="">We acknowledge the possibility that the weak support for some of our hypotheses might be linked to our focus on formal rules. Previous research on informal governance practices in IOs (Kleine </span><a aria-label="Reference 2013" data-dcnode-id="2384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d31239012e4675" title="Kleine, M. (2013). Informal governance in the European Union: How governments make international organizations work. Cornell University Press."><span data-dcnode-id="2385" instrument_node="">2013</span></a><span data-dcnode-id="2383" instrument_node="">; Stone </span><a aria-label="Reference 2013" data-dcnode-id="2381" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d31239012e4678" title="Stone, R. W. (2013). Informal governance in international organizations: Introduction to the special issue. Review of International Organizations, 8(2), 121–136."><span data-dcnode-id="2382" instrument_node="">2013</span></a><span data-dcnode-id="2380" instrument_node="">) suggests that member states sometimes defy formal rules. However, assessing the effect of the discrepency between formal rules and their application goes beyond the scope of this study.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="25." data-dcnode-id="2373" id="Fn25"><div class="c-article-footnote--listed__content" data-dcnode-id="2374"><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">In Figure A.8, we illustrate how this version of our dependent variable – although logged&nbsp;-- has a high degree of volatility with extreme year-to-year changes.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="26." data-dcnode-id="2366" id="Fn26"><div class="c-article-footnote--listed__content" data-dcnode-id="2367"><p data-dcnode-id="2368"><span data-dcnode-id="2372" instrument_node="">Both events can be identified in the aggregate trend of decision-making in Fig.&nbsp;</span><a data-dcnode-id="2370" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2371" instrument_node="">2</span></a><span data-dcnode-id="2369" instrument_node="">.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1522" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1523" data-title="References"><div class="c-article-section" data-dcnode-id="1524" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2360" id="Bib1"><span data-dcnode-id="2361" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="1525" id="Bib1-content"><div data-container-section="references" data-dcnode-id="1526"><ul class="c-article-references" data-dcnode-id="1536"><li class="c-article-references__item js-c-reading-companion-reference
