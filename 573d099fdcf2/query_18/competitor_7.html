</span><p data-dcnode-id="3427"><span data-dcnode-id="3443" instrument_node="">Finally, delegation combines with varying degrees of TNA access. Some IOs, such as the EU, feature high delegation alongside high TNA access. Other IOs, such as the North Atlantic Treaty Organization (NATO), combine high delegation with low access for TNAs. We expect that delegation will have a more positive effect on IO decision-making at higher levels of TNA access. Cooperation with TNAs can help supranational bodies to pursue their interests and maintain their autonomy (Lake &amp; McCubbins, </span><a aria-label="Reference 2006" data-dcnode-id="3441" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d31239012e852" title="Lake, D. A., &amp; McCubbins, M. (2006). The logic of delegation to international organizations. In D. Hawkins, D. Lake, D. Nielson, &amp; M. Tierney (Eds.), Delegation and Agency in International Organizations (pp. 341–368). Cambridge University Press."><span data-dcnode-id="3442" instrument_node="">2006</span></a><span data-dcnode-id="3440" instrument_node="">), overall reducing transaction costs and resource deficits. To begin with, TNA access can assist supranational bodies in building a network of nonstate partners to support their proposals in the policy-process. For instance, when the European Commission develops new proposals for EU rules, it relies extensively on input from business, civil society, and scientists, provided through a system of expert committees (Gornitzka &amp; Sverdrup, </span><a aria-label="Reference 2011" data-dcnode-id="3438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d31239012e855" title="Gornitzka, Å., &amp; Sverdrup, U. (2011). Access of experts: Information and EU decision-making. West European Politics, 34(1), 48–70."><span data-dcnode-id="3439" instrument_node="">2011</span></a><span data-dcnode-id="3437" instrument_node="">). In addition, TNA access can help supranational bodies to enlist societal actors as watchdogs in the monitoring of state compliance, thus strengthening the credibility of commitments (Tallberg, </span><a aria-label="Reference 2015" data-dcnode-id="3435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d31239012e858" title="Tallberg, J. (2015). Orchestrating Enforcement. In K. Abbott, P. Genschel, D. Snidal, &amp; B. Zangl (Eds.), International organizations as orchestrators (pp. 166–188). Cambridge University Press."><span data-dcnode-id="3436" instrument_node="">2015</span></a><span data-dcnode-id="3434" instrument_node="">). For example, supranational bodies engaged in the monitoring of human rights are particularly reliant on information from NGOs (Landolt &amp; Woo, </span><a aria-label="Reference 2017" data-dcnode-id="3432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d31239012e861" title="Landolt, L., &amp; Woo, B. (2017). NGOs invite attention: From the United Nations Commission on Human Rights to the Human Rights Council. Journal of Human Rights, 16(4), 407–427."><span data-dcnode-id="3433" instrument_node="">2017</span></a><span data-dcnode-id="3431" instrument_node="">). Research also suggests that international courts benefit extensively in their work from cooperation with compliance constituencies (Alter, </span><a aria-label="Reference 2014" data-dcnode-id="3429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d31239012e864" title="Alter, K. (2014). The New Terrain of International Law: Courts. Princeton University Press."><span data-dcnode-id="3430" instrument_node="">2014</span></a><span data-dcnode-id="3428" instrument_node="">). These examples suggest that delegation’s effects on decision-making should be reinforced by extensive TNA access. Thus, we expect:</span></p><blockquote class="c-blockquote" data-dcnode-id="3419"><div class="c-blockquote__body" data-dcnode-id="3420"><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3422"><i data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Hypothesis 6</span></i><span data-dcnode-id="3423" instrument_node="">:&nbsp;Increased delegation will have a stronger positive effect on decision-making performance at higher levels of TNA access.</span></p><span data-dcnode-id="3421" instrument_node="">
</span></div></blockquote></div></div></section><section data-dcnode-id="3170" data-title="Decision-making performance: a new dataset"><div class="c-article-section" data-dcnode-id="3171" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3414" id="Sec6"><span data-dcnode-id="3415" instrument_node="">Decision-making performance: a new dataset</span></h2><div class="c-article-section__content" data-dcnode-id="3172" id="Sec6-content"><p data-dcnode-id="3412"><span data-dcnode-id="3413" instrument_node="">In the previous section, we developed theoretical expectations about the independent and combined effects of pooling, delegation, and TNA access. In this section, we introduce our data on IO decision output and then describe how we deal with the challenge of comparing decision-making across a heterogenous sample of IOs. We construct a novel measure based on growth rates within IOs, add a comprehensive set of control variables, and use a regression model with IO-fixed effects.</span></p><p data-dcnode-id="3378"><span data-dcnode-id="3411" instrument_node="">To study the decision-making performance of IOs, we use a new dataset covering the yearly policy output of the principal interstate decision-making bodies of 30 IOs from 1980 to 2011.</span><sup data-dcnode-id="3406"><a data-dcnode-id="3407" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">Footnote </span></span><span data-dcnode-id="3408" instrument_node="">5</span></a></sup><span data-dcnode-id="3405" instrument_node=""> Our 30 IOs were selected via a stratified random sample from a list of IOs drawn from the Correlates of War IGO (COW-IGO) Dataset (Pevehouse et al., </span><a aria-label="Reference 2020" data-dcnode-id="3403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d31239012e896" title="Pevehouse, J. C., Nordstrom, T., McManus, R. W., &amp; Jamison, A. S. (2020). Tracking organizations in the world: The Correlates of War IGO version 3.0 datasets. Journal of Peace Research, 57(3), 492–503."><span data-dcnode-id="3404" instrument_node="">2020</span></a><span data-dcnode-id="3402" instrument_node="">), adjusted based on data availability in parallel datasets (Tallberg et al., </span><a aria-label="Reference 2014" data-dcnode-id="3400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d31239012e899" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Jönsson, C. (2014). The transnational design of international organizations. International Organization, 68(4), 741–774."><span data-dcnode-id="3401" instrument_node="">2014</span></a><span data-dcnode-id="3399" instrument_node="">; Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="3397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e902" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="3398" instrument_node="">2017</span></a><span data-dcnode-id="3396" instrument_node="">) (Table </span><a data-dcnode-id="3394" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3395" instrument_node="">A.1</span></a><span data-dcnode-id="3393" instrument_node="">&nbsp;in the online appendix).</span><sup data-dcnode-id="3388"><a data-dcnode-id="3389" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Footnote </span></span><span data-dcnode-id="3390" instrument_node="">6</span></a></sup><span data-dcnode-id="3387" instrument_node=""> The sample is composed of 15 global and 15 regional IOs and it contains 15 task-specific IOs and 15 IOs dealing with a wide range of policy issues (see Table </span><a data-dcnode-id="3385" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3386" instrument_node="">A.2</span></a><span data-dcnode-id="3384" instrument_node="">&nbsp;in the online appendix).</span><sup data-dcnode-id="3379"><a data-dcnode-id="3380" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Footnote </span></span><span data-dcnode-id="3381" instrument_node="">7</span></a></sup></p><div class="c-article-table" data-container-section="table" data-dcnode-id="3363" data-test="inline-table" id="table-1"><figure data-dcnode-id="3364"><figcaption class="c-article-table__figcaption" data-dcnode-id="3375"><b data-dcnode-id="3376" data-test="table-caption" id="Tab1"><span data-dcnode-id="3377" instrument_node="">Table 1 Institutional design and decision-making performance of 30 IOs, 1980–2011</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3365"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="3366" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/tables/1" rel="nofollow"><span data-dcnode-id="3373"><span data-dcnode-id="3374" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3367" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3368" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3369" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3372" instrument_node="">

</span></a></div></figure></div><div class="c-article-table" data-container-section="table" data-dcnode-id="3348" data-test="inline-table" id="table-2"><figure data-dcnode-id="3349"><figcaption class="c-article-table__figcaption" data-dcnode-id="3360"><b data-dcnode-id="3361" data-test="table-caption" id="Tab2"><span data-dcnode-id="3362" instrument_node="">Table 2 Interaction of institutional design and decision-making performance, 1980–2011</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="3350"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="3351" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/tables/2" rel="nofollow"><span data-dcnode-id="3358"><span data-dcnode-id="3359" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3352" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3353" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3354" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3357" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3356" fill-rule="evenodd"></path><span data-dcnode-id="3355" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3338"><span data-dcnode-id="3347" instrument_node="">We focus on the policy output of the main interstate decision-making bodies, such as the Council of the EU or the General Assembly of the Organization of American States (OAS). These bodies are the principal locus of authority in an IO, establish its core policy direction, and set the overall agenda for other IO bodies. They are the closest approximation to the domestic notion of a legislator and can make political commitments that represent the collective will of the IO. In comparison, policies developed in other parts of an IO’s machinery are not suitable indicators for an IO’s overall decision-making performance. IO bureaucracies or lower-level IO bodies may produce policy reports, but such documents do not necessarily reflect the collective will or commitment of the IO membership. Focusing on the main decision-making body makes IOs more comparable. It also eliminates the risk of double-counting decisions, which could occur if the main body and preparatory bodies publish drafts of the same policy. We assume that activities at lower levels of the IOs are channeled into decisions by the main decision-making body. We select the main decision-making body according to the specification of organizational tasks in IO founding treaties (Table </span><a data-dcnode-id="3345" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3346" instrument_node="">A.1</span></a><span data-dcnode-id="3344" instrument_node="">&nbsp;in the online appendix). In cases where more than one body exists at the same level—typically multiple ministerial councils for different issue areas—we code all bodies as one.</span><sup data-dcnode-id="3339"><a data-dcnode-id="3340" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Footnote </span></span><span data-dcnode-id="3341" instrument_node="">8</span></a></sup></p><p data-dcnode-id="3325"><span data-dcnode-id="3337" instrument_node="">We collected information on the number, type, and bindingness of all decisions of the selected bodies.</span><sup data-dcnode-id="3332"><a data-dcnode-id="3333" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">Footnote </span></span><span data-dcnode-id="3334" instrument_node="">9</span></a></sup><span data-dcnode-id="3331" instrument_node=""> In many cases, main decision-making bodies adopt different types of decisions, such as resolutions, declarations, decisions, statements, and directives. We capture all types, following the nomenclature stipulated by each IO. Some of the decision-making bodies do not publicize individual decisions, but provide a summary of decisions (e.g., communiques) taken in a meeting of the main decision-making body. In order to make this output comparable to that of other decision-making bodies, we disaggregated these summaries into individual decisions.</span><sup data-dcnode-id="3326"><a data-dcnode-id="3327" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Footnote </span></span><span data-dcnode-id="3328" instrument_node="">10</span></a></sup></p><p data-dcnode-id="3314"><span data-dcnode-id="3324" instrument_node="">Before we introduce our measure of decision-making performance, we present data on the raw count of IO decisions for a selection of four IOs (Fig.&nbsp;</span><a data-dcnode-id="3322" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3323" instrument_node="">2</span></a><span data-dcnode-id="3321" instrument_node="">).</span><sup data-dcnode-id="3316"><a data-dcnode-id="3317" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">Footnote </span></span><span data-dcnode-id="3318" instrument_node="">11</span></a></sup><span data-dcnode-id="3315" instrument_node=""> These data reveal two dominant patterns, general to our sample, which have implications for the measurement of IO performance.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3290" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="3291"><figcaption data-dcnode-id="3311"><b class="c-article-section__figure-caption" data-dcnode-id="3312" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3313" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3302"><div class="c-article-section__figure-item" data-dcnode-id="3306"><a class="c-article-section__figure-link" data-dcnode-id="3307" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/2" rel="nofollow"><picture data-dcnode-id="3308"><source data-dcnode-id="3310" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11558-021-09445-x/MediaObjects/11558_2021_9445_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3309" height="687" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11558-021-09445-x/MediaObjects/11558_2021_9445_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3303" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Number of decisions, four IOs</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3292"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3293" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/2" rel="nofollow"><span data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3294" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3295" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3296" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3299" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3298" fill-rule="evenodd"></path><span data-dcnode-id="3297" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3285"><span data-dcnode-id="3289" instrument_node="">First, there is no consistent trend (positive or negative) in IO decision-making. We see neither an ever-growing amount of decisions, nor a severe waning that might point to a systemic crisis for global governance. Instead, as selectively illustrated in Fig.&nbsp;</span><a data-dcnode-id="3287" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3288" instrument_node="">2</span></a><span data-dcnode-id="3286" instrument_node="">, our data contain a range of different temporal patterns. Some IOs, like the African Union (AU), show a positive trend, whereas other IOs, including the World Health Organization (WHO), display declining output over time. What most IOs have in common, though, are periods of growth as well as decline in decision-making volumes.</span></p><p data-dcnode-id="3280"><span data-dcnode-id="3284" instrument_node="">Second, the absolute level of decision-making in these IO bodies varies dramatically. Figure&nbsp;</span><a data-dcnode-id="3282" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3283" instrument_node="">2</span></a><span data-dcnode-id="3281" instrument_node=""> shows that the output ranges from several hundred decisions a year, as in the case of the EU, to only a dozen decisions a year, as in the case of the IWC.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3278" id="Sec7"><span data-dcnode-id="3279" instrument_node="">Measuring IO decision-making performance</span></h3><p data-dcnode-id="3267"><span data-dcnode-id="3277" instrument_node="">Studies of decision-making performance in the context of individual IOs commonly use measures based on count data.</span><sup data-dcnode-id="3272"><a data-dcnode-id="3273" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">Footnote </span></span><span data-dcnode-id="3274" instrument_node="">12</span></a></sup><span data-dcnode-id="3271" instrument_node=""> However, count data are inappropriate as a measure when analyzing a larger number of IOs, since the general levels of output vary substantially across organizations, as illustrated by Fig.&nbsp;</span><a data-dcnode-id="3269" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3270" instrument_node="">2</span></a><span data-dcnode-id="3268" instrument_node="">. In an analysis using simple count data, variation across units would therefore overshadow the much smaller but important variations over time. Such analyses would thus mainly capture structural differences across IOs that are of limited theoretical interest, such as differences in the scope of the mandate of the EU and the IWC.</span></p><p data-dcnode-id="3244"><span data-dcnode-id="3266" instrument_node="">To systematically compare IO decision-making performance, we instead introduce a measure based on growth rates of decision output. Inspired by Mitchell (</span><a aria-label="Reference 2002" data-dcnode-id="3264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d31239012e4149" title="Mitchell, R. (2002). A quantitative approach to evaluating international environmental regimes. Global Environmental Politics, 2(4), 58–83."><span data-dcnode-id="3265" instrument_node="">2002</span></a><span data-dcnode-id="3263" instrument_node="">), we suggest that growth rates help to deal with the problem of heterogeneity among IOs, next to other measures.</span><sup data-dcnode-id="3258"><a data-dcnode-id="3259" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Footnote </span></span><span data-dcnode-id="3260" instrument_node="">13</span></a></sup><span data-dcnode-id="3257" instrument_node=""> First, using growth rates as a measure to normalize data “makes otherwise disparate data relatively comparable by adjusting for the initial level of the underlying activities. Calculating those percentage changes on an annual basis provides the additional benefit of re-calibrating (and thus allowing comparison across) every year” (Mitchell, </span><a aria-label="Reference 2002" data-dcnode-id="3255" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d31239012e4158" title="Mitchell, R. (2002). A quantitative approach to evaluating international environmental regimes. Global Environmental Politics, 2(4), 58–83."><span data-dcnode-id="3256" instrument_node="">2002</span></a><span data-dcnode-id="3254" instrument_node="">: 71). Thus, cross-sectionally, we are not comparing output to output but growth curves to growth curves.</span><sup data-dcnode-id="3249"><a data-dcnode-id="3250" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node="">Footnote </span></span><span data-dcnode-id="3251" instrument_node="">14</span></a></sup><span data-dcnode-id="3248" instrument_node=""> Second, growth rates allow for comparison across IOs while also capturing over time variation </span><i data-dcnode-id="3246"><span data-dcnode-id="3247" instrument_node="">within</span></i><span data-dcnode-id="3245" instrument_node=""> IOs. This serves our theoretical interests by enabling us to assess whether changes in the institutional design of a specific IO translate into changes in the growth rate of policy output. This measure of decision-making performance assumes that positive growth rates are indicative of more smoothly functioning IO machineries, while negative growth rates are indicative of IOs confronting discord and deadlock. One could object that IOs which adopt fewer decisions over time might be becoming more efficient, by conveying the same policy content in fewer decision acts, or that IOs which generate more decisions over time in fact may be becoming less efficient, by privileging an appearance of productivity. We recognize that such cases might exist. But we consider our assumption more reasonable as a starting point and note several anecdotal examples pointing in its favor. For instance, the growing productivity of the UN Security Council in the 1990s reflected smoother decision-making as the great powers vetoed fewer proposals in the new post-Cold War climate. Conversely, the drop in productivity for the WTO over the past two decades reflects the high level of discord in the organization, also illustrated through the lack of progress on the Doha Round.</span></p><p data-dcnode-id="3218"><span data-dcnode-id="3243" instrument_node="">Building on this strategy of growth rates, we introduce two different measures based on two alternative benchmarks. First, we measure </span><i data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">short-term performance</span></i><span data-dcnode-id="3240" instrument_node="">, comparing the output in the year of observation with the output in the three preceding years. This approach captures short-term changes while leveling out extreme events. If the output remains at the same level, the score of this measure is 1, and a score above 1 suggests an increase in decision-making productivity.</span><sup data-dcnode-id="3235"><a data-dcnode-id="3236" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">Footnote </span></span><span data-dcnode-id="3237" instrument_node="">15</span></a></sup><span data-dcnode-id="3234" instrument_node=""> Since the short-term volatility in policy output is high, we use the log of decisions in a given year.</span><sup data-dcnode-id="3229"><a data-dcnode-id="3230" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Footnote </span></span><span data-dcnode-id="3231" instrument_node="">16</span></a></sup><span data-dcnode-id="3228" instrument_node=""> Second, we measure </span><i data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">long-term performance,</span></i><span data-dcnode-id="3225" instrument_node=""> comparing the output in the year of observation against the mean output across all prior years.</span><sup data-dcnode-id="3220"><a data-dcnode-id="3221" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Footnote </span></span><span data-dcnode-id="3222" instrument_node="">17</span></a></sup><span data-dcnode-id="3219" instrument_node=""> By encompassing the entirety of an IO’s past history, this measure privileges the detection of structural shifts in decision-making.</span></p><p data-dcnode-id="3210"><span data-dcnode-id="3217" instrument_node="">Our measures are complementary and shed light on two slightly different aspects of the decision-making performance of IOs. In some cases, only one of the measures can adequately capture a change in the decision-making performance of an IO. For instance, when an IO recovers from a crisis only the </span><i data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">short-term performance</span></i><span data-dcnode-id="3214" instrument_node=""> measure may capture this upward trend. Conversely, when the decision output of an IO reaches and remains at an average level that exceeds that of previous decades, even limited dips can lead to positive scores for </span><i data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">long-term performance</span></i><span data-dcnode-id="3211" instrument_node="">.</span></p><p data-dcnode-id="3199"><span data-dcnode-id="3209" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="3207" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3208" instrument_node="">3</span></a><span data-dcnode-id="3206" instrument_node=""> illustrates the two measures based on data for the AU and WHO.</span><sup data-dcnode-id="3201"><a data-dcnode-id="3202" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">Footnote </span></span><span data-dcnode-id="3203" instrument_node="">18</span></a></sup><span data-dcnode-id="3200" instrument_node=""> In the case of the AU, both measures indicate growing decision-making performance in the mid-1980s, followed by a stable level of performance until the mid-1990s, and then a slight dip. The transformation of the Organization of African Unity (OAU) into the AU in 2002 led to several years of growing decision output, initially reflected as positive scores for both performance measures. However, after a few years of growth, the scores diverge as the result of a plateau effect for short-term performance: once a higher level of output is obtained for a number of years in a row, this measure does not indicate high performance any longer, as intended in our construction of the measure. At the same time, the measure of long-term performance continues to increase, as a result of the longer historical baseline.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3175" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="3176"><figcaption data-dcnode-id="3196"><b class="c-article-section__figure-caption" data-dcnode-id="3197" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3198" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3187"><div class="c-article-section__figure-item" data-dcnode-id="3191"><a class="c-article-section__figure-link" data-dcnode-id="3192" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/3" rel="nofollow"><picture data-dcnode-id="3193"><source data-dcnode-id="3195" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11558-021-09445-x/MediaObjects/11558_2021_9445_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3194" height="498" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11558-021-09445-x/MediaObjects/11558_2021_9445_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3188" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Measures of IO decision-making performance, two illustrations</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3177"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3178" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/3" rel="nofollow"><span data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3179" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3180" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3181" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3184" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3183" fill-rule="evenodd"></path><span data-dcnode-id="3182" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">The WHO represents a different pattern. During the first half of the observation period, the number of decisions was relatively stable, and the difference between short-term and long-term decision-making performance is therefore negligible. From 2000 onwards, the World Health Assembly underperformed for a number of years vis-à-vis both its historical and recent average, which is reflected in both measures. But whereas the measure for short-term performance then recovers quite quickly, as the number of decisions doubled between 2000 and 2003, the measure for long-term performance takes longer to catch up, reflecting the differences in construction of the two measures.</span></p></div></div></section><section data-dcnode-id="2970" data-title="Explanatory analysis"><div class="c-article-section" data-dcnode-id="2971" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3168" id="Sec8"><span data-dcnode-id="3169" instrument_node="">Explanatory analysis</span></h2><div class="c-article-section__content" data-dcnode-id="2972" id="Sec8-content"><p data-dcnode-id="3145"><span data-dcnode-id="3167" instrument_node="">We assess the influence of institutional design on IO decision-making performance on the basis of recent data on institutional features of IOs, reflecting our interest in the threefold shift away from the classic intergovernmental model of IO design: pooling, delegation, and TNA access. We measure the effect of majoritarian decision rules (H1) through aggregated </span><i data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">pooling</span></i><span data-dcnode-id="3164" instrument_node=""> scores taken from the Measuring International Authority dataset (MIA; see Fig.&nbsp;</span><a data-dcnode-id="3162" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3163" instrument_node="">1</span></a><span data-dcnode-id="3161" instrument_node="">).</span><sup data-dcnode-id="3156"><a data-dcnode-id="3157" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">Footnote </span></span><span data-dcnode-id="3158" instrument_node="">19</span></a></sup><span data-dcnode-id="3155" instrument_node=""> It aggregates the voting rules for agenda-setting and final decisions across the “state-dominated bodies” of an IO, weighted by bindingness and ratification.</span><sup data-dcnode-id="3150"><a data-dcnode-id="3151" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">Footnote </span></span><span data-dcnode-id="3152" instrument_node="">20</span></a></sup><span data-dcnode-id="3149" instrument_node=""> For all our main explanatory variables, we use two different versions. A first one captures the absolute level of pooling (and delegation and access) in any given year. While the time series structure of our data accounts for year-on-year changes, we add a version that indicates recent changes to design features, meaning that our ∆-variables, such as ∆Pooling, only capture the effect of changes between t-2 and t-1 on decision-making in t0. When we interact both versions, this combination allows us to better understand how institutional design affects decision-making; for example, do we only see a positive effect of </span><i data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">pooling</span></i><span data-dcnode-id="3146" instrument_node=""> in IOs previously dominated by consensus, or does additional pooling lead to positive growth rates even for IOs that already resorted to majority decision-making?</span></p><p data-dcnode-id="3134"><span data-dcnode-id="3144" instrument_node="">We measure </span><i data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">delegation</span></i><span data-dcnode-id="3141" instrument_node=""> as the allocation of authoritative competences to non-state bodies in an IO’s decision-making process (MIA). The measure aggregates political delegation in agenda setting, decision-making, and dispute settlement across six decision areas: accession, suspension, constitutional reform, budgetary allocation, financial compliance, and policy making (Fig.&nbsp;</span><a data-dcnode-id="3139" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3140" instrument_node="">1</span></a><span data-dcnode-id="3138" instrument_node="">; Hooghe et al., </span><a aria-label="Reference 2017" data-dcnode-id="3136" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d31239012e4297" title="Hooghe, L., Marks, G., Lenz, T., Bezuijen, J., Ceka, B., &amp; Derderyan, S. (2017). Measuring international authority: A postfunctionalist theory of governance (Vol. III). Oxford University Press."><span data-dcnode-id="3137" instrument_node="">2017</span></a><span data-dcnode-id="3135" instrument_node="">).</span></p><p data-dcnode-id="3123"><span data-dcnode-id="3133" instrument_node="">We measure </span><i data-dcnode-id="3131"><span data-dcnode-id="3132" instrument_node="">TNA access</span></i><span data-dcnode-id="3130" instrument_node=""> based on the depth and range of formal access to an IO’s bodies (Fig.&nbsp;</span><a data-dcnode-id="3128" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3129" instrument_node="">1</span></a><span data-dcnode-id="3127" instrument_node="">; Tallberg et al., </span><a aria-label="Reference 2014" data-dcnode-id="3125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d31239012e4309" title="Tallberg, J., Sommerer, T., Squatrito, T., &amp; Jönsson, C. (2014). The transnational design of international organizations. International Organization, 68(4), 741–774."><span data-dcnode-id="3126" instrument_node="">2014</span></a><span data-dcnode-id="3124" instrument_node="">). These two dimensions are constitutive of all participatory arrangements by defining what rights are granted and to whom. The depth of access captures the level of involvement offered to TNAs through institutional rules, and the range of access captures the breadth of TNAs entitled to participate.</span></p><p data-dcnode-id="3100"><span data-dcnode-id="3122" instrument_node="">We add a number of control variables to account for systematic differences across IOs. Membership and policy scope are two additional features of institutional design (Koremenos et al., </span><a aria-label="Reference 2001" data-dcnode-id="3120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d31239012e4315" title="Koremenos, B., Lipson, C., &amp; Snidal, D. (2001). The rational design of international institutions. International Organization, 55(4), 761–799."><span data-dcnode-id="3121" instrument_node="">2001</span></a><span data-dcnode-id="3119" instrument_node="">). With regard to membership, IR scholars have theorized that international cooperation is more difficult to establish and sustain with greater numbers of players (Axelrod &amp; Keohane, </span><a aria-label="Reference 1985" data-dcnode-id="3117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d31239012e4318" title="Axelrod, R., &amp; Keohane, R. O. (1985). Achieving cooperation under anarchy: Strategies and institutions. World Politics, 38(1), 226–254."><span data-dcnode-id="3118" instrument_node="">1985</span></a><span data-dcnode-id="3116" instrument_node="">). Controlling for membership also helps to account for changes in output that might be driven by fluctuations in any given IO’s membership. We operationalize </span><i data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">membership</span></i><span data-dcnode-id="3113" instrument_node=""> as the number of member states in a given year, using data from the COW-IGO dataset (Pevehouse et al., </span><a aria-label="Reference 2020" data-dcnode-id="3111" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d31239012e4324" title="Pevehouse, J. C., Nordstrom, T., McManus, R. W., &amp; Jamison, A. S. (2020). Tracking organizations in the world: The Correlates of War IGO version 3.0 datasets. Journal of Peace Research, 57(3), 492–503."><span data-dcnode-id="3112" instrument_node="">2020</span></a><span data-dcnode-id="3110" instrument_node="">). In terms of the scope of the issues covered by an IO, we expect it to be positively correlated with IO decision-making performance, since issue-linkages facilitate agreement and cooperation in international politics (Axelrod &amp; Keohane, </span><a aria-label="Reference 1985" data-dcnode-id="3108" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d31239012e4327" title="Axelrod, R., &amp; Keohane, R. O. (1985). Achieving cooperation under anarchy: Strategies and institutions. World Politics, 38(1), 226–254."><span data-dcnode-id="3109" instrument_node="">1985</span></a><span data-dcnode-id="3107" instrument_node="">: 239). By including a measure for policy scope, we are able to control for any changes to an IO’s mandate over time. We capture the </span><i data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">policy scope</span></i><span data-dcnode-id="3104" instrument_node=""> based on the MIA data, which measure scope as the number policy areas, ranging from one to 25, within an IO’s mandate (Hooghe et al., </span><a aria-label="Reference 2019" data-dcnode-id="3102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d31239012e4334" title="Hooghe, L., Lenz, T., &amp; Marks, G. (2019). A theory of international organization. Oxford University Press."><span data-dcnode-id="3103" instrument_node="">2019</span></a><span data-dcnode-id="3101" instrument_node="">).</span></p><p data-dcnode-id="3083"><span data-dcnode-id="3099" instrument_node="">Decision-making performance may also depend on the resources and capabilities of IOs (Elsig, </span><a aria-label="Reference 2010" data-dcnode-id="3097" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d31239012e4341" title="Elsig, M. (2010). The World Trade Organization at work: performance in a member-driven milieu. Review of International Organizations, 5(3), 345–363."><span data-dcnode-id="3098" instrument_node="">2010</span></a><span data-dcnode-id="3096" instrument_node="">; Lall, </span><a aria-label="Reference 2017" data-dcnode-id="3094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d31239012e4344" title="Lall, R. (2017). Beyond institutional design: explaining the performance of international organizations. International Organization, 71(2), 245–280."><span data-dcnode-id="3095" instrument_node="">2017</span></a><span data-dcnode-id="3093" instrument_node="">; Gray, </span><a aria-label="Reference 2018" data-dcnode-id="3091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e4347" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="3092" instrument_node="">2018</span></a><span data-dcnode-id="3090" instrument_node="">). IOs with greater administrative capabilities can maintain a higher decision-making performance. We operationalize organizational capacity of IOs as the annual count of </span><i data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">IO staff</span></i><span data-dcnode-id="3087" instrument_node="">, using data sourced from IO annual reports, UN Yearbooks, and historical editions of the Yearbook of International Organizations (see Table </span><a data-dcnode-id="3085" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="3086" instrument_node="">A.3</span></a><span data-dcnode-id="3084" instrument_node=""> in the online appendix).</span></p><p data-dcnode-id="3072"><span data-dcnode-id="3082" instrument_node="">Recent scholarship finds that competition from other IOs active in the same area affects IO performance. Gray (</span><a aria-label="Reference 2018" data-dcnode-id="3080" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d31239012e4359" title="Gray, J. (2018). Life, death, or zombie? The vitality of international organizations. International Studies Quarterly, 62(1), 1–13."><span data-dcnode-id="3081" instrument_node="">2018</span></a><span data-dcnode-id="3079" instrument_node="">, p. 5) shows that IOs seeking to promote economic cooperation have a hard time remaining active if they operate alongside other IOs with similar agendas. We capture </span><i data-dcnode-id="3077"><span data-dcnode-id="3078" instrument_node="">IO competition</span></i><span data-dcnode-id="3076" instrument_node=""> with the number of IOs that operate in the same world region, based on the COW-IGO dataset (Pevehouse et al., </span><a aria-label="Reference 2020" data-dcnode-id="3074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d31239012e4365" title="Pevehouse, J. C., Nordstrom, T., McManus, R. W., &amp; Jamison, A. S. (2020). Tracking organizations in the world: The Correlates of War IGO version 3.0 datasets. Journal of Peace Research, 57(3), 492–503."><span data-dcnode-id="3075" instrument_node="">2020</span></a><span data-dcnode-id="3073" instrument_node="">).</span></p><p data-dcnode-id="3058"><span data-dcnode-id="3071" instrument_node="">We control for the influence of powerful member states. Realist accounts of international cooperation typically reduce IO decision-making to strategic interaction among dominant states (Drezner, </span><a aria-label="Reference 2007" data-dcnode-id="3069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d31239012e4371" title="Drezner, D. (2007). All politics is global. Explaining international regulatory regimes. Princeton University Press."><span data-dcnode-id="3070" instrument_node="">2007</span></a><span data-dcnode-id="3068" instrument_node="">; Stone, </span><a aria-label="Reference 2011" data-dcnode-id="3066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d31239012e4374" title="Stone, R.W. (2011). Controlling Institutions: International Organizations and the Global Economy. Cambridge University Press."><span data-dcnode-id="3067" instrument_node="">2011</span></a><span data-dcnode-id="3065" instrument_node="">). According to this logic, hegemons that dominate an IO have a positive influence on collective decision-making, whereas competing major powers can lead to deadlock of an institution, as witnessed in the UN Security Council during the Cold War. We construct a dummy for IOs with an </span><i data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">unchallenged major power</span></i><span data-dcnode-id="3062" instrument_node="">. We follow the COW operationalization of major powers and add regional powers for the period after 1989 (see Cline et al., </span><a aria-label="Reference 2011" data-dcnode-id="3060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d31239012e4380" title="Cline, K., Rhamey, P., Henshaw, A., Sedziaka, A., Tandon, A., &amp; Volgy, T. J. (2011). Identifying Regional Powers and their Status. In T. Volgy, R. Corbetta, K. Grant, &amp; R. Baird (Eds.), Major Powers and the Quest for Status in International Politics (pp. 133–157). Palgrave Macmillan."><span data-dcnode-id="3061" instrument_node="">2011</span></a><span data-dcnode-id="3059" instrument_node="">).</span></p><p data-dcnode-id="3038"><span data-dcnode-id="3057" instrument_node="">Previous research suggests that democracies participate more in cooperative solutions, whether it be international human rights promotion (e.g., Simmons, </span><a aria-label="Reference 2009" data-dcnode-id="3055" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d31239012e4386" title="Simmons, B. A. (2009). Mobilizing for human rights: International law in domestic politics. Cambridge University Press."><span data-dcnode-id="3056" instrument_node="">2009</span></a><span data-dcnode-id="3054" instrument_node="">), trade liberalization (e.g., Mansfield et al., </span><a aria-label="Reference 2002" data-dcnode-id="3052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d31239012e4389" title="Mansfield, E., Milner, H., &amp; Rosendorff, P. (2002). Why democracies cooperate more: Electoral control and international trade agreements. International Organization, 56(3), 477–513."><span data-dcnode-id="3053" instrument_node="">2002</span></a><span data-dcnode-id="3051" instrument_node="">), or international cooperation more broadly (e.g., Mansfield &amp; Pevehouse, </span><a aria-label="Reference 2008" data-dcnode-id="3049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d31239012e4392" title="Mansfield, E., &amp; Pevehouse, J. C. (2008). Democratization and the varieties of international organizations. Journal of Conflict Resolution, 52(2), 269–294."><span data-dcnode-id="3050" instrument_node="">2008</span></a><span data-dcnode-id="3048" instrument_node="">). We operationalize the domestic commitment to democratic ideas as the </span><i data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">democratic density</span></i><span data-dcnode-id="3045" instrument_node=""> of IOs, operationalized as the share of member states with democratic regimes. We combine information on state membership in IOs from the COW-IGO dataset with information on the democratic character of domestic regimes (Cheibub et al., </span><a aria-label="Reference 2010" data-dcnode-id="3043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d31239012e4398" title="Cheibub, J. A., Gandhi, J., &amp; Vreeland, J. R. (2010). Democracy and dictatorship revisited. Public Choice, 143(1), 67–101."><span data-dcnode-id="3044" instrument_node="">2010</span></a><span data-dcnode-id="3042" instrument_node="">; Tallberg et al., </span><a aria-label="Reference 2016b" data-dcnode-id="3040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d31239012e4402" title="Tallberg, J., Sommerer, T., &amp; Squatrito, T. (2016b). Democratic memberships in international organizations: Sources of institutional design. Review of International Organizations, 11(1), 59–87."><span data-dcnode-id="3041" instrument_node="">2016b</span></a><span data-dcnode-id="3039" instrument_node="">).</span></p><p data-dcnode-id="3027"><span data-dcnode-id="3037" instrument_node="">We also control for </span><i data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">preference heterogeneity</span></i><span data-dcnode-id="3034" instrument_node="">. Previous research argues that greater heterogeneity of preferences can impede decision-making (Axelrod &amp; Keohane, </span><a aria-label="Reference 1985" data-dcnode-id="3032" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d31239012e4411" title="Axelrod, R., &amp; Keohane, R. O. (1985). Achieving cooperation under anarchy: Strategies and institutions. World Politics, 38(1), 226–254."><span data-dcnode-id="3033" instrument_node="">1985</span></a><span data-dcnode-id="3031" instrument_node="">). We use a measure of voting patterns in the UN General Assembly (UNGA) as predictor of preference heterogeneity. The more similar member states of an IO vote in the UNGA, the more homogenous their preferences are assumed to be. We use the updated data on the dyadic affinity scores from Voeten (</span><a aria-label="Reference 2013" data-dcnode-id="3029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d31239012e4414" title="Voeten, E. (2013). Data and Analyses of Voting in the UN General Assembly. In B. Reinalda (Ed.), Routledge Handbook of International Organization. London: Routledge."><span data-dcnode-id="3030" instrument_node="">2013</span></a><span data-dcnode-id="3028" instrument_node="">).</span></p><p data-dcnode-id="3016"><span data-dcnode-id="3026" instrument_node="">We control for the politicization of an IO (Zürn et al., </span><a aria-label="Reference 2012" data-dcnode-id="3024" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d31239012e4420" title="Zürn, M., Binder, M., &amp; Ecker-Ehrhardt, M. (2012). International authority and its politicization. International Theory, 4(1), 69–106."><span data-dcnode-id="3025" instrument_node="">2012</span></a><span data-dcnode-id="3023" instrument_node="">), as decision output could be positively or negatively affected by an IO being in the public spotlight. We use an indicator that captures IO </span><i data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">media coverage</span></i><span data-dcnode-id="3020" instrument_node=""> as references to the name in six leading global newswires (Bes et al., </span><a aria-label="Reference 2019" data-dcnode-id="3018" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d31239012e4426" title="Bes, B. J., Sommerer, T., &amp; Agné, H. (2019). On legitimacy crises and the resources of global governance institutions: A surprisingly weak relationship? Global Policy, 10(3), 313–326."><span data-dcnode-id="3019" instrument_node="">2019</span></a><span data-dcnode-id="3017" instrument_node="">), assuming that more references are equivalent to higher public attention.</span></p><p data-dcnode-id="2999"><span data-dcnode-id="3015" instrument_node="">We include the lagged </span><i data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">number of decisions</span></i><span data-dcnode-id="3012" instrument_node=""> to control for differences in the level of productivity, and we expect that the absolute number of decisions is negatively correlated with the change rate of an IO decision-making body. The variable </span><i data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">bindingness</span></i><span data-dcnode-id="3009" instrument_node=""> captures the share of binding decisions in the annual output of an IO.</span><sup data-dcnode-id="3004"><a data-dcnode-id="3005" href="#Fn21"><span class="u-visually-hidden" data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Footnote </span></span><span data-dcnode-id="3006" instrument_node="">21</span></a></sup><span data-dcnode-id="3003" instrument_node=""> And finally, we include a dummy variable for </span><i data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">communiqué-style IOs</span></i><span data-dcnode-id="3000" instrument_node=""> that do not issue individual decisions, expecting that lower formality in decision-making output leads to higher volatility. Both of these variables control for the type of policy output.</span></p><p data-dcnode-id="2973"><span data-dcnode-id="2998" instrument_node="">To test our hypotheses regarding IO decision-making performance, we employ linear regression models. In addition to the control variables that cover a range of alternative explanations, we add IO dummies to account for IO-specific effects and year-fixed effects to capture events that affect all IOs in a similar way.</span><sup data-dcnode-id="2993"><a data-dcnode-id="2994" href="#Fn22"><span class="u-visually-hidden" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Footnote </span></span><span data-dcnode-id="2995" instrument_node="">22</span></a></sup><span data-dcnode-id="2992" instrument_node=""> All independent variables are lagged by 1 year. We cluster standard errors at the IO level to account for potential dependence within units. To test our hypotheses on the independent effects of institutional design, we first estimate a series of regression models of </span><i data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">short-term performance</span></i><span data-dcnode-id="2989" instrument_node=""> and </span><i data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">long-term performance</span></i><span data-dcnode-id="2986" instrument_node=""> (Table </span><a data-dcnode-id="2984" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2985" instrument_node="">1</span></a><span data-dcnode-id="2983" instrument_node="">). We vary the specifications to test the effects of the absolute levels of delegation, pooling, and TNA access (Models 1 and 4); the effect of changes in delegation, pooling, and TNA access (Models 2 and 5); and&nbsp;the effect of interactions between absolute levels and changes (Models 3 and 6).We then test our hypotheses on the interaction between the three dimensions of institutional design (Table </span><a data-dcnode-id="2981" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2982" instrument_node="">2</span></a><span data-dcnode-id="2980" instrument_node="">; Model 7–14). Tables </span><a data-dcnode-id="2978" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2979" instrument_node="">1</span></a><span data-dcnode-id="2977" instrument_node=""> and </span><a data-dcnode-id="2975" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2976" instrument_node="">2</span></a><span data-dcnode-id="2974" instrument_node=""> show only those models with significant interaction terms.</span></p></div></div></section><section data-dcnode-id="2583" data-title="Results"><div class="c-article-section" data-dcnode-id="2584" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2968" id="Sec9"><span data-dcnode-id="2969" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="2585" id="Sec9-content"><p data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">What role do the institutional design features of pooling, delegation, and TNA access have in explaining the decision-making performance of IOs? Our findings suggest that some features of institutional design have an independent effect, but that the most substantive effects emerge when these features interact to produce constellations beneficial for decision-making. These findings are robust to alternatives to our main modelling strategy. In this section, we elaborate on these findings.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2964" id="Sec10"><span data-dcnode-id="2965" instrument_node="">Independent effects of IO design</span></h3><p data-dcnode-id="2938"><span data-dcnode-id="2963" instrument_node="">With regard to the independent effects of the three elements of institutional design privileged in our approach, we find that </span><i data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">pooling</span></i><span data-dcnode-id="2960" instrument_node=""> has a positive effect on performance (H1). The coefficient for </span><i data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">pooling</span></i><span data-dcnode-id="2957" instrument_node=""> is positive and significant for long-term performance (Model 4–6, Table </span><a data-dcnode-id="2955" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2956" instrument_node="">1</span></a><span data-dcnode-id="2954" instrument_node="">). Leaving pure intergovernmentalism behind and moving towards majority voting makes IO decision-making more productive in the long run. On average, moving from the first quartile of pooling (0.12) to the third (0.37) is associated with a 0.14 increase in the long-term performance index (see Figure </span><a data-dcnode-id="2952" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2953" instrument_node="">A.4</span></a><span data-dcnode-id="2951" instrument_node="">&nbsp;in the online appendix). By way of example, when the Lisbon Treaty of 2009 increased pooling in the EU from 0.22 to 0.27, our model predicts a 0.05 point increase in the long-term index. Empirically, we observe a 0.04 increase from 2010 to 2011, corresponding to an increase of about 120 decisions. The positive interaction term of </span><i data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">pooling</span></i><span data-dcnode-id="2948" instrument_node=""> and Δ</span><i data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node=""> pooling</span></i><span data-dcnode-id="2945" instrument_node=""> in Model 3 (Table </span><a data-dcnode-id="2943" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2944" instrument_node="">1</span></a><span data-dcnode-id="2942" instrument_node="">) indicates that changes to pooling can improve the short-term performance of IOs. When member states of IOs with an already high level of pooling further expand the use of majority voting—like the AU in 2004—we observe a positive and significant effect on decision-making in the short-term. By contrast, if such a reform occurred in an IO dominated by consensus—as in the case of the Arab Maghreb Union (AMU) in 1991, we see a negative net effect for Δ</span><i data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node=""> pooling</span></i><span data-dcnode-id="2939" instrument_node="">.
</span></p><p data-dcnode-id="2921"><span data-dcnode-id="2937" instrument_node="">While we expected that </span><i data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">delegation</span></i><span data-dcnode-id="2934" instrument_node=""> of authority to supranational bodies would have a positive effect on decision-making performance (H2), we do not find support for this hypothesis. Instead, decision-making performance appears to be adversely affected by further delegation. This result holds for both short-term and long-term performance (Models 1 and 4, Table </span><a data-dcnode-id="2932" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2933" instrument_node="">1</span></a><span data-dcnode-id="2931" instrument_node="">). The predicted means of our dependent variable in Figure </span><a data-dcnode-id="2929" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="2930" instrument_node="">A.5</span></a><span data-dcnode-id="2928" instrument_node=""> (in the online appendix) show that moving from the first quartile of </span><i data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">delegation</span></i><span data-dcnode-id="2925" instrument_node=""> (0.08) to the third (0.25) is associated with a decrease of the short-term index score from 1.14 to 1.02. As an example, holding all other characteristics of the IWC fixed at their 1991 levels, such a shift in delegation would translate into a decision output of four, instead of the six resolutions it did pass. A minor exception to this pattern of negative effects is the positive effect of increased delegation on long-term performance for IOs with no prior delegation (Model 6, Table </span><a data-dcnode-id="2923" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2924" instrument_node="">1</span></a><span data-dcnode-id="2922" instrument_node="">). It suggests that an extension of delegation from very low levels can have positive effects, as illustrated by the examples of Asia–Pacific Economic Cooperation (APEC) in the mid-1990s and the Shanghai Cooperation Organization (SCO) in 2005, both of which showed growing decision rates once they started to build up administrative capacities.</span></p><p data-dcnode-id="2904"><span data-dcnode-id="2920" instrument_node="">While the limited support for Hypothesis 2 goes against widely held expectations concerning the benefits of delegation for decision-making, this negative effect might be caused by the costs that delegation carries alongside its recognized benefits (Tallberg, </span><a aria-label="Reference 2002" data-dcnode-id="2918" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d31239012e4538" title="Tallberg, J. (2002). Delegation to supranational institutions: Why, how, and with what consequences? West European Politics, 25(1), 23–46."><span data-dcnode-id="2919" instrument_node="">2002</span></a><span data-dcnode-id="2917" instrument_node="">; Bradley &amp; Kelley, </span><a aria-label="Reference 2008" data-dcnode-id="2915" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d31239012e4541" title="Bradley, C., &amp; Kelley, J. (2008). The concept of international delegation. Law and Contemporary Problems, 71(1), 1–36."><span data-dcnode-id="2916" instrument_node="">2008</span></a><span data-dcnode-id="2914" instrument_node="">). For example, autonomous supranational bodies can pursue their own preferences (Pollack, </span><a aria-label="Reference 1997" data-dcnode-id="2912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d31239012e4544" title="Pollack, M. (1997). Delegation, agency, and agenda setting in the European community. International Organization, 51(1), 99–134."><span data-dcnode-id="2913" instrument_node="">1997</span></a><span data-dcnode-id="2911" instrument_node="">; Barnett &amp; Finnemore, </span><a aria-label="Reference 2004" data-dcnode-id="2909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d31239012e4547" title="Barnett, M., &amp; Finnemore. (2004). Rules for the World: International Organizations in Global Politics. Cornell University Press."><span data-dcnode-id="2910" instrument_node="">2004</span></a><span data-dcnode-id="2908" instrument_node="">), requiring states to invest scarce resources and time in monitoring supranational bodies (Hawkins et al., </span><a aria-label="Reference 2006" data-dcnode-id="2906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d31239012e4550" title="Hawkins, D., Lake, D., Nielson, D., &amp; Tierney, M. (Eds.). (2006). Delegation and agency in international organizations. Cambridge University Press."><span data-dcnode-id="2907" instrument_node="">2006</span></a><span data-dcnode-id="2905" instrument_node="">). In addition, it may be that delegation in some areas of the policy process replaces intergovernmental decision-making—a possibility we test for below in the robustness checks.</span></p><p data-dcnode-id="2896"><span data-dcnode-id="2903" instrument_node="">Neither do we find support for an independent positive effect of </span><i data-dcnode-id="2901"><span data-dcnode-id="2902" instrument_node="">TNA access</span></i><span data-dcnode-id="2900" instrument_node=""> (H3). This result holds for short- and long-term performance. Involving TNAs in policy-making does not appear to have a systematic independent influence on the ability of IOs to increase their decision-making output. These findings suggest that TNA access may have mixed effects on decision-making (Rasmussen &amp; Toshkov, </span><a aria-label="Reference 2013" data-dcnode-id="2898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d31239012e4559" title="Rasmussen, A., &amp; Toshkov, D. (2013). The effect of stakeholder involvement on legislative duration: consultation of external actors and legislative duration in the European Union. European Union Politics, 14(3), 366–387."><span data-dcnode-id="2899" instrument_node="">2013</span></a><span data-dcnode-id="2897" instrument_node="">), and may indicate that the benefits of TNA access relate to the quality and design of individual policies rather than the overall ability of IOs to arrive at decisions.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2894" id="Sec11"><span data-dcnode-id="2895" instrument_node="">Interactions between pooling, delegation, and access</span></h3><p data-dcnode-id="2883"><span data-dcnode-id="2893" instrument_node="">The mixed evidence for the expected independent positive effects of </span><i data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">pooling</span></i><span data-dcnode-id="2890" instrument_node="">, </span><i data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">delegation</span></i><span data-dcnode-id="2887" instrument_node="">, and </span><i data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">access</span></i><span data-dcnode-id="2884" instrument_node=""> (H1-H3) may raise doubts as to whether the decline of the archetypical state-dominated IO translates into more efficient and productive global governance. Our analysis, however, shows that positive effects become visible when we look at the interplay between these elements of institutional design (H4-H6). More than two thirds of all organizational reforms captured in our data include more than one design element in a single reform, and more than 50 percent include all three elements. We find a number of significant interaction effects, the majority of which are positive. This suggests that institutional design matters for decision-making performance, but mainly in more complex ways than typically expected.</span></p><p data-dcnode-id="2860"><span data-dcnode-id="2882" instrument_node="">As predicted, we find that increased </span><i data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">TNA access</span></i><span data-dcnode-id="2879" instrument_node=""> has a stronger positive effect on IO decision-making at higher levels of pooling (H4). When the adoption of decisions is not based on a consensus rule, expanding the inclusion of non-state actors increases decision-making performance. This result holds for both </span><i data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">short-term performance</span></i><span data-dcnode-id="2876" instrument_node=""> (Model 7, Table </span><a data-dcnode-id="2874" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2875" instrument_node="">2</span></a><span data-dcnode-id="2873" instrument_node="">) and </span><i data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">long-term performance</span></i><span data-dcnode-id="2870" instrument_node=""> (Model 10, Table </span><a data-dcnode-id="2868" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="2869" instrument_node="">2</span></a><span data-dcnode-id="2867" instrument_node="">). We show the predicted means of our dependent variable&nbsp;for this interaction in Fig.&nbsp;</span><a data-dcnode-id="2865" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="2866" instrument_node="">4</span></a><span data-dcnode-id="2864" instrument_node="">. We now observe that the prediction for moving from the first quartile of TNA access (0.17) to the third (0.74) varies with the level of </span><i data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">pooling</span></i><span data-dcnode-id="2861" instrument_node="">. While this shift at the lowest level of pooling is associated with 0.17 decrease in the long-term performance index, it contributes to a 0.24 increase at the highest level of pooling. The Andean Community (CAN) exemplifies how the impact of increased TNA access is conditioned by the degree of pooling. When the organization started to expand access arrangements for TNAs in 1997, this coincided with a downturn of performance scores. This trend turned around when pooling was later expanded in 2000. Similarly, the OAS expanded TNA access in 1997, but only after decision-making rules had been changed in 2002 to favor majoritarianism (pooling increased from 0.29 to 0.41) can we observe an increase in both performance indicators.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2836" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="2837"><figcaption data-dcnode-id="2857"><b class="c-article-section__figure-caption" data-dcnode-id="2858" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="2859" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2848"><div class="c-article-section__figure-item" data-dcnode-id="2852"><a class="c-article-section__figure-link" data-dcnode-id="2853" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/4" rel="nofollow"><picture data-dcnode-id="2854"><source data-dcnode-id="2856" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs11558-021-09445-x/MediaObjects/11558_2021_9445_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="2855" height="459" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s11558-021-09445-x/MediaObjects/11558_2021_9445_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2849" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Predicted means of&nbsp;decision-making performance for interaction of pooling and TNA access</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2838"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="2839" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s11558-021-09445-x/figures/4" rel="nofollow"><span data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2840" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2841" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2842" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2845" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2844" fill-rule="evenodd"></path><span data-dcnode-id="2843" instrument_node="">
