</span><h2 class="rtecenter" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">COLD FACTS Magazine</span></h2><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">&nbsp;</span></p><span data-dcnode-id="915" instrument_node="">
</span><p class="rtecenter" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The bimonthly COLD FACTS magazine is a direct link to 3,400 of the top decision-makers in the international cold chain. Published by the Global Cold Chain Alliance (GCCA), COLD FACTS is the definitive resource for the Core Partners of the Global Cold Chain Alliance, delivering detailed articles on the latest cold chain trends and advances.</span></p><span data-dcnode-id="912" instrument_node="">
