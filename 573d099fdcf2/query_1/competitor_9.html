</span><div class="uk-width-1-1 uk-row-first" data-dcnode-id="1210"><div class="uk-panel uk-panel-space widget_text" data-dcnode-id="1211"><h1 data-dcnode-id="1343" style="text-align:center;"><span data-dcnode-id="1344" instrument_node=""> Why choose GFMA?</span></h1><span data-dcnode-id="1342" instrument_node="">

                                    The limits of capacity and resources                
            </span></h3><span data-dcnode-id="1337" instrument_node="">
</span><div data-dcnode-id="1312" data-uk-parallax="{target: '#wk-68a', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1336" instrument_node="">
</span><div class="uk-h4" data-dcnode-id="1314"><p data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">In international projects small enterprises often reach their limits. Those might be:</span></p><span data-dcnode-id="1333" instrument_node="">
</span><ul data-dcnode-id="1319"><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Limits of capacity and resources</span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Knowledge gaps concerning project related specifications</span></li><span data-dcnode-id="1326" instrument_node="">
</span><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Lack of regional country specific know-how, concerning regulations, legal requirements and products</span></li><span data-dcnode-id="1323" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">No facilites and/or legal requirements to provide local services</span></li><span data-dcnode-id="1320" instrument_node="">
</span></ul><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Our team at GFMA can provide support and resources to your business wherever you are based in the world and are accustomed to working in emerging circumstances to rapidly determine your project objectives and desired milestones. We bring extensive knowledge, experience, training, and industry credentials that make our team a good fit in any organization</span></p><span data-dcnode-id="1315" instrument_node="">
</span></div><span data-dcnode-id="1313" instrument_node="">
</span></div><span data-dcnode-id="1311" instrument_node="">

</span></div><span data-dcnode-id="1307" instrument_node="">
</span><div class="uk-flex uk-flex-center uk-flex-middle uk-overflow-hidden uk-text-left uk-height-viewport" data-dcnode-id="1284" data-uk-parallax="{bg: -200,'background-color': '#000000,#ffffff'}" id="wk-699" style="height: 600px; background-size: cover; background-repeat: no-repeat; background-position: 50% 0px; background-color: rgb(0, 0, 0);"><span data-dcnode-id="1306" instrument_node="">

</span><h3 class="uk-h1 uk-margin-top-remove uk-margin-top-remove" data-dcnode-id="1303" data-uk-parallax="{target: '#wk-699', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1304" instrument_node="">

                                    The secrets of specific or project related know-how                
            </span></h3><span data-dcnode-id="1302" instrument_node="">
</span><div data-dcnode-id="1288" data-uk-parallax="{target: '#wk-699', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1301" instrument_node="">
</span><div class="uk-h4" data-dcnode-id="1290"><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">The Global Facility Management Alliance (GFMA) professionals include some of the premier subject matter experts in the Facility Management industry. </span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">
This includes persons who have contributed to the development of IFMA, DRI, and other international credentials, are published authors of blogs, manuals, and guides, and persons who have managed diverse facilities around the globe. </span></p><span data-dcnode-id="1295" instrument_node="">
</span><blockquote data-dcnode-id="1292"><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">   We are keenly aware of both the tactical and strategic actions and we are engaged to know the “best practices” and guide operators toward the “next practices” </span></p></blockquote><span data-dcnode-id="1291" instrument_node="">
</span></div><span data-dcnode-id="1289" instrument_node="">

            </span></h3><span data-dcnode-id="1278" instrument_node="">
</span><div data-dcnode-id="1250" data-uk-parallax="{target: '#wk-6a0', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1277" instrument_node="">
</span><div class="uk-h4" data-dcnode-id="1252"><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">The “global” in GFMA stands for:</span></p><span data-dcnode-id="1274" instrument_node="">
</span><ul data-dcnode-id="1254"><span data-dcnode-id="1273" instrument_node="">
</span><li data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Understand, appreciate, and work well with the vision, culture, and values of the client organization.</span></li><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1269"></p><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Coming from different parts of this world, we can help you implement and manage your projects to deliver you greater impact with less risk and disruption.</span></li><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1264"></p><span data-dcnode-id="1263" instrument_node="">
</span><li data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">We understand and know what you are talking about!</span></li><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1259"></p><span data-dcnode-id="1258" instrument_node="">
</span><li data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">We take advantage of opportunities to pass knowledge and skills to client personnel! </span></li><span data-dcnode-id="1255" instrument_node="">
</span></ul><span data-dcnode-id="1253" instrument_node="">
</span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">
</span></div><span data-dcnode-id="1247" instrument_node="">
</span></div><span data-dcnode-id="1245" instrument_node="">

</span><h3 class="uk-h1 uk-margin-top-remove uk-margin-top-remove" data-dcnode-id="1241" data-uk-parallax="{target: '#wk-6b9', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1242" instrument_node="">

                                    The significance of being close by                
            </span></h3><span data-dcnode-id="1240" instrument_node="">
</span><div data-dcnode-id="1217" data-uk-parallax="{target: '#wk-6b9', viewport: 1,velocity: 0.5,opacity: '1,1',y: '0,200'}" style="transform: translate3d(0px, 0px, 0px); opacity: 1;"><span data-dcnode-id="1239" instrument_node="">
</span><div class="uk-h4" data-dcnode-id="1219"><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Today’s Facility Manager implements, in whole or in part, every organizational strategy that involves the built environment. Issues change all the time and the opportunities for improvement never end. </span></p><span data-dcnode-id="1236" instrument_node="">
</span><ul data-dcnode-id="1221"><span data-dcnode-id="1235" instrument_node="">
</span><li data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">We work with clients in person, then offer the option of a video conference environment as the client learns the methods and builds a history of successes with their use. </span></li><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1231"></p><span data-dcnode-id="1230" instrument_node="">
</span><li data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">In the online conference environment, GFMA clients can work with a familiar consultant when they choose, for as long or as little as they choose. </span></li><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1226"></p><span data-dcnode-id="1225" instrument_node="">
</span><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">We recognize that client understanding of the tools and agility in their use will evolve and wish to support and promote that outcome.</span></li><span data-dcnode-id="1222" instrument_node="">
</span></ul><span data-dcnode-id="1220" instrument_node="">
</span></div><span data-dcnode-id="1218" instrument_node="">
