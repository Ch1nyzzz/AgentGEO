</span><div class="ui text menu share-tools" data-dcnode-id="813"><span data-dcnode-id="825" instrument_node=""> </span><a class="item social-link facebook" data-dcnode-id="823" data-share-description="Methodology" data-share-url="http://pewrsr.ch/10OGyYS" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/1996/10/25/methodology"><i class="facebook icon" data-dcnode-id="824"></i></a><span data-dcnode-id="822" instrument_node=""> </span><a class="item social-link twitter" data-dcnode-id="820" data-share-description="Methodology" data-share-url="http://pewrsr.ch/10OGyYS" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/1996/10/25/methodology"><i class="twitter icon" data-dcnode-id="821"></i></a><span data-dcnode-id="819" instrument_node=""> </span><a class="item social-link linkedin" data-dcnode-id="817" data-share-description="Methodology" data-share-url="http://pewrsr.ch/10OGyYS" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/1996/10/25/methodology"><i class="linkedin icon" data-dcnode-id="818"></i></a><span data-dcnode-id="816" instrument_node=""> </span><a class="item social-link print" data-dcnode-id="814" data-share-description="Methodology" data-share-url="" href="javascript:window.print();"><i class="print icon" data-dcnode-id="815"></i></a></div><span data-dcnode-id="812" instrument_node=""> </span></div><span data-dcnode-id="810" instrument_node="">
</span></div><span data-dcnode-id="808" instrument_node="">
</span><a class="ui large kicker" data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/1996/10/25/clinton-unites-dems-gains-working-class-independents/"><span data-dcnode-id="807" instrument_node="">Clinton Unites Dems, Gains Working Class Independents</span></a><h1 class="ui post small header" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Methodology</span></h1><span data-dcnode-id="803" instrument_node=""> </span></header><span data-dcnode-id="801" instrument_node="">
</span><div data-dcnode-id="800" id="prc-mobile-toc"></div><span data-dcnode-id="799" instrument_node="">
</span><div class="post-content" data-dcnode-id="767"><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">The survey results are based on telephone interviews conducted under the direction of Princeton Survey Research Associates among a nationwide sample of 1,938 adults (1,546 registered voters), 18 years of age or older, during the period October 14-20, 1996. For results based on the total sample one can say with 95% confidence that the error attributable to sampling and other random effects is plus or minus 2 percentage points. For results based on the registered voters one can say with 95% confidence that the error attributable to sampling and other random effects is plus or minus 3 percentage points. For results based on the likely voters one can say with 95% confidence that the error attributable to sampling and other random effects is plus or minus 3 percentage points. For results based on either Form 1 (N=769) or Form 2 (N=777), the sampling error is plus or minus 4 percentage points.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">In addition to sampling error, one should bear in mind that question wording and practical difficulties in conducting surveys can introduce error or bias into the findings of opinion polls.</span></p><span data-dcnode-id="792" instrument_node="">
</span><h3 data-dcnode-id="790" id="survey-methodology-in-detail"><span data-dcnode-id="791" instrument_node="">SURVEY METHODOLOGY IN DETAIL</span></h3><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">The sample for this survey is a random digit sample of telephone numbers selected from telephone exchanges in the continental United States. The random digit aspect of the sample is used to avoid “listing” bias and provides representation of both listed and unlisted numbers (including not-yet-listed). The design of the sample ensures this representation by random generation of the last two digits of telephone numbers selected on the basis of their area code, telephone exchange, and bank number.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">The telephone exchanges were selected with probabilities proportional to their size. The first eight digits of the sampled telephone numbers (area code, telephone exchange, bank number) were selected to be proportionally stratified by county and by telephone exchange within county. That is, the number of telephone numbers randomly sampled from within a given county is proportional to that county’s share of telephone households in the U.S. Estimates of the number of telephone households within each county are derived from 1990 Census data on residential telephone incidence that have been updated with state-level information on new telephone installations and county-level projections of the number of households. Only working banks of telephone numbers are selected. A working bank is defined as 100 contiguous telephone numbers containing three or more residential listings.</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">The sample was released for interviewing in replicates. Using replicates to control the release of sample to the field ensures that the complete call procedures are followed for the entire sample.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">At least four attempts were made to complete an interview at every sampled telephone number. The calls were staggered over times of day and days of the week to maximize the chances of making a contact with a potential respondent. All interview breakoffs and refusals were re-contacted at least once in order to attempt to convert them to completed interviews. In each contacted household, interviewers asked to speak with the “youngest male 18 or older who is at home”. If there is no eligible man at home, interviewers asked to speak with “the oldest woman 18 or older who lives in the household”. This systematic respondent selection technique has been shown empirically to produce samples that closely mirror the population in terms of age and gender.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Non-response in telephone interview surveys produces some known biases in survey-derived estimates because participation tends to vary for different subgroups of the population, and these subgroups are likely to vary also on questions of substantive interest. In order to compensate for these known biases, the sample data are weighted in analysis.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">The demographic weighting parameters are derived from a special analysis of the most recently available Census Bureau’s Current Population Survey (March 1994). This analysis produced population parameters for the demographic characteristics of households with adults 18 or older, which are then compared with the sample characteristics to construct sample weights. The analysis only included households in the continental United States that contain a telephone.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">The weights are derived using an iterative technique that simultaneously balances the distributions of all weighting parameters.</span></p><span data-dcnode-id="768" instrument_node="">
