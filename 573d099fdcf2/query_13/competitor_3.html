</span><h1 class="ui post header" data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">How News Happens</span></h1><span data-dcnode-id="1123" instrument_node=""> </span></header><span data-dcnode-id="1121" instrument_node="">
</span><div data-dcnode-id="1120" id="prc-mobile-toc"></div><span data-dcnode-id="1119" instrument_node="">
</span><div class="post-content" data-dcnode-id="794"><span data-dcnode-id="1118" instrument_node="">
</span><h2 data-dcnode-id="1116" id="a-study-of-the-news-ecosystem-of-one-american-city"><span data-dcnode-id="1117" instrument_node="">A Study of the News Ecosystem of One American City</span></h2><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1114" instrument_node="">Where does the news come from in today’s changing media?</span><img align="right" alt="" data-dcnode-id="1113" height="351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/13/legacy/u29/1leadbaltimore.png&amp;raw" width="505"></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Who really reports the news that most people get about their communities? What role do new media, blogs and specialty news sites now play?</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">How, in other words, does the modern news “ecosystem” of a large American city work? And if newspapers were to die—to the extent that we can infer from the current landscape—what would that imply for what citizens would know and not know about where they live?</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">The questions are becoming increasingly urgent. As the economic model that has subsidized professional journalism collapses, the number of people gathering news in traditional television, print and radio organizations is shrinking markedly. What, if anything, is taking up that slack?</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">The answers are a moving target; even trying to figure out how to answer them is a challenge. But a new study by the Pew Research Center’s Project for Excellence in Journalism, which takes a close look at the news ecosystem of one city suggests that while the news landscape has rapidly expanded, most of what the public learns is still overwhelmingly driven by traditional media—particularly newspapers.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">The study, which examined all the outlets that produced local news in Baltimore, Md., for one week, surveyed their output and then did a closer examination of six major narratives during the week, finds that much of the “news” people receive contains no original reporting. Fully eight out of ten stories studied simply repeated or repackaged previously published information.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">And of the stories that did contain new information nearly all, 95%, came from traditional media—most of them newspapers. These stories then tended to set the narrative agenda for most other media outlets.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1092" instrument_node="">The local papers, however, are also offering less than they once did. For all of 2009, for instance, the Sun produced 32% fewer stories on any subject than it did in 1999, and 73% fewer stories than in 1991, when the company still published an evening and morning paper with competing newsrooms. </span><a data-dcnode-id="1090" href="#fn1"><span data-dcnode-id="1091" instrument_node="">[1]</span></a><span data-dcnode-id="1089" instrument_node=""> And a comparison of one major story during the week studied—about state budget cuts—found newspapers in the area produced only one-third as many stories in 2009 as they did the last time the state made a similar round of budget cuts in 1991, and the Baltimore Sun one seventh as many. Yet the numbers suggest the addition of new media has not come close to making up the difference.</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Indeed the expanding universe of new media, including blogs, Twitter and local websites—at least in Baltimore—played only a limited role: mainly an alert system and a way to disseminate stories from other places.</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1081"><img align="left" alt="" data-dcnode-id="1083" height="273" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/13/legacy/u29/2_who_triggered.jpg&amp;raw" width="339"><span data-dcnode-id="1082" instrument_node="">New technology was more prevalent as a way for media—both traditional and new—to break news more quickly. The Web is now clearly the first place of publication.</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">And this faster dissemination of news was tied to three other trends. As news is posted faster, often with little enterprise reporting added, the official version of events is becoming more important. We found official press releases often appear word for word in first accounts of events, though often not noted as such.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">In the growing echo chamber online, formal procedures for citing and crediting can get lost. We found numerous examples of websites carrying sections of other people’s work without attribution and often suggesting original reporting was added when none was. We found elements of this in several major stories we traced.</span></p><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">And sometimes old stories that were already obsolete were posted or linked to after events had changed and the original news site had updated them.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">These are some of the results of a close examination of the media covering Baltimore, MD, during the week of July 19-25, 2009.</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1065"><strong data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">Among the findings:</span></strong></p><span data-dcnode-id="1064" instrument_node="">
</span><ul data-dcnode-id="1057"><span data-dcnode-id="1063" instrument_node="">
</span><li data-dcnode-id="1059"><span data-dcnode-id="1062" instrument_node="">The network of news media in Baltimore has already expanded remarkably. We identified 53 different news outlets that regularly produce some kind of local news content, a universe that ranges from blogs to talk radio to news sites created by former journalists. These are multi-platform operations that also make robust use of Twitter as a way means of dissemination. Twelve of those outlets did not produce any local content during the days studied.</span><a data-dcnode-id="1060" href="#fn2"><span data-dcnode-id="1061" instrument_node="">[2]</span></a></li><span data-dcnode-id="1058" instrument_node="">
</span></ul><span data-dcnode-id="1056" instrument_node="">
</span><ul data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">
</span><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Among the six major news threads studied in depth—which included stories about budgets, crime, a plan involving transit buses, and the sale of a local theater—fully 83% of stories were essentially repetitive, conveying no new information. Of the 17% that did contain new information, nearly all came from traditional media either in their legacy platforms or in new digital ones.</span></li><span data-dcnode-id="1052" instrument_node="">
</span></ul><span data-dcnode-id="1050" instrument_node="">
</span><ul data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">
</span><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">General interest newspapers like the Baltimore Sun produced half of these stories—48%—and another print medium, specialty newspapers focused on business and law, produced another 13%.</span></li><span data-dcnode-id="1046" instrument_node="">
</span></ul><span data-dcnode-id="1044" instrument_node="">
</span><ul data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Local television stations and their websites accounted for about a third (28%) of the enterprise reporting on the major stories of the week; radio accounted for 7%, all from material posted on radio station websites. The remaining nine new media outlets accounted for just 4% of the enterprise reporting we encountered.</span></li><span data-dcnode-id="1040" instrument_node="">
</span></ul><span data-dcnode-id="1038" instrument_node="">
</span><ul data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Traditional media made wide use of new platforms. Newspapers, TV and radio produced nearly a third of their stories on new platforms (31%), though that number varied by sector. Almost half of the newspapers stories studied were online rather than in print.</span></li><span data-dcnode-id="1034" instrument_node="">
</span></ul><span data-dcnode-id="1032" instrument_node="">
</span><ul data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node="">
</span><li data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">There were two cases of new media breaking information about stories. One came from the police Twitter feed in Baltimore, an example of a news maker breaking news directly to the public rather than through the press. Another was a story noticed by a local blog, that the mainstream press nearly missed entirely, involving a plan by the state to put listening devices on buses to deter crime. A newspaper reporter noticed the blog and then reported on the story, which led the state to rescind the plan.</span></li><span data-dcnode-id="1028" instrument_node="">
</span></ul><span data-dcnode-id="1026" instrument_node="">
</span><ul data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">As the press scales back on original reporting and dissemination, reproducing other people’s work becomes a bigger part of the news media system. Government, at least in this study, initiates most of the news. In the detailed examination of six major storylines, 63% of the stories were initiated by government officials, led first of all by the police. Another 14% came from the press. Interest group figures made up most of the rest.</span></li><span data-dcnode-id="1022" instrument_node="">
</span></ul><span data-dcnode-id="1020" instrument_node="">
</span><h4 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">About the Study</span></h4><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1016" instrument_node="">The study examined the news produced by every local news operation we could identify in the city—from radio talk shows, to blogs, specialized new outlets, new media sites, TV stations, radio news programs, newspapers and their various legacy media websites. We identified 53 outlets that regularly produce some kind of local news content. We tracked every piece of content these outlets produced for three days during the target week.</span><a data-dcnode-id="1014" href="#fn3"><span data-dcnode-id="1015" instrument_node="">[3]</span></a></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Then PEJ did a deeper, secondary analysis of six major story threads during the target week, charting the course of the story, where it started and how it grew, story to story, minute-by-minute. The six narratives were selected from among the biggest of the week to reflect a range of different kinds of stories, from breaking news about crime, to state government budget cuts to stories that clearly involved the use of new media. PEJ identified which stories contained new information or added new angles and which sources and people drove the narrative. And Twitter feeds about the news were tracked as well, to see who was using that technology to communicate. That analysis identified 10 additional outlets that passed information along and 15 outlets that offered Twitter updates on the major storylines of the week.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Those six major storylines are provided as detailed chapter narratives of their own in this study, allowing a reader to examine exactly how each story broke, the flow of each narrative through the course of the week, and the lessons it revealed about the news system in the city.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1003"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">The six storylines included: </span></strong></p><span data-dcnode-id="1002" instrument_node="">
</span><ul data-dcnode-id="976"><span data-dcnode-id="1001" instrument_node="">
</span><li data-dcnode-id="998"><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/maryland_governor_announces_budget_cuts" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1000" instrument_node="">The release of the governor’s plan to cut the state budget</span></a></li><span data-dcnode-id="997" instrument_node="">
</span><li data-dcnode-id="994"><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/umb_chosen_develop_swine_flu_vaccine" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="996" instrument_node="">An announcement that a local university would help develop the swine flu vaccine </span></a></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="990"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/listening_devices_buses" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="992" instrument_node="">A short-lived plan to put listening devices on buses</span></a></li><span data-dcnode-id="989" instrument_node="">
</span><li data-dcnode-id="986"><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/auctioning_senator_theater" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="988" instrument_node="">The sale of a historic local movie house</span></a></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="982"><a data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/two_police_wounded_shootout" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="984" instrument_node="">A shooting of police officers</span></a></li><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="978"><a data-dcnode-id="979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/analysis_report/crime_events_raise_concerns_about_juvenile_justice_week_july_19_six_different_storie" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="980" instrument_node="">A combination of six different events that all concerned juvenile justice in the city </span></a></li><span data-dcnode-id="977" instrument_node="">
</span></ul><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">This study is only one attempt at trying to understand who is producing news and the character of what is produced. Additional reports could tell more. But this snapshot was in many ways a typical week—marked by stories about police shootings, state budget cuts, swine flu, a big international soccer game in town and a mix of fires, accidents, traffic and weather.</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">The array of local outlets within this snapshot is already substantial, and as times goes on, new media, specialized outlets and local bloggers are almost certain to grow in number and expand their capacity, particularly if the Sun and other legacy media continue to shrink. New outlets such as local news aggregators, who combine this increasingly mixed universe into one online destination, have cropped up in some other cities such as San Diego. There is a good deal of innovation going on around the country, much of it exciting and promising. But as of 2009, this is what the news looks like in one American city.</span></p><span data-dcnode-id="969" instrument_node="">
</span><h4 data-dcnode-id="966"><span data-dcnode-id="968" instrument_node="">The Ecosystem</span><img align="right" alt="" data-dcnode-id="967" height="337" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/13/legacy/u29/3who_produced_most_content.jpg&amp;raw" width="501"></h4><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Of the more than four dozen outlets identified as producing original content about local events in Baltimore, there are four local TV stations, all with their own websites. There are five general interest newspapers: the Baltimore Sun, City Paper, Towson Times, the Washington Post and the Baltimore Times, which focused on African American culture, as well as two long-standing specialized papers—the Daily Record and the Baltimore Business Journal. There are also four general interest websites in town, from the Investigativevoice.com, a local watchdog reporting website started by former Baltimore Examiner employees, to BaltimoreBrew.com, a local news website produced mostly by former Baltimore Sun staffers. There are five local blogs, two of which focus on crime, one called Inside Charm City, a hyperlocal general interest blog produced by a single person. And there are more than 30 that exist inside the universe of the Baltimore Sun newspaper website.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="961" instrument_node="">Among more than three dozen radio stations operating in the Baltimore area, just a handful broadcast local news or talk. Those were identified on two commercial stations, WBAL and WCBM, and two public radio stations, WEAA and WYPR.</span><a data-dcnode-id="959" href="#fn4"><span data-dcnode-id="960" instrument_node="">[4]</span></a></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">That first level analysis found that, over those three days, these media produced 715 different stories about local events in the city. Those stories came from 41 different outlets. Twelve outlets produced nothing.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Local TV newsrooms produced more content than any other sector, an average of 73 stories per station (a total of 291 stories either in broadcast or on their websites out of the three day sample of 715). That was followed closely by newspapers. The five papers studied produced 186 stories during these three days, or 37 per outlet.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Yet the quantity of stories produced does not tell everything about their nature.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="947" instrument_node="">Some media were more locally focused than others. The media sector that devoted the greatest level of its coverage to local events was TV news. Fully 64% of the stories on the local 6 p.m. TV newscasts were about local matters.</span><a data-dcnode-id="945" href="#fn5"><span data-dcnode-id="946" instrument_node="">[5]</span></a><span data-dcnode-id="944" instrument_node=""> By comparison, 53% of stories studied in Baltimore area newspapers were local. In talk radio, the majority of the segments were about national or non-local events (52%).</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The new media content in new media, on the other hand, was highly local and mostly locally produced, though, as we will see, it was often brief and derivative of other news accounts. More than eight out of ten of the postings or stories (85%) were locally focused.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">The level of original work also varied. Eight out of ten newspaper stories (80%) were straight news accounts written by local staffers.</span></p><span data-dcnode-id="936" instrument_node="">
</span><div data-dcnode-id="934" style="text-align: center;"><img alt="" data-dcnode-id="935" height="339" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/13/legacy/u29/1leadingtopicsbymedia_0.gif&amp;raw" width="521"></div><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">In television, there was also less original content from staff reporters. Roughly a third the stories, 34%, were edited packages featuring correspondents doing the reporting (the TV equivalent of an original staff written story), and another 13% were anchors narrating a taped package that did not feature a correspondent from the field. But more than a third 36% were “anchor reads” and “tell stories,” often material from wire services.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">In radio there was little of what would be considered reporting. Roughly half the segments were anchors doing monologues, and 38% of the segments involved the host interviewing a guest or a caller. There was no original reporting found, either in talk radio or in the news inserts and radio headlines that were produced during the periods studied (during the 7 a.m. drive time hour).</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Looking at the topics covered, too, the news agendas of these outlets were strikingly different. The world one encounters differs dramatically depending on where one seeks his or her information.</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="923" instrument_node="">On local television, for instance, fully 23% of stories studied were about crime, twice as many as other subject.</span><a data-dcnode-id="921" href="#fn6"><span data-dcnode-id="922" instrument_node="">[6]</span></a><span data-dcnode-id="920" instrument_node=""> In newspapers (online and print) coverage of crime was almost matched by that of government and closely followed by business and education. On radio in Baltimore, by contrast, government was the No. 1 topic. New media was most often focused on government.</span></p><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">To go deeper, however, to see how the ecosystem moved, how information traveled from one sector to another, who initiated the news and who was first to transmit and frame the narratives that the rest of the media followed, the study also took a look at six of the major stories of the week more closely.</span></p><span data-dcnode-id="915" instrument_node="">
</span><h4 data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Six Major Storylines</span></h4><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">1. The proposal by Governor Martin O’Malley to cut $300 million from the state budget, or about 40% of the total cuts he sought to make from the state’s $14 billion budget.</span></p><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="904"><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">69 stories appeared across all the outlets studied during the week, only six of which came from new niche media. The Sun produced six in print (and six more online), but that was a fraction of the 49 it produced during a comparable week in covering the 1991 budget cuts.</span></li><span data-dcnode-id="905" instrument_node="">
</span></ul><span data-dcnode-id="903" instrument_node="">
</span><ul data-dcnode-id="898"><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Fully 71% of all the stories were triggered by the governor’s statements. Just 7% were the result of press enterprise.</span></li><span data-dcnode-id="899" instrument_node="">
</span></ul><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">2. A shooting incident in which a 34-year-old Baltimore man, apparently high on the drug Ecstasy, terrorized two former female companions and then shot two city police while being wounded and apprehended himself.</span></p><span data-dcnode-id="894" instrument_node="">
</span><ul data-dcnode-id="889"><span data-dcnode-id="893" instrument_node="">
</span><li data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Despite at least five separate crime-oriented blogs in Baltimore, nearly all of the information on this story came from the Sun or local television. Aside from brief mentions on two of the blogs, the niche-crime outlets were silent.</span></li><span data-dcnode-id="890" instrument_node="">
</span></ul><span data-dcnode-id="888" instrument_node="">
</span><ul data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The mainstream press and the police department used Twitter extensively to update information.</span></li><span data-dcnode-id="884" instrument_node="">
</span></ul><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">3. The announcement that the University of Maryland, Baltimore had been selected as one of eight sites nationwide that would test the new H1N1 vaccine for the National Institutes of Health.</span></p><span data-dcnode-id="879" instrument_node="">
</span><ul data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">
</span><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Media enterprise was all but absent in covering this development tied to a larger national and world event. Nearly all of the reporting came from the initial university news release and the press conference held on campus.</span></li><span data-dcnode-id="875" instrument_node="">
</span></ul><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">4. The auction of the historic Senator Theater, an old movie house in north Baltimore that continued to fight for survival while defaulting on its loans.</span></p><span data-dcnode-id="870" instrument_node="">
</span><ul data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">
</span><li data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">The press largely missed the story. Of the 15 identified stories that ran before the auction, only three raised the possibility of what ended up happening.</span></li><span data-dcnode-id="866" instrument_node="">
</span></ul><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">5. A plan by the Maryland Transit Administration to put listening devices on buses died a sudden and conclusive death once the press discovered it.</span></p><span data-dcnode-id="861" instrument_node="">
</span><ul data-dcnode-id="856"><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The death in this case revealed the power and influence that the mainstream press still holds. The story was first reported by an online niche website but went unnoticed for days until a Baltimore Sun reporter picked it up. Then, within hours, MTA killed the plan.</span></li><span data-dcnode-id="857" instrument_node="">
</span></ul><span data-dcnode-id="855" instrument_node="">
</span><ul data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Then in the echo chamber of the Web, the broadest distribution of MTA’s plans came after the agency had already killed it. Ten of the 14 local stories (and another 12 reports outside of Baltimore) “revealed” the plan as a possibility being considered after it was already dead.</span></li><span data-dcnode-id="851" instrument_node="">
</span></ul><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">6. A series of different events intertwined and formed the biggest narrative of the week—framed by an investigation by the local newspaper—involving how the state and the city approached juvenile justice and incarceration.</span></p><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">There were 78 published pieces on juvenile justice during the week. Of those, 68 came from traditional media outlets. And two news outlets – the Baltimore Sun and NBC Affiliate WBAL-TV—did almost all of the reporting. Others mostly picked up and reproduced their work.</span></li><span data-dcnode-id="842" instrument_node="">
</span></ul><span data-dcnode-id="840" instrument_node="">
</span><hr data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="835"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Footnotes</span></strong></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="829"><a data-dcnode-id="833" name="fn1" title="fn1"></a><strong data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">1. </span></strong><span data-dcnode-id="830" instrument_node="">According to Factiva, the Sun produced 23,668 2 stories on all topics from January 1 through December 31, 2009 and 34,852 in the same time frame in 1999 and 86,667 in 1991.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="823"><a data-dcnode-id="827" name="fn2" title="fn2"></a><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">2.</span></strong><span data-dcnode-id="824" instrument_node="">Three days of content was analyzed for the study. This included content from July 20, 22 and 24, 2009.</span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><a data-dcnode-id="821" name="fn3" title="fn3"></a><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">3. </span></strong><span data-dcnode-id="818" instrument_node="">Early evening local TV newscasts were recorded and analyzed. For WMAR, WJZ and WBAL, we examined the 6 p.m. newscast. WBFF, the Fox affiliate, does not air news at 6 p.m., so we examined its 5:30 p.m. newscast.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="811"><a data-dcnode-id="815" name="fn4" title="fn4"></a><strong data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">4. </span></strong><span data-dcnode-id="812" instrument_node="">A third commercial station, WJZ, could not be captured by PEJ.</span></p><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="805"><a data-dcnode-id="809" name="fn5" title="fn5"></a><strong data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">5. </span></strong><span data-dcnode-id="806" instrument_node="">This analysis examined the early evening newscasts of ABC affiliate WMAR, CBS affiliate WJZ, NBC affiliate WBAL and Fox affiliate WBFF</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="796"><a data-dcnode-id="803" name="fn6" title="fn6"></a><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">6.</span></strong><span data-dcnode-id="800" instrument_node=""> Add accidents (another 13%), and more than a third of all the coverage related to public safety—numbers that track closely with research on local TV that PEJ has produced over the years. And if one looked at the stories that led the newscasts, crime and accidents made up roughly six out of ten stories (58%). That number, incidentally, is also identical to that we found in a five-year study of more than 33,000 stories in local TV news examining 150 stations around the country. “We Interrupt This Newscast: How to Improve Local News and Win Ratings, Too.” Columbia University Press, 2007, p. 33.</span><strong data-dcnode-id="797"><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
</span></strong></p><span data-dcnode-id="795" instrument_node="">
</span></div><span data-dcnode-id="792" instrument_node="">
</span></article><span data-dcnode-id="789" instrument_node="">
