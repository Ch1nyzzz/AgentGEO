</span><h1 class="ui post header" data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Pakistani Public Opinion</span></h1><span data-dcnode-id="983" instrument_node=""> </span></header><span data-dcnode-id="981" instrument_node="">
</span><div data-dcnode-id="980" id="prc-mobile-toc"></div><span data-dcnode-id="979" instrument_node="">
</span><div class="post-content" data-dcnode-id="842"><span data-dcnode-id="978" instrument_node="">
</span><h2 data-dcnode-id="976" id="overview"><span data-dcnode-id="977" instrument_node="">Overview</span></h2><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Pakistanis see their country in crisis. They give their national government lower ratings than at any time in this decade, and almost no one is satisfied with national conditions. Crime and terrorism are seen as major problems by virtually everyone. And huge percentages of Pakistanis also see their country struggling mightily with corruption and a deteriorating economy.</span></p><span data-dcnode-id="972" instrument_node="">
</span><div class="floatright" data-dcnode-id="969"><a data-dcnode-id="970" rel="attachment wp-att-265"><img alt="" data-dcnode-id="971" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-1.gif&amp;raw"></a></div><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">A long-standing concern about Islamic extremism has grown even greater over the past year. No fewer than 69% of the Pakistanis questioned worry that extremists could take control of the country. At the same time, indifference and mixed opinions about both al Qaeda and the Taliban have given way to a strong condemnation of both groups. In 2008, just 33% held a negative view of the Taliban; today, 70% rate it unfavorably. Similarly, the percentage of Pakistanis with an unfavorable opinion of al Qaeda has jumped from 34% to 61% in the last year.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">However, growing concern about Islamic extremism has not resulted in an improved view of the United States. Opinions of America and its people remain extremely negative. Barack Obama’s global popularity is not evident in Pakistan, and America’s image remains as tarnished in that country as it was in the Bush years. Only 22% of Pakistanis think the U.S. takes their interests into account when making foreign policy decisions, essentially unchanged from 21% since 2007. Fully 64% of the public regards the U.S. as an enemy, while only 9% describe it as a partner.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Further, many express serious concerns about the U.S.-led effort to combat terrorism, both globally and in Pakistan specifically. In particular, many who are aware of the drone strikes targeting extremist leaders believe these strikes are causing too many civilian deaths and are being carried out by the U.S. without the consent of the Pakistani government.</span></p><span data-dcnode-id="959" instrument_node="">
</span><div class="floatright" data-dcnode-id="956"><a data-dcnode-id="957" rel="attachment wp-att-265"><img alt="" data-dcnode-id="958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-2.gif&amp;raw"></a></div><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="954" instrument_node="">However, for all the anti-American sentiment, the new survey by the Pew Research Center’s Global Attitudes Project also finds an openness to improving relations with the U.S. and considerable support for the </span><em data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">idea</span></em><span data-dcnode-id="951" instrument_node=""> of working with it to combat terrorism. By a margin of 53% to 29% Pakistanis say it is important that relations between the two countries improve.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Moreover, many endorse U.S. assistance for the Pakistani government in its fight with extremist groups.Nearly three-fourths of those interviewed (72%) would support U.S. financial and humanitarian aid to areas where extremist groups operate. As many as 63% back the idea of the U.S. providing intelligence and logistical support to Pakistani troops who are combating these groups. And after being asked about these forms of cooperation between Pakistan and the U.S., nearly half (47%) then say they would favor U.S. missile strikes against extremist leaders.</span></p><span data-dcnode-id="946" instrument_node="">
</span><div class="floatright" data-dcnode-id="943"><a data-dcnode-id="944" rel="attachment wp-att-265"><img alt="" data-dcnode-id="945" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-3.gif&amp;raw"></a></div><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">It is not surprising that American cooperation with the Pakistani military is popular, given the confidence that Pakistanis have in it. As many as 86% say the military is having a good influence on the country, which is far greater than the number who feel that way about the police (39%), courts (58%), and even religious leaders (64%). Just 36% say the Directorate for Inter-Services Intelligence (ISI) is having a good impact, although many respondents (41%) do not offer an opinion.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="938" instrument_node="">These are the latest findings from the 2009 Pew Global Attitudes survey of Pakistan. Face-to-face interviews were conducted with 1,254 adults in Pakistan between May 22 and June 9, 2009. The sample, which is disproportionately urban, includes Punjab, Sindh, Baluchistan, and the North West Frontier Province (NWFP). However, portions of Baluchistan and the NWFP are not included because of instability. The Federally Administered Tribal Areas (FATA) were not surveyed. The area covered by the sample represents approximately 90% of the adult population.</span><sup class="footnote" data-dcnode-id="935"><a data-dcnode-id="936" href="#fn-265-1" id="fnref-265-1"><span data-dcnode-id="937" instrument_node="">1</span></a></sup><span data-dcnode-id="934" instrument_node=""> </span><em data-dcnode-id="929"><span data-dcnode-id="933" instrument_node="">(Pakistan was surveyed as part of the Spring 2009 Pew Global Attitudes Survey, which included 24 nations and the Palestinian territories. For more findings from this survey, see </span><a data-dcnode-id="931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/global/2009/07/23/confidence-in-obama-lifts-us-image-around-the-world/"><span data-dcnode-id="932" instrument_node="">Confidence in Obama lifts U.S. Image around the World; Most Muslim Publics Not So Easily Moved</span></a><span data-dcnode-id="930" instrument_node="">, released July 23, 2009).</span></em></p><span data-dcnode-id="927" instrument_node="">
</span><h3 class="reportsubhead" data-dcnode-id="925" id="concerns-about-india"><span data-dcnode-id="926" instrument_node="">Concerns About India</span></h3><span data-dcnode-id="924" instrument_node="">
</span><div class="floatright" data-dcnode-id="921"><a data-dcnode-id="922" rel="attachment wp-att-265"><img alt="" data-dcnode-id="923" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-5.gif&amp;raw"></a></div><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Long-running concerns about India are also reflected in the poll. The dispute between Pakistan and India over Kashmir is cited as a major problem facing the country by no fewer than 88%. And growing worries about extremism notwithstanding, more Pakistanis judge India as a very serious threat to the nation (69%) than regard the Taliban (57%) or al Qaeda (41%) as very serious threats. Most Pakistanis see the U.S. as on the wrong side of this issue: by a margin of 54% to 4% the U.S. is seen as favoring India over Pakistan.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">While fears about India persist, Pakistanis express overwhelmingly positive opinions about another Asian giant — 84% have a favorable view of China and 80% consider China a partner to their country.</span></p><span data-dcnode-id="914" instrument_node="">
</span><h3 class="reportsubhead" data-dcnode-id="912" id="support-for-severe-laws"><span data-dcnode-id="913" instrument_node="">Support for Severe Laws</span></h3><span data-dcnode-id="911" instrument_node="">
</span><div class="floatright" data-dcnode-id="908"><a data-dcnode-id="909" rel="attachment wp-att-265"><img alt="" data-dcnode-id="910" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-6.gif&amp;raw"></a></div><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">One of the ironies in the survey is the extent to which Pakistanis embrace some of the severe laws associated with the Taliban and al Qaeda, even as they reject Islamic extremism and these extremist groups. The new poll finds broad support for harsh punishments: 78% favor death for those who leave Islam; 80% favor whippings and cutting off hands for crimes like theft and robbery; and 83% favor stoning adulterers.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="903" instrument_node="">Pakistani public opinion departs significantly from the Taliban on the issues of girls’ education and extremist violence. As many as 87% of Pakistanis believe it is equally important for boys and girls to be educated. The poll also finds that support for suicide bombing that targets civilians in defense of Islam remains very low. Only 5% of Pakistani Muslims believe these kinds of attacks can often or sometimes be justified; as recently as 2004 roughly four-in-ten (41%) held this view. Fully 87% now say such attacks can </span><em data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">never</span></em><span data-dcnode-id="900" instrument_node=""> be justified — the highest percentage among the Muslim publics included in the 2009 survey.</span></p><span data-dcnode-id="898" instrument_node="">
</span><h3 class="reportsubhead" data-dcnode-id="896" id="breaking-down-views-toward-the-taliban-and-al-qaeda"><span data-dcnode-id="897" instrument_node="">Breaking Down Views Toward the Taliban and Al Qaeda</span></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Analysis of the survey data finds a number of important patterns regarding views of the Taliban and al Qaeda. First, both groups are unpopular across the board. Among all the major subgroups within Pakistani society analyzed in the study, negative views of the Taliban and al Qaeda outweigh positive views.</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="floatright" data-dcnode-id="889"><a data-dcnode-id="890" rel="attachment wp-att-265"><img alt="" data-dcnode-id="891" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.pewresearch.org/wp-content/uploads/sites/2/legacy/265-7.gif&amp;raw"></a></div><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="887" instrument_node="">Second, support for both groups is low even among those who agree with some of the severe punishments endorsed by the Taliban and al Qaeda, such as stoning adulterers, cutting off the hands of thieves, and executing people who leave Islam. Still, those who disagree with these harsh measures are somewhat more likely to express an unfavorable view of both groups. For instance, among Pakistanis who </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">support</span></em><span data-dcnode-id="884" instrument_node=""> the death penalty for people who leave Islam, 69% have a negative view of the Taliban, while 77% of those who </span><em data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">oppose</span></em><span data-dcnode-id="881" instrument_node=""> the death penalty in such cases give the Taliban a negative rating.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Third, education plays a role in views about extremism. Pakistanis with higher levels of education are consistently more likely to reject the Taliban and al Qaeda.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Fourth, the Taliban and al Qaeda tend to be unpopular across regions, including the NWFP, where government forces are currently fighting extremist groups. However, Sindh stands out as the region with the most negative views. For example, 82% in Sindh have a negative opinion of the Taliban, compared with 75% in the NWFP and 67% in Punjab. More than half in Baluchistan do not offer opinions about the Taliban or al Qaeda.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Fifth, and perhaps unsurprisingly, views about the Taliban are linked to the extent to which people believe the country is threatened by extremist groups. Analysis of the data shows that people who think extremist groups may be able to seize control of the country are more likely to voice negative views about the Taliban, which has been engaged in armed-conflict with the Pakistani military.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Also of Note:</span></p><span data-dcnode-id="867" instrument_node="">
</span><ul data-dcnode-id="844"><span data-dcnode-id="866" instrument_node="">
</span><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">The nation-state is of great significance to Pakistanis, and despite important ethnic and regional differences, national identity is strong throughout the country. Overall, 89% say they think of themselves first as Pakistani, rather than as a member of their ethnic group.</span></li><span data-dcnode-id="863" instrument_node="">
</span><li data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Pakistani President Asif Ali Zardari’s ratings have plummeted: Last year, 64% had a favorable opinion of him; now just 32% hold this view.</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Zardari is much less popular than the other public figures tested: opposition leader Nawaz Sharif (79% favorable), Prime Minister Yousaf Raza Gilani (67%) and Chief Justice Iftikhar Muhammad Chaudhry (61%).</span></li><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">About seven-in-ten (72%) want the U.S. and NATO to remove their military troops from Afghanistan as soon as possible. Only 16% approve of Obama’s decision to send more troops to Afghanistan.</span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">In 2008, 53% said the economy would improve in the next 12 months. This year, only 23% believe the economy will get better.</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">The Pakistani media receives very high ratings — 77% say it is having a good influence on the country.</span></li><span data-dcnode-id="848" instrument_node="">
</span><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">While views about national conditions are overwhelmingly negative, most Pakistanis are upbeat about their personal lives — 74% say they are very or somewhat satisfied with their overall lives, and most are satisfied with their family lives and incomes. Nonetheless, compared with other nations, levels of personal satisfaction in Pakistan are relatively low.</span></li><span data-dcnode-id="845" instrument_node="">
</span></ul><span data-dcnode-id="843" instrument_node="">
</span></div><span data-dcnode-id="840" instrument_node="">
</span></article><span data-dcnode-id="837" instrument_node="">
