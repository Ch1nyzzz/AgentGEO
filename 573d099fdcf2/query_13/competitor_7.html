</span><h1 class="ui post header" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Religion in Everyday Life</span></h1><h2 class="has-text-align-left wp-block-prc-block-subtitle" data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Highly religious Americans are happier and more involved with family but are no more likely to exercise, recycle or make socially conscious consumer choices</span></h2><span data-dcnode-id="969" instrument_node=""> </span></header><span data-dcnode-id="967" instrument_node="">
</span><div data-dcnode-id="966" id="prc-mobile-toc"></div><span data-dcnode-id="965" instrument_node="">
</span><div class="post-content" data-dcnode-id="706"><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="960"><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-00/" rel="attachment wp-att-25558"><img alt="Highly religious adults more engaged with family, more likely to volunteer and happier overall" class="alignright size-full wp-image-25558" data-dcnode-id="963" height="660" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png 308w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png?resize=140,300 140w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png?resize=149,320 149w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png?resize=189,405 189w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png?resize=200,429 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-00.png?resize=260,557 260w" width="308"></a><span data-dcnode-id="961" instrument_node="">A new Pew Research Center study of the ways religion influences the daily lives of Americans finds that people who are highly religious are more engaged with their extended families, more likely to volunteer, more involved in their communities and generally happier with the way things are going in their lives.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="947"><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-01/" rel="attachment wp-att-25560"><img alt="Highly religious adults not distinctive in interpersonal interactions, health, social consciousness" class="alignright size-full wp-image-25560" data-dcnode-id="958" height="817" loading="lazy" sizes="(max-width: 311px) 100vw, 311px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png 311w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=114,300 114w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=122,320 122w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=154,405 154w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=200,525 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=260,683 260w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-01.png?resize=310,814 310w" width="311"></a><span data-dcnode-id="956" instrument_node="">For example, nearly half of highly religious Americans – defined as those who say they pray every day and attend religious services each week – gather with extended family at least once or twice a month.</span><sup class="footnote" data-dcnode-id="953"><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-1" id="fnref-25540-1"><span data-dcnode-id="955" instrument_node="">1</span></a></sup><span data-dcnode-id="952" instrument_node="">&nbsp;By comparison, just three-in-ten Americans who are less religious gather as frequently with their extended families. Roughly two-thirds of highly religious adults (65%) say they have donated money, time or goods to help the poor in the past week, compared with 41% who are less religious. And 		</span><a class="tweetable" data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttp%3A//pewrsr.ch/1S5JKIy%26text%3D40%2525%2520of%2520highly%2520religious%2520U.S.%2520adults%2520describe%2520themselves%2520as%2520%25E2%2580%259Cvery%2520happy%252C%25E2%2580%259D%2520compared%2520with%252029%2525%2520of%2520those%2520who%2520are%2520less%2520religious" target="_blank"><span data-dcnode-id="951" instrument_node="">40% of highly religious U.S. adults describe themselves as “very happy,” compared with 29% of those who are less religious </span><i class="twitter icon" data-dcnode-id="950"></i></a><span data-dcnode-id="948" instrument_node="">
		.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">These differences are found not only in the U.S. adult population as a whole but also within a variety of religious traditions (such as between Catholics who are highly religious and those who are less religious), and they persist even when controlling for other factors, including age, income, education, geographic region of residence, marital status and parental status.</span></p><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="942" instrument_node="">However, in several other areas of day-to-day life – including interpersonal interactions, attention to health and fitness, and social and environmental consciousness – Pew Research Center surveys find that people who pray every day and regularly attend religious services appear to be very similar to those who are not as religious.</span><sup class="footnote" data-dcnode-id="939"><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-2" id="fnref-25540-2"><span data-dcnode-id="941" instrument_node="">2</span></a></sup><span data-dcnode-id="938" instrument_node="">
</span></p><p data-dcnode-id="931"><span data-dcnode-id="936" instrument_node="">For instance, 		</span><a class="tweetable" data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttp%3A//pewrsr.ch/1S5JKIy%26text%3Dhighly%2520religious%2520people%2520are%2520about%2520as%2520likely%2520as%2520other%2520Americans%2520to%2520say%2520they%2520lost%2520their%2520temper%2520recently" target="_blank"><span data-dcnode-id="935" instrument_node="">highly religious people are about as likely as other Americans to say they lost their temper recently </span><i class="twitter icon" data-dcnode-id="934"></i></a><span data-dcnode-id="932" instrument_node="">
		, and they are only marginally less likely to say they told a white lie in the past week. When it comes to diet and exercise, highly religious Americans are no less likely to have overeaten in the past week, and they are no more likely to say they exercise regularly. Highly religious people also are no more likely than other Americans to recycle their household waste. And when making decisions about what goods and services to buy, they are no more&nbsp;inclined to consider the manufacturers’ environmental records or whether companies pay employees a fair wage.</span></p><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">These are among the latest findings of Pew Research Center’s U.S. Religious Landscape Study. The study and this report were made possible by The Pew Charitable Trusts, which received support for the project from Lilly Endowment Inc.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="926" instrument_node="">Two previous reports on the Landscape Study, based on a 2014 telephone survey of more than 35,000 adults, examined the </span><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2015/05/12/americas-changing-religious-landscape/"><span data-dcnode-id="925" instrument_node="">changing religious composition of the U.S. public</span></a><span data-dcnode-id="923" instrument_node=""> and described the </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2015/11/03/u-s-public-becoming-less-religious/"><span data-dcnode-id="922" instrument_node="">religious beliefs, practices and experiences</span></a><span data-dcnode-id="920" instrument_node=""> of Americans. This new report also draws on the national telephone survey but is based primarily on a supplemental survey among 3,278 participants in the Pew Research Center’s American Trends Panel, a nationally representative group of randomly selected U.S. adults surveyed online and by mail. The supplemental survey was designed to go beyond traditional measures of religious behavior – such as worship service attendance, prayer and belief in God – to examine the ways people exhibit (or do not exhibit) their religious beliefs, values and connections in their day-to-day lives.</span><sup class="footnote" data-dcnode-id="917"><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-3" id="fnref-25540-3"><span data-dcnode-id="919" instrument_node="">3</span></a></sup><span data-dcnode-id="916" instrument_node="">
</span></p><p data-dcnode-id="911"><a data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-02/" rel="attachment wp-att-25561"><img alt="Belief in God, gratitude, forgiveness and honesty top 'essentials' of what it means to be a Christian" class="alignright size-full wp-image-25561" data-dcnode-id="914" height="830" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png 309w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png?resize=112,300 112w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png?resize=119,320 119w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png?resize=151,405 151w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png?resize=200,537 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-02.png?resize=260,698 260w" width="309"></a><span data-dcnode-id="912" instrument_node="">To help explore this question, the survey asked U.S. adults whether each of a series of 16 beliefs and behaviors is “essential,” “important but not essential,” or “not important” to what their religion means to them, personally.</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Among Christians, believing in God tops the list, with fully 86% saying belief in God is “essential” to their Christian identity. In addition, roughly seven-in-ten Christians say being grateful for what they have (71%), forgiving those who have wronged them (69%) and always being honest (67%) are essential to being Christian. Far fewer say that attending religious services (35%), dressing modestly (26%), working to protect the environment (22%) or resting on the Sabbath (18%) are essential to what being Christian means to them, personally.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="906" instrument_node="">The survey posed similar questions to members of non-Christian faiths and religiously unaffiliated Americans (sometimes called religious “nones”), asking whether various behaviors are essential to “what being a moral person means to you.”</span><sup class="footnote" data-dcnode-id="903"><a data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-4" id="fnref-25540-4"><span data-dcnode-id="905" instrument_node="">4</span></a></sup><span data-dcnode-id="902" instrument_node="">&nbsp;Among the unaffiliated, honesty (58%) and gratitude (53%) are the attributes most commonly seen as essential to being a moral person. (Findings about non-Christians are discussed in more detail at the </span><a data-dcnode-id="900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/essentials-of-christian-identity-vary-by-level-of-religiosity-many-nones-say-honesty-vital-to-being-a-moral-person%23nonchristians"><span data-dcnode-id="901" instrument_node="">end of Chapter 2</span></a><span data-dcnode-id="899" instrument_node="">.)</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="896" instrument_node="">The survey shows a clear link between what people see as essential to their faith and their self-reported day-to-day behavior. Simply put, those who </span><em data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">believe</span></em><span data-dcnode-id="893" instrument_node=""> that behaving in a particular way or performing certain actions are key elements of their faith are much more likely to say they actually</span><em data-dcnode-id="891"><span data-dcnode-id="892" instrument_node=""> perform</span></em><span data-dcnode-id="890" instrument_node=""> those actions on a regular basis.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="887" instrument_node="">For example, among Christians who say that working to help the poor is essential to what being Christian means to them, about six-in-ten say they donated time, money or goods to help the poor in the past week. By comparison, fewer Christians who do </span><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">not</span></em><span data-dcnode-id="884" instrument_node=""> see helping the poor as central to their religious identity say they worked to help the poor during the previous week (42%).</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">The same pattern is seen in the survey’s questions about interpersonal interactions, health and social consciousness. Relatively few Christians see living a healthy lifestyle, buying from companies that pay fair wages or protecting the environment as key elements of their faith. But those who do see these things as essential to what it means to be a Christian are more likely than others to say they live a healthy lifestyle (by exercising, for example), consider how a company treats its employees and the environment when making purchasing decisions, or attempt to recycle or reduce waste as much as possible.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">Of course, survey data like these cannot prove that believing certain actions are obligatory for Christians actually</span><em data-dcnode-id="876"><span data-dcnode-id="877" instrument_node=""> causes</span></em><span data-dcnode-id="875" instrument_node=""> Christians to behave in particular ways. The causal arrow could point in the other direction: It may be easier for those who regularly engage in particular behaviors to cite those behaviors as essential to their faith. Conversely, it may be harder for those who do not regularly engage in particular activities (such as helping the poor) to describe those activities as essential to their faith. Nevertheless, the survey data suggest that Christians are more likely to live healthy lives, work on behalf of the poor and behave in environmentally conscious ways if they consider these things essential to what it means to be a Christian.</span></p><span data-dcnode-id="873" instrument_node="">
</span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-03/" rel="attachment wp-att-25562"><img alt="Beliefs are strongly linked with actions" class="aligncenter size-full wp-image-25562" data-dcnode-id="872" height="829" loading="lazy" sizes="(max-width: 626px) 100vw, 626px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png 626w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=227,300 227w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=160,212 160w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=306,405 306w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=200,265 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=260,344 260w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=310,411 310w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-03.png?resize=420,556 420w" width="626"></a><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="862"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-04/" rel="attachment wp-att-25563"><img alt="Most people rely on own research when making major life decisions; highly religious also rely on prayer" class="alignright size-full wp-image-25563" data-dcnode-id="869" height="603" loading="lazy" sizes="(max-width: 311px) 100vw, 311px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png 311w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=155,300 155w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=160,310 160w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=209,405 209w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=200,388 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=260,504 260w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-04.png?resize=310,601 310w" width="311"></a><span data-dcnode-id="867" instrument_node="">When asked where they look for guidance when making major life decisions, Americans overall say they rely more on their own research than on direction from experts. Fully eight-in-ten Americans say they rely “a lot” on their own research when making major decisions. By comparison, 25% say they rely a lot on the advice of professional experts, and 		</span><a class="tweetable" data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttp%3A//pewrsr.ch/1S5JKIy%26text%3Djust%252015%2525%2520rely%2520heavily%2520on%2520advice%2520from%2520religious%2520leaders" target="_blank"><span data-dcnode-id="866" instrument_node="">just 15% rely heavily on advice from religious leaders </span><i class="twitter icon" data-dcnode-id="865"></i></a><span data-dcnode-id="863" instrument_node="">
		.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">But while relatively few people look to religious leaders for guidance on major decisions, many Americans do turn to prayer when faced with important choices. Indeed, among those who are highly religious, nearly nine-in-ten (86%) say they rely “a lot” on prayer and personal religious reflection when making major life decisions, which exceeds the share of the highly religious who say they rely a lot on their own research.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Other key findings in this report include:</span></p><span data-dcnode-id="855" instrument_node="">
</span><ul data-dcnode-id="847"><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">Three-quarters of adults – including 96% of members of historically black Protestant churches and 93% of evangelical Protestants – say they thanked God for something in the past week. And two-thirds, including 91% of those in the historically black Protestant tradition and 87% of evangelicals, say they asked God for help during the past week. Fewer than one-in-ten adults (8%) say they got angry with God in the past week. (For more details on how Americans say they relate to God, see </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="852" instrument_node="">Chapter 1</span></a><span data-dcnode-id="850" instrument_node="">.)</span></li><span data-dcnode-id="848" instrument_node="">
</span></ul><span data-dcnode-id="846" instrument_node="">
</span><ul data-dcnode-id="838"><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="840"><span data-dcnode-id="844" instrument_node="">One-third of religiously unaffiliated Americans say they thanked God for something in the past week, and one-in-four have asked God for help in the past week. (For more details, see </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="843" instrument_node="">Chapter 1</span></a><span data-dcnode-id="841" instrument_node="">.)</span></li><span data-dcnode-id="839" instrument_node="">
</span></ul><span data-dcnode-id="837" instrument_node="">
</span><ul data-dcnode-id="829"><span data-dcnode-id="836" instrument_node="">
</span><li data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">Nearly half of Americans (46%) say they talk with their immediate families about religion at least once or twice a month. About a quarter (27%) say they talk about religion at least once a month with their extended families, and 33% say they discuss religion as often with people outside their families. Having regular conversations about religion is most common among evangelicals and people who belong to churches in the historically black Protestant tradition. By contrast, relatively few religious “nones” say they discuss religion with any regularity. (For more details on how often Americans talk about religion, see </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="834" instrument_node="">Chapter 1</span></a><span data-dcnode-id="832" instrument_node="">.)</span></li><span data-dcnode-id="830" instrument_node="">
</span></ul><span data-dcnode-id="828" instrument_node="">
</span><ul data-dcnode-id="817"><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="819"><span data-dcnode-id="826" instrument_node="">One-third of American adults (33%) say they volunteered in the past week. This includes 10% who say they volunteered mainly through a church or religious organization and 22% who say their volunteering was not done through a religious organization.&nbsp;(For more details on volunteering, see </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="825" instrument_node="">Chapter 1</span></a><span data-dcnode-id="823" instrument_node="">.)</span><sup class="footnote" data-dcnode-id="820"><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-5" id="fnref-25540-5"><span data-dcnode-id="822" instrument_node="">5</span></a></sup></li><span data-dcnode-id="818" instrument_node="">
</span></ul><span data-dcnode-id="816" instrument_node="">
</span><ul data-dcnode-id="808"><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">Three-in-ten adults say they meditated in the past week to help cope with stress. Regularly using meditation to cope with stress is more common among highly religious people than among those who are less religious (42% vs. 26%). (For more details on meditation and stress, see </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="813" instrument_node="">Chapter 1</span></a><span data-dcnode-id="811" instrument_node="">.)</span></li><span data-dcnode-id="809" instrument_node="">
</span></ul><span data-dcnode-id="807" instrument_node="">
</span><ul data-dcnode-id="799"><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">Nine-in-ten adults say the quality of a product is a “major factor” they take into account when making purchasing decisions, and three-quarters focus on the price. Far fewer – only about one-quarter of adults – say a company’s environmental responsibility (26%) or whether it pays employees a fair wage (26%) are major factors in their purchasing decisions. Highly religious adults are no more or less likely than those who are less religious to say they consider a company’s environmental record and fair wage practices in making purchasing decisions. (For more details on how Americans make purchasing decisions, see </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="804" instrument_node="">Chapter 1</span></a><span data-dcnode-id="802" instrument_node="">.)</span></li><span data-dcnode-id="800" instrument_node="">
</span></ul><span data-dcnode-id="798" instrument_node="">
</span><ul data-dcnode-id="790"><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">Three-quarters of Catholics say they look to their own conscience “a great deal” for guidance on difficult moral questions. Far fewer Catholics say they look a great deal to the Catholic Church’s teachings (21%), the Bible (15%) or the pope (11%) for guidance on difficult moral questions. (For more details, see </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/few-americans-turn-to-religious-leaders-for-advice-when-making-major-life-decisions"><span data-dcnode-id="795" instrument_node="">Chapter 3</span></a><span data-dcnode-id="793" instrument_node="">.)</span></li><span data-dcnode-id="791" instrument_node="">
</span></ul><span data-dcnode-id="789" instrument_node="">
</span><ul data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">One-quarter of Christians say dressing modestly is essential to what being Christian means to them, and an additional four-in-ten say it is “important, but not essential.” (For more details, see </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/essentials-of-christian-identity-vary-by-level-of-religiosity-many-nones-say-honesty-vital-to-being-a-moral-person"><span data-dcnode-id="786" instrument_node="">Chapter 2</span></a><span data-dcnode-id="784" instrument_node="">.)</span></li><span data-dcnode-id="782" instrument_node="">
</span></ul><span data-dcnode-id="780" instrument_node="">
</span><ul data-dcnode-id="772"><span data-dcnode-id="779" instrument_node="">
</span><li data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">When asked to describe, in their own words, what being a “moral person” means to them, 23% of religious “nones” cite the golden rule or being kind to others, 15% mention being a good person and 12% mention being tolerant and respectful of others. (For more details, see </span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/essentials-of-christian-identity-vary-by-level-of-religiosity-many-nones-say-honesty-vital-to-being-a-moral-person"><span data-dcnode-id="777" instrument_node="">Chapter 2</span></a><span data-dcnode-id="775" instrument_node="">.)</span></li><span data-dcnode-id="773" instrument_node="">
</span></ul><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="770" instrument_node="">The remainder of this report explores these and other findings in greater depth. </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life"><span data-dcnode-id="769" instrument_node="">Chapter 1</span></a><span data-dcnode-id="767" instrument_node=""> provides greater detail on how Americans from various religious backgrounds say they live their day-to-day lives. </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/essentials-of-christian-identity-vary-by-level-of-religiosity-many-nones-say-honesty-vital-to-being-a-moral-person"><span data-dcnode-id="766" instrument_node="">Chapter 2</span></a><span data-dcnode-id="764" instrument_node=""> examines the essentials of religious and moral identity – what do Christians see as “essential” to what it means to be a Christian, and what do members of non-Christian faiths and religious “nones” see as essential to being a moral person? </span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/few-americans-turn-to-religious-leaders-for-advice-when-making-major-life-decisions"><span data-dcnode-id="763" instrument_node="">Chapter 3</span></a><span data-dcnode-id="761" instrument_node=""> reports on where members of various religious groups say they look for guidance when making major life decisions or thinking about tough moral questions.</span><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">
</span><a data-dcnode-id="758" name="sidebar-highly-religious-less-religious"></a><br data-dcnode-id="757"><span data-dcnode-id="756" instrument_node="">
On most of these questions, the report compares highly religious Americans with those who are less religious and also looks at differences among members of a variety of religious groups. For comparisons of highly religious people with those who are less religious </span><em data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">within</span></em><span data-dcnode-id="753" instrument_node=""> particular religious groups (e.g., highly religious Catholics vs. less religious Catholics), </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/Religion-in-Everyday-Life-Detailed-Tables.pdf"><span data-dcnode-id="752" instrument_node="">see the detailed tables</span></a><span data-dcnode-id="750" instrument_node="">.</span></p><span data-dcnode-id="748" instrument_node="">
</span><div class="alignright ui inverted beige segment shortcode-callout" data-dcnode-id="708" style="float: none;width: auto;margin-left: 0px;margin-bottom: 10px;padding-bottom: 2px"><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="745" id="profile-of-those-who-are-highly-religious-less-religious"><span data-dcnode-id="746" instrument_node="">Profile of those who are highly religious, less religious</span></h3><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="736"><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-05/" rel="attachment wp-att-25569"><img alt="Profile of &quot;highly religious' respondents" class="alignright size-full wp-image-25569" data-dcnode-id="743" height="599" loading="lazy" sizes="(max-width: 421px) 100vw, 421px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png 421w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=211,300 211w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=160,228 160w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=285,405 285w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=200,285 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=260,370 260w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-05.png?resize=310,441 310w" width="421"></a><span data-dcnode-id="741" instrument_node="">In this report, “highly religious” respondents are defined as those who say they pray daily and attend religious services at least once a week. Overall, 30% of U.S. adults are highly religious by this definition, while 70% are not.</span><sup class="footnote" data-dcnode-id="738"><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-6" id="fnref-25540-6"><span data-dcnode-id="740" instrument_node="">6</span></a></sup><span data-dcnode-id="737" instrument_node="">
</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">As this report highlights, these standard measures of traditional religious practice do not capture the full breadth of what it means to be religious; many respondents also say attributes such as gratitude, forgiveness and honesty are essential to what being religious means to them, personally. Nevertheless, these two indicators (prayer and religious attendance) are closely related to a variety of other measures of religious commitment.</span></p><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="732" instrument_node="">For example, nine-in-ten people who are categorized as highly religious (91%) say religion is very important in their lives, and nearly all the rest (7%) say religion is at least somewhat important to them. By contrast, only three-in-ten people who are classified as not highly religious (31%) say religion is very important in their lives, and most of the rest (38%) say religion is “not too” or “not at all” important to them.</span><sup class="footnote" data-dcnode-id="729"><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-7" id="fnref-25540-7"><span data-dcnode-id="731" instrument_node="">7</span></a></sup><span data-dcnode-id="728" instrument_node="">
</span></p><p data-dcnode-id="723"><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/religion-in-everyday-life/pf_2016-04-12_everydayreligion-06/" rel="attachment wp-att-25570"><img alt="Demographic profile of 'highly religious' respondents" class="alignright size-full wp-image-25570" data-dcnode-id="726" height="613" loading="lazy" sizes="(max-width: 422px) 100vw, 422px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png&amp;raw" srcset="https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png 422w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=207,300 207w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=160,232 160w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=279,405 279w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=200,291 200w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=260,378 260w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=310,450 310w, https://www.pewresearch.org/religion/wp-content/uploads/sites/7/2016/04/PF_2016.04.12_everydayreligion-06.png?resize=420,610 420w" width="422"></a><span data-dcnode-id="724" instrument_node="">Nearly all people who are highly religious say believing in God is essential to their religious identity (96%), compared with only 57% of people who are not highly religious. Similarly, fully seven-in-ten people who are highly religious say reading the Bible or other religious materials is essential to their religious identity; only 18% of those who are not highly religious say this is vital to their religious identity or to what being a moral person means to them.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">As might be expected, the religious makeup of the highly religious and less religious also are quite distinct. Fully half of highly religious American adults (49%) identify with evangelical Protestant denominations, compared with about one-in-five (19%) of those who are not highly religious. And while only a handful of highly religious people are religiously unaffiliated, about a quarter of less religious respondents (27%) identify as atheist, agnostic or “nothing in particular.”</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="718" instrument_node="">There also are important demographic differences between the highly religious and those who are less religious.</span><sup class="footnote" data-dcnode-id="715"><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fn-25540-8" id="fnref-25540-8"><span data-dcnode-id="717" instrument_node="">8</span></a></sup><span data-dcnode-id="714" instrument_node="">&nbsp;They also are more likely to align with the Republican Party than the Democratic Party, and they are somewhat older, on average, than those who are less religious. However, there are few differences by level of education.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p class="ReportSidebarText" data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">If respondents who seldom or never pray and seldom or never attend religious services are analyzed separately from others who are “not highly religious,” many of these differences are even larger.</span></p><span data-dcnode-id="709" instrument_node="">

</span><a class="next" data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/highly-religious-people-not-distinctive-in-all-aspects-of-everyday-life/" rel="next"><span data-dcnode-id="653" instrument_node="">Next Page </span><span aria-hidden="true" class="arrow" data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">→</span></span></a><span data-dcnode-id="649" instrument_node="">

</span></div><span data-dcnode-id="643" instrument_node="">
</span><div data-dcnode-id="588" id="js-footnotes"><div class="ui dotted divider" data-dcnode-id="642"></div><ol class="ui small list footnotes" data-dcnode-id="589" start="1"><li data-dcnode-id="634" id="fn-25540-1" value="1."><span data-dcnode-id="641" instrument_node="">There are many possible ways to define “highly religious.” For example, Pew Research Center used an index of four measures (frequency of prayer, worship service attendance, belief in God and importance of religion) to create a “highly religious” category in a recently published interactive tool titled “</span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2016/02/29/how-religious-is-your-state/%3Fstate%3Dalabama"><span data-dcnode-id="640" instrument_node="">How religious is your state?</span></a><span data-dcnode-id="638" instrument_node="">” The definition of “highly religious” in this report is based on two of these standard measures of religiosity – self-reported rates of prayer and worship service attendance – that were asked of all respondents in a supplemental survey to the U.S. Religious Landscape Study, the main source of data for this report. </span><span class="footnotereverse" data-dcnode-id="635"><a data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-1"><img alt="↩" class="emoji" data-dcnode-id="637" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="629" id="fn-25540-2" value="2."><span data-dcnode-id="633" instrument_node="">Some previous studies have found that highly religious Americans Are more likely to volunteer not only for religious causes but also for secular ones. See Putnam, Robert D. and David E. Campbell. 2010. “American Grace: How Religion Divides and Unites Us.” Chapter 13, pages 443-454. Some prior studies also have found linkages between religious behavior and better health outcomes, though the reasons for this are debated. See, for example, Blasi, Anthony J. ed. 2011. “Toward a Sociological Theory of Religion and Health.” </span><span class="footnotereverse" data-dcnode-id="630"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-2"><img alt="↩" class="emoji" data-dcnode-id="632" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="624" id="fn-25540-3" value="3."><span data-dcnode-id="628" instrument_node="">In recent years, religious leaders across a wide range of faiths have urged followers to put their religious beliefs into practice through everyday behaviors such as consumer choices, environmentalism, hospitality, charity, honesty, forgiveness and healthy living. See, for example, Pope Francis’ 2015 environmental encyclical “Laudato Si.” Also see Bass, Dorothy C. ed. 2010. “Practicing Our Faith: A Way of Life for a Searching People.” However, the underlying question in this report is not normative – e.g., how religious people should behave in daily life – but sociological: Do Americans who are highly religious by conventional measures (prayer and worship service attendance) also have different beliefs or behave differently from less religious Americans in other areas of life? </span><span class="footnotereverse" data-dcnode-id="625"><a data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-3"><img alt="↩" class="emoji" data-dcnode-id="627" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="619" id="fn-25540-4" value="4."><span data-dcnode-id="623" instrument_node="">Ideally, the survey would have asked about the “essentials” of&nbsp;religious identity across a wider range of religious groups. For example, Jewish, Muslim and Buddhist respondents would have been asked if these behaviors are essential to what being Jewish, Muslim and Buddhist means to them. Because some respondents completed the survey by mail in a paper-and-pencil format, however, it was not feasible to program the questionnaire with language specific to more than a few religious groups. </span><span class="footnotereverse" data-dcnode-id="620"><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-4"><img alt="↩" class="emoji" data-dcnode-id="622" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="611" id="fn-25540-5" value="5."><span data-dcnode-id="618" instrument_node="">Readers should note that surveys may overstate the extent to which respondents engage in volunteering, since people who participate in activities such as volunteering also are more likely to participate in surveys. For more details, see “</span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2015/07/21/the-challenges-of-polling-when-fewer-people-are-available-to-be-polled/"><span data-dcnode-id="617" instrument_node="">The challenges of polling when fewer people are available to be polled</span></a><span data-dcnode-id="615" instrument_node="">.” </span><span class="footnotereverse" data-dcnode-id="612"><a data-dcnode-id="613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-5"><img alt="↩" class="emoji" data-dcnode-id="614" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="606" id="fn-25540-6" value="6."><span data-dcnode-id="610" instrument_node="">Estimates of the highly religious share of the population come from the 2014 U.S. Religious Landscape Study national telephone survey. Among respondents in the supplemental survey, 28% are highly religious by the definition employed here, and 72% are not. </span><span class="footnotereverse" data-dcnode-id="607"><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-6"><img alt="↩" class="emoji" data-dcnode-id="609" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="598" id="fn-25540-7" value="7."><span data-dcnode-id="605" instrument_node="">The question asking respondents how important religion is in their lives was asked in a previous wave of the American Trends Panel series of surveys; as a result, not everyone in the supplemental survey to the Religious Landscape Study was asked this question. For more details about the American Trends Panel, see the </span><a data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/04/12/methodology-7"><span data-dcnode-id="604" instrument_node="">Methodology</span></a><span data-dcnode-id="602" instrument_node="">. </span><span class="footnotereverse" data-dcnode-id="599"><a data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-7"><img alt="↩" class="emoji" data-dcnode-id="601" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li><li data-dcnode-id="590" id="fn-25540-8" value="8."><span data-dcnode-id="597" instrument_node="">For more on the link between gender and religiosity, see Pew Research Center’s report “</span><a data-dcnode-id="595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewforum.org/2016/03/22/the-gender-gap-in-religion-around-the-world/"><span data-dcnode-id="596" instrument_node="">The Gender Gap in Religion Around the World</span></a><span data-dcnode-id="594" instrument_node="">.” </span><span class="footnotereverse" data-dcnode-id="591"><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/religion/2016/04/12/religion-in-everyday-life/%23fnref-25540-8"><img alt="↩" class="emoji" data-dcnode-id="593" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/14.0.0/svg/21a9.svg&amp;raw"></a></span></li></ol></div><div class="ui divider" data-dcnode-id="587"></div><span data-dcnode-id="586" instrument_node=""> </span><div class="prc-block-area" data-block-area-id="37088" data-block-area-location="bottom-of-post" data-dcnode-id="557"><span data-dcnode-id="585" instrument_node="">
