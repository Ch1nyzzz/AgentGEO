class="author" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Anna Brown</span></span></a></div><span data-dcnode-id="1092" instrument_node=""> </span></header><span data-dcnode-id="1090" instrument_node="">
</span><div data-dcnode-id="1089" id="prc-mobile-toc"></div><span data-dcnode-id="1088" instrument_node="">
</span><div class="post-content" data-dcnode-id="822"><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1083"><a class="image-box" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-11/" rel="attachment wp-att-23004"><img alt="" class="wp-photo alignright size-full wp-image-23004" data-attachid="23004" data-dcnode-id="1086" height="724" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png?resize=128,300 128w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png?resize=137,320 137w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png?resize=173,405 173w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png?resize=200,469 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-11.png?resize=260,609 260w" width="309"></a><span data-dcnode-id="1084" instrument_node="">The public is divided in overall views of gun policy in the United States. Yet large majorities of Americans continue to support a number of specific gun policy proposals, including restrictions on gun sales to the mentally ill and expanded gun background checks.</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Attitudes about guns and gun policies divide gun owners and non-owners, Republicans and Democrats, and urban, suburban and rural residents.</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Overall, 52% of Americans say gun laws should be stricter than they are today, while nearly as many say they are about right (30%) or should be less strict than they are today (18%).</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Americans also differ about who should be able to own guns, where guns should be legally permitted and what types of guns should be legally available.</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">A majority of Americans (64%) say most people should be able to legally own guns, but some people should not. There is less agreement on the places that guns should be legally permitted and the types of guns that should be legally available.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1069" instrument_node="">Most people take a middle-ground approach on both questions: 35% say guns should be permitted in </span><em data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">most </span></em><span data-dcnode-id="1066" instrument_node="">places, while </span><em data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">some</span></em><span data-dcnode-id="1063" instrument_node=""> places should be off-limits; another 28% say guns should be allowed in some places but not most places.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1057"><a class="image-box" data-dcnode-id="1059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-10/" rel="attachment wp-att-23003"><img alt="" class="wp-photo alignright size-full wp-image-23003" data-attachid="23003" data-dcnode-id="1060" height="549" loading="lazy" sizes="(max-width: 420px) 100vw, 420px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png 420w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png?resize=230,300 230w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png?resize=160,209 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png?resize=310,405 310w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png?resize=200,261 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-10.png?resize=260,340 260w" width="420"></a><span data-dcnode-id="1058" instrument_node="">Similarly, a majority (70%) says that most or some types of guns should be legally available for sale in the U.S.; just 20% say almost all types of guns should be legally available, while only 10% say almost no types should be available.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">As in the past, a number of specific gun policy proposals draw extensive public support. About nine-in-ten Americans (89%) favor preventing people with mental illnesses from purchasing guns. Nearly as many favor requiring background checks for private gun sales and at gun shows (84%) and barring gun purchases by people on no-fly or watch lists (83%). Roughly two-thirds or more </span><em data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">strongly</span></em><span data-dcnode-id="1052" instrument_node=""> favor all of these proposals.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Substantial majorities also favor creating a federal government database to track all gun sales (71%), banning assault-style weapons (68%), and banning high-capacity magazines that hold more than 10 rounds of ammunition (65%).</span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Proposals for easing gun laws draw much less support. About half say they favor allowing people to carry concealed guns in more places (46%) and allowing teachers and school officials to carry guns in K-12 schools (45%). Even fewer Americans support shortening waiting periods for buying guns legally (36%).</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">The public is broadly opposed to allowing people to carry concealed guns without a permit: 81% oppose this proposal, with two-thirds </span><em data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">strongly </span></em><span data-dcnode-id="1040" instrument_node="">opposed. Just 19% favor allowing people to carry concealed guns without a permit.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><h3 data-dcnode-id="1035" id="gun-owners-non-gun-owners-differ-on-most-policies"><a data-dcnode-id="1037" name="_Toc484672862"></a><span data-dcnode-id="1036" instrument_node="">Gun owners, non-gun owners differ on most policies</span></h3><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1030"><a class="image-box" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D23002" rel="attachment wp-att-23002"><img alt="" class="wp-photo alignright size-full wp-image-23002" data-attachid="23002" data-dcnode-id="1033" height="569" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png?resize=163,300 163w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png?resize=160,295 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png?resize=220,405 220w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png?resize=200,368 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-09.png?resize=260,479 260w" width="309"></a><span data-dcnode-id="1031" instrument_node="">Large majorities of gun owners and non-gun owners favor banning gun sales to the mentally ill, expanded background checks on gun sales and barring gun purchases by people on federal no-fly or watch lists. But there is less agreement on other policy proposals, including those that would make it easier to purchase and carry a gun.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Among those who don’t own guns, 80% favor creation of a federal database to track gun sales, 77% back an assault-weapons ban and 74% support a ban on high-capacity ammunition magazines. No more than about half of gun owners support any of these policies.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">The differences are just as stark regarding proposals for easing gun restrictions. Two-thirds of gun owners favor allowing people to carry concealed guns in more places (67%) and allowing teachers and school officials to carry guns in elementary and secondary schools (66%). These proposals draw support from less than 40% of people who do not own guns.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Other proposals draw less support from both groups, though about half of gun owners (53%) favor shorter waiting periods on gun sales, compared with 29% of non-gun owners. Just a third of gun owners and only 12% of non-gun owners support allowing people to carry guns without a permit.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><h3 data-dcnode-id="1017" id="partisanship-and-gun-ownership-are-factors-in-views-of-gun-policies"><a data-dcnode-id="1019" name="_Toc484672863"></a><span data-dcnode-id="1018" instrument_node="">Partisanship and gun ownership are factors in views of gun policies</span></h3><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1012"><a class="image-box" data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D23001" rel="attachment wp-att-23001"><img alt="" class="wp-photo alignright size-full wp-image-23001" data-attachid="23001" data-dcnode-id="1015" height="516" loading="lazy" sizes="(max-width: 420px) 100vw, 420px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png 420w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=244,300 244w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=160,197 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=330,405 330w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=200,246 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=260,319 260w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-08.png?resize=310,381 310w" width="420"></a><span data-dcnode-id="1013" instrument_node="">Partisan views on gun policy proposals fall along similar lines as the opinions of gun owners and non-gun owners. Large majorities in both parties favor preventing the mentally ill from buying guns (89% each), background checks for private gun sales and gun shows (90% of Democrats, 77% of Republicans), and barring people on federal watch lists from buying guns (85% of Democrats, 82% of Republicans).</span></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Other proposals are much more divisive. For instance, only about a quarter of Democrats and Democratic-leaning independents (26%) support allowing people to carry concealed guns in more places, compared with 72% of Republicans and Republican leaners. The gap is nearly as wide in support for allowing teachers and school officials to carry guns in schools (26% of Democrats, 69% of Republicans).</span></p><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Both partisanship and gun ownership are key factors in attitudes about gun policies. On several issues, there are wide differences between Republican and Democratic gun owners – and even larger differences between members of both parties who </span><em data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">do not </span></em><span data-dcnode-id="1004" instrument_node="">own guns.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">Republicans generally are more likely than Democrats to own guns: 44% of Republicans and Republican leaners say they own at least one gun, compared with 20% of Democrats and Democratic leaners. (For more on who owns guns, see </span><a data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/the-demographics-of-gun-ownership"><span data-dcnode-id="1000" instrument_node="">Chapter 1</span></a><span data-dcnode-id="998" instrument_node="">.)</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">There is broad support among gun owners and non-gun owners in both parties for the bans on gun sales to the mentally ill and people on no-fly or watch lists, as well as for background checks on private gun sales.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">But Republican gun owners stand out for their low levels of support for a federal gun database and bans on assault-style weapons and high-capacity ammunition magazines. Just 43% of Republican gun owners back a federal gun database, 38% favor a ban on assault-style weapons and 32% support banning sales of high-capacity ammunition magazines.</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Among Republicans who do not own guns – and Democratic gun owners and non-gun owners – each of these proposals draws majority support.</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Overall, more Republicans than Democrats favor proposals to loosen gun control laws; however, this support is significantly stronger among Republican gun owners than among non-owners. Similarly, Democrats are less supportive overall, but Democratic gun owners give these proposals somewhat more support than Democrats who don’t own guns.</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">A larger share of Republican gun owners support each of the proposals to loosen gun laws than any other group. About eight-in-ten favor allowing concealed carry in more places (82%) and allowing teachers to carry in schools (81%). A smaller majority backs shortening waiting periods to buy guns (61%), and about two-in-five favor concealed carry without a permit (43%).</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Majorities of both Democratic gun owners and Republican non-owners have similar attitudes about shortening waiting periods and allowing concealed carry without a permit. These groups are divided on expanding concealed carry to more places and allowing teachers to carry guns in schools: about three-in-five Republicans non-owners favor them, compared with two-in-five Democratic owners – a gap of about 20 percentage points on each.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Democrats who do not own guns are strongly opposed to all of these proposals that would make gun laws less strict: Only about one-in-five support expanding conceal carry, carrying by teachers and shortening waiting periods, and just 9% support concealed carry without a permit.</span></p><span data-dcnode-id="975" instrument_node="">
</span><h3 data-dcnode-id="972" id="rural-and-urban-residents-diverge-in-views-of-many-gun-policies"><a data-dcnode-id="974" name="_Toc484672864"></a><span data-dcnode-id="973" instrument_node="">Rural and urban residents diverge in views of many gun policies</span></h3><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="967"><a class="image-box" data-dcnode-id="969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-07/" rel="attachment wp-att-23000"><img alt="" class="wp-photo alignright size-full wp-image-23000" data-attachid="23000" data-dcnode-id="970" height="524" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png?resize=177,300 177w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png?resize=160,271 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png?resize=239,405 239w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png?resize=200,339 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-07.png?resize=260,441 260w" width="309"></a><span data-dcnode-id="968" instrument_node="">Views on gun policies also vary widely by the types of communities in which people live. Rural residents are generally more skeptical of proposals to toughen gun laws than are people who live in suburban and urban areas. Rural residents also tend to be more supportive of proposals to loosen gun restrictions.</span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">In part, these gaps reflect differences in partisanship and gun ownership in these communities. Rural residents are more likely than urban and suburban residents to identify as Republicans or lean Republican; people who live in rural areas also are more likely to own guns than those in other communities.</span></p><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Still, majorities of rural, suburban and urban residents favor a federal gun database, expanded background checks and some restrictions on gun sales.</span></p><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">However, 57% of rural residents support allowing people to carry concealed guns in more places. Less than half of those in suburbs (45%) and urban areas (38%) support increased concealed carry. There are similar differences among people in different types of communities in views of allowing teachers and school officials to carry guns in K-12 schools.</span></p><span data-dcnode-id="957" instrument_node="">
</span><h3 data-dcnode-id="954" id="about-half-of-americans-favor-stricter-gun-laws"><a data-dcnode-id="956" name="_Toc484672865"></a><span data-dcnode-id="955" instrument_node="">About half of Americans favor stricter gun laws</span></h3><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949"><a class="image-box" data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D22999" rel="attachment wp-att-22999"><img alt="" class="wp-photo alignright size-full wp-image-22999" data-attachid="22999" data-dcnode-id="952" height="486" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png?resize=191,300 191w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png?resize=160,252 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png?resize=258,405 258w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png?resize=200,315 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-06.png?resize=260,409 260w" width="309"></a><span data-dcnode-id="950" instrument_node="">As with views of specific gun policy proposals, opinions about whether gun laws in the U.S. generally should be stricter or less strict are divided by partisanship, gun ownership and community type.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Democrats broadly favor making gun laws stricter than they are today. Three-quarters of Democrats and Democratic leaners – including 78% of non-gun owners and 62% of gun owners – say gun laws in this country should be stricter than they are today.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Republicans and Republican leaners are divided: 46% say current gun laws are “about right,” while 30% say they should be less strict and 24% say they should be stricter.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">About half of Republican gun owners (52%) and 40% of Republican non-gun owners say gun laws are about right. More than a third of Republicans who do not own guns (35%) support stricter gun laws in the U.S., compared with just 10% of Republican gun owners. And while 37% of Republican gun owners say gun laws should be less strict, only 24% of Republican non-gun owners say the same.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="932"><a class="image-box" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-05/" rel="attachment wp-att-22998"><img alt="" class="wp-photo alignright size-full wp-image-22998" data-attachid="22998" data-dcnode-id="938" height="468" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png?resize=198,300 198w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png?resize=160,242 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png?resize=267,405 267w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png?resize=200,303 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-05.png?resize=260,394 260w" width="309"></a><span data-dcnode-id="936" instrument_node="">Another factor in attitudes about the nation’s gun laws is how gun owners and people who do not own guns feel about the prospect of their own future gun ownership. Most people who own guns say they can never see themselves </span><em data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">not </span></em><span data-dcnode-id="933" instrument_node="">owning a gun: Among this group, just 18% say gun laws should be stricter. Among the smaller share of gun owners who say at some point they could see themselves not owning a gun, 59% favor stricter gun laws.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Among those who do not currently own guns, about as many say they could see themselves owning a gun at some point as say they could never see themselves owning a gun.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Among non-gun owners who are open to the possibility of owning a gun in the future, 51% favor stricter gun laws. By contrast, 75% of non-gun owners who say they can </span><em data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">never </span></em><span data-dcnode-id="924" instrument_node="">see themselves owning a gun back stricter gun laws.</span></p><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="919" id="majority-says-most-people-should-be-able-to-own-guns"><a data-dcnode-id="921" name="_Toc484672866"></a><span data-dcnode-id="920" instrument_node="">Majority says most people should be able to own guns</span></h3><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">Gun owners and non-gun owners hold different views about who should be able to legally own guns, where guns should legally be permitted, and what types of guns should be legally available.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="911"><a class="image-box" data-dcnode-id="913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D22997" rel="attachment wp-att-22997"><img alt="" class="wp-photo alignright size-full wp-image-22997" data-attachid="22997" data-dcnode-id="914" height="576" loading="lazy" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png 308w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png?resize=160,299 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png?resize=217,405 217w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png?resize=200,374 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-04.png?resize=260,486 260w" width="308"></a><span data-dcnode-id="912" instrument_node="">A majority of the public (64%) says that most people, but not all, should be able to legally own guns; however, there is a 24-percentage-point gap between owners and non-owners on this question. Fully 80% of gun owners say most people should be able to own guns, plus another 9% who say almost everyone should be able to. A majority of non-owners say most people should be able to own guns (56%), but about one-third either say that some, but not most, people should be able to own guns (24%) or say that almost no one should be able to own guns (12%).</span></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Some respondents who said most, but not all, people should be able to own guns legally were asked to describe in their own words “what should disqualify someone from being able to legally own guns.” Many gun owners and non-owners said people with mental health issues should be disqualified, as well as those who have felony convictions or histories of violent behavior.</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Greater differences emerge between owners and non-owners on the places guns should be allowed and what types of guns should be available.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">A majority of gun owners say people should be able to carry guns at least most places, while non-owners are more divided on the issue. About twice as many gun owners (34%) than non-owners (15%) say people should be able to carry guns almost everywhere. Conversely, four times more non-owners (20%) than gun owners (5%) say people should be able to carry almost nowhere.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Some who said people should be able to carry guns most, but not all, places were asked “what are some of the places … people should not be able to legally carry guns?” Many mentioned crowded public places, schools, movie theaters and places that serve alcohol.</span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">The share saying almost all types of guns should be legally available (36%) is higher among gun owners as well. Far fewer non-owners say this (12%). About twice as many non-gun owners (34%) as gun owners (15%) say some, but not most, types of guns should be available.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Those who said most, but not all, types of guns should be legally available were asked to share, in their own words, “What are some of the types of guns you think should not be legally available to buy?” These respondents frequently mentioned military-style weapons – though definitions of what constitutes “military style” differed considerably. Some people mentioned semiautomatic or automatic rifles, such as AK-47s, while others mentioned more powerful military equipment such as missiles, explosives, tanks and fighter aircraft.</span></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="889" id="supporters-of-less-strict-gun-laws-more-likely-to-contact-elected-officials"><a data-dcnode-id="891" name="_Toc484672867"></a><span data-dcnode-id="890" instrument_node="">Supporters of less strict gun laws more likely to contact elected officials</span></h3><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="884"><a class="image-box" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D22996" rel="attachment wp-att-22996"><img alt="" class="wp-photo alignright size-full wp-image-22996" data-attachid="22996" data-dcnode-id="887" height="628" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png?resize=148,300 148w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png?resize=157,320 157w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png?resize=199,405 199w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png?resize=200,406 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-03.png?resize=260,528 260w" width="309"></a><span data-dcnode-id="885" instrument_node="">While relatively few people have ever contacted public officials about guns (15%) or given money to organizations taking positions on the issue (16%), gun owners are more politically engaged on gun issues than other Americans.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Gun owners are more likely than non-gun owners to say they have ever contacted public officials to express their opinion on gun policy: 21% of owners say they have done this, including 9% who say they did so in the past 12 months, while only 12% of non-owners say they have ever done this.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="879" instrument_node="">Furthermore, those who think gun laws should be less strict are more likely to contact public officials on the issue (22% have ever done so), compared with those who think gun laws should be stricter (15%) or are about right (10%). This gap increases further among gun owners: About as many gun owners who want less strict laws (19%) have contacted officials in the </span><em data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">last year</span></em><span data-dcnode-id="876" instrument_node=""> as owners who want stricter laws have </span><em data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">ever</span></em><span data-dcnode-id="873" instrument_node=""> contacted officials (20%).</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">A larger share of gun owners contribute money to organizations that take positions on gun policy (28% have ever done so and 12% have in the last year) than non-owners (10% ever and 6% in the last year).</span></p><span data-dcnode-id="868" instrument_node="">
</span><h3 data-dcnode-id="866" id="public-split-over-protecting-right-to-own-guns-or-controlling-gun-ownership"><span data-dcnode-id="867" instrument_node="">Public split over protecting right to own guns or controlling gun ownership</span></h3><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="856"><a class="image-box" data-dcnode-id="863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-02/" rel="attachment wp-att-22995"><img alt="" class="wp-photo alignright size-full wp-image-22995" data-attachid="22995" data-dcnode-id="864" height="406" loading="lazy" sizes="(max-width: 308px) 100vw, 308px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png 308w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png?resize=228,300 228w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png?resize=160,211 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png?resize=200,264 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-02.png?resize=260,343 260w" width="308"></a><span data-dcnode-id="862" instrument_node="">The public is closely divided over whether it is more important to protect the right of Americans to own guns or to control gun ownership. In a nationally representative Pew Research Center survey conducted April 5 to 11, 2017, among 1,501 adults over 18, 51% said it was more important to control gun ownership and 47% said protecting the right to own guns is more important </span><em data-dcnode-id="858"><span data-dcnode-id="861" instrument_node="">(see long term trends on the </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/politics/2016/08/26/public-views-about-guns/"><span data-dcnode-id="860" instrument_node="">public’s views about guns</span></a></em><span data-dcnode-id="857" instrument_node="">).</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">These attitudes have been mostly stable over the past eight years – with the public about evenly divided between protecting gun rights and controlling ownership.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="848"><a class="image-box" data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/2017/06/22/views-on-gun-policy/psdt_2017-06-22-guns-05-01/" rel="attachment wp-att-22994"><img alt="" class="wp-photo alignright size-full wp-image-22994" data-attachid="22994" data-dcnode-id="851" height="408" loading="lazy" sizes="(max-width: 310px) 100vw, 310px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png 310w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png?resize=228,300 228w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png?resize=160,211 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png?resize=308,405 308w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png?resize=200,263 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-01.png?resize=260,342 260w" width="310"></a><span data-dcnode-id="849" instrument_node="">Attitudes on which is more important have shifted about 5 points since last August, however. Then, 52% said it was more important to protect gun rights, compared with 46% who said it was more important to control gun ownership.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Republicans and Democrats remain widely divided over the importance of protecting the right of Americans to own guns. About three-quarters of Republicans and Republican leaners (76%) say protecting gun rights is more important, compared with about a quarter of Democrats and Democratic leaners (22%).</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The gap between the two parties has increased significantly since 2000, when there was an 18-percentage-point gap between Republicans and Democrats. Today there is a 54-point gap.</span></p><span data-dcnode-id="841" instrument_node="">
</span><h3 data-dcnode-id="838" id="public-divided-over-the-national-rifle-associations-influence-on-gun-laws"><a data-dcnode-id="840" name="_Toc484672869"></a><span data-dcnode-id="839" instrument_node="">Public divided over the National Rifle Association’s influence on gun laws</span></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="833"><a class="image-box" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/social-trends/%3Fattachment_id%3D22993" rel="attachment wp-att-22993"><img alt="" class="wp-photo alignright size-full wp-image-22993" data-attachid="22993" data-dcnode-id="836" height="525" loading="lazy" sizes="(max-width: 309px) 100vw, 309px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png&amp;raw" srcset="https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png 309w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png?resize=177,300 177w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png?resize=160,272 160w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png?resize=238,405 238w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png?resize=200,340 200w, https://www.pewresearch.org/social-trends/wp-content/uploads/sites/3/2017/06/PSDT_2017.06.22.guns-05-00.png?resize=260,442 260w" width="309"></a><span data-dcnode-id="834" instrument_node="">The public is divided over whether the National Rifle Association (NRA) has too much influence or the right amount when it comes to gun laws in this country: 44% say it has too much and 40% say the right amount. Another 15% say it has too little influence.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Compared with gun owners, adults who do not own guns are more likely to say the NRA has too much influence. Half of non-owners say the NRA has too much influence and just 34% say the right amount. About half of gun owners (53%) say the NRA has the right amount of influence and 29% say it has too much. Few in either group say it has too little (17% among gun owners and 14% among non-owners).</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">There are bigger differences in the way the NRA is viewed among Republicans and Democrats. Two-thirds of Democrats and Democratic leaners say the NRA has too much influence; only 15% of Republicans and Republican leaners say the same. About two-thirds of Republicans say it has the right amount of influence, compared with 21% of Democrats.</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">A similar share of Republican gun owners and non-owners say the NRA has the right amount of influence (67% of owners and 62% of non-owners). Democrats tend to see the NRA similarly, regardless of whether they personally own a gun: 60% of Democratic gun owners say the NRA has too much influence; 67% of Democrats without a gun say the same.</span></p><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="820" instrument_node="">
