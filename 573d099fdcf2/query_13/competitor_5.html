</span><a class="ui large kicker" data-dcnode-id="955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2013/03/13/teens-and-technology-2013/"><span data-dcnode-id="956" instrument_node="">Teens and Technology 2013</span></a><h1 class="ui post small header" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Methodology</span></h1><div class="bylines" data-dcnode-id="932"><span data-dcnode-id="952" instrument_node="">By </span><a data-dcnode-id="949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/mary-madden"><span class="author" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Mary Madden</span></span></a><span data-dcnode-id="948" instrument_node="">, </span><a data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/amanda-lenhart"><span class="author" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Amanda Lenhart</span></span></a><span data-dcnode-id="944" instrument_node="">, </span><a data-dcnode-id="941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/maeve-duggan"><span class="author" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Maeve Duggan</span></span></a><span data-dcnode-id="940" instrument_node="">, </span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/sandra-cortesi"><span class="author" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Sandra Cortesi</span></span></a><span data-dcnode-id="936" instrument_node=""> and </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/urs-gasser"><span class="author" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Urs Gasser</span></span></a></div><span data-dcnode-id="931" instrument_node=""> </span></header><span data-dcnode-id="929" instrument_node="">
</span><div data-dcnode-id="928" id="prc-mobile-toc"></div><span data-dcnode-id="927" instrument_node="">
</span><div class="post-content" data-dcnode-id="768"><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921"><span data-dcnode-id="925" instrument_node=""> </span><b data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">2012 Teens and Privacy Management Survey</span></b><span data-dcnode-id="922" instrument_node=""> </span></p><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="919" instrument_node="">Prepared by Princeton Survey Research Associates International</span><br data-dcnode-id="918"><span data-dcnode-id="917" instrument_node="">for the Pew Research Center’s Internet and American Life Project</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">October 2012</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node=""> </span><b data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">SUMMARY</span></b><span data-dcnode-id="908" instrument_node=""> </span></p><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The 2012 Teens and Privacy Management Survey sponsored by the Pew Research Center’s Internet and American Life Project obtained telephone interviews with a nationally representative sample of 802 teens aged 12 to 17 years-old and their parents living in the United States. The survey was conducted by Princeton Survey Research Associates International. The interviews were done in English and Spanish by Princeton Data Source, LLC from July 26 to September 30, 2012. Statistical results are weighted to correct known demographic discrepancies.&nbsp; The margin of sampling error for the complete set of weighted data is ±4.5 percentage points.</span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Details on the design, execution and analysis of the survey are discussed below.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="899" instrument_node=""> </span><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">DESIGN AND DATA COLLECTION PROCEDURES</span></b><span data-dcnode-id="896" instrument_node=""> </span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="893" instrument_node=""> </span><b data-dcnode-id="890"><span data-dcnode-id="892" instrument_node="">Sample Design</span><i data-dcnode-id="891"></i></b><span data-dcnode-id="889" instrument_node=""> </span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">A combination of landline and cellular random digit dial (RDD) samples was used to represent all teens and their parents in the United States who have access to either a landline or cellular telephone. Both samples were provided by Survey Sampling International, LLC (SSI) according to PSRAI specifications.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Both samples were disproportionately stratified to increase the incidence of African Americans and Latinos. The same stratification scheme was used for both sample frames and was based on the estimated incidence of minority groups at the county level. All counties in the United States were divided into ten strata based on the estimated proportion of African American and Latino populations. Strata with higher minority densities were oversampled relative to strata with lower densities. Phone numbers were drawn with equal probabilities within strata. The disproportionate sample design was accounted for in the weighting.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">To supplement the fresh RDD sample, interviews were also completed among a sample of parents who recently participated in the PSRAI Weekly Omnibus survey. Table 1 shows a breakdown of the number of interviews completed by sample segment.</span></p><span data-dcnode-id="878" instrument_node="">
</span><img alt="Sample segments" class="aligncenter" data-dcnode-id="877" height="221" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/C586701893F14BBCA7D805C4CBA27A61.jpg&amp;raw" width="237"><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="875" instrument_node=""> </span><b data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Contact Procedures</span></b><span data-dcnode-id="872" instrument_node=""> </span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Interviews were conducted from July 26 to September 30, 2012. As many as 7 attempts were made to contact and interview a parent at every sampled landline telephone number and as many as five attempts were made to contact and interview a parent at every sampled cell number. After the parent interview, an additional 10 calls were made to interview an eligible teen. Sample was released for interviewing in replicates, which are representative subsamples of the larger sample. Using replicates to control the release of sample ensures that complete call procedures are followed for the entire sample. Calls were staggered over times of day and days of the week to maximize the chance of making contact with potential respondents. Each telephone number received at least one daytime call in an attempt to complete an interview.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Contact procedures were slightly different for the landline and cell samples. For the landline samples, interviewers first determined if the household had any 12 to 17 year-old residents. Households with no teens were screened-out as ineligible. In eligible households, interviewers first conducted a short parent interview with either the father/male guardian or mother/female guardian. The short parent interview asked some basic household demographic questions as well as questions about a particular teen in the household (selected at random if more than one teen lived in the house.) </span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">For the cell phone samples, interviews first made sure that respondents were in a safe place to talk and that they were speaking with an adult. Calls made to minors were screened-out as ineligible. If the person was not in a safe place to talk a callback was scheduled. Interviewers then asked if any 12 to 17 year-olds lived in their household. Cases where no teens lived in the household were screened-out as ineligible. If there was an age-eligible teen in the household, the interviewers asked if the person on the cell phone was a parent of the child. Those who were parents went on to complete the parent interview. Those who were not parents were screened-out as ineligible.</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">For all samples, after the parent interview was complete an interview was completed with the target child. Data was kept only if the child interview was completed.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node=""> </span><b data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Weighting and analysis</span></b><span data-dcnode-id="854" instrument_node=""> </span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Weighting is generally used in survey analysis to compensate for patterns of nonresponse and disproportionate sample designs that might bias survey estimates. This sample was weighted in three stages. The first stage of weighting corrected for the disproportionate RDD sample designs. For each stratum the variable WT1 was computed as the ratio of the size of the sample frame in the stratum divided by the amount of sample ordered in the stratum. For the callback samples, the weights from the original surveys was brought in and used as WT1.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The second stage of weighting involved correcting for different probabilities of selection based on respondents’ phone use patterns. Respondents who have both a landline and a cell phone have a greater chance of being sampled than respondents with access to only one kind of phone. To correct for this we computed a variable called PUA (Phone Use Adjustment). The PUA was computed using the following formula where n1 is the number of respondents having only one kind of phone (landline or cell, but not both) and n2 is the number of respondents have both a landline and a cell phone.</span></p><span data-dcnode-id="846" instrument_node="">
</span><img alt="formula" class="aligncenter" data-dcnode-id="845" height="110" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/5795C94ED4834568A301E10CB193B271.jpg&amp;raw" width="518"><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">WT1 and PUA were then multiplied together to use as an input weight (WT2) for post-stratification raking</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">The interviewed sample was raked to match national parameters for both parent and child demographics. The parent demographics used for weighting were: sex; age; education; race; Hispanic origin; number of 12-17 year olds in household; number of adults in the household; phone use and region (U.S. Census definitions). The child demographics used for weighting were gender and age. The parameters came from a special analysis of the Census Bureau’s 2011 Annual Social and Economic Supplement (ASEC) that included all households in the United States. The phone use parameter was derived from recent PSRAI survey data.</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="837" instrument_node="">Raking was accomplished using Sample Balancing, a special iterative sample weighting program that simultaneously balances the distributions of all variables using a statistical technique called the </span><i data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Deming Algorithm</span></i><span data-dcnode-id="834" instrument_node="">. Weights were trimmed to prevent individual interviews from having too much influence on the final results. The use of these weights in statistical analysis ensures that the demographic characteristics of the sample closely approximate the demographic characteristics of the national population. Table 2 compares weighted and unweighted sample distributions to population parameters.</span></p><span data-dcnode-id="832" instrument_node="">
</span><img alt="Sample demographics" class="aligncenter" data-dcnode-id="831" height="850" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/D5E80665CBE44D3281E9651EC605CEAB.jpg&amp;raw" width="441"><span data-dcnode-id="830" instrument_node="">
</span><img alt="Table 2 contd" class="aligncenter" data-dcnode-id="829" height="246" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/6E166DD8BADC4C3B9B32FF3A0A576943.jpg&amp;raw" width="449"><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="827" instrument_node=""> </span><strong data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Effects of Sample Design on Statistical Inference</span></strong><span data-dcnode-id="824" instrument_node=""> </span></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="821" instrument_node="">Post-data collection statistical adjustments require analysis procedures that reflect departures from simple random sampling. PSRAI calculates the effects of these design features so that an appropriate adjustment can be incorporated into tests of statistical significance when using these data. The so-called “design effect” or </span><i data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">deff</span></i><span data-dcnode-id="818" instrument_node=""> represents the loss in statistical efficiency that results from systematic non-response. The total sample design effect for this survey is 1.69.</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="815" instrument_node="">PSRAI calculates the composite design effect for a sample of size </span><i data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">n</span></i><span data-dcnode-id="812" instrument_node="">, with each case having a weight, </span><i data-dcnode-id="808"><span data-dcnode-id="811" instrument_node="">w</span><sub data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">i</span></sub></i><span data-dcnode-id="807" instrument_node=""> as:</span></p><span data-dcnode-id="805" instrument_node="">
</span><img alt="Formula 1" class="aligncenter" data-dcnode-id="804" height="117" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/4B05F2B5C3CE4BAAA98FA6AFE841B607.jpg&amp;raw" width="327"><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="802" instrument_node="">In a wide range of situations, the adjusted </span><i data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">standard error</span></i><span data-dcnode-id="799" instrument_node=""> of a statistic should be calculated by multiplying the usual formula by the square root of the design effect (√</span><i data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">deff </span></i><span data-dcnode-id="796" instrument_node="">). Thus, the formula for computing the 95% confidence interval around a percentage is:</span></p><span data-dcnode-id="794" instrument_node="">
</span><img alt="Formula 2" class="aligncenter" data-dcnode-id="793" height="87" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/516A032BBE0D460B9D79DD2E7A5326EC.jpg&amp;raw" width="358"><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">where p&nbsp;is the sample estimate and </span><i data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">n</span></i><span data-dcnode-id="788" instrument_node=""> is the unweighted number of sample cases in the group being considered.</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">The survey’s </span><i data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">margin of error</span></i><span data-dcnode-id="782" instrument_node=""> is the largest 95% confidence interval for any estimated proportion based on the total sample — the one around 50%.&nbsp; For example, the margin of error for the entire sample is ±4.5 percentage points. This means that in 95 out every 100 samples drawn using the same methodology, estimated proportions based on the entire sample will be no more than 4.5 percentage points away from their true values in the population.&nbsp; It is important to remember that sampling fluctuations are only one possible source of error in a survey estimate. Other sources, such as respondent selection bias, questionnaire wording and reporting inaccuracy, may contribute additional error of greater or lesser magnitude.</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node=""> </span><b data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Response Rate</span></b><span data-dcnode-id="776" instrument_node=""> </span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Table 3 reports the disposition of all sampled callback telephone numbers ever dialed. The response rate is calculated according to American Association of Public Opinion Research standards.</span></p><span data-dcnode-id="771" instrument_node="">
</span><img alt="Sample disposition" class="aligncenter" data-dcnode-id="770" height="320" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/wp-content/uploads/sites/9/media/8BF13480514E4FB78C41D094B0F21941.jpg&amp;raw" width="530"><span data-dcnode-id="769" instrument_node="">
