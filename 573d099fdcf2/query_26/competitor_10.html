</span><h1 class="fs-huge" data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Press conference</span></h1><span data-dcnode-id="1393" instrument_node="">
</span><h2 data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">by NATO Secretary General Jens Stoltenberg at the Meeting of NATO Ministers of Foreign Affairs, Riga</span></h2><span data-dcnode-id="1390" instrument_node="">
</span><ul class="list-meta" data-dcnode-id="1374"><span data-dcnode-id="1389" instrument_node="">
</span><li data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">
            30 Nov. 2021 - 
          </span></li><span data-dcnode-id="1386" instrument_node="">
</span><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node=""> | </span></li><span data-dcnode-id="1383" instrument_node="">

</span><li data-dcnode-id="1364"><span data-dcnode-id="1368" instrument_node="">
</span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_189146.htm%3FselectedLocale%3Dfr"><span data-dcnode-id="1367" instrument_node="">French</span></a><span data-dcnode-id="1365" instrument_node="">

</span><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/cps/en/natohq/opinions_189146.htm%3FselectedLocale%3Duk"><span data-dcnode-id="1355" instrument_node="">Ukrainian</span></a><span data-dcnode-id="1353" instrument_node="">

</span><section class="content cf" data-dcnode-id="945"><span data-dcnode-id="1335" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node=""> (As delivered) </span></p><span data-dcnode-id="1332" instrument_node="">
</span><span data-dcnode-id="1330" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">
</span></div><span data-dcnode-id="1327" instrument_node="">
</span><div data-dcnode-id="947"><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Good evening.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">We have just had a very good and substantive discussion among NATO’s foreign ministers.&nbsp;</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1319" instrument_node="">Ministers addressed three issues:</span><br data-dcnode-id="1318"><span data-dcnode-id="1317" instrument_node="">
Russia’s military build-up in and around Ukraine,&nbsp;</span><br data-dcnode-id="1316"><span data-dcnode-id="1315" instrument_node="">
the actions by the regime in Belarus,&nbsp;</span><br data-dcnode-id="1314"><span data-dcnode-id="1313" instrument_node="">
and NATO’s leading role in arms control.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">The situation in and around Ukraine remains fluid and unpredictable.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">There is no certainty about Russia’s intentions.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1304" instrument_node="">We see a significant and unusual concentration of forces,&nbsp;</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
which is unjustified and unexplained.</span><br data-dcnode-id="1301"><span data-dcnode-id="1300" instrument_node="">
And accompanied by heightened rhetoric and disinformation.</span><br data-dcnode-id="1299"><span data-dcnode-id="1298" instrument_node="">
&nbsp; &nbsp; &nbsp; &nbsp; &nbsp;&nbsp;</span><br data-dcnode-id="1297"><span data-dcnode-id="1296" instrument_node="">
And we know that Russia has used force before against Ukraine and other neighbours.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">Today, Ministers discussed the situation.&nbsp;</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">We stand united in our aim to deter Russia from any further aggressive actions.&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">We call on Russia to be transparent, de-escalate and reduce tensions.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1284" instrument_node="">Any future Russian aggression against Ukraine would come at a high price.</span><br data-dcnode-id="1283"><span data-dcnode-id="1282" instrument_node="">
And have serious political and economic consequences for Russia.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1279" instrument_node="">Ministers were clear that there must be no misunderstanding or miscalculation on NATO’s resolve.</span><br data-dcnode-id="1278"><span data-dcnode-id="1277" instrument_node="">
We stand together to defend and protect all Allies.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">We will continue to actively assess the situation and ensure we have all necessary plans in place.&nbsp;</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1266"><span data-dcnode-id="1271" instrument_node="">At the same time, we maintain our political and practical support for our partner Ukraine.&nbsp;</span><br data-dcnode-id="1270"><span data-dcnode-id="1269" instrument_node="">
We commend Ukraine for its measured response to Russia’s continued provocations.&nbsp;</span><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">
And we will meet both Ukraine and Georgia tomorrow to exchange views on the current developments.</span></p><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1260"><br data-dcnode-id="1264"><span data-dcnode-id="1263" instrument_node="">
NATO’s dual-track approach to Russia remains unchanged.</span><br data-dcnode-id="1262"><span data-dcnode-id="1261" instrument_node="">
We keep our defense and deterrence strong in the face of Russia’s pattern of aggressive actions.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1258" instrument_node="">We also believe that dialogue is vital.&nbsp;</span><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">
Unfortunately, Russia has recently decided to cut diplomatic ties with NATO.</span><br data-dcnode-id="1255"><span data-dcnode-id="1254" instrument_node="">
We call on Russia to reverse this decision.&nbsp;</span><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
And to re-engage in the NATO-Russia Council.</span><br data-dcnode-id="1251"><span data-dcnode-id="1250" instrument_node="">
For the benefit of peace and security.&nbsp;</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1243"><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
We also addressed Belarus.</span><br data-dcnode-id="1245"><span data-dcnode-id="1244" instrument_node="">
And the Lukashenko regime’s use of vulnerable people to put pressure on Poland, Latvia, and Lithuania.&nbsp;</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1241" instrument_node="">This is cynical and inhumane.&nbsp;</span><br data-dcnode-id="1240"><span data-dcnode-id="1239" instrument_node="">
And NATO ministers made clear that we stand in full solidarity with the Allies affected.</span><br data-dcnode-id="1238"><span data-dcnode-id="1237" instrument_node="">
NATO is also cooperating closely with the European Union to counter this hybrid campaign.</span><br data-dcnode-id="1236"><span data-dcnode-id="1235" instrument_node="">
As demonstrated by my visit on Sunday to Vilnius and Riga with the president of the European Commission Ursula von der Leyen.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1228"><br data-dcnode-id="1232"><span data-dcnode-id="1231" instrument_node="">
Foreign Ministers also discussed arms control, disarmament, and non-proliferation.</span><br data-dcnode-id="1230"><span data-dcnode-id="1229" instrument_node="">
This is a priority for NATO.</span></p><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1226" instrument_node="">All NATO Allies support a world without nuclear weapons.</span><br data-dcnode-id="1225"><span data-dcnode-id="1224" instrument_node="">
Since the end of the Cold War, we have significantly reduced our nuclear arsenals.</span><br data-dcnode-id="1223"><span data-dcnode-id="1222" instrument_node="">
And consistently promoted key arms control agreements.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1219" instrument_node="">But we see very worrying trends.</span><br data-dcnode-id="1218"><span data-dcnode-id="1217" instrument_node="">
Russia and China are significantly increasing their arsenals.</span><br data-dcnode-id="1216"><span data-dcnode-id="1215" instrument_node="">
Key treaties are being undermined.</span><br data-dcnode-id="1214"><span data-dcnode-id="1213" instrument_node="">
And emerging and disruptive technologies are fundamentally changing the nature of conflict.&nbsp;</span></p><span data-dcnode-id="1211" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1210" instrument_node="">NATO Allies are determined to lead a renewed effort to strengthen arms control.</span><br data-dcnode-id="1209"><span data-dcnode-id="1208" instrument_node="">
Because in a more dangerous world, we need more predictability and more transparency.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1205" instrument_node="">This evening Ministers will discuss our next Strategic Concept.&nbsp;</span><br data-dcnode-id="1204"><span data-dcnode-id="1203" instrument_node="">
Which will be adopted at the Madrid Summit next year.&nbsp;</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1200" instrument_node="">The Strategic Concept will reflect the new security environment.</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
It will reaffirm our unity and values.</span><br data-dcnode-id="1197"><span data-dcnode-id="1196" instrument_node="">
And drive our continued adaptation.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">It is the blueprint for the future of our Alliance.</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">And how Europe and North America will continue to stand strong together in NATO.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">With that, I am ready to take your questions.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1176"><strong data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">NATO Spokesperson Oana Lungescu: </span></strong><span data-dcnode-id="1179" instrument_node="">Ok, we will go to Wall Street Journal, second row.</span><br data-dcnode-id="1178"><span data-dcnode-id="1177" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1171"><strong data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">James Marson (The Wall Street Journal)</span></strong><span data-dcnode-id="1172" instrument_node="">: Secretary General, Russia has made it clear, it doesn't want Ukraine to join NATO. It's been 13 years now since NATO said that Ukraine would join NATO. By delaying further, is NATO simply not just giving Putin what he wants?</span></p><span data-dcnode-id="1170" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1163"><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">NATO Secretary General Jens Stoltenberg</span></strong><span data-dcnode-id="1164" instrument_node="">: We stand by the decisions we have made, also on Ukraine and membership. I was actually present at the NATO Summit in Bucharest where we first made the decision. And we support Ukraine on this path towards membership, Euro-Atlantic integration, by supporting reforms, fighting corruption and modernizing the security and defence institutions of Ukraine.</span></p><span data-dcnode-id="1162" instrument_node="">
</span><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">To become a member of NATO, you have to meet NATO standards, and there has to be a decision by 30 Allies. We need consensus in the Alliance to enlarge and to invite a new country to join our Alliance.</span></p><span data-dcnode-id="1159" instrument_node="">
</span><p data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">The political message is that Russia does have no right whatsoever to interfere in that process. Ukraine is a sovereign, independent nation. And every sovereign, independent nation has the right to choose its own path, including what kind of security arrangements it wants to be part of.</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">So it is up to Ukraine and 30 Allies to decide when Ukraine is ready to join the Alliance.&nbsp;[Russia] has no veto, no right to interfere in that process.&nbsp;</span></p><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1150" instrument_node="">
</span><p data-dcnode-id="1146"><strong data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1147" instrument_node="">: We go to Reuters.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1138"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Sabine Siebold (Reuters)</span></strong><span data-dcnode-id="1139" instrument_node="">: Secretary General, would you have a comment for us on the announcement by Belarus yesterday to hold joint military drills with Russia on Ukraine's border?</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1130"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1131" instrument_node="">: Russia and Belarus of course have the right to exercise their own forces on their own territory. But if they do so, or when they do so, there has to be transparency. And they have to avoid provocations. What we see now is lack of transparency. We see an unusual concentration of forces, and we see heightened and very aggressive rhetoric.</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">So there are actually international agreements, the Vienna document, that regulate how countries in Europe should be transparent on military posture and military activities, including military exercises. So that is the challenge, it is that we see this unusual military build-up of Russia, we see the rhetoric, and of course we see the inhumane and cynical use of vulnerable people, migrants, by the Belarusian regime, by the Lukashenko regime, to put pressure on other countries.</span></p><span data-dcnode-id="1126" instrument_node="">
</span><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1117"><strong data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1120" instrument_node="">: Okay, we have Deutsche Welle/NPR.</span><br data-dcnode-id="1119"><span data-dcnode-id="1118" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1112"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">Teri Schultz (NPR/DW)</span></strong><span data-dcnode-id="1113" instrument_node="">: Mr. Secretary General, could you give us more idea about what concrete measures are in the toolbox for all of this aggression? I mean, we've asked you before but I understand Allies are considering a range of options, Secretary Blinken said this is under discussion. Other than the VJTF, what can you do? And what kind of economic measures are you thinking that NATO governments could take, since you don't have sanctions at your disposal? Thanks.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1104"><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1105" instrument_node="">: NATO is a platform to make decisions, but also to consult and coordinate efforts by NATO allied countries.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">So for instance, on economic sanctions, political reactions, even though NATO does not necessarily make the decisions to impose sanctions, that is for individual Allies to do, and for the European Union. Of course, NATO is a platform where European Allies, the European members of the European Union, and Canada, and North America come together.</span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">And therefore, the coordination, the political discussions we have here, is actually shaping the decisions we take as individual Allies. And therefore, also economic sanctions and political reactions are part of what we have discussed today, also with the United States.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">We represent 50% of the world's GDP. And of course, it matters when NATO Allies discuss also the use of economic sanctions against the behaviour of Russia. And we have seen our resolve, and our willingness, and our ability to actually maintain, sustain such economic sanctions when needed.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">I think that actually Russia underestimated the resolve of NATO Allies to impose sanctions and sustain sanctions after the illegal annexation of Crimea in 2014.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">We have also imposed political measures, including by NATO, suspending practical cooperation with Russia. And then, NATO, as an Alliance, made important decisions on increasing the readiness of our forces, of increased presence in eastern part of the Alliance, more air policing, naval presence. And all that together sent a very clear message after the illegal annexation back in 2014. And of course, there are similar measures that are possible options, we will look into also this time, without going into detail or speculating exactly about what the decisions will be. Economic sanctions, financial sanctions, political reactions, but also as you have seen the readiness of NATO to protect and defend all Allies, as we have done with increased presence in eastern part of the Alliance.</span></p><span data-dcnode-id="1088" instrument_node="">
</span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1079"><strong data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1082" instrument_node="">: Frankfurter Allgemeine Zeitung.</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1074"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Thomas Gutschker (Frankfurter Allgemeine Zeitung): </span></strong><span data-dcnode-id="1075" instrument_node="">Thanks a lot. Secretary General, Allies have decided today to activate the NATO crisis response mechanism and move to a common assessment and possible options to respond to the crisis. How important is that for NATO? And what will it mean in practical terms?</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1066"><strong data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1067" instrument_node="">: The Allies agree that we need to have the plans in place to be sure that we are always able to protect all Allies against any potential threat. And that's just to demonstrate the resolve and also that NATO lives up to our core commitment. And when we see more threats, more challenges, we see the fluid situation in and around Ukraine. And we also see this combined with the rhetoric and the track record of Russia. Russia has used force before, against European neighbors: Georgia, Ukraine, and they had troop forces in Moldova.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">And then, of course, it is necessary to also look into the possibilities that Russia may consider once again to use force.</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">We can of course hope for the best, but we need to be prepared for the worst. And NATO is always prepared. And we always demonstrate the resolve and the willingness to protect all Allies, partly by clearly communicating that message, but also by actually implementing the biggest reinforcement or our collective defence since the end of the Cold War, including by developing the plans, increasing the readiness, reforming the command structure. And as you all know, for the first time in our history, deploying combat ready troops to the eastern part of the Alliance. And this deployment of troops in the eastern part of the Alliance, including the Black Sea, not only in the Baltic region, was a direct response to Russia's aggressive actions against Ukraine.</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1052"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1053" instrument_node="">: We'll try to take a couple of questions online now. I see Jonathan Beale from the BBC. Johnny, go ahead.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1044"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Jonathan Beale (BBC)</span></strong><span data-dcnode-id="1045" instrument_node="">: Thank you very much, Secretary General. You warned of a high price Russia would pay if it did carry out an incursion into Ukraine. But then you talk about economic and political consequences. So is it right to assume there would be no military response? If, and I know that Ukraine is not a member of NATO. But is it right to assume that there would be no military response at all if Russia did that? And the other question I'd like to ask is that you know, you've been warning about this for a number of weeks now. A warning of serious consequences. Have you ever seen any effect that has had on the build-up of Russian forces on Ukraine's border? Thank you very much.</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1035"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1036" instrument_node="">: The main purpose is to deter Russia from conducting aggressive military actions against Ukraine. And that's a message from all Allies, to call on them to not use force once again and not to violate the territorial integrity and sovereignty of Ukraine, as they have done before, and actually continue to do by occupying Crimea, and continue to destabilizing eastern Ukraine.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">What Allies do, and that was also addressed during the meeting today, is of course that we share information, we share intelligence, and we monitor very closely what is going on, and we have assets that provides us with vital and important and very detailed information. And we are actively assessing the situation.</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1030" instrument_node="">And then, we provide support to Ukraine. Political support, practical support, Allies provide training, capacity building, and also military capabilities, equipment. And this is real support. And this increases the threshold for Russia to conduct military aggressive actions against Ukraine, to once again conduct an incursion into Ukraine. Because to strengthen the armed forces of Ukraine is a way to help them to conduct their sovereign right for self-defence. That’s the right of every sovereign nation. And that includes also Ukraine. And we support Ukraine in upholding that sovereign right for self-defence.</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
And NATO is also participating. I visited Odessa where NATO trainers, experts help them with building the naval capabilities of the Naval Academy. There are different kinds of support, and trust funds, and activities by NATO and NATO Allies to strengthen the armed forces of Ukraine.</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Then, I think it's important to understand that there is a difference between what we do to support our partner Ukraine. And we're constantly seeing, looking into what should we do as Allies, or as an Alliance. And then what to do to live up to our main responsibility to protect NATO Allies. In this region, in the Black Sea region. And there we have already done a lot, and we are constantly assessing what more we should do, and then we ensure that we have all the plans and the capabilities in place to be able to react to any possible situation and threat against any NATO Ally. That's the collective defence clause that applies for NATO Allies, and then, we provide support to our partner, Ukraine.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="1017" instrument_node="">: We’ll go to Lorne Cook from the Associated Press next.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1012"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">&nbsp;</span></strong></p><span data-dcnode-id="1011" instrument_node="">
</span><p data-dcnode-id="1007"><strong data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Lorne Cook (AP)</span></strong><span data-dcnode-id="1008" instrument_node="">: Secretary General, coming into this meeting, I had the impression that there was a slightly different assessment between certain Allies about the threat posed to Ukraine. And what we can see now, though, I mean, you've said today, there's no certainty about Russia's intentions, at the same time a crisis response mechanism has been activated. How do we, how should we understand this? Are we talking about a serious threat or is this an unjustified fear? Is there is there a common assessment?</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="999"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="1000" instrument_node="">: There is a common assessment that we are concerned about the situation in and around Ukraine. And Allies share intelligence. Then, of course, there is no certainty, no clarity about exactly what are the Russian intentions. And they may actually evolve and change.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="997" instrument_node="">So the thing is that you can discuss whether the likelihood for incursion is 20% or 80%. It doesn't matter. We need to be prepared for the worst. And we need to convey a message to Russia that they should not conduct a military incursion into Ukraine. They have done it before. They continue to support the separatists in Donbass. And we should deter, send the message, that they should not do that again. And hopefully they will not do it. But as I said, we also need to be prepared for the other scenario, that Russia actually, once again, use military force, and we are prepared for that.</span><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="987"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="990" instrument_node="">: Final question, will go to the National News Agency of Ukraine and Dmytro Shkurko.</span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">
&nbsp;</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="982"><strong data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Dmytro Shkurko (National News Agency of Ukraine): </span></strong><span data-dcnode-id="983" instrument_node="">Thank you so much for that opportunity, Secretary General. I have one question. NATO has increased its presence in the Black Sea area, in response of the aggressive actions of Russia. But still, it was some kind of reactive move. My question is if ministers and [inaudible] future Madrid Summit will consider some kind of independent, or maybe self-sufficient, [inaudible] strategy for NATO, which will be would be proactive. And another part of that same question: how that could be reflected in the new Strategic Concept of NATO? Thank you so much.</span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">&nbsp;</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="975" instrument_node="">: Yes, NATO has increased its military presence in the Black Sea area, on land, at sea, and in the air. And we did that as part of the big reinforcement of our Alliance that has taken place since 2014. And we continue to assess and analyse further adjustments in our posture in the area.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">We have to understand that three NATO Allies are littoral states to the Black Sea. Two close NATO partners, Ukraine and Georgia, are littoral states. So, of course, this region is of great strategic importance for NATO.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">And then, in the same region, the Black Sea region, is exactly where we are seeing the unusual concentration of Russian forces, and where we are seeing that Russia continues to undermine, to be responsible for aggressive actions, including cyber, hybrid, aggressive actions against Ukraine. And now have this really threatening rhetoric against a sovereign independent state, which is a close partner of NATO.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">So all of these are reasons for NATO to be vigilant to, to be present. And also, the reason why we have already stepped up and continue to assess what more it is needed to do.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">I'm looking forward to meet the Foreign Minister of Ukraine tomorrow. We will meet him, and also the Foreign Minister of Georgia. And that will also be a sign and demonstration of our solidarity with the two close partners in this region.</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">&nbsp;</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="954"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">NATO Spokesperson</span></strong><span data-dcnode-id="955" instrument_node="">: Thank you very much. This concludes this press conference. Wishing you a good evening and see you tomorrow. Thank you.</span></p><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="949"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">NATO Secretary General</span></strong><span data-dcnode-id="950" instrument_node="">: Thank you.</span></p><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span></section><span data-dcnode-id="943" instrument_node="">
