</span><p data-dcnode-id="802"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="803" instrument_node="">Thank you very much. And maybe you could comment on the strategic compass, just maybe if you have a footnote on this, which was just presented in its first version a couple of days ago capturing the European strategic ambitions. And there is one last question you can win, er . . . yeah, over here?&nbsp;</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="797"><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">HANS-JOACHIM GIESSMANN:&nbsp;</span></strong><span data-dcnode-id="798" instrument_node="">Yes, I’m Hans-Joachim Giessmann, I’m a member of the board of the German Atlantic Association. My question relates to NATO’s Resolute Support Mission in Afghanistan. Since that was not very successful at the end, my question is what are the consequences for future engagement in doing trainings outside of Europe by NATO?</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="792"><strong data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="793" instrument_node="">So, three areas and five minutes.&nbsp;</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="785"><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="788" instrument_node="">OK, fine. Then I’ll just start with the last one, Afghanistan. We . . . I think we have to remember that we went into Afghanistan to fight international terrorism, to degrade Al-Qaida that was responsible for a terrorist attack against NATO Ally, the United States.&nbsp;</span><br data-dcnode-id="787"><span data-dcnode-id="786" instrument_node="">
Over 20 years, we have prevented Afghanistan from being a safe haven for international terrorists, prevented any attack organised on any NATO Ally planned, organised from Afghanistan, and we have degraded Al-Qaeda. So our mission was not in vain.&nbsp;</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Having said that, of course, I realise that what happened in Afghanistan during the summer... and in August with the return of the Taliban is a tragedy for the Afghan people, and it’s heart-breaking for all those who sacrificed, the families that lost family members in Afghanistan, including German families. But we need to have this kind of balanced approach. That was a tragedy.&nbsp;</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">At the same time, the mission was not in vain because the main tasks, the main purpose, to fight terrorism, we actually achieved a lot.&nbsp;</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">Now, the aim is, of course, to preserve the gains in the fight against terrorism and to hold the Taliban accountable for what they have promised and also to . . . we should be honest on our lessons learnt.&nbsp;</span></p><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Because we have now, I have launched a lessons learnt process in NATO. It’s too early for me to pre-empt all those conclusions, but I can just share with you a few reflections. One is that, of course, what we saw in Afghanistan was that we started with a well-defined and kind of narrow aim: to fight terrorism. And then gradually that evolved into a big ambition of nation building, to create a more stable, democratic Afghanistan – which is an aim I supported. But it’s a much more ambitious aim than fighting terrorism. And of course, NATO was part of that, but that was a responsibility for the whole international community. I was Prime Minister of Norway. I was pushing that agenda hard. So this is a responsibility not only for NATO, but for individual Allies. Many . . . most Allies have spent more development aid money to try to build a democratic, peaceful Afghanistan in Afghanistan than military spending.&nbsp;</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The UN, EU, all of us had this ambition of a peaceful, democratic Afghanistan – that we didn’t achieve. So we need to think carefully about increasing the level of ambition when we go into these kind of missions and operations, but that’s not only a NATO lesson, it’s a lesson for the whole international community.&nbsp;</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The second thing is we can, we should not draw the wrong conclusions. Of course, NATO and NATO Allies have to be ready to deploy forces again to fight the international terrorism if needed, as we have done degrading ISIS in Iraq and Syria. There was no way we can achieve that without using military force. And now we continue to train the [Iraqi] security forces to help them prevent ISIS from returning.&nbsp;</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">The last thing on Afghanistan is that it was a difficult decision, but we made it together. We had three ministerial meetings. Many committee meetings in NATO, consulting on the decision. We knew, when we made the decision, that this was a difficult decision. If we decided to stay, the risk was an open-ended military mission, more fighting, more violence, more casualties and, most likely, the need to increase the number of NATO troops. Or, if we left, the risk of Taliban returning. So there was a difficult dilemma, we made a difficult decision and we have seen the consequences, but there would have also been risks and consequences if we’d decided to stay.&nbsp;</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Then, on Libya, that’s a very important question.&nbsp;</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">And I think it also demonstrates that when European Allies ask NATO for help, NATO is there. So, if European Allies need high readiness forces, we are here – 45,000 NATO Response Force.&nbsp;</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">We see how NATO Forces in Kosovo work hand in hand with EU diplomats and helping to solve some of the crisis there, recently with border issues between Kosovo and Serbia. We see how NATO, in Bosnia-Herzegovina support the EU efforts. So, we see, in many places . . . or, in the Aegean Sea, where we deployed NATO ships to support the EU implementing an agreement with Turkey.&nbsp;</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">So, when European Allies ask NATO for help, we are there.&nbsp;</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="747"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="748" instrument_node="">&nbsp;So, is there still a need for a Rapid Reaction Force then? And EU Rapid Reaction Force?</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="742"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="743" instrument_node="">&nbsp;Listen, we have a rapid reaction force, we have the NATO Response Force – 45,000. So that’s exactly what we saw in Libya. So I was then, again, Prime Minister of Norway. I was in Paris when they made the decision, I supported the decision. But NATO’s not at the table. It was not . . . NATO’s not at the table when it is decided, the air campaign against Libya. It was a European initiative, supported by, of course, France, the United Kingdom, but also Norway. I take full responsibility. But it was not a NATO decision. It was without NATO. NATO was not part of the decision. Then after some days and some weeks European Allies, including Norway, realised that we didn’t have the resources. We didn’t have the ammunition, we didn’t have the capabilities, we didn’t have the air-to-air refuelling. So we went to NATO and NATO provided support.&nbsp;</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">So, in a way, there are Kosovo, Bosnia, Aegean Sea, Libya very different, but all are European needs that NATO helps to fill.&nbsp;</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">So, NATO is there also for Europe.&nbsp;</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="731"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="732" instrument_node="">Maybe one last minute on arms control because I promised my colleagues that you will be done here by 10:35.&nbsp;</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="726"><strong data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="727" instrument_node="">That’s one minute.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="721"><strong data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="722" instrument_node="">&nbsp;Yes. [laughs]</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="716"><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="717" instrument_node="">But the problem is not the questions, the problem is the long answers, yeah, so . . . No, but on arms control, so we are always ready to sit down and discuss arms control. NATO has been working for arms control, including the Open Skies Treaty, but we saw some compliance issues from the Russian side, we also regret the Russian decision, but we are ready to talk, we are ready for dialogue. And, for me, dialogue on arms control is not a sign of weakness, it’s actually that we are confident, we are strong, we are united, so we are never afraid of talking to Russia.&nbsp;</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="712" instrument_node="">&nbsp;Thank you very much and that was really professional.&nbsp;We are tremendously grateful that you took the time. I think it was a very difficult spot you were in. And now we cannot keep a very important woman waiting any longer. We are approaching the Chancellery and Chancellor Merkel, who is a bit more important than we are.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="707" instrument_node="">&nbsp;No. ah!</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="701"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="702" instrument_node="">So you are excused and thank you very much for your time and your energy and your spirit.&nbsp;</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="696"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="697" instrument_node="">&nbsp;Thank you so much. Great honour to be here. Thank you.&nbsp;</span></p><span data-dcnode-id="695" instrument_node="">
</span></div><span data-dcnode-id="693" instrument_node="">
</span></section><span data-dcnode-id="690" instrument_node="">

  </span></h1><span data-dcnode-id="617" instrument_node="">
</span></header><span data-dcnode-id="615" instrument_node="">
</span><ul class="list" data-dcnode-id="544"><span data-dcnode-id="614" instrument_node="">
</span><span data-dcnode-id="612" instrument_node="">
