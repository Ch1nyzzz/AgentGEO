</span><h1 class="fs-huge" data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Speech</span></h1><span data-dcnode-id="1594" instrument_node="">
</span><h2 data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">by NATO Secretary General Jens Stoltenberg at the German Atlantic Association 'NATO Talk' Conference 2021</span></h2><span data-dcnode-id="1591" instrument_node="">

</span><section class="content cf" data-dcnode-id="692"><span data-dcnode-id="1536" instrument_node="">
</span><p class="introtxt" data-dcnode-id="1534"><span data-dcnode-id="1535" instrument_node=""> (As delivered) </span></p><span data-dcnode-id="1533" instrument_node="">
</span><span data-dcnode-id="1531" instrument_node="">
</span><div class="box box-media box-media--stretched" data-dcnode-id="1525"><span data-dcnode-id="1530" instrument_node="">
</span><span data-dcnode-id="1528" instrument_node="">
</span><img alt="" class="lazy" data-dcnode-id="1527" data-original="/nato_static_fl2014/assets/pictures/images_mfu/2021/11/stock/211119-sg-ata.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nato.int/nato_static_fl2014/assets/pictures/images_mfu/2021/11/stock/211119-sg-ata.jpg&amp;raw" style="display: block;"><span data-dcnode-id="1526" instrument_node="">
</span></div><span data-dcnode-id="1524" instrument_node="">
</span><div data-dcnode-id="694"><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Thank you so much Jana.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">And good morning to all of you.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">It’s great to be back in Berlin. I have been in Berlin many, many times before but this is the first time I’m on a boat on this river. And not only on a boat on the river but on an electric boat. So it’s great to see what you achieve, in Germany and in Berlin.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">Then of course it’s an honour to once again participate in a ‘NATO Talk’.</span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">And I would like to thank all my hosts of&nbsp; German Atlantic Association, the Federal Academy for Security Policy for inviting me here today.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">And then let me also say that it is always good to bein Berlin and Germany, because Germany is a very highly, highly valued Ally, contributing to our transatlantic security in many different ways.</span></p><span data-dcnode-id="1505" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">From Baltic air policing, to maritime deployments in the Aegean sea.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">And from leading the multinational NATO battlegroup in Lithuania, to our new logistics command in Ulm.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">And Germany has also been a long-standing supporter of our peacekeeping mission in Kosovo.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">And as you all know Germany was the second largest to contribute to our mission in Afghanistan.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">So all of these contributions demonstrate the strong commitment of Germany to NATO, to our transatlantic bond and is highly valued by NATO and by all of us.&nbsp;&nbsp;</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">In an increasingly dangerous and competitive world, this commitment is as important as ever.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Today we face many different challenges.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Russia carries out aggressive actions. It interferes in other countries' affairs.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">It has invested significantly in military capabilities, including new, advanced nuclear weapons.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">And Russia continues its massive military build-up, as we see now around the borders of Ukraine. And it has shown a willingness to use military force against its neighbours.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Meanwhile, China is using its might to coerce other countries and control its own people. It is investing heavily in new technologies, like hypersonic glide vehicles. Expanding its global economic and military footprint in Africa, in the Arctic and in cyber-space.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">And China is suppressing democracy and human rights at home. We don’t regard China as an adversary but we need to take into account the consequences for our security, the rise of China.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">In addition, we face more frequent and sophisticated cyber-attacks. Hybrid tactics, as we see today from Belarus on the border with Poland.&nbsp; We also face persistent terrorist threats. The proliferation of nuclear weapons. And the security implications of climate change.</span></p><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">These challenges are all very different.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">But they have one thing in common.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">And that is that the best way to tackle them is to stay united. Europe and North America together in NATO.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">That is why reinforcing the transatlantic unity and strengthening NATO is so important right now.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">There is strong bi-partisan support for our Alliance, for NATO, in the United States.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1450" instrument_node="">The US wants </span><u data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">more</span></u><span data-dcnode-id="1447" instrument_node=""> cooperation with Europe.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">They have demonstrated this not just in words, but also in deeds.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">In recent years, the US has increased its military presence in Europe.</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">With more troops, more exercises, and more pre-positioned equipment.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">And for me that is actually a very strong demonstration of commitment to transatlantic security, that they actually increase their presence in Europe.</span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">The US commitment to NATO was reiterated at our Brussels Summit in June this year.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">When President Biden, together with Chancellor Merkel and all the other NATO leaders, adopted NATO 2030 –</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">an ambitious and forward-looking agenda for our security.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">We took bold decisions to strengthen our Alliance even more, as the indispensable forum to consult, decide and, when necessary, act on all issues that affect our security. We decided to sharpen our technological edge.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">So we are investing in the latest technologies. From artificial intelligence to biotech and quantum computers.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">We are developing a Defence Innovation Accelerator for the North Atlantic – what we call DIANA, to facilitate transatlantic cooperation and exchanges on critical technologies.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">And we launched the new NATO Innovation Fund, with full involvement from Germany.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">To invest in start-ups that will build and help us meet our security needs,</span></p><span data-dcnode-id="1409" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">and strengthen the technological bond between Europe and North America.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">At the Summit in Brussels, we also decided to address the impact of climate change on our security. So Allies are investing in sustainable solutions, and we welcome the fact that we have an electric boat demonstrating what sustainable solutions might be. We invest in bio-fuels for jet aircraft, and solar panels to power equipment.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">And for the first time, NATO is developing a way to map military emissions across the Alliance, that’s the first step to be able to cut those emissions.</span></p><span data-dcnode-id="1400" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">On technology, climate and in many other areas, we are committed to working even more closely with our partners.</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Not least with the European Union.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">NATO and the EU are different organisations, with different members, different roles and different tools.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">But more than 90 percent of EU citizens live in a NATO country.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">So we face the same security threats.</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">We share the same values.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">And we have lifted our cooperation, the cooperation between NATO and the EU to unprecedented levels.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">My ambition is to strengthen our partnership still further.</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">So I am now working with President Von der Leyen and President Michel on a new Joint Declaration between the two EU presidents and myself to chart the way forward for further strengthening NATO-EU cooperation.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">As I have said many times, I welcome European efforts on defence.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">NATO has been calling on European Allies for many years to invest more, and provide more capabilities.</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">It is good news that Allies, including Germany, are stepping up.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">At the same time, we must avoid creating parallel structures in the EU, that would compete for the same, limited, pool of resources and forces that we rely on for our NATO Alliance.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">What we need is new capabilities. Not new structures.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">These are pivotal times. For Europe. For international security.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">That is why I count on Germany to continue to invest in defence.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">NATO’s 2 per cent guideline reflects clearly defined capability targets. And requirements that we have all agreed to meet.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">I also count on Germany to strengthen European security within a transatlantic framework.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">You are at the heart of Europe. With its largest economy. And you are a champion of multilateralism.</span></p><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">So Germany has a special responsibility to keep NATO strong. This means providing more and new capabilities. Soldiers that are well-trained and well-equipped. Planes that can fly. And ships that can sail.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">And I count on Germany to remain committed to NATO’s nuclear sharing.&nbsp;</span></p><span data-dcnode-id="1337" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">It is our ultimate security guarantee.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Our aim is a world free of nuclear weapons.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">But as long as others have them, NATO must have them too.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">The nuclear weapons we share in NATO</span></p><span data-dcnode-id="1325" instrument_node="">
</span><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">provide European Allies with an effective nuclear umbrella.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">This, of course, also includes our eastern Allies.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">And they are an important signal of Allied unity against any nuclear-armed adversary.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">So NATO’s nuclear sharing arrangements are of particular importance for Europe.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">In today’s uncertain world, we are safer when Europe and North America stand together. In strategic solidarity. With a strong Germany at the heart of our Alliance.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Thank you, and then I’m ready to take your questions.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1303"><strong data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="1304" instrument_node="">&nbsp;Thank you very much. Another question that came to my mind while listening to you is NATO’s Strategic Concept, which is basically the project for the upcoming months.&nbsp;</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">And I was wondering if you were, kind of, the only person responsible for the content, if it was only up to you, what would be in there, what do you want to see? If you were kind of the penholder and it was all your responsibility?</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;&nbsp;</span></strong><span data-dcnode-id="1296" instrument_node="">Yeah, but you know, my main responsibility is to make sure that we have a good Strategic Concept, a forward-looking, ambitious Strategic Concept when we agree it finally at the NATO Summit in Madrid next year.&nbsp;</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">And if I start to outline the details now, I will reduce the likelihood of having the Concept I would like to have. So, therefore, you just have to accept that my role is not to be a kind of private individual saying exactly what I want now, but to facilitate the process of 30 Allies working together to achieve consensus, agreement on an ambitious and forward-looking Strategic Concept.&nbsp;</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">But I can just share with you some reflections.&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">And the first is that the current Strategic Concept that was agreed in Lisbon in 2010, that Strategic Concept has served NATO well. And it is an important document. It is the most important document next to our founding treaty, the Washington Treaty.&nbsp;</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">But what we have seen is that over those 10 years or so, the world has changed. Because if you look into the current Strategic Concept, we address Russia as a strategic partner. We don’t mention China with a single word. And for instance, climate change – the security consequences of climate change – is hardly mentioned.&nbsp;</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">So it is obvious that since the world has changed, we also need to update and agree a new Strategic Concept, and that’s exactly what we are doing.&nbsp;</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">And therefore, I expect the Strategic Concept to be very clear on our core values: democracy, rule of law.&nbsp;</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">I expect the Strategic Concept, of course, to send a very clear message of the need for North America and Europe to stand together. This is the success of NATO. We are 30 different Allies and, of course, there are differences and there have always been differences. But, the success of NATO is that despite these differences, we have been able to unite around our core task to protect and defend each other. That was important during the Cold War, but in many ways it’s even more important now, because we face an even more unpredictable and, in many ways, more uncertain world than we did 20 or 30 years ago. So to recommit to the transatlantic bond, Europe and North America stand together, I also expect, hope it will be part of the Strategic Concept.&nbsp;</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">And then also take into account the security consequences of the rise of China, knowing that that has consequences for our security.&nbsp;</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Many other issues, but I think I’ll stop there.&nbsp;</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1263"><strong data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp; </span></strong><span data-dcnode-id="1264" instrument_node="">Thank you very much. But maybe you could also give us a hint what you think would be the most controversial topics when we discuss the Concept now? So what do you think will be the kind of stumbling blocks?&nbsp;</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1258"><strong data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;&nbsp;</span></strong><span data-dcnode-id="1259" instrument_node="">No, but, again, if I start to list that, I will make my task more difficult, because really there are many people and experts and journalists and media, they will use almost all their time to identify the difficulties. So if I add to that, I will actually just make the whole process more difficult.&nbsp;</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">My task is to find a positive approach, to find the solutions, to find how to deal with the differences.&nbsp;</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">And everyone that can see, can see that there are differences between 30 Allies. So that’s not . . ., you don’t require a high degree of intellectual capacity to, in a way, to identify differences.&nbsp;</span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">So, the impressive thing is not to identify differences or disagreements.&nbsp;</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">The impressive and important task is to actually, - based on those differences, or taking that into account-, to find a common ground. That’s my task.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1241"><strong data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="1242" instrument_node="">Yeah, and based on this, I think NATO has a tremendous track record, as is also mapped out in the publication that the Deutsche Atlantische Gesellschaft will publish today.&nbsp;</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">So you were absolutely right, and we have a lot of journalists on board who can ask critical questions and identify stumbling blocks.&nbsp;</span></p><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">I open it up now to you, and also to comments that come in online.&nbsp;</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">And the first on my list is Reinhard Bütikofer, who is a Green politician and represents part of the traffic light coalition in the making, on board. Could you hand over…</span></p><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1227"><strong data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">REINHARD BÜTIKOFER [politician of the German Green Party/MEP Chair of the European Green Party]:&nbsp;</span></strong><span data-dcnode-id="1228" instrument_node="">Secretary General, thank you for your remarks.&nbsp;</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">My question is this: the tensions within and around Bosnia and Herzegovina are escalating. What role do you foresee for NATO in that context?</span></p><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1219"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1220" instrument_node="">First of all, we are following the developments in the Western Balkans in general and Bosnia-Herzegovina in particular with concern, because we have seen some increased tensions, some challenges. We saw it in Kosovo and Serbia recently. And now we have seen also some developments in the wrong direction and some in inflammatory rhetoric in Bosnia-Herzegovina.&nbsp;</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">And NATO feels . . . NATO has a responsibility, partly because Bosnia-Herzegovina, the Western Balkans is in the middle of Europe. We have a history there. We helped to end two ethnic wars in Bosnia-Herzegovina and later on in Kosovo-Serbia.&nbsp;</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">What we do is, of course, that we are working closely with Bosnia-Herzegovina. We are making progress on how we help them with capacity building, how we work with their armed forces. And we have also made some progress on how we actually have stepped up our partnership with Bosnia-Herzegovina. I think this is particularly important as we see increased tensions now, because one of the few . . . or perhaps the only really multi-ethnic institution in Bosnia Herzegovina is the armed forces, are very much trained and supported by NATO.&nbsp;</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">So I think it also proves the value of the NATO presence, together with the EU, in trying to build some institutions and the armed forces is, actually, perhaps the only one that is truly multi-ethnic.&nbsp;</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">So we will continue to provide support, capacity building. We will continue to support the efforts of Christian Schmidt and many others to try to just find political solutions.&nbsp;</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">And then also continue to provide support to Bosnia-Herzegovina and their Euro-Atlantic aspirations.&nbsp;</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">And then, of course, it is also important to also call on all other countries to not add fuel to the fire or to stimulate or support this idea of breaking with the Dayton Peace Agreement and everything that has actually created some peace and stability in the region.&nbsp;</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1196"><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="1197" instrument_node="">&nbsp;I have two questions online. One by Jill Long and one anonymous, addressing the same issue. Both are asking about cyber-attacks and malign influence crossing military and economic domains. So cyber conflict as a very important theatre now, and even more so in the future.&nbsp;</span></p><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">How does NATO adapt?&nbsp;</span></p><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1188"><strong data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1189" instrument_node=""> Well, I think cyber is an example of how NATO has been able to change as the world changes. Of course, not so many years ago, cyber was not an important part of our military posture and what we did as an Alliance.&nbsp;</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Then, over the last years, we have really made cyber an important task for NATO, because we see that cyber is becoming a domain where we see frequent and more and more sophisticated attacks and aggressive actions.&nbsp;</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">And I think it also demonstrates that the line between peace and war is more blurred now than before, because we see almost constant attacks in cyberspace.&nbsp;</span></p><span data-dcnode-id="1181" instrument_node="">
</span><p data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">What we have done in NATO are different things.&nbsp;</span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">We have, first of all, we have declared, agreed, that a cyber-attack can trigger Article 5, meaning that we regard cyberattacks as potentially as damaging as a kinetic attack. So an attack in cyberspace can trigger our collective defence clause, Article 5. Then we are free to respond in cyberspace or in any other domain, that’s up to us to decide.&nbsp;</span></p><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">Second, we have established cyber as a military domain. So now we have air, land, sea and cyber – and, actually, also space.&nbsp;</span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">And thirdly, we have developed and strengthened our cyber capabilities, partly to protect NATO networks, but also to help and support Allies in protecting their networks, sharing best practices. And we have regularly big cyber exercises to improve our capabilities and the way we are able to operate together.&nbsp;</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">So cyber is actually an area where NATO do a lot and where we really need 30 Allies to work together.&nbsp;</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1162"><strong data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="1163" instrument_node="">Thank you very much. And just a hint to everybody on board who wants to ask a question? Just, I would appreciate a raised hand so that I can basically look how many questions there are. And there was one over there, and I would be . . . I would like to ask you to introduce yourself to the Secretary General.&nbsp;</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1157"><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">HANS-PETER BARTELS [Former Parliamentary Commissioner for the Armed Forces]:&nbsp;</span></strong><span data-dcnode-id="1158" instrument_node=""> Thank you. Hans-Peter Bartels, former Parliamentary Commissioner for the Armed Forces. A simple question. Germany is the biggest member of NATO in Europe, it’s the most economic, powerful nation in Europe and in military means and in terms of military power. What is the contribution NATO needs most of Germany? Is it air force? Is it navy? Is it the army? Is it special needs that Germany can bring in? A stronger NATO – where is the shortfall, Germany can help?</span></p><span data-dcnode-id="1156" instrument_node="">
</span><p data-dcnode-id="1152"><strong data-dcnode-id="1154"><span data-dcnode-id="1155" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="1153" instrument_node="">&nbsp;We need all of that, so meaning we need many different capabilities from Germany. And . . . but in general, I can say that what we need is more high-end capabilities. We need more heavy, high-end capabilities, because I think you have to realise that for many years, European Allies reduced defence spending after the Cold War. And of course, that had an impact, also a long term impact, on our defence capabilities. Then for some years, we were very focused on expeditionary operations like Afghanistan. That was important, but that required a special type of more light and not high-end heavy weapons systems, not capabilities responding to peer adversaries or state-to-state competition.&nbsp;</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Now, especially since 2014, things have changed. And actually what has happened in NATO is a kind of fundamental shift from focussing on out-of-area Missions in Afghanistan and that type of challenges to coming home and doing collective defence in Europe. And that requires, yeah, as I said, heavier, high-end capabilities in all those domains – in air, sea land, but also cyber.&nbsp;</span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">And of course, Germany being the biggest economy in Europe and Germany, having the largest defence budget in continental Europe, of course, you have to provide not only one type of capabilities, but a wide range of capabilities.&nbsp;</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">High-end, but the other thing is that we need higher readiness. So well trained, well-equipped, high readiness forces is also something we expect from Germany. But it’s a detailed list, because we agree something called capability targets in NATO. So this is not only, you know, a kind of abstract thing, it’s a concrete list where we allocate capability targets for all Allies and then, of course, also for Germany.&nbsp;</span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">The only way to meet those targets, capability targets, is to invest more. So therefore, I’m calling on Germany and other Allies to do what we agreed, to increase defence investments.&nbsp;</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1135"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp; </span></strong><span data-dcnode-id="1136" instrument_node="">Thank you very much. Just to warn you, there are a lot of questions incoming. And I also want to give the floor to our colleagues from the press. And in order to identify you, could you maybe raise kind of two hands at once, so that . . . yeah, over there. Fabulous! So that I know that you are from the press. And could you just . . . I mean, COVID numbers in Germany are rising and maybe if you could all wear your mask, even while seated? We are in a . . . at a small ship, there is not a lot of air circulation. It would just be, I think, I know that it bothers, but it would be kind if you could wear a mask. So . . .&nbsp;</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1130"><strong data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">KLAUS REMME (German national radio, Deutschlandfunk):&nbsp;</span></strong><span data-dcnode-id="1131" instrument_node="">Klaus Remme from German national radio, Deutschlandfunk. I wonder, with respect to Belarus, Article 4 is mentioned more and more frequently, and I think it was part of a question to you up front. I wonder whether you could address that aspect in specific. I mean, is it a useful tool right now, given the situation on the ground, which you described? Or is there not a danger of militarising a conflict, which is dangerous as it is?&nbsp;</span></p><span data-dcnode-id="1129" instrument_node="">
</span><p data-dcnode-id="1125"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1126" instrument_node="">We are deeply concerned about the situation on the border between Poland and Belarus. I have spoken with the Polish President. We have been in . . . Poland has briefed and updated NATO Allies, we have discussed this several times at NATO. And a few days ago, we also agreed a strong statement. So there are ongoing consultations at NATO and we stand in solidarity, we are ready to also provide support.&nbsp;</span></p><span data-dcnode-id="1124" instrument_node="">
</span><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">But I think the most important thing regarding that situation is to actually solve the difficult situation on the border. And I welcome the fact that also NATO and other countries have engaged with our partners, including Iraq, to help to partly stop the flow of people coming to the border and also now to help to take people back. So we are constantly and in regular consultation with the close NATO Ally Poland and we will continue to do that as long as necessary.&nbsp;</span></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1117"><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="1118" instrument_node="">&nbsp;Thank you. And just an announcement. I worried you too much. Basically, the air circulation here is as if we were in an aeroplane, so it’s excellent. But still, I think, or I know, that some amongst you feel more comfortable if everybody wears a mask. So still wearing the masks, but feel safe because this ship is super-equipped.&nbsp;</span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">And before I come back again to, basically, people on board, because we’ve tried to involve as many students as possible in this endeavour, and the Hochschule fur Sicherheitspolitik Kiel, so a group of students at the University of Kiel ask a question which links perfectly to the question you just answered, because they are asking what you think is then the difference between Belarus using refugees as a tool of negotiations and Turkey doing the same?&nbsp;</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1110" instrument_node="">Turkey is the NATO Ally that has received the highest number of refugees – millions. And they are hosting close to four million refugees. And we have, of course, worked with Turkey to also address that situation.&nbsp;</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">And I welcome the fact that actually there is an agreement between Turkey and the European Union and that NATO is helping to implement that agreement, because we have the NATO presence in the Aegean Sea. It has been a German flagship ever since it started, I think it was back in 2015.&nbsp;</span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">So I think that we see the advantage of having NATO as a platform that brings Turkey together with other NATO Allies and, actually, also the European Union, to enable our presence in the Aegean Sea to help to implement the agreement between Turkey and the European Union addressing the flow of migrants across the Aegean.&nbsp;</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1098"><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="1099" instrument_node="">Thank you very much and we go back to a guest on board. And you cannot get the mic for corona reasons, yeah.&nbsp;</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1093"><strong data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">CHRISTIAN GRIMM [Augsburger Allgemeine]:&nbsp; </span></strong><span data-dcnode-id="1094" instrument_node="">Yeah, good morning, Mr Stoltenberg. My name is Christian Grimm, I’m a reporter for the Augsburger Allgemeine paper from the south of Germany.&nbsp;</span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">And I wanted to ask you if there are demands from the Eastern European NATO partners to even reinforce the existing battlegroups, given the current situation?</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1085"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="1086" instrument_node="">&nbsp; And if there are demands, how they would be answered?</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1080"><strong data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="1081" instrument_node="">&nbsp;So, we are constantly assessing the need for presence of NATO troops in the whole of the Alliance, but especially in the East. We have really increased after . . . before 2014, we didn’t have any combat-ready troops in the eastern part of the Alliance at all. Now we have four battlegroups.&nbsp;</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">And the importance for these battlegroups is that they are multinational. So there’s a NATO presence. One is led by Canada and other by the United Kingdom, United States and then Germany in Lithuania.&nbsp;</span></p><span data-dcnode-id="1076" instrument_node="">
</span><p data-dcnode-id="1072"><span data-dcnode-id="1075" instrument_node="">And, actually, Heiner Brauss is here, he was the driving force to get that . . . those forces in place as part of what we decided at our Summit in Warsaw.&nbsp;</span><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">
Then, we are constantly assessing the need to adjust our posture. But I would like to say that this is not only about the presence of troops in the Baltic region, it’s also about air policing and maritime presence. We have, for instance, now seen some more naval presence in the Black Sea Region.&nbsp;</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">And it is also about readiness. It’s about our ability to reinforce quickly, if needed. So just over the last few years, we have tripled the size of the NATO Response Force, and we have implemented something we call the Readiness Initiative, which is significantly increasing the availability of ready forces that can be deployed quickly if needed.&nbsp;</span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">So we should, of course, not only focus on troops in that region, but our ability to reinforce when needed.&nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Cyber is part of this, and of course, you cannot count that as the same way as you count troops. But whatever we do – and we are doing a lot on cyber – also matters for these countries.&nbsp;</span></p><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">And then lastly, I will say that the fact that Allies are investing more provides us with more capabilities that are also relevant for the eastern part of the Alliance.&nbsp;</span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1055"><strong data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="1056" instrument_node="">&nbsp;Thank you very much. Another press question and then I have a very good question from our online audience. But first over here.&nbsp;</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1050"><strong data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">PAUL KRÜGER [Süddeutsche Zeitung]:</span></strong><span data-dcnode-id="1051" instrument_node="">&nbsp;Paul Krüger with Süddeutsche Zeitung. Secretary General, one of the documents that is governing the relationship between Russia and NATO is the Founding Act. Given the behaviour by Russia, do you think that it’s still a viable document to define that relationship? And, if I may, another question regarding nuclear sharing, as you mentioned it in your keynote speech, if Germany would reduce its role, what would that mean, especially for the NATO Founding Act and the situation of the Allies eastward?&nbsp;</span></p><span data-dcnode-id="1049" instrument_node="">
</span><p data-dcnode-id="1045"><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1046" instrument_node="">So, first on the nuclear sharing, let me once again reiterate that NATO’s goal is a world without nuclear weapons. No one likes nuclear weapons.&nbsp;</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">But the reality is that, of course, when others have them we also will need to have nuclear weapons to make sure that we have significant nuclear deterrence.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">And the way to work towards a world without nuclear weapons, at least with few nuclear weapons, is to balanced, verifiable arms control. And therefore, NATO has been on the forefront of arms control for years. And since the end of the Cold War, we have reduced the number of nuclear weapons in Europe by 90 percent. And we have been working hard, for instance, for the INF Treaty, that was the key for banning all intermediate range weapons. And also, we welcome the agreement between Russia and the United States on extending New START, limiting the long range nuclear weapons.&nbsp;</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">We, of course, very much regret that Russia violated the INF Treaty, which led to the demise of the treaty, and they did that by deploying intermediate range and nuclear-capable missiles, violating the INF Treaty.&nbsp;</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">The nuclear sharing is important, because it’s an arrangement where NATO Allies go together and provide nuclear deterrence. It’s a multilateral arrangement among NATO Allies. It gives also a country like Germany a seat at the table. We have agreed doctrines, exercises, command and control. So it actually makes the whole of NATO responsible and also that the whole of NATO has a say when you make decisions on nuclear issues. I think this is extremely important for European Allies, because then we are involved and we take responsibility and we have a say.&nbsp;</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">We just a few weeks ago had a meeting of the NATO Nuclear Planning Group, where Allies are sitting together and taking important decisions on nuclear issues. And therefore, of course, I expect that Germany will continue to be part of nuclear sharing, because it is so important for the whole of Europe and it’s a multilateral framework.&nbsp;</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The alternative to NATO nuclear sharing is different kinds of bilateral arrangements and also the risk of having, you know, nuclear weapons also . . . so, of course, Germany can, of course, decide whether there will be nuclear weapons in your country, but the alternative is that we easily end up with nuclear weapons in other countries in Europe, also to the east of Germany.&nbsp;</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">So, I think that nuclear sharing is a balanced, well-organised, tested structure for nuclear deterrence, something we have as we, at the same time, continue to work strongly for disarmament, non-proliferation and arms control.&nbsp;</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">And Germany is playing a key role putting on the table at NATO important initiatives, and I really believe in this dual-track dialogue: arms control, combined with a strong deterrence and defence posture, including the nuclear sharing arrangements.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1016"><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp; </span></strong><span data-dcnode-id="1017" instrument_node="">The NATO-Russia Founding Act, I think was . . . ?</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1011"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="1012" instrument_node=""> Yeah, well . . . well, you can all see that the NATO-Russia Founding Act is not working. And the main reason for that is, of course, Russia’s behaviour: illegally annexing Crimea, violating the territorial integrity of an independent state in Europe.&nbsp;</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">And then, we have been working for dialogue with Russia. We were . . . we saw some progress over some years, but now Russia has decided to close down the two NATO offices in Moscow and close down, or suspend, their diplomatic mission in . . . at NATO in Brussels.&nbsp;</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">And of course, that makes it hard to implement the intentions of the NATO-Russia Founding Act, but we will continue to work for dialogue, because we strongly believe in this dual-track approach.&nbsp;</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">We need a strong, predictable united NATO. But based on that, we also can talk to Russia, partly to strive for a better relationship, but even though . . . even if we don’t believe in a better relationship with Russia in the foreseeable future, or in the short run, we need to manage a difficult relationship, to have risk reduction, to have transparency, to engage in arms control.&nbsp;</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">So, I continue to believe in dialogue with Russia, but I regret that Russia has not proven very willing to engage in dialogue with us.&nbsp;</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="995" instrument_node="">Thank you very much. I have to sneak in one question from our online audience, because it fits so perfectly well to what you said about nuclear sharing and the whole issue. So it’s not immediately related, somebody is asking, how is NATO dealing with the fact that Norway is seeking observer status at the upcoming Nuclear Weapons Ban conference? Looking at the coalition negotiations and looking at the debate we have, this is also a question maybe for Germany in the future. So what is your take?&nbsp;</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="990" instrument_node="">&nbsp;So my take is that we all are aiming for a world without nuclear weapons, but I believe that the best way to achieve that is to balanced, verifiable arms control.&nbsp;</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">A world where we get rid of our weapons but China, Russia and countries like North Korea retain their nuclear capabilities is not a safer world.&nbsp;</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">So, the only way to move towards nuclear disarmament is to balance verifiable reductions. And that’s exactly what NATO has been working for years. And of course, we have seen some serious setbacks with the, for instance, the demise of the INF Treaty.&nbsp;</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">But we also have to recognise that over decades we actually made a lot of progress with the INF Treaty and then also the START Treaties to actually reduce significantly the number of warheads. When we had the . . . at the beginning of the 1990s there were 12,000 warheads along . . . so, strategic warheads on each side. Now, with the New START, it’s 1.550, which is significantly lower than we had not so many years ago.&nbsp;</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">So we have proven that balanced, verifiable arms control works.&nbsp;</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Unilateral disarmament, which will be the consequence of the Ban Treaty is not a way to make the world safer and it’s not the way towards a world free of nuclear weapons.&nbsp;</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Then, what I think is important also regarding any move by any NATO Ally is that we need to consult. We need to be unified on these very important issues and consultations on all issues related to nuclear weapons.&nbsp;</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Nuclear posture is something, which applies for all NATO Allies.&nbsp;</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="963"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="964" instrument_node="">&nbsp;Clear position here from the Secretary General. I have more questions. I just wanted to give you a heads up. We have 17 minutes. We haven’t talked about China, the Biden administration, so there are several things. So I ask you, basically, for sharp and precise and crispy questions. And we will have one over here?</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="958"><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">FRANK JORDANS [Associated Press]:&nbsp;</span></strong><span data-dcnode-id="959" instrument_node="">Frank Jordans, Associated Press. I’d just like to follow up on two points you’ve already made. One on the border, the eastern border. Has NATO stepped up surveillance in its member state Poland and partner Ukraine lately, that you can confidently say you know exactly what’s going on, on both sides? And on climate change: if climate change is a security challenge, should national expenditure to respond to this threat be counted in any way towards defence expenditure?&nbsp;</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="953"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">DR. JANA PUGLIERIN [Moderator]</span></strong><span data-dcnode-id="954" instrument_node="">:&nbsp;Very grateful that you addressed climate change, that came up very often here also on Slido.&nbsp;</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="949" instrument_node="">OK. Briefly on climate change. Climate change matters for our security. Climate change is a crisis multiplier. It fuels conflicts related to competition over scarce resources, as water, land, and it forces millions of people to flee. So of course, it actually exacerbates security challenges and it impacts security and therefore it matters for NATO.&nbsp;</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">NATO’s role that we have, we have three important roles to play, or tasks.&nbsp;</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">One is to fully understand the link between climate change and security and we should be the lead organisation in understanding that link.&nbsp;</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Second, we need to reduce the impact of our militaries on climate, because there’s no way to reach the goal of net zero emissions without also reducing emissions from military operations and missions. And as I mentioned, we have very interesting developments and investments in, for instance, the use of biofuels for jet aircraft or solar panels for equipment and many other technologies. I strongly believe that we cannot either have green or strong armed forces. We need green and strong. So the challenge is, in a way, to find a way to combine the need for modern technologies, green technologies with, of course, having the strong and the high-end capabilities we need. I believe that’s absolutely possible. I think the best technologies in the future will actually be the green technologies.&nbsp;</span></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Then, the third task of NATO is to reduce the impact on climate change on our forces, because we are operating out there in nature. Our military forces will be exposed to more extreme weather, heatwaves, storms, increasing sea levels, melting polar ice. And of course, this matters for the way we are going to operate as armed forces. We have in Iraq a NATO Training Mission, they were exposed to more than 50 degrees Celsius over several days. And of course, it matters for uniforms, for whatever they do. So we have started this work at NATO.&nbsp;</span></p><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">I think, then having said all that, of course, if you invest in the military capability that reduces emissions, then it counts against the two percent. Yeah. So, if that was the question, the answer is yes. Then . . .&nbsp;</span></p><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="929" instrument_node="">&nbsp;Surveillance, also.&nbsp;</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="923"><strong data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="924" instrument_node="">Surveillance. Well, I cannot go into the details of what to do when it comes to intelligence, but I can say that we are now closely monitoring the developments along the borders. This matters for NATO and we have the capacity, we have the capabilities to collect information, to monitor it closely and to understand what is going on there. And therefore we also made it clear to Russia that we see their significant military build-up. We see an unusual concentration of forces. And we know that they have used these type of forces before to actually intervene and invade other countries: Georgia and Ukraine.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="918"><strong data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">DR. JANA PUGLIERIN [Moderator]</span></strong><span data-dcnode-id="919" instrument_node="">:&nbsp;I still think that we haven’t had a question on China, on the Biden administration and on the EU. And the next journalist who wants to ask a question on either of them wins the pot. So . . . oh, Mr Steinberg!</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="913"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">QUESTION:&nbsp;</span></strong><span data-dcnode-id="914" instrument_node="">Let’s talk about China. It’s a good idea, I think, Mr Stoltenberg. If it comes to a takeover, maybe an unfriendly takeover of the little island from China, what would be your response?&nbsp;</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="908"><strong data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="909" instrument_node="">And also, maybe we can extend this a bit, because we have several questions also from the audience looking at the AUKUS . . . hiccup – I don’t know what to say – what is, basically, how do you envision the future role of the EU in the Indo-Pacific and could that be part of the increased cooperation between NATO and the EU? Could that be on the Indo-Pacific, on China?</span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="903"><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp;</span></strong><span data-dcnode-id="904" instrument_node="">Yes, of course, but let me just briefly say on China more in general and then I’ll address the specific questions.&nbsp;</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">We don’t regard China as an adversary. We need to work with China. And of course, the rise of China has also had an enormous positive consequences for the global economy, they’re important markets for all of us. And it has helped to lift hundreds of millions of people out of poverty. So that is something which has been good for the world. And we need to engage with China on issues like climate change, but not least also on, for instance, arms control.&nbsp;</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">At the same time, we need to realise that when China now soon will have the biggest economy in the world, they already have the second largest defence budget. They have the biggest navy. They’re investing heavily in new, very capable, modern military systems, including long-range nuclear weapons, hypersonic glide vehicles, systems that can go around the whole globe and reach every NATO Ally. It matters for our security. There’s no way to deny that. And NATO should remain an alliance of North America and Europe. But in this region, we face global threats. In space, in cyberspace and also the fact that China has systems that can reach all of us.&nbsp;</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="895" instrument_node="">So, I think we need to realise that perhaps we could have some kind of regional approach to security 50 years ago, but that’s not possible anymore.&nbsp;</span><br data-dcnode-id="894"><span data-dcnode-id="893" instrument_node="">
So we are . . . our responsibility is to protect Europe and North America, but to do so we also need to address all these global challenges. And China is coming closer to us, in space, in cyberspace, we see them in Africa, we see them in the Arctic, we’ve seen them trying to control critical infrastructure, we had the very important debate about 5G very recently.&nbsp;</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">So, again, NATO has to address this together and the only way to address that is to do it together. That applies for Europe, but it also applies for the United States. And the good thing is that the United States, they really realise that it is a great advantage for the United States to have 29 friends and Allies. Because compared to China, the United States is not so big anymore. They used to be the biggest, but they will soon not have the biggest economy. And the aim of China is to have the most advanced and strongest military capabilities within a few decades. And they invest in . . . what they do now on nuclear is really big. They are building big . . . many new silos for missiles, and they’re investing in extremely advanced technologies.&nbsp;</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">So therefore, also, on Taiwan, I will also say that the most important task now is to prevent any conflict and I won’t start to speculate about what we will do or not do, I think that will only fuel or add to the tensions.&nbsp;</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">So we need to prevent any incidents, accidents, conflict there and find political solutions. Was there anything more? Oh, AUKUS. Well . . .&nbsp;</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="879" instrument_node=""> Or the EU more broadly.&nbsp;</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="873"><strong data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:&nbsp; </span></strong><span data-dcnode-id="874" instrument_node="">Yeah, so . . .&nbsp;</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><strong data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="869" instrument_node="">&nbsp;And it’s constructive role.&nbsp;</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">JENS STOLTENBERG [NATO Secretary General]:</span></strong><span data-dcnode-id="864" instrument_node="">&nbsp;Yeah, so, first of all, AUKUS. AUKUS was not directed against NATO.&nbsp;</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">I understand that France was disappointed. That’s absolutely understandable. But of course, we have to continue to, as NATO, to work with our close partners in the Asia-Pacific region – New Zealand, Australia, Japan and South Korea – and, of course, we can also work together with the European Union.&nbsp;</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">More in general, I welcome EU efforts on defence. And any meaningful effort by European Allies on defence requires more spending. And there is one thing NATO has been calling for, for years: it’s more European defence spending.&nbsp;</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">So, we not only welcome, we actually work hard to achieve more European efforts on defence. Because there’s no way you can get more European efforts on defence without investing more. And we have lists of capabilities we actually expect European Allies to deliver. And therefore, we ask them to invest more.&nbsp;</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">The good news is that European Allies are doing exactly that. For seven consecutive years, defence spending has increased across Europe and Canada. They have added 260 billion extra for defence, and Germany is part of that increase. Back when we made the decision in 2014, three Allies met the 2% guideline. Now, 10 Allies and all other Allies have increased.&nbsp;</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">So European . . . increased European efforts on defence, meaning defence spending, is not only welcomed but actually encouraged by NATO and pushed by NATO.&nbsp;</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">We do this also to have more capabilities. Planes, drones, battle tanks, cyber, all that – and not least high readiness. So when European efforts or EU efforts on defence means more spending and more capabilities, it is strongly encouraged by NATO.&nbsp;</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">What we need to avoid is duplication. And therefore we say that we welcome and encourage more European capabilities, but not new structures only competing for the same pool of forces.&nbsp;</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">And therefore, we also strongly believe that NATO remains the backbone for European security. We have readiness forces if needed, also for, of course, European Allies. And the fact is that EU Allies, they . . . or, put the other way, non-EU Allies account for 80 percent of NATO’s defence spending.&nbsp;</span></p><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">And this is not only about resources, but also about geography. Norway and Iceland in the North – the critical North Atlantic link; Turkey in the South – important to fight terrorism; and, of course, in the West, the United States, Canada and the United Kingdom, if you look at the map, you realise that this geography matters for European security. But most importantly, this is not only about resources – 80 percent of defence spending comes from non-EU Allies. Geography, you see the map.&nbsp;</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">But it’s most importantly about politics. Any attempt to weaken the transatlantic bond will not only weaken NATO, it will divide Europe.&nbsp;</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">So we just have to stand together. And in a more dangerous, unpredictable world, the need to stand together, Europe and North America, is as strong as ever. So this is not the time to weaken that.&nbsp;</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="825"><strong data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">DR. JANA PUGLIERIN [Moderator]:</span></strong><span data-dcnode-id="826" instrument_node="">&nbsp;Thank you very much. Now your answered China and the United States, kind of two birds and one stone. That is very efficient and we need to be efficient because in motorsports, one would say, we are nearing the finishing line. I don’t know if that applies to ships, but we have not more than eight minutes left. So there are two questions, one over there, one over there . . . and a third one over there. So maybe we start now grouping questions and then you can get a better idea of what people are also, in addition, interested in. Werner Sonne.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="820"><strong data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">WERNER SONNE (German Atlantic Association):</span></strong><span data-dcnode-id="821" instrument_node="">&nbsp;Werner Sonne from the board of the German Atlantic Association. One very important tool of cooperation between East and West used to be the Open Skies Treaty, which unfortunately has also been cancelled.&nbsp;</span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Now I’m wondering, is there any readiness on the part of NATO to reinvent or to go back to this treaty? Are you ready to talk with Russia to go back to this very important tool?&nbsp;</span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="812"><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">DR. JANA PUGLIERIN [Moderator]:&nbsp;</span></strong><span data-dcnode-id="813" instrument_node="">So, about the future, maybe also about the future of arms control more broadly looking that the United States is now talking to Russia and that we already have first results, maybe you can comment on this as well? Then the lady at the table over there, she has a question.&nbsp;</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="807"><strong data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Question:</span></strong><span data-dcnode-id="808" instrument_node="">&nbsp; OK. Good morning. I’m a student of War and Conflict Studies and vice chair in the university group about security policy in Potsdam. You have mentioned Europe and how the European Allies have been stepping up and how they spent more over the past seven years. My question is more about the strategic role of the European Allies. In 2011, we had for the first time, with Libya, European Allies taking the lead and the US taking a role from behind as they called it. So, I wanted to ask you, if you see that this stepping-up in the strategic . . . yeah, the strategic stepping-up of the European Allies stopped in 2011, or if they keep making progress in that aspect of [inaudible].</span></p><span data-dcnode-id="806" instrument_node="">
