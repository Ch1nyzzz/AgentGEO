"">Perception of seriousness:</span></i><span data-dcnode-id="7922" instrument_node=""> Results of a survey overseen by the United Nations Development Programme on belief in whether climate change presents a </span><a data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_crisis" title="Climate crisis"><span data-dcnode-id="7921" instrument_node="">climate emergency</span></a><span data-dcnode-id="7919" instrument_node="">.</span><sup class="reference" data-dcnode-id="7916" id="cite_ref-UNsurvey_202101_2-0"><a data-dcnode-id="7917" href="#cite_note-UNsurvey_202101-2"><span data-dcnode-id="7918" instrument_node="">[2]</span></a></sup></div></div></div><span data-dcnode-id="7912" instrument_node="">
</span><p data-dcnode-id="7884"><b data-dcnode-id="7910"><span data-dcnode-id="7911" instrument_node="">Public opinion on climate change</span></b><span data-dcnode-id="7909" instrument_node=""> is the aggregate of </span><a data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attitude_%28psychology%29" title="Attitude (psychology)"><span data-dcnode-id="7908" instrument_node="">attitudes</span></a><span data-dcnode-id="7906" instrument_node=""> or </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belief" title="Belief"><span data-dcnode-id="7905" instrument_node="">beliefs</span></a><span data-dcnode-id="7903" instrument_node=""> held by the adult</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7896" style="white-space:nowrap;"><span data-dcnode-id="7902" instrument_node="">[</span><i data-dcnode-id="7898"><a data-dcnode-id="7899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7900" title="does it not include older children? (December 2021)"><span data-dcnode-id="7901" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7897" instrument_node="">]</span></sup><span data-dcnode-id="7895" instrument_node=""> population concerning the science, economics, and politics of </span><a data-dcnode-id="7893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="7894" instrument_node="">climate change</span></a><span data-dcnode-id="7892" instrument_node="">. It is affected by </span><a data-dcnode-id="7890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_coverage_of_climate_change" title="Media coverage of climate change"><span data-dcnode-id="7891" instrument_node="">media coverage of climate change</span></a><span data-dcnode-id="7889" instrument_node="">.</span><sup class="reference" data-dcnode-id="7886" id="cite_ref-3"><a data-dcnode-id="7887" href="#cite_note-3"><span data-dcnode-id="7888" instrument_node="">[3]</span></a></sup><span data-dcnode-id="7885" instrument_node="">
</span></p><p data-dcnode-id="7875"><span data-dcnode-id="7883" instrument_node="">Public opinion on climate change is multidimensional, dynamic, and differentiated. The multiple dimensions include, among others, beliefs about </span><a class="mw-redirect" data-dcnode-id="7881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthropogenic_climate_change" title="Anthropogenic climate change"><span data-dcnode-id="7882" instrument_node="">anthropogenic climate change</span></a><span data-dcnode-id="7880" instrument_node="">, perceptions of climate change risks, concern about its seriousness, and thoughts on what, if anything, should be done to address it. Public opinion is dynamic, changing over time due to personal, social, political, economic, and environmental factors. Finally, public opinion is differentiated. A range of sociodemographic, political, cultural, economic, and environmental factors predict variation in climate change public opinion.</span><sup class="reference" data-dcnode-id="7877" id="cite_ref-4"><a data-dcnode-id="7878" href="#cite_note-4"><span data-dcnode-id="7879" instrument_node="">[4]</span></a></sup><span data-dcnode-id="7876" instrument_node="">

</span><h2 data-dcnode-id="7532"><span class="mw-headline" data-dcnode-id="7540" id="General_overview"><span data-dcnode-id="7541" instrument_node="">General overview</span></span><span class="mw-editsection" data-dcnode-id="7533"><span class="mw-editsection-bracket" data-dcnode-id="7538"><span data-dcnode-id="7539" instrument_node="">[</span></span><a data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D1" title="Edit section: General overview"><span data-dcnode-id="7537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7534"><span data-dcnode-id="7535" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7531" instrument_node="">
</span><p data-dcnode-id="7518"><span data-dcnode-id="7530" instrument_node="">In January 2021, the </span><a data-dcnode-id="7528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Development_Programme" title="United Nations Development Programme"><span data-dcnode-id="7529" instrument_node="">United Nations Development Programme</span></a><span data-dcnode-id="7527" instrument_node=""> reported results of the largest-ever climate survey, which indicated that two-thirds of respondents consider climate change as an emergency, with forest and land conservation being the most popular solutions.</span><sup class="reference" data-dcnode-id="7524" id="cite_ref-5"><a data-dcnode-id="7525" href="#cite_note-5"><span data-dcnode-id="7526" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7523" instrument_node=""> Specifically, The Peoples' Climate Vote (1.2 million respondents in over 50 countries) found that 64% said climate change was an emergency – presenting a clear and convincing call for decision-makers to step up on ambition.</span><sup class="reference" data-dcnode-id="7520" id="cite_ref-UNDP_20210126_6-0"><a data-dcnode-id="7521" href="#cite_note-UNDP_20210126-6"><span data-dcnode-id="7522" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7519" instrument_node="">
</span></p><span data-dcnode-id="7517" instrument_node="">
</span><h2 data-dcnode-id="7507"><span class="mw-headline" data-dcnode-id="7515" id="Major_surveys_of_the_general_public_on_climate_change"><span data-dcnode-id="7516" instrument_node="">Major surveys of the general public on climate change</span></span><span class="mw-editsection" data-dcnode-id="7508"><span class="mw-editsection-bracket" data-dcnode-id="7513"><span data-dcnode-id="7514" instrument_node="">[</span></span><a data-dcnode-id="7511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D2" title="Edit section: Major surveys of the general public on climate change"><span data-dcnode-id="7512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7509"><span data-dcnode-id="7510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7506" instrument_node="">
</span><p data-dcnode-id="7500"><span data-dcnode-id="7505" instrument_node="">According to a 2015 journal article based on a literature review of thousands of articles related to over two hundred studies covering the period from 1980 to 2014, there was an increase in public awareness of climate change in the 1980s and early 1990s, followed by a period of growing concern— mixed with the rise of conflicting positions—in the later 1990s and early 2000s. This was followed by a period of "declining public concern and increasing skepticism" in some countries in the mid-2000s to late-2000s. From 2010 to 2014, there was a period suggesting "possible stabilization of public concern about climate change".</span><sup class="reference" data-dcnode-id="7502" id="cite_ref-Capstick_2015_7-0"><a data-dcnode-id="7503" href="#cite_note-Capstick_2015-7"><span data-dcnode-id="7504" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7501" instrument_node="">
</span></p><p data-dcnode-id="7484"><span data-dcnode-id="7499" instrument_node="">Matthew C. Nisbet and Teresa Myers' 2007 article—"Twenty Years of Public Opinion about Global Warming"—covered two decades in the United States starting in 1980—in which they investigated public awareness of the causes and impacts of global warming, public policy, scientific consensus on climate change, public support for the </span><a class="mw-redirect" data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Accord" title="Kyoto Accord"><span data-dcnode-id="7498" instrument_node="">Kyoto Accord</span></a><span data-dcnode-id="7496" instrument_node="">, and their concerns about the economic costs of potential public policies that responded to climate change.</span><sup class="reference" data-dcnode-id="7493" id="cite_ref-Nisbet_20070101_8-0"><a data-dcnode-id="7494" href="#cite_note-Nisbet_20070101-8"><span data-dcnode-id="7495" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7492" instrument_node=""> They found that from 1986 to 1990, the proportion of respondents who reported having heard about climate change increased from 39% to 74%. However, they noted "levels of overall understanding were limited".</span><sup class="reference" data-dcnode-id="7489" id="cite_ref-Capstick_2015_7-1"><a data-dcnode-id="7490" href="#cite_note-Capstick_2015-7"><span data-dcnode-id="7491" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="7486" id="cite_ref-Nisbet_20070101_8-1"><a data-dcnode-id="7487" href="#cite_note-Nisbet_20070101-8"><span data-dcnode-id="7488" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7485" instrument_node="">
</span></p><p data-dcnode-id="7460"><span data-dcnode-id="7483" instrument_node="">A 2010 journal article in </span><i data-dcnode-id="7480"><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk_Analysis_%28journal%29" title="Risk Analysis (journal)"><span data-dcnode-id="7482" instrument_node="">Risk Analysis</span></a></i><span data-dcnode-id="7479" instrument_node=""> compared and contrasted a 1992</span><sup class="reference" data-dcnode-id="7476" id="cite_ref-Read_1994_9-0"><a data-dcnode-id="7477" href="#cite_note-Read_1994-9"><span data-dcnode-id="7478" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7475" instrument_node=""> survey and a 2009 survey of lay peoples' awareness and opinions of climate change.</span><sup class="reference" data-dcnode-id="7472" id="cite_ref-Reynolds_201010_10-0"><a data-dcnode-id="7473" href="#cite_note-Reynolds_201010-10"><span data-dcnode-id="7474" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7471" instrument_node=""> In 1992, the general public did not differentiate between climate change and the depletion of the </span><a data-dcnode-id="7469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_layer" title="Ozone layer"><span data-dcnode-id="7470" instrument_node="">ozone layer</span></a><span data-dcnode-id="7468" instrument_node="">. Using a mental models methodology, researchers found that while there was a marked increase in understanding of climate change by 2009, many did not accept that global warming was "primarily due to increased concentrations of carbon dioxide in the atmosphere", or that the "single most important source of this carbon dioxide is the combustion of fossil fuels".</span><sup class="reference" data-dcnode-id="7465" id="cite_ref-Capstick_2015_7-2"><a data-dcnode-id="7466" href="#cite_note-Capstick_2015-7"><span data-dcnode-id="7467" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="7462" id="cite_ref-Reynolds_201010_10-1"><a data-dcnode-id="7463" href="#cite_note-Reynolds_201010-10"><span data-dcnode-id="7464" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7461" instrument_node="">
</span></p><span data-dcnode-id="7459" instrument_node="">
</span><h2 data-dcnode-id="7449"><span class="mw-headline" data-dcnode-id="7457" id="Influences_on_individual_opinion"><span data-dcnode-id="7458" instrument_node="">Influences on individual opinion</span></span><span class="mw-editsection" data-dcnode-id="7450"><span class="mw-editsection-bracket" data-dcnode-id="7455"><span data-dcnode-id="7456" instrument_node="">[</span></span><a data-dcnode-id="7453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D3" title="Edit section: Influences on individual opinion"><span data-dcnode-id="7454" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7451"><span data-dcnode-id="7452" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7448" instrument_node="">
</span><h3 data-dcnode-id="7438"><span class="mw-headline" data-dcnode-id="7446" id="Geographic_region"><span data-dcnode-id="7447" instrument_node="">Geographic region</span></span><span class="mw-editsection" data-dcnode-id="7439"><span class="mw-editsection-bracket" data-dcnode-id="7444"><span data-dcnode-id="7445" instrument_node="">[</span></span><a data-dcnode-id="7442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D4" title="Edit section: Geographic region"><span data-dcnode-id="7443" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7440"><span data-dcnode-id="7441" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7437" instrument_node="">
</span><p data-dcnode-id="7435"><span data-dcnode-id="7436" instrument_node="">For a list of countries and their opinion see "Climate change opinion by country" below
</span></p><p data-dcnode-id="7420"><span data-dcnode-id="7434" instrument_node="">The first major worldwide poll, conducted by Gallup in 2008–2009 in 127 countries, found that some 62% of people worldwide said they knew about global warming. In the </span><a data-dcnode-id="7432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developed_country" title="Developed country"><span data-dcnode-id="7433" instrument_node="">industrialized countries</span></a><span data-dcnode-id="7431" instrument_node=""> of North America, Europe, and Japan, 67% or more knew about it (97% in the U.S., 99% in Japan); in </span><a data-dcnode-id="7429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developing_country" title="Developing country"><span data-dcnode-id="7430" instrument_node="">developing countries</span></a><span data-dcnode-id="7428" instrument_node="">, especially in Africa, fewer than a quarter knew about it, although many had noticed local weather changes. The survey results suggest that between 2007 and 2010 only 42% of the world's population were aware of climate change and believed that it is caused by human activity. Among those who knew about global warming, there was a wide variation between nations in belief that the warming was a result of human activities.</span><sup class="reference" data-dcnode-id="7425" id="cite_ref-11"><a data-dcnode-id="7426" href="#cite_note-11"><span data-dcnode-id="7427" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="7422" id="cite_ref-Levi_2021_12-0"><a data-dcnode-id="7423" href="#cite_note-Levi_2021-12"><span data-dcnode-id="7424" instrument_node="">[12]</span></a></sup><span data-dcnode-id="7421" instrument_node="">
</span></p><p data-dcnode-id="7402"><span data-dcnode-id="7419" instrument_node="">Adults in Asia, with the exception of those in developed countries, are the least likely to perceive global warming as a threat. In developed Asian countries like South Korea, perceptions of climate change are associated with strong emotional beliefs about its causes.</span><sup class="reference" data-dcnode-id="7416" id="cite_ref-13"><a data-dcnode-id="7417" href="#cite_note-13"><span data-dcnode-id="7418" instrument_node="">[13]</span></a></sup><span data-dcnode-id="7415" instrument_node=""> In the western world, individuals are the most likely to be aware and perceive it as a very or somewhat serious threat to themselves and their families;</span><sup class="reference" data-dcnode-id="7412" id="cite_ref-PuglieseJulie2009AwarenessThreat_14-0"><a data-dcnode-id="7413" href="#cite_note-PuglieseJulie2009AwarenessThreat-14"><span data-dcnode-id="7414" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7411" instrument_node=""> although Europeans are more concerned about climate change than those in the United States.</span><sup class="reference" data-dcnode-id="7408" id="cite_ref-15"><a data-dcnode-id="7409" href="#cite_note-15"><span data-dcnode-id="7410" instrument_node="">[15]</span></a></sup><span data-dcnode-id="7407" instrument_node=""> However, the public in Africa, where individuals are the most vulnerable to global warming while producing the least carbon dioxide, is the least aware – which translates into a low perception that it is a threat.</span><sup class="reference" data-dcnode-id="7404" id="cite_ref-PuglieseJulie2009AwarenessThreat_14-1"><a data-dcnode-id="7405" href="#cite_note-PuglieseJulie2009AwarenessThreat-14"><span data-dcnode-id="7406" instrument_node="">[14]</span></a></sup><span data-dcnode-id="7403" instrument_node="">
</span></p><p data-dcnode-id="7390"><span data-dcnode-id="7401" instrument_node="">These variations pose a challenge to </span><a class="mw-redirect" data-dcnode-id="7399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Policymaker" title="Policymaker"><span data-dcnode-id="7400" instrument_node="">policymakers</span></a><span data-dcnode-id="7398" instrument_node="">, as different countries travel down different paths, making an agreement over an appropriate response difficult. While Africa may be the most vulnerable and produce the least amount of greenhouse gases, they are the most ambivalent. The top five emitters (</span><a class="mw-redirect" data-dcnode-id="7396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PRC" title="PRC"><span data-dcnode-id="7397" instrument_node="">China</span></a><span data-dcnode-id="7395" instrument_node="">, the United States, India, Russia, and Japan), who together emit half the world's greenhouse gases, vary in both awareness and concern. The United States, Russia, and Japan are the most aware at over 85% of the population. Conversely, only two-thirds of people in China and one-third in India are aware. Japan expresses the greatest concern of the 5, which translates into support for environmental policies. People in China, Russia, and the United States, while varying in awareness, have expressed a similar proportion of aware individuals concerned. Similarly, those aware in India are likely to be concerned, but India faces challenges spreading this concern to the remaining population as its energy needs increase over the next decade.</span><sup class="reference" data-dcnode-id="7392" id="cite_ref-PuglieseJulie2009TopEmittingCountries_16-0"><a data-dcnode-id="7393" href="#cite_note-PuglieseJulie2009TopEmittingCountries-16"><span data-dcnode-id="7394" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7391" instrument_node="">
</span></p><p data-dcnode-id="7377"><span data-dcnode-id="7389" instrument_node="">An online survey on environmental questions conducted in 20 countries by Ipsos MORI, "Global Trends 2014", shows broad agreement, especially on climate change and if it is caused by humans, though the U.S. ranked lowest with 54% agreement.</span><sup class="reference" data-dcnode-id="7386" id="cite_ref-17"><a data-dcnode-id="7387" href="#cite_note-17"><span data-dcnode-id="7388" instrument_node="">[17]</span></a></sup><span data-dcnode-id="7385" instrument_node=""> It has been suggested that the low U.S. ranking is tied to </span><a data-dcnode-id="7383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_denial%23Denial_networks" title="Climate change denial"><span data-dcnode-id="7384" instrument_node="">denial campaigns</span></a><span data-dcnode-id="7382" instrument_node="">.</span><sup class="reference" data-dcnode-id="7379" id="cite_ref-18"><a data-dcnode-id="7380" href="#cite_note-18"><span data-dcnode-id="7381" instrument_node="">[18]</span></a></sup><span data-dcnode-id="7378" instrument_node="">
</span></p><p data-dcnode-id="7362"><span data-dcnode-id="7376" instrument_node="">A 2010 survey of 14 </span><a data-dcnode-id="7374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developed_country" title="Developed country"><span data-dcnode-id="7375" instrument_node="">industrialized countries</span></a><span data-dcnode-id="7373" instrument_node=""> found that </span><a class="mw-redirect" data-dcnode-id="7371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_skeptics" title="Climate change skeptics"><span data-dcnode-id="7372" instrument_node="">skepticism</span></a><span data-dcnode-id="7370" instrument_node=""> about the danger of global warming was highest in Australia, Norway, New Zealand and the United States, in that order, correlating positively with </span><a data-dcnode-id="7368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_carbon_dioxide_emissions" title="List of countries by carbon dioxide emissions"><span data-dcnode-id="7369" instrument_node="">per capita emissions of carbon dioxide</span></a><span data-dcnode-id="7367" instrument_node="">.</span><sup class="reference" data-dcnode-id="7364" id="cite_ref-19"><a data-dcnode-id="7365" href="#cite_note-19"><span data-dcnode-id="7366" instrument_node="">[19]</span></a></sup><span data-dcnode-id="7363" instrument_node="">
</span></p><span data-dcnode-id="7361" instrument_node="">
</span><h3 data-dcnode-id="7351"><span class="mw-headline" data-dcnode-id="7359" id="Education"><span data-dcnode-id="7360" instrument_node="">Education</span></span><span class="mw-editsection" data-dcnode-id="7352"><span class="mw-editsection-bracket" data-dcnode-id="7357"><span data-dcnode-id="7358" instrument_node="">[</span></span><a data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D5" title="Edit section: Education"><span data-dcnode-id="7356" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7353"><span data-dcnode-id="7354" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7350" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7344" role="note"><span data-dcnode-id="7347" instrument_node="">Main article: </span><a data-dcnode-id="7345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_education" title="Climate change education"><span data-dcnode-id="7346" instrument_node="">Climate change education</span></a></div><span data-dcnode-id="7343" instrument_node="">
</span><p data-dcnode-id="7317"><span data-dcnode-id="7342" instrument_node="">In countries varying in awareness, an educational gap translates into a gap in awareness.</span><sup class="reference" data-dcnode-id="7339" id="cite_ref-gap_20-0"><a data-dcnode-id="7340" href="#cite_note-gap-20"><span data-dcnode-id="7341" instrument_node="">[20]</span></a></sup><span data-dcnode-id="7338" instrument_node=""> However an increase in awareness does not always result in an increase in perceived threat. In China, 98% of those who have completed four years or more of college education reported knowing something or a great deal of climate change while only 63% of those who have completed nine years of education reported the same. Despite the differences in awareness in China, all groups perceive a low level of threat from global warming. In India, those who are educated are more likely to be aware, and those who are educated there are far more likely to report perceiving global warming as a threat than those who are not educated.</span><sup class="reference" data-dcnode-id="7335" id="cite_ref-PuglieseJulie2009TopEmittingCountries_16-1"><a data-dcnode-id="7336" href="#cite_note-PuglieseJulie2009TopEmittingCountries-16"><span data-dcnode-id="7337" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7334" instrument_node=""> In Europe, individuals who have attained a higher level of education perceive climate change as a serious threat. There is also a strong association between education and Internet use. Europeans who use the Internet more are more likely to perceive climate change as a serious threat.</span><sup class="reference" data-dcnode-id="7331" id="cite_ref-Eurobarometer2009p13_21-0"><a data-dcnode-id="7332" href="#cite_note-Eurobarometer2009p13-21"><span data-dcnode-id="7333" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7330" instrument_node=""> However, a survey of American adults found "little disagreement among culturally diverse citizens</span><sup class="noprint Inline-Template" data-dcnode-id="7323" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="7329" instrument_node="">[</span><i data-dcnode-id="7325"><a data-dcnode-id="7326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="7327" title="The text near this tag may need clarification or removal of jargon. (August 2016)"><span data-dcnode-id="7328" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="7324" instrument_node="">]</span></sup><span data-dcnode-id="7322" instrument_node=""> on what science knows about climate change. In the US, individuals with greater science literacy and education have more polarized beliefs on climate change.</span><sup class="reference" data-dcnode-id="7319" id="cite_ref-22"><a data-dcnode-id="7320" href="#cite_note-22"><span data-dcnode-id="7321" instrument_node="">[22]</span></a></sup><span data-dcnode-id="7318" instrument_node="">
</span></p><p data-dcnode-id="7311"><span data-dcnode-id="7316" instrument_node="">In the states of Washington, California, Oregon, and Idaho, people with more education were more likely to support the building of new fossil fuel powerplants than people with less of an education.</span><sup class="reference" data-dcnode-id="7313" id="cite_ref-:12_23-0"><a data-dcnode-id="7314" href="#cite_note-:12-23"><span data-dcnode-id="7315" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7312" instrument_node="">
</span></p><span data-dcnode-id="7310" instrument_node="">
</span><h3 data-dcnode-id="7300"><span class="mw-headline" data-dcnode-id="7308" id="Demographics"><span data-dcnode-id="7309" instrument_node="">Demographics</span></span><span class="mw-editsection" data-dcnode-id="7301"><span class="mw-editsection-bracket" data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">[</span></span><a data-dcnode-id="7304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D6" title="Edit section: Demographics"><span data-dcnode-id="7305" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7302"><span data-dcnode-id="7303" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7299" instrument_node="">
</span><p data-dcnode-id="7290"><span data-dcnode-id="7298" instrument_node="">In general, there is a substantial variation in the direction in which demographic traits, like age or gender, correlate with climate change concern. While women and younger people tend to be more concerned about climate change in English-speaking constituencies, the opposite is true in most African countries.</span><sup class="reference" data-dcnode-id="7295" id="cite_ref-Levi_2021_12-1"><a data-dcnode-id="7296" href="#cite_note-Levi_2021-12"><span data-dcnode-id="7297" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="7292" id="cite_ref-24"><a data-dcnode-id="7293" href="#cite_note-24"><span data-dcnode-id="7294" instrument_node="">[24]</span></a></sup><span data-dcnode-id="7291" instrument_node="">
</span></p><p data-dcnode-id="7281"><span data-dcnode-id="7289" instrument_node="">Residential </span><a class="mw-redirect" data-dcnode-id="7287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demographics" title="Demographics"><span data-dcnode-id="7288" instrument_node="">demographics</span></a><span data-dcnode-id="7286" instrument_node=""> affect perceptions of global warming. In China in 2008, 77% of those who lived in urban areas were aware of global warming compared to 52% in rural areas. This trend was mirrored in India with 49% to 29% awareness, respectively.</span><sup class="reference" data-dcnode-id="7283" id="cite_ref-PuglieseJulie2009TopEmittingCountries_16-2"><a data-dcnode-id="7284" href="#cite_note-PuglieseJulie2009TopEmittingCountries-16"><span data-dcnode-id="7285" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7282" instrument_node="">
</span></p><p data-dcnode-id="7275"><span data-dcnode-id="7280" instrument_node="">Of the countries where at least half the population is aware of global warming, those with the majority who believe that global warming is due to human activities have a greater national GDP per unit energy—or, a greater energy efficiency.</span><sup class="reference" data-dcnode-id="7277" id="cite_ref-Pelham2009Energy_25-0"><a data-dcnode-id="7278" href="#cite_note-Pelham2009Energy-25"><span data-dcnode-id="7279" instrument_node="">[25]</span></a></sup><span data-dcnode-id="7276" instrument_node="">
</span></p><p data-dcnode-id="7265"><span data-dcnode-id="7274" instrument_node="">In Europe, individuals under fifty-five are more likely to perceive both "poverty, lack of food and drinking water" and climate change as a serious threat than individuals over fifty-five. Male individuals are more likely to perceive climate change as a threat than female individuals. Managers, white-collar workers, and students are more likely to perceive climate change as a greater threat than house persons and retired individuals.</span><sup class="reference" data-dcnode-id="7271" id="cite_ref-Eurobarometer2009p13_21-1"><a data-dcnode-id="7272" href="#cite_note-Eurobarometer2009p13-21"><span data-dcnode-id="7273" instrument_node="">[21]</span></a></sup><span data-dcnode-id="7270" instrument_node=""> In the western states of Washington, Idaho, Oregon, and California, older residents are more likely to support policies for building new fossil fuel power plants.</span><sup class="reference" data-dcnode-id="7267" id="cite_ref-:12_23-1"><a data-dcnode-id="7268" href="#cite_note-:12-23"><span data-dcnode-id="7269" instrument_node="">[23]</span></a></sup><span data-dcnode-id="7266" instrument_node="">
</span></p><p data-dcnode-id="7235"><span data-dcnode-id="7264" instrument_node="">In the United States, conservative white men are more likely than other Americans to deny climate change.</span><sup class="reference" data-dcnode-id="7261" id="cite_ref-26"><a data-dcnode-id="7262" href="#cite_note-26"><span data-dcnode-id="7263" instrument_node="">[26]</span></a></sup><span data-dcnode-id="7260" instrument_node=""> Men are also less likely to believe that climate change is human caused or that there is a consensus message talking about the issues of climate change among scientists.</span><sup class="reference" data-dcnode-id="7257" id="cite_ref-:11_27-0"><a data-dcnode-id="7258" href="#cite_note-:11-27"><span data-dcnode-id="7259" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7256" instrument_node=""> A very similar trend has been documented in </span><a data-dcnode-id="7254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norway" title="Norway"><span data-dcnode-id="7255" instrument_node="">Norway</span></a><span data-dcnode-id="7253" instrument_node="">, where 63% of conservative men deny anthropogenic climate change compared to just 36% of the general Norwegian population.</span><sup class="reference" data-dcnode-id="7250" id="cite_ref-28"><a data-dcnode-id="7251" href="#cite_note-28"><span data-dcnode-id="7252" instrument_node="">[28]</span></a></sup><span data-dcnode-id="7249" instrument_node=""> In </span><a data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sweden" title="Sweden"><span data-dcnode-id="7248" instrument_node="">Sweden</span></a><span data-dcnode-id="7246" instrument_node="">, political conservatism was similarly found to correlate with climate change denial, while in </span><a data-dcnode-id="7244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="7245" instrument_node="">Brazil</span></a><span data-dcnode-id="7243" instrument_node="">, climate change denial has been found to be more correlated with </span><a data-dcnode-id="7241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender" title="Gender"><span data-dcnode-id="7242" instrument_node="">gender</span></a><span data-dcnode-id="7240" instrument_node="">, with men being significantly more likely to express denialist viewpoints compared to women.</span><sup class="reference" data-dcnode-id="7237" id="cite_ref-29"><a data-dcnode-id="7238" href="#cite_note-29"><span data-dcnode-id="7239" instrument_node="">[29]</span></a></sup><span data-dcnode-id="7236" instrument_node="">
</span></p><p data-dcnode-id="7226"><span data-dcnode-id="7234" instrument_node="">Women are more likely to support egalitarian policies and well as social programs for their community. Although there are differences between men and women when it comes to environmental public policy, both are less likely to support policies such as ones for CO</span><sub data-dcnode-id="7232" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="7233" instrument_node="">2</span></sub><span data-dcnode-id="7231" instrument_node=""> regulations if the economy is doing poorly.</span><sup class="reference" data-dcnode-id="7228" id="cite_ref-:11_27-1"><a data-dcnode-id="7229" href="#cite_note-:11-27"><span data-dcnode-id="7230" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7227" instrument_node="">
</span></p><p data-dcnode-id="7214"><span data-dcnode-id="7225" instrument_node="">In </span><a data-dcnode-id="7223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="7224" instrument_node="">Great Britain</span></a><span data-dcnode-id="7222" instrument_node="">, a movement of by women known as "birthstrikers" advocates for refraining from </span><a class="mw-redirect" data-dcnode-id="7220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Procreation" title="Procreation"><span data-dcnode-id="7221" instrument_node="">procreation</span></a><span data-dcnode-id="7219" instrument_node=""> until the possibility of "climate breakdown and civilisation collapse" is averted.</span><sup class="reference" data-dcnode-id="7216" id="cite_ref-30"><a data-dcnode-id="7217" href="#cite_note-30"><span data-dcnode-id="7218" instrument_node="">[30]</span></a></sup><span data-dcnode-id="7215" instrument_node="">
</span></p><p data-dcnode-id="7208"><span data-dcnode-id="7213" instrument_node="">In 2021 a global survey was conducted to understand the opinion of people in the age 16-25 about climate change. According to the study, 4 from 10 are hesitating about having children because they are afraid of climate change. 6 from 10 fill extreme anxiety about the issue. Similar number felt betrayed by older generations and governments.</span><sup class="reference" data-dcnode-id="7210" id="cite_ref-31"><a data-dcnode-id="7211" href="#cite_note-31"><span data-dcnode-id="7212" instrument_node="">[31]</span></a></sup><span data-dcnode-id="7209" instrument_node="">
</span></p><span data-dcnode-id="7207" instrument_node="">
</span><h3 data-dcnode-id="7197"><span class="mw-headline" data-dcnode-id="7205" id="Political_identification"><span data-dcnode-id="7206" instrument_node="">Political identification</span></span><span class="mw-editsection" data-dcnode-id="7198"><span class="mw-editsection-bracket" data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">[</span></span><a data-dcnode-id="7201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D7" title="Edit section: Political identification"><span data-dcnode-id="7202" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7199"><span data-dcnode-id="7200" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7196" instrument_node="">
</span><p data-dcnode-id="7187"><span data-dcnode-id="7195" instrument_node="">Public opinion on climate change can be influenced by who people vote for. Although media coverage influences how some view climate change, research shows that voting behavior influences </span><a class="mw-redirect" data-dcnode-id="7193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_skepticism" title="Climate change skepticism"><span data-dcnode-id="7194" instrument_node="">climate change skepticism</span></a><span data-dcnode-id="7192" instrument_node="">. This shows that people's views on climate change tend to align with the people they voted for.</span><sup class="reference" data-dcnode-id="7189" id="cite_ref-32"><a data-dcnode-id="7190" href="#cite_note-32"><span data-dcnode-id="7191" instrument_node="">[32]</span></a></sup><span data-dcnode-id="7188" instrument_node="">
</span></p><p data-dcnode-id="7102"><span data-dcnode-id="7186" instrument_node="">In Europe, opinion is not strongly divided among </span><a class="mw-redirect" data-dcnode-id="7184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Left-right_politics" title="Left-right politics"><span data-dcnode-id="7185" instrument_node="">left and right parties</span></a><span data-dcnode-id="7183" instrument_node="">. Although European political parties on the left, including </span><a class="mw-redirect" data-dcnode-id="7181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_parties" title="Green parties"><span data-dcnode-id="7182" instrument_node="">Green parties</span></a><span data-dcnode-id="7180" instrument_node="">, strongly support measures to address climate change, conservative European political parties maintain similar sentiments, most notably in Western and Northern Europe. For example, </span><a data-dcnode-id="7178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Thatcher" title="Margaret Thatcher"><span data-dcnode-id="7179" instrument_node="">Margaret Thatcher</span></a><span data-dcnode-id="7177" instrument_node="">, never a friend of the coal mining industry, was a strong supporter of an active climate protection policy and was instrumental in founding the </span><a data-dcnode-id="7175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intergovernmental_Panel_on_Climate_Change" title="Intergovernmental Panel on Climate Change"><span data-dcnode-id="7176" instrument_node="">Intergovernmental Panel on Climate Change</span></a><span data-dcnode-id="7174" instrument_node=""> and the British </span><a class="mw-redirect" data-dcnode-id="7172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hadley_Centre_for_Climate_Prediction_and_Research" title="Hadley Centre for Climate Prediction and Research"><span data-dcnode-id="7173" instrument_node="">Hadley Centre for Climate Prediction and Research</span></a><span data-dcnode-id="7171" instrument_node="">.</span><sup class="reference" data-dcnode-id="7168" id="cite_ref-33"><a data-dcnode-id="7169" href="#cite_note-33"><span data-dcnode-id="7170" instrument_node="">[33]</span></a></sup><span data-dcnode-id="7167" instrument_node=""> Some speeches, as to the Royal Society on 27 September 1988</span><sup class="reference" data-dcnode-id="7164" id="cite_ref-34"><a data-dcnode-id="7165" href="#cite_note-34"><span data-dcnode-id="7166" instrument_node="">[34]</span></a></sup><span data-dcnode-id="7163" instrument_node=""> and to the UN general assembly in November 1989 helped to put climate change, acid rain, and general pollution in the British mainstream. After her career, however, Thatcher was less of a climate activist, as she called climate action a "marvelous excuse for supranational socialism", and called Al Gore an "apocalyptic hyperbole".</span><sup class="reference" data-dcnode-id="7160" id="cite_ref-35"><a data-dcnode-id="7161" href="#cite_note-35"><span data-dcnode-id="7162" instrument_node="">[35]</span></a></sup><span data-dcnode-id="7159" instrument_node=""> France's center-right </span><a data-dcnode-id="7157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jacques_Chirac" title="Jacques Chirac"><span data-dcnode-id="7158" instrument_node="">President Chirac</span></a><span data-dcnode-id="7156" instrument_node=""> pushed key environmental and climate change policies in France in 2005–2007. Conservative German administrations (under the </span><a class="mw-redirect" data-dcnode-id="7154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Democratic_Union_%28Germany%29" title="Christian Democratic Union (Germany)"><span data-dcnode-id="7155" instrument_node="">Christian Democratic Union</span></a><span data-dcnode-id="7153" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="7151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Christian_Social_Union_of_Bavaria" title="Christian Social Union of Bavaria"><span data-dcnode-id="7152" instrument_node="">Christian Social Union</span></a><span data-dcnode-id="7150" instrument_node="">) in the past two decades</span><sup class="noprint Inline-Template" data-dcnode-id="7143" style="white-space:nowrap;"><span data-dcnode-id="7149" instrument_node="">[</span><i data-dcnode-id="7145"><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="7147" title="The time period mentioned near this tag is ambiguous. (March 2019)"><span data-dcnode-id="7148" instrument_node="">when?</span></span></a></i><span data-dcnode-id="7144" instrument_node="">]</span></sup><span data-dcnode-id="7142" instrument_node=""> have supported </span><a data-dcnode-id="7140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union" title="European Union"><span data-dcnode-id="7141" instrument_node="">European Union</span></a><span data-dcnode-id="7139" instrument_node=""> climate change initiatives; concern about </span><a data-dcnode-id="7137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forest_dieback" title="Forest dieback"><span data-dcnode-id="7138" instrument_node="">forest dieback</span></a><span data-dcnode-id="7136" instrument_node=""> and </span><a data-dcnode-id="7134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acid_rain" title="Acid rain"><span data-dcnode-id="7135" instrument_node="">acid rain</span></a><span data-dcnode-id="7133" instrument_node=""> regulation were initiated under Kohl's archconservative minister of the interior </span><a data-dcnode-id="7131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friedrich_Zimmermann" title="Friedrich Zimmermann"><span data-dcnode-id="7132" instrument_node="">Friedrich Zimmermann</span></a><span data-dcnode-id="7130" instrument_node="">. In the period after former President George W. Bush announced that the United States was leaving the </span><a class="mw-redirect" data-dcnode-id="7128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Treaty" title="Kyoto Treaty"><span data-dcnode-id="7129" instrument_node="">Kyoto Treaty</span></a><span data-dcnode-id="7127" instrument_node="">, European media and newspapers on both the left and right criticized the move. The conservative Spanish </span><i data-dcnode-id="7124"><a data-dcnode-id="7125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/La_Raz%25C3%25B3n_%28Madrid%29" title="La Razón (Madrid)"><span data-dcnode-id="7126" instrument_node="">La Razón</span></a></i><span data-dcnode-id="7123" instrument_node="">, the </span><i data-dcnode-id="7120"><a class="mw-redirect" data-dcnode-id="7121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_Times" title="Irish Times"><span data-dcnode-id="7122" instrument_node="">Irish Times</span></a></i><span data-dcnode-id="7119" instrument_node="">, the </span><i data-dcnode-id="7116"><a data-dcnode-id="7117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_Independent" title="Irish Independent"><span data-dcnode-id="7118" instrument_node="">Irish Independent</span></a></i><span data-dcnode-id="7115" instrument_node="">, the Danish </span><i data-dcnode-id="7112"><a class="mw-redirect" data-dcnode-id="7113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berlingske_Tidende" title="Berlingske Tidende"><span data-dcnode-id="7114" instrument_node="">Berlingske Tidende</span></a></i><span data-dcnode-id="7111" instrument_node="">, and the Greek </span><i data-dcnode-id="7108"><a data-dcnode-id="7109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kathimerini" title="Kathimerini"><span data-dcnode-id="7110" instrument_node="">Kathimerini</span></a></i><span data-dcnode-id="7107" instrument_node=""> all condemned the Bush administration's decision, as did left-leaning newspapers.</span><sup class="reference" data-dcnode-id="7104" id="cite_ref-SchreursAndTiberghien2007_36-0"><a data-dcnode-id="7105" href="#cite_note-SchreursAndTiberghien2007-36"><span data-dcnode-id="7106" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7103" instrument_node="">
</span></p><p data-dcnode-id="7081"><span data-dcnode-id="7101" instrument_node="">In Norway, a 2013 poll conducted by </span><a class="mw-redirect" data-dcnode-id="7099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/TNS_Gallup" title="TNS Gallup"><span data-dcnode-id="7100" instrument_node="">TNS Gallup</span></a><span data-dcnode-id="7098" instrument_node=""> found that 92% of those who vote for the </span><a data-dcnode-id="7096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Left_Party_%28Norway%29" title="Socialist Left Party (Norway)"><span data-dcnode-id="7097" instrument_node="">Socialist Left Party</span></a><span data-dcnode-id="7095" instrument_node=""> and 89% of those who vote for the </span><a data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28Norway%29" title="Liberal Party (Norway)"><span data-dcnode-id="7094" instrument_node="">Liberal Party</span></a><span data-dcnode-id="7092" instrument_node=""> believe that global warming is caused by humans, while the percentage who held this belief is 60% among voters for the </span><a data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28Norway%29" title="Conservative Party (Norway)"><span data-dcnode-id="7091" instrument_node="">Conservative Party</span></a><span data-dcnode-id="7089" instrument_node=""> and 41% among voters for the </span><a data-dcnode-id="7087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progress_Party_%28Norway%29" title="Progress Party (Norway)"><span data-dcnode-id="7088" instrument_node="">Progress Party</span></a><span data-dcnode-id="7086" instrument_node="">.</span><sup class="reference" data-dcnode-id="7083" id="cite_ref-37"><a data-dcnode-id="7084" href="#cite_note-37"><span data-dcnode-id="7085" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7082" instrument_node="">
</span></p><p data-dcnode-id="7069"><span data-dcnode-id="7080" instrument_node="">The shared sentiments between the political left and right on climate change further illustrate the divide in perception between the United States and Europe on climate change. As an example, conservative German Prime Ministers </span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helmut_Kohl" title="Helmut Kohl"><span data-dcnode-id="7079" instrument_node="">Helmut Kohl</span></a><span data-dcnode-id="7077" instrument_node=""> and </span><a data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angela_Merkel" title="Angela Merkel"><span data-dcnode-id="7076" instrument_node="">Angela Merkel</span></a><span data-dcnode-id="7074" instrument_node=""> have differed with other parties in Germany only on how to meet emissions reduction targets, not whether or not to establish or fulfill them.</span><sup class="reference" data-dcnode-id="7071" id="cite_ref-SchreursAndTiberghien2007_36-1"><a data-dcnode-id="7072" href="#cite_note-SchreursAndTiberghien2007-36"><span data-dcnode-id="7073" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7070" instrument_node="">
</span></p><p data-dcnode-id="7059"><span data-dcnode-id="7068" instrument_node="">A 2017 study found that those who changed their opinion on climate change between 2010 and 2014 did so "primarily to align better with those who shared their party identification and political ideology. This conforms with the theory of motivated reasoning: Evidence consistent with prior beliefs is viewed as strong and, on politically salient issues, people strive to bring their opinions into conformance with those who share their political identity".</span><sup class="reference" data-dcnode-id="7065" id="cite_ref-38"><a data-dcnode-id="7066" href="#cite_note-38"><span data-dcnode-id="7067" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7064" instrument_node=""> Furthermore, a 2019 study examining the growing skepticism of climate change among American Republicans argues that persuasion and rhetoric from party elites play a critical role in public opinion formation, and that these elite cues are propagated through mainstream and social media sources.</span><sup class="reference" data-dcnode-id="7061" id="cite_ref-39"><a data-dcnode-id="7062" href="#cite_note-39"><span data-dcnode-id="7063" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7060" instrument_node="">
</span></p><p data-dcnode-id="7049"><span data-dcnode-id="7058" instrument_node="">Those who care about the environment and want change are not happy about some policies, for example the support of the cap and trade policy but very few people are willing to pay more than 15 dollars per month for a program that is supposed to help the environment. According to a 2015 article published in </span><i data-dcnode-id="7055"><a data-dcnode-id="7056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_Politics_%28journal%29" title="Environmental Politics (journal)"><span data-dcnode-id="7057" instrument_node="">Environmental Politics</span></a></i><span data-dcnode-id="7054" instrument_node="">,  while most Americans were aware of climate change, only 2% of respondents ranked the environment as the top issue in the US.</span><sup class="reference" data-dcnode-id="7051" id="cite_ref-40"><a data-dcnode-id="7052" href="#cite_note-40"><span data-dcnode-id="7053" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7050" instrument_node="">
</span></p><span data-dcnode-id="7048" instrument_node="">
</span><h3 data-dcnode-id="7038"><span class="mw-headline" data-dcnode-id="7046" id="Individual_risk_assessment_and_assignment"><span data-dcnode-id="7047" instrument_node="">Individual risk assessment and assignment</span></span><span class="mw-editsection" data-dcnode-id="7039"><span class="mw-editsection-bracket" data-dcnode-id="7044"><span data-dcnode-id="7045" instrument_node="">[</span></span><a data-dcnode-id="7042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D8" title="Edit section: Individual risk assessment and assignment"><span data-dcnode-id="7043" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7040"><span data-dcnode-id="7041" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7037" instrument_node="">
</span><link data-dcnode-id="7036" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7032" role="note"><span data-dcnode-id="7035" instrument_node="">Main article: </span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_depletion_and_climate_change" title="Ozone depletion and climate change"><span data-dcnode-id="7034" instrument_node="">Ozone depletion and climate change</span></a></div><span data-dcnode-id="7031" instrument_node="">
</span><p data-dcnode-id="7008"><span data-dcnode-id="7030" instrument_node="">The IPCC attempts to orchestrate global (climate) change research to shape a worldwide consensus according to a 1996 article.</span><sup class="reference" data-dcnode-id="7027" id="cite_ref-41"><a data-dcnode-id="7028" href="#cite_note-41"><span data-dcnode-id="7029" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7026" instrument_node=""> However, the consensus approach has been dubbed more a liability than an asset in comparison to other environmental challenges.</span><sup class="reference" data-dcnode-id="7023" id="cite_ref-42"><a data-dcnode-id="7024" href="#cite_note-42"><span data-dcnode-id="7025" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="7020" id="cite_ref-43"><a data-dcnode-id="7021" href="#cite_note-43"><span data-dcnode-id="7022" instrument_node="">[43]</span></a></sup><span data-dcnode-id="7019" instrument_node=""> In 2010, an article in </span><i data-dcnode-id="7017"><span data-dcnode-id="7018" instrument_node="">Current Sociology</span></i><span data-dcnode-id="7016" instrument_node="">, said that the linear model of policy-making, based on a </span><i data-dcnode-id="7014"><span data-dcnode-id="7015" instrument_node="">more knowledge we have, the better the political response will be</span></i><span data-dcnode-id="7013" instrument_node=""> was said to have not been working and was in the meantime rejected by sociology.</span><sup class="reference" data-dcnode-id="7010" id="cite_ref-CLT_44-0"><a data-dcnode-id="7011" href="#cite_note-CLT-44"><span data-dcnode-id="7012" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7009" instrument_node="">
</span></p><p data-dcnode-id="6968"><span data-dcnode-id="7007" instrument_node="">In a 1999 article, Sheldon Ungar, a Canadian sociologist, compared the different public reactions towards </span><a data-dcnode-id="7005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_depletion_and_climate_change" title="Ozone depletion and climate change"><span data-dcnode-id="7006" instrument_node="">ozone depletion and climate change</span></a><span data-dcnode-id="7004" instrument_node="">.</span><sup class="reference" data-dcnode-id="7001" id="cite_ref-Ungar_45-0"><a data-dcnode-id="7002" href="#cite_note-Ungar-45"><span data-dcnode-id="7003" instrument_node="">[45]</span></a></sup><span data-dcnode-id="7000" instrument_node=""> The public opinion failed to tie climate change to concrete events which could be used as a threshold or beacon to signify immediate danger.</span><sup class="reference" data-dcnode-id="6997" id="cite_ref-Ungar_45-1"><a data-dcnode-id="6998" href="#cite_note-Ungar-45"><span data-dcnode-id="6999" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6996" instrument_node=""> Scientific predictions of a temperature rise of two to three degrees Celsius over several decades do not respond with people, e.g. in North America, that experience similar swings during a single day.</span><sup class="reference" data-dcnode-id="6993" id="cite_ref-Ungar_45-2"><a data-dcnode-id="6994" href="#cite_note-Ungar-45"><span data-dcnode-id="6995" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6992" instrument_node=""> As scientists define global warming a problem of the future, a liability in "</span><a data-dcnode-id="6990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Attention_economy" title="Attention economy"><span data-dcnode-id="6991" instrument_node="">attention economy</span></a><span data-dcnode-id="6989" instrument_node="">", pessimistic outlooks in general and assigning </span><a data-dcnode-id="6987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_weather" title="Extreme weather"><span data-dcnode-id="6988" instrument_node="">extreme weather</span></a><span data-dcnode-id="6986" instrument_node=""> to climate change have often been discredited or ridiculed (compare </span><a data-dcnode-id="6984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gore_effect" title="Gore effect"><span data-dcnode-id="6985" instrument_node="">Gore effect</span></a><span data-dcnode-id="6983" instrument_node="">) in the public arena.</span><sup class="reference" data-dcnode-id="6980" id="cite_ref-46"><a data-dcnode-id="6981" href="#cite_note-46"><span data-dcnode-id="6982" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6979" instrument_node=""> While the </span><a data-dcnode-id="6977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_effect" title="Greenhouse effect"><span data-dcnode-id="6978" instrument_node="">greenhouse effect</span></a><span data-dcnode-id="6976" instrument_node=""> </span><i data-dcnode-id="6973"><a class="mw-redirect" data-dcnode-id="6974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Per_se_%28Latin%29" title="Per se (Latin)"><span data-dcnode-id="6975" instrument_node="">per se</span></a></i><span data-dcnode-id="6972" instrument_node=""> is essential for life on Earth, the case was quite different with the </span><a class="mw-redirect" data-dcnode-id="6970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_shield" title="Ozone shield"><span data-dcnode-id="6971" instrument_node="">ozone shield</span></a><span data-dcnode-id="6969" instrument_node=""> and other metaphors about the ozone depletion. The scientific assessment of the ozone problem also had large uncertainties. But the metaphors used in the discussion (ozone shield, ozone hole) reflected better with lay people and their concerns.
</span></p><p data-dcnode-id="6959"><span data-dcnode-id="6967" instrument_node="">The chlorofluorocarbon (CFC) regulation attempts of the end of the 1980s benefited from those easy-to-grasp metaphors and the personal risk assumptions taken from them. As well, the fate of celebrities like President </span><a data-dcnode-id="6965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="6966" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="6964" instrument_node="">, who had skin cancer removal in 1985 and 1987, was of high importance. In the case of public opinion on climate change, no imminent danger is perceived.</span><sup class="reference" data-dcnode-id="6961" id="cite_ref-Ungar_45-3"><a data-dcnode-id="6962" href="#cite_note-Ungar-45"><span data-dcnode-id="6963" instrument_node="">[45]</span></a></sup><span data-dcnode-id="6960" instrument_node="">
</span></p><span data-dcnode-id="6958" instrument_node="">
</span><h3 data-dcnode-id="6948"><span class="mw-headline" data-dcnode-id="6956" id="Ideology"><span data-dcnode-id="6957" instrument_node="">Ideology</span></span><span class="mw-editsection" data-dcnode-id="6949"><span class="mw-editsection-bracket" data-dcnode-id="6954"><span data-dcnode-id="6955" instrument_node="">[</span></span><a data-dcnode-id="6952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D9" title="Edit section: Ideology"><span data-dcnode-id="6953" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6950"><span data-dcnode-id="6951" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6947" instrument_node="">
</span><p data-dcnode-id="6909"><span data-dcnode-id="6946" instrument_node="">In the United States, </span><a data-dcnode-id="6944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideology" title="Ideology"><span data-dcnode-id="6945" instrument_node="">ideology</span></a><span data-dcnode-id="6943" instrument_node=""> is an effective predictor of </span><a data-dcnode-id="6941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_identification" title="Party identification"><span data-dcnode-id="6942" instrument_node="">party identification</span></a><span data-dcnode-id="6940" instrument_node="">, where </span><a data-dcnode-id="6938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservatism_in_the_United_States" title="Conservatism in the United States"><span data-dcnode-id="6939" instrument_node="">conservatives</span></a><span data-dcnode-id="6937" instrument_node=""> are more prevalent among </span><a data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_%28United_States%29" title="Republican Party (United States)"><span data-dcnode-id="6936" instrument_node="">Republicans</span></a><span data-dcnode-id="6934" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="6932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moderate" title="Moderate"><span data-dcnode-id="6933" instrument_node="">moderates</span></a><span data-dcnode-id="6931" instrument_node=""> and </span><a data-dcnode-id="6929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_liberalism_in_the_United_States" title="Modern liberalism in the United States"><span data-dcnode-id="6930" instrument_node="">liberals</span></a><span data-dcnode-id="6928" instrument_node=""> among </span><a class="mw-redirect" data-dcnode-id="6926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Independent_%28voter%29" title="Independent (voter)"><span data-dcnode-id="6927" instrument_node="">independents</span></a><span data-dcnode-id="6925" instrument_node=""> and </span><a data-dcnode-id="6923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="6924" instrument_node="">Democrats</span></a><span data-dcnode-id="6922" instrument_node="">.</span><sup class="reference" data-dcnode-id="6919" id="cite_ref-47"><a data-dcnode-id="6920" href="#cite_note-47"><span data-dcnode-id="6921" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6918" instrument_node=""> A shift in ideology is often associated with in a shift in political views.</span><sup class="reference" data-dcnode-id="6915" id="cite_ref-Saad2009ConservativeTopIdeologicalGroup_48-0"><a data-dcnode-id="6916" href="#cite_note-Saad2009ConservativeTopIdeologicalGroup-48"><span data-dcnode-id="6917" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6914" instrument_node=""> For example, when the number of conservatives rose from 2008 to 2009, the number of individuals who felt that global warming was being exaggerated in the media also rose.</span><sup class="reference" data-dcnode-id="6911" id="cite_ref-Saad2009GlobalWarmingExaggerated_49-0"><a data-dcnode-id="6912" href="#cite_note-Saad2009GlobalWarmingExaggerated-49"><span data-dcnode-id="6913" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6910" instrument_node="">
The 2006 BBC World Service poll found that when asked about various policy options to reduce greenhouse gas emissions – tax incentives for alternative energy research and development, installment of taxes to encourage energy conservation, and reliance on nuclear energy to reduce fossil fuels. The majority of those asked felt that tax incentives were the path of action that they preferred.
</span></p><p data-dcnode-id="6903"><span data-dcnode-id="6908" instrument_node="">As of May 2016, polls have repeatedly found that a majority of Republican voters, particularly young ones, believe the government should take action to reduce carbon dioxide emissions.</span><sup class="reference" data-dcnode-id="6905" id="cite_ref-50"><a data-dcnode-id="6906" href="#cite_note-50"><span data-dcnode-id="6907" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6904" instrument_node="">
</span></p><p data-dcnode-id="6897"><span data-dcnode-id="6902" instrument_node="">After a country hosts the annual Conference of the Parties (COP) climate legislation increases, which causes policy diffusion. There is strong evidence of policy diffusion, which is when a policy is made it is influenced by the policy choices made elsewhere.This can have a positive effect on climate legislation.</span><sup class="reference" data-dcnode-id="6899" id="cite_ref-51"><a data-dcnode-id="6900" href="#cite_note-51"><span data-dcnode-id="6901" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6898" instrument_node="">
</span></p><p data-dcnode-id="6888"><span data-dcnode-id="6896" instrument_node="">Scientific analyses of international survey data show that right-wing orientation and individualism are strongly correlated to climate change denial in the US and other English-speaking countries, but much less in most non-English speaking nations.</span><sup class="reference" data-dcnode-id="6893" id="cite_ref-Levi_2021_12-2"><a data-dcnode-id="6894" href="#cite_note-Levi_2021-12"><span data-dcnode-id="6895" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="6890" id="cite_ref-52"><a data-dcnode-id="6891" href="#cite_note-52"><span data-dcnode-id="6892" instrument_node="">[52]</span></a></sup><span data-dcnode-id="6889" instrument_node="">
</span></p><p data-dcnode-id="6882"><span data-dcnode-id="6887" instrument_node="">Political ideologies are seen as one of the most consistent factors of the support or rejection of climate change public policies.</span><sup class="reference" data-dcnode-id="6884" id="cite_ref-:13_53-0"><a data-dcnode-id="6885" href="#cite_note-:13-53"><span data-dcnode-id="6886" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6883" instrument_node="">
</span></p><p data-dcnode-id="6876"><span data-dcnode-id="6881" instrument_node="">A person's political ideology is seen to affect the a person's cognitive and emotional appraisals which then affect how somebody sees climate change and if the dangers of it will inflict harm to them.</span><sup class="reference" data-dcnode-id="6878" id="cite_ref-:13_53-1"><a data-dcnode-id="6879" href="#cite_note-:13-53"><span data-dcnode-id="6880" instrument_node="">[53]</span></a></sup><span data-dcnode-id="6877" instrument_node="">
</span></p><span data-dcnode-id="6875" instrument_node="">
</span><h3 data-dcnode-id="6865"><span class="mw-headline" data-dcnode-id="6873" id="Charts"><span data-dcnode-id="6874" instrument_node="">Charts</span></span><span class="mw-editsection" data-dcnode-id="6866"><span class="mw-editsection-bracket" data-dcnode-id="6871"><span data-dcnode-id="6872" instrument_node="">[</span></span><a data-dcnode-id="6869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D10" title="Edit section: Charts"><span data-dcnode-id="6870" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6867"><span data-dcnode-id="6868" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6864" instrument_node="">
</span><p data-dcnode-id="6855"><span data-dcnode-id="6863" instrument_node="">A 2018 study found that individuals were more likely to accept that global temperatures were increasing if they were shown the information in a chart rather than in text.</span><sup class="reference" data-dcnode-id="6860" id="cite_ref-54"><a data-dcnode-id="6861" href="#cite_note-54"><span data-dcnode-id="6862" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="6857" id="cite_ref-55"><a data-dcnode-id="6858" href="#cite_note-55"><span data-dcnode-id="6859" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6856" instrument_node="">
</span></p><span data-dcnode-id="6854" instrument_node="">
</span><h3 data-dcnode-id="6844"><span class="mw-headline" data-dcnode-id="6852" id="Income"><span data-dcnode-id="6853" instrument_node="">Income</span></span><span class="mw-editsection" data-dcnode-id="6845"><span class="mw-editsection-bracket" data-dcnode-id="6850"><span data-dcnode-id="6851" instrument_node="">[</span></span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D11" title="Edit section: Income"><span data-dcnode-id="6849" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6846"><span data-dcnode-id="6847" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6843" instrument_node="">
</span><p data-dcnode-id="6837"><span data-dcnode-id="6842" instrument_node="">Income has a strong influence on public opinion regarding policies such as building more fossil fuel power plants or whether we should lighten up on environmental standards in industries. People that have bigger incomes in the states of Washington. Oregon, California and Idaho are more likely to support the policy regarding building new power plants and support lightening up on environmental standards in industries compared to people with a smaller income.</span><sup class="reference" data-dcnode-id="6839" id="cite_ref-:12_23-2"><a data-dcnode-id="6840" href="#cite_note-:12-23"><span data-dcnode-id="6841" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6838" instrument_node="">
</span></p><span data-dcnode-id="6836" instrument_node="">
</span><h3 data-dcnode-id="6826"><span class="mw-headline" data-dcnode-id="6834" id="Economic_Factors"><span data-dcnode-id="6835" instrument_node="">Economic Factors</span></span><span class="mw-editsection" data-dcnode-id="6827"><span class="mw-editsection-bracket" data-dcnode-id="6832"><span data-dcnode-id="6833" instrument_node="">[</span></span><a data-dcnode-id="6830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D12" title="Edit section: Economic Factors"><span data-dcnode-id="6831" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6828"><span data-dcnode-id="6829" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6825" instrument_node="">
</span><p data-dcnode-id="6816"><span data-dcnode-id="6824" instrument_node="">Development of climate change policies is influenced by economic conditions. For a long period of time, such conditions were seen to play an important role in influencing political behavior. Economic issues and environmental issues are often seen as a </span><a data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade-off" title="Trade-off"><span data-dcnode-id="6823" instrument_node="">trade-off</span></a><span data-dcnode-id="6821" instrument_node=""> since something that helps one was believed to negatively affect the other. Accordingly, the environment is usually seen as a problem that is not as big and crucial as the economy.</span><sup class="reference" data-dcnode-id="6818" id="cite_ref-:11_27-2"><a data-dcnode-id="6819" href="#cite_note-:11-27"><span data-dcnode-id="6820" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6817" instrument_node="">
</span></p><span data-dcnode-id="6815" instrument_node="">
</span><h3 data-dcnode-id="6805"><span class="mw-headline" data-dcnode-id="6813" id="Consensus_Messages_from_Scientists"><span data-dcnode-id="6814" instrument_node="">Consensus Messages from Scientists</span></span><span class="mw-editsection" data-dcnode-id="6806"><span class="mw-editsection-bracket" data-dcnode-id="6811"><span data-dcnode-id="6812" instrument_node="">[</span></span><a data-dcnode-id="6809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D13" title="Edit section: Consensus Messages from Scientists"><span data-dcnode-id="6810" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6807"><span data-dcnode-id="6808" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6804" instrument_node="">
</span><p data-dcnode-id="6798"><span data-dcnode-id="6803" instrument_node="">Using consensus messages from scientists would make progress in helping people understand and accept the realities of climate change and its dangers. There was an influence in getting conservative people to believe in pro-social climate change beliefs when researchers used consensus messages from scientists with the help of pretesting and protesting their climate change beliefs. However, the consensus messages did little to help influence the skeptical people that do not believe in the danger of climate change.</span><sup class="reference" data-dcnode-id="6800" id="cite_ref-56"><a data-dcnode-id="6801" href="#cite_note-56"><span data-dcnode-id="6802" instrument_node="">[56]</span></a></sup><span data-dcnode-id="6799" instrument_node="">
</span></p><span data-dcnode-id="6797" instrument_node="">
</span><h3 data-dcnode-id="6787"><span class="mw-headline" data-dcnode-id="6795" id="Visibility"><span data-dcnode-id="6796" instrument_node="">Visibility</span></span><span class="mw-editsection" data-dcnode-id="6788"><span class="mw-editsection-bracket" data-dcnode-id="6793"><span data-dcnode-id="6794" instrument_node="">[</span></span><a data-dcnode-id="6791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D14" title="Edit section: Visibility"><span data-dcnode-id="6792" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6789"><span data-dcnode-id="6790" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6786" instrument_node="">
</span><p data-dcnode-id="6780"><span data-dcnode-id="6785" instrument_node="">Personal experience and noticing weather changes due to climate change are likely to motivate people to find solutions and act on them. After experiencing crop failures due to dry spells in Nepal, citizens were more likely find and incorporate adaptive strategies to fight thing from the vulnerability they face.</span><sup class="reference" data-dcnode-id="6782" id="cite_ref-57"><a data-dcnode-id="6783" href="#cite_note-57"><span data-dcnode-id="6784" instrument_node="">[57]</span></a></sup><span data-dcnode-id="6781" instrument_node="">
</span></p><span data-dcnode-id="6779" instrument_node="">
