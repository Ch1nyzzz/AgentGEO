</span><div class="thumb tright" data-dcnode-id="6770"><div class="thumbinner" data-dcnode-id="6771" style="width:222px;"><a class="image" data-dcnode-id="6777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVisibility_chart.jpg"><img alt="" class="thumbimage" data-dcnode-id="6778" data-file-height="505" data-file-width="711" decoding="async" height="156" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Visibility_chart.jpg/220px-Visibility_chart.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Visibility_chart.jpg/330px-Visibility_chart.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Visibility_chart.jpg/440px-Visibility_chart.jpg 2x" width="220"></a><span data-dcnode-id="6776" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6772"><div class="magnify" data-dcnode-id="6774"><a class="internal" data-dcnode-id="6775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVisibility_chart.jpg" title="Enlarge"></a></div><span data-dcnode-id="6773" instrument_node="">Chart showing different challenges and tensions of water visibility</span></div></div></div><span data-dcnode-id="6769" instrument_node="">
</span><p data-dcnode-id="6759"><span data-dcnode-id="6768" instrument_node="">Outside of studying the differences in perception of climate change in large geographic areas, researchers have studied the effects of visibility to the individual citizen. In the scientific and academic community, there is an ongoing debate about whether visibility or seeing the effects of climate change literally with one’s own eyes is helpful. Though some scientists are dismissive of anecdotal evidence, direct accounts have been studied to better reach local communities and understand their perception of climate change.</span><sup class="reference" data-dcnode-id="6765" id="cite_ref-58"><a data-dcnode-id="6766" href="#cite_note-58"><span data-dcnode-id="6767" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6764" instrument_node=""> Climate solutions presented to the public and the private sector have focused on bringing visual learning and practical everyday actions designed to promote further engagement such as community members conducting climate change tours and mapping the trees in their neighborhood.</span><sup class="reference" data-dcnode-id="6761" id="cite_ref-59"><a data-dcnode-id="6762" href="#cite_note-59"><span data-dcnode-id="6763" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6760" instrument_node="">
</span></p><p data-dcnode-id="6728"><a data-dcnode-id="6757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Risk_perception" title="Risk perception"><span data-dcnode-id="6758" instrument_node="">Risk perception</span></a><span data-dcnode-id="6756" instrument_node="">, as opposed to risk assessment, was constantly evaluated in these smaller, local studies. In a 2018 study of those residing near the </span><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Everglades" title="Everglades"><span data-dcnode-id="6755" instrument_node="">Everglades</span></a><span data-dcnode-id="6753" instrument_node="">, a prominent </span><a data-dcnode-id="6751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wetland" title="Wetland"><span data-dcnode-id="6752" instrument_node="">wetland</span></a><span data-dcnode-id="6750" instrument_node=""> ecosystem in </span><a data-dcnode-id="6748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Florida" title="Florida"><span data-dcnode-id="6749" instrument_node="">Florida</span></a><span data-dcnode-id="6747" instrument_node="">, participation in outdoor recreational activities, and elevation and distance from the shoreline of their residential location from the mean sea-level affected one’s support in environmental conservation policy.</span><sup class="reference" data-dcnode-id="6744" id="cite_ref-60"><a data-dcnode-id="6745" href="#cite_note-60"><span data-dcnode-id="6746" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6743" instrument_node=""> Frequent beach goers and other outdoor recreational enthusiasts concerned by differing sea levels were cited to be potential likely mobilizers. Another 2018 study found 56% of the recreational fishermen polled in the area said “being able to see other wildlife” was very or extremely important, and 60% reported being “very much concerned” about the health of the Everglades ecosystem.</span><sup class="reference" data-dcnode-id="6740" id="cite_ref-61"><a data-dcnode-id="6741" href="#cite_note-61"><span data-dcnode-id="6742" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6739" instrument_node=""> In key American cities, the visibility of water stress and/or proximity to bodies of water increased the strength of </span><a data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_conservation" title="Water conservation"><span data-dcnode-id="6738" instrument_node="">water conservation policy</span></a><span data-dcnode-id="6736" instrument_node=""> in that area.</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-62"><a data-dcnode-id="6734" href="#cite_note-62"><span data-dcnode-id="6735" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6732" instrument_node=""> Perceived shrinking water supply or </span><a class="mw-redirect" data-dcnode-id="6730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flooding" title="Flooding"><span data-dcnode-id="6731" instrument_node="">flooding</span></a><span data-dcnode-id="6729" instrument_node=""> can be seen as motivating public stance on climate change. However, in arid areas where water was less visible, this brings up concerns of weaker policy in locales that truly need it.
</span></p><p data-dcnode-id="6716"><span data-dcnode-id="6727" instrument_node="">Farmers in the </span><a data-dcnode-id="6725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Punjab%2C_Pakistan" title="Punjab, Pakistan"><span data-dcnode-id="6726" instrument_node="">Punjab</span></a><span data-dcnode-id="6724" instrument_node=""> region of </span><a data-dcnode-id="6722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pakistan" title="Pakistan"><span data-dcnode-id="6723" instrument_node="">Pakistan</span></a><span data-dcnode-id="6721" instrument_node=""> are now witnessing a significant decrease in rice production due to climate change. Those who rely on agriculture for their livelihood are the most concerned, based on a 2014 study of 450 households. More than half of those households adapted their farming to climate change.</span><sup class="reference" data-dcnode-id="6718" id="cite_ref-63"><a data-dcnode-id="6719" href="#cite_note-63"><span data-dcnode-id="6720" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6717" instrument_node="">
</span></p><p data-dcnode-id="6698"><span data-dcnode-id="6715" instrument_node="">Bodies of water and water scarcity, though very prominent concepts in this field of study, are not the only major factors when weighing the idea of visible climate change. For example, a 2021 study on the citizens’ perception of geohazards was conducted in the </span><a data-dcnode-id="6713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veneto" title="Veneto"><span data-dcnode-id="6714" instrument_node="">Veneto</span></a><span data-dcnode-id="6712" instrument_node=""> region of northeastern Italy as part of the </span><a class="new" data-dcnode-id="6710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEuropean_Project_RESPONSe%26action%3Dedit%26redlink%3D1" title="European Project RESPONSe (page does not exist)"><span data-dcnode-id="6711" instrument_node="">European Project RESPONSe</span></a><span data-dcnode-id="6709" instrument_node=""> (Interreg </span><a data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italy" title="Italy"><span data-dcnode-id="6708" instrument_node="">Italy</span></a><span data-dcnode-id="6706" instrument_node="">–</span><a data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Croatia" title="Croatia"><span data-dcnode-id="6705" instrument_node="">Croatia</span></a><span data-dcnode-id="6703" instrument_node="">). Younger people were shown to be more invested in individual environmental impact versus older adults who were concerned about geohazards. The study was split between those who lived in the hinterlands and low coastal areas. Those shown living in the hinterlands were more inclined to be wary of geohazards and their risks. As those areas were said to be more susceptible to natural disasters, the study highlighted a larger awareness of natural hazards by those who historically are more vulnerable due to their proximity. While residents in general were aware due to their closeness to water sources, research also implies that there is translation needed between the framing of climate change and the immediate impacts to their living area for those who did not live in particularly affected areas.</span><sup class="reference" data-dcnode-id="6700" id="cite_ref-64"><a data-dcnode-id="6701" href="#cite_note-64"><span data-dcnode-id="6702" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6699" instrument_node="">
</span></p><p data-dcnode-id="6689"><span data-dcnode-id="6697" instrument_node="">There are other factors when it comes to visibility for the individual and personally witnessing climate change. While education has been aforementioned and studied as a factor, materials of one’s study have also been investigated as a factor of visibility. After studying </span><a data-dcnode-id="6695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portugal" title="Portugal"><span data-dcnode-id="6696" instrument_node="">Portuguese</span></a><span data-dcnode-id="6694" instrument_node=""> public higher education institutions in 2021, those in the natural and environmental sciences are more inclined to do environment-friendly practices such as recycle and willingness to work for lower salaries for companies that commit to climate change action. Students in the sciences and engineering majors were least likely to do so. While this result can be attributed to initial interest in those areas to begin with, most students were said to be concerned about climate change and said that there needed to be more material about climate change needed to be implemented in their institution’s curriculum. Younger students were more likely to be extremely concerned, although the authors' speculated this to be a product of greater social media literacy.</span><sup class="reference" data-dcnode-id="6691" id="cite_ref-65"><a data-dcnode-id="6692" href="#cite_note-65"><span data-dcnode-id="6693" instrument_node="">[65]</span></a></sup><span data-dcnode-id="6690" instrument_node="">
</span></p><span data-dcnode-id="6688" instrument_node="">
</span><h3 data-dcnode-id="6678"><span class="mw-headline" data-dcnode-id="6686" id="Social_media"><span data-dcnode-id="6687" instrument_node="">Social media</span></span><span class="mw-editsection" data-dcnode-id="6679"><span class="mw-editsection-bracket" data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">[</span></span><a data-dcnode-id="6682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D15" title="Edit section: Social media"><span data-dcnode-id="6683" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6680"><span data-dcnode-id="6681" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6677" instrument_node="">
</span><p data-dcnode-id="6655"><span data-dcnode-id="6676" instrument_node="">Social media can significantly influence positive beliefs of climate change. In addition, social media can help people learn the physical basis of climate change, learn the diversified information on its impacts, and could also encourage cognitive elaboration and reflection on information seen in the media to what is happening around them. Using social media as a news source to spread information about climate change caused the gap between the beliefs of Democrats</span><sup class="noprint Inline-Template" data-dcnode-id="6669" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="6675" instrument_node="">[</span><i data-dcnode-id="6671"><a data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="6673" title="why &quot;Democrats? Study was international not just US (December 2021)"><span data-dcnode-id="6674" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="6670" instrument_node="">]</span></sup><span data-dcnode-id="6668" instrument_node=""> and Conservatives to shrink meaning it has caused the acceptance of climate change to be a less polarized opinion.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6661" style="white-space:nowrap;"><span data-dcnode-id="6667" instrument_node="">[</span><i data-dcnode-id="6663"><a data-dcnode-id="6664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6665" title="This claim needs references to reliable sources. (December 2021)"><span data-dcnode-id="6666" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6662" instrument_node="">]</span></sup><span data-dcnode-id="6660" instrument_node=""> In addition to promoting pro-social beliefs, social media has also helped increase the trust of science which helps the climate change movement in the long run.</span><sup class="reference" data-dcnode-id="6657" id="cite_ref-66"><a data-dcnode-id="6658" href="#cite_note-66"><span data-dcnode-id="6659" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6656" instrument_node="">
</span></p><span data-dcnode-id="6654" instrument_node="">
</span><h3 data-dcnode-id="6644"><span class="mw-headline" data-dcnode-id="6652" id="Voicing_believed_wrongdoings"><span data-dcnode-id="6653" instrument_node="">Voicing believed wrongdoings</span></span><span class="mw-editsection" data-dcnode-id="6645"><span class="mw-editsection-bracket" data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">[</span></span><a data-dcnode-id="6648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D16" title="Edit section: Voicing believed wrongdoings"><span data-dcnode-id="6649" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6646"><span data-dcnode-id="6647" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6643" instrument_node="">
</span><p data-dcnode-id="6634"><span data-dcnode-id="6642" instrument_node="">People can find motivation to act in the climate change movement when they are acting in the way to express disagreement with the decisions made by a higher power. In a 2017 </span><a data-dcnode-id="6640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth_Day" title="Earth Day"><span data-dcnode-id="6641" instrument_node="">Earth Day</span></a><span data-dcnode-id="6639" instrument_node=""> march, a majority of scientists and nonscientists were both seen to join the march to speak up to the Trump administration about what they have done regarding climate change. In addition, people felt motivated to join the march to protect the use of science to benefit the community and for its use in public good.</span><sup class="reference" data-dcnode-id="6636" id="cite_ref-67"><a data-dcnode-id="6637" href="#cite_note-67"><span data-dcnode-id="6638" instrument_node="">[67]</span></a></sup><span data-dcnode-id="6635" instrument_node="">
</span></p><span data-dcnode-id="6633" instrument_node="">
</span><h2 data-dcnode-id="6623"><span class="mw-headline" data-dcnode-id="6631" id="Issues"><span data-dcnode-id="6632" instrument_node="">Issues</span></span><span class="mw-editsection" data-dcnode-id="6624"><span class="mw-editsection-bracket" data-dcnode-id="6629"><span data-dcnode-id="6630" instrument_node="">[</span></span><a data-dcnode-id="6627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D17" title="Edit section: Issues"><span data-dcnode-id="6628" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6625"><span data-dcnode-id="6626" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6622" instrument_node="">
</span><h3 data-dcnode-id="6612"><span class="mw-headline" data-dcnode-id="6620" id="Science"><span data-dcnode-id="6621" instrument_node="">Science</span></span><span class="mw-editsection" data-dcnode-id="6613"><span class="mw-editsection-bracket" data-dcnode-id="6618"><span data-dcnode-id="6619" instrument_node="">[</span></span><a data-dcnode-id="6616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D18" title="Edit section: Science"><span data-dcnode-id="6617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6614"><span data-dcnode-id="6615" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6611" instrument_node="">
</span><link data-dcnode-id="6610" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6606" role="note"><span data-dcnode-id="6609" instrument_node="">See also: </span><a data-dcnode-id="6607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_consensus_on_climate_change" title="Scientific consensus on climate change"><span data-dcnode-id="6608" instrument_node="">Scientific consensus on climate change</span></a></div><span data-dcnode-id="6605" instrument_node="">
</span><p data-dcnode-id="6593"><span data-dcnode-id="6604" instrument_node="">A </span><a data-dcnode-id="6602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scientific_consensus" title="Scientific consensus"><span data-dcnode-id="6603" instrument_node="">scientific consensus</span></a><span data-dcnode-id="6601" instrument_node=""> on climate change exists, as recognized by national </span><a class="mw-redirect" data-dcnode-id="6599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Sciences" title="Academy of Sciences"><span data-dcnode-id="6600" instrument_node="">academies of science</span></a><span data-dcnode-id="6598" instrument_node=""> and other authoritative bodies. However, research has identified substantial geographical variation in the public's understanding of the scientific consensus.</span><sup class="reference" data-dcnode-id="6595" id="cite_ref-68"><a data-dcnode-id="6596" href="#cite_note-68"><span data-dcnode-id="6597" instrument_node="">[68]</span></a></sup><span data-dcnode-id="6594" instrument_node="">
</span></p><span data-dcnode-id="6592" instrument_node="">
</span><h3 data-dcnode-id="6582"><span class="mw-headline" data-dcnode-id="6590" id="Economics"><span data-dcnode-id="6591" instrument_node="">Economics</span></span><span class="mw-editsection" data-dcnode-id="6583"><span class="mw-editsection-bracket" data-dcnode-id="6588"><span data-dcnode-id="6589" instrument_node="">[</span></span><a data-dcnode-id="6586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D19" title="Edit section: Economics"><span data-dcnode-id="6587" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6584"><span data-dcnode-id="6585" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6581" instrument_node="">
</span><link data-dcnode-id="6580" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6576" role="note"><span data-dcnode-id="6579" instrument_node="">See also: </span><a data-dcnode-id="6577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economics_of_climate_change" title="Economics of climate change"><span data-dcnode-id="6578" instrument_node="">Economics of climate change</span></a></div><span data-dcnode-id="6575" instrument_node="">
</span><p data-dcnode-id="6563"><span data-dcnode-id="6574" instrument_node="">Economic debates weigh the benefits of limiting industrial emissions of mitigating global warming against the costs that such changes would entail. While there is a greater amount of agreement over whether global warming exists, there is less agreement over the appropriate response. Electric or petroleum distribution may be government owned or utilities may be regulated by government. The government owned or regulated utilities may, or may not choose to make lower emissions a priority over economics, in unregulated counties industry follows economic priorities. An example of the economic priority is </span><a class="mw-redirect" data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Dutch_Shell%23Environmental_record" title="Royal Dutch Shell"><span data-dcnode-id="6573" instrument_node="">Royal Dutch Shell PLC</span></a><span data-dcnode-id="6571" instrument_node=""> reporting CO</span><sub data-dcnode-id="6569" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="6570" instrument_node="">2</span></sub><span data-dcnode-id="6568" instrument_node=""> emissions of 81 million metric tonnes in 2013.</span><sup class="reference" data-dcnode-id="6565" id="cite_ref-69"><a data-dcnode-id="6566" href="#cite_note-69"><span data-dcnode-id="6567" instrument_node="">[69]</span></a></sup><span data-dcnode-id="6564" instrument_node="">
</span></p><span data-dcnode-id="6562" instrument_node="">
</span><h3 data-dcnode-id="6552"><span class="mw-headline" data-dcnode-id="6560" id="Media"><span data-dcnode-id="6561" instrument_node="">Media</span></span><span class="mw-editsection" data-dcnode-id="6553"><span class="mw-editsection-bracket" data-dcnode-id="6558"><span data-dcnode-id="6559" instrument_node="">[</span></span><a data-dcnode-id="6556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D20" title="Edit section: Media"><span data-dcnode-id="6557" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6554"><span data-dcnode-id="6555" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6551" instrument_node="">
</span><link data-dcnode-id="6550" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6546" role="note"><span data-dcnode-id="6549" instrument_node="">See also: </span><a data-dcnode-id="6547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_coverage_of_climate_change" title="Media coverage of climate change"><span data-dcnode-id="6548" instrument_node="">Media coverage of climate change</span></a></div><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="6525" role="presentation"><tbody data-dcnode-id="6526"><tr data-dcnode-id="6527"><td class="mbox-image" data-dcnode-id="6543"><div data-dcnode-id="6544" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="6545" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="6528"><div class="mbox-text-span" data-dcnode-id="6529"><span data-dcnode-id="6542" instrument_node="">This section needs to be </span><b data-dcnode-id="6540"><span data-dcnode-id="6541" instrument_node="">updated</span></b><span data-dcnode-id="6539" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="6537"><span data-dcnode-id="6538" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="6536" instrument_node=""> </span><span class="date-container" data-dcnode-id="6530"><i data-dcnode-id="6531"><span data-dcnode-id="6535" instrument_node="">(</span><span class="date" data-dcnode-id="6533"><span data-dcnode-id="6534" instrument_node="">December 2021</span></span><span data-dcnode-id="6532" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="6524" instrument_node="">
</span><p data-dcnode-id="6484"><span data-dcnode-id="6523" instrument_node="">The popular media in the U.S. gives greater attention to skeptics relative to the scientific community as a whole, and the level of agreement within the scientific community has not been accurately communicated.</span><sup class="reference" data-dcnode-id="6520" id="cite_ref-70"><a data-dcnode-id="6521" href="#cite_note-70"><span data-dcnode-id="6522" instrument_node="">[70]</span></a></sup><sup class="reference" data-dcnode-id="6517" id="cite_ref-71"><a data-dcnode-id="6518" href="#cite_note-71"><span data-dcnode-id="6519" instrument_node="">[71]</span></a></sup><sup class="noprint Inline-Template noprint noexcerpt Template-Fact" data-dcnode-id="6510" style="white-space:nowrap;"><span data-dcnode-id="6516" instrument_node="">[</span><i data-dcnode-id="6512"><a class="mw-redirect" data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANOTRS" title="Wikipedia:NOTRS"><span data-dcnode-id="6514" title="old (December 2021)"><span data-dcnode-id="6515" instrument_node="">better&nbsp;source&nbsp;needed</span></span></a></i><span data-dcnode-id="6511" instrument_node="">]</span></sup><span data-dcnode-id="6509" instrument_node=""> US popular media coverage differs from that presented in other countries, where reporting is more consistent with the scientific literature.</span><sup class="reference" data-dcnode-id="6506" id="cite_ref-72"><a data-dcnode-id="6507" href="#cite_note-72"><span data-dcnode-id="6508" instrument_node="">[72]</span></a></sup><span data-dcnode-id="6505" instrument_node=""> Some journalists attribute the difference to </span><a data-dcnode-id="6503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_denial" title="Climate change denial"><span data-dcnode-id="6504" instrument_node="">climate change denial</span></a><span data-dcnode-id="6502" instrument_node=""> being propagated, mainly in the US, by business-centered organizations employing tactics worked out previously by the </span><a class="mw-redirect" data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tobacco_lobby" title="Tobacco lobby"><span data-dcnode-id="6501" instrument_node="">US tobacco lobby</span></a><span data-dcnode-id="6499" instrument_node="">.</span><sup class="reference" data-dcnode-id="6496" id="cite_ref-73"><a data-dcnode-id="6497" href="#cite_note-73"><span data-dcnode-id="6498" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="6493" id="cite_ref-74"><a data-dcnode-id="6494" href="#cite_note-74"><span data-dcnode-id="6495" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="6490" id="cite_ref-75"><a data-dcnode-id="6491" href="#cite_note-75"><span data-dcnode-id="6492" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6489" instrument_node=""> However, one study suggests that these tactic are less prominent in the media and that the public instead draws their opinions on climate mainly from the cues of political party elites.</span><sup class="reference" data-dcnode-id="6486" id="cite_ref-76"><a data-dcnode-id="6487" href="#cite_note-76"><span data-dcnode-id="6488" instrument_node="">[76]</span></a></sup><span data-dcnode-id="6485" instrument_node="">
</span></p><p data-dcnode-id="6471"><span data-dcnode-id="6483" instrument_node="">The efforts of </span><a data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Gore" title="Al Gore"><span data-dcnode-id="6482" instrument_node="">Al Gore</span></a><span data-dcnode-id="6480" instrument_node=""> and other environmental campaigns have focused on the effects of global warming and have managed to increase awareness and concern, but despite these efforts, as of 2007, the number of Americans believing humans are the cause of global warming was holding steady at 61%, and those believing that the popular media was understating the issue remained at about 35%.</span><sup class="reference" data-dcnode-id="6477" id="cite_ref-Saad2007HollywoodHeathUpConcern_77-0"><a data-dcnode-id="6478" href="#cite_note-Saad2007HollywoodHeathUpConcern-77"><span data-dcnode-id="6479" instrument_node="">[77]</span></a></sup><span data-dcnode-id="6476" instrument_node=""> Between 2010 and 2013, the number of Americans who believe the media under-reports the seriousness of global warming has been increasing, and the number who think media overstates it has been falling. According to a 2013 Gallup US opinion poll, 57% believe global warming is at least as bad as portrayed in the media (with 33% thinking media has downplayed global warming and 24% saying coverage is accurate). Less than half of Americans (41%) think the problem is not as bad as media portrays it.</span><sup class="reference" data-dcnode-id="6473" id="cite_ref-78"><a data-dcnode-id="6474" href="#cite_note-78"><span data-dcnode-id="6475" instrument_node="">[78]</span></a></sup><span data-dcnode-id="6472" instrument_node="">
</span></p><span data-dcnode-id="6470" instrument_node="">
</span><h3 data-dcnode-id="6460"><span class="mw-headline" data-dcnode-id="6468" id="Politics"><span data-dcnode-id="6469" instrument_node="">Politics</span></span><span class="mw-editsection" data-dcnode-id="6461"><span class="mw-editsection-bracket" data-dcnode-id="6466"><span data-dcnode-id="6467" instrument_node="">[</span></span><a data-dcnode-id="6464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D21" title="Edit section: Politics"><span data-dcnode-id="6465" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6462"><span data-dcnode-id="6463" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6459" instrument_node="">
</span><link data-dcnode-id="6458" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6454" role="note"><span data-dcnode-id="6457" instrument_node="">See also: </span><a data-dcnode-id="6455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics_of_climate_change" title="Politics of climate change"><span data-dcnode-id="6456" instrument_node="">Politics of climate change</span></a></div><span data-dcnode-id="6453" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6442"><div class="thumbinner" data-dcnode-id="6443" style="width:222px;"><a class="image" data-dcnode-id="6451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASydney_-_Marcus_Coblyn_%2848802454412%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6452" data-file-height="2333" data-file-width="3500" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Sydney_-_Marcus_Coblyn_%252848802454412%2529.jpg/220px-Sydney_-_Marcus_Coblyn_%252848802454412%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Sydney_-_Marcus_Coblyn_%2848802454412%29.jpg/330px-Sydney_-_Marcus_Coblyn_%2848802454412%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/34/Sydney_-_Marcus_Coblyn_%2848802454412%29.jpg/440px-Sydney_-_Marcus_Coblyn_%2848802454412%29.jpg 2x" width="220"></a><span data-dcnode-id="6450" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6444"><div class="magnify" data-dcnode-id="6448"><a class="internal" data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASydney_-_Marcus_Coblyn_%2848802454412%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_2019_climate_strikes" title="September 2019 climate strikes"><span data-dcnode-id="6447" instrument_node="">September 2019 climate strike</span></a><span data-dcnode-id="6445" instrument_node=""> in Sydney, Australia</span></div></div></div><span data-dcnode-id="6441" instrument_node="">
</span><p data-dcnode-id="6435"><span data-dcnode-id="6440" instrument_node="">Public opinion impacts on the issue of climate change because governments need willing electorates and citizens in order to implement policies that address climate change. Further, when climate change perceptions differ between the populace and governments, the communication of risk to the public becomes problematic. Finally, a public that is not aware of the issues surrounding climate change may resist or oppose climate change policies, which is of considerable importance to politicians and state leaders.</span><sup class="reference" data-dcnode-id="6437" id="cite_ref-LorenzoniAndPidgeon2006_79-0"><a data-dcnode-id="6438" href="#cite_note-LorenzoniAndPidgeon2006-79"><span data-dcnode-id="6439" instrument_node="">[79]</span></a></sup><span data-dcnode-id="6436" instrument_node="">
</span></p><p data-dcnode-id="6426"><span data-dcnode-id="6434" instrument_node="">Public support for action to forestall global warming is as strong as public support has been historically for many other government actions; however, it is not "intense" in the sense that it overrides other priorities.</span><sup class="reference" data-dcnode-id="6431" id="cite_ref-LorenzoniAndPidgeon2006_79-1"><a data-dcnode-id="6432" href="#cite_note-LorenzoniAndPidgeon2006-79"><span data-dcnode-id="6433" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="6428" id="cite_ref-Fix36-46_80-0"><a data-dcnode-id="6429" href="#cite_note-Fix36-46-80"><span data-dcnode-id="6430" instrument_node="">[80]</span></a></sup><span data-dcnode-id="6427" instrument_node="">
</span></p><p data-dcnode-id="6416"><span data-dcnode-id="6425" instrument_node="">A 2017 journal article said that shifts in public opinion in the direction of pro-environmentalism strongly increased the adoption of renewable energy policies in Europe.</span><sup class="reference" data-dcnode-id="6422" id="cite_ref-81"><a data-dcnode-id="6423" href="#cite_note-81"><span data-dcnode-id="6424" instrument_node="">[81]</span></a></sup><span data-dcnode-id="6421" instrument_node=""> A 2020 journal article said that countries in which more people believe in human-made climate change tend to have higher carbon prices.</span><sup class="reference" data-dcnode-id="6418" id="cite_ref-82"><a data-dcnode-id="6419" href="#cite_note-82"><span data-dcnode-id="6420" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6417" instrument_node="">
</span></p><p data-dcnode-id="6398"><span data-dcnode-id="6415" instrument_node="">According to a 2011 Gallop poll, the proportion of Americans who believe that the effects of global warming have begun or will begin in a few years rose to a peak in 2008 where it then declined, and a similar trend was found regarding the belief that global warming is a threat to their lifestyle within their lifetime.</span><sup class="reference" data-dcnode-id="6412" id="cite_ref-Newman2010AmericanConcernDrop_83-0"><a data-dcnode-id="6413" href="#cite_note-Newman2010AmericanConcernDrop-83"><span data-dcnode-id="6414" instrument_node="">[83]</span></a></sup><span data-dcnode-id="6411" instrument_node=""> Concern over global warming often corresponds with economic downturns and national crisis such as 9/11 as Americans prioritize the economy and national security over environmental concerns. However the drop in concern in 2008 is unique compared to other environmental issues.</span><sup class="reference" data-dcnode-id="6408" id="cite_ref-Saad2009GlobalWarmingExaggerated_49-1"><a data-dcnode-id="6409" href="#cite_note-Saad2009GlobalWarmingExaggerated-49"><span data-dcnode-id="6410" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6407" instrument_node=""> Considered in the context of environmental issues, Americans consider global warming as a less critical concern than the pollution of rivers, lakes, and drinking water; toxic waste; fresh water needs; air pollution; damage to the ozone layer; and the loss of tropical rain forests. However, Americans prioritize global warming over species extinction and acid rain issues.</span><sup class="reference" data-dcnode-id="6404" id="cite_ref-84"><a data-dcnode-id="6405" href="#cite_note-84"><span data-dcnode-id="6406" instrument_node="">[84]</span></a></sup><span data-dcnode-id="6403" instrument_node=""> Since 2000 the partisan gap has grown as Republican and Democratic views diverge.</span><sup class="reference" data-dcnode-id="6400" id="cite_ref-Dunlap2008PartisanGap_85-0"><a data-dcnode-id="6401" href="#cite_note-Dunlap2008PartisanGap-85"><span data-dcnode-id="6402" instrument_node="">[85]</span></a></sup><span data-dcnode-id="6399" instrument_node="">
</span></p><span data-dcnode-id="6397" instrument_node="">
</span><h2 data-dcnode-id="6387"><span class="mw-headline" data-dcnode-id="6395" id="Climate_change_opinion_by_country"><span data-dcnode-id="6396" instrument_node="">Climate change opinion by country</span></span><span class="mw-editsection" data-dcnode-id="6388"><span class="mw-editsection-bracket" data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">[</span></span><a data-dcnode-id="6391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D22" title="Edit section: Climate change opinion by country"><span data-dcnode-id="6392" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6389"><span data-dcnode-id="6390" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6386" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6374"><div class="thumbinner" data-dcnode-id="6375" style="width:222px;"><a class="image" data-dcnode-id="6384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg"><img alt="" class="thumbimage" data-dcnode-id="6385" data-file-height="750" data-file-width="1000" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/81/20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg/220px-20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/81/20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg/330px-20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/81/20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg/440px-20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg.png 2x" width="220"></a><span data-dcnode-id="6383" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6376"><div class="magnify" data-dcnode-id="6381"><a class="internal" data-dcnode-id="6382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A20210824_Survey_-_climate_change_impact_on_daily_life_-_European_Investment_Bank.svg" title="Enlarge"></a></div><span data-dcnode-id="6380" instrument_node="">At least 72% of Chinese, American and European respondents to a 2020−2021 </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Investment_Bank" title="European Investment Bank"><span data-dcnode-id="6379" instrument_node="">European Investment Bank</span></a><span data-dcnode-id="6377" instrument_node=""> climate survey stated that climate change had an impact on everyday life.</span></div></div></div><span data-dcnode-id="6373" instrument_node="">
</span><p data-dcnode-id="6368"><span data-dcnode-id="6372" instrument_node="">Climate change opinion is the aggregate of </span><a data-dcnode-id="6370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_opinion" title="Public opinion"><span data-dcnode-id="6371" instrument_node="">public opinion</span></a><span data-dcnode-id="6369" instrument_node=""> held by the adult population. Cost constraints often restrict surveys to sample only one or two countries from each continent or focus on only one region. Because of differences among questions, wording, and methods—it is difficult to reliably compare results or to generalize them to opinions held worldwide.
</span></p><p data-dcnode-id="6351"><span data-dcnode-id="6367" instrument_node="">In 2007–2008, the </span><a class="mw-redirect" data-dcnode-id="6365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallup_Poll" title="Gallup Poll"><span data-dcnode-id="6366" instrument_node="">Gallup Poll</span></a><span data-dcnode-id="6364" instrument_node=""> surveyed individuals from 128 countries in the first comprehensive study of global opinions. </span><a class="mw-redirect" data-dcnode-id="6362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Gallup_Organization" title="The Gallup Organization"><span data-dcnode-id="6363" instrument_node="">The Gallup Organization</span></a><span data-dcnode-id="6361" instrument_node=""> aggregated opinion from the adult population fifteen years of age and older, either through the telephone or personal interviews, and in both rural and urban areas except in areas where the safety of interviewer was threatened and in scarcely populated islands. Personal interviews were </span><a data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stratified_sampling" title="Stratified sampling"><span data-dcnode-id="6360" instrument_node="">stratified</span></a><span data-dcnode-id="6358" instrument_node=""> by population size or geography and </span><a data-dcnode-id="6356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cluster_sampling" title="Cluster sampling"><span data-dcnode-id="6357" instrument_node="">cluster sampling</span></a><span data-dcnode-id="6355" instrument_node=""> was achieved through one or more stages. Although error bounds vary, they were all below ±6% with 95% </span><a data-dcnode-id="6353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confidence_interval" title="Confidence interval"><span data-dcnode-id="6354" instrument_node="">confidence</span></a><span data-dcnode-id="6352" instrument_node="">.
</span></p><p data-dcnode-id="6343"><span data-dcnode-id="6350" instrument_node="">Weighting countries to a 2008 </span><a data-dcnode-id="6348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="6349" instrument_node="">World Bank</span></a><span data-dcnode-id="6347" instrument_node=""> population estimate, 61% of individuals worldwide were aware of </span><a class="mw-redirect" data-dcnode-id="6345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_warming" title="Global warming"><span data-dcnode-id="6346" instrument_node="">global warming</span></a><span data-dcnode-id="6344" instrument_node="">, developed countries more aware than developing, with Africa the least aware. The median of people perceiving it as a threat was 47%. Latin America and developed countries in Asia led the belief that climate change was a result of human activities, while Africa, parts of Asia and the Middle East, and countries from the Former Soviet Union led in the opposite. Awareness often translates to concern, although of those aware, individuals in Europe and developed countries in Asia perceived global warming as a greater threat than others.
</span></p><p data-dcnode-id="6334"><span data-dcnode-id="6342" instrument_node="">In January 2021, the UNDP worked with Oxford University to release the world's largest survey of public opinion on climate change.</span><sup class="reference" data-dcnode-id="6339" id="cite_ref-86"><a data-dcnode-id="6340" href="#cite_note-86"><span data-dcnode-id="6341" instrument_node="">[86]</span></a></sup><span data-dcnode-id="6338" instrument_node=""> It surveyed 50 countries, spanning all inhabited regions, and a majority of the world's population. Its finding suggested a growing concern for climate change. Overall, 64% of respondents believed climate change was an emergency. This belief was high among all regions, the highest being Western Europe and North America at 72%, and the lowest being </span><a data-dcnode-id="6336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-Saharan_Africa" title="Sub-Saharan Africa"><span data-dcnode-id="6337" instrument_node="">Sub-Saharan Africa</span></a><span data-dcnode-id="6335" instrument_node=""> at 61%. It also identified a link between average income and concern for climate change. In the high income countries, 72% believed it was an emergency. This was 62% for middle income countries and 58% for low income countries. It asked people whether or not they supported 18 key policies over 6 areas, ranging from economy to transport. There was general support for all policy suggestions. For example, 8 of the 10 countries with the highest emissions saw a majority of respondents favor more renewable energy. The general impression was that the public wanted more policies to be implemented, and demanded more from policy makers. Overall, 59% of respondents who believed climate change was an emergency said the world should do 'everything necessary and urgently in response' to the crisis. Conversely, there was remarkably little support among respondents for no policies at all, with the highest being Pakistan at only 5%. The report indicated a widespread public awareness, concern, and desire for greater action among all regions of the world.
</span></p><span data-dcnode-id="6333" instrument_node="">
</span><h3 data-dcnode-id="6323"><span class="mw-headline" data-dcnode-id="6331" id="Views_on_climate_change_by_region"><span data-dcnode-id="6332" instrument_node="">Views on climate change by region</span></span><span class="mw-editsection" data-dcnode-id="6324"><span class="mw-editsection-bracket" data-dcnode-id="6329"><span data-dcnode-id="6330" instrument_node="">[</span></span><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D23" title="Edit section: Views on climate change by region"><span data-dcnode-id="6328" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6325"><span data-dcnode-id="6326" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6322" instrument_node="">
</span><h4 data-dcnode-id="6312"><span class="mw-headline" data-dcnode-id="6320" id="Africa"><span data-dcnode-id="6321" instrument_node="">Africa</span></span><span class="mw-editsection" data-dcnode-id="6313"><span class="mw-editsection-bracket" data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">[</span></span><a data-dcnode-id="6316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D24" title="Edit section: Africa"><span data-dcnode-id="6317" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6314"><span data-dcnode-id="6315" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6311" instrument_node="">
</span><p data-dcnode-id="6290"><span data-dcnode-id="6310" instrument_node="">People in Africa are relatively concerned about climate change compared to the Middle East and parts of Asia. However, they are less concerned than most of Latin America and Europe. In 2015, 61% of people in Africa considered climate change to be a very serious problem, and 52% believe that climate change is harming people now. While 59% of Africans were worried about droughts or water shortages, only 16% were concerned about severe weather, and 3% are concerned about rising sea levels.</span><sup class="reference" data-dcnode-id="6307" id="cite_ref-:0_87-0"><a data-dcnode-id="6308" href="#cite_note-:0-87"><span data-dcnode-id="6309" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6306" instrument_node=""> By 2007, countries in Sub-Saharan Africa were especially troubled about increasing desertification even as they account for .04% of global carbon dioxide emissions.</span><sup class="reference" data-dcnode-id="6303" id="cite_ref-88"><a data-dcnode-id="6304" href="#cite_note-88"><span data-dcnode-id="6305" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6302" instrument_node=""> In 2011, concern in Sub-Saharan Africa over climate change dropped; only 34% of the population considered climate change to be a "very" or "somewhat serious issue".</span><sup class="reference" data-dcnode-id="6299" id="cite_ref-:1_89-0"><a data-dcnode-id="6300" href="#cite_note-:1-89"><span data-dcnode-id="6301" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6298" instrument_node=""> Even so, according to the </span><a data-dcnode-id="6296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pew_Research_Center" title="Pew Research Center"><span data-dcnode-id="6297" instrument_node="">Pew Research Center</span></a><span data-dcnode-id="6295" instrument_node=""> 2015 Global Attitudes Survey, some countries were more concerned than others. In Uganda, 79% of people, 68% in Ghana, 45% in South Africa and 40% in Ethiopia considered climate change to be a very serious problem.</span><sup class="reference" data-dcnode-id="6292" id="cite_ref-:0_87-1"><a data-dcnode-id="6293" href="#cite_note-:0-87"><span data-dcnode-id="6294" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6291" instrument_node="">
</span></p><span data-dcnode-id="6289" instrument_node="">
</span><h4 data-dcnode-id="6279"><span class="mw-headline" data-dcnode-id="6287" id="Latin_America"><span data-dcnode-id="6288" instrument_node="">Latin America</span></span><span class="mw-editsection" data-dcnode-id="6280"><span class="mw-editsection-bracket" data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">[</span></span><a data-dcnode-id="6283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D25" title="Edit section: Latin America"><span data-dcnode-id="6284" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6281"><span data-dcnode-id="6282" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6278" instrument_node="">
</span><p data-dcnode-id="6245"><a data-dcnode-id="6276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="6277" instrument_node="">Latin America</span></a><span data-dcnode-id="6275" instrument_node=""> has a higher percentage of people concerned with climate change than other regions of the world. According to the </span><a data-dcnode-id="6273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pew_Research_Center" title="Pew Research Center"><span data-dcnode-id="6274" instrument_node="">Pew Research Center</span></a><span data-dcnode-id="6272" instrument_node=""> 74% consider climate change to be a serious problem and 77% say that it is harming people now, 20 points higher than the global median.</span><sup class="reference" data-dcnode-id="6269" id="cite_ref-:0_87-2"><a data-dcnode-id="6270" href="#cite_note-:0-87"><span data-dcnode-id="6271" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6268" instrument_node=""> The same study showed that 63% of people in Latin America are very concerned that climate change will harm them personally.</span><sup class="reference" data-dcnode-id="6265" id="cite_ref-:0_87-3"><a data-dcnode-id="6266" href="#cite_note-:0-87"><span data-dcnode-id="6267" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6264" instrument_node=""> When looked at more specifically, people in Mexico and Central America are the most worried, with 81.5% believing that climate change is a very serious issue. South America is slightly less anxious at 75% and the Caribbean, at the relatively high rate of 66.7%, is the least concerned.</span><sup class="reference" data-dcnode-id="6261" id="cite_ref-90"><a data-dcnode-id="6262" href="#cite_note-90"><span data-dcnode-id="6263" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6260" instrument_node=""> Brazil is an important country in global </span><a class="mw-redirect" data-dcnode-id="6258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individual_and_political_action_on_climate_change" title="Individual and political action on climate change"><span data-dcnode-id="6259" instrument_node="">climate change politics</span></a><span data-dcnode-id="6257" instrument_node=""> because it is the eleventh largest emitter and unlike other large emitter countries, 86% consider global warming to be a very serious problem.</span><sup class="reference" data-dcnode-id="6254" id="cite_ref-:0_87-4"><a data-dcnode-id="6255" href="#cite_note-:0-87"><span data-dcnode-id="6256" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="6251" id="cite_ref-:3_91-0"><a data-dcnode-id="6252" href="#cite_note-:3-91"><span data-dcnode-id="6253" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6250" instrument_node=""> Compared to the rest of the world, Latin America is more consistently concerned with high percentages of the population worried about climate change. Further, in Latin America, 67% believe in personal responsibility for climate change and say that people will have to make major lifestyle modifications.</span><sup class="reference" data-dcnode-id="6247" id="cite_ref-:0_87-5"><a data-dcnode-id="6248" href="#cite_note-:0-87"><span data-dcnode-id="6249" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6246" instrument_node="">
</span></p><span data-dcnode-id="6244" instrument_node="">
</span><h4 data-dcnode-id="6234"><span class="mw-headline" data-dcnode-id="6242" id="Europe"><span data-dcnode-id="6243" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="6235"><span class="mw-editsection-bracket" data-dcnode-id="6240"><span data-dcnode-id="6241" instrument_node="">[</span></span><a data-dcnode-id="6238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D26" title="Edit section: Europe"><span data-dcnode-id="6239" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6233" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6224"><div class="thumbinner" data-dcnode-id="6225" style="width:222px;"><a class="image" data-dcnode-id="6231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg"><img alt="" class="thumbimage" data-dcnode-id="6232" data-file-height="750" data-file-width="1250" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg/220px-20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8c/20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg/330px-20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8c/20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg/440px-20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg.png 2x" width="220"></a><span data-dcnode-id="6230" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6226"><div class="magnify" data-dcnode-id="6228"><a class="internal" data-dcnode-id="6229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A20210823_Survey_of_top_climate-related_concerns_in_Europe_-_European_Investment_Bank.svg" title="Enlarge"></a></div><span data-dcnode-id="6227" instrument_node="">An increase in natural disasters, damage to the environment and rising temperatures are the biggest climate change-related concerns for Europeans surveyed by the European Investment Bank (2020-2021).</span></div></div></div><span data-dcnode-id="6223" instrument_node="">
</span><p data-dcnode-id="6211"><span data-dcnode-id="6222" instrument_node="">Europeans have a tendency to be more concerned about climate change than much of the world, with the exception of Latin America. However there is a divide between </span><a data-dcnode-id="6220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Europe" title="Eastern Europe"><span data-dcnode-id="6221" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="6219" instrument_node="">, where people are less worried about climate change, and </span><a data-dcnode-id="6217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="6218" instrument_node="">Western Europe</span></a><span data-dcnode-id="6216" instrument_node="">. A global climate survey by the European Investment Bank showed that climate is the number one concern for Europeans. Most respondents said they were already feeling the effects of climate change. Many people believed climate change can still be reversed with 68% of Spanish respondents believing it can be reversed and 80% seeing themselves as part of the solution.</span><sup class="reference" data-dcnode-id="6213" id="cite_ref-:10_92-0"><a data-dcnode-id="6214" href="#cite_note-:10-92"><span data-dcnode-id="6215" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6212" instrument_node="">
</span></p><span data-dcnode-id="6210" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6195"><div class="thumbinner" data-dcnode-id="6196" style="width:222px;"><a class="image" data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYoung_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg"><img alt="" class="thumbimage" data-dcnode-id="6209" data-file-height="1052" data-file-width="744" decoding="async" height="311" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg/220px-Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg/330px-Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg/440px-Young_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg.png 2x" width="220"></a><span data-dcnode-id="6207" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6197"><div class="magnify" data-dcnode-id="6205"><a class="internal" data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AYoung_Europeans_and_parents_of_children_are_more_convinced_their_behaviour_can_make_a_difference..svg" title="Enlarge"></a></div><span data-dcnode-id="6204" instrument_node="">72% of the Europeans surveyed in </span><a data-dcnode-id="6202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Investment_Bank" title="European Investment Bank"><span data-dcnode-id="6203" instrument_node="">European Investment Bank</span></a><span data-dcnode-id="6201" instrument_node="">'s Climate Survey 2020 are optimistic about making a difference in climate change.</span><sup class="reference" data-dcnode-id="6198" id="cite_ref-93"><a data-dcnode-id="6199" href="#cite_note-93"><span data-dcnode-id="6200" instrument_node="">[93]</span></a></sup></div></div></div><span data-dcnode-id="6194" instrument_node="">
</span><p data-dcnode-id="6169"><span data-dcnode-id="6193" instrument_node="">In Europe, there is a range from 88% to 97% of people feeling that climate change is happening and similar ranges are present for agreeing that climate change is caused by human activity and that the impacts of it will be bad.</span><sup class="reference" data-dcnode-id="6190" id="cite_ref-:3_91-1"><a data-dcnode-id="6191" href="#cite_note-:3-91"><span data-dcnode-id="6192" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6189" instrument_node=""> Generally Eastern European countries are slightly less likely to believe in climate change, or the dangers of it, with 63% saying it is very serious, 24% considering it to be fairly serious and only 10% saying it is not a serious problem.</span><sup class="reference" data-dcnode-id="6186" id="cite_ref-:4_94-0"><a data-dcnode-id="6187" href="#cite_note-:4-94"><span data-dcnode-id="6188" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6185" instrument_node=""> When asked if they feel a personal responsibility to help reduce climate change, on a scale of 0, not at all, to 10, a great deal, Europeans respond with the average score of 5.6.</span><sup class="reference" data-dcnode-id="6182" id="cite_ref-:3_91-2"><a data-dcnode-id="6183" href="#cite_note-:3-91"><span data-dcnode-id="6184" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6181" instrument_node=""> When looked at more specifically, Western Europeans are closer to the response of 7 while Eastern European countries respond with an average of less than 4. When asked if Europeans are willing to pay more for climate change, 49% are willing, however only 9% of Europeans have already switched to a greener energy supply.</span><sup class="reference" data-dcnode-id="6178" id="cite_ref-:4_94-1"><a data-dcnode-id="6179" href="#cite_note-:4-94"><span data-dcnode-id="6180" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6177" instrument_node=""> While a large majority of Europeans believe in the dangers of climate change, their feelings of personal responsibility to deal with the issue are much more limited. Especially in terms of actions that could already have been taken - such as having already switched to greener energies discussed above - one can see Europeans' feelings of personal responsibility are limited. 90% of Europeans interviewed for the </span><a data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Investment_Bank" title="European Investment Bank"><span data-dcnode-id="6176" instrument_node="">European Investment Bank</span></a><span data-dcnode-id="6174" instrument_node=""> Climate Survey 2019 believe their children will be impacted by climate change in their everyday lives and 70% are willing to pay an extra tax to fight climate change.</span><sup class="reference" data-dcnode-id="6171" id="cite_ref-:10_92-1"><a data-dcnode-id="6172" href="#cite_note-:10-92"><span data-dcnode-id="6173" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6170" instrument_node="">
</span></p><span data-dcnode-id="6168" instrument_node="">
</span><h4 data-dcnode-id="6157"><span data-dcnode-id="6167" id="Asia.2FPacific"></span><span class="mw-headline" data-dcnode-id="6165" id="Asia/Pacific"><span data-dcnode-id="6166" instrument_node="">Asia/Pacific</span></span><span class="mw-editsection" data-dcnode-id="6158"><span class="mw-editsection-bracket" data-dcnode-id="6163"><span data-dcnode-id="6164" instrument_node="">[</span></span><a data-dcnode-id="6161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D27" title="Edit section: Asia/Pacific"><span data-dcnode-id="6162" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6159"><span data-dcnode-id="6160" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6156" instrument_node="">
</span><p data-dcnode-id="6117"><a data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="6155" instrument_node="">Asia</span></a><span data-dcnode-id="6153" instrument_node=""> and the Pacific have a tendency to be less concerned about climate change, except small island states, with developing countries in Asia being less concerned than developed countries. In Asia and the Pacific, around 45% of people believe that climate change is a very serious problem and similarly 48% believe that it is harming people now.</span><sup class="reference" data-dcnode-id="6150" id="cite_ref-:0_87-6"><a data-dcnode-id="6151" href="#cite_note-:0-87"><span data-dcnode-id="6152" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6149" instrument_node=""> Only 37% of people in Asia and the Pacific are very concerned that climate change will harm them personally.</span><sup class="reference" data-dcnode-id="6146" id="cite_ref-:0_87-7"><a data-dcnode-id="6147" href="#cite_note-:0-87"><span data-dcnode-id="6148" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6145" instrument_node=""> There is a large gap between developing Asia and developed Asia. Only 31% of developing Asia considers global warming to be a "very" or "somewhat" serious threat and 74% of developed Asia considers global warming to be a serious threat.</span><sup class="reference" data-dcnode-id="6142" id="cite_ref-:1_89-1"><a data-dcnode-id="6143" href="#cite_note-:1-89"><span data-dcnode-id="6144" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6141" instrument_node=""> It could be argued that one reason for this is that people in more developed countries in Asia are more educated on the issues, especially given that developing countries in Asia do face significant threats from climate change. The most relevant views on climate change are those of the citizens in the countries that are emitting the most. For example, in China, the world's largest emitter,</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-:2_95-0"><a data-dcnode-id="6139" href="#cite_note-:2-95"><span data-dcnode-id="6140" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6137" instrument_node=""> 68% of Chinese people are satisfied with their government's efforts to preserve the environment.</span><sup class="reference" data-dcnode-id="6134" id="cite_ref-:5_96-0"><a data-dcnode-id="6135" href="#cite_note-:5-96"><span data-dcnode-id="6136" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6133" instrument_node=""> And in India, the world's third largest emitter,</span><sup class="reference" data-dcnode-id="6130" id="cite_ref-:2_95-1"><a data-dcnode-id="6131" href="#cite_note-:2-95"><span data-dcnode-id="6132" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6129" instrument_node=""> 77% of Indian people are satisfied with their country's efforts to preserve the environment.</span><sup class="reference" data-dcnode-id="6126" id="cite_ref-:5_96-1"><a data-dcnode-id="6127" href="#cite_note-:5-96"><span data-dcnode-id="6128" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6125" instrument_node=""> 80% of Chinese citizens interviewed in the European Investment Bank Climate Survey 2019 believe climate change is still reversible, 72% believe their individual behaviour can make a difference in </span><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_mitigation" title="Climate change mitigation"><span data-dcnode-id="6124" instrument_node="">addressing climate change</span></a><span data-dcnode-id="6122" instrument_node="">.</span><sup class="reference" data-dcnode-id="6119" id="cite_ref-:10_92-2"><a data-dcnode-id="6120" href="#cite_note-:10-92"><span data-dcnode-id="6121" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6118" instrument_node="">
</span></p><span data-dcnode-id="6116" instrument_node="">
</span><h5 data-dcnode-id="6106"><span class="mw-headline" data-dcnode-id="6114" id="India"><span data-dcnode-id="6115" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="6107"><span class="mw-editsection-bracket" data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">[</span></span><a data-dcnode-id="6110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D28" title="Edit section: India"><span data-dcnode-id="6111" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6105" instrument_node="">
</span><link data-dcnode-id="6104" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6100" role="note"><span data-dcnode-id="6103" instrument_node="">Main article: </span><a data-dcnode-id="6101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_in_India" title="Climate change in India"><span data-dcnode-id="6102" instrument_node="">Climate change in India</span></a></div><span data-dcnode-id="6099" instrument_node="">
</span><p data-dcnode-id="6090"><span data-dcnode-id="6098" instrument_node="">A research team led by Yale University's Anthony Leiserowitz, conducted an audience segmentation analysis in 2011 for </span><a data-dcnode-id="6096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="6097" instrument_node="">India</span></a><span data-dcnode-id="6095" instrument_node="">—"Global Warming's Six Indias",</span><sup class="reference" data-dcnode-id="6092" id="cite_ref-YaleCCC_Leiserowitz_India_2011_97-0"><a data-dcnode-id="6093" href="#cite_note-YaleCCC_Leiserowitz_India_2011-97"><span data-dcnode-id="6094" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6091" instrument_node=""> The 2011 study broke down the Indian public into six distinct audience groups based on climate change beliefs, attitudes, risk perceptions and policy preferences: informed (19%), experienced (24%), undecided (15%), unconcerned (15%), indifferent (11%), and the disengaged (16%). While the informed are the most concerned and aware of climate change and its threats, the disengaged do not care or have an opinion. The experienced believe it is happening or have felt the effects of climate change and can identify it when provided with a short description. The undecided, unconcerned and indifferent, all have varying levels of worry, concern and risk perception.
</span></p><p data-dcnode-id="6084"><span data-dcnode-id="6089" instrument_node="">The same survey resulted in a different study, “Climate Change in the Indian Mind”</span><sup class="reference" data-dcnode-id="6086" id="cite_ref-98"><a data-dcnode-id="6087" href="#cite_note-98"><span data-dcnode-id="6088" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6085" instrument_node=""> showing that 41% of respondents had either never heard of the term global warming, or did not know what it meant while 7% claimed to know “a lot” about global warming. When provided with a description of global warming and what it might entail, 72% of the respondents agreed that it was happening. The study revealed that 56% of respondents perceived it to be caused by human activities while 31% perceived it to be caused primarily by natural changes in the environment. 54% agreed that hot days had become more frequent in their local area, in comparison to 21% of respondents perceiving frequency of severe storms as having increased. A majority of respondents (65%) perceived a severe drought or flood as having a medium to large impact on their lives. These impacts include effects on drinking water, food supply, healthy, income and their community. Higher education levels tended to correspond with higher levels of concern or worry regarding global warming and its effects on them personally.
</span></p><p data-dcnode-id="6068"><span data-dcnode-id="6083" instrument_node="">41% of the respondents agreed that the government should be doing more to address issues stemming from climate change, with the most support (70%) for a national program to elevate climate literacy. 53% of respondents agreed that protecting the environment is important event at a cost to economic growth, highlighting the tendency of respondents to display </span><a data-dcnode-id="6081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egalitarianism" title="Egalitarianism"><span data-dcnode-id="6082" instrument_node="">egalitarian</span></a><span data-dcnode-id="6080" instrument_node=""> over </span><a data-dcnode-id="6078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individualism" title="Individualism"><span data-dcnode-id="6079" instrument_node="">individualistic</span></a><span data-dcnode-id="6077" instrument_node=""> values.</span><sup class="reference" data-dcnode-id="6074" id="cite_ref-99"><a data-dcnode-id="6075" href="#cite_note-99"><span data-dcnode-id="6076" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6073" instrument_node=""> Personal experiences with climate change risks are an important predictor of risk perception and policy support. Coupled with trust in different sources, mainly scientists and environmental organizations, higher usage of media and attention to news,</span><sup class="reference" data-dcnode-id="6070" id="cite_ref-100"><a data-dcnode-id="6071" href="#cite_note-100"><span data-dcnode-id="6072" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6069" instrument_node=""> policy support, public engagement and belief in global warming are seen to increase.
</span></p><span data-dcnode-id="6067" instrument_node="">
