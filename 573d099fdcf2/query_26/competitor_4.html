</span><h4 data-dcnode-id="6057"><span class="mw-headline" data-dcnode-id="6065" id="Middle_East"><span data-dcnode-id="6066" instrument_node="">Middle East</span></span><span class="mw-editsection" data-dcnode-id="6058"><span class="mw-editsection-bracket" data-dcnode-id="6063"><span data-dcnode-id="6064" instrument_node="">[</span></span><a data-dcnode-id="6061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D29" title="Edit section: Middle East"><span data-dcnode-id="6062" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6059"><span data-dcnode-id="6060" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6056" instrument_node="">
</span><p data-dcnode-id="6010"><span data-dcnode-id="6055" instrument_node="">While the increasing severity of droughts and other dangerous realities are and will continue to be a problem in the </span><a data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="6054" instrument_node="">Middle East</span></a><span data-dcnode-id="6052" instrument_node="">, the region has one of the smallest rates of concern in the world. 38% believe that climate change is a very serious problem and 26% believe that climate change is harming people now.</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-:0_87-8"><a data-dcnode-id="6050" href="#cite_note-:0-87"><span data-dcnode-id="6051" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6048" instrument_node=""> Of the four Middle Eastern countries polled in a </span><a data-dcnode-id="6046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pew_Research_Center" title="Pew Research Center"><span data-dcnode-id="6047" instrument_node="">Pew</span></a><span data-dcnode-id="6045" instrument_node=""> Global Study, on what is their primary concern, </span><a data-dcnode-id="6043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="6044" instrument_node="">Israel</span></a><span data-dcnode-id="6042" instrument_node="">, </span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jordan" title="Jordan"><span data-dcnode-id="6041" instrument_node="">Jordan</span></a><span data-dcnode-id="6039" instrument_node="">, and </span><a data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lebanon" title="Lebanon"><span data-dcnode-id="6038" instrument_node="">Lebanon</span></a><span data-dcnode-id="6036" instrument_node=""> named </span><a class="mw-redirect" data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_State_of_Iraq_and_the_Levant" title="Islamic State of Iraq and the Levant"><span data-dcnode-id="6035" instrument_node="">ISIS</span></a><span data-dcnode-id="6033" instrument_node="">, and </span><a data-dcnode-id="6031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="6032" instrument_node="">Turkey</span></a><span data-dcnode-id="6030" instrument_node=""> stated </span><a data-dcnode-id="6028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="6029" instrument_node="">United States</span></a><span data-dcnode-id="6027" instrument_node=""> encroachment.</span><sup class="reference" data-dcnode-id="6024" id="cite_ref-:6_101-0"><a data-dcnode-id="6025" href="#cite_note-:6-101"><span data-dcnode-id="6026" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6023" instrument_node=""> 38% of Israel considers climate change to be a major threat to their country, 40% of Jordan, 58% of Lebanon and 53% of Turkey.</span><sup class="reference" data-dcnode-id="6020" id="cite_ref-:6_101-1"><a data-dcnode-id="6021" href="#cite_note-:6-101"><span data-dcnode-id="6022" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6019" instrument_node=""> This is compared to relatively high numbers of residents who believe that ISIS is a major threat to their country ranging from 63% to 97%. In the poll, 38% of the Middle East are concerned about drought and 19% are concerned about long periods of unusually hot weather.</span><sup class="reference" data-dcnode-id="6016" id="cite_ref-:0_87-9"><a data-dcnode-id="6017" href="#cite_note-:0-87"><span data-dcnode-id="6018" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6015" instrument_node=""> 42% are satisfied with their own country's current efforts to preserve the environment.</span><sup class="reference" data-dcnode-id="6012" id="cite_ref-:5_96-2"><a data-dcnode-id="6013" href="#cite_note-:5-96"><span data-dcnode-id="6014" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6011" instrument_node="">
</span></p><span data-dcnode-id="6009" instrument_node="">
</span><h4 data-dcnode-id="5999"><span class="mw-headline" data-dcnode-id="6007" id="North_America"><span data-dcnode-id="6008" instrument_node="">North America</span></span><span class="mw-editsection" data-dcnode-id="6000"><span class="mw-editsection-bracket" data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">[</span></span><a data-dcnode-id="6003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D30" title="Edit section: North America"><span data-dcnode-id="6004" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6001"><span data-dcnode-id="6002" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5998" instrument_node="">
</span><p data-dcnode-id="5953"><span data-dcnode-id="5997" instrument_node="">North America has mixed perceptions on climate change ranging from </span><a data-dcnode-id="5995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico" title="Mexico"><span data-dcnode-id="5996" instrument_node="">Mexico</span></a><span data-dcnode-id="5994" instrument_node=""> and </span><a data-dcnode-id="5992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5993" instrument_node="">Canada</span></a><span data-dcnode-id="5991" instrument_node=""> that are both more concerned, and the United States, the world's second largest emitter,</span><sup class="reference" data-dcnode-id="5988" id="cite_ref-:2_95-2"><a data-dcnode-id="5989" href="#cite_note-:2-95"><span data-dcnode-id="5990" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5987" instrument_node=""> that is less concerned. Mexico is the most concerned about climate change of the three countries in North America. 90% consider climate change to be a very serious problem and 83% believe that climate change is harming people substantially right now.</span><sup class="reference" data-dcnode-id="5984" id="cite_ref-102"><a data-dcnode-id="5985" href="#cite_note-102"><span data-dcnode-id="5986" instrument_node="">[102]</span></a></sup><span data-dcnode-id="5983" instrument_node=""> Canadians are also seriously concerned, 20% are extremely concerned, 30% are definitely concerned, 31% are somewhat concerned and only 19% are not very/not at all concerned about climate change.</span><sup class="reference" data-dcnode-id="5980" id="cite_ref-103"><a data-dcnode-id="5981" href="#cite_note-103"><span data-dcnode-id="5982" instrument_node="">[103]</span></a></sup><span data-dcnode-id="5979" instrument_node=""> While the United States which is the largest emitter of CO</span><sub data-dcnode-id="5977" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="5978" instrument_node="">2</span></sub><span data-dcnode-id="5976" instrument_node=""> in North America and the second largest emitter of CO</span><sub data-dcnode-id="5974" style="font-size: 80%;vertical-align: -0.35em"><span data-dcnode-id="5975" instrument_node="">2</span></sub><span data-dcnode-id="5973" instrument_node=""> in the world</span><sup class="reference" data-dcnode-id="5970" id="cite_ref-:2_95-3"><a data-dcnode-id="5971" href="#cite_note-:2-95"><span data-dcnode-id="5972" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5969" instrument_node=""> has the lowest degrees of concern about climate change in North America. While 61% of Americans say they are concerned about climate change,</span><sup class="reference" data-dcnode-id="5966" id="cite_ref-:7_104-0"><a data-dcnode-id="5967" href="#cite_note-:7-104"><span data-dcnode-id="5968" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5965" instrument_node=""> that is 30% lower than Mexico and 20% lower than Canada. 41% believe that climate change could impact them personally. Nonetheless, 70% of Americans believe that environmental protections are more important than economic growth according to a </span><a data-dcnode-id="5963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yale_Program_on_Climate_Change_Communication" title="Yale Program on Climate Change Communication"><span data-dcnode-id="5964" instrument_node="">Yale</span></a><span data-dcnode-id="5962" instrument_node=""> climate opinion study.</span><sup class="reference" data-dcnode-id="5959" id="cite_ref-:7_104-1"><a data-dcnode-id="5960" href="#cite_note-:7-104"><span data-dcnode-id="5961" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5958" instrument_node=""> 76% of US citizens interviewed for the European Investment Bank Climate Survey 2019 believe developed countries have a responsibility to help developing countries address climate change.</span><sup class="reference" data-dcnode-id="5955" id="cite_ref-:10_92-3"><a data-dcnode-id="5956" href="#cite_note-:10-92"><span data-dcnode-id="5957" instrument_node="">[92]</span></a></sup><span data-dcnode-id="5954" instrument_node="">
</span></p><span data-dcnode-id="5952" instrument_node="">
</span><h5 data-dcnode-id="5942"><span class="mw-headline" data-dcnode-id="5950" id="United_States"><span data-dcnode-id="5951" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="5943"><span class="mw-editsection-bracket" data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">[</span></span><a data-dcnode-id="5946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D31" title="Edit section: United States"><span data-dcnode-id="5947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5944"><span data-dcnode-id="5945" instrument_node="">]</span></span></span></h5><span data-dcnode-id="5941" instrument_node="">
</span><link data-dcnode-id="5940" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5936" role="note"><span data-dcnode-id="5939" instrument_node="">See also: </span><a data-dcnode-id="5937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_in_the_United_States" title="Climate change in the United States"><span data-dcnode-id="5938" instrument_node="">Climate change in the United States</span></a></div><span data-dcnode-id="5935" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="5889"><div class="thumbinner" data-dcnode-id="5890" style="width:591px;max-width:591px"><div class="trow" data-dcnode-id="5891"><div class="tsingle" data-dcnode-id="5918" style="width:180px;max-width:180px"><div class="thumbimage" data-dcnode-id="5930" style="height:118px;overflow:hidden"><a class="image" data-dcnode-id="5931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg"><img alt="" data-dcnode-id="5932" data-file-height="600" data-file-width="900" decoding="async" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg/178px-2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ac/2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg/267px-2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ac/2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg/356px-2020_Pew_Survey_-_Global_warming_-_Climate_change_-_political_party.svg.png 2x" width="178"></a></div><div class="thumbcaption" data-dcnode-id="5919"><span data-dcnode-id="5929" instrument_node="">In the United States, </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Party_%28United_States%29" title="Democratic Party (United States)"><span data-dcnode-id="5928" instrument_node="">Democrats</span></a><span data-dcnode-id="5926" instrument_node=""> (blue) and </span><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_Party_%28United_States%29" title="Republican Party (United States)"><span data-dcnode-id="5925" instrument_node="">Republicans</span></a><span data-dcnode-id="5923" instrument_node=""> (red) have long differed in views of the importance of addressing climate change, with the gap widening in the late 2010s, primarily due to a 30-point increase in the Democrats' share.</span><sup class="reference" data-dcnode-id="5920" id="cite_ref-PewSurvey_2020_105-0"><a data-dcnode-id="5921" href="#cite_note-PewSurvey_2020-105"><span data-dcnode-id="5922" instrument_node="">[105]</span></a></sup></div></div><div class="tsingle" data-dcnode-id="5905" style="width:213px;max-width:213px"><div class="thumbimage" data-dcnode-id="5915" style="height:118px;overflow:hidden"><a class="image" data-dcnode-id="5916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg"><img alt="" data-dcnode-id="5917" data-file-height="675" data-file-width="1200" decoding="async" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/65/2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg/211px-2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/65/2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg/317px-2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/65/2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg/422px-2021_Survey_on_existence_of_global_warming_and_responsibility_for_climate_change_-_bar_chart.svg.png 2x" width="211"></a></div><div class="thumbcaption" data-dcnode-id="5906"><span data-dcnode-id="5914" instrument_node="">The sharp divide over the existence of and responsibility for global warming and climate change falls largely along political lines.</span><sup class="reference" data-dcnode-id="5911" id="cite_ref-Guardian_20211026_106-0"><a data-dcnode-id="5912" href="#cite_note-Guardian_20211026-106"><span data-dcnode-id="5913" instrument_node="">[106]</span></a></sup><span data-dcnode-id="5910" instrument_node=""> Overall, 60% of Americans surveyed said oil and gas companies were "completely or mostly responsible" for climate change.</span><sup class="reference" data-dcnode-id="5907" id="cite_ref-Guardian_20211026_106-1"><a data-dcnode-id="5908" href="#cite_note-Guardian_20211026-106"><span data-dcnode-id="5909" instrument_node="">[106]</span></a></sup></div></div><div class="tsingle" data-dcnode-id="5892" style="width:192px;max-width:192px"><div class="thumbimage" data-dcnode-id="5902" style="height:118px;overflow:hidden"><a class="image" data-dcnode-id="5903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg"><img alt="" data-dcnode-id="5904" data-file-height="750" data-file-width="1200" decoding="async" height="119" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg/190px-20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg/285px-20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg/380px-20220301_Opinions_by_political_party_-_Climate_change_causation_-_Action_for_carbon_neutral_2050_-_Pew_Research.svg.png 2x" width="190"></a></div><div class="thumbcaption" data-dcnode-id="5893"><span data-dcnode-id="5901" instrument_node="">Opinion about human causation of climate change increased substantially with education among Democrats, but not among Republicans.</span><sup class="reference" data-dcnode-id="5898" id="cite_ref-Pew_20220301_107-0"><a data-dcnode-id="5899" href="#cite_note-Pew_20220301-107"><span data-dcnode-id="5900" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5897" instrument_node=""> Conversely, opinions favoring becoming carbon neutral declined substantially with age among Republicans, but not among Democrats.</span><sup class="reference" data-dcnode-id="5894" id="cite_ref-Pew_20220301_107-1"><a data-dcnode-id="5895" href="#cite_note-Pew_20220301-107"><span data-dcnode-id="5896" instrument_node="">[107]</span></a></sup></div></div></div></div></div><span data-dcnode-id="5888" instrument_node="">
</span><p data-dcnode-id="5858"><span data-dcnode-id="5887" instrument_node="">In the United States, support for environmental protection was relatively </span><a class="mw-redirect" data-dcnode-id="5885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-partisan" title="Non-partisan"><span data-dcnode-id="5886" instrument_node="">non-partisan</span></a><span data-dcnode-id="5884" instrument_node=""> in the twentieth century. Republican </span><a data-dcnode-id="5882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Theodore_Roosevelt" title="Theodore Roosevelt"><span data-dcnode-id="5883" instrument_node="">Theodore Roosevelt</span></a><span data-dcnode-id="5881" instrument_node=""> established national parks whereas Democrat </span><a class="mw-redirect" data-dcnode-id="5879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_Delano_Roosevelt" title="Franklin Delano Roosevelt"><span data-dcnode-id="5880" instrument_node="">Franklin Delano Roosevelt</span></a><span data-dcnode-id="5878" instrument_node=""> established the </span><a class="mw-redirect" data-dcnode-id="5876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soil_Conservation_Service" title="Soil Conservation Service"><span data-dcnode-id="5877" instrument_node="">Soil Conservation Service</span></a><span data-dcnode-id="5875" instrument_node="">. Republican </span><a data-dcnode-id="5873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="5874" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="5872" instrument_node=""> was instrumental in founding the </span><a data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Environmental_Protection_Agency" title="United States Environmental Protection Agency"><span data-dcnode-id="5871" instrument_node="">United States Environmental Protection Agency</span></a><span data-dcnode-id="5869" instrument_node="">, and tried to install a third pillar of </span><a data-dcnode-id="5867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="5868" instrument_node="">NATO</span></a><span data-dcnode-id="5866" instrument_node=""> dealing with environmental challenges such as acid rain and the greenhouse effect. </span><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daniel_Patrick_Moynihan" title="Daniel Patrick Moynihan"><span data-dcnode-id="5865" instrument_node="">Daniel Patrick Moynihan</span></a><span data-dcnode-id="5863" instrument_node=""> was Nixon's NATO delegate for the topic.</span><sup class="reference" data-dcnode-id="5860" id="cite_ref-Hüne_108-0"><a data-dcnode-id="5861" href="#cite_note-H%C3%BCne-108"><span data-dcnode-id="5862" instrument_node="">[108]</span></a></sup><span data-dcnode-id="5859" instrument_node="">
</span></p><p data-dcnode-id="5843"><span data-dcnode-id="5857" instrument_node="">This non-partisanship began to erode during the 1980s, when the </span><a class="mw-redirect" data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reagan_administration" title="Reagan administration"><span data-dcnode-id="5856" instrument_node="">Reagan administration</span></a><span data-dcnode-id="5854" instrument_node=""> described environmental protection as an economic burden. Views over global warming began to seriously diverge between Democrats and Republicans during the negotiations that led up to the creation of the </span><a data-dcnode-id="5852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kyoto_Protocol" title="Kyoto Protocol"><span data-dcnode-id="5853" instrument_node="">Kyoto Protocol</span></a><span data-dcnode-id="5851" instrument_node=""> in 1998. In a 2008 Gallup poll of the American public, 76% of Democrats and only 41% of Republicans said that they believed global warming was already happening. The opinions of the </span><a class="mw-redirect" data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_elite" title="Political elite"><span data-dcnode-id="5850" instrument_node="">political elites</span></a><span data-dcnode-id="5848" instrument_node="">, such as members of Congress, tends to be even more polarized.</span><sup class="reference" data-dcnode-id="5845" id="cite_ref-Dunlap2008RepublicanDemocraticGap_109-0"><a data-dcnode-id="5846" href="#cite_note-Dunlap2008RepublicanDemocraticGap-109"><span data-dcnode-id="5847" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5844" instrument_node="">
</span></p><p data-dcnode-id="5828"><span data-dcnode-id="5842" instrument_node="">From 2017 to March 2021, the </span><a data-dcnode-id="5840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yale_Program_on_Climate_Change_Communication" title="Yale Program on Climate Change Communication"><span data-dcnode-id="5841" instrument_node="">Yale Program on Climate Change Communication</span></a><span data-dcnode-id="5839" instrument_node=""> and the </span><a class="new" data-dcnode-id="5837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DGeorge_Mason_University_Center_for_Climate_Change_Communication%26action%3Dedit%26redlink%3D1" title="George Mason University Center for Climate Change Communication (page does not exist)"><span data-dcnode-id="5838" instrument_node="">George Mason University Center for Climate Change Communication</span></a><span data-dcnode-id="5836" instrument_node=""> conducted the </span><a class="new" data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DClimate_Change_in_the_American_Mind%26action%3Dedit%26redlink%3D1" title="Climate Change in the American Mind (page does not exist)"><span data-dcnode-id="5835" instrument_node="">Climate Change in the American Mind</span></a><span data-dcnode-id="5833" instrument_node=""> survey—a "nationally-representative survey of public opinion on climate change in the United States".</span><sup class="reference" data-dcnode-id="5830" id="cite_ref-YaleCCC_20210727_110-0"><a data-dcnode-id="5831" href="#cite_note-YaleCCC_20210727-110"><span data-dcnode-id="5832" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5829" instrument_node="">
</span></p><p data-dcnode-id="5803"><span data-dcnode-id="5827" instrument_node="">Since 2007</span><sup class="reference" data-dcnode-id="5824" id="cite_ref-YaleCCC_Leiserowitz_2007_111-0"><a data-dcnode-id="5825" href="#cite_note-YaleCCC_Leiserowitz_2007-111"><span data-dcnode-id="5826" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="5821" id="cite_ref-YaleCCC_Leiserowitz_2008_112-0"><a data-dcnode-id="5822" href="#cite_note-YaleCCC_Leiserowitz_2008-112"><span data-dcnode-id="5823" instrument_node="">[112]</span></a></sup><span data-dcnode-id="5820" instrument_node=""> and continuing into 2021,</span><sup class="reference" data-dcnode-id="5817" id="cite_ref-YaleCCC_20210727_110-1"><a data-dcnode-id="5818" href="#cite_note-YaleCCC_20210727-110"><span data-dcnode-id="5819" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5816" instrument_node=""> Yale University researchers have been analysing public opinion on climate change using a six-group framework, called the Six Americas, to describe and quantify positions people hold in terms of "levels of engagement and concern and awareness" of an issue. Their 139-page 2009 report, "Global Warming's Six Americas: An Audience Segmentation", they identified six audiences with different opinions about global warming: The alarmed (18%), the concerned (33%), the cautious (19%), the disengaged (12%), the doubtful (11%) and the dismissive (7%). The alarmed and concerned make out the largest percentage and think something should be done about global warming. The cautious, disengaged and doubtful are less likely to take action. The dismissive are convinced global warming is not happening. These audiences can be used to define the best approaches for environmental action.</span><sup class="reference" data-dcnode-id="5813" id="cite_ref-YaleCCC_2009_113-0"><a data-dcnode-id="5814" href="#cite_note-YaleCCC_2009-113"><span data-dcnode-id="5815" instrument_node="">[113]</span></a></sup><span data-dcnode-id="5812" instrument_node=""> In 2011, they conducted a similar study on India which resulted in the report—"Global Warming's Six Indias".</span><sup class="reference" data-dcnode-id="5809" id="cite_ref-YaleCCC_Leiserowitz_India_2011_97-1"><a data-dcnode-id="5810" href="#cite_note-YaleCCC_Leiserowitz_India_2011-97"><span data-dcnode-id="5811" instrument_node="">[97]</span></a></sup><span data-dcnode-id="5808" instrument_node=""> According to the report on the 2017-2021 Climate Change in the American Mind survey, the percentages had changed—the "Alarmed" increasing to 24% of the population, the "Concerned" to 30%, "Cautious" remained the same at 19%, "Disengaged" decreased to 5%, the "Doubtful" increased to 15%, and the "Dismissive" increased to 10%.</span><sup class="reference" data-dcnode-id="5805" id="cite_ref-YaleCCC_20210727_110-2"><a data-dcnode-id="5806" href="#cite_note-YaleCCC_20210727-110"><span data-dcnode-id="5807" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5804" instrument_node="">
</span></p><p data-dcnode-id="5783"><span data-dcnode-id="5802" instrument_node="">An April 18, 2012 article in </span><i data-dcnode-id="5799"><a data-dcnode-id="5800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="5801" instrument_node="">The New York Times</span></a></i><span data-dcnode-id="5798" instrument_node=""> cited the results of the 2011 poll, commissioned by Anthony Leiserowitz and his colleagues at Yale and George Mason universities.</span><sup class="reference" data-dcnode-id="5795" id="cite_ref-NYT_Gillis_20120418_114-0"><a data-dcnode-id="5796" href="#cite_note-NYT_Gillis_20120418-114"><span data-dcnode-id="5797" instrument_node="">[114]</span></a></sup><sup class="reference" data-dcnode-id="5792" id="cite_ref-Yale_2011_poll_115-0"><a data-dcnode-id="5793" href="#cite_note-Yale_2011_poll-115"><span data-dcnode-id="5794" instrument_node="">[115]</span></a></sup><span data-dcnode-id="5791" instrument_node=""> The </span><i data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Times</span></i><span data-dcnode-id="5788" instrument_node=""> said that, as one striking result in their poll was that 35% of the American public had said they had been "affected by extreme weather" in 2011—there was a string of natural disasters in the United States in 2011, which included "droughts, floods, tornadoes and heat waves" affecting almost every region in the country.</span><sup class="reference" data-dcnode-id="5785" id="cite_ref-NYT_Gillis_20120418_114-1"><a data-dcnode-id="5786" href="#cite_note-NYT_Gillis_20120418-114"><span data-dcnode-id="5787" instrument_node="">[114]</span></a></sup><span data-dcnode-id="5784" instrument_node="">
</span></p><p data-dcnode-id="5770"><span data-dcnode-id="5782" instrument_node="">One April 2012 </span><i data-dcnode-id="5779"><a data-dcnode-id="5780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanford_Social_Innovation_Review" title="Stanford Social Innovation Review"><span data-dcnode-id="5781" instrument_node="">Stanford Social Innovation Review</span></a></i><span data-dcnode-id="5778" instrument_node=""> article said that public opinion in the United States varies intensely enough to be considered a </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Culture_war" title="Culture war"><span data-dcnode-id="5777" instrument_node="">culture war</span></a><span data-dcnode-id="5775" instrument_node="">.</span><sup class="reference" data-dcnode-id="5772" id="cite_ref-116"><a data-dcnode-id="5773" href="#cite_note-116"><span data-dcnode-id="5774" instrument_node="">[116]</span></a></sup><span data-dcnode-id="5771" instrument_node="">
</span></p><p data-dcnode-id="5764"><span data-dcnode-id="5769" instrument_node="">In a January 2013 survey, Pew found that 69% of Americans say there is solid evidence that the Earth's average temperature has gotten warmer over the past few decades, up six points since November 2011 and 12 points since 2009.</span><sup class="reference" data-dcnode-id="5766" id="cite_ref-117"><a data-dcnode-id="5767" href="#cite_note-117"><span data-dcnode-id="5768" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5765" instrument_node="">
</span></p><p data-dcnode-id="5758"><span data-dcnode-id="5763" instrument_node="">A Gallup poll in 2014 concluded that 51% of Americans were a little or not at all worried about climate change, 24% a great deal and 25% were worried a fair amount.</span><sup class="reference" data-dcnode-id="5760" id="cite_ref-Riffkin_118-0"><a data-dcnode-id="5761" href="#cite_note-Riffkin-118"><span data-dcnode-id="5762" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5759" instrument_node="">
</span></p><p data-dcnode-id="5742"><span data-dcnode-id="5757" instrument_node="">The Yale Program on Climate Change Communication reported that 32% of Americans in 2015 were worried about global warming as a great deal. Those numbers rose to 37% in 2016, and 45% in 2017. A poll taken in 2016 shows that 52% of Americans believe climate change to be </span><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Causes_of_global_warming" title="Causes of global warming"><span data-dcnode-id="5756" instrument_node="">caused by human activity</span></a><span data-dcnode-id="5754" instrument_node="">, while 34% state it is caused by natural changes.</span><sup class="reference" data-dcnode-id="5751" id="cite_ref-119"><a data-dcnode-id="5752" href="#cite_note-119"><span data-dcnode-id="5753" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5750" instrument_node=""> 
A Gallup poll showed that 62% of Americans believe that the </span><a class="mw-redirect" data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Effects_of_global_warming" title="Effects of global warming"><span data-dcnode-id="5749" instrument_node="">effects of global warming</span></a><span data-dcnode-id="5747" instrument_node=""> were happening in 2017.</span><sup class="reference" data-dcnode-id="5744" id="cite_ref-120"><a data-dcnode-id="5745" href="#cite_note-120"><span data-dcnode-id="5746" instrument_node="">[120]</span></a></sup><span data-dcnode-id="5743" instrument_node="">
</span></p><p data-dcnode-id="5736"><span data-dcnode-id="5741" instrument_node="">A 2016 Gallup poll found that 64% of Americans were worried about global warming, that 59% believed that global warming was already happening, and 65% were convinced that global warming was caused by human activities. These numbers show that awareness of global warming was increasing in the United States.</span><sup class="reference" data-dcnode-id="5738" id="cite_ref-121"><a data-dcnode-id="5739" href="#cite_note-121"><span data-dcnode-id="5740" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5737" instrument_node="">
</span></p><p data-dcnode-id="5730"><span data-dcnode-id="5735" instrument_node="">In 2019, Gallup poll found that one-third of Americans blame unusual winter temperatures on climate change.</span><sup class="reference" data-dcnode-id="5732" id="cite_ref-122"><a data-dcnode-id="5733" href="#cite_note-122"><span data-dcnode-id="5734" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5731" instrument_node="">
</span></p><p data-dcnode-id="5724"><span data-dcnode-id="5729" instrument_node="">In 2019, the Yale Program on Climate Change Communication found that 69% of Americans believe that climate change is happening. However, Americans underestimate the number of fellow Americans who believe that global warming is taking place. Americans estimated that only 54% of Americans believed that climate change is happening, when the number was much higher.</span><sup class="reference" data-dcnode-id="5726" id="cite_ref-123"><a data-dcnode-id="5727" href="#cite_note-123"><span data-dcnode-id="5728" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5725" instrument_node="">
</span></p><p data-dcnode-id="5712"><span data-dcnode-id="5723" instrument_node="">A survey conducted in 2021 by the </span><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yale_Program_on_Climate_Change_Communication" title="Yale Program on Climate Change Communication"><span data-dcnode-id="5722" instrument_node="">Yale Program on Climate Change Communication</span></a><span data-dcnode-id="5720" instrument_node=""> and the </span><a data-dcnode-id="5718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Mason_University" title="George Mason University"><span data-dcnode-id="5719" instrument_node="">George Mason University</span></a><span data-dcnode-id="5717" instrument_node=""> Center for Climate Change Communication indicated that Americans are "alarmed" (33%), "concerned" (25%), "cautious" (17%), "disengaged" (5%), "doubtful" (10%), and "dismissive" (9%) about climate change.</span><sup class="reference" data-dcnode-id="5714" id="cite_ref-YaleGMU_20220112_124-0"><a data-dcnode-id="5715" href="#cite_note-YaleGMU_20220112-124"><span data-dcnode-id="5716" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5713" instrument_node="">
</span></p><span data-dcnode-id="5711" instrument_node="">
</span><h4 data-dcnode-id="5701"><span class="mw-headline" data-dcnode-id="5709" id="Differences_between_regions"><span data-dcnode-id="5710" instrument_node="">Differences between regions</span></span><span class="mw-editsection" data-dcnode-id="5702"><span class="mw-editsection-bracket" data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">[</span></span><a data-dcnode-id="5705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D32" title="Edit section: Differences between regions"><span data-dcnode-id="5706" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">]</span></span></span></h4><span data-dcnode-id="5700" instrument_node="">
</span><p data-dcnode-id="5667"><span data-dcnode-id="5699" instrument_node="">While climate change affects the entire planet, opinions about these affects vary significantly among regions of the world. The Middle East has one of the lowest rates of concern in the world, especially compared to Latin America.</span><sup class="reference" data-dcnode-id="5696" id="cite_ref-:0_87-10"><a data-dcnode-id="5697" href="#cite_note-:0-87"><span data-dcnode-id="5698" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5695" instrument_node=""> Europe and Africa have mixed views on climate change but lean towards action by a significant degree. Europeans focus substantially on climate change in comparison to United States residents, who are less concerned than the global median,</span><sup class="reference" data-dcnode-id="5692" id="cite_ref-:7_104-2"><a data-dcnode-id="5693" href="#cite_note-:7-104"><span data-dcnode-id="5694" instrument_node="">[104]</span></a></sup><span data-dcnode-id="5691" instrument_node=""> even as the United States remains the second biggest emitter in the world.</span><sup class="reference" data-dcnode-id="5688" id="cite_ref-:2_95-4"><a data-dcnode-id="5689" href="#cite_note-:2-95"><span data-dcnode-id="5690" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5687" instrument_node=""> Droughts/water shortages are one of the biggest fears experienced about the impacts of climate change, especially in Latin America and Africa.</span><sup class="reference" data-dcnode-id="5684" id="cite_ref-:0_87-11"><a data-dcnode-id="5685" href="#cite_note-:0-87"><span data-dcnode-id="5686" instrument_node="">[87]</span></a></sup><span data-dcnode-id="5683" instrument_node=""> Developed countries in Asia have levels of concern about climate change similar to Latin America, which has one of the highest rates of concern. This is surprising as developing countries in Asia have levels of worry similar to the Middle East, one of the areas with the lowest levels.</span><sup class="reference" data-dcnode-id="5680" id="cite_ref-:1_89-2"><a data-dcnode-id="5681" href="#cite_note-:1-89"><span data-dcnode-id="5682" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5679" instrument_node=""> Large emitters such as China usually ignore issues surrounding climate change as people in China have very low levels of concern about it.</span><sup class="reference" data-dcnode-id="5676" id="cite_ref-:1_89-3"><a data-dcnode-id="5677" href="#cite_note-:1-89"><span data-dcnode-id="5678" instrument_node="">[89]</span></a></sup><span data-dcnode-id="5675" instrument_node=""> The only significant exceptions to this tendency by large emitters are Brazil and India. India is the third-biggest while Brazil is the eleventh-biggest emitter in the world; both have high levels of concern about climate change, similar to much of Latin America.</span><sup class="reference" data-dcnode-id="5672" id="cite_ref-:0_87-12"><a data-dcnode-id="5673" href="#cite_note-:0-87"><span data-dcnode-id="5674" instrument_node="">[87]</span></a></sup><sup class="reference" data-dcnode-id="5669" id="cite_ref-:2_95-5"><a data-dcnode-id="5670" href="#cite_note-:2-95"><span data-dcnode-id="5671" instrument_node="">[95]</span></a></sup><span data-dcnode-id="5668" instrument_node="">
</span></p><span data-dcnode-id="5666" instrument_node="">
</span><h3 data-dcnode-id="5656"><span class="mw-headline" data-dcnode-id="5664" id="Developing_countries_vs_developed_countries"><span data-dcnode-id="5665" instrument_node="">Developing countries vs developed countries</span></span><span class="mw-editsection" data-dcnode-id="5657"><span class="mw-editsection-bracket" data-dcnode-id="5662"><span data-dcnode-id="5663" instrument_node="">[</span></span><a data-dcnode-id="5660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D33" title="Edit section: Developing countries vs developed countries"><span data-dcnode-id="5661" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5655" instrument_node="">
</span><p data-dcnode-id="5612"><a data-dcnode-id="5653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change_education" title="Climate change education"><span data-dcnode-id="5654" instrument_node="">Awareness about climate change</span></a><span data-dcnode-id="5652" instrument_node=""> is higher in developed countries than in developing countries.</span><sup class="reference" data-dcnode-id="5649" id="cite_ref-:8_125-0"><a data-dcnode-id="5650" href="#cite_note-:8-125"><span data-dcnode-id="5651" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5648" instrument_node=""> A large majority of people in Indonesia, Pakistan and Nigeria do not know about climate change, particularly in Muslim-majority countries.</span><sup class="reference" data-dcnode-id="5645" id="cite_ref-:8_125-1"><a data-dcnode-id="5646" href="#cite_note-:8-125"><span data-dcnode-id="5647" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5644" instrument_node=""> There is often awareness about environmental changes in developing countries, but the framework for understanding it is limited. In both developing and developed countries, people similarly believe that poor countries have a responsibility to act on climate change.</span><sup class="reference" data-dcnode-id="5641" id="cite_ref-:8_125-2"><a data-dcnode-id="5642" href="#cite_note-:8-125"><span data-dcnode-id="5643" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5640" instrument_node=""> Since the </span><a class="mw-redirect" data-dcnode-id="5638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Copenhagen_summit" title="Copenhagen summit"><span data-dcnode-id="5639" instrument_node="">2009 Copenhagen summit</span></a><span data-dcnode-id="5637" instrument_node="">, concern over climate change in wealthy countries has diminished. In 2009, 63% of people in </span><a data-dcnode-id="5635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OECD" title="OECD"><span data-dcnode-id="5636" instrument_node="">OECD</span></a><span data-dcnode-id="5634" instrument_node=""> member states considered climate change to be "very serious", but by 2015, only 48% did.</span><sup class="reference" data-dcnode-id="5631" id="cite_ref-:9_126-0"><a data-dcnode-id="5632" href="#cite_note-:9-126"><span data-dcnode-id="5633" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5630" instrument_node=""> Support for national leadership addressing climate change has also diminished. Of the 21 countries surveyed in </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GlobeScan" title="GlobeScan"><span data-dcnode-id="5629" instrument_node="">GlobeScan</span></a><span data-dcnode-id="5627" instrument_node="">'s 2015 survey, Canada, France, Spain and the UK are the only ones with a majority of the population supporting further action by their leaders to meet </span><a data-dcnode-id="5625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Agreement" title="Paris Agreement"><span data-dcnode-id="5626" instrument_node="">Paris climate accord</span></a><span data-dcnode-id="5624" instrument_node=""> emission targets.</span><sup class="reference" data-dcnode-id="5621" id="cite_ref-:9_126-1"><a data-dcnode-id="5622" href="#cite_note-:9-126"><span data-dcnode-id="5623" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5620" instrument_node=""> While concern and desire for action has dropped in developed countries, awareness is higher; since 2000, twice as many people connect </span><a class="mw-redirect" data-dcnode-id="5618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_weather_events" title="Extreme weather events"><span data-dcnode-id="5619" instrument_node="">extreme weather events</span></a><span data-dcnode-id="5617" instrument_node=""> to human-caused climate change.</span><sup class="reference" data-dcnode-id="5614" id="cite_ref-:9_126-2"><a data-dcnode-id="5615" href="#cite_note-:9-126"><span data-dcnode-id="5616" instrument_node="">[126]</span></a></sup><span data-dcnode-id="5613" instrument_node="">
</span></p><span data-dcnode-id="5611" instrument_node="">
</span><h2 data-dcnode-id="5601"><span class="mw-headline" data-dcnode-id="5609" id="See_also"><span data-dcnode-id="5610" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="5602"><span class="mw-editsection-bracket" data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">[</span></span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DPublic_opinion_on_climate_change%26action%3Dedit%26section%3D34" title="Edit section: See also"><span data-dcnode-id="5606" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5600" instrument_node="">

nt_node="">

</span><li data-dcnode-id="5366" id="cite_note-UNDP_20210126-6"><span class="mw-cite-backlink" data-dcnode-id="5401"><b data-dcnode-id="5402"><a aria-label="Jump up" data-dcnode-id="5403" href="#cite_ref-UNDP_20210126_6-0" title="Jump up"><span data-dcnode-id="5404" instrument_node="">^</span></a></b></span><span data-dcnode-id="5400" instrument_node=""> </span><span class="reference-text" data-dcnode-id="5368"><link data-dcnode-id="5399" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="5373"><a class="external text" data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.undp.org/content/undp/en/home/librarypage/climate-and-disaster-resilience-/The-Peoples-Climate-Vote-Results.html" rel="nofollow"><span data-dcnode-id="5398" instrument_node="">"The Peoples' Climate Vote"</span></a><span data-dcnode-id="5396" instrument_node="">. </span><i data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">UNDP.org</span></i><span data-dcnode-id="5393" instrument_node="">. United Nations Development Programme. 26 January 2021. </span><a class="external text" data-dcnode-id="5391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20210128091326/https%3A//www.undp.org/content/undp/en/home/librarypage/climate-and-disaster-resilience-/The-Peoples-Climate-Vote-Results.html" rel="nofollow"><span data-dcnode-id="5392" instrument_node="">Archived</span></a><span data-dcnode-id="5390" instrument_node=""> from the original on 28 January 2021. </span><q data-dcnode-id="5374"><span data-dcnode-id="5389" instrument_node="">64% of people said that climate change was an emergency – presenting a clear and convincing call for decision-makers to step up on ambition. </span><br data-dcnode-id="5388"><span data-dcnode-id="5387" instrument_node="">- The highest level of support was in SIDS (Small Island Developing States, 74%), followed by high-income countries (72%), middle-income countries (62%), then LDCs (Least Developed Countries, 58%). </span><br data-dcnode-id="5386"><span data-dcnode-id="5385" instrument_node="">- Regionally, the proportion of people who said climate change is a global emergency had a high level of support everywhere - in Western Europe and North America (72%), Eastern Europe and Central Asia (65%), Arab States (64%), Latin America and Caribbean (63%), Asia and Pacific (63%), and Sub-Saharan Africa (61%). </span><br data-dcnode-id="5384"><span data-dcnode-id="5383" instrument_node="">- Four climate policies emerged as the most popular globally: </span><br data-dcnode-id="5382"><span data-dcnode-id="5381" instrument_node="">1. Conservation of forests and land (54% public support); </span><br data-dcnode-id="5380"><span data-dcnode-id="5379" instrument_node="">2. Solar, wind and renewable power (53%); </span><br data-dcnode-id="5378"><span data-dcnode-id="5377" instrument_node="">3. Climate-friendly farming techniques (52%); and </span><br data-dcnode-id="5376"><span data-dcnode-id="5375" instrument_node="">4. Investing more in green businesses and jobs (50%).</span></q></cite><span class="Z3988" data-dcnode-id="5372" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=UNDP.org&amp;rft.atitle=The+Peoples%27+Climate+Vote&amp;rft.date=2021-01-26&amp;rft_id=https%3A%2F%2Fwww.undp.org%2Fcontent%2Fundp%2Fen%2Fhome%2Flibrarypage%2Fclimate-and-disaster-resilience-%2FThe-Peoples-Climate-Vote-Results.html&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3APublic+opinion+on+climate+change"></span><span data-dcnode-id="5371" instrument_node=""> </span><br data-dcnode-id="5370"><span data-dcnode-id="5369" instrument_node="">(Page has download link to 68-page PDF.)</span></span><span data-dcnode-id="5367" instrument_node="">
