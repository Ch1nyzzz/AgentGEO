</span><span class="date date--block" data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">16 Dec. 2021</span></span><span data-dcnode-id="1361" instrument_node="">
</span><span class="teaser-txt" data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">It is fair to say that our relationship with technology is complicated. Just look at headline topics like renewable energy or Artificial Intelligence (AI), or consider pharmaceuticals, automotive, consumer electronics, social media and biotechnology. On the topic of any of these technologies, you’ll almost certainly hear a cacophony of voices that range from promising a new era of happiness to predicting the doom of humanity. How can we make sense of these confusing perspectives, and how can we maximise the benefits of emerging and potentially disruptive technologies while effectively minimising their risks?</span></span><span data-dcnode-id="1358" instrument_node="">
</span></li><span data-dcnode-id="1356" instrument_node="">
</span></ul><span data-dcnode-id="1354" instrument_node="">

</span><span class="teaser-txt" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">One can argue that the nature of international security and conflicts remains the same. States are—as always—embroiled in zero-sum military and economic competitions, armed conflicts still seem inevitable, security dilemmas and balancing take place unremittingly, and so on and so forth. However, the modus operandi is no longer the same. Conflicts are fought in new, innovative, and radically different ways. With the advent of modern hybrid warfare, they are less and less about lethal or kinetic force.</span></span><span data-dcnode-id="1327" instrument_node="">
