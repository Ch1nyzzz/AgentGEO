 502 comments, click to go to the comment section." class="article-comment-count" data-dcnode-id="5312" data-o-comments-article-id="426889a6-4fe9-4897-b923-6b3f546c5878" data-o-comments-article-url="https://www.ft.com/content/426889a6-4fe9-4897-b923-6b3f546c5878" data-o-comments-count="true" data-o-comments-title="Nato stands ready for conflict in Europe, says alliance chief" data-o-component="o-comments" href="#comments-anchor" id="o-comments-count" style="visibility: visible;" title="Jump to comments section"><span data-dcnode-id="5313" instrument_node="">502</span></a><a class="article-print" data-component="print-button" data-dcnode-id="5309" data-trackable="print" href="javascript:void(0)" title="Print this page"><span class="o-normalise-visually-hidden" data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">Print this page</span></span></a></div><div class="article__content-sign-up" data-dcnode-id="5294"><div class="article__content-sign-up-topic-title" data-dcnode-id="5306"><span data-dcnode-id="5307" instrument_node="">Receive free War in Ukraine updates</span></div><p class="article__content-sign-up-topic-description" data-dcnode-id="5296"><span data-dcnode-id="5297"><span data-dcnode-id="5305" instrument_node="">We’ll send you a </span><i data-dcnode-id="5303"><span data-dcnode-id="5304" instrument_node="">myFT Daily Digest</span></i><span data-dcnode-id="5302" instrument_node=""> email rounding up the latest </span><span data-dcnode-id="5300" instrument_node="">War in Ukraine</span><span data-dcnode-id="5298" instrument_node=""> news every morning.</span></span></p><iframe class="article__content-sign-up-iframe close" data-dcnode-id="5295" height="64px" id="signUpIframe" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/register/in-article-sign-up%3Fft-content-uuid%3D426889a6-4fe9-4897-b923-6b3f546c5878%26concept-id%3D8b9c78a1-2a6d-4e2f-9293-49f399f4f6ce&amp;raw"></iframe></div><div class="article__content-body n-content-body js-article__content-body" data-dcnode-id="5180"><div class="article__content-body n-content-body js-article__content-body" data-attribute="article-content-body" data-dcnode-id="5181"><span data-dcnode-id="5293" instrument_node="">
</span><p data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">Nato has warned Moscow to abandon its belligerent foreign policy and co-operate with the west or face a military alliance steeled for conflict on the eve of a week of intense diplomacy aimed at averting a Russian assault on Ukraine.</span></p><p data-dcnode-id="5286"><span data-dcnode-id="5290" instrument_node="">Jens Stoltenberg, Nato secretary-general, said the US-led defence pact was prepared for “a new armed conflict in Europe” should negotiations fail, as western officials </span><a data-dcnode-id="5288" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/a1311bb7-7083-4491-89d7-2912289ebe68"><span data-dcnode-id="5289" instrument_node="">readied for potential discussions</span></a><span data-dcnode-id="5287" instrument_node=""> with Moscow on reducing the size of military exercises, arms control and a pledge not to deploy US missiles in Ukraine.</span></p><p data-dcnode-id="5284"><span data-dcnode-id="5285" instrument_node="">“I am aware of Russia’s history. For centuries they have experienced conflict with neighbours,” he told the Financial Times. “[But] Russia has an alternative: to co-operate, to work with Nato.”</span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="5281" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu" data-o-ads-targeting="pos=mid;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="5282" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="5283"></div></div></div><p data-dcnode-id="5276"><span data-dcnode-id="5280" instrument_node="">Russia has deployed about 100,000 troops at locations close to its border with Ukraine in recent months, sparking fears that it is planning a </span><a data-dcnode-id="5278" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/09eedfc1-d111-40cb-a8f7-053cf03fa34a"><span data-dcnode-id="5279" instrument_node="">fresh attack</span></a><span data-dcnode-id="5277" instrument_node=""> on a country it invaded in 2014, with the annexation of Crimea. </span></p><p data-dcnode-id="5271"><span data-dcnode-id="5275" instrument_node="">President Vladimir Putin has denied any plan to invade. But he has warned of possible military action if the US and Nato ignored </span><a data-dcnode-id="5273" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/493da5ea-6ef2-42cc-8be1-c725030cf839"><span data-dcnode-id="5274" instrument_node="">Moscow’s demands</span></a><span data-dcnode-id="5272" instrument_node=""> for defence agreements that would severely reduce US and Nato capabilities in Europe. Russia claims those capabilities are a threat to its borders.</span></p><p data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">“It is possible to find together a path, a political way forward, and also to address Russia’s concerns . . . But there continues to be a risk of conflict,” Stoltenberg said in an interview. “Nato’s deterrence is credible and strong . . . We have to hope and work hard for the best, but be prepared for the worst.”</span></p><span data-dcnode-id="5268" instrument_node="">
</span><aside class="n-content-recommended--single-story" data-dcnode-id="5248"><span data-dcnode-id="5267" instrument_node="">
</span><h2 class="n-content-recommended__title" data-dcnode-id="5265"><span data-dcnode-id="5266" instrument_node="">Recommended</span></h2><span data-dcnode-id="5264" instrument_node="">
</span><div class="o-teaser o-teaser--article o-teaser--small o-teaser--stacked o-teaser--has-image o-teaser--opinion js-teaser" data-dcnode-id="5250" data-id="e237d369-46c8-4511-9484-b13efca22039"><div class="o-teaser__content" data-dcnode-id="5255"><div class="o-teaser__meta" data-dcnode-id="5259"><span class="o-teaser__tag-prefix" data-dcnode-id="5262"><span data-dcnode-id="5263" instrument_node="">The FT View</span></span><a aria-label="Category: The editorial board" class="o-teaser__tag" data-dcnode-id="5260" data-trackable="teaser-tag" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/ft-view"><span data-dcnode-id="5261" instrument_node="">The editorial board</span></a></div><div class="o-teaser__heading" data-dcnode-id="5256"><a class="js-teaser-heading-link" data-dcnode-id="5257" data-trackable="heading-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/e237d369-46c8-4511-9484-b13efca22039"><span data-dcnode-id="5258" instrument_node="">The FT View: No reward for Putin’s aggression</span></a></div></div><div class="o-teaser__image-container js-teaser-image-container" data-dcnode-id="5251"><a aria-hidden="true" data-dcnode-id="5252" data-trackable="image-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/e237d369-46c8-4511-9484-b13efca22039" tabindex="-1"><div class="o-teaser__image-placeholder" data-dcnode-id="5253" style="padding-bottom:56.2261%"><img alt="" class="o-teaser__image" data-dcnode-id="5254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/https%253A//d1e00ek4ebabms.cloudfront.net/production/3710e25b-e3ab-4cda-a046-8b9a4378e3bb.jpg%3Fsource%3Dnext%26fit%3Dscale-down%26dpr%3D2%26width%3D240&amp;raw"></div></a></div></div><span data-dcnode-id="5249" instrument_node="">
</span></aside><span data-dcnode-id="5247" instrument_node="">
</span><p data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">His warning came ahead of formal talks between Russian and US officials in Geneva on Monday, followed by a meeting of the 30-member Nato alliance and a Russian delegation on Wednesday. A third meeting hosted by the broader Organization for Security and Co-operation in Europe is set for Thursday.</span></p><p data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">On Sunday evening, Russia’s lead negotiator and deputy foreign minister Sergei Ryabkov met his US counterpart Wendy Sherman, deputy secretary of state. He said their conversation over dinner in Geneva “was difficult, but businesslike”.</span></p><p data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">“We plunged into the matter of the upcoming affairs. I think that tomorrow we will not waste time,” he said in comments reported by Russian state news agency Ria. “I never lose my optimism, I am always guided by it.”</span></p><div aria-hidden="true" class="o-ads in-article-advert advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="5238" data-o-ads-center="true" data-o-ads-formats-default="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="mpu1" data-o-ads-targeting="pos=mid1;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="5239" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="5240"></div></div></div><p data-dcnode-id="5236"><span data-dcnode-id="5237" instrument_node="">US state department spokesperson Ned Price said Sherman had “stressed the United States’ commitment to the international principles of sovereignty, territorial integrity, and the freedom of sovereign nations to choose their own alliances” and “affirmed that the United States would welcome genuine progress through diplomacy”.</span></p><p data-dcnode-id="5234"><span data-dcnode-id="5235" instrument_node="">Price added that Sherman had “underscored that discussion of certain subjects” relating to European security would be reserved for multilateral talks involving Nato this week.</span></p><p data-dcnode-id="5226"><span data-dcnode-id="5233" instrument_node="">Russia’s demands include a ban on Ukraine and other countries </span><a data-dcnode-id="5231" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/5e5e9624-b7d7-4c11-bc12-4078a6d293bb"><span data-dcnode-id="5232" instrument_node="">joining Nato</span></a><span data-dcnode-id="5230" instrument_node=""> and a Kremlin veto on alliance activities in member states that joined after the collapse of the Soviet Union. Stoltenberg said both conditions </span><a data-dcnode-id="5228" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/4fec318e-1e53-4f9a-999a-443a432dd6cd"><span data-dcnode-id="5229" instrument_node="">were unacceptable</span></a><span data-dcnode-id="5227" instrument_node=""> because they breached Nato’s “core principles” of offering membership to all and defending allies equally.</span></p><p data-dcnode-id="5224"><span data-dcnode-id="5225" instrument_node="">Instead, Stoltenberg said the US and Nato were prepared to speak with Russia about possible risk-reduction measures such as “arms control, on efforts to try to have more transparency on military activity, exercises, and also on lines of communications”.</span></p><span data-dcnode-id="5223" instrument_node="">
</span><aside class="n-content-recommended--single-story" data-dcnode-id="5203"><span data-dcnode-id="5222" instrument_node="">
</span><h2 class="n-content-recommended__title" data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">Recommended</span></h2><span data-dcnode-id="5219" instrument_node="">
</span><div class="o-teaser o-teaser--article o-teaser--small o-teaser--stacked o-teaser--has-image js-teaser" data-dcnode-id="5205" data-id="7202f007-d7b1-4830-a816-3b975d722761"><div class="o-teaser__content" data-dcnode-id="5210"><div class="o-teaser__meta" data-dcnode-id="5214"><span class="o-teaser__tag-prefix" data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">News in-depth</span></span><a aria-label="Category: War in Ukraine" class="o-teaser__tag" data-dcnode-id="5215" data-trackable="teaser-tag" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/war-in-ukraine"><span data-dcnode-id="5216" instrument_node="">War in Ukraine</span></a></div><div class="o-teaser__heading" data-dcnode-id="5211"><a class="js-teaser-heading-link" data-dcnode-id="5212" data-trackable="heading-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/7202f007-d7b1-4830-a816-3b975d722761"><span data-dcnode-id="5213" instrument_node="">Air strikes or invasion: what are Putin’s military options for Ukraine?</span></a></div></div><div class="o-teaser__image-container js-teaser-image-container" data-dcnode-id="5206"><a aria-hidden="true" data-dcnode-id="5207" data-trackable="image-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/7202f007-d7b1-4830-a816-3b975d722761" tabindex="-1"><div class="o-teaser__image-placeholder" data-dcnode-id="5208" style="padding-bottom:56.2500%"><img alt="" class="o-teaser__image" data-dcnode-id="5209" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/__origami/service/image/v2/images/raw/https%253A//d1e00ek4ebabms.cloudfront.net/production/9753a0ce-4e85-422c-9516-ace017d16056.jpg%3Fsource%3Dnext%26fit%3Dscale-down%26dpr%3D2%26width%3D240&amp;raw"></div></a></div></div><span data-dcnode-id="5204" instrument_node="">
</span></aside><span data-dcnode-id="5202" instrument_node="">
</span><p data-dcnode-id="5197"><span data-dcnode-id="5201" instrument_node="">Ruling out US missile deployments in Ukraine and discussing broader rules on missile systems in Europe were two areas where Washington saw </span><a data-dcnode-id="5199" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/a68e4627-8881-4c79-933e-2aae39123b0c"><span data-dcnode-id="5200" instrument_node="">possible scope for agreement</span></a><span data-dcnode-id="5198" instrument_node="">, a senior Biden administration official said ahead of the talks, adding that it would be dependent on whether “Russia is willing to make a reciprocal commitment”.</span></p><p data-dcnode-id="5195"><span data-dcnode-id="5196" instrument_node="">The US was also “willing to explore the possibility of reciprocal restrictions on the size and scope of [military] exercises, including both strategic bombers close to each other’s territory, and ground-based exercises as well”, the official said, adding that “no firm commitments” would be made in Geneva.</span></p><p data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Washington has firmly denied media reports that it could offer to pull back some troops stationed in eastern Europe in exchange for Russia scaling down its deployment on the Ukrainian border. Instead, officials said the US and other Nato allies were ready to increase their presence if Putin took any military action.</span></p><p data-dcnode-id="5188"><span data-dcnode-id="5192" instrument_node="">The US, EU and other western partners have warned that they will impose </span><a data-dcnode-id="5190" data-trackable="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/bdd76e87-56da-44fd-acf2-e09d76a96fc3"><span data-dcnode-id="5191" instrument_node="">financial sanctions</span></a><span data-dcnode-id="5189" instrument_node=""> on Russia in the event of military escalation. Officials said yesterday that the US was ready to “immediately impose severe and overwhelming costs on Russia’s economy”.</span></p><p data-dcnode-id="5186"><span data-dcnode-id="5187" instrument_node="">The US is also preparing potential trade curbs on Russia and has been discussing the possibility of a range of export controls with allies and partners in Europe and Asia, according to people familiar with White House thinking.</span></p><p data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">While the Kremlin has voiced hope for quick solutions from the talks, Stoltenberg said he expected it would take “a series of meetings” to find any mutually acceptable outcomes.</span></p><p data-dcnode-id="5182"><span data-dcnode-id="5183" instrument_node="">“We are ready to strive for a better relationship,” said the former Norwegian prime minister. “We have proven before that we are able to make compromises and find solutions with Russia.”</span></p></div></div><div aria-hidden="true" class="o-ads advert in-article-advert o-ads--center o-ads--label-left o-ads--empty" data-dcnode-id="5177" data-o-ads-center="true" data-o-ads-formats-extra="false" data-o-ads-formats-large="false" data-o-ads-formats-medium="MediumRectangle,Responsive,OneByOne" data-o-ads-formats-small="MediumRectangle,Responsive,OneByOne" data-o-ads-label="true" data-o-ads-loaded="false" data-o-ads-name="third-mpu" data-o-ads-targeting="pos=mid2;"><div aria-hidden="true" class="o-ads__outer" data-dcnode-id="5178" tabindex="-1"><div class="o-ads__inner" data-dcnode-id="5179"></div></div></div><div class="magnet-cta js-magnet-cta" data-dcnode-id="5174" data-trackable="magnet-cta"></div><div class="instant-alert-cta js-instant-alert-cta" data-concept-id="8b9c78a1-2a6d-4e2f-9293-49f399f4f6ce" data-dcnode-id="5165" data-trackable="instant-alert-cta"><p class="instant-alert-cta__text" data-dcnode-id="5168"><span data-dcnode-id="5173" instrument_node="">Get alerts on </span><span data-dcnode-id="51 the separate entities, i.e. Ukraine, all the “Stans” as in Kazakstans etc still
had close links to Moscow.</span><br data-dcnode-id="4742"/></p><p data-dcnode-id="4738"><span data-dcnode-id="4740" instrument_node="">We were reminded that Ukraine would develop friendly
links with EU, trading but not becoming part of EU/Nato.</span><br data-dcnode-id="4739"/></p><p data-dcnode-id="4735"><span data-dcnode-id="4737" instrument_node="">Ukrainan election took place, watched over by even EU,
when German Angela Merkel called it a fair and successful election, leading to
an ethnic Russian President no less.</span><br data-dcnode-id="4736"/></p><p data-dcnode-id="4732"><span data-dcnode-id="4734" instrument_node="">Soon thereafter a putsch was in the works, and the
Russian Prez was fleeing to Moscow.</span><br data-dcnode-id="4733"/></p><p data-dcnode-id="4729"><span data-dcnode-id="4731" instrument_node="">Think Hillary Clinton State Department, (those
warmongers).</span><br data-dcnode-id="4730"/></p><p data-dcnode-id="4726"><span data-dcnode-id="4728" instrument_node="">Moscow recorded  a phone call from US State Dept. Neocon Victoria Nuland, urging its
Ambassador Pyatt to get to work, having spent $5b on the project, we have to
get the one she called  “Yats” in the top
Job.</span><br data-dcnode-id="4727"/></p><p data-dcnode-id="4723"><span data-dcnode-id="4725" instrument_node="">A recent reminder told us that some 26m Russians were
also Ukrainians. Russian featured as a second official language.</span><br data-dcnode-id="4724"/></p><p data-dcnode-id="4720"><span data-dcnode-id="4722" instrument_node="">On taking over the top job, Boss Yatsenyuk (sic)   cancelled the status of Russian as an
official language.</span><br data-dcnode-id="4721"/></p><p data-dcnode-id="4717"><span data-dcnode-id="4719" instrument_node="">Many of the Russians who inhabited the  Ukraine/Russia borderline protested.</span><br data-dcnode-id="4718"/></p><p data-dcnode-id="4714"><span data-dcnode-id="4716" instrument_node="">Boss Yats called them “terrorists”, sent helicopter
gunships to bomb them.</span><br data-dcnode-id="4715"/></p><p data-dcnode-id="4711"><span data-dcnode-id="4713" instrument_node="">In one scene I saw on TV, some 40 Russian protesters
got locked into a building, burnt alive  when the place was set on fire.</span><br data-dcnode-id="4712"/></p><p data-dcnode-id="4708"><span data-dcnode-id="4710" instrument_node="">How long did the troubles lasted? I don’t know.</span><br data-dcnode-id="4709"/></p><p data-dcnode-id="4705"><span data-dcnode-id="4707" instrument_node="">Then Ukraine got to the Black Sea (sic) area,
threatening Russian access to the Black Sea port.</span><br data-dcnode-id="4706"/></p><p data-dcnode-id="4702"><span data-dcnode-id="4704" instrument_node=""> Putin was smart
enough to then seize Crimea.</span><br data-dcnode-id="4703"/></p><p data-dcnode-id="4699"><span data-dcnode-id="4701" instrument_node="">The West of course were mad. And Putin dared?</span><br data-dcnode-id="4700"/></p><p data-dcnode-id="4696"><span data-dcnode-id="4698" instrument_node="">Why not, Crimea’d belonged to Russia. </span><br data-dcnode-id="4697"/></p><p data-dcnode-id="4693"><span data-dcnode-id="4695" instrument_node="">In 1954, when both Russia &amp; Ukraine were part of

2733eac13578709b49e9d24 coral coral-comment-inReplyToUsername" data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">Hewer of wood</span></span></span></span></button></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 HorizontalGutter-root-42028c0a7886c844bb9f01763cc43000 HorizontalGutter-oneAndAHalf-46c5849e8e0ed7bc3ef647b349fd3f5c" data-dcnode-id="4104"><div class="HTMLContent-root-5770ce4668399900d87c06ad10ba71a5 htmlContent-root-fe3506b39eaecd1a685ceda5e1292c4d coral coral-content coral-comment-content" data-dcnode-id="4136"><div data-dcnode-id="4167"><span data-dcnode-id="4169" instrument_node="">You might be interested in listening to this recent statement by Sir Edward Leigh MP on the floor of the House of Commons:</span><br data-dcnode-id="4168"/></div><div data-dcnode-id="4165"><br data-dcnode-id="4166"/></div><div data-dcnode-id="4161"><a data-dcnode-id="4163" href="https://twitter.com/EdwardLeighMP/status/1479071907668504579?ref_src=twsrc%5Egoogle%7Ctwcamp%5Eserp%7Ctwgr%5Etweet" rel="noopener noreferrer ugc" target="_blank"><span data-dcnode-id="4164" instrument_node="">https://twitter.com/EdwardLeighMP/status/1479071907668504579?ref_src=twsrc%5Egoogle%7Ctwcamp%5Eserp%7Ctwgr%5Etweet</span></a><br data-dcnode-id="4162"/></div><div data-dcnode-id="4159"><br data-dcnode-id="4160"/></div><div data-dcnode-id="4156"><span data-dcnode-id="4158" instrument_node="">For a copy of the document Sir Edward Leigh readout on the Floor of the House, this can be accessed on line at National Security Archive at George Washington University (see link below).   You will see that on the 12 December 2017 the National Security
Archive posted online 30 declassified US,
Soviet, German, British and French documents revealing a raft of assurances
about Soviet security given by Western leaders to Gorbachev and other Soviet
officials throughout the process of German unification in 1990 and on into
1991. Some of the documents have been publicly available for several years,
others were revealed as a result of Freedom of Information requests. </span><br data-dcnode-id="4157"/></div><p data-dcnode-id="4152"><a data-dcnode-id="4154" href="https://nsarchive.gwu.edu/briefing-book/russia-programs/2017-12-12/nato-expansion-what-gorbachev-heard-western-leaders-early" rel="noopener noreferrer ugc" target="_blank"><span data-dcnode-id="4155" instrument_node="">https://nsarchive.gwu.edu/briefing-book/russia-programs/2017-12-12/nato-expansion-what-gorbachev-heard-western-leaders-early</span></a><br data-dcnode-id="4153"/></p><p data-dcnode-id="4143"><span data-dcnode-id="4151" instrument_node="">US Secretary of State James Baker’s famous “not one inch
eastward” assurance about NATO expansion in his meeting with Soviet leader
Mikhail Gorbachev on 9 February 1990 was only part of a raft of similar
assurances. The documents also show that multiple
national leaders considered and rejected Central and Eastern European
membership in NATO as of early 1990 and through 1991, and that discussions of NATO
in the context of German unification negotiations in 1990 were not at all
narrowly limited to the status of East German territory.  The Archive reveals that subsequent Russian complaints about being misled about NATO expansion are founded in written contemporaneous </span><i data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">memcons</span></i><span data-dcnode-id="4148" instrument_node=""> and </span><i data-dcnode-id="4146"><span data-dcnode-id="4147" instrument_node="">telcons.</span></i><span data-dcnode-id="4145" instrument_node=""> </span><br data-dcnode-id="4144"/></p><div data-dcnode-id="4137"><span data-dcnode-id="4142" instrument_node="">The documents reinforce former CIA Director Robert
Gates’s criticism of “</span><i data-dcnode-id="4140"><span data-dcnode-id="4141" instrument_node="">pressing ahead
with expansion of NATO eastward [in the 1990s], when Gorbachev and others were
led to believe that wouldn’t happen</span></i><span data-dcnode-id="4139" instrument_node="">”.</span><br data-dcnode-id="4138"/></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="4105"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="4113"><button aria-label="Recommend comment by Development Economics44 (Total: 3)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df coral coral-reactButton coral-comment-reactButton ReactionButton-button-f00bbe879a882dd9a0213477cbfbe691" data-dcnode-id="4128" data-testid="comment-reaction-button" data-variant="flat" type="button"><span class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd" data-dcnode-id="4129"><i aria-hidden="true" class="Icon-root-c1fc955f8607c3696518db8f02fb9080 Icon-sm-b43dbbab3c3f2b  Paris for several years, </span><br data-dcnode-id="3317"/></div><div data-dcnode-id="3313"><span data-dcnode-id="3315" instrument_node="">and with Hitler, after which the red flag was over the Reichstag. </span><br data-dcnode-id="3314"/></div><div data-dcnode-id="3310"><span data-dcnode-id="3312" instrument_node="">I note that all these people conquered the whole of Europe and were invincible until they came to Russia. </span><br data-dcnode-id="3311"/></div><div data-dcnode-id="3307"><span data-dcnode-id="3309" instrument_node="">Who's next, where we haven't unloaded our flag yet, Brussels, Washington?</span><br data-dcnode-id="3308"/></div></div><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e coral coral-comment-actionBar Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513" data-dcnode-id="3275"><div class="Box-root-acb8bd0953d79380f99868ba1e9c06f2 Flex-root-e30c492230d1edb681fe55ee4db5c12e CommentContainer-actionBar-8f945503291a6fbc016fbde66cee912e Flex-flex-d2ca733e3f89034ac350e74ab398ca2c Flex-halfItemGutter-a202fcab1dcbec6c729d74b586859a0d Flex-justifySpaceBetween-1e1ecf12d82a80d36b234d1261a4a513 Flex-alignCenter-26c1ac1572ede070f23436e4a05f81bd Flex-directionRow-2454f15d2085c2be40d132bad0acd66d gutter" data-dcnode-id="3283"><button aria-label="Recommend comment by Alexei Fedorov (Total: 2)" aria-pressed="false" class="BaseButton-root-464189d43068742128bd39653c671d89 Button-base-3818d3c9d093073437f9d4751fbaac4e Button-flat-409c47973ce75cd86d40ebe592ee565e Button-fontSizeSmall-4e1ba350ee1ef655df8ddab86350c1ee Button-textAlignCenter-73a2738f6e39888509e0aca47606b75d Button-fontFamilyPrimary-5e7cc1810b6bcde618b0fd8adb2a5c64 Button-fontWeightPrimarySemiBold-5526f4e404413a488f7dc9d46867bf11 Button-paddingSizeExtraSmall-1a4f75aa7b8e2ce3a8d168ec4e60330e Button-colorSecondary-3bc2b7c29336486a6a4c1b67d199c162 CommentContainer-actionButton-471f207edf7f9f69483a5fac1602a4df
