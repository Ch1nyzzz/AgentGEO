</span><p data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Ultimately, American power rests on the strength of the U.S. domestic economy. While a comprehensive domestic economic agenda is beyond the scope of this report, America’s long-term influence in the world will depend on prudent domestic policies and investments in the economic foundations of American power. As is recommended throughout this report, the United States should increase federal spending in basic sciences; research and development; science, technology, engineering and math education; and high-quality vocational and technical education. The federal government should also increase domestic investments in infrastructure, including both physical infrastructure, such as roads and ports, and in telecommunications infrastructure, which underpins the modern economy. U.S. leaders will also have to prepare for future financial crises and tackle head on the tax and entitlement reforms necessary to ensure that U.S. fiscal policy and debt levels remain sustainable across economic cycles. Ignoring these challenges threatens to undermine America’s position as the premier financial powerhouse in the world—a key advantage over China.
</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3212" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="3211"></p><span data-dcnode-id="3209" instrument_node="">
</span></div><span data-dcnode-id="3207" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3200"><span data-dcnode-id="3206" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3202"><span data-dcnode-id="3205" instrument_node="">
</span><a data-dcnode-id="3204" id="promote"></a><span data-dcnode-id="3203" instrument_node="">
</span></div><span data-dcnode-id="3201" instrument_node="">
</span></div><span data-dcnode-id="3199" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3157"><span data-dcnode-id="3198" instrument_node="">
</span><h3 data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Promote U.S. Trade and Investment in the Indo-Pacific</span></h3><span data-dcnode-id="3195" instrument_node="">
</span><h4 data-dcnode-id="3193"><span data-dcnode-id="3194" instrument_node="">Enhance U.S. commercial diplomacy in the Indo-Pacific at the Treasury, Commerce, and State departments</span></h4><span data-dcnode-id="3192" instrument_node="">
</span><p data-dcnode-id="3190"><span data-dcnode-id="3191" instrument_node="">The Treasury, Commerce, and State departments should significantly increase personnel and professional training for commercial diplomacy, engaging with foreign countries and companies in Washington and abroad. The Treasury Department should expand its program to place attachés in an array of additional foreign capitals and major economic centers to provide technical expertise to U.S. missions abroad and to foreign counterparts. This could include placing Treasury attachés in Shanghai, Hong Kong, Taipei, Shenzhen, Manila, and Mumbai. An expanded attaché program would significantly augment the capacity of the U.S. government for engagement with U.S. companies abroad and with regional and international economic organizations and institutions. This should be paired with a parallel expansion of Commerce personnel at U.S. missions abroad, as well as significantly expanded and more rigorous economic and financial training for all foreign service officers, including a specific hiring authority to bring greater economic expertise into the State Department.
</span></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3187"><span data-dcnode-id="3188" instrument_node="">The State Department’s policy and planning function should elevate commercial diplomacy for the department and the secretary by planning a series of public speeches, both domestically and in foreign capitals, to discuss an expanded U.S. approach. Further efforts should include increasing ambassador-level engagement in promoting U.S. commercial diplomacy and better linking priority countries for U.S. commercial diplomacy to U.S. strategic priorities in competing with China. The State Department should also station more officials in commercial diplomacy posts at consulates in foreign countries, creating better and more thorough engagement, information gathering, and communication across important capitals and business centers globally. Additionally, the State Department’s Office of the Chief Economist and Office of the Undersecretary for Management should craft a plan for professional development of existing foreign service officers in economic and financial topics, including mentorship opportunities, and should authorize accelerated hiring for midcareer economic subject matter experts into foreign service posts.
</span></p><span data-dcnode-id="3186" instrument_node="">
</span><h4 data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">Catalyze greater U.S. investment in the Indo-Pacific through the new U.S. International Development Finance Corporation, bilateral investment treaties, and the Export-Import Bank</span></h4><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3181"><span data-dcnode-id="3182" instrument_node="">The U.S. government can strengthen America’s position in Asia by bolstering U.S. overseas private investment and reestablishing the United States as a vital economic partner in the region. This should include the rapid deployment of the newly chartered U.S. International Development Finance Corporation (DFC). As a part of this, the White House should be prepared to leverage policy guidance that enables DFC lending to upper-middle-income countries that have the potential to be strategic U.S. partners and to counterbalance surges of state-led investment by China. The Office of the U.S. Trade Representative (USTR) and the State Department should also pursue bilateral investment treaties (BITs), as well as trade-in-goods and trade-in-service agreements, with potentially strategic countries including India and democratic partners in Southeast Asia. The United States should also reauthorize the Export-Import (EXIM) Bank to become a bigger and more robust export credit agency to encourage private investments in larger projects. To achieve these goals, U.S. policymakers should make a priority of approving a new president and board for the EXIM Bank.
</span></p><span data-dcnode-id="3180" instrument_node="">
</span><h4 data-dcnode-id="3178"><span data-dcnode-id="3179" instrument_node="">Expand technical assistance programs that bolster U.S. investment in the Indo-Pacific, including the Infrastructure Transaction and Assistance Network</span></h4><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">To deepen U.S. economic ties in the Indo-Pacific, it will be essential to assist regional states in enacting economic and legal reforms that make them more attractive and viable destinations for foreign investment. To that end, the U.S. government’s Infrastructure Transaction and Assistance Network (ITAN) promotes high-standard U.S. investment by helping partner countries strengthen legal frameworks for projects, increase transparency, and review project proposals to ensure that they do not include hidden long-term costs. Congress should expand the resources available to the Office of Technical Assistance at the Department of Treasury and to the Transaction Advisory Fund launched in September 2019 under ITAN. Within the Office of Technical Assistance, Congress should increase resources for the Government Debt and Infrastructure Finance (GDIF) program, which helps countries implement debt management practices and develop domestic debt markets to make countries more attractive to private U.S. investors. Lastly, the Department of Commerce should continue to ramp up its outreach program, Access Asia, which aims to connect American firms with opportunities in the region. These efforts should be coordinated with the new DFC to pool resources and ensure that initiatives are not duplicated.
</span></p><span data-dcnode-id="3174" instrument_node="">
</span><h4 data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Continue to support an open global trade and investment regime for energy resources</span></h4><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3170" instrument_node="">Asia will play an outsized role in future global energy demand.</span><sup data-dcnode-id="3167"><a aria-controls="footnote72" aria-expanded="false" class="footnote-marker" data-dcnode-id="3168" href="#fn72" id="fnmarker72" role="button"><span data-dcnode-id="3169" instrument_node="">72</span></a></sup><span data-dcnode-id="3166" instrument_node=""> The United States should continue U.S. exports of crude oil and liquefied natural gas (LNG) to the Indo-Pacific, as well as promote free trade in these key commodities, avoiding calls for limiting U.S. energy exports. Abundant U.S. supply to global oil markets has had a demonstrated calming effect on market prices during times of geopolitical turmoil, which has the benefit of avoiding price spikes even for countries that import little U.S. crude oil. The Overseas Private Investment Corporation (OPIC) should prioritize support for LNG import terminals in key importing markets throughout the region. Congress should allow the Department of Energy to continue to streamline the approval process for LNG export licenses, including by amending the Natural Gas Act to allow automatic approval for export to countries that do not have a free trade agreement with the United States. This open approach to crude oil and LNG exports will provide considerable security and economic benefits for the United States and U.S. partners in Asia.
</span></p><span data-dcnode-id="3164" instrument_node="">
</span><h4 data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">Include key Indo-Pacific partners in the Generalized System of Preferences program</span></h4><span data-dcnode-id="3161" instrument_node="">
</span><p data-dcnode-id="3159"><span data-dcnode-id="3160" instrument_node="">U.S. policymakers should seek opportunities to deepen America’s economic ties with strategically important countries in the Indo-Pacific, including by offering special status under the Generalized System of Preferences (GSP) program. For instance, the United States has good reasons to strengthen its economic relationship with India in the context of U.S. strategic competition with China. If India addresses unfair limits on market access for U.S. firms, the United States should return India to the GSP program. USTR should revisit its recent decision to revoke GSP status for approximately one-third of Thailand’s trade with the United States. Finally, USTR should also consider the effects on U.S. competition with China as it reviews Indonesia’s participation in the GSP program.
</span></p><span data-dcnode-id="3158" instrument_node="">
</span></div><span data-dcnode-id="3156" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3149"><span data-dcnode-id="3155" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3151"><span data-dcnode-id="3154" instrument_node="">
</span><a data-dcnode-id="3153" id="strengthen1"></a><span data-dcnode-id="3152" instrument_node="">
</span></div><span data-dcnode-id="3150" instrument_node="">
</span></div><span data-dcnode-id="3148" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3113"><span data-dcnode-id="3147" instrument_node="">
</span><h3 data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Strengthen and Leverage America's Financial Power</span></h3><span data-dcnode-id="3144" instrument_node="">
</span><h4 data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Promote financial market transparency by passing beneficial ownership disclosure requirements for U.S. companies</span></h4><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Congress should enact proposed legislation to require the collection of ultimate beneficial ownership information from companies in the corporate formation process. More transparent commercial entities will enhance economic stability and limit the ability of commercial and strategic challengers to undermine U.S. businesses and national interests or engage in corruption. Specifically, this will limit the ability of China to set up anonymous front companies in the United States to purchase U.S. assets or technology and otherwise threaten critical sectors, data, or infrastructure. Additionally, it will help U.S. firms and authorities to conduct due diligence to know which companies may be linked to banned partners under sanctions or export control laws. Attracting capital to the United States, including Chinese capital, to provide important liquidity and a basis for growth need not mean sacrificing market transparency, a priority for which the United States should strive.
</span></p><span data-dcnode-id="3138" instrument_node="">
</span><h4 data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">Delist foreign companies, including Chinese firms, that do not meet audit and disclosure requirements from U.S. exchanges</span></h4><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3133"><span data-dcnode-id="3134" instrument_node="">At present, several Chinese firms that list securities on U.S. exchanges are not in compliance with regulatory transparency requirements, specifically audit and disclosure requirements put in place by the Securities and Exchange Commission (SEC). This is the result of the Chinese government blocking the release of full audit reports of certain publicly listed Chinese companies. This lack of compliance and transparency means that U.S. investors do not have the legally required information necessary to assess the riskiness of these investments. To end this practice, Congress should adopt pending legislation that would require all foreign companies listing securities in the United States, including Chinese companies, to comply with audit and disclosure requirements within three years or cease to be permitted to list securities on U.S. exchanges. The SEC should conduct a special review of noncompliant firms to ensure that they are moving into compliance with this new legal framework, specifically ensuring that firms grant U.S. regulators full access to review audits.
</span></p><span data-dcnode-id="3132" instrument_node="">
</span><h4 data-dcnode-id="3130"><span data-dcnode-id="3131" instrument_node="">Discourage challenger currencies and payments</span></h4><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">The centrality of the U.S. financial system is a core U.S. advantage in the Indo-Pacific, providing substantial influence, efficiency, and opportunities for wealth creation. This asset will be diminished, however, if service providers in foreign jurisdictions offer alternative, reliable payments, clearing, or settlements mechanisms. This will be particularly concerning to the United States if these alternative mechanisms are explicitly designed to avoid U.S. jurisdiction and be “sanctions-proof.” The United States should therefore discourage the development of alternative payments or settlement mechanisms beyond their current, nascent state by engaging with Europe and other major financial services and payments centers. The United States should also seek to support U.S.-based or U.S.-linked cross-border payment mechanisms that feature high levels of efficiency, low costs, and full digital functionality in order to compete with challenger payments platforms from China.
</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3124"><span data-dcnode-id="3125" instrument_node="">Alongside Washington’s tough enforcement posture for U.S. sanctions on Iran, the United States should still seek to engage constructively with Europe over its INSTEX payment mechanism, which is designed to facilitate humanitarian and other trade with Iran permitted under the terms of the Joint Comprehensive Plan of Action (JCPOA) nuclear deal. Even while discouraging sanctions evasion in the Euro currency area or as facilitated by European central banks, U.S. authorities should ensure that INSTEX is legally permitted to operate so long as it only facilitates humanitarian trade. This will diminish the incentive for European banking authorities to violate U.S. sanctions and create a payments mechanism that is insulated from U.S. sanctions. Additionally, the United States should work closely with Europe to promote U.S. leadership in blockchain-based and other new technologically enabled payments networks for major global currencies, primarily the dollar, including by harmonizing regulatory requirement applicability to new technologies for money transmission. These measures will mean that the nascent alternative payment systems, including as developed by China, remain relatively costly and cumbersome as an alternative to the more reliable and efficient incumbent U.S. and European payments systems. 
</span></p><span data-dcnode-id="3123" instrument_node="">
</span><h4 data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">Develop and exercise strategic concepts for coercive economic statecraft</span></h4><span data-dcnode-id="3120" instrument_node="">
</span><p data-dcnode-id="3118"><span data-dcnode-id="3119" instrument_node="">The United States has come to rely heavily on tariffs, sanctions, and investment controls as part of its foreign policy toolkit. However, there is still a long way to go in developing sound strategies and methodologies for the use of these instruments, as well as rigorous, empirical study of their utility and success. Given the direct linkage with national security issues, U.S. defense and intelligence agencies should support new research and tabletop exercises that explore how these tools affect the economy and financial system of the United States, U.S. allies, and target countries.
</span></p><span data-dcnode-id="3117" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Moreover, the Treasury, State, and Commerce departments, in coordination with the Defense, Energy, and other relevant departments, including the intelligence community, should lead an effort to define a set of guiding principles for the use of these tools and methodology for deployment. Furthermore, the Office of Management and Budget should oversee a request in the president’s budget for sufficient personnel to capably deploy these measures, including the capacity to, on an ongoing and regularized basis, study the utility and strategy for deploying coercive economic measures.
</span></p><span data-dcnode-id="3114" instrument_node="">
</span></div><span data-dcnode-id="3112" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3105"><span data-dcnode-id="3111" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3107"><span data-dcnode-id="3110" instrument_node="">
</span><a data-dcnode-id="3109" id="support"></a><span data-dcnode-id="3108" instrument_node="">
</span></div><span data-dcnode-id="3106" instrument_node="">
</span></div><span data-dcnode-id="3104" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3071"><span data-dcnode-id="3103" instrument_node="">
</span><h3 data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">Support U.S. Leadership and Innovation in Financial Technologies</span></h3><span data-dcnode-id="3100" instrument_node="">
</span><h4 data-dcnode-id="3098"><span data-dcnode-id="3099" instrument_node="">Create a regulatory framework for financial technology acceleration to compete against foreign jurisdictions, including China</span></h4><span data-dcnode-id="3097" instrument_node="">
</span><p data-dcnode-id="3095"><span data-dcnode-id="3096" instrument_node="">The United States, a highly regulated and supervised market, should do more to encourage innovation in fintech, positioning U.S. regulators to move quickly on licensing and chartering, and to provide more interpretive guidance to new firms, particularly new technology entrants into the financial services space. Other jurisdictions, including China, are aggressively promoting fintech development to accelerate and improve financial services offerings in their countries. Without more concerted U.S. action, other jurisdictions will be able to offer certain financial services with greater efficiency and lower cost, undermining U.S. superiority in the financial services sector. To maintain a preeminent position in this sector and accelerate fintech innovation in the United States, U.S. regulators should pursue a pilot regulatory framework to encourage and facilitate development of innovative financial technologies in the United States as stand-alone applications and within existing, incumbent financial institutions. In particular, the United States should seek to facilitate the development and application of new technologies to improve provision of services and financial products in the insurance, lending, payments, settlement, clearing, and tokenized asset space.
</span></p><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Several U.S. federal regulators have established innovation offices, including at the Financial Crimes Enforcement Network (FinCEN), the Office of the Comptroller of the Currency (OCC), the Securities and Exchange Commission, and the Commodity Futures Trading Commission (CFTC), some of which include labs. To help scale fintech applications, Congress should provide these offices with additional resources to support enhanced dialogue with innovators and the regular provision of guidance for industry. Moreover, to achieve the full effect of federal initiatives, state financial regulators should harmonize their definitions and requirements among themselves and, to a greater degree, with federal regulators. This will mean including a “passport” system to apply across jurisdictions and manage compliance with the patchwork of 50 sets of state requirements.
</span></p><span data-dcnode-id="3091" instrument_node="">
</span><h4 data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">Encourage development of blockchain payments applications</span></h4><span data-dcnode-id="3088" instrument_node="">
</span><p data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">Millions of unbanked and underbanked people around the world, including in areas China is targeting with its Belt and Road, will be able to access financial services through blockchain applications in the years ahead. The companies that develop these applications will control tremendous amounts of user data and have outsized influence on these countries and their relationship with the global financial system. Rather than ceding these critical opportunities to China, the United States should empower U.S. firms to lead in this space by embracing and encouraging the development of blockchain-based payment applications, both for domestic use and for cross-border purposes. To this end, the White House, in coordination with the Treasury Department, should lead an effort to consider regulatory, legal, and other incentives to promote U.S. fintech development of digital wallet, banking, and peer-to-peer payment applications.
</span></p><span data-dcnode-id="3085" instrument_node="">
</span><p data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">In so doing, the United States will compete directly with some of China’s leading digital payment applications outside of China. By promoting U.S. fintech teams in delivering the leading decentralized payments applications to both incumbent financial system users and new digital financial users, the United States will harvest a major economic opportunity. The United States will also achieve a position of influence, including through regulatory means, to encourage privacy and reliability in these technologies and discourage illegitimate surveillance in service provision.
</span></p><span data-dcnode-id="3082" instrument_node="">
</span><h4 data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Fund and support rigorous education and academic research in blockchain technology</span></h4><span data-dcnode-id="3079" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3078" instrument_node="">To compete with China, which has directed central bank resources toward digital currency and blockchain research, the United States should cultivate professionals entering the job market who can understand, develop, and innovate using blockchain payment infrastructure. The rising U.S. business and consumer interest in digital assets has not been accompanied by a sufficient growth in computer science or engineering courses that teach blockchain technology beyond an introductory level. While student interest has driven many university campuses to introduce blockchain and cryptocurrency classes in recent years, these are mostly one-off courses and do not offer a formal concentration or accreditation in building blockchain applications.</span><sup data-dcnode-id="3075"><a aria-controls="footnote73" aria-expanded="false" class="footnote-marker" data-dcnode-id="3076" href="#fn73" id="fnmarker73" role="button"><span data-dcnode-id="3077" instrument_node="">73</span></a></sup><span data-dcnode-id="3074" instrument_node=""> The U.S. government, possibly led by the National Labs or Department of Education, should establish a grant program to fund rigorous blockchain technology courses and graduate-level research on cryptocurrency-related topics.
</span></p><span data-dcnode-id="3072" instrument_node="">
</span></div><span data-dcnode-id="3070" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3063"><span data-dcnode-id="3069" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3065"><span data-dcnode-id="3068" instrument_node="">
</span><a data-dcnode-id="3067" id="revise"></a><span data-dcnode-id="3066" instrument_node="">
</span></div><span data-dcnode-id="3064" instrument_node="">
</span></div><span data-dcnode-id="3062" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3008"><span data-dcnode-id="3061" instrument_node="">
</span><h3 data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">Revise the Economic Order in the Indo-Pacific and Globally</span></h3><span data-dcnode-id="3058" instrument_node="">
</span><h4 data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Pursue new high-standard multilateral trade and investment agreements in the Indo-Pacific and Europe </span></h4><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">
 The United States should pursue a comprehensive multilateral trade and investment agreement with allies and partners in Asia to help reduce economic dependence on China and to afford greater opportunities for growth through expanded trade between the United States and the region. Achieving a broader free trade framework between the United States and Europe will also serve to expand economic opportunity in these markets and underscore rigorous rules on labor, environmental standards, currency, and intellectual property protection and enforcement. 
 </span></p><span data-dcnode-id="3052" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3051" instrument_node="">Moreover, the inclusion of high-standard rules on subsidies, intellectual property protection, and currency manipulation in multilateral trade agreements in Asia and Europe will develop and implement clear and enforceable rules and market principles for broad swaths of the global economy. This will reinforce for China that its trade distortions and unfair economic practices will not be allowed to predominate in major trading economies of the world. 
 </span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3047"><span data-dcnode-id="3048" instrument_node="">USTR should therefore develop and articulate the conditions under which the United States would join the successor agreement to the Trans-Pacific Partnership (the Comprehensive and Progressive Trans-Pacific Partnership), while continuing work toward a U.S.-European Union (EU) trade agreement. USTR should also work to negotiate a digital trade agreement with the European Union and close security allies and fellow advanced economies, building upon the recently signed U.S.-Japan digital trade agreement. These agreements help set high standards to facilitate trade and the free flow of data. Digital trade agreements should also include provisions on preventing data localization and technology transfer and ensuring companies’ use of encryption technologies, which would further isolate China if it continued these unfair practices. </span></p><span data-dcnode-id="3046" instrument_node="">
</span><h4 data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Use tariffs sparingly against allies and partners </span></h4><span data-dcnode-id="3043" instrument_node="">
</span><p data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">
 Using and threatening to use tariffs on specious national security grounds against NATO members, including Canada and Germany, as well as critical Asia-Pacific allies such as Japan and South Korea, and key Southeast Asian partners like Vietnam has undermined U.S. efforts to build multilateral support for countering China’s anti-competitive practices. Building effective coalitions on trade and investment issues will require a less confrontational U.S. approach toward other advanced economies and key partner states. While the United States may need to impose tariffs or take other punitive actions against allies and partners to counter specific trade abuses, such tariffs should be employed sparingly and only in a targeted manner. </span></p><span data-dcnode-id="3040" instrument_node="">
</span><h4 data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Enhance U.S. cooperation with the World Bank and Asian Development Bank to support high-quality infrastructure projects in the Indo-Pacific</span></h4><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">
 China’s Belt and Road has received substantial attention—and with it Beijing has garnered considerable influence—by seeking to address the massive infrastructure needs in the Indo-Pacific and beyond. While Washington should not seek to match Beijing dollar-for-dollar in infrastructure spending, the United States can leverage existing regional institutions that provide high-quality financing by increasing available capital and identifying additional ways to partner with them. For example, the United States has increased its support for the Asian Development Bank (ADB), and the U.S. Agency for International Development (USAID) has launched a partnership with the ADB focused on energy projects in the Indo-Pacific. Further supporting the ADB would provide an important alternative and counterpoint to the Belt and Road. The United States should also help fund the World Bank’s Global Infrastructure Facility, which helps recipient countries to plan project financing, preparation, and structuring efforts to stimulate the flow of external private capital. Finally, the Treasury Department, in conjunction with the National Security Council and the State Department, should launch a review of whether the United States should join the Asian Infrastructure Investment Bank.</span></p><span data-dcnode-id="3034" instrument_node="">
</span><h4 data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">Lead on setting high standards for development finance</span></h4><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3030" instrument_node="">
 China’s Belt and Road has both undermined U.S. influence in the region and brought with it a spate of problems associated with corruption, financial nonviability, debt burdens, and environmental damage. The United States can help to curb these harmful lending practices by ensuring that BRI investments are held to higher standards. To this end, the White House should lead an interagency process to craft principles for development finance related to materials, labor, environmental stewardship, and debt that the United States would then promote globally. The Treasury Department should take the lead on coordinating with other advanced and developing ally economies to refine and communicate these principles. This should include consulting with other G20 partners to cooperatively advance and implement the six G20 principles for quality infrastructure investment agreed upon by the group at the Osaka Summit in June 2019. These include maximizing the positive impact of infrastructure to achieve sustainable growth and development, raising economic efficiency through the perspective of life-cycle cost, integrating economic and social considerations in infrastructure investments, and strengthening infrastructure governance.</span><sup data-dcnode-id="3027"><a aria-controls="footnote74" aria-expanded="false" class="footnote-marker" data-dcnode-id="3028" href="#fn74" id="fnmarker74" role="button"><span data-dcnode-id="3029" instrument_node="">74</span></a></sup><span data-dcnode-id="3026" instrument_node=""> </span></p><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3022"><span data-dcnode-id="3023" instrument_node="">The Treasury Department should also lead a domestic and international effort to encourage private-sector firms to abide by these standards, which will serve to enhance economic stability, as well as America’s influence and reputation as a responsible steward internationally. Finally, U.S. leadership in standard-setting should include technical assistance to help countries evaluate project bids, from feasibility studies, environmental assessments, competitive procurement, financial accounting, and other issues. This technical assistance should be elevated as a priority for the U.S. government, and at the Treasury Department in particular, with a commensurate increase in staff, budget, and public messaging.</span></p><span data-dcnode-id="3021" instrument_node="">
</span><h4 data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">Update, strengthen, and reform the World Trade Organization</span></h4><span data-dcnode-id="3018" instrument_node="">
</span><p data-dcnode-id="3016"><span data-dcnode-id="3017" instrument_node="">
 The U.S. Treasury Department, in close coordination with the White House, should lead an effort to reform the Bretton Woods institutions, which still have a critical role to play in advancing U.S. interests and reducing the need and opportunities for alternative China-led bodies. This will require revisiting guidelines and policies for lending resources and standards, and bolstering the reputation of these institutions as the international lender of first resort to contain fallout from global crises. The United States should allow developing countries a larger voice and voting share in Bretton Woods institutions to prevent the formation of parallel or rival lending institutions that could balkanize the global financial system. Without meaningful reform at the WTO, growing dissatisfaction with its record on dispute resolution could lead one or more major economies to withdraw. The U.S. Congress should insist that the WTO define its criteria for “developing country” status, which is currently self-identified and provides benefits to these countries relative to advanced economies. It should also move to eliminate the consensus decisionmaking process to establish and enforce key rules, particularly to prohibit anti-competitive practices such as below-market financing, subsidies for state-owned enterprises, and discriminatory regulatory treatment. The United States should also stop blocking the appointment and reappointment of judges to the WTO’s Appellate Body.</span></p><span data-dcnode-id="3015" instrument_node="">
</span><h4 data-dcnode-id="3013"><span data-dcnode-id="3014" instrument_node="">Make any additional tariffs against China more targeted </span></h4><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">
 U.S. tariffs on China have effectively created macroeconomic pressure and, if maintained, have the potential to slow China’s rate of growth over the short term. As such, they can be effective policy instruments for the United States to demonstrate resolve and address China’s unfair trade and investment practices. Going forward, U.S. tariffs against China should target products and firms that garner anti-competitive advantages under China’s industrial development strategy, and where China presents a supply chain risk, such as communications network technology. The U.S. administration should avoid imposing additional tariffs on basic consumer goods where tariffs increase costs for U.S. consumers without providing meaningful strategic benefits.</span></p><span data-dcnode-id="3009" instrument_node="">
</span></div><span data-dcnode-id="3007" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2964"><span data-dcnode-id="3006" instrument_node="">
</span><h2 data-dcnode-id="3004" id="iv-strengthening-american-diplomacy"><span data-dcnode-id="3005" instrument_node="">IV. Strengthening American Diplomacy</span></h2><span data-dcnode-id="3003" instrument_node="">
</span><p data-dcnode-id="2998"><em data-dcnode-id="2999"><a data-dcnode-id="3001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-IV.-Strengthening-American-Diplomacy.pdf%3Fmtime%3D20200122085541%26focal%3Dnone"><span data-dcnode-id="3002" instrument_node="">Download</span></a><span data-dcnode-id="3000" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="2997" instrument_node="">
</span><p data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">Building the cooperation and coalitions necessary to renew American competitiveness in the Indo-Pacific—on security, technology, and trade and investment—will require deft and determined diplomacy. There is no escaping the fact that Beijing enjoys considerable home field advantages in the competition for regional influence. China is geographically proximate to Indo-Pacific states, is a leading trading partner throughout the region, and boasts impressive cultural and people-to-people ties.</span></p><span data-dcnode-id="2994" instrument_node="">
</span><p data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">China has supplemented these inherent strengths by spending heavily to expand its diplomatic corps, cultivating a cadre of increasingly seasoned diplomats well versed in the politics and culture of many Indo-Pacific countries. Beijing is directing diplomatic resources—including scarce leader-level time and attention—to the region’s pivotal states, summits, and institutions. Recognizing that many Indo-Pacific nations receive insufficient focus from the United States, China is garnering considerable return on these diplomatic investments, particularly when combined with unrivaled economic inducements. Meanwhile, Beijing is constructing and strengthening regional institutions within the Indo-Pacific that threaten to undermine the role of the United States and codify rules and norms that further advance China’s leadership in the region.
 </span></p><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2990" instrument_node="">Still, Washington retains important advantages in the diplomatic competition with Beijing. The United States possesses long-standing alliances and partnerships, and is generally seen as less threatening than China due to America’s distance from the region and its open and transparent system. Most states, even if at times deferential to Beijing, continue to welcome U.S. leadership and participation in regional affairs.</span><sup data-dcnode-id="2987"><a aria-controls="footnote75" aria-expanded="false" class="footnote-marker" data-dcnode-id="2988" href="#fn75" id="fnmarker75" role="button"><span data-dcnode-id="2989" instrument_node="">75</span></a></sup><span data-dcnode-id="2986" instrument_node=""> Nevertheless, U.S. diplomacy in the region has been inconsistent and at times incoherent, leading regional states to question the enduring commitment of the United States. 
 </span></p><span data-dcnode-id="2984" instrument_node="">
</span><p data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">The prospects for a free and open Indo-Pacific will dim in the absence of greater U.S. attention and resources for regional diplomacy: Regional states will increasingly drift toward Beijing and prioritize Beijing’s preferences on critical issues ranging from security cooperation to trade; foreign political support will erode for forward-deployed U.S. forces and military ties with the United States; and multilateral bodies will increasingly reflect China’s positions on issues ranging from freedom of navigation to human rights.
 </span></p><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">To ensure American competitiveness in the region, the United States will need to increase its diplomatic investments and develop a nimble, innovative, and responsive diplomatic strategy. This should start with a concerted focus on upgrading bilateral ties with vital allies and partners. Washington should also do more to manage disputes in the region that draw energy and focus away from the China challenge—including between Japan and South Korea, as well as Southeast Asia nations in the South China Sea. 
 </span></p><span data-dcnode-id="2978" instrument_node="">
</span><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">Washington should also commit to sustained and high-level engagement in regional institutions throughout the Indo-Pacific. This should include participating in the region’s premier summits, increasing the U.S. role in subregional organizations, and coordinating more closely with allies and partners regarding forums where the United States does not participate.
 </span></p><span data-dcnode-id="2975" instrument_node="">
</span><p data-dcnode-id="2973"><span data-dcnode-id="2974" instrument_node="">The United States can supplement these efforts by developing new forms of diplomatic, political, and cultural exchange. The United States can do more to help train diplomats in the Indo-Pacific and develop deeper ties at the subnational level. Washington should also focus on bolstering youth programs throughout the region.
 </span></p><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">Finally, the U.S. government itself should be reconfigured and resourced to reflect the critical importance of the Indo-Pacific. This should include increasing the relative size of core foreign policy and national security bureaucracies responsible for the Indo-Pacific at the State Department and Treasury Department. New positions and institutions within government will also have to be created to manage a number of issues that cut across traditional institutional boundaries. Finally, the U.S. government will need new mechanisms to engage with domestic stakeholders in academia, industry, and civil society with whom greater collaboration will be necessary to enhance American competitiveness. 
</span></p><span data-dcnode-id="2969" instrument_node="">
</span><p data-dcnode-id="2966"><span data-dcnode-id="2968" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="2967"></p><span data-dcnode-id="2965" instrument_node="">
</span></div><span data-dcnode-id="2963" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2956"><span data-dcnode-id="2962" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2958"><span data-dcnode-id="2961" instrument_node="">
</span><a data-dcnode-id="2960" id="enhance"></a><span data-dcnode-id="2959" instrument_node="">
</span></div><span data-dcnode-id="2957" instrument_node="">
</span></div><span data-dcnode-id="2955" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2905"><span data-dcnode-id="2954" instrument_node="">
</span><h3 data-dcnode-id="2952"><span data-dcnode-id="2953" instrument_node="">Enhance Diplomacy with the Highest Priority Allies and Partners in the Indo-Pacific</span></h3><span data-dcnode-id="2951" instrument_node="">
</span><h4 data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Host a regular trilateral dialogue between U.S., Japanese, and Australian national security advisors</span></h4><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Japan and Australia share U.S. concerns about China’s regional ambitions and together form the core of several regional plurilateral initiatives, including the Quad. They are critical to the success of any U.S. regional strategy. For this reason, the U.S. national security advisor should convene an annual high-level trilateral with Japanese and Australian counterparts to discuss and coordinate policy. In addition, this grouping should be considered a possible core around which future plurilateral gatherings across the Indo-Pacific could be organized. This effort would be separate from and complementary to the bilateral two-plus-two initiatives that occur between the U.S. secretaries of state and defense and their counterparts.
</span></p><span data-dcnode-id="2945" instrument_node="">
</span><h4 data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Upgrade and institutionalize high-level bilateral diplomacy with key Asian partners, particularly India, Indonesia, and Vietnam</span></h4><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2940"><span data-dcnode-id="2941" instrument_node="">The United States should invest in more institutionalized bilateral cooperation with critical partners, particularly India, Indonesia, and Vietnam. For India, the current two-plus-two mechanism involving U.S. secretaries of state and defense should be upgraded into something that broadly resembles what was formerly known as the U.S.-China Strategic and Economic Dialogue, which also involved the Treasury secretary. For Vietnam, the current “comprehensive partnership” should be elevated into a strategic partnership, a process that the United States followed with Indonesia. In concrete terms, this could involve concluding a bilateral investment treaty and loosening visa restrictions, as well as more support for Vietnam’s navy and air force, regular joint exercises, and additional U.S. Navy port calls. Finally, although the United States and Indonesia already have a “strategic partnership,” the bilateral relationship has nonetheless lagged behind others in the region. Accordingly, the United States should enhance the partnership with a more robust focus on stalled economic interaction; shared discussions on Indonesia’s vision of Indo-Pacific security; and cooperation on efforts to address election-related disinformation, as well as other issues associated with strengthening good governance.
</span></p><span data-dcnode-id="2939" instrument_node="">
</span><h4 data-dcnode-id="2937"><span data-dcnode-id="2938" instrument_node="">Strengthen diplomatic and security ties with Taiwan</span></h4><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node="">Taiwan’s continued success as a flourishing democracy is an important ingredient to realizing a free and open Indo-Pacific. The United States can do much to strengthen its diplomatic and security relationship with Taiwan and increase Taiwan’s freedom of maneuver without unnecessarily provoking Beijing. On the economic side, Washington should prioritize a bilateral investment treaty and free trade agreement with Taipei to offset China’s efforts to isolate the island from international economic agreements. On the political side, to compensate for China’s successful efforts to shrink Taiwan’s international space, the United States can explore new plurilateral initiatives with Taiwan that would give it opportunities to interact with other countries more regularly on the kinds of issues that are discussed in forums that Taiwan cannot join. The United States should also consider supporting or partnering with Taiwan on efforts to counter China’s influence over local media. Given that Taiwan’s most important relationship will remain the United States, enhancing the quality and frequency of diplomatic interactions between Washington and Taipei should be prioritized, beginning with a review of the State Department’s guidance on bilateral personnel engagement. With respect to security matters, the United States should reaffirm its commitment to the Taiwan Relations Act at high levels and with greater frequency. It should also change existing DoD policy to commence bilateral military exercises, including naval and air exercises that seek to enhance cross-strait deterrence.
</span></p><span data-dcnode-id="2933" instrument_node="">
</span><h4 data-dcnode-id="2931"><span data-dcnode-id="2932" instrument_node="">Intensify cooperation with Europe on Indo-Pacific diplomacy</span></h4><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2928"><span data-dcnode-id="2929" instrument_node="">Leveraging transatlantic cooperation in the Indo-Pacific could serve as a force multiplier for U.S. efforts to build a freer and more open region. To that end, the United States and Europe should increase high-level dialogues focused on Indo-Pacific affairs (at the cabinet and minister level) and inaugurate regular working-level dialogues on Indo-Pacific affairs among those American and European officials responsible for Indo-Pacific economic, military, and security matters. These efforts could help produce a more coherent transatlantic agenda for the region, one that could be discussed and amended through regular joint U.S.-EU statements on the region. Greater coordination on human rights issues, development issues (e.g., Mekong subregion), and higher standards for the Belt and Road could shape the region’s trajectory in ways consistent with U.S. and European values. In addition, on security matters, the United States and Europe could work to strengthen NATO’s partnerships in the area, including through such efforts as NATO’s Interoperability Platform and Enhanced Opportunities Partners program. The United States and select European states could also engage in joint counterpiracy and freedom of navigation operations in the Indo-Pacific. Europe could be more involved in Asian multilateral institutions, and while many European states joined AIIB, the United States should encourage more regular European participation in a variety of other efforts. For example, the EU president has not always participated in the East Asia Summit, and European participation is generally limited across the region’s key multilateral bodies. Scheduling high-level meetings with European counterparts on the sidelines of these summits could help to induce their involvement. Finally, in addition to the European Union, Washington should advocate partnerships between the OECD and Indo-Pacific multilateral institutions, particularly in economic or technical areas.
</span></p><span data-dcnode-id="2927" instrument_node="">
</span><h4 data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node="">Proactively seek to resolve disputes between allies and partners, including in the South China Sea, as well as between Japan and South Korea</span></h4><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">The United States should engage in leader-level efforts to proactively resolve disputes among allies and partners. Improving ties between Japan and South Korea, which have seen relations dip to their lowest ebb in decades, is vital to competing effectively with China. The downturn in ties has jeopardized military exercises and intelligence sharing, undermined trilateral cooperation, and provided China an opening to weaken the U.S. alliance system. Similarly, disputes among allied and partner states in the South China Sea have weakened the ability to construct coordinated approaches to dealing with China’s illegal and assertive behavior. Settling disputes between Brunei, Malaysia, the Philippines, Taiwan, and Vietnam in the South China Sea’s Spratly Islands would allow for a more unified response to China’s sweeping territorial claims, as well as stronger joint negotiating positions vis-à-vis Beijing on energy exploitation and a regional code of conduct.
</span></p><span data-dcnode-id="2921" instrument_node="">
</span><h4 data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">Continue to prioritize assistance to Asian states on energy and climate resilience, and rejoin the Paris climate agreement</span></h4><span data-dcnode-id="2918" instrument_node="">
</span><p data-dcnode-id="2916"><span data-dcnode-id="2917" instrument_node="">The Indo-Pacific region is at once a major contributor to climate change and also uniquely vulnerable to its effects. For over a decade, the region has been responsible for more than half of all carbon-dioxide emissions. At the same time, climate experts have noted that while climate change disruption will be global, much of it will be in East, Southeast, and South Asia. The United States can burnish its partnerships in the region by leading in this area. Accordingly, U.S. government efforts in this area deserve continued attention and resources. This includes Asia EDGE (Enhancing Development and Growth through Energy), which has catalyzed a total of $1.5 billion in public and private investment.
</span></p><span data-dcnode-id="2915" instrument_node="">
</span><p data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">To further enhance U.S. leadership and engagement in the region, the United States should also reverse its announced intention to withdraw from the Paris climate change agreement and should recommit the United States to consistent leadership in the United Nations Framework Convention on Climate Change (UNFCCC). Since the United States announced its planned departure from the agreement in 2020, China has assumed a more significant leadership role in global climate change governance, including at successive summits under the UNFCCC framework. Without the United States in a more active leadership role, there will be no counterweight to China reducing its ambition or backtracking on commitments when it feels that its domestic economic circumstances warrant it. Active U.S. participation in the Paris process would also support U.S. efforts to insist that China follow strong environmental stewardship standards in its development finance efforts. If the United States is more active in financing mechanisms promoted by the Paris agreement, including the Green Climate Fund, the State Department will be in a far stronger position to raise concerns about China’s BRI investments in legacy fossil fuels.
</span></p><span data-dcnode-id="2912" instrument_node="">
</span><h4 data-dcnode-id="2910"><span data-dcnode-id="2911" instrument_node="">Selectively remove barriers to foreign and security assistance to strategic U.S. allies and partners in the Indo-Pacific</span></h4><span data-dcnode-id="2909" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2908" instrument_node="">U.S. legislation—including the U.S. Arms Export Control Act, the Leahy Law, and the Foreign Assistance Act—sometimes complicates or prohibits security assistance to countries in the Indo-Pacific, particularly those that have suffered democratic backsliding or engaged in human rights violations in the past. Congress should consider narrowly amending some of these laws to permit rare exceptions for those cases in which prohibitions on cooperation either harm U.S. national security or ultimately reduce U.S. leverage and lock in even more repressive policies. For example, the Foreign Assistance Act has prohibited U.S. security cooperation with Thailand because of its military coup. This has in part led Thailand to deepen military and political cooperation with China and Russia. Similarly, various well-intentioned legislative proposals responding to human rights abuses in the Philippines are pushing Manila closer to Beijing, damaging U.S. interests and reducing U.S. influence on the very issues of concern. Similarly, enhanced cooperation with Vietnam has at times been hindered by existing restrictions. New and existing legislation should permit the executive branch some discretion to pursue limited cooperation on a case-by-case basis.
</span></p><span data-dcnode-id="2906" instrument_node="">
</span></div><span data-dcnode-id="2904" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2897"><span data-dcnode-id="2903" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2899"><span data-dcnode-id="2902" instrument_node="">
</span><a data-dcnode-id="2901" id="develop1"></a><span data-dcnode-id="2900" instrument_node="">
</span></div><span data-dcnode-id="2898" instrument_node="">
</span></div><span data-dcnode-id="2896" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2857"><span data-dcnode-id="2895" instrument_node="">
</span><h3 data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">Develop New Diplomatic, Political, and Cultural Exchanges with Partner States</span></h3><span data-dcnode-id="2892" instrument_node="">
</span><h4 data-dcnode-id="2890"><span data-dcnode-id="2891" instrument_node="">Shift International Military Education and Training funding to the Defense Department and create a similar State Department program for foreign diplomats</span></h4><span data-dcnode-id="2889" instrument_node="">
</span><p data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">The United States invests heavily in military exchanges (e.g., International Military Education and Training or IMET), inviting officers from foreign militaries to participate in graduate programs at U.S. military academies or to attend U.S. universities. Today, IMET is funded by the State Department. A reorganization of foreign training programs should shift this authority and appropriation to the Pentagon while creating a new International Diplomat Education and Training (IDET) program focused on expanding opportunities for foreign diplomats at U.S. graduate programs. Today, diplomats from Europe and Northeast Asia are sent to attend graduate school at some of the best international relations graduate programs in the United States. An IDET program would open the door for diplomats from key partners in South and Southeast Asia to pursue similar opportunities. With funding lines similar to today’s IMET program, this would expand, regularize, and institutionalize educational and training opportunities for diplomats across the Indo-Pacific. This office could administer programs that invite diplomats to participate in the State Department’s own various training and educational programs. It could also fund and administer opportunities for foreign diplomats to earn graduate degrees at U.S. universities or participate in courses at certain U.S. military academies. Importantly, the office should also assume responsibility for sending U.S. diplomats to the diplomatic academies and foreign service institutes of other countries, as the United States has occasionally done with India.
</span></p><span data-dcnode-id="2886" instrument_node="">
</span><h4 data-dcnode-id="2884"><span data-dcnode-id="2885" instrument_node="">Increase high-level visits to key allies and partners in the Indo-Pacific, including by U.S. congresspersons, mayors, and governors, and create a State-Commerce initiative to brief these officials properly</span></h4><span data-dcnode-id="2883" instrument_node="">
</span><p data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">America’s diplomatic agenda would benefit from more regularized high-level visits to the Indo-Pacific, not only from the president and vice president, but also from U.S. congressional delegations, governors, and mayors of major cities. A critical task in making these delegations effective is to brief participants on U.S. priorities and interests and the strategic, political, and economic developments within the region. The State and Commerce departments should create a joint initiative that would help arrange meetings for congressional, mayoral, and gubernatorial delegations traveling abroad to brief them on matters related to both business and strategy. This initiative could also detail foreign service officers to the offices of governors or mayors, or fund them to travel with congressional, mayoral, and gubernatorial delegations. With respect to briefings, those members of Congress who wish to keep briefings within the legislative branch could use Congressional Research Service staff; for mayoral or gubernatorial delegations, the joint initiative between State and Commerce would supplement a traditional focus on commercial matters with greater strategic knowledge. In both cases, the availability of a service provided by this joint initiative would reduce barriers to overseas travel and increase knowledge ahead of it.
</span></p><span data-dcnode-id="2880" instrument_node="">
</span><h4 data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">Ramp up youth exchanges and establish additional Fulbright Universities in the Indo-Pacific</span></h4><span data-dcnode-id="2877" instrument_node="">
</span><p data-dcnode-id="2872"><span data-dcnode-id="2876" instrument_node="">Large youth populations in the Indo-Pacific will come to play a central role in shaping the region’s future. As an important supplement to official high-level diplomacy, the State Department’s Young Southeast Asian Leaders Initiative (YSEALI) and other cross-sectoral initiatives such as Fulbright University Vietnam have proved successful models for building ties with younger generations of Southeast Asians.</span><sup data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">76 </span></sup><span data-dcnode-id="2873" instrument_node="">The U.S. government should expand youth engagement programs across the Indo-Pacific, particularly by harnessing the strength of U.S. universities and other academic and research institutes, to maximize international students’ and researchers’ exposure to American political culture and liberal democratic values. These efforts should include welcoming to the United States foreign students from underrepresented Indo-Pacific countries through scholarships and other fellowship programs.
</span></p><span data-dcnode-id="2871" instrument_node="">
</span><p data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The United States should also found additional Fulbright Universities in the region. The Fulbright University Vietnam was established in Hanoi in 2016 as the country’s first independent nonprofit university. It offers undergraduate and graduate classes in a range of disciplines, including engineering, public policy, and the liberal arts. Funding for the university is provided by a unique public-private structure, with Congress appropriating several million dollars each year to continue operations. Given the positive impact the university has had on the U.S.-Vietnam relationship and young Vietnamese students, similar Fulbright Universities should be pursued elsewhere in the region.
</span></p><span data-dcnode-id="2868" instrument_node="">
</span><h4 data-dcnode-id="2866"><span data-dcnode-id="2867" instrument_node="">Create an Asia-Pacific Center for Security Studies satellite office in the Indo-Pacific</span></h4><span data-dcnode-id="2865" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2864" instrument_node="">The Department of Defense should expand the Asia-Pacific Center for Security Studies (APCSS)—an institution with a long history of training military officers throughout the Indo-Pacific—by creating a satellite campus in the Indo-Pacific west of Hawaii (an “APCSS-West”) in an allied or partner state. This campus could supplement offerings by the APCSS headquarters in Hawaii. In addition, the Department of State could leverage the footprint of APCSS by appointing State Department personnel to serve as instructors in training courses for foreign diplomats.</span><sup data-dcnode-id="2861"><a aria-controls="footnote77" aria-expanded="false" class="footnote-marker" data-dcnode-id="2862" href="#fn77" id="fnmarker77" role="button"><span data-dcnode-id="2863" instrument_node="">77</span></a></sup><span data-dcnode-id="2860" instrument_node=""> Potential locations include Bangkok, Hanoi, Jakarta, Kuala Lumpur, and Manila.
</span></p><span data-dcnode-id="2858" instrument_node="">
</span></div><span data-dcnode-id="2856" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2849"><span data-dcnode-id="2855" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2851"><span data-dcnode-id="2854" instrument_node="">
</span><a data-dcnode-id="2853" id="deepen"></a><span data-dcnode-id="2852" instrument_node="">
</span></div><span data-dcnode-id="2850" instrument_node="">
</span></div><span data-dcnode-id="2848" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2825"><span data-dcnode-id="2847" instrument_node="">
</span><h3 data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">Deepen Engagement with Regional Institutions in the Indo-Pacific</span></h3><span data-dcnode-id="2844" instrument_node="">
</span><h4 data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">Participate actively in Asia’s leading multilateral institutions</span></h4><span data-dcnode-id="2841" instrument_node="">
</span><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">Asian multilateral organizations, and particularly their annual leader-level summits, represent one of the key avenues through which the United States can shape political developments in Asia, make its case for a free and open Indo-Pacific, reassure Asian states of the U.S. commitment to the region, and efficiently engage a wide range of regional leaders. The most significant of these forums include the annual U.S. summit with the Association of Southeast Asian Nations (ASEAN), the ASEAN Regional Forum (ARF), the Asia-Pacific Economic Cooperation (APEC) forum, and the East Asia Summit (EAS), among others. The United States should seek to shape the agenda in these organizations together with its allies and partners, and to host more Indo-Pacific summits and other convenings. Too often, however, the United States has failed to participate at appropriate levels, thereby reinforcing the narrative of the United States as adrift. Looking ahead, Washington should ensure that the U.S. president attends all leader-level summits, the secretary of state attends key ministerial-level gatherings, and ambassadors to organizations like ASEAN and APEC are promptly appointed and confirmed.
</span></p><span data-dcnode-id="2838" instrument_node="">
</span><h4 data-dcnode-id="2836"><span data-dcnode-id="2837" instrument_node="">Join or increase participation in South Asian and Indo-Pacific multilateral organizations where the United States is not sufficiently active</span></h4><span data-dcnode-id="2835" instrument_node="">
</span><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">Given the importance of the Indian Ocean region to U.S. strategy, Washington should seek to engage the wide range of multilateral bodies across the Indo-Pacific and South Asia that have historically received inadequate attention from Washington relative to comparable East Asian and Southeast Asian bodies. These include the South Asian Association for Regional Cooperation (SAARC), the Indian Ocean Rim Association (IORA), the Indian Ocean Naval Symposium (IONS), and the Bay of Bengal Initiative for Multi-Sectoral Technical and Economic Cooperation (BIMSTEC), among others. In some cases, the United States is an observer or dialogue partner (as in SAARC or IORA); in other cases, the United States is uninvolved (as in IONS and BIMSTEC). The United States could more consequentially engage these organizations by designating a new or existing ambassador for these institutions or establishing diplomatic missions at those institutions interested in such an effort, as it has done with ASEAN. It could also request status as an observer or dialogue partner for those organizations in which it has no current role. In most cases, it will be critically important for the United States to consult with partners, particularly India, on whether and how to improve ties with these institutions.
</span></p><span data-dcnode-id="2832" instrument_node="">
</span><h4 data-dcnode-id="2830"><span data-dcnode-id="2831" instrument_node="">Coordinate with allies and partners on regional institutions in which the United States does not participate</span></h4><span data-dcnode-id="2829" instrument_node="">
</span><p data-dcnode-id="2827"><span data-dcnode-id="2828" instrument_node="">China often favors and pursues regional bodies in which the United States is not a member. These include the Shanghai Cooperation Organization (SCO), the Conference on Interaction and Confidence Building Measures in Asia (CICA), the Asian Infrastructure and Investment Bank, the New Development Bank (NDB), the Regional Comprehensive Economic Partnership (RCEP), and others. China has used some of these bodies to create rules or norms that complicate U.S. military exercises, basing, and alliances; to mobilize support for its positions and undermine U.S. stances on key security or economic issues; and to weaken the centrality of institutions in which the United States plays a prominent role. Even though the United States cannot or in some cases has chosen not to join these institutions, it should nevertheless engage with allies and partners that are members to influence the agenda of these bodies. For example, India is a member of the SCO, and several U.S. allies, including the United Kingdom, France, and Germany, are members of the AIIB. Coordination with these states could help to thwart China’s efforts to undermine liberal values or U.S. military alliances within these institutions.
</span></p><span data-dcnode-id="2826" instrument_node="">
</span></div><span data-dcnode-id="2824" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2817"><span data-dcnode-id="2823" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2819"><span data-dcnode-id="2822" instrument_node="">
</span><a data-dcnode-id="2821" id="restructure"></a><span data-dcnode-id="2820" instrument_node="">
</span></div><span data-dcnode-id="2818" instrument_node="">
</span></div><span data-dcnode-id="2816" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2793"><span data-dcnode-id="2815" instrument_node="">
</span><h3 data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">Restructure U.S. Bureaucracies to Better Compete in the Indo-Pacific</span></h3><span data-dcnode-id="2812" instrument_node="">
</span><h4 data-dcnode-id="2810"><span data-dcnode-id="2811" instrument_node="">Increase key U.S. government staffs dedicated to the Indo-Pacific, including at the Treasury and State departments </span></h4><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">
 U.S. departments and agencies have yet to reform their bureaucracies to fully reflect the centrality of the Indo-Pacific or the emerging strategic competition with China. Critical offices remain comparatively understaffed and underresourced, including the Bureau of East Asian and Pacific Affairs at the State Department, embassies and consulates in the region, and the Office of Terrorism and Financial Intelligence at the Treasury Department. To address this continuing shortfall, national security agencies should closely review the relative size, missions, and capabilities of technical and regional offices most urgently needed for competition with China, and resize their teams toward that purpose. Further, just as the war on terror generated temporary hiring authorities to quickly recruit personnel with specialized backgrounds, national security agencies may need to, in the short term, dedicate resources to hire the regional, language, and technical expertise they need to compete more effectively in the Indo-Pacific. Congress can take a primary role in oversight of this issue through congressional hearings and committee reports and through future state foreign operations appropriation bills.</span></p><span data-dcnode-id="2806" instrument_node="">
</span><h4 data-dcnode-id="2804"><span data-dcnode-id="2805" instrument_node="">Appoint a deputy assistant to the president for China responsible for coordinating a whole-of-government strategy </span></h4><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">
 The U.S. government is not well configured to deal with the China challenge, leading to gaps and coordination problems on issues that cut across bureaucratic boundaries. To more effectively manage U.S. strategy toward China, the president should create the position of deputy assistant to the president for China with the authority and writ to convene departments and agencies on China-related issues at the deputies level from across the domestic and foreign policy apparatus. The deputy assistant to the president for China should report directly to the national security advisor, the director of the National Economic Council, and the director of the Domestic Policy Council. </span></p><span data-dcnode-id="2800" instrument_node="">
</span><h4 data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">Create an independent bipartisan Commission on American Competitiveness</span></h4><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">Rising to the China challenge will require a whole-of-society approach that extends beyond the halls of government. Congress should therefore establish an independent, bipartisan Commission on American Competitiveness that is tasked with holding public hearings, meeting privately with senior officials in the executive branch, and issuing an annual report to Congress with recommendations on how key sectors throughout U.S. society—ranging from academia to media to technology companies—can contribute to enhancing America’s competitiveness in the world. The existing United States-China Economic and Security Review Commission could serve as a model in terms of structure and activities.
</span></p><span data-dcnode-id="2794" instrument_node="">
</span></div><span data-dcnode-id="2792" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2756"><span data-dcnode-id="2791" instrument_node="">
</span><h2 data-dcnode-id="2789" id="v-competing-over-ideology-and-narrative"><span data-dcnode-id="2790" instrument_node="">V. Competing Over Ideology and Narrative</span></h2><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2783"><em data-dcnode-id="2784"><a data-dcnode-id="2786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-V.-Competing-Over-Ideology-and-Narrative.pdf%3Fmtime%3D20200122085543%26focal%3Dnone"><span data-dcnode-id="2787" instrument_node="">Download</span></a><span data-dcnode-id="2785" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">America’s ability to compete over ideology and reset the dominant narratives in the region will be powerful determinants of whether the United States can build the types of coalitions and partnerships necessary to support a free and open Indo-Pacific. How publics and capitals view the relative virtues, balances of power, and trajectories of economic influence—and fundamentally, whether the United States presents an attractive and viable long-term alternative to a Sino-centric future—will be at the core of regional countries’ decisions to either stand up or acquiesce to Beijing.</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">Well aware of the stakes in this dimension of the competition, China has been spending tremendous resources around the world employing propaganda, public diplomacy, and strategic messaging to promote a narrative of its inexorable ascendance coupled with America’s inevitable decline. At the same time, the Chinese Communist Party has used both overt and illicit means to influence businesses, media, universities, and thought leaders within democratic societies to shape debates, blunt criticism, and build support for its policies at home and abroad. Uneven levels of governance in the Indo-Pacific alongside China’s growing control over local media markets have further facilitated these efforts.
 </span></p><span data-dcnode-id="2776" instrument_node="">
