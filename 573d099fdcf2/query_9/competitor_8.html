</span><p data-dcnode-id="2169"><span data-dcnode-id="2178" instrument_node="">On- and off-ramps for the federal workforce are limited by both policy and culture. While federal employees once sought a three-decade career within a single agency, younger personnel have different expectations for career management. Likewise, many evolving fields (from STEM to regional expertise) benefit enormously from experts who can refresh their knowledge and experience by moving in and out of government, with simplified paths of exit and reentry. To create a flexible and permeable workforce, the Office of Personnel and Management should work with Congress and federal agencies to change present policies to allow prior government employees to be rehired noncompetitively at any level for which they are qualified.</span><sup data-dcnode-id="2175"><a aria-controls="footnote137" aria-expanded="false" class="footnote-marker" data-dcnode-id="2176" href="#fn137" id="fnmarker137" role="button"><span data-dcnode-id="2177" instrument_node="">137</span></a></sup><span data-dcnode-id="2174" instrument_node=""> Just as importantly, agencies should remove barriers to talent movement between departments and agencies—including excessive and slow security clearances and transfers. Finally, federal agencies should enable more seamless on-ramps for internship and fellowship programs.</span><sup data-dcnode-id="2171"><a aria-controls="footnote138" aria-expanded="false" class="footnote-marker" data-dcnode-id="2172" href="#fn138" id="fnmarker138" role="button"><span data-dcnode-id="2173" instrument_node="">138</span></a></sup><span data-dcnode-id="2170" instrument_node="">
</span></p><span data-dcnode-id="2168" instrument_node="">
</span><h4 data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Update federal education fellowships for great-power competition</span></h4><span data-dcnode-id="2165" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2164" instrument_node="">The U.S. government funds a wide range of national security programs for postsecondary and graduate education, with highly variable requirements for service, such as the Boren Scholarship and Fellowship, the National Defense Science and Engineering Fellowship, Critical Language Studies scholarships, and the Foreign Language and Area Studies program. While these programs continue to have real merit, many deserve updating to reflect the demands of the modern economic and security environment. Hiring managers and human resources professionals have inconsistent understanding of their access to specific experts with service requirements, such as Boren Fellows, reflecting a real need for up-to-date training resources across national security agencies.</span><sup data-dcnode-id="2161"><a aria-controls="footnote139" aria-expanded="false" class="footnote-marker" data-dcnode-id="2162" href="#fn139" id="fnmarker139" role="button"><span data-dcnode-id="2163" instrument_node="">139</span></a></sup><span data-dcnode-id="2160" instrument_node=""> Scholars with no service requirements (such as Foreign Language and Area Studies) have little to no ongoing ties to national security institutions after degree completion; in fact, many scholars who pursue field research and study find themselves at a disadvantage for cleared positions in practice, despite their federally invested knowledge. Although adjusting these programs to require federal service may deter participation, sponsoring agencies should explore other options to make better returns on investment, including giving preferred status for civil service hiring for veterans of these programs; voluntarily enrolling them as government consultants for relevant agencies; making security clearance allowances for program alumni; and making term-limited appointments available for short periods. Agencies could also consider creating new, frequently updated fellowship programs reflecting current regional, language, and technical needs for the Indo-Pacific. Regardless, the United States should increase its investments in language, area-relevant studies, and high-demand STEM field education.
</span></p><span data-dcnode-id="2158" instrument_node="">
</span></div><span data-dcnode-id="2156" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2149"><span data-dcnode-id="2155" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2151"><span data-dcnode-id="2154" instrument_node="">
</span><a data-dcnode-id="2153" id="invest"></a><span data-dcnode-id="2152" instrument_node="">
</span></div><span data-dcnode-id="2150" instrument_node="">
</span></div><span data-dcnode-id="2148" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2099"><span data-dcnode-id="2147" instrument_node="">
</span><h3 data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">Invest in the Public-Private Technology Workforce
</span></h3><span data-dcnode-id="2144" instrument_node="">
</span><h4 data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Surge support for science, technology, engineering, and math education across secondary, postsecondary, vocational, and workforce retraining levels</span></h4><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2140" instrument_node="">The United States is not meeting critical public and private technology workforce requirements. In response, the U.S. government should further invest in STEM education at all levels. Although the United States still possesses many of the world’s leading institutions in STEM research and education, young Americans continue to lag globally. And despite some signs of progress in increasing testing levels overall, unequal access to STEM higher education across gender, ethnic, and socioeconomic groups remains a considerable problem.</span><sup data-dcnode-id="2137"><a aria-controls="footnote140" aria-expanded="false" class="footnote-marker" data-dcnode-id="2138" href="#fn140" id="fnmarker140" role="button"><span data-dcnode-id="2139" instrument_node="">140</span></a></sup><span data-dcnode-id="2136" instrument_node=""> As a consequence, the United States faces an acute personnel shortfall in critical high-technology areas, such as cybersecurity and artificial intelligence. The White House has already generated a strong and practical strategy for STEM education under the auspices of its National Science and Technology Council.</span><sup data-dcnode-id="2133"><a aria-controls="footnote141" aria-expanded="false" class="footnote-marker" data-dcnode-id="2134" href="#fn141" id="fnmarker141" role="button"><span data-dcnode-id="2135" instrument_node="">141</span></a></sup><span data-dcnode-id="2132" instrument_node=""> The strategy is comprehensive, emphasizing the need for widespread STEM literacy in the general public, diversity and inclusion in STEM educational opportunities, and preparing the STEM workforce for the future, with specific potential actions across these goals. But implementation and follow-through will be critical. The NSTC should work collaboratively with Congress to develop an implementation plan to execute the council’s recommendations, task specific agencies, generate sustainable resources, and partner productively with the private sector and academia.
</span></p><span data-dcnode-id="2130" instrument_node="">
</span><h4 data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Raise the overall cap for H-1B visas and remove the cap for advanced-degree holders entirely</span></h4><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2126" instrument_node="">To compete effectively with China, the United States should attract and leverage high-tech talent from around the world. U.S. technology companies have relied on H-1B visas to fill shortfalls in critical areas, yet the number of H-1B visas has been capped since 2005 at 85,000 per year, with 20,000 visas designated for those with graduate degrees. Meanwhile, the demand for foreign talent has surged, with 199,000 applicants in 2018.</span><sup data-dcnode-id="2123"><a aria-controls="footnote142" aria-expanded="false" class="footnote-marker" data-dcnode-id="2124" href="#fn142" id="fnmarker142" role="button"><span data-dcnode-id="2125" instrument_node="">142</span></a></sup><span data-dcnode-id="2122" instrument_node=""> Particularly at a time of historically low unemployment, this is a remarkable lost opportunity for the United States. Congress should move quickly to raise the overall H-1B cap and remove the cap entirely for advanced-degree holders.
</span></p><span data-dcnode-id="2120" instrument_node="">
</span><h4 data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Improve workforce mobility between private sector and government technology roles</span></h4><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2107"><span data-dcnode-id="2116" instrument_node="">Although political and mission differences will limit the eagerness of some high-tech workers to pursue short- or long-term stints in government, small investments could make some transitions easier and more attractive. The most obvious is the security clearance process, which is undergoing positive reform but whose complexity and backlog undoubtedly deter talented and interested personnel from pursuing government roles, even temporarily.</span><sup data-dcnode-id="2113"><a aria-controls="footnote143" aria-expanded="false" class="footnote-marker" data-dcnode-id="2114" href="#fn143" id="fnmarker143" role="button"><span data-dcnode-id="2115" instrument_node="">143</span></a></sup><span data-dcnode-id="2112" instrument_node=""> Because of that, continuous focus on expediting the process and reviews and improving continuous monitoring should be a national security priority. Along with improving clearance processes, national security agencies should continue to carve out, to the extent possible, noncleared roles that enable working closely with technical talent on critical security challenges. The United States Digital Service has been a notable success for temporary exchanges and should be sustained across administrations.</span><sup data-dcnode-id="2109"><a aria-controls="footnote144" aria-expanded="false" class="footnote-marker" data-dcnode-id="2110" href="#fn144" id="fnmarker144" role="button"><span data-dcnode-id="2111" instrument_node="">144</span></a></sup><span data-dcnode-id="2108" instrument_node=""> Finally, agencies with high technical demands should consider bureaucratic and cultural shifts that might encourage more technical hires, such as permitting opportunities to work remotely, as well as making serious investments in the modern hardware and software both necessary and expected by today’s technology workforce.
</span></p><span data-dcnode-id="2106" instrument_node="">
</span><h4 data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Identify and appropriately staff critical technology roles in government</span></h4><span data-dcnode-id="2103" instrument_node="">
</span><p data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">Many vital policy and management functions within government demand technical expertise that may not be resident within the present federal workforce at senior levels or within the typical political appointee cadre. These pools of talent must be expanded at the leadership level, which requires revisiting the natural candidates for such jobs and the required skills. National security agencies should begin the process of identifying required technical skills for specific senior roles—management officers, technology and information officers, cybersecurity policy overseers, acquisition officials, and more—doing what they can to highlight needs and match them to external recruits. The technical skills needed to advise policymakers will differ from those necessary to build management systems, test weapons platforms, or purchase software.</span></p><span data-dcnode-id="2100" instrument_node="">
</span></div><span data-dcnode-id="2098" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2084"><span data-dcnode-id="2097" instrument_node="">
</span><h2 data-dcnode-id="2095" id="a-call-for-bipartisanship"><span data-dcnode-id="2096" instrument_node="">A Call for Bipartisanship</span></h2><span data-dcnode-id="2094" instrument_node="">
</span><p data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">It is no secret that partisanship in Washington is at a fever pitch. Some degree of political competition, of course, is natural and even healthy for American democracy. No single party has a monopoly on good ideas, and the American people deserve a range of choices in their leaders and associated policies. At the same time, however, American foreign policy debates are increasingly infused with and defined by partisan divisions—often to the detriment of U.S. power and influence in the world. </span></p><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">If policy toward China falls prey to similar dynamics, the United States will fail to rise to the China challenge. Renewing American competitiveness in the Indo-Pacific will require the kind of bold decisions, sustained attention, well-functioning government, and willingness to commit resources and endure costs that can only be achieved through bipartisan cooperation. While neither political party will get everything it wants, it is also the case that there is considerable overlap of political interests across each vector of American competitiveness outlined in this report. Where partisan differences do exist, it will be incumbent upon leaders on both sides of the aisle to compromise and make tradeoffs in ways that are unfortunately not the norm in present-day U.S. politics. Pursued deftly, competition with China should bring American political leaders together rather than drive them apart.
 </span></p><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2086"><span data-dcnode-id="2087" instrument_node="">It is encouraging that there exists today a strong bipartisan consensus on the need to compete with China. It is imperative that this be sustained proactively. Efforts to gain partisan advantage on China policy should be avoided and rejected. We believe this is possible: The day-to-day lived experience at the Center for a New American Security is that Republicans and Democrats can still come together to find common ground in areas of vital U.S. interest in the world. This report is the product of a commitment to bipartisanship and the belief that China strategy should be an area where U.S. policymakers can rise above party politics. It is our hope that current and future generations of America’s leaders share this obligation to work together to renew U.S. competitiveness in the Indo-Pacific and beyond.</span></p><span data-dcnode-id="2085" instrument_node="">

</span><ol data-dcnode-id="815"><li data-dcnode-id="2034" id="fn1"><span data-dcnode-id="2049" instrument_node="">The Trump administration’s public national security documents have correctly identified that “the central challenge to U.S. prosperity and security is the reemergence of long-term, strategic competition,” noting that a “competition between free and repressive visions of world order is taking place in the Indo-Pacific region.” U.S. Department of Defense, </span><em data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Summary of the 2018 National Defense Strategy of The United States of America: Sharpening the American Military’s Competitive Edge</span></em><span data-dcnode-id="2046" instrument_node=""> (2018), 2, </span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dod.defense.gov/Portals/1/Documents/pubs/2018-National-Defense-Strategy-Summary.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2045" instrument_node="">https://dod.defense.gov/Portals/1/Documents/pubs/2018-National-Defense-Strategy-Summary.pdf</span></a><span data-dcnode-id="2043" instrument_node="">; and The White House, </span><em data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">National Security Strategy of the United States of America</span></em><span data-dcnode-id="2040" instrument_node=""> (December 2017), 45, </span><a data-dcnode-id="2038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/wp-content/uploads/2017/12/NSS-Final-12-18-2017-0905-2.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2039" instrument_node="">https://www.whitehouse.gov/wp-content/uploads/2017/12/NSS-Final-12-18-2017-0905-2.pdf</span></a><span data-dcnode-id="2037" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="2035" href="#fnmarker1"><span data-dcnode-id="2036" instrument_node="">↩</span></a></li><li data-dcnode-i nd the Social Impact of Artificial Intelligence,” </span><em data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">SSRN Electronic Journal </span></em><span data-dcnode-id="1748" instrument_node="">(March 23, 2018), </span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D3147971" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1747" instrument_node="">https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3147971</span></a><span data-dcnode-id="1745" instrument_node="">; and John VerWey, “Global Value Chains: Explaining U.S. Bilateral Trade Deficits in Semiconductors” (U.S. International Trade Commission, March 2018), </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usitc.gov/publications/332/executive_briefings/ebot-semiconductor_gvc_final.pdf%3Fsource%3Dgovdelivery" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1744" instrument_node="">https://www.usitc.gov/publications/332/executive_briefings/ebot-semiconductor_gvc_final.pdf?source=govdelivery</span></a><span data-dcnode-id="1742" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1740" href="#fnmarker36"><span data-dcnode-id="1741" instrument_node="">↩</span></a></li><li data-dcnode-id="1720" id="fn37"><span data-dcnode-id="1738" instrument_node="">For example, chip production at Taiwan Semiconductor Manufacturing Company (TSMC) was briefly disrupted in 2018 when a computer virus made its way onto fabrication equipment. Taiwan, in particular, is a major locale for semiconductor fabrication, accounting for over 70 percent of fabrication in “pure play foundries.” The concentration of so much of the world’s chip production in a single location may increase efficiencies, but also concentrates risk. Taiwan is a major target of Chinese hackers and potential insider threats, and a potential fla dcnode-id="1726" instrument_node="">October 22, 2018, </span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/e3e39f54-d5fc-11e8-ab8e-6be0dcf18713" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1725" instrument_node="">https://www.ft.com/content/e3e39f54-d5fc-11e8-ab8e-6be0dcf18713</span></a><span data-dcnode-id="1723" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1721" href="#fnmarker37"><span data-dcnode-id="1722" instrument_node="">↩</span></a></li><li data-dcnode-id="1713" id="fn38"><span data-dcnode-id="1719" instrument_node="">Samson Ellis, Yuan Gao, and Cindy Wang, “TSMC Ready to Spend $20 Billion on its Most Advanced Chip Plant,” Bloomberg.com, October 6, 2017, </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/news/articles/2017-10-06/tsmc-ready-to-spend-20-billion-on-its-most-advanced-chip-plant" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1718" instrument_node="">https://www.bloomberg.com/news/articles/2017-10-06/tsmc-ready-to-spend-20-billion-on-its-most-advanced-chip-plant</span></a><span data-dcnode-id="1716" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1714" href="#fnmarker38"><span data-dcnode-id="1715" instrument_node="">↩</span></a></li><li data-dcnode-id="1703" id="fn39"><span data-dcnode-id="1712" instrument_node="">Jon Harper, “China Threatens Microelectronics Supply Chain, DoD Official Says,” </span><em data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">National Defense </span></em><span data-dcnode-id="1709" instrument_node="">(December 19, 2017), </span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationaldefensemagazine.org/articles/2017/12/19/china-threatens-microelectronics-supply-chain-dod-official-says" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1708" instrument_node="">https://www.nationaldefensemagazine.org/articles/2017/12/19/china-threatens-microelectronics-supply-chain-dod-official-says</span></a><span data-dcnode-id="1706" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1704" href="#fnmarker39"><span data-dcnode-id="1705" instrument_node="">↩</span></a></li><li data-dcnode-id="1684" id="fn40"><span data-dcnode-id="1702" instrument_node="">This dependency is a major source of strategic leverage for the United States. U.S. actions such as restricting semiconductor exports to Huawei incur real costs to China precisely because China relies so heavily on foreign hardware. The U.S. decision to place a number of Chinese companies on the Commerce Department’s Entity List, including Huawei and firms linked to human rights abuses or the Chinese military, has accelerated China’s desire to build its domestic semiconductor manufacturing capacity and reduce reliance on foreign imports. For further information, see Dan Kim and John VerWey, “The Potential Impacts of the Made in China 2025 Roadmap on the Integrated Circuit Industries in the U.S., EU and Japan,” Working Paper ID-061 (U.S. International Trade Commission, August 2019), </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usitc.gov/publications/332/working_papers/id_19_061_china_integrated_circuits_technology_roadmap_final_080519_kim_verwey-508_compliant.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1701" instrument_node="">https://www.usitc.gov/publications/332/working_papers/id_19_061_china_integrated_circuits_technology_roadmap_final_080519_kim_verwey-508_compliant.pdf</span></a><span data-dcnode-id="1699" instrument_node="">; Ana Swanson, Paul Mozur, and Steve Lohr, “U.S. Blacklists More Chinese Tech Companies Over National Security Concerns,” </span><em data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">The New York Times, </span></em><span data-dcnode-id="1696" instrument_node="">June 21, 2019, </span><a data-dcnode-id="1694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/06/21/us/politics/us-china-trade-blacklist.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1695" instrument_node="">https://www.nytimes.com/2019/06/21/us/politics/us-china-trade-blacklist.html</span></a><span data-dcnode-id="1693" instrument_node="">; and Ana Swanson and Paul Mozur, “U.S. Blacklists 28 Chinese Entities Over Abuses in Xinjiang,” </span><em data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">The New York Times, </span></em><span data-dcnode-id="1690" instrument_node="">October 7, 2019, </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/10/07/us/politics/us-to-blacklist-28-chinese-entities-over-abuses-in-xinjiang.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1689" instrument_node="">https://www.nytimes.com/2019/10/07/us/politics/us-to-blacklist-28-chinese-entities-over-abuses-in-xinjiang.html</span></a><span data-dcnode-id="1687" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1685" href="#fnmarker40"><span data-dcnode-id="1686" instrument_node="">↩</span></a></li><li data-dcnode-id="1674" id="fn41"><span data-dcnode-id="1683" instrument_node="">Nearly the entire global supply of photoresists, chemicals essential to the production of semiconductors, is produced by a handful of companies based in the United States, Germany, Japan, and South Korea. In key areas, the market is even more concentrated. A single Dutch company is the sole supplier of extreme ultraviolet lithography machines required to make the latest generation of semiconductors. John VerWey, “What’s Causing U.S. Semiconductor Equipment Production and Exports to Grow?” (U.S. International Trade Commission, January 2019), </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usitc.gov/publications/332/executive_briefings/ebot_john_verwey_semi_manufacturing_equipment_pdf.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1682" instrument_node="">https://www.usitc.gov/publications/332/executive_briefings/ebot_john_verwey_semi_manufacturing_equipment_pdf.pdf</span></a><span data-dcnode-id="1680" instrument_node="">; and John VerWey, “The Health and Competitiveness of the U.S. Semiconductor Manufacturing Equipment Industry,” Working Paper ID-058 (U.S. International Trade Commission, July 2019), </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usitc.gov/publications/332/working_papers/id_058_the_health_and_competitiveness_of_the_sme_industry_final_070219checked.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1679" instrument_node="">https://www.usitc.gov/publications/332/working_papers/id_058_the_health_and_competitiveness_of_the_sme_industry_final_070219checked.pdf</span></a><span data-dcnode-id="1677" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1675" href="#fnmarker41"><span data-dcnode-id="1676" instrument_node="">↩</span></a></li><li data-dcnode-id="1670" id="fn42"><span data-dcnode-id="1673" instrument_node="">VerWey, “The Health and Competitiveness of the U.S. Semiconductor Manufacturing Equipment Industry.” </span><a class="footnote-return" data-dcnode-id="1671" href="#fnmarker42"><span data-dcnode-id="1672" instrument_node="">↩</span></a></li><li data-dcnode-id="1657" id="fn43"><span data-dcnode-id="1669" instrument_node="">Hobart M. King, “REE – Rare Earth Elements and their Uses,” Geology.com, https://geology.com/articles/rare-earth-elements/; “Explainer: China’s rare earth supplies could be vital bargaining chip in U.S. trade war,” Reuters.com, May 22, 2019, </span><a data- ://prd-wret.s3-us-west-2.amazonaws.com/assets/palladium/production/atoms/files/mcs-2019-raree.pdf</span></a><span data-dcnode-id="1650" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1648" href="#fnmarker44"><span data-dcnode-id="1649" instrument_node="">↩</span></a></li><li data-dcnode-id="1640" id="fn45"><span data-dcnode-id="1646" instrument_node="">“Explainer: U.S. dependence on China’s rare earth – Trade war vulnerability,” Reuters.com, June 3, 2019, </span><a data-dcnode-id="1644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-trade-china-rareearth-explainer/explainer-u-s-dependence-on-chinas-rare-earth-trade-war-vulnerability-iduskcn1t42rp" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1645" instrument_node="">https://www.reuters.com/article/us-usa-trade-china-rareearth-explainer/explainer-u-s-dependence-on-chinas-rare-earth-trade-war-vulnerability-iduskcn1t42rp</span></a><span data-dcnode-id="1643" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1641" href="#fnmarker45"><span data-dcnode-id="1642" instrument_node="">↩</span></a></li><li data-dcnode-id="1633" id="fn46"><span data-dcnode-id="1639" instrument_node="">“Pentagon in talks with Australia on rare earths plant: official,” Reuters.com, August 27, 2019, </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-rareearths-australia/pentagon-in-talks-with-australia-on-rare-earths-plant-official-iduskcn1vh1uy" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1638" instrument_node="">https://www.reuters.com/article/us-usa-rareearths-australia/pentagon-in-talks-with-australia-on-rare-earths-plant-official-iduskcn1vh1uy</span></a><span data-dcnode-id="1636" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1634" href="#fnmarker46"><span data-dcnode-id="1635" instrument_n <a class="footnote-return" data-dcnode-id="1614" href="#fnmarker48"><span data-dcnode-id="1615" instrument_node="">↩</span></a></li><li data-dcnode-id="1603" id="fn49"><span data-dcnode-id="1612" instrument_node="">For example, Department of Energy-funded research resulted in substitutes for europium and terbium used in LEDs and flat-panel displays, and in techniques to sharply reduce the need for neodymium and dysprosium in electric motors. “Critical Materials Institute uses the Materials Genome approach to accelerate rare-earth replacement,” Ames Laboratory – U.S. Department of Energy, </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cmi.ameslab.gov/resources/success/success-mgi-approach" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1611" instrument_node="">https://cmi.ameslab.gov/resources/success/success-mgi-approach</span></a><span data-dcnode-id="1609" instrument_node="">; and Qiang Li and Venkat Selvamanickam, “Quadrupling Critical Current in High Temperature Superconductor Wires,” Arpa-e.energy.gov, June 20, 2016, </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arpa-e.energy.gov/%3Fq%3Dimpact-sheet/university-houston-react" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1608" instrument_node="">https://arpa-e.energy.gov/?q=impact-sheet/university-houston-react</span></a><span data-dcnode-id="1606" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1604" href="#fnmarker49"><span data-dcnode-id="1605" instrument_node="">↩</span></a></li><li data-dcnode-id="1587" id="fn50"><span data-dcnode-id="1602" instrument_node="">John C. Demers, Assistant Attorney General, National Security Division, U.S. Department of Justice, “China’s Non-Traditional Espionage Against the United States: The Threat and Potential Policy Responses,” Statement to the Committee on the Judiciary, U.S. Senate, December 12, 2018, </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/sites/default/files/testimonies/witnesses/attachments/2018/12/18/12-05-2018_john_c._demers_testimony_re_china_non-traditional_espionage_against_the_united_states_the_threat_and_potential_policy_responses.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1601" instrument_node="">https://www.justice.gov/sites/default/files/testimonies/witnesses/attachments/2018/12/18/12-05-2018_john_c._demers_testimony_re_china_non-traditional_espionage_against_the_united_states_the_threat_and_potential_policy_responses.pdf</span></a><span data-dcnode-id="1599" instrument_node="">. FBI Director Christopher Wray stated, “There is no country that poses a more severe counterintelligence threat to this country right now than China.” “FBI has 1,000 investigations into Chinese intellectual property theft, director Christopher Wray says, calling China the most severe counter-intelligence threat to US,” </span><em data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">South China Morning Post, </span></em><span data-dcnode-id="1596" instrument_node="">July 24, 2019, </span><a data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmp.com/news/china/article/3019829/fbi-has-1000-probes-chinese-intellectual-property-theft-director" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1595" instrument_node="">https://www.scmp.com/news/china/article/3019829/fbi-has-1000-probes-chinese-intellectual-property-theft-director</span></a><span data-dcnode-id="1593" instrument_node="">; and Eric Rosenbaum, “1 in 5 corporations say China has stolen their IP within the last year: CNBC CFO survey,” CNBC.com, March 1, 2019, </span><a data-dcnode-id="1591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2019/02/28/1-in-5-companies-say-china-stole-their-ip-within-the-last-year-cnbc.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1592" instrument_node="">https://www.cnbc.com/2019/02/28/1-in-5-companies-say-china-stole-their-ip-within-the-last-year-cnbc.html</span></a><span data-dcnode-id="1590" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1588" href="#fnmarker50"><span data-dcnode-id="1589" instrument_node="">↩</span></a></li><li data-dcnode-id="1577" id="fn51"><span data-dcnode-id="1586" instrument_node="">FBI Director Christopher Wray has also stated that he expects the FBI’s workload to increase dramatically in response to the recent </span><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Foreign Investment Risk Review Modernization Act</span></em><span data-dcnode-id="1583" instrument_node="">, which increases review of foreign investments in the United States. “FBI has 1,000 investigations into Chinese intellectual property theft, director Christopher Wray says, calling China the most severe counter-intelligence threat to US”; and Christopher Wray, Director of the Federal Bureau of Investigation, “Oversight of the Federal Bureau of Investigation,” Statement before the Committee on the Judiciary, U.S. Senate, July 23, 2019, </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fbi.gov/news/testimony/oversight-of-the-federal-bureau-of-investigation-072319" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1582" instrument_node="">https://www.fbi.gov/news/testimony/oversight-of-the-federal-bureau-of-investigation-072319</span></a><span data-dcnode-id="1580" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1578" href="#fnmarker51"><span data-dcnode-id="1579" instrument_node="">↩</span></a></li><li data-dcnode-id="1567" id="fn52"><span data-dcnode-id="1576" instrument_node="">“A Conversation With Christopher Wray,” CFR.org</span><em data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">, </span></em><span data-dcnode-id="1573" instrument_node="">April 26, 2019, </span><a data-dcnode-id="1571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cfr.org/event/conversation-christopher-wray-0" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1572" instrument_node="">https://www.cfr.org/event/conversation-christopher-wray-0</span></a><span data-dcnode-id="1570" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1568" href="#fnmarker52"><span data-dcnode-id="1569" instrument_node="">↩</span></a></li><li data-dcnode-id="1557" id="fn53"><span data-dcnode-id="1566" instrument_node="">Andrew Chongseh Kim, “Prosecuting Chinese ‘Spies’: An Empirical Analysis of the Economic Espionage Act,” </span><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Cardozo Law Review</span></em><span data-dcnode-id="1563" instrument_node="">, 40 no. 2 (December 2018), </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cardozolawreview.com/prosecuting-chinese-spies-an-empirical-analysis-of-the-economic-espionage-act/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1562" instrument_node="">http://cardozolawreview.com/prosecuting-chinese-spies-an-empirical-analysis-of-the-economic-espionage-act/</span></a><span data-dcnode-id="1560" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1558" href="#fnmarker53"><span data-dcnode-id="1559" instrument_node="">↩</span></a></li><li data-dcnode-id="1550" id="fn54"><span data-dcnode-id="1556" instrument_node="">Mary Sue Coleman and Peter McPherson, “Responding to Undue Foreign Influence and Security Concerns on Campus,” Association of American Universities and Association of Public &amp; Land-Grant Universities, memo, April 22, 2019, </span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aau.edu/sites/default/files/AAU%2520Files/Key%2520Issues/Science%2520%2526%2520Security/AAU-APLU-Effective-Practices-Memo-and-Summary.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1555" instrument_node="">https://www.aau.edu/sites/default/files/AAU%20Files/Key%20Issues/Science%20%26%20Security/AAU-APLU-Effective-Practices-Memo-and-Summary.pdf</span></a><span data-dcnode-id="1553" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1551" href="#fnmarker54"><span data-dcnode-id="1552" instrument_node="">↩</span></a></li><li data-dcnode-id="1528" id="fn55"><span data-dcnode-id="1549" instrument_node="">The National Science and Technology Council established a Joint Committee on Research Environments in May 2019, with a subcommittee on research security. In September 2019, the Office of Science and Technology Policy (OSTP) published an open letter to the U.S. research community to highlight the issue of research security. OSTP announced its plan to hold meetings at academic institutions across the country to discuss lines of efforts such as coordinating outreach and engagement and assessing and managing risk. The </span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Securing American Science and Technology Act of 2019</span></em><span data-dcnode-id="1546" instrument_node=""> supports this approach and calls for OSTP to convene meetings on best practices. Universities are taking their own steps to address the issue. The Association of American Universities (AAU) and Association of Public &amp; Land-Grant Universities (APLU) sent a letter to universities in April 2019 on best practices for protecting against intellectual property theft and academic espionage. The White House Office of Science and Technology Policy,</span><em data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node=""> Update From the National Science and Technology Council Joint Committee on Research Environments</span></em><span data-dcnode-id="1543" instrument_node=""> (July 9, 2019), </span><a data-dcnode-id="1541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/wp-content/uploads/2019/07/Update-from-the-NSTC-Joint-Committee-on-Research-Environments-July-2019.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1542" instrument_node="">https://www.whitehouse.gov/wp-content/uploads/2019/07/Update-from-the-NSTC-Joint-Committee-on-Research-Environments-July-2019.pdf</span></a><span data-dcnode-id="1540" instrument_node="">; Kelvin K. Droegemeier, “Letter to the United States Research Community,” The White House Office of Science and Technology Policy, September 16, 2019, </span><a data-dcnode-id="1538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/wp-content/uploads/2019/09/OSTP-letter-to-the-US-research-community-september-2019.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1539" instrument_node="">https://www.whitehouse.gov/wp-content/uploads/2019/09/OSTP-letter-to-the-US-research-community-september-2019.pdf</span></a><span data-dcnode-id="1537" instrument_node="">; U.S. House of Representatives, </span><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Securing American Science and Technology Act of 2019, </span></em><span data-dcnode-id="1534" instrument_node="">H.R. 3038, 116th Cong., 1st sess., introduced in House May 30, 2019, </span><a data-dcnode-id="1532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/116th-congress/house-bill/3038/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1533" instrument_node="">https://www.congress.gov/bill/116th-congress/house-bill/3038/</span></a><span data-dcnode-id="1531" instrument_node="">; and Coleman and McPherson, “Responding to Undue Foreign Influence and Security Concerns on Campus.” </span><a class="footnote-return" data-dcnode-id="1529" href="#fnmarker55"><span data-dcnode-id="1530" instrument_node="">↩</span></a></li><li data-dcnode-id="1509" id="fn56"><span data-dcnode-id="1527" instrument_node="">In February 2018, the FBI disbanded the National Security Higher Education Advisory Board (NSHEAB), which had existed since 2005. Since the disbandment, members of Congress and American education leaders have publicly expressed concern about the decision and the need for a reconstituted organization to perform its functions. In April 2018, the American Council on Education (ACE) sent a letter to the FBI director on behalf of 15 American education associations and councils, requesting engagement with the national security community in a forum similar to the NSHEAB. That same month, the ACE, AAU, APLU, and Council on Governmental Relations released a joint statement expressing support for the NSHEAB and a desire for a similar forum. U.S. government officials have also expressed support for such a mechanism of collaboration between universities and the national security community. The commissioner of the U.S.-China Economic and Security Review Commission characterized the board as “vital and should be reinstated,” and FBI officials signaled in 2018 they were exploring creating a similar group. Rep. Eddie Bernice Johnson, Rep. Donald S. Beyer Jr., and Rep. Daniel W. Lipinski, Letter to Director Christopher Wray of the Federal Bureau of Investigation, U.S. House of Representatives Committee on Science, Space and Technology, May 10, 2018, </span><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.house.gov/imo/media/doc/5.10.18%2520Minority%2520NSHEAB%2520ltr%2520to%2520FBI-Johnson-Beyer-Lipinski%2520%2528002%2529.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1526" instrument_node="">https://science.house.gov/imo/media/doc/5.10.18%20Minority%20NSHEAB%20ltr%20to%20FBI-Johnson-Beyer-Lipinski%20%28002%29.pdf</span></a><span data-dcnode-id="1524" instrument_node="">; Ted Mitchell, Letter to Director Christopher Wray of the Federal Bureau of Investigation, American Council on Education, April 24, 2018, </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aau.edu/sites/default/files/AAU-Files/Key-Issues/Science-Security/Letter-FBI-NSHEAB.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1523" instrument_node="">https://www.aau.edu/sites/default/files/AAU-Files/Key-Issues/Science-Security/Letter-FBI-NSHEAB.pdf</span></a><span data-dcnode-id="1521" instrument_node="">; Joint Statement of the American Council on Education, Association of American Universities, Association of Public and Land-grant Universities and the Council on Governmental Relations, “Scholars or Spies: Foreign Plots Targeting America’s Research and Development,” Statement to the Subcommittee on Oversight and Subcommittee on Research and Technology, Committee on Science, Space and Technology, U.S. House of Representatives, April 11, 2018, </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acenet.edu/Documents/Community-Statement-House-SST-Committee-Hearing.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1520" instrument_node="">https://www.acenet.edu/Documents/Community-Statement-House-SST-Committee-Hearing.pdf</span></a><span data-dcnode-id="1518" instrument_node="">; “Scholars or Spies: Foreign Plots Targeting America’s Research and Development,” Committee on Science, Space and Technology Hearing, U.S. House of Representatives, April 11, 2018, </span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//science.house.gov/hearings/scholars-or-spies-foreign-plots-targeting-americas-research-and-development%3F1" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1517" instrument_node="">https://science.house.gov/hearings/scholars-or-spies-foreign-plots-targeting-americas-research-and-development?1</span></a><span data-dcnode-id="1515" instrument_node="">; and “FBI Director Appoints National Security Higher Education Advisory Board,” Federal Bureau of Investigation, press release, September 15, 2005, </span><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archives.fbi.gov/archives/news/pressrel/press-releases/fbi-appoints-national-security-higher-education-advisory-board" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1514" instrument_node="">https://archives.fbi.gov/archives/news/pressrel/press-releases/fbi-appoints-national-security-higher-education-advisory-board</span></a><span data-dcnode-id="1512" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1510" href="#fnmarker56"><span data-dcnode-id="1511" instrument_node="">↩</span></a></li><li data-dcnode-id="1496" id="fn57"><span data-dcnode-id="1508" instrument_node="">National Center for Science and Engineering Statistics, “2015 Doctorate Recipients From U.S. Universities” (National Science Foundation, June 2017), </span><a data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/statistics/2017/nsf17306/static/report/nsf17306.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1507" instrument_node="">https://www.nsf.gov/statistics/2017/nsf17306/static/report/nsf17306.pdf</span></a><span data-dcnode-id="1505" instrument_node="">; Matt Sheehan, “Chinese AI Talent in Six Charts,” MacroPolo.org, May 28, 2019, </span><a data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//macropolo.org/china-ai-research-talent-data/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1504" instrument_node="">https://macropolo.org/china-ai-research-talent-data/</span></a><span data-dcnode-id="1502" instrument_node="">; and Matt Sheehan, “Who Loses from Restricting Chinese Student Visas?” MacroPolo.org, May 31, 2018, </span><a data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//macropolo.org/who-loses-from-restricting-chinese-student-visas/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1501" instrument_node="">https://macropolo.org/who-loses-from-restricting-chinese-student-visas/</span></a><span data-dcnode-id="1499" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1497" href="#fnmarker57"><span data-dcnode-id="1498" instrument_node="">↩</span></a></li><li data-dcnode-id="1481" id="fn58"><span data-dcnode-id="1495" instrument_node="">John Eggerton, “Senate Bill Limits Visas for Chinese Engineers, Scientists,” Multichannel.com, May 14, 2019, </span><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.multichannel.com/news/senate-bill-limits-visas-for-chinese-engineers-scientists" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1494" instrument_node="">https://www.multichannel.com/news/senate-bill-limits-visas-for-chinese-engineers-scientists</span></a><span data-dcnode-id="1492" instrument_node="">; and U.S. Senate, </span><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">People’s Liberation Army (PLA) Visa Security Act, </span></em><span data-dcnode-id="1489" instrument_node="">S. 1451, 116th Cong., 1st sess., introduced in Senate May 14, 2019, </span><a data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cotton.senate.gov/files/documents/PLA%2520Visa%2520Security%2520Act.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1488" instrument_node="">https://www.cotton.senate.gov/files/documents/PLA%20Visa%20Security%20Act.pdf</span></a><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">.</span></em><span data-dcnode-id="1484" instrument_node=""> </span><a class="footnote-return" data-dcnode-id="1482" href="#fnmarker58"><span data-dcnode-id="1483" instrument_node="">↩</span></a></li><li data-dcnode-id="1474" id="fn59"><span data-dcnode-id="1480" instrument_node="">Eggerton, “Senate Bill Limits Visas for Chinese Engineers, Scientists”; and U.S. Senate, </span><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">People’s Liberation Army (PLA) Visa Security Act.</span></em><span data-dcnode-id="1477" instrument_node=""> </span><a class="footnote-return" data-dcnode-id="1475" href="#fnmarker59"><span data-dcnode-id="1476" instrument_node="">↩</span></a></li><li data-dcnode-id="1461" id="fn60"><span data-dcnode-id="1473" instrument_node="">See Eggerton, “Senate Bill Limits Visas for Chinese Engineers, Scientists”; and U.S. Senate, </span><em data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">People’s Liberation Army (PLA) Visa Security Act</span></em><span data-dcnode-id="1470" instrument_node="">; U.S. Senate, </span><em data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Protect Our Universities Act of 2019, </span></em><span data-dcnode-id="1467" instrument_node="">S. 1879, 116th Cong., 1st sess., introduced in Senate June 18, 2019, </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hawley.senate.gov/sites/default/files/2019-06/Bill%2520Text%2520-%2520The%2520Protect%2520Our%2520Universities%2520Act%2520of%25202019.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1466" instrument_node="">https://www.hawley.senate.gov/sites/default/files/2019-06/Bill%20Text%20-%20The%20Protect%20Our%20Universities%20Act%20of%202019.pdf</span></a><span data-dcnode-id="1464" instrument_node="">. The proposed bill does not provide a definition for what constitutes a sensitive research project and would establish a government task force to make that determination. </span><a class="footnote-return" data-dcnode-id="1462" href="#fnmarker60"><span data-dcnode-id="1463" instrument_node="">↩</span></a></li><li data-dcnode-id="1454" id="fn61"><span data-dcnode-id="1460" instrument_node="">Edward J. Ramotowski, Deputy Assistant Secretary of State, “Student Visa Integrity: Protecting Educational Opportunity and National Security,” Testimony before the Subcommittee on Border Security and Immigration, Committee on the Judiciary, U.S. Senate, June 6, 2018, 6, </span><a data-dcnode-id="1458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.judiciary.senate.gov/imo/media/doc/Ramotowski%2520Testimony.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1459" instrument_node="">https://www.judiciary.senate.gov/imo/media/doc/Ramotowski%20Testimony.pdf</span></a><span data-dcnode-id="1457" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1455" href="#fnmarker61"><span data-dcnode-id="1456" instrument_node="">↩</span></a></li><li data-dcnode-id="1447" id="fn62"><span data-dcnode-id="1453" instrument_node="">Michael Brown and Pavneet Singh, “China’s Technology Transfer Strategy: How Chinese Investments in Emerging Technology Enable A Strategic Competitor to Access the Crown Jewels of U.S. Innovation” (Defense Innovation Unit Experimental, January 2018), </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//admin.govexec.com/media/diux_chinatechnologytransferstudy_jan_2018_%281%29.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1452" instrument_node="">https://admin.govexec.com/media/diux_chinatechnologytransferstudy_jan_2018_(1).pdf</span></a><span data-dcnode-id="1450" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1448" href="#fnmarker62"><span data-dcnode-id="1449" instrument_node="">↩</span></a></li><li data-dcnode-id="1440" id="fn63"><span data-dcnode-id="1446" instrument_node="">According to a Washington-based nonprofit data analysis organization, U.S. companies exported over 13,000 shipments to PLA-linked businesses over a five-year period from 2014 to 2019. Of these shipments, over 7,400 included potentially sensitive dual-use technologies. Marcel Angliviel de la Beaumelle, Benjamin Spevack, and Devin Thorne, “Open Arms: Evaluating Global Exposure to China’s Defense-Industrial Base” (C4ADS, October 17, 2019), </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.c4reports.org/open-arms" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1445" instrument_node="">https://www.c4reports.org/open-arms</span></a><span data-dcnode-id="1443" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1441" href="#fnmarker63"><span data-dcnode-id="1442" instrument_node="">↩</span></a></li><li data-dcnode-id="1430" id="fn64"><span data-dcnode-id="1439" instrument_node="">Demetri Sevastopulo, “US targets companies with Chinese military ties,” </span><em data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Financial Times</span></em><span data-dcnode-id="1436" instrument_node="">, September 12, 2019 </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ft.com/content/5e3ce2bc-d4e2-11e9-8367-807ebd53ab77" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1435" instrument_node="">https://www.ft.com/content/5e3ce2bc-d4e2-11e9-8367-807ebd53ab77</span></a><span data-dcnode-id="1433" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1431" href="#fnmarker64"><span data-dcnode-id="1432" instrument_node="">↩</span></a></li><li data-dcnode-id="1417" id="fn65"><span data-dcnode-id="1429" instrument_node="">The United States is the No. 1 target for People’s Liberation Army officers studying abroad, as measured by PLA co-authored peer-reviewed papers. Since 2007, approximately 500 PLA scientists have studied in the United States, according to estimates by an Australian policy think tank. These efforts have borne fruit for China, as PLA researchers have co-authored over 1,100 research papers with U.S. scientists from 2006 to 2017. The proposed </span><em data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">People’s Liberation Army (PLA) Visa Security Act </span></em><span data-dcnode-id="1426" instrument_node="">would prohibit F or J visas for PLA-employed, -funded, or -sponsored individuals. Alex Joske, “Picking flowers, making honey: The Chinese military’s collaboration with foreign universities,” Report No. 10/2018 (Australian Strategic Policy Institute, October 2018), 8-9, </span><a data-dcnode-id="1424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3-ap-southeast-2.amazonaws.com/ad-aspi/2018-10/Picking%2520flowers%252C%2520making%2520honey_0.pdf%3FH5sGNaWXqMgTG_2F2yZTQwDw6OyNfH.u" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1425" instrument_node="">https://s3-ap-southeast-2.amazonaws.com/ad-aspi/2018-10/Picking%20flowers%2C%20making%20honey_0.pdf?H5sGNaWXqMgTG_2F2yZTQwDw6OyNfH.u</span></a><span data-dcnode-id="1423" instrument_node="">; Eggerton, “Senate Bill Limits Visas for Chinese Engineers, Scientists”; and U.S. Senate, </span><em data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">People’s Liberation Army (PLA) Visa Security Act</span></em><span data-dcnode-id="1420" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1418" href="#fnmarker65"><span data-dcnode-id="1419" instrument_node="">↩</span></a></li><li data-dcnode-id="1410" id="fn66"><span data-dcnode-id="1416" instrument_node="">Anja Manuel has proposed a similar concept of a “Tech 10” grouping. See Anja Manuel, “How to Win the Technology Race with China,” FSI.Stanford.edu, June 18, 2019, </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fsi.stanford.edu/news/how-win-technology-race-china" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1415" instrument_node="">https://fsi.stanford.edu/news/how-win-technology-race-china</span></a><span data-dcnode-id="1413" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1411" href="#fnmarker66"><span data-dcnode-id="1412" instrument_node="">↩</span></a></li><li data-dcnode-id="1406" id="fn67"><span data-dcnode-id="1409" instrument_node="">A recent report on AI standards by the National Institute of Standards and Technology recommended that the U.S. government: “Strategically engage internationally to advance AI standards for U.S. economic and national security needs,” including: “Champion U.S. AI standards priorities in AI standards development activities around the world;” “Accelerate the exchange of information between Federal officials and counterparts in like-minded countries through partnering on development of AI standards and related tools;” and “Track and understand AI standards development strategies and initiatives of foreign governments and entities.” These recommendations should be implemented and expanded beyond AI to include other critical technologies. National Institute of Standards and Technology, “U.S. Leadership in AI: A Plan for Federal Engagement in Developing Technical Standards and Related Tools,” 24. </span><a class="footnote-return" data-dcnode-id="1407" href="#fnmarker67"><span data-dcnode-id="1408" instrument_node="">↩</span></a></li><li data-dcnode-id="1399" id="fn68"><span data-dcnode-id="1405" instrument_node="">The U.S. government has played a largely passive role on 5G security standards relative to U.S. national security interests, contributing only 0.5 percent of submissions. Charles Clancy, Bradley Professor of Cybersecurity, Virginia Tech, “Hearing on 5G: The Impact on National Security, Intellectual Property, and Competition,” Questions for the Record before the Committee on the Judiciary, U.S. Senate, June 4, 2019, 2, </span><a data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.judiciary.senate.gov/imo/media/doc/Clancy%2520Responses%2520to%2520QFRs.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1404" instrument_node="">https://www.judiciary.senate.gov/imo/media/doc/Clancy%20Responses%20to%20QFRs.pdf</span></a><span data-dcnode-id="1402" instrument_node="">. </span><a class="footnote-return" data-dcnode-id="1400" href="#fnmarker68"><span data-dcnode-id="1401" instrument_node="">↩</span></a></li><li data-dcnode-id="1395" id="fn69"><span data-dcnode-id="1398" instrument_node="">Chinese companies and government research institutes hold the largest number of leadership positions in the International Telecommunication Union 5G-related standards-setting bodies. In the 3GPP process for 5G standards, independent U.S. experts have accused China of “flooding” the process, contributing 59 percent of submissions on 5G security in 2018, compared with 23 percent from Europe and 10 percent from the United States. </span><a class="footnote-return" data-dcnode-id="1396" href="#fnmarker69"><span data-dcnode-id="1397" instrument_node="">↩</span></a></li><li data-dcnode-id="1376" id="fn70"><span data-dcnode-id="1394" instrument_node="">U.S.-China Economic and Security Review Commission, </span><em data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">2018 Report to Congress</span></em><span data-dcnode-id="1391" instrument_node=""> (November 2018), 454, </span><a data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.uscc.gov/sites/default/files/annual_reports/2018%2520Annual%2520Report%2520to%2520Congress.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1390" instrument_node="">https://www.uscc.gov/sites/default/files/annual_reports/2018%20Annual%20Report%20to%
