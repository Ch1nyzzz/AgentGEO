</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="4424"><span data-dcnode-id="4599" instrument_node="">
</span><h2 data-dcnode-id="4597" id="foundational-principles-of-u-s-strategy-in-the-indo-pacific"><span data-dcnode-id="4598" instrument_node="">Foundational Principles of U.S. Strategy in the Indo-Pacific</span></h2><span data-dcnode-id="4596" instrument_node="">
</span><p data-dcnode-id="4591"><span data-dcnode-id="4595" instrument_node="">The United States and China are locked in strategic competition over the future of the Indo-Pacific—the most populous, dynamic, and consequential region in the world. At stake are competing visions for the rules, norms, and institutions that will govern international relations in the decades to come.</span><sup data-dcnode-id="4592"><a aria-controls="footnote1" aria-expanded="false" class="footnote-marker" data-dcnode-id="4593" href="#fn1" id="fnmarker1" role="button"><span data-dcnode-id="4594" instrument_node="">1</span></a></sup></p><span data-dcnode-id="4590" instrument_node="">
</span><p data-dcnode-id="4581"><span data-dcnode-id="4589" instrument_node="">The U.S. government aspires toward a “free and open” Indo-Pacific, defined by respect for sovereignty and the independence of nations, peaceful resolution of disputes, free and fair trade, adherence to international law, and greater transparency and good governance.</span><sup data-dcnode-id="4586"><a aria-controls="footnote2" aria-expanded="false" class="footnote-marker" data-dcnode-id="4587" href="#fn2" id="fnmarker2" role="button"><span data-dcnode-id="4588" instrument_node="">2</span></a></sup><span data-dcnode-id="4585" instrument_node=""> For the United States, successful realization of this regional order would include strong U.S. alliances and security partnerships; a military able to operate throughout the region, consistent with international law; U.S. firms with access to leading markets, and benefiting from updated technology standards, investment rules, and trade agreements; U.S. participation in effective regional and international institutions; and the spread of democracy and individual freedoms in the context of an open information environment and vibrant civil society.</span><sup data-dcnode-id="4582"><a aria-controls="footnote3" aria-expanded="false" class="footnote-marker" data-dcnode-id="4583" href="#fn3" id="fnmarker3" role="button"><span data-dcnode-id="4584" instrument_node="">3</span></a></sup></p><span data-dcnode-id="4580" instrument_node="">
</span><p data-dcnode-id="4571"><span data-dcnode-id="4579" instrument_node="">By contrast, China is driving toward a more closed and illiberal future for the Indo-Pacific, core aspects of which would undermine vital U.S. interests.</span><sup data-dcnode-id="4576"><a aria-controls="footnote4" aria-expanded="false" class="footnote-marker" data-dcnode-id="4577" href="#fn4" id="fnmarker4" role="button"><span data-dcnode-id="4578" instrument_node="">4</span></a></sup><span data-dcnode-id="4575" instrument_node=""> Key features of China-led order would include the People’s Liberation Army controlling the South and East China Seas; regional countries sufficiently coerced into acquiescing to China’s preferences on military, economic, and diplomatic matters; an economic order in which Beijing sets trade and investment rules in its favor, with dominance over leading technologies, data, and standards; and Beijing with de facto rule over Taiwan and agenda-setting power over regional institutions. The order would be further characterized by weak civil society, a dearth of independent media, and the gradual spread of authoritarianism, reinforced by the proliferation of China’s high-tech surveillance state. The net result would be a less secure, less prosperous United States that is less able to exert power and influence in the world.</span><sup data-dcnode-id="4572"><a aria-controls="footnote5" aria-expanded="false" class="footnote-marker" data-dcnode-id="4573" href="#fn5" id="fnmarker5" role="button"><span data-dcnode-id="4574" instrument_node="">5</span></a></sup></p><span data-dcnode-id="4570" instrument_node="">
</span><p data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">Ultimately, the competition between the United States and China in the Indo-Pacific is a contest over which of these futures will come closer to fruition, even as neither is likely to attain in its entirety. In the two years since the 2017 National Security Strategy and 2018 National Defense Strategy aptly identified this competition over the regional order in Asia, the U.S. government has taken initial steps toward its goal of a free and open region. On balance, however, critical areas of U.S. policy remain inconsistent, uncoordinated, underresourced, and—to be blunt—uncompetitive and counterproductive to advancing U.S. values and interests. 
 </span></p><span data-dcnode-id="4567" instrument_node="">
</span><p data-dcnode-id="4561"><span data-dcnode-id="4566" instrument_node="">This independent assessment—mandated by the U.S. Congress in the 2019 National Defense Authorization Act—is intended to help close the considerable gap between the current administration’s stated aspirations for a free and open Indo-Pacific and the actual implementation of policies to advance that vision. Specifically, Congress called for “an assessment of the geopolitical conditions in the Indo-Pacific region that are necessary for the successful implementation of the National Defense Strategy,” with a particular focus on how to “support United States military requirements for forward defense, assured access, extensive forward basing, and alliance and partnership formation and strengthening in such region.”</span><sup data-dcnode-id="4563"><a aria-controls="footnote6" aria-expanded="false" class="footnote-marker" data-dcnode-id="4564" href="#fn6" id="fnmarker6" role="button"><span data-dcnode-id="4565" instrument_node="">6</span></a></sup><span data-dcnode-id="4562" instrument_node="">
</span></p><span data-dcnode-id="4560" instrument_node="">
</span><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">This report examines how the U.S. government as a whole, not just the Department of Defense, can realize these outcomes. Although the focus of this assessment is on the Indo-Pacific, it is critical to underscore that the China challenge is a global phenomenon, and many of the actions recommended in this report should be taken to bolster U.S. competitiveness beyond the region.
 </span></p><span data-dcnode-id="4557" instrument_node="">
</span><p data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Consistent with the bipartisan mission of the Center for a New American Security, the report’s authors have collectively served on both sides of the aisle in Congress and in the administrations of Presidents George W. Bush, Barack Obama, and Donald Trump at the White House, State Department, Defense Department, Treasury Department, Central Intelligence Agency, and Office of the U.S. Trade Representative. 
 </span></p><span data-dcnode-id="4554" instrument_node="">
</span><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Included herein are nearly a hundred specific and actionable policy recommendations across critical vectors of American competitiveness in the Indo-Pacific. Before turning to these recommendations, the remainder of this section describes six core principles that undergird the assessment and should form the foundations of U.S. strategy in the Indo-Pacific region. 
</span></p><span data-dcnode-id="4551" instrument_node="">
</span><h3 data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">1. The U.S. government should approach 	strategic competition with China as an urgent priority.</span></h3><span data-dcnode-id="4548" instrument_node="">
</span><p data-dcnode-id="4542"><span data-dcnode-id="4547" instrument_node="">Business as usual in Washington will be insufficient to address the China challenge in the Indo-Pacific. Among the most important contributions of the National Defense Strategy is this simple statement: “Inter-state strategic competition, not terrorism, is now the primary concern in U.S. national security.”</span><sup data-dcnode-id="4544"><a aria-controls="footnote7" aria-expanded="false" class="footnote-marker" data-dcnode-id="4545" href="#fn7" id="fnmarker7" role="button"><span data-dcnode-id="4546" instrument_node="">7</span></a></sup><span data-dcnode-id="4543" instrument_node=""> This is correct: The China challenge—too often described as a problem for the future—is here and now.</span></p><span data-dcnode-id="4541" instrument_node="">
</span><p data-dcnode-id="4532"><span data-dcnode-id="4540" instrument_node="">As is manifest throughout this report, the United States is at risk of losing strategic advantage to China across several critical domains and in ways that would have deep and enduring effects on America’s ability to advance its values and interests in the region. This is no reason for panic or pessimism, but a number of troubling trends should nevertheless sharpen America’s strategic focus on the scale and scope of the China challenge. The local military balance in Asia, for instance, is already approaching parity in certain areas, putting at risk America’s ability to deter Chinese aggression.</span><sup data-dcnode-id="4537"><a aria-controls="footnote8" aria-expanded="false" class="footnote-marker" data-dcnode-id="4538" href="#fn8" id="fnmarker8" role="button"><span data-dcnode-id="4539" instrument_node="">8</span></a></sup><span data-dcnode-id="4536" instrument_node=""> Meanwhile, China is poised to surpass the United States in gross domestic product, while racing ahead to gain technological advantage in key areas such as artificial intelligence, quantum computing, and genomics. Beijing is similarly outpacing Washington with a more focused and innovative approach to diplomacy and economic development in the Indo-Pacific. America, by comparison, has too often been distracted, reactive, and flat-footed. Moreover, Washington continues to disproportionally direct federal resources toward Europe and the Middle East, which is inconsistent with the National Security Strategy and National Defense Strategy.</span><sup data-dcnode-id="4533"><a aria-controls="footnote9" aria-expanded="false" class="footnote-marker" data-dcnode-id="4534" href="#fn9" id="fnmarker9" role="button"><span data-dcnode-id="4535" instrument_node="">9</span></a></sup></p><span data-dcnode-id="4531" instrument_node="">
</span><p data-dcnode-id="4529"><span data-dcnode-id="4530" instrument_node="">China’s resurgence is partially the result of a natural redistribution of power and influence in the world. In many areas, however, eroding U.S. advantages in the Indo-Pacific are within America’s power to arrest and reverse. Doing so will require substantially greater attention and resources than have been applied to date. Renewing American competitiveness will not come cheaply—several recommendations herein call for committing considerable amounts of money, senior-level attention, and bureaucratic focus. This demands prioritizing the China challenge in the Indo-Pacific not only with a greater sense of urgency, but also with a willingness to make hard tradeoffs in other regions and with other issues. Managing the China challenge should be an organizing principle of U.S. foreign policy, not just one among many other pressing priorities in the world. 
</span></p><span data-dcnode-id="4528" instrument_node="">
</span><h3 data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">2. U.S. strategy must be both comprehensive and coordinated across multiple domains.</span></h3><span data-dcnode-id="4525" instrument_node="">
</span><p data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">The United States needs a strategy toward the Indo-Pacific that is both comprehensive in breadth and coordinated in execution. Unlike the Cold War with the Soviet Union, the competition with China will not be waged principally in the military sphere; sustaining deterrence will be essential but not sufficient. A core argument of this report is that bending the Indo-Pacific to a freer and more open future will require the United States to compete effectively across several critical domains, including economics, technology, diplomacy, ideology, governance, and human capital. </span></p><span data-dcnode-id="4522" instrument_node="">
</span><p data-dcnode-id="4517"><span data-dcnode-id="4521" instrument_node="">Moreover, the whole of the competition is greater than the sum of its parts. Seemingly distinct issues interact and are mutually reinforcing in powerful ways: Technological advantage is a key driver of economic and military power; economic influence shapes decisions on politics and security; diplomacy reinforces military alliances and partnerships; the information environment shapes perceptions of relative power; and competing effectively in every one of these domains requires serious talent management strategies with commensurate investments in human capital. None of these areas should be treated as disparate arenas of the competition.</span><sup data-dcnode-id="4518"><a aria-controls="footnote10" aria-expanded="false" class="footnote-marker" data-dcnode-id="4519" href="#fn10" id="fnmarker10" role="button"><span data-dcnode-id="4520" instrument_node="">10</span></a></sup></p><span data-dcnode-id="4516" instrument_node="">
</span><p data-dcnode-id="4510"><span data-dcnode-id="4515" instrument_node="">The demand for a comprehensive strategy toward China has significant implications for how the U.S. government should organize in response. Without question, Washington will need a whole-of-government approach that coordinates U.S. policy across multiple issue areas.</span><sup data-dcnode-id="4512"><a aria-controls="footnote11" aria-expanded="false" class="footnote-marker" data-dcnode-id="4513" href="#fn11" id="fnmarker11" role="button"><span data-dcnode-id="4514" instrument_node="">11</span></a></sup><span data-dcnode-id="4511" instrument_node=""> This will require institutional innovations in the U.S. government that cut across traditional bureaucratic lines. Moreover, as is argued throughout this report, Washington will need to enlist a broader set of stakeholders in bolstering U.S. competitiveness, including technology companies, media, universities, civil society, and the private sector. Viewing the China competition through the lens of a whole-of-society approach is necessary and will require further reforms to the ways in which U.S. policy is made and implemented. 
</span></p><span data-dcnode-id="4509" instrument_node="">
</span><h3 data-dcnode-id="4507"><span data-dcnode-id="4508" instrument_node="">3. Strengthening America’s own competitiveness is vital to realizing a free and open Indo-Pacific.</span></h3><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">America’s own competitiveness will be the dominant determinant of how the regional order in the Indo-Pacific evolves. U.S. policymakers should—in every dimension of the competition—begin by assessing what Washington can do to make America run faster and jump higher. The United States should take many of the actions recommended herein regardless, but doing so is all the more urgent in the context of strategic competition with China. As each section of this report demonstrates, there is a panoply of steps the United States can take to bolster its own power, thereby sustaining key advantages and reversing areas of strategic decline in the Indo-Pacific.</span></p><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4497"><span data-dcnode-id="4502" instrument_node="">U.S. policymakers should proceed with the conviction and confidence that the foundations of American power are strong: Its people, demography, geography, abundant energy resources, dynamic private sector, powerful alliances and partnerships, leading universities, robust democracy, and innovative spirit give the United States everything it needs to preserve and advance its interests in the Indo-Pacific.</span><sup data-dcnode-id="4499"><a aria-controls="footnote12" aria-expanded="false" class="footnote-marker" data-dcnode-id="4500" href="#fn12" id="fnmarker12" role="button"><span data-dcnode-id="4501" instrument_node="">12</span></a></sup><span data-dcnode-id="4498" instrument_node=""> Many of these strengths stand in stark contrast to a number of obstacles China faces, including its slowing economy, poor demographics, devastated environment, repressive government, and weak rule of law.</span></p><span data-dcnode-id="4496" instrument_node="">
</span><p data-dcnode-id="4494"><span data-dcnode-id="4495" instrument_node="">Nevertheless, U.S. advantages are neither preordained nor permanent. As is outlined throughout this report, competing more effectively in the region will require greater focus on sustaining core sources of U.S. power and cultivating new ones. This should include protecting the strength of the U.S. financial system, putting greater resources toward research and development, investing in education, developing human capital, leveraging high-skilled immigration, and defending America’s democratic way of life. 
 </span></p><span data-dcnode-id="4493" instrument_node="">
</span><p data-dcnode-id="4491"><span data-dcnode-id="4492" instrument_node="">At the same time, the U.S. government will have to be resourced to reflect the central importance of the Indo-Pacific, ensuring that the relevant bureaucracies—including the State Department, Commerce Department, Treasury Department, Justice Department, and White House—have the people and skills they need to compete in the 21st century. Beyond the issue of resources, U.S. policymakers will have to exhibit high levels of entrepreneurship inside the U.S. government. Existing U.S. departments and agencies will have to be supplemented with new institutions designed to develop and coordinate policy on critical issues, including development finance and public diplomacy. In response to the China challenge, U.S. policymakers will be further tasked with developing new tools of economic statecraft and novel military operational concepts. 
</span></p><span data-dcnode-id="4490" instrument_node="">
</span><h3 data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">4. The United States must compete with and for allies and partners.</span></h3><span data-dcnode-id="4487" instrument_node="">
</span><p data-dcnode-id="4481"><span data-dcnode-id="4486" instrument_node="">At its core, the China challenge in the Indo-Pacific is a problem of both scale and geography. Although the United States still possesses several natural advantages in the region, U.S. policymakers will find it increasingly difficult to generate unilateral solutions to the coercive power Beijing can bring to bear with its growing military and outsized domestic market. This means, in part, that it is no longer viable for the United States to pursue a policy aimed at achieving uncontested dominance.</span><sup data-dcnode-id="4483"><a aria-controls="footnote13" aria-expanded="false" class="footnote-marker" data-dcnode-id="4484" href="#fn13" id="fnmarker13" role="button"><span data-dcnode-id="4485" instrument_node="">13</span></a></sup><span data-dcnode-id="4482" instrument_node=""> Instead, as is argued throughout this assessment, coalition building will be essential on nearly every major issue in the Indo-Pacific. </span></p><span data-dcnode-id="4480" instrument_node="">
</span><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">The United States is entering this phase of the competition with China with a key advantage in alliances—with Australia and Japan, as well as NATO, the Philippines, South Korea, and Thailand—and several partnerships—including with India, Indonesia, Malaysia, Singapore, Taiwan, and Vietnam—that harbor the potential to play consequential roles in the region. Nevertheless, U.S. policy will have to reflect the reality that countries in the region all view China to differing degrees as both an economic opportunity and geographic reality. As a result, attempts to construct an explicitly anti-China alliance will fail. At the same time, countries in the region, by and large, do not want to live in an illiberal China-led order. This presents opportunities for the United States to build meaningful regional partnerships.</span></p><span data-dcnode-id="4477" instrument_node="">
</span><p data-dcnode-id="4471"><span data-dcnode-id="4476" instrument_node="">Nevertheless, Washington will have to address the pervasive doubts in the Indo-Pacific about the enduring commitment of the United States to the region.</span><sup data-dcnode-id="4473"><a aria-controls="footnote14" aria-expanded="false" class="footnote-marker" data-dcnode-id="4474" href="#fn14" id="fnmarker14" role="button"><span data-dcnode-id="4475" instrument_node="">14</span></a></sup><span data-dcnode-id="4472" instrument_node=""> As long as capitals are uncertain about America’s staying power, they will be reluctant to partner with Washington or stand up to Beijing. In the absence of a more competitive U.S. strategy, other countries will perceive the inevitability of a Sino-centric region, thereby coming to accept certain elements of China’s illiberal order regardless of their preferences for American leadership. It is therefore imperative for the United States to provide viable alternatives across issue areas that address the long-term economic, political, and security interests of regional states, and to stick to its commitments. </span></p><span data-dcnode-id="4470" instrument_node="">
</span><p data-dcnode-id="4468"><span data-dcnode-id="4469" instrument_node="">U.S. strategy should further focus on strengthening the resiliency of regional states against China’s political, economic, and military coercion. Bolstering U.S. partners can take a number of forms, as are recommended throughout this report, including strengthening regional institutions, offering targeted military assistance, supporting civil society and anti-corruption initiatives, and providing development finance and human capital training. Rather than being cast as anti-China, this engagement should lead with an affirmative agenda of prioritizing sovereignty and political independence that is free from coercion. 
 </span></p><span data-dcnode-id="4467" instrument_node="">
</span><p data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">Finally, Washington should leave the door open for cooperation with Beijing, even as it mounts a more competitive strategy in the region. There are areas where, if possible, it would be squarely in America’s interest to collaborate with China in the Indo-Pacific, including climate change and energy, global public health, and nonproliferation. Pursuing cooperative efforts with Beijing will not only advance U.S. interests but also send an important message to the region that the United States is not seeking an all-out confrontation with China. 
</span></p><span data-dcnode-id="4464" instrument_node="">
</span><h3 data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">5. The United States should be proactive in building regional order in the Indo-Pacific, establishing new rules, norms, and institutions.</span></h3><span data-dcnode-id="4461" instrument_node="">
</span><p data-dcnode-id="4455"><span data-dcnode-id="4460" instrument_node="">In pursuit of a free and open Indo-Pacific, the United States will have to present an affirmative vision that goes beyond blunting China’s illiberal order. Critically, however, Washington’s aspirations for the region’s future cannot simply be cast as a return to the past. The postwar international order played a vital role in bringing peace and prosperity to Asia, but it has proved insufficient in curbing China’s ability and desire to challenge vital U.S. interests in the region.</span><sup data-dcnode-id="4457"><a aria-controls="footnote15" aria-expanded="false" class="footnote-marker" data-dcnode-id="4458" href="#fn15" id="fnmarker15" role="button"><span data-dcnode-id="4459" instrument_node="">15</span></a></sup><span data-dcnode-id="4456" instrument_node=""> Moreover, new contested domains—including in economics, defense, technology, and information—are emerging in the Indo-Pacific for which the existing rules and institutions are largely silent or inadequate.</span></p><span data-dcnode-id="4454" instrument_node="">
</span><p data-dcnode-id="4452"><span data-dcnode-id="4453" instrument_node="">As a result, U.S. strategy in the Indo-Pacific should focus on revising the regional order with updated norms, rules, and institutions that are better suited to the realities of the 21st century. To some extent, this will mean modernizing existing bodies. That alone, however, will not be sufficient. Each section of this report offers recommendations for the building blocks of a new regional order that goes beyond simply reinforcing the postwar system. These include specific proposals for advancing new trade and technology standards, new multilateral mechanisms to coordinate on technology issues, new human rights norms associated with digital freedom and access to information, a more networked regional security architecture, and new cooperative efforts on issues such as artificial intelligence, telecommunications, and development finance. Rather than being largely reactive to China’s new initiatives, U.S. policymakers should ensure that innovation and entrepreneurship are the watchwords of America’s approach to the Indo-Pacific.
</span></p><span data-dcnode-id="4451" instrument_node="">
</span><h3 data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">6. There is no easy way out of the China challenge.
</span></h3><span data-dcnode-id="4448" instrument_node="">
</span><p data-dcnode-id="4442"><span data-dcnode-id="4447" instrument_node="">Achieving long-term stability in the Indo-Pacific will first require a period of intensified competition with China. Even as the United States aspires to a more cooperative relationship—or at least a better-managed competition with Beijing—current realities necessitate greater tension in the near term.</span><sup data-dcnode-id="4444"><a aria-controls="footnote16" aria-expanded="false" class="footnote-marker" data-dcnode-id="4445" href="#fn16" id="fnmarker16" role="button"><span data-dcnode-id="4446" instrument_node="">16</span></a></sup><span data-dcnode-id="4443" instrument_node=""> At present, the continued erosion of U.S. strategic advantage is creating a permissive environment for Chinese assertiveness and increasing the likelihood of confrontation and conflict. A more competitive United States could reverse these trends and help stabilize Asia, setting the context for a new strategic equilibrium with Beijing, provided that U.S. policy is sophisticated enough to avoid a counterproductive rivalry.</span></p><span data-dcnode-id="4441" instrument_node="">
</span><p data-dcnode-id="4439"><span data-dcnode-id="4440" instrument_node="">Public education and engagement will be essential components of this effort: A more competitive U.S. strategy toward China will be neither effective nor sustainable without the informed support of the American people. Washington will have to accept and acknowledge that rising to the China challenge will require difficult sacrifices and tradeoffs. In doing so, U.S. leaders will have to explain the considerable stakes in the Indo-Pacific and be clear—especially with key stakeholders, including in industry and academia—about the requisite costs of renewing American competitiveness.
 </span></p><span data-dcnode-id="4438" instrument_node="">
</span><p data-dcnode-id="4436"><span data-dcnode-id="4437" instrument_node="">In particular, defending against China’s predatory behavior and protecting key areas of competitive advantage will, in certain areas, affect economic efficiency and openness. There will be necessary costs to the United States’ pursuing more secure and diversified supply chains, stronger export controls and investment restrictions, and enhanced visa-screening and counterespionage capabilities. Washington will have to be vigilant in striking the right balance between selective decoupling and continued interdependence, building appropriate boundaries and safeguards while still preserving the enormous benefits America accrues from its open society and economy.
 </span></p><span data-dcnode-id="4435" instrument_node="">
</span><p data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">There will also be specific issues—such as the internment camps in Xinjiang, intellectual property theft, and overseas political influence operations—where the United States will have to confront the Chinese Communist Party’s most pernicious forms of coercion and illiberalism, even when Beijing is likely to retaliate. The United States should not needlessly provoke China, but neither can Washington be paralyzed by risk aversion. 
 </span></p><span data-dcnode-id="4432" instrument_node="">
</span><p data-dcnode-id="4426"><span data-dcnode-id="4431" instrument_node="">Building public support for the policies recommended herein will require U.S. leaders to put forward clearer arguments about what is actually at stake for the American people beyond abstract or inside-the-Beltway assertions about the importance of U.S. leadership and the liberal international order. This should include public understanding of the real economic costs to Americans at all income levels if U.S. companies steadily lose access to leading markets; continue to be the victims of intellectual property theft and forced technology transfer; and are increasingly disadvantaged by China’s anti-competitive economic policies and China-led standards, investment rules, and trading blocs. Similarly, there should be more public awareness of the heightened risk of conflict in Asia if the United States finds itself with weaker alliances, fewer security partners, and a military forced to operate at greater distances.</span><sup data-dcnode-id="4428"><a aria-controls="footnote17" aria-expanded="false" class="footnote-marker" data-dcnode-id="4429" href="#fn17" id="fnmarker17" role="button"><span data-dcnode-id="4430" instrument_node="">17</span></a></sup><span data-dcnode-id="4427" instrument_node=""> Finally, if China’s model and tools of censorship, surveillance, and social credit systems become acceptable features of domestic governance and international affairs, there will be harmful effects on the individual freedoms of people around the world, including in the United States. </span></p><span data-dcnode-id="4425" instrument_node="">
</span></div><span data-dcnode-id="4423" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="4029"><span data-dcnode-id="4422" instrument_node="">
</span><h2 data-dcnode-id="4420" id="policy-recommendations-in-sum"><span data-dcnode-id="4421" instrument_node="">Policy Recommendations in Sum</span></h2><span data-dcnode-id="4419" instrument_node="">
</span><h3 data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">I. Sustaining Conventional Military Deterrence</span></h3><span data-dcnode-id="4416" instrument_node="">
</span><h4 data-dcnode-id="4412"><a data-dcnode-id="4414" href="#develop"><span data-dcnode-id="4415" instrument_node="">Develop</span></a><span data-dcnode-id="4413" instrument_node=""> a new American way of war</span></h4><span data-dcnode-id="4411" instrument_node="">
</span><ul data-dcnode-id="4400"><li data-dcnode-id="4409"><span data-dcnode-id="4410" instrument_node="">Design a new military strategy and novel joint operational concepts for China contingencies. 
 </span></li><li data-dcnode-id="4407"><span data-dcnode-id="4408" instrument_node="">Build a more resilient architecture for command, control, communications, computers, intelligence, surveillance and reconnaissance (C4ISR). 
 </span></li><li data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Build a combat-credible posture in the Indo-Pacific. 
 </span></li><li data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">Increase investments in critical munitions and munitions development. 
 </span></li><li data-dcnode-id="4401"><span data-dcnode-id="4402" instrument_node="">Develop concepts and capabilities for contested logistics. 
 </span></li></ul><span data-dcnode-id="4399" instrument_node="">
</span><h4 data-dcnode-id="4395"><a data-dcnode-id="4397" href="#empower"><span data-dcnode-id="4398" instrument_node="">Empower</span></a><span data-dcnode-id="4396" instrument_node=""> the Defense Department to harness America’s national security innovation base</span></h4><span data-dcnode-id="4394" instrument_node="">
</span><ul data-dcnode-id="4387"><li data-dcnode-id="4392"><span data-dcnode-id="4393" instrument_node="">Reform Defense Department organizations and processes, including requirements, programming and budgeting, and acquisition.

 </span></li><li data-dcnode-id="4355"><span data-dcnode-id="4356" instrument_node="">Support U.S. innovation in artificial intelligence and machine learning by increasing the availability of government data and computing resources.

 </span></li><li data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Establish multilateral export controls on semiconductor manufacturing equipment and increase federal funding for next-generation hardware.

 </span></li><li data-dcnode-id="4327"><span data-dcnode-id="4328" instrument_node="">Develop better collaboration between U.S. law enforcement and universities.
 </span></li><li data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Improve visa screening for espionage risks. 
 </span></li><li data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">Expand sanctions authorities to cut off from the U.S. market and financial system Chinese firms that steal U.S. technology.

</span><ul data-dcnode-id="4307"><li data-dcnode-id="4312"><span data-dcnode-id="4313" instrument_node="">Create a new grouping of advanced democracies to coordinate on technology policy.
 </span></li><li data-dcnode-id="4310"><span data-dcnode-id="4311" instrument_node="">Engage more proactively in multilateral bodies that set technology standards.
 </span></li><li data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">Lead internationally and engage with China on developing norms and principles for the use of emerging technologies.</span></li></ul><span data-dcnode-id="4306" instrument_node="">

</span></h3><span data-dcnode-id="4301" instrument_node="">
</span><h4 data-dcnode-id="4297"><a data-dcnode-id="4299" href="#promote"><span data-dcnode-id="4300" instrument_node="">Promote</span></a><span data-dcnode-id="4298" instrument_node=""> U.S. trade and investment in the Indo-Pacific</span></h4><span data-dcnode-id="4296" instrument_node="">
</span><ul data-dcnode-id="4285"><li data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">Catalyze greater U.S. investment in the Indo-Pacific through the new U.S. International Development Finance Corporation, bilateral investment treaties, and the Export-Import Bank.
 </span></li><li data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">Enhance U.S. commercial diplomacy in the Indo-Pacific at the Treasury, Commerce, and State departments.
 </span></li><li data-dcnode-id="4290"><span data-dcnode-id="4291" instrument_node="">Expand technical assistance programs that bolster U.S. investment in the Indo-Pacific, including the Infrastructure Transaction and Assistance Network.
 </span></li><li data-dcnode-id="4288"><span data-dcnode-id="4289" instrument_node="">Continue to support an open global trade and investment regime for energy resources.

</span><ul data-dcnode-id="4269"><li data-dcnode-id="4276"><span data-dcnode-id="4277" instrument_node="">Promote financial market transparency by passing beneficial ownership disclosure requirements for U.S. companies.

 </span></li><li data-dcnode-id="4272"><span data-dcnode-id="4273" instrument_node="">Discourage challenger currencies and payments.
 </span></li><li data-dcnode-id="4270"><span data-dcnode-id="4271" instrument_node="">Develop and exercise strategic concepts for coercive economic statecraft.

</span><h4 data-dcnode-id="4263"><strong data-dcnode-id="4264"><a data-dcnode-id="4266" href="#support"><span data-dcnode-id="4267" instrument_node="">Support</span></a><span data-dcnode-id="4265" instrument_node=""> U.S. leadership and innovation in financial technologies</span></strong></h4><span data-dcnode-id="4262" instrument_node="">
</span><ul data-dcnode-id="4255"><li data-dcnode-id="4260"><span data-dcnode-id="4261" instrument_node="">Create a regulatory framework for financial technology acceleration to compete against foreign jurisdictions, including China.
 </span></li><li data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Encourage development of blockchain payments applications.
 </span></li><li data-dcnode-id="4256"><span data-dcnode-id="4257" instrument_node="">Fund and support rigorous education and academic research in blockchain technology.
 </span></li></ul><span data-dcnode-id="4254" instrument_node="">
</span><h4 data-dcnode-id="4249"><strong data-dcnode-id="4250"><a data-dcnode-id="4252" href="#revise"><span data-dcnode-id="4253" instrument_node="">Revise</span></a><span data-dcnode-id="4251" instrument_node=""> the economic order in the Indo-Pacific and globally</span></strong></h4><span data-dcnode-id="4248" instrument_node="">
</span><ul data-dcnode-id="4235"><li data-dcnode-id="4246"><span data-dcnode-id="4247" instrument_node="">Pursue new high-standard multilateral trade agreements in the Indo-Pacific and Europe.
 </span></li><li data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">Use tariffs sparingly against allies and partners.
 </span></li><li data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">Enhance U.S. cooperation with the World Bank and Asian Development Bank to support high-quality infrastructure projects in the Indo-Pacific.
 </span></li><li data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Lead on setting high standards for development finance.
 </span></li><li data-dcnode-id="4238"><span data-dcnode-id="4239" instrument_node="">Update, strengthen, and reform the World Trade Organization.
 </span></li><li data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Make any additional tariffs against China more targeted.
</span></li></ul><span data-dcnode-id="4234" instrument_node="">
</span><h3 data-dcnode-id="4231"><strong data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">IV. Strengthening American Diplomacy</span></strong></h3><span data-dcnode-id="4230" instrument_node="">
</span><h4 data-dcnode-id="4226"><a data-dcnode-id="4228" href="#enhance"><span data-dcnode-id="4229" instrument_node="">Enhance</span></a><span data-dcnode-id="4227" instrument_node=""> diplomacy with the highest priority allies and partners in the Indo-Pacific</span></h4><span data-dcnode-id="4225" instrument_node="">
</span><ul data-dcnode-id="4210"><li data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">Host a regular trilateral dialogue between the U.S., Japanese, and Australian national security advisors.
 </span></li><li data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">Upgrade and institutionalize high-level bilateral diplomacy with key Asian partners, particularly India, Indonesia, and Vietnam.
 </span></li><li data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Strengthen diplomatic and security ties with Taiwan.
 </span></li><li data-dcnode-id="4217"><span data-dcnode-id="4218" instrument_node="">Intensify cooperation with Europe on Indo-Pacific diplomacy.
 </span></li><li data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Proactively seek to resolve disputes between allies and partners, including in the South China Sea, as well as between Japan and South Korea. 
 </span></li><li data-dcnode-id="4213"><span data-dcnode-id="4214" instrument_node="">Continue to prioritize assistance to Asian states on energy and climate resilience and rejoin the Paris climate agreement.

</span><ul data-dcnode-id="4195"><li data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">Shift International Military Education and Training funding to the Defense Department and create a similar State Department program for foreign diplomats.
 </span></li><li data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">Increase high-level visits to key allies and partners in the Indo-Pacific, including by U.S. congresspersons, mayors, and governors, and create a State-Commerce initiative to brief these officials properly.
 </span></li><li data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">Ramp up youth exchanges and establish additional Fulbright Universities in the Indo-Pacific.

 </span></li><li data-dcnode-id="4185"><span data-dcnode-id="4186" instrument_node="">Join or increase participation in South Asian and Indo-Pacific multilateral organizations where the United States is not sufficiently active.

</span><ul data-dcnode-id="4169"><li data-dcnode-id="4174"><span data-dcnode-id="4175" instrument_node="">Increase key U.S. government staffs dedicated to the Indo-Pacific, including at the Treasury and State departments.
 </span></li><li data-dcnode-id="4172"><span data-dcnode-id="4173" instrument_node="">Appoint a deputy assistant to the president for China responsible for coordinating a whole-of-government strategy.

 </span></li><li data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">Optimize U.S. information efforts for social media and targeted audiences.
 </span></li><li data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">Launch public diplomacy campaigns to highlight and promote U.S. economic initiatives, development assistance, and private-sector investments in the Indo-Pacific.

</span><ul data-dcnode-id="4138"><li data-dcnode-id="4143"><span data-dcnode-id="4144" instrument_node="">Communicate directly and more systematically to publics both at home and abroad about Beijing’s malign activities.
 </span></li><li data-dcnode-id="4141"><span data-dcnode-id="4142" instrument_node="">Redesign declassification processes to make it easier to release information publicly about the Chinese Communist Party’s wrongdoings.
 </span></li><li data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Draw attention to the repression of Uighurs as a religious freedom issue and encourage Muslim communities in Southeast Asia and beyond to speak out.

</span><ul data-dcnode-id="4125"><li data-dcnode-id="4130"><span data-dcnode-id="4131" instrument_node="">Institute mandatory transparency for U.S. educational and civil society institutions receiving Chinese government funding.
 </span></li><li data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Require disclaimers on direct foreign government propaganda, including through reform of the Foreign Agents Registration Act.
 </span></li><li data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">Help to root out Chinese Communist Party influence in key allies and partners.</span></li></ul><span data-dcnode-id="4124" instrument_node="">
</span><h3 data-dcnode-id="4120"><strong data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">VI. Promoting Digital Freedom and Countering High-Tech Illiberalism</span></strong><span data-dcnode-id="4121" instrument_node="">

</span><ul data-dcnode-id="4107"><li data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">Establish a new U.S. Digital Development Fund that would, in coordination with allies, support information connectivity projects in the Indo-Pacific and beyond.
 </span></li><li data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Direct the new U.S. International Development Finance Corporation to support projects in the Indo-Pacific that provide alternatives to China’s digital infrastructure.
 </span></li><li data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Augment U.S. digital diplomacy in the Indo-Pacific with additional digital attachés and high-level “digital delegations.”

</span><ul data-dcnode-id="4094"><li data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">Revitalize global competition in 5G wireless technology.
 </span></li><li data-dcnode-id="4097"><span data-dcnode-id="4098" instrument_node="">Increase pressure on Huawei’s 5G ambitions while honing the current U.S. approach to the company.
 </span></li><li data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Actively reject the notion of “internet sovereignty” and advance access to fact-based information as a universal human right.

</span><h4 data-dcnode-id="4089"><a data-dcnode-id="4091" href="#challenge"><span data-dcnode-id="4092" instrument_node="">Challenge</span></a><span data-dcnode-id="4090" instrument_node=""> China’s surveillance state domestically and overseas</span></h4><span data-dcnode-id="4088" instrument_node="">
</span><ul data-dcnode-id="4081"><li data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">Leverage America’s economic toolkit to target actors facilitating the spread of China’s high-tech illiberalism.
 </span></li><li data-dcnode-id="4084"><span data-dcnode-id="4085" instrument_node="">Design new means to circumvent China’s “Great Firewall.”
 </span></li><li data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">Promote independent media, civil society, and government accountability throughout the Indo-Pacific.</span></li></ul><span data-dcnode-id="4080" instrument_node="">
</span><h3 data-dcnode-id="4076"><strong data-dcnode-id="4078"><span data-dcnode-id="4079" instrument_node="">VII. Cultivating the Talent to Compete with China </span></strong><span data-dcnode-id="4077" instrument_node="">
</span></h3><span data-dcnode-id="4075" instrument_node="">

 </span></li><li data-dcnode-id="4066"><span data-dcnode-id="4067" instrument_node="">Rapidly scale military talent management initiatives across active and reserve components.

</span><ul data-dcnode-id="4046"><li data-dcnode-id="4055"><span data-dcnode-id="4056" instrument_node="">Generate leadership expectations of human capital management, including national security civilian readiness metrics.
 </span></li><li data-dcnode-id="4053"><span data-dcnode-id="4054" instrument_node="">Modernize and reduce barriers in federal hiring processes. 
 </span></li><li data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Jump-start civilian professional development to build high-demand skills. 
 </span></li><li data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Enhance talent mobility across the national workforce.
 </span></li><li data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Update federal education fellowships for great-power competition.

</span><ul data-dcnode-id="4031"><li data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">Surge support for science, technology, engineering, and math education across secondary, postsecondary, vocational, and workforce retraining levels.
 </span></li><li data-dcnode-id="4036"><span data-dcnode-id="4037" instrument_node="">Raise the overall cap for H-1B visas and remove the cap for advanced-degree holders entirely. 
 </span></li><li data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">Improve workforce mobility between private sector and government technology roles. 
 </span></li><li data-dcnode-id="4032"><span data-dcnode-id="4033" instrument_node="">Identify and appropriately staff critical technology roles in government.</span></li></ul><span data-dcnode-id="4030" instrument_node="">
</span></div><span data-dcnode-id="4028" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3992"><span data-dcnode-id="4027" instrument_node="">
</span><h2 data-dcnode-id="4025" id="i-sustaining-conventional-military-deterrence"><span data-dcnode-id="4026" instrument_node="">I. Sustaining Conventional Military Deterrence</span></h2><span data-dcnode-id="4024" instrument_node="">
</span><p data-dcnode-id="4019"><em data-dcnode-id="4020"><a data-dcnode-id="4022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-I.-Sustaining-Conventional-Military-Deterrence.pdf%3Fmtime%3D20200122085543%26focal%3Dnone"><span data-dcnode-id="4023" instrument_node="">Download</span></a><span data-dcnode-id="4021" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Maintaining a favorable balance of power will be essential to achieving America’s long-term aims in the Indo-Pacific. Even as the military dimensions of the U.S.-China competition are likely to feature less prominently than in the U.S.-Soviet rivalry of the Cold War, the erosion of conventional deterrence in Asia would threaten to undermine the full range of U.S. economic and political interests in the region. While the United States still retains an overall military advantage over China, the gap has closed considerably over the last two decades and, absent urgent change, the regional balance may tip in China’s favor by the late 2020s or early 2030s. In certain scenarios, the military balance may already disadvantage the United States.</span></p><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">China’s military strategy has been predominantly asymmetric, seeking to disrupt, disable, or destroy the critical systems that enable U.S. military advantage. Responding to the asymmetric character of this competition poses an enormous challenge to the Defense Department (DoD) because it goes to the core of how the Joint Force fights wars, how the Pentagon and the defense industrial base develop technology, and how U.S. allies and partners build their armed forces. The National Defense Strategy and the Indo-Pacific Strategy Report pointed in the right direction to arrest and reverse these trends. Nevertheless, without requisite prioritization, forward-looking ideas, and consistent funding, subsequent shifts could end up being too little, too late. 
 </span></p><span data-dcnode-id="4012" instrument_node="">
</span><p data-dcnode-id="4006"><span data-dcnode-id="4011" instrument_node="">In short, the United States needs a new American way of war. The underlying military problem is that U.S. warfighting concepts and forces remain vulnerable to Chinese “systems destruction warfare,” which attacks critical nodes to create systemic effects.</span><sup data-dcnode-id="4008"><a aria-controls="footnote18" aria-expanded="false" class="footnote-marker" data-dcnode-id="4009" href="#fn18" id="fnmarker18" role="button"><span data-dcnode-id="4010" instrument_node="">18</span></a></sup><span data-dcnode-id="4007" instrument_node=""> The challenges that need to be addressed are numerous: U.S. air bases, aircraft carriers, and surface vessels are too vulnerable to Chinese air and missile attacks; current U.S. systems for command, control, communications, computers, intelligence, surveillance, and reconnaissance (C4ISR) are brittle in the face of Chinese cyberattacks, electronic warfare, and long-range strikes; U.S. logistics systems, ports, and airfields are vulnerable to cyberdisruptions and physical attacks; and the Joint Force lacks sufficient precision-guided munitions. All of these shortcomings must be addressed with considerable focus and urgency. 
 </span></p><span data-dcnode-id="4005" instrument_node="">
</span><p data-dcnode-id="4003"><span data-dcnode-id="4004" instrument_node="">To implement a new military strategy, the U.S. government will also have to change the way it does business. Reforming back-office processes cannot be pursued as an administrative sideshow, but rather as a foundation to America’s ability to compete more effectively. The Defense Department should revise its requirements, programming and budgeting, and acquisition processes to support and access the latest technological innovations. Bold and sustained leadership will be necessary at the Defense Department, at the White House, in the military services, and in the U.S. Congress to overcome powerful pockets of resistance that remain committed to legacy platforms and existing business models.
 </span></p><span data-dcnode-id="4002" instrument_node="">
</span><p data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Finally, the United States should make a concerted push to reshape the regional balance of power by further networking the regional security environment and building the capacity of key partners. This should include developing closer military ties that could be leveraged in crisis or conflict, as well as supporting the ability of frontline states to better deter Chinese coercion and aggression. To do so, the United States should help regional militaries—prioritizing Taiwan, Japan, Vietnam, and the Philippines—develop the ability to challenge China’s power-projection capabilities. 
 </span></p><span data-dcnode-id="3999" instrument_node="">
</span><p data-dcnode-id="3997"><span data-dcnode-id="3998" instrument_node="">Different parts of the region will require different fixes. In some cases, the threat of sanctions against countries with security ties with Russia should be eased to facilitate balancing against China. Where more advanced military cooperation is neither technically nor politically feasible—as is the case throughout much of Southeast Asia—the United States should build a maritime common operating picture that can both kick-start security cooperation and deter lower levels of Chinese coercion. Finally, the United States should pay particular attention to supporting India’s efforts to pose military dilemmas for China, thereby providing relatively low-cost means to complicate the ability of the People’s Liberation Army (PLA) to concentrate attention and resources on U.S. strongholds in East Asia and the Western Pacific. 
</span></p><span data-dcnode-id="3996" instrument_node="">
</span><p data-dcnode-id="3994"><span data-dcnode-id="3995" instrument_node="">The following are recommendations for U.S. Policy:</span></p><span data-dcnode-id="3993" instrument_node="">
</span></div><span data-dcnode-id="3991" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3984"><span data-dcnode-id="3990" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3986"><span data-dcnode-id="3989" instrument_node="">
</span><a data-dcnode-id="3988" id="develop"></a><span data-dcnode-id="3987" instrument_node="">
</span></div><span data-dcnode-id="3985" instrument_node="">
</span></div><span data-dcnode-id="3983" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3823"><span data-dcnode-id="3982" instrument_node="">
</span><h3 data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">Develop a New American Way of War</span></h3><span data-dcnode-id="3979" instrument_node="">
</span><h4 data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">Design a new military strategy and novel joint operational concepts for China contingencies</span></h4><span data-dcnode-id="3976" instrument_node="">
</span><p data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">Current U.S. military strategy and operational concepts for China incur significant risk of mission failure and unacceptable attrition, and trend lines suggest that this situation will worsen over time. This disadvantage will constrain U.S. policymakers across many potential contingencies, not just conflict scenarios. For instance, responses to gray-zone coercion are likely to be more muted if a strong response provokes escalation with significant risk to U.S. forces. Absent an appropriate strategy and operational concepts, U.S. modernization and technology developments are likely to be unfocused and inefficient, and allies and partners will lack a clear understanding of their role in response to Chinese coercion or aggression.
</span></p><span data-dcnode-id="3973" instrument_node="">
</span><p data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">The chairman of the Joint Chiefs of Staff should lead the effort to develop a new U.S. military strategy that explains how the United States alongside its allies and partners will use force to achieve the political objectives of defending U.S., allied, and partner interests from coercion while deterring or defeating Chinese aggression. In drafting the strategy, the Joint Staff should work closely with the Office of the Secretary of Defense, the relevant combatant commands, and the services.
</span></p><span data-dcnode-id="3970" instrument_node="">
</span><p data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">The strategy should be grounded in preventing China from achieving its objectives—what strategists call “deterrence by denial”—rather than simply by punishing China, given that Beijing may be willing to tolerate substantial costs to achieve its objectives. This strategy must also account for political dimensions of military action, including China’s ability to escalate strategically through informational, diplomatic, economic, or military means, to include attacks on the U.S. homeland or nuclear escalation. It should exploit the advantages of coalition warfare and force China to be the aggressor or escalator at every step. Finally, the strategy should detail how the Defense Department and the commander of U.S. Indo-Pacific Command intend to coordinate military actions with allies, partners, and other instruments of national power to achieve effects that are greater than the sum of the parts.
</span></p><span data-dcnode-id="3967" instrument_node="">
</span><p data-dcnode-id="3965"><span data-dcnode-id="3966" instrument_node="">Operational concepts for China should describe how the U.S., allied, and partner forces will conduct and coordinate military operations over time to achieve the military objectives of the strategy. The critical shift in these concepts must be the ability—whether through new technology or operational art—to strike at the PLA’s military centers of gravity without first gaining multidomain superiority, or without strategically unfavorable escalation. These concepts must be specific to conflict scenarios including Chinese coercion or aggression against Taiwan or Japan, coercion or conflict in the South China Sea, Chinese intervention into North Korea, and coercion or conflict in the Indian Ocean.
</span></p><span data-dcnode-id="3964" instrument_node="">
</span><p data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">This strategy and these concepts should guide defense investments and reforms while explaining these choices to audiences inside and outside the Defense Department, including allies and partners. As such, they should contain sufficient unclassified information to communicate the main ideas and priorities, while classified versions contain greater detail.
</span></p><span data-dcnode-id="3961" instrument_node="">
</span><h4 data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">Build a more resilient architecture for command, control, communications, computers, intelligence, surveillance, and reconnaissance (C4ISR)</span></h4><span data-dcnode-id="3958" instrument_node="">
</span><p data-dcnode-id="3956"><span data-dcnode-id="3957" instrument_node="">Information has always been critical in warfare, but the concomitant development of information technology and precision-guided weapons has raised its importance to new heights. Given accurate information, precision-guided weapons can hit targets with reliable accuracy regardless of range. In this new regime, precision trumps mass, but it requires rapid, accurate information.
</span></p><span data-dcnode-id="3955" instrument_node="">
</span><p data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">China’s systems destruction warfare would use multidomain attacks to deprive U.S. forces of the information and coordination that make precision-guided warfare so effective. This approach is particularly problematic because current U.S. C4ISR is relatively brittle, as it was designed and built in an era when competitors or adversaries could not attack U.S. assets in space or at long ranges. A new architecture must be able to operate effectively under long-range multidomain Chinese attacks. Given the inherent vulnerability of some of these systems and the attack surface they present, preclusive defense is impossible. Instead, U.S. C4ISR systems must degrade gracefully under attack and must function in different modalities to complicate China’s counter-C4ISR operations.
</span></p><span data-dcnode-id="3952" instrument_node="">
</span><p data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">Improving the resilience of U.S. C4ISR architecture in the face of attack might be the single most effective step the United States can take to strengthen its conventional deterrent: China will be more readily deterred if Beijing doubts its ability to disrupt, degrade, or destroy U.S. C4ISR systems.
</span></p><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">Specific components of this architecture should include:
</span></p><span data-dcnode-id="3946" instrument_node="">
</span><ul data-dcnode-id="3909"><li data-dcnode-id="3944"><span data-dcnode-id="3945" instrument_node="">Space capabilities that are more resistant to kinetic and nonkinetic attacks;
</span></li><li data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Alternatives to space for ISR, long-range communications, and position, navigation, and timing (PNT);
</span></li><li data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Low probability of intercept and low probability of jamming data links;
</span></li><li data-dcnode-id="3938"><span data-dcnode-id="3939" instrument_node="">Cyberprotection that prioritizes sufficient trust in data over protecting network integrity;
</span></li><li data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Sophisticated surveillance systems that can penetrate contested environments using speed or stealth to surveil critical targets;
</span></li><li data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">Alternative ISR systems that utilize large numbers of “good enough” sensors operating collaboratively in contested environments to target massed or imprecisely located targets;
</span></li><li data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">Doctrine and training to operate using alternative C4ISR concepts, particularly mission orders and peer-to-peer networks;
</span></li><li data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">Synthetic training environments that allow U.S. forces to exercise contested C4ISR operations;
</span></li><li data-dcnode-id="3928"><span data-dcnode-id="3929" instrument_node="">Research and development investments in artificial intelligence to improve target recognition, information processing, and the ability of sensors and networks to respond to jamming or cyberattacks; and
</span></li><li data-dcnode-id="3910"><span data-dcnode-id="3927" instrument_node="">Improvements in defensive countermeasures and offensive capabilities for electronic warfare (EW) that include:</span><ul data-dcnode-id="3912"><li data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">Developing a C4ISR architecture that can use multiple pathways to transmit data, including an ability to use networks of jam-resistant tactical data links to create larger “mesh” networks capable of supporting distributed, multidomain operations;
</span></li><li data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">Increasing the capacity of DoD and the services to conduct EW in multiple domains to disrupt enemy kill chains;
</span></li><li data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">Investing in stand-in jamming capabilities in the air, to include the use of unmanned or attritable aircraft in dense threat environments;
</span></li><li data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Pursuing a layered EW posture for the Navy to defend against long-range anti-ship missiles, to include anti-satellite jamming, airborne EW platforms, and accelerated investments in terminal defenses;
</span></li><li data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">Investing in ground-based and unmanned EW platforms for the Marine Corps to provide an expeditionary EW capability as part of the Corps’ Expeditionary Advanced Basing Operations concept (EABO) that can disrupt enemy kill chains and enable maritime maneuver in previously contested environments;
</span></li><li data-dcnode-id="3915"><span data-dcnode-id="3916" instrument_node="">Investing in ground-based EW systems for the Army to help defend key forward locations against long-range air and missile attacks; and
</span></li><li data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">Investing in alternatives to GPS for all four services for position, navigation, and timing, and alternatives to millimeter-wave radars for terminal weapons guidance.
</span></li></ul><span data-dcnode-id="3911" instrument_node="">
</span></li></ul><span data-dcnode-id="3908" instrument_node="">
</span><h4 data-dcnode-id="3906"><span data-dcnode-id="3907" instrument_node="">Build a combat-credible posture in the Indo-Pacific</span></h4><span data-dcnode-id="3905" instrument_node="">
</span><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">If attacking U.S. C4ISR systems is atop China’s targeting list, attacking U.S. forward bases, and particularly air bases, is a close second. China has made significant investments in long-range ISR and strike assets to attack fixed air bases and mobile aircraft carriers. China hopes the threat of these attacks will deter U.S. intervention by negating a substantial portion of U.S. airpower early in a conflict, thereby creating time and space for a fait accompli, and by causing potentially irreparable attrition to forward-deployed aircraft squadrons. A combat-credible posture would undermine China’s deterrence logic and weaken its military strategy by demonstrating that attacks on forward bases would not neutralize U.S. striking power in the region, and that attrition to U.S. forces would be within acceptable limits such that America and its allies could continue fighting.
</span></p><span data-dcnode-id="3902" instrument_node="">
</span><ul data-dcnode-id="3871"><li data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">A combat-credible posture in the Indo-Pacific should include:
</span></li><li data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">Adopting, exercising, and demonstrating an ability to execute a more dispersed basing posture in which dozens of airfields can support air operations in a crisis;
</span></li><li data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">Acquiring equipment and maintainer personnel to support rapid movement between bases;
</span></li><li data-dcnode-id="3878"><span data-dcnode-id="3895" instrument_node="">Making major air bases more resilient to attack by:</span><ul data-dcnode-id="3880"><li data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">Hardening, burying, or making redundant critical facilities such as fuel storage and pumps;
</span></li><li data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Expanding runways or improving ramp and apron space to serve as expedient runways;
</span></li><li data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">Improving and exercising rapid runway repairs;
</span></li><li data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Increasing passive defenses against area-effects weapons;
</span></li><li data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">Increasing active defenses against cruise missiles at major air bases;
</span></li><li data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">Increasing use of camouflage, concealment, deception, and electronic warfare to degrade Chinese ISR and battle-damage assessment; and
</span></li><li data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">Exercising air base operations under worst-case attack conditions.
</span></li></ul><span data-dcnode-id="3879" instrument_node="">
</span></li><li data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Renewing and fully supporting the Compact of Free Association with the Federated States of Micronesia, the Marshall Islands, and Palau, which provide irreplaceable access to critical geography;
</span></li><li data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Developing support infrastructure and greater access at existing airfields, and improving runways and infrastructure at key locations in the Compact of Free Association states like Palau and Yap; and
</span></li><li data-dcnode-id="3872"><span data-dcnode-id="3873" instrument_node="">Increasing deployments of ground-based precision fires for land and anti-ship attacks.
</span></li></ul><span data-dcnode-id="3870" instrument_node="">
</span><h4 data-dcnode-id="3868"><span data-dcnode-id="3869" instrument_node="">Increase investments in critical munitions and munitions development</span></h4><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">Precision-guided warfare against China would require huge numbers of precision-guided weapons. Additionally, these weapons must be capable of striking both high-value and massed targets in highly contested environments with degraded information. Current U.S. munitions inventories are inadequate to support sustained combat against China, and especially in weapons that can penetrate China’s anti-access/area denial networks.
</span></p><span data-dcnode-id="3864" instrument_node="">
</span><p data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">To address this, the Defense Department should:
</span></p><span data-dcnode-id="3861" instrument_node="">
</span><ul data-dcnode-id="3846"><li data-dcnode-id="3859"><span data-dcnode-id="3860" instrument_node="">Increase stockpiles of critical munitions, such as long-range anti-ship missiles;
</span></li><li data-dcnode-id="3857"><span data-dcnode-id="3858" instrument_node="">Develop and deploy mobile and relocatable land-based launchers for long-range cruise, ballistic, and hypersonic weapons in the Indo-Pacific;
</span></li><li data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">Develop and deploy affordable munitions that can operate collaboratively in contested environments to strike massed or imprecisely located targets;
</span></li><li data-dcnode-id="3853"><span data-dcnode-id="3854" instrument_node="">Develop area-effects weapons that comply with current U.S. policies regarding cluster munitions, or seek waivers from these policies;
</span></li><li data-dcnode-id="3851"><span data-dcnode-id="3852" instrument_node="">Accelerate development of longer-range air-to-air weapons;
</span></li><li data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Develop modular weapons with updatable seekers, control units, motors, and software to protect stockpiles from obsolescence; and
</span></li><li data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">Work with Congress and the defense industry to increase munitions production capacity.
</span></li></ul><span data-dcnode-id="3845" instrument_node="">
</span><h4 data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Develop concepts and capabilities for contested logistics</span></h4><span data-dcnode-id="3842" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">Attacks on U.S. air bases are one part of a broader Chinese strategy to impede the ability of U.S. forces to operate and sustain operations in East Asia. U.S. forces in Asia are at the end of a long logistical tether that was not designed to operate under precision long-range attacks. U.S. surge forces moving into the theater likewise rely on transportation equipment and infrastructure that were designed assuming sanctuary from attack. China’s ability to hold these systems at risk using long-range fires and cyberattacks threatens the ability of the United States to project and sustain combat power in the Indo-Pacific.
</span></p><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">To address this, the Defense Department should:
</span></p><span data-dcnode-id="3836" instrument_node="">
</span><ul data-dcnode-id="3825"><li data-dcnode-id="3834"><span data-dcnode-id="3835" instrument_node="">Integrate logistics and sustainment considerations into military strategy and operational concept development for China from the outset;
</span></li><li data-dcnode-id="3832"><span data-dcnode-id="3833" instrument_node="">Pursue the air base resiliency initiatives outlined above and apply similar measures to key ports, naval facilities, and other critical infrastructure in the region;
</span></li><li data-dcnode-id="3830"><span data-dcnode-id="3831" instrument_node="">Conduct a review of the Navy’s Combat Logistics Fleet (CLF) force structure, employment strategy, and shipbuilding industry to design a new CLF fleet architecture that can deliver contested maritime logistics support;
</span></li><li data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">Accelerate development of methods to rearm U.S. Navy vertical launch system cells at sea; and
</span></li><li data-dcnode-id="3826"><span data-dcnode-id="3827" instrument_node="">Develop concepts and capabilities to support distributed operations with a more responsive logistics system.
</span></li></ul><span data-dcnode-id="3824" instrument_node="">
</span></div><span data-dcnode-id="3822" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3815"><span data-dcnode-id="3821" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3817"><span data-dcnode-id="3820" instrument_node="">
</span><a data-dcnode-id="3819" id="empower"></a><span data-dcnode-id="3818" instrument_node="">
</span></div><span data-dcnode-id="3816" instrument_node="">
</span></div><span data-dcnode-id="3814" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3769"><span data-dcnode-id="3813" instrument_node="">
</span><h3 data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Empower the Defense Department to Harness America's National Security Innovation Base</span></h3><span data-dcnode-id="3810" instrument_node="">
</span><h4 data-dcnode-id="3808"><span data-dcnode-id="3809" instrument_node="">Reform Defense Department organizations and processes, including requirements, programming and budgeting, and acquisition</span></h4><span data-dcnode-id="3807" instrument_node="">
</span><p data-dcnode-id="3801"><span data-dcnode-id="3806" instrument_node="">The Defense Department originally designed the core decisionmaking processes that determine the size and shape of the future Joint Force (requirements, programming and budgeting, and acquisition) for the industrial age and the Cold War threat environment. These processes, although still sound, have a range of flaws and assumptions that make them inadequate to the task of building the future force. They should be updated to accommodate new and rapidly changing technologies and the current complex and evolving threat environment.</span><sup data-dcnode-id="3803"><a aria-controls="footnote19" aria-expanded="false" class="footnote-marker" data-dcnode-id="3804" href="#fn19" id="fnmarker19" role="button"><span data-dcnode-id="3805" instrument_node="">19</span></a></sup><span data-dcnode-id="3802" instrument_node=""> Specifically, the requirements process, which was designed to develop new capabilities from scratch within the defense ecosystem, must adjust to the new innovation environment, developing ways to more quickly and efficiently adapt existing technologies developed outside of DoD or the traditional defense industrial base to emerging warfighting problems. The programming and budgeting process also need additional flexibility to allow the department to rapidly acquire emerging technologies as they develop, rather than waiting for the next full cycle of the process to culminate 18 to 24 months down the road. To this end, the Office of the Secretary of Defense should consider withholding significant funding when delivering fiscal guidance to the services, using this funding during its review of service spending plans to inject new proposals into the budget throughout the process, as opposed to only at the beginning. Further, Congress should consider realigning appropriations titles according to the type of life cycle a system has (for example, durable goods, such as aircraft carriers; evolvable systems, such as software; or expendable systems, such as munitions) as opposed to the part of the life cycle a system is in (research and development, procurement, or maintenance). This realignment would allow the department to move programs from development into production more quickly, while also making the total life cycle cost of the system more transparent.
</span></p><span data-dcnode-id="3800" instrument_node="">
</span><h4 data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Ensure the Defense Department can develop, access, and leverage the latest technologies</span></h4><span data-dcnode-id="3797" instrument_node="">
