</span><p data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">The global innovation environment has changed substantially since the Cold War, when big advances in military technology generally came out of DoD labs before eventually migrating to the commercial sector. Now, private companies are at the leading edge of developing new technologies with significant military applications, including artificial intelligence (AI) and machine learning. This presents a major challenge for the Defense Department in identifying these technologies and bringing them into the defense enterprise, when many companies are unwilling or unable to work with the Defense Department as a customer, and DoD is slow to absorb their potential and need for iteration. The defense market is small relative to the size of commercial technology markets, and some companies view cooperation with DoD as damaging to their brand. In addition, barriers to entry into the defense sector are high due to the complex regulatory regime governing defense contracts. DoD cannot easily invest in promising technologies outside of certain contractual frameworks.
</span></p><span data-dcnode-id="3794" instrument_node="">
</span><p data-dcnode-id="3784"><span data-dcnode-id="3793" instrument_node="">To begin to address these challenges, DoD and traditional defense industry primes have developed new means of reaching out to the technology sector, including most notably through government entities, such as the Defense Innovation Unit, and private entities, such as venture capital funds run by defense primes.</span><sup data-dcnode-id="3790"><a aria-controls="footnote20" aria-expanded="false" class="footnote-marker" data-dcnode-id="3791" href="#fn20" id="fnmarker20" role="button"><span data-dcnode-id="3792" instrument_node="">20</span></a></sup><span data-dcnode-id="3789" instrument_node=""> However, these means of bringing new and disruptive technologies into the defense enterprise remain inadequate given the sheer scale of innovation with military applications happening outside of the Defense Department’s remit, and DoD’s limitations as a customer.</span><sup data-dcnode-id="3786"><a aria-controls="footnote21" aria-expanded="false" class="footnote-marker" data-dcnode-id="3787" href="#fn21" id="fnmarker21" role="button"><span data-dcnode-id="3788" instrument_node="">21</span></a></sup><span data-dcnode-id="3785" instrument_node=""> These dynamics will have to change. DoD should invest more in capturing these technologies and helping new technology start-ups grow, while also continuing to invest in DoD labs and the traditional defense industrial base, which remain critical to sustaining U.S. military technological superiority. DoD should also take steps to make itself a more attractive customer or partner for new technology companies by developing ways to demonstrate a start-up’s viability, such as with its own venture capital capability.
</span></p><span data-dcnode-id="3783" instrument_node="">
</span><h4 data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Sustain and enhance a traditional and nontraditional defense industrial base that is robust, flexible, and resilient</span></h4><span data-dcnode-id="3780" instrument_node="">
</span><p data-dcnode-id="3774"><span data-dcnode-id="3779" instrument_node="">Large diversified conglomerates mostly comprised the industrial base that produced war materiel for World War II and throughout much of the Cold War. After a wave of divestment of defense business units and the subsequent consolidation of remaining businesses driven by the post-Cold War peace dividend, the U.S. industrial base became dominated by a relatively small number of specialized defense and aerospace companies. These circumstances have left the traditional U.S. defense industrial base exposed to certain vulnerabilities, which were thoroughly catalogued in a 2018 DoD report—including lack of competition, fragile supply chains, and difficulty attracting and retaining skilled labor and engineering talent.</span><sup data-dcnode-id="3776"><a aria-controls="footnote22" aria-expanded="false" class="footnote-marker" data-dcnode-id="3777" href="#fn22" id="fnmarker22" role="button"><span data-dcnode-id="3778" instrument_node="">22</span></a></sup><span data-dcnode-id="3775" instrument_node="">
</span></p><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">At the same time, a new critical component of the defense industrial base has emerged in the form of companies developing advanced commercial technologies with significant military applications, as discussed above. A healthy industrial base, broadly defined, is a vital ingredient to U.S. defense competitiveness; DoD should not be passive about its future. In both cases, DoD must review its own regulatory regimes and contracting practices to foster a healthy defense innovation and industrial base, and Congress must support the department with legislative changes where necessary. DoD should start by fully implementing the new acquisition authorities included in the 2016 and 2017 National Defense Authorization Act, including further streamlining its regulatory frameworks. DoD should also develop a way to evaluate the benefits of a regulation against the cost of enforcing it. Finally, DoD and Congress should both use this metric to evaluate if, when, and under what circumstances different regulations should be enforced. Reducing regulatory burden could lower barriers to entry into the defense sector, allowing more nontraditional companies to enter the market, as either primes or subcontractors.
</span></p><span data-dcnode-id="3770" instrument_node="">
</span></div><span data-dcnode-id="3768" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3761"><span data-dcnode-id="3767" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3763"><span data-dcnode-id="3766" instrument_node="">
</span><a data-dcnode-id="3765" id="strengthen"></a><span data-dcnode-id="3764" instrument_node="">
</span></div><span data-dcnode-id="3762" instrument_node="">
</span></div><span data-dcnode-id="3760" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3680"><span data-dcnode-id="3759" instrument_node="">
</span><h3 data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">Strengthen and Network U.S. Allies and Partners</span></h3><span data-dcnode-id="3756" instrument_node="">
</span><h4 data-dcnode-id="3754"><span data-dcnode-id="3755" instrument_node="">Develop ally and partner anti-access/area denial capabilities </span></h4><span data-dcnode-id="3753" instrument_node="">
</span><p data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">America’s allies and partners must be capable of defending themselves alongside U.S. forces. Unfortunately, many U.S. allies and partners in the Indo-Pacific face the same challenges as the United States because their armed forces are similarly vulnerable to attacks on air bases, surface vessels, C4ISR systems, and critical infrastructure. They also lack sufficient quantities of the right kinds of munitions to sustain operations against China. 
 </span></p><span data-dcnode-id="3750" instrument_node="">
</span><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">To address this, DoD must work together with the State Department, Congress, and foreign governments to utilize Foreign Military Financing and Maritime Security Initiative (MSI) funding to help regional states develop concepts and capabilities that would challenge Chinese power-projection operations with some of the same kinds of anti-access/area denial systems that China developed to undermine U.S. military advantages. Prioritizing Taiwan, Japan, Vietnam, and the Philippines, specific initiatives should include:
</span></p><span data-dcnode-id="3747" instrument_node="">
</span><ul data-dcnode-id="3734"><li data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">Conducting wargaming, analysis, exercises, and concept development for high-end warfare with key allies and partners to develop a shared understanding of the challenge and an appreciation of how they can contribute in a crisis or conflict;</span></li><li data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Developing and exercising C4ISR capabilities for cooperative targeting in contested environments;
 </span></li><li data-dcnode-id="3741"><span data-dcnode-id="3742" instrument_node="">Shifting allied and partner operational concepts away from traditional maneuver and territorial defense toward greater use of area denial, long-range fires, cyberattacks, electronic warfare, and mobile defenses in depth; 
 </span></li><li data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">Supporting specific investments in mines, coastal defense cruise missiles, jammers and dazzlers for terrestrial and space-based systems, anti-radiation munitions, mobile air and missile defenses, short-range guided munitions such as anti-tank weapons, and cyberattacks; 
 </span></li><li data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">Working with more capable allies and partners to add long-range precision fires, air-independent propulsion diesel-electric attack submarines, unmanned surface and undersea vessels, unmanned aerial vehicles for ISR and offensive strikes, and air and missile defenses for key fixed sites; and 
 </span></li><li data-dcnode-id="3735"><span data-dcnode-id="3736" instrument_node="">Encouraging U.S. allies and partners in the region, particularly Taiwan, to stockpile fuel, food, medicines, and munitions to prepare for potential Chinese blockades. 
</span></li></ul><span data-dcnode-id="3733" instrument_node="">
</span><h4 data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">Promote security networks among U.S. allies and partners </span></h4><span data-dcnode-id="3730" instrument_node="">
</span><p data-dcnode-id="3725"><span data-dcnode-id="3729" instrument_node="">The past decade has seen the emergence of new security networks involving various constellations of American allies and partners in the Indo-Pacific. These networks complement U.S. bilateral alliances and strategic partnerships, and Washington should continue to encourage their formation and growth. The United States should support the deepening of security ties between Japan and Australia, including by urging its two allies to finalize a reciprocal access agreement. Trilaterally, Washington should work with Tokyo and Canberra to enhance intelligence sharing, focusing on maritime domain awareness within the first island chain. Through its dialogue with Japan and India, the United States should explore new opportunities for trilateral military exercises and joint defense research and development. Washington should also make a priority of getting trilateral cooperation with South Korea and Japan back on track. Finally, American efforts to advance security networking in the Indo-Pacific should enlist European powers where practical. Specifically, the United States should work with France and India to stand up a new trilateral consortium to share information regarding the movement of Chinese military vessels in the Western Indian Ocean.</span><sup data-dcnode-id="3726"><a aria-controls="footnote23" aria-expanded="false" class="footnote-marker" data-dcnode-id="3727" href="#fn23" id="fnmarker23" role="button"><span data-dcnode-id="3728" instrument_node="">23</span></a></sup></p><span data-dcnode-id="3724" instrument_node="">
</span><h4 data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">Build a common operating picture in Southeast Asia</span></h4><span data-dcnode-id="3721" instrument_node="">
</span><p data-dcnode-id="3719"><span data-dcnode-id="3720" instrument_node="">Many U.S. allies and partners are concerned about China’s actions toward their maritime territories and resources. Leveraging a shared interest in maritime domain awareness could be advantageous to competition below armed conflict, while building coalition cohesion in the event of a crisis. Toward this end, Congress should expand Foreign Military Financing for Indo-Pacific countries and continue funding the Maritime Security Initiative (Section 1263 of the FY16 National Defense Authorization Act), which is due to expire at the end of FY2020. Without additional resources, Congress should also guard against expanding MSI authorities to other countries for fear of diluting the original intent of building partner capacity among Southeast Asian partners. </span></p><span data-dcnode-id="3718" instrument_node="">
</span><p data-dcnode-id="3712"><span data-dcnode-id="3717" instrument_node="">Future legislation should more explicitly direct this effort to focus on creating a common operational picture in Southeast Asia.</span><sup data-dcnode-id="3714"><a aria-controls="footnote24" aria-expanded="false" class="footnote-marker" data-dcnode-id="3715" href="#fn24" id="fnmarker24" role="button"><span data-dcnode-id="3716" instrument_node="">24</span></a></sup><span data-dcnode-id="3713" instrument_node=""> A common operational picture would provide shared situational awareness of activity in the air and maritime domains to all participating allies and partners. It would allow regional states to track activity, both in their sovereign airspace and maritime territory, as well as destabilizing behavior in international airspace and waters. In peacetime, this shared system would keep states apprised of illicit trafficking and violations of fisheries or mineral rights. In crises or conflicts, it would provide situational awareness about the disposition of enemy military forces. The shared nature of this system would provide it with a measure of strategic resilience, as China would be reluctant to attack a shared, multinational system during crises or limited conflicts, for fear of unfavorably escalating a crisis or limited conflict into a broader regional war. Protecting sensitive intelligence, surveillance, and reconnaissance collection capabilities would be an obstacle to developing such a system. To help allay these concerns, the system could be tiered, with the lowest tier sharing basic civilian airspace and maritime awareness data along with commercially available satellite information. The second tier could build on this and incorporate less-sensitive military ISR data, such as electro-optical/infrared (EO/IR) sensor feeds from publicly acknowledged ISR platforms. The third tier could offer fused, multi-intelligence information to the most trusted members. 
</span></p><span data-dcnode-id="3711" instrument_node="">
</span><h4 data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">Allow exemptions to the Countering America’s Adversaries Through Sanctions Act (CAATSA) for countries seeking to balance against China</span></h4><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">The United States should seek to reduce Russian revenue from overseas arms sales; however, this goal should be pursued more flexibly with greater attention to how it affects the military balance in Asia. Certain Indo-Pacific states, particularly India, Indonesia, and Vietnam, have long been customers of Russian military equipment. It is ultimately counterproductive to sanction these countries, or threaten to sanction them, for buying Russian equipment that would improve their ability to counter Chinese coercion or deter Chinese aggression. Moreover, further isolating Russia in Asia and preventing its arms sales to a variety of states could push Moscow into a closer and more co-dependent relationship with Beijing. Congress should therefore allow CAATSA exemptions for Indo-Pacific states that wish to procure Russian weapons, provided these weapons would be used to balance against China. Over the long term, the U.S. government and defense industry should explore policies, incentive structures, and offerings that would give regional partners affordable options to buy American military equipment and services instead.</span></p><span data-dcnode-id="3705" instrument_node="">
</span><h4 data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Support Indian military choices that create dilemmas for China in peacetime, crisis, and conflict </span></h4><span data-dcnode-id="3702" instrument_node="">
</span><p data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">
 India has the potential to contribute as a military counterweight to China. Unfortunately, structural impediments and resource constraints have hobbled India’s ability to keep pace with China’s military modernization over the last 20 years. However, even without fundamental reform, the Indian military can still pose dilemmas for China and support a more competitive posture alongside the United States. Toward that end, the United States should actively support India to take the following actions, in addition to removing U.S. roadblocks when appropriate, such as those associated with CAATSA described above:
 </span></p><span data-dcnode-id="3699" instrument_node="">
</span><ul data-dcnode-id="3682"><li data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">Increasing investments in super- and hypersonic anti-ship missiles, along with investments in maritime domain awareness and long-range ISR to target these weapons;
 </span></li><li data-dcnode-id="3695"><span data-dcnode-id="3696" instrument_node="">Acquiring more submarines—and particularly air-independent diesel-electric attack submarines—relative to surface vessels;
 </span></li><li data-dcnode-id="3693"><span data-dcnode-id="3694" instrument_node="">Improving military transportation infrastructure, particularly from the Indo-Pakistan border to the northeastern border with China, and from the internal lowlands to the mountainous border region;
 </span></li><li data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Consolidating aircraft procurement around one or two fighters to create greater economies of scale and efficiencies in operation;
 </span></li><li data-dcnode-id="3689"><span data-dcnode-id="3690" instrument_node="">Making major investments in electronic warfare, cyber offense, and counterspace systems;
 </span></li><li data-dcnode-id="3687"><span data-dcnode-id="3688" instrument_node="">Leveraging commercial space systems and partnering with other spacefaring nations such as the United States to share access to certain space-based systems;
 </span></li><li data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">Shifting the “make in India” program away from large systems integration and toward developing centers of excellence and innovation in key areas of technology, modeled on the Israeli defense start-up sector; and
 </span></li><li data-dcnode-id="3683"><span data-dcnode-id="3684" instrument_node="">Shifting the Indian army away from massed territorial defense toward multidomain operations comprising long-range fires, electronic warfare, cyberwarfare, anti-maritime, anti-air, engineering, and information operations. 
</span></li></ul><span data-dcnode-id="3681" instrument_node="">
</span></div><span data-dcnode-id="3679" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3637"><span data-dcnode-id="3678" instrument_node="">
</span><h2 data-dcnode-id="3676" id="ii-securing-vital-u-s-technological-advantages"><span data-dcnode-id="3677" instrument_node="">II. Securing Vital U.S. Technological Advantages</span></h2><span data-dcnode-id="3675" instrument_node="">
</span><p data-dcnode-id="3669"><em data-dcnode-id="3671"><a data-dcnode-id="3673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-II.-Securing-Vital-U.S.-Technological-Advantages.pdf%3Fmtime%3D20200122085542%26focal%3Dnone"><span data-dcnode-id="3674" instrument_node="">Download</span></a><span data-dcnode-id="3672" instrument_node=""> this chapter and its recommendations</span></em><span data-dcnode-id="3670" instrument_node="">.</span></p><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3667" instrument_node="">Advanced technology translates directly into military and economic power, and further provides leading nations with the ability to shape international norms and domestic governance practices. Sustaining America’s technological edge will therefore be vital to realizing a free and open Indo-Pacific. Fortunately, the United States retains a number of advantages in the technological competition with China: world-class universities and research institutes, leading technology companies, a vibrant venture capital and start-up ecosystem, and a long history of rewarding innovation. America has also benefited profoundly from being a place where people from around the world want to work and live.
 </span></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3664" instrument_node="">Yet, largely due to choices in Washington and Beijing, America’s position as the global technology leader is under threat. U.S. expenditures on research and development have stagnated for decades as a share of gross domestic product (GDP). In the meantime, China has quadrupled its spending and is on the brink of surpassing the United States in total investments in this area.</span><sup data-dcnode-id="3661"><a aria-controls="footnote25" aria-expanded="false" class="footnote-marker" data-dcnode-id="3662" href="#fn25" id="fnmarker25" role="button"><span data-dcnode-id="3663" instrument_node="">25</span></a></sup><span data-dcnode-id="3660" instrument_node=""> Already, the results are showing: China is now a global powerhouse in a number of strategic technologies, equal to or ahead of the United States in critical areas such as quantum computing, artificial intelligence, and genomics.</span><sup data-dcnode-id="3657"><a aria-controls="footnote26" aria-expanded="false" class="footnote-marker" data-dcnode-id="3658" href="#fn26" id="fnmarker26" role="button"><span data-dcnode-id="3659" instrument_node="">26</span></a></sup><span data-dcnode-id="3656" instrument_node=""> If current trends continue, the downstream military, economic, and political consequences could tip the scales toward China’s vision of regional order in the Indo-Pacific.
 </span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">To keep apace, Washington will have to do more to reinvigorate American technological leadership. The U.S. government should set ambitious national goals for public and private spending on research and development, while bolstering human capital and high-skilled immigration. Relying on competitive, market-oriented principles—and avoiding a heavy-handed industrial policy in which the government picks winners and losers—Washington should provide resources and data to defend and advance key areas of U.S. competitive advantage, including artificial intelligence and semiconductors. 
 </span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3649"><span data-dcnode-id="3650" instrument_node="">As it reinvigorates its innovation base at home, the United States will have to be more vigilant in protecting key U.S. technologies. Recent legislative efforts to enhance U.S. investment screening and export controls are a good start and must be followed through. But more comprehensive efforts are still needed to address China’s harmful and illicit practices of forced technology transfer, academic and commercial espionage, and intellectual property theft. Washington will have to establish a more productive and collaborative relationship with U.S. businesses and universities. It will also be necessary to augment resources for counterespionage investigations and visa screening, as well as a demonstrated willingness and ability to retaliate against Chinese firms and individuals that benefit from technology theft.
 </span></p><span data-dcnode-id="3648" instrument_node="">
</span><p data-dcnode-id="3646"><span data-dcnode-id="3647" instrument_node="">Critically, going it alone will be insufficient for the United States, both because of China’s economies of scale and because unilateral defensive measures will be ineffective if Beijing can easily exploit other advanced economies. Washington should lead on establishing a new international body of democratic powers to coordinate on technology policy and develop cooperative solutions to combating China’s anti-competitive practices. 
 </span></p><span data-dcnode-id="3645" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3644" instrument_node="">Sustaining U.S. technological advantages will also require the United States to be more proactive internationally in setting new rules around emerging technologies. Active U.S. participation in international standards-setting bodies will be essential. Meanwhile, the United States can lead efforts in the Indo-Pacific and globally to codify norms for the use of emerging technologies. This should include detailed discussions with Beijing over the future of artificial intelligence.</span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3639"><span data-dcnode-id="3641" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="3640"></p><span data-dcnode-id="3638" instrument_node="">
</span></div><span data-dcnode-id="3636" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3629"><span data-dcnode-id="3635" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3631"><span data-dcnode-id="3634" instrument_node="">
</span><a data-dcnode-id="3633" id="bolster"></a><span data-dcnode-id="3632" instrument_node="">
</span></div><span data-dcnode-id="3630" instrument_node="">
</span></div><span data-dcnode-id="3628" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3554"><span data-dcnode-id="3627" instrument_node="">
</span><h3 data-dcnode-id="3625"><span data-dcnode-id="3626" instrument_node="">Bolster America's Innovation Engine</span></h3><span data-dcnode-id="3624" instrument_node="">
</span><h4 data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">Increase investments in research and development in the United States</span></h4><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3620" instrument_node="">The federal government plays a unique and critical role in America’s innovation ecosystem: Government research and development (R&amp;D) spending spurs private-sector investments,</span><sup data-dcnode-id="3617"><a aria-controls="footnote27" aria-expanded="false" class="footnote-marker" data-dcnode-id="3618" href="#fn27" id="fnmarker27" role="button"><span data-dcnode-id="3619" instrument_node="">27</span></a></sup><span data-dcnode-id="3616" instrument_node=""> and the U.S. government remains the largest funder of basic research, which is foundational to game-changing technological achievements.</span><sup data-dcnode-id="3613"><a aria-controls="footnote28" aria-expanded="false" class="footnote-marker" data-dcnode-id="3614" href="#fn28" id="fnmarker28" role="button"><span data-dcnode-id="3615" instrument_node="">28</span></a></sup><span data-dcnode-id="3612" instrument_node=""> Notably, U.S. government investments in the 1960s and 1970s in semiconductors, the global positioning system (GPS), and the early internet paved the way for the digital world of today. Yet, while private-sector R&amp;D investments have steadily increased in the United States, federal government spending has declined as a percentage of GDP from approximately 1.2 percent in 1976 to around 0.7 percent in 2018.</span><sup data-dcnode-id="3609"><a aria-controls="footnote29" aria-expanded="false" class="footnote-marker" data-dcnode-id="3610" href="#fn29" id="fnmarker29" role="button"><span data-dcnode-id="3611" instrument_node="">29</span></a></sup><span data-dcnode-id="3608" instrument_node="">
</span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3600"><span data-dcnode-id="3605" instrument_node="">To sustain another generation of technology leadership, the United States should increase federal R&amp;D spending to 1.2 percent of GDP, matching levels in the 1970s. To execute such a significant increase, funding should increase gradually through existing organizations (Department of Defense, National Institutes of Health, and Department of Energy, among others).</span><sup data-dcnode-id="3602"><a aria-controls="footnote30" aria-expanded="false" class="footnote-marker" data-dcnode-id="3603" href="#fn30" id="fnmarker30" role="button"><span data-dcnode-id="3604" instrument_node="">30</span></a></sup><span data-dcnode-id="3601" instrument_node=""> The White House Office of Science and Technology Policy (OSTP) should lead an interagency process, in consultation with external scientific advisors, to identify key strategic technologies for focused investment, such as artificial intelligence, microelectronics, quantum computing, wireless networking, synthetic biology, advanced manufacturing, health, energy, or other areas. As a bipartisan response to the intensifying technology competition with China, Congress could jump-start a new era of federal investment by passing a comprehensive appropriations bill.
</span></p><span data-dcnode-id="3599" instrument_node="">
</span><p data-dcnode-id="3593"><span data-dcnode-id="3598" instrument_node="">In addition to federal spending, the United States should increase total national (public and private) R&amp;D expenditures to keep pace with other leading technology nations. South Korea and Israel, for example, spend greater than 4.5 percent of GDP on R&amp;D, while total U.S. public and private R&amp;D spending in 2017 was only 2.8 percent.</span><sup data-dcnode-id="3595"><a aria-controls="footnote31" aria-expanded="false" class="footnote-marker" data-dcnode-id="3596" href="#fn31" id="fnmarker31" role="button"><span data-dcnode-id="3597" instrument_node="">31</span></a></sup><span data-dcnode-id="3594" instrument_node=""> Using tax incentives to spur private-sector investment, the United States should establish a goal of bringing total (public and private) R&amp;D spending to 4 percent of GDP by 2030.
</span></p><span data-dcnode-id="3592" instrument_node="">
</span><h4 data-dcnode-id="3590"><span data-dcnode-id="3591" instrument_node="">Accelerate U.S. innovation in artificial intelligence through standards-setting, metrics, and horizon-scanning</span></h4><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3588" instrument_node="">Artificial intelligence and machine learning are rapidly developing fields, fueled by exponential growth in data and computing processing power (“compute”). The federal government has an important role in advancing U.S. competitiveness in these vital areas, even while much of the innovation will remain private-sector-driven.</span><sup data-dcnode-id="3585"><a aria-controls="footnote32" aria-expanded="false" class="footnote-marker" data-dcnode-id="3586" href="#fn32" id="fnmarker32" role="button"><span data-dcnode-id="3587" instrument_node="">32</span></a></sup><span data-dcnode-id="3584" instrument_node=""> Government-led standards-setting is critical for enabling innovation, as are metrics for tracking progress and incentivizing research against specific problems.</span><sup data-dcnode-id="3581"><a aria-controls="footnote33" aria-expanded="false" class="footnote-marker" data-dcnode-id="3582" href="#fn33" id="fnmarker33" role="button"><span data-dcnode-id="3583" instrument_node="">33</span></a></sup><span data-dcnode-id="3580" instrument_node=""> The National Institute of Standards and Technology (NIST) and the Office of Science and Technology Policy should establish an interagency subcommittee for AI standards and measurement, under the National Science and Technology Council (NSTC) Select Committee on AI.
</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">Long-term analysis on future trends and threats is also critical to understanding rapid technology development and preventing harmful technological surprises. Such efforts can help national security leaders anticipate potential future challenges, such as detection-resistant “deep fakes,” and prepare mitigation measures in advance. The departments of Commerce, Defense, and Homeland Security, along with the intelligence community, should collaborate with OSTP to analyze global AI trends and anticipate future challenges.
</span></p><span data-dcnode-id="3575" instrument_node="">
</span><h4 data-dcnode-id="3573"><span data-dcnode-id="3574" instrument_node="">Support U.S. innovation in artificial intelligence and machine learning by increasing the availability of government data and computing resources</span></h4><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3562"><span data-dcnode-id="3571" instrument_node="">The U.S. government should take steps to increase the availability of data and compute, both of which are key inputs for research and innovation on AI and machine learning. This is particularly important for university researchers, who may lack the financial resources available to private-sector AI researchers. OSTP and the Office of Management and Budget (OMB) should build on Project Open Data by expanding the number of open-source high-quality datasets, an important asset for machine learning.</span><sup data-dcnode-id="3568"><a aria-controls="footnote34" aria-expanded="false" class="footnote-marker" data-dcnode-id="3569" href="#fn34" id="fnmarker34" role="button"><span data-dcnode-id="3570" instrument_node="">34</span></a></sup><span data-dcnode-id="3567" instrument_node=""> To increase compute resources for researchers, Congress should boost funding for the National Science Foundation’s Enabling Access to Cloud Computing Resources for CISE (Computer and Information Science and Engineering) Research and Education program and the Exploring Clouds for Acceleration of Science (E-CAS) project.</span><sup data-dcnode-id="3564"><a aria-controls="footnote35" aria-expanded="false" class="footnote-marker" data-dcnode-id="3565" href="#fn35" id="fnmarker35" role="button"><span data-dcnode-id="3566" instrument_node="">35</span></a></sup><span data-dcnode-id="3563" instrument_node="">
</span></p><span data-dcnode-id="3561" instrument_node="">
</span><h4 data-dcnode-id="3559"><span data-dcnode-id="3560" instrument_node="">Forge an alliance innovation base</span></h4><span data-dcnode-id="3558" instrument_node="">
</span><p data-dcnode-id="3556"><span data-dcnode-id="3557" instrument_node="">To keep pace with China’s military-civil innovation complex, the United States should develop deeper technology cooperation with key allies. This could take multiple forms. For example, DoD could expand existing mechanisms for quick-fire international seed projects. More ambitiously, the United States could stand up a “Freedom’s Foundry” that would bring together U.S. innovators and entrepreneurs with counterparts from allied countries to develop novel technologies—even new companies—around specific national security themes. With joint funding from participating governments and the private sector, these efforts could intersect with commercial market opportunities.
</span></p><span data-dcnode-id="3555" instrument_node="">
</span></div><span data-dcnode-id="3553" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3546"><span data-dcnode-id="3552" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3548"><span data-dcnode-id="3551" instrument_node="">
</span><a data-dcnode-id="3550" id="protect"></a><span data-dcnode-id="3549" instrument_node="">
</span></div><span data-dcnode-id="3547" instrument_node="">
</span></div><span data-dcnode-id="3545" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3442"><span data-dcnode-id="3544" instrument_node="">
</span><h3 data-dcnode-id="3542"><span data-dcnode-id="3543" instrument_node="">Protect Critical U.S. Technological Advantages
</span></h3><span data-dcnode-id="3541" instrument_node="">
</span><h4 data-dcnode-id="3539"><span data-dcnode-id="3540" instrument_node="">Secure semiconductor supply chains</span></h4><span data-dcnode-id="3538" instrument_node="">
</span><p data-dcnode-id="3528"><span data-dcnode-id="3537" instrument_node="">Along with artificial intelligence, U.S. technological advantages in semiconductors will be critical to advancing U.S. competitiveness in the Indo-Pacific. Although the United States is a global leader in semiconductor design—with U.S. headquartered firms accounting for roughly half of the global market—most fabrication occurs overseas.</span><sup data-dcnode-id="3534"><a aria-controls="footnote36" aria-expanded="false" class="footnote-marker" data-dcnode-id="3535" href="#fn36" id="fnmarker36" role="button"><span data-dcnode-id="3536" instrument_node="">36</span></a></sup><span data-dcnode-id="3533" instrument_node=""> This heavy reliance on overseas production presents substantial risks to vital U.S. economic and security interests.</span><sup data-dcnode-id="3530"><a aria-controls="footnote37" aria-expanded="false" class="footnote-marker" data-dcnode-id="3531" href="#fn37" id="fnmarker37" role="button"><span data-dcnode-id="3532" instrument_node="">37</span></a></sup><span data-dcnode-id="3529" instrument_node=""> As a result, the United States should develop trusted semiconductor suppliers for defense and intelligence applications in order to ensure chips are free from potential tampering by adversaries and are not easily subject to disruption. Washington can also collaborate with key allies to establish an international fabrication consortium to diversify semiconductor fabrication.
</span></p><span data-dcnode-id="3527" instrument_node="">
</span><p data-dcnode-id="3517"><span data-dcnode-id="3526" instrument_node="">On the order of $10 billion to $20 billion, the costs of establishing a new foundry present a major challenge to diversifying semiconductor supply chains, making onshoring prohibitively expensive even with potential government subsidies.</span><sup data-dcnode-id="3523"><a aria-controls="footnote38" aria-expanded="false" class="footnote-marker" data-dcnode-id="3524" href="#fn38" id="fnmarker38" role="button"><span data-dcnode-id="3525" instrument_node="">38</span></a></sup><span data-dcnode-id="3522" instrument_node=""> Additionally, the U.S. military and intelligence community have special needs for security that go above and beyond what is available in commercial facilities, yet they lack the scale of demand to make a purely government-dedicated foundry profitable.</span><sup data-dcnode-id="3519"><a aria-controls="footnote39" aria-expanded="false" class="footnote-marker" data-dcnode-id="3520" href="#fn39" id="fnmarker39" role="button"><span data-dcnode-id="3521" instrument_node="">39</span></a></sup><span data-dcnode-id="3518" instrument_node=""> DoD and the intelligence community should therefore explore novel approaches for public-private partnerships with U.S. companies to build the capability for trusted design, fabrication, packaging, and testing. Additionally, the United States should explore establishing an international fabrication consortium with allies to share the costs of building new semiconductor foundries that can ensure a trusted and diverse supply chain. As a starting point, member nations of the consortium should include the global leaders in semiconductor manufacturing equipment: the United States, Japan, and the Netherlands.
</span></p><span data-dcnode-id="3516" instrument_node="">
</span><h4 data-dcnode-id="3514"><span data-dcnode-id="3515" instrument_node="">Establish multilateral export controls on semiconductor manufacturing equipment and increase federal funding for next-generation hardware</span></h4><span data-dcnode-id="3513" instrument_node="">
</span><p data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">The United States has a major global lead in semiconductor design and should enact multilateral export controls, in concert with allies and partners, to protect its current technological advantage in hardware. This is among the most important actions the United States can take to protect its competitive edge in artificial intelligence. Furthermore, export controls should be coupled with increased federal R&amp;D funding for next-generation hardware to ensure continued U.S. leadership.
</span></p><span data-dcnode-id="3510" instrument_node="">
</span><p data-dcnode-id="3500"><span data-dcnode-id="3509" instrument_node="">China is heavily dependent on imports of foreign-manufactured semiconductors to meet internal demand. As part of its industrial policy to seize technological leadership from the United States, China is looking to reduce its reliance on foreign chips by ramping up domestic semiconductor production.</span><sup data-dcnode-id="3506"><a aria-controls="footnote40" aria-expanded="false" class="footnote-marker" data-dcnode-id="3507" href="#fn40" id="fnmarker40" role="button"><span data-dcnode-id="3508" instrument_node="">40</span></a></sup><span data-dcnode-id="3505" instrument_node=""> To accomplish this goal, China will need foreign imports of semiconductor manufacturing equipment (SME), which comprises the equipment and tools needed to establish a chip fabrication facility, or foundry. The global SME market is highly centralized, with the United States, Japan, and the Netherlands accounting for 90 percent.</span><sup data-dcnode-id="3502"><a aria-controls="footnote41" aria-expanded="false" class="footnote-marker" data-dcnode-id="3503" href="#fn41" id="fnmarker41" role="button"><span data-dcnode-id="3504" instrument_node="">41</span></a></sup><span data-dcnode-id="3501" instrument_node="">
</span></p><span data-dcnode-id="3499" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3498" instrument_node="">While export controls on semiconductors themselves should be rare and targeted, such as the action against Huawei and a handful of other companies linked to the Chinese military, the United States should enact broad restrictions on sales of SME to China to sustain the U.S. advantage in hardware. In parallel, the Commerce and State departments should work with key allies and partners (the Netherlands, Japan, South Korea, and Singapore) to establish multilateral export controls on SME, thereby further restricting sales to China.
</span></p><span data-dcnode-id="3496" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3495" instrument_node="">It is true that SME export controls would reduce profits from sales in China that U.S. companies might have reinvested in R&amp;D.</span><sup data-dcnode-id="3492"><a aria-controls="footnote42" aria-expanded="false" class="footnote-marker" data-dcnode-id="3493" href="#fn42" id="fnmarker42" role="button"><span data-dcnode-id="3494" instrument_node="">42</span></a></sup><span data-dcnode-id="3491" instrument_node=""> Nevertheless, the imperative of protecting U.S. technological advantage makes this a necessary expense, and the U.S. government can increase R&amp;D funding in next-generation chip design, fabrication, and packaging to help fill the gap and ensure continued U.S. leadership in semiconductors.
</span></p><span data-dcnode-id="3489" instrument_node="">
</span><h4 data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Diversify sources of rare earth minerals</span></h4><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3485" instrument_node="">The United States must also secure the underlying raw materials behind digital technologies. Rare earth minerals, in particular, are essential for electronics, missile guidance systems, and military platforms such as fighter aircraft and submarines.</span><sup data-dcnode-id="3482"><a aria-controls="footnote43" aria-expanded="false" class="footnote-marker" data-dcnode-id="3483" href="#fn43" id="fnmarker43" role="button"><span data-dcnode-id="3484" instrument_node="">43</span></a></sup><span data-dcnode-id="3481" instrument_node=""> Yet China has near-complete control over the U.S. rare earths supply chain: As of 2018, China supplied 80 percent of U.S. rare earth imports and much of the chemical intermediates and mineral concentrates needed to process what was imported from Estonia, France, and Japan.</span><sup data-dcnode-id="3478"><a aria-controls="footnote44" aria-expanded="false" class="footnote-marker" data-dcnode-id="3479" href="#fn44" id="fnmarker44" role="button"><span data-dcnode-id="3480" instrument_node="">44</span></a></sup><span data-dcnode-id="3477" instrument_node=""> China further controls at least 85 percent of global rare earth processing capacity.</span><sup data-dcnode-id="3474"><a aria-controls="footnote45" aria-expanded="false" class="footnote-marker" data-dcnode-id="3475" href="#fn45" id="fnmarker45" role="button"><span data-dcnode-id="3476" instrument_node="">45</span></a></sup><span data-dcnode-id="3473" instrument_node="">
</span></p><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3453"><span data-dcnode-id="3470" instrument_node="">The U.S. government can take a number of important steps to help reduce U.S. reliance on China for rare earths. The U.S. Department of Defense, for instance, has already initiated efforts to expand mining and processing of rare earths outside China, including in Australia.</span><sup data-dcnode-id="3467"><a aria-controls="footnote46" aria-expanded="false" class="footnote-marker" data-dcnode-id="3468" href="#fn46" id="fnmarker46" role="button"><span data-dcnode-id="3469" instrument_node="">46</span></a></sup><span data-dcnode-id="3466" instrument_node=""> To reduce dependence on overseas suppliers more generally, Congress should ensure funding for the Department of Commerce’s plan to reinvigorate mining and processing of rare earths in the United States,</span><sup data-dcnode-id="3463"><a aria-controls="footnote47" aria-expanded="false" class="footnote-marker" data-dcnode-id="3464" href="#fn47" id="fnmarker47" role="button"><span data-dcnode-id="3465" instrument_node="">47</span></a></sup><span data-dcnode-id="3462" instrument_node=""> and Department of Energy research into and scaling of rare earth recycling from consumer products, which can stretch existing U.S. supplies.</span><sup data-dcnode-id="3459"><a aria-controls="footnote48" aria-expanded="false" class="footnote-marker" data-dcnode-id="3460" href="#fn48" id="fnmarker48" role="button"><span data-dcnode-id="3461" instrument_node="">48</span></a></sup><span data-dcnode-id="3458" instrument_node=""> Finally, Congress should support Department of Energy efforts to develop artificial substitutes, which have proved capable of reducing dependence on rare earths altogether.</span><sup data-dcnode-id="3455"><a aria-controls="footnote49" aria-expanded="false" class="footnote-marker" data-dcnode-id="3456" href="#fn49" id="fnmarker49" role="button"><span data-dcnode-id="3457" instrument_node="">49</span></a></sup><span data-dcnode-id="3454" instrument_node="">
</span></p><span data-dcnode-id="3452" instrument_node="">
</span><h4 data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">Expand export controls based on end use for certain products sold to China</span></h4><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">To ensure U.S. technology does not enable China’s malign behavior, the U.S. government should develop additional tools beyond existing restrictions on military exports. To that end, the U.S. Commerce Department should undertake the development of a new export control regulation that would restrict the sale of both key U.S.-origin products and key foreign-origin products developed by U.S. companies and their subsidiaries overseas to be used for certain end uses in China, including those that infringe on internationally accepted human rights standards, enable surveillance or cyberespionage, and are involved in domestic security activities.
</span></p><span data-dcnode-id="3446" instrument_node="">
</span><p data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">Creating a new end-use-based control regime would require rigorous consideration by the U.S. government, as well as shifts in compliance protocols by a number of U.S. private-sector exporters. The Commerce Department should develop end-use-based controls in consultation with the U.S. private sector, engaging in a full administrative rulemaking process to seek feedback from national security professionals and industry.
</span></p><span data-dcnode-id="3443" instrument_node="">
</span></div><span data-dcnode-id="3441" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3434"><span data-dcnode-id="3440" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3436"><span data-dcnode-id="3439" instrument_node="">
</span><a data-dcnode-id="3438" id="counter"></a><span data-dcnode-id="3437" instrument_node="">
</span></div><span data-dcnode-id="3435" instrument_node="">
</span></div><span data-dcnode-id="3433" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3321"><span data-dcnode-id="3432" instrument_node="">
</span><h3 data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">Counter Illicit Technology Transfer
</span></h3><span data-dcnode-id="3429" instrument_node="">
</span><h4 data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">Ensure sufficient resources for counterespionage investigations</span></h4><span data-dcnode-id="3426" instrument_node="">
</span><p data-dcnode-id="3416"><span data-dcnode-id="3425" instrument_node="">China poses a major counterintelligence threat to the United States, accounting for 90 percent of all Department of Justice (DoJ) espionage cases involving a state actor between 2011 and 2018.</span><sup data-dcnode-id="3422"><a aria-controls="footnote50" aria-expanded="false" class="footnote-marker" data-dcnode-id="3423" href="#fn50" id="fnmarker50" role="button"><span data-dcnode-id="3424" instrument_node="">50</span></a></sup><span data-dcnode-id="3421" instrument_node=""> The DoJ has begun ramping up efforts to counter this threat, with roughly 1,000 FBI investigations underway involving attempted intellectual property theft by China.</span><sup data-dcnode-id="3418"><a aria-controls="footnote51" aria-expanded="false" class="footnote-marker" data-dcnode-id="3419" href="#fn51" id="fnmarker51" role="button"><span data-dcnode-id="3420" instrument_node="">51</span></a></sup><span data-dcnode-id="3417" instrument_node=""> Moreover, the DoJ established a new China Initiative in 2018 to increase outreach to universities and business, interagency coordination, and investigation of Chinese investments and influence operations, among other activities.
</span></p><span data-dcnode-id="3415" instrument_node="">
</span><p data-dcnode-id="3405"><span data-dcnode-id="3414" instrument_node="">As these efforts move forward, Congress should provide the FBI and DoJ with sufficient resources—particularly for Chinese language skills and scientific and technical expertise—to ensure there is adequate capacity to carry out thorough counterespionage investigations. FBI Director Christopher Wray has identified Mandarin skills as a gap for the FBI,</span><sup data-dcnode-id="3411"><a aria-controls="footnote52" aria-expanded="false" class="footnote-marker" data-dcnode-id="3412" href="#fn52" id="fnmarker52" role="button"><span data-dcnode-id="3413" instrument_node="">52</span></a></sup><span data-dcnode-id="3410" instrument_node=""> and insufficient technical knowledge has at times been an obstacle in prior cases.</span><sup data-dcnode-id="3407"><a aria-controls="footnote53" aria-expanded="false" class="footnote-marker" data-dcnode-id="3408" href="#fn53" id="fnmarker53" role="button"><span data-dcnode-id="3409" instrument_node="">53</span></a></sup><span data-dcnode-id="3406" instrument_node="">
</span></p><span data-dcnode-id="3404" instrument_node="">
</span><h4 data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">Develop better collaboration between U.S. law enforcement and universities</span></h4><span data-dcnode-id="3401" instrument_node="">
</span><p data-dcnode-id="3387"><span data-dcnode-id="3400" instrument_node="">Universities have a strong interest in preventing countries such as China from unfairly exploiting research by their faculty and students, while also protecting core values of academic freedom and fostering transnational research. As universities and the FBI are both implementing measures to address academic espionage concerns on campuses, greater dialogue is urgently needed between investigators and academics to better understand the scope of the problem and work together on possible solutions.</span><sup data-dcnode-id="3397"><a aria-controls="footnote54" aria-expanded="false" class="footnote-marker" data-dcnode-id="3398" href="#fn54" id="fnmarker54" role="button"><span data-dcnode-id="3399" instrument_node="">54</span></a></sup><span data-dcnode-id="3396" instrument_node=""> Fortunately, some positive steps are already underway under the auspices of OSTP and the academic community.</span><sup data-dcnode-id="3393"><a aria-controls="footnote55" aria-expanded="false" class="footnote-marker" data-dcnode-id="3394" href="#fn55" id="fnmarker55" role="button"><span data-dcnode-id="3395" instrument_node="">55</span></a></sup><span data-dcnode-id="3392" instrument_node=""> More should be done, however, to ensure greater coordination between universities and the national security community on this important topic. Such action should include the reestablishment of the National Security Higher Education Advisory Board, which was established to build lines of communication and cooperation between universities and the national security community on counterintelligence threats, among other issues.</span><sup data-dcnode-id="3389"><a aria-controls="footnote56" aria-expanded="false" class="footnote-marker" data-dcnode-id="3390" href="#fn56" id="fnmarker56" role="button"><span data-dcnode-id="3391" instrument_node="">56</span></a></sup><span data-dcnode-id="3388" instrument_node="">
</span></p><span data-dcnode-id="3386" instrument_node="">
</span><h4 data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Improve visa screening for espionage risks</span></h4><span data-dcnode-id="3383" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3382" instrument_node="">The United States benefits greatly from foreign students at U.S. universities, many of whom stay for work and support the U.S. economy.</span><sup data-dcnode-id="3379"><a aria-controls="footnote57" aria-expanded="false" class="footnote-marker" data-dcnode-id="3380" href="#fn57" id="fnmarker57" role="button"><span data-dcnode-id="3381" instrument_node="">57</span></a></sup><span data-dcnode-id="3378" instrument_node=""> These academic exchanges are a significant source of strength for the United States and should be protected. Guided by that principle, Congress should nevertheless work with the State Department, FBI, and intelligence community to develop enhanced criteria for visa screening to identify individuals from China who pose heightened espionage risks.</span><sup data-dcnode-id="3375"><a aria-controls="footnote58" aria-expanded="false" class="footnote-marker" data-dcnode-id="3376" href="#fn58" id="fnmarker58" role="button"><span data-dcnode-id="3377" instrument_node="">58</span></a></sup><span data-dcnode-id="3374" instrument_node=""> Possible risk factors could include whether an individual comes from a university with ties to the PLA or cites highly specific research interests relating to defense technologies.</span><sup data-dcnode-id="3371"><a aria-controls="footnote59" aria-expanded="false" class="footnote-marker" data-dcnode-id="3372" href="#fn59" id="fnmarker59" role="button"><span data-dcnode-id="3373" instrument_node="">59</span></a></sup><span data-dcnode-id="3370" instrument_node="">
</span></p><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3358"><span data-dcnode-id="3367" instrument_node="">Recently proposed U.S. legislation includes both actor-based and technology-based approaches to improve visa screening. The People’s Liberation Army (PLA) Visa Security Act would prohibit F or J visas for PLA-employed, -funded, or -sponsored individuals, and the Protect Our Universities Act of 2019 would mandate background screening of students seeking to work on “sensitive research projects.”</span><sup data-dcnode-id="3364"><a aria-controls="footnote60" aria-expanded="false" class="footnote-marker" data-dcnode-id="3365" href="#fn60" id="fnmarker60" role="button"><span data-dcnode-id="3366" instrument_node="">60</span></a></sup><span data-dcnode-id="3363" instrument_node=""> Both proposals are sensible measures and should be implemented, but broader screening could still be required. This is in part because many important technology areas, such as AI, have both commercial and military applications. Beyond evident military-specific research projects, more stringent screening is also needed for a wider range of dual-use technologies.</span><sup data-dcnode-id="3360"><a aria-controls="footnote61" aria-expanded="false" class="footnote-marker" data-dcnode-id="3361" href="#fn61" id="fnmarker61" role="button"><span data-dcnode-id="3362" instrument_node="">61</span></a></sup><span data-dcnode-id="3359" instrument_node="">
</span></p><span data-dcnode-id="3357" instrument_node="">
</span><h4 data-dcnode-id="3355"><span data-dcnode-id="3356" instrument_node="">Expand sanctions authorities to cut off from the U.S. market and financial system Chinese firms that steal U.S. technology</span></h4><span data-dcnode-id="3354" instrument_node="">
</span><p data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">The United States has failed to sufficiently penalize Chinese companies known to be benefiting from stolen U.S. technology. Going forward, Chinese firms that engage in significant intellectual property (IP) theft and other anti-competitive behavior should be cut off from the U.S. market and the U.S. financial system. Existing U.S. sanctions authorities allow the executive branch to sanction foreign companies, including Chinese ones, that engage in cyber-enabled IP theft, but these authorities do not fully capture other types of IP theft, such as by corporate insiders. The U.S. Treasury Department, working with the Commerce Department and the State Department, should lead in developing and enforcing a new regime to enable sanctions against the full range of IP theft.
</span></p><span data-dcnode-id="3351" instrument_node="">
</span><h4 data-dcnode-id="3348"><strong data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Include more People’s Liberation Army-linked companies on the export regime Entity List</span></strong></h4><span data-dcnode-id="3347" instrument_node="">
</span><p data-dcnode-id="3337"><span data-dcnode-id="3346" instrument_node="">China engages in a systematic and multifaceted campaign of both licit and illicit technology transfer to acquire access to advanced U.S. technology and repurpose it for the Chinese military.</span><sup data-dcnode-id="3343"><a aria-controls="footnote62" aria-expanded="false" class="footnote-marker" data-dcnode-id="3344" href="#fn62" id="fnmarker62" role="button"><span data-dcnode-id="3345" instrument_node="">62</span></a></sup><span data-dcnode-id="3342" instrument_node=""> Although U.S. law generally prohibits the sale of U.S. products to the PLA and other military end users in China, Beijing’s promotion of military-civil fusion means that civilian entities in China that are closely linked to the PLA can still legally purchase U.S.-made products.</span><sup data-dcnode-id="3339"><a aria-controls="footnote63" aria-expanded="false" class="footnote-marker" data-dcnode-id="3340" href="#fn63" id="fnmarker63" role="button"><span data-dcnode-id="3341" instrument_node="">63</span></a></sup><span data-dcnode-id="3338" instrument_node=""> This problem is exacerbated by the fact that many cutting-edge technologies, such as AI, are dual-use, with both valuable military and commercial applications.
</span></p><span data-dcnode-id="3336" instrument_node="">
</span><p data-dcnode-id="3334"><span data-dcnode-id="3335" instrument_node="">The U.S. government has made some progress in using existing export control authorities to restrict the export of U.S. products to Chinese entities that are tied to the PLA. For example, in June 2019, the Commerce Department added five PLA-linked supercomputing organizations to the Entity List, which prohibits the sale or provision of U.S.-made products to the designated organizations. Expanding the list of named PLA-linked entities barred from receiving U.S. products and prohibiting visas for PLA-sponsored individuals will help limit proliferation of U.S. technology to the PLA.
</span></p><span data-dcnode-id="3333" instrument_node="">
</span><p data-dcnode-id="3323"><span data-dcnode-id="3332" instrument_node="">To that end, the Commerce Department and Department of Defense should lead an interagency process to compile an extensive, publicly releasable, and regularly updated list of PLA-linked entities in China and add them to the Commerce Entity List. (An initial such effort is reportedly underway.</span><sup data-dcnode-id="3329"><a aria-controls="footnote64" aria-expanded="false" class="footnote-marker" data-dcnode-id="3330" href="#fn64" id="fnmarker64" role="button"><span data-dcnode-id="3331" instrument_node="">64</span></a></sup><span data-dcnode-id="3328" instrument_node="">) In addition to curbing unwanted technology transfer to the PLA, this would help to expose China’s military-civil fusion strategy and make it riskier to invest in companies that work with the PLA. Finally, the United States should prohibit F and J visas for PLA-employed, -funded, or -sponsored individuals.</span><sup data-dcnode-id="3325"><a aria-controls="footnote65" aria-expanded="false" class="footnote-marker" data-dcnode-id="3326" href="#fn65" id="fnmarker65" role="button"><span data-dcnode-id="3327" instrument_node="">65</span></a></sup><span data-dcnode-id="3324" instrument_node="">
</span></p><span data-dcnode-id="3322" instrument_node="">
</span></div><span data-dcnode-id="3320" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="3313"><span data-dcnode-id="3319" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="3315"><span data-dcnode-id="3318" instrument_node="">
</span><a data-dcnode-id="3317" id="lead"></a><span data-dcnode-id="3316" instrument_node="">
</span></div><span data-dcnode-id="3314" instrument_node="">
</span></div><span data-dcnode-id="3312" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3254"><span data-dcnode-id="3311" instrument_node="">
</span><h3 data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">Lead on Developing New International Rules, Norms, and Standards for Emerging Technologies</span></h3><span data-dcnode-id="3308" instrument_node="">
</span><h4 data-dcnode-id="3306"><span data-dcnode-id="3307" instrument_node="">Create a new grouping of advanced democracies to coordinate on technology policy</span></h4><span data-dcnode-id="3305" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3304" instrument_node="">U.S. efforts to spur innovation and protect key areas of competitive advantage are far more likely to succeed if major elements of U.S. policy are coordinated and jointly implemented with allies and partners. Multilateral cooperation among like-minded countries would serve to amplify the effectiveness of the measures across a range of areas, including R&amp;D, supply chain diversity and security, standards-setting, multilateral export controls, and countering illiberal uses of technology. To achieve the necessary level of coordination and collaboration, the United States should lead the creation of a new multilateral grouping on technology policy.</span><sup data-dcnode-id="3301"><a aria-controls="footnote66" aria-expanded="false" class="footnote-marker" data-dcnode-id="3302" href="#fn66" id="fnmarker66" role="button"><span data-dcnode-id="3303" instrument_node="">66</span></a></sup><span data-dcnode-id="3300" instrument_node=""> </span></p><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">The purpose of this new body would be to coordinate multinational technology policy to protect and advance key areas of competitive technological advantage, and to promote collective norms and values around the use of emerging technologies. Leading liberal-democratic technological and economic powers—including Australia, Canada, France, Germany, Japan, the Netherlands, South Korea, and the United Kingdom, among others—would comprise the group’s core membership. This new organization could cooperate on 5G, semiconductors, AI, cybersecurity, internet of things, and other significant technologies. Increased information sharing and cooperation could help nations develop cooperative solutions for technology leadership and defend against intellectual property theft, espionage, and other unfair trade practices that harm competition and distort free and fair markets. </span></p><span data-dcnode-id="3295" instrument_node="">
</span><h4 data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">Engage more proactively in multilateral bodies that set technology standards</span></h4><span data-dcnode-id="3292" instrument_node="">
</span><p data-dcnode-id="3276"><span data-dcnode-id="3291" instrument_node="">
 The United States has a strong national security interest in the development of international technical standards, which are critical for shaping how technology is adopted around the world</span><sup data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node=""> </span></sup><span data-dcnode-id="3288" instrument_node="">for 5G wireless, artificial intelligence, internet of things, and other emerging technologies.</span><sup data-dcnode-id="3285"><a aria-controls="footnote67" aria-expanded="false" class="footnote-marker" data-dcnode-id="3286" href="#fn67" id="fnmarker67" role="button"><span data-dcnode-id="3287" instrument_node="">67</span></a></sup><span data-dcnode-id="3284" instrument_node=""> However, while the U.S. government has been insufficiently engaged,</span><sup data-dcnode-id="3281"><a aria-controls="footnote68" aria-expanded="false" class="footnote-marker" data-dcnode-id="3282" href="#fn68" id="fnmarker68" role="button"><span data-dcnode-id="3283" instrument_node="">68</span></a></sup><span data-dcnode-id="3280" instrument_node=""> China has become increasingly proactive in international bodies, elevating standards-setting as a major priority with its “China Standards 2035” plan.</span><sup data-dcnode-id="3277"><a aria-controls="footnote69" aria-expanded="false" class="footnote-marker" data-dcnode-id="3278" href="#fn69" id="fnmarker69" role="button"><span data-dcnode-id="3279" instrument_node="">69</span></a></sup></p><span data-dcnode-id="3275" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3274" instrument_node="">Working in partnership with U.S. industry leaders, the U.S. government should increase its participation in international technology standards-setting bodies, including the 3rd Generation Partnership Project (3GPP), International Telecommunication Union (ITU), and International Organization for Standardization (ISO), among others.</span><sup data-dcnode-id="3271"><a aria-controls="footnote70" aria-expanded="false" class="footnote-marker" data-dcnode-id="3272" href="#fn70" id="fnmarker70" role="button"><span data-dcnode-id="3273" instrument_node="">70</span></a></sup><span data-dcnode-id="3270" instrument_node=""> To accomplish this goal, OSTP should establish an interagency working group on international technology standards, bringing together the departments of State, Commerce, Justice, and Defense; the U.S. intelligence community; and the NIST to coordinate U.S. government action. This interagency group should also increase engagement with U.S. industry leaders, including information sharing on technical standards and Chinese efforts to exert political influence within international standards-setting bodies.</span><sup data-dcnode-id="3267"><a aria-controls="footnote71" aria-expanded="false" class="footnote-marker" data-dcnode-id="3268" href="#fn71" id="fnmarker71" role="button"><span data-dcnode-id="3269" instrument_node="">71</span></a></sup><span data-dcnode-id="3266" instrument_node=""> Participation in standards-setting bodies should be explicitly exempted from export controls so U.S. companies and government officials can help shape international standards even if prohibited Chinese entities are also participating.</span></p><span data-dcnode-id="3264" instrument_node="">
</span><h4 data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Lead internationally and engage with China on developing norms and principles for the use of emerging technologies</span></h4><span data-dcnode-id="3261" instrument_node="">
</span><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">
 The United States should work with allies and partners to establish and export norms for using emerging technologies, including AI and biotechnology. U.S. officials should also engage China where there may be opportunities for norm development. The United States has a vested interest in helping to shape, to the extent possible, how China uses technology, which will have significant global implications. A number of Chinese actors have already released AI “principles” documents, similar to those released by businesses, governments, and nongovernmental organizations around the globe. These principles indicate some degree of norm transfer to China. 
 </span></p><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Continuing to develop formal norms such as the AI principles the Organisation for Economic Co-operation and Development (OECD) recently adopted is valuable, but equally important will be demonstrating responsible use in applications at home and abroad. The dynamic interplay in democratic nations between civil society, nongovernmental organizations, companies, the government, and a free press over how to use technology while balancing competing interests sets an important example for other nations and stands in stark contrast to the illiberal use of technology by autocratic regimes.
</span></p><span data-dcnode-id="3255" instrument_node="">
</span></div><span data-dcnode-id="3253" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="3208"><span data-dcnode-id="3252" instrument_node="">
</span><h2 data-dcnode-id="3250" id="iii-bolstering-u-s-economic-power-and-leadership"><span data-dcnode-id="3251" instrument_node="">III. Bolstering U.S. Economic Power and Leadership</span></h2><span data-dcnode-id="3249" instrument_node="">
</span><p data-dcnode-id="3244"><em data-dcnode-id="3245"><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-III.-Bolstering-U.S.-Economic-Power-and-Leadership-1.pdf%3Fmtime%3D20200122085542%26focal%3Dnone"><span data-dcnode-id="3248" instrument_node="">Download</span></a><span data-dcnode-id="3246" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">Economics is at the core of American competitiveness. U.S. economic and financial strength provides the foundation for U.S. military power and alliances, technological leadership, and political influence in the region. At home, the United States benefits enormously from the open economic order in Asia, providing a vital and growing region for U.S. trade and investment. These contributions to the prosperity and security of the American people will be at risk if the United States does not renew U.S. economic power and leadership in the Indo-Pacific. </span></p><span data-dcnode-id="3240" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">China has eroded America’s economic influence by leveraging its huge market, pursuing anti-competitive trade practices, and seeking to revise the regional economic order with institutions and initiatives that advantage Chinese companies. As the dominant trading partner in the region, Beijing selectively uses development finance and market access as carrots and sticks to advance the Chinese Communist Party’s domestic and foreign policy agenda. 
 </span></p><span data-dcnode-id="3237" instrument_node="">
</span><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Meanwhile, Beijing has been nimble in pushing new economic institutions and initiatives—including the Asian Infrastructure Investment Bank (AIIB) and its Belt and Road strategy—to create the veneer, and in some cases the reality, of an increasingly Sino-centric economic order in the region. China’s growing economic clout further provides Beijing with the ability to challenge U.S. security interests, both directly by investing heavily in modernizing the People’s Liberation Army and indirectly by using economic pressure to shape the decisionmaking of U.S. allies and partners about the breadth and future of their military ties with the United States. 
 </span></p><span data-dcnode-id="3234" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">Preserving U.S. economic interests in the Indo-Pacific will require a concerted effort to shape the regional economic order in ways that level the playing field and deny China the advantages it accrues from anti-competitive practices, including systematic intellectual property theft, state subsidies, and limits on access to China’s market. While it would be preferable to steer China toward a different course, the current Chinese Communist Party (CCP) leadership in Beijing remains committed to a state-led economic model. 
 </span></p><span data-dcnode-id="3231" instrument_node="">
</span><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">As a result, the United States should no longer center its economic policy on compelling Beijing to make fundamental structural changes to China’s economy. Yet, nor should Washington’s response be to sever America’s economic relationship with China: Many areas of trade and investment are beneficial to the United States and actually provide leverage over Beijing. A broad-based decoupling of the U.S. and Chinese economies would prove unnecessarily costly to Americans. Instead, a more selective approach to economic interdependence is necessary to address the unfair advantages that China derives from maintaining a fairly closed economy at home while preying on U.S. economic openness. 
 </span></p><span data-dcnode-id="3228" instrument_node="">
</span><p data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">The United States should respond with a determined economic agenda that simultaneously strengthens U.S. economic influence globally and in the region and reinforces sound governance and best practices for free, fair, and secure international economic activity. This should include revitalizing leadership in international economic institutions and emphasizing adaptations within these institutions that better reflect today’s economic realities. Such an approach would target China’s anti-competitive behaviors and policies with legal and trade actions, both bilaterally and, to a great extent, with international partners and institutions, including the World Trade Organization (WTO). 
 </span></p><span data-dcnode-id="3225" instrument_node="">
</span><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Washington should also commit to working collectively with other advanced economies in Asia and Europe on new high-standard trade and investment agreements that both create greater opportunities for U.S. businesses and undermine China’s unfair and illegal trade practices. In doing so, the U.S. government should leverage the immense power of the U.S. private sector, augmenting the role of commercial diplomacy and focusing greater attention and resources to catalyze U.S. trade and investment in the Indo-Pacific. Success in this regard will require reversing U.S. withdrawal from multilateral trade mechanisms, and undoing the deeply counterproductive approach of imposing unilateral tariffs on key U.S. allies and partners.
 </span></p><span data-dcnode-id="3222" instrument_node="">
</span><p data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">In addition to renewing U.S. economic leadership in the Indo-Pacific, it will be essential for the United States to reinforce the preeminence of the U.S. financial system. America’s deep and liquid financial markets are a key anchor of economic growth and stability, as well as leverage the United States can deploy in pursuit of vital national interests. Financial power further enables the United States to assist allies and partners, while using sanctions and other coercive economic tools to pressure potential adversaries. Sustaining the dominant role of the dollar and increasing transparency in U.S. markets will further enhance American’s financial strength. 
 </span></p><span data-dcnode-id="3219" instrument_node="">
</span><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">To reinforce America’s economic position in the Indo-Pacific, Washington will have to look beyond simply shoring up traditional sources of financial power. The United States should play a more formidable role in shaping the future of financial technology (fintech). Ensuring that major global fintech companies are anchored in the United States, and that U.S. incumbent financial institutions incorporate and develop new leading fintech applications, will be critical to curbing China’s ability to undercut America’s financial power.
 </span></p><span data-dcnode-id="3216" instrument_node="">
