</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">When coupled with real-world actions such as China’s ongoing military buildup and expansionist behavior in the South China Sea, technological achievements, and overseas investments under the banner of its Belt and Road, Beijing’s narrative has successfully convinced large parts of the Indo-Pacific that momentum is on its side, even when the facts on the ground are more mixed. If Washington is unable to reverse these perceptions, the United States will find it difficult, if not impossible, to generate sufficient support for its economic, political, and military initiatives in the region. 
 </span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Even as the United States must do more to renew its democratic principles at home, it still retains considerable advantages in the ideological competition between liberal democracy and China’s model of authoritarianism and state-led economics. Consistent with a dominant theme that appears throughout this assessment, competing effectively with China over ideology should begin by reinforcing America’s inherent strengths. Rule of law, representative government, ethnic diversity, and freedom of the press and religion are all vital U.S. assets that, if sustained domestically, can be trumpeted abroad—particularly when contrasted with the Chinese Communist Party’s tightening chokehold on the rights and freedoms of the Chinese people. 
 </span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Competing more effectively over narratives and ideology will also require greater attention and fundamental reforms to the U.S. government’s ability to conduct strategic messaging and information operations. The United States will need new public diplomacy institutions—optimized for the digital age—that can effectively communicate and promote America’s substantial contributions to the region’s security and prosperity. Most elites and publics in the region still prefer American leadership, meaning that countries in the Indo-Pacific are primed to welcome a more coherent and positive American narrative, particularly if backed by the economic and diplomatic initiatives recommended in this report. 
 </span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">As China’s propaganda machine continues attacking American democracy and society, U.S. officials should be highlighting the Chinese Communist Party’s mistreatment of its own people, as well as the CCP’s mismanagement of China’s economy and foreign policy. Moreover, the United States can better leverage the fact that confidence in Communist Party Secretary Xi Jinping is low throughout much of the region, and Beijing’s geopolitical motivations remain widely mistrusted. Shining a brighter spotlight on China’s oppression at home and its corrupt and assertive activities overseas could provide a more realistic view of the ruling regime and make it harder and less desirable for surrounding states to accept China’s regional leadership. Washington could do more to expose China’s malign activities by selectively declassifying intelligence, as well as using U.S. public diplomacy to encourage Muslim populations around the world to more vocally condemn China’s reprehensible actions in Xinjiang.
 </span></p><span data-dcnode-id="2764" instrument_node="">
</span><p data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Finally, the United States should strengthen its own domestic protections against China’s influence efforts, while also promoting resiliency within and among like-minded allies and partners. The U.S. government should institute mandatory transparency requirements for U.S. institutions that receive Chinese government funding and should broaden the Foreign Agents Registration Act (FARA) to include official Chinese propaganda and media. Given that CCP influence operations threaten democratic governance and other U.S. interests overseas, the United States should lead multilateral efforts on information sharing and best practices to limit China’s ability to influence open societies. 
</span></p><span data-dcnode-id="2761" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2760" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="2759"></p><span data-dcnode-id="2757" instrument_node="">
</span></div><span data-dcnode-id="2755" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2748"><span data-dcnode-id="2754" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2750"><span data-dcnode-id="2753" instrument_node="">
</span><a data-dcnode-id="2752" id="strengthen2"></a><span data-dcnode-id="2751" instrument_node="">
</span></div><span data-dcnode-id="2749" instrument_node="">
</span></div><span data-dcnode-id="2747" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2696"><span data-dcnode-id="2746" instrument_node="">
</span><h3 data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Strengthen U.S. Public Diplomacy in the Indo-Pacific</span></h3><span data-dcnode-id="2743" instrument_node="">
</span><h4 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">Rebuild and enhance U.S. public diplomacy institutions</span></h4><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2739" instrument_node="">The U.S. government’s current approach to public diplomacy is largely piecemeal, unfocused, and underresourced. Public affairs operations are not well coordinated across government agencies and are mostly tactical in posture—focused on day-to-day talking points, rather than on strategic messaging campaigns executed over months or years. The Global Engagement Center (GEC), mandated by Congress to lead the U.S. government in exposing and countering propaganda and disinformation by foreign actors, including China, remains understaffed relative to its expansive mission.</span><sup data-dcnode-id="2736"><a aria-controls="footnote78" aria-expanded="false" class="footnote-marker" data-dcnode-id="2737" href="#fn78" id="fnmarker78" role="button"><span data-dcnode-id="2738" instrument_node="">78</span></a></sup><span data-dcnode-id="2735" instrument_node=""> Going forward, the U.S. government should forge a more robust, whole-of-government public diplomacy capability that is optimized for the digital age.</span><sup data-dcnode-id="2732"><a aria-controls="footnote79" aria-expanded="false" class="footnote-marker" data-dcnode-id="2733" href="#fn79" id="fnmarker79" role="button"><span data-dcnode-id="2734" instrument_node="">79</span></a></sup><span data-dcnode-id="2731" instrument_node=""> Strategic messaging should be considered and developed as a core component of U.S. strategy in the Indo-Pacific, rather than an afterthought in support of existing policies. Within the State Department, measures to integrate training across different divisions—including political, consular, economic, management, and public diplomacy—could support a more unified public diplomacy apparatus through which effective messaging is used to advance policy outcomes. Public diplomacy officers should also be trained to work closely with designated counterparts in the intelligence community to respond to disinformation campaigns and engage in targeted countermessaging.</span><sup data-dcnode-id="2728"><a aria-controls="footnote80" aria-expanded="false" class="footnote-marker" data-dcnode-id="2729" href="#fn80" id="fnmarker80" role="button"><span data-dcnode-id="2730" instrument_node="">80</span></a></sup><span data-dcnode-id="2727" instrument_node="">
</span></p><span data-dcnode-id="2725" instrument_node="">
</span><h4 data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Optimize U.S. information efforts for social media and targeted audiences</span></h4><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2721" instrument_node="">Public diplomacy officers should further leverage video, graphic design, interactive infographics, and other formats to creatively disseminate information about U.S. government policies and initiatives. Foreign service officers and other in-country embassy staff should also be trained to employ U.S. and local social media platforms and use translations of different products to expand the reach of their messaging.</span><sup data-dcnode-id="2718"><a aria-controls="footnote81" aria-expanded="false" class="footnote-marker" data-dcnode-id="2719" href="#fn81" id="fnmarker81" role="button"><span data-dcnode-id="2720" instrument_node="">81</span></a></sup><span data-dcnode-id="2717" instrument_node=""> U.S. public diplomacy should develop capabilities to detect and rapidly respond to emergent opportunities. For example, the State Department could leverage artificial intelligence-powered sentiment analysis of local news and social media, as well as U.S. Embassy reporting, to track public attitudes and tailor U.S. public diplomacy accordingly.</span><sup data-dcnode-id="2714"><a aria-controls="footnote82" aria-expanded="false" class="footnote-marker" data-dcnode-id="2715" href="#fn82" id="fnmarker82" role="button"><span data-dcnode-id="2716" instrument_node="">82</span></a></sup><span data-dcnode-id="2713" instrument_node="">
</span></p><span data-dcnode-id="2711" instrument_node="">
</span><h4 data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">Launch public diplomacy campaigns to highlight and promote U.S. economic initiatives, development assistance, and private-sector investments in the Indo-Pacific</span></h4><span data-dcnode-id="2708" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2707" instrument_node="">Even more important than shining a light on China’s bad behavior, an effective U.S. counternarrative should highlight America’s positive contributions, particularly related to both the quality and quantity of U.S. economic engagement in the region, including substantial U.S. private-sector investments.</span><sup data-dcnode-id="2704"><a aria-controls="footnote83" aria-expanded="false" class="footnote-marker" data-dcnode-id="2705" href="#fn83" id="fnmarker83" role="button"><span data-dcnode-id="2706" instrument_node="">83</span></a></sup><span data-dcnode-id="2703" instrument_node=""> Washington should amplify messaging around the U.S. government’s vast economic and development assistance initiatives in the Indo-Pacific—including the establishment of a new U.S. International Development Finance Corporation, U.S. coordination with Japan on regional energy investments, and the establishment of a U.S.-ASEAN Smart Cities Partnership—as well as tangible USAID and OPIC-financed infrastructure projects and Department of Defense exercise-related construction (ERC).</span><sup data-dcnode-id="2700"><a aria-controls="footnote84" aria-expanded="false" class="footnote-marker" data-dcnode-id="2701" href="#fn84" id="fnmarker84" role="button"><span data-dcnode-id="2702" instrument_node="">84</span></a></sup><span data-dcnode-id="2699" instrument_node=""> This in turn requires providing ambassadors and their public diplomacy teams more freedom and financial latitude to pursue original initiatives that can spotlight enduring and reassuring forms of American engagement and investment.
</span></p><span data-dcnode-id="2697" instrument_node="">
</span></div><span data-dcnode-id="2695" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2688"><span data-dcnode-id="2694" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2690"><span data-dcnode-id="2693" instrument_node="">
</span><a data-dcnode-id="2692" id="expose"></a><span data-dcnode-id="2691" instrument_node="">
</span></div><span data-dcnode-id="2689" instrument_node="">
</span></div><span data-dcnode-id="2687" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2644"><span data-dcnode-id="2686" instrument_node="">
</span><h3 data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Expose China's Illegal, Aggressive, and Repressive Actions</span></h3><span data-dcnode-id="2683" instrument_node="">
</span><h4 data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">Communicate directly and more systematically to publics both at home and abroad about Beijing’s malign activities</span></h4><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2670"><span data-dcnode-id="2679" instrument_node="">Senior U.S. government officials and members of Congress should lead a systematic campaign to educate key U.S. stakeholders—including universities, civil society, and the private sector—about the nature of the China challenge. U.S. leaders should employ a full suite of social media, speeches, private briefings, and opinion pieces to communicate to the American people the urgency of coordinating a whole-of-society approach to compete with Beijing.</span><sup data-dcnode-id="2676"><a aria-controls="footnote85" aria-expanded="false" class="footnote-marker" data-dcnode-id="2677" href="#fn85" id="fnmarker85" role="button"><span data-dcnode-id="2678" instrument_node="">85</span></a></sup><span data-dcnode-id="2675" instrument_node=""> In public communications, members of the executive and legislative branches should clearly differentiate between the Chinese people and the malign activities of the CCP. In doing so, U.S. officials should absolutely avoid casting the challenge that Beijing poses in civilizational or racial terms, which misrepresents the root of the problem and risks heightened xenophobia at home. In communications with global audiences, Washington should continue to raise awareness around challenges associated with China’s overseas investment, including the erosion of national sovereignty, lack of transparency, unsustainable financial burdens, disengagement from local economic needs, geopolitical risks, negative environmental impacts, and the significant potential for corruption.</span><sup data-dcnode-id="2672"><a aria-controls="footnote86" aria-expanded="false" class="footnote-marker" data-dcnode-id="2673" href="#fn86" id="fnmarker86" role="button"><span data-dcnode-id="2674" instrument_node="">86</span></a></sup><span data-dcnode-id="2671" instrument_node="">
</span></p><span data-dcnode-id="2669" instrument_node="">
</span><h4 data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Redesign declassification processes to make it easier to release public information about the Chinese Communist Party’s wrongdoings</span></h4><span data-dcnode-id="2666" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2665" instrument_node="">U.S. intelligence agencies regularly acquire information about China’s illiberal, illegal, and corrupt behavior against its own people and abroad. The executive branch should consider when it may be appropriate to loosen declassification processes and authorities to engage in more effective U.S. information operations. Too often, this information is unnecessarily classified and withheld from U.S. policymakers, the American people, and U.S. allies and partners. While still putting a premium on protecting intelligence sources and methods, selective declassification of certain information would better inform the U.S. public and the international community about the often corrupt and abusive domestic and foreign policies of the CCP.</span><sup data-dcnode-id="2662"><a aria-controls="footnote87" aria-expanded="false" class="footnote-marker" data-dcnode-id="2663" href="#fn87" id="fnmarker87" role="button"><span data-dcnode-id="2664" instrument_node="">87</span></a></sup><span data-dcnode-id="2661" instrument_node="">
</span></p><span data-dcnode-id="2659" instrument_node="">
</span><h4 data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Draw attention to the repression of Uighurs as a religious freedom issue and encourage Muslim communities in Southeast Asia and beyond to speak out</span></h4><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2655" instrument_node="">Public reactions in even Muslim-majority Southeast Asian countries to Beijing’s oppression of Uighurs in China have been relatively muted. The main excuse that Chinese authorities give for Beijing’s campaign of oppression in Xinjiang is that their goal is to prevent terrorism and increase safety.</span><sup data-dcnode-id="2652"><a aria-controls="footnote88" aria-expanded="false" class="footnote-marker" data-dcnode-id="2653" href="#fn88" id="fnmarker88" role="button"><span data-dcnode-id="2654" instrument_node="">88</span></a></sup><span data-dcnode-id="2651" instrument_node=""> Despite knowing better, many governments of Muslim-majority countries, in the absence of public pressure, have supported this false narrative. The United States, in its diplomacy with Muslim-majority countries in Southeast Asia and beyond, should articulate China’s treatment of Uighurs as a religious freedom issue. One way to do this is to compile a comprehensive list of ways that Beijing directly targets adherence to Islam, including outlawing fasting during Ramadan, destroying mosques and religious schools, punishing Uighurs for speaking languages other than Mandarin, and monitoring imam sermons in real time.</span><sup data-dcnode-id="2648"><a aria-controls="footnote89" aria-expanded="false" class="footnote-marker" data-dcnode-id="2649" href="#fn89" id="fnmarker89" role="button"><span data-dcnode-id="2650" instrument_node="">89</span></a></sup><span data-dcnode-id="2647" instrument_node=""> In relatively democratic Muslim-majority countries, greater public focus on Xinjiang as a religious freedom issue could help to create pressure on governments to respond.
</span></p><span data-dcnode-id="2645" instrument_node="">
</span></div><span data-dcnode-id="2643" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2636"><span data-dcnode-id="2642" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2638"><span data-dcnode-id="2641" instrument_node="">
</span><a data-dcnode-id="2640" id="build"></a><span data-dcnode-id="2639" instrument_node="">
</span></div><span data-dcnode-id="2637" instrument_node="">
</span></div><span data-dcnode-id="2635" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2597"><span data-dcnode-id="2634" instrument_node="">
</span><h3 data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Build Resiliency to China's Propaganda and Influence Operations</span></h3><span data-dcnode-id="2631" instrument_node="">
</span><h4 data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Institute mandatory transparency for U.S. educational and civil society institutions receiving Chinese government funding </span></h4><span data-dcnode-id="2628" instrument_node="">
</span><p data-dcnode-id="2619"><span data-dcnode-id="2627" instrument_node="">A number of U.S. universities, academic departments, individual scholars, think tanks, and other civil society organizations receive substantial funding from Beijing that is often targeted at shaping views and discourse on China.</span><sup data-dcnode-id="2624"><a aria-controls="footnote90" aria-expanded="false" class="footnote-marker" data-dcnode-id="2625" href="#fn90" id="fnmarker90" role="button"><span data-dcnode-id="2626" instrument_node="">90</span></a></sup><span data-dcnode-id="2623" instrument_node=""> Higher degrees of transparency can help to ensure that this funding is not generating hidden forms of foreign lobbying, self-censorship, or other activities that undermine core U.S. democratic principles. To that end, the U.S. government should significantly lower the funding cap that triggers a requirement for U.S. institutions to disclose these foreign contributions. Concurrently, Congress should also expand the reach of the Foreign Agents Registration Act to require universities to set standards and limits for student organizations and cultural exchange institutions that rely on external, especially foreign government, sources of funding.</span><sup data-dcnode-id="2620"><a aria-controls="footnote91" aria-expanded="false" class="footnote-marker" data-dcnode-id="2621" href="#fn91" id="fnmarker91" role="button"><span data-dcnode-id="2622" instrument_node="">91</span></a></sup></p><span data-dcnode-id="2618" instrument_node="">
</span><h4 data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Require disclaimers on direct foreign government propaganda, including through reform of the Foreign Agents Registration Act
 </span></h4><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2609"><span data-dcnode-id="2614" instrument_node="">Positive initial steps have been taken to enforce FARA more systematically for state-run and state-funded press outlets to register as foreign agents, as well as the Federal Election Campaign Act, which requires that campaign-related advertisements contain disclaimers. To provide even broader public transparency, the U.S. government should require that Chinese and other state media label their public productions with clear and prominent disclaimers that indicate their funding streams, particularly from foreign governments.</span><sup data-dcnode-id="2611"><a aria-controls="footnote92" aria-expanded="false" class="footnote-marker" data-dcnode-id="2612" href="#fn92" id="fnmarker92" role="button"><span data-dcnode-id="2613" instrument_node="">92</span></a></sup><span data-dcnode-id="2610" instrument_node=""> Congress should also bring greater scrutiny to U.S. media outlets that legitimize Chinese state-run propaganda by running it on their websites and in print in ways that are barely distinguishable from content that is generated or approved by the host platform.
</span></p><span data-dcnode-id="2608" instrument_node="">
</span><h4 data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Help to root out Chinese Communist Party influence in key ally and partner countries 
 </span></h4><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2604" instrument_node="">The United States should convene regular dialogues with Five Eyes countries to share best practices for addressing China’s influence efforts during elections, as well as in media, entertainment, academia, and the private sector. Beyond Five Eyes consultations, the United States should hold a similar multilateral dialogue with a more expansive grouping of allies and partners, particularly Taiwan and countries in Southeast Asia, as well as select countries beyond the Indo-Pacific that are at the front lines of CCP influence campaigns, including in Africa, Eastern Europe, and Latin America. As part of these larger dialogues, the United States should encourage its allies and partners to share technical expertise and best practices for identifying and countering CCP domestic interference, including through more rigorous reporting requirements for spending on paid advertisements, media ownership structures, and other ties to the CCP.</span><sup data-dcnode-id="2601"><a aria-controls="footnote93" aria-expanded="false" class="footnote-marker" data-dcnode-id="2602" href="#fn93" id="fnmarker93" role="button"><span data-dcnode-id="2603" instrument_node="">93</span></a></sup><span data-dcnode-id="2600" instrument_node=""> Recognizing that many of its allies and partners fear retribution by Beijing, the United States should publicly frame this dialogue as centered on upholding sovereignty against foreign interference, rather than explicitly aimed at countering CCP influence campaigns.</span></p><span data-dcnode-id="2598" instrument_node="">
</span></div><span data-dcnode-id="2596" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2560"><span data-dcnode-id="2595" instrument_node="">
</span><h2 data-dcnode-id="2593" id="vi-promoting-digital-freedom-and-countering-high-tech-illiberalism"><span data-dcnode-id="2594" instrument_node="">VI. Promoting Digital Freedom and Countering High-Tech Illiberalism</span></h2><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2587"><em data-dcnode-id="2588"><a data-dcnode-id="2590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-VI.-Promoting-Digital-Freedom-and-Countering-High-Tech-Illiberalism.pdf%3Fmtime%3D20200122085544%26focal%3Dnone"><span data-dcnode-id="2591" instrument_node="">Download</span></a><span data-dcnode-id="2589" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2585" instrument_node="">The digital domain will be a primary battleground between freedom and authoritarianism in the Indo-Pacific. A more open approach to the internet, stronger data protections, and shared telecommunications infrastructure would be a catalyst for the kind of free and open region championed by the United States. On the other hand, China’s control of these assets would likely be cause for democratic decline and the narrowing of civil liberties and individual rights throughout large swaths of Asia.</span><sup data-dcnode-id="2582"><a aria-controls="footnote94" aria-expanded="false" class="footnote-marker" data-dcnode-id="2583" href="#fn94" id="fnmarker94" role="button"><span data-dcnode-id="2584" instrument_node="">94</span></a></sup></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Current trends in China provide a stark warning about how the Chinese Communist Party is harnessing a suite of new technologies—ubiquitous surveillance cameras coupled with facial recognition software, big data feeding the development of social credit scores, pervasive online censorship, and more—to facilitate repression and social control. China’s high-tech illiberalism is most pronounced in the western region of Xinjiang, now a police state where Beijing has coupled 21st-century innovation with 20th-century-style mass detention camps to persecute the region’s Uighur population.
 </span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Overseas, China has reoriented its Belt and Road strategy to focus more on digital connectivity, exporting infrastructure not only for communications, but also surveillance and censorship. Through the provision of technology, funding, and know-how, Beijing’s digital expansion is making repression easier and more attractive to governments with weak democratic institutions, and further entrenching the rule of fellow authoritarian regimes. As China increases its role in the digital ecosystem of the developing world, Beijing is leveraging its influence to encourage a global shift toward a more closed model of internet governance. Left uncontested, already burgeoning trends of democratic decline and digital repression are certain to accelerate.
 </span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Washington has been slow to respond to these troubling trends. U.S. policymakers have largely focused on traditional national security dimensions of China’s digital expansion, particularly the spread of its 5G infrastructure. While still managing this legitimate concern, the United States should adopt a more comprehensive approach to the wider set of governance challenges China’s high-tech illiberalism poses. Doing so should focus on three main lines of effort. 
 </span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">First, Washington should bolster U.S. engagement with countries throughout the Indo-Pacific with an affirmative agenda in the digital domain, including by establishing a new U.S. Digital Development Fund, leveraging the new U.S. International Development Finance Corporation, and deploying more digital attachés. Second, America should prevent China from dominating digital infrastructure in the Indo-Pacific, including by developing alternatives to Chinese companies for 5G infrastructure, increasing pressure on Huawei’s 5G ambitions, and advancing access to fact-based information as a universal human right. 
 </span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Finally, the United States should challenge China’s most pernicious use of repressive technologies by levying targeted sanctions against individuals and firms that are complicit and imposing export restrictions to prevent U.S. firms from abetting these activities; developing and disseminating the means to disable China’s censorship tools; and increasing support for foreign media, civil society, and government accountability throughout the region.
</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2562"><span data-dcnode-id="2564" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="2563"></p><span data-dcnode-id="2561" instrument_node="">
</span></div><span data-dcnode-id="2559" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2552"><span data-dcnode-id="2558" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2554"><span data-dcnode-id="2557" instrument_node="">
</span><a data-dcnode-id="2556" id="bolster1"></a><span data-dcnode-id="2555" instrument_node="">
</span></div><span data-dcnode-id="2553" instrument_node="">
</span></div><span data-dcnode-id="2551" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2524"><span data-dcnode-id="2550" instrument_node="">
</span><h3 data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Bolster America's Digital Engagement in the Indo-Pacific</span></h3><span data-dcnode-id="2547" instrument_node="">
</span><h4 data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">Establish a new U.S. Digital Development Fund that would, in coordination with allies, support information connectivity projects in the Indo-Pacific and beyond</span></h4><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">U.S. companies are often at a competitive disadvantage to Chinese firms in third markets given Beijing’s financial and political support to its national technology champions. A new U.S. Digital Development Fund would help to rectify this imbalance by leveraging lines of credit to support information connectivity projects overseas, including in the Indo-Pacific. These projects would run the gamut from telecommunications equipment to online payment platforms to smart cities to undersea cables. Although preferencing American firms, the Digital Development Fund should have the ability to support and leverage cooperation with foreign companies based in (or ultimately controlled by) countries that adhere to widely recognized norms of online freedom of expression and privacy. The Digital Development Fund should be a standalone agency, which would ensure it does not get crowded out by competing organizational priorities, and enable it to serve as a symbol of enhanced U.S. economic engagement in the Indo-Pacific.
</span></p><span data-dcnode-id="2541" instrument_node="">
</span><h4 data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Direct the new U.S. International Development Finance Corporation to support projects in the Indo-Pacific that provide alternatives to China’s digital infrastructure</span></h4><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Washington should leverage the DFC’s resources and expanded authorities to promote digital alternatives to China. The DFC can help galvanize the entry of American technology firms that would otherwise not compete against Chinese firms in high-risk markets. Beyond supporting U.S. companies, Washington should leverage the expanded authorities granted to the new DFC to selectively back ally and partner firms that are well positioned to provide alternatives to China’s digital infrastructure.
</span></p><span data-dcnode-id="2535" instrument_node="">
</span><h4 data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Augment U.S. digital diplomacy in the Indo-Pacific with additional digital attachés and high-level “digital delegations”</span></h4><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2526"><span data-dcnode-id="2531" instrument_node="">The Department of Commerce’s Digital Attaché Program is an excellent tool for American companies that need assistance in understanding foreign regulatory policies and market dynamics. There are already Digital Attaché trade officers located in many major economies in the Indo-Pacific, including China, India, Indonesia, Japan, Singapore, and South Korea.</span><sup data-dcnode-id="2528"><a aria-controls="footnote95" aria-expanded="false" class="footnote-marker" data-dcnode-id="2529" href="#fn95" id="fnmarker95" role="button"><span data-dcnode-id="2530" instrument_node="">95</span></a></sup><span data-dcnode-id="2527" instrument_node=""> But there are still important opportunities to expand the program within the region to additional countries, including the Philippines, Thailand, and Vietnam. Another high-profile digital diplomacy opportunity would be the establishment of U.S. “Digital Delegations.” Co-led by the U.S. secretaries of state and commerce, these delegations would bring leaders from American technology companies to countries in the Indo-Pacific traditionally underserved by the U.S. private sector, such as Indonesia.</span></p><span data-dcnode-id="2525" instrument_node="">
</span></div><span data-dcnode-id="2523" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2516"><span data-dcnode-id="2522" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2518"><span data-dcnode-id="2521" instrument_node="">
</span><a data-dcnode-id="2520" id="prevent"></a><span data-dcnode-id="2519" instrument_node="">
</span></div><span data-dcnode-id="2517" instrument_node="">
</span></div><span data-dcnode-id="2515" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2461"><span data-dcnode-id="2514" instrument_node="">
</span><h3 data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">Prevent China's Dominance of Digital Infrastructure in the Indo-Pacific</span></h3><span data-dcnode-id="2511" instrument_node="">
</span><h4 data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">Revitalize global competition in 5G wireless technology</span></h4><span data-dcnode-id="2508" instrument_node="">
</span><p data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">The United States has taken a series of defensive measures in response to China’s unfair competitive practices in 5G, as well as security concerns associated with China-controlled telecommunications infrastructure. Beyond just playing defense, the United States should also seek to revitalize American innovation, particularly in the radio access network (RAN). Rather than back a “national champion” as China has done with Huawei, the United States should pursue a market-driven solution that leverages the advantages of American innovation and open competition. The U.S. government should work with U.S. industry leaders and allies and partners to revitalize competition in the global wireless telecommunications market, ensuring secure and trusted supply chains for telecommunications equipment.
</span></p><span data-dcnode-id="2505" instrument_node="">
</span><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">One promising solution is to reorient the global telecommunications market by pushing for a shift to network virtualization—software-defined networks operating on generic hardware, rather than proprietary hardware. Because the software industry has relatively low barriers to entry, network virtualization promotes vendor diversity by enticing new entrants to the market. Increased interoperability prevents vendor lock-in, and marketplace competition incentivizes superior security practices for vendors to differentiate themselves from their competitors. Finally, network virtualization leverages American strengths in software and opens the door for U.S. firms to compete in 5G.
</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">The U.S. government has a number of policy tools to work with industry to revitalize the 5G ecosystem, including R&amp;D funding, tax incentives, and government buying power. OSTP should sponsor an interagency process, including the departments of State, Commerce, and Defense and the intelligence community, to work in partnership with U.S. industry leaders and U.S. allies and partners to identify market-driven solutions to revitalize the health of the global 5G ecosystem, particularly the RAN, and specific government policy actions that could assist the development of a more competitive market. Software virtualization should be considered, among other potential solutions, as a means to spur continued innovation, fair competition, and trusted suppliers for secure 5G networks.
</span></p><span data-dcnode-id="2499" instrument_node="">
</span><h4 data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Increase pressure on Huawei’s 5G ambitions while honing the current U.S. approach to the company</span></h4><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2495" instrument_node="">A decision by U.S. allies to allow Huawei to participate in their 5G networks poses significant national security risks, including that China could disrupt telecommunications networks during times of geopolitical tension. In addition, multiple assessments have found “significant” security flaws in Huawei equipment.</span><sup data-dcnode-id="2492"><a aria-controls="footnote96" aria-expanded="false" class="footnote-marker" data-dcnode-id="2493" href="#fn96" id="fnmarker96" role="button"><span data-dcnode-id="2494" instrument_node="">96</span></a></sup><span data-dcnode-id="2491" instrument_node=""> In response to these concerns, the U.S. government enacted rules in 2019 to prevent the export of most U.S.-made equipment to Huawei. However, existing Commerce Department rules do not prevent companies from shipping equipment to Huawei that is not of U.S. origin, and both U.S. and multinational companies continue to sell to Huawei. As a result, Huawei has largely been able to continue operating, including building 5G networks, despite U.S. actions.
</span></p><span data-dcnode-id="2489" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">The United States should escalate pressure on Huawei’s capacity to roll out 5G equipment by expanding prohibitions on the sale of equipment and services used in 5G network infrastructure to cover sales by the foreign subsidiaries of U.S. companies and to foreign companies, after an appropriate consultative process. Choking off Huawei’s ability to purchase international parts and not just U.S.-origin equipment for 5G network equipment would create significant operational challenges to Huawei’s efforts to build such networks and would deter network operators from purchasing such equipment from Huawei.
</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">However, the United States should carefully calibrate its approach to Huawei’s non-5G business, including handsets and tablets, which poses fewer risks and where Huawei is likely to remain a significant global player. The Commerce Department should carefully weigh whether to approve licenses for U.S. firms selling hardware and software to Huawei’s handset business (and other non-5G business), considering the costs and benefits to U.S. firms, U.S. technology leadership, and whether cutting off such equipment effectively advances U.S. goals in undermining Huawei’s 5G ambitions.
</span></p><span data-dcnode-id="2483" instrument_node="">
</span><h4 data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Actively reject the notion of “internet sovereignty” and advance access to fact-based information as a universal human right</span></h4><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2479" instrument_node="">Beijing has developed an authoritarian model of information management in which the state not only exercises censorship but also surveils populations, aggregates data, and curates content to shape popular perceptions in support of CCP goals.</span><sup data-dcnode-id="2476"><a aria-controls="footnote97" aria-expanded="false" class="footnote-marker" data-dcnode-id="2477" href="#fn97" id="fnmarker97" role="button"><span data-dcnode-id="2478" instrument_node="">97</span></a></sup><span data-dcnode-id="2475" instrument_node=""> Moreover, China is increasingly trying to market and export its concept of a closed and censored internet.</span><sup data-dcnode-id="2472"><a aria-controls="footnote98" aria-expanded="false" class="footnote-marker" data-dcnode-id="2473" href="#fn98" id="fnmarker98" role="button"><span data-dcnode-id="2474" instrument_node="">98</span></a></sup><span data-dcnode-id="2471" instrument_node=""> China’s authoritarian model of information management appeals to less open governments in the Indo-Pacific, and in recent years, online freedom has eroded in the region, particularly in Southeast Asia.</span><sup data-dcnode-id="2468"><a aria-controls="footnote99" aria-expanded="false" class="footnote-marker" data-dcnode-id="2469" href="#fn99" id="fnmarker99" role="button"><span data-dcnode-id="2470" instrument_node="">99</span></a></sup><span data-dcnode-id="2467" instrument_node="">
</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">The United States should take action—unilaterally, with allies and partners, and in multilateral organizations—to challenge Beijing’s model and reinforce democratic alternatives. This starts with periodically introducing fact-based information into China’s online ecosystem to highlight critical developments such as the protests in Hong Kong and demonstrate that Washington rejects Beijing’s concept of “internet sovereignty.” In conjunction with select allies and partners, the United States should promote efforts to develop technology, institutional capacity, and media literacy in countries of strategic importance to help citizens identify disinformation and inorganic content amplification in an increasingly polluted online space. Lastly, the United States should cooperate with allies and partners at the United Nations and in other relevant multilateral organizations to advance access to fact-based information.
</span></p><span data-dcnode-id="2462" instrument_node="">
</span></div><span data-dcnode-id="2460" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2453"><span data-dcnode-id="2459" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2455"><span data-dcnode-id="2458" instrument_node="">
</span><a data-dcnode-id="2457" id="challenge"></a><span data-dcnode-id="2456" instrument_node="">
</span></div><span data-dcnode-id="2454" instrument_node="">
</span></div><span data-dcnode-id="2452" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2397"><span data-dcnode-id="2451" instrument_node="">
</span><h3 data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Challenging China's Surveillance State Domestically and Overseas</span></h3><span data-dcnode-id="2448" instrument_node="">
</span><h4 data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Leverage America’s economic toolkit to target actors facilitating the spread of China’s high-tech illiberalism</span></h4><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2444" instrument_node="">The United States should use a combination of sanctions and export controls to impose costs on Chinese individuals and companies and deter American firms from becoming complicit in the use or creation of new digital tools for repressive ends. The executive branch has taken an important step forward by adding a significant number of Chinese high-tech companies implicated in human rights abuses against Uighurs in Xinjiang to the Entity List.</span><sup data-dcnode-id="2441"><a aria-controls="footnote100" aria-expanded="false" class="footnote-marker" data-dcnode-id="2442" href="#fn100" id="fnmarker100" role="button"><span data-dcnode-id="2443" instrument_node="">100</span></a></sup><span data-dcnode-id="2440" instrument_node=""> It should not undercut this action by offering temporary exemptions to American firms that do business with these companies. In concert with the use of the Entity List, the executive branch should leverage the Magnitsky Act as a response to Chinese human rights abuses in Xinjiang. It should also expand Magnitsky Act sanctions to include executives and managers in Chinese technology companies active in Xinjiang. This action will ensure that responsible individuals in China incur a personal economic cost for being directly involved in Beijing’s systematic campaign of repression.
</span></p><span data-dcnode-id="2438" instrument_node="">
</span><h4 data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Design new means to circumvent China’s “Great Firewall”</span></h4><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2434" instrument_node="">The United States should seek to disrupt the CCP’s system of online censorship, which is a core element of Beijing’s repressive toolkit. In the lead-up to its late 2017 Party Congress, Beijing began cracking down on virtual private networks (VPNs) and other mediums of dissent that had allowed Chinese consumers and visitors to China to circumvent China’s firewall and access censored content.</span><sup data-dcnode-id="2431"><a aria-controls="footnote101" aria-expanded="false" class="footnote-marker" data-dcnode-id="2432" href="#fn101" id="fnmarker101" role="button"><span data-dcnode-id="2433" instrument_node="">101</span></a></sup><span data-dcnode-id="2430" instrument_node=""> Since then, a variety of circumvention technologies, such as Freegate and Ultrasurf, have enabled users to penetrate firewalls by routing users’ requests through unblocked webpages.</span><sup data-dcnode-id="2427"><a aria-controls="footnote102" aria-expanded="false" class="footnote-marker" data-dcnode-id="2428" href="#fn102" id="fnmarker102" role="button"><span data-dcnode-id="2429" instrument_node="">102</span></a></sup><span data-dcnode-id="2426" instrument_node=""> The United States should expand and diversify its toolkit for communicating directly with Chinese citizens, both through circumvention technologies and other measures—including expanding Chinese-language websites—to help create an alternative, fact-based information infrastructure.</span><sup data-dcnode-id="2423"><a aria-controls="footnote103" aria-expanded="false" class="footnote-marker" data-dcnode-id="2424" href="#fn103" id="fnmarker103" role="button"><span data-dcnode-id="2425" instrument_node="">103</span></a></sup><span data-dcnode-id="2422" instrument_node=""> Beyond developing more tools to evade firewalls, the U.S. government should continue to fund technologies and the distribution of devices that help dissidents maintain digital security, ensure mobile access, and reconstitute websites after a cyberattack.</span><sup data-dcnode-id="2419"><a aria-controls="footnote104" aria-expanded="false" class="footnote-marker" data-dcnode-id="2420" href="#fn104" id="fnmarker104" role="button"><span data-dcnode-id="2421" instrument_node="">104</span></a></sup><span data-dcnode-id="2418" instrument_node=""> To develop these tools and foster further innovation, the U.S. government should expand the sources of technology funding to include foreign governments, foundations, and the private sector.</span><sup data-dcnode-id="2415"><a aria-controls="footnote105" aria-expanded="false" class="footnote-marker" data-dcnode-id="2416" href="#fn105" id="fnmarker105" role="button"><span data-dcnode-id="2417" instrument_node="">105</span></a></sup><span data-dcnode-id="2414" instrument_node="">
</span></p><span data-dcnode-id="2412" instrument_node="">
</span><h4 data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Promote independent media, civil society, and government accountability throughout the Indo-Pacific</span></h4><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2408" instrument_node="">Independent media and robust civil society are vital to insulating countries from adopting China’s model of high-tech illiberalism.</span><sup data-dcnode-id="2405"><a aria-controls="footnote106" aria-expanded="false" class="footnote-marker" data-dcnode-id="2406" href="#fn106" id="fnmarker106" role="button"><span data-dcnode-id="2407" instrument_node="">106</span></a></sup><span data-dcnode-id="2404" instrument_node=""> Since 2018, the U.S. government has bundled existing programs intended to strengthen democratic institutions and processes in strategically important countries under its Indo-Pacific Transparency Initiative, modestly increasing the funding available for such activities. Congress should double the current level of resources and avoid earmarking funds to specific countries or programming in order to enable the executive branch to rapidly respond as countries become receptive to American capacity-building efforts, as occurred after elections in the Maldives and Malaysia. Beyond capitalizing on emerging opportunities through more flexible funding, the United States should more actively support foreign civil society organizations that can promote good governance and play an important role in providing fact-based coverage of Beijing’s activities within their home countries. Finally, in highly repressive environments where civil society is weak or nonexistent, the U.S. government can support public use of technologies to circumvent online censorship and protect journalists’ anonymity in order to promote at least a limited flow of fact-based information concerning China’s activities.</span><sup data-dcnode-id="2401"><a aria-controls="footnote107" aria-expanded="false" class="footnote-marker" data-dcnode-id="2402" href="#fn107" id="fnmarker107" role="button"><span data-dcnode-id="2403" instrument_node="">107</span></a></sup><span data-dcnode-id="2400" instrument_node="">
</span></p><span data-dcnode-id="2398" instrument_node="">
</span></div><span data-dcnode-id="2396" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2321"><span data-dcnode-id="2395" instrument_node="">
</span><h2 data-dcnode-id="2393" id="vii-cultivating-the-talent-to-compete-with-china"><span data-dcnode-id="2394" instrument_node="">VII. Cultivating the Talent to Compete with China</span></h2><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2387"><em data-dcnode-id="2388"><a data-dcnode-id="2390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s3.us-east-1.amazonaws.com/files.cnas.org/NDAA-VII.-Cultivating-the-Talent-to-Compete-with-China.pdf%3Fmtime%3D20200122085543%26focal%3Dnone"><span data-dcnode-id="2391" instrument_node="">Download</span></a><span data-dcnode-id="2389" instrument_node=""> this chapter and its recommendations.</span></em></p><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Ultimately, the ability of the United States to shape the future of the Indo-Pacific will rest on whether America has the people and talent to continue fueling its economic power, innovation engine, government bureaucracies, and world-class military. With its democratic values, open economy, and diverse citizenry, the United States possesses a number of distinct advantages in the development of human capital. Nevertheless, while a common refrain in defense and technology circles is that people are America’s greatest asset, in practice, senior leaders across sectors have treated human capital as a lesser or administrative concern. Without renewed focus, the American public and private workforce risks falling behind. </span></p><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2377"><span data-dcnode-id="2382" instrument_node="">China, meanwhile, has recognized the imperative of developing and recruiting top talent. Beijing has initiated a top-down human capital agenda to increase investments in STEM education, target higher quality recruits for its military and civil service, and integrate its security and technology sectors.</span><sup data-dcnode-id="2379"><a aria-controls="footnote108" aria-expanded="false" class="footnote-marker" data-dcnode-id="2380" href="#fn108" id="fnmarker108" role="button"><span data-dcnode-id="2381" instrument_node="">108</span></a></sup><span data-dcnode-id="2378" instrument_node=""> Notably, China has in part sought to re-create America’s core strengths within the limits of its state-driven system. Although China lacks critical ingredients that power America’s innovation culture, it is striving to make up for these gaps with far greater attention and resources than are currently being applied in the United States. 
 </span></p><span data-dcnode-id="2376" instrument_node="">
</span><p data-dcnode-id="2354"><span data-dcnode-id="2375" instrument_node="">That said, China’s momentum is worth studying, but not duplicating—the U.S. response should instead seek to leverage its own best attributes.</span><sup data-dcnode-id="2372"><a aria-controls="footnote109" aria-expanded="false" class="footnote-marker" data-dcnode-id="2373" href="#fn109" id="fnmarker109" role="button"><span data-dcnode-id="2374" instrument_node="">109</span></a></sup><span data-dcnode-id="2371" instrument_node=""> The United States remains light-years ahead of China in terms of its recruitment, retention, and management of a professional military force. Nevertheless, trends similar to those China faces—competition with the private sector, demands for a more technically skilled force, and large percentages of youth disqualified from accession—will strain the Department of Defense’s ability to maintain the cutting-edge force it requires.</span><sup data-dcnode-id="2368"><a aria-controls="footnote110" aria-expanded="false" class="footnote-marker" data-dcnode-id="2369" href="#fn110" id="fnmarker110" role="button"><span data-dcnode-id="2370" instrument_node="">110</span></a></sup><span data-dcnode-id="2367" instrument_node=""> DoD has made headway in addressing some obstacles to service, with steady reforms in talent management,</span><sup data-dcnode-id="2364"><a aria-controls="footnote111" aria-expanded="false" class="footnote-marker" data-dcnode-id="2365" href="#fn111" id="fnmarker111" role="button"><span data-dcnode-id="2366" instrument_node="">111</span></a></sup><span data-dcnode-id="2363" instrument_node=""> broadening geographic recruitment,</span><sup data-dcnode-id="2360"><a aria-controls="footnote112" aria-expanded="false" class="footnote-marker" data-dcnode-id="2361" href="#fn112" id="fnmarker112" role="button"><span data-dcnode-id="2362" instrument_node="">112</span></a></sup><span data-dcnode-id="2359" instrument_node=""> experimenting with lateral entry,</span><sup data-dcnode-id="2356"><a aria-controls="footnote113" aria-expanded="false" class="footnote-marker" data-dcnode-id="2357" href="#fn113" id="fnmarker113" role="button"><span data-dcnode-id="2358" instrument_node="">113</span></a></sup><span data-dcnode-id="2355" instrument_node=""> and honing career fields. Despite these efforts, the demands of great-power competition will necessitate even greater creativity and flexibility in military recruitment, training, and education.
 </span></p><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2352" instrument_node="">Washington must also reform and elevate its public-service sector. Limited leadership attention and reliance on an antiquated federal personnel management system have stymied the national security bureaucracy’s ability to grapple with the China challenge. Going forward, the federal government will need to take several steps to more effectively hire, retain, develop, and promote the diverse and highly skilled civilian experts it needs to build and sustain a more competitive strategy in the Indo-Pacific.</span><sup data-dcnode-id="2349"><a aria-controls="footnote114" aria-expanded="false" class="footnote-marker" data-dcnode-id="2350" href="#fn114" id="fnmarker114" role="button"><span data-dcnode-id="2351" instrument_node="">114</span></a></sup><span data-dcnode-id="2348" instrument_node=""> The United States should not take for granted that public service remains a top career choice for American youth and should dedicate the leadership necessary to maximize the potential of a diverse American federal workforce.
 </span></p><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2345" instrument_node="">Finally, U.S. government, academic, and private-sector institutions should collaborate to build, source, and manage technical talent. A large proportion of technology workforce requirements in the public and private sectors is currently unmet.</span><sup data-dcnode-id="2342"><a aria-controls="footnote115" aria-expanded="false" class="footnote-marker" data-dcnode-id="2343" href="#fn115" id="fnmarker115" role="button"><span data-dcnode-id="2344" instrument_node="">115</span></a></sup><span data-dcnode-id="2341" instrument_node=""> Private-sector competition with government for such talent is shaped in part by superior compensation and benefits, but bureaucratic and cultural factors are equally determinative. Public-private partnerships that might ease the strain of talent competition are difficult, with technology companies and workers often wary of cooperation with national security institutions.</span><sup data-dcnode-id="2338"><a aria-controls="footnote116" aria-expanded="false" class="footnote-marker" data-dcnode-id="2339" href="#fn116" id="fnmarker116" role="button"><span data-dcnode-id="2340" instrument_node="">116</span></a></sup><span data-dcnode-id="2337" instrument_node=""> While seeking to overcome these obstacles, the United States should also look to draw upon the best and brightest from around the world. The United States should revise policies that limit high-skilled immigration, which can bolster the American workforce.</span><sup data-dcnode-id="2334"><a aria-controls="footnote117" aria-expanded="false" class="footnote-marker" data-dcnode-id="2335" href="#fn117" id="fnmarker117" role="button"><span data-dcnode-id="2336" instrument_node="">117</span></a></sup></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">These changes will be all the more impactful if they are comprehensive, addressing human capital as a complex ecosystem: Investments in education without a military and public sector prepared to utilize such talent is a missed opportunity; reforming uniform and federal personnel systems without enabling permeability within and among these fields is an unnecessary constraint of talent; and strengthening the U.S. tech sector, while making no progress on its strained relations with key government agencies, is harmful to U.S. economic and security interests.
 </span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">In the final analysis, people have to be at the core of America’s strategy to compete with China in the Indo-Pacific. A diverse, skilled, and flexible American workforce—in uniform, in Silicon Valley, in government bureaucracy, and in the classroom—is essential to enhancing American competitiveness in the Indo-Pacific. But U.S. leaders must recognize that it is no longer sufficient to passively rely on inherent American advantages. America’s mobilization of talent can and should be a primary advantage in strategic competition with China—but only if the U.S. government gives commensurate focus to this vital arena of the contest.
</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2323"><span data-dcnode-id="2325" instrument_node="">The following are recommendations for U.S. Policy:</span><br data-dcnode-id="2324"></p><span data-dcnode-id="2322" instrument_node="">
</span></div><span data-dcnode-id="2320" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2313"><span data-dcnode-id="2319" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2315"><span data-dcnode-id="2318" instrument_node="">
</span><a data-dcnode-id="2317" id="empower1"></a><span data-dcnode-id="2316" instrument_node="">
</span></div><span data-dcnode-id="2314" instrument_node="">
</span></div><span data-dcnode-id="2312" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2249"><span data-dcnode-id="2311" instrument_node="">
</span><h3 data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Empower the U.S. Military to Compete in the Battle for Talent</span></h3><span data-dcnode-id="2308" instrument_node="">
</span><h4 data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Broaden military recruitment strategies to fully leverage America’s talents</span></h4><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2287"><span data-dcnode-id="2304" instrument_node="">The Department of Defense should continue broadening its efforts to expand the pool of recruits into each of the services, reflecting the growing need for a highly skilled and diverse force. Today, a range of operational and cultural factors intersect to make military service less attractive to vital targets in the recruit population: two decades of high-tempo operations in the Middle East and Afghanistan; policies that fail to leverage the potential contributions of women and underrepresented minorities; limited connections between those in uniform and much of the population; and the belief that many high-demand skills will be better rewarded and utilized outside the military. Recent programs to recruit in traditionally underserved areas are a good first step but will need to be backed by wider civil-military engagement and education to demystify elements of military service.</span><sup data-dcnode-id="2301"><a aria-controls="footnote118" aria-expanded="false" class="footnote-marker" data-dcnode-id="2302" href="#fn118" id="fnmarker118" role="button"><span data-dcnode-id="2303" instrument_node="">118</span></a></sup><span data-dcnode-id="2300" instrument_node=""> A broader challenge is mobilizing the rich diversity of America and persuading populations who do not see themselves having a career in the military that their service is valuable.</span><sup data-dcnode-id="2297"><a aria-controls="footnote119" aria-expanded="false" class="footnote-marker" data-dcnode-id="2298" href="#fn119" id="fnmarker119" role="button"><span data-dcnode-id="2299" instrument_node="">119</span></a></sup><span data-dcnode-id="2296" instrument_node=""> This will require addressing policies and regulations that unnecessarily deter vital pools of talent, as well as modernizing force management and military benefits, including health care, child care, and dual-military family services.</span><sup data-dcnode-id="2293"><a aria-controls="footnote120" aria-expanded="false" class="footnote-marker" data-dcnode-id="2294" href="#fn120" id="fnmarker120" role="button"><span data-dcnode-id="2295" instrument_node="">120</span></a></sup><span data-dcnode-id="2292" instrument_node=""> Other policies that reduce the propensity to serve among younger populations demand top-down attention and reversal, including recent transgender service bans, slow acceptance of women in leadership or combat roles, and medical prohibitions with little relevance to cyberwarriors.</span><sup data-dcnode-id="2289"><a aria-controls="footnote121" aria-expanded="false" class="footnote-marker" data-dcnode-id="2290" href="#fn121" id="fnmarker121" role="button"><span data-dcnode-id="2291" instrument_node="">121</span></a></sup><span data-dcnode-id="2288" instrument_node=""> Likewise, the Military Accessions Vital to National Interest program—which allowed recruitment of immigrants with special language, cultural, and technical skills that may prove uniquely useful in the Indo-Pacific—should be reinstituted.
</span></p><span data-dcnode-id="2286" instrument_node="">
</span><h4 data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">Scale military talent management initiatives across active and reserve components</span></h4><span data-dcnode-id="2283" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2282" instrument_node="">There already exist several pilot programs and task forces designed to make the best use of the present force and maximize its skills, knowledge, interests, and potential.</span><sup data-dcnode-id="2279"><a aria-controls="footnote122" aria-expanded="false" class="footnote-marker" data-dcnode-id="2280" href="#fn122" id="fnmarker122" role="button"><span data-dcnode-id="2281" instrument_node="">122</span></a></sup><span data-dcnode-id="2278" instrument_node=""> There is no shortage of ideas and energy, and many military leaders publicly recognize the human capital challenges they face: military skill requirements growing more technical, dual-career families requiring greater flexibility, informal networks and requirements driving promotions, and service members growing dissatisfied with how their expertise and expensive training is (or is not) used. These problems are exacerbated by frequent leadership transitions, insufficient or inaccessible service member data, obsolete evaluative metrics, and accommodation of antiquated systems and preferences.</span><sup data-dcnode-id="2275"><a aria-controls="footnote123" aria-expanded="false" class="footnote-marker" data-dcnode-id="2276" href="#fn123" id="fnmarker123" role="button"><span data-dcnode-id="2277" instrument_node="">123</span></a></sup><span data-dcnode-id="2274" instrument_node=""> Military service leaders should elevate talent management to the top of their priority list, investing in end-to-end systems and institutionalizing worthwhile reforms early and across the full scope of active and reserve forces. They should in parallel demand regular feedback and red-teaming on implementation, modifying as needed to ensure new talent management systems do not result in the same old outcomes. At the same time, the military services need to excel at the back office basics, such as modernized data management, timely pay and reimbursement, or simple connectivity between the dozens of legacy personnel systems required as service members proceed through their career. While the personnel management and administrative backbones of all services are out of date, those of most reserve components are incapable of supporting today’s operational tempo and tomorrow’s demands.</span><sup data-dcnode-id="2271"><a aria-controls="footnote124" aria-expanded="false" class="footnote-marker" data-dcnode-id="2272" href="#fn124" id="fnmarker124" role="button"><span data-dcnode-id="2273" instrument_node="">124</span></a></sup><span data-dcnode-id="2270" instrument_node=""> These challenges will only grow as the Reserves are able to access the wide variety of skills necessary for great-power competition.</span><sup data-dcnode-id="2267"><a aria-controls="footnote125" aria-expanded="false" class="footnote-marker" data-dcnode-id="2268" href="#fn125" id="fnmarker125" role="button"><span data-dcnode-id="2269" instrument_node="">125</span></a></sup><span data-dcnode-id="2266" instrument_node=""> Likewise, the services’ growing need for permeability across active and reserve components—like a single appointment authority for officers—should reinforce the need to make these reforms a strategic priority, not an administrative afterthought.
</span></p><span data-dcnode-id="2264" instrument_node="">
</span><h4 data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Modernize military training, education, and incentives for technical, regional, and language skills</span></h4><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2251"><span data-dcnode-id="2260" instrument_node="">Given the difficulty of simply recruiting all of the personnel necessary for competing effectively in the Indo-Pacific, the U.S. military should do more to develop much-needed skills within the force. For example, the military services should look to the Air Force’s Computer Language Initiative as a model for creating career-driven incentives for skill-building in high-demand areas.</span><sup data-dcnode-id="2257"><a aria-controls="footnote126" aria-expanded="false" class="footnote-marker" data-dcnode-id="2258" href="#fn126" id="fnmarker126" role="button"><span data-dcnode-id="2259" instrument_node="">126</span></a></sup><span data-dcnode-id="2256" instrument_node=""> Incentivizing personnel to pursue Indo-Pacific languages and regional expertise—both within and outside the foreign area officer community—is another evident step, but will require demonstrating that such investments are rewarded with career advancement in the way of relevant assignments and promotion paths.</span><sup data-dcnode-id="2253"><a aria-controls="footnote127" aria-expanded="false" class="footnote-marker" data-dcnode-id="2254" href="#fn127" id="fnmarker127" role="button"><span data-dcnode-id="2255" instrument_node="">127</span></a></sup><span data-dcnode-id="2252" instrument_node="">
</span></p><span data-dcnode-id="2250" instrument_node="">
</span></div><span data-dcnode-id="2248" instrument_node="">
</span><div class="wrapper -large -clear" data-dcnode-id="2241"><span data-dcnode-id="2247" instrument_node="">
</span><div class="embed margin-vertical" data-dcnode-id="2243"><span data-dcnode-id="2246" instrument_node="">
</span><a data-dcnode-id="2245" id="strengthen3"></a><span data-dcnode-id="2244" instrument_node="">
</span></div><span data-dcnode-id="2242" instrument_node="">
</span></div><span data-dcnode-id="2240" instrument_node="">
</span><div class="wrapper wysiwyg margin-vertical" data-dcnode-id="2157"><span data-dcnode-id="2239" instrument_node="">
</span><h3 data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">Strengthen the Civilian National Security Workforce</span></h3><span data-dcnode-id="2236" instrument_node="">
</span><h4 data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Generate leadership expectations of human capital management, including national security civilian readiness metrics</span></h4><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Readiness measures exist in the U.S. military, but no civilian corollary exists. Senior administration officials across all national security agencies should make clear to their subordinates at all levels that they consider national security human capital to be among their top priorities. Appointees’ performance must be judged by their attention to the health and strength of their workforce, and agency leaders should regularly engage their teams on whether they have the talent necessary to support National Security Strategy execution. With these inputs, the National Security Council should initiate a process to generate metrics for national security civilian readiness.
</span></p><span data-dcnode-id="2230" instrument_node="">
</span><h4 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Modernize and reduce barriers in federal hiring processes</span></h4><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2226" instrument_node="">Without renewed and dedicated investment in recruiting and retaining talent, the U.S. government will struggle to develop and implement a more competitive approach to the Indo-Pacific. Too often, talented national security experts are deterred from federal service due to needless barriers that do not screen for quality.</span><sup data-dcnode-id="2223"><a aria-controls="footnote128" aria-expanded="false" class="footnote-marker" data-dcnode-id="2224" href="#fn128" id="fnmarker128" role="button"><span data-dcnode-id="2225" instrument_node="">128</span></a></sup><span data-dcnode-id="2222" instrument_node=""> Agencies continue to rely on belated, short-lived, and inefficient authorities to hire high-demand regional and technical talent, and inadequately utilize those experts emerging from federally funded academic studies.</span><sup data-dcnode-id="2219"><a aria-controls="footnote129" aria-expanded="false" class="footnote-marker" data-dcnode-id="2220" href="#fn129" id="fnmarker129" role="button"><span data-dcnode-id="2221" instrument_node="">129</span></a></sup><span data-dcnode-id="2218" instrument_node=""> Although government remains a top career interest for college students,</span><sup data-dcnode-id="2215"><a aria-controls="footnote130" aria-expanded="false" class="footnote-marker" data-dcnode-id="2216" href="#fn130" id="fnmarker130" role="button"><span data-dcnode-id="2217" instrument_node="">130</span></a></sup><span data-dcnode-id="2214" instrument_node=""> a wide range of government-controlled factors deters such service. As a consequence, America’s federal workforce is aging and young talent is underrepresented, particularly when compared to the private sector.</span><sup data-dcnode-id="2211"><a aria-controls="footnote131" aria-expanded="false" class="footnote-marker" data-dcnode-id="2212" href="#fn131" id="fnmarker131" role="button"><span data-dcnode-id="2213" instrument_node="">131</span></a></sup><span data-dcnode-id="2210" instrument_node=""> As a starting point to address these issues, the public sector should dedicate resources for regular retraining of managers and human resource specialists to access the full range of authorities and opportunities for hiring and managing a workforce.</span><sup data-dcnode-id="2207"><a aria-controls="footnote132" aria-expanded="false" class="footnote-marker" data-dcnode-id="2208" href="#fn132" id="fnmarker132" role="button"><span data-dcnode-id="2209" instrument_node="">132</span></a></sup><span data-dcnode-id="2206" instrument_node=""> Moreover, as encouraged by recent Office of Personnel Management guidance, hiring managers need to be brought more closely into hiring processes, such as in the United States Digital Service system, in which they can regularly communicate with candidates.</span><sup data-dcnode-id="2203"><a aria-controls="footnote133" aria-expanded="false" class="footnote-marker" data-dcnode-id="2204" href="#fn133" id="fnmarker133" role="button"><span data-dcnode-id="2205" instrument_node="">133</span></a></sup><span data-dcnode-id="2202" instrument_node=""> National security agencies should also share lessons of pilot programs to recruit those with high-demand technical expertise—which vary considerably from DoD to the Department of Homeland Security—and make them permanent.
</span></p><span data-dcnode-id="2200" instrument_node="">
</span><h4 data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Jump-start civilian professional development to build high-demand skills</span></h4><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2196" instrument_node="">After years of underinvestment, national security agencies should allocate specific funds for professional development of their current workforce. Just as important as recruiting high-demand skillsets is upskilling present employees in technical and regional areas vital to the Indo-Pacific.</span><sup data-dcnode-id="2193"><a aria-controls="footnote134" aria-expanded="false" class="footnote-marker" data-dcnode-id="2194" href="#fn134" id="fnmarker134" role="button"><span data-dcnode-id="2195" instrument_node="">134</span></a></sup><span data-dcnode-id="2192" instrument_node=""> Investing in personnel fluency in technical policy matters relevant to artificial intelligence, 5G, quantum computing, and other advanced technologies will offer significant return.</span><sup data-dcnode-id="2189"><a aria-controls="footnote135" aria-expanded="false" class="footnote-marker" data-dcnode-id="2190" href="#fn135" id="fnmarker135" role="button"><span data-dcnode-id="2191" instrument_node="">135</span></a></sup><span data-dcnode-id="2188" instrument_node=""> Likewise, seasoned policymakers without substantial experience in the Indo-Pacific should receive additional training in the form of short courses on the region’s cultural, political, and security dynamics.</span><sup data-dcnode-id="2185"><a aria-controls="footnote136" aria-expanded="false" class="footnote-marker" data-dcnode-id="2186" href="#fn136" id="fnmarker136" role="button"><span data-dcnode-id="2187" instrument_node="">136</span></a></sup><span data-dcnode-id="2184" instrument_node=""> Such investments should be linked to personnel assignments, service commitments, future professional development, and other talent management incentives as appropriate.
</span></p><span data-dcnode-id="2182" instrument_node="">
</span><h4 data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Enhance talent mobility across the national workforce</span></h4><span data-dcnode-id="2179" instrument_node="">
