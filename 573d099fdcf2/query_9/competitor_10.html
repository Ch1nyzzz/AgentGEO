</span><link data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eusec.org/cepsiiss.css&amp;raw" media="screen" rel="stylesheet" title="cepsiiss" type="text/css"><span data-dcnode-id="1927" instrument_node="">

</span><meta content="European Security Forum: paper by Huseyin Bagci and Saban Kardas on Turkey's Strategic Future" data-dcnode-id="1922" name="Description"><span data-dcnode-id="1921" instrument_node="">
</span><title data-dcnode-id="1919">The Strategic Importance of Turkey Revisited</title><span data-dcnode-id="1918" instrument_node="">
</span><span data-dcnode-id="1916" instrument_node="">
</span><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Prepared for the CEPS/IISS European Security Forum, Brussels, 12 May 2003</span></p><span data-dcnode-id="1912" instrument_node="">
</span><h1 data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Post-September 11 Impact: The Strategic Importance of Turkey Revisited</span></h1><span data-dcnode-id="1909" instrument_node="">
</span><p class="byline" data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">By Hüseyin Bagci and Saban Kardas, Middle East Technical
University</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">The aim of this chapter is to analyze the
debate surrounding Turkey's increasing strategic importance in the wake of September
11 terror attacks on Washington and New York. Traditionally, Turkey has been
considered an important country because of its geographic location between
Europe, the Middle East and Asia, which gives it easy access to strategically
important regions and major energy resources. Moreover, thanks to its character
as a modern Muslim country, culturally, Turkey stands as a bridge between
Western and Islamic civilizations. The conventional importance attributed to
Turkey's strategic value became more visible following the events of September
11, and consequently Turkey has come under the spotlight. As a result, Turkey
and Turkish foreign policy started to receive a great interest, and the mood in
the discussions about Turkey and Turkey's strategic importance was usually
optimistic. However, the discourse was mainly ahistoric, temporal and isolated
from reality, and the focus was very narrow. Therefore it was often lost in the
debate that, seen in a wider perspective, there are a number of other factors
to be taken into account, which indicate that a more cautious and balanced
approach is necessary. In this sense, the tone in this article will be rather
critical and skeptical. What we are going to do is, first, to briefly summarize
the central arguments which are used to emphasize an enhanced strategic role
for Turkey in the new era. After each argument, we will try to approach this
argument critically and underline the inconsistencies and shortcomings of the
argument under consideration. The chapter concludes with an attempt to develop
a more balanced interpretation of the effect of post-September 11 developments
on Turkish foreign policy.</span></p><span data-dcnode-id="1903" instrument_node="">
</span><h2 data-dcnode-id="1901"><span data-dcnode-id="1902" instrument_node="">Growing acceptance of
Turkish theses on fight against terrorism, or you see "we were right!"
syndrome.</span></h2><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1893"><span data-dcnode-id="1899" instrument_node="">The first effect of September 11 which can be
said to have contributed to Turkey's position was alleged growing acceptance
towards the Turkish approach to the fight against terrorism in international
relations. Turkey itself had long struggled against separatist terror and political
Islam in domestic context. Since the 1970s, Turkey has been engaged in fighting
against terrorism and continues to be one of the major targets of terrorist
activities, both at home and abroad. Turkey's first encounter with
international terrorism was political assassinations carried out by ASALA
(Armenian Secret Army for the Liberation of Armenia) against Turkish diplomats
abroad in the 1970s. During the last two decades, particularly the Kurdish
issue and the terrorist activities of PKK (Kurdistan Workers' Party) involved
cross-border aspects and became of international concern.</span><a data-dcnode-id="1897" href="#ftn1" name="ftnref1"><span data-dcnode-id="1898" instrument_node="">[1]</span></a><span data-dcnode-id="1896" instrument_node="">
Therefore, one part of the Turkish strategy to deal with this problem was to
seek international cooperation in fighting against terrorism. In this regard,
successive Turkish governments endeavored to generate an international concern
against terrorism. In particular, they worked hard to convince European
countries to limit the activities of various separatist, leftist and Islamist
organizations. As part of its activities, Turkey even tried on some occasions
to bring the terror issue onto NATO's agenda.</span><a data-dcnode-id="1894" href="#ftn2" name="ftnref2"><span data-dcnode-id="1895" instrument_node="">[2]</span></a></p><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Besides trying to raise the terror issue in
several political and diplomatic fora, Turkey did not hesitate to resorting to
the military instruments as well. To meet the rising challenge of separatist
terror in South Eastern Anatolian region, Turkey employed a stubborn, and at
times harsh, policy based on heavy reliance on military measures in order to,
first stop the terror activities carried out by the PKK, and then root out the
formation of terrorist groups and their support bases. In a similar vein,
emphasis on the use or threat of force outside its borders as part of the fight
against terrorism was a logical correlation of this policy. Numerous instances
of Turkish incursions into northern Iraq are cases in point. The authority
vacuum emerged after the imposition of no-fly zone in the Northern Iraq enabled
PKK to use the region as a rear base to conduct terrorist attacks inside
Turkish territory. Based on a somewhat complicated mixture of the notion of
'hot pursuit' and an expanded interpretation of the norm of self-defense,
Turkish armed forces were dispatched into Northern Iraq to destroy PKK
guerillas and training camps or prevent PKK from planning and executing
subversive attacks on Turkish soil. While some of those operations were limited
in scope, some were large-scale involving thousands of troops – at times Turkish
soldiers crossing the border reached 35.000 –, backed by tanks, artillery, and
helicopters.</span></p><span data-dcnode-id="1889" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1888" instrument_node="">The relations with Syria as far as its support
to PKK terrorism is concerned is another case in which Turkey resorted to
essentially military means. By mid-1998, the PKK came
to maintain its existence almost entirely on Syrian support; Abdullah Ocalan,
the PKK's leader, had been given a sanctuary by the Syrian government, and
Syrian territory was a safe route for PKK militants in their journey between
PKK training camps in Lebanon's Syrian-controlled Bekaa valley and the Turkish
border. Indeed, during the Turkish Syrian crisis of October 1998 Turkey
used a coercive diplomacy backed up by a credible threat of force against the
Syrian regime to end its support to PKK and give up providing shelter to
Ocalan. It is worth noting that, in the meantime, Turkey had already strengthened
its military ties with Israel to exert pressure on Syria from the south.
Turkey's threat of force accompanied by military
maneuvers undertaken close to the Syrian border bore fruits; faced with
overwhelming power of Turkish military Syrian government complied to Turkish
demands and had asked Ocalan and the PKK to leave the country which constituted
the first step in a chain of events that led to the capture of Ocalan in Kenya.
Following their expulsion from Syria, PKK forces relocated to
northern Iraq, yet, a subsequent Turkish incursion into the region dealt a
severe blow to their military capabilities, and the PKK collapsed militarily.</span><a data-dcnode-id="1886" href="#ftn3" name="ftnref3"><span data-dcnode-id="1887" instrument_node="">[3]</span></a></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1883" instrument_node="">As a matter of fact, Turkish activities to this
end, be it diplomatic or military, were hardly welcomed by its neighbors, nor
by its Western partners; as a result, Turkey could not raise the necessary
international support in its own fight against terrorism. To the contrary,
these issues have constantly been a point of tension and disagreement in
Turkish foreign policy throughout the 1990s and Turkey came under severe
international criticism. Assertive Turkish foreign policy towards the Middle
East region added to the already troubled relations with the Arab neighbors.
Likewise, it was in this context that from time to time Turkey's relations with
its Western partners deteriorated due to the problems stemming from Turkey's
struggle with terrorism, and that issue has been a major impediment to Turkey's
will for a closer integration into the European Union. In particular, the
charge that Turkey's approach to the issue of terrorism and the way Turkey
tackles with this problem was a major source of human rights violations and the
limitations of individual rights and liberties at home was often raised against
the country at several international platforms. Therefore Turkey was always
under a European pressure to undertake domestic reforms to ameliorate the
situation. As far as foreign policy is concerned, with its principally
military-oriented security strategy, in stark contrast to 'civilian' European
approach, Turkey's assertiveness in the region was seen as an indication that
Turkey was a 'security consuming' or 'insecurity provider' to the European
security, thus an actor to be treated with a certain reservation.</span><a data-dcnode-id="1881" href="#ftn4" name="ftnref4"><span data-dcnode-id="1882" instrument_node="">[4]</span></a></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1878" instrument_node="">Against this background, it is obvious that
Turkey was one of the main beneficiaries of the new international atmosphere.
At last, the phenomenon of terrorism and the threat of terrorist activities
were formally recognized as an international concern and an international
consensus on the issue seemed to be emerging. The challenge posed by terrorism
to international security was considered so acute that it was even enough a
justification for the North Atlantic Council to invoke NATO's Article 5, for
the first time ever. From the United Nations to the OSCE, several other
international and regional organizations captured the prevailing mood and
adapted similar revolutionary resolutions or decisions to express their
willingness to respond to the perils of terror on international level. It did
not take so long that the Turkish side grasped this opportunity; thus the
president, the prime minister, the foreign minister and other officials
representing the country gave their full and unqualified support to those
international initiatives.</span><a data-dcnode-id="1876" href="#ftn5" name="ftnref5"><span data-dcnode-id="1877" instrument_node="">[5]</span></a><span data-dcnode-id="1875" instrument_node="">
This was in fact more than an expression of international solidarity with the
U.S. and the victims of those startling attacks. Beyond that, there was a
golden, god-given opportunity for Turkey to utilize. Turkish elites and
intellectuals just did this, by, after reminding in each declaration or speech
that Turkey itself had suffered from terrorism, repeatedly emphasizing that the
events of September 11 proved the validity of Turkish arguments. They went on
by expressing their hope that Turkey's European partners would also realize
their past mistakes in criticizing Turkey, and eventually readjust their
policies vis-à-vis Turkey in the face of the new realities out there proving
Turkey's rightfulness: President Ahmet Necdet Sezer was
maintaining that those attacks should be a lesson for the European
countries and was calling for a change in their
attitude and state of mind towards terrorism. After pointing out that terrorism was a crime committed
against all humanity, he went on saying, "that's why we have always repeated in
all international platforms that international cooperation in the fight against
terrorism should be improved. The attacks on the US has shown how correct
Turkey is in her stance against terrorism. I guess the attitudes of European
countries have begun to change too."</span><a data-dcnode-id="1873" href="#ftn6" name="ftnref6"><span data-dcnode-id="1874" instrument_node="">[6]</span></a><span data-dcnode-id="1872" instrument_node="">
This was so because, in Turkish view, the European countries misinterpreted the
balance between the concepts of human rights and terrorism, a point emphasized
by a senior Turkish Foreign Ministry official: "The United States was
very well aware of the concerns raised by Turkey regarding terrorism. However,
the Europeans did not understand this and the concept of human rights was
raised by our European colleagues when we made references to terrorism at
international gatherings. And now, it is clearly seen that a balance between
the concepts of terrorism and human rights is necessary."</span><a data-dcnode-id="1870" href="#ftn7" name="ftnref7"><span data-dcnode-id="1871" instrument_node="">[7]</span></a></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1867" instrument_node="">Moreover, in a similar line, Turkey paid a
special attention to stress that terrorism is a global issue and thus must be
fought globally. This point was also repeatedly emphasized by the government
officials, as well as columnists and civil society organizations. Foreign
Minister Ismail Cem, in his address at the Organization of Islamic Countries
Summit was referring to the same point: "Terrorism does not have geography, it
is the same terrorism, which manifests itself in several countries, in the West
and in the East, in all geographies, all over the world... Therefore, terrorism
is a global phenomenon that crosses borders and the fight against it requires
effective international cooperation."</span><a data-dcnode-id="1865" href="#ftn8" name="ftnref8"><span data-dcnode-id="1866" instrument_node="">[8]</span></a><span data-dcnode-id="1864" instrument_node="">
In this sense, NATO's decision to invoke Article 5 was a welcome development
for Turkey, as expressed by Ambassador Onur Öymen, Turkey's Permanent
Representative to NATO: "We have always called for terrorist activities to be
included within the Article 5... we have always stated that an attack does not
only mean a country's intrusion to another country's territory but it also
covers terrorist attacks which is an international problem. That's why NATO's
invoking of Article 5 is very important for us."</span><a data-dcnode-id="1862" href="#ftn9" name="ftnref9"><span data-dcnode-id="1863" instrument_node="">[9]</span></a></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1855"><span data-dcnode-id="1859" instrument_node="">Furthermore, some Turkish analysts did not even
hesitate to announce the advent of a "global February 28."</span><a data-dcnode-id="1857" href="#ftn10" name="ftnref10"><span data-dcnode-id="1858" instrument_node="">[10]</span></a><span data-dcnode-id="1856" instrument_node="">
While challenging the rise of political Islam, the particular conditions and
characteristics of Turkey were used as a justification to limit the individual
rights and democratic freedoms by the secular elites, backed by the powerful
military, during the 28 February process. In a similar vein, it was argued that
the U.S. and Western countries may embark on a similar policy at a global scale
so as to wipe out several international networks, irrespective of whether they
are moderate or radical, which were supposedly behind the terror attacks of
September 11. As part of this new strategy, in particular, the U.S. would be
less willing to criticize non-democratic practices in the Islamic world for the
sake of assuring their cooperation in the global war against terrorism. That
could, the argument goes on, in return hint at the emergence of a new "precedent"
justifying the Turkish way of dealing with terrorism, and in effect, relieving
Turkey of some of the external pressures it had encountered in the past.</span></p><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1853" instrument_node="">The first observation about these arguments is
that they were, to a large extent, self-propaganda. It was not possible to
hear, from outside, a corresponding appreciation of the Turkish theses, except
perhaps some American commentators.</span><a data-dcnode-id="1851" href="#ftn11" name="ftnref11"><span data-dcnode-id="1852" instrument_node="">[11]</span></a><span data-dcnode-id="1850" instrument_node="">
To name one, Radu was a very vocal supporter of Turkish position on that
matter. He argues that "Europeans, at least before September 11, were playing
games in the name of 'human rights' – particularly for terrorists, who were
protected at home and even against the vital security of non-EU countries...
Let us hope that once the US and Turkey, to mention just two cases, are finally
seen as equally victimised, the EU response will be similar... That revision
also includes a new look at Turkey's anti-PKK and anti-Islamist policy – not as
anti-democratic, but as protective of the Muslim world's only truly secular
democracy."</span><a data-dcnode-id="1848" href="#ftn12" name="ftnref12"><span data-dcnode-id="1849" instrument_node="">[12]</span></a><span data-dcnode-id="1847" instrument_node=""> The
optimistic mood and Turkish discourse, therefore, largely remained wishful
thinking.</span></p><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1844" instrument_node="">The main problem with this argument was that
Turks chose to interpret these developments in such a way that this new
'precedent' justified whatever Turkey did in the past to fight against
separatism and political Islam, a point very well illustrated by Ismail Cem:
"For years, Turkey has kept on explaining to the international community what
terrorism is, the consequences of it, the importance and the need for international
cooperation in struggling against it, and have kept on making proposals at
international platforms methods of a collective struggle against terrorism.
September 11 has proved how right Turkey's sensitivity on this issue was. What
everyone is trying to do collectively today is no different to that which
Turkey has strived to achieve for years."</span><a data-dcnode-id="1842" href="#ftn13" name="ftnref13"><span data-dcnode-id="1843" instrument_node="">[13]</span></a></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1836"><span data-dcnode-id="1839" instrument_node="">However, it is unlikely that the Turkish
arguments will be entirely accepted by the West in general and Europeans in
particular, without any reservations. For instance, if we take Turkey's warm
welcome to NATO's activation of Article 5, one has to bear in mind the
particular conditions in which NATO took that decision, and the unique position
of the U.S. in shaping decisions in NATO; thus its value as an almost automatic
precedent remains an open question. Even if one accepts that Article 5 could be
activated against terror attacks, what is less clear is whether it will be
applicable to the threats or attacks coming from an organization established in
one's own country. Last but not least, when the time comes to the
implementation of Article 5, there might be possibly divergences over
identifying the concrete source of terror threat, or how to respond to that
particular threat.</span><a data-dcnode-id="1837" href="#ftn14" name="ftnref14"><span data-dcnode-id="1838" instrument_node="">[14]</span></a></p><span data-dcnode-id="1835" instrument_node="">
</span><p data-dcnode-id="1819"><span data-dcnode-id="1834" instrument_node="">Another limitation to Turkey's optimism is
exerted by differing views on terrorism. Particularly in regards to the Kurdish
issue, broadly speaking, the European view is that it cannot be simply confined
to fighting against terrorism. Although official Turkish discourse preferred to
view the Kurdish issue as originating from socioeconomic conditions of the
southeastern Anatolia, and aggravated by the problems posed by terrorism that
is largely aroused by outside support of those trying to undermine Turkey, in
European eyes, it is rather very much related to political and cultural rights
and democratization.</span><a data-dcnode-id="1832" href="#ftn15" name="ftnref15"><span data-dcnode-id="1833" instrument_node="">[15]</span></a><span data-dcnode-id="1831" instrument_node="">
Thus, the well-known analogy: one's terrorist might be independent fighter in
others' eyes. And there is reason to expect that this will remain the case, despite
Turkish initial optimism to the contrary.</span><a data-dcnode-id="1829" href="#ftn16" name="ftnref16"><span data-dcnode-id="1830" instrument_node="">[16]</span></a><span data-dcnode-id="1828" instrument_node="">
Moreover, large Kurdish populations in Europe are acting as a strong pressure
group and limiting the maneuverability of Western governments. As it is claimed
rightly, Kurdish issue has also been a European one for it affects the Turkish
and Kurdish migrants living in Europe, and the host countries.</span><a data-dcnode-id="1826" href="#ftn17" name="ftnref17"><span data-dcnode-id="1827" instrument_node="">[17]</span></a><span data-dcnode-id="1825" instrument_node="">
Furthermore, there is a fundamental difference between the EU and Turkey in
regards to the problem of terrorism. Even if one accepts the reality of
terrorism, the ways to tackle this problem are differently perceived. The
Turkish approach is closer to the United States than the EU.</span><a data-dcnode-id="1823" href="#ftn18" name="ftnref18"><span data-dcnode-id="1824" instrument_node="">[18]</span></a><span data-dcnode-id="1822" instrument_node="">
As we observe, the EU and the United States have been differing on many issues,
including the question of how to identify the causes and sources of terrorism
as well as the means to be used in fighting against it. The EU has stressed the
importance of preventive measures and prioritizing the political and economic
instruments, and has questioned the effectiveness of punitive military
measures. Considering that the Europeans were even critical of the United
States, expecting that they would welcome Turkish activities without any
reservations is hardly tenable.</span><a data-dcnode-id="1820" href="#ftn19" name="ftnref19"><span data-dcnode-id="1821" instrument_node="">[19]</span></a></p><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">Therefore it is hard to be very optimistic and
expect a major breakthrough that would bring about a substantial shift in
Western responses to Turkey's approach to combating terrorism.</span><a data-dcnode-id="1815" href="#ftn20" name="ftnref20"><span data-dcnode-id="1816" instrument_node="">[20]</span></a><span data-dcnode-id="1814" instrument_node="">
Moreover, Turkey's hope that the new emerging consensus on terrorism will
relieve it of European pressures on the Kurdish issue is difficult to sustain.
The Europeans would resist subsuming this wider problem under the rubric of
terror and maintain their demands from Turkey to continue with the necessary
domestic reforms in political and cultural aspects of the issue, even after the
September 11. Thus, Kurdish issue will not cease as one of the hurdles Turkey
has to face in its journey towards the European Union. The discussion about the
list of terrorist organizations prepared by the EU within the context of
forging an international coalition against the sources of terrorism was illustrative
of this point, and one can expect similar differences in the future as well.
The story developed as follows:</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1811" instrument_node="">Turkey has started an intensive diplomatic initiative in the wake of the
September 11 attacks to utilize the international environment to convince EU
members to include 10 Turkish organizations on its list of terrorist
organizations. The inclusion of an organization on the list means that its
assets will be frozen, its offices closed and its activities traced. However,
this may not automatically translate into the extradition of its members to
their country of origin, particularly if the country is not an EU member and
still practices the death penalty. Despite Turkey's efforts, the EU included
none of the terrorist organizations on its list, which was declared on December
27, 2001. Especially the exclusion of the armed militant groups from the first
version of the list, such as the outlawed Kurdistan Workers Party (PKK) and the
Revolutionary People's Liberation Party-Front (DHKP-C), which are active in
some European countries under different banners, drew Turkish reaction and that
problem remained on the agenda for some time.</span><a data-dcnode-id="1809" href="#ftn21" name="ftnref21"><span data-dcnode-id="1810" instrument_node="">[21]</span></a><span data-dcnode-id="1808" instrument_node="">
Turkish diplomacy and lobbying worked; thus, on May 2, 2002 the two
organizations were finally added to the modified EU list. This decision was
seen by many as a Turkish victory.</span><a data-dcnode-id="1806" href="#ftn22" name="ftnref22"><span data-dcnode-id="1807" instrument_node="">[22]</span></a><span data-dcnode-id="1805" instrument_node="">
Yet, to see the effectiveness of these measures, one has to wait and take into
consideration a couple of other factors.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1802" instrument_node="">First, in the meantime, the PKK announced in April that it would cease all
activities and regroup under a new name, the Kurdistan Freedom and Democracy
Congress (KADEK).</span><a data-dcnode-id="1800" href="#ftn23" name="ftnref23"><span data-dcnode-id="1801" instrument_node="">[23]</span></a><span data-dcnode-id="1799" instrument_node="">
KADEK said it was ending its armed struggle to campaign peacefully for greater
rights for Kurds in southeastern Turkey, but without disbanding its armed wing.
The Turkish government has termed the name-change meaningless.</span><a data-dcnode-id="1797" href="#ftn24" name="ftnref24"><span data-dcnode-id="1798" instrument_node="">[24]</span></a><span data-dcnode-id="1796" instrument_node="">
Yet, in spite of Turkey's demands, KADEK is not included on the EU list. The EU
countries prefer to wait to be able to judge whether to include KADEK as well.</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1793" instrument_node="">Second, these EU norms need to be transformed into national legal orders, and
in some of the EU member states, the national legal norms are not enough to
effectively limit the activities of these terrorist organizations, and this
point has been utilized by the operatives of those organizations. This is
especially true as far as Belgium is concerned.</span><a data-dcnode-id="1791" href="#ftn25" name="ftnref25"><span data-dcnode-id="1792" instrument_node="">[25]</span></a><span data-dcnode-id="1790" instrument_node="">
Third, most of these organizations have been active in Europe for decades and
they know the ways to circumvent such legal barriers. For instance, a spokesman
for the DHKP-C has claimed that these decisions will not substantially affect
their activities.</span><a data-dcnode-id="1788" href="#ftn26" name="ftnref26"><span data-dcnode-id="1789" instrument_node="">[26]</span></a><span data-dcnode-id="1787" instrument_node="">
What the EU member states can do, is to freeze their bank accounts, but they
have no money in banks. The same source further claimed that the name DHKP-C is
on the EU list, but that the registered name of their organization is the DHKP
and DHKC, and mentioning the fact that they have been working in the United
Kingdom for many years, although the DHKP-C was outlawed there. They may have
some more ways to find loopholes in legal norms as well. Therefore, Turkey
still has to work hard in order to ensure the effectiveness of this initiative.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><h2 data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Caught between 'Islam'
and 'terrorism': Turkey as a 'role model' for the Islamic world?</span></h2><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1777"><span data-dcnode-id="1781" instrument_node="">The second development regarding Turkey's
growing strategic importance was the increasing reference to Turkey as a model
for the Islamic world. The war against the Taliban and the al-Qaeda was, in a
political and intellectual sense, also a war against a militant, reactive,
anti-Western, or anti-American, interpretation of Islam. The protests against
American operations and support for bin-Laden in some parts of the Islamic
world created fears that the developments might lead to a so-called "clash of
civilizations," or a "Christian-Muslim confrontation." Therefore, the American
administration strived to use every opportunity to prevent such a negative
interpretation of the American role and to deliver a message that this was not
a war against Islam. As a concrete proof of this policy, the inclusion of
certain Muslim countries into the international coalition appeared to be
necessary, especially when it later came to using force in Afghanistan.</span><a data-dcnode-id="1779" href="#ftn27" name="ftnref27"><span data-dcnode-id="1780" instrument_node="">[27]</span></a><span data-dcnode-id="1778" instrument_node="">
Within this light, Turkey emerged as a valuable asset for American policy.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1775" instrument_node="">No doubt, Turkey offered all assistance in its capability to the international
coalition from the very beginning, through allowing the use of its territory
and air space for logistical support, or through its contribution to
international peacekeeping force in Afghanistan. But, this was more than a
practical military/strategic contribution in the long-term war against the
forces of terrorism and fanaticism. Hence, the fact that Turkey is the only
Muslim country with a secular system of governance, which is also member of
NATO and other European institutions, was repeatedly expressed not only by the
Turkish policy makers themselves, but also by the international observers, and
U.S. officials. As such, as the argument goes, Turkey would be a perfect role
model for the Islamic world. The 21st conference of the American-Turkish
Council (ATC) held in Washington in March 2002 was an important venue where
those arguments were often heart. A few days before the conference, Deputy
Defense Secretary Paul Wolfowitz was underlying that supporting moderate
Muslims who abhor terrorism and extremism was a key to winning the war on
terrorism. "To win that war against terrorism, we have to reach out to the
hundreds of millions of Muslims who believe in tolerance and moderation... By
helping them to stand up against terrorists, we help ourselves." Therefore, the
anti-terrorism campaign was not just a military fight but also "a battle for
hearts and minds as well"; and within this context Turkey, "can be an example
for the Muslim world" of a country that reconciles Islam with liberal
democracy.</span><a data-dcnode-id="1773" href="#ftn28" name="ftnref28"><span data-dcnode-id="1774" instrument_node="">[28]</span></a><span data-dcnode-id="1772" instrument_node=""> According
to US President George W. Bush, Turkey was a hope-provoking alternative against
radicalism and religious intolerance. In his message sent to the ATC
conference, he stressed that Turkey with its Muslim beliefs and its embracing
of the democracy ideals of Atatürk set an example.</span><a data-dcnode-id="1770" href="#ftn29" name="ftnref29"><span data-dcnode-id="1771" instrument_node="">[29]</span></a><span data-dcnode-id="1769" instrument_node="">
In his address at the conference, U.S. Deputy Secretary of State Marc Grossman
was also underlying that one of the few things that had not changed after
September 11 was: "Turkey is once again highlighted as a model for those
countries with an Islamic heritage who choose to be -and work to be- modern,
secular, democratic, and true to their faith simultaneously. Those of us who
have admired Turkey for this vision for years now find we are not so alone in
wishing that your great endeavor succeeds".</span><a data-dcnode-id="1767" href="#ftn30" name="ftnref30"><span data-dcnode-id="1768" instrument_node="">[30]</span></a></p><span data-dcnode-id="1765" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1764" instrument_node="">However, the very fact that the terrorist
activities were undertaken by an organization, justifying its actions by
reference to Islam, was a serious moral challenge many Muslim countries had to
respond.</span><a data-dcnode-id="1762" href="#ftn31" name="ftnref31"><span data-dcnode-id="1763" instrument_node="">[31]</span></a><span data-dcnode-id="1761" instrument_node=""> There was a
considerable effort on the part of the statesmen and intellectuals in the
Islamic world to stave off linking terror in general, and September 11 terror
attacks in particular to Islam and Islamic groups. Perhaps, nowhere was this
concern more visible than in Turkey, a country which, while orienting itself
towards Western norms and values, at the same time maintained its ties with
Islam and Islamic world. Indeed, it was this duality that put enormous pressure
on Turkey to call the world to draw a distinction between Islam and terror.
Turkish political leaders and intellectuals, like their counterparts in other
Islamic countries, took pains to emphasize that Islam was a religion of peace
and a distinction between Islam and terrorism must be drawn. While the Prime Minister was calling
equating Islam with terror unjust,</span><a data-dcnode-id="1759" href="#ftn32" name="ftnref32"><span data-dcnode-id="1760" instrument_node="">[32]</span></a><span data-dcnode-id="1758" instrument_node="">
the Foreign Minister was saying: "terrorism does not have a religion, geography
and there can be no justification for terrorism under any circumstances... To
identify terrorism with any religion is an insult to all religions. We strongly
condemn those who have used the name of our holy religion to define some
terrorists. Following the tragedy in the USA, Turkey conferred with some fellow
members of the OIC and urged her NATO allies as well as the EU members to avoid
such misuse."</span><a data-dcnode-id="1756" href="#ftn33" name="ftnref33"><span data-dcnode-id="1757" instrument_node="">[33]</span></a></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1753" instrument_node="">In this regards, the OIC-EU Summit, which was
held in Istanbul in 12-13 February, was an expression of Turkey's determination
to assume its responsibility through a policy of bridging the East and the
West, and calling for harmony, rather than conflict between two civilizations.
The Forum turned out to be a useful platform for an intensive exchange of views
between representatives of international organizations, high-ranking
politicians, opinion-makers, intellectuals from EU-member countries, OIC-member
countries and observer countries, and mutual compliments filled the air
although it remains to be seen what it will bring about in concrete political
terms.</span><a data-dcnode-id="1751" href="#ftn34" name="ftnref34"><span data-dcnode-id="1752" instrument_node="">[34]</span></a><span data-dcnode-id="1750" instrument_node="">
Nevertheless, organizing such a conference, and bringing together EU member
states and Muslim countries around the same table had a symbolic meaning and it
was seen as the start of the new Turkish role.</span><a data-dcnode-id="1748" href="#ftn35" name="ftnref35"><span data-dcnode-id="1749" instrument_node="">[35]</span></a><span data-dcnode-id="1747" instrument_node="">
Ismail Cem's views on the conference were reflective of this: "An example of
what Turkey could do [to play a bridging role between the Islamic World and the
Western Christian World] can be seen in the forthcoming meeting of the OIC and
the EU. For the first time these two organizations will be coming together for
a political exchange of opinions. Besides, in the aftermath of September 11 we
are strongly opposed to the wrong perception of placing terrorism and Islam
side by side. I had spoken with many of my Western colleagues and drew their
attention to the sensitivity of wording used... In correcting such mistakes and
in establishing some sort of a harmony, Turkey has a pioneering place that is
provided to it by its history, culture and modern identity. We have to act in
awareness of that responsibility".</span><a data-dcnode-id="1745" href="#ftn36" name="ftnref36"><span data-dcnode-id="1746" instrument_node="">[36]</span></a></p><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1742" instrument_node="">This argument, to conclude, implied at least
two interrelated aspects: First, Turkey's support for the coalition was
instrumental in defusing the charge that the war was a Muslim-Christian
confrontation.</span><a data-dcnode-id="1740" href="#ftn37" name="ftnref37"><span data-dcnode-id="1741" instrument_node="">[37]</span></a><span data-dcnode-id="1739" instrument_node=""> This point
was very well expressed by Foreign Minister Cem: "This is the fight between
democracy and terrorism and the struggle between the wise and fanatic. We
believe that this fight will be won by our side. Turkey will be the biggest
obstacle before those who want to divert this fact to a wrong path such as a
fight between the religions".</span><a data-dcnode-id="1737" href="#ftn38" name="ftnref38"><span data-dcnode-id="1738" instrument_node="">[38]</span></a><span data-dcnode-id="1736" instrument_node="">
Second, the Turkish model was offered as an alternative to a Taliban version of
Islam. That means, Islam and modern values are compatible with each other, and
it is possible to reconcile Islam within a modern, Western-style, democratic
and secular system. In the words of Dale F. Eickelman, "Turkey can only offer
the world an example of a nation in which Western democratic values and Islam
converge in an increasingly strengthened civil society in which the state and
religion are not seen as adversaries. 'Western' societies, like 'Islamic' ones,
have no place for either militant secular extremism or militant religious
extremism".</span><a data-dcnode-id="1734" href="#ftn39" name="ftnref39"><span data-dcnode-id="1735" instrument_node="">[39]</span></a><span data-dcnode-id="1733" instrument_node=""> In
practical terms, Turkey's taking part in the Western-led coalition was expected
to facilitate other countries' adapting counter-terrorist stance and cooperation
with the US.</span><a data-dcnode-id="1731" href="#ftn40" name="ftnref40"><span data-dcnode-id="1732" instrument_node="">[40]</span></a><span data-dcnode-id="1730" instrument_node=""> Seen from
another perspective, it was also argued that this "geo-cultural" dimension, in
addition to the geopolitical position, could constitute another asset for
Turkey in its relations with Western world, particularly as far as its quest
for becoming a full member of the European Union concerns.</span><a data-dcnode-id="1728" href="#ftn41" name="ftnref41"><span data-dcnode-id="1729" instrument_node="">[41]</span></a></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Yet the argument that Turkey could be a role
model for Islamic world is also controversial in some aspects. First, Turkish
ambitions in this direction are not new and we have enough evidence to judge
how they are perceived in other parts of the Islamic world. Turks themselves
are proud of being the only secular country in the Islamic world; and from time
to time, Turkey is offered as a role model from the outside as well. Yet, it is
also equally true that Turkey's perception of itself as a model could not go
beyond being an illusion, and those Western ideas promoted by Turkey have
hardly penetrated into other Muslim societies. Arab countries' criticism of the
secular Turkish model, and other problems dominating Turkish-Arab relations are
no secret. In this sense, any fundamental shift in the perceptions of other
Muslim societies, which would ease the objections to adapting a Turkish style
system, cannot be observed. To the contrary, considering the growing
anti-American feelings it is hard to expect that such a role for Turkey would
be welcomed. Moreover, American way of dealing with terror through primarily
military means or through supporting the existing non-democratic regimes in the
Islamic world may hinder the burgeoning reformist movements in those countries
and set fallbacks to the natural transformation of those societies, with a
result that radicalism in the Islamic world could be given a new impetus. In
this sense, Turkey's attempts to carry the Western values into the region might
even widen the existing gap between Turkey and other Islamic societies.</span></p><span data-dcnode-id="1723" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Second, the main problem with this argument is
the question of whether it is possible at all to transform a society from the
outside. As long as domestic enthusiasm for reform is lacking, the
international pressures or influences to change a society's nature, structure,
laws, and political, economic and social cultures to make them conform with
certain models have limited effect. To be able to influence a society from
outside, international actors must have strong linkages, which would enable
them to exert pressures stimulating a change in the behavior of the domestic
actors. For instance, if we remember Turkish-EU relations, despite the existence
of strong linkages, there is still a resistance to change coming from the
Turkish establishment. Considering the lack of linkages, societal differences
and geographical distances between Turkey and other Muslim societies, prospects
for Turkey's influencing other Muslim countries remain limited. Likewise,
democratic regimes and other practices cannot be established overnight, nor can
they be taken granted. It took Turkey decades to reach its current level, and
this was no doubt a painful process. That also dictates against transplanting
Turkey's experience into other societies, which have not followed a similar
path. On the other hand, even if one assumes that Islamic world wants and needs
change, there is nothing to suggest that that would be one imposed from
Washington with its own political agenda.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><h2 data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">A Turkish zone of
influence in Central Asia and the Caucasus?</span></h2><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1716" instrument_node="">Let us move to the third area where Turkey's
influence is supposedly growing, and a similar Turkish role is expected. The
war against Afghanistan and terrorism brought the Central Asian, Caspian and
Caucasus regions once again into the locus of interest. Some countries in the
region, which are mostly ruled by former Communist leaders in an authoritarian
manner, were also under pressure from domestic opposition. Since this
opposition was mixed with some elements of Islamic radicalism, particularly in
the case of Central Asian states, such as Uzbekistan, the regimes became active
supporters of the international coalition against the Taliban and al-Qaeda.
Moreover, the prospect of American involvement in the region offered a good
chance to those countries for balancing the Russian dominance through assuring
American backing. Consequently, they did not hesitate to respond to American
demands and they provided the United States with access to their air space and
military bases.</span><a data-dcnode-id="1714" href="#ftn42" name="ftnref42"><span data-dcnode-id="1715" instrument_node="">[42]</span></a><span data-dcnode-id="1713" instrument_node=""> U.S.
willingness to widen the international coalition against terrorism diminished
concerns for human rights and democratization, and resulted in a situation
where human rights violations and anti-democratic practices by the governments
in the region might be overlooked. Once being an impediment to more proactive
U.S. engagement in the region, disappearance of human rights considerations in
effect facilitated the U.S. cooperation with the Central Asian countries. </span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1704"><span data-dcnode-id="1710" instrument_node="">In developing this relationship, Turkey's
special ties with the region again appeared to be an important asset for U.S.
policy. Turkey had a lot to offer: Not only did Turkey have strong political,
cultural and economic connections to the region, but it had also accumulated a
significant intelligence capability in the region. Moreover, the large
experience Turkey accumulated in fighting terrorism would be made available in
expanding the global war on terrorism to this region.</span><a data-dcnode-id="1708" href="#ftn43" name="ftnref43"><span data-dcnode-id="1709" instrument_node="">[43]</span></a><span data-dcnode-id="1707" instrument_node="">
As a result, after the locus of interest shifted to a possible operation
against Afghanistan, and then to assuring the collaboration of the countries in
Central Asia, Turkish analysts soon discovered that Turkey's geo-strategic
importance was once again on the rise. It was thought that, thanks to its
geography's allowing easy access to the region, and its strong ties with the
countries there, Turkey could play a pivotal role in the conduct of U.S.
military operations in Afghanistan, and reshaping the politics in Central Asia:
"Turkey is situated in a critical geographic position on and around which
continuous and multidimensional power struggles with a potential to affect
balance of power at world scale take place. The arcs that could be used by world
powers in all sort of conflicts pass through Turkey. Turkish territory,
airspace and seas are not only a necessary element to any force projection in
the regions stretching from Europe and Asia to the Middle East, Persian Gulf,
and Africa, but also make it possible to control its neighborhood... All these
features made Turkey a center that must be controlled and acquired by those
aspiring to be world powers... In the new process, Turkey's importance has
increased in American calculations. With a consistent policy, Turkey could
capitalize on this to derive some practical benefits... Turkey has acquired a new
opportunity to enhance its role in Central Asia."</span><a data-dcnode-id="1705" href="#ftn44" name="ftnref44"><span data-dcnode-id="1706" instrument_node="">[44]</span></a></p><span data-dcnode-id="1703" instrument_node="">
</span><p data-dcnode-id="1684"><span data-dcnode-id="1702" instrument_node="">Growing international interest in the region
had further implications on the energy resources in the Caspian basin and
Central Asia. Already before the September 11 events, there had been much talk
about a new 'great game' in the making on the chessboard of Central Asia and
Caucasus.</span><a data-dcnode-id="1700" href="#ftn45" name="ftnref45"><span data-dcnode-id="1701" instrument_node="">[45]</span></a><span data-dcnode-id="1699" instrument_node=""> After the
war in Afghanistan, there was a growing belief among many analysts that the
centuries-old great game was entering a new phase.</span><a data-dcnode-id="1697" href="#ftn46" name="ftnref46"><span data-dcnode-id="1698" instrument_node="">[46]</span></a><span data-dcnode-id="1696" instrument_node="">
According to this line of reasoning, the US military operations in Afghanistan
were not simply a response to the attacks of September 11. Rather, "the plans
for the American offensive in Afghanistan were not formulated in response to
September 11, but existed prior to the terrorist attacks in the USA. Therefore,
it could be argued that the attacks on September 11 provided the US with the
opportunity to enter Afghanistan to further extend a project that had already
started months, if not years, earlier."</span><a data-dcnode-id="1694" href="#ftn47" name="ftnref47"><span data-dcnode-id="1695" instrument_node="">[47]</span></a><span data-dcnode-id="1693" instrument_node="">
This was attributed to the special geostrategic significance of Afghanistan.
Because, "Afghanistan occupies a strategic position in the geopolitical
landscapes in general, and the geopolitics of the oil and natural gas resources
in particular. Afghanistan has been in an extremely significant location
spanning South Asia, Central Asia, and the Middle East... the US administration
has significant political/ military and economic reasons to try to turn
Afghanistan into a base for American military operations in the region. There
can be no doubting Afghanistan's strategic importance to the US."</span><a data-dcnode-id="1691" href="#ftn48" name="ftnref48"><span data-dcnode-id="1692" instrument_node="">[48]</span></a><span data-dcnode-id="1690" instrument_node="">
Even one analyst goes as far as claiming that "The hidden stakes in the war
against terrorism can be summed up in a single word: oil."</span><a data-dcnode-id="1688" href="#ftn49" name="ftnref49"><span data-dcnode-id="1689" instrument_node="">[49]</span></a><span data-dcnode-id="1687" instrument_node="">
This reading of post-September 11 developments in the region found a large
support among many Turkish analysts, and a number of studies raised the same
argument, with the implication that those developments contributed to Turkey's
strategic position.</span><a data-dcnode-id="1685" href="#ftn50" name="ftnref50"><span data-dcnode-id="1686" instrument_node="">[50]</span></a></p><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1682" instrument_node="">The
construction of alternative pipelines to transport oil and gas from the region
to the world markets was the crux of the issue, because the Caspian resources
are landlocked. The methods and the routes through which the oil and gas are
carried to world markets have direct geopolitical effects. But it had long been
on the agenda, without a definite answer. Turkey had been pressing for the
Baku-Tbilisi-Ceyhan pipeline project. The developments in the wake of September
11 turned out to strengthen Turkey's hand in this issue. The U.S. threw its
weight on Turkey's side and the construction of the pipeline is scheduled to
start around September 2002, and finish by the end of 2004.</span><a data-dcnode-id="1680" href="#ftn51" name="ftnref51"><span data-dcnode-id="1681" instrument_node="">[51]</span></a></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1677" instrument_node="">Against this background, within Turkey there is a growing optimism that the
cumulative effect of these developments will strengthen Turkey's position
within the region and promote a Turkish zone of influence. However, this
argument has, among others, the following limitations. A proactive Turkish
engagement with Central Asia and the Caucasus is not a new concept.</span><a data-dcnode-id="1675" href="#ftn52" name="ftnref52"><span data-dcnode-id="1676" instrument_node="">[52]</span></a><span data-dcnode-id="1674" instrument_node="">
After they gained independence with the collapse of the Soviet Union, the newly
emerged Turkic states looked toward Turkey as a model. There was also a
corresponding great enthusiasm in Turkey for closer relations with the region,
as well as Western support to promote the 'Turkish model' that embedded
secularism in a predominantly Muslim society, adapted capitalist-market
economy, and a multi-party system, and prioritized Western orientation. For Turkey,
this region was to offer a new area to expand Turkish influence and boost
Turkey's geo-strategic value to the West. Turkish ambitions however remained
largely unrealized, and soon that model started to decline in the face of the
political realities of the region and changes in Western perceptions over time.</span><a data-dcnode-id="1672" href="#ftn53" name="ftnref53"><span data-dcnode-id="1673" instrument_node="">[53]</span></a><span data-dcnode-id="1671" instrument_node="">
In Turkey itself, the demise of Turkish model was mainly due to Turkey's own
constraints: the lack of enough financial and economic resources to meet the
expectations of these countries. Given that the structural obstacles Turkey
confronted in trying to enhance its influence in the region – the compatibility
of Turkish model, the receptivity of the target governments, the role of other
players, particularly Russia, and the constraints set upon Turkish foreign
policy by domestic problems- remained unaltered, then expecting acceleration by
the post-September 11 developments is difficult to sustain. Particularly,
considering that Turkey is itself struggling to overcome its own economic and
financial problems, the question arises as to how she will be able to engage in
an active new role in the region.</span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1668" instrument_node="">Yet, the developments so far imply that
Turkey's relations with the region in the new era are seen differently.
Previously, Turkey was perceived as a model for the economic, social and
political transformation of these countries. This time, the role expected from
Turkey is limited to military and strategic field. In addition to the existing
ones, Turkey has concluded several new military cooperation and education
agreements with these countries. After September 11, Turkey stepped up its
military assistance to Uzbekistan</span><a data-dcnode-id="1666" href="#ftn54" name="ftnref54"><span data-dcnode-id="1667" instrument_node="">[54]</span></a><span data-dcnode-id="1665" instrument_node="">
and Kazakhstan</span><a data-dcnode-id="1663" href="#ftn55" name="ftnref55"><span data-dcnode-id="1664" instrument_node="">[55]</span></a><span data-dcnode-id="1662" instrument_node="">, and to a
lesser extent to Kyrgyzstan</span><a data-dcnode-id="1660" href="#ftn56" name="ftnref56"><span data-dcnode-id="1661" instrument_node="">[56]</span></a><span data-dcnode-id="1659" instrument_node="">,
by supplying arms and military equipments and offering military training for
the modernization of the military capabilities of these nations. Moreover,
after those countries allowed the U.S. to use their airspace and military bases
before the military campaign in Afghanistan started, Turkish Air Force Command
personnel conducted site surveys for possible airfields in Tajikistan,
Kazakhstan and Kyrgyzstan to be used in air operations.</span><a data-dcnode-id="1657" href="#ftn57" name="ftnref57"><span data-dcnode-id="1658" instrument_node="">[57]</span></a><span data-dcnode-id="1656" instrument_node="">
Likewise, post-September 11 developments and ensuing U.S. interest in the
region had spillover effects in the Caucasus and provided an added impetus to
the Turkish activism in the region. Besides the positive steps taken in the
issue of pipeline projects and Turkey's close relations with Azerbaijan,
Turkish-Georgian cooperation in the military field remarkably accelerated.
Turkey had already started providing military assistance to Georgia in 1997.
After the U.S. decision to establish military presence in Georgian,</span><a data-dcnode-id="1654" href="#ftn58" name="ftnref58"><span data-dcnode-id="1655" instrument_node="">[58]</span></a><span data-dcnode-id="1653" instrument_node="">
Turkey's cooperation with Georgia became particularly important.</span><a data-dcnode-id="1651" href="#ftn59" name="ftnref59"><span data-dcnode-id="1652" instrument_node="">[59]</span></a></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1648" instrument_node="">Aside from those military contributions, Turkey
tried to raise a common concern for terrorism in the region through bilateral
visits, as well as on multilateral platforms. On 29-30 April 2002, the
Presidents of Turkey, Azerbaijan and Georgia held a summit meeting in Turkish
city of Trabzon and signed an agreement to work together against terrorism, and
also promised cooperation on the pipelines to bring the energy-rich region's
resources to the West. The summit was completed with a joint press conference
of the three leaders after the signing of the agreement of "The Struggle
Against Terrorism, Organized Crime and Other Important Crimes".</span><a data-dcnode-id="1646" href="#ftn60" name="ftnref60"><span data-dcnode-id="1647" instrument_node="">[60]</span></a><span data-dcnode-id="1645" instrument_node="">
Likewise, on June 4, 2002, the "Summit for
Cooperation and Confidence-Building Measures in Asia" held in Kazakhstan's
capital Almaty brought together heads of state of Turkey, China, Russia, India,
Pakistan, Palestine, Israel, Egypt, Iran, Mongolia, Tajikistan, Kazakhstan,
Kyrgyzstan, Uzbekistan, Afghanistan and Azerbaijan. The leaders signed a
"Declaration Aimed at Eradicating Terrorism and for Supporting a Dialogue
between Civilizations", as well as an accord which included regulations,
principles and commitments for establishing a comprehensive security mechanism.</span><a data-dcnode-id="1643" href="#ftn61" name="ftnref61"><span data-dcnode-id="1644" instrument_node="">[61]</span></a><span data-dcnode-id="1642" instrument_node="">
Moreover, the celebration of the tenth anniversary of the Black Sea
Economic Cooperation organization (BSEC) on 25 June 2002 in Istanbul was
another occasion where terrorism was discussed at a regional scale.</span><a data-dcnode-id="1640" href="#ftn62" name="ftnref62"><span data-dcnode-id="1641" instrument_node="">[62]</span></a></p><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">All these imply that what is required from
Turkey is for it to play a "subcontractor" role in the region, thus facilitate
an American presence there within the wider context of the war on terrorism,
rather than creating a genuine independent Turkish zone of influence, or
promoting Turkish model once again. Therefore Turkey's ambitions and
maneuverability are very much limited by international interests in the region.
Moreover, a policy based primarily on limited contributions in military field,
as long as lacking in economic dimension would be flawed. It is bound to remain
temporary and once the conditions have changed, and the region returns to
normalcy, the underlying realities may resurface and this policy may leave
Turkey at a disadvantaged situation in political and economic terms.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1634" instrument_node="">This observation is strengthened by a parallel
development in the way this region is treated by the international power
centers. These countries are geographically landlocked with no direct
connections to open seas. Moreover, they are also far from the prosperous
Western markets. In the short run, they would not be able to attract
significant foreign capital, except energy investments. They will probably be
seen as "raw material suppliers," rather than as "emerging markets"; in other
words, they will not be Asian tigers or Central and Eastern European Countries,
but new Gulf states. For this reason, in the foreseeable future, the prospects
for these countries to be part of the global market economy and move towards
democratic pluralistic regimes are limited. They will be approached from a
strategic perspective, and it is against this background that Turkey's pivotal
role in the region can be better comprehended. In this context, as far as the
optimism surrounding the launching the construction of Baku-Ceyhan pipeline is
concerned, it must be kept in mind that a number of other developments might
diminish the benefits of the pipelines to Turkey. Particularly the high
pipeline construction costs, the possible developments that may come about
concerning the alternative routes, such as Afghanistan,</span><a data-dcnode-id="1632" href="#ftn63" name="ftnref63"><span data-dcnode-id="1633" instrument_node="">[63]</span></a><span data-dcnode-id="1631" instrument_node="">
and the tactics to be employed by other players could have adverse affects on
the feasibility of the project.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1628" instrument_node="">A more definite reality, which speaks against Turkish ambitions in this region,
is the changing shape of U.S.-Russian relations. Under Putin, Russia has chosen
a non-confrontational type of relationship with the United States. Moreover,
Putin has already come a long way toward restoring Russian power and influence
in the region, and cementing Moscow's primacy, without being opposed by
Washington.</span><a data-dcnode-id="1626" href="#ftn64" name="ftnref64"><span data-dcnode-id="1627" instrument_node="">[64]</span></a><span data-dcnode-id="1625" instrument_node=""> In this
regard, following September 11, Russia cooperated with the United States and
did not resist U.S. military deployment in Central Asia and the Caucasus. At
the same time, partly in return for its concurrence with U.S. engagement in the
region, Russia also tried to utilize the international atmosphere and use the
discourse of fighting against terrorism to justify its own activities in the
region, thus strengthened its position.</span><a data-dcnode-id="1623" href="#ftn65" name="ftnref65"><span data-dcnode-id="1624" instrument_node="">[65]</span></a><span data-dcnode-id="1622" instrument_node="">
Based on these developments, there are also some arguments that a U.S.-Russian
rapprochement might better provide security and stability in this region,
therefore the United States should also recognize Russian interests there. If
events follow such a course, that will clearly create some problems for Turkey,
since Turkey and Russia have been competing with each other in this area.</span><a data-dcnode-id="1620" href="#ftn66" name="ftnref66"><span data-dcnode-id="1621" instrument_node="">[66]</span></a><span data-dcnode-id="1619" instrument_node="">
Nevertheless, it must be noted that many analysts refer to prospects for
cooperation between the countries. Throughout the 1990s, contrary to earlier
expectations, both sides had prioritized the economic interests and
Turkish-Russian relations developed cooperatively.</span><a data-dcnode-id="1617" href="#ftn67" name="ftnref67"><span data-dcnode-id="1618" instrument_node="">[67]</span></a><span data-dcnode-id="1616" instrument_node="">
Similarly it is argued that cooperation, rather than competition might be the
case also after the September 11, and this cooperation might be extended beyond
bilateral relations and include multidimensional partnership in Eurasia.</span><a data-dcnode-id="1614" href="#ftn68" name="ftnref68"><span data-dcnode-id="1615" instrument_node="">[68]</span></a></p><span data-dcnode-id="1612" instrument_node="">
</span><h2 data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">What role in
Afghanistan?</span></h2><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1593"><span data-dcnode-id="1608" instrument_node="">As it was made clear so far, Turkey emerged as
one of the leading actors in the fight against terrorism, hence it rigorously
supported the international coalition against the Taliban and the al-Qaeda.
When it became clear that the September 11 attacks had originated from
Afghanistan and a military campaign was inevitably going to take place, the
government was quick in obtaining a parliamentary authorization in October 2001
to contribute troops to the U.S. campaign. The bill, which was met with public
opposition,</span><a data-dcnode-id="1606" href="#ftn69" name="ftnref69"><span data-dcnode-id="1607" instrument_node="">[69]</span></a><span data-dcnode-id="1605" instrument_node=""> also
authorized the government to allow the stationing of foreign troops on Turkish
territory and permit the use of Turkish airspace and airbases.</span><a data-dcnode-id="1603" href="#ftn70" name="ftnref70"><span data-dcnode-id="1604" instrument_node="">[70]</span></a><span data-dcnode-id="1602" instrument_node="">
However the Chief of Staff Kivrikoglu and other top officials expressed their
hope that the scope of the conflict and Turkey's direct contribution would be
limited. Reflecting the overall ambivalance of Turkish elite, while maintaining
that Turkey cannot remain aloof to the developments in Afghanistan, Kivrikoglu
at the same time called for a limited Turkish role leaving out active Turkish contribution
to combat operations.</span><a data-dcnode-id="1600" href="#ftn71" name="ftnref71"><span data-dcnode-id="1601" instrument_node="">[71]</span></a><span data-dcnode-id="1599" instrument_node="">
Turkish government however decided to contribute to the campaign by sending a
unit of special forces to work with U.S. troops in humanitarian operations and
train Northern Alliance fighters. Turkey also hinted that it could make its
experience in guerilla warfare available, and it could help carve out a
coalition between various Afghan factions against Taleban. Moreover, the U.S.
benefited from Turkish airspace, used Incirlik airbase as a transport hub for
the campaign, and according to some reports, was supplied intelligence by
Turkey.</span><a data-dcnode-id="1597" href="#ftn72" name="ftnref72"><span data-dcnode-id="1598" instrument_node="">[72]</span></a><span data-dcnode-id="1596" instrument_node="">
The rapid collapse of Taleban rule however made the possible role of Turkish
soldiers in actual combat phase unclear, but soon a new rationale emerged. When
the Taliban rule in Afghanistan came to an end, it became possible to launch
international initiatives to rebuild the country, and the role of Turkey was
again undeniable. Although it was not able to make a significant contribution
in terms of financial and economic reconstruction aid, Turkey actively
participated in the International Security and Assistance Force (ISAF), charged
with assisting the newly formed interim Afghan authority and with providing
order and stability in the capital, Kabul. Within the framework of the ISAF,
Turkey contributed to the training of a national Afghan police and military
force and providing military aid and equipment, as well as patrolling Kabul and
its environs. Moreover, in June 2002, when the British mandate was over, Turkey
assumed the lead-nation role and took over the command of the ISAF.</span><a data-dcnode-id="1594" href="#ftn73" name="ftnref73"><span data-dcnode-id="1595" instrument_node="">[73]</span></a></p><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1591" instrument_node="">Based on these developments, it is claimed by
most analysts that Turkey is going to become a more assertive power, not only
in its immediate neighborhood, but also "out of area." In Turkish reasoning,
its active support for the U.S. military campaign was a logical corollary of
its position on fighting international terrorism. According to Primer Minister
Ecevit, it was natural that Turkey joined a war against terror because the U.S.
always stood behind Turkey, and he emphasized that the war had to be fought to
the end until Taleban regime was wiped out.</span><a data-dcnode-id="1589" href="#ftn74" name="ftnref74"><span data-dcnode-id="1590" instrument_node="">[74]</span></a><span data-dcnode-id="1588" instrument_node="">
For Turkey, at the same time, capitalizing on U.S.-led war on terrorism was a
useful instrument to enhance its influence in Central Asia. By taking the
strategic decision and taking active part also in military realm, Turkey sought
to have a say in the future political landscape of not only Afghanistan, but
also Central Asia. As regards active participation in ISAF, it was in line with
its policy on peace operations, as it evolved in the post-Cold War era. Turkey
has been involved in several U.N. and NATO peacekeeping missions, from Somalia
to Bosnia and Kosovo. This time, through participating actively in the ISAF and
commanding this multinational force, it could show its military capabilities
and ability to project power abroad, and thus expand the Turkish sphere of
influence.</span><a data-dcnode-id="1586" href="#ftn75" name="ftnref75"><span data-dcnode-id="1587" instrument_node="">[75]</span></a><span data-dcnode-id="1585" instrument_node=""> More
concretely, Turkey sought compensation for its military support in economic
field.</span><a data-dcnode-id="1583" href="#ftn76" name="ftnref76"><span data-dcnode-id="1584" instrument_node="">[76]</span></a><span data-dcnode-id="1582" instrument_node="">
Turkish economy which was already undergoing a severe crisis and was under an
IMF program was hit by the September 11 shock badly. Turkish Economy Minister
Kemal Dervis, after claiming that Turkey must support the international fight
against terrorism because it had suffered a lot from similar threats, hinted
that there may be a price. According to him, "Turkey's strategic importance for
the European Union and NATO is increasing and within this strategic framework
Western allies should consider the cost that Turkey will have to bear."</span><a data-dcnode-id="1580" href="#ftn77" name="ftnref77"><span data-dcnode-id="1581" instrument_node="">[77]</span></a><span data-dcnode-id="1579" instrument_node="">
A similar reasoning was used by Ecevit for justifying assistance to the U.S.</span><a data-dcnode-id="1577" href="#ftn78" name="ftnref78"><span data-dcnode-id="1578" instrument_node="">[78]</span></a><span data-dcnode-id="1576" instrument_node="">
In practical terms, that meant delay of loan payments, and when necessary
provision of new IMF loans, as well as direct U.S. assistance.</span><a data-dcnode-id="1574" href="#ftn79" name="ftnref79"><span data-dcnode-id="1575" instrument_node="">[79]</span></a></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1571" instrument_node="">At the same time, similar to the general
arguments regarding Turkey's being an example to the Muslim world, discussed
earlier, it was also claimed that Turkey could become a model for Afghanistan
as well. That a war against Afghanistan offered the possibility to replace the
fundamentalist Taleban regime, which Turkey had been consistently opposed, was
an important reason behind Turkey's support for American war. Prime Minister
Ecevit was one of the vehement supporters of this view, and during his
correspondence with President Bush he underlined that a military operation on
Afghanistan should include the toppling Taleban regime.</span><a data-dcnode-id="1569" href="#ftn80" name="ftnref80"><span data-dcnode-id="1570" instrument_node="">[80]</span></a><span data-dcnode-id="1568" instrument_node="">
He went on stating that the model to be introduced had to be one similar to
Turkey's secular democratic model for peace, stability, and tranquility in
Afghanistan. Here, at times, the discussions sometimes ran into an emotional
mood. The deep historical ties between the two countries have been continuously
repeated to underline the 'necessity' of Turkey's support for Afghan people:
Afghanistan was the first country to recognize the new Turkish Republic; Turkey
helped Afghanistan in its modernization efforts; Ataturk – the founding father
of the modern Turkish Republic – put special emphasis on Afghanistan, and so
on.</span><a data-dcnode-id="1566" href="#ftn81" name="ftnref81"><span data-dcnode-id="1567" instrument_node="">[81]</span></a><span data-dcnode-id="1565" instrument_node="">
Some proponents of a proactive Turkish foreign policy went as far as maintaining
that "the first country to recognize Kemal Atatürk's revolution and adopt the
Turkish model was Afghanistan in 1921. Under the right political reformulation,
to which Turkey will undoubtedly contribute, Afghanistan could be the first
model in the post-Cold War period to rehabilitate itself through the methods
and means provided in the historic Turkish national experiment."</span><a data-dcnode-id="1563" href="#ftn82" name="ftnref82"><span data-dcnode-id="1564" instrument_node="">[82]</span></a><span data-dcnode-id="1562" instrument_node="">
However, Foreign Minister Cem, though acknowledging the universal validity of
Turkish model, called for caution in that Turkish model "is not one that could
be forced upon from the outside. What kind of a model they want, what kind of a
model they need, and to what kind of a model they are ready are something to be
decided upon by the Afghan people themselves."</span><a data-dcnode-id="1560" href="#ftn83" name="ftnref83"><span data-dcnode-id="1561" instrument_node="">[83]</span></a></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1557" instrument_node="">From American perspective, as discussed above,
Turkey's support and participation into the coalition was useful to rebut
allegations that the U.S. was engaged in a war against Islam. Therefore,
similar to Turkish arguments, there were extensive references to Turkey's
constituting a model for Afghanistan as well.</span><a data-dcnode-id="1555" href="#ftn84" name="ftnref84"><span data-dcnode-id="1556" instrument_node="">[84]</span></a><span data-dcnode-id="1554" instrument_node="">
Moreover, besides its military contributions, as stated, Turkey had important
linkages in the country and the region that could facilitate the U.S. presence
there. As for peacekeeping phase, Turkey has a large standing army with
accumulated experience in special operations and peacekeeping and as such it
could spare its troops for such a mission.</span><a data-dcnode-id="1552" href="#ftn85" name="ftnref85"><span data-dcnode-id="1553" instrument_node="">[85]</span></a></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">Yet, prospects for heightened expectations
regarding region is difficult to substantiate.</span><a data-dcnode-id="1547" href="#ftn86" name="ftnref86"><span data-dcnode-id="1548" instrument_node="">[86]</span></a><span data-dcnode-id="1546" instrument_node="">
First, Turkey's interest to Afghanistan is similar to the sudden discovery of
Central Asia and Caucasus after the collapse of the Soviet Union. Therefore,
because of the lack of any previous strategic perspective towards the country
and the region, except for the Atatü era, raising the expectations
conjecturally is highly problematic. Second, as was discussed earlier, Turkey's
potential for becoming a model for the Muslim world is highly limited. In the
case of Afghanistan, this is further limited by the particular characteristics
of this war-torn country: The people of the country are illiterate and very
closed-off from the world; the society is very much fragmented and economically
collapsed. Considering that even in relatively more developed Muslim countries
Western liberal values are not welcomed by the people, one may wonder how
Turkey would be able to carry these values to Afghanistan. </span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1539"><span data-dcnode-id="1543" instrument_node="">In regards to military contributions and
assuming the ISAF command, for sure they will give an important impetus for
Turkey's role in the region, and international standing. However, if they are
not backed by other economic and political incentives in the medium and
long-term, their practical benefits could be severely limited. Particularly, if
we judge based on the past experience about Turkey's earlier expectations
regarding Central Asia, geographical distance and lack of enough means could
further limit transforming this engagement into political influence. The effect
of geographical distance and the global reach of the U.S. therefore should be
carefully evaluated. As the empirical evidence about Central Asia suggests,
although Turkey sees itself as a bridge to open up these countries to the West,
the West was in fact able to establish direct contacts with these countries.
Similarly, in a military sense, particularly during the preparation and conduct
of the Operation Enduring Freedom, the U.S. was able to get the support of
other regional powers, notably Pakistan, and as such minimized the role of
Turkey in the overall operation.</span><a data-dcnode-id="1541" href="#ftn87" name="ftnref87"><span data-dcnode-id="1542" instrument_node="">[87]</span></a><span data-dcnode-id="1540" instrument_node="">
Last but not least, the dynamism of U.S. foreign policy in the new era and
whether Turkey can keep pace with it – how many such other engagements Turkey
can sustain – should be taken into consideration in evaluating the impact of
Afghanistan engagement on Turkish foreign policy. In this line, any shift of
international interest away from the Central Asian region, especially if one
considers the U.S. intentions to expand the war on terrorism, could also result
in a situation where the novelty of the "strategic importance of the region"
might wear off. In such a situation, this out-of-area role might lose the wider
political context in which it takes place and turn out to be another sporadic
short-term engagement.</span></p><span data-dcnode-id="1538" instrument_node="">
</span><h2 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">A breakthrough in
Turkish-EU relations?</span></h2><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1534" instrument_node="">Another area of activity in Turkish foreign
policy was observed in Turkish-European Union relations. The basic Turkish
argument could be summarized as follows: because the events of September 11
have proven Turkey's value, not only to the Americans but also to the
