Europeans, Turkey could now "anticipate a warmer West."</span><a data-dcnode-id="1532" href="#ftn88" name="ftnref88"><span data-dcnode-id="1533" instrument_node="">[88]</span></a><span data-dcnode-id="1531" instrument_node="">
Turkey therefore tried to utilize this opportunity so as to cement its
relations with both the U.S. and Europe by emphasizing its role as a
significant pro-Western power in such a critical juncture. Moreover, there was
a strong Turkish belief that in the new era opened up by September 11 events,
because the concern for fighting international terrorism was going to be the
major leitmotiv, the international system would be increasingly dominated by
security-oriented considerations. That would, the argument goes, inevitably
enhance the role of powerful security actors – such as the U.S. and NATO – at the
expense of less powerful ones  – EU members, and CFSP. By this way, the urgency
of Turkey's relations with CFSP/ESDP was expected to diminish.</span><a data-dcnode-id="1529" href="#ftn89" name="ftnref89"><span data-dcnode-id="1530" instrument_node="">[89]</span></a><span data-dcnode-id="1528" instrument_node="">
In this vein, besides the hope that Turkey's renewed importance would boost
Turkish-European relations, there was therefore an additional impetus in the
Turks' viewpoint: in the context of the growing American-Turkish strategic
partnership, the Turks felt confident that the U.S. would not leave Ankara
alone and would press the EU to satisfy Turkish demands. Therefore, the EU
should appreciate the Turkish position in some of the problems dominating
Turkish-European relations for some time.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1525" instrument_node="">The Turkish expectations that the EU and
European countries would be more receptive to Turkey's position on fighting
against terrorism have been already elaborated. Other issues which were
supposedly going to be solved in a manner favorable to Turkey's interests
included the Cyprus issue; the deadlock in the ESDP (European Security and
Defense Policy); and Turkey's troubled EU membership process. There were indeed
some initial positive steps in all those areas and a sense of optimism was
inserted.</span><a data-dcnode-id="1523" href="#ftn90" name="ftnref90"><span data-dcnode-id="1524" instrument_node="">
[90]</span></a><span data-dcnode-id="1522" instrument_node=""> There
appeared a chance to overcome the squabble over the ESDP-NATO relations and
over what place Turkey would have in the development of the ESDP. In the run up
to the Laeken Summit in December 2001, a consensus, called Ankara Document, was
reached between Turkey, the United Kingdom and the U.S. Moreover, after a long
pause, the dialogue between the leaders of the two communities on Cyprus was
resumed. Both achievements were viewed as success by the Turkish politicians,</span><a data-dcnode-id="1520" href="#ftn91" name="ftnref91"><span data-dcnode-id="1521" instrument_node="">[91]</span></a><span data-dcnode-id="1519" instrument_node="">
and the U.S. was said to have given stimulus to those developments.</span><a data-dcnode-id="1517" href="#ftn92" name="ftnref92"><span data-dcnode-id="1518" instrument_node="">[92]</span></a></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1514" instrument_node="">Without discussing all these issues in detail,
at the risk of simplification, we would suggest that there are some fundamental
challenges to Turkey's arguments, which would limit a sudden breakthrough in
Turkish-EU relations. The main weakness of the Turkish discourse could be
identified as follows. The initial rhetoric seemed to have perceived the West
as a monolithic bloc.</span><a data-dcnode-id="1512" href="#ftn93" name="ftnref93"><span data-dcnode-id="1513" instrument_node="">[93]</span></a><span data-dcnode-id="1511" instrument_node="">
Although this seemed to be true at the immediate aftermath of the September 11
terror attacks and all European powers expressed that they were united with the
U.S. against the dangers of terrorism, after the novelty of the slogans of
solidarity with the U.S. faded away, the underlying divergences in the
transatlantic relations over a wide range of issues resurfaced. This was
exacerbated by another feature of the approach taken by Turkey, which was to
rely on U.S. pressure in its dealings with the EU. Those developments slowly
put Turkey in an awkward position. First, because EU-U.S. relations were
increasingly characterized by disagreements over several issues, and,
transatlantic relations were more occupied with how to find a solution to those
problems than with Turkey, in fact the urgency of Turkey's problems in the eyes
of the U.S. was far away from meeting the Turks' expectations.</span><a data-dcnode-id="1509" href="#ftn94" name="ftnref94"><span data-dcnode-id="1510" instrument_node="">[94]</span></a><span data-dcnode-id="1508" instrument_node="">
Even if one assumes that the U.S. would be inclined to support Turkey, it would
approach Turkish-EU relations from a strategic perspective, and that may not be
compatible with the actual realities of Turkey-EU relations and the
expectations of the EU from Turkey. This reasoning applies largely to
democratization and human rights priorities of the EU vis-à-vis Turkey, – the
famous analogy of "democratic and stable Turkey versus stable and democratic
Turkey." That could in turn lead to the next problem. Perhaps, this 'tactic' of
using the relations with the U.S. as a leverage vis-à-vis the EU is likely to
cultivate a mood of distrust between Turkey and the EU, as well as a friction
between the EU and the U.S. Instead of creating a healthy dialogue with the EU,
Turkey's use of its strategic ties with the United States and the U.S. lobbying
as a stick against the EU was increasingly perceived as "a kind of
low-intensity threat" against Brussels. In the long run, Ankara therefore hinders
the creation of a strong channel of trust with the EU, and thus isolates
itself. Against such a picture, it was no surprise that soon Turkish elite
started to question Turkey's membership process into the EU. This was
paralleled by another debate on whether Turkey should make a choice between the
EU membership and strategic partnership with the US.</span><a data-dcnode-id="1506" href="#ftn95" name="ftnref95"><span data-dcnode-id="1507" instrument_node="">[95]</span></a></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1503" instrument_node="">Moreover, Turkish political elite's perception
of the country as an actor indispensable to the West, particularly in political
and strategic realm, is a cause for further problems. It is true that Turkey's
role in the European security architecture is very vital, but a
security-dominated discourse that lies at the basis of Turkish perceptions of
the relations with Europe has an impact not only on the way Turkey values
itself, but also on the actual course of the developments. At times, this leads
to robust attitudes towards the EU and asking for concessions or a different
treatment in a way to further hamper the integration process. More importantly,
capitalizing on the strategic importance diverts the attention away from real
problems and reduces the urgency for introducing and implementing economic,
political, and cultural reforms demanded by the European integration process.
The more Turkey is focused on its indispensability to the West, the less the
country will be willing to undertake the necessary transformation in its
journey towards EU membership. Therefore, the EU representatives were quick in
making their positions clear against Turkey's attempts to capitalize on
strategic importance and de-emphasize membership criteria. EU Commissioner
responsible for enlargement, Gunter Verheugen, maintained that Turkey should
meet the hard criteria to be a member of the EU, otherwise, the 'Whole Europe
Integration Project' will lose its credibility. He went on saying that "(w)e
will soften the conditions of Turkey's membership. In return, Turkey will give
us the guarantee of strategic aid. We cannot make such a bargain."</span><a data-dcnode-id="1501" href="#ftn96" name="ftnref96"><span data-dcnode-id="1502" instrument_node="">[96]</span></a><span data-dcnode-id="1500" instrument_node="">
Given that there were even initial expectations that, similar to Turkey's entry
into NATO following its contribution of troops to Korean War, Turkey's
participation into military campaign in Afghanistan could pay the way for
Turkey's membership into EU, this warning is quite telling.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1497" instrument_node="">Last but not least, remembering that the
underlying merit of the problems, which have so-far dominated Turkish-EU
relations, is unlikely to disappear all of a sudden, even after September 11 we
are further called to be cautious. The continuation of the Greek veto on the Ankara
Document which, from Turkey's side,</span><a data-dcnode-id="1495" href="#ftn97" name="ftnref97"><span data-dcnode-id="1496" instrument_node="">[97]</span></a><span data-dcnode-id="1494" instrument_node="">
resolved the tension over ESDP, and Turkey's futile attempts to force the EU to
set a deadline for the start of membership negotiations are some of the
examples. Therefore, a fundamental shift in the EU's policy towards Turkey just
for the sake of Turkey's enhanced strategic importance is hard to expect.
Rather, the determination to carry out the transformation on the domestic
scene, and the speed with which Turkey delivers those changes in this process
would continue to remain the single most important determining factor of
Turkey's relations with the EU.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><h2 data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Turkish-American
relations: Revival of strategic partnership?</span></h2><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1488" instrument_node="">Having said that, we can move on to
Turkish-American relations. As it has been underlined so far, in American point
of view, Turkey came to be seen a critical country whose support and
cooperation was essential. First, there was a strong belief in the United
States that supporting moderate Muslim countries, which oppose terrorism and
extremism, was the key to winning the war on terrorism. The Turkish model,
which embeds Islam within a secular system, appeared to be the best candidate
to fit this role. Moreover, Turkey's geographical location and experience in
fighting terrorism made its cooperation essential to the international
coalition against terrorism. Furthermore Turkey was more than willing to
contribute to U.S. agenda in Afghanistan by providing troops to the
peacekeeping force. As a result, Turkish-American relations, which were
characterized by up-and-downs throughout the 1990s, started to receive renewed
interest. As mentioned above, on several occasions, many American statesmen
liked to call Turkey "a steadfast partner in war on terrorism."</span><a data-dcnode-id="1486" href="#ftn98" name="ftnref98"><span data-dcnode-id="1487" instrument_node="">[98]</span></a><span data-dcnode-id="1485" instrument_node="">
The changed mood was observed not only in the declarations of American
politicians, but also in the titles of articles written on the issue, which
were at times heavily emotional. Here is an example: "Turkey and the US: A
partnership rediscovered."</span><a data-dcnode-id="1483" href="#ftn99" name="ftnref99"><span data-dcnode-id="1484" instrument_node="">[99]</span></a></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1480" instrument_node="">
From Turkey's perspective, the revival of strategic relations with the U.S.
implied several potential advantages, and consequently the Turks expected more
rigorous U.S. assistance in a number of areas: U.S. support in the campaign
against PKK terrorism; the promise of enlarged exports to American markets; the
removal of obstacles to military transfers to Turkey; U.S. backing of Turkish
command of Afghan peacekeepers and Baku-Ceyhan pipeline project; American
support for further IMF loans; and American support for Turkey's other foreign
policy issues, such as Cyprus, the ESDP and EU membership. Another repeated
theme in the Turkish arguments was that, contrary to the Europeans, the U.S.
had always been more supportive and sensitive to Turkey's demands in most of
those contentious issues, thus it was a partner to be relied on. As a result,
after September 11, Turkish-American relations which were characterized as
'strategic partnership' by President Clinton in 1999 have been further
deepened.</span><a data-dcnode-id="1478" href="#ftn100" name="ftnref100"><span data-dcnode-id="1479" instrument_node="">[100]</span></a><span data-dcnode-id="1477" instrument_node=""> In this
regards, the Prime Minister Ecevit's visit to Washington On January 14-19 was a
climax, which provided an important occasion to cement the strategic
partnership.</span><a data-dcnode-id="1475" href="#ftn101" name="ftnref101"><span data-dcnode-id="1476" instrument_node="">[101]</span></a></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Indeed, in principle, it is hard to ignore that
American-Turkish relations converge to a large extent. It was this convergence
of interests and shared strategic vision that constituted the basis of some
common policies towards a number of issues and regions, such as Balkans, and
Caucasus. Nevertheless, one should not underestimate some limitations, which
force us to take a more cautious stance. To start with, growing references to
Turkey's renewed strategic importance in the wake of September 11 attacks
inevitably reproduces the basic nature of Turkish-American relations, which
were heavily security-dominated. Because there are mutual security-related
concerns in several issues and regions, this is of course understandable.
However, as in the past, this situation leaves Turkey very much depended on the
shifting American strategic priorities. Because it remains the passive receiver
of the external conditions in this partnership, Turkey is deprived of the
ability to form the shape and direction of this partnership according its own
agenda and priorities.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Such considerations in mind, after September
11, there were in fact serious attempts to diversify the relationship and give
it a more solid standing. However given that the U.S. foreign policy is itself
going to be largely driven by a "security first" discourse, and some underlying
problems are still there, one has to wait to judge whether a major step towards
diversification could be realized. Among others, the most attractive attempt
towards diversification one was the proposal to increase trade volume between
Turkey and the United States. The idea of increasing economic ties with the
U.S. is in fact not new, and has been on the agenda since the Gulf War. To
compensate Turkey's losses in the war, there was a discussion about how the
U.S. could help Turkey. Then president of the country, Turgut Ozal, was also
raising a similar argument by saying: "we don't want direct financial aid, what
we need is more trade with the United States. For this, the United States
should abolish textile quotas and other barriers to trade." Yet once the war
was over, Turkey's demands were forgotten and Turkey was left alone to deal
with its economic problems.</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1466" instrument_node="">This time, following Prime Minister Ecevit's
visit to Washington in mid-January, the strengthening of Turkish-American trade
relations and adding an economic dimension to the strategic partnership came
once more on the agenda.</span><a data-dcnode-id="1464" href="#ftn102" name="ftnref102"><span data-dcnode-id="1465" instrument_node="">[102]</span></a><span data-dcnode-id="1463" instrument_node="">
At a press conference in Washington, Ecevit said the outcome of his contacts
deserved the highest marks: "adding economic partnership to political and
military alliance with the United States is an event that deserve 10 marks."</span><a data-dcnode-id="1461" href="#ftn103" name="ftnref103"><span data-dcnode-id="1462" instrument_node="">[103]</span></a><span data-dcnode-id="1460" instrument_node="">
To this end, a Turkish-American Economic Partnership Commission was established
to handle all economic and trade related issues between Turkey and the U.S.</span><a data-dcnode-id="1458" href="#ftn104" name="ftnref104"><span data-dcnode-id="1459" instrument_node="">[104]</span></a><span data-dcnode-id="1457" instrument_node=""> It had its first meeting in Ankara in
February.</span><a data-dcnode-id="1455" href="#ftn105" name="ftnref105"><span data-dcnode-id="1456" instrument_node="">[105]</span></a><span data-dcnode-id="1454" instrument_node=""> Yet, the
conclusions of these meetings were far from meeting Turkish expectations. Moreover,
the plan to establish Qualified Industrial Zones (QIZ) was also criticized due
to the fact that instead of establishing a direct relationship between the U.S.
and Turkey, the American side preferred a quick-fix solution and tried to
incorporate Turkey into the existing QIZ between Israel and the U.S.</span><a data-dcnode-id="1452" href="#ftn106" name="ftnref106"><span data-dcnode-id="1453" instrument_node="">[106]</span></a><span data-dcnode-id="1451" instrument_node="">
This small example is indicative of the fact that the Bush administration was
not ready to take the painful step and go to the Congress in order to seek a
legislation to establish closer economic relations with Turkey because of the
opposition in Congress. Therefore, in assessing Turkish-American relations, one
has to bear in mind the fact that U.S. policies can shift easily because of
different factors affecting U.S. policy making, such as lobbying, Congress and
internal American debates on how to conduct U.S. foreign policy. At the moment,
there are many supporters of Turkey in the Bush administration but this cannot
be taken for granted forever, and there is still strong opposition within
Congress against Turkey.</span><a data-dcnode-id="1449" href="#ftn107" name="ftnref107"><span data-dcnode-id="1450" instrument_node="">[107]</span></a><span data-dcnode-id="1448" instrument_node="">
The expectation of full, unqualified U.S. support for all the issues mentioned
above is therefore overly optimistic, and the developments so far prove this
observation.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Moreover, as a matter of fact, despite the
convergence of priorities at strategic level – having concurrent interests on
broad issues and regions –, divergence might be the case at the practical level.
In addressing certain tangible issues, the approaches to be taken might not be
always mutually agreeable. Likewise, even when both countries' positions
overlap on a certain case, that should not lead to overlooking the fundamental
characteristic of this relationship which stem from the relative positions of
the partners towards each other: the concerns of Turkey and the U.S. are guided
by entirely different sets of foreign policy priorities, – a global hegemon
versus regional power. Therefore, the possibility that there could be
diverging, even conflicting, interests and priories on certain issues is always
there. Over-activism observed in the U.S. foreign policy in the new era is
likely to further amplify this problem.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1442" instrument_node="">In this regard, as it was
underlined, though the issue of terrorism might be a common concern to both
Europe and America, when it comes to dealing with it there might appear some
diverging opinions. A similar reasoning does in fact apply to Turkish-American
relations. Turks repeatedly liked to argue that the US war against terrorism is
a policy parallel to that of Turkey. As Turkish Ambassador to the U.S. Osman
Faruk Logoglu underlined: "we are at the forefront of the war, as a friend, as
an ally, and in reciprocation for the United States' understanding of our own
fight against terrorism."</span><a data-dcnode-id="1440" href="#ftn108" name="ftnref108"><span data-dcnode-id="1441" instrument_node="">[108]</span></a><span data-dcnode-id="1439" instrument_node=""> But, in reality, soon it became clear that
there exist some fundamental differences, as well as diverging interests. The
controversy over a possible military operation against Iraq is the case in
point, which is also
illustrative of the perils Turkey's geo-strategic importance may at times
cause.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Turkey's geographical location was its main
asset, but at the same time, it also produced Turkey's greatest headache: Iraq.
In an effort to root out the sources of international terrorism, the U.S.
shifted its focus to the so-called rogue states, and President Bush took this
one step further by declaring Iraq, Iran and North Korea as the axis of evil.
Even before this speech, extending the military operations against Iraq was on
the U.S. agenda. Following developments such as the supposed Iraq-al-Qaeda
links, the anthrax cases and the dispute over U.N. arms inspections in the
country, made Iraq the next potential target for the U.S. fight against
terrorism. This inevitably brought Turkey to the fore anew, due to its
strategic value in a future war against Iraq.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">However Turkey strongly opposed to a possible extension of war against Iraq.
Before September 11, the Turkish government had been trying to normalize
relations with Iraq despite U.S. opposition in order to compensate for the
economic losses resulting from the UN-imposed embargo on Iraq. Therefore, the
U.S. determination to intervene in Iraq was an unwelcome development. Yet, the
real problem lies somewhere else. There is a fear that the operations against
Iraq and the turmoil created by post-Saddam political developments might have serious
repercussions for Turkish security. Turkey is worried that the war against Iraq
might end up with the breakup of Iraq and the establishment of a Kurdish state
in the northern part of Iraq. Such a possibility would, from the Turkish
perspective, encourage Kurdish separatist elements within Turkey. For this
reason, Turkey's main priority is that an operation against Iraq should be
avoided to the extent possible; and if it is going to take place anyway, Iraq
should remain one nation. Yet, it appears that once an operation against Iraq
starts, it would be almost impossible for Turkey to keep itself outside. In
such a situation, the nightmare is that the Turkish army might be forced to
occupy northern Iraq to prevent the emergence of an independent Kurdish state
there, and affect the post-Saddam political developments in Iraq. Such a policy
may not be compatible with the U.S. agenda in Iraq, and Turkish-American
interests could move towards sharpened divergence. </span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1423"><span data-dcnode-id="1430" instrument_node="">Indeed, it was persuasively argued by some Turkish
analysts that managing divergence and reaching a common position on Iraqi issue
could be the 'test case' for Turkish-American partnership. In a critical
account of the optimism following Ecevit's Washington visit, Cengiz Candar puts
it blatantly: "Turkey's protection by America on 'political and economic
platforms' depends to a large extent Turkey's ability to act in tune with
America on the issue of Iraq. I mean, as Turkey, you would oppose to an
American operation in Iraq; but at the same time you would become a 'strategic
partner' with the U.S., and you would rely on U.S. 'economic assistance' to
Turkey unreservedly. That won't happen. Cannot happen... Saddam is the 'gist' of
the calculations on Turkish-American relations and 'strategic partnership'."</span><a data-dcnode-id="1428" href="#ftn109" name="ftnref109"><span data-dcnode-id="1429" instrument_node="">[109]</span></a><span data-dcnode-id="1427" instrument_node="">
Moreover, everything comes with a certain price. It is therefore noted that the
deepening of strategic partnership and the generous support Turkey receives
from the U.S. administration, ironically, intensifies Turkey's dependence on
the U.S. with the effect that the burden of being a 'strategic ally' limits the
room of maneuver for Turkey.</span><a data-dcnode-id="1425" href="#ftn110" name="ftnref110"><span data-dcnode-id="1426" instrument_node="">[110]</span></a><span data-dcnode-id="1424" instrument_node="">
However, given the obvious divergence of positions towards Iraq, that situation
only adds to the complexity of Turkey's uncomfortable partnership with the U.S.</span></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Last but not least, one should also bear in
mind that Turkey's willingness to engage in active policies on several fronts
simultaneously is likely to confront it with the problem of having the
necessary capabilities and setting the priorities. Particularly, the wish to
enhance the relations with Europe, while at the same time moving towards a
deepened 'strategic partnership' with the U.S. and engaging in a proactive
policy in Eurasia, would be increasingly difficult to reconcile. Perhaps, as
was discussed in the previous section, the debate over whether to choose
between membership into the EU and strategic partnership with the U.S. was just
an early indicator of the dilemmas of a 'multi-dimensional' assertive foreign
policy.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><h2 data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">An end to the cycle of
economic crises?</span></h2><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1415" instrument_node="">Now, let us change the course from the foreign
policy issues, and talk about the impact of post-September 11 developments on
Turkey's domestic economic problems. Since early 2001, a severe economic crisis
has been hitting the Turkish economy. The crisis devastated the industrial
sector, lowered living standards, raised unemployment and jeopardized Turkey's
international financial solvency.</span><a data-dcnode-id="1413" href="#ftn111" name="ftnref111"><span data-dcnode-id="1414" instrument_node="">[111]</span></a><span data-dcnode-id="1412" instrument_node="">
In dealing with the crisis, Turkey received a significant amount of IMF
credits, which in total amounted to more than $30 billion. American support was
crucial for Turkey getting this IMF aid. Because Turkey emerged as a critical
ally and the 'best model' for the Islamic countries in the new era, from
American perspective, Turkey had to be supported economically. By this way the
U.S. could not only assure Turkey's cooperation but also send a strong message
that it would never leave a U.S. ally and Muslim country alone, when it is in
need. The remarks by a U.S. Congressman, Robert Wexler, are quite telling: "An
economic collapse in Turkey would be disastrous for America... America has got to
treat the economy of Turkey as if is the economy of New Jersey."</span><a data-dcnode-id="1410" href="#ftn112" name="ftnref112"><span data-dcnode-id="1411" instrument_node="">[112]</span></a></p><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1398"><span data-dcnode-id="1407" instrument_node="">
Although the Turkish side repeatedly claims that the IMF credits were provided
to Turkey without any political concessions, there is a perception, both at
home and abroad, that without the war in Afghanistan and the Turkish support in
the campaign against terrorism, the IMF would have never given such a huge
amount of money to Turkey. Even according to some analogies, Turkey could have
had a catastrophe similar to what happened in Argentina.</span><a data-dcnode-id="1405" href="#ftn113" name="ftnref113"><span data-dcnode-id="1406" instrument_node="">[113]</span></a><span data-dcnode-id="1404" instrument_node="">
As quoted above, Turkish Economy Minister Dervis, who took over the Turkish
economy in March 2001, and Prime Minister Ecevit made strong linkages between
Turkey's support for the international fight against terrorism and economic
assistance to Turkey.</span><a data-dcnode-id="1402" href="#ftn114" name="ftnref114"><span data-dcnode-id="1403" instrument_node="">[114]</span></a><span data-dcnode-id="1401" instrument_node="">
Similarly, representatives of Turkish private sector were more than willing to
argue on strategic grounds. According to the Chairman of Turkish-US Business
Council, Akin Öngör, if the Americans do ignore Turkey and fail to support it
economically, they would not be able to go to bed in safety.</span><a data-dcnode-id="1399" href="#ftn115" name="ftnref115"><span data-dcnode-id="1400" instrument_node="">[115]</span></a></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1393"><span data-dcnode-id="1396" instrument_node="">Whatever the exact motives behind the IMF decisions might be, the fact is that
with IMF help Turkey was able to control the economy in the short term and
avert a catastrophe. Yet, in the long-term this situation may have some
negative consequences. As long as the economic and political system remains
decayed and structural problems cannot be remedied, the injection of foreign
capital into the economy is bound to have a short-term effect. There is growing
speculation by financial analysts that Turkey's total debts, which now exceed
its gross national product, may create serious problems in the servicing and
repayment of the growing debts.</span><a data-dcnode-id="1394" href="#ftn116" name="ftnref116"><span data-dcnode-id="1395" instrument_node="">[116]</span></a></p><span data-dcnode-id="1392" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1391" instrument_node="">
In assessing the performance of an economy and the issue of foreign assistance,
perhaps, what is more important than receiving direct aid is the amount of
foreign investments flowing into a country. In this regard, Turkey does not
have a promising picture. According to a recent report conducted by the United
Nations Conference on Trade and Development, between 1998-2000, Turkey ranked
122nd among 137 countries in terms of foreign capital inflow.</span><a data-dcnode-id="1389" href="#ftn117" name="ftnref117"><span data-dcnode-id="1390" instrument_node="">[117]</span></a><span data-dcnode-id="1388" instrument_node="">
The reasons behind why foreign investors did not prefer Turkey mainly included
macroeconomic instability, widespread corruption and the complex nature of the
transactions that needed to be fulfilled. As a result, later Turkey decided to
take steps towards reforming its foreign investment rules, as part of its
IMF-backed reform process.</span><a data-dcnode-id="1386" href="#ftn118" name="ftnref118"><span data-dcnode-id="1387" instrument_node="">[118]</span></a><span data-dcnode-id="1385" instrument_node="">
Another study reveals the other side of the coin: The amount of Turkish capital
which is invested abroad, especially in Switzerland and Luxembourg, is
estimated to be $70 billion. Most of this money left Turkey after the economic
crises for the purpose of securing the money abroad, since domestic investors
lost their reliance on the Turkish economy.</span><a data-dcnode-id="1383" href="#ftn119" name="ftnref119"><span data-dcnode-id="1384" instrument_node="">[119]</span></a></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">
Here is the real paradox of Turkey: With a new crisis in the region, Turks
think that the country has become strategically important. Yet, in political
and economical terms it is considered to be a 'risky' place to invest, because
its economic system is not stable and possible conflicts in the region pose
threats to the country. If everybody is convinced that an operation against
Iraq is inevitable, and if the deputy prime minister of the country maintains
that an operation would destabilize the whole region, then, one wonders how
international and domestic investors could be convinced that it is reasonable
to invest in Turkey.</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Moreover, the belief that "they cannot ignore
us! They have to help us economically and financially, because we are
strategically important" is not a good one. First, this mood would hinder
domestic determination and the ability to solve the country's problems on its
own. Moreover, this would result in taking the economic reforms not so
seriously, and, in turn, diminish the self-discipline and self-control
necessary for economic transformation. Therefore, how Turkey will be able to
solve the vicious cycle of economic crises remains an open question.</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1374" instrument_node="">
Those economic problems, in turn, limit the country's ability to act
independently in its foreign policy, as was observed in discussions about a
possible operation against Iraq. On a TV show on America Fox-News channel, to
the severe annoyance of many Turks, even one American analyst, former Clinton
adviser Dick Morris, was claiming that "Turkey has to support us; because the
owner of Turkey is the IMF, and the IMF has already paid Turkey for this
service."</span><a data-dcnode-id="1372" href="#ftn120" name="ftnref120"><span data-dcnode-id="1373" instrument_node="">[120]</span></a><span data-dcnode-id="1371" instrument_node=""> This
'dependency' applies to other cases as well. Many American analysts did not
hesitate to make references to American support for further IMF aid to Turkey
in arguing for the relevancy of the 'dependent alliance' between Turkey and the
U.S. Daniel Nelson, for instance, argues that "Turkey needs American and the US
needs Turkey. Aside from a Republican administration in Washington, Turkey
hears only criticism of human rights record, and sees ongoing exclusion from
Europe. Without Washington, US$ 10 billion in further IMF loans would have been
impossible, and the image of an Argentina catastrophe would loom. Without
Washington, Athens' place in the EU would mean intensified pressures to back
away from the Turkish Republic on Cyprus. America has been a better friend than
any alternative."</span><a data-dcnode-id="1369" href="#ftn121" name="ftnref121"><span data-dcnode-id="1370" instrument_node="">[121]</span></a></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1366" instrument_node="">On the other hand, there is a fundamental
contradiction in the interplay between economics and strategic importance in
the new era. The increasing strategic importance and the requirements of the
new activism stemming from it, in fact, do not coincide with Turkish economy's
needs and priorities. Whereas Turkey is undergoing a severe economic crisis and
experiencing shortage of capital, the new engagements as part of Turkish
contribution to international fight against terrorism, which are no doubt costly,
do require a solid economic backing. For instance, although Turkey was more
than willing to contribute actively and assume the command of ISAF in
Afghanistan, the financial burden of this operation delayed the negotiations.</span><a data-dcnode-id="1364" href="#ftn122" name="ftnref122"><span data-dcnode-id="1365" instrument_node="">[122]</span></a><span data-dcnode-id="1363" instrument_node="">
For a long time, Ankara's worries for the financial repercussions of Turkish
contributions and the funding issue could not be met by the U.S. and U.K.
Turkey's repeated demands for western funding of the ISAF fell on deaf ears for
a long time. It was reported that Washington was reluctant to provide extra
financial support for Ankara on ISAF because billions of dollars in IMF loans
had already been provided to Turkey to help its recovery from the financial
crisis.</span><a data-dcnode-id="1361" href="#ftn123" name="ftnref123"><span data-dcnode-id="1362" instrument_node="">[123]</span></a><span data-dcnode-id="1360" instrument_node=""> There were
even some speculations that Turkey could give up its quest for ISAF leadership,
based on financial and other considerations.</span><a data-dcnode-id="1358" href="#ftn124" name="ftnref124"><span data-dcnode-id="1359" instrument_node="">[124]</span></a><span data-dcnode-id="1357" instrument_node="">
However, after prolonged discussions, at the end, it was only American
assurances that Turkey was able to accept to lead the force.</span><a data-dcnode-id="1355" href="#ftn125" name="ftnref125"><span data-dcnode-id="1356" instrument_node="">[125]</span></a><span data-dcnode-id="1354" instrument_node="">
Similarly, because Turkey is keen on power projection beyond its borders, in
order to sustain her military engagements abroad, there is a willingness to
spend further on military procurement in the aftermath of September 11. For
instance, one of the biggest Turkish defense projects came to a realization stage,
and Turkey successfully concluded the negotiations for the purchase of four
AWACS early warning aircraft from the Boeing. The financial cost of that
project to Turkey is expected to be around US$ 1.1 billion.</span><a data-dcnode-id="1352" href="#ftn126" name="ftnref126"><span data-dcnode-id="1353" instrument_node="">[126]</span></a><span data-dcnode-id="1351" instrument_node="">
One has to wait and see how it will be possible to reconcile those strategic
calculations requiring heavy military spending with the current needs of
Turkish economy.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Before concluding this section, it must be
underlined that the interplay between economics and Turkey's strategic
importance is problematic also in other aspects. Turkey's over-emphasis on its
geo-strategic position and its strategic value to the West, and the
determination to transform this into tangible economic benefits could work at
the time of crises. However, it must be kept mind that such a policy could also
turn out to be self-defeating in the long-run. One cannot take the geostrategic
value granted; rather it may change over time and depending on the case under
consideration. Therefore, if Turkey is serious in solving its economic
problems, it has to focus on structural remedies, rather than conjectural
external developments. More importantly, using its politico-military
contributions to Western security so as to gain leverage in economic realm may
diminish the trust between itself and its allies, and in the longer run that
may affect the relations or partnerships adversely.</span></p><span data-dcnode-id="1346" instrument_node="">
</span><h2 data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Concluding remarks</span></h2><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1342" instrument_node="">In light of the activism observed in the fields
discussed so far, the dominant view is that the post September 11 events have
contributed to Turkey's strategic importance, thus have helped reshape Turkey's
relations with the United States and Europe, as well as with the countries in
its neighborhood. As expressed by Foreign Minister Cem, "the unfortunate events
of September 11, 2001 and ensuing developments have confirmed and consolidated
some fundamental preferences of the Turkish foreign policy. Besides, they have
boosted Turkey's strategic importance."</span><a data-dcnode-id="1340" href="#ftn127" name="ftnref127"><span data-dcnode-id="1341" instrument_node="">[127]</span></a><span data-dcnode-id="1339" instrument_node="">
It might even, according to these arguments, stimulate the long-delayed
redefinition of Turkey's role in the post-Cold War world. Here is an excellent
example of such arguments: "What is required in the current circumstance is for
Turkey to seize the strategic initiative, with bold political leadership that
articulates Turkey's national security aspirations within the new regional
context. An historic window of opportunity exists for Turks, with Western
support and encouragement, to emerge from their bunker mentality and assert
themselves in shaping a positive historical trend outside their borders...
Turkey is ready... What remains is for the West, and specifically the United
States, to help Turkey mobilize its potential."</span><a data-dcnode-id="1337" href="#ftn128" name="ftnref128"><span data-dcnode-id="1338" instrument_node="">[128]</span></a></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Although overall it is true that Turkey's international standing has been
visibly enhanced, as it has been made clear so far, there is however need for a
more cautious approach in assessing the post-September 11 developments on
Turkish foreign policy. We would argue that the best way to discus the Turkish
role is to analyze it in the context of regional power. Turks have ambitious
and, at times, over-exaggerated expectations about their country's
international position, but, in reality, Turkey is mainly acting as a pivotal
power. This can be best observed in the discussions regarding the Turkish role
in Afghanistan, and Turkey's relations with Central Asia and the Caucuses. For
example, on the one hand, Turkey is trying to lead the ISAF, but on the other
hand it is asking the United States to pay its financial expenses and provide
Turkey with the necessary transport, intelligence and logistic facilities. This
is exactly the dilemma the country as is facing as a pivotal state. This
necessarily brings us to the issue of the mismatch between the capabilities and
foreign policy vision. One has to admit that, as the things stand, the gap
between Turkey's capabilities and its expectations is difficult to bridge in
the short-run. As a result, Turkey's ability to act as an independent actor
initiating its own projects is severely limited by, or depends on, the degree
to which it will be successful in managing balancing its own priorities with
external factors. That means, Turkey could act in cooperation with other global
and regional powers, and mobilize their support in the areas of converging
interests. By this way, Turkey can both advance its own interests and
contribute to the agenda of its partners. However to the extent that Turkey's
interest will diverge from those of its partners it will be increasingly
difficult to follow an independent course. If this is chosen, the growing
divergence may run the risk of confrontation. This point, which many advocates
of Turkey's strategic importance fail to see, must be the basis of any
assessment on Turkish foreign policy. That dictates that Turkey should
seriously get engaged in a comprehensive and in-depth debate on its role in the
world and in the region, what capabilities instruments are at its disposal,
what foreign policy vision it envisages, and what are its priorities. Such a
debate should be conducted by leaving aside the influence of short-term,
conjectural developments, and focusing more on setting long-term structural
priorities. The responses to those questions are of vital importance for the
successful resolution of not only foreign policy but also domestic problems the
country is facing.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">This segues into our next observation regarding
post-September debate on Turkey's strategic importance. The arguments raised
for Turkey's enhanced strategic importance are very similar to those employed
at the beginning of the 1990s, following the Gulf War and the collapse of the
Soviet Union. Yet, remembering that the euphoria of the 1990s remained largely
unrealized and diverted the country's attention away from more important policy
objectives, it would be legitimate to argue that it is high time for Turkey to
see the facts in a more realistic manner. First, that means, the foreign policy
issues that are on Turkey's agenda will evolve according to the actual
realities of the issue under consideration, rather than altered strategic
conditions. It is true that increased strategic value of the country may have
positive effects on its international standing but in such contentious issues
as the relations with Europe or America, the underlying sources of cooperation
or divergence will not vanish. Therefore it would be wrong for Turkey to choose
the easier way of capitalizing on its strategic importance and downplaying the
necessary steps it needs to take in its foreign and security policies.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Second, the need for a more realistic vision on
Turkish foreign policy has also implications on domestic realm. Whatever model
it follows in its foreign policy, or whatever priorities it sets for itself, be
it EU membership, leadership in Eurasia, or strategic partnership with the US,
Turkey's international performance will depend above all its capability to
solve problems internally and reach economic and political peace and
tranquility. In this respect, a rational assessment of the country's
international role would help avoid unnecessary external adventures and enable
it to direct its attention to necessary domestic transformation. The economic,
political and diplomatic problems facing the country are structural and
fundamental; they cannot be solved through a simple redefinition of Turkey's
strategic role in the new conjuncture. Engaging in ambitious external projects
or relying on the tempting idea of Turkey's indispensability to its Western
partners would diminish the urgency for reform and take the focus of the
country away from economic and political modernization. Economic reforms,
political transformation and human rights and democratization issues would
receive less attention compared to the life-and-death problems of national
sovereignty and national security. A choice is, therefore, being forced upon Turkey.
Either it will aspire to become a so-called "stable" regional or pivotal power
willing to project power beyond its borders, by maintaining and reproducing the
current political culture, which is dominated by military and security
considerations, or it will choose to become an ordinary, but "democratic" and
self-sufficient state, by focusing on the necessary economic and political
reforms and restructuring and transformation of its system.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">This is definitely not an easy task. To be sure, Turkey's geographical location
offers many advantages. Yet, the very same reality is also a source of problems
for the country. Whether one likes it or not, we are living in this volatile
region, characterized by several actual and potential crises. For instance, two
states that belong to the so-called "axis of evil" are Turkey's neighbors; and
any development in the surrounding regions forces Turkey to get involved in one
way or another. This is the reality in which we are living. If we cannot escape
this reality, then what we can do is to act in a rational manner with a
long-term perspective, based on carefully-elaborated priorities, instead of
being dictated by self-propaganda, conjectural calculations and short-term
gains.</span></p><span data-dcnode-id="1323" instrument_node="">
