</span><div data-dcnode-id="426" id="breadcrumbs"><div class="ui breadcrumb" data-dcnode-id="427"><a class="section" data-dcnode-id="438" data-label="Home" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/"><span data-dcnode-id="439" instrument_node="">Home</span></a><span data-dcnode-id="437" instrument_node=""> </span><i class="chevron right icon divider" data-dcnode-id="436"></i><span data-dcnode-id="435" instrument_node=""> </span><a class="section" data-dcnode-id="433" data-label="Our Methods" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/our-methods/"><span data-dcnode-id="434" instrument_node="">Our Methods</span></a><span data-dcnode-id="432" instrument_node=""> </span><i class="chevron right icon divider" data-dcnode-id="431"></i><span data-dcnode-id="430" instrument_node=""> </span><a class="section" data-dcnode-id="428" data-label="International Surveys" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/our-methods/international-surveys/"><span data-dcnode-id="429" instrument_node="">International Surveys</span></a></div></div><span data-dcnode-id="425" instrument_node=""> </span><header class="page-header" data-dcnode-id="420"><span data-dcnode-id="424" instrument_node="">
</span><h1 class="ui page header" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">International Surveys</span></h1><span data-dcnode-id="421" instrument_node="">
</span></header><span data-dcnode-id="419" instrument_node="">
</span><div class="ui stackable divided grid" data-dcnode-id="314"><span data-dcnode-id="418" instrument_node="">
</span><div class="sixteen wide column content-area" data-dcnode-id="317" id="primary"><span data-dcnode-id="417" instrument_node="">
</span><main class="site-main" data-dcnode-id="320" id="main"><span data-dcnode-id="416" instrument_node="">
</span><article class="post-394067 page type-page status-publish hentry" data-dcnode-id="323" id="page-394067 ?>"><span data-dcnode-id="415" instrument_node="">
</span><div class="page-content" data-dcnode-id="326"><span data-dcnode-id="414" instrument_node="">
</span><div class="ui divided stackable grid wp-block-prc-block-grid" data-dcnode-id="330"><span data-dcnode-id="413" instrument_node="">
</span><div class="eleven wide column" data-dcnode-id="365"><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Pew Research Center regularly conducts public opinion surveys in countries outside the United States as part of its ongoing exploration of attitudes, values and behaviors around the globe. To date, the Center has conducted more than 800,000 interviews in over 110 countries, mainly in conjunction with the longstanding Global Attitudes and Religion &amp; Public Life projects but including others such as a 20-country international science study and another on digital connectivity in 11 emerging economies.</span></p><span data-dcnode-id="409" instrument_node="">
</span><div class="wp-container-3 wp-block-group alignright is-style-callout is-style-300-wide has-background" data-dcnode-id="394" style="background-color:#f7f7f1"><span data-dcnode-id="408" instrument_node="">
</span><h3 data-dcnode-id="406" id="h-country-specific-methodology"><span data-dcnode-id="407" instrument_node="">Country Specific Methodology</span></h3><span data-dcnode-id="405" instrument_node="">
</span><figure class="wp-block-image aligncenter size-260-wide" data-dcnode-id="402"><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pewresearch-org-bleeding-edge.go-vip.net/our-methods/international-surveys/detailed-international-survey-methods/"><img alt="" data-dcnode-id="404"></a></figure><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">View </span><a data-dcnode-id="398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/methodology/international-survey-research/international-methodology/all-survey/all-country/all-year"><span data-dcnode-id="399" instrument_node="">detailed information</span></a><span data-dcnode-id="397" instrument_node=""> such as mode of interview, sampling design, margin of error, and design effect, for each country we survey.</span></p><span data-dcnode-id="395" instrument_node="">
</span></div><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Cross-national studies constitute the bulk of Pew Research Center’s international survey research. Such studies pose special challenges when it comes to ensuring the comparability of data across multiple languages, cultures and contexts. To learn more about the challenges and best practices of polling in foreign countries and in multiple languages, see here.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Pew Research Center staff are responsible for the overall design and execution of each cross-national survey project, including topical focus, questionnaire development, countries to be surveyed and sample design. The Center’s staff frequently contract with a coordinating vendor to identify local, reputable research organizations, which are hired to collaborate on all aspects of sample and questionnaire design, survey administration and data processing. Both coordinating vendors and local research organizations are consulted on matters of sampling, fieldwork logistics, data quality and weighting. In addition, Pew Research Center often seeks the advice of subject matter experts and experienced survey researchers regarding the design and content of its cross-national studies.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Field periods for cross-national studies vary by country, study complexity and mode of administration, typically ranging from four to eight weeks. To the degree possible, Pew Research Center attempts to synchronize fieldwork across countries in order to minimize the chance that major events or developments might interfere with the comparability of results.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Pew Research Center’s cross-national studies are designed to be nationally representative using probability-based methods and target the non-institutional adult population (18 and older) in each country. The Center strives for samples that cover as much of the adult population as possible, given logistical, security and other constraints. Coverage limitations are noted in the detailed methods for each country.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Sample sizes for Pew Research Center’s cross-national studies are usually designed to yield at least 1,000 interviews, though larger samples may be required for more robust within-country comparisons. Reported margins of error account for design effects due to clustering, stratification and weighting.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">In the case of both telephone and face-to-face surveys, weighting procedures correct for unequal selection probabilities as well as adjust to key sociodemographic distributions – such as gender, age and education – to align as closely as possible with reliable, official population statistics. To learn about the weighting approach used for U.S. surveys using the nationally representative online American Trends Panel, </span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/methods/2019/02/27/growing-and-improving-pew-research-centers-american-trends-panel/"><span data-dcnode-id="376" instrument_node="">visit here</span></a><span data-dcnode-id="374" instrument_node="">.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="367"><span data-dcnode-id="371" instrument_node="">Pew Research Center is a charter member of the American Association of Public Opinion Research (AAPOR) </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aapor.org/Transparency_Initiative.htm"><span data-dcnode-id="370" instrument_node="">Transparency Initiative</span></a><span data-dcnode-id="368" instrument_node="">.</span></p><span data-dcnode-id="366" instrument_node="">
</span></div><span data-dcnode-id="364" instrument_node="">
</span><div class="five wide column" data-dcnode-id="332"><span data-dcnode-id="363" instrument_node="">
</span><div class="wp-container-4 wp-block-group is-style-card-alt" data-dcnode-id="334"><span data-dcnode-id="362" instrument_node="">
