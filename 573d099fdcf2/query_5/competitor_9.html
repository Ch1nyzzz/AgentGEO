</span><h1 class="ui post header" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Net Threats</span></h1><h2 class="has-text-align-left wp-block-prc-block-subtitle" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">Experts say liberty online is challenged by nation-state crackdowns, surveillance, and pressures of commercialization of the Internet</span></h2><div class="bylines" data-dcnode-id="1034"><span data-dcnode-id="1042" instrument_node="">By </span><a data-dcnode-id="1039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/janna-anderson"><span class="author" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Janna Anderson</span></span></a><span data-dcnode-id="1038" instrument_node=""> and </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/staff/lee-rainie"><span class="author" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Lee Rainie</span></span></a></div><span data-dcnode-id="1033" instrument_node=""> </span></header><span data-dcnode-id="1031" instrument_node="">
</span><div data-dcnode-id="1030" id="prc-mobile-toc"></div><span data-dcnode-id="1029" instrument_node="">
</span><div class="post-content" data-dcnode-id="774"><span data-dcnode-id="1028" instrument_node="">
</span><h2 data-dcnode-id="1026" id="summary"><span data-dcnode-id="1027" instrument_node="">Summary</span></h2><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">As Internet experts look to the future of the Web, they have a number of concerns. This is not to say they are pessimistic: The majority of respondents to this 2014 Future of the Internet canvassing say they hope that by 2025 there will not be significant changes for the worse and hindrances to the ways in which people get and share content online today. And they said they expect that technology innovation will continue to afford more new opportunities for people to connect.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Still, some express wide levels of concern that this yearning for an open Internet will be challenged by trends that could sharply disrupt the way the Internet works for many users today as a source of largely unfettered content flows.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><div class="alignright ui inverted beige segment shortcode-callout" data-dcnode-id="999"><span data-dcnode-id="1018" instrument_node="">
</span><h4 data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The Net Threats These Experts Fear</span></h4><span data-dcnode-id="1015" instrument_node="">
</span><ol data-dcnode-id="1001"><span data-dcnode-id="1014" instrument_node="">
</span><li data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Actions by nation-states to maintain security and political control will lead to more blocking, filtering, segmentation, and balkanization of the Internet.</span></li><span data-dcnode-id="1011" instrument_node="">
</span><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Trust will evaporate in the wake of revelations about government and corporate surveillance and likely greater surveillance in the future.</span></li><span data-dcnode-id="1008" instrument_node="">
</span><li data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Commercial pressures affecting everything from Internet architecture to the flow of information will endanger the open structure of online life.</span></li><span data-dcnode-id="1005" instrument_node="">
</span><li data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Efforts to fix the TMI (too much information) problem might over-compensate and actually thwart content sharing.</span></li><span data-dcnode-id="1002" instrument_node="">
</span></ol><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">We call this research study a canvassing because it is not a representative, randomized survey. Its findings emerge from an “opt in” invitation to thousands of experts who have been identified by researching those who are widely quoted as technology builders and analysts and those who have made insightful predictions to our previous queries about the future of the Internet. (For more details on this process, please see the section at the end of this report titled “</span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2014/07/03/about-this-canvassing-of-experts-2/"><span data-dcnode-id="996" instrument_node="">About this Canvassing of Experts</span></a><span data-dcnode-id="994" instrument_node="">.” Respondents were allowed to choose to share their thoughts for credit or anonymously.</span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">More than 1,400 people responded to the following yes-or-no question:</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="985" style="padding-left: 30px;"><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Accessing and sharing content online</span></strong><span data-dcnode-id="986" instrument_node="">—By 2025 will there be significant changes for the worse and hindrances to the ways in which people get and share content online compared with the way globally networked people can operate online today?</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">Thirty-five percent answered “yes” while 65% more optimistically answered “no.” Yet some who answered “no” wrote in their elaboration on the question that their answer was their “hope” and not necessarily their prediction. Others wrote that they wished they could choose “yes </span><em data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">and</span></em><span data-dcnode-id="980" instrument_node=""> no.”</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Those who expressed hope or the expectation that access and sharing will weather challenges between now and 2025 often noted that it may be possible that billions more people may gain access and begin sharing online over the next 11 years thanks to the mobile Internet revolution and the massive efforts underway now to connect more people across the globe. In short, they hope that the benefits of digital expansion will outweigh the risks.</span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">Whether they offered an optimistic or pessimistic view of the Web’s future, all of the experts were asked to offer their own perspective on the threats or risks facing the Web, and their open-ended responses raise a number of key concerns. When participants in this canvassing were asked about access and sharing in 2025 they were also provided with the following additional prompts, to which some replied and some did not:</span></p><span data-dcnode-id="972" instrument_node="">
</span><p data-dcnode-id="968" style="padding-left: 30px;"><strong data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Please elaborate on your answer</span></strong><span data-dcnode-id="969" instrument_node="">—Describe what you believe are the most serious threats to the most effective accessing and sharing of content on the Internet. What steps are necessary to block changes that would limit people’s optimal future capabilities in using the Internet? Bonus question: Describe opportunities that you expect that will help people realize the fullest potential of the Internet, or describe challenges you expect may stop people from realizing the fullest potential of the Internet.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Several themes ran through the elaborations people shared after these prompts, most of them centered on threats to the current structure and operation of the Internet:</span></p><span data-dcnode-id="964" instrument_node="">
</span><h4 data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Threat theme 1) Actions by nation-states to maintain security and political control will lead to more blocking, filtering, segmentation, and balkanization of the Internet.</span></h4><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">The experts in this survey noted a broad global trend toward regulation of the Internet by regimes that have faced protests and stepped up surveillance of Internet users. They pointed out that nations such as Egypt, Pakistan, and Turkey have blocked Internet access to control information flows when they perceived content as a threat to the current regime. China is known for its “Great Firewall,” seen as Internet censorship by most outsiders, including those in this canvassing.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Some respondents cited the Arab Spring as an example of the power of the Internet to organize political dissent and they then commented on how this prompted crackdowns by governments. Others cited governments’ application of broad rules that limit the exchange of all information in order to try to halt criminal activity.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">A notable number of these expert respondents also mentioned Edward Snowden’s revelations about the U.S. National Security Agency’s (NSA) surveillance of email and phone call records. They also cited such examples as the theft of customer account details from Target and corporate surveillance of consumers as giving ammunition to those who want to crack down on the content that flows online.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Paul Saffo</span></strong><span data-dcnode-id="949" instrument_node="">, managing director at Discern Analytics and consulting associate professor at Stanford University, said, “The pressures to balkanize the global Internet will continue and create new uncertainties. Governments will become more skilled at blocking access to unwelcome sites.”</span></p><span data-dcnode-id="947" instrument_node="">
</span><p data-dcnode-id="943"><strong data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Christopher Wilkinson</span></strong><span data-dcnode-id="944" instrument_node="">, a retired European Union official, board member for EURid.eu, and Internet Society leader predicted, “Surveillance … at the minimum chills communications and at the maximum facilitates industrial espionage, it does not have very much to do with security.”</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Some participants also predicted that regional differences in politics and culture will continue to spawn efforts to hinder access and sharing online. A professor at Georgetown University and former U.S. Federal Trade Commission official wrote, “Given the global nature of data flows, national parochial interests may prove to be a bottleneck. Already access and sharing are hindered by parochial national laws. The European Union’s privacy initiative can be a serious bottleneck, and the Safe Harbor regime is in jeopardy. Nationalism, and sovereign interests—for good reasons (privacy protection) or bad (economic protectionism)—are clear and present threats.”</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="935"><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Dave Burstein</span></strong><span data-dcnode-id="936" instrument_node="">, editor of Fast Net News, responded, “Governments worldwide are looking for more power over the Net, especially within their own countries. Britain, for example, has just determined that ISPs block sites the government considers ‘terrorist’ or otherwise dangerous. This will grow. There will usually be ways to circumvent the obstruction but most people won’t bother.”</span></p><span data-dcnode-id="934" instrument_node="">
</span><h5 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">The optimistic counter-arguments: Regulations promoting openness and/or innovation will trump control</span></h5><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="927"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Paul Jones,</span></strong><span data-dcnode-id="928" instrument_node=""> a professor at the University of North Carolina and founder of ibiblio.org, responded, “Historic trends are that as a communications medium matures, the control trumps the innovation. This time it will be different. Not without a struggle. Over the next 10 years we will be even more increasingly global and involved. Tech will assist this move in a way that is irreversible. It won’t be a bloodless revolution, sadly, but it will be a revolution nonetheless.”</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="922"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Kevin Carson</span></strong><span data-dcnode-id="923" instrument_node="">, a senior fellow at the Center for a Stateless Society and contributor to the P2P Foundation blog wrote, “There’s a lot of work underway now in developing open-source, interoperable, and encrypted versions of social media, in response to the increasing authoritarianism and state collaboration of existing walled-garden media.”</span></p><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="917"><strong data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Jim Hendler</span></strong><span data-dcnode-id="918" instrument_node="">, a professor of Computer Science at Rensselaer Polytechnic Institute and architect of the Web, wrote, “If anything, it is privacy that will have to give way to openness, not the other way around… Repressive governments will be working hard to stop the spread of information. As today, there will be both good and bad news continually in that area, but over time more integration, access, and sharing will be a driving force.”</span></p><span data-dcnode-id="916" instrument_node="">
</span><h4 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">Threat theme 2) Trust will evaporate in the wake of revelations about government and corporate surveillance and likely greater surveillance in the future.</span></h4><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">A share of these experts express new urgency about surveillance. They predict that if unchecked, the monitoring of vast amounts of online activity will limit sharing and access to knowledge online.</span></p><span data-dcnode-id="910" instrument_node="">
</span><blockquote class="full" data-dcnode-id="905"><p data-dcnode-id="906"><span data-dcnode-id="909" instrument_node="">Because of governance issues (and the international implications of the NSA reveals), data sharing will get geographically fragmented in challenging ways. The next few years are going to be about control.</span><cite data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">danah boyd, a research scientist for Microsoft</span></cite></p></blockquote><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="900"><strong data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Peter S. Vogel</span></strong><span data-dcnode-id="901" instrument_node="">, Internet law expert at Gardere Wynne Sewell, responded, “Privacy issues are the most serious threat to accessing and sharing Internet content in 2014, and there is little reason to expect that to change by 2025, particularly given the cyber terror threats confronting the Internet users and worldwide businesses.”</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="895"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">Raymond Plzak</span></strong><span data-dcnode-id="896" instrument_node="">, former CEO of the American Registry for Internet Numbers, and current member of the Board of Directors of ICANN, wrote, “The inconsistent protection of privacy, whether private information is voluntarily provided or not as well as the inconsistent protection against exploitation will continue to be the bane of connected environment. The inability of local, regional/national and international private and public sector entities and their attendant societies to cooperate to produce a universal accepted privacy and anti-exploitation environment will increase the likelihood of the limiting of connected activities.”</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="890"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Kate Crawford</span></strong><span data-dcnode-id="891" instrument_node="">, a professor and research scientist, responded, “The increased Balkanisation of the Internet is a possible outcome of the Snowden revelations, as people seek to develop systems that are less accessible by the NSA/GCHQ, etc. Meanwhile, the dominant content companies may seek ever more rigorous ways to prevent the flow of copyright content within and across borders.”</span></p><span data-dcnode-id="889" instrument_node="">
</span><h5 data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">The optimistic counter-argument: Innovations may provide some relief from surveillance</span></h5><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="882"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Oscar Gandy</span></strong><span data-dcnode-id="883" instrument_node="">, an emeritus professor at the Annenberg School, University of Pennsylvania, wrote, “Regulatory limits on the uses of transaction-generated-information (TGI) that might even include fines and temporary exclusion from the marketplace might serve to reduce the amount of cognizable harm to individuals, groups, and institutions that rely on the Web for information and interaction. The challenge, of course, lies in our ability to identify those harms with sufficient clarity so that regulation would be effective without needlessly limiting the functionality of the network.”</span></p><span data-dcnode-id="881" instrument_node="">
</span><h4 data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Threat theme 3) Commercial pressures affecting everything from Internet architecture to the flow of information will endanger the open structure of online life.</span></h4><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">A significant number of respondents predicted that increased monetization of Internet activities will hurt the ways in which people receive information in the future. Among their concerns: the fate of network neutrality; restrictions on information exchange affected by copyright protections and patent law; and governments’ and corporations’ general lack of foresight and capability for best enabling the digital future due to a focus on near-term gains.</span></p><span data-dcnode-id="875" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="874" instrument_node="">Concerns over commercial influences altering the overall online experience were led by some of the architects of the Internet. </span><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">David Clark</span></strong><span data-dcnode-id="871" instrument_node="">, a senior research scientist at MIT’s Computer Science and Artificial Intelligence Laboratory, noted, “Commercialization of the experience may come to bound or limit the expectation that many people have of what the Internet is for.” And </span><strong data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Glenn Edens</span></strong><span data-dcnode-id="868" instrument_node="">, director of research in networking, security, and distributed systems at PARC, said, “Network operators’ desire to monetize their assets to the detriment of progress represents the biggest potential problem. Enabling content creators to easily and directly reach audiences, better search tools, better promotion mechanisms and curation tools—continuing to dismantle the ‘middle men’ is key.”</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">While there is no one definition of Net neutrality, it is generally expressed as the idea that the best public network should be operated in such a way as to treat all senders and receivers of content as equally as is technologically possible while maintaining information flows well. Corporate goals to serve customers and shareholders can be in conflict with this.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">The chief counsel for a major foundation wrote, “Collusive and anti-competitive practices by telecommunications operators threaten the re-creation of an Internet controlled by people.” A post-doctoral researcher wrote, “We are seeing an increase in walled gardens created by giants like Facebook and Apple … Commercialization of the Internet, paradoxically, is the biggest challenge to the growth of the Internet. Communication networks’ lobbying against Net neutrality is the biggest example of this.”</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">PJ Rey</span></strong><span data-dcnode-id="857" instrument_node="">, a PhD candidate in sociology at the University of Maryland, wrote, “It is very possible we will see the principle of Net neutrality undermined. In a political paradigm where money equals political speech so much hinges on how much ISPs and content providers are willing and able to spend on defending their competing interests. Unfortunately, the interests of everyday users count for very little.”</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="851"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Dennis McCann</span></strong><span data-dcnode-id="852" instrument_node="">, a director of computer training in Illinois, formerly a senior technical consultant at Cisco and IBM wrote, “The policy discussions today that are about service provision are mostly with last generation’s telecommunications companies. This for a network-neutral service! If we aren’t ready to make the courts take ownership of the Net and its implications, then a free Internet is history, since the service providers have no interest in the free flow of information.”</span></p><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Others worried about the outcome of discussions among companies and governments on global trade and intellectual property and copyright in the Internet era. They complained that much of that deliberation cannot be monitored or influenced by the broad public.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="843"><strong data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Leah Lievrouw,</span></strong><span data-dcnode-id="844" instrument_node=""> a professor of information studies at the University of California-Los Angeles, wrote, “There are too many institutional players interested in restricting, controlling, and directing ‘ordinary’ people’s ability to make, access, and share knowledge and creative works online—intellectual property rights holders, law enforcement and security agencies, religious and cultural censors, political movements and parties, etc. For a long time I’ve felt that the utopianism, libertarianism, and sheer technological skill of both professional and amateur programmers and engineers would remain the strongest counterbalance to these restrictive institutional pressures, but I’m increasingly unsure as the technologists themselves and their skills are being increasingly restricted, marginalized, and even criminalized.”</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="838"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Jeremy Epstein</span></strong><span data-dcnode-id="839" instrument_node="">, a senior computer scientist at SRI International, responded, “The extension of copyright terms back into the near-infinite past will reduce what can be shared. Increasing power of patent trolls will slow progress and put more energy into working around solutions, instead of moving forward.”</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">A self-employed consultant focusing on Internet policy and technology and longtime IETF leader responded, “We are headed into a really nasty period for accessibility of digital materials more than a few years old. People’s current prevailing optimism on those subjects is likely to turn out to be part of the problem.”</span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Some respondents expressed a sense of hopelessness in the face of economic and political forces.</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">A former chair of an IETF working group wrote, “Corporate influence on the political process will largely eliminate the public’s freedom to do as they please on the Internet at least in the US. I would like to see the Internet come to be regarded as a public utility, as broadcast spectrum was, but I think the concentration of power is too extreme for that degree of freedom to happen.”</span></p><span data-dcnode-id="828" instrument_node="">
</span><p data-dcnode-id="824"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Bill Woodcock</span></strong><span data-dcnode-id="825" instrument_node="">, executive director for the Packet Clearing House, wrote, “The biggest and most important challenges we face are the impediments to people ‘doing for themselves.’ I don’t care about the ‘right’ to simply be someone’s customer. I want the right to compete, the right to replace any service, no matter how large or important or well-connected the company that provides it is, with a better, more innovative, startup service. That means fewer monopolies, fewer lobbyists, fewer licenses, and fewer bribes. As the economy continues to slide downward, all of these abuses are getting worse rather than better.”</span></p><span data-dcnode-id="823" instrument_node="">
</span><h5 data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">The optimistic counter-arguments: Economic and social motivations can actually mitigate these threats</span></h5><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="813"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Marcel Bullinga</span></strong><span data-dcnode-id="817" instrument_node="">, technology futures speaker, trend watcher, and futurist, said, “Sharing is hindered by ridiculous 19th century laws about copyright and patent. Both will die away. That will spur innovation into the extreme. That is the </span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">real</span></em><span data-dcnode-id="814" instrument_node=""> singularity.”</span></p><span data-dcnode-id="812" instrument_node="">
</span><p data-dcnode-id="808"><strong data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Matthew Henry</span></strong><span data-dcnode-id="809" instrument_node="">, a CIO in higher education, wrote, “Continued redefinition of the standards and cooperation of firms that enable sharing is critical.”</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">The principal engineer for an Internet of Things development company responded, “Access to the global Internet (with its associated content) will just keep getting better as that is how governments/industry will make money. And this will trump all other concerns.”</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="800"><strong data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Josh Calder</span></strong><span data-dcnode-id="801" instrument_node="">, a futurist with the Foresight Alliance, expressed confidence that threats to Net neutrality will be routed around. He responded, “Splintering based on corporate control of content and pipelines appears to be the greatest danger, at least in the developed world. It seems likely that steps will be taken to avoid barriers like an end to Net neutrality and the further erection of ‘walled gardens,’ and to keep the dangers of cybercrime sufficiently in check so that accessing content will not be significantly hindered.”</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="795"><strong data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Clark Sept</span></strong><span data-dcnode-id="796" instrument_node="">, co-founder and principal of Business Place Strategies Inc., wrote, “Online content access and sharing will be even better and easier by way of personal digital rights access. Sharing freely will be recognized as having greater long-term economic value than strictly limited controls over ‘intellectual property.’”</span></p><span data-dcnode-id="794" instrument_node="">
</span><h4 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Threat theme 4) Efforts to fix the TMI (too much information) problem might over-compensate and actually thwart content sharing.</span></h4><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Another concern is that people’s attempts to cope with information overload will lead to constraints on content flows. They argue that algorithm-based filtering systems inspired by attempts to cope with large amounts of information can have as many negative consequences for the Internet as positives, especially when most companies providing filtering services have economic incentives to present information in a particular way.</span></p><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="784"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Joel Halpern</span></strong><span data-dcnode-id="785" instrument_node="">, a distinguished engineer at Ericsson, wrote, “While there are pressures to constrain information sharing (from governments and from traditional content sources), the trend towards making information more widely and easily reached, consumed, modified, and redistributed is likely to continue in 2025 … The biggest challenge is likely to be the problem of finding interesting and meaningful content when you want it. While this is particularly important when you are looking for scientific or medical information, it is equally applicable when looking for restaurants, music, or other things that are matters of taste. While big-data analysis has the promise of helping this, there are many limitations and risks (including mismatched incentives) with those tools.”</span></p><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="779"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Jonathan Grudin</span></strong><span data-dcnode-id="780" instrument_node="">, principal researcher at Microsoft Research, predicted, “To help people realize their fullest potential, an industry of ‘personal information trainers’—by analogy to personal trainers for fitness—will form to help people find and access information that is interesting and useful for them. Reference librarians played this role when we went to the information repository called a library. As the volume of information continues to grow exponentially, personal information trainers will help us with the much more daunting task of creating a virtual dashboard to access the information of value to us, much of which we did not know was out there.”</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">There was no explicit counter-argument to this theme, but some respondents’ answers implied that they felt algorithms and analytics and people’s own search strategies would improve and produce a relatively happy equilibrium where people got what they wanted and also were exposed to new ideas and material that they would appreciate.</span></p><span data-dcnode-id="775" instrument_node="">
</span></div><span data-dcnode-id="772" instrument_node="">
</span></article><span data-dcnode-id="769" instrument_node="">

</span><a class="active item" data-dcnode-id="748"><span class="screen-reader" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">You are reading page</span></span><span data-dcnode-id="749" instrument_node="">1</span></a><a class="item" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2014/07/03/the-gurus-speak-3/"><span class="screen-reader" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Page</span></span><span data-dcnode-id="745" instrument_node="">2</span></a><a class="item" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2014/07/03/about-this-canvassing-of-experts-2/"><span class="screen-reader" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Page</span></span><span data-dcnode-id="741" instrument_node="">3</span></a><a class="item" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/internet/2014/07/03/elaborations-more-expert-responses/"><span class="screen-reader" data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Page</span></span><span data-dcnode-id="737" instrument_node="">4</span></a><span data-dcnode-id="735" instrument_node=""> </span></div><span data-dcnode-id="733" instrument_node="">
