</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="3818" id="firstHeading"><span data-dcnode-id="3819" instrument_node="">Multilateral Agreement on Investment</span></h1><span data-dcnode-id="3817" instrument_node="">
</span><div class="vector-body" data-dcnode-id="446" id="bodyContent"><span data-dcnode-id="3816" instrument_node="">

</span><a class="mw-jump-link" data-dcnode-id="3802" href="#searchInput"><span data-dcnode-id="3803" instrument_node="">Jump to search</span></a><span data-dcnode-id="3801" instrument_node="">
</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="503" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="512"><p data-dcnode-id="3780"><span data-dcnode-id="3800" instrument_node="">The </span><b data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Multilateral Agreement on Investment</span></b><span data-dcnode-id="3797" instrument_node=""> (</span><b data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">MAI</span></b><span data-dcnode-id="3794" instrument_node="">) was a draft agreement negotiated in secret between members of the </span><a class="mw-redirect" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Organisation_for_Economic_Co-operation_and_Development" title="Organisation for Economic Co-operation and Development"><span data-dcnode-id="3793" instrument_node="">Organisation for Economic Co-operation and Development</span></a><span data-dcnode-id="3791" instrument_node=""> (OECD) between 1995 and 1998.</span><sup class="reference" data-dcnode-id="3788" id="cite_ref-1"><a data-dcnode-id="3789" href="#cite_note-1"><span data-dcnode-id="3790" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3787" instrument_node=""> It sought to establish a new body of universal investment laws that would grant corporations unconditional rights to engage in financial operations around the world, without any regard to national laws and citizens' rights. The draft gave corporations a right to sue governments if national health, labor or environment legislation threatened their interests. When its draft became public in 1997, it drew widespread criticism from </span><a data-dcnode-id="3785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Civil_society" title="Civil society"><span data-dcnode-id="3786" instrument_node="">civil society</span></a><span data-dcnode-id="3784" instrument_node=""> groups and developing countries, particularly over the possibility that the agreement would make it difficult to regulate foreign investors. After an intense global campaign was waged against the MAI by the treaty's critics, the host nation </span><a data-dcnode-id="3782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="3783" instrument_node="">France</span></a><span data-dcnode-id="3781" instrument_node=""> announced in October 1998 that it would not support the agreement, effectively preventing its adoption due to the OECD's consensus procedures.
</span></p><span data-dcnode-id="3779" instrument_node="">

</span><h2 data-dcnode-id="3621"><span class="mw-headline" data-dcnode-id="3629" id="Background"><span data-dcnode-id="3630" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="3622"><span class="mw-editsection-bracket" data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">[</span></span><a data-dcnode-id="3625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="3626" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3620" instrument_node="">
</span><p data-dcnode-id="3577"><span data-dcnode-id="3619" instrument_node="">International direct </span><a data-dcnode-id="3617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_direct_investment" title="Foreign direct investment"><span data-dcnode-id="3618" instrument_node="">investment</span></a><span data-dcnode-id="3616" instrument_node=""> has been taking place in various forms and to different degrees for over a century.</span><sup class="reference" data-dcnode-id="3613" id="cite_ref-lipson_2-0"><a data-dcnode-id="3614" href="#cite_note-lipson-2"><span data-dcnode-id="3615" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3612" instrument_node=""> Attempts to establish a framework for the protection of foreign investments dates back to the 1920s, most notably negotiating a </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="3611" instrument_node="">League of Nations</span></a><span data-dcnode-id="3609" instrument_node=""> draft convention.</span><sup class="reference" data-dcnode-id="3606" id="cite_ref-picciotto_3-0"><a data-dcnode-id="3607" href="#cite_note-picciotto-3"><span data-dcnode-id="3608" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3605" instrument_node="">  Starting from the second half of the twentieth century, the investment protection was developed through the </span><a class="mw-redirect" data-dcnode-id="3603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bilateral_Investment_Treaty" title="Bilateral Investment Treaty"><span data-dcnode-id="3604" instrument_node="">bilateral investment treaties</span></a><span data-dcnode-id="3602" instrument_node=""> (BIT), which are signed between two countries and which state the desired conditions under which investment can take place between them.  The first BIT, between </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="3601" instrument_node="">West Germany</span></a><span data-dcnode-id="3599" instrument_node=""> and </span><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pakistan" title="Pakistan"><span data-dcnode-id="3598" instrument_node="">Pakistan</span></a><span data-dcnode-id="3596" instrument_node="">, was signed in 1959</span><sup class="reference" data-dcnode-id="3593" id="cite_ref-bit_4-0"><a data-dcnode-id="3594" href="#cite_note-bit-4"><span data-dcnode-id="3595" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3592" instrument_node=""> and their numbers have grown steadily since then, although research suggests that BITs do little to increase foreign investment.</span><sup class="reference" data-dcnode-id="3589" id="cite_ref-wb3121_5-0"><a data-dcnode-id="3590" href="#cite_note-wb3121-5"><span data-dcnode-id="3591" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3588" instrument_node="">  In 1965, the </span><a data-dcnode-id="3586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Centre_for_Settlement_of_Investment_Disputes" title="International Centre for Settlement of Investment Disputes"><span data-dcnode-id="3587" instrument_node="">International Centre for Settlement of Investment Disputes</span></a><span data-dcnode-id="3585" instrument_node=""> (ICSID) was established in the framework of the </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="3584" instrument_node="">United Nations</span></a><span data-dcnode-id="3582" instrument_node="">, and in 1967, the OECD prepared the Draft Convention on the Protection of Foreign Property although this was not adopted.</span><sup class="reference" data-dcnode-id="3579" id="cite_ref-picciotto_3-1"><a data-dcnode-id="3580" href="#cite_note-picciotto-3"><span data-dcnode-id="3581" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3578" instrument_node="">
</span></p><p data-dcnode-id="3540"><span data-dcnode-id="3576" instrument_node="">The number of bilateral investment agreements increased rapidly during the 1990s as countries and </span><a class="mw-redirect" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investors" title="Investors"><span data-dcnode-id="3575" instrument_node="">investors</span></a><span data-dcnode-id="3573" instrument_node=""> sought more </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulation" title="Regulation"><span data-dcnode-id="3572" instrument_node="">regulation</span></a><span data-dcnode-id="3570" instrument_node=""> for security, certainty and mobility for their investments after it became clear that the </span><a data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruguay_Round" title="Uruguay Round"><span data-dcnode-id="3569" instrument_node="">Uruguay Round</span></a><span data-dcnode-id="3567" instrument_node="">'s Agreement on </span><a class="mw-redirect" data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_Related_Investment_Measures" title="Trade Related Investment Measures"><span data-dcnode-id="3566" instrument_node="">Trade Related Investment Measures</span></a><span data-dcnode-id="3564" instrument_node=""> (TRIMS), </span><a class="mw-redirect" data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agreement_on_Trade-Related_Aspects_of_Intellectual_Property_Rights" title="Agreement on Trade-Related Aspects of Intellectual Property Rights"><span data-dcnode-id="3563" instrument_node="">Agreement on Trade-Related Aspects of Intellectual Property Rights</span></a><span data-dcnode-id="3561" instrument_node=""> (TRIPS) and </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Agreement_on_Trade_in_Services" title="General Agreement on Trade in Services"><span data-dcnode-id="3560" instrument_node="">General Agreement on Trade in Services</span></a><span data-dcnode-id="3558" instrument_node=""> (GATS) addressed only part of investment-related concerns and did not provide enough security for investors nor strong controls on host governments to regulate </span><a class="mw-redirect" data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multinational_corporations" title="Multinational corporations"><span data-dcnode-id="3557" instrument_node="">multinational corporations</span></a><span data-dcnode-id="3555" instrument_node="">.</span><sup class="reference" data-dcnode-id="3552" id="cite_ref-witherell_6-0"><a data-dcnode-id="3553" href="#cite_note-witherell-6"><span data-dcnode-id="3554" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3551" instrument_node=""> In addition to these instruments, in 1992 the </span><a data-dcnode-id="3549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="3550" instrument_node="">World Bank</span></a><span data-dcnode-id="3548" instrument_node=""> adopted Guidelines on the Treatment of Foreign Direct Investment.</span><sup class="reference" data-dcnode-id="3545" id="cite_ref-sornarajah_7-0"><a data-dcnode-id="3546" href="#cite_note-sornarajah-7"><span data-dcnode-id="3547" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3544" instrument_node=""> In 1994 the </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Energy_Charter_Treaty" title="Energy Charter Treaty"><span data-dcnode-id="3543" instrument_node="">Energy Charter Treaty</span></a><span data-dcnode-id="3541" instrument_node=""> provided an example of a multilateral investment agreement, though limited to the energy sector.
</span></p><p data-dcnode-id="3526"><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noam_Chomsky" title="Noam Chomsky"><span data-dcnode-id="3539" instrument_node="">Noam Chomsky</span></a><span data-dcnode-id="3537" instrument_node=""> argued that the OECD, as an organization made up solely of rich countries, was more susceptible to direct influence by transnational corporate forces than alternative fora with more universal membership such as </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Conference_on_Trade_and_Development" title="United Nations Conference on Trade and Development"><span data-dcnode-id="3536" instrument_node="">United Nations Conference on Trade and Development</span></a><span data-dcnode-id="3534" instrument_node=""> (UNCTAD) and the </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="3533" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="3531" instrument_node=""> (WTO).</span><sup class="reference" data-dcnode-id="3528" id="cite_ref-8"><a data-dcnode-id="3529" href="#cite_note-8"><span data-dcnode-id="3530" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3527" instrument_node="">
</span></p><span data-dcnode-id="3525" instrument_node="">
</span><h2 data-dcnode-id="3515"><span class="mw-headline" data-dcnode-id="3523" id="Purposes_and_provisions"><span data-dcnode-id="3524" instrument_node="">Purposes and provisions</span></span><span class="mw-editsection" data-dcnode-id="3516"><span class="mw-editsection-bracket" data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">[</span></span><a data-dcnode-id="3519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D2" title="Edit section: Purposes and provisions"><span data-dcnode-id="3520" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3517"><span data-dcnode-id="3518" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3513" instrument_node="">While authorizing the negotiations, the OECD Ministerial Council aimed to reach a "broad multilateral framework for international investment with high standards for the liberalization of investment regimes and investment protection and with effective dispute-settlement procedures".</span><sup class="reference" data-dcnode-id="3510" id="cite_ref-witherell_6-1"><a data-dcnode-id="3511" href="#cite_note-witherell-6"><span data-dcnode-id="3512" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3509" instrument_node="">  The aim was to create more consistent, secure and stable investment conditions and to regulate investment in a more uniform, transparent and enforceable manner. Although the agreement was to be negotiated between the member states, the intention was to have an open agreement to which non-OECD members could accede on a negotiated basis.</span><sup class="reference" data-dcnode-id="3506" id="cite_ref-picciotto_3-2"><a data-dcnode-id="3507" href="#cite_note-picciotto-3"><span data-dcnode-id="3508" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3505" instrument_node="">
</span></p><p data-dcnode-id="3489"><span data-dcnode-id="3503" instrument_node="">According to MAI supporter </span><a data-dcnode-id="3501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sergio_Marchi_%28politician%29" title="Sergio Marchi (politician)"><span data-dcnode-id="3502" instrument_node="">Sergio Marchi</span></a><span data-dcnode-id="3500" instrument_node="">, who was Canada's  </span><a class="mw-redirect" data-dcnode-id="3498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minister_of_International_Trade_%28Canada%29" title="Minister of International Trade (Canada)"><span data-dcnode-id="3499" instrument_node="">Minister of International Trade</span></a><span data-dcnode-id="3497" instrument_node=""> at the time, one of the main purposes of the agreement was to eliminate the "patchwork" of investment rules enshrined in the then-1300+ bilateral investment treaties. Contrary to many critics, he argued that the MAI would help prevent a "</span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Race_to_the_bottom" title="Race to the bottom"><span data-dcnode-id="3496" instrument_node="">race to the bottom</span></a><span data-dcnode-id="3494" instrument_node="">" that would undermine high standards of Canadian regulation.</span><sup class="reference" data-dcnode-id="3491" id="cite_ref-marchi_9-0"><a data-dcnode-id="3492" href="#cite_note-marchi-9"><span data-dcnode-id="3493" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3490" instrument_node="">  More specifically, the agreement would:
</span></p><span data-dcnode-id="3488" instrument_node="">
</span><ul data-dcnode-id="3455"><li data-dcnode-id="3472"><span data-dcnode-id="3487" instrument_node="">Minimise the diverse state regulations in governing the conditions under which investments by foreign corporations could take place. (In this connection, the agreement embodied acceptance of a compliance regime under which liberalization must proceed forward with no ability to be wound back — the so-called </span><i data-dcnode-id="3484"><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ratchet_effect%23Trade_legislation" title="Ratchet effect"><span data-dcnode-id="3486" instrument_node="">ratchet effect</span></a></i><span data-dcnode-id="3483" instrument_node="">. This would be enforced by so-called </span><i data-dcnode-id="3480"><a data-dcnode-id="3481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rollback_%28legislation%29" title="Rollback (legislation)"><span data-dcnode-id="3482" instrument_node="">rollback</span></a></i><span data-dcnode-id="3479" instrument_node=""> and </span><i data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">standstill</span></i><span data-dcnode-id="3476" instrument_node=""> provisions, to ensure that investors would have access to markets.  These provisions required nations to eliminate regulations that violated MAI provisions — either immediately or over a set period of time — and to refrain from passing any such laws in the future.)</span><sup class="reference" data-dcnode-id="3473" id="cite_ref-rollbnote_10-0"><a data-dcnode-id="3474" href="#cite_note-rollbnote-10"><span data-dcnode-id="3475" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="3471" instrument_node="">
</span><li data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Enable compensation to corporations for proven unfair or discriminatory investment conditions causing loss of profit.</span></li><span data-dcnode-id="3468" instrument_node="">
</span><li data-dcnode-id="3456"><span data-dcnode-id="3467" instrument_node="">Allow states and corporations recourse to international </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arbitration" title="Arbitration"><span data-dcnode-id="3466" instrument_node="">arbitration</span></a><span data-dcnode-id="3464" instrument_node=""> (for instance, through the </span><a data-dcnode-id="3462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Centre_for_Settlement_of_Investment_Disputes" title="International Centre for Settlement of Investment Disputes"><span data-dcnode-id="3463" instrument_node="">International Centre for Settlement of Investment Disputes</span></a><span data-dcnode-id="3461" instrument_node="">) to settle any disputes arising under the agreement,</span><sup class="reference" data-dcnode-id="3458" id="cite_ref-11"><a data-dcnode-id="3459" href="#cite_note-11"><span data-dcnode-id="3460" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3457" instrument_node=""> instead of national courts in the host state.</span></li></ul><span data-dcnode-id="3454" instrument_node="">
</span><p data-dcnode-id="3439"><span data-dcnode-id="3453" instrument_node="">The MAI was supported by both the </span><a class="mw-redirect" data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_and_Industry_Advisory_Committee_to_the_OECD" title="Business and Industry Advisory Committee to the OECD"><span data-dcnode-id="3452" instrument_node="">Business and Industry Advisory Committee to the OECD</span></a><span data-dcnode-id="3450" instrument_node=""> (BIAC) and the </span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_Union_Advisory_Committee_to_the_OECD" title="Trade Union Advisory Committee to the OECD"><span data-dcnode-id="3449" instrument_node="">Trade Union Advisory Committee to the OECD</span></a><span data-dcnode-id="3447" instrument_node=""> (TUAC). While BIAC was interested in stable and consistent treatment of investment, TUAC was interested on setting standards on employment and </span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_relations" title="Industrial relations"><span data-dcnode-id="3446" instrument_node="">industrial relations</span></a><span data-dcnode-id="3444" instrument_node="">.</span><sup class="reference" data-dcnode-id="3441" id="cite_ref-witherell_6-2"><a data-dcnode-id="3442" href="#cite_note-witherell-6"><span data-dcnode-id="3443" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3440" instrument_node="">
</span></p><span data-dcnode-id="3438" instrument_node="">
</span><h2 data-dcnode-id="3428"><span class="mw-headline" data-dcnode-id="3436" id="Negotiations"><span data-dcnode-id="3437" instrument_node="">Negotiations</span></span><span class="mw-editsection" data-dcnode-id="3429"><span class="mw-editsection-bracket" data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">[</span></span><a data-dcnode-id="3432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D3" title="Edit section: Negotiations"><span data-dcnode-id="3433" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3430"><span data-dcnode-id="3431" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3427" instrument_node="">
</span><p data-dcnode-id="3407"><span data-dcnode-id="3426" instrument_node="">The negotiations on the Multilateral Agreement on Investment were formally launched by the OECD's Ministerial Council in May 1995 and they commenced in September 1995.</span><sup class="reference" data-dcnode-id="3423" id="cite_ref-witherell_6-3"><a data-dcnode-id="3424" href="#cite_note-witherell-6"><span data-dcnode-id="3425" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="3420" id="cite_ref-12"><a data-dcnode-id="3421" href="#cite_note-12"><span data-dcnode-id="3422" instrument_node="">[12]</span></a></sup><sup class="reference" data-dcnode-id="3417" id="cite_ref-geiger_13-0"><a data-dcnode-id="3418" href="#cite_note-geiger-13"><span data-dcnode-id="3419" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3416" instrument_node="">  The negotiations were carried out by a high-level negotiating group consisting of officials from the OECD member states, but working outside the OECD committee structure consulting with the non-member countries. The chairperson of the negotiating group was Frans Engering (Netherlands) and vice-chairpersons were Al Larson (United States) and A. Saiki (Japan).</span><sup class="reference" data-dcnode-id="3413" id="cite_ref-picciotto_3-3"><a data-dcnode-id="3414" href="#cite_note-picciotto-3"><span data-dcnode-id="3415" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3412" instrument_node=""> The target deadline to finish the negotiations, set by the OECD Ministerial Council, was mid-1997.</span><sup class="reference" data-dcnode-id="3409" id="cite_ref-witherell_6-4"><a data-dcnode-id="3410" href="#cite_note-witherell-6"><span data-dcnode-id="3411" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3408" instrument_node="">
</span></p><p data-dcnode-id="3393"><span data-dcnode-id="3406" instrument_node="">There was little public awareness of the details of MAI negotiations until a draft of the agreement was leaked in March 1997.</span><sup class="reference" data-dcnode-id="3403" id="cite_ref-smythe_14-0"><a data-dcnode-id="3404" href="#cite_note-smythe-14"><span data-dcnode-id="3405" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3402" instrument_node=""> The leaked material prompted criticism from different NGOs globally. As a result, the negotiations failed in 1998 when first France and then other countries successively withdrew after pressure from a global movement of NGOs, citizens' groups and a number of governments of developing countries. In April 1998, the negotiations were formally suspended for six months.</span><sup class="reference" data-dcnode-id="3399" id="cite_ref-picciotto_3-4"><a data-dcnode-id="3400" href="#cite_note-picciotto-3"><span data-dcnode-id="3401" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3398" instrument_node=""> On 3 December 1998, the OECD announced that "negotiations on the MAI are no longer taking place".</span><sup class="reference" data-dcnode-id="3395" id="cite_ref-neumayer_15-0"><a data-dcnode-id="3396" href="#cite_note-neumayer-15"><span data-dcnode-id="3397" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3394" instrument_node="">
</span></p><span data-dcnode-id="3392" instrument_node="">
</span><h2 data-dcnode-id="3382"><span class="mw-headline" data-dcnode-id="3390" id="Protest_movement"><span data-dcnode-id="3391" instrument_node="">Protest movement</span></span><span class="mw-editsection" data-dcnode-id="3383"><span class="mw-editsection-bracket" data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">[</span></span><a data-dcnode-id="3386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D4" title="Edit section: Protest movement"><span data-dcnode-id="3387" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3381" instrument_node="">
</span><blockquote data-dcnode-id="3374"><p data-dcnode-id="3375"><span data-dcnode-id="3380" instrument_node="">Multinational corporations (MNCs) enjoy enormous structural and resource advantages over employees and citizens. Yet when the MNCs and major governments tried to expand those advantages through the Multilateral Agreement on Investment (MAI), they were stymied by a global alliance of activists. MAI opponents made heavy use of electronic mail and the World Wide Web in raising the alert, sharing information and coordinating actions. They worked collaboratively, flexibly and imaginatively towards their goals while MNCs and governments were working secretively and within more traditional hierarchical models.</span><sup class="reference" data-dcnode-id="3377" id="cite_ref-16"><a data-dcnode-id="3378" href="#cite_note-16"><span data-dcnode-id="3379" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3376" instrument_node=""> </span></p></blockquote><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3358"><span data-dcnode-id="3372" instrument_node="">The international protests against the MAI were the first example of such mass-activism to deploy the </span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="3371" instrument_node="">Internet</span></a><span data-dcnode-id="3369" instrument_node="">. The internet was central both in gathering information and in promulgating critical materials among members of a vast worldwide network. The movement's main argument was that the most influential </span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_media" title="Mass media"><span data-dcnode-id="3368" instrument_node="">mass media</span></a><span data-dcnode-id="3366" instrument_node=""> and </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politician" title="Politician"><span data-dcnode-id="3365" instrument_node="">politicians</span></a><span data-dcnode-id="3363" instrument_node=""> had vested interests in the MAI. Even their opponents ruefully acknowledged that the activists possessed highly qualified, eloquent analysts and leaders—and were able to use the new internet technology to devastating effect. French MEP Catherine Lalumière stated: "These organisations have refined and diffused to all countries an anti-MAI position which is now expressed in similar terms throughout the diverse countries of the OECD."</span><sup class="reference" data-dcnode-id="3360" id="cite_ref-lalrep_17-0"><a data-dcnode-id="3361" href="#cite_note-lalrep-17"><span data-dcnode-id="3362" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3359" instrument_node="">
</span></p><span data-dcnode-id="3357" instrument_node="">
</span><h3 data-dcnode-id="3347"><span class="mw-headline" data-dcnode-id="3355" id="Active_opposition"><span data-dcnode-id="3356" instrument_node="">Active opposition</span></span><span class="mw-editsection" data-dcnode-id="3348"><span class="mw-editsection-bracket" data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">[</span></span><a data-dcnode-id="3351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D5" title="Edit section: Active opposition"><span data-dcnode-id="3352" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3346" instrument_node="">
</span><p data-dcnode-id="3326"><span data-dcnode-id="3345" instrument_node="">According to Theodore H. Cohn in </span><i data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">Global Political Economy Theory and Practice</span></i><span data-dcnode-id="3342" instrument_node=""> (2005), "[t]he most effective opposition to the MAI was launched by a wide-ranging coalition of civil society NGOs. These NGOs argued that the MAI would threaten protection of </span><a data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="3341" instrument_node="">human rights</span></a><span data-dcnode-id="3339" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_labour_standards" title="International labour standards"><span data-dcnode-id="3338" instrument_node="">labor</span></a><span data-dcnode-id="3336" instrument_node=""> and </span><a data-dcnode-id="3334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_standard" title="Environmental standard"><span data-dcnode-id="3335" instrument_node="">environmental standards</span></a><span data-dcnode-id="3333" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="3331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Least_Developed_Countries" title="Least Developed Countries"><span data-dcnode-id="3332" instrument_node="">least developed countries</span></a><span data-dcnode-id="3330" instrument_node="">. A particular concern was that the MAI would result in a "race to the bottom" among countries willing to lower their labor and environmental standards to attract foreign investment. The origin of organised opposition was traced by </span><a class="new" data-dcnode-id="3328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DKatia_Tieleman%26action%3Dedit%26redlink%3D1" title="Katia Tieleman (page does not exist)"><span data-dcnode-id="3329" instrument_node="">Katia Tieleman</span></a><span data-dcnode-id="3327" instrument_node=""> in her 2000 UN case study:
</span></p><span data-dcnode-id="3325" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3285"><p data-dcnode-id="3310"><i data-dcnode-id="3312"><span data-dcnode-id="3322" instrument_node="">[T]he start of the opposition against the MAI can be traced back to a couple of individuals, [who] remained the leading figures in its further development. By the end of 1996, </span><a data-dcnode-id="3320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Khor" title="Martin Khor"><span data-dcnode-id="3321" instrument_node="">Martin Khor</span></a><span data-dcnode-id="3319" instrument_node="">, Director of the Third World Network based in Malaysia, obtained a document prepared for the OECD Ministerial meeting of May 1995 as well as for future WTO negotiations by the European Commission (Commission of the European Communities 1995: A Level Playing Field for Direct Investment World Wide, March 1, Brussels). From the document, Mr. Khor understood that multilateral investment negotiations, which his organisation as part of a large coalition opposed at the WTO, might be ongoing at the OECD. He informed some NGO colleagues, among whom was </span><a data-dcnode-id="3317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Clarke_%28activist%29" title="Tony Clarke (activist)"><span data-dcnode-id="3318" instrument_node="">Tony Clarke</span></a><span data-dcnode-id="3316" instrument_node="">, Director of the </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polaris_Institute" title="Polaris Institute"><span data-dcnode-id="3315" instrument_node="">Polaris Institute</span></a><span data-dcnode-id="3313" instrument_node=""> in Canada</span></i><span data-dcnode-id="3311" instrument_node="">.
</span></p><p data-dcnode-id="3303"><i data-dcnode-id="3308"><span data-dcnode-id="3309" instrument_node="">Tony Clarke managed to get a copy of the MAI draft. After turning "the text into a readable document and adding an analysis and interpretation" [</span></i><span data-dcnode-id="3307" instrument_node="">sourced</span><i data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node=""> to interview with Tony Clarke, Brussels, April 28], he posted it to an international email distribution list about globalization called le Forum international sur la globalization in February 1997</span></i><span data-dcnode-id="3304" instrument_node="">.
</span></p><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3286"><i data-dcnode-id="3297"><span data-dcnode-id="3301" instrument_node="">In the United States, the NGO Public Citizen Global Watch put the draft on its web page. </span><a data-dcnode-id="3299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lori_Wallach" title="Lori Wallach"><span data-dcnode-id="3300" instrument_node="">Lori Wallach</span></a><span data-dcnode-id="3298" instrument_node="">, a graduate of Harvard Law School, became one of the strongest leading organizers of the international campaign against the MAI. Building on the credibility of her status as a lawyer, she transformed the legal OECD documents into accessible wording, often "ready for use" in the subsequent NGO campaigns. Her role as provider of information combined with her role as provider of explanation gave her a power-position in the campaign. She would launch the campaign under the name of the "Dracula Strategy" implying that simply exposing the MAI project to the light would be sufficient to kill it </span></i><span data-dcnode-id="3296" instrument_node="">(sourced to an interview with </span><a data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susan_George_%28political_scientist%29" title="Susan George (political scientist)"><span data-dcnode-id="3295" instrument_node="">Susan George</span></a><span data-dcnode-id="3293" instrument_node="">)</span><i data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">. NGOs showed that they were well interconnected. In no time, the document was distributed and action was taken in different parts of the world. The campaign against the MAI was born</span></i><span data-dcnode-id="3290" instrument_node="">.</span><sup class="reference" data-dcnode-id="3287" id="cite_ref-18"><a data-dcnode-id="3288" href="#cite_note-18"><span data-dcnode-id="3289" instrument_node="">[18]</span></a></sup></p></blockquote><span data-dcnode-id="3284" instrument_node="">
</span><p data-dcnode-id="3275"><span data-dcnode-id="3283" instrument_node="">Using a variety of websites, NGOs mobilized a strong and diverse opposition composed of human rights groups, labor and environmental groups, and consumer advocates.</span><sup class="reference" data-dcnode-id="3280" id="cite_ref-GPE_19-0"><a data-dcnode-id="3281" href="#cite_note-GPE-19"><span data-dcnode-id="3282" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="3277" id="cite_ref-profit_20-0"><a data-dcnode-id="3278" href="#cite_note-profit-20"><span data-dcnode-id="3279" instrument_node="">[20]</span></a></sup><span data-dcnode-id="3276" instrument_node="">
</span></p><span data-dcnode-id="3274" instrument_node="">
</span><h3 data-dcnode-id="3264"><span class="mw-headline" data-dcnode-id="3272" id="Arguments"><span data-dcnode-id="3273" instrument_node="">Arguments</span></span><span class="mw-editsection" data-dcnode-id="3265"><span class="mw-editsection-bracket" data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">[</span></span><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D6" title="Edit section: Arguments"><span data-dcnode-id="3269" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3266"><span data-dcnode-id="3267" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3263" instrument_node="">
</span><p data-dcnode-id="3232"><span data-dcnode-id="3262" instrument_node="">MAI opponents pointed to a perceived threat to </span><a data-dcnode-id="3260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westphalian_sovereignty" title="Westphalian sovereignty"><span data-dcnode-id="3261" instrument_node="">national sovereignty</span></a><sup class="reference" data-dcnode-id="3257" id="cite_ref-21"><a data-dcnode-id="3258" href="#cite_note-21"><span data-dcnode-id="3259" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3256" instrument_node=""> and democracy and argued that it would involve participating nations in a "race to the bottom" in environmental and labor standards.</span><sup class="reference" data-dcnode-id="3253" id="cite_ref-BCparliament2_22-0"><a data-dcnode-id="3254" href="#cite_note-BCparliament2-22"><span data-dcnode-id="3255" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3250" id="cite_ref-Barlowe1997_23-0"><a data-dcnode-id="3251" href="#cite_note-Barlowe1997-23"><span data-dcnode-id="3252" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3249" instrument_node=""> The MAI prompted criticism that it appeared to establish a new body of universal investment laws to guarantee corporations excessive powers to buy, sell and undertake financial operations all over the world, severely diluting national laws, e.g., on environmental protection, regulation of labour standards and human rights established in developed countries. By their arguments, the draft proposed a </span><a data-dcnode-id="3247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_American_Free_Trade_Agreement" title="North American Free Trade Agreement"><span data-dcnode-id="3248" instrument_node="">North American Free Trade Agreement</span></a><span data-dcnode-id="3246" instrument_node="">-style </span><a data-dcnode-id="3244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Investor-state_dispute_settlement" title="Investor-state dispute settlement"><span data-dcnode-id="3245" instrument_node="">investor-state dispute settlement</span></a><span data-dcnode-id="3243" instrument_node=""> tribunal in which corporations could sue governments if legislation (e.g., for national health, labor or environment), threatened their interests or were considered to expropriate actual or potential assets and/or profits.</span><sup class="reference" data-dcnode-id="3240" id="cite_ref-BCparliament2_22-1"><a data-dcnode-id="3241" href="#cite_note-BCparliament2-22"><span data-dcnode-id="3242" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="3237" id="cite_ref-Barlowe1997_23-1"><a data-dcnode-id="3238" href="#cite_note-Barlowe1997-23"><span data-dcnode-id="3239" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="3234" id="cite_ref-BCparliament1_24-0"><a data-dcnode-id="3235" href="#cite_note-BCparliament1-24"><span data-dcnode-id="3236" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3233" instrument_node="">
</span></p><p data-dcnode-id="3227"><span data-dcnode-id="3231" instrument_node="">Mark Vallianatos, of </span><a data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friends_of_the_Earth" title="Friends of the Earth"><span data-dcnode-id="3230" instrument_node="">Friends of the Earth</span></a><span data-dcnode-id="3228" instrument_node="">, argued that:
</span></p><span data-dcnode-id="3226" instrument_node="">
</span><ul data-dcnode-id="3211"><li data-dcnode-id="3221"><span data-dcnode-id="3225" instrument_node="">The MAI would restrict governments' ability to </span><a data-dcnode-id="3223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectionism" title="Protectionism"><span data-dcnode-id="3224" instrument_node="">limit the participation of foreign multinationals</span></a><span data-dcnode-id="3222" instrument_node=""> in industries. "For example," he wrote, "the Philippines currently bans foreign investment in rural banking, and Honduras limits foreign investors in forestry to a minority stake". These restrictions would not be acceptable within the MAI.</span></li><span data-dcnode-id="3220" instrument_node="">
</span><li data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">The agreement would establish the principle of "national treatment" (in which government must treat foreign companies as favorably as domestic companies) as the norm for international investment. Indeed, in some cases, foreign corporations might have stronger protections than domestic investors. "The MAI bars many types of performance requirements, or conditions, even if those conditions are imposed on local companies. Examples of forbidden conditions include requiring investors to form a partnership with a local company and requiring a minimum number of local employees—the types of policies governments use to help ensure that local people benefit from foreign investment."</span></li><span data-dcnode-id="3217" instrument_node="">
</span><li data-dcnode-id="3212"><span data-dcnode-id="3216" instrument_node="">"The MAI matters because its rules can be enforced. If a foreign investor thinks a country where it has invested is violating the MAI, the investor has a choice: to complain to its own government, which can take the host country to binding international arbitration, or to directly challenge the host country. In either case, the arbitration process is closed.</span><sup class="reference" data-dcnode-id="3213" id="cite_ref-25"><a data-dcnode-id="3214" href="#cite_note-25"><span data-dcnode-id="3215" instrument_node="">[25]</span></a></sup></li></ul><span data-dcnode-id="3210" instrument_node="">
</span><h2 data-dcnode-id="3200"><span class="mw-headline" data-dcnode-id="3208" id="Some_component_country_campaigns"><span data-dcnode-id="3209" instrument_node="">Some component country campaigns</span></span><span class="mw-editsection" data-dcnode-id="3201"><span class="mw-editsection-bracket" data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">[</span></span><a data-dcnode-id="3204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D7" title="Edit section: Some component country campaigns"><span data-dcnode-id="3205" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3199" instrument_node="">
</span><h3 data-dcnode-id="3189"><span class="mw-headline" data-dcnode-id="3197" id="Canada"><span data-dcnode-id="3198" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="3190"><span class="mw-editsection-bracket" data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">[</span></span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D8" title="Edit section: Canada"><span data-dcnode-id="3194" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3188" instrument_node="">
</span><p data-dcnode-id="3170"><span data-dcnode-id="3187" instrument_node="">Contributors to the MAI-NOT newsgroup, including </span><a data-dcnode-id="3185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maude_Barlow" title="Maude Barlow"><span data-dcnode-id="3186" instrument_node="">Maude Barlow</span></a><span data-dcnode-id="3184" instrument_node="">, mounted a campaign</span><sup class="reference" data-dcnode-id="3181" id="cite_ref-26"><a data-dcnode-id="3182" href="#cite_note-26"><span data-dcnode-id="3183" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="3178" id="cite_ref-27"><a data-dcnode-id="3179" href="#cite_note-27"><span data-dcnode-id="3180" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3177" instrument_node=""> with the active backing of </span><a data-dcnode-id="3175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Council_of_Canadians" title="The Council of Canadians"><span data-dcnode-id="3176" instrument_node="">the Council of Canadians</span></a><span data-dcnode-id="3174" instrument_node=""> which had earlier opposed the 1994 </span><a data-dcnode-id="3172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_American_Free_Trade_Agreement" title="North American Free Trade Agreement"><span data-dcnode-id="3173" instrument_node="">North American Free Trade Agreement</span></a><span data-dcnode-id="3171" instrument_node=""> (NAFTA) between the USA, Canada and Mexico.
</span></p><p data-dcnode-id="3157"><span data-dcnode-id="3169" instrument_node="">In Montreal, on May 25, 1998, the Montreal Conference on Globalized Economies was nonviolently blockaded for five hours by hundreds of activists in what was called Operation SalAMI,</span><sup class="reference" data-dcnode-id="3166" id="cite_ref-28"><a data-dcnode-id="3167" href="#cite_note-28"><span data-dcnode-id="3168" instrument_node="">[28]</span></a></sup><span data-dcnode-id="3165" instrument_node=""> based on the French acronym of the proposed agreement, AMI, referring not only the sausage, but also to a "dirty friend". Operation SalAMI demanded that Canada withdraw from the negotiations on the MAI. The presence of one key MAI player, Donald Johnston (General Secretary of the OECD) at the conference helped to focus the action, one of the three most important anti-MAI events in the world. These mobilizations on an international scale actually led to the shelving of the agreement. The award-winning documentary </span><i data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Pressure Point: Inside the Montreal Blockade</span></i><span data-dcnode-id="3162" instrument_node=""> recorded the drama of this action where 100 people were arrested.</span><sup class="reference" data-dcnode-id="3159" id="cite_ref-29"><a data-dcnode-id="3160" href="#cite_note-29"><span data-dcnode-id="3161" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3158" instrument_node="">
</span></p><span data-dcnode-id="3156" instrument_node="">
</span><h3 data-dcnode-id="3146"><span class="mw-headline" data-dcnode-id="3154" id="United_States"><span data-dcnode-id="3155" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="3147"><span class="mw-editsection-bracket" data-dcnode-id="3152"><span data-dcnode-id="3153" instrument_node="">[</span></span><a data-dcnode-id="3150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D9" title="Edit section: United States"><span data-dcnode-id="3151" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3148"><span data-dcnode-id="3149" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3115"><span data-dcnode-id="3144" instrument_node="">A strong campaign was led by </span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lori_Wallach" title="Lori Wallach"><span data-dcnode-id="3143" instrument_node="">Lori Wallach</span></a><span data-dcnode-id="3141" instrument_node=""> of </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Citizen" title="Public Citizen"><span data-dcnode-id="3140" instrument_node="">Public Citizen</span></a><span data-dcnode-id="3138" instrument_node="">'s </span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Trade_Watch" title="Global Trade Watch"><span data-dcnode-id="3137" instrument_node="">Global Trade Watch</span></a><span data-dcnode-id="3135" instrument_node="">, and a coordinated network ("50 Years is Enough') including </span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friends_of_the_Earth_%28US%29" title="Friends of the Earth (US)"><span data-dcnode-id="3134" instrument_node="">Friends of the Earth</span></a><span data-dcnode-id="3132" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="3130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alliance_for_Democracy_%28USA%29" title="Alliance for Democracy (USA)"><span data-dcnode-id="3131" instrument_node="">Alliance for Democracy</span></a><span data-dcnode-id="3129" instrument_node="">, </span><a data-dcnode-id="3127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witness_for_Peace" title="Witness for Peace"><span data-dcnode-id="3128" instrument_node="">Witness for Peace</span></a><span data-dcnode-id="3126" instrument_node="">, the </span><a data-dcnode-id="3124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sierra_Club" title="Sierra Club"><span data-dcnode-id="3125" instrument_node="">Sierra Club</span></a><span data-dcnode-id="3123" instrument_node="">, the Preamble Center, the </span><a data-dcnode-id="3121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Socialists_of_America" title="Democratic Socialists of America"><span data-dcnode-id="3122" instrument_node="">Democratic Socialists of America</span></a><span data-dcnode-id="3120" instrument_node=""> and other groups.</span><sup class="reference" data-dcnode-id="3117" id="cite_ref-30"><a data-dcnode-id="3118" href="#cite_note-30"><span data-dcnode-id="3119" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3116" instrument_node="">
</span></p><span data-dcnode-id="3114" instrument_node="">
</span><h3 data-dcnode-id="3104"><span class="mw-headline" data-dcnode-id="3112" id="Australia"><span data-dcnode-id="3113" instrument_node="">Australia</span></span><span class="mw-editsection" data-dcnode-id="3105"><span class="mw-editsection-bracket" data-dcnode-id="3110"><span data-dcnode-id="3111" instrument_node="">[</span></span><a data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D10" title="Edit section: Australia"><span data-dcnode-id="3109" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3106"><span data-dcnode-id="3107" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3103" instrument_node="">
</span><p data-dcnode-id="3077"><span data-dcnode-id="3102" instrument_node="">In November 1997, the </span><a data-dcnode-id="3100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Australian_Broadcasting_Corporation" title="Australian Broadcasting Corporation"><span data-dcnode-id="3101" instrument_node="">Australian Broadcasting Corporation</span></a><span data-dcnode-id="3099" instrument_node="">'s radio programme "Background Briefing" presented </span><a class="external text" data-dcnode-id="3097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.abc.net.au/rn/backgroundbriefing/stories/1997/10507.htm" rel="nofollow"><span data-dcnode-id="3098" instrument_node="">the Quiet Debate</span></a><span data-dcnode-id="3096" instrument_node="">—a report about the silence of the Australian government and media on an issue which was arousing fierce controversy in the United States, Britain, Canada and New Zealand. However, Australian activists, including supporters of </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pauline_Hanson" title="Pauline Hanson"><span data-dcnode-id="3095" instrument_node="">Pauline Hanson</span></a><span data-dcnode-id="3093" instrument_node="">,</span><sup class="reference" data-dcnode-id="3090" id="cite_ref-31"><a data-dcnode-id="3091" href="#cite_note-31"><span data-dcnode-id="3092" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3089" instrument_node=""> were already studying the leaked MAI draft and corresponding with the Canadian email discussion group MAI-NOT while deciding how to organise a national campaign to link with those of other countries. In January 1998 a national "STOP MAI" coalition was formed to research issues, lobby parliamentarians and conduct public meetings.</span><sup class="reference" data-dcnode-id="3086" id="cite_ref-32"><a data-dcnode-id="3087" href="#cite_note-32"><span data-dcnode-id="3088" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3085" instrument_node=""> In November 1998, prior to the opening of OECD negotiations in Paris, the coalition delivered to the meeting's chairman and to the Australian prime minister a protest letter endorsed by over 500 organisations and individuals. The letter was reinforced by a prominent advertisement in </span><i data-dcnode-id="3083"><span data-dcnode-id="3084" instrument_node="">The Australian</span></i><span data-dcnode-id="3082" instrument_node=""> newspaper on 11 November</span><sup class="reference" data-dcnode-id="3079" id="cite_ref-33"><a data-dcnode-id="3080" href="#cite_note-33"><span data-dcnode-id="3081" instrument_node="">[33]</span></a></sup><span data-dcnode-id="3078" instrument_node="">
</span></p><span data-dcnode-id="3076" instrument_node="">
</span><h3 data-dcnode-id="3066"><span class="mw-headline" data-dcnode-id="3074" id="France"><span data-dcnode-id="3075" instrument_node="">France</span></span><span class="mw-editsection" data-dcnode-id="3067"><span class="mw-editsection-bracket" data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">[</span></span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D11" title="Edit section: France"><span data-dcnode-id="3071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3068"><span data-dcnode-id="3069" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3065" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3056"><div class="thumbinner" data-dcnode-id="3057" style="width:222px;"><a class="image" data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACatherine_Lalumi%25C3%25A8re.jpg"><img alt="" class="thumbimage" data-dcnode-id="3064" data-file-height="1633" data-file-width="2048" decoding="async" height="175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Catherine_Lalumi%25C3%25A8re.jpg/220px-Catherine_Lalumi%25C3%25A8re.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Catherine_Lalumi%C3%A8re.jpg/330px-Catherine_Lalumi%C3%A8re.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Catherine_Lalumi%C3%A8re.jpg/440px-Catherine_Lalumi%C3%A8re.jpg 2x" width="220"></a><span data-dcnode-id="3062" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3058"><div class="magnify" data-dcnode-id="3060"><a class="internal" data-dcnode-id="3061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACatherine_Lalumi%25C3%25A8re.jpg" title="Enlarge"></a></div><span data-dcnode-id="3059" instrument_node="">Catherine Lalumière</span></div></div></div><span data-dcnode-id="3055" instrument_node="">
</span><p data-dcnode-id="3033"><span data-dcnode-id="3054" instrument_node="">France's withdrawal followed consideration of a report on the negotiations drawn up by a French MEP, </span><a data-dcnode-id="3052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catherine_Lalumi%25C3%25A8re" title="Catherine Lalumière"><span data-dcnode-id="3053" instrument_node="">Catherine Lalumière</span></a><span data-dcnode-id="3051" instrument_node="">. After receiving this report, prime minister </span><a data-dcnode-id="3049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lionel_Jospin" title="Lionel Jospin"><span data-dcnode-id="3050" instrument_node="">Lionel Jospin</span></a><span data-dcnode-id="3048" instrument_node=""> addressed the </span><a class="mw-redirect" data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Assembly_of_France" title="National Assembly of France"><span data-dcnode-id="3047" instrument_node="">Assemblée Nationale</span></a><span data-dcnode-id="3045" instrument_node=""> on 10 October 1998 and announced his decision to withdraw. He said the Lalumière Report had identified a number of fundamental problems with the agreement, particularly relating to matters of </span><a data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westphalian_sovereignty" title="Westphalian sovereignty"><span data-dcnode-id="3044" instrument_node="">national sovereignty</span></a><span data-dcnode-id="3042" instrument_node="">. Madame Lalumière had also concluded that so many reservations were being incorporated into the agreement that any value for French investors would be limited. M. Jospin noted that, in February 1998, the French government had identified respect for cultural differences as a requirement for French support for the agreement.</span><sup class="reference" data-dcnode-id="3039" id="cite_ref-34"><a data-dcnode-id="3040" href="#cite_note-34"><span data-dcnode-id="3041" instrument_node="">[34]</span></a></sup><span data-dcnode-id="3038" instrument_node=""> In particular, he was concerned that the French film industry needed protection against US imports.</span><sup class="reference" data-dcnode-id="3035" id="cite_ref-35"><a data-dcnode-id="3036" href="#cite_note-35"><span data-dcnode-id="3037" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3034" instrument_node="">
</span></p><p data-dcnode-id="3028"><span data-dcnode-id="3032" instrument_node="">Of equal or greater significance was the importance accorded by Mme. Lalumière to the global protest movement which at that time she attributed to the work and influence of </span><a class="mw-redirect" data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-government_organisations" title="Non-government organisations"><span data-dcnode-id="3031" instrument_node="">NGOs</span></a><span data-dcnode-id="3029" instrument_node="">:
</span></p><span data-dcnode-id="3027" instrument_node="">
</span><link data-dcnode-id="3026" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="3015"><p data-dcnode-id="3016"><i data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">For the first time, one is seeing the emergence of a global civil society represented by NGOs which are often based in several states and communicate beyond their frontiers. This evolution is doubtless irreversible. On one hand, organisations representing civil society have become aware of the consequences of international economic negotiations. They are determined to leave their mark on them.</span></i><span data-dcnode-id="3023" instrument_node="">
</span><i data-dcnode-id="3021"><span data-dcnode-id="3022" instrument_node="">Furthermore, the development of the internet has shaken up the environment of the negotiations. It allows the instant diffusion of the texts under discussion, whose confidentiality becomes more and more theoretical. It permits, beyond national boundaries, the sharing of knowledge and expertise. On a subject which is highly technical, the representatives of civil society seemed to us perfectly well informed, and their criticisms well argued on a legal level</span></i><span data-dcnode-id="3020" instrument_node="">.</span><sup class="reference" data-dcnode-id="3017" id="cite_ref-lalrep_17-1"><a data-dcnode-id="3018" href="#cite_note-lalrep-17"><span data-dcnode-id="3019" instrument_node="">[17]</span></a></sup></p></blockquote><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3002"><span data-dcnode-id="3013" instrument_node="">Mme. Lalumière argued, however, that France should continue to pursue further liberalisation of investment régimes though </span><i data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">not</span></i><span data-dcnode-id="3010" instrument_node=""> in the OECD. "On the one hand, under these conditions it would be impossible to achieve the balancing of the concessions demanded by the </span><a data-dcnode-id="3008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Multinational_corporation" title="Multinational corporation"><span data-dcnode-id="3009" instrument_node="">firms</span></a><span data-dcnode-id="3007" instrument_node=""> and, on the other, the objections of the opponents would be just as fierce."</span><sup class="reference" data-dcnode-id="3004" id="cite_ref-lalrep_17-2"><a data-dcnode-id="3005" href="#cite_note-lalrep-17"><span data-dcnode-id="3006" instrument_node="">[17]</span></a></sup><span data-dcnode-id="3003" instrument_node="">  France was followed by a succession of other nations including Canada and Australia whose governments had been under relentless pressure from civil society to abandon or radically revamp the MAI.
</span></p><span data-dcnode-id="3001" instrument_node="">
</span><h2 data-dcnode-id="2991"><span class="mw-headline" data-dcnode-id="2999" id="Subsequent_developments"><span data-dcnode-id="3000" instrument_node="">Subsequent developments</span></span><span class="mw-editsection" data-dcnode-id="2992"><span class="mw-editsection-bracket" data-dcnode-id="2997"><span data-dcnode-id="2998" instrument_node="">[</span></span><a data-dcnode-id="2995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DMultilateral_Agreement_on_Investment%26action%3Dedit%26section%3D12" title="Edit section: Subsequent developments"><span data-dcnode-id="2996" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2990" instrument_node="">
</span><p data-dcnode-id="2985"><span data-dcnode-id="2989" instrument_node="">Proponents of MAI (such as the United States, Canada, and several EU members) continue to promote investment provisions similar to MAI through regional trade agreements, bilateral investment treaties, bilateral free-trade agreements and discussion at the World Trade Organization to be incorporated into the General Agreement on Trade in Services.  Before the end of 1998, the UK trade minister </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brian_Wilson_%28Labour_politician%29" title="Brian Wilson (Labour politician)"><span data-dcnode-id="2988" instrument_node="">Brian Wilson</span></a><span data-dcnode-id="2986" instrument_node=""> began to announce that investment negotiations could be shifted to the WTO.
</span></p><span data-dcnode-id="2984" instrument_node="">
</span><blockquote data-dcnode-id="2978"><p data-dcnode-id="2979"><span data-dcnode-id="2983" instrument_node="">The UK Government appears to be taking a surprisingly complacent approach towards the WTO. When the MAI collapsed, then Trade Minister Brian Wilson appeared to have understood some of the concerns raised. He called for any new negotiations to start with a 'blank sheet of paper' based on objectives which should 'take full account of social and environmental concerns'. Yet despite these undertakings, the Government is pushing for the WTO to cover foreign investment according to the same principles. It is a driving force behind the EU proposal on investment. In doing so it is ignoring the widespread opposition to the MAI and the mounting evidence of the WTO's abject failings.</span><sup class="reference" data-dcnode-id="2980" id="cite_ref-36"><a data-dcnode-id="2981" href="#cite_note-36"><span data-dcnode-id="2982" instrument_node="">[36]</span></a></sup></p></blockquote><p data-dcnode-id="2970"><span data-dcnode-id="2977" instrument_node=""> A senior treasury officer, cited in a 1999 Australian parliamentary report, stated that "any future work on the matter known as the MAI needed to address the OECD Ministers' requirement to protect the sovereign right to regulate and to ensure citizens were not harmed by efforts to liberalise foreign investment. There was also a need to continue to engage "civil society", and to expand participation in the process by countries that were not members of the OECD"</span><i data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">.</span></i><sup class="reference" data-dcnode-id="2972" id="cite_ref-37"><a data-dcnode-id="2973" href="#cite_note-37"><span data-dcnode-id="2974" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2971" instrument_node="">
</span></p><p data-dcnode-id="2933"><span data-dcnode-id="2969" instrument_node="">An attempt was made to insert the investment agenda into a new "Millennium Round" of trade liberalisation talks to be hosted by the </span><a data-dcnode-id="2967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="2968" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="2966" instrument_node=""> (WTO).</span><sup class="reference" data-dcnode-id="2963" id="cite_ref-38"><a data-dcnode-id="2964" href="#cite_note-38"><span data-dcnode-id="2965" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2962" instrument_node="">  This led to the historic "</span><a class="mw-redirect" data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WTO_Ministerial_Conference_of_1999_protest_activity" title="WTO Ministerial Conference of 1999 protest activity"><span data-dcnode-id="2961" instrument_node="">Battle of Seattle</span></a><span data-dcnode-id="2959" instrument_node="">" protest actions in November 1999.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2952" style="white-space:nowrap;"><span data-dcnode-id="2958" instrument_node="">[</span><i data-dcnode-id="2954"><a data-dcnode-id="2955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2956" title="This claim needs references to reliable sources. (January 2010)"><span data-dcnode-id="2957" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2953" instrument_node="">]</span></sup><span data-dcnode-id="2951" instrument_node=""> At the WTO Ministerial in </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canc%25C3%25BAn" title="Cancún"><span data-dcnode-id="2950" instrument_node="">Cancún</span></a><span data-dcnode-id="2948" instrument_node="">, Mexico, in September 2003, a group of more than twenty developing countries united to block the inclusion of the </span><a data-dcnode-id="2946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore_issues" title="Singapore issues"><span data-dcnode-id="2947" instrument_node="">Singapore issues</span></a><span data-dcnode-id="2945" instrument_node="">, including investments, in the </span><a class="mw-redirect" data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doha_Round" title="Doha Round"><span data-dcnode-id="2944" instrument_node="">Doha Round</span></a><span data-dcnode-id="2942" instrument_node=""> of trade talks.</span><sup class="reference" data-dcnode-id="2939" id="cite_ref-39"><a data-dcnode-id="2940" href="#cite_note-39"><span data-dcnode-id="2941" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2938" instrument_node=""> One basis of such opposition is outlined in a critical analysis prepared for Canadian universities.</span><sup class="reference" data-dcnode-id="2935" id="cite_ref-40"><a data-dcnode-id="2936" href="#cite_note-40"><span data-dcnode-id="2937" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2934" instrument_node="">
</span></p><p data-dcnode-id="2924"><span data-dcnode-id="2932" instrument_node="">The OECD promotes the Declaration on International Investment and Multinational Enterprises and the </span><a data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/OECD_Guidelines_for_Multinational_Enterprises" title="OECD Guidelines for Multinational Enterprises"><span data-dcnode-id="2931" instrument_node="">OECD Guidelines for Multinational Enterprises</span></a><span data-dcnode-id="2929" instrument_node="">, last revised in 2011. In addition, from May 2006, the OECD has promoted a non-binding set of "good practices" for attracting investment, known as The Policy Framework for Investment (PFI).</span><sup class="reference" data-dcnode-id="2926" id="cite_ref-41"><a data-dcnode-id="2927" href="#cite_note-41"><span data-dcnode-id="2928" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2925" instrument_node="">
</span></p><span data-dcnode-id="2923" instrument_node="">
