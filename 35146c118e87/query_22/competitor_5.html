4 4 5 5 6 2 17l-8 31s-2 9.5-14 3c-41-22.3-63-78-63-126 0-104 75-199 217-199 114 0 203 81 203 190 0 113-72 205-171 205-55 0-75-38-75-38l-21 78c-11 41-47 102-56 99z" data-dcnode-id="441"></path></svg></a></div></div></button></section><div class="margin-wrapper" data-dcnode-id="83"><div class="split-screen" data-dcnode-id="84"><div class="secondary" data-dcnode-id="418"><section class="sidebar sticky-bar" data-dcnode-id="419"><div class="sidebar-container" data-dcnode-id="420"><div class="sidebar-links sidebar-wrap" data-dcnode-id="421"><div class="sidebar-ctas-container" data-dcnode-id="422"><h4 data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">More on Dreaming</span></h4><a class="cta-button" data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/dreams/" target="_self"><button class="MuiButtonBase-root MuiButton-root MuiButton-outlined" data-dcnode-id="429" tabindex="0" type="button"><span class="MuiButton-label" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Types of Dreams</span></span><span class="MuiTouchRipple-root" data-dcnode-id="430"></span></button></a><a class="cta-button" data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/dream-interpretation/" target="_self"><button class="MuiButtonBase-root MuiButton-root MuiButton-outlined" data-dcnode-id="424" tabindex="0" type="button"><span class="MuiButton-label" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Dream Interpretation</span></span><span class="MuiTouchRipple-root" data-dcnode-id="425"></span></button></a></div></div></div></section></div><div class="primary" data-dcnode-id="85"><div class="wysiwyg-container" data-dcnode-id="394"><p data-dcnode-id="412"><span data-dcnode-id="413" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">Despite years of research, the neurological basis for </span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/dreams/"><span data-dcnode-id="416" instrument_node="">dreams</span></a><span data-dcnode-id="414" instrument_node=""> is still not entirely certain, and several theories (including the activation-synthesis theory, the long-term memory excitation theory, the continual-activation theory, and others) have been proposed for how and why dreams occur at all, none of which are entirely satisfactory or universally accepted.</span></span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" style="font-weight: 400;"><span data-dcnode-id="410" instrument_node="">Perhaps the best answer is that dreams help us regulate, analyze, explain and remember recent events in our lives, in a kind of “mental housekeeping” process. Most dreams are based in large part on everyday experiences from recent days, suggesting that at least part of their function is to help the brain sort through and make sense of recent real-life experiences. </span></span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" style="font-weight: 400;"><span data-dcnode-id="406" instrument_node="">Reliving experiences internally through dreams helps to facilitate learning and to reconsolidate long-term memories (both the procedural memories of how to do things and the declarative memories of facts and events), and also provide an opportunity to delete unwanted or junk data from memory.</span></span></p><span data-dcnode-id="403" instrument_node="">
</span><h2 data-dcnode-id="400"><span data-dcnode-id="401" style="font-weight: 400;"><span data-dcnode-id="402" instrument_node="">The Role of Dreams</span></span></h2><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" style="font-weight: 400;"><span data-dcnode-id="398" instrument_node="">People say dream interpretation is a pseudoscience, but the truth is, we know very little about dreaming in general. Whether it’s the meaning of dreams or&nbsp; the purpose of dreams in general, we’re still mostly lost in the dark. But thanks to the hard work of some brilliant minds, we do have a few clues to help us understand the function of dreaming.</span></span></p><span data-dcnode-id="395" instrument_node="">
</span></div><div class="section-image-container" data-dcnode-id="391"><img alt="woman sleeping bed e1596117677531" class="banner-image" data-dcnode-id="393" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2019/06/woman-sleeping-bed-1024x683.jpeg&amp;raw"><p class="banner-titles" data-dcnode-id="392"></p></div><div class="wysiwyg-container" data-dcnode-id="276"><h3 data-dcnode-id="388"><b data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Emotional Processing</span></b></h3><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" style="font-weight: 400;"><span data-dcnode-id="386" instrument_node="">One way dreams help us is by resolving some of our emotional problems and inconsistencies arising from our daily activities, as well as aiding in mood regulation. Interestingly, some recent research based on dream reports has found that sleepers tend to report more negative emotions when woken during </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/rem-sleep/"><span data-dcnode-id="385" instrument_node="">rapid eye movement (REM) sleep</span></a><span data-dcnode-id="383" instrument_node=""> than during </span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/nrem-sleep/"><span data-dcnode-id="382" instrument_node="">non-REM sleep</span></a><span data-dcnode-id="380" instrument_node="">, suggesting that REM sleep may produce more negative dreams. </span></span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" style="font-weight: 400;"><span data-dcnode-id="376" instrument_node="">In particular, the amygdala, which specializes in dealing with unpleasant emotions (e.g. anger, aggression, fear, etc), is very active during REM sleep, and may be involved in the process of resolving emotional issues. This may be supported by the example of clinical depression: one symptom of depression is that sufferers tend to spend a disproportionately large amount of time in REM sleep, in which case these negative emotions may be over-represented, thus perpetuating the depression (deliberate deprivation of REM sleep is often helpful in alleviating depression symptoms).</span></span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" style="font-weight: 400;"><span data-dcnode-id="372" instrument_node="">It has also been suggested that the way the brain suppresses the rational, controlled activity of the prefrontal cortex while allowing the more primitive, emotional side (associated with the amygdala, or emotion center, of the brain) to run riot may be a way of keeping us safely sane by allowing us to “go crazy” in our nightly dreams, while simultaneously working out our emotional problems. </span></span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" style="font-weight: 400;"><span data-dcnode-id="368" instrument_node="">Dreams may, therefore, function to contain and absorb negative emotional surges, allowing the dreamer to remain soundly asleep despite the inner turmoil, and to expunge these negative emotions from waking memory. </span></span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="362"><span data-dcnode-id="363" style="font-weight: 400;"><span data-dcnode-id="364" instrument_node="">According to this theory, sometimes referred to as the selective mood regulatory theory of dreaming, the first main dream of the night is therefore likely to have the most disturbing dream content, with subsequent dreams becoming increasingly better-adjusted, in an ongoing, and largely automatic, process of emotional resolution. Recurring dreams occur where this process becomes stuck at an early stage, and the emotional issues remain unresolved.</span></span></p><span data-dcnode-id="361" instrument_node="">
</span><h3 data-dcnode-id="358"><b data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Fight or Flight Training</span></b></h3><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" style="font-weight: 400;"><span data-dcnode-id="356" instrument_node="">A more evolutionary explanation for dreaming that has been proposed is that dreams may be a kind of mental threat simulation of potential real-life threatening events, allowing for a kind of safe “dry run”, and the testing and analysis of possible responses and mental schemas. It is also proposed by some that these schemas may also be passed on in the form of so-called “genetic memories”.&nbsp;</span></span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" style="font-weight: 400;"><span data-dcnode-id="352" instrument_node="">Interestingly, children tend to have many “primal” dreams and </span><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/dreams-nightmares/"><span data-dcnode-id="351" instrument_node="">nightmares</span></a><span data-dcnode-id="349" instrument_node="">, similar to the kinds of dreams mankind may have experienced millennia ago; as we age, these atavistic dreams tend to fade and our dreams tend to become more attuned to the subject matter of modern adult life. </span></span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="343"><span data-dcnode-id="344" style="font-weight: 400;"><span data-dcnode-id="345" instrument_node="">So, the theory holds that our dreams, and the long, detailed REM dreams in particular, may use our past experiences to anticipate possible future experiences, and allow us to test out possibilities and scenarios which might help us to deal with those experiences if they ever occur. Some of the scenarios constructed may be completely nonsensical, as indeed many dreams are, but some may prove genuinely useful in providing insights, so this may be at least a partial function of at least some dreams.</span></span></p><span data-dcnode-id="342" instrument_node="">
</span><h3 data-dcnode-id="339"><b data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Memory and Learning</span></b></h3><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" style="font-weight: 400;"><span data-dcnode-id="337" instrument_node="">Another very prevalent theory on the purpose of dreams is that dreaming helps with memory consolidation and problem-solving. Dreams actually appear to refine and improve memories, making them more useful for the future, so that the subsequent performance of learned tasks is improved. This has been conclusively demonstrated experimentally, for example in tests where rats are set to learn tasks like navigating mazes.</span></span></p><span data-dcnode-id="334" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" style="font-weight: 400;"><strong data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Related:</span></strong><span data-dcnode-id="331" instrument_node=""> </span><a data-dcnode-id="329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/sleep-and-learning/"><span data-dcnode-id="330" instrument_node="">Sleep and learning</span></a></span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" style="font-weight: 400;"><span data-dcnode-id="325" instrument_node="">The brain is particularly active during dream-heavy REM sleep, so it seems logical that REM dreams play an active role in keeping the brain and nervous system in good working order in some way. However, it is becoming increasingly apparent that non-REM dreams may be just as important in facilitating learning as REM dreams. </span></span></p><span data-dcnode-id="322" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" style="font-weight: 400;"><span data-dcnode-id="321" instrument_node="">Experiments on rats indicate that, during non-REM sleep, neuronal activity largely mirrors the neuronal activity of tasks performed during the previous day, although abbreviated, compressed or sped up. On the other hand, in the much more detailed dreams of REM sleep (typically five times longer than non-REM dreams), brain wave activity appears almost identical to that during the original physical experiences, as though the tasks are being played out in full, but internally.</span></span></p><span data-dcnode-id="318" instrument_node="">
</span><h3 data-dcnode-id="315"><b data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Making Sense of Randomness</span></b></h3><span data-dcnode-id="314" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="312" style="font-weight: 400;"><span data-dcnode-id="313" instrument_node="">There is, though, a significant school of thought that believes that dreams do not actually serve any natural purpose and have no significant influence on our waking actions at all, but are just a random by-product of REM sleep. The peculiar nature of dreams is therefore attributable to certain parts of the brain trying to piece together a story out of what is essentially random information presented to it by the release of acetylcholine from the brainstem during REM sleep. </span></span></p><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" style="font-weight: 400;"><span data-dcnode-id="309" instrument_node="">This theory might also go some way to explaining why dream recall is so difficult, especially if the brain were to consider them non-meaningful information or “noise” that we should just forget. This idea, that dreams may be instrumental in eliminating unwanted or unnecessary information and synaptic connections, is sometimes referred to as “active unlearning”.&nbsp;</span></span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" style="font-weight: 400;"><span data-dcnode-id="305" instrument_node="">Of course, it can also be counter-argued that the way the forebrain chooses to interpret these random signals into a scenario or a story is in itself significant, and can tell us something about ourselves, in much the same way as our interpretation of a Rorschach ink-blot can.</span></span></p><span data-dcnode-id="302" instrument_node="">
</span><h2 data-dcnode-id="299"><span data-dcnode-id="300" style="font-weight: 400;"><span data-dcnode-id="301" instrument_node="">The History of Dream Research Theories</span></span></h2><span data-dcnode-id="298" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" style="font-weight: 400;"><span data-dcnode-id="297" instrument_node="">Even though we can’t say for sure what the exact role of our dreams is, scientists throughout the ages have come up with many theories.</span></span></p><span data-dcnode-id="294" instrument_node="">
</span><h3 data-dcnode-id="291"><b data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Freud and the Unconscious</span></b></h3><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="288" style="font-weight: 400;"><span data-dcnode-id="289" instrument_node="">The vast majority of Sigmund Freud’s ideas have been debunked since his popularity in the early 1900s, but in the process of debunking Freud, we have learned a lot, so it seems important to mention him nonetheless. Freud’s understanding of dreams was based on the unconscious, a part of the mind that Freud suggested housed our most base desires. According to Freud’s book on the study of dreams, </span></span><i data-dcnode-id="285"><span data-dcnode-id="286" style="font-weight: 400;"><span data-dcnode-id="287" instrument_node="">The Interpretation of Dreams</span></span></i><span data-dcnode-id="283" style="font-weight: 400;"><span data-dcnode-id="284" instrument_node="">, these desires could not be expressed in real life, so instead they appeared in our dreams.</span></span></p><span data-dcnode-id="281" instrument_node="">
</span><h3 data-dcnode-id="278"><b data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">The Activation-Synthesis Model</span></b></h3><span data-dcnode-id="277" instrument_node="">
</span></div><section class="it-container margin-wrapper" data-dcnode-id="267" style="flex-direction:row"><div class="col-md-4" data-dcnode-id="274"><img alt="activation synthesis" data-dcnode-id="275" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/activation_synthesis.jpg&amp;raw"></div><div class="col-md-8 info" data-dcnode-id="268"><div class="wysiwyg-container" data-dcnode-id="269"><p data-dcnode-id="271"><span data-dcnode-id="272" style="font-weight: 400;"><span data-dcnode-id="273" instrument_node="">The activation-synthesis model, proposed by J. Allan Hobson and Robert McClarley back in the 1970s, suggests that, as circuits in the brain become activated during REM sleep, areas of the limbic system including the amygdala and hippocampus (the parts of the brain involved in emotions, sensations and memories) also becomes active. The brain synthesizes and subjectively interprets this internal brain activity, and attempts to find meaning in the random signals, the results of which are what we call dreams.</span></span></p><span data-dcnode-id="270" instrument_node="">
</span></div></div></section><div class="wysiwyg-container" data-dcnode-id="230"><h3 data-dcnode-id="264"><b data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Long-Term Memory Excitation Theory</span></b></h3><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" style="font-weight: 400;"><span data-dcnode-id="262" instrument_node="">Eugen Tarnow developed his long-term memory excitation theory in 2003, arguing that dreams are just the brain’s internal excitations of long-term memories. This theory holds that such excitations are going on all the time, even during our waking hours, but the “reality checking” of the brain’s executive function (which takes place in the prefrontal cortex, and which is known to be actively suppressed during sleep) usually excludes them from our notice. </span></span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" style="font-weight: 400;"><span data-dcnode-id="258" instrument_node="">In some ways, this is consistent with many of Freud’s psychoanalytical ideas about dreams, with Freud’s unconscious replaced by our long-term memory.</span></span></p><span data-dcnode-id="255" instrument_node="">
</span><h3 data-dcnode-id="252"><b data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Continual-Activation Theory of Dreams</span></b></h3><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" style="font-weight: 400;"><span data-dcnode-id="250" instrument_node="">In 2004, Jie Zhang developed the continual-activation theory of dreams, which argues that dreams are part of the brain’s consolidation of working memories into long-term memories (declarative memories during non-REM sleep, and procedural memories during REM sleep). </span></span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="244"><span data-dcnode-id="245" style="font-weight: 400;"><span data-dcnode-id="246" instrument_node="">Zhang believes that both the conscious and non-conscious subsidiary systems of working memory need to be continually activated in order to maintain proper brain functioning and, when the level of activation of either subsidiary system falls below a given threshold, the brain automatically triggers the generation of a data stream from its memory stores. Dreaming is therefore merely an incidental result of the brain’s need for continual activation.</span></span></p><span data-dcnode-id="243" instrument_node="">
</span><h2 data-dcnode-id="240"><span data-dcnode-id="241" style="font-weight: 400;"><span data-dcnode-id="242" instrument_node="">What Happens When We Dream?</span></span></h2><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" style="font-weight: 400;"><span data-dcnode-id="238" instrument_node="">Whatever the underlying reasons for why dreams happen, the physiological and neurological mechanisms underpinning the act of dreaming are gradually beginning to become clearer as modern research progresses.</span></span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" style="font-weight: 400;"><span data-dcnode-id="234" instrument_node="">For a long time, researchers believed that dreams took place during the REM part of the sleep cycle, but in recent years, we’ve learned that we can dream in many stages of sleep, and some researchers even believe all of our dreams happen in a couple of microseconds as we wake up.</span></span></p><span data-dcnode-id="231" instrument_node="">
</span></div><section class="it-container margin-wrapper" data-dcnode-id="218" style="flex-direction:row"><div class="col-md-4" data-dcnode-id="228"><img alt="brain lobes" data-dcnode-id="229" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/brain_lobes.jpg&amp;raw"></div><div class="col-md-8 info" data-dcnode-id="219"><div class="wysiwyg-container" data-dcnode-id="220"><p data-dcnode-id="225"><span data-dcnode-id="226" style="font-weight: 400;"><span data-dcnode-id="227" instrument_node="">Regardless of when exactly we dream, scientists are fairly certain where in the brain dreaming takes place. One is the spot where the occipital, temporal and parietal lobes of the cerebral cortex meet and the other is the part of the frontal cortex where dopamine is the dominant neurotransmitter. Interestingly, these areas are not related to REM sleep at all. Still, whenever researchers suppress these areas of the brain, or study people who have experienced damage in these areas, dreaming is reduced or prevented entirely.</span></span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">&nbsp;</span></p><span data-dcnode-id="221" instrument_node="">
</span></div></div></section><div class="wysiwyg-container" data-dcnode-id="213"><p data-dcnode-id="215"><span data-dcnode-id="216" style="font-weight: 400;"><span data-dcnode-id="217" instrument_node="">When it comes to dreaming that occurs during the REM stage of sleep, our limbic system gets involved as well. The limbic system includes the hippocampus and amygdala, and together they are in charge of processing emotions and motivation, among other things. On the other hand, the prefrontal cortex which is involved in working memory, attention, logical reasoning and self-control, is relatively inactive during REM sleep.</span></span></p><span data-dcnode-id="214" instrument_node="">
</span></div><section class="it-container margin-wrapper" data-dcnode-id="204" style="flex-direction:row"><div class="col-md-4" data-dcnode-id="211"><img alt="limbic system" data-dcnode-id="212" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/limbic_system.jpg&amp;raw"></div><div class="col-md-8 info" data-dcnode-id="205"><div class="wysiwyg-container" data-dcnode-id="206"><p data-dcnode-id="208"><span data-dcnode-id="209" style="font-weight: 400;"><span data-dcnode-id="210" instrument_node="">Finally, it’s probably no surprise to you that your primary visual cortex is not involved in your dreams, since your eyes are closed all night. But that doesn’t mean your visual system is totally shut off at night. Actually, research has found that the extrastriate visual areas of the the occipital cortex (the area of the brain involved in sight) is highly active during REM sleep, which is probably why we can have such vivid dreams with realistic visuals.</span></span></p><span data-dcnode-id="207" instrument_node="">
</span></div></div></section><div class="wysiwyg-container" data-dcnode-id="122"><h2 data-dcnode-id="201"><span data-dcnode-id="202" style="font-weight: 400;"><span data-dcnode-id="203" instrument_node="">What Influences Our Dreams?&nbsp;</span></span></h2><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="197"><span data-dcnode-id="198" style="font-weight: 400;"><span data-dcnode-id="199" instrument_node="">You may have noticed that your dreams aren’t the same every night, and sometimes what you do during the day can have an impact on what kind of dreams you have at night. Again, we don’t have a perfect understanding of what influences our dreams (or how it does it) but we can make some well-educated guesses based on decades of research.</span></span></p><span data-dcnode-id="196" instrument_node="">
</span><h3 data-dcnode-id="193"><b data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Medical Conditions</span></b></h3><span data-dcnode-id="192" instrument_node="">
</span><p data-dcnode-id="186"><span data-dcnode-id="187" style="font-weight: 400;"><span data-dcnode-id="191" instrument_node="">There are a variety of medical conditions that can affect how we dream. For instance, conditions that affect dopamine production or require medications to suppress or boost dopamine may experience differences in dreams based on their dopamine supply. People with Parkinson’s or </span><a data-dcnode-id="189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/adhd-and-sleep-deprivation/"><span data-dcnode-id="190" instrument_node="">ADHD</span></a><span data-dcnode-id="188" instrument_node="">, two conditions that involve dopamine abnormalities, may have more dreams, fewer dreams, or their dreams may be more or less vivid.</span></span></p><span data-dcnode-id="185" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" style="font-weight: 400;"><a data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/sleep-and-mental-health/"><span data-dcnode-id="184" instrument_node="">Mental health conditions</span></a><span data-dcnode-id="182" instrument_node=""> can also have a significant impact on dreaming as well. As we mentioned before, people with depression tend to stay in REM sleep longer, which can reinforce depressive symptoms. Research also shows that people with all kinds of mood disorders, from depression to bipolar, experience more vivid dreams and more frequent nightmares.</span></span></p><span data-dcnode-id="179" instrument_node="">
</span><h3 data-dcnode-id="176"><b data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">Food and Drink Before Bed</span></b></h3><span data-dcnode-id="175" instrument_node="">
</span><p data-dcnode-id="169"><span data-dcnode-id="170" style="font-weight: 400;"><span data-dcnode-id="174" instrument_node="">We all know it’s a bad idea to drink caffeine at night because it can keep us from falling asleep, but did you know </span><a data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/caffeine-affects-sleep/"><span data-dcnode-id="173" instrument_node="">caffeine can impact your dreams</span></a><span data-dcnode-id="171" instrument_node=""> too? Technically caffeine hasn’t been shown to change the content of your dreams, like whether it’s a good dream or a bad dream, but late-night caffeine does make you more likely to remember your dreams in the morning.</span></span></p><span data-dcnode-id="168" instrument_node="">
</span><p data-dcnode-id="163"><span data-dcnode-id="164" style="font-weight: 400;"><a data-dcnode-id="166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/does-drinking-alcohol-before-bed-help-you-sleep/"><span data-dcnode-id="167" instrument_node="">Alcohol</span></a><span data-dcnode-id="165" instrument_node="">, on the other hand, might help you fall asleep, but it can actually prevent you from sleeping as deeply. Since REM sleep is not a very deep sleep, alcohol may increase the amount of dreams you have, but some research shows that they’re more likely to be bad dreams.</span></span></p><span data-dcnode-id="162" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" style="font-weight: 400;"><span data-dcnode-id="161" instrument_node="">Another factor is when you eat before bed. It doesn’t so much matter what you eat as long as it isn’t too spicy or fried, since those foods tend to keep us up longer. A big meal right before bed can raise your body temperature and metabolism, which can lead to increased REM sleep and possibly more dreaming.</span></span></p><span data-dcnode-id="158" instrument_node="">
</span><h3 data-dcnode-id="155"><b data-dcnode-id="156"><span data-dcnode-id="157" instrument_node="">Daily Activities</span></b></h3><span data-dcnode-id="154" instrument_node="">
</span><p data-dcnode-id="151"><span data-dcnode-id="152" style="font-weight: 400;"><span data-dcnode-id="153" instrument_node="">Your daily activities can have a big impact on your dreams as well. If you are relatively active throughout the day and you exercise in the morning or afternoon, you are more likely to fall asleep quickly, which gives you more time for more sleep cycles, which means more REM sleep, which means more dreams (maybe). </span></span></p><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="147"><span data-dcnode-id="148" style="font-weight: 400;"><span data-dcnode-id="149" instrument_node="">Your lifestyle might also feature in the content of your dreams. For instance, research shows that 80% of college students dream about university-related things. Whether this is part of memory consolidation or threat simulation (if school makes you anxious), we aren’t sure, but it’s clear that lifestyle can impact our dreams.</span></span></p><span data-dcnode-id="146" instrument_node="">
</span><h2 data-dcnode-id="143"><span data-dcnode-id="144" style="font-weight: 400;"><span data-dcnode-id="145" instrument_node="">Why Do We Have Nightmares?</span></span></h2><span data-dcnode-id="142" instrument_node="">
</span><p data-dcnode-id="139"><span data-dcnode-id="140" style="font-weight: 400;"><span data-dcnode-id="141" instrument_node="">As is the case with dreaming in general, we don’t have a solid grasp on what exactly causes nightmares. Nightmares are dreams with vivid and disturbing content that you remember very well when you first wake up, though the memory may fade as the day wears on. </span></span></p><span data-dcnode-id="138" instrument_node="">
</span><p data-dcnode-id="132"><span data-dcnode-id="133" style="font-weight: 400;"><span data-dcnode-id="137" instrument_node="">Some research shows that mental illnesses such as depression, anxiety and </span><a data-dcnode-id="135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/sleep-and-ptsd/"><span data-dcnode-id="136" instrument_node="">post-traumatic stress disorder (PTSD)</span></a><span data-dcnode-id="134" instrument_node=""> can increase your chances of having nightmares, but normal daily stress can also cause an increase in nightmares. If you notice that you’re having more nightmares, it may be helpful to do a soothing meditation or some relaxing yoga before bed.</span></span></p><span data-dcnode-id="131" instrument_node="">
</span><h2 data-dcnode-id="128"><span data-dcnode-id="129" style="font-weight: 400;"><span data-dcnode-id="130" instrument_node="">Summary: Why Do We Dream?</span></span></h2><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" style="font-weight: 400;"><span data-dcnode-id="126" instrument_node="">So why do we dream? Well, we can’t say for sure, but there are a lot of theories out there. Odds are none of them are completely right or wrong, but instead, they probably work with each other to explain our nighttime adventures. Future research may link them together to form one cohesive theory of dreaming, but until then, we’ll just have to keep piecing them together as best as we can.</span></span></p><span data-dcnode-id="123" instrument_node="">
