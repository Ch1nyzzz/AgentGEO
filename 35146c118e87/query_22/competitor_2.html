</span><h1 class="entry-title" data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">Prefrontal Cortex</span></h1><span data-dcnode-id="4538" instrument_node="">
</span><p class="post-meta" data-dcnode-id="4523"><span data-dcnode-id="4537" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="4534"><a data-dcnode-id="4535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/author/admin/" rel="author" title="Posts by SoP"><span data-dcnode-id="4536" instrument_node="">SoP</span></a></span><span data-dcnode-id="4533" instrument_node=""> | </span><span class="published" data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">Jan 4, 2017</span></span><span data-dcnode-id="4530" instrument_node=""> | </span><a data-dcnode-id="4528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/category/brain/" rel="category tag"><span data-dcnode-id="4529" instrument_node="">Brain</span></a><span data-dcnode-id="4527" instrument_node=""> | </span><span class="comments-number" data-dcnode-id="4524"><a data-dcnode-id="4525" href="#respond"><span data-dcnode-id="4526" instrument_node="">28 comments</span></a></span></p><span data-dcnode-id="4522" instrument_node="">
</span></div><span data-dcnode-id="4520" instrument_node=""> </span><span data-dcnode-id="4518" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3306"><span data-dcnode-id="4517" instrument_node="">
</span><div class="et-boc" data-dcnode-id="3364" id="et-boc"><span data-dcnode-id="4516" instrument_node="">
</span><div class="et-l et-l--post" data-dcnode-id="3367"><span data-dcnode-id="4515" instrument_node="">

</span><div class="et_pb_column et_pb_column_4_4 et_pb_column_0 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="3666"><span data-dcnode-id="4511" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="3681"><span data-dcnode-id="4510" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="3683"><h1 data-dcnode-id="4507" style="text-align: center;"><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="4508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="4509" instrument_node="">Prefrontal Cortex</span></a></h1><span data-dcnode-id="4506" instrument_node="">
</span><h3 data-dcnode-id="4504"><span data-dcnode-id="4505" instrument_node="">Brief Definition</span></h3><span data-dcnode-id="4503" instrument_node="">
</span><p data-dcnode-id="4484"><span data-dcnode-id="4502" instrument_node="">The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="4500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="4501" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="4499" instrument_node=""> (PFC) is the cerebral cortex covering the front part of the frontal lobe. This brain region has been implicated in planning complex cognitive behavior, personality expression, decision making, and moderating social behaviour. The basic activity of this brain region is considered to be orchestration of thoughts and actions in accordance with internal goals. The most typical psychological term for functions carried out by the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="4497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="4498" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="4496" instrument_node=""> area is executive function. Executive function relates to abilities to differentiate among conflicting thoughts, determine good and bad, better and best, same and different, future consequences of current activities, working toward a defined goal, prediction of outcomes, expectation based on actions, and social “control” (the ability to suppress urges that, if not suppressed, could lead to socially unacceptable outcomes). The frontal cortex supports concrete rule learning, while more </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="4494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/anterior/"><span data-dcnode-id="4495" instrument_node="">anterior</span></a><span data-dcnode-id="4493" instrument_node=""> regions along the </span><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anatomical_terms_of_location%23/media/File%3ARostralcaudal.svg" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4492" instrument_node="">rostro-caudal axis</span></a><span data-dcnode-id="4490" instrument_node=""> of the frontal cortex support rule learning at higher levels of abstraction. (</span><em data-dcnode-id="4488"><span data-dcnode-id="4489" instrument_node="">adapted from Wikipedia – see below for a more complete explanation</span></em><span data-dcnode-id="4487" instrument_node="">)</span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view.png"><img alt="Prefrontal_cortex_(left)_-_lateral_view" class="aligncenter size-large wp-image-16990" data-dcnode-id="4486" height="1024" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-1024x1024.png&amp;raw" srcset="https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-1024x1024.png 1024w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-150x150.png 150w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-300x300.png 300w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-1080x1080.png 1080w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view-600x600.png 600w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2015/10/Prefrontal_cortex_left_-_lateral_view.png 16 </span><h3 data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Clinical Relevance In Brief:</span></h3><span data-dcnode-id="3938" instrument_node="">
</span><ul data-dcnode-id="3906"><span data-dcnode-id="3937" instrument_node="">
</span><li data-dcnode-id="3935"><span data-dcnode-id="3936" instrument_node="">Reduced volume and interconnections of the frontal lobes with other brain regions has been observed in people diagnosed with mental disorders; those subjected to repeated stressors; suicides; those incarcerated; criminals; sociopaths; those affected by lead poisoning; and daily cannabis users.</span></li><span data-dcnode-id="3934" instrument_node="">
</span><li data-dcnode-id="3929"><span data-dcnode-id="3933" instrument_node="">Feeling guilt or remorse, and to interpret reality, may be dependent on a well-functioning </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3932" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="3930" instrument_node="">.</span></li><span data-dcnode-id="3928" instrument_node="">
</span><li data-dcnode-id="3920"><span data-dcnode-id="3927" instrument_node="">The size and number of connections in the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3926" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="3924" instrument_node=""> could relate directly to sentience, as the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3923" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="3921" instrument_node=""> in humans occupies a far larger percentage of the brain than any other animal.</span></li><span data-dcnode-id="3919" instrument_node="">
</span><li data-dcnode-id="3914"><span data-dcnode-id="3918" instrument_node="">The left and right halves of the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3917" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="3915" instrument_node=""> appear to become more interconnected in response to consistent aerobic exercise.</span></li><span data-dcnode-id="3913" instrument_node="">
</span><li data-dcnode-id="3908"><span data-dcnode-id="3912" instrument_node="">Practicing mindfulness can enhance </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3911" instrument_node="">prefrontal</span></a><span data-dcnode-id="3909" instrument_node=""> activation, which is correlated with increased well-being and reduced anxiety.</span></li><span data-dcnode-id="3907" instrument_node="">
</span></ul><span data-dcnode-id="3905" instrument_node="">
</span><p data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3902" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="3897" id="attachment_32494" style="width: 1034px"><a data-dcnode-id="3900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854.jpg"><img alt="" aria-describedby="caption-attachment-32494" class="size-large wp-image-32494" data-dcnode-id="3901" height="583" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-1024x583.jpg&amp;raw" srcset="https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-1024x583.jpg 1024w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-510x290.jpg 510w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-300x171.jpg 300w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-768x437.jpg 768w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854-1080x615.jpg 1080w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/bigstock-Female-Frontal-Lobe-Brain-Anat-77508854.jpg 2048w" width="1024"></a><p class="wp-caption-text" data-dcnode-id="3898" id="caption-attachment-32494"><span data-dcnode-id="3899" instrument_node="">Frontal Lobe Brain Anatomy. Image decade3d/bigstock.com</span></p></div><span data-dcnode-id="3896" instrument_node="">
</span><p data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3893" instrument_node="">
</span><h1 data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">Frontal lobes</span></h1><span data-dcnode-id="3890" instrument_node="">
</span><p data-dcnode-id="3885"><span data-dcnode-id="3889" instrument_node="">The frontal lobes are probably of most interest to psychotherapy interventions such as CBT because they are home to the PFC, an area vitally involved in executive functions such as concentration, organization, judgement, reasoning, decision-making, creativity, emotional regulation, social–relational abilities, and abstract thinking—in other words, all the functionality we rely on for healthy relationships with ourselves and others. We will look at the PFC separately because of its special importance to psychotherapy; however, the frontal lobes in general regulate voluntary movement, the retention of non-task-based memories that are often associated with emotions, </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dopamine/"><span data-dcnode-id="3888" instrument_node="">dopamine</span></a><span data-dcnode-id="3886" instrument_node="">-driven attention, reward motivations, and planning, to name just a few.</span></p><span data-dcnode-id="3884" instrument_node="">
</span><p data-dcnode-id="3881"><a data-dcnode-id="3882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM.png"><img alt="" class="wp-image-32495 size-large aligncenter" data-dcnode-id="3883" height="406" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM-1024x406.png&amp;raw" srcset="https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM-1024x406.png 1024w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM-510x202.png 510w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM-300x119.png 300w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM-768x304.png 768w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Screen-Shot-2017-11-18-at-1.49.10-PM.png 1047w" width="1024"></a></p><span data-dcnode-id="3880" instrument_node="">
</span><h2 data-dcnode-id="3877"><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/prefrontal-cortex/"><span data-dcnode-id="3879" instrument_node="">Prefrontal Cortex</span></a></h2><span data-dcnode-id="3876" instrument_node="">
</span><p data-dcnode-id="3868"><span data-dcnode-id="3875" instrument_node="">The PFC is the part of the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/cerebrum/"><span data-dcnode-id="3874" instrument_node="">cerebrum</span></a><span data-dcnode-id="3872" instrument_node=""> that lies directly behind the eyes and the forehead. More than any other part of the brain, this area dictates our personality, our goals, and our values. When we have a long-term goal, for example, which we are pursuing with value-congruent action, we maintain a neural representation of that goal so as to not be distracted or influenced by competing goals or alternate values (</span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/grawe-klaus/"><span data-dcnode-id="3871" instrument_node="">Grawe</span></a><span data-dcnode-id="3869" instrument_node="">, 2007). If the PFC is damaged, it affects our personalities and the ability to orient our behaviour in line with our values and goals. The PFC is vital to the sense of self and others necessary for healthy interpersonal relationships and decision making.</span></p><span data-dcnode-id="3867" instrument_node="">
</span><p data-dcnode-id="3865"><span data-dcnode-id="3866" instrument_node="">As in the case of so many discoveries in neuroscience, we often learn what a brain area can do when it becomes damaged in some way. Phineas Gage was a young, reflective, determined, and goal-oriented man who, despite his youth, had been promoted to foreman on an American railroad construction project. But in an unfortunate accident on September 13, 1848, an explosion drove a tamping rod up through the left side of his face and out the top of his head. The rod passed through and destroyed much of his left PFC. Amazingly, Gage survived, and was even speaking within minutes of the accident. He was still conscious and talking to a physician about half an hour later, having introduced himself saying, “Doctor, here is business enough for you.” Following his recovery, an early observation of a change in Gage’s personality was noted by Dr. John Harlow:</span></p><span data-dcnode-id="3864" instrument_node="">
</span><blockquote data-dcnode-id="3861"><p data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">The equilibrium or balance, so to speak, between his intellectual faculties and animal propensities, seems to have been destroyed. He is fitful, irreverent, indulging at times in the grossest profanity (which was not previously his custom), manifesting but little deference for his fellows, impatient of restraint or advice when it conflicts with his desires, at times pertinaciously obstinate, yet capricious and vacillating, devising many plans of future operations, which are no sooner arranged than they are abandoned in turn for others appearing more feasible. A child in his intellectual capacity and manifestations, he has the animal passions of a strong man. Previous to his injury, although untrained in the schools, he possessed a well-balanced mind, and was looked upon by those who knew him as a shrewd, smart business man, very energetic and persistent in executing all his plans of operation. In this regard his mind was radically changed, so decidedly that his friends and acquaintances said he was “no longer Gage”. (Harlow, 1869, pp. 13-14)</span></p></blockquote><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3857" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="3852" id="attachment_32496" style="width: 222px"><a data-dcnode-id="3855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram.jpg"><img alt="" aria-describedby="caption-attachment-32496" class="wp-image-32496 size-medium" data-dcnode-id="3856" height="300" loading="lazy" sizes="(max-width: 212px) 100vw, 212px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram-212x300.jpg&amp;raw" srcset="https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram-212x300.jpg 212w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram-510x723.jpg 510w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram-768x1089.jpg 768w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram-722x1024.jpg 722w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/Phineas_gage_-_1868_skull_diagram.jpg 1000w" width="212"></a><p class="wp-caption-text" data-dcnode-id="3853" id="caption-attachment-32496"><span data-dcnode-id="3854" instrument_node="">1868 diagram of Phineas Gage’s skull and the damaged caused by the tamping rod – by John M. Harlow</span></p></div><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3850" instrument_node="">Clearly, some important functions of Gage’s personality had been altered by his injuries, although he did become more functional and socially adaptable as the years went on. Given a structured environment in which clear sequencing of tasks was part of the rehabilitation, Gage managed to retrain his brain to regulate itself in reference to values and goals.</span></p><span data-dcnode-id="3848" instrument_node="">
</span><p data-dcnode-id="3840"><span data-dcnode-id="3847" instrument_node="">The left and right sides of the PFC have different biases, with the left side oriented more toward approach, positive goals, and emotions, and the right side specialized more in avoidance and negative emotions. It is also worth noting that the left side of the PFC hosts more </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dopamine/"><span data-dcnode-id="3846" instrument_node="">dopamine</span></a><span data-dcnode-id="3844" instrument_node=""> receptors/activity (associated with motivation and reward), while the right has greater </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/norepinephrine/"><span data-dcnode-id="3843" instrument_node="">norepinephrine</span></a><span data-dcnode-id="3841" instrument_node=""> activity (associated with anxiety). Individuals who appear to have a bias toward positive emotions may have a more activated left PFC, whereas right PFC activation is correlated with more negative emotional experiences. Any suggestion of a clear binary division is an oversimplification, as the experience of positive or negative emotions does not hinge purely on left/right PFC activation, but there is nonetheless evidence of a strong correlation.</span></p><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3831"><span data-dcnode-id="3838" instrument_node="">In studies of the neural correlates of </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/depression/"><span data-dcnode-id="3837" instrument_node="">depression</span></a><span data-dcnode-id="3835" instrument_node="">, it has been found that left PFC activity is underactive relative to right PFC activity. It seems that less access to the positive bias of the left PFC may make it more difficult for the depressed individual to engage in positive goal-oriented thought and behaviour. Similarly, the left PFC is more responsive to rewards than the right PFC, which is more responsive to punishment. Studies have found that the depressed individual is generally more sensitive to what may be perceived as punishment and does not respond as well to rewards. Moreover, the relative underactivation of the whole PFC in depressed individuals could account for them having less motivation for planning, problem solving, creativity, and so forth. In </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/depression/"><span data-dcnode-id="3834" instrument_node="">depression</span></a><span data-dcnode-id="3832" instrument_node="">, not only is there underactivation of the PFC, but its volume has been found to be reduced as well. A depressed person with an underactive PFC of reduced volume is not going to demonstrate the rational problem solving abilities of someone without such deficits—the neural integrity to support such resilience is simply not there. This is where the active, approach-oriented and positively biased PFC of a therapist can be of great value to the depressed client. We will discuss the supportive right brain-to-right brain activity of therapy further when we address specific psychopathologies.</span></p><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3827"><strong data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">The PFC has been divided into a number of functionally distinct regions, described below.</span></strong></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3787"><strong data-dcnode-id="3822"><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3825" instrument_node="">Dorsolateral prefrontal cortex (DLPFC)</span></a><span data-dcnode-id="3823" instrument_node="">.</span></strong><span data-dcnode-id="3821" instrument_node=""> The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3820" instrument_node="">DLPFC</span></a><span data-dcnode-id="3818" instrument_node=""> is the topmost part of the PFC and is considered to have overall management of cognitive processes such as planning, cognitive flexibility, and working memory. This is an area specialising in problem solving and how to direct and maintain attention to a task. When we are focused on what is happening now, our working memory is engaged with the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3817" instrument_node="">DLPFC</span></a><span data-dcnode-id="3815" instrument_node=""> and connecting with the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/hippocampus/"><span data-dcnode-id="3814" instrument_node="">hippocampus</span></a><span data-dcnode-id="3812" instrument_node=""> for the retrieval and consolidation of long-term explicit memories. A dysfunction in this area may lead to problems with working memory, processing in the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/hippocampus/"><span data-dcnode-id="3811" instrument_node="">hippocampus</span></a><span data-dcnode-id="3809" instrument_node="">, and long-term memory, as well as the integration of verbal expression with emotions. Such memory deficits have been associated with PTSD due to an underactive left </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3808" instrument_node="">DLPFC</span></a><span data-dcnode-id="3806" instrument_node="">. Other </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3805" instrument_node="">DLPFC</span></a><span data-dcnode-id="3803" instrument_node=""> deficits can manifest as a lack of spontaneity and affect (flat rather than negative), and attention deficit—due to an inability to maintain sufficient attention to see a task through to completion. In obsessive–compulsive disorder (which we will consider separately in a later section the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3802" instrument_node="">DLPFC</span></a><span data-dcnode-id="3800" instrument_node=""> plays an important role in strengthening attentional skills to momentarily break the compulsion circuit and give the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3799" instrument_node="">orbitofrontal</span></a><span data-dcnode-id="3797" instrument_node=""> cortex a chance to inhibit the runaway activation of the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/amygdala/"><span data-dcnode-id="3796" instrument_node="">amygdala</span></a><span data-dcnode-id="3794" instrument_node="">. As with many brain regions, there are significant hemispherical differences within the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3793" instrument_node="">dorsolateral prefrontal cortex</span></a><span data-dcnode-id="3791" instrument_node="">, the left </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3790" instrument_node="">DLPFC</span></a><span data-dcnode-id="3788" instrument_node=""> being associated with approach behaviours and the right with more avoidant behaviours.</span></p><span data-dcnode-id="3786" instrument_node="">
</span><p data-dcnode-id="3784"><span data-dcnode-id="3785" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3783" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="3766" id="attachment_32497" style="width: 310px"><a data-dcnode-id="3781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial.png"><img alt="" aria-describedby="caption-attachment-32497" class="size-medium wp-image-32497" data-dcnode-id="3782" height="243" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-300x243.png&amp;raw" srcset="https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-300x243.png 300w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-510x413.png 510w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-768x623.png 768w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-1024x830.png 1024w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial-1080x876.png 1080w, https://www.thescienceofpsychotherapy.com/wp-content/uploads/2017/11/ventromedial.png 1596w" width="300"></a><p class="wp-caption-text" data-dcnode-id="3767" id="caption-attachment-32497"><span data-dcnode-id="3780" instrument_node="">The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventromedial-prefrontal-cortex-vmpfc/"><span data-dcnode-id="3779" instrument_node="">ventromedial prefrontal cortex</span></a><span data-dcnode-id="3777" instrument_node=""> helps us make decisions based on the bigger picture gathered from connections to the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/amygdala/"><span data-dcnode-id="3776" instrument_node="">amygdala</span></a><span data-dcnode-id="3774" instrument_node="">, temporal lobe, </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventral/"><span data-dcnode-id="3773" instrument_node="">ventral</span></a><span data-dcnode-id="3771" instrument_node=""> segmental area, olfactory system, and the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/thalamus/"><span data-dcnode-id="3770" instrument_node="">thalamus</span></a><span data-dcnode-id="3768" instrument_node="">.</span></p></div><span data-dcnode-id="3765" instrument_node="">
</span><p data-dcnode-id="3726"><strong data-dcnode-id="3758"><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3764" instrument_node="">Orbitofrontal</span></a><span data-dcnode-id="3762" instrument_node=""> cortex (</span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3761" instrument_node="">OFC</span></a><span data-dcnode-id="3759" instrument_node="">).</span></strong><span data-dcnode-id="3757" instrument_node=""> The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3756" instrument_node="">OFC</span></a><span data-dcnode-id="3754" instrument_node="">, like the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/dorsolateral-prefrontal-cortex-dlpfc/"><span data-dcnode-id="3753" instrument_node="">DLPFC</span></a><span data-dcnode-id="3751" instrument_node="">, is involved in the cognitive processing of decision making; however, because of its close connection with the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/limbic-system/"><span data-dcnode-id="3750" instrument_node="">limbic system</span></a><span data-dcnode-id="3748" instrument_node="">, it is particularly associated with our ability to make decisions based on emotional information. The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3747" instrument_node="">OFC</span></a><span data-dcnode-id="3745" instrument_node=""> also plays a major role in forming social attachments and regulating emotions. This region can be thought of as a convergence zone for sensory and emotional information, effectively integrating external and internal worlds. Social information is processed and used to guide us in our perceptions and interactions, and the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3744" instrument_node="">OFC</span></a><span data-dcnode-id="3742" instrument_node=""> plays an important role in the interpretation of these complex social interactions, including, for example, the ability to understand a joke. The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3741" instrument_node="">OFC</span></a><span data-dcnode-id="3739" instrument_node=""> may help us predict the reactions of others and modulate our behaviour accordingly. When there is a dysfunction in the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3738" instrument_node="">orbitofrontal</span></a><span data-dcnode-id="3736" instrument_node=""> cortex, the normal cortical–subcortical modulation is not optimal—as is likely the case in borderline personality disorder (Schore, 2012). As with other areas of the PFC, the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3735" instrument_node="">OFC</span></a><span data-dcnode-id="3733" instrument_node=""> has hemispherical differences. The left </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3732" instrument_node="">OFC</span></a><span data-dcnode-id="3730" instrument_node=""> is associated with positive emotions, while the right </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3729" instrument_node="">OFC</span></a><span data-dcnode-id="3727" instrument_node=""> is associated with more negative emotions.</span></p><span data-dcnode-id="3725" instrument_node="">
</span><p data-dcnode-id="3698"><strong data-dcnode-id="3721"><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventromedial-prefrontal-cortex-vmpfc/"><span data-dcnode-id="3724" instrument_node="">Ventromedial prefrontal cortex (vmPFC)</span></a><span data-dcnode-id="3722" instrument_node="">.</span></strong><span data-dcnode-id="3720" instrument_node=""> This part of the PFC helps us make decisions based on the bigger picture gathered from connections to the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/amygdala/"><span data-dcnode-id="3719" instrument_node="">amygdala</span></a><span data-dcnode-id="3717" instrument_node="">, temporal lobe, </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventral/"><span data-dcnode-id="3716" instrument_node="">ventral</span></a><span data-dcnode-id="3714" instrument_node=""> segmental area, olfactory system, and the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/thalamus/"><span data-dcnode-id="3713" instrument_node="">thalamus</span></a><span data-dcnode-id="3711" instrument_node="">. It is very well connected, receiving and sending a lot of information that influences many brain regions, including the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/amygdala/"><span data-dcnode-id="3710" instrument_node="">amygdala</span></a><span data-dcnode-id="3708" instrument_node="">. The </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventromedial-prefrontal-cortex-vmpfc/"><span data-dcnode-id="3707" instrument_node="">vmPFC</span></a><span data-dcnode-id="3705" instrument_node=""> plays an important role with the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/orbitofrontal-prefrontal-cortex-ofc/"><span data-dcnode-id="3704" instrument_node="">OFC</span></a><span data-dcnode-id="3702" instrument_node=""> in regulating our emotions, especially in social situations. It is also vital for personal and social decision making and the ability to learn from our mistakes. Our capacity to make judgements and allow our emotions to assist in decision making is mediated by this region of the brain. Activation of the </span><a class="wpg-linkify wpg-tooltip tooltipstered" data-dcnode-id="3700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thescienceofpsychotherapy.com/glossary/ventromedial-prefrontal-cortex-vmpfc/"><span data-dcnode-id="3701" instrument_node="">vmPFC</span></a><span data-dcnode-id="3699" instrument_node=""> is also associated with courage, suppression of negative emotions, compassion, shame, and guilt.</span></p><span data-dcnode-id="3697" instrument_node="">
</span><p data-dcnode-id="3684"><span data-dcnode-id="3696" instrument_node="">&nbsp;</span><br data-dcnode-id="3695"><span data-dcnode-id="3694" instrument_node="">

</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">Hello Viraj,</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1897" instrument_node="">Thank you for posing such interesting questions. These are all probably too complex to answer in a forum and I think there are a number of specialists that you need to search out for deep responses. As an overarching comment, I would like to remember that things don’t happen in isolation nor in a linear fashion. There is always a complexity from which various things, including behavior, emerges. Why it is that some men rape and others don’t will include their neural activity, but in the context of their history, culture and also possible neuropathology. How people respond in later like to the impact of their experience along the way is interesting and requires much thought. How much of our behavior and our thinking is fundamental and how much is a response to a long history. I encourage you to continue to find what might be the connecting thread between your comments. They are connected a the moment because you are thinking them. why are these the collection of ideas and activities that you notice and gather together? There will be fascinating and perhaps wonderful answers in your deliberations. Best wishes </span><img alt="🙂" class="emoji" data-dcnode-id="1896" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="1894" instrument_node="">

</span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Hi Billie-Jo – The prefrontal cortex is certainly implicated in symptoms of schizophrenia. Many studies have shown differences in the prefrontal cortex of those with schizophrenia compared to those without. Differences like reduced connectivity between the amygdala and medial-prefrontal cortex when trying to work out the emotions on faces, deficits in dopamine release, and deficits in the  connectivity between the hippocampus and the prefrontal cortex (just to name a few). There are hundreds of papers looking just at differences in the PFC and schizophrenia symptoms. Suffice it to say that the PFC differences do play an important role in producing symptoms.</span></p><span data-dcnode-id="1436" instrument_node="">

</span><p data-dcnode-id="1356"><span data-dcnode-id="1359" instrument_node="">Greetings, Dr Dahlitz.</span><br data-dcnode-id="1358"><span data-dcnode-id="1357" instrument_node="">
As a psychologist, I find the mapping of the brain fascinating. The practical application of accrued knowledge to the field of psychotherapy, however, engages me much less. I cannot see how it can direct a therapists approach to a client, allowing of course for extreme cases of, eg, demonstrable brain injury or abnormal behaviour, given the vast number of variables contributing to episodes of behaviour and the vast number of cerebral connections in play. Don’t you think that psychotherapy will always be closer to an art, scientifically informed of course, rather than a text book exercise.</span></p><span data-dcnode-id="1355" instrument_node="">

</span><div class="wpd-comment-text" data-dcnode-id="1243"><span data-dcnode-id="1258" instrument_node="">
</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Hi Dan – Great point. The direct application may not be an obvious nor linear one, nevertheless I find there is an application of accrued scientific knowledge to the field of psychotherapy over time that better informs psychotherapy (take Bruce Ecker and his memory reconsolidation as a case in point). And it is “accrued” – I’d be the first to admit that just knowing the names and functions of a few brain parts is unlikely to make you a good therapist. At the very least it gives us more empathy and insight into why a client is behaving the way they are and in my experience gives them something scientific to make sense of their experience. But that is at the very least – at the pointy end of the stick an understanding of brain function (or whole body function for that matter) can well inform the psychotherapist as to the best intervention for the moment for the particular client, rather than mindlessly gravitating to the same tools for everyone – I think it makes you more artful in practice. From mapping the connections in the brain to an understanding of the genome, the immune system, gut health, heart-brain dynamics, and a whole range of other scientific discoveries over the last couple of decades has very much informed the way we approach mental health in general – granted the actual practice has to catch up. I agree with you that psychotherapy is not a text book exercise and is an art, but as you say, a scientifically informed practice of art.  </span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">The leading edge of science is often perceived as a mere fascination with little practical application – but in time, like a jig-saw puzzle, it comes together to provide the foundation of all practical application. </span></p><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Oh and I’m not a Dr. or a PhD – I’ve a couple of masters degrees but never had the focus of attention to do a PhD – my interests are too broad. </span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1245"><span data-dcnode-id="1248" instrument_node="">Kind regards,</span><br data-dcnode-id="1247"><span data-dcnode-id="1246" instrument_node="">
Matt</span></p><span data-dcnode-id="1244" instrument_node="">

</span><p data-dcnode-id="831"><span data-dcnode-id="842" instrument_node="">Amazing article this helped me a lot. It is very informative, although my vocabulary is not so great, I had used google for help. I think if you want to change your own behavior you should understand how your brain works, this did exactly that for me. I am trying to change my compulsive behavior (constantly checking my phone/social media, drugs, and entertainment).</span><br data-dcnode-id="841"><span data-dcnode-id="840" instrument_node="">
After practicing mindfulness, its much easier to take a moment, and realize you are indulging and quickly exit the behavior.</span><br data-dcnode-id="839"><span data-dcnode-id="838" instrument_node="">
I think strengthening my prefrontal cortex will be my first step to changing my life to happiness.</span><br data-dcnode-id="837"><span data-dcnode-id="836" instrument_node="">
take aways *do aerobic exercise</span><br data-dcnode-id="835"><span data-dcnode-id="834" instrument_node="">
*being mindful</span><br data-dcnode-id="833"><span data-dcnode-id="832" instrument_node="">
Thank you for this, I was extremely interested in science when I was younger but my environment “grew” me out of it. This article made me remember the young “scientist” I was, and how beautiful and complex but also at the same time, simple our world is.</span></p><span data-dcnode-id="830" instrument_node="">

</span><p data-dcnode-id="673"><span data-dcnode-id="676" instrument_node="">Hello,</span><br data-dcnode-id="675"><span data-dcnode-id="674" instrument_node="">
Could anybody say how the functioning of the prefrontal cortex can be effected by regular practise of the Wim Hof Method (Deep breathing followed by cessation of, for as long as possible, Ice cold showers/Baths, Physical exercises).  From my unsteranding of what Mr Hof say’s, the insula does the interoception, it observes what is going on in the body,  and the PFC makes decisions about what it thinks the body needs.  Using focus you can experience consiousness of the insula and communicate with your body and influence and train the body responses.  When I did the cessation of breath, it started off calm and focused.  Then you can experience the body calling for more oxygen,  it starts as a whisper that can be easily overridden and the call gets louder and you have to breathe.  Is this training the PFC to be less reactive and respond to insula. Does this lessen OCD and anxiety.  It feels like there  is a part of the brain that promotes calmness (insula) and a part that promotes survival.  Any thoghts?</span></p><span data-dcnode-id="672" instrument_node="">
