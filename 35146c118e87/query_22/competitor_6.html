</span><p class="mb0 w100pc float_left mt15" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Two raters who were blind to the group each participant was assigned to as well as the purpose of the study coded the written free responses of the participants. Responses were coded as a “1” if the written text mentioned at least one of the following terms: “sorry for,” “sad,” “sympathy/sympathetic,” and/or “compassion/compassionate.” Responses were coded as a “0” if the participant did not reference any of these terms. In the group of patients with damage to the vmPFC, seven out of the eight patients’ responses were coded as a “1” in response to the empathy condition. Similarly, in the BDC group, seven out of the eight patients’ responses were coded as a “1” and in the NC group, all eight participants were coded as a “1.” (There was perfect agreement among the raters in their coding of the written responses). Some examples of the free responses of the patients with damage to the vmPFC are, “Sad person since son’s death; could not connect with wife’s feelings now; desperately looking for help,” and, “Sympathy for losing a loved one; compassion for what he is experiencing.”</span></p><span data-dcnode-id="1915" instrument_node="">
</span><h4 data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Manipulation Check</span></h4><span data-dcnode-id="1912" instrument_node="">
</span><p class="mb0" data-dcnode-id="1898"><span data-dcnode-id="1911" instrument_node="">A manipulation check was used to determine the degree to which participants believed the experiment (i.e., whether participants believed that the opponents they overheard during the experiment through the intercom were actual participants). This manipulation check demonstrated that the groups did not significantly differ on the believability measure [</span><i data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">X</span></i><span data-dcnode-id="1908" instrument_node="">(2) = 0.87, </span><i data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">p</span></i><span data-dcnode-id="1905" instrument_node=""> = 0.65; Benjamini–Hochberg </span><i data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">p</span></i><span data-dcnode-id="1902" instrument_node="">-value = 0.82]. For additional information about the believability results and questionnaire, see Figure </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1901" instrument_node="">2</span></a><span data-dcnode-id="1899" instrument_node="">C and Section “Materials and Methods.”</span></p><span data-dcnode-id="1897" instrument_node="">
</span><h4 data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">State Emotion</span></h4><span data-dcnode-id="1894" instrument_node="">
</span><p class="mb0" data-dcnode-id="1853"><span data-dcnode-id="1893" instrument_node="">There were no significant group differences after a false discovery rate correction in any of the emotions measured in response to the experimental conditions which included sadness, personal distress, hostility, and joviality [sadness: </span><i data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">X</span></i><span data-dcnode-id="1890" instrument_node="">(2) = 2.87, </span><i data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">p</span></i><span data-dcnode-id="1887" instrument_node=""> = 0.24; Benjamini–Hochberg </span><i data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">p</span></i><span data-dcnode-id="1884" instrument_node="">-value = 0.59; personal distress: </span><i data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">X</span></i><span data-dcnode-id="1881" instrument_node="">(2) = 0.87, </span><i data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">p</span></i><span data-dcnode-id="1878" instrument_node=""> = 0.65, Benjamini–Hochberg </span><i data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">p</span></i><span data-dcnode-id="1875" instrument_node="">-value = 0.97; hostility: </span><i data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">X</span></i><span data-dcnode-id="1872" instrument_node="">(2) = 4.17, </span><i data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">p</span></i><span data-dcnode-id="1869" instrument_node=""> = 0.12, Benjamini–Hochberg </span><i data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">p</span></i><span data-dcnode-id="1866" instrument_node="">-value = 0.53; joviality: </span><i data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">X</span></i><span data-dcnode-id="1863" instrument_node="">(2) = 1.12, </span><i data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">p</span></i><span data-dcnode-id="1860" instrument_node=""> = 0.57, Benjamini–Hochberg </span><i data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">p</span></i><span data-dcnode-id="1857" instrument_node="">-value = 0.79; (Table </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1856" instrument_node="">3</span></a><span data-dcnode-id="1854" instrument_node="">)].</span></p><span data-dcnode-id="1852" instrument_node="">
</span><h4 data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Trait Empathy and Accuracy of Assessing Others’ Intentions</span></h4><span data-dcnode-id="1849" instrument_node="">
</span><p class="mb15" data-dcnode-id="1805"><span data-dcnode-id="1848" instrument_node="">Groups were compared on their self-reported trait empathy (cognitive—IRI Perspective Taking subscale; emotional—IRI Empathic Concern subscale), and their theory of mind performance (Table </span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1847" instrument_node="">3</span></a><span data-dcnode-id="1845" instrument_node="">; see Materials and Methods). In addition, family members completed the trait questionnaire about the participants, as a means of comparison. This analysis revealed no significant differences between the groups in self-reported trait empathy by the participants after false discovery rate correction [IRI-EC: </span><i data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">X</span></i><span data-dcnode-id="1842" instrument_node="">(2) = 2.07, </span><i data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">p</span></i><span data-dcnode-id="1839" instrument_node=""> = 0.36; Benjamini–Hochberg </span><i data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">p</span></i><span data-dcnode-id="1836" instrument_node="">-value = 0.68; IRI-PT: </span><i data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">X</span></i><span data-dcnode-id="1833" instrument_node="">(2) = 1.31, </span><i data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">p</span></i><span data-dcnode-id="1830" instrument_node=""> = 0.52, Benjamini–Hochberg </span><i data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">p</span></i><span data-dcnode-id="1827" instrument_node="">-value = 0.79]. There were also no significant differences between the groups after false discovery rate correction in family members’ reports of participants’ trait empathy [Table </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="1826" instrument_node="">3</span></a><span data-dcnode-id="1824" instrument_node="">; IRI-EC: </span><i data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">X</span></i><span data-dcnode-id="1821" instrument_node="">(2) = 3.16, </span><i data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">p</span></i><span data-dcnode-id="1818" instrument_node=""> = 0.21, Benjamini–Hochberg </span><i data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">p</span></i><span data-dcnode-id="1815" instrument_node="">-value = 0.59; IRI-PT: </span><i data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">X</span></i><span data-dcnode-id="1812" instrument_node="">(2) = 3.89, </span><i data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">p</span></i><span data-dcnode-id="1809" instrument_node=""> = 0.14, Benjamini–Hochberg </span><i data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">p</span></i><span data-dcnode-id="1806" instrument_node="">-value = 0.53].</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p class="mb0" data-dcnode-id="1784"><span data-dcnode-id="1803" instrument_node="">Next, the groups were compared on their accuracy scores in the theory of mind task (Social Faux Pas Task) which measures one’s ability to detect the motivations and intentions of others through written scenarios. This task includes a theory of mind condition (i.e., accuracy of determining others’ intentions) and a control condition (i.e., accuracy of basic reasoning skills). When comparing the performance accuracy of the groups on the theory of mind condition, there was no significant effect of group after correction for false discover rate [Theory of mind condition: </span><i data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">X</span></i><span data-dcnode-id="1800" instrument_node="">(2) = 5.82, </span><i data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">p</span></i><span data-dcnode-id="1797" instrument_node=""> = 0.05, Benjamini–Hochberg </span><i data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">p</span></i><span data-dcnode-id="1794" instrument_node="">-value = 0.48]. There were also no significant group differences in the control condition after correction for false discovery rate [Control condition: </span><i data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">X</span></i><span data-dcnode-id="1791" instrument_node="">(2) = 1.11, </span><i data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">p</span></i><span data-dcnode-id="1788" instrument_node=""> = 0.58, Benjamini–Hochberg </span><i data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">p</span></i><span data-dcnode-id="1785" instrument_node="">-value = 0.79].</span></p><span data-dcnode-id="1783" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1782" id="h5"></a><h2 data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">Discussion</span></h2><span data-dcnode-id="1779" instrument_node="">
</span><p class="mb15" data-dcnode-id="1756"><span data-dcnode-id="1778" instrument_node="">For the first time, we experimentally demonstrated that patients with damage to the vmPFC behaved with little empathy in a financial context towards a man who is suffering. This corroborates clinical case studies reporting that patients with damage to the vmPFC behave with reduced empathy toward family members (</span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="1777" instrument_node="">40</span></a><span data-dcnode-id="1775" instrument_node="">, </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="1774" instrument_node="">41</span></a><span data-dcnode-id="1772" instrument_node="">, </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="1771" instrument_node="">49</span></a><span data-dcnode-id="1769" instrument_node="">). Furthermore, we also advance the literature by demonstrating that patients with damage to the vmPFC obtained more money than comparison groups in the UG when witnessing another person suffering. This is in contrast to previous studies which found that patients with damage to the vmPFC achieved poorer financial outcomes than comparison participants in decision making games, such as the Iowa Gambling Task (</span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="1768" instrument_node="">11</span></a><span data-dcnode-id="1766" instrument_node="">, </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="1765" instrument_node="">12</span></a><span data-dcnode-id="1763" instrument_node="">). The findings of the present study are consistent with research suggesting that the vmPFC plays an important role in using contextual information to guide decision making (</span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="1762" instrument_node="">50</span></a><span data-dcnode-id="1760" instrument_node="">, </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="1759" instrument_node="">51</span></a><span data-dcnode-id="1757" instrument_node="">).</span></p><span data-dcnode-id="1755" instrument_node="">
</span><p class="mb15" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">Patients with damage to the vmPFC showed significantly less empathic behavior towards a person who was suffering. Specifically, the patients with damage to the vmPFC did not give more money to the man who was suffering than to the man in the control condition. In stark contrast, the comparison groups gave more money to the man who was suffering than to the man in the control condition. However, behaving with less empathic behavior than the comparison groups actually benefited the patients with damage to the vmPFC financially, as they received higher rather than lower financial payoffs than comparison participants.</span></p><span data-dcnode-id="1752" instrument_node="">
</span><p class="mb15" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Determining whether a financial decision is advantageous or not depends not only on the financial outcome, but also on the social consequences that may result. For instance, imagine the situation in which your mother cannot afford her chemotherapy treatments. You decide to help pay for her chemotherapy treatments, even though this decision could negatively impact your financial situation out of concern for her well-being which may in turn result in increased relationship quality. Therefore, healthy adults may choose to forego financial gain in order to achieve greater social rewards. On the other hand, imagine if an individual acted in a manner similar to the patients with vmPFC damage in the current study where they decided to pay very little for the chemotherapy treatments. Although this would result in better financial outcomes for the patient, it could severely and negatively impact their relationship with their mother. Therefore, advantageous financial decision making in social contexts is likely to require making decisions that are likely to facilitate social relationships, even if finances are negatively impacted.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p class="mb15" data-dcnode-id="1729"><span data-dcnode-id="1748" instrument_node="">The lower empathic behavior of patients with damage to the vmPFC in the present study may contribute to their difficulties making and maintaining relationships that are often highlighted in case reports (</span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1747" instrument_node="">8</span></a><span data-dcnode-id="1745" instrument_node="">, </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1744" instrument_node="">9</span></a><span data-dcnode-id="1742" instrument_node="">, </span><a data-dcnode-id="1740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1741" instrument_node="">52</span></a><span data-dcnode-id="1739" instrument_node="">). Anderson and colleagues studied two cases of patients with damage to the vmPFC and noticed that they both had few friends, mentioning that in the case of Patient B the, “lack of friends was conspicuous,” (</span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="1738" instrument_node="">52</span></a><span data-dcnode-id="1736" instrument_node="">). Furthermore, there is other anecdotal evidence that patients with damage to the vmPFC have difficulty maintaining relationships, such as in the case of seminal patient EVR, who went through a divorce after 17 years of marriage (</span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="1735" instrument_node="">8</span></a><span data-dcnode-id="1733" instrument_node="">), and in another case study of a patient who had already been divorced by 21 years of age (</span><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="1732" instrument_node="">9</span></a><span data-dcnode-id="1730" instrument_node="">). Because of the important role of empathic behavior in maintaining and nurturing relationships, it is likely that difficulty showing empathic behavior toward others could have a negative impact on one’s personal relationships.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p class="mb15" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">The results in the present study also provide new information about how patients with damage to the vmPFC perceive and experience empathy-eliciting situations. We report that patients with damage to the vmPFC did not significantly differ from the comparison groups in their experience of “in the moment” empathy in response to an empathy induction involving exposure to another person’s suffering. However, it should be noted that our study’s small sample size prevented us from establishing statistically significant equivalence between the groups. Consequently, at this time, we cannot determine whether the patients with damage to the vmPFC have lower or equivalent levels of state empathy relative to the comparison groups. Our exploratory free response analyses suggest that the majority of patients with damage to the vmPFC are aware that they were exposed to an empathy-eliciting situation, as seven out of the eight patients reported that they felt “sorry for,” “sad,” “sympathy/sympathetic,” and/or “compassion/compassionate” in response to the empathy induction. However, we note that despite this reported awareness of the empathic content, this was not sufficient for the patients with damage to the vmPFC to behave in an empathic manner. Taken together, our findings suggest that future studies are needed to tease apart this important question as to whether patients with damage to the vmPFC have lower state empathy than healthy adults in response to empathy-eliciting events.</span></p><span data-dcnode-id="1725" instrument_node="">
</span><p class="mb15" data-dcnode-id="1714"><span data-dcnode-id="1724" instrument_node="">The patients with damage to the vmPFC in our sample did not significantly differ from the comparison groups in their ability to accurately detect the intentions of others in a separate theory of mind task. A previous study of patients with damage to the vmPFC focused on patients’ reports of trait empathy and found that there is evidence for lower reported cognitive empathy than healthy adults of comparable demographics (</span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="1723" instrument_node="">38</span></a><span data-dcnode-id="1721" instrument_node="">). However, a key difference between the present study and study by Shamay-Tsoory and colleagues is that their sample of patients with damage to the vmPFC included a large proportion of closed head injury cases which could have had more diffuse brain damage. In contrast, the present sample does not include any closed head injury cases. Furthermore, in the present study, we did not find significant group differences in accuracy on the theory of mind task which would provide further support that their ability to discern others’ intentions is relatively intact. Previous studies of theory of mind in patients with damage to the vmPFC have found mixed evidence about whether they have difficulty detecting others’ intentions and motivations (</span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="1720" instrument_node="">53</span></a><span data-dcnode-id="1718" instrument_node="">, </span><a data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1717" instrument_node="">54</span></a><span data-dcnode-id="1715" instrument_node="">).</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p class="mb15" data-dcnode-id="1693"><span data-dcnode-id="1712" instrument_node="">It is relevant to discuss our findings in the context of important theories of vmPFC function [for review see Ref. (</span><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="1711" instrument_node="">55</span></a><span data-dcnode-id="1709" instrument_node="">)]. The somatic marker hypothesis proposes the role of the vmPFC as a secondary inducer, or a higher order emotional response that helps to guide decision making (</span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="1708" instrument_node="">17</span></a><span data-dcnode-id="1706" instrument_node="">, </span><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="1705" instrument_node="">18</span></a><span data-dcnode-id="1703" instrument_node="">). Roy and colleagues highlight an important role for the vmPFC in affective meaning (</span><a data-dcnode-id="1701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1702" instrument_node="">56</span></a><span data-dcnode-id="1700" instrument_node="">). In particular, they suggest that the vmPFC plays a role in behavioral responses to higher order conceptual levels of emotion, rather than lower order simple emotional responses (</span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="1699" instrument_node="">56</span></a><span data-dcnode-id="1697" instrument_node="">). The role for the vmPFC in insight and reflection has also been pointed out by Koenigs et al. (</span><a data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="1696" instrument_node="">57</span></a><span data-dcnode-id="1694" instrument_node="">) who suggested that this region plays an important function in reflecting on one’s emotional state and how it may affect others. Our results suggest that the vmPFC is important for behaving in an empathic manner in response to a financial context in which another person is suffering. We find preliminary evidence that despite seven out of eight patients reporting that they are aware of the empathic context, they did not show empathic behavior, suggesting that they have difficulty using this type of information to guide their empathic behavior.</span></p><span data-dcnode-id="1692" instrument_node="">
</span><p class="mb15" data-dcnode-id="1672"><span data-dcnode-id="1691" instrument_node="">In the financial domain, previous studies have established that the vmPFC is critical for advantageous financial decisions, whether in the context of the Iowa Gambling Task (</span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="1690" instrument_node="">15</span></a><span data-dcnode-id="1688" instrument_node="">, </span><a data-dcnode-id="1686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="1687" instrument_node="">16</span></a><span data-dcnode-id="1685" instrument_node="">), or the UG (</span><a data-dcnode-id="1683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="1684" instrument_node="">57</span></a><span data-dcnode-id="1682" instrument_node="">). In both cases, patients with vmPFC damage act differently than normal healthy adults, and fail to use emotional information in an advantageous way to guide financial behavior. In the present study, the patients with damage to the vmPFC appear to be aware of the empathy-eliciting context but behave with lower empathy than the comparison groups. However, as a result, they also have greater payoffs in the game. Consequently, it suggests that the vmPFC may be important for using contextual information in a socially advantageous manner, such as showing empathy toward others in need, or regulating one’s anger when someone rejects your offers in the UG. This interpretation is in line with Koenigs et al.’s (</span><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="1681" instrument_node="">57</span></a><span data-dcnode-id="1679" instrument_node="">) discussion of the important role for the vmPFC in self-reflection about one’s emotions and the consequences of their behavior. Although the present study focuses on the financial domain, the vmPFC may serve similar functions in non-financial contexts. This is seen in their failure to use emotional context in a socially advantageous manner in moral scenarios, as patients with vmPFC damage exhibit utilitarian type behavior (</span><a data-dcnode-id="1677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="1678" instrument_node="">58</span></a><span data-dcnode-id="1676" instrument_node="">) and socially inappropriate behaviors (</span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="1675" instrument_node="">59</span></a><span data-dcnode-id="1673" instrument_node="">). In summary, the present study adds to the growing literature on the role of the vmPFC in social decision making in financial and non-financial contexts.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><p class="mb15" data-dcnode-id="1654"><span data-dcnode-id="1670" instrument_node="">This study has limitations. The measure of empathic feelings in this study was self-report which can be influenced by concerns for social desirability. To attempt to address this issue, we also collected ratings from the family members about the patients’ empathy, as a form of corroboration. We found that the family members’ ratings did not significantly differ across the participant groups, which provides support for the accuracy of the patient ratings. In the present study, we cannot directly address the question of whether the empathy that the patients with damage to the vmPFC felt in response to the empathy induction was similar to or more extreme than the level of empathy they may experience in their daily lives. To answer this question, future studies may compare patient ratings of empathy in real time in their daily lives vs. laboratory-based empathy inductions. Because patients with focal damage to the vmPFC are rare, our sample size is smaller than that of studies focusing on healthy adults. However, the size of our sample is consistent with other studies on patients with damage to the vmPFC [e.g., </span><i data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">N</span></i><span data-dcnode-id="1667" instrument_node=""> = 7, (</span><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="1666" instrument_node="">6</span></a><span data-dcnode-id="1664" instrument_node="">); </span><i data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">N</span></i><span data-dcnode-id="1661" instrument_node=""> = 8, (</span><a data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="1660" instrument_node="">58</span></a><span data-dcnode-id="1658" instrument_node="">)]. Because the inductions were not counterbalanced in the present study, there is the possibility of an order effect. In a different study of healthy younger and older adults, we counterbalanced the order of a similar empathy induction and neutral induction (this one used a series of notes rather than audio recordings) and found no significant effects of order. This suggests that in a similar context, there was no significant effect of order (</span><a data-dcnode-id="1656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="1657" instrument_node="">46</span></a><span data-dcnode-id="1655" instrument_node="">). However, in future studies, it would be useful to counterbalance the order of the conditions in order to specifically address this limitation. Characterization of the patients’ emotional responses to empathy inductions through physiological (e.g., skin conductance, heart rate) measures would further add to our understanding of their momentary empathic experience in response to others’ suffering.</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p class="mb15" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">In summary, the current study is the first to experimentally demonstrate that the vmPFC is critical for empathic behavior in a financial context towards those who are suffering. We show preliminary evidence that awareness of an empathy-eliciting event, where someone is suffering, is not enough to elicit empathic behavior in patients with damage to the vmPFC. Rather, it suggests that these patients do not appear to use this information to guide their behavior in a way that helps the suffering person. On the other hand, by behaving in a manner seemingly not influenced by the empathic context, patients with damage to the vmPFC have better financial payoffs than the comparison groups.</span></p><span data-dcnode-id="1650" instrument_node="">
</span><p class="mb15" data-dcnode-id="1645"><span data-dcnode-id="1649" instrument_node="">These findings have broad implications for the treatment of other populations suffering from difficulty behaving with empathy toward others who are suffering. It helps us understand how groups affected by changes to the frontal lobe might respond in financial contexts where they witness another person’s suffering. Because decreased functioning of the frontal lobe is seen in many different populations ranging from healthy aging, to dementia, and brain injury, it has far reaching implications for financial decision making in social contexts for these groups (</span><a data-dcnode-id="1647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="1648" instrument_node="">60</span></a><span data-dcnode-id="1646" instrument_node="">). This is important for family members of patients with damage to the frontal lobe to be aware of because it may help them to have greater compassion for the patient.</span></p><span data-dcnode-id="1644" instrument_node="">
</span><p class="mb0" data-dcnode-id="1636"><span data-dcnode-id="1643" instrument_node="">In contrast to the behavior of the patients with damage to the vmPFC, if an individual puts too much weight on the emotional context of a situation, it could also have a negative impact on financial decisions and personal relationships. For instance, highly empathic caregivers or nurses may become too emotionally invested in their patients or loved ones which could lead to compassion fatigue and burnout (</span><a data-dcnode-id="1641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="1642" instrument_node="">61</span></a><span data-dcnode-id="1640" instrument_node="">–</span><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1639" instrument_node="">63</span></a><span data-dcnode-id="1637" instrument_node="">). In future research studies, it would be useful to investigate the utility of interventions designed to help individuals strategize about making financial decisions that optimize both financial and social well-being. In conclusion, the present study characterizes the role of the vmPFC in an empathy-eliciting situation involving financial decision making towards an individual who is suffering.</span></p><span data-dcnode-id="1635" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1634" id="h6"></a><h2 data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Ethics Statement</span></h2><span data-dcnode-id="1631" instrument_node="">

</span><div class="fulltextdescription" data-dcnode-id="1569" id="footnotetext"><span data-dcnode-id="1585" instrument_node="">
</span><ol data-dcnode-id="1571"><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1579" id="note1"><strong data-dcnode-id="1581"><a class="footnotetextanchor" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1a" style="color:#707173; text-decoration:none;" title=""><span data-dcnode-id="1583" instrument_node="">^</span></a></strong><span data-dcnode-id="1580" instrument_node="">Some of the target participants previously participated in another study from our laboratory examining the 1-shot version of the UG in the role of the Responder, the person who decides whether to accept or reject the offer. These include patients 1983, 0770, 0318, 2577, 2352, and 2391. This previous study did not include an empathy induction. In the present study, we investigate patients’ responses to an empathy induction on the UG in the role of the Proposer, the person who makes the offer.</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1573" id="note2"><strong data-dcnode-id="1575"><a class="footnotetextanchor" data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2a" style="color:#707173; text-decoration:none;" title=""><span data-dcnode-id="1577" instrument_node="">^</span></a></strong><span data-dcnode-id="1574" instrument_node="">A fraction is indicated here because one patient with damage to the vmPFC was missing one offer, and thus a mean substitution approach was used to approximate the missing value based on the patient’s other offers.</span></li><span data-dcnode-id="1572" instrument_node="">
