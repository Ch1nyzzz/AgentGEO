</span><meta content="Neurological patients with damage to the ventromedial prefrontal cortex (vmPFC) are reported to display reduced empathy toward others in their daily lives in clinical case studies. However, the empathic behavior of patients with damage to the vmPFC has not been measured experimentally in response to an empathy-eliciting event. This is important because characterizing the degree to which patients with damage to the vmPFC have lower empathic behavior will allow for the development of targeted interventions to improve patients’ social skills and in turn will help family members to better understand their impairments so they can provide appropriate supports. For the first time, we induced empathy using an ecologically-valid empathy induction in neurological patients with damage to the vmPFC and measured their empathic emotional responses and behavior in real time. Eight neurological patients with focal damage to the vmPFC were compared to demographically-matched brain-damaged and healthy comparison participants. Patients with damage to the vmPFC gave less money in the empathy condition to a person who was suffering (a confederate) than comparison participants. This provides the first direct experimental evidence that the vmPFC is critical for empathic behavior toward individuals who are suffering." data-dcnode-id="3597" name="Description" property="og:description"><span data-dcnode-id="3596" instrument_node="">

</span><div class="atButton" data-dcnode-id="2760"><span data-dcnode-id="2769" instrument_node="">
</span><a addthis:description="Neurological patients with damage to the ventromedial prefrontal cortex (vmPFC) are reported to display reduced empathy toward others in their daily lives in clinical case studies. However, the empathic behavior of patients with damage to the vmPFC has not been measured experimentally in response to an empathy-eliciting event. This is important because characterizing the degree to which patients with damage to the vmPFC have lower empathic behavior will allow for the development of targeted interventions to improve patients’ social skills and in turn will help family members to better understand their impairments so they can provide appropriate supports. For the first time, we induced empathy using an ecologically-valid empathy induction in neurological patients with damage to the vmPFC and measured their empathic emotional responses and behavior in real time. Eight neurological patients with focal damage to the vmPFC were compared to demographically-matched brain-damaged and healthy comparison participants. Patients with damage to the vmPFC gave less money in the empathy condition to a person who was suffering (a confederate) than comparison participants. This provides the first direct experimental evidence that the vmPFC is critical for empathic behavior toward individuals who are suffering." addthis:title="Ventromedial Prefrontal Cortex Is Critical for Helping Others Who Are Suffering" addthis:url="https://www.frontiersin.org/article/10.3389/fneur.2018.00288" class="addthis_button_facebook at300b" data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2763" style="background-color: rgb(59, 89, 152); line-height: 16px; height: 16px; width: 16px;"><svg alt="Facebook" aria-labelledby="at-svg-facebook-1" class="at-icon at-icon-facebook" data-dcnode-id="2764" role="img" style="w </span><a class="reset-hash-position" data-dcnode-id="2651" id="h1"></a><h1 data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Ventromedial Prefrontal Cortex Is Critical for Helping Others Who Are Suffering</span></h1><span data-dcnode-id="2648" instrument_node="">
</span><div class="authors" data-dcnode-id="2628"><span data-dcnode-id="2647" instrument_node="">
</span><a class="user-id-47689" data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/47689" style="text-decoration:none;line-height:1.3em;"><img alt="image" class="pr5" data-dcnode-id="2646" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/47689/24&amp;raw"><span data-dcnode-id="2645" instrument_node="">Janelle N. Beadle</span></a><sup data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">1</span></sup><span data-dcnode-id="2641" instrument_node="">*, 
</span><a class="user-id-68500" data-dcnode-id="2638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/68500" style="text-decoration:none;line-height:1.3em;"><img alt="image" class="pr5" data-dcnode-id="2640" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/68500/24&amp;raw"><span data-dcnode-id="2639" instrument_node="">Sergio Paradiso</span></a><sup data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">2</span></sup><span data-dcnode-id="2635" instrument_node=""> and </span><a class="user-id-1694" data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1694" style="text-decoration:none;line-height:1.3em;"><img alt="image" class="pr5" data-dcnode-id="2634" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1694/24&amp;raw"><span data-dcnode-id="2633" instrument_node="">Daniel Tranel</span></a><sup data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">3,4</span></sup><span data-dcnode-id="2629" instrument_node="">
</span></div><span data-dcnode-id="2627" instrument_node="">
</span><ul class="notes" data-dcnode-id="2601"><span data-dcnode-id="2626" instrument_node="">
</span><li data-dcnode-id="2621"><span data-dcnode-id="2623"><sup data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">1</span></sup></span><span data-dcnode-id="2622" instrument_node="">Department of Gerontology, University of Nebraska at Omaha, Omaha, NE, United States</span></li><span data-dcnode-id="2620" instrument_node="">
</span><li data-dcnode-id="2615"><span data-dcnode-id="2617"><sup data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">2</span></sup></span><span data-dcnode-id="2616" instrument_node="">Private Practice in Psychiatry and Psychotherapy, Catania, Italy</span></li><span data-dcnode-id="2614" instrument_node="">
</span><li data-dcnode-id="2609"><span data-dcnode-id="2611"><sup data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">3</span></sup></span><span data-dcnode-id="2610" instrument_node="">Department of Neurology, Roy J. &amp; Lucille A. Carver College of Medicine, University of Iowa, Iowa City, IA, United States</span></li><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2603"><span data-dcnode-id="2605"><sup data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">4</span></sup></span><span data-dcnode-id="2604" instrument_node="">Department of Psychological and Brain Sciences, University of Iowa, Iowa City, IA, United States</span></li><span data-dcnode-id="2602" instrument_node="">
</span></ul><span data-dcnode-id="2600" instrument_node="">
</span><p data-dcnode-id="2598"><span data-dcnode-id="2599" instrument_node="">Neurological patients with damage to the ventromedial prefrontal cortex (vmPFC) are reported to display reduced empathy toward others in their daily lives in clinical case studies. However, the empathic behavior of patients with damage to the vmPFC has not been measured experimentally in response to an empathy-eliciting event. This is important because characterizing the degree to which patients with damage to the vmPFC have lower empathic behavior will allow for the development of targeted interventions to improve patients’ social skills and in turn will help family members to better understand their impairments so they can provide appropriate supports. For the first time, we induced empathy using an ecologically-valid empathy induction in neurological patients with damage to the vmPFC and measured their empathic emotional responses and behavior in real time. Eight neurological patients with focal damage to the vmPFC were compared to demographically-matched brain-damaged and healthy comparison participants. Patients with damage to the vmPFC gave less money in the empathy condition to a person who was suffering (a confederate) than comparison participants. This provides the first direct experimental evidence that the vmPFC is critical for empathic behavior toward individuals who are suffering.</span></p><span data-dcnode-id="2597" instrument_node="">
</span><div class="clear" data-dcnode-id="2596"></div><span data-dcnode-id="2595" instrument_node="">
</span></div><span data-dcnode-id="2593" instrument_node="">
</span><div class="JournalFullText" data-dcnode-id="443"><span data-dcnode-id="2592" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2591" id="h2"></a><h2 data-dcnode-id="2589"><span data-dcnode-id="2590" instrument_node="">Introduction</span></h2><span data-dcnode-id="2588" instrument_node="">
</span><p class="mb15" data-dcnode-id="2577"><span data-dcnode-id="2587" instrument_node="">Daily we encounter people who are suffering—strangers living on the street; friends suffering from cancer who can’t pay their hospital bills; family members who have lost their homes to a fire. Traditional economic theories purport that we are rational actors who behave in ways that maximize our monetary gain, and therefore would be unlikely to donate to others in need (</span><a data-dcnode-id="2585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="2586" instrument_node="">1</span></a><span data-dcnode-id="2584" instrument_node="">). Yet, when people are asked to make financial decisions in daily life, researchers find that emotion (e.g., anger), not just rational thought, impacts our financial decisions toward others (</span><a data-dcnode-id="2582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2583" instrument_node="">2</span></a><span data-dcnode-id="2581" instrument_node="">). A striking example of this can be seen in laboratory settings when people play economic decision making games, such as the Ultimatum Game (UG). When participants receive an offer that is perceived to be unfair, it is thought to elicit anger which in turn leads them to reject that offer, despite the negative financial impact of this choice (</span><a data-dcnode-id="2579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="2580" instrument_node="">3</span></a><span data-dcnode-id="2578" instrument_node="">).</span></p><span data-dcnode-id="2576" instrument_node="">
</span><p class="mb15" data-dcnode-id="2559"><span data-dcnode-id="2575" instrument_node="">From a neuroscience perspective, our financial decisions are thought to be guided by interacting brain systems involving cognition, emotion, and decision making (</span><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2574" instrument_node="">2</span></a><span data-dcnode-id="2572" instrument_node="">, </span><a data-dcnode-id="2570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2571" instrument_node="">4</span></a><span data-dcnode-id="2569" instrument_node="">, </span><a data-dcnode-id="2567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2568" instrument_node="">5</span></a><span data-dcnode-id="2566" instrument_node="">). In fact, patients who have brain damage to a region implicated in decision making, the ventromedial prefrontal cortex (vmPFC), have difficulty making advantageous financial decisions (</span><a data-dcnode-id="2564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2565" instrument_node="">6</span></a><span data-dcnode-id="2563" instrument_node="">, </span><a data-dcnode-id="2561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2562" instrument_node="">7</span></a><span data-dcnode-id="2560" instrument_node="">). In other words, their decisions result in financial outcomes that are poorer than that of healthy adults.</span></p><span data-dcnode-id="2558" instrument_node="">
</span><p class="mb15" data-dcnode-id="2523"><span data-dcnode-id="2557" instrument_node="">Clinical case studies demonstrate that patients with damage to the vmPFC have a reduced capacity to make decisions, ranging from minor decisions about choosing a restaurant, to major decisions about monetary investments (</span><a data-dcnode-id="2555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2556" instrument_node="">8</span></a><span data-dcnode-id="2554" instrument_node="">–</span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2553" instrument_node="">10</span></a><span data-dcnode-id="2551" instrument_node="">). Furthermore, laboratory-based research studies show that patients with damage to the vmPFC have difficulty on multiple tasks measuring financial decision making (</span><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2550" instrument_node="">6</span></a><span data-dcnode-id="2548" instrument_node="">, </span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2547" instrument_node="">11</span></a><span data-dcnode-id="2545" instrument_node="">–</span><a data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2544" instrument_node="">14</span></a><span data-dcnode-id="2542" instrument_node="">, </span><a data-dcnode-id="2540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2541" instrument_node="">64</span></a><span data-dcnode-id="2539" instrument_node="">). For instance, they have difficulty learning which decks are financially advantageous in the Iowa Gambling Task, and consequently achieve less overall financial gain than healthy comparison participants (</span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2538" instrument_node="">11</span></a><span data-dcnode-id="2536" instrument_node="">–</span><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="2535" instrument_node="">13</span></a><span data-dcnode-id="2533" instrument_node="">). In the UG, patients with damage to the vmPFC reject unfair offers at a higher rate than healthy comparison participants (</span><a data-dcnode-id="2531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2532" instrument_node="">6</span></a><span data-dcnode-id="2530" instrument_node="">). This results in the patients obtaining less money overall than healthy adults. Based on these studies, researchers have hypothesized that patients’ decision making difficulties may derive from a reduced ability to utilize emotional information to guide decision making in an advantageous manner, as described by the somatic marker hypothesis (</span><a data-dcnode-id="2528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2529" instrument_node="">15</span></a><span data-dcnode-id="2527" instrument_node="">–</span><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2526" instrument_node="">18</span></a><span data-dcnode-id="2524" instrument_node="">).</span></p><span data-dcnode-id="2522" instrument_node="">
</span><p class="mb15" data-dcnode-id="2502"><span data-dcnode-id="2521" instrument_node="">Despite extensive research on financial decision making behavior in patients with damage to the vmPFC, we do not know how they behave in financial contexts where they witness another person who is suffering. This is an important question because many of our financial decisions occur in a social context. For example, a family member may need extra financial support if they develop a chronic illness, such as dementia. A long tradition of psychology and neuroscience research has characterized the behavior of healthy adults when they witness another person’s suffering (</span><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2520" instrument_node="">19</span></a><span data-dcnode-id="2518" instrument_node="">–</span><a data-dcnode-id="2516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2517" instrument_node="">21</span></a><span data-dcnode-id="2515" instrument_node="">). Research has shown that an antecedent to motivate someone to help another person is a perception or awareness that the person is in need of help (</span><a data-dcnode-id="2513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="2514" instrument_node="">22</span></a><span data-dcnode-id="2512" instrument_node="">). For instance, while there are situations that may evoke empathic joy toward others, such as when a best friend gets offered their dream job, this type of situation is not likely to elicit help because the person is not in need. Furthermore, extensive research has shown that feelings of empathy also motivate people to help others when they perceive them to be in need (</span><a data-dcnode-id="2510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2511" instrument_node="">20</span></a><span data-dcnode-id="2509" instrument_node="">, </span><a data-dcnode-id="2507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2508" instrument_node="">23</span></a><span data-dcnode-id="2506" instrument_node="">–</span><a data-dcnode-id="2504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2505" instrument_node="">26</span></a><span data-dcnode-id="2503" instrument_node="">).</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p class="mb15" data-dcnode-id="2487"><span data-dcnode-id="2500" instrument_node="">Empathy is thought to be made up of two components: (1) cognitive—one’s ability to understand others’ thoughts and emotions, and (2) emotional—one’s ability to feel compassion and sympathy for the person in need or feel similarly to them (</span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2499" instrument_node="">27</span></a><span data-dcnode-id="2497" instrument_node="">). Individuals who experience high levels of empathy tend to show greater helping behaviors toward others in need than those experiencing low levels of empathy (</span><a data-dcnode-id="2495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2496" instrument_node="">20</span></a><span data-dcnode-id="2494" instrument_node="">). Based on this body of research, the empathy-altruism hypothesis was developed which purports that empathic emotion is one mechanism for helping behavior toward others in need (</span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2493" instrument_node="">23</span></a><span data-dcnode-id="2491" instrument_node="">, </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2490" instrument_node="">26</span></a><span data-dcnode-id="2488" instrument_node="">).</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p class="mb15" data-dcnode-id="2463"><span data-dcnode-id="2485" instrument_node="">Functional neuroimaging studies point to a broad network of brain regions involved in empathy, such as the vmPFC, amygdala, anterior cingulate, and anterior insula (</span><a data-dcnode-id="2483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="2484" instrument_node="">28</span></a><span data-dcnode-id="2482" instrument_node="">–</span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2481" instrument_node="">31</span></a><span data-dcnode-id="2479" instrument_node="">). Although functional neuroimaging studies provide important information about brain networks involved in empathy, lesion studies are able to determine which regions are critical for empathy to occur. There is a growing body of patient studies examining the degree to which lesions to regions including the anterior cingulate, insula, and amygdala affect empathy [(</span><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2478" instrument_node="">32</span></a><span data-dcnode-id="2476" instrument_node="">–</span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="2475" instrument_node="">34</span></a><span data-dcnode-id="2473" instrument_node="">); for review see Ref. (</span><a data-dcnode-id="2471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2472" instrument_node="">35</span></a><span data-dcnode-id="2470" instrument_node="">)]. However, because only a small number of studies have investigated these regions using varying methodologies, currently there is no conclusive evidence that these regions are critical for empathy. In comparison, there is a long history of clinical and experimental research implicating the importance of the vmPFC for empathy (</span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2469" instrument_node="">36</span></a><span data-dcnode-id="2467" instrument_node="">–</span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2466" instrument_node="">38</span></a><span data-dcnode-id="2464" instrument_node="">). Therefore, due to the current state of the literature, we chose to focus on the vmPFC, because there is more substantial and consistent evidence that it is important for empathy.</span></p><span data-dcnode-id="2462" instrument_node="">
</span><p class="mb15" data-dcnode-id="2451"><span data-dcnode-id="2461" instrument_node="">Clinical case studies have shown that patients with damage to the vmPFC behave in ways that suggest they have reduced empathy toward others (</span><a data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2460" instrument_node="">39</span></a><span data-dcnode-id="2458" instrument_node="">–</span><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2457" instrument_node="">41</span></a><span data-dcnode-id="2455" instrument_node="">). However, these findings have not yet been demonstrated in a controlled, experimental context where participants with damage to the vmPFC show lower empathic behavior than healthy adults in response to an empathy-eliciting context. Furthermore, it has not yet been experimentally tested whether participants with damage to the vmPFC have reduced awareness of empathic information, reduced empathic emotion, or reductions in both domains in comparison to healthy adults. For empathic behavior towards others to occur, it is often motivated by both an awareness that the other person is in need and the experience of empathic emotion (</span><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="2454" instrument_node="">22</span></a><span data-dcnode-id="2452" instrument_node="">). If one or both these aspects are missing, the individual may exhibit lower empathic behavior. Therefore, assessing both the patients’ awareness of empathic information and their empathic emotion may aid in understanding potential motivations for their empathic behavior.</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p class="mb15" data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">The information generated in the present study is crucial in designing effective interventions to improve social functioning in patients with damage to the vmPFC, because it will help clinicians to target the cognitive or emotional domains that are reduced in patients with damage to the vmPFC. If only their empathic behavior is lower than healthy adults, this can be targeted with behaviorally focused social skills training. If they are lower on their awareness of perceiving empathic information from empathy-eliciting contexts, they could receive training on how to determine when a situation is likely to evoke empathy in others. If they are lower on feelings of empathy, they could receive training on techniques to increase one’s empathy, such as imagining what the other person may be feeling. Furthermore, this is also important information for the patients’ family and caregivers because it will help them to better understand what social skills might be most difficult for the patients, so they can provide appropriate support. Therefore, the present study addresses a gap in the knowledge by experimentally investigating empathic behavior, empathic feelings, and awareness of empathic information in response to an empathy-eliciting context.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><p class="mb15" data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">For the first time, the current study directly examines how patients with damage to the vmPFC behave in a financial context when exposed to someone who is suffering. The study uses a novel, ecologically valid empathy induction designed to represent a real-world scenario that would be likely to induce empathy. Furthermore, converging methods were used to assess empathy and financial decision making towards a man who is suffering. Specifically, these methods included (1) behavior—measure of financial decision making toward a suffering individual, (2) emotional response—real time patient self-reports of empathic emotion toward the suffering individual, (3) trait empathy—self-report assessing general tendency toward empathy in daily life completed by the patient (and patients’ family member), and (4) theory of mind—ability to accurately understand and assess others’ feelings and intentions.</span></p><span data-dcnode-id="2444" instrument_node="">
</span><p class="mb15" data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">The target group included eight neurological patients with focal damage to the vmPFC who were compared to a brain-damaged comparison (BDC) group and a healthy, normal comparison (NC) group. To reduce demand characteristics, participants were told that they would be playing an economic decision making game. During the course of the study, there was a neutral condition where the participant would overhear their opponent through the intercom talking about unemotional events from their day (e.g., playing a card game and reading the newspaper). The key target empathy induction condition involved the participant overhearing through the intercom system a second opponent discussing the anniversary of their son’s death and their grieving process. Empathic behavior was measured implicitly by how much money they gave to each opponent on the economic game (i.e., empathy versus neutral condition). To measure in the moment self-report ratings of empathy in response to the empathy induction, participants completed a mood questionnaire before and after each induction condition. This questionnaire measured empathy, in addition to other relevant emotions (e.g., sadness, hostility, joviality, and personal distress). At the end of the study, participants also completed a theory of mind task where they were asked to assess the intentions and feelings of others through written scenarios. Finally, participants completed a questionnaire measuring empathy as a general tendency across the lifespan which was also completed by their family members, as a means of corroboration.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p class="mb0" data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">It was hypothesized that patients with damage to the vmPFC will show significantly lower empathic behavior in response to an empathic induction in which they witness another person’s suffering than comparison groups. Furthermore, it was hypothesized that patients with damage to the vmPFC will show less empathic emotion than comparison participants in response to an empathy induction.</span></p><span data-dcnode-id="2438" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2437" id="h3"></a><h2 data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Materials and Methods</span></h2><span data-dcnode-id="2434" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Participants</span></h3><span data-dcnode-id="2431" instrument_node="">
</span><p class="mb0" data-dcnode-id="2420"><span data-dcnode-id="2430" instrument_node="">Target participants included eight patients with focal damage to the vmPFC (see Figure </span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="2429" instrument_node="">1</span></a><span data-dcnode-id="2427" instrument_node="">). These patients were compared to NC (</span><i data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">N</span></i><span data-dcnode-id="2424" instrument_node=""> = 8) and BDC (</span><i data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">N</span></i><span data-dcnode-id="2421" instrument_node=""> = 8) groups. Comparison participants were matched to the target patients on age, education, gender, and full scale intelligence. All groups included five females and three males.</span></p><span data-dcnode-id="2419" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2418"></div><span data-dcnode-id="2417" instrument_node="">

</span><p data-dcnode-id="2405"><strong data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Figure 1</span></strong><span data-dcnode-id="2406" instrument_node="">. Lesion overlap map of patients with damage to the ventromedial prefrontal cortex (vmPFC). The lesion overlap map of eight patients with damage to the vmPFC is shown. Images are presented using radiological convention. Warmer colors indicate greater numbers of patients whose lesions overlap in a particular region, whereas cooler colors indicate fewer lesion overlaps. Overlap was greatest bilaterally in the ventromedial prefrontal region, with the cortex and white matter in the right vmPFC being involved in all eight patients.</span></p><span data-dcnode-id="2404" instrument_node="">

</span><p class="mt15 w100pc float_left" data-dcnode-id="2301"><span data-dcnode-id="2397" instrument_node="">Kruskal–Wallis tests were used to compare age and education across the three groups. To compare chronicity between the BDC and vmPFC groups, a Mann–Whitney </span><i data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">U</span></i><span data-dcnode-id="2394" instrument_node=""> test was used, and a Chi-square test was used to compare the two groups on type of etiology. In the present study, there were 19 statistical tests performed that were not testing </span><i data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">a priori</span></i><span data-dcnode-id="2391" instrument_node=""> hypotheses. Therefore, we applied a false discovery rate correction for these tests (false discovery rate level: 0.05). There were no significant differences between groups on any of the demographic variables after the false discovery rate correction was applied [age: </span><i data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">X</span></i><span data-dcnode-id="2388" instrument_node="">(2) = 2.79, </span><i data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">p</span></i><span data-dcnode-id="2385" instrument_node=""> = 0.25, Benjamini–Hochberg </span><i data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">p</span></i><span data-dcnode-id="2382" instrument_node="">-value = 0.59; education: </span><i data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">X</span></i><span data-dcnode-id="2379" instrument_node="">(2) = 4.94, </span><i data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">p</span></i><span data-dcnode-id="2376" instrument_node=""> = 0.08; Benjamini–Hochberg </span><i data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">p</span></i><span data-dcnode-id="2373" instrument_node="">-value = 0.51; chronicity: </span><i data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">z</span></i><span data-dcnode-id="2370" instrument_node="">(14) = 2.53, </span><i data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">p</span></i><span data-dcnode-id="2367" instrument_node=""> = 0.01, Benjamini–Hochberg </span><i data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">p</span></i><span data-dcnode-id="2364" instrument_node="">-value = 0.19; etiology: </span><i data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">X</span></i><span data-dcnode-id="2361" instrument_node="">(1) = 0, </span><i data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">p</span></i><span data-dcnode-id="2358" instrument_node=""> = 1.00; Benjamini–Hochberg </span><i data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">p</span></i><span data-dcnode-id="2355" instrument_node="">-value = 1.00]. The BDC group included individuals with lesions outside of regions that have been previously implicated as being involved in empathy (Tables </span><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T1"><span data-dcnode-id="2354" instrument_node="">1</span></a><span data-dcnode-id="2352" instrument_node=""> and </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T2"><span data-dcnode-id="2351" instrument_node="">2</span></a><span data-dcnode-id="2349" instrument_node="">). In the BDC group, the lesions also excluded regions that have been associated with numeracy and valuation. The patients in the vmPFC group did not have major impairments in intelligence or memory, and they did not have premorbid personality disorders (</span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2348" instrument_node="">6</span></a><span data-dcnode-id="2346" instrument_node="">).</span><sup data-dcnode-id="2342" id="footnotesuper1"><a data-dcnode-id="2345" id="note1a"></a><a class="footnoteanchor" data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1"><span data-dcnode-id="2344" instrument_node="">1</span></a></sup><span data-dcnode-id="2341" instrument_node=""> Mann–Whitney </span><i data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">U</span></i><span data-dcnode-id="2338" instrument_node=""> tests were used to compare the vmPFC group to the BDC group on relevant neuropsychological variables (WAIS-III Full Scale Intelligence Quotient—FSIQ, WAIS-III Working Memory Index—WMI, Trail Making Test Part A and B—TMT). There were no significant differences between the groups on any of the neuropsychological variables after the false discovery rate correction was applied [FSIQ: </span><i data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">z</span></i><span data-dcnode-id="2335" instrument_node="">(14) = 0.95, </span><i data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">p</span></i><span data-dcnode-id="2332" instrument_node=""> = 0.34; Benjamini–Hochberg </span><i data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">p</span></i><span data-dcnode-id="2329" instrument_node="">-value = 0.68; WMI: </span><i data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">z</span></i><span data-dcnode-id="2326" instrument_node="">(14) = 0.74, </span><i data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">p</span></i><span data-dcnode-id="2323" instrument_node=""> = 0.46, Benjamini–Hochberg </span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">p</span></i><span data-dcnode-id="2320" instrument_node="">-value = 0.79; TMT-A: </span><i data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">z</span></i><span data-dcnode-id="2317" instrument_node="">(14) = 0.21, </span><i data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">p</span></i><span data-dcnode-id="2314" instrument_node=""> = 0.83, Benjamini–Hochberg </span><i data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">p</span></i><span data-dcnode-id="2311" instrument_node="">-value = 0.97; TMT-B: </span><i data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">z</span></i><span data-dcnode-id="2308" instrument_node="">(14) = 0.00, </span><i data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">p</span></i><span data-dcnode-id="2305" instrument_node=""> = 1.00; Benjamini–Hochberg </span><i data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">p</span></i><span data-dcnode-id="2302" instrument_node="">-value = 1.00]. This study was carried out in accordance with the recommendations of the Declaration of Helsinki and the University of Iowa Institutional Review Board with written informed consent from all subjects. All subjects gave written informed consent in accordance with the Declaration of Helsinki. The protocol was approved by the University of Iowa Institutional Review Board.</span></p><span data-dcnode-id="2300" instrument_node="">

</span><div class="DottedLine" data-dcnode-id="2261"></div><span data-dcnode-id="2260" instrument_node="">
</span><h3 data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Experimental Design</span></h3><span data-dcnode-id="2257" instrument_node="">
</span><p class="mb15" data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">The present experiment involved a quasi-experimental, cross-sectional design. The independent variables included experimental condition (neutral, empathy) and participant group (vmPFC patients, brain damage comparison patients, and normal, healthy adult comparison participants). The study used a within-subjects design, and thus all participants received both the neutral and empathy experimental conditions.</span></p><span data-dcnode-id="2254" instrument_node="">
</span><p class="mb0" data-dcnode-id="2237"><span data-dcnode-id="2253" instrument_node="">A novel empathy induction was used to elicit empathy in an implicit fashion similar to how empathy is frequently evoked in daily life—specifically, hearing another person talk about their struggles, frustration, and profound sadness. Participants were led to believe that the purpose of the study was to play an economic game (the UG) against a series of two opponents through an intercom system, with the opponents located in a different testing room. In one condition, </span><i data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">empathy induction</span></i><span data-dcnode-id="2250" instrument_node="">, the participant overheard (through the intercom) their opponent discussing the recent death of their son with the Research Assistant. In another condition (</span><i data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">neutral</span></i><span data-dcnode-id="2247" instrument_node="">, no empathy induction), the participant overheard their opponent discussing neutral, mundane events with the Research Assistant (e.g., such as playing cards or eating breakfast). Each participant underwent both the neutral and empathy induction in the same testing session. Due to the small number of available patients with damage to the vmPFC, the order of the inductions was not counterbalanced. The two opponents were actually audio recordings of community theater actors rather than real participants. The community theater actors were both males in their middle 50’s (chosen for having similar voice quality, age, and gender) and the Research Assistant in the study was a female in her 20’s. The age of the actors was selected to be similar to the age of the patient population in this study. Each audio recording was 4.5 min, with an 8-minute interval. This induction has effectively elicited empathy in healthy adults (</span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2246" instrument_node="">42</span></a><span data-dcnode-id="2244" instrument_node="">). For additional information on methods and pilot induction results see Ref. (</span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2243" instrument_node="">43</span></a><span data-dcnode-id="2241" instrument_node="">, </span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="2240" instrument_node="">44</span></a><span data-dcnode-id="2238" instrument_node="">).</span></p><span data-dcnode-id="2236" instrument_node="">
</span><h3 data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Empathic Behavior</span></h3><span data-dcnode-id="2233" instrument_node="">
</span><p class="mb0" data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">Empathic behavior was measured as the difference between the amount of money offered to the opponent in the UG following the empathy induction and the amount offered in the neutral condition. In the UG, the participant decided how much to offer the opponent out of $10 on each of 20 rounds. The offers were summed across the 20 rounds, separately for each condition (empathy and neutral).</span></p><span data-dcnode-id="2230" instrument_node="">
</span><h3 data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Momentary Empathy and Emotional Responses</span></h3><span data-dcnode-id="2227" instrument_node="">
</span><p class="mb0" data-dcnode-id="2213"><span data-dcnode-id="2226" instrument_node="">Empathy and other relevant emotions were measured through self-report momentary, state ratings that took place before and after each of the two conditions (neutral and empathy). Specifically, participants completed a questionnaire that assessed the participants’ momentary (or state level) of empathy, personal distress, joviality, hostility, and sadness. Participants were asked to respond to the prompt, “Indicate to what extent you feel this way right now, that is, at the present moment,” by rating each item on a scale from 1 (very slight or not at all) to 5 (extreme). This rating scale and prompt were adapted from the Positive and Negative Affective Schedule (PANAS) questionnaire (</span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2225" instrument_node="">45</span></a><span data-dcnode-id="2223" instrument_node="">). Furthermore, the items assessing joviality, hostility, and sadness were also adapted from this questionnaire and included sadness (“sad”; “downhearted”), hostility (“hostile”; “angry”), and joviality (“happy”; “joyful”). The items assessing emotional empathy and personal distress were drawn from a state measure of emotional empathy (</span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2222" instrument_node="">23</span></a><span data-dcnode-id="2220" instrument_node="">). These items included (“sympathetic”; “compassionate”) and (“upset” and “distressed”). These questionnaires have been used in previous research studies to measure state empathy, personal distress, and basic emotions in healthy adults and patients with brain damage (</span><a data-dcnode-id="2218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2219" instrument_node="">42</span></a><span data-dcnode-id="2217" instrument_node="">, </span><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2216" instrument_node="">46</span></a><span data-dcnode-id="2214" instrument_node="">).</span></p><span data-dcnode-id="2212" instrument_node="">
</span><h3 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Patients Thoughts and Feelings About Empathy Induction</span></h3><span data-dcnode-id="2209" instrument_node="">
</span><p class="mb15" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">We examined written free responses from the participants about their thoughts and feelings involving the empathy induction. This questionnaire was completed at the end of the experiment after the participant had undergone both the neutral and empathy conditions, but prior to the debriefing session about the purpose of the study. In particular, participants responded to a question about their thoughts and feelings in response to the empathy induction in which they overheard their second opponent in the game talking about the anniversary of their son’s death. Specifically the prompt was, “Please describe your thoughts and feelings (in a few words or a sentence) while hearing your second opponent talk with the Research Assistant. Please list these thoughts and feelings next to the bullets below. If there is not enough room, please use the lines below to describe further.”</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p class="mb0" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">These free responses were coded by two raters (research assistants) who were blind to the group each participant was assigned to as well as the purpose of the study. Responses were coded as a “1” if the written text mentioned at least one of the following terms: “sorry for,” “sad,” “sympathy/sympathetic,” and/or “compassion/compassionate.” Responses were coded as a “0” if the participant did not reference any of these terms.</span></p><span data-dcnode-id="2203" instrument_node="">
</span><h3 data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">Believability/Manipulation Check</span></h3><span data-dcnode-id="2200" instrument_node="">
</span><p class="mb0" data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Participants completed four questions after the experiment, measuring the degree to which they believed they were playing against real opponents. The rating scale in response to these questions ranged from 1 = did not believe to 5 = believed extremely. These questions included the following: (1) “Did you believe that the first conversation you heard was a conversation between a Research Assistant and another person participating in the study?” (2) “Did you believe that the second conversation you heard was a conversation between a Research Assistant and another person participating in the study?” (3) “Did you believe that the first game was played against another person participating in the study?” (4) “Did you believe that the second game was played against another person participating in the study?” The responses across these four questions were averaged for each participant.</span></p><span data-dcnode-id="2197" instrument_node="">
</span><h3 data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Trait Empathy Ratings</span></h3><span data-dcnode-id="2194" instrument_node="">
</span><p class="mb15" data-dcnode-id="2189"><span data-dcnode-id="2193" instrument_node="">Participants completed a questionnaire designed to measure empathy as a trait, or a general tendency in one’s daily life (</span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2192" instrument_node="">27</span></a><span data-dcnode-id="2190" instrument_node="">). In addition, the participants’ family members also completed the same trait questionnaire about the participants, as a means of comparison. (Not all family members of the participants were available to complete the questionnaires. The final sample of family members included a total of 14, across the three groups.)</span></p><span data-dcnode-id="2188" instrument_node="">
</span><p class="mb0" data-dcnode-id="2180"><span data-dcnode-id="2187" instrument_node="">The Interpersonal Reactivity Index (IRI) (</span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2186" instrument_node="">27</span></a><span data-dcnode-id="2184" instrument_node="">) was used to assess trait empathy and is a well-validated, multidimensional measure of empathy that assesses both the emotional and cognitive aspects of empathy. Emotional empathy was measured using the Empathic Concern subscale and cognitive empathy was assessed through the Perspective Taking subscale. Each subscale ranges from 0 to 28 points, and higher scores indicate a greater tendency towards empathy in daily life. The IRI has adequate test/retest reliability (range: </span><i data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">r</span></i><span data-dcnode-id="2181" instrument_node=""> = 0.61–0.81) and internal consistency (range Cronbach’s alpha: 0.68–0.79). An example item from the questionnaire is, “When I’m upset at someone, I usually try to ‘put myself in his shoes’ for awhile.”</span></p><span data-dcnode-id="2179" instrument_node="">
</span><h3 data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">Social Faux Pas Task: Assessing Accuracy of Detecting Others’ Intentions</span></h3><span data-dcnode-id="2176" instrument_node="">
</span><p class="mb0" data-dcnode-id="2171"><span data-dcnode-id="2175" instrument_node="">Theory of mind was measured with a standard task assessing one’s ability to detect social faux pas from written scenarios, called the Social Faux Pas Task (</span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2174" instrument_node="">47</span></a><span data-dcnode-id="2172" instrument_node="">). In this task, participants read written scenarios about two characters engaged in a situation where someone says or does something that is socially inappropriate, or in other words, commits a social faux pas. Then, the participant answers a multiple choice question to determine whether they can detect what social faux pas was committed. In this task, there are also control scenarios to assess basic reasoning skills. A separate accuracy score is calculated for the 12 control and 12 theory of mind conditions for each participant.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><h3 data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">Statistical Analysis</span></h3><span data-dcnode-id="2167" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Hypothesis Testing</span></h4><span data-dcnode-id="2164" instrument_node="">
</span><p class="mb0" data-dcnode-id="2147"><span data-dcnode-id="2163" instrument_node="">Our primary variable of interest was the empathic behavior variable. We performed the Shapiro–Wilk test to assess the normality of the distribution of this variable. We found evidence that the NC group was not normally distributed (NC: S-W = 0.81, </span><i data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">p</span></i><span data-dcnode-id="2160" instrument_node=""> = 0.04; BDC: S-W = 0.94, </span><i data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">p</span></i><span data-dcnode-id="2157" instrument_node=""> = 0.59; vmPFC: S-W = 0.98, </span><i data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">p</span></i><span data-dcnode-id="2154" instrument_node=""> = 0.97), and thus we have used non-parametric tests throughout this paper. We tested the degree to which the vmPFC group had lower empathic behavior than the comparison groups using a Kruskal–Wallis test. Next, we assessed the degree to which the vmPFC group had lower state empathy ratings than the comparison groups using a Kruskal–Wallis test. Based on our </span><i data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">a priori</span></i><span data-dcnode-id="2151" instrument_node=""> hypotheses, planned comparisons (Mann–Whitney </span><i data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">U</span></i><span data-dcnode-id="2148" instrument_node=""> tests) were used to compare each group to the other two groups on these variables.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><h4 data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Sample Description</span></h4><span data-dcnode-id="2143" instrument_node="">
</span><p class="mb0" data-dcnode-id="2120"><span data-dcnode-id="2142" instrument_node="">The mean and standard deviation of the variables believability, trait empathy, theory of mind, and state emotions other than empathy (e.g., sadness, personal distress, hostility, and joviality) are presented in Table </span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="2141" instrument_node="">3</span></a><span data-dcnode-id="2139" instrument_node="">. Because we did not have specific hypotheses about these variables, these results are descriptive in nature. The exploratory analyses included separate Kruskal–Wallis tests to compare the three participant groups on believability, theory of mind, trait empathy (patient and family ratings), and each of the state emotions (i.e., sadness, personal distress, hostility, and joviality). If the result was significant at </span><i data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">p</span></i><span data-dcnode-id="2136" instrument_node=""> &lt; 0.05, Mann–Whitney </span><i data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">U</span></i><span data-dcnode-id="2133" instrument_node=""> tests were used to assess differences between the groups. For all tests, uncorrected </span><i data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">p</span></i><span data-dcnode-id="2130" instrument_node="">-values are listed. A total of 19 statistical tests were performed that were not testing </span><i data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">a priori</span></i><span data-dcnode-id="2127" instrument_node=""> hypotheses. Consequently, we applied a false discovery rate correction for these 19 tests (false discovery rate level: 0.05). We also list the Benjamini–Hochberg </span><i data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">p</span></i><span data-dcnode-id="2124" instrument_node="">-value that resulted from this false discovery rate correction. All statistical tests were two-tailed and findings were considered to be significant at the </span><i data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">p</span></i><span data-dcnode-id="2121" instrument_node=""> &lt; 0.05 level. Nonparametric tests were used for all analyses. For our qualitative exploratory analysis of patients’ thoughts and feelings in response to the empathy induction, we present the proportion of participants’ responses from each group that were coded as a 1 and the participants’ written responses. Statistics were not conducted on the thoughts and feelings responses because the results were qualitative in content.</span></p><span data-dcnode-id="2119" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2118"></div><span data-dcnode-id="2117" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="2097" id="h4"></a><h2 data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">Results</span></h2><span data-dcnode-id="2094" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Hypothesis Testing</span></h3><span data-dcnode-id="2091" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Primary Behavioral Analysis: Empathic Behavior Towards a Suffering Individual</span></h4><span data-dcnode-id="2088" instrument_node="">
</span><p class="mb0" data-dcnode-id="2051"><span data-dcnode-id="2087" instrument_node="">The primary analysis addressed the degree to which participants demonstrated empathy behaviorally by making larger offers in the UG in response to the empathy condition in comparison to the neutral condition. Patients with damage to the vmPFC did not make higher offers in the empathy condition than in the neutral condition, whereas both comparison groups made much higher offers [Figure </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="2086" instrument_node="">2</span></a><span data-dcnode-id="2084" instrument_node="">A, group: </span><i data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">X</span></i><span data-dcnode-id="2081" instrument_node="">(2) = 9.56, </span><i data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">p</span></i><span data-dcnode-id="2078" instrument_node=""> = 0.008; follow-up planned comparisons: vmPFC vs. BDC: </span><i data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">z</span></i><span data-dcnode-id="2075" instrument_node="">(14) = 2.73, </span><i data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">p</span></i><span data-dcnode-id="2072" instrument_node=""> = 0.006; vmPFC vs. NC: </span><i data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">z</span></i><span data-dcnode-id="2069" instrument_node="">(14) = 2.37, </span><i data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">p</span></i><span data-dcnode-id="2066" instrument_node=""> = 0.02; BDC vs. NC: </span><i data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">z</span></i><span data-dcnode-id="2063" instrument_node="">(14) = 1.06, </span><i data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">p</span></i><span data-dcnode-id="2060" instrument_node=""> = 0.29]. The range of offers in each group included: vmPFC = −$8 to 8.67</span><sup data-dcnode-id="2056" id="footnotesuper2"><a data-dcnode-id="2059" id="note2a"></a><a class="footnoteanchor" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2"><span data-dcnode-id="2058" instrument_node="">2</span></a></sup><span data-dcnode-id="2055" instrument_node="">; BDC = $2 to 24; NC = $3 to 16. In fact, of the eight vmPFC patients, four patients actually gave lower offers to the man who had lost his son, two had virtually zero change, and two had increases in response to the empathy condition. In sharp contrast, all 16 participants in the comparison groups gave higher offers in response to the empathy induction; in many instances, these were much higher (Figure </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="2054" instrument_node="">2</span></a><span data-dcnode-id="2052" instrument_node="">A; Figure S1 in Supplementary Material for additional information).</span></p><span data-dcnode-id="2050" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2049"></div><span data-dcnode-id="2048" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">FIGURE 2</span></div><span data-dcnode-id="2045" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="2019"><span data-dcnode-id="2044" instrument_node="">
</span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/337391/fneur-09-00288-HTML-r1/image_m/fneur-09-00288-g002.jpg" target="_blank"><span data-dcnode-id="2043" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="2042" id="F2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/337391/fneur-09-00288-HTML-r1/image_t/fneur-09-00288-g002.gif&amp;raw"></a><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2021"><strong data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Figure 2</span></strong><span data-dcnode-id="2037" instrument_node="">. Group differences in empathic behavior, ratings, and believability. The three participant groups were compared on their empathic behavior, ratings, and the believability of the experiment. Graphs depict mean values and error bars are standard error of the mean. *</span><i data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">p</span></i><span data-dcnode-id="2034" instrument_node=""> &lt; 0.05. N.S., not significant. </span><strong data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">(A)</span></strong><span data-dcnode-id="2031" instrument_node=""> Empathic behavior by group. Empathic behavior on the Ultimatum Game (UG) was depicted as a change score reflecting the difference in the amount of money given after experiencing an empathy or neutral condition (sum of offers: empathy – neutral condition). Positive numbers indicate that greater money was given in response to the empathy induction than the neutral condition. </span><strong data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">(B)</span></strong><span data-dcnode-id="2028" instrument_node=""> Empathy ratings by group. An empathy rating change score was computed measuring empathic concern ratings before and after each induction condition: (After – Before Empathy Induction) – (After – Before Neutral Induction). Positive change scores indicate higher ratings on the empathy induction versus the neutral condition. </span><strong data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">(C)</span></strong><span data-dcnode-id="2025" instrument_node=""> Believability. Participants completed four questions at the end of the experiment measuring the degree to which they believed they were playing against real opponents. Responses across the four questions were averaged. (Rating scale: 1–5; 1 = did not believe and 5 = believed extremely.) Nineteen statistical tests were performed that were not testing </span><i data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">a priori</span></i><span data-dcnode-id="2022" instrument_node=""> hypotheses. Consequently, we applied a false discovery rate correction for these 19 tests (false discovery rate level: 0.05).</span></p><span data-dcnode-id="2020" instrument_node="">

</span><h4 data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Emotional Response: State Empathy</span></h4><span data-dcnode-id="2011" instrument_node="">
</span><p class="mb15" data-dcnode-id="1979"><span data-dcnode-id="2010" instrument_node="">We compared the degree to which there were differences in state self-rated empathy in response to the experimental conditions across the three groups. Overall, group differences were not significant (Figure </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="2009" instrument_node="">2</span></a><span data-dcnode-id="2007" instrument_node="">B; Table </span><a data-dcnode-id="2005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T3"><span data-dcnode-id="2006" instrument_node="">3</span></a><span data-dcnode-id="2004" instrument_node="">, </span><i data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">X</span></i><span data-dcnode-id="2001" instrument_node="">(2) = 3.11, </span><i data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">p</span></i><span data-dcnode-id="1998" instrument_node=""> = 0.21). Follow-up planned comparisons revealed that the vmPFC group did not significantly differ from the BDC group [</span><i data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">z</span></i><span data-dcnode-id="1995" instrument_node="">(14) = 1.70, </span><i data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">p</span></i><span data-dcnode-id="1992" instrument_node=""> = 0.09] or from the NC group [</span><i data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">z</span></i><span data-dcnode-id="1989" instrument_node="">(14) = 1.23, </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">p</span></i><span data-dcnode-id="1986" instrument_node=""> = 0.22]. Also, the BDC and NC groups did not differ significantly [</span><i data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">z</span></i><span data-dcnode-id="1983" instrument_node="">(14) = 0.43, </span><i data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">p</span></i><span data-dcnode-id="1980" instrument_node=""> = 0.67].</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p class="mb0" data-dcnode-id="1952"><span data-dcnode-id="1977" instrument_node="">We tested the degree to which the state empathy of the three groups was statistically equivalent using the two one-sided tests (TOST) procedure (</span><a data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="1976" instrument_node="">48</span></a><span data-dcnode-id="1974" instrument_node="">), with an alpha level of 0.05 and an effect size value of Cohen’s </span><i data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">d</span></i><span data-dcnode-id="1971" instrument_node=""> = 0.3 (indicating a small effect size). When comparing the vmPFC group to the BDC group, the equivalence test was non-significant [</span><i data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">t</span></i><span data-dcnode-id="1968" instrument_node="">(12.54) = 1.31, </span><i data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">p</span></i><span data-dcnode-id="1965" instrument_node=""> = 0.89]. When comparing the vmPFC group to the NC group, the equivalence test also was non-significant [</span><i data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">t</span></i><span data-dcnode-id="1962" instrument_node="">(13.08) = 0.97, </span><i data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">p</span></i><span data-dcnode-id="1959" instrument_node=""> = 0.83]. When comparing the BDC group to the NC group, the equivalence test was non-significant [</span><i data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">t</span></i><span data-dcnode-id="1956" instrument_node="">(13.90) = −0.22, </span><i data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">p</span></i><span data-dcnode-id="1953" instrument_node=""> = 0.42]. Although there were no statistically significant differences between the groups on this measure, our study’s small sample size prevented us from establishing statistically significant equivalence between the groups.</span></p><span data-dcnode-id="1951" instrument_node="">
</span><h3 data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Exploratory Analyses</span></h3><span data-dcnode-id="1948" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Patients Thoughts and Feelings About Empathy Induction</span></h4><span data-dcnode-id="1945" instrument_node="">
</span><p class="mb0" data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node="">We sought to further understand the degree to which patients were aware that the content of the empathy induction was about an empathy-eliciting situation. To further assess this question, we examined written free responses from the participants in response to a questionnaire that occurred at the end of the experiment, but prior to the debriefing session about the purpose of the study. In particular, participants responded to a question about their thoughts and feelings in response to the empathy induction in which they overheard their second opponent in the game talking about the anniversary of their son’s death. Specifically, the prompt was, “Please describe your thoughts and feelings (in a few words or a sentence) while hearing your second opponent talk with the Research Assistant. Please list these thoughts and feelings next to the bullets below. If there is not enough room, please use the lines below to describe further.” We present the full written responses of the patients with damage to the vmPFC in Table </span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23T4"><span data-dcnode-id="1943" instrument_node="">4</span></a><span data-dcnode-id="1941" instrument_node="">. The full written responses of the BDC and NC groups are presented in Table S1 in Supplementary Material.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1938"></div><span data-dcnode-id="1937" instrument_node="">

</span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/337391/fneur-09-00288-HTML-r1/image_m/fneur-09-00288-t004.jpg" target="_blank"><span data-dcnode-id="1932" instrument_node="">

</span><p data-dcnode-id="1925"><strong data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Table 4</span></strong><span data-dcnode-id="1926" instrument_node="">. Written free responses about empathy induction by patients with damage to the ventromedial prefrontal cortex (vmPFC).</span></p><span data-dcnode-id="1924" instrument_node="">
