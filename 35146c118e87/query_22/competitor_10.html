                     </span><a class="xref-" data-dcnode-id="3932" href="#ref-48" id="xref-ref-48-1"><span data-dcnode-id="3933" instrument_node="">Lupien and McEwen 1997</span></a><span data-dcnode-id="3931" instrument_node="">; Lupien
                     and LaPage 2001; </span><a class="xref-" data-dcnode-id="3929" href="#ref-42" id="xref-ref-42-3"><span data-dcnode-id="3930" instrument_node="">Kim and Diamond
                        2002</span></a><span data-dcnode-id="3928" instrument_node="">), and several well-controlled studies have recently been
                     conducted in humans. For example, Kirschbaum et al.
                     (</span><a class="xref-" data-dcnode-id="3926" href="#ref-43" id="xref-ref-43-1"><span data-dcnode-id="3927" instrument_node="">1996</span></a><span data-dcnode-id="3925" instrument_node="">) demonstrated that a
                     single, low dose of hydrocortisone (10 mg) led to a deficit in verbal episodic
                     memory. In this study, subjects who received hydrocortisone recalled fewer
                     words (via a cued recall test) from a previously learned word list than did
                     control subjects when recall occurred 60 min after receiving the drug.
                     Further, Lupien et al. (</span><a class="xref-" data-dcnode-id="3923" href="#ref-49" id="xref-ref-49-1"><span data-dcnode-id="3924" instrument_node="">1998</span></a><span data-dcnode-id="3922" instrument_node="">)
                     demonstrated that prolonged cortisol elevations in older adults are associated
                     with reduced hippocampal volume and impairments in hippocampally dependent
                     memory tasks. Aging is another condition that is associated not only with
                     elevated levels of cortisol and memory impairments but also with sleep
                     deficits. As might be expected, the sleep deficits occur primarily in SWS (see
                     </span><a class="xref-" data-dcnode-id="3920" href="#ref-41" id="xref-ref-41-1"><span data-dcnode-id="3921" instrument_node="">Kern et al. 1996</span></a><span data-dcnode-id="3919" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3917" href="#ref-90" id="xref-ref-90-1"><span data-dcnode-id="3918" instrument_node="">Van Cauter et al. 2000</span></a><span data-dcnode-id="3916" instrument_node="">),
                     perhaps helping to explain the episodic memory impairments often associated
                     with aging. Although a complete review of this growing literature is beyond
                     the scope of this article, many other studies have shown a relationship
                     between high levels of glucocorticoids and episodic memory deficits (see
                     Wolkowitz et al. </span><a class="xref-" data-dcnode-id="3914" href="#ref-98" id="xref-ref-98-1"><span data-dcnode-id="3915" instrument_node="">1990</span></a><span data-dcnode-id="3913" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3911" href="#ref-99" id="xref-ref-99-1"><span data-dcnode-id="3912" instrument_node="">1993</span></a><span data-dcnode-id="3910" instrument_node="">; Newcomer et al.
                     </span><a class="xref-" data-dcnode-id="3908" href="#ref-60" id="xref-ref-60-1"><span data-dcnode-id="3909" instrument_node="">1994</span></a><span data-dcnode-id="3907" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3905" href="#ref-61" id="xref-ref-61-1"><span data-dcnode-id="3906" instrument_node="">1999</span></a><span data-dcnode-id="3904" instrument_node="">; de Quervain et al.
                     </span><a class="xref-" data-dcnode-id="3902" href="#ref-17" id="xref-ref-17-2"><span data-dcnode-id="3903" instrument_node="">2000</span></a><span data-dcnode-id="3901" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3899" href="#ref-18" id="xref-ref-18-1"><span data-dcnode-id="3900" instrument_node="">2003</span></a><span data-dcnode-id="3898" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3896" href="#ref-68" id="xref-ref-68-2"><span data-dcnode-id="3897" instrument_node="">Payne et al. 2002</span></a><span data-dcnode-id="3895" instrument_node="">; E.D.
                     Jackson, J.D. Payne, L. Nadel, and W.J. Jacobs, in prep.; J.D. Payne, E.D.
                     Jackson, S. Hoscheidt, W.J. Jacobs, and L. Nadel, in
                     prep.)</span><a class="xref-" data-dcnode-id="3893" href="#fn-2" id="xref-fn-2-1"><span data-dcnode-id="3894" instrument_node="">3</span></a><span data-dcnode-id="3892" instrument_node="">.
                  </span></p><span data-dcnode-id="3890" instrument_node="">
</span><p data-dcnode-id="3889" id="p-53"></p><span data-dcnode-id="3888" instrument_node="">
</span><p data-dcnode-id="3862" id="p-55"><span data-dcnode-id="3887" instrument_node="">Because high cortisol levels produce memory deficits during the waking
                     state, they likely also prevent episodic memory consolidation late in the
                     night when REM sleep is abundant (as shown by Plihal and Born
                     </span><a class="xref-" data-dcnode-id="3885" href="#ref-71" id="xref-ref-71-7"><span data-dcnode-id="3886" instrument_node="">1997</span></a><span data-dcnode-id="3884" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3882" href="#ref-72" id="xref-ref-72-8"><span data-dcnode-id="3883" instrument_node="">1999a</span></a><span data-dcnode-id="3881" instrument_node="">). This idea, central to
                     our proposal, is supported by several recent studies. Plihal and Born
                     (</span><a class="xref-" data-dcnode-id="3879" href="#ref-73" id="xref-ref-73-2"><span data-dcnode-id="3880" instrument_node="">1999b</span></a><span data-dcnode-id="3878" instrument_node="">), for example, using
                     the early versus late sleep procedure (Plihal and Born
                     </span><a class="xref-" data-dcnode-id="3876" href="#ref-71" id="xref-ref-71-8"><span data-dcnode-id="3877" instrument_node="">1997</span></a><span data-dcnode-id="3875" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3873" href="#ref-72" id="xref-ref-72-9"><span data-dcnode-id="3874" instrument_node="">1999a</span></a><span data-dcnode-id="3872" instrument_node="">), showed that increasing
                     plasma cortisol concentrations during early sleep eradicated the benefit SWS
                     sleep typically bestows on episodic memory. Recall that subjects who study a
                     list of paired-associates before retiring to bed typically show great
                     improvement after 3 h of sleep dominated by SWS, but not after 3 h of REM.
                     Plihal and Born (</span><a class="xref-" data-dcnode-id="3870" href="#ref-73" id="xref-ref-73-3"><span data-dcnode-id="3871" instrument_node="">1999b</span></a><span data-dcnode-id="3869" instrument_node="">) showed
                     that infusing cortisol during the 3-h SWS retention interval undercuts the
                     facilitation of episodic memory that would otherwise be observed during this
                     time. However, cortisol infusion failed to disrupt retrieval of the procedural
                     memory task. Gais and Born
                     (</span><a class="xref-" data-dcnode-id="3867" href="#ref-24" id="xref-ref-24-1"><span data-dcnode-id="3868" instrument_node="">2004</span></a><span data-dcnode-id="3866" instrument_node="">) have recently shown
                     precisely the same effect with injection of an anticholinesterase agent that
                     increases acetylcholine levels. Whether acetylcholine triggers the rise in
                     cortisol, which then alters hippocampal function is not known at this
                     time</span><a class="xref-" data-dcnode-id="3864" href="#fn-3" id="xref-fn-3-1"><span data-dcnode-id="3865" instrument_node="">4</span></a><span data-dcnode-id="3863" instrument_node=""> but is a fit topic for
                     future study.
                  </span></p><span data-dcnode-id="3861" instrument_node="">
</span><p data-dcnode-id="3860" id="p-56"></p><span data-dcnode-id="3859" instrument_node="">
</span><p data-dcnode-id="3848" id="p-58"><span data-dcnode-id="3858" instrument_node="">It is worth noting that cortisol in the Plihal and Born
                     (</span><a class="xref-" data-dcnode-id="3856" href="#ref-73" id="xref-ref-73-4"><span data-dcnode-id="3857" instrument_node="">1999b</span></a><span data-dcnode-id="3855" instrument_node="">) study was elevated
                     just enough to mimic the late night peak of circadian HPA activity (15.2 +
                     0.68 mg/dL). This is similar to cortisol levels observed in response to a mild
                     to moderate stressor (∼10 to 30 mg/dL) and, as mentioned, is a sufficient
                     dose to disrupt episodic memory function (see
                     </span><a class="xref-" data-dcnode-id="3853" href="#ref-43" id="xref-ref-43-2"><span data-dcnode-id="3854" instrument_node="">Kirschbaum et al. 1996</span></a><span data-dcnode-id="3852" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3850" href="#ref-17" id="xref-ref-17-3"><span data-dcnode-id="3851" instrument_node="">de Quervain et al. 2000</span></a><span data-dcnode-id="3849" instrument_node="">).
                     Thus, cortisol levels, not sleep stage or time of night per se, could
                     determine both the nature of dreams and episodic memory consolidation effects.
                     To repeat, elevated cortisol leads to binding problems and fragmentation. When
                     the brain is confronted with decontextualized fragments, it imposes a
                     narrative upon them, leading to distorted memories or, in the case of dreams,
                     to bizarre reconstructions.
                  </span></p><span data-dcnode-id="3847" instrument_node="">
</span><h3 data-dcnode-id="3845"><span data-dcnode-id="3846" instrument_node="">Two caveats</span></h3><span data-dcnode-id="3844" instrument_node="">
</span><p data-dcnode-id="3824" id="p-59"><span data-dcnode-id="3843" instrument_node="">We have argued that diurnal elevations in cortisol may help explain the
                     nature of dreams. We do not mean to suggest that cortisol is the only factor
                     affecting the structure and content of dreams. Several of the
                     neurotransmitters that fluctuate across the sleep cycle are also known to
                     affect memory function during wake (e.g., acetylcholine, see
                     </span><a class="xref-" data-dcnode-id="3841" href="#ref-29" id="xref-ref-29-3"><span data-dcnode-id="3842" instrument_node="">Hasselmo 1999</span></a><span data-dcnode-id="3840" instrument_node="">; NE, see
                     </span><a class="xref-" data-dcnode-id="3838" href="#ref-12" id="xref-ref-12-2"><span data-dcnode-id="3839" instrument_node="">Cahill and McGaugh 1998</span></a><span data-dcnode-id="3837" instrument_node="">), and
                     there has been much speculation about their influence on memory processing
                     during sleep (</span><a class="xref-" data-dcnode-id="3835" href="#ref-30" id="xref-ref-30-3"><span data-dcnode-id="3836" instrument_node="">Hobson 1988</span></a><span data-dcnode-id="3834" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3832" href="#ref-84" id="xref-ref-84-1"><span data-dcnode-id="3833" instrument_node="">Solms 2000</span></a><span data-dcnode-id="3831" instrument_node="">). Moreover, these
                     neurotransmitters likely interact with cortisol during sleep. For example,
                     acetylcholine and cortisol are both diminished during SWS (they are also both
                     elevated during REM sleep). Levels of cholinergic activity and cortisol
                     production during SWS are both quite low, and this appears necessary for
                     episodic memories to undergo effective consolidation; experimentally elevating
                     either substance impairs performance on verbal episodic memory tasks
                     (</span><a class="xref-" data-dcnode-id="3829" href="#ref-73" id="xref-ref-73-5"><span data-dcnode-id="3830" instrument_node="">Plihal and Born 1999b</span></a><span data-dcnode-id="3828" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3826" href="#ref-24" id="xref-ref-24-3"><span data-dcnode-id="3827" instrument_node="">Gais and Born 2004</span></a><span data-dcnode-id="3825" instrument_node="">). In
                     addition to cortisol then, acetylcholine is another candidate modulator of
                     dreams; a thorough consideration of this possibility is beyond the scope of
                     the present paper.
                  </span></p><span data-dcnode-id="3823" instrument_node="">
</span><p data-dcnode-id="3803" id="p-60"><span data-dcnode-id="3822" instrument_node="">Recent neuroimaging evidence demonstrates a selective inactivation of
                     portions of the frontal cortex during REM sleep (see
                     </span><a class="xref-" data-dcnode-id="3820" href="#ref-6" id="xref-ref-6-1"><span data-dcnode-id="3821" instrument_node="">Braun et al. 1997</span></a><span data-dcnode-id="3819" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3817" href="#ref-63" id="xref-ref-63-1"><span data-dcnode-id="3818" instrument_node="">Nofzinger et al. 1997</span></a><span data-dcnode-id="3816" instrument_node="">). These
                     studies demonstrated a prominent decrease in activity of the dorsolateral
                     prefrontal cortex, and disruption in this region has been associated with
                     confabulatory syndromes that are in some ways similar to dreaming. Moreover,
                     as the prefrontal cortex is thought to play a role, along with the
                     hippocampus, in binding the elements of a memory together
                     (</span><a class="xref-" data-dcnode-id="3814" href="#ref-55" id="xref-ref-55-1"><span data-dcnode-id="3815" instrument_node="">Mitchell et al. 2000</span></a><span data-dcnode-id="3813" instrument_node="">),
                     deactivation seen in this region could be related to the fragmented nature of
                     dreams. Interestingly, frontal deactivation may also underlie our tendency to
                     blithely accept dream fragments and bizarre themes as commonplace and normal.
                     This notion is consistent with evidence that the frontal lobes contribute to
                     reality monitoring (</span><a class="xref-" data-dcnode-id="3811" href="#ref-37" id="xref-ref-37-1"><span data-dcnode-id="3812" instrument_node="">Johnson
                        1991</span></a><span data-dcnode-id="3810" instrument_node="">), working memory
                     (</span><a class="xref-" data-dcnode-id="3808" href="#ref-25" id="xref-ref-25-1"><span data-dcnode-id="3809" instrument_node="">Goldman-Rakic 1992</span></a><span data-dcnode-id="3807" instrument_node="">), and
                     other executive functions (</span><a class="xref-" data-dcnode-id="3805" href="#ref-82" id="xref-ref-82-1"><span data-dcnode-id="3806" instrument_node="">Smith and
                        Jonides 1999</span></a><span data-dcnode-id="3804" instrument_node="">) during the waking state.
                  </span></p><span data-dcnode-id="3802" instrument_node="">
</span></div><span data-dcnode-id="3800" instrument_node="">
</span><div class="section" data-dcnode-id="3755" id="sec-15"><span data-dcnode-id="3799" instrument_node="">
</span><div class="section-nav" data-dcnode-id="3792"><a class="prev-section-link" data-dcnode-id="3796" href="#sec-8" title="The hypothesis in brief"><span data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Previous Section</span></span></a><a class="next-section-link" data-dcnode-id="3793" href="#fn-group-1" title="Footnotes"><span data-dcnode-id="3794"><span data-dcnode-id="3795" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="3791" instrument_node="">
</span><h2 data-dcnode-id="3789"><span data-dcnode-id="3790" instrument_node="">Conclusions</span></h2><span data-dcnode-id="3788" instrument_node="">
</span><p data-dcnode-id="3786" id="p-61"><span data-dcnode-id="3787" instrument_node="">We have proposed that the hormone cortisol plays an important role in
                     controlling the state of memory systems during sleep. High levels of cortisol,
                     as are observed late at night and, typically in the context of REM sleep,
                     disrupt normal hippocampal → neocortical communication, thereby
                     interfering with forms of memory consolidation dependent upon this
                     communication. At the same time, the content of dreams is also affected. In
                     SWS dream content reflects the normal interaction between hippocampal and
                     neocortical circuits, allowing for typical episodic memories to emerge. In REM
                     sleep, however, dream content reflects only neocortical activation, which we
                     assume accounts for the fragmented, often bizarre, nature of these dreams.
                  </span></p><span data-dcnode-id="3785" instrument_node="">
</span><p data-dcnode-id="3777" id="p-62"><span data-dcnode-id="3784" instrument_node="">The fact that normal episodic memories are only retrieved during SWS when
                     hippocampal-neocortical communication is functional has interesting
                     implications for a current debate about the storage of remote episode
                     memories. Some (see </span><a class="xref-" data-dcnode-id="3782" href="#ref-1" id="xref-ref-1-1"><span data-dcnode-id="3783" instrument_node="">Alvarez and Squire
                        1994</span></a><span data-dcnode-id="3781" instrument_node="">) believe that remote episode memories are ultimately stored
                     in the neocortex, after consolidation has been completed. Others (see
                     </span><a class="xref-" data-dcnode-id="3779" href="#ref-56" id="xref-ref-56-2"><span data-dcnode-id="3780" instrument_node="">Nadel and Moscovitch 1997</span></a><span data-dcnode-id="3778" instrument_node="">)
                     have argued that the hippocampal complex is always involved in the retrieval
                     of fully elaborated episode memories. The absence of proper episodic retrieval
                     in dreams during REM sleep, when hippocampal-neocortical communication is
                     disrupted, but neocortical-neocortical communication is preserved, is
                     consistent with the latter position. If fully consolidated episode memories
                     could be elaborated in the neocortex, we should expect to observe their
                     retrieval during REM dreams—but this does not appear to be the case, at
                     least in the few studies reported to date. Closer examination of the nature of
                     dreams in REM sleep, and the presence, or absence, of remote memories in these
                     dreams, would provide important clues in this ongoing debate about the nature
                     of memory storage in the brain.
                  </span></p><span data-dcnode-id="3776" instrument_node="">
</span><p data-dcnode-id="3774" id="p-63"><span data-dcnode-id="3775" instrument_node="">In addition to telling us something about the contributions hippocampal and
                     neocortical circuits make to episodic memory, to the consolidation of episodic
                     and semantic memory, and to the content of dreams, our proposal suggests some
                     intriguing possibilities about creativity and the generation of novel
                     thoughts. One stage of consolidation likely involves the integration of
                     information with pre-existing knowledge and the linking of distant but related
                     concepts. We dream when we become aware of these activated traces, which are
                     often fragmented images and sounds coupled with motor activity. Similar to
                     memories created under stress, these fragments are immediately subjected to a
                     process of narrative smoothing, and the result is typically a story that is
                     often confabulatory, quite bizarre, but possibly also creative.
                  </span></p><span data-dcnode-id="3773" instrument_node="">
</span><p data-dcnode-id="3771" id="p-64"><span data-dcnode-id="3772" instrument_node="">Although it is true that accurate recall is adaptive in many cases, there
                     may nonetheless be a positive side to a process that produces
                     fragmentation—both during wake and during sleep. All new ideas are based
                     upon previously stored information. These fragments, or pieces and patches of
                     knowledge, are bound into representations that we use to recall information
                     about personal experience and to help us understand and act in the world. When
                     these bonds are weakened, this information can be recombined, either in dreams
                     or misremembered episodes—perhaps resulting in a process leading us down
                     unusual paths to creative insights and new ideas.
                  </span></p><span data-dcnode-id="3770" instrument_node="">
</span><p data-dcnode-id="3761" id="p-65"><q data-dcnode-id="3768" id="disp-quote-1"><span data-dcnode-id="3769" instrument_node="">Dreams are but interludes which fancy makes</span></q><q data-dcnode-id="3766" id="disp-quote-1"><span data-dcnode-id="3767" instrument_node="">When monarch reason sleeps, this mimic wakes.</span></q><q data-dcnode-id="3764" id="disp-quote-1"><span data-dcnode-id="3765" instrument_node="">Compounds a medley of disjointed things</span></q><q data-dcnode-id="3762" id="disp-quote-1"><span data-dcnode-id="3763" instrument_node="">A mob of cobblers and a court of Kings.</span></q></p><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3757" id="p-70"><em data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">John Dryden (1700)</span></em></p><span data-dcnode-id="3756" instrument_node="">
</span></div><span data-dcnode-id="3754" instrument_node="">
</span><div class="section fn-group" data-dcnode-id="3684" id="fn-group-1"><span data-dcnode-id="3753" instrument_node="">
</span><div class="section-nav" data-dcnode-id="3746"><a class="prev-section-link" data-dcnode-id="3750" href="#sec-15" title="Conclusions"><span data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">Previous Section</span></span></a><a class="next-section-link" data-dcnode-id="3747" href="#ref-list-1" title="References"><span data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="3745" instrument_node="">
</span><h2 data-dcnode-id="3743"><span data-dcnode-id="3744" instrument_node="">Footnotes</span></h2><span data-dcnode-id="3742" instrument_node="">
</span><ul data-dcnode-id="3686"><span data-dcnode-id="3741" instrument_node="">
</span><li class="fn" data-dcnode-id="3729" id="fn-1"><span data-dcnode-id="3740" instrument_node="">
</span><p data-dcnode-id="3731" id="p-48"><a class="rev-xref" data-dcnode-id="3738" href="#xref-fn-1-1"><span data-dcnode-id="3739" instrument_node="">↵</span></a><span class="fn-label" data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">2</span></span><span data-dcnode-id="3735" instrument_node=""> This observation seems, at first glance, to conflict with the fact that CA3
                           is highly susceptible to the toxic effects of chronic stress
                           (</span><a class="xref-" data-dcnode-id="3733" href="#ref-77" id="xref-ref-77-1"><span data-dcnode-id="3734" instrument_node="">Sapolsky, 2000</span></a><span data-dcnode-id="3732" instrument_node="">). However, the
                           impact of acute and chronic stress clearly differs in a number of ways, and
                           this conflict may be more apparent than real.
                        </span></p><span data-dcnode-id="3730" instrument_node="">
</span></li><span data-dcnode-id="3728" instrument_node="">
</span><li class="fn" data-dcnode-id="3710" id="fn-2"><span data-dcnode-id="3727" instrument_node="">
</span><p data-dcnode-id="3712" id="p-54"><a class="rev-xref" data-dcnode-id="3725" href="#xref-fn-2-1"><span data-dcnode-id="3726" instrument_node="">↵</span></a><span class="fn-label" data-dcnode-id="3723"><span data-dcnode-id="3724" instrument_node="">3</span></span><span data-dcnode-id="3722" instrument_node=""> Not all glucocorticoid effects on memory are negative. For example, there
                           is ample evidence that glucocorticoids released during or after emotionally
                           arousing experiences play a critical role in the formation of lasting memories
                           (</span><a class="xref-" data-dcnode-id="3720" href="#ref-75" id="xref-ref-75-1"><span data-dcnode-id="3721" instrument_node="">Roozendaal 2003</span></a><span data-dcnode-id="3719" instrument_node="">), and memory
                           for emotional materials is actually facilitated by cortisol (see
                           </span><a class="xref-" data-dcnode-id="3717" href="#ref-8" id="xref-ref-8-1"><span data-dcnode-id="3718" instrument_node="">Buchanan and Lovallo 2001</span></a><span data-dcnode-id="3716" instrument_node="">; J.D.
                           Payne, E.D. Jackson, S. Hoscheidt, W.J. Jacob, and L. Nadel, in prep.). Memory
                           for emotionally neutral experiences, by contrast, is typically negatively
                           affected by acute stressors or administration of cortisol (for a review, see
                           </span><a class="xref-" data-dcnode-id="3714" href="#ref-69" id="xref-ref-69-2"><span data-dcnode-id="3715" instrument_node="">Payne et al. 2004</span></a><span data-dcnode-id="3713" instrument_node="">). Along
                           these lines it is interesting to note that many dreams are distinctly
                           emotional, often involving intense fear, and that emotional dreams are among
                           the most well-remembered.
                        </span></p><span data-dcnode-id="3711" instrument_node="">
</span></li><span data-dcnode-id="3709" instrument_node="">
</span><li class="fn" data-dcnode-id="3697" id="fn-3"><span data-dcnode-id="3708" instrument_node="">
</span><p data-dcnode-id="3699" id="p-57"><a class="rev-xref" data-dcnode-id="3706" href="#xref-fn-3-1"><span data-dcnode-id="3707" instrument_node="">↵</span></a><span class="fn-label" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">4</span></span><span data-dcnode-id="3703" instrument_node=""> Although Gais and Born
                           (</span><a class="xref-" data-dcnode-id="3701" href="#ref-24" id="xref-ref-24-2"><span data-dcnode-id="3702" instrument_node="">2004</span></a><span data-dcnode-id="3700" instrument_node="">) failed to show a
                           corresponding increase in cortisol after administration of a small dose of the
                           acetylcholine agonist physostigmine (0.75 mg), it remains possible that higher
                           levels of acetylcholine may trigger a concomitant rise in cortisol.
                        </span></p><span data-dcnode-id="3698" instrument_node="">
</span></li><span data-dcnode-id="3696" instrument_node="">
</span><li class="fn" data-dcnode-id="3691" id="fn-4"><span data-dcnode-id="3695" instrument_node="">
</span><p data-dcnode-id="3693" id="p-71"><span data-dcnode-id="3694" instrument_node="">Article and publication are at
                           http://www.learnmem.org/cgi/doi/10.1101/lm.77104.
                        </span></p><span data-dcnode-id="3692" instrument_node="">
