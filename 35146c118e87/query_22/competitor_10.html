</span><div class="article fulltext-view" data-dcnode-id="624" itemprop="articleBody"><span class="highwire-journal-article-marker-start" data-dcnode-id="4561"></span><h1 data-dcnode-id="4559" id="article-title-1" itemprop="headline"><span data-dcnode-id="4560" instrument_node="">Sleep, dreams, and memory consolidation: The role of the stress hormone
                  cortisol
               </span></h1><span data-dcnode-id="4558" instrument_node="">
</span><div class="contributors" data-dcnode-id="4526"><span data-dcnode-id="4557" instrument_node="">
</span><ol class="contributor-list" data-dcnode-id="4542" id="contrib-group-1"><span data-dcnode-id="4556" instrument_node="">
</span><li data-dcnode-id="4551" id="contrib-1"><span class="name" data-dcnode-id="4553"><a class="name-search" data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//learnmem.cshlp.org/search%3Fauthor1%3DJessica%2BD.%2BPayne%26sortspec%3Ddate%26submit%3DSubmit"><span data-dcnode-id="4555" instrument_node="">Jessica D. Payne</span></a></span><span data-dcnode-id="4552" instrument_node=""> and 
                     </span></li><span data-dcnode-id="4550" instrument_node="">
</span><li data-dcnode-id="4544" id="contrib-2"><span class="name" data-dcnode-id="4547"><a class="name-search" data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//learnmem.cshlp.org/search%3Fauthor1%3DLynn%2BNadel%26sortspec%3Ddate%26submit%3DSubmit"><span data-dcnode-id="4549" instrument_node="">Lynn Nadel</span></a></span><a class="xref-" data-dcnode-id="4545" href="#corresp-1" id="xref-corresp-1-1"><span data-dcnode-id="4546" instrument_node="">1</span></a></li><span data-dcnode-id="4543" instrument_node="">
</span></ol><p class="affiliation-list-reveal" data-dcnode-id="4538"><a class="view-more" data-dcnode-id="4540" href="#"><span data-dcnode-id="4541" instrument_node="">+</span></a><span data-dcnode-id="4539" instrument_node=""> Author Affiliations</span></p><span data-dcnode-id="4537" instrument_node="">
</span><ol class="affiliation-list hideaffil" data-dcnode-id="4528"><span data-dcnode-id="4536" instrument_node="">
</span><li class="aff" data-dcnode-id="4530"><a data-dcnode-id="4535" id="aff-1" name="aff-1"></a><address data-dcnode-id="4532"><em data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">The University of Arizona, Department of Psychology, Tucson, Arizona
                              85721, USA</span></em></address><span data-dcnode-id="4531" instrument_node="">
</span></li><span data-dcnode-id="4529" instrument_node="">
</span></ol><span data-dcnode-id="4527" instrument_node="">
</span></div><span data-dcnode-id="4525" instrument_node="">
</span><div class="section abstract" data-dcnode-id="4509" id="abstract-1" itemprop="description"><span data-dcnode-id="4524" instrument_node="">
</span><div class="section-nav" data-dcnode-id="4517"><span data-dcnode-id="4523" instrument_node="">
</span><div class="nav-placeholder" data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">&nbsp;</span></div><a class="next-section-link" data-dcnode-id="4518" href="#sec-1" title="Next Section"><span data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="4516" instrument_node="">
</span><h2 data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Abstract</span></h2><span data-dcnode-id="4513" instrument_node="">
</span><p data-dcnode-id="4511" id="p-1"><span data-dcnode-id="4512" instrument_node="">We discuss the relationship between sleep, dreams, and memory, proposing
                     that the content of dreams reflects aspects of memory consolidation taking
                     place during the different stages of sleep. Although we acknowledge the likely
                     involvement of various neuromodulators in these phenomena, we focus on the
                     hormone cortisol, which is known to exert influence on many of the brain
                     systems involved in memory. The concentration of cortisol escalates over the
                     course of the night's sleep, in ways that we propose can help explain the
                     changing nature of dreams across the sleep cycle.
                  </span></p><span data-dcnode-id="4510" instrument_node="">
</span></div><span data-dcnode-id="4508" instrument_node="">
</span><p data-dcnode-id="4507" id="p-2"></p><span data-dcnode-id="4506" instrument_node="">
</span><div class="section" data-dcnode-id="4469" id="sec-1"><span data-dcnode-id="4505" instrument_node="">
</span><div class="section-nav" data-dcnode-id="4498"><a class="prev-section-link" data-dcnode-id="4502" href="#abstract-1" title="Abstract"><span data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">Previous Section</span></span></a><a class="next-section-link" data-dcnode-id="4499" href="#sec-2" title="Background to the hypothesis"><span data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="4497" instrument_node="">
</span><p data-dcnode-id="4483" id="p-3"><span data-dcnode-id="4496" instrument_node="">There is currently no convincing explanation for why we dream or what we
                     dream about. In this article we propose an approach to dreaming that focuses
                     on the relationship between sleep and memory. We suggest that dreams reflect a
                     biological process of long-term memory consolidation, serving to strengthen
                     the neural traces of recent events, to integrate these new traces with older
                     memories and previously stored knowledge, and to maintain the stability of
                     existing memory representations in the face of subsequent experience (Winson
                     </span><a class="xref-" data-dcnode-id="4494" href="#ref-95" id="xref-ref-95-1"><span data-dcnode-id="4495" instrument_node="">1985</span></a><span data-dcnode-id="4493" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4491" href="#ref-96" id="xref-ref-96-1"><span data-dcnode-id="4492" instrument_node="">2002</span></a><span data-dcnode-id="4490" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4488" href="#ref-97" id="xref-ref-97-1"><span data-dcnode-id="4489" instrument_node="">2004</span></a><span data-dcnode-id="4487" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4485" href="#ref-38" id="xref-ref-38-1"><span data-dcnode-id="4486" instrument_node="">Kali and Dayan 2004</span></a><span data-dcnode-id="4484" instrument_node="">).
                  </span></p><span data-dcnode-id="4482" instrument_node="">
</span><p data-dcnode-id="4477" id="p-4"><span data-dcnode-id="4481" instrument_node="">It is generally assumed that long-term memory consolidation involves
                     interactions among multiple brain systems, modulated by various
                     neurotransmitters and neurohormones. We propose that the characteristics of
                     dreams are best understood in the context of this neuromodulatory impact on
                     the brain systems involved in memory consolidation. Although a number of
                     neurotransmitters and neurohormones are likely involved, we focus our
                     attention in particular on the stress hormone </span><em data-dcnode-id="4479"><span data-dcnode-id="4480" instrument_node="">cortisol</span></em><span data-dcnode-id="4478" instrument_node="">, which has
                     widespread effects on memory during waking life through its impact on many of
                     the critical brain structures implicated in memory function.
                  </span></p><span data-dcnode-id="4476" instrument_node="">
</span><p data-dcnode-id="4474" id="p-5"><span data-dcnode-id="4475" instrument_node="">Our hypothesis, briefly stated, is that variations in cortisol (and other
                     neurotransmitters) determine the functional status of hippocampal ↔
                     neocortical circuits, thereby influencing the memory consolidation processes
                     that transpire during sleep. The status of these circuits largely determines
                     the phenomenology of dreams, providing an explanation for why we dream and of
                     what. As a corollary, dreams can be thought of as windows onto the inner
                     workings of our memory systems, at least those of which we can become
                     conscious.
                  </span></p><span data-dcnode-id="4473" instrument_node="">
</span><p data-dcnode-id="4471" id="p-6"><span data-dcnode-id="4472" instrument_node="">In addition to exploring these ideas in more detail, we provide some
                     background concerning (1) the states of sleep and the role of various
                     neurotransmitters in switching from one sleep state to another, (2) how the
                     characteristics of dreams vary as a function of sleep state, (3) the memory
                     content typically associated with dreaming in different dream states, and (4)
                     the role of sleep in the consolidation of memory.
                  </span></p><span data-dcnode-id="4470" instrument_node="">
</span></div><span data-dcnode-id="4468" instrument_node="">
</span><div class="section" data-dcnode-id="4269" id="sec-2"><span data-dcnode-id="4467" instrument_node="">
</span><div class="section-nav" data-dcnode-id="4460"><a class="prev-section-link" data-dcnode-id="4464" href="#sec-1" title="Previous Section"><span data-dcnode-id="4465"><span data-dcnode-id="4466" instrument_node="">Previous Section</span></span></a><a class="next-section-link" data-dcnode-id="4461" href="#sec-8" title="The hypothesis in brief"><span data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="4459" instrument_node="">
</span><h2 data-dcnode-id="4457"><span data-dcnode-id="4458" instrument_node="">Background to the hypothesis</span></h2><span data-dcnode-id="4456" instrument_node="">
</span><h3 data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Stages of sleep</span></h3><span data-dcnode-id="4453" instrument_node="">
</span><p data-dcnode-id="4445" id="p-7"><span data-dcnode-id="4452" instrument_node="">There are two major types of sleep. The first, rapid eye movement or REM
                     sleep, occurs in ∼90-min cycles and alternates with four additional stages
                     known collectively as NREM sleep—the second type of sleep. Slow wave
                     sleep (SWS) is the deepest of the NREM phases and is the phase from which
                     people have the most difficulty being awakened. REM sleep is characterized by
                     low-amplitude, fast electroencephalographic (EEG) oscillations, rapid eye
                     movements (</span><a class="xref-" data-dcnode-id="4450" href="#ref-3" id="xref-ref-3-1"><span data-dcnode-id="4451" instrument_node="">Aserinsky and Kleitman
                        1953</span></a><span data-dcnode-id="4449" instrument_node="">), and decreased muscle tone, whereas SWS is characterized by
                     large-amplitude, low-frequency EEG oscillations
                     (</span><a class="xref-" data-dcnode-id="4447" href="#ref-50" id="xref-ref-50-1"><span data-dcnode-id="4448" instrument_node="">Maquet 2001</span></a><span data-dcnode-id="4446" instrument_node="">). More than 80%
                     of SWS is concentrated in the first half of the typical 8-h night, whereas the
                     second half of the night contains roughly twice as much REM sleep as does the
                     first half. This domination of early sleep by SWS, and of late sleep by REM,
                     likely has important functional consequences but also makes it difficult at
                     this time to know which distinction is critical: NREM sleep versus REM sleep
                     or early sleep versus late sleep. We will use the terms NREM/early sleep and
                     REM/late sleep, where necessary, to reflect this current ambiguity.
                  </span></p><span data-dcnode-id="4444" instrument_node="">
</span><p data-dcnode-id="4433" id="p-8"><span data-dcnode-id="4443" instrument_node="">Neurotransmitters, particularly the monoamines (largely serotonin [5-HT]
                     and norepinephrine [NE]) and acetylcholine, play a critical role in switching
                     the brain from one sleep stage to another. REM sleep occurs when activity in
                     the aminergic system has decreased enough to allow the reticular system to
                     escape its inhibitory influence (Hobson et al.
                     </span><a class="xref-" data-dcnode-id="4441" href="#ref-32" id="xref-ref-32-1"><span data-dcnode-id="4442" instrument_node="">1975</span></a><span data-dcnode-id="4440" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4438" href="#ref-33" id="xref-ref-33-1"><span data-dcnode-id="4439" instrument_node="">1998</span></a><span data-dcnode-id="4437" instrument_node="">). The release from
                     aminergic inhibition stimulates cholinergic reticular neurons in the brainstem
                     and switches the sleeping brain into the highly active REM state, in which
                     acetylcholine levels are as high as in the waking state. 5-HT and NE, on the
                     other hand, are virtually absent during REM. SWS, conversely, is associated
                     with an absence of acetylcholine and nearly normal levels of 5-HT and NE
                     (</span><a class="xref-" data-dcnode-id="4435" href="#ref-34" id="xref-ref-34-1"><span data-dcnode-id="4436" instrument_node="">Hobson and Pace-Schott
                        2002</span></a><span data-dcnode-id="4434" instrument_node="">).
                  </span></p><span data-dcnode-id="4432" instrument_node="">
</span><h3 data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">The distribution of dreams</span></h3><span data-dcnode-id="4429" instrument_node="">
</span><p data-dcnode-id="4415" id="p-9"><span data-dcnode-id="4428" instrument_node="">In the study of dreams, a major distinction has been drawn between REM and
                     NREM sleep. Until recently, virtually all dream research focused on REM sleep,
                     and indeed, dreams are prevalent during REM. In a recent review of 29 REM and
                     33 NREM recall studies, Nielsen
                     (</span><a class="xref-" data-dcnode-id="4426" href="#ref-62" id="xref-ref-62-1"><span data-dcnode-id="4427" instrument_node="">2000</span></a><span data-dcnode-id="4425" instrument_node="">) reported an average REM
                     dream recall rate of 81.8%. Importantly, however, he also reported an average
                     NREM recall rate of ∼50%. Some NREM dreams are similar in content to REM
                     dreams; the majority of these come from those few NREM periods occurring early
                     in the morning, during the peak phase of the diurnal rhythm, when cortisol
                     levels are at their zenith (</span><a class="xref-" data-dcnode-id="4423" href="#ref-44" id="xref-ref-44-1"><span data-dcnode-id="4424" instrument_node="">Kondo et al.
                        1989</span></a><span data-dcnode-id="4422" instrument_node="">). Foulkes
                     (</span><a class="xref-" data-dcnode-id="4420" href="#ref-21" id="xref-ref-21-1"><span data-dcnode-id="4421" instrument_node="">1985</span></a><span data-dcnode-id="4419" instrument_node="">) has argued for the
                     existence of NREM dreaming and against a simple “REM sleep =
                     dreaming” view. By simply changing the question asked of awakened
                     subjects from “Did you dream?” to “Did you experience any
                     mental content?,” Foulkes was able to show a far higher percentage of
                     dream reports from NREM stages than original studies had suggested. These
                     dream reports after NREM awakenings led Foulkes and others to conclude that
                     the stream of consciousness never ceases during sleep and that the brain
                     engages in cognitive activity of some sort during all sleep stages
                     (</span><a class="xref-" data-dcnode-id="4417" href="#ref-2" id="xref-ref-2-1"><span data-dcnode-id="4418" instrument_node="">Antrobus 1990</span></a><span data-dcnode-id="4416" instrument_node="">).
                  </span></p><span data-dcnode-id="4414" instrument_node="">
</span><h3 data-dcnode-id="4412"><span data-dcnode-id="4413" instrument_node="">Dreams and episodic memory content</span></h3><span data-dcnode-id="4411" instrument_node="">
</span><p data-dcnode-id="4373" id="p-10"><span data-dcnode-id="4410" instrument_node="">Typical REM and NREM dreams are quite distinct, particularly with respect
                     to episodic memory content. Episodic memory refers to knowledge about the past
                     that incorporates information about where and when particular events occurred.
                     It is typically contrasted with semantic memory, which consists of knowledge
                     (e.g., facts, word meanings) that has been uncoupled from place and time,
                     existing on its own (</span><a class="xref-" data-dcnode-id="4408" href="#ref-89" id="xref-ref-89-1"><span data-dcnode-id="4409" instrument_node="">Tulving
                        1983</span></a><span data-dcnode-id="4407" instrument_node="">). When examining REM sleep dreams for memory content, one
                     finds that episodic memories are rare (see
                     </span><a class="xref-" data-dcnode-id="4405" href="#ref-5" id="xref-ref-5-1"><span data-dcnode-id="4406" instrument_node="">Baylor and Cavallero 2001</span></a><span data-dcnode-id="4404" instrument_node="">) and
                     typically emerge as disconnected fragments that are often difficult to relate
                     to waking life events (see </span><a class="xref-" data-dcnode-id="4402" href="#ref-78" id="xref-ref-78-1"><span data-dcnode-id="4403" instrument_node="">Schwartz
                        2003</span></a><span data-dcnode-id="4401" instrument_node="">). These fragmented REM dreams often have bizarre content
                     (</span><a class="xref-" data-dcnode-id="4399" href="#ref-88" id="xref-ref-88-1"><span data-dcnode-id="4400" instrument_node="">Stickgold et al. 2001</span></a><span data-dcnode-id="4398" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4396" href="#ref-31" id="xref-ref-31-1"><span data-dcnode-id="4397" instrument_node="">Hobson 2002</span></a><span data-dcnode-id="4395" instrument_node="">). For example, the
                     normal rules of space and time can be ignored or disobeyed, so that in REM
                     dreams it is possible to walk through walls, fly, interact with an entirely
                     unknown person as if she was your mother, or stroll through Paris past the
                     Empire State Building. NREM dreams, however, are quite different
                     (</span><a class="xref-" data-dcnode-id="4393" href="#ref-13" id="xref-ref-13-1"><span data-dcnode-id="4394" instrument_node="">Cavallero et al. 1992</span></a><span data-dcnode-id="4392" instrument_node="">). Here,
                     episodic memories </span><em data-dcnode-id="4390"><span data-dcnode-id="4391" instrument_node="">do</span></em><span data-dcnode-id="4389" instrument_node=""> appear in dream content (see
                     </span><a class="xref-" data-dcnode-id="4387" href="#ref-20" id="xref-ref-20-1"><span data-dcnode-id="4388" instrument_node="">Foulkes 1962</span></a><span data-dcnode-id="4386" instrument_node="">; Cicogna et al.
                     </span><a class="xref-" data-dcnode-id="4384" href="#ref-15" id="xref-ref-15-1"><span data-dcnode-id="4385" instrument_node="">1986</span></a><span data-dcnode-id="4383" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4381" href="#ref-16" id="xref-ref-16-1"><span data-dcnode-id="4382" instrument_node="">1991</span></a><span data-dcnode-id="4380" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4378" href="#ref-13" id="xref-ref-13-2"><span data-dcnode-id="4379" instrument_node="">Cavallero et al. 1992</span></a><span data-dcnode-id="4377" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4375" href="#ref-5" id="xref-ref-5-2"><span data-dcnode-id="4376" instrument_node="">Baylor and Cavallero 2001</span></a><span data-dcnode-id="4374" instrument_node="">).
                     Recent episodes are predominant, but remote memories occasionally appear as
                     well. This pattern of results suggests to us that the memory systems needed to
                     generate complete episodic retrieval are functional in NREM sleep but not in
                     REM sleep. Although we do not fully understand how nightly neurochemical
                     fluctuations account for this difference, some clues are available.
                  </span></p><span data-dcnode-id="4372" instrument_node="">
</span><h3 data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Sleep and memory consolidation</span></h3><span data-dcnode-id="4369" instrument_node="">
</span><p data-dcnode-id="4331" id="p-11"><span data-dcnode-id="4368" instrument_node="">One important clue is that different types of memory (e.g., procedural,
                     episodic) appear to be best consolidated during specific stages of sleep. REM
                     sleep may be preferentially important for the consolidation of procedural
                     memories and some types of emotional information (see
                     </span><a class="xref-" data-dcnode-id="4366" href="#ref-39" id="xref-ref-39-1"><span data-dcnode-id="4367" instrument_node="">Karni et al. 1994</span></a><span data-dcnode-id="4365" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4363" href="#ref-72" id="xref-ref-72-1"><span data-dcnode-id="4364" instrument_node="">Plihal and Born 1999a</span></a><span data-dcnode-id="4362" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4360" href="#ref-45" id="xref-ref-45-1"><span data-dcnode-id="4361" instrument_node="">Kuriyama et al. 2004</span></a><span data-dcnode-id="4359" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4357" href="#ref-83" id="xref-ref-83-1"><span data-dcnode-id="4358" instrument_node="">Smith et al. 2004</span></a><span data-dcnode-id="4356" instrument_node="">), whereas
                     NREM, especially SWS, appears to be critical for explicit, episodic memory
                     consolidation (Plihal and Born
                     </span><a class="xref-" data-dcnode-id="4354" href="#ref-71" id="xref-ref-71-1"><span data-dcnode-id="4355" instrument_node="">1997</span></a><span data-dcnode-id="4353" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4351" href="#ref-72" id="xref-ref-72-2"><span data-dcnode-id="4352" instrument_node="">1999a</span></a><span data-dcnode-id="4350" instrument_node="">,</span><a class="xref-" data-dcnode-id="4348" href="#ref-73" id="xref-ref-73-1"><span data-dcnode-id="4349" instrument_node="">b</span></a><span data-dcnode-id="4347" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4345" href="#ref-76" id="xref-ref-76-1"><span data-dcnode-id="4346" instrument_node="">Rubin et al. 1999</span></a><span data-dcnode-id="4344" instrument_node="">; also see
                     </span><a class="xref-" data-dcnode-id="4342" href="#ref-70" id="xref-ref-70-1"><span data-dcnode-id="4343" instrument_node="">Peigneux et al. 2001</span></a><span data-dcnode-id="4341" instrument_node="">). This
                     role for SWS appears to apply both to verbal tasks (e.g., list learning,
                     paired-associated learning tasks; </span><a class="xref-" data-dcnode-id="4339" href="#ref-71" id="xref-ref-71-2"><span data-dcnode-id="4340" instrument_node="">Plihal
                        and Born 1997</span></a><span data-dcnode-id="4338" instrument_node="">) and spatial tasks (e.g., spatial rotation;
                     </span><a class="xref-" data-dcnode-id="4336" href="#ref-72" id="xref-ref-72-3"><span data-dcnode-id="4337" instrument_node="">Plihal and Born 1999a</span></a><span data-dcnode-id="4335" instrument_node="">). For
                     example, Plihal and Born
                     (</span><a class="xref-" data-dcnode-id="4333" href="#ref-71" id="xref-ref-71-3"><span data-dcnode-id="4334" instrument_node="">1997</span></a><span data-dcnode-id="4332" instrument_node="">) tested both episodic
                     and procedural memory after retention intervals defined over early sleep
                     (dominated by SWS) and late sleep (dominated by REM). Subjects were trained to
                     criterion in the recall of a paired-associate word list (episodic) and a
                     mirror-tracing task (procedural) and were retested after 3-h retention
                     intervals, during either early or late nocturnal sleep. Recall of paired
                     associates improved significantly more after a 3-h sleep period rich in SWS
                     than after a 3-h sleep period rich in REM or after a 3-h period of wake.
                     Mirror tracing, on the other hand, improved significantly more after a 3-h
                     sleep period rich in REM than after 3 h spent either in SWS or awake. The fact
                     that memories for personal episodes only undergo effective consolidation early
                     in the night, when NREM (SWS) is particularly prominent, provides another
                     indication that episodic memory systems are functional during NREM sleep.
                  </span></p><span data-dcnode-id="4330" instrument_node="">
</span><h3 data-dcnode-id="4328"><span data-dcnode-id="4329" instrument_node="">Summary of background</span></h3><span data-dcnode-id="4327" instrument_node="">
</span><p data-dcnode-id="4325" id="p-12"><span data-dcnode-id="4326" instrument_node="">This brief review highlights several points:</span></p><span data-dcnode-id="4324" instrument_node="">
</span><ol class="list-ord" data-dcnode-id="4304" id="list-1"><span data-dcnode-id="4323" instrument_node="">
</span><li data-dcnode-id="4318" id="list-item-1"><span data-dcnode-id="4322" instrument_node="">
</span><p data-dcnode-id="4320" id="p-14"><span data-dcnode-id="4321" instrument_node="">Sleep stages vary across the night: Early sleep is rich in NREM, but late
                           sleep is rich in REM. These stage changes relate to, and are caused by,
                           neurochemical fluctuations during sleep.
                        </span></p><span data-dcnode-id="4319" instrument_node="">
</span></li><span data-dcnode-id="4317" instrument_node="">
</span><li data-dcnode-id="4312" id="list-item-2"><span data-dcnode-id="4316" instrument_node="">
</span><p data-dcnode-id="4314" id="p-15"><span data-dcnode-id="4315" instrument_node="">Dream content varies as a function of sleep stage or time of night: There
                           is considerable episodic content in dreams during NREM/early sleep, but little
                           episodic content in dreams during REM/late sleep.
                        </span></p><span data-dcnode-id="4313" instrument_node="">
</span></li><span data-dcnode-id="4311" instrument_node="">
</span><li data-dcnode-id="4306" id="list-item-3"><span data-dcnode-id="4310" instrument_node="">
</span><p data-dcnode-id="4308" id="p-16"><span data-dcnode-id="4309" instrument_node="">Sleep affects memory consolidation, but in a complex way: Procedural memory
                           benefits from both REM/late sleep and NREM/early sleep, but episodic memory
                           only benefits from NREM/early sleep.
                        </span></p><span data-dcnode-id="4307" instrument_node="">
</span></li><span data-dcnode-id="4305" instrument_node="">
</span></ol><span data-dcnode-id="4303" instrument_node="">
</span><p data-dcnode-id="4301" id="p-17"><span data-dcnode-id="4302" instrument_node="">These points raise two critical questions:</span></p><span data-dcnode-id="4300" instrument_node="">
</span><ol class="list-ord" data-dcnode-id="4286" id="list-2"><span data-dcnode-id="4299" instrument_node="">
</span><li data-dcnode-id="4294" id="list-item-4"><span data-dcnode-id="4298" instrument_node="">
</span><p data-dcnode-id="4296" id="p-19"><span data-dcnode-id="4297" instrument_node="">What can account for the differences in dream content and effectiveness of
                           memory consolidation as an apparent function of NREM/early sleep versus
                           REM/late sleep?
                        </span></p><span data-dcnode-id="4295" instrument_node="">
</span></li><span data-dcnode-id="4293" instrument_node="">
</span><li data-dcnode-id="4288" id="list-item-5"><span data-dcnode-id="4292" instrument_node="">
</span><p data-dcnode-id="4290" id="p-20"><span data-dcnode-id="4291" instrument_node="">What underlying concomitants of this difference actually produce the
                           variations in dream content and memory consolidation?
                        </span></p><span data-dcnode-id="4289" instrument_node="">
</span></li><span data-dcnode-id="4287" instrument_node="">
</span></ol><span data-dcnode-id="4285" instrument_node="">
</span><p data-dcnode-id="4271" id="p-21"><span data-dcnode-id="4284" instrument_node="">Are neurotransmitters the key, as some have suggested (see
                     </span><a class="xref-" data-dcnode-id="4282" href="#ref-30" id="xref-ref-30-1"><span data-dcnode-id="4283" instrument_node="">Hobson 1988</span></a><span data-dcnode-id="4281" instrument_node="">)? Is it strictly
                     the REM/NREM distinction, or alternatively, could it be fundamental
                     differences in early versus late sleep? It is important to note that Plihal
                     and Born's studies (</span><a class="xref-" data-dcnode-id="4279" href="#ref-71" id="xref-ref-71-4"><span data-dcnode-id="4280" instrument_node="">1997</span></a><span data-dcnode-id="4278" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4276" href="#ref-72" id="xref-ref-72-4"><span data-dcnode-id="4277" instrument_node="">1999a</span></a><span data-dcnode-id="4275" instrument_node="">) used late versus early
                     sleep as the manipulation, not REM versus NREM per se. Moreover, late night
                     NREM dreams are more “dream-like” and are thus often
                     indistinguishable from REM dreams (</span><a class="xref-" data-dcnode-id="4273" href="#ref-44" id="xref-ref-44-2"><span data-dcnode-id="4274" instrument_node="">Kondo
                        et al. 1989</span></a><span data-dcnode-id="4272" instrument_node="">), so perhaps something about late night sleep accounts
                     for differences in dream content and memory consolidation. These are just some
                     of the issues that arise within the framework we propose.
                  </span></p><span data-dcnode-id="4270" instrument_node="">
</span></div><span data-dcnode-id="4268" instrument_node="">
</span><div class="section" data-dcnode-id="3801" id="sec-8"><span data-dcnode-id="4267" instrument_node="">
</span><div class="section-nav" data-dcnode-id="4260"><a class="prev-section-link" data-dcnode-id="4264" href="#sec-2" title="Background to the hypothesis"><span data-dcnode-id="4265"><span data-dcnode-id="4266" instrument_node="">Previous Section</span></span></a><a class="next-section-link" data-dcnode-id="4261" href="#sec-15" title="Conclusions"><span data-dcnode-id="4262"><span data-dcnode-id="4263" instrument_node="">Next Section</span></span></a></div><span data-dcnode-id="4259" instrument_node="">
</span><h2 data-dcnode-id="4257"><span data-dcnode-id="4258" instrument_node="">The hypothesis in brief</span></h2><span data-dcnode-id="4256" instrument_node="">
</span><p data-dcnode-id="4236" id="p-22"><span data-dcnode-id="4255" instrument_node="">Our hypothesis focuses on how cortisol influences the hippocampal
                     formation. In doing so we do not seek to minimize the role of
                     neurotransmitters such as acetylcholine, NE, and 5-HT, all of which play
                     important roles in controlling sleep (see
                     </span><a class="xref-" data-dcnode-id="4253" href="#ref-34" id="xref-ref-34-2"><span data-dcnode-id="4254" instrument_node="">Hobson and Pace-Schott 2002</span></a><span data-dcnode-id="4252" instrument_node="">),
                     dreams (see </span><a class="xref-" data-dcnode-id="4250" href="#ref-30" id="xref-ref-30-2"><span data-dcnode-id="4251" instrument_node="">Hobson 1988</span></a><span data-dcnode-id="4249" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4247" href="#ref-88" id="xref-ref-88-2"><span data-dcnode-id="4248" instrument_node="">Stickgold et al. 2001</span></a><span data-dcnode-id="4246" instrument_node="">), and
                     memory function (see </span><a class="xref-" data-dcnode-id="4244" href="#ref-12" id="xref-ref-12-1"><span data-dcnode-id="4245" instrument_node="">Cahill and McGaugh
                        1998</span></a><span data-dcnode-id="4243" instrument_node="">; </span><a class="xref-" data-dcnode-id="4241" href="#ref-29" id="xref-ref-29-1"><span data-dcnode-id="4242" instrument_node="">Hasselmo
                        1999</span></a><span data-dcnode-id="4240" instrument_node="">). Each of these neurotransmitters, in addition to having
                     independent effects on memory, likely interacts with cortisol in important
                     ways that may affect memory consolidation and dreaming. In this article we
                     limit our focus to cortisol because it is known that high levels of cortisol
                     can disrupt hippocampal function, interfering with interactions between the
                     hippocampal system and its neocortical neighbors
                     (</span><a class="xref-" data-dcnode-id="4238" href="#ref-42" id="xref-ref-42-1"><span data-dcnode-id="4239" instrument_node="">Kim and Diamond 2002</span></a><span data-dcnode-id="4237" instrument_node="">). These
                     effects on hippocampal function thus provide a possible basis for
                     understanding the interplay among sleep, dreams, and memory.
                  </span></p><span data-dcnode-id="4235" instrument_node="">
</span><h3 data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Assumptions</span></h3><span data-dcnode-id="4232" instrument_node="">
</span><ol class="list-ord" data-dcnode-id="4200" id="list-3"><span data-dcnode-id="4231" instrument_node="">
</span><li data-dcnode-id="4226" id="list-item-6"><span data-dcnode-id="4230" instrument_node="">
</span><p data-dcnode-id="4228" id="p-24"><span data-dcnode-id="4229" instrument_node="">Sleep has multiple purposes, including analysis of the
                           “residue” of recent experiences, and integration of the outcome of
                           that analysis with previously stored “knowledge.”
                        </span></p><span data-dcnode-id="4227" instrument_node="">
</span></li><span data-dcnode-id="4225" instrument_node="">
</span><li data-dcnode-id="4220" id="list-item-7"><span data-dcnode-id="4224" instrument_node="">
</span><p data-dcnode-id="4222" id="p-25"><span data-dcnode-id="4223" instrument_node="">Dreams reflect activity in brain structures concerned with (1) processing,
                           storing and/or representing recent experiences; and (2) the knowledge an
                           individual has built up over a lifetime of experiences.
                        </span></p><span data-dcnode-id="4221" instrument_node="">
</span></li><span data-dcnode-id="4219" instrument_node="">
</span><li data-dcnode-id="4214" id="list-item-8"><span data-dcnode-id="4218" instrument_node="">
</span><p data-dcnode-id="4216" id="p-26"><span data-dcnode-id="4217" instrument_node="">Dream content reflects which of these brain structures are active.
                           Variations in activity over the course of the night reflect processing, or
                           “memory consolidating,” occurring within different neural
                           systems.
                        </span></p><span data-dcnode-id="4215" instrument_node="">
</span></li><span data-dcnode-id="4213" instrument_node="">
</span><li data-dcnode-id="4208" id="list-item-9"><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210" id="p-27"><span data-dcnode-id="4211" instrument_node="">Over the course of the night, the brain oscillates between a state that is
                           more conducive to the consolidation of episodic memories, and a state or
                           states that may be more conducive to the consolidation of procedural
                           memories.
                        </span></p><span data-dcnode-id="4209" instrument_node="">
</span></li><span data-dcnode-id="4207" instrument_node="">
</span><li data-dcnode-id="4202" id="list-item-10"><span data-dcnode-id="4206" instrument_node="">
</span><p data-dcnode-id="4204" id="p-28"><span data-dcnode-id="4205" instrument_node="">Because cortisol levels exert control over hippocampal function, they may
                           be able to switch the brain from one memory consolidating state to the
                           other.
                        </span></p><span data-dcnode-id="4203" instrument_node="">
</span></li><span data-dcnode-id="4201" instrument_node="">
</span></ol><span data-dcnode-id="4199" instrument_node="">
</span><p data-dcnode-id="4197" id="p-29"><span data-dcnode-id="4198" instrument_node="">These assumptions lead to several testable hypotheses:</span></p><span data-dcnode-id="4196" instrument_node="">
</span><ol class="list-ord" data-dcnode-id="4182" id="list-4"><span data-dcnode-id="4195" instrument_node="">
</span><li data-dcnode-id="4190" id="list-item-11"><span data-dcnode-id="4194" instrument_node="">
</span><p data-dcnode-id="4192" id="p-31"><span data-dcnode-id="4193" instrument_node="">First, because cortisol levels rise over the course of a night's sleep,
                           episodic memories should be better consolidated early in the night, when a
                           modest cortisol level allows the hippocampus to function properly in memory
                           consolidation. Procedural memories should be effectively consolidated
                           throughout the night, as high cortisol levels are not known to disrupt the
                           brain systems critical to these kinds of memories.
                        </span></p><span data-dcnode-id="4191" instrument_node="">
</span></li><span data-dcnode-id="4189" instrument_node="">
</span><li data-dcnode-id="4184" id="list-item-12"><span data-dcnode-id="4188" instrument_node="">
</span><p data-dcnode-id="4186" id="p-32"><span data-dcnode-id="4187" instrument_node="">Second, dreams reported early in the night, largely during SWS, should
                           reflect normal episodic content; dreams reported late at night, largely during
                           REM sleep, should reflect disrupted hippocampal → neocortical
                           communication and hence should seem fragmented and often bizarre.
                        </span></p><span data-dcnode-id="4185" instrument_node="">
</span></li><span data-dcnode-id="4183" instrument_node="">
</span></ol><span data-dcnode-id="4181" instrument_node="">
</span><p data-dcnode-id="4179" id="p-33"><span data-dcnode-id="4180" instrument_node="">We claim that differences in dream content and memory consolidation between
                     NREM/early sleep and REM/late sleep reflect different levels of critical
                     modulatory factors in these states. In particular, high levels of cortisol
                     during REM interfere with hippocampal—neocortical interactions,
                     disrupting consolidation of episodic material and altering the episodic
                     coherence of dreams. We now discuss some of these points at greater length,
                     starting with a discussion about memory and memory processing that should help
                     ground our ideas.
                  </span></p><span data-dcnode-id="4178" instrument_node="">
</span><h3 data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">What is memory consolidation?</span></h3><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4173" id="p-34"><span data-dcnode-id="4174" instrument_node="">The phrase “memory consolidation” gets used frequently, and in
                     rather different contexts, but is rarely clearly defined, except in the most
                     abstract sense of postencoding processes that contribute to the stabilization
                     of long-term memory. There has been much focus on molecular and cellular level
                     events taking place during consolidation, and knowing about these is of both
                     intrinsic and practical interest. But there is also a psychological dimension
                     to memory consolidation that we believe speaks to the content and nature of
                     dreams. So, what is memory consolidation all about?
                  </span></p><span data-dcnode-id="4172" instrument_node="">
</span><p data-dcnode-id="4170" id="p-35"><span data-dcnode-id="4171" instrument_node="">We assume that during consolidation specific neural circuits are
                     strengthened. But which ones, and what part of memory are they? What
                     information do they represent? We believe that memory consolidation involves
                     both the strengthening of traces representing the episodic details of
                     experience, and the parallel integration of information extracted from
                     experience with previously acquired semantic knowledge. In this view, episodic
                     and semantic knowledge are processed in parallel interacting systems, and much
                     of what happens during memory consolidation involves these parallel processors
                     communicating with each other and sharing aspects of their knowledge.
                  </span></p><span data-dcnode-id="4169" instrument_node="">
</span><p data-dcnode-id="4152" id="p-36"><span data-dcnode-id="4168" instrument_node="">A framework for thinking about this neural interaction builds on the idea
                     that the hippocampal formation and neocortical structures use different
                     computational strategies for storing information
                     (</span><a class="xref-" data-dcnode-id="4166" href="#ref-64" id="xref-ref-64-1"><span data-dcnode-id="4167" instrument_node="">O'Keefe and Nadel 1978</span></a><span data-dcnode-id="4165" instrument_node="">;
                     McClelland et al. </span><a class="xref-" data-dcnode-id="4163" href="#ref-52" id="xref-ref-52-1"><span data-dcnode-id="4164" instrument_node="">1992</span></a><span data-dcnode-id="4162" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4160" href="#ref-53" id="xref-ref-53-1"><span data-dcnode-id="4161" instrument_node="">1995</span></a><span data-dcnode-id="4159" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4157" href="#ref-38" id="xref-ref-38-2"><span data-dcnode-id="4158" instrument_node="">Kali and Dayan 2004</span></a><span data-dcnode-id="4156" instrument_node="">). The
                     hippocampal formation is specialized to store unique representations, and its
                     circuitry permits both the separation of similar input patterns and the
                     completion of a pattern from partial inputs. Many parts of the neocortex, by
                     contrast, are specialized to store overlapping representations, in which the
                     extent of similarity determines the overlap. Thus, these two systems are well
                     suited for episodic and semantic memory representations, respectively.
                     McClelland et al. (</span><a class="xref-" data-dcnode-id="4154" href="#ref-53" id="xref-ref-53-2"><span data-dcnode-id="4155" instrument_node="">1995</span></a><span data-dcnode-id="4153" instrument_node="">)
                     argued that because of the superpositional nature of representation within
                     neocortical networks, it is critical for changes in these networks to be
                     accomplished incrementally. Fast change would destabilize previously stored
                     representations. Slow change permits the integration of old with new in a
                     fashion that does not lead to “catastrophic interference.” They
                     argued that one way to accomplish incremental change in neocortical circuits
                     was to provide multiple iterations of the input, and that replay of an
                     episodic representation from hippocampal formation to neocortical circuits
                     during certain phases of sleep could accomplish this goal.
                  </span></p><span data-dcnode-id="4151" instrument_node="">
</span><h3 data-dcnode-id="4149"><span data-dcnode-id="4150" instrument_node="">The functions of memory consolidation and memory replay</span></h3><span data-dcnode-id="4148" instrument_node="">
</span><p data-dcnode-id="4134" id="p-37"><span data-dcnode-id="4147" instrument_node="">Building on these insights, we see replay within the episodic and semantic
                     systems during sleep as an example of the communication between the systems
                     referred to above. This communication has a number of consequences for memory
                     consolidation. First, representations within neocortical sites are slowly
                     strengthened, capturing feature information about the objects, actors, and
                     events of experience. The information being captured concerns similarity
                     relations and statistical regularities—not unique occurrences (cf. taxon
                     systems; </span><a class="xref-" data-dcnode-id="4145" href="#ref-64" id="xref-ref-64-2"><span data-dcnode-id="4146" instrument_node="">O'Keefe and Nadel
                        1978</span></a><span data-dcnode-id="4144" instrument_node="">). Second, representations within the hippocampal formation
                     are strengthened, as suggested in the “multiple trace theory” (see
                     </span><a class="xref-" data-dcnode-id="4142" href="#ref-56" id="xref-ref-56-1"><span data-dcnode-id="4143" instrument_node="">Nadel and Moscovitch 1997</span></a><span data-dcnode-id="4141" instrument_node="">).
                     These representations are about particular experiences, their contexts of
                     occurrence, and unique relations between objects and actors in those
                     experiences. Third, connections between hippocampal “episode”
                     traces and neocortical “feature” traces are strengthened, making
                     it easier for the former to activate the latter, enhancing retrieval of
                     properly detailed memories. This aspect of memory consolidation is
                     particularly important in maintaining links between the hippocampal episode
                     trace and the neocortical feature traces because the latter are subject to
                     continual “drift” as new information is acquired. This drift would
                     eventually sever the connections between an episode and its details unless
                     constant adjustments were made. Replay provides the basis for these
                     adjustments (</span><a class="xref-" data-dcnode-id="4139" href="#ref-38" id="xref-ref-38-3"><span data-dcnode-id="4140" instrument_node="">Kali and Dayan
                        2004</span></a><span data-dcnode-id="4138" instrument_node="">). Finally, fourth, neocortical—neocortical connections
                     are enhanced, allowing for strengthening of links between loosely related
                     concepts and distant-but-related experiences, a process that eventually
                     results in “semantic” or schematized versions of some (but
                     certainly not all) episodic memories
                     (</span><a class="xref-" data-dcnode-id="4136" href="#ref-57" id="xref-ref-57-1"><span data-dcnode-id="4137" instrument_node="">Nadel and Moscovitch 1998</span></a><span data-dcnode-id="4135" instrument_node="">).
                     These semantic memories, in the absence of any hippocampal contribution, have
                     lost much of their context and detail but have gained associations with
                     similar knowledge and experience. Thus, the individual episode is lost, but a
                     stronger schema for similar experience is gained.
                  </span></p><span data-dcnode-id="4133" instrument_node="">
</span><p data-dcnode-id="4119" id="p-38"><span data-dcnode-id="4132" instrument_node="">All these consequences of replay reflect what happens when hippocampal and
                     neocortical systems are communicating properly, for example, during SWS sleep
                     early in the night. Matters change later when cortisol levels rise, and as a
                     consequence, there is a disruption of the processing of episodes as coherent
                     units because high cortisol levels can disrupt the function of the hippocampal
                     formation (</span><a class="xref-" data-dcnode-id="4130" href="#ref-72" id="xref-ref-72-5"><span data-dcnode-id="4131" instrument_node="">Plihal and Born
                        1999a</span></a><span data-dcnode-id="4129" instrument_node="">; </span><a class="xref-" data-dcnode-id="4127" href="#ref-42" id="xref-ref-42-2"><span data-dcnode-id="4128" instrument_node="">Kim and Diamond
                        2002</span></a><span data-dcnode-id="4126" instrument_node="">). This loss of coherence leads to “inefficient
                     consolidation” as measured by memory testing (Plihal and Born
                     </span><a class="xref-" data-dcnode-id="4124" href="#ref-71" id="xref-ref-71-5"><span data-dcnode-id="4125" instrument_node="">1997</span></a><span data-dcnode-id="4123" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4121" href="#ref-72" id="xref-ref-72-6"><span data-dcnode-id="4122" instrument_node="">1999a</span></a><span data-dcnode-id="4120" instrument_node="">), but also to the
                     activation of memory fragments in isolation. We think it is these memory
                     fragments that compose the disconnected sounds and images and the bizarre plot
                     lines that constitute many REM sleep dreams. More specifically, hippocampal
                     → neocortical communication is disrupted because high cortisol levels
                     exert a negative influence on the primary output field of the hippocampus, the
                     CA1 region (for more detail, see below). As a result, disconnected fragments,
                     stored in dispersed neocortical regions, become activated in the absence of
                     the spatial and temporal contexts that situate them as episodic memories.
                  </span></p><span data-dcnode-id="4118" instrument_node="">
</span><p data-dcnode-id="4098" id="p-39"><span data-dcnode-id="4117" instrument_node="">Dreams can be extremely fragmented, but they are rarely experienced as
                     random sequences of associated images. Rather, they exhibit varying degrees of
                     narrative and thematic coherence (see
                     </span><a class="xref-" data-dcnode-id="4115" href="#ref-22" id="xref-ref-22-1"><span data-dcnode-id="4116" instrument_node="">Foulkes 1999</span></a><span data-dcnode-id="4114" instrument_node="">). We have argued
                     that when the waking brain is confronted with fragmented information, it
                     attempts to synthesize these fragments into narrative themes
                     (</span><a class="xref-" data-dcnode-id="4112" href="#ref-36" id="xref-ref-36-1"><span data-dcnode-id="4113" instrument_node="">Jacobs and Nadel 1998</span></a><span data-dcnode-id="4111" instrument_node="">), even
                     if the themes make little sense (</span><a class="xref-" data-dcnode-id="4109" href="#ref-35" id="xref-ref-35-1"><span data-dcnode-id="4110" instrument_node="">Holden
                        and French 2002</span></a><span data-dcnode-id="4108" instrument_node="">), and we believe the same principle holds for the
                     sleeping brain. Activated memory fragments and internally constructed
                     narrative themes constitute dreams. In addition to being described as
                     “fragmented and bizarre,” dreams are often described as creative,
                     and perhaps this is why we find them so intriguing. In the absence of
                     hippocampal input during most of REM sleep, neocortical-neocortical
                     communication proceeds normally. Thus, disrupted hippocampal communication
                     during REM may actually aid the linking of loosely related concepts
                     (</span><a class="xref-" data-dcnode-id="4106" href="#ref-87" id="xref-ref-87-1"><span data-dcnode-id="4107" instrument_node="">Stickgold et al. 1999</span></a><span data-dcnode-id="4105" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4103" href="#ref-86" id="xref-ref-86-1"><span data-dcnode-id="4104" instrument_node="">Stickgold and Walker 2004</span></a><span data-dcnode-id="4102" instrument_node="">),
                     perhaps inspiring new ideas, the ability to see relationships between
                     previously unrelated concepts, and the often noted creative insight inspired
                     by dreams (see </span><a class="xref-" data-dcnode-id="4100" href="#ref-93" id="xref-ref-93-1"><span data-dcnode-id="4101" instrument_node="">Wagner et al.
                        2004</span></a><span data-dcnode-id="4099" instrument_node="">).
                  </span></p><span data-dcnode-id="4097" instrument_node="">
</span><h3 data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Potential mechanisms</span></h3><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4092" id="p-40"><span data-dcnode-id="4093" instrument_node="">We have suggested that because high cortisol levels disrupt
                     hippocampal-neocortical interactions they can alter dream content. To
                     understand better the ways in which this alteration occurs, and the form it
                     takes, we need to look more closely at the actual mechanisms proposed to cause
                     it. How, for example, do fluctuations in neuromodulators control patterns of
                     neural interaction during the various stages of sleep?
                  </span></p><span data-dcnode-id="4091" instrument_node="">
</span><p data-dcnode-id="4083" id="p-41"><span data-dcnode-id="4090" instrument_node="">The functionality of hippocampal ↔ neocortical interaction varies
                     across the sleep cycles, as we have already observed. Buzsaki
                     (</span><a class="xref-" data-dcnode-id="4088" href="#ref-9" id="xref-ref-9-1"><span data-dcnode-id="4089" instrument_node="">1996</span></a><span data-dcnode-id="4087" instrument_node="">) suggested that
                     hippocampal → neocortical communication is reduced in REM sleep compared
                     with NREM sleep or wake. During wake, information about the external world
                     first activates the neocortex and then reaches the hippocampus via the
                     entorhinal cortex. A similar pattern of communication is seen during REM
                     sleep, when information largely flows out of neocortex and into hippocampus
                     (neocortex → hippocampus). Hasselmo
                     (</span><a class="xref-" data-dcnode-id="4085" href="#ref-29" id="xref-ref-29-2"><span data-dcnode-id="4086" instrument_node="">1999</span></a><span data-dcnode-id="4084" instrument_node="">) attributes this
                     directionality to acetylcholine, contending that because acetylcholine is
                     linked to encoding processes in the awake brain, it follows that in REM sleep,
                     when acetylcholine levels are as high as during wake, the directionality of
                     hippocampal-neocortical interaction should mimic that of initial information
                     processing in the waking state (neocortex → hippocampus).
                  </span></p><span data-dcnode-id="4082" instrument_node="">
</span><p data-dcnode-id="4062" id="p-42"><span data-dcnode-id="4081" instrument_node="">During SWS the direction of information flow could be reversed, reflecting
                     hippocampal neuronal bursts called “sharp waves”
                     (</span><a class="xref-" data-dcnode-id="4079" href="#ref-10" id="xref-ref-10-1"><span data-dcnode-id="4080" instrument_node="">Buzsaki 1998</span></a><span data-dcnode-id="4078" instrument_node="">). These bursts,
                     the most prominent hippocampal pattern during SWS, reflect transient
                     activation of CA3-CA1 pyramidal cells associated with a sharp wave in stratum
                     radiatum and fast field oscillation (140- to 200-Hz ripple) in the CA1
                     pyramidal layer (</span><a class="xref-" data-dcnode-id="4076" href="#ref-11" id="xref-ref-11-1"><span data-dcnode-id="4077" instrument_node="">Buzsaki et al.
                        1992</span></a><span data-dcnode-id="4075" instrument_node="">; </span><a class="xref-" data-dcnode-id="4073" href="#ref-14" id="xref-ref-14-1"><span data-dcnode-id="4074" instrument_node="">Chrobak and Buzsaki
                        1996</span></a><span data-dcnode-id="4072" instrument_node="">). Thus, in SWS, information is likely reactivated in the
                     hippocampus and then flows back to neocortex. A recent article
                     (</span><a class="xref-" data-dcnode-id="4070" href="#ref-81" id="xref-ref-81-1"><span data-dcnode-id="4071" instrument_node="">Sirota et al. 2003</span></a><span data-dcnode-id="4069" instrument_node="">), however,
                     suggests that information might flow in both directions (hippocampus ↔
                     neocortex) during SWS. These investigators demonstrated temporal coupling of
                     neuronal activity between the neocortex and hippocampus on both slow and fine
                     time scales during SWS. Neocortical neuronal discharges, associated with the
                     delta wave and spindle events of NREM sleep, may “select” via the
                     entorhinal input which hippocampal neurons will participate in the triggered
                     ripple events. These specific inputs can select burst initiators of the
                     hippocampal sharp wave events, and in turn, the sharp wave/ripple-related
                     discharge of neurons in the hippocampus will provide a synchronous output
                     preferably to those neocortical cell assemblies that continue to participate
                     in the spindle event. Thus, the hippocampal output likely coexists with the
                     postsynaptic discharge of a specific group of neocortical cells
                     (</span><a class="xref-" data-dcnode-id="4067" href="#ref-81" id="xref-ref-81-2"><span data-dcnode-id="4068" instrument_node="">Sirota et al. 2003</span></a><span data-dcnode-id="4066" instrument_node="">). In
                     contrast to the situation during REM sleep, in which hippocampal output to the
                     neocortex is severely diminished, the neocortical-hippocampal-neocortical
                     circuit may remain functionally intact during SWS. The coupling between
                     neocortical and hippocampal networks demonstrated by Sirota et al.
                     (</span><a class="xref-" data-dcnode-id="4064" href="#ref-81" id="xref-ref-81-3"><span data-dcnode-id="4065" instrument_node="">2003</span></a><span data-dcnode-id="4063" instrument_node="">) may provide the
                     temporal framework for coordinated information exchange between the two
                     structures during SWS.
                  </span></p><span data-dcnode-id="4061" instrument_node="">
</span><p data-dcnode-id="4059" id="p-43"><span data-dcnode-id="4060" instrument_node="">How can these differences in the directionality of hippocampal-neocortical
                     communication across the two main stages of sleep be accounted for? Why are
                     hippocampal outputs to neocortex disrupted during REM sleep, whereas the
                     entire neocortical-hippocampal-neocortical circuit seems to remain intact
                     during SWS? The above discussion about the functional relationships between
                     hippocampus and neocortex is based on rodent data. Thus, it is important to
                     remain cautious when using these results to speculate about human sleep and
                     memory consolidation.
                  </span></p><span data-dcnode-id="4058" instrument_node="">
</span><h3 data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">The role of cortisol</span></h3><span data-dcnode-id="4055" instrument_node="">
</span><p data-dcnode-id="4035" id="p-44"><span data-dcnode-id="4054" instrument_node="">We suggest that nightly variations in cortisol, and interactions between
                     cortisol and other neurotransmitters that fluctuate during sleep
                     (acetylcholine, 5-HT, NE), play a critical role in these phenomena. Cortisol
                     level varies over the course of the night's sleep; it begins to rise in the
                     middle of the sleep period and slowly escalates with a series of pulses that
                     tend to coincide with REM sleep until peaking in the early morning hours
                     (</span><a class="xref-" data-dcnode-id="4052" href="#ref-94" id="xref-ref-94-1"><span data-dcnode-id="4053" instrument_node="">Weitzman et al. 1971</span></a><span data-dcnode-id="4051" instrument_node="">).
                     Cortisol has both quick and delayed effects on neural function. The former,
                     nongenomic, effects involve increases in excitatory amino acids
                     (</span><a class="xref-" data-dcnode-id="4049" href="#ref-92" id="xref-ref-92-1"><span data-dcnode-id="4050" instrument_node="">Venero and Borrell 1999</span></a><span data-dcnode-id="4048" instrument_node="">). The
                     latter, genomic, effects are mediated by receptors located within the cell
                     nuclei (</span><a class="xref-" data-dcnode-id="4046" href="#ref-54" id="xref-ref-54-1"><span data-dcnode-id="4047" instrument_node="">McEwen 1991</span></a><span data-dcnode-id="4045" instrument_node="">). Within
                     the central nervous system (CNS), two kinds of receptors are activated by
                     cortisol: so-called glucocorticoid receptors (GRs; type II), and
                     mineralocorticoid receptors (MRs; type I). When a neuron contains receptors of
                     both types, as many within the hippocampus do, cortisol level affects the
                     function of the hippocampus in an inverted U-shaped fashion (see
                     </span><a class="xref-" data-dcnode-id="4043" href="#ref-19" id="xref-ref-19-1"><span data-dcnode-id="4044" instrument_node="">Diamond et al. 1992</span></a><span data-dcnode-id="4042" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="4040" href="#ref-67" id="xref-ref-67-1"><span data-dcnode-id="4041" instrument_node="">Pavlides and McEwen 2000</span></a><span data-dcnode-id="4039" instrument_node="">). For
                     example, Diamond et al. (</span><a class="xref-" data-dcnode-id="4037" href="#ref-19" id="xref-ref-19-2"><span data-dcnode-id="4038" instrument_node="">1992</span></a><span data-dcnode-id="4036" instrument_node="">)
                     demonstrated that glucocortidcoids facilitate LTP at low levels but impair it
                     at high levels.
                  </span></p><span data-dcnode-id="4034" instrument_node="">
</span><p data-dcnode-id="4032" id="p-45"><span data-dcnode-id="4033" instrument_node="">The mechanisms producing this complex interaction are interesting. Type I
                     (MR) receptors have a considerably higher affinity for cortisol than do type
                     II (GR) receptors. Until all or virtually all the MRs are occupied, there is
                     little occupancy of GRs. With extensive activation of the MR receptors, and
                     the possibility of activation of GRs, the falling limb of the inverted U
                     emerges. Thus, impairment of hippocampal function by high levels of cortisol
                     depends upon the colocalization of MRs and GRs.
                  </span></p><span data-dcnode-id="4031" instrument_node="">
</span><p data-dcnode-id="4004" id="p-46"><span data-dcnode-id="4030" instrument_node="">Recent work (</span><a class="xref-" data-dcnode-id="4028" href="#ref-28" id="xref-ref-28-1"><span data-dcnode-id="4029" instrument_node="">Han et al.
                        2002</span></a><span data-dcnode-id="4027" instrument_node="">; </span><a class="xref-" data-dcnode-id="4025" href="#ref-66" id="xref-ref-66-1"><span data-dcnode-id="4026" instrument_node="">Patel and Bulloch
                        2003</span></a><span data-dcnode-id="4024" instrument_node="">) has confirmed that MRs and GRs are colocalized in the
                     dentate gyrus and the CA1 field, </span><em data-dcnode-id="4022"><span data-dcnode-id="4023" instrument_node="">but much less so in the CA2 and CA3
                        fields</span></em><span data-dcnode-id="4021" instrument_node="">, where concentrations of GR are much diminished. This difference
                     has potentially critical functional implications. Most prominently, it means
                     that at high levels of cortisol, communication between the hippocampus and the
                     neocortex, which is mediated by CA1 → subiculum → rhinal cortex
                     connectivity, will be altered or disrupted. At the same time, communication
                     within parts of the hippocampus itself, most prominently CA3, could remain
                     intact</span><sup data-dcnode-id="4018"><a class="xref-" data-dcnode-id="4019" href="#fn-1" id="xref-fn-1-1"><span data-dcnode-id="4020" instrument_node="">2</span></a></sup><span data-dcnode-id="4017" instrument_node="">. Thus, as the
                     night progresses and cortisol levels increase, hippocampal-neocortical
                     communication will eventually be altered. Note that levels between 10 and 30
                     μg/dL are associated with memory impairment during wake (see Kirschbaum
                     1996; </span><a class="xref-" data-dcnode-id="4015" href="#ref-17" id="xref-ref-17-1"><span data-dcnode-id="4016" instrument_node="">de Quervain et al.
                        2000</span></a><span data-dcnode-id="4014" instrument_node="">), and early in the morning (prior to waking), cortisol levels
                     vary between 15 and 20 μg/dL. However, neither cortical-cortical activity
                     itself nor activity within the CA3 circuits of the hippocampal formation will
                     necessarily be disrupted. This interruption of hippocampal-neocortical
                     communication would halt the consolidation of aspects of memory requiring it,
                     for example, episodic memory (cf. Plihal and Born,
                     </span><a class="xref-" data-dcnode-id="4012" href="#ref-71" id="xref-ref-71-6"><span data-dcnode-id="4013" instrument_node="">1997</span></a><span data-dcnode-id="4011" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="4009" href="#ref-72" id="xref-ref-72-7"><span data-dcnode-id="4010" instrument_node="">1999a</span></a><span data-dcnode-id="4008" instrument_node="">), but not the neuronal
                     replay in CA3 seen in recent experiments (see
                     </span><a class="xref-" data-dcnode-id="4006" href="#ref-4" id="xref-ref-4-1"><span data-dcnode-id="4007" instrument_node="">Battaglia et al. 2004</span></a><span data-dcnode-id="4005" instrument_node="">), or
                     consolidation within procedural memory circuits.
                  </span></p><span data-dcnode-id="4003" instrument_node="">
</span><p data-dcnode-id="4002" id="p-47"></p><span data-dcnode-id="4001" instrument_node="">
</span><p data-dcnode-id="3972" id="p-49"><span data-dcnode-id="4000" instrument_node="">High levels of cortisol during late night REM sleep could do more than
                     interfere with episodic memory consolidation. By virtue of the same
                     mechanisms, high cortisol levels could affect the nature of dreams. It is
                     generally assumed that episodes consist of events involving actors, actions,
                     and consequences, all playing out in settings composed of various objects
                     bound to a specific spatial and temporal context (see
                     </span><a class="xref-" data-dcnode-id="3998" href="#ref-65" id="xref-ref-65-1"><span data-dcnode-id="3999" instrument_node="">Paller and Voss 2004</span></a><span data-dcnode-id="3997" instrument_node="">). The
                     hippocampal system, as noted earlier, is critical to this binding process,
                     perhaps by contributing the spatial context to which the bits and pieces of an
                     episode are attached and woven into a cohesive whole
                     (</span><a class="xref-" data-dcnode-id="3995" href="#ref-57" id="xref-ref-57-2"><span data-dcnode-id="3996" instrument_node="">Nadel and Moscovitch, 1998</span></a><span data-dcnode-id="3994" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3992" href="#ref-58" id="xref-ref-58-1"><span data-dcnode-id="3993" instrument_node="">Nadel and Payne, 2002</span></a><span data-dcnode-id="3991" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3989" href="#ref-59" id="xref-ref-59-1"><span data-dcnode-id="3990" instrument_node="">Nadel et al. 2002</span></a><span data-dcnode-id="3988" instrument_node="">). When this
                     binding context is absent, neocortical circuits can generate only semantic
                     knowledge, or “episode-like” fragments that can be rather bizarre.
                     It is worth noting the similarities between the nature of dreams and the kind
                     of memories created during stress or trauma. Clinical evidence suggests that
                     memory for stressful experience lacks coherence, context, and episodic detail
                     and thus is experienced as “fragmented”
                     (</span><a class="xref-" data-dcnode-id="3986" href="#ref-26" id="xref-ref-26-1"><span data-dcnode-id="3987" instrument_node="">Golier et al. 1997</span></a><span data-dcnode-id="3985" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3983" href="#ref-7" id="xref-ref-7-1"><span data-dcnode-id="3984" instrument_node="">Bremner 1999</span></a><span data-dcnode-id="3982" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3980" href="#ref-27" id="xref-ref-27-1"><span data-dcnode-id="3981" instrument_node="">Gray and Lombardo 2001</span></a><span data-dcnode-id="3979" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3977" href="#ref-91" id="xref-ref-91-1"><span data-dcnode-id="3978" instrument_node="">van der Kolk et al. 2001</span></a><span data-dcnode-id="3976" instrument_node="">). For
                     example, fragmentation is an important feature of posttraumatic stress
                     disorder (PTSD), in which patients sometimes describe gaps in recalled
                     experiences, not only of trauma but of other personal experiences as well
                     (</span><a class="xref-" data-dcnode-id="3974" href="#ref-7" id="xref-ref-7-2"><span data-dcnode-id="3975" instrument_node="">Bremner 1999</span></a><span data-dcnode-id="3973" instrument_node="">).
                  </span></p><span data-dcnode-id="3971" instrument_node="">
</span><p data-dcnode-id="3963" id="p-50"><span data-dcnode-id="3970" instrument_node="">It seems likely that in dreams, as in waking life, retrieved fragments are
                     subject to narrative smoothing, in which educated guesses are made about what
                     might have occurred. This process may begin during the dream and likely
                     continues upon awakening as cortisol continues to rise. Constructing
                     narratives is a normal function of memory. The hippocampal system works
                     together with the neocortex to recreate episodic memories from representations
                     of the various attributes or features of the event. We have suggested that
                     high levels of cortisol undermine this normal process, leading to false
                     memories (see Payne et al.
                     </span><a class="xref-" data-dcnode-id="3968" href="#ref-68" id="xref-ref-68-1"><span data-dcnode-id="3969" instrument_node="">2002</span></a><span data-dcnode-id="3967" instrument_node="">,
                     </span><a class="xref-" data-dcnode-id="3965" href="#ref-69" id="xref-ref-69-1"><span data-dcnode-id="3966" instrument_node="">2004</span></a><span data-dcnode-id="3964" instrument_node="">) and, in the case of
                     dreams, fragmentation that leads to the bizarre narratives we attempt to make
                     sense of upon awakening.
                  </span></p><span data-dcnode-id="3962" instrument_node="">
</span><p data-dcnode-id="3936" id="p-51"><span data-dcnode-id="3961" instrument_node="">In addition to clinical evidence, there is experimental evidence that high
                     levels of cortisol alter memory function. Patient populations with chronically
                     elevated levels of cortisol, such as Cushing's syndrome, major depression, and
                     schizophrenia, as well as asthmatic patients treated with the glucocorticoid
                     prednisone are characterized by impaired memory function
                     (</span><a class="xref-" data-dcnode-id="3959" href="#ref-85" id="xref-ref-85-1"><span data-dcnode-id="3960" instrument_node="">Starkman et al. 1992</span></a><span data-dcnode-id="3958" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3956" href="#ref-51" id="xref-ref-51-1"><span data-dcnode-id="3957" instrument_node="">Mauri et al. 1993</span></a><span data-dcnode-id="3955" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3953" href="#ref-40" id="xref-ref-40-1"><span data-dcnode-id="3954" instrument_node="">Keenan et al. 1995</span></a><span data-dcnode-id="3952" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3950" href="#ref-79" id="xref-ref-79-1"><span data-dcnode-id="3951" instrument_node="">Sheline et al. 1999</span></a><span data-dcnode-id="3949" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3947" href="#ref-77" id="xref-ref-77-2"><span data-dcnode-id="3948" instrument_node="">Sapolsky 2000</span></a><span data-dcnode-id="3946" instrument_node="">;
                     </span><a class="xref-" data-dcnode-id="3944" href="#ref-74" id="xref-ref-74-1"><span data-dcnode-id="3945" instrument_node="">Rasmusson et al. 2001</span></a><span data-dcnode-id="3943" instrument_node="">). As
                     might be expected given our discussion thus far, patients with Cushing's
                     syndrome and major depression not only have memory impairments associated with
                     high cortisol levels but also have differences in their ratios of SWS and REM
                     sleep. Because these disorders are associated with high levels of cortisol, it
                     follows that SWS should be diminished in the sleep of these patients. Indeed,
                     Friedman et al. (</span><a class="xref-" data-dcnode-id="3941" href="#ref-23" id="xref-ref-23-1"><span data-dcnode-id="3942" instrument_node="">1994</span></a><span data-dcnode-id="3940" instrument_node="">)
                     demonstrated that patients with Cushing's syndrome spent much less time in SWS
                     than did healthy controls. REM sleep, however, was not significantly different
                     between groups in this study. Not surprisingly, however, REM sleep in patients
                     with Cushing's syndrome is strikingly similar to the sleep of patients with
                     major depression, with REM latency being shortened and REM density being
                     increased (see </span><a class="xref-" data-dcnode-id="3938" href="#ref-80" id="xref-ref-80-1"><span data-dcnode-id="3939" instrument_node="">Shipley et al.
                        1992</span></a><span data-dcnode-id="3937" instrument_node="">).
                  </span></p><span data-dcnode-id="3935" instrument_node="">
</span><p data-dcnode-id="3891" id="p-52"><span data-dcnode-id="3934" instrument_node="">In addition to the clinical evidence, experimental studies of acute stress
                     and memory have been carried out in animals (for reviews, see
