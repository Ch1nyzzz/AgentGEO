</span><meta content="Recently, cortical correlates of specific dream contents have been reported, such as the activation of the sensorimotor cortex during dreamed hand clenching. Yet, despite a close resemblance of such activation patterns to those seen during the corresponding wakeful behaviour, the causal mechanisms underlying specific dream contents remain largely elusive. Here, we aimed to investigate the causal role of the sensorimotor cortex in generating movement and bodily sensations during REM sleep dreaming. Following bihemispheric transcranial direct current stimulation (tDCS) or sham stimulation, guided by functional mapping of the primary motor cortex, naive participants were awakened from REM sleep and responded to a questionnaire on bodily sensations in dreams. Electromyographic (EMG) and electroencephalographic (EEG) recordings were used to quantify physiological changes during the preceding REM period. We found that tDCS, compared to sham stimulation, significantly decreased reports of dream movement, especially of repetitive actions. Other types of bodily experiences, such as tactile or vestibular sensations, were not affected by tDCS, confirming the specificity of stimulation effects to movement sensations. In addition, tDCS reduced EEG interhemispheric coherence in parietal areas and affected the phasic EMG correlation between both arms. These findings show that a complex temporal reorganization of the motor network co-occurred with the reduction of dream movement, revealing a link between central and peripheral motor processes and movement sensations of the dream self. tDCS over the sensorimotor cortex interferes with dream movement during REM sleep, which is consistent with a causal contribution to dream experience and has broader implications for understanding the neural basis of self-experience in dreams." data-dcnode-id="7556" name="dc.description"><span data-dcnode-id="7555" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="6344" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="6345" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6349" id="Abs1"><span data-dcnode-id="6350" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="6346" id="Abs1-content"><p data-dcnode-id="6347"><span data-dcnode-id="6348" instrument_node="">Recently, cortical correlates of specific dream contents have been reported, such as the activation of the sensorimotor cortex during dreamed hand clenching. Yet, despite a close resemblance of such activation patterns to those seen during the corresponding wakeful behaviour, the causal mechanisms underlying specific dream contents remain largely elusive. Here, we aimed to investigate the causal role of the sensorimotor cortex in generating movement and bodily sensations during REM sleep dreaming. Following bihemispheric transcranial direct current stimulation (tDCS) or sham stimulation, guided by functional mapping of the primary motor cortex, naive participants were awakened from REM sleep and responded to a questionnaire on bodily sensations in dreams. Electromyographic (EMG) and electroencephalographic (EEG) recordings were used to quantify physiological changes during the preceding REM period. We found that tDCS, compared to sham stimulation, significantly decreased reports of dream movement, especially of repetitive actions. Other types of bodily experiences, such as tactile or vestibular sensations, were not affected by tDCS, confirming the specificity of stimulation effects to movement sensations. In addition, tDCS reduced EEG interhemispheric coherence in parietal areas and affected the phasic EMG correlation between both arms. These findings show that a complex temporal reorganization of the motor network co-occurred with the reduction of dream movement, revealing a link between central and peripheral motor processes and movement sensations of the dream self. tDCS over the sensorimotor cortex interferes with dream movement during REM sleep, which is consistent with a causal contribution to dream experience and has broader implications for understanding the neural basis of self-experience in dreams.</span></p></div></div></section><span data-dcnode-id="6343" instrument_node="">
</span><noscript data-dcnode-id="6341"><span data-dcnode-id="6342" instrument_node="">
</span></noscript><span data-dcnode-id="6340" instrument_node="">
</span><section data-dcnode-id="6065" data-title="Introduction"><div class="c-article-section" data-dcnode-id="6066" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6338" id="Sec1"><span data-dcnode-id="6339" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="6067" id="Sec1-content"><p data-dcnode-id="6329"><span data-dcnode-id="6337" instrument_node="">Dreams are vivid, often emotionally intense and narratively complex experiences occurring in sleep. In our dreams, we feel immersed in alternative worlds and have the experience of interacting with other persons and objects. Often this involves the subjective experience of moving through the dream world, and movement is among the most frequently reported dream experiences, second only to visual imagery</span><sup data-dcnode-id="6331"><a aria-label="Reference 1" data-dcnode-id="6335" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d200587268e622" title="Hobson, J. A. The dreaming brain. (Basic Books, 1988)."><span data-dcnode-id="6336" instrument_node="">1</span></a><span data-dcnode-id="6334" instrument_node="">,</span><a aria-label="Reference 2" data-dcnode-id="6332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d200587268e625" title="Hobson, J. A., Pace-Schott, E. F. &amp; Stickgold, R. Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behav. Brain Sci. 23, 793–842 (2000)."><span data-dcnode-id="6333" instrument_node="">2</span></a></sup><span data-dcnode-id="6330" instrument_node="">. Yet these rich subjective experiences stand in stark contrast to the outward unresponsiveness and lack of observable behaviour during sleep. This study aimed to investigate the causal mechanisms underlying dream movement and bodily experience in dreams by applying transcranial direct current stimulation (tDCS) over sensorimotor areas. While most existing studies of the neural underpinnings of bodily experience in dreams and dream movement are correlational, our approach aimed to directly influence dream content and allowed us to speculate on its underlying causes.</span></p><p data-dcnode-id="6327"><span data-dcnode-id="6328" instrument_node="">Specifically, our goal was to characterize the role of the sensorimotor cortex in the generation of bodily sensations in dreams. We aimed to experimentally modulate motor and other bodily experiences, which are important aspects of self-experience in dreams, through bihemispheric tDCS during REM sleep. After awakening from REM sleep, subjective dream experience was examined through the collection of dream reports and a questionnaire specifically designed to investigate bodily experiences in dreams; neural measures were obtained through electrophysiological sleep data.</span></p><p data-dcnode-id="6269"><span data-dcnode-id="6326" instrument_node="">This experimental protocol was guided by theoretical and empirical considerations. Our focus on bodily experience was motivated by the centrality of self-experience and subjective presence to dreaming</span><sup data-dcnode-id="6317"><a data-dcnode-id="6324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d200587268e635" title="Occhionero, M., Cicogna, P., Natale, V., Esposito, M. J. &amp; Bosinelli, M. Representation of self in SWS and REM dreams. Sleep Hypn 7, 77–83 (2005)."><span data-dcnode-id="6325" instrument_node="">3</span></a><span data-dcnode-id="6323" instrument_node="">,</span><a data-dcnode-id="6321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d200587268e635_1" title="Speth, J., Frenzel, C. &amp; Voss, U. A differentiating empirical linguistic analysis of dreamer activity in reports of EEG-controlled REM-dreams and hypnagogic hallucinations. Conscious. Cogn. 22, 1013–1021 (2013)."><span data-dcnode-id="6322" instrument_node="">4</span></a><span data-dcnode-id="6320" instrument_node="">,</span><a aria-label="Reference 5" data-dcnode-id="6318" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d200587268e638" title="Strauch, I. &amp; Meier, B. In search of dreams. Results of experimental dream research. (SUNY Press, 1996)."><span data-dcnode-id="6319" instrument_node="">5</span></a></sup><span data-dcnode-id="6316" instrument_node="">. The immersive structure of dreaming is foregrounded in simulation theories</span><sup data-dcnode-id="6310"><a aria-label="Reference 6" data-dcnode-id="6314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d200587268e642" title="Revonsuo, A. The reinterpretation of dreams: An evolutionary hypothesis of the function of dreaming. Behav. Brain Sci. 23, 877–901 (2000)."><span data-dcnode-id="6315" instrument_node="">6</span></a><span data-dcnode-id="6313" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="6311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d200587268e645" title="Revonsuo, A., Tuominen, J. &amp; Valli, K. Avatars in the machine: Dreaming as a simulation of social reality. In Open Mind: Philosophy and the Mind Sciences in the 21st Century (eds. Metzinger, T. &amp; Windt, J. M.) 1295–1322 (MIT Press), 
https://doi.org/10.15502/9783958570375

 (2016)."><span data-dcnode-id="6312" instrument_node="">7</span></a></sup><span data-dcnode-id="6309" instrument_node="">, in which dreams are described as mental simulations characterized by the experience of a virtual world. Typically, this virtual world is centered on a virtual self and experienced from an internal first-person perspective. The dream self is typically described as actively engaged in dream events, and movement is reported in up to 75% of dreams</span><sup data-dcnode-id="6303"><a aria-label="Reference 5" data-dcnode-id="6307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d200587268e649" title="Strauch, I. &amp; Meier, B. In search of dreams. Results of experimental dream research. (SUNY Press, 1996)."><span data-dcnode-id="6308" instrument_node="">5</span></a><span data-dcnode-id="6306" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="6304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d200587268e652" title="Cicogna, P. &amp; Bosinelli, M. Consciousness during dreams. Conscious. Cogn. 10, 26–41 (2001)."><span data-dcnode-id="6305" instrument_node="">8</span></a></sup><span data-dcnode-id="6302" instrument_node="">. This immersive </span><i data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">here</span></i><span data-dcnode-id="6299" instrument_node=""> and </span><i data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">now</span></i><span data-dcnode-id="6296" instrument_node=""> quality, as described in dream reports, is widely regarded as a defining characteristic of dreaming (for discussion and further references, see</span><sup data-dcnode-id="6293"><a aria-label="Reference 7" data-dcnode-id="6294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d200587268e663" title="Revonsuo, A., Tuominen, J. &amp; Valli, K. Avatars in the machine: Dreaming as a simulation of social reality. In Open Mind: Philosophy and the Mind Sciences in the 21st Century (eds. Metzinger, T. &amp; Windt, J. M.) 1295–1322 (MIT Press), 
https://doi.org/10.15502/9783958570375

 (2016)."><span data-dcnode-id="6295" instrument_node="">7</span></a></sup><span data-dcnode-id="6292" instrument_node="">; for a general defense of the trustworthiness of dream reports, see</span><sup data-dcnode-id="6286"><a aria-label="Reference 9" data-dcnode-id="6290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d200587268e667" title="Windt, J. M. Reporting dream experience: Why (not) to be skeptical about dream reports. Front. Hum. Neurosci., 
https://doi.org/10.3389/fnhum.2013.00708

 (2013)."><span data-dcnode-id="6291" instrument_node="">9</span></a><span data-dcnode-id="6289" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="6287" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d200587268e670" title="Windt, J. M. Dreaming: A conceptual framework for philosophy of mind and empirical research. (MIT Press, 2015)."><span data-dcnode-id="6288" instrument_node="">10</span></a></sup><span data-dcnode-id="6285" instrument_node="">). It is also striking that with few exceptions, both the virtual world and the virtual self in dreams are experienced as real. Simulation views sometimes advocate the idea that “being-in-a-dream” feels the same as “being-in-the-world” during wakefulness</span><sup data-dcnode-id="6279"><a aria-label="Reference 11" data-dcnode-id="6283" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d200587268e674" title="Revonsuo, A. The self in dreams. In The Lost Self: Pathologies of the Brain and Identity (eds. Feinberg, T. E. &amp; Keenan, J. P.) 206–219 (Oxford University Press),

 (2005)."><span data-dcnode-id="6284" instrument_node="">11</span></a><span data-dcnode-id="6282" instrument_node="">,</span><a aria-label="Reference 12" data-dcnode-id="6280" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d200587268e677" title="Revonsuo, A. Inner presence: Consciousness as a biological phenomenon. Inner presence: Consciousness as a biological phenomenon. (MIT Press, 2006)."><span data-dcnode-id="6281" instrument_node="">12</span></a></sup><span data-dcnode-id="6278" instrument_node="">. Moreover, bodily experience and movement sensations also appear to be central to self-experience and subjective presence during waking</span><sup data-dcnode-id="6275"><a aria-label="Reference 13" data-dcnode-id="6276" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d200587268e681" title="Lenggenhager, B. &amp; Lopez, C. Vestibular contributions to the sense of body, self, and others. In Open MIND (eds. Metzinger, T. &amp; Windt, J. M.) 1–38 (Frankfurt am Main: MIND Group), 
https://doi.org/10.5167/uzh-139675

 (2015)."><span data-dcnode-id="6277" instrument_node="">13</span></a></sup><span data-dcnode-id="6274" instrument_node="">, and sensorimotor interaction modulates subjective presence both in real and virtual environments</span><sup data-dcnode-id="6271"><a aria-label="Reference 14" data-dcnode-id="6272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d200587268e685" title="Sanchez-Vives, M. V. &amp; Slater, M. From presence to consciousness through virtual reality. Nat. Rev. Neurosci. 6, 332–339 (2005)."><span data-dcnode-id="6273" instrument_node="">14</span></a></sup><span data-dcnode-id="6270" instrument_node="">.</span></p><p data-dcnode-id="6235"><span data-dcnode-id="6268" instrument_node="">Our focus on bodily experience was further guided by findings suggesting high-level activity of the motor cortex during REM sleep</span><sup data-dcnode-id="6259"><a aria-label="Reference 1" data-dcnode-id="6266" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d200587268e692" title="Hobson, J. A. The dreaming brain. (Basic Books, 1988)."><span data-dcnode-id="6267" instrument_node="">1</span></a><span data-dcnode-id="6265" instrument_node="">,</span><a aria-label="Reference 15" data-dcnode-id="6263" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d200587268e695" title="Dang-Vu, T. T. et al. Dreaming: A neuroimaging view. Schweizer Arch. fur Neurol. und Psychiatr 156, 415–425 (2005)."><span data-dcnode-id="6264" instrument_node="">15</span></a><span data-dcnode-id="6262" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="6260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d200587268e698" title="Maquet, P. et al. Experience-dependent changes in changes in cerebral activation during human REM sleep. Nat. Neurosci. 3, 831–836 (2000)."><span data-dcnode-id="6261" instrument_node="">16</span></a></sup><span data-dcnode-id="6258" instrument_node="">. Generally, REM sleep dreaming has been associated with relative deactivation of executive networks and frontal areas, and with high levels of activity in sensory, motor, and emotional networks as compared to wakefulness</span><sup data-dcnode-id="6249"><a data-dcnode-id="6256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d200587268e702" title="Cipolli, C., Ferrara, M., De Gennaro, L. &amp; Plazzi, G. Beyond the neuropsychology of dreaming: Insights into the neural basis of dreaming with new techniques of sleep recording and analysis. Sleep Med. Rev. 35, 8–20 (2017)."><span data-dcnode-id="6257" instrument_node="">17</span></a><span data-dcnode-id="6255" instrument_node="">,</span><a data-dcnode-id="6253" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d200587268e702_1" title="Nir, Y. &amp; Tononi, G. Dreaming and the brain: from phenomenology to neurophysiology. Trends Cogn. Sci. 14, 88–100 (2010)."><span data-dcnode-id="6254" instrument_node="">18</span></a><span data-dcnode-id="6252" instrument_node="">,</span><a aria-label="Reference 19" data-dcnode-id="6250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d200587268e705" title="Schwartz, S. &amp; Maquet, P. Sleep imaging and the neuropsychological assessment of dreams. Trends Cogn. Sci. 6, 23–30 (2002)."><span data-dcnode-id="6251" instrument_node="">19</span></a></sup><span data-dcnode-id="6248" instrument_node="">. Studies focusing on the neural correlates of specific types of bodily dream experiences have shown the sensorimotor cortex to be activated during hand clenching in lucid dreams</span><sup data-dcnode-id="6245"><a aria-label="Reference 20" data-dcnode-id="6246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d200587268e709" title="Dresler, M. et al. Dreamed movement elicits activation in the sensorimotor cortex. Curr. Biol. 21, 1833–1837 (2011)."><span data-dcnode-id="6247" instrument_node="">20</span></a></sup><span data-dcnode-id="6244" instrument_node="">, and the right superior temporal sulcus, a region involved in the biological motion perception to be activated in dreams with a sense of movement</span><sup data-dcnode-id="6241"><a aria-label="Reference 21" data-dcnode-id="6242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d200587268e713" title="Siclari, F. et al. The neural correlates of dreaming. Nat. Neurosci. 20, 872–878 (2017)."><span data-dcnode-id="6243" instrument_node="">21</span></a></sup><span data-dcnode-id="6240" instrument_node="">. Furthermore, smooth pursuit eye movements during tracking of a visual target are highly similar during waking perception and lucid REM sleep dreaming</span><sup data-dcnode-id="6237"><a aria-label="Reference 22" data-dcnode-id="6238" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d200587268e717" title="LaBerge, S., Baird, B. &amp; Zimbardo, P. G. Smooth tracking of visual targets distinguishes lucid REM sleep dreaming and waking perception from imagination. Nat. Commun. 9, 3298 (2018)."><span data-dcnode-id="6239" instrument_node="">22</span></a></sup><span data-dcnode-id="6236" instrument_node="">. Taken together, these studies suggest a remarkable isomorphism of the neural mechanisms underlying motor control in wakefulness and dreaming. However, the correlative nature of these studies limits their potential to uncover the causal contribution of specific brain regions to dream content.</span></p><p data-dcnode-id="6189"><span data-dcnode-id="6234" instrument_node="">Older studies attempted to experimentally induce different kinds of dream experience via peripheral and bodily stimulation during sleep. Such causal manipulations that have been shown to have an effect on dream content include vestibular stimulation in rotating chairs</span><sup data-dcnode-id="6228"><a aria-label="Reference 23" data-dcnode-id="6232" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d200587268e725" title="Hoff, H. Zusammenhang von Vestibulärfunktion, Schlafstellung und Traumleben. Eur. Neurol. 71, 366–372 (1929)."><span data-dcnode-id="6233" instrument_node="">23</span></a><span data-dcnode-id="6231" instrument_node="">,</span><a aria-label="Reference 24" data-dcnode-id="6229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d200587268e728" title="Hoff, H. &amp; Pötzl, O. Über die labyrinthären Beziehungen von Flugsensationen und Flugträumen. Eur. Neurol. 97, 193–211 (1937)."><span data-dcnode-id="6230" instrument_node="">24</span></a></sup><span data-dcnode-id="6227" instrument_node=""> or hammocks</span><sup data-dcnode-id="6224"><a aria-label="Reference 25" data-dcnode-id="6225" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d200587268e732" title="Leslie, K. &amp; Ogilvie, R. Vestibular dreams: The effect of rocking on dream mentation. Dreaming 6, 1–16 (1996)."><span data-dcnode-id="6226" instrument_node="">25</span></a></sup><span data-dcnode-id="6223" instrument_node="">; light flashes or sprays of water applied to the skin</span><sup data-dcnode-id="6220"><a aria-label="Reference 26" data-dcnode-id="6221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d200587268e736" title="Dement, W. &amp; Wolpert, E. A. The relation of eye movements, body motility, and external stimuli to dream content. J. Exp. Psychol. 55, 543–553 (1958)."><span data-dcnode-id="6222" instrument_node="">26</span></a></sup><span data-dcnode-id="6219" instrument_node="">; thermal stimulation</span><sup data-dcnode-id="6213"><a aria-label="Reference 27" data-dcnode-id="6217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d200587268e740" title="Baldridge, B. J. Physical concomitants of dreaming and the effect of stimulation on dreamsitle. Ohio State Med. J. 62, 1272–1275 (1966)."><span data-dcnode-id="6218" instrument_node="">27</span></a><span data-dcnode-id="6216" instrument_node="">,</span><a aria-label="Reference 28" data-dcnode-id="6214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d200587268e743" title="Baldridge, B. J., Whitman, R. &amp; Kramer, M. The concurrence of fine muscle activity and rapid eye movements during sleep. Psychosom. Med. 27, 19–26 (1965)."><span data-dcnode-id="6215" instrument_node="">28</span></a></sup><span data-dcnode-id="6212" instrument_node="">; tactile stimulation via a blood pressure cuff inflated on the leg</span><sup data-dcnode-id="6206"><a aria-label="Reference 29" data-dcnode-id="6210" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d200587268e747" title="Nielsen, T. A. Changes in the kinesthetic content of dreams following somatosensory stimulatipn of leg muscles during REM sleep. Dreaming 3, 99–113 (1993)."><span data-dcnode-id="6211" instrument_node="">29</span></a><span data-dcnode-id="6209" instrument_node="">,</span><a aria-label="Reference 30" data-dcnode-id="6207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d200587268e750" title="Sauvageau, A., Nielsen, T. A. &amp; Montplaisir, J. Effects of somatosensory stimulation on dream content in gymnasts and control participants: Evidence of vestibulomotor adaptation in REM sleep. Dreaming 8, 125–134 (1998)."><span data-dcnode-id="6208" instrument_node="">30</span></a></sup><span data-dcnode-id="6205" instrument_node="">; and olfactory stimulation</span><sup data-dcnode-id="6202"><a aria-label="Reference 31" data-dcnode-id="6203" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d200587268e755" title="Schredl, M. et al. Information processing during sleep: The effect of olfactory stimuli on dream content and dream emotions. J. Sleep Res 18, 285–290 (2009)."><span data-dcnode-id="6204" instrument_node="">31</span></a></sup><span data-dcnode-id="6201" instrument_node="">. The frequency of stimulus incorporation in dreams is variable and dependent both on the kind of stimulus and the sensory modality. Particularly high incorporation rates were achieved in studies using blood pressure cuff stimulation (40–80%)</span><sup data-dcnode-id="6195"><a aria-label="Reference 29" data-dcnode-id="6199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d200587268e759" title="Nielsen, T. A. Changes in the kinesthetic content of dreams following somatosensory stimulatipn of leg muscles during REM sleep. Dreaming 3, 99–113 (1993)."><span data-dcnode-id="6200" instrument_node="">29</span></a><span data-dcnode-id="6198" instrument_node="">,</span><a aria-label="Reference 30" data-dcnode-id="6196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d200587268e762" title="Sauvageau, A., Nielsen, T. A. &amp; Montplaisir, J. Effects of somatosensory stimulation on dream content in gymnasts and control participants: Evidence of vestibulomotor adaptation in REM sleep. Dreaming 8, 125–134 (1998)."><span data-dcnode-id="6197" instrument_node="">30</span></a></sup><span data-dcnode-id="6194" instrument_node="">. This method of causally manipulating dream content is promising. However, because the processing of external and peripheral stimuli is attenuated in REM sleep, the precise effect of sensory stimulation on dream content is often nonspecific and unpredictable</span><sup data-dcnode-id="6191"><a aria-label="Reference 32" data-dcnode-id="6192" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d200587268e766" title="Solomonova, E. &amp; Carr, M. Incorporation of external stimuli into dream content. In Dreams: Understanding Biology, Psychology, and Culture (eds. Hoss, R. J., Valli, K. &amp; Gongloff, R. P.) 213–218 (ABC-CLIO), 
https://doi.org/10.1097/00003081-200212000-00011

 (2019)."><span data-dcnode-id="6193" instrument_node="">32</span></a></sup><span data-dcnode-id="6190" instrument_node="">.</span></p><p data-dcnode-id="6144"><span data-dcnode-id="6188" instrument_node="">As a more direct method for manipulating dream content that avoids the possibly distorting effect of reduced sensory processing during REM sleep, we previously suggested using tDCS</span><sup data-dcnode-id="6182"><a aria-label="Reference 33" data-dcnode-id="6186" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d200587268e773" title="Noreika, V., Windt, J. M., Lenggenhager, B. &amp; Karim, A. A. New perspectives for the study of lucid dreaming: From brain stimulation to philosophical theories of self-consciousness. Int. J. Dream Res 3, 36–45 (2010)."><span data-dcnode-id="6187" instrument_node="">33</span></a><span data-dcnode-id="6185" instrument_node="">,</span><a aria-label="Reference 34" data-dcnode-id="6183" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d200587268e776" title="Karim, A. A. Transcranial cortex stimulation as a novel approach for probing the neurobiology of dreams: Clinical and neuroethical implications. Int. J. Dream Res 3, 17–20 (2010)."><span data-dcnode-id="6184" instrument_node="">34</span></a></sup><span data-dcnode-id="6181" instrument_node="">. We argued that this method might complement previous attempts to manipulate dream content through sensory and bodily stimulation in sleep&nbsp;(for a clinical and neuroethical discussion of this method, see</span><sup data-dcnode-id="6178"><a aria-label="Reference 34" data-dcnode-id="6179" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d200587268e780" title="Karim, A. A. Transcranial cortex stimulation as a novel approach for probing the neurobiology of dreams: Clinical and neuroethical implications. Int. J. Dream Res 3, 17–20 (2010)."><span data-dcnode-id="6180" instrument_node="">34</span></a></sup><span data-dcnode-id="6177" instrument_node="">). Unihemispheric tDCS has been shown to facilitate motor imagery during REM sleep</span><sup data-dcnode-id="6174"><a aria-label="Reference 35" data-dcnode-id="6175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d200587268e784" title="Speth, J. &amp; Speth, C. Motor imagery in REM sleep is increased by transcranial direct current stimulation of the left motor cortex (C3). Neuropsychologia 86, 57–65 (2016)."><span data-dcnode-id="6176" instrument_node="">35</span></a></sup><span data-dcnode-id="6173" instrument_node=""> and to modulate visual imagery during Stage 2 NREM sleep</span><sup data-dcnode-id="6170"><a aria-label="Reference 36" data-dcnode-id="6171" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d200587268e788" title="Jakobson, A. J., Fitzgerald, P. B. &amp; Conduit, R. Induction of visual dream reports after transcranial direct current stimulation (tDCs) during Stage 2 sleep. J. Sleep Res 21, 369–379 (2012)."><span data-dcnode-id="6172" instrument_node="">36</span></a></sup><span data-dcnode-id="6169" instrument_node="">, but not during slow wave sleep</span><sup data-dcnode-id="6166"><a aria-label="Reference 37" data-dcnode-id="6167" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d200587268e792" title="Jakobson, A. J., Fitzgerald, P. B. &amp; Conduit, R. Investigation of dream reports after transcranial direct current stimulation (tDCs) during slow wave sleep (SWS). Sleep Biol. Rhythms 10, 169–178 (2012)."><span data-dcnode-id="6168" instrument_node="">37</span></a></sup><span data-dcnode-id="6165" instrument_node=""> or REM sleep</span><sup data-dcnode-id="6162"><a aria-label="Reference 38" data-dcnode-id="6163" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d200587268e797" title="Jakobson, A. J., Conduit, R. D. &amp; Fitzgerald, P. B. Investigation of visual dream reports after transcranial direct current stimulation (tDCS) during REM. sleep. Int. J. Dream Res. 5, 87–93 (2012)."><span data-dcnode-id="6164" instrument_node="">38</span></a></sup><span data-dcnode-id="6161" instrument_node="">. Furthermore, frontal tDCS increases lucidity in experienced lucid dreamers</span><sup data-dcnode-id="6158"><a aria-label="Reference 39" data-dcnode-id="6159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d200587268e801" title="Stumbrys, T., Erlacher, D. &amp; Schredl, M. Testing the involvement of the prefrontal cortex in lucid dreaming: A tDCS study. Conscious. Cogn. 22, 1214–1222 (2013)."><span data-dcnode-id="6160" instrument_node="">39</span></a></sup><span data-dcnode-id="6157" instrument_node="">; and frontal transcranial alternating current stimulation (tACS) increases dissociation, insight and control in novice lucid dreamers</span><sup data-dcnode-id="6154"><a aria-label="Reference 40" data-dcnode-id="6155" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d200587268e805" title="Voss, U. et al. Induction of self awareness in dreams through frontal low current stimulation of gamma activity. Nat. Neurosci. 17, 810–812 (2014)."><span data-dcnode-id="6156" instrument_node="">40</span></a></sup><span data-dcnode-id="6153" instrument_node="">. tDCS has also been reported to modulate mind wandering in wakefulness</span><sup data-dcnode-id="6150"><a aria-label="Reference 41" data-dcnode-id="6151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d200587268e809" title="Axelrod, V., Rees, G., Lavidor, M. &amp; Bar, M. Increasing propensity to mind-wander with transcranial direct current stimulation. Proc. Natl. Acad. Sci. 112, 3314–3319 (2015)."><span data-dcnode-id="6152" instrument_node="">41</span></a></sup><span data-dcnode-id="6149" instrument_node="">. This is promising, as dreaming has been proposed to be an intensified form of mind wandering, based on phenomenological and neurophysiological similarities</span><sup data-dcnode-id="6146"><a aria-label="Reference 42" data-dcnode-id="6147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d200587268e813" title="Fox, K. C. R., Nijeboer, S., Solomonova, E., Domhoff, G. W. &amp; Christoff, K. Dreaming as mind wandering: evidence from functional neuroimaging and first-person content reports. Front. Hum. Neurosci 7, 412 (2013)."><span data-dcnode-id="6148" instrument_node="">42</span></a></sup><span data-dcnode-id="6145" instrument_node="">.</span></p><p data-dcnode-id="6089"><span data-dcnode-id="6143" instrument_node="">Here, we applied tDCS over the sensorimotor cortex, aiming to understand its causal role in dream content generation. Since tDCS modulates neural processes associated with motor imagery during wakefulness</span><sup data-dcnode-id="6134"><a data-dcnode-id="6141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d200587268e820" title="Feurra, M. et al. Cortico-cortical connectivity between right parietal and bilateral primary motor cortices during imagined and observed actions: A combined TMS/tDCS study. Front. Neural Circuits 5, 10 (2011)."><span data-dcnode-id="6142" instrument_node="">43</span></a><span data-dcnode-id="6140" instrument_node="">,</span><a data-dcnode-id="6138" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d200587268e820_1" title="Matsumoto, J. et al. Modulation of mu rhythm desynchronization during motor imagery by transcranial direct current stimulation. J. Neuroeng. Rehabil. 7, 27 (2010)."><span data-dcnode-id="6139" instrument_node="">44</span></a><span data-dcnode-id="6137" instrument_node="">,</span><a aria-label="Reference 45" data-dcnode-id="6135" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d200587268e823" title="Quartarone, A. et al. Long lasting effects of transcranial direct current stimulation on motor imagery. Neuroreport 15, 1287–1291 (2004)."><span data-dcnode-id="6136" instrument_node="">45</span></a></sup><span data-dcnode-id="6133" instrument_node="">, we expected a similar effect during REM sleep. However, instead of aiming at an overall facilitation of movement sensations in dreams with anodal tDCS</span><sup data-dcnode-id="6130"><a aria-label="Reference 35" data-dcnode-id="6131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d200587268e827" title="Speth, J. &amp; Speth, C. Motor imagery in REM sleep is increased by transcranial direct current stimulation of the left motor cortex (C3). Neuropsychologia 86, 57–65 (2016)."><span data-dcnode-id="6132" instrument_node="">35</span></a></sup><span data-dcnode-id="6129" instrument_node="">, our stimulation protocol was designed to induce selective unilateral changes of motor processing and bodily experience during sleep, which would enable a more focused analysis of the electrophysiological mechanisms underlying dream movement. It is well known that motor effects depend on current direction, with cathodal stimulation being more effective and largely inhibitory and anodal stimulation being less effective and largely facilitatory</span><sup data-dcnode-id="6126"><a aria-label="Reference 46" data-dcnode-id="6127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d200587268e831" title="Nitsche, M. A. et al. Transcranial direct current stimulation: State of the art 2008. Brain Stimul 1, 206–223 (2008)."><span data-dcnode-id="6128" instrument_node="">46</span></a></sup><span data-dcnode-id="6125" instrument_node="">. We thus adopted a bihemispheric tDCS protocol, expecting to observe an inhibition of bodily experiences on the right side of the body due to cathodal stimulation, and facilitation of bodily experiences on the left side of the body due to anodal stimulation. We hypothesized that if the sensorimotor cortex has a causal role in generating sensorimotor dream content, bihemispheric tDCS over the sensorimotor cortex during REM sleep should modulate movement and other bodily experiences in dreams reported immediately after timed awakenings in the laboratory. To test this hypothesis, we developed a questionnaire focused specifically on bodily sensations in dreams. This questionnaire drew from existing findings on the phenomenology of dreaming</span><sup data-dcnode-id="6116"><a aria-label="Reference 1" data-dcnode-id="6123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d200587268e835" title="Hobson, J. A. The dreaming brain. (Basic Books, 1988)."><span data-dcnode-id="6124" instrument_node="">1</span></a><span data-dcnode-id="6122" instrument_node="">,</span><a aria-label="Reference 2" data-dcnode-id="6120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d200587268e838" title="Hobson, J. A., Pace-Schott, E. F. &amp; Stickgold, R. Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behav. Brain Sci. 23, 793–842 (2000)."><span data-dcnode-id="6121" instrument_node="">2</span></a><span data-dcnode-id="6119" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="6117" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d200587268e841" title="Schwartz, S. A historical loop of one hundred years: Similarities between 19th century and contemporary dream research. Dreaming 10, 55–66 (2000)."><span data-dcnode-id="6118" instrument_node="">47</span></a></sup><span data-dcnode-id="6115" instrument_node=""> as well as from findings on bodily experience in altered states and wake-state pathologies</span><sup data-dcnode-id="6109"><a aria-label="Reference 48" data-dcnode-id="6113" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d200587268e845" title="De Vignemont, F. Embodiment, ownership and disownership. Conscious. Cogn. 20, 82–93 (2011)."><span data-dcnode-id="6114" instrument_node="">48</span></a><span data-dcnode-id="6112" instrument_node="">,</span><a aria-label="Reference 49" data-dcnode-id="6110" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d200587268e848" title="Brugger, P. &amp; Lenggenhager, B. The bodily self and its disorders: Neurological, psychological and social aspects. Curr. Opin. Neurol. 27, 644–652 (2014)."><span data-dcnode-id="6111" instrument_node="">49</span></a></sup><span data-dcnode-id="6108" instrument_node="">. It was also inspired by methodological considerations on the comparative usefulness of questionnaires and free dream reports for the study of specific aspects of dream phenomenology, and specifically by several studies on dream emotions</span><sup data-dcnode-id="6102"><a aria-label="Reference 50" data-dcnode-id="6106" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d200587268e853" title="Merritt, J. M., Stickgold, R., Pace-Schott, E., Williams, J. &amp; Hobson, J. A. Emotion profiles in the dreams of men and women. Conscious. Cogn. 3, 46–60 (1994)."><span data-dcnode-id="6107" instrument_node="">50</span></a><span data-dcnode-id="6105" instrument_node="">,</span><a aria-label="Reference 51" data-dcnode-id="6103" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d200587268e856" title="Sikka, P., Feilhauer, D., Valli, K. J. &amp; Revonsuo, A. How you measure is what you get: Differences in self- and external ratings of emotional experiences in home dreams. Am. J. Psychol. 130, 367–384 (2017)."><span data-dcnode-id="6104" instrument_node="">51</span></a></sup><span data-dcnode-id="6101" instrument_node="">. These findings guided our focus on certain types of bodily experiences (and in particular movement) as well as our decision to use a questionnaire rather than focus exclusively on the analysis of dream reports (for theoretical discussion of this methodology and further references, see</span><sup data-dcnode-id="6095"><a aria-label="Reference 9" data-dcnode-id="6099" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d200587268e860" title="Windt, J. M. Reporting dream experience: Why (not) to be skeptical about dream reports. Front. Hum. Neurosci., 
https://doi.org/10.3389/fnhum.2013.00708

 (2013)."><span data-dcnode-id="6100" instrument_node="">9</span></a><span data-dcnode-id="6098" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="6096" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d200587268e863" title="Windt, J. M. Dreaming: A conceptual framework for philosophy of mind and empirical research. (MIT Press, 2015)."><span data-dcnode-id="6097" instrument_node="">10</span></a></sup><span data-dcnode-id="6094" instrument_node="">). This approach allowed us to probe bodily experiences more systematically than the more common methods of content analysis or quantitative linguistic analysis of dream reports</span><sup data-dcnode-id="6091"><a aria-label="Reference 35" data-dcnode-id="6092" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d200587268e867" title="Speth, J. &amp; Speth, C. Motor imagery in REM sleep is increased by transcranial direct current stimulation of the left motor cortex (C3). Neuropsychologia 86, 57–65 (2016)."><span data-dcnode-id="6093" instrument_node="">35</span></a></sup><span data-dcnode-id="6090" instrument_node="">.</span></p><p data-dcnode-id="6068"><span data-dcnode-id="6088" instrument_node="">Furthermore, we hypothesized that bihemispheric tDCS during REM sleep would interfere with interhemispheric motor networks as well as with spontaneous peripheral muscle activity, which are possible correlates of dream movement. REM sleep is typically characterized by near-complete muscle atonia</span><sup data-dcnode-id="6085"><a aria-label="Reference 52" data-dcnode-id="6086" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d200587268e874" title="Pompeiano, O. Sensory inhibition during motor activity in sleep. In Neurophysiological Basis of Normal and Abnormal Motor Activities (eds. Yahr, M. D. &amp; Purpura, D. P.) 323–375 (Raven Press, 1967)."><span data-dcnode-id="6087" instrument_node="">52</span></a></sup><span data-dcnode-id="6084" instrument_node=""> and a partial blockade of sensory input</span><sup data-dcnode-id="6078"><a aria-label="Reference 1" data-dcnode-id="6082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d200587268e878" title="Hobson, J. A. The dreaming brain. (Basic Books, 1988)."><span data-dcnode-id="6083" instrument_node="">1</span></a><span data-dcnode-id="6081" instrument_node="">,</span><a aria-label="Reference 53" data-dcnode-id="6079" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d200587268e881" title="Wu, M. F. Sensory processing and sensation during sleep. In Encyclopedia of Sleep and Dreaming (ed. Carskadon, M. A.) 533–535 (Macmillan, 1993)."><span data-dcnode-id="6080" instrument_node="">53</span></a></sup><span data-dcnode-id="6077" instrument_node="">. At the same time, subtle muscular activity in the form of twitching is frequent in REM sleep and may play a role in the development and maintenance of motor behaviour</span><sup data-dcnode-id="6074"><a aria-label="Reference 54" data-dcnode-id="6075" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d200587268e885" title="Blumberg, M. S. Developing sensorimotor systems in our sleep. Curr. Dir. Psychol. Sci. 24, 32–37 (2015)."><span data-dcnode-id="6076" instrument_node="">54</span></a></sup><span data-dcnode-id="6073" instrument_node="">. A relation to dreaming seems plausible, but remains incompletely understood</span><sup data-dcnode-id="6070"><a aria-label="Reference 55" data-dcnode-id="6071" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d200587268e889" title="Windt, J. M. Predictive brains, dreaming selves, sleeping bodies: how the analysis of dream movement can inform a theory of self- and world-simulation in dreams. Synthese 195, 2577–2625 (2018)."><span data-dcnode-id="6072" instrument_node="">55</span></a></sup><span data-dcnode-id="6069" instrument_node="">. To investigate possible effects of bihemispheric tDCS on outward muscular activity, we obtained electromyographic (EMG) measures from both arms.</span></p></div></div></section><section data-dcnode-id="5736" data-title="Results"><div class="c-article-section" data-dcnode-id="5737" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6063" id="Sec2"><span data-dcnode-id="6064" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="5738" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="6061" id="Sec3"><span data-dcnode-id="6062" instrument_node="">Study outline</span></h3><p data-dcnode-id="6050"><span data-dcnode-id="6060" instrument_node="">The study protocol consisted of a recruitment and screening session, an MRI session, and two sleep sessions on non-consecutive nights (Fig.&nbsp;</span><a data-dcnode-id="6058" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="6059" instrument_node="">1A</span></a><span data-dcnode-id="6057" instrument_node="">). In addition, a TMS assessment of motor cortical excitability took place on the evening of the first sleep session. Ten participants were awakened from REM sleep two or three times per night and asked to give free dream reports and answer the Bodily Experiences in Dreams (BED) Questionnaire, which targeted the dream immediately preceding awakening (Fig.&nbsp;</span><a data-dcnode-id="6055" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="6056" instrument_node="">1B</span></a><span data-dcnode-id="6054" instrument_node="">). Participants received sham-stimulation during REM sleep on one night and bihemispheric tDCS on the other night. Bihemispheric tDCS montage included a cathode placed over the left sensorimotor cortex and an anode placed over the right sensorimotor cortex (Fig.&nbsp;</span><a data-dcnode-id="6052" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="6053" instrument_node="">1C</span></a><span data-dcnode-id="6051" instrument_node="">). In addition to standard polysomnography, central and peripheral electrophysiological data were recorded using 16 electroencephalography (EEG) channels and 4 EMG channels measuring flexor and deltoid muscles in both arms.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="6017" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="6018"><figcaption data-dcnode-id="6047"><b class="c-article-section__figure-caption" data-dcnode-id="6048" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="6049" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="6029"><div class="c-article-section__figure-item" data-dcnode-id="6042"><a class="c-article-section__figure-link" data-dcnode-id="6043" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/1" rel="nofollow"><picture data-dcnode-id="6044"><source data-dcnode-id="6046" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-63479-6/MediaObjects/41598_2020_63479_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="6045" height="542" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-63479-6/MediaObjects/41598_2020_63479_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="6030" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="6031"><span data-dcnode-id="6041" instrument_node="">Experimental design. (</span><b data-dcnode-id="6039"><span data-dcnode-id="6040" instrument_node="">A</span></b><span data-dcnode-id="6038" instrument_node="">) Time course of the study. </span><b data-dcnode-id="6036"><span data-dcnode-id="6037" instrument_node="">(B)</span></b><span data-dcnode-id="6035" instrument_node=""> Experimental setup during sleep sessions (drawn by Peter Rohner). </span><b data-dcnode-id="6033"><span data-dcnode-id="6034" instrument_node="">(C)</span></b><span data-dcnode-id="6032" instrument_node=""> Primary sensorimotor hand areas of a representative participant. Orange dots indicate stimulation sites where TMS pulses&nbsp;in&nbsp;waking participants induced a subjectively experienced hand movement and/or muscle twitch (located approximately at the central sulcus between the somatosensory and somatomotor cortices). The blue box over the left hemisphere represents the cathode tDCS electrode placement site, and the red box over the right hemisphere represents the anode electrode placement site. White circles depict the approximate location of 6 electrodes used for the EEG inter-hemispheric coherence analysis.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="6019"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="6020" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/1" rel="nofollow"><span data-dcnode-id="6027"><span data-dcnode-id="6028" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="6021" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="6022" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="6023" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="6026" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="6025" fill-rule="evenodd"></path><span data-dcnode-id="6024" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="6015" id="Sec4"><span data-dcnode-id="6016" instrument_node="">tDCS modulates dream movement</span></h3><p data-dcnode-id="6001"><span data-dcnode-id="6014" instrument_node="">The first research question was whether the sensorimotor cortex is involved in the generation of bodily experiences in dreams. To answer this, we compared the percentage of dreams with different types of bodily experiences as reported in the BED Questionnaire between the tDCS and sham stimulation. Among the general dimensions of bodily experience in dreams (tactile/somatosensory, vestibular/balance, movement, movement alterations, body scheme alterations), we found a significant difference only for movement (Fig.&nbsp;</span><a data-dcnode-id="6012" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="6013" instrument_node="">2</span></a><span data-dcnode-id="6011" instrument_node=""> and Table&nbsp;</span><a data-dcnode-id="6009" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="6010" instrument_node="">1</span></a><span data-dcnode-id="6008" instrument_node="">). Specifically, the proportion of dreams with movement was significantly lower in the tDCS compared to the sham-stimulation condition (paired samples t test: t(9) = 3.77, p</span><sub data-dcnode-id="6006"><span data-dcnode-id="6007" instrument_node="">Bx5</span></sub><span data-dcnode-id="6005" instrument_node=""> = 0.022, d = 0.85). That is, participants were less likely to answer YES to the question “Did you move in your dream?” when they were awakened 1 min after termination of bihemispheric tDCS. At the individual level, 7 out of 10 participants showed this effect, whereas the remaining 3 participants had equal proportions of dreams with movements between the two conditions (Fig.&nbsp;</span><a data-dcnode-id="6003" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="6004" instrument_node="">2</span></a><span data-dcnode-id="6002" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5974" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="5975"><figcaption data-dcnode-id="5998"><b class="c-article-section__figure-caption" data-dcnode-id="5999" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="6000" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5986"><div class="c-article-section__figure-item" data-dcnode-id="5993"><a class="c-article-section__figure-link" data-dcnode-id="5994" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/2" rel="nofollow"><picture data-dcnode-id="5995"><source data-dcnode-id="5997" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-63479-6/MediaObjects/41598_2020_63479_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="5996" height="285" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-63479-6/MediaObjects/41598_2020_63479_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5987" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="5988"><span data-dcnode-id="5992" instrument_node="">tDCS effects on reported dream experiences. Changes between sham-stimulation and tDCS conditions across the five general categories of dream content (top row) and for particular kinds of movement (bottom row) per participant. Positive and negative values indicate a higher proportion of dreams with a specific experience in the sham-stimulation and tDCS condition, respectively. Individual participants are sorted in descending order beginning with the participant with the highest proportion of dreams with a specific experience in the sham-stimulation condition, compared to the tDCS condition. Participants are sorted separately for each dimension of experience. *p</span><sub data-dcnode-id="5990"><span data-dcnode-id="5991" instrument_node="">B</span></sub><span data-dcnode-id="5989" instrument_node=""> &lt; 0.05.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5976"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="5977" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/2" rel="nofollow"><span data-dcnode-id="5984"><span data-dcnode-id="5985" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5978" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5979" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5980" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5983" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5982" fill-rule="evenodd"></path><span data-dcnode-id="5981" instrument_node="">
</span></a></div></figure></div><div class="c-article-table" data-container-section="table" data-dcnode-id="5959" data-test="inline-table" id="table-1"><figure data-dcnode-id="5960"><figcaption class="c-article-table__figcaption" data-dcnode-id="5971"><b data-dcnode-id="5972" data-test="table-caption" id="Tab1"><span data-dcnode-id="5973" instrument_node="">Table 1 The BED Questionnaire: Percentage of dream reports containing specific bodily experiences following sham-stimulation and tDCS during REM sleep.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5961"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="5962" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/tables/1" rel="nofollow"><span data-dcnode-id="5969"><span data-dcnode-id="5970" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5963" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5964" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5965" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5968" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5967" fill-rule="evenodd"></path><span data-dcnode-id="5966" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5945"><span data-dcnode-id="5958" instrument_node="">To investigate whether specific types of movement were inhibited by tDCS, we compared the proportion of dreams with single actions (i.e. movements that are not repeated immediately after their execution, such as placing a book on the table), repetitive actions (i.e. the same movements repeated several times in a continuous sequence, such as running), and passive movements (i.e. movements determined by external forces, such as traveling by car) between tDCS and sham-stimulation conditions (see Table&nbsp;</span><a data-dcnode-id="5956" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="5957" instrument_node="">2</span></a><span data-dcnode-id="5955" instrument_node=""> for examples of movement descriptions in the verbal dream reports). There were significantly less dreams with repetitive actions in the tDCS condition compared to the sham condition (paired samples t test: t(9) = 4.36, p</span><sub data-dcnode-id="5953"><span data-dcnode-id="5954" instrument_node="">Bx3</span></sub><span data-dcnode-id="5952" instrument_node=""> = 0.006, d = 1.21) (Fig.&nbsp;</span><a data-dcnode-id="5950" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5951" instrument_node="">2</span></a><span data-dcnode-id="5949" instrument_node="">). There were no significant tDCS effects on the frequency of dreams containing single actions or passive movements (see Table&nbsp;</span><a data-dcnode-id="5947" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="5948" instrument_node="">1</span></a><span data-dcnode-id="5946" instrument_node="">).</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5930" data-test="inline-table" id="table-2"><figure data-dcnode-id="5931"><figcaption class="c-article-table__figcaption" data-dcnode-id="5942"><b data-dcnode-id="5943" data-test="table-caption" id="Tab2"><span data-dcnode-id="5944" instrument_node="">Table 2 Examples of different types of movement reported in verbal dream reports.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5932"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="5933" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/tables/2" rel="nofollow"><span data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5934" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5935" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5936" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5939" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5938" fill-rule="evenodd"></path><span data-dcnode-id="5937" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5925"><span data-dcnode-id="5929" instrument_node="">Interestingly, we found no difference in movement frequency between the stimulation conditions in verbal dream reports that were content analysed by independent judges (see Table&nbsp;</span><a data-dcnode-id="5927" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5928" instrument_node="">S1</span></a><span data-dcnode-id="5926" instrument_node="">). This could be due to a considerably smaller proportion of explicitly expressed movements in free reports compared to responses to the BED Questionnaire. Indeed, content analysis indicated a lower proportion of repetitive movements compared to the BED Questionnaire data (Sham stimulation: 38% vs. tDCS: 65%). This is consistent with the possibility that participants tended to omit movements from the spontaneous verbal reports that were given before answering explicit motor questions of the BED Questionnaire (see Supplementary Material), confirming our preference for a questionnaire focused on bodily experiences in this particular study. We also note that we did not instruct participants to focus on bodily experiences in their free dream reports.</span></p><p data-dcnode-id="5923"><span data-dcnode-id="5924" instrument_node="">According to our questionnaire data, a majority of dream movements involved the whole body (M = 75.5%, SEM = 7.62%) and more rarely the right hand (M = 25%, SEM = 8.23%) or both hands (M = 15.83%, SEM = 7.02%); another unspecified body part was mentioned in only one report. Repetitive actions typically involved the whole body (M = 89.8%, SEM = 6.8%), with only 5.6% of repetitive movements performed by the right hand (Wilcoxon signed-rank test: Z = 2.71, p = 0.007, effect size r = 0.64). Contrary to this, the proportion of single actions was comparable for the whole body (M = 43.8%, SEM = 12.3%) and right hand movements (M = 34.4%, SEM = 11.5%, Wilcoxon signed-rank test: Z = 0.43, p = 0.67, effect size r = 0.11). No systematic body-part or laterality differences were observed between the sham-stimulation and tDCS conditions.</span></p><p data-dcnode-id="5921"><span data-dcnode-id="5922" instrument_node="">Importantly, the observed reduction of dream movement following tDCS was not related to the overall length of dream reports, which could have been a confounding factor. To test whether the reduction in dream movement was related to shorter dream reports following tDCS, we compared the subjectively estimated duration of dreams during the tDCS and sham-stimulation conditions (BED Questionnaire - Q41: “How long did your dream seem to last, according to subjective experience (in minutes)?”). There was no difference in the subjectively reported duration of dream reports between tDCS (Median = 9.17 min, range from 1.5 min to 97.5 min) and sham-stimulation (Median = 9.67 min, range from 0.83 min to 40 min) conditions (Wilcoxon signed-rank test: Z = 0.36, p = 0.72, r = 0.11). Furthermore, we compared the word count of dream reports. Once again, there was no significant difference between tDCS (M = 76.1, SEM = 16.31) and sham-stimulation (M = 124.2, SEM = 34.68) conditions (paired samples t test: t(9) = 1.69, p = 0.124, d = 0.56, Bf in favor of the null = 1.11). On four occasions, participants remembered and reported additional details of a dream after completing the original dream report and questionnaire, while they were trying to fall asleep again. When these secondary reports were included in the word count analysis, there was still no significant difference in word count between tDCS (M = 89, SEM = 19.83) and sham-stimulation (M = 124.98, SEM = 34.55) conditions (paired samples t test: t(9) = 1.15, p = 0.281, d = 0.4, Bf in favor of the null = 1.91). We thus conclude that differences in the length of dream reports (and in the subjectively estimated duration of dreams) were not related to the observed reduction of dream movement following tDCS.</span></p><p data-dcnode-id="5916"><span data-dcnode-id="5920" instrument_node="">To assess the possible effect of the time of night, we compared the answers to the five main questions (tactile-somatosensory, vestibular-balance, movement, movement alterations, body scheme alterations) between the first and the last reports of each night, separately for the sham-stimulation and tDCS conditions (see Supplementary Material and Table&nbsp;</span><a data-dcnode-id="5918" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5919" instrument_node="">S2</span></a><span data-dcnode-id="5917" instrument_node="">). No systematic differences were observed, excluding cumulative effects over night.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5914" id="Sec5"><span data-dcnode-id="5915" instrument_node="">tDCS modulation of EEG activity</span></h3><p data-dcnode-id="5881"><span data-dcnode-id="5913" instrument_node="">Given the opposing directions of bihemispheric tDCS in the current study, i.e. an expected cathodal inhibitory effect over the left motor cortex and an anodal excitatory effect over the right motor cortex, we hypothesized that a reduction of repetitive whole-body actions in response to tDCS was due to a decreased inter-hemispheric coordination of motor processing. To investigate this hypothesis, we restricted EEG analysis to the beta frequency band, because (1) transient and tonic changes in EEG beta oscillatory activity underlie cortical processing of both real</span><sup data-dcnode-id="5904"><a data-dcnode-id="5911" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d200587268e1213" title="Gerloff, C. et al. Functional coupling and regional activation of human cortical motor areas during simple, internally paced and externally paced finger movements. Brain 121, 1513–1531 (1998)."><span data-dcnode-id="5912" instrument_node="">56</span></a><span data-dcnode-id="5910" instrument_node="">,</span><a data-dcnode-id="5908" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d200587268e1213_1" title="Jenkinson, N. &amp; Brown, P. New insights into the relationship between dopamine, beta oscillations and motor function. Trends Neurosci. 34, 611–618 (2011)."><span data-dcnode-id="5909" instrument_node="">57</span></a><span data-dcnode-id="5907" instrument_node="">,</span><a aria-label="Reference 58" data-dcnode-id="5905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d200587268e1216" title="Zaepffel, M., Trachel, R., Kilavik, B. E. &amp; Brochier, T. Modulations of EEG beta power during planning and execution of grasping movements. Plos One 8, e60060 (2013)."><span data-dcnode-id="5906" instrument_node="">58</span></a></sup><span data-dcnode-id="5903" instrument_node=""> and imagined</span><sup data-dcnode-id="5897"><a aria-label="Reference 59" data-dcnode-id="5901" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d200587268e1220" title="Nam, C. S., Jeon, Y., Kim, Y. J., Lee, I. &amp; Park, K. Movement imagery-related lateralization of event-related (de)synchronization (ERD/ERS): Motor-imagery duration effects. Clin. Neurophysiol. 122, 567–577 (2011)."><span data-dcnode-id="5902" instrument_node="">59</span></a><span data-dcnode-id="5900" instrument_node="">,</span><a aria-label="Reference 60" data-dcnode-id="5898" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d200587268e1223" title="Neuper, C., Scherer, R., Reiner, M. &amp; Pfurtscheller, G. Imagery of motor actions: Differential effects of kinesthetic and visual-motor mode of imagery in single-trial EEG. Cogn. Brain Res. 25, 668–677 (2005)."><span data-dcnode-id="5899" instrument_node="">60</span></a></sup><span data-dcnode-id="5896" instrument_node=""> movements; (2) preparation and execution of movement involves inter-hemispheric functional coupling in the beta frequency range</span><sup data-dcnode-id="5890"><a aria-label="Reference 61" data-dcnode-id="5894" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d200587268e1227" title="Leocani, L., Toro, C., Manganotti, P., Zhuang, P. &amp; Hallett, M. Event-related coherence and event-related desynchronization/synchronization in the 10 Hz and 20 Hz EEG during self- paced movements. Electroencephalogr. Clin. Neurophysiol. - Evoked Potentials 104, 199–206 (1997)."><span data-dcnode-id="5895" instrument_node="">61</span></a><span data-dcnode-id="5893" instrument_node="">,</span><a aria-label="Reference 62" data-dcnode-id="5891" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d200587268e1230" title="Mima, T., Matsuoka, T. &amp; Hallett, M. Functional coupling of human right and left cortical motor areas demonstrated with partial coherence analysis. Neurosci. Lett. 287, 93–96 (2000)."><span data-dcnode-id="5892" instrument_node="">62</span></a></sup><span data-dcnode-id="5889" instrument_node="">; and (3) motor impairment and successful rehabilitation involve changes in the inter-hemispheric interaction in the beta frequency range</span><sup data-dcnode-id="5883"><a aria-label="Reference 63" data-dcnode-id="5887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d200587268e1234" title="Fortuna, M. et al. Cortical reorganization after hand immobilization: The beta qEEG spectral coherence evidences. Plos One 8, e79912 (2013)."><span data-dcnode-id="5888" instrument_node="">63</span></a><span data-dcnode-id="5886" instrument_node="">,</span><a aria-label="Reference 64" data-dcnode-id="5884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d200587268e1237" title="Pellegrino, G. et al. Inter-hemispheric coupling changes associate with motor improvements after robotic stroke rehabilitation. Restor. Neurol. Neurosci 30, 497–510 (2012)."><span data-dcnode-id="5885" instrument_node="">64</span></a></sup><span data-dcnode-id="5882" instrument_node="">. We thus expected bihemispheric tDCS to destabilize motor processing by reducing inter-hemispheric coherence in the beta frequency range.</span></p><p data-dcnode-id="5867"><span data-dcnode-id="5880" instrument_node="">As predicted, we observed a significant decrease in coherence between parietal electrodes P3-P4 following tDCS compared to sham-stimulation during a 1-minute stimulation-free period before awakening (Wilcoxon signed-rank test: Z = 2.5, p</span><sub data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Bx3</span></sub><span data-dcnode-id="5877" instrument_node=""> = 0.039, effect size r = 0.79). No inter-hemispheric tDCS effects were observed between frontal (paired samples t test: t(9) = 0.72, p</span><sub data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">Bx3</span></sub><span data-dcnode-id="5874" instrument_node=""> = 1, d = 0.244) or temporal electrodes (t(9) = 0.38, p</span><sub data-dcnode-id="5872"><span data-dcnode-id="5873" instrument_node="">Bx3</span></sub><span data-dcnode-id="5871" instrument_node=""> = 1, d = 0.114). To control for the temporal specificity of the decrease of parietal coherence, we repeated the same analysis in four separate time intervals following the terminati
