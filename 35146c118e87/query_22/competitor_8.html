on of stimulation: −60 to −46 sec, −45 to −31 sec, −30 to −16 sec, and −15 sec to −1 sec prior to awakening. A significant effect observed only in the time window before awakening (i.e. −30 to −16 sec, and/or −15 sec to −1 sec) would indicate a non-specific effect of experimental stimulation. Compared to sham-stimulation, a significant decrease of parietal coherence took place in the tDCS condition throughout all four sub-intervals between the offset of stimulation and the onset of awakening, confirming a direct and relatively long-lasting tDCS effect on parietal coherence in the beta-frequency range (Fig.&nbsp;</span><a data-dcnode-id="5869" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5870" instrument_node="">3</span></a><span data-dcnode-id="5868" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5843" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="5844"><figcaption data-dcnode-id="5864"><b class="c-article-section__figure-caption" data-dcnode-id="5865" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="5866" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5855"><div class="c-article-section__figure-item" data-dcnode-id="5859"><a class="c-article-section__figure-link" data-dcnode-id="5860" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/3" rel="nofollow"><picture data-dcnode-id="5861"><source data-dcnode-id="5863" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-63479-6/MediaObjects/41598_2020_63479_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="5862" height="755" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-63479-6/MediaObjects/41598_2020_63479_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5856" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">EEG coherence following tDCS during REM sleep. Inter-hemispheric EEG coherence between frontal (top), temporal (middle), and parietal (bottom) electrodes surrounding the tDCS site, expressed as a difference between sham-stimulation and tDCS conditions (Δ-coherence). Jittered circles represent individual participants. Red lines depict the mean of Δ-coherence, pink bars represent 1 standard deviation (SD), and blue bars represent 95% confidence intervals for the mean. Positive values indicate higher coherence in the sham-stimulation condition, whereas negative values indicate higher coherence in the tDCS condition. Δ-coherence is plotted separately in four stimulation-free time intervals preceding controlled awakenings from REM sleep. In the parietal region, coherence was reduced by tDCS compared to sham stimulation in −60- to 46 sec (Z = 2.5, p = 0.013, r = 0.79), −45 to −31 sec (t(9) = 3.17, p = 0.011, d = 0.97), −30 to −16 sec (t(9) = 2.27, p = 0.05, d = 0.88) and −15 to −1 sec (t(9) = 2.57, p = 0.03, d = 0.74) time intervals. * p &lt; 0.05.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5845"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="5846" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/3" rel="nofollow"><span data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5847" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5848" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5849" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5852" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5851" fill-rule="evenodd"></path><span data-dcnode-id="5850" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5837"><span data-dcnode-id="5842" instrument_node="">Given that EEG coherence can be affected by spectral power differences between conditions</span><sup data-dcnode-id="5839"><a aria-label="Reference 65" data-dcnode-id="5840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d200587268e1263" title="Fein, G., Raz, J., Brown, F. F. &amp; Merrin, E. L. Common reference coherence data are confounded by power and phase effects. Electroencephalogr. Clin. Neurophysiol. 69, 581–584 (1988)."><span data-dcnode-id="5841" instrument_node="">65</span></a></sup><span data-dcnode-id="5838" instrument_node="">, we carried out a control analysis to compare beta power in the electrodes adjacent to the stimulation site across a 1 min stimulation-free pre-awakening period. There was a significant decrease of beta power at the left parietal site (P3) in the tDCS compared to the sham-stimulation condition (paired samples t test: t(9) = 2.29, p = 0.048, d = 0.37, Bf in favor of the null = 0.64), whereas tDCS did not modulate beta power in the right parietal site (P4) (t(9) = 0.73, p = 0.48, d = 0.088, Bf in favor of the null = 2.93). The observed trend was investigated further across four 15 sec sub-intervals. No tDCS effects were observed regarding beta power in P3 electrode during time intervals immediately following motor cortex stimulation, i.e. −60 to −46 sec (paired samples t test: t(9) = 1.159, p = 0.276, d = 0.25, Bf in favor of the null = 1.89) and −45 to −31 sec (t(9) = 1.172, p  =  0.271, d = 0.3, Bf in favor of the null=1.87). Contrary to this, beta power decreased during time intervals preceding awakenings: −30 to −16 sec (paired samples t test: t(9) = 2.433, p  =  0.038, d = 0.433, Bf in favor of the null = 0.46) and −15 to −1 sec (t(9) = 2.829, p  =  0.02, d  = 0.379, Bf in favor of the null = 0.28). Given that EEG beta coherence was modulated by tDCS across all four time intervals, we conclude that its decrease was not due to the temporally constricted changes in beta spectral power.</span></p><p data-dcnode-id="5829"><span data-dcnode-id="5836" instrument_node="">Exploratory analysis of inter-hemispheric EEG coherence across a wider range of frequencies (2–45 Hz) indicated that the tDCS-driven decrease of coherence was maximal in the high beta frequency range (21–31 Hz) (see Supplementary Material and Fig.&nbsp;</span><a data-dcnode-id="5834" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5835" instrument_node="">S1</span></a><span data-dcnode-id="5833" instrument_node="">). In addition, a small effect of decreasing coherence was observed in the low gamma frequency range (37–43 Hz) immediately following tDCS, i.e. −60 to −31 sec before awakenings (see Supplementary Material and Fig.&nbsp;</span><a data-dcnode-id="5831" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5832" instrument_node="">S2</span></a><span data-dcnode-id="5830" instrument_node="">). There was no significant tDCS effect in the delta, theta, alpha and low beta frequency ranges (2–18 Hz).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5827" id="Sec6"><span data-dcnode-id="5828" instrument_node="">tDCS modulation of EMG activity</span></h3><p data-dcnode-id="5798"><span data-dcnode-id="5826" instrument_node="">We observed a significant association in the proportion of phasic EMG activity in the flexors between the left and right arms during the 1-min period of REM sleep from the offset of tDCS to the controlled awakening (Pearson correlation: forearm flexors: r = −0.769, p</span><sub data-dcnode-id="5824"><span data-dcnode-id="5825" instrument_node="">Bx4</span></sub><span data-dcnode-id="5823" instrument_node=""> = 0.037; deltoids: r = −738, p</span><sub data-dcnode-id="5821"><span data-dcnode-id="5822" instrument_node="">Bx4</span></sub><span data-dcnode-id="5820" instrument_node=""> = 0.06). The negative correlation between the arms likely reflects the asymmetrical modality of stimulation with the cathode placed over the right sensorimotor cortex and the anode over the left sensorimotor cortex. Contrary to this, there was no association in the proportion of phasic EMG between forearms following sham stimulation (Pearson correlation: forearm flexors: r = 0.095, p</span><sub data-dcnode-id="5818"><span data-dcnode-id="5819" instrument_node="">Bx4</span></sub><span data-dcnode-id="5817" instrument_node=""> = 1; deltoids: r = 0.308, p</span><sub data-dcnode-id="5815"><span data-dcnode-id="5816" instrument_node="">Bx4</span></sub><span data-dcnode-id="5814" instrument_node=""> = 1), indicating that muscle activity varied independently (Fig.&nbsp;</span><a data-dcnode-id="5812" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5813" instrument_node="">4A</span></a><span data-dcnode-id="5811" instrument_node="">). Regarding absolute EMG values, there was no difference between phasic activity in the left as compared to the right arm in either the sham-stimulation condition (paired samples t test: forearm flexors: t(9) = 0.12, p</span><sub data-dcnode-id="5809"><span data-dcnode-id="5810" instrument_node="">Bx4</span></sub><span data-dcnode-id="5808" instrument_node=""> = 1, d = 0.08; deltoids: t(9) = 1.52, p</span><sub data-dcnode-id="5806"><span data-dcnode-id="5807" instrument_node="">Bx4</span></sub><span data-dcnode-id="5805" instrument_node=""> = 0.66, d = 0.57) of following tDCS (forearm flexors: t(9) = 1.88, p</span><sub data-dcnode-id="5803"><span data-dcnode-id="5804" instrument_node="">Bx4</span></sub><span data-dcnode-id="5802" instrument_node=""> = 0.37, d = 1.13; deltoids: t(9) = 1.96, p</span><sub data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">Bx4</span></sub><span data-dcnode-id="5799" instrument_node=""> = 0.33, d = 1.08).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5759" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="5760"><figcaption data-dcnode-id="5795"><b class="c-article-section__figure-caption" data-dcnode-id="5796" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="5797" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5771"><div class="c-article-section__figure-item" data-dcnode-id="5790"><a class="c-article-section__figure-link" data-dcnode-id="5791" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/4" rel="nofollow"><picture data-dcnode-id="5792"><source data-dcnode-id="5794" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-63479-6/MediaObjects/41598_2020_63479_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="5793" height="1075" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-63479-6/MediaObjects/41598_2020_63479_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5772" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="5773"><span data-dcnode-id="5789" instrument_node="">Bihemispheric tDCS during REM sleep modulates phasic activity of the forearm muscles. (</span><b data-dcnode-id="5787"><span data-dcnode-id="5788" instrument_node="">A</span></b><span data-dcnode-id="5786" instrument_node="">) Correlation of EMG shift towards phasic activity between the left and right forearm flexor muscles in the sham-stimulation and tDCS conditions. </span><b data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">(B,C)</span></b><span data-dcnode-id="5783" instrument_node=""> Correlation between EMG shift towards phasic activity and EEG parietal coherence in the beta frequency band, plotted separately for the left and right forearm recordings, in the sham-stimulation and tDCS conditions. Ranked data are plotted in </span><b data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">(B,C)</span></b><span data-dcnode-id="5780" instrument_node=""> as Spearman’s rank order correlations were carried between EMG and EEG measures. In all plots, the least-squares lines are plotted to visualize associations between variables. *p</span><sub data-dcnode-id="5778"><span data-dcnode-id="5779" instrument_node="">B</span></sub><span data-dcnode-id="5777" instrument_node=""> &lt; 0.05, ****p</span><sub data-dcnode-id="5775"><span data-dcnode-id="5776" instrument_node="">B</span></sub><span data-dcnode-id="5774" instrument_node=""> &lt; 0.00005.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5761"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="5762" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/4" rel="nofollow"><span data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5763" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5764" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5765" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5768" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5767" fill-rule="evenodd"></path><span data-dcnode-id="5766" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5739"><span data-dcnode-id="5758" instrument_node="">Next, we investigated whether peripheral EMG activity is associated with EEG parietal coherence in the beta frequency band, which decreased in response to tDCS during REM sleep (Fig.&nbsp;</span><a data-dcnode-id="5756" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5757" instrument_node="">4B,C</span></a><span data-dcnode-id="5755" instrument_node="">). In the tDCS condition, EEG coherence was significantly associated with the proportion of phasic activity in the left flexor muscles (Spearman rank order correlation: rho = −0.976, p</span><sub data-dcnode-id="5753"><span data-dcnode-id="5754" instrument_node="">Bx8</span></sub><span data-dcnode-id="5752" instrument_node=""> = 0.00001) and the right flexor muscles (rho=0.806, p</span><sub data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">Bx8</span></sub><span data-dcnode-id="5749" instrument_node=""> = 0.039). Interestingly, higher parietal coherence was associated with a larger proportion of phasic activity in the right forearm muscles and a lower proportion of phasic activity in the left forearm muscles, once again likely reflecting the differential effects of anodal vs. cathodal stimulation. No association was observed between parietal EEG coherence and the proportion of phasic activity in flexor muscles in the sham stimulation condition (lowest p</span><sub data-dcnode-id="5747"><span data-dcnode-id="5748" instrument_node="">Bx8</span></sub><span data-dcnode-id="5746" instrument_node=""> = 1). Likewise, there was no association between parietal EEG coherence and deltoid EMG during either sham-stimulation (lowest p</span><sub data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">Bx8</span></sub><span data-dcnode-id="5743" instrument_node=""> = 1) or tDCS conditions (lowest p</span><sub data-dcnode-id="5741"><span data-dcnode-id="5742" instrument_node="">Bx8</span></sub><span data-dcnode-id="5740" instrument_node=""> = 0.72), indicating a site-specific interaction between EEG and EMG measures.</span></p></div></div></section><section data-dcnode-id="5525" data-title="Discussion"><div class="c-article-section" data-dcnode-id="5526" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5734" id="Sec7"><span data-dcnode-id="5735" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="5527" id="Sec7-content"><p data-dcnode-id="5732"><span data-dcnode-id="5733" instrument_node="">The foremost aim of our study was to investigate the role of the sensorimotor cortex in generating bodily sensations in REM sleep dreams by modulating the excitability of the sensorimotor cortex with tDCS. We found that compared to sham stimulation, bihemispheric tDCS over the sensorimotor cortex reduced specifically the frequency of repetitive actions of the dream self in preceding REM sleep dreams, as measured through responses to the BED Questionnaire. This finding supports the claim that the sensorimotor cortex is causally involved in the generation of dream movement. Even though we did not observe hypothesized laterality differences in dream movement, i.e. inhibition on the right side of body and facilitation on the left side of body, tDCS interfered with inter-hemispheric EEG coherence and peripheral EMG activity, pointing to a change in both the central and peripheral motor systems in response to bihemispheric tDCS during REM sleep.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5730" id="Sec8"><span data-dcnode-id="5731" instrument_node="">Frequency of bodily sensations and movement in dreams</span></h3><p data-dcnode-id="5715"><span data-dcnode-id="5729" instrument_node="">To systematically assess bodily sensations in dreams, we developed a questionnaire designed to capture various dimensions of bodily experiences in dreams (see Table&nbsp;</span><a data-dcnode-id="5727" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="5728" instrument_node="">2</span></a><span data-dcnode-id="5726" instrument_node=""> for the exemplary questions). Interestingly, independently of tDCS, our data suggest that while dream movements were very common, other bodily sensations such as somatosensory sensations, vestibular sensations or body scheme alterations were rather rare. This overall pattern of frequent dream movement coupled with rare reports of other bodily sensations has been found in previous studies</span><sup data-dcnode-id="5717"><a aria-label="Reference 1" data-dcnode-id="5724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d200587268e1361" title="Hobson, J. A. The dreaming brain. (Basic Books, 1988)."><span data-dcnode-id="5725" instrument_node="">1</span></a><span data-dcnode-id="5723" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="5721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d200587268e1364" title="Schwartz, S. A historical loop of one hundred years: Similarities between 19th century and contemporary dream research. Dreaming 10, 55–66 (2000)."><span data-dcnode-id="5722" instrument_node="">47</span></a><span data-dcnode-id="5720" instrument_node="">,</span><a aria-label="Reference 55" data-dcnode-id="5718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d200587268e1367" title="Windt, J. M. Predictive brains, dreaming selves, sleeping bodies: how the analysis of dream movement can inform a theory of self- and world-simulation in dreams. Synthese 195, 2577–2625 (2018)."><span data-dcnode-id="5719" instrument_node="">55</span></a></sup><span data-dcnode-id="5716" instrument_node="">. Our study extends the previous work largely based on free dream reports by showing that when different types of bodily experiences are specifically investigated through the use of a questionnaire, movements and tactile sensations remain the predominant dimensions of bodily experience in dreams. Thus, content analysis- and questionnaire-based studies generally provide converging evidence for the important role of sensorimotor phenomena in dreams.</span></p><p data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">However, our data also suggest that where more specific questions about dream phenomenology are concerned, results from content analysis of free dream reports and questionnaire data may diverge. In our study, the results from content analysis of movements in free dream reports were broadly consistent with those from the questionnaire. However, the modulatory effect of tDCS on dream content involving a reduction of repetitive movements was only found in the questionnaire data but not in the dream reports. Speculating that specific aspects of dream phenomenology, including specific bodily experiences, may remain unreported unless explicitly probed, we expected that responses to the questionnaire would provide a more accurate representation of bodily experience&nbsp;in dreams than the one we could infer from dream content analysis.</span></p><p data-dcnode-id="5696"><span data-dcnode-id="5712" instrument_node="">Indeed, similar differences between questionnaire results and dream report analyses have also been found for emotions. The frequency of emotions increases 10-fold if participants are asked to report emotions on a line-by-line basis, as compared to free dream reports</span><sup data-dcnode-id="5709"><a aria-label="Reference 50" data-dcnode-id="5710" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d200587268e1377" title="Merritt, J. M., Stickgold, R., Pace-Schott, E., Williams, J. &amp; Hobson, J. A. Emotion profiles in the dreams of men and women. Conscious. Cogn. 3, 46–60 (1994)."><span data-dcnode-id="5711" instrument_node="">50</span></a></sup><span data-dcnode-id="5708" instrument_node="">. When participants are asked to rate the kinds of emotions experienced in their dreams, they specifically report more positive emotions than are found&nbsp;when their dream reports are analyzed by independent judges</span><sup data-dcnode-id="5702"><a aria-label="Reference 51" data-dcnode-id="5706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d200587268e1381" title="Sikka, P., Feilhauer, D., Valli, K. J. &amp; Revonsuo, A. How you measure is what you get: Differences in self- and external ratings of emotional experiences in home dreams. Am. J. Psychol. 130, 367–384 (2017)."><span data-dcnode-id="5707" instrument_node="">51</span></a><span data-dcnode-id="5705" instrument_node="">,</span><a aria-label="Reference 66" data-dcnode-id="5703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d200587268e1384" title="Sikka, P., Valli, K., Virta, T. &amp; Revonsuo, A. I know how you felt last night, or do I? Self- and external ratings of emotions in REM sleep dreams. Conscious. Cogn. 25, 51–66 (2014)."><span data-dcnode-id="5704" instrument_node="">66</span></a></sup><span data-dcnode-id="5701" instrument_node="">. This discrepancy raises important methodological issues that to date have not been fully resolved, and both methods likely have weaknesses and suffer from different kinds of bias</span><sup data-dcnode-id="5698"><a aria-label="Reference 51" data-dcnode-id="5699" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d200587268e1388" title="Sikka, P., Feilhauer, D., Valli, K. J. &amp; Revonsuo, A. How you measure is what you get: Differences in self- and external ratings of emotional experiences in home dreams. Am. J. Psychol. 130, 367–384 (2017)."><span data-dcnode-id="5700" instrument_node="">51</span></a></sup><span data-dcnode-id="5697" instrument_node="">. One reason for the discrepancy, however, could be that free dream reports lack the focus to allow independent judges to pick up on specific aspects of dream phenomenology, such as emotions or movements. By contrast, when participants’ focus is directed to these aspects, such as through the use of questionnaires, this leads to more precise reporting. In our data, similar proportions of different types of movements between external ratings and questionnaire responses, together with the fact that movements were reported more frequently in the questionnaire data, make us lean towards this interpretation. There are also likely differences in what is reported: in free dream reports, individual movements need to be described in some detail for them to be rated by external judges. By contrast, in the questionnaire, participants rate the occurrence and frequency of specific movement types over the entire dream. Again, this may lead to a more comprehensive picture, but also bears the danger of overgeneralizing.</span></p><p data-dcnode-id="5690"><span data-dcnode-id="5695" instrument_node="">In sum, while claims about the accuracy of subjective dream data, including questionnaires, are notoriously hard to assess, the assumption that detailed questionnaires are a more sensitive measure of specific aspects of dream phenomenology than content analysis of free reports is consistent with our findings. Specifically, while the overall pattern of bodily experience seemed similar in free reports and in the questionnaire responses, the latter indicated more frequent bodily experiences, allowing for a more detailed analysis. The predominance of dream movement in our data also seems to be in line with a recent suggestion that kinesthesia is central to the generation of dream experience, at least during sleep onset</span><sup data-dcnode-id="5692"><a aria-label="Reference 67" data-dcnode-id="5693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d200587268e1395" title="Nielsen, T. A. Microdream neurophenomenology. Neurosci. Conscious. 3, nix001 (2017)."><span data-dcnode-id="5694" instrument_node="">67</span></a></sup><span data-dcnode-id="5691" instrument_node="">. At the same time, in our study, 36.9% of dream reports following tDCS contained no movements. It therefore seems that self-movements are not strictly necessary to sustain REM sleep dreaming. Moreover, the decrease of dream movement did not reduce the length of dream reports in our sample. Whether these dreams still involved e.g. observed movement is an open question.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5688" id="Sec9"><span data-dcnode-id="5689" instrument_node="">Electrophysiological effects of bihemispheric tDCS</span></h3><p data-dcnode-id="5678"><span data-dcnode-id="5687" instrument_node="">Bihemispheric tDCS over the sensorimotor cortex, as compared to sham stimulation, specifically altered repetitive actions in dreams. Repetitive actions are typically dependent on implicit memory of learnt motor sequences (e.g., walking), the automatic processing of which does not require explicit awareness and monitoring of movements. Such learnt, automatic movements, as compared to more controlled and deliberate movements, are also associated with a smaller increase of activity in brain areas related to motor processing</span><sup data-dcnode-id="5684"><a aria-label="Reference 68" data-dcnode-id="5685" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d200587268e1407" title="Wu, T. &amp; Hallett, M. A functional MRI study of automatic movements in patients with Parkinson’s disease. Brain 128, 2250–2259 (2005)."><span data-dcnode-id="5686" instrument_node="">68</span></a></sup><span data-dcnode-id="5683" instrument_node="">. Thus, a relatively modest tDCS interference with cortical processing arguably might have down-regulated motor cortex activity involved in the processing of automatic movements, reducing it to the baseline resting level and simultaneously inhibiting the occurrence of repetitive actions in dreams. Contrary to this, the relatively stronger cortical activation underlying single controlled actions might not have been reduced sufficiently by tDCS interference to significantly alter dream content. This would explain why our results showed a specific decrease in repetitive actions, while the frequency of single actions in dreams remained relatively high during tDCS and did not significantly differ from sham stimulation. Alternatively, bihemispheric stimulation might have interfered with the temporal coordination of dream movement, prohibiting long sequences of repetitive actions, but sparing temporally restricted single actions. Indeed, dream imagery is notoriously unstable and prone to change in discontinuous jumps</span><sup data-dcnode-id="5680"><a aria-label="Reference 69" data-dcnode-id="5681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d200587268e1411" title="Revonsuo, A. &amp; Salmivalli, C. A content analysis of bizarre elements in dreams. Dreaming 5, 169–187 (1995)."><span data-dcnode-id="5682" instrument_node="">69</span></a></sup><span data-dcnode-id="5679" instrument_node="">. Such possibilities should be more directly assessed in future studies, e.g. using motor imagery tasks during wakefulness that would allow for a more stringent control of movement complexity.</span></p><p data-dcnode-id="5645"><span data-dcnode-id="5677" instrument_node="">We found that bihemispheric tDCS interfered with neural processing in the beta frequency band, classically linked to motor processing</span><sup data-dcnode-id="5647"><a data-dcnode-id="5675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d200587268e1418" title="Gerloff, C. et al. Functional coupling and regional activation of human cortical motor areas during simple, internally paced and externally paced finger movements. Brain 121, 1513–1531 (1998)."><span data-dcnode-id="5676" instrument_node="">56</span></a><span data-dcnode-id="5674" instrument_node="">,</span><a data-dcnode-id="5672" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d200587268e1418_1" title="Jenkinson, N. &amp; Brown, P. New insights into the relationship between dopamine, beta oscillations and motor function. Trends Neurosci. 34, 611–618 (2011)."><span data-dcnode-id="5673" instrument_node="">57</span></a><span data-dcnode-id="5671" instrument_node="">,</span><a data-dcnode-id="5669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d200587268e1418_2" title="Zaepffel, M., Trachel, R., Kilavik, B. E. &amp; Brochier, T. Modulations of EEG beta power during planning and execution of grasping movements. Plos One 8, e60060 (2013)."><span data-dcnode-id="5670" instrument_node="">58</span></a><span data-dcnode-id="5668" instrument_node="">,</span><a data-dcnode-id="5666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d200587268e1418_3" title="Nam, C. S., Jeon, Y., Kim, Y. J., Lee, I. &amp; Park, K. Movement imagery-related lateralization of event-related (de)synchronization (ERD/ERS): Motor-imagery duration effects. Clin. Neurophysiol. 122, 567–577 (2011)."><span data-dcnode-id="5667" instrument_node="">59</span></a><span data-dcnode-id="5665" instrument_node="">,</span><a data-dcnode-id="5663" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d200587268e1418_4" title="Neuper, C., Scherer, R., Reiner, M. &amp; Pfurtscheller, G. Imagery of motor actions: Differential effects of kinesthetic and visual-motor mode of imagery in single-trial EEG. Cogn. Brain Res. 25, 668–677 (2005)."><span data-dcnode-id="5664" instrument_node="">60</span></a><span data-dcnode-id="5662" instrument_node="">,</span><a data-dcnode-id="5660" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d200587268e1418_5" title="Leocani, L., Toro, C., Manganotti, P., Zhuang, P. &amp; Hallett, M. Event-related coherence and event-related desynchronization/synchronization in the 10 Hz and 20 Hz EEG during self- paced movements. Electroencephalogr. Clin. Neurophysiol. - Evoked Potentials 104, 199–206 (1997)."><span data-dcnode-id="5661" instrument_node="">61</span></a><span data-dcnode-id="5659" instrument_node="">,</span><a data-dcnode-id="5657" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d200587268e1418_6" title="Mima, T., Matsuoka, T. &amp; Hallett, M. Functional coupling of human right and left cortical motor areas demonstrated with partial coherence analysis. Neurosci. Lett. 287, 93–96 (2000)."><span data-dcnode-id="5658" instrument_node="">62</span></a><span data-dcnode-id="5656" instrument_node="">,</span><a data-dcnode-id="5654" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d200587268e1418_7" title="Fortuna, M. et al. Cortical reorganization after hand immobilization: The beta qEEG spectral coherence evidences. Plos One 8, e79912 (2013)."><span data-dcnode-id="5655" instrument_node="">63</span></a><span data-dcnode-id="5653" instrument_node="">,</span><a aria-label="Reference 64" data-dcnode-id="5651" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d200587268e1421" title="Pellegrino, G. et al. Inter-hemispheric coupling changes associate with motor improvements after robotic stroke rehabilitation. Restor. Neurol. Neurosci 30, 497–510 (2012)."><span data-dcnode-id="5652" instrument_node="">64</span></a><span data-dcnode-id="5650" instrument_node="">,</span><a aria-label="Reference 70" data-dcnode-id="5648" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d200587268e1424" title="Khanna, P. &amp; Carmena, J. M. Neural oscillations: Beta band activity across motor networks. Curr. Opin. Neurobiol. 32, 60–67 (2015)."><span data-dcnode-id="5649" instrument_node="">70</span></a></sup><span data-dcnode-id="5646" instrument_node="">. In our setup, bihemispheric tDCS reduced inter-hemispheric coherence of parietal beta oscillations. Arguably, the differential montage of tDCS electrodes, i.e. the excitatory anode over the right sensorimotor cortex and the inhibitory cathode over the left sensorimotor cortex, disrupted inter-hemispheric coordination of motor commands, reducing the rate of repetitive actions associated with whole body movements in dreams. A differential effect of bihemispheric tDCS was also observed in the phasic EMG activity of the arm muscles. While phasic EMG varied independently between the arms during sham stimulation, a strong negative correlation was observed following tDCS, i.e. it suppressed phasic muscle activity in one arm while increasing it in the other arm.</span></p><p data-dcnode-id="5636"><span data-dcnode-id="5644" instrument_node="">We expected that such destabilizing and hemisphere-specific effects of tDCS would also cause unilateral distortions, i.e. inhibition vs facilitation, of bodily sensations in dreams. However, the observed reduction of dream movement was independent of the laterality of stimulation. That is, the decrease of inter-hemispheric EEG coherence and the emergence of phasic EMG anticorrelation between arms did not translate into unilateral effects on the dream body. We can only speculate on the lack of laterality effects, and further studies will be important to understand the&nbsp;underlying mechanisms. First, it is possible that the bihemispheric tDCS protocol we adopted inhibited cortical and cerebellar motor networks bilaterally, an effect previously reported in the resting state neuroimaging studies</span><sup data-dcnode-id="5638"><a aria-label="Reference 71" data-dcnode-id="5642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d200587268e1431" title="Lindenberg, R., Nachtigall, L., Meinzer, M., Sieg, M. M. &amp; Floel, A. Differential effects of dual and unihemispheric motor cortex stimulation in older adults. J. Neurosci. 33, 9176–9183 (2013)."><span data-dcnode-id="5643" instrument_node="">71</span></a><span data-dcnode-id="5641" instrument_node="">,</span><a aria-label="Reference 72" data-dcnode-id="5639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d200587268e1434" title="Lindenberg, R., Sieg, M. M., Meinzer, M., Nachtigall, L. &amp; Flöel, A. Neural correlates of unihemispheric and bihemispheric motor cortex stimulation in healthy young adults. Neuroimage 140, 141–149 (2016)."><span data-dcnode-id="5640" instrument_node="">72</span></a></sup><span data-dcnode-id="5637" instrument_node="">. Second, it is conceivable that bihemispheric tDCS produced hemisphere-specific facilitation vs. inhibition of motor processing, and such asymmetry resulted in the reduction of repetitive dream movements that depend on the coordinated whole-body performance. Our EEG and EMG findings, i.e. reduction of EEG inter-hemispheric coherence and negative correlation of phasic EMG between arms, support the latter interpretation.</span></p><p data-dcnode-id="5634"><span data-dcnode-id="5635" instrument_node="">To detect effects on other modalities (e.g. body image distortion, vestibular sensations), a larger group of participants might be necessary. Moreover, the absence of modulatory effects of tDCS on somatosensory experiences, which were reported quite frequently by our participants, could be related to the placement of the tDCS electrodes that was specifically determined by the location of the hand area in the primary motor cortex.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5632" id="Sec10"><span data-dcnode-id="5633" instrument_node="">Implications for consciousness studies</span></h3><p data-dcnode-id="5626"><span data-dcnode-id="5631" instrument_node="">Our study suggests a methodology for identifying, via causal manipulation, the neural correlates of specific types of dream experience. Thus, beyond dream and sleep research, our findings also have more general implications for consciousness research. First, they add another piece of evidence that the neural correlates of specific dream content match the neural correlates of corresponding cognitive and behavioural functions during wakefulness</span><sup data-dcnode-id="5628"><a aria-label="Reference 21" data-dcnode-id="5629" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d200587268e1449" title="Siclari, F. et al. The neural correlates of dreaming. Nat. Neurosci. 20, 872–878 (2017)."><span data-dcnode-id="5630" instrument_node="">21</span></a></sup><span data-dcnode-id="5627" instrument_node="">. Going beyond mere correlation, our results allow us to speculate that the motor cortex might indeed be involved in the generation of movement sensations in dreams.</span></p><p data-dcnode-id="5620"><span data-dcnode-id="5625" instrument_node="">Our results also shed light on the phenomenological profile of self-representation in dreams. In simulation theories, the subjective sense of presence, or the experience of a self in a world, is central to dreaming. While this highlights the importance of self-simulation, the precise pattern of self-experience in dreams, as compared to wakefulness, raises questions</span><sup data-dcnode-id="5622"><a aria-label="Reference 10" data-dcnode-id="5623" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d200587268e1456" title="Windt, J. M. Dreaming: A conceptual framework for philosophy of mind and empirical research. (MIT Press, 2015)."><span data-dcnode-id="5624" instrument_node="">10</span></a></sup><span data-dcnode-id="5621" instrument_node="">. One possibility is that bodily experience in dreams replicates waking experience; another is that dreams are characterized by a comparative overrepresentation of movement and an underrepresentation of other types of bodily experience (e.g. tactile, thermal, or pain sensations). Our finding that tDCS selectively altered dream movement, taken together with the comparatively low frequency of other types of bodily experience in dreams, is consistent with the second possibility. Future studies could aim to further investigate this question by systematically comparing questionnaire data and reports of bodily experience in both dreams and wakefulness.</span></p><p data-dcnode-id="5575"><span data-dcnode-id="5619" instrument_node="">A related question concerns the relation between bodily experiences in dreams and the sleeping physical body. It is commonly thought that dream experience, including bodily experience, is completely independent of outward muscular activity and stimulation of the physical body; this is reflected in the idea that dreaming is isolated from external and bodily stimuli</span><sup data-dcnode-id="5616"><a aria-label="Reference 12" data-dcnode-id="5617" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d200587268e1463" title="Revonsuo, A. Inner presence: Consciousness as a biological phenomenon. Inner presence: Consciousness as a biological phenomenon. (MIT Press, 2006)."><span data-dcnode-id="5618" instrument_node="">12</span></a></sup><span data-dcnode-id="5615" instrument_node=""> and that REM sleep is characterized by the sensory input/motor output blockade</span><sup data-dcnode-id="5612"><a aria-label="Reference 2" data-dcnode-id="5613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d200587268e1467" title="Hobson, J. A., Pace-Schott, E. F. &amp; Stickgold, R. Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behav. Brain Sci. 23, 793–842 (2000)."><span data-dcnode-id="5614" instrument_node="">2</span></a></sup><span data-dcnode-id="5611" instrument_node="">. However, there are empirical and theoretical reasons for thinking that varying degrees of concordance between dream experience and the physical body exist, on both the levels of sensory input and motor output</span><sup data-dcnode-id="5605"><a aria-label="Reference 55" data-dcnode-id="5609" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d200587268e1471" title="Windt, J. M. Predictive brains, dreaming selves, sleeping bodies: how the analysis of dream movement can inform a theory of self- and world-simulation in dreams. Synthese 195, 2577–2625 (2018)."><span data-dcnode-id="5610" instrument_node="">55</span></a><span data-dcnode-id="5608" instrument_node="">,</span><a aria-label="Reference 73" data-dcnode-id="5606" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d200587268e1474" title="Windt, J. M., Nielsen, T. &amp; Thompson, E. Does consciousness disappear in dreamless sleep? Trends Cogn. Sci. 20, 871–882 (2016)."><span data-dcnode-id="5607" instrument_node="">73</span></a></sup><span data-dcnode-id="5604" instrument_node="">. Lesion studies in cats have shown that pontine lesions, which eliminate REM-sleep related muscular atonia, induce organized motor behavior, such as searching and attacking, during REM sleep</span><sup data-dcnode-id="5598"><a aria-label="Reference 74" data-dcnode-id="5602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d200587268e1478" title="Henley, K. &amp; Morrison, A. R. A reevaluation of the effects of lesions of the pontine tegmentum and locus coeruleus on phenomena of paradoxical sleep in the cat. Acta Neurobiol. Exp. (Wars) 34, 215–232 (1974)."><span data-dcnode-id="5603" instrument_node="">74</span></a><span data-dcnode-id="5601" instrument_node="">,</span><a aria-label="Reference 75" data-dcnode-id="5599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d200587268e1481" title="Sastre, J. P. &amp; Jouvet, M. Oneiric behavior in cats. Physiol. Behav. 9, 293–308 (1979)."><span data-dcnode-id="5600" instrument_node="">75</span></a></sup><span data-dcnode-id="5597" instrument_node="">, possibly indicating dream behaviours. Further examples include (illusory) own-body perception, such as when stimulation to the sleeping body is incorporated in dreams</span><sup data-dcnode-id="5591"><a aria-label="Reference 29" data-dcnode-id="5595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d200587268e1485" title="Nielsen, T. A. Changes in the kinesthetic content of dreams following somatosensory stimulatipn of leg muscles during REM sleep. Dreaming 3, 99–113 (1993)."><span data-dcnode-id="5596" instrument_node="">29</span></a><span data-dcnode-id="5594" instrument_node="">,</span><a aria-label="Reference 30" data-dcnode-id="5592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d200587268e1488" title="Sauvageau, A., Nielsen, T. A. &amp; Montplaisir, J. Effects of somatosensory stimulation on dream content in gymnasts and control participants: Evidence of vestibulomotor adaptation in REM sleep. Dreaming 8, 125–134 (1998)."><span data-dcnode-id="5593" instrument_node="">30</span></a></sup><span data-dcnode-id="5590" instrument_node="">, and dream enactment behaviors in humans, in which outward muscular activity corresponds to movement sensations in dreams. REM sleep behavior disorder, in which seemingly goal-directed behaviors during REM sleep (such as attacking one’s sleeping partner, attempting to run, etc.) match subjective dream reports, is an extreme example</span><sup data-dcnode-id="5581"><a data-dcnode-id="5588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d200587268e1493" title="Howell, M. J. &amp; Schenck., C. H. REM sleep behavior disorder. in Disorders of Sleep and Circadian Rhythms In Parkinson’s Disease (eds. Videnovic, A. &amp; Högl, B.) 131–144 (Springer, 2015)."><span data-dcnode-id="5589" instrument_node="">76</span></a><span data-dcnode-id="5587" instrument_node="">,</span><a data-dcnode-id="5585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d200587268e1493_1" title="Schenck, C. H., Bundlie, S. R., Ettinger, M. G. &amp; Mahowald, M. W. Chronic behavioral disorders of human REM sleep: A new category of parasomnia. Sleep 9, 293–308 (1986)."><span data-dcnode-id="5586" instrument_node="">77</span></a><span data-dcnode-id="5584" instrument_node="">,</span><a aria-label="Reference 78" data-dcnode-id="5582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d200587268e1496" title="Valli, K. et al. Can observers link dream content to behaviours in rapid eye movement sleep behaviour disorder? A cross-sectional experimental pilot study. J. Sleep Res 21, 21–29 (2012)."><span data-dcnode-id="5583" instrument_node="">78</span></a></sup><span data-dcnode-id="5580" instrument_node="">. But REM sleep is also accompanied by subtler muscular activity in the form of twitching</span><sup data-dcnode-id="5577"><a aria-label="Reference 79" data-dcnode-id="5578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d200587268e1500" title="Blumberg, M. S. &amp; Plumeau, A. M. A new view of ‘dream enactment’ in REM sleep behavior disorder. Sleep Med. Rev. 30, 34–42 (2016)."><span data-dcnode-id="5579" instrument_node="">79</span></a></sup><span data-dcnode-id="5576" instrument_node="">. Its concordance with dream experience seems plausible but has not been systematically investigated.</span></p><p data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">In our study, bihemispheric tDCS during REM sleep modulated not only dream movement but also outward muscular activity in the arms. Due to the absence of movement reports in several participants, we could not reliably relate individual variance in subjective movement reports to electrophysiological measures. However, our findings are consistent with the possibility that changes in dream movement are related to changes in outward muscular activity during REM sleep. A promising avenue for future research could be to investigate the relevance of bihemispheric tDCS for several movement-related sleep disorders. REM sleep behaviour disorder would be a good place to start because of the match between dream movements and outward physical activity. Other disorders that could potentially benefit from the inhibition of motor activity include sleepwalking and periodic limb movement disorder. Here, however, the association with dream experience is less clear and should be investigated more directly. Furthermore, as these are typically NREM sleep disorders, it is not certain whether neurophysiological effects of tDCS would be comparable to those observed in the present study of REM sleep.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5571" id="Sec11"><span data-dcnode-id="5572" instrument_node="">Limitations and outlook</span></h3><p data-dcnode-id="5528"><span data-dcnode-id="5570" instrument_node="">Despite these promising results, the current study has several limitations. First, the effects of tDCS on mental states have been repetitively challenged by replicability difficulties</span><sup data-dcnode-id="5561"><a data-dcnode-id="5568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d200587268e1516" title="Horvath, J. C., Forte, J. D. &amp; Carter, O. Quantitative review finds no evidence of cognitive effects in healthy populations from single-session transcranial direct current stimulation (tDCS). Brain Stimul 8, 535–550 (2015)."><span data-dcnode-id="5569" instrument_node="">80</span></a><span data-dcnode-id="5567" instrument_node="">,</span><a data-dcnode-id="5565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d200587268e1516_1" title="Horvath, J. C., Forte, J. D. &amp; Carter, O. Evidence that transcranial direct current stimulation (tDCS) generates little-to-no reliable neurophysiologic effect beyond MEP amplitude modulation in healthy human subjects: A systematic review. Neuropsychologia 66, 213–236 (2015)."><span data-dcnode-id="5566" instrument_node="">81</span></a><span data-dcnode-id="5564" instrument_node="">,</span><a aria-label="Reference 82" data-dcnode-id="5562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d200587268e1519" title="Tremblay, S. et al. The uncertain outcome of prefrontal tDCS. Brain Stimul 7, 773–783 (2014)."><span data-dcnode-id="5563" instrument_node="">82</span></a></sup><span data-dcnode-id="5560" instrument_node=""> and should thus be treated with caution. Nevertheless, given that motor cortex tDCS during wakefulness provides the most reliable effects</span><sup data-dcnode-id="5554"><a aria-label="Reference 81" data-dcnode-id="5558" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d200587268e1523" title="Horvath, J. C., Forte, J. D. &amp; Carter, O. Evidence that transcranial direct current stimulation (tDCS) generates little-to-no reliable neurophysiologic effect beyond MEP amplitude modulation in healthy human subjects: A systematic review. Neuropsychologia 66, 213–236 (2015)."><span data-dcnode-id="5559" instrument_node="">81</span></a><span data-dcnode-id="5557" instrument_node="">,</span><a aria-label="Reference 83" data-dcnode-id="5555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d200587268e1526" title="Buch, E. R. et al. Effects of tDCS on motor learning and memory formation: A consensus and critical position paper. Clin. Neurophysiol. 128, 589–603 (2017)."><span data-dcnode-id="5556" instrument_node="">83</span></a></sup><span data-dcnode-id="5553" instrument_node="">, we expect the same to hold during REM sleep. Second, due to the very complicated and time-intensive protocol of the study, we could only recruit a rather small number of participants. Thus, larger samples and replication studies will be needed in future</span><sup data-dcnode-id="5550"><a aria-label="Reference 84" data-dcnode-id="5551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d200587268e1530" title="Minarik, T. et al. The importance of sample size for reproducibility of tDCS effects. Front. Hum. Neurosci 10, 453 (2016)."><span data-dcnode-id="5552" instrument_node="">84</span></a></sup><span data-dcnode-id="5549" instrument_node="">. Furthermore, and again due to the complexity of the setup, we did not include a control stimulation site nor did we switch the side of the bihemispheric stimulation (to left anodal, right cathodal stimulation), which would be especially interesting to disentangle hemisphere-specific effects. Future studies with a larger sample of participants should also explore whether bihemispheric tDCS during REM sleep interferes with a wider range of EEG frequencies involved in motor processing, including alpha and gamma bands as well as broadband responses</span><sup data-dcnode-id="5543"><a aria-label="Reference 85" data-dcnode-id="5547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d200587268e1534" title="Babiloni, C. et al. Alpha, beta and gamma electrocorticographic rhythms in somatosensory, motor, premotor and prefrontal cortical areas differ in movement execution and observation in humans. Clin. Neurophysiol. 127, 641–654 (2016)."><span data-dcnode-id="5548" instrument_node="">85</span></a><span data-dcnode-id="5546" instrument_node="">,</span><a aria-label="Reference 86" data-dcnode-id="5544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d200587268e1537" title="Ball, T. et al. Movement related activity in the high gamma range of the human EEG. Neuroimage 41, 302–310 (2008)."><span data-dcnode-id="5545" instrument_node="">86</span></a></sup><span data-dcnode-id="5542" instrument_node="">. Last but not least, our data suggest that the questionnaire that we developed is more sensitive to the tDCS induced changes than free dream reports; this is in line with findings that questionnaires are generally more sensitive to details of dream phenomenology (such as emotions) than free reports</span><sup data-dcnode-id="5530"><a aria-label="Reference 50" data-dcnode-id="5540" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d200587268e1541" title="Merritt, J. M., Stickgold, R., Pace-Schott, E., Williams, J. &amp; Hobson, J. A. Emotion profiles in the dreams of men and women. Conscious. Cogn. 3, 46–60 (1994)."><span data-dcnode-id="5541" instrument_node="">50</span></a><span data-dcnode-id="5539" instrument_node="">,</span><a aria-label="Reference 51" data-dcnode-id="5537" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d200587268e1544" title="Sikka, P., Feilhauer, D., Valli, K. J. &amp; Revonsuo, A. How you measure is what you get: Differences in self- and external ratings of emotional experiences in home dreams. Am. J. Psychol. 130, 367–384 (2017)."><span data-dcnode-id="5538" instrument_node="">51</span></a><span data-dcnode-id="5536" instrument_node="">,</span><a aria-label="Reference 66" data-dcnode-id="5534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d200587268e1547" title="Sikka, P., Valli, K., Virta, T. &amp; Revonsuo, A. I know how you felt last night, or do I? Self- and external ratings of emotions in REM sleep dreams. Conscious. Cogn. 25, 51–66 (2014)."><span data-dcnode-id="5535" instrument_node="">66</span></a><span data-dcnode-id="5533" instrument_node="">,</span><a aria-label="Reference 87" data-dcnode-id="5531" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d200587268e1550" title="Sikka, P., Revonsuo, A., Noreika, V. &amp; Valli, K. EEG frontal alpha asymmetry and dream affect: Alpha oscillations over the right frontal cortex during rem sleep and presleep wakefulness predict anger in REM sleep dreams. J. Neurosci. 39, 4775–4784 (2019)."><span data-dcnode-id="5532" instrument_node="">87</span></a></sup><span data-dcnode-id="5529" instrument_node="">. While the questionnaire was developed by the authors and has not yet been validated, it is open to future refinement and this would be a valuable next step.</span></p></div></div></section><section data-dcnode-id="5518" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="5519" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5523" id="Sec12"><span data-dcnode-id="5524" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="5520" id="Sec12-content"><p data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">To conclude, this study provided, in a controlled setup, evidence that stimulation over the sensorimotor cortex modulates dream content in healthy participants during REM sleep. This has important implications for various research fields, including consciousness research and sleep and dream research. Future studies will have to pinpoint more specifically which neural mechanisms underlie the inhibition of repetitive movements of the dream self and whether the observed subjective and neurophysiological effects are sufficiently long-lasting to warrant clinical studies in, for example, parasomnia patients.</span></p></div></div></section><section data-dcnode-id="5236" data-title="Methods"><div class="c-article-section" data-dcnode-id="5237" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5516" id="Sec13"><span data-dcnode-id="5517" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="5238" id="Sec13-content"><h3 class="c-article__sub-heading" data-dcnode-id="5514" id="Sec14"><span data-dcnode-id="5515" instrument_node="">Participants</span></h3><p data-dcnode-id="5500"><span data-dcnode-id="5513" instrument_node="">Aiming to recruit 10 right-handed individuals with high dream recall frequency and good sleep quality, potential participants were screened with the Edinburgh Handedness Inventory</span><sup data-dcnode-id="5510"><a aria-label="Reference 88" data-dcnode-id="5511" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d200587268e1575" title="Oldfield, R. C. The assessment and analysis of handedness: The Edinburgh inventory. Neuropsychologia 9, 97–113 (1971)."><span data-dcnode-id="5512" instrument_node="">88</span></a></sup><span data-dcnode-id="5509" instrument_node=""> and the Dream Recall Frequency (DRF) scale</span><sup data-dcnode-id="5506"><a aria-label="Reference 89" data-dcnode-id="5507" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d200587268e1579" title="Schredl, M. Dream recall frequency and openness to experience: A negative finding. Pers. Individ. Dif 33, 1285–1289 (2002)."><span data-dcnode-id="5508" instrument_node="">89</span></a></sup><span data-dcnode-id="5505" instrument_node="">, which assesses the frequency with which people are able to remember dreams at home, and the Pittsburgh Sleep Quality Index (PSQI)</span><sup data-dcnode-id="5502"><a aria-label="Reference 90" data-dcnode-id="5503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d200587268e1583" title="Buysse, D. J., Reynolds, C. F., Monk, T. H., Berman, S. R. &amp; Kupfer, D. J. The Pittsburgh sleep quality index: A new instrument for psychiatric practice and research. Psychiatry Res. 28, 193–213 (1989)."><span data-dcnode-id="5504" instrument_node="">90</span></a></sup><span data-dcnode-id="5501" instrument_node="">. The DRF scale consists of a single question “How often do you remember your dreams?” and 7 possible answers: 0 = never, 1 = less than once a month, 2 = about once a month, 3 = twice or three times a month, 4 = about once a week, 5 = several times a week, and 6 = almost every morning. Poor dream recallers were excluded from the study. This focus on high recallers (defined in our study as DRF responses 4–6) is common in laboratory studies of dreaming and is important to ensure feasibility, as it maximizes the number of reports. In addition, aiming to assess personal interest and motivation, we asked potential participants “Are you generally interested in dreams?” with 5 possible answers: 1 = not at all, 2 = mainly uninterested, 3 = in-between, 4 = mainly interested, and 5 = very interested.</span></p><p data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">Furthermore, we aimed to recruit individuals whose global PSQI score did not exceed 4 (with 0 indicating no sleep difficulty and 21 indicating severe difficulties in sleep) and whose sleep latency score indicated they typically needed less than 30 minutes to fall asleep. Again, this was important to ensure feasibility and to maximize awakenings with dream recall.</span></p><p data-dcnode-id="5492"><span data-dcnode-id="5497" instrument_node="">Given that the application of tDCS may occasionally induce itching, tickling, heat sensations under the electrodes, or even a temporary headache</span><sup data-dcnode-id="5494"><a aria-label="Reference 91" data-dcnode-id="5495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d200587268e1593" title="Priori, A. Brain polarization in humans: A reappraisal of an old tool for prolonged non-invasive modulation of brain excitability. Clin. Neurophysiol. 114, 589–595 (2003)."><span data-dcnode-id="5496" instrument_node="">91</span></a></sup><span data-dcnode-id="5493" instrument_node="">, we introduced potential participants to the tDCS technique before they made their final commitment to take part in the study. After screening for MRI and tDCS contraindications, they were given the opportunity to familiarize themselves with the tDCS procedure before spending their first night in the laboratory. Participants were stimulated for 10 min with tDCS of 1 mA current over the C3 and C4 electrode sites according to the 10–20 EEG system (approximately over the sensorimotor cortex), which helped them decide whether they wanted to participate in the actual experiment. This also helped minimize the risk that tDCS during REM sleep would lead to awakening.</span></p><p data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">After screening 16 potential participants, we were able to recruit 10 healthy right-handed university students (4 men and 6 women, mean age 26.8, range 4.4 years). The mean handedness index was 0.9 (SD = 0.11; range 0.73 to 1). The mean DRF score was 5.4 (SD  =  0.79, Min = 4, Max = 6), indicating high spontaneous dream recall. While this might introduce bias towards high recallers’ dreams, it is arguably the most feasible recruitment strategy for a costly and time-consuming sleep laboratory study. Regarding personal interest in dreams, two participants responded “in-between”, seven participants were “mainly interested”, and one participant was “very interested”, indicating high motivation to take part in the study. All participants gave their written informed consent according to the Declaration of Helsinki. All experimental protocols of the study were approved by the Ethics Committee of the Hospital District of Southwest Finland, and the study was carried out in accordance with the relevant guidelines and regulations. Participants were financially compensated with 40 euros per night and 10 euros per hour for daytime testing.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5488" id="Sec15"><span data-dcnode-id="5489" instrument_node="">MRI-TMS mapping of the primary sensorimotor hand area</span></h3><p data-dcnode-id="5478"><span data-dcnode-id="5487" instrument_node="">ECoG measurement of the electric field induced by tDCS in human patients with refractory epilepsy as well as computational modelling of tDCS effects in healthy participants suggest that the spatial focality of tDCS decreases if stimulation electrodes are misplaced by &gt;1 cm</span><sup data-dcnode-id="5484"><a aria-label="Reference 92" data-dcnode-id="5485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d200587268e1608" title="Opitz, A. et al. On the importance of precise electrode placement for targeted transcranial electric stimulation. Neuroimage 181, 560–567 (2018)."><span data-dcnode-id="5486" instrument_node="">92</span></a></sup><span data-dcnode-id="5483" instrument_node="">. Thus, aiming to constrain between-participant variance of the stimulation focus below 1 cm, the location of the hand area in the primary sensorimotor cortex in both hemispheres was determined individually for each participant with the help of magnetic resonance imaging (MRI) and transcranial magnetic stimulation (TMS). Anatomical brain images were acquired with a 1.5 T MRI scanner Philips Intera at the Turku PET Centre. 3D models of the brain were created using 3D T1-weighted MR sequence. A hospital radiologist confirmed that the brain MRI was normal in all cases. Afterwards, the approximate location of primary sensorimotor hand representations was visually determined from anatomical brain images based on macro-anatomical landmarks</span><sup data-dcnode-id="5480"><a aria-label="Reference 93" data-dcnode-id="5481" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d200587268e1612" title="Yousry, T. A. et al. Localization of the motor hand area to a knob on the precentral gyrus. A new landmark. Brain 120, 141–157 (1997)."><span data-dcnode-id="5482" instrument_node="">93</span></a></sup><span data-dcnode-id="5479" instrument_node="">.</span></p><p data-dcnode-id="5465"><span data-dcnode-id="5477" instrument_node="">Based on this analysis, the location of the primary sensorimotor hand area was determined for each participant in a separate TMS session, which was carried out on the evening of the first experimental night at the Department of Psychology at the University of Turku. TMS pulses were delivered using eXimia™ TMS stimulator with NBS navigation system (Nexstim Ltd., Helsinki, Finland), which allowed us to navigate within individual anatomical MRI with an approximately 6-mm spatial resolution containing all sources of errors</span><sup data-dcnode-id="5474"><a aria-label="Reference 94" data-dcnode-id="5475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d200587268e1619" title="Ruohonen, J. &amp; Karhu, J. Navigated transcranial magnetic stimulation. Neurophysiol. Clin. Neurophysiol. 40, 7–17 (2010)."><span data-dcnode-id="5476" instrument_node="">94</span></a></sup><span data-dcnode-id="5473" instrument_node="">. Participants sat on a reclining chair with their eyes closed and both arms supported by a pillow to ensure that their arm muscles were relaxed. TMS was carried out in a single pulse mode using a figure-of-eight-shaped coil that was held tangentially against the participant’s head. The current direction of the second phase of the biphasic pulse was oriented perpendicularly to the post-central gyrus in the posterior to the anterior direction at the bank between pre-central and post-central sulci</span><sup data-dcnode-id="5470"><a aria-label="Reference 95" data-dcnode-id="5471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d200587268e1623" title="Richter, L., Neumann, G., Oung, S., Schweikard, A. &amp; Trillenberg, P. Optimal Coil Orientation for Transcranial Magnetic Stimulation. Plos One 8, e60358 (2013)."><span data-dcnode-id="5472" instrument_node="">95</span></a></sup><span data-dcnode-id="5469" instrument_node=""> (Fig.&nbsp;</span><a data-dcnode-id="5467" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5468" instrument_node="">1C</span></a><span data-dcnode-id="5466" instrument_node="">).</span></p><p data-dcnode-id="5459"><span data-dcnode-id="5464" instrument_node="">First, a rough location of the hand area was estimated by asking participants to report whether they experienced any hand movement following a TMS pulse over the motor cortex in the contralateral hemisphere. Once a reliable hotspot was found, an individual motor threshold, i.e. the minimum TMS intensity required to induce the subjective experience of a hand movement, was determined with the maximum likelihood threshold hunting (MLTH) procedure</span><sup data-dcnode-id="5461"><a aria-label="Reference 96" data-dcnode-id="5462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d200587268e1633" title="Awiszus, F. TMS and threshold hunting. In Supplements to Clinical Neurophysiology (eds. Paulus, W. et al.) 56, 12–23 (Elsevier, 2003)."><span data-dcnode-id="5463" instrument_node="">96</span></a></sup><span data-dcnode-id="5460" instrument_node="">. In this process, 20 pulses were delivered to the hand area with different stimulus intensities, starting at 60% of maximal TMS intensity. The mean motor threshold was 56.1% (SD = 12.4, Min = 28, Max = 76.7) of maximal TMS intensity for the left hemisphere, and 59.2% (SD = 16.5, Min = 24.8, Max = 77.12) for the right hemisphere. While motor thresholds did not differ systematically between the hemispheres (paired samples t test: t(9) = 1.02, p = 0.34, Bf in favor of the null = 2.2), there was a strong inter-hemispheric correlation of motor thresholds (Pearson correlation: r = 0.82, p = 0.004).</span></p><p data-dcnode-id="5454"><span data-dcnode-id="5458" instrument_node="">Following estimation of individual motor thresholds, the most ventral and caudal points of the hand representation in the primary motor cortex were estimated by delivering TMS pulses with the intensity of 10% above the level of the individual motor threshold. This procedure was consecutively performed for both hemispheres, yielding bilateral hand representation maps that were later used to place tDCS electrodes (Fig.&nbsp;</span><a data-dcnode-id="5456" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5457" instrument_node="">1C</span></a><span data-dcnode-id="5455" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5452" id="Sec16"><span data-dcnode-id="5453" instrument_node="">tDCS over the primary sensorimotor cortex during REM sleep</span></h3><p data-dcnode-id="5450"><span data-dcnode-id="5451" instrument_node="">tDCS and sham-stimulation sessions were conducted in the Sleep Laboratory of the Centre for Cognitive Neuroscience at the University of Turku over two non-consecutive nights with each participant. Microprocessor-controlled programmable 1-channel Eldith DC-Stimulator PLUS (Electro-Diagnostic &amp; Therapeutic Systems GmbH, Ilmenau, Germany) was used as a stimulation device.</span></p><p data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">tDCS was applied bilaterally to hand areas in order to modulate the excitability level of the primary sensorimotor cortex during REM sleep. Participants were asked to avoid caffeine for 6 hours and alcohol and other CNS-affecting drugs for 24 hours prior to the experiment. To ensure these requirements were met, participants filled out the custom-made Pre-Sleep Questionnaire before each session. For each participant, the two stimulation sessions were separated by at least one week in order to avoid interference effects.</span></p><p data-dcnode-id="5440"><span data-dcnode-id="5447" instrument_node="">Two 35 cm</span><sup data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">2</span></sup><span data-dcnode-id="5444" instrument_node=""> sized sponge-covered rubber electrodes were soaked with water, and Ten20 electrode paste (Weaver and Company) was applied on both sides of the sponge. The electrodes were placed bilaterally along the central sulcus posterior to the primary motor hand areas, which were determined with the help of MRI-guided TMS (Fig.&nbsp;</span><a data-dcnode-id="5442" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5443" instrument_node="">1C</span></a><span data-dcnode-id="5441" instrument_node="">). They were supported with a comfortable bandage throughout the night. The impedance of tDCS electrodes was kept under 5 kΩ. tDCS was carried out on one experimental night and sham-stimulation took place on another night. Participants were blind to the experimental conditions, i.e. whether the tDCS session was followed by the sham session (N = 5) or vice versa. An equal number of participants was assigned randomly to each condition.</span></p><p data-dcnode-id="5438"><span data-dcnode-id="5439" instrument_node="">We also considered a double-blind design when planning the study. However, this was not practicable, as experimenters had to monitor EEG throughout stimulation in order to be certain whether REM sleep was continuous until the point of awakening. Given that tDCS induces distinctive EEG artefacts during current ramp up and ramp down periods, the experimental condition would always be revealed to experimenters.</span></p><p data-dcnode-id="5432"><span data-dcnode-id="5437" instrument_node="">During the tDCS night, 1 mA electric current was delivered to participants‘ scalp two or three times per night for 10 min during REM sleep, starting with the second sleep cycle. To minimize the possibility of subjective sensations of stimulation, such as tingling and itching, the current was ramped up and ramped down over 8 sec periods. It has been reported that tDCS-induced neuroplasticity may accumulate over time</span><sup data-dcnode-id="5434"><a aria-label="Reference 97" data-dcnode-id="5435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d200587268e1669" title="Nitsche, M. &amp; Paulus, W. Excitability changes induced in the human motor cortex by weak transcranial direct current stimulation. J. Physiol 527, 633–639 (2000)."><span data-dcnode-id="5436" instrument_node="">97</span></a></sup><span data-dcnode-id="5433" instrument_node="">, and it is conceivable that stimulation in one REM sleep cycle may have an effect on subsequent REM s
