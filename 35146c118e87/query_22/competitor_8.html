leep cycles. In order to keep the stimulation effects consistent throughout the night, we did not mix tDCS and sham-stimulation conditions within a single night. In addition, the electrode over the right sensorimotor area was always the anode, and the electrode over the left sensorimotor area was always the cathode. This procedure ensured that the asymmetric stimulation during one sleep cycle would not interfere with or cancel stimulation effects during another cycle. We chose to place the cathode over the dominant left hemisphere with the aim to disrupt dream movements on the dominant right side of body.</span></p><p data-dcnode-id="5422"><span data-dcnode-id="5431" instrument_node="">During the sham-stimulation night, stimulation was conducted by switching on the DC device, ramping the current up to 1 mA over an 8 sec period, then stimulating only for a few seconds (M = 5.8 sec, SEM = 0.48), and finally ramping the current down over another period of 8 sec, which was repeated at the beginning and end of a 10 min period during REM sleep. Stimulation that lasts only a few seconds has been shown to produce a minimal effect on the brain, if any</span><sup data-dcnode-id="5428"><a aria-label="Reference 98" data-dcnode-id="5429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d200587268e1676" title="Hummel, F. et al. Effects of non-invasive cortical stimulation on skilled motor function in chronic stroke. Brain 128, 490–499 (2005)."><span data-dcnode-id="5430" instrument_node="">98</span></a></sup><span data-dcnode-id="5427" instrument_node="">. The aim of sham stimulation was to mimic the skin sensation that is occasionally experienced during the onset and offset of tDCS. This procedure is thought to make the two conditions subjectively indistinguishable</span><sup data-dcnode-id="5424"><a aria-label="Reference 99" data-dcnode-id="5425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d200587268e1680" title="Gandiga, P. C., Hummel, F. C. &amp; Cohen, L. G. Transcranial DC stimulation (tDCS): A tool for double-blind sham-controlled clinical studies in brain stimulation. Clin. Neurophysiol. 117, 845–850 (2006)."><span data-dcnode-id="5426" instrument_node="">99</span></a></sup><span data-dcnode-id="5423" instrument_node="">. The same procedure was repeated two or three times starting with the second sleep cycle.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5420" id="Sec17"><span data-dcnode-id="5421" instrument_node="">Electrophysiological recordings</span></h3><p data-dcnode-id="5410"><span data-dcnode-id="5419" instrument_node="">To record EEG activity, 16 electrodes (Fp1, Fp2, F7, F3, Fz, F4, F8, T3, T4, T5, P3, Pz, P4, T6, O1, O2) were placed on the scalp following the standard 10–20 system</span><sup data-dcnode-id="5416"><a aria-label="Reference 100" data-dcnode-id="5417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d200587268e1692" title="Jasper, H. H. The ten-twenty electrode system of the International Federation. Electroencephalogr. Clin. Neurophysiol. 10, 371–375 (1958)."><span data-dcnode-id="5418" instrument_node="">100</span></a></sup><span data-dcnode-id="5415" instrument_node="">. C3, Cz and C4 electrode locations were left empty for the placement of tDCS electrodes. To record eye blinks and vertical saccades, two electrooculography (EOG) electrodes were placed below and above the left eye, while two other electrodes placed adjacent to the lateral canthi of each eye were used to measure horizontal saccades. An electromyography (EMG) electrode placed on the chin was used to record muscle tone, which was used for the scoring of sleep stages. The reference for all these electrodes was placed on the right ear mastoid and the ground electrode was placed on the temple. In addition, two bipolar EMG channels were used to record muscle activity in the right and the left arm flexor digitorum profundus, which were later used to analyze peripheral motor activity. Another two EMG channels recorded activity of the deltoid muscles in both arms. Electrophysiological recordings were continuously monitored on a computer screen and all electrodes were regularly checked throughout the night to ensure that the impedance remained under 5 kΩ. All data were recorded at 500 Hz sampling rate with Ag/AgCl electrodes using NeuroScan amplifier SynAmps Model 5083. Given that tDCS onset induces a slow frequency artifact in the EEG that may preclude online polysomnographic scoring, a 1-Hz high-pass filter was applied during recording for online monitoring of sleep stages</span><sup data-dcnode-id="5412"><a aria-label="Reference 101" data-dcnode-id="5413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d200587268e1696" title="Marshall, L., Mölle, M., Hallschmid, M. &amp; Born, J. Transcranial direct current stimulation during sleep improves declarative memory. J. Neurosci. 24, 9985–9992 (2004)."><span data-dcnode-id="5414" instrument_node="">101</span></a></sup><span data-dcnode-id="5411" instrument_node="">. As expected, tDCS onset- and offset-induced artifacts always faded away after 5–10 sec.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5408" id="Sec18"><span data-dcnode-id="5409" instrument_node="">Collection of dream reports</span></h3><p data-dcnode-id="5399"><span data-dcnode-id="5407" instrument_node="">Based on previous research of tDCS over the motor cortex</span><sup data-dcnode-id="5404"><a aria-label="Reference 97" data-dcnode-id="5405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d200587268e1709" title="Nitsche, M. &amp; Paulus, W. Excitability changes induced in the human motor cortex by weak transcranial direct current stimulation. J. Physiol 527, 633–639 (2000)."><span data-dcnode-id="5406" instrument_node="">97</span></a></sup><span data-dcnode-id="5403" instrument_node="">, we expected the stimulation effects to last for at least one minute, providing a window of tDCS-artefact-free electrophysiological data. Thus, one minute after the termination of tDCS or sham-stimulation, participants were awakened from REM sleep with a standard awakening tone. They were then asked to give a verbal report of “everything that was going on in your mind before awakening”, aiming to facilitate dream recall. Afterwards, participants were asked if they remembered anything else about their dream. To avoid a possible bias between stimulation conditions, these questions were played from a pre-recorded computer audio file. Following the free dream report, participants were asked to fill in the&nbsp;BED Questionnaire. The questionnaire was designed as an internet survey programmed on </span><a data-dcnode-id="5401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.webropol.com/"><span data-dcnode-id="5402" instrument_node="">www.webropol.com</span></a><span data-dcnode-id="5400" instrument_node=""> and was projected on a screen above the bed in the sleep laboratory. The monitor was on a flexibly moving arm and could easily be moved into a comfortable position, enabling participants to navigate and respond to the BED Questionnaire by controlling a mouse while lying in bed. To answer the questions with an open format, participants used a keyboard that was placed nearby.</span></p><p data-dcnode-id="5397"><span data-dcnode-id="5398" instrument_node="">Participants were stimulated and awakened two or three times per night, depending on how many REM sleep periods they had. The number of awakenings was balanced across the first and the second night and across the two stimulation conditions. White dream reports (i.e. cases when a person reports the occurrence of dream experiences but cannot recall any specific details) as well as sleep mentation reports (i.e. when a person reports non-perceptual subjective experiences, such as thinking) were excluded from the analysis. Two white dream and three sleep mentation reports, reported by five different participants, were excluded, as well as the answers to the BED Questionnaire (see below) collected after these verbal reports. All excluded reports were collected after the first awakening, and four of them after sham-stimulation. A total of 50 dreams reported during a total of 20 nights were available for analyses.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5395" id="Sec19"><span data-dcnode-id="5396" instrument_node="">Bodily Experiences in Dreams (BED) Questionnaire</span></h3><p data-dcnode-id="5390"><span data-dcnode-id="5394" instrument_node="">The (maximally) 41-item BED Questionnaire was designed to gather detailed information about kinaesthetic and other bodily experiences in dreams. The BED Questionnaire consists of 5 general questions with movement sub-scales accessed through conditional branching (see Table&nbsp;</span><a data-dcnode-id="5392" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="5393" instrument_node="">3</span></a><span data-dcnode-id="5391" instrument_node="">; for a full list of questions, see Appendix 1). Each of the general questions targets a particular category of body-related experience: vestibular sensations, tactile and somatosensory experiences, movements, movement alterations, and body scheme alterations. Each general question, if and only if answered positively, is followed by sub-scales targeting more specific instances of this category of experience. For example, if a participant indicated that they had experienced movement sensations, they would then be asked about the occurrence of specific types of movement sensations, such as single, repetitive, and passive movements. In addition, if and only if participants reported specific sensations, they were additionally asked whether this sensation concerned the whole body, the right or left hand, the right or left side of the face, or another body part; if the latter was the case, they could indicate which one in open questions. If one of the main scales was answered negatively, the questionnaire skipped to the next general category without showing the subscales. Depending on whether a sub-scale asked about the intensity or the duration of experience, 9 point Likert-scales for answering ranged either from “1 = Low intensity” to “9 = High intensity” or from “1 = Never” to “9 = Throughout”.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5375" data-test="inline-table" id="table-3"><figure data-dcnode-id="5376"><figcaption class="c-article-table__figcaption" data-dcnode-id="5387"><b data-dcnode-id="5388" data-test="table-caption" id="Tab3"><span data-dcnode-id="5389" instrument_node="">Table 3 The BED Questionnaire: General questions and exemplary sub-scales.</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5377"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="5378" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/tables/3" rel="nofollow"><span data-dcnode-id="5385"><span data-dcnode-id="5386" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5379" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5380" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5381" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5384" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5383" fill-rule="evenodd"></path><span data-dcnode-id="5382" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5373"><span data-dcnode-id="5374" instrument_node="">While the BED Questionnaire was certainly demanding, it aimed to strike a balance between maximizing the specificity of questions, which was necessary to obtain sufficiently detailed data on dream experience, and minimizing complexity for participants and the time spent answering the questions before they could go back to sleep. We aimed to achieve this by designing the BED Questionnaire in a hierarchical and interactive way, meaning that participants first had to rate sensations on the five main scales and only in case of reporting the respective sensations, further sub-questions were shown to the participants.</span></p><p data-dcnode-id="5367"><span data-dcnode-id="5372" instrument_node="">While the five general categories of bodily experience were as inclusive as possible, for the specific questions for each category, we decided to focus on those body parts where we most expected to see an effect. As we stimulated over the hand and face areas - which, again, were chosen for their comparatively large size and the larger spread between left and right side cortical representation</span><sup data-dcnode-id="5369"><a aria-label="Reference 102" data-dcnode-id="5370" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d200587268e1792" title="Roux, F. E., Djidjeli, I. &amp; Durand, J. B. Functional architecture of the somatosensory homunculus detected by electrostimulation. J. Physiol. 596, 941–956 (2018)."><span data-dcnode-id="5371" instrument_node="">102</span></a></sup><span data-dcnode-id="5368" instrument_node=""> - we focused our questions on those areas. We also included open questions where participants could add details, for example about other body parts. We note that this option was rarely used by the participants (only 2.8% of the possible answers) and so was not further analysed.</span></p><p data-dcnode-id="5358"><span data-dcnode-id="5366" instrument_node="">We also note that this trade-off between the required specificity of phenomenological data and participant demand is not specific to our study, but exists, to some extent, for all dream studies using free reports and/or specific questionnaires following timed awakenings throughout the night. We believe that the fact that our questionnaire did show specific differences between conditions is heartening in this regard. We also note that previous research suggests that where a study targets specific aspects of dream phenomenology, such as emotions or bodily experiences, responses to a questionnaire may be more detailed than free dream reports, which often lack focus on the specific aspect targeted in a given study</span><sup data-dcnode-id="5360"><a aria-label="Reference 50" data-dcnode-id="5364" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d200587268e1799" title="Merritt, J. M., Stickgold, R., Pace-Schott, E., Williams, J. &amp; Hobson, J. A. Emotion profiles in the dreams of men and women. Conscious. Cogn. 3, 46–60 (1994)."><span data-dcnode-id="5365" instrument_node="">50</span></a><span data-dcnode-id="5363" instrument_node="">,</span><a aria-label="Reference 51" data-dcnode-id="5361" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d200587268e1802" title="Sikka, P., Feilhauer, D., Valli, K. J. &amp; Revonsuo, A. How you measure is what you get: Differences in self- and external ratings of emotional experiences in home dreams. Am. J. Psychol. 130, 367–384 (2017)."><span data-dcnode-id="5362" instrument_node="">51</span></a></sup><span data-dcnode-id="5359" instrument_node="">. Therefore, while the questionnaire was certainly demanding, we believe it facilitated focus on those aspects we were most interested in. We also note that participants underwent training and were familiar with the questionnaire prior to the experimental nights: they were instructed to go through the online BED Questionnaire once during daytime in order to get familiar with all questions, and once after a spontaneous morning awakening at home, reporting their dream. They were also given the opportunity to ask any questions before the first laboratory night began.</span></p><p data-dcnode-id="5352"><span data-dcnode-id="5357" instrument_node="">Finally, one worry might be that participants freshly awakened from sleep might be particularly challenged by a detailed questionnaire asking them to reflect on specific aspects of dream phenomenology. However, we note that sleep inertia is largest after awakening from slow wave sleep</span><sup data-dcnode-id="5354"><a aria-label="Reference 103" data-dcnode-id="5355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d200587268e1810" title="Tassi, P. &amp; Muzet, A. Sleep inertia. Sleep Med. Rev. 4, 341–353 (2000)."><span data-dcnode-id="5356" instrument_node="">103</span></a></sup><span data-dcnode-id="5353" instrument_node="">, whilst all awakenings in our study took place from REM sleep. Furthermore, one reason why we asked participants to give a free verbal report before responding to the questionnaire was to help jog their memories. Thus, any effects of sleep inertia were arguably lower when responding to the questionnaire than during the verbal reporting of dream experiences.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5350" id="Sec20"><span data-dcnode-id="5351" instrument_node="">Word count of verbal dream reports</span></h3><p data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">The length of dream reports was assessed by two blind judges (authors J.W. and K.V.), who independently calculated the meaningful word count of each dream report. Murmurs, repetitions of words, and any secondary reflections or comments about the dream were not included in the word count. The judges initially agreed on the word count of 47 out of 50 dream reports (94% agreement). The judges discussed the reasons for the mismatch in the remaining 3 cases and reached an agreement.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5346" id="Sec21"><span data-dcnode-id="5347" instrument_node="">Content analysis of movement sensations in verbal dream reports</span></h3><p data-dcnode-id="5344"><span data-dcnode-id="5345" instrument_node="">Following the findings from the BED Questionnaire, we carried out supplementary content analysis of verbal dream reports, focusing on the specific types of movement (single actions, repetitive actions, passive movement) performed by the dream self. To compare the type and frequency of movements reported in the BED Questionnaire to those explicitly mentioned in dream reports, two blind judges (authors V.N. and B.L.) carried out a content analysis of verbal reports. First, the judges scored whether each dream report contained at least one movement produced by the dream self, excluding facial movements such as talking, drinking, and blinking, as we reasoned that these would not typically be reported as movements (at least without explicit prompting or instruction). Movements attributed to the first-person plural “we” were treated as involving movements of the dream self. Second, in each dream that, in the first step, was judged to contain movement, the judges identified individual movements produced by the dream self as opposed to movements performed by other dream characters. Third, they scored the type of the identified movements (single action, repetitive action, passive movement). All three stages of content analysis were first carried out individually and the obtained results were then compared between the judges. In the case of disagreement, the judges discussed it until an agreement was achieved.</span></p><p data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">Regarding the presence or absence of movement in a given report, the judges initially agreed on 45 out of 50 dream reports (90% agreement). After discussion, the judges agreed that the remaining 4 dreams contained references to movements produced by the dream self, while one report contained no explicit references to such movement. Regarding individual movements, judges initially agreed on the identification of 33 movements and disagreed on 19 movements (63.5% agreement). The disagreement was caused by one judge either missing a movement or treating it as part of a longer sequence of movements, e.g. treating walking from A to B and from B to C as a single movement. This happened when movement descriptions in dream reports allowed for differing interpretations, leaving open whether they were associated with e.g. one or two distinct movements. By contrast, we speculate that this difference would have been more obvious to participants, as their responses to the questionnaire were based on their memory of the dream experience itself rather than a short and likely selective description of it, as is the case in the content analysis of dream reports. While we can only speculate about this point, this disagreement might reflect the greater suitability of our questionnaire to such detailed phenomenological questions as compared to content analyzing free reports.</span></p><p data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">After discussion, the judges agreed that the dream reports contained a total of 48 individual movements executed by the dream self. Regarding specific types of movements (single action, repetitive action, passive movement), the judges initially agreed on 44 out of 48 movements (91.7% agreement). After discussion, the judges agreed that the remaining 4 movements should be scored as follows: “diving” - single action, “riding a bike downhill” - passive movement, “writing something” - repetitive action, “made some coffee” - single action.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5338" id="Sec22"><span data-dcnode-id="5339" instrument_node="">EEG analysis: coherence and spectral power</span></h3><p data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">To assess the electrophysiological effects of tDCS on brain functioning, we analyzed the full period of 1 min of EEG signal recorded between the termination of tDCS or sham-stimulation and controlled awakening. tDCS artifacts did not contaminate this EEG interval whilst sleep scoring ensured that REM sleep continued up to the point of awakening. On one occasion, a spontaneous awakening took place before the planned controlled awakening, and only 7 sec of stimulation-free sleep EEG were available for analysis. On another occasion, a spontaneous awakening took place immediately after the termination of stimulation; this recording was excluded, leaving 49 EEG recordings available for analysis.</span></p><p data-dcnode-id="5326"><span data-dcnode-id="5335" instrument_node="">Continuous recordings were first high-pass (0.5 Hz) and then low-pass (45 Hz) filtered using a FIR filter as implemented in EEGlab toolbox</span><sup data-dcnode-id="5332"><a aria-label="Reference 104" data-dcnode-id="5333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d200587268e1847" title="Delorme, A. &amp; Makeig, S. EEGLAB: An open source toolbox for analysis of single-trial EEG dynamics including independent component analysis. J. Neurosci. Methods 134, 9–21 (2004)."><span data-dcnode-id="5334" instrument_node="">104</span></a></sup><span data-dcnode-id="5331" instrument_node="">. The data were then common average referenced, and excessively noisy periods of recording were manually deleted (an average of 743 ms per single recording). Detached or excessively noisy channels were deselected (an average of 0.2 channels per dataset), and an independent component analysis (ICA) was carried out on the remaining channels, using EEGlab toolbox</span><sup data-dcnode-id="5328"><a aria-label="Reference 104" data-dcnode-id="5329" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d200587268e1851" title="Delorme, A. &amp; Makeig, S. EEGLAB: An open source toolbox for analysis of single-trial EEG dynamics including independent component analysis. J. Neurosci. Methods 134, 9–21 (2004)."><span data-dcnode-id="5330" instrument_node="">104</span></a></sup><span data-dcnode-id="5327" instrument_node="">. Independent components reflecting eye movements and other sources of noise were manually deleted (an average of 3.3 ICs per recording), following which dropped noisy EEG channels were interpolated using spherical spline interpolation. Continuous EEG recordings were epoched into 2-sec segments with a 50% overlap between adjacent segments. Several epochs that still contained visible artifacts were manually deleted (an average of 0.5 epochs per recording). Individual epochs were demeaned across the whole 2 sec interval.</span></p><p data-dcnode-id="5320"><span data-dcnode-id="5325" instrument_node="">We analyzed EEG inter-hemispheric coherence in the beta oscillation range (15–30 Hz) at the electrodes adjacent to the stimulation site (F3, F4, T3, T4, P3, P4). Magnitude-squared coherence was computed in the range from 1.95 Hz to 44.92 Hz with a maximum frequency resolution of 1.95 Hz between pairs of EEG channels adjacent to the stimulation site from the frontal (F3-F4), temporal (T3-T4) and parietal (P3-P4) side, using Brainstorm toolbox</span><sup data-dcnode-id="5322"><a aria-label="Reference 105" data-dcnode-id="5323" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d200587268e1858" title="Tadel, F., Baillet, S., Mosher, J. C., Pantazis, D. &amp; Leahy, R. M. Brainstorm: A user-friendly application for MEG/EEG analysis. Comput. Intell. Neurosci 879716, 1–13 (2011)."><span data-dcnode-id="5324" instrument_node="">105</span></a></sup><span data-dcnode-id="5321" instrument_node="">. Coherence values obtained at a single 2 sec segment level were averaged across beta frequency range (15.6–29.3 Hz). Next, coherence values were averaged across each 1-min pre-awakening recordings. Afterwards, individual means were averaged over several awakenings for each participant according to the experimental condition, yielding 10 tDCS and 10 sham-stimulation values for each electrode pair.</span></p><p data-dcnode-id="5314"><span data-dcnode-id="5319" instrument_node="">In the case of a significant difference between tDCS and sham-stimulation conditions across the 1-min pre-awakening periods, coherence was computed at four separate 15 sec sub-intervals preceding controlled awakening: −60 to −46 sec, −45 sec to −31 sec, −30 to −16 sec, and −15 to −1 sec. A significant difference between tDCS and sham conditions observed immediately after the termination of stimulation (−60 to −46 sec) was expected to reflect a tDCS-driven modulation of EEG activity, as an effect size of neurophysiological changes following motor tDCS decreases with increasing time</span><sup data-dcnode-id="5316"><a aria-label="Reference 97" data-dcnode-id="5317" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d200587268e1865" title="Nitsche, M. &amp; Paulus, W. Excitability changes induced in the human motor cortex by weak transcranial direct current stimulation. J. Physiol 527, 633–639 (2000)."><span data-dcnode-id="5318" instrument_node="">97</span></a></sup><span data-dcnode-id="5315" instrument_node="">. Contrary to this, a significant difference between tDCS and sham-stimulation conditions at the interval preceding awakening (−15 to −1 sec) with no difference at the −60 to −46 sec interval was expected to reflect an unspecific modulation of EEG activity, e.g. micro-arousals caused by tingling sensations could eventually trigger body movements in bed.</span></p><p data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">To control for a possible confound of EEG spectral power on coherence computation (Bowyer, 2016), we carried out a control analysis of EEG beta power. Spectral power was computed across 2 sec epochs using Hilbert transform, set from 1 Hz to 44 Hz in steps of 1 Hz, for the same set of 6 electrodes adjacent to the stimulation site. Power values obtained at a single 2 sec segment level were averaged across beta frequency range (15–30 Hz), with subsequent data averaging steps repeating coherence analysis.</span></p><p data-dcnode-id="5304"><span data-dcnode-id="5311" instrument_node="">Finally, as an exploratory data analysis, inter-hemispheric EEG coherence was compared between sham-stimulation and tDCS conditions for each individual frequency across the whole 1.95–44.92 Hz range (see Supplementary Material and Figs.&nbsp;</span><a data-dcnode-id="5309" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5310" instrument_node="">S1</span></a><span data-dcnode-id="5308" instrument_node=""> and </span><a data-dcnode-id="5306" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5307" instrument_node="">S2</span></a><span data-dcnode-id="5305" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5302" id="Sec23"><span data-dcnode-id="5303" instrument_node="">Phasic EMG analysis</span></h3><p data-dcnode-id="5296"><span data-dcnode-id="5301" instrument_node="">We investigated the effects of tDCS on peripheral muscle tone by analyzing EMG activity from the left/right arm flexor and deltoideus muscles during the 1 min interval between the termination of tDCS or sham-stimulation and the controlled awakening of participants. We were specifically interested whether EMG traces following tDCS and sham-stimulation showed increased phasic muscle activity compared to the pre-stimulation baseline window, and whether bihemispheric tDCS modulated interaction between the left/right arm EMG. Since phasic EMG activity manifests during REM sleep as short-lasting muscle bursts recorded by surface electrodes</span><sup data-dcnode-id="5298"><a aria-label="Reference 106" data-dcnode-id="5299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d200587268e1890" title="Fairley, J. A., Georgoulas, G., Mehta, N. A., Gray, A. G. &amp; Bliwise, D. L. Computer detection approaches for the identification of phasic electromyographic (EMG) activity during human sleep. Biomed. Signal Process. Control 7, 606–615 (2012)."><span data-dcnode-id="5300" instrument_node="">106</span></a></sup><span data-dcnode-id="5297" instrument_node="">, we split the 1-min epochs into 60 non-overlapping 1-sec segments and carried out a binary assessment whether each segment contained phasic EMG activity. Segments with phasic EMG activity were then assigned a value of one, and segments without phasic EMG activity a value of zero. The mean overall 60 binary values were then used to define the ratio of phasic EMG activity within the respective epoch.</span></p><p data-dcnode-id="5284"><span data-dcnode-id="5295" instrument_node="">More specifically, since phasic EMG activity is reflected in broadband spectral power changes, we used the variance of gamma band (50–250 Hz) power for the detection of short-lasting bursts of muscle activity. In a first step we high-pass filtered the raw data with a 3rd order butterworth filter with a cutoff-frequency at 50 Hz (Fig.&nbsp;</span><a data-dcnode-id="5293" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="5294" instrument_node="">5A,B</span></a><span data-dcnode-id="5292" instrument_node="">). For the subsequent time-frequency analysis, we used a single-tapered spectral analysis method</span><sup data-dcnode-id="5289"><a aria-label="Reference 107" data-dcnode-id="5290" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d200587268e1900" title="Percival, D. &amp; Walden, A. T. Wavelet methods for time series analysis (Cambridge series in statistical and probabilistic mathematics). (Cambridge University Press, 2000)."><span data-dcnode-id="5291" instrument_node="">107</span></a></sup><span data-dcnode-id="5288" instrument_node=""> with a time window of 50 ms and 10-ms time steps. The relative power changes were then calculated by dividing the time-resolved amplitude for each frequency bin by the frequency-specific average of the whole 1 min epoch (Fig.&nbsp;</span><a data-dcnode-id="5286" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="5287" instrument_node="">5C</span></a><span data-dcnode-id="5285" instrument_node="">). After splitting the epochs in 1-s segments, the variance of relative power was calculated for each segment and every frequency. The variance of gamma band power was then defined as the mean over all frequencies between 50 Hz and 250 Hz.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5251" data-test="figure" data-title="Figure 5" id="figure-5"><figure data-dcnode-id="5252"><figcaption data-dcnode-id="5281"><b class="c-article-section__figure-caption" data-dcnode-id="5282" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="5283" instrument_node="">Figure 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5263"><div class="c-article-section__figure-item" data-dcnode-id="5276"><a class="c-article-section__figure-link" data-dcnode-id="5277" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/5" rel="nofollow"><picture data-dcnode-id="5278"><source data-dcnode-id="5280" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-020-63479-6/MediaObjects/41598_2020_63479_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="5279" height="1255" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-020-63479-6/MediaObjects/41598_2020_63479_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5264" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="5265"><span data-dcnode-id="5275" instrument_node="">Analysis of peripheral EMG activity. (A) Exemplary 60 sec EMG recording of the right hand flexoris muscle between termination of tDCS and the awakening. </span><b data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">(B)</span></b><span data-dcnode-id="5272" instrument_node=""> The same EMG recording after a high-pass filter with a 50 Hz cutoff-frequency. </span><b data-dcnode-id="5270"><span data-dcnode-id="5271" instrument_node="">(C)</span></b><span data-dcnode-id="5269" instrument_node=""> Relative spectral power of the high-pass filtered EMG recording. </span><b data-dcnode-id="5267"><span data-dcnode-id="5268" instrument_node="">(D)</span></b><span data-dcnode-id="5266" instrument_node=""> Relative variance of gamma band power, i.e., divided by the average variance of gamma band power in the baseline time window. Values greater than one (above the grey solid line) depict 1 sec segments with a shift towards phasic EMG, values equal or smaller than one depict segments with a shift towards tonic EMG.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5253"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="5254" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-63479-6/figures/5" rel="nofollow"><span data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5255" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5256" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5257" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5260" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5259" fill-rule="evenodd"></path><span data-dcnode-id="5258" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5246"><span data-dcnode-id="5250" instrument_node="">To assess a relative shift towards more phasic/tonic activity in response to stimulation, the variance of gamma band power was calculated both for the 60 sec epochs after the termination of tDCS or sham-stimulation and for a 30 sec baseline time window before tDCS or sham-stimulation. The relative variance of gamma band power was then calculated by dividing the variance by the averaged variance in the baseline time window (Fig.&nbsp;</span><a data-dcnode-id="5248" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="5249" instrument_node="">5D</span></a><span data-dcnode-id="5247" instrument_node="">). This way, post-stimulation segments with the variance of gamma band power higher than the corresponding average (median) in the stimulation-free 30 sec baseline time window received a relative variance value greater than one and were defined as segments shifting towards phasic EMG, while segments with a relative variance between zero and one were defined as segments shifting towards tonic EMG. Finally, a proportion of phasic segments was calculated across the whole 60 sec post-stimulation epoch, yielding values ranging from 0, indicating a complete shift towards tonic EMG, to 1, indicating a complete shift towards phasic EMG.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5244" id="Sec24"><span data-dcnode-id="5245" instrument_node="">Statistical analysis</span></h3><p data-dcnode-id="5239"><span data-dcnode-id="5243" instrument_node="">All dependent measures were averaged per individual participant separately for the sham-stimulation and tDCS conditions. A Shapiro-Wilk test was used to assess the distribution normality of dependent variables. Paired-samples t test and Pearson correlation were carried out when distribution of given variables (or their difference in a case of t test) was normal, and Wilcoxon signed-rank test (Z statistic) and Spearman rank order correlation were used in the cases of non-normal distribution of one or both variables. For the paired-samples t-test, Cohen’s d was calculated as an effect size estimate using pooled variance. For the Wilcoxon signed-rank test, r = Z/sqrt(N) was calculated as an effect size estimate. All statistical tests were two-tailed. To control for multiple comparisons, Bonferroni correction was applied by multiplying the obtained p value by the number of comparisons with a given set of tests. Bonferroni corrected p values are denoted as p</span><sub data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">BxN</span></sub><span data-dcnode-id="5240" instrument_node=""> where N indicates the number of multiple comparisons. For all control analyses, we report uncorrected p values. For the control t tests where we expected null findings, we additionally report Bayes factor in favor of the null. Statistical analyses were carried out with SPSS 22 and JASP 0.8.2.</span></p></div></div></section><span data-dcnode-id="5235" instrument_node="">

ir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/cas-redirect/1%3ASTN%3A280%3ADC%252BD3MvntVCgtg%253D%253D"><span data-dcnode-id="5209" instrument_node="">CAS</span></a><span data-dcnode-id="5207" instrument_node="">&nbsp;
