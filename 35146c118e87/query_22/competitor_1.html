 data-dcnode-id="373"></div><header data-dcnode-id="370" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Cited by (387)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="352"><div class="sub-heading" data-dcnode-id="364"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1087079221001544" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="368" id="citing-articles-article0-title"><span data-dcnode-id="369" instrument_node="">Functional connectivity changes in insomnia disorder: A systematic review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">2022, Sleep Medicine Reviews</span></div></div><div class="buttons" data-dcnode-id="358"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="359" type="button"><span class="button-link-text" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="360" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="361"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="353"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="354" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="355"><p data-dcnode-id="356" id="abspara0010"><span data-dcnode-id="357" instrument_node="">Insomnia (ID) is the most common sleep disorder; however pathogenetic mechanisms underlying ID symptoms are not fully understood. Adopting a multifactorial view and considering ID a condition that involves interregional neuronal coordination would be useful to understand the ID pathophysiology. Functional connectivity (FC) may help to shed light on functional processes and neural correlates underlying ID symptoms. Despite a growing number of studies assessing FC anomalies, insight into ID pathophysiology is still fragmentary. This systematic review aims to search empirical evidence regarding FC changes in ID during resting-state. Thirty-one studies involving 1052 ID participants met the inclusion criteria for this review. Results suggested several associations between ID symptoms and impaired intra- and inter-hemispheric interactions of principal resting-state networks. Overall, evidence supported the hypothesis that a disrupted organization of the brain functional connectome characterizes ID, resulting in a decline in sleep, cognition, emotion, and memory. However, the wide methodological heterogeneity between reviewed studies and limitations in terms of study protocols and statistical approaches raised from this systematic review, makes it difficult to provide a univocal framework of ID pathophysiology. Future researches in this field should lead towards shared and rigorous search designs to ensure solid research evidence in the ID pathophysiology.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="323"><div class="sub-heading" data-dcnode-id="346"><a data-dcnode-id="349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0897189721001609" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="350" id="citing-articles-article1-title"><span data-dcnode-id="351" instrument_node="">A systematic review of sleep deprivation and neurobehavioral function in young adults</span></h3></a><div class="article-source ellipsis" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">2022, Applied Nursing Research</span></div></div><div class="buttons" data-dcnode-id="340"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="341" type="button"><span class="button-link-text" data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="342" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="343"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="324"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="325" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="326"><p data-dcnode-id="338" id="sp0060"><span data-dcnode-id="339" instrument_node="">To examine the effect of sleep deprivation (total and partial) on neurobehavioral function compared to a healthy sleep opportunity (7‐9 h) in young adults 18–30&nbsp;years.</span></p><p data-dcnode-id="336" id="sp0065"><span data-dcnode-id="337" instrument_node="">More than one-third of young adults are sleep deprived, which negatively affects a range of neurobehavioral functions, including psychomotor vigilance performance (cognitive), affect, and daytime sleepiness.</span></p><p data-dcnode-id="334" id="sp0070"><span data-dcnode-id="335" instrument_node="">A systematic review of randomized controlled trials (RCTs) on sleep deprivation and neurobehavioral function. Multiple electronic databases (Cochrane Central Registry of Controlled Trials [CENTRAL], PubMed, PsycINFO, CINAHL, and Web of Science) were searched for relevant RCTs published in English from the establishment of each database to December 31, 2020.</span></p><p data-dcnode-id="329" id="sp0075"><span data-dcnode-id="333" instrument_node="">Nineteen RCTs were selected (</span><em data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">N</span></em><span data-dcnode-id="330" instrument_node="">&nbsp;=&nbsp;766, mean age&nbsp;=&nbsp;23.7&nbsp;±&nbsp;3.1&nbsp;years; 44.8% female). Seven were between-person (5 were parallel-group designs and 2 had multiple arms), and 12 were within-person designs (9 were cross over and 3 used a Latin square approach). Total sleep deprivation had the strongest detrimental effect on psychomotor vigilance performance, with the largest effects on vigilance tasks in young adults in the included studies.</span></p><p data-dcnode-id="327" id="sp0080"><span data-dcnode-id="328" instrument_node="">Acute sleep deprivation degrades multiple dimensions of neurobehavioral function including psychomotor vigilance performance, affect, and daytime sleepiness in young adults. The effect of chronic sleep deprivation on the developing brain and associated neurobehavioral functions in young adults remains unclear.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="299"><div class="sub-heading" data-dcnode-id="317"><a data-dcnode-id="320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1046202322000184" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="321" id="citing-articles-article2-title"><span data-dcnode-id="322" instrument_node="">Exploration of cortical inhibition and habituation in insomnia: Based on CNV and EEG</span></h3></a><div class="article-source ellipsis" data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">2022, Methods</span></div></div><div class="buttons" data-dcnode-id="311"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="312" type="button"><span class="button-link-text" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="313" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="314"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="300"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="301" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="302"><p data-dcnode-id="309" id="sp0010"><span data-dcnode-id="310" instrument_node="">Cognitive dysfunction with abnormal cortical inhibition and habituation has frequently been found in patients with insomnia. And the so-called contingent negative variation (CNV) and EEG power spectral density (FFT) may be the best choice to explore the underlining pathophysiology.</span></p><p data-dcnode-id="307" id="sp0015"><span data-dcnode-id="308" instrument_node="">We used polysomnography (PSG) to record such objective PSG parameters. The amplitudes, latencies, areas of different CNV components such as oCNV, iCNV and tCNV, PINV have been selected and analyzed. Behavioral data such as manual reaction time (RT) has been analyzed. Spectral analysis was performed with fast Fourier transformation (FFT) on all channels to make a spectral analyses of EEG datas.</span></p><p data-dcnode-id="305" id="sp0020"><span data-dcnode-id="306" instrument_node="">The A-latency located in CZ or PZ were statistically longer in insomnia group than control group, the iCNV-latency located in insomnia group were statistically shorter than control group. The iCNV-amplitude located in insomnia group was lower than control group. The oCNV-amplitude or the tCNV-amplitude located in insomnia group was higher than control group. The oCNV-square, tCNV-square, or PINV-square located in insomnia group were significant larger than control group. β1 or β2 activity distributed in bilateral hemisphere were significantly increased in insomnia group than control group with different distributions.</span></p><p data-dcnode-id="303" id="sp0025"><span data-dcnode-id="304" instrument_node="">Our study revealed varied attentional and information processing in insomnia patients. Above all, we made a hypothesis with ceiling theory: Frontal lobe play an important role in maintaining cognitive processing, which needs much more energy consumption and leads to decreased fast EEG activity in frontal cortex, which contributes to reduced cortical inhibition, represented as abnormal CNV.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="281"><div class="sub-heading" data-dcnode-id="293"><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S105381002100115X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="297" id="citing-articles-article3-title"><span data-dcnode-id="298" instrument_node="">The dynamics of affect across the wake-sleep cycle: From waking mind-wandering to night-time dreaming</span></h3></a><div class="article-source ellipsis" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">2021, Consciousness and Cognition</span></div></div><div class="buttons" data-dcnode-id="287"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="288" type="button"><span class="button-link-text" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="289" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="290"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="282"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="283" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="284"><p data-dcnode-id="285" id="sp0010"><span data-dcnode-id="286" instrument_node="">Affective experiences occur across the wake-sleep cycle—from active wakefulness to resting wakefulness (i.e., mind-wandering) to sleep (i.e., dreaming). Yet, we know little about the dynamics of affect across these states. We compared the affective ratings of waking, mind-wandering, and dream episodes. Results showed that mind-wandering was more positively valenced than dreaming, and that both mind-wandering and dreaming were more negatively valenced than active wakefulness. We also compared participants’ self-ratings of affect with external ratings of affect (i.e., analysis of affect in verbal reports). With self-ratings all episodes were predominated by positive affect. However, the affective valence of reports changed from positively valenced waking reports to affectively balanced mind-wandering reports to negatively valenced dream reports. These findings show that (1) the positivity bias characteristic to waking experiences decreases across the wake-sleep continuum, and (2) conclusions regarding affective experiences depend on whether self-ratings or verbal reports describing these experiences are analysed.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="263"><div class="sub-heading" data-dcnode-id="275"><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0006295221000344" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="279" id="citing-articles-article4-title"><span data-dcnode-id="280" instrument_node="">Sleep timing, chronotype and social jetlag: Impact on cognitive abilities and psychiatric disorders</span></h3></a><div class="article-source ellipsis" data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">2021, Biochemical Pharmacology</span></div></div><div class="buttons" data-dcnode-id="269"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="270" type="button"><span class="button-link-text" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="271" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="272"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="264"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="265" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="266"><p data-dcnode-id="267" id="sp0015"><span data-dcnode-id="268" instrument_node="">Sleep timing is controlled by the subtle interplay between circadian and homeostatic oscillators which, according to their endogenous properties, allow beings to feel spontaneously that it is time to go to bed or wake up in synchrony with the earth’s light/dark cycle. In humans, however, social time and nocturnal artificial light modify sleep timing. Our modern lifestyle and artificial nocturnal light delay our bedtime, make us wake up, and lead to a greater intraindividual variability in sleep timing. Depending on the constraints that social time places on us, our sleep timing may be in or out of phase with the internal circadian timing determined by the circadian clock. When a person’s social time is out of phase with their circadian time, they may be considered to suffer from circadian disruption or ‘social jetlag’. There are interindividual differences in sleep timing that are known as morningness-eveningness preferences or chronotype, e.g. late chronotypes go to bed later. Chronotype may be assessed in terms of differences in kinetic homeostatic sleep pressure, intrinsic circadian period (ICP) and/or phase angle entrainment. In addition, chronotype depends on genetic and age-related factors, e.g. it gets earlier as people grow older. The social time of late chronotype individuals during week days is not adapted to their circadian time, unlike on free days. This results in social jetlag and circadian disruption, which in turn induces a chronic sleep debt due to a late bedtime and an early wake time, which is compensated on free days but only partially. Sleep and circadian clock disruption generally alter cognitive performance (alertness, attention, memory, higher-order executive functions such as response inhibition and decision-making) but their impact remains to be clarified. When subjects adopt their preferred sleep timing, a “synchrony effect” often appears with chronotypes performing better during daytime at optimal than at suboptimal timing (late chronotypes perform better in the evening, early chronotypes in the morning). Evening types appear to be cognitively more vulnerable to suboptimal times than morning types, probably because they have to deal with social jetlag and the “wake effort” period after awakening. Circadian disruption, but not chronotype, may impact attentional/inhibitory performance (more impulsivity and inattention). Strong associations have been found between mood disorders or attention deficit hyperactivity disorder (ADHD) and chronotype, with these psychiatric disorders typically being overrepresented in evening types. The association between social jetlag and these psychiatric disorders is less obvious. Social jetlag can be corrected by reducing exposure to evening light, although eveningness may be considered as a lifelong factor predisposing to depression or inattention.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="252"><div class="sub-heading" data-dcnode-id="257"><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S1355617720001186" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="261" id="citing-articles-article5-title"><span data-dcnode-id="262" instrument_node="">Sleep Mediates Age-Related Executive Function for Older Adults with Limited Cognitive Reserve</span></h3></a><div class="article-source ellipsis" data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">2021, Journal of the International Neuropsychological Society</span></div></div><div class="buttons" data-dcnode-id="256"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="253"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="254" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="255"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-0036849490%26md5%3Db07557fb8f271e41421bf6f3d1829f68" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="249" focusable="false" height="32" viewBox="0 0 78 128" w
