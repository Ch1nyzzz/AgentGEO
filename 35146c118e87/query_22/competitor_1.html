</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ceab10&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id4&quot;><p id=&quot;spara40&quot;>Experimental data indicate a role for the prefrontal cortex in mediating normal sleep physiology, dreaming and sleep-deprivation phenomena. During nonrandom-eye-movement (NREM) sleep, frontal cortical activity is characterized by the highest voltage and the slowest brain waves compared to other cortical regions. The differences between the self-awareness experienced in waking and its diminution in dreaming can be explained by deactivation of the dorsolateral prefrontal cortex during REM sleep. Here, we propose that this deactivation results from a direct inhibition of the dorsolateral prefrontal cortical neurons by acetylcholine, the release of which is enhanced during REM sleep. Sleep deprivation influences frontal executive functions in particular, which further emphasizes the sensitivity of the prefrontal cortex to sleep.</p></div></div></div>" data-dcnode-id="5636" lang="en" name="citation_abstract"><span data-dcnode-id="5635" instrument_node="">

id4"><p data-dcnode-id="5150" id="spara40"><span data-dcnode-id="5151" instrument_node="">Experimental data indicate a role for the prefrontal cortex in mediating normal sleep physiology, dreaming and sleep-deprivation phenomena. During nonrandom-eye-movement (NREM) sleep, frontal cortical activity is characterized by the highest voltage and the slowest brain waves compared to other cortical regions. The differences between the self-awareness experienced in waking and its diminution in dreaming can be explained by deactivation of the dorsolateral prefrontal cortex during REM sleep. Here, we propose that this deactivation results from a direct inhibition of the dorsolateral prefrontal cortical neurons by acetylcholine, the release of which is enhanced during REM sleep. Sleep deprivation influences frontal executive functions in particular, which further emphasizes the sensitivity of the prefrontal cortex to sleep.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="5124" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="5136"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364661302020132"><svg class="icon icon-navigate-left" data-dcnode-id="5145" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="5146"></path></svg><span class="button-alternative-text" data-dcnode-id="5138"><strong data-dcnode-id="5143"><span data-dcnode-id="5144" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5139"><span data-dcnode-id="5140" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="5125"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364661302020168"><span class="button-alternative-text" data-dcnode-id="5129"><strong data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="5132"><span data-dcnode-id="5133" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="5127" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="5128"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="5090"><div class="keywords-section" data-dcnode-id="5100" id="aep-keywords-id6"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5122"><span data-dcnode-id="5123" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5119"><span data-dcnode-id="5120"><span data-dcnode-id="5121" instrument_node="">frontal lobes</span></span></div><div class="keyword" data-dcnode-id="5116"><span data-dcnode-id="5117"><span data-dcnode-id="5118" instrument_node="">dreaming</span></span></div><div class="keyword" data-dcnode-id="5113"><span data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">sleep</span></span></div><div class="keyword" data-dcnode-id="5110"><span data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">activation-synthesis hypothesis</span></span></div><div class="keyword" data-dcnode-id="5107"><span data-dcnode-id="5108"><span data-dcnode-id="5109" instrument_node="">ventromedial prefrontal cortex</span></span></div><div class="keyword" data-dcnode-id="5104"><span data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">dorsolateral prefrontal cortex</span></span></div><div class="keyword" data-dcnode-id="5101"><span data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">sleep deprivation</span></span></div></div><div class="keywords-section" data-dcnode-id="5091" id="aep-keywords-id7"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="5095"><span data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">Cognitive Science</span></span></div><div class="keyword" data-dcnode-id="5092"><span data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">Neuroscience</span></span></div></div></div><span data-dcnode-id="5089" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3160" id="body"><div data-dcnode-id="3166"><p data-dcnode-id="5087" id="para110"><span data-dcnode-id="5088" instrument_node="">Recent data indicate that the prefrontal cortex is particularly sensitive to sleep and benefits from it in important ways. Here we review new findings, which, although heterogeneous, are consistent. Our central hypothesis is that the executive cognitive functions, provided by the prefrontal cortex, are particularly sensitive to the fatigue induced by prolonged waking. We propose that during sleep it enjoys what is at first a passive respite in nonrapid-eye-movement (NREM) sleep and later, in REM sleep, a more active one. As a consequence of deactivation of the dorsolateral prefrontal cortex (DLPFC) during sleep, executive functions such as self-consciousness and analytical thought are severely impaired in NREM sleep and are weak in REM sleep. By virtue of the respite provided by sleep, the prefrontal cortex recovers its crucial functional competence for use on waking.</span></p><p data-dcnode-id="5085" id="para120"><span data-dcnode-id="5086" instrument_node="">It is our view that any study of the function of the prefrontal cortex must take its extreme state dependence into account and that more detailed study of such a state dependence should be richly rewarding.</span></p><section data-dcnode-id="4871" id="cesec30"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5083" id="cestitle90"><span data-dcnode-id="5084" instrument_node="">The loss of self-conscious awareness in sleep</span></h2><p data-dcnode-id="5078" id="para130"><span data-dcnode-id="5082" instrument_node="">The loss of self-conscious awareness occasioned by the transition from waking to sleep constitutes one of the universal and robust changes in consciousness that humans can observe in themselves and others. Even when a form of awareness returns in sleep during dreaming, the self-conscious awareness is remarkably different from waking consciousness </span><a class="workspace-trigger" data-dcnode-id="5080" href="#BIB1" name="bBIB1"><span data-dcnode-id="5081" instrument_node="">[1]</span></a><span data-dcnode-id="5079" instrument_node="">. This is most notable when awakening from a dream. The sudden switch from the self-absorbed awareness of dream reality to an awareness of waking reality is remarkably rapid. With it comes our immediate sense of self as separate, in a causal and analytical sense, from other aspects of consciousness such as perception and emotion.</span></p><p data-dcnode-id="5067" id="para140"><span data-dcnode-id="5077" instrument_node="">What is the physiological basis of this profound change in consciousness? The answer suggested during the first half of the 20th century – that the sensorily deafferented sleeping brain was quiescent and at rest – has been soundly disproved by the discovery of the brain-activated state of REM sleep </span><a class="workspace-trigger" data-dcnode-id="5075" href="#BIB2" name="bBIB2"><span data-dcnode-id="5076" instrument_node="">[2]</span></a><span data-dcnode-id="5074" instrument_node="">. The observation that the ascending reticular activating system of the brainstem, described in waking by Moruzzi and Magoun </span><a class="workspace-trigger" data-dcnode-id="5072" href="#BIB3" name="bBIB3"><span data-dcnode-id="5073" instrument_node="">[3]</span></a><span data-dcnode-id="5071" instrument_node="">, is re-engaged during REM sleep </span><a class="workspace-trigger" data-dcnode-id="5069" href="#BIB4" name="bBIB4"><span data-dcnode-id="5070" instrument_node="">[4]</span></a><span data-dcnode-id="5068" instrument_node=""> has added to the richness of the concept of brain activation.</span></p><div data-dcnode-id="4872"><p data-dcnode-id="5044" id="para150"><span data-dcnode-id="5066" instrument_node="">Subsequently, the neuronal basis of REM activation has been found to result from reciprocal interaction of aminergic and cholinergic neurons in the pontine brainstem </span><a class="workspace-trigger" data-dcnode-id="5064" href="#BIB5" name="bBIB5"><span data-dcnode-id="5065" instrument_node="">[5]</span></a><span data-dcnode-id="5063" instrument_node="">. Thus, although brain activation during waking is associated with noradrenaline, 5-hydroxytryptamine (5-HT) and acetylcholine-mediated neuromodulation, brain activation during REM is exclusively cholinergic (although the dopaminergic system appears to be continuously active throughout the cycle </span><a class="workspace-trigger" data-dcnode-id="5061" href="#BIB6" name="bBIB6"><span data-dcnode-id="5062" instrument_node="">[6]</span></a><span data-dcnode-id="5060" instrument_node="">). The neuromodulatory status of NREM sleep is intermediate between waking and REM sleep. Far from being a quiescent state, NREM sleep involves vigorous hippocampal–cortical, thalamocortical and cortico–cortical oscillatory activity </span><a class="workspace-trigger" data-dcnode-id="5058" href="#BIB7" name="bBIB7"><span data-dcnode-id="5059" instrument_node="">7.</span></a><span data-dcnode-id="5057" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5055" href="#BIB8" name="bBIB8"><span data-dcnode-id="5056" instrument_node="">8.</span></a><span data-dcnode-id="5054" instrument_node=""> that may have important roles in the processing of learning and memory </span><a class="workspace-trigger" data-dcnode-id="5052" href="#BIB9" name="bBIB9"><span data-dcnode-id="5053" instrument_node="">9.</span></a><span data-dcnode-id="5051" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5049" href="#BIB10" name="bBIB10"><span data-dcnode-id="5050" instrument_node="">10.</span></a><span data-dcnode-id="5048" instrument_node="">. Sleep physiology and psychophysiology is summarized in </span><a class="workspace-trigger" data-dcnode-id="5046" href="#BOX1" name="bBOX1"><span data-dcnode-id="5047" instrument_node="">Box 1</span></a><span data-dcnode-id="5045" instrument_node="">.</span></p><div aria-label="" class="article-textbox" data-dcnode-id="4873" id="BOX1" role="region"><span class="label" data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">Box 1</span></span><h2 class="article-title" data-dcnode-id="5040"><span data-dcnode-id="5041" instrument_node="">Box 1. Sleep basics</span></h2><div data-dcnode-id="4996"><div data-dcnode-id="4997"><p data-dcnode-id="5026" id="para10"><span data-dcnode-id="5039" instrument_node="">Rapid-eye-movement (REM; also known as ‘paradoxical’, ‘active’ and ‘desynchronised’) sleep and non-REM (NREM) sleep are clearly distinguishable types of sleep. By convention, they are defined by the electrophysiological signals detected using a combination of electroencephalography (EEG), electrooculography (EOG) and electromyography (EMG). Collectively, these measurements are termed ‘polysomnography’ </span><a class="workspace-trigger" data-dcnode-id="5037" href="#BIB60" name="bBIB60"><span data-dcnode-id="5038" instrument_node="">a</span></a><span data-dcnode-id="5036" instrument_node="">. First described by Aserinsky and Kleitman </span><a class="workspace-trigger" data-dcnode-id="5034" href="#BIB61" name="bBIB61"><span data-dcnode-id="5035" instrument_node="">b</span></a><span data-dcnode-id="5033" instrument_node="">, REM sleep is characterized by: (1) wake-like and ‘activated’ (high frequency and low amplitude or ‘desynchronised’) activity in the EEG; (2) singlets and clusters of rapid eye movements in the EOG channel; and (3) very low levels of muscle tone (or atonia) in the EMG channel. NREM sleep includes all sleep except REM and is, by convention, divided into four stages that correspond to increasing depth of sleep as indicated by the progressive dominance of the EEG by high-voltage, low-frequency (also termed ‘synchronised’) wave activity. Low frequency waves dominate the deepest stages of NREM (stages 3 and 4), which are also termed ‘slow-wave’ or ‘delta’ sleep (see </span><a class="workspace-trigger" data-dcnode-id="5031" href="#FIG1" name="bFIG1"><span data-dcnode-id="5032" instrument_node="">I</span></a><span data-dcnode-id="5030" instrument_node="">). See Hobson </span><a class="workspace-trigger" data-dcnode-id="5028" href="#BIB62" name="bBIB62"><span data-dcnode-id="5029" instrument_node="">c</span></a><span data-dcnode-id="5027" instrument_node=""> for a comprehensive primer on sleep physiology.</span></p><figure class="figure text-xs" data-dcnode-id="4998" id="FIG1"><span data-dcnode-id="5010"><img alt="" data-dcnode-id="5025" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox1.jpg&amp;raw"><span data-dcnode-id="5024" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5011"><li data-dcnode-id="5018"><a class="anchor download-link u-font-sans" data-dcnode-id="5019" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox1_lrg.jpg" target="_blank" title="Download high-res image (98KB)"><span class="anchor-text" data-dcnode-id="5020"><span data-dcnode-id="5023" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5021"><span data-dcnode-id="5022" instrument_node="">Download high-res image (98KB)</span></span></span></a></li><li data-dcnode-id="5012"><a class="anchor download-link u-font-sans" data-dcnode-id="5013" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5014"><span data-dcnode-id="5017" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4999"><span data-dcnode-id="5000"><p data-dcnode-id="5001" id="spara10"><span class="label" data-dcnode-id="5008"><span data-dcnode-id="5009" instrument_node="">Fig. I</span></span><span data-dcnode-id="5007" instrument_node="">. </span><span data-dcnode-id="5005" instrument_node="">The changes in EEG activity throughout the sleep–wake cycle and their graphic representations in hypnogram. The awake state is dominated by beta frequency (&gt;13 Hz), whereas in Stage I alpha waves (8–12 Hz) predominate. The major feature of Stage II is the appearance of sleep spindles and K-complexes. Delta waves (0.5–2 Hz) make up 20–50% of the Stage III and more than 50% of Stage IV (Stage III and Stage IV being jointly named slow-wave sleep). REM phase is characterized by mixed but mostly high-frequency waves. Modified with permission from Ref. </span><a class="workspace-trigger" data-dcnode-id="5003" href="#BIB63" name="bBIB63"><span data-dcnode-id="5004" instrument_node="">d</span></a><span data-dcnode-id="5002" instrument_node="">.</span></p></span></span></figure></div></div><section class="bibliography u-font-serif text-s" data-dcnode-id="4874" id="bibl10"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="4875" id="cebibsec10"><dl class="references" data-dcnode-id="4876" id="reference-links-cebibsec10"><dt class="label" data-dcnode-id="4991"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4992" href="#bBIB60" id="ref-id-BIB60"><span data-dcnode-id="4993" instrument_node="">a</span></a></dt><dd class="reference" data-dcnode-id="4982" id="oref10"><span data-dcnode-id="4986"><span data-dcnode-id="4990" instrument_node="">Rechtschaffen, A. and Kales, A. (1968) </span><em data-dcnode-id="4988"><span data-dcnode-id="4989" instrument_node="">A Manual of Standardized terminology: Techniques and Scoring System for Sleep Stages of Human Subjects</span></em><span data-dcnode-id="4987" instrument_node="">, Brain Information Service/Brain Research Institute, University of California at Los Angeles</span></span><div class="ReferenceLinks u-font-sans" data-dcnode-id="4983"><a class="link" data-dcnode-id="4984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DRechtschaffen%2C%2520A.%2520and%2520Kales%2C%2520A.%2520%2520A%2520Manual%2520of%2520Standardized%2520terminology%3A%2520Techniques%2520and%2520Scoring%2520System%2520for%2520Sleep%2520Stages%2520of%2520Human%2520Subjects%2C%2520Brain%2520Information%2520ServiceBrain%2520Research%2520Institute%2C%2520University%2520of%2520California%2520at%2520Los%2520Angeles" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4985" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="4979"><a data-aa-button="sd:product:journal:article:location=r     }"><span data-dcnode-id="4940" instrument_node=""></span></els-view-pdf-element></div><a aria-describedby="ref-id-sbref10" class="link" data-dcnode-id="4935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1126/science.118.3062.273" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4936" instrument_node="">CrossRef</span></a><a aria-describedby="ref-id-sbref10" class="link" data-dcnode-id="4933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scopus.com/inward/record.url%3Feid%3D2-s2.0-3242765033%26partnerID%3D10%26rel%3DR3.0.0" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4934" instrument_node="">View Record in Scopus</span></a><a aria-describedby="ref-id-sbref10" class="link" data-dcnode-id="4931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DRegularly%2520occuring%2520periods%2520of%2520eye%2520motility%2520and%2520concomitant%2520phenomena%2520during%2520sleep%26publication_year%3D1953%26author%3DE.%2520Aserinsky%26author%3DN.%2520Kleitman" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4932" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="4926"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4927" href="#bBIB62" id="ref-id-BIB62"><span data-dcnode-id="4928" instrument_node="">c</span></a></dt><dd class="reference" data-dcnode-id="4903" id="sbref20"><div class="contribution" data-dcnode-id="4920"><span data-dcnode-id="4925" instrument_node="">J.A.</span><span data-dcnode-id="4923" instrument_node=""> </span><span data-dcnode-id="4921" instrument_node="">Hobson</span></div><div class="host" data-dcnode-id="4908" id="ref-id-sbref20"><span data-dcnode-id="4919" instrument_node="">Sleep</span><span data-dcnode-id="4917" instrument_node="">, </span><span data-dcnode-id="4915" instrument_node="">Scientific American Library</span><span data-dcnode-id="4913" instrument_node=""> (</span><span data-dcnode-id="4911" instrument_node="">1989</span><span data-dcnode-id="4909" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="4904"><span data-dcnode-id="4907" instrument_node=""></span><a aria-describedby="ref-id-sbref20" class="link" data-dcnode-id="4905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DSleep%26publication_year%3D1989%26author%3DJ.A.%2520Hobson" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4906" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="4900"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4901" href="#bBIB63" id="ref-id-BIB63"><span data-dcnode-id="4902" instrument_node="">d</span></a></dt><dd class="reference" data-dcnode-id="4877" id="sbref30"><div class="contribution" data-dcnode-id="4894"><span data-dcnode-id="4899" instrument_node="">J.A.</span><span data-dcnode-id="4897" instrument_node=""> </span><span data-dcnode-id="4895" instrument_node="">Hobson</span></div><div class="host" data-dcnode-id="4882" id="ref-id-sbref30"><span data-dcnode-id="4893" instrument_node="">Consciousness</span><span data-dcnode-id="4891" instrument_node="">, </span><span data-dcnode-id="4889" instrument_node="">Scientific American Library</span><span data-dcnode-id="4887" instrument_node=""> (</span><span data-dcnode-id="4885" instrument_node="">1999</span><span data-dcnode-id="4883" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="4878"><span data-dcnode-id="4881" instrument_node=""></span><a aria-describedby="ref-id-sbref30" class="link" data-dcnode-id="4879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DConsciousness%26publication_year%3D1999%26author%3DJ.A.%2520Hobson" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4880" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section></div></div></section><section data-dcnode-id="4173" id="cesec40"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4869" id="cestitle100"><span data-dcnode-id="4870" instrument_node="">The prefrontal cortex: executive functions and sleep</span></h2><div data-dcnode-id="4174"><p data-dcnode-id="4855" id="para160"><span data-dcnode-id="4868" instrument_node="">Functions of the prefrontal cortex that are most relevant to the self-conscious awareness that is lost in sleep are commonly termed ‘executive’. These include self-observation, planning, prioritizing and decision-making abilities, which are, in turn, based upon more basic cognitive capacities such as attention, working memory, temporal memory and behavioral inhibition </span><a class="workspace-trigger" data-dcnode-id="4866" href="#BIB11" name="bBIB11"><span data-dcnode-id="4867" instrument_node="">11.</span></a><span data-dcnode-id="4865" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4863" href="#BIB12" name="bBIB12"><span data-dcnode-id="4864" instrument_node="">12.</span></a><span data-dcnode-id="4862" instrument_node="">. These functions are subserved by the nonmotor anterior and medial regions of the frontal cortex that are referred to collectively as the prefrontal cortex (see </span><a class="workspace-trigger" data-dcnode-id="4860" href="#BOX2" name="bBOX2"><span data-dcnode-id="4861" instrument_node="">Box 2</span></a><span data-dcnode-id="4859" instrument_node=""> for an overview of the subregions and functions of the prefrontal cortex). In the frontal lobes, the prefrontal cortex shows the greatest change from waking to sleep </span><a class="workspace-trigger" data-dcnode-id="4857" href="#BIB13" name="bBIB13"><span data-dcnode-id="4858" instrument_node="">[13]</span></a><span data-dcnode-id="4856" instrument_node="">. In summary, the changes associated with the transition from waking to NREM sleep might be ascribed to a globally reduced level of activity. This is followed by the selective reactivation of the most posterior and medial prefrontal areas and continued deactivation of anterior and lateral portions at the onset of REM sleep.</span></p><div aria-label="" class="article-textbox" data-dcnode-id="4175" id="BOX2" role="region"><span class="label" data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">Box 2</span></span><h2 class="article-title" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">Box 2. Neuropsychology of the prefrontal cortex</span></h2><div data-dcnode-id="4763"><section data-dcnode-id="4803" id="cesec10"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4849" id="cestitle20"><span data-dcnode-id="4850" instrument_node="">Dorsolateral prefrontal cortex (DLPFC)</span></h3><div data-dcnode-id="4812"><p data-dcnode-id="4841" id="para20"><span data-dcnode-id="4848" instrument_node="">The involvement of the DLPFC (see </span><a class="workspace-trigger" data-dcnode-id="4846" href="#FIG2" name="bFIG2"><span data-dcnode-id="4847" instrument_node="">Fig. I</span></a><span data-dcnode-id="4845" instrument_node="">a) in working memory has been studied intensively in monkeys. These studies indicate that the DLPFC has a role in the temporal order of information retrieval. A recent study in humans </span><a class="workspace-trigger" data-dcnode-id="4843" href="#BIB64" name="bBIB64"><span data-dcnode-id="4844" instrument_node="">a</span></a><span data-dcnode-id="4842" instrument_node=""> described the area specialized for spatial working memory to be located ‘more superiorly and posteriorly than in the monkey.’</span></p><figure class="figure text-xs" data-dcnode-id="4813" id="FIG2"><span data-dcnode-id="4825"><img alt="" data-dcnode-id="4840" height="452" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox2.jpg&amp;raw"><span data-dcnode-id="4839" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4826"><li data-dcnode-id="4833"><a class="anchor download-link u-font-sans" data-dcnode-id="4834" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox2_lrg.jpg" target="_blank" title="Download high-res image (150KB)"><span class="anchor-text" data-dcnode-id="4835"><span data-dcnode-id="4838" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Download high-res image (150KB)</span></span></span></a></li><li data-dcnode-id="4827"><a class="anchor download-link u-font-sans" data-dcnode-id="4828" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4829"><span data-dcnode-id="4832" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4830"><span data-dcnode-id="4831" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4814"><span data-dcnode-id="4815"><p data-dcnode-id="4816" id="spara20"><span class="label" data-dcnode-id="4823"><span data-dcnode-id="4824" instrument_node="">Fig. I</span></span><span data-dcnode-id="4822" instrument_node="">. </span><span data-dcnode-id="4820" instrument_node="">Approximate location of Brodmann areas (coloured yellow) considered to form (a) the dorsolateral prefrontal cortex (dorsal surface of the left hemisphere is shown), and (b) the ventromedial prefrontal cortex (median plane cut of the right hemisphere). Modified with permission from Ref. </span><a class="workspace-trigger" data-dcnode-id="4818" href="#BIB76" name="bBIB76"><span data-dcnode-id="4819" instrument_node="">m</span></a><span data-dcnode-id="4817" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="4804" id="para30"><span data-dcnode-id="4811" instrument_node="">Some psychological theories match what is known about the DLPFC from experience with patients. This is the case with Shallice's Supervisory Attention System (SAS), which intervenes when the routinized choice of behavioral schemata is confronted with a new situation </span><a class="workspace-trigger" data-dcnode-id="4809" href="#BIB65" name="bBIB65"><span data-dcnode-id="4810" instrument_node="">b</span></a><span data-dcnode-id="4808" instrument_node="">. Lesion studies confirm the prolongation of response-initiation times, and the appearance of difficulties in response suppression. The hypothesis of a central executive </span><a class="workspace-trigger" data-dcnode-id="4806" href="#BIB66" name="bBIB66"><span data-dcnode-id="4807" instrument_node="">c</span></a><span data-dcnode-id="4805" instrument_node="">, where the outputs from a phonological loop and a visuo-spatial sketch pad are supposed to meet, could also be nested in the prefrontal cortex.</span></p></section><section data-dcnode-id="4764" id="cesec20"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4801" id="cestitle30"><span data-dcnode-id="4802" instrument_node="">Ventromedial prefrontal cortex (VMPFC)</span></h3><p data-dcnode-id="4790" id="para40"><span data-dcnode-id="4800" instrument_node="">The VMPFC consists primarily of the orbitofrontal cortex and the anterior cingulate, and is also known as the ‘limbic’ cortex (see </span><a class="workspace-trigger" data-dcnode-id="4798" href="#FIG2" name="bFIG2"><span data-dcnode-id="4799" instrument_node="">Fig. I</span></a><span data-dcnode-id="4797" instrument_node="">b). It has been demonstrated that the VMPFC plays a key role in decision making, social cognition and social judgement </span><a class="workspace-trigger" data-dcnode-id="4795" href="#BIB67" name="bBIB67"><span data-dcnode-id="4796" instrument_node="">d</span></a><span data-dcnode-id="4794" instrument_node="">. This concept is most clearly enunciated in Damasio’s somatic-marker hypothesis, which ascribes to the VMPFC the role of ‘marking’ complex stimuli (such as social situations) with records of past autonomic and emotional responses and thereby makes possible high level social judgments, such as behavioral inhibition and assessment of complex social cues </span><a class="workspace-trigger" data-dcnode-id="4792" href="#BIB68" name="bBIB68"><span data-dcnode-id="4793" instrument_node="">e</span></a><span data-dcnode-id="4791" instrument_node="">.</span></p><p data-dcnode-id="4767" id="para50"><span data-dcnode-id="4789" instrument_node="">More complex clinical hypotheses of the prefrontal-cortical function have been advanced, but most of them still need to be tested: attention deficit disorder has been linked to the disturbance of prefrontal cortical inhibitory functions </span><a class="workspace-trigger" data-dcnode-id="4787" href="#BIB69" name="bBIB69"><span data-dcnode-id="4788" instrument_node="">f</span></a><span data-dcnode-id="4786" instrument_node="">; schizophrenia has been ascribed to deficits of the DLPFC </span><a class="workspace-trigger" data-dcnode-id="4784" href="#BIB70" name="bBIB70"><span data-dcnode-id="4785" instrument_node="">g</span></a><span data-dcnode-id="4783" instrument_node="">; obsessive-compulsive disorder has been related to a higher activity in the orbitofrontal cortex </span><a class="workspace-trigger" data-dcnode-id="4781" href="#BIB71" name="bBIB71"><span data-dcnode-id="4782" instrument_node="">h</span></a><span data-dcnode-id="4780" instrument_node="">: and the frontal pole (Brodmann area 10) was proposed to monitor the reward value of cognitive processes </span><a class="workspace-trigger" data-dcnode-id="4778" href="#BIB72" name="bBIB72"><span data-dcnode-id="4779" instrument_node="">i</span></a><span data-dcnode-id="4777" instrument_node="">. Functional magnetic resonance (fMRI) has shown that the right DLPFC supports planning </span><a class="workspace-trigger" data-dcnode-id="4775" href="#BIB73" name="bBIB73"><span data-dcnode-id="4776" instrument_node="">j</span></a><span data-dcnode-id="4774" instrument_node="">. Right medial frontal lesions, in particular, were shown to impair the ability to infer mental states in others (‘theory of mind’) </span><a class="workspace-trigger" data-dcnode-id="4772" href="#BIB74" name="bBIB74"><span data-dcnode-id="4773" instrument_node="">k</span></a><span data-dcnode-id="4771" instrument_node="">, which is well matched by an fMRI finding of activation of the right anterior cingulum during similar tasks </span><a class="workspace-trigger" data-dcnode-id="4769" href="#BIB75" name="bBIB75"><span data-dcnode-id="4770" instrument_node="">l</span></a><span data-dcnode-id="4768" instrument_node="">.</span></p><p data-dcnode-id="4765" id="para60"><span data-dcnode-id="4766" instrument_node="">It is not by chance that neuroscientists are searching in the frontal lobes for the basis of the most sophisticated human abilities, because it is here that the roots of action as well as the roots of thought seem to intermingle.</span></p></section></div><section class="bibliography u-font-serif text-s" data-dcnode-id="4176" id="bibl20"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="4177" id="cebibsec20"><dl class="references" data-dcnode-id="4178" id="reference-links-cebibsec20"><dt class="label" data-dcnode-id="4758"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-n 231" instrument_node="">14</span><span data-dcnode-id="4229" instrument_node=""> (</span><span data-dcnode-id="4227" instrument_node="">2002</span><span data-dcnode-id="4225" instrument_node="">)</span><span data-dcnode-id="4223" instrument_node="">, pp. </span><span data-dcnode-id="4221" instrument_node="">170</span><span data-dcnode-id="4219" instrument_node="">-</span><span data-dcnode-id="4217" instrument_node="">181</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="4212"><span data-dcnode-id="4215" instrument_node=""></span><a aria-describedby="ref-id-sbref150" class="link" data-dcnode-id="4213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DMind%2520reading%253A%2520Neural%2520mechanisms%2520of%2520theory%2520of%2520mind%2520and%2520self-perspective%26publication_year%3D2002%26author%3DK.%2520Vogeley" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4214" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="4208"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="4209" href="#bBIB76" id="ref-id-BIB76"><span data-dcnode-id="4210" instrument_node="">m</span></a></dt><dd class="reference" data-dcnode-id="4179" id="sbref160"><div class="contribution" data-dcnode-id="4202"><span data-dcnode-id="4207" instrument_node="">H.C.</span><span data-dcnode-id="4205" instrument_node=""> </span><span data-dcnode-id="4203" instrument_node="">Elliott</span></div><div class="host" data-dcnode-id="4184" id="ref-id-sbref160"><span data-dcnode-id="4201" instrument_node="">Textbook of Neuroanatomy</span><span data-dcnode-id="4199" instrument_node=""> (</span><span data-dcnode-id="4197" instrument_node="">2nd edn</span><span data-dcnode-id="4195" instrument_node="">)</span><span data-dcnode-id="4193" instrument_node="">, </span><span data-dcnode-id="4191" instrument_node="">J.B. Lippincott</span><span data-dcnode-id="4189" instrument_node=""> (</span><span data-dcnode-id="4187" instrument_node="">1969</span><span data-dcnode-id="4185" instrument_node="">)</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="4180"><span data-dcnode-id="4183" instrument_node=""></span><a aria-describedby="ref-id-sbref160" class="link" data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DTextbook%2520of%2520Neuroanatomy%26publication_year%3D1969%26author%3DH.C.%2520Elliott" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="4182" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section></div></div></section><section data-dcnode-id="4079" id="cesec50"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4171" id="cestitle110"><span data-dcnode-id="4172" instrument_node="">The prefrontal cortex during normal sleep: recent findings</span></h2><p data-dcnode-id="4166" id="para170"><span data-dcnode-id="4170" instrument_node="">Sleep-related deactivation of prefrontal cortices has emerged as a descriptive and explanatory factor in studies of sleep physiology and psychology. Here we summarize these findings, followed by a consideration of the role of the prefrontal cortex in dreaming. We are aware that increased delta activity does not always mean (complete) inactivity (see, for example, Ref. </span><a class="workspace-trigger" data-dcnode-id="4168" href="#BIB14" name="bBIB14"><span data-dcnode-id="4169" instrument_node="">[14]</span></a><span data-dcnode-id="4167" instrument_node="">). Rather than evaluating the absolute metabolism of the prefrontal cortex, we consider ‘deactivation’ of the prefrontal cortex in terms of relative activity.</span></p><p data-dcnode-id="4125" id="para180"><span data-dcnode-id="4165" instrument_node="">The transition from waking to NREM is characterized by frontal deactivation as reported in positron emission tomography (PET) studies using either H</span><sub data-dcnode-id="4163"><span data-dcnode-id="4164" instrument_node="">2</span></sub><span data-dcnode-id="4162" instrument_node="">[</span><sup data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">15</span></sup><span data-dcnode-id="4159" instrument_node="">O] </span><a class="workspace-trigger" data-dcnode-id="4157" href="#BIB15" name="bBIB15"><span data-dcnode-id="4158" instrument_node="">15.</span></a><span data-dcnode-id="4156" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4154" href="#BIB16" name="bBIB16"><span data-dcnode-id="4155" instrument_node="">16.</span></a><span data-dcnode-id="4153" instrument_node=""> or </span><sup data-dcnode-id="4151"><span data-dcnode-id="4152" instrument_node="">18</span></sup><span data-dcnode-id="4150" instrument_node="">F deoxyglucose (</span><sup data-dcnode-id="4148"><span data-dcnode-id="4149" instrument_node="">18</span></sup><span data-dcnode-id="4147" instrument_node="">FDG) </span><a class="workspace-trigger" data-dcnode-id="4145" href="#BIB17" name="bBIB17"><span data-dcnode-id="4146" instrument_node="">[17]</span></a><span data-dcnode-id="4144" instrument_node=""> and quantitative EEG studies</span><a class="workspace-trigger" data-dcnode-id="4142" href="#BIB18" name="bBIB18"><span data-dcnode-id="4143" instrument_node="">18.</span></a><span data-dcnode-id="4141" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4139" href="#BIB19" name="bBIB19"><span data-dcnode-id="4140" instrument_node="">19.</span></a><span data-dcnode-id="4138" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4136" href="#BIB20" name="bBIB20"><span data-dcnode-id="4137" instrument_node="">20.</span></a><span data-dcnode-id="4135" instrument_node="">. Deactivation increases with the deepening of NREM sleep </span><a class="workspace-trigger" data-dcnode-id="4133" href="#BIB14" name="bBIB14"><span data-dcnode-id="4134" instrument_node="">[14]</span></a><span data-dcnode-id="4132" instrument_node=""> and is maintained in the transition from NREM to REM sleep </span><a class="workspace-trigger" data-dcnode-id="4130" href="#BIB21" name="bBIB21"><span data-dcnode-id="4131" instrument_node="">[21]</span></a><span data-dcnode-id="4129" instrument_node="">. However, with the onset of REM sleep, portions of the ventromedial, limbic-related prefrontal cortex and closely associated medial subcortex and cortex are reactivated, sometimes to levels that exceed those of waking </span><a class="workspace-trigger" data-dcnode-id="4127" href="#BIB22" name="bBIB22"><span data-dcnode-id="4128" instrument_node="">[22]</span></a><span data-dcnode-id="4126" instrument_node="">.</span></p><p data-dcnode-id="4108" id="para190"><span data-dcnode-id="4124" instrument_node="">For example, in a H</span><sub data-dcnode-id="4122"><span data-dcnode-id="4123" instrument_node="">2</span></sub><span data-dcnode-id="4121" instrument_node="">[</span><sup data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">15</span></sup><span data-dcnode-id="4118" instrument_node="">O] PET study that specifically compares REM with NREM sleep, the prefrontal areas reactivated during REM include anterior cingulate (BA 32), caudal orbital and medial prefrontal (BA 10) cortices </span><a class="workspace-trigger" data-dcnode-id="4116" href="#BIB13" name="bBIB13"><span data-dcnode-id="4117" instrument_node="">[13]</span></a><span data-dcnode-id="4115" instrument_node="">, but the DLPFC remained deactivated. Nofzinger </span><em data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">et al.</span></em><span data-dcnode-id="4112" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4110" href="#BIB23" name="bBIB23"><span data-dcnode-id="4111" instrument_node="">[23]</span></a><span data-dcnode-id="4109" instrument_node=""> have termed this frontal area the ‘anterior paralimbic REM activation area’ with the core structures being subgenual and pregenual anterior cingulate cortex, the amygdala and the insula. Nofzinger suggests that, in REM, these structures participate in ‘…the integration of neocortical function with basal forebrain-hypothalamic motivational and reward mechanisms.’</span></p><p data-dcnode-id="4097" id="para200"><span data-dcnode-id="4107" instrument_node="">Activation of the anterior cingulate cortex is increased consistently in REM in other PET studies (e.g. Ref. </span><a class="workspace-trigger" data-dcnode-id="4105" href="#BIB24" name="bBIB24"><span data-dcnode-id="4106" instrument_node="">[24]</span></a><span data-dcnode-id="4104" instrument_node="">). Not only does the DLPFC remain deactivated in REM but, on waking, the prefrontal cortex lags behind other regions in achieving waking levels of activation </span><a class="workspace-trigger" data-dcnode-id="4102" href="#BIB25" name="bBIB25"><span data-dcnode-id="4103" instrument_node="">[25]</span></a><span data-dcnode-id="4101" instrument_node="">. Added to the observation of a frontal predominance of power in the low-frequency band </span><a class="workspace-trigger" data-dcnode-id="4099" href="#BIB19" name="bBIB19"><span data-dcnode-id="4100" instrument_node="">[19]</span></a><span data-dcnode-id="4098" instrument_node=""> during the first NREM episode, the imaging evidence of the lag in activation on waking indicates a particularly high need for (recovery) sleep in the frontal region.</span></p><p data-dcnode-id="4080" id="para210"><span data-dcnode-id="4096" instrument_node="">It is no wonder that cortical areas are relatively deactivated during NREM sleep compared to wakefulness: in NREM sleep, the thalamocortical input is disabled and the intrinsic synchronous oscillations result in a significantly lower level of metabolism. At the beginning of the REM phase, however, activation of the acetylcholine system, starting from the pontine reticular formation, provokes a general increase in cortical activity </span><a class="workspace-trigger" data-dcnode-id="4094" href="#BIB26" name="bBIB26"><span data-dcnode-id="4095" instrument_node="">[26]</span></a><span data-dcnode-id="4093" instrument_node="">. We propose that the DLPFC remains relatively deactivated in REM sleep because it is directly inhibited by acetylcholine. Findings supporting this include a functional magnetic resonance study showing that acetylcholine-mediated enhancement increased the activity of extrastriate cortex but decreased the activity of the anterior prefrontal cortex </span><a class="workspace-trigger" data-dcnode-id="4091" href="#BIB27" name="bBIB27"><span data-dcnode-id="4092" instrument_node="">[27]</span></a><span data-dcnode-id="4090" instrument_node="">. It is possible that these differences are caused by differences in target neurons rather than the type of acetylcholine receptor activated because stimulation of muscarinic receptors can lead to either depolarization or hyperpolarization </span><a class="workspace-trigger" data-dcnode-id="4088" href="#BIB28" name="bBIB28"><span data-dcnode-id="4089" instrument_node="">[28]</span></a><span data-dcnode-id="4087" instrument_node=""> and different subtypes of interneurons in the same cortical layer can react differently to acetylcholine-mediated stimulation </span><a class="workspace-trigger" data-dcnode-id="4085" href="#BIB29" name="bBIB29"><span data-dcnode-id="4086" instrument_node="">[29]</span></a><span data-dcnode-id="4084" instrument_node="">. The delay in achieving waking levels of activation in the DLPFC compared to other regions </span><a class="workspace-trigger" data-dcnode-id="4082" href="#BIB25" name="bBIB25"><span data-dcnode-id="4083" instrument_node="">[25]</span></a><span data-dcnode-id="4081" instrument_node=""> might be explained by the finding that the DLPFC is scarcely innervated by noradrenaline-containing neurons and only moderately innervated by 5-HT-containing neurons. Thus it is possible that activity of the DLPFC is dependent mainly on other neurotransmitter systems, primarily those related to cortico–cortical pathways.</span></p></section><section data-dcnode-id="3334" id="cesec60"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4077" id="cestitle120"><span data-dcnode-id="4078" instrument_node="">The prefrontal cortex and dreaming</span></h2><p data-dcnode-id="4051" id="para220"><span data-dcnode-id="4076" instrument_node="">Relevant to the deficits in self-reflective awareness, orientation and memory during dreaming are studies using </span><sup data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">15</span></sup><span data-dcnode-id="4073" instrument_node="">O</span><sub data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">2</span></sub><span data-dcnode-id="4070" instrument_node=""> PET </span><a class="workspace-trigger" data-dcnode-id="4068" href="#BIB21" name="bBIB21"><span data-dcnode-id="4069" instrument_node="">[21]</span></a><span data-dcnode-id="4067" instrument_node=""> and SPECT </span><a class="workspace-trigger" data-dcnode-id="4065" href="#BIB30" name="bBIB30"><span data-dcnode-id="4066" instrument_node="">[30]</span></a><span data-dcnode-id="4064" instrument_node=""> that show that a vast area of DLPFC undergoes significant deactivation in REM. However, DLPFC deactivation during REM was reported in a study using </span><sup data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">18</span></sup><span data-dcnode-id="4061" instrument_node="">FDG </span><a class="workspace-trigger" data-dcnode-id="4059" href="#BIB22" name="bBIB22"><span data-dcnode-id="4060" instrument_node="">[22]</span></a><span data-dcnode-id="4058" instrument_node=""> and this discrepancy remains to be clarified. Nevertheless, it is likely that considerable portions of executive and association cortex that are active in waking are far less active in REM sleep, which leads Braun </span><em data-dcnode-id="4056"><span data-dcnode-id="4057" instrument_node="">et al.</span></em><span data-dcnode-id="4055" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4053" href="#BIB13" name="bBIB13"><span data-dcnode-id="4054" instrument_node="">[13]</span></a><span data-dcnode-id="4052" instrument_node=""> to speculate that’…REM sleep may constitute a state of generalized brain activity with the specific exclusion of executive systems which normally participate in the highest order analysis and integration of neural information.’</span></p><div data-dcnode-id="3335"><p data-dcnode-id="4046" id="para230"><span data-dcnode-id="4050" instrument_node="">Taken together, these results indicate that the forebrain activation and synthesis processes that underlie dreaming, with selective activation of the subcortical and cortical limbic structures (which mediate emotion) and relative inactivation of the DLPFC (which mediates directed thought), are very different from those during waking (see </span><a class="workspace-trigger" data-dcnode-id="4048" href="#BOX3" name="bBOX3"><span data-dcnode-id="4049" instrument_node="">Box 3</span></a><span data-dcnode-id="4047" instrument_node="">).</span></p><div aria-label="" class="article-textbox" data-dcnode-id="3336" id="BOX3" role="region"><span class="label" data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Box 3</span></span><h2 class="article-title" data-dcnode-id="4042"><span data-dcnode-id="4043" instrument_node="">Box 3. An updated activation-synthesis hypothesis of dreaming</span></h2><div data-dcnode-id="3953"><div data-dcnode-id="4002"><p data-dcnode-id="4031" id="para70"><span data-dcnode-id="4041" instrument_node="">As in waking, activation of the forebrain occurs through ascending arousal systems located in the brainstem reticular activating system </span><a class="workspace-trigger" data-dcnode-id="4039" href="#BIB77" name="bBIB77"><span data-dcnode-id="4040" instrument_node="">a</span></a><span data-dcnode-id="4038" instrument_node=""> and the basal forebrain </span><a class="workspace-trigger" data-dcnode-id="4036" href="#BIB78" name="bBIB78"><span data-dcnode-id="4037" instrument_node="">b</span></a><span data-dcnode-id="4035" instrument_node="">. Forebrain stimulation by such arousal systems in sleep probably facilitates the kind of consciousness typically encountered in dreaming (see </span><a class="workspace-trigger" data-dcnode-id="4033" href="#FIG3" name="bFIG3"><span data-dcnode-id="4034" instrument_node="">Fig. I</span></a><span data-dcnode-id="4032" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4003" id="FIG3"><span data-dcnode-id="4015"><img alt="" data-dcnode-id="4030" height="342" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox3.jpg&amp;raw"><span data-dcnode-id="4029" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4016"><li data-dcnode-id="4023"><a class="anchor download-link u-font-sans" data-dcnode-id="4024" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox3_lrg.jpg" target="_blank" title="Download high-res image (302KB)"><span class="anchor-text" data-dcnode-id="4025"><span data-dcnode-id="4028" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4026"><span data-dcnode-id="4027" instrument_node="">Download high-res image (302KB)</span></span></span></a></li><li data-dcnode-id="4017"><a class="anchor download-link u-font-sans" data-dcnode-id="4018" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1364661302019927-grbox3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4019"><span data-dcnode-id="4022" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4020"><span data-dcnode-id="4021" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4004"><span data-dcnode-id="4005"><p data-dcnode-id="4006" id="spara30"><span class="label" data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">Fig. I</span></span><span data-dcnode-id="4012" instrument_node="">. </span><span data-dcnode-id="4010" instrument_node="">Forebrain processes in normal dreaming: an integrated model. Presented are various brain structures and their activity during REM sleep. In each box, the first bullet corresponds to the anatomical definition of the structure(s), the second defines the function the structure supports in waking, and the third bullet suggests the function the structure might support in the formation of dreams. Modified with permission from Ref. </span><a class="workspace-trigger" data-dcnode-id="4008" href="#BIB88" name="bBIB88"><span data-dcnode-id="4009" instrument_node="">l</span></a><span data-dcnode-id="4007" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="3991" id="para80"><span data-dcnode-id="4001" instrument_node="">We hypothesize that the strong activation of the basal ganglia </span><a class="workspace-trigger" data-dcnode-id="3999" href="#BIB79" name="bBIB79"><span data-dcnode-id="4000" instrument_node="">c</span></a><span data-dcnode-id="3998" instrument_node=""> contributes to the ubiquitous fictive motion of dreams </span><a class="workspace-trigger" data-dcnode-id="3996" href="#BIB80" name="bBIB80"><span data-dcnode-id="3997" instrument_node="">d</span></a><span data-dcnode-id="3995" instrument_node="">. Motor cortices might participate in dream movement, as evidenced by the expression of dreamed action in rapid-eye-movement (REM) sleep-behavior disorder </span><a class="workspace-trigger" data-dcnode-id="3993" href="#BIB81" name="bBIB81"><span data-dcnode-id="3994" instrument_node="">e</span></a><span data-dcnode-id="3992" instrument_node="">; and premotor areas of the anterior cingulate cortex might integrate dream movement and emotion.</span></p><p data-dcnode-id="3962" id="para90"><span data-dcnode-id="3990" instrument_node="">Deactivation of frontal executive areas, such as the dorsolateral prefrontal cortex, during non-REM (NREM) sleep (e.g. Ref. </span><a class="workspace-trigger" data-dcnode-id="3988" href="#BIB82" name="bBIB82"><span data-dcnode-id="3989" instrument_node="">f</span></a><span data-dcnode-id="3987" instrument_node="">), followed by their failure to reactivate in REM (e.g. Ref. </span><a class="workspace-trigger" data-dcnode-id="3985" href="#BIB79" name="bBIB79"><span data-dcnode-id="3986" instrument_node="">c</span></a><span data-dcnode-id="3984" instrument_node="">) underlies the executive deficiencies that are prominent in dream mentation. In waking, prefrontal cortical areas are selectively activated during reasoning, episodic memory and working memory tasks (see Box 2). Our hypothesis is that, during dreaming, prefrontal deactivation leads to illogical thinking. Examples include </span><em data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">ad hoc</span></em><span data-dcnode-id="3981" instrument_node=""> explanations </span><a class="workspace-trigger" data-dcnode-id="3979" href="#BIB83" name="bBIB83"><span data-dcnode-id="3980" instrument_node="">g</span></a><span data-dcnode-id="3978" instrument_node="">, prominent mnemonic deficits </span><a class="workspace-trigger" data-dcnode-id="3976" href="#BIB84" name="bBIB84"><span data-dcnode-id="3977" instrument_node="">h</span></a><span data-dcnode-id="3975" instrument_node=""> and bizarre uncertainties. Interestingly, hypoperfusion of the frontal cortex is associated with pathological temporal limbic activation in epilepsy </span><a class="workspace-trigger" data-dcnode-id="3973" href="#BIB85" name="bBIB85"><span data-dcnode-id="3974" instrument_node="">i</span></a><span data-dcnode-id="3972" instrument_node="">, and reciprocal inhibition between frontal and limbic areas has been hypothesized to be involved in the etiology of depression and schizophrenia </span><a class="workspace-trigger" data-dcnode-id="3970" href="#BIB86" name="bBIB86"><span data-dcnode-id="3971" instrument_node="">j</span></a><span data-dcnode-id="3969" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3967" href="#BIB87" name="bBIB87"><span data-dcnode-id="3968" instrument_node="">k</span></a><span data-dcnode-id="3966" instrument_node="">. Thus REM sleep dreaming might be a normal physiological state of the brain that is analogous to psychopathological conditions in which limbic hyperactivation is combined with frontal hypoactivation </span><a class="workspace-trigger" data-dcnode-id="3964" href="#BIB88" name="bBIB88"><span data-dcnode-id="3965" instrument_node="">l</span></a><span data-dcnode-id="3963" instrument_node="">.</span></p><p data-dcnode-id="3954" id="para100"><span data-dcnode-id="3961" instrument_node="">At this early stage of research in dream neuropsychology, a few generalizations are beginning to emerge. First, ascending arousal systems activate the many forebrain regions involved in dream construction but do so in a manner chemically, and perhaps anatomically, different from waking arousal processes. Second, cortical areas activated in REM favor more medial circuits that link posterior association and paralimbic areas rather than circuits that include the primary sensory cortex and/or frontal executive regions </span><a class="workspace-trigger" data-dcnode-id="3959" href="#BIB89" name="bBIB89"><span data-dcnode-id="3960" instrument_node="">m</span></a><span data-dcnode-id="3958" instrument_node="">. Third, subcortical circuits that involve the limbic structures, striatum, diencephalon and the brainstem contribute strongly to regional brain activation in REM and, therefore, to the physiological substrate of dreaming (see </span><a class="workspace-trigger" data-dcnode-id="3956" href="#FIG3" name="bFIG3"><span data-dcnode-id="3957" instrument_node="">Fig. I</span></a><span data-dcnode-id="3955" instrument_node=""> for a summary).</span></p></div><section class="bibliography u-font-serif text-s" data-dcnode-id="3337" id="bibl30"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="3338" id="cebibsec30"><dl class="references" data-dcnode-id="3339" id="reference-links-cebibsec30"><dt class="label" data-dcnode-id="3948"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3949" href="#bBIB77" id="ref-id-BIB77"><span data-dcnode-id="3950" instrument_node="">a</span></a></dt><dd class="reference" data-dcnode-id="3907" id="sbref170"><div class="contribution" data-dcnode-id="3939"><span data-dcnode-id="3947" instrument_node="">M.</span><span data-dcnode-id="3945" instrument_node=""> </span><span data-dcnode-id="3943" instrument_node="">Steriade</span><div data-dcnode-id="3940" id="ref-id-sbref170"><strong class="title" data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">Arousal: Revisiting the reticular activating system</span></strong></div></div><div class="host" data-dcnode-id="3919"><span data-dcnode-id="3938" instrument_node="">Science</span><span data-dcnode-id="3936" instrument_node="">, </span><span data-dcnode-id="3934" instrument_node="">272</span><span data-dcnode-id="3932" instrument_node=""> (</span><span data-dcnode-id="3930" instrument_node="">1996</span><span data-dcnode-id="3928" instrument_node="">)</span><span data-dcnode-id="3926" instrument_node="">, pp. </span><span data-dcnode-id="3924" instrument_node="">225</span><span data-dcnode-id="3922" instrument_node=" node-id="3326" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3324" href="#BIB32" name="bBIB32"><span data-dcnode-id="3325" instrument_node="">32.</span></a><span data-dcnode-id="3323" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3321" href="#BIB33" name="bBIB33"><span data-dcnode-id="3322" instrument_node="">33.</span></a><span data-dcnode-id="3320" instrument_node="">, temporal memory </span><a class="workspace-trigger" data-dcnode-id="3318" href="#BIB34" name="bBIB34"><span data-dcnode-id="3319" instrument_node="">34.</span></a><span data-dcnode-id="3317" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3315" href="#BIB35" name="bBIB35"><span data-dcnode-id="3316" instrument_node="">35.</span></a><span data-dcnode-id="3314" instrument_node="">, logical reasoning </span><a class="workspace-trigger" data-dcnode-id="3312" href="#BIB36" name="bBIB36"><span data-dcnode-id="3313" instrument_node="">[36]</span></a><span data-dcnode-id="3311" instrument_node="">, working memory </span><a class="workspace-trigger" data-dcnode-id="3309" href="#BIB37" name="bBIB37"><span data-dcnode-id="3310" instrument_node="">37.</span></a><span data-dcnode-id="3308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3306" href="#BIB38" name="bBIB38"><span data-dcnode-id="3307" instrument_node="">38.</span></a><span data-dcnode-id="3305" instrument_node=""> and planning </span><a class="workspace-trigger" data-dcnode-id="3303" href="#BIB31" name="bBIB31"><span data-dcnode-id="3304" instrument_node="">[31]</span></a><span data-dcnode-id="3302" instrument_node="">. However, a few studies have investigated inhibitory capabilities </span><a class="workspace-trigger" data-dcnode-id="3300" href="#BIB33" name="bBIB33"><span data-dcnode-id="3301" instrument_node="">[33]</span></a><span data-dcnode-id="3299" instrument_node=""> and decision making </span><a class="workspace-trigger" data-dcnode-id="3297" href="#BIB39" name="bBIB39"><span data-dcnode-id="3298" instrument_node="">[39]</span></a><span data-dcnode-id="3296" instrument_node="">, functions that are thought to be subserved by ventral (orbital) prefrontal areas </span><a class="workspace-trigger" data-dcnode-id="3294" href="#BIB34" name="bBIB34"><span data-dcnode-id="3295" instrument_node="">34.</span></a><span data-dcnode-id="3293" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3291" href="#BIB40" name="bBIB40"><span data-dcnode-id="3292" instrument_node="">40.</span></a><span data-dcnode-id="3290" instrument_node="">.</span></p><p data-dcnode-id="3242" id="para260"><span data-dcnode-id="3288" instrument_node="">One night’s acute total-sleep deprivation reduces performance on neuropsychological tasks that are believed to be subserved by the prefrontal cortex </span><a class="workspace-trigger" data-dcnode-id="3286" href="#BIB31" name="bBIB31"><span data-dcnode-id="3287" instrument_node="">31.</span></a><span data-dcnode-id="3285" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3283" href="#BIB32" name="bBIB32"><span data-dcnode-id="3284" instrument_node="">32.</span></a><span data-dcnode-id="3282" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3280" href="#BIB33" name="bBIB33"><span data-dcnode-id="3281" instrument_node="">33.</span></a><span data-dcnode-id="3279" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3277" href="#BIB34" name="bBIB34"><span data-dcnode-id="3278" instrument_node="">34.</span></a><span data-dcnode-id="3276" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3274" href="#BIB35" name="bBIB35"><span data-dcnode-id="3275" instrument_node="">35.</span></a><span data-dcnode-id="3273" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3271" href="#BIB36" name="bBIB36"><span data-dcnode-id="3272" instrument_node="">36.</span></a><span data-dcnode-id="3270" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3268" href="#BIB38" name="bBIB38"><span data-dcnode-id="3269" instrument_node="">38.</span></a><span data-dcnode-id="3267" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3265" href="#BIB39" name="bBIB39"><span data-dcnode-id="3266" instrument_node="">39.</span></a><span data-dcnode-id="3264" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3262" href="#BIB41" name="bBIB41"><span data-dcnode-id="3263" instrument_node="">41.</span></a><span data-dcnode-id="3261" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3259" href="#BIB42" name="bBIB42"><span data-dcnode-id="3260" instrument_node="">42.</span></a><span data-dcnode-id="3258" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3256" href="#BIB43" name="bBIB43"><span data-dcnode-id="3257" instrument_node="">43.</span></a><span data-dcnode-id="3255" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3253" href="#BIB44" name="bBIB44"><span data-dcnode-id="3254" instrument_node="">44.</span></a><span data-dcnode-id="3252" instrument_node="">. Moreover, neuroimaging studies have found profound effects of one night’s total sleep deprivation on the blood flow to prefrontal areas which correspond to the measured deteriorations in prefrontal task performance </span><a class="workspace-trigger" data-dcnode-id="3250" href="#BIB37" name="bBIB37"><span data-dcnode-id="3251" instrument_node="">37.</span></a><span data-dcnode-id="3249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3247" href="#BIB45" name="bBIB45"><span data-dcnode-id="3248" instrument_node="">45.</span></a><span data-dcnode-id="3246" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3244" href="#BIB46" name="bBIB46"><span data-dcnode-id="3245" instrument_node="">46.</span></a><span data-dcnode-id="3243" instrument_node="">. The majority of neuropsychological performance measurements and studies of regional cerebral metabolism use total sleep deprivation thereby depriving subjects of both NREM and REM sleep.</span></p><p data-dcnode-id="3228" id="para270"><span data-dcnode-id="3241" instrument_node="">As in normal sleep </span><a class="workspace-trigger" data-dcnode-id="3239" href="#BIB18" name="bBIB18"><span data-dcnode-id="3240" instrument_node="">18.</span></a><span data-dcnode-id="3238" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3236" href="#BIB19" name="bBIB19"><span data-dcnode-id="3237" instrument_node="">19.</span></a><span data-dcnode-id="3235" instrument_node="">, a frontal predominance in the delta (0.5–7 Hz) and alpha (8–12 Hz) band was noted during sleep deprivation; this frontal synchronization increased with prolonged waking </span><a class="workspace-trigger" data-dcnode-id="3233" href="#BIB20" name="bBIB20"><span data-dcnode-id="3234" instrument_node="">[20]</span></a><span data-dcnode-id="3232" instrument_node=""> and was attenuated by sleep satiation attained with intermittent naps </span><a class="workspace-trigger" data-dcnode-id="3230" href="#BIB47" name="bBIB47"><span data-dcnode-id="3231" instrument_node="">[47]</span></a><span data-dcnode-id="3229" instrument_node="">.</span></p><p data-dcnode-id="3199" id="para280"><span data-dcnode-id="3227" instrument_node="">Some recent studies of groups of young adults failed to demonstrate deficits in executive function following one night’s sleep deprivation </span><a class="workspace-trigger" data-dcnode-id="3225" href="#BIB48" name="bBIB48"><span data-dcnode-id="3226" instrument_node="">48.</span></a><span data-dcnode-id="3224" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3222" href="#BIB49" name="bBIB49"><span data-dcnode-id="3223" instrument_node="">49.</span></a><span data-dcnode-id="3221" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3219" href="#BIB50" name="bBIB50"><span data-dcnode-id="3220" instrument_node="">50.</span></a><span data-dcnode-id="3218" instrument_node="">. One possible cause for this discrepancy might be the adaptation to a chronically sleep-deprived lifestyle in the young, healthy, collegiate populations that are studied traditionally </span><a class="workspace-trigger" data-dcnode-id="3216" href="#BIB51" name="bBIB51"><span data-dcnode-id="3217" instrument_node="">[51]</span></a><span data-dcnode-id="3215" instrument_node="">. In support of this, Friedmann </span><em data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">et al.</span></em><span data-dcnode-id="3212" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="3210" href="#BIB52" name="bBIB52"><span data-dcnode-id="3211" instrument_node="">[52]</span></a><span data-dcnode-id="3209" instrument_node=""> found no behavioral effects in subjects who had undergone 6–8 months of gradual sleep restriction (down to 4.5–5.5 h sleep per night). Similarly, Blagrove </span><em data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">et al.</span></em><span data-dcnode-id="3206" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3204" href="#BIB36" name="bBIB36"><span data-dcnode-id="3205" instrument_node="">[36]</span></a><span data-dcnode-id="3203" instrument_node=""> report that reducing sleep to 5.2 h each night for 4 weeks (or 4.3 h each night for 4 nights or 5.3 h each night for 18 nights) produced no change in logical reasoning. In a meta-analysis, Pilcher and Huffcutt </span><a class="workspace-trigger" data-dcnode-id="3201" href="#BIB53" name="bBIB53"><span data-dcnode-id="3202" instrument_node="">[53]</span></a><span data-dcnode-id="3200" instrument_node=""> conclude that sleep deprivation affects mood more than cognitive functions.</span></p><p data-dcnode-id="3194" id="para290"><span data-dcnode-id="3198" instrument_node="">In the case of patients with obstructive sleep apnoea, findings more consistently indicate significant executive dysfunction (reviewed in Ref. </span><a class="workspace-trigger" data-dcnode-id="3196" href="#BIB54" name="bBIB54"><span data-dcnode-id="3197" instrument_node="">[54]</span></a><span data-dcnode-id="3195" instrument_node="">). However, in these cases, there is also the possibility of a direct effect of hypoxia on cerebral tissue.</span></p><p data-dcnode-id="3189" id="para300"><span data-dcnode-id="3193" instrument_node="">An additional explanation for the negative results of some sleep-deprivation studies is the suggestion from Harrison and Horne </span><a class="workspace-trigger" data-dcnode-id="3191" href="#BIB55" name="bBIB55"><span data-dcnode-id="3192" instrument_node="">[55]</span></a><span data-dcnode-id="3190" instrument_node=""> that in the simple tasks that are usually applied, the motivation of the subjects is typically low and the monotony of the tasks high, whereas the highly motivating complex tasks that are related to financial and other gains in everyday life dampen the effects of short-term sleep-deprivation.</span></p><p data-dcnode-id="3184" id="para310"><span data-dcnode-id="3188" instrument_node="">Better-controlled studies as well as thorough meta-analyses are necessary to resolve these conflicting findings. The development of prefrontal tasks that have a higher degree of reproducibility and allow the same subjects to be studied repeatedly (see, for example, Ref. </span><a class="workspace-trigger" data-dcnode-id="3186" href="#BIB56" name="bBIB56"><span data-dcnode-id="3187" instrument_node="">[56]</span></a><span data-dcnode-id="3185" instrument_node="">) is one approach that should be useful in resolving these discrepancies.</span></p></section><section data-dcnode-id="3167" id="cesec80"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3181" id="cestitle140"><span data-dcnode-id="3182" instrument_node="">Conclusion</span></h2><p data-dcnode-id="3170" id="para320"><span data-dcnode-id="3180" instrument_node="">The concept of hypofrontality, often in the presence of accentuated limbic or posterior perceptual cortical activity, may offer a convergent explanatory principle that links dreaming with a wide variety of psychopathological conditions </span><a class="workspace-trigger" data-dcnode-id="3178" href="#BIB57" name="bBIB57"><span data-dcnode-id="3179" instrument_node="">57.</span></a><span data-dcnode-id="3177" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3175" href="#BIB58" name="bBIB58"><span data-dcnode-id="3176" instrument_node="">58.</span></a><span data-dcnode-id="3174" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3172" href="#BIB59" name="bBIB59"><span data-dcnode-id="3173" instrument_node="">59.</span></a><span data-dcnode-id="3171" instrument_node="">. In this review, we have advanced the idea that the deactivation of the prefrontal cortex during REM sleep is the result of direct acetylcholine-mediated inhibition of this cortical region. According to our proposal, cholinergic pathways are responsible for the reactivation in REM sleep of the prefrontal limbic cortex, but not of the DLPFC, thus depriving dream mentation of logical reasoning capacities.</span></p><p data-dcnode-id="3168" id="para330"><span data-dcnode-id="3169" instrument_node="">Defective frontal functioning is also observed after sleep deprivation. The parallel slowing of EEG activity, which increases after prolonged waking and recovers after the subsequent sleep period, sheds additional light on the particular sensitivity of the prefrontal cortex to rest and sleep.</span></p></section></div><section data-dcnode-id="3161" id="ceack10"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3164" id="cestitle150"><span data-dcnode-id="3165" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="3162" id="para340"><span data-dcnode-id="3163" instrument_node="">This work was supported by NIDA RO1-DA11744–01A1.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3156"><button class="button button-anchor" data-dcnode-id="3157" type="button"><span class="button-text" data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3155"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="374" id="bibl40"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3153"><span data-dcnode-id="3154" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="375" id="cebibsec40"><dl class="references" data-dcnode-id="376" id="reference-links-cebibsec40"><dt class="label" data-dcnode-id="3150"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3151" href="#bBIB1" id="ref-id-BIB1"><span data-dcnode-id="3152" instrument_node="">1.</span></a></dt><dd class="reference" data-dcnode-id="3112" id="sbref300"><div class="contribution" data-dcnode-id="3137"><span data-dcnode-id="3149" instrument_node="">J.A.</span><span data-dcnode-id="3147" instrument_node=""> </span><span data-dcnode-id="3145" instrument_node="">Hobson</span><span data-dcnode-id="3143" instrument_node="">, </span><em data-dcnode-id="3141"><span data-dcnode-id="3142" instrument_node=""> et al.</span></em><div data-dcnode-id="3138" id="ref-id-sbref300"><strong class="title" data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">Dreaming and the brain: Toward a cognitive neuroscience of conscious states</span></strong></div></div><div class="host" data-dcnode-id="3117"><span data-dcnode-id="3136" instrument_node="">Behav. Brain Sci.</span><span data-dcnode-id="3134" instrument_node="">, </span><span data-dcnode-id="3132" instrument_node="">23</span><span data-dcnode-id="31
