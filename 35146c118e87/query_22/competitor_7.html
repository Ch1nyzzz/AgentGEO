="css-z468a2" data-dcnode-id="443"><h1 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">The science behind lucid dreaming</span></h1><section class="css-19y29pm" data-dcnode-id="756" data-testid="byline"><div class="css-1q67gt9" data-dcnode-id="770"><div class="css-1edxg1f" data-dcnode-id="771"><img alt="" data-dcnode-id="772" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/06/500x500_Maria_Cohut.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="757"><span data-dcnode-id="766"><span data-dcnode-id="769" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/maria-cohut"><span data-dcnode-id="768" instrument_node="">Maria Cohut, Ph.D.</span></a></span><span data-dcnode-id="764"><span data-dcnode-id="765" instrument_node=""> on September 27, 2019</span></span><span data-dcnode-id="763" instrument_node=""> — </span><span class="css-st6t3g" data-dcnode-id="761" role="button" tabindex="0"><span data-dcnode-id="762" instrument_node="">Fact checked</span></span><span data-dcnode-id="760" instrument_node=""> by</span><span data-dcnode-id="758" instrument_node=""> Paula Field</span></div></section><div data-dcnode-id="474"><article class="article-body css-d2znx6 undefined" data-dcnode-id="476"><div class="css-1u22pos" data-dcnode-id="720"><span data-dcnode-id="755" style="font-size:0;line-height:0"></span><div data-dcnode-id="754"></div><div data-dcnode-id="751"><p class="css-dmtxcr" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">In lucid dreams, the dreamer realizes they are dreaming even as they remain asleep. What is the science behind this intriguing consciousness phenomenon? This special feature looks at the current research. </span></p></div><p data-dcnode-id="746"><img alt="image of a boat and the night sky" data-dcnode-id="750" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-a-boat-and-the-night-sky.jpg&amp;raw"><br data-dcnode-id="749"><em data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">Can scientists explain lucid dreams? Read this special feature to find out what researchers have learned so far.</span></em></p><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Typically, when we dream, we are not aware that we are dreaming, and the most unlikely events, characters, and environments seem real to us.</span></p><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">But now and again, some of us realize that we are in a dream as we are dreaming. This phenomenon is called “lucid dreaming,” and it has stirred the interest of researchers and the public alike.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Learning to control aspects of your dreams can be a great way of exploring activities you could never do in real life, facing and overcoming fears, and learning more about your subconscious.</span></p><p data-dcnode-id="732"><span data-dcnode-id="739" instrument_node="">In a </span><a class="content-link css-1pg8eb5" data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/323077.php"><span data-dcnode-id="738" instrument_node="">previous special feature</span></a><span data-dcnode-id="736" instrument_node=""> on </span><em data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Medical News Today,</span></em><span data-dcnode-id="733" instrument_node=""> we have explained what lucid dreams are, talked about some techniques you can apply to achieve them, and looked at whether there are any risks associated with this practice.</span></p><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">In this article, we take that discussion a step further, looking at some of the science behind lucid dreaming.</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">So if you are interested in finding out how common lucid dreams are, who is more prone to having them and why, and what happens in the brain during a lucid dream, read on.</span></p><div data-dcnode-id="727" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="721"><aside class="css-0 css-0" data-dcnode-id="722"><div data-dcnode-id="723"><div class="css-10gx9pb" data-dcnode-id="724" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="726"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="725" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="665"><span data-dcnode-id="719" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="715"><div data-dcnode-id="716"><a class="chartbeat-section" data-dcnode-id="717" name="How-common-are-lucid-dreams?"><span data-dcnode-id="718" instrument_node="">How common are lucid dreams?</span></a></div></h2><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">It remains unclear how many people experience lucid dreams, but researchers have provided rough estimates based on personal reports they accessed through their studies.</span></p><div data-dcnode-id="698"><figure class="css-4kegza" data-dcnode-id="699"><span class="css-rwmw5v" data-dcnode-id="702"><span class="css-8a7ufk" data-dcnode-id="707"><picture class="css-16pk1is" data-dcnode-id="708"><source data-dcnode-id="712" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-dream-catcher.jpg?w=1575 750w"><source data-dcnode-id="711" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-dream-catcher.jpg?w=1575 750w"><source data-dcnode-id="710" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-dream-catcher.jpg?w=1845 879w"><img alt="image of dream catcher" class="css-1jytyml" data-dcnode-id="709" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-dream-catcher.jpg%3Fw%3D1155%26h%3D1541&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="703"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="704" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=r67tDq1HF700-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F326496&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F326%2F326496%2Fimage-of-dream-catcher.jpg&amp;description=Lucid%20dreams%3A%20Their%20role%2C%20and%20how%20they%20register%20in%20the%20brain" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/image-of-dream-catcher.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Around 50% of people have had a lucid dream at least once in their lives.</span></figcaption></figure></div><p data-dcnode-id="691"><strong data-dcnode-id="692"><span data-dcnode-id="697" instrument_node="">A 2017 study published in the journal </span><a class="content-link css-1pg8eb5" data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/0276236616648653" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Imagination, Cognition and Personality: Consciousness in Theory, Research, and Clinical Practice</span></em></a><span data-dcnode-id="693" instrument_node=""> referred to estimates suggesting that in a representative population, 51% of the individuals had experienced a lucid dream at least once in their lives, and about 20% experienced lucid dreams at least once a month.</span></strong></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">The same study notes that people are more likely to experience spontaneous lucid dreams in their childhood, starting at about 3 and 4 years old. However, the likelihood of lucid dreaming begins to decline in early adolescence.</span></p><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">“After the age of 25, spontaneous onset of lucid dreaming appears to be very infrequent,” the study authors write.</span></p><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">The researchers — who hail from the Universities of Mannheim and Heidelberg, both in Germany — investigated whether or not personality traits could help predict a person’s likelihood of experiencing lucid dreams.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">The study found that openness to an experience correlates positively with lucid dreaming frequency. However, agreeableness —a personality trait that often indicates a person’s level of friendliness and tact in interpersonal relationships — does not.</span></p><p data-dcnode-id="672"><span data-dcnode-id="682" instrument_node="">The study also identified that </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/246608.php" title="Neuroses and neuroticism: What's the difference?"><span data-dcnode-id="681" instrument_node="">neuroticism</span></a><span data-dcnode-id="679" instrument_node=""> — a personality factor that often presents as strong moods, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/anxiety/" title="What is Anxiety?"><span data-dcnode-id="678" instrument_node="">anxiety</span></a><span data-dcnode-id="676" instrument_node="">, and </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/kc/depression-causes-symptoms-treatments-8933" title="What is depression and what can I do about it?"><span data-dcnode-id="675" instrument_node="">depression</span></a><span data-dcnode-id="673" instrument_node=""> — had associations with a higher frequency of lucid dreams.</span></p><div class="css-1cg0byz" data-dcnode-id="666"><aside class="css-0 css-0" data-dcnode-id="667"><div data-dcnode-id="668"><div class="css-az6x7v" data-dcnode-id="669" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="671"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="670" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="574"><span data-dcnode-id="664" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="660"><div data-dcnode-id="661"><a class="chartbeat-section" data-dcnode-id="662" name="Lucid-dreams-and-sleep-disturbances"><span data-dcnode-id="663" instrument_node="">Lucid dreams and sleep disturbances</span></a></div></h2><p data-dcnode-id="653"><a class="content-link css-1pg8eb5" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drdenholmaspy.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="659" instrument_node="">Denholm Aspy</span></a><span data-dcnode-id="657" instrument_node="">, Ph.D., who researches lucid dreaming, spoke to </span><em data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">MNT</span></em><span data-dcnode-id="654" instrument_node=""> and suggested that certain neurophysiological or neurochemical factors may also render a person more likely to experience spontaneous lucid dreams.</span></p><div data-dcnode-id="642"><figure class="css-4kegza" data-dcnode-id="643"><span class="css-rwmw5v" data-dcnode-id="646"><span class="css-tzxed7" data-dcnode-id="651"><lazy-image alt="person lying across the bed" classname="css-1jytyml" data-dcnode-id="652" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-lying-across-the-bed.jpg?w=1155&amp;h=1545" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-lying-across-the-bed.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-lying-across-the-bed.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-lying-across-the-bed.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="647"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="648" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=r67tDq1HF700-2&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F326496&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F326%2F326496%2Fperson-lying-across-the-bed.jpg&amp;description=Lucid%20dreams%3A%20Their%20role%2C%20and%20how%20they%20register%20in%20the%20brain" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-lying-across-the-bed.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Some studies have found a correlation between lucid dreaming and sleep paralysis.</span></figcaption></figure></div><p data-dcnode-id="637"><span data-dcnode-id="641" instrument_node="">More often than not, lucid dreaming occurs during the </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/247927.php" title="What is REM sleep?"><span data-dcnode-id="640" instrument_node="">REM</span></a><span data-dcnode-id="638" instrument_node=""> (rapid eye movement) phase of sleep, which is also when many regular dreams occur. It is possible that neurochemical peculiarities may play a role in “switching on” parts of our consciousness when they would generally be “switched off.”</span></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">“I’m speculating a little bit here, but some people might just tend to produce more of the neurotransmitters that pause REM sleep, typically acetylcholine,” Aspy told us.</span></p><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">“You might have some random variation in neurology or neurochemistry […] I know that people with narcolepsy tend to have a lot more lucid dreams than the average person, and they’re having a lot of sleep disturbances,” he went on to say.</span></strong></p><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">Some anecdotal experiences, as well as some studies, suggest that lucid dreaming may have more in common with the experience of </span><a class="content-link css-1pg8eb5" data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/321569.php"><span data-dcnode-id="630" instrument_node="">sleep paralysis</span></a><span data-dcnode-id="628" instrument_node=""> than that of regular dreaming.</span></p><p data-dcnode-id="622"><span data-dcnode-id="626" instrument_node="">In </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/295039.php" title="Everything you need to know about sleep paralysis"><span data-dcnode-id="625" instrument_node="">sleep paralysis</span></a><span data-dcnode-id="623" instrument_node="">, the mind awakens to a certain degree, while the body remains asleep and unable to move. When that happens, individuals usually experience very realistic hallucinations, as though the content of a dream had “leaked” into the real world.</span></p><p data-dcnode-id="611"><span data-dcnode-id="621" instrument_node="">For instance, a 2017 study — featured in the </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="613" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1111/jsr.12441" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Journal of Sleep Research</span></em><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="616"><span class="sro" data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="614"></span></hl-trusted-source><span data-dcnode-id="612" instrument_node=""> — found a significant positive correlation between sleep paralysis and lucid dreaming frequency in a cohort of 1,928 adult participants.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">“It is […] likely that these sleep experiences are underlined by similar neurophysiology,” the study authors write.</span></p><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">They also note that “[d]issociative experience was the only common predictor of both sleep paralysis and lucid dreaming frequency, indicating that individuals who experience both unusual sleep experiences also experience greater dissociative experiences in daily life.”</span></p><div data-dcnode-id="581" id="m8527e116-59ef-4bca-8e36-034012aa7797"><div data-dcnode-id="582"><div data-dcnode-id="583"><div class="css-get1og" data-dcnode-id="584"><div class="css-lhqo36" data-dcnode-id="591"><h2 class="css-ij4tfq" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">FEATURED</span></h2><h3 class="css-3aaq93" data-dcnode-id="602"><a class="css-1lb03dr" data-dcnode-id="603" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/articles/326496_middle_cdi_merchandising_mnt_middle_xyrem_37460|slot1_/articles/xyrem" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/xyrem%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcdi_merchandising_mnt_middle_xyrem_37460%26correlationId%3Dd4961d8f-f50e-462e-931f-c353754c5e2a"><span data-dcnode-id="604" instrument_node="">Treatment for Narcolepsy</span></a></h3><picture class="css-u71ja5" data-dcnode-id="598"><source data-dcnode-id="601" media="(min-width: 990px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><source data-dcnode-id="600" media="(min-width: 768px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><img alt="" data-dcnode-id="599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%2520%281%29.jpg&amp;raw"></picture><p class="css-1nubf86" data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Explore our comprehensive information on FDA-approved medications for narcolepsy. Learn about side effects, dosage, interactions, and more.</span></p><a class="css-wb75r7" data-dcnode-id="592" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/articles/326496_middle_cdi_merchandising_mnt_middle_xyrem_37460|slot1_/articles/xyrem" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/xyrem%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcdi_merchandising_mnt_middle_xyrem_37460%26correlationId%3Dd4961d8f-f50e-462e-931f-c353754c5e2a"><span class="css-14ktbsh" data-dcnode-id="593"><span class="css-1huyk6v" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">LEARN MORE</span></span></span></a></div><div class="css-1537uod" data-dcnode-id="590"></div><div class="css-x1qz84" data-dcnode-id="585"><picture class="css-9z7k4b" data-dcnode-id="586"><source data-dcnode-id="589" media="(min-width: 990px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><source data-dcnode-id="588" media="(min-width: 768px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><img alt="" data-dcnode-id="587" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%2520%281%29.jpg&amp;raw"></picture></div></div></div></div></div><div class="css-umsscj" data-dcnode-id="575"><aside class="css-0 css-0" data-dcnode-id="576"><div data-dcnode-id="577"><div class="css-10gx9pb" data-dcnode-id="578" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="580"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="579" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="524"><span data-dcnode-id="573" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="569"><div data-dcnode-id="570"><a class="chartbeat-section" data-dcnode-id="571" name="The-role-of-diet-and-meditation"><span data-dcnode-id="572" instrument_node="">The role of diet and meditation</span></a></div></h2><div data-dcnode-id="558"><figure class="css-4kegza" data-dcnode-id="559"><span class="css-rwmw5v" data-dcnode-id="562"><span class="css-14a79s3" data-dcnode-id="567"><lazy-image alt="person meditating at sunset" classname="css-1jytyml" data-dcnode-id="568" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-meditating-at-sunset.jpg?w=1155&amp;h=1755" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-meditating-at-sunset.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-meditating-at-sunset.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-meditating-at-sunset.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="563"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="564" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=r67tDq1HF700-3&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F326496&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F326%2F326496%2Fperson-meditating-at-sunset.jpg&amp;description=Lucid%20dreams%3A%20Their%20role%2C%20and%20how%20they%20register%20in%20the%20brain" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/person-meditating-at-sunset.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">People who meditate may find it easier to have lucid dreams.</span></figcaption></figure></div><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">Besides neurochemical and neurophysiological factors, Aspy told us, there may also be other unexpected contributors to whether or not a person is likely to experience lucid dreams. One factor, he explained, could simply be </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/160774.php" title="Nutrition: What is it and why is it important?"><span data-dcnode-id="556" instrument_node="">nutrition</span></a><span data-dcnode-id="554" instrument_node="">.</span></p><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">“People that are low in certain </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/195878.php" title="Vitamins: What are they and what do they do?"><span data-dcnode-id="551" instrument_node="">vitamins</span></a><span data-dcnode-id="549" instrument_node=""> […] they tend to have poor dream recall and not have lucid dreams at all,” Aspy said, “whereas, for example, in my study that I published [in 2017], I found that giving people vitamin B-6 supplements caused them to remember more of their dreams, and that could be useful for having lucid dreams as well.”</span></p><p data-dcnode-id="539"><strong data-dcnode-id="540"><span data-dcnode-id="547" instrument_node="">In that </span><a class="content-link css-1pg8eb5" data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/321676.php"><span data-dcnode-id="546" instrument_node="">study</span></a><span data-dcnode-id="544" instrument_node=""> — which he previously covered on </span><em data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">MNT</span></em><span data-dcnode-id="541" instrument_node=""> — Aspy and colleagues found that individuals who took 240 milligrams (mg) of vitamin B-6 for four nights before going to bed found it much easier to remember their dreams when they woke up.</span></strong></p><p data-dcnode-id="534"><span data-dcnode-id="538" instrument_node="">“[G]eneral dream recall is the most important predictor of lucid dreams,” Aspy told </span><em data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">MNT</span></em><span data-dcnode-id="535" instrument_node="">. This means that certain changes to the diet might make it more likely that people not only recall their regular dreams when they wake up but also that they can turn regular dreams into lucid dreams more easily.</span></p><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">Another factor that may play a role in a person’s likelihood to experience lucid dreams is meditation. </span><a class="content-link css-1pg8eb5" data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/0276236615572594%3FjournalCode%3Dicaa" rel="noopener noreferrer" style="background-color:#ffffff;" target="_blank"><span data-dcnode-id="532" instrument_node="">A 2015 study</span></a><span data-dcnode-id="530" instrument_node=""> found that people who had practiced meditation for a long time tended to have more lucid dreams.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">This, the researchers explain, makes sense because “[a]ttention to the present state of consciousness in wakefulness and contemplating whether the current experience might be a dream is one of the core techniques […] in modern lucid dream practice.”</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="526" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="525" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="477"><span data-dcnode-id="523" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="519"><div data-dcnode-id="520"><a class="chartbeat-section" data-dcnode-id="521" name="What-happens-in-the-brain?"><span data-dcnode-id="522" instrument_node="">What happens in the brain?</span></a></div></h2><p data-dcnode-id="513"><span data-dcnode-id="518" instrument_node="">But what happens in the brain when a person experiences a lucid dream? “Lucid dreaming is a hybrid state of consciousness with features of both waking and dreaming,” write Julian Mutz and Amir-Homayoun Javadi in a review they published in </span><a class="content-link css-1pg8eb5" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//academic.oup.com/nc/article/2017/1/nix009/3859602" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Neuroscience of Consciousness</span></em></a><span data-dcnode-id="514" instrument_node=""> in 2017.</span></p><div data-dcnode-id="502"><figure class="css-4kegza" data-dcnode-id="503"><span class="css-rwmw5v" data-dcnode-id="506"><span class="css-171oor8" data-dcnode-id="511"><lazy-image alt="concept image of a frightening silhouette" classname="css-1jytyml" data-dcnode-id="512" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/concept-image-of-a-frightening-silhouette.jpg?w=1155&amp;h=1533" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/concept-image-of-a-frightening-silhouette.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/concept-image-of-a-frightening-silhouette.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/concept-image-of-a-frightening-silhouette.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="507"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="508" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=r67tDq1HF700-4&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F326496&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F326%2F326496%2Fconcept-image-of-a-frightening-silhouette.jpg&amp;description=Lucid%20dreams%3A%20Their%20role%2C%20and%20how%20they%20register%20in%20the%20brain" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/326/326496/concept-image-of-a-frightening-silhouette.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Some lucid dreams are actually lucid nightmares, and researchers are still unsure why those occur.</span></figcaption></figure></div><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">That makes this sleep experience particularly intriguing, all the more so considering that scientists are still unclear about all the brain mechanisms related to regular dreaming.</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">In their review, Mutz and Javadi looked at previous studies concerning brain activity during sleep and, more specifically, during periods of regular dreaming versus lucid dreaming.</span></p><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">The two researchers found that during lucid dreaming, there is increased activity in the dorsolateral prefrontal cortex, the bilateral frontopolar prefrontal cortex, the precuneus, the inferior parietal lobules, and the supramarginal gyrus.</span></p><p data-dcnode-id="493"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">These are all brain areas related to higher cognitive functions, including attention, working memory, planning, and self-consciousness.</span></strong></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">By looking at the research on lucid dreaming and states of consciousness, the researchers also found that during a lucid dream, “levels of self-determination (i.e., the subjective experience of acting freely according to one’s will)” were similar to those that people experienced during states of wakefulness. During regular dreams, however, self-determination was significantly reduced.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Mutz and Javadi also note that by further studying lucid dreaming, scientists could learn more about different types of consciousness, which are less easy to separate and study at other times.</span></p><p data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">Tadas Stumbrys, Ph.D. — a researcher from Vilnius University in Lithuania, who specializes in the science of dreams — </span><a class="content-link css-1pg8eb5" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycnet.apa.org/doiLanding%3Fdoi%3D10.1037/drm0000090" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="487" instrument_node="">notes</span></a><span data-dcnode-id="485" instrument_node=""> that perfecting the art of lucid dreaming is tempting for many people, who often use it for “wish fulfillment, such as flying or engaging in sex.”</span></p><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">While it is certainly possible to become better at lucid dreaming, lucid dreamers can only control limited aspects of their dream at once. “I’ve never heard of anyone who can control everything about a lucid dream at the same time,” Aspy told us.</span></p><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Many features of lucid dreaming remain a mystery, such as details about the brain mechanisms behind it. Another unknown is why lucid dreams can sometimes turn ominous — about 7% of them are, surprisingly, lucid nightmares, according to Stumbrys.</span></p><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">These are avenues for future research, which is yet to understand what lucid dreams can achieve for the dreamer, and where they fit on the map of sleep experiences.</span></p></div></article><div data-dcnode-id="475" id="bottom-of-article"></div></div><div class="css-5b5f7q" data-dcnode-id="460"><ul data-dcnode-id="461"><li data-dcnode-id="471" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="472" data-event="Navigation|article tag click|Neurology / Neuroscience" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/neurology"><span data-dcnode-id="473" instrument_node="">Neurology / Neuroscience</span></a></li><li data-dcnode-id="468" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="469" data-event="Navigation|article tag click|Psychology / Psychiatry" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/psychology-psychiatry"><span data-dcnode-id="470" instrument_node="">Psychology / Psychiatry</span></a></li><li data-dcnode-id="465" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="466" data-event="Navigation|article tag click|Sleep / Sleep Disorders / Insomnia" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/sleep"><span data-dcnode-id="467" instrument_node="">Sleep / Sleep Disorders / Insomnia</span></a></li><li data-dcnode-id="462" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="463" data-event="Navigation|article tag click|Complementary Medicine / Alternative Medicine" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/complementary_medicine"><span data-dcnode-id="464" instrument_node="">Complementary Medicine / Alternative Medicine</span></a></li></ul></div><div class="css-zvkybb" data-dcnode-id="444"><div class="css-qtpids" data-dcnode-id="445"><div class="css-4wvzuy" data-dcnode-id="451"><div class="button-wrapper print" data-dcnode-id="458"><a class="css-1lb03dr print button icon icon-hl-print" data-dcnode-id="459" target="_blank" title="Print this page"></a></div><div class="button-wrapper email" data-dcnode-id="456"><a class="css-1lb03dr email button icon icon-hl-email" data-dcnode-id="457" target="_blank" title="Email this page"></a></div><div class="button-wrapper facebook" data-dcnode-id="454"><a class="css-1lb03dr facebook button icon icon-hl-facebook" data-dcnode-id="455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.medicalnewstoday.com%252Farticles%252F326496%253Futm_medium%253Dsocial%2526utm_source%253Dfacebook%2526utm_campaign%253Dsocial-sharebar-referred-desktop" rel="noopener noreferrer nofollow" target="_blank" title="Share on Facebook"></a></div><div class="button-wrapper twitter" data-dcnode-id="452"><a class="css-1lb03dr twitter button icon
