</span></p><span data-dcnode-id="3314" instrument_node="">
</span><p data-dcnode-id="3308" style="text-align:center;"><span data-dcnode-id="3310" style="font-size:20px;"><strong data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">The biggest problem guys have is simply talking to girls.</span></strong><span data-dcnode-id="3311" instrument_node="">
</span></span><span data-dcnode-id="3309" instrument_node="">
</span></p><span data-dcnode-id="3307" instrument_node="">
</span><p data-dcnode-id="3303" style="text-align:center;"><span data-dcnode-id="3305" style="font-size:20px;"><span data-dcnode-id="3306" instrument_node="">Imagine walking up to any girl you want to talk to and effortlessly having a great conversation you have complete control of.
	</span></span><span data-dcnode-id="3304" instrument_node="">
</span></p><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3298" style="text-align:center;"><span data-dcnode-id="3300" style="font-size:20px;"><span data-dcnode-id="3301" instrument_node="">I remember when I was in high school, it was in band actually, and I kept glancing over at this girl I had a HUGE crush on. The time between glances kept getting shorter and shorter and I knew eventually the time would come when I had to talk to her.
	</span></span><span data-dcnode-id="3299" instrument_node="">
</span></p><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3293" style="text-align:center;"><span data-dcnode-id="3295" style="font-size:20px;"><span data-dcnode-id="3296" instrument_node="">Arms sweaty, hands shaking, and heart racing... I finally walked over after class and all I muttered was a "Hi". </span></span><span data-dcnode-id="3294" instrument_node="">
</span></p><span data-dcnode-id="3292" instrument_node="">
</span><p data-dcnode-id="3288" style="text-align:center;"><span data-dcnode-id="3290" style="font-size:20px;"><span data-dcnode-id="3291" instrument_node="">So lame. Some of the other guys in the room watched and laughed... and I was soooooo embarrassed.
	</span></span><span data-dcnode-id="3289" instrument_node="">
</span></p><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3279" style="text-align:center;"><span data-dcnode-id="3285" style="font-size:20px;"><span data-dcnode-id="3286" instrument_node="">I remember never wanting that to happen again. It's been a long time since high school, but there's some simple techniques </span></span><em data-dcnode-id="3281"><span data-dcnode-id="3283" style="font-size:20px;"><span data-dcnode-id="3284" instrument_node="">I'll teach you so you know how to properly talk to girls!</span></span><span data-dcnode-id="3282" instrument_node=""> </span></em><span data-dcnode-id="3280" instrument_node="">
</span></p><span data-dcnode-id="3278" instrument_node="">

</span></p><span data-dcnode-id="3256" instrument_node="">
</span><p class="testimonial-quote" data-dcnode-id="3251"><span data-dcnode-id="3255" instrument_node="">"Talking to women respectfully is very important and these lessons would teach a guy how to do that. There's </span><em data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">great communication tips</span></em><span data-dcnode-id="3252" instrument_node=""> in more than one video, some stuff I might even apply to my life."

</span><p data-dcnode-id="3214" style="text-align:center;"><span data-dcnode-id="3216" style="font-size:20px;"><strong data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">The second biggest problem is worrying about what girls think.</span></strong></span><span data-dcnode-id="3215" instrument_node="">
</span></p><span data-dcnode-id="3213" instrument_node="">
</span><p data-dcnode-id="3209" style="text-align:center;"><span data-dcnode-id="3211" style="font-size:20px;"><span data-dcnode-id="3212" instrument_node="">Like you were really into her... super cute, funny, and she actually remembered your name! And then you say something you wouldn't normally say, she gives you a weird look and the rest of the time you're sitting there wishing you could take it back?       </span></span><span data-dcnode-id="3210" instrument_node="">
</span></p><span data-dcnode-id="3208" instrument_node="">
</span><p data-dcnode-id="3204" style="text-align:center;"><span data-dcnode-id="3206" style="font-size:20px;"><span data-dcnode-id="3207" instrument_node="">I've done that before. In fact, one time it was so bad that after the date I went home, laid in bed, and was still thinking if that actually happened.      </span></span><span data-dcnode-id="3205" instrument_node="">
</span></p><span data-dcnode-id="3203" instrument_node="">
</span><p data-dcnode-id="3199" style="text-align:center;"><span data-dcnode-id="3201" style="font-size:20px;"><span data-dcnode-id="3202" instrument_node="">After reading 8 psychology textbooks, I now know why people do that, it's called rumination; and is actually a huge source of depression.</span></span><span data-dcnode-id="3200" instrument_node="">
</span></p><span data-dcnode-id="3198" instrument_node="">
</span><p data-dcnode-id="3191" style="text-align:center;"><span data-dcnode-id="3193" style="font-size:20px;"><span data-dcnode-id="3197" instrument_node="">In this course, you'll learn why people do that too, how not to do it, and consequently </span><em data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">how to never over-analyze what a girl is thinking about you</span></em><span data-dcnode-id="3194" instrument_node="">.</span></span><span data-dcnode-id="3192" instrument_node="">
</span></p><span data-dcnode-id="3190" instrument_node="">

</span><p data-dcnode-id="3142" style="text-align:center;"><span class="font-scale-7" data-dcnode-id="3145" style="background-color:initial;letter-spacing:0.4px;"><span data-dcnode-id="3146" style="font-size:30px;"><span data-dcnode-id="3147" style="color:rgb(255,40,0);"><span data-dcnode-id="3148" instrument_node="">Why can't some guys break through the "just friends" barrier?</span></span></span></span><span data-dcnode-id="3144"></span><span data-dcnode-id="3143" instrument_node="">
</span></p><span data-dcnode-id="3141" instrument_node="">
</span><p data-dcnode-id="3136" style="text-align:center;"><span data-dcnode-id="3138" style="font-size:20px;"><strong data-dcnode-id="3139"><span data-dcnode-id="3140" instrument_node="">The third biggest problem is the "Friendzone".  </span></strong></span><span data-dcnode-id="3137" instrument_node="">
</span></p><span data-dcnode-id="3135" instrument_node="">
</span><p data-dcnode-id="3131" style="text-align:center;"><span data-dcnode-id="3133" style="font-size:20px;"><span data-dcnode-id="3134" instrument_node="">The Friendzone is for guys who girls see as "undatable". They might not be attractive enough. Maybe they aren't confident enough. Sometimes they just don't have the right relationship-building skills to be a boyfriend to her. </span></span><span data-dcnode-id="3132" instrument_node="">
</span></p><span data-dcnode-id="3130" instrument_node="">
</span><p data-dcnode-id="3126" style="text-align:center;"><span data-dcnode-id="3128" style="font-size:20px;"><span data-dcnode-id="3129" instrument_node="">We all know that friend who is head-over-heels for some girl (who he could easily get), but she only sees him as a friend. In fact, you have probably been that guy before. </span></span><span data-dcnode-id="3127" instrument_node="">
</span></p><span data-dcnode-id="3125" instrument_node="">
</span><p data-dcnode-id="3118" style="text-align:center;"><span data-dcnode-id="3120" style="font-size:20px;"><span data-dcnode-id="3124" instrument_node="">The pain of not being able to get </span><em data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">the only girl you want</span></em><span data-dcnode-id="3121" instrument_node="">, while all other areas of your life seem to be going swimmingly is one too many men know. Through research and studies, I have found a way to turn on this "datable" switch.</span></span><span data-dcnode-id="3119" instrument_node="">
</span></p><span data-dcnode-id="3117" instrument_node="">
</span></div><span data-dcnode-id="3115" instrument_node="">

</span></p><span data-dcnode-id="3063" instrument_node="">
</span><p data-dcnode-id="3059" style="text-align:center;"><span data-dcnode-id="3061" style="font-size:20px;"><img class="img-responsive" data-dcnode-id="3062" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.filepicker.io/api/file/ogTKFDjXQax05cz6XyZp&amp;raw"></span><span data-dcnode-id="3060" instrument_node="">
</span></p><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3050"><span data-dcnode-id="3052" style="font-size:20px;"><strong data-dcnode-id="3054"><span data-dcnode-id="3055" style="color:rgb(255,40,0);"><span data-dcnode-id="3056" style="font-size:28px;"><span data-dcnode-id="3057" instrument_node="">In this step-by-step, easy to understand, but surprisingly effective course, you’ll get</span></span></span></strong><span data-dcnode-id="3053" instrument_node="">:   </span></span><span data-dcnode-id="3051" instrument_node="">
</span></p><span data-dcnode-id="3049" instrument_node="">
</span><p data-dcnode-id="3045"><span data-dcnode-id="3047" style="font-size:20px;"><span data-dcnode-id="3048" instrument_node="">● A quick and easy way to crush your approach anxiety and deal with any fears that you might have and that prevent you from meeting the woman of your dreams.   </span></span><span data-dcnode-id="3046" instrument_node="">
</span></p><span data-dcnode-id="3044" instrument_node="">
</span><p data-dcnode-id="3040"><span data-dcnode-id="3042" style="font-size:20px;"><span data-dcnode-id="3043" instrument_node="">● The framework on where to find girls that are exactly your type and how to get their attention in such a compelling way that they won’t have any other chance than to be magnetized by your strong presence.   </span></span><span data-dcnode-id="3041" instrument_node="">
</span></p><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3037" style="font-size:20px;"><span data-dcnode-id="3038" instrument_node="">● Bullet-proof tips and cheat-sheets on exactly what to text her so that she’ll be counting down the hours until your date… and when you do meet her, you’ll be able to decipher her body language at any point in the date, so you know what she’s thinking for real, regardless of what she’s saying   </span></span><span data-dcnode-id="3036" instrument_node="">
</span></p><span data-dcnode-id="3034" instrument_node="">
</span><p data-dcnode-id="3030"><span data-dcnode-id="3032" style="font-size:20px;"><span data-dcnode-id="3033" instrument_node="">● My proven system that took years to develop and that empowers you to instantly build trust with anyone, create a first-date experience that she will never forget and that she’ll be raving about to all of her friends.   </span></span><span data-dcnode-id="3031" instrument_node="">
</span></p><span data-dcnode-id="3029" instrument_node="">
</span><p data-dcnode-id="3025"><span data-dcnode-id="3027" style="font-size:20px;"><span data-dcnode-id="3028" instrument_node="">● An extremely powerful technique to immediately appear 10 times more confident and spike up your attractiveness levels so that every other girl will be checking you out and which will make your date want you even more. This alone is worth the price of the entire course.   </span></span><span data-dcnode-id="3026" instrument_node="">
</span></p><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3020"><span data-dcnode-id="3022" style="font-size:20px;"><span data-dcnode-id="3023" instrument_node="">● The exact method that psychologists and therapist from all around the world use to ensure that the two people in a relationship can live together harmoniously, and that sets the stage for a fruitful and loving long-term relationship.   </span></span><span data-dcnode-id="3021" instrument_node="">
</span></p><span data-dcnode-id="3019" instrument_node="">
</span><p data-dcnode-id="3015" style="text-align:center;"><span data-dcnode-id="3017" style="font-size:20px;"><span data-dcnode-id="3018" instrument_node="">
</span></span><span data-dcnode-id="3016" instrument_node="">
</span></p><span data-dcnode-id="3014" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3012" style="font-size:20px;"><span data-dcnode-id="3013" instrument_node="">...And more!</span></span><span data-dcnode-id="3011" instrument_node="">
</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="2996"><span data-dcnode-id="2998" style="font-size:20px;"><span data-dcnode-id="3008" instrument_node="">Including the best summarized information from</span><strong data-dcnode-id="3006"><span data-dcnode-id="3007" instrument_node=""> 43 non-fiction books</span></strong><span data-dcnode-id="3005" instrument_node=""> written by attraction and dating experts, as well as </span><strong data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">8 professional psychology textbooks</span></strong><span data-dcnode-id="3002" instrument_node="">. I have also taken </span><strong data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">$9650 worth of online courses</span></strong><span data-dcnode-id="2999" instrument_node=""> on dating, psychology, texting, approach methods, attachment styles, and everything else you could imagine that was related to giving you the information to finding and keeping your dream girl. </span></span><span data-dcnode-id="2997" instrument_node="">
</span></p><span data-dcnode-id="2995" instrument_node="">
</span><p data-dcnode-id="2991"><span data-dcnode-id="2993" style="font-size:20px;"><span data-dcnode-id="2994" instrument_node="">Look at some of these books I read to create this course:</span></span><span data-dcnode-id="2992" instrument_node="">
</span></p><span data-dcnode-id="2990" instrument_node="">

</span></p><span data-dcnode-id="2985" instrument_node="">
</span><p data-dcnode-id="2977"><span data-dcnode-id="2979" style="font-size:20px;"><span data-dcnode-id="2984" instrument_node="">This is the only practical dating course based on no-nonsense psychology that gives you real, proven tools to effortlessly find, conquer and keep the </span><em data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">woman of your dreams</span></em><span data-dcnode-id="2981" instrument_node=""> in as little as a month, in a painless way.</span><br data-dcnode-id="2980"></span><span data-dcnode-id="2978" instrument_node="">
