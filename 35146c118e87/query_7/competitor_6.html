luence the humanities and some social sciences.</span></span><span data-dcnode-id="2897" instrument_node=""> </span></div><span data-dcnode-id="2895" instrument_node=""> </span></div><span data-dcnode-id="2893" instrument_node=""> </span></div><span data-dcnode-id="2891" instrument_node="">

2"><a class="a-size-large a-link-normal" data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.com/Sigmund-Freud/e/B000AQ8VV4"><h2 data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Sigmund Freud</span></h2></a></div><div class="a-row a-spacing-base a-spacing-top-medium a-grid-vertical-align a-grid-center" data-dcnode-id="2544"><div class="a-cardui-deck" data-a-remove-bottom-gutter="true" data-a-remove-top-gutter="true" data-dcnode-id="2545" name="a-cardui-deck-autoname-1"><div class="a-teaser-describedby-collapsed a-hidden" data-dcnode-id="2570" id="a-cardui-deck-autoname-1-teaser-describedby-collapsed"><span data-dcnode-id="2571" instrument_node="">Brief content visible, double tap to read full content.</span></div><div class="a-teaser-describedby-expanded a-hidden" data-dcnode-id="2568" id="a-cardui-deck-autoname-1-teaser-describedby-expanded"><span data-dcnode-id="2569" instrument_node="">Full content visible, double tap to read brief content.</span></div><div class="a-cardui _about-the-author-card_carouselItemStyles_expander__3Fm-M" data-a-card-type="peekExpand" data-dcnode-id="2546" name="a-cardui-deck-autoname-1-card0"><div class="a-cardui-body" data-dcnode-id="2557"><div class="a-reactive-container a-reactive-container-transition" data-dcnode-id="2558"><div data-dcnode-id="2560"><div class="a-cardui-content a-cardui-uninitialized" data-a-max-height="80" data-dcnode-id="2561" style="max-height:80px" tabindex="0"><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">Sigmund Freud was born in 1856 in Moravia; between the ages of four and eighty-two his home was in Vienna: in 1938 Hitler's invasion of Austria forced him to seek asylum in London, where he died in the following year.</span></p><p data-dcnode-id="2564"><span data-dcnode-id="2565" instrument_node="">His career began with several years of brilliant work on the anatomy and physiology of the nervous system. He was almost thirty when, after a period of study under Charcot in Paris, his interests first turned to psychology, and another ten years of clinical work in Vienna (at first in collaboration with Breuer, an older colleague) saw the birth of his creation, psychoanalysis. This began simply as a method of treating neurotic patients by investigating their minds, but it quickly grew into an accumulation of knowledge about the workings of the mind in general, whether sick or healthy. Freud was thus able to demonstrate the normal development of the sexual instinct in childhood and, largely on the basis of an examination of dreams, arrived at his fundamental discovery of the unconscious forces that influence our everyday thoughts and actions.</span></p><p data-dcnode-id="2562"><span data-dcnode-id="2563" instrument_node="">Freud's life was uneventful, but his ideas have shaped not only many specialist disciplines, but the whole intellectual climate of the last half-century.</span></p></div></div><div class="a-reactive-container-gradient" data-dcnode-id="2559"></div></div></div><div class="a-cardui-footer" data-dcnode-id="2547"><div class="a-cardui-expand-control-footer" data-csa-c-type="widget" data-csa-interaction-events="click" data-dcnode-id="2548"><a class="a-cardui-expand-control-footer-button" data-dcnode-id="2549" href="javascript:void(0)" role="button"><span class="a-expander-icon" data-dcnode-id="2555"><i class="a-css-icon a-css-icon-draw a-css-icon-expand" data-dcnode-id="2556"></i></span><span class="a-see-more a-color-link" data-dcnode-id="2550"><span class="a-see-more-text" data-dcnode-id="2553" style=""><span data-dcnode-id="2554" instrument_node="">Read more</span></span><span class="a-see-less-text" data-dcnode-id="2551" style="display:none"><span data-dcnode-id="2552" instrument_node="">Read less</span></span></span></a></div></div></div></div></div></div></div></div></div></div></div><span data-dcnode-id="2535" instrument_node="">

</span><span data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">
  I read this because I felt that as a budding Jungian, I ought to read something from Freud too. First thing to say is that the book is not nearly as accessible as anything by Jung, and I can see entirely why Jung and Freud went their separate ways. Second, much of the thought on dreams here has been superceded both by scientific advances and by psychological research, so don't take any of it as fact but rather as period opinion. Freud does come across as a repressed Victorian, obsessed by sex, and he does not seem to be a man I would personally have trusted. Nonetheless, as background, this was a worthwhile read, though I admit some sections I skim read just to get through them.
