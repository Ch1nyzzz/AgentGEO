</span><span data-dcnode-id="1693" id="freeTextContainer10512723701319561785"><span data-dcnode-id="1694" instrument_node="">Three women who have sort of failed at life show back up on their parents’ doorstep after finding out their mother has cancer. Eldest sister, Roselyn, is a control freak who uses her mother’s illness as an excuse to stay in her hometown while her fiance teaches in Oxford for a year. Middle sister, Bianca, ditched her small town to live the big city life in New York, embezzled lots of money from her company for designer clothing, skipped out on rent, and charged up her credit cards. Her return to</span></span><span data-dcnode-id="1692" instrument_node="">
</span><span data-dcnode-id="1678" id="freeText10512723701319561785" style="display:none"><span data-dcnode-id="1691" instrument_node="">Three women who have sort of failed at life show back up on their parents’ doorstep after finding out their mother has cancer. Eldest sister, Roselyn, is a control freak who uses her mother’s illness as an excuse to stay in her hometown while her fiance teaches in Oxford for a year. Middle sister, Bianca, ditched her small town to live the big city life in New York, embezzled lots of money from her company for designer clothing, skipped out on rent, and charged up her credit cards. Her return to home is a result of being broke with the threat of legal action hanging over her. Cordelia, the youngest, is a wanderer who spent several years after dropping out of school hitchhiking across the country and is now home because she’s pregnant with a child whose father she’s not really sure about. </span><br data-dcnode-id="1690"><br data-dcnode-id="1689"><span data-dcnode-id="1688" instrument_node="">If those names rang a bell to you, it might be because they’re all based on Shakespearean characters, as their father is a Shakespeare professor at the small college in their hometown. The kids, growing up with Shakespeare in their blood, quote the Bard regularly throughout the book, and the father speaks almost exclusively in prose. This is kind of the one thing that makes the family unique: all they seem to care about is Shakespeare and themselves. </span><br data-dcnode-id="1687"><br data-dcnode-id="1686"><span data-dcnode-id="1685" instrument_node="">I hated this book. Diana hated it before me, but by the time I found out her opinion on the book, I’d already bought it, and that cover is just too darn pretty to resist. The first few chapters are interesting enough, but then things just get painful. The characters are undeniably flat and seem to be cast from cookie cutter shapes of how sibling rivalries are supposed to play out. Oldest sister - control freak - shocker! Middle sister - desperate for attention - how novel! Youngest sister - the baby of the family who gets away with everything - you don’t say! Their personalities aren’t endearing at all, either. They’re undeniably stupid, despite all their Shakespeare-quoting, and it’s hard to sit down and read them whining over the mistakes they made over and over again. </span><br data-dcnode-id="1684"><br data-dcnode-id="1683"><span data-dcnode-id="1682" instrument_node="">The plot was boring and kind of propelled by Cordelia’s pregnancy, which was a rather uninspired way to move things along. The author tries to make up for the crappy plot by long, flowery descriptions, which to me, mean very little when nothing is really happening. The voice that this is written in, too, is weird - first person plural. As in “our mother has cancer,” “we love to read,” etc, etc. Speaking of the sisters’ love of reading, that’s what the author tries to use to make the sisters unique. I’m sorry - tons of people love reading, and with a host of mean, slutty, and selfish characteristics, you can’t make your characters more likeable by giving them one good one that people can relate to. Also, like Diana said, they never really mention the titles of the books they’re reading. Just “she picked up a book,” “she brought along a book,” “she was reading a book” - overwhelmingly lame. </span><br data-dcnode-id="1681"><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">This book got some positive reviews on Goodreads, which boggles my mind entirely. I mean, if you enjoy flowery descriptions with a boring plot or are really really really into Shakespeare, maybe you might find some redeeming qualities in it, but for me, I only finished this book so I could write a long review bitching about it for all you lovely followers. &lt;3</span></span><span data-dcnode-id="1677" instrument_node="">

</span><span data-dcnode-id="1581" id="freeTextContainer5247405784228703723"><span data-dcnode-id="1582" instrument_node="">This is the story of three sisters who have returned to their Ohio home town to help care for their mother who's receiving treatment for breast cancer. But it turns out that their simultaneous return home is more coincidental than prompted by desire to nurse their mother. All three are escaping their failures in life, all of which are different. The sisters themselves are all very much different from each other, the oldest a controlling homebody, the middle one a promiscuous spendthrift, and the</span></span><span data-dcnode-id="1580" instrument_node="">
</span><span data-dcnode-id="1565" id="freeText5247405784228703723" style="display:none"><span data-dcnode-id="1579" instrument_node="">This is the story of three sisters who have returned to their Ohio home town to help care for their mother who's receiving treatment for breast cancer. But it turns out that their simultaneous return home is more coincidental than prompted by desire to nurse their mother. All three are escaping their failures in life, all of which are different. The sisters themselves are all very much different from each other, the oldest a controlling homebody, the middle one a promiscuous spendthrift, and the youngest a wandering hippie-dropout (and pregnant).</span><br data-dcnode-id="1578"><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">They all disapprove of the failings in the other two, but only dimly comprehend their own failings. Their interaction takes place within the influence of their upbringing much inculcated by the spirit of their father, a college Shakespearean professor. Their father responds to all situations with an applicable quotation from The Bard. His daughters often do the same.</span><br data-dcnode-id="1575"><br data-dcnode-id="1574"><span data-dcnode-id="1573" instrument_node="">This book is a study of sisterly relationships, and for those searching this book to better understand themselves and their relationships the following quotation succinctly articulates such striving :</span><blockquote data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">We think in some ways we have done this ourselves our whole lives, searching for the book that will give us the keys to ourselves, let us into a wholly formed personality as though it were a furnished room to let, as though we could walk in and look around and say to the grey haired landlady behind us, “We’ll take it.” </span></blockquote><span data-dcnode-id="1570" instrument_node="">The voice of the narration mysteriously drifts from omnipresent third person to omnipresent second person speaking for the combined spirit of "we three sisters" (and sometimes two sisters examining the third). The author has included a positive disinterested role for a church pastor--something many secular authors fail to do.</span><br data-dcnode-id="1569"><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">This is a well written book that made the story of three young women interesting to even an old man such as myself.</span><br data-dcnode-id="1566"></span><span data-dcnode-id="1564" instrument_node="">

</span><span data-dcnode-id="1486" id="freeTextContainer16497552813503821311"><span data-dcnode-id="1490" instrument_node="">I really wanted to like this book, but when I found myself putting it down time after time I knew I was kidding myself. First, the sisters were not really weird. They were immature, self-centered, mean, shallow and undeserving. Having five sisters of my own, I really did not identify with any of the characters or relationships in the book. Eventually each sister just got on my nerves. I could see the ending from a mile away. The book was packed with gimmicks.</span><br data-dcnode-id="1489"><br data-dcnode-id="1488"><span data-dcnode-id="1487" instrument_node="">Relationships between sisters can be </span></span><span data-dcnode-id="1485" instrument_node="">
</span><span data-dcnode-id="1455" id="freeText16497552813503821311" style="display:none"><span data-dcnode-id="1484" instrument_node="">I really wanted to like this book, but when I found myself putting it down time after time I knew I was kidding myself. First, the sisters were not really weird. They were immature, self-centered, mean, shallow and undeserving. Having five sisters of my own, I really did not identify with any of the characters or relationships in the book. Eventually each sister just got on my nerves. I could see the ending from a mile away. The book was packed with gimmicks.</span><br data-dcnode-id="1483"><br data-dcnode-id="1482"><span data-dcnode-id="1481" instrument_node="">Relationships between sisters can be multi-layered and complex. The premise of the book intrigued me, but it just became unbelievable. Cordy and Bean didn't come home to help care for their mother. One came home because she got fired from her job for stealing, the other because she was pregnant with no place to go. </span><br data-dcnode-id="1480"><br data-dcnode-id="1479"><span data-dcnode-id="1478" instrument_node="">I actually enjoyed the third-person plural (or, first-person plural) narration, but the Shakespearian quotes were overkill. </span><br data-dcnode-id="1477"><br data-dcnode-id="1476"><span data-dcnode-id="1475" instrument_node="">Most readers find an instant connection to characters who also love to read. I think this is what inspired me to actually finish the book.</span><br data-dcnode-id="1474"><br data-dcnode-id="1473"><span data-dcnode-id="1472" instrument_node="">I found the author's insistence that the family were such worldly readers rather ironic. I think they should have all been reading more self-help books. Or, maybe if their father wasn't so eccentric and they got to watch TV they might have been better equiped to deal with life. </span><br data-dcnode-id="1471"><br data-dcnode-id="1470"><span data-dcnode-id="1469" instrument_node="">I come away from the book with two memorable quotes ~</span><br data-dcnode-id="1468"><br data-dcnode-id="1467"><span data-dcnode-id="1466" instrument_node="">"There is no problem that a library card can't solve."</span><br data-dcnode-id="1465"><br data-dcnode-id="1464"><span data-dcnode-id="1463" instrument_node="">"See, we love each other. We just don't happen to like each other very much."</span><br data-dcnode-id="1462"><br data-dcnode-id="1461"><span data-dcnode-id="1460" instrument_node="">I am glad I got this from my local library and did not pay for it. </span><br data-dcnode-id="1459"><br data-dcnode-id="1458"><br data-dcnode-id="1457"><br data-dcnode-id="1456"></span><span data-dcnode-id="1454" instrument_node="">

</span><span data-dcnode-id="1364" id="freeText6195984145133475918" style="display:none"><span data-dcnode-id="1374" instrument_node="">I read that Eleanor Brown simply wanted to write a book about families. She claimed that this caused her to incorporate Shakespeare and use the plural narrator. When I read her post on The Debutante Ball, Eleanor Brown claimed that her writing comes “haphazardly”. I, for one, don’t buy it-or if that is true I want some of it!</span><br data-dcnode-id="1373"><br data-dcnode-id="1372"><span data-dcnode-id="1371" instrument_node="">Because the truth is, The Weird Sisters is one of the most unique and most real books I have read lately. Unique and real don’t usually go hand-in-hand, but Brown managed it brilliantly. Each of the sisters was just like someone you know, and each one was still completely her own.</span><br data-dcnode-id="1370"><br data-dcnode-id="1369"><span data-dcnode-id="1368" instrument_node="">Brown, in The Weird Sisters, invites you into the world of Shakespeare, but it is tangible, accessible in a way your high school English class wasn’t. Shakespearean language flows out of this book. It lives like the Bard and Brown intended-taking language to a place few writers can.</span><br data-dcnode-id="1367"><br data-dcnode-id="1366"><span data-dcnode-id="1365" instrument_node="">I loved the writing, the characters, and the story of this book. So the only thing left to do is put down what you are reading now and go grab The Weird Sisters. Come on! Even Shakespeare wants you to!</span></span><span data-dcnode-id="1363" instrument_node="">

</span><span data-dcnode-id="1197" id="freeText1596507595829474378" style="display:none"><span data-dcnode-id="1198" instrument_node="">Predictable plot and predictable characters. Three sisters sterotyped by birth order - the bossy eldest sister, the slutty, attention seeking middle sister and the irresponsible youngest. All returning to live at home using the excuse to care for their mother who has breast cancer. But these three self centered 30 somethings are really just trying to avoid making adult decisions or facing the consequences of their poor decision making. The eldest is so terrifed of change that she is using her mother's illness as an excuse to not visit her finance in London; the middle sister has been fired for embezzeling money from her employer to buy designer clothes (and never considered she could be arrested) and the youngest is pregant from a 2-night stand where she exchanged sex for a place to stay but is excited to have the baby since this will be "all her's" rather than a "hand me down" from her sisters. The poor mother is just a backdrop to the story and every sterotype of cancer victim is played out as well and the father is characterization of the "absent minded professor". The only plot twist is that one of the sisters doesn't get her first love interest. But, the epilogue assures us that they all end up with a man - so that is meant to be the happy ending. I was also distracted throughout the book by the narrator - it was never clear who was narrating the story. I think the author was trying to write in the first person plural point of view - but it wasn't effectively done. </span></span><span data-dcnode-id="1196" instrument_node="">

</span><span data-dcnode-id="1115" id="freeTextContainer4172288366214546231"><span data-dcnode-id="1116" instrument_node="">I read this on a whim without even bothering to read the blurb in its entirety (A pretty cover gets me all the time… well, that and the continuous marketing.) The farthest I got into said blurb was that the characters had been named after some of Shakespeare’s female characters. From this I (mistakenly) deduced that WS would be a composite modern retelling of something. NOT... (Sometimes, I'm such a doof!) This could not be farther from that. To be frank it is almost as if these women were meant</span></span><span data-dcnode-id="1114" instrument_node="">
</span><span data-dcnode-id="1068" id="freeText4172288366214546231" style="display:none"><span data-dcnode-id="1113" instrument_node="">I read this on a whim without even bothering to read the blurb in its entirety (A pretty cover gets me all the time… well, that and the continuous marketing.) The farthest I got into said blurb was that the characters had been named after some of Shakespeare’s female characters. From this I (mistakenly) deduced that WS would be a composite modern retelling of something. NOT... (Sometimes, I'm such a doof!) This could not be farther from that. To be frank it is almost as if these women were meant to live the lives of the characters whose names they bore. </span><br data-dcnode-id="1112"><br data-dcnode-id="1111"><span data-dcnode-id="1110" instrument_node="">Initially, I found the collective “we” narrator odd to say the least. I could not figure out who was talking: Was it Rose? Was it Cordy? Was it Bean/Bianca? Or maybe it was </span><i data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">the two against one, or the three of them as separate individuals,</span></i><span data-dcnode-id="1107" instrument_node=""> that is mentioned in the book. After the novelty wore off I got used to it. </span><br data-dcnode-id="1106"><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">Then there's the fact that the author starts off by basically saying that not all sisters are each others BFF was honest, I thought. </span><br data-dcnode-id="1103"><br data-dcnode-id="1102"><span data-dcnode-id="1101" instrument_node="">The book did not knock my socks off - the roles that each sister played based on the chronology of birth was stereotypical, but it did let me sneak a peak into the why’s behind who they were and… Well, NO wonder they turned out the way they did! </span><br data-dcnode-id="1100"><br data-dcnode-id="1099"><span data-dcnode-id="1098" instrument_node="">Suffice to say, Rose, Bean and Cordy are definitely not perfect. One has quit her job as a result of some scandalous </span><a class="jsShowSpoiler spoilerAction" data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">(view spoiler)</span></a><span class="spoilerContainer" data-dcnode-id="1091" style="display: none"><span data-dcnode-id="1095" instrument_node="">[ criminal? </span><a class="jsHideSpoiler spoilerAction" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">(hide spoiler)</span></a><span data-dcnode-id="1092" instrument_node="">]</span></span><span data-dcnode-id="1090" instrument_node=""> events; one thinks things will fall apart without her in the picture; and another had found herself pregnant and at loose ends. They all end up back home:</span><br data-dcnode-id="1089"><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">(What follows is a needlessly long look into my opinion of the characters. Skipping it is fine. :))</span><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node=""> </span><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">Rosalind is the eldest and likes to be in charge. Control. She likes control, she needs t. I like the way the author explains how Rose ended up being such a controlling individual. She is the most sympathetic character for me, maybe because I see a little myself in her… Yes, I am a controlling freak… ask any of my sibs; they hate it too.</span><br data-dcnode-id="1082"><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">Then there’s Bianca who is definitely not perfect. Perhaps it is just me but I disliked this sister the most. I do not like bombshell seductress types. Now, give me bombshell type, down on her luck and yet still with a sense of humor (ala Susan Elizabeth Philipps’s female in </span><u data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Ain’t She Sweet</span></u><span data-dcnode-id="1077" instrument_node="">) and I might have found Bianca/Bean a bit more tolerable… but she just came across as dislikeable (made up word alert.) Was it because it never crossed her mind that to take money that wasn’t hers could be construed as CRIMINAL? A little (I mean hello! Anyone home in there?) Was it her constantly hitting on men? Perhaps. Was it her inability to face up to the situation she had made for herself? Yes. I’ll take a kick ass/bad ass/ down on her luck heroine any day over a woman with a come-hither glance that (for things beyond my knowledge) just works on men.</span><br data-dcnode-id="1076"><br data-dcnode-id="1075"><span data-dcnode-id="1074" instrument_node="">Then Cordy. Oh Cordy, Cordy, Cordy… the youngest. Take any negative stereotype of the youngest sibling and you have Cordy. Apple of the father’s eye. Spoiled. Entitled. What surprised me the most was her take on her situation. In her mind, their parents had been worn out by the time that she was born so there was hardly an instance where they would deny her what she wanted. I like how she says she was treated like a toy… coddled, but otherwise ignored. </span><br data-dcnode-id="1073"><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">Again, the Weird Sisters are </span><i data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">imperfect.</span></i></span><span data-dcnode-id="1067" instrument_node="">
