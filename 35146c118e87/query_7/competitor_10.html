</span><span data-dcnode-id="4403" id="freeTextContainer11714859440166798407"><span data-dcnode-id="4413" instrument_node="">Is every book set in Ohio?</span><br data-dcnode-id="4412"><br data-dcnode-id="4411"><span data-dcnode-id="4410" instrument_node="">This is the second book in a row that I have read set here in Ohio. The first one,</span><a data-dcnode-id="4408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1704719.Knockemstiff" rel="nofollow noopener" title="Knockemstiff by Donald Ray Pollock"><span data-dcnode-id="4409" instrument_node="">Knockemstiff</span></a><span data-dcnode-id="4407" instrument_node="">, was most excellent; Weird Sisters I’m sorry to say was shit. This book was just, beyond words, sucky. Gack! I even finished it because I wasn’t going to let it beat me.</span><br data-dcnode-id="4406"><br data-dcnode-id="4405"><span data-dcnode-id="4404" instrument_node="">Here’s the clever premise. Three sisters by the names of Bianca, Cordelia , and Rose (short for Roselyn? I just don’t care) are born to a family who can’t stop reading…..ever. They are born to parents whose nam</span></span><span data-dcnode-id="4402" instrument_node="">
</span><span data-dcnode-id="4381" id="freeText11714859440166798407" style="display:none"><span data-dcnode-id="4401" instrument_node="">Is every book set in Ohio?</span><br data-dcnode-id="4400"><br data-dcnode-id="4399"><span data-dcnode-id="4398" instrument_node="">This is the second book in a row that I have read set here in Ohio. The first one,</span><a data-dcnode-id="4396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/1704719.Knockemstiff" rel="nofollow noopener" title="Knockemstiff by Donald Ray Pollock"><span data-dcnode-id="4397" instrument_node="">Knockemstiff</span></a><span data-dcnode-id="4395" instrument_node="">, was most excellent; Weird Sisters I’m sorry to say was shit. This book was just, beyond words, sucky. Gack! I even finished it because I wasn’t going to let it beat me.</span><br data-dcnode-id="4394"><br data-dcnode-id="4393"><span data-dcnode-id="4392" instrument_node="">Here’s the clever premise. Three sisters by the names of Bianca, Cordelia , and Rose (short for Roselyn? I just don’t care) are born to a family who can’t stop reading…..ever. They are born to parents whose names I don’t recall (and I don’t care), in a fictional town of Barnwell, Ohio, home to Barnwell college (university? I don’t care). Why the author didn’t pick an actual small town university (Ohio has 194 colleges and universities) like Oberlin? I do not know. That would have been the perfect setting for this book, and it would have made it a little more interesting………anyway.</span><br data-dcnode-id="4391"><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">The dad is a professor at Barmwell, and reads nothing but Shakespeare, and quotes it in every possible moment like Rainman. The guy answers all questions with a Shakespearean quote……..EVERY FRICKEN ONE! It gets really annoying. Oh, did I mention that the three sisters are named after Shakespearean characters? Duh, of course they are. They mention how guys would make fun of them on dates when they figured out the connection. Oh please! I’m going to say at least 65% of Ohioans have never read Shakespeare at any length, and I think that generous. Of those who have 98% do not have Shakespeare at the forefront of their brains enough to say “hey, are you named after the Cordelia in that Shakespeare play?” nuh-uh. I would be more apt to ask “hey, are you named after Cordelia from Buffy?”</span><br data-dcnode-id="4388"><br data-dcnode-id="4387"><span data-dcnode-id="4386" instrument_node="">All three sisters are unlikeable. Each character is so flat and not fleshed out that I have no clue what they looked like, and I don’t care. All through the book the author kept reminding us that these people read a lot of books and constantly quote Shakespeare (I GET IT!) , they are elitists. </span><br data-dcnode-id="4385"><br data-dcnode-id="4384"><span data-dcnode-id="4383" instrument_node="">Stupid, stupid, stupid……..I want those six hours back please.</span><br data-dcnode-id="4382"></span><span data-dcnode-id="4380" instrument_node="">

</span><span data-dcnode-id="4301" id="freeText9991407647980775385" style="display:none"><span data-dcnode-id="4302" instrument_node="">I read about 50 pages of this. I found the unknown narrator irritating-at first I thought I might have missed who was doing the narrating and kept going back to see, but then I realized the book was supposed to be like that, that there was no one narrator; I may be old-fashioned but I like knowing who's doing the narrating in a book. I suppose this can be considered an antinovel since I haven't seen this kind of narration before. I just can't stand it. And, while Shakespeare was a brilliant writer, I hate novels that incorporate his characters-even their names-and worse, quotations from his works. And, it seemed to move at a snail's pace and not much was happening. I kept looking at another book on the table beside my chair and finally the other book won. </span></span><span data-dcnode-id="4300" instrument_node="">

</span><span data-dcnode-id="4195" id="freeTextContainer14751363991503405259"><span data-dcnode-id="4202" instrument_node="">Absolutely pitch perfect. (I would give this ten out of five stars if I could.)</span><br data-dcnode-id="4201"><br data-dcnode-id="4200"><span data-dcnode-id="4199" instrument_node="">This is the first book I have read that uses a first-person-plural narrative style, and it was so completely appropriate; you get the sense that this book came together with these three sisters sitting around a Pensieve after the events of this book have transpired, looking at them playing out again, and dictating the story to the author, who has set up shop with a typewriter in the adjacent corner of the room.</span><br data-dcnode-id="4198"><br data-dcnode-id="4197"><span data-dcnode-id="4196" instrument_node="">Speakin</span></span><span data-dcnode-id="4194" instrument_node="">
</span><span data-dcnode-id="4180" id="freeText14751363991503405259" style="display:none"><span data-dcnode-id="4193" instrument_node="">Absolutely pitch perfect. (I would give this ten out of five stars if I could.)</span><br data-dcnode-id="4192"><br data-dcnode-id="4191"><span data-dcnode-id="4190" instrument_node="">This is the first book I have read that uses a first-person-plural narrative style, and it was so completely appropriate; you get the sense that this book came together with these three sisters sitting around a Pensieve after the events of this book have transpired, looking at them playing out again, and dictating the story to the author, who has set up shop with a typewriter in the adjacent corner of the room.</span><br data-dcnode-id="4189"><br data-dcnode-id="4188"><span data-dcnode-id="4187" instrument_node="">Speaking of the author. What a way with words! It is not hyperbole to say that there is a jewel of prose on nearly every single page of this book. One of the reviews on the back cover talks about it in terms of alchemy-- the magic and science of wordplay, combining everyday and ordinary words into phrases and lines of pure gold. (And the way the author managed to weave in so much of Shakespeare's original words so naturally and seamlessly is certainly another credit to her mastery and skill.)</span><br data-dcnode-id="4186"><br data-dcnode-id="4185"><span data-dcnode-id="4184" instrument_node="">As for the story itself? If this novel were a dissertation, its thesis statement would be found in the first paragraph of page 211. Ultimately, it is a story about identity. Who we are, whether we can change, and how the road of life will always lead us back to the truth of those issues, but so many times, we're too afraid of what we might encounter, and so we take multiple (and completely </span><b data-dcnode-id="4182"><span data-dcnode-id="4183" instrument_node="">unnecessary</span></b><span data-dcnode-id="4181" instrument_node="">) detours along the way. Whether you have only brothers or are a single child, this novel will resonate with you.</span></span><span data-dcnode-id="4179" instrument_node="">

</span><span data-dcnode-id="4086" id="freeTextContainer13505690052504310314"><span data-dcnode-id="4087" instrument_node="">I can't even finish this piece of crap book; it's so juvenile it's insulting. Clearly Eleanor Brown just took some extended writing class and thinks she's an author because she's using every cliche and plot technique to prolong a story that's just not interesting. Here are the reasons I know she's an amateur writer: 1) She includes insignificant details that are supposed to make her characters round but really have nothing at all to do with the characters - why is it important to talk about some</span></span><span data-dcnode-id="4085" instrument_node="">
</span><span data-dcnode-id="4077" id="freeText13505690052504310314" style="display:none"><span data-dcnode-id="4084" instrument_node="">I can't even finish this piece of crap book; it's so juvenile it's insulting. Clearly Eleanor Brown just took some extended writing class and thinks she's an author because she's using every cliche and plot technique to prolong a story that's just not interesting. Here are the reasons I know she's an amateur writer: 1) She includes insignificant details that are supposed to make her characters round but really have nothing at all to do with the characters - why is it important to talk about someone looking at a goddamn dishtowel? 2) One of the characters is pregnant and OMG! what a GREAT way to move plot along ... the story grows along with the baby and the end of story will culminate with a baby being born. (That's sarcasm). So, so, so unoriginal and not very taxing on an author to come up with a different way to propel plot. 3) How realistic is it that a father, as obsessed as he is with Shakespeare, talks almost entirely in Bardlanguage? 4) Not a single book is named although the characters are constantly reading. Would it hurt to have them read a Bronte?</span><br data-dcnode-id="4083"><br data-dcnode-id="4082"><span data-dcnode-id="4081" instrument_node="">The sisters are stupid, not weird. Each is more mentally challenged than the next, making decisions that aren't well-thought out and have landed them in this shitty situation in the first place. No wonder they hate each other. I don't even know them as characters (thanks to amateur writing) and I don't like them.</span><br data-dcnode-id="4080"><br data-dcnode-id="4079"><span data-dcnode-id="4078" instrument_node="">Ugh. Good riddance and go back to the hell from whence you came! (i.e. return to whatever MFA program spewed this book out)</span></span><span data-dcnode-id="4076" instrument_node="">

</span><span data-dcnode-id="3748" id="freeText7530621967376265507" style="display:none"><span data-dcnode-id="3761" instrument_node="">I was struck by a few sentences spoken by the character of Father Aidan on page 305 of my copy of this book: "There are times in our lives when we have to realize our past is precisely what it is, and we cannot change it. But we can change the story we tell ourselves about it, and by doing that, we can change the future."</span><br data-dcnode-id="3760"><br data-dcnode-id="3759"><span data-dcnode-id="3758" instrument_node="">I liked the book and the interactions between the sisters/the sisters and their parents/the sisters and non-family members. It did seem as if some of the character traits or scenes were a bit exaggerated. The author used commonly believed ideas about the effects of birth order on personalities to develop her characters. At times, some of the interactions seemed two-dimensional to me.</span><br data-dcnode-id="3757"><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">On the other hand, I do believe that we often revert back to habits and interactions of childhood when returning to the nest of the family, no matter what our age. Memories of smells from childhood can have great impact when experienced as an adult. These scenes seemed truer to me than some of the others.</span><br data-dcnode-id="3754"><br data-dcnode-id="3753"><span data-dcnode-id="3752" instrument_node="">The need to be needed and the fact that our parents won't live forever also play parts in the unfolding of this story.</span><br data-dcnode-id="3751"><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">I enjoyed reading it, but I don't know that this is a book I will keep.</span></span><span data-dcnode-id="3747" instrument_node="">

</span><span data-dcnode-id="3645" id="freeTextContainer14781500969477223433"><span data-dcnode-id="3649" instrument_node="">We were three sisters who wanted to write a story that was different from any other. Or even if it was a cliché, at least we could make it seem different by using the first-person plural narrative. And by adding a gimmick – a father who’s a professor of Shakespeare, so that Shakespearean quotations could be thrown in at convenient times to make the reader feel literary and make us seem different.</span><br data-dcnode-id="3648"><br data-dcnode-id="3647"><span data-dcnode-id="3646" instrument_node="">Rose, the oldest, insisted that she be the overfunctioning sister. “All sister duos in these books mu</span></span><span data-dcnode-id="3644" instrument_node="">
</span><span data-dcnode-id="3623" id="freeText14781500969477223433" style="display:none"><span data-dcnode-id="3643" instrument_node="">We were three sisters who wanted to write a story that was different from any other. Or even if it was a cliché, at least we could make it seem different by using the first-person plural narrative. And by adding a gimmick – a father who’s a professor of Shakespeare, so that Shakespearean quotations could be thrown in at convenient times to make the reader feel literary and make us seem different.</span><br data-dcnode-id="3642"><br data-dcnode-id="3641"><span data-dcnode-id="3640" instrument_node="">Rose, the oldest, insisted that she be the overfunctioning sister. “All sister duos in these books must consist of an overfunctioner and an underfunctioner,” she preached. “But we’re not a duo,” whined Cordy, the youngest. “How can we be an overfunctioner and underfunctioner if there are three of us?” Rose, of course, had it all figured out. “The underfunctioning sister is usually both a slut and a flake,” she said to Cordy and to the middle sister, Bianca. “So you’ll both be underfunctioners, just one of you will be the slut and one of you will be the flake.” “Fine by me,” Bianca drawled, flipping her hair, “Only I get to be the slut.” “Well, I’m the youngest,” said Cordy, “So I guess it would fit for me to be the flake.”</span><br data-dcnode-id="3639"><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">“Now,” said Rose, ticking another item off her agenda. “Here’s the premise – are you ready? Life-threatening illness of a family member brings the estranged siblings together. Dysfunction ensues, to be gradually replaced by bonding and the realization that the family is actually more loving than the sisters previously thought. Great idea, isn’t it? And original too.” Bianca and Cordy nodded; after all, as the underfunctioners they didn’t have much of an opinion although they did occasionally talk back or surprise everyone with some uncharacteristically wise insight. </span><br data-dcnode-id="3636"><br data-dcnode-id="3635"><span data-dcnode-id="3634" instrument_node="">"Okay," said Rose. "Now each of us needs a dilemma, problem, growth opportunity -- you know the shpiel." "How about Bianca gets pregnant?" asked Cordy. "Being a slut and all." "Don't be ridiculous, Cordy," Bianca snorted. "That will ruin my slut image, not to mention my figure. Why don't you get pregnant instead?" "Do I have to?" moaned Cordy. "It's perfect," said Rose. "A perfectly flaky thing to do, and a chance for you to overcome your childishness. But what about you, Bianca?" "An affair with a married man, I guess," said Bianca. "And you, Rose?" "Well, as the resident overfunctioner, I could realize that I need to stop being so controlling, that the family won't fall apart without me, that I can leave home, follow my dreams..." </span><br data-dcnode-id="3633"><br data-dcnode-id="3632"><span data-dcnode-id="3631" instrument_node="">“Don’t I at least get a love interest?” begged Cordy. "It won't be a women's book without romance." “Don’t worry,” Rose reassured her. “Somewhere in the first pages we’ll mention that a guy we grew up with has come back to our small town. Like Chekhov’s gun, by the end of the book that guy will be dating one of us – you, Cordy, I guess, since Bianca will have her married man.” “That could be another theme,” Cordy said. “Leaving the big city for the small town and finding that experience to be redemptive. That’s pretty unusual.”</span><br data-dcnode-id="3630"><br data-dcnode-id="3629"><span data-dcnode-id="3628" instrument_node="">“This is getting good,” said Rose, and we all agreed. Rose was starting to have that look of satisfaction we knew so well. “Last thing,” she added, “We should all love to read. I mean, </span><i data-dcnode-id="3626"><span data-dcnode-id="3627" instrument_node="">really</span></i><span data-dcnode-id="3625" instrument_node=""> love to read. And that fact should be mentioned wherever possible.” We wholeheartedly agreed. After all, our readers would be people who loved to read. And with inspired books like this one, what’s not to love?</span><br data-dcnode-id="3624"></span><span data-dcnode-id="3622" instrument_node="">

</span><span data-dcnode-id="3538" id="freeTextContainer9303756925245311921"><span data-dcnode-id="3539" instrument_node="">This book sucked. It's about 3 sisters who all end up moving back home to "help" their mother while she's battling breast cancer. But they all moved back home at the same time because (as they will readily admit) they are failures. How nice for their mother. The oldest, Rose, is an obnoxious know-it-all who's convinced no one can do anything without her. Everyone else is a total screw up and she (and she alone) will save the day. She's ruining her life in the process but she likes being a martyr</span></span><span data-dcnode-id="3537" instrument_node="">
</span><span data-dcnode-id="3535" id="freeText9303756925245311921" style="display:none"><span data-dcnode-id="3536" instrument_node="">This book sucked. It's about 3 sisters who all end up moving back home to "help" their mother while she's battling breast cancer. But they all moved back home at the same time because (as they will readily admit) they are failures. How nice for their mother. The oldest, Rose, is an obnoxious know-it-all who's convinced no one can do anything without her. Everyone else is a total screw up and she (and she alone) will save the day. She's ruining her life in the process but she likes being a martyr and pointing out her sisters' weaknesses. The middle child, Bianca, is a vain slut who steals money from her employers to keep up her glamour girl/party girl/slutty girl image in New York. Until she gets caught, fired and threatened with arrest for larceny. The youngest, Cordelia, is a bohemian slut who has spent all of her twenties screwing and hitchhiking her way across the country. For what reason? She doesn't have one. She only comes home when she is homeless, broke, starving and pregnant. What exactly did the terrible, awful parents of these 3 women do to screw them up? Wait for it...the father was a Shakespearean professor who liked to quote Shakespeare and named his daughters after Shakespearean characters and the mother frequently burned dinner because she was as absent minded as the father and liked to read books instead of cook. Seriously? These are obnoxious people who all deserve each other and I deserve to get back the hours it took me to read this crappy book. </span></span><span data-dcnode-id="3534" instrument_node="">

</span><span data-dcnode-id="3444" id="freeTextContainer13406379159293122079"><span data-dcnode-id="3451" instrument_node="">Three sisters, three different outlooks on life, three different opinions about working, three different attitudes concerning just about everything, but they all had the same reason for coming home.....their mother needed help because of her breast cancer. </span><br data-dcnode-id="3450"><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">Rose was the practical, organized sister, Bean was the attorney turned thief, and Cordy was still the spoiled child she always was. They all had some secret or concern as they returned to their childhood home. </span><br data-dcnode-id="3447"><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">Their childhood home was one of l</span></span><span data-dcnode-id="3443" instrument_node="">
</span><span data-dcnode-id="3422" id="freeText13406379159293122079" style="display:none"><span data-dcnode-id="3442" instrument_node="">Three sisters, three different outlooks on life, three different opinions about working, three different attitudes concerning just about everything, but they all had the same reason for coming home.....their mother needed help because of her breast cancer. </span><br data-dcnode-id="3441"><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">Rose was the practical, organized sister, Bean was the attorney turned thief, and Cordy was still the spoiled child she always was. They all had some secret or concern as they returned to their childhood home. </span><br data-dcnode-id="3438"><br data-dcnode-id="3437"><span data-dcnode-id="3436" instrument_node="">Their childhood home was one of love, of books, and Shakespearean quotes....the entire family quoted Shakespeare as they spoke and thought nothing of doing so. None of the girls was ever without a book in her hands.</span><br data-dcnode-id="3435"><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">Just as in childhood, the adult lives of each sister went opposite ways in terms of interest and responsibility, but their love and concern for each other was evident. The emotions of the characters and the descriptions of situations especially during childhood flashbacks was perfectly depicted allowing the reader to experience the hominess of small town connections and the nostalgia of coming back to your roots. </span><br data-dcnode-id="3432"><br data-dcnode-id="3431"><span data-dcnode-id="3430" instrument_node="">You will enjoy each sister for her strengths and shortcomings, and you will admire their parents for their love of each other and for the love of reading they instilled in their daughters. </span><br data-dcnode-id="3429"><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">I really enjoyed this book...if you have sisters, you will cherish it and you will most likely be comparing these characters to see which sister you are!! If you don't have sisters, the bond between all the characters will "warm your heart" and have you thinking about your own family and sibling relationships. </span><br data-dcnode-id="3426"><br data-dcnode-id="3425"><span data-dcnode-id="3424" instrument_node=""> P. S. The Three Witches or Weird Sisters are characters in William Shakespeare's play Macbeth (c. 1603–1607)...information taken from Wikipedia.</span><br data-dcnode-id="3423"></span><span data-dcnode-id="3421" instrument_node="">

</span><span data-dcnode-id="3337" id="freeTextContainer6710784608152512284"><span data-dcnode-id="3338" instrument_node="">When their mother is diagnosed with cancer, Bianca and Cordelia find themselves returning home to join their third sister, Rose, who still lives in their hometown. Bean and Cordy aren't returning to support their mother as much as they are impelled by their own messy life situations: Bianca because she has been fired for stealing from her job, and Cordelia because after years of living irresponsibly on the road, she has discovered that she is pregnant. Stalwart Rose has finally glimpsed a chance</span></span><span data-dcnode-id="3336" instrument_node="">
</span><span data-dcnode-id="3319" id="freeText6710784608152512284" style="display:none"><span data-dcnode-id="3335" instrument_node="">When their mother is diagnosed with cancer, Bianca and Cordelia find themselves returning home to join their third sister, Rose, who still lives in their hometown. Bean and Cordy aren't returning to support their mother as much as they are impelled by their own messy life situations: Bianca because she has been fired for stealing from her job, and Cordelia because after years of living irresponsibly on the road, she has discovered that she is pregnant. Stalwart Rose has finally glimpsed a chance at happiness, with a beloved fiance and plans to marry in December. </span><br data-dcnode-id="3334"><br data-dcnode-id="3333"><span data-dcnode-id="3332" instrument_node="">Their father is a renowned professor of Shakespeare, which accounts for the oddness of their names and their propensity to communicate emotion to each other in flippant or opaque quotes from The Bard's master works. It is a family of readers, described as people who will set a book down only to have someone else pick it up and wander off with it. </span><br data-dcnode-id="3331"><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">As the three sisters are thrown together in their childhood home, the pressures of living together as adults and dealing with their mother's illness and the bizarreness of returning to the quiet town they grew up in causes friction between them. Somehow, they just can't connect with each other, and they revert to bickering like teenagers. </span><br data-dcnode-id="3328"><br data-dcnode-id="3327"><span data-dcnode-id="3326" instrument_node="">The book is told in an unusual first person plural limited voice, which means passages are written "We did XYZ" where "we" is the sisters. "We" seems to know the inner workings of all the sisters' brains and hearts, but the sisters themselves are kept in the dark. This produces an intriguing tension between what the reader knows and what the sisters do, while granting an intimacy with all three. </span><br data-dcnode-id="3325"><br data-dcnode-id="3324"><span data-dcnode-id="3323" instrument_node="">The characters are well-drawn, and while none is wholly lovable, each is totally understandable. The complex, nuanced characterizations are one of the strongest points of the book. The reader gets to sit on the sisters' shoulders as they bump up against each other and spin away again, and it feels like being in the midst of a real sibling conflict, where you're not quite sure WHY you're snapping at your sister, except that 25+ years of history make it too hard to show them the same kindness you'd show a friend. </span><br data-dcnode-id="3322"><br data-dcnode-id="3321"><span data-dcnode-id="3320" instrument_node="">The plot wraps up a little neatly in the end, but I'm willing to forgive that, chalking it up to the Shakespearean influence. If you're a reader or a Shakespeare lover, I highly recommend this novel. </span></span><span data-dcnode-id="3318" instrument_node="">

</span><span data-dcnode-id="3143" id="freeTextContainer9150994429590428306"><span data-dcnode-id="3147" instrument_node="">This book is nothing like the kind of thing I choose to read. It is the kind of thing found in the "New fiction" section at Barnes and Noble, or "Literature" in other places. I'm a genre fiction sort of girl, and so this isn't something I'd have ever read under normal conditions.</span><br data-dcnode-id="3146"><br data-dcnode-id="3145"><span data-dcnode-id="3144" instrument_node="">But, when the Vice President comes flying down the hall to give you her copy because she's sure you'd enjoy it...well.... And to be fair, we did talk about it when we were doing the Walk for the Cure in October, and our </span></span><span data-dcnode-id="3142" instrument_node="">
</span><span data-dcnode-id="3109" id="freeText9150994429590428306" style="display:none"><span data-dcnode-id="3141" instrument_node="">This book is nothing like the kind of thing I choose to read. It is the kind of thing found in the "New fiction" section at Barnes and Noble, or "Literature" in other places. I'm a genre fiction sort of girl, and so this isn't something I'd have ever read under normal conditions.</span><br data-dcnode-id="3140"><br data-dcnode-id="3139"><span data-dcnode-id="3138" instrument_node="">But, when the Vice President comes flying down the hall to give you her copy because she's sure you'd enjoy it...well.... And to be fair, we did talk about it when we were doing the Walk for the Cure in October, and our tastes do overlap considerably.</span><br data-dcnode-id="3137"><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node="">So, I figured--what the heck! I'll give it a go.</span><br data-dcnode-id="3134"><br data-dcnode-id="3133"><span data-dcnode-id="3132" instrument_node="">It was lovely.</span><br data-dcnode-id="3131"><br data-dcnode-id="3130"><span data-dcnode-id="3129" instrument_node="">The narrative voice is...witty, and acerbic, and warm (as appropriate), and just a little odd. Odd in a good way (a very original use of first person). It has three interesting sisters as the protagonists--and this is the chick-lit part that normally I don't go near--who are growing, and learning, and becoming better than they start out the book as.</span><br data-dcnode-id="3128"><br data-dcnode-id="3127"><span data-dcnode-id="3126" instrument_node="">There were some uncomfortable moments, like seeing some of what I like least about myself on the page; some events are near triggers given what is going on in the lives of some friends; and making me feel homesick for the family I've lost, for dreams I abandoned. But, for all that, I'm glad I read it.</span><br data-dcnode-id="3125"><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">But, of course, I've gone on too long, a bit incoherently. If I were the father in this novel, I'd simply have said, </span><br data-dcnode-id="3122"><br data-dcnode-id="3121"><span data-dcnode-id="3120" instrument_node="">"If we shadows have offended,</span><br data-dcnode-id="3119"><span data-dcnode-id="3118" instrument_node="">Think but this, and all is mended,</span><br data-dcnode-id="3117"><span data-dcnode-id="3116" instrument_node="">That you have but slumber'd here</span><br data-dcnode-id="3115"><span data-dcnode-id="3114" instrument_node="">While these visions did appear.</span><br data-dcnode-id="3113"><span data-dcnode-id="3112" instrument_node="">And this weak and idle theme,</span><br data-dcnode-id="3111"><span data-dcnode-id="3110" instrument_node="">No more yielding but a dream..."</span></span><span data-dcnode-id="3108" instrument_node="">
</span><a data-dcnode-id="3106" data-text-id="9150994429590428306" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="3107" instrument_node="">...more</span></a><span data-dcnode-id="3105" instrument_node="">

</span><span data-dcnode-id="3018" id="freeText11243698162953301767" style="display:none"><span data-dcnode-id="3022" instrument_node=""> When I was in my 20s, for every three "literary" works I read, I would read one mystery and one romance novel, the latter for pure escapsism. When I began The Weird Sisters, I was hopeful that it could an ideal combination of fine writing but a fun/easier read. Indeed, Eleanor Brown has beautiful phrases and expressions sprinkled generously througout this book. Unfortunately, it just isn't enough to make The Weird Sisters work for me. In talking about a character's pre-determined fate vs what can be changed, the book one dimensional--each personality doing precisely what the puppeteer dictates. This made for frustrating reading because I would have loved a complex story about sisters. There are shades of Alice Hoffman in this book, without the magic. But here again, Brown overdoes the point that this is an unusual and quirky family so what should be fascinating about them becomes banal. While I wouldn't recommend this book, I am eager to see what Brown writes next because if she marries her excellent use of language with more compelling characters and action, I would be an eager reader.</span><br data-dcnode-id="3021"><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node=""> I have one more observation. In reading the reviews of others--both of this book and others--I was diappointed to find abusive language and a complete lack of respect for the author and the potential reader. I think back to my review of Amy Sohn's Motherland, which I debated over because I thought it was harsh. Perhaps it was because I thought Sohn's book was mean. But I I couldn't imagine cursing the author or just flinging negative criticism without backing it up. If we choose to review a book we should do so responsibly.</span></span><span data-dcnode-id="3017" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2949" title="did not like it"><span class="staticStar p10" data-dcnode-id="2954" size="15x15"><span data-dcnode-id="2955" instrument_node="">did not like it</span></span><span class="staticStar p0" data-dcnode-id="2953" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2952" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2951" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2950" size="15x15"></span></span><span data-dcnode-id="2948" instrument_node="">

</span><span data-dcnode-id="2933" id="freeTextContainer1054937261613212488"><span data-dcnode-id="2943" instrument_node="">Up front, I have to say that when I discovered this novel, I went into it with the truest of intentions. I mean, I come from a family with three sisters--I'm the youngest and I know a little bit about Shakespeare--happen to love Othello and The Taming of the Shrew. </span><br data-dcnode-id="2942"><br data-dcnode-id="2941"><span data-dcnode-id="2940" instrument_node="">But this story just seemed to go into places that I couldn't get into and didn't much care for. </span><br data-dcnode-id="2939"><br data-dcnode-id="2938"><span data-dcnode-id="2937" instrument_node="">Only real quick, this wouldn't be a 'classic' Novelwit2000 review, if I didn't bring up the thing with the names. </span><br data-dcnode-id="2936"><br data-dcnode-id="2935"><span data-dcnode-id="2934" instrument_node="">I thought it was a novel</span></span><span data-dcnode-id="2932" instrument_node="">
</span><span data-dcnode-id="2888" id="freeText1054937261613212488" style="display:none"><span data-dcnode-id="2931" instrument_node="">Up front, I have to say that when I discovered this novel, I went into it with the truest of intentions. I mean, I come from a family with three sisters--I'm the youngest and I know a little bit about Shakespeare--happen to love Othello and The Taming of the Shrew. </span><br data-dcnode-id="2930"><br data-dcnode-id="2929"><span data-dcnode-id="2928" instrument_node="">But this story just seemed to go into places that I couldn't get into and didn't much care for. </span><br data-dcnode-id="2927"><br data-dcnode-id="2926"><span data-dcnode-id="2925" instrument_node="">Only real quick, this wouldn't be a 'classic' Novelwit2000 review, if I didn't bring up the thing with the names. </span><br data-dcnode-id="2924"><br data-dcnode-id="2923"><span data-dcnode-id="2922" instrument_node="">I thought it was a novel idea that the three sisters were named after characters from Shakespeare--and maybe we should've left it at that. Only the author wanted to give them these nick names that were essentially their names throughout the story. </span><br data-dcnode-id="2921"><br data-dcnode-id="2920"><span data-dcnode-id="2919" instrument_node="">Now I'll say I get 'Rose' for Rosalind. And 'Cordy' for Cordelia. But how on EARTH do you get 'Bean' for Bianca? To have to read the name Bean practically every page of this book had to be one of the most grating things ever. Only because the name Bean just seemed so...weird. It was a weird choice certainly given how glamorous this character Bean was supposed to be. I mean, the name to me, just NEVER seemed to sit well with her. Might I have suggested a name like 'BeBe' or maybe even the exotic 'Bia'? To me, those names would've been WAY more appropriate. Because to me the name 'Bean' just sounded...well...again I'll say it, WEIRD! (I don't think I can say it enough how so very important it is for an author to get the names right for their characters.) Because to do otherwise, can be a real train wreck. I mean, could you imagine 'Romeo &amp; Diane'? Or if Dorothy's name in the Wizard of Oz was 'Sharon'? This (getting the name right) shouldn't be that hard of a thing to do--but seeing how so many authors out there seem to get this all so very wrong, I guess maybe this IS a hard thing to do after all. Oh well? Moving on... </span><br data-dcnode-id="2918"><br data-dcnode-id="2917"><span data-dcnode-id="2916" instrument_node="">Early on in this book, it's like there was something unsavory about this story. Only because it's like you have a scenario wherein the mom gets sick and it's looking like she's going to need help in her recovery--so here come the troops of her daughters coming back home to give her this help. </span><br data-dcnode-id="2915"><br data-dcnode-id="2914"><span data-dcnode-id="2913" instrument_node="">And this in and of itself, would've been such a noble thing. I mean, I could tell the author that you had a reason for the daughters to come come back home--their mother's illness. That's ALL you needed. Only as the story unfolds, there are all these OTHER reasons why they REALLY came home. And the reasons are pretty MAJOR too! (I won't give anything away.) But what was put on Bean, was just too much. I mean, for what she did, I would think a lawyer would've needed to be involved. That and maybe some jail time. I mean, when you read what happens here, it's kinda REAL hard to accept that with what she's done, she's just allowed to walk. But oh well, that's how the author wanted to fashion this story. Go figure? </span><br data-dcnode-id="2912"><br data-dcnode-id="2911"><span data-dcnode-id="2910" instrument_node="">Also, the thing with Rose being around to take care of things. It's like maybe she's not all that noble after all. </span><br data-dcnode-id="2909"><br data-dcnode-id="2908"><span data-dcnode-id="2907" instrument_node="">And the thing with Cordy finally growing up? Wow, does she pick a real doozy to prove this point! </span><br data-dcnode-id="2906"><br data-dcnode-id="2905"><span data-dcnode-id="2904" instrument_node="">Also, it's something in the rhythm of the writing here. The story would kinda jump around without a lot of preparation and you'd be here or there. And I'd think, wow I guess we're here now. OK, let's see what we got now. I really felt this when Rose went to England. I was thinking (given the situation with her mother) that there would've been a scene where Rose would've lined up her sisters and given them a list of these complete instructions on what to do and everything. Only this didn't happen. (And I could say that because of this LACK of direction, there were times when I felt lost--like there were these gaping holes in the narrative.) We get this again with Cordy too when she abruptly decides to take off. </span><br data-dcnode-id="2903"><br data-dcnode-id="2902"><span data-dcnode-id="2901" instrument_node="">Also, a lot of times I felt like the father in the story was disturbingly eccentric with all of his Shakespearean quoting and stuff. I mean, all I could think was 'just enough' of this would've been all right. But when you do this so much, then it starts being too over the top, pointless and really very distracting. I mean, I would've been more impressed with more REAL dialogue from him. </span><br data-dcnode-id="2900"><br data-dcnode-id="2899"><span data-dcnode-id="2898" instrument_node="">And then it was something about the pacing of the story. It was like the story was supposed to be going in a certain direction, then it would turn the corner and do this segue into things of the past. This was done quite often and I would've appreciated going forward with the story already. </span><br data-dcnode-id="2897"><br data-dcnode-id="2896"><span data-dcnode-id="2895" instrument_node="">So you know, I'll just go forward with my review already! </span><br data-dcnode-id="2894"><br data-dcnode-id="2893"><span data-dcnode-id="2892" instrument_node="">Simply put, I did not care for this novel at all. The characters were not people that I enjoyed being around or getting to know. And they did NOT seem or feel like sisters to me. </span><br data-dcnode-id="2891"><br data-dcnode-id="2890"><span data-dcnode-id="2889" instrument_node="">All in all, I cannot, nor would I EVER recommend this book to anyone. </span></span><span data-dcnode-id="2887" instrument_node="">

</span><span data-dcnode-id="2803" id="freeTextContainer16975624636843481983"><span data-dcnode-id="2807" instrument_node="">I would have abandoned this book if I hadn't been traveling this week. Much like </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/140954419" rel="nofollow noopener"><span data-dcnode-id="2806" instrument_node="">The Cookbook Collector</span></a><span data-dcnode-id="2804" instrument_node="">, it's the story of upper-middle-class sisters testing the boundaries and distinctions between one another, only here there is an additional veneer of literary vanity in the form of copious quotations from Shakespeare. In this book, you see, the sisters' father is a professor specializing in the Bard, so they all quote him as the occasion rises. It's supposed to be clever, but I came away with </span></span><span data-dcnode-id="2802" instrument_node="">
</span><span data-dcnode-id="2785" id="freeText16975624636843481983" style="display:none"><span data-dcnode-id="2801" instrument_node="">I would have abandoned this book if I hadn't been traveling this week. Much like </span><a data-dcnode-id="2799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/140954419" rel="nofollow noopener"><span data-dcnode-id="2800" instrument_node="">The Cookbook Collector</span></a><span data-dcnode-id="2798" instrument_node="">, it's the story of upper-middle-class sisters testing the boundaries and distinctions between one another, only here there is an additional veneer of literary vanity in the form of copious quotations from Shakespeare. In this book, you see, the sisters' father is a professor specializing in the Bard, so they all quote him as the occasion rises. It's supposed to be clever, but I came away with the impression that the author wrote this with a concordance to Shakespeare by her side and periodically would look up a word like "retirement" and throw in a quote without necessarily understanding it.</span><br data-dcnode-id="2797"><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">The author also attempts the type of first-person plural narration used to such good effect in </span><i data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">Then We Came to the End</span></i><span data-dcnode-id="2792" instrument_node="">. The three sisters are referred to as "we" (and "our parents," etc.) but each individually is referred to in the third person, so that you can't tell who is really telling the story--or perhaps they all are. This isn't nearly as interesting as the same device in Joshua Ferris's book, because he makes the reader wonder who the narrator of his story is: is it one of the characters we're reading about; a separate, shy character who is present only on the sidelines; or something else? And as that story goes on, Ferris cleverly whittles down who the narrator(s) might be. Here, there is no such resolution--the author just decided to use the second person when referring to the characters collectively. It seems like nothing more than an affectation.</span><br data-dcnode-id="2791"><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">These are the two embellishments that are meant to distinguish this otherwise ordinary story of adult children coming home. (The reason for their homecoming is not Christmas, but their mother's breast cancer treatments, which earns the novel another check on the book club list.) </span><br data-dcnode-id="2788"><br data-dcnode-id="2787"><span data-dcnode-id="2786" instrument_node="">And if I weren't already annoyed by this book's pretensions, the author decided to throw in a librarian character. One of the sisters, who had hitherto distinguished herself as an alcoholic flirt, an adulterer, and an inept embezzler from the small law firm where she worked as a secretary, loved the library as a child, and the librarian suggests that she take over while the older woman recovers from hip replacement surgery. The sister protests that she's unqualified, and the librarian says, "It's hardly rocket science, dear." Later we see this budding bibliophile apparently automate the library in the space of an afternoon. I imagine that the author meant this as a loving tribute to the librarians who taught her to love reading, but really, with fans like these, who needs enemies?</span></span><span data-dcnode-id="2784" instrument_node="">

</span><span data-dcnode-id="2670" id="freeTextContainer15855560919461568960"><span data-dcnode-id="2671" instrument_node="">My TBR pile has grown ridiculously huge of late (my house is hoarding half my public library's precious cargo). Despite this ever-increasing mountain of unread promises, my reading pace has proportionately slowed. At a time when I should be blazing through the pages of every book I pick up, I find myself smelling the proverbial roses. The faster I burn through a book, the more quickly I am to forget it anyway, even the real gems. Plus, life just gets in the way sometimes and it's been doing a da</span></span><span data-dcnode-id="2669" instrument_node="">
</span><span data-dcnode-id="2650" id="freeText15855560919461568960" style="display:none"><span data-dcnode-id="2668" instrument_node="">My TBR pile has grown ridiculously huge of late (my house is hoarding half my public library's precious cargo). Despite this ever-increasing mountain of unread promises, my reading pace has proportionately slowed. At a time when I should be blazing through the pages of every book I pick up, I find myself smelling the proverbial roses. The faster I burn through a book, the more quickly I am to forget it anyway, even the real gems. Plus, life just gets in the way sometimes and it's been doing a darn good job of pulling me away from the last few books I've picked up. </span><br data-dcnode-id="2667"><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">This one I was more than happy to spend a whole week with, sneaking short sweet moments with it every chance I got. Nothing really happens in this book, but it hums along at a wonderful pace. How could I not be pulled into a story about sisters and the dynamics of small town life, that celebrates books, the Bard, and new beginnings. As Rose, Bean and Cordy show us, no matter how much a life seems utterly derailed, it's never too late to start over. Quite often only through complete failure can we find our way to where we're supposed to be. </span><br data-dcnode-id="2664"><br data-dcnode-id="2663"><span data-dcnode-id="2662" instrument_node="">If that all sounds a little too touchy-feely, hippy-do for you, I won't lie -- it </span><i data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">is</span></i><span data-dcnode-id="2659" instrument_node=""> touchy-feely, hippy-do -- but it's a touchy-feely, hippy-do that's wrapped in staggeringly gorgeous prose and turns of phrase. I nearly drove my boyfriend crazy following him around the house to recite certain passages. I just couldn't resist, Brown uses language that's meant to be read aloud. </span><br data-dcnode-id="2658"><br data-dcnode-id="2657"><span data-dcnode-id="2656" instrument_node="">The novel could have easily descended into an Oprah/Hallmark co-production of the week but it is saved from that nausea-inducing fate by carefully crafted and lovable sisters and language that flows like sparkling water out of a mountain spring (too much? yeah, I should have quit while I was ahead). </span><br data-dcnode-id="2655"><br data-dcnode-id="2654"><span data-dcnode-id="2653" instrument_node="">I'm a zombie-loving girl who needed a break from bleak dystopias and nerve-jangling apocalypses. This book totally fit the bill. </span><br data-dcnode-id="2652"><br data-dcnode-id="2651"></span><span data-dcnode-id="2649" instrument_node="">

</span><span data-dcnode-id="2556" id="freeText11703814322870853560" style="display:none"><span data-dcnode-id="2560" instrument_node="">Poor Eleanor Brown. I think from reading other reviews she unfairly gets a bad rap. Yes it's true this book is is not high class literature but it is an interesting take on birth order roles and interactions of siblings. It's also true that the characters often are self absorbed malcontents (as one good read reviewer put it) but their struggles, while they may seem superficial to some, feel genuine and their pain real. </span><br data-dcnode-id="2559"><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node="">Also I think the idea of three sibling coming home to care for their ailing mother would in fact cause all the tension, conflict, jealousies to boil over. Haven't we all at some point been home for the holidays and 48 hours in find ourselves back to being a moody teenager infighting with siblings over whose the favorite, who takes the most responsibly, and who is always able to get away with murder. I know it happens in my house. So to me the Weird sisters represent a true family that may not be completely prepared, mentally or physically, to deal with their sick mother, let alone deal with each other, but they try and fail and try again, and thats how many families work, and there is nothing weird about that.</span></span><span data-dcnode-id="2555" instrument_node="">

</span><span data-dcnode-id="2431" id="freeText3230308126649729690" style="display:none"><span data-dcnode-id="2438" instrument_node="">Oh book how I hated thee. Let me count the ways. One detail that bothered me greatly was that these girls were constantly reading, but never does the author tell us what they are reading. I like books about books about books. A book about books this was not. </span><br data-dcnode-id="2437"><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">Then there was the disappointing fact that these sisters were in no way weird. They WERE banal, cliche, boring, trite, annoying, and unrealistic. First we have Rose the stuffy, plain, type-A eldest sister who just needs to learn to give up her dreams of having a career so that she can move on to much more important things like romance. As soon as she can let go of those unladylike old-maidish dreams of hers...WOW she can become a totally different person. Ta Da! She can be a happy housewife with new interests like dropping in to a tai-chi class and living with her perfect husband far far away from that annoying family of hers. Well... I would want to get away too. The other main characters Cordy and Bean are equally hate-able. Bean the stealing slut and Cordy the spacy hippy ho-bag. Luckily in Barnwell where this book takes place, men are just idealistic receptacles where the crazy thirty-something women of the world can dump their crappy personalities and find fulfillment and meaning. Yuck, barf, gag-me-with-a-spoon. </span><br data-dcnode-id="2434"><br data-dcnode-id="2433"><span data-dcnode-id="2432" instrument_node="">I give this book one star because some of the references to the Immortal Bard were interesting and helpful in my goodreads trivia. Also it gets points for the use of first person plural narrative style. That was a bit fresh. </span></span><span data-dcnode-id="2430" instrument_node="">

</span><span data-dcnode-id="2337" id="freeTextContainer7704660635688214904"><span data-dcnode-id="2341" instrument_node="">A feel-good book, something that will burn your heart with affection to the characters, and at the end will warm your heart with its story.</span><br data-dcnode-id="2340"><br data-dcnode-id="2339"><span data-dcnode-id="2338" instrument_node="">The story is simple - three sisters who were reunited in their home town to aid their ailing mother. There's nothing fancy about the plot, except when you started to read it. What I love about the book is how expected each moment can be, yet there is a dash of twist in each way the story was told. Each sisters has their own story, which they tried to ran away</span></span><span data-dcnode-id="2336" instrument_node="">
</span><span data-dcnode-id="2322" id="freeText7704660635688214904" style="display:none"><span data-dcnode-id="2335" instrument_node="">A feel-good book, something that will burn your heart with affection to the characters, and at the end will warm your heart with its story.</span><br data-dcnode-id="2334"><br data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">The story is simple - three sisters who were reunited in their home town to aid their ailing mother. There's nothing fancy about the plot, except when you started to read it. What I love about the book is how expected each moment can be, yet there is a dash of twist in each way the story was told. Each sisters has their own story, which they tried to ran away from, and they found refuge in their old home, where their childhood and fondest, simplest memories started and remains.</span><br data-dcnode-id="2331"><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">Being the youngest of a sisterhood of 5, I find the story close to my heart. I understand how hard it can be for the characters to have siblings and argue for attention. Fortunately for me, I'm the youngest, so it's not that hard to seek attention and affection.</span><br data-dcnode-id="2328"><br data-dcnode-id="2327"><span data-dcnode-id="2326" instrument_node="">I wouldn't talk much about the characters, since the reader has to discover each characters weakness and strength to appreciate their story. I love how the characters seems to be real, they aren't perfect, they're just like any ordinary human beings we get to meet everyday. I love the simple but real dramas, the angst, and the pain of each character.</span><br data-dcnode-id="2325"><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">If you love your family, or even if you don't, which I also doubt, you'll find this book a heartwarming read. After reading it, I found myself thanking God for sending me 4 obnoxious yet supportive older sisters.</span></span><span data-dcnode-id="2321" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2244" title="liked it"><span class="staticStar p10" data-dcnode-id="2249" size="15x15"><span data-dcnode-id="2250" instrument_node="">liked it</span></span><span class="staticStar p10" data-dcnode-id="2248" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2247" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2246" size="15x15"></span><span class="staticStar p0" data-dcnode-id="2245" size="15x15"></span></span><span data-dcnode-id="2243" instrument_node="">
</span><div class="uitext greyText bookshelves" data-dcnode-id="2235"><span data-dcnode-id="2242" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="2240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/27443399-tiffany-psquared%3Fshelf%3Dbookmooch-giveaways"><span data-dcnode-id="2241" instrument_node="">bookmooch-giveaways</span></a><span data-dcnode-id="2239" instrument_node="">, 
              </span><a class="actionLinkLite" data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/27443399-tiffany-psquared%3Fshelf%3D2018-reading-challenge"><span data-dcnode-id="2238" instrument_node="">2018-reading-challenge</span></a><span data-dcnode-id="2236" instrument_node="">

</span><span class="readable" data-dcnode-id="2169" id="reviewTextContainer2111580801"><span data-dcnode-id="2230" instrument_node="">
</span><span data-dcnode-id="2224" id="freeTextContainer4589649059691197758"><b data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">“Sisters keep secrets. Because sisters' secrets are swords.” </span></b><br data-dcnode-id="2227"><br data-dcnode-id="2226"><span data-dcnode-id="2225" instrument_node="">The small college town of Barnwell, OH welcomes back three of its native daughters whose lives are all in varying degrees of utter catastrophe. Rose, who never truly left home, but is feeling the pressure of a fiancé whose big dreams lie overseas. Bean, whose New York aspirations have ultimately grown into something nefarious and criminal. And Cordy, the youngest, whose Bohemian lifestyle has finally managed to catch up to her in one b</span></span><span data-dcnode-id="2223" instrument_node="">
</span><span data-dcnode-id="2174" id="freeText4589649059691197758" style="display:none"><b data-dcnode-id="2221"><span data-dcnode-id="2222" instrument_node="">“Sisters keep secrets. Because sisters' secrets are swords.” </span></b><br data-dcnode-id="2220"><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">The small college town of Barnwell, OH welcomes back three of its native daughters whose lives are all in varying degrees of utter catastrophe. Rose, who never truly left home, but is feeling the pressure of a fiancé whose big dreams lie overseas. Bean, whose New York aspirations have ultimately grown into something nefarious and criminal. And Cordy, the youngest, whose Bohemian lifestyle has finally managed to catch up to her in one big long-term way.</span><br data-dcnode-id="2217"><br data-dcnode-id="2216"><b data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">“Long ago she had thought bravery equaled wandering, the power was in the journey. Now she knew that, for her, it took no courage to leave; strength came from returning. Strength lay in staying.”</span></b><br data-dcnode-id="2213"><br data-dcnode-id="2212"><span data-dcnode-id="2211" instrument_node="">Written in a type of omniscient first person/third person voice who is basically a conglomeration of the psyches of all three sisters, this story of the Andreas girls commences with a reunion – of a sort – at their childhood home after receiving news that their mother is ill.</span><br data-dcnode-id="2210"><br data-dcnode-id="2209"><span data-dcnode-id="2208" instrument_node="">Brown does a fine job of weaving us through the present and past, nicely transitioning us through prom dates and managerial meetings, untraditional grade school classes and grown-up career choices without jarring us with abrupt chapter changes and awkward character shifts. With so many main characters, you would think that one would take precedence or that another would fall by the wayside becoming a bit less developed than the others. However, that is not the case. Brown fleshes them all out equally. We learn their tastes, their vices, their singular sins, and their hearts’ desires. I didn’t personally connect with all of the characters, and that’s perfectly fine. If I had, I think I’d be characterized as quite a split personality. Brown made sure that these were sisters, but not triplets. They each had their own unique traits and eccentricities, which isn’t an easy accomplishment for any author.</span><br data-dcnode-id="2207"><br data-dcnode-id="2206"><span data-dcnode-id="2205" instrument_node="">I related most to Rose, the careful, mothering eldest sister who is always on time and can mend a hangover, but who also becomes irate over spilled water and lackadaisical attitudes. Like Rose, the callousness of her sisters often irritated me too. And I sympathized with her dilemma of having to choose between her dream career and the man she loves. And, like her too, I always like to have a box of tissues on hand.</span><br data-dcnode-id="2204"><br data-dcnode-id="2203"><span data-dcnode-id="2202" instrument_node="">Another reader may just as easily have been able to identify with one of the other sisters: The careless drifter who has just received a large dose of reality, or the middle child who was so sure that her escape from this small, sleepy town had been final.</span><br data-dcnode-id="2201"><br data-dcnode-id="2200"><b data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">“I keep waiting to feel old, to feel like a grown-up, but I don't yet. Do you think that's the big secret adults keep from you? That you never feel like a grown-up?”</span></b><br data-dcnode-id="2197"><br data-dcnode-id="2196"><span data-dcnode-id="2195" instrument_node="">Admitting that this book was a slow burn the entire way through is tough for me. I so wanted to immediately like it. I wanted to breeze through it and sit at the end thinking, “Wow, what a great read!” Sorry, that didn’t happen. It was often a sad, depressing, and disheartening look at the uncertainty and complexity of life. It stood as a reminder to me (as if I needed to be reminded) that being an adult is often fraught with sadness, dissatisfaction, and dangerous decisions.</span><br data-dcnode-id="2194"><span data-dcnode-id="2193" instrument_node=""> </span><br data-dcnode-id="2192"><b data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">“We were fairly certain that if anyone made public the various and variegated ways in which being an adult sucked eggs, more people might opt out entirely.”</span></b><br data-dcnode-id="2189"><br data-dcnode-id="2188"><span data-dcnode-id="2187" instrument_node="">Despite the enticing title, the sisters didn’t appear to be any weirder than any of the rest of us who are also tackling our day-to-day hills and valleys. They read books (hello). They quote Shakespeare (could have been movies, or poetry, or Game of Thrones). And they have each made messes of their lives in some way, shape or form (been there, done that).</span><br data-dcnode-id="2186"><br data-dcnode-id="2185"><span data-dcnode-id="2184" instrument_node="">The truth of the title lies a little to the left of “weird”. We think of someone who is weird as being strange, eccentric or a little off-kilter. But to Shakespeare, the word was actually “wyrd” and it meant fate. So his three weird sisters were considered goddesses of destiny; and in Macbeth, it was of the sinister kind. Since Brown’s three sisters were named for three of Shakespeare’s heroines, they also carry this mantle of unruly goings-on that may have been rightfully earned through this association.</span><br data-dcnode-id="2183"><br data-dcnode-id="2182"><b data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">“We wear our names heavily. And though we have tried to escape their influence, they have seeped into us, and we find ourselves living their patterns again and again.”</span></b><br data-dcnode-id="2179"><br data-dcnode-id="2178"><span data-dcnode-id="2177" instrument_node="">I could easily recommend this book to fans of family drama who don’t mind an angst-filled, guilt-ridden story that feels a little rehearsed and familiar. Nonetheless, it is well-written and the unique narrative voice adds a special perspective. However, I found myself plodding through portions of the text wishing for the good parts, or if that wasn’t possible, just an ending that didn’t make me regret picking up this book in the first place. And, in the end, I didn’t.</span><br data-dcnode-id="2176"><span data-dcnode-id="2175" instrument_node="">⭐⭐⭐</span></span><span data-dcnode-id="2173" instrument_node="">

</span><span data-dcnode-id="2056" id="freeText17449227741420631596" style="display:none"><span data-dcnode-id="2081" instrument_node="">What bibliophile could resist The Weird Sisters, a story about three book-loving but otherwise very different sisters all named for characters from Shakespeare? I’ve succumbed to its charms twice, reading the book in 2011 and listening to the audio version in 2014.</span><br data-dcnode-id="2080"><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">My review from 2011:</span><br data-dcnode-id="2077"><br data-dcnode-id="2076"><span data-dcnode-id="2075" instrument_node="">I loved this satisfying, hopeful, intelligent book from start to finish. It’s a sort of belated coming of age story about three twentysomething, verging on thirtysomething, sisters who grew up in the small college town where their father is employed as a Shakespeare scholar. Their mother has just been diagnosed with cancer and they are all back home to help. </span><br data-dcnode-id="2074"><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">Each sister is named for a heroine from Shakespeare and the title, The Weird Sisters, comes of course from Shakespeare’s play Macbeth. When Macbeth was written the word “weird” meant something closer to fate, and the book’s story contains a mixture of determinism, because each sister is influenced by being born with a particular birth order into a household consumed with Shakespeare, and free will, since each sister immediately sets out to carve her own life.</span><br data-dcnode-id="2071"><br data-dcnode-id="2070"><span data-dcnode-id="2069" instrument_node="">When I read in reviews that The Weird Sisters has a first person plural narrator, a "we" that includes all three sisters, I pictured a homogenized Greek chorus and was extremely skeptical that the book could delve deeply enough into any of them to be interesting. That turned out to be far from true, and far from being interchangeable these sisters have stark differences that make it hard for them to get along sometimes. Part of why the first person plural works so well though—and it would be worth reading the book for that alone—is that being family the sisters share the same history, have common understandings, and know each other very well.</span><br data-dcnode-id="2068"><br data-dcnode-id="2067"><span data-dcnode-id="2066" instrument_node="">And they all love reading. When a soon to be dumped New York City boyfriend of Bianca’s asks incredulously how she has time to finish a few hundred books a year, she narrows her eyes and in a speech that will thrill reading addicts tells him she doesn’t waste hours flipping through cable channels complaining that nothing is on, doesn’t fritter away her Sundays on pre-game, in-game and post-game TV, and doesn’t hang out every night drinking overpriced beer with other hot shot financial workers. Instead, every moment in line, on the train, or eating she--and her sisters--spend reading. </span><br data-dcnode-id="2065"><br data-dcnode-id="2064"><span data-dcnode-id="2063" instrument_node="">But their differences are as significant as their similarities and all three sisters have big decisions to make. Rosalind, the oldest, has a passion for order, being in charge and staying put, but her fiancé wants the two of them to move to England. Bianca, the middle child, has taken great risks, even breaking laws, because she longs for attention, glamour and the kind of cosmopolitan life that can only be found far from their Ohio hometown, but after being fired from her job she has to rethink everything. Cordelia, the youngest, has been living a sort of always on the road hippie vagabond life, but now she’s pregnant and putting off telling anyone or even thinking much about her situation.</span><br data-dcnode-id="2062"><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">Part of the book’s charm is its beautiful scenes, especially the ones of common childhood memories, like the time all three sisters danced with wild abandon on their porch, and the time they “borrowed” the family car, even though none of them was old enough to drive, because they wanted oversize, late night ice cream cones. I am hoping for another book from Eleanor Brown.</span><br data-dcnode-id="2059"><br data-dcnode-id="2058"><br data-dcnode-id="2057"></span><span data-dcnode-id="2055" instrument_node="">

</span><span class="readable" data-dcnode-id="1779" id="reviewTextContainer1843826861"><span data-dcnode-id="1837" instrument_node="">
</span><span data-dcnode-id="1828" id="freeTextContainer14308497822839356619"><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/571131.Eleanor_Brown" rel="nofollow noopener" title="Eleanor Brown"><span data-dcnode-id="1836" instrument_node="">Eleanor Brown</span></a><span data-dcnode-id="1834" instrument_node=""> (the author of this book) spoke at our Staff Day this year. Turns out, she's a board member for our library district. I had no idea. I think I only know 2 of the members on the board since I stopped attending the meetings a few years back. So much has changed.</span><br data-dcnode-id="1833"><span data-dcnode-id="1832" instrument_node="">At any rate, Brown was delightful and hilarious as our keynote speaker and I decided we need to be BFFs. But I don't think that's going to happen so, instead, I read this, her first book and now we </span><i data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">can't</span></i><span data-dcnode-id="1829" instrument_node=""> be BFFs because I'm no</span></span><span data-dcnode-id="1827" instrument_node="">
</span><span data-dcnode-id="1784" id="freeText14308497822839356619" style="display:none"><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/author/show/571131.Eleanor_Brown" rel="nofollow noopener" title="Eleanor Brown"><span data-dcnode-id="1826" instrument_node="">Eleanor Brown</span></a><span data-dcnode-id="1824" instrument_node=""> (the author of this book) spoke at our Staff Day this year. Turns out, she's a board member for our library district. I had no idea. I think I only know 2 of the members on the board since I stopped attending the meetings a few years back. So much has changed.</span><br data-dcnode-id="1823"><span data-dcnode-id="1822" instrument_node="">At any rate, Brown was delightful and hilarious as our keynote speaker and I decided we need to be BFFs. But I don't think that's going to happen so, instead, I read this, her first book and now we </span><i data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">can't</span></i><span data-dcnode-id="1819" instrument_node=""> be BFFs because I'm not giving this a glowing five-star review and who wants to be friends with people who don't adore everything you do, right? I mean, that can't happen twice in a lifetime, can it?</span><br data-dcnode-id="1818"><br data-dcnode-id="1817"><span data-dcnode-id="1816" instrument_node="">Summary: Three sisters whose father was a Shakespeare professor and whose mother is a dreamer come home to Ohio. Cordelia/Cordy (named from </span><a data-dcnode-id="1814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/12938.King_Lear" rel="nofollow noopener" title="King Lear by William Shakespeare"><span data-dcnode-id="1815" instrument_node="">King Lear</span></a><span data-dcnode-id="1813" instrument_node="">) is the youngest, a flighty nomad who just assumes everything will turn out alright until she finds out she’s pregnant and realizes she can't bank on things working out on their own anymore; attention-starved sexpot Bianca/Bean (named from </span><a data-dcnode-id="1811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/47021.The_Taming_of_the_Shrew" rel="nofollow noopener" title="The Taming of the Shrew by William Shakespeare"><span data-dcnode-id="1812" instrument_node="">The Taming of the Shrew</span></a><span data-dcnode-id="1810" instrument_node="">) who has been embezzling from the lawfirm for which she’d worked, never thinking about what would happen when she was caught and then she’s caught, fired, and left penniless; and Rosalind/Rose (named from </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/book/show/42607.As_You_Like_It" rel="nofollow noopener" title="As You Like It by William Shakespeare"><span data-dcnode-id="1809" instrument_node="">As You Like It</span></a><span data-dcnode-id="1807" instrument_node=""> but also by any other name?), who never left her hometown because she felt she needed to be near the parents, is an uptight, humorless martyr whose fiance has accepted a teaching position abroad and Rose doesn’t want to go with him. They all move back into their parents' house, Rose to help with her mother, Bean to get back on her feet and reconcile with her recent past, and Cordy because impending baby, and get along about as well as you'd expect while their mother goes to chemo and their father constantly quotes Shakespeare all the damn time.</span><br data-dcnode-id="1806"><br data-dcnode-id="1805"><span data-dcnode-id="1804" instrument_node="">I enjoyed this story but, man, it was a difficult journey because I felt like I was stuck with all these people I didn't like; seriously, I don't think there was one character in this book to whom I felt attached in any way. I completely understand why none of these characters had any friends! None of them! The parents don't have friends, they only have each other and their daughters. The sisters don't have friends, they only have each other and their parents and the men-folk to whom they're attached. The menfolk don't have friends, the neighbors don't have friends, the librarian has no friends and it makes sense because none of them are like-able people. So while this was well-written, it was also tedious. Every few paragraphs, I'd sigh and wonder just how these fictional people manage to survive this fictional world.</span><br data-dcnode-id="1803"><span data-dcnode-id="1802" instrument_node="">There were things I did recognize, though, specifically three sisters coming together both because of personal issues and because their mother is diagnosed with cancer. That hit close to home, having just been through the exact same thing this year, though with a dramatically different outcome. For instance, Noelle (she would be the Bianca) and I (I'm the Rose) found out this holiday season that we're not on speaking terms with the youngest (the Cordelia) when our step-dad told us we were the reason she wasn't in attendance for the festivities. Noelle and I shrugged and were all nasty about it with things like, "Best Christmas present ever!" and other cruelties. But, really, it was nice to not have the drama at the table this past weekend and I am sure she was happier wherever she was because she would have been able to be herself and to have the spotlight that we consistently deny her.</span><br data-dcnode-id="1801"><br data-dcnode-id="1800"><span data-dcnode-id="1799" instrument_node="">You know what I did really like in this tale? The narrator (the one in the story not the person reading this audiobook). The Weird Sisters collective, all three of them as an omniscient unit, tell this story and I was absolutely charmed by that, possibly because I often feel part of a sister triumvirate but also because it was fun to have a classical-type storyteller recounting a contemporary tale.</span><br data-dcnode-id="1798"><span data-dcnode-id="1797" instrument_node="">Speaking of contemporary, though, I'm not sure when this was supposed to have taken place. I don't remember mention of cell phones or other mobile devices and there were things that happened that would not fly in these enlightened years but I also never picked up any hints at other decades, either. That caused bemusement now and again.</span><br data-dcnode-id="1796"><br data-dcnode-id="1795"><span data-dcnode-id="1794" instrument_node="">Before I finish, I want to clear up a couple of misconceptions, should someone not realize this story is not representative if the way the world works.</span><br data-dcnode-id="1793"><span data-dcnode-id="1792" instrument_node="">1) Libraries are rarely run by single librarians, even in small towns. When they are, the hours are quite limited, unlike the library in this book that seemed to have been open all the time. In addition, especially nowadays, it would be exceedingly rare for a person off the streets, someone who "loves the library", to be given a head librarian job with no prior experience other than spending time in the library as a child. That part is pure fantasy, people, so don't expect it to happen to you. </span><br data-dcnode-id="1791"><span data-dcnode-id="1790" instrument_node="">2) If your mother has had a radical mastectomy followed by radiation and chemo, don't expect her to come home and bake bread with you, not even after a month of convalescence. Just one of those things is hard to bounce back from. All three? Yeah, it takes awhile before moms can be up and moving for such long stretches of time. And if this did take place 20 years ago? Oof. She'd have taken months to heal and bread-baking would not have been on her list of things to do for quite awhile.</span><br data-dcnode-id="1789"><br data-dcnode-id="1788"><span data-dcnode-id="1787" instrument_node="">However, despite those little unrealities and despite the slew of irritation-inducing characters, I enjoyed the story as a whole, especially the narrator.</span><br data-dcnode-id="1786"><span data-dcnode-id="1785" instrument_node="">I understand Brown's second novel has been better received so I'll probably listen to that sometime this summer. In the meantime, I'm going to have to start stalking her and convincing her she really wants to be my BFF despite this non-glowing review.</span></span><span data-dcnode-id="1783" instrument_node="">
