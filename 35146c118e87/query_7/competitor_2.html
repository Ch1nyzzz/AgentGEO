</span><a data-dcnode-id="3802" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/category/infj/" rel="tag"><span data-dcnode-id="3803" instrument_node="">INFJ</span></a><span data-dcnode-id="3801" instrument_node=""> · </span><a data-dcnode-id="3799" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/category/mbti/" rel="tag"><span data-dcnode-id="3800" instrument_node="">MBTI</span></a><span data-dcnode-id="3798" instrument_node=""> · </span><a data-dcnode-id="3796" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/category/myers-briggs/" rel="tag"><span data-dcnode-id="3797" instrument_node="">Myers Briggs</span></a><span data-dcnode-id="3795" instrument_node=""> · </span><a data-dcnode-id="3793" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/category/uncategorized/" rel="tag"><span data-dcnode-id="3794" instrument_node="">Uncategorized</span></a><span data-dcnode-id="3792" instrument_node=""> </span></span><span data-dcnode-id="3790" instrument_node="">

</span><div class="entry-content single-content" data-dcnode-id="3507"><span data-dcnode-id="3783" instrument_node="">
</span><p data-dcnode-id="3778"><span data-dcnode-id="3782" instrument_node="">INFJs often get the uncanny feeling that they are strange or out of place in the world around them. While they may flood typology forums or Facebook groups, they are less likely to be seen in day-to-day life. As one of the </span><a data-dcnode-id="3780" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/2019/11/15/how-rare-is-your-myers-briggs-personality-type/%23h-the-infj-the-third-rarest-mbti-type"><span data-dcnode-id="3781" instrument_node="">rarest personality types</span></a><span data-dcnode-id="3779" instrument_node="">, they have a difficult time meeting someone like them in their careers, families, or other social groups. INFJs carry a burden few others will ever share. They often feel like they don’t fit in, can’t be “seen,” or aren’t accepted as they truly are.</span></p><span data-dcnode-id="3777" instrument_node="">
</span><p data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">But why?</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p class="yoast-reading-time__wrapper" data-dcnode-id="3763"><span class="yoast-reading-time__icon" data-dcnode-id="3771"><svg aria-hidden="true" data-dcnode-id="3772" data-icon="clock" fill="none" focusable="false" height="20" role="img" stroke="currentColor" style="display:inline-block;vertical-align:-0.1em" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" data-dcnode-id="3773" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></span><span class="yoast-reading-time__spacer" data-dcnode-id="3770" style="display:inline-block;width:1em"></span><span class="yoast-reading-time__descriptive-text" data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">Estimated reading time:  </span></span><span class="yoast-reading-time__reading-time" data-dcnode-id="3766"><span data-dcnode-id="3767" instrument_node="">8</span></span><span class="yoast-reading-time__time-unit" data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node=""> minutes</span></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3762" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3761" instrument_node="">
</span><h2 data-dcnode-id="3758" id="h-why-do-infjs-feel-weird"><strong data-dcnode-id="3759"><span data-dcnode-id="3760" instrument_node="">Why do INFJs Feel Weird?</span></strong></h2><span data-dcnode-id="3757" instrument_node="">
</span><p data-dcnode-id="3752"><span data-dcnode-id="3756" instrument_node="">Yesterday I had the privilege of doing an </span><a data-dcnode-id="3754" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DPdX7gaaHwtU" rel="external noopener noreferrer" target="_self"><span data-dcnode-id="3755" instrument_node="">INFJ Q &amp; A session with my friend, Joyce Meng </span></a><span data-dcnode-id="3753" instrument_node="">(also an INFJ). Both of us are MBTI® practitioners who have spent years coaching and typing people from all walks of life. And over and over again when we speak to INFJs we are met with the same response: “Now that I know about my type, I finally don’t feel so weird.”</span></p><span data-dcnode-id="3751" instrument_node="">
</span><h2 data-dcnode-id="3748" id="h-intuitive-weirdness"><strong data-dcnode-id="3749"><span data-dcnode-id="3750" instrument_node="">Intuitive Weirdness</span></strong></h2><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3739"><span data-dcnode-id="3746" instrument_node="">Some of that feeling of “strangeness” comes from being an Introverted Intuitive type. INFJs live and function best in the world of </span><a class="wpil_keyword_link" data-dcnode-id="3744" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/2015/08/10/the-magic-and-mystery-of-introverted-intuition/" title="Introverted Intuition"><span data-dcnode-id="3745" instrument_node="">Introverted Intuition</span></a><span data-dcnode-id="3743" instrument_node="">, or “Ni” for short. Ni is a mental process that focuses on spotting patterns, hidden meanings, and overarching themes. INFJs have an abstract, futuristic approach to the world around them. Rather than seeing things for what they are, they see things for what they “mean.” When forced to focus all their attention outside the intuitive plane, they can come across as stressed, unsteady, or overwhelmed. Unfortunately, the world often requires this of INFJs (and their </span><a class="wpil_keyword_link" data-dcnode-id="3741" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/the-intj/" title="INTJ"><span data-dcnode-id="3742" instrument_node="">INTJ</span></a><span data-dcnode-id="3740" instrument_node=""> type-siblings).</span></p><div class="adthrive" data-dcnode-id="3737" id="cls-video-container-r12tQo8Z" style="min-height: 483.188px;"><div data-dcnode-id="3738"></div></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3736" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3735" instrument_node="">
</span><p data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">“You have to come to this social event!”</span></p><span data-dcnode-id="3732" instrument_node="">
</span><p data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">“Pay attention to what you’re doing!”</span></p><span data-dcnode-id="3729" instrument_node="">
</span><p data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">“Focus on the facts”</span></p><span data-dcnode-id="3726" instrument_node="">
</span><p data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">“Get out of your head!”</span></p><span data-dcnode-id="3723" instrument_node="">
</span><p data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">“Stop over-complicating things”</span></p><span data-dcnode-id="3720" instrument_node="">
</span><p data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">These phrases are likely ones most INFJs have heard one or many times in their lives. It’s as if the world wants INFJs to behave more like their sensing or extroverted friends and co-workers. To be fully “present” and aware of the details around one’s self is considered the goal. Many INFJs have to work hard to stay in the moment, to stay reactive to the world around them, and to match the energy that other people direct their way.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3717" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3714"><span data-dcnode-id="3715" instrument_node="">INFJs are expected to “get with the program.” When they inadvertently slip into their intuitive world, they are often judged as being aloof, disengaged, or even rude. They may be accused of not caring about or listening to what others have said. The truth is usually far different. Usually they’re deeply invested in what people are saying, but they’re naturally going to read into those words and look for meanings, patterns, and insights. This can mean that they may look lost in a world of thought and not as reactive as people want them to be.</span></p><span data-dcnode-id="3713" instrument_node="">
</span><h2 data-dcnode-id="3710" id="h-when-predicting-goes-wrong"><strong data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">When Predicting Goes Wrong</span></strong></h2><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3707"><span data-dcnode-id="3708" instrument_node="">INFJs naturally look for associations and connections to identify patterns and to see everything around them as an interconnected web of meaning. In short, INFJs are natural pattern-seers. The connections that they see are often hard to verbalize in a way that others will understand. Often others see their intuitions as “leaps” of logic that make no sense. But what people don’t see is the amount of time INFJs spend gathering patterns, and looking at the complex world “behind the curtain.” It makes sense – it’s just hard for them to explain.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3706" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3705" instrument_node="">
</span><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Not everything INFJs have predictions about will be easy to verbalize. They may just know certain outcomes without knowing why they know them. The information is there. They’re not necessarily making a “leap,” but they don’t know how to organize their evidence or information in a linear way. They may not be able to tell people “this is what will happen,” but they’ll know something isn’t right or feels off. INFJs report feeling stressed when they try to articulate their intuition in a logical, sequential format.</span></p><span data-dcnode-id="3702" instrument_node="">
</span><p data-dcnode-id="3697"><span data-dcnode-id="3701" instrument_node="">The intuitions of the </span><a class="wpil_keyword_link" data-dcnode-id="3699" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/the-infj/" title="INFJ"><span data-dcnode-id="3700" instrument_node="">INFJ</span></a><span data-dcnode-id="3698" instrument_node=""> can make other people skeptical and put-off. Retorts such as “that doesn’t make any sense” or “you don’t have any proof of that!” are frustrating because usually even INFJs know that they aren’t explaining their insights as well as they want to.</span></p><span data-dcnode-id="3696" instrument_node="">
</span><p data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">While some personality types have neatly organized minds with organized shelves of information, INFJs tend to have minds that are more like landscapes filled with symbols, images, and webs of connections lighting up here and there. Nothing is organized in a sequential way (usually) and when they find a connection or insight they may not always have all the data perfectly lined up so that they can explain themselves.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3693" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3692" instrument_node="">
</span><h2 data-dcnode-id="3689" id="h-the-extraverted-feeling-mask"><strong data-dcnode-id="3690"><span data-dcnode-id="3691" instrument_node="">The Extraverted Feeling “Mask”</span></strong></h2><span data-dcnode-id="3688" instrument_node="">
</span><p data-dcnode-id="3683"><span data-dcnode-id="3687" instrument_node="">Other than intuition, INFJs are deeply in touch with a mental process called </span><a class="wpil_keyword_link" data-dcnode-id="3685" data-wpil-keyword-link="linked" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/2021/09/29/what-is-extraverted-feeling/" title="Extraverted Feeling"><span data-dcnode-id="3686" instrument_node="">Extraverted Feeling</span></a><span data-dcnode-id="3684" instrument_node=""> (“Fe”). This process focuses on maintaining harmony and respecting the cultural and societal values of the people around them. INFJs spend a lot of their time trying to figure out how they can be agreeable and get along with other people. They may slip into this process at times when they’re feeling pressured by the outside world. They want to make sure that everyone gets along, that there’s agreement, and that everyone’s needs are met.</span></p><span data-dcnode-id="3682" instrument_node="">
</span><p data-dcnode-id="3680"><span data-dcnode-id="3681" instrument_node="">At a young age, many INFJs learn that their Intuition is met with skepticism and confusion rather than acceptance and encouragement. Thus, they turn to their second-strongest function, Extraverted Feeling. This function is met with praise, smiles, and support most of the time. After all, from an outside perspective, Feeling tends to look like warmth, empathy, and consideration. It’s primarily focused on people and relationships and understanding interpersonal dynamics. People tend to gravitate to this side of the INFJ, and this can give young INFJs a glimmer of hope of finding their place in the world.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3679" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3678" instrument_node="">
</span><h2 data-dcnode-id="3675" id="h-it-s-not-enough"><strong data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">It’s Not Enough</span></strong></h2><span data-dcnode-id="3674" instrument_node="">
</span><p data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">While Extraverted Feeling is a major part of the INFJ personality type, it’s not their dominant mental process. They aren’t ENFJs or ESFJs, and they can only operate in an extroverted way for so long before they burn out. Introverted Intuition and Extraverted Feeling can work together, and often do, but some people will squint skeptically when the intuitive side of the INFJ seeps out in their words.</span></p><span data-dcnode-id="3671" instrument_node="">
</span><p data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">Many INFJs recall that they’ve never felt “seen” (in fact, this came up in my Q &amp; A with Joyce). This is often because they have to rely so heavily on their Feeling side, camouflaging their intuitive side with a feeling or sensing “mask” in order to avoid feelings of rejection.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3668" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3667" instrument_node="">
</span><p data-dcnode-id="3665"><span data-dcnode-id="3666" instrument_node="">It’s mostly in the quiet and tranquility of solitude that INFJs can truly access their intuition fully. It’s crucial for them to get regular time alone to sink into their own mind and let their imagination come fully alive. INFJs need time to daydream, fantasize, and immerse themselves in their inner worlds. In the quiet, their mind becomes a lush and endless wonderland full of rich insights, mythical symbols, and otherworldly lands that are only for their mind’s eyes to perceive. Without introverted intuition fully operational, they begin to feel restless, anxious, and unable to stay present.</span></p><span data-dcnode-id="3664" instrument_node="">
</span><h2 data-dcnode-id="3661" id="h-it-s-time-to-take-off-the-mask"><strong data-dcnode-id="3662"><span data-dcnode-id="3663" instrument_node="">It’s Time to Take Off the Mask</span></strong></h2><span data-dcnode-id="3660" instrument_node="">
</span><p data-dcnode-id="3658"><span data-dcnode-id="3659" instrument_node="">INFJs who have had their intuition nourished and encouraged throughout life learn to believe in their goals, dreams, and insights. Their intuition becomes stronger, more powerful, and more accurate. When you meet these INFJs they have a confidence in what they believe and can be charismatic leaders towards a better future.</span></p><span data-dcnode-id="3657" instrument_node="">
</span><p data-dcnode-id="3655"><span data-dcnode-id="3656" instrument_node="">Maybe this isn’t you and hasn’t been your experience. What can you do then?</span></p><span data-dcnode-id="3654" instrument_node="">
</span><p data-dcnode-id="3652"><span data-dcnode-id="3653" instrument_node="">I encourage you to be the first person to accept and love yourself for who you truly are. You are worth acknowledgment and your insights matter to the world.</span></p><span data-dcnode-id="3651" instrument_node="">
</span><p data-dcnode-id="3643"><span data-dcnode-id="3650" instrument_node="">Take time to practice your intuition. You can check out my article: </span><a data-dcnode-id="3648" data-wpel-link="internal" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologyjunkie.com/2017/11/03/10-intuition-hacks-infjs-intjs/"><span data-dcnode-id="3649" instrument_node="">10 Intuition Hacks for INFJs and INTJs.</span></a><span data-dcnode-id="3647" instrument_node=""> You can also join my </span><a data-dcnode-id="3645" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/groups/1451860788208966" rel="external noopener noreferrer" target="_self"><span data-dcnode-id="3646" instrument_node="">Intuitive-Feelers Facebook group</span></a><span data-dcnode-id="3644" instrument_node=""> as a way to connect with other INFJs (and INFPs, ENFPs, and ENFJs). But the next time your intuitions are met with a quizzical look or skepticism, try to stay with your intuition anyway. Sure, your insight or idea could be off-the-mark, but it could also be right on-point. Politely stay who you are and don’t let the skeptics get you down.</span></p><span data-dcnode-id="3642" instrument_node="">
</span><p data-dcnode-id="3640"><span data-dcnode-id="3641" instrument_node="">It’s also crucial to make sure you’re getting plenty of time in solitude and explore your inner world. And when you do need to go out into the world, find friends who appreciate you for your true self and not just for the friendly exterior. INFJs like you have a lot to offer the world.</span></p><span data-dcnode-id="3639" instrument_node="">
</span><p data-dcnode-id="3637"><span data-dcnode-id="3638" instrument_node="">Don’t dim your light because some people think you’re “weird.” Own your weirdness, accept it, and learn what it has to teach you!</span></p><span data-dcnode-id="3636" instrument_node="">
</span><h2 data-dcnode-id="3633" id="h-what-are-your-thoughts"><strong data-dcnode-id="3634"><span data-dcnode-id="3635" instrument_node="">What Are Your Thoughts?</span></strong></h2><span data-dcnode-id="3632" instrument_node="">
</span><p data-dcnode-id="3628"><span data-dcnode-id="3631" instrument_node="">Did you enjoy this article? Share your thoughts with other readers in the comments! Discover much more about your personality type in my eBook, </span><a data-dcnode-id="3629" data-wpel-link="external" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychology-junkie.lpages.co/the-infj/" rel="external noopener noreferrer" target="_self"><span data-dcnode-id="3630" instrument_node="">The INFJ – Understanding the Mystic.</span></a></p><span data-dcnode-id="3627" instrument_node="">

</span><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Great article! The constant dismissal and outright rejection of insights is hard to accept in a world filled with perpetual lies. No one knows what to do with me, so to keep peace, I keep my mouth shut. I seem to be the burster of bubbles, and worst person to talk to at a gathering, which is ironic when most of what I do is simply ask questions. It’s interesting to me how many would rather live in ignorance than have an honest discussion about their own insights and the world.  It has left me lost most of my life because every direction I go I encounter haters and skeptics. I know these insights hold some validity because I have had terrific growth and success in many aspects of life when implemented individually. However when it comes to fitting in with society and any cultural norms, it is a lonely path that is my soul burden to bare. I believe on a deeper level I have chosen this path, so I own it. If people want to learn and grow they will seek it out. If not they will toil with their own internal conflicts and they will eventually learn from them or they won’t. Most people don’t want to change and exploring uncomfortable perspectives and truth, which we enjoy, are most certainly not welcome. Tis a gift and a curse, but wouldn’t have it any other way. Thank you.</span></p><span data-dcnode-id="1542" instrument_node="">

</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Can completely relate! To every single thing described here. Trying to own my own weirdness and not go 100% into extroverted feeling all the time, loosing myself and my intuition. I still struggle with not feeling seen and feeling off, different. Internally, when Im just with myself, I dont feel weird, wrong or anything like that – I know my value and worth. But sometimes/often when Im out among other people and when Im in the very extraverted and sensing-dominant culture, it is harder for me not to go into the “Im wrong, weird, off”-feelings. And especially my non-lineaer way of thinking puts me in some awkward/difficult situations sometimes and I get some strange looks from people who dont se what it is Im getting at. Getting better at owning my weirdness, internally and externally!! Thanks for a great and detailed article!</span></p><span data-dcnode-id="1448" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
