</span><h1 class="entry-title" data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Why Do We Dream? Sleep, Memory, And The Science Of Dreaming</span></h1><span data-dcnode-id="1277" instrument_node="">
</span></div><span data-dcnode-id="1275" instrument_node="">
</span><div class="inner_content_wrapper inner_content" data-dcnode-id="968"><span data-dcnode-id="1274" instrument_node="">
</span><div class="entry-content" data-dcnode-id="970" itemprop="articleBody"><span data-dcnode-id="1273" instrument_node="">
</span><h2 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">All About Dreams</span></h2><div class="partial_slot" data-dcnode-id="1270" data-dsp="false" data-msp="/82634262/Fact_ROS_Mobile_300x250_ATF"></div><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Dreams are an essential part of the human experience. They’re universal; as near as science can show (without literally reading people’s minds) every person dreams when they sleep.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">So why do we dream?</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1262" instrument_node="">It’s been a popular question for thousands of years—possibly since before </span><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/38-brutal-facts-prehistoric-humans/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1261" instrument_node="">the dawn of civilization</span></a><span data-dcnode-id="1259" instrument_node="">. Some of our earliest recorded texts relate to the interpretation of dreams and visions; how what we see in our sleep might relate to the past, present, and what is yet to come.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1256" instrument_node="">Only recently, though, has scientific thought advanced to the point of in-depth analysis as to why we dream. It’s no easy question: evidence and answers come from a variety of disciplines across the sciences and humanities, including philosophy, </span><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/mind-bending-facts-human-psychology/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1255" instrument_node="">psychology</span></a><span data-dcnode-id="1253" instrument_node="">, neuroscience, and biology. It’s become one of the most highly contested (and fascinating) debates in modern science.</span></p><span data-dcnode-id="1251" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1244" style="width: 4096px"><div class="media-credit-container aligncenter" data-dcnode-id="1245" style="width: 4096px"><img alt="Why do we Dream?" class="size-full wp-image-277907 lazy-loaded" data-dcnode-id="1250" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633.jpg" data-srcset="" height="2160" sizes="(max-width: 4096px) 100vw, 4096px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633.jpg 4096w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-300x158.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-768x405.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-1024x540.jpg 1024w" width="4096"><noscript data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">&lt;img class="size-full wp-image-277907" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633.jpg" alt="Why do we Dream?" width="4096" height="2160" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633.jpg 4096w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-300x158.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-768x405.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1187740633-1024x540.jpg 1024w" sizes="(max-width: 4096px) 100vw, 4096px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Shutterstock</span></span></div></figure><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">There are, broadly speaking, two major camps:</span></p><span data-dcnode-id="1240" instrument_node="">
</span><p data-dcnode-id="1235"><span data-dcnode-id="1239" instrument_node="">There are those who believe that dreaming is simply </span><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">a side-effect of bodily processes unable to slow down</span></strong><span data-dcnode-id="1236" instrument_node="">. To proponents of this theory, dreams are a consequence of other, more essential nervous functions, which inadvertently lead to hallucinations when sleeping. This would mean that dreams have no deep meaning or purpose—just a consequence of our large and complex brains.</span></p><span data-dcnode-id="1234" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1233" instrument_node="">Others, however, propose that dreaming is itself </span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">an essential function</span></strong><span data-dcnode-id="1230" instrument_node="">. Researchers of this opinion tend to argue that dreams, as much as sleep itself, serve a role in maintaining our physical and mental health. These claimants believe that we could no more live without dreaming than we could live without food, water, or air.</span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1223"><span data-dcnode-id="1227" instrument_node="">It should be noted, as well, that the study of dreaming is undertaken differently depending on the discipline of those conducting the research. Neuroscientists, for example, seek to understand the underlying physical causes of dreaming, and how the experience of a dream might impact the brain and </span><a data-dcnode-id="1225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/50-interesting-facts-human-body/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1226" instrument_node="">body</span></a><span data-dcnode-id="1224" instrument_node=""> of their subjects. Psychoanalysts, meanwhile, will usually concern themselves with the psychological importance of dreaming—how they reflect our conceptions of self, or how they help us to learn and adjust.</span></p><span data-dcnode-id="1222" instrument_node="">
</span><h2 data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">How Sleep Works</span></h2><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1214"><span data-dcnode-id="1218" instrument_node="">There are several different interpretations of the different phases of sleep. What is universally understood, however, is that sleep can be divided into REM (Rapid Eye Movement) and Non-REM sleep. Chances are, REM is the one you’ve heard about. </span><strong data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">The REM cycles makes up about 25% of your night’s sleep</span></strong><span data-dcnode-id="1215" instrument_node="">—it usually occurs around 90 minutes after you first fall asleep, and occurs several more times throughout the night as you pass through other sleep stages.</span></p><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">What we know without a doubt is that the REM stage is when dreaming occurs. During REM, signals are sent by the body’s nervous system to your spine, causing a form of partial paralysis. Regions of the brain responsible for learning, emotion, and memory then experience a surge of activity. The exact process by which this causes us to experience vivid hallucinations while sleeping (which we call dreams) is still not known.</span></p><span data-dcnode-id="1210" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1203" style="width: 6000px"><div class="media-credit-container aligncenter" data-dcnode-id="1204" style="width: 6000px"><img alt="Why do we Dream?" class="size-full wp-image-277909 lazy-loaded" data-dcnode-id="1209" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592.jpg" data-srcset="" height="3325" loading="lazy" sizes="(max-width: 6000px) 100vw, 6000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-300x166.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-768x426.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-1024x567.jpg 1024w" width="6000"><noscript data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277909" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592.jpg" alt="Why do we Dream?" width="6000" height="3325" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-300x166.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-768x426.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_762804592-1024x567.jpg 1024w" sizes="(max-width: 6000px) 100vw, 6000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">Shutterstock</span></span></div></figure><span data-dcnode-id="1202" instrument_node="">

</span></div><h2 data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Dreaming And Memory</span></h2><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1140"><span data-dcnode-id="1145" instrument_node="">While scientists have yet to identify the exact cause of our dreams, there is a growing consensus that the purpose our dreams serve has much to do with </span><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/42-mysterious-facts-memory/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">the way we process memories</span></strong></a><span data-dcnode-id="1141" instrument_node="">.</span></p><span data-dcnode-id="1139" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">REM sleep (when dreaming occurs) triggers the parts of our brain responsible for learning and memory recall. Studies have repeatedly shown that those who go for a period of time without REM sleep struggle to accurately store new information in a way that allows for later recall.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">As teams of investigators develop this theory, some have actually proposed that fragments of a person’s memories can be identified in the contents of a person’s dreams.</span></p><span data-dcnode-id="1133" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">In this vein, Professor Sue Llewellyn at the University of Manchester in England has proposed that the act of dreaming serves as a type of memory boosting exercise. According to Llewellyn, dreams enhance memory recall through methods similar to those used by ancient peoples, before writing was commonplace.</span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">The oral traditions of many ancient civilizations relied on a series of memorization techniques to pass down information between generations. These include visualization, narration, personal embodiment, and the making of strange associations between seemingly unrelated concepts. Professor Llewellyn proposes that these same techniques are used naturally during REM sleep to promote accurate information storage in the brain.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1120" style="width: 7360px"><div class="media-credit-container aligncenter" data-dcnode-id="1121" style="width: 7360px"><img alt="Why do we Dream?" class="size-full wp-image-277911 lazy-loaded" data-dcnode-id="1126" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193.jpg" data-srcset="" height="4912" loading="lazy" sizes="(max-width: 7360px) 100vw, 7360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193.jpg 7360w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-360x240.jpg 360w" width="7360"><noscript data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277911" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193.jpg" alt="Why do we Dream?" width="7360" height="4912" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193.jpg 7360w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-300x200.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-768x513.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-1024x683.jpg 1024w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_782190193-360x240.jpg 360w" sizes="(max-width: 7360px) 100vw, 7360px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Shutterstock</span></span></div></figure><span data-dcnode-id="1119" instrument_node="">
</span><h2 data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Did Dreams Help Us Survive?</span></h2><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1115" instrument_node="">As it turns out, </span><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">dreams might be a form of practice.</span></strong></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">Fantastic scenarios that involve fighting, or being chased, are near-universal dream experiences. The explanation may lie in the amygdala—your brain’s emotional response command center. When a person enters REM sleep, their amygdala fires on all cylinders—as though the brain is responding to a serious threat. It is this hyperactivity in the amygdala which could hold the secret to our nightmares.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1103"><span data-dcnode-id="1107" instrument_node="">Now, that hyperactivity could simply be random. A quirk of </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/43-wild-facts-human-evolution/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1106" instrument_node="">human evolution</span></a><span data-dcnode-id="1104" instrument_node="">, maybe. Like the appendix. But some experts speculate that dreams, specifically nightmares, serve a far more dramatic purpose.</span></p><span data-dcnode-id="1102" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">In the early days of our evolution, threats to human life were far more abundant. Predators, specifically, posed a legitimate risk to most human populations. These were the days when a bear attack, or encounter with rival tribes, were common. The ability to process these risk was incredibly important. Responding to a threat with a cool, calm, collected head might be the difference between life-and-death.</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Dreams (more specifically, nightmares) could serve for those situations. A person who dreamed more often, and more vividly, may be better equipped to deal with genuine terror. In this theory, nightmares serve the same person as a flight-simulator for a pilot. If a first-time pilot experiences a blown engine mid-flight, they might panic and lose control. Whereas a pilot who has trained thousands of times for that exact scenario, in the controlled environment of simulation, should react with a level-head.</span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">The theory is unproven. For now, the implications remain fascinating.</span></p><span data-dcnode-id="1093" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1086" style="width: 4608px"><div class="media-credit-container aligncenter" data-dcnode-id="1087" style="width: 4608px"><img alt="Why do we Dream?" class="size-full wp-image-277913 lazy-loaded" data-dcnode-id="1092" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893.jpg" data-srcset="" height="3456" loading="lazy" sizes="(max-width: 4608px) 100vw, 4608px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893.jpg&amp;raw" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893.jpg 4608w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-1024x768.jpg 1024w" width="4608"><noscript data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277913" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893.jpg" alt="Why do we Dream?" width="4608" height="3456" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893.jpg 4608w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-300x225.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-768x576.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1017191893-1024x768.jpg 1024w" sizes="(max-width: 4608px) 100vw, 4608px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Shutterstock</span></span></div></figure><span data-dcnode-id="1085" instrument_node="">
</span><div class="partial_slot" data-dcnode-id="1084" data-dsp="/82634262/Fact_ROS_Desktop_728x90_BTF1" data-msp="/82634262/Fact_ROS_Mobile_300x250_BTF2"></div><h2 data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">What Do Dreams Mean?</span></h2><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1080" instrument_node="">It could be the most asked question in human history: </span><strong data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">do my dreams mean something?</span></strong><span data-dcnode-id="1077" instrument_node=""> If so, what?</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">How many hundreds of thousands have lain in bed, just recently asleep, and wondered? It’s an essential mystery of the human experience.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Today, the first name to come up when considering this question is Sigmund Freud. In his work, Freud argued that dreams are an essential channel into understanding one’s inner thoughts. When examining the emotional lives of his patients, Freud used dreams as a guide. To him, the symbols and themes of a person’s dreams reflected hidden thoughts and desires—hidden somewhere deep in the brain. As he said, “Dreams are the royal road to the unconscious.”</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">This line of thought has since come to dominate the cultural interpretation of dreams (at least in the Western world). In one study conducted on college students in the United States, India, and South Korea, researchers found that almost no participants believed their dreams were merely random. Instead, many shared a Freudian-esque notion that what they experienced in dreams reflected their innermost thoughts and desires.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">That doesn’t necessarily imply that a dream’s “meaning” is supernatural, or tied to something outside the bounds of human physiology. In the words of G. William Domhoff, Professor of Psychology at the University of California:</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">“’Meaning’ has to do with coherence and with systematic relations to other variables, and in that regard, dreams do have meaning. Furthermore, they are very ‘revealing’ of what is on our minds. We have shown that 75 to 100 dreams from a person give us a very good psychological portrait of that individual. Give us 1,000 dreams over a couple of decades and we can give you a profile of the person’s mind that is almost as individualized and accurate as her or his fingerprints.”</span></p><span data-dcnode-id="1060" instrument_node="">
</span><figure aria-describedby="caption-attachment-277895" class="wp-caption aligncenter" data-dcnode-id="1051" id="attachment_277895" style="width: 1066px"><div class="media-credit-container aligncenter" data-dcnode-id="1054" style="width: 1066px"><img alt="Why do we Dream?" class="lazy-hidden size-full wp-image-277895" data-dcnode-id="1059" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE.jpg 1066w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-213x300.jpg 213w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-768x1081.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-728x1024.jpg 728w" height="1500" loading="lazy" sizes="(max-width: 1066px) 100vw, 1066px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="1066"><noscript data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277895" src="https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE.jpg" alt="Why do we Dream?" width="1066" height="1500" srcset="https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE.jpg 1066w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-213x300.jpg 213w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-768x1081.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/Sigmund_Freud_LIFE-728x1024.jpg 728w" sizes="(max-width: 1066px) 100vw, 1066px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Wikimedia Commons</span></span></div><figcaption class="wp-caption-text" data-dcnode-id="1052" id="caption-attachment-277895"><span data-dcnode-id="1053" instrument_node="">Sigmund Freud</span></figcaption></figure><span data-dcnode-id="1050" instrument_node="">
</span><h2 data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">What About Lucid Dreaming?</span></h2><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Chances are you’ve heard some pretty marvelous things about lucid dreams. A quick online search turns up any number of fantastic claims. Some say they’ve built a long-term “mind palace” they’re able to visit and revisit every night, while sleeping, in their dreams. Some say lucid dreaming has changed their lives.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1041"><strong data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Is it a real phenomenon?</span></strong></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">At a basic level, it doesn’t take much for a dream to be lucid. If at any moment the dreamer is aware they are asleep and dreaming, the dream itself is lucid. Any moment of self-awareness is enough. As the Greek philosopher Aristotle once said, “often when one is asleep, there is something in consciousness which declares that what presents itself is but a dream.”</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Often, though, when a person discusses lucid dreaming, what they’re referring to is the ability to influence the environment and outcome of the dream itself.</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1030"><em data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">I dreamed I was a butterfly, flitting around in the sky; then I awoke. Now I wonder: Am I a man who dreamt of being a butterfly, or am I a butterfly dreaming that I am a man?—</span></em><span data-dcnode-id="1031" instrument_node="">Zhuangzi</span></p><span data-dcnode-id="1029" instrument_node="">
</span><figure class="wp-caption aligncenter" data-dcnode-id="1022" style="width: 6000px"><div class="media-credit-container aligncenter" data-dcnode-id="1023" style="width: 6000px"><img alt="Why do we Dream?" class="lazy-hidden size-full wp-image-277916" data-dcnode-id="1028" data-lazy-type="image" data-src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556.jpg" data-srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-300x167.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-768x426.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-1024x569.jpg 1024w" height="3332" loading="lazy" sizes="(max-width: 6000px) 100vw, 6000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" srcset="" width="6000"><noscript data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">&lt;img loading="lazy" class="size-full wp-image-277916" src="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556.jpg" alt="Why do we Dream?" width="6000" height="3332" srcset="https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556.jpg 6000w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-300x167.jpg 300w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-768x426.jpg 768w, https://www.factinate.com/wp-content/uploads/2019/03/shutterstock_1111729556-1024x569.jpg 1024w" sizes="(max-width: 6000px) 100vw, 6000px" /&gt;</span></noscript><span class="media-credit" data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Shutterstock</span></span></div></figure><span data-dcnode-id="1021" instrument_node="">
</span><h2 data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">The Mysteries Of Our Brain</span></h2><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1017" instrument_node="">Our knowledge of the </span><a data-dcnode-id="1015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/things/32-neuron-popping-facts-human-brain/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1016" instrument_node="">human brain</span></a><span data-dcnode-id="1014" instrument_node=""> is still very much a work in progress. Scientific understandings of consciousness, psychology, and neuroscience are in flux, as new discoveries and theories are released almost every day.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">What this means for the study of dreaming is as of yet unclear.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Why do people dream? The question will undoubtedly&nbsp;continue&nbsp;to fascinate some of humanity’s greatest minds. Billions will wonder. Scientists will study. Researchers will collaborate. Doctors and psychologists and thousands of others will wait with bated breath.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">For now, it would seem current research suggests that our dreams play a role in memory, in self-identity, and in the processing of our daily experiences. It’s a critical aspect of our sleep. Why exactly that is, and how exactly it occurs, will continue to be one of the most interesting questions in modern medicine. And then, of course, there’s </span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.factinate.com/editorial/how-to-lucid-dream/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1004" instrument_node="">lucid dreaming</span></a><span data-dcnode-id="1002" instrument_node="">.</span></p><span data-dcnode-id="1000" instrument_node="">

</span><p data-dcnode-id="497"><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Do you question the accuracy of a fact you just read?</span></strong><span data-dcnode-id="501" instrument_node=""> At Factinate, we’re dedicated to getting things right. Our credibility is the turbo-charged engine of our success. We want our readers to trust us. Our editors are instructed to fact check thoroughly, including finding at least three references for each fact. However, despite our best efforts, we sometimes miss the mark. When we do, we depend on our loyal, helpful readers to point out how we can do better. Please let us know if a fact we’ve published is inaccurate (or even if you just suspect it’s inaccurate) by reaching out to us at </span><a data-dcnode-id="499" href="mailto:contribute@factinate.com"><span data-dcnode-id="500" instrument_node="">contribute@factinate.com</span></a><span data-dcnode-id="498" instrument_node="">. Thanks for your help!</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Warmest regards,</span></p><span data-dcnode-id="493" instrument_node="">
