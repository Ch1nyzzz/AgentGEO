</span><article class="clear post-33235 list type-list status-publish has-post-thumbnail hentry category-strange-people" data-dcnode-id="871" id="post-33235"><span data-dcnode-id="1328" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1304"><span data-dcnode-id="1327" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">10 Bizarre Stories of Milk</span></h1><div class="entry-meta" data-dcnode-id="1307"><span class="posted-on" data-dcnode-id="1318"><span class="screen-reader-text" data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Posted on</span></span><span data-dcnode-id="1322" instrument_node=""> </span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/item_99266.aspx" rel="bookmark"><time class="entry-date published updated" data-dcnode-id="1320" datetime="2015-03-19T00:00:00-04:00"><span data-dcnode-id="1321" instrument_node="">March 19, 2015</span></time></a></span><span class="byline" data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1314"><a class="url fn n" data-dcnode-id="1315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/author/marcusb/"><span data-dcnode-id="1316" instrument_node="">Marcus Blake</span></a></span></span><div class="category" data-dcnode-id="1309"><span data-dcnode-id="1312" instrument_node="">Category: </span><a data-dcnode-id="1310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/strange-people/" rel="category tag"><span data-dcnode-id="1311" instrument_node="">Strange People</span></a></div><div class="post-views" data-dcnode-id="1308"></div></div><span data-dcnode-id="1305" instrument_node=""> </span></header><span data-dcnode-id="1302" instrument_node="">
</span><div class="entry-content" data-dcnode-id="874"><span data-dcnode-id="1301" instrument_node="">
</span><div class="addthis_inline_share_toolbox_dtcg addthis_tool" data-dcnode-id="1299"></div><div class="list-introduction" data-dcnode-id="1291"><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Milk is one of the most popular and consumed beverages on the planet. Most of us drink it in our everyday life. We have it in our coffee and tea. We have it in our cereal.  The list goes on and on.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Here are ten stories that take the phrase “Got Milk?” (and American advertising campaign slogan to encourage the consumption of cow's milk) to the extreme.</span></p><span data-dcnode-id="1292" instrument_node="">
</span></div><span data-dcnode-id="1290" instrument_node=""> </span><div data-dcnode-id="876" id="list-items"><span data-dcnode-id="1289" instrument_node="">
</span><div class="list-item list-item-1" data-dcnode-id="1249"><span data-dcnode-id="1288" instrument_node="">
</span><h2 data-dcnode-id="1284"><span class="item-delta" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">1</span></span><span data-dcnode-id="1285" instrument_node="">The lactating bandit that sprayed breast milk as a distraction for stealing</span></h2><span data-dcnode-id="1283" instrument_node="">
</span><div class="item-image" data-dcnode-id="1277"><span data-dcnode-id="1282" instrument_node="">
</span><img class="error" data-dcnode-id="1281" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_dripping-baby-bottle-by-Zela.jpg" data-ll-status="error" height="900" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_dripping-baby-bottle-by-Zela.jpg&amp;raw" width="600"><noscript data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">&lt;img width="600" height="900" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_dripping-baby-bottle-by-Zela.jpg"&gt;</span></noscript><span data-dcnode-id="1278" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span><div class="item-description" data-dcnode-id="1259"><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">I've heard of “Stick ‘em up,” but, in this case, would it be, “Squirt ‘em up?”</span></p><span data-dcnode-id="1272" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">In October 2014, a woman in Darmstadt, Germany entered a pharmacy and asked to buy a breast pump. After handing over a €200 note to pay for her €20 purchase, she suddenly uncovered one breast and used her fingers to squirt milk from it at the person behind the register who was giving her €180 in change. </span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">The “Milk Sprayer” (as authorities dubbed her) “sent a stream of milk into the face of the employee,” according to police spokesman Ferdinand Derigs.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The woman then moved on to a second cashier and shot a stream of mother's milk into that person's face as well. Police say after the breast-attack the woman fumbled around the store looking like she was confused. It wasn't until after she was forced out the door with her breasts still on show, that employees discovered €100 missing from a cash register. </span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">So far, there has been no word on if the boob-spraying bandit has been, ahem, busted. </span></p><span data-dcnode-id="1260" instrument_node="">
</span></div><span data-dcnode-id="1258" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1251"><span class="item-source" data-dcnode-id="1255"><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailymail.co.uk/news/article-2813648/Busted-Woman-sprays-chemist-staff-BREAST-MILK-bizarre-distraction-theft.html" rel="nofollow" target="_blank"><span data-dcnode-id="1257" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1252"><a data-dcnode-id="1253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//unboundbirth.com/tag/breast-milk/" rel="nofollow" target="_blank"><span data-dcnode-id="1254" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1250" instrument_node=""> </span></div><span data-dcnode-id="1248" instrument_node="">
</span><div data-dcnode-id="1247" id="ld-3867-6310"></div><span data-dcnode-id="1246" instrument_node="">
</span><div class="list-item list-item-2" data-dcnode-id="1212"><span data-dcnode-id="1245" instrument_node="">
</span><h2 data-dcnode-id="1241"><span class="item-delta" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">2</span></span><span data-dcnode-id="1242" instrument_node="">The bodybuilders who believe&nbsp;breast milk will help them bulk up</span></h2><span data-dcnode-id="1240" instrument_node="">
</span><div class="item-image" data-dcnode-id="1234"><span data-dcnode-id="1239" instrument_node="">
</span><img class="error" data-dcnode-id="1238" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_25CC9E2600000578-2958478-Got_milk_Bodybuilders_are_increasingly_turning_to_breast_milk_as-a-1_1424276808834.jpg" data-ll-status="error" height="632" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_25CC9E2600000578-2958478-Got_milk_Bodybuilders_are_increasingly_turning_to_breast_milk_as-a-1_1424276808834.jpg&amp;raw" width="600"><noscript data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">&lt;img width="600" height="632" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_25CC9E2600000578-2958478-Got_milk_Bodybuilders_are_increasingly_turning_to_breast_milk_as-a-1_1424276808834.jpg"&gt;</span></noscript><span data-dcnode-id="1235" instrument_node="">
</span></div><span data-dcnode-id="1233" instrument_node="">
</span><div class="item-description" data-dcnode-id="1222"><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1231" instrument_node="">Gym-lovers are always looking for new ways to bulk up, and the latest supplement they believe will do the trick is that of human breast milk. Bodybuilders have been buying breast milk supplements on websites like Only the Breast in hopes of it helps them increase in muscle mass.</span></p><span data-dcnode-id="1229" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">Sure, “liquid gold,” as breast milk is often referred to, is packed with vitamins, minerals, enzymes, and special proteins, but is it healthy for adults? Fitness and nutrition trainer Troy Martin from TM Fitness is aware that trainers believe breast milk helps them add bulk more effectively than cow's milk, and that the growth hormones found in breast milk were also beneficial in strength training, but he says there is no research to back up these claims.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Although there is some evidence that a component of breast milk, known as HAMLET might be useful for treating cancer, a spokesperson for the British Nutrition Foundation isn't so sure that it's beneficial for anything else. The spokesperson explained: “Breast milk is designed specifically to match a baby's requirements and has all the nutrients, vitamins and minerals they need to grow. It is not designed to support adult health.”</span></p><span data-dcnode-id="1223" instrument_node="">
</span></div><span data-dcnode-id="1221" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1214"><span class="item-source" data-dcnode-id="1218"><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirror.co.uk/news/weird-news/bodybuilders-buying-breast-milk-online-5196271" rel="nofollow" target="_blank"><span data-dcnode-id="1220" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1215"><a data-dcnode-id="1216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailymail.co.uk/news/article-2958478/Bodybuilders-desperate-bulk-turning-BREAST-milk-online-risking-health-staph-infections.html" rel="nofollow" target="_blank"><span data-dcnode-id="1217" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1213" instrument_node=""> </span></div><span data-dcnode-id="1211" instrument_node="">
</span><center data-dcnode-id="1208" style="margin: 15px 0;"><div data-dcnode-id="1209" id="contentad420891"></div></center><span data-dcnode-id="1207" instrument_node="">
</span><div class="list-item list-item-3" data-dcnode-id="1173"><span data-dcnode-id="1206" instrument_node="">
</span><h2 data-dcnode-id="1202"><span class="item-delta" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">3</span></span><span data-dcnode-id="1203" instrument_node="">The girl who almost died from drinking milk</span></h2><span data-dcnode-id="1201" instrument_node="">
</span><div class="item-image" data-dcnode-id="1195"><span data-dcnode-id="1200" instrument_node="">
</span><img class="error" data-dcnode-id="1199" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_AY-Jessica-Bamford.jpg" data-ll-status="error" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_AY-Jessica-Bamford.jpg&amp;raw" width="600"><noscript data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&lt;img width="600" height="400" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_AY-Jessica-Bamford.jpg"&gt;</span></noscript><span data-dcnode-id="1196" instrument_node="">
</span></div><span data-dcnode-id="1194" instrument_node="">
</span><div class="item-description" data-dcnode-id="1183"><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">In March 2015, young Jessica Bamford of Plymouth, England was innocently drinking some milk from an Iceland market when a “white hardened substance” started to form around the six-year-old's mouth. Her parents, Dwayne and Samantha Bamford, immediately took their daughter to the emergency room at a nearby hospital.It was discovered that Jessica had most likely consumed false nail glue. </span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">It looks like the Bamford's love of milk – along with the two four-pint cartons of whole milk Mr. Bamford bought from the market –&nbsp;has gone down the drain. </span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">“The last thing you're expecting is hardened adhesive in a food product,” said Mrs. Bamford. "It's just disgusting.” The angry mother has since contacted the market that sold the tainted milk and the dairy that supplied it. The store has apologized and has vowed to investigate the incident.</span></p><span data-dcnode-id="1184" instrument_node="">
</span></div><span data-dcnode-id="1182" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1175"><span class="item-source" data-dcnode-id="1179"><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirror.co.uk/news/uk-news/six-year-old-girl-rushed-hospital-after-5283448" rel="nofollow" target="_blank"><span data-dcnode-id="1181" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1176"><a data-dcnode-id="1177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mirror.co.uk/news/uk-news/six-year-old-girl-rushed-hospital-after-5283448" rel="nofollow" target="_blank"><span data-dcnode-id="1178" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1174" instrument_node=""> </span></div><span data-dcnode-id="1172" instrument_node="">
</span><div class="list-item list-item-4" data-dcnode-id="1138"><span data-dcnode-id="1171" instrument_node="">
</span><h2 data-dcnode-id="1167"><span class="item-delta" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">4</span></span><span data-dcnode-id="1168" instrument_node="">The man who landed a Guinness World Record by squirting milk from his eyes</span></h2><span data-dcnode-id="1166" instrument_node="">
</span><div class="item-image" data-dcnode-id="1160"><span data-dcnode-id="1165" instrument_node="">
</span><img class="error" data-dcnode-id="1164" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_odd_bonkers_sporting_champions_2.jpg" data-ll-status="error" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_odd_bonkers_sporting_champions_2.jpg&amp;raw" width="600"><noscript data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">&lt;img width="600" height="400" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_odd_bonkers_sporting_champions_2.jpg"&gt;</span></noscript><span data-dcnode-id="1161" instrument_node="">
</span></div><span data-dcnode-id="1159" instrument_node="">
</span><div class="item-description" data-dcnode-id="1148"><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Who thought you could squirt milk out of your eye to land yourself a Guinness World Record? Ilker Yilmaz of Turkey did; that's who! </span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">In 2004, the Turkish construction worker poured milk into his hand, snorted it up his nose and squirted it 9.2 feet out of his left eye into a coffee cup, setting a new world's record.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">The Turkish squirter can squirt milk out of his eye thanks to an anomaly in his tear gland. Yilmaz beat out Mike Moraal of Vancouver, British Columbia. He  set the existing record of 8.745 feet in France in 2001. Who knew there was such a record to break? </span></p><span data-dcnode-id="1149" instrument_node="">
</span></div><span data-dcnode-id="1147" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1140"><span class="item-source" data-dcnode-id="1144"><a data-dcnode-id="1145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/%3A%2520http%3A//usatoday30.usatoday.com/news/offbeat/2004-09-01-milk-squirting_x.htm" rel="nofollow" target="_blank"><span data-dcnode-id="1146" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1141"><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitalspy.co.uk/fun/i416825-8/totally-bonkers-sporting-champions-ilker-yilmaz.html" rel="nofollow" target="_blank"><span data-dcnode-id="1143" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1139" instrument_node=""> </span></div><span data-dcnode-id="1137" instrument_node="">
</span><div class="list-item list-item-5" data-dcnode-id="1100"><span data-dcnode-id="1136" instrument_node="">
</span><h2 data-dcnode-id="1132"><span class="item-delta" data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">5</span></span><span data-dcnode-id="1133" instrument_node="">The cows that make milk more efficiently by listening to Lou Reed </span></h2><span data-dcnode-id="1131" instrument_node="">
</span><div class="item-image" data-dcnode-id="1125"><span data-dcnode-id="1130" instrument_node="">
</span><img class="error" data-dcnode-id="1129" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_2835621.jpg" data-ll-status="error" height="400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_2835621.jpg&amp;raw" width="600"><noscript data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">&lt;img width="600" height="400" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_2835621.jpg"&gt;</span></noscript><span data-dcnode-id="1126" instrument_node="">
</span></div><span data-dcnode-id="1124" instrument_node="">
</span><div class="item-description" data-dcnode-id="1110"><span data-dcnode-id="1123" instrument_node="">
</span><p data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">In 2001, a pair of psychologists from the University of Leicester found that slow music played on a large dairy farm increased cows' milk production by 3% as compared to fast music, which had no effect. Scientists think these slow jams helped relax the animals, and let them produce milk in higher quantities.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Slow tunes that seemed to work are “Perfect Day” by Lou Reed, “Bridge over Troubled Water” by Simon and Garfunkel, “What a Difference a Day Makes” by Aretha Franklin, and “Everybody Hurts” by R.E.M. According to NPR, a theatrical reading of “The Merry Wives of Windsor” also proved popular for increased milk production.</span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">Folks at Canada's Department of Agriculture and Agri-Food are a little more skeptical. According to the Canadians, no one has repeated these experiments since 2001. They gather that if the music has an effect, it probably has nothing to do with the songs themselves. Instead, the music likely drowns out all the disconcerting sounds coming from those dreaded milking machines.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Since cows dig R.E.M. so much, maybe farmers can add their song, “Man On the Moooon” or music by the Moooody Blues to the cow milking playlist that includes the old classic, “Moooon River.”</span></p><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1102"><span class="item-source" data-dcnode-id="1106"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//atlanta.cbslocal.com/2014/02/19/cows-produce-more-milk-when-listening-to-slow-jams-playlist/" rel="nofollow" target="_blank"><span data-dcnode-id="1108" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1103"><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//atlanta.cbslocal.com/2014/02/19/cows-produce-more-milk-when-listening-to-slow-jams-playlist/" rel="nofollow" target="_blank"><span data-dcnode-id="1105" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1101" instrument_node=""> </span></div><span data-dcnode-id="1099" instrument_node="">
</span><center data-dcnode-id="1097" style="margin: 15px 0;"><div class="waldo-display-unit" data-dcnode-id="1098" data-processed="true" id="waldo-tag-692" style="min-width: 300px; min-height: 250px;"></div></center><span data-dcnode-id="1096" instrument_node="">
</span><div data-dcnode-id="1089" style="clear: both; margin: 10px 0;"><span data-dcnode-id="1095" instrument_node="">
</span><span data-dcnode-id="1093" instrument_node="">
</span><div data-dcnode-id="1091" id="div-gpt-ad-1534891688457-0" style="margin: auto;text-align: center;"><span data-dcnode-id="1092" instrument_node="">
</span></div><span data-dcnode-id="1090" instrument_node="">
</span></div><span data-dcnode-id="1088" instrument_node="">
</span><div class="list-item list-item-6" data-dcnode-id="1036"><span data-dcnode-id="1087" instrument_node="">
</span><h2 data-dcnode-id="1083"><span class="item-delta" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">6</span></span><span data-dcnode-id="1084" instrument_node="">The music legends that broke up over spilt milk</span></h2><span data-dcnode-id="1082" instrument_node="">
</span><div class="item-image" data-dcnode-id="1076"><span data-dcnode-id="1081" instrument_node="">
</span><img class="error" data-dcnode-id="1080" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Aerosmith-Steven-Tyler-opened-his-mouth-extra-wide-show-off-his.jpg" data-ll-status="error" height="784" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Aerosmith-Steven-Tyler-opened-his-mouth-extra-wide-show-off-his.jpg&amp;raw" width="600"><noscript data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">&lt;img width="600" height="784" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Aerosmith-Steven-Tyler-opened-his-mouth-extra-wide-show-off-his.jpg"&gt;</span></noscript><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1075" instrument_node="">
</span><div class="item-description" data-dcnode-id="1046"><span data-dcnode-id="1074" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1073" instrument_node="">As with any band with a history as rich and long as Aerosmith's, there are bound to be high points and low points. By the mid-1970s, Aerosmith was the possibly the most popular band in America. The quintet from Boston had huge, multi-platinum selling albums like </span><i data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Toys In the Attic</span></i><span data-dcnode-id="1070" instrument_node="">  and </span><i data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">Rocks</span></i><span data-dcnode-id="1067" instrument_node="">  and played hits like “Walk This Way and “Dream On” to sold-out stadiums of adoring fans.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">But with great success comes great excess. The band recorded the album </span><i data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Draw the Line</span></i><span data-dcnode-id="1061" instrument_node=""> in a drug-induced haze with animosity between band members rapidly growing. By the time the boys from Boston recorded their next album, they had reached a breaking point. The album was delayed due to escalating arguing, drug use and lack of songs. In addition to all of this, guitarist Joe Perry owed the band $80,000 in room service bills from the last tour. Their manager suggested he write a solo album and pay off the bill from the record company advance. </span></p><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">The breaking point came when Joe Perry's wife, Elissa, poured milk over bassist Tom Hamilton's wife, Terry, during an argument after a show in Cleveland. Joe Perry quit the band shortly after.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1051"><span data-dcnode-id="1055" instrument_node="">The band soldiered on with middling success until Perry re-joined  in 1984. 1987's quintuple platinum </span><i data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">Permanent Vacation</span></i><span data-dcnode-id="1052" instrument_node="">  solidified Aerosmith as “America's favorite rock and roll band” once again and they haven't looked back since.</span></p><span data-dcnode-id="1050" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Singer Steven Tyler best summed up the 1979 split with his fellow “Toxic Twin” when he told the press, “We split up over a glass of spilt milk – can you believe it?”</span></p><span data-dcnode-id="1047" instrument_node="">
</span></div><span data-dcnode-id="1045" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1038"><span class="item-source" data-dcnode-id="1042"><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//everyrecordtellsastory.com/2013/02/19/when-rock-star-wives-fight-how-aerosmith-broke-up-over-spilled-milk-and-room-service-bills/" rel="nofollow" target="_blank"><span data-dcnode-id="1044" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1039"><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.popsugar.com/celebrity/photo-gallery/32317031/image/32317064/Aerosmith-Steven-Tyler-opened-his-mouth-extra-wide-show-off-his" rel="nofollow" target="_blank"><span data-dcnode-id="1041" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1037" instrument_node=""> </span></div><span data-dcnode-id="1035" instrument_node="">
</span><div class="list-item list-item-7" data-dcnode-id="1001"><span data-dcnode-id="1034" instrument_node="">
</span><h2 data-dcnode-id="1030"><span class="item-delta" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">7</span></span><span data-dcnode-id="1031" instrument_node="">The Japanese bars that serve breast milk shots</span></h2><span data-dcnode-id="1029" instrument_node="">
</span><div class="item-image" data-dcnode-id="1023"><span data-dcnode-id="1028" instrument_node="">
</span><img class="error" data-dcnode-id="1027" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_71ee0aa0-ae06-11e4-be75-4769e1394a1a_000_Par8030516.jpg" data-ll-status="error" height="649" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_71ee0aa0-ae06-11e4-be75-4769e1394a1a_000_Par8030516.jpg&amp;raw" width="600"><noscript data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">&lt;img width="600" height="649" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_71ee0aa0-ae06-11e4-be75-4769e1394a1a_000_Par8030516.jpg"&gt;</span></noscript><span data-dcnode-id="1024" instrument_node="">
</span></div><span data-dcnode-id="1022" instrument_node="">
</span><div class="item-description" data-dcnode-id="1011"><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">As we mentioned, breast milk supplements have become a “thing” among weightlifters and bodybuilders, but if you're more of a non-athletic type or you just feel the need for some mother's milk, head on down to Tokyo's Kabukicho district which is home to several lactation bars. </span></p><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">If you go to the Bonyu Bar in the district and plonk down 2,000 yen, young mothers are more than willing to fill up a shot glass of their very own breast milk for you. For 5,000 yen, you can suck the milk straight from the teet of one of three mothers all under the age of 30.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Whatever happened to the good ol' days of sake and shochu?</span></p><span data-dcnode-id="1012" instrument_node="">
</span></div><span data-dcnode-id="1010" instrument_node="">
</span><div class="item-sources" data-dcnode-id="1003"><span class="item-source" data-dcnode-id="1007"><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//worldduh.com/2015/01/15/lactation-bars-serving-up-breast-milk-shots/" rel="nofollow" target="_blank"><span data-dcnode-id="1009" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="1004"><a data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.yzacg.com/japan-a-breast-milk-bar-has-been-opened/" rel="nofollow" target="_blank"><span data-dcnode-id="1006" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="1002" instrument_node=""> </span></div><span data-dcnode-id="1000" instrument_node="">
</span><div class="list-item list-item-8" data-dcnode-id="960"><span data-dcnode-id="999" instrument_node="">
</span><h2 data-dcnode-id="995"><span class="item-delta" data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">8</span></span><span data-dcnode-id="996" instrument_node="">The toy dairy cow that made milk</span></h2><span data-dcnode-id="994" instrument_node="">
</span><div class="item-image" data-dcnode-id="988"><span data-dcnode-id="993" instrument_node="">
</span><img class="error" data-dcnode-id="992" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Mwc3TT4eP7q-PSoxfuJjrQ.jpg" data-ll-status="error" height="478" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Mwc3TT4eP7q-PSoxfuJjrQ.jpg&amp;raw" width="600"><noscript data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">&lt;img width="600" height="478" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Mwc3TT4eP7q-PSoxfuJjrQ.jpg"&gt;</span></noscript><span data-dcnode-id="989" instrument_node="">
</span></div><span data-dcnode-id="987" instrument_node="">
</span><div class="item-description" data-dcnode-id="970"><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">There was no shortage of toys kids could play with in the 1970s. Slinkys, Tonka Trucks, Barbie Dolls, G.I. Joes…the list is endless.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">One toy that debuted in that wacky decade has been all but forgotten and perhaps for good reason. Does anybody remember Milky the Marvelous Milking Cow? Yeah, I didn't think so.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">Milky was a plastic toy cow that “drank” when kids would dunk its head in  water, squeeze its tail, and thanks to special tablets in the cow's stomach, kids could coax some kind of “milky” substance out of the plastic cow's udders. Since it wasn't real milk, it probably wasn't wise for the young, would-be farmers to drink it. Udderly disgusting.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Milky the Marvelous Milking Cow came out in 1978 by Kenner Toys. That same year, Kenner also made the original </span><i data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Star Wars</span></i><span data-dcnode-id="973" instrument_node="">  line of figures and toys which sold about 40 million units, and poor Milky was quickly sent out to pasture for good.</span></p><span data-dcnode-id="971" instrument_node="">
</span></div><span data-dcnode-id="969" instrument_node="">
</span><div class="item-sources" data-dcnode-id="962"><span class="item-source" data-dcnode-id="966"><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gajitz.com/milking-it-bizarre-milky-cow-toy-commercial-from-1978/" rel="nofollow" target="_blank"><span data-dcnode-id="968" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="963"><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.collectorsweekly.com/stories/19365-milky-the-marvelous-milking-cow-by-kenne" rel="nofollow" target="_blank"><span data-dcnode-id="965" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="961" instrument_node=""> </span></div><span data-dcnode-id="959" instrument_node="">
</span><div class="list-item list-item-9" data-dcnode-id="922"><span data-dcnode-id="958" instrument_node="">
</span><h2 data-dcnode-id="954"><span class="item-delta" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">9</span></span><span data-dcnode-id="955" instrument_node="">The Walmart “cow” that became a criminal</span></h2><span data-dcnode-id="953" instrument_node="">
</span><div class="item-image" data-dcnode-id="947"><span data-dcnode-id="952" instrument_node="">
</span><img class="error" data-dcnode-id="951" data-lazy-src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_alg-cow-costume-jpg.jpg" data-ll-status="error" height="554" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_alg-cow-costume-jpg.jpg&amp;raw" width="600"><noscript data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">&lt;img width="600" height="554" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_alg-cow-costume-jpg.jpg"&gt;</span></noscript><span data-dcnode-id="948" instrument_node="">
</span></div><span data-dcnode-id="946" instrument_node="">
</span><div class="item-description" data-dcnode-id="932"><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">It seems like weird stuff frequently happens at Walmart. So much so, there are a whole slew of websites dedicated to strange clientele and occurrences at the retail mega-chain.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">In April 2011, an 18-year-old man entered a Virginia Walmart at around 10:35 pm dressed in a cow suit. He swiped 26 gallons of milk and according to police reports, proceeded to crawl – not walk – out of the store. (We think he was trying to emulate the movement of cattle.) </span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Witnesses told police that the criminal cow gave out the stolen milk to people passing by the superstore.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Police rounded up the milk burglar at a local McDonald's. Apparently, the cow costume he sported didn't have a mask, and the suspect just happened to have a cow costume in the back seat of his car.</span></p><span data-dcnode-id="933" instrument_node="">
</span></div><span data-dcnode-id="931" instrument_node="">
</span><div class="item-sources" data-dcnode-id="924"><span class="item-source" data-dcnode-id="928"><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.com/2011/04/29/man-in-cow-suit-steals-milk_n_855420.html" rel="nofollow" target="_blank"><span data-dcnode-id="930" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="925"><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nydailynews.com/news/national/virginia-teen-dresses-costume-steals-92-worth-milk-wal-mart-article-1.115858" rel="nofollow" target="_blank"><span data-dcnode-id="927" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="923" instrument_node=""> </span></div><span data-dcnode-id="921" instrument_node="">
</span><div class="list-item list-item-10" data-dcnode-id="878"><span data-dcnode-id="920" instrument_node="">
</span><h2 data-dcnode-id="916"><span class="item-delta" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">10</span></span><span data-dcnode-id="917" instrument_node="">The president who died after drinking milk</span></h2><span data-dcnode-id="915" instrument_node="">
</span><div class="item-image" data-dcnode-id="909"><span data-dcnode-id="914" instrument_node="">
</span><img class="lazyloaded" data-dcnode-id="913" data-ll-status="loaded" height="730" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Cherries-%26-Milk.jpg&amp;raw" width="600"><noscript data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">&lt;img width="600" height="730" src="https://www.oddee.com/wp-content/uploads/_media/imgs/articles2/a99266_Cherries-&amp;-Milk.jpg"&gt;</span></noscript><span data-dcnode-id="910" instrument_node="">
</span></div><span data-dcnode-id="908" instrument_node="">
</span><div class="item-description" data-dcnode-id="888"><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Some U.S. presidents met their fate by assassination, like Lincoln and Kennedy. John Adams and Thomas Jefferson died on the same day, July 4th, 1826. Other presidents died of natural causes after their terms in office. And then there's poor President Zachary Taylor, who died after eating iced milk and cherries.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Zachary Taylor, the 12th U.S. president, died after eating cherries and drinking iced milk on a hot 4th of July in 1850 while attending festivities at the newly dedicated grounds upon which the Washington Monument would be erected. Later, Taylor drank a lot of water to wash down the cherries and ice milk. He died on the evening of July 9, after four days of suffering from symptoms that included severe cramping, diarrhea, nausea, and dehydration.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Rumors quickly spread that he had been poisoned. Taylor was a Southern plantation owner and conspiracy theorists believed that he was killed by Southerners who considered him a traitor for opposing the expansion of slavery into the territories. </span></p><span data-dcnode-id="898" instrument_node="">
</span><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Outbreaks of cholera, a deadly disease caused by bacteria, frequently occurred during the summer months in hot, humid Washington during the 1800s. Taylor could have contracted cholera from the water or iced milk that he drank that hot afternoon. Others believe that Taylor died of gastroenteritis caused by the highly acidic cherries combined with fresh milk.</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">In 1991, in an effort to put the controversy to rest, Taylor's body was exhumed and tested for arsenic. The tests concluded that he had not been poisoned, but that didn't satisfy some who argued that the tests were flawed. </span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">That event didn't stop future presidents from drinking milk, however. Cows lived on the grounds of the White House until Pauline the cow was the last bovine to live there. She made milk for President Taft's consumption.</span></p><span data-dcnode-id="889" instrument_node="">
</span></div><span data-dcnode-id="887" instrument_node="">
</span><div class="item-sources" data-dcnode-id="880"><span class="item-source" data-dcnode-id="884"><a data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.history.com/this-day-in-history/president-zachary-taylor-dies-unexpectedly" rel="nofollow" target="_blank"><span data-dcnode-id="886" instrument_node="">Source</span></a></span><span class="photo-source" data-dcnode-id="881"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//hailtothechieftothedeath.blogspot.com/2011/08/lincoln-vs-taylor.html" rel="nofollow" target="_blank"><span data-dcnode-id="883" instrument_node="">Photo</span></a></span></div><span data-dcnode-id="879" instrument_node=""> </span></div><span data-dcnode-id="877" instrument_node="">
</span></div><span data-dcnode-id="875" instrument_node="">
</span></div><span data-dcnode-id="872" instrument_node="">
</span></article><span data-dcnode-id="869" instrument_node="">
