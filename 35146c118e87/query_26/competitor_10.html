</span><div class="byline" data-dcnode-id="5762"><span data-dcnode-id="5781" instrument_node="">
</span><span class="date" data-dcnode-id="5777"><b data-dcnode-id="5779"><span data-dcnode-id="5780" instrument_node="">Published:</span></b><span data-dcnode-id="5778" instrument_node=""> November 21, 2019</span></span><span data-dcnode-id="5776" instrument_node=""> - 
			</span><span class="author" data-dcnode-id="5770"><b data-dcnode-id="5774"><span data-dcnode-id="5775" instrument_node="">Written By:</span></b><span data-dcnode-id="5773" instrument_node=""> </span><a data-dcnode-id="5771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/author/admin/" rel="author" title="Posts by The Dreamer"><span data-dcnode-id="5772" instrument_node="">The Dreamer</span></a></span><span data-dcnode-id="5769" instrument_node=""> - </span><span class="category" data-dcnode-id="5764"><b data-dcnode-id="5767"><span data-dcnode-id="5768" instrument_node="">Posted In: </span></b><a data-dcnode-id="5765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/category/meaning/" rel="tag"><span data-dcnode-id="5766" instrument_node="">meaning</span></a></span><span data-dcnode-id="5763" instrument_node="">
</span></div><span data-dcnode-id="5761" instrument_node="">
</span><span data-dcnode-id="5759" instrument_node="">
</span><p data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">Before you call the priest over to your house let’s break down what it actually means to be possessed in your dream. Possession dreams are fairly common yet vivid nightmares that may jolt you out of sleep. These dreams revolve around you our people being possessed by a negative force or entity that you have little or not control over.</span></p><span data-dcnode-id="5756" instrument_node="">
</span><p data-dcnode-id="5742"><span data-dcnode-id="5755" instrument_node="">So does this mean you are actually possessed? Answer: Yes. Yes you are…. We are all possessed actually, but never by the </span><em data-dcnode-id="5751"><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/meaning/dreams-about-the-devil/"><span data-dcnode-id="5754" instrument_node="">devil</span></a><span data-dcnode-id="5752" instrument_node=""> </span></em><span data-dcnode-id="5750" instrument_node="">or a </span><em data-dcnode-id="5748"><span data-dcnode-id="5749" instrument_node="">doll</span></em><span data-dcnode-id="5747" instrument_node=""> running around trying to kill you. The possession in your life is often metaphoric to something you have absolutely no control over, often times unconscious to you. If you are possessed in your </span><a data-dcnode-id="5744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/meaning/dreams-of-haunted-house/"><em data-dcnode-id="5745"><span data-dcnode-id="5746" instrument_node="">house</span></em></a><span data-dcnode-id="5743" instrument_node=""> reflects an internal struggle that needs fixing.</span></p><span data-dcnode-id="5741" instrument_node="">
</span><h2 data-dcnode-id="5739" style="text-align: center;"><span data-dcnode-id="5740" instrument_node="">Possession Dreams</span></h2><span data-dcnode-id="5738" instrument_node="">
</span><p data-dcnode-id="5736"><span data-dcnode-id="5737" instrument_node="">Dreams have an interesting way of creating certain symbols as metaphors, thus sending them in bizarre ways for you to get the point. The scarier the dream suggests the more you are ignoring the problem.</span></p><span data-dcnode-id="5735" instrument_node="">
</span><p data-dcnode-id="5733"><span data-dcnode-id="5734" instrument_node="">These dreams are usually connected to your own unconscious behaviors that are posing issues in your life, family or relationships. Alternatively, by reflecting on some of these controlling traits helps identify the cause of the dream.</span></p><span data-dcnode-id="5732" instrument_node="">
</span><p data-dcnode-id="5729"><strong data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">Possession Dream Symbolism</span></strong></p><span data-dcnode-id="5728" instrument_node="">
</span><ul data-dcnode-id="5699"><span data-dcnode-id="5727" instrument_node="">
</span><li data-dcnode-id="5725"><span data-dcnode-id="5726" instrument_node="">Anger or outbursts</span></li><span data-dcnode-id="5724" instrument_node="">
</span><li data-dcnode-id="5722"><span data-dcnode-id="5723" instrument_node="">Addictions</span></li><span data-dcnode-id="5721" instrument_node="">
</span><li data-dcnode-id="5719"><span data-dcnode-id="5720" instrument_node="">Fears or bullying</span></li><span data-dcnode-id="5718" instrument_node="">
</span><li data-dcnode-id="5716"><span data-dcnode-id="5717" instrument_node="">Drugs or alcohol</span></li><span data-dcnode-id="5715" instrument_node="">
</span><li data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">Negative thinking</span></li><span data-dcnode-id="5712" instrument_node="">
</span><li data-dcnode-id="5710"><span data-dcnode-id="5711" instrument_node="">Obsessions</span></li><span data-dcnode-id="5709" instrument_node="">
</span><li data-dcnode-id="5707"><span data-dcnode-id="5708" instrument_node="">Relationships or toxic people</span></li><span data-dcnode-id="5706" instrument_node="">
</span><li data-dcnode-id="5704"><span data-dcnode-id="5705" instrument_node="">Neurotic behaviors</span></li><span data-dcnode-id="5703" instrument_node="">
</span><li data-dcnode-id="5701"><span data-dcnode-id="5702" instrument_node="">Past experiences</span></li><span data-dcnode-id="5700" instrument_node="">
</span></ul><span data-dcnode-id="5698" instrument_node="">
</span><h3 data-dcnode-id="5696" style="text-align: center;"><span data-dcnode-id="5697" instrument_node="">Wait…Did You Just Watch A Horror Movie?</span></h3><span data-dcnode-id="5695" instrument_node="">
</span><p data-dcnode-id="5685"><span data-dcnode-id="5694" instrument_node="">Before we start to investigate further it would be helpful to know if you recently watched a horror movie. Dreams have a tendency to relive what you may have watched the night before. Watching horror movies like </span><em data-dcnode-id="5692"><span data-dcnode-id="5693" instrument_node="">Annabelle</span></em><span data-dcnode-id="5691" instrument_node=""> or&nbsp;</span><em data-dcnode-id="5687"><a data-dcnode-id="5689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/documentary/movie-the-exorcist-dream-interpretation-breakdown/"><span data-dcnode-id="5690" instrument_node="">Exorcist</span></a><span data-dcnode-id="5688" instrument_node="">&nbsp;</span></em><span data-dcnode-id="5686" instrument_node="">increase the chance of you being possessed in your dream.</span></p><span data-dcnode-id="5684" instrument_node="">
</span><h3 data-dcnode-id="5682" style="text-align: center;"><span data-dcnode-id="5683" instrument_node="">Possession Dreams: Human Shadow</span></h3><span data-dcnode-id="5681" instrument_node="">
</span><p data-dcnode-id="5676"><span data-dcnode-id="5680" instrument_node="">According to analytical psychologist </span><a data-dcnode-id="5678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carl_Jung"><span data-dcnode-id="5679" instrument_node="">Carl Jung</span></a><span data-dcnode-id="5677" instrument_node=""> believed that everybody has a shadow that has either been repressed or ignored. The possession in your dream might bring your attention to the dark parts of your personality that has control over you.</span></p><span data-dcnode-id="5675" instrument_node="">
</span><p data-dcnode-id="5673"><span data-dcnode-id="5674" instrument_node="">The shadow is a manifestation of all the repressed or unconscious urges, behaviors and emotions trapped inside wanting to be noticed. Despite the graphic or disturbing theme of your dream it has a purpose to help guide you to shine light on these dark places.</span></p><span data-dcnode-id="5672" instrument_node="">
</span><ul data-dcnode-id="5649"><span data-dcnode-id="5671" instrument_node="">
</span><li data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">Aggressive impulses</span></li><span data-dcnode-id="5668" instrument_node="">
</span><li data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">Taboo mental images</span></li><span data-dcnode-id="5665" instrument_node="">
</span><li data-dcnode-id="5663"><span data-dcnode-id="5664" instrument_node="">Shameful experiences</span></li><span data-dcnode-id="5662" instrument_node="">
</span><li data-dcnode-id="5660"><span data-dcnode-id="5661" instrument_node="">Immoral urges</span></li><span data-dcnode-id="5659" instrument_node="">
</span><li data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">Irrational wishes</span></li><span data-dcnode-id="5656" instrument_node="">
</span><li data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">Unacceptable sexual desires</span></li><span data-dcnode-id="5653" instrument_node="">
</span><li data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">Fears</span></li><span data-dcnode-id="5650" instrument_node="">
</span></ul><span data-dcnode-id="5648" instrument_node="">
</span><p data-dcnode-id="5646"><span data-dcnode-id="5647" instrument_node="">The main purpose behind your dream is for you to address these weaknesses that are prevalent in your life. By shining light on the dark areas of your personality the possession loses it’s strength and will eventually leave your body.</span></p><span data-dcnode-id="5645" instrument_node="">
</span><h3 data-dcnode-id="5643" style="text-align: center;"><span data-dcnode-id="5644" instrument_node="">Possession Dreams: Casting The Demon</span></h3><span data-dcnode-id="5642" instrument_node="">
</span><p data-dcnode-id="5640"><span data-dcnode-id="5641" instrument_node="">Is it possible something has manifested negatively where you are unable to let it out? Furthermore being possessed mirrors all your hidden emotions that have completely trapped you. You might have trouble expressing these feelings and they come out in other ways.</span></p><span data-dcnode-id="5639" instrument_node="">
</span><p data-dcnode-id="5634"><span data-dcnode-id="5638" instrument_node="">Society might have shaped you to hold on to these feelings your entire life. </span><strong data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">Suppressing your emotions may spare others the discomfort</span></strong><span data-dcnode-id="5635" instrument_node=""> of having to deal with your feelings, bottling it all on the inside can cause more damage.</span></p><span data-dcnode-id="5633" instrument_node="">
</span><p data-dcnode-id="5631"><span data-dcnode-id="5632" instrument_node="">The anger or rage that has been festered inside reflects that of a possession; the inability to be yourself, someone who you are not. Your body has been taken over by an entity that has chosen to posses you. These dream should not be considered a ‘bad dream’, but a positive dream shedding light on the emotions that have taken complete control over you.</span></p><span data-dcnode-id="5630" instrument_node="">
</span><p data-dcnode-id="5628"><span data-dcnode-id="5629" instrument_node="">In essence your higher self wants you to fix this internal issue so you can metaphorically rid this demon out of your body (mind). If this problem is not addressed the dream will become recurring causing long term phyical and psychological damage to your well being.</span></p><span data-dcnode-id="5627" instrument_node="">
</span><h3 data-dcnode-id="5625" style="text-align: center;"><span data-dcnode-id="5626" instrument_node="">Common Possession Dreams</span></h3><span data-dcnode-id="5624" instrument_node="">
</span><p data-dcnode-id="5620"><strong data-dcnode-id="5622"><span data-dcnode-id="5623" instrument_node="">Friends or Family:</span></strong><span data-dcnode-id="5621" instrument_node=""> Often times you will notice a friend or close family member being possessed by the devil. These dreams appear to possibly show you a change in their behaviour. They might be changing in ways you feel that are not good for them. You might feel that something has gotten into them or they are being controlled by a force they cannot understand.</span></p><span data-dcnode-id="5619" instrument_node="">
</span><p data-dcnode-id="5615"><strong data-dcnode-id="5617"><span data-dcnode-id="5618" instrument_node="">Child Possession:</span></strong><span data-dcnode-id="5616" instrument_node=""> This can be an interesting dream symbol that might be hinting that the child could be you. The term ‘inner child’ refers to the trapped child in every adult that has been stuck in time due to a past childhood traumatic event in their lives.</span></p><span data-dcnode-id="5614" instrument_node="">
</span><p data-dcnode-id="5609"><span data-dcnode-id="5613" instrument_node="">This child haunts you because have been neglecting this hurt and pain and needs to be attended. You can rescue this child by doing </span><a data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.harleytherapy.co.uk/counselling/inner-child-work-can-benefit.htm%23%3A~%3AtargetText%3D%27Inner%2520child%2520work%27%2520is%2520work%2Cconfidence%2520that%2520were%2520your%2520birthright."><span data-dcnode-id="5612" instrument_node="">inner child work</span></a><span data-dcnode-id="5610" instrument_node=""> which is the process of going back to the time when you where effected by some event. The child will continue to haunt you until you acknowledge this kid that is trapped inside.</span></p><span data-dcnode-id="5608" instrument_node="">
</span><p data-dcnode-id="5604"><strong data-dcnode-id="5606"><span data-dcnode-id="5607" instrument_node="">Exorcism:</span></strong><span data-dcnode-id="5605" instrument_node=""> These dreams might not be so bad after all. When its time to call a priest in you might be acknowledging what is inside and now it time to get out! You need to make peace with your demons so you can move on with your life.</span></p><span data-dcnode-id="5603" instrument_node="">
</span><p data-dcnode-id="5598"><span data-dcnode-id="5602" instrument_node="">Doll Possession: A symbol that brings you back to your childhood, or perhaps you just finished watching a scary movie. Dreams about </span><a data-dcnode-id="5600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdictionary.org/dream-dictionary/dreaming-of-dolls/"><span data-dcnode-id="5601" instrument_node="">possessed dolls</span></a><span data-dcnode-id="5599" instrument_node=""> often leads you to examine your inner child.</span></p><span data-dcnode-id="5597" instrument_node="">
