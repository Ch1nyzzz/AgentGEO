dcnode-id="325"><div class="css-stl7tm" data-dcnode-id="326"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="327"><div class="css-z468a2" data-dcnode-id="442"><h1 data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">What does it mean when we dream?</span></h1><section class="css-19y29pm" data-dcnode-id="1957" data-testid="byline"><div class="css-1q67gt9" data-dcnode-id="1970"><div class="css-1edxg1f" data-dcnode-id="1971"><img alt="" data-dcnode-id="1972" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2019/12/timothy-legg_mr.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="1958"><span data-dcnode-id="1966"><span data-dcnode-id="1969" instrument_node="">Medically reviewed by </span><a class="css-1dkklb9" data-dcnode-id="1967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/reviewers/timothy-j-legg-phd-crnp"><span data-dcnode-id="1968" instrument_node="">Timothy J. Legg, PhD, PsyD</span></a></span><span data-dcnode-id="1965" instrument_node=""> — </span><span data-dcnode-id="1961"><span data-dcnode-id="1964" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/hannah-nichols"><span data-dcnode-id="1963" instrument_node="">Hannah Nichols</span></a></span><span data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node=""> on June 28, 2018</span></span></div></section><div data-dcnode-id="787"><nav class="css-11tsida" data-dcnode-id="1937" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1938"><li class="css-t753mo" data-dcnode-id="1954"><a class="css-1xe63ky" data-dcnode-id="1955" href="#causes"><span data-dcnode-id="1956" instrument_node="">Causes</span></a></li><li class="css-t753mo" data-dcnode-id="1951"><a class="css-1xe63ky" data-dcnode-id="1952" href="#what-are-dreams"><span data-dcnode-id="1953" instrument_node="">What are dreams?</span></a></li><li class="css-t753mo" data-dcnode-id="1948"><a class="css-1xe63ky" data-dcnode-id="1949" href="#interpretations"><span data-dcnode-id="1950" instrument_node="">Interpretations</span></a></li><li class="css-t753mo" data-dcnode-id="1945"><a class="css-1xe63ky" data-dcnode-id="1946" href="#forgetting-dreams"><span data-dcnode-id="1947" instrument_node="">Forgetting dreams</span></a></li><li class="css-t753mo" data-dcnode-id="1942"><a class="css-1xe63ky" data-dcnode-id="1943" href="#who-dreams"><span data-dcnode-id="1944" instrument_node="">Who dreams?</span></a></li><li class="css-t753mo" data-dcnode-id="1939"><a class="css-1xe63ky" data-dcnode-id="1940" href="#vision-and-hearing-loss"><span data-dcnode-id="1941" instrument_node="">Vision and hearing loss</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="789"><div class="css-2h0l1x" data-dcnode-id="1931"><span data-dcnode-id="1936" style="font-size:0;line-height:0"></span><p class="disclaimer" data-dcnode-id="1932"><span data-dcnode-id="1935" instrument_node="">We include products we think are useful for our readers. If you buy through links on this page, we may earn a small commission. </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/product-selection-process"><span data-dcnode-id="1934" instrument_node="">Here’s our process.</span></a></p></div><div class="css-0" data-dcnode-id="1895"><span data-dcnode-id="1930" style="font-size:0;line-height:0"></span><div data-dcnode-id="1927"><p class="css-dmtxcr" data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Dreams are stories and images that our minds create while we sleep. They can be entertaining, fun, romantic, disturbing, frightening, and sometimes bizarre.</span></p></div><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">They are an enduring source of mystery for scientists and psychological doctors. Why do dreams occur? What causes them? Can we control them? What do they mean?</span></p><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">This article will explore the current theories, causes, and applications of dreaming.</span></p><div class="css-crmikf" data-dcnode-id="1903" id="widget_call_out_99b94fd4-7aba-4f30-9697-cf4049580956"><span data-dcnode-id="1922" style="font-size:0;line-height:0"></span><div class="css-10550dw" data-dcnode-id="1904"><div data-dcnode-id="1905"><h3 class="css-4c0yvm" data-dcnode-id="1919"><span class="quick_facts_title" data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">Fast facts on dreams</span></span></h3><div class="css-13ifv4s" data-dcnode-id="1906"><p data-dcnode-id="1918"></p><ul data-dcnode-id="1907"><li data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">We may not remember dreaming, but everyone is thought to dream between 3 and 6 times per night</span></li><li data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">It is thought that each dream lasts between 5 to 20 minutes.</span></li><li data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">Around 95 percent of dreams are forgotten by the time a person gets out of bed.</span></li><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Dreaming can help you learn and develop long-term memories.</span></li><li data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Blind people dream more with other sensory components compared with sighted people.</span></li></ul></div></div></div></div><div data-dcnode-id="1902" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1896"><aside class="css-0 css-0" data-dcnode-id="1897"><div data-dcnode-id="1898"><div class="css-10gx9pb" data-dcnode-id="1899" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1901"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline3" data-dcnode-id="1900" id="inline3__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1752"><span data-dcnode-id="1894" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1890"><div data-dcnode-id="1891"><a class="chartbeat-section" data-dcnode-id="1892" name="causes"><span data-dcnode-id="1893" instrument_node="">Causes</span></a></div></h2><p data-dcnode-id="1885"><img alt="Everyone probably dreams" data-dcnode-id="1889" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-prod.medicalnewstoday.com/content/images/articles/284/284378/everyone-probably-dreams.jpg&amp;raw"><br data-dcnode-id="1888"><em data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Dreams: Do they represent our unconsious desires?</span></em></p><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">There are several theories about why we dream. Are dreams merely part of the sleep cycle, or do they serve some other purpose?</span></p><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Possible explanations include:</span></p><ul data-dcnode-id="1872"><li data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">representing unconscious desires and wishes</span></li><li data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">interpreting random signals from the brain and body during sleep</span></li><li data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">consolidating and processing information gathered during the day</span></li><li data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">working as a form of psychotherapy</span></li></ul><p data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">From evidence and new research methodologies, researchers have speculated that dreaming serves the following functions:</span></p><ul data-dcnode-id="1808"><li data-dcnode-id="1860"><span data-dcnode-id="1869" instrument_node="">offline memory reprocessing, in which the brain consolidates learning and memory tasks and </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1862" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3613603/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1868" instrument_node="">supports and records</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1865"><span class="sro" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1863"></span></hl-trusted-source><span data-dcnode-id="1861" instrument_node=""> waking consciousness</span></li><li data-dcnode-id="1851"><span data-dcnode-id="1859" instrument_node="">preparing for </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1852" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15766897" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1858" instrument_node="">possible future threats</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1855"><span class="sro" data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1853"></span></hl-trusted-source></li><li data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">cognitive simulation of real life experiences, as dreaming is a subsystem of the waking default network, the part of the mind active during daydreaming</span></li><li data-dcnode-id="1839"><span data-dcnode-id="1848" instrument_node="">helping </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1841" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25297479" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1847" instrument_node="">develop cognitive</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1844"><span class="sro" data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1842"></span></hl-trusted-source><span data-dcnode-id="1840" instrument_node=""> capabilities</span></li><li data-dcnode-id="1829"><span data-dcnode-id="1838" instrument_node="">reflecting </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1831" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15798942" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1837" instrument_node="">unconscious mental function</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1834"><span class="sro" data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1832"></span></hl-trusted-source><span data-dcnode-id="1830" instrument_node=""> in a psychoanalytic way</span></li><li data-dcnode-id="1819"><span data-dcnode-id="1828" instrument_node="">a unique state of consciousness that </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1821" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20518435" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1827" instrument_node="">incorporates experience</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1824"><span class="sro" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1822"></span></hl-trusted-source><span data-dcnode-id="1820" instrument_node=""> of the present, processing of the past, and preparation for the future</span></li><li data-dcnode-id="1809"><span data-dcnode-id="1818" instrument_node="">a psychological space where overwhelming, contradictory, or highly complex notions can be </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1811" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18430709" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1817" instrument_node="">brought together</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1814"><span class="sro" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1812"></span></hl-trusted-source><span data-dcnode-id="1810" instrument_node=""> by the dreaming ego, notions that would be unsettling while awake, serving the need for psychological balance and equilibrium</span></li></ul><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Much that remains unknown about dreams. They are by nature difficult to study in a laboratory, but technology and new research techniques may help improve our understanding of dreams.</span></p><h3 data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Phases of sleep</span></h3><p data-dcnode-id="1799"><img alt="Dreams most likely happen" data-dcnode-id="1803" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-prod.medicalnewstoday.com/content/images/articles/284/284378/dreams-most-likely-happen.jpg&amp;raw"><br data-dcnode-id="1802"><em data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Dreams most likely happen during REM sleep.</span></em></p><p data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">There are five phases of sleep in a sleep cycle:</span></p><p data-dcnode-id="1793"><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Stage 1</span></strong><span data-dcnode-id="1794" instrument_node="">: Light sleep, slow eye movement, and reduced muscle activity. This stage forms 4 to 5 percent of total sleep.</span></p><p data-dcnode-id="1789"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Stage 2</span></strong><span data-dcnode-id="1790" instrument_node="">: Eye movement stops and brain waves become slower, with occasional bursts of rapid waves called sleep spindles. This stage forms 45 to 55 percent of total sleep.</span></p><p data-dcnode-id="1785"><strong data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Stage 3</span></strong><span data-dcnode-id="1786" instrument_node="">: Extremely slow brain waves called delta waves begin to appear, interspersed with smaller, faster waves. This accounts for 4 to 6 percent of total sleep.</span></p><p data-dcnode-id="1781"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Stage 4</span></strong><span data-dcnode-id="1782" instrument_node="">: The brain produces delta waves almost exclusively. It is difficult to wake someone during stages 3 and 4, which together are called “deep sleep.” There is no eye movement or muscle activity. People awakened while in deep sleep do not adjust immediately and often feel disoriented for several minutes after waking up. This forms 12 to 15 percent of total sleep.</span></p><p data-dcnode-id="1771"><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">Stage 5</span></strong><span data-dcnode-id="1778" instrument_node="">: This stage is known as rapid eye movement (</span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/247927.php" title="What is REM sleep?"><span data-dcnode-id="1777" instrument_node="">REM</span></a><span data-dcnode-id="1775" instrument_node="">). Breathing becomes more rapid, irregular, and shallow, eyes jerk rapidly in various directions, and limb muscles become temporarily paralyzed. Heart rate increases, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/270644.php" title="What is a normal blood pressure?"><span data-dcnode-id="1774" instrument_node="">blood pressure</span></a><span data-dcnode-id="1772" instrument_node=""> rises, and males develop penile erections. When people awaken during REM sleep, they often describe bizarre and illogical tales. These are dreams. This stage accounts for 20 to 25 percent of total sleep time.</span></p><p data-dcnode-id="1759"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248680.php" title="What is neuroscience?"><span data-dcnode-id="1770" instrument_node="">Neuroscience</span></a><span data-dcnode-id="1768" instrument_node=""> offers explanations</span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1761" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15798942" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1767" instrument_node=""> linked to the rapid eye movement</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1764"><span class="sro" data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1762"></span></hl-trusted-source><span data-dcnode-id="1760" instrument_node=""> (REM) phase of sleep as a likely candidate for the cause of dreaming.</span></p><div class="css-1cg0byz" data-dcnode-id="1753"><aside class="css-0 css-0" data-dcnode-id="1754"><div data-dcnode-id="1755"><div class="css-az6x7v" data-dcnode-id="1756" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1758"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline6" data-dcnode-id="1757" id="inline6__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1629"><span data-dcnode-id="1751" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1747"><div data-dcnode-id="1748"><a class="chartbeat-section" data-dcnode-id="1749" name="what-are-dreams"><span data-dcnode-id="1750" instrument_node="">What are dreams?</span></a></div></h2><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Dreams are a universal human experience that can be described as a state of consciousness characterized by sensory, cognitive and emotional occurrences during sleep.</span></p><p data-dcnode-id="1735"><span data-dcnode-id="1744" instrument_node="">The dreamer </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1737" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22760770" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1743" instrument_node="">has reduced</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1740"><span class="sro" data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1738"></span></hl-trusted-source><span data-dcnode-id="1736" instrument_node=""> control over the content, visual images and activation of the memory.</span></p><p data-dcnode-id="1725"><span data-dcnode-id="1734" instrument_node="">There is </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1727" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22965274" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1733" instrument_node="">no cognitive state</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1730"><span class="sro" data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1728"></span></hl-trusted-source><span data-dcnode-id="1726" instrument_node=""> that has been as extensively studied and yet as frequently misunderstood as dreaming.</span></p><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">There are significant differences between the neuroscientific and psychoanalytic approaches to dream analysis.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1722" instrument_node="">Neuroscientists are </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1715" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/10669969" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1721" instrument_node="">interested in</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1718"><span class="sro" data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1716"></span></hl-trusted-source><span data-dcnode-id="1714" instrument_node=""> the structures involved in dream production, dream organization, and narratability. However, psychoanalysis concentrates on the meaning of dreams and placing them in the context of relationships in the history of the dreamer.</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1712" instrument_node="">Reports of dreams </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1705" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21075010/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1711" instrument_node="">tend to be</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1708"><span class="sro" data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1706"></span></hl-trusted-source><span data-dcnode-id="1704" instrument_node=""> full of emotional and vivid experiences that contain themes, concerns, dream figures, and objects that correspond closely to waking life.</span></p><p data-dcnode-id="1693"><span data-dcnode-id="1702" instrument_node="">These elements create a novel “reality” out of seemingly nothing, </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1695" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3613603/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1701" instrument_node="">producing an experience</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1698"><span class="sro" data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1696"></span></hl-trusted-source><span data-dcnode-id="1694" instrument_node=""> with a lifelike timeframe and connections.</span></p><h3 data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Nightmares</span></h3><p data-dcnode-id="1686"><span data-dcnode-id="1690" instrument_node="">Nightmares are distressing dreams that cause the dreamer to feel a number of disturbing emotions. Common reactions to a nightmare include fear and </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/anxiety/" title="What is Anxiety?"><span data-dcnode-id="1689" instrument_node="">anxiety</span></a><span data-dcnode-id="1687" instrument_node="">.</span></p><p data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">They can occur in both adults and children, and causes include:</span></p><ul data-dcnode-id="1670"><li data-dcnode-id="1681"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855.php" title="Why stress happens and how to manage it"><span data-dcnode-id="1683" instrument_node="">stress</span></a></li><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">fear</span></li><li data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">trauma</span></li><li data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">emotional difficulties</span></li><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">illness</span></li><li data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">use of certain medications or drugs</span></li></ul><h3 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">Lucid dreams</span></h3><p data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">Lucid dreaming is the dreamer is aware that they are dreaming. They may have some control over their dream.</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">This measure of control can vary between lucid dreams. They often occur in the middle of a regular dream when the sleeping person realizes suddenly that they are dreaming.</span></p><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Some people experience lucid dreaming at random, while others have reported being able to increase their capacity to control their dreams.</span></p><div data-dcnode-id="1636" id="m1e97866a-92c8-4e57-8df7-59c7f154a2cc"><div data-dcnode-id="1637"><div data-dcnode-id="1638"><div class="css-get1og" data-dcnode-id="1639"><div class="css-lhqo36" data-dcnode-id="1646"><h2 class="css-ij4tfq" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">FEATURED</span></h2><h3 class="css-3aaq93" data-dcnode-id="1657"><a class="css-1lb03dr" data-dcnode-id="1658" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/articles/284378_middle_cdi_merchandising_mnt_middle_xyrem_37460|slot1_/articles/xyrem" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/xyrem%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcdi_merchandising_mnt_middle_xyrem_37460%26correlationId%3D4a7aae37-bf49-47db-b6be-3b34fbcf5958"><span data-dcnode-id="1659" instrument_node="">Treatment for Narcolepsy</span></a></h3><picture class="css-u71ja5" data-dcnode-id="1653"><source data-dcnode-id="1656" media="(min-width: 990px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><source data-dcnode-id="1655" media="(min-width: 768px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><img alt="" data-dcnode-id="1654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%2520%281%29.jpg&amp;raw"></picture><p class="css-1nubf86" data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Explore our comprehensive information on FDA-approved medications for narcolepsy. Learn about side effects, dosage, interactions, and more.</span></p><a class="css-wb75r7" data-dcnode-id="1647" data-event="Driver Content Promo_Single Article Take Action|Driver Click_/articles/284378_middle_cdi_merchandising_mnt_middle_xyrem_37460|slot1_/articles/xyrem" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/xyrem%3Fsource%3Dnative%26medium%3Dntd%26subid%3Dcdi_merchandising_mnt_middle_xyrem_37460%26correlationId%3D4a7aae37-bf49-47db-b6be-3b34fbcf5958"><span class="css-14ktbsh" data-dcnode-id="1648"><span class="css-1huyk6v" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">LEARN MORE</span></span></span></a></div><div class="css-1537uod" data-dcnode-id="1645"></div><div class="css-x1qz84" data-dcnode-id="1640"><picture class="css-9z7k4b" data-dcnode-id="1641"><source data-dcnode-id="1644" media="(min-width: 990px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><source data-dcnode-id="1643" media="(min-width: 768px)" srcset="https://healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%20(1).jpg"><img alt="" data-dcnode-id="1642" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthline-activation-prod.healthline.com/driver-images/MNT-multiform-732x549-thumbnail-003%2520%281%29.jpg&amp;raw"></picture></div></div></div></div></div><div class="css-umsscj" data-dcnode-id="1630"><aside class="css-0 css-0" data-dcnode-id="1631"><div data-dcnode-id="1632"><div class="css-10gx9pb" data-dcnode-id="1633" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1635"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline9" data-dcnode-id="1634" id="inline9__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1138"><span data-dcnode-id="1628" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1624"><div data-dcnode-id="1625"><a class="chartbeat-section" data-dcnode-id="1626" name="interpretations"><span data-dcnode-id="1627" instrument_node="">Interpretations</span></a></div></h2><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">What goes through our minds just before we fall asleep could affect the content of our dreams.</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">For example, during exam time, students may dream about course content. People in a relationship may dream of their partner. Web developers may see programming code.</span></p><p data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">These circumstantial observations suggest that elements from the everyday re-emerge in dream-like imagery during the transition from wakefulness to sleep.</span></p><h3 data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Characters</span></h3><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">Studies have examined the “characters” that appear in dream reports and how they the dreamer identifies them.</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1613" instrument_node="">A study of </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1606" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1046/j.1365-2869.2000.00213.x%23b2" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1612" instrument_node="">320 adult dream reports</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1609"><span class="sro" data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1607"></span></hl-trusted-source><span data-dcnode-id="1605" instrument_node=""> found:</span></p><ul data-dcnode-id="1597"><li data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Forty-eight percent of characters represented a named person known to the dreamer.</span></li><li data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Thirty-five percent of characters were identified by their social role (for example, policeman) or relationship to dreamer (such as a friend).</span></li><li data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">Sixteen percent were not recognized</span></li></ul><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Among named characters:</span></p><ul data-dcnode-id="1586"><li data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">Thirty-two percent were identified by appearance</span></li><li data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">Twenty-one percent were identified by behavior</span></li><li data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Forty-five percent were identified by face</span></li><li data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Forty-four percent were identified by “just knowing”</span></li></ul><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Elements of bizarreness were reported in 14 percent of named and generic characters.</span></p><p data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">Another study investigated the relationship between dream emotion and dream character identification.</span></p><p data-dcnode-id="1577"><span data-dcnode-id="1581" instrument_node="">Affection and joy were </span><a class="content-link css-1pg8eb5" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1053810001905379" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1580" instrument_node="">commonly associated</span></a><span data-dcnode-id="1578" instrument_node=""> with known characters and were used to identify them even when these emotional attributes were inconsistent with those of the waking state.</span></p><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">The findings suggest that the dorsolateral prefrontal cortex, associated with short-term memory, is less active in the dreaming brain than during waking life, while the paleocortical and subcortical limbic areas are more active.</span></p><h3 data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Memories</span></h3><p data-dcnode-id="1571"><span data-dcnode-id="1572" instrument_node="">The concept of ‘repression’ dates back to Freud. Freud maintained that undesirable memories could become suppressed in the mind. Dreams ease repression by allowing these memories to be reinstated.</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1570" instrument_node="">A study showed that sleep </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1563" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1111/j.1365-2869.2010.00881.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1569" instrument_node="">does not help</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1566"><span class="sro" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1564"></span></hl-trusted-source><span data-dcnode-id="1562" instrument_node=""> people forget unwanted memories. Instead, REM sleep might even counteract the voluntary suppression of memories, making them more accessible for retrieval.</span></p><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Two types of temporal effects characterize the incorporation of memories into dreams:</span></p><ul data-dcnode-id="1554"><li data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">the day-residue effect, involving immediate incorporations of events from the preceding day</span></li><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">the dream-lag effect, involving incorporations delayed by about a week</span></li></ul><p data-dcnode-id="1544"><span data-dcnode-id="1553" instrument_node="">The </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1546" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/abs/10.1111/j.1365-2869.2004.00421.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1552" instrument_node="">findings of one study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1549"><span class="sro" data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1547"></span></hl-trusted-source><span data-dcnode-id="1545" instrument_node=""> suggest that:</span></p><ul data-dcnode-id="1539"><li data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">processing memories into dream incorporation takes a cycle of around 7 days</span></li><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">these processes help further the functions of socio-emotional adaptation and memory consolidation</span></li></ul><h3 data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Dream lag</span></h3><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Dream-lag is when the images, experiences, or people that emerge in dreams are images, experiences, or people you have seen recently, perhaps the previous day or a week before.</span></p><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">The idea is that certain types of experiences take a week to become encoded into long-term memory, and some of the images from the consolidation process will appear in a dream.</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">Events experienced while awake are said to feature in 1 to 2 percent of dream reports, although 65 percent of dream reports reflect aspects of recent waking life experiences.</span></p><p data-dcnode-id="1521"><span data-dcnode-id="1530" instrument_node="">The dream-lag effect </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1523" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3202556/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1529" instrument_node="">has been reported</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1526"><span class="sro" data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1524"></span></hl-trusted-source><span data-dcnode-id="1522" instrument_node=""> in dreams that occur at the REM stage but not those that occur at stage 2.</span></p><h3 data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Memory types and dreaming</span></h3><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Two types of memory can form the basis of a dream.</span></p><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">These are:</span></p><ul data-dcnode-id="1510"><li data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">autobiographical memories, or long-lasting memories about the self</span></li><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">episodic memories, which are memories about specific episodes or events</span></li></ul><p data-dcnode-id="1500"><span data-dcnode-id="1509" instrument_node="">A study exploring different types of memory within dream content among 32 participants </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1502" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24635722" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1508" instrument_node="">found</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1505"><span class="sro" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1503"></span></hl-trusted-source><span data-dcnode-id="1501" instrument_node=""> the following:</span></p><ul data-dcnode-id="1495"><li data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">One dream (0.5 percent) contained an episodic memory.</span></li><li data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Most dreams in the study (80 percent) contained low to moderate incorporations of autobiographical memory features.</span></li></ul><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Researchers suggest that memories of personal experiences are experienced fragmentarily and selectively during dreaming. The purpose may be to integrate these memories into the long-lasting autobiographical memory.</span></p><p data-dcnode-id="1483"><span data-dcnode-id="1492" instrument_node="">A hypothesis stating that dreams reflect waking-life experiences is supported by studies investigating the dreams of psychiatric patients and patients with sleep disorders. In short, their daytime symptoms and problems </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1485" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20870066" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1491" instrument_node="">are reflected</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1488"><span class="sro" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1486"></span></hl-trusted-source><span data-dcnode-id="1484" instrument_node=""> in their dreams.</span></p><p data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">In 1900, Freud described a category of dreams known as “biographical dreams.” These reflect the historical experience of being an infant without the typical defensive function. Many authors agree that some traumatic dreams perform a function of recovery.</span></p><p data-dcnode-id="1471"><span data-dcnode-id="1480" instrument_node="">One paper </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1473" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19821852" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1479" instrument_node="">hypothesizes</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1476"><span class="sro" data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1474"></span></hl-trusted-source><span data-dcnode-id="1472" instrument_node=""> that the main aspect of traumatic dreams is to communicate an experience that the dreamer has in the dream but does not understand. This can help an individual reconstruct and come to terms with past trauma.</span></p><h3 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Themes</span></h3><p data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">The themes of dreams can be linked to the suppression of unwanted thoughts and, as a result, an increased occurrence of that suppressed thought in dreams.</span></p><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Fifteen good sleepers were asked to suppress an unwanted thought 5 minutes prior to sleep.</span></p><p data-dcnode-id="1455"><span data-dcnode-id="1464" instrument_node="">The </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1457" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/jsr.12058/abstract" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1463" instrument_node="">results demonstrate</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1460"><span class="sro" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1458"></span></hl-trusted-source><span data-dcnode-id="1456" instrument_node=""> that there were increased dreams about the unwanted thought and a tendency to have more distressing dreams. They also imply that thought suppression may lead to significantly increased mental disorder symptoms.</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1454" instrument_node="">Research </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1447" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/abs/10.1111/j.1365-2869.2009.00737.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1453" instrument_node="">has indicated</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1450"><span class="sro" data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1448"></span></hl-trusted-source><span data-dcnode-id="1446" instrument_node=""> that external stimuli presented during sleep can affect the emotional content of dreams.</span></p><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">For example, the positively-toned stimulus of roses in one study yielded more positively themed dreams, whereas the negative stimulus of rotten eggs was followed by more negatively themed dreams.</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Typical dreams are defined as dreams similar to those reported by a high percentage of dreamers.</span></p><p data-dcnode-id="1431"><span data-dcnode-id="1440" instrument_node="">Up to now, the frequencies of typical dream themes have been studied with questionnaires. These </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1433" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15612605" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1439" instrument_node="">have indicated</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1436"><span class="sro" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1434"></span></hl-trusted-source><span data-dcnode-id="1432" instrument_node=""> that a rank order of 55 typical dream themes has been stable over different sample populations.</span></p><p data-dcnode-id="1426"><img alt="Some themes" data-dcnode-id="1430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-prod.medicalnewstoday.com/content/images/articles/284/284378/some-themes.jpg&amp;raw"><br data-dcnode-id="1429"><em data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Some themes are familiar to many people, such as flying, falling, and arriving late.</span></em></p><p data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">The 55 themes identified are:</span></p><ul data-dcnode-id="1313"><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">school, teachers, and studying</span></li><li data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">being chased or pursued</span></li><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">sexual experiences</span></li><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">falling</span></li><li data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">arriving too late</span></li><li data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">a living person being dead</span></li><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">a person now dead being alive</span></li><li data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">flying or soaring through the air</span></li><li data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">failing an examination</span></li><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">being on the verge of falling</span></li><li data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">being frozen with fright</span></li><li data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">being physically attacked</span></li><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">being nude</span></li><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">eating delicious food</span></li><li data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">swimming</span></li><li data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">being locked up</span></li><li data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node="">insects or spiders</span></li><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">being killed</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">losing teeth</span></li><li data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">being tied up, restrained, or unable to move</span></li><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">being inappropriately dressed</span></li><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">being a child again</span></li><li data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">trying to complete a task successfully</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">being unable to find toilet, or embarrassment about losing one</span></li><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">discovering a new room at home</span></li><li data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">having superior knowledge or mental ability</span></li><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">losing control of a vehicle</span></li><li data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">fire</span></li><li data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">wild, violent beasts</span></li><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">seeing a face very close to you</span></li><li data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">snakes</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">having magical powers</span></li><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">vividly sensing, but not necessarily seeing or hearing, a presence in the room</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">finding money</span></li><li data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">floods or tidal waves</span></li><li data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">killing someone</span></li><li data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">seeing yourself as dead</span></li><li data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">being half-awake and paralyzed in bed</span></li><li data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">people behaving in a menacing way</span></li><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">seeing yourself in a mirror</span></li><li data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">being a member of the opposite sex</span></li><li data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">being smothered, unable to breathe</span></li><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">encountering God in some form</span></li><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">seeing a flying object crash</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">earthquakes</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">seeing an angel</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">part animal, part human creatures</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">tornadoes or strong winds</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">being at the movie</span></li><li data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">seeing extra-terrestrials</span></li><li data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">traveling to another planet</span></li><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">being an animal</span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">seeing a UFO</span></li><li data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">someone having an abortion</span></li><li data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">being an object</span></li></ul><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Some dream themes appear to change over time.</span></p><p data-dcnode-id="1301"><span data-dcnode-id="1310" instrument_node="">For example, from 1956 to 2000, there was </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1303" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18065090" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1309" instrument_node="">an increase in the percentage</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1306"><span class="sro" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1304"></span></hl-trusted-source><span data-dcnode-id="1302" instrument_node=""> of people who reported flying in dreams. This could reflect the increase in air travel.</span></p><h3 data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">What do they mean?</span></h3><p data-dcnode-id="1295"><strong data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Relationships</span></strong><span data-dcnode-id="1296" instrument_node="">: Some have hypothesized that one cluster of typical dreams, including being an object in danger, falling, or being chased, is related to interpersonal conflicts.</span></p><p data-dcnode-id="1291"><strong data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Sexual concepts</span></strong><span data-dcnode-id="1292" instrument_node="">: Another cluster that includes flying, sexual experiences, finding money, and eating delicious food is associated with libidinal and sexual motivations.</span></p><p data-dcnode-id="1287"><strong data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Fear of embarrassment</span></strong><span data-dcnode-id="1288" instrument_node="">: A third group, containing dreams that involve being nude, failing an examination, arriving too late, losing teeth, and being inappropriately dressed, is associated with social concerns and a fear of embarrassment.</span></p><h3 data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">Brain activity and dream types</span></h3><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">In neuroimaging studies of brain activity during REM sleep, scientists found that the distribution of brain activity might also be linked to specific dream features.</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1282" instrument_node="">Several bizarre features of normal dreams </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1275" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11849612/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1281" instrument_node="">have similarities</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1278"><span class="sro" data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1276"></span></hl-trusted-source><span data-dcnode-id="1274" instrument_node=""> with well-known neuropsychological syndromes that occur after brain damage, such as delusional misidentifications for faces and places.</span></p><h3 data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Dreams and the senses</span></h3><p data-dcnode-id="1263"><span data-dcnode-id="1270" instrument_node="">Dreams were evaluated in people experiencing different types of </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/73936.php" title="What is causing this headache?"><span data-dcnode-id="1269" instrument_node="">headache</span></a><span data-dcnode-id="1267" instrument_node="">. Results showed people with </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/148373.php" title="Everything you need to know about migraines"><span data-dcnode-id="1266" instrument_node="">migraine</span></a><span data-dcnode-id="1264" instrument_node=""> had increased frequency of dreams involving taste and smell.</span></p><p data-dcnode-id="1253"><span data-dcnode-id="1262" instrument_node="">This </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1255" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24867858" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1261" instrument_node="">may suggest</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1258"><span class="sro" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1256"></span></hl-trusted-source><span data-dcnode-id="1254" instrument_node=""> that the role of some cerebral structures, such as amygdala and hypothalamus, are involved in migraine mechanisms as well as in the biology of sleep and dreaming.</span></p><p data-dcnode-id="1243"><span data-dcnode-id="1252" instrument_node="">Music in dreams is rarely studied in scientific literature. However, in a study of 35 professional musicians and 30 non-musicians, the musicians </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1245" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16243543" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1251" instrument_node="">experienced</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1248"><span class="sro" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1246"></span></hl-trusted-source><span data-dcnode-id="1244" instrument_node=""> twice as many dreams featuring music, when compared with non-musicians.</span></p><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Musical dream frequency was related to the age of commencement of musical instruction but not to the daily load of musical activity. Nearly half of the recalled music was non-standard, suggesting that original music can be created in dreams.</span></p><h3 data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">Pain</span></h3><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">It has been shown that realistic, localized painful sensations can be experienced in dreams, either through direct incorporation or from memories of pain. However, the frequency of pain dreams in healthy subjects is low.</span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">In one study, 28 non-ventilated burn victims were interviewed for 5 consecutive mornings during their first week of hospitalization.</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1234" instrument_node="">Results </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1227" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12405613" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1233" instrument_node="">showed</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1230"><span class="sro" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1228"></span></hl-trusted-source><span data-dcnode-id="1226" instrument_node="">:</span></p><ul data-dcnode-id="1216"><li data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Thirty-nine percent of people reported pain dreams.</span></li><li data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Of those experiencing pain dreams, 30 percent of their total dreams were pain-related.</span></li><li data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">Patients with pain dreams showed evidence of reduced sleep, more nightmares, higher intake of anxiolytic medication, and higher scores on the Impact of Event Scale.</span></li><li data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Patients with pain dreams also had a tendency to report more intense pain during therapeutic procedures.</span></li></ul><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">More than half did not report pain dreams. However, these results could suggest that pain dreams occur at a greater frequency in populations currently experiencing pain than in normal volunteers.</span></p><h3 data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Self-awareness</span></h3><p data-dcnode-id="1202"><span data-dcnode-id="1211" instrument_node="">One study </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1204" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24816141" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1210" instrument_node="">has linked</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1207"><span class="sro" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1205"></span></hl-trusted-source><span data-dcnode-id="1203" instrument_node=""> frontotemporal gamma EEG activity to conscious awareness in dreams.</span></p><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">The study found that current stimulation in the lower gamma band during REM sleep influences on-going brain activity and induces self-reflective awareness in dreams.</span></p><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Researchers concluded that higher order consciousness is related to oscillations around 25 and 40 Hz.</span></p><h3 data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">Relationships</span></h3><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Recent research has demonstrated parallels between styles of romantic attachment and general dream content.</span></p><p data-dcnode-id="1184"><span data-dcnode-id="1193" instrument_node="">Assessment results from 61 student participants in committed dating relationships of six months duration or longer revealed </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1186" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/22856620" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1192" instrument_node="">a significant association</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1189"><span class="sro" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1187"></span></hl-trusted-source><span data-dcnode-id="1185" instrument_node=""> between relationship-specific attachment security and the degree to which dreams about romantic partners followed.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">The findings illuminate our understanding of mental representations with regards to specific attachment figures.</span></p><h3 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Death in dreams</span></h3><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Researchers compared the dream content of different groups of people in a psychiatric facility. Participants in one group had been admitted after attempting to take their own lives.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Their dreams of this group were compared with those of three control groups in the facility who had experienced:</span></p><ul data-dcnode-id="1167"><li data-dcnode-id="1172"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/kc/depression-causes-symptoms-treatments-8933" title="What is depression and what can I do about it?"><span data-dcnode-id="1175" instrument_node="">depression</span></a><span data-dcnode-id="1173" instrument_node=""> and thoughts about suicide</span></li><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">depression without thinking about suicide</span></li><li data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">carrying out a violent act without suicide</span></li></ul><p data-dcnode-id="1157"><span data-dcnode-id="1166" instrument_node="">Those who had considered or attempted suicide or carried out violence had were </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1159" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmed/3948105" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1165" instrument_node="">more likely to have</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1162"><span class="sro" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1160"></span></hl-trusted-source><span data-dcnode-id="1158" instrument_node=""> dreams with content relating to death and destructive violence. One factor affecting this was the severity of an individual’s depression.</span></p><h3 data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Left and right side of the brain</span></h3><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">The right and left hemispheres of the brain seem to contribute in different ways to a dream formation.</span></p><p data-dcnode-id="1143"><span data-dcnode-id="1152" instrument_node="">Researchers of one study </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1145" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11811128" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1151" instrument_node="">concluded</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1148"><span class="sro" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1146"></span></hl-trusted-source><span data-dcnode-id="1144" instrument_node=""> that the left hemisphere seems to provide dream origin while the right hemisphere provides dream vividness, figurativeness and affective activation level.</span></p><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">A study of adolescents aged 10 to 17 years found that those who were left-handed were more likely to experience lucid dreams and to remember dreams within other dreams.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="1140" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="1139" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="1030"><span data-dcnode-id="1137" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1133"><div data-dcnode-id="1134"><a class="chartbeat-section" data-dcnode-id="1135" name="forgetting-dreams"><span data-dcnode-id="1136" instrument_node="">Forgetting dreams</span></a></div></h2><p data-dcnode-id="1128"><span data-dcnode-id="1132" instrument_node="">Studies of brain activity suggest that most people over the age of 10 years dream between </span><a class="content-link css-1pg8eb5" data-dcnode-id="1130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dreams.ucsc.edu/FAQ/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1131" instrument_node="">4 and 6 times</span></a><span data-dcnode-id="1129" instrument_node=""> each night, but some people rarely remember dreaming.</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">It is often said that 5 minutes after a dream, people have forgotten 50 percent of its content, increasing to 90 percent another 5 minutes later.</span></p><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Most dreams are entirely forgotten by the time someone wakes up, but it is not known precisely why dreams are so hard to remember.</span></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Steps that may help improve dream recall, include:</span></p><ul data-dcnode-id="1113"><li data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">waking up naturally and not with an alarm</span></li><li data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">focusing on the dream as much as possible upon waking</span></li><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">writing down as much about the dream as possible upon waking</span></li><li data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">making recording dreams a routine</span></li></ul><h3 data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Who remembers their dreams?</span></h3><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">There are factors that can potentially influence who remembers their dreams, how much of the dream remains intact, and how vivid it is.</span></p><p data-dcnode-id="1105"><strong data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Age:</span></strong><span data-dcnode-id="1106" instrument_node=""> Over time, a person is likely to experience changes in sleep timing, structure, and electroencephalographic (EEG) activity.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1104" instrument_node="">Evidence </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1097" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20525540" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1103" instrument_node="">suggests</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1100"><span class="sro" data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1098"></span></hl-trusted-source><span data-dcnode-id="1096" instrument_node=""> that dream recall progressively decreases from the beginning of adulthood, but not in older age. Dream also become less intense. This evolution occurs faster in men than women, with gender differences in the content of dreams.</span></p><p data-dcnode-id="1091"><strong data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Gender: </span></strong><span data-dcnode-id="1092" instrument_node="">A study of dreams experienced by 108 males and 110 females found no differences between the amount of aggression, friendliness, sexuality, male characters, weapons, or clothes that feature in the content.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1090" instrument_node="">However, the dreams of females </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1083" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/1778685" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1089" instrument_node="">featured a higher number</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1086"><span class="sro" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1084"></span></hl-trusted-source><span data-dcnode-id="1082" instrument_node=""> of family members, babies, children, and indoor settings than those of males.</span></p><p data-dcnode-id="1063"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Sleep disorders</span></strong><span data-dcnode-id="1078" instrument_node="">: Dream recall is heightened in patients with </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/9155.php" title="Insomnia: Everything you need to know"><span data-dcnode-id="1077" instrument_node="">insomnia</span></a><span data-dcnode-id="1075" instrument_node="">, and their dreams reflect the stress associated with their condition. The dreams of people with </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/155244.php" title="Narcolepsy: Causes, symptoms and treatments"><span data-dcnode-id="1074" instrument_node="">narcolepsy</span></a><span data-dcnode-id="1072" instrument_node=""> may a </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1065" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19147378" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1071" instrument_node="">more bizarre</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1068"><span class="sro" data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1066"></span></hl-trusted-source><span data-dcnode-id="1064" instrument_node=""> and negative tone.</span></p><h3 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Dream recall and well-being</span></h3><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">One study looked at whether dream recall and dream content would reflect the social relationships of the person who is dreaming.</span></p><p data-dcnode-id="1049"><span data-dcnode-id="1058" instrument_node="">College student volunteers </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="1051" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-1pg8eb5" data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1046/j.1365-2869.2001.0
