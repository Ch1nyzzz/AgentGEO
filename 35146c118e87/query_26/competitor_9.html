79"><span data-dcnode-id="9580" instrument_node="">83</span></sup></a><span data-dcnode-id="9577" instrument_node=""> Isolated REM sleep behaviour disorder and REM sleep behaviour disorder with mild symptoms, as prodromal forms of neurodegenerative disorders, represent a unique opportunity to develop early neuroprotective trials.</span></p><p data-dcnode-id="9533" id="para540"><span data-dcnode-id="9575" instrument_node="">Overall, 93% of patients with REM sleep behaviour disorder report enacted dreams,</span><a class="workspace-trigger" data-dcnode-id="9572" href="#bib84" name="bbib84"><sup data-dcnode-id="9573"><span data-dcnode-id="9574" instrument_node="">84</span></sup></a><span data-dcnode-id="9571" instrument_node=""> which contain more aggression and animals than do the dreams of control individuals, in sharp contrast with the placid personality of these patients during wakefulness.</span><a class="workspace-trigger" data-dcnode-id="9568" href="#bib85" name="bbib85"><sup data-dcnode-id="9569"><span data-dcnode-id="9570" instrument_node="">85</span></sup></a><span data-dcnode-id="9567" instrument_node=""> Patients with REM sleep behaviour disorder often report being attacked or chased by a person or animal (dogs, snakes, lions, bulls, and horses), arguing or falling off a cliff, or defending themselves or their loved ones during a brief, single visual scene.</span><a class="workspace-trigger" data-dcnode-id="9565" href="#bib86" name="bbib86"><span data-dcnode-id="9566" instrument_node="">86</span></a><span data-dcnode-id="9564" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9562" href="#bib87" name="bbib87"><span data-dcnode-id="9563" instrument_node="">87</span></a><span data-dcnode-id="9561" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9559" href="#bib88" name="bbib88"><span data-dcnode-id="9560" instrument_node="">88</span></a><span data-dcnode-id="9558" instrument_node=""> Non-violent elaborate behaviours, although less frequently reported, occur in patients with Parkinson's disease, narcolepsy, or isolated REM sleep behaviour disorder.</span><a class="workspace-trigger" data-dcnode-id="9556" href="#bib86" name="bbib86"><span data-dcnode-id="9557" instrument_node="">86</span></a><span data-dcnode-id="9555" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9553" href="#bib87" name="bbib87"><span data-dcnode-id="9554" instrument_node="">87</span></a><span data-dcnode-id="9552" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9550" href="#bib88" name="bbib88"><span data-dcnode-id="9551" instrument_node="">88</span></a><span data-dcnode-id="9549" instrument_node=""> Non-violent behaviours comprise actions such as sports (mostly football), eating and smoking, picking apples, dancing, singing, teaching, gesturing thumbs up, kissing, giving a lecture, selling textiles, applauding, sorting buttons, masturbating, urinating, bicycling, greeting, flying, and inspecting the army.</span><a class="workspace-trigger" data-dcnode-id="9547" href="#bib86" name="bbib86"><span data-dcnode-id="9548" instrument_node="">86</span></a><span data-dcnode-id="9546" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9544" href="#bib87" name="bbib87"><span data-dcnode-id="9545" instrument_node="">87</span></a><span data-dcnode-id="9543" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9541" href="#bib88" name="bbib88"><span data-dcnode-id="9542" instrument_node="">88</span></a><span data-dcnode-id="9540" instrument_node=""> Most behaviours are learned behaviours in accordance with the cultural and social context of the patients (</span><a class="workspace-trigger" data-dcnode-id="9538" href="#sec1" name="bsec1"><span data-dcnode-id="9539" instrument_node="">video 1, 2</span></a><span data-dcnode-id="9537" instrument_node="">). The dream–action isomorphism in REM sleep behaviour disorder has allowed several advances in dream research (</span><a class="workspace-trigger" data-dcnode-id="9535" href="#sec1" name="bsec1"><span data-dcnode-id="9536" instrument_node="">appendix pp 5–7</span></a><span data-dcnode-id="9534" instrument_node="">).</span></p></section><section data-dcnode-id="9487" id="cesec110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9530" id="cestitle120"><span data-dcnode-id="9531" instrument_node="">Parkinson's disease and dementia with Lewy bodies</span></h3><p data-dcnode-id="9494" id="para550"><span data-dcnode-id="9529" instrument_node="">Patients with Parkinson's disease have many sleep problems, including insomnia, excessive daytime sleepiness, and enacted nightmares. Although they have normal dream recall frequency and report length, their dreams are qualitatively different than those of healthy people.</span><a class="workspace-trigger" data-dcnode-id="9526" href="#bib89" name="bbib89"><sup data-dcnode-id="9527"><span data-dcnode-id="9528" instrument_node="">89</span></sup></a><span data-dcnode-id="9525" instrument_node=""> One third of patients with Parkinson's disease report vivid dreams and a high frequency of nightmares, especially when dopaminergic therapy is introduced.</span><a class="workspace-trigger" data-dcnode-id="9523" href="#bib21" name="bbib21"><span data-dcnode-id="9524" instrument_node="">21</span></a><span data-dcnode-id="9522" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9520" href="#bib89" name="bbib89"><span data-dcnode-id="9521" instrument_node="">89</span></a><span data-dcnode-id="9519" instrument_node=""> Lower emotional load and bizarreness in patients' dreams (than in controls) are associated with amygdala and mesial prefrontal cortex thickness,</span><a class="workspace-trigger" data-dcnode-id="9516" href="#bib89" name="bbib89"><sup data-dcnode-id="9517"><span data-dcnode-id="9518" instrument_node="">89</span></sup></a><span data-dcnode-id="9515" instrument_node=""> two key structures implicated in current models of dreaming and emotion regulation during sleep.</span><a class="workspace-trigger" data-dcnode-id="9512" href="#bib43" name="bbib43"><sup data-dcnode-id="9513"><span data-dcnode-id="9514" instrument_node="">43</span></sup></a><span data-dcnode-id="9511" instrument_node=""> However, the most remarkable change is the presence of REM sleep behaviour disorder in up to 60% of patients with Parkinson's disease.</span><a class="workspace-trigger" data-dcnode-id="9508" href="#bib90" name="bbib90"><sup data-dcnode-id="9509"><span data-dcnode-id="9510" instrument_node="">90</span></sup></a><span data-dcnode-id="9507" instrument_node=""> In the early stages of Parkinson's disease, REM sleep behaviour disorder is a major determinant of the later development of hallucinations, psychosis, and dementia.</span><a class="workspace-trigger" data-dcnode-id="9505" href="#bib91" name="bbib91"><span data-dcnode-id="9506" instrument_node="">91</span></a><span data-dcnode-id="9504" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9502" href="#bib92" name="bbib92"><span data-dcnode-id="9503" instrument_node="">92</span></a><span data-dcnode-id="9501" instrument_node=""> Notably, parkinsonism disappears during REM sleep behaviour disorder-associated complex behaviours (</span><a class="workspace-trigger" data-dcnode-id="9499" href="#sec1" name="bsec1"><span data-dcnode-id="9500" instrument_node="">video 3</span></a><span data-dcnode-id="9498" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="9495" href="#bib90" name="bbib90"><sup data-dcnode-id="9496"><span data-dcnode-id="9497" instrument_node="">90</span></sup></a></p><p data-dcnode-id="9488" id="para560"><span data-dcnode-id="9493" instrument_node="">Dementia with Lewy bodies is the second most common form of neurodegenerative dementia after Alzheimer's disease. These patients have numerous sleep abnormalities because cortical degeneration can challenge the recognition of sleep features. They can develop confusion and visual hallucinations in the darkness, and upon daytime and night-time awakenings, hallucinatory-like behaviours, and clear REM sleep behaviour disorder (in 50–80% of patients), although they often do not remember the dream content associated with their sleep behaviour.</span><a class="workspace-trigger" data-dcnode-id="9490" href="#bib93" name="bbib93"><sup data-dcnode-id="9491"><span data-dcnode-id="9492" instrument_node="">93</span></sup></a><span data-dcnode-id="9489" instrument_node=""> REM sleep behaviour disorder as a core symptom helps clinicians to distinguish dementia with Lewy bodies from Alzheimer's disease (in which REM sleep behaviour disorder is usually absent).</span></p></section><section data-dcnode-id="9292" id="cesec120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9485" id="cestitle130"><span data-dcnode-id="9486" instrument_node="">NREM parasomnias</span></h3><div data-dcnode-id="9293"><p data-dcnode-id="9459" id="para570"><span data-dcnode-id="9484" instrument_node="">In parallel with the reported prevalence of dreaming in REM and NREM sleep, researchers initially assumed that NREM parasomnias (also called disorders of arousal and including mostly sleepwalking and sleep terrors) are not associated with dreaming. However, recent studies indicate that 71–77% of patients with NREM parasomnias can recall at least one dreamlike mentation associated with a parasomnia episode during their lifetime (</span><a class="workspace-trigger" data-dcnode-id="9482" href="#sec1" name="bsec1"><span data-dcnode-id="9483" instrument_node="">video 4, 5</span></a><span data-dcnode-id="9481" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="9479" href="#bib87" name="bbib87"><span data-dcnode-id="9480" instrument_node="">87</span></a><span data-dcnode-id="9478" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9476" href="#bib94" name="bbib94"><span data-dcnode-id="9477" instrument_node="">94</span></a><span data-dcnode-id="9475" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9473" href="#bib95" name="bbib95"><span data-dcnode-id="9474" instrument_node="">95</span></a><span data-dcnode-id="9472" instrument_node=""> NREM parasomnia experiences are qualitatively and quantitatively different from REM sleep experiences, including dreams associated with REM sleep behaviour disorder, and the characteristics of dream experiences can help distinguish NREM parasomnia from REM sleep behaviour disorder (</span><a class="workspace-trigger" data-dcnode-id="9470" href="#tbl1" name="btbl1"><span data-dcnode-id="9471" instrument_node="">table</span></a><span data-dcnode-id="9469" instrument_node="">). Dreamlike experiences in NREM parasomnia are typically short, comprising a single visual scene, and are associated with negative emotions including apprehension, fear, or terror. The content frequently involves misfortunes and disasters with imminent death, in which the patient has to escape from a closed location (eg, a narrow room, elevator, labyrinth, grave, or moving walls, or seeing the ceiling collapse or being buried) or a danger (eg, trains, cars, fires, snakes).</span><a class="workspace-trigger" data-dcnode-id="9467" href="#bib87" name="bbib87"><span data-dcnode-id="9468" instrument_node="">87</span></a><span data-dcnode-id="9466" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9464" href="#bib94" name="bbib94"><span data-dcnode-id="9465" instrument_node="">94</span></a><span data-dcnode-id="9463" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9461" href="#bib95" name="bbib95"><span data-dcnode-id="9462" instrument_node="">95</span></a><span data-dcnode-id="9460" instrument_node=""> Clinicians should be aware that, contrary to common assumptions, reports of patients with NREM parasomnia and observations in the sleep laboratory show dream–behaviour isomorphism; in other words, dreams might also be enacted in NREM parasomnia, and not only in REM sleep behaviour disorder. Care should also be taken not to equate sleep terrors with nightmares, because patients sometimes use the terms nightmares or awake nightmares to refer to their parasomnia episodes.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="9294" id="tbl1"><span class="captions" data-dcnode-id="9451"><span data-dcnode-id="9452" id="cecap30"><p data-dcnode-id="9453" id="spara50"><span class="label" data-dcnode-id="9457"><span data-dcnode-id="9458" instrument_node="">Table</span></span><span data-dcnode-id="9456" instrument_node="">. </span><span data-dcnode-id="9454" instrument_node="">Key differences between the two main NREM and REM parasomnias</span></p></span></span><div class="groups" data-dcnode-id="9298"><table data-dcnode-id="9299"><thead data-dcnode-id="9440"><tr class="valign-top rowsep-1" data-dcnode-id="9441"><td data-dcnode-id="9448" scope="col"><span class="screen-reader-only" data-dcnode-id="9449"><span data-dcnode-id="9450" instrument_node="">Empty Cell</span></span></td><th class="align-left" data-dcnode-id="9445" scope="col"><strong data-dcnode-id="9446"><span data-dcnode-id="9447" instrument_node="">Sleepwalking and sleep terrors</span></strong></th><th class="align-left" data-dcnode-id="9442" scope="col"><strong data-dcnode-id="9443"><span data-dcnode-id="9444" instrument_node="">REM sleep behaviour disorder</span></strong></th></tr></thead><tbody data-dcnode-id="9300"><tr class="valign-top" data-dcnode-id="9436"><td class="align-left" colspan="3" data-dcnode-id="9437"><strong data-dcnode-id="9438"><span data-dcnode-id="9439" instrument_node="">General and electrophysiological characteristics</span></strong></td></tr><tr class="valign-top" data-dcnode-id="9429"><td class="align-left" data-dcnode-id="9434"><span data-dcnode-id="9435" instrument_node="">Typical age of onset</span></td><td class="align-left" data-dcnode-id="9432"><span data-dcnode-id="9433" instrument_node="">Childhood or young adulthood</span></td><td class="align-left" data-dcnode-id="9430"><span data-dcnode-id="9431" instrument_node="">Middle-age to old age</span></td></tr><tr class="valign-top" data-dcnode-id="9422"><td class="align-left" data-dcnode-id="9427"><span data-dcnode-id="9428" instrument_node="">Sleep stage (occurrence)</span></td><td class="align-left" data-dcnode-id="9425"><span data-dcnode-id="9426" instrument_node="">NREM sleep (mostly N3)</span></td><td class="align-left" data-dcnode-id="9423"><span data-dcnode-id="9424" instrument_node="">REM sleep</span></td></tr><tr class="valign-top" data-dcnode-id="9415"><td class="align-left" data-dcnode-id="9420"><span data-dcnode-id="9421" instrument_node="">Time of night (occurrence)</span></td><td class="align-left" data-dcnode-id="9418"><span data-dcnode-id="9419" instrument_node="">Predominantly first third of night</span></td><td class="align-left" data-dcnode-id="9416"><span data-dcnode-id="9417" instrument_node="">Predominantly second half of night</span></td></tr><tr class="valign-top" data-dcnode-id="9408"><td class="align-left" data-dcnode-id="9413"><span data-dcnode-id="9414" instrument_node="">Electrophysiological hallmarks of episodes</span></td><td class="align-left" data-dcnode-id="9411"><span data-dcnode-id="9412" instrument_node="">Hypersynchronous delta activity; simultaneous presence of sleep-like and wake-like EEG activity in different brain areas; adrenergic activity</span></td><td class="align-left" data-dcnode-id="9409"><span data-dcnode-id="9410" instrument_node="">Increased phasic muscle activity; partial or complete loss of muscle atonia</span></td></tr><tr class="valign-top" data-dcnode-id="9404"><td class="align-left" colspan="3" data-dcnode-id="9405"><strong data-dcnode-id="9406"><span data-dcnode-id="9407" instrument_node="">Behavioural characteristics</span></strong></td></tr><tr class="valign-top" data-dcnode-id="9397"><td class="align-left" data-dcnode-id="9402"><span data-dcnode-id="9403" instrument_node="">Eyes</span></td><td class="align-left" data-dcnode-id="9400"><span data-dcnode-id="9401" instrument_node="">Mostly open</span></td><td class="align-left" data-dcnode-id="9398"><span data-dcnode-id="9399" instrument_node="">Mostly closed</span></td></tr><tr class="valign-top" data-dcnode-id="9390"><td class="align-left" data-dcnode-id="9395"><span data-dcnode-id="9396" instrument_node="">Ambulation</span></td><td class="align-left" data-dcnode-id="9393"><span data-dcnode-id="9394" instrument_node="">Frequent</span></td><td class="align-left" data-dcnode-id="9391"><span data-dcnode-id="9392" instrument_node="">Exceptional</span></td></tr><tr class="valign-top" data-dcnode-id="9383"><td class="align-left" data-dcnode-id="9388"><span data-dcnode-id="9389" instrument_node="">Interactions with real environment</span></td><td class="align-left" data-dcnode-id="9386"><span data-dcnode-id="9387" instrument_node="">Frequent (eg, visual exploration, manipulation of objects)</span></td><td class="align-left" data-dcnode-id="9384"><span data-dcnode-id="9385" instrument_node="">Less frequent than in sleep walking or night terrors and during wakefulness</span></td></tr><tr class="valign-bottom" data-dcnode-id="9369"><td class="align-left" data-dcnode-id="9381"><span data-dcnode-id="9382" instrument_node="">Movements</span></td><td class="align-left" data-dcnode-id="9379"><span data-dcnode-id="9380" instrument_node="">Similar to waking movements; exceptional motor strength in some patients</span></td><td class="align-left" data-dcnode-id="9370"><span data-dcnode-id="9378" instrument_node="">Jerky;</span><a class="workspace-trigger" data-dcnode-id="9375" href="#bib90" name="bbib90"><sup data-dcnode-id="9376"><span data-dcnode-id="9377" instrument_node="">90</span></sup></a><span data-dcnode-id="9374" instrument_node=""> no tremor or bradykinesia in patients with Parkinson's disease</span><a class="workspace-trigger" data-dcnode-id="9371" href="#bib90" name="bbib90"><sup data-dcnode-id="9372"><span data-dcnode-id="9373" instrument_node="">90</span></sup></a></td></tr><tr class="valign-bottom" data-dcnode-id="9359"><td class="align-left" data-dcnode-id="9364"><span data-dcnode-id="9368" instrument_node="">Verbalisations</span><a class="workspace-trigger" data-dcnode-id="9365" href="#bib57" name="bbib57"><sup data-dcnode-id="9366"><span data-dcnode-id="9367" instrument_node="">57</span></sup></a></td><td class="align-left" data-dcnode-id="9362"><span data-dcnode-id="9363" instrument_node="">More whispering and perseverations; more often swearing; more often interrogative tone than in REM sleep behaviour disorder</span></td><td class="align-left" data-dcnode-id="9360"><span data-dcnode-id="9361" instrument_node="">More mumbles and silent speech; more often insults; more often imperative tone then in sleepwalking or night terrors</span></td></tr><tr class="valign-bottom" data-dcnode-id="9349"><td class="align-left" data-dcnode-id="9354"><span data-dcnode-id="9358" instrument_node="">Smiling or laughing</span><a class="workspace-trigger" data-dcnode-id="9355" href="#bib96" name="bbib96"><sup data-dcnode-id="9356"><span data-dcnode-id="9357" instrument_node="">96</span></sup></a></td><td class="align-left" data-dcnode-id="9352"><span data-dcnode-id="9353" instrument_node="">Rare (2 [9%] of 22 participants)</span></td><td class="align-left" data-dcnode-id="9350"><span data-dcnode-id="9351" instrument_node="">Frequent (20 [38%] of 52 participants)</span></td></tr><tr class="valign-top" data-dcnode-id="9345"><td class="align-left" colspan="3" data-dcnode-id="9346"><strong data-dcnode-id="9347"><span data-dcnode-id="9348" instrument_node="">Subjective experiences and associated dreams</span></strong></td></tr><tr class="valign-bottom" data-dcnode-id="9325"><td class="align-left" data-dcnode-id="9340"><span data-dcnode-id="9344" instrument_node="">Content</span><a class="workspace-trigger" data-dcnode-id="9341" href="#bib86" name="bbib86"><sup data-dcnode-id="9342"><span data-dcnode-id="9343" instrument_node="">86</span></sup></a></td><td class="align-left" data-dcnode-id="9331"><span data-dcnode-id="9339" instrument_node="">Usually short visual scenes involving threat, misfortune, or aggression;</span><a class="workspace-trigger" data-dcnode-id="9336" href="#bib86" name="bbib86"><sup data-dcnode-id="9337"><span data-dcnode-id="9338" instrument_node="">86</span></sup></a><span data-dcnode-id="9335" instrument_node=""> tend to flee from aggression and danger</span><a class="workspace-trigger" data-dcnode-id="9332" href="#bib86" name="bbib86"><sup data-dcnode-id="9333"><span data-dcnode-id="9334" instrument_node="">86</span></sup></a></td><td class="align-left" data-dcnode-id="9326"><span data-dcnode-id="9330" instrument_node="">More complex dream scenarios, often involving threat or aggression; upon aggression, tend to fight back</span><a class="workspace-trigger" data-dcnode-id="9327" href="#bib86" name="bbib86"><sup data-dcnode-id="9328"><span data-dcnode-id="9329" instrument_node="">86</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="9318"><td class="align-left" data-dcnode-id="9323"><span data-dcnode-id="9324" instrument_node="">Emotions</span></td><td class="align-left" data-dcnode-id="9321"><span data-dcnode-id="9322" instrument_node="">Frequently fear and apprehension</span></td><td class="align-left" data-dcnode-id="9319"><span data-dcnode-id="9320" instrument_node="">Variable</span></td></tr><tr class="valign-bottom" data-dcnode-id="9308"><td class="align-left" data-dcnode-id="9313"><span data-dcnode-id="9317" instrument_node="">Setting of dream</span><a class="workspace-trigger" data-dcnode-id="9314" href="#bib86" name="bbib86"><sup data-dcnode-id="9315"><span data-dcnode-id="9316" instrument_node="">86</span></sup></a></td><td class="align-left" data-dcnode-id="9311"><span data-dcnode-id="9312" instrument_node="">Often corresponds to the bedroom setting</span></td><td class="align-left" data-dcnode-id="9309"><span data-dcnode-id="9310" instrument_node="">Most often in a place different from the bedroom</span></td></tr><tr class="valign-top" data-dcnode-id="9301"><td class="align-left" data-dcnode-id="9306"><span data-dcnode-id="9307" instrument_node="">Sensory experiences</span></td><td class="align-left" data-dcnode-id="9304"><span data-dcnode-id="9305" instrument_node="">Sometimes no reaction to pain; hallucinatory pain possible</span></td><td class="align-left" data-dcnode-id="9302"><span data-dcnode-id="9303" instrument_node="">Can incorporate environmental sensations into the dream scenario</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="9295"></p><p data-dcnode-id="9296" id="spara60"><span data-dcnode-id="9297" instrument_node="">NREM=non-rapid eye movement. REM=rapid eye movement. N3=stage 3 of NREM sleep.</span></p><p></p></div></div></section><section data-dcnode-id="9232" id="cesec130"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9290" id="cestitle140"><span data-dcnode-id="9291" instrument_node="">Narcolepsy</span></h3><p data-dcnode-id="9265" id="para580"><span data-dcnode-id="9289" instrument_node="">Narcolepsy is caused by hypocretin deficiency, which leads to a destabilisation of sleep–wake cycles, excessive daytime sleepiness (culminating in sleep attacks), cataplexy, and sleep-onset REM periods.</span><a class="workspace-trigger" data-dcnode-id="9286" href="#bib5" name="bbib5"><sup data-dcnode-id="9287"><span data-dcnode-id="9288" instrument_node="">5</span></sup></a><span data-dcnode-id="9285" instrument_node=""> Patients with narcolepsy report higher dream recall than healthy controls,</span><a class="workspace-trigger" data-dcnode-id="9283" href="#bib47" name="bbib47"><span data-dcnode-id="9284" instrument_node="">47</span></a><span data-dcnode-id="9282" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9280" href="#bib97" name="bbib97"><span data-dcnode-id="9281" instrument_node="">97</span></a><span data-dcnode-id="9279" instrument_node=""> although in REM awakenings in a sleep laboratory, their dream recall frequency is similar to that of controls.</span><a class="workspace-trigger" data-dcnode-id="9276" href="#bib98" name="bbib98"><sup data-dcnode-id="9277"><span data-dcnode-id="9278" instrument_node="">98</span></sup></a><span data-dcnode-id="9275" instrument_node=""> Yet, the dreams of narcolepsy patients have been reported to be more vivid, clear, and bright, and to contain more emotions overall, including more negative and intense emotions than those of healthy individuals.</span><a class="workspace-trigger" data-dcnode-id="9272" href="#bib99" name="bbib99"><sup data-dcnode-id="9273"><span data-dcnode-id="9274" instrument_node="">99</span></sup></a><span data-dcnode-id="9271" instrument_node=""> Nightmares and recurrent dreams are more prevalent in narcolepsy patients than in healthy individuals, with 33–70% of patients reporting frequent nightmares.</span><a class="workspace-trigger" data-dcnode-id="9269" href="#bib47" name="bbib47"><span data-dcnode-id="9270" instrument_node="">47</span></a><span data-dcnode-id="9268" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9266" href="#bib97" name="bbib97"><span data-dcnode-id="9267" instrument_node="">97</span></a></p><p data-dcnode-id="9243" id="para590"><span data-dcnode-id="9264" instrument_node="">Sleep paralysis is significantly more common in patients with narcolepsy (59%) than in healthy controls (15%).</span><a class="workspace-trigger" data-dcnode-id="9261" href="#bib47" name="bbib47"><sup data-dcnode-id="9262"><span data-dcnode-id="9263" instrument_node="">47</span></sup></a><span data-dcnode-id="9260" instrument_node=""> Hypnagogic (51%) and hypnopompic hallucinations (28%), often related to sleep paralysis, are also often experienced by these patients.</span><a class="workspace-trigger" data-dcnode-id="9257" href="#bib47" name="bbib47"><sup data-dcnode-id="9258"><span data-dcnode-id="9259" instrument_node="">47</span></sup></a><span data-dcnode-id="9256" instrument_node=""> The hallucinations can cause dream–reality confusion, being so realistic that the patient acts accordingly, such as calling the police about an intruder.</span><a class="workspace-trigger" data-dcnode-id="9253" href="#bib100" name="bbib100"><sup data-dcnode-id="9254"><span data-dcnode-id="9255" instrument_node="">100</span></sup></a><span data-dcnode-id="9252" instrument_node=""> In recent studies, 77–78% of patients with narcolepsy have been found to report lucid dreaming, with an average of seven lucid dreams per month (</span><em data-dcnode-id="9250"><span data-dcnode-id="9251" instrument_node="">vs</span></em><span data-dcnode-id="9249" instrument_node=""> 0·3–0·7 in controls).</span><a class="workspace-trigger" data-dcnode-id="9247" href="#bib47" name="bbib47"><span data-dcnode-id="9248" instrument_node="">47</span></a><span data-dcnode-id="9246" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9244" href="#bib97" name="bbib97"><span data-dcnode-id="9245" instrument_node="">97</span></a></p><p data-dcnode-id="9233" id="para600"><span data-dcnode-id="9242" instrument_node="">The ability of patients with narcolepsy to dream lucidly is possibly linked to the frequent entry into REM sleep directly from wakefulness, which might allow a higher level of consciousness to be maintained than when REM sleep occurs after a long period of NREM sleep. Patients mostly use their lucid dreaming ability to take control over the dream scenario in nightmares. Patients with narcolepsy would be excellent participants in future studies on lucid dreaming because they are naturally frequent lucid dreamers and can rapidly enter REM sleep during several consecutive daytime naps, even in noisy environments (eg, in an MRI scanner).</span><a class="workspace-trigger" data-dcnode-id="9239" href="#bib49" name="bbib49"><sup data-dcnode-id="9240"><span data-dcnode-id="9241" instrument_node="">49</span></sup></a><span data-dcnode-id="9238" instrument_node=""> Lucid dreaming is correlated with creativity. Of interest, patients with narcolepsy are more creative than controls,</span><a class="workspace-trigger" data-dcnode-id="9235" href="#bib101" name="bbib101"><sup data-dcnode-id="9236"><span data-dcnode-id="9237" instrument_node="">101</span></sup></a><span data-dcnode-id="9234" instrument_node=""> and they might incubate original ideas during sleep and dreams.</span></p></section></section><section data-dcnode-id="9221" id="cesec140"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9229" id="cestitle150"><span data-dcnode-id="9230" instrument_node="">Conclusions and future directions</span></h2><p data-dcnode-id="9224" id="para610"><span data-dcnode-id="9228" instrument_node="">Recent advances in neuroimaging techniques have allowed researchers to relate various phenomenological dream features to well known patterns of brain activation, to identify EEG markers of dreaming and dream recall, and even to predict dreaming and dream content in real time. Importantly, these studies convincingly show that dream reports can be trusted as a research tool, and that they do not represent confabulations or unreliable indications, as has often been suggested. These studies have also shown that some brain areas are consistently and locally activated during dreams, irrespective of sleep stage. Research on dreams has been enriched by studies on lucid dreaming and neurological disorders with more fluid boundaries between wakefulness and sleep, which enable access to the dreaming process. Parasomnias associated with dream-enacting (comprising not only REM sleep behaviour disorder, but also sleepwalking, sleep terrors, and sleep talking) and lucid dreaming constitute models to access the motor, cognitive, sensory, and emotional processes during dreaming. In this respect, data from such patients are valuable for dream science, and dream science is valuable for these patients. Similarities and differences between brain areas activated during wakefulness and sleep when doing the same action (ie, executed </span><em data-dcnode-id="9226"><span data-dcnode-id="9227" instrument_node="">vs</span></em><span data-dcnode-id="9225" instrument_node=""> dreamed) suggest that the same neural networks underlie experiences and behaviours in both states of consciousness (except possibly for the basal ganglia during dreamed movements, as found in patients with Parkinson's disease with REM sleep behaviour disorder).</span></p><p data-dcnode-id="9222" id="para620"><span data-dcnode-id="9223" instrument_node="">In the future, these models should be developed for dream research purposes, including two-way communication between the sleeper and the experimenter during lucid REM sleep, targeted memory reactivation during sleep, and new techniques, such as the development of classifiers on EEG and electrooculography signals, functional brain imaging, and high-density EEG and intracranial recordings during sleep. Knowing more precisely how we dream should bring us progressively closer to finding out why we sleep and why we dream, and to improving treatments of disturbed dreaming. Additionally, understanding how the brain generates perceptions and beliefs by itself, without the influence of external inputs during sleep, could offer insight into the hallucinations and delusions frequently encountered in neuropsychiatric disorders.</span></p></section><section data-dcnode-id="9212" id="cesec150"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9219" id="cestitle160"><span data-dcnode-id="9220" instrument_node="">Search strategy and selection criteria</span></h2><p data-dcnode-id="9213" id="para630"><span class="display" data-dcnode-id="9214"></span></p><div aria-label="" class="article-textbox" data-dcnode-id="9215" id="cetextbox10" role="region"><div data-dcnode-id="9216"><p data-dcnode-id="9217" id="para640"><span data-dcnode-id="9218" instrument_node="">We searched references in PubMed using the terms “dream”, “dreaming”, “nightmare”, “lucid dreaming”, and “sleep mentation”, crossed with “Parkinson's disease”, “dementia with Lewy bodies”, “Alzheimer disease”, “narcolepsy”, “REM sleep behaviour disorder”, “sleepwalking”, “night terror”, “sleep paralysis”, “sleep talking”, “paraplegia”, “medication-induced”, “drug-induced”, “phantom limb”, “insomnia”, “sleep apnea”, and “brain lesion”. We examined articles published between Jan 1, 2005, and Jan 1, 2020, written in French, German, and English. We also searched the reference lists of retrieved articles. We then selected the most relevant references, paying particular attention to studies within the past 5 years (although we retained some older studies for their importance), and studies with large samples, control groups, and reduced bias.</span></p></div></div><p></p></section><p data-dcnode-id="9209" id="para650"><strong data-dcnode-id="9210"><span data-dcnode-id="9211" instrument_node="">Contributors</span></strong></p><p data-dcnode-id="9189" id="para660"><span data-dcnode-id="9208" instrument_node="">FS created </span><a class="workspace-trigger" data-dcnode-id="9206" href="#fig1" name="bfig1"><span data-dcnode-id="9207" instrument_node="">figure 1</span></a><span data-dcnode-id="9205" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9203" href="#box2" name="bbox2"><span data-dcnode-id="9204" instrument_node="">panel 2</span></a><span data-dcnode-id="9202" instrument_node="">, and part of the table, and contributed part of the abstract, introduction, sections on the phenomenology and neurobiology of dreaming, and part of the section on parasomnia. KV created </span><a class="workspace-trigger" data-dcnode-id="9200" href="#box1" name="bbox1"><span data-dcnode-id="9201" instrument_node="">panel 1</span></a><span data-dcnode-id="9199" instrument_node="">, and contributed the sections on the definition of dreaming, factors that influence dream recall and content, and the functions of dreaming, and part of the sections on lucid dreaming and narcolepsy. IA contributed to sections on lucid dreaming, sleep talking, neurological disorders, created the initial synopsis for the manuscript, </span><a class="workspace-trigger" data-dcnode-id="9197" href="#box3" name="bbox3"><span data-dcnode-id="9198" instrument_node="">panel 3</span></a><span data-dcnode-id="9196" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9194" href="#fig2" name="bfig2"><span data-dcnode-id="9195" instrument_node="">figure 2</span></a><span data-dcnode-id="9193" instrument_node="">, and part of the table, and provided the </span><a class="workspace-trigger" data-dcnode-id="9191" href="#sec1" name="bsec1"><span data-dcnode-id="9192" instrument_node="">videos</span></a><span data-dcnode-id="9190" instrument_node="">.</span></p><p data-dcnode-id="9186" id="para670"><strong data-dcnode-id="9187"><span data-dcnode-id="9188" instrument_node="">Declaration of interests</span></strong></p><p data-dcnode-id="9184" id="para680"><span data-dcnode-id="9185" instrument_node="">IA has been a consultant for Roche in 2019 and Novartis in 2018, and an invited speaker for Union Chimique Belge Pharma in 2018, outside the submitted work. The other two authors declare no competing interests.</span></p></div><p data-dcnode-id="9180" id="para690"><strong data-dcnode-id="9181"><span data-dcnode-id="9182" instrument_node="">Acknowledgments</span></strong></p><p data-dcnode-id="9178" id="para700"><span data-dcnode-id="9179" instrument_node="">All patients gave their consent for their videos to be displayed in a medical journal.</span></p><div class="Appendices" data-dcnode-id="8525"><section data-dcnode-id="8526" id="sec1"> the%2520treatment%2520of%2520PTSD-associated%2520nightmares%253A%2520a%2520preliminary%2520randomized%252C%2520double-blind%252C%2520placebo-controlled%2520cross-over%2520design%2520study%26publication_year%3D2015%26author%3DR%2520Jetly%26author%3DA%2520Heber%26author%3DG%2520Fraser%26author%3DD%2520Boisvert" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1784" instrument_node="">Google Scholar</span></a></div></dd></dl><dl class="references" data-dcnode-id="1726"><dt class="label" data-dcnode-id="1777"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="1778" href="#bbib27" id="ref-id-bib27"><span data-dcnode-id="1779" instrument_node="">27</span></a></dt><dd class="reference" data-dcnode-id="1727" id="sbref270"><div class="contribution" data-dcnode-id="1752"><span data-dcnode-id="1776" instrument_node="">S</span><span data-dcnode-id="1774" instrument_node=""> </span><span data-dcnode-id="1772" instrument_node="">Matsunaga</span><span data-dcnode-id="1770" instrument_node="">, </span><span data-dcnode-id="1768" instrument_node="">H</span><span data-dcnode-id="1766" instrument_node=""> </span><span data-dcnode-id="1764" instrument_node="">Fujishiro</span><span data-dcnode-id="1762" instrument_node="">, </span><span data-dcnode-id="1760" instrument_node="">H</span><span data-dcnode-id="1758" instrument_node=""> </span><span data-dcnode-id="1756" instrument_node="">Takechi</span><div data-dcnode-id="1753" id="ref-id-sbref270"><strong class="title" data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Efficacy and safety of cholinesterase inhibitors for mild cognitive impairment: a systematic review and meta-analysis</span></strong></div></div><div class="host" data-dcnode-id="1732"><span data-dcnode-id="1751" instrument_node="">J Alzheimers Dis</span><span data-dcnode-id="1749" instrument_node="">, </span><span data-dcnode-id="1747" instrument_node="">1</span><span data-dcnode-id="1745" instrument_node=""> (</span><span data-dcnode-id="1743" instrument_node="">2019</span><span data-dcnode-id="1741" instrument_node="">)</span><span data-dcnode-id="1739" instrument_node="">, pp. </span><span data-dcnode-id="1737" instrument_node="">513</span><span data-dcnode-id="1735" instrument_node="">-</span><span data-dcnode-id="1733" instrument_node="">523</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="1728"><span data-dcnode-id="1731" instrument_node=""></span><a aria-describedby="ref-id-sbref270" class="link" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DEfficacy%2520and%2520safety%2520of%2520cholinesterase%2520inhibitors%2520for%2520mild%2520cognitive%2520impairment%253A%2520a%2520systematic%2520review%2520and%2520meta-analysis%26publication_year%3D2019%26author%3DS%2520Matsunaga%26author%3DH%2520Fujishiro%26author%3DH%2520Takechi" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1730" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="1599" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="1600"><div class="PageDivider" data-dcnode-id="1723"></div><header data-dcnode-id="1720" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Cited by (18)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="1601"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="1602"><ul data-dcnode-id="1608"><li class="ListArticleItem" data-dcnode-id="1694"><div class="sub-heading" data-dcnode-id="1714"><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1389945721005773" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="1718" id="citing-articles-article0-title"><span data-dcnode-id="1719" instrument_node="">Movements and behaviors during spontaneous arousals in healthy young adults: an intermediary stage between wakefulness and sleep?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">2022, Sleep Medicine</span></div></div><div class="buttons" data-dcnode-id="1708"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="1709" type="button"><span class="button-link-text" data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="1710" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="1711"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="1695"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="1696" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="1697"><p data-dcnode-id="1706" id="abspara0010"><span data-dcnode-id="1707" instrument_node="">Arousals are common, sudden and transient elevations of the vigilance level during normal sleep, but arousal-associated behaviors have not yet been studied.</span></p><p data-dcnode-id="1704" id="abspara0015"><span data-dcnode-id="1705" instrument_node="">We aimed to describe the duration as well as motor and autonomic patterns associated with arousals across sleep stages in normal subjects.</span></p><p data-dcnode-id="1702" id="abspara0020"><span data-dcnode-id="1703" instrument_node="">The spontaneous arousals of 25 healthy young adults were randomly analyzed on polysomnography with body- and face-oriented video cameras. The duration of the heart rate response as well as the frequency, amplitude, speed, body segment and semiology of associated movements were measured.</span></p><p data-dcnode-id="1700" id="abspara0025"><span data-dcnode-id="1701" instrument_node="">Among 624 arousals (258 in N2, 140 in N3 and 226 in REM sleep), REM sleep arousals had the shortest duration, and N3 arousals were associated with greater heart rate acceleration. Movements and behaviors (mostly involving the head and neck, then the upper limbs, with rare eyes opening and no turning in bed) were frequent during arousals (69.4% during N2 sleep, 89.3% during N3 and 93.8% during REM sleep). Arousals more frequently included ample, prolonged and whole-body movements during N3 sleep and fast movements and facial expressions during REM sleep. During N2 arousals, chewing was the most prevalent behavior. Some movements resembled orientation and comfort behaviors (flexing/rotating the neck and trunk, scratching, pulling the sheets, rubbing the nose, yawning, smiling, frowning and speaking), whereas others resembled sleep-associated automatisms (swallowing, chewing).</span></p><p data-dcnode-id="1698" id="abspara0030"><span data-dcnode-id="1699" instrument_node="">In contrast with previous assumptions, most arousals are associated with movements. The type of movements suggests that arousal is an intermediary state between wakefulness and sleep.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="1675"><div class="sub-heading" data-dcnode-id="1688"><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960982221012811" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="1692" id="citing-articles-article1-title"><span data-dcnode-id="1693" instrument_node="">Noradrenergic circuit control of non-REM sleep substates</span></h3></a><div class="article-source ellipsis" data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">2021, Current Biology</span></div></div><div class="buttons" data-dcnode-id="1682"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="1683" type="button"><span class="button-link-text" data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="1684" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="1685"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="1676"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="1677" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="1678"><p data-dcnode-id="1680" id="abspara0010"><span data-dcnode-id="1681" instrument_node="">To understand what makes sleep vulnerable in disease, it is useful to look at how wake-promoting mechanisms affect healthy sleep. Wake-promoting neuronal activity is inhibited during non-rapid-eye-movement sleep (NREMS). However, sensory vigilance persists in NREMS in animals and humans, suggesting that wake promotion could remain functional. Here, we demonstrate that consolidated mouse NREMS is a brain state with recurrent fluctuations of the wake-promoting neurotransmitter noradrenaline on the ∼50-s timescale in the thalamus. These fluctuations occurred around mean noradrenaline levels greater than the ones of quiet wakefulness, while noradrenaline (NA) levels declined steeply in REMS. They coincided with a clustering of sleep spindle rhythms in the forebrain and with heart-rate variations, both of which are correlates of sensory arousability. We addressed the origins of these fluctuations by using closed-loop optogenetic locus coeruleus (LC) activation or inhibition timed to moments of low and high spindle activity during NREMS. We could suppress, lock, or entrain sleep-spindle clustering and heart-rate variations, suggesting that both fore- and hindbrain-projecting LC neurons show coordinated infraslow activity variations in natural NREMS. Noradrenergic modulation of thalamic, but not cortical, circuits was required for sleep-spindle clustering and involved NA release into primary sensory and reticular thalamic nuclei that activated both α1- and β-adrenergic receptors to cause slowly decaying membrane depolarizations. Noradrenergic signaling by LC constitutes a vigilance-promoting mechanism that renders mammalian NREMS vulnerable to disruption on the close-to-minute timescale through sustaining thalamocortical and autonomic sensory arousability.</span></p><p data-dcnode-id="1679" id="abspara0130a"></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="1649"><div class="sub-heading" data-dcnode-id="1669"><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S138994572100397X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="1673" id="citing-articles-article2-title"><span data-dcnode-id="1674" instrument_node="">From burlesque to horror: a century of sleepwalking on the silver screen</span></h3></a><div class="article-source ellipsis" data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">2021, Sleep Medicine</span></div></div><div class="buttons" data-dcnode-id="1663"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="1664" type="button"><span class="button-link-text" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="1665" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="1666"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="1650"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="1651" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="1652"><p data-dcnode-id="1661" id="abspara0010"><span data-dcnode-id="1662" instrument_node="">Long before being described as a disorder, sleepwalking was considered as a mysterious phenomenon inspiring artwork. From the early beginning of cinema, sleepwalkers were shown to populations, playing a crucial role in storytelling and collective knowledge.</span></p><p data-dcnode-id="1659" id="abspara0015"><span data-dcnode-id="1660" instrument_node="">We characterized how sleepwalking has been portrayed in a large number of movies from the origins of cinema to recent years.</span></p><p data-dcnode-id="1657" id="abspara0020"><span data-dcnode-id="1658" instrument_node="">Movies containing the words “sleepwalking” or “somnambulism” were searched for in International Movie Databases. Types of movies, sleepwalking characters, postures and behaviors during episodes, triggers, and suggested treatments were collected.</span></p><p data-dcnode-id="1655" id="abspara0025"><span data-dcnode-id="1656" instrument_node="">Production of 87 movies and 22 cartoons portraying sleepwalkers was clustered around two peaks, in the 1910s and 2010s. Comedies predominated before 1960, and thriller/horror movies as a dominant genre after 1960. In contrast with real-life sleepwalking epidemiology, sleepwalkers are more often portrayed as women than men (and often wearing a transparent white nightgown), as adults more than children on-screen, and 23% suffered psychiatric comorbidities. The unrealistic posture of outstretched arms and eyes closed was found in 20% of movies and 79% of cartoons. Night terrors, sexsomnias (kissing, having sex, initiated pregnancy), sleep-related eating and sleep driving were also featured. Homicides and falls while sleepwalking were recurrent fear-inducing topics. The first sleep EEG was featured in a sleepwalking movie in 1985, and a sleep specialist gave his first advice in 1997.</span></p><p data-dcnode-id="1653" id="abspara0030"><span data-dcnode-id="1654" instrument_node="">The representation of sleepwalking on the screen seems to have evolved from popular, unrealistic stereotypes of somnambulism towards a medical condition, paralleling the development of sleep medicine.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="1631"><div class="sub-heading" data-dcnode-id="1643"><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0149763420305753" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="1647" id="citing-articles-article3-title"><span data-dcnode-id="1648" instrument_node="">Apical drive—A cellular mechanism of dreaming?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">2020, Neuroscience and Biobehavioral Reviews</span></div></div><div class="buttons" data-dcnode-id="1637"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="1638" type="button"><span class="button-link-text" data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="1639" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="1640"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="1632"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="1633" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="1634"><p data-dcnode-id="1635" id="spar0050"><span data-dcnode-id="1636" instrument_node="">Dreams are internally generated experiences that occur independently of current sensory input. Here we argue, based on cortical anatomy and function, that dream experiences are tightly related to the workings of a specific part of cortical pyramidal neurons, the apical integration zone (AIZ). The AIZ receives and processes contextual information from diverse sources and could constitute a major switch point for transitioning from externally to internally generated experiences such as dreams. We propose that during dreams the output of certain pyramidal neurons is mainly driven by input into the AIZ. We call this mode of functioning “apical drive”. Our hypothesis is based on the evidence that the cholinergic and adrenergic arousal systems, which show different dynamics between waking, slow wave sleep, and rapid eye movement sleep, have specific effects on the AIZ. We suggest that apical drive may also contribute to waking experiences, such as mental imagery. Future studies, investigating the different modes of apical function and their regulation during sleep and wakefulness are likely to be richly rewarded.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="1620"><div class="sub-heading" data-dcnode-id="1625"><a data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S147444222030315X" tar
