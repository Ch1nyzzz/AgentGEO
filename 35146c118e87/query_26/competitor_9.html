</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ceab10&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Summary</h2><div id=&quot;ceabs10&quot;><p id=&quot;spara100&quot;>Dreams are experiences that occur during sleep, while we are disconnected from the environment. Thanks to recent progress in neuroimaging techniques, it is now becoming possible to relate dream features to specific patterns of brain activity. Some conditions occurring in patients with neurological disorders, such as lucid dreams and parasomnias, not only have diagnostic value, but also offer a window into the dream process. They show that dreaming is reflected in physiological signals, behaviours, and brain activity patterns, and that the body can enact dream content. Yet, the dream body can also be distinct from the real body; in their dreams, patients with congenital paraplegia can walk, those with sleep apnoea rarely suffocate, and phantom limb pain can disappear. These conditions provide valuable models for future studies investigating the mechanisms that underlie oneiric experiences.</p></div></div></div>" data-dcnode-id="11007" lang="en" name="citation_abstract"><span data-dcnode-id="11006" instrument_node="">

237 9.816 7.498 9.788 3.82-.306 2.046-6.66-1.097-8.925-4.164-4.087-5.534-2.39-8.772-1.682-8.732.917.047 1.074 1.307.67 2.442-.173-1.406-.58-2.44-1.224-2.415-1.835.067-1.905 4.46 1.37 9.065z" data-dcnode-id="10339" fill="#f91d0a"></path></svg><span class="anchor-text" data-dcnode-id="10336"><span data-dcnode-id="10337" instrument_node="">Download PDF</span></span></a></section></div></div><div class="PageDivider border-black-mobile" data-dcnode-id="10331"></div><div class="Abstracts u-font-serif" data-dcnode-id="10324" id="abstracts"><div class="abstract author" data-dcnode-id="10325" id="ceab10"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10329"><span data-dcnode-id="10330" instrument_node="">Summary</span></h2><div data-dcnode-id="10326" id="ceabs10"><p data-dcnode-id="10327" id="spara100"><span data-dcnode-id="10328" instrument_node="">Dreams are experiences that occur during sleep, while we are disconnected from the environment. Thanks to recent progress in neuroimaging techniques, it is now becoming possible to relate dream features to specific patterns of brain activity. Some conditions occurring in patients with neurological disorders, such as lucid dreams and parasomnias, not only have diagnostic value, but also offer a window into the dream process. They show that dreaming is reflected in physiological signals, behaviours, and brain activity patterns, and that the body can enact dream content. Yet, the dream body can also be distinct from the real body; in their dreams, patients with congenital paraplegia can walk, those with sleep apnoea rarely suffocate, and phantom limb pain can disappear. These conditions provide valuable models for future studies investigating the mechanisms that underlie oneiric experiences.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="10301" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="10313"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1474442220302738"><svg class="icon icon-navigate-left" data-dcnode-id="10322" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="10323"></path></svg><span class="button-alternative-text" data-dcnode-id="10315"><strong data-dcnode-id="10320"><span data-dcnode-id="10321" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="10318"><span data-dcnode-id="10319" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10316"><span data-dcnode-id="10317" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="10302"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1474442220302775"><span class="button-alternative-text" data-dcnode-id="10306"><strong data-dcnode-id="10311"><span data-dcnode-id="10312" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="10309"><span data-dcnode-id="10310" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10307"><span data-dcnode-id="10308" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="10304" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="10305"></path></svg></a></li></ul><span data-dcnode-id="10300" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="8524" id="body"><div data-dcnode-id="9183"><section data-dcnode-id="10282" id="cesec10"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10298" id="cestitle20"><span data-dcnode-id="10299" instrument_node="">Introduction</span></h2><p data-dcnode-id="10288" id="para310"><span data-dcnode-id="10297" instrument_node="">Dreaming is a familiar yet enigmatic mode of cognitive functioning, to which we involuntarily revert every night. Although dreaming has fascinated people since the early ages and was promoted as a therapeutic tool by psychoanalysts at the turn of the 20th century, its rigorous scientific exploration is a more recent development, dating back to the discovery of rapid eye movement (REM) sleep in the 1950s. When this sleep stage was first described in humans, researchers quickly noticed that people who were awakened from REM sleep frequently reported dreams (in 74% of cases, compared with only 17% in non-REM [NREM] sleep).</span><a class="workspace-trigger" data-dcnode-id="10294" href="#bib1" name="bbib1"><sup data-dcnode-id="10295"><span data-dcnode-id="10296" instrument_node="">1</span></sup></a><span data-dcnode-id="10293" instrument_node=""> Dreaming was thus equated to REM sleep, a notion that also seemed to be consistent with the electrophysiological hallmarks of this sleep stage: saccadic eye movements under closed eyelids, as if the sleeper was observing an animated scene;</span><a class="workspace-trigger" data-dcnode-id="10290" href="#bib2" name="bbib2"><sup data-dcnode-id="10291"><span data-dcnode-id="10292" instrument_node="">2</span></sup></a><span data-dcnode-id="10289" instrument_node=""> rapid, desynchronised EEG activity reminiscent of wakefulness; and muscular atonia that prevents dream enactment. The observation that specific brainstem lesions could abolish muscle atonia during REM sleep and lead sleeping cats to chase imaginary prey raised the intriguing possibility that dreams are not reserved for humans alone. In subsequent years, researchers made interesting albeit seemingly contradictory observations. By using open-ended questions such as “What was going through your mind before I woke you up?” they found that dreaming could occur not only in REM sleep, but also in NREM sleep, a sleep stage with a substantially different global EEG signature and neuromodulatory profile. Indeed, although REM sleep is characterised by low-amplitude, high-frequency EEG and by high cholinergic and low noradrenergic modulation, in NREM sleep the EEG shows high-amplitude, low-frequency slow waves as well as spindles, and both cholinergic and noradrenergic transmission are reduced. This observation greatly challenged the assumption that REM sleep equals dreaming and emphasised the fact that dreaming as a subjective experience can be dissociated from sleep stages.</span></p><p data-dcnode-id="10283" id="para320"><span data-dcnode-id="10287" instrument_node="">At the same time, other lines of research clarified that sleep is not a global phenomenon that affects all brain areas simultaneously, but instead occurs and is regulated locally. With the development of neuroimaging techniques with increased spatial resolution, including functional MRI (fMRI), PET, and high-density EEG, it became possible to image such local changes in brain activity and relate them to the characteristics of dreaming across sleep stages. Clinically, specific conditions have provided valuable opportunities to directly observe behaviours related to the dreaming process, including parasomnias (REM sleep behaviour disorder and NREM parasomnias) and lucid dreaming. Sleep medicine has greatly developed in the past decades, mostly through knowledge gained from managing millions of patients with sleep apnoea and insomnia, but the phenomenology and physiology of dreaming have been overlooked, even though they bear relevance to sleep clinicians. Although the precise functions of dreams are still far from known (current hypotheses and challenges to the Freudian hypothesis that dreaming features repressed desires are presented in the </span><a class="workspace-trigger" data-dcnode-id="10285" href="#sec1" name="bsec1"><span data-dcnode-id="10286" instrument_node="">appendix pp 1–4</span></a><span data-dcnode-id="10284" instrument_node="">), progress in these research areas has allowed a new science of dreaming to emerge. This science can provide clinicians with valuable tools in diagnosing and treating patients. In this Review, we draw on evidence from various lines of research to assess how technical advances have allowed dream features to be related to specific patterns of brain activity. We evaluate how particular conditions, including neurological disorders and lucid dreaming, have contributed to elucidating the basis of dreaming, and we consider how dreaming can have diagnostic relevance for sleep and neurological disorders.</span></p></section><section data-dcnode-id="9867" id="cesec20"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10280" id="cestitle30"><span data-dcnode-id="10281" instrument_node="">Dreaming in healthy adults</span></h2><div data-dcnode-id="10193"><p data-dcnode-id="10263" id="para330"><span data-dcnode-id="10279" instrument_node="">Dreaming is generally agreed to refer to subjective experiences during sleep (</span><a class="workspace-trigger" data-dcnode-id="10277" href="#box1" name="bbox1"><span data-dcnode-id="10278" instrument_node="">panel 1</span></a><span data-dcnode-id="10276" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="10273" href="#bib3" name="bbib3"><sup data-dcnode-id="10274"><span data-dcnode-id="10275" instrument_node="">3</span></sup></a><span data-dcnode-id="10272" instrument_node=""> Because the nature of experiences during sleep varies from simple static fragmentary impressions to full-blown, dynamic, hallucinatory story-like experiences, this has led to considerable variation in the definition of dreams. More inclusive definitions consider any subjective experience during sleep as dreams, whereas more restrictive conceptualisations define dreams as “multimodal, complex, dynamic world simulations”</span><a class="workspace-trigger" data-dcnode-id="10269" href="#bib4" name="bbib4"><sup data-dcnode-id="10270"><span data-dcnode-id="10271" instrument_node="">4</span></sup></a><span data-dcnode-id="10268" instrument_node=""> or “immersive spatiotemporal hallucinations”,</span><a class="workspace-trigger" data-dcnode-id="10265" href="#bib3" name="bbib3"><sup data-dcnode-id="10266"><span data-dcnode-id="10267" instrument_node="">3</span></sup></a><span data-dcnode-id="10264" instrument_node=""> in contrast to simpler forms of conscious experiences that are labelled as sleep mentation.</span></p><div aria-label="" class="article-textbox" data-dcnode-id="10194" id="box1" role="region"><span class="label" data-dcnode-id="10261"><span data-dcnode-id="10262" instrument_node="">Panel 1</span></span><span data-dcnode-id="10258" id="cecap40"><p data-dcnode-id="10259" id="spara70"><span data-dcnode-id="10260" instrument_node="">Glossary of terms related to dreaming</span></p></span><div data-dcnode-id="10195"><p data-dcnode-id="10196" id="para10"></p><dl class="list" data-dcnode-id="10197"><dt class="list-label" data-dcnode-id="10256"><span data-dcnode-id="10257" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10253"><p data-dcnode-id="10254" id="para20"><span data-dcnode-id="10255" instrument_node="">Bad dream: a vivid and disturbing dream involving intense negative emotions, most often anxiety and fear, which does not cause an awakening; also called a dysphoric dream.</span></p></dd><dt class="list-label" data-dcnode-id="10251"><span data-dcnode-id="10252" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10248"><p data-dcnode-id="10249" id="para30"><span data-dcnode-id="10250" instrument_node="">Cataplexy: a sudden and transient episode of muscle weakness ranging from mild weakness to complete loss of skeletal muscle tone and postural collapse, with fully preserved conscious awareness; typically triggered by positive emotions, and pathognomonic of narcolepsy type 1.</span></p></dd><dt class="list-label" data-dcnode-id="10246"><span data-dcnode-id="10247" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10243"><p data-dcnode-id="10244" id="para40"><span data-dcnode-id="10245" instrument_node="">Dreaming: broadly defined, any subjective experience during sleep; or more restrictively defined, a subjective experience during sleep that shows complex multisensory content with temporal progression and narrative structure.</span></p></dd><dt class="list-label" data-dcnode-id="10241"><span data-dcnode-id="10242" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10238"><p data-dcnode-id="10239" id="para50"><span data-dcnode-id="10240" instrument_node="">Dream enactment: the concept that observable behaviours during sleep replicate the hallucinatory-like actions carried out in the dream; in other words, dream enactment is based on dream–action isomorphism.</span></p></dd><dt class="list-label" data-dcnode-id="10236"><span data-dcnode-id="10237" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10233"><p data-dcnode-id="10234" id="para60"><span data-dcnode-id="10235" instrument_node="">Lucid dream: a dream during which the dreamer realises that they are dreaming while remaining asleep.</span></p></dd><dt class="list-label" data-dcnode-id="10231"><span data-dcnode-id="10232" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10228"><p data-dcnode-id="10229" id="para70"><span data-dcnode-id="10230" instrument_node="">Nightmare: a vivid and well remembered dysphoric dream that usually involves anxiety or fear, includes a theme involving threat to survival, security, physical integrity, or self-esteem, and causes an awakening; a nightmare can be idiopathic or post-traumatic (ie, induced by traumatic events); re-experiencing the trauma or elements of it is a hallmark of post-traumatic nightmares.</span></p></dd><dt class="list-label" data-dcnode-id="10226"><span data-dcnode-id="10227" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10223"><p data-dcnode-id="10224" id="para80"><span data-dcnode-id="10225" instrument_node="">Parasomnia: a sleep disorder characterised by abnormal or unusual non-stereotyped movements, behaviours, emotions, perceptions, and dreams during sleep or at the transition between wakefulness and sleep; there are non-rapid eye movement sleep parasomnias (also called disorders of arousal, including confusional arousals, sleepwalking, sleep terrors, sleep-related eating disorder, and sexsomnia) and rapid eye movement (REM) sleep parasomnias (including REM sleep behaviour disorder, recurrent isolated sleep paralysis, nightmare disorder, and sleep-related hallucinations).</span></p></dd><dt class="list-label" data-dcnode-id="10221"><span data-dcnode-id="10222" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10218"><p data-dcnode-id="10219" id="para90"><span data-dcnode-id="10220" instrument_node="">Recurrent dream: a dream that is experienced repeatedly during a period of time and contains the same or highly similar content in each iteration; if the content is identical in every iteration, the term repetitive dream may be used.</span></p></dd><dt class="list-label" data-dcnode-id="10216"><span data-dcnode-id="10217" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10213"><p data-dcnode-id="10214" id="para100"><span data-dcnode-id="10215" instrument_node="">Sleep mentation: static, fragmentary, and typically unimodal sensory experience during sleep that does not involve a narrative structure or temporal progress.</span></p></dd><dt class="list-label" data-dcnode-id="10211"><span data-dcnode-id="10212" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10208"><p data-dcnode-id="10209" id="para110"><span data-dcnode-id="10210" instrument_node="">Sleep paralysis: a condition during waking up or falling asleep in which a person is awake and aware of the physical environment but unable to move or speak; it occurs when REM sleep atonia extends to wakefulness.</span></p></dd><dt class="list-label" data-dcnode-id="10206"><span data-dcnode-id="10207" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10203"><p data-dcnode-id="10204" id="para120"><span data-dcnode-id="10205" instrument_node="">Sleep-related hallucination: any perceptual experience that occurs in the absence of its external physical counterpart at the transition from wakefulness to sleep (hypnagogic hallucination) or the transition from sleep to being awake (hypnopompic hallucination).</span></p></dd><dt class="list-label" data-dcnode-id="10201"><span data-dcnode-id="10202" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10198"><p data-dcnode-id="10199" id="para130"><span data-dcnode-id="10200" instrument_node="">White dream: a strong conviction of having had a dream or sleep mentation experience before an awakening, but without explicit recall of any specific content.</span></p></dd></dl><p></p></div></div></div><p data-dcnode-id="10183" id="para340"><span data-dcnode-id="10192" instrument_node="">Nightmares are vivid, well-remembered dysphoric dreams that usually include themes involving threats to survival, security, physical integrity, or self-esteem, and cause awakening.</span><a class="workspace-trigger" data-dcnode-id="10189" href="#bib5" name="bbib5"><sup data-dcnode-id="10190"><span data-dcnode-id="10191" instrument_node="">5</span></sup></a><span data-dcnode-id="10188" instrument_node=""> In contrast, bad dreams also contain intense negative emotions but do not cause an awakening.</span><a class="workspace-trigger" data-dcnode-id="10185" href="#bib6" name="bbib6"><sup data-dcnode-id="10186"><span data-dcnode-id="10187" instrument_node="">6</span></sup></a><span data-dcnode-id="10184" instrument_node=""> Importantly for clinical purposes, patients can use the word nightmare indiscriminately to refer to a variety of conditions, including not only nightmare disorder (in REM sleep) but also different parasomnias. Hence, clinicians first need to establish a correct diagnosis, because the causes and treatments differ considerably.</span></p><section data-dcnode-id="10088" id="cesec30"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10181" id="cestitle40"><span data-dcnode-id="10182" instrument_node="">Factors that influence dream recall and content</span></h3><p data-dcnode-id="10160" id="para350"><span data-dcnode-id="10180" instrument_node="">In population surveys, people remember on average one dream per week at home, but the variance is large, ranging from no recall to recalling dreams every morning.</span><a class="workspace-trigger" data-dcnode-id="10177" href="#bib7" name="bbib7"><sup data-dcnode-id="10178"><span data-dcnode-id="10179" instrument_node="">7</span></sup></a><span data-dcnode-id="10176" instrument_node=""> Dream recall frequency is affected by age, sex, personality, waking life experience, sleep quality, and attitude towards dreams. Among personality traits, openness to experience positively correlates with dream recall, and neuroticism with nightmare recall. Factors that increase dream recall include having an interest in dreams, keeping a dream journal, participating in a dream study, and having more nocturnal awakenings and poor sleep quality.</span><a class="workspace-trigger" data-dcnode-id="10173" href="#bib7" name="bbib7"><sup data-dcnode-id="10174"><span data-dcnode-id="10175" instrument_node="">7</span></sup></a><span data-dcnode-id="10172" instrument_node=""> Dream recall peaks in early adulthood and then declines to old age.</span><a class="workspace-trigger" data-dcnode-id="10169" href="#bib8" name="bbib8"><sup data-dcnode-id="10170"><span data-dcnode-id="10171" instrument_node="">8</span></sup></a><span data-dcnode-id="10168" instrument_node=""> Women typically have higher self-reported dream recall than men do.</span><a class="workspace-trigger" data-dcnode-id="10165" href="#bib7" name="bbib7"><sup data-dcnode-id="10166"><span data-dcnode-id="10167" instrument_node="">7</span></sup></a><span data-dcnode-id="10164" instrument_node=""> The prevalence of nightmares is also higher in women, and nightmares become slightly more prevalent with age. Stress and negative pre-sleep mood also correlate with increased dream recall frequency.</span><a class="workspace-trigger" data-dcnode-id="10161" href="#bib7" name="bbib7"><sup data-dcnode-id="10162"><span data-dcnode-id="10163" instrument_node="">7</span></sup></a></p><p data-dcnode-id="10131" id="para360"><span data-dcnode-id="10159" instrument_node="">Similar to recall, dream content is affected by personality traits and mental state factors. Women typically report less direct physical aggression and sexual content than men, but more dreams with verbal aggression.</span><a class="workspace-trigger" data-dcnode-id="10156" href="#bib8" name="bbib8"><sup data-dcnode-id="10157"><span data-dcnode-id="10158" instrument_node="">8</span></sup></a><span data-dcnode-id="10155" instrument_node=""> Aggression decreases from adolescence to old age in the dreams of both men and women, whereas friendly interactions decrease in women's dreams and gradually increase with age in men's dreams.</span><a class="workspace-trigger" data-dcnode-id="10152" href="#bib8" name="bbib8"><sup data-dcnode-id="10153"><span data-dcnode-id="10154" instrument_node="">8</span></sup></a><span data-dcnode-id="10151" instrument_node=""> Women have more positive emotions in their dreams in adolescence and old age, and comparably more negative emotions during adulthood.</span><a class="workspace-trigger" data-dcnode-id="10148" href="#bib8" name="bbib8"><sup data-dcnode-id="10149"><span data-dcnode-id="10150" instrument_node="">8</span></sup></a><span data-dcnode-id="10147" instrument_node=""> In contrast, negative emotions in men's dreams peak in adolescence and middle adulthood, and are at their lowest in early adulthood and old age.</span><a class="workspace-trigger" data-dcnode-id="10144" href="#bib8" name="bbib8"><sup data-dcnode-id="10145"><span data-dcnode-id="10146" instrument_node="">8</span></sup></a><span data-dcnode-id="10143" instrument_node=""> These developmental patterns might reflect changes in waking life experiences and challenges at different ages.</span><a class="workspace-trigger" data-dcnode-id="10140" href="#bib9" name="bbib9"><sup data-dcnode-id="10141"><span data-dcnode-id="10142" instrument_node="">9</span></sup></a><span data-dcnode-id="10139" instrument_node=""> The emotional intensity of a waking event is one of the best predictors of incorporation into dreams,</span><a class="workspace-trigger" data-dcnode-id="10136" href="#bib10" name="bbib10"><sup data-dcnode-id="10137"><span data-dcnode-id="10138" instrument_node="">10</span></sup></a><span data-dcnode-id="10135" instrument_node=""> and traumatic experiences typically manifest as post-traumatic nightmares, which can persist for decades.</span><a class="workspace-trigger" data-dcnode-id="10132" href="#bib11" name="bbib11"><sup data-dcnode-id="10133"><span data-dcnode-id="10134" instrument_node="">11</span></sup></a></p><p data-dcnode-id="10122" id="para370"><span data-dcnode-id="10130" instrument_node="">Few investigations have addressed genetic influences on dreaming. Twin studies have established that nightmares appear to have a strong additive genetic influence, accounting for 45–51% of the phenotypic variance in childhood and about 37% in adulthood.</span><a class="workspace-trigger" data-dcnode-id="10127" href="#bib12" name="bbib12"><sup data-dcnode-id="10128"><span data-dcnode-id="10129" instrument_node="">12</span></sup></a><span data-dcnode-id="10126" instrument_node=""> Additionally, the occurrence of nightmares in childhood, adolescence, and adulthood correlate significantly, suggesting that disposition to nightmares is a persistent and stable trait.</span><a class="workspace-trigger" data-dcnode-id="10123" href="#bib12" name="bbib12"><sup data-dcnode-id="10124"><span data-dcnode-id="10125" instrument_node="">12</span></sup></a></p><div data-dcnode-id="10089"><p data-dcnode-id="10117" id="para380"><span data-dcnode-id="10121" instrument_node="">Medications can modify dreaming (</span><a class="workspace-trigger" data-dcnode-id="10119" href="#fig1" name="bfig1"><span data-dcnode-id="10120" instrument_node="">figure 1</span></a><span data-dcnode-id="10118" instrument_node="">). Cholinergic and dopaminergic drugs accentuate dream vividness and lucid dreaming, antidepressants decrease dream recall frequency, β-blockers induce nightmares, and α-blockers alleviate post-traumatic nightmares.</span></p><figure class="figure text-xs" data-dcnode-id="10090" id="fig1"><span data-dcnode-id="10101"><img alt="" aria-describedby="cecap10" data-dcnode-id="10116" height="940" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr1.jpg&amp;raw"><span data-dcnode-id="10115" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10102"><li data-dcnode-id="10109"><a class="anchor download-link u-font-sans" data-dcnode-id="10110" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr1_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="10111"><span data-dcnode-id="10114" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10112"><span data-dcnode-id="10113" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="10103"><a class="anchor download-link u-font-sans" data-dcnode-id="10104" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10105"><span data-dcnode-id="10108" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10106"><span data-dcnode-id="10107" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10091"><span data-dcnode-id="10092" id="cecap10"><p data-dcnode-id="10095" id="spara10"><span class="label" data-dcnode-id="10099"><span data-dcnode-id="10100" instrument_node="">Figure 1</span></span><span data-dcnode-id="10098" instrument_node="">. </span><span data-dcnode-id="10096" instrument_node="">Influence of common medications on dream recall frequency and content</span></p><p data-dcnode-id="10093" id="spara20"><span data-dcnode-id="10094" instrument_node="">Note that only changes in dreams related to natural sleep are considered. Excluded are the effects associated with anaesthetics or recreational drugs, medication overdose, or withdrawal from medication. 5HT=serotonergic transmission. NA=noradrenergic transmission. DA=dopaminergic transmission. ACh=cholinergic transmission. H=histaminergic transmission. REM=rapid eye movement.</span></p></span></span></figure></div></section><section data-dcnode-id="10080" id="cesec40"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10086" id="cestitle50"><span data-dcnode-id="10087" instrument_node="">Functions of dreaming</span></h3><p data-dcnode-id="10081" id="para390"><span data-dcnode-id="10085" instrument_node="">Importantly, theories on the function of sleep say little about—and should be distinguished from—theories on the function of dreaming. They include dreaming as a guardian of sleep, as a desensitisation of negative emotions (in combination with memory consolidation), as a simulator (of threat and social challenges), as a play, as a reprogramming of our genetic individuation, or as a mere epiphenomenon (</span><a class="workspace-trigger" data-dcnode-id="10083" href="#sec1" name="bsec1"><span data-dcnode-id="10084" instrument_node="">appendix pp 1–4</span></a><span data-dcnode-id="10082" instrument_node="">). No consensus on these theories has been achieved, because it is empirically challenging to test whether and what type of consequence the dreaming mind has on the waking mind and behaviour.</span></p></section><section data-dcnode-id="9868" id="cesec50"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10078" id="cestitle60"><span data-dcnode-id="10079" instrument_node="">Phenomenology and neurobiology of dreaming</span></h3><section data-dcnode-id="9981" id="cesec60"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10076" id="cestitle70"><span data-dcnode-id="10077" instrument_node="">Normal dreaming</span></h4><p data-dcnode-id="10071" id="para400"><span data-dcnode-id="10075" instrument_node="">Similar to waking mentation, dreams have a veridical multisensory quality and involve perceptual modalities in comparable proportions. Almost 100% of dreams have a visual quality, many have auditory experiences, and fewer contain gustatory and olfactory experiences.</span><a class="workspace-trigger" data-dcnode-id="10072" href="#bib28" name="bbib28"><sup data-dcnode-id="10073"><span data-dcnode-id="10074" instrument_node="">28</span></sup></a></p><p data-dcnode-id="10069" id="para410"><span data-dcnode-id="10070" instrument_node="">Along the same lines, dreams are not entirely new or unfamiliar experiences, because they often deal with everyday objects and known places or people. Contrary to waking experiences, however, most dream contents do not bear any relation to the current environment, because of the sensory and motor disconnection that is inherent to sleep. Instead, dreams are internally generated experiences and by definition are therefore hallucinations. Dreams are also akin to a delusional state, because—with the rare exception of lucid dreaming—dreamers typically take the dream experience to be real, not realising that they are in a bed, dreaming, despite the major contextual and temporal incongruencies that characterise some dreams. This altered reflective consciousness is a major hallmark of dreams, along with the lack of voluntary control over the dream plot. Other distinctive features include dream amnesia (most dreams are rapidly forgotten unless they are particularly striking or quickly recorded upon awakening) and the highly emotional and negatively toned nature of many dreams.</span></p><p data-dcnode-id="10063" id="para420"><span data-dcnode-id="10068" instrument_node="">Differences between REM dreaming and waking cognition are at least partly reflected in regional patterns of cerebral blood flow and glucose metabolism.</span><a class="workspace-trigger" data-dcnode-id="10065" href="#bib29" name="bbib29"><sup data-dcnode-id="10066"><span data-dcnode-id="10067" instrument_node="">29</span></sup></a><span data-dcnode-id="10064" instrument_node=""> Compared with the waking state, REM sleep is characterised by increased activity and blood flow in limbic and paralimbic areas (amygdaloid complexes, hippocampal formation, and anterior cingulate cortex), which have been suggested to account for the emotional aspects of dreaming. It is also characterised by relative quiescence of frontoparietal associative networks, which could contribute to the lack of insight and control that is typical of dreaming. Posterior temporo-occipital cortices are also activated, in line with the visual nature of dreams.</span></p><p data-dcnode-id="10045" id="para430"><span data-dcnode-id="10062" instrument_node="">However, dreaming and REM sleep can be dissociated by pharmacological manipulation</span><a class="workspace-trigger" data-dcnode-id="10059" href="#bib30" name="bbib30"><sup data-dcnode-id="10060"><span data-dcnode-id="10061" instrument_node="">30</span></sup></a><span data-dcnode-id="10058" instrument_node=""> or in patients with brain lesions.</span><a class="workspace-trigger" data-dcnode-id="10055" href="#bib31" name="bbib31"><sup data-dcnode-id="10056"><span data-dcnode-id="10057" instrument_node="">31</span></sup></a><span data-dcnode-id="10054" instrument_node=""> Additionally, in a consistent minority of REM awakenings, people do not report any experience. More importantly, dreaming is now well established as reported in at least 50% of NREM sleep awakenings.</span><a class="workspace-trigger" data-dcnode-id="10051" href="#bib32" name="bbib32"><sup data-dcnode-id="10052"><span data-dcnode-id="10053" instrument_node="">32</span></sup></a><span data-dcnode-id="10050" instrument_node=""> Overall, compared with REM sleep dreams, NREM sleep experiences are shorter, less dreamlike, less vivid, more conceptual, less bizarre, less emotional, under greater volitional control, and more related to current concerns.</span><a class="workspace-trigger" data-dcnode-id="10047" href="#bib32" name="bbib32"><sup data-dcnode-id="10048"><span data-dcnode-id="10049" instrument_node="">32</span></sup></a><span data-dcnode-id="10046" instrument_node=""> However, late-night NREM awakenings can yield dream reports that are in every respect indistinguishable from REM reports.</span></p><p data-dcnode-id="10032" id="para440"><span data-dcnode-id="10044" instrument_node="">Several lines of research have provided insight into how dreaming and unconsciousness can occur in both REM and NREM sleep, two states with radically different global EEG signatures. EEG slow waves, a defining feature of NREM sleep, are likely to underlie the fading of consciousness in sleep. Slow waves reflect periods of neuronal silence (off-periods) in thalamocortical neurons, alternating with periods of neuronal firing (on-periods), each lasting a few hundred milliseconds.</span><a class="workspace-trigger" data-dcnode-id="10041" href="#bib33" name="bbib33"><sup data-dcnode-id="10042"><span data-dcnode-id="10043" instrument_node="">33</span></sup></a><span data-dcnode-id="10040" instrument_node=""> Off-periods have been shown to induce a breakdown in corticocortical communication,</span><a class="workspace-trigger" data-dcnode-id="10037" href="#bib34" name="bbib34"><sup data-dcnode-id="10038"><span data-dcnode-id="10039" instrument_node="">34</span></sup></a><span data-dcnode-id="10036" instrument_node=""> which on theoretical grounds is an important prerequisite for the generation of conscious experiences.</span><a class="workspace-trigger" data-dcnode-id="10033" href="#bib35" name="bbib35"><sup data-dcnode-id="10034"><span data-dcnode-id="10035" instrument_node="">35</span></sup></a></p><p data-dcnode-id="10018" id="para450"><span data-dcnode-id="10031" instrument_node="">Slow waves are not homogeneously distributed across the cortical surface, but are regulated and occur locally, as a function of learning and previous experience.</span><a class="workspace-trigger" data-dcnode-id="10028" href="#bib36" name="bbib36"><sup data-dcnode-id="10029"><span data-dcnode-id="10030" instrument_node="">36</span></sup></a><span data-dcnode-id="10027" instrument_node=""> Therefore, at times, some brain areas can display high-amplitude slow waves while other regions simultaneously show more wake-like activity. Although initially thought to be present only in NREM sleep, recent studies have found local slow waves in both wakefulness</span><a class="workspace-trigger" data-dcnode-id="10024" href="#bib37" name="bbib37"><sup data-dcnode-id="10025"><span data-dcnode-id="10026" instrument_node="">37</span></sup></a><span data-dcnode-id="10023" instrument_node=""> and REM sleep.</span><a class="workspace-trigger" data-dcnode-id="10020" href="#bib38" name="bbib38"><sup data-dcnode-id="10021"><span data-dcnode-id="10022" instrument_node="">38</span></sup></a><span data-dcnode-id="10019" instrument_node=""> Taken together, this work opened the possibility that dreaming might occur in both REM and NREM sleep, depending on the regional distribution of slow-wave activity.</span></p><p data-dcnode-id="9982" id="para460"><span data-dcnode-id="10017" instrument_node="">Recent studies using EEG recordings with increased spatial resolution (high-density EEG), coupled with over 1000 serial awakenings to probe sleep-related experiences, confirmed that slow-wave activity is negatively associated with dreaming in both REM and NREM sleep, most consistently in posterior brain regions.</span><a class="workspace-trigger" data-dcnode-id="10015" href="#bib39" name="bbib39"><span data-dcnode-id="10016" instrument_node="">39</span></a><span data-dcnode-id="10014" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10012" href="#bib40" name="bbib40"><span data-dcnode-id="10013" instrument_node="">40</span></a><span data-dcnode-id="10011" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10009" href="#bib41" name="bbib41"><span data-dcnode-id="10010" instrument_node="">41</span></a><span data-dcnode-id="10008" instrument_node=""> Within posterior brain regions, REM dream contents (including faces, spatial setting, movement, and perceived speech) activated similar regions to those activated by perceptual waking contents.</span><a class="workspace-trigger" data-dcnode-id="10005" href="#bib40" name="bbib40"><sup data-dcnode-id="10006"><span data-dcnode-id="10007" instrument_node="">40</span></sup></a><span data-dcnode-id="10004" instrument_node=""> Another study</span><a class="workspace-trigger" data-dcnode-id="10001" href="#bib42" name="bbib42"><sup data-dcnode-id="10002"><span data-dcnode-id="10003" instrument_node="">42</span></sup></a><span data-dcnode-id="10000" instrument_node=""> in 2013 was able to decode dream contents at sleep onset (light NREM sleep) based on fMRI activity in posterior brain areas. Although these two experiments evaluating dream content comprised a high number of awakenings, relatively few participants were included, and future studies should therefore try to reproduce these results. Nevertheless, a predominant role of posterior cortical brain regions in dreaming is also suggested by reports of cessation of dreaming after lesions of the inferior parietal and occipital cortex.</span><a class="workspace-trigger" data-dcnode-id="9997" href="#bib31" name="bbib31"><sup data-dcnode-id="9998"><span data-dcnode-id="9999" instrument_node="">31</span></sup></a><span data-dcnode-id="9996" instrument_node=""> Additionally, activation of anterior areas in NREM sleep and micro-arousals have been related to successful recall of dream content.</span><a class="workspace-trigger" data-dcnode-id="9994" href="#bib40" name="bbib40"><span data-dcnode-id="9995" instrument_node="">40</span></a><span data-dcnode-id="9993" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9991" href="#bib41" name="bbib41"><span data-dcnode-id="9992" instrument_node="">41</span></a><span data-dcnode-id="9990" instrument_node=""> Subcortical regions also probably play a role in dreaming, given that deep bifrontal lesions of the white matter are associated with a cessation of dreaming.</span><a class="workspace-trigger" data-dcnode-id="9987" href="#bib31" name="bbib31"><sup data-dcnode-id="9988"><span data-dcnode-id="9989" instrument_node="">31</span></sup></a><span data-dcnode-id="9986" instrument_node=""> Finally, patients with what they describe as a blank mind (ie, no spontaneous thoughts), resulting from bilateral basal ganglia lesions, have a lower rate of dream reports and qualitatively impoverished dreams.</span><a class="workspace-trigger" data-dcnode-id="9983" href="#bib44" name="bbib44"><sup data-dcnode-id="9984"><span data-dcnode-id="9985" instrument_node="">44</span></sup></a></p></section><section data-dcnode-id="9901" id="cesec70"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9979" id="cestitle80"><span data-dcnode-id="9980" instrument_node="">Lucid dreaming</span></h4><p data-dcnode-id="9949" id="para470"><span data-dcnode-id="9978" instrument_node="">Lucid dreaming is a non-pathological variant of normal REM dreaming, in which one is aware of dreaming while continuing to sleep.</span><a class="workspace-trigger" data-dcnode-id="9975" href="#bib45" name="bbib45"><sup data-dcnode-id="9976"><span data-dcnode-id="9977" instrument_node="">45</span></sup></a><span data-dcnode-id="9974" instrument_node=""> Some lucid dreamers can even exert control over the ongoing dream scenario. Because eye movements are not affected by the muscle paralysis of REM sleep, lucid dreamers can communicate with an external observer using a predefined ocular code.</span><a class="workspace-trigger" data-dcnode-id="9971" href="#bib46" name="bbib46"><sup data-dcnode-id="9972"><span data-dcnode-id="9973" instrument_node="">46</span></sup></a><span data-dcnode-id="9970" instrument_node=""> Lucid dreaming is usually pleasurable and is sought by many healthy people to increase positive experiences in dreams, but it can also be learned by patients with nightmare disorder to change their nightmares into agreeable dreams. However, it is a challenging state to reach, and although 26–77% of adults experience a lucid dream at least once, only highly trained people are able to control the scenario and signal lucidity in a laboratory setting.</span><a class="workspace-trigger" data-dcnode-id="9967" href="#bib45" name="bbib45"><sup data-dcnode-id="9968"><span data-dcnode-id="9969" instrument_node="">45</span></sup></a><span data-dcnode-id="9966" instrument_node=""> These people give a fantastic advantage to dream research, and have enabled major recent progress in understanding consciousness during REM sleep,</span><a class="workspace-trigger" data-dcnode-id="9963" href="#bib47" name="bbib47"><sup data-dcnode-id="9964"><span data-dcnode-id="9965" instrument_node="">47</span></sup></a><span data-dcnode-id="9962" instrument_node=""> time in dreams,</span><a class="workspace-trigger" data-dcnode-id="9959" href="#bib46" name="bbib46"><sup data-dcnode-id="9960"><span data-dcnode-id="9961" instrument_node="">46</span></sup></a><span data-dcnode-id="9958" instrument_node=""> and dream–body interactions.</span><a class="workspace-trigger" data-dcnode-id="9956" href="#bib48" name="bbib48"><span data-dcnode-id="9957" instrument_node="">48</span></a><span data-dcnode-id="9955" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9953" href="#bib49" name="bbib49"><span data-dcnode-id="9954" instrument_node="">49</span></a><span data-dcnode-id="9952" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9950" href="#bib50" name="bbib50"><span data-dcnode-id="9951" instrument_node="">50</span></a></p><p data-dcnode-id="9924" id="para480"><span data-dcnode-id="9948" instrument_node="">Compared with non-lucid REM sleep, lucid REM sleep is associated with increased frontolateral EEG power in the lower gamma band (usually activated during waking)</span><a class="workspace-trigger" data-dcnode-id="9945" href="#bib51" name="bbib51"><sup data-dcnode-id="9946"><span data-dcnode-id="9947" instrument_node="">51</span></sup></a><span data-dcnode-id="9944" instrument_node=""> or decreased delta frontocentral EEG power.</span><a class="workspace-trigger" data-dcnode-id="9941" href="#bib47" name="bbib47"><sup data-dcnode-id="9942"><span data-dcnode-id="9943" instrument_node="">47</span></sup></a><span data-dcnode-id="9940" instrument_node=""> Brain areas that are usually associated with insight and agency during wakefulness (bilateral precuneus, cuneus, parietal lobules, and prefrontal and basal occipitotemporal cortices) have been shown to be activated in a small sample of lucid REM sleep dreamers, unlike in those having non-lucid REM sleep dreams.</span><a class="workspace-trigger" data-dcnode-id="9937" href="#bib52" name="bbib52"><sup data-dcnode-id="9938"><span data-dcnode-id="9939" instrument_node="">52</span></sup></a><span data-dcnode-id="9936" instrument_node=""> During wakefulness, participants with high lucid dream frequency have higher activity in areas associated with insight than do participants with low lucid dream frequency, including increased resting-state functional connectivity between the left anterior prefrontal cortex and the bilateral angular gyrus, bilateral middle temporal gyrus, and right inferior frontal gyrus,</span><a class="workspace-trigger" data-dcnode-id="9933" href="#bib53" name="bbib53"><sup data-dcnode-id="9934"><span data-dcnode-id="9935" instrument_node="">53</span></sup></a><span data-dcnode-id="9932" instrument_node=""> and increased signal in the frontopolar region during metacognitive thought-monitoring tasks.</span><a class="workspace-trigger" data-dcnode-id="9929" href="#bib54" name="bbib54"><sup data-dcnode-id="9930"><span data-dcnode-id="9931" instrument_node="">54</span></sup></a><span data-dcnode-id="9928" instrument_node=""> In line with these findings, transcranial alternating current stimulation in the low gamma band (25–40 Hz) applied to the frontal lobe induces an increase in self-reflective awareness in dreams in healthy people.</span><a class="workspace-trigger" data-dcnode-id="9925" href="#bib55" name="bbib55"><sup data-dcnode-id="9926"><span data-dcnode-id="9927" instrument_node="">55</span></sup></a></p><p data-dcnode-id="9902" id="para490"><span data-dcnode-id="9923" instrument_node="">Recent studies have shown that tasks done during lucid dreams involve similar brain networks, extend across comparable time periods, and elicit the same eye movements and respiration patterns as during wakefulness. Dreamed hand clenches in lucid dreams activate the contralateral sensorimotor cortex,</span><a class="workspace-trigger" data-dcnode-id="9920" href="#bib48" name="bbib48"><sup data-dcnode-id="9921"><span data-dcnode-id="9922" instrument_node="">48</span></sup></a><span data-dcnode-id="9919" instrument_node=""> although to a smaller extent (50%) than hand clenches during wakefulness, possibly due to the absence of sensory feedback during REM sleep. Another study</span><a class="workspace-trigger" data-dcnode-id="9916" href="#bib49" name="bbib49"><sup data-dcnode-id="9917"><span data-dcnode-id="9918" instrument_node="">49</span></sup></a><span data-dcnode-id="9915" instrument_node=""> showed that participants who were instructed to hold their breath in their lucid dreams (eg, by diving in a pool) produced a long central apnoea during REM sleep naps, suggesting that the cortical networks involved in voluntary respiratory movements are preserved during REM sleep and that breathing irregularities have a cortical or subcortical origin that reflects dream content. Yet another study</span><a class="workspace-trigger" data-dcnode-id="9912" href="#bib50" name="bbib50"><sup data-dcnode-id="9913"><span data-dcnode-id="9914" instrument_node="">50</span></sup></a><span data-dcnode-id="9911" instrument_node=""> showed that lucid dreamers can perform smooth pursuit eye movements when tracking their moving thumb in their dreams, similar to eye movements during wakefulness, and different from the saccadic tracking observed during visuomotor imagination. This observation suggests that the neural circuitry of smooth pursuit can be driven by a dreamed percept in the absence of retinal stimulation, and that specific voluntary shifts in the direction of experienced gaze within REM sleep dreams are accompanied by corresponding rotations of the physical eyes.</span><a class="workspace-trigger" data-dcnode-id="9908" href="#bib50" name="bbib50"><sup data-dcnode-id="9909"><span data-dcnode-id="9910" instrument_node="">50</span></sup></a><span data-dcnode-id="9907" instrument_node=""> Finally, counting from zero to ten during REM sleep has been shown to take about the same time as when awake, whereas it takes about 25% longer to do motor actions,</span><a class="workspace-trigger" data-dcnode-id="9904" href="#bib46" name="bbib46"><sup data-dcnode-id="9905"><span data-dcnode-id="9906" instrument_node="">46</span></sup></a><span data-dcnode-id="9903" instrument_node=""> possibly because of the absence of sensory feedback and the slower cognitive processes during sleep.</span></p></section><section data-dcnode-id="9869" id="cesec80"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9899" id="cestitle90"><span data-dcnode-id="9900" instrument_node="">Sleep talking</span></h4><p data-dcnode-id="9870" id="para500"><span data-dcnode-id="9898" instrument_node="">Sleep talking can also yield insights into how the brain dreams.</span><a class="workspace-trigger" data-dcnode-id="9895" href="#bib56" name="bbib56"><sup data-dcnode-id="9896"><span data-dcnode-id="9897" instrument_node="">56</span></sup></a><span data-dcnode-id="9894" instrument_node=""> Sleep speech is rare, brief, and consists of a few words rather than extended remarks.</span><a class="workspace-trigger" data-dcnode-id="9891" href="#bib56" name="bbib56"><sup data-dcnode-id="9892"><span data-dcnode-id="9893" instrument_node="">56</span></sup></a><span data-dcnode-id="9890" instrument_node=""> In healthy participants and patients with NREM or REM parasomnia, half of sleep utterances are non-verbal, containing mostly mumbling, whispering, laughing, shouting, silent speech, moaning, and rare cries.</span><a class="workspace-trigger" data-dcnode-id="9887" href="#bib57" name="bbib57"><sup data-dcnode-id="9888"><span data-dcnode-id="9889" instrument_node="">57</span></sup></a><span data-dcnode-id="9886" instrument_node=""> Speech episodes contain on average nine words, with men making longer utterances than women.</span><a class="workspace-trigger" data-dcnode-id="9883" href="#bib57" name="bbib57"><sup data-dcnode-id="9884"><span data-dcnode-id="9885" instrument_node="">57</span></sup></a><span data-dcnode-id="9882" instrument_node=""> Sleep talking respects turn taking rules in conversation, with an appropriate silence after a question, as if listening to a response from a fictive talker. This pattern means that dreamers speak only those words that—in the dream—they experience as their own. Such dialogic speech could draw on a theory of mind capacity in dreams, requiring the representation of a voice and the sense and intention of a plausible and realistic interlocutor. Among understandable words, the most frequent is “no”.</span><a class="workspace-trigger" data-dcnode-id="9879" href="#bib57" name="bbib57"><sup data-dcnode-id="9880"><span data-dcnode-id="9881" instrument_node="">57</span></sup></a><span data-dcnode-id="9878" instrument_node=""> Offensive language (mostly insults in REM sleep and swearing in NREM sleep) is surprisingly frequent and outnumbers polite language.</span><a class="workspace-trigger" data-dcnode-id="9875" href="#bib57" name="bbib57"><sup data-dcnode-id="9876"><span data-dcnode-id="9877" instrument_node="">57</span></sup></a><span data-dcnode-id="9874" instrument_node=""> One might imagine that this language use parallels the confrontational mental concerns of dreamers, or that it reflects some degree of social disinhibition or intense emotion during sleep. There is a higher rate of profanities in men than in women during sleep talking.</span><a class="workspace-trigger" data-dcnode-id="9871" href="#bib57" name="bbib57"><sup data-dcnode-id="9872"><span data-dcnode-id="9873" instrument_node="">57</span></sup></a></p></section></section></section><section data-dcnode-id="9231" id="cesec90"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9865" id="cestitle100"><span data-dcnode-id="9866" instrument_node="">Dreams in the context of disorders</span></h2><div data-dcnode-id="9654"><p data-dcnode-id="9857" id="para510"><span data-dcnode-id="9864" instrument_node="">Advances regarding abnormal dreaming in neurological and sleep disorders have been made by studying patients with isolated REM sleep behaviour disorder, Parkinson's disease, narcolepsy, and arousal disorders. These disorders are of interest because most of them affect both REM sleep and dreaming. Additionally, arousal disorders affect NREM sleep but result in dreaming enactment. Some studies have examined dream alterations in patients with sleep apnoea and insomnia, because they are the most common sleep disorders (</span><a class="workspace-trigger" data-dcnode-id="9862" href="#box2" name="bbox2"><span data-dcnode-id="9863" instrument_node="">panel 2</span></a><span data-dcnode-id="9861" instrument_node="">), and in patients with sensorial or motor impairments, to assess whether the impairment is maintained or disappears during dreaming (</span><a class="workspace-trigger" data-dcnode-id="9859" href="#box3" name="bbox3"><span data-dcnode-id="9860" instrument_node="">panel 3</span></a><span data-dcnode-id="9858" instrument_node="">).</span></p><div aria-label="" class="article-textbox" data-dcnode-id="9731" id="box2" role="region"><span class="label" data-dcnode-id="9855"><span data-dcnode-id="9856" instrument_node="">Panel 2</span></span><span data-dcnode-id="9852" id="cecap50"><p data-dcnode-id="9853" id="spara80"><span data-dcnode-id="9854" instrument_node="">Dreams in patients with sleep apnoea or insomnia</span></p></span><div data-dcnode-id="9732"><p data-dcnode-id="9849" id="para140"><strong data-dcnode-id="9850"><span data-dcnode-id="9851" instrument_node="">Patients with sleep apnoea</span></strong></p><p data-dcnode-id="9785" id="para150"></p><dl class="list" data-dcnode-id="9786"><dt class="list-label" data-dcnode-id="9847"><span data-dcnode-id="9848" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9830"><p data-dcnode-id="9831" id="para160"><span data-dcnode-id="9846" instrument_node="">One would imagine that the frequent respiratory occlusions in patients with obstructive sleep apnoea would find their way into the dream content. Although anecdotal reports exist of patients with obstructive sleep apnoea drowning or choking in their dreams, studies that have systematically assessed this aspect suggest otherwise.</span><a class="workspace-trigger" data-dcnode-id="9844" href="#bib58" name="bbib58"><span data-dcnode-id="9845" instrument_node="">58</span></a><span data-dcnode-id="9843" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9841" href="#bib59" name="bbib59"><span data-dcnode-id="9842" instrument_node="">59</span></a><span data-dcnode-id="9840" instrument_node=""> The dreams of patients with sleep apnoea do not appear to contain elements related to respiratory features, regardless of whether dream reports are collected in the morning after a night in the sleep laboratory,</span><a class="workspace-trigger" data-dcnode-id="9837" href="#bib59" name="bbib59"><sup data-dcnode-id="9838"><span data-dcnode-id="9839" instrument_node="">59</span></sup></a><span data-dcnode-id="9836" instrument_node=""> through serial awakenings in rapid eye movement (REM) sleep, or immediately after observing an apnoea in the recording.</span><a class="workspace-trigger" data-dcnode-id="9833" href="#bib58" name="bbib58"><sup data-dcnode-id="9834"><span data-dcnode-id="9835" instrument_node="">58</span></sup></a><span data-dcnode-id="9832" instrument_node=""> These experimental observations fit well with the clinical observation that choking sensations and dreams involving respiratory distress are only exceptionally reported by patients with obstructive sleep apnoea, despite the large number of such patients.</span></p></dd><dt class="list-label" data-dcnode-id="9828"><span data-dcnode-id="9829" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9787"><p data-dcnode-id="9788" id="para170"><span data-dcnode-id="9827" instrument_node="">Studies investigating nightmare frequency in patients with obstructive sleep apnoea have provided contradictory results.</span><a class="workspace-trigger" data-dcnode-id="9825" href="#bib59" name="bbib59"><span data-dcnode-id="9826" instrument_node="">59</span></a><span data-dcnode-id="9824" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9822" href="#bib60" name="bbib60"><span data-dcnode-id="9823" instrument_node="">60</span></a><span data-dcnode-id="9821" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9819" href="#bib61" name="bbib61"><span data-dcnode-id="9820" instrument_node="">61</span></a><span data-dcnode-id="9818" instrument_node=""> However, among patients with obstructive sleep apnoea, those with a higher apnoea–hypopnea index specifically in REM sleep tend to have more nightmares,</span><a class="workspace-trigger" data-dcnode-id="9815" href="#bib62" name="bbib62"><sup data-dcnode-id="9816"><span data-dcnode-id="9817" instrument_node="">62</span></sup></a><span data-dcnode-id="9814" instrument_node=""> and patients who have both nightmares and sleep apnoea report a reduction in nightmares after starting positive airway pressure therapy.</span><a class="workspace-trigger" data-dcnode-id="9811" href="#bib62" name="bbib62"><sup data-dcnode-id="9812"><span data-dcnode-id="9813" instrument_node="">62</span></sup></a><span data-dcnode-id="9810" instrument_node=""> Notably, the dramatic REM sleep rebound observed when starting positive airway pressure therapy in patients with severe obstructive sleep apnoea is not associated with increased dreaming, and the ventilator is not featured in patients' dreams.</span><a class="workspace-trigger" data-dcnode-id="9807" href="#bib58" name="bbib58"><sup data-dcnode-id="9808"><span data-dcnode-id="9809" instrument_node="">58</span></sup></a><span data-dcnode-id="9806" instrument_node=""> Studies assessing dream recall have reported inconsistent results, including higher,</span><a class="workspace-trigger" data-dcnode-id="9804" href="#bib63" name="bbib63"><span data-dcnode-id="9805" instrument_node="">63</span></a><span data-dcnode-id="9803" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9801" href="#bib64" name="bbib64"><span data-dcnode-id="9802" instrument_node="">64</span></a><span data-dcnode-id="9800" instrument_node=""> lower,</span><a class="workspace-trigger" data-dcnode-id="9797" href="#bib61" name="bbib61"><sup data-dcnode-id="9798"><span data-dcnode-id="9799" instrument_node="">61</span></sup></a><span data-dcnode-id="9796" instrument_node=""> or similar</span><a class="workspace-trigger" data-dcnode-id="9793" href="#bib58" name="bbib58"><sup data-dcnode-id="9794"><span data-dcnode-id="9795" instrument_node="">58</span></sup></a><span data-dcnode-id="9792" instrument_node=""> dream recall in patients with obstructive sleep apnoea compared with control participants. Additionally, individual dreams of such patients appear to have more anxiety-filled, violent, unpleasant, and realistic content than those of controls.</span><a class="workspace-trigger" data-dcnode-id="9789" href="#bib58" name="bbib58"><sup data-dcnode-id="9790"><span data-dcnode-id="9791" instrument_node="">58</span></sup></a></p></dd></dl><p></p><p data-dcnode-id="9782"><strong data-dcnode-id="9783"><span data-dcnode-id="9784" instrument_node="">Patients with insomnia</span></strong></p><p data-dcnode-id="9733" id="para180"></p><dl class="list" data-dcnode-id="9734"><dt class="list-label" data-dcnode-id="9780"><span data-dcnode-id="9781" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9735"><p data-dcnode-id="9736" id="para200"><span data-dcnode-id="9779" instrument_node="">A large questionnaire study</span><a class="workspace-trigger" data-dcnode-id="9776" href="#bib65" name="bbib65"><sup data-dcnode-id="9777"><span data-dcnode-id="9778" instrument_node="">65</span></sup></a><span data-dcnode-id="9775" instrument_node=""> evaluating dream recall frequency has shown that participants with insomnia have higher dream recall rates than healthy controls, and that this difference is related to the increased number of spontaneous nocturnal awakenings. Laboratory studies evaluating dream recall after induced awakenings, however, have not found differences in rates of dreaming between insomnia patients and healthy controls in either REM sleep</span><a class="workspace-trigger" data-dcnode-id="9773" href="#bib66" name="bbib66"><span data-dcnode-id="9774" instrument_node="">66</span></a><span data-dcnode-id="9772" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9770" href="#bib67" name="bbib67"><span data-dcnode-id="9771" instrument_node="">67</span></a><span data-dcnode-id="9769" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9767" href="#bib68" name="bbib68"><span data-dcnode-id="9768" instrument_node="">68</span></a><span data-dcnode-id="9766" instrument_node=""> or non-REM (NREM) sleep.</span><a class="workspace-trigger" data-dcnode-id="9763" href="#bib67" name="bbib67"><sup data-dcnode-id="9764"><span data-dcnode-id="9765" instrument_node="">67</span></sup></a><span data-dcnode-id="9762" instrument_node=""> One study</span><a class="workspace-trigger" data-dcnode-id="9759" href="#bib68" name="bbib68"><sup data-dcnode-id="9760"><span data-dcnode-id="9761" instrument_node="">68</span></sup></a><span data-dcnode-id="9758" instrument_node=""> even found lower dream recall in patients with insomnia than control patients in NREM sleep. Laboratory studies also indicate that people with insomnia have more thought-like and abstract mentation in both REM and NREM sleep.</span><a class="workspace-trigger" data-dcnode-id="9755" href="#bib68" name="bbib68"><sup data-dcnode-id="9756"><span data-dcnode-id="9757" instrument_node="">68</span></sup></a><span data-dcnode-id="9754" instrument_node=""> Thought-like mentation in people with insomnia correlates with the total number of arousals, specifically with arousals in REM sleep, and with hyperarousal and subjective insomnia severity.</span><a class="workspace-trigger" data-dcnode-id="9751" href="#bib69" name="bbib69"><sup data-dcnode-id="9752"><span data-dcnode-id="9753" instrument_node="">69</span></sup></a><span data-dcnode-id="9750" instrument_node=""> Finally, more negative emotions have been reported in dreams of people with insomnia, obtained by awakening participants in REM sleep</span><a class="workspace-trigger" data-dcnode-id="9748" href="#bib62" name="bbib62"><span data-dcnode-id="9749" instrument_node="">62</span></a><span data-dcnode-id="9747" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9745" href="#bib67" name="bbib67"><span data-dcnode-id="9746" instrument_node="">67</span></a><span data-dcnode-id="9744" instrument_node=""> and NREM sleep,</span><a class="workspace-trigger" data-dcnode-id="9741" href="#bib67" name="bbib67"><sup data-dcnode-id="9742"><span data-dcnode-id="9743" instrument_node="">67</span></sup></a><span data-dcnode-id="9740" instrument_node=""> and by evaluating dream reports obtained in the morning.</span><a class="workspace-trigger" data-dcnode-id="9737" href="#bib65" name="bbib65"><sup data-dcnode-id="9738"><span data-dcnode-id="9739" instrument_node="">65</span></sup></a></p></dd></dl><p></p></div></div><div aria-label="" class="article-textbox" data-dcnode-id="9655" id="box3" role="region"><span class="label" data-dcnode-id="9729"><span data-dcnode-id="9730" instrument_node="">Panel 3</span></span><span data-dcnode-id="9726" id="cecap60"><p data-dcnode-id="9727" id="spara90"><span data-dcnode-id="9728" instrument_node="">The body of our dreams: patients with paraplegia, deafness, blindness, and phantom limbs</span></p></span><div data-dcnode-id="9656"><p data-dcnode-id="9724" id="para210"><span data-dcnode-id="9725" instrument_node="">The dreams of people with disabilities challenge the view that dreams are mere echoes of our waking experiences.</span></p><p data-dcnode-id="9721" id="para220"><strong data-dcnode-id="9722"><span data-dcnode-id="9723" instrument_node="">People with paraplegia</span></strong></p><p data-dcnode-id="9704" id="para230"></p><dl class="list" data-dcnode-id="9705"><dt class="list-label" data-dcnode-id="9719"><span data-dcnode-id="9720" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9706"><p data-dcnode-id="9707" id="para240"><span data-dcnode-id="9718" instrument_node="">Studies based on dream diaries</span><a class="workspace-trigger" data-dcnode-id="9716" href="#bib70" name="bbib70"><span data-dcnode-id="9717" instrument_node="">70</span></a><span data-dcnode-id="9715" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9713" href="#bib71" name="bbib71"><span data-dcnode-id="9714" instrument_node="">71</span></a><span data-dcnode-id="9712" instrument_node=""> have shown, unexpectedly, that participants who were paraplegic since birth walked in their dreams. In 38% of their dreams, they also ran, danced, swam, bicycled, skied, gardened, and played basketball—a similar proportion to non-disabled people. Even participants who had been paraplegic for up to 65 years still walked in their dreams. These results suggest that a cerebral walking programme, which possibly develops via mirror neurons (activated when observing others perform an action), is reactivated during sleep. Such an interpretation is consistent with a study</span><a class="workspace-trigger" data-dcnode-id="9709" href="#bib40" name="bbib40"><sup data-dcnode-id="9710"><span data-dcnode-id="9711" instrument_node="">40</span></sup></a><span data-dcnode-id="9708" instrument_node=""> showing that dreaming of doing movements principally elicits activation in regions involved in the perception of biological motion.</span></p></dd></dl><p></p><p data-dcnode-id="9701"><strong data-dcnode-id="9702"><span data-dcnode-id="9703" instrument_node="">People with deafness or blindness</span></strong></p><p data-dcnode-id="9679" id="para250"></p><dl class="list" data-dcnode-id="9680"><dt class="list-label" data-dcnode-id="9699"><span data-dcnode-id="9700" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9681"><p data-dcnode-id="9682" id="para270"><span data-dcnode-id="9698" instrument_node="">Most dreams of participants who are deaf do not contain sensory limitations.</span><a class="workspace-trigger" data-dcnode-id="9695" href="#bib71" name="bbib71"><sup data-dcnode-id="9696"><span data-dcnode-id="9697" instrument_node="">71</span></sup></a><span data-dcnode-id="9694" instrument_node=""> Many such patients speak in their dreams, and others can hear and understand spoken language. The dream narratives reveal no sign of awareness of a disability. Participants with late onset (&gt;2·5 years) blindness still report visual images in dreams (this content decreases as time from onset increases), although visual content is less frequent in their dreams than tactile or auditory content.</span><a class="workspace-trigger" data-dcnode-id="9691" href="#bib72" name="bbib72"><sup data-dcnode-id="9692"><span data-dcnode-id="9693" instrument_node="">72</span></sup></a><span data-dcnode-id="9690" instrument_node=""> Up to 21% of individuals with congenital blindness report some visual impressions in dreams when they still have light perception.</span><a class="workspace-trigger" data-dcnode-id="9687" href="#bib72" name="bbib72"><sup data-dcnode-id="9688"><span data-dcnode-id="9689" instrument_node="">72</span></sup></a><span data-dcnode-id="9686" instrument_node=""> People who are congenitally completely blind also report mental images in dreams, but, when drawn, they resemble spatial representations of objects touched with the hand.</span><a class="workspace-trigger" data-dcnode-id="9683" href="#bib73" name="bbib73"><sup data-dcnode-id="9684"><span data-dcnode-id="9685" instrument_node="">73</span></sup></a></p></dd></dl><p></p><p data-dcnode-id="9676" id="para260"><strong data-dcnode-id="9677"><span data-dcnode-id="9678" instrument_node="">People with amputated limbs</span></strong></p><p data-dcnode-id="9657"></p><dl class="list" data-dcnode-id="9658"><dt class="list-label" data-dcnode-id="9674"><span data-dcnode-id="9675" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9659"><p data-dcnode-id="9660" id="para300"><span data-dcnode-id="9673" instrument_node="">People who have had amputations generally continue to dream of themselves as physically unharmed, even years after the amputation and even when the physical disability is congenital.</span><a class="workspace-trigger" data-dcnode-id="9670" href="#bib74" name="bbib74"><sup data-dcnode-id="9671"><span data-dcnode-id="9672" instrument_node="">74</span></sup></a><span data-dcnode-id="9669" instrument_node=""> A patient with rapid eye movement sleep behaviour disorder with a right-arm amputation was seen to move his right stump while he dreamed of pouring champagne with that hand.</span><a class="workspace-trigger" data-dcnode-id="9666" href="#bib75" name="bbib75"><sup data-dcnode-id="9667"><span data-dcnode-id="9668" instrument_node="">75</span></sup></a><span data-dcnode-id="9665" instrument_node=""> Additionally, pain in the phantom limb disappeared during the dream,</span><a class="workspace-trigger" data-dcnode-id="9662" href="#bib75" name="bbib75"><sup data-dcnode-id="9663"><span data-dcnode-id="9664" instrument_node="">75</span></sup></a><span data-dcnode-id="9661" instrument_node=""> suggesting that the unpleasant phantom experiences during wakefulness (resulting from a discrepancy between a pre-existing body scheme and the actual sensory information about the missing limb) are substituted with the intact body image, which is accessed as if by default during dreaming.</span></p></dd></dl><p></p></div></div></div><section data-dcnode-id="9532" id="cesec100"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9652" id="cestitle110"><span data-dcnode-id="9653" instrument_node="">Isolated REM sleep behaviour disorder</span></h3><div data-dcnode-id="9604"><p data-dcnode-id="9632" id="para520"><span data-dcnode-id="9651" instrument_node="">Middle-aged patients referred for agitated nightmares might present enacted dreams and nightmares, resulting in isolated (previously named idiopathic) REM sleep behaviour disorder.</span><a class="workspace-trigger" data-dcnode-id="9648" href="#bib76" name="bbib76"><sup data-dcnode-id="9649"><span data-dcnode-id="9650" instrument_node="">76</span></sup></a><span data-dcnode-id="9647" instrument_node=""> Normal REM sleep is associated with loss of postural muscle tone (or atonia) through an active mechanism in the pons and medulla that inhibits movement (</span><a class="workspace-trigger" data-dcnode-id="9645" href="#fig2" name="bfig2"><span data-dcnode-id="9646" instrument_node="">figure 2</span></a><span data-dcnode-id="9644" instrument_node="">). When this mechanism is damaged, patients display movements, facial expressions, vocalisations, and behaviours during REM sleep.</span><a class="workspace-trigger" data-dcnode-id="9641" href="#bib5" name="bbib5"><sup data-dcnode-id="9642"><span data-dcnode-id="9643" instrument_node="">5</span></sup></a><span data-dcnode-id="9640" instrument_node=""> Patients who are awakened immediately after a behavioural episode frequently report dream content congruent with the overt behaviour before awakening.</span><a class="workspace-trigger" data-dcnode-id="9637" href="#bib77" name="bbib77"><sup data-dcnode-id="9638"><span data-dcnode-id="9639" instrument_node="">77</span></sup></a><span data-dcnode-id="9636" instrument_node=""> Violent movements, such as kicking, boxing, and jumping out of the bed, can cause injuries to the patients or their bed sharers.</span><a class="workspace-trigger" data-dcnode-id="9633" href="#bib5" name="bbib5"><sup data-dcnode-id="9634"><span data-dcnode-id="9635" instrument_node="">5</span></sup></a></p><figure class="figure text-xs" data-dcnode-id="9605" id="fig2"><span data-dcnode-id="9616"><img alt="" aria-describedby="cecap20" data-dcnode-id="9631" height="915" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr2.jpg&amp;raw"><span data-dcnode-id="9630" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="9617"><li data-dcnode-id="9624"><a class="anchor download-link u-font-sans" data-dcnode-id="9625" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr2_lrg.jpg" target="_blank" title="Download high-res image (923KB)"><span class="anchor-text" data-dcnode-id="9626"><span data-dcnode-id="9629" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9627"><span data-dcnode-id="9628" instrument_node="">Download high-res image (923KB)</span></span></span></a></li><li data-dcnode-id="9618"><a class="anchor download-link u-font-sans" data-dcnode-id="9619" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S1474442220302751-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="9620"><span data-dcnode-id="9623" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="9621"><span data-dcnode-id="9622" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="9606"><span data-dcnode-id="9607" id="cecap20"><p data-dcnode-id="9610" id="spara30"><span class="label" data-dcnode-id="9614"><span data-dcnode-id="9615" instrument_node="">Figure 2</span></span><span data-dcnode-id="9613" instrument_node="">. </span><span data-dcnode-id="9611" instrument_node="">REM sleep behaviour disorder—a model of enacted dreams</span></p><p data-dcnode-id="9608" id="spara40"><span data-dcnode-id="9609" instrument_node="">(A) Patients with isolated REM sleep behaviour disorder (right panel) have lower signals than healthy controls (left panel) in the subcoeruleus and coeruleus complex in the posterior part of the pons (horizontal plane, neuromelanin sensitive MRI; the arrows indicate the complex). The subcoeruleus complex is responsible for atonia during REM sleep. (B) The imperfect muscle atonia during REM sleep in isolated REM sleep behaviour disorder is detectable as a tonic and phasic increased muscle activity on the EMG signals of the polysomnography; normal REM sleep (left panel) shows a flat line for the chin EMG (ie, atonic, paralysed), whereas abnormal REM sleep (right panel) shows a similar EEG and EOG to normal REM sleep, but the chin EMG is abnormally high. (C) Contemporaneous with this polysomnography signal, the normal sleeper is quiet and relaxed while dreaming of scoring a goal (left panel), whereas the patient with REM sleep behaviour disorder dreaming of scoring a goal has leg and arm movements of playing football, but in the lying position (right panel). REM=rapid eye movement. EOG=electrooculography. EMG=electromyography.</span></p></span></span></figure></div><p data-dcnode-id="9576" id="para530"><span data-dcnode-id="9603" instrument_node="">Most affected patients eventually develop parkinsonism or dementia, almost exclusively in the form of a synucleinopathy (Parkinson's disease, dementia with Lewy bodies, or multiple systemic atrophy), and about half of them do so within a median of 8 years.</span><a class="workspace-trigger" data-dcnode-id="9600" href="#bib78" name="bbib78"><sup data-dcnode-id="9601"><span data-dcnode-id="9602" instrument_node="">78</span></sup></a><span data-dcnode-id="9599" instrument_node=""> These patients often present numerous, mild, non-motor symptoms (eg, hyposmia and constipation) and mildly abnormal test results (eg, reduced speed during rapid hand movements and decreased dopamine transmission in brain functional imaging), which would place them between healthy participants and patients with Parkinson's disease in a spectrum of symptom severity.</span><a class="workspace-trigger" data-dcnode-id="9597" href="#bib79" name="bbib79"><span data-dcnode-id="9598" instrument_node="">79</span></a><span data-dcnode-id="9596" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9594" href="#bib80" name="bbib80"><span data-dcnode-id="9595" instrument_node="">80</span></a><span data-dcnode-id="9593" instrument_node=""> The condition is associated with neuronal loss in the subcoeruleus nucleus in the pons.</span><a class="workspace-trigger" data-dcnode-id="9590" href="#bib81" name="bbib81"><sup data-dcnode-id="9591"><span data-dcnode-id="9592" instrument_node="">81</span></sup></a><span data-dcnode-id="9589" instrument_node=""> A single screening question: “Have you ever been told, or suspected yourself, that you seem to ‘act out your dreams’ while asleep (for example, punching, flailing your arms in the air, making running movements, etc)?”</span><a class="workspace-trigger" data-dcnode-id="9586" href="#bib82" name="bbib82"><sup data-dcnode-id="9587"><span data-dcnode-id="9588" instrument_node="">82</span></sup></a><span data-dcnode-id="9585" instrument_node=""> is sensitive and specific for distinguishing patients with REM sleep behaviour disorder from healthy controls and patients with obstructive sleep apnoea,</span><a class="workspace-trigger" data-dcnode-id="9582" href="#bib82" name="bbib82"><sup data-dcnode-id="9583"><span data-dcnode-id="9584" instrument_node="">82</span></sup></a><span data-dcnode-id="9581" instrument_node=""> but not from patients with sleepwalking or sleep terrors.</span><a class="workspace-trigger" data-dcnode-id="9578" href="#bib83" name="bbib83"><sup data-dcnode-id="95
