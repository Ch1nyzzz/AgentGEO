-stl7tm" data-dcnode-id="479"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="480"><div class="css-z468a2" data-dcnode-id="556"><h1 class="css-0" data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">What Are Fever Dreams (and Why Do We Have Them)?</span></h1><section class="css-jy1umg" data-dcnode-id="1462" data-testid="byline"><div class="css-1q67gt9 css-0" data-dcnode-id="1475"><div class="css-quwpxp" data-dcnode-id="1476"><img alt="" data-dcnode-id="1477" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2018/09/TimothyLegg.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="1463"><span data-dcnode-id="1471"><span data-dcnode-id="1474" instrument_node="">Medically reviewed by </span><a class="css-zocu4s" data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/medical-team"><span data-dcnode-id="1473" instrument_node="">Timothy J. Legg, PhD, PsyD</span></a></span><span data-dcnode-id="1470" instrument_node=""> — </span><span data-dcnode-id="1466"><span data-dcnode-id="1469" instrument_node="">Written by </span><a class="css-zocu4s" data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/authors/julie-marks"><span data-dcnode-id="1468" instrument_node="">Julie Marks</span></a></span><span data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node=""> on February 25, 2020</span></span></div></section><div data-dcnode-id="629"><nav class="css-7u7i0a" data-dcnode-id="1445" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1446"><li class="css-t753mo" data-dcnode-id="1459"><a class="css-1ggiqr2" data-dcnode-id="1460" href="#about"><span data-dcnode-id="1461" instrument_node="">About</span></a></li><li class="css-t753mo" data-dcnode-id="1456"><a class="css-1ggiqr2" data-dcnode-id="1457" href="#causes"><span data-dcnode-id="1458" instrument_node="">Causes</span></a></li><li class="css-t753mo" data-dcnode-id="1453"><a class="css-1ggiqr2" data-dcnode-id="1454" href="#prevention"><span data-dcnode-id="1455" instrument_node="">Prevention</span></a></li><li class="css-t753mo" data-dcnode-id="1450"><a class="css-1ggiqr2" data-dcnode-id="1451" href="#vs-lucid-dreams"><span data-dcnode-id="1452" instrument_node="">Vs. lucid dreams</span></a></li><li class="css-t753mo" data-dcnode-id="1447"><a class="css-1ggiqr2" data-dcnode-id="1448" href="#takeaway"><span data-dcnode-id="1449" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="634"><div class="css-1u22pos" data-dcnode-id="1414"><span data-dcnode-id="1444" style="font-size:0;line-height:0"></span><div data-dcnode-id="1431"><figure class="css-yhe8zq" data-dcnode-id="1432"><span class="css-rwmw5v" data-dcnode-id="1433"><span class="css-mjp0j9" data-dcnode-id="1438"><picture class="css-16pk1is" data-dcnode-id="1439"><source data-dcnode-id="1443" media="(min-width: 1190px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/02/sick_man_waking_from_bad_dream-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1442" media="(min-width: 990px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/02/sick_man_waking_from_bad_dream-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1441" media="(min-width: 768px)" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2020/02/sick_man_waking_from_bad_dream-1296x728-header.jpg?w=1845 879w"><img alt="" class="css-1jytyml" data-dcnode-id="1440" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.healthline.com/wp-content/uploads/2020/02/sick_man_waking_from_bad_dream-1296x728-header.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1434"><a class="icon-hl-pinterest css-1w9qmip" data-dcnode-id="1435" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=5GQsrBaw8v9w-1&amp;url=https%3A%2F%2Fwww.healthline.com%2Fhealth%2Ffever-dream&amp;media=https%3A%2F%2Fpost.healthline.com%2Fwp-content%2Fuploads%2F2020%2F02%2Fsick_man_waking_from_bad_dream-1296x728-header.jpg&amp;description=Fever%20Dreams%3A%20Symptoms%2C%20Causes%2C%20and%20Prevention" data-pin-log="button_pinit" data-share-url="https://post.healthline.com/wp-content/uploads/2020/02/sick_man_waking_from_bad_dream-1296x728-header.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span></figure></div><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">If you’ve ever had a particularly intense dream while you’re sick, it may have been a fever dream. </span></p><p data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">A fever dream is a term used to describe </span><a class="content-link css-5r4717" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/vivid-dreams-causes"><span data-dcnode-id="1427" instrument_node="">vivid dreams</span></a><span data-dcnode-id="1425" instrument_node=""> you have when your body temperature is elevated. </span></p><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">For many people, these dreams can be disturbing and unpleasant. </span></p><div data-dcnode-id="1421" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1415"><aside class="css-0 css-0" data-dcnode-id="1416"><div data-dcnode-id="1417"><div class="css-10gx9pb" data-dcnode-id="1418" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1420"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1419" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1328"><span data-dcnode-id="1413" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1409"><div data-dcnode-id="1410"><a class="chartbeat-section" data-dcnode-id="1411" name="about"><span data-dcnode-id="1412" instrument_node="">What is a fever dream?</span></a></div></h2><p data-dcnode-id="1401"><span data-dcnode-id="1408" instrument_node="">A </span><a class="content-link css-5r4717" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/why-do-we-dream"><span data-dcnode-id="1407" instrument_node="">dream</span></a><span data-dcnode-id="1405" instrument_node=""> is essentially a series of thoughts, images, and sensations you have while sleeping. Scientists believe you have your strongest dreams during the </span><a class="content-link css-5r4717" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/deep-sleep"><span data-dcnode-id="1404" instrument_node="">rapid eye movement (REM) stage of sleep</span></a><span data-dcnode-id="1402" instrument_node="">. </span></p><p data-dcnode-id="1396"><span data-dcnode-id="1400" instrument_node="">Though researchers don’t know exactly </span><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">why</span></em><span data-dcnode-id="1397" instrument_node=""> you dream, certain factors such as daily activities, foods, and health conditions might influence your sleep visions.</span></p><h3 data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">When do they occur?</span></h3><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">A fever dream occurs when your body temperature is higher than usual.</span></p><p data-dcnode-id="1384"><span data-dcnode-id="1391" instrument_node="">A </span><a class="content-link css-5r4717" data-dcnode-id="1389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-normal-body-temperature"><span data-dcnode-id="1390" instrument_node="">normal body temperature</span></a><span data-dcnode-id="1388" instrument_node=""> ranges, usually between </span><a class="content-link css-5r4717" data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayoclinic.org/first-aid/first-aid-fever/basics/art-20056685" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1387" instrument_node="">97 and 99°F</span></a><span data-dcnode-id="1385" instrument_node="">. Anything higher than 2 degrees above your normal temperature is considered a fever. </span></p><p data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">You might develop a </span><a class="content-link css-5r4717" data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/fever"><span data-dcnode-id="1382" instrument_node="">fever</span></a><span data-dcnode-id="1380" instrument_node=""> because your body is responding to:</span></p><ul data-dcnode-id="1366"><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">a viral or bacterial infection</span></li><li data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">heat exhaustion </span></li><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">certain inflammatory conditions such as rheumatoid arthritis</span></li><li data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">medicines, such as antibiotics</span></li><li data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">an immunization </span></li><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">a tumor</span></li></ul><h3 data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">What are fever dreams like?</span></h3><p data-dcnode-id="1359"><span data-dcnode-id="1363" instrument_node="">Most people describe fever dreams as a distressing experience. In fact, in one 2016 study, about </span><a class="content-link css-5r4717" data-dcnode-id="1361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.ub.uni-heidelberg.de/index.php/IJoDR/article/view/28492" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1362" instrument_node="">94 percent</span></a><span data-dcnode-id="1360" instrument_node=""> of participants described their fever dreams as negative. </span></p><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Though a fever dream is known in medical literature, scientific studies on the phenomenon are limited. </span></p><p data-dcnode-id="1344"><span data-dcnode-id="1356" instrument_node="">In a </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="1349" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3830719/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1355" instrument_node="">small 2013 study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="1352"><span class="sro" data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1350"></span></hl-trusted-source><span data-dcnode-id="1348" instrument_node="">, scientists surveyed participants’ </span><a class="content-link css-5r4717" data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/fever-symptoms"><span data-dcnode-id="1347" instrument_node="">fever symptoms</span></a><span data-dcnode-id="1345" instrument_node="">. Results showed 11 percent of them reported fever dreams. </span></p><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">People often describe a fever dream as emotionally intense, troubling, strange, or scary. These dreams may also include less social interaction scenarios than normal dreams. </span></p><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">In the 2013 study, one volunteer said their dreams would move “back and forth between a very difficult circumstance and a very comfortable circumstance.” </span></p><p data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">A </span><a class="content-link css-5r4717" data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fpsyg.2020.00053/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1338" instrument_node="">recent online study</span></a><span data-dcnode-id="1336" instrument_node=""> looked at 164 individuals, 100 of whom reported a recent fever dream. The authors found that fever dreams were more bizarre, negatively toned, and included more references to health and temperature perception compared to normal dreams. </span></p><div class="css-1cg0byz" data-dcnode-id="1329"><aside class="css-0 css-0" data-dcnode-id="1330"><div data-dcnode-id="1331"><div class="css-az6x7v" data-dcnode-id="1332" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1334"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1333" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1302"><span data-dcnode-id="1327" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1323"><div data-dcnode-id="1324"><a class="chartbeat-section" data-dcnode-id="1325" name="causes"><span data-dcnode-id="1326" instrument_node="">Why do we get fever dreams?</span></a></div></h2><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Scientists don’t know exactly why fever dreams occur, but there are some theories.</span></p><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">One is that high temperatures might disrupt the brain’s normal cognitive processes.</span></p><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">Authors of the 2020 </span><a class="content-link css-5r4717" data-dcnode-id="1316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fpsyg.2020.00053/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1317" instrument_node="">study</span></a><span data-dcnode-id="1315" instrument_node=""> wrote, “The basic idea is that the ‘over-heated’ brain is not functioning properly and, therefore, dreams are more bizarre.” </span></p><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">During the REM stage of sleep, where most of your vivid dreams occur, your body tends to have a harder time controlling your internal temperature. A fever may add to this already strained process, which can lead to the unpleasant dreams. </span></p><p data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Fevers might also trigger waking hallucinations (seeing things that aren’t really there), irritability, and confusion. </span></p><div data-dcnode-id="1309" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="1303"><aside class="css-0 css-0" data-dcnode-id="1304"><div data-dcnode-id="1305"><div class="css-10gx9pb" data-dcnode-id="1306" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1308"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="1307" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1279"><span data-dcnode-id="1301" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1297"><div data-dcnode-id="1298"><a class="chartbeat-section" data-dcnode-id="1299" name="prevention"><span data-dcnode-id="1300" instrument_node="">Can you prevent fever dreams?</span></a></div></h2><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">There might not be a foolproof way to prevent fever dreams altogether but controlling your body temperature could be helpful. </span></p><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">If you have a fever, be sure to:</span></p><ul data-dcnode-id="1282"><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">get plenty of rest</span></li><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">drink lots of fluids</span></li><li data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">take a fever-reducing medicine, such as ibuprofen (Advil), acetaminophen (Tylenol), or aspirin </span></li><li data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">eat foods that are easy to digest</span></li><li data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">bathe in lukewarm water </span></li></ul><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="1281" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="1280" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="1262"><span data-dcnode-id="1278" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1274"><div data-dcnode-id="1275"><a class="chartbeat-section" data-dcnode-id="1276" name="vs-lucid-dreams"><span data-dcnode-id="1277" instrument_node="">Are fever dreams similar to lucid dreams?</span></a></div></h2><p data-dcnode-id="1269"><span data-dcnode-id="1273" instrument_node="">Fever dreams share some of the same symptoms as </span><a class="content-link css-5r4717" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/what-is-lucid-dreaming"><span data-dcnode-id="1272" instrument_node="">lucid dreams</span></a><span data-dcnode-id="1270" instrument_node="">, which are dreams that happen when you’re aware that you’re dreaming.</span></p><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">People who have both fever dreams and lucid dreams are able to recall the details of their dreams. Both types also occur in the REM stage of sleep. </span></p><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">But, lucid dreams aren’t linked to higher body temperature, and they aren’t always unpleasant or negative in nature like fever dreams.</span></p><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Additionally, lucid dreams are sometimes controllable, meaning you can train yourself to have one.</span></p></div><div class="css-0" data-dcnode-id="635"><span data-dcnode-id="1261" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1257"><div data-dcnode-id="1258"><a class="chartbeat-section" data-dcnode-id="1259" name="takeaway"><span data-dcnode-id="1260" instrument_node="">Key takeaways</span></a></div></h2><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Fever dreams are a mysterious occurrence that happen when your body temperature rises. They’re usually described as a disturbing and stressful experience. </span></p><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">While there’s no guarantee you can completely prevent a fever dream, treating your fever may help control these vivid nightmares. </span></p><div class="wp-block-healthline-jwplayer" data-dcnode-id="636"><div data-dcnode-id="637" data-testid="jwplayer-wrapper"><div class="css-1yrgzfi" data-dcnode-id="638"><span class="inner-wrapper" data-dcnode-id="717"><div class="css-74k9pf" data-dcnode-id="718"><div aria-describedby="jw-shortcuts-tooltip-explanation"
