rument_node="">Coping With Schizophrenia, When Emotions Can Be Too Much</span></div></div><div class="share-it tipi-vertical-c" data-dcnode-id="1169" id="sticky-p2-share"><a aria-label="Share" class="share-button share-button-fb" data-dcnode-id="1175" data-title="Share" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fneurosciencenews.com%252Fschizophrenai-emotional-regulation-19777%252F" rel="noopener nofollow" target="_blank"><span class="share-button-content tipi-vertical-c" data-dcnode-id="1176"><i class="tipi-i-facebook" data-dcnode-id="1179"></i><span class="social-tip font-base font-1" data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Share</span></span></span></a><a aria-label="Tweet" class="share-button share-button-tw" data-dcnode-id="1170" data-title="Tweet" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Fvia%3Dneurosciencenew%26text%3DCoping%2520With%2520Schizophrenia%252C%2520When%2520Emotions%2520Can%2520Be%2520Too%2520Much%2520-%2520https%253A%252F%252Fneurosciencenews.com%252Fschizophrenai-emotional-regulation-19777%252F" rel="noopener nofollow" target="_blank"><span class="share-button-content tipi-vertical-c" data-dcnode-id="1171"><i class="tipi-i-twitter" data-dcnode-id="1174"></i><span class="social-tip font-base font-1" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Tweet</span></span></span></a></div></div></div></div></div></nav><div class="site-content clearfix" data-dcnode-id="660" id="content"><div class="content-area" data-dcnode-id="662" id="primary"><div class="post-wrap clearfix article-layout-skin-1 title-beneath-c hero-m sidebar-on sidebar-right hero-fi-off post-79340 post type-post status-publish format-standard has-post-thumbnail hentry category-featured category-psychology tag-anxiety tag-brain-research tag-emotional-regulation tag-emotions tag-mental-health tag-neurobiology tag-neuroscience tag-psychology tag-schizophrenia tag-stress tag-university-of-georgia mv-content-wrapper" data-dcnode-id="664"><div class="breadcrumbs-wrap breadcrumbs-sz-m" data-dcnode-id="1145"><div class="breadcrumbs" data-dcnode-id="1146"><div class="crumb" data-dcnode-id="1156"><span data-dcnode-id="1162" instrument_node=""> </span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/"><span data-dcnode-id="1161" instrument_node=""> </span><span data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Home</span></span><span data-dcnode-id="1158" instrument_node=""> </span></a></div><span data-dcnode-id="1155" instrument_node=""> </span><i class="tipi-i-chevron-right" data-dcnode-id="1154"></i><div class="crumb" data-dcnode-id="1147"><span data-dcnode-id="1153" instrument_node=""> </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/"><span data-dcnode-id="1152" instrument_node=""> </span><span data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Featured</span></span><span data-dcnode-id="1149" instrument_node=""> </span></a></div></div></div><div class="meta-wrap hero-meta tipi-m-typo elements-design-1 clearfix tipi-row content-bg" data-dcnode-id="1129"><div class="meta meta-no-sub" data-dcnode-id="1130"><div class="title-wrap" data-dcnode-id="1142"><h1 class="entry-title title flipboard-title" data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Coping With Schizophrenia, When Emotions Can Be Too Much</span></h1></div><div class="byline byline-3 byline-cats-design-2" data-dcnode-id="1131"><div class="byline-part cats" data-dcnode-id="1137"><a class="cat cat-with-bg" data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/" style="background-color:#020098"><span data-dcnode-id="1141" instrument_node="">Featured</span></a><a class="cat cat-with-bg" data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/psychology/" style="background-color:#de3600"><span data-dcnode-id="1139" instrument_node="">Psychology</span></a></div><span class="byline-part separator separator-date" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="1132"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="1133" datetime="2021-12-08T16:39:09-08:00"><span data-dcnode-id="1134" instrument_node="">December 8, 2021</span></time></span></div></div></div><div class="single-content contents-wrap tipi-row content-bg clearfix article-layout-1" data-dcnode-id="666"><div class="tipi-cols clearfix" data-dcnode-id="668"><main class="site-main tipi-xs-12 main-block-wrap block-wrap tipi-col clearfix tipi-l-8" data-dcnode-id="805"><article data-dcnode-id="807"><div class="entry-content-wrap clearfix" data-dcnode-id="947"><div class="entry-content body-color clearfix link-color-wrap" data-dcnode-id="949"><p data-dcnode-id="1122"><strong data-dcnode-id="1125"><em data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Summary: </span></em></strong><em data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">People with schizophrenia struggle to manage low-level negative emotions as the negative emotions increase. Those with schizophrenia are less likely to employ coping strategies when stressed than those without the disorder, causing an escalation in their negative emotions.</span></em></p><p data-dcnode-id="1116"><strong data-dcnode-id="1119"><em data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Source: </span></em></strong><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">University of Georgia</span></em></p><p data-dcnode-id="1113"><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">A person with schizophrenia typically experiences more negative emotions and has more stressors than average. </span></strong></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">A new study by University of Georgia psychologists has revealed a surprising finding that could help those who struggle with the illness: While people with schizophrenia tend to manage low-level negative emotions, they struggle to do so as those negative emotions increase.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">People regulate their emotions to get from one feeling to a more preferred state, whether that is a return to calm, a move toward happiness, not feeling quite as angry, or leveraging a different emotion entirely.</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Using clinical data from outpatients diagnosed with&nbsp;psychotic disorders&nbsp;and a control group, the study focused on the identification stage of emotion regulation and how the process differs. The researchers used a scale that translates to 1-10 for levels of negative emotion, with 10 representing the highest state of anxiety or emotional distress.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">“The idea of identification in a healthy person tracks as you would expect: As negative emotion increases, they’re more likely to manage that,” said Ian Raugh, doctoral candidate and lead author on the new study. “At lower levels, say 1 or 2, you’re probably not going to do anything to change it. But as the level of negative emotion goes up, a healthy person is much more likely to engage in efforts to change how they are feeling.”</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">However, the researchers found that emotion regulation does not ramp up in the same way in people suffering from&nbsp;schizophrenia.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">At higher stress levels, a healthy person works to manage their emotions, whereas someone with schizophrenia won’t or can’t do that.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">“They’re actually less likely. That’s really the abnormality, that people with schizophrenia don’t seem to be trying to manage their emotions as much when their emotions are really high,” he said.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">Raugh said sufferers of schizophrenia are less likely to employ&nbsp;coping strategies&nbsp;or&nbsp;emotion regulation&nbsp;to make themselves feel better. And as situations escalate in a negative direction, they become less likely to try to change the situation for the better.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">“The terms we use in psychology are ‘learned helplessness’ or ‘defeatists beliefs,” where people think ‘oh, it’s not going to work even if I try so why bother,” which is common in depression as well. And so, there’s that aspect probably driving less attempts at higher levels.”</span></p><figure class="wp-block-image size-full" data-dcnode-id="1091"><img alt="This shows the outline of a head filled with bright balls" class="wp-image-79341" data-dcnode-id="1094" height="544" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/files/2021/12/schizophrenia-emotions-neurosicencs-public.jpg&amp;raw" srcset="https://neurosciencenews.com/files/2021/12/schizophrenia-emotions-neurosicencs-public.jpg 770w, https://neurosciencenews.com/files/2021/12/schizophrenia-emotions-neurosicencs-public-300x212.jpg 300w, https://neurosciencenews.com/files/2021/12/schizophrenia-emotions-neurosicencs-public-293x207.jpg 293w, https://neurosciencenews.com/files/2021/12/schizophrenia-emotions-neurosicencs-public-150x106.jpg 150w" width="770"><figcaption data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">However, the researchers found that emotion regulation does not ramp up in the same way in people suffering from schizophrenia. Image is in the public domain</span></figcaption></figure><p data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Researchers also weighed the possibility that people with schizophrenia are simply exhausted. Because they’re also regulating when negative emotion is low, they might be expending their effort when it’s least effective to do so or when they experience the fewest benefits. And so, when their emotions are really intense, it’s a lot harder.</span></p><p data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">“A lot of that comes down to they’re not regulating as much when it would be most advantageous to do so,” Raugh said. “Our future studies will try to understand more about why they would regulate less at higher levels.”</span></p><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">“Our next goal is to determine whether the same abnormality exists in youth at risk for schizophrenia,” said Gregory Strauss, associate professor of psychology, director of the UGA Clinical Affective Neuroscience Laboratory, and senior author on the study. “Heightened stress reactivity has long been seen as a key risk factor, but these results suggest that regulating that stress response must also be considered. If the same problems are also present years before the illness onset, tailored psychological treatments may have promise for preventing schizophrenia.”</span></p><h2 data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">About this emotional regulation and schizophrenia research news</span></h2><p class="has-background" data-dcnode-id="1065" style="background-color:#ffffe8"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Author: </span></strong><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uga.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1080" instrument_node="">Alan Flurry</span></a><br data-dcnode-id="1078"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Source: </span></strong><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uga.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1075" instrument_node="">University of Georgia</span></a><br data-dcnode-id="1073"><strong data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Contact: </span></strong><span data-dcnode-id="1070" instrument_node="">Alan Flurry – University of Georgia</span><br data-dcnode-id="1069"><strong data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Image: </span></strong><span data-dcnode-id="1066" instrument_node="">The image is in the public domain</span></p><p class="has-background" data-dcnode-id="1052" style="background-color:#ffffe8"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Original Research: </span></strong><span data-dcnode-id="1062" instrument_node="">Closed access.</span><br data-dcnode-id="1061"><span data-dcnode-id="1060" instrument_node="">“</span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s00406-021-01350-z" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1059" instrument_node="">Deconstructing emotion regulation in schizophrenia: the nature and consequences of abnormalities at the identification stage</span></a><span data-dcnode-id="1057" instrument_node="">” by Ian M. Raugh et al. </span><em data-dcnode-id="1053"><em data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">European Archives of Psychiatry and Clinical Neuroscience</span></em><span data-dcnode-id="1054" instrument_node="">&nbsp;</span></em></p><hr class="wp-block-separator has-text-color has-background has-pale-cyan-blue-background-color has-pale-cyan-blue-color" data-dcnode-id="1051"><p data-dcnode-id="1048"><strong data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Abstract</span></strong></p><p data-dcnode-id="1047"></p><div class="inline-post clearfix" data-dcnode-id="1013"><div class="see-also byline" data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">See also</span></div><div class="block-wrap-native block-wrap block-wrap-23 block-css-92228 block-wrap-classic columns__m--1 elements-design-1 block-ani block-skin-0 tipi-box block-wrap-thumbnail ppl-m-1 clearfix loaded" data-base="0" data-dcnode-id="1014" data-id="92228" id="block-wrap-92228"><div class="tipi-row-inner-style clearfix" data-dcnode-id="1015"><div class="tipi-row-inner-box contents sticky--wrap" data-dcnode-id="1016"><div class="block block-23 clearfix" data-dcnode-id="1017"><article class="tipi-xs-12 clearfix with-fi ani-base tipi-xs-typo split-1 split-design-1 loop-0 preview-thumbnail preview-23 elements-design-1 post-80645 post type-post status-publish format-standard has-post-thumbnail hentry category-featured category-neuroscience category-psychology tag-brain-research tag-lsd tag-lsd-microdosing tag-mental-health tag-microdosing tag-neurobiology tag-neuroscience tag-psychedelics tag-psychology tag-psychopharmacology tag-university-of-chicago mv-content-wrapper article-window" data-dcnode-id="1018" style="--animation-order:0"><div class="preview-mini-wrap clearfix" data-dcnode-id="1019"><div class="mask" data-dcnode-id="1042"><a class="mask-img" data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/lsd-microdosing-20085/"><img alt="This shows a psychedelic brain" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="1044" height="100" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/files/2022/02/lsd-microdosing-neurosinces-public-100x100.jpg&amp;raw" srcset="https://neurosciencenews.com/files/2022/02/lsd-microdosing-neurosinces-public-100x100.jpg 100w, https://neurosciencenews.com/files/2022/02/lsd-microdosing-neurosinces-public-293x293.jpg 293w, https://neurosciencenews.com/files/2022/02/lsd-microdosing-neurosinces-public-390x390.jpg 390w, https://neurosciencenews.com/files/2022/02/lsd-microdosing-neurosinces-public-96x96.jpg 96w" width="100"></a></div><div class="meta" data-dcnode-id="1020"><div class="byline byline-2 byline-cats-design-2" data-dcnode-id="1025"><div class="byline-part cats" data-dcnode-id="1035"><a class="cat cat-with-bg" data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/" style="background-color:#020098"><span data-dcnode-id="1041" instrument_node="">Featured</span></a><a class="cat cat-with-bg" data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/neuroscience/" style="background-color:#0d58db"><span data-dcnode-id="1039" instrument_node="">Neuroscience</span></a><a class="cat cat-with-bg" data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/psychology/" style="background-color:#de3600"><span data-dcnode-id="1037" instrument_node="">Psychology</span></a></div><span class="byline-part separator separator-date" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="1030"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="1031" datetime="2022-02-17T14:36:37-08:00"><span data-dcnode-id="1032" instrument_node="">February 17, 2022</span></time></span><span class="byline-part separator separator-readtime" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">·</span></span><span class="byline-part read-time" data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">5 min read</span></span></div><div class="title-wrap" data-dcnode-id="1021"><h3 class="title" data-dcnode-id="1022"><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/lsd-microdosing-20085/"><span data-dcnode-id="1024" instrument_node="">Study of LSD Microdosing Doesn’t Show a Therapeutic Effect</span></a></h3></div></div></div></article></div></div></div></div></div><p data-dcnode-id="1012"></p><p data-dcnode-id="1009"><strong data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">Deconstructing emotion regulation in schizophrenia: the nature and consequences of abnormalities at the identification stage</span></strong></p><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Existing evidence suggests that emotion regulation is abnormal in schizophrenia and associated with undesirable clinical outcomes. However, this literature is based predominantly on trait self-report and does not indicate which stages of emotion regulation (identification, selection, implementation) are impaired.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1006" instrument_node="">The current study focused on determining the nature of abnormalities at the identification stage using ecological momentary assessment (EMA). Participants included clinically stable outpatients with schizophrenia (SZ;&nbsp;</span><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">n</span></em><span data-dcnode-id="1003" instrument_node=""> = 48) and healthy controls (CN;&nbsp;</span><em data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">n</span></em><span data-dcnode-id="1000" instrument_node=""> = 52) who completed 6&nbsp;days of EMA. The EMA surveys assessed emotional experience, emotion regulation, and symptoms.</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Results indicated that SZ identified the need to regulate at a higher rate than CN. Specifically, SZ displayed an inefficient threshold for identifying the need to regulate, such that they regulated too much when negative affect was low and too little when negative affect was high.</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Emotion regulation effort exertion was also inefficient, such that effort was too high at low levels of negative affect and too low at high levels of negative affect in SZ. These identification stage abnormalities also demonstrated differential associations with positive and negative symptoms. Findings suggest that identification stage abnormalities may create a bottleneck that feeds forward and impacts subsequent stages of emotion regulation in SZ that are critically related to symptoms.</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Targeting the psychological processes underlying these identification stage abnormalities might offer a novel means of treating positive and negative symptoms in schizophrenia.</span></p><span data-dcnode-id="992" instrument_node=""> </span><span data-dcnode-id="990" instrument_node=""> </span><div class="optinforms-form-container" data-dcnode-id="956" id="optinforms-form5-container"><form action="https://www.aweber.com/scripts/addlead.pl" data-dcnode-id="957" method="post"><input data-dcnode-id="988" name="listname" type="hidden" value="awlist4561465"><input data-dcnode-id="987" name="redirect" type="hidden" value=""><input data-dcnode-id="986" name="meta_message" type="hidden" value="1"><div data-dcnode-id="960" id="optinforms-form5" style="background:#002f77;"><div data-dcnode-id="971" id=
