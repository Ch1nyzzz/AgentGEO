otions?</span></div></div><div class="share-it tipi-vertical-c" data-dcnode-id="1182" id="sticky-p2-share"><a aria-label="Share" class="share-button share-button-fb" data-dcnode-id="1188" data-title="Share" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fneurosciencenews.com%252Fsupportive-emotional-regulation-19764%252F" rel="noopener nofollow" target="_blank"><span class="share-button-content tipi-vertical-c" data-dcnode-id="1189"><i class="tipi-i-facebook" data-dcnode-id="1192"></i><span class="social-tip font-base font-1" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Share</span></span></span></a><a aria-label="Tweet" class="share-button share-button-tw" data-dcnode-id="1183" data-title="Tweet" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Fvia%3Dneurosciencenew%26text%3DHow%2520Do%2520Others%2520Help%2520Us%2520Regulate%2520Emotions%253F%2520-%2520https%253A%252F%252Fneurosciencenews.com%252Fsupportive-emotional-regulation-19764%252F" rel="noopener nofollow" target="_blank"><span class="share-button-content tipi-vertical-c" data-dcnode-id="1184"><i class="tipi-i-twitter" data-dcnode-id="1187"></i><span class="social-tip font-base font-1" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">Tweet</span></span></span></a></div></div></div></div></div></nav><div class="site-content clearfix" data-dcnode-id="660" id="content"><div class="content-area" data-dcnode-id="662" id="primary"><div class="post-wrap clearfix article-layout-skin-1 title-beneath-c hero-m sidebar-on sidebar-right hero-fi-off post-79287 post type-post status-publish format-standard has-post-thumbnail hentry category-featured category-neuroscience category-psychology tag-brain-research tag-emotion tag-emotional-regulation tag-empathy tag-neurobiology tag-neuroscience tag-psychology tag-social-behavior tag-social-neuroscience tag-wustl mv-content-wrapper" data-dcnode-id="664"><div class="breadcrumbs-wrap breadcrumbs-sz-m" data-dcnode-id="1158"><div class="breadcrumbs" data-dcnode-id="1159"><div class="crumb" data-dcnode-id="1169"><span data-dcnode-id="1175" instrument_node=""> </span><a data-dcnode-id="1170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/"><span data-dcnode-id="1174" instrument_node=""> </span><span data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Home</span></span><span data-dcnode-id="1171" instrument_node=""> </span></a></div><span data-dcnode-id="1168" instrument_node=""> </span><i class="tipi-i-chevron-right" data-dcnode-id="1167"></i><div class="crumb" data-dcnode-id="1160"><span data-dcnode-id="1166" instrument_node=""> </span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/"><span data-dcnode-id="1165" instrument_node=""> </span><span data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">Featured</span></span><span data-dcnode-id="1162" instrument_node=""> </span></a></div></div></div><div class="meta-wrap hero-meta tipi-m-typo elements-design-1 clearfix tipi-row content-bg" data-dcnode-id="1140"><div class="meta meta-no-sub" data-dcnode-id="1141"><div class="title-wrap" data-dcnode-id="1155"><h1 class="entry-title title flipboard-title" data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">How Do Others Help Us Regulate Emotions?</span></h1></div><div class="byline byline-3 byline-cats-design-2" data-dcnode-id="1142"><div class="byline-part cats" data-dcnode-id="1148"><a class="cat cat-with-bg" data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/" style="background-color:#020098"><span data-dcnode-id="1154" instrument_node="">Featured</span></a><a class="cat cat-with-bg" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/neuroscience/" style="background-color:#0d58db"><span data-dcnode-id="1152" instrument_node="">Neuroscience</span></a><a class="cat cat-with-bg" data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/psychology/" style="background-color:#de3600"><span data-dcnode-id="1150" instrument_node="">Psychology</span></a></div><span class="byline-part separator separator-date" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="1143"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="1144" datetime="2021-12-07T13:46:39-08:00"><span data-dcnode-id="1145" instrument_node="">December 7, 2021</span></time></span></div></div></div><div class="single-content contents-wrap tipi-row content-bg clearfix article-layout-1" data-dcnode-id="666"><div class="tipi-cols clearfix" data-dcnode-id="668"><main class="site-main tipi-xs-12 main-block-wrap block-wrap tipi-col clearfix tipi-l-8" data-dcnode-id="805"><article data-dcnode-id="807"><div class="entry-content-wrap clearfix" data-dcnode-id="945"><div class="entry-content body-color clearfix link-color-wrap" data-dcnode-id="947"><p data-dcnode-id="1133"><strong data-dcnode-id="1136"><em data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Summary: </span></em></strong><em data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">While interpersonal emotional regulation appears to be ubiquitous and the people we reach out to are often supportive, they may not always provide the emotional support we are looking for.</span></em></p><p data-dcnode-id="1127"><strong data-dcnode-id="1130"><em data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Source: </span></em></strong><em data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">WUSTL</span></em></p><p data-dcnode-id="1124"><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">When COVID-19 hit, many people were suddenly cut off from their social support systems, the people with whom we often share our emotional lives: They who listen to our grievances, share in our happiness, or just sit there, being bored with us.</span></strong></p><p data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Is that a problem? How much do we depend on others to help us regulate our emotions? Although there is a rich history in examining how individuals regulate their own emotions, not much is known about the roles played by others.</span></p><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">A study from the lab of Renee J. Thompson, associate professor of psychological and brain sciences in Arts &amp; Sciences at Washington University in St. Louis, has begun gathering information to better understand the role of others when it comes to regulating our emotions, a process called interpersonal emotion regulation.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1119" instrument_node="">Results were published earlier this year in the journal&nbsp;</span><em data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Affective Science</span></em><span data-dcnode-id="1116" instrument_node="">.</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Preliminary results suggest that interpersonal emotion regulation is ubiquitous, and that although the people we reach out to are often supportive, they might not always provide the exact kind of support we’re looking for.</span></p><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">For the study, a group of 50 women and 37 men were prompted five times a day for two weeks to answer survey questions about whether, with whom, and why they shared any negative emotional experiences. They also were asked how the other person responded.</span></p><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">“We really just wanted to understand the phenomenon, at a basic level, in participants’ natural settings,” said first author Daphne Liu, a Ph.D. candidate in Thompson’s lab. “How often do people reach out? In what form? And when they do, how do others respond?”</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">Liu found that people share negative emotions quite often, on average about every other day. She speculated, however, that people share more than they reported in the study because participants only reported on interactions with a single person, and they only reported one interaction per survey prompt.</span></p><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">As the researchers expected, people were much more likely to share their negative experiences with someone they were close to—a romantic partner, family member, or friend—than people like colleagues or acquaintances.</span></p><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">When they shared their experiences, participants said they also were more likely to receive supportive responses such as affection and positive perspectives than unsupportive ones such as being blamed or invalidated.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">However, while the responses were positive, more than half the time, participants reported they weren’t exactly what they were seeking.</span></p><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">“From clinical and daily experiences, often when people share negative&nbsp;feelings, they just want to be heard and understood, rather than have their problem fixed or change their thinking,” Liu said. To see if this held true in the study group, the surveys asked them explicitly what kind of responses they wanted.</span></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">“The overwhelming majority of the participants said they were seeking empathy, care and understanding (an emotion-oriented response) rather than advice, help or information (a problem-oriented response) from their sharing partners,” Liu said. Even though they were given the option to choose both, emotion-oriented and problem-focused response, more than half selected&nbsp;emotional&nbsp;support only.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">But according to the study participants, that’s not what they received from their sharing partner.</span></p><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">“The sharing partners were more likely to provide problem-oriented than emotion-oriented responses,” Liu said. For example, they suggested thinking differently about a problem as opposed to responding with affection or encouraging the participant to share more about their feelings.</span></p><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">In this research, participants also reported on how their feelings about the original problem and about the sharing partner changed following the interaction.</span></p><figure class="wp-block-image size-full" data-dcnode-id="1087"><img alt="This shows two friends hugging" class="wp-image-79288" data-dcnode-id="1090" height="534" sizes="(max-width: 770px) 100vw, 770px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/files/2021/12/emotional-regulatuions-others-neurosciences-public.jpg&amp;raw" srcset="https://neurosciencenews.com/files/2021/12/emotional-regulatuions-others-neurosciences-public.jpg 770w, https://neurosciencenews.com/files/2021/12/emotional-regulatuions-others-neurosciences-public-300x208.jpg 300w, https://neurosciencenews.com/files/2021/12/emotional-regulatuions-others-neurosciences-public-293x203.jpg 293w, https://neurosciencenews.com/files/2021/12/emotional-regulatuions-others-neurosciences-public-150x104.jpg 150w" width="770"><figcaption data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">Preliminary results suggest that interpersonal emotion regulation is ubiquitous, and that although the people we reach out to are often supportive, they might not always provide the exact kind of support we’re looking for. Image is in the public domain</span></figcaption></figure><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Liu plans to conduct further analyses to examine how the mismatch between what one wants and what one receives may affect these outcome. “One implication may be that people can be more direct with what they want from others in&nbsp;interactions,” she said, likening it to what happens in couples therapy. “Say one person wants to problem solve—we may want to slow down a little and ask, ‘Is this what your partner needs right now?'”</span></p><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">One thing to keep in mind, Liu stressed, is that these initial analyses were based on a group of healthy adults who did not have any psychiatric disorders. Because of this, the participants were not representative of the general population.</span></p><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">“One in five people in the U.S. has experienced major depression in their lifetime,” she said. “It is one of the most common and debilitating psychiatric disorders.”</span></p><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">However, this study also recruited participants with a history of major depressive disorder. Liu currently is examining how adults with depression behave differently when it comes to using their social resources to regulate their emotions compared to these healthy adults.</span></p><p data-dcnode-id="1078"></p><div class="inline-post clearfix" data-dcnode-id="1044"><div class="see-also byline" data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">See also</span></div><div class="block-wrap-native block-wrap block-wrap-23 block-css-21763 block-wrap-classic columns__m--1 elements-design-1 block-ani block-skin-0 tipi-box block-wrap-thumbnail ppl-m-1 clearfix loaded" data-base="0" data-dcnode-id="1045" data-id="21763" id="block-wrap-21763"><div class="tipi-row-inner-style clearfix" data-dcnode-id="1046"><div class="tipi-row-inner-box contents sticky--wrap" data-dcnode-id="1047"><div class="block block-23 clearfix" data-dcnode-id="1048"><article class="tipi-xs-12 clearfix with-fi ani-base tipi-xs-typo split-1 split-design-1 loop-0 preview-thumbnail preview-23 elements-design-1 post-80990 post type-post status-publish format-standard has-post-thumbnail hentry category-featured category-neuroscience category-open-neuroscience-articles tag-astrocytes tag-brain-research tag-connexins tag-hippocampus tag-learning tag-memory tag-neurobiology tag-neuroscience tag-open-access tag-open-science tag-spatial-learning tag-spatial-memory tag-university-of-zurich mv-content-wrapper article-window" data-dcnode-id="1049" style="--animation-order:0"><div class="preview-mini-wrap clearfix" data-dcnode-id="1050"><div class="mask" data-dcnode-id="1073"><a class="mask-img" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/astrocyte-spatial-memory-20155/"><img alt="This shows astrocytes" class="attachment-thumbnail size-thumbnail wp-post-image" data-dcnode-id="1075" height="100" sizes="(max-width: 100px) 100vw, 100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/files/2022/03/astrocytes-spatial-leanring-neurosnce-100x100.jpg&amp;raw" srcset="https://neurosciencenews.com/files/2022/03/astrocytes-spatial-leanring-neurosnce-100x100.jpg 100w, https://neurosciencenews.com/files/2022/03/astrocytes-spatial-leanring-neurosnce-293x293.jpg 293w, https://neurosciencenews.com/files/2022/03/astrocytes-spatial-leanring-neurosnce-390x390.jpg 390w, https://neurosciencenews.com/files/2022/03/astrocytes-spatial-leanring-neurosnce-96x96.jpg 96w" width="100"></a></div><div class="meta" data-dcnode-id="1051"><div class="byline byline-2 byline-cats-design-2" data-dcnode-id="1056"><div class="byline-part cats" data-dcnode-id="1066"><a class="cat cat-with-bg" data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/featured/" style="background-color:#020098"><span data-dcnode-id="1072" instrument_node="">Featured</span></a><a class="cat cat-with-bg" data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/neuroscience/" style="background-color:#0d58db"><span data-dcnode-id="1070" instrument_node="">Neuroscience</span></a><a class="cat cat-with-bg" data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/neuroscience-topics/open-neuroscience-articles/" style="background-color:#158900"><span data-dcnode-id="1068" instrument_node="">Open Neuroscience Articles</span></a></div><span class="byline-part separator separator-date" data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">·</span></span><span class="byline-part date" data-dcnode-id="1061"><time class="entry-date published dateCreated flipboard-date" data-dcnode-id="1062" datetime="2022-03-08T15:18:07-08:00"><span data-dcnode-id="1063" instrument_node="">March 8, 2022</span></time></span><span class="byline-part separator separator-readtime" data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">·</span></span><span class="byline-part read-time" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">4 min read</span></span></div><div class="title-wrap" data-dcnode-id="1052"><h3 class="title" data-dcnode-id="1053"><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurosciencenews.com/astrocyte-spatial-memory-20155/"><span data-dcnode-id="1055" instrument_node="">Astrocyte Networks in the Mouse Brain Control Spatial Learning and Memory</span></a></h3></div></div></div></article></div></div></div></div></div><p data-dcnode-id="1043"></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">“This is an exciting research direction we are pursuing,” Liu said. “There is so much research showing&nbsp;people&nbsp;with depression have difficulties with managing their emotions. They also experience difficulties in interpersonal contexts as well. Understanding interpersonal emotion regulation among depressed individuals would potentially inform treatment interventions for depression that target both of these aspects in which they have difficulties.”</span></p><h2 data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">About this psychology research news</span></h2><p class="has-background" data-dcnode-id="1021" style="background-color:#ffffe8"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Author: </span></strong><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wustl.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1036" instrument_node="">Brandie Jefferson</span></a><br data-dcnode-id="1034"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Source: </span></strong><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wustl.edu/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1031" instrument_node="">WUSTL</span></a><br data-dcnode-id="1029"><strong data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">Contact: </span></strong><span data-dcnode-id="1026" instrument_node="">Brandie Jefferson – WUSTL</span><br data-dcnode-id="1025"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Image: </span></strong><span data-dcnode-id="1022" instrument_node="">The image is in the public domain</span></p><p class="has-background" data-dcnode-id="1010" style="background-color:#ffffe8"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Original Research: </span></strong><span data-dcnode-id="1018" instrument_node="">Closed access.</span><br data-dcnode-id="1017"><span data-dcnode-id="1016" instrument_node="">“</span><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s42761-021-00044-y" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1015" instrument_node="">Interpersonal Emotion Regulation: an Experience Sampling Study</span></a><span data-dcnode-id="1013" instrument_node="">” by Daphne Y. Liu et al. </span><em data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Affective Science</span></em></p><hr class="wp-block-separator has-text-color has-background has-pale-cyan-blue-background-color has-pale-cyan-blue-color" data-dcnode-id="1009"><p data-dcnode-id="1006"><strong data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Abstract</span></strong></p><p data-dcnode-id="1003"><strong data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Interpersonal Emotion Regulation: an Experience Sampling Study</span></strong></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">People often turn to others for help with regulating their emotions, a process known as interpersonal emotion regulation (IER). Emerging research has begun to document the importance of IER in well-being. However, the basic elements of IER in daily life are still not clearly understood.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">We aimed to better understand the characteristics of adults’ everyday IER. In this 2-week experience sampling study (five surveys daily), 87 adults (mean age = 45.5 years) reported on whether, from whom (i.e., sharing partner role type and gender), and why (i.e., IER goals) they sought IER.</span></p><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">They also indicated which IER strategies their sharing partners used, including putatively supportive (i.e., reappraisal, problem solving, affection, encouraging sharing) and unsupportive (i.e., invalidation, blaming) strategies.</span></p><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Results showed that most people engaged in IER. Using multilevel modeling, we found that people tended to seek IER from close versus non-close others and were more likely to seek emotion-oriented (e.g., empathy) relative to problem-oriented goals (e.g., advice).</span></p><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Sharing partners were more likely to provide (a) supportive than unsupportive strategies, with reappraisal, problem solving, and affection being most frequently endorsed, and (b) problem-oriented supportive strategies (e.g., problem solving) than emotion-oriented supportive strategies (e.g., affection). We also explored gender and age differences in IER.</span></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">This research contributes to the broader emotion regulation literature by elucidating everyday IER behaviors in adults. Findings highlight the ubiquity of IER as well as people’s tendencies when seeking and providing IER.</span></p><span data-dcnode-id="990" instrument_node=""> </span><span data-dcnode-id="988" instrument_node=""> </span><div class="optinforms-form-container" data-dcnode-id="954" id="optinforms-form5-container"><form action="https://www.aweber.com/scripts/addlead.pl" data-dcnode-id="955" method="post"><input data-dcnode-id="986" name="listname" type="hidden" value="awlist4561465"><input data-dcnode-id="985" name="redirect" type="hidden" value=""><input data-dcnode-id="984" name="meta_message" type="hidden" value="1"><div data-dcnode-id="958" id="optinforms-form5" style="background:#002f77;"><div data-dcnode-id="969" id="optinforms-form5-container-left"><div data-dcnode-id="982" id="optinforms-form5-title" style="font-family:Georgia; font-size:24px; line-height:24px; color:#ffffff"><span data-dcnode-id="983" instrument_node="">Join our Newsletter</span></div><input data-dcnode-id="980" id="optinforms-form5-name-field" name="name" placeholder="Name" required="" style="font-family:Arial, Helvetica, sans-serif; font-size:18px; color:#bababa" type="text"><input data-dcnode-id="979" id="optinforms-form5-email-field" name="email" placeholder="Email" required="" style="font-family:Arial, Helvetica, sans-serif; font-size:18px; color:#bababa" type="text"><input data-dcnode-id="978" id="optinforms-form5-button" name="submit" style="font-family:Arial, Helvetica, sans-serif; font-size:18px; color:#FFFFFF; background-color:#04e517" type="submit" value="SUBSCRIBE"><div class="optinforms-confirm-checkbox optinforms-form1-confirm-checkbox" data-dcnode-id="971"><span data-dcnode-id="977" instrument_node=""> </span><input data-dcnode-id="976" required="" type="checkbox"><span data-dcnode-id="975" instrument_node=""> I agree to have my personal information transferred to AWeber for Neuroscience Newsletter ( </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aweber.com/privacy.htm" target="_blank"><span data-dcnode-id="974" instrument_node="">more information</span></a><span data-dcnode-id="972" instrument_node=""> )</span></div></div><div data-dcnode-id="961" id="optinforms-form5-container-right"><div data-dcnode-id="966" id="optinforms-form5-subtitle" style="font-family:Geor
