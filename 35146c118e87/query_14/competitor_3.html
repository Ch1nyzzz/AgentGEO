ps://schema.org/ListItem"><a class="breadcrumb-link" data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dreamstudies.org/category/dream-research/theories-of-dreaming-dream-research/" itemprop="item"><span class="breadcrumb-link-text-wrap" data-dcnode-id="998" itemprop="name"><span data-dcnode-id="999" instrument_node="">Theories of Dreaming</span></span></a><meta content="3" data-dcnode-id="996" itemprop="position"></span><span data-dcnode-id="994" instrument_node=""> </span><span aria-label="breadcrumb separator" data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">/</span></span><span data-dcnode-id="991" instrument_node=""> Allan Hobson and the Neuroscience of Dreams</span></div><article aria-label="Allan Hobson and the Neuroscience of Dreams" class="post-1618 post type-post status-publish format-standard category-theories-of-dreaming-dream-research tag-40hz-entrainment tag-activation-synthesis tag-aim-model tag-allan-hobson tag-anti-freudian tag-cognitive-neurophilosophy tag-dreams-and-neuroscience tag-freud tag-freudian-dream-theory tag-integral-psychology tag-integral-science tag-integral-theory tag-james-foulkes tag-john-antrobus tag-lucid-dreaming entry" data-dcnode-id="664" itemscope="" itemtype="https://schema.org/CreativeWork"><header class="entry-header" data-dcnode-id="979"><h1 class="entry-title" data-dcnode-id="988" itemprop="headline"><span data-dcnode-id="989" instrument_node="">Allan Hobson and the Neuroscience of Dreams</span></h1><span data-dcnode-id="987" instrument_node="">
</span><p class="entry-meta" data-dcnode-id="980"><span data-dcnode-id="986" instrument_node="">By </span><span class="entry-author" data-dcnode-id="982" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="entry-author-link" data-dcnode-id="983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dreamstudies.org/author/ryan-hurd/" itemprop="url" rel="author"><span class="entry-author-name" data-dcnode-id="984" itemprop="name"><span data-dcnode-id="985" instrument_node="">Ryan Hurd</span></span></a></span><span data-dcnode-id="981" instrument_node=""> </span></p></header><div class="entry-content" data-dcnode-id="799" itemprop="text"><p data-dcnode-id="977"><img alt="" class="alignnone size-full wp-image-1623" data-dcnode-id="978" height="444" loading="lazy" sizes="(max-width: 580px) 100vw, 580px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreamstudies.org/wp-content/uploads/2010/01/neuroscience-of-dreaming.jpg&amp;raw" srcset="https://dreamstudies.org/wp-content/uploads/2010/01/neuroscience-of-dreaming.jpg 580w, https://dreamstudies.org/wp-content/uploads/2010/01/neuroscience-of-dreaming-248x190.jpg 248w, https://dreamstudies.org/wp-content/uploads/2010/01/neuroscience-of-dreaming-522x400.jpg 522w" title="neuroscience of dreaming" width="580"></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The neuroscience of dreaming is a relatively new enterprise but has quickly become the major paradigm of experimental dream research today.&nbsp; J. Allan Hobson, Professor of Psychiatry Emeritus at Harvard University, is the undisputed celebrity of this scientific outlook, and the author of several popular books on the topic.&nbsp; Hobson, in his 30 years of tireless work, is also perhaps the greatest provocateur in the field of dream studies, stirring up old philosophical conflicts such as the value of objective science over experience, and mechanism over meaning.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">But what Hobson is really known for is sticking it to Freudian theory.&nbsp; In his break-out 1977 paper, Hobson and co-author McCarley declared victory over Freud (and the entire psychoanalytic community) by reporting their discovery that dreams in the REM state form by grace of neurochemical changes in the brain.&nbsp; As Kelly Bulkeley notes (1994), Hobson presented his work as a polemic against Freud, whose influence he accused of preventing scientific progress in the study of dreams.&nbsp; His central beef with Freudian theory is the notion that dreams are full of hidden messages by design. On the other hand, Hobson agrees with Jungian dream theory that dreams reveal more than they conceal, and can be quite transparent in significance.</span></p><span data-dcnode-id="970" instrument_node="">
</span><h2 data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">The Biochemistry of Dreaming</span></h2><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">Hobson argues that dreams are clumsy narratives stitched together by the forebrain to make sense of the activation of biochemical changes and erratic electric pulses originating in the brainstem.&nbsp; This is Hobson’s theory of dream formation in a nutshell, which he has updated many times over the last 30 years, and is still referred to as the </span><em data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">activation-synthesis hypothesis</span></em><span data-dcnode-id="963" instrument_node=""> of dream formation.</span></p><span data-dcnode-id="961" instrument_node="">
</span><blockquote class="pullquote pqRight" data-dcnode-id="958"><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">why dreams are so hard to remember: they are never encoded in short-term memory in the first place</span></p></blockquote><p data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">The theory sheds light on several aspects of dreaming cognition.&nbsp; Most importantly, Hobson’s discovery of the role of neurotransmitters in dreaming has stimulated robust research into the biochemistry of consciousness and revolutionized the way that mental illness is conceptualized in psychiatry.&nbsp; REM dreaming is characterized by low serotonin levels and high acetylcholine levels, which may explain </span><span class="pullquote" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">why dreams are so hard to remember: they are never encoded in short-term memory in the first place</span></span><span data-dcnode-id="954" instrument_node="">.&nbsp; When we wake up, serotonin floods the brain and our dream experiences from just a moment before are carried away by the tide.</span></p><span data-dcnode-id="952" instrument_node="">
</span><h3 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Why are Dreams so Weird?</span></h3><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="946"><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.flickr.com/photos/hijme/3592681092/"><img alt="" class="alignnone size-full wp-image-1624" data-dcnode-id="948" height="289" loading="lazy" sizes="(max-width: 582px) 100vw, 582px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreamstudies.org/wp-content/uploads/2010/01/floating-dream.jpg&amp;raw" srcset="https://dreamstudies.org/wp-content/uploads/2010/01/floating-dream.jpg 582w, https://dreamstudies.org/wp-content/uploads/2010/01/floating-dream-336x166.jpg 336w" title="floating dream" width="582"></a></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Hobson’s theory also offers a partial solution to why dreams are so wacky.&nbsp; In waking life, the brain performs reality checks and strings together logical stories to keep up with our thoughts, emotions and movements as we interact with the world.&nbsp; But in dreams, this ability is zapped when the serotonin valve is turned off, bringing about a state of consciousness ruled by strong emotions and uncanny sensations.&nbsp;&nbsp; It’s a chaotic place to be sentient, but the mind is so motivated to construct meaning that bizarre narratives are hastily thrown together so we can make order out of the mess.&nbsp; It’s a patch-job, at best, says Hobson.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="939"><strong data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Conflicts and New Solutions</span></strong></p><span data-dcnode-id="938" instrument_node="">
</span><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">One problem with Hobson’s original activation-synthesis model was that the theory presumes that all dreams occur in the REM state.&nbsp; However, two neuroscientists, James Foulkes and John Antrobus, have independently shown that long narrative dreams with bizarre elements can happen in non REM states too (see Rock 2004).&nbsp; Neuro-psychologist Mark Solms (1997) has also convincingly reframed the role of REM as an “alarm clock” for the mind to start dreaming, not as the prime creator.&nbsp; All of these researchers suggest that biochemical activation is not the sole genesis of a dream’s structure.</span></p><span data-dcnode-id="935" instrument_node="">
</span><blockquote class="pullquote" data-dcnode-id="932"><p data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">whenever someone suggests that “dreams are random nonsense,” you can helpfully remind them that view is 20 years out of date</span></p></blockquote><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Hobson (1999) responded to criticism by modifying his position with some new brain imaging data that shows that the forebrain (specifically the limbic areas) are also highly activated in REM.&nbsp; The implication here is that emotions may be as big a factor in dream genesis/structure as brainstem activation.&nbsp; In other words, </span><span class="pullquote" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">whenever someone suggests that “dreams are random nonsense,” you can helpfully remind them that view is 20 years out of date</span></span><span data-dcnode-id="928" instrument_node=""> and even the anti-Freudians have since changed their tune.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Since then, Hobson has widened his research interests, and is now after the Holy Grail in scientific philosophy: the mind/body problem, also known as the hard problem: how does brain relate to mind and consciousness?&nbsp; Hobson’s contribution is the AIM model of consciousness.&nbsp; AIM reaches far beyond REM dreams, and predicts possible states of consciousness by mapping the states along three lines of inquiry (instead of just one as in activation-synthesis).</span></p><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="920"><strong data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">The AIM Model of Consciousness</span></strong></p><span data-dcnode-id="919" instrument_node="">
</span><blockquote data-dcnode-id="910"><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="917" instrument_node="">1. Activation: how active is the brain, measurable in electrical activity?</span><br data-dcnode-id="916"><span data-dcnode-id="915" instrument_node=""> 2. Input source:&nbsp; is the generated imagery external, internal, or a combination?</span><br data-dcnode-id="914"><span data-dcnode-id="913" instrument_node=""> 3. Modulation: which neurochemical system is operating – the cholinergic (REM dreams and some altered states) or adrenergic (ordinary waking consciousness?</span></p><span data-dcnode-id="911" instrument_node="">
</span></blockquote><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="908" instrument_node="">A fun example for AIM is lucid dreaming, which Hobson describes as a “</span><a data-dcnode-id="906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.neurologyreviews.com/08%2520aug/AlteredDreaming.html"><span data-dcnode-id="907" instrument_node="">hybrid state</span></a><span data-dcnode-id="905" instrument_node=""> that features both waking and dreaming consciousness.”&nbsp; Recently, Hobson and his merry band found that while </span><a data-dcnode-id="903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreamstudies.org/2009/09/18/lucid-dreaming-hybrid-gamma-biurnal-beats/"><span data-dcnode-id="904" instrument_node="">lucid dreaming</span></a><span data-dcnode-id="902" instrument_node=""> is similar to ordinary dreams in modulation and input (ie both are cholinergic and made of internally-generated visual imagery rather than taking in information from the senses), lucid dreams have higher activation in the GAMMA (40hz) range in the frontal and frontolateral areas of the brain.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Mechanisms Don’t Trump Meaning</span></strong></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="891"><span data-dcnode-id="895" instrument_node="">Many have made a straw man out of Hobson by misinterpreting his work as a defense against the meaningfulness of dreams.&nbsp; I have admittedly done so in the past before reading his primary works, no doubt influenced by all the rancor he stirred up in the psychoanalytic community.&nbsp; But in real life, Hobson is a dream enthusiast, and is reputed to have over 100 volumes of personal </span><a data-dcnode-id="893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreamstudies.org/2009/07/30/how-to-keep-a-dream-journal/" title="how to keep your own dream journal"><span data-dcnode-id="894" instrument_node="">dream journals</span></a><span data-dcnode-id="892" instrument_node="">.</span></p><span data-dcnode-id="890" instrument_node="">
</span><blockquote class="pullquote pqRight" data-dcnode-id="884"><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">meaning and creativity are fundamental to the </span><em data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">experience</span></em><span data-dcnode-id="886" instrument_node=""> of dreaming</span></p></blockquote><p data-dcnode-id="873"><span data-dcnode-id="883" instrument_node="">And more to the point, Hobson’s theory suggests that </span><span class="pullquote" data-dcnode-id="878"><span data-dcnode-id="882" instrument_node="">meaning and creativity are fundamental to the </span><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">experience</span></em><span data-dcnode-id="879" instrument_node=""> of dreaming</span></span><span data-dcnode-id="877" instrument_node="">, but that this meaning may not be present in the initial </span><em data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">formation</span></em><span data-dcnode-id="874" instrument_node=""> of dreams.&nbsp; Even as early as 1977, Hobson and McCarley suggested that dreams “are not without psychological meaning and function.”&nbsp; The significance of the dream narrative, in Hobson’s present view, comes only after the powerful neurochemical perimeters are set and interpreted by the higher-order parts of the brain that deal with language, logic and the mapping of emotions with remembered experiences.</span></p><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">However, despite his backpedaling, Hobson still believes dreaming consciousness is an epiphenomenon of biological causes.</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="868" instrument_node="">Personally, I think that Hobson’s work cannot comment on issues of meaning, because his scientific paradigm has already bracketed out those subjective queries.&nbsp; And, besides, armed with an </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreamstudies.org/2009/01/28/integral-science/"><span data-dcnode-id="867" instrument_node="">integral approach to science</span></a><span data-dcnode-id="865" instrument_node="">, learning about the material correlates to an extraordinary experience is not threatening to the value of the experience itself.</span></p><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">But if you believe in an immortal soul or a higher self that is unsullied by our gray matter, Hobson may disagree, after he offers to scan your brain.</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="859" instrument_node="">For some great introductory reading by Hobson, check out:</span><br data-dcnode-id="858"><span data-dcnode-id="857" instrument_node=""> </span><a data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Dreaming-Introduction-J-Allan-Hobson/dp/0192803042/ref%3Dpd_sim_b_1%26tag%3Ddreastudport-20"><br data-dcnode-id="856"><span data-dcnode-id="855" instrument_node=""> Dreaming: An Introduction to the Science of Sleep</span></a><span data-dcnode-id="853" instrument_node=""> by J. Allan Hobson</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="847"><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/13-Dreams-Freud-Never-Had/dp/B000IOEXHE/ref%3Dpd_sim_b_6%26tag%3Ddreastudport-20"><span data-dcnode-id="850" instrument_node="">13 Dreams Freud Never Had:the New Mind Science</span></a><span data-dcnode-id="848" instrument_node=""> by J. Allan Hobson</span></p><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="842"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Additional References</span></strong><span data-dcnode-id="843" instrument_node="">:</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="837"><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Wilderness-Dreams-Exploring-Religious-Meanings/dp/0791417468/ref%3Dsr_1_5%3Fie%3DUTF8%26s%3Dbooks%26qid%3D1262920726%26sr%3D1-5%26tag%3Ddreastudport-20"><span data-dcnode-id="840" instrument_node="">The Wilderness of Dreams</span></a><span data-dcnode-id="838" instrument_node=""> by Kelly Bulkeley (1994)</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="832"><a data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Mind-Night-New-Science-Dream/dp/0465070698/ref%3Dpd_sim_b_4%26tag%3Ddreastudport-20"><span data-dcnode-id="835" instrument_node="">The Mind at Night: the New Science of How and Why We Dream</span></a><span data-dcnode-id="833" instrument_node=""> by Andrea Rock (2004)</span></p><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="827"><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Embodiment-Creative-imagination-Medicine-Travel/dp/0415404347/ref%3Dsr_1_1%3Fie%3DUTF8%26s%3Dbooks%26qid%3D1262984002%26sr%3D8-1%26tag%3Ddreastudport-20"><span data-dcnode-id="830" instrument_node="">Embodiment: Creative Imagination in Medicine, Art and Travel</span></a><span data-dcnode-id="828" instrument_node=""> by Robert Bosnak (2007)</span></p><span data-dcnode-id="826" instrument_node="">

</span><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Allan Hobson, “The new Neurospsychology of Sleep: implications for Psychoanalysis,” </span><em data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Neuro-psychoanalysis: An Interdisciplinary Journal for Psychoanalysis and the Neurosciences</span></em><span data-dcnode-id="816" instrument_node="">, 1(2): 159.</span></p><span data-dcnode-id="814" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="642"><time class="comment-time" data-dcnode-id="643" datetime="2010-01-10T02:07:55-05:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="644" href="#comment-1046" itemprop="url"><span data-dcnode-id="645" instrument_node="">January 10, 2010 at 2:07 am</span></a></time></p><span data-dcnode-id="641" instrument_node=""> </span></header><span data-dcnode-id="639" instrument_node="">
</span><div class="comment-content" data-dcnode-id="622" itemprop="text"><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Hi Ryan,</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">I loved your piece which comments in an enlightened way on Hobson’s theory, and in particular his AIM methodology. My only question would be this: ‘Do all archetypes, cross -culturally’ have an integral scientific/materialistic explanation?’ Or ‘Are we really talking about Science’s attempt to analyze different and nested holarchies of Being?’ (Cf K Wilber)</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">I would be interested in your thoughts on the matter.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Warm regards, and Happy New Year from snowbound UK!</span></p><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Hugh</span></p><span data-dcnode-id="623" instrument_node="">

</span><article data-dcnode-id="582" id="article-comment-1047" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="614" instrument_node="">

</span><p class="comment-author" data-dcnode-id="603" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="612" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="611" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/dbf131356d802cb528cda6f72b2c3bdf%3Fs%3D48%26d%3Dmm%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/dbf131356d802cb528cda6f72b2c3bdf?s=96&amp;d=mm&amp;r=pg 2x" width="48"><span class="comment-author-name" data-dcnode-id="608" itemprop="name"><a class="comment-author-link" data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thenightshirt.com/" itemprop="url" rel="external nofollow"><span data-dcnode-id="610" instrument_node="">Eric Wargo</span></a></span><span data-dcnode-id="607" instrument_node=""> </span><span class="says" data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">says</span></span><span data-dcnode-id="604" instrument_node=""> </span></p><span data-dcnode-id="602" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="598"><time class="comment-time" data-dcnode-id="599" datetime="2010-01-14T09:53:51-05:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="600" href="#comment-1047" itemprop="url"><span data-dcnode-id="601" instrument_node="">January 14, 2010 at 9:53 am</span></a></time></p><span data-dcnode-id="597" instrument_node=""> </span></header><span data-dcnode-id="595" instrument_node="">
</span><div class="comment-content" data-dcnode-id="584" itemprop="text"><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Hello Ryan,</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">This is a terrific article. Like you (as I gather), I never had much use for Hobson’s apparent dismissal of meaning-centered theories. He has even admitted that his research arose out of a principled (and partly understandable) hatred of rudely overinterpretive psychoanalysts. Obviously, though, wanting something to be true (like that dreams’ meaning isn’t part of their function) doesn’t make it so. Yet I think you do a great, and very fair, job of summarizing Hobson’s evolving views. I now feel that I, too, should go back and read some of his primary works, rather than just blanketly dismiss him.</span></p><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Eric</span></p><span data-dcnode-id="585" instrument_node="">
</span></div><span data-dcnode-id="583" instrument_node="">
</span></article><span data-dcnode-id="581" instrument_node="">
</span></li><span data-dcnode-id="578" instrument_node="">
</span><li class="comment even thread-even depth-1" data-dcnode-id="542" id="comment-1048"><span data-dcnode-id="577" instrument_node="">
</span><article data-dcnode-id="544" id="article-comment-1048" itemprop="comment" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="576" instrument_node="">
</span><header class="comment-header" data-dcnode-id="558"><span data-dcnode-id="575" instrument_node="">
</span><p class="comment-author" data-dcnode-id="565" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="574" instrument_node="">
</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="573" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7fabc78029ae577ed7f3059d0fc30691%3Fs%3D48%26d%3Dmm%26r%3Dpg&amp;raw" srcset="https://secure.gravatar.com/avatar/7fabc78029ae577ed7f3059d0fc30691?s=96&amp;d=mm&amp;r=pg 2x" width="48"><span class="comment-author-name" data-dcnode-id="570" itemprop="name"><a class="comment-author-link" data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dreamstudies.org/" itemprop="url" rel="external nofollow"><span data-dcnode-id="572" instrument_node="">Ryan Hurd</span></a></span><span data-dcnode-id="569" instrument_node=""> </span><span class="says" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">says</span></span><span data-dcnode-id="566" instrument_node=""> </span></p><span data-dcnode-id="564" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="560"><time class="comment-time" data-dcnode-id="561" datetime="2010-01-14T11:09:53-05:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="562" href="#comment-1048" itemprop="url"><span data-dcnode-id="563" instrument_node="">January 14, 2010 at 11:09 am</span></a></time></p><span data-dcnode-id="559" instrument_node=""> </span></header><span data-dcnode-id="557" instrument_node="">
</span><div class="comment-content" data-dcnode-id="546" itemprop="text"><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Hugh, </span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">I have read Wilber with great interest – his integral theory can work with Hobson’s model, altho Hobson would disagree.  From Hobson’s perspective, integral theory is not valid because it is not testable: it moves outside the bounds of scientific materialism.  But from Wilber’s, the AIM maps only a quarter of the cosmos (the material correlates to consciousness).</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Eric, thanks for your kind words and I’m glad to hear that you are rethinking the value of Hobson’s perspective.  Whether or not AIM exposes the inherent meaningfulness of dreaming, there’s no debating that this perspective will continue to  influence future generations of dream researchers and scientists.</span></p><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node="">
</span></article><span data-dcnode-id="543" instrument_node="">
</span></li><span data-dcnode-id="540" instrument_node="">

</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Hi Ryan,</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">I am writing a paper on this topic and have done a good bit of research on Freud, Jung and Hobson’s opinioin. I am most intrigued by Hobson’s approach and I understand that there is a chemical change happening when we dream, but what I’m not getting from Hobson’s ideas is why?? Why do the seratonin levels decrease and acetylcholine levels increase? What purpose does that serve? Is it merely an excerise tool for our brain? Or is there more too it that I am not understanding? </span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Your thoughts would be greatly appreciated!</span></p><span data-dcnode-id="440" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="410"><time class="comment-time" data-dcnode-id="411" datetime="2010-06-17T10:41:19-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="412" href="#comment-1052" itemprop="url"><span data-dcnode-id="413" instrument_node="">June 17, 2010 at 10:41 am</span></a></time></p><span data-dcnode-id="409" instrument_node=""> </span></header><span data-dcnode-id="407" instrument_node="">

</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Thanks Ryan for providing another nutshell perspective of important new work.</span></p><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">I am now going through a book which has 2 papers by Hobson. One of them discusses the biochemistry of the effects of prescription and recreational drugs on dreams and REM sleep, and contains aware warnings to potential users. I am not sure how much guidance is available to the public at large, in this area, especially with emphasis on what consumers, as opposed to specialists, should know. </span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Unlike with dream interpretation, sleeping is something everybody goes through. Larger segments of the population than are involved in the dream study movement must be in the market for sleep aids. This neuroscience related pharmacological industry must have some influence on the high volume of medical research that has now become a big, and it seems to me, different, branch of the “new” oneirology.</span></p><span data-dcnode-id="397" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="271"><time class="comment-time" data-dcnode-id="272" datetime="2012-09-25T19:58:43-04:00" itemprop="datePublished"><a class="comment-time-link" data-dcnode-id="273" href="#comment-276837" itemprop="url"><span data-dcnode-id="274" instrument_node="">September 25, 2012 at 7:58 pm</span></a></time></p><span data-dcnode-id="270" instrument_node=""> </span></header><span data-dcnode-id="268" instrument_node="">

</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Hello Ryan,</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">As part of the honors program at my college, we read your article in conjunction with the first chapter of “Dreaming: A Very Short Introduction” by Hobson himself. I am a psychology major. Though I appreciate–and find interesting–the psychodynamic theory, it is simply too subjective for me. I land far on the cognitive side, and the Activation-synthesis model makes the most sense to me; dreams may open up to us processes that are occurring without our knowledge (the third level of cognition, as it were), but to deny the biological aspect of dream formation is shortsighted. If anything, the theory that the brain stitches together a storyline in its attempt to make sense of the information it processes even during a sleeping state pays homage to the vast power of our neurological network. Thank you for writing this article!</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Ben</span></p><span data-dcnode-id="258" instrument_node="">

</span><p data-dcnode-id="229"><span data-dcnode-id="231" instrument_node="">Hi Ben, thanks for adding to the discussion. Glad to hear you’re getting a chance to review different dream theories and decide for yourself what makes the most sense. Keep in mind that the Activation-synthesis model is still very controversial, even amongst neuroscientists. You may also be interested in the cognitive theories of Tracey Kahan, who is championing a meta-cognitive view of dream formation — this is the continuity theory of dreams. They don’t necessarily conflict — in fact, many dream theories can work together, because often dream researchers are only looking at one aspect of dreams at a time. So it’s always good to have multiple frames of reference — keeps the mind limber if nothing else!  BTW – I’m curious which college you’re reading my work at!  </span><img alt="🙂" class="emoji" data-dcnode-id="230" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/1f642.svg&amp;raw"></p><span data-dcnode-id="228" instrument_node="">
