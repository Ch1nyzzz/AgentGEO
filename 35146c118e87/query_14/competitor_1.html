</span><div class="article-body" data-dcnode-id="856"><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">Your brain is the most hungry organ in your body. It requires more oxygen and nutrients than any other, and the complex neural networks that make it up largely explain everything you do, every day. Advances in neuroscience have improved our understanding of complex emotions and behaviours, providing valuable information that we can implement into our daily lives.&nbsp;</span></p><span data-dcnode-id="1091" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1090" instrument_node="">If asked what makes you human, emotions - or some aspect of your </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welldoing.org/news/tag/personality"><strong data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node="">personality</span></strong></a><span data-dcnode-id="1086" instrument_node=""> intrinsically linked to emotions - might come pretty close to the top of the list. Our emotions influence our relationships, our </span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welldoing.org/article/workplace-stress-how-therapy-can-help"><strong data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">work</span></strong></a><span data-dcnode-id="1082" instrument_node="">, our lifestyle, our sense of self, and our decisions, big and small.&nbsp;</span></p><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1079" instrument_node="">Darwin was fascinated by emotions, and concluded that emotions were there, in essence, to warn us very quickly whether a situation is safe. In this respect and many others, we recognise the importance of our emotions. We know that fear helps us cross the road safely, that anger can give us strength, that love keeps us </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welldoing.org/article/love"><strong data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">bonded to others</span></strong></a><span data-dcnode-id="1075" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1072" instrument_node="">But often we have a complicated relationship with our </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welldoing.org/article/5-ways-manage-overwhelming-emotions"><strong data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">emotions</span></strong></a><span data-dcnode-id="1068" instrument_node="">, branding some as good and others as bad. We might suppress and ignore the ones we don't want or that we don't deem 'appropriate', and chase the ones we do, potentially to our detriment. So here's a brief overview of the neuroscience of emotions and the different areas of the brain that are involved in human emotion, as well as an explanation into the difference between emotions, feelings, and moods.&nbsp;</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1060"><span data-dcnode-id="1065" instrument_node="">The first thing to know is that our brain can roughly be divided into three areas: lizard brain, mammal brain, and </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//welldoing.org/news/tag/brain"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">human brain</span></strong></a><span data-dcnode-id="1061" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1059" instrument_node="">
</span><ol data-dcnode-id="1032"><span data-dcnode-id="1058" instrument_node="">
</span><li data-dcnode-id="1054"><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Lizard brain</span></strong><span data-dcnode-id="1055" instrument_node=""> is a deep structure and it's priority is to keep you alive. Lizard brain involves itself with breathing, digestion, keeping your heart beating. Lizard brain doesn't really care what you think or feel I'm afraid.&nbsp;</span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1052" instrument_node="">Wrapped around lizard brain is </span><strong data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">mammal brain</span></strong><span data-dcnode-id="1049" instrument_node="">, otherwise known as the </span><strong data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">Limbic system</span></strong><span data-dcnode-id="1046" instrument_node="">. Your Limbic system is concerned with safety. This is the area of the brain where you keep track of past pain and pleasure memories. All mammal brain wants to do is keep you safe, so if you have survived up until now by doing certain things, mammal brain will push you to keep repeating those same behaviours. Mammal brain absolutely </span><em data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">hates</span></em><span data-dcnode-id="1043" instrument_node=""> change.&nbsp;</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1034"><strong data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Human brain</span></strong><span data-dcnode-id="1038" instrument_node="">, or the </span><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">neocortex</span></strong><span data-dcnode-id="1035" instrument_node=""> (at the front of the brain), is the area of the brain we can most consciously access. It is the home of rational thought, learning, decision making, empathy and creativity.</span></li><span data-dcnode-id="1033" instrument_node="">
</span></ol><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1030" instrument_node="">
</span><br data-dcnode-id="1029"><span data-dcnode-id="1028" instrument_node="">
</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Importantly, these different areas of the brain do not always agree with one another. If human brain wants to try out a new hobby, mammal brain might try and put human brain in its place, inducing anxiety and fear in order to dissuade human brain from taking such a bold leap into the unknown.&nbsp;</span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1022" instrument_node="">Our brain is covered in neural networks that get stronger or weaker depending on how often they are used. The ones that get used repeatedly become very strong 'neural highways': these define our default thoughts, emotional profile, and personality. The good news is that our neural pathways can be changed; this is called </span><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">neuroplasticity.</span></strong><span data-dcnode-id="1019" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">So, what are the major emotions at the root of our neural networks? The spectrum of human emotion contains eight major emotions: sadness, shame, disgust, anger, fear, startle/surprise, excitement/joy, and love/trust. As you might have immediately noticed, all of us are a little unbalanced, with more major emotions available to us on the side of the scale that mostly characterises 'escape' rather than 'attachment'. Unfortunately, evolutionarily speaking it was more important for us to stay safe than have a good time.&nbsp;</span></p><span data-dcnode-id="1014" instrument_node="">
</span><ul data-dcnode-id="972"><span data-dcnode-id="1013" instrument_node="">
</span><li data-dcnode-id="1009"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Sadness</span></strong><span data-dcnode-id="1010" instrument_node=""> tries to tell us that something in our situation is not right</span></li><span data-dcnode-id="1008" instrument_node="">
</span><li data-dcnode-id="1004"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Shame</span></strong><span data-dcnode-id="1005" instrument_node=""> is our moral compass of sorts, but a very complicated emotion that can become deeply harmful if disproportionately attributed to particular situations. Our reaction to shame can either cause us to withdraw from engaging in the activity that resulted in this emotion, or drive us to work harder in order to avoid the feeling the next time around&nbsp;</span></li><span data-dcnode-id="1003" instrument_node="">
</span><li data-dcnode-id="999"><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Disgust&nbsp;</span></strong><span data-dcnode-id="1000" instrument_node="">serves the evolutionary purpose of keeping us safe from microbial harm. Disgust stops us from eating gone-off food, and keeps us at a distance from other things that we deem to be dangerous to us in terms of our health</span></li><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="994"><strong data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Anger</span></strong><span data-dcnode-id="995" instrument_node=""> tries to change the situation. It is not passive like sadness. Anger is extremely situational in terms of how useful it is</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="989"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Fear</span></strong><span data-dcnode-id="990" instrument_node=""> is experienced when we perceive that, firstly, there is a potential danger and, secondly, that we are relatively powerless over this danger. Fear inspires the fight or flight response&nbsp;</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="984"><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Surprise</span></strong><span data-dcnode-id="985" instrument_node=""> falls on both sides: we all know there are good surprises and bad surprises. When we feel surprise, we don't know what the outcome is, so our brain and body recruits extra energy in order to prepare for what might come to pass. This happens in the form of endorphins flooding the brain, helping us to feel relaxed</span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="979"><strong data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Excitement/joy</span></strong><span data-dcnode-id="980" instrument_node=""> are centred around pleasure and reward</span></li><span data-dcnode-id="978" instrument_node="">
</span><li data-dcnode-id="974"><strong data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Love/trust</span></strong><span data-dcnode-id="975" instrument_node=""> rely on predictability. These emotions are built up, as we build up a back-catalogue of positive, reinforcing experiences and memories around another person. These emotions also take into account how people like this new person have treated you in the past.&nbsp;</span></li><span data-dcnode-id="973" instrument_node="">
</span></ul><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="970" instrument_node="">
</span><br data-dcnode-id="969"><span data-dcnode-id="968" instrument_node="">
</span></p><span data-dcnode-id="966" instrument_node="">
</span><h3 data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">What are the areas of the brain involved in emotional response?</span></h3><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">There are a few key areas that make up how emotions work in the brain. Our </span><strong data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">prefrontal cortex</span></strong><span data-dcnode-id="959" instrument_node="">, which exists in human brain, is involved with emotional regulation and decision-making. This is where we store our sense of self, our value system, our self-control. We use the prefrontal cortex to suppress emotions.&nbsp;</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="956" instrument_node="">The next key area is the </span><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">amygdala</span></strong><span data-dcnode-id="953" instrument_node="">. Our amygdala assesses our environment for potential danger and conjures the anxiety, fear, and anger that we might need in order to respond to this potential danger. The amygdala is also where we store emotional memory.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="950" instrument_node="">Our </span><strong data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">thalamus</span></strong><span data-dcnode-id="947" instrument_node=""> receives information from the senses - sight, touch, smell, hearing, taste - and sends information to relevant areas of the brain.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">Our </span><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">hippocampus</span></strong><span data-dcnode-id="941" instrument_node=""> is where we store memory. We also use it for navigation. The hippocampus stores the physical sensations of emotion.&nbsp;</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="938" instrument_node="">
</span><br data-dcnode-id="937"><span data-dcnode-id="936" instrument_node="">
</span></p><span data-dcnode-id="934" instrument_node="">
</span><h3 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">How do these areas work together in an anxiety response?</span></h3><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Whilst our amygdala has been very helpful to our survival throughout evolution, individuals with anxiety disorders might be living with an over-active amygdala that perceives danger and threat disproportionately, and floods the brain and body with the same emotions that we might have needed in order to avoid real predatory dangers in the past.&nbsp;</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">When we perceive something that makes us feel fear or anxiety, our thalamus sends this information to our amygdala. The amygdala checks in with our hippocampus, to see whether we have previous memories that might inform us as to how to behave in the situation now. If our hippocampus shoots back painful emotional memories, we respond with fear and anxiety. Strong emotions can cause our rational brain to shut down. Our amygdala is much quicker to respond than our rational brain. Anxiety and fear leads to shallow breathing: this starves the brain of oxygen and leads to the areas of the brain not involved with survival to take a back seat. Rational thinking, creativity, and empathy are all shut off to us.&nbsp;</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Breathing exercises can therefore be very helpful when experiencing fear or anxiety; ensuring that your brain is receiving the oxygen it requires in order to function properly will support you in better managing your emotions.&nbsp;</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="921" instrument_node="">
</span><br data-dcnode-id="920"><span data-dcnode-id="919" instrument_node="">
</span></p><span data-dcnode-id="917" instrument_node="">
</span><h3 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Emotions, feelings, and moods</span></h3><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">Largely, we experience emotions in response to a specific external stimulus, but that isn't always the case. Our thoughts can also trigger emotional responses. If our human brain conjures up a thought, or a memory, of a time we felt shame or anger for example, mammal brain can be triggered into producing a physical emotional reaction. These are </span><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">feelings</span></strong><span data-dcnode-id="910" instrument_node="">. Feelings are different from emotions therefore in that they can be rationalised. An emotion happens very quickly; feelings are responses to the environment combined with our thoughts, interpretations, or inner beliefs about the situation. For this reason, our feelings are more manageable than our emotions: we can question our feelings, reflect our thoughts back to ourselves and question their validity.&nbsp;</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="907" instrument_node="">Emotions and </span><strong data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">moods</span></strong><span data-dcnode-id="904" instrument_node=""> are also distinct. Whereas emotions are rapid-onset, specific responses to specific events that give us information about our current situation, moods are much harder to define. Moods often have a more gradual onset, and it isn't so clear what they are caused by. Moods give us information about our current state of self, our inner system. Unlike emotions, moods are therefore unhelpful when it comes to decision-making. Emotions, as they inform us about our current situation, are vital to the decision-making process. We are often instructed that there is a difference between 'following your head' and 'following your heart', the latter sometimes looked upon as synonymous with being foolish or at least irrational, but suppressing your emotions when decision-making can lead to ongoing indecision. Refusing to listen to what your emotions are telling you can leave you in a stressful state of 'analysis and paralysis', unable to move forward.&nbsp;</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">We may sometimes think life would be easier if our emotions were more predictable, more peaceful, or simply less pervasive, but they are one of our most important resources and are ultimately here to serve us.&nbsp;</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="898" instrument_node="">
</span><br data-dcnode-id="897"><span data-dcnode-id="896" instrument_node="">
</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="893" instrument_node="">
</span><br data-dcnode-id="892"><span data-dcnode-id="891" instrument_node="">
</span></p><span data-dcnode-id="889" instrument_node="">
