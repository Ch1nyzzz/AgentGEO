</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="1655" id="firstHeading"><span data-dcnode-id="1656" instrument_node="">Cognitive neuroscience of dreams</span></h1><span data-dcnode-id="1654" instrument_node="">
</span><div class="vector-body" data-dcnode-id="438" id="bodyContent"><span data-dcnode-id="1653" instrument_node="">
</span><div class="noprint" data-dcnode-id="1651" id="siteSub"><span data-dcnode-id="1652" instrument_node="">From Wikipedia, the free encyclopedia</span></div><span data-dcnode-id="1650" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="453" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="462"><p data-dcnode-id="1625"><span data-dcnode-id="1632" instrument_node="">Scholarly interest in the process and functions of </span><a data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dream" title="Dream"><span data-dcnode-id="1631" instrument_node="">dreaming</span></a><span data-dcnode-id="1629" instrument_node=""> has been present since </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigmund_Freud" title="Sigmund Freud"><span data-dcnode-id="1628" instrument_node="">Sigmund Freud</span></a><span data-dcnode-id="1626" instrument_node="">'s interpretations in the 1900s. The neurology of dreaming has remained misunderstood until recent distinctions, however. The information available via modern techniques of brain imaging has provided new bases for the study of the dreaming brain. The bounds that such technology has afforded has created an understanding of dreaming that seems ever-changing; even now questions still remain as to the function and content of dreams.
</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1624" instrument_node="">Preliminary observations into the neurology of dreaming were reported in 1951 by </span><a data-dcnode-id="1622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Humphrey_%28psychologist%29" title="George Humphrey (psychologist)"><span data-dcnode-id="1623" instrument_node="">George Humphrey</span></a><span data-dcnode-id="1621" instrument_node=""> and </span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oliver_Zangwill" title="Oliver Zangwill"><span data-dcnode-id="1620" instrument_node="">Oliver Zangwill</span></a><span data-dcnode-id="1618" instrument_node="">. Their report noted two cases of brain injury that resulted in the complete or almost complete cessation of dreaming. Both patients had undergone damage to posterior </span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Parietal_lobe" title="Parietal lobe"><span data-dcnode-id="1617" instrument_node="">parietal</span></a><span data-dcnode-id="1615" instrument_node=""> regions, one of which involved predominately the left side of the parieto-occipital areas. Additional effects involved </span><a class="mw-redirect" data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hemianopia" title="Hemianopia"><span data-dcnode-id="1614" instrument_node="">hemianopia</span></a><span data-dcnode-id="1612" instrument_node="">, reduced visualization (in waking state), and disturbances in </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Visual_memory" title="Visual memory"><span data-dcnode-id="1611" instrument_node="">visual memory</span></a><span data-dcnode-id="1609" instrument_node="">. Patients reported that their visual images were dim and hard to evoke. Although they reported only two cases, Humphrey and Zangwill offered preliminary ideas about neurological components of dreaming, specifically the association of forebrain areas and the link between visual imaging and the ability to dream.</span><sup class="reference" data-dcnode-id="1606" id="cite_ref-hump_1-0"><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hump-1"><span data-dcnode-id="1608" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1605" instrument_node="">
</span></p><span data-dcnode-id="1603" instrument_node="">

</span><li class="toclevel-2 tocsection-9" data-dcnode-id="1520"><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23REM_sleep_and_dreaming"><span class="tocnumber" data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">3.1</span></span><span data-dcnode-id="1524" instrument_node=""> </span><span class="toctext" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">REM sleep and dreaming</span></span></a></li><span data-dcnode-id="1519" instrument_node="">
</span><li class="toclevel-2 tocsection-10" data-dcnode-id="1512"><a data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23A_shift_to_NREM"><span class="tocnumber" data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">3.2</span></span><span data-dcnode-id="1516" instrument_node=""> </span><span class="toctext" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">A shift to NREM</span></span></a></li><span data-dcnode-id="1511" instrument_node="">
</span><li class="toclevel-2 tocsection-11" data-dcnode-id="1504"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23Dopaminergic_activation"><span class="tocnumber" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">3.3</span></span><span data-dcnode-id="1508" instrument_node=""> </span><span class="toctext" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Dopaminergic activation</span></span></a></li><span data-dcnode-id="1503" instrument_node="">
</span><li class="toclevel-2 tocsection-12" data-dcnode-id="1496"><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23Perceptual_processing"><span class="tocnumber" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">3.4</span></span><span data-dcnode-id="1500" instrument_node=""> </span><span class="toctext" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Perceptual processing</span></span></a></li><span data-dcnode-id="1495" instrument_node="">
</span></ul><span data-dcnode-id="1493" instrument_node="">
</span></li><span data-dcnode-id="1491" instrument_node="">
</span><li class="toclevel-1 tocsection-13" data-dcnode-id="1484"><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23Notes"><span class="tocnumber" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">4</span></span><span data-dcnode-id="1488" instrument_node=""> </span><span class="toctext" data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Notes</span></span></a></li><span data-dcnode-id="1483" instrument_node="">
</span></ul><span data-dcnode-id="1481" instrument_node="">
</span></div><span data-dcnode-id="1479" instrument_node="">
</span><h2 data-dcnode-id="1469"><span class="mw-headline" data-dcnode-id="1477" id="Methodological_issues_in_scientific_dream_studies"><span data-dcnode-id="1478" instrument_node="">Methodological issues in scientific dream studies</span></span><span class="mw-editsection" data-dcnode-id="1470"><span class="mw-editsection-bracket" data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">[</span></span><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D1" title="Edit section: Methodological issues in scientific dream studies"><span data-dcnode-id="1474" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1468" instrument_node="">
</span><p data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">There are several difficulties encountered while studying subjective experiences like dreaming.  Methodologies in dream studies are abound with conceptual complexities and limitations.
</span></p><span data-dcnode-id="1465" instrument_node="">
</span><h3 data-dcnode-id="1455"><span class="mw-headline" data-dcnode-id="1463" id="Reliance_on_verbal_reports"><span data-dcnode-id="1464" instrument_node="">Reliance on verbal reports</span></span><span class="mw-editsection" data-dcnode-id="1456"><span class="mw-editsection-bracket" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">[</span></span><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D2" title="Edit section: Reliance on verbal reports"><span data-dcnode-id="1460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1437"><span data-dcnode-id="1453" instrument_node="">One significant shortcoming of dream studies is the necessary reliance on verbal reports.  The dream event is reduced to a verbal report which is only an account of the subject's memory of the dream, not the subject's experience of the dream itself.  These verbal reports are also at risk of being influenced by a number of factors. First, dreams involve multiple pseudosensory, emotional and motoric elements. The dream report is only narrative, which makes capturing the whole picture difficult. Verbal reports face other difficulties like </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forgetting" title="Forgetting"><span data-dcnode-id="1452" instrument_node="">forgetting</span></a><span data-dcnode-id="1450" instrument_node="">.  Dreams and reports of dreams are produced in distinct states of consciousness resulting in a delay between the dream event and its recall while awake.  During this time lag forgetting may occur resulting in an incomplete report.  Forgetting is proportional to the amount of time elapsed between the experience and its recall.</span><sup class="reference" data-dcnode-id="1447" id="cite_ref-swartz_2-0"><a data-dcnode-id="1448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-swartz-2"><span data-dcnode-id="1449" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1446" instrument_node="">  Also, remembering is exposed to interference at the recall stage and some information is not accessible to recall.</span><sup class="reference" data-dcnode-id="1443" id="cite_ref-swartz_2-1"><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-swartz-2"><span data-dcnode-id="1445" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1442" instrument_node=""> Reconstructing the dream from memory while awake might affect the accuracy of recall because the subject may report more information than actually experienced, and sequence of events may be reordered.</span><sup class="reference" data-dcnode-id="1439" id="cite_ref-swartz_2-2"><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-swartz-2"><span data-dcnode-id="1441" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1438" instrument_node=""> Another issue is the difficulty of verbally describing mostly visual subjective experiences like those found in dreams (e.g. unreal objects, bizarre experiences, emotions). Furthermore, subjects may intentionally fail to report embarrassing, immoral, or private dream experiences for fear of judgement, which results in censored, incomplete reports.
</span></p><span data-dcnode-id="1436" instrument_node="">
</span><h3 data-dcnode-id="1426"><span class="mw-headline" data-dcnode-id="1434" id="The_sleep_laboratory_environment"><span data-dcnode-id="1435" instrument_node="">The sleep laboratory environment</span></span><span class="mw-editsection" data-dcnode-id="1427"><span class="mw-editsection-bracket" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">[</span></span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D3" title="Edit section: The sleep laboratory environment"><span data-dcnode-id="1431" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1405"><span data-dcnode-id="1424" instrument_node="">The sleep laboratory environment is another major source of methodological issues.  Sleep laboratories are an unnatural, awkward environment for sleeping. The subject may feel discomfort and anxiety, which may make sleep more difficult and of inferior quality. This is the well-known first night effect.  Complete adaptation to the sleep laboratory may take four days or longer,</span><sup class="reference" data-dcnode-id="1421" id="cite_ref-dk_3-0"><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-dk-3"><span data-dcnode-id="1423" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1420" instrument_node=""> which is longer than the duration of most laboratory studies.  Also, the content of dreams at the laboratory has been observed to be different from dreams at home.</span><sup class="reference" data-dcnode-id="1417" id="cite_ref-dk_3-1"><a data-dcnode-id="1418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-dk-3"><span data-dcnode-id="1419" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1416" instrument_node=""> Similarly, the laboratory environment may alter the content of dreams recalled from spontaneous awakenings at the end of a night's sleep, as indicated by high frequency of laboratory references in morning spontaneous awakenings in </span><a data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rapid_eye_movement_sleep" title="Rapid eye movement sleep"><span data-dcnode-id="1415" instrument_node="">REM</span></a><span data-dcnode-id="1413" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NREM" title="NREM"><span data-dcnode-id="1412" instrument_node="">NREM</span></a><span data-dcnode-id="1410" instrument_node=""> dream reports</span><sup class="reference" data-dcnode-id="1407" id="cite_ref-dk_3-2"><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-dk-3"><span data-dcnode-id="1409" instrument_node="">[3]</span></a></sup><span data-dcnode-id="1406" instrument_node="">).
</span></p><span data-dcnode-id="1404" instrument_node="">
</span><h3 data-dcnode-id="1394"><span class="mw-headline" data-dcnode-id="1402" id="Statistical_concerns"><span data-dcnode-id="1403" instrument_node="">Statistical concerns</span></span><span class="mw-editsection" data-dcnode-id="1395"><span class="mw-editsection-bracket" data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">[</span></span><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D4" title="Edit section: Statistical concerns"><span data-dcnode-id="1399" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1387"><span data-dcnode-id="1392" instrument_node="">Statistical concerns in dream studies are another cause of methodological issues.  Many investigators used small samples for sleep studies and statistical parametric mapping (a technique for examining differences in brain activity recorded during functional neuroimaging experiments).</span><sup class="reference" data-dcnode-id="1389" id="cite_ref-4"><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-4"><span data-dcnode-id="1391" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1388" instrument_node="">  Results obtained from small samples must be interpreted with caution due to inherent statistical problems associated with small samples.
</span></p><span data-dcnode-id="1386" instrument_node="">
</span><h3 data-dcnode-id="1376"><span class="mw-headline" data-dcnode-id="1384" id="Technological_limitations"><span data-dcnode-id="1385" instrument_node="">Technological limitations</span></span><span class="mw-editsection" data-dcnode-id="1377"><span class="mw-editsection-bracket" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">[</span></span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D5" title="Edit section: Technological limitations"><span data-dcnode-id="1381" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1360"><span data-dcnode-id="1374" instrument_node="">Technological limitations also pose methodological problems.  Measures of global brain activity like </span><a class="mw-redirect" data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electroencephalogram" title="Electroencephalogram"><span data-dcnode-id="1373" instrument_node="">electroencephalogram</span></a><span data-dcnode-id="1371" instrument_node=""> (EEG) voltage averaging or cerebral blood flow cannot identify small but influential neuronal populations like the locus coeruleus, the </span><a class="mw-redirect" data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raphe_nucleus" title="Raphe nucleus"><span data-dcnode-id="1370" instrument_node="">raphe nucleus</span></a><span data-dcnode-id="1368" instrument_node=""> and the pedunculopontine tegmental nucleus, which reveal mechanistic and functional details in dreaming.</span><sup class="reference" data-dcnode-id="1365" id="cite_ref-hob_5-0"><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hob-5"><span data-dcnode-id="1367" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1364" instrument_node="">   Despite these shortcomings, it is widely agreed that clinical findings and data obtained from </span><a class="mw-redirect" data-dcnode-id="1362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neuro-imaging" title="Neuro-imaging"><span data-dcnode-id="1363" instrument_node="">neuro-imaging</span></a><span data-dcnode-id="1361" instrument_node=""> are valid, affirming neuro-imaging as an essential tool in cognitive neuroscience.
</span></p><span data-dcnode-id="1359" instrument_node="">
</span><h3 data-dcnode-id="1349"><span class="mw-headline" data-dcnode-id="1357" id="Lesion_and_activation_interpretations"><span data-dcnode-id="1358" instrument_node="">Lesion and activation interpretations</span></span><span class="mw-editsection" data-dcnode-id="1350"><span class="mw-editsection-bracket" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">[</span></span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D6" title="Edit section: Lesion and activation interpretations"><span data-dcnode-id="1354" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1347" instrument_node="">Brain-damaged patients offer valuable but rare information about human brain mechanisms. </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugene_Aserinsky" title="Eugene Aserinsky"><span data-dcnode-id="1346" instrument_node="">Eugene Aserinsky</span></a><span data-dcnode-id="1344" instrument_node=""> and </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nathaniel_Kleitman" title="Nathaniel Kleitman"><span data-dcnode-id="1343" instrument_node="">Nathaniel Kleitman</span></a><span data-dcnode-id="1341" instrument_node=""> observed </span><a class="mw-redirect" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/REM_sleep" title="REM sleep"><span data-dcnode-id="1340" instrument_node="">REM sleep</span></a><span data-dcnode-id="1338" instrument_node=""> and concluded that it was the physiological manifestation of dreaming. This was assumed to be a breakthrough in the understanding of such an elusive process as dreaming. Indeed, 95% of subjects awakened during REM reported that they had been dreaming whereas only about 5-10% reported dreams after being awakened during nonREM sleep (NREM).</span><sup class="reference" data-dcnode-id="1335" id="cite_ref-sol_6-0"><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1337" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1334" instrument_node="">
</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h2 data-dcnode-id="1322"><span class="mw-headline" data-dcnode-id="1330" id="REM_and_NREM_dream_reports_compared"><span data-dcnode-id="1331" instrument_node="">REM and NREM dream reports compared</span></span><span class="mw-editsection" data-dcnode-id="1323"><span class="mw-editsection-bracket" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">[</span></span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D7" title="Edit section: REM and NREM dream reports compared"><span data-dcnode-id="1327" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1321" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1312"><div class="thumbinner" data-dcnode-id="1313" style="width:222px;"><a class="image" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASleep_EEG_REM.png"><img alt="" class="thumbimage" data-dcnode-id="1320" data-file-height="601" data-file-width="821" decoding="async" height="161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Sleep_EEG_REM.png/220px-Sleep_EEG_REM.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Sleep_EEG_REM.png/330px-Sleep_EEG_REM.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Sleep_EEG_REM.png/440px-Sleep_EEG_REM.png 2x" width="220"></a><span data-dcnode-id="1318" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1314"><div class="magnify" data-dcnode-id="1316"><a class="internal" data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASleep_EEG_REM.png" title="Enlarge"></a></div><span data-dcnode-id="1315" instrument_node="">The REM portion of sleep is outlined in red</span></div></div></div><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">There are several important differences between REM and NREM dream reports.  There is disagreement amongst experts about the existence of qualitative differences, but there is a general consensus that there are quantitative differences.
</span></p><p data-dcnode-id="1291"><span data-dcnode-id="1308" instrument_node="">It has been recognized that following REM awakenings dream reports are obtained substantially more frequently than after NREM awakenings.</span><sup class="reference" data-dcnode-id="1305" id="cite_ref-7"><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-7"><span data-dcnode-id="1307" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1304" instrument_node="">  Subjects dream reports are related to the length of REM sleep.  Word count and subjectively estimated dream duration increase as length of preceding REM sleep increases, revealing a positive relationship.</span><sup class="reference" data-dcnode-id="1301" id="cite_ref-8"><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-8"><span data-dcnode-id="1303" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1300" instrument_node="">  Reports from REM awakenings tend to be longer, more multimodal perceptually, have intensified emotionality, and are less reminiscent of waking life than NREM awakenings.</span><sup class="reference" data-dcnode-id="1297" id="cite_ref-hob_5-1"><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hob-5"><span data-dcnode-id="1299" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1296" instrument_node="">  Judges are able to differentiate unaltered REM and NREM dream reports, while some subjects are able to discern whether they themselves had been awakened from REM or NREM.</span><sup class="reference" data-dcnode-id="1293" id="cite_ref-hob_5-2"><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hob-5"><span data-dcnode-id="1295" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1292" instrument_node="">
</span></p><p data-dcnode-id="1265"><span data-dcnode-id="1290" instrument_node="">The characteristics of REM sleep consistently contain a similar set of features.   While dreaming people regularly falsely believe that they are awake unless they implement lucidity.  Dreams contain multimodal pseudo-perceptions; sometimes any or all sensory modalities are present, but most often visual and motoric.</span><sup class="reference" data-dcnode-id="1287" id="cite_ref-hobs_9-0"><a data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hobs-9"><span data-dcnode-id="1289" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1286" instrument_node="">   Dream imagery can change quickly and is regularly of a bizarre nature, but reports also contain many images and events that are a part of day-to-day life.</span><sup class="reference" data-dcnode-id="1283" id="cite_ref-hobs_9-1"><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hobs-9"><span data-dcnode-id="1285" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1282" instrument_node="">  In dreams there is a reduction or absence of self-reflection or other forms of meta-cognition relative to during waking life.</span><sup class="reference" data-dcnode-id="1279" id="cite_ref-hob_5-3"><a data-dcnode-id="1280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hob-5"><span data-dcnode-id="1281" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1278" instrument_node="">  Dreams are also characterized by a lack of "orientational stability; persons, times, and places are fused, plastic, incongruous and discontinuous".</span><sup class="reference" data-dcnode-id="1275" id="cite_ref-hobs_9-2"><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hobs-9"><span data-dcnode-id="1277" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1274" instrument_node=""> In addition, dreams form a single narrative to explain and integrate all dream elements.</span><sup class="reference" data-dcnode-id="1271" id="cite_ref-hobs_9-3"><a data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hobs-9"><span data-dcnode-id="1273" instrument_node="">[9]</span></a></sup><span data-dcnode-id="1270" instrument_node=""> Lastly, NREM reports contain thought-like mentation and depictions of current concerns more frequently than REM reports.</span><sup class="reference" data-dcnode-id="1267" id="cite_ref-hob_5-4"><a data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-hob-5"><span data-dcnode-id="1269" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1266" instrument_node="">
</span></p><span data-dcnode-id="1264" instrument_node="">
</span><h2 data-dcnode-id="1254"><span class="mw-headline" data-dcnode-id="1262" id="Neuroanatomy_of_dreaming"><span data-dcnode-id="1263" instrument_node="">Neuroanatomy of dreaming</span></span><span class="mw-editsection" data-dcnode-id="1255"><span class="mw-editsection-bracket" data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">[</span></span><a data-dcnode-id="1258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D8" title="Edit section: Neuroanatomy of dreaming"><span data-dcnode-id="1259" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1253" instrument_node="">
</span><h3 data-dcnode-id="1243"><span class="mw-headline" data-dcnode-id="1251" id="REM_sleep_and_dreaming"><span data-dcnode-id="1252" instrument_node="">REM sleep and dreaming</span></span><span class="mw-editsection" data-dcnode-id="1244"><span class="mw-editsection-bracket" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">[</span></span><a data-dcnode-id="1247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D9" title="Edit section: REM sleep and dreaming"><span data-dcnode-id="1248" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1241" instrument_node="">Aserinsky and Kleitman's discovery prompted further research into the brain mechanism involved in REM sleep (and by their assumption, dreaming). It was found that REM is generated by a small region of cells located in the </span><a class="mw-redirect" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brain_stem" title="Brain stem"><span data-dcnode-id="1240" instrument_node="">brain stem</span></a><span data-dcnode-id="1238" instrument_node=""> called the </span><a data-dcnode-id="1236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pons" title="Pons"><span data-dcnode-id="1237" instrument_node="">pons</span></a><span data-dcnode-id="1235" instrument_node=""> (it sits slightly above the spinal cord at the nape of the neck). The pons releases </span><a data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acetylcholine" title="Acetylcholine"><span data-dcnode-id="1234" instrument_node="">acetylcholine</span></a><span data-dcnode-id="1232" instrument_node=""> which travels to parts of the forebrain. </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cholinergic" title="Cholinergic"><span data-dcnode-id="1231" instrument_node="">Cholinergic</span></a><span data-dcnode-id="1229" instrument_node=""> activation of these higher areas was thought to result in the meaningless images that make up our dreams. This process is switched off by </span><a class="mw-redirect" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Noradrenaline" title="Noradrenaline"><span data-dcnode-id="1228" instrument_node="">noradrenaline</span></a><span data-dcnode-id="1226" instrument_node=""> and </span><a data-dcnode-id="1224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serotonin" title="Serotonin"><span data-dcnode-id="1225" instrument_node="">serotonin</span></a><span data-dcnode-id="1223" instrument_node=""> which are also released by the brain stem.
</span></p><p data-dcnode-id="1212"><span data-dcnode-id="1221" instrument_node="">The formation of the Activation-Synthesis Model put forth by Allan Hobson and McCarley in 1975 rested largely on these discoveries. Their model posits that dreams are actively generated by the brain stem and then passively synthesized by the forebrain. That is, the cholinergic activation that occurs in any forebrain areas (via transmission from brain stem) results in attempts by the brain's cognitive areas to enforce sense or structure onto meaningless activation.</span><sup class="reference" data-dcnode-id="1218" id="cite_ref-so_10-0"><a data-dcnode-id="1219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1220" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1217" instrument_node=""> Cerebral areas were not thought to play any sort of causal role because REM sleep occurs as long as the pons is intact, even if higher areas are disconnected or removed.</span><sup class="reference" data-dcnode-id="1214" id="cite_ref-sol_6-1"><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1216" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1213" instrument_node=""> An inference based on the assumption that REM sleep is dreaming.
</span></p><span data-dcnode-id="1211" instrument_node="">
</span><h3 data-dcnode-id="1201"><span class="mw-headline" data-dcnode-id="1209" id="A_shift_to_NREM"><span data-dcnode-id="1210" instrument_node="">A shift to NREM</span></span><span class="mw-editsection" data-dcnode-id="1202"><span class="mw-editsection-bracket" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">[</span></span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D10" title="Edit section: A shift to NREM"><span data-dcnode-id="1206" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1199" instrument_node="">Although this assumption has remained a predominant view, disputing evidence has been present since the 60s. Foulkes for example reported that complex mentation is indeed possible during NREM. Previously participants reported dreams mainly after being awakened from REM, however upon awakening during NREM Foulkes asked subjects about what had just been passing through their heads, rather than whether or not they were dreaming. As many as 50% of subjects reported some form of complex mentation.</span><sup class="reference" data-dcnode-id="1196" id="cite_ref-sol_6-2"><a data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1198" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1195" instrument_node="">  Furthermore, these NREM dreams seemed to cluster around specific </span><a class="mw-redirect" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sleep_stages" title="Sleep stages"><span data-dcnode-id="1194" instrument_node="">sleep stages</span></a><span data-dcnode-id="1192" instrument_node=""> (stage 1 and late stages).</span><sup class="reference" data-dcnode-id="1189" id="cite_ref-so_10-1"><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1191" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1188" instrument_node=""> This offered evidence that dreaming was not restricted nor caused by mechanisms controlling REM sleep, and that perhaps there are entirely different brain areas associated with dreaming.
</span></p><p data-dcnode-id="1173"><span data-dcnode-id="1186" instrument_node="">An investigation of the differential brain structures can be conducted by clinico-anatomical correlations. Here, the mechanisms associated with REM sleep are removed to observe whether there is a cessation in dreaming as well, then the areas thought to be associated with dreaming are removed to see if REM sleep is also made impossible.</span><sup class="reference" data-dcnode-id="1183" id="cite_ref-sol_6-3"><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1185" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1182" instrument_node=""> These studies, with the exception of natural accidents, are conducted with animals. A main problem with obliterating REM sleep is that the associated area, the brain stem, is responsible for consciousness. Lesions large enough to stop REM completely can also render the subject unconscious.</span><sup class="reference" data-dcnode-id="1179" id="cite_ref-so_10-2"><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1181" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1178" instrument_node="">
Supporting evidence did come from the flip-side of clinico-anatomical correlations however. In a compilation of all reported cases of dream cessation (111 cases in all) damage was located in an entirely different area of the brain than the brain stem.</span><sup class="reference" data-dcnode-id="1175" id="cite_ref-so_10-3"><a data-dcnode-id="1176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1177" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1174" instrument_node=""> Furthermore, REM sleep was maintained. Remember that the pons is crucial for REM. Loss of dreaming only occurred when higher parts of the cerebral hemispheres were damaged.
REM sleep is controlled by cholinergic activation in the pons. It is now believed that dreaming may be a dopaminergic process that occurs in limbic and frontal areas of the brain.
</span></p><span data-dcnode-id="1172" instrument_node="">
</span><h3 data-dcnode-id="1162"><span class="mw-headline" data-dcnode-id="1170" id="Dopaminergic_activation"><span data-dcnode-id="1171" instrument_node="">Dopaminergic activation</span></span><span class="mw-editsection" data-dcnode-id="1163"><span class="mw-editsection-bracket" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">[</span></span><a data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D11" title="Edit section: Dopaminergic activation"><span data-dcnode-id="1167" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1160" instrument_node="">Two main frontal areas have been implicated in the dream process. The first involves the deep white matter of the </span><a class="mw-redirect" data-dcnode-id="1158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frontal_lobes" title="Frontal lobes"><span data-dcnode-id="1159" instrument_node="">frontal lobes</span></a><span data-dcnode-id="1157" instrument_node=""> (just above the eyes). The main systems at work here involve the </span><a class="mw-redirect" data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesolimbic" title="Mesolimbic"><span data-dcnode-id="1156" instrument_node="">mesolimbic</span></a><span data-dcnode-id="1154" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesocortical" title="Mesocortical"><span data-dcnode-id="1153" instrument_node="">mesocortical</span></a><span data-dcnode-id="1151" instrument_node=""> </span><a data-dcnode-id="1149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dopaminergic" title="Dopaminergic"><span data-dcnode-id="1150" instrument_node="">dopaminergic</span></a><span data-dcnode-id="1148" instrument_node=""> pathways. There are connecting fibres that run between frontal and </span><a class="mw-redirect" data-dcnode-id="1146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Limbic" title="Limbic"><span data-dcnode-id="1147" instrument_node="">limbic</span></a><span data-dcnode-id="1145" instrument_node=""> structures. A dopaminergic pathway runs from the </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ventral_tegmental_area" title="Ventral tegmental area"><span data-dcnode-id="1144" instrument_node="">ventral tegmental area</span></a><span data-dcnode-id="1142" instrument_node="">, ascends through the lateral </span><a data-dcnode-id="1140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothalamus" title="Hypothalamus"><span data-dcnode-id="1141" instrument_node="">hypothalamus</span></a><span data-dcnode-id="1139" instrument_node="">, various basal forebrain areas (nucleus basalis, stria terminalis, shell of nucleus accumbens) and terminates in the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amygdala" title="Amygdala"><span data-dcnode-id="1138" instrument_node="">amygdala</span></a><span data-dcnode-id="1136" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anterior_cingulate_gyrus" title="Anterior cingulate gyrus"><span data-dcnode-id="1135" instrument_node="">anterior cingulate gyrus</span></a><span data-dcnode-id="1133" instrument_node=""> and frontal cortex. Damage to the dopaminergic pathway results in a loss of dreaming. Furthermore, chemical stimulation of the pathway (with L-DOPA for example) increases the frequency and vividness of dreams without affecting REM sleep.</span><sup class="reference" data-dcnode-id="1130" id="cite_ref-so_10-4"><a data-dcnode-id="1131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1132" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1129" instrument_node=""> The mesolimbic and mesocortical pathways are considered the seeking areas or the motivational command centers of the brain. Damage not only results in the loss of dreams but also of motivated behaviour.</span><sup class="reference" data-dcnode-id="1126" id="cite_ref-sol_6-4"><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1128" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1125" instrument_node=""> Transection or inhibition of the dopamine pathway also reduces some positive symptoms of </span><a data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Schizophrenia" title="Schizophrenia"><span data-dcnode-id="1124" instrument_node="">schizophrenia</span></a><span data-dcnode-id="1122" instrument_node="">, many of which have been likened to dream-like states. Drugs that block the system have anti-psychotic effects but also reduce excessive and vivid dreaming.</span><sup class="reference" data-dcnode-id="1119" id="cite_ref-so_10-5"><a data-dcnode-id="1120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1121" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1118" instrument_node="">
Further evidence that dreaming can occur independently of REM sleep is found in the occurrence of nocturnal </span><a class="mw-redirect" data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seizures" title="Seizures"><span data-dcnode-id="1117" instrument_node="">seizures</span></a><span data-dcnode-id="1115" instrument_node=""> during NREM that often present themselves as nightmares. Activation here is seen in the </span><a data-dcnode-id="1113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Temporal_lobe" title="Temporal lobe"><span data-dcnode-id="1114" instrument_node="">temporal lobe</span></a><span data-dcnode-id="1112" instrument_node="">, again a forebrain area.</span><sup class="reference" data-dcnode-id="1109" id="cite_ref-sol_6-5"><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1111" instrument_node="">[6]</span></a></sup><sup class="reference" data-dcnode-id="1106" id="cite_ref-so_10-6"><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1108" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1105" instrument_node="">
</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">The evidence of the involvement of mesolimbic and mesocortical dopaminergic pathways suggests that dreaming occurs when a motivational component is activated. Only when this pathway is removed do dreams cease to occur. This system can be activated by mechanisms of REM sleep but can also occur independently during NREM stages of sleep.
</span></p><span data-dcnode-id="1101" instrument_node="">
</span><h3 data-dcnode-id="1091"><span class="mw-headline" data-dcnode-id="1099" id="Perceptual_processing"><span data-dcnode-id="1100" instrument_node="">Perceptual processing</span></span><span class="mw-editsection" data-dcnode-id="1092"><span class="mw-editsection-bracket" data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">[</span></span><a data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DCognitive_neuroscience_of_dreams%26action%3Dedit%26section%3D12" title="Edit section: Perceptual processing"><span data-dcnode-id="1096" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1089" instrument_node="">Another area thought to be involved in the generation of dreams is the Parieto-Occipito-Temporal junction (PTO).</span><sup class="reference" data-dcnode-id="1086" id="cite_ref-so_10-7"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1088" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1085" instrument_node=""> This is an area of grey cortex towards the back of the brain involved in the highest levels of perceptual processing. It is here that perceptions are converted into abstract thoughts and memories.</span><sup class="reference" data-dcnode-id="1082" id="cite_ref-sol_6-6"><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-sol-6"><span data-dcnode-id="1084" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1081" instrument_node=""> The PTO is also vital for mental imagery.</span><sup class="reference" data-dcnode-id="1078" id="cite_ref-so_10-8"><a data-dcnode-id="1079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_neuroscience_of_dreams%23cite_note-so-10"><span data-dcnode-id="1080" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1077" instrument_node=""> Damage specifically to this area results in complete loss of dreaming, however damage to lower levels of perceptual processing merely results in reduced aspects of dream imagery. This is the basis for the suggestion that dreaming involves a reversed sequence of perceptual events. Instead of bottom-up it is top-down (higher levels activating lower levels instead lower to higher). Activation of the motivational mechanisms in the brain would normally be directed toward goal-oriented actions. However, during sleep access to the motor system is blocked (by inactivation of the dorsolateral frontal convexity). As a result, activation moves backwards toward the perceptual areas. This is why the dreamer doesn't engage in motivated behaviours but imagines them. Furthermore, there is inactivation of the reflective system in the limbic brain which leads the dreamer to mistake the dream for reality. Damage to this area also results in the inability to distinguish dreams from reality during waking state.
</span></p><span data-dcnode-id="1075" instrument_node="">
