                </span></div><span data-dcnode-id="1634" instrument_node="">
</span><div class="bc1" data-dcnode-id="1630"><span data-dcnode-id="1633" instrument_node=""> </span><a data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/introduction-to-lucid-dreaming.html" target="_parent"><span data-dcnode-id="1632" instrument_node="">Introduction to Lucid Dreaming</span></a></div><div class="bc1" data-dcnode-id="1626"><span data-dcnode-id="1629" instrument_node=""> &gt; </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/is-lucid-dreaming-real.html" target="_parent"><span data-dcnode-id="1628" instrument_node="">Is Lucid Dreaming Real?</span></a></div></div><span data-dcnode-id="1624" instrument_node="">
</span><h1 align="center" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">Is Lucid Dreaming Real?</span></h1><span data-dcnode-id="1621" instrument_node="">
</span><div class="author" data-dcnode-id="1613"><span data-dcnode-id="1620" instrument_node="">


By </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/lucid-dreamer.html" target="_parent"><span data-dcnode-id="1619" instrument_node="">Rebecca Turner</span></a><span data-dcnode-id="1617" instrument_node=""> - take our </span><a data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/10-steps/10-steps.html" target="_blank"><span data-dcnode-id="1616" instrument_node="">free lucid dreaming course</span></a><span data-dcnode-id="1614" instrument_node="">.


</span></div><span data-dcnode-id="1612" instrument_node="">
</span><span data-dcnode-id="1610" instrument_node="">
</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">
</span><span data-dcnode-id="1606" instrument_node="">
</span><h3 align="center" data-dcnode-id="1605"></h3><span data-dcnode-id="1604" instrument_node="">
</span><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">Is lucid dreaming real? Absolutely. It's as real as homeopathy, crystal power and tarot readings.</span></p><span data-dcnode-id="1601" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1600" instrument_node="">Just kidding. Unlike those things, lucid dreaming is  scientifically verifiable in the lab and the effects can be replicated over and over. In fact, not only are there MRI brain scan studies from the last decade that </span><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/lucid-dreams-found-to-take-place-at-gamma-brainwave-frequencies.html" target="_parent"><span data-dcnode-id="1599" instrument_node="">prove the existence</span></a><span data-dcnode-id="1597" instrument_node=""> of consciousness in dreams, but as you'll see below, lucid dreamers actively participate in scientific experiments to further develop our understanding of consciousness.</span></p><span data-dcnode-id="1595" instrument_node="">
</span><h2 data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">The First Proof</span></h2><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">The </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/keith-hearne-interview.html" target="_parent"><span data-dcnode-id="1590" instrument_node="">first scientific evidence of lucid dreaming</span></a><span data-dcnode-id="1588" instrument_node=""> came out of Hull University in the UK in 1975, when Dr Keith Hearne recorded the pre-determined eye movements of his lucid dreaming subject:</span></p><span data-dcnode-id="1586" instrument_node="">
</span><div class="pulloutfull" data-dcnode-id="1581"><span data-dcnode-id="1585" instrument_node="">
</span><h3 data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">"[Through measuring Rapid Eye Movement] I had devised the signalling method in an attempt to circumvent the profound bodily paralysis of REM (dreaming) sleep - which inhibits any physical signalling.".</span></h3><span data-dcnode-id="1582" instrument_node="">
</span></div><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">His subject, Alan Worsley, was wired to a sensitive multi-channel chart recorder and monitored through the night. Finally, at 8am, came a sequence of large zig-zag movements on the Electro-oculograph (EOG):</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><img alt="The First Scientific Proof of Lucid Dreaming" class="v-centered staysmall" data-dcnode-id="1573" height="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/image-files/proof-of-lucid-dreaming.jpg&amp;raw" title="The First Proof of Lucid Dreaming" width="530"></p><span data-dcnode-id="1571" instrument_node="">
</span><div class="pulloutfull" data-dcnode-id="1563"><span data-dcnode-id="1570" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">"On waking, the subject described how he suddenly realised he was dreaming, and consciously made the signals before continuing the lucid dream experience. They were the first ever signals communicated from within a lucid dream," explained Dr Hearne.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">"It was an amazing, mind-boggling, situation. I was looking at a communication from a person in another room who was asleep, 'unconscious', dreaming, yet in his own vivid world in which he was perfectly conscious and interacting with others. It was his reality - I was in my reality. A channel of communication had been established between those two realities."</span></p><span data-dcnode-id="1564" instrument_node="">
</span></div><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">This remarkable proof of lucid dreaming is  now on permanent display in the </span><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencemuseum.org.uk/" target="_blank"><span data-dcnode-id="1560" instrument_node="">London Science Museum</span></a><span data-dcnode-id="1558" instrument_node="">. </span></p><span data-dcnode-id="1556" instrument_node="">
</span><h2 data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Your Brain When Lucid</span></h2><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">In more recent years, scientists have made use of functional Magnetic Resonance Imaging (fMRI) techniques to study the brains of active lucid dreamers.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1546" instrument_node=""> </span><a data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/lucid-dreams-found-to-take-place-at-gamma-brainwave-frequencies.html" target="_parent"><img alt="Lucid Dreams Under fMRI" class="v-centered staysmall" data-dcnode-id="1545" height="288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/image-files/lucid-dream-fmri.jpg&amp;raw" title="Lucid Dreams Under fMRI" width="750"></a></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1538"><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/lucid-dreams-found-to-take-place-at-gamma-brainwave-frequencies.html" target="_parent"><span data-dcnode-id="1541" instrument_node="">This study</span></a><span data-dcnode-id="1539" instrument_node=""> conducted at the Neurological Laboratory in Frankfurt in 2009 detected brainwaves in the range of 40 Hz (Gamma range) during lucid dreams.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">To put that in context, typical dreams take place in the Theta range (4-7 Hz), while waking consciousness averages in the Beta range (16-31 Hz). </span></p><span data-dcnode-id="1534" instrument_node="">
</span><div class="pulloutfull" data-dcnode-id="1530"><span data-dcnode-id="1533" instrument_node="">
</span><h3 data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">That's massive. Lucid dreams allow us to tap into even higher states of consciousness than waking reality.</span></h3></div><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">And this all took place in the claustrophobic, thumping tube of an MRI machine. In total, six lucid dreamers were used to generate the data, over five nights each.</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">The study, led by Dr Ursula Voss, also found heightened activity in the frontal and frontolateral areas of the brain. These are home to linguistic thought as well as other higher mental functions associated with self-awareness.</span></p><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The modern scientific study of lucid dreaming is giving us heaps to get excited about.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><h2 data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Dream Playback</span></h2><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1516" instrument_node="">This may start to sound like science fiction, but MRI has also brought about the chance record our dreams while they occur. As in -- </span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">video playback.</span></em></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node="">The technology is not exactly polished just yet. But in </span><a data-dcnode-id="1509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/scientists-measure-dream-content-with-help-of-lucid-dreamers.html" target="_parent"><span data-dcnode-id="1510" instrument_node="">this study</span></a><span data-dcnode-id="1508" instrument_node=""> from the Max Planck Institute got lucid dreamers  to perform a specific action in their dream. First, they signaled their lucidity with eye movements, then they lucidly clenched their right fist for 10 seconds in the dream.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">At the same time, the MRI produced a live view of bloodflow in their brains.</span></p><span data-dcnode-id="1503" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">The result? The very same areas of the brain were activated whether they clenched their fists in their lucid dreams - or while awake.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">The applied usefulness of this data is we can build a library of physical and dream actions detected by fMRI and translate them in real time. </span></p><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">And there's more. </span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><img alt="How to Play Back Your Dreams" class="x-rightfloat staysmall" data-dcnode-id="1493" height="313" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/image-files/how-to-play-back-your-dreams.jpg&amp;raw" title="How to Play Back Your Dreams" width="300"></p><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">"With this combination of sleep EEGs, imaging methods and lucid dreamers, we can measure not only simple movements during sleep but also the activity patterns in the brain during visual dream perceptions," explains Martin Dresler, a researcher at the Max Planck Institute for Psychiatry.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">That's right - when this technology is developed, we'll be able to live stream and record our dreams visually.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">In fact, </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/how-to-play-back-your-dreams.html" target="_parent"><span data-dcnode-id="1484" instrument_node="">these Japanese researchers</span></a><span data-dcnode-id="1482" instrument_node=""> at the ATR Computational Neuroscience Laboratories in Kyoto are already on the case.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Their study involved waking volunteers while dreaming inside an fMRI machine and asking what they were dreaming about. </span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">This time, they weren't using lucid dreamers. So they had to wake them hundreds of times and glean the dream experiences retrospectively.</span></p><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Their dream decoding software then pieced together these images, attempting to recreate the dream from the bloodflow data.</span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1468" instrument_node="">

</span><h3 data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">"In this field of dream decoding no-one has managed to successfully do this before," commented neuroscientist Jack Gallant. "If you could build the perfect dream decoder it would create a movie on your television screen and it would just replay your dreams."</span></h3><span data-dcnode-id="939" instrument_node="">
</span></div><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">It turns out that using MRI to read your thoughts is a hot area of research. Scientists at UC Berkeley have been scanning their own brains  while watching Hollywood movies.</span></p><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">They then fed  18 million seconds of random YouTube clips into their mind-reading software to give it a "paint palette" to work from.</span></p><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Here's the result: on the left you'll see the movie clip being watched by the scientist. On the right, you'll see the computer's reconstruction.</span></p><span data-dcnode-id="928" instrument_node="">

</span><p data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">&nbsp;</span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">It's a matter of time before this technology is refined and sleeping in our beds with us. Recording our lucid dreams. So we can visually re-live those exhilarating moments over and over and over again.</span></p><span data-dcnode-id="397" instrument_node="">
</span><h2 data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">The Philosopher in You</span></h2><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">So, is lucid dreaming real?</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">The scientist in you is now satisfied. But what about the philosopher in you?</span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="383"><span data-dcnode-id="387" instrument_node="">I do get </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/ask-the-experts.html" target="_parent"><span data-dcnode-id="386" instrument_node="">a lot of questions</span></a><span data-dcnode-id="384" instrument_node=""> about lucid dreaming and some of them are quite profound.</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Here's the question that relates most to lucid dreaming reality:  "If lucid dreaming is so real, how can you tell the difference between lucid dreams and reality?"</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Ok, I've got this. [Rolls up sleeves.]</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">The main reason you can tell the difference is  self-awareness. This is the crux of everything. And it's something that lucid dreamers are very good at.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="372" instrument_node="">In fact, if you're a non-lucid dreamer, you</span><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node=""> can't</span></em><span data-dcnode-id="369" instrument_node=""> tell the difference between your dreams and reality. That's why you're not having lucid dreams. You literally accept your dreams as reality every night.</span></p><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">It's only when you wake up you realize it was all a dream.</span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="361"><img alt="Is Lucid Dreaming Real?" class="x-rightfloat staysmall" data-dcnode-id="363" height="324" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/image-files/is-lucid-dreaming-real.jpg&amp;raw" title="Is Lucid Dreaming Real?" width="350"><span data-dcnode-id="362" instrument_node="">Right now, reading this screen, you are self-aware. You are using your five senses to build up an accurate picture of your surroundings and that keeps you rooted in reality. There is no doubt in your mind that you are awake right now, whether you are a lucid dreamer or not.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">But what of dream reality?</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">A similar process of logic occurs when you become lucid. Often it is a spontaneous realization that something in your dream reality is amiss. </span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Perhaps you have seen something strange, or heard something out of the ordinary. This triggers a far heightened sense of self-awareness in the dreamworld which enables you to fully question your reality and verify that you are, in fact, dreaming.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">So lucid dreamers practice this self-awareness in dreams, by frequently  sensing and reflecting on our reality. When practiced by day, it becomes an automatic state of mind at night.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">(For the record, we don't think we're lucid dreaming when we're awake either. I feel dumb saying that because it seems so obvious. Waking reality has a quality to it that even lucid dreams can't emulate. Consistency of time and space, for instance. Quality of memory and cognition. Need I go on?)</span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="337"><span data-dcnode-id="344" instrument_node="">For most lucid dreamers, the inability to identify a dream is most challenging during the bizarre limbo-like state of a </span><a data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/false-awakenings.html" target="_parent"><span data-dcnode-id="343" instrument_node="">false awakening</span></a><span data-dcnode-id="341" instrument_node="">. This is where you dream of waking up and accept it as your waking reality, </span><em data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">because it is so real</span></em><span data-dcnode-id="338" instrument_node="">. </span></p><span data-dcnode-id="336" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">False awakenings can be frustrating as they occur because you are fully lucid. And yet your dream refuses to yield. It pretends you are awake. It's a real mind f**k.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">This "alternative" lucid dream, based strikingly on reality, can ditch you in an infinite loop where the dream perfectly adheres to waking logic. It becomes extremely difficult to prove it's a dream. Even though, being so expertly lucid, you'll have plenty suspicion.</span></p><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">There are two ways to actively escape from a false awakening. One is to wake yourself up, by blinking heavily, imagining your real body lying in bed, and saying "WAKE UP!"</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">The other is to repeat multiple reality checks and don't let up. Don't accept that the dream is real. It's not. You can feel it. You know you're not awake, really. You just do.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">But don't let me scare you. There is absolutely nothing dangerous about  false awakenings. They're just dreams.</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Multiple false awakenings, one after the other, can be disturbing at the time. But ultimately they are just harmless vivid dreams, the kind of which we've all had before.</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="311"><span data-dcnode-id="317" instrument_node="">RELATED: </span><a data-dcnode-id="315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.world-of-lucid-dreaming.com/lucid-dream-science.html" target="_parent"><span data-dcnode-id="316" instrument_node="">The Science of Lucid Dreaming</span></a><span data-dcnode-id="314" instrument_node="">

</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Years ago, before I had my first lucid dream, I had a very specific idea about what a lucid dream would feel like. I thought it would be intense and magical and a little bit spooky. This turned out to be a pretty accurate representation. Becoming aware in the dreamstate is like entering another world. One where physical laws can be manipulated (there is no spoon, Neo) and your fantasies can come true in an instant. There's definitely something magical about that - and it's as if the lucid dream world is a living, breathing organism that can react to your very thoughts.</span></p><span data-dcnode-id="210" instrument_node="">
