Months into the pandemic, my dreams started changing. Instead of flunking my unstudied-for algebra exam, I faced a fresh horror: I was being jostled by a large crowd, panicked I had forgotten my mask. Another night, I dreamed I was building a house alongside Dr. Fauci.
</span></p><span data-dcnode-id="1319" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1318" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1316" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1314" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1315" instrument_node="">
My friends were sharing similarly themed nocturnal escapades. And sure enough, #quarantinedreams became a hashtag. "People reported unusually active dream lives, and those dreams were especially vivid and bizarre," says Deirdre Barrett, PhD, an assistant professor of psychology at Harvard Medical School and author of Pandemic Dreams . The uncertainty of the COVID crisis not only charged our days with anxiety, it infected our slumber, too: Nightmares about hazmat suits and crawling bugs indicated our brains were working around the clock to process a rapidly changing world.
</span></p><span data-dcnode-id="1312" instrument_node="">

</span><figcaption class="comp type--mouse mntl-figure-caption figure-article-caption" data-dcnode-id="1292" id="mntl-figure-caption_1-0"><span data-dcnode-id="1296" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">KATE DEHLER</span></span><span data-dcnode-id="1293" instrument_node="">
</span></figcaption><span data-dcnode-id="1290" instrument_node="">
</span></figure><span data-dcnode-id="1287" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1285" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1286" instrument_node="">
Though our COVID-inspired visions may be receding as the world tiptoes toward normalcy, they've piqued our fascination with dreams—which, it turns out, may be far more useful than we realize. "Dreaming is thinking in a different biochemical state," Barrett says. "The preoccupations of our day make their way into our dreams. It's just a different mode of making sense of them. It's more visual and more intuitive." And if we can learn to discern the meaning in our dreams, we can apply it to the issues that matter to us most.
</span></p><span data-dcnode-id="1283" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1274" id="mntl-sc-block_1-0-6"><div class="comp mntl-native-fluid mntl-native" data-dcnode-id="1275" data-right-rail-index="2" id="mntl-native-fluid_2-0" style="--native-ad-height: auto"><span data-dcnode-id="1282" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1278" id="mntl-native__adunit_2-0"><span data-dcnode-id="1281" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1280" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1279" instrument_node="">
</span></div><span data-dcnode-id="1276" instrument_node="">
</span></div></div><span data-dcnode-id="1272" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1271" id="toc-spinning-stories"></span><span data-dcnode-id="1270" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1265" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1269" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node=""> Spinning Stories </span></span><span data-dcnode-id="1266" instrument_node=""> </span></h2><span data-dcnode-id="1263" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1261" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1262" instrument_node="">
Most dreams occur during the REM (or rapid eye movement) stage of sleep , says Jade Wu, PhD, a sleep researcher at Duke University School of Medicine in Durham, North Carolina. While narratives build, your closed eyes dart back and forth, and the rest of your body lies immobilized (so you don't actually run away from nightmare tigers).
</span></p><span data-dcnode-id="1259" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1258" id="mntl-sc-block_1-0-9"></div><span data-dcnode-id="1256" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1254" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1255" instrument_node="">
"Your dreams get more elaborate as the night goes on," says Michelle Carr, PhD, a researcher at the University of Rochester Sleep and Neurophysiology Laboratory in New York . "REM periods last longer, the story lines themselves get more vivid and more emotional, and associations become more bizarre." Your whiny neighbor may take the form of a yowling cat, for example.
</span></p><span data-dcnode-id="1252" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1251" id="mntl-sc-block_1-0-11"></div><span data-dcnode-id="1249" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1247" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1248" instrument_node="">
These strange mash-ups materialize because the prefrontal cortex—the part of your brain in charge of logic—is less active while you're dreaming . "You don't have a censor saying, 'This does not make sense,' " explains Barrett. At the same time, the visual cortex ramps up its activity. These shifts in the brain set the stage for surreal scenarios to unfurl.
</span></p><span data-dcnode-id="1245" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1244" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1242" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1235" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1241" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1238" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/sleep/11-surprising-health-benefits-of-sleep" id="mntl-sc-block-featuredlink__link_1-0" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node="">11 Surprising Health Benefits of Sleep</span></span></a><span data-dcnode-id="1236" instrument_node="">
</span></div><span data-dcnode-id="1233" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1232" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1230" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1228" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1229" instrument_node="">
Some people suspect they don't ever dream, but dreams are universal, says Rebecca Spencer, PhD, a professor in the Department of Psychological and Brain Science at the University of Massachusetts Amherst. "Everyone dreams. The question is, Do you remember them?" Dreams are stored in our short-term memory and typically dissipate quickly, which means you're more likely to remember them if you wake up right in the middle of them. (This could be another reason it seemed as if we were dreaming more during the pandemic, experts say: Anxiety may have caused more frequent wee-hour awakenings.)
</span></p><span data-dcnode-id="1226" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1225" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="1223" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1222" id="toc-why-we-dream"></span><span data-dcnode-id="1221" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1216" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1220" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node=""> Why We Dream </span></span><span data-dcnode-id="1217" instrument_node=""> </span></h2><span data-dcnode-id="1214" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1212" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1213" instrument_node="">
Scientists are still debating the biological purposes of dreaming. One leading theory is that it plays a part in storing important memories. In our dreams, we connect meaningful events from the day—say, a kind gesture from your spouse or an argument with a friend—to prior experiences, which helps the brain figure out where to stow these fresh occurrences. "It is like your brain is saying, 'Where should I file this? Have I felt something like this before?' " says Spencer. For example, if you are disoriented by a friend's out-of-character behavior, you might dream you are wandering through the woods, hopelessly lost.
</span></p><span data-dcnode-id="1210" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1209" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1207" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1205" id="mntl-sc-block_1-0-21"><span data-dcnode-id="1206" instrument_node="">
Experts also believe dreams may help us work through our emotions. Matthew Walker, PhD, a professor of neuroscience and psychology at the University of California Berkeley, has called dreams "overnight therapy." According to his research, dreams allow us to relive the days' stings when our stress hormones are naturally low; the next morning, the events feel less upsetting than they did yesterday.
</span></p><span data-dcnode-id="1203" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1202" id="mntl-sc-block_1-0-22"></div><span data-dcnode-id="1200" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1193" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1199" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1196" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/sleep/how-many-hours-of-sleep-do-you-need" id="mntl-sc-block-featuredlink__link_1-0-1" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">How Much Sleep You Need, According to Experts</span></span></a><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1190" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="1188" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1186" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1187" instrument_node="">
Perhaps most intriguingly, our dreams may trigger aha insights and creative breakthroughs. (Paul McCartney has famously said the lyrics to "Let It Be" came to him in a dream.) During our uncensored nocturnal imaginings, full of loose associations, our minds can wander in new directions. Barrett points to one of her early studies, published in 1993 in the journal Dreaming: When she asked participants to contemplate a personal problem before bed for a week, about a quarter of them went on to have a dream that they felt provided a good solution to that problem.
</span></p><span data-dcnode-id="1184" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1183" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1181" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1179" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1180" instrument_node="">
"Dreams both reflect our waking lives and help us improve them, if we pay attention," says Carr. She herself had a dream-inspired epiphany not too long ago that actually changed the course of her career. "I was wrestling with whether to take on a huge professional responsibility," she recalls. "I felt unprepared and indecisive.
</span></p><span data-dcnode-id="1177" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1176" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1174" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1172" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1173" instrument_node="">
"One night, I had a dream I was being engulfed by a tidal wave and was terrified. Just as the wave was about to crash on top of me, a trusted colleague took my hand and showed me how to dive and come up the other side safely." She woke with a feeling of calm—and decided to take the leap.
</span></p><span data-dcnode-id="1170" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1169" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1167" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1156" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1166" instrument_node="">
