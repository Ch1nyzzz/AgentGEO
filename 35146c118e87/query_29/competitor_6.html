s-14cfce3" data-article-body="0" data-dcnode-id="324"><div class="css-z468a2" data-dcnode-id="442"><h1 data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Lucid dreaming: Controlling the stories of sleep</span></h1><section class="css-19y29pm" data-dcnode-id="931" data-testid="byline"><div data-dcnode-id="932"><span data-dcnode-id="941"><span data-dcnode-id="944" instrument_node="">Medically reviewed by </span><a class="css-1dkklb9" data-dcnode-id="942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/reviewers/raj-dasgupta-md"><span data-dcnode-id="943" instrument_node="">Raj Dasgupta, MD</span></a></span><span data-dcnode-id="940" instrument_node=""> — </span><span data-dcnode-id="936"><span data-dcnode-id="939" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/maria-cohut"><span data-dcnode-id="938" instrument_node="">Maria Cohut, Ph.D.</span></a></span><span data-dcnode-id="935" instrument_node=""> — </span><span data-dcnode-id="933"><span data-dcnode-id="934" instrument_node=""> Updated on July 27, 2020</span></span></div></section><div data-dcnode-id="576"><nav class="css-11tsida" data-dcnode-id="914" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="915"><li class="css-t753mo" data-dcnode-id="928"><a class="css-1xe63ky" data-dcnode-id="929" href="#definition"><span data-dcnode-id="930" instrument_node="">Definition</span></a></li><li class="css-t753mo" data-dcnode-id="925"><a class="css-1xe63ky" data-dcnode-id="926" href="#the-experience"><span data-dcnode-id="927" instrument_node="">The experience</span></a></li><li class="css-t753mo" data-dcnode-id="922"><a class="css-1xe63ky" data-dcnode-id="923" href="#applications"><span data-dcnode-id="924" instrument_node="">Applications</span></a></li><li class="css-t753mo" data-dcnode-id="919"><a class="css-1xe63ky" data-dcnode-id="920" href="#techniques"><span data-dcnode-id="921" instrument_node="">Techniques</span></a></li><li class="css-t753mo" data-dcnode-id="916"><a class="css-1xe63ky" data-dcnode-id="917" href="#concerns-and-risks"><span data-dcnode-id="918" instrument_node="">Concerns and risks</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="578"><div class="css-1u22pos" data-dcnode-id="858"><span data-dcnode-id="913" style="font-size:0;line-height:0"></span><div data-dcnode-id="910"><p class="css-dmtxcr" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Have you ever started dreaming and suddenly realized that you were in a dream? Have you ever managed to gain control over your dream narrative? If your answer to either of these is “yes,” you have experienced what is called lucid dreaming.</span></p></div><div data-dcnode-id="895"><figure class="css-yhe8zq" data-dcnode-id="896"><span class="css-rwmw5v" data-dcnode-id="899"><span class="css-mjp0j9" data-dcnode-id="904"><picture class="css-16pk1is" data-dcnode-id="905"><source data-dcnode-id="909" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/GettyImages-1091894716_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="908" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/GettyImages-1091894716_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="907" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/GettyImages-1091894716_header-1024x575.jpg?w=1845 879w"><img alt="an image of man standing next to lake under a star filled sky" class="css-1jytyml" data-dcnode-id="906" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/GettyImages-1091894716_header-1024x575.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="900"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="901" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/07/GettyImages-1091894716_header-1024x575.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.medicalnewstoday.com%252Farticles%252F323077%26media%3Dhttps%253A%252F%252Fpost.medicalnewstoday.com%252Fwp-content%252Fuploads%252Fsites%252F3%252F2020%252F07%252FGettyImages-1091894716_header-1024x575.jpg%26description%3DLucid%2520dreaming%253A%2520How-to%252C%2520benefits%252C%2520and%2520risks" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">What is lucid dreaming, and how can you achieve it?</span></figcaption></figure></div><p data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">Movies such as </span><em data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Inception</span></em><span data-dcnode-id="891" instrument_node=""> have popularized lucid dreaming. This movie features impressive dream artisans who are able to control the shape and content of their dreams, as well as the dreams of others.</span></p><p data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Such feats of dream manipulation may not seem possible to the same extent in our real lives, but they are not altogether absent.</span></p><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">In fact, a number of people are able to experience something called lucid dreaming, and some of them are even able to control certain elements of their nightly dreams. </span></p><p data-dcnode-id="876"><span data-dcnode-id="885" instrument_node="">According to some research, </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="878" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6874013/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="884" instrument_node="">around half</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="881"><span class="sro" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="879"></span></hl-trusted-source><span data-dcnode-id="877" instrument_node=""> of all people have had a lucid dream at some time in their lives, and around 11% experience one or two lucid dreams per month.</span></p><p data-dcnode-id="870"><span data-dcnode-id="875" instrument_node="">In his much-cited poem </span><em data-dcnode-id="872"><a class="content-link css-1pg8eb5" data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.poets.org/poetsorg/poem/dream-within-dream" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="874" instrument_node="">A Dream Within A Dream</span></a></em><span data-dcnode-id="871" instrument_node="">, Edgar Allan Poe wrote, “All that we see or seem/Is but a dream within a dream.”</span></p><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Whether or not he is right is a matter for philosophers to debate, but the boundary between dreams and reality is something that lucid dreaming appears to explore.</span></p><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">In this Spotlight, we look at what qualifies as lucid dreaming, whether these experiences can have any practical applications, and how a person might be able to become a lucid dreamer.</span></p><div data-dcnode-id="865" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="859"><aside class="css-0 css-0" data-dcnode-id="860"><div data-dcnode-id="861"><div class="css-10gx9pb" data-dcnode-id="862" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="864"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="863" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="816"><span data-dcnode-id="857" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="853"><div data-dcnode-id="854"><a class="chartbeat-section" data-dcnode-id="855" name="definition"><span data-dcnode-id="856" instrument_node="">What is lucid dreaming?</span></a></div></h2><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">Typically, when we dream, we do not know that the dream is not real. As a character from the movie </span><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Inception</span></em><span data-dcnode-id="849" instrument_node=""> quite aptly puts it, “Well, dreams, they feel real while we’re in them, right? It’s only when we wake up that we realize that something was actually strange.”</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">However, some people are able to enter a dream and be fully aware of the fact that they are actually dreaming.</span></p><p data-dcnode-id="840"><strong data-dcnode-id="841"><span data-dcnode-id="845" instrument_node="">“A lucid dream is defined as a dream during which dreamers, while dreaming, are aware they are dreaming,” specialists </span><a class="content-link css-1pg8eb5" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fpsyg.2013.01013/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="844" instrument_node="">explain</span></a><span data-dcnode-id="842" instrument_node="">.</span></strong></p><p data-dcnode-id="832"><span data-dcnode-id="839" instrument_node="">The very </span><a class="content-link css-1pg8eb5" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/chapter/10.1007/978-1-4757-0423-5_2" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="838" instrument_node="">first record</span></a><span data-dcnode-id="836" instrument_node=""> of lucid dreaming appears to feature in the treatise </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">On Dreams</span></em><span data-dcnode-id="833" instrument_node=""> by the Ancient Greek philosopher Aristotle. In it, he describes an instance of self-awareness during a dream state.</span></p><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">“[If] the sleeper perceives that he is asleep, and is conscious of the sleeping state during which the perception comes before his mind, it presents itself still, but something within him speaks to this effect: ‘The image of Koriskos presents itself, but the real Koriskos is not present,'” he wrote.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">It is unclear how many people actually experience lucid dreaming, though certain studies have tried to gather information regarding its prevalence — and it seems that this phenomenon may be quite common.</span></p><p data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">For instance, researchers in Brazil surveyed 3,427 participants with a median age of 25. The results of the survey indicated that </span><a class="content-link css-1pg8eb5" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/articles/10.3389/fnhum.2013.00836/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="826" instrument_node="">77%</span></a><span data-dcnode-id="824" instrument_node=""> of the respondents had experienced lucid dreaming at least once.</span></p><div class="css-1cg0byz" data-dcnode-id="817"><aside class="css-0 css-0" data-dcnode-id="818"><div data-dcnode-id="819"><div class="css-az6x7v" data-dcnode-id="820" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="822"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="821" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="777"><span data-dcnode-id="815" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="811"><div data-dcnode-id="812"><a class="chartbeat-section" data-dcnode-id="813" name="the-experience"><span data-dcnode-id="814" instrument_node="">When does it happen, and what is it like?</span></a></div></h2><p data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">Like most dreams, lucid dreaming will typically occur </span><a class="content-link css-1pg8eb5" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journals.sagepub.com/doi/abs/10.2466/pms.1981.52.3.727" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="809" instrument_node="">during rapid eye movement (REM) sleep</span></a><span data-dcnode-id="807" instrument_node="">. For some people it occurs spontaneously, but others train themselves to start dreaming lucidly (or to become better at it).</span></p><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">As one experienced lucid dreamer told </span><em data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Medical News Today</span></em><span data-dcnode-id="802" instrument_node="">:</span></p><blockquote class="css-34gtoi" data-dcnode-id="796"><p data-dcnode-id="797"><span class="pullquote" data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">“</span></span><span data-dcnode-id="798" instrument_node="">[M]y lucid dreaming […] occurs when I’m waking up, or sometimes if I’ve woken up briefly and I’m going back to sleep. Nowadays, I can pretty much do it on a whim, as long as I’m in that half-asleep half-awake process.”</span></p></blockquote><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">The degree to which a person can influence their dream also varies.</span></p><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node=""> Some people may simply wake up immediately upon realizing that they had been dreaming. Other people, however, may be able to influence their own actions within the dream, or parts of the dream itself. </span></p><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">The lucid dreamer who spoke to </span><em data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">MNT</span></em><span data-dcnode-id="788" instrument_node=""> told us that she was able to manipulate the dream narrative in order to create a pleasant experience for herself.</span></p><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">“Usually,” she explained, “I can control the narrative in the dream, so for example, if I’m unhappy with the way things are going in the dream, I can change it.”</span></p><div data-dcnode-id="784" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="778"><aside class="css-0 css-0" data-dcnode-id="779"><div data-dcnode-id="780"><div class="css-10gx9pb" data-dcnode-id="781" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="783"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="782" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="697"><span data-dcnode-id="776" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="772"><div data-dcnode-id="773"><a class="chartbeat-section" data-dcnode-id="774" name="applications"><span data-dcnode-id="775" instrument_node="">What are its applications?</span></a></div></h2><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Lucid dreaming is certainly an attractive and fascinating prospect; being able to explore our own inner worlds with full awareness that we are in a dream is intriguing and has an almost magical flavor to it.</span></p><div data-dcnode-id="759"><figure class="css-4kegza" data-dcnode-id="760"><span class="css-rwmw5v" data-dcnode-id="763"><span class="css-qta9tq" data-dcnode-id="768"><lazy-image alt="silhouette on dark background" classname="css-1jytyml" data-dcnode-id="769" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/silhouette-on-dark-background.jpg?w=1155&amp;h=1671" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/silhouette-on-dark-background.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/silhouette-on-dark-background.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/silhouette-on-dark-background.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="764"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="765" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/silhouette-on-dark-background.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.medicalnewstoday.com%252Farticles%252F323077%26media%3Dhttps%253A%252F%252Fcdn-prod.medicalnewstoday.com%252Fcontent%252Fimages%252Farticles%252F323%252F323077%252Fsilhouette-on-dark-background.jpg%26description%3DLucid%2520dreaming%253A%2520How-to%252C%2520benefits%252C%2520and%2520risks" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Lucid dreaming may help people get rid of their nightmares and resolve their fears.</span></figcaption></figure></div><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">However, can lucid dreaming have any practical applications?</span></p><p data-dcnode-id="753"><a class="content-link css-1pg8eb5" data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.luciddreamingaustralia.com/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="756" instrument_node="">Dr. Denholm Aspy</span></a><span data-dcnode-id="754" instrument_node="">, at the University of Adelaide in Australia, is a researcher who specializes in lucid dreaming.</span></p><p data-dcnode-id="740"><span data-dcnode-id="752" instrument_node="">He explained to </span><em data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">MNT</span></em><span data-dcnode-id="749" instrument_node=""> that this experience can actually be therapeutic. Its main application, Dr. Aspy said, is to address nightmares — especially recurring nightmares, which may </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="742" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3690155/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="748" instrument_node="">affect a person’s quality of life</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="745"><span class="sro" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="743"></span></hl-trusted-source><span data-dcnode-id="741" instrument_node="">.</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">The practice of learning to lucid dream to stop nightmares from occurring or recurring, he explained, is called “lucid dreaming therapy.”</span></p><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">“If you can help someone who’s having nightmares to become lucid during that nightmare,” he said, “then that gives them the ability to exert control over themselves or over the nightmare itself.”</span></p><blockquote class="css-34gtoi" data-dcnode-id="729"><p data-dcnode-id="732"><span class="pullquote" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">“</span></span><span data-dcnode-id="733" instrument_node="">[L]et’s say you’re being attacked by someone in a nightmare. You could try to talk to the attacker. You could ask them, ‘Why are you appearing in my dreams?’ or ‘What do you need to resolve this conflict with me?'”</span></p><p class="right" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Dr. Denholm Aspy</span></p></blockquote><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">“Some people,” he added, “take on superpowers or special abilities, [so] they can fight back against the attacker. And then you can also try to escape, so things like flying away, or even doing techniques to deliberately wake up from the nightmare.”</span></p><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Lucid dreaming also has the potential to help people with </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/249347.php" title="Everything you need to know about phobias"><span data-dcnode-id="725" instrument_node="">phobias</span></a><span data-dcnode-id="723" instrument_node="">, such as a fear of flying or a fear of spiders.</span></p><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">“If a person has a particular phobia, then their lucid dream environment […] provides an interesting opportunity to do things like exposure therapy, where you gradually expose yourself to the thing you’re afraid of, in an attempt to gradually overcome that fear,” Dr. Aspy said.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">This is possible, he added, because dream environments can provide a realistic enough experience without it actually feeling unsafe. During lucid dreaming, an individual knows that they are not in the real world, so they may safely explore their fears without actually feeling threatened.</span></p><h3 data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">‘Lucid dreaming is a kind of creative activity’</span></h3><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">At the same time, lucid dreaming is also attractive as an unusual means of entertainment — much like the immersive experience of virtual reality.</span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">An experienced lucid dreamer might be able to “go on an adventure” and interact with people and things in ways they may not be able to in real life.</span></p><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">The lucid dreamer who spoke to </span><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">MNT</span></em><span data-dcnode-id="708" instrument_node=""> said that she thinks of the experience as something akin to storytelling, which makes her feel happier upon waking up:</span></p><blockquote class="css-34gtoi" data-dcnode-id="702"><p data-dcnode-id="703"><span class="pullquote" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">“</span></span><span data-dcnode-id="704" instrument_node="">Lucid dreaming for me is a kind of creative activity — I get to explore what my dreams are telling me a little bit versus what my conscious mind wants. It’s not got much use apart from just being interesting, and it makes me happy usually […]. I tend to wake up quite content.”</span></p></blockquote><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">“I do lucid dreaming for fun,” she went on to say. “I enjoy it, and as someone who enjoys storytelling, it’s a similar experience to writing a story or playing a video game. You get immersed in a narrative that involves you in some way.”</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="699" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="698" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="636"><span data-dcnode-id="696" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="692"><div data-dcnode-id="693"><a class="chartbeat-section" data-dcnode-id="694" name="techniques"><span data-dcnode-id="695" instrument_node="">Techniques for lucid dreaming</span></a></div></h2><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">There are many techniques that people who want to try lucid dreaming or perfect their lucid dreaming experiences employ.</span></p><div data-dcnode-id="679"><figure class="css-4kegza" data-dcnode-id="680"><span class="css-rwmw5v" data-dcnode-id="683"><span class="css-tzxed7" data-dcnode-id="688"><lazy-image alt="text on billboard" classname="css-1jytyml" data-dcnode-id="689" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/text-on-billboard.jpg?w=1155&amp;h=1545" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/text-on-billboard.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/text-on-billboard.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/text-on-billboard.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="684"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="685" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/323/323077/text-on-billboard.jpg" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.medicalnewstoday.com%252Farticles%252F323077%26media%3Dhttps%253A%252F%252Fcdn-prod.medicalnewstoday.com%252Fcontent%252Fimages%252Farticles%252F323%252F323077%252Ftext-on-billboard.jpg%26description%3DLucid%2520dreaming%253A%2520How-to%252C%2520benefits%252C%2520and%2520risks" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Text shifts in dreams, so you may become aware that you are dreaming by trying to reread it.</span></figcaption></figure></div><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">A </span><a class="content-link css-1pg8eb5" data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycnet.apa.org/doiLanding%3Fdoi%3D10.1037%252Fdrm0000059" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="677" instrument_node="">2017 study</span></a><span data-dcnode-id="675" instrument_node=""> that Dr. Aspy and colleagues conducted tested the efficacy of three common techniques.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">The first is called “reality testing.” This may involve verifying whether or not you are dreaming both in real life and during a dream.</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">For instance, throughout the day, a person may want to ask themselves, “Am I dreaming right now?” as they try to make their hand pass through a solid wall.</span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">This technique relies on intention. In real life, the wall will remain solid and impenetrable, but in a dream, the hand will easily pass through it.</span></p><p data-dcnode-id="665"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Another “reality check” is rereading a line of text. In real life, if we read the text on a poster, it will stay the same when we reread it. In a dream, however, the text will constantly shift.</span></strong></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Conducting these experiments repeatedly throughout the day may make it easier to remember to conduct them during dreams, thus allowing the dreamer to gain awareness of the dream.</span></p><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Another technique is “waking back to bed.” This requires setting an alarm to wake oneself up around 5–6 hours after going to sleep.</span></p><p data-dcnode-id="656"><span data-dcnode-id="660" instrument_node="">Once awake, the person should aim to remain awake for a while before going back to sleep. This technique is supposed to immerse the sleeper immediately into </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/247927.php" title="What is REM sleep?"><span data-dcnode-id="659" instrument_node="">REM</span></a><span data-dcnode-id="657" instrument_node="">, which is the phase of sleep during which they are most likely to experience a lucid dream.</span></p><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Lucid dreaming may also occur through “mnemonic induction.” This is another technique that requires intent and lots of practice.</span></p><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">With mnemonic induction, a person must repeat to themselves — just before going to bed — a phrase such as, “Tonight, I will notice that I am dreaming,” so as to “program” themselves to achieve in-dream lucidity.</span></p><h3 data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Dream journals and meditation</span></h3><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">It also appears that those who find it easy to lucid dream do not have much trouble recalling their dreams on a regular basis.</span></p><p data-dcnode-id="645"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">“When it comes to lucid dreaming, the strongest predictor of whether you have lucid dreams or not is how good you are at remembering your ordinary dreams,” Dr. Aspy explained.</span></strong></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Therefore, some people who are interested in exploring their dreams with full awareness may find it useful to keep a dream journal in which they record the dreams they have each night in as much detail as possible.</span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">The lucid dreamer we interviewed corroborated this idea by explaining that, for a long time, she used to enjoy writing down her dreams upon waking up.</span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Another practice that may aid lucid dreaming is meditation, or mindfulness, as it “trains” people to become more aware of themselves and their surroundings in general.</span></p><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">“A lot of people are interested in meditation and mindfulness as a way to have lucid dreams,” said Dr. Aspy, explaining, “The idea there is that if you’re more aware during the day, you’re more likely to notice that you’re dreaming while you’re asleep.”</span></p></div><div class="css-0" data-dcnode-id="579"><span data-dcnode-id="635" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="631"><div data-dcnode-id="632"><a class="chartbeat-section" data-dcnode-id="633" name="concerns-and-risks"><span data-dcnode-id="634" instrument_node="">Concerns and risks</span></a></div></h2><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">One concern that some people express about engaging in lucid dreaming, if they are able to achieve it, is that they may get “stuck” in a dream and find it more difficult to wake up.</span></p><p data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">However, Dr. Aspy explained to </span><em data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">MNT</span></em><span data-dcnode-id="625" instrument_node=""> that this should be no cause for concern; usually, people are only able to sleep (and dream) for a set amount of time every night, so it is unlikely that anyone would get “stuck” sleeping.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">He told us, “The main reason for that is — pretty much no matter what you do, you are only going to, on average, only have a certain amount of sleep and dreaming every night. There are some things that you can do to increase it a little bit, but you can’t really sustain that for very long.”</span></p><p data-dcnode-id="612"><span data-dcnode-id="621" instrument_node="">Another concern some people have is that engaging in lucid dreaming requires focus and effort, which might mean that the sleeper does not get enough rest. In fact, the authors of a </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="614" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6874013/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="620" instrument_node="">2019 article</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="617"><span class="sro" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="615"></span></hl-trusted-source><span data-dcnode-id="613" instrument_node=""> expressed concern that frequent lucid dreaming may lead to disrupted sleep.</span></p><p data-dcnode-id="607"><span data-dcnode-id="611" instrument_node="">However, Dr. Aspy explained that the lucid dreamers with whom he has worked in the past have not reported more </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248002.php" title="Fatigue: Why am I so tired and what can I do about it?"><span data-dcnode-id="610" instrument_node="">tiredness</span></a><span data-dcnode-id="608" instrument_node=""> or poorer sleep quality as a result of lucid dreaming.</span></p><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">He did, however, issue a warning to aspiring lucid dreamers:</span></p><blockquote class="css-34gtoi" data-dcnode-id="597"><p data-dcnode-id="598"><span class="pullquote" data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">“</span></span><span data-dcnode-id="602" instrument_node="">I generally recommend that people don’t pursue lucid dreaming if they have certain </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/154543.php" title="What is mental health?"><span data-dcnode-id="601" instrument_node="">mental health</span></a><span data-dcnode-id="599" instrument_node=""> problems.”</span></p></blockquote><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node="">One example of this is </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/36942.php" title="Understanding the symptoms of schizophrenia"><span data-dcnode-id="595" instrument_node="">schizophrenia</span></a><span data-dcnode-id="593" instrument_node="">. This condition may cause people to have difficulty distinguishing between hallucinations and real-life events. In some cases, Dr. Aspy told us, lucid dreaming may actually exacerbate the condition.</span></p><p data-dcnode-id="582"><span data-dcnode-id="591" instrument_node="">Other </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="584" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6993576/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="590" instrument_node="">scientists</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="587"><span class="sro" data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="585"></span></hl-trusted-source><span data-dcnode-id="583" instrument_node=""> ask whether or not encouraging lucid dreaming might blur the line between sleep-wake psychological boundaries. They call for more research into how it might affect certain vulnerable people, including those who experience dissociation.</span></p><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Lucid dreaming may be a fascinating, helpful, or pleasant experience, but you should consider why you are interested in achieving it and what you expect to get from it before trying to experiment.</span></p></div></article><div data-dcnode-id="577" id="bottom-of-article"></div></div><p class="css-1kir5of" data-dcnode-id="573"><span data-dcnode-id="574"><span data-dcnode-id="575" instrument_node=""> Last medically reviewed on  July 27, 2020</span></span></p><div class="css-5b5f7q" data-dcnode-id="559"><ul data-dcnode-id="560"><li data-dcnode-id="570" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="571" data-event="Navigation|article tag click|Mental Health" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/mental-health"><span data-dcnode-id="572" instrument_node="">Mental Health</span></a></li><li data-dcnode-id="567" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="568" data-event="Navigation|article tag click|Neurology / Neuroscience" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/neurology"><span data-dcnode-id="569" instrument_node="">Neurology / Neuroscience</span></a></li><li data-dcnode-id="564" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="565" data-event="Navigation|article tag click|Psychology / Psychiatry" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/psychology-psychiatry"><span data-dcnode-id="566" instrument_node="">Psychology / Psychiatry</span></a></li><li data-dcnode-id="561" itemprop="genre"><a class="css-1pg8eb5" data-dcnode-id="562" data-event="Navigation|article tag click|Sleep / Sleep Disorders / Insomnia" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/categories/sleep"><span data-dcnode-id="563" instrument_node="">Sleep / Sleep Disorders / Insomnia</span></a></li></ul></div><div class="css-zvkybb" data-dcnode-id="443"><div class="css-55guol" data-dcnode-id="459"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="550" role="button"><p class="css-lkhgkk" data-dcnode-id="551"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="558"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="557"></span><span data-dcnode-id="556" instrument_node=""> </span><span class="css-11nuv7j" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">9 sources</span></span><span class="sro" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">collapsed</span></span></p></div><div class="css-j247ue" data-dcnode-id="460" id="article-resources" role="region"><div class="css-2udk3k" data-dcnode-id="543"><span data-dcnode-id="549" instrument_node="">Medical News Today has strict sourcing guidelines and draws only from peer-reviewed studies, academic research institutions, and medical journals and associations. We avoid using tertiary references. We link primary sources — including studies, scientific references, and statistics — within each article and also list them in the resources section at the bottom of our articles. You can learn more about how we ensure our content is accurate and current by reading our</span><span data-dcnode-id="547" instrument_node=""> </span><a class="css-1pg8eb5" data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/process"><span data-dcnode-id="546" instrument_node="">editorial policy</span></a><span data-dcnode-id="544" instrument_node="">.</span></div><ul class="css-1gxh91s" data-dcnode-id="461"><li class="css-dp76we" data-dcnode-id="533"
