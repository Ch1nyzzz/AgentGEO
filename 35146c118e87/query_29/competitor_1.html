 technically challenging. On the experimental (second and third) nights, participants were awoken from NREM (sleep stage 2 or 3) when their neural activity surpassed a bispectral threshold in low- and high-frequency band power from an electrode cluster centered over the posterior hot zone. To ensure a stable sleep stage had been reached, participants were required to be in NREM for a minimum of 120 s before the algorithm initiated an awakening. The bispectral threshold required that, for a DE prediction to be initiated, low-frequency power had to be less than or equal to the bottom 15% threshold, while high-frequency power had to simultaneously meet the top 15% threshold for that subject. Likewise, for an NE prediction to be initiated, low-frequency power had to be greater than or equal to the top 15% threshold while high-frequency power had to simultaneously be less than or equal to the bottom 15% threshold for that subject. This procedure was motivated by the results of experiments 1 and 2, and was intended to predict the presence of DE during time epochs in which the cortex was not only not bistable but also displayed correlates of neural firing (and vice versa for predictions of NE</span><sup data-dcnode-id="4133"><a aria-label="Reference 13" data-dcnode-id="4137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d93788509e1789" title="Tononi, G. &amp; Massimini, M. Why does consciousness fade in early sleep? Ann. NY Acad. Sci. 1129, 330–334 (2008)."><span data-dcnode-id="4138" instrument_node="">13</span></a><span data-dcnode-id="4136" instrument_node="">,</span><a aria-label="Reference 16" data-dcnode-id="4134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d93788509e1792" title="Steriade, M., Contreras, D., Amzica, F. &amp; Timofeev, I. Synchronization of fast (30-40 Hz) spontaneous oscillations in intrathalamic and thalamocortical networks. J. Neurosci. 16, 2788–2808 (1996)."><span data-dcnode-id="4135" instrument_node="">16</span></a></sup><span data-dcnode-id="4132" instrument_node="">). Upon awakening, participants completed a short version of the sleep questionnaire used in experiments 1 and 2.</span></p><p data-dcnode-id="4121"><i data-dcnode-id="4129"><span data-dcnode-id="4130" instrument_node="">Post hoc</span></i><span data-dcnode-id="4128" instrument_node=""> statistical analyses were performed to confirm the posterior maximum of the low-frequency/high-frequency differences. Because extreme ratios were compared, statistical differences were expected to be much stronger in this experiment than in experiments 1 and 2. For this reason, a more stringent threshold was used (</span><i data-dcnode-id="4126"><span data-dcnode-id="4127" instrument_node="">P</span></i><span data-dcnode-id="4125" instrument_node=""> &lt; 0.001, FDR cluster corrected). This analysis confirmed the posterior maximum of the low-frequency/high-frequency differences. For an analysis with SnPM correction with the same threshold than in experiments 1 and 2, see </span><a data-dcnode-id="4123" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig12"><span data-dcnode-id="4124" instrument_node="">Supplementary Figure 7</span></a><span data-dcnode-id="4122" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4119" id="Sec15"><span data-dcnode-id="4120" instrument_node="">Data availability.</span></h3><p data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">The data that support the findings of this study are available from the corresponding author upon reasonable request. Code was written using standard Matlab functions and freely available toolboxes (Brainstorm, EEGLAB). It is available upon reasonable request.</span></p></div></div></section><span data-dcnode-id="4113" instrument_node="">
</span><div data-dcnode-id="2828" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="2829" data-title="References"><div class="c-article-section" data-dcnode-id="2830" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4111" id="Bib1"><span data-dcnode-id="4112" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="2831" id="Bib1-content"><div data-container-section="references" data-dcnode-id="2832"><ol class="c-article-references" data-dcnode-id="2842"><li class="c-article-references__item js-c-reading-companion-references-item" data-counter="1" data-dcnode-id="4092"><p class="c-article-references__text" data-dcnode-id="4103" id="ref-CR1"><span data-dcnode-id="4110" instrument_node="">Stickgold, R., Malia, A., Fosse, R., Propper, R. &amp; Hobson, J.A. Brain-mind states: I. Longitudinal field study of sleep/wake factors influencing mentation report length. </span><i data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">Sleep</span></i><span data-dcnode-id="4107" instrument_node=""> </span><b data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">24</span></b><span data-dcnode-id="4104" instrument_node="">, 171–179 (2001).</span></p><p class="c-article-references__links u-hide-print" data-dcnode-id="4093"><a aria-label="CAS reference 1" data-dcnode-id="4101" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/cas-redirect/1%3ASTN%3A280%3ADC%252BD3MvitF2nsg%253D%253D"><span data-dcnode-id="4102" instrument_node="">CAS</span></a><span data-dcnode-id="4100" instrument_node="">&nbsp;
    </span><a aria-label="PubMed reference 1" data-dcnode-id="4098" data-track="click" data-track-action="outbound reference" data-track-label="link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/entrez/query.fcgi%3Fcmd%3DRetrieve%26db%3DPubMed%26dopt%3DAbstract%26list_uids%3D11247053" rel="nofollow"><span data-dcnode-id="4099" instrument_node="">PubMed</span></a><span data-dcnode-id="4097" instrument_node="">&nbsp;
