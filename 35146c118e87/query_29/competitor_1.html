</span><meta content="The authors show that during sleep, dreaming and specific perceptual dream contents can be localized to a posterior hot zone of the brain. By monitoring activity in this zone, they were able to predict dreaming in real time with high accuracy. Consciousness never fades during waking. However, when awakened from sleep, we sometimes recall dreams and sometimes recall no experiences. Traditionally, dreaming has been identified with rapid eye-movement (REM) sleep, characterized by wake-like, globally 'activated', high-frequency electroencephalographic activity. However, dreaming also occurs in non-REM (NREM) sleep, characterized by prominent low-frequency activity. This challenges our understanding of the neural correlates of conscious experiences in sleep. Using high-density electroencephalography, we contrasted the presence and absence of dreaming in NREM and REM sleep. In both NREM and REM sleep, reports of dream experience were associated with local decreases in low-frequency activity in posterior cortical regions. High-frequency activity in these regions correlated with specific dream contents. Monitoring this posterior 'hot zone' in real time predicted whether an individual reported dreaming or the absence of dream experiences during NREM sleep, suggesting that it may constitute a core correlate of conscious experiences in sleep." data-dcnode-id="6439" name="dc.description"><span data-dcnode-id="6438" instrument_node="">

</span><div class="c-article-body" data-dcnode-id="2234"><span data-dcnode-id="5368" instrument_node="">
</span><section aria-labelledby="Abs2" data-dcnode-id="5361" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5362" id="Abs2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5366" id="Abs2"><span data-dcnode-id="5367" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5363" id="Abs2-content"><p data-dcnode-id="5364"><span data-dcnode-id="5365" instrument_node="">Consciousness never fades during waking. However, when awakened from sleep, we sometimes recall dreams and sometimes recall no experiences. Traditionally, dreaming has been identified with rapid eye-movement (REM) sleep, characterized by wake-like, globally 'activated', high-frequency electroencephalographic activity. However, dreaming also occurs in non-REM (NREM) sleep, characterized by prominent low-frequency activity. This challenges our understanding of the neural correlates of conscious experiences in sleep. Using high-density electroencephalography, we contrasted the presence and absence of dreaming in NREM and REM sleep. In both NREM and REM sleep, reports of dream experience were associated with local decreases in low-frequency activity in posterior cortical regions. High-frequency activity in these regions correlated with specific dream contents. Monitoring this posterior 'hot zone' in real time predicted whether an individual reported dreaming or the absence of dream experiences during NREM sleep, suggesting that it may constitute a core correlate of conscious experiences in sleep.</span></p></div></div></section><span data-dcnode-id="5360" instrument_node="">

</span></div><span data-dcnode-id="5335" instrument_node="">
</span></div><span data-dcnode-id="5333" instrument_node="">
</span><section data-dcnode-id="5285" data-title="Main"><div class="c-article-section" data-dcnode-id="5286" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5331" id="Sec1"><span data-dcnode-id="5332" instrument_node="">Main</span></h2><div class="c-article-section__content" data-dcnode-id="5287" id="Sec1-content"><p data-dcnode-id="5318"><span data-dcnode-id="5330" instrument_node="">An ongoing stream of experiences accompanies every waking moment. Sleep is the only time in which consciousness fades under normal physiological conditions: subjects awakened from sleep, especially early in the night, report that they were not experiencing anything up to 30% of the time</span><sup data-dcnode-id="5327"><a aria-label="Reference 1" data-dcnode-id="5328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d93788509e540" title="Stickgold, R., Malia, A., Fosse, R., Propper, R. &amp; Hobson, J.A. Brain-mind states: I. Longitudinal field study of sleep/wake factors influencing mentation report length. Sleep 24, 171–179 (2001)."><span data-dcnode-id="5329" instrument_node="">1</span></a></sup><span data-dcnode-id="5326" instrument_node="">. At other times, subjects awakened from sleep report dreams—a stream of vivid experiences that occur despite being immobile, unresponsive and largely disconnected from the environment. Thus, unlike wakefulness, sleep can be associated with either the presence or absence of conscious experiences. In addition, experiences in dreams can assume many forms, ranging from pure perceptual experiences to pure thought and from simple images to temporally unfolding narratives, which are often similar to awake conscious states but at times can be different in interesting ways</span><sup data-dcnode-id="5320"><a aria-label="Reference 2" data-dcnode-id="5324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d93788509e544" title="Nir, Y. &amp; Tononi, G. Dreaming and the brain: from phenomenology to neurophysiology. Trends Cogn. Sci. 14, 88–100 (2010)."><span data-dcnode-id="5325" instrument_node="">2</span></a><span data-dcnode-id="5323" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="5321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d93788509e547" title="Schwartz, S. &amp; Maquet, P. Sleep imaging and the neuro-psychological assessment of dreams. Trends Cogn. Sci. 6, 23–30 (2002)."><span data-dcnode-id="5322" instrument_node="">3</span></a></sup><span data-dcnode-id="5319" instrument_node="">.</span></p><p data-dcnode-id="5294"><span data-dcnode-id="5317" instrument_node="">The discovery of rapid eye movement (REM) sleep—the 'third state of being' besides wake and non-REM (NREM) sleep—led initially to a straightforward view of the neural correlates of dreaming</span><sup data-dcnode-id="5314"><a aria-label="Reference 4" data-dcnode-id="5315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d93788509e554" title="Aserinsky, E. &amp; Kleitman, N. Regularly occurring periods of eye motility, and concomitant phenomena, during sleep. Science 118, 273–274 (1953)."><span data-dcnode-id="5316" instrument_node="">4</span></a></sup><span data-dcnode-id="5313" instrument_node="">: the wake-like, high-frequency, activated electroencephalogram (EEG)</span><sup data-dcnode-id="5307"><a aria-label="Reference 5" data-dcnode-id="5311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d93788509e558" title="Moruzzi, G. &amp; Magoun, H.W. Brain stem reticular formation and activation of the EEG. Electroencephalogr. Clin. Neurophysiol. 1, 455–473 (1949)."><span data-dcnode-id="5312" instrument_node="">5</span></a><span data-dcnode-id="5310" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="5308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d93788509e561" title="Steriade, M., Timofeev, I. &amp; Grenier, F. Natural waking and sleep states: a view from inside neocortical neurons. J. Neurophysiol. 85, 1969–1985 (2001)."><span data-dcnode-id="5309" instrument_node="">6</span></a></sup><span data-dcnode-id="5306" instrument_node=""> of REM sleep was thought to be associated with the presence of dream experiences and the low-frequency activity of NREM sleep with the absence of dreaming. However, later studies showed that up to 70% of NREM sleep awakenings yield reports of dream experiences</span><sup data-dcnode-id="5303"><a aria-label="Reference 1" data-dcnode-id="5304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d93788509e565" title="Stickgold, R., Malia, A., Fosse, R., Propper, R. &amp; Hobson, J.A. Brain-mind states: I. Longitudinal field study of sleep/wake factors influencing mentation report length. Sleep 24, 171–179 (2001)."><span data-dcnode-id="5305" instrument_node="">1</span></a></sup><span data-dcnode-id="5302" instrument_node="">. Conversely, in a small but consistent minority of cases, subjects deny having had any experience when awakened from REM sleep. Thus, whether one experiences something or not during sleep cannot be determined simply by assessing one's behavioral state based on traditional EEG features or neuroimaging correlates</span><sup data-dcnode-id="5296"><a aria-label="Reference 7" data-dcnode-id="5300" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d93788509e569" title="Maquet, P. Functional neuroimaging of normal human sleep by positron emission tomography. J. Sleep Res. 9, 207–231 (2000)."><span data-dcnode-id="5301" instrument_node="">7</span></a><span data-dcnode-id="5299" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="5297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d93788509e572" title="Chow, H.M. et al. Rhythmic alternating patterns of brain activity distinguish rapid eye movement sleep from other states of consciousness. Proc. Natl. Acad. Sci. USA 110, 10300–10305 (2013)."><span data-dcnode-id="5298" instrument_node="">8</span></a></sup><span data-dcnode-id="5295" instrument_node="">. The paradoxical occurrence of both the presence and absence of experiences within the same behavioral state of sleep and across two very different kinds of sleep (NREM and REM) challenges our current understanding of the neural correlates of conscious experience in sleep.</span></p><p data-dcnode-id="5288"><span data-dcnode-id="5293" instrument_node="">Here we investigate the neural correlates of dreaming using a within-state model, in both NREM and REM sleep, by performing serial awakenings of subjects recorded throughout the night with high-density EEG (256 channels)</span><sup data-dcnode-id="5290"><a aria-label="Reference 9" data-dcnode-id="5291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93788509e579" title="Siclari, F., Larocque, J.J., Postle, B.R. &amp; Tononi, G. Assessing sleep consciousness within subjects using a serial awakening paradigm. Front. Psychol. 4, 542 (2013)."><span data-dcnode-id="5292" instrument_node="">9</span></a></sup><span data-dcnode-id="5289" instrument_node="">. The results highlight a posterior cortical hot zone where a local decrease in low-frequency EEG activity during both NREM and REM sleep is associated with reports of dream experiences upon awakening, whereas a local increase in low-frequency activity was associated with the absence of experience. These results hold for both a large group of naive subjects and a smaller group of individuals trained in dream reporting. We then show, in a separate group of subjects, that it is possible to predict whether an individual will report having dreamed or not in the course of an NREM episode by real-time EEG monitoring of this posterior hot zone. Finally, we show that the location of high-frequency EEG activity during dreams correlated with specific dream contents, such as thoughts, perceptions, faces, spatial setting, movement and speech.</span></p></div></div></section><section data-dcnode-id="4633" data-title="Results"><div class="c-article-section" data-dcnode-id="4634" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5283" id="Sec2"><span data-dcnode-id="5284" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="4635" id="Sec2-content"><p data-dcnode-id="5267"><span data-dcnode-id="5282" instrument_node="">Using a serial awakening model</span><sup data-dcnode-id="5279"><a aria-label="Reference 9" data-dcnode-id="5280" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93788509e591" title="Siclari, F., Larocque, J.J., Postle, B.R. &amp; Tononi, G. Assessing sleep consciousness within subjects using a serial awakening paradigm. Front. Psychol. 4, 542 (2013)."><span data-dcnode-id="5281" instrument_node="">9</span></a></sup><span data-dcnode-id="5278" instrument_node="">, participants were awakened throughout the night and were asked to report whether, just before the awakening, they had been experiencing anything (dreaming experience, DE), experiencing something but could not remember the content (dreaming experience without recall of content, DEWR) or not experiencing anything (no experience, NE; Online </span><a data-dcnode-id="5276" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="5277" instrument_node="">Methods</span></a><span data-dcnode-id="5275" instrument_node="">). If subjects reported a DE they were asked to describe its most recent content ('the last thing going through your mind before the alarm sound') and to rate it on a scale ranging from exclusively thought-like (thinking or reasoning, with no sensory content) to exclusively perceptual (vivid sensory content, without thinking or reasoning)</span><sup data-dcnode-id="5272"><a aria-label="Reference 10" data-dcnode-id="5273" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d93788509e598" title="Foulkes, W.D. Dream reports from different stages of sleep. J. Abnorm. Soc. Psychol. 65, 14–25 (1962)."><span data-dcnode-id="5274" instrument_node="">10</span></a></sup><span data-dcnode-id="5271" instrument_node="">. Finally, they had to estimate the duration of the most recent DE and to report whether it contained specific categories of content, including faces, a spatial setting, movement and speech (example of reports are presented in </span><a data-dcnode-id="5269" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="5270" instrument_node="">Supplementary Table 1</span></a><span data-dcnode-id="5268" instrument_node="">).</span></p><p data-dcnode-id="5253"><span data-dcnode-id="5266" instrument_node="">We studied two different populations in separate experiments. In experiment 1, we studied a large group of subjects who underwent few awakenings (</span><i data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">N</span></i><span data-dcnode-id="5263" instrument_node=""> = 32 subjects and 233 awakenings), while in experiment 2, we investigated a smaller group of trained subjects who underwent many awakenings (</span><i data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">N</span></i><span data-dcnode-id="5260" instrument_node=""> = 7 subjects and 815 awakenings; </span><a data-dcnode-id="5258" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="5259" instrument_node="">Supplementary Table 2</span></a><span data-dcnode-id="5257" instrument_node="">). Finally, in a third experiment, we tested whether, based on the results of the first two experiments, we could predict the presence or absence of dreaming in real time at the single trial level (</span><i data-dcnode-id="5255"><span data-dcnode-id="5256" instrument_node="">N</span></i><span data-dcnode-id="5254" instrument_node=""> = 7 subjects and 84 awakenings).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5251" id="Sec3"><span data-dcnode-id="5252" instrument_node="">Dreaming experience versus no experience: low-frequency power</span></h3><p data-dcnode-id="5228"><span data-dcnode-id="5250" instrument_node="">First, we sought to determine whether and how low-frequency (1–4-Hz) activity changes between the presence and absence of conscious experience during sleep. EEG slow frequencies between 1 and 4 Hz during sleep are associated with neuronal down-states and bistability</span><sup data-dcnode-id="5247"><a aria-label="Reference 11" data-dcnode-id="5248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d93788509e627" title="Nir, Y. et al. Regional slow waves and spindles in human sleep. Neuron 70, 153–169 (2011)."><span data-dcnode-id="5249" instrument_node="">11</span></a></sup><span data-dcnode-id="5246" instrument_node="">, which prevent the emergence of stable causal interactions among cortical areas</span><sup data-dcnode-id="5243"><a aria-label="Reference 12" data-dcnode-id="5244" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d93788509e631" title="Pigorini, A. et al. Bistability breaks-off deterministic responses to intracortical stimulation during non-REM sleep. Neuroimage 112, 105–113 (2015)."><span data-dcnode-id="5245" instrument_node="">12</span></a></sup><span data-dcnode-id="5242" instrument_node=""> and have been linked to the loss of consciousness</span><sup data-dcnode-id="5236"><a aria-label="Reference 13" data-dcnode-id="5240" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d93788509e635" title="Tononi, G. &amp; Massimini, M. Why does consciousness fade in early sleep? Ann. NY Acad. Sci. 1129, 330–334 (2008)."><span data-dcnode-id="5241" instrument_node="">13</span></a><span data-dcnode-id="5239" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="5237" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d93788509e638" title="Purdon, P.L. et al. Electroencephalogram signatures of loss and recovery of consciousness from propofol. Proc. Natl. Acad. Sci. USA 110, E1142–E1151 (2013)."><span data-dcnode-id="5238" instrument_node="">14</span></a></sup><span data-dcnode-id="5235" instrument_node="">. For this analysis, we focused on the first group of subjects (experiment 1), because of the large number of subjects, and on stage N2 sleep (NREM 2 sleep, as defined by standard scoring criteria), because the numbers of DE and NE reports in this stage were well balanced. By computing power spectral density at the source level within the 1–4-Hz frequency band, we found that reports of DE, compared to reports of NE, had decreased low-frequency power. This decrease was restricted to a bilateral parieto-occipital region, encompassing the medial and lateral occipital lobe and extending superiorly to the precuneus and posterior cingulate gyrus (</span><a data-dcnode-id="5233" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5234" instrument_node="">Fig. 1a</span></a><span data-dcnode-id="5232" instrument_node="">). Experiment 2, in which awakenings were carried out in both N2 and N3 stage sleep, confirmed these results (</span><a data-dcnode-id="5230" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="5231" instrument_node="">Supplementary Fig. 1</span></a><span data-dcnode-id="5229" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5167" data-test="figure" data-title="Dreaming experience vs. no experience in NREM sleep (low-frequency power)." id="figure-1"><figure data-dcnode-id="5168"><figcaption data-dcnode-id="5225"><b class="c-article-section__figure-caption" data-dcnode-id="5226" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5227" instrument_node="">Figure 1: Dreaming experience vs. no experience in NREM sleep (low-frequency power).</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5179"><div class="c-article-section__figure-item" data-dcnode-id="5220"><a class="c-article-section__figure-link" data-dcnode-id="5221" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/1" rel="nofollow"><picture data-dcnode-id="5222"><source data-dcnode-id="5224" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fnn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig1_HTML.jpg?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5223" height="329" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/nn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig1_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5180" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5181"><span data-dcnode-id="5219" instrument_node="">(</span><b data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">a</span></b><span data-dcnode-id="5216" instrument_node="">) Cortical distribution of </span><i data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">t</span></i><span data-dcnode-id="5213" instrument_node=""> values for the contrast between DEs and NEs at the source level for low-frequency power (1–4 Hz) in NREM sleep (20 s before the awakening). </span><i data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">P</span></i><span data-dcnode-id="5210" instrument_node=""> &lt; 0.05, after correction for multiple comparisons (two-tailed paired </span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">t</span></i><span data-dcnode-id="5207" instrument_node="">-tests, </span><i data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">n</span></i><span data-dcnode-id="5204" instrument_node=""> = 32 subjects, </span><i data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">t</span></i><sub data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">31</span></sub><span data-dcnode-id="5199" instrument_node=""> &gt; 2.04. (</span><b data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">b</span></b><span data-dcnode-id="5196" instrument_node="">) Same as </span><b data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">a</span></b><span data-dcnode-id="5193" instrument_node=""> but for the contrast between NE and DEWR (two-tailed paired </span><i data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">t</span></i><span data-dcnode-id="5190" instrument_node="">-tests, </span><i data-dcnode-id="5188"><span data-dcnode-id="5189" instrument_node="">n</span></i><span data-dcnode-id="5187" instrument_node=""> = 20 subjects, </span><i data-dcnode-id="5185"><span data-dcnode-id="5186" instrument_node="">t</span></i><sub data-dcnode-id="5183"><span data-dcnode-id="5184" instrument_node="">19</span></sub><span data-dcnode-id="5182" instrument_node=""> &gt; 2.09). LL, left lateral view; RL, right lateral view; LM, left medial view; RM, right medial view.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5169"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5170" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/1" rel="nofollow"><span data-dcnode-id="5177"><span data-dcnode-id="5178" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5171" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5172" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5173" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5176" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5175" fill-rule="evenodd"></path><span data-dcnode-id="5174" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5156"><span data-dcnode-id="5166" instrument_node="">We then compared instances in which the subjects reported that they had dreaming experiences but were not able to recall the content of the experience (DEWR) with instances in which they reported being unconscious (i.e., having no experiences, NE). Reports of DEWR, contrasted to reports of NE, were again preceded by decreased low-frequency power in a parieto-occipital region highlighted by the DE–NE contrast (</span><a data-dcnode-id="5164" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5165" instrument_node="">Fig. 1b</span></a><span data-dcnode-id="5163" instrument_node="">; see </span><a data-dcnode-id="5161" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="5162" instrument_node="">Supplementary Fig. 2</span></a><span data-dcnode-id="5160" instrument_node=""> for a conjunction map of the two contrasts). A contrast between DE and DEWR in the low-frequency range did not yield significant (</span><i data-dcnode-id="5158"><span data-dcnode-id="5159" instrument_node="">P</span></i><span data-dcnode-id="5157" instrument_node=""> &gt; 0.09) differences. Thus, decreased low-frequency power in this posterior cortical zone was associated with reports of dreaming experiences, irrespective of the ability to remember the contents of the experience.</span></p><p data-dcnode-id="5126"><span data-dcnode-id="5155" instrument_node="">Next, we asked whether the contrast between DE and NE would produce similar results during REM sleep, a state that is substantially different from NREM sleep in terms of EEG signatures (slow waves and spindles in NREM sleep; low-voltage fast activity in REM sleep</span><sup data-dcnode-id="5152"><a aria-label="Reference 4" data-dcnode-id="5153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d93788509e721" title="Aserinsky, E. &amp; Kleitman, N. Regularly occurring periods of eye motility, and concomitant phenomena, during sleep. Science 118, 273–274 (1953)."><span data-dcnode-id="5154" instrument_node="">4</span></a></sup><span data-dcnode-id="5151" instrument_node="">), neural activity (widespread bistability between down- and up-states in NREM sleep; mostly tonic depolarization in REM sleep</span><sup data-dcnode-id="5148"><a aria-label="Reference 6" data-dcnode-id="5149" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d93788509e725" title="Steriade, M., Timofeev, I. &amp; Grenier, F. Natural waking and sleep states: a view from inside neocortical neurons. J. Neurophysiol. 85, 1969–1985 (2001)."><span data-dcnode-id="5150" instrument_node="">6</span></a></sup><span data-dcnode-id="5147" instrument_node="">), neuromodulation (high acetylcholine in REM sleep; low in NREM sleep</span><sup data-dcnode-id="5144"><a aria-label="Reference 15" data-dcnode-id="5145" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d93788509e729" title="Jones, B.E. From waking to sleeping: neuronal and chemical substrates. Trends Pharmacol. Sci. 26, 578–586 (2005)."><span data-dcnode-id="5146" instrument_node="">15</span></a></sup><span data-dcnode-id="5143" instrument_node="">) and regional activations</span><sup data-dcnode-id="5140"><a aria-label="Reference 7" data-dcnode-id="5141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d93788509e733" title="Maquet, P. Functional neuroimaging of normal human sleep by positron emission tomography. J. Sleep Res. 9, 207–231 (2000)."><span data-dcnode-id="5142" instrument_node="">7</span></a></sup><span data-dcnode-id="5139" instrument_node="">. Because of the rarity of NE reports in REM sleep (</span><a data-dcnode-id="5137" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="5138" instrument_node="">Supplementary Table 2</span></a><span data-dcnode-id="5136" instrument_node="">), for this analysis we combined the data of experiments 1 and 2 (</span><i data-dcnode-id="5134"><span data-dcnode-id="5135" instrument_node="">N</span></i><span data-dcnode-id="5133" instrument_node=""> = 10 subjects). Despite the notable physiological differences between NREM and REM sleep states, we again found that brain activity associated with DE, as compared to NE, had reduced power in the 1–4-Hz band in a parieto-occipital region (</span><a data-dcnode-id="5131" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5132" instrument_node="">Fig. 2a</span></a><span data-dcnode-id="5130" instrument_node="">), which largely overlapped with the topography observed in NREM sleep (</span><a data-dcnode-id="5128" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5129" instrument_node="">Fig. 2b</span></a><span data-dcnode-id="5127" instrument_node="">). Thus, a decrease in low-frequency power in a posterior cortical hot zone was highlighted when individuals reported experiencing a dream compared with when individuals reported an absence of experience during sleep, irrespective of the ability to recall the experience and of behavioral state (NREM versus REM sleep).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5079" data-test="figure" data-title="Dreaming experience vs. no experience in REM sleep (low-frequency power)." id="figure-2"><figure data-dcnode-id="5080"><figcaption data-dcnode-id="5123"><b class="c-article-section__figure-caption" data-dcnode-id="5124" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="5125" instrument_node="">Figure 2: Dreaming experience vs. no experience in REM sleep (low-frequency power).</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5091"><div class="c-article-section__figure-item" data-dcnode-id="5118"><a class="c-article-section__figure-link" data-dcnode-id="5119" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/2" rel="nofollow"><picture data-dcnode-id="5120"><source data-dcnode-id="5122" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fnn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig2_HTML.jpg?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="5121" height="335" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/nn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig2_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5092" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="5093"><span data-dcnode-id="5117" instrument_node="">(</span><b data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">a</span></b><span data-dcnode-id="5114" instrument_node="">) Cortical distribution of </span><i data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">t</span></i><span data-dcnode-id="5111" instrument_node=""> values for the contrast between DEs and NEs at the source level for low-frequency (1–4-Hz) power in REM sleep (20 s before the awakening). </span><i data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">P</span></i><span data-dcnode-id="5108" instrument_node=""> &lt; 0.05 after correction for multiple comparisons (two-tailed paired </span><i data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">t</span></i><span data-dcnode-id="5105" instrument_node="">-tests, </span><i data-dcnode-id="5103"><span data-dcnode-id="5104" instrument_node="">n</span></i><span data-dcnode-id="5102" instrument_node=""> = 10 subjects, </span><i data-dcnode-id="5100"><span data-dcnode-id="5101" instrument_node="">t</span></i><sub data-dcnode-id="5098"><span data-dcnode-id="5099" instrument_node="">9</span></sub><span data-dcnode-id="5097" instrument_node=""> &gt; 2.26). (</span><b data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">b</span></b><span data-dcnode-id="5094" instrument_node="">) Conjunction maps: differences and overlaps compared to the same contrast performed in NREM sleep.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5081"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="5082" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/2" rel="nofollow"><span data-dcnode-id="5089"><span data-dcnode-id="5090" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5083" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5084" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5085" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5088" instrument_node="">

</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="5077" id="Sec4"><span data-dcnode-id="5078" instrument_node="">Dreaming experience versus no experience: high-frequency power</span></h3><p data-dcnode-id="5021"><span data-dcnode-id="5076" instrument_node="">We then investigated differences in high-frequency band power (20–50 Hz), since high EEG frequencies often reflect high rates of neuronal firing</span><sup data-dcnode-id="5070"><a aria-label="Reference 16" data-dcnode-id="5074" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d93788509e801" title="Steriade, M., Contreras, D., Amzica, F. &amp; Timofeev, I. Synchronization of fast (30-40 Hz) spontaneous oscillations in intrathalamic and thalamocortical networks. J. Neurosci. 16, 2788–2808 (1996)."><span data-dcnode-id="5075" instrument_node="">16</span></a><span data-dcnode-id="5073" instrument_node="">,</span><a aria-label="Reference 17" data-dcnode-id="5071" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d93788509e804" title="Le Van Quyen, M. et al. Large-scale microelectrode recordings of high-frequency gamma oscillations in human cortex during sleep. J. Neurosci. 30, 7770–7782 (2010)."><span data-dcnode-id="5072" instrument_node="">17</span></a></sup><span data-dcnode-id="5069" instrument_node=""> and may thus indicate brain regions that show increased activity. In NREM sleep, DEs, compared to NEs, were associated with increased high-frequency power in the same parieto-occipital region that showed reduced low-frequency power. However, differences in high-frequency power extended superiorly and anteriorly to parts of the lateral frontal cortex and the temporal lobes (</span><a data-dcnode-id="5067" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5068" instrument_node="">Fig. 3a</span></a><span data-dcnode-id="5066" instrument_node="">; see also </span><a data-dcnode-id="5064" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig8"><span data-dcnode-id="5065" instrument_node="">Supplementary Fig. 3</span></a><span data-dcnode-id="5063" instrument_node=""> for better comparability with REM sleep in the 25–50-Hz range). DE with recall of content, compared to DEWR, was associated with higher high-frequency power in medial and lateral frontoparietal areas (</span><a data-dcnode-id="5061" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5062" instrument_node="">Fig. 3b</span></a><span data-dcnode-id="5060" instrument_node="">). No differences in high-frequency power were found when comparing DEWR with NE (</span><a data-dcnode-id="5058" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig9"><span data-dcnode-id="5059" instrument_node="">Supplementary Fig. 4</span></a><span data-dcnode-id="5057" instrument_node="">). Finally, in REM sleep, DEs were more associated with increased high-frequency (25–50-Hz) power in frontal and temporal regions, compared to NEs (</span><a data-dcnode-id="5055" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5056" instrument_node="">Fig. 3c</span></a><span data-dcnode-id="5054" instrument_node="">). Given the age variability in our sample, an additional repeated-measures ANCOVA was performed in the significant clusters, using this parameter as nuisance covariate. A significant main effect of report type (DE, NE) was confirmed for both low-frequency (</span><i data-dcnode-id="5052"><span data-dcnode-id="5053" instrument_node="">F</span></i><sub data-dcnode-id="5050"><span data-dcnode-id="5051" instrument_node="">1,30</span></sub><span data-dcnode-id="5049" instrument_node=""> = 9.39, </span><i data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">P</span></i><span data-dcnode-id="5046" instrument_node=""> = 0.005) and high-frequency activity (</span><i data-dcnode-id="5044"><span data-dcnode-id="5045" instrument_node="">F</span></i><sub data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">1,30</span></sub><span data-dcnode-id="5041" instrument_node=""> = 10.88, </span><i data-dcnode-id="5039"><span data-dcnode-id="5040" instrument_node="">P</span></i><span data-dcnode-id="5038" instrument_node=""> = 0.003), while no significant effects of age emerged (low-frequency: </span><i data-dcnode-id="5036"><span data-dcnode-id="5037" instrument_node="">F</span></i><sub data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">1,30</span></sub><span data-dcnode-id="5033" instrument_node=""> = 2.34, </span><i data-dcnode-id="5031"><span data-dcnode-id="5032" instrument_node="">P</span></i><span data-dcnode-id="5030" instrument_node=""> = 0.14; high-frequency: </span><i data-dcnode-id="5028"><span data-dcnode-id="5029" instrument_node="">F</span></i><sub data-dcnode-id="5026"><span data-dcnode-id="5027" instrument_node="">1,30</span></sub><span data-dcnode-id="5025" instrument_node=""> = 1.80, </span><i data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">P</span></i><span data-dcnode-id="5022" instrument_node=""> = 0.19).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4943" data-test="figure" data-title="Dreaming experience vs. no experience in NREM and REM sleep (high-frequency power)." id="figure-3"><figure data-dcnode-id="4944"><figcaption data-dcnode-id="5018"><b class="c-article-section__figure-caption" data-dcnode-id="5019" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="5020" instrument_node="">Figure 3: Dreaming experience vs. no experience in NREM and REM sleep (high-frequency power).</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4955"><div class="c-article-section__figure-item" data-dcnode-id="5013"><a class="c-article-section__figure-link" data-dcnode-id="5014" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/3" rel="nofollow"><picture data-dcnode-id="5015"><source data-dcnode-id="5017" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fnn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig3_HTML.jpg?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="5016" height="190" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/nn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig3_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4956" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4957"><span data-dcnode-id="5012" instrument_node="">(</span><b data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">a</span></b><span data-dcnode-id="5009" instrument_node="">) Cortical distribution of </span><i data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">t</span></i><span data-dcnode-id="5006" instrument_node=""> values for the contrast between DEs and NEs at the source level for high-frequency power (20–50 Hz) in NREM sleep (20 s before the awakening). </span><i data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">P</span></i><span data-dcnode-id="5003" instrument_node=""> &lt; 0.05 after correction for multiple comparisons (two-tailed paired </span><i data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">t</span></i><span data-dcnode-id="5000" instrument_node="">-tests, </span><i data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">n</span></i><span data-dcnode-id="4997" instrument_node=""> = 32 subjects, </span><i data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">t</span></i><sub data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">31</span></sub><span data-dcnode-id="4992" instrument_node=""> &gt; 2.04). (</span><b data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">b</span></b><span data-dcnode-id="4989" instrument_node="">) Same as </span><b data-dcnode-id="4987"><span data-dcnode-id="4988" instrument_node="">a</span></b><span data-dcnode-id="4986" instrument_node=""> but for the contrast between DE and DEWR in NREM sleep (two-tailed paired </span><i data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">t</span></i><span data-dcnode-id="4983" instrument_node="">-tests, </span><i data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">n</span></i><span data-dcnode-id="4980" instrument_node=""> = 20 subjects, </span><i data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">t</span></i><sub data-dcnode-id="4976"><span data-dcnode-id="4977" instrument_node="">19</span></sub><span data-dcnode-id="4975" instrument_node=""> &gt; 2.09). (</span><b data-dcnode-id="4973"><span data-dcnode-id="4974" instrument_node="">c</span></b><span data-dcnode-id="4972" instrument_node="">) Same as </span><b data-dcnode-id="4970"><span data-dcnode-id="4971" instrument_node="">a</span></b><span data-dcnode-id="4969" instrument_node=""> but for high-frequency power (25–50 Hz) in REM sleep (two-tailed paired </span><i data-dcnode-id="4967"><span data-dcnode-id="4968" instrument_node="">t</span></i><span data-dcnode-id="4966" instrument_node="">-tests, </span><i data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">n</span></i><span data-dcnode-id="4963" instrument_node=""> = 10 subjects, </span><i data-dcnode-id="4961"><span data-dcnode-id="4962" instrument_node="">t</span></i><sub data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">9</span></sub><span data-dcnode-id="4958" instrument_node=""> &gt; 2.26).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4945"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4946" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/3" rel="nofollow"><span data-dcnode-id="4953"><span data-dcnode-id="4954" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4947" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4948" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4949" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4952" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="4932"><span data-dcnode-id="4942" instrument_node="">To test whether our results were characterized by a significant hemispheric lateralization, we computed a repeated-measures ANOVA using hemisphere and type of report (DE, DEWR, NE) as within-subject factors for all the contrasts (Online </span><a data-dcnode-id="4940" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4941" instrument_node="">Methods</span></a><span data-dcnode-id="4939" instrument_node=""> and </span><a data-dcnode-id="4937" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="4938" instrument_node="">Supplementary Table 5</span></a><span data-dcnode-id="4936" instrument_node="">). We did not find significant interactions between the type of report and hemisphere, except for a barely significant right-sided lateralization (</span><i data-dcnode-id="4934"><span data-dcnode-id="4935" instrument_node="">P</span></i><span data-dcnode-id="4933" instrument_node=""> = 0.046) for the high-frequency power contrast between DE and NE in REM sleep.</span></p><p data-dcnode-id="4921"><span data-dcnode-id="4931" instrument_node="">Absolute power values for DE and NE in the posterior hot zone are shown in </span><a data-dcnode-id="4929" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="4930" instrument_node="">Supplementary Figure 5</span></a><span data-dcnode-id="4928" instrument_node="">. It should be noted that absolute low-frequency power values were higher in NREM sleep compared to REM sleep, although differences are comparable and were significant in both sleep stages (</span><i data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">P</span></i><span data-dcnode-id="4925" instrument_node=""> &lt; 0.05; </span><a data-dcnode-id="4923" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig10"><span data-dcnode-id="4924" instrument_node="">Supplementary Fig. 5</span></a><span data-dcnode-id="4922" instrument_node="">). It is likely that the absolute values in NREM sleep, although obtained from a region of interest (ROI) after source modeling the signal, were nevertheless influenced by high-amplitude slow waves in other parts of the cortex. Indeed, source modeling strongly reduces but does not completely eliminate the effects of volume conduction. Moreover, regularization methods commonly applied to reduce the influence of noise in EEG data introduce a 'spatial smoothing' of the EEG sources. Finally, the effect of slow-wave propagation, which occurs on a scale of tens to hundreds of milliseconds, is not affected by source modeling approaches and may contribute to the relatively high level of low-frequency activity all over the cortical mantle and in brain areas that are not generating slow waves.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4919" id="Sec5"><span data-dcnode-id="4920" instrument_node="">Dream content in REM sleep</span></h3><p data-dcnode-id="4913"><span data-dcnode-id="4918" instrument_node="">We further investigated whether differences in high-frequency power could distinguish specific contents of DEs. For these analyses, we focused on REM sleep awakenings in trained subjects (experiment 2); because there were many intrasubject trials, reports were more detailed</span><sup data-dcnode-id="4915"><a aria-label="Reference 9" data-dcnode-id="4916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93788509e960" title="Siclari, F., Larocque, J.J., Postle, B.R. &amp; Tononi, G. Assessing sleep consciousness within subjects using a serial awakening paradigm. Front. Psychol. 4, 542 (2013)."><span data-dcnode-id="4917" instrument_node="">9</span></a></sup><span data-dcnode-id="4914" instrument_node=""> and subjects were more confident about their answers concerning specific contents.</span></p><p data-dcnode-id="4901"><span data-dcnode-id="4912" instrument_node="">Since dreams can differ greatly along the dimension 'perception versus thought'</span><sup data-dcnode-id="4909"><a aria-label="Reference 10" data-dcnode-id="4910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d93788509e967" title="Foulkes, W.D. Dream reports from different stages of sleep. J. Abnorm. Soc. Psychol. 65, 14–25 (1962)."><span data-dcnode-id="4911" instrument_node="">10</span></a></sup><span data-dcnode-id="4908" instrument_node="">, subjects had been asked to rate their DEs accordingly. We found that high-frequency activity correlated with the thinking dimension in frontal brain regions and with the perceiving dimension in parietal, occipital and temporal areas (</span><i data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">P</span></i><span data-dcnode-id="4905" instrument_node=""> &lt; 0.05; </span><a data-dcnode-id="4903" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4904" instrument_node="">Fig. 4a</span></a><span data-dcnode-id="4902" instrument_node="">). This anterior–posterior gradient suggests that in dreams, just like in wakefulness, anterior cortical regions mediate thought-like experiences while posterior regions are involved in perceptual aspects of the experience.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4809" data-test="figure" data-title="The content of dream experiences in REM sleep." id="figure-4"><figure data-dcnode-id="4810"><figcaption data-dcnode-id="4898"><b class="c-article-section__figure-caption" data-dcnode-id="4899" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="4900" instrument_node="">Figure 4: The content of dream experiences in REM sleep.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4821"><div class="c-article-section__figure-item" data-dcnode-id="4893"><a class="c-article-section__figure-link" data-dcnode-id="4894" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/4" rel="nofollow"><picture data-dcnode-id="4895"><source data-dcnode-id="4897" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fnn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig4_HTML.jpg?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="4896" height="266" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/nn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig4_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4822" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="4823"><span data-dcnode-id="4892" instrument_node="">(</span><b data-dcnode-id="4890"><span data-dcnode-id="4891" instrument_node="">a</span></b><span data-dcnode-id="4889" instrument_node="">) Correlation between the thinking–perceiving score and 25–50-Hz power (last 8 s, </span><i data-dcnode-id="4887"><span data-dcnode-id="4888" instrument_node="">n</span></i><span data-dcnode-id="4886" instrument_node=""> = 7 subjects). Left: mean Spearman rank correlation coefficients (</span><i data-dcnode-id="4884"><span data-dcnode-id="4885" instrument_node="">n</span></i><span data-dcnode-id="4883" instrument_node=""> = 7 subjects). Right: significant voxels (</span><i data-dcnode-id="4881"><span data-dcnode-id="4882" instrument_node="">P</span></i><span data-dcnode-id="4880" instrument_node=""> &lt; 0.05, one-tailed permutation test, </span><i data-dcnode-id="4878"><span data-dcnode-id="4879" instrument_node="">r</span></i><span data-dcnode-id="4877" instrument_node=""> &gt; 0.14). (</span><b data-dcnode-id="4875"><span data-dcnode-id="4876" instrument_node="">b</span></b><span data-dcnode-id="4874" instrument_node="">) Left: 25–50-Hz power differences (DE with face minus DE without face). ROI contrast in the fusiform face area (FFA) (</span><i data-dcnode-id="4872"><span data-dcnode-id="4873" instrument_node="">P</span></i><span data-dcnode-id="4871" instrument_node=""> = 0.023; one-tailed paired </span><i data-dcnode-id="4869"><span data-dcnode-id="4870" instrument_node="">t</span></i><span data-dcnode-id="4868" instrument_node="">-test, </span><i data-dcnode-id="4866"><span data-dcnode-id="4867" instrument_node="">n</span></i><span data-dcnode-id="4865" instrument_node=""> = 7 subjects, </span><i data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">t</span></i><sub data-dcnode-id="4861"><span data-dcnode-id="4862" instrument_node="">6</span></sub><span data-dcnode-id="4860" instrument_node=""> = 2.52). Right: FFA (red). (</span><b data-dcnode-id="4858"><span data-dcnode-id="4859" instrument_node="">c</span></b><span data-dcnode-id="4857" instrument_node="">) Upper row: 25–50 Hz average power differences between DEs with and without a spatial setting (</span><i data-dcnode-id="4855"><span data-dcnode-id="4856" instrument_node="">n</span></i><span data-dcnode-id="4854" instrument_node=""> = 6 subjects, </span><i data-dcnode-id="4852"><span data-dcnode-id="4853" instrument_node="">t</span></i><sub data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">5</span></sub><span data-dcnode-id="4849" instrument_node=""> &gt; 2.57). Right: right posterior parietal cortex. Middle row: movement vs. no movement (</span><i data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">n</span></i><span data-dcnode-id="4846" instrument_node=""> = 7 subjects, </span><i data-dcnode-id="4844"><span data-dcnode-id="4845" instrument_node="">t</span></i><sub data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">6</span></sub><span data-dcnode-id="4841" instrument_node=""> &gt; 2.45). Right: superior temporal sulcus. Bottom row: speech vs. no speech (</span><i data-dcnode-id="4839"><span data-dcnode-id="4840" instrument_node="">n</span></i><span data-dcnode-id="4838" instrument_node=""> = 7 subjects, </span><i data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">t</span></i><sub data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">6</span></sub><span data-dcnode-id="4833" instrument_node=""> &gt; 2.45). Right: Wernicke's area. Two-tailed paired </span><i data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">t</span></i><span data-dcnode-id="4830" instrument_node="">-tests; </span><i data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">P</span></i><span data-dcnode-id="4827" instrument_node=""> &lt; 0.05 (red) and </span><i data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">P</span></i><span data-dcnode-id="4824" instrument_node=""> &lt; 0.1 (yellow).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4811"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="4812" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/4" rel="nofollow"><span data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4813" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4814" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4815" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4818" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4817" fill-rule="evenodd"></path><span data-dcnode-id="4816" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4759"><span data-dcnode-id="4808" instrument_node="">We also examined specific perceptual categories of dream reports. As shown in </span><a data-dcnode-id="4806" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4807" instrument_node="">Figure 4b</span></a><span data-dcnode-id="4805" instrument_node="">, DEs containing faces, compared to DEs without faces, were associated with increased high-frequency activity in a circumscribed temporo-occipital region that closely matched the fusiform face area. An ROI analysis (Online </span><a data-dcnode-id="4803" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4804" instrument_node="">Methods</span></a><span data-dcnode-id="4802" instrument_node="">) confirmed that high-frequency activity in the fusiform face area on the right side was significantly higher for DEs containing faces (</span><i data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">P</span></i><span data-dcnode-id="4799" instrument_node=""> = 0.023, paired one-tailed </span><i data-dcnode-id="4797"><span data-dcnode-id="4798" instrument_node="">t</span></i><span data-dcnode-id="4796" instrument_node="">-test) compared to DEs without faces, consistent with the specialization of this area in the perception of faces during wakefulness. Subjects were also asked to determine whether the setting of the most recent DE was indoors, outdoors or could not be specified. We found that DEs with a definite spatial setting were associated with increased high-frequency activity in the right posterior parietal cortex (</span><a data-dcnode-id="4794" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4795" instrument_node="">Fig. 4c</span></a><span data-dcnode-id="4793" instrument_node="">), an area involved in spatial perception and visuospatial attention and in which lesions can cause spatial neglect. This finding was confirmed by an ROI analysis (Online </span><a data-dcnode-id="4791" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4792" instrument_node="">Methods</span></a><span data-dcnode-id="4790" instrument_node="">; </span><i data-dcnode-id="4788"><span data-dcnode-id="4789" instrument_node="">P</span></i><span data-dcnode-id="4787" instrument_node=""> = 0.023, paired one-tailed </span><i data-dcnode-id="4785"><span data-dcnode-id="4786" instrument_node="">t</span></i><span data-dcnode-id="4784" instrument_node="">-test). Furthermore, DEs in which subjects reported the sense of moving in the dream were associated with increased high-frequency activity in a region surrounding the right superior temporal sulcus (</span><a data-dcnode-id="4782" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4783" instrument_node="">Fig. 4c</span></a><span data-dcnode-id="4781" instrument_node="">), an area involved in the perception of biological motion and in viewing body movements. An ROI analysis confirmed this finding (Online </span><a data-dcnode-id="4779" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4780" instrument_node="">Methods</span></a><span data-dcnode-id="4778" instrument_node="">; </span><i data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">P</span></i><span data-dcnode-id="4775" instrument_node=""> = 0.029, paired one-tailed </span><i data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">t</span></i><span data-dcnode-id="4772" instrument_node="">-test). Finally, as shown in </span><a data-dcnode-id="4770" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4771" instrument_node="">Figure 4c</span></a><span data-dcnode-id="4769" instrument_node="">, DEs containing speech were associated with increased high-frequency activity over a left posterior temporal region corresponding to Wernicke's area, as confirmed by an ROI analysis (Online </span><a data-dcnode-id="4767" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4768" instrument_node="">Methods</span></a><span data-dcnode-id="4766" instrument_node="">; </span><i data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">P</span></i><span data-dcnode-id="4763" instrument_node=""> = 0.048, paired one-tailed </span><i data-dcnode-id="4761"><span data-dcnode-id="4762" instrument_node="">t</span></i><span data-dcnode-id="4760" instrument_node="">-test). It should be noted that a statistical nonparametric mapping correction for multiple comparisons was not applied to whole-brain content-based analyses, because content-specific areas were expected to be highly spatially restricted. Instead, ROI analyses were used to confirm the specific hypotheses on the involvement of distinct content-related areas.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4757" id="Sec6"><span data-dcnode-id="4758" instrument_node="">Real-time prediction of dream experience in NREM sleep</span></h3><p data-dcnode-id="4690"><span data-dcnode-id="4756" instrument_node="">If a decrease in low-frequency EEG power and an increase in high-frequency power in a posterior hot zone represents a reliable neural correlate of dreaming, it should be possible to predict whether a person is dreaming or not in real time by detecting ongoing local EEG activations. Moreover, this should be the case even when the global EEG, as well as the local EEG in anterior areas, is characterized by the slow-wave activity typical of NREM sleep. To test this prediction, seven additional subjects slept in the sleep laboratory for three consecutive nights while high-density EEG was continuously recorded. Based on the findings of experiments 1 and 2, on the experimental (second and third) nights, participants were awoken from NREM sleep when their neural activity surpassed a bispectral threshold in low-frequency (0.5–4.5-Hz) and high-frequency (18–25-Hz) band power from an electrode cluster over the posterior hot zone (</span><a data-dcnode-id="4754" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4755" instrument_node="">Fig. 5a</span></a><span data-dcnode-id="4753" instrument_node=""> and Online </span><a data-dcnode-id="4751" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4752" instrument_node="">Methods</span></a><span data-dcnode-id="4750" instrument_node="">; the 18–25-Hz range was used because it captures EEG activations while avoiding artifacts from eye movements or other sources during online EEG monitoring). In total, participants were awakened 84 times (mean: 12.0 ± 3.4; </span><a data-dcnode-id="4748" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="4749" instrument_node="">Supplementary Table 3</span></a><span data-dcnode-id="4747" instrument_node="">). After removing trials containing artifacts (Online </span><a data-dcnode-id="4745" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec8"><span data-dcnode-id="4746" instrument_node="">Methods</span></a><span data-dcnode-id="4744" instrument_node="">), there remained 36 awakenings initiated by the algorithm with a DE prediction, of which 33 were accurate (DE mean accuracy = 91.6%, </span><i data-dcnode-id="4742"><span data-dcnode-id="4743" instrument_node="">P</span></i><span data-dcnode-id="4741" instrument_node=""> = 0.00001) and 26 awakenings with an NE prediction, of which 21 were accurate (NE mean accuracy = 80.7%, </span><i data-dcnode-id="4739"><span data-dcnode-id="4740" instrument_node="">P</span></i><span data-dcnode-id="4738" instrument_node=""> = 0.0003); total prediction accuracy across all states was 87% (</span><a data-dcnode-id="4736" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4737" instrument_node="">Fig. 5c</span></a><span data-dcnode-id="4735" instrument_node="">). No interaction was observed between DE prediction and time of night (</span><i data-dcnode-id="4733"><span data-dcnode-id="4734" instrument_node="">F</span></i><sub data-dcnode-id="4731"><span data-dcnode-id="4732" instrument_node="">1,6</span></sub><span data-dcnode-id="4730" instrument_node=""> = 1.35, </span><i data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">P</span></i><span data-dcnode-id="4727" instrument_node=""> = 0.29). Confirming significant differences in EEG power in DE compared to NE trials in the prediction ROI, we observed significantly lower low-frequency activity (</span><i data-dcnode-id="4725"><span data-dcnode-id="4726" instrument_node="">P</span></i><span data-dcnode-id="4724" instrument_node=""> = 0.001) in DE (10.17 ± 2.5 μV</span><sup data-dcnode-id="4722"><span data-dcnode-id="4723" instrument_node="">2</span></sup><span data-dcnode-id="4721" instrument_node=""> per Hz (mean ± s.d.)) compared to NE (103.47 ± 38.16 μV</span><sup data-dcnode-id="4719"><span data-dcnode-id="4720" instrument_node="">2</span></sup><span data-dcnode-id="4718" instrument_node=""> per Hz) and significantly higher high-frequency activity (</span><i data-dcnode-id="4716"><span data-dcnode-id="4717" instrument_node="">P</span></i><span data-dcnode-id="4715" instrument_node=""> = 0.001) in DE (0.14 ± 0.03 μV</span><sup data-dcnode-id="4713"><span data-dcnode-id="4714" instrument_node="">2</span></sup><span data-dcnode-id="4712" instrument_node=""> per Hz) compared to NE (0.07 ± 0.02 μV</span><sup data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">2</span></sup><span data-dcnode-id="4709" instrument_node=""> per Hz) prediction trials (</span><a data-dcnode-id="4707" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4708" instrument_node="">Fig. 5b</span></a><span data-dcnode-id="4706" instrument_node=""> and </span><a data-dcnode-id="4704" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig11"><span data-dcnode-id="4705" instrument_node="">Supplementary Fig. 6</span></a><span data-dcnode-id="4703" instrument_node="">). DE had a higher high-/low-frequency band-power ratio compared to NE (</span><a data-dcnode-id="4701" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig12"><span data-dcnode-id="4702" instrument_node="">Supplementary Fig. 7</span></a><span data-dcnode-id="4700" instrument_node="">), especially in cortical regions including bilateral occipital cortex, precuneus, right superior parietal lobule, right precentral gyrus, left superior and middle temporal sulcus, right lingual gyrus and left inferior frontal gyrus (</span><i data-dcnode-id="4698"><span data-dcnode-id="4699" instrument_node="">P</span></i><span data-dcnode-id="4697" instrument_node=""> &lt; 0.001, FDR cluster corrected; </span><a data-dcnode-id="4695" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4696" instrument_node="">Fig. 5d</span></a><span data-dcnode-id="4694" instrument_node=""> and </span><a data-dcnode-id="4692" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM242"><span data-dcnode-id="4693" instrument_node="">Supplementary Table 4</span></a><span data-dcnode-id="4691" instrument_node="">).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4636" data-test="figure" data-title="Real-time prediction of dream experience." id="figure-5"><figure data-dcnode-id="4637"><figcaption data-dcnode-id="4687"><b class="c-article-section__figure-caption" data-dcnode-id="4688" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="4689" instrument_node="">Figure 5: Real-time prediction of dream experience.</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4648"><div class="c-article-section__figure-item" data-dcnode-id="4682"><a class="c-article-section__figure-link" data-dcnode-id="4683" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/5" rel="nofollow"><picture data-dcnode-id="4684"><source data-dcnode-id="4686" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fnn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig5_HTML.jpg?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="4685" height="458" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/nn.4545/MediaObjects/41593_2017_Article_BFnn4545_Fig5_HTML.jpg&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4649" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="4650"><span data-dcnode-id="4681" instrument_node="">(</span><b data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">a</span></b><span data-dcnode-id="4678" instrument_node="">) Left top: a model head with high-density EEG electrode positions (yellow dots) with electrodes used in the prediction algorithm marked in red (circled). Trace illustrates the transition from wake to NREM sleep (comprising stages N2 and N3). Middle: awakenings were performed in NREM when neural activity surpassed a bispectral threshold in low-frequency (LF; 0.5–4.5-Hz) and high-frequency (HF; 18–25-Hz) power. Right: reports of dream experience (DE) or no experience (NE) were acquired on awakening and compared with the algorithm prediction. (</span><b data-dcnode-id="4676"><span data-dcnode-id="4677" instrument_node="">b</span></b><span data-dcnode-id="4675" instrument_node="">) DE trials had significantly lower LF activity and significantly higher HF activity in DE compared to NE prediction trials. The bottoms and tops of the boxes show the 25th and 75th percentiles (the lower and upper quartiles), respectively; the inner band shows the median; and the whiskers show the upper and lower quartiles ±1.5 × the interquartile range (IQR). Asterisks indicate significant differences (*</span><i data-dcnode-id="4673"><span data-dcnode-id="4674" instrument_node="">P</span></i><span data-dcnode-id="4672" instrument_node=""> = 0.001; two-tailed </span><i data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">t</span></i><span data-dcnode-id="4669" instrument_node="">-test) between DE and NE trials. (</span><b data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">c</span></b><span data-dcnode-id="4666" instrument_node="">) Prediction accuracy for DE (55) and NE (27) trials. Asterisks indicate significant differences (*</span><i data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">P</span></i><span data-dcnode-id="4663" instrument_node=""> &lt; 0.001; one sample </span><i data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">t</span></i><span data-dcnode-id="4660" instrument_node="">-test two-tailed) between DE and NE prediction accuracy and chance (50%). (</span><b data-dcnode-id="4658"><span data-dcnode-id="4659" instrument_node="">d</span></b><span data-dcnode-id="4657" instrument_node="">) DE had a higher HF/LF power ratio compared to NE in cortical regions including bilateral occipital, medial and lateral parietal, medial temporal and inferior frontal cortex (</span><i data-dcnode-id="4655"><span data-dcnode-id="4656" instrument_node="">P</span></i><span data-dcnode-id="4654" instrument_node=""> &lt; 0.001; two-tailed paired </span><i data-dcnode-id="4652"><span data-dcnode-id="4653" instrument_node="">t</span></i><span data-dcnode-id="4651" instrument_node="">-test, FDR cluster corrected).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4638"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="4639" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.4545/figures/5" rel="nofollow"><span data-dcnode-id="4646"><span data-dcnode-id="4647" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4640" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4641" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4642" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4645" instrument_node="">

</span></a></div></figure></div></div></div></section><section data-dcnode-id="4391" data-title="Discussion"><div class="c-article-section" data-dcnode-id="4392" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4631" id="Sec7"><span data-dcnode-id="4632" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="4393" id="Sec7-content"><p data-dcnode-id="4622"><span data-dcnode-id="4630" instrument_node="">The three experiments reported here highlight a parieto-occipital hot zone as the neural correlate of dreaming. When this posterior hot zone showed a decrease in low-frequency EEG activity—traditionally known as 'EEG activation'</span><sup data-dcnode-id="4624"><a aria-label="Reference 5" data-dcnode-id="4628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d93788509e1248" title="Moruzzi, G. &amp; Magoun, H.W. Brain stem reticular formation and activation of the EEG. Electroencephalogr. Clin. Neurophysiol. 1, 455–473 (1949)."><span data-dcnode-id="4629" instrument_node="">5</span></a><span data-dcnode-id="4627" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="4625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d93788509e1251" title="Steriade, M., Timofeev, I. &amp; Grenier, F. Natural waking and sleep states: a view from inside neocortical neurons. J. Neurophysiol. 85, 1969–1985 (2001)."><span data-dcnode-id="4626" instrument_node="">6</span></a></sup><span data-dcnode-id="4623" instrument_node="">—subjects reported upon awakening that they did have dream experiences. By contrast, when low-frequency EEG activity increased in the same area, subjects reported that they had been unconscious. This result held true whether the subjects had been in N
