REM sleep or in REM sleep, irrespective of the dominant EEG activity over other cortical regions.</span></p><p data-dcnode-id="4600"><span data-dcnode-id="4621" instrument_node="">The influential notion that dreaming is virtually synonymous with REM sleep has dominated neuroimaging work for the past several decades</span><sup data-dcnode-id="4618"><a aria-label="Reference 7" data-dcnode-id="4619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d93788509e1258" title="Maquet, P. Functional neuroimaging of normal human sleep by positron emission tomography. J. Sleep Res. 9, 207–231 (2000)."><span data-dcnode-id="4620" instrument_node="">7</span></a></sup><span data-dcnode-id="4617" instrument_node="">, despite the increasing number of studies suggesting that dream reports can be obtained from every stage of NREM sleep, albeit less often</span><sup data-dcnode-id="4614"><a aria-label="Reference 18" data-dcnode-id="4615" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d93788509e1262" title="Nielsen, T.A. in Handbook of Behavioral State Control (eds. Lydic, R. &amp; Baghdoyan, H.A.,) 101–128 (CRC, 1999)."><span data-dcnode-id="4616" instrument_node="">18</span></a></sup><span data-dcnode-id="4613" instrument_node="">. The frequent conflation of REM sleep with dreaming was eased by the marked similarities between the overall EEG of REM sleep and that of waking consciousness, and little attention was given to the rare reports of REM sleep awakenings that yielded no reports. Conversely, reports of dreaming from NREM sleep awakenings were hard to reconcile with EEG patterns characterized by slow-wave activity, which is the opposite of EEG activation</span><sup data-dcnode-id="4610"><a aria-label="Reference 5" data-dcnode-id="4611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d93788509e1266" title="Moruzzi, G. &amp; Magoun, H.W. Brain stem reticular formation and activation of the EEG. Electroencephalogr. Clin. Neurophysiol. 1, 455–473 (1949)."><span data-dcnode-id="4612" instrument_node="">5</span></a></sup><span data-dcnode-id="4609" instrument_node="">. Indeed, it has been suggested that reports of dreaming after NREM awakenings were due to 'covert' REM sleep</span><sup data-dcnode-id="4606"><a aria-label="Reference 19" data-dcnode-id="4607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d93788509e1270" title="Nielsen, T.A. A review of mentation in REM and NREM sleep: “covert” REM sleep as a possible reconciliation of two opposing models. Behav. Brain Sci. 23, 851–866, discussion 904–1121 (2000)."><span data-dcnode-id="4608" instrument_node="">19</span></a></sup><span data-dcnode-id="4605" instrument_node=""> or even that neural activity in the cortex was unrelated to the presence or absence of consciousness</span><sup data-dcnode-id="4602"><a aria-label="Reference 20" data-dcnode-id="4603" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d93788509e1274" title="Cavallero, C., Cicogna, P., Natale, V., Occhionero, M. &amp; Zito, A. Slow wave sleep dreaming. Sleep 15, 562–566 (1992)."><span data-dcnode-id="4604" instrument_node="">20</span></a></sup><span data-dcnode-id="4601" instrument_node="">. The present results resolve these paradoxes by showing that in both REM and NREM sleep, dreaming and more generally, conscious experience during sleep require a localized activation of a posterior hot zone, irrespective of the EEG in the rest of the cortex. This explains why dreaming can occur in two behavioral states that differ radically in terms of global EEG signatures.</span></p><p data-dcnode-id="4562"><span data-dcnode-id="4599" instrument_node="">Of course, since the posterior hot zone was highlighted by averaging EEG recordings preceding many awakenings from many subjects, the full neural correlates of experiences in sleep could occasionally include additional brain regions. For example, dreams that include insight into the dream state ('lucid dreams') or dreams in which an individual has some degree of control over the content of the dream may recruit additional areas of the frontoparietal cortex</span><sup data-dcnode-id="4593"><a aria-label="Reference 21" data-dcnode-id="4597" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d93788509e1281" title="Voss, U., Holzmann, R., Tuin, I. &amp; Hobson, J.A. Lucid dreaming: a state of consciousness with features of both waking and non-lucid dreaming. Sleep 32, 1191–1200 (2009)."><span data-dcnode-id="4598" instrument_node="">21</span></a><span data-dcnode-id="4596" instrument_node="">,</span><a aria-label="Reference 22" data-dcnode-id="4594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d93788509e1284" title="Dresler, M. et al. Neural correlates of dream lucidity obtained from contrasting lucid versus non-lucid REM sleep: a combined EEG/fMRI case study. Sleep 35, 1017–1020 (2012)."><span data-dcnode-id="4595" instrument_node="">22</span></a></sup><span data-dcnode-id="4592" instrument_node="">. Also, when considering unthresholded </span><i data-dcnode-id="4590"><span data-dcnode-id="4591" instrument_node="">t</span></i><span data-dcnode-id="4589" instrument_node="">-maps (</span><a data-dcnode-id="4587" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig13"><span data-dcnode-id="4588" instrument_node="">Supplementary Fig. 8</span></a><span data-dcnode-id="4586" instrument_node="">), it is apparent that some cortical areas that do not reach significance in the contrast between DE and NE were nevertheless consistently and smoothly highlighted in both experiments 1 and 2. These areas include superior temporal and postcentral regions, as well the midcingulate region, which is also highlighted by contrasts between highly thought-like and highly perceptual experiences in REM sleep (</span><a data-dcnode-id="4584" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4585" instrument_node="">Fig. 4a</span></a><span data-dcnode-id="4583" instrument_node="">). Conversely, we cannot rule out that the posterior hot zone may include, besides brain regions supporting experiences, areas that might support unconscious aspects of dream generation. However, many studies contrasting perceiving or not specific sensory stimuli during wakefulness (such as seeing or not seeing a face, an object, a place, a movement and so on) also point to regions within the posterior hot zone</span><sup data-dcnode-id="4580"><a aria-label="Reference 23" data-dcnode-id="4581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1297" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4582" instrument_node="">23</span></a></sup><span data-dcnode-id="4579" instrument_node="">. EEG source modeling indicates that, in addition to low- and high-level sensory areas (primarily visual), the posterior hot zone prominently includes precuneus, posterior cingulate and retrosplenial cortices: areas on the medial surface of the brain whose electrical stimulation can induce a feeling of being 'in a parallel world'</span><sup data-dcnode-id="4576"><a aria-label="Reference 24" data-dcnode-id="4577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d93788509e1302" title="Balestrini, S. et al. Reply: The dorsal cingulate cortex as a critical gateway in the network supporting conscious awareness. Brain 139, e24 (2016)."><span data-dcnode-id="4578" instrument_node="">24</span></a></sup><span data-dcnode-id="4575" instrument_node=""> or disconnected from the environment in a 'dream-like state'</span><sup data-dcnode-id="4572"><a aria-label="Reference 25" data-dcnode-id="4573" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d93788509e1306" title="Herbet, G. et al. Disrupting posterior cingulate connectivity disconnects consciousness from the external environment. Neuropsychologia 56, 239–244 (2014)."><span data-dcnode-id="4574" instrument_node="">25</span></a></sup><span data-dcnode-id="4571" instrument_node=""> and whose involvement in multisensory integration is well-suited to support both the virtual simulation of a world</span><sup data-dcnode-id="4568"><a aria-label="Reference 26" data-dcnode-id="4569" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d93788509e1310" title="Revonsuo, A. The reinterpretation of dreams: an evolutionary hypothesis of the function of dreaming. Behav. Brain Sci. 23, 877–901, discussion 904–1121 (2000)."><span data-dcnode-id="4570" instrument_node="">26</span></a></sup><span data-dcnode-id="4567" instrument_node=""> and the 'immersive spatiotemporal hallucinations'</span><sup data-dcnode-id="4564"><a aria-label="Reference 27" data-dcnode-id="4565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d93788509e1314" title="Windt, J.M. Dreaming: a Conceptual Framework for Philosophy of Mind and Empirical Research (MIT Press, 2015)."><span data-dcnode-id="4566" instrument_node="">27</span></a></sup><span data-dcnode-id="4563" instrument_node=""> that characterize dreams.</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4561" instrument_node="">The posterior hot zone was also highlighted by the contrast between the absence of dream experience versus dream experiences without recall of specific contents of the experience. This finding further suggests that the activation of this posterior hot zone was a marker of experiences themselves, rather than of the recall of experiences. The trustworthiness of subjective dream reports has often been called into question and has generated much controversy in the past. Indeed, it is particularly delicate to distinguish the absence of experience from the absence of memory of experiences in this context. Therefore, to reduce potential biases associated with collecting reports, we followed standardized experimental protocols. Specifically, to avoid interfering with dream recall or introducing variability in dream recall, subjects were always interviewed just after being awakened from a dream (short temporal lag) and in identical experimental conditions (lying on their back, with eyes closed, without the examiner entering the room). In addition, in experiment 2, subjects were trained in dream reporting so as not to introduce a 'learning bias' in recalling dream experiences. Our results, which show for the first time (to our knowledge) that reports of absent and forgotten dream experiences carry distinct EEG signatures, should encourage the current tendency to take subjective reports of conscious experience at face value, i.e., as the best inference to scientific explanation, provided that carefully designed experimental protocols are used</span><sup data-dcnode-id="4558"><a aria-label="Reference 27" data-dcnode-id="4559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d93788509e1321" title="Windt, J.M. Dreaming: a Conceptual Framework for Philosophy of Mind and Empirical Research (MIT Press, 2015)."><span data-dcnode-id="4560" instrument_node="">27</span></a></sup><span data-dcnode-id="4557" instrument_node="">. In line with our results, both lesion studies and neuroimaging results indicate that specific contents of experiences are supported by posterior cortical areas</span><sup data-dcnode-id="4554"><a aria-label="Reference 28" data-dcnode-id="4555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d93788509e1325" title="Christophel, T.B., Hebart, M.N. &amp; Haynes, J.D. Decoding the contents of visual short-term memory from human visual and parietal cortex. J. Neurosci. 32, 12983–12989 (2012)."><span data-dcnode-id="4556" instrument_node="">28</span></a></sup><span data-dcnode-id="4553" instrument_node="">, while a different set of brain areas are involved in encoding and storing memories and in directing attention</span><sup data-dcnode-id="4550"><a aria-label="Reference 29" data-dcnode-id="4551" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d93788509e1329" title="Postle, B.R. The cognitive neuroscience of visual short-term memory. Curr. Opin. Behav. Sci. 1, 40–46 (2015)."><span data-dcnode-id="4552" instrument_node="">29</span></a></sup><span data-dcnode-id="4549" instrument_node="">. The results we obtained were also virtually identical in naive subjects (experiment 1) and in trained subjects (experiment 2), suggesting that they characterize a core correlate of dream experience rather than some other cognitive function.</span></p><p data-dcnode-id="4500"><span data-dcnode-id="4547" instrument_node="">In our experiments, conscious experiences were consistently associated with low activity in the delta range (1–4 Hz) and the absence of experience with high delta activity in the posterior hot zone. During NREM sleep, EEG slow waves in the delta range reflect alternations between periods of depolarization (up-states), during which neurons can fire, and periods of hyperpolarization (down-states), during which neurons cease firing</span><sup data-dcnode-id="4544"><a aria-label="Reference 11" data-dcnode-id="4545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d93788509e1337" title="Nir, Y. et al. Regional slow waves and spindles in human sleep. Neuron 70, 153–169 (2011)."><span data-dcnode-id="4546" instrument_node="">11</span></a></sup><span data-dcnode-id="4543" instrument_node="">. This bistability of membrane potential causes a breakdown in stable, causal interactions among cortical areas</span><sup data-dcnode-id="4540"><a aria-label="Reference 12" data-dcnode-id="4541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d93788509e1341" title="Pigorini, A. et al. Bistability breaks-off deterministic responses to intracortical stimulation during non-REM sleep. Neuroimage 112, 105–113 (2015)."><span data-dcnode-id="4542" instrument_node="">12</span></a></sup><span data-dcnode-id="4539" instrument_node="">, which are thought to be necessary for sustaining conscious experiences</span><sup data-dcnode-id="4533"><a aria-label="Reference 13" data-dcnode-id="4537" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d93788509e1345" title="Tononi, G. &amp; Massimini, M. Why does consciousness fade in early sleep? Ann. NY Acad. Sci. 1129, 330–334 (2008)."><span data-dcnode-id="4538" instrument_node="">13</span></a><span data-dcnode-id="4536" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="4534" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d93788509e1348" title="Purdon, P.L. et al. Electroencephalogram signatures of loss and recovery of consciousness from propofol. Proc. Natl. Acad. Sci. USA 110, E1142–E1151 (2013)."><span data-dcnode-id="4535" instrument_node="">14</span></a></sup><span data-dcnode-id="4532" instrument_node="">. Recently, the occurrence of local slow waves has also been discovered during REM sleep, especially in the supragranular layers of primary cortical areas</span><sup data-dcnode-id="4529"><a aria-label="Reference 30" data-dcnode-id="4530" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d93788509e1352" title="Funk, C.M., Honjoh, S., Rodriguez, A.V., Cirelli, C. &amp; Tononi, G. Local slow waves in superficial layers of primary cortical areas during REM sleep. Curr. Biol. 26, 396–403 (2016)."><span data-dcnode-id="4531" instrument_node="">30</span></a></sup><span data-dcnode-id="4528" instrument_node="">, adding to the evidence that neuronal activity during sleep can have a local component</span><sup data-dcnode-id="4525"><a aria-label="Reference 11" data-dcnode-id="4526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d93788509e1356" title="Nir, Y. et al. Regional slow waves and spindles in human sleep. Neuron 70, 153–169 (2011)."><span data-dcnode-id="4527" instrument_node="">11</span></a></sup><span data-dcnode-id="4524" instrument_node="">. A global slowing of EEG activity into the delta range had been associated with loss of consciousness in many previous studies</span><sup data-dcnode-id="4512"><a aria-label="Reference 13" data-dcnode-id="4522" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d93788509e1361" title="Tononi, G. &amp; Massimini, M. Why does consciousness fade in early sleep? Ann. NY Acad. Sci. 1129, 330–334 (2008)."><span data-dcnode-id="4523" instrument_node="">13</span></a><span data-dcnode-id="4521" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="4519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d93788509e1364" title="Purdon, P.L. et al. Electroencephalogram signatures of loss and recovery of consciousness from propofol. Proc. Natl. Acad. Sci. USA 110, E1142–E1151 (2013)."><span data-dcnode-id="4520" instrument_node="">14</span></a><span data-dcnode-id="4518" instrument_node="">,</span><a aria-label="Reference 31" data-dcnode-id="4516" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d93788509e1367" title="Schiff, N.D., Nauvel, T. &amp; Victor, J.D. Large-scale brain dynamics in disorders of consciousness. Curr. Opin. Neurobiol. 25, 7–14 (2014)."><span data-dcnode-id="4517" instrument_node="">31</span></a><span data-dcnode-id="4515" instrument_node="">,</span><a aria-label="Reference 32" data-dcnode-id="4513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d93788509e1370" title="Sitt, J.D. et al. Large scale screening of neural signatures of consciousness in patients in a vegetative or minimally conscious state. Brain 137, 2258–2270 (2014)."><span data-dcnode-id="4514" instrument_node="">32</span></a></sup><span data-dcnode-id="4511" instrument_node="">. However, there are several situations in which subjects can be conscious and have experiences despite the presence of local and global slow-wave activity</span><sup data-dcnode-id="4502"><a aria-label="Reference 23" data-dcnode-id="4509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1374" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4510" instrument_node="">23</span></a><span data-dcnode-id="4508" instrument_node="">,</span><a aria-label="Reference 33" data-dcnode-id="4506" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d93788509e1377" title="Gökyigĭt, A. &amp; Calişkan, A. Diffuse spike-wave status of 9-year duration without behavioral change or intellectual decline. Epilepsia 36, 210–213 (1995)."><span data-dcnode-id="4507" instrument_node="">33</span></a><span data-dcnode-id="4505" instrument_node="">,</span><a aria-label="Reference 34" data-dcnode-id="4503" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d93788509e1380" title="Wikler, A. Pharmacologic dissociation of behavior and EEG “sleep patterns” in dogs; morphine, n-allylnormorphine, and atropine. Proc. Soc. Exp. Biol. Med. 79, 261–265 (1952)."><span data-dcnode-id="4504" instrument_node="">34</span></a></sup><span data-dcnode-id="4501" instrument_node="">, including of course NREM sleep itself, during which global slow-wave activity is present despite the frequent occurrence of dreaming. The present findings suggest that future work in patients with disorders of consciousness, epileptic seizures or under general anesthesia should examine the level of EEG activation in the posterior hot zone to uncover the possible occurrence of consciousness despite the loss of responsiveness.</span></p><p data-dcnode-id="4483"><span data-dcnode-id="4499" instrument_node="">In addition to differences in EEG low-frequency activity in the posterior hot zone, we found that this region also showed increased high-frequency activity when subjects reported dreaming experiences during sleep. High-frequency activity usually reflects increased neuronal firing</span><sup data-dcnode-id="4496"><a aria-label="Reference 16" data-dcnode-id="4497" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d93788509e1387" title="Steriade, M., Contreras, D., Amzica, F. &amp; Timofeev, I. Synchronization of fast (30-40 Hz) spontaneous oscillations in intrathalamic and thalamocortical networks. J. Neurosci. 16, 2788–2808 (1996)."><span data-dcnode-id="4498" instrument_node="">16</span></a></sup><span data-dcnode-id="4495" instrument_node="">. A plausible interpretation of this finding is that, as long as the posterior hot zone is not in a low-frequency mode that prevents experiences, the specific contents of experiences when dreaming are dictated by which specific groups of neurons fire strongly and which do not, just as in wake. Consistent with this, we found that specific contents of a subject's REM sleep dream—such as thoughts, perceptions, faces, places, movement and speech—were associated with increased high-frequency EEG activity in specific cortical areas, which corresponded closely to those engaged during waking perception of the same contents. Although these differences extended only over a few voxels and were statistically weaker than the contrasts between DE and NE, their temporal distribution (maximal in the 2 s before the awakening) and spatial localization (similar to waking perception of the same contents) strongly support our interpretation. In a recent functional MRI (fMRI) study, a pattern classifier trained while subjects perceived natural images during wakefulness</span><sup data-dcnode-id="4492"><a aria-label="Reference 35" data-dcnode-id="4493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d93788509e1391" title="Horikawa, T., Tamaki, M., Miyawaki, Y. &amp; Kamitani, Y. Neural decoding of visual imagery during sleep. Science 340, 639–642 (2013)."><span data-dcnode-id="4494" instrument_node="">35</span></a></sup><span data-dcnode-id="4491" instrument_node=""> was able to successfully decode specific content categories reported by subjects awakened at the transition between wakefulness and sleep. Our results with high-density EEG extend these findings beyond falling asleep to periods of consolidated sleep, providing further evidence that dream reports reflect conscious experience during sleep rather than confabulations upon awakening</span><sup data-dcnode-id="4485"><a aria-label="Reference 36" data-dcnode-id="4489" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d93788509e1395" title="Malcolm, N. Dreaming and skepticism. Philos. Rev. 65, 14–37 (1956)."><span data-dcnode-id="4490" instrument_node="">36</span></a><span data-dcnode-id="4488" instrument_node="">,</span><a aria-label="Reference 37" data-dcnode-id="4486" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d93788509e1398" title="Dennet, D.C. Are dreams experiences? Philos. Rev. 85, 151–171 (1976)."><span data-dcnode-id="4487" instrument_node="">37</span></a></sup><span data-dcnode-id="4484" instrument_node="">.</span></p><p data-dcnode-id="4435"><span data-dcnode-id="4482" instrument_node="">Increased high-frequency activity associated with reports of dreaming experiences was also observed in areas extending beyond the posterior hot zone. Thus, increased high-frequency activity extended to some portions of prefrontal cortex during REM sleep dreaming, especially for thought-like experiences. Moreover, a frontal cluster (</span><a data-dcnode-id="4480" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4481" instrument_node="">Fig. 3b</span></a><span data-dcnode-id="4479" instrument_node="">) showed increase high-frequency activity during NREM sleep when contrasting experiences with and without recall of content, suggesting that this area may be important for recall of the content of the experience. Neuronal activity in the gamma range was initially linked to consciousness, but later studies have shown that consciousness and gamma activity can be dissociated</span><sup data-dcnode-id="4476"><a aria-label="Reference 23" data-dcnode-id="4477" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1408" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4478" instrument_node="">23</span></a></sup><span data-dcnode-id="4475" instrument_node="">. For example, one can be aware of a stimulus whether or not it triggers gamma activity</span><sup data-dcnode-id="4472"><a aria-label="Reference 38" data-dcnode-id="4473" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d93788509e1412" title="Aru, J. et al. Local category-specific gamma band responses in the visual cortex do not reflect conscious perception. J. Neurosci. 32, 14909–14914 (2012)."><span data-dcnode-id="4474" instrument_node="">38</span></a></sup><span data-dcnode-id="4471" instrument_node="">, and gamma activity can be strong during general anesthesia in the presence of low frequency oscillations</span><sup data-dcnode-id="4468"><a aria-label="Reference 39" data-dcnode-id="4469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d93788509e1416" title="Murphy, M. et al. Propofol anesthesia and sleep: a high-density EEG study. Sleep 34, 283–291A (2011)."><span data-dcnode-id="4470" instrument_node="">39</span></a></sup><span data-dcnode-id="4467" instrument_node="">. However, recent studies have reported that gamma-band transcranial alternating current stimulation is associated with higher scores on the revised coma scale recovery scale (CRS-R)</span><sup data-dcnode-id="4464"><a aria-label="Reference 40" data-dcnode-id="4465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d93788509e1420" title="Naro, A., Bramanti, P., Leo, A., Russo, M. &amp; Calabrò, R.S. Transcranial alternating current stimulation in patients with chronic disorder of consciousness: a possible way to cut the diagnostic Gordian knot? Brain Topogr. 29, 623–644 (2016)."><span data-dcnode-id="4466" instrument_node="">40</span></a></sup><span data-dcnode-id="4463" instrument_node=""> or self-awareness during REM sleep dreams</span><sup data-dcnode-id="4460"><a aria-label="Reference 41" data-dcnode-id="4461" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d93788509e1425" title="Voss, U. et al. Induction of self awareness in dreams through frontal low current stimulation of gamma activity. Nat. Neurosci. 17, 810–812 (2014)."><span data-dcnode-id="4462" instrument_node="">41</span></a></sup><span data-dcnode-id="4459" instrument_node="">, suggesting that high-frequency activity may indeed influence functions related to cognition or awareness. It is thus an open question whether high-frequency activity in a subset of prefrontal regions may contribute some specific contents to experience</span><sup data-dcnode-id="4456"><a aria-label="Reference 23" data-dcnode-id="4457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1429" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4458" instrument_node="">23</span></a></sup><span data-dcnode-id="4455" instrument_node="">, such as conscious thought or mind-wandering states</span><sup data-dcnode-id="4452"><a aria-label="Reference 42" data-dcnode-id="4453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d93788509e1433" title="Christoff, K., Gordon, A.M., Smallwood, J., Smith, R. &amp; Schooler, J.W. Experience sampling during fMRI reveals default network and executive system contributions to mind wandering. Proc. Natl. Acad. Sci. USA 106, 8719–8724 (2009)."><span data-dcnode-id="4454" instrument_node="">42</span></a></sup><span data-dcnode-id="4451" instrument_node="">, emotional or motivational content</span><sup data-dcnode-id="4448"><a aria-label="Reference 43" data-dcnode-id="4449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d93788509e1437" title="Perogamvros, L. &amp; Schwartz, S. The roles of the reward system in sleep and dreaming. Neurosci. Biobehav. Rev. 36, 1934–1951 (2012)."><span data-dcnode-id="4450" instrument_node="">43</span></a></sup><span data-dcnode-id="4447" instrument_node="">, metacognition</span><sup data-dcnode-id="4444"><a aria-label="Reference 44" data-dcnode-id="4445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d93788509e1441" title="Fleming, S.M. &amp; Dolan, R.J. The neural basis of metacognitive ability. Phil. Trans. R. Soc. Lond. B 367, 1338–1349 (2012)."><span data-dcnode-id="4446" instrument_node="">44</span></a></sup><span data-dcnode-id="4443" instrument_node=""> or insight into one's state (i.e., lucid dreaming)</span><sup data-dcnode-id="4437"><a aria-label="Reference 21" data-dcnode-id="4441" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d93788509e1445" title="Voss, U., Holzmann, R., Tuin, I. &amp; Hobson, J.A. Lucid dreaming: a state of consciousness with features of both waking and non-lucid dreaming. Sleep 32, 1191–1200 (2009)."><span data-dcnode-id="4442" instrument_node="">21</span></a><span data-dcnode-id="4440" instrument_node="">,</span><a aria-label="Reference 22" data-dcnode-id="4438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d93788509e1448" title="Dresler, M. et al. Neural correlates of dream lucidity obtained from contrasting lucid versus non-lucid REM sleep: a combined EEG/fMRI case study. Sleep 35, 1017–1020 (2012)."><span data-dcnode-id="4439" instrument_node="">22</span></a></sup><span data-dcnode-id="4436" instrument_node="">. Alternatively, high-frequency activity in prefrontal regions may mediate cognitive functions that are unconscious but affect experience indirectly, such as encoding and storing long-term memories, deploying of attention, and planning and executing tasks.</span></p><p data-dcnode-id="4421"><span data-dcnode-id="4434" instrument_node="">Finally, this study suggests that dreaming may constitute a valuable model for the study of consciousness with implications beyond sleep. First, the direct comparison between consciousness (the presence of experience) and unconsciousness (the absence of experience) within the same behavioral state avoids confounding factors that limit the interpretation of between-states models. These confounds arise because, in studies contrasting wakefulness with sleep, anesthesia or coma, many other aspects of brain function besides consciousness change along with behavioral state changes</span><sup data-dcnode-id="4431"><a aria-label="Reference 45" data-dcnode-id="4432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d93788509e1455" title="Hohwy, J. The neural correlates of consciousness: new experimental approaches needed? Conscious. Cogn. 18, 428–438 (2009)."><span data-dcnode-id="4433" instrument_node="">45</span></a></sup><span data-dcnode-id="4430" instrument_node="">. Second, during sleep, subjects are largely disconnected from both environmental input and environmental output, meaning that in the majority of cases, sensory stimuli do not influence the content of experience</span><sup data-dcnode-id="4427"><a aria-label="Reference 2" data-dcnode-id="4428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d93788509e1459" title="Nir, Y. &amp; Tononi, G. Dreaming and the brain: from phenomenology to neurophysiology. Trends Cogn. Sci. 14, 88–100 (2010)."><span data-dcnode-id="4429" instrument_node="">2</span></a></sup><span data-dcnode-id="4426" instrument_node="">. Third, during sleep, subjects are not performing an experimental task, avoiding confounds caused by stimulus processing, response preparation and execution</span><sup data-dcnode-id="4423"><a aria-label="Reference 45" data-dcnode-id="4424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d93788509e1463" title="Hohwy, J. The neural correlates of consciousness: new experimental approaches needed? Conscious. Cogn. 18, 428–438 (2009)."><span data-dcnode-id="4425" instrument_node="">45</span></a></sup><span data-dcnode-id="4422" instrument_node="">.</span></p><p data-dcnode-id="4394"><span data-dcnode-id="4420" instrument_node="">An influential notion derived from neuroimaging studies contrasting wake with NREM sleep, anesthesia or coma is that the neural correlates of consciousness would correspond to a broad frontoparietal network</span><sup data-dcnode-id="4417"><a aria-label="Reference 46" data-dcnode-id="4418" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d93788509e1470" title="Baars, B.J., Ramsøy, T.Z. &amp; Laureys, S. Brain, conscious experience and the observing self. Trends Neurosci. 26, 671–675 (2003)."><span data-dcnode-id="4419" instrument_node="">46</span></a></sup><span data-dcnode-id="4416" instrument_node="">. This notion has been reinforced by findings indicating that the same frontoparietal network is activated when contrasting brain responses to the same stimuli when subjects reported seeing them or not</span><sup data-dcnode-id="4413"><a aria-label="Reference 47" data-dcnode-id="4414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d93788509e1474" title="Dehaene, S. et al. Cerebral mechanisms of word masking and unconscious repetition priming. Nat. Neurosci. 4, 752–758 (2001)."><span data-dcnode-id="4415" instrument_node="">47</span></a></sup><span data-dcnode-id="4412" instrument_node="">. However, lesion studies suggest that consciousness persists after widespread frontal lesions</span><sup data-dcnode-id="4406"><a aria-label="Reference 23" data-dcnode-id="4410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1478" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4411" instrument_node="">23</span></a><span data-dcnode-id="4409" instrument_node="">,</span><a aria-label="Reference 48" data-dcnode-id="4407" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d93788509e1481" title="Hebb, D.O. &amp; Penfield, W. Human behavior after extensive bilateral removal from the frontal lobes. Arch. Neurol. Psychiatry 42, 421–438 (1940)."><span data-dcnode-id="4408" instrument_node="">48</span></a></sup><span data-dcnode-id="4405" instrument_node=""> and recent work controlling for confounding factors related to stimulus processing, attention and task performance have cast doubt on a central role of this frontoparietal network in supporting consciousness</span><sup data-dcnode-id="4396"><a aria-label="Reference 23" data-dcnode-id="4403" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d93788509e1485" title="Koch, C., Massimini, M., Boly, M. &amp; Tononi, G. Neural correlates of consciousness: progress and problems. Nat. Rev. Neurosci. 17, 307–321 (2016)."><span data-dcnode-id="4404" instrument_node="">23</span></a><span data-dcnode-id="4402" instrument_node="">,</span><a aria-label="Reference 49" data-dcnode-id="4400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d93788509e1488" title="Frässle, S., Sommer, J., Jansen, A., Naber, M. &amp; Einhäuser, W. Binocular rivalry: frontal activity relates to introspection and action but not to perception. J. Neurosci. 34, 1738–1747 (2014)."><span data-dcnode-id="4401" instrument_node="">49</span></a><span data-dcnode-id="4399" instrument_node="">,</span><a aria-label="Reference 50" data-dcnode-id="4397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d93788509e1491" title="Kamphuisen, A., Bauer, M. &amp; van Ee, R. No evidence for widespread synchronized networks in binocular rivalry: MEG frequency tagging entrains primarily early visual cortex. J. Vis. 8 
                    http://dx.doi.org/10.1167/8.5.4
                    
                   (2008)."><span data-dcnode-id="4398" instrument_node="">50</span></a></sup><span data-dcnode-id="4395" instrument_node="">. By exploiting a within-state, no-stimulus, no-task model, our findings indicate that the neural correlate of consciousness, rather than involving the broad lateral frontoparietal network, may be restricted to a posterior hot zone.</span></p></div></div></section><section data-dcnode-id="4114" data-title="Methods"><div class="c-article-section" data-dcnode-id="4115" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4389" id="Sec8"><span data-dcnode-id="4390" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="4116" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="4387" id="Sec9"><span data-dcnode-id="4388" instrument_node="">Experiments 1 and 2.</span></h3><p data-dcnode-id="4379"><i data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">Procedure.</span></i><span data-dcnode-id="4384" instrument_node=""> The procedure used in this study has been described in detail in a previous publication</span><sup data-dcnode-id="4381"><a aria-label="Reference 9" data-dcnode-id="4382" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93788509e1509" title="Siclari, F., Larocque, J.J., Postle, B.R. &amp; Tononi, G. Assessing sleep consciousness within subjects using a serial awakening paradigm. Front. Psychol. 4, 542 (2013)."><span data-dcnode-id="4383" instrument_node="">9</span></a></sup><span data-dcnode-id="4380" instrument_node="">. Awakenings in the sleep laboratory were performed at pseudorandom intervals, irrespective of sleep stage, using a computerized sound that lasted 1.5 s, which was administered through E-Prime (Psychology Software Tools, Pittsburgh, PA). Subjects were instructed to signal that they had heard the alarm sound and to lie quietly on their back. They then underwent a structured interview via intercom about their mental activity that lasted between 20 s and 3.5 min, depending on whether the subject reported a conscious experience and had to answer additional questions related to the content. Signed informed consent was obtained from all participants before the experiment, and ethical approval for the study was obtained from the University of Wisconsin–Madison Institutional Review Board. Data collection and analysis were not performed blind to the conditions of the experiments.</span></p><p data-dcnode-id="4372"><i data-dcnode-id="4377"><span data-dcnode-id="4378" instrument_node="">Study participants in experiment 1.</span></i><span data-dcnode-id="4376" instrument_node=""> Thirty-two healthy subjects (12 males, age 46 ± 13.3 years (mean ± s.d.), range 24–65 years), selected from a group of 69 subjects participating in a larger research project in our laboratory, were included in this experiment. Subjects were randomly selected from the subset of all participants that had at least one DE and NE report in NREM sleep during the same night. Among the 240 awakenings performed in these 32 subjects, 5 had to be excluded for technical problems and 2 because subjects were too somnolent upon awakening to answer questions reliably. Comparisons between DEWR–NE conditions and DE–DEWR conditions were performed in the subset of these participants (</span><i data-dcnode-id="4374"><span data-dcnode-id="4375" instrument_node="">N</span></i><span data-dcnode-id="4373" instrument_node=""> = 20) that had all three types (DE, DEWR, NE) of report during the same night. In REM sleep, only 6 of the 69 participants presented both DE and NE. They were all included in the analysis.</span></p><p data-dcnode-id="4364"><i data-dcnode-id="4370"><span data-dcnode-id="4371" instrument_node="">Study participants in experiment 2.</span></i><span data-dcnode-id="4369" instrument_node=""> Seven healthy subjects were included in this experiment (3 males, age 31 ± 8.8 years (mean ± s.d.), range 21–47 years). None of the subjects in this experiment participated in experiments 1 or 3. The behavioral results of these subjects (i.e., dream recall rates and characteristics of dreams across sleep stages), but not the EEG results, have in part been described in a previous publication</span><sup data-dcnode-id="4366"><a aria-label="Reference 9" data-dcnode-id="4367" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d93788509e1526" title="Siclari, F., Larocque, J.J., Postle, B.R. &amp; Tononi, G. Assessing sleep consciousness within subjects using a serial awakening paradigm. Front. Psychol. 4, 542 (2013)."><span data-dcnode-id="4368" instrument_node="">9</span></a></sup><span data-dcnode-id="4365" instrument_node="">. Data from experiments 1 and 3 has not been reported previously.</span></p><p data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Study participants received comprehensive explanations regarding the questionnaire used in the experiment and filled it in at home every morning upon awakening for 2 weeks before the first study night. During this training phase, experimenters communicated repeatedly with the subjects to ensure that they were proceeding with the training and to answer any questions the subjects had regarding the questionnaire. Between five and ten overnight recordings were performed for each participant during the experiment, with a maximum of three consecutive nights. To increase the number of awakenings in REM sleep with respect to NREM sleep, two additional nights were scheduled for three of the subjects, in which awakenings were only performed in REM sleep. The total number of nights was distributed as follows among subjects: S1: 10 nights, S2: 8 nights, S3: 6 nights, S4: 5 nights, S5: 8 nights, S6: 6 nights, S7: 8 nights. Overall, 836 awakenings were performed, of which 5 had to be excluded because of technical problems and 16 because subjects were too somnolent upon awakening to answer questions reliably.</span></p><p data-dcnode-id="4354"><i data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">Sleep recordings.</span></i><span data-dcnode-id="4359" instrument_node=""> Recordings were made at the Wisconsin Center for Sleep and Consciousness. They were performed using a 256-channel high-density EEG (hd-EEG) system (Electrical Geodesics, Inc., Eugene, Ore.). Four of the 256 electrodes placed at the outer canthi of the eyes were used to monitor eye movements; additional polysomnography channels were used to record submental electromyography. Sleep scoring was performed over 30-s epochs, according to standard criteria</span><sup data-dcnode-id="4356"><a aria-label="Reference 51" data-dcnode-id="4357" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d93788509e1539" title="Iber, C., Ancoli-Israel, S., Chesson, A. &amp; Quan, S.F. The AASM Manual for the Scoring of Sleep and Associated Events: Rules, Terminology and Technical Specifications (American Academy of Sleep Medicine, 2007)."><span data-dcnode-id="4358" instrument_node="">51</span></a></sup><span data-dcnode-id="4355" instrument_node="">.</span></p><p data-dcnode-id="4342"><i data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">Preprocessing of data for experiment 1.</span></i><span data-dcnode-id="4351" instrument_node=""> The signal corresponding to the 2 min preceding each awakening was extracted and considered for analysis. The EEG signal was sampled at 500 Hz and was offline bandpass-filtered between 1 and 50 Hz for the NREM data and between 0.3 and 50 Hz for the REM data, to merge it with the REM data from experiment 2. The NREM EEG data was high-pass filtered at 1 Hz instead of lower frequencies, as there were strong sweating artifacts in some of the participants that caused intermittent high-amplitude slow-frequency oscillatory activity around 0.3 Hz. REM data did not contain any sweating artifacts and was high-pass filtered at 0.3Hz. Channels containing artifacts were visually identified and replaced with data interpolated from nearby channels using spherical splines (NetStation, Electrical Geodesic Inc.). To remove ocular, muscular and electrocardiograph artifacts, we performed independent component analysis (ICA) using EEGLAB routines</span><sup data-dcnode-id="4348"><a aria-label="Reference 52" data-dcnode-id="4349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d93788509e1548" title="Delorme, A. &amp; Makeig, S. EEGLAB: an open source toolbox for analysis of single-trial EEG dynamics including independent component analysis. J. Neurosci. Methods 134, 9–21 (2004)."><span data-dcnode-id="4350" instrument_node="">52</span></a></sup><span data-dcnode-id="4347" instrument_node="">. Only ICA components with specific activity patterns and component maps characteristic of artifacts were removed</span><sup data-dcnode-id="4344"><a aria-label="Reference 53" data-dcnode-id="4345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d93788509e1552" title="Jung, T.P. et al. Removing electroencephalographic artifacts by blind source separation. Psychophysiology 37, 163–178 (2000)."><span data-dcnode-id="4346" instrument_node="">53</span></a></sup><span data-dcnode-id="4343" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4340" id="Sec10"><span data-dcnode-id="4341" instrument_node="">Preprocessing of data for experiment 2.</span></h3><p data-dcnode-id="4338"><span data-dcnode-id="4339" instrument_node="">The signal corresponding to the 2 min preceding each awakening was extracted and considered for analysis. The EEG signal was sampled at 500 Hz and offline bandpass-filtered between 0.3 and 50 Hz for both NREM and REM data. Artifact removal was carried out as in experiment 1.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4336" id="Sec11"><span data-dcnode-id="4337" instrument_node="">Signal analysis.</span></h3><p data-dcnode-id="4324"><i data-dcnode-id="4334"><span data-dcnode-id="4335" instrument_node="">Source localization.</span></i><span data-dcnode-id="4333" instrument_node=""> The previously cleaned, filtered and average-referenced EEG signal corresponding to the 20 s before the awakening was extracted and analyzed at the source level. Source modeling was performed using the GeoSource software (Electrical Geodesics, Inc., Eugene, Ore.). A four-shell head model based on the Montreal Neurological Institute (MNI) atlas and a standard coregistered set of electrode positions were used to construct the forward model. The source space was restricted to 2,447 dipoles that were distributed over 7 × 7 × 7-mm cortical voxels. The inverse matrix was computed using the standardized low-resolution brain electromagnetic tomography (sLORETA) constraint</span><sup data-dcnode-id="4330"><a aria-label="Reference 54" data-dcnode-id="4331" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d93788509e1574" title="Pascual-Marqui, R.D. Standardized low-resolution brain electromagnetic tomography (sLORETA): technical details. Methods Find Exp Clin Pharmacol 24 (Suppl. D), 5–12 (2002)."><span data-dcnode-id="4332" instrument_node="">54</span></a></sup><span data-dcnode-id="4329" instrument_node="">. A Tikhonov regularization procedure was applied to account for the variability in the signal-to-noise ratio</span><sup data-dcnode-id="4326"><a aria-label="Reference 54" data-dcnode-id="4327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d93788509e1578" title="Pascual-Marqui, R.D. Standardized low-resolution brain electromagnetic tomography (sLORETA): technical details. Methods Find Exp Clin Pharmacol 24 (Suppl. D), 5–12 (2002)."><span data-dcnode-id="4328" instrument_node="">54</span></a></sup><span data-dcnode-id="4325" instrument_node="">. We computed spectral power density using the Welch's modified periodogram method (implemented with the 'pwelch' function in Matlab (MathWorks Inc., Natick, MA)) in 2-s Hamming windows (8 segments, 50% overlap) to decompose the source signals into frequency bands of interest.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4322" id="Sec12"><span data-dcnode-id="4323" instrument_node="">Statistical analysis.</span></h3><p data-dcnode-id="4303"><span data-dcnode-id="4321" instrument_node="">No statistical methods were used to predetermine sample sizes, but our sample sizes were similar to those reported in previous studies in which sleep was assessed using high-density EEG recordings</span><sup data-dcnode-id="4315"><a aria-label="Reference 55" data-dcnode-id="4319" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d93788509e1590" title="Huber, R., Ghilardi, M.F., Massimini, M. &amp; Tononi, G. Local sleep and learning. Nature 430, 78–81 (2004)."><span data-dcnode-id="4320" instrument_node="">55</span></a><span data-dcnode-id="4318" instrument_node="">,</span><a aria-label="Reference 56" data-dcnode-id="4316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d93788509e1593" title="Huber, R. et al. Arm immobilization causes cortical plastic changes and locally decreases sleep slow wave activity. Nat. Neurosci. 9, 1169–1176 (2006)."><span data-dcnode-id="4317" instrument_node="">56</span></a></sup><span data-dcnode-id="4314" instrument_node="">. As within-subject contrasts were carried out, no randomization in the organization of the experimental conditions was performed. Statistical analyses were carried out in Matlab. Statistical analyses and thresholds were selected based on (i) the statistical power of the contrast and (ii) the strength of the a priori hypothesis. To compare brain activity between DE and NE, the source-modeled signal was averaged within the time periods and frequency bands of interest. We then averaged the signal associated with DEs and NEs within each subject and for each frequency band and stage (REM and NREM sleep) separately. Whole-brain group-level analyses on average absolute power values were performed separately for each frequency range. Due to the nature of high-density EEG, differences were expected to extend over a relatively large number of voxels. For this reason, a statistical analysis with a cluster-based correction for multiple comparisons was used (SnPM)</span><sup data-dcnode-id="4311"><a aria-label="Reference 57" data-dcnode-id="4312" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d93788509e1597" title="Nichols, T.E. &amp; Holmes, A.P. Nonparametric permutation tests for functional neuroimaging: a primer with examples. Hum. Brain Mapp. 15, 1–25 (2002)."><span data-dcnode-id="4313" instrument_node="">57</span></a></sup><span data-dcnode-id="4310" instrument_node=""> and a two-tailed </span><i data-dcnode-id="4308"><span data-dcnode-id="4309" instrument_node="">t</span></i><span data-dcnode-id="4307" instrument_node="">-test with a corrected </span><i data-dcnode-id="4305"><span data-dcnode-id="4306" instrument_node="">P</span></i><span data-dcnode-id="4304" instrument_node=""> &lt; 0.05 threshold was applied.</span></p><p data-dcnode-id="4273"><span data-dcnode-id="4302" instrument_node="">For analyses of content (faces, spatial setting, movement, speech), we used a more liberal threshold (</span><i data-dcnode-id="4300"><span data-dcnode-id="4301" instrument_node="">P</span></i><span data-dcnode-id="4299" instrument_node=""> &lt; 0.05, uncorrected, two-tailed paired </span><i data-dcnode-id="4297"><span data-dcnode-id="4298" instrument_node="">t</span></i><span data-dcnode-id="4296" instrument_node="">-tests), given that activations were expected in restricted cortical regions comprising only a few voxels. We first verified that the data were normally distributed using the Lilliefors modification of the Kolmogorov-Smirnov test (</span><i data-dcnode-id="4294"><span data-dcnode-id="4295" instrument_node="">P</span></i><span data-dcnode-id="4293" instrument_node=""> &gt; 0.05, </span><i data-dcnode-id="4291"><span data-dcnode-id="4292" instrument_node="">t</span></i><sub data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">5</span></sub><span data-dcnode-id="4288" instrument_node=""> &lt; 2.57 and </span><i data-dcnode-id="4286"><span data-dcnode-id="4287" instrument_node="">t</span></i><sub data-dcnode-id="4284"><span data-dcnode-id="4285" instrument_node="">6</span></sub><span data-dcnode-id="4283" instrument_node=""> &lt; 2.45, depending on the number subjects included in each contrast). For all planned comparisons (face, setting, movement, speech), a normal distribution was confirmed for the large majority of voxels (range 81.2–95.0%). Given the relative robustness of parametric </span><i data-dcnode-id="4281"><span data-dcnode-id="4282" instrument_node="">t</span></i><span data-dcnode-id="4280" instrument_node="">-tests to violations of normality and the relatively small percentage of voxels breaking this assumption, potential differences were assessed using two-tailed paired </span><i data-dcnode-id="4278"><span data-dcnode-id="4279" instrument_node="">t</span></i><span data-dcnode-id="4277" instrument_node="">-tests (</span><i data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">P</span></i><span data-dcnode-id="4274" instrument_node=""> &lt; 0.05).</span></p><p data-dcnode-id="4240"><span data-dcnode-id="4272" instrument_node="">Additional ROI-based analyses were performed as follows: ROIs were defined as 15-mm radius spheres centered on coordinates (for example, fusiform face area) obtained from previous imaging studies</span><sup data-dcnode-id="4254"><a aria-label="Reference 58" data-dcnode-id="4270" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d93788509e1640" title="Rossion, B., Schiltz, C. &amp; Crommelinck, M. The functionally defined right occipital and fusiform “face areas” discriminate novel from visually familiar faces. Neuroimage 19, 877–883 (2003)."><span data-dcnode-id="4271" instrument_node="">58</span></a><span data-dcnode-id="4269" instrument_node="">,</span><a aria-label="Reference 59" data-dcnode-id="4267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d93788509e1643" title="Corbetta, M., Miezin, F.M., Shulman, G.L. &amp; Petersen, S.E. A PET study of visuospatial attention. J. Neurosci. 13, 1202–1226 (1993)."><span data-dcnode-id="4268" instrument_node="">59</span></a><span data-dcnode-id="4266" instrument_node="">,</span><a aria-label="Reference 60" data-dcnode-id="4264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d93788509e1646" title="Malhotra, P., Coulthard, E.J. &amp; Husain, M. Role of right posterior parietal cortex in maintaining attention to spatial locations over time. Brain 132, 645–660 (2009)."><span data-dcnode-id="4265" instrument_node="">60</span></a><span data-dcnode-id="4263" instrument_node="">,</span><a aria-label="Reference 61" data-dcnode-id="4261" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d93788509e1649" title="Grossman, E. et al. Brain areas involved in perception of biological motion. J. Cogn. Neurosci. 12, 711–720 (2000)."><span data-dcnode-id="4262" instrument_node="">61</span></a><span data-dcnode-id="4260" instrument_node="">,</span><a aria-label="Reference 62" data-dcnode-id="4258" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d93788509e1652" title="Puce, A., Allison, T., Bentin, S., Gore, J.C. &amp; McCarthy, G. Temporal cortex activation in humans viewing eye and mouth movements. J. Neurosci. 18, 2188–2199 (1998)."><span data-dcnode-id="4259" instrument_node="">62</span></a><span data-dcnode-id="4257" instrument_node="">,</span><a aria-label="Reference 63" data-dcnode-id="4255" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d93788509e1655" title="Narain, C. et al. Defining a left-lateralized response specific to intelligible speech using fMRI. Cereb. Cortex 13, 1362–1368 (2003)."><span data-dcnode-id="4256" instrument_node="">63</span></a></sup><span data-dcnode-id="4253" instrument_node="">. Then, high-frequency power values (25–50 Hz) were averaged within these ROIs and compared between conditions (i.e., face versus no-face). Given the strong a priori hypothesis about the direction of the contrast (based on the results of the previous analysis), one-sided paired </span><i data-dcnode-id="4251"><span data-dcnode-id="4252" instrument_node="">t</span></i><span data-dcnode-id="4250" instrument_node="">-tests were used for these analyses. Larger ROIs (25-mm spheres) were used for the figures (</span><a data-dcnode-id="4248" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4249" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4247" instrument_node="">) for better visibility. In the figures we opted to display both the </span><i data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">P</span></i><span data-dcnode-id="4244" instrument_node=""> &lt; 0.05 and the </span><i data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">P</span></i><span data-dcnode-id="4241" instrument_node=""> &lt; 0.1 significance levels to show that the activations were spatially smooth as opposed to random and thus were more likely to correspond to neural activations. Since experience-related brain activity for the content of experiences was assumed to be very short-lived and subjects were specifically instructed to refer to the 'very last' experience before the alarm sound when reporting the presence of specific contents, we considered shorter timeframes before awakening when performing content-specific contrasts, ranging from 0 to −8 s with respect to the awakening.</span></p><p data-dcnode-id="4226"><span data-dcnode-id="4239" instrument_node="">To investigate the correlation between the thinking–perceiving score and high frequency power (25–50 Hz), we calculated the Spearman rank correlation coefficient for each subject and voxel and then averaged the resulting coefficients across subjects to obtain group-level correlation maps (</span><a data-dcnode-id="4237" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4238" instrument_node="">Fig. 4</span></a><span data-dcnode-id="4236" instrument_node="">). Statistical significance was determined using a permutation-based approach. Specifically, null distributions were generated for each voxel by randomly shuffling the two variables of interest (thinking–perceiving score and high-frequency power) in each subject and recalculating the group-level mean correlation (</span><i data-dcnode-id="4234"><span data-dcnode-id="4235" instrument_node="">n</span></i><span data-dcnode-id="4233" instrument_node=""> = 1,000). A voxel-wise, parametric, one-sided </span><i data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">t</span></i><span data-dcnode-id="4230" instrument_node="">-test was subsequently performed (</span><i data-dcnode-id="4228"><span data-dcnode-id="4229" instrument_node="">P</span></i><span data-dcnode-id="4227" instrument_node=""> &lt; 0.05).</span></p><p data-dcnode-id="4207"><i data-dcnode-id="4224"><span data-dcnode-id="4225" instrument_node="">Selection of frequency bands.</span></i><span data-dcnode-id="4223" instrument_node=""> For low frequency power comparisons, we selected the 1–4-Hz band, as this frequency range is associated with the presence of slow waves, which have been linked to the loss of consciousness. Slow oscillations have been shown to exist not only in NREM sleep but also in in REM sleep</span><sup data-dcnode-id="4220"><a aria-label="Reference 30" data-dcnode-id="4221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d93788509e1692" title="Funk, C.M., Honjoh, S., Rodriguez, A.V., Cirelli, C. &amp; Tononi, G. Local slow waves in superficial layers of primary cortical areas during REM sleep. Curr. Biol. 26, 396–403 (2016)."><span data-dcnode-id="4222" instrument_node="">30</span></a></sup><span data-dcnode-id="4219" instrument_node="">. For high-frequency power comparisons, a slightly lower frequency range (20–50 Hz) was chosen for NREM sleep compared to REM sleep (25–50 Hz), given that NREM sleep is typically characterized by slower frequencies</span><sup data-dcnode-id="4216"><a aria-label="Reference 64" data-dcnode-id="4217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d93788509e1696" title="Gross, D.W. &amp; Gotman, J. Correlation of high-frequency oscillations with the sleep-wake cycle and cognitive activity in humans. Neuroscience 94, 1005–1018 (1999)."><span data-dcnode-id="4218" instrument_node="">64</span></a></sup><span data-dcnode-id="4215" instrument_node="">. Frequencies above 50 Hz were not included in order to avoid muscle and powerline artifacts. Frequencies below 20 Hz were avoided because of the potential overlap with fast sleep spindles, which can reach 18 Hz</span><sup data-dcnode-id="4209"><a aria-label="Reference 65" data-dcnode-id="4213" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d93788509e1700" title="Andrillon, T. et al. Sleep spindles in humans: insights from intracranial EEG and unit recordings. J. Neurosci. 31, 17821–17834 (2011)."><span data-dcnode-id="4214" instrument_node="">65</span></a><span data-dcnode-id="4212" instrument_node="">,</span><a aria-label="Reference 66" data-dcnode-id="4210" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d93788509e1703" title="Sirota, A., Csicsvari, J., Buhl, D. &amp; Buzsáki, G. Communication between neocortex and hippocampus during sleep in rodents. Proc. Natl. Acad. Sci. USA 100, 2065–2069 (2003)."><span data-dcnode-id="4211" instrument_node="">66</span></a></sup><span data-dcnode-id="4208" instrument_node="">.</span></p><p data-dcnode-id="4199"><i data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">Hemispheric lateralization.</span></i><span data-dcnode-id="4204" instrument_node=""> To assess lateralization of findings, for each contrast we evaluated the potential difference in the number of voxels showing a significant effect between the two hemispheres by calculating a lateralization index (LI) as described in</span><sup data-dcnode-id="4201"><a aria-label="Reference 67" data-dcnode-id="4202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d93788509e1712" title="Seghier, M.L. Laterality index in functional MRI: methodological issues. Magn. Reson. Imaging 26, 594–601 (2008)."><span data-dcnode-id="4203" instrument_node="">67</span></a></sup><span data-dcnode-id="4200" instrument_node="">. To test for a statistically significant difference between the levels of activity observed in symmetrical areas across the two hemispheres, we calculated the relative difference in power spectral density (PSD) between two symmetrical ROIs including the voxels that showed a significant effect in the hemisphere characterized by the stronger LI but not on the contralateral side. In particular, we explored the potential interaction between hemisphere (left, right) and type of report (DE, NE, DEWR) using a repeated-measures ANOVA.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4197" id="Sec13"><span data-dcnode-id="4198" instrument_node="">Experiment 3.</span></h3><p data-dcnode-id="4193"><i data-dcnode-id="4195"><span data-dcnode-id="4196" instrument_node="">Study participants in experiment 3.</span></i><span data-dcnode-id="4194" instrument_node=""> Seven additional participants (4 men, 3 women; age 22 ± 4 years (mean ± s.d.), range 19–31 years) not included in experiments 1 or 2 were recruited for experiment 3. All participants were right-handed and had no history of neurological disorders. Signed informed consent was obtained from all participants before the experiment, and ethical approval for the study was obtained from the University of Wisconsin–Madison Institutional Review Board.</span></p><p data-dcnode-id="4185"><i data-dcnode-id="4191"><span data-dcnode-id="4192" instrument_node="">Sleep recordings.</span></i><span data-dcnode-id="4190" instrument_node=""> High-density EEG was continuously recorded overnight using a 64-electrode EEG cap (EasyCap, Herrsching, Germany) with equidistantly spaced sintered Ag/AgCl ring electrodes. The signal was amplified using BrainAmp MR Plus amplifiers (16-bit analog-to-digital conversion; 0.5-μV resolution; ± 16.384-mV operating range; 5,000-Hz sampling; 0.1- to 250-Hz band pass; Brain Products, Munich, Germany) and transmitted via fiber-optic cables. Data recording during the baseline night was made with BrainVision Recorder (v. 1.20) software while data during experimental nights was read out in realtime, filtered (at 0.5–58 Hz) and relayed to custom Matlab scripts for online EEG power analysis using OpenVibe software</span><sup data-dcnode-id="4187"><a aria-label="Reference 68" data-dcnode-id="4188" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d93788509e1732" title="Renard, Y. et al. OpenViBE: an open-source software platform to design, test, and use brain-computer interfaces in real and virtual environments. Presence 19, 35–53 (2010)."><span data-dcnode-id="4189" instrument_node="">68</span></a></sup><span data-dcnode-id="4186" instrument_node="">. EEG was digitized at an online sampling rate of 500 Hz and was referenced to the vertex. Electrode impedances were kept below 20 kΩ.</span></p><p data-dcnode-id="4152"><i data-dcnode-id="4183"><span data-dcnode-id="4184" instrument_node="">EEG data processing.</span></i><span data-dcnode-id="4182" instrument_node=""> Offline EEG data analysis was conducted with Matlab using the EEGLAB toolbox</span><sup data-dcnode-id="4179"><a aria-label="Reference 52" data-dcnode-id="4180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d93788509e1741" title="Delorme, A. &amp; Makeig, S. EEGLAB: an open source toolbox for analysis of single-trial EEG dynamics including independent component analysis. J. Neurosci. Methods 134, 9–21 (2004)."><span data-dcnode-id="4181" instrument_node="">52</span></a></sup><span data-dcnode-id="4178" instrument_node=""> and custom scripts. Sleep recordings were re-staged offline according to standard criteria to verify online sleep staging</span><sup data-dcnode-id="4175"><a aria-label="Reference 51" data-dcnode-id="4176" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d93788509e1745" title="Iber, C., Ancoli-Israel, S., Chesson, A. &amp; Quan, S.F. The AASM Manual for the Scoring of Sleep and Associated Events: Rules, Terminology and Technical Specifications (American Academy of Sleep Medicine, 2007)."><span data-dcnode-id="4177" instrument_node="">51</span></a></sup><span data-dcnode-id="4174" instrument_node="">. EEG data was epoched at 60 s before each awakening, consistent with the time interval used for prediction (“Procedure,” below). Twenty epochs were removed from analysis due to the presence of EEG artifacts or because sleep stage could not be confirmed. Data were bandpass filtered between 0.5 and 58 Hz using a Hamming-windowed sinc FIR filter. Bad channels were identified by visual inspection and interpolated using spherical splines. Spectral power density was computed using Welch's modified periodogram method. Source localization was performed in Brainstorm</span><sup data-dcnode-id="4171"><a aria-label="Reference 69" data-dcnode-id="4172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d93788509e1749" title="Tadel, F., Baillet, S., Mosher, J.C., Pantazis, D. &amp; Leahy, R.M. Brainstorm: a user-friendly application for MEG/EEG analysis. Comput. Intell. Neurosci. 2011, 879716 (2011)."><span data-dcnode-id="4173" instrument_node="">69</span></a></sup><span data-dcnode-id="4170" instrument_node=""> with a noise-normalized estimate using standardized low-resolution brain electromagnetic tomography (sLORETA)</span><sup data-dcnode-id="4167"><a aria-label="Reference 54" data-dcnode-id="4168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d93788509e1753" title="Pascual-Marqui, R.D. Standardized low-resolution brain electromagnetic tomography (sLORETA): technical details. Methods Find Exp Clin Pharmacol 24 (Suppl. D), 5–12 (2002)."><span data-dcnode-id="4169" instrument_node="">54</span></a></sup><span data-dcnode-id="4166" instrument_node="">. Group-level analysis on EEG sources was conducted using the GLM framework implemented in SPM12 (Wellcome Trust Department of Imaging Neuroscience, University College London). Whole-cortex analyses were conducted, and correction for multiple comparisons was performed using topological FDR</span><sup data-dcnode-id="4163"><a aria-label="Reference 70" data-dcnode-id="4164" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d93788509e1757" title="Chumbley, J., Worsley, K., Flandin, G. &amp; Friston, K. Topological FDR for neuroimaging. Neuroimage 49, 3057–3064 (2010)."><span data-dcnode-id="4165" instrument_node="">70</span></a></sup><span data-dcnode-id="4162" instrument_node=""> (cluster-forming threshold, </span><i data-dcnode-id="4160"><span data-dcnode-id="4161" instrument_node="">P</span></i><span data-dcnode-id="4159" instrument_node=""> = 0.0005; cluster size threshold, </span><i data-dcnode-id="4157"><span data-dcnode-id="4158" instrument_node="">P</span></i><span data-dcnode-id="4156" instrument_node=""> &lt; 0.001; </span><i data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">k</span></i><span data-dcnode-id="4153" instrument_node=""> = 100 vertices).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4150" id="Sec14"><span data-dcnode-id="4151" instrument_node="">Procedure.</span></h3><p data-dcnode-id="4131"><span data-dcnode-id="4149" instrument_node="">Participants were invited to spend three consecutive nights in the lab. During the first night (baseline) they were allowed to sleep without interruption. Individual thresholds for low-frequency (1–4-Hz) and high-frequency (18–25-Hz) band power were computed from baseline night recordings by binning all NREM sleep into 60-s epochs and computing the top and bottom 15% thresholds from the distribution for each band for each participant over the entire baseline night (</span><a data-dcnode-id="4147" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4148" instrument_node="">Fig. 5a</span></a><span data-dcnode-id="4146" instrument_node="">). We used 18–25-Hz power for the high-frequency power ROI because higher frequencies are more prone to artifact from eye movements and other sources</span><sup data-dcnode-id="4140"><a aria-label="Reference 71" data-dcnode-id="4144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d93788509e1782" title="Keren, A.S., Yuval-Greenberg, S. &amp; Deouell, L.Y. Saccadic spike potentials in gamma-band EEG: characterization, detection and suppression. Neuroimage 49, 2248–2263 (2010)."><span data-dcnode-id="4145" instrument_node="">71</span></a><span data-dcnode-id="4143" instrument_node="">,</span><a aria-label="Reference 72" data-dcnode-id="4141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d93788509e1785" title="Muthukumaraswamy, S.D. High-frequency brain activity and muscle artifacts in MEG/EEG: a review and recommendations. Front. Hum. Neurosci. 7, 138 (2013)."><span data-dcnode-id="4142" instrument_node="">72</span></a></sup><span data-dcnode-id="4139" instrument_node=""> and because applying ICA for artifact removal to data in an online fashion was
