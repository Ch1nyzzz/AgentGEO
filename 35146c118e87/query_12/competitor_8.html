> • </span></p><button class="icon-container" data-dcnode-id="499"><svg data-dcnode-id="500" viewBox="0 0 21 20" xmlns="http://www.w3.org/2000/svg"><path d="M4.3 7.5c1.4 0 2.5 1 2.5 2.5s-1 2.5-2.5 2.5A2.5 2.5 0 0 1 1.8 10c0-1.4 1.2-2.5 2.5-2.5zm0-1.7a4.2 4.2 0 1 0 0 8.4 4.2 4.2 0 0 0 0-8.4zm12.5 7.5c-1 0-1.8.5-2.4 1L9.8 12a5.8 5.8 0 0 1-.8 1.4l4.6 2.5v.7a3.3 3.3 0 1 0 3.2-3.4zm0 5c-1 0-1.6-.7-1.6-1.6 0-1 .7-1.7 1.6-1.7 1 0 1.7.7 1.7 1.7s-.7 1.6-1.7 1.6zm0-18.3a3.3 3.3 0 0 0-3.3 3.3V4L9 6.7c.4.4.6 1 .8 1.4l4.6-2.4a3.3 3.3 0 0 0 2.4 1 3.3 3.3 0 0 0 0-6.6zm0 5c-1 0-1.6-.7-1.6-1.7s.7-1.6 1.6-1.6c1 0 1.7.7 1.7 1.6 0 1-.7 1.7-1.7 1.7z" data-dcnode-id="501"></path></svg></button></div></div><button class="share-modal-overlay" data-dcnode-id="483"><div class="modal-overlay-container" data-dcnode-id="484"><h6 data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Share to:</span></h6><div class="modal-icons" data-dcnode-id="485"><a aria-label="social-icon-buttons" data-dcnode-id="492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.mattressadvisor.com/how-neurological/" rel="noreferrer" target="_blank"><svg data-dcnode-id="493" viewBox="0 0 800 800"><path d="M445 643h-90V419h-75v-87h75v-64q0-55 32-86 30-29 80-29 28 0 67 3v78h-47q-42 0-42 38v60h86l-11 87h-75v224z" data-dcnode-id="494"></path></svg></a><a aria-label="social-icon-buttons" data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3Dhttps%3A//www.mattressadvisor.com/how-neurological/" rel="noreferrer" target="_blank"><svg data-dcnode-id="490" viewBox="0 0 800 800"><path d="M679 239s-21 34-55 57c7 156-107 329-314 329-103 0-169-50-169-50s81 17 163-45c-83-5-103-77-103-77s23 6 50-2c-93-23-89-110-89-110s23 14 50 14c-84-65-34-148-34-148s76 107 228 116c-22-121 117-177 188-101 37-6 71-27 71-27s-12 41-49 61c30-2 63-17 63-17z" data-dcnode-id="491"></path></svg></a><a aria-label="social-icon-buttons" data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//www.mattressadvisor.com/how-neurological/" rel="noreferrer" target="_blank"><svg data-dcnode-id="487" viewBox="0 0 800 800"><path d="M287 681c-9-3-15-77-6-115l38-163s-9-20-9-49c0-46 26-80 59-80 28 0 42 21 42 46 0 28-19 71-28 110-8 33 17 59 49 59 58 0 104-61 104-150 0-79-57-134-138-134-94 0-148 69-148 142 0 28 9.7 57.4 23 74 4 5 5 6 2 17l-8 31s-2 9.5-14 3c-41-22.3-63-78-63-126 0-104 75-199 217-199 114 0 203 81 203 190 0 113-72 205-171 205-55 0-75-38-75-38l-21 78c-11 41-47 102-56 99z" data-dcnode-id="488"></path></svg></a></div></div></button></section><div class="margin-wrapper" data-dcnode-id="83"><div class="split-screen" data-dcnode-id="84"><div class="secondary" data-dcnode-id="458"><section class="sidebar sticky-bar" data-dcnode-id="459"><div class="sidebar-container" data-dcnode-id="460"><div class="sidebar-links sidebar-wrap" data-dcnode-id="461"><div class="sidebar-ctas-container" data-dcnode-id="462"><h4 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Helpful Resources</span></h4><a class="cta-button" data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/mattress-finder-quiz/" target="_self"><button class="MuiButtonBase-root MuiButton-root MuiButton-contained" data-dcnode-id="476" tabindex="0" type="button"><span class="MuiButton-label" data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Take Mattress Quiz</span></span><span class="MuiTouchRipple-root" data-dcnode-id="477"></span></button></a><a class="cta-button" data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/compare-mattresses/" target="_self"><button class="MuiButtonBase-root MuiButton-root MuiButton-contained MuiButton-containedPrimary" data-dcnode-id="471" tabindex="0" type="button"><span class="MuiButton-label" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Compare Mattresses</span></span><span class="MuiTouchRipple-root" data-dcnode-id="472"></span></button></a><a class="cta-button" data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/best-mattress/" target="_self"><button class="MuiButtonBase-root MuiButton-root MuiButton-outlined" data-dcnode-id="466" tabindex="0" type="button"><span class="MuiButton-label" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">See the Best Mattresses of 2022</span></span><span class="MuiTouchRipple-root" data-dcnode-id="467"></span></button></a><a class="minimal-cta-button" data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/mattress-reviews/" target="_self"><span data-dcnode-id="464" instrument_node="">See all mattress reviews</span></a></div></div></div></section></div><div class="primary" data-dcnode-id="85"><section class="it-container margin-wrapper" data-dcnode-id="440" style="flex-direction:row-reverse"><div class="col-md-4" data-dcnode-id="456"><img alt="neuron" data-dcnode-id="457" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/neuron.jpg&amp;raw"></div><div class="col-md-8 info" data-dcnode-id="441"><div class="wysiwyg-container" data-dcnode-id="442"><p data-dcnode-id="453"><span data-dcnode-id="454" style="font-weight: 400;"><span data-dcnode-id="455" instrument_node="">Neurons (nerve cells) in the brain and brainstem produce a variety of nerve-signalling chemicals called neurotransmitters in different parts of the brain. These neurotransmitters in turn act on different groups of neurons in various parts of the brain, which control whether we are asleep or awake.&nbsp;</span></span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="450" style="font-weight: 400;"><span data-dcnode-id="451" instrument_node="">As we have seen in the earlier section on the </span></span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/how-two-process/"><span data-dcnode-id="448" style="font-weight: 400;"><span data-dcnode-id="449" instrument_node="">Two-Process Model of Sleep Regulation</span></span></a><span data-dcnode-id="445" style="font-weight: 400;"><span data-dcnode-id="446" instrument_node="">, the timing of the activation of these various different processes results from the interaction between the increasing homeostatic drive to sleep and the changing influence of our internal circadian clock.</span></span></p><span data-dcnode-id="443" instrument_node="">
</span></div></div></section><div class="wysiwyg-container" data-dcnode-id="405"><p data-dcnode-id="437"><span data-dcnode-id="438" style="font-weight: 400;"><span data-dcnode-id="439" instrument_node="">In general, when the alerting areas of the brain are most active, they send arousal signals to the cerebral cortex (the outer layer of the brain that is responsible for learning, thinking, and organizing information), while at the same time inhibiting activity in other areas of the brain that are responsible for promoting sleep, resulting in a period of stable wakefulness.&nbsp;</span></span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="433"><span data-dcnode-id="434" style="font-weight: 400;"><span data-dcnode-id="435" instrument_node="">When the sleep-promoting areas of the brain are most active, on the other hand, they inhibit activity in areas of the brain responsible for promoting wakefulness, resulting in a period of stable sleep.</span></span></p><span data-dcnode-id="432" instrument_node="">
</span><h2 data-dcnode-id="429"><span data-dcnode-id="430" style="font-weight: 400;"><span data-dcnode-id="431" instrument_node="">What Parts of the Brain Control Sleep/Wake Cycle</span></span></h2><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="426" style="font-weight: 400;"><span data-dcnode-id="427" instrument_node="">It used to be thought that the brain had a specific “sleep centre” (in the hypothalamus) and a separate “wakefulness centre” (in the reticular activating system in the brainstem), but more recent research has indicated that the situation is actually substantially more complicated than that: </span></span><b data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">wakefulness actually appears to be regulated by a whole network of redundant structures in the brainstem, hypothalamus and basal forebrain, and is not centred in any one part of the brain.</span></b></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" style="font-weight: 400;"><span data-dcnode-id="421" instrument_node="">The ventrolateral preoptic nucleus (VLPO or VLPN) of the hypothalamus is one area of the brain that is particularly involved in the switch between wakefulness and sleep. Neurons in this small area help to promote sleep by inhibiting activity in areas of the brainstem that maintain wakefulness.&nbsp;</span></span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" style="font-weight: 400;"><span data-dcnode-id="417" instrument_node="">Likewise, in a process of “mutual inhibition“, during waking hours, those areas of the brain that are active in maintaining wakefulness by stimulating the cerebral cortex also work to inhibit the neurons of the VLPO.</span></span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" style="font-weight: 400;"><span data-dcnode-id="413" instrument_node="">For this reason, the VLPO is often referred to as the “sleep switch”, although this is really a gross simplification. In fact, several different simultaneous and interactive processes are involved – some of which are described below – and there is as yet no single unifying theory that describes all their interactions.&nbsp;</span></span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" style="font-weight: 400;"><span data-dcnode-id="409" instrument_node="">It sometimes seems that the more we discover about the complex physiological and neurological mechanisms of sleep and wakefulness, the more complications and interactions come to light, and the more questions arise.</span></span></p><span data-dcnode-id="406" instrument_node="">
</span></div><div class="section-image-container" data-dcnode-id="402"><img alt="vlpo" class="banner-image" data-dcnode-id="404" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/vlpo.jpg&amp;raw"><p class="banner-titles" data-dcnode-id="403"></p></div><div class="wysiwyg-container" data-dcnode-id="336"><h2 data-dcnode-id="399"><span data-dcnode-id="400" style="font-weight: 400;"><span data-dcnode-id="401" instrument_node="">Neurotransmitters at Work</span></span></h2><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="396" style="font-weight: 400;"><span data-dcnode-id="397" instrument_node="">A whole cocktail of neurotransmitters are involved in driving wakefulness and sleep, including histamine, dopamine, norepinephrine, serotonin, glutamate, orexin and acetylcholine, among others.&nbsp;</span></span></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" style="font-weight: 400;"><span data-dcnode-id="393" instrument_node="">While none of these neurotransmission processes is individually necessary, they all appear to contribute in some way.&nbsp;</span></span></p><span data-dcnode-id="390" instrument_node="">
</span><ul data-dcnode-id="354"><span data-dcnode-id="389" instrument_node="">
</span><li data-dcnode-id="374" style="font-weight: 400;"><b data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Histamine:</span></b><span data-dcnode-id="385" style="font-weight: 400;"><span data-dcnode-id="386" instrument_node=""> Histamine in particular is sometimes referred to as the “master” wakefulness-promoting neurotransmitter, exhibiting high activity during wakefulness, decreasing activity during non-rapid eye movement (</span></span><a data-dcnode-id="382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/nrem-sleep/"><span data-dcnode-id="383" style="font-weight: 400;"><span data-dcnode-id="384" instrument_node="">nREM) sleep</span></span></a><span data-dcnode-id="380" style="font-weight: 400;"><span data-dcnode-id="381" instrument_node="">, and its lowest levels during rapid eye movement (</span></span><a data-dcnode-id="377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/rem-sleep/"><span data-dcnode-id="378" style="font-weight: 400;"><span data-dcnode-id="379" instrument_node="">REM) sleep</span></span></a><span data-dcnode-id="375" style="font-weight: 400;"><span data-dcnode-id="376" instrument_node=""> (which is why histamine-blocking antihistamine medications cause drowsiness and increase nREM sleep).&nbsp;</span></span></li><span data-dcnode-id="373" instrument_node="">
</span><li data-dcnode-id="368" style="font-weight: 400;"><b data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Serotonin: </span></b><span data-dcnode-id="369" style="font-weight: 400;"><span data-dcnode-id="370" instrument_node="">Serotonin activity promotes wakefulness, increases sleep-onset latency (the length of time it takes to fall asleep) and decreases REM sleep.&nbsp;</span></span></li><span data-dcnode-id="367" instrument_node="">
</span><li data-dcnode-id="362" style="font-weight: 400;"><b data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Acetylcholine:</span></b><span data-dcnode-id="363" style="font-weight: 400;"><span data-dcnode-id="364" instrument_node=""> Acetylcholine activity in the reticular activating system of the brain stem stimulates activity in the forebrain and cerebral cortex, encouraging alertness and wakefulness, although it also appears to be active during REM sleep. Dopamine activity sometimes seems to promote wakefulness and sometimes sleep (it is also involved in the process of dreaming), so its role is still far from clear.</span></span></li><span data-dcnode-id="361" instrument_node="">
</span><li data-dcnode-id="356" style="font-weight: 400;"><b data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Orexin: </span></b><span data-dcnode-id="357" style="font-weight: 400;"><span data-dcnode-id="358" instrument_node="">Another important chemical in the sleep-wake cycle is orexin (also called hypocretin), a neurotransmitter that regulates arousal, wakefulness and appetite. Orexin is only produced by some 10,000-20,000 neurons in the hypothalamus region of the brain, although axons from those neurons extend throughout the entire brain and spinal cord. Activation of orexin triggers wakefulness, while low levels of orexin at night serve to drive sleep. A deficiency of orexin results in sleep-state instability, leading to many short awakenings and mixed-up REM and non-REM sleep states typical of sleep disorders like narcolepsy.</span></span></li><span data-dcnode-id="355" instrument_node="">
</span></ul><span data-dcnode-id="353" instrument_node="">
</span><h2 data-dcnode-id="350"><span data-dcnode-id="351" style="font-weight: 400;"><span data-dcnode-id="352" instrument_node="">The Role of the Thalamus&nbsp;</span></span></h2><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="347" style="font-weight: 400;"><span data-dcnode-id="348" instrument_node="">When sleep is called for, the normal signals of wakefulness are interrupted at the thalamus, which serves as the “gatekeeper” to the cerebral cortex (the furrowed outer layer of the brain where most conscious activity takes place), effectively disconnecting the cortex from most internal and external signals.</span></span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" style="font-weight: 400;"><span data-dcnode-id="344" instrument_node="">It is largely the thalamus that imparts the regular slow brain waves of deep slow-wave sleep to the cortex, rather than the more unsynchronized cortical firing typical of the waking state and REM sleep.&nbsp;</span></span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" style="font-weight: 400;"><span data-dcnode-id="340" instrument_node="">It has been shown that a damaged thalamus seriously interferes with sleep, and there is a very rare sleep disorder called fatal familial insomnia (FFI) in which malformed proteins called prions attack the sufferer’s thalamus, which effectively makes sleep impossible and which is in fact quite as fatal as its name suggests.</span></span></p><span data-dcnode-id="337" instrument_node="">
</span></div><div class="section-image-container" data-dcnode-id="333"><img alt="orexin" class="banner-image" data-dcnode-id="335" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/orexin.jpg&amp;raw"><p class="banner-titles" data-dcnode-id="334"></p></div><div class="wysiwyg-container" data-dcnode-id="250"><h3 data-dcnode-id="330"><span data-dcnode-id="331" style="font-weight: 400;"><span data-dcnode-id="332" instrument_node="">Sleep Mechanisms</span></span></h3><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" style="font-weight: 400;"><span data-dcnode-id="328" instrument_node="">REM sleep in particular is regulated in a very specific part of the pons region of the brainstem, where a population of neurons are selectively active during REM sleep, even if disconnected from practically all of the rest of the brain.&nbsp;</span></span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" style="font-weight: 400;"><span data-dcnode-id="324" instrument_node="">At the same time as acetylcholine neurotransmitters activate this part of the brainstem, two other areas in the pons are simultaneously inhibited in order for REM sleep to occur. Inhibitory signals are also sent from the pons to the spinal cord to bring about the temporary atonia or muscle paralysis that is characteristic of REM sleep.&nbsp;</span></span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" style="font-weight: 400;"><span data-dcnode-id="320" instrument_node="">As a result of this, the release of neurotransmitters such as norepinephrine, serotonin and histamine, which normally stimulate motor neurons to create muscle activity, is completely shut down.&nbsp;</span></span></p><span data-dcnode-id="317" instrument_node="">
</span><h3 data-dcnode-id="314"><span data-dcnode-id="315" style="font-weight: 400;"><span data-dcnode-id="316" instrument_node="">Switching from Sleep to Wakefulness</span></span></h3><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" style="font-weight: 400;"><span data-dcnode-id="312" instrument_node="">The switching between non-REM and REM sleep during each sleep cycle is regulated by several complex interactions between various “REM-on” and “REM-off” neurons, employing different neurotransmitters in various different regions of the midbrain and hind-brain, all of which are necessary for the various characteristics of REM sleep to play out.</span></span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="307" style="font-weight: 400;"><span data-dcnode-id="308" instrument_node="">As described in the section on </span></span><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/how-homeostasis/"><span data-dcnode-id="305" style="font-weight: 400;"><span data-dcnode-id="306" instrument_node="">Sleep-Wake Homeostasis</span></span></a><span data-dcnode-id="302" style="font-weight: 400;"><span data-dcnode-id="303" instrument_node="">, the homeostatic pressure to sleep is largely regulated by a neurotransmitter and neuromodulator called adenosine, which builds up throughout the day, and acts to inhibit many of the processes associated with wakefulness.&nbsp;</span></span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" style="font-weight: 400;"><span data-dcnode-id="299" instrument_node="">During the night, after the body has received a certain amount of restorative non-REM sleep, adenosine levels start to decline. At this point, the systems responsible for wakefulness start to become more active (i.e. become less inhibited by adenosine), and conditions gradually become more favourable to awakening.</span></span></p><span data-dcnode-id="296" instrument_node="">
</span><h3 data-dcnode-id="293"><span data-dcnode-id="294" style="font-weight: 400;"><span data-dcnode-id="295" instrument_node="">Cytokines</span></span></h3><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" style="font-weight: 400;"><span data-dcnode-id="291" instrument_node="">Small cell-signaling protein molecules called cytokines (such as interleukin and interferon, among others) are also involved in this process to some extent.&nbsp;</span></span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="286" style="font-weight: 400;"><span data-dcnode-id="287" instrument_node="">Cytokines are chemicals produced by our immune systems while fighting an infection, but they are also powerful hypnogenic chemicals, which is why infectious diseases like the flu tend to cause sleepiness. It is thought that sleep may help the body conserve energy and other resources that the immune system needs to mount an attack on diseases.</span></span></p><span data-dcnode-id="284" instrument_node="">
</span><h3 data-dcnode-id="281"><span data-dcnode-id="282" style="font-weight: 400;"><span data-dcnode-id="283" instrument_node="">Serotonin</span></span></h3><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="277"><span data-dcnode-id="278" style="font-weight: 400;"><span data-dcnode-id="279" instrument_node="">Another neurotransmitter, serotonin, is also released in the brain throughout the day, which has the effect of stimulating a particular area in the hypothalamus, which in turn inhibits a different part of the same organ, all of which has the effect of encouraging sleep.&nbsp;</span></span></p><span data-dcnode-id="276" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" style="font-weight: 400;"><span data-dcnode-id="275" instrument_node="">Even more importantly, serotonin is used by the body to produce yet another hormone, melatonin, sometimes called the “ sleep hormone”, which is a major regulator of our circadian or internal clock.</span></span></p><span data-dcnode-id="272" instrument_node="">
</span><h3 data-dcnode-id="269"><span data-dcnode-id="270" style="font-weight: 400;"><span data-dcnode-id="271" instrument_node="">Melatonin</span></span></h3><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="262"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/melatonin/"><span data-dcnode-id="266" style="font-weight: 400;"><span data-dcnode-id="267" instrument_node="">Melatonin</span></span></a><span data-dcnode-id="263" style="font-weight: 400;"><span data-dcnode-id="264" instrument_node=""> is converted from serotonin in the pineal gland in the brain, under directions from the body’s internal circadian clock (it can also be bought over the counter as a sleep medication).&nbsp;</span></span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" style="font-weight: 400;"><span data-dcnode-id="260" instrument_node="">Melatonin production increases in the evening, chemically causing drowsiness and helping to lower body temperature, and then decreases back to its normal negligible daytime levels by the early morning.</span><br data-dcnode-id="259"><span data-dcnode-id="258" instrument_node="">
</span></span></p><span data-dcnode-id="255" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" style="font-weight: 400;"><span data-dcnode-id="254" instrument_node="">It is thought that melatonin secretion regulates the circadian rhythm, not by promoting sleep actively, but by inhibiting the circadian alerting system in the suprachiasmatic nucleus (SCN). Melatonin actually feeds back to the suprachiasmatic nucleus in order to regulate its own production.</span></span></p><span data-dcnode-id="251" instrument_node="">
</span></div><section class="it-container margin-wrapper" data-dcnode-id="241" style="flex-direction:row"><div class="col-md-4" data-dcnode-id="248"><img alt="melatonin structure" data-dcnode-id="249" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2020/03/melatonin-structure.jpg&amp;raw"></div><div class="col-md-8 info" data-dcnode-id="242"><div class="wysiwyg-container" data-dcnode-id="243"><p data-dcnode-id="245"><span data-dcnode-id="246" style="font-weight: 400;"><span data-dcnode-id="247" instrument_node="">Melatonin production is inhibited by light (and therefore stimulated by lack of light, or darkness), and so it effectively provides a kind of internal representation of the external light conditions. In non-equatorial regions, it also encodes the seasons to some extent, as night length changes throughout the year, which some animals use in their mating practices.</span></span></p><span data-dcnode-id="244" instrument_node="">
</span></div></div></section><div class="wysiwyg-container" data-dcnode-id="122"><p data-dcnode-id="238"><span data-dcnode-id="239" style="font-weight: 400;"><span data-dcnode-id="240" instrument_node="">However, it is not completely clear what exact sleep function melatonin carries out, especially considering that nocturnal animals like rats and hamsters also secrete melatonin at night, which is their active phase, suggesting that melatonin itself may not have any direct effect on sleep or alertness.</span></span></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" style="font-weight: 400;"><span data-dcnode-id="236" instrument_node="">Towards the end of the night, the secretion of the stress hormone cortisol begins to increase in preparation for the anticipated stress of the day, usually capped by a particularly large increase (up to 50%) about 20-30 minutes after waking, known as the cortisol awakening response.</span></span></p><span data-dcnode-id="233" instrument_node="">
</span><h2 data-dcnode-id="230"><span data-dcnode-id="231" style="font-weight: 400;"><span data-dcnode-id="232" instrument_node="">What Your Brain Does While You Sleep</span></span></h2><span data-dcnode-id="229" instrument_node="">
</span><ul data-dcnode-id="198"><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="223" style="font-weight: 400;"><b data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Sleep Stage 1: </span></b><span data-dcnode-id="224" style="font-weight: 400;"><span data-dcnode-id="225" instrument_node="">As you enter this first stage of sleep, your brain slowly changes from wakefulness to sleep. If there is a change in your surroundings, you are likely to wake up.</span></span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="217" style="font-weight: 400;"><b data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Sleep Stage 2: </span></b><span data-dcnode-id="218" style="font-weight: 400;"><span data-dcnode-id="219" instrument_node="">Your heart rate and brain waves slow during stage 2 sleep, preparing your mind and body for restorative deep sleep.</span></span></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="211" style="font-weight: 400;"><b data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Sleep Stage 3:</span></b><span data-dcnode-id="212" style="font-weight: 400;"><span data-dcnode-id="213" instrument_node=""> During stage 3 sleep, your brain waves reach their lowest frequency, and it would be hard for anything to disturb your slumber. As a result, stage 3 sleep is also known as slow wave sleep or deep sleep. How much deep sleep you get will dictate how well-rested you feel come morning.</span></span></li><span data-dcnode-id="210" instrument_node="">
</span><li data-dcnode-id="200" style="font-weight: 400;"><b data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">REM Sleep:</span></b><span data-dcnode-id="206" style="font-weight: 400;"><span data-dcnode-id="207" instrument_node=""> Finally, you reach the final stage of sleep: rapid eye movement sleep (REM sleep). Your brain is the most active that it will be as you sleep. According to the </span></span><a data-dcnode-id="203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ninds.nih.gov/Disorders/Patient-caregiver-Education/understanding-sleep"><span data-dcnode-id="204" style="font-weight: 400;"><span data-dcnode-id="205" instrument_node="">National Institutes of Health</span></span></a><span data-dcnode-id="201" style="font-weight: 400;"><span data-dcnode-id="202" instrument_node="">, most of your dreams will occur now as your body is temporarily paralyzed. This sleep stage is pivotal for your memory and learning potential.</span></span></li><span data-dcnode-id="199" instrument_node="">
</span></ul><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="191"><span data-dcnode-id="192" style="font-weight: 400;"><span data-dcnode-id="196" instrument_node="">This cycle will take around 90 minutes. After you complete your first </span><a data-dcnode-id="194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/sleep-stages/"><span data-dcnode-id="195" instrument_node="">full sleep cycle</span></a><span data-dcnode-id="193" instrument_node="">, it will start over again.</span></span></p><span data-dcnode-id="190" instrument_node="">
</span><h2 data-dcnode-id="187"><span data-dcnode-id="188" style="font-weight: 400;"><span data-dcnode-id="189" instrument_node="">The Brain Benefits of Sleep</span></span></h2><span data-dcnode-id="186" instrument_node="">
</span><p data-dcnode-id="183"><span data-dcnode-id="184" style="font-weight: 400;"><span data-dcnode-id="185" instrument_node="">Sleep benefits the health and function of your brain in two primary ways.</span></span></p><span data-dcnode-id="182" instrument_node="">
</span><h3 data-dcnode-id="179"><span data-dcnode-id="180" style="font-weight: 400;"><span data-dcnode-id="181" instrument_node="">Sleep Helps Our Brains Consolidate and Preserve Memories</span></span></h3><span data-dcnode-id="178" instrument_node="">
</span><p data-dcnode-id="170"><span data-dcnode-id="176" style="font-weight: 400;"><span data-dcnode-id="177" instrument_node="">Sleep is critical for memory. </span></span><a data-dcnode-id="173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thensf.org/" rel="noopener" target="_blank"><span data-dcnode-id="174" style="font-weight: 400;"><span data-dcnode-id="175" instrument_node="">The National Sleep Foundation</span></span></a><span data-dcnode-id="171" style="font-weight: 400;"><span data-dcnode-id="172" instrument_node=""> includes aspects of memory as three of the top five things that happen in the brain as we sleep. During sleep, we form new memories, consolidate memories, preserve existing memories, and shed memories deemed unimportant.</span></span></p><span data-dcnode-id="169" instrument_node="">
</span><p data-dcnode-id="162"><b data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Related:</span></b><span data-dcnode-id="166" instrument_node=""> </span><a data-dcnode-id="163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/how-sleep-works/"><span data-dcnode-id="164" style="font-weight: 400;"><span data-dcnode-id="165" instrument_node="">How sleep works</span></span></a></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="158"><span data-dcnode-id="159" style="font-weight: 400;"><span data-dcnode-id="160" instrument_node="">Sleep is central to both our short term memory and our long term memory. Without sufficient sleep, our learning potential suffers. As a result, we can experience trouble remembering things like where we put our keys or the name of someone we recently met.</span></span></p><span data-dcnode-id="157" instrument_node="">
</span><h3 data-dcnode-id="154"><span data-dcnode-id="155" style="font-weight: 400;"><span data-dcnode-id="156" instrument_node="">Sleep Allows Toxins to Be Cleared from Our Brains</span></span></h3><span data-dcnode-id="153" instrument_node="">
</span><p data-dcnode-id="150"><span data-dcnode-id="151" style="font-weight: 400;"><span data-dcnode-id="152" instrument_node="">As our brains work hard during the day, they accumulate waste products that need to be cleared out. According to animal research, this cleanup happens during sleep. Thus, getting adequate sleep may help to keep your brain healthy and working well.</span></span></p><span data-dcnode-id="149" instrument_node="">
</span><p data-dcnode-id="142"><b data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Related:</span></b><span data-dcnode-id="146" instrument_node=""> </span><a data-dcnode-id="143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/why-do-we-sleep/"><span data-dcnode-id="144" style="font-weight: 400;"><span data-dcnode-id="145" instrument_node="">Why do we sleep</span></span></a></p><span data-dcnode-id="141" instrument_node="">
</span><h2 data-dcnode-id="138"><span data-dcnode-id="139" style="font-weight: 400;"><span data-dcnode-id="140" instrument_node="">Sleep Disorders and Sleep</span></span></h2><span data-dcnode-id="137" instrument_node="">
</span><p data-dcnode-id="132"><span data-dcnode-id="135" style="font-weight: 400;"><span data-dcnode-id="136" instrument_node="">There are many sleep disorders that can influence sleep. They range from narcolepsy, which results in excessive fatigue, to insomnia, which makes it hard to get enough sleep. Sleep </span></span><span data-dcnode-id="133" style="font-weight: 400;"><span data-dcnode-id="134" instrument_node="">researchers are hard at work learning more about sleep and sleep disorders in order to help people get the sleep that they need. If you struggle with a sleep disorder, talk to your doctor or see a sleep specialist to help protect your brain’s health.</span></span></p><span data-dcnode-id="131" instrument_node="">
</span><h2 data-dcnode-id="128"><span data-dcnode-id="129" style="font-weight: 400;"><span data-dcnode-id="130" instrument_node="">Summary</span></span></h2><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="124"><span data-dcnode-id="125" style="font-weight: 400;"><span data-dcnode-id="126" instrument_node="">Research in sleep medicine continues to explore the important neurological mechanisms that occur while we sleep and the role our brain plays in our sleep patterns. We have come a long way in identifying which key parts of the nervous system affect our sleep, but there is still more to learn about the memory consolidation processes, the stages of sleep, and circadian rhythm sleep disorders like jet lag.&nbsp;</span></span></p><span data-dcnode-id="123" instrument_node="">
</span></div><section class="listing" data-dcnode-id="86"><div class="listing-container" data-dcnode-id="87"><div class="section-title-container" data-dcnode-id="119"><h2 class="section-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Related Content</span></h2></div><div class="listing-items-container" data-dcnode-id="88"><a class="listing-item-container" data-dcnode-id="109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/how-two-process/"><div class="listing-image-container" data-dcnode-id="117"><img alt="4Sleep mattress 1" data-dcnode-id="118" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2017/12/4Sleep-mattress-1.jpg&amp;raw"></div><div class="listing-item-texts" data-dcnode-id="110"><h5 data-dcnode-id="115"><span data-dcnode-id="116" instrument_node="">Sleep Resources</span></h5><h3 data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">The Two-Process Model of Sleep Regulation</span></h3><p data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">The sleep-wake cycle is regulated by the two-process model of sleep. Find out more about this model, who discovered it, and how it works.</span></p></div></a><a class="listing-item-container" data-dcnode-id="99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mattressadvisor.com/how-homeostasis/"><div class="listing-image-container" data-dcnode-id="107"><img alt="eye mask e1600187127917" data-dcnode-id="108" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//content.mattressadvisor.com/wp-content/uploads/2019/05/eye-mask-e1600187127917-1024x509.jpeg&amp;raw"></div><div class="listing-item-texts" data-dcnode-id="100"><h5 data-dcnode-id="105"><span data-dcnode-id="106" instrument_node="">Sleep Resources</span></h5><h3 data-dcnode-id="103"><span data-dcnode-id="10
