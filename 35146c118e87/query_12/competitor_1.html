</span><h1 data-dcnode-id="1069" id="ctl00_cphBody_h1Title" itemprop="headline"><span data-dcnode-id="1070" instrument_node="">Brain Activity During Sleep</span></h1><span data-dcnode-id="1068" instrument_node="">
</span><div class="in-content-ctas in-content-ctas-top cta-btns-cols-1" data-dcnode-id="1054"><span data-dcnode-id="1067" instrument_node="">
</span><ul data-dcnode-id="1056"><span data-dcnode-id="1066" instrument_node="">
</span><li class="cta-printpdf" data-dcnode-id="1058"><a class="request-pdf-download" data-dcnode-id="1059" href="#" onclick="return false;"><span class="cta-text" data-dcnode-id="1060"><span data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Download</span></span><span data-dcnode-id="1063" instrument_node=""> </span><span data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">PDF Copy</span></span></span></a></li><span data-dcnode-id="1057" instrument_node="">
</span></ul><span data-dcnode-id="1055" instrument_node="">
</span></div><span data-dcnode-id="1053" instrument_node="">
</span><div class="content" data-dcnode-id="912"><span data-dcnode-id="1052" instrument_node="">
</span><div data-dcnode-id="917" id="ctl00_cphBody_divText" itemprop="articleBody"><div class="article-meta article-meta-byline article-meta-with-photo article-meta-author-and-reviewer" data-dcnode-id="1039" itemprop="author" itemscope="" itemtype="http://schema.org/Person"><span class="article-meta-photo-wrap" data-dcnode-id="1050"><img alt="Yolanda Smith, B.Pharm." class="article-meta-photo" data-dcnode-id="1051" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2jx2rerrg6sh3.cloudfront.net/pics/team2/yolanda-smith.jpg&amp;raw"></span><span class="article-meta-contents" data-dcnode-id="1040"><span class="article-meta-author" data-dcnode-id="1045"><span data-dcnode-id="1049" instrument_node="">By </span><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news-medical.net/medical/authors/yolanda-smith" itemprop="url"><span data-dcnode-id="1047" itemprop="name"><span data-dcnode-id="1048" instrument_node="">Yolanda Smith, B.Pharm.</span></span></a></span><span class="article-meta-reviewer" data-dcnode-id="1041"><span data-dcnode-id="1044" instrument_node="">Reviewed by </span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news-medical.net/medical/authors/benedette-cuffari"><span data-dcnode-id="1043" instrument_node="">Benedette Cuffari, M.Sc.</span></a></span></span></div><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Although it was historically believed that sleep was a passive but necessary process for healthy bodily functions, it is now known that brain activity continues during sleep. In fact, this brain activity is thought to play several important roles in the maintenance of physical, emotional, and mental health.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><div class="video-lazy-load azo-yt-player is-video-lazy-load-init" data-dcnode-id="1027" data-orig-embed-height="315" data-orig-embed-width="560" data-video-url="https://www.youtube.com/embed/IzQ2siryQrM?enablejsapi=1" id="ytp-d8ef3753c3294c2abab093efd2c8751d" style="background-image:url(https://i.ytimg.com/vi/IzQ2siryQrM/maxresdefault.jpg);padding-top:56.25%;"><span class="video-lazy-load-title" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">How Sleep Affects Your Brain</span></span><button data-dcnode-id="1028"><i class="icon-play3" data-dcnode-id="1031"></i><span data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Play</span></span></button></div><span data-dcnode-id="1025" instrument_node="">
</span><h2 data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">Technologies for monitoring sleep</span></h2><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Sleep research has progressed significantly following the introduction of technology that enables the observation and monitoring of brain activity during sleep. This includes positron emission tomography (PET) scanning, functional magnetic resonance imaging (fMRI), and electroencephalogram (EEG).</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">In particular, an EEG can monitor brainwaves throughout sleep, which has revealed that there are different stages of sleep, each of which is characterized by unique brain activity.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><h2 data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Brainwaves in sleep stages</span></h2><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">The different stages of sleep are known as stage 1, stage 2, stage 3, and rapid eye movement (REM) sleep and can be distinguished by the brainwaves in each of these stages.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Stage 1 sleep is the lightest stage of sleep that occurs as an individual is falling asleep. There is a slow movement of the eyes and reduced activity of the voluntary muscles in the body. The brainwaves in stage 1 sleep are smaller and more uniform than in the awake state, which is referred to as alpha and theta waves.</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">In stage 2 sleep, the movement of the eyes ceases and the brainwaves become slower than in stage 1. There are also occasional bursts of waves that are more rapid, which are referred to as sleep spindles.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Stage 3 of sleep is characterized by slow, rhythmical brainwaves called delta waves. This stage of sleep is very heavy with no movement of the eyes or voluntary muscles. Additionally, it is often difficult to wake a person in this stage of sleep.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><div class="related-content-embed" data-dcnode-id="988"><h3 data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Related Stories</span></h3><ul data-dcnode-id="989"><li data-dcnode-id="996"><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news-medical.net/news/20220405/Losing-sleep-over-the-pandemic-Work-flexibility-may-be-a-boon-for-night-owlse28099-health.aspx"><span data-dcnode-id="998" instrument_node="">Losing sleep over the pandemic? Work flexibility may be a boon for night owls’ health</span></a></li><li data-dcnode-id="993"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news-medical.net/news/20220415/New-study-paves-the-way-for-first-drug-treatment-for-sleep-apnea.aspx"><span data-dcnode-id="995" instrument_node="">New study paves the way for first drug treatment for sleep apnea</span></a></li><li data-dcnode-id="990"><a data-dcnode-id="991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.news-medical.net/news/20220318/Developing-an-autonomous-robotic-platform-to-improve-the-quality-of-sleep.aspx"><span data-dcnode-id="992" instrument_node="">Developing an autonomous robotic platform to improve the quality of sleep</span></a></li></ul></div><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">During REM sleep, an individual usually breathes more rapidly and there are quick movements of the eyes that characterize the state. In this stage, the brain activity according to the EEG is very similar to that of a person who is awake, suggesting that there are significant processes taking place in the central nervous system (CNS).</span></p><span data-dcnode-id="985" instrument_node="">
</span><h2 data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">REM brain activity</span></h2><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">It is believed that dreaming occurs for at least 2 hours each night during REM sleep and that this activity plays an important role in the processing of information and the creation of memory. During this stage of sleep, heart rate and blood pressure increase and the activity of the brain is markedly more dynamic.</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Sleep research with EEG monitoring has established that infants spend a greater proportion of their days sleeping (up to 50%) in comparison to adults, thus leading to the hypothesis that brain activity during sleep helps in the development of memory and learning.</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">The signals initiate at the base of the brain, in an area referred to as the pons, and then expand to the thalamus and cerebral cortex. The cerebral cortex is responsible for the processes of learning, thinking, and organizing information.</span></p><span data-dcnode-id="973" instrument_node="">
</span><h2 data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Sleep stage cycles</span></h2><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Over time, an individual progresses through the different stages of sleep, and the activity of the brain changes accordingly. It begins with stage 1 for about 5-10 minutes, followed by stages 2 and 3 for about 10 and 30 minutes, respectively. Finally, the individual will reach REM sleep more than one hour after first falling asleep.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Shortly after, the individual returns to stage 2 sleep, then stage 3 sleep, and will ultimately reach REM sleep once again, with this cycle repeating approximately five times before awakening.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">It is unclear why this cycling through the stages of sleep and continual changes in brain activity is required for the healthy function of humans and other mammals. Further research in this area is currently being undertaken to understand this area more comprehensively, particularly for the function of brain activity.</span></p><span data-dcnode-id="961" instrument_node="">
