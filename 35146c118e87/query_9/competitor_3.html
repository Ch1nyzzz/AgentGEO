</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">UNDERSTANDING THE BRAINWAVES IN NEUROFEEDBACK</span></h2><span data-dcnode-id="3316" instrument_node=""> </span></div><span data-dcnode-id="3314" instrument_node="">
</span></div><span data-dcnode-id="3312" instrument_node="">

</span></div><span data-dcnode-id="3302" instrument_node="">
</span></div><span data-dcnode-id="3300" instrument_node="">
</span><div class="elementor-element elementor-element-bf8aec6 elementor-widget elementor-widget-text-editor" data-dcnode-id="3287" data-element_type="widget" data-id="bf8aec6" data-widget_type="text-editor.default"><span data-dcnode-id="3299" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3291"><span data-dcnode-id="3297" instrument_node="">
</span><p data-dcnode-id="3293"><em data-dcnode-id="3294"><strong data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">Registration of patterns of Brainwaves in Neurofeedback therapy/training is the first step to reveal its dysfunction and to regulate it to achieve the desired brainwave state at will. At the root of all our thoughts, emotions and behavior is the communication between neurons within our brains. Brain activity is changing under the influence of our thoughts, emotions, different disorders, etc. and cause changes in our behavior and health.&nbsp;</span></strong></em></p><span data-dcnode-id="3292" instrument_node=""> </span></div><span data-dcnode-id="3290" instrument_node="">
</span></div><span data-dcnode-id="3288" instrument_node="">
</span></div><span data-dcnode-id="3286" instrument_node="">
</span><section class="elementor-section elementor-inner-section elementor-element elementor-element-3ef61cd elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="2608" data-element_type="section" data-id="3ef61cd"><span data-dcnode-id="3285" instrument_node="">
</span><div class="elementor-container elementor-column-gap-default" data-dcnode-id="2610"><span data-dcnode-id="3284" instrument_node="">
</span><div class="elementor-row" data-dcnode-id="2612"><span data-dcnode-id="3283" instrument_node="">
</span><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-a2fb67c" data-dcnode-id="3237" data-element_type="column" data-id="a2fb67c"><span data-dcnode-id="3282" instrument_node="">
</span><div class="elementor-column-wrap elementor-element-populated" data-dcnode-id="3239"><span data-dcnode-id="3281" instrument_node="">
</span><div class="elementor-widget-wrap" data-dcnode-id="3241"><span data-dcnode-id="3280" instrument_node="">
</span><div class="elementor-element elementor-element-de218a7 elementor-widget elementor-widget-text-editor" data-dcnode-id="3243" data-element_type="widget" data-id="de218a7" data-widget_type="text-editor.default"><span data-dcnode-id="3279" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="3245"><span data-dcnode-id="3278" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="3247"><span data-dcnode-id="3277" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3276" instrument_node="">To fully understand the role of brainwaves in </span><em data-dcnode-id="3273"><strong data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">neurofeedback</span></strong></em><span data-dcnode-id="3272" instrument_node="">, it is necessary to have a </span><em data-dcnode-id="3269"><strong data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">basic understanding of brainwaves</span></strong></em><span data-dcnode-id="3268" instrument_node="">.</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3266" instrument_node="">Neurons communicate with each other through electrochemical signals which can be measured as wave-like patterns </span><em data-dcnode-id="3263"><strong data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">called brainwaves</span></strong></em><span data-dcnode-id="3262" instrument_node="">.&nbsp;They can be measured by </span><em data-dcnode-id="3259"><strong data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">electroencephalography</span></strong></em><span data-dcnode-id="3258" instrument_node=""> (EEG), a non-invasive method of recording electrical activity using sensors attached to the scalp.</span></p><p data-dcnode-id="3251"><span data-dcnode-id="3256" instrument_node="">There are five main patterns of brain waves: </span><em data-dcnode-id="3253"><strong data-dcnode-id="3254"><span data-dcnode-id="3255" instrument_node="">DELTA, THETA, ALPHA, BETA, and GAMMA.</span></strong></em><span data-dcnode-id="3252" instrument_node=""> Each brainwave state corresponds to a different state of awareness.</span></p><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">We normally cycle in and out of these different brainwave states throughout the day and night. All brainwave states are essential but should be experienced appropriately — at certain times and in a certain proportion.</span></p><span data-dcnode-id="3248" instrument_node=""> </span></div><span data-dcnode-id="3246" instrument_node="">
</span></div><span data-dcnode-id="3244" instrument_node="">
</span></div><span data-dcnode-id="3242" instrument_node="">

</span><p data-dcnode-id="2599"><br data-dcnode-id="2603"><span data-dcnode-id="2602" instrument_node="">Brainwave frequencies are measured in Hertz (Hz), meaning cycles per second. The more cycles per second, the greater the Hertz value.</span><br data-dcnode-id="2601"><span data-dcnode-id="2600" instrument_node="">When slower brain waves are dominant we can feel sluggish, inattentive, depressed or dreamy. When higher frequencies abound, we are engaged in critical thinking, hyper-alertness or anxiety, but can also result in nightmares, hyper-vigilance, and impulsive behavior.</span></p><span data-dcnode-id="2598" instrument_node=""> </span></div><span data-dcnode-id="2596" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">ROLE AND TYPES OF BRAINWAVES IN NEUROFEEDBACK </span></h2><span data-dcnode-id="2587" instrument_node=""> </span></div><span data-dcnode-id="2585" instrument_node="">
</span></div><span data-dcnode-id="2583" instrument_node="">
</span><div class="elementor-element elementor-element-c7ccb71 elementor-widget elementor-widget-text-editor" data-dcnode-id="2555" data-element_type="widget" data-id="c7ccb71" data-widget_type="text-editor.default"><span data-dcnode-id="2582" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2559"><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Understanding the brainwaves, its types, variation patterns with its appropriate clinical manifestations is paramount importance to organize effective Neurofeedback training/therapy.</span></p><p data-dcnode-id="2561"><span data-dcnode-id="2577" instrument_node="">Depending on the types of brainwaves in neurofeedback training there are two basic classical directions. It is either focusing on</span><em data-dcnode-id="2573"><strong data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">&nbsp;low frequencies</span></strong><span data-dcnode-id="2574" instrument_node="">&nbsp;</span></em><span data-dcnode-id="2572" instrument_node="">(alpha or theta) brainwaves in neurofeedback to strengthen relaxation and focus or emphasizing on</span><em data-dcnode-id="2569"><strong data-dcnode-id="2570"><span data-dcnode-id="2571" instrument_node="">&nbsp;high frequencies</span></strong></em><span data-dcnode-id="2568" instrument_node=""> (low beta, beta) brainwaves in neurofeedback for reinforcing activation, organizing, and inhibiting distractibility.&nbsp;</span><br data-dcnode-id="2567"><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><em data-dcnode-id="2564"><strong data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Neurofeedback treatment protocols</span></strong></em></a><span data-dcnode-id="2562" instrument_node=""> mainly focus on the alpha, beta, delta, theta, and gamma training/treatment or a combination of them such as alpha/ theta ratio, beta/theta ratio, etc.</span></p><span data-dcnode-id="2560" instrument_node=""> </span></div><span data-dcnode-id="2558" instrument_node="">

</span><p data-dcnode-id="2498"><strong data-dcnode-id="2503"><em data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">Delta Waves</span></em></strong><span data-dcnode-id="2502" instrument_node=""> (1-4 Hz) are slow brainwaves, which begin to appear in stage 3 of the sleep cycle, and by stage 4 dominate almost all EEG activity. &nbsp;At this stage, </span><em data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">healing and regeneration are stimulated</span></em><span data-dcnode-id="2499" instrument_node=""> and are considered essential for the restorative properties of sleep. &nbsp;</span></p><p data-dcnode-id="2488"><em data-dcnode-id="2494"><strong data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">An excess</span></strong><span data-dcnode-id="2495" instrument_node=""> </span></em><span data-dcnode-id="2493" instrument_node="">of delta waves when a person is awake may result in learning disabilities and Attention Deficit Hyperactivity Disorder (ADHD), and make it extremely difficult to focus. &nbsp;It has been found that individuals with various types of brain injuries produce delta waves in waking hours, making it extremely difficult to perform conscious tasks. Sleepwalking and talking tend to occur while delta production is high. See Neurofeedback protocol </span><a data-dcnode-id="2489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><b data-dcnode-id="2490"><i data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">here.</span></i></b></a></p><span data-dcnode-id="2487" instrument_node=""> </span></div><span data-dcnode-id="2485" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2403"><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2423"><em data-dcnode-id="2425"><strong data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Theta waves</span></strong></em><span data-dcnode-id="2424" instrument_node=""> (4-8 Hz) are particularly involved in day-dreaming and sleep. Cortical theta is observed frequently in young children, but in older children and adults, it tends to appear during meditative, drowsy, or sleeping states. In theta, we are in a dream; vivid imagery, intuition and information beyond our normal conscious awareness. It’s where we hold our fears, troubled history, and nightmares. Theta is our gateway to learning, memory, and intuition. In theta, our senses are withdrawn from the external world and focused on signals originating from within.</span></p><p data-dcnode-id="2405"><span data-dcnode-id="2422" instrument_node="">When we are awake, </span><em data-dcnode-id="2419"><strong data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">excess theta levels</span></strong></em><span data-dcnode-id="2418" instrument_node=""> can result in feeling scattered or day-dreamy and is commonly reported in ADHD. </span><em data-dcnode-id="2415"><strong data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Too much theta in the left hemisphere</span></strong></em><span data-dcnode-id="2414" instrument_node=""> is thought to result in lack of organization, whereas </span><em data-dcnode-id="2411"><strong data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">too much theta on the right hemisphere</span></strong></em><span data-dcnode-id="2410" instrument_node=""> results in impulsivity. Theta in people with attention disorders is often seen more towards the front of the brain. See Neurofeedback protocol </span><a data-dcnode-id="2406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><b data-dcnode-id="2407"><i data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">here.</span></i></b></a></p><span data-dcnode-id="2404" instrument_node=""> </span></div><span data-dcnode-id="2402" instrument_node="">

</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="2312"><span data-dcnode-id="2337" instrument_node="">
</span><p data-dcnode-id="2320"><em data-dcnode-id="2334"><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Alpha waves</span></strong></em><span data-dcnode-id="2333" instrument_node=""> (8-12 Hz) dominate during moments of quiet thought, and similar to meditative states. Alpha brain waves are present in deep relaxation and usually when the eyes are closed. It is an </span><em data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">optimal time to program the mind</span></em><span data-dcnode-id="2330" instrument_node=""> for success and it also heightens your imagination, visualization, memory, learning, and concentration. Alpha waves aid overall mental co-ordination, calmness and alertness, mind/body integration and learning. The brain produces consistently higher magnitudes of alpha waves when the brain is in an idle state. This is why alpha is sometimes referred to as the idle brainwave.&nbsp;Some studies claimed that alpha rhythm has two subsets:</span><em data-dcnode-id="2327"><strong data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node=""> lower alpha</span></strong></em><span data-dcnode-id="2326" instrument_node=""> in the range of 8-10 Hz and </span><em data-dcnode-id="2322"><strong data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">upper alpha</span></strong><span data-dcnode-id="2323" instrument_node=""> </span></em><span data-dcnode-id="2321" instrument_node="">in the range of 10-12 Hz.&nbsp;It is believed that lower alpha is related to remembering action in semantic memory which is not the case for high alpha.</span></p><p data-dcnode-id="2314"><span data-dcnode-id="2319" instrument_node="">When the brain is healthy and well regulated, it produces </span><em data-dcnode-id="2316"><strong data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">more alpha waves on the right than on the left side</span></strong></em><span data-dcnode-id="2315" instrument_node="">. The voice of Alpha is your intuition, which becomes clearer and more profound the closer you get to 7.5Hz.</span></p><span data-dcnode-id="2313" instrument_node=""> </span></div><span data-dcnode-id="2311" instrument_node="">

</span><p data-dcnode-id="2260"><span data-dcnode-id="2268" instrument_node="">Alpha rhythm is most prominent in occipital derivations and attenuated by eye-opening.&nbsp;Alpha tends </span><em data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">to be highest in the right hemisphere, and too little alpha in the right hemisphere</span></em><span data-dcnode-id="2265" instrument_node=""> correlates with negative behaviors such as social withdrawal. This is also seen in people with depression, particular with too much alpha frontally. Alpha is involved in active and adequate inhibition of the irrelevant sensory pathways. See Neurofeedback protocol </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/"><b data-dcnode-id="2262"><i data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">here.</span></i></b></a></p><span data-dcnode-id="2259" instrument_node=""> </span></div><span data-dcnode-id="2257" instrument_node="">

</span><p data-dcnode-id="2230"><em data-dcnode-id="2232"><strong data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">Beta waves</span></strong></em><span data-dcnode-id="2231" instrument_node=""> (12-30 Hz) represent our normal waking state of consciousness when attention is directed at cognitive tasks and the outside world. Beta is ‘fast wave‘ activity and dominated when we are alert, attentive and engages in problem-solving, decision making and focussed mental activity.</span></p><p data-dcnode-id="2221"><em data-dcnode-id="2227"><strong data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">Low beta</span></strong></em><span data-dcnode-id="2226" instrument_node=""> or so-called </span><strong data-dcnode-id="2223"><em data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Sensorimotor Rhythm</span></em></strong><span data-dcnode-id="2222" instrument_node=""> (SMR) (12-15 Hz) is thought to be ‘fast idle’, or musing thought. It is reflecting mental alertness, physical relaxation and closely related to readiness for action and attentive listening.&nbsp;</span></p><p data-dcnode-id="2216"><em data-dcnode-id="2218"><strong data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">Beta</span></strong></em><span data-dcnode-id="2217" instrument_node=""> (15-20 Hz) reflects high-engagement and actively figuring things out, thinking, focusing, sustained attention, tension, alertness, excitement.&nbsp;</span></p><p data-dcnode-id="2211"><em data-dcnode-id="2213"><strong data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">High Beta</span></strong></em><span data-dcnode-id="2212" instrument_node=""> (20-30 Hz) is highly complex thought, integrating new experiences, high anxiety or excitement. Continual high-frequency processing is not an efficient way to run our brains, and can result in tension and difficulties relaxing, and if present at night, can result in difficulties settling the mind and falling asleep.</span></p><span data-dcnode-id="2210" instrument_node=""> </span></div><span data-dcnode-id="2208" instrument_node="">

</span><p data-dcnode-id="2161"><span data-dcnode-id="2165" instrument_node="">Beta waves </span><em data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">tend to dominate in the left hemisphere</span></em><span data-dcnode-id="2162" instrument_node="">, and too much beta on the right can be correlated with mania.</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2160" instrument_node="">The brain produces consistently higher magnitudes of beta waves when the brain is externally focused, alert, involved in critical reasoning, thought and concentration. Beta represents the fastest processing speed and when the brain is well regulated, it produces more beta waves on the left than on the right side.</span><br data-dcnode-id="2159"><span data-dcnode-id="2158" instrument_node="">While Beta brain waves are important for effective functioning throughout the day, they also can translate into stress, anxiety, and restlessness. See Neurofeedback protocol </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><b data-dcnode-id="2155"><i data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">here.</span></i></b></a></p><span data-dcnode-id="2152" instrument_node=""> </span></div><span data-dcnode-id="2150" instrument_node="">

</span><p data-dcnode-id="2122"><em data-dcnode-id="2124"><strong data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Gamma brainwaves</span></strong><span data-dcnode-id="2125" instrument_node=""> </span></em><span data-dcnode-id="2123" instrument_node="">(30-100Hz) have the highest frequencies of any brainwave, oscillating between 30 to 100 Hz. They are associated with peak concentration and high levels of cognitive functioning.&nbsp;A synchronous burst of gamma bandwidth has been found during “ah-ha” moments.</span></p><p data-dcnode-id="2112"><em data-dcnode-id="2119"><strong data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">Low levels</span></strong></em><span data-dcnode-id="2118" instrument_node=""> of gamma activity have been linked with learning difficulties, impaired mental processing, and limited memory, while </span><em data-dcnode-id="2114"><strong data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">high gamma</span></strong><span data-dcnode-id="2115" instrument_node=""> </span></em><span data-dcnode-id="2113" instrument_node="">activity is correlated with a high IQ, compassion, excellent memory, and happiness.</span></p><p data-dcnode-id="2106"><span data-dcnode-id="2111" instrument_node="">Gamma brainwaves are currently of limited clinical value, as it is argued that it cannot be effectively measured using current EEG technology, due to muscle contamination. While promising research has suggested that Gamma training can be successfully implemented to enhance intelligence, it will not be of proper clinical use until this issue of technology is resolved. See Neurofeedback protocol </span><a data-dcnode-id="2107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><b data-dcnode-id="2108"><i data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">here.</span></i></b></a></p><span data-dcnode-id="2105" instrument_node=""> </span></div><span data-dcnode-id="2103" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">ELECTROENCEPHALOGRAPHY. ELECTRODE PLACEMENT SYSTEM. REGISTRATION OF BRAINWAVES IN NEUROFEEDBACK</span></h2><span data-dcnode-id="1404" instrument_node=""> </span></div><span data-dcnode-id="1402" instrument_node="">
</span></div><span data-dcnode-id="1400" instrument_node="">
</span><div class="elementor-element elementor-element-40aba20 elementor-widget-divider--view-line elementor-widget elementor-widget-divider" data-dcnode-id="1389" data-element_type="widget" data-id="40aba20" data-widget_type="divider.default"><span data-dcnode-id="1399" instrument_node="">

</span><div class="elementor-element elementor-element-a7254a9 elementor-widget elementor-widget-text-editor" data-dcnode-id="1345" data-element_type="widget" data-id="a7254a9" data-widget_type="text-editor.default"><span data-dcnode-id="1387" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1347"><span data-dcnode-id="1386" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1349"><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1384" instrument_node="">Simply an </span><em data-dcnode-id="1381"><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">electroencephalogram</span></strong></em><span data-dcnode-id="1380" instrument_node=""> (EEG) is the representation of the electrical activity of the brain. The EEG signals are having very low voltage amplitude levels ranging from 1 – 100 microvolts. These are also having very low frequencies ranging from about 1 Hz to 100 Hz as it was described above. ECG equipment amplifies the potentials received from the sensors in hundreds of thousands of times and writes them into the computer’s memory. The EEG waveform differs in their shapes and they show dramatic changes upon of the individual’s state.</span></p><p data-dcnode-id="1351"><span data-dcnode-id="1378" instrument_node="">The location of the electrodes is important when registering EEG, and the electrical activity simultaneously recorded from different points of the head can vary greatly. The most popular scheme used in the placement of electrode for the EEG picks up is the </span><em data-dcnode-id="1375"><strong data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">international 10-20 electrode placement system</span></strong></em><span data-dcnode-id="1374" instrument_node="">. As the cranial area is divided into </span><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/brain-regions-function-in-neurofeedback/" rel="noopener" target="_blank"><span data-dcnode-id="1373" instrument_node="">four main regions</span></a><span data-dcnode-id="1371" instrument_node="">, the electrodes are placed accordingly in the different regions. Main regions of the cranium are </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/brain-regions-function-in-neurofeedback/" rel="noopener" target="_blank"><span data-dcnode-id="1370" instrument_node="">frontal, parietal, temporal and occipital regions</span></a><span data-dcnode-id="1368" instrument_node="">. The electrodes placed in each region are denoted as </span><strong data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">F</span></strong><span data-dcnode-id="1365" instrument_node=""> (Frontal), </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">P</span></strong><span data-dcnode-id="1362" instrument_node=""> (Parietal), </span><strong data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">T</span></strong><span data-dcnode-id="1359" instrument_node=""> (Temporal) and </span><strong data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">O</span></strong><span data-dcnode-id="1356" instrument_node=""> (Occipital). Odd/even numbers are associated with the left/right side of the brain region. In this set up the head is mapped by four standard points. They are </span><em data-dcnode-id="1353"><strong data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">nasion, inion and left and right ears</span></strong></em><span data-dcnode-id="1352" instrument_node="">. The letter z is used as Pz suggests that scalp location falls along the central line running between the nasion and the inion.&nbsp;Fp1 and Fp2 are respectively related to the left and right poles of the forehead.</span></p><span data-dcnode-id="1350" instrument_node=""> </span></div><span data-dcnode-id="1348" instrument_node="">
</span></div><span data-dcnode-id="1346" instrument_node="">

</span><section class="elementor-section elementor-inner-section elementor-element elementor-element-3a60133 elementor-section-boxed elementor-section-height-default elementor-section-height-default" data-dcnode-id="1263" data-element_type="section" data-id="3a60133"><span data-dcnode-id="1343" instrument_node="">

</span><div class="elementor-widget-container" data-dcnode-id="1300"><span data-dcnode-id="1336" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="1302"><span data-dcnode-id="1335" instrument_node="">
</span><h3 data-dcnode-id="1331"><em data-dcnode-id="1332"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">10-20 electrode placement system</span></strong></em></h3><p data-dcnode-id="1322"><span data-dcnode-id="1330" instrument_node="">In 10-20 electrode placement system, we use 20 electrodes. One electrode is used for </span><em data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">grounding</span></em><span data-dcnode-id="1327" instrument_node=""> the subject. When recording EEG using two main methods of electrode application: </span><em data-dcnode-id="1324"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">bipolar and unipolar</span></strong></em><span data-dcnode-id="1323" instrument_node="">.</span></p><p data-dcnode-id="1314"><em data-dcnode-id="1319"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">In a unipolar arrangement</span></strong></em><span data-dcnode-id="1318" instrument_node="">, one of the electrodes is located at a point that is conventionally considered </span><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">electrically neutral</span></em><span data-dcnode-id="1315" instrument_node=""> (left/right earlobes (respectively A1/A2), nose bridge) and takes as common to all channels. In a unipolar recording, the ECG reflects the activity one of the points/leads relatively to electrically neutral point/leads (for example, the activity of the frontal or occipital leads relatively to the earlobe). So to measure the bioelectric potential from the brain, we use any one of the nineteen electrodes and, the common electrode.</span></p><p data-dcnode-id="1306"><em data-dcnode-id="1311"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">In a bipolar system,</span></strong></em><span data-dcnode-id="1310" instrument_node=""> both electrodes are placed in </span><em data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">electrically active points</span></em><span data-dcnode-id="1307" instrument_node=""> of the scalp and any of the two electrodes is used for the measurement. In the bipolar recording, an EEG record reflects the result of the interaction of two electrically active points (for example, frontal and occipital leads).</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">The choice of one or another variant of recording depends on the objectives of the study. In research practice, the unipolar registration option is more widely used, since it allows studying the isolated contribution of a particular brain area to the studying process.</span></p><span data-dcnode-id="1303" instrument_node=""> </span></div><span data-dcnode-id="1301" instrument_node="">

</span><div class="elementor-column elementor-col-50 elementor-inner-column elementor-element elementor-element-31f1970" data-dcnode-id="1269" data-element_type="column" data-id="31f1970"><span data-dcnode-id="1290" instrument_node="">

</span><h2 class="elementor-heading-title elementor-size-default" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">BRAINWAVES IN NEUROFEEDBACK. MEDICAL AND NON-MEDICAL APPLICATION OF NEUROFEEDBACK</span></h2><span data-dcnode-id="825" instrument_node=""> </span></div><span data-dcnode-id="823" instrument_node="">
</span></div><span data-dcnode-id="821" instrument_node="">
</span><div class="elementor-element elementor-element-3847308 elementor-widget-divider--view-line elementor-widget elementor-widget-divider" data-dcnode-id="810" data-element_type="widget" data-id="3847308" data-widget_type="divider.default"><span data-dcnode-id="820" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="812"><span data-dcnode-id="819" instrument_node="">
</span><div class="elementor-divider" data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">
</span><span class="elementor-divider-separator" data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">
</span></span><span data-dcnode-id="815" instrument_node="">
</span></div><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">
</span><div class="elementor-element elementor-element-eb3316f elementor-widget elementor-widget-text-editor" data-dcnode-id="713" data-element_type="widget" data-id="eb3316f" data-widget_type="text-editor.default"><span data-dcnode-id="808" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="715"><span data-dcnode-id="807" instrument_node="">
</span><div class="elementor-text-editor elementor-clearfix" data-dcnode-id="717"><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="805" instrument_node="">The brain typically uses cues from the environment to regulate above described brainwave patterns. Yet overly dominant or other dysfunctional patterns may produce brainwave dysregulation and accompanying behavioral problems. Brainwave dysregulation is detected through indications of abnormal brainwave ratios as measured by EEG equipment.</span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><em data-dcnode-id="802"><strong data-dcnode-id="803"><span data-dcnode-id="804" instrument_node=""> Neurofeedback</span></strong></em></a><span data-dcnode-id="800" instrument_node=""> is a form of biofeedback that allows individuals to change deregulated brainwave rhythms.</span></p><p data-dcnode-id="778"><span data-dcnode-id="798" instrument_node="">Neurofeedback teaches you to consciously control your brain waves to achieve the desired brainwave state at will. Neurofeedback is used </span><em data-dcnode-id="795"><strong data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">for both medical and non-medical uses</span></strong></em><span data-dcnode-id="794" instrument_node="">, and the dividing line between them may be thin. </span><em data-dcnode-id="791"><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Non-medical application of neurofeedback</span></strong></em><span data-dcnode-id="790" instrument_node=""> can be considered primarily as personal improvement and conditioning for the brain and mind: to improve relaxation, attention, focus, concentration, and self-awareness, or as an adjunct to meditation, counseling, hypnosis, or achieving altered states of consciousness. It can be done </span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">without professional intervention</span></em><span data-dcnode-id="787" instrument_node="">. In cases where it is desired </span><em data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">to relieve the conditions of a medical problem</span></em><span data-dcnode-id="784" instrument_node="">, professional help should be sought. Detailed information regarding </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><em data-dcnode-id="781"><strong data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">indications for neurofeedback use</span></strong></em></a><span data-dcnode-id="779" instrument_node=""> and method for peak performance and for treatment of different disorders you can find in this website in the appropriate pages.</span></p><p data-dcnode-id="767"><span data-dcnode-id="777" instrument_node="">It is a fact that Neurofeedback systems are designed to allow the user to control a computer for recreational, educational, or entertainment purposes are not a medical instrument. You can find detailed information regarding indications, methods, and descriptions of different </span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/biofeedback-neurofeedback-home-use-device/" rel="noopener" target="_blank"><em data-dcnode-id="774"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">neurofeedback devices for home us</span></strong></em><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">e</span></strong><strong data-dcnode-id="770"><span data-dcnode-id="771" instrument_node=""> here</span></strong></a><span data-dcnode-id="768" instrument_node="">.</span></p><p data-dcnode-id="753"><span data-dcnode-id="766" instrument_node="">However, if direct benefits are claimed for relaxation or </span><em data-dcnode-id="763"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">relief from the symptoms</span></strong></em><span data-dcnode-id="762" instrument_node=""> of disorders, then the device is considered medical.</span><br data-dcnode-id="761"><b data-dcnode-id="758"><i data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">In the nonclinical embodiment,</span></i></b><span data-dcnode-id="757" instrument_node=""> most of the same functions and capabilities are present, but they are presented in the context of an educational and recreational device. It is nonetheless true that the actual benefits may be essentially the same in both embodiments depending on how the user configures and applies the device, although the labeling and claims are different. </span><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">The same instrument is being provided in both cases, but with different intent.</span></em><span data-dcnode-id="754" instrument_node="">&nbsp;</span></p><h4 data-dcnode-id="749"><b data-dcnode-id="750"><i data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Clearly, the difference lies primarily in the claims, and in the expectations and applications of the user.</span></i></b></h4><p data-dcnode-id="743"><span data-dcnode-id="748" instrument_node="">For example, although neurofeedback can be used to improve attention and concentration, and this can be considered as a personal improvement application, in cases of suspected or diagnosed Attention Deficit Disorders (ADD), the use of this procedure might be regarded as a medical procedure. It may thus be argued that neurofeedback treatment intended to reduce the symptoms of ADD, especially when the removal from stimulants (Ritalin, etc) is desired, that neurofeedback is being used in a medical context. However, </span><b data-dcnode-id="745"><i data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">if a parent, teacher, or counselor uses neurofeedback in a home or educational setting to educate a child on how to reach a state of relaxed attentiveness, that the treatment may be considered education, not treatment</span></i></b><span data-dcnode-id="744" instrument_node="">.</span></p><p data-dcnode-id="719"><span data-dcnode-id="742" instrument_node="">Neurofeedback takes advantage of </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neuroplasticity-and-neurofeedback/" rel="noopener" target="_blank"><em data-dcnode-id="738"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">the brain’s ability to change itself</span></strong><span data-dcnode-id="739" instrument_node=""> </span></em></a><span data-dcnode-id="736" instrument_node="">through a process known as </span><a data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neuroplasticity-and-neurofeedback/" rel="noopener" target="_blank"><em data-dcnode-id="733"><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Neuroplasticity</span></strong></em></a><span data-dcnode-id="731" instrument_node="">. It utilizes the same learning process that occurs whenever we acquire a new skill. The brain learns by forming connections between nerve cells and utilizing important pathways that connect different locations in the brain. </span><b data-dcnode-id="728"><i data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The more frequently you utilize these pathways the better the brain becomes at performing the associated task.</span></i></b><span data-dcnode-id="727" instrument_node=""> This type of leaning is a type in which responses come to be controlled by their consequences. Quite simply, Neurofeedback offers the perfect learning conditions, since it facilitates awareness of when the brain is producing healthier brainwave patterns, provides reinforcement for the positive change and multiple opportunities to provide practice during a training session.&nbsp;More detailed information regarding </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//biofeedback-neurofeedback-therapy.com/neurofeedback-therapy-training/" rel="noopener" target="_blank"><em data-dcnode-id="723"><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">the type of neurofeedback training</span></strong><span data-dcnode-id="724" instrument_node=""> </span></em><span data-dcnode-id="722" instrument_node="">you can find here</span></a><span data-dcnode-id="720" instrument_node="">.</span></p><span data-dcnode-id="718" instrument_node=""> </span></div><span data-dcnode-id="716" instrument_node="">
