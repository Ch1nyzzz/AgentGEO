r extended periods (Zadra </span><a aria-label="Reference 2001" data-dcnode-id="4812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR161" id="ref-link-section-d104911213e1657" title="Zadra, A. L. (2001). Recurrent dreams: Their relation to life events. In D. Barrett (Ed.), Trauma and dreams (pp. 231–247). Cambridge, MA: Harvard University Press."><span data-dcnode-id="4813" instrument_node="">2001</span></a><span data-dcnode-id="4811" instrument_node="">). This does not mean that they are representative of a majority of dreams—rather, these dreams are particularly memorable and often emotionally intense.</span></p><p data-dcnode-id="4805"><span data-dcnode-id="4809" instrument_node="">Some typical dream themes can be explained with reference to ongoing concerns—examples would be dreams of examinations, school, and so on. Others are striking for their body-related themes such as flying, falling, or fleeing from a pursuer. The dream most people report having experienced at some point in their lives is the dream of being chased. Often, this is associated with the feeling of being unable to move or to fully control one’s movements. Again, it seems plausible to associate these feelings of incomplete control over bodily movements to paralysis of the physical body (Schönhammer </span><a aria-label="Reference 2005" data-dcnode-id="4807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d104911213e1663" title="Schönhammer, R. (2005). ’Typical dreams’: Reflections of arousal. Journal of Consciousness Studies, 12(4–5), 18–37."><span data-dcnode-id="4808" instrument_node="">2005</span></a><span data-dcnode-id="4806" instrument_node="">).</span></p><p data-dcnode-id="4803"><span data-dcnode-id="4804" instrument_node="">Such examples, though rare, may help alert us to more pervasive patterns underlying dream formation. For example, experienced inability to move is not exclusively associated with chase dreams, but might also occur in dreams of hurrying toward a departing train, but failing to make the desired progress—and so on. All of these cases would be attempts to make sense of the perceived inactivity of the physical body in sleep. Their narrative form would be additionally constrained by the individual’s personal concerns and past experiences. And where these past experiences include emotionally intense dreams—such as the chase dreams—this might create bias toward future repetition. Once a given interpretation is available, it will likely be reused in future cases. And again, we might expect that such experiences not only result from own-body perception, but might also leave their mark on the sleeping body—for instance by causing organized twitching activity in concordance with attempted dream movement. Consider the following example:</span></p><blockquote class="c-blockquote" data-dcnode-id="4794"><div class="c-blockquote__body" data-dcnode-id="4795"><span data-dcnode-id="4802" instrument_node="">
</span><p data-dcnode-id="4797"><span data-dcnode-id="4801" instrument_node="">In my dream, I was sitting on the pinnacle of a high tower. I was beginning to feel dizzy and tried to climb down, but couldn’t find any secure point to place my foot. “I will have to jump,” I thought, and attempted a jumping movement towards the interior of the tower. But I sat as if spellbound, unable to execute the leg movement. I then dreamt that a figure (whose looks I was vaguely conscious of) was threatening to pull me from behind into the abyss beneath the tower. The sense of exertion was escalating to the point of desperation, and suddenly I managed to jump. At that moment, I awoke, because I had hurled both legs so violently that I kicked away my blanket. (Jezower </span><a aria-label="Reference 1928" data-dcnode-id="4799" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d104911213e1673" title="Jezower, I. (1928/1985). Das Buch der Träume. Frankfurt: Ullstein."><span data-dcnode-id="4800" instrument_node="">1928</span></a><span data-dcnode-id="4798" instrument_node="">/1985, pp.&nbsp;306–307; translation mine)</span></p><span data-dcnode-id="4796" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4792"><span data-dcnode-id="4793" instrument_node="">As a final example, I wish to discuss movement sensations in dreams arising in the absence of corresponding outward movement. These might seem to present a problem for the idea that the sleeping body informs dream experience, because they involve strong discordance between the physical body and bodily experience. In fact, these cases of discordance are exactly the ones that puzzled Bradley. Here, I will suggest that even in these seemingly difficult cases, a body-based explanation is available. These cases of dream movement in the absence of corresponding outward whole-body movement also complement and extend my earlier discussion of typical dream themes: often, in these dreams, there will still be the experience of movement, even if this movement feels strained and effortful, as in the chase dream. But this means that appealing to the tendency of REM sleep paralysis to become reflected on the level of dream content offers only a partial account.</span></p><p data-dcnode-id="4784"><span data-dcnode-id="4791" instrument_node="">A good example of seeming discordance are whole-body movements in dreams involving strong vestibular sensations, such as flying and falling. To see how dreams involving such sensations in the absence of outward movement might nonetheless profit from a body-based explanation, it is instructive to first consider a predictive processing account of out-of-body experiences (OBEs) (see Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="4789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1681" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4790" instrument_node="">2013</span></a><span data-dcnode-id="4788" instrument_node="">). OBEs involve the feeling of having moved outside of one’s physical body plus, in many cases, the experience of seeing one’s body from an elevated perspective. Schwabe and Blanke (</span><a aria-label="Reference 2008" data-dcnode-id="4786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d104911213e1684" title="Schwabe, L., &amp; Blanke, O. (2008). The vestibular component in out-of-body experiences: A computational approach. Frontiers in Human Neuroscience, 2, 17."><span data-dcnode-id="4787" instrument_node="">2008</span></a><span data-dcnode-id="4785" instrument_node="">) propose that the feeling of having left the body can be traced to an inherent ambiguity in vestibular signals. The vestibular otoliths in the inner ear are sensitive to horizontal, vertical, and semicircular movement but do not distinguish between gravity and acceleration. In consequence, these vestibular signals are inherently ambiguous between lying down in a supine, stationary position and accelerating forward in an upright position. This ambiguity may result in illusory changes in self-location and the feeling of moving out of one’s body, even though the physical body is in fact lying stationary in bed. The explanation starts from the assumption that we have a prior, top-down expectation for moving through the world in an upright position. This prior creates bias towards interpreting ambiguous signals from the otoliths as indicating upright whole-body movement. And while we can normally resolve this ambiguity through contextual cues, under certain conditions—for instance under extreme stress or trauma, or in the vicinity of sleep—we may be pushed towards misinterpretation. At sleep onset, where we typically retain some awareness that we are lying still in bed, this may take the specific form of moving outside of the body, as in classical OBEs.</span></p><p data-dcnode-id="4779"><span data-dcnode-id="4783" instrument_node="">We can now extend this account of OBEs to explain movement sensations and upright orientation in dreams more generally. Aside from ambiguous vestibular stimuli from the otoliths, further factors may create bias towards expecting movement over rest. These include the attenuation of tactile sensations and sensations of pressure, for instance from the bedsheets, as well as dynamic visual imagery. Where at sleep onset, this can lead to feelings of having left the body, in full-fledged sleep-dreams, in which we are typically unaware of lying asleep in bed, this may be reflected more generally in whole-body movement. Recall that movement sensations are among the most frequent types of dream sensation, second only to visual imagery. Though strong vestibular sensations of flying or falling occur in only about 8% of dream reports (Hobson </span><a aria-label="Reference 1988" data-dcnode-id="4781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d104911213e1690" title="Hobson, J. A. (1988). The dreaming brain. New York: Basic Books."><span data-dcnode-id="4782" instrument_node="">1988</span></a><span data-dcnode-id="4780" instrument_node="">), sensations of whole-body movement, such as walking or running, clearly still have a vestibular element. Vestibular signals, coupled with a natural bias for expecting upright forward movement, might therefore be an important factor shaping these types of dream experience.</span></p><p data-dcnode-id="4765"><span data-dcnode-id="4778" instrument_node="">The idea that vestibular signals can provide a unified account of OBEs and movement in dreams is supported by the finding that patients with vestibular damage frequently report OBEs (Blanke and Mohr </span><a aria-label="Reference 2005" data-dcnode-id="4776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d104911213e1697" title="Blanke, O., &amp; Mohr, C. (2005). Out-of-body experience, heautoscopy, and autoscopic hallucination of neurological origin: Implications for neurocognitive mechanisms of corporeal awareness and self-consciousness. Brain Research Reviews, 50(1), 184–199."><span data-dcnode-id="4777" instrument_node="">2005</span></a><span data-dcnode-id="4775" instrument_node="">); they also report more frequent vestibular sensations in dreams than healthy controls (Doneshka and Kehaiyov </span><a aria-label="Reference 1977" data-dcnode-id="4773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d104911213e1700" title="Doneshka, P., &amp; Kehaiyov, A. (1977). Some peculiarities of the dreams of patients with vestibular diseases. Acta Medica Iugoslavica, 32(1), 45–50."><span data-dcnode-id="4774" instrument_node="">1977</span></a><span data-dcnode-id="4772" instrument_node="">). Kaliuzhna et al. (</span><a aria-label="Reference 2015" data-dcnode-id="4770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d104911213e1703" title="Kaliuzhna, M., Vibert, D., Grivaz, P., &amp; Blanke, O. (2015). Out-of-body experiences and other complex dissociation experiences in a patient with unilateral peripheral vestibular damage and deficient multisensory integration. Multisensory Research, 28(5–6), 613–635."><span data-dcnode-id="4771" instrument_node="">2015</span></a><span data-dcnode-id="4769" instrument_node="">) report a case study of a patient with unilateral peripheral vestibular damage who frequently experienced OBEs as well as lucid dreams. This is telling, because lucid dreams have been proposed to be associated both with OBEs and with vestibular sensations such as flying (Blackmore </span><a aria-label="Reference 1988" data-dcnode-id="4767" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d104911213e1706" title="Blackmore, S. (1988). A theory of lucid dreams and OBEs. In J. Gackenbach &amp; S. LaBerge (Eds.), Conscious mind, sleeping brain: Perspectives on lucid dreaming (pp. 373–387). New York: Plenum Press."><span data-dcnode-id="4768" instrument_node="">1988</span></a><span data-dcnode-id="4766" instrument_node="">).</span></p><p data-dcnode-id="4763"><span data-dcnode-id="4764" instrument_node="">In sum, whole-body movement sensations in dreams that are seemingly discordant with the outward inertia of the physical body can be re-described as the outcome of bodily self-sampling gone awry. This misinterpretation is facilitated by the specific conditions of sleep, including reduced sensitivity to bodily and environmental stimuli, ambiguous vestibular signaling, and top-down, prior expectations. While there is strong discordance between experienced whole-body movement and outward inertia, it would not be completely correct to say that here, bodily experience was arising independently of real-body influences. Movement sensations in dreams in the absence of outward movement are just the other side of weak phenomenal-functional embodiment. They result when the progressive loss of bodily and environmental signals becomes reflected on the level of dream content. Paradoxically, periods of outward inertia may thus facilitate dreams of whole body movement.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4761" id="Sec11"><span data-dcnode-id="4762" instrument_node="">From self-sampling to world simulation in dreaming and wakefulness</span></h3><p data-dcnode-id="4750"><span data-dcnode-id="4760" instrument_node="">If body representations in dreams and movement sensations in particular are an attempt to make sense of one’s current sensory and proprioceptive inputs, including those from self-generated muscular activity, it seems natural to think that this account can be extended to the experience of the dream world more generally. At least in some cases, the dream world, including events, objects, and characters in it, might then partially result from an attempt to create a larger, coherent context for the types of movements and actions one is currently experiencing. In this final section, I discuss some possible examples in which the account presented so far might be extended to world simulation in dreams. I also identify points of contact to predictive processing accounts of the bodily self in wakefulness. This is the most speculative part of my account so far, and I don’t mean to suggest that even a more fully developed account could tell the whole story about dream imagery generation. Any full theory of dreaming will have to have a richly cognitive flavor as well.</span><sup data-dcnode-id="4755"><a data-dcnode-id="4756" href="#Fn18"><span class="u-visually-hidden" data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Footnote </span></span><span data-dcnode-id="4757" instrument_node="">18</span></a></sup><span data-dcnode-id="4754" instrument_node=""> Many additional factors, such as memory, emotions, personal concerns and long-standing expectations, as well as visuospatial imagery abilities (Domhoff </span><a aria-label="Reference 2013" data-dcnode-id="4752" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d104911213e1729" title="Domhoff, G. W. (2013). Finding meaning in dreams: A quantitative approach. Berlin: Springer."><span data-dcnode-id="4753" instrument_node="">2013</span></a><span data-dcnode-id="4751" instrument_node="">) would have to be taken into account.</span></p><p data-dcnode-id="4748"><span data-dcnode-id="4749" instrument_node="">Keeping these qualifications in mind, I do think there is room for an alternative story, in which cognitive constraints on dream formation are paralleled by influences more closely linked to the physical body. Often there will be a highly dynamic interplay between these cognitive and real-body factors, with different factors taking the lead at different times. Here, I will propose that at least in some cases, we can link not just bodily experiences in dreams, but other types of dream imagery to the sleeping, physical body. These cases, in which real-body influences extend beyond the dream self and leak into the dream world, are genuinely surprising. Even if they are rare, and even if they tell only part of the story, this story is substantively different from the currently dominant cranial envatment view of dreaming. Again, predictive processing accounts elegantly lend themselves to this type of story, in which lower-level bodily factors and higher-level expectations and beliefs intricately interact to shape dream experience.</span></p><p data-dcnode-id="4740"><span data-dcnode-id="4747" instrument_node="">To begin&nbsp;to see how real-body stimuli might leak into the dream world, consider that self-other distinctions, or distinctions between the dream self and non-self characters, are often fluid in dreams. As noted earlier, real-body inputs, for instance from limb jerks at sleep onset or following blood-pressure-cuff stimulation to the leg, can be externalized to non-self dream characters (Sect.&nbsp;</span><a data-dcnode-id="4745" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="4746" instrument_node="">3.2</span></a><span data-dcnode-id="4744" instrument_node="">). This externalization may be facilitated by the fact that in REM sleep, self-generated movements, such as muscle twitching and limb jerks, are processed as if they had been externally produced (Tiriac et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR142" id="ref-link-section-d104911213e1741" title="Tiriac, A., Del Rio-Bermudez, C., &amp; Blumberg, M. S. (2014). Self-generated movements with “unexpected” sensory consequences. Current Biology, 24(18), 2136–2141."><span data-dcnode-id="4743" instrument_node="">2014</span></a><span data-dcnode-id="4741" instrument_node="">). Because sensory attenuation fails, the related dream sensations don’t seem to be quite our own—and under certain conditions, they are projected to a dream character experienced as distinct from the self.</span></p><p data-dcnode-id="4735"><span data-dcnode-id="4739" instrument_node="">While such cases of straightforward externalization of a clearly identifiable stimulus—as in the blood-pressure-cuff study—to a non-self dream character are rare, they do fit in nicely with the importance of social imagery in dreams. Social imagery is in fact so central to dreaming that it is already present in its preliminary stages at sleep onset. Even as we still have the experience of lying in bed and slowly drifting off to sleep, and even before we have placed ourselves at the center of a dream world, we are already experiencing social imagery. Sleep onset imagery can involve faces, often appearing seemingly out of nowhere (Mavromatis </span><a aria-label="Reference 1987" data-dcnode-id="4737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d104911213e1747" title="Mavromatis, A. (1987). Hypnagogia: The unique state of consciousness between wakefulness and sleep. London: Routledge."><span data-dcnode-id="4738" instrument_node="">1987</span></a><span data-dcnode-id="4736" instrument_node="">). It can also involve, as in sleep paralysis nightmares, the experience of an intruder or an attacker.</span></p><p data-dcnode-id="4718"><span data-dcnode-id="4734" instrument_node="">Social imagery can also take an even more basic form. The simplest form of social imagery, again frequent at sleep onset, is the feeling of a presence. Subjectively, there is the robust sense of an agent being located at a particular position in the room, at a particular distance from the bed—even though this presence is not seen or heard. Felt presence can be independent of modality-specific (e.g. visual or auditory) imagery, but subjectively, it still has a distinct spatial quality (Cheyne and Girard </span><a aria-label="Reference 2007a" data-dcnode-id="4732" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d104911213e1754" title="Cheyne, J. A., &amp; Girard, T. A. (2007a). Paranoid delusions and threatening hallucinations: A prospective study of sleep paralysis experiences. Consciousness and Cognition, 16(4), 959–974."><span data-dcnode-id="4733" instrument_node="">2007a</span></a><span data-dcnode-id="4731" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4729" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d104911213e1757" title="Cheyne, J. A., &amp; Girard, T. A. (2007b). The nature and varieties of felt presence experiences: A reply to Nielsen. Consciousness and Cognition, 16(4), 984–991."><span data-dcnode-id="4730" instrument_node="">b</span></a><span data-dcnode-id="4728" instrument_node="">; Nielsen </span><a aria-label="Reference 2007" data-dcnode-id="4726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d104911213e1760" title="Nielsen, T. A. (2007). Felt presence: Paranoid delusion or hallucinatory social imagery? Consciousness and Cognition, 16(4), 975–983."><span data-dcnode-id="4727" instrument_node="">2007</span></a><span data-dcnode-id="4725" instrument_node="">). Nielsen (</span><a aria-label="Reference 2007" data-dcnode-id="4723" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d104911213e1763" title="Nielsen, T. A. (2007). Felt presence: Paranoid delusion or hallucinatory social imagery? Consciousness and Cognition, 16(4), 975–983."><span data-dcnode-id="4724" instrument_node="">2007</span></a><span data-dcnode-id="4722" instrument_node="">) has even suggested that felt presence involves hallucinations of a purely spatial nature. Yet felt presence also has a distinctly agentive character involving intentions towards the dreamer that are often but not always threatening. For now, it is interesting to note that spatiotemporal imagery thus seems central both to the simplest kind of social imagery and the simplest kind of self-experience. In minimally immersive dreams, this takes the form of spatiotemporal self-location; in felt presence, there is the experience of a non-self agent located relative to the self. A compelling idea is that non-self dream characters and felt presences are shadow bodies (Arzy et&nbsp;al. </span><a aria-label="Reference 2006" data-dcnode-id="4720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d104911213e1766" title="Arzy, S., Seeck, M., Ortigue, S., Spinelli, L., &amp; Blanke, O. (2006). Induction of an illusory shadow person. Nature, 443(7109), 287–287."><span data-dcnode-id="4721" instrument_node="">2006</span></a><span data-dcnode-id="4719" instrument_node="">): they are informed by own-body perception erroneously projected to another than oneself.</span></p><blockquote class="c-blockquote" data-dcnode-id="4709"><div class="c-blockquote__body" data-dcnode-id="4710"><span data-dcnode-id="4717" instrument_node="">
</span><p data-dcnode-id="4712"><span data-dcnode-id="4716" instrument_node="">Someone in front of me is doubled over toward me, praying. Someone else reaches around from behind this person and quickly lifts him into an upright position. At the same time I feel my head nodding slightly forward and it awakens me. (Nielsen </span><a aria-label="Reference 1992" data-dcnode-id="4714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e1774" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="4715" instrument_node="">1992</span></a><span data-dcnode-id="4713" instrument_node="">,&nbsp;p.&nbsp;360)</span></p><span data-dcnode-id="4711" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4707"><span data-dcnode-id="4708" instrument_node="">In other cases, this externalization appears to be corrected: what starts out as being a movement observed in another dream character is transformed into a movement experienced by the dream self.</span></p><blockquote class="c-blockquote" data-dcnode-id="4698"><div class="c-blockquote__body" data-dcnode-id="4699"><span data-dcnode-id="4706" instrument_node="">
</span><p data-dcnode-id="4701"><span data-dcnode-id="4705" instrument_node="">I am watching someone else walking. Then it is as if I was walking and I find myself about to start quickly up some stairs. I awaken with a very strong leg jerk. (Nielsen </span><a aria-label="Reference 1992" data-dcnode-id="4703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e1783" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="4704" instrument_node="">1992</span></a><span data-dcnode-id="4702" instrument_node="">,&nbsp;p.&nbsp;360)</span></p><span data-dcnode-id="4700" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4696"><span data-dcnode-id="4697" instrument_node="">If some aspects of social imagery and transitions in self-identification towards non-self dream characters can indeed be linked to own-body perception, we might even take this further by saying that instances in which the dreamer identifies with a particular dream character—and in which the dream comes to be centered on a dream self—are just special cases of social imagery in dreams. Tellingly, the dream character with which the dreamer identifies can also shift throughout the dream.</span></p><blockquote class="c-blockquote" data-dcnode-id="4687"><div class="c-blockquote__body" data-dcnode-id="4688"><span data-dcnode-id="4695" instrument_node="">
</span><p data-dcnode-id="4690"><span data-dcnode-id="4694" instrument_node="">The person in the dream that so far had been me, now was suddenly my classmate J. Somehow I became (physically) detached from myself and I noticed that I was not me but him. This was accompanied by a funny feeling. (Revonsuo </span><a aria-label="Reference 2005" data-dcnode-id="4692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d104911213e1792" title="Revonsuo, A. (2005). The self in dreams. In T. E. Feinberg &amp; J. P. Keenan (Eds.), The lost self: Pathologies of the brain and identity (pp. 206–219). Oxford: Oxford University Press."><span data-dcnode-id="4693" instrument_node="">2005</span></a><span data-dcnode-id="4691" instrument_node="">,&nbsp;p. 213f)</span></p><span data-dcnode-id="4689" instrument_node="">
</span></div></blockquote><span data-dcnode-id="4686" instrument_node="">
</span><p data-dcnode-id="4681"><span data-dcnode-id="4685" instrument_node="">In the current theory, such shifts in self-identification are related to shifts in spatiotemporal self-location, possibly triggered by vestibular sensations. They also bear clear similarity to full-body illusions in wakefulness, in which multisensory conflict is used to induce shifts in self-location towards and self-identification with an avatar (Lenggenhager et&nbsp;al. </span><a aria-label="Reference 2007" data-dcnode-id="4683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d104911213e1800" title="Lenggenhager, B., Tadi, T., Metzinger, T., &amp; Blanke, O. (2007). Video ergo sum: Manipulating bodily self-consciousness. Science, 317(5841), 1096–1099."><span data-dcnode-id="4684" instrument_node="">2007</span></a><span data-dcnode-id="4682" instrument_node="">).</span></p><p data-dcnode-id="4679"><span data-dcnode-id="4680" instrument_node="">In predictive processing terms, we can now explain what seem to be two central characteristics of phenomenal selfhood and experienced self-other distinctions, both in dreams and in wakefulness. The first is the stability of the immersive structure of experience: the fact that both in dreams and in wakefulness, there is a consistent feeling of presence of a single self in a world. The second is the inherent fragility of (bodily) self-experience and the ease with which it can be decoupled from the physical body, including its actual location.</span></p><p data-dcnode-id="4659"><span data-dcnode-id="4678" instrument_node="">One of the most basic, deep-seated prior expectations any organism should have is to predict its own existence (for a general discussion of self-representation in the context of predictive processing, see Hohwy and Michael in press; see also Limanowski and Blankenburg </span><a aria-label="Reference 2013" data-dcnode-id="4676" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d104911213e1809" title="Limanowski, J., &amp; Blankenburg, F. (2013). Minimal self-models and the free energy principle. Frontiers in Human Neuroscience, 7, 547."><span data-dcnode-id="4677" instrument_node="">2013</span></a><span data-dcnode-id="4675" instrument_node="">; Apps and Tsakiris </span><a aria-label="Reference 2014" data-dcnode-id="4673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d104911213e1812" title="Apps, M. A., &amp; Tsakiris, M. (2014). The free-energy self: A predictive coding account of self-recognition. Neuroscience &amp; Biobehavioral Reviews, 41, 85–97."><span data-dcnode-id="4674" instrument_node="">2014</span></a><span data-dcnode-id="4672" instrument_node="">): at any given moment, there should not only be a self, but there should also be no more than a single self.</span><sup data-dcnode-id="4667"><a data-dcnode-id="4668" href="#Fn19"><span class="u-visually-hidden" data-dcnode-id="4670"><span data-dcnode-id="4671" instrument_node="">Footnote </span></span><span data-dcnode-id="4669" instrument_node="">19</span></a></sup><span data-dcnode-id="4666" instrument_node=""> This is a condition of possibility for embodied engagement with the world and active inference. But because both the body and the self are just hidden causes of sensory input and are inferred or modelled rather than known directly (Hohwy and Michael in press), what is experienced as the self can under certain conditions be decoupled from the physical body. What we experience as our body might simply be the maximally invariant input source detected at any given moment (Metzinger </span><a aria-label="Reference 2013" data-dcnode-id="4664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d104911213e1827" title="Metzinger, T. K. (2013). Why are dreams interesting for philosophers? The example of minimal phenomenal selfhood, plus an agenda for future research. Frontiers in Psychology, 4, 746."><span data-dcnode-id="4665" instrument_node="">2013</span></a><span data-dcnode-id="4663" instrument_node="">). In standard wake states, this is the physical body, but under conditions of weak-phenomenal-functional embodiment, as in dreams—or under specific laboratory situations, as in full-body illusions or virtual reality—we might expect sudden shifts in self-location or self-identification as well as nonstandard forms of body representation. As Hohwy (</span><a aria-label="Reference 2013" data-dcnode-id="4661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1830" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4662" instrument_node="">2013</span></a><span data-dcnode-id="4660" instrument_node="">,&nbsp;p.&nbsp;227) notes, this inherent fragility of perception and bodily self-consciousness is masked by the fact that in standard situations, “the world cooperates and delivers reliable statistical regularities most of the time.” Still, it seems that minimal tampering with these statistical regularities can lead to large-scale disturbances in self-representation and self-other distinctions. Here, I am proposing that the integrated investigation of full-body illusions and dreams can help further unmask this deep fragility.</span></p><p data-dcnode-id="4651"><span data-dcnode-id="4658" instrument_node="">Active exploration of the body is crucial in this kind of framework. For systems that are constantly attempting to update and optimize their internal models about the world and their position in it, there is a prior expectation of constant change, both in the environment and in our relation to it (Hohwy </span><a aria-label="Reference 2016" data-dcnode-id="4656" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d104911213e1836" title="Hohwy, J. (2016). Prediction, agency and body ownership. (2016). In A. K. Engel, K. J. Friston, &amp; D. Kragic (Eds.), The Pragmatic turn: Toward action-oriented views in cognitive science, Strüngmann forum reports, vol. 18, J. Lupp, series editor. Cambridge, MA: MIT Press."><span data-dcnode-id="4657" instrument_node="">2016</span></a><span data-dcnode-id="4655" instrument_node="">). It thus becomes imperative to avoid periods of inactivity and explore and test the edges of our own knowledge even in periods where there is little or no new information (Clark </span><a aria-label="Reference 2015" data-dcnode-id="4653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1839" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="4654" instrument_node="">2015</span></a><span data-dcnode-id="4652" instrument_node="">,&nbsp;p.&nbsp;274). Here, the hypothesis testing process is taken partially offline, now taking the form of mental simulation. Especially in early developmental stages, bodily self-sampling may play an important role for the development and refinement of body models. But we can also see that the basic priors underlying waking experience continue to mould experience during sleep, including how we experience the dream world and ourselves in it. The dynamic nature of dreams, the importance of social interaction, and the prevalence of movement sensations are good examples.</span></p><p data-dcnode-id="4631"><span data-dcnode-id="4650" instrument_node="">What about visual imagery in dreams? Blumberg suggests that the rapid eye movements (REMs) that characterize REM sleep are in fact equivalent to muscle twitching (Blumberg </span><a aria-label="Reference 2010" data-dcnode-id="4648" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d104911213e1845" title="Blumberg, M. S. (2010). Beyond dreams: Do sleep-related movements contribute to brain development? Frontiers in Neurology, 1, 140."><span data-dcnode-id="4649" instrument_node="">2010</span></a><span data-dcnode-id="4647" instrument_node="">). In line with the most prominent neuroscientific theory of dreaming, signals spontaneously generated in the brainstem project towards visual and motor areas, thus explaining the seeming coordination of REMs with dream imagery (Hobson et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="4645" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d104911213e1848" title="Hobson, J. A., Pace-Schott, E. F., &amp; Stickgold, R. (2000). Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behavioral and Brain Sciences, 23(6), 793–842. (discussion 904–1121) ."><span data-dcnode-id="4646" instrument_node="">2000</span></a><span data-dcnode-id="4644" instrument_node="">). While the relation between real-eye movements and gaze shifts within dreams (the so-called scanning hypothesis; Dement and Kleitman </span><a aria-label="Reference 1957" data-dcnode-id="4642" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d104911213e1851" title="Dement, W., &amp; Kleitman, N. (1957). The relation of eye movements during sleep to dream activity: An objective method for the study of dreaming. Journal of Experimental Psychology, 53(5), 339–346."><span data-dcnode-id="4643" instrument_node="">1957</span></a><span data-dcnode-id="4641" instrument_node="">) has been hard to substantiate in standard nonlucid dreams for methodological reasons, there are clearer examples. In RBD sleep behavior, REMs appear to be coordinated with seemingly goal-directed behaviors (Leclair-Visonneau et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="4639" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d104911213e1854" title="Leclair-Visonneau, L., Oudiette, D., Gaymard, B., Leu-Semenescu, S., &amp; Arnulf, I. (2010). Do the eyes scan dream images during rapid eye movement sleep? Evidence from the rapid eye movement sleep behaviour disorder model. Brain, 133(6), 1737–1746."><span data-dcnode-id="4640" instrument_node="">2010</span></a><span data-dcnode-id="4638" instrument_node="">), and this correspondence can also be exploited in signal-verified lucid dreams involving eye-movement signals. But where the scanning hypothesis implicitly regards real-eye movements as mimicking gaze shifts within the dream, these real-eye movements might additionally be implicated in the generation of visual dream imagery (Hong et&nbsp;al. </span><a aria-label="Reference 2009" data-dcnode-id="4636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d104911213e1857" title="Hong, C. C. H., Harris, J. C., Pearlson, G. D., Kim, J. S., Calhoun, V. D., Fallon, J. H., et al. (2009). fMRI evidence for multisensory recruitment associated with rapid eye movements during sleep. Human Brain Mapping, 30(5), 1705–1722."><span data-dcnode-id="4637" instrument_node="">2009</span></a><span data-dcnode-id="4635" instrument_node="">; Hobson and Friston </span><a aria-label="Reference 2014" data-dcnode-id="4633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d104911213e1861" title="Hobson, J. A., &amp; Friston, K. J. (2014). Consciousness, dreams, and inference: The cartesian theatre revisited. Journal of Consciousness Studies, 21(1–2), 6–32."><span data-dcnode-id="4634" instrument_node="">2014</span></a><span data-dcnode-id="4632" instrument_node="">). This is equivalent to my earlier claim that we should reject accounts that describe unidirectional causation of outward body movements in sleep by dream experience, or vice versa. Instead, positing varying degrees of mutual constraint between dream imagery and outward movement seems more plausible. Here, I am just applying this account to the specific case of eye movements in sleep.</span></p><p data-dcnode-id="4623"><span data-dcnode-id="4630" instrument_node="">Applied to REMs, this suggests a revised version of the original scanning hypothesis. In this revised view, REMs are not so much involved in passively scanning as in actively testing hypotheses about the environment. Indeed, REMs resemble eye movements observed during head movement rather than during rest (Herman </span><a aria-label="Reference 2000" data-dcnode-id="4628" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d104911213e1868" title="Herman, J. (2000). Reflexive and orienting properties of REM sleep dreaming and eye movements. Behavioral and Brain Sciences, 23(6), 950."><span data-dcnode-id="4629" instrument_node="">2000</span></a><span data-dcnode-id="4627" instrument_node="">). Also in line with this proposal, saccades involved in visual search in wakefulness have been suggested to involve a form of active inference, selectively sampling the world to alter the stream of visual input in accordance with internal models (Friston et&nbsp;al. </span><a aria-label="Reference 2012" data-dcnode-id="4625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d104911213e1871" title="Friston, K., Adams, R., Perrinet, L., &amp; Breakspear, M. (2012). Perceptions as hypotheses: Saccades as experiments. Frontiers in Psychology, 3, 151."><span data-dcnode-id="4626" instrument_node="">2012</span></a><span data-dcnode-id="4624" instrument_node="">). But in sleep, where there is no mind-independent, stable visual input source, REMs cannot really meaningfully explore and sample the world. Instead, the process of active inference is mentally simulated, now contributing to the generation of the experienced persons and objects that are being explored, and thus indirectly shaping the unfolding dream narrative. The visual dream world would then be the best hypothesis of what the organism would be seeing given its current eye movements—and more generally, which situation it might find itself in given its current bodily and especially movement sensations. As the dream unfolds, real-eye movements would then come to be additionally constrained by dream imagery. Again, I am not suggesting that this account on its own can yield anything like a full explanation of visual imagery generation in dreams. But by inverting the traditional account of dream imagery generation, I do think we get a view that is both interestingly different and potentially informative, precisely because it challenges us to rethink long-held assumptions.</span></p><p data-dcnode-id="4618"><span data-dcnode-id="4622" instrument_node="">In particular, this account of visual dream imagery once more makes room for a view in which vestibular sensations are a driving factor not just of bodily self-representation, but more generally also of world simulation in dreams, including visual imagery. To appreciate the link between vestibular orienting and the immersive, </span><i data-dcnode-id="4620"><span data-dcnode-id="4621" instrument_node="">here-and-now</span></i><span data-dcnode-id="4619" instrument_node=""> character of dreaming, consider that a</span></p><blockquote class="c-blockquote" data-dcnode-id="4606"><div class="c-blockquote__body" data-dcnode-id="4607"><span data-dcnode-id="4617" instrument_node="">
</span><p data-dcnode-id="4609"><span data-dcnode-id="4616" instrument_node="">constant property of vivid REM dreaming is the sensation of orientation in the dreamt space, or the hallucinated impression that the dreamer is physically present in the dreamt scene, in three-dimensional space. The dreamer is directionally oriented and aware of a spatial relationship to the persons or objects present in the dream. The sensation of orientation is made possible by cortical-subcortical mechanisms, including the vestibular system. The associated eye movements are related to reflexive and orienting responses to the dreamt surround via feedback loop connecting cortex to vestibular nuclei. </span><i data-dcnode-id="4614"><span data-dcnode-id="4615" instrument_node="">It is postulated that the sense of orientation is the phenomenological equivalent in dreaming to the continuous vestibular activation during REM sleep</span></i><span data-dcnode-id="4613" instrument_node="">. (Herman </span><a aria-label="Reference 2000" data-dcnode-id="4611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d104911213e1887" title="Herman, J. (2000). Reflexive and orienting properties of REM sleep dreaming and eye movements. Behavioral and Brain Sciences, 23(6), 950."><span data-dcnode-id="4612" instrument_node="">2000</span></a><span data-dcnode-id="4610" instrument_node="">,&nbsp;p.&nbsp;950)</span></p><span data-dcnode-id="4608" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4601"><span data-dcnode-id="4605" instrument_node="">This is made more compelling by the occurrence of vestibular sensations at sleep onset, which often involve the feeling of gradually losing touch with the body or even of moving outside it as in OBEs. In one model of SP, illusory motor experiences precede out-of-body feelings, which in turn precede out-of-body autoscopy, or the experience of seeing oneself from the outside (Cheyne and Girard </span><a aria-label="Reference 2009" data-dcnode-id="4603" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d104911213e1892" title="Cheyne, J. A., &amp; Girard, T. A. (2009). The body unbound: Vestibular-motor hallucinations and out-of-body experiences. Cortex, 45(2), 201–215."><span data-dcnode-id="4604" instrument_node="">2009</span></a><span data-dcnode-id="4602" instrument_node="">). Again, the general idea is that altered body perception may create a spatial context, the dream world, for other characters, objects, and events—but also for the phenomenal self.</span></p><p data-dcnode-id="4584"><span data-dcnode-id="4600" instrument_node="">The close connection between bodily and spatial imagery is supported by research on vestibular contributions to self-consciousness. Pfeiffer and colleagues (</span><a aria-label="Reference 2014" data-dcnode-id="4598" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d104911213e1898" title="Pfeiffer, C., Serino, A., &amp; Blanke, O. (2014). The vestibular system: A spatial reference for bodily self-consciousness. Frontiers in Integrative Neuroscience, 8, 31."><span data-dcnode-id="4599" instrument_node="">2014</span></a><span data-dcnode-id="4597" instrument_node="">) argue that vestibular processing provides a spatial reference for bodily self-consciousness (see also Lenggenhager and Lopez </span><a aria-label="Reference 2015" data-dcnode-id="4595" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d104911213e1901" title="Lenggenhager, B., &amp; Lopez, C. (2015). Vestibular contributions to the sense of body, self, and others. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 23(T). Frankfurt: MIND Group."><span data-dcnode-id="4596" instrument_node="">2015</span></a><span data-dcnode-id="4594" instrument_node="">). By coding head position in three-dimensional space, the vestibular system constantly updates spatial representations of the position of the whole body and its movements through extrapersonal space. This allows the vestibular system to pay a central contribution to the two main spatial aspects of bodily self-consciousness: self-location and the first-person perspective (Lopez et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="4592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d104911213e1904" title="Lopez, C., Halje, P., &amp; Blanke, O. (2008). Body ownership and embodiment: Vestibular and multisensory mechanisms. Neurophysiologie Clinique/Clinical Neurophysiology, 38(3), 149–161."><span data-dcnode-id="4593" instrument_node="">2008</span></a><span data-dcnode-id="4591" instrument_node="">). There is also evidence that vestibular processing modulates mental simulation, such as egocentric spatial imagery of the type involved in whole-body perspective transformations (as in imagining that one is seeing an object from a different position than one is actually in; Pfeiffer et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4589" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d104911213e1907" title="Pfeiffer, C., Serino, A., &amp; Blanke, O. (2014). The vestibular system: A spatial reference for bodily self-consciousness. Frontiers in Integrative Neuroscience, 8, 31."><span data-dcnode-id="4590" instrument_node="">2014</span></a><span data-dcnode-id="4588" instrument_node="">). For example, egocentric (but not allocentric) imagery is disturbed in patients with vestibular loss and can be systematically disturbed via vestibular stimulation in healthy subjects (Lenggenhager et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="4586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d104911213e1910" title="Lenggenhager, B., Lopez, C., &amp; Blanke, O. (2008). Influence of galvanic vestibular stimulation on egocentric and object-based mental transformations. Experimental Brain Research, 184(2), 211–221."><span data-dcnode-id="4587" instrument_node="">2008</span></a><span data-dcnode-id="4585" instrument_node="">).</span></p><p data-dcnode-id="4570"><span data-dcnode-id="4583" instrument_node="">If vestibular orienting is a driving factor underlying dream imagery generation, then there is an important sense in which dreaming is the reverse of immersive virtual reality systems (cf. Windt </span><a aria-label="Reference 2015a" data-dcnode-id="4581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1916" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4582" instrument_node="">2015a</span></a><span data-dcnode-id="4580" instrument_node="">,&nbsp;chap.&nbsp;12). In immersive virtual reality, self-location and body ownership are modulated by bodily and environmental stimuli. Yet, in cases of multisensory conflict, as in full-body illusions, experienced self-location drifts towards the visually represented artificial body and away from the physical body (Lenggenhager et&nbsp;al. </span><a aria-label="Reference 2007" data-dcnode-id="4578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d104911213e1919" title="Lenggenhager, B., Tadi, T., Metzinger, T., &amp; Blanke, O. (2007). Video ergo sum: Manipulating bodily self-consciousness. Science, 317(5841), 1096–1099."><span data-dcnode-id="4579" instrument_node="">2007</span></a><span data-dcnode-id="4577" instrument_node="">). Wakefulness, in this view, is dedicated to orienting and localizing the (bodily) self in the world, and what we experience as our body is modulated to a considerable degree by externally generated sensory and especially visual input. By contrast, dreams involve the generation of spatiotemporal and often visual imagery in response to internally generated vestibular sensations and altered own-body perception. Dreaming and wakefulness would then present similar solutions to diametrically opposed computational problems: while wakefulness is about locating oneself in the world and interacting with persons and objects in it, dreaming is about creating a world centered on the bodily self. Dreaming, in this view, is not only more fragile than waking experience, but in some ways also more centered on the physical body.</span><sup data-dcnode-id="4572"><a data-dcnode-id="4573" href="#Fn20"><span class="u-visually-hidden" data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">Footnote </span></span><span data-dcnode-id="4574" instrument_node="">20</span></a></sup><span data-dcnode-id="4571" instrument_node=""> While speculative, my hope is that this proposal can expand and enrich existing theories of dream generation by adding a novel and substantively different perspective.</span></p><p data-dcnode-id="4559"><span data-dcnode-id="4569" instrument_node="">This type of account might even point to a function of dreaming. Honma and colleagues (</span><a aria-label="Reference 2014" data-dcnode-id="4567" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d104911213e1937" title="Honma, M., Yoshiike, T., Ikeda, H., Kim, Y., &amp; Kuriyama, K. (2014). Sleep dissolves illusion: Sleep withstands learning of visuo-tactile-proprioceptive integration induced by repeated days of rubber hand illusion training. PLOS ONE, 9(1), e85734."><span data-dcnode-id="4568" instrument_node="">2014</span></a><span data-dcnode-id="4566" instrument_node="">) investigated whether repeated exposure to the rubber-hand illusion (Botvinick and Cohen </span><a aria-label="Reference 1998" data-dcnode-id="4564" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d104911213e1940" title="Botvinick, M., &amp; Cohen, J. (1998). Rubber hands ’feel’ touch that eyes see. Nature, 391(6669), 756–756."><span data-dcnode-id="4565" instrument_node="">1998</span></a><span data-dcnode-id="4563" instrument_node="">) would have a learning effect on participants. The rubber-hand illusion is analogous to the full-body illusions discussed earlier, just restricted to a single body part. Again, visuotactile conflict is used to induce the feeling that strokes applied to one’s (unseen) hand are felt where one is seeing them, in the rubber hand. This mislocalization of the felt to the seen touches is called proprioceptive drift. Participants sometimes also report feeling as if the rubber hand was their own hand; and these reports are substantiated by objective measures (Tsakiris and Haggard </span><a aria-label="Reference 2005" data-dcnode-id="4561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d104911213e1943" title="Tsakiris, M., &amp; Haggard, P. (2005). The rubber hand illusion revisited: Visuotactile integration and self-attribution. Journal of Experimental Psychology: Human Perception and Performance, 31(1), 80."><span data-dcnode-id="4562" instrument_node="">2005</span></a><span data-dcnode-id="4560" instrument_node="">). Honma and colleagues found that while repeated exposure intensified the illusion, proprioceptive drift was significantly attenuated after sleep—almost as if sleep were recalibrating the body image. In their own words,</span></p><blockquote class="c-blockquote" data-dcnode-id="4550"><div class="c-blockquote__body" data-dcnode-id="4551"><span data-dcnode-id="4558" instrument_node="">
</span><p data-dcnode-id="4553"><span data-dcnode-id="4557" instrument_node="">sleep resets the proprioceptive sensation closer to reality and maintains awareness that the RH [rubber hand] is an alien limb. [...] Hence, sleep does not seem to haphazardly enhance memories. [...] Rather, it seems to resist incongruent multisensory integration. (Honma et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4555" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d104911213e1950" title="Honma, M., Yoshiike, T., Ikeda, H., Kim, Y., &amp; Kuriyama, K. (2014). Sleep dissolves illusion: Sleep withstands learning of visuo-tactile-proprioceptive integration induced by repeated days of rubber hand illusion training. PLOS ONE, 9(1), e85734."><span data-dcnode-id="4556" instrument_node="">2014</span></a><span data-dcnode-id="4554" instrument_node="">,&nbsp;p.&nbsp;7)</span></p><span data-dcnode-id="4552" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4545"><span data-dcnode-id="4549" instrument_node="">In a follow-up study, Honma and colleagues (</span><a aria-label="Reference 2016" data-dcnode-id="4547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d104911213e1955" title="Honma, M., Plass, J., Brang, D., Florczak, S. M., Grabowecky, M., &amp; Paller, K. A. (2016). Sleeping on the rubber-hand illusion: Memory reactivation during sleep facilitates multisensory recalibration. Neuroscience of Consciousness, 2016(1), 1–10."><span data-dcnode-id="4548" instrument_node="">2016</span></a><span data-dcnode-id="4546" instrument_node="">) investigated the effects of targeted memory reactivation during sleep. Sounds that had been previously played during the rubber-hand illusion were replayed during slow-wave-sleep over a three-day period. Again, both proprioceptive drift towards the rubber hand and experienced ownership increased through repeated exposure in wakefulness. Targeted memory reactivation in sleep also significantly increased proprioceptive drift, whereas this was not the case in control groups who were presented with a non-associated sound or no sound at all during sleep. Contrary to their earlier study, targeted memory reactivation of the rubber-hand illusion in sleep seemed to enforce the illusion, reorienting the body image towards the rubber hand. It would be fascinating to know whether these different conditions—sleeping after the rubber-hand illusion under natural conditions as opposed to targeted memory reactivation during sleep—were associated with differences in dream content as well.</span></p><p data-dcnode-id="4540"><span data-dcnode-id="4544" instrument_node="">Finally, what about the more cognitive aspects of dreams and their narrative, story-like structure (Pace-Schott </span><a aria-label="Reference 2013" data-dcnode-id="4542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d104911213e1961" title="Pace-Schott, E. F. (2013). Dreaming as a story-telling instinct. Frontiers in Psychology, 4, 159."><span data-dcnode-id="4543" instrument_node="">2013</span></a><span data-dcnode-id="4541" instrument_node="">)? Here, I want to give a single example of how high-level conscious expectations and beliefs can modulate dream content. Again, in the absence of a stable, external stimulus source, it makes sense that in dreams, highest-level conscious hypotheses might be more closely associated with imagery generation than is the case for waking experience. The following dream report nicely illustrates this delicate interplay between conscious thoughts and the unfolding dream narrative:</span></p><blockquote class="c-blockquote" data-dcnode-id="4531"><div class="c-blockquote__body" data-dcnode-id="4532"><span data-dcnode-id="4539" instrument_node="">
</span><p data-dcnode-id="4534"><span data-dcnode-id="4538" instrument_node="">Looking down the valley that we were descending into, I saw that the path lay across it like a white ribbon and then turned off to the right towards the distant village. “It looks just like a road marked out upon a map,” I thought, “or like a railway map.” As I looked again I saw that there was running down the length of the valley a railroad track which I had not seen before and which crossed the path that we were following. We came nearer, and I saw that no gates guarded the crossing of the roads. “What a dangerous sort of level crossing,” I thought, “like some of those unguarded railway lines in America that we read of. There would be no warning whatever of a train coming from behind the hills except the sound of it.” I listened, and then I began to hear, far away, the roar of a train; it came round the hill and round a sudden sharp curve at the foot of the valley, rushing towards us very fast. I stood clear of the line and watched it come and go. (Arnold-Forster </span><a aria-label="Reference 1921" data-dcnode-id="4536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d104911213e1968" title="Arnold-Forster, M. (1921). Studies in dreams. London: George Allen &amp; Unwin."><span data-dcnode-id="4537" instrument_node="">1921</span></a><span data-dcnode-id="4535" instrument_node="">,&nbsp;p.&nbsp;133f)</span></p><span data-dcnode-id="4533" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4526"><span data-dcnode-id="4530" instrument_node="">Especially in prelucid dreams, in which dreamers wonder whether they are now dreaming, the tendency of dream imagery to change in response to conscious expectations is striking—and can actually have the reverse effect of leading dreamers to falsely conclude that they are awake. Mach (</span><a aria-label="Reference 1919" data-dcnode-id="4528" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d104911213e1973" title="Mach, E. (1919). Die Analyse der Empfindungen und das Verhältnis des Psychischen zum Physischen. Jena: Verlag von Gustav Fischer."><span data-dcnode-id="4529" instrument_node="">1919</span></a><span data-dcnode-id="4527" instrument_node="">,&nbsp;p.&nbsp;207) reports several dreams in which this happened. For example, at a time when he was concerned with questions of space, he dreamed that he was taking a walk in the forest. He noticed that the perspective of the trees was distorted and realized that he must be dreaming. The distortions, however, were corrected immediately, seemingly confirming that he was awake after all.</span></p><p data-dcnode-id="4521"><span data-dcnode-id="4525" instrument_node="">For now, these observations are largely anecdotal. But they do suggest how expectations and hypothesis-testing at different levels might play a role in explaining both the generation of dream imagery and the construction of seemingly story-like dream narratives. They also nicely explain the frequent tendency of conscious thoughts and attempts at self-reflection in dreams to be corrupted by lower-level imagistic content (for a fuller discussion of cognitive corruption, see Windt </span><a aria-label="Reference 2015a" data-dcnode-id="4523" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1980" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4524" instrument_node="">2015a</span></a><span data-dcnode-id="4522" instrument_node="">, chaps.&nbsp;9&nbsp;and&nbsp;10). Dreams might be an ideal example for investigating the delicate interplay between low-level influences, such as brainstem-driven activation, own-body perception, twitching, and vestibular orienting, and high-level cognitive aspects, such as waking memory sources, conscious expectations, and beliefs, including those formed within the dream. In the special case of dreaming, bodily self-sampling, for instance through REM-sleep related muscle twitches, might be an important factor underlying the process of self- and world-simulation, operating alongside and in a relation of mutual constraint with higher-level cognitive processes and top-down influences.</span></p></div></div></section><section data-dcnode-id="4494" data-title="Conclusions"><div class="c-article-section" data-dcnode-id="4495" id="Sec12-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4516" id="Sec12"><span data-dcnode-id="4517" instrument_node="">Conclusions</span></h2><div class="c-article-section__content" data-dcnode-id="4496" id="Sec12-content"><p data-dcnode-id="4511"><span data-dcnode-id="4515" instrument_node="">Dreaming is a process of self- and world-simulation, where both are shaped by the dreamer’s past experiences (in dreaming and in waking), emotions, current concerns and expectations, as well as thoughts formed within the dream. In addition, both self- and world-simulation in dreams are also underwritten by illusory own-body perception, vestibular orienting, muscular activity, and paralysis. The generation of dream imagery is not just a synthesis of internally generated and largely random bottom-up stimuli (cf. Hobson </span><a aria-label="Reference 1988" data-dcnode-id="4513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d104911213e1993" title="Hobson, J. A. (1988). The dreaming brain. New York: Basic Books."><span data-dcnode-id="4514" instrument_node="">1988</span></a><span data-dcnode-id="4512" instrument_node="">). Rather, external and especially bodily sensations, as well as long-term expectations, memories, beliefs, and thoughts formed within the dream might play a modulating role, with lower-level unconscious and higher-level conscious predictions mutually shaping each other. We should also expect fluctuations in their respective influence, with different factors taking the lead in different kinds of dreams and different stages of sleep. Yet at least in some cases, it seems that through sampling the physical body, dreams turn into instances of sampling the dream world—and generating it in this very process.</span></p><p data-dcnode-id="4503"><span data-dcnode-id="4510" instrument_node="">Dreaming, in this view, is not a state of cranial envatment in which experience is wholly dissociated from external and bodily cues; instead, dreams are weakly phenomenally-functionally embodied states that can be placed on a continuum with bodily experience in wakefulness and full-body illusions, virtual reality, as well as with spatial and even social cognition. The importance of bodily self-sampling, as in muscle twitching in REM sleep, in early stages of development suggests an important role for active inference in the generation of dreaming. Dreams, or a subset thereof, might then be re-described as world simulations centered on the self and shaped by the body. An upshot is that in some ways, dreaming is possibly more self- and body-centered than wakefulness. Where in waking, visual input dominates over tactile and proprioceptive cues about the actual position of the body or of a particular body part, in dreams, bodily experience and to a lesser extent visual imagery are partly driven by bodily self-sampling and vestibular orienting. In predictive processing terms, we might say that while bodily experience in dreams is the system’s best current answer to the question, </span><i data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">What would I be doing (and what would my body be like) if this was my sensory input?</span></i><span data-dcnode-id="4507" instrument_node="">, the dream world, along with the characters and objects in it, are its best current answer to the question, </span><i data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">What situation might I be in if these were my movements and actions?</span></i><span data-dcnode-id="4504" instrument_node="">
</span></p><p data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">To arrive at this view, I reconstructed differing theoretical accounts of dreaming and their role in the debate between internalists and externalists about experience. I proposed that these accounts fail to capture the unique pattern of bodily experience in dreams and its characteristic differences from wakefulness. I also challenged the claim, widely accepted in the current literature, that dreaming is a real-world example of naturally occurring cranial envatment. To understand bodily experience in dreams, one must look beyond the brain and investigate the complex interaction with the body during sleep, including variations in degrees of causal coupling across dreams and characteristic changes as compared to wakefulness. Contrary to currently popular views, the problem of dreaming and of bodily experience in dreams is not just a body–brain problem. To understand the phenomenological profile of dreaming, we need to solve the body-brain-body problem. This in itself is surprising.</span></p><p data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">The resulting view is not just empirically plausible, but also has important theoretical consequences, suggesting that there are varying degrees of concordance between bodily experiences in dreams and real-body inputs and motor outputs. Some and perhaps even a majority of bodily experiences in dreams involve bodily self-sampling and illusory own-body perception. Own-body perception and outward motor activity, in turn, are closely interlocked and should not be seen as entirely distinct processes. Moreover, in some cases, real-body influences can reach beyond the dream self and leak into the dream world and non-self dream characters in it.</span></p><p data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">An important upshot is that an empirically plausible account of what it is typically like to dream has no clear relevance for metaphysical questions about the constitutive supervenience base of experience. In return, the view I developed here promises a more empirically plausible account of dreaming and its place in a larger framework and taxonomy of mental states. This requires a profound shift in perspective, for instance on the process of dream generation and the relation of sleep behavior to dream experience—but for the same reason suggests points of contact to predictive processing accounts of waking experience, self-consciousness, and full-body illusions. At best, this can lead to a deeper understanding and more integrated account of conscious experience and cognitive processing across the sleep-wake cycle. At the least, we now have a theory of dream movement and its relation to real-body movements in sleep that offers a genuine alternative to the received view of dreaming, on both the phenomenological and the functional levels of description. Even if this alternative view ultimately turned out to fail, I think its differences from the received view promise a productive kind of disagreement that can lead to a number of testable hypotheses, for example about the relation between dream imagery, outward movement, and bodily stimulation during sleep, as well as to future theoretical–conceptual refinement.</span></p></div></div></section><span data-dcnode-id="4493" instrument_node="">
</span><section data-dcnode-id="4261" data-title="Notes"><div class="c-article-section" data-dcnode-id="4262" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4491" id="notes"><span data-dcnode-id="4492" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="4263" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="4264"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="4487" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="4488"><p data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Specifically, Bradley argues that to explain the failure of outward movement, it is not enough to appeal to a general weakness of ideas in dreams—dream imagery and emotions are, he notes, often quite intense. Instead, Bradley thinks the problem lies in a vagueness that is specific to ideas of movement. Motor ideas often remain indeterminate in dreams, and their lack of specificity results from our inability, in standard cases, to perceive the position of our actual limbs in sleep. Without the detail that is grounded in own-body perception, the ideas of movement in dreams are too vague to cause movement in the sleeping body. Thus there is, for Bradley, a complex story to be told about the relationship between dream imagery, the way we experience our physical bodies in sleep, and outward motor activity.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="4480" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="4481"><p data-dcnode-id="4482"><span data-dcnode-id="4486" instrument_node="">Note that the distinction between the two types of embodiment is already implicit in Bradley’s (</span><a aria-label="Reference 1894" data-dcnode-id="4484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d104911213e492" title="Bradley, F. (1894). On the failure of movement in dream. Mind, 3(11), 373–377."><span data-dcnode-id="4485" instrument_node="">1894</span></a><span data-dcnode-id="4483" instrument_node="">) discussion of the problem of dream movement. Dream movements illustrate the distinction quite clearly, because they often appear to contrast starkly with seeming inertia of the sleeping body (as in dreams of flying or falling while lying still in bed).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="4476" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="4477"><p data-dcnode-id="4478"><span data-dcnode-id="4479" instrument_node="">A problem that immediately comes to mind is that the phenomenological equivalence claim leaves open what exactly the phenomenological profile of waking bodily experience is supposed to be.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="4466" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="4467"><p data-dcnode-id="4468"><span data-dcnode-id="4475" instrument_node="">As a further example, consider the example of flying in dreams. While examples of dream flying may be loosely modeled on swimming or observed flight in birds, the experience of unsupported flying has no straightforward waking model. Yet, flying dreams are striking for their high degree of subjective realism and vividness (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="4473" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e677" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4474" instrument_node="">2015a</span></a><span data-dcnode-id="4472" instrument_node="">,&nbsp;p.&nbsp;454f); during the dream, they </span><i data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">seem</span></i><span data-dcnode-id="4469" instrument_node=""> completely convincing. Here, I am proposing that to explain this seemingly realistic quality, we need not appeal to rich phenomenal embodiment or phenomenological equivalence.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="4453" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="4454"><p data-dcnode-id="4455"><span data-dcnode-id="4465" instrument_node="">Another way to extend this research is to consider cases in which spatiotemporal self-location as the crucial structural feature of dreaming is lost. A precise concept of dreaming as defined, minimally, by its immersive, </span><i data-dcnode-id="4463"><span data-dcnode-id="4464" instrument_node="">here-and-now</span></i><span data-dcnode-id="4462" instrument_node=""> structure can be used to develop a precise framework for describing different kinds of dreamless sleep experience (Windt </span><a aria-label="Reference 2015b" data-dcnode-id="4460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR156" id="ref-link-section-d104911213e724" title="Windt, J. M. (2015b). Just in time-dreamless sleep experience as pure subjective temporality: A commentary on Evan Thompson. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 37(C). Frankfurt am Main: MIND Group."><span data-dcnode-id="4461" instrument_node="">2015b</span></a><span data-dcnode-id="4459" instrument_node="">; Windt et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="4457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e727" title="Windt, J. M., Nielsen, T., &amp
