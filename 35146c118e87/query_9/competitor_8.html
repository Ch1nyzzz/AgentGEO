; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="4458" instrument_node="">2016</span></a><span data-dcnode-id="4456" instrument_node="">). This framework can then guide the investigation of transitions between nonconscious sleep and more complex kinds of dreamless and dreamful experience.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="4434" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="4435"><p data-dcnode-id="4436"><span data-dcnode-id="4452" instrument_node="">There may also be variation both between and within sleep stages. It is common to distinguish between phasic and tonic REM sleep, where the former is associated with bursts of rapid eye movements (see Ermis et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="4450" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d104911213e829" title="Ermis, U., Krakow, K., &amp; Voss, U. (2010). Arousal thresholds during human tonic and phasic REM sleep. Journal of Sleep Research, 19(3), 400–406."><span data-dcnode-id="4451" instrument_node="">2010</span></a><span data-dcnode-id="4449" instrument_node=""> for discussion and further references). Arousal thresholds are different for the two substages, suggesting that phasic REM sleep is a state of heightened seclusion from the environment, whereas tonic REM sleep is characterized by higher sensitivity to external stimuli (Ermis et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="4447" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d104911213e832" title="Ermis, U., Krakow, K., &amp; Voss, U. (2010). Arousal thresholds during human tonic and phasic REM sleep. Journal of Sleep Research, 19(3), 400–406."><span data-dcnode-id="4448" instrument_node="">2010</span></a><span data-dcnode-id="4446" instrument_node="">). In an fMRI study investigating thalamocortical reactivity to auditory stimulation during REM sleep, Wehrle et&nbsp;al. (</span><a aria-label="Reference 2007" data-dcnode-id="4444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR150" id="ref-link-section-d104911213e835" title="Wehrle, R., Kaufmann, C., Wetter, T. C., Holsboer, F., Auer, D. P., Pollmächer, T., et al. (2007). Functional microstates within human REM sleep: First evidence from fMRI of a thalamocortical network specific for phasic REM periods. European Journal of Neuroscience, 25(3), 863–871."><span data-dcnode-id="4445" instrument_node="">2007</span></a><span data-dcnode-id="4443" instrument_node="">) found different patterns of reactivity during tonic and phasic REM sleep: tonic REM sleep was associated with residual activation of the auditory cortex, suggesting that some processing of external stimuli was preserved. By contrast, phasic REM periods were associated with heightened activity of a thalamocortical network that appeared to be functioning as an isolated and closed intrinsic loop. Throughout sleep and even within REM sleep, we thus appear to cycle between periods of heightened responsiveness to external stimuli and periods of stronger environmental seclusion, which are carefully orchestrated by spontaneous fluctuations in brain activity. There is also some evidence for differences in dream imagery, with visual imagery being rated as clearer and more vivid following awakenings from phasic (as compared to tonic) REM sleep (Rechtschaffen and Buchignani </span><a aria-label="Reference 1983" data-dcnode-id="4441" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d104911213e838" title="Rechtschaffen, A., &amp; Buchignani, C. (1983). Visual dimensions and correlates of dream images. Sleep Research, 12, S189."><span data-dcnode-id="4442" instrument_node="">1983</span></a><span data-dcnode-id="4440" instrument_node="">). However, other studies failed to find differences in dream imagery between the two substages (Hodoba et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="4438" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d104911213e841" title="Hodoba, D., Hrabric, K., Krmpotic, P., &amp; Kujundzic-Tiljak, M. (2008). Dream recall after night awakenings from tonic/phasic REM sleep. Collegium Antropologicum, 32(Supplement 1), 69–73."><span data-dcnode-id="4439" instrument_node="">2008</span></a><span data-dcnode-id="4437" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="4424" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="4425"><p data-dcnode-id="4426"><span data-dcnode-id="4433" instrument_node="">This contradicts the standard view that NREM parasomnias are examples of unconscious automatisms—essentially zombie-like behaviors occurring in the absence of phenomenal experience. See Revonsuo (</span><a aria-label="Reference 2006" data-dcnode-id="4431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e899" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="4432" instrument_node="">2006</span></a><span data-dcnode-id="4430" instrument_node="">) and Windt et&nbsp;al. (</span><a aria-label="Reference 2016" data-dcnode-id="4428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e902" title="Windt, J. M., Nielsen, T., &amp; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="4429" instrument_node="">2016</span></a><span data-dcnode-id="4427" instrument_node="">) for discussion.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="4420" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="4421"><p data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">This is why Freudian dream theory, which emphasized the psychic sources of dreaming, was strongly opposed to this view.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="4416" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="4417"><p data-dcnode-id="4418"><span data-dcnode-id="4419" instrument_node="">Again, my proposal that dreams are weakly phenomenally-functionally embodied states does not bring with it any metaphysical commitments. Here, I am interested only in the causally enabling conditions for certain types of dream experience but don’t make any strong claims about the constitutive supervenience base of dreaming.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="4406" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="4407"><p data-dcnode-id="4408"><span data-dcnode-id="4415" instrument_node="">This dichotomous treatment of the sensory input and motor output blockades corresponds to the classical distinction between perception and action. In this conception, perception is conceived of as a largely passive, receptive process of synthesizing incoming, bottom-up stimuli into a coherent image of the world. By contrast, action is viewed as involving intentional, top-down control of body movements. This classical perception-action dichotomy is now rejected by leading theories in cognitive neuroscience and philosophy as oversimplified and outdated (see Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="4413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1051" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4414" instrument_node="">2013</span></a><span data-dcnode-id="4412" instrument_node="">, chap.&nbsp;4). I return to this issue in Sect.&nbsp;</span><a data-dcnode-id="4410" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec9"><span data-dcnode-id="4411" instrument_node="">5.1</span></a><span data-dcnode-id="4409" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="4399" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="4400"><p data-dcnode-id="4401"><span data-dcnode-id="4405" instrument_node="">Considering these cases, we can ask, what is the required degree of correspondence between outward behavior and dream experience for an episode to count as dream </span><i data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">enactment</span></i><span data-dcnode-id="4402" instrument_node=""> behavior? In cases where body movements bear no obvious relation to dream content, it seems more apt to speak of dream-associated behaviors. For example, in nightmares associated with indiscriminate leg movements or tossing and turning, motor activity seems only loosely associated with dream experience but lacks any direct and easily identifiable correspondence to specific dream contents. For dream enactment behavior, a tighter link between experienced and outward movement seems required.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="12." data-dcnode-id="4392" id="Fn12"><div class="c-article-footnote--listed__content" data-dcnode-id="4393"><p data-dcnode-id="4394"><span data-dcnode-id="4398" instrument_node="">Note that if the cranial envatment view fails and dreams are not functionally disembodied, but weakly phenomenally-functionally embodied states, then it might not be quite correct say that prediction errors fail to be processed in dreams. At least a subgroup of dreams may involve higher-level models attempting to make sense of prediction errors. If dream bizarreness and instability are indeed a result of attenuated processing of prediction error signals, then we might also expect varying levels of bizarreness in dreams to be associated with the varying degrees to which prediction error signals continue to be processed in sleep. I do not want to speculate more on this issue here, but only to point out that this would fit in nicely with the fact that bizarreness seems to be unevenly distributed over different types of dreams (Domhoff </span><a aria-label="Reference 2007" data-dcnode-id="4396" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d104911213e1234" title="Domhoff, G. W. (2007). Realistic simulation and bizarreness in dream content: Past findings and suggestions for future research. In D. Barrett &amp; P. McNamara (Eds.), The new science of dreaming: Content, recall, and personality characteristics (Vol. 2, pp. 1–27). Westport, CT: Praeger Press."><span data-dcnode-id="4397" instrument_node="">2007</span></a><span data-dcnode-id="4395" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="13." data-dcnode-id="4382" id="Fn13"><div class="c-article-footnote--listed__content" data-dcnode-id="4383"><p data-dcnode-id="4384"><span data-dcnode-id="4391" instrument_node="">In one study, participants whose eyes had been taped open were presented with illuminated objects such as books and coffee pots during REM sleep (Rechtschaffen and Foulkes </span><a aria-label="Reference 1965" data-dcnode-id="4389" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d104911213e1301" title="Rechtschaffen, A., &amp; Foulkes, D. (1965). Effect of visual stimuli on dream content. Perceptual and Motor Skills, 20(3 supplement), 1149–1160."><span data-dcnode-id="4390" instrument_node="">1965</span></a><span data-dcnode-id="4388" instrument_node="">). Independent judges were able to match the presented objects to the dream reports only at chance level, and there was not a single unambiguous case of incorporation. There is some evidence that light cues can be incorporated in dreams, and this is sometimes suggested as a method for the induction of lucid dreaming (see Stumbrys et&nbsp;al. </span><a aria-label="Reference 2012" data-dcnode-id="4386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR140" id="ref-link-section-d104911213e1304" title="Stumbrys, T., Erlacher, D., Schädlich, M., &amp; Schredl, M. (2012). Induction of lucid dreams: A systematic review of evidence. Consciousness and Cognition, 21(3), 1456–1475."><span data-dcnode-id="4387" instrument_node="">2012</span></a><span data-dcnode-id="4385" instrument_node=""> for discussion and further references). But even such cases of clear incorporation of visual stimuli are limited in their ability to explain specific contents of dreaming.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="14." data-dcnode-id="4375" id="Fn14"><div class="c-article-footnote--listed__content" data-dcnode-id="4376"><p data-dcnode-id="4377"><span data-dcnode-id="4381" instrument_node="">For an insightful discussion of imagining and perceiving from this perspective, see Kirchhoff (</span><a aria-label="Reference 2017" data-dcnode-id="4379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d104911213e1316" title="Kirchhoff, M. D. (2017). Predictive processing, perceiving and imagining: Is to perceive to imagine, or something close to it? Philosophical Studies, Online first, pp. 1–17."><span data-dcnode-id="4380" instrument_node="">2017</span></a><span data-dcnode-id="4378" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="15." data-dcnode-id="4342" id="Fn15"><div class="c-article-footnote--listed__content" data-dcnode-id="4343"><p data-dcnode-id="4355"><span data-dcnode-id="4374" instrument_node="">More recently, the debate between internalist and externalist-friendly predictive processing accounts has moved on to more specific issues. Both Hohwy and Clark agree that predictive processing emphasizes the importance of internal models—their disagreement hinges on whether these models are rich (Hohwy in press) or sparse, involving “computationally frugal, but more behaviourally interactive” (Clark </span><a aria-label="Reference 2016" data-dcnode-id="4372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d104911213e1347" title="Clark, A. (2016). Busting out: Predictive brains, embodied minds, and the puzzle of the evidentiary veil. Nous,. doi:
                    10.1111/nous.12140
                    
                  ."><span data-dcnode-id="4373" instrument_node="">2016</span></a><span data-dcnode-id="4371" instrument_node="">,&nbsp;p.&nbsp;11f) solutions that carry less “reconstructive baggage” (Clark </span><a aria-label="Reference 2016" data-dcnode-id="4369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d104911213e1350" title="Clark, A. (2016). Busting out: Predictive brains, embodied minds, and the puzzle of the evidentiary veil. Nous,. doi:
                    10.1111/nous.12140
                    
                  ."><span data-dcnode-id="4370" instrument_node="">2016</span></a><span data-dcnode-id="4368" instrument_node="">,&nbsp;p.&nbsp;10); whether the boundary between internal models and the worldly causes they predict is strict and immutable, with cognitive processing occurring “wholly behind a sensory veil, segregated from the world” (Hohwy </span><a aria-label="Reference 2016" data-dcnode-id="4366" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d104911213e1353" title="Hohwy, J. (2016). Prediction, agency and body ownership. (2016). In A. K. Engel, K. J. Friston, &amp; D. Kragic (Eds.), The Pragmatic turn: Toward action-oriented views in cognitive science, Strüngmann forum reports, vol. 18, J. Lupp, series editor. Cambridge, MA: MIT Press."><span data-dcnode-id="4367" instrument_node="">2016</span></a><span data-dcnode-id="4365" instrument_node="">,&nbsp;p.&nbsp;120); whether there is genuine or merely causal continuity between the environment and the brain (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="4363" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1356" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4364" instrument_node="">2013</span></a><span data-dcnode-id="4362" instrument_node="">,&nbsp;p.&nbsp;239); and whether the process of prediction error minimization involves hypothesis testing in any literal sense (Clark </span><a aria-label="Reference 2016" data-dcnode-id="4360" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d104911213e1359" title="Clark, A. (2016). Busting out: Predictive brains, embodied minds, and the puzzle of the evidentiary veil. Nous,. doi:
                    10.1111/nous.12140
                    
                  ."><span data-dcnode-id="4361" instrument_node="">2016</span></a><span data-dcnode-id="4359" instrument_node="">). According to Hohwy (</span><a aria-label="Reference 2013" data-dcnode-id="4357" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1363" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4358" instrument_node="">2013</span></a><span data-dcnode-id="4356" instrument_node="">,&nbsp;p.&nbsp;228), the right response to questions on the evidentiary seclusion versus openness of perception is to not force a choice,</span></p><blockquote class="c-blockquote" data-dcnode-id="4349"><div class="c-blockquote__body" data-dcnode-id="4350"><span data-dcnode-id="4354" instrument_node="">
</span><p data-dcnode-id="4352"><span data-dcnode-id="4353" instrument_node="">but try to reconceive the perceptual relation to the world such that we do not have to choose between perception being ‘direct’ or ‘indirect’ in the first place. Instead, we should be able to retain the grain of truth in both sides of the debate.</span></p><span data-dcnode-id="4351" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4344"><span data-dcnode-id="4348" instrument_node="">Here, I will leave these issues to the side, as I am more interested in a more basic point. Where the internalist, emphasizing the seclusion of the brain, might construe perception as an instance of online hallucination or online dreaming, the externalist will claim that dreaming is a form of offline perception, phenomenologically different from waking because the characteristic openness to the world has been temporarily lost (Clark </span><a aria-label="Reference 2015" data-dcnode-id="4346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1371" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="4347" instrument_node="">2015</span></a><span data-dcnode-id="4345" instrument_node="">,&nbsp;p.&nbsp;196). My main point is that both sides mischaracterize the functional relation between dreaming and the body—or at least have not given it the theoretical attention it deserves.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="16." data-dcnode-id="4311" id="Fn16"><div class="c-article-footnote--listed__content" data-dcnode-id="4312"><p data-dcnode-id="4334"><span data-dcnode-id="4341" instrument_node="">This idea nicely complements Blumberg’s own proposal. To elucidate the developmental role of twitching, he uses an example that is similar to Dennett’s robot control room thought experiment (Blumberg </span><a aria-label="Reference 2015" data-dcnode-id="4339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1506" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4340" instrument_node="">2015</span></a><span data-dcnode-id="4338" instrument_node="">; Blumberg et&nbsp;al. </span><a aria-label="Reference 2013b" data-dcnode-id="4336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d104911213e1509" title="Blumberg, M. S., Marques, H. G., &amp; Iida, F. (2013). Twitching in sensorimotor development from sleeping rats to robots. Current Biology, 23(12), R532–R537."><span data-dcnode-id="4337" instrument_node="">2013b</span></a><span data-dcnode-id="4335" instrument_node="">). In it, we are asked to imagine being</span></p><blockquote class="c-blockquote" data-dcnode-id="4325"><div class="c-blockquote__body" data-dcnode-id="4326"><span data-dcnode-id="4333" instrument_node="">
</span><p data-dcnode-id="4328"><span data-dcnode-id="4332" instrument_node="">imprisoned in the control room of a giant robot. Each light, when it turns on, provides rich and relevant information about the robot’s circumstances; these lights are all outputs from highly sophisticated neural net analyzers of the raw inputs streaming from the robot’s high-definition video eyes and microphone ears, touch sensors, and olfactory sensors. The buttons initiate robotic actions, all coordinated and ready to execute. (Dennett </span><a aria-label="Reference 2013" data-dcnode-id="4330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d104911213e1516" title="Dennett, D. C. (2013). Intuition pumps and other tools for thinking. New York: W. W. Norton &amp; Company."><span data-dcnode-id="4331" instrument_node="">2013</span></a><span data-dcnode-id="4329" instrument_node="">,&nbsp;p.&nbsp;102)</span></p><span data-dcnode-id="4327" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4320"><span data-dcnode-id="4324" instrument_node="">To figure out which switches initiate which actions, it would be necessary to sample them in a systematic and highly selective manner, rather than by randomly throwing different switches or even turning all of them on and off simultaneously. According to Blumberg (</span><a aria-label="Reference 2015" data-dcnode-id="4322" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1521" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4323" instrument_node="">2015</span></a><span data-dcnode-id="4321" instrument_node="">), this type of selective sampling corresponds to the spatiotemporally organized character of twitching in sleep.</span></p><p data-dcnode-id="4318"><span data-dcnode-id="4319" instrument_node="">For the sampling process to be efficient, the formation and optimization of internal models or testable hypotheses is crucial; clearly, what is needed is a theory-guided kind of sampling. And ideally, these models will not just be fitted to the input—the lights turning on and off—but to control the robot and use it to interact with the world, a stable body model will be needed. The system will have to figure out, in other words, which lights indicate worldly changes, and which ones indicate own-body movement. Again, bodily self-sampling is a condition for active inference: in bodily interaction with the world, the system is not only aiming to achieve a better fit of environmental stimuli to existing world models, but also continuously optimizing its own body model.</span></p><p data-dcnode-id="4313"><span data-dcnode-id="4317" instrument_node="">Bodily self-sampling in sleep may also be crucial for acquiring the ability to mentally simulate motor actions in wakefulness by taking them partially offline. Such internally generated action sequences may play an important role in memory consolidation, but also in future planning. See Pezzulo (</span><a aria-label="Reference 2017" data-dcnode-id="4315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d104911213e1530" title="Pezzulo, G. (2017). Tracing the roots of cognition in predictive processing. In T. K. Metzinger &amp; W. Wiese (Eds.), Philosophy and Predictive Processing. Frankfurt: MIND Group."><span data-dcnode-id="4316" instrument_node="">2017</span></a><span data-dcnode-id="4314" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="17." data-dcnode-id="4292" id="Fn17"><div class="c-article-footnote--listed__content" data-dcnode-id="4293"><p data-dcnode-id="4294"><span data-dcnode-id="4310" instrument_node="">Though I have not offered a detailed discussion of this here, it is instructive to consider that in wakefulness, interoceptive predictions are thought to be closely linked to the experience of presence (Seth </span><a aria-label="Reference 2013" data-dcnode-id="4308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d104911213e1566" title="Seth, A. K. (2013). Interoceptive inference, emotion, and the embodied self. Trends in Cognitive Sciences, 17(11), 565–573."><span data-dcnode-id="4309" instrument_node="">2013</span></a><span data-dcnode-id="4307" instrument_node="">). Not much is known about interoception in dreams, but this is another area in which we might expect continued own-body perception to modulate dream experience. This is particularly promising as interoception may be closely linked to emotions (Seth </span><a aria-label="Reference 2013" data-dcnode-id="4305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d104911213e1569" title="Seth, A. K. (2013). Interoceptive inference, emotion, and the embodied self. Trends in Cognitive Sciences, 17(11), 565–573."><span data-dcnode-id="4306" instrument_node="">2013</span></a><span data-dcnode-id="4304" instrument_node="">), and emotions play a central role in the phenomenology of dreaming (Sikka et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d104911213e1572" title="Sikka, P., Valli, K., Virta, T., &amp; Revonsuo, A. (2014). I know how you felt last night, or do I? Self-and external ratings of emotions in REM sleep dreams. Consciousness and Cognition, 25, 51–66."><span data-dcnode-id="4303" instrument_node="">2014</span></a><span data-dcnode-id="4301" instrument_node="">). See Windt (</span><a aria-label="Reference 2015a" data-dcnode-id="4299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1575" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4300" instrument_node="">2015a</span></a><span data-dcnode-id="4298" instrument_node="">,&nbsp;p.&nbsp;370ff) for a discussion of dream emotions in relation to weak functional embodiment; for a discussion of interoception and emotion in dreams from the perspective of predictive processing, see Bucci and Grasso (</span><a aria-label="Reference 2017" data-dcnode-id="4296" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d104911213e1578" title="Bucci, A., &amp; Grasso, M. (2017). Sleep and dreaming in the predictive processing framework. In T. K. Metzinger &amp; W. Wiese (Eds.), Philosophy and predictive processing. Frankfurt: MIND Group."><span data-dcnode-id="4297" instrument_node="">2017</span></a><span data-dcnode-id="4295" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="18." data-dcnode-id="4285" id="Fn18"><div class="c-article-footnote--listed__content" data-dcnode-id="4286"><p data-dcnode-id="4287"><span data-dcnode-id="4291" instrument_node="">One aspect of this account will be to make sense of the association between dreams and spontaneous thoughts, daydreams, and waking imagination. Based on neurophysiological and phenomenological similarities, it has been suggested that dreaming is closely related to spontaneous thought and mind wandering during wakefulness and that both are expressions of the same cognitive processes (Fox et&nbsp;al. </span><a aria-label="Reference 2013" data-dcnode-id="4289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d104911213e1724" title="Fox, K. C. R., Nijeboer, S., Solomonova, E., Domhoff, G. W., &amp; Christoff, K. (2013). Dreaming as mind wandering: Evidence from functional neuroimaging and first-person content reports. Frontiers in Human Neuroscience, 7."><span data-dcnode-id="4290" instrument_node="">2013</span></a><span data-dcnode-id="4288" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="19." data-dcnode-id="4275" id="Fn19"><div class="c-article-footnote--listed__content" data-dcnode-id="4276"><p data-dcnode-id="4277"><span data-dcnode-id="4284" instrument_node="">Certain cases of heautoscopy, in which the sense of self-location either alternates between a visual double and the physical body or the subject feels simultaneously located in both, may be an exception (Blanke and Mohr </span><a aria-label="Reference 2005" data-dcnode-id="4282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d104911213e1819" title="Blanke, O., &amp; Mohr, C. (2005). Out-of-body experience, heautoscopy, and autoscopic hallucination of neurological origin: Implications for neurocognitive mechanisms of corporeal awareness and self-consciousness. Brain Research Reviews, 50(1), 184–199."><span data-dcnode-id="4283" instrument_node="">2005</span></a><span data-dcnode-id="4281" instrument_node="">). But as one would expect, such cases of bilocation (Furlanetto et&nbsp;al. </span><a aria-label="Reference 2013" data-dcnode-id="4279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d104911213e1822" title="Furlanetto, T., Bertone, C., &amp; Becchio, C. (2013). The bilocated mind: New perspectives on self-localization and self-identification. Frontiers in Human Neuroscience, 7, 71."><span data-dcnode-id="4280" instrument_node="">2013</span></a><span data-dcnode-id="4278" instrument_node="">) and simultaneous identification with two body models appear to be rare.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="20." data-dcnode-id="4265" id="Fn20"><div class="c-article-footnote--listed__content" data-dcnode-id="4266"><p data-dcnode-id="4267"><span data-dcnode-id="4274" instrument_node="">Tellingly, Wiese (</span><a aria-label="Reference 2016" data-dcnode-id="4272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d104911213e1926" title="Wiese, W. (2016). Action is enabled by systematic misrepresentations. Erkenntnis, Online first, pp. 1–20."><span data-dcnode-id="4273" instrument_node="">2016</span></a><span data-dcnode-id="4271" instrument_node="">) discusses attenuation for the sensory consequences of self-generated movements, as in self-tickling, to propose that systematic but evolutionarily beneficial misrepresentation plays a central role in predictive processing accounts of movement and action generation. More generally, attenuation of self-generated stimuli plays an important role in predictive processing accounts: to enable action, we need to attend away from our current bodily state. For example, when intending to move, proprioceptive prediction errors need to be suppressed and the expected precision of ascending sensory prediction errors from lower to higher levels needs to be attenuated. An intriguing observation is that this process may be closely related to the phenomenology of bodily action in standard wakefulness. In a recent publication, Limanowski (</span><a aria-label="Reference 2017" data-dcnode-id="4269" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d104911213e1929" title="Limanowski, J. (2017). (Dis-)Attending to the body. In T. K. Metzinger &amp; W. Wiese (Eds.), Philosophy and predictive processing. Frankfurt: MIND Group."><span data-dcnode-id="4270" instrument_node="">2017</span></a><span data-dcnode-id="4268" instrument_node="">,&nbsp;p.&nbsp;5) writes, that “to be able to interact with the world, I need to withdraw attention from my body’s current state and focus it on what I predict sensing in my desired state. This conclusion is very similar to that of classical phenomenology, namely, that the ‘experiential absence’ of the body is necessary for action in the world—being a lived body-environment—and that attention directed towards the objective body is detrimental to normal performance.” It might also explain why sometimes, attention can disrupt performance.</span></p></div></li></ol></div></div></section><div data-dcnode-id="2377" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="2378" data-title="References"><div class="c-article-section" data-dcn
