nk-section-d104911213e700" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5579" instrument_node="">2015a</span></a><span data-dcnode-id="5577" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="5575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR156" id="ref-link-section-d104911213e703" title="Windt, J. M. (2015b). Just in time-dreamless sleep experience as pure subjective temporality: A commentary on Evan Thompson. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 37(C). Frankfurt am Main: MIND Group."><span data-dcnode-id="5576" instrument_node="">b</span></a><span data-dcnode-id="5574" instrument_node="">). Given the characterization of dreaming as </span><i data-dcnode-id="5572"><span data-dcnode-id="5573" instrument_node="">here-and-now</span></i><span data-dcnode-id="5571" instrument_node=""> experience, this makes good theoretical sense: the experience of spatiotemporal self-location is central to feeling present in a world and requires at least a basic distinction between self and non-self. When this basic distinction is lost, the phenomenal </span><i data-dcnode-id="5569"><span data-dcnode-id="5570" instrument_node="">here</span></i><span data-dcnode-id="5568" instrument_node=""> and the immersive structure of dreaming disappear with it. Without an internal first-person perspective, there is nothing to ground the appearance of a world experienced as distinct from the self.</span></p><p data-dcnode-id="5559"><span data-dcnode-id="5566" instrument_node="">Where weak phenomenal embodiment characterizes a majority of dreams, these rare cases of phenomenal disembodiment provide a cutoff line for identifying minimal forms of dreaming, because they show that spatiotemporal self-location can persist even when bodily experience is lost. And because such instances of phenomenal disembodiment still involve a basic kind of phenomenal selfhood—a self that is experienced as disembodied—analyzing such examples can extend and enrich accounts of minimal phenomenal selfhood in wakefulness.</span><sup data-dcnode-id="5561"><a data-dcnode-id="5562" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">Footnote </span></span><span data-dcnode-id="5563" instrument_node="">5</span></a></sup><span data-dcnode-id="5560" instrument_node="">
</span></p><p data-dcnode-id="5542"><span data-dcnode-id="5558" instrument_node="">
Blanke and Metzinger (</span><a aria-label="Reference 2009" data-dcnode-id="5556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d104911213e735" title="Blanke, O., &amp; Metzinger, T. (2009). Full-body illusions and minimal phenomenal selfhood. Trends in Cognitive Sciences, 13(1), 7–13."><span data-dcnode-id="5557" instrument_node="">2009</span></a><span data-dcnode-id="5555" instrument_node="">) analyzed full-body illusions to identify the minimally sufficient set of necessary conditions for self-experience. In full-body illusions, multisensory conflict, usually between visual and tactile stimulation, is used to create the illusion in healthy participants of identifying with an artificial body or avatar. In a classical setup (Lenggenhager et&nbsp;al. </span><a aria-label="Reference 2007" data-dcnode-id="5553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d104911213e738" title="Lenggenhager, B., Tadi, T., Metzinger, T., &amp; Blanke, O. (2007). Video ergo sum: Manipulating bodily self-consciousness. Science, 317(5841), 1096–1099."><span data-dcnode-id="5554" instrument_node="">2007</span></a><span data-dcnode-id="5552" instrument_node="">), the participant is stroked on their back while seeing, through a head-mounted display, strokes being applied to the back of an avatar who appears to be standing in from of them. When the seen and felt strokes occur synchronously, subjective and behavioral measures indicate that self-location and self-identification shift towards the avatar—almost as if the participant now </span><i data-dcnode-id="5550"><span data-dcnode-id="5551" instrument_node="">felt </span></i><span data-dcnode-id="5549" instrument_node="">the strokes where they were seeing them, in the avatar’s back, and as if the phenomenal </span><i data-dcnode-id="5547"><span data-dcnode-id="5548" instrument_node="">here</span></i><span data-dcnode-id="5546" instrument_node=""> had drifted toward the avatar. Because participants remain passive throughout the experiment, Blanke and Metzinger (</span><a aria-label="Reference 2009" data-dcnode-id="5544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d104911213e747" title="Blanke, O., &amp; Metzinger, T. (2009). Full-body illusions and minimal phenomenal selfhood. Trends in Cognitive Sciences, 13(1), 7–13."><span data-dcnode-id="5545" instrument_node="">2009</span></a><span data-dcnode-id="5543" instrument_node="">) argue that agency is not necessary for the phenomenology of selfhood; the experience of body ownership, or of identifying with the content of a global body representation, together with spatiotemporal self-location and a visuospatial first-person perspective, are sufficient.</span></p><p data-dcnode-id="5534"><span data-dcnode-id="5541" instrument_node="">The example of phenomenal disembodiment in dreams, however, suggest an even simpler account: spatiotemporal self-location is sufficient for self-identification and the origin of a (visuo-)spatial first-person perspective, and minimal phenomenal selfhood does not require body ownership (for a fuller discussion, see Windt </span><a aria-label="Reference 2010" data-dcnode-id="5539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR153" id="ref-link-section-d104911213e753" title="Windt, J. M. (2010). The immersive spatiotemporal hallucination model of dreaming. Phenomenology and the Cognitive Sciences, 9(2), 295–316."><span data-dcnode-id="5540" instrument_node="">2010</span></a><span data-dcnode-id="5538" instrument_node="">, </span><a aria-label="Reference 2015a" data-dcnode-id="5536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e756" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5537" instrument_node="">2015a</span></a><span data-dcnode-id="5535" instrument_node="">, chap.&nbsp;11). The analysis of dreams—including minimal dreams as well as different kinds of bodily experience in dreams—can thus afford a richer, more differentiated understanding of what exactly is involved in the experience not just of phenomenal selfhood, but of owning and identifying with a body and being an embodied agent.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5532" id="Sec5"><span data-dcnode-id="5533" instrument_node="">Functional embodiment in dreams</span></h3><p data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">The next to step is to investigate the functional claim that dreaming is a state of cranial envatment characterized by a near-complete blockade of sensory input and motor output. The clearest counterexample to the sensory input blockade are cases in which environmental and/or bodily stimuli are incorporated in dreams without causing awakening. This can happen spontaneously, as when the sound of an alarm clock or a siren becomes integrated in a dream; but experimental stimulation in the laboratory can also be used to systematically investigate related dream content under more controlled conditions.</span></p><p data-dcnode-id="5516"><span data-dcnode-id="5529" instrument_node="">Generally, there is evidence that different types of stimuli (such as light flashes, sounds, or odors) can be incorporated in dreams, but the overall incorporation rate tends to be variable and quite low. The highest incorporation rates appear to be achieved for body stimulation. For example, in one study, sprays of water on the skin were incorporated in dreams in 42% of cases; by contrast, sounds and light flashes were incorporated in only 9 and 23% of cases, respectively (Dement and Wolpert </span><a aria-label="Reference 1958" data-dcnode-id="5527" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d104911213e770" title="Dement, W., &amp; Wolpert, E. A. (1958). The relation of eye movements, body motility, and external stimuli to dream content. Journal of Experimental Psychology, 55(6), 543."><span data-dcnode-id="5528" instrument_node="">1958</span></a><span data-dcnode-id="5526" instrument_node="">). Inflation of a blood pressure cuff on the leg leads to particularly high incorporation rates between 40 and 80% (Nielsen </span><a aria-label="Reference 1993" data-dcnode-id="5524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d104911213e773" title="Nielsen, T. A. (1993). Changes in the kinesthetic content of dreams following somatosensory stimulation of leg muscles during REM sleep. Dreaming, 3(2), 99."><span data-dcnode-id="5525" instrument_node="">1993</span></a><span data-dcnode-id="5523" instrument_node="">; Nielsen et&nbsp;al. </span><a aria-label="Reference 1995" data-dcnode-id="5521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d104911213e776" title="Nielsen, T., Ouellet, L., &amp; Zadra, A. (1995). Pressure stimulation during REM sleep alters dream limb activity and body bizarreness. Sleep Research, 24, 134."><span data-dcnode-id="5522" instrument_node="">1995</span></a><span data-dcnode-id="5520" instrument_node="">; Sauvageau et&nbsp;al. </span><a aria-label="Reference 1998" data-dcnode-id="5518" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d104911213e779" title="Sauvageau, A., Nielsen, T. A., &amp; Montplaisir, J. (1998). Effects of somatosensory stimulation on dream content in gymnasts and control participants: Evidence of vestibulomotor adaptation in REM Sleep. Dreaming, 8(2), 125–134."><span data-dcnode-id="5519" instrument_node="">1998</span></a><span data-dcnode-id="5517" instrument_node="">). Most instances of incorporation were directly related to the blood pressure cuff or more generally to the legs, as in dreams of wearing strange shoes, having trouble walking, or even experiencing pain. Typically, blood pressure cuff-related themes also seemed to be a motivating factor driving the dream narrative. In other reports, the stimulus was displaced to the non-stimulated leg or even to other dream characters. Consider the following example involving blood-pressure cuff stimulation to the right leg:</span></p><blockquote class="c-blockquote" data-dcnode-id="5504"><div class="c-blockquote__body" data-dcnode-id="5505"><span data-dcnode-id="5515" instrument_node="">
</span><p data-dcnode-id="5507"><span data-dcnode-id="5514" instrument_node="">At one point the horse was rolling right across his body. I head this unnff! sound as if it </span><i data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">hurt</span></i><span data-dcnode-id="5511" instrument_node=""> him when it rolled across his legs. [...] He got up and [...] put the horse’s right hind foot in the suitcase-like thing with a metal box so he wouldn’t stray. (Nielsen </span><a aria-label="Reference 1993" data-dcnode-id="5509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d104911213e789" title="Nielsen, T. A. (1993). Changes in the kinesthetic content of dreams following somatosensory stimulation of leg muscles during REM sleep. Dreaming, 3(2), 99."><span data-dcnode-id="5510" instrument_node="">1993</span></a><span data-dcnode-id="5508" instrument_node="">,&nbsp;p.&nbsp;493)</span></p><span data-dcnode-id="5506" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5490"><span data-dcnode-id="5503" instrument_node="">There is also some evidence that vestibular stimulation during sleep using rotating chairs (Hoff </span><a aria-label="Reference 1929" data-dcnode-id="5501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d104911213e795" title="Hoff, H. (1929). Zusammenhang von Vestibulärfunktion, Schlafstellung und Traumleben. European Neurology, 71(5–6), 366–372."><span data-dcnode-id="5502" instrument_node="">1929</span></a><span data-dcnode-id="5500" instrument_node="">; Hoff and Pötzl </span><a aria-label="Reference 1937" data-dcnode-id="5498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d104911213e798" title="Hoff, H., &amp; Pötzl, O. (1937). Über die labyrinthären Beziehungen von Flugsensationen und Flugträumen. European Neurology, 97(4), 193–211."><span data-dcnode-id="5499" instrument_node="">1937</span></a><span data-dcnode-id="5497" instrument_node="">) or rocking (Leslie and Ogilvie </span><a aria-label="Reference 1996" data-dcnode-id="5495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d104911213e801" title="Leslie, K., &amp; Ogilvie, R. (1996). Vestibular dreams: The effect of rocking on dream mentation. Dreaming, 6(1), 1."><span data-dcnode-id="5496" instrument_node="">1996</span></a><span data-dcnode-id="5494" instrument_node="">) leads to vestibular sensations such as flying in dreams, as well as to lucidity (for further references and discussion, see Schönhammer </span><a aria-label="Reference 2005" data-dcnode-id="5492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d104911213e804" title="Schönhammer, R. (2005). ’Typical dreams’: Reflections of arousal. Journal of Consciousness Studies, 12(4–5), 18–37."><span data-dcnode-id="5493" instrument_node="">2005</span></a><span data-dcnode-id="5491" instrument_node="">).</span></p><p data-dcnode-id="5488"><span data-dcnode-id="5489" instrument_node="">Investigating varying degrees of correspondence between dream experience and real-body stimulation would be a fascinating project for future research. But for now, the important point is that these cases can be conceptualized as involving distorted or illusory own-body perception. Contrary to the cranial envatment view, the way the body is experienced in these dreams is not hallucinatory, in the sense of an experience arising completely independently of a contemporaneous external stimulus source. This is all the more remarkable as these bodily illusions appear to be seamlessly integrated with internally generated (and hence hallucinatory) visual dream imagery.</span></p><p data-dcnode-id="5468"><span data-dcnode-id="5487" instrument_node="">The next question is whether bodily experience in dreams can more generally be described by appealing to illusory own-body perception. A plausible candidate are dreams in which the dreamer experiences trouble moving, as in dreams of being unable to flee from a pursuer (Schönhammer </span><a aria-label="Reference 2005" data-dcnode-id="5485" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d104911213e813" title="Schönhammer, R. (2005). ’Typical dreams’: Reflections of arousal. Journal of Consciousness Studies, 12(4–5), 18–37."><span data-dcnode-id="5486" instrument_node="">2005</span></a><span data-dcnode-id="5484" instrument_node="">; I return to this point in Sect.&nbsp;</span><a data-dcnode-id="5482" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec10"><span data-dcnode-id="5483" instrument_node="">5.2</span></a><span data-dcnode-id="5481" instrument_node="">). The feeling of extreme effort, incomplete control over the legs, or outright paralysis can plausibly be explained as an illusory perception of REM-sleep-related muscular paralysis—almost as if the relative immobility of the sleeping body were hampering internally experienced dream movement. But the sleeping body can also be reflected on the level of dream content in a different way. At sleep onset, when the feeling of the bedsheets on one’s skin or of the weight of one’s body on the mattress are lost, this can result in vestibular sensations of weightlessness, floating, or falling (Cheyne </span><a aria-label="Reference 2003" data-dcnode-id="5479" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d104911213e819" title="Cheyne, J. A. (2003). Sleep paralysis and the structure of waking-nightmare hallucinations. Dreaming, 13(3), 163."><span data-dcnode-id="5480" instrument_node="">2003</span></a><span data-dcnode-id="5478" instrument_node="">). These cases are interesting because they suggest that the </span><i data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">loss </span></i><span data-dcnode-id="5475" instrument_node="">of input from the sleeping body can lead to intense feelings of bodily presence in dreams.</span><sup data-dcnode-id="5470"><a data-dcnode-id="5471" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">Footnote </span></span><span data-dcnode-id="5472" instrument_node="">6</span></a></sup><span data-dcnode-id="5469" instrument_node="">
</span></p><p data-dcnode-id="5457"><span data-dcnode-id="5467" instrument_node="">Regarding output, the clearest example of concordance between dream movement sensations and outward behavior is dream enactment in REM sleep behavior disorder (RBD). RBD patients, due to a loss of REM-sleep muscular paralysis, exhibit seemingly goal-directed and often aggressive behaviors in REM sleep (Howell and Schenck </span><a aria-label="Reference 2015" data-dcnode-id="5465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d104911213e850" title="Howell, M. J., &amp; Schenck, C. H. (2015). REM sleep behavior disorder. In Disorders of sleep and circadian rhythms in Parkinson’s Disease (pp. 131–144). Springer."><span data-dcnode-id="5466" instrument_node="">2015</span></a><span data-dcnode-id="5464" instrument_node="">). These can disrupt sleep and place both the patients themselves and their sleeping partners at risk. Often, patients report dreams whose content corresponds to the observed behaviors. In complex RBD behaviors, real-eye movements are coordinated with limb movements. If we additionally assume that gaze shifts performed within the dream correspond to real-eye movements (as in the classical scanning hypothesis; see Dement and Kleitman </span><a aria-label="Reference 1957" data-dcnode-id="5462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d104911213e853" title="Dement, W., &amp; Kleitman, N. (1957). The relation of eye movements during sleep to dream activity: An objective method for the study of dreaming. Journal of Experimental Psychology, 53(5), 339–346."><span data-dcnode-id="5463" instrument_node="">1957</span></a><span data-dcnode-id="5461" instrument_node="">), this suggests that dream gaze shifts are matched to outward bodily action (Leclair-Visonneau et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="5459" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d104911213e856" title="Leclair-Visonneau, L., Oudiette, D., Gaymard, B., Leu-Semenescu, S., &amp; Arnulf, I. (2010). Do the eyes scan dream images during rapid eye movement sleep? Evidence from the rapid eye movement sleep behaviour disorder model. Brain, 133(6), 1737–1746."><span data-dcnode-id="5460" instrument_node="">2010</span></a><span data-dcnode-id="5458" instrument_node="">).</span></p><p data-dcnode-id="5449"><span data-dcnode-id="5456" instrument_node="">These cases of concordance between sleep behavior and dream experience are sometimes thought to support the phenomenological equivalence claim. Here, the idea is that the only difference between standard dreaming and dream enactment is the presence versus absence of muscular atonia (Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e862" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5455" instrument_node="">2006</span></a><span data-dcnode-id="5453" instrument_node="">). Because REM sleep paralysis is thought to be peripheral to the phenomenology of dreaming, this leads to the idea that dreaming in general is a simulation of an internal behavioral space (Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e865" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5452" instrument_node="">2003</span></a><span data-dcnode-id="5450" instrument_node="">) including wake-like, subjective experience of movement and embodied action. There are, however, reasons to be cautious about such generalizations.</span></p><p data-dcnode-id="5438"><span data-dcnode-id="5448" instrument_node="">First, while there is some empirical support for concordance between outward movements in RBD and dream content (Howell and Schenck </span><a aria-label="Reference 2015" data-dcnode-id="5446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d104911213e871" title="Howell, M. J., &amp; Schenck, C. H. (2015). REM sleep behavior disorder. In Disorders of sleep and circadian rhythms in Parkinson’s Disease (pp. 131–144). Springer."><span data-dcnode-id="5447" instrument_node="">2015</span></a><span data-dcnode-id="5445" instrument_node="">), the evidence is largely anecdotal. Part of the problem is methodological, as most studies do not match dream reports to individual behavioral episodes (for an exception, see Valli et&nbsp;al. </span><a aria-label="Reference 2012" data-dcnode-id="5443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR144" id="ref-link-section-d104911213e874" title="Valli, K., Frauscher, B., Gschliesser, V., Wolf, E., Falkenstetter, T., Schönwald, S. V., et al. (2012). Can observers link dream content to behaviours in rapid eye movement sleep behaviour disorder? A cross-sectional experimental pilot study. Journal of Sleep Research, 21(1), 21–29."><span data-dcnode-id="5444" instrument_node="">2012</span></a><span data-dcnode-id="5442" instrument_node="">). But there also appears to be real variation, with some RBD patients claiming that they never experience any dreams associated with their behavioral episodes (Herlin et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d104911213e877" title="Herlin, B., Leu-Semenescu, S., Chaumereuil, C., &amp; Arnulf, I. (2015). Evidence that non-dreamers do dream: A REM sleep behaviour disorder model. Journal of Sleep Research, 24(6), 602–609."><span data-dcnode-id="5441" instrument_node="">2015</span></a><span data-dcnode-id="5439" instrument_node="">). Consequently, there might be varying degrees of concordance between sleep behavior and dream experience in RBD.</span></p><p data-dcnode-id="5418"><span data-dcnode-id="5437" instrument_node="">Second, dream enactment behavior is not exclusive to RBD, but also occurs in healthy subjects (Nielsen et&nbsp;al. </span><a aria-label="Reference 2009" data-dcnode-id="5435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d104911213e883" title="Nielsen, T., Svob, C., &amp; Kuiken, D. (2009). Dream-enacting behaviors in a normal population. Sleep, 32(12), 1629–1636."><span data-dcnode-id="5436" instrument_node="">2009</span></a><span data-dcnode-id="5434" instrument_node="">). It is also not exclusive to REM sleep. Some studies suggest that NREM parasomnias such as sleepwalking and sleep talking are often accompanied by subjective recall of seemingly associated experiences (Arkin et&nbsp;al. </span><a aria-label="Reference 1970" data-dcnode-id="5432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d104911213e886" title="Arkin, A. M., Toth, M. F., Baker, J., &amp; Hastey, J. M. (1970). The degree of concordance between the content of sleep talking and mentation recalled in wakefulness. The Journal of Nervous and Mental Disease, 151(6), 375–393."><span data-dcnode-id="5433" instrument_node="">1970</span></a><span data-dcnode-id="5431" instrument_node="">; Oudiette et&nbsp;al. </span><a aria-label="Reference 2009" data-dcnode-id="5429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d104911213e889" title="Oudiette, D., Leu, S., Pottier, M., Buzare, M.-A., Brion, A., &amp; Arnulf, I. (2009). Dreamlike mentations during sleepwalking and sleep terrors in adults. Sleep, 32(12), 1621–1627."><span data-dcnode-id="5430" instrument_node="">2009</span></a><span data-dcnode-id="5428" instrument_node="">; see Windt et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="5426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e892" title="Windt, J. M., Nielsen, T., &amp; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="5427" instrument_node="">2016</span></a><span data-dcnode-id="5425" instrument_node=""> for discussion and further references).</span><sup data-dcnode-id="5420"><a data-dcnode-id="5421" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="5423"><span data-dcnode-id="5424" instrument_node="">Footnote </span></span><span data-dcnode-id="5422" instrument_node="">7</span></a></sup><span data-dcnode-id="5419" instrument_node=""> The degree to which these experiences match the observed behavior remains to be further investigated, and whether to classify them as immersive dreams is an open question. For now, my main point is that the relationship between conscious mentation and outward behavior in different sleep stages is both variable and insufficiently understood. While the existing evidence for correspondence between some sleep behaviors and subjectively experienced dream movement is compelling, there does not appear to exist a clean mapping of these cases of concordance to sleep stages (REM vs. NREM sleep), particular participant groups (e.g. RBD patients vs. patients experiencing NREM parasomnias or healthy subjects), or kinds of sleep-related experience (dreaming vs. non-immersive dreamless sleep experience). Incidentally, this fits in well with the varying types of concordance between dream imagery and external stimulation in sleep. In both cases, a more complex account is needed.</span></p><p data-dcnode-id="5404"><span data-dcnode-id="5417" instrument_node="">Third, there is independent evidence that there might be varying degrees of correspondence between dream experience and subtler kinds of muscular activity in sleep. An array of behaviors occurs throughout normal sleep, ranging from gross body movements (such as postural shifts), to complex limb movements (such as adjusting the covers), to fine muscle activity (such as muscle twitches in the limbs). How these behaviors relate to dreams has been only minimally studied (Gardner et&nbsp;al. </span><a aria-label="Reference 1975" data-dcnode-id="5415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d104911213e910" title="Gardner, R, Jr., Grossman, W. I., Roffwarg, H. P., &amp; Weiner, H. (1975). The relationship of small limb movements during REM sleep to dreamed limb action. Psychosomatic Medicine, 37(2), 147–159."><span data-dcnode-id="5416" instrument_node="">1975</span></a><span data-dcnode-id="5414" instrument_node="">), but in some cases an association seems plausible. For instance, nightmare sufferers have frequent leg movements in sleep (Germain and Nielsen </span><a aria-label="Reference 2003" data-dcnode-id="5412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d104911213e913" title="Germain, A., &amp; Nielsen, T. A. (2003). Sleep pathophysiology in posttraumatic stress disorder and idiopathic nightmare sufferers. Biological Psychiatry, 54(10), 1092–1098."><span data-dcnode-id="5413" instrument_node="">2003</span></a><span data-dcnode-id="5411" instrument_node="">), and limb and head jerks, which are frequent at sleep onset, are often related to sleep-onset imagery (Nielsen </span><a aria-label="Reference 1992" data-dcnode-id="5409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e916" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="5410" instrument_node="">1992</span></a><span data-dcnode-id="5408" instrument_node="">, </span><a aria-label="Reference 2017" data-dcnode-id="5406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d104911213e919" title="Nielsen, T. (2017). Microdream neurophenomenology. Neuroscience of Consciousness, 3(1), 1–17."><span data-dcnode-id="5407" instrument_node="">2017</span></a><span data-dcnode-id="5405" instrument_node="">).</span></p><p data-dcnode-id="5402"><span data-dcnode-id="5403" instrument_node="">In sum, the standard account of RBD dream enactment behavior as an exception in which the functional output blockade has broken down seems oversimplified in several respects. There is in fact a range of outward behaviors in sleep with varying degrees of complexity. While their relationship to dream experience is insufficiently understood, it seems likely that there will be varying degrees of concordance and discordance to dream movements, perhaps depending on the complexity and magnitude of outward movements and their occurrence in different sleep stages.</span></p><p data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">More generally, instances of stimulus incorporation in dreams and continued motor behavior during sleep count against the cranial envatment thesis. The relationship between dream experience and the sleeping body seems both too common and too variable for dreams to be appropriately described as functionally disembodied states. A more cautious claim is that dreams are weakly functionally embodied states, in which there is a large degree of variation both in the complexity of outward movements and in the degree of concordance between dream imagery on the one hand and external stimuli and motor activity on the other hand. A more speculative proposal is that in a majority of dreams, the functional connection between dream experience and the sleeping body is altered, but not obliterated. At least a subgroup of bodily experiences in dreams might then be re-described as own-body illusions, involving misperception of the sleeping body rather than arising completely independently of real-body influences. This would be theoretically informative because bodily experiences in dreams could then be placed on a continuum with full-body and body-part illusions in wakefulness.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5398" id="Sec6"><span data-dcnode-id="5399" instrument_node="">Towards a unified account of bodily experience in dreams and its real-body basis</span></h3><p data-dcnode-id="5396"><span data-dcnode-id="5397" instrument_node="">We can now integrate the claims on phenomenal and functional embodiment in dreams developed so far into a single, unified account: dreams are best conceived of as weakly phenomenally-functionally embodied states. In principle, the phenomenal and functional claims implicit in this view are separable, and throughout this section I have argued that each on their own is more empirically plausible than competing claims in the literature. But in addition, the integrated description of dreams as weakly phenomenally-functionally embodied states has a higher degree of internal consistency than versions of the cranial envatment view in which dreaming is nonetheless claimed to exactly replicate wake-like bodily experience. In the account I am proposing, there is no principled explanatory disconnect between the phenomenological and functional levels of description. Instead, we can begin&nbsp;to see the outlines of an explanatory account, in which varying degrees in phenomenal embodiment naturally result from varying degrees in functional embodiment.</span></p><p data-dcnode-id="5373"><span data-dcnode-id="5395" instrument_node="">This account stands in the tradition of a theory that was popular in the nineteenth century: </span><i data-dcnode-id="5393"><span data-dcnode-id="5394" instrument_node="">Leibreiztheorie</span></i><span data-dcnode-id="5392" instrument_node="">, or somatic source theory (e.g. Macnish </span><a aria-label="Reference 1838" data-dcnode-id="5390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d104911213e944" title="Macnish, R. (1838). The philosophy of sleep. Glasgow: WR M’Phun."><span data-dcnode-id="5391" instrument_node="">1838</span></a><span data-dcnode-id="5389" instrument_node="">; Wundt </span><a aria-label="Reference 1874" data-dcnode-id="5387" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d104911213e947" title="Wundt, W. M. (1874). Grundzüge der physiologischen psychologie. Leipzig: W. Engelman."><span data-dcnode-id="5388" instrument_node="">1874</span></a><span data-dcnode-id="5386" instrument_node="">; Weygandt </span><a aria-label="Reference 1893" data-dcnode-id="5384" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR151" id="ref-link-section-d104911213e950" title="Weygandt, W. (1893). Entstehung der Träume. Leipzig: Grübel &amp; Sommerblatte."><span data-dcnode-id="5385" instrument_node="">1893</span></a><span data-dcnode-id="5383" instrument_node="">). At its strongest, somatic source theory attempted to link both the occurrence and content of dreams to bodily sources.</span><sup data-dcnode-id="5378"><a data-dcnode-id="5379" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">Footnote </span></span><span data-dcnode-id="5380" instrument_node="">8</span></a></sup><span data-dcnode-id="5377" instrument_node=""> Given what is now known about sleep architecture, it seems implausible that strictly all types of dream imagery as well as the timing and occurrence of dreams are causally dependent on real-body sensations. Instead it seems likely that in a full theory of dreaming, cognitive factors and memory sources will play an important role. Newer versions of somatic source theory therefore tend to focus on specific types of dream experience, for instance by arguing that typical dreams of flying, falling, or feeling unable to move involve illusory own-body perception (Schönhammer </span><a aria-label="Reference 2005" data-dcnode-id="5375" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d104911213e960" title="Schönhammer, R. (2005). ’Typical dreams’: Reflections of arousal. Journal of Consciousness Studies, 12(4–5), 18–37."><span data-dcnode-id="5376" instrument_node="">2005</span></a><span data-dcnode-id="5374" instrument_node="">). These restricted versions are more plausible and are also consistent with emphasizing the cognitive factors underlying dream formation.</span></p><p data-dcnode-id="5368"><span data-dcnode-id="5372" instrument_node="">Likewise, my claim that dreams are weakly phenomenally-functionally embodied states comes in different strengths and requires qualification. Based on the available evidence, it seems plausible that at least a subset of bodily experiences in dreams can be re-described as involving illusory own-body perception. This leaves open the possibility of a large degree of variation in dreams from different sleep stages and the existence of a spectrum of dream experiences involving varying degrees of concordance with external stimuli and motor behavior. If there is a reasonably sharp distinction between bodily experiences that can be straightforwardly related to own-body perception on the one hand and those that seem to arise independently of external influences on the other hand, it might be best to describe the former as illusions and the latter as hallucinations. If, by contrast, there is both continuity in the degree of concordance and evidence that a body-based explanation is available even for seeming cases of discordance (I return to this idea in Sect.&nbsp;</span><a data-dcnode-id="5370" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec10"><span data-dcnode-id="5371" instrument_node="">5.2</span></a><span data-dcnode-id="5369" instrument_node="">), this would support a stronger claim in which a majority of bodily experiences in dreams are illusory. Another option would be to discard the distinction between illusions and hallucinations and rather work towards a more fine-grained framework distinguishing varying degrees of concordance and discordance. Either way, this proposal suggests that the investigation of bodily experiences in dreams and their real-body basis is an important research target, and one that may be fruitfully linked to research on bodily illusions in wakefulness.</span></p><p data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">Which reading of the weak phenomenal-functional embodiment view is best supported by the currently available evidence? How plausible is it that the account can be generalized to cover not just a subset but the majority of bodily experiences dreams? I offer a fuller explanatory account in the next section, but for now, consider again the finding that certain types of bodily experiences, such as tactile sensations, are generally rare in dreams. A working hypothesis is that when these types of bodily experience do occur in dreams, they arise in response to external sensory prompting. Nothing I have said so far excludes the possibility that such sensations can also result from spontaneous brain activity. However, the underrepresentation of these sensations in a majority of dreams, coupled with the unusually high incorporation rates following bodily stimulation, suggests a more plausible story. This is that the absence of tactile sensations in a majority of dreams is a reflection of the comparative weakening of external stimulus processing in sleep.</span></p><p data-dcnode-id="5361"><span data-dcnode-id="5365" instrument_node="">We can further bolster this claim through evolutionary considerations. Sleep, and REM sleep in particular, is a state in which the sleeping creature is highly vulnerable. If REM sleep/dreaming has a function, this should involve a trade-off between the overall benefits of dreaming—whatever those might consist in—and the costs related to decreased sensitivity to threats in the immediate sleeping environment. For creatures who customarily sleep in the dark and in a comparative state of physical inactivity, visual imagery and movement sensations, which dominate in dreams, would not create potentially risky interference. However, tactile sensations, but also sounds, if they were frequent in dreams, might decrease sensitivity to potential real-world threats. Such sensations should therefore be comparatively rare in dreams (Symons </span><a aria-label="Reference 1993" data-dcnode-id="5363" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR141" id="ref-link-section-d104911213e976" title="Symons, D. (1993). The stuff that dreams aren’t made of: Why wake-state and dream-state sensory experiences differ. Cognition, 47(3), 181–217."><span data-dcnode-id="5364" instrument_node="">1993</span></a><span data-dcnode-id="5362" instrument_node="">); and when they do arise, they should do so in response to external sensory prompting that for one reason or another fails to cause awakening.</span></p><p data-dcnode-id="5356"><span data-dcnode-id="5360" instrument_node="">But why, one might then wonder, are the incorporation rates of tactile stimulation in sleep so high—shouldn’t these types of stimuli just wake us up? One factor might be the intensity and/or duration of stimulation; another might be that familiar and/or self-generated stimuli—such as limb and posture movements during sleep, tactile sensations from the bedsheets or those caused by customary sleeping partners—are less likely to cause awakening. In addition, the perceived safety of the sleeping environment may play a role. A prediction would be that e.g. tactile stimulation or sounds should more easily lead to awakening when people are sleeping in unfamiliar and potentially dangerous environments. By contrast, when sleeping in a safe environment, we might expect incorporation in dreams to be more frequent. The sleep laboratory might be just such a safe environment—for example, participants complaining from insomnia often claim to sleep better in the laboratory than they do at home (Hirscher et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5358" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d104911213e982" title="Hirscher, V., Unbehaun, T., Feige, B., Nissen, C., Riemann, D., &amp; Spiegelhalder, K. (2015). Patients with primary insomnia in the sleep laboratory: Do they present with typical nights of sleep? Journal of Sleep Research, 24(4), 383–389."><span data-dcnode-id="5359" instrument_node="">2015</span></a><span data-dcnode-id="5357" instrument_node="">). Despite the unfamiliarity of the sleep laboratory, insomnia patients may feel safe because they know their sleep is being observed by clinical personnel. Similarly, participants in a stimulation study know that they will be receiving sensory stimulation—for instance through an inflated blood pressure cuff on the leg—during sleep. The expected nature of this stimulation may itself facilitate incorporation in dreams without causing awakening.</span></p><p data-dcnode-id="5348"><span data-dcnode-id="5355" instrument_node="">The weak phenomenal-functional embodiment claim also suggests a research strategy for addressing the body-brain-body problem of how the physical body and brain interact to bring about the conscious experience of dreaming.</span><sup data-dcnode-id="5350"><a data-dcnode-id="5351" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="5353"><span data-dcnode-id="5354" instrument_node="">Footnote </span></span><span data-dcnode-id="5352" instrument_node="">9</span></a></sup><span data-dcnode-id="5349" instrument_node=""> Here, I think the most fruitful strategy is to use paradigms that look beyond the brain. One possibility is to systematically investigate the effect of bodily stimulation (such as tactile stimulation or rocking) on dream imagery and sleep quality; another is to investigate the association between dream experience and overt muscular activity, ranging from seemingly goal-directed, whole-body movements (as in RBD) to subtle movements (as in muscle twitches). Both ideas would continue existing lines of research, but would do so in a more concentrated manner.</span></p><p data-dcnode-id="5328"><span data-dcnode-id="5347" instrument_node="">Another fascinating possibility is to look more closely at lucid dreams, in which dreamers realize they are now dreaming and often have some level of dream control (Voss et&nbsp;al. </span><a aria-label="Reference 2013" data-dcnode-id="5345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR148" id="ref-link-section-d104911213e997" title="Voss, U., Schermelleh-Engel, K., Windt, J., Frenzel, C., &amp; Hobson, A. (2013). Measuring consciousness in dreams: The lucidity and consciousness in dreams scale. Consciousness and Cognition, 22(1), 8–21."><span data-dcnode-id="5346" instrument_node="">2013</span></a><span data-dcnode-id="5344" instrument_node="">; Voss and Hobson </span><a aria-label="Reference 2015" data-dcnode-id="5342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d104911213e1000" title="Voss, U., &amp; Hobson, A. (2015). What is the state-of-the-art on lucid dreaming? In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 38(T). Frankfurt: MIND Group."><span data-dcnode-id="5343" instrument_node="">2015</span></a><span data-dcnode-id="5341" instrument_node="">). Lucid dream experiments exploit the fact that gaze shifts performed within the dream correspond to real-eye movements. By performing distinctive gaze shifts within a dream—such as repeatedly looking from right to left—lucid dreamers can signal that they have now become lucid and/or begun to engage in lucid dream experiments. After awakening, they can retrospectively confirm that the eye movement signals were intentional and they were in fact lucid. Using eye-movement recordings, these signals can be read out in the lab, enabling researchers to time the onset of lucidity. This method can also be used to investigate neural activity associated with specific dream actions such as fist clenching, as compared to actual and imagined fist clenching in wakefulness (Dresler et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d104911213e1003" title="Dresler, M., Koch, S. P., Wehrle, R., Spoormaker, V. I., Holsboer, F., Steiger, A., et al. (2011). Dreamed movement elicits activation in the sensorimotor cortex. Current Biology, 21(21), 1833–1837."><span data-dcnode-id="5340" instrument_node="">2011</span></a><span data-dcnode-id="5338" instrument_node="">). Extending this approach to additionally investigate associated changes to the physical body would be a promising next step. There is some evidence that fist clenching in lucid dreams is associated with muscle twitches in the corresponding hand (LaBerge et&nbsp;al. </span><a aria-label="Reference 1981" data-dcnode-id="5336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d104911213e1006" title="LaBerge, S. P., Nagel, L. E., Dement, W. C., &amp; Zarcone, V. P. (1981). Lucid dreaming verified by volitional communication during REM sleep. Perceptual and Motor Skills, 52, 727–732."><span data-dcnode-id="5337" instrument_node="">1981</span></a><span data-dcnode-id="5335" instrument_node="">; Fenwick et&nbsp;al. </span><a aria-label="Reference 1984" data-dcnode-id="5333" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d104911213e1009" title="Fenwick, P., Schatzman, M., Worsley, A., Adams, J., Stone, S., &amp; Baker, A. (1984). Lucid dreaming: Correspondence between dreamed and actual events in one subject during REM sleep. Biological Psychology, 18(4), 243–252."><span data-dcnode-id="5334" instrument_node="">1984</span></a><span data-dcnode-id="5332" instrument_node="">). Other lucid dream actions—such as performing a gymnastics routine—appear to be associated with changes in skin conductivity, heart, and respiration rate (Schredl and Erlacher </span><a aria-label="Reference 2011" data-dcnode-id="5330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d104911213e1013" title="Schredl, M., &amp; Erlacher, D. (2011). Dream consciousness and sleep physiology. In D. Cvetkovic &amp; I. Cosic (Eds.), States of consciousness: Experimental insights into meditation, waking, sleep, and dreams (pp. 93–108). Heidelberg: Springer."><span data-dcnode-id="5331" instrument_node="">2011</span></a><span data-dcnode-id="5329" instrument_node="">). Lucid dream research could combine imaging techniques and sensory stimulation during sleep, as well as measures of outward bodily changes, to rigorously address the body-brain-body problem in the sleep laboratory.</span></p><p data-dcnode-id="5326"><span data-dcnode-id="5327" instrument_node="">Finally, even if the weak phenomenal-functional embodiment thesis turned out to be false and a majority of bodily experiences in dreams turned out to bear no relation to the physical body, this methodological point would still stand. At its most modest, my proposal says that paying more attention to real-body movements and muscle twitches, as well as more extensive use of bodily stimulation during sleep, would be the best way to establish not just concordance, but also discordance between dream imagery and the sleeping body. But the view also holds the promise of a bolder conceptual claim: that some or perhaps even most bodily experiences in dreams are instances of illusory own-body perception.</span></p></div></div></section><section data-dcnode-id="5234" data-title="Dream enactment behavior: the puzzle of dream movement revisited"><div class="c-article-section" data-dcnode-id="5235" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5321" id="Sec7"><span data-dcnode-id="5322" instrument_node="">Dream enactment behavior: the puzzle of dream movement revisited</span></h2><div class="c-article-section__content" data-dcnode-id="5236" id="Sec7-content"><p data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Before moving on to ask how weak phenomenal embodiment and weak functional embodiment in dreams complement each other and can be integrated into a unified explanatory account, it is worth pausing to take a closer look at the relationship between the two aspects of weak functional embodiment discussed so far: sensory input and motor output. In line with the common discussion of the input and output blockades, I have been treating these as separate processes. There are, however, theoretical and empirical reasons for re-examining the relationship between them.</span></p><p data-dcnode-id="5293"><span data-dcnode-id="5318" instrument_node="">To see why, it is helpful to reconsider the concept of dream enactment behavior. This is often used to describe the association of seemingly goal-directed behavior in sleep, especially in RBD, with dream experience (e.g. Nielsen et&nbsp;al. </span><a aria-label="Reference 2009" data-dcnode-id="5316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d104911213e1031" title="Nielsen, T., Svob, C., &amp; Kuiken, D. (2009). Dream-enacting behaviors in a normal population. Sleep, 32(12), 1629–1636."><span data-dcnode-id="5317" instrument_node="">2009</span></a><span data-dcnode-id="5315" instrument_node="">). Implicit in the concept of dream </span><i data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">enactment</span></i><span data-dcnode-id="5312" instrument_node=""> behavior is a claim about the direction of causality, such that internally experienced dream movements are thought to cause outwardly observable, real-body movements. One aspect of this claim, noted earlier, is that dreaming is a complete simulation of an internal behavioral space: the only difference in dream enactment is thought to be the loss of muscular paralysis, enabling the sleeping body to outwardly mimic movements that the dream self has been performing all along (Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5310" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e1037" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5311" instrument_node="">2003</span></a><span data-dcnode-id="5309" instrument_node="">; Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5307" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e1040" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5308" instrument_node="">2006</span></a><span data-dcnode-id="5306" instrument_node="">; Leclair-Visonneau et&nbsp;al. </span><a aria-label="Reference 2010" data-dcnode-id="5304" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d104911213e1043" title="Leclair-Visonneau, L., Oudiette, D., Gaymard, B., Leu-Semenescu, S., &amp; Arnulf, I. (2010). Do the eyes scan dream images during rapid eye movement sleep? Evidence from the rapid eye movement sleep behaviour disorder model. Brain, 133(6), 1737–1746."><span data-dcnode-id="5305" instrument_node="">2010</span></a><span data-dcnode-id="5303" instrument_node="">). As REM sleep paralysis is controlled at the level of the brain stem, its loss in RBD is thought to be peripheral both to cortical processing and to the phenomenology of dreaming. A related aspect is that the causal relationship between the dream body and the physical body is taken to be unidirectional. Dream enactment behavior is typically discussed in the context of the motor output blockade, but the question of how these physical movements, postural adjustments, and associated tactile sensations feed back into ongoing dream experience is not typically addressed. However, this conception of dream enactment behavior, along with the implied unidirectional causal relationship and the dichotomous distinction between sensory input and motor output,</span><sup data-dcnode-id="5298"><a data-dcnode-id="5299" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">Footnote </span></span><span data-dcnode-id="5300" instrument_node="">10</span></a></sup><span data-dcnode-id="5297" instrument_node=""> struggles to make sense of even seemingly clear cases of dream enactment behavior. Consider an example reported by Boeve (</span><a aria-label="Reference 2010" data-dcnode-id="5295" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d104911213e1059" title="Boeve, B. F. (2010). REM sleep behavior disorder: Updated review of the core features, the RBD-neurodegenerative disease association, evolving concepts, controversies, and future directions. Annals of the New York Academy of Sciences, 1184, 15–54."><span data-dcnode-id="5296" instrument_node="">2010</span></a><span data-dcnode-id="5294" instrument_node="">,&nbsp;p.&nbsp;18), involving</span></p><blockquote class="c-blockquote" data-dcnode-id="5287"><div class="c-blockquote__body" data-dcnode-id="5288"><span data-dcnode-id="5292" instrument_node="">
</span><p data-dcnode-id="5290"><span data-dcnode-id="5291" instrument_node="">a man who held his wife’s head in a headlock while moving his legs as if running while both were attempting to sleep in bed, then exclaimed, ‘I’m gonna make that touchdown!’ and then attempted to forcefully throw her head down toward the foot of the bed. When awakened, he recalled a dream in which he was running for a touchdown, and he spiked the ‘football’ in the end zone. His wife knew precisely what he had been dreaming about.</span></p><span data-dcnode-id="5289" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">This example is striking for the seemingly high degree of correspondence between outward movements and dream experience. Indeed, the specificity of the movements is such that it seems possible to predict the content of the dream based on the observed movements alone—and this predictability is Boeve’s main reason for citing the example. My point here, however, is that this specificity is not just a matter of outward movement mirroring internal dream experience, but also of coordinated bodily interaction with a real-world object—in this case, the wife’s head! This would be hard to explain if the functional connection between dream experience and the physical body were entirely unidirectional, from dream experience to movement. The example shows that we additionally need to explain how proprioceptive feedback on limb position and tactile sensations modulate ongoing dream experience.</span></p><p data-dcnode-id="5274"><span data-dcnode-id="5284" instrument_node="">Clearly, not all cases of alleged dream enactment involve such coordinated interaction with physical objects. Sometimes, RBD patients will just jump out of bed, move their hands through the air (one such dream report later described shuffling domino pieces on a table), or kick or punch against walls or pieces of furniture (for these and further examples, see Fernandez-Arcos et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d104911213e1070" title="Fernandez-Arcos, A., Iranzo, A., Serradell, M., Gaig, C., &amp; Santamaria, J. (2015). The clinical phenotype of idiopathic Rapid eye movement sleep behavior disorder at presentation: A study in 203 consecutive patients. Sleep, 39(1), 121–132."><span data-dcnode-id="5283" instrument_node="">2015</span></a><span data-dcnode-id="5281" instrument_node="">). In such cases the contribution of incoming sensory stimuli seems negligible.</span><sup data-dcnode-id="5276"><a data-dcnode-id="5277" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">Footnote </span></span><span data-dcnode-id="5278" instrument_node="">11</span></a></sup><span data-dcnode-id="5275" instrument_node=""> But cases such as biting one’s sleeping partner or pulling their hair (as in dreams of fighting off intruders) or struggling and kicking to get rid of one’s pyjamas (where the dream report describes the attempt to free oneself from a straitjacket) require a more complex account. Here, a unidirectional explanation in which outward movements mirror dream movements that in turn unfold completely independently of environmental and bodily stimuli seems unsatisfying. A prediction is that cases of strong concordance between dream experience and outward movement will often additionally involve coordinated interaction with physical objects. The specificity of these interactions makes it appear likely that the dream movement is modulated by and perhaps even responsive to incoming sensory signals.</span></p><p data-dcnode-id="5254"><span data-dcnode-id="5273" instrument_node="">This point extends beyond REM sleep and potentially beyond dreaming. In a recent paper, Nielsen (</span><a aria-label="Reference 2017" data-dcnode-id="5271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d104911213e1085" title="Nielsen, T. (2017). Microdream neurophenomenology. Neuroscience of Consciousness, 3(1), 1–17."><span data-dcnode-id="5272" instrument_node="">2017</span></a><span data-dcnode-id="5270" instrument_node="">) emphasizes the kinetic and spatiotemporally dynamic quality of sleep onset imagery. This imagery, often called hypnagogic imagery, can range in complexity from short images seen as if on a screen, sounds, or illusory movement sensations to brief, immersive, and hence dreamlike scenes. Elsewhere, I have argued that these experiences are preliminary stages to dreams; they are </span><i data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">oneiragogic</span></i><span data-dcnode-id="5267" instrument_node=""> experiences, or experiences leading into dreams (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="5265" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1091" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5266" instrument_node="">2015a</span></a><span data-dcnode-id="5264" instrument_node="">, chap.&nbsp;11). Nielsen calls them microdreams and uses an array of examples to show how their analysis can help identify factors underlying dream imagery formation. Relevant to the present topic, he proposes that autosensory imagery related to outward limb jerks, snoring, wheezing, or verbalization is frequent at sleep onset. This idea was already developed in earlier work, where Nielsen (</span><a aria-label="Reference 1992" data-dcnode-id="5262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e1094" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="5263" instrument_node="">1992</span></a><span data-dcnode-id="5261" instrument_node="">, </span><a aria-label="Reference 1995" data-dcnode-id="5259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d104911213e1097" title="Nielsen, T. A. (1995). Describing and modeling hypnagogic imagery using a systematic self-observation procedure. Dreaming, 5(2), 75."><span data-dcnode-id="5260" instrument_node="">1995</span></a><span data-dcnode-id="5258" instrument_node="">) used an upright napping, self-observation procedure to investigate the correspondence between phasic neuromuscular events (e.g. limb jerks and head tilts) and sleep onset imagery. He found that self-movements experienced during sleep onset microdreams were much more likely to be accompanied by outward neuromuscular events than movements observed in other dream characters (Nielsen </span><a aria-label="Reference 1992" data-dcnode-id="5256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e1101" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="5257" instrument_node="">1992</span></a><span data-dcnode-id="5255" instrument_node="">). The type of neuromuscular event also made a difference, with leg jerks matching experienced movements in 80% and head tilts in roughly 20% of cases. The question again arises whether these cases allow for a clear distinction between own-body perception and outward motor activity. I propose that especially for reports such as the following, attempts to clearly separate these two aspects are likely overstated.</span></p><blockquote class="c-blockquote" data-dcnode-id="5245"><div class="c-blockquote__body" data-dcnode-id="5246"><span data-dcnode-id="5253" instrument_node="">
</span><p data-dcnode-id="5248"><span data-dcnode-id="5252" instrument_node="">I was standing at the top of a set of stairs. I had spilled some brightly colored candies all around me on the floor and down the stairs. I reached out behind me with my right foot and swept one of the candies down the stairs with my toes. On awakening, my right thigh muscles jerked slightly without displacing my leg. (Nielsen </span><a aria-label="Reference 1992" data-dcnode-id="5250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d104911213e1108" title="Nielsen, T. A. (1992). A self-observational study of spontaneous hypnagogic imagery using the upright napping procedure. Imagination, Cognition and Personality, 11(4), 353–366."><span data-dcnode-id="5251" instrument_node="">1992</span></a><span data-dcnode-id="5249" instrument_node="">,&nbsp;p.&nbsp;359)</span></p><span data-dcnode-id="5247" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">Because these experiences are typically very short, it seems hard to disentangle the timing of outward muscular activity relative to sensations of movement and argue that one preceded the other. It seems more straightforward to assume that in such cases, dream imagery, including the sensation of movement, and the outward limb jerk mutually inform each other. Motor output corresponding to dream movement and sensory feedback from the outward limb movement are interlocked and temporally smeared, shading into each other and making it difficult if not impossible to distinguish temporal order and support a unidirectional claim of causality.</span></p><p data-dcnode-id="5241"><span data-dcnode-id="5242" instrument_node="">I also find this case striking because the correspondence between dream and real-body movement seems to coincide with a salient point in transition. The episode seems to create a broader context (standing on the top of the stairs, seeing the candies) both for the experienced movement and the limb jerk, which in turn marks the beginning of action within the dream environment. The idea that the convergence of experienced movement and outward muscular activity marks the beginning of active participation in the dreams suggests that some degree of functional embodiment might facilitate or even enhance the sense of presence. In such cases, in line with the weak-phenomenal-functional embodiment thesis, autosensory imagery may be closely associated with the immersive structure of dreaming.</span></p><p data-dcnode-id="5239"><span data-dcnode-id="5240" instrument_node="">To move forward, two related challenges need to be addressed. The first is whether it is possible to give a unified explanatory account of varying degrees of concordance between bodily experience in dreams and the sleeping body. The second is whether we can do so in a way that addresses the complex interaction between dream movement and real-body movement without thereby assuming either unidirectional causality or a clear distinction between sensory input and motor output.</span></p><p data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">Finally, note how these dual challenges yield a new version of the puzzle of dream movement. Where Bradley was interested in the failure of outward movement associated with inwardly experienced dream movement, I am re-casting this as a question about their concordance. Yet, these questions are complementary and differ only in emphasis, and varying degrees of both concordance and discordance will have to be explained. This is especially true as Bradley’s account ultimately appealed to a bidirectional interaction, in which the failure of outward movement owed itself to the vagueness or indeterminacy of movement sensations (or what Bradley called movement ideas) in dreams—which in turn resulted from the lack of proprioceptive feedback. Bradley’s original question can now be subsumed under a more precise and empirically informed account in which bodily experiences in dreams, including movement sensations, involve varying degrees of own-body perception and outward muscular activity. Sensory input, motor output, and dream imagery mutually inform each other.</span></p></div></div></section><section data-dcnode-id="4518" data-title="A predictive processing account of bodily experience in dreams"><div class="c-article-section" data-dcnode-id="4519" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5232" id="Sec8"><span data-dcnode-id="5233" instrument_node="">A predictive processing account of bodily experience in dreams</span></h2><div class="c-article-section__content" data-dcnode-id="4520" id="Sec8-content"><h3 class="c-article__sub-heading" data-dcnode-id="5230" id="Sec9"><span data-dcnode-id="5231" instrument_node="">Dreaming in the predictive brain</span></h3><p data-dcnode-id="5210"><span data-dcnode-id="5229" instrument_node="">Recent philosophy and cognitive neuroscience are converging on a view of the mind that has great unifying potential and explanatory ambition: that the brain is essentially in the business of generating, testing, and optimizing internal models to predict its next expected states (Clark </span><a aria-label="Reference 2013" data-dcnode-id="5227" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d104911213e1135" title="Clark, A. (2013). Whatever next? Predictive brains, situated agents, and the future of cognitive science. Behavioral and Brain Sciences, 36(03), 181–204."><span data-dcnode-id="5228" instrument_node="">2013</span></a><span data-dcnode-id="5226" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="5224" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1138" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="5225" instrument_node="">2015</span></a><span data-dcnode-id="5223" instrument_node="">; Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5221" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1141" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5222" instrument_node="">2013</span></a><span data-dcnode-id="5220" instrument_node="">). Largely subpersonal processes operating on different hierarchical levels are thought to approximate Bayesian inference (Hohwy </span><a aria-label="Reference 2015" data-dcnode-id="5218" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d104911213e1144" title="Hohwy, J. (2015). The diversity of bayesian explanation. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 19(T). Frankfurt: MIND Group."><span data-dcnode-id="5219" instrument_node="">2015</span></a><span data-dcnode-id="5217" instrument_node="">), in which prior expectations are updated in response to sensory input with the aim of minimizing prediction error at different time scales. And while predictive processing accounts do not provide an answer to the hard problem of consciousness—the question of how neural processing gives rise to phenomenal experience or subjective character in the first place—they do sit nicely with a number of subtle aspects of the phenomenology of perception (Madary </span><a aria-label="Reference 2015" data-dcnode-id="5215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d104911213e1147" title="Madary, M. (2015). Extending the explanandum for predictive processing: A commentary on Andy Clark. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 7(C). Frankfurt: MIND Group."><span data-dcnode-id="5216" instrument_node="">2015</span></a><span data-dcnode-id="5214" instrument_node="">), including a number of perceptual and bodily illusions (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1151" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5213" instrument_node="">2013</span></a><span data-dcnode-id="5211" instrument_node="">).</span></p><p data-dcnode-id="5199"><span data-dcnode-id="5209" instrument_node="">There are several reasons for discussing predictive processing accounts in the context of dreaming. One has to do with their ambitious aim of offering a grand, unifying theory of the mind that can “explain perception and action and everything mental in between” (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5207" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1157" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5208" instrument_node="">2013</span></a><span data-dcnode-id="5206" instrument_node="">,&nbsp;p.&nbsp;1; see also Hohwy </span><a aria-label="Reference 2014" data-dcnode-id="5204" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d104911213e1160" title="Hohwy, J. (2014). The neural organ explains the mind Open MIND: Open MIND. Frankfurt: MIND Group."><span data-dcnode-id="5205" instrument_node="">2014</span></a><span data-dcnode-id="5203" instrument_node="">). As Clark (</span><a aria-label="Reference 2015" data-dcnode-id="5201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1163" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="5202" instrument_node="">2015</span></a><span data-dcnode-id="5200" instrument_node="">,&nbsp;p.&nbsp;107) puts it, these accounts offer a “cognitive package deal in which perception, understanding, dreaming, memory, and imagination may all emerge as variant expressions of the same underlying mechanistic ploy.” These accounts thus promise not just a general theory of the mind, but also aim to explain how different conscious states, including dreaming, relate to each other.</span></p><p data-dcnode-id="5188"><span data-dcnode-id="5198" instrument_node="">A further mark of their explanatory ambition is that predictive processing accounts aim towards a radical revision of the folk-psychological taxonomy of mental states, alongside a shift in perspective on the relation between mind and world. In predictive processing accounts, conscious perception is not a passive synthesizer, integrating incoming sensory signals to form a coherent internal model of what just happened in the organism’s environment. Instead the mind is cast as forward-looking and constantly striving to anticipate its next states. Perception is a proactive process rather than reactive and reconstructive. This view of perception then leads to a reframing of the relationship between perception and action in which perception, action, and attention are just different ways of optimizing predictions about sensory input (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1169" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5197" instrument_node="">2013</span></a><span data-dcnode-id="5195" instrument_node="">,&nbsp;p.&nbsp;2). As Clark (</span><a aria-label="Reference 2012" data-dcnode-id="5193" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1172" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5194" instrument_node="">2012</span></a><span data-dcnode-id="5192" instrument_node="">) puts it, perception is the outcome of an intricate dance between top-down predictions and bottom-up signals. Exploration of the environment plays an important role in this process—with action described as a form of active inference (Clark </span><a aria-label="Reference 2016" data-dcnode-id="5190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d104911213e1175" title="Clark, A. (2016). Busting out: Predictive brains, embodied minds, and the puzzle of the evidentiary veil. Nous,. doi:
                    10.1111/nous.12140
