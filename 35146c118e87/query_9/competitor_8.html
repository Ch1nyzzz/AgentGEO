                  ."><span data-dcnode-id="5191" instrument_node="">2016</span></a><span data-dcnode-id="5189" instrument_node="">).</span></p><p data-dcnode-id="5180"><span data-dcnode-id="5187" instrument_node="">A highly simplified explanation is to say that perception is involved in updating internal models to achieve a better fit with sensory inputs, whereas action involves changing sensory inputs to better fit pre-existing models. For example, moving through the environment and interacting with persons and objects are ways of adjusting sensory input while keeping the internal model stable. From this description emerges a delicate interplay between action and perception. Conceptually, they are still clearly distinguished by their different functional roles. As Hohwy (</span><a aria-label="Reference 2013" data-dcnode-id="5185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1181" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5186" instrument_node="">2013</span></a><span data-dcnode-id="5184" instrument_node="">,&nbsp;p.&nbsp;81) puts it, they “have different directions of fit between models and sensory input”. The system therefore needs to keep track of the different processes involved in updating models based on input, as in perception, and sampling the world by acting on internal models, as in action. But these different functional descriptions of action and perception are consistent with there being deep continuity between them. In particular, there need be no clearly distinct periods of activity versus rest (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1184" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5183" instrument_node="">2013</span></a><span data-dcnode-id="5181" instrument_node="">,&nbsp;p.&nbsp;81).</span></p><p data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">Predictive processing promises an account of perception and action that sits well with the requirements outlined in the preceding section: the focus is on predictive internal models and different, temporally smeared processes of hypothesis testing and prediction error minimization, thus offering an alternative to the superficial and empirically implausible dichotomy between sensory input and motor output. Moreover, the appeal to intricate interaction between top-down and bottom-up predictions on different hierarchical levels avoids the unidirectional type of causality that we have already seen to be inadequate to explain clear cases of so-called dream enactment behavior. This is a second reason for thinking this style of account can be fruitfully applied to dreaming.</span></p><p data-dcnode-id="5170"><span data-dcnode-id="5177" instrument_node="">This leads to a third and more general reason. Consider that in predictive processing accounts, perception is not just active and exploratory, but also has a distinctly cognitive, top-down flavor. The analogy between prediction error minimization in the brain and scientific hypothesis testing can help illustrate this point. In both cases, the world answers only those questions asked of it—the world does not indiscriminately reveal itself, but does so only in response to selective and hypothesis-driven sampling (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5175" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1194" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5176" instrument_node="">2013</span></a><span data-dcnode-id="5174" instrument_node="">,&nbsp;p.&nbsp;225). The foregrounding of internal models in predictive processing accounts suggests a deep continuity between perception and mental simulations such as hallucinations and imagination—as well as dreams. According to Clark (</span><a aria-label="Reference 2012" data-dcnode-id="5172" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1197" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5173" instrument_node="">2012</span></a><span data-dcnode-id="5171" instrument_node="">,&nbsp;p.&nbsp;764),</span></p><blockquote class="c-blockquote" data-dcnode-id="5164"><div class="c-blockquote__body" data-dcnode-id="5165"><span data-dcnode-id="5169" instrument_node="">
</span><p data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Systems that know how to perceive an object as a cat are thus systems that, ipso facto, are able to use a top-down cascade to bring about the kinds of activity pattern that would be characteristic of the presence of a cat. [...] Perceivers like us, if this is correct, are inevitably potential dreamers and imaginers too. Moreover, they are beings who, in dreaming and imagining, are deploying many of the very same strategies and resources used in ordinary perception.</span></p><span data-dcnode-id="5166" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5156"><span data-dcnode-id="5163" instrument_node="">Importantly, this deep continuity between perception and mental simulation, including dreams, plays a role even for predictive processing accounts that emphasize the openness of perception to the world (e.g. Clark </span><a aria-label="Reference 2012" data-dcnode-id="5161" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1205" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5162" instrument_node="">2012</span></a><span data-dcnode-id="5160" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="5158" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1208" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="5159" instrument_node="">2015</span></a><span data-dcnode-id="5157" instrument_node="">).</span></p><p data-dcnode-id="5133"><span data-dcnode-id="5155" instrument_node="">Fourth, several specific proposals for explaining REM sleep dreaming in a predictive processing framework already exist. Hobson and Friston (</span><a aria-label="Reference 2012" data-dcnode-id="5153" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d104911213e1214" title="Hobson, J. A., &amp; Friston, K. J. (2012). Waking and dreaming consciousness: Neurobiological and functional considerations. Progress in Neurobiology, 98(1), 82–98."><span data-dcnode-id="5154" instrument_node="">2012</span></a><span data-dcnode-id="5152" instrument_node="">,&nbsp;p.&nbsp;97; see also Hobson and Friston </span><a aria-label="Reference 2014" data-dcnode-id="5150" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d104911213e1217" title="Hobson, J. A., &amp; Friston, K. J. (2014). Consciousness, dreams, and inference: The cartesian theatre revisited. Journal of Consciousness Studies, 21(1–2), 6–32."><span data-dcnode-id="5151" instrument_node="">2014</span></a><span data-dcnode-id="5149" instrument_node="">) propose that “the mechanics of predictive coding provide a compelling three-way link between the physiology of PGO waves, rapid eye movements and the fictive percepts of dreaming.” On a very general level, predictive processing leads to fruitful predictions about the phenomenology of dreaming. Because in dreams, the processing of external stimuli as well as the capacity for active inference and environmental sampling are attenuated or at least altered as compared to wakefulness, one would expect the process of generating and updating predictive models to be disturbed or at least to depart from waking hypothesis testing in specific ways. As Hobson and Friston (</span><a aria-label="Reference 2012" data-dcnode-id="5147" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d104911213e1220" title="Hobson, J. A., &amp; Friston, K. J. (2012). Waking and dreaming consciousness: Neurobiological and functional considerations. Progress in Neurobiology, 98(1), 82–98."><span data-dcnode-id="5148" instrument_node="">2012</span></a><span data-dcnode-id="5146" instrument_node="">) note, in the absence of a stable visual input source, internal models cannot be reliably updated, and representational accuracy of visual dream imagery should be lost. With the exception of realistic false awakenings, in which dream imagery corresponds to the actual sleeping environment and can even realistically mimic one’s customary morning routine, dreams are striking for their misrepresentational character. Relatedly, different kinds of bizarreness—such as discontinuous jumps in the dream narrative, sudden changes (in location, dream characters, or objects), or even incongruities (such as encountering George Clooney at the breakfast table; for discussion of different types of bizarreness in dreams, see Revonsuo and Salmivalli </span><a aria-label="Reference 1995" data-dcnode-id="5144" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d104911213e1223" title="Revonsuo, A., &amp; Salmivalli, C. (1995). A content analysis of bizarre elements in dreams. Dreaming, 5(3), 169."><span data-dcnode-id="5145" instrument_node="">1995</span></a><span data-dcnode-id="5143" instrument_node="">)—now appear as the result of comparatively unconstrained and unstable hypothesis testing and model updating. As Fletcher and Frith (</span><a aria-label="Reference 2009" data-dcnode-id="5141" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d104911213e1226" title="Fletcher, P. C., &amp; Frith, C. D. (2009). Perceiving is believing: A Bayesian approach to explaining the positive symptoms of schizophrenia. Nature Reviews Neuroscience, 10(1), 48–58."><span data-dcnode-id="5142" instrument_node="">2009</span></a><span data-dcnode-id="5140" instrument_node="">,&nbsp;p.&nbsp;52) put it, “the dream state arises from disruptions in hierarchical Bayesian processing, such that sensory firing is not constrained by top-down prior information and inferences are accepted without question owing to an attenuation of the prediction-error signal from lower to higher levels.” Put in more cognitive terms, if such disruptions in processing between different levels of the hierarchy are frequent in sleep, this might explain why we usually don’t notice that we are dreaming while we are dreaming and bizarre occurrences in dreams are often met with uncritical acceptance.</span><sup data-dcnode-id="5135"><a data-dcnode-id="5136" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="5138"><span data-dcnode-id="5139" instrument_node="">Footnote </span></span><span data-dcnode-id="5137" instrument_node="">12</span></a></sup><span data-dcnode-id="5134" instrument_node="">
</span></p><p data-dcnode-id="5119"><span data-dcnode-id="5132" instrument_node="">While discussions of the bizarreness and instability of dream imagery focus on the ways in which hypothesis testing falls short in dreams as compared to wakefulness, a deeper point is that underlying these differences is a remarkable degree of continuity between dreaming and waking. This is most obviously true for the basic structural organization of experience: both dreaming and waking are immersive, characterized by the experience of a self in a world. There is also strong evidence for thematic continuity of dream content with waking experiences, thoughts, concerns, and emotions, though the exact temporal pattern with which waking memories are incorporated in dreams remains unclear (Schredl </span><a aria-label="Reference 2006" data-dcnode-id="5130" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d104911213e1242" title="Schredl, M. (2006). Factors affecting the continuity between waking and dreaming: Emotional intensity and emotional tone of the waking-life event. Sleep and Hypnosis, 8(1), 1."><span data-dcnode-id="5131" instrument_node="">2006</span></a><span data-dcnode-id="5129" instrument_node="">; Domhoff </span><a aria-label="Reference 2013" data-dcnode-id="5127" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d104911213e1245" title="Domhoff, G. W. (2013). Finding meaning in dreams: A quantitative approach. Berlin: Springer."><span data-dcnode-id="5128" instrument_node="">2013</span></a><span data-dcnode-id="5126" instrument_node="">; see Windt et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="5124" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e1248" title="Windt, J. M., Nielsen, T., &amp; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="5125" instrument_node="">2016</span></a><span data-dcnode-id="5123" instrument_node=""> for discussion and further references). Even when dream contents diverge from waking experience and in bizarre dreams, there is still a largely coherent, spatiotemporally structured world model centered on a single self. The relevance of this structural commonality between dreaming and waking experience lies at the heart of simulation views of dreaming. Consider Hobson and Friston (</span><a aria-label="Reference 2014" data-dcnode-id="5121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d104911213e1251" title="Hobson, J. A., &amp; Friston, K. J. (2014). Consciousness, dreams, and inference: The cartesian theatre revisited. Journal of Consciousness Studies, 21(1–2), 6–32."><span data-dcnode-id="5122" instrument_node="">2014</span></a><span data-dcnode-id="5120" instrument_node="">,&nbsp;p.&nbsp;8):</span></p><blockquote class="c-blockquote" data-dcnode-id="5110"><div class="c-blockquote__body" data-dcnode-id="5111"><span data-dcnode-id="5118" instrument_node="">
</span><p data-dcnode-id="5113"><span data-dcnode-id="5117" instrument_node="">Dream consciousness and its physiological underpinnings have been considered as a virtual reality model of the world that prepares us for waking consciousness [...]. This virtual reality model is formally equivalent to the generative models implicit in unconscious inference as described by Helmholtz (</span><a aria-label="Reference 1866" data-dcnode-id="5115" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d104911213e1258" title="Helmholtz, H. V. (1866). Concerning the perceptions in general. In Treatise on physiological optics (Vol. III, 3rd edn., J. P. C. Southall, Trans. 1925 Opt. Soc. Am. Section 26, reprinted New York: Dover, 1962)."><span data-dcnode-id="5116" instrument_node="">1866</span></a><span data-dcnode-id="5114" instrument_node="">/1962) and recent formulations of the Bayesian brain.</span></p><span data-dcnode-id="5112" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5096"><span data-dcnode-id="5109" instrument_node="">The idea is that on a very general level, dreaming is a state in which hypothesis testing and prediction error minimization can be rehearsed and optimized (Clark </span><a aria-label="Reference 2012" data-dcnode-id="5107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1264" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5108" instrument_node="">2012</span></a><span data-dcnode-id="5106" instrument_node="">, </span><a aria-label="Reference 2013" data-dcnode-id="5104" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d104911213e1267" title="Clark, A. (2013). Whatever next? Predictive brains, situated agents, and the future of cognitive science. Behavioral and Brain Sciences, 36(03), 181–204."><span data-dcnode-id="5105" instrument_node="">2013</span></a><span data-dcnode-id="5103" instrument_node="">; Hobson and Friston </span><a aria-label="Reference 2012" data-dcnode-id="5101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d104911213e1270" title="Hobson, J. A., &amp; Friston, K. J. (2012). Waking and dreaming consciousness: Neurobiological and functional considerations. Progress in Neurobiology, 98(1), 82–98."><span data-dcnode-id="5102" instrument_node="">2012</span></a><span data-dcnode-id="5100" instrument_node="">, </span><a aria-label="Reference 2014" data-dcnode-id="5098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d104911213e1273" title="Hobson, J. A., &amp; Friston, K. J. (2014). Consciousness, dreams, and inference: The cartesian theatre revisited. Journal of Consciousness Studies, 21(1–2), 6–32."><span data-dcnode-id="5099" instrument_node="">2014</span></a><span data-dcnode-id="5097" instrument_node="">). Dreaming thereby turns into a test case for internal model generation and optimization, suggesting that its discussion will complement and enrich predictive processing accounts that so far are mostly focused on evidence from waking.</span></p><p data-dcnode-id="5088"><span data-dcnode-id="5095" instrument_node="">There is, however, also a potential problem concerning the compatibility of existing predictive processing accounts of dreaming with the weak phenomenal-functional embodiment view. This is that in these accounts, the process of world- and self-simulation in dreams, in line with the cranial envatment view, is thought to be wholly internal and decoupled from sensory input and motor output (e.g. Fletcher and Frith </span><a aria-label="Reference 2009" data-dcnode-id="5093" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d104911213e1279" title="Fletcher, P. C., &amp; Frith, C. D. (2009). Perceiving is believing: A Bayesian approach to explaining the positive symptoms of schizophrenia. Nature Reviews Neuroscience, 10(1), 48–58."><span data-dcnode-id="5094" instrument_node="">2009</span></a><span data-dcnode-id="5092" instrument_node="">; Hobson and Friston </span><a aria-label="Reference 2012" data-dcnode-id="5090" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d104911213e1282" title="Hobson, J. A., &amp; Friston, K. J. (2012). Waking and dreaming consciousness: Neurobiological and functional considerations. Progress in Neurobiology, 98(1), 82–98."><span data-dcnode-id="5091" instrument_node="">2012</span></a><span data-dcnode-id="5089" instrument_node="">).</span></p><blockquote class="c-blockquote" data-dcnode-id="5076"><div class="c-blockquote__body" data-dcnode-id="5077"><span data-dcnode-id="5087" instrument_node="">
</span><p data-dcnode-id="5079"><span data-dcnode-id="5086" instrument_node="">Sleep is a necessary process that requires the (nightly) suspension of sensory input—so that synaptic plasticity and homoeostasis can reduce the redundancy and complexity accrued during wakefulness (Gilestro et&nbsp;al. </span><a aria-label="Reference 2009" data-dcnode-id="5084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d104911213e1289" title="Gilestro, G. F., Tononi, G., &amp; Cirelli, C. (2009). Widespread changes in synaptic markers as a function of sleep and wakefulness in Drosophila. Science, 324(5923), 109–112."><span data-dcnode-id="5085" instrument_node="">2009</span></a><span data-dcnode-id="5083" instrument_node="">). In short, it is necessary to gate sensory input (and responses) to finesse the complexity of virtual reality models used to navigate the waking sensorium. (Hobson and Friston </span><a aria-label="Reference 2014" data-dcnode-id="5081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d104911213e1292" title="Hobson, J. A., &amp; Friston, K. J. (2014). Consciousness, dreams, and inference: The cartesian theatre revisited. Journal of Consciousness Studies, 21(1–2), 6–32."><span data-dcnode-id="5082" instrument_node="">2014</span></a><span data-dcnode-id="5080" instrument_node="">,&nbsp;p.&nbsp;10)</span></p><span data-dcnode-id="5078" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5068"><span data-dcnode-id="5075" instrument_node="">While this view seems intuitively plausible for visual imagery—in sleep, after all, external visual input is negligible</span><sup data-dcnode-id="5070"><a data-dcnode-id="5071" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="5073"><span data-dcnode-id="5074" instrument_node="">Footnote </span></span><span data-dcnode-id="5072" instrument_node="">13</span></a></sup><span data-dcnode-id="5069" instrument_node="">—I have argued that for bodily experience, it is either faulty or incomplete. At least for the special case of bodily experience, dreaming is better conceived of as a test case for altered but not completely absent own-body perception and even bodily interaction. In the next section, I will argue that predictive processing accounts are in fact ideally poised to explain this complex relationship—even though this will require a departure from existing predictive processing accounts of dreaming.</span></p><p data-dcnode-id="5033"><span data-dcnode-id="5067" instrument_node="">Before moving on, I want to raise another issue. Among proponents of predictive processing accounts, we find the familiar disagreement between internalists and externalists about experience.</span><sup data-dcnode-id="5062"><a data-dcnode-id="5063" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="5065"><span data-dcnode-id="5066" instrument_node="">Footnote </span></span><span data-dcnode-id="5064" instrument_node="">14</span></a></sup><span data-dcnode-id="5061" instrument_node=""> On the internalist side, Hohwy (</span><a aria-label="Reference 2013" data-dcnode-id="5059" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1321" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5060" instrument_node="">2013</span></a><span data-dcnode-id="5058" instrument_node="">,&nbsp;p. 237) emphasizes that internal models are only indirectly related to the external and bodily causes of sensory input. Perception and even bodily experience are fragile; there is an evidentiary boundary or “a strict inferential veil between mind and world—namely the sensory evidence behind which hidden causes lurk, which must be inferred by the brain” (Hohwy </span><a aria-label="Reference 2014" data-dcnode-id="5056" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d104911213e1324" title="Hohwy, J. (2014). The neural organ explains the mind Open MIND: Open MIND. Frankfurt: MIND Group."><span data-dcnode-id="5057" instrument_node="">2014</span></a><span data-dcnode-id="5055" instrument_node="">,&nbsp;p.&nbsp;18). Even radical skepticism seems to be at least a theoretical possibility (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="5053" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1327" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="5054" instrument_node="">2013</span></a><span data-dcnode-id="5052" instrument_node="">). By contrast, Clark (</span><a aria-label="Reference 2012" data-dcnode-id="5050" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1330" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5051" instrument_node="">2012</span></a><span data-dcnode-id="5049" instrument_node="">; </span><a aria-label="Reference 2015" data-dcnode-id="5047" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1334" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="5048" instrument_node="">2015</span></a><span data-dcnode-id="5046" instrument_node="">) argues that internal models are compatible with the genuine openness of perception that is central to extended or enactive accounts (Clark </span><a aria-label="Reference 2012" data-dcnode-id="5044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1337" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5045" instrument_node="">2012</span></a><span data-dcnode-id="5043" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="5041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d104911213e1340" title="Clark, A. (2015). Surfing uncertainty: Prediction, action, and the embodied mind. Oxford: Oxford University Press."><span data-dcnode-id="5042" instrument_node="">2015</span></a><span data-dcnode-id="5040" instrument_node="">).</span><sup data-dcnode-id="5035"><a data-dcnode-id="5036" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="5038"><span data-dcnode-id="5039" instrument_node="">Footnote </span></span><span data-dcnode-id="5037" instrument_node="">15</span></a></sup><span data-dcnode-id="5034" instrument_node=""> This disagreement notwithstanding, both sides support the cranial envatment view of dreaming. As Clark puts it, even if perception is genuinely open to the world,</span></p><blockquote class="c-blockquote" data-dcnode-id="5027"><div class="c-blockquote__body" data-dcnode-id="5028"><span data-dcnode-id="5032" instrument_node="">
</span><p data-dcnode-id="5030"><span data-dcnode-id="5031" instrument_node="">nothing in that view requires that the system, when simply cycling, in the sleep or imagining state, in the absence of ongoing driving external inputs, will typically support the very same kinds of stability and richness of experienced detail that daily sensory engagements offer. Indeed, there are several reasons to doubt this.</span></p><span data-dcnode-id="5029" instrument_node="">
</span></div></blockquote><span data-dcnode-id="5026" instrument_node="">
</span><blockquote class="c-blockquote" data-dcnode-id="5017"><div class="c-blockquote__body" data-dcnode-id="5018"><span data-dcnode-id="5025" instrument_node="">
</span><p data-dcnode-id="5020"><span data-dcnode-id="5024" instrument_node="">In the absence of the driving sensory signal, no stable ongoing information about low-level perceptual details is there to constrain the system. As a result, there is no obvious pressure to maintain a stable hypothesis at the lower levels of processing: there is simply whatever relatively amorphous pressure the current higher-level story exerts. (Clark </span><a aria-label="Reference 2012" data-dcnode-id="5022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d104911213e1385" title="Clark, A. (2012). Dreaming the whole cat: Generative models, predictive processing, and the enactivist conception of perceptual experience. Mind, 121(483), 753–771."><span data-dcnode-id="5023" instrument_node="">2012</span></a><span data-dcnode-id="5021" instrument_node="">,&nbsp;p.&nbsp;765)</span></p><span data-dcnode-id="5019" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5015"><span data-dcnode-id="5016" instrument_node="">Here, phenomenological differences between dreaming and waking are again attributed to the seclusion of dreams from external influences. Predictive processing accounts, independently of whether they endorse internalism or externalism about the mind in general, therefore assume that a brain-centric explanation of dreaming will suffice. This aspect of existing predictive processing accounts of dreaming requires adjustment.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5013" id="Sec10"><span data-dcnode-id="5014" instrument_node="">A predictive processing account of dream movement</span></h3><p data-dcnode-id="5011"><span data-dcnode-id="5012" instrument_node="">In this section, I develop a predictive processing account of different kinds of movement sensations in dreams exhibiting varying degrees of concordance with the physical body. I discuss three main examples: first, dream movements that appear to be concordant with outward movements, as in RBD or subtle muscle twitching in lucid dreams, which largely concern individual body parts; second, feelings of paralysis and inability to move, as in sleep paralysis nightmares and typical dreams; and third, sensations of whole-body movement such as flying or falling that seem discordant with outward immobility of the sleeping body. A first step is to place RBD sleep behavior in a broader context and consider the range of outward movements occurring in sleep. This will take us on a slight detour in which we will consider different kinds of outward motor activity in sleep and their developmental function. This discussion will prove useful when we return to consider varying degrees of concordance between bodily experience in dreams and the sleeping body.</span></p><p data-dcnode-id="4991"><span data-dcnode-id="5010" instrument_node="">In a series of papers, Blumberg (</span><a aria-label="Reference 2010" data-dcnode-id="5008" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d104911213e1401" title="Blumberg, M. S. (2010). Beyond dreams: Do sleep-related movements contribute to brain development? Frontiers in Neurology, 1, 140."><span data-dcnode-id="5009" instrument_node="">2010</span></a><span data-dcnode-id="5007" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="5005" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1404" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="5006" instrument_node="">2015</span></a><span data-dcnode-id="5004" instrument_node="">; Blumberg et&nbsp;al. </span><a aria-label="Reference 2013a" data-dcnode-id="5002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d104911213e1407" title="Blumberg, M. S., Coleman, C. M., Gerth, A. I., &amp; McMurray, B. (2013). Spatiotemporal structure of REM sleep twitching reveals developmental origins of motor synergies. Current Biology, 23(21), 2100–2109."><span data-dcnode-id="5003" instrument_node="">2013a</span></a><span data-dcnode-id="5001" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="4999" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d104911213e1410" title="Blumberg, M. S., Marques, H. G., &amp; Iida, F. (2013). Twitching in sensorimotor development from sleeping rats to robots. Current Biology, 23(12), R532–R537."><span data-dcnode-id="5000" instrument_node="">b</span></a><span data-dcnode-id="4998" instrument_node="">; Blumberg and Plumeau </span><a aria-label="Reference 2016" data-dcnode-id="4996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d104911213e1413" title="Blumberg, M. S., &amp; Plumeau, A. M. (2016). A new view of “dream enactment” in REM sleep behavior disorder. Sleep Medicine Reviews, 30, 34–42."><span data-dcnode-id="4997" instrument_node="">2016</span></a><span data-dcnode-id="4995" instrument_node="">) proposes that RBD sleep behavior is part of a much larger group of behaviors occurring throughout sleep and specifically in REM sleep. These behaviors have varying degrees of complexity, with RBD sleep behavior merely being the tip of the iceberg in terms of its seeming goal-directedness, overt nature, and close concordance with dream experience. While RBD behavior is certainly an extreme example, it can still be placed on a continuum with subtle and harder-to-observe muscle twitches in sleep (Blumberg and Plumeau </span><a aria-label="Reference 2016" data-dcnode-id="4993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d104911213e1417" title="Blumberg, M. S., &amp; Plumeau, A. M. (2016). A new view of “dream enactment” in REM sleep behavior disorder. Sleep Medicine Reviews, 30, 34–42."><span data-dcnode-id="4994" instrument_node="">2016</span></a><span data-dcnode-id="4992" instrument_node="">).</span></p><p data-dcnode-id="4971"><span data-dcnode-id="4990" instrument_node="">These muscle twitches, especially in the limbs, are both pervasive in and exclusive to REM sleep. While they lack the magnitude and complexity of RBD sleep behavior, they are not random but discrete and spatiotemporally organized, occurring in waves against a backdrop of muscle atonia (Blumberg </span><a aria-label="Reference 2010" data-dcnode-id="4988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d104911213e1423" title="Blumberg, M. S. (2010). Beyond dreams: Do sleep-related movements contribute to brain development? Frontiers in Neurology, 1, 140."><span data-dcnode-id="4989" instrument_node="">2010</span></a><span data-dcnode-id="4987" instrument_node="">, </span><a aria-label="Reference 2015" data-dcnode-id="4985" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1426" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4986" instrument_node="">2015</span></a><span data-dcnode-id="4984" instrument_node="">; Blumberg et&nbsp;al. </span><a aria-label="Reference 2013a" data-dcnode-id="4982" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d104911213e1429" title="Blumberg, M. S., Coleman, C. M., Gerth, A. I., &amp; McMurray, B. (2013). Spatiotemporal structure of REM sleep twitching reveals developmental origins of motor synergies. Current Biology, 23(21), 2100–2109."><span data-dcnode-id="4983" instrument_node="">2013a</span></a><span data-dcnode-id="4981" instrument_node="">). REM muscle twitches are also most prominent in the prenatal period and in early development, and Blumberg proposes that they are implicated in the development, maintenance, and repair of the sensorimotor system (Blumberg et&nbsp;al. </span><a aria-label="Reference 2013b" data-dcnode-id="4979" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d104911213e1432" title="Blumberg, M. S., Marques, H. G., &amp; Iida, F. (2013). Twitching in sensorimotor development from sleeping rats to robots. Current Biology, 23(12), R532–R537."><span data-dcnode-id="4980" instrument_node="">2013b</span></a><span data-dcnode-id="4978" instrument_node="">). This would fit in well with the observation that REM sleep generally is most prominent in infants and in the prenatal period, making a developmental function seem attractive (Hobson </span><a aria-label="Reference 2009" data-dcnode-id="4976" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d104911213e1435" title="Hobson, J. A. (2009). REM sleep and dreaming: Towards a theory of protoconsciousness. Nature Reviews Neuroscience, 10(11), 803–813."><span data-dcnode-id="4977" instrument_node="">2009</span></a><span data-dcnode-id="4975" instrument_node="">). According to Blumberg, Coleman and colleagues (</span><a aria-label="Reference 2013a" data-dcnode-id="4973" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d104911213e1439" title="Blumberg, M. S., Coleman, C. M., Gerth, A. I., &amp; McMurray, B. (2013). Spatiotemporal structure of REM sleep twitching reveals developmental origins of motor synergies. Current Biology, 23(21), 2100–2109."><span data-dcnode-id="4974" instrument_node="">2013a</span></a><span data-dcnode-id="4972" instrument_node="">,&nbsp;p.&nbsp;9), twitching may help shape and refine the motor systems as well as</span></p><blockquote class="c-blockquote" data-dcnode-id="4965"><div class="c-blockquote__body" data-dcnode-id="4966"><span data-dcnode-id="4970" instrument_node="">
</span><p data-dcnode-id="4968"><span data-dcnode-id="4969" instrument_node="">help the animal develop more precise expectations of the sensorimotor consequences of an action. By generating a movement and observing its proprioceptive consequences—including sensory consequences arising from passively moving joints—the animal can learn kinematic and biomechanical relationships among muscles, joints, and effectors and their perceptual correlates [...], much as “motor babbling” may help an animal learn the visual consequences of an action.</span></p><span data-dcnode-id="4967" instrument_node="">
</span></div></blockquote><p data-dcnode-id="4960"><span data-dcnode-id="4964" instrument_node="">Twitching would thereby be a form of motor exploration, enabling animals to work towards more complex, goal-directed movements by probing and refining the biomechanics of their limbs (Blumberg et&nbsp;al. </span><a aria-label="Reference 2013a" data-dcnode-id="4962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d104911213e1447" title="Blumberg, M. S., Coleman, C. M., Gerth, A. I., &amp; McMurray, B. (2013). Spatiotemporal structure of REM sleep twitching reveals developmental origins of motor synergies. Current Biology, 23(21), 2100–2109."><span data-dcnode-id="4963" instrument_node="">2013a</span></a><span data-dcnode-id="4961" instrument_node="">). By engaging in twitching and “motor babbling”, the organism is systematically sampling its own body in a spatiotemporally organized manner.</span></p><p data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">This leads to several important points. First, this research yields a novel perspective on REM sleep muscular atonia. In the standard account, the motor output blockade indiscriminately blocks all outward motor behavior, and both dream enactment behavior and subtler forms of muscular activity, including twitching, are disruptions of REM sleep paralysis. Following Blumberg, however, we can now say that REM sleep paralysis and twitching are in fact complementary. Muscular paralysis isolates twitching from other muscular activity, thereby creating the conditions for coordinated and systematic bodily self-sampling to occur. While the motor activity seen in RBD is clearly dysfunctional, we should not infer from this extreme case that all instances of muscular activity in sleep are disruptions of REM sleep paralysis. The implicit view of REM sleep as a state of outward quietude and complete behavioral passivity is misguided. Instead, sleep it is an active state, both internally, on the level brain activity, and externally, on the level of muscular activity—and this is true even if this muscular activity is subtler and harder to observe than in wakefulness. While extreme cases such as RBD behavior are disruptive, describing subtler cases such as muscle twitching as similarly opposed to REM sleep paralysis would misconstrue their function.</span></p><p data-dcnode-id="4947"><span data-dcnode-id="4957" instrument_node="">Second, Blumberg’s analysis offers a new perspective on how motor behavior in sleep relates to dreaming and its neural basis. Because twitching is preserved even when the cortex has been disconnected from the brain stem, twitches are not cortically generated. Blumberg proposes that muscle twitches precede dream experience: “with the addition of sensory feedback, twitching is potentially transformed from a functionless by-product of dreaming to an active contributor to sensorimotor integration within the spinal cord and brain, including the development, refinement, and maintenance of somatotopic maps” (Blumberg </span><a aria-label="Reference 2010" data-dcnode-id="4955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d104911213e1457" title="Blumberg, M. S. (2010). Beyond dreams: Do sleep-related movements contribute to brain development? Frontiers in Neurology, 1, 140."><span data-dcnode-id="4956" instrument_node="">2010</span></a><span data-dcnode-id="4954" instrument_node="">,&nbsp;p.&nbsp;5; see also Blumberg </span><a aria-label="Reference 2015" data-dcnode-id="4952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1460" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4953" instrument_node="">2015</span></a><span data-dcnode-id="4951" instrument_node="">; Blumberg and Plumeau </span><a aria-label="Reference 2016" data-dcnode-id="4949" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d104911213e1463" title="Blumberg, M. S., &amp; Plumeau, A. M. (2016). A new view of “dream enactment” in REM sleep behavior disorder. Sleep Medicine Reviews, 30, 34–42."><span data-dcnode-id="4950" instrument_node="">2016</span></a><span data-dcnode-id="4948" instrument_node="">). Where the standard account regards twitches as by-products of internally experienced dream movements, Blumberg claims the opposite is true: dream movements are by-products of feedback from outward movements.</span></p><p data-dcnode-id="4930"><span data-dcnode-id="4946" instrument_node="">Third, this leads to a shift in emphasis from motor output to sensory input. In the standard view, outward sleep behaviors are cortically generated and reflect dream experience. By contrast, focusing on sensory input suggests that sensory feedback generated by muscle twitches may itself be a source of cortical stimulation. Dream experience would then be partly shaped by the processing of feedback from muscular activity. Where the cranial envatment view has it that sensory input is blocked in REM sleep, Blumberg (</span><a aria-label="Reference 2015" data-dcnode-id="4944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1469" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4945" instrument_node="">2015</span></a><span data-dcnode-id="4943" instrument_node="">) suggests that in some respects, the opposite is true. In wakefulness, the sensory consequences of self-generated movements are attenuated. Sensory attenuation plays an important role in self-other distinctions, or in disambiguating between sensory feedback caused by one’s own actions versus externally induced sensory stimulation. By contrast, in REM sleep, twitching is processed not as self-generated movement, but activates the sensory cortex as if it were unexpected and had been other-produced (Tiriac et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR142" id="ref-link-section-d104911213e1472" title="Tiriac, A., Del Rio-Bermudez, C., &amp; Blumberg, M. S. (2014). Self-generated movements with “unexpected” sensory consequences. Current Biology, 24(18), 2136–2141."><span data-dcnode-id="4942" instrument_node="">2014</span></a><span data-dcnode-id="4940" instrument_node="">). To appreciate the relevance of this claim, consider that sensory attenuation is why it is normally impossible to tickle yourself. When self-other distinctions are disturbed, the ability to self-tickle is restored. This is the case in schizophrenia (Blakemore et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="4938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d104911213e1475" title="Blakemore, S.-J., Smith, J., Steel, R., Johnstone, E., &amp; Frith, C. D. (2000). The perception of self-produced sensory stimuli in patients with auditory hallucinations and passivity experiences: Evidence for a breakdown in self-monitoring. Psychological Medicine, 30(05), 1131–1139."><span data-dcnode-id="4939" instrument_node="">2000</span></a><span data-dcnode-id="4937" instrument_node="">) and following REM sleep dreams (Blagrove et&nbsp;al. </span><a aria-label="Reference 2006" data-dcnode-id="4935" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d104911213e1478" title="Blagrove, M., Blakemore, S.-J., &amp; Thayer, B. R. (2006). The ability to self-tickle following Rapid eye movement sleep dreaming. Consciousness and Cognition, 15(2), 285–294."><span data-dcnode-id="4936" instrument_node="">2006</span></a><span data-dcnode-id="4934" instrument_node="">; for a discussion of self-tickling in lucid dreams, see Windt et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4932" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR157" id="ref-link-section-d104911213e1481" title="Windt, J. M., Harkness, D. L., &amp; Lenggenhager, B. (2014). Tickle me, I think I might be dreaming! Sensory attenuation, self-other distinction, and predictive processing in lucid dreams. Frontiers in Human Neuroscience, 8, 717."><span data-dcnode-id="4933" instrument_node="">2014</span></a><span data-dcnode-id="4931" instrument_node="">). In REM sleep, this localized lack of sensory attenuation serves to amplify the sensory consequences of self-generated twitches. We can think of this as a trade-off, in which twitches are kept sufficiently small to prevent sleep disturbances—recall that RBD behavior not only disrupts sleep, but can also lead to injury both of patients and their bed partners—while maximizing their efficiency by processing them as if they were unexpected and externally generated.</span></p><p data-dcnode-id="4916"><span data-dcnode-id="4929" instrument_node="">We are now in the vicinity of an account of RBD and muscular twitching that sits nicely within the predictive processing framework. In predictive processing accounts, the physical body and persons and objects in the environment are just different types of hidden causes of sensory input (Hohwy </span><a aria-label="Reference 2016" data-dcnode-id="4927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d104911213e1487" title="Hohwy, J. (2016). Prediction, agency and body ownership. (2016). In A. K. Engel, K. J. Friston, &amp; D. Kragic (Eds.), The Pragmatic turn: Toward action-oriented views in cognitive science, Strüngmann forum reports, vol. 18, J. Lupp, series editor. Cambridge, MA: MIT Press."><span data-dcnode-id="4928" instrument_node="">2016</span></a><span data-dcnode-id="4926" instrument_node="">). The worldly causes of sensory input are in fact doubly veiled, first, by the fact that they are known only inferentially and through internal models, and second, by the fact that they can be sampled only through the body. To engage in active inference and bodily interaction with the world, one first needs to have a stable body model and the ability to distinguish between one’s own body and external objects and agents. Self-other distinctions are not basic to cognition, but have to be learned and inferred (Hohwy </span><a aria-label="Reference 2016" data-dcnode-id="4924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d104911213e1490" title="Hohwy, J. (2016). Prediction, agency and body ownership. (2016). In A. K. Engel, K. J. Friston, &amp; D. Kragic (Eds.), The Pragmatic turn: Toward action-oriented views in cognitive science, Strüngmann forum reports, vol. 18, J. Lupp, series editor. Cambridge, MA: MIT Press."><span data-dcnode-id="4925" instrument_node="">2016</span></a><span data-dcnode-id="4923" instrument_node="">, in press), and this is possible only through the comparatively greater regularity and stability of patterns of body movement. This emphasizes both the importance of embodied interaction with the world and the fact that underlying this interaction, perception and bodily experience are inferentially secluded and deeply fragile (Hohwy </span><a aria-label="Reference 2013" data-dcnode-id="4921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d104911213e1493" title="Hohwy, J. (2013). The predictive mind. Oxford: Oxford University Press."><span data-dcnode-id="4922" instrument_node="">2013</span></a><span data-dcnode-id="4920" instrument_node="">,&nbsp;chap.&nbsp;11). This fragility only becomes evident in special circumstances, as when simple experimental manipulations are used to induce sensory or bodily illusions (for further discussion, see Sect.&nbsp;</span><a data-dcnode-id="4918" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec11"><span data-dcnode-id="4919" instrument_node="">5.3</span></a><span data-dcnode-id="4917" instrument_node="">). Yet it is thought to be a common feature of perception and bodily experience.</span></p><p data-dcnode-id="4905"><span data-dcnode-id="4915" instrument_node="">If it is a basic condition of bodily interaction with the world that one first develop a body model and disambiguate between bodily and external worldly signals, sleep-related twitching appears in a new light. Having a state such as sleep in which sensory feedback, especially in early developmental stages, is focused almost exclusively on own-body movements, as in muscle twitching, would be an ideal opportunity to form and refine an own-body model in relative isolation from environmental stimuli. Twitching during sleep would then be a way of sampling the body under conditions in which the body is partly decoupled from the world. This basic and developmentally early kind of bodily self-sampling might be an important preliminary step towards acquiring the ability to use bodily action to sample the world, as in standard waking perception.</span><sup data-dcnode-id="4910"><a data-dcnode-id="4911" href="#Fn16"><span class="u-visually-hidden" data-dcnode-id="4913"><span data-dcnode-id="4914" instrument_node="">Footnote </span></span><span data-dcnode-id="4912" instrument_node="">16</span></a></sup><span data-dcnode-id="4909" instrument_node=""> This also fits in well with the comparatively lower incorporation rates of visual and auditory stimuli in dreams (Sect.&nbsp;</span><a data-dcnode-id="4907" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec5"><span data-dcnode-id="4908" instrument_node="">3.2</span></a><span data-dcnode-id="4906" instrument_node="">).</span></p><p data-dcnode-id="4897"><span data-dcnode-id="4904" instrument_node="">But there is also a potential problem. This is that Blumberg’s proposal, in shifting focus from motor output to sensory input, again seems committed to a claim of unidirectional causality between the physical body and dream experience. Where the standard view construes RBD behavior and muscle twitches as outward enactments of cortically driven dream experience, Blumberg (</span><a aria-label="Reference 2010" data-dcnode-id="4902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d104911213e1541" title="Blumberg, M. S. (2010). Beyond dreams: Do sleep-related movements contribute to brain development? Frontiers in Neurology, 1, 140."><span data-dcnode-id="4903" instrument_node="">2010</span></a><span data-dcnode-id="4901" instrument_node="">) proposes, in greatly simplified terms, that muscle twitching (including its extreme expression in RBD) is caused by brainstem activity, which then, via sensory and proprioceptive feedback, activates the primary somatosensory cortex and shapes dream experience. Blumberg and colleagues (</span><a aria-label="Reference 2013b" data-dcnode-id="4899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d104911213e1544" title="Blumberg, M. S., Marques, H. G., &amp; Iida, F. (2013). Twitching in sensorimotor development from sleeping rats to robots. Current Biology, 23(12), R532–R537."><span data-dcnode-id="4900" instrument_node="">2013b</span></a><span data-dcnode-id="4898" instrument_node="">) acknowledge that twitching may modulate its own expression by creating both output and feedback to the sensorimotor system. But the resulting view of dream experience as a mere by-product of muscular twitching is unsatisfying, because plausible candidates for top-down influence of dream experience on outward muscular activity exist.</span></p><p data-dcnode-id="4877"><span data-dcnode-id="4896" instrument_node="">A clear example of such top-down influences are lucid control dreams (Voss and Hobson </span><a aria-label="Reference 2015" data-dcnode-id="4894" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d104911213e1550" title="Voss, U., &amp; Hobson, A. (2015). What is the state-of-the-art on lucid dreaming? In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 38(T). Frankfurt: MIND Group."><span data-dcnode-id="4895" instrument_node="">2015</span></a><span data-dcnode-id="4893" instrument_node="">). When dreamers intentionally engage in certain actions—such as clenching a fist (Dresler et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="4891" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d104911213e1553" title="Dresler, M., Koch, S. P., Wehrle, R., Spoormaker, V. I., Holsboer, F., Steiger, A., et al. (2011). Dreamed movement elicits activation in the sensorimotor cortex. Current Biology, 21(21), 1833–1837."><span data-dcnode-id="4892" instrument_node="">2011</span></a><span data-dcnode-id="4890" instrument_node="">) or doing a simple gymnastics routine (Erlacher et&nbsp;al. </span><a aria-label="Reference 2014" data-dcnode-id="4888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d104911213e1556" title="Erlacher, D., Schädlich, M., Stumbrys, T., &amp; Schredl, M. (2014). Time for actions in lucid dreams: Effects of task modality, length, and complexity. Frontiers in psychology, 4, 1013."><span data-dcnode-id="4889" instrument_node="">2014</span></a><span data-dcnode-id="4887" instrument_node="">)—it would seem that dream experience causes physical bodily changes including outward muscular twitching, not vice versa. So at least some cases exist in which outward twitching is consequent on dream imagery. By contrast, in nonlucid dreams, where deliberate control and volitional action are much less pronounced, it seems preferable to say that sensory feedback, subjective experience, and outward movement mutually constrain each other. This is also in line with the argument I advanced earlier (in Sect.&nbsp;</span><a data-dcnode-id="4885" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec7"><span data-dcnode-id="4886" instrument_node="">4</span></a><span data-dcnode-id="4884" instrument_node="">) about the relation between sleep onset imagery and limb jerks. As recommended by predictive processing accounts, there is dynamic interaction between sensory input and motor output on the one hand, and experienced dream action on the other hand. For dreaming, we can thus envision a relation of mutual constraint between tactile, proprioceptive, and interoceptive input,</span><sup data-dcnode-id="4879"><a data-dcnode-id="4880" href="#Fn17"><span class="u-visually-hidden" data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">Footnote </span></span><span data-dcnode-id="4881" instrument_node="">17</span></a></sup><span data-dcnode-id="4878" instrument_node=""> motor output, and experience.</span></p><p data-dcnode-id="4872"><span data-dcnode-id="4876" instrument_node="">Again starting with a clear example, initial motor activity in the form of subtle twitching might first become reflected on the level of dream experience, generating reactions, such as movements experienced within the dream, that are more or less appropriate to the dream scenario. In RBD, these dream movements might then lead to more specific motor behavior on the physical output side—whose sensory consequences then come to further shape the ongoing dream. And so on. From this, we should expect an increase in the seeming goal-directness of outward motor behavior in episodes of RBD sleep behavior. Consistent with this idea, Blumberg (</span><a aria-label="Reference 2015" data-dcnode-id="4874" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d104911213e1587" title="Blumberg, M. S. (2015). Developing sensorimotor systems in our sleep. Current Directions in Psychological Science, 24(1), 32–37."><span data-dcnode-id="4875" instrument_node="">2015</span></a><span data-dcnode-id="4873" instrument_node="">) notes that complex, overt behaviors in RBD are often preceded by muscle twitches. RBD would then just be a special case of exaggerated bodily self-sampling. As is the case for twitches, the more robust behaviors that characterize RBD would at least initially be brainstem driven. As muscular activity becomes more organized, overt, and robust—as in the transition from twitching to RBD behavior—dream experience becomes more strongly constrained by proprioceptive and tactile feedback from muscular activity and in turn constrains further outward movement, finally culminating in the close concordance that characterizes dream enactment. Paradoxically, RBD dream enactment is dysfunctional because the match between bodily experience and the physical body is too close. Because e.g. visual imagery (dreaming of a football while clutching one’s wife’s head) is still largely internally generated, both outward and experienced movement are now starkly (and sometimes dangerously) discordant with the actual sleeping environment.</span></p><p data-dcnode-id="4867"><span data-dcnode-id="4871" instrument_node="">Can this account of mutual constraint between dream experience, real-body sensations, and muscular activity be generalized beyond overt dream enactment behavior? In subtler cases of twitching, the relation to bodily experience is less immediate. One possibility is that dream actions are exaggerated versions of small but specifically organized limb jerks—as suggested by certain lucid dream experiments, in which large arm movements lead to twitching in the arms (LaBerge et&nbsp;al. </span><a aria-label="Reference 1981" data-dcnode-id="4869" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d104911213e1593" title="LaBerge, S. P., Nagel, L. E., Dement, W. C., &amp; Zarcone, V. P. (1981). Lucid dreaming verified by volitional communication during REM sleep. Perceptual and Motor Skills, 52, 727–732."><span data-dcnode-id="4870" instrument_node="">1981</span></a><span data-dcnode-id="4868" instrument_node="">). Another possibility is that bodily experiences in dreams are genuinely underdetermined by outward twitching. For example, the same pattern of twitching activity may be associated with different kinds of movements in dreams, such as running versus dancing. This fits in well with the idea that bodily experience in dreams is characterized by large-scale phenomenal indeterminacy. For now, these options are purely speculative and non-exclusive. A first step would be to investigate whether, as predicted by the current account, dream reports of bodily experience are indeed correlated with increased twitching activity. To further investigate this idea of mutual constraint, we can also make some predictions about the effects of sensory stimulation on dream imagery. For example, when external sensory stimulation (e.g. through a blood-pressure cuff) during sleep is incorporated in dreams, we might expect there to be associated changes in self-generated outward movements and twitching activity as well. Lucid dreams might be an ideal way to investigate whether such carefully orchestrated, temporally smeared interactions between external stimulation, dream imagery, and self-generated outward movement exist.</span></p><p data-dcnode-id="4850"><span data-dcnode-id="4866" instrument_node="">What about other cases of bodily experience in dreams? Another good example of close concordance between dream experience and the physical body are sleep paralysis (SP) experiences. These are in some sense the mirror image of RBD sleep behaviors in that they involve the absence both of outward and experienced movement. Sleep paralysis (Cheyne et&nbsp;al. </span><a aria-label="Reference 1999" data-dcnode-id="4864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d104911213e1599" title="Cheyne, J. A., Rueffer, S. D., &amp; Newby-Clark, I. R. (1999). Hypnagogic and hypnopompic hallucinations during sleep paralysis: Neurological and cultural construction of the night-mare. Consciousness and Cognition, 8(3), 319–337."><span data-dcnode-id="4865" instrument_node="">1999</span></a><span data-dcnode-id="4863" instrument_node="">; Cheyne </span><a aria-label="Reference 2003" data-dcnode-id="4861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d104911213e1602" title="Cheyne, J. A. (2003). Sleep paralysis and the structure of waking-nightmare hallucinations. Dreaming, 13(3), 163."><span data-dcnode-id="4862" instrument_node="">2003</span></a><span data-dcnode-id="4860" instrument_node="">, </span><a aria-label="Reference 2005" data-dcnode-id="4858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d104911213e1605" title="Cheyne, J. A. (2005). Sleep paralysis episode frequency and number, types, and structure of associated hallucinations. Journal of Sleep Research, 14(3), 319–324."><span data-dcnode-id="4859" instrument_node="">2005</span></a><span data-dcnode-id="4857" instrument_node="">) refers to the experience of being unable to move, either during sleep onset or upon awakening. The feeling of paralysis often combines with highly stereotyped forms of nightmares, and SP experiences are striking for their high consistency over different individuals, times, and cultures. This is particularly evident for old hag attacks, which describe the subjective experience of paralysis and of being choked by an intruder such as an old hag or witch sitting on one’s chest. Adler (</span><a aria-label="Reference 2011" data-dcnode-id="4855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d104911213e1608" title="Adler, S. R. (2011). Sleep paralysis: Night-mares, nocebos, and the mind-body connection. New Brunswick, New Jersey &amp; London: Rutgers University Press."><span data-dcnode-id="4856" instrument_node="">2011</span></a><span data-dcnode-id="4854" instrument_node="">) traces intercultural consistencies and historical continuities reaching back to Assyrian and Babylonian sources to argue that these experiences lend themselves to different individual interpretations and cultural narratives, including superstitious beliefs, myths, and folklore. Despite these differences on the level of narrative dream content, old hag attacks converge on a uniform experiential core involving not just inability to move and the extreme realism of the episodes, but most prominently the sense of a presence, breathing difficulties, and vestibular-motor experiences. The content of old hag attacks thus seems closely related to the physiological features of REM sleep (Cheyne </span><a aria-label="Reference 2003" data-dcnode-id="4852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d104911213e1611" title="Cheyne, J. A. (2003). Sleep paralysis and the structure of waking-nightmare hallucinations. Dreaming, 13(3), 163."><span data-dcnode-id="4853" instrument_node="">2003</span></a><span data-dcnode-id="4851" instrument_node="">).</span></p><p data-dcnode-id="4845"><span data-dcnode-id="4849" instrument_node="">In particular, the stereotyped features of old hag attacks can be neatly explained by linking them to REM-sleep related muscular atonia and the shallow and rapid breathing pattern characteristic of REM sleep. SP episodes also generally occur in the supine position (Cheyne et&nbsp;al. </span><a aria-label="Reference 1999" data-dcnode-id="4847" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d104911213e1617" title="Cheyne, J. A., Rueffer, S. D., &amp; Newby-Clark, I. R. (1999). Hypnagogic and hypnopompic hallucinations during sleep paralysis: Neurological and cultural construction of the night-mare. Consciousness and Cognition, 8(3), 319–337."><span data-dcnode-id="4848" instrument_node="">1999</span></a><span data-dcnode-id="4846" instrument_node="">), suggesting that sleeping position is a causally enabling factor. Very roughly, if one has the experience of waking up paralyzed and being unable to breathe, a natural interpretation would be that one is being choked by an attacker. The content of SP nightmares therefore seems closely linked to own-body perception, and in predictive processing terms these experiences can be described as the best internal model of current real-body input. Additional factors, such as personal beliefs and cultural context, may then put a narrative gloss on the overall experience by creating bias toward a particular interpretation—for example casting the perceived attacker as a hag versus an incubus.</span></p><p data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">Part of this story would have to look beyond the body and consider the personal history, beliefs, and concerns of the dreamer, as well as the broader cultural context. In predictive processing terms, this would correspond to longer-term, high-level predictions. Even in stereotyped examples such as old hag attacks, the idea is not that experience is completely constrained by own-body perception, but rather that real-body inputs can set the stage for dream experiences whose narrative organization is additionally shaped by waking memories, beliefs, and so on. This is in keeping with the claim that dreams, while not functionally disembodied states, are merely weakly phenomenally-functionally embodied states. Part of the way in which this view is weak is that it emphasizes the role of the physical body while also leaving much wiggle room both for how and whether the sleeping body shapes dream experience in individual cases.</span></p><p data-dcnode-id="4835"><span data-dcnode-id="4842" instrument_node="">Consistent with this is the fact that in SP experiences such as old hag attacks, there seems to be a high degree of individual consistency over time. Old hag attacks are in fact just one subtype of SP experiences. The two other subtypes are intruder experiences and vestibular-motor experiences (Cheyne </span><a aria-label="Reference 2003" data-dcnode-id="4840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d104911213e1626" title="Cheyne, J. A. (2003). Sleep paralysis and the structure of waking-nightmare hallucinations. Dreaming, 13(3), 163."><span data-dcnode-id="4841" instrument_node="">2003</span></a><span data-dcnode-id="4839" instrument_node="">). Intruder experiences are characterized by a sensed presence plus often auditory, visual, or tactile sensations (such as the feeling that someone is pulling at the bedcovers); vestibular-motor experiences involve sensations of floating, flying, falling, having left the body, or even seeing oneself from the outside. These latter experiences, unlike intruder experiences and old hag attacks, are often described as pleasant rather than nightmarish. Importantly, when individuals report experiencing sleep paralysis repeatedly, their reports often belong to the same subtype of SP experience (Cheyne </span><a aria-label="Reference 2005" data-dcnode-id="4837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d104911213e1629" title="Cheyne, J. A. (2005). Sleep paralysis episode frequency and number, types, and structure of associated hallucinations. Journal of Sleep Research, 14(3), 319–324."><span data-dcnode-id="4838" instrument_node="">2005</span></a><span data-dcnode-id="4836" instrument_node="">), again suggesting that long-term expectation may play a role.</span></p><p data-dcnode-id="4824"><span data-dcnode-id="4834" instrument_node="">An important question is whether this account of SP experiences generalizes to dreaming. Given that the episodes occur in subjective wakefulness, this may seem doubtful. Here, I will only gesture at an answer (for a fuller discussion, see Windt </span><a aria-label="Reference 2015a" data-dcnode-id="4832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1636" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4833" instrument_node="">2015a</span></a><span data-dcnode-id="4831" instrument_node="">, chaps.&nbsp;8&nbsp;and&nbsp;10). This is that in old hag attacks, visual and auditory imagery often plays an important role. And given that it is plausible that the feelings of paralysis and shortness of breath are related to REM sleep, it seems natural that this would also be the case for visual and auditory imagery. Generally, sleep onset and the period after awakening are often associated with hallucinatory experiences, some of which classify as fully immersive dreams (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="4829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e1639" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="4830" instrument_node="">2015a</span></a><span data-dcnode-id="4828" instrument_node="">, chap.&nbsp;11; Windt et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="4826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e1642" title="Windt, J. M., Nielsen, T., &amp; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="4827" instrument_node="">2016</span></a><span data-dcnode-id="4825" instrument_node="">). A subgroup of SP experiences might not occur in objective wakefulness at all, but might involve realistic dreams of waking up, as in false awakenings. These SP experiences would then not be cases of REM-related paralysis and imagery intruding on wakefulness. Instead, some SP experiences may be false awakenings, or dreams of waking up that are additionally characterized by feelings of paralysis, intruders or old hags, and so on.</span></p><p data-dcnode-id="4810"><span data-dcnode-id="4823" instrument_node="">Another reason for thinking that my account of SP experiences can be scaled up&nbsp;to cover other kinds of dream experience is that SP experiences bear surface similarity to typical dream themes. These are dreams characterized by stereotyped content, and many people report having experienced them at some point in their lives (Nielsen et&nbsp;al. </span><a aria-label="Reference 2003" data-dcnode-id="4821" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d104911213e1648" title="Nielsen, T. A., Zadra, A. L., Simard, V., Saucier, S., Stenstrom, P., Smith, C., et al. (2003). The typical dreams of Canadian university students. Dreaming, 13(4), 211."><span data-dcnode-id="4822" instrument_node="">2003</span></a><span data-dcnode-id="4820" instrument_node="">; Schönhammer </span><a aria-label="Reference 2005" data-dcnode-id="4818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d104911213e1651" title="Schönhammer, R. (2005). ’Typical dreams’: Reflections of arousal. Journal of Consciousness Studies, 12(4–5), 18–37."><span data-dcnode-id="4819" instrument_node="">2005</span></a><span data-dcnode-id="4817" instrument_node="">; Yu </span><a aria-label="Reference 2008" data-dcnode-id="4815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR160" id="ref-link-section-d104911213e1654" title="Yu, C. K.-C. (2008). Typical dreams experienced by Chinese people. Dreaming, 18(1), 1."><span data-dcnode-id="4816" instrument_node="">2008</span></a><span data-dcnode-id="4814" instrument_node="">). Again, we have a type of dream content that is highly similar over different historical cohorts and also stays the same over longer periods in individuals. Frequent nightmare sufferers will often experience nightmares with repetitive content, and recurrent dreams, though rare, can remain almost exactly the same ove
