</span><meta content="In this paper, I discuss the relationship between bodily experiences in dreams and the sleeping, physical body. I question the popular view that dreaming is a naturally and frequently occurring real-world example of cranial envatment. This view states that dreams are functionally disembodied states: in a majority of dreams, phenomenal experience, including the phenomenology of embodied selfhood, unfolds completely independently of external and peripheral stimuli and outward movement. I advance an alternative and more empirically plausible view of dreams as weakly phenomenally-functionally embodied states. The view predicts that bodily experiences in dreams can be placed on a continuum with bodily illusions in wakefulness. It also acknowledges that there is a high degree of variation across dreams and different sleep stages in the degree of causal coupling between dream imagery, sensory input, and outward motor activity. Furthermore, I use the example of movement sensations in dreams and their relation to outward muscular activity to develop a predictive processing account. I propose that movement sensations in dreams are associated with a basic and developmentally early kind of bodily self-sampling. This account, which affords a central role to active inference, can then be broadened to explain other aspects of self- and world-simulation in dreams. Dreams are world-simulations centered on the self, and important aspects of both self- and world-simulation in dreams are closely linked to bodily self-sampling, including muscular activity, illusory own-body perception, and vestibular orienting in sleep. This is consistent with cognitive accounts of dream generation, in which long-term beliefs and expectations, as well as waking concerns and memories play an important role. What I add to this picture is an emphasis on the real-body basis of dream imagery. This offers a novel perspective on the formation of dream imagery and suggests new lines of research." data-dcnode-id="6789" name="dc.description"><span data-dcnode-id="6788" instrument_node="">

</span><meta content="Predictive brains, dreaming selves, sleeping bodies: how the analysis of dream movement can inform a theory of self- and world-simulation in dreams - Synthese" data-dcnode-id="6373" property="og:title"><span data-dcnode-id="6372" instrument_node="">
</span><meta content="In this paper, I discuss the relationship between bodily experiences in dreams and the sleeping, physical body. I question the popular view that dreaming is a naturally and frequently occurring real-world example of cranial envatment. This view states that dreams are functionally disembodied states: in a majority of dreams, phenomenal experience, including the phenomenology of embodied selfhood, unfolds completely independently of external and peripheral stimuli and outward movement. I advance an alternative and more empirically plausible view of dreams as weakly phenomenally-functionally embodied states. The view predicts that bodily experiences in dreams can be placed on a continuum with bodily illusions in wakefulness. It also acknowledges that there is a high degree of variation across dreams and different sleep stages in the degree of causal coupling between dream imagery, sensory input, and outward motor activity. Furthermore, I use the example of movement sensations in dreams and their relation to outward muscular activity to develop a predictive processing account. I propose that movement sensations in dreams are associated with a basic and developmentally early kind of bodily self-sampling. This account, which affords a central role to active inference, can then be broadened to explain other aspects of self- and world-simulation in dreams. Dreams are world-simulations centered on the self, and important aspects of both self- and world-simulation in dreams are closely linked to bodily self-sampling, including muscular activity, illusory own-body perception, and vestibular orienting in sleep. This is consistent with cognitive accounts of dream generation, in which long-term beliefs and expectations, as well as waking concerns and memories play an important role. What I add to this picture is an emphasis on the real-body basis of dream imagery. This offers a novel perspective on the formation of dream imagery and suggests new lines of research." data-dcnode-id="6371" property="og:description"><span data-dcnode-id="6370" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="2210" data-track-component="article body"><span data-dcnode-id="5944" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="5931" data-gtm-vis-first-on-screen-50443292_562="1086" data-gtm-vis-first-on-screen-50443292_563="1112" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1086" data-gtm-vis-recent-on-screen-50443292_563="1112" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5932" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5942" id="Abs1"><span data-dcnode-id="5943" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5933" id="Abs1-content"><p data-dcnode-id="5934"><span data-dcnode-id="5941" instrument_node="">In this paper, I discuss the relationship between bodily experiences in dreams and the sleeping, physical body. I question the popular view that dreaming is a naturally and frequently occurring real-world example of cranial envatment. This view states that dreams are functionally disembodied states: in a majority of dreams, phenomenal experience, including the phenomenology of embodied selfhood, unfolds completely independently of external and peripheral stimuli and outward movement. I advance an alternative and more empirically plausible view of dreams as </span><i data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">weakly phenomenally-functionally embodied</span></i><span data-dcnode-id="5938" instrument_node=""> states. The view predicts that bodily experiences in dreams can be placed on a continuum with bodily illusions in wakefulness. It also acknowledges that there is a high degree of variation across dreams and different sleep stages in the degree of causal coupling between dream imagery, sensory input, and outward motor activity. Furthermore, I use the example of movement sensations in dreams and their relation to outward muscular activity to develop a predictive processing account. I propose that movement sensations in dreams are associated with a basic and developmentally early kind of </span><i data-dcnode-id="5936"><span data-dcnode-id="5937" instrument_node="">bodily self-sampling</span></i><span data-dcnode-id="5935" instrument_node="">. This account, which affords a central role to active inference, can then be broadened to explain other aspects of self- and world-simulation in dreams. Dreams are world-simulations centered on the self, and important aspects of both self- and world-simulation in dreams are closely linked to bodily self-sampling, including muscular activity, illusory own-body perception, and vestibular orienting in sleep. This is consistent with cognitive accounts of dream generation, in which long-term beliefs and expectations, as well as waking concerns and memories play an important role. What I add to this picture is an emphasis on the real-body basis of dream imagery. This offers a novel perspective on the formation of dream imagery and suggests new lines of research.</span></p></div></div></section><span data-dcnode-id="5930" instrument_node="">
</span><section data-dcnode-id="5889" data-gtm-vis-first-on-screen-50443292_562="1112" data-gtm-vis-first-on-screen-50443292_563="1113" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1112" data-gtm-vis-recent-on-screen-50443292_563="1113" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction: the puzzle of dream movement and the body-brain-body problem"><div class="c-article-section" data-dcnode-id="5890" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5928" id="Sec1"><span data-dcnode-id="5929" instrument_node="">Introduction: the puzzle of dream movement and the body-brain-body problem</span></h2><div class="c-article-section__content" data-dcnode-id="5891" id="Sec1-content"><p data-dcnode-id="5926"><span data-dcnode-id="5927" instrument_node="">Why can we have vivid dreams of running or flying without flailing about wildly in bed? More generally, why is it that when we dream of moving, our sleeping, physical bodies usually stay inert? And why is that other times, they don’t, and we do flail about wildly in bed? Finally, what about the cases that are neither here nor there—involving subtler movements, muscle twitches, or postural adjustments in sleep? Do they bear any relation to dream experience?.</span></p><p data-dcnode-id="5921"><span data-dcnode-id="5925" instrument_node="">In 1894, the British idealist F.&nbsp;H.&nbsp;Bradley found these questions so puzzling that he devoted an entire paper to them. Today, there seems to be a straightforward empirical answer: dreams typically involve vivid movement sensations whose outward enactment is prevented through the so-called motor output blockade. During rapid-eye-movement (REM) sleep, when the most vivid dreams occur, there is a near-complete loss of muscle tone, meaning that the sleeping body is practically paralyzed (Hobson et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="5923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d104911213e312" title="Hobson, J. A., Pace-Schott, E. F., &amp; Stickgold, R. (2000). Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behavioral and Brain Sciences, 23(6), 793–842. (discussion 904–1121) ."><span data-dcnode-id="5924" instrument_node="">2000</span></a><span data-dcnode-id="5922" instrument_node="">).</span></p><p data-dcnode-id="5913"><span data-dcnode-id="5920" instrument_node="">There is, however, more to Bradley’s question. Superficially, it just asks about the absence of outward, real-body movements corresponding to movements experienced within dreams. But the account Bradley develops appeals to the complex relation between the subjective experience of dream movements and their real-body basis.</span><sup data-dcnode-id="5915"><a data-dcnode-id="5916" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="5918"><span data-dcnode-id="5919" instrument_node="">Footnote </span></span><span data-dcnode-id="5917" instrument_node="">1</span></a></sup><span data-dcnode-id="5914" instrument_node=""> Contrary to the purely brain-based answer popular in the recent literature, Bradley’s account implies that a full answer will have to look to the sleeping, physical body as well. Moreover, while Bradley focused on what he took to be the typical case of a failure of outward movement, he realized that his account would also have to be applicable to a variety of atypical cases, such as somnambulism.</span></p><p data-dcnode-id="5905"><span data-dcnode-id="5912" instrument_node="">Here, my main interest in Bradley’s account is that it offers a genuine alternative to what has come to be the default position on the relationship between dreaming and the body. Bradley’s question is an early version of the </span><i data-dcnode-id="5910"><span data-dcnode-id="5911" instrument_node="">body-brain-body problem</span></i><span data-dcnode-id="5909" instrument_node="">: the problem of how the physical body and the brain interact to bring about bodily experience in dreams (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="5907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e330" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5908" instrument_node="">2015a</span></a><span data-dcnode-id="5906" instrument_node="">, chap.&nbsp;8). With Bradley, we can ask about the typical cases, aiming at a theory that will account for a majority of dreams. And we can also ask the slightly broader question of how varying degrees of functional coupling between the body and the brain in sleep relate to variations in bodily experience in dreams. Here, I will address both questions. In doing so, I will discuss different kinds of bodily experience in dreams (including tactile sensations, visual representations of the body, and so on), but will follow Bradley in placing a special emphasis on movement sensations. The final story will be, as Bradley foresaw, complex; but a recurring theme will be that to explain bodily experiences in dreams, we need to look beyond the brain&nbsp;to the sleeping body.</span></p><p data-dcnode-id="5897"><span data-dcnode-id="5904" instrument_node="">The body-brain-body problem is at odds with the standard </span><i data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">cranial envatment view</span></i><span data-dcnode-id="5901" instrument_node=""> of bodily experience in dreams in the newer philosophical and scientific literature. Dreaming is standardly considered a paradigmatic example of conscious experience unfolding independently of sensory input and motor output. In this view, the situation of the sleeping brain is essentially that of a brain temporarily encased in a cranial vat: whatever is experienced in dreams reflects what happens when the brain is left entirely to its own devices, unperturbed by contemporaneous bodily and environmental stimuli. The view allows that waking memories—including those of bodily action—influence our dreams. This is an important difference to thought experiments in which the brain is permanently trapped in a literal vat (Putnam </span><a aria-label="Reference 1981" data-dcnode-id="5899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d104911213e340" title="Putnam, H. (1981). Brains in a vat. In H. Putnam (Ed.), Reason, truth, and history. Cambridge: Cambridge University Press."><span data-dcnode-id="5900" instrument_node="">1981</span></a><span data-dcnode-id="5898" instrument_node="">). Proponents of the cranial envatment view also disagree about the phenomenology of dreaming. But they agree that in standard cases, the input and output blockades isolate dreams from contemporaneous external influences and that to explain dream experience, a purely brain-based account suffices.</span></p><p data-dcnode-id="5892"><span data-dcnode-id="5896" instrument_node="">In this paper, I argue that contrary to the standard view, the body-brain-body problem is a genuine problem for a theory of dreaming and sketch a possible solution. This argument has two steps. The first is an empirically informed descriptive account of bodily experience in dreams and its relation to the sleeping, physical body. I propose that dreams are </span><i data-dcnode-id="5894"><span data-dcnode-id="5895" instrument_node="">weakly phenomenally-functionally embodied states</span></i><span data-dcnode-id="5893" instrument_node=""> and discuss how this view differs from standard versions of the cranial envatment view. The second step is to develop the outlines of an explanatory account of bodily experience in dreams. Starting with the example of dream movements and their relation to outward motor activity, I offer a predictive processing account of bodily experience in dreams. Furthermore, I propose that the analysis of bodily experience in dreams and its real-body basis can be extended to other aspects of dream imagery formation, including social imagery of non-self dream characters and visual imagery. This approach complements and enriches existing accounts of dream generation while also promising a genuinely novel perspective on self- and world-simulation in dreams.</span></p></div></div></section><section data-dcnode-id="5774" data-gtm-vis-first-on-screen-50443292_562="1112" data-gtm-vis-first-on-screen-50443292_563="1113" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1112" data-gtm-vis-recent-on-screen-50443292_563="1113" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="The standard response: the cranial envatment view of dreaming"><div class="c-article-section" data-dcnode-id="5775" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5887" id="Sec2"><span data-dcnode-id="5888" instrument_node="">The standard response: the cranial envatment view of dreaming</span></h2><div class="c-article-section__content" data-dcnode-id="5776" id="Sec2-content"><p data-dcnode-id="5870"><span data-dcnode-id="5886" instrument_node="">The standard response to Bradley’s question about the failure of outward movement in dreams has two components. The first is that movement sensations are not just abundant in dreams, but also phenomenologically equivalent to movement sensations in wakefulness. At its most general, the phenomenological equivalence claim is that dreaming replicates waking experience in all respects, including the experience of being an embodied self (Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e357" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5885" instrument_node="">2006</span></a><span data-dcnode-id="5883" instrument_node="">). The second component is that dreaming is a state of functional isolation in which the brain is essentially isolated from the sleeping body; the processing of external and peripheral stimuli is reduced or even obliterated (the sensory input blockade) and REM sleep paralysis (the motor output blockade) prevents the outward enactment of dream movement (Hobson et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="5881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d104911213e360" title="Hobson, J. A., Pace-Schott, E. F., &amp; Stickgold, R. (2000). Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behavioral and Brain Sciences, 23(6), 793–842. (discussion 904–1121) ."><span data-dcnode-id="5882" instrument_node="">2000</span></a><span data-dcnode-id="5880" instrument_node="">; Hobson </span><a aria-label="Reference 2009" data-dcnode-id="5878" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d104911213e363" title="Hobson, J. A. (2009). REM sleep and dreaming: Towards a theory of protoconsciousness. Nature Reviews Neuroscience, 10(11), 803–813."><span data-dcnode-id="5879" instrument_node="">2009</span></a><span data-dcnode-id="5877" instrument_node="">). Because of this functional seclusion, dreaming unfolds purely as a result of spontaneous, internally driven brain activity. The reason why dreaming nonetheless replicates waking perceptual and bodily experience is that the underlying brain activation patterns, especially in the visual, sensorimotor, and emotional areas (Desseilles et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5875" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d104911213e366" title="Desseilles, M., Dang-Vu, T. T., Sterpenich, V., &amp; Schwartz, S. (2011). Cognitive and emotional processes during dreaming: A neuroimaging view. Consciousness and Cognition, 20(4), 998–1008."><span data-dcnode-id="5876" instrument_node="">2011</span></a><span data-dcnode-id="5874" instrument_node="">), are largely the same as in wakefulness (Hobson </span><a aria-label="Reference 2009" data-dcnode-id="5872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d104911213e369" title="Hobson, J. A. (2009). REM sleep and dreaming: Towards a theory of protoconsciousness. Nature Reviews Neuroscience, 10(11), 803–813."><span data-dcnode-id="5873" instrument_node="">2009</span></a><span data-dcnode-id="5871" instrument_node="">,&nbsp;p.&nbsp;43). In this view, the difference between dreaming and waking experience is largely external to the brain and does not show up on the phenomenological level of description.</span></p><p data-dcnode-id="5835"><span data-dcnode-id="5869" instrument_node="">The idea of phenomenological equivalence between dreaming and waking is closely associated with simulation views of dreaming, which are forming a point of convergence for philosophical and neuroscientific theories (for discussion, see Revonsuo et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5867" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d104911213e375" title="Revonsuo, A., Tuominen, J., &amp; Valli, K. (2015). The avatars in the machine: Dreaming as a simulation of social reality. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 32(T). Frankfurt am Main: MIND Group."><span data-dcnode-id="5868" instrument_node="">2015</span></a><span data-dcnode-id="5866" instrument_node="">; see also Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e378" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5865" instrument_node="">2006</span></a><span data-dcnode-id="5863" instrument_node="">; Descartes </span><a aria-label="Reference 1641" data-dcnode-id="5861" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d104911213e381" title="Descartes, R. (1641/2013). René descartes: Meditations on first philosophy: With selections from the objections and replies. In J. Cottingham (Ed.), Cambridge: Cambridge University Press."><span data-dcnode-id="5862" instrument_node="">1641</span></a><span data-dcnode-id="5860" instrument_node="">/2013,&nbsp;I.5; Llinás and Paré </span><a aria-label="Reference 1991" data-dcnode-id="5858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d104911213e384" title="Llinás, R. R., &amp; Paré, D. (1991). Of dreaming and wakefulness. Neuroscience, 44(3), 521–535."><span data-dcnode-id="5859" instrument_node="">1991</span></a><span data-dcnode-id="5857" instrument_node="">; Llinás and Ribary </span><a aria-label="Reference 1994" data-dcnode-id="5855" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d104911213e387" title="Llinás, R., &amp; Ribary, U. (1994). Perception as an oneiric-like state modulated by the senses. In C. Koch &amp; J. Davis (Eds.), Large-scale neuronal theories of the brain (pp. 111–124). Cambridge, MA: MIT Press."><span data-dcnode-id="5856" instrument_node="">1994</span></a><span data-dcnode-id="5854" instrument_node="">; Hobson et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="5852" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d104911213e391" title="Hobson, J. A., Pace-Schott, E. F., &amp; Stickgold, R. (2000). Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behavioral and Brain Sciences, 23(6), 793–842. (discussion 904–1121) ."><span data-dcnode-id="5853" instrument_node="">2000</span></a><span data-dcnode-id="5851" instrument_node="">; Hobson </span><a aria-label="Reference 2009" data-dcnode-id="5849" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d104911213e394" title="Hobson, J. A. (2009). REM sleep and dreaming: Towards a theory of protoconsciousness. Nature Reviews Neuroscience, 10(11), 803–813."><span data-dcnode-id="5850" instrument_node="">2009</span></a><span data-dcnode-id="5848" instrument_node="">; Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e397" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5847" instrument_node="">2003</span></a><span data-dcnode-id="5845" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="5843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d104911213e400" title="Metzinger, T. (2009). The ego tunnel. The science of the soul and the myth of the self. New York: Basic Books."><span data-dcnode-id="5844" instrument_node="">2009</span></a><span data-dcnode-id="5842" instrument_node="">; Nielsen </span><a aria-label="Reference 2010" data-dcnode-id="5840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d104911213e403" title="Nielsen, T. A. (2010). Dream analysis and classification: The reality simulation perspective. In M. Kryger, T. Roth, &amp; W. C. Dement (Eds.), Principles and practice of sleep medicine (5th ed., pp. 595–603). New York: Elsevier."><span data-dcnode-id="5841" instrument_node="">2010</span></a><span data-dcnode-id="5839" instrument_node="">). Simulation views possess great heuristic potential as they offer a definition of dreaming that can unify different theories from different disciplines and also suggest points of contact with research in cognitive neuroscience. Better understanding, for instance, the relation between dreams and the feeling of presence in virtual reality, but also in waking experience can enrich theories of consciousness by helping to identify similarities and differences across the sleep-wake cycle. As dream research was long characterized by a lack of consensus about how to define dreaming (Pagel et&nbsp;al. </span><a aria-label="Reference 2001" data-dcnode-id="5837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d104911213e406" title="Pagel, J., Blagrove, M., Levin, R., Stickgold, B., &amp; White, S. (2001). Definitions of dream: A paradigm for comparing field descriptive specific studies of dream. Dreaming, 11(4), 195."><span data-dcnode-id="5838" instrument_node="">2001</span></a><span data-dcnode-id="5836" instrument_node="">) as well as by relative isolation from cognitive neuroscience and consciousness science, this is important progress.</span></p><p data-dcnode-id="5812"><span data-dcnode-id="5834" instrument_node="">Different versions of simulation views exist, but the broad characterization of dreaming as involving world- and self-simulation creates natural affinity to the claim that dreaming replicates the phenomenology of waking experience. Simulation views, for instance, often describe dreaming as involving multimodal, complex, and dynamic world-simulation—comparable to an immersive virtual reality including the experience of a virtual self (Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5832" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e412" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5833" instrument_node="">2006</span></a><span data-dcnode-id="5831" instrument_node="">; Hobson </span><a aria-label="Reference 2009" data-dcnode-id="5829" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d104911213e415" title="Hobson, J. A. (2009). REM sleep and dreaming: Towards a theory of protoconsciousness. Nature Reviews Neuroscience, 10(11), 803–813."><span data-dcnode-id="5830" instrument_node="">2009</span></a><span data-dcnode-id="5828" instrument_node="">). While simulation views of dreaming standardly focus on the simulation of the dream world, they sometimes also extend to more specific types of simulation—such as simulation of social interactions with dream characters experienced as distinct from the self (Revonsuo et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d104911213e418" title="Revonsuo, A., Tuominen, J., &amp; Valli, K. (2015). The avatars in the machine: Dreaming as a simulation of social reality. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 32(T). Frankfurt am Main: MIND Group."><span data-dcnode-id="5827" instrument_node="">2015</span></a><span data-dcnode-id="5825" instrument_node="">) or simulation of embodied phenomenal selfhood, involving body ownership and the sense of being a bodily agent. A clear example of the latter is Revonsuo’s (</span><a aria-label="Reference 2005" data-dcnode-id="5823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d104911213e421" title="Revonsuo, A. (2005). The self in dreams. In T. E. Feinberg &amp; J. P. Keenan (Eds.), The lost self: Pathologies of the brain and identity (pp. 206–219). Oxford: Oxford University Press."><span data-dcnode-id="5824" instrument_node="">2005</span></a><span data-dcnode-id="5822" instrument_node="">,&nbsp;p.&nbsp;207; cf. Descartes </span><a aria-label="Reference 1641" data-dcnode-id="5820" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d104911213e424" title="Descartes, R. (1641/2013). René descartes: Meditations on first philosophy: With selections from the objections and replies. In J. Cottingham (Ed.), Cambridge: Cambridge University Press."><span data-dcnode-id="5821" instrument_node="">1641</span></a><span data-dcnode-id="5819" instrument_node="">/2013,&nbsp;I.&nbsp;5; Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5817" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e428" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5818" instrument_node="">2003</span></a><span data-dcnode-id="5816" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="5814" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d104911213e431" title="Metzinger, T. (2009). The ego tunnel. The science of the soul and the myth of the self. New York: Basic Books."><span data-dcnode-id="5815" instrument_node="">2009</span></a><span data-dcnode-id="5813" instrument_node="">) claim that “the dream self usually possesses a body image much like the one experienced during wakefulness” and that “the dreamer feels as if he or she were embodied inside our bodies during wakefulness”. It is important to note, however, that nothing commits simulation views to the phenomenological equivalence claim. Here, I will defend a version in which dreaming is the simulation of a world centered on a self, but the way we experience both the dream world and ourselves nonetheless differs in important and systematic ways from wakefulness.</span></p><p data-dcnode-id="5795"><span data-dcnode-id="5811" instrument_node="">The functional description of dreaming as a transient state of cranial envatment also brings with it no particular phenomenological commitments. While the cranial envatment view is often associated with the phenomenological equivalence claim, variations are easily introduced. For example, Noë (</span><a aria-label="Reference 2004" data-dcnode-id="5809" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d104911213e437" title="Noë, A. (2004). Action in perception. Cambridge (MA): MIT press."><span data-dcnode-id="5810" instrument_node="">2004</span></a><span data-dcnode-id="5808" instrument_node="">,&nbsp;p.&nbsp;213) proposes we “take it as settled that when we dream there is no dynamic exchange with the environment (although this might turn out not to be true) and [...] that, therefore, neural states alone are sufficient for dreaming [...]”. Noë then argues that the absence of contemporaneous embodied interaction with the environment during sleep leaves its mark on the phenomenology of dreaming: dreams lack the detail and stability of waking perception. For example, many lucid dreamers report being unable to read (and especially to re-read) longer texts in dreams (LaBerge </span><a aria-label="Reference 1985" data-dcnode-id="5806" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d104911213e440" title="LaBerge, S. (1985). Lucid dreaming: The power of being awake and aware in your dreams. Los Angeles: Jeremy P. Tarcher."><span data-dcnode-id="5807" instrument_node="">1985</span></a><span data-dcnode-id="5805" instrument_node="">). In the absence of a stable external input source, visual imagery in dreams is too dynamic to simulate a scannable text. While Noë (</span><a aria-label="Reference 2004" data-dcnode-id="5803" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d104911213e443" title="Noë, A. (2004). Action in perception. Cambridge (MA): MIT press."><span data-dcnode-id="5804" instrument_node="">2004</span></a><span data-dcnode-id="5802" instrument_node="">,&nbsp;p.&nbsp;213) does not explicitly discuss bodily experience in dreams, his main point is that even if we accept an internalist account of dreaming, this does not imply an internalist account of waking experience: “Given these assumptions, what the fact of dreaming shows is </span><i data-dcnode-id="5800"><span data-dcnode-id="5801" instrument_node="">not</span></i><span data-dcnode-id="5799" instrument_node=""> that neural activity alone is sufficient for perceptual experience, but only that it is sufficient for </span><i data-dcnode-id="5797"><span data-dcnode-id="5798" instrument_node="">dreaming</span></i><span data-dcnode-id="5796" instrument_node=""> experience.” He thus accepts the cranial envatment view but rejects the phenomenological equivalence claim.</span></p><p data-dcnode-id="5784"><span data-dcnode-id="5794" instrument_node="">The debate between internalists (or representationalists) about experience and externalist or enactive views concerns the minimal supervenience base of experience, or the minimal set of conditions that are both metaphysically necessary and jointly sufficient for experience to occur (see Block </span><a aria-label="Reference 2005" data-dcnode-id="5792" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d104911213e456" title="Block, N. (2005). Action in perception by Alva Noë. The Journal of Philosophy, 102, 259–272."><span data-dcnode-id="5793" instrument_node="">2005</span></a><span data-dcnode-id="5791" instrument_node=""> for a helpful characterization of the debate, including the relevance of dreaming). Internalists like Revonsuo think that the phenomenological equivalence between dreaming and waking, coupled with the functional dissociation from sensory input and motor output, shows that nothing other than brain activity is required for full-blown, wake-like experience. Dreaming, after all, is supposed to be a regularly and spontaneously occurring real-world example of wake-like experience resulting from purely internal brain activity. This then leads to the claim that conscious experience itself is in a sense virtual, an internal simulation upon which external stimuli exert a merely modulatory influence (Revonsuo </span><a aria-label="Reference 2006" data-dcnode-id="5789" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d104911213e459" title="Revonsuo, A. (2006). Inner presence: Consciousness as a biological phenomenon. Cambridge, MA: MIT Press."><span data-dcnode-id="5790" instrument_node="">2006</span></a><span data-dcnode-id="5788" instrument_node="">). In a sense, waking is just a form of online dreaming (Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5786" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e462" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5787" instrument_node="">2003</span></a><span data-dcnode-id="5785" instrument_node="">,&nbsp;p.&nbsp;51). Externalists, by contrast, claim that while nothing outside of the brain forms part of the minimal supervenience base of dreaming, the same is not true of perceptual experience: Dreaming and wakefulness are simply too different, phenomenologically speaking, for claims about the minimal supervenience base of dreaming to generalize to perceptual experience.</span></p><p data-dcnode-id="5779"><span data-dcnode-id="5783" instrument_node="">My primary interest in this debate concerns the role of the example of dreaming. Here, note that while the internalist’s endorsement of the phenomenological equivalence claim is stronger than it need be, the externalist’s denial of this claim is too weak. Because the disagreement is about the metaphysically necessary and sufficient conditions for wake-like experience, all that is needed for the internalist is that dreaming can in principle replicate the phenomenology of perceptual experience. The claim that dreaming typically and as a matter of fact does so is not necessary. By contrast, the externalist needs to show that dreaming can never, even in principle, replicate the phenomenology of waking experience, and how to render this claim empirically plausible is unclear. By contrast, claims about the </span><i data-dcnode-id="5781"><span data-dcnode-id="5782" instrument_node="">typical</span></i><span data-dcnode-id="5780" instrument_node=""> phenomenological profile of dreaming can make an argument for one side or the other more intuitively compelling—but they are mainly illustrative and do not necessarily carry much argumentative weight in addressing the deeper metaphysical question. While it is clear, given the dialectic between the internalist and the externalist, why both assume dreaming to be a state of functional disembodiment, it is also worth asking whether this position in fact adequately characterizes all or even a majority of dreams. In the next section, I propose that it does not.</span></p><p data-dcnode-id="5777"><span data-dcnode-id="5778" instrument_node="">But first, I want to draw attention to the fact that by relying on such fairly sweeping claims about the typical phenomenological structure of dreaming, proponents on both sides of the debate are overlooking a set of questions that is theoretically interesting in its own right. Namely, what is the typical phenomenological profile of dreaming and specifically of bodily experience in dreams? How does bodily experience vary both within and across dreams? And how does the phenomenology of embodied selfhood in dreams relate to sensory input and motor output? These questions move away from the metaphysical debate on the constitutive supervenience base of experience. Instead, I focus on giving a descriptive and explanatory account of bodily experience in dreams that is empirically plausible and suggests questions for future research. The resulting framework suggests that dreaming is typically quite different from waking experience, but also subject to a high degree of variability on both the phenomenological and functional levels of description. And while I take this to be an interesting result in its own right, it suggests that dreaming is not, in fact, a suitable illustrative example for either the internalist or the externalist.</span></p></div></div></section><section data-dcnode-id="5323" data-title="Contra cranial envatment: dreams as weakly phenomenally-functionally embodied states"><div class="c-article-section" data-dcnode-id="5324" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5772" id="Sec3"><span data-dcnode-id="5773" instrument_node="">Contra cranial envatment: dreams as weakly phenomenally-functionally embodied states</span></h2><div class="c-article-section__content" data-dcnode-id="5325" id="Sec3-content"><p data-dcnode-id="5746"><span data-dcnode-id="5771" instrument_node="">So far, we have seen that the standard account of bodily experience in dreams involves two potentially separable components: a phenomenological characterization of a majority of dreams, over which internalists and externalists disagree, and a functional claim accepted by both sides, the cranial envatment view. To adequately assess these two components, it is helpful to draw a distinction between two kinds of embodiment. The first, which I call </span><i data-dcnode-id="5769"><span data-dcnode-id="5770" instrument_node="">phenomenal embodiment</span></i><span data-dcnode-id="5768" instrument_node="">, refers to the subjective or qualitative character of bodily experience. The second, which I call </span><i data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">functional embodiment</span></i><span data-dcnode-id="5765" instrument_node="">, refers to the causal relationship between phenomenal embodiment on the one hand and sensory inputs and motor outputs on the level of the physical body on the other hand.</span><sup data-dcnode-id="5760"><a data-dcnode-id="5761" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">Footnote </span></span><span data-dcnode-id="5762" instrument_node="">2</span></a></sup><span data-dcnode-id="5759" instrument_node=""> The standard way of construing this relationship is to say that dreams are </span><i data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">functionally</span></i><span data-dcnode-id="5756" instrument_node=""> disembodied states (roughly equivalent to the proverbial brain-in-a-vat) involving wake-like </span><i data-dcnode-id="5754"><span data-dcnode-id="5755" instrument_node="">phenomenal</span></i><span data-dcnode-id="5753" instrument_node=""> embodiment.</span><sup data-dcnode-id="5748"><a data-dcnode-id="5749" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="5751"><span data-dcnode-id="5752" instrument_node="">Footnote </span></span><span data-dcnode-id="5750" instrument_node="">3</span></a></sup><span data-dcnode-id="5747" instrument_node=""> A maximally opposing alternative would be to say that functional disembodiment in dreams is complemented by phenomenal disembodiment: in the absence of real-body inputs, we do not experience ourselves as embodied agents in our dreams.</span></p><p data-dcnode-id="5744"><span data-dcnode-id="5745" instrument_node="">My aim in this section is to provide an empirically informed account of these two types of embodiment in dreams. To do so, I will first address phenomenal and functional embodiment separately and then propose a unified account. The result will be an intermediate position in which dreams are weakly phenomenally and functionally embodied states, and bodily experiences in dreams are neither completely independent from nor completely dependent on real-body changes. Moreover, both the phenomenology of dreaming and its functional connection to the sleeping body is variable.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5742" id="Sec4"><span data-dcnode-id="5743" instrument_node="">Phenomenal embodiment in dreams</span></h3><p data-dcnode-id="5701"><span data-dcnode-id="5741" instrument_node="">Dreams are notoriously heterogeneous, and attempts at a general characterization—such as that all dreams are visual, narratively complex, bizarre, and emotionally intense (Hobson et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="5739" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d104911213e520" title="Hobson, J. A., Pace-Schott, E. F., &amp; Stickgold, R. (2000). Dreaming and the brain: Toward a cognitive neuroscience of conscious states. Behavioral and Brain Sciences, 23(6), 793–842. (discussion 904–1121) ."><span data-dcnode-id="5740" instrument_node="">2000</span></a><span data-dcnode-id="5738" instrument_node="">)—quickly lead to counterexamples (Windt </span><a aria-label="Reference 2010" data-dcnode-id="5736" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR153" id="ref-link-section-d104911213e523" title="Windt, J. M. (2010). The immersive spatiotemporal hallucination model of dreaming. Phenomenology and the Cognitive Sciences, 9(2), 295–316."><span data-dcnode-id="5737" instrument_node="">2010</span></a><span data-dcnode-id="5735" instrument_node="">, </span><a aria-label="Reference 2015a" data-dcnode-id="5733" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e526" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5734" instrument_node="">2015a</span></a><span data-dcnode-id="5732" instrument_node="">, chap.&nbsp;11). But one of the most stable findings from numerous studies is that dream reports consistently describe the presence of a self (Strauch and Meier </span><a aria-label="Reference 1996" data-dcnode-id="5730" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d104911213e529" title="Strauch, I., &amp; Meier, B. (1996). In search of dreams: Results of experimental dream research. New York: State University of New York Press."><span data-dcnode-id="5731" instrument_node="">1996</span></a><span data-dcnode-id="5729" instrument_node="">; see also Occhionero et&nbsp;al. </span><a aria-label="Reference 2005" data-dcnode-id="5727" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d104911213e532" title="Occhionero, M., Cicogna, P., Natale, V., Esposito, M. J., &amp; Bosinelli, M. (2005). Representation of self in SWS and REM dreams. Sleep and Hypnosis, 7(2), 77."><span data-dcnode-id="5728" instrument_node="">2005</span></a><span data-dcnode-id="5726" instrument_node="">; Speth et&nbsp;al. </span><a aria-label="Reference 2013" data-dcnode-id="5724" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d104911213e536" title="Speth, J., Frenzel, C., &amp; Voss, U. (2013). A differentiating empirical linguistic analysis of dreamer activity in reports of EEG-controlled REM-dreams and hypnagogic hallucinations. Consciousness and Cognition, 22(3), 1013–1021."><span data-dcnode-id="5725" instrument_node="">2013</span></a><span data-dcnode-id="5723" instrument_node="">). In keeping with simulation views, this leads to the claim that the experience of a self in a world is the phenomenal core of dreaming. Self-experience forms a point of convergence underlying the variability of dream experience in types of imagery, emotions, and narrative organization. </span><i data-dcnode-id="5721"><span data-dcnode-id="5722" instrument_node="">Phenomenal selfhood</span></i><span data-dcnode-id="5720" instrument_node="">—roughly, the experience of being or having a self—is closely related to the immersive structure of dreaming (Windt </span><a aria-label="Reference 2010" data-dcnode-id="5718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR153" id="ref-link-section-d104911213e542" title="Windt, J. M. (2010). The immersive spatiotemporal hallucination model of dreaming. Phenomenology and the Cognitive Sciences, 9(2), 295–316."><span data-dcnode-id="5719" instrument_node="">2010</span></a><span data-dcnode-id="5717" instrument_node="">, </span><a aria-label="Reference 2015a" data-dcnode-id="5715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e545" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5716" instrument_node="">2015a</span></a><span data-dcnode-id="5714" instrument_node="">; Windt et&nbsp;al. </span><a aria-label="Reference 2016" data-dcnode-id="5712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d104911213e548" title="Windt, J. M., Nielsen, T., &amp; Thompson, E. (2016). Does consciousness disappear in dreamless sleep? Trends in Cognitive Sciences, 20(12), 871–882."><span data-dcnode-id="5713" instrument_node="">2016</span></a><span data-dcnode-id="5711" instrument_node="">). This robust </span><i data-dcnode-id="5709"><span data-dcnode-id="5710" instrument_node="">here-and-now</span></i><span data-dcnode-id="5708" instrument_node=""> experience marks a deep commonality between dreaming and the feeling of presence in immersive virtual reality, but also in standard wake states. It also sets dreams apart from waking imaginings and daydreams: even when we are lost in a vivid daydream and imagine experiencing events from an internal point of view—rather than from the outside, much as in viewing a movie on a screen—ongoing perceptual and bodily experience prevent us from feeling fully present in these imaginary worlds. By contrast, even passive observer dreams are immersive: they involve a phenomenal </span><i data-dcnode-id="5706"><span data-dcnode-id="5707" instrument_node="">here</span></i><span data-dcnode-id="5705" instrument_node=""> and are experienced from an internal first-person perspective in a more robust sense related to the phenomenology of presence. Like dreams, daydreams are mental simulations, but daydreams are typically also experienced as such and lack the immersive character of dreams (Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d104911213e558" title="Metzinger, T. (2003). Being no one: The self-model theory of subjectivity. Cambridge (MA): MIT Press."><span data-dcnode-id="5704" instrument_node="">2003</span></a><span data-dcnode-id="5702" instrument_node="">).</span></p><p data-dcnode-id="5690"><span data-dcnode-id="5700" instrument_node="">In most dreams, the dream self, or the character the dreamer identifies with, is just one among a number of other dream characters. The average dream involves 2–4 non-self dream characters (Kahn et&nbsp;al. </span><a aria-label="Reference 2000" data-dcnode-id="5698" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d104911213e564" title="Kahn, D., Stickgold, R., Pace-Schott, E., &amp; Hobson, J. (2000). Dreaming and waking consciousness: A character recognition study. Journal of Sleep Research, 9(4), 317–325."><span data-dcnode-id="5699" instrument_node="">2000</span></a><span data-dcnode-id="5697" instrument_node="">), and social interactions are actually more frequent in dream reports than in randomly timed waking reports (McNamara et&nbsp;al. </span><a aria-label="Reference 2005" data-dcnode-id="5695" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d104911213e567" title="McNamara, P., McLaren, D., Smith, D., Brown, A., &amp; Stickgold, R. (2005). A “Jekyll and Hyde” within aggressive versus friendly interactions in REM and non-REM dreams. Psychological Science, 16(2), 130–136."><span data-dcnode-id="5696" instrument_node="">2005</span></a><span data-dcnode-id="5694" instrument_node="">). Self-other distinctions thus appear closely bound up with the phenomenal structure of dreaming: phenomenal selfhood locates the dreamer at the center not just of the dream world, but also of a simulated social reality (Revonsuo et&nbsp;al. </span><a aria-label="Reference 2015" data-dcnode-id="5692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d104911213e570" title="Revonsuo, A., Tuominen, J., &amp; Valli, K. (2015). The avatars in the machine: Dreaming as a simulation of social reality. In T. Metzinger &amp; J. M. Windt (Eds.), Open MIND: 32(T). Frankfurt am Main: MIND Group."><span data-dcnode-id="5693" instrument_node="">2015</span></a><span data-dcnode-id="5691" instrument_node="">).</span></p><p data-dcnode-id="5670"><span data-dcnode-id="5689" instrument_node="">The link between phenomenal selfhood, presence, and </span><i data-dcnode-id="5687"><span data-dcnode-id="5688" instrument_node="">here-and-now</span></i><span data-dcnode-id="5686" instrument_node=""> experience gives us a coarse-grained phenomenological description of dreaming. But on its own, it does not yield any specific insights about the phenomenological profile of self-experience in dreams and the subtle (or not so subtle) ways in which it differs from wakefulness. If we look specifically to reports of bodily experiences in dreams, it is noteworthy that a majority of dream reports (around 75%) describe movement, ranging from the sensation of moving a limb to movements observed in others. By contrast, strong vestibular sensations involving whole-body movements such as flying, floating, or falling are described in only 8% of dream reports, and sensations of touch, pain, physical pleasure, visceral sensations, nausea, ticklish sensations, proprioception, and sensations of heat and cold are extremely rare, occurring in only 1–4% of dream reports (Hobson </span><a aria-label="Reference 1988" data-dcnode-id="5684" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d104911213e579" title="Hobson, J. A. (1988). The dreaming brain. New York: Basic Books."><span data-dcnode-id="5685" instrument_node="">1988</span></a><span data-dcnode-id="5683" instrument_node="">). These findings are relatively stable over studies from different research groups and historical periods (Schwartz </span><a aria-label="Reference 2000" data-dcnode-id="5681" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d104911213e582" title="Schwartz, S. (2000). A historical loop of one hundred years: Similarities between 19th century and contemporary dream research. Dreaming, 10(1), 55."><span data-dcnode-id="5682" instrument_node="">2000</span></a><span data-dcnode-id="5680" instrument_node="">). They also fit in well with the finding that explicit references to the self comprise only 3% of content categories in dream reports (Revonsuo and Salmivalli </span><a aria-label="Reference 1995" data-dcnode-id="5678" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d104911213e585" title="Revonsuo, A., &amp; Salmivalli, C. (1995). A content analysis of bizarre elements in dreams. Dreaming, 5(3), 169."><span data-dcnode-id="5679" instrument_node="">1995</span></a><span data-dcnode-id="5677" instrument_node="">). If we additionally assume these reports to be trustworthy and complete, this lack of descriptive detail in a majority of dream reports reflects the sparse, schematic character of bodily self-experience in dreams, with movement sensations and body-part representations predominating whereas multimodal, integrated, and detailed full-body experience is underrepresented. At least for laboratory studies, which minimize the time lag between timed awakenings from different sleep stages and dream reports, this assumption seems warranted (Windt </span><a aria-label="Reference 2013" data-dcnode-id="5675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR154" id="ref-link-section-d104911213e588" title="Windt, J. M. (2013). Reporting dream experience: Why (not) to be skeptical about dream reports. Frontiers in Human Neuroscience, 7, 708."><span data-dcnode-id="5676" instrument_node="">2013</span></a><span data-dcnode-id="5674" instrument_node="">, </span><a aria-label="Reference 2015a" data-dcnode-id="5672" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e592" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5673" instrument_node="">2015a</span></a><span data-dcnode-id="5671" instrument_node="">, chaps.&nbsp;3&nbsp;and&nbsp;4).</span></p><p data-dcnode-id="5644"><span data-dcnode-id="5669" instrument_node="">The next question is whether bodily experience in dreams differs from wakefulness. That there are indeed such systematic differences is nicely illustrated by the example of phantom limbs in dreams. Following the loss of a limb, for instance after amputation, many subjects report the vivid sensation that the absent limb is still present. Phantom limbs can change over time, for instance by shrinking in size and eventually disappearing. Often, especially following traumatic loss of the limb, as in an accident, the phantom is paralyzed and frozen in an uncomfortable position. Phantoms can also be associated with tickling or even pain sensations (Brugger </span><a aria-label="Reference 2006" data-dcnode-id="5667" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d104911213e598" title="Brugger, P. (2006). From phantom limb to phantom body: Varieties of extracorporeal awareness. In G. Knoblich, I. M. Thornton, M. Grosjean, &amp; M. Shiffrar (Eds.), Human body perception from the inside out. Oxford: Oxford University Press."><span data-dcnode-id="5668" instrument_node="">2006</span></a><span data-dcnode-id="5666" instrument_node="">). In dreams, the absent limb also often continues to be represented—often for decades (Brugger </span><a aria-label="Reference 2008" data-dcnode-id="5664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d104911213e601" title="Brugger, P. (2008). The phantom limb in dreams. Consciousness and Cognition, 17(4), 1272–1278."><span data-dcnode-id="5665" instrument_node="">2008</span></a><span data-dcnode-id="5663" instrument_node="">; Mulder et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="5661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d104911213e604" title="Mulder, T., Hochstenbach, J., Dijkstra, P. U., &amp; Geertzen, J. H. (2008). Born to adapt, but not in your dreams. Consciousness and Cognition, 17(4), 1266–1271."><span data-dcnode-id="5662" instrument_node="">2008</span></a><span data-dcnode-id="5660" instrument_node="">). The size of dream phantoms is variable, and in one study, roughly half of participants reported that their dream phantom corresponded to their waking phantom (Frank and Lorenzoni </span><a aria-label="Reference 1989" data-dcnode-id="5658" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d104911213e607" title="Frank, B., &amp; Lorenzoni, E. (1989). Experiences of phantom limb sensations in dreams. Psychopathology, 22(4), 182–187."><span data-dcnode-id="5659" instrument_node="">1989</span></a><span data-dcnode-id="5657" instrument_node="">). Despite this superficial resemblance, however, the way in which phantoms were experienced was different in dreams and wakefulness. In dreams, phantom limbs were mostly visually represented (Frank and Lorenzoni </span><a aria-label="Reference 1989" data-dcnode-id="5655" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d104911213e610" title="Frank, B., &amp; Lorenzoni, E. (1989). Experiences of phantom limb sensations in dreams. Psychopathology, 22(4), 182–187."><span data-dcnode-id="5656" instrument_node="">1989</span></a><span data-dcnode-id="5654" instrument_node="">), whereas unpleasant sensations of tingling or pain had typically disappeared (Vetrugno et&nbsp;al. </span><a aria-label="Reference 2008" data-dcnode-id="5652" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR145" id="ref-link-section-d104911213e614" title="Vetrugno, R., Arnulf, I., &amp; Montagna, P. (2008). Disappearance of “phantom limb” and amputated arm usage during dreaming in REM sleep behaviour disorder. Journal of Neurology, Neurosurgery, and Psychiatry, 79, 481– 483."><span data-dcnode-id="5653" instrument_node="">2008</span></a><span data-dcnode-id="5651" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="5649" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR146" id="ref-link-section-d104911213e617" title="Vetrugno, R., Arnulf, I., &amp; Montagna, P. (2009). Disappearance of “phantom limb” and amputated arm usage during dreaming in REM sleep behaviour disorder. BMJ Case Reports, 2009, bcr0920080851."><span data-dcnode-id="5650" instrument_node="">2009</span></a><span data-dcnode-id="5648" instrument_node="">; Alessandria et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d104911213e620" title="Alessandria, M., Vetrugno, R., Cortelli, P., &amp; Montagna, P. (2011). Normal body scheme and absent phantom limb experience in amputees while dreaming. Consciousness and Cognition, 20(4), 1831–1834."><span data-dcnode-id="5647" instrument_node="">2011</span></a><span data-dcnode-id="5645" instrument_node="">). Participants with paralyzed phantoms in wakefulness also reported being able to move their phantoms in their dreams.</span></p><p data-dcnode-id="5636"><span data-dcnode-id="5643" instrument_node="">The predominance specifically of movement sensations in dreams is also evident in the dreams of subjects with congenital paraplegia. As is generally the case for dreams, their dream reports frequently describe whole-body movements such as walking or running (Voss et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5641" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d104911213e627" title="Voss, U., Tuin, I., Schermelleh-Engel, K., &amp; Hobson, A. (2011). Waking and dreaming: Related but structurally independent. Dream reports of congenitally paraplegic and deaf-mute persons. Consciousness and Cognition, 20(3), 673–687."><span data-dcnode-id="5642" instrument_node="">2011</span></a><span data-dcnode-id="5640" instrument_node="">; Saurat et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5638" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d104911213e630" title="Saurat, M.-T., Agbakou, M., Attigui, P., Golmard, J.-L., &amp; Arnulf, I. (2011). Walking dreams in congenital and acquired paraplegia. Consciousness and Cognition, 20(4), 1425–1432."><span data-dcnode-id="5639" instrument_node="">2011</span></a><span data-dcnode-id="5637" instrument_node="">). An example is the following dream reported by a subject with congenital paraplegia for 40&nbsp;years:</span></p><blockquote class="c-blockquote" data-dcnode-id="5627"><div class="c-blockquote__body" data-dcnode-id="5628"><span data-dcnode-id="5635" instrument_node="">
</span><p data-dcnode-id="5630"><span data-dcnode-id="5634" instrument_node="">I was able-bodied, learning ballet at the ‘cours Florent’ [a Parisian drama school]. I was dancing the Swan Lake. I wore a white tutu and pink ballet shoes. I was dancing with a light step and doing what the teacher told me to do. (Saurat et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5632" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d104911213e637" title="Saurat, M.-T., Agbakou, M., Attigui, P., Golmard, J.-L., &amp; Arnulf, I. (2011). Walking dreams in congenital and acquired paraplegia. Consciousness and Cognition, 20(4), 1425–1432."><span data-dcnode-id="5633" instrument_node="">2011</span></a><span data-dcnode-id="5631" instrument_node="">,&nbsp;p.&nbsp;1427)</span></p><span data-dcnode-id="5629" instrument_node="">
</span></div></blockquote><p data-dcnode-id="5616"><span data-dcnode-id="5626" instrument_node=""> If we assume that dreams of specific whole-body movements must exactly replicate their wake-like phenomenology—for instance by involving richly detailed, multimodal representation of the whole body including body parts—such seemingly realistic reports of movements the dreamers themselves have never experienced would be quite mysterious. If by contrast we assume that schematic movement representations (which may or may not be accompanied by corresponding visual imagery) are sufficient for such dreams, we can begin&nbsp;to work towards a more parsimonious account. This account might then also be extended to the dreams of healthy participants. Relevant to this point is the fact blind raters are unable to distinguish dream reports from healthy controls from those of congenitally paraplegic subjects (Voss et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5624" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d104911213e642" title="Voss, U., Tuin, I., Schermelleh-Engel, K., &amp; Hobson, A. (2011). Waking and dreaming: Related but structurally independent. Dream reports of congenitally paraplegic and deaf-mute persons. Consciousness and Cognition, 20(3), 673–687."><span data-dcnode-id="5625" instrument_node="">2011</span></a><span data-dcnode-id="5623" instrument_node="">; Saurat et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d104911213e645" title="Saurat, M.-T., Agbakou, M., Attigui, P., Golmard, J.-L., &amp; Arnulf, I. (2011). Walking dreams in congenital and acquired paraplegia. Consciousness and Cognition, 20(4), 1425–1432."><span data-dcnode-id="5622" instrument_node="">2011</span></a><span data-dcnode-id="5620" instrument_node="">). This is all the more compelling as in one study, participant were explicitly asked to report different types of sensations, including movement and tactile sensations (Voss et&nbsp;al. </span><a aria-label="Reference 2011" data-dcnode-id="5618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d104911213e649" title="Voss, U., Tuin, I., Schermelleh-Engel, K., &amp; Hobson, A. (2011). Waking and dreaming: Related but structurally independent. Dream reports of congenitally paraplegic and deaf-mute persons. Consciousness and Cognition, 20(3), 673–687."><span data-dcnode-id="5619" instrument_node="">2011</span></a><span data-dcnode-id="5617" instrument_node="">). This suggests that the similarity in dream reports from both groups may be underwritten by a similarity in experience.</span></p><p data-dcnode-id="5611"><span data-dcnode-id="5615" instrument_node="">It also does not seem to be the case that people are generally unable to report detailed bodily experiences such as tactile sensations. Schwitzgebe (</span><a aria-label="Reference 2007" data-dcnode-id="5613" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR136" id="ref-link-section-d104911213e655" title="Schwitzgebel, E. (2007). Do you have constant tactile experience of your feet in your shoes? Or is experience limited to what’s in attention? Journal of Consciousness Studies, 14(3), 5–35."><span data-dcnode-id="5614" instrument_node="">2007</span></a><span data-dcnode-id="5612" instrument_node="">) used experience sampling to investigate the frequency of bodily experiences in wakefulness. A beeper, set to go off at randomly timed intervals, was used to prompt participants to describe any bodily experiences occurring immediately before the beep. This method is similar to laboratory studies of dreaming in that both ask participants to describe their most recent experiences. As is the case for dreams, reports of visual experience were by far the most frequent. However, tactile experiences were still described in over 75% of reports. And when asked about experiences that had likely been outside the focus of attention prior to the beep—such as tactile experiences in their left foot—almost half of participants reported such experiences. This suggests that in wakefulness, we are not generally unable to report detailed bodily experiences, even when these are outside the focus of attention. The near-absence of reports of tactile experiences thus seems specific to dreaming. This lends preliminary support to the idea that the pattern of bodily experience in dreams differs from wakefulness, and that it does so in systematic ways and in different participant groups.</span></p><p data-dcnode-id="5603"><span data-dcnode-id="5610" instrument_node="">As a first pass at a descriptive account, we can conclude that a majority of dreams are weakly phenomenally embodied states in which movement sensations are frequent, but other kinds of bodily experiences (such as tactile sensations) are systematically underrepresented. Moreover, their absence is typically not noticed: large parts of the dream body are phenomenally indeterminate and neither experienced as present nor as absent (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="5608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e661" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5609" instrument_node="">2015a</span></a><span data-dcnode-id="5607" instrument_node="">, chap.&nbsp;7). The dream body would then be largely characterized by an inconspicuous absence that fails to show up on the level of phenomenal experience. While there is likely much variation, bodily experiences in dreams (such as movement sensations) are islands of determinacy occurring against a backdrop of largely overlooked phenomenal indeterminacy. And while phenomenal indeterminacy may also characterize waking experience (an example would be indeterminacy with respect to color in the periphery of the visual field; see Dennett </span><a aria-label="Reference 1991" data-dcnode-id="5605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d104911213e664" title="Dennett, D. C. (1991). Consciousness explained. Boston: Little, Brown and Co."><span data-dcnode-id="5606" instrument_node="">1991</span></a><span data-dcnode-id="5604" instrument_node="">), waking experience arguably inherits some of its detail from the mind-independent objects of perception. It thus seems plausible that phenomenal indeterminacy would be even more widespread in waking imagination, but also in dreams.</span></p><p data-dcnode-id="5592"><span data-dcnode-id="5602" instrument_node="">If this is on the right track, it suggests that dreams of bodily actions such as running or dancing need not mimic waking experience in all of its detail. In dreams, even schematic movement representations arising independently of tactile sensations or an integrated representation of the whole body (including body parts) can still </span><i data-dcnode-id="5600"><span data-dcnode-id="5601" instrument_node="">feel</span></i><span data-dcnode-id="5599" instrument_node=""> realistic, because the characteristic differences from wakefulness are quietly glossed over.</span><sup data-dcnode-id="5594"><a data-dcnode-id="5595" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="5597"><span data-dcnode-id="5598" instrument_node="">Footnote </span></span><span data-dcnode-id="5596" instrument_node="">4</span></a></sup><span data-dcnode-id="5593" instrument_node=""> This offers a more parsimonious account of mental simulation in dreams, but also yields empirical predictions. For instance, explicitly asking participants to describe different kinds of bodily experience in dreams, and comparing the results to reports of waking experience, should make these differences show up and become quantifiable. For now, my main point is that based on the available evidence, bodily experience in dreams should not be modeled on standard waking experience, nor can it be described as a whole-body variant of phantom limb experience. Instead, bodily experience in dreams requires a characterization of its own.</span></p><p data-dcnode-id="5587"><span data-dcnode-id="5591" instrument_node="">Of particular interest are not just the ways in which dreams differ from waking experience, but also variation and atypical bodily experience within dreams. If we assume that phenomenal indeterminacy is the standard case, then in a majority of dreams, certain types of bodily experiences and/or the experience of individual body parts may be missing by way of an unnoticed absence. Yet, to further substantiate this claim, we would expect there to be cases in which the sparsity and incompleteness of the dream body is experienced—as in dreams in which individual body parts are experienced as absent (Windt </span><a aria-label="Reference 2015a" data-dcnode-id="5589" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d104911213e688" title="Windt, J. M. (2015a). Dreaming: A conceptual framework for philosophy of mind and empirical research. Cambridge, MA: MIT Press."><span data-dcnode-id="5590" instrument_node="">2015a</span></a><span data-dcnode-id="5588" instrument_node="">, chap.&nbsp;7). These experiences of partial disembodiment are probably rare in dreams; one hypothesis is that they result when the absence of a body-part representation becomes available to attention.</span></p><p data-dcnode-id="5567"><span data-dcnode-id="5586" instrument_node="">But there are also cases in which the entire body is experienced as missing: “I was inside a gigantic photocopying machine. I knew I was inside this machine, not as a physical human being but as an abstract entity, as a mind, so I couldn’t see myself” (Cicogna and Bosinelli </span><a aria-label="Reference 2001" data-dcnode-id="5584" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d104911213e694" title="Cicogna, P., &amp; Bosinelli, M. (2001). Consciousness during dreams. Consciousness and Cognition, 10(1), 26–41."><span data-dcnode-id="5585" instrument_node="">2001</span></a><span data-dcnode-id="5583" instrument_node="">,&nbsp;p.&nbsp;32). Lucid dreamers sometimes also describe the experience of being nothing other than a gaseous volume or an unextended point in space (LaBerge and DeGracia </span><a aria-label="Reference 2000" data-dcnode-id="5581" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d104911213e697" title="LaBerge, S., &amp; DeGracia, D. J. (2000). Varieties of lucid dreaming experience. Individual Differences in Conscious Experience, 20, 269."><span data-dcnode-id="5582" instrument_node="">2000</span></a><span data-dcnode-id="5580" instrument_node="">). These instances of phenomenal disembodiment have not, to my knowledge, been investigated systematically. But based on similarities between anecdotal reports, it seems that they often precede the fading of the dream and a dissolution of any sense of self, including the experience of being located at a particular point in space (for a fuller discussion, see Windt </span><a aria-label="Reference 2015a" data-dcnode-id="5578" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-li
