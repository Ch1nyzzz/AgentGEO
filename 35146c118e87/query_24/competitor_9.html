</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Goldsmiths' operating principles for 2022-23 have not yet been finalised but should changes be required to teaching in response to the Covid-19 pandemic, we will publish these as early as possible for prospective students wishing to start their programme in September 2022.</span></p><span data-dcnode-id="2408" instrument_node="">
</span></div><span data-dcnode-id="2406" instrument_node="">
</span></div><span data-dcnode-id="2404" instrument_node="">
</span><p class="emphasis" data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">This degree offers a scientific approach to the study of human behaviour, with an emphasis on neuroscience explanations of human behaviour and neuroscience methods. It will develop your understanding of the processes that influence people.</span></p><span data-dcnode-id="2401" instrument_node="">
</span><span data-dcnode-id="2399" instrument_node="">

</span><p data-dcnode-id="2394"><img alt="" data-dcnode-id="2395" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/media/images-by-section/study/booklets/accreditation-logos/bps-logo.jpg&amp;raw"></p><span data-dcnode-id="2393" instrument_node="">
</span></div><span data-dcnode-id="2391" instrument_node="">
</span><div class="teaser__accreditation__caption" data-dcnode-id="2385"><p data-dcnode-id="2386"><span data-dcnode-id="2390" instrument_node="">The degree is accredited by the </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bps.org.uk/" target="_blank"><span data-dcnode-id="2389" instrument_node="">British Psychological Society</span></a><span data-dcnode-id="2387" instrument_node=""> as conferring eligibility for Graduate Membership of the Society and also the Graduate Basis for Chartered Membership, which is the first step towards becoming a Chartered Psychologist</span></p></div><span data-dcnode-id="2384" instrument_node="">
</span></div><span data-dcnode-id="2382" instrument_node="">
</span></div><span data-dcnode-id="2380" instrument_node="">
</span><span data-dcnode-id="2378" instrument_node="">
</span><h3 data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Why study&nbsp;BSc Psychology with Cognitive Neuroscience at Goldsmiths?</span></h3><span data-dcnode-id="2375" instrument_node="">
</span><ul data-dcnode-id="2370"><span data-dcnode-id="2374" instrument_node="">
</span><li data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">You'll be taught by experts in their field, and will have the opportunity to get involved in the world-class research taking place in the department.</span></li><span data-dcnode-id="2371" instrument_node="">
</span></ul><span data-dcnode-id="2369" instrument_node="">
</span><ul data-dcnode-id="2364"><span data-dcnode-id="2368" instrument_node="">
</span><li data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">We have excellent specialist and general-purpose research laboratories, including EEG suites and brain stimulation (TMS and tDCS/tACS) labs for brain research, an infant lab, and an eyetracker laboratory.</span></li><span data-dcnode-id="2365" instrument_node="">
</span></ul><span data-dcnode-id="2363" instrument_node="">
</span><ul data-dcnode-id="2358"><span data-dcnode-id="2362" instrument_node="">
</span><li data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">You'll participate in our innovative mentoring scheme, which involves meeting regularly with a member of academic staff who'll help&nbsp;your psychological thinking as well as your study, research and employability skills.</span></li><span data-dcnode-id="2359" instrument_node="">
</span></ul><span data-dcnode-id="2357" instrument_node="">
</span><ul data-dcnode-id="2352"><span data-dcnode-id="2356" instrument_node="">
</span><li data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">You'll be trained in the design of experiments, hands-on neuroscience lab skills, statistics and the use of psychology-relevant&nbsp;experiment software for data and statistical analysis.</span></li><span data-dcnode-id="2353" instrument_node="">
</span></ul><span data-dcnode-id="2351" instrument_node="">
</span><ul data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node="">
</span><li data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">You can take advantage of our well-established links with employers of psychology graduates, and our programme of career&nbsp;development for students at all levels.</span></li><span data-dcnode-id="2347" instrument_node="">
</span></ul><span data-dcnode-id="2345" instrument_node="">
</span><h4 data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">Contact the department</span></h4><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2341" instrument_node="">If you have specific questions about the degree, contact </span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/study/contact/form/%3Fto%3DPeter.Holland%26name%3DPeter%2520Holland"><span data-dcnode-id="2340" instrument_node="">Peter Holland</span></a><span data-dcnode-id="2338" instrument_node="">.</span></p><span data-dcnode-id="2336" instrument_node="">

</span><h3 data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Overview</span></h3><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">This degree deals with the broad themes of cognition, individual differences, biological and evolutionary issues, social functioning, and development across the lifespan.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">The modules you take will develop your understanding of psychology’s everyday applications, such as studies&nbsp;of people at work and the rationale for and use of psychological tests.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">You'll have the opportunity to develop your own particular interests by choosing from a wide range of specialist modules, and will carry out a research project on a subject on a cognitive neuroscience-related topic of your choice with guidance and support from a supervisor. This allows you to apply the many skills you have learned throughout the programme to&nbsp;define and address new questions.</span></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">This modular system allows considerable flexibility of choice in your final year when you can tailor your study according to your particular interests and ultimate aims. You will choose six option modules, with at least four modules on topics relating to neuroscience. Your final year research dissertation will be on a neuroscience topic supervised by an expert in the field. The&nbsp;precise list changes year by year (for example, a new member of staff may add a module). The current full list of modules offered by the department can be found below.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><h3 data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Year 1 (credit level 4)</span></h3><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">In Year 1 you will take introductory modules covering the main topics within psychology. You will also receive practical training in the principles, methods and techniques of psychological research.</span></p><span data-dcnode-id="2289" instrument_node="">

</span><a class="modal-window__inline cboxElement" data-dcnode-id="2143" href="#module-content--90241" rel="module"><span data-dcnode-id="2144" instrument_node="">Information Processing and Cognition</span></a><span data-dcnode-id="2142" instrument_node="">

</span><h2 class="teaser__title" data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Information Processing and Cognition</span></h2><span data-dcnode-id="2138" instrument_node="">

</span><div class="teaser__body" data-dcnode-id="2109"><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">This module is designed as a general conceptual overview of cognitive psychology and an introduction to topics that are central to the study of human cognition. Emphasis is placed on the methods and theoretical models used by cognitive psychologists to study human perception and thinking.</span></p><span data-dcnode-id="2131" instrument_node="">

</span><li data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">visual perception</span></li><span data-dcnode-id="2124" instrument_node="">
</span><li data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">models of attention and short-term memory</span></li><span data-dcnode-id="2121" instrument_node="">
</span><li data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">encoding and retrieval of information from long-term memory, classical and operant conditioning</span></li><span data-dcnode-id="2118" instrument_node="">
</span><li data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">connectionist models of learning</span></li><span data-dcnode-id="2115" instrument_node="">

</span><a class="modal-window__inline cboxElement" data-dcnode-id="2092" href="#module-content--163264" rel="module"><span data-dcnode-id="2093" instrument_node="">Design and Analysis of Psychological Investigations</span></a><span data-dcnode-id="2091" instrument_node="">

</span><h2 class="teaser__title" data-dcnode-id="2088"><span data-dcnode-id="2089" instrument_node="">Design and Analysis of Psychological Investigations</span></h2><span data-dcnode-id="2087" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">30 credits</span></div><span data-dcnode-id="2084" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="2073"><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">This module provides an introduction to experimental research in psychology. The lecture component covers experimental design and statistics. The laboratory component focuses on designing and running experiments, applying statistical analyses to data generated, and reporting experimental findings. Lectures and labs are linked so that designs and analyses introduced in lectures are implemented in labs.</span></p><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Topics include experimental design, research ethics, and statistical analysis of experimental data up to and including the analysis of designs with one independent variable and more than two experimental conditions.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">You will be allocated to a lab class which you will attend on a weekly basis during terms 1 and 2. Your allocation will be posted on the first-year notice-board. In addition, you must attend a weekly lecture for your whole year group.</span></p><span data-dcnode-id="2074" instrument_node="">

</span><div class="teaser__meta" data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">45 credits</span></div><span data-dcnode-id="1576" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1519"><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">The purpose of the project is for you to gain direct experience of:</span></p><span data-dcnode-id="1572" instrument_node="">
</span><ul data-dcnode-id="1549"><span data-dcnode-id="1571" instrument_node="">
</span><li data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">formulating a theoretical question</span></li><span data-dcnode-id="1568" instrument_node="">
</span><li data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">translating this into testable hypotheses</span></li><span data-dcnode-id="1565" instrument_node="">
</span><li data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">designing an original study which adequately tests the hypotheses</span></li><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">implementing the research procedures</span></li><span data-dcnode-id="1559" instrument_node="">
</span><li data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">analysing the data using appropriate statistics</span></li><span data-dcnode-id="1556" instrument_node="">
</span><li data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">interpreting the results in light of both conceptual and practical considerations</span></li><span data-dcnode-id="1553" instrument_node="">
</span><li data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">communicating this information clearly in the form of a written report</span></li><span data-dcnode-id="1550" instrument_node="">
</span></ul><span data-dcnode-id="1548" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1547" instrument_node="">You will also gain experience of oral presentation of your work during the spring term or early in the summer term, to a small group of your peers and your supervisor.</span><br data-dcnode-id="1546"><br data-dcnode-id="1545"><span data-dcnode-id="1544" instrument_node="">The project is a piece of original empirical research, conducted under the supervision of one of the academic members of the Department. Pure theorising, a literature review, or an exact replication study are not acceptable.</span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">There are four stages:</span></p><span data-dcnode-id="1539" instrument_node="">
</span><ol data-dcnode-id="1525"><span data-dcnode-id="1538" instrument_node="">
</span><li data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">formulation of hypotheses and an ethical and feasible research design</span></li><span data-dcnode-id="1535" instrument_node="">
</span><li data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">recruitment of participants/collection of data</span></li><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">analysis and interpretation of data</span></li><span data-dcnode-id="1529" instrument_node="">
</span><li data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">writing the report</span></li><span data-dcnode-id="1526" instrument_node="">
</span></ol><span data-dcnode-id="1524" instrument_node="">
</span><p data-dcnode-id="1521"><br data-dcnode-id="1523"><span data-dcnode-id="1522" instrument_node="">You will then choose five options (three neuroscience-related options and&nbsp;a further two free-choice option modules) These choices could include:&nbsp;</span></p><span data-dcnode-id="1520" instrument_node="">

</span><div class="teaser__body" data-dcnode-id="1467"><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">This module aims to explore the neural basis of cognitive functions such as attention, motor control, personality and social cognition. The lectures will cover the basic principles and methods that are used to study the links between brain and behaviour.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">In the first week the methods used in Cognitive Neuroscience will be introduced. The lectures will then explore nine topic areas in more detail, guided by three main questions:</span></p><span data-dcnode-id="1487" instrument_node="">
</span><ol data-dcnode-id="1476"><span data-dcnode-id="1486" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Which areas in the brain are important for the behaviour studied?</span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">When are these areas activated?</span></li><span data-dcnode-id="1480" instrument_node="">
</span><li data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">How are these brain areas causally involved?</span></li><span data-dcnode-id="1477" instrument_node="">
</span></ol><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Every 2-hour lecture will include approximately 90 minutes of teaching, followed by discussion of a target paper or chapter. For every lecture, a small group of students will read the target paper or book chapter, prepare a short presentation and discussion points, and lead the discussion.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1469"><br data-dcnode-id="1471"><br data-dcnode-id="1470"></p><span data-dcnode-id="1468" instrument_node="">

</span><h2 class="teaser__title" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Psychopathology: Cognitive behavior models and treatments</span></h2><span data-dcnode-id="1420" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">15 credits</span></div><span data-dcnode-id="1417" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1409"><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Major forms of psychopathology will be considered in depth, addressing (a) clinical description; (b) theoretical explanations from cognitive/behavioural perspectives; (c) principles and evaluation of psychological interventions. Interrelationships between different psychopathologies will also be highlighted. The historical context in which CBT has emerged as a dominant force within psychotherapeutic practice will also be addressed.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">This module is designed to introduce students to different forms of psychopathology and to demonstrate how psychological theories have contributed to the understanding of their aetiologies and to the development and evaluation of interventions.</span></p><span data-dcnode-id="1410" instrument_node="">
</span></div><span data-dcnode-id="1408" instrument_node="">
</span></div><span data-dcnode-id="1406" instrument_node="">

</span><a class="modal-window__inline cboxElement" data-dcnode-id="1392" href="#module-content--90297" rel="module"><span data-dcnode-id="1393" instrument_node="">Applications of Attention Research</span></a><span data-dcnode-id="1391" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1377" id="module-content--90297"><span data-dcnode-id="1390" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Applications of Attention Research</span></h2><span data-dcnode-id="1387" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">15 credits</span></div><span data-dcnode-id="1384" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1379"><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">This&nbsp;module will provide detailed study of the scientific investigation of attention, a highly topical aspect of human cognition that plays a fundamental role in our experience of the world. Students will be introduced to current theories of attention and their application to other fields of psychological enquiry including cross-cultural psychology, social psychology, individual differences, and emotion.</span></p><span data-dcnode-id="1380" instrument_node="">

</span><a class="modal-window__inline cboxElement" data-dcnode-id="1362" href="#module-content--90291" rel="module"><span data-dcnode-id="1363" instrument_node="">Anomalistic Psychology</span></a><span data-dcnode-id="1361" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1347" id="module-content--90291"><span data-dcnode-id="1360" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Anomalistic Psychology</span></h2><span data-dcnode-id="1357" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">15 credits</span></div><span data-dcnode-id="1354" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1349"><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">This&nbsp;module includes consideration of the relationship between psychology and parapsychology. This involves discussion of the distinction between science and pseudoscience. The&nbsp;module also involves critical evaluation of various claims, many of which would, if valid, have profound implications for mainstream psychology (including claims derived from astrology, psychoanalysis and alternative therapies). Various psychological processes, which underlie belief in such claims, will be discussed and non-paranormal accounts of ostensibly paranormal experiences, (for example, precognitive dreams, sightings of UFO’s, out-of-body experiences) will be evaluated.</span></p><span data-dcnode-id="1350" instrument_node="">
</span></div><span data-dcnode-id="1348" instrument_node="">
</span></div><span data-dcnode-id="1346" instrument_node="">
</span></td><td data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1298"><td data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1303"><span data-dcnode-id="1334" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1332" href="#module-content--90136" rel="module"><span data-dcnode-id="1333" instrument_node="">Topics in Neuropsychology</span></a><span data-dcnode-id="1331" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1305" id="module-content--90136"><span data-dcnode-id="1330" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Topics in Neuropsychology</span></h2><span data-dcnode-id="1327" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">15 credits</span></div><span data-dcnode-id="1324" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1307"><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">This module is intended to provide:</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">a) knowledge of a range of issues fundamental to understanding cognitive deficits following brain damage;</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">b) understanding of underlying theories of neuropsychology and cognitive neuropsychology;</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">c) understanding of research methods and application of this expertise in the clinical and research domain.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Topics include: methodology in neuropsychology and cognitive neuropsychology; main techniques of investigation in neuropsychology; cognitive impairments following brain injury to the following abilities: visual object recognition, facial recognition, memory, language, executive processes, attention and action control.</span></p><span data-dcnode-id="1308" instrument_node="">
</span></div><span data-dcnode-id="1306" instrument_node="">
</span></div><span data-dcnode-id="1304" instrument_node="">
</span></td><td data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1265"><td data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1270"><span data-dcnode-id="1292" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1290" href="#module-content--90147" rel="module"><span data-dcnode-id="1291" instrument_node="">Psychology and Law</span></a><span data-dcnode-id="1289" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1272" id="module-content--90147"><span data-dcnode-id="1288" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">Psychology and Law</span></h2><span data-dcnode-id="1285" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">15 credits</span></div><span data-dcnode-id="1282" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1274"><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">This module will provide the opportunity for advanced study of psychological science applied to the investigation of crime and the process of criminal law. Research will be primarily, but not exclusively, drawn from applied cognitive psychology. It will be of interest to students considering postgraduate study in forensic psychology.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">The module will cover current issues in psychology and law selected from: interviewing suspects, false confessions, detection of deception, interviewing witnesses, eyewitness identification, false memories, interviewing children, offender profiling, CCTV, decision making in forensic contexts.</span></p><span data-dcnode-id="1275" instrument_node="">
</span></div><span data-dcnode-id="1273" instrument_node="">
</span></div><span data-dcnode-id="1271" instrument_node="">
</span></td><td data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1232"><td data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1237"><span data-dcnode-id="1259" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1257" href="#module-content--90112" rel="module"><span data-dcnode-id="1258" instrument_node="">Neurodevelopmental Disorders</span></a><span data-dcnode-id="1256" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1239" id="module-content--90112"><span data-dcnode-id="1255" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Neurodevelopmental Disorders</span></h2><span data-dcnode-id="1252" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">15 credits</span></div><span data-dcnode-id="1249" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1241"><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">This module will provide a systematic introduction to neurodevelopmental disorders. Conceptual, historical and theoretical issues will provide a framework within which disorders of development can be discussed.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">The module will provide an understanding of issues relating to diagnosis, ethics and research methods in relation to a broad range of disorders. This module will (a) provide and understanding of issues relating to diagnosis and assessment in neurodevelopmental disorders (b) consider behavioural difficulties that are prevalent amongst individuals with different diagnoses (c) Consider therapeutic approaches aimed at improving social and emotional outcomes in individuals with neurodevelopmental disorders.</span></p><span data-dcnode-id="1242" instrument_node="">
</span></div><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span></td><td data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1184"><td data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1189"><span data-dcnode-id="1226" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1224" href="#module-content--90275" rel="module"><span data-dcnode-id="1225" instrument_node="">Behavioural Genetics</span></a><span data-dcnode-id="1223" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1191" id="module-content--90275"><span data-dcnode-id="1222" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Behavioural Genetics</span></h2><span data-dcnode-id="1219" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">15 credits</span></div><span data-dcnode-id="1216" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1193"><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">This module will provide a systematic introduction to behavioural genetics. Conceptual, historical, theoretical and ethical issues will be discussed alongside developments in specific fields (e.g. behavioural genetics and psychopathology).</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">The module will promote an understanding of the current state of affairs with regards to behavioural genetics. Basic principles as well as recent developments will be explored in relation to a broad range of phenotypes. Historical and ethical issues will be discussed.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Tutorials:</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Tutorial topics for this module are:</span></p><span data-dcnode-id="1203" instrument_node="">
</span><ol data-dcnode-id="1195"><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">Major Concepts in Behavioural Genetics. This tutorial will take place in Week 4 and is designed to help you to prepare for the Oral Examination (Week 9) Exact dates/ times TBC</span></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Select a psychopathology of your choice and discuss key behavioural genetic findings for this disorder. This tutorial is designed to help students to design and structure a tutorial essay on this topic and generally on writing examined essays. This tutorial will take place in Week 9. You are encouraged to submit one essay on the topic of this tutorial (optional). &nbsp;The essay can have one of the following formats: (1) a fully referenced essay of between 2,000 and 2,500 words; (2) an essay written under exam conditions (hand-written, 45 minutes, with no notes). Exact dates TBC.</span></li><span data-dcnode-id="1196" instrument_node="">
</span></ol><span data-dcnode-id="1194" instrument_node="">
</span></div><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
</span></td><td data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1148"><td data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1153"><span data-dcnode-id="1178" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1176" href="#module-content--91417" rel="module"><span data-dcnode-id="1177" instrument_node="">Psychological Approaches to Music</span></a><span data-dcnode-id="1175" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1155" id="module-content--91417"><span data-dcnode-id="1174" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Psychological Approaches to Music</span></h2><span data-dcnode-id="1171" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">15 credits</span></div><span data-dcnode-id="1168" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1157"><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">This module aims to provide an introduction to the study of music psychology. Lectures will focus on the perception, cognition and neural basis of musical understanding, perception of musical structure and emotions and theories about music’s evolutionary roots. The scientific methods used in research will be explored in a research participation session and in lectures.</span></p><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">The module will provide an introduction to music psychology. Lectures will focus on four main themes. These are (1) musical perception and cognition, (2) musical cognition and learning, (3) musical origins and emotions in music, and (4) musical creativity.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1158" instrument_node="">
</span></div><span data-dcnode-id="1156" instrument_node="">
</span></div><span data-dcnode-id="1154" instrument_node="">
</span></td><td data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1097"><td data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1102"><span data-dcnode-id="1142" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1140" href="#module-content--90305" rel="module"><span data-dcnode-id="1141" instrument_node="">Multivariate Statistical Methods in Psychology</span></a><span data-dcnode-id="1139" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1104" id="module-content--90305"><span data-dcnode-id="1138" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Multivariate Statistical Methods in Psychology</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">15 credits</span></div><span data-dcnode-id="1132" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1106"><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Each week a two-hour lecture covers the major statistical analysis techniques used by psychologists, building on the knowledge covered in the first two years of the module. Each lecture is followed by a 1.5-hour session in which the student carries out analyses in SPSS related to the material covered in that week's lecture. The topics include:</span></p><span data-dcnode-id="1128" instrument_node="">
</span><ul data-dcnode-id="1111"><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">data screening and cleaning</span></li><span data-dcnode-id="1124" instrument_node="">
</span><li data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">factor analysis</span></li><span data-dcnode-id="1121" instrument_node="">
</span><li data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">psychometrics</span></li><span data-dcnode-id="1118" instrument_node="">
</span><li data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">linear multiple regression</span></li><span data-dcnode-id="1115" instrument_node="">
</span><li data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">extensive coverage of statistical analyses based on the general linear model including ANOVA, MANOVA, ANCOVA, plus executing specific contrasts</span></li><span data-dcnode-id="1112" instrument_node="">
</span></ul><span data-dcnode-id="1110" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">There are five screencast lectures, and accompanying SPSS worksheet exercises, that provide a "crash-course" revision of basic statistics and introduce students to the style of the module. Students may wish to take these in their own time before the start of reading week in term 1. The&nbsp;module proper starts after reading week in term 1. The&nbsp;module ends at reading week in term 2.</span></p><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span></div><span data-dcnode-id="1103" instrument_node="">
</span></td><td data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1064"><td data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1069"><span data-dcnode-id="1091" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1089" href="#module-content--163265" rel="module"><span data-dcnode-id="1090" instrument_node="">The Interpersonal Self</span></a><span data-dcnode-id="1088" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1071" id="module-content--163265"><span data-dcnode-id="1087" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">The Interpersonal Self</span></h2><span data-dcnode-id="1084" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">15 credits</span></div><span data-dcnode-id="1081" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1073"><span data-dcnode-id="1080" instrument_node="">
</span><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">This module will examine self-processes in interpersonal settings, drawing primarily on recent research from social psychology and personality. The module will introduce how interpersonal relationships affect self-concept, identity, self-regulation, and subjective well-being, as well as discuss how self-processes, including individual differences, in turn affect the dynamics of self-other interaction and relational processes.</span></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">The module will seek to bridge the current literature in social psychology and personality between self and interpersonal processes among adults. The module will promote an understanding of how self-concept and identity continue to be shaped by our interpersonal interactions and how other people affect motivation, self-regulation, and well-being. The module will also explore how self-processes and individual differences, in turn, affect interpersonal relationships and promote our scientific understanding of the dynamic nature of this mutual influence.</span></p><span data-dcnode-id="1074" instrument_node="">
</span></div><span data-dcnode-id="1072" instrument_node="">
</span></div><span data-dcnode-id="1070" instrument_node="">
</span></td><td data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="1028"><td data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1033"><span data-dcnode-id="1058" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1056" href="#module-content--90177" rel="module"><span data-dcnode-id="1057" instrument_node="">Psychology and Education</span></a><span data-dcnode-id="1055" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="1035" id="module-content--90177"><span data-dcnode-id="1054" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">Psychology and Education</span></h2><span data-dcnode-id="1051" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">15 credits</span></div><span data-dcnode-id="1048" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1037"><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">This&nbsp;module aims to give an overview of the contribution that psychology can make to education. This will include subjects of direct relevance to the classroom, including learning styles, development or mathematical and reading abilities, as well as challenges in the classroom (for example dyslexia, behavioural problems, gifted and talented pupils).</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">This&nbsp;module will also cover more broad contributions of psychology to education, including how brain development across childhood and adolescence might inform education practice and a critical view of education intervention programmes.</span></p><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Policy-relevant topics like inclusion for special educational needs, gender differences and antisocial behaviour will also be covered. This&nbsp;module will develop your applied skills&nbsp;and will be relevant&nbsp;for those interested in a career in educational or clinical psychology.</span></p><span data-dcnode-id="1038" instrument_node="">
</span></div><span data-dcnode-id="1036" instrument_node="">
</span></div><span data-dcnode-id="1034" instrument_node="">
</span></td><td data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="998"><td data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">&nbsp;</span></td><td data-dcnode-id="1003"><span data-dcnode-id="1022" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="1020" href="#module-content--95720" rel="module"><span data-dcnode-id="1021" instrument_node="">Social-Moral Development</span></a><span data-dcnode-id="1019" instrument_node="">

</span><div class="teaser__meta" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">15 credits</span></div><span data-dcnode-id="1012" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">

</span><a class="modal-window__inline cboxElement" data-dcnode-id="990" href="#module-content--90296" rel="module"><span data-dcnode-id="991" instrument_node="">Magic and the Mind</span></a><span data-dcnode-id="989" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="975" id="module-content--90296"><span data-dcnode-id="988" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">Magic and the Mind</span></h2><span data-dcnode-id="985" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">15 credits</span></div><span data-dcnode-id="982" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="977"><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Magicians have developed powerful methods of manipulating our conscious experience. This&nbsp;module will examine a range of these techniques and relate them to psychological phenomena, such as misdirection attention and awareness, illusions, hypnosis, magical thinking, memory illusions and other confabulations.</span></p><span data-dcnode-id="978" instrument_node="">
</span></div><span data-dcnode-id="976" instrument_node="">
</span></div><span data-dcnode-id="974" instrument_node="">
</span></td><td data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="935"><td data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">&nbsp;</span></td><td data-dcnode-id="940"><span data-dcnode-id="962" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="960" href="#module-content--90243" rel="module"><span data-dcnode-id="961" instrument_node="">Social Psychology of Social Problems</span></a><span data-dcnode-id="959" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="942" id="module-content--90243"><span data-dcnode-id="958" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Social Psychology of Social Problems</span></h2><span data-dcnode-id="955" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">15 credits</span></div><span data-dcnode-id="952" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="944"><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">This module will allow you to engage with&nbsp;social psychological approaches to understanding major social problems of contemporary society.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">You will learn how to apply social psychology to analyse and solve social problems in intergroup contexts. You will gain experience in applying social psychological knowledge to understand and explain such issues as social inequality, tyranny, revolution and collective action, conflict escalation and resolution, genocide, terrorism and war.</span></p><span data-dcnode-id="945" instrument_node="">
</span></div><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span></td><td data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="884"><td data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">&nbsp;</span></td><td data-dcnode-id="889"><span data-dcnode-id="929" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="927" href="#module-content--163266" rel="module"><span data-dcnode-id="928" instrument_node="">Psychology of the Arts, Aesthetics and Attraction</span></a><span data-dcnode-id="926" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="891" id="module-content--163266"><span data-dcnode-id="925" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Psychology of the Arts, Aesthetics and Attraction</span></h2><span data-dcnode-id="922" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">15 credits</span></div><span data-dcnode-id="919" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="893"><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">This module aims to provide students with an introduction to the psychology of art appreciation, beauty and human preference, both from a basic science and an applied psychology perspective.</span></p><span data-dcnode-id="915" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The lectures will focus on a wide range of topics, including aesthetic perception across the senses, including visual and auditory aesthetics, as well as the attractiveness of human faces and bodies. We will approach these topics from a wide range of theoretical and methodological angles, including neuroscience, cross-cultural and evolutionary perspectives. We will also focus on applications of aesthetic science in the real world, as in advertising and marketing.</span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">The module will be structured to cover:</span></p><span data-dcnode-id="909" instrument_node="">
</span><ul data-dcnode-id="895"><span data-dcnode-id="908" instrument_node="">
</span><li data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Psychological theories of aesthetic appreciation</span></li><span data-dcnode-id="905" instrument_node="">
</span><li data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Aesthetics across the senses: vision, audition, taste/smell and touch</span></li><span data-dcnode-id="902" instrument_node="">
</span><li data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Attractiveness of faces and bodies</span></li><span data-dcnode-id="899" instrument_node="">
</span><li data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">The role of expertise, personality and cross-cultural differences in aesthetic perception</span></li><span data-dcnode-id="896" instrument_node="">
</span></ul><span data-dcnode-id="894" instrument_node="">
</span></div><span data-dcnode-id="892" instrument_node="">
</span></div><span data-dcnode-id="890" instrument_node="">
</span></td><td data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">15 credits</span></td></tr><tr data-dcnode-id="845"><td data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">&nbsp;</span></td><td data-dcnode-id="850"><span data-dcnode-id="878" instrument_node="">
</span><a class="modal-window__inline cboxElement" data-dcnode-id="876" href="#module-content--142513" rel="module"><span data-dcnode-id="877" instrument_node="">Cross-cultural and Individual Differences in Attention and Awareness</span></a><span data-dcnode-id="875" instrument_node="">
</span><div class="modal-window--content teaser" data-dcnode-id="852" id="module-content--142513"><span data-dcnode-id="874" instrument_node="">
</span><h2 class="teaser__title" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Cross-cultural and Individual Differences in Attention and Awareness</span></h2><span data-dcnode-id="871" instrument_node="">
</span><div class="teaser__meta" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">15 credits</span></div><span data-dcnode-id="868" instrument_node="">
</span><div class="teaser__body" data-dcnode-id="854"><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">This module will provide detailed study of the scientific investigation of attention, a highly topical aspect of human cognition that plays a fundamental role in our awareness of the world and our engagement with it. Theories of attention will be introduced and cross-cultural and individual differences in attention and awareness considered in the light of these theories. Finally, the relevance of attention research to educational practice will be discussed.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Lecture sessions will often contain periods of guided discussion (focused on key readings reviewed in the lecture). They will be supplemented by an overview or revision lecture (focused on the exam) and two, one-hour tutorials (focused on the coursework).&nbsp;</span></p><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Topics covered will include background and models of attention, attention and culture, attention and emotion, attention and social psychology, attention and individual differences, and attention and modern media.</span></p><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">You will also be welcome to attend an additional more advanced lecture on the neurophysiological underpinnings of attention in clinical populations.</span></p><span data-dcnode-id="855" instrument_node="">
</span></div><span data-dcnode-id="853" instrument_node="">
</span></div><span data-dcnode-id="851" instrument_node="">
</span></td><td data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">15 credits</span></td></tr></tbody></table><span data-dcnode-id="841" instrument_node="">
</span><h3 data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">Teaching style</span></h3><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">This programme is taught through scheduled learning - a mixture of lectures, seminars and workshops. You’ll also be expected to undertake a significant amount of independent study. This includes carrying out required and additional reading, preparing topics for discussion, and producing essays or project work.</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">The following information gives an indication of the typical proportions of learning and teaching for each year of this programme*:</span></p><span data-dcnode-id="832" instrument_node="">
</span><ul data-dcnode-id="821"><span data-dcnode-id="831" instrument_node="">
</span><li data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Year 1 -&nbsp;14% scheduled learning, 86% independent learning</span></li><span data-dcnode-id="828" instrument_node="">
</span><li data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Year 2 - 15% scheduled learning, 85% independent learning</span></li><span data-dcnode-id="825" instrument_node="">
</span><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Year 3 - 14% scheduled learning, 86% independent learning</span></li><span data-dcnode-id="822" instrument_node="">
</span></ul><span data-dcnode-id="820" instrument_node="">
</span><h3 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">How you’ll be assessed</span></h3><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">You’ll be assessed by a variety of methods, depending on your module choices. These include coursework, examinations, laboratory reports, group work and research projects.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">The following information gives an indication of how you can typically expect to be assessed on each year of this programme*:</span></p><span data-dcnode-id="811" instrument_node="">
</span><ul data-dcnode-id="800"><span data-dcnode-id="810" instrument_node="">
</span><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Year 1 - 53% coursework, 47% written&nbsp;exam</span></li><span data-dcnode-id="807" instrument_node="">
</span><li data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Year 2 - 34% coursework, 66% written&nbsp;exam</span></li><span data-dcnode-id="804" instrument_node="">
</span><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Year 3 - 80% coursework, 20% written exam</span></li><span data-dcnode-id="801" instrument_node="">
</span></ul><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">*Please note that these are averages are based on enrolments for 2020/21. Each student’s time in teaching, learning and assessment activities will differ based on individual module choices. Find out more about </span><a data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/ug/how-teaching-and-assessment-data-is-calculated/"><span data-dcnode-id="797" instrument_node="">how this information is calculated</span></a><span data-dcnode-id="795" instrument_node="">.</span></p><span data-dcnode-id="793" instrument_node="">
</span><h3 data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Credits and levels of learning</span></h3><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">An undergraduate honours degree is made up of 360 credits – 120 at Level 4, 120 at Level 5 and 120 at Level 6. If you are a full-time student, you will usually take Level 4 modules in the first year, Level 5 in the second, and Level 6 modules in your final year. A standard module is worth 30 credits. Some programmes also contain 15-credit half modules or can be made up of higher-value parts, such as a dissertation or a Major Project.</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="786" instrument_node="">Download the </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/media/docs/programme-specifications/bsc-psychology-with-pathways.pdf"><span data-dcnode-id="785" instrument_node="">programme specification</span></a><span data-dcnode-id="782" instrument_node="">. If you would like an earlier version of the programme specification, please contact the </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/quality/contact/"><span data-dcnode-id="781" instrument_node="">Quality Office</span></a><span data-dcnode-id="779" instrument_node="">.</span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Please note that due to staff research commitments not all of these modules may be available every year.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">For 2021-22 and 2020–21, we have made some changes to how the teaching and assessment of certain programmes are delivered. To check what changes affect this programme, please visit the </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/study/programme-changes-2020-21/"><span data-dcnode-id="772" instrument_node="">programme changes page</span></a><span data-dcnode-id="770" instrument_node="">.</span></p><span data-dcnode-id="768" instrument_node="">

					</span><br data-dcnode-id="726"><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Access:</span></strong><span data-dcnode-id="723" instrument_node=""> Pass with 45 Level 3 credits including 30 Distinctions and a number of merits/passes in subject-specific modules</span><br data-dcnode-id="722"><strong data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Scottish qualifications:</span></strong><span data-dcnode-id="719" instrument_node=""> BBBBC (Higher) or BBC (Advanced Higher)</span><br data-dcnode-id="718"><strong data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">European Baccalaureate:</span></strong><span data-dcnode-id="715" instrument_node=""> 75%</span><br data-dcnode-id="714"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Irish Leaving Certificate:</span></strong><span data-dcnode-id="711" instrument_node=""> H2 H2 H2 H2</span></p><span data-dcnode-id="709" instrument_node="">

</span><p data-dcnode-id="684"><span data-dcnode-id="694" instrument_node="">If English isn’t your first language, you will need an IELTS score (or </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/apply/alternative-english-language-requirements/"><span data-dcnode-id="693" instrument_node="">equivalent English language qualification</span></a><span data-dcnode-id="691" instrument_node="">) of
</span><strong data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">6.0 with a 6.0 in writing and no element lower than 5.5</span></strong><span data-dcnode-id="688" instrument_node="">
 to study this programme. If you need assistance with your English language, we offer a range of </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/preparation/what-course-is-right-for-me/"><span data-dcnode-id="687" instrument_node="">courses that can help prepare you for degree-level study</span></a><span data-dcnode-id="685" instrument_node="">.</span></p><span data-dcnode-id="683" instrument_node="">

</span><h3 data-dcnode-id="656" style="margin-top:0;"><span data-dcnode-id="657" instrument_node="">Annual tuition fees</span></h3><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">These are the fees for students starting their programme in the 2022/2023 academic year.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">From August 2021 EU/EEA/Swiss nationals will no longer be eligible for 'Home' fee status. EU/EEA/Swiss nationals will be classified as 'International' for fee purposes, more information can be found on our </span><a data-dcnode-id="649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/international/fees-funding/"><span data-dcnode-id="650" instrument_node="">fees page</span></a><span data-dcnode-id="648" instrument_node="">.</span></p><span data-dcnode-id="646" instrument_node="">
</span><ul data-dcnode-id="638"><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Home - full-time: £9250</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">International - full-time: £18640</span></li><span data-dcnode-id="639" instrument_node=""> </span></ul><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="636" instrument_node="">If your fees are not listed here, please check our </span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/ug/fees-funding/"><span data-dcnode-id="635" instrument_node="">undergraduate fees guidance</span></a><span data-dcnode-id="633" instrument_node=""> or contact the </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/contact/form/%3Fto%3Dfees%26name%3DThe%2520Fees%2520Office"><span data-dcnode-id="632" instrument_node="">Fees Office</span></a><span data-dcnode-id="630" instrument_node="">, who can also advise you about how to pay your fees.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="627" instrument_node="">It’s not currently possible for international students to study part-time if you require a Student Visa, however this is currently being reviewed and will be confirmed in the new year. Please read our </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/immigration/student-visa/"><span data-dcnode-id="626" instrument_node="">visa guidance</span></a><span data-dcnode-id="624" instrument_node=""> in the interim for more information. If you think you might be eligible to study part-time while being on another visa type, please contact our </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/contact/form/%3Fto%3Dadmissions%26name%3DThe%2520Admissions%2520Team"><span data-dcnode-id="623" instrument_node="">Admissions Team</span></a><span data-dcnode-id="621" instrument_node=""> for more information.</span></p><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">If you are looking to pay your fees please see our </span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/students/fee-support/how-to-pay/"><span data-dcnode-id="617" instrument_node="">guide to making a payment</span></a><span data-dcnode-id="615" instrument_node="">.</span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Additional costs</span></h3><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="609" instrument_node="">In addition to your tuition fees, you'll be responsible for any additional costs associated with your course, such as buying stationery and paying for photocopying. You can find out more about what you need to budget for on our </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/programme-costs/"><span data-dcnode-id="608" instrument_node="">study costs page</span></a><span data-dcnode-id="606" instrument_node="">.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="603" instrument_node="">There may also be specific additional costs associated with your programme. This can include things like paying for field trips or specialist materials for your assignments. </span><a data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/media/docs/programme-specifications/bsc-psychology-with-pathways.pdf"><span data-dcnode-id="602" instrument_node="">Please check the programme specification</span></a><span data-dcnode-id="600" instrument_node=""> for more information.</span></p><span data-dcnode-id="598" instrument_node="">
</span><h3 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Funding opportunities</span></h3><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="594" instrument_node="">We offer a wide range of scholarships and bursaries, and our </span><a data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/careers"><span data-dcnode-id="593" instrument_node="">careers service</span></a><span data-dcnode-id="591" instrument_node=""> can also offer advice on finding work during your studies. </span><a data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/ug/fees-funding/"><span data-dcnode-id="590" instrument_node="">Find out more about funding your studies with us</span></a><span data-dcnode-id="588" instrument_node="">.</span></p><span data-dcnode-id="586" instrument_node="">
</span></div><span data-dcnode-id="584" instrument_node="">

</span><span data-dcnode-id="575" instrument_node="">
</span><section class="section section--accordion" data-dcnode-id="467"><span data-dcnode-id="574" instrument_node="">
</span><div class="accordion-bg" data-dcnode-id="563"><span data-dcnode-id="573" instrument_node="">
</span><div class="section__heading-wrapper accordionstyle" data-dcnode-id="565"><span data-dcnode-id="572" instrument_node="">
</span><div class="section__heading-inline" data-dcnode-id="567"><span data-dcnode-id="571" instrument_node="">
</span><h2 aria-controls="-contents" aria-expanded="false" class="section__heading" data-dcnode-id="569" id="-heading" role="button" tabindex="0"><span data-dcnode-id="570" instrument_node="">Careers</span></h2><span data-dcnode-id="568" instrument_node="">
</span></div><span data-dcnode-id="566" instrument_node="">
</span></div><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="-heading" class="accordion-wrapper" data-dcnode-id="469" id="-contents" role="region"><div class="wrapper clearfix" data-dcnode-id="470"><span data-dcnode-id="561" instrument_node="">
</span><div class="grid-push grid-push--two" data-dcnode-id="472"><span data-dcnode-id="560" instrument_node="">
</span><div class="rich-content rich-content-section full-wrap" data-dcnode-id="474"><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The Department of Psychology has its own Skills and Employability Programme for students, starting in the first term with a full first-year course on the topic. We are keen that you understand what kind of transferable skills you will develop during the Psychology BSc, and how you can make the best impression on future employers.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">We have strong links with employers of psychology graduates, and the programme has been set up to support you to actively seek relevant work knowledge and experience. This experience could help you develop the professional-level skills that are highly sought after in the job market.&nbsp;</span></p><span data-dcnode-id="553" instrument_node="">
</span><h3 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Skills</span></h3><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Throughout the degree you will receive a thorough training in the design and evaluation of research, statistical analysis, and the use of specialist psychology-relevant software. In addition, you'll develop the following transferable skills:</span></p><span data-dcnode-id="547" instrument_node="">
</span><ul data-dcnode-id="527"><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">critical thinking and analytical skills</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">the ability to look at issues from different perspectives</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">reflection skills</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">self motivation</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">planning and organisation skills</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">oral and written communication skills</span></li><span data-dcnode-id="528" instrument_node="">
</span></ul><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Careers</span></h3><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Students from the BSc go on to a broad range of careers and future study such as: clinical psychology, broadcasting, media psychology, advertising, market research, consultancy, research psychology, occupational psychology, and criminal/forensic psychology. Graduates from this BSc would be well suited for a broad range of careers, including educational neuroscience, neuromarketing, and clinical neuroscience (eg sleep labs, brain injury and rehabilitation).</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">Our graduates work in a wide range of settings from schools to hospitals, from broadcasting to banks, and in both private and public sector jobs. You can find out more about career options after graduating on our </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/skills-careers/psychology/"><span data-dcnode-id="518" instrument_node="">Psychology careers page</span></a><span data-dcnode-id="516" instrument_node="">.</span></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="513" instrument_node="">The programme is accredited by the&nbsp;</span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bps.org.uk/" target="_blank"><span data-dcnode-id="512" instrument_node="">British Psychological Society</span></a><span data-dcnode-id="510" instrument_node="">&nbsp;(BPS). BPS accreditation means that graduates are&nbsp;eligible for graduate basis for Chartership with the BPS – vital if you want a career as a psychologist in the future.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="507" instrument_node="">Find out more about&nbsp;</span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/skills-careers/"><span data-dcnode-id="506" instrument_node="">employability at Goldsmiths</span></a><span data-dcnode-id="504" instrument_node="">.</span></p><span data-dcnode-id="502" instrument_node="">
</span><h3 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Postgraduate Progression</span></h3><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">If&nbsp;you're interested in this Undergraduate programme, you may be interested in the following Postgraduate courses:</span></p><span data-dcnode-id="496" instrument_node="">
</span><ul data-dcnode-id="478"><span data-dcnode-id="495" instrument_node="">
</span><li data-dcnode-id="492"><a data-dcnode-id="493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/pg/msc-cognitive-clinical-neuroscience/"><span data-dcnode-id="494" instrument_node="">MSc Cognitive &amp; Clinical Neuroscience</span></a></li><span data-dcnode-id="491" instrument_node="">
</span><li data-dcnode-id="488"><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/pg/msc-computational-cognitive-neuroscience/"><span data-dcnode-id="490" instrument_node="">MSc Computational Cognitive Neuroscience</span></a></li><span data-dcnode-id="487" instrument_node="">
</span><li data-dcnode-id="484"><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/pg/msc-music-mind-brain/"><span data-dcnode-id="486" instrument_node="">MSc Music, Mind &amp; Brain</span></a></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="480"><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gold.ac.uk/pg/msc-psychology-arts-neuroaesthetics-creativity/"><span data-dcnode-id="482" instrument_node="">MSc Psychology of the Arts, Neuroaesthetics &amp; Creativity</span></a></li><span data-dcnode-id="479" instrument_node="">
</span></ul><span data-dcnode-id="477" instrument_node="">
</span><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
