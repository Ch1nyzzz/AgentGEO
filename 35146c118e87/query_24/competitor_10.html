</span><meta content="Self-awareness is a pivotal component of conscious experience. It is correlated with a paralimbic network of medial prefrontal/anterior cingulate and …" data-dcnode-id="9650" property="og:description"><span data-dcnode-id="9649" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abst0010&quot;><p id=&quot;spar0040&quot;>Self-awareness is a pivotal component of conscious experience. It is correlated with a paralimbic network of medial prefrontal/anterior cingulate and medial parietal/posterior cingulate cortical “hubs” and associated regions.</p><p id=&quot;spar0045&quot;>Electromagnetic and transmitter manipulation have demonstrated that the network is not an epiphenomenon but instrumental in generation of self-awareness. Thus, transcranial magnetic stimulation (TMS) targeting the hubs impedes different aspects of self-awareness with a latency of 160&nbsp;ms. The network is linked by ∼40&nbsp;Hz oscillations and regulated by dopamine.</p><p id=&quot;spar0050&quot;>The oscillations are generated by rhythmic GABA-ergic inhibitory activity in interneurons with an extraordinarily high metabolic rate. The hubs are richly endowed with interneurons and therefore highly vulnerable to disturbed energy supply. Consequently, deficient paralimbic activity and self-awareness are characteristic features of many disorders with impaired oxygen homeostasis. Such disorders may therefore be treated unconventionally by targeting interneuron function.</p></div></div></div>" data-dcnode-id="9648" lang="en" name="citation_abstract"><span data-dcnode-id="9647" instrument_node="">

-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="9078" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="9075"><span data-dcnode-id="9076" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="9064" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="9067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.neubiorev.2016.04.004" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="9068" instrument_node="">https://doi.org/10.1016/j.neubiorev.2016.04.004</span></a><a class="rights-and-content" data-dcnode-id="9065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0149763416300410%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9066" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="9055"><div class="License" data-dcnode-id="9059"><span data-dcnode-id="9062"><span data-dcnode-id="9063" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="9060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="9061" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="9056"><span class="access-indicator" data-dcnode-id="9058"></span><span data-dcnode-id="9057" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="9054"></section><section class="ReferencedArticles" data-dcnode-id="9053"></section><div class="PageDivider" data-dcnode-id="9052"></div><div class="Abstracts u-font-serif" data-dcnode-id="8997" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="9016" id="abs0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9050"><span data-dcnode-id="9051" instrument_node="">Highlights</span></h2><div data-dcnode-id="9017" id="abst0005"><p data-dcnode-id="9018" id="spar0035"></p><dl class="list" data-dcnode-id="9019"><dt class="list-label" data-dcnode-id="9048"><span data-dcnode-id="9049" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9045"><p data-dcnode-id="9046" id="par0005"><span data-dcnode-id="9047" instrument_node="">A recurrent dopamine-GABA regulated gamma network is instrumental in self-awareness.</span></p></dd><dt class="list-label" data-dcnode-id="9043"><span data-dcnode-id="9044" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9038"><p data-dcnode-id="9039" id="par0010"><span data-dcnode-id="9042" instrument_node="">Its anterior and posterior hubs are “ignited” simultaneously with a latency of 160</span><span data-dcnode-id="9041" instrument_node="">&nbsp;</span><span data-dcnode-id="9040" instrument_node="">ms.</span></p></dd><dt class="list-label" data-dcnode-id="9036"><span data-dcnode-id="9037" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9030"><p data-dcnode-id="9031" id="par0015"><span data-dcnode-id="9035" instrument_node="">Gamma oscillations are produced in the hubs by highly oxygen-requiring </span><a class="topic-link" data-dcnode-id="9033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/interneuron" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9034" instrument_node="">interneurons</span></a><span data-dcnode-id="9032" instrument_node="">.</span></p></dd><dt class="list-label" data-dcnode-id="9028"><span data-dcnode-id="9029" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9025"><p data-dcnode-id="9026" id="par0020"><span data-dcnode-id="9027" instrument_node="">This makes the hubs vulnerable in penuria, resulting in deficient self-monitoring.</span></p></dd><dt class="list-label" data-dcnode-id="9023"><span data-dcnode-id="9024" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9020"><p data-dcnode-id="9021" id="par0025"><span data-dcnode-id="9022" instrument_node="">Therefore such disorders may be treated unconventionally by targeting interneurons.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="8998" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9014"><span data-dcnode-id="9015" instrument_node="">Abstract</span></h2><div data-dcnode-id="8999" id="abst0010"><p data-dcnode-id="9012" id="spar0040"><span data-dcnode-id="9013" instrument_node="">Self-awareness is a pivotal component of conscious experience. It is correlated with a paralimbic network of medial prefrontal/anterior cingulate and medial parietal/posterior cingulate cortical “hubs” and associated regions.</span></p><p data-dcnode-id="9002" id="spar0045"><span data-dcnode-id="9011" instrument_node="">Electromagnetic and transmitter manipulation have demonstrated that the network is not an epiphenomenon but instrumental in generation of self-awareness. Thus, transcranial magnetic stimulation (TMS) targeting the hubs impedes different aspects of self-awareness with a latency of 160</span><span data-dcnode-id="9009" instrument_node="">&nbsp;</span><span data-dcnode-id="9007" instrument_node="">ms. The network is linked by ∼40</span><span data-dcnode-id="9005" instrument_node="">&nbsp;</span><span data-dcnode-id="9003" instrument_node="">Hz oscillations and regulated by dopamine.</span></p><p data-dcnode-id="9000" id="spar0050"><span data-dcnode-id="9001" instrument_node="">The oscillations are generated by rhythmic GABA-ergic inhibitory activity in interneurons with an extraordinarily high metabolic rate. The hubs are richly endowed with interneurons and therefore highly vulnerable to disturbed energy supply. Consequently, deficient paralimbic activity and self-awareness are characteristic features of many disorders with impaired oxygen homeostasis. Such disorders may therefore be treated unconventionally by targeting interneuron function.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="8974" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="8986"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0149763416301555"><svg class="icon icon-navigate-left" data-dcnode-id="8995" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="8996"></path></svg><span class="button-alternative-text" data-dcnode-id="8988"><strong data-dcnode-id="8993"><span data-dcnode-id="8994" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="8991"><span data-dcnode-id="8992" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8989"><span data-dcnode-id="8990" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="8975"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="8976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0149763417302701"><span class="button-alternative-text" data-dcnode-id="8979"><strong data-dcnode-id="8984"><span data-dcnode-id="8985" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="8980"><span data-dcnode-id="8981" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="8977" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="8978"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="8949"><div class="keywords-section" data-dcnode-id="8950" id="kwd0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8972"><span data-dcnode-id="8973" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="8969" id="kw0005"><span data-dcnode-id="8970"><span data-dcnode-id="8971" instrument_node="">Metacognition</span></span></div><div class="keyword" data-dcnode-id="8966" id="kw0010"><span data-dcnode-id="8967"><span data-dcnode-id="8968" instrument_node="">Paralimbic network</span></span></div><div class="keyword" data-dcnode-id="8963" id="kw0015"><span data-dcnode-id="8964"><span data-dcnode-id="8965" instrument_node="">Default mode network</span></span></div><div class="keyword" data-dcnode-id="8960" id="kw0020"><span data-dcnode-id="8961"><span data-dcnode-id="8962" instrument_node="">Interneurons</span></span></div><div class="keyword" data-dcnode-id="8957" id="kw0025"><span data-dcnode-id="8958"><span data-dcnode-id="8959" instrument_node="">Dopamine</span></span></div><div class="keyword" data-dcnode-id="8954" id="kw0030"><span data-dcnode-id="8955"><span data-dcnode-id="8956" instrument_node="">GABA</span></span></div><div class="keyword" data-dcnode-id="8951" id="kw0035"><span data-dcnode-id="8952"><span data-dcnode-id="8953" instrument_node="">Oxygen homeostasis</span></span></div></div></div><span data-dcnode-id="8948" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="8038" id="body"><div data-dcnode-id="8047"><section data-dcnode-id="8868" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8944" id="sect0020"><span data-dcnode-id="8947" instrument_node="">1</span><span data-dcnode-id="8946" instrument_node="">. </span><span data-dcnode-id="8945" instrument_node="">Naturalization of self-awareness: its biological function, and how it may be investigated</span></h2><p data-dcnode-id="8906" id="par0030"><span data-dcnode-id="8943" instrument_node="">Self-awareness provides the information essential for conscious self-monitoring (metacognition). Metacognition is a tool for consciously controlling behavior and adjusting our experiences of the world. It is essential for learning by conscious experience, not only within ourselves, but, importantly, also between individuals (</span><a class="workspace-trigger" data-dcnode-id="8941" href="#bib0010" name="bbib0010"><span data-dcnode-id="8942" instrument_node="">Bahrami et al., 2010</span></a><span data-dcnode-id="8940" instrument_node="">). Self-awareness is therefore of decisive importance by giving humans an advantage in phylogeny (</span><a class="workspace-trigger" data-dcnode-id="8938" href="#bib0075" name="bbib0075"><span data-dcnode-id="8939" instrument_node="">Fabbro et al., 2015</span></a><span data-dcnode-id="8937" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8935" href="#bib0220" name="bbib0220"><span data-dcnode-id="8936" instrument_node="">Lagercrantz and Changeux, 2009</span></a><span data-dcnode-id="8934" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8932" href="#bib0320" name="bbib0320"><span data-dcnode-id="8933" instrument_node="">Lou, 2012</span></a><span data-dcnode-id="8931" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8929" href="#bib0415" name="bbib0415"><span data-dcnode-id="8930" instrument_node="">Perner and Roessler, 2012</span></a><span data-dcnode-id="8928" instrument_node="">). Self-awareness was until quite recently considered off-limits for the natural sciences. More specifically, neurobiological research has shunned the “hard question of how and why consciousness and self-awareness arise from a physical basis</span><sup data-dcnode-id="8926"><span data-dcnode-id="8927" instrument_node="">”</span></sup><span data-dcnode-id="8925" instrument_node="">, considering it un-accessible with current technology following Chalmers DJ (</span><a class="workspace-trigger" data-dcnode-id="8923" href="#bib0025" name="bbib0025"><span data-dcnode-id="8924" instrument_node="">Chalmers, 1996</span></a><span data-dcnode-id="8922" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8920" href="#bib0210" name="bbib0210"><span data-dcnode-id="8921" instrument_node="">Koch, 2009</span></a><span data-dcnode-id="8919" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8917" href="#bib0320" name="bbib0320"><span data-dcnode-id="8918" instrument_node="">Lou, 2012</span></a><span data-dcnode-id="8916" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8914" href="#bib0360" name="bbib0360"><span data-dcnode-id="8915" instrument_node="">Neafsey, 2009</span></a><span data-dcnode-id="8913" instrument_node="">). The difficulties encountered in investigating the biology of self-awareness have been discussed by </span><a class="workspace-trigger" data-dcnode-id="8911" href="#bib0500" name="bbib0500"><span data-dcnode-id="8912" instrument_node="">Zahavi and Roepstorff (2011)</span></a><span data-dcnode-id="8910" instrument_node="">. They draw attention to the discrepancies between the effort applied to setting up self-awareness experiments and discussing the experimental results, while disregarding the very notion of the concept of self-awareness. More radically, Dretske stresses that there are explanatory challenges related to consciousness per se and puts forward the theory that we never have experiences of ourselves, but only on the contents of consciousness (</span><a class="workspace-trigger" data-dcnode-id="8908" href="#bib0350" name="bbib0350"><span data-dcnode-id="8909" instrument_node="">Mehta and Mashour, 2013</span></a><span data-dcnode-id="8907" instrument_node="">).</span></p><p data-dcnode-id="8869" id="par0035"><span data-dcnode-id="8905" instrument_node="">In contrast, </span><a class="workspace-trigger" data-dcnode-id="8903" href="#bib0050" name="bbib0050"><span data-dcnode-id="8904" instrument_node="">Damasio, 2000</span></a><span data-dcnode-id="8902" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8900" href="#bib0090" name="bbib0090"><span data-dcnode-id="8901" instrument_node="">Gallagher, 2000</span></a><span data-dcnode-id="8895"><span data-dcnode-id="8899" instrument_node="">, following Wittgenstein and the </span><a class="topic-link" data-dcnode-id="8897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/phenomenologist" title="Learn more about phenomenologists from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8898" instrument_node="">phenomenologists</span></a><span data-dcnode-id="8896" instrument_node="">, claim that we are self-aware whenever we are conscious. Consequently, attempts at separating the notions of “self-awareness” and “familiarity” may seem futile (</span></span><em data-dcnode-id="8893"><span data-dcnode-id="8894" instrument_node="">e.g.</span></em><span data-dcnode-id="8892" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="8890" href="#bib0175" name="bbib0175"><span data-dcnode-id="8891" instrument_node="">Kapitan, 1999</span></a><span data-dcnode-id="8889" instrument_node="">). Accordingly, self-awareness is an indispensible part of our experience of the world, whether it is minimal self-awareness (pre-reflective, with an automatic sense of ownership of the experience), or narrative self-awareness, extended in time by retrieval of personal memories and thereby allowing predictions of the future (</span><a class="workspace-trigger" data-dcnode-id="8887" href="#bib0150" name="bbib0150"><span data-dcnode-id="8888" instrument_node="">Ingvar, 1985</span></a><span data-dcnode-id="8886" instrument_node="">). Minimal self-awareness may be investigated using rapidly presented visual stimuli of varying duration (</span><a class="workspace-trigger" data-dcnode-id="8884" href="#bib0485" name="bbib0485"><span data-dcnode-id="8885" instrument_node="">Weiskrantz et al., 1995</span></a><span data-dcnode-id="8883" instrument_node="">), and by first person </span><em data-dcnode-id="8881"><span data-dcnode-id="8882" instrument_node="">vs</span></em><span data-dcnode-id="8880" instrument_node=""> third person perspective (</span><a class="workspace-trigger" data-dcnode-id="8878" href="#bib0475" name="bbib0475"><span data-dcnode-id="8879" instrument_node="">Vogeley et al., 2004</span></a><span data-dcnode-id="8873"><span data-dcnode-id="8877" instrument_node="">). Narrative, extended, self-awareness may be investigated using retrieval of </span><a class="topic-link" data-dcnode-id="8875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/episodic-memory" title="Learn more about episodic memory from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8876" instrument_node="">episodic memory</span></a><span data-dcnode-id="8874" instrument_node=""> of previous judgments. Both minimal self-awareness and narrative self-awareness may be ranked according to degree of self-reference (</span></span><a class="workspace-trigger" data-dcnode-id="8871" href="#bib0045" name="bbib0045"><span data-dcnode-id="8872" instrument_node="">Craik et al., 1999</span></a><span data-dcnode-id="8870" instrument_node="">). This approach has allowed recent research to surpass earlier limitations and gives us insights into the biological origin and function of self-awareness, and how its impediment in disease may account for major disorders in conscious regulation, with consequences for treatment and prevention.</span></p></section><section data-dcnode-id="8621" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8864" id="sect0025"><span data-dcnode-id="8867" instrument_node="">2</span><span data-dcnode-id="8866" instrument_node="">. </span><span data-dcnode-id="8865" instrument_node="">The paralimbic network associated with self-awareness</span></h2><div data-dcnode-id="8769"><p data-dcnode-id="8820" id="par0040"><span data-dcnode-id="8863" instrument_node="">Shifting cerebral activation patterns occur with changing contents of consciousness during “mind wandering”, both during yoga nidra meditation and in the normal resting conscious state. This was documented already in 1999 using H</span><sub data-dcnode-id="8861"><span data-dcnode-id="8862" instrument_node="">2</span></sub><span data-dcnode-id="8860" instrument_node="">O</span><sup data-dcnode-id="8858"><span data-dcnode-id="8859" instrument_node="">15</span></sup><span data-dcnode-id="8853"><span data-dcnode-id="8857" instrument_node="">-positron </span><a class="topic-link" data-dcnode-id="8855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/tomography" title="Learn more about tomography from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8856" instrument_node="">tomography</span></a><span data-dcnode-id="8854" instrument_node=""> (PET) (</span></span><a class="workspace-trigger" data-dcnode-id="8851" href="#bib0285" name="bbib0285"><span data-dcnode-id="8852" instrument_node="">Lou et al., 1999</span></a><span data-dcnode-id="8842"><span data-dcnode-id="8850" instrument_node="">). In spite of the variability, a set of medial paralimbic regions were continuously active, including medial and lateral </span><a class="topic-link" data-dcnode-id="8848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/prefrontal-cortex" title="Learn more about prefrontal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8849" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="8843"><span data-dcnode-id="8847" instrument_node="">, the right medial </span><a class="topic-link" data-dcnode-id="8845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/parietal-cortex" title="Learn more about parietal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8846" instrument_node="">parietal cortex</span></a><span data-dcnode-id="8844" instrument_node="">, and right striatum (</span></span></span><a class="workspace-trigger" data-dcnode-id="8840" href="#bib0190" name="bbib0190"><span data-dcnode-id="8841" instrument_node="">Kjaer and Lou, 2000</span></a><span data-dcnode-id="8839" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8837" href="#bib0195" name="bbib0195"><span data-dcnode-id="8838" instrument_node="">Kjaer et al., 2001</span></a><span data-dcnode-id="8836" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="8834" href="#fig0005" name="bfig0005"><span data-dcnode-id="8835" instrument_node="">Fig. 1</span></a><span data-dcnode-id="8833" instrument_node="">a and b). Following this discovery, it was proposed that the medial prefrontal and parietal regions constitute a self-referential core of changing conscious experiences according to Damasiós and Gallagheŕs concept. It is consistent with the assumption that self-awareness is an integral function of all conscious experiences, binding conscious experiences together into a single construct with a sense of unity of consciousness (</span><a class="workspace-trigger" data-dcnode-id="8831" href="#bib0195" name="bbib0195"><span data-dcnode-id="8832" instrument_node="">Kjaer et al., 2001</span></a><span data-dcnode-id="8830" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8828" href="#bib0200" name="bbib0200"><span data-dcnode-id="8829" instrument_node="">Kjaer et al., 2002a</span></a><span data-dcnode-id="8827" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8825" href="#bib0205" name="bbib0205"><span data-dcnode-id="8826" instrument_node="">Kjaer et al., 2002b</span></a><span data-dcnode-id="8824" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8822" href="#bib0295" name="bbib0295"><span data-dcnode-id="8823" instrument_node="">Lou et al., 2005</span></a><span data-dcnode-id="8821" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8770" id="fig0005"><span data-dcnode-id="8804"><img alt="Fig. 1" aria-describedby="cap0005" data-dcnode-id="8819" height="978" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr1.jpg&amp;raw"><span data-dcnode-id="8818" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8805"><li data-dcnode-id="8812"><a class="anchor download-link u-font-sans" data-dcnode-id="8813" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr1_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="8814"><span data-dcnode-id="8817" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8815"><span data-dcnode-id="8816" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="8806"><a class="anchor download-link u-font-sans" data-dcnode-id="8807" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8808"><span data-dcnode-id="8811" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8809"><span data-dcnode-id="8810" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8771"><span data-dcnode-id="8772" id="cap0005"><p data-dcnode-id="8773" id="spar0005"><span class="label" data-dcnode-id="8802"><span data-dcnode-id="8803" instrument_node="">Fig. 1</span></span><span data-dcnode-id="8801" instrument_node="">. </span><span data-dcnode-id="8796"><span data-dcnode-id="8800" instrument_node="">Cerebral activation patterns vary with shifting contents of consciousness. All conscious states are linked to activity in a medial paralimbic network. (a)The four upper rows represent </span><a class="topic-link" data-dcnode-id="8798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/cerebral-blood-flow" title="Learn more about cerebral blood flow from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8799" instrument_node="">cerebral blood flow</span></a><span data-dcnode-id="8797" instrument_node=""> patterns measured with </span></span><sup data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">15</span></sup><span data-dcnode-id="8793" instrument_node="">O</span><img alt="single bond" data-dcnode-id="8792" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdfestaticassets-us-east-1.sciencedirectassets.com/shared-assets/55/entities/sbnd.gif&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="8791" instrument_node="">H</span><sub data-dcnode-id="8789"><span data-dcnode-id="8790" instrument_node="">2</span></sub><span data-dcnode-id="8788" instrument_node="">O-PET during yoga nidra meditation on weight of own body part (upper row) abstract perception of joy (second row) visual imagery of landscape (third row), and symbolic representation of self (lower row) with permission (</span><a class="workspace-trigger" data-dcnode-id="8786" href="#bib0285" name="bbib0285"><span data-dcnode-id="8787" instrument_node="">Lou et al., 1999</span></a><span data-dcnode-id="8777"><span data-dcnode-id="8781"><span data-dcnode-id="8785" instrument_node="">). (b) The right medial </span><a class="topic-link" data-dcnode-id="8783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/parietal-cortex" title="Learn more about parietal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8784" instrument_node="">parietal cortex</span></a><span data-dcnode-id="8782" instrument_node=""> (precuneus), </span></span><a class="topic-link" data-dcnode-id="8779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/prefrontal-cortex" title="Learn more about prefrontal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8780" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="8778" instrument_node="">, and right striatum are activated in all meditative states and in the control state (</span></span><a class="workspace-trigger" data-dcnode-id="8775" href="#bib0275" name="bbib0275"><span data-dcnode-id="8776" instrument_node="">Lou and Kjaer, 2005</span></a><span data-dcnode-id="8774" instrument_node="">) (with permission).</span></p></span></span></figure></div><div data-dcnode-id="8712"><p data-dcnode-id="8744" id="par0045"><span data-dcnode-id="8768" instrument_node="">During the following years a number of experimental approaches characterized a neural correlate of self-awareness more fully. The early studies were done primarily with the </span><sup data-dcnode-id="8766"><span data-dcnode-id="8767" instrument_node="">15</span></sup><span data-dcnode-id="8765" instrument_node="">O</span><img alt="single bond" data-dcnode-id="8764" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdfestaticassets-us-east-1.sciencedirectassets.com/shared-assets/55/entities/sbnd.gif&amp;raw" style="vertical-align: middle;"><span data-dcnode-id="8763" instrument_node="">H</span><sub data-dcnode-id="8761"><span data-dcnode-id="8762" instrument_node="">2</span></sub><span data-dcnode-id="8760" instrument_node="">O PET method, which is still considered a gold standard for examining the distribution of activity in the brain. For practical reasons, most recent studies have used functional magnetic imaging (fMRI). They have given results comparable to the early PET-studies, in spite of relying on more complex, and disputed, physiological principles (</span><a class="workspace-trigger" data-dcnode-id="8758" href="#bib0345" name="bbib0345"><span data-dcnode-id="8759" instrument_node="">Mechelli et al., 2001</span></a><span data-dcnode-id="8757" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8755" href="#bib0505" name="bbib0505"><span data-dcnode-id="8756" instrument_node="">Zaldivar et al., 2014</span></a><span data-dcnode-id="8754" instrument_node="">). Different levels of complexity and different levels of representational processes have been examined. In spite of applying different methodologies on the different aspects of self-awareness, like verbal, spatial, emotional, and facial, these experiments showed converging evidence for medial prefrontal/anterior cingulate and parietal/posterior cingulate paralimbic regions being correlated with self- awareness (</span><a class="workspace-trigger" data-dcnode-id="8752" href="#fig0010" name="bfig0010"><span data-dcnode-id="8753" instrument_node="">Fig. 2</span></a><span data-dcnode-id="8751" instrument_node="">). On this basis it was concluded that the medial paralimbic network is a common neural signature for self-awareness (</span><a class="workspace-trigger" data-dcnode-id="8749" href="#bib0365" name="bbib0365"><span data-dcnode-id="8750" instrument_node="">Newen and Vogeley, 2003</span></a><span data-dcnode-id="8748" instrument_node="">). The idea has been supported by a large meta-analysis by Northoff et al. of self-related activation, studied mainly by functional magnetic resonance imaging (</span><a class="workspace-trigger" data-dcnode-id="8746" href="#bib0375" name="bbib0375"><span data-dcnode-id="8747" instrument_node="">Northoff et al., 2006</span></a><span data-dcnode-id="8745" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8713" id="fig0010"><span data-dcnode-id="8728"><img alt="Fig. 2" aria-describedby="cap0010" data-dcnode-id="8743" height="525" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr2.jpg&amp;raw"><span data-dcnode-id="8742" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8729"><li data-dcnode-id="8736"><a class="anchor download-link u-font-sans" data-dcnode-id="8737" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr2_lrg.jpg" target="_blank" title="Download high-res image (270KB)"><span class="anchor-text" data-dcnode-id="8738"><span data-dcnode-id="8741" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8739"><span data-dcnode-id="8740" instrument_node="">Download high-res image (270KB)</span></span></span></a></li><li data-dcnode-id="8730"><a class="anchor download-link u-font-sans" data-dcnode-id="8731" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8732"><span data-dcnode-id="8735" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8733"><span data-dcnode-id="8734" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8714"><span data-dcnode-id="8715" id="cap0010"><p data-dcnode-id="8716" id="spar0010"><span class="label" data-dcnode-id="8726"><span data-dcnode-id="8727" instrument_node="">Fig. 2</span></span><span data-dcnode-id="8725" instrument_node="">. </span><span data-dcnode-id="8720"><span data-dcnode-id="8724" instrument_node="">The paralimbic network in narrative self-awareness. Retrieval of previous judgment of oneself activates a paralimbic network of medial prefrontal/anterior cingulate (anterior “hub”) and medial parietal/posterior cingulate cortices (posterior hub), together with </span><a class="topic-link" data-dcnode-id="8722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/thalamus" title="Learn more about thalamus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8723" instrument_node="">thalamus</span></a><span data-dcnode-id="8721" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8718" href="#bib0030" name="bbib0030"><span data-dcnode-id="8719" instrument_node="">Changeux and Lou, 2011</span></a><span data-dcnode-id="8717" instrument_node="">) (with permission).</span></p></span></span></figure></div><p data-dcnode-id="8694" id="par0050"><span data-dcnode-id="8707"><span data-dcnode-id="8711" instrument_node="">The </span><a class="topic-link" data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/ontogeny" title="Learn more about ontogeny from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8710" instrument_node="">ontogeny</span></a><span data-dcnode-id="8708" instrument_node=""> of narrative, extended, self-awareness occurs concomitantly with the development of the paralimbic network: The newborn has a proprioceptive sense of its own body and readily imitates gestures and facial expression essential for social bonding and anticipation of emotional reactions of other people. The infant is probably aware only of events in the present time, while the adult capacity to put these sensations into a time perspective has to await later development (</span></span><a class="workspace-trigger" data-dcnode-id="8705" href="#bib0220" name="bbib0220"><span data-dcnode-id="8706" instrument_node="">Lagercrantz and Changeux, 2009</span></a><span data-dcnode-id="8704" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8702" href="#bib0240" name="bbib0240"><span data-dcnode-id="8703" instrument_node="">Legrain et al., 2011</span></a><span data-dcnode-id="8701" instrument_node="">). This shift takes place together with a change in dominance of the functional architecture from mainly sensori-motor hubs to the medial paralimbic hubs (</span><a class="workspace-trigger" data-dcnode-id="8699" href="#bib0040" name="bbib0040"><span data-dcnode-id="8700" instrument_node="">Cho et al., 2015</span></a><span data-dcnode-id="8698" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8696" href="#bib0085" name="bbib0085"><span data-dcnode-id="8697" instrument_node="">Fransson et al., 2011</span></a><span data-dcnode-id="8695" instrument_node="">).</span></p><p data-dcnode-id="8622" id="par0055"><span data-dcnode-id="8693" instrument_node="">The functional anatomy of the two core hubs of self-awareness, the medial prefrontal/anterior cingulate and medial parietal/posterior cingulate cortices, has been analyzed in detail by </span><a class="workspace-trigger" data-dcnode-id="8691" href="#bib0005" name="bbib0005"><span data-dcnode-id="8692" instrument_node="">Amodio and Frith, 2006</span></a><span data-dcnode-id="8690" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8688" href="#bib0080" name="bbib0080"><span data-dcnode-id="8689" instrument_node="">Fleming et al., 2010</span></a><span data-dcnode-id="8687" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8685" href="#bib0020" name="bbib0020"><span data-dcnode-id="8686" instrument_node="">Cavanna and Trimble, 2006</span></a><span data-dcnode-id="8684" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8682" href="#bib0405" name="bbib0405"><span data-dcnode-id="8683" instrument_node="">Peer et al., 2015</span></a><span data-dcnode-id="8669"><span data-dcnode-id="8681" instrument_node="">. The core regions are usually accompanied with activity in the </span><a class="topic-link" data-dcnode-id="8679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/insula" title="Learn more about insula from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8680" instrument_node="">insula</span></a><span data-dcnode-id="8670"><span data-dcnode-id="8678" instrument_node="">, </span><a class="topic-link" data-dcnode-id="8676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/angular-gyrus" title="Learn more about angular gyri from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8677" instrument_node="">angular gyri</span></a><span data-dcnode-id="8671"><span data-dcnode-id="8675" instrument_node="">, and subcortical regions, depending on the special characteristics of each particular form of self-awareness. An example is awareness of the own body, which is linked to gamma-butyric acid (GABA) composition in the insula as determined by </span><a class="topic-link" data-dcnode-id="8673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/magnetic-resonance-spectroscopy" title="Learn more about magnetic resonance spectroscopy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8674" instrument_node="">magnetic resonance spectroscopy</span></a><span data-dcnode-id="8672" instrument_node=""> (</span></span></span></span><a class="workspace-trigger" data-dcnode-id="8667" href="#bib0490" name="bbib0490"><span data-dcnode-id="8668" instrument_node="">Wiebking et al., 2014</span></a><span data-dcnode-id="8662"><span data-dcnode-id="8666" instrument_node="">). This finding is consistent with earlier results showing that damage to both right insula and adjacent parts of the parietal cortex, and their connections with the </span><a class="topic-link" data-dcnode-id="8664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/medial-prefrontal-cortex" title="Learn more about medial prefrontal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8665" instrument_node="">medial prefrontal cortex</span></a><span data-dcnode-id="8663" instrument_node=""> may impair sensation of own body (</span></span><a class="workspace-trigger" data-dcnode-id="8660" href="#bib0050" name="bbib0050"><span data-dcnode-id="8661" instrument_node="">Damasio, 2000</span></a><span data-dcnode-id="8659" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8657" href="#bib0385" name="bbib0385"><span data-dcnode-id="8658" instrument_node="">Orfei et al., 2008</span></a><span data-dcnode-id="8656" instrument_node="">). They are also consistent with the out of body experience with a temporary disruption in multi-sensory integration processes (</span><a class="workspace-trigger" data-dcnode-id="8654" href="#bib0135" name="bbib0135"><span data-dcnode-id="8655" instrument_node="">Heydrich and Blanke, 2013</span></a><span data-dcnode-id="8653" instrument_node="">). Likewise, in self-generated movements activity in supplementary motor regions is linked to the paralimbic circuitry of self-awareness (</span><a class="workspace-trigger" data-dcnode-id="8651" href="#bib0370" name="bbib0370"><span data-dcnode-id="8652" instrument_node="">Nguyen et al., 2014</span></a><span data-dcnode-id="8650" instrument_node="">). Finally, the so- called the “default mode network” of idleness is characterized by a high degree of self-referential thinking, but not without exceptions (</span><a class="workspace-trigger" data-dcnode-id="8648" href="#bib0115" name="bbib0115"><span data-dcnode-id="8649" instrument_node="">Gusnard et al., 2001</span></a><span data-dcnode-id="8647" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8645" href="#bib0440" name="bbib0440"><span data-dcnode-id="8646" instrument_node="">Salomon et al., 2014</span></a><span data-dcnode-id="8644" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8642" href="#bib0060" name="bbib0060"><span data-dcnode-id="8643" instrument_node="">Davey et al., 2016</span></a><span data-dcnode-id="8641" instrument_node="">). Its major hubs are medial prefrontal/anterior cingulate and medial parietal/posterior cingulate cortices like pure examples of self- awareness. These hubs are exceedingly metabolically active in idleness, while their activity is decreased with the diminished self-awareness during goal-directed action in the outside world (</span><a class="workspace-trigger" data-dcnode-id="8639" href="#bib0115" name="bbib0115"><span data-dcnode-id="8640" instrument_node="">Gusnard et al., 2001</span></a><span data-dcnode-id="8638" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8636" href="#bib0330" name="bbib0330"><span data-dcnode-id="8637" instrument_node="">Luber et al., 2012</span></a><span data-dcnode-id="8635" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8633" href="#bib0440" name="bbib0440"><span data-dcnode-id="8634" instrument_node="">Salomon et al., 2014</span></a><span data-dcnode-id="8632" instrument_node="">. This change reflects the braińs capacity to shift allocation of resources according to changing needs (</span><a class="workspace-trigger" data-dcnode-id="8630" href="#bib0300" name="bbib0300"><span data-dcnode-id="8631" instrument_node="">Lou et al., 2011a</span></a><span data-dcnode-id="8629" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8627" href="#bib0305" name="bbib0305"><span data-dcnode-id="8628" instrument_node="">Lou et al., 2011b</span></a><span data-dcnode-id="8626" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8624" href="#bib0310" name="bbib0310"><span data-dcnode-id="8625" instrument_node="">Lou et al., 2011c</span></a><span data-dcnode-id="8623" instrument_node="">).</span></p></section><section data-dcnode-id="8331" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8617" id="sect0030"><span data-dcnode-id="8620" instrument_node="">3</span><span data-dcnode-id="8619" instrument_node="">. </span><span data-dcnode-id="8618" instrument_node="">From association to causality</span></h2><div data-dcnode-id="8513"><p data-dcnode-id="8559" id="par0060"><span data-dcnode-id="8616" instrument_node="">The ascription of the medial paralimbic network to self-awareness in Section </span><a class="workspace-trigger" data-dcnode-id="8614" href="#sec0010" name="bsec0010"><span data-dcnode-id="8615" instrument_node="">2</span></a><span data-dcnode-id="8613" instrument_node=""> is mainly based on imaging data, and can, as such, only be correlative. It could therefore be an epiphenomenon. Accordingly, the significance of the network for self-awareness has been disputed (</span><a class="workspace-trigger" data-dcnode-id="8611" href="#bib0245" name="bbib0245"><span data-dcnode-id="8612" instrument_node="">Legrand and Ruby, 2009</span></a><span data-dcnode-id="8610" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8608" href="#bib0450" name="bbib0450"><span data-dcnode-id="8609" instrument_node="">Smith, 2012</span></a><span data-dcnode-id="8599"><span data-dcnode-id="8603"><span data-dcnode-id="8607" instrument_node="">). In order to establish an eventual causal relationship between objective measurements and the subjective perception of self-awareness, a series of intervention studies has been carried out. These include investigating the behavioral consequences of electromagnetic as well as </span><a class="topic-link" data-dcnode-id="8605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/neurotransmitters" title="Learn more about neurotransmitter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8606" instrument_node="">neurotransmitter</span></a><span data-dcnode-id="8604" instrument_node=""> manipulation of the paralimbic network. </span></span><a class="topic-link" data-dcnode-id="8601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/transcranial-magnetic-stimulation" title="Learn more about Transcranial magnetic stimulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8602" instrument_node="">Transcranial magnetic stimulation</span></a><span data-dcnode-id="8600" instrument_node=""> (TMS) has been used for this purpose. With TMS, the neural function of a given region is transiently disturbed by applying a strong, short-lasting magnetic field to the scalp targeting the region. Specifically targeting the medial parietal/posterior cingulate (</span></span><a class="workspace-trigger" data-dcnode-id="8597" href="#bib0290" name="bbib0290"><span data-dcnode-id="8598" instrument_node="">Lou et al., 2004</span></a><span data-dcnode-id="8596" instrument_node="">) and prefrontal/anterior cingulate (</span><a class="workspace-trigger" data-dcnode-id="8594" href="#bib0330" name="bbib0330"><span data-dcnode-id="8595" instrument_node="">Luber et al., 2012</span></a><span data-dcnode-id="8589"><span data-dcnode-id="8593" instrument_node="">) regions has unequivocally shown that the former region is instrumental in retrieval of self-related </span><a class="topic-link" data-dcnode-id="8591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/episodic-memory" title="Learn more about episodic memory from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8592" instrument_node="">episodic memory</span></a><span data-dcnode-id="8590" instrument_node=""> (narrative self-awareness), while the latter region is instrumental in self-evaluation (introspection). At the two sites there was a simultaneous maximal depressing effect at 160</span></span><span data-dcnode-id="8588" instrument_node="">&nbsp;</span><span data-dcnode-id="8587" instrument_node="">ms on self-awareness measured by contrasting accuracy and reaction times to respond to stimuli with different degrees of self-information (</span><a class="workspace-trigger" data-dcnode-id="8585" href="#fig0015" name="bfig0015"><span data-dcnode-id="8586" instrument_node="">Fig. 3</span></a><span data-dcnode-id="8580"><span data-dcnode-id="8584" instrument_node="">). The interaction between the two sites is bi-directional and recurrent mainly in the lower gamma range providing a “bootstrapping” effect as evidenced by </span><a class="topic-link" data-dcnode-id="8582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/granger-causality" title="Learn more about Granger causality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8583" instrument_node="">Granger causality</span></a><span data-dcnode-id="8581" instrument_node=""> analysis of magneto-encephalographic signals (MEG) (</span></span><a class="workspace-trigger" data-dcnode-id="8578" href="#bib0300" name="bbib0300"><span data-dcnode-id="8579" instrument_node="">Lou et al., 2011a</span></a><span data-dcnode-id="8577" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8575" href="#bib0305" name="bbib0305"><span data-dcnode-id="8576" instrument_node="">Lou et al., 2011b</span></a><span data-dcnode-id="8574" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8572" href="#bib0310" name="bbib0310"><span data-dcnode-id="8573" instrument_node="">Lou et al., 2011c</span></a><span data-dcnode-id="8571" instrument_node="">). This conceivably increases signal duration and strength at medial parietal and medial prefrontal sites facilitating access to consciousness (</span><a class="workspace-trigger" data-dcnode-id="8569" href="#bib0255" name="bbib0255"><span data-dcnode-id="8570" instrument_node="">Libet, 1991</span></a><span data-dcnode-id="8568" instrument_node="">). The simultaneously emerging self-awareness components at widely separated regions is consistent with the global neuronal network theory for access to consciousness and the simultaneous “ignition” of separate brain regions in the course of conscious processing (</span><a class="workspace-trigger" data-dcnode-id="8566" href="#bib0065" name="bbib0065"><span data-dcnode-id="8567" instrument_node="">Dehaene and Changeux, 2011</span></a><span data-dcnode-id="8565" instrument_node="">). Causality of lower gamma oscillations in the frontal regions for self-awareness has recently been confirmed by induction of self-reflective awareness in dreams using synchronous oscillations around 25 and 40</span><span data-dcnode-id="8564" instrument_node="">&nbsp;</span><span data-dcnode-id="8563" instrument_node="">Hz over the frontal cortical regions (</span><a class="workspace-trigger" data-dcnode-id="8561" href="#bib0480" name="bbib0480"><span data-dcnode-id="8562" instrument_node="">Voss et al., 2014</span></a><span data-dcnode-id="8560" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8514" id="fig0015"><span data-dcnode-id="8543"><img alt="Fig. 3" aria-describedby="cap0015" data-dcnode-id="8558" height="875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr3.jpg&amp;raw"><span data-dcnode-id="8557" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8544"><li data-dcnode-id="8551"><a class="anchor download-link u-font-sans" data-dcnode-id="8552" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr3_lrg.jpg" target="_blank" title="Download high-res image (369KB)"><span class="anchor-text" data-dcnode-id="8553"><span data-dcnode-id="8556" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8554"><span data-dcnode-id="8555" instrument_node="">Download high-res image (369KB)</span></span></span></a></li><li data-dcnode-id="8545"><a class="anchor download-link u-font-sans" data-dcnode-id="8546" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8547"><span data-dcnode-id="8550" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8548"><span data-dcnode-id="8549" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8515"><span data-dcnode-id="8516" id="cap0015"><p data-dcnode-id="8517" id="spar0015"><span class="label" data-dcnode-id="8541"><span data-dcnode-id="8542" instrument_node="">Fig. 3</span></span><span data-dcnode-id="8540" instrument_node="">. </span><span data-dcnode-id="8535"><span data-dcnode-id="8539" instrument_node="">Causality of paralimbic network evidenced by </span><a class="topic-link" data-dcnode-id="8537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/transcranial-magnetic-stimulation" title="Learn more about TMS from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8538" instrument_node="">TMS</span></a><span data-dcnode-id="8536" instrument_node="">. Transcranial magnetic stimulation (TMS) targeting medial parietal/posterior cingulate region impairs accuracy and reaction time for identifying previous judgment of self (adjectives) </span></span><em data-dcnode-id="8533"><span data-dcnode-id="8534" instrument_node="">vs</span></em><span data-dcnode-id="8532" instrument_node=""> other (“best friend”) (a), </span><a class="workspace-trigger" data-dcnode-id="8530" href="#bib0290" name="bbib0290"><span data-dcnode-id="8531" instrument_node="">Lou et al., 2004</span></a><span data-dcnode-id="8529" instrument_node="">), with maximal effect at a latency of 160</span><span data-dcnode-id="8528" instrument_node="">&nbsp;</span><span data-dcnode-id="8523"><span data-dcnode-id="8527" instrument_node="">ms. In (b), preference for allocating positively rated adjectives to one-self rather than best friend is selectively impaired with TMS targeting the </span><a class="topic-link" data-dcnode-id="8525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/medial-prefrontal-cortex" title="Learn more about medial prefrontal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8526" instrument_node="">medial prefrontal cortex</span></a><span data-dcnode-id="8524" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8521" href="#bib0330" name="bbib0330"><span data-dcnode-id="8522" instrument_node="">Luber et al., 2012</span></a><span data-dcnode-id="8520" instrument_node="">). The results demonstrate that the two widely separated regions of self-awareness processing “ignite” simultaneous at a latency of 160</span><span data-dcnode-id="8519" instrument_node="">&nbsp;</span><span data-dcnode-id="8518" instrument_node="">ms.</span></p></span></span></figure></div><p data-dcnode-id="8451" id="par0065"><span data-dcnode-id="8504"><span data-dcnode-id="8508"><span data-dcnode-id="8512" instrument_node="">Generation of gamma frequency oscillations depends on fast-spiking, </span><a class="topic-link" data-dcnode-id="8510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/parvalbumin" title="Learn more about parvalbumin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8511" instrument_node="">parvalbumin</span></a><span data-dcnode-id="8509" instrument_node=""> −ergic </span></span><a class="topic-link" data-dcnode-id="8506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/interneuron" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8507" instrument_node="">interneurons</span></a><span data-dcnode-id="8505" instrument_node="">. Thus, transgenic mice deficient in these interneurons have deficient gamma oscillations and behavioral abnormalities, which may be restored opto-genetically (</span></span><a class="workspace-trigger" data-dcnode-id="8502" href="#bib0185" name="bbib0185"><span data-dcnode-id="8503" instrument_node="">Kim et al., 2015</span></a><span data-dcnode-id="8501" instrument_node="">). In humans, </span><a class="workspace-trigger" data-dcnode-id="8499" href="#bib0120" name="bbib0120"><span data-dcnode-id="8500" instrument_node="">Hall et al. (2010)</span></a><span data-dcnode-id="8487"><span data-dcnode-id="8494"><span data-dcnode-id="8498" instrument_node=""> showed that GABA-ergic stimulation induced gamma power increase in the </span><a class="topic-link" data-dcnode-id="8496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/prefrontal-cortex" title="Learn more about prefrontal cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8497" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="8495" instrument_node="">. The development of GABA-ergic inhibition of </span></span><a class="topic-link" data-dcnode-id="8492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/pyramidal-cell" title="Learn more about pyramidal cells from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8493" instrument_node="">pyramidal cells</span></a><span data-dcnode-id="8488"><span data-dcnode-id="8491" instrument_node="">, essential for generation of gamma synchrony, begins already in utero and is not completed until adulthood. Direct recording of </span><a class="topic-link" data-dcnode-id="8489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/butyric-acid" title="Learn more about GABA from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8490" instrument_node="">GABA</span></a></span></span><sub data-dcnode-id="8485"><span data-dcnode-id="8486" instrument_node="">A</span></sub><span data-dcnode-id="8484" instrument_node=""> receptor-mediated inhibitory post-synaptic currents showed their amplitude to increase during childhood (</span><a class="workspace-trigger" data-dcnode-id="8482" href="#bib0110" name="bbib0110"><span data-dcnode-id="8483" instrument_node="">Gonzalez-Burgos et al., 2015</span></a><span data-dcnode-id="8481" instrument_node="">), with concomitant changes in GABA synapse-related gene products (</span><a class="workspace-trigger" data-dcnode-id="8479" href="#bib0055" name="bbib0055"><span data-dcnode-id="8480" instrument_node="">Datta et al., 2015</span></a><span data-dcnode-id="8470"><span data-dcnode-id="8474"><span data-dcnode-id="8478" instrument_node="">). In mice, this development has been shown to be directly concomitant with development of </span><a class="topic-link" data-dcnode-id="8476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/multisensory-integration" title="Learn more about multisensory integration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8477" instrument_node="">multisensory integration</span></a><span data-dcnode-id="8475" instrument_node=""> through the </span></span><a class="topic-link" data-dcnode-id="8472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/insula" title="Learn more about insula from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8473" instrument_node="">insula</span></a><span data-dcnode-id="8471" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8468" href="#bib0100" name="bbib0100"><span data-dcnode-id="8469" instrument_node="">Gogolla et al., 2014</span></a><span data-dcnode-id="8455"><span data-dcnode-id="8463"><span data-dcnode-id="8467" instrument_node="">). Common to all GABA-ergic neurons is the synthesis of GABA, catalyzed by two isoforms of </span><a class="topic-link" data-dcnode-id="8465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/glutamate-decarboxylase" title="Learn more about glutamic acid decarboxylases from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8466" instrument_node="">glutamic acid decarboxylases</span></a><span data-dcnode-id="8464" instrument_node=""> (GAD), GAD67 as the rate-limiting enzyme, which may be deficient in many </span></span><a class="topic-link" data-dcnode-id="8461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/psychopathology" title="Learn more about neuropsychiatric disorders from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8462" instrument_node="">neuropsychiatric disorders</span></a><span data-dcnode-id="8456"><span data-dcnode-id="8460" instrument_node="">. By removing one allele of this enzyme in the mouse prefrontal cortex the level of GAD67 was artificially decreased, with deficits in transmission from interneurons to pyramidal neurons and </span><a class="topic-link" data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/synaptic-inhibition" title="Learn more about synaptic inhibition from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8459" instrument_node="">synaptic inhibition</span></a><span data-dcnode-id="8457" instrument_node=""> necessary for gamma oscillations as a consequence (</span></span></span><a class="workspace-trigger" data-dcnode-id="8453" href="#bib0235" name="bbib0235"><span data-dcnode-id="8454" instrument_node="">Lazarus et al., 2015</span></a><span data-dcnode-id="8452" instrument_node="">).</span></p><div data-dcnode-id="8334"><p data-dcnode-id="8409" id="par0070"><span data-dcnode-id="8450" instrument_node="">More specifically, we have shown that self-awareness is regulated by dopamine through the medial prefrontal/anterior cingulate cortex (</span><a class="workspace-trigger" data-dcnode-id="8448" href="#bib0300" name="bbib0300"><span data-dcnode-id="8449" instrument_node="">Lou et al., 2011a</span></a><span data-dcnode-id="8447" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8445" href="#bib0305" name="bbib0305"><span data-dcnode-id="8446" instrument_node="">Lou et al., 2011b</span></a><span data-dcnode-id="8444" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8442" href="#bib0310" name="bbib0310"><span data-dcnode-id="8443" instrument_node="">Lou et al., 2011c</span></a><span data-dcnode-id="8441" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="8439" href="#bib0155" name="bbib0155"><span data-dcnode-id="8440" instrument_node="">Joensson et al., 2015</span></a><span data-dcnode-id="8438" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="8436" href="#fig0020" name="bfig0020"><span data-dcnode-id="8437" instrument_node="">Fig. 4</span></a><span data-dcnode-id="8435" instrument_node="">), and that this occurs via the GABA system: dopamine activation in humans elicits GABA activity directly in the medial prefrontal/anterior cingulate cortex of the paralimbic network and the associated right insula (</span><a class="workspace-trigger" data-dcnode-id="8433" href="#bib0325" name="bbib0325"><span data-dcnode-id="8434" instrument_node="">Lou et al., 2016</span></a><span data-dcnode-id="8432" instrument_node="">, (</span><a class="workspace-trigger" data-dcnode-id="8430" href="#fig0025" name="bfig0025"><span data-dcnode-id="8431" instrument_node="">Fig. 5</span></a><span data-dcnode-id="8429" instrument_node="">), thus accounting for the effect of dopamine in its regulation and also for the preferential role of right hemisphere in self-recognition (</span><a class="workspace-trigger" data-dcnode-id="8427" href="#bib0180" name="bbib0180"><span data-dcnode-id="8428" instrument_node="">Keenan et al., 2001</span></a><span data-dcnode-id="8422"><span data-dcnode-id="8426" instrument_node="">). Causal effects may also be inferred by the influence of </span><a class="topic-link" data-dcnode-id="8424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/acetylcholine" title="Learn more about acetylcholine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8425" instrument_node="">acetylcholine</span></a><span data-dcnode-id="8423" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8420" href="#bib0030" name="bbib0030"><span data-dcnode-id="8421" instrument_node="">Changeux and Lou, 2011</span></a><span data-dcnode-id="8419" instrument_node="">), serotonin (</span><a class="workspace-trigger" data-dcnode-id="8417" href="#bib0160" name="bbib0160"><span data-dcnode-id="8418" instrument_node="">Juckel, 2015</span></a><span data-dcnode-id="8416" instrument_node="">), and of oxytocin (</span><a class="workspace-trigger" data-dcnode-id="8414" href="#bib0260" name="bbib0260"><span data-dcnode-id="8415" instrument_node="">Liu et al., 2013</span></a><span data-dcnode-id="8413" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8411" href="#bib0355" name="bbib0355"><span data-dcnode-id="8412" instrument_node="">Muthukumaraswamy et al., 2013</span></a><span data-dcnode-id="8410" instrument_node="">), making interneurons a natural “mini brain”, balancing a wide spectrum of neurotransmitters in the regulation of pyramidal cell activity.</span></p><figure class="figure text-xs" data-dcnode-id="8374" id="fig0020"><span data-dcnode-id="8393"><img alt="Fig. 4" aria-describedby="cap0020" data-dcnode-id="8408" height="668" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr4.jpg&amp;raw"><span data-dcnode-id="8407" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8394"><li data-dcnode-id="8401"><a class="anchor download-link u-font-sans" data-dcnode-id="8402" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr4_lrg.jpg" target="_blank" title="Download high-res image (841KB)"><span class="anchor-text" data-dcnode-id="8403"><span data-dcnode-id="8406" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8404"><span data-dcnode-id="8405" instrument_node="">Download high-res image (841KB)</span></span></span></a></li><li data-dcnode-id="8395"><a class="anchor download-link u-font-sans" data-dcnode-id="8396" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8397"><span data-dcnode-id="8400" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8398"><span data-dcnode-id="8399" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8375"><span data-dcnode-id="8376" id="cap0020"><p data-dcnode-id="8377" id="spar0020"><span class="label" data-dcnode-id="8391"><span data-dcnode-id="8392" instrument_node="">Fig. 4</span></span><span data-dcnode-id="8390" instrument_node="">. </span><span data-dcnode-id="8389" instrument_node="">Dopamine improves self-awareness and increases gamma power through medial prefrontal/anterior cingulate cortex. With dopamine (sinemet 100</span><span data-dcnode-id="8388" instrument_node="">&nbsp;</span><span data-dcnode-id="8383"><span data-dcnode-id="8387" instrument_node="">mg p.o.) compared to placebo, a decreased error rate is seen in retrieval of previous judgment on whether adjectives fitted one-self or not compared to placebo (a). In contrast, retrieval of judgment of a control person (best friend) is not changed significantly (b). Whole brain MEG showed preferential power increase in anterior medial prefrontal/anterior cingulate region and right </span><a class="topic-link" data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/insula" title="Learn more about insula from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8386" instrument_node="">insula</span></a><span data-dcnode-id="8384" instrument_node=""> (gamma range (30–100</span></span><span data-dcnode-id="8382" instrument_node="">&nbsp;</span><span data-dcnode-id="8381" instrument_node="">Hz) (c, d) (see </span><a class="workspace-trigger" data-dcnode-id="8379" href="#bib0155" name="bbib0155"><span data-dcnode-id="8380" instrument_node="">Joensson et al., 2015</span></a><span data-dcnode-id="8378" instrument_node=""> for details) (with permission).</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="8335" id="fig0025"><span data-dcnode-id="8358"><img alt="Fig. 5" aria-describedby="cap0025" data-dcnode-id="8373" height="256" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr5.jpg&amp;raw"><span data-dcnode-id="8372" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8359"><li data-dcnode-id="8366"><a class="anchor download-link u-font-sans" data-dcnode-id="8367" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr5_lrg.jpg" target="_blank" title="Download high-res image (195KB)"><span class="anchor-text" data-dcnode-id="8368"><span data-dcnode-id="8371" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8369"><span data-dcnode-id="8370" instrument_node="">Download high-res image (195KB)</span></span></span></a></li><li data-dcnode-id="8360"><a class="anchor download-link u-font-sans" data-dcnode-id="8361" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8362"><span data-dcnode-id="8365" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8363"><span data-dcnode-id="8364" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8336"><span data-dcnode-id="8337" id="cap0025"><p data-dcnode-id="8338" id="spar0025"><span class="label" data-dcnode-id="8356"><span data-dcnode-id="8357" instrument_node="">Fig. 5</span></span><span data-dcnode-id="8355" instrument_node="">. </span><span data-dcnode-id="8342"><span data-dcnode-id="8350"><span data-dcnode-id="8354" instrument_node="">Schematic illustration of </span><a class="topic-link" data-dcnode-id="8352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/neurotransmitters" title="Learn more about neurotransmitter from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8353" instrument_node="">neurotransmitter</span></a><span data-dcnode-id="8351" instrument_node=""> regulation of </span></span><a class="topic-link" data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/pyramidal-cell" title="Learn more about pyramidal cell from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8349" instrument_node="">pyramidal cell</span></a><span data-dcnode-id="8343"><span data-dcnode-id="8347" instrument_node=""> synchrony via GABA-ergic </span><a class="topic-link" data-dcnode-id="8345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/interneuron" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8346" instrument_node="">interneurons</span></a><span data-dcnode-id="8344" instrument_node="">. Fast-spiking GABA-ergic interneurons are responsible for the synchrony by inhibitory influence on pyramidal cell excitation. In their turn, interneuron activity is enhanced by D1 and D2 receptors located at or near the soma. By this common path dopamine enhances paralimbic synchrony for self-reference, a crucial constituent of any conscious experience. (</span></span></span><a class="workspace-trigger" data-dcnode-id="8340" href="#bib0105" name="bbib0105"><span data-dcnode-id="8341" instrument_node="">Modified from Changeux and Lou, 2011; Gonzalez-Burgos and Lewis, 2008</span></a><span data-dcnode-id="8339" instrument_node="">).</span></p></span></span></figure></div><p data-dcnode-id="8332" id="par0075"><span data-dcnode-id="8333" instrument_node="">There is therefore now ample functional anatomical and molecular evidence for that the paralimbic network is not only active in self-awareness; it is also instrumental in self-awareness and its regulation.</span></p></section><section data-dcnode-id="8148" id="sec0020"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8327" id="sect0035"><span data-dcnode-id="8330" instrument_node="">4</span><span data-dcnode-id="8329" instrument_node="">. </span><span data-dcnode-id="8328" instrument_node="">Pathophysiology - the importance of oxygen homeostasis</span></h2><div data-dcnode-id="8207"><p data-dcnode-id="8241" id="par0080"><span data-dcnode-id="8326" instrument_node="">Due to its fundamental significance for human development and nature described in Section </span><a class="workspace-trigger" data-dcnode-id="8324" href="#sec0005" name="bsec0005"><span data-dcnode-id="8325" instrument_node="">1</span></a><span data-dcnode-id="8319"><span data-dcnode-id="8323" instrument_node="">, disturbance of self-awareness and its paralimbic network is a basis for much pathology. Thus gamma synchrony is dysfunctional in </span><a class="topic-link" data-dcnode-id="8321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/behavioral-addiction" title="Learn more about behavioral addiction from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8322" instrument_node="">behavioral addiction</span></a><span data-dcnode-id="8320" instrument_node=""> without drug abuse (</span></span><a class="workspace-trigger" data-dcnode-id="8317" href="#bib0430" name="bbib0430"><span data-dcnode-id="8318" instrument_node="">Rømer Thomsen et al., 2013</span></a><span data-dcnode-id="8316" instrument_node="">), a mono-symptomatic condition with deficient conscious self-monitoring. Addiction is conceptualized as deficiency of self-regulation, impulse control, decision making, and emotion processing. The addicted subject loses conscious self-regulation of behavior, </span><em data-dcnode-id="8314"><span data-dcnode-id="8315" instrument_node="">i.e</span></em><span data-dcnode-id="8313" instrument_node="">., will power (</span><a class="workspace-trigger" data-dcnode-id="8311" href="#bib0430" name="bbib0430"><span data-dcnode-id="8312" instrument_node="">Rømer Thomsen et al., 2013</span></a><span data-dcnode-id="8310" instrument_node="">) (</span><a class="workspace-trigger" data-dcnode-id="8308" href="#fig0030" name="bfig0030"><span data-dcnode-id="8309" instrument_node="">Fig. 6</span></a><span data-dcnode-id="8303"><span data-dcnode-id="8307" instrument_node="">). Drug addiction can be viewed as the end point of a series of transitions from initial voluntary substance use to the complete loss of conscious “voluntary” control over this behavior, such that it becomes habitual and, ultimately, compulsive, confounded by toxic effects. One prominent example is the influence of nicotine on nicotinic </span><a class="topic-link" data-dcnode-id="8305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/acetylcholine" title="Learn more about acetylcholine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8306" instrument_node="">acetylcholine</span></a><span data-dcnode-id="8304" instrument_node=""> receptors on prefrontal cortical neurons (</span></span><a class="workspace-trigger" data-dcnode-id="8301" href="#bib0035" name="bbib0035"><span data-dcnode-id="8302" instrument_node="">Changeux, 2010</span></a><span data-dcnode-id="8300" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8298" href="#bib0130" name="bbib0130"><span data-dcnode-id="8299" instrument_node="">Heath et al., 2010</span></a><span data-dcnode-id="8297" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8295" href="#bib0225" name="bbib0225"><span data-dcnode-id="8296" instrument_node="">Lambe et al., 2003</span></a><span data-dcnode-id="8294" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8292" href="#bib0250" name="bbib0250"><span data-dcnode-id="8293" instrument_node="">Lena et al., 1993</span></a><span data-dcnode-id="8291" instrument_node="">), thereby further disturbing normal functioning of the paralimbic network in a vicious circle (</span><a class="workspace-trigger" data-dcnode-id="8289" href="#bib0030" name="bbib0030"><span data-dcnode-id="8290" instrument_node="">Changeux and Lou, 2011</span></a><span data-dcnode-id="8288" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8286" href="#bib0460" name="bbib0460"><span data-dcnode-id="8287" instrument_node="">Tang et al., 2015</span></a><span data-dcnode-id="8285" instrument_node="">). Disturbance of paralimbic function also prevails in more complex disorders of self-monitoring such as adhd (</span><a class="workspace-trigger" data-dcnode-id="8283" href="#bib0015" name="bbib0015"><span data-dcnode-id="8284" instrument_node="">Castellanos et al., 2008</span></a><span data-dcnode-id="8282" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8280" href="#bib0315" name="bbib0315"><span data-dcnode-id="8281" instrument_node="">Lou, 1996</span></a><span data-dcnode-id="8279" instrument_node="">), borderline personality disorder (</span><a class="workspace-trigger" data-dcnode-id="8277" href="#bib0445" name="bbib0445"><span data-dcnode-id="8278" instrument_node="">Salvador et al., 2016</span></a><span data-dcnode-id="8272"><span data-dcnode-id="8276" instrument_node="">), </span><a class="topic-link" data-dc
