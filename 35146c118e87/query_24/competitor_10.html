node-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/autism-spectrum-disorders" title="Learn more about autism spectrum disorder from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8275" instrument_node="">autism spectrum disorder</span></a><span data-dcnode-id="8273" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8270" href="#bib0380" name="bbib0380"><span data-dcnode-id="8271" instrument_node="">Oblak et al., 2009</span></a><span data-dcnode-id="8265"><span data-dcnode-id="8269" instrument_node="">), </span><a class="topic-link" data-dcnode-id="8267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/dementia-praecox" title="Learn more about schizophrenia from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8268" instrument_node="">schizophrenia</span></a><span data-dcnode-id="8266" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8263" href="#bib0095" name="bbib0095"><span data-dcnode-id="8264" instrument_node="">Gallinat et al., 2004</span></a><span data-dcnode-id="8258"><span data-dcnode-id="8262" instrument_node="">), the </span><a class="topic-link" data-dcnode-id="8260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/dementia" title="Learn more about dementias from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8261" instrument_node="">dementias</span></a><span data-dcnode-id="8259" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8256" href="#bib0265" name="bbib0265"><span data-dcnode-id="8257" instrument_node="">Liu et al., 2014a</span></a><span data-dcnode-id="8255" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8253" href="#bib0270" name="bbib0270"><span data-dcnode-id="8254" instrument_node="">Liu et al., 2014b</span></a><span data-dcnode-id="8248"><span data-dcnode-id="8252" instrument_node="">), and following </span><a class="topic-link" data-dcnode-id="8250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/traumatic-brain-injury" title="Learn more about traumatic brain injury from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8251" instrument_node="">traumatic brain injury</span></a><span data-dcnode-id="8249" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8246" href="#bib0125" name="bbib0125"><span data-dcnode-id="8247" instrument_node="">Ham et al., 2014</span></a><span data-dcnode-id="8245" instrument_node="">). Even in a pervasive dysfunctional state such as the vegetative state, recovery of the paralimbic network is tightly linked to clinical recovery (</span><a class="workspace-trigger" data-dcnode-id="8243" href="#bib0230" name="bbib0230"><span data-dcnode-id="8244" instrument_node="">Laureys et al., 2006</span></a><span data-dcnode-id="8242" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="8208" id="fig0030"><span data-dcnode-id="8225"><img alt="Fig. 6" aria-describedby="cap0030" data-dcnode-id="8240" height="267" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr6.jpg&amp;raw"><span data-dcnode-id="8239" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="8226"><li data-dcnode-id="8233"><a class="anchor download-link u-font-sans" data-dcnode-id="8234" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr6_lrg.jpg" target="_blank" title="Download high-res image (324KB)"><span class="anchor-text" data-dcnode-id="8235"><span data-dcnode-id="8238" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8236"><span data-dcnode-id="8237" instrument_node="">Download high-res image (324KB)</span></span></span></a></li><li data-dcnode-id="8227"><a class="anchor download-link u-font-sans" data-dcnode-id="8228" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0149763416300410-gr6.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="8229"><span data-dcnode-id="8232" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="8230"><span data-dcnode-id="8231" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="8209"><span data-dcnode-id="8210" id="cap0030"><p data-dcnode-id="8211" id="spar0030"><span class="label" data-dcnode-id="8223"><span data-dcnode-id="8224" instrument_node="">Fig. 6</span></span><span data-dcnode-id="8222" instrument_node="">. </span><span data-dcnode-id="8221" instrument_node="">Abnormal gamma synchronization (SI) in pathological gamblers. (a) During rest, pathological gamblers had lower synchronization than controls in gamma band (30–100</span><span data-dcnode-id="8220" instrument_node="">&nbsp;</span><span data-dcnode-id="8219" instrument_node="">Hz). Subgroup analysis showed that this difference was found for both gamblers with and without a history of comorbid stimulant addiction (both P</span><span data-dcnode-id="8218" instrument_node="">&nbsp;</span><span data-dcnode-id="8217" instrument_node="">&lt;</span><span data-dcnode-id="8216" instrument_node="">&nbsp;</span><span data-dcnode-id="8215" instrument_node="">0.05). (b) During a stop-signal task there is no difference between gamblers and control. This finding illustrates abnormal function in the paralimbic network of self-reference, and, by inference, abnormal conscious self-control and metacognition, in individuals susceptible to gambling (</span><a class="workspace-trigger" data-dcnode-id="8213" href="#bib0430" name="bbib0430"><span data-dcnode-id="8214" instrument_node="">Rømer Thomsen et al., 2013</span></a><span data-dcnode-id="8212" instrument_node="">) (with permission).</span></p></span></span></figure></div><p data-dcnode-id="8149" id="par0085"><span data-dcnode-id="8206" instrument_node="">The widespread dysfunction of self-awareness in pathology is likely to be a consequence of the exceedingly high oxygen demand of the paralimbic network (</span><em data-dcnode-id="8204"><span data-dcnode-id="8205" instrument_node="">e.g.</span></em><span data-dcnode-id="8203" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="8201" href="#bib0425" name="bbib0425"><span data-dcnode-id="8202" instrument_node="">Raichle et al., 2001</span></a><span data-dcnode-id="8192"><span data-dcnode-id="8196"><span data-dcnode-id="8200" instrument_node="">). The high metabolic requirement is mainly due to dense concentrations of </span><a class="topic-link" data-dcnode-id="8198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/parvalbumin" title="Learn more about parvalbumin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8199" instrument_node="">parvalbumin</span></a><span data-dcnode-id="8197" instrument_node=""> GABA-ergic </span></span><a class="topic-link" data-dcnode-id="8194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/interneuron" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8195" instrument_node="">interneurons</span></a><span data-dcnode-id="8193" instrument_node=""> in the richly connected hubs of the paralimbic network (</span></span><a class="workspace-trigger" data-dcnode-id="8190" href="#bib0465" name="bbib0465"><span data-dcnode-id="8191" instrument_node="">Tomasi et al., 2013</span></a><span data-dcnode-id="8185"><span data-dcnode-id="8189" instrument_node="">) with their GABA-ergic synapses responsible for </span><a class="topic-link" data-dcnode-id="8187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/pyramidal-cell" title="Learn more about pyramidal cell from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8188" instrument_node="">pyramidal cell</span></a><span data-dcnode-id="8186" instrument_node=""> synchronization (</span></span><a class="workspace-trigger" data-dcnode-id="8183" href="#bib0170" name="bbib0170"><span data-dcnode-id="8184" instrument_node="">Kann, 2015</span></a><span data-dcnode-id="8182" instrument_node="">). Especially the fast gamma oscillations are highly energy-demanding and therefore susceptible to metabolic disruptions (</span><a class="workspace-trigger" data-dcnode-id="8180" href="#bib0165" name="bbib0165"><span data-dcnode-id="8181" instrument_node="">Kann et al., 2011</span></a><span data-dcnode-id="8175"><span data-dcnode-id="8179" instrument_node="">). This makes self-awareness and meta-cognition particularly vulnerable in deficient oxygen and glucose supply. Accordingly, conditions with cerebral hypoxia-ischemia often lead to a dysfunctional paralimbic network with associated failing conscious self-awareness. Such consequences are seen following neonatal hypoxia-ischemia with deficient </span><a class="topic-link" data-dcnode-id="8177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/autoregulation" title="Learn more about autoregulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8178" instrument_node="">autoregulation</span></a><span data-dcnode-id="8176" instrument_node=""> in the newborn infant, particularly in prematurity (</span></span><a class="workspace-trigger" data-dcnode-id="8173" href="#bib0315" name="bbib0315"><span data-dcnode-id="8174" instrument_node="">Lou, 1996</span></a><span data-dcnode-id="8172" instrument_node="">), following heart failure (</span><a class="workspace-trigger" data-dcnode-id="8170" href="#bib0215" name="bbib0215"><span data-dcnode-id="8171" instrument_node="">Kumar et al., 2011</span></a><span data-dcnode-id="8169" instrument_node="">), in the long-term cognitive outcome in teenage survivors of arrhythmic cardiac arrest (</span><a class="workspace-trigger" data-dcnode-id="8167" href="#bib0335" name="bbib0335"><span data-dcnode-id="8168" instrument_node="">Maryniak et al., 2008</span></a><span data-dcnode-id="8162"><span data-dcnode-id="8166" instrument_node="">), and in severe obstructive </span><a class="topic-link" data-dcnode-id="8164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/sleep-apnea" title="Learn more about sleep apnea from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8165" instrument_node="">sleep apnea</span></a><span data-dcnode-id="8163" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8160" href="#bib0410" name="bbib0410"><span data-dcnode-id="8161" instrument_node="">Peng et al., 2014</span></a><span data-dcnode-id="8159" instrument_node="">). In agreement with the theory of impaired oxygen homeostasis in pathogenesis of self-awareness, also </span><em data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">hyper</span></em><span data-dcnode-id="8156" instrument_node="">oxygenation may be culpable, for instance in schizophrenia (</span><a class="workspace-trigger" data-dcnode-id="8154" href="#bib0420" name="bbib0420"><span data-dcnode-id="8155" instrument_node="">Powell et al., 2012</span></a><span data-dcnode-id="8153" instrument_node="">). In the future, more detailed information may be expected from the newly developed mini-brain technique of stem cell grafting (</span><a class="workspace-trigger" data-dcnode-id="8151" href="#bib0495" name="bbib0495"><span data-dcnode-id="8152" instrument_node="">Willyard, 2015</span></a><span data-dcnode-id="8150" instrument_node="">).</span></p></section><section data-dcnode-id="8048" id="sec0025"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8144" id="sect0040"><span data-dcnode-id="8147" instrument_node="">5</span><span data-dcnode-id="8146" instrument_node="">. </span><span data-dcnode-id="8145" instrument_node="">Consequences for treatment and prevention</span></h2><p data-dcnode-id="8089" id="par0090"><span data-dcnode-id="8143" instrument_node="">The new understanding of the physiology and pathophysiology of self-awareness outlined in Section </span><a class="workspace-trigger" data-dcnode-id="8141" href="#sec0020" name="bsec0020"><span data-dcnode-id="8142" instrument_node="">4</span></a><span data-dcnode-id="8132"><span data-dcnode-id="8140" instrument_node=""> may lead to the application of unconventional therapeutical strategies to increase </span><a class="topic-link" data-dcnode-id="8138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/dopaminergic" title="Learn more about dopaminergic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8139" instrument_node="">dopaminergic</span></a><span data-dcnode-id="8133"><span data-dcnode-id="8137" instrument_node=""> activity and to improve paralimbic interaction. These strategies include relaxation meditation like yoga nidra or </span><a class="topic-link" data-dcnode-id="8135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/mindfulness-meditation" title="Learn more about mindfulness meditation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8136" instrument_node="">mindfulness meditation</span></a><span data-dcnode-id="8134" instrument_node="">, which in independent studies have been shown to increase dopaminergic tone and induce growth in paralimbic structures (</span></span></span><a class="workspace-trigger" data-dcnode-id="8130" href="#bib0200" name="bbib0200"><span data-dcnode-id="8131" instrument_node="">Kjaer et al., 2002a</span></a><span data-dcnode-id="8129" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8127" href="#bib0205" name="bbib0205"><span data-dcnode-id="8128" instrument_node="">Kjaer et al., 2002b</span></a><span data-dcnode-id="8126" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8124" href="#bib0460" name="bbib0460"><span data-dcnode-id="8125" instrument_node="">Tang et al., 2015</span></a><span data-dcnode-id="8119"><span data-dcnode-id="8123" instrument_node="">), and targeted training aiming at increasing the availability of </span><a class="topic-link" data-dcnode-id="8121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/dopamine-receptor" title="Learn more about dopaminergic receptors from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8122" instrument_node="">dopaminergic receptors</span></a><span data-dcnode-id="8120" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8117" href="#bib0340" name="bbib0340"><span data-dcnode-id="8118" instrument_node="">McNab et al., 2009</span></a><span data-dcnode-id="8116" instrument_node="">). Also improvement of sensory input may be an important venue to increase dopaminergic tone (</span><a class="workspace-trigger" data-dcnode-id="8114" href="#bib0070" name="bbib0070"><span data-dcnode-id="8115" instrument_node="">Dommett et al., 2005</span></a><span data-dcnode-id="8113" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8111" href="#bib0395" name="bbib0395"><span data-dcnode-id="8112" instrument_node="">Overton et al., 2014</span></a><span data-dcnode-id="8106"><span data-dcnode-id="8110" instrument_node="">) and induce growth in relevant structures. A prominent example of the latter is the induction of growth in the V2 region following </span><a class="topic-link" data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/cataracts" title="Learn more about cataract from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8109" instrument_node="">cataract</span></a><span data-dcnode-id="8107" instrument_node=""> surgery (</span></span><a class="workspace-trigger" data-dcnode-id="8104" href="#bib0435" name="bbib0435"><span data-dcnode-id="8105" instrument_node="">Rosenstand Lou et al., 2013</span></a><span data-dcnode-id="8103" instrument_node="">). In addition, frontal electromagnetic stimulation of paralimbic oscillations could have a role (</span><a class="workspace-trigger" data-dcnode-id="8101" href="#bib0480" name="bbib0480"><span data-dcnode-id="8102" instrument_node="">Voss et al., 2014</span></a><span data-dcnode-id="8100" instrument_node="">). Finally, further improvement in characterization of the paralimbic network and associated disorders may be obtained for instance with the mini-brain grafting technique (</span><a class="workspace-trigger" data-dcnode-id="8098" href="#bib0495" name="bbib0495"><span data-dcnode-id="8099" instrument_node="">Willyard, 2015</span></a><span data-dcnode-id="8093"><span data-dcnode-id="8097" instrument_node="">), and advances are to be foreseen for stem cell grafting therapy of </span><a class="topic-link" data-dcnode-id="8095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/interneuron" title="Learn more about interneuron from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8096" instrument_node="">interneuron</span></a><span data-dcnode-id="8094" instrument_node=""> function (</span></span><a class="workspace-trigger" data-dcnode-id="8091" href="#bib0455" name="bbib0455"><span data-dcnode-id="8092" instrument_node="">Tang et al., 2014</span></a><span data-dcnode-id="8090" instrument_node="">).</span></p><p data-dcnode-id="8049" id="par0095"><span data-dcnode-id="8088" instrument_node="">More generally, the new discoveries provide impetus to efforts to maintain oxygen homeostasis in neural tissue ranging from decreasing oxygen demand by cooling, for instance in distressed neonates (</span><a class="workspace-trigger" data-dcnode-id="8086" href="#bib0400" name="bbib0400"><span data-dcnode-id="8087" instrument_node="">Papile et al., 2014</span></a><span data-dcnode-id="8085" instrument_node="">) and assuring optimal capillary flow distribution (</span><a class="workspace-trigger" data-dcnode-id="8083" href="#bib0390" name="bbib0390"><span data-dcnode-id="8084" instrument_node="">Ostergaard et al., 2015</span></a><span data-dcnode-id="8062"><span data-dcnode-id="8066"><span data-dcnode-id="8074"><span data-dcnode-id="8082" instrument_node="">) to controlling </span><a class="topic-link" data-dcnode-id="8080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/cerebral-perfusion-pressure" title="Learn more about cerebral perfusion pressure from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8081" instrument_node="">cerebral perfusion pressure</span></a><span data-dcnode-id="8075"><span data-dcnode-id="8079" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="8077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/autoregulation" title="Learn more about autoregulation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8078" instrument_node="">autoregulation</span></a><span data-dcnode-id="8076" instrument_node=""> of </span></span></span><a class="topic-link" data-dcnode-id="8072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/cerebral-blood-flow" title="Learn more about cerebral blood flow from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8073" instrument_node="">cerebral blood flow</span></a><span data-dcnode-id="8067"><span data-dcnode-id="8071" instrument_node="">. The latter is particularly vulnerable in premature infants, which are prone to many developmental disorders related to deficient oxygen delivery to the brain, like </span><a class="topic-link" data-dcnode-id="8069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/cerebral-palsy" title="Learn more about cerebral palsy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8070" instrument_node="">cerebral palsy</span></a><span data-dcnode-id="8068" instrument_node="">, adhd and </span></span></span><a class="topic-link" data-dcnode-id="8064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/autism-spectrum-disorders" title="Learn more about autism spectrum disorder from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8065" instrument_node="">autism spectrum disorder</span></a><span data-dcnode-id="8063" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="8060" href="#bib0280" name="bbib0280"><span data-dcnode-id="8061" instrument_node="">Lou et al., 1979</span></a><span data-dcnode-id="8059" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8057" href="#bib0470" name="bbib0470"><span data-dcnode-id="8058" instrument_node="">Tsuji et al., 2000</span></a><span data-dcnode-id="8056" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8054" href="#bib0140" name="bbib0140"><span data-dcnode-id="8055" instrument_node="">Howlett et al., 2013</span></a><span data-dcnode-id="8053" instrument_node="">). Newly developed oximetry techniques may be helpful in this regard (</span><a class="workspace-trigger" data-dcnode-id="8051" href="#bib0145" name="bbib0145"><span data-dcnode-id="8052" instrument_node="">Hyttel-Sorensen et al., 2015</span></a><span data-dcnode-id="8050" instrument_node="">).</span></p></section></div><section data-dcnode-id="8039" id="ack0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8045" id="sect0045"><span data-dcnode-id="8046" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="8040" id="par0100"><span data-dcnode-id="8044" instrument_node="">The authors are grateful for financial support provided by the </span><span data-dcnode-id="8042" id="gs0005"><span data-dcnode-id="8043" instrument_node="">Lundbeck Foundation and MINDLab Investment Capital for University Research Fund Denmark</span></span><span data-dcnode-id="8041" instrument_node="">.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="8034"><button class="button button-anchor" data-dcnode-id="8035" type="button"><span class="button-text" data-dcnode-id="8036"><span data-dcnode-id="8037" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="8033"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="401" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="402" id="bibs0005"><dl class="references" data-dcnode-id="403" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="8028"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="8029" href="#bbib0005" id="ref-id-bib0005"><span data-dcnode-id="8030" instrument_node="">Amodio and Frith, 2006</span></a></dt><dd class="reference" data-dcno span data-dcnode-id="412" instrument_node="">-</span><span data-dcnode-id="410" instrument_node="">2811</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="405"><span data-dcnode-id="408" instrument_node=""></span><a aria-describedby="ref-id-sbref0505" class="link" data-dcnode-id="406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DDopamine-Induced%2520dissociation%2520of%2520BOLD%2520and%2520neural%2520activity%2520in%2520macaque%2520visual%2520cortex%26publication_year%3D2014%26author%3DD.%2520Zaldivar%26author%3DA.%2520Rauch%26author%3DK.%2520Whittingstall%26author%3DN.K.%2520Logothetis%26author%3DJ.%2520Goense" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="407" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="240" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="241"><div class="PageDivider" data-dcnode-id="400"></div><header data-dcnode-id="397" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Cited by (46)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="242"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="243"><ul data-dcnode-id="249"><li class="ListArticleItem" data-dcnode-id="355"><div class="sub-heading" data-dcnode-id="391"><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0278584621001573" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="395" id="citing-articles-article0-title"><span data-dcnode-id="396" instrument_node="">HIV infection is linked with reduced error-related default mode network suppression and poorer medication management abilities</span></h3></a><div class="article-source ellipsis" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">2021, Progress in Neuro-Psychopharmacology and Biological Psychiatry</span></div></div><div class="buttons" data-dcnode-id="385"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="386" type="button"><span class="button-link-text" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="387" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="388"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="356"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="357" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="358"><p data-dcnode-id="383" id="sp0055"><span data-dcnode-id="384" instrument_node="">Brain activity linked with error processing has rarely been examined among persons living with HIV (PLWH) despite importance for monitoring and modifying behaviors that could lead to adverse health outcomes (e.g., medication non-adherence, drug use, risky sexual practices). Given that cannabis (CB) use is prevalent among PLWH and impacts error processing, we assessed the influence of HIV serostatus and chronic CB use on error-related brain activity while also considering associated implications for everyday functioning and clinically-relevant disease management behaviors.</span></p><p data-dcnode-id="369" id="sp0060"><span data-dcnode-id="382" instrument_node="">A sample of 109 participants, stratified into four groups by HIV and CB (HIV+/CB+, </span><em data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">n</span></em><span data-dcnode-id="379" instrument_node="">&nbsp;=&nbsp;32; HIV+/CB−, </span><em data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">n</span></em><span data-dcnode-id="376" instrument_node="">&nbsp;=&nbsp;27; HIV−/CB+, </span><em data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">n</span></em><span data-dcnode-id="373" instrument_node="">&nbsp;=&nbsp;28; HIV−/CB−, </span><em data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">n</span></em><span data-dcnode-id="370" instrument_node="">&nbsp;=&nbsp;22), underwent fMRI scanning while completing a modified Go/NoGo paradigm called the Error Awareness Task (EAT). Participants also completed a battery of well-validated instruments including a subjective report of everyday cognitive failures and an objective measure of medication management abilities.</span></p><p data-dcnode-id="361" id="sp0065"><span data-dcnode-id="368" instrument_node="">Across all participants, we observed expected error-related anterior insula (aI) activation which correlated with better task performance (i.e., less errors) and, among HIV− participants, fewer self-reported cognitive failures. Regarding awareness, greater insula </span><em data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">activation</span></em><span data-dcnode-id="365" instrument_node=""> as well as greater posterior cingulate cortex (PCC) </span><em data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">deactivation</span></em><span data-dcnode-id="362" instrument_node=""> were notably linked with aware (vs. unaware) errors. Regarding group effects, unlike HIV− participants, PLWH displayed a lack of error-related deactivation in two default mode network (DMN) regions (i.e., PCC, medial prefrontal cortex [mPFC]). No CB main or interaction effects were detected. Across all participants, reduced error-related PCC deactivation correlated with reduced medication management abilities and PCC deactivation mediated the effect of HIV on such abilities. More lifetime CB use was linked with reduced error-related mPFC deactivation among HIV− participants and poorer medication management across CB users.</span></p><p data-dcnode-id="359" id="sp0070"><span data-dcnode-id="360" instrument_node="">These results demonstrate that insufficient error-related DMN suppression linked with HIV infection, as well as chronic CB use among HIV− participants, has real-world consequences for medication management behaviors. We speculate that insufficient DMN suppression may reflect an inability to disengage task irrelevant mental operations, ultimately hindering error monitoring and behavior modification.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="337"><div class="sub-heading" data-dcnode-id="349"><a data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1053811921009666" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="353" id="citing-articles-article1-title"><span data-dcnode-id="354" instrument_node="">Comparative connectomics of the primate social brain</span></h3></a><div class="article-source ellipsis" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">2021, NeuroImage</span></div></div><div class="buttons" data-dcnode-id="343"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="344" type="button"><span class="button-link-text" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="345" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="346"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="338"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="339" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="340"><p data-dcnode-id="341" id="spara008"><span data-dcnode-id="342" instrument_node="">Social interaction is thought to provide a selection pressure for human intelligence, yet little is known about its neurobiological basis and evolution throughout the primate lineage. Recent advances in neuroimaging have enabled whole brain investigation of brain structure, function, and connectivity in humans and non-human primates (NHPs), leading to a nascent field of comparative connectomics. However, linking social behavior to brain organization across the primates remains challenging. Here, we review the current understanding of the macroscale neural mechanisms of social behaviors from the viewpoint of system neuroscience. We first demonstrate an association between the number of cortical neurons and the size of social groups across primates, suggesting a link between neural information-processing capacity and social capabilities. Moreover, by capitalizing on recent advances in species-harmonized functional MRI, we demonstrate that portions of the mirror neuron system and default-mode networks, which are thought to be important for representation of the other's actions and sense of self, respectively, exhibit similarities in functional organization in macaque monkeys and humans, suggesting possible homologies. With respect to these two networks, we describe recent developments in the neurobiology of social perception, joint attention, personality and social complexity. Together, the Human Connectome Project (HCP)-style comparative neuroimaging, hyperscanning, behavioral, and other multi-modal investigations are expected to yield important insights into the evolutionary foundations of human social behavior.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="313"><div class="sub-heading" data-dcnode-id="331"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0303846721004820" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="335" id="citing-articles-article2-title"><span data-dcnode-id="336" instrument_node="">Cognitive awareness after treatment for high-grade glioma</span></h3></a><div class="article-source ellipsis" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">2021, Clinical Neurology and Neurosurgery</span></div></div><div class="buttons" data-dcnode-id="325"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="326" type="button"><span class="button-link-text" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="327" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="328"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="314"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="315" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="316"><p data-dcnode-id="323" id="sp0030"><span data-dcnode-id="324" instrument_node="">In patients with brain lesion, awareness of cognitive deficits is an important aspect of disease awareness. Glioblastoma (GBM) and anaplastic astrocytoma (AA) can cause cognitive deficits, but, to date, awareness of these deficits has not been documented. This study aimed to test cognitive awareness in these patients after the end of treatment.</span></p><p data-dcnode-id="321" id="sp0035"><span data-dcnode-id="322" instrument_node="">Fifty patients with GBM or AA were assessed using the Multiple Ability Self-Report Questionnaire (MASQ), State-Trait Anxiety Inventory (STAI), Self Rating Depression Scale (SRDS), and memory, attention, mental speed, abstract reasoning, and flexibility neuropsychological tests. Cognitive awareness was calculated as the concordance between the composite score of neuropsychological performance (PEC) and the total MASQ score. The controls were 48 healthy subjects. Analysis of variance and regression analysis compared subject groups and explored variables predicting perceived abilities.</span></p><p data-dcnode-id="319" id="sp0040"><span data-dcnode-id="320" instrument_node="">Patients with GBM or AA showed similar attention, memory, and executive deficits compared with controls. Cognitive awareness was fair/full in 64% of patients. In the entire patients group, the worst MASQ scores were associated with neuropsychological deficits, anxiety, depression, and glioma location in the right hemisphere . In patients with fair/full awareness, MASQ scores were related to affective status and neuropsychological performance, whereas, in those with scarce/no awareness, they were related only to affective status.</span></p><p data-dcnode-id="317" id="sp0045"><span data-dcnode-id="318" instrument_node="">After treatment, many patients with GBM or AA are aware of their cognitive deficits. Anxiety, depression, and right hemisphere tumour exacerbate the perceived difficulties. This neurocognitive approach expands the behavioural phenotypes of high-grade gliomas and may have therapeutic implications over the course of the disease.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="307"><a data-dcnode-id="310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0197458020302049" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="311" id="citing-articles-article3-title"><span data-dcnode-id="312" instrument_node="">What are the neural correlates of meta-cognition and anosognosia in Alzheimer's disease? A systematic review</span></h3></a><div class="article-source ellipsis" data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">2020, Neurobiology of Aging</span></div></div><div class="buttons" data-dcnode-id="301"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="302" type="button"><span class="button-link-text" data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="303" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="304"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="abspara0010"><span data-dcnode-id="300" instrument_node="">Awareness of one's own cognitive processes </span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">(metacognition)</span></em><span data-dcnode-id="297" instrument_node=""> or of one's own illness or deficits (</span><em data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">anosognosia</span></em><span data-dcnode-id="294" instrument_node="">) can be impaired in people with Alzheimer's disease (AD). The neural correlates of anosognosia within AD remain inconclusive. Understanding anosognosia is of importance because of its impact on carer burden and increased institutionalization. A systematic review of structural and functional neuroimaging studies was conducted to identify specific brain regions associated with anosognosia within AD. Thirty-two studies were included in the systematic review. Reduced gray matter density, cerebral blood flow, and hypometabolism in 8 key regions were significantly associated with increased anosognosia scores in people with AD. The most frequently associated regions were the inferior frontal gyrus, anterior cingulate cortex, and medial temporal lobe. Other key regions include the superior frontal gyrus, medial frontal gyrus, orbitofrontal cortex, posterior cingulate cortex, and the insula. Identifying brain regions associated with anosognosia can aid understanding and identification of anosognosia in people with AD and potentially facilitate improvements in care.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="268"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0166223620301259" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article4-title"><span data-dcnode-id="288" instrument_node="">Do Nicotinic Receptors Modulate High-Order Cognitive Processing?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2020, Trends in Neurosciences</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="269"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="270" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="271"><p data-dcnode-id="272" id="sp0040"><span data-dcnode-id="276" instrument_node="">Recent studies provided strong evidence that deficits in cholinergic signaling cause disorders of cognition and affect conscious processing. Technical advances that combine molecular approaches, </span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">in vivo</span></em><span data-dcnode-id="273" instrument_node=""> recordings in awake behaving animals, human brain imaging, and genetics have strengthened our understanding of the roles of nicotinic acetylcholine receptors (nAChRs) in the modulation of cognitive behavior and network dynamics. Here, we review the emergent role of nAChRs in high-order cognitive processes and discuss recent work implicating cholinergic circuits in cognitive control, including conscious processing.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0896627320300520" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="266" id="citing-articles-article5-title"><span data-dcnode-id="267" instrument_node="">Conscious Processing and the Global Neuronal Workspace Hypothesis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">2020, Neuron</span></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="abspara0010"><span data-dcnode-id="255" instrument_node="">We review the central tenets and neuroanatomical basis of the global neuronal workspace (GNW) hypothesis, which attempts to account for the main scientific observations regarding the elementary mechanisms of conscious processing in the human brain. The GNW hypothesis proposes that, in the conscious state, a non-linear network ignition associated with recurrent processing amplifies and sustains a neural representation, allowing the corresponding information to be globally accessed by local processors. We examine this hypothesis in light of recent data that contrast brain activity evoked by either conscious or non-conscious contents, as well as during conscious or non-conscious states, particularly general anesthesia. We also discuss the relationship between the intertwined concepts of conscious processing, attention, and working memory.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84964670774%26md5%3D29bb74b726f8824550a4b0932db54376" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="247" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="248"></path></svg><span class="button-alternative-text" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2016 The Authors. Published by Elsevier Ltd.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="128"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="140"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="229" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="230" type="button"><span class="button-link-text" data-dcnode-id="233"><h2 class="section-title u-h4" data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="231" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="232"></path></svg></button></header><d
