</span><meta content="Can cognitive neuroscience contribute to cultural sociology? We argue that it can, but to profit from such contributions requires developing coherent positions at the level of ontology and coherent epistemological views concerning interfield relations in science. In this paper, we carve out a coherent position that makes sense for cultural sociology based on Sperber’s “infra-individualist” and Clark’s “extended cognition” arguments. More substantively, we take on three canonical topics in cultural sociology: language, intersubjectivity, and associational links between elements, showing that the cognitive neurosciences can make conceptual and empirical contributions to the thinking of cultural sociologists in these areas. We conclude by outlining the opportunities for further development of work at the intersection of cultural sociology and the cognitive neurosciences." data-dcnode-id="7433" name="dc.description"><span data-dcnode-id="7432" instrument_node="">

</span><meta content="What can cognitive neuroscience do for cultural sociology? - American Journal of Cultural Sociology" data-dcnode-id="6929" property="og:title"><span data-dcnode-id="6928" instrument_node="">
</span><meta content="Can cognitive neuroscience contribute to cultural sociology? We argue that it can, but to profit from such contributions requires developing coherent positions at the level of ontology and coherent epistemological views concerning interfield relations in science. In this paper, we carve out a coherent position that makes sense for cultural sociology based on Sperber’s “infra-individualist” and Clark’s “extended cognition” arguments. More substantively, we take on three canonical topics in cultural sociology: language, intersubjectivity, and associational links between elements, showing that the cognitive neurosciences can make conceptual and empirical contributions to the thinking of cultural sociologists in these areas. We conclude by outlining the opportunities for further development of work at the intersection of cultural sociology and the cognitive neurosciences." data-dcnode-id="6927" property="og:description"><span data-dcnode-id="6926" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="6469" data-gtm-vis-first-on-screen-50443292_562="1854" data-gtm-vis-first-on-screen-50443292_563="1855" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1853" data-gtm-vis-recent-on-screen-50443292_563="1855" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="6470" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6474" id="Abs1"><span data-dcnode-id="6475" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="6471" id="Abs1-content"><p data-dcnode-id="6472"><span data-dcnode-id="6473" instrument_node="">Can cognitive neuroscience contribute to cultural sociology? We argue that it can, but to profit from such contributions requires developing coherent positions at the level of ontology and coherent epistemological views concerning interfield relations in science. In this paper, we carve out a coherent position that makes sense for cultural sociology based on Sperber’s “infra-individualist” and Clark’s “extended cognition” arguments. More substantively, we take on three canonical topics in cultural sociology: language, intersubjectivity, and associational links between elements, showing that the cognitive neurosciences can make conceptual and empirical contributions to the thinking of cultural sociologists in these areas. We conclude by outlining the opportunities for further development of work at the intersection of cultural sociology and the cognitive neurosciences.</span></p></div></div></section><span data-dcnode-id="6468" instrument_node="">
</span><section data-dcnode-id="5765" data-gtm-vis-first-on-screen-50443292_562="1854" data-gtm-vis-first-on-screen-50443292_563="1856" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1854" data-gtm-vis-recent-on-screen-50443292_563="1856" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Can cultural sociology play with neuroscience?"><div class="c-article-section" data-dcnode-id="5766" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6466" id="Sec1"><span data-dcnode-id="6467" instrument_node="">Can cultural sociology play with neuroscience?</span></h2><div class="c-article-section__content" data-dcnode-id="5767" id="Sec1-content"><p data-dcnode-id="6446"><span data-dcnode-id="6465" instrument_node="">Rather than being a new issue spurred by recent theoretical (e.g., Damasio </span><a aria-label="Reference 1994" data-dcnode-id="6463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d251514731e469" title="Damasio, A.R. 1994. Descartes’ Error: Emotion, Rationality and the Human Brain. New York: Putnam."><span data-dcnode-id="6464" instrument_node="">1994</span></a><span data-dcnode-id="6462" instrument_node="">, </span><a aria-label="Reference 1999" data-dcnode-id="6460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d251514731e472" title="Damasio, A.R. 1999. The Feeling of What Happens: Body and Emotion in the Making of Consciousness. Harvest Book: Harcourt Brace."><span data-dcnode-id="6461" instrument_node="">1999</span></a><span data-dcnode-id="6459" instrument_node="">; Edelman </span><a aria-label="Reference 1992" data-dcnode-id="6457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d251514731e475" title="Edelman, G.M. 1992. Bright Air, Brilliant Fire: On the Matter of the Mind. New York: Basic Books."><span data-dcnode-id="6458" instrument_node="">1992</span></a><span data-dcnode-id="6456" instrument_node="">) or technological (e.g., fMRI studies) developments, whether there can (or should) be a relationship between sociology and cognitive neuroscience has been central to the definition, demarcation, and development of the sociological project since its inception. This has been especially the case in the French, British, and American disciplinary offshoots given their more explicit commitment to naturalism vis-a-vis their German counterpart (Turner </span><a aria-label="Reference 2007" data-dcnode-id="6454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR173" id="ref-link-section-d251514731e478" title="Turner, S.P. 2007. Social Theory as a Cognitive Neuroscience. European Journal of Social Theory 10 (3): 357–374."><span data-dcnode-id="6455" instrument_node="">2007</span></a><span data-dcnode-id="6453" instrument_node="">). Most of the founding figures of French and American sociology, as well as the American pragmatists and institutional economists, grappled with issues of relevance to the interface between sociology and cognitive neuroscience (Boudon </span><a aria-label="Reference 2011" data-dcnode-id="6451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d251514731e481" title="Boudon, R. 2011. Une approche cognitive de la rationalité. Idées économiques et sociales 165 (3): 24–36."><span data-dcnode-id="6452" instrument_node="">2011</span></a><span data-dcnode-id="6450" instrument_node="">; Clément </span><a aria-label="Reference 2011" data-dcnode-id="6448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d251514731e485" title="Clément, F. 2011. L’esprit de la sociologie: les sociolgues et le fonctionnement de l’esprit humain. In La Sociologie Cognitive, ed. F. Clément and L. Kaufmann, 101–133. Paris: Éditions de la Maison des Sciences de l’Homme."><span data-dcnode-id="6449" instrument_node="">2011</span></a><span data-dcnode-id="6447" instrument_node="">).</span></p><p data-dcnode-id="6423"><span data-dcnode-id="6445" instrument_node="">For instance, throughout their careers, Durkheim and Mauss were interested in the relationship between the social and the cognitive (Ignatow </span><a aria-label="Reference 2012" data-dcnode-id="6443" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d251514731e491" title="Ignatow, G. 2012. Mauss’s Lectures to Psychologists: A Case for Holistic Sociology. Journal of Classical Sociology 12 (1): 3–21."><span data-dcnode-id="6444" instrument_node="">2012</span></a><span data-dcnode-id="6442" instrument_node="">; Lizardo </span><a aria-label="Reference 2009b" data-dcnode-id="6440" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR96" id="ref-link-section-d251514731e494" title="Lizardo, O. 2009b. Taking Cognitive Dualism Seriously: Revisiting the Durkheim-Spencer Debate on the Rise of Individualism. Sociological Perspectives 52 (4): 533–555."><span data-dcnode-id="6441" instrument_node="">2009b</span></a><span data-dcnode-id="6439" instrument_node="">). Tarde used insights from psychology to understand how beliefs, desires, and practices propagated in society (Turner </span><a aria-label="Reference 2007" data-dcnode-id="6437" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR173" id="ref-link-section-d251514731e497" title="Turner, S.P. 2007. Social Theory as a Cognitive Neuroscience. European Journal of Social Theory 10 (3): 357–374."><span data-dcnode-id="6438" instrument_node="">2007</span></a><span data-dcnode-id="6436" instrument_node="">). Mead developed an account of the origins of significant symbols with a firm grounding in developmental and comparative psychology and Darwinian naturalism (Mead </span><a aria-label="Reference 1922" data-dcnode-id="6434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d251514731e500" title="Mead, G.H. 1922. A Behavioristic Account of the Significant Symbol. The Journal of Philosophy 19 (6): 157–163."><span data-dcnode-id="6435" instrument_node="">1922</span></a><span data-dcnode-id="6433" instrument_node="">). Veblen grappled with the implausible psychological assumptions of neoclassical economists (Veblen </span><a aria-label="Reference 1898" data-dcnode-id="6431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR177" id="ref-link-section-d251514731e503" title="Veblen, T. 1898. The Instinct of Workmanship and the Irksomeness of Labor. The American Journal of Sociology 4 (2): 187–201."><span data-dcnode-id="6432" instrument_node="">1898</span></a><span data-dcnode-id="6430" instrument_node="">). Using the concept of “the double consciousness,” Du Bois (</span><a aria-label="Reference 1897" data-dcnode-id="6428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d251514731e507" title="Du Bois, W.E.B. 1897. Strivings of the Negro People. The Atlantic, 1 August. 
https://www.theatlantic.com/magazine/archive/1897/08/strivings-of-the-negro-people/305446/

. Accessed 1 Nov 2018."><span data-dcnode-id="6429" instrument_node="">1897</span></a><span data-dcnode-id="6427" instrument_node="">) famously articulated the psychological consequences of “being a problem.” Pareto was interested in the affective (non-logical) influences in human action, and even Weber considered sociology to be predicated upon investigations of actors’ subjective meanings and the assignment thereof to other components of action (Turner and Factor </span><a aria-label="Reference 1994" data-dcnode-id="6425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR174" id="ref-link-section-d251514731e510" title="Turner, S.P., and R.A. Factor. 1994. Max Weber: The Lawyer as Social Thinker. Milton Park: Taylor &amp; Francis."><span data-dcnode-id="6426" instrument_node="">1994</span></a><span data-dcnode-id="6424" instrument_node="">, pp. 48–67).</span></p><p data-dcnode-id="6403"><span data-dcnode-id="6422" instrument_node="">What is unique to the most recent iteration of the cognitive neuroscience/sociology conversation is that our version of this debate is being spurred by theoretical and empirical developments within a particular subfield in sociology (at least in the U.S.) under the auspices of cultural sociology or cultural theory broadly conceived (Lizardo </span><a aria-label="Reference 2015" data-dcnode-id="6420" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR98" id="ref-link-section-d251514731e516" title="Lizardo, O. 2015. Culture, Cognition and Embodiment. International Encyclopedia of the Social &amp; Behavioral Sciences, 576–581. New York: Elsevier."><span data-dcnode-id="6421" instrument_node="">2015</span></a><span data-dcnode-id="6419" instrument_node="">, </span><a aria-label="Reference 2016b" data-dcnode-id="6417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d251514731e519" title="Lizardo, O. 2016b. Cultural theory. In Handbook of Contemporary Sociological Theory, ed. S. Abrutyn, 99–120. Switzerland: Springer."><span data-dcnode-id="6418" instrument_node="">2016b</span></a><span data-dcnode-id="6416" instrument_node="">). Within this umbrella, a group of scholars with an explicit interest in culture and cognition studies has tackled fundamental theoretical issues in a way open to integrating neuroscientific insights (Cerulo </span><a aria-label="Reference 2010" data-dcnode-id="6414" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d251514731e522" title="Cerulo, K.A. 2010. Mining the Intersections of Cognitive Sociology and Neuroscience. Poetics 38 (2): 115–132."><span data-dcnode-id="6415" instrument_node="">2010</span></a><span data-dcnode-id="6413" instrument_node="">; Ignatow </span><a aria-label="Reference 2007" data-dcnode-id="6411" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d251514731e525" title="Ignatow, G. 2007. Theories of Embodied Knowledge: New Directions for Cultural and Cognitive Sociology? Journal for the Theory of Social Behaviour 37 (2): 115–135."><span data-dcnode-id="6412" instrument_node="">2007</span></a><span data-dcnode-id="6410" instrument_node="">; Pitts-Taylor </span><a aria-label="Reference 2003" data-dcnode-id="6408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d251514731e528" title="Pitts-Taylor, V. 2003. In the Flesh: The Cultural Politics of Body Modification. New Yrok: Springer."><span data-dcnode-id="6409" instrument_node="">2003</span></a><span data-dcnode-id="6407" instrument_node="">; Vaisey </span><a aria-label="Reference 2009" data-dcnode-id="6405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR175" id="ref-link-section-d251514731e532" title="Vaisey, S. 2009. Motivation and Justification: A Dual-Process Model of Culture in Action. The American Journal of Sociology 114 (6): 1675–1715."><span data-dcnode-id="6406" instrument_node="">2009</span></a><span data-dcnode-id="6404" instrument_node="">).</span></p><p data-dcnode-id="6374"><span data-dcnode-id="6402" instrument_node="">In cognitive science, the overall trend has been towards a bridging of the divide traditionally separating </span><i data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">psychological</span></i><span data-dcnode-id="6399" instrument_node=""> and </span><i data-dcnode-id="6397"><span data-dcnode-id="6398" instrument_node="">neuroscientific</span></i><span data-dcnode-id="6396" instrument_node=""> models of cognitive phenomena (e.g., Clark </span><a aria-label="Reference 1997" data-dcnode-id="6394" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d251514731e544" title="Clark, A. 1997. Being There: Putting Brain, Body, and World Together Again. Cambridge: MIT Press."><span data-dcnode-id="6395" instrument_node="">1997</span></a><span data-dcnode-id="6393" instrument_node="">; Damasio </span><a aria-label="Reference 1999" data-dcnode-id="6391" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d251514731e547" title="Damasio, A.R. 1999. The Feeling of What Happens: Body and Emotion in the Making of Consciousness. Harvest Book: Harcourt Brace."><span data-dcnode-id="6392" instrument_node="">1999</span></a><span data-dcnode-id="6390" instrument_node="">; Edelman </span><a aria-label="Reference 1992" data-dcnode-id="6388" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d251514731e550" title="Edelman, G.M. 1992. Bright Air, Brilliant Fire: On the Matter of the Mind. New York: Basic Books."><span data-dcnode-id="6389" instrument_node="">1992</span></a><span data-dcnode-id="6387" instrument_node="">; Thagard </span><a aria-label="Reference 2008b" data-dcnode-id="6385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR168" id="ref-link-section-d251514731e554" title="Thagard, P. 2008b. How Cognition Meets Emotion: Beliefs, Desires, and Feelings as Neural Activity. In Epistemology and Emotions, ed. D. Kuenzle, G. Brun, and U. Doguoglu, 167–184. Aldershot: Ashgate."><span data-dcnode-id="6386" instrument_node="">2008b</span></a><span data-dcnode-id="6384" instrument_node="">). While the former make use of a mentalistic vocabulary of functions, the latter focuses on “mechanismic” or structural explanations aimed at clarifying the </span><i data-dcnode-id="6382"><span data-dcnode-id="6383" instrument_node="">implementation</span></i><span data-dcnode-id="6381" instrument_node=""> of mental functions on the “wetware” of the brain (Foster </span><a aria-label="Reference 2018" data-dcnode-id="6379" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d251514731e560" title="Foster, J.G. 2018. Culture and Computation: Steps to a Probably Approximately Correct Theory of Culture. Poetics 68: 144–154."><span data-dcnode-id="6380" instrument_node="">2018</span></a><span data-dcnode-id="6378" instrument_node="">). Today, the interfield of cognitive neuroscience is the trading zone within which psychological research meets neuroscience; the explicit goal is the development of unified theories—in terms of underlying vocabulary, structures, and processes—of the mind-brain, which would supplement, and at some point replace, explanation based on psychological descriptions of cognitive phenomena by grounding these in physical (i.e., realizable) neural mechanisms (Machamer and Sytsma </span><a aria-label="Reference 2007" data-dcnode-id="6376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d251514731e563" title="Machamer, P., and J. Sytsma. 2007. Neuroscience and Theoretical Psychology: What’s to Worry About? Theory &amp; Psychology 17 (2): 199–216."><span data-dcnode-id="6377" instrument_node="">2007</span></a><span data-dcnode-id="6375" instrument_node="">).</span></p><p data-dcnode-id="6364"><span data-dcnode-id="6373" instrument_node="">This possibility of a unified cognitive neuroscience is not philosophically neutral. Cultural sociologists interested in whether there can be a productive interdisciplinary relationship here—or even considering the possibility that insights from cognitive neuroscience may inform cultural sociology—need to clarify what the relevant philosophical commitments are. As researchers interested in substantive matters, cultural sociologists may be skeptical as to what is gained from bouts of philosophical reflection or from making what are usually implicit commitments more explicit. From our perspective, these reflexive considerations are important because they allow us to find out which positions are compatible with a productive exchange between the two fields (Lizardo </span><a aria-label="Reference 2014" data-dcnode-id="6371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR97" id="ref-link-section-d251514731e570" title="Lizardo, O. 2014. Beyond the Comtean Schema: The Sociology of Culture and Cognition Versus Cognitive Social Science. Sociological Forum 29 (4): 983–989."><span data-dcnode-id="6372" instrument_node="">2014</span></a><span data-dcnode-id="6370" instrument_node="">), thus making acceptance (or rejection) of the relevant ideas a principled affair. We begin by briefly reviewing the philosophical presuppositions at the basis of the idea that there can be a unified science of the psychological (cognitive) and the neural, and comment on which ontological and epistemic stances in cultural sociology we see as compatible with this project.</span><sup data-dcnode-id="6365"><a data-dcnode-id="6366" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">Footnote </span></span><span data-dcnode-id="6367" instrument_node="">1</span></a></sup></p><h3 class="c-article__sub-heading" data-dcnode-id="6362" id="Sec2"><span data-dcnode-id="6363" instrument_node="">Philosophical stances in the cognitive neuroscience project</span></h3><p data-dcnode-id="6351"><span data-dcnode-id="6361" instrument_node="">The primary philosophical position at the basis of the cognitive-neuroscientific project is the </span><i data-dcnode-id="6359"><span data-dcnode-id="6360" instrument_node="">psychoneural identity hypothesis</span></i><span data-dcnode-id="6358" instrument_node=""> (or mind/brain identity theory): This entails that states and processes potentially describable in psychological language are (type) identical to states and processes describable in neural language (Sperber </span><a aria-label="Reference 1987" data-dcnode-id="6356" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR193" id="ref-link-section-d251514731e592" title="Sperber, D. 1987. Les sciences cognitives, les sciences sociales et le matérialisme. Le Débat 47 (5):103–115."><span data-dcnode-id="6357" instrument_node="">1987</span></a><span data-dcnode-id="6355" instrument_node="">, p. 106). Note that this goes beyond quasi-dualistic talk of pure correlations or “supervenience” relations between the neural and the mental. In this respect, physicalism is the main premise of a unified cognitive neuroscience. This position rests on the claim both mind and brain belong to the same ontological (physical) register. This view, ipso facto, entails a rejection of </span><i data-dcnode-id="6353"><span data-dcnode-id="6354" instrument_node="">dualism</span></i><span data-dcnode-id="6352" instrument_node="">, which is the postulation of a specifically “mental” ontological realm separate from the physical. Methodologically, this position disallows any form of explanation of mental phenomena that has to rely on “spooky” processes or entities lacking an ultimate (even if yet to be specified) grounding on physical mechanisms.</span></p><p data-dcnode-id="6337"><span data-dcnode-id="6350" instrument_node="">For some cultural sociologists, allegiance to physicalism may sound stronger than it is, as it may bring to mind the specter of </span><i data-dcnode-id="6348"><span data-dcnode-id="6349" instrument_node="">materialism</span></i><span data-dcnode-id="6347" instrument_node="">—an anti-culturalist position which the field has fought hard to vanquish (e.g., Alexander </span><a aria-label="Reference 1992b" data-dcnode-id="6345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d251514731e604" title="Alexander, J.C. 1992b. The Promise of a Cultural Sociology. Theory of Culture, 293–323. Berkeley: University of California Press."><span data-dcnode-id="6346" instrument_node="">1992b</span></a><span data-dcnode-id="6344" instrument_node="">, </span><a aria-label="Reference 2005" data-dcnode-id="6342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d251514731e607" title="Alexander, J.C. 2005. Why Cultural Sociology Is Not ‘Idealist’ A Reply to McLennan. Theory, Culture &amp; Society 22 (6): 19–29."><span data-dcnode-id="6343" instrument_node="">2005</span></a><span data-dcnode-id="6341" instrument_node="">). Modern physicalism has little to do with the naïve forms of materialism claiming to make cultural explanation superfluous. Instead, a modern physicalist stance is perfectly compatible with a consideration of a robust role for emergent socio-cultural processes in interaction with cognitive and neuroscientific mechanisms (McCauley and Bechtel </span><a aria-label="Reference 2001" data-dcnode-id="6339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d251514731e610" title="McCauley, R.N., and W. Bechtel. 2001. Explanatory Pluralism and Heuristic Identity Theory. Theory &amp; Psychology 11 (6): 736–760."><span data-dcnode-id="6340" instrument_node="">2001</span></a><span data-dcnode-id="6338" instrument_node="">).</span></p><p data-dcnode-id="6323"><span data-dcnode-id="6336" instrument_node="">The only commitment required by physicalism is allegiance to some form of </span><i data-dcnode-id="6334"><span data-dcnode-id="6335" instrument_node="">naturalism</span></i><span data-dcnode-id="6333" instrument_node=""> (Sperber </span><a aria-label="Reference 1996" data-dcnode-id="6331" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d251514731e619" title="Sperber, D. 1996. Explaining Culture: A Naturalistic Approach. New York: Wiley."><span data-dcnode-id="6332" instrument_node="">1996</span></a><span data-dcnode-id="6330" instrument_node="">, pp. 4–6). In other words, explanations in the physical, biological, cognitive, and social sciences should strive to be co-extensive and draw on the same underlying ontology (Ignatow </span><a aria-label="Reference 2014" data-dcnode-id="6328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d251514731e622" title="Ignatow, G. 2014. Ontology and Method in Cognitive Sociology. Sociological Forum 29 (4): 990–994."><span data-dcnode-id="6329" instrument_node="">2014</span></a><span data-dcnode-id="6327" instrument_node="">). This stance prevents making explanatory recourse to entities and processes lacking a plausible grounding on the phenomena described in the natural sciences. In this respect, naturalism is incompatible with the claim that “the sciences of culture” or the “human sciences” deal with entities having no counterpart in the natural or physical world or that are not realizable by natural physical entities (Kaidesoja </span><a aria-label="Reference 2013" data-dcnode-id="6325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d251514731e625" title="Kaidesoja, T. 2013. Naturalizing Critical Realist Social Ontology. Milton Park: Taylor &amp; Francis."><span data-dcnode-id="6326" instrument_node="">2013</span></a><span data-dcnode-id="6324" instrument_node="">, pp. 138–77).</span></p><p data-dcnode-id="6297"><span data-dcnode-id="6322" instrument_node="">One thing that naturalism and physicalism do </span><i data-dcnode-id="6320"><span data-dcnode-id="6321" instrument_node="">not</span></i><span data-dcnode-id="6319" instrument_node=""> entail is </span><i data-dcnode-id="6317"><span data-dcnode-id="6318" instrument_node="">reductionism</span></i><span data-dcnode-id="6316" instrument_node="">; this is the a priori mandate to substitute talk of the properties of one set of entities (e.g., individuals) with talk about the properties of some other set entities (e.g., organizations, neighborhoods) located at a level of analysis presumed to be explanatorily privileged (e.g., the social-structural) (DiTomaso </span><a aria-label="Reference 1982" data-dcnode-id="6314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d251514731e637" title="DiTomaso, N. 1982. ‘Sociological Reductionism’ From Parsons to Althusser: Linking Action and Structure in Social Theory. American Sociological Review 14–28."><span data-dcnode-id="6315" instrument_node="">1982</span></a><span data-dcnode-id="6313" instrument_node="">). As it relates to this paper, this would entail the erroneous claim that we must describe socio-cultural properties and phenomena exclusively via the detailed properties and interactions of their “lowest” level realizers (e.g., individuals, brains, or neurons). A key roadblock for coherent dialogue along the sociology/neuroscience boundary seems to be the outdated presumption that neuroscience and related disciplines are committed to this kind of bottom-up reductionism (e.g., Duster </span><a aria-label="Reference 2006" data-dcnode-id="6311" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d251514731e640" title="Duster, T. 2006. Comparative Perspectives and Competing Explanations: Taking on the Newly Configured Reductionist Challenge to Sociology. American Sociological Review 71 (1): 1–15."><span data-dcnode-id="6312" instrument_node="">2006</span></a><span data-dcnode-id="6310" instrument_node="">; Sawyer </span><a aria-label="Reference 2002" data-dcnode-id="6308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR140" id="ref-link-section-d251514731e643" title="Sawyer, R.K. 2002. Durkheim’s Dilemma: Toward a Sociology of Emergence. Sociological Theory 20 (2): 227–247."><span data-dcnode-id="6309" instrument_node="">2002</span></a><span data-dcnode-id="6307" instrument_node="">, pp. 228–29). In sociology, this view is likely a holdover from the “Parsons Pact” (Stoltz </span><a aria-label="Reference 2018" data-dcnode-id="6305" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR157" id="ref-link-section-d251514731e647" title="Stoltz, D.S. 2018. Relations and Relationships: Clarifying the Terms of the ‘New’ Relational Economic Sociology. The American Sociologist 49 (1): 64–79."><span data-dcnode-id="6306" instrument_node="">2018</span></a><span data-dcnode-id="6304" instrument_node="">, pp. 64–66) with adjacent disciplines (e.g., Parsons </span><a aria-label="Reference 1991" data-dcnode-id="6302" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d251514731e650" title="Parsons, T. 1991. The Early Essays. Chicago: University of Chicago Press."><span data-dcnode-id="6303" instrument_node="">1991</span></a><span data-dcnode-id="6301" instrument_node="">, pp. 153–164). But this view is mistaken as a description of the actual commitments and scientific practices of cognitive neuroscientists (Meloni </span><a aria-label="Reference 2014" data-dcnode-id="6299" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d251514731e653" title="Meloni, M. 2014. Biology Without Biologism: Social Theory in a Postgenomic Age. Sociology 48 (4): 731–746."><span data-dcnode-id="6300" instrument_node="">2014</span></a><span data-dcnode-id="6298" instrument_node="">).</span></p><p data-dcnode-id="6274"><span data-dcnode-id="6296" instrument_node="">Instead, physicalism is compatible with both emergence and the postulation of phenomena at multiple nested levels. In neuroscience, these may include multiple brain systems acting in concert to produce a given experience or behavior, brain-behavior-environment “loops” accounting for some kinds of cognitive performance in an “extended cognition” framework (Clark </span><a aria-label="Reference 1997" data-dcnode-id="6294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d251514731e660" title="Clark, A. 1997. Being There: Putting Brain, Body, and World Together Again. Cambridge: MIT Press."><span data-dcnode-id="6295" instrument_node="">1997</span></a><span data-dcnode-id="6293" instrument_node="">). In this last respect, cognitive neuroscientists routinely make explanatory recourse to “extracranial” processes and mechanisms including the body and its effectors, other persons, artifacts, and material and social “scaffoldings” provided in context for the realization and execution of complex sociocognitive tasks (Clark </span><a aria-label="Reference 1997" data-dcnode-id="6291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d251514731e663" title="Clark, A. 1997. Being There: Putting Brain, Body, and World Together Again. Cambridge: MIT Press."><span data-dcnode-id="6292" instrument_node="">1997</span></a><span data-dcnode-id="6290" instrument_node="">; Lizardo and Strand </span><a aria-label="Reference 2010" data-dcnode-id="6288" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d251514731e666" title="Lizardo, O., and M. Strand. 2010. Skills, Toolkits, Contexts and Institutions: Clarifying the Relationship Between Different Approaches to Cognition in Cultural Sociology. Poetics 38 (2): 205–228."><span data-dcnode-id="6289" instrument_node="">2010</span></a><span data-dcnode-id="6287" instrument_node="">; Wood et al. </span><a aria-label="Reference 2018" data-dcnode-id="6285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR191" id="ref-link-section-d251514731e669" title="Wood, M.L., D.S. Stoltz, J. Van Ness, and M.A. Taylor. 2018. Schemas and Frames. Sociological Theory 36 (3): 244–261."><span data-dcnode-id="6286" instrument_node="">2018</span></a><span data-dcnode-id="6284" instrument_node="">). These last include tasks that may require the distributed cooperation of multiple cognitive systems acting in concert (Hutchins </span><a aria-label="Reference 1995" data-dcnode-id="6282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d251514731e672" title="Hutchins, E. 1995. Cognition in the Wild. Cambridge: MIT Press."><span data-dcnode-id="6283" instrument_node="">1995</span></a><span data-dcnode-id="6281" instrument_node="">, pp. 225–228). In this respect, a lot of the phenomena of interest to both cognitive neuroscientists and cultural sociologists may be thought to partake of what Wilson (</span><a aria-label="Reference 2004b" data-dcnode-id="6279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR188" id="ref-link-section-d251514731e676" title="Wilson, R.A. 2004b. Realization: Metaphysics, Mind, and Science. Philosophy of Science 71 (5): 985–996."><span data-dcnode-id="6280" instrument_node="">2004b</span></a><span data-dcnode-id="6278" instrument_node="">, p. 989) has referred to as </span><i data-dcnode-id="6276"><span data-dcnode-id="6277" instrument_node="">wide realization</span></i><span data-dcnode-id="6275" instrument_node="">: Namely, the idea that a complex interplay of both brain-bound and extracranial processes contribute to generate the core socio-cultural phenomena, in particular, those dependent on social interaction, material artifacts, and the intersubjective coupling of multiple agents.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="6272" id="Sec3"><span data-dcnode-id="6273" instrument_node="">The relevance of cognitive neuroscience for cultural sociology</span></h3><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="6270" id="Sec4"><span data-dcnode-id="6271" instrument_node="">Interfield dependencies</span></h4><p data-dcnode-id="6259"><span data-dcnode-id="6269" instrument_node="">We allude to these philosophical issues as a way to signal that any answer to whether cognitive neuroscience is relevant for cultural sociology entails taking coherent positions at the level of ontology and concerning the proper set of relations between different scientific fields (Thagard </span><a aria-label="Reference 2008a" data-dcnode-id="6267" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR167" id="ref-link-section-d251514731e694" title="Thagard, P. 2008a. Hot Thought: Mechanisms and Applications of Emotional Cognition. Cambridge: MIT Press."><span data-dcnode-id="6268" instrument_node="">2008a</span></a><span data-dcnode-id="6266" instrument_node="">, p. 7–8). This requirement harks back to fundamental issues regarding the relationship between sociology and adjacent disciplines such as psychology, issues that have plagued the field since its inception (Durkheim </span><a aria-label="Reference 1982" data-dcnode-id="6264" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d251514731e697" title="Durkheim, E. 1982. Rules of Sociological Method. New York: The Free Press."><span data-dcnode-id="6265" instrument_node="">1982</span></a><span data-dcnode-id="6263" instrument_node="">; Parsons </span><a aria-label="Reference 1937" data-dcnode-id="6261" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d251514731e700" title="Parsons, T. 1937. The Structure of Social Action. New York: Free Press."><span data-dcnode-id="6262" instrument_node="">1937</span></a><span data-dcnode-id="6260" instrument_node="">).</span></p><p data-dcnode-id="6245"><span data-dcnode-id="6258" instrument_node="">For instance, any consideration of the relevance of cognitive neuroscience for cultural sociology would be moot if the analyst holds the “autonomist” position that sociology is independent from any “lower-level” analysis corresponding to individuals, persons, interaction, or minds (Black </span><a aria-label="Reference 2000" data-dcnode-id="6256" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d251514731e706" title="Black, D. 2000. Dreams of Pure Sociology. Sociological Theory 18 (3): 343–367."><span data-dcnode-id="6257" instrument_node="">2000</span></a><span data-dcnode-id="6255" instrument_node="">). Instead, for the conversation to begin, the analyst must presuppose </span><i data-dcnode-id="6253"><span data-dcnode-id="6254" instrument_node="">interdependence</span></i><span data-dcnode-id="6252" instrument_node=""> (or intersection) between cultural sociology and cognitive neuroscience (Cerulo </span><a aria-label="Reference 2010" data-dcnode-id="6250" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d251514731e712" title="Cerulo, K.A. 2010. Mining the Intersections of Cognitive Sociology and Neuroscience. Poetics 38 (2): 115–132."><span data-dcnode-id="6251" instrument_node="">2010</span></a><span data-dcnode-id="6249" instrument_node="">; Patterson </span><a aria-label="Reference 2014" data-dcnode-id="6247" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d251514731e715" title="Patterson, O. 2014. Making Sense of Culture. Annual Review of Sociology 40 (1): 1–30."><span data-dcnode-id="6248" instrument_node="">2014</span></a><span data-dcnode-id="6246" instrument_node="">). Whether this interdependence is asymmetrical (with insights flowing from one discipline to the other) or symmetrical (with sociological work informing research on cognition and vice versa) is an important consideration but not as relevant as the first.</span></p><p data-dcnode-id="6231"><span data-dcnode-id="6244" instrument_node="">Our view is research and theory in cultural sociology depends on the results from cognitive neuroscience, but only in a moderately strong way. In principle (and in practice) it is possible to be an expert in cultural sociology while paying no regard to fundamental principles regarding how cognitive phenomena are realized in the brain. However, our contention is that even when claiming to research or theorize at a purely cultural level of analysis, scholars cannot get very far without making minimal assumptions about how human agents end up having ideas about the world or developing categories, memories, habits, frames, narratives, or worldviews (Bloch </span><a aria-label="Reference 2012" data-dcnode-id="6242" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d251514731e721" title="Bloch, M. 2012. Anthropology and the Cognitive Challenge. Anthropology and the Cognitive Challenge. Cambridge: Cambridge University Press."><span data-dcnode-id="6243" instrument_node="">2012</span></a><span data-dcnode-id="6241" instrument_node="">; DiMaggio </span><a aria-label="Reference 1997" data-dcnode-id="6239" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d251514731e724" title="DiMaggio, P. 1997. Culture and Cognition. Annual Review of Sociology 23: 263–287."><span data-dcnode-id="6240" instrument_node="">1997</span></a><span data-dcnode-id="6238" instrument_node="">; Strauss and Quinn </span><a aria-label="Reference 1997" data-dcnode-id="6236" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR161" id="ref-link-section-d251514731e727" title="Strauss, C., and N. Quinn. 1997. A Cognitive Theory of Cultural Meaning. Cambridge: Cambridge University Press."><span data-dcnode-id="6237" instrument_node="">1997</span></a><span data-dcnode-id="6235" instrument_node="">). If not overtly invited, cognitive assumptions will always sneak in through the back door (Foster </span><a aria-label="Reference 2018" data-dcnode-id="6233" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d251514731e730" title="Foster, J.G. 2018. Culture and Computation: Steps to a Probably Approximately Correct Theory of Culture. Poetics 68: 144–154."><span data-dcnode-id="6234" instrument_node="">2018</span></a><span data-dcnode-id="6232" instrument_node="">). Where even minimal reference to cognitive processes and constructs is pervasive in cultural sociology, then there is the possibility for a link to cognitive-neuroscientific theory.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="6229" id="Sec5"><span data-dcnode-id="6230" instrument_node="">Novel conceptual distinctions</span></h4><p data-dcnode-id="6218"><span data-dcnode-id="6228" instrument_node="">Whether or not this link we exploit is the analyst’s choice, our only point is that </span><i data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">better</span></i><span data-dcnode-id="6225" instrument_node=""> cultural theory would result if the underlying cognitive-neuroscientific assumptions made by the theory are both explicit and are the ones that are most empirically plausible or have received the most support (Patterson </span><a aria-label="Reference 2014" data-dcnode-id="6223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d251514731e744" title="Patterson, O. 2014. Making Sense of Culture. Annual Review of Sociology 40 (1): 1–30."><span data-dcnode-id="6224" instrument_node="">2014</span></a><span data-dcnode-id="6222" instrument_node="">). Besides, by delving into the relevant neuroscientific literature, cultural analysts may also come across new constructs, processes, assumptions, and mechanisms they would not have thought of from the armchair (Summers-Effler </span><a aria-label="Reference 2004" data-dcnode-id="6220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR163" id="ref-link-section-d251514731e747" title="Summers-Effler, E. 2004. A Theory of the Self, Emotion, and Culture. In Theory and Research on Human Emotions, ed. J.H. Turner, 273–308. Emerald: Advances in Group Processes."><span data-dcnode-id="6221" instrument_node="">2004</span></a><span data-dcnode-id="6219" instrument_node="">).</span></p><p data-dcnode-id="6204"><span data-dcnode-id="6217" instrument_node="">For instance, while philosophers had made distinctions between “knowing how” and “knowing that” base on conceptual analysis (e.g., Ryle </span><a aria-label="Reference 2002" data-dcnode-id="6215" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR138" id="ref-link-section-d251514731e753" title="Ryle, G. 2002[1949]. The Concept of Mind. Chicago: University of Chicago Press."><span data-dcnode-id="6216" instrument_node="">2002</span></a><span data-dcnode-id="6214" instrument_node=""> [1949], pp. 25–61), it took research in the psychology and neurobiology of memory to discover that the latter category further segmented into semantic and episodic forms of knowledge, and that “how” (procedural) memory was actually a subcategory of a more inclusive form (e.g., including priming, and conditioning memory) called “nondeclarative” (Squire </span><a aria-label="Reference 2004" data-dcnode-id="6212" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR154" id="ref-link-section-d251514731e756" title="Squire, L.R. 2004. Memory Systems of the Brain: A Brief History and Current Perspective. Neurobiology of Learning and Memory 82 (3): 171–177."><span data-dcnode-id="6213" instrument_node="">2004</span></a><span data-dcnode-id="6211" instrument_node="">). Thus, what had been treated as a unitary “natural kind” in the conceptual analysis tradition turned out to be a set of analytically distinct, causally heterogeneous set of entities and processes (Michaelian </span><a aria-label="Reference 2011" data-dcnode-id="6209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d251514731e759" title="Michaelian, K. 2011. Is Memory a Natural Kind? Memory Studies 4 (2): 170–189."><span data-dcnode-id="6210" instrument_node="">2011</span></a><span data-dcnode-id="6208" instrument_node="">). Cognitive Social Scientists, in their turn, have used insights from this new strand of research on memory systems to shed light on and theorize the statics and dynamics of such prototypical cultural phenomena as religious movements, ritual, and cults (Whitehouse </span><a aria-label="Reference 2004" data-dcnode-id="6206" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR183" id="ref-link-section-d251514731e762" title="Whitehouse, H. 2004. Modes of Religiosity: A Cognitive Theory of Religious Transmission. Cognitive Science of Religion Series. New York: AltaMira Press."><span data-dcnode-id="6207" instrument_node="">2004</span></a><span data-dcnode-id="6205" instrument_node="">).</span></p><p data-dcnode-id="6193"><span data-dcnode-id="6203" instrument_node="">In the same way, projectivity, or the ability of persons to “travel forward” in time into the future and generate plans, postulate hypothetical future scenarios, and simulate alternative courses of action has been central to theorizing in cultural sociology since Schutz (Emirbayer and Mische </span><a aria-label="Reference 1998" data-dcnode-id="6201" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d251514731e768" title="Emirbayer, M., and A. Mische. 1998. What is Agency? American Journal of Sociology 103 (4): 962–1023."><span data-dcnode-id="6202" instrument_node="">1998</span></a><span data-dcnode-id="6200" instrument_node="">; Tavory and Eliasoph </span><a aria-label="Reference 2013" data-dcnode-id="6198" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR165" id="ref-link-section-d251514731e771" title="Tavory, I., and N. Eliasoph. 2013. Coordinating Futures: Toward a Theory of Anticipation. The American Journal of Sociology 118 (4): 908–942."><span data-dcnode-id="6199" instrument_node="">2013</span></a><span data-dcnode-id="6197" instrument_node="">). What theorists could not have predicted from the armchair is that episodic memory (travel backward in our life timeline) and projectivity (travel forward) are actually two subcategories of a more general “hypothetical imagining” ability subserved by the same neural circuits and sharing fundamental properties inclusive of those that allow for counterfactual reasoning more generally; if one is disrupted, so are the other ones (Suddendorf </span><a aria-label="Reference 2013" data-dcnode-id="6195" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR162" id="ref-link-section-d251514731e774" title="Suddendorf, T. 2013. Mental Time Travel: Continuities and Discontinuities. Trends in Cognitive Sciences 17 (4): 151–152."><span data-dcnode-id="6196" instrument_node="">2013</span></a><span data-dcnode-id="6194" instrument_node="">). Thus, cognitive neuroscience suggests sociologists should deal with what otherwise would have been treated as “analytically distinct” processes requiring separate bodies of theory, using a single conceptual language.</span></p><p data-dcnode-id="6185"><span data-dcnode-id="6192" instrument_node="">Several other concepts in cultural theory, including “action,” “symbol,” “imagination,” and even the notion of “category” may be subject to a radical rethinking due to discoveries in the cognitive neurosciences (Blouw et al. </span><a aria-label="Reference 2015" data-dcnode-id="6190" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d251514731e780" title="Blouw, P., B. Peter, S. Eugene, et al. 2015. Concepts as Semantic Pointers: A Framework and Computational Model. Cognitive Science 40 (5): 1128–1162."><span data-dcnode-id="6191" instrument_node="">2015</span></a><span data-dcnode-id="6189" instrument_node="">). We believe a cognitive neuroscientifically </span><i data-dcnode-id="6187"><span data-dcnode-id="6188" instrument_node="">informed</span></i><span data-dcnode-id="6186" instrument_node=""> cultural theory is thus better and potentially more insightful and generative than one that makes unstated assumptions, or whose assumptions are wrong, outdated, or misleading.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="6183" id="Sec6"><span data-dcnode-id="6184" instrument_node="">Settling “meta-theoretical” debates: infra-individualism</span></h4><p data-dcnode-id="6169"><span data-dcnode-id="6182" instrument_node="">Another way cultural sociology can benefit from a deep engagement with cognitive neuroscience is that thorny “meta-theoretical” debates in cultural sociology can be replaced by more theoretically productive substantive debates capable of empirical adjudication or even conceptual transcendence (e.g., Turner </span><a aria-label="Reference 2001" data-dcnode-id="6180" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR172" id="ref-link-section-d251514731e794" title="Turner, S.P. 2001. Throwing Out the Tacit Rule Book: Learning and Practices. In The Practice Turn in Contemporary Theory, ed. T.R. Schatzki, K.K. Cetina, and E. von Savigny, 129–139. New York: Routledge."><span data-dcnode-id="6181" instrument_node="">2001</span></a><span data-dcnode-id="6179" instrument_node="">). For instance, during the 1980s and 1990s, a “fundamental” problem in social theory was that of the “micro–macro” link (Alexander et al. </span><a aria-label="Reference 1987" data-dcnode-id="6177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d251514731e797" title="Alexander, J.C., B. Giesen, R. Münch, et al. (eds.). 1987. The Macro-Micro Link. Berkeley, CA: University of California Press."><span data-dcnode-id="6178" instrument_node="">1987</span></a><span data-dcnode-id="6176" instrument_node="">). The issue concerned the relationship between levels of description with the lower level usually being thought of as composed of unitary individuals. As analysts have thought seriously about the link between cognitive neuroscience and social science (including cultural sociology), it has become clear that the issue is no longer one separating individualism and holism. Instead, as Sperber (</span><a aria-label="Reference 1997" data-dcnode-id="6174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR153" id="ref-link-section-d251514731e800" title="Sperber, D. 1997. Individualisme méthodologique et cognitivisme. In Cognition et Sciences Sociales: La Dimension Cognitive Dans L’analyse Sociologique, ed. Raymond Boudon, Alban Bouvier, and François Chazel, 123–136. Paris: Presses Universitaires de France."><span data-dcnode-id="6175" instrument_node="">1997</span></a><span data-dcnode-id="6173" instrument_node="">, p. 123) has cogently argued, the main issue is whether the black box of the individual shall be cracked open so that processes that occur </span><i data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">below the level</span></i><span data-dcnode-id="6170" instrument_node=""> of the individual (e.g., in terms of phenomenological time-scale) are admitted as necessary for the job of explanation.</span></p><p data-dcnode-id="6149"><span data-dcnode-id="6168" instrument_node="">Sperber-style “infra-individual” processes are now commonly accepted in cognitive psychology and neuroscience. Only recently have cultural analysts thought about how they fit into traditional social science theory and research (Shepherd </span><a aria-label="Reference 2011" data-dcnode-id="6166" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d251514731e809" title="Shepherd, H. 2011. The Cultural Context of Cognition: What the Implicit Association Test Tells Us About How Culture Works. Sociological Forum 26 (1): 121–143."><span data-dcnode-id="6167" instrument_node="">2011</span></a><span data-dcnode-id="6165" instrument_node="">; Srivastava and Banaji </span><a aria-label="Reference 2011" data-dcnode-id="6163" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR155" id="ref-link-section-d251514731e812" title="Srivastava, S.B., and M.R. Banaji. 2011. Culture, Cognition, and Collaborative Networks in Organizations. American Sociological Review 76 (2): 207–233."><span data-dcnode-id="6164" instrument_node="">2011</span></a><span data-dcnode-id="6162" instrument_node="">; Vaisey </span><a aria-label="Reference 2009" data-dcnode-id="6160" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR175" id="ref-link-section-d251514731e815" title="Vaisey, S. 2009. Motivation and Justification: A Dual-Process Model of Culture in Action. The American Journal of Sociology 114 (6): 1675–1715."><span data-dcnode-id="6161" instrument_node="">2009</span></a><span data-dcnode-id="6159" instrument_node="">). For instance, when presented (subliminally) with pictures of faces with males of dark skin, and then asked to add a letter to complete the sequence “GU_” so it forms a word, undergraduate U.S. subjects are statistically more likely to select “N” than “M.” The infra-individual process explaining this effect is that of “spreading activation” from representations of black males to representations of weapons as mediated by stereotypical associations between black males and violence in the U.S. (Kunda and Thagard </span><a aria-label="Reference 1996" data-dcnode-id="6157" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d251514731e818" title="Kunda, Z., and P. Thagard. 1996. Forming Impressions from Stereotypes, Traits, and Behaviors: A Parallel-Constraint-Satisfaction Theory. Psychological Review 103 (2): 284."><span data-dcnode-id="6158" instrument_node="">1996</span></a><span data-dcnode-id="6156" instrument_node="">, p. 285). “Spreading activation” is a psychological description of a cognitive process, but one that can be given a mechanismic implementation in the form of interconnected neural systems tuned by experience (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="6154" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e821" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="6155" instrument_node="">2009</span></a><span data-dcnode-id="6153" instrument_node="">; Thagard </span><a aria-label="Reference 2008a" data-dcnode-id="6151" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR167" id="ref-link-section-d251514731e825" title="Thagard, P. 2008a. Hot Thought: Mechanisms and Applications of Emotional Cognition. Cambridge: MIT Press."><span data-dcnode-id="6152" instrument_node="">2008a</span></a><span data-dcnode-id="6150" instrument_node="">).</span></p><p data-dcnode-id="6114"><span data-dcnode-id="6148" instrument_node="">Infra-individual processes are also relevant to a variety of core phenomena studied by sociologists and may themselves be modulated via top-down constraints imposed by contexts and institutions (Lizardo and Strand </span><a aria-label="Reference 2010" data-dcnode-id="6146" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d251514731e831" title="Lizardo, O., and M. Strand. 2010. Skills, Toolkits, Contexts and Institutions: Clarifying the Relationship Between Different Approaches to Cognition in Cultural Sociology. Poetics 38 (2): 205–228."><span data-dcnode-id="6147" instrument_node="">2010</span></a><span data-dcnode-id="6145" instrument_node="">; Shepherd </span><a aria-label="Reference 2011" data-dcnode-id="6143" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d251514731e834" title="Shepherd, H. 2011. The Cultural Context of Cognition: What the Implicit Association Test Tells Us About How Culture Works. Sociological Forum 26 (1): 121–143."><span data-dcnode-id="6144" instrument_node="">2011</span></a><span data-dcnode-id="6142" instrument_node="">; Stoltz and Taylor </span><a aria-label="Reference 2017" data-dcnode-id="6140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d251514731e837" title="Stoltz, D.S., and M.A. Taylor. 2017. Paying with Change: The Purposeful Enunciation of Material Culture. Poetics 62: 26–39."><span data-dcnode-id="6141" instrument_node="">2017</span></a><span data-dcnode-id="6139" instrument_node="">; Wood et al. </span><a aria-label="Reference 2018" data-dcnode-id="6137" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR191" id="ref-link-section-d251514731e840" title="Wood, M.L., D.S. Stoltz, J. Van Ness, and M.A. Taylor. 2018. Schemas and Frames. Sociological Theory 36 (3): 244–261."><span data-dcnode-id="6138" instrument_node="">2018</span></a><span data-dcnode-id="6136" instrument_node="">). For instance, cultural sociologists usually pitch such commonplace constructs as “habitus” at the infra-individual level (Bourdieu </span><a aria-label="Reference 1990" data-dcnode-id="6134" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d251514731e843" title="Bourdieu, P. 1990. The Logic of Practice. Palo Alto: Stanford University Press."><span data-dcnode-id="6135" instrument_node="">1990</span></a><span data-dcnode-id="6133" instrument_node="">; Mukerji </span><a aria-label="Reference 2014" data-dcnode-id="6131" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d251514731e847" title="Mukerji, C. 2014. The Cultural Power of Tacit Knowledge: Inarticulacy and Bourdieu’s Habitus. American Journal of Cultural Sociology 2 (3): 348–375."><span data-dcnode-id="6132" instrument_node="">2014</span></a><span data-dcnode-id="6130" instrument_node="">); and qualify them as having both cognitive, and presumably neurocognitive, foundations (Downey </span><a aria-label="Reference 2014" data-dcnode-id="6128" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d251514731e850" title="Downey, G. 2014. ‘Habitus in Extremis’: From Embodied Culture to Bio-Cultural Development. Body &amp; Society 20 (2): 113–117."><span data-dcnode-id="6129" instrument_node="">2014</span></a><span data-dcnode-id="6127" instrument_node="">; Lizardo </span><a aria-label="Reference 2009a" data-dcnode-id="6125" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR95" id="ref-link-section-d251514731e853" title="Lizardo, O. 2009a. Is a ‘Special Psychology’ of Practice Possible? From Values and Attitudes to Embodied Dispositions. Theory &amp; Psychology 19 (6): 713–727."><span data-dcnode-id="6126" instrument_node="">2009a</span></a><span data-dcnode-id="6124" instrument_node="">; Potter et al. </span><a aria-label="Reference 2013" data-dcnode-id="6122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d251514731e856" title="Potter, D., A. Mashburn, and D. Grissmer. 2013. The Family, Neuroscience, and Academic Skills: An Interdisciplinary Account of Social Class Gaps in Children’s Test Scores. Social Science Research 42 (2): 446–464."><span data-dcnode-id="6123" instrument_node="">2013</span></a><span data-dcnode-id="6121" instrument_node="">). In this respect, infra-individualism emerges as an appealing option in that, by “dissolving” the individual, unlocks the potential to theorize the “collective-social” at a level </span><i data-dcnode-id="6119"><span data-dcnode-id="6120" instrument_node="">below</span></i><span data-dcnode-id="6118" instrument_node=""> the person; as suspected by Levi-Strauss (</span><a aria-label="Reference 1966" data-dcnode-id="6116" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d251514731e862" title="Levi-Strauss, C. 1966. The Savage Mind. Chicago: University of Chicago Press."><span data-dcnode-id="6117" instrument_node="">1966</span></a><span data-dcnode-id="6115" instrument_node="">), the infra-individual level may represent the royal road to the collective unconscious that Durkheim was after.</span></p><p data-dcnode-id="6112"><span data-dcnode-id="6113" instrument_node="">In what follows, we use three case studies to show the theoretical benefits of taking an infra-individualist, extended cognition approach to cultural phenomena grounded in cognitive neuroscience.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="6110" id="Sec7"><span data-dcnode-id="6111" instrument_node="">Three case studies</span></h4><p data-dcnode-id="6105"><span data-dcnode-id="6109" instrument_node="">First, we critically consider the propriety of the conceptualization of linguistic symbols as “amodal” carriers of meaning motivating the metaphor of culture-as-code. We present an alternative “modal” conceptualization of linguistic symbols and categorization, built from neurally motivated understandings of cognition as grounded in the body. This approach allows us to propose a new way to think of the link between language, culture and collective categories (Ignatow </span><a aria-label="Reference 2007" data-dcnode-id="6107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d251514731e876" title="Ignatow, G. 2007. Theories of Embodied Knowledge: New Directions for Cultural and Cognitive Sociology? Journal for the Theory of Social Behaviour 37 (2): 115–135."><span data-dcnode-id="6108" instrument_node="">2007</span></a><span data-dcnode-id="6106" instrument_node="">).</span></p><p data-dcnode-id="6097"><span data-dcnode-id="6104" instrument_node="">Second, we review recent advances in the study of “mirror neurons” providing a neurocognitive motivation for a rethinking of the fundamental basis of intersubjectivity (Bloch </span><a aria-label="Reference 2015" data-dcnode-id="6102" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d251514731e882" title="Bloch, M. 2015. In and Out of Each Other’s Bodies: Theory of Mind, Evolution, Truth, and the Nature of the Social. New York: Routledge."><span data-dcnode-id="6103" instrument_node="">2015</span></a><span data-dcnode-id="6101" instrument_node="">). We show that there is no need to assume a deliberate, language-mediated, conscious exchange based on reflective meanings as the primary route to intersubjective agreement as is typical in the social phenomenology tradition that has been influential in cultural sociology (Heiskala </span><a aria-label="Reference 2011" data-dcnode-id="6099" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d251514731e885" title="Heiskala, R. 2011. The Meaning of Meaning in Sociology. The Achievements and Shortcomings of Alfred Schutz’s Phenomenological Sociology. Journal for the Theory of Social Behaviour 41 (3): 231–246."><span data-dcnode-id="6100" instrument_node="">2011</span></a><span data-dcnode-id="6098" instrument_node="">). These insights have both substantive and methodological implications.</span></p><p data-dcnode-id="6086"><span data-dcnode-id="6096" instrument_node="">Finally, we tie together two strands of inquiry, one from neuroscience and one from cultural sociology, dealing with the fundamental question of how discrete elements become associated as to be considered a single element in experience. This mechanism underlies such disparate phenomena as how the cognitive meaning of symbols comes to be “bound” to the external markers that serve as their “signifiers” (de Saussure </span><a aria-label="Reference 1964" data-dcnode-id="6094" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d251514731e891" title="de Saussure, F. 1964. Course in General Linguistics. Chicago: Open Court."><span data-dcnode-id="6095" instrument_node="">1964</span></a><span data-dcnode-id="6093" instrument_node="">; Peirce </span><a aria-label="Reference 1974" data-dcnode-id="6091" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d251514731e894" title="Peirce, C.S. 1974. Collected Papers of Charles Sanders Peirce. Cambridge: Harvard University Press."><span data-dcnode-id="6092" instrument_node="">1974</span></a><span data-dcnode-id="6090" instrument_node="">). This mechanism also helps to account for how certain social categories come to be linked to socially relevant affective and relational dimensions expressive of moral (good/bad) or hierarchical (powerful/not powerful) status (Douglas </span><a aria-label="Reference 2002" data-dcnode-id="6088" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d251514731e897" title="Douglas, M. 2002. Purity and Danger. New York: Routledge."><span data-dcnode-id="6089" instrument_node="">2002</span></a><span data-dcnode-id="6087" instrument_node="">). The resulting analysis provides a novel and useful take on classical issues.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="6084" id="Sec8"><span data-dcnode-id="6085" instrument_node="">Opening the linguistic black box</span></h3><p data-dcnode-id="6061"><span data-dcnode-id="6083" instrument_node="">Cultural sociologists often rely on a “linguistic” metaphor to conceive of how cultural systems can be systematically structured while allowing for individual creativity in practice (Biernacki </span><a aria-label="Reference 2000" data-dcnode-id="6081" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d251514731e909" title="Biernacki, R. 2000. Language and the Shift from Signs to Practices in Cultural Inquiry. History and Theory 39 (3): 289–310."><span data-dcnode-id="6082" instrument_node="">2000</span></a><span data-dcnode-id="6080" instrument_node="">; Sewell </span><a aria-label="Reference 2005" data-dcnode-id="6078" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR145" id="ref-link-section-d251514731e912" title="Sewell Jr., W.H. 2005. Logics of History: Social Theory and Social Transformation. Chicago: University of Chicago Press."><span data-dcnode-id="6079" instrument_node="">2005</span></a><span data-dcnode-id="6077" instrument_node="">). Some go further and see external linguistic symbols as a model for cultural processes in general, suggesting social action should be read as text (Alexander </span><a aria-label="Reference 2003" data-dcnode-id="6075" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d251514731e915" title="Alexander, J.C. 2003. The Meanings of Social Life: A Cultural Sociology. Oxford: Oxford University Press."><span data-dcnode-id="6076" instrument_node="">2003</span></a><span data-dcnode-id="6074" instrument_node="">, pp. 21–22; Ricoeur </span><a aria-label="Reference 1973" data-dcnode-id="6072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d251514731e918" title="Ricoeur, P. 1973. The Model of the Text: Meaningful Action Considered as a Text. Social Research 38 (3): 529–562."><span data-dcnode-id="6073" instrument_node="">1973</span></a><span data-dcnode-id="6071" instrument_node="">). In this respect, these analysts draw from a venerated tradition in cultural theory. For instance, both Parsons and Geertz transitioned from describing culture as a “system” toward a linguistic metaphor in the late 1960s (Lizardo </span><a aria-label="Reference 2016b" data-dcnode-id="6069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d251514731e921" title="Lizardo, O. 2016b. Cultural theory. In Handbook of Contemporary Sociological Theory, ed. S. Abrutyn, 99–120. Switzerland: Springer."><span data-dcnode-id="6070" instrument_node="">2016b</span></a><span data-dcnode-id="6068" instrument_node="">). Other analysts consider language as a primary means of (cognitively) “constructing” social reality (e.g., Berger and Luckmann </span><a aria-label="Reference 1966" data-dcnode-id="6066" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d251514731e925" title="Berger, P.L., and T. Luckmann. 1966. The Social Construction of Reality: A Treatise in the Sociology of Knowledge. London: Anchor Books."><span data-dcnode-id="6067" instrument_node="">1966</span></a><span data-dcnode-id="6065" instrument_node="">). This conceptualization is common to classical functionalist, phenomenological, and interpretivist schools of cultural theory (Lizardo </span><a aria-label="Reference 2016a" data-dcnode-id="6063" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d251514731e928" title="Lizardo, O. 2016a. Cultural Symbols and Cultural Power. Qualitative Sociology 39 (2): 199–204."><span data-dcnode-id="6064" instrument_node="">2016a</span></a><span data-dcnode-id="6062" instrument_node="">). Recent work in cognitive neuroscience, however, suggests that we may have to rethink the dominant version of the linguistic metaphor as well as the role of language in cognition in fundamental ways.</span></p><p data-dcnode-id="6047"><span data-dcnode-id="6060" instrument_node="">Drawing on Saussure and his (mis)interpreters, the classical model holds that the relationship between a linguistic symbol (signifier) and that which is symbolized (signified) is of an arbitrary nature. At the extreme, the relationship between the signifier and signified is presumed to be entirely incidental to the internal organization of the system via sequential and substitutive relations between otherwise meaningless symbols. This tendency comes out most clearly in Giddens (</span><a aria-label="Reference 1979" data-dcnode-id="6058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d251514731e934" title="Giddens, A. 1979. Central Problems in Social Theory: Action, Structure, and Contradiction in Social Analysis. Berkeley: University of California Press."><span data-dcnode-id="6059" instrument_node="">1979</span></a><span data-dcnode-id="6057" instrument_node="">), who draws inspiration from the distinction between </span><i data-dcnode-id="6055"><span data-dcnode-id="6056" instrument_node="">langue</span></i><span data-dcnode-id="6054" instrument_node=""> and </span><i data-dcnode-id="6052"><span data-dcnode-id="6053" instrument_node="">parole</span></i><span data-dcnode-id="6051" instrument_node=""> to conceptualize the distinction between the structural and practical “moments” of social systems (respectively). Meaning and signification are generated in the structure of concatenation, substitution, and (usually binary) opposition encoded in </span><i data-dcnode-id="6049"><span data-dcnode-id="6050" instrument_node="">langue</span></i><span data-dcnode-id="6048" instrument_node="">.</span></p><p data-dcnode-id="6039"><span data-dcnode-id="6046" instrument_node="">Following Ignatow (</span><a aria-label="Reference 2007" data-dcnode-id="6044" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d251514731e949" title="Ignatow, G. 2007. Theories of Embodied Knowledge: New Directions for Cultural and Cognitive Sociology? Journal for the Theory of Social Behaviour 37 (2): 115–135."><span data-dcnode-id="6045" instrument_node="">2007</span></a><span data-dcnode-id="6043" instrument_node="">) we refer to this as an “amodal” conception of how meaning is produced in language and, by extension, culture (see also Shore </span><a aria-label="Reference 1996" data-dcnode-id="6041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR148" id="ref-link-section-d251514731e952" title="Shore, B. 1996. Culture in Mind: Cognition, Culture, and the Problem of Meaning. Oxford: Oxford University Press."><span data-dcnode-id="6042" instrument_node="">1996</span></a><span data-dcnode-id="6040" instrument_node="">, pp. 356–58). This neo-Saussurean model of language is “amodal” because the theory presumes sensory inputs from the “modalities” (bodily senses) are not relevant for the constitution of linguistic meaning. Nor is the acquisition, storing, and implementation of linguistic (or other cultural) knowledge, in specifiable neural structures of relevance to the theory. We argue both the description of language as a disembodied sign system structured exclusively by segmental and contrastive oppositions and the corollary position that the realization of linguistic knowledge in body and brain is not consequential for the operation of language, are not consistent with how these phenomena are characterized in contemporary neuroscience. Therefore the metaphorical extension of this linguistic analogy to other aspects of social life, such as culture, action, or “structure” may be equally problematic.</
