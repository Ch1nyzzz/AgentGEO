l. 2019. Binding Significance to Form: Cultural Objects, Neural Binding, and Cultural Change. Poetics 73: 1–16."><span data-dcnode-id="5553" instrument_node="">2019</span></a><span data-dcnode-id="5551" instrument_node="">).</span></p><p data-dcnode-id="5533"><span data-dcnode-id="5549" instrument_node="">For instance, binding is involved in the generation of implicit (or explicit) associations between previously unrelated cultural elements (Goldberg and Stein </span><a aria-label="Reference 2017" data-dcnode-id="5547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d251514731e1497" title="Goldberg, A., and S.K. Stein. 2017. Beyond‘Social Contagion’: Associational Diffusion and the Emergence of Cultural Variation. Palo Alto: Stanford University, Graduate School of Business."><span data-dcnode-id="5548" instrument_node="">2017</span></a><span data-dcnode-id="5546" instrument_node="">; Shepherd </span><a aria-label="Reference 2011" data-dcnode-id="5544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR147" id="ref-link-section-d251514731e1500" title="Shepherd, H. 2011. The Cultural Context of Cognition: What the Implicit Association Test Tells Us About How Culture Works. Sociological Forum 26 (1): 121–143."><span data-dcnode-id="5545" instrument_node="">2011</span></a><span data-dcnode-id="5543" instrument_node="">); the link between cognitive representations of objects, events, properties, and specific affective values [e.g., linking “men” and “powerful” or “success” and “good” (Robinson et al. </span><a aria-label="Reference 2006" data-dcnode-id="5541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR135" id="ref-link-section-d251514731e1503" title="Robinson, D.T., L. Smith-Lovin, and A.K. Wisecup. 2006. Affect Control Theory. In Handbook of the Sociology of Emotions. Handbooks of Sociology and Social Research, ed. J.E. Stets and J.H. Turner, 179–202. New York: Springer."><span data-dcnode-id="5542" instrument_node="">2006</span></a><span data-dcnode-id="5540" instrument_node="">)]; the integration of singular or concrete representations (e.g., “woman” and “parent”) to generate higher level concepts pertaining to roles and identities (“mother”) which are then bound to particular occupants or “fillers” (Bloch </span><a aria-label="Reference 2008" data-dcnode-id="5538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d251514731e1506" title="Bloch, M. 2008. Why Religion is Nothing Special But is Central. Philosophical Transactions of the Royal Society of London. Series B, Biological Sciences 363 (1499): 2055–2061."><span data-dcnode-id="5539" instrument_node="">2008</span></a><span data-dcnode-id="5537" instrument_node="">); and even the linkage between the material pole of symbols (signifiers) and their cognitive meanings (signifieds). The capacity of humans to bind unrelated elements into single constructs may lie behind the bewildering capacity for cultural variability and idiosyncrasy that is the traditional impetus for cultural analysis (Sewell </span><a aria-label="Reference 2005" data-dcnode-id="5535" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR145" id="ref-link-section-d251514731e1509" title="Sewell Jr., W.H. 2005. Logics of History: Social Theory and Social Transformation. Chicago: University of Chicago Press."><span data-dcnode-id="5536" instrument_node="">2005</span></a><span data-dcnode-id="5534" instrument_node="">).</span></p><p data-dcnode-id="5531"><span data-dcnode-id="5532" instrument_node="">Most cultural sociologists help themselves to concepts playing the role of binding. The most famous, as already alluded, is the Saussurean idea of the permanent link (e.g., like two sides of a sheet of paper) between the acoustic “image” of the linguistic symbol (signifier) and the concept it points to (signified). These formulations, while evocative, remain imprecise. In this respect, considering binding as an infra-individual process opens lines engagement with the cognitive neurosciences that can link up to work in cultural sociology emphasizing the discursive side of “social construction” (e.g., focusing on how linguistically articulated symbols come to be linked in historically specific ways).</span></p><p data-dcnode-id="5508"><span data-dcnode-id="5530" instrument_node="">A focus on different forms of binding sensitizes cultural sociologists to the </span><i data-dcnode-id="5528"><span data-dcnode-id="5529" instrument_node="">experiential</span></i><span data-dcnode-id="5527" instrument_node=""> dimension of cultural phenomena (Johnson </span><a aria-label="Reference 2012" data-dcnode-id="5525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d251514731e1521" title="Johnson, M. 2012. The Meaning of the Body: Aesthetics of Human Understanding. Chicago: University of Chicago Press."><span data-dcnode-id="5526" instrument_node="">2012</span></a><span data-dcnode-id="5524" instrument_node="">). For example, how is it that in the United States, a good proportion of the population come to experience </span><i data-dcnode-id="5522"><span data-dcnode-id="5523" instrument_node="">dangerous black men</span></i><span data-dcnode-id="5521" instrument_node=""> as a unified object, one that can be directive of behavior at an implicit level, such as crossing the street (Steele </span><a aria-label="Reference 2011" data-dcnode-id="5519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR156" id="ref-link-section-d251514731e1527" title="Steele, C.M. 2011. Whistling Vivaldi: How Stereotypes Affect Us and What We Can Do. W. W: Norton."><span data-dcnode-id="5520" instrument_node="">2011</span></a><span data-dcnode-id="5518" instrument_node="">)? How can the Eucharist be immediately experienced as </span><i data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">sacred</span></i><span data-dcnode-id="5515" instrument_node=""> even in the absence of discursive “belief” (Sørensen </span><a aria-label="Reference 2007" data-dcnode-id="5513" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR151" id="ref-link-section-d251514731e1534" title="Sørensen, J. 2007. A Cognitive Theory of Magic. Cognitive Science of Religion Series. Lanham: Rowman &amp; Littlefield Pub Incorporated."><span data-dcnode-id="5514" instrument_node="">2007</span></a><span data-dcnode-id="5512" instrument_node="">)? What is it about the motorbike that provides a pathway to “authenticity” among working-class Britons (Willis </span><a aria-label="Reference 1978" data-dcnode-id="5510" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR186" id="ref-link-section-d251514731e1537" title="Willis, P.E. 1978. Profane Culture. London: Routledge &amp; K. Paul."><span data-dcnode-id="5511" instrument_node="">1978</span></a><span data-dcnode-id="5509" instrument_node="">)? Recent work modeling the neurocognitive realization of binding mechanisms can shed light on some of these issues, while allowing cultural analysts to make finer-grained distinctions between different ways in which “binding” manifests itself as a cultural phenomenon and the contextual conditions that facilitate it.</span></p><p data-dcnode-id="5488"><span data-dcnode-id="5507" instrument_node="">Most work on the “Neural Binding Problem” (Feldman </span><a aria-label="Reference 2013" data-dcnode-id="5505" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d251514731e1544" title="Feldman, J. 2013. The Neural Binding Problem(s). Cognitive Neurodynamics 7 (1): 1–11."><span data-dcnode-id="5506" instrument_node="">2013</span></a><span data-dcnode-id="5504" instrument_node="">) in neuroscience focuses on lower-level forms of unification, such as addressing mainly issues of perceptual binding in visual fields and figure-ground distinctions (von der Malsburg </span><a aria-label="Reference 1994" data-dcnode-id="5502" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR178" id="ref-link-section-d251514731e1547" title="von der Malsburg, C. 1994. The Correlation Theory of Brain Function. In Models of Neural Networks, ed. J.L. van Hemmen and E.D. Klaus Schulten, 95–119. New York: Springer."><span data-dcnode-id="5503" instrument_node="">1994</span></a><span data-dcnode-id="5501" instrument_node="">), and the neurophenomenological substrates of unity in consciousness (Cleeremans </span><a aria-label="Reference 2003" data-dcnode-id="5499" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d251514731e1550" title="Cleeremans, A.A.C.F. 2003. The Unity of Consciousness: Binding, Integration, and Dissociation. Oxford: Oxford University Press."><span data-dcnode-id="5500" instrument_node="">2003</span></a><span data-dcnode-id="5498" instrument_node="">). Higher level forms of binding (e.g., conceptual, symbolic, or affective) are treated under the heading of “variable binding” (Browne and Sun </span><a aria-label="Reference 1999" data-dcnode-id="5496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d251514731e1553" title="Browne, A., and R. Sun. 1999. Connectionist Variable Binding. Expert Systems 16 (3): 189–207."><span data-dcnode-id="5497" instrument_node="">1999</span></a><span data-dcnode-id="5495" instrument_node="">). Variable binding refers to the processes by which “symbols are designated to represent entities” (Browne and Sun </span><a aria-label="Reference 1999" data-dcnode-id="5493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d251514731e1556" title="Browne, A., and R. Sun. 1999. Connectionist Variable Binding. Expert Systems 16 (3): 189–207."><span data-dcnode-id="5494" instrument_node="">1999</span></a><span data-dcnode-id="5492" instrument_node="">, p. 189). Our focus is on this last given its more direct relevance for core work in cultural sociology (Taylor et al. </span><a aria-label="Reference 2019" data-dcnode-id="5490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR166" id="ref-link-section-d251514731e1560" title="Taylor, M.A., D.S. Stoltz, and T.E. McDonnell. 2019. Binding Significance to Form: Cultural Objects, Neural Binding, and Cultural Change. Poetics 73: 1–16."><span data-dcnode-id="5491" instrument_node="">2019</span></a><span data-dcnode-id="5489" instrument_node="">).</span></p><p data-dcnode-id="5459"><span data-dcnode-id="5487" instrument_node="">We highlight one such process here: </span><i data-dcnode-id="5485"><span data-dcnode-id="5486" instrument_node="">convolution</span></i><span data-dcnode-id="5484" instrument_node=""> and the development of </span><i data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">semantic pointers</span></i><span data-dcnode-id="5481" instrument_node=""> (Thagard and Stewart </span><a aria-label="Reference 2011" data-dcnode-id="5479" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR169" id="ref-link-section-d251514731e1572" title="Thagard, P., and T.C. Stewart. 2011. The AHA! Experience: Creativity Through Emergent Binding in Neural Networks. Cognitive Science 35 (1): 1–33."><span data-dcnode-id="5480" instrument_node="">2011</span></a><span data-dcnode-id="5478" instrument_node="">). Convolution is the infra-individual process by which two or more already-learned representations, encoded in the pattern of firing of populations of neurons, bind to form a unique representation that is irreducible to its component parts. With convolution, binding occurs not when neurons fire together, but when pre-learned patterns, sometimes recruiting entire neural subpopulations, come to be temporally synchronized (Thagard and Stewart </span><a aria-label="Reference 2011" data-dcnode-id="5476" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR169" id="ref-link-section-d251514731e1575" title="Thagard, P., and T.C. Stewart. 2011. The AHA! Experience: Creativity Through Emergent Binding in Neural Networks. Cognitive Science 35 (1): 1–33."><span data-dcnode-id="5477" instrument_node="">2011</span></a><span data-dcnode-id="5475" instrument_node="">).</span><sup data-dcnode-id="5470"><a data-dcnode-id="5471" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="5473"><span data-dcnode-id="5474" instrument_node="">Footnote </span></span><span data-dcnode-id="5472" instrument_node="">4</span></a></sup><span data-dcnode-id="5469" instrument_node=""> Convolution is a useful mechanism for theorizing cultural phenomena because it plays the role of a “compression operation” (Blouw et al. </span><a aria-label="Reference 2015" data-dcnode-id="5467" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d251514731e1589" title="Blouw, P., B. Peter, S. Eugene, et al. 2015. Concepts as Semantic Pointers: A Framework and Computational Model. Cognitive Science 40 (5): 1128–1162."><span data-dcnode-id="5468" instrument_node="">2015</span></a><span data-dcnode-id="5466" instrument_node="">, p. 6)—that is, a mechanism by which people mesh diverse lower order cultural elements (e.g., perceptual, experiential, symbolic, and/or affective) into higher order representations that can be manipulated, used, and experienced as a unity. These composite representations—or “semantic pointers” (Eliasmith </span><a aria-label="Reference 2013" data-dcnode-id="5464" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d251514731e1592" title="Eliasmith, C. 2013. How to Build a Brain. Oxford: Oxford University Press."><span data-dcnode-id="5465" instrument_node="">2013</span></a><span data-dcnode-id="5463" instrument_node="">)—are made possible by variable binding processes. They may also be a good candidate for the emergent mental entity that Durkheim (</span><a aria-label="Reference 1974" data-dcnode-id="5461" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d251514731e1595" title="Durkheim, E. 1974. Individual and Collective Representations. In Sociology and Philosophy, ed. E. Durkheim. New York: Free Press."><span data-dcnode-id="5462" instrument_node="">1974</span></a><span data-dcnode-id="5460" instrument_node="">) once referred to as “collective representations.”</span></p><p data-dcnode-id="5451"><span data-dcnode-id="5458" instrument_node="">While basic perceptual binding allows us to pair together color and form percepts to form on-the-fly distinctions between, say, green apples and red oranges (van der Velde and de Kamps </span><a aria-label="Reference 2006" data-dcnode-id="5456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR176" id="ref-link-section-d251514731e1601" title="van der Velde, F., and M. de Kamps. 2006. Neural Blackboard Architectures of Combinatorial Structures in Cognition. Behavioral and Brain Sciences 29 (1): 37–70."><span data-dcnode-id="5457" instrument_node="">2006</span></a><span data-dcnode-id="5455" instrument_node="">), a semantic pointer might include this information and more contextual information like “green apples are sour” or “red oranges are blood oranges.” This process is recursive: semantic pointers can themselves be bound via convolution to form even higher level representations, allowing for otherwise different semantic pointers to come together into a “supra” pointer and stored in long-term memory. Compressing experiential and cultural information into semantic pointers, however, comes at a cost: since they exist as summaries, they can be decomposed to only approximate their parts—not fully reconstitute them (Blouw et al. </span><a aria-label="Reference 2015" data-dcnode-id="5453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d251514731e1604" title="Blouw, P., B. Peter, S. Eugene, et al. 2015. Concepts as Semantic Pointers: A Framework and Computational Model. Cognitive Science 40 (5): 1128–1162."><span data-dcnode-id="5454" instrument_node="">2015</span></a><span data-dcnode-id="5452" instrument_node="">).</span></p><p data-dcnode-id="5419"><span data-dcnode-id="5450" instrument_node="">There are two implications of isolating infra-individual binding processes for cultural sociology. First, since convolution gives rise to novel (emergent) representations, two or more cultural elements that bind in time and space need not be bound at all times (Taylor et al. </span><a aria-label="Reference 2019" data-dcnode-id="5448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR166" id="ref-link-section-d251514731e1610" title="Taylor, M.A., D.S. Stoltz, and T.E. McDonnell. 2019. Binding Significance to Form: Cultural Objects, Neural Binding, and Cultural Change. Poetics 73: 1–16."><span data-dcnode-id="5449" instrument_node="">2019</span></a><span data-dcnode-id="5447" instrument_node="">; Quilley et al. </span><a aria-label="Reference 2013" data-dcnode-id="5445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d251514731e1613" title="Quilley, S., T. Schröder, and P. Thagard. 2013. A Complex Systems Approach to the Study of Ideology: Cognitive-Affective Structures and the Dynamics of Belief Systems. Journal of Social and Political Psychology 1 (1): 337–363."><span data-dcnode-id="5446" instrument_node="">2013</span></a><span data-dcnode-id="5444" instrument_node="">). This is the difference between what Lakoff (</span><a aria-label="Reference 2009" data-dcnode-id="5442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1616" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5443" instrument_node="">2009</span></a><span data-dcnode-id="5441" instrument_node="">) refers to as </span><i data-dcnode-id="5439"><span data-dcnode-id="5440" instrument_node="">obligatory</span></i><span data-dcnode-id="5438" instrument_node=""> (characteristic of perceptual bindings such as an apple’s shape and color specifications) and </span><i data-dcnode-id="5436"><span data-dcnode-id="5437" instrument_node="">nonce</span></i><span data-dcnode-id="5435" instrument_node=""> bindings (put together on the fly and determined by characteristics of context). This approach suggests that some lines of research in cultural sociology may be on the right track in conceptualizing culture as an individual’s repertoire (i.e., procedural memory) for forming coherent representations as situations arise rather than storing them ready-made (Lizardo and Strand </span><a aria-label="Reference 2010" data-dcnode-id="5433" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d251514731e1626" title="Lizardo, O., and M. Strand. 2010. Skills, Toolkits, Contexts and Institutions: Clarifying the Relationship Between Different Approaches to Cognition in Cultural Sociology. Poetics 38 (2): 205–228."><span data-dcnode-id="5434" instrument_node="">2010</span></a><span data-dcnode-id="5432" instrument_node="">; Martin </span><a aria-label="Reference 2010" data-dcnode-id="5430" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d251514731e1629" title="Martin, J.L. 2010. Life’s a Beach But You’re an ant, and Other Unwelcome News for the Sociology of Culture. Poetics 38 (2): 229–244."><span data-dcnode-id="5431" instrument_node="">2010</span></a><span data-dcnode-id="5429" instrument_node="">), and thinking of cultural change as the diffusion of metaphors, objects, and dispositions reflecting novel bindings between previously unassociated concepts and practices (Goldberg and Stein </span><a aria-label="Reference 2017" data-dcnode-id="5427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d251514731e1632" title="Goldberg, A., and S.K. Stein. 2017. Beyond‘Social Contagion’: Associational Diffusion and the Emergence of Cultural Variation. Palo Alto: Stanford University, Graduate School of Business."><span data-dcnode-id="5428" instrument_node="">2017</span></a><span data-dcnode-id="5426" instrument_node="">). Second, the fusing of two or more cultural elements need not (and, in everyday life, usually is not) linguistically mediated. To be sure, Durkheimian symbol sacralization processes are central instances of variable binding—such as when material objects, events, and historical figures become core pointers to emotionally shared collective discourses and memories in a community (Armstrong and Crage </span><a aria-label="Reference 2006" data-dcnode-id="5424" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d251514731e1635" title="Armstrong, E.A., and S.M. Crage. 2006. Movements and Memory: The Making of the Stonewall Myth. American Sociological Review 71 (5): 724–751."><span data-dcnode-id="5425" instrument_node="">2006</span></a><span data-dcnode-id="5423" instrument_node="">; Wagner-Pacifici and Schwartz </span><a aria-label="Reference 1991" data-dcnode-id="5421" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR181" id="ref-link-section-d251514731e1638" title="Wagner-Pacifici, R., and B. Schwartz. 1991. The Vietnam Veterans Memorial: Commemorating a Difficult Past. The American Journal of Sociology 97 (2): 376–420."><span data-dcnode-id="5422" instrument_node="">1991</span></a><span data-dcnode-id="5420" instrument_node="">), but are not necessarily the most empirically common instance.</span></p><p data-dcnode-id="5393"><span data-dcnode-id="5418" instrument_node="">Binding processes operating over linguistic symbols cannot be the most common form given the inefficiency of such symbols to carry rich experiential meaning directly (Evans </span><a aria-label="Reference 2009" data-dcnode-id="5416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d251514731e1644" title="Evans, V. 2009. How Words Mean: Lexical Concepts, Cognitive Models, and Meaning Construction. Oxford: Oxford University Press."><span data-dcnode-id="5417" instrument_node="">2009</span></a><span data-dcnode-id="5415" instrument_node="">; Glenberg </span><a aria-label="Reference 1997" data-dcnode-id="5413" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d251514731e1647" title="Glenberg, A.M. 1997. What Memory is for: Creating Meaning in the Service of Action. The Behavioral and Brain Sciences 20 (01): 41–50."><span data-dcnode-id="5414" instrument_node="">1997</span></a><span data-dcnode-id="5412" instrument_node="">). As Ignatow notes (</span><a aria-label="Reference 2015" data-dcnode-id="5410" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d251514731e1650" title="Ignatow, G. 2015. Theoretical Foundations for Digital Text Analysis. Journal for the Theory of Social Behaviour 46 (1): 104–120."><span data-dcnode-id="5411" instrument_node="">2015</span></a><span data-dcnode-id="5409" instrument_node="">, p. 6), language is a prompt to </span><i data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">simulate</span></i><span data-dcnode-id="5406" instrument_node=""> in acts of meaning construction rather than directly encode pre-packaged meanings in most everyday instances. This thesis implies that language functions mainly as a vocal or written transformation of an otherwise non-linguistic bind (Bloch </span><a aria-label="Reference 1991" data-dcnode-id="5404" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d251514731e1656" title="Bloch, M. 1991. Language, Anthropology and Cognitive Science. Man 26 (2): 183–198."><span data-dcnode-id="5405" instrument_node="">1991</span></a><span data-dcnode-id="5403" instrument_node="">). For instance, this latter may include iconic and imagistic ways of performing “power” in the everyday material arrangements, e.g., linking power and position in the vertical dimension (Schubert </span><a aria-label="Reference 2005" data-dcnode-id="5401" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR141" id="ref-link-section-d251514731e1660" title="Schubert, T.W. 2005. Your Highness: Vertical Positions as Perceptual Symbols of Power. Journal of Personality and Social Psychology 89 (1): 1–21."><span data-dcnode-id="5402" instrument_node="">2005</span></a><span data-dcnode-id="5400" instrument_node="">; Schwartz </span><a aria-label="Reference 1981" data-dcnode-id="5398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d251514731e1663" title="Schwartz, B. 1981. Vertical Classification: A Study in Structuralism and the Sociology of Knowledge. Chicago: University of Chicago Press."><span data-dcnode-id="5399" instrument_node="">1981</span></a><span data-dcnode-id="5397" instrument_node="">). In this way, the binding of non-arbitrary meanings to discursive, relational, and performative elements may be a crucial part of a multilevel mechanism contributing to the emergence and reproduction of power as a social phenomenon (Reed </span><a aria-label="Reference 2013" data-dcnode-id="5395" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d251514731e1666" title="Reed, I.A. 2013. Power: Relational, Discursive, and Performative Dimensions. Sociological Theory 31 (3): 193–218."><span data-dcnode-id="5396" instrument_node="">2013</span></a><span data-dcnode-id="5394" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="5235" data-title="Discussion"><div class="c-article-section" data-dcnode-id="5236" id="Sec14-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5388" id="Sec14"><span data-dcnode-id="5389" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="5237" id="Sec14-content"><p data-dcnode-id="5383"><span data-dcnode-id="5387" instrument_node="">Having offered concrete examples of how insights from cognitive neuroscience may inform cultural analysis, we are now in a position to specify what we see as the most coherent stance for sociologists interested in productive dialogue between cultural sociology and cognitive neuroscience. Any fruitful influence of cognitive neuroscience in cultural sociology provides naturalistic foundations, which, in this case, entails admitting that the processes and mechanisms described in cognitive neuroscience are constitutive of the social actor (Turner </span><a aria-label="Reference 2007" data-dcnode-id="5385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR173" id="ref-link-section-d251514731e1677" title="Turner, S.P. 2007. Social Theory as a Cognitive Neuroscience. European Journal of Social Theory 10 (3): 357–374."><span data-dcnode-id="5386" instrument_node="">2007</span></a><span data-dcnode-id="5384" instrument_node="">).</span></p><p data-dcnode-id="5358"><span data-dcnode-id="5382" instrument_node="">As we argued at the outset, this does not entail reductionism, as this position is perfectly compatible with an ontology of emergent systems (Wan </span><a aria-label="Reference 2011" data-dcnode-id="5380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR182" id="ref-link-section-d251514731e1683" title="Wan, P.Y. 2011. Reframing the Social: Emergentist Systemism and Social Theory. Farnham: Ashgate."><span data-dcnode-id="5381" instrument_node="">2011</span></a><span data-dcnode-id="5379" instrument_node="">), “wide realization” (Wilson </span><a aria-label="Reference 2004b" data-dcnode-id="5377" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR188" id="ref-link-section-d251514731e1686" title="Wilson, R.A. 2004b. Realization: Metaphysics, Mind, and Science. Philosophy of Science 71 (5): 985–996."><span data-dcnode-id="5378" instrument_node="">2004b</span></a><span data-dcnode-id="5376" instrument_node="">), and “explanatory pluralism” across different domains (McCauley and Bechtel </span><a aria-label="Reference 2001" data-dcnode-id="5374" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d251514731e1689" title="McCauley, R.N., and W. Bechtel. 2001. Explanatory Pluralism and Heuristic Identity Theory. Theory &amp; Psychology 11 (6): 736–760."><span data-dcnode-id="5375" instrument_node="">2001</span></a><span data-dcnode-id="5373" instrument_node="">). This last point relates closely to the explanatory unit of analysis. If a cultural sociologist is to embrace cognitive neuroscience, then methodological individualism, with individuals as rock-bottom black boxes and the tools of commonsensical belief-desire psychology, and literary narrative as the main way to “interpret” action, is not a coherent strategy (Strand and Lizardo </span><a aria-label="Reference 2015" data-dcnode-id="5371" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR160" id="ref-link-section-d251514731e1692" title="Strand, M., and O. Lizardo. 2015. Beyond World Images: Belief as Embodied Action in the World. Sociological Theory 33 (1): 44–70."><span data-dcnode-id="5372" instrument_node="">2015</span></a><span data-dcnode-id="5370" instrument_node="">). We argued instead that </span><i data-dcnode-id="5368"><span data-dcnode-id="5369" instrument_node="">infra</span></i><span data-dcnode-id="5367" instrument_node="">-</span><i data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">individualism</span></i><span data-dcnode-id="5364" instrument_node=""> is a more coherent strategy. If we are to turn to infra-individual mechanisms, then this raises the question of physicalism, and, as before, it is not clear that a uniquely determined position for the cultural sociologist exists. Our point is that asking cultural sociologists to embrace a minimalist form of physicalism compatible with naturalism (and no “spooky” entities) is not asking for much.</span><sup data-dcnode-id="5359"><a data-dcnode-id="5360" href="#Fn5"><span class="u-visually-hidden" data-dcnode-id="5362"><span data-dcnode-id="5363" instrument_node="">Footnote </span></span><span data-dcnode-id="5361" instrument_node="">5</span></a></sup></p><p data-dcnode-id="5335"><span data-dcnode-id="5357" instrument_node="">An instructive example in this respect is that of psychoanalysis. Once central to many strands of social theory, including structural functionalism, critical theory, and their immediate offshots (Elliott </span><a aria-label="Reference 2019" data-dcnode-id="5355" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d251514731e1708" title="Elliott, A. 2019. Social Theory and Psychoanalysis in Transition. New York: Routledge."><span data-dcnode-id="5356" instrument_node="">2019</span></a><span data-dcnode-id="5354" instrument_node="">; Marcuse </span><a aria-label="Reference 2012" data-dcnode-id="5352" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d251514731e1711" title="Marcuse, H. 2012. Eros and Civilization. New York: Routledge."><span data-dcnode-id="5353" instrument_node="">2012</span></a><span data-dcnode-id="5351" instrument_node="">; Parsons </span><a aria-label="Reference 1964" data-dcnode-id="5349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d251514731e1714" title="Parsons, T. 1964. Social Structure and Personality. New York: Free Press."><span data-dcnode-id="5350" instrument_node="">1964</span></a><span data-dcnode-id="5348" instrument_node="">; Smelser </span><a aria-label="Reference 1999" data-dcnode-id="5346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR150" id="ref-link-section-d251514731e1717" title="Smelser, N.J. 1999. The Social Edges of Psychoanalysis. Berkeley: University of California Press."><span data-dcnode-id="5347" instrument_node="">1999</span></a><span data-dcnode-id="5345" instrument_node="">), psychoanalysis stands out as the most ambitious strands of 20th century social theory, especially in its attempt to link “unconscious” processes to societal outcomes. In this respect, there is a non-trivial relationship between the Freudian penchant to go “below consciousness” and the infra-individualist call to go one level “below” the individual. However, we argue the parallel is stronger than this. While psychoanalysis became influential in social theory and the humanities more general in the form of a purely mentalistic “meta-psychology” couched in concepts and mechanisms (e.g., ego, id, repression) seemingly unmoored from underlying neural processes and their realizers, this was not the way that Freud initially conceived of it. Instead, the earliest version of psychoanalysis, as laid out in the “Project for a Scientific Psychology” (Freud </span><a aria-label="Reference 1966" data-dcnode-id="5343" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d251514731e1720" title="Freud, S. 1966. Project for a Scientific Psychology (1950 [1895]), pp. 281–391 in The Standard Edition of the Complete Psychological Works of Sigmund Freud, Volume I (1886-1899): Pre-Psycho-Analytic Publications and Unpublished Drafts."><span data-dcnode-id="5344" instrument_node="">1966</span></a><span data-dcnode-id="5342" instrument_node="">) was in fact in the form of an (armchair) </span><i data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">neuroscience,</span></i><span data-dcnode-id="5339" instrument_node=""> one that was surprisingly accurate for its time (Pribram and Gill </span><a aria-label="Reference 1976" data-dcnode-id="5337" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d251514731e1727" title="Pribram, K.H., and M. Gill. 1976. Freud’s Project Reassessed. London: Hutchinson Radius."><span data-dcnode-id="5338" instrument_node="">1976</span></a><span data-dcnode-id="5336" instrument_node="">). In that respect, we can see the infra-individualist project as both an update and a reset of the original psychoanalytic impetus to deconstruct the individual as a unitary entity in social science.</span></p><p data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">An additional advantage of the infra-individualist emphasis in contemporary cognitive theory is that it makes hash of the 19th-century debate (revived in the post-functionalist period under the heading of the micro–macro debate) regarding the direction of sociological causality. While the distinction between individual affecting society or society influencing the individual, as in the “social structure and personality” tradition, describes early efforts to incorporate cognition into social theory, the state of current cognitive-sociological and neuroscientific research implies that the distinction was misguided from the outset and was a misleading basis from which to engage in disciplinary boundary work.</span></p><p data-dcnode-id="5307"><span data-dcnode-id="5332" instrument_node="">As Geertz (</span><a aria-label="Reference 1973" data-dcnode-id="5330" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d251514731e1737" title="Geertz, C. 1973. The Interpretation of Cultures: Selected Essays. New York: Basic Books."><span data-dcnode-id="5331" instrument_node="">1973</span></a><span data-dcnode-id="5329" instrument_node="">) first noted, humans evolved such that developing functioning neural architectures requires cultural supplementation (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5327" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1740" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5328" instrument_node="">2009</span></a><span data-dcnode-id="5326" instrument_node="">; Tomasello </span><a aria-label="Reference 1999" data-dcnode-id="5324" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR171" id="ref-link-section-d251514731e1743" title="Tomasello, M. 1999. The Human Adaptation for Culture. Annual Review of Anthropology 28 (1): 509–529."><span data-dcnode-id="5325" instrument_node="">1999</span></a><span data-dcnode-id="5323" instrument_node="">). The specification of how mechanisms at the cognitive and neural levels may inform theorizing in cultural analysis, such as the ones mentioned earlier, confound simplistic binaries between “inside the head” and “outside the head,” which cultural sociologists sometimes traffic into justify anti-cognitive commitments (Wuthnow </span><a aria-label="Reference 1989" data-dcnode-id="5321" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR192" id="ref-link-section-d251514731e1746" title="Wuthnow, R. 1989. Meaning and Moral Order: Explorations in Cultural Analysis. Berkeley: University of California Press."><span data-dcnode-id="5322" instrument_node="">1989</span></a><span data-dcnode-id="5320" instrument_node="">). When going “below” the individual, the cultural sociologist will not find atomized elements, but rather the repository of </span><i data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">shared</span></i><span data-dcnode-id="5317" instrument_node=""> cognitive processes constitutive of “socially embodied” collective knowledge (Collins </span><a aria-label="Reference 1993" data-dcnode-id="5315" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d251514731e1753" title="Collins, H.M. 1993. The Structure of Knowledge. Social Research 60 (1): 95–116."><span data-dcnode-id="5316" instrument_node="">1993</span></a><span data-dcnode-id="5314" instrument_node="">). These processes, in their turn, </span><i data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">spill out</span></i><span data-dcnode-id="5311" instrument_node=""> into the world via bodily, interactive, and material scaffoldings for the realization of socio-cultural phenomena (Wilson </span><a aria-label="Reference 2004a" data-dcnode-id="5309" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR187" id="ref-link-section-d251514731e1759" title="Wilson, R.A. 2004a. Boundaries of the Mind: The Individual in the Fragile Sciences-Cognition. Cambridge: Cambridge University Press."><span data-dcnode-id="5310" instrument_node="">2004a</span></a><span data-dcnode-id="5308" instrument_node="">).</span></p><p data-dcnode-id="5300"><span data-dcnode-id="5306" instrument_node="">We close by returning to the issue of the implications of cognitive neuroscience for everyday practice in cultural analysis. As alluded to at the outset, we believe that the two fields have, at the moment, a “moderate” type of dependence. That means that conditional on questions or approach, some cultural sociologists—especially those seeing their work as closer to “humanistic” forms of inquiry traditionally defined—can carry out their work with either no or minimal engagement with cognitive neuroscience. Yet, note that even within the humanities, studies of literature, aesthetics, narrative, and history, are beginning to make contact with cognitive neuroscience, as given by emerging interfields such as the “neurohumanities.”</span><sup data-dcnode-id="5301"><a data-dcnode-id="5302" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">Footnote </span></span><span data-dcnode-id="5303" instrument_node="">6</span></a></sup></p><p data-dcnode-id="5277"><span data-dcnode-id="5299" instrument_node="">For other cultural sociologists the links are stronger and the dependencies are clearer (Cerulo </span><a aria-label="Reference 2010" data-dcnode-id="5297" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d251514731e1774" title="Cerulo, K.A. 2010. Mining the Intersections of Cognitive Sociology and Neuroscience. Poetics 38 (2): 115–132."><span data-dcnode-id="5298" instrument_node="">2010</span></a><span data-dcnode-id="5296" instrument_node="">). This is especially the case for cultural sociologists interested in the link between meaning, action, and experience (Lizardo and Strand </span><a aria-label="Reference 2010" data-dcnode-id="5294" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d251514731e1777" title="Lizardo, O., and M. Strand. 2010. Skills, Toolkits, Contexts and Institutions: Clarifying the Relationship Between Different Approaches to Cognition in Cultural Sociology. Poetics 38 (2): 205–228."><span data-dcnode-id="5295" instrument_node="">2010</span></a><span data-dcnode-id="5293" instrument_node="">), enculturation via skill acquisition (Pagis </span><a aria-label="Reference 2010" data-dcnode-id="5291" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d251514731e1780" title="Pagis, M. 2010. From Abstract Concepts to Experiential Knowledge: Embodying Enlightenment in a Meditation Center. Qualitative Sociology 33 (4): 469–489."><span data-dcnode-id="5292" instrument_node="">2010</span></a><span data-dcnode-id="5290" instrument_node="">; Winchester </span><a aria-label="Reference 2016" data-dcnode-id="5288" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR190" id="ref-link-section-d251514731e1783" title="Winchester, D. 2016. A Hunger for God: Embodied Metaphor as Cultural Cognition in Action. Social Forces: A Scientific Medium of Social Study and Interpretation 95 (2): 585–606."><span data-dcnode-id="5289" instrument_node="">2016</span></a><span data-dcnode-id="5287" instrument_node="">), the link between language and cognition (Ignatow </span><a aria-label="Reference 2007" data-dcnode-id="5285" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d251514731e1786" title="Ignatow, G. 2007. Theories of Embodied Knowledge: New Directions for Cultural and Cognitive Sociology? Journal for the Theory of Social Behaviour 37 (2): 115–135."><span data-dcnode-id="5286" instrument_node="">2007</span></a><span data-dcnode-id="5284" instrument_node="">; Stoltz and Taylor </span><a aria-label="Reference 2017" data-dcnode-id="5282" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR159" id="ref-link-section-d251514731e1790" title="Stoltz, D.S., and M.A. Taylor. 2017. Paying with Change: The Purposeful Enunciation of Material Culture. Poetics 62: 26–39."><span data-dcnode-id="5283" instrument_node="">2017</span></a><span data-dcnode-id="5281" instrument_node="">), or the way that persons are coupled via intersubjective “entrainment” loops (Summers-Effler et al. </span><a aria-label="Reference 2014" data-dcnode-id="5279" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR164" id="ref-link-section-d251514731e1793" title="Summers-Effler, E., J. Van Ness, and C. Hausmann. 2014. Peeking in the Black Box Studying, Theorizing, and Representing the Micro-Foundations of Day-to-Day Interactions. Journal of Contemporary 44 (4): 450–479."><span data-dcnode-id="5280" instrument_node="">2014</span></a><span data-dcnode-id="5278" instrument_node="">), among other topics. These analysts are increasingly unable to have the luxury to ignore developments in cognitive neuroscience as they speak to the core nature of the fundamental concepts used to interpret empirical materials and account for observed phenomena. Ignoring the cognitive scientific work would lead, as we noted at the outset, to analytic pitfalls, theoretical dead-ends, and misleading conclusions. This situation is likely to become more pressing as the boundaries between the fields become blurrier and the trafficking of concepts, theories, and tools at the interfield trading zone becomes more intense.</span></p><p data-dcnode-id="5257"><span data-dcnode-id="5276" instrument_node="">In this last respect, the nascent interfield that stands as a so far successful model of how the type of productive interchange we envision is that of </span><i data-dcnode-id="5274"><span data-dcnode-id="5275" instrument_node="">neuroanthropology</span></i><span data-dcnode-id="5273" instrument_node=""> (Lende and Downey </span><a aria-label="Reference 2012" data-dcnode-id="5271" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR92" id="ref-link-section-d251514731e1802" title="Lende, D.H., and G. Downey. 2012. The Encultured Brain: An Introduction to Neuroanthropology. Cambridge: MIT Press."><span data-dcnode-id="5272" instrument_node="">2012</span></a><span data-dcnode-id="5270" instrument_node="">).</span><sup data-dcnode-id="5265"><a data-dcnode-id="5266" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="5268"><span data-dcnode-id="5269" instrument_node="">Footnote </span></span><span data-dcnode-id="5267" instrument_node="">7</span></a></sup><span data-dcnode-id="5264" instrument_node=""> This is an apposite model for cultural sociologists, because it is a merger between the ethnographic/cultural side of anthropology and cognitive neuroscience. Some of the leaders of the new field are qualitative anthropologists steeped in a similar “fieldwork culture” (e.g., Downey </span><a aria-label="Reference 2014" data-dcnode-id="5262" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d251514731e1812" title="Downey, G. 2014. ‘Habitus in Extremis’: From Embodied Culture to Bio-Cultural Development. Body &amp; Society 20 (2): 113–117."><span data-dcnode-id="5263" instrument_node="">2014</span></a><span data-dcnode-id="5261" instrument_node="">) as sociological ethnographers (Wacquant </span><a aria-label="Reference 2015" data-dcnode-id="5259" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR180" id="ref-link-section-d251514731e1815" title="Wacquant, L.J.D. 2015. For a Sociology of Flesh and Blood. Qualitative Sociology 38 (1): 1–11."><span data-dcnode-id="5260" instrument_node="">2015</span></a><span data-dcnode-id="5258" instrument_node="">).</span></p><p data-dcnode-id="5249"><span data-dcnode-id="5256" instrument_node="">In spite of the existence of the relatively successful neuroanthropology merger, it is important to reiterate that cultural sociology is a more complex and multifaceted area and that we may be speaking of </span><i data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">multiple</span></i><span data-dcnode-id="5253" instrument_node=""> lines of connection to cognitive neuroscience; some of which will be stronger, others weaker. For instance, it is clear that understanding the neural foundations of language has implications for the work of the growing number of cultural sociologists who use automated text analysis to capture meaning structures (Ignatow </span><a aria-label="Reference 2015" data-dcnode-id="5251" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d251514731e1824" title="Ignatow, G. 2015. Theoretical Foundations for Digital Text Analysis. Journal for the Theory of Social Behaviour 46 (1): 104–120."><span data-dcnode-id="5252" instrument_node="">2015</span></a><span data-dcnode-id="5250" instrument_node="">), but cognitive-neuroscientific insights may be less important for those pursuing something closer to cultural history, narrative studies, or other forms of “textual” interpretations of action.</span></p><p data-dcnode-id="5238"><span data-dcnode-id="5248" instrument_node="">Nevertheless, insofar as these last do help themselves to substantive theories about the ways that symbols work, or the nature of meaning and language and their link to practices (Biernacki </span><a aria-label="Reference 2000" data-dcnode-id="5246" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d251514731e1830" title="Biernacki, R. 2000. Language and the Shift from Signs to Practices in Cultural Inquiry. History and Theory 39 (3): 289–310."><span data-dcnode-id="5247" instrument_node="">2000</span></a><span data-dcnode-id="5245" instrument_node="">), then developments in cultural theory inspired by cognitive neuroscience will indirectly affect even the most humanistic strands of work. In this respect, an argument can be made that all branches of cultural analysis, irrespective of method or approach, will be affected by the neuroscientific turn—some more strongly than others. This is not a bad thing, since, as we noted at the outset, while not all cultural theorists or cultural sociologists need join the cognitive neuroscience fray, </span><i data-dcnode-id="5243"><span data-dcnode-id="5244" instrument_node="">better</span></i><span data-dcnode-id="5242" instrument_node=""> cultural theory and </span><i data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">better</span></i><span data-dcnode-id="5239" instrument_node=""> cultural analysis (and perhaps in the near future better cognitive neuroscience) would result from such engagement.</span></p></div></div></section><span data-dcnode-id="5234" instrument_node="">
</span><section data-dcnode-id="5175" data-title="Notes"><div class="c-article-section" data-dcnode-id="5176" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5232" id="notes"><span data-dcnode-id="5233" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="5177" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="5178"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="5222" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="5223"><p data-dcnode-id="5224"><span data-dcnode-id="5231" instrument_node="">For related but different attempts see Ignatow (</span><a aria-label="Reference 2014" data-dcnode-id="5229" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d251514731e576" title="Ignatow, G. 2014. Ontology and Method in Cognitive Sociology. Sociological Forum 29 (4): 990–994."><span data-dcnode-id="5230" instrument_node="">2014</span></a><span data-dcnode-id="5228" instrument_node="">) and Pitts-Taylor (</span><a aria-label="Reference 2014" data-dcnode-id="5226" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d251514731e579" title="Pitts-Taylor, V. 2014. Cautionary Notes on Navigating the Neurocognitive Turn. Sociological Forum 29 (4): 995–1000."><span data-dcnode-id="5227" instrument_node="">2014</span></a><span data-dcnode-id="5225" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="5212" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="5213"><p data-dcnode-id="5214"><span data-dcnode-id="5221" instrument_node="">For work on lateral classification see Hertz (</span><a aria-label="Reference 2013" data-dcnode-id="5219" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d251514731e1133" title="Hertz, R. 2013[1960]. Death and the Right Hand. New York: Routledge"><span data-dcnode-id="5220" instrument_node="">2013</span></a><span data-dcnode-id="5218" instrument_node="">[1960]) and Lukes (</span><a aria-label="Reference 2003" data-dcnode-id="5216" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d251514731e1136" title="Lukes, S. 2003. The Grand Dichotomy of the Twentieth Century. In The Cambridge History of Twentieth Century Though, ed. Terence Ball, 602–626. Cambridge: Cambridge University Press."><span data-dcnode-id="5217" instrument_node="">2003</span></a><span data-dcnode-id="5215" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="5205" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="5206"><p data-dcnode-id="5207"><span data-dcnode-id="5211" instrument_node="">The very act of thinking about this possibility necessitates bracketing knowledge of human (and primate more generally) evolution [see for example Kaufmann and Cordonier (</span><a aria-label="Reference 2011" data-dcnode-id="5209" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d251514731e1267" title="Kaufmann, L., and L. Cordonier. 2011. Vers un naturalisme social. À la croisée des sciences sociales et des sciences cognitives. SociologieS."><span data-dcnode-id="5210" instrument_node="">2011</span></a><span data-dcnode-id="5208" instrument_node="">)].</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="5195" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="5196"><p data-dcnode-id="5197"><span data-dcnode-id="5204" instrument_node="">This phenomenon is analogous to what cognitive neuroscientists refer to as “temporal synchrony” (Feldman </span><a aria-label="Reference 2013" data-dcnode-id="5202" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d251514731e1581" title="Feldman, J. 2013. The Neural Binding Problem(s). Cognitive Neurodynamics 7 (1): 1–11."><span data-dcnode-id="5203" instrument_node="">2013</span></a><span data-dcnode-id="5201" instrument_node="">; Shastri </span><a aria-label="Reference 1996" data-dcnode-id="5199" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR146" id="ref-link-section-d251514731e1584" title="Shastri, L. 1996. Temporal Synchrony, Dynamic Bindings, and SHRUTI: A Representational but Nonclassical Model of Reflexive Reasoning. The Behavioral and Brain Sciences 19 (2): 331–337."><span data-dcnode-id="5200" instrument_node="">1996</span></a><span data-dcnode-id="5198" instrument_node="">), or the idea that analysts are more likely to observe binding when the neurons are activated concurrently.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="5191" id="Fn5"><div class="c-article-footnote--listed__content" data-dcnode-id="5192"><p data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">Only cognitive neuroscientists must embrace strong versions of the psychoneural identity theory, and this is mostly for methodological reasons.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="5185" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="5186"><p data-dcnode-id="5187"><a data-dcnode-id="5189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scienceandsociety.duke.edu/research/research-areas/neuroscience-society/neurohumanities"><span data-dcnode-id="5190" instrument_node="">https://scienceandsociety.duke.edu/research/research-areas/neuroscience-society/neurohumanities</span></a><span data-dcnode-id="5188" instrument_node="">.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="5179" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="5180"><p data-dcnode-id="5181"><a data-dcnode-id="5183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.plos.org/neuroanthropology/"><span data-dcnode-id="5184" instrument_node="">https://blogs.plos.org/neuroanthropology/</span></a><span data-dcnode-id="5182" instrument_node="">.</span></p></div></li></ol></div></div></section><div data-dcnode-id="2856" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="2857" data-title="References"><div class="c-article-section" data-dcnode-id="2858" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5173" id="Bib1"><span data-dcnode-id="5174" instrument_node="">References</span></h2><div class="c-article-section__content" data-dcnode-id="2859" id="Bib1-content"><div data-container-section="references" data-dcnode-id="2860"><ul class="c-article-references" data-dcnode-id="2870"><li class="c-article-references__item js-c-reading-companion-references-item" data-dcnode-id="5163"><p class="c-article-references__text" data-dcnode-id="5168" id="ref-CR1"><span data-dcnode-id="5172" instrument_node="">Alexander, J.C. 1992a. Cultivating Differences: Symbolic Boundaries and the Making of Inequality. In </span><i data-dcnode-id="5170"><span data-dcnode-id="5171" instrument_node="">Citizen and Enemy as Symbolic Classification: On the Polarizing Discourse of Civil Society</span></i><span data-dcnode-id="5169" instrument_node="">, ed. M. Lamont and M. Fournier, 28
