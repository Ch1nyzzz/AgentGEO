span></p><h3 class="c-article__sub-heading" data-dcnode-id="6037" id="Sec9"><span data-dcnode-id="6038" instrument_node="">The embodiment of language</span></h3><p data-dcnode-id="5996"><span data-dcnode-id="6036" instrument_node="">Recent advances in cognitive neuroscience suggest that linguistic and cultural knowledge is “embodied” in a fundamental sense (Gallese and Lakoff </span><a aria-label="Reference 2005" data-dcnode-id="6034" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d251514731e963" title="Gallese, V., and G. Lakoff. 2005. The Brain’s Concepts: The Role of the Sensory-Motor System in Conceptual Knowledge. Cognitive Neuropsychology 22 (3): 455–479."><span data-dcnode-id="6035" instrument_node="">2005</span></a><span data-dcnode-id="6033" instrument_node="">; Johnson and Lakoff </span><a aria-label="Reference 2002" data-dcnode-id="6031" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d251514731e966" title="Johnson, M., and G. Lakoff. 2002. Why Cognitive Linguistics Requires Embodied Realism. Cognitive Linguistics 13 (3): 245–264."><span data-dcnode-id="6032" instrument_node="">2002</span></a><span data-dcnode-id="6030" instrument_node="">; Kovecses </span><a aria-label="Reference 2006" data-dcnode-id="6028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d251514731e969" title="Kovecses, Z. 2006. Language, Mind, and Culture: A Practical Introduction. Oxford: Oxford University Press."><span data-dcnode-id="6029" instrument_node="">2006</span></a><span data-dcnode-id="6027" instrument_node="">; Lakoff and Johnson </span><a aria-label="Reference 1999" data-dcnode-id="6025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d251514731e972" title="Lakoff, G., and M. Johnson. 1999. Philosophy in the Flesh: The Embodied Mind and Its Challenge to Western Thought. New York: Basic Books."><span data-dcnode-id="6026" instrument_node="">1999</span></a><span data-dcnode-id="6024" instrument_node="">). In this regard, they are contributing to a long tradition in anthropology, phenomenology, and even sociology, which stresses the necessarily—“always, already”—embodied base of both pragmatic and symbolic processes (Bourdieu </span><a aria-label="Reference 1990" data-dcnode-id="6022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d251514731e975" title="Bourdieu, P. 1990. The Logic of Practice. Palo Alto: Stanford University Press."><span data-dcnode-id="6023" instrument_node="">1990</span></a><span data-dcnode-id="6021" instrument_node="">; Cassirer </span><a aria-label="Reference 1957" data-dcnode-id="6019" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d251514731e979" title="Cassirer, E. 1957. The Philosophy of Symbolic Forms, vol. III. Durham: Duke University Press."><span data-dcnode-id="6020" instrument_node="">1957</span></a><span data-dcnode-id="6018" instrument_node="">, pp. 205–261; Crossley </span><a aria-label="Reference 1995" data-dcnode-id="6016" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d251514731e982" title="Crossley, N. 1995. Merleau-Ponty, the Elusive Body and Carnal Sociology. Body &amp; Society 1 (1): 43–63."><span data-dcnode-id="6017" instrument_node="">1995</span></a><span data-dcnode-id="6015" instrument_node="">; Engman and Cranford </span><a aria-label="Reference 2016" data-dcnode-id="6013" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d251514731e985" title="Engman, A., and C. Cranford. 2016. Habit and the Body: Lessons for Social Theories of Habit from the Experiences of People with Physical Disabilities. Sociological Theory 34 (1): 27–44."><span data-dcnode-id="6014" instrument_node="">2016</span></a><span data-dcnode-id="6012" instrument_node="">; Hertz </span><a aria-label="Reference 2013" data-dcnode-id="6010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d251514731e988" title="Hertz, R. 2013[1960]. Death and the Right Hand. New York: Routledge"><span data-dcnode-id="6011" instrument_node="">2013</span></a><span data-dcnode-id="6009" instrument_node="">[1960]; Merleau-Ponty </span><a aria-label="Reference 1962" data-dcnode-id="6007" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d251514731e991" title="Merleau-Ponty, M. 1962. Phenomenology of Perception. London: Psychology Press."><span data-dcnode-id="6008" instrument_node="">1962</span></a><span data-dcnode-id="6006" instrument_node="">, </span><a aria-label="Reference 1968" data-dcnode-id="6004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d251514731e994" title="Merleau-Ponty, M. 1968. The Visible and the Invisible. Evanston: Northwestern University Press."><span data-dcnode-id="6005" instrument_node="">1968</span></a><span data-dcnode-id="6003" instrument_node="">; Schwartz </span><a aria-label="Reference 1981" data-dcnode-id="6001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d251514731e998" title="Schwartz, B. 1981. Vertical Classification: A Study in Structuralism and the Sociology of Knowledge. Chicago: University of Chicago Press."><span data-dcnode-id="6002" instrument_node="">1981</span></a><span data-dcnode-id="6000" instrument_node="">; Wacquant </span><a aria-label="Reference 2004" data-dcnode-id="5998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR179" id="ref-link-section-d251514731e1001" title="Wacquant, L.J.D. 2004. Body &amp; Soul: Notebooks of an Apprentice Boxer. Oxford: Oxford University Press."><span data-dcnode-id="5999" instrument_node="">2004</span></a><span data-dcnode-id="5997" instrument_node="">)</span></p><p data-dcnode-id="5961"><span data-dcnode-id="5995" instrument_node="">In this </span><i data-dcnode-id="5993"><span data-dcnode-id="5994" instrument_node="">modal</span></i><span data-dcnode-id="5992" instrument_node=""> conception, words and phrases serve as contextual pointers to concepts, but they are not themselves concepts. Rather, concepts are dynamically built-up from elements recruited from the modal systems of perception, action, and emotion used to interact with the world (Evans </span><a aria-label="Reference 2009" data-dcnode-id="5990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d251514731e1010" title="Evans, V. 2009. How Words Mean: Lexical Concepts, Cognitive Models, and Meaning Construction. Oxford: Oxford University Press."><span data-dcnode-id="5991" instrument_node="">2009</span></a><span data-dcnode-id="5989" instrument_node="">; Gallese and Lakoff </span><a aria-label="Reference 2005" data-dcnode-id="5987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d251514731e1013" title="Gallese, V., and G. Lakoff. 2005. The Brain’s Concepts: The Role of the Sensory-Motor System in Conceptual Knowledge. Cognitive Neuropsychology 22 (3): 455–479."><span data-dcnode-id="5988" instrument_node="">2005</span></a><span data-dcnode-id="5986" instrument_node="">). Concepts and categories, rather than being singular “tokens,” are best understood as made up of a panoply of context-sensitive infra-individual processes recruited for specific typification tasks in context (Barsalou </span><a aria-label="Reference 2003b" data-dcnode-id="5984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d251514731e1016" title="Barsalou, L.W. 2003b. Situated Simulation in the Human Conceptual System. Language and Cognitive Processes 18 (5–6): 513–562."><span data-dcnode-id="5985" instrument_node="">2003b</span></a><span data-dcnode-id="5983" instrument_node="">). A key discovery here is the structural overlap between systems used for “online” action (including speaking) and systems used for “offline” thinking at the neural level. Persons rely on the same neural structures that they use to </span><i data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">do things</span></i><span data-dcnode-id="5980" instrument_node=""> to </span><i data-dcnode-id="5978"><span data-dcnode-id="5979" instrument_node="">imagine things</span></i><span data-dcnode-id="5977" instrument_node="">; imagining is “grounded” in the doing (Anderson </span><a aria-label="Reference 2014" data-dcnode-id="5975" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d251514731e1026" title="Anderson, M.L. 2014. After Phrenology: Neural Reuse and the Interactive Brain. Cambridge: MIT Press."><span data-dcnode-id="5976" instrument_node="">2014</span></a><span data-dcnode-id="5974" instrument_node="">; Barsalou </span><a aria-label="Reference 2003b" data-dcnode-id="5972" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d251514731e1029" title="Barsalou, L.W. 2003b. Situated Simulation in the Human Conceptual System. Language and Cognitive Processes 18 (5–6): 513–562."><span data-dcnode-id="5973" instrument_node="">2003b</span></a><span data-dcnode-id="5971" instrument_node="">; Glenberg and Kaschak </span><a aria-label="Reference 2002" data-dcnode-id="5969" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d251514731e1032" title="Glenberg, A.M., and M.P. Kaschak. 2002. Grounding Language in Action. Psychonomic Bulletin &amp; Review 9 (3): 558–565."><span data-dcnode-id="5970" instrument_node="">2002</span></a><span data-dcnode-id="5968" instrument_node="">; Johnson and Lakoff </span><a aria-label="Reference 2002" data-dcnode-id="5966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d251514731e1035" title="Johnson, M., and G. Lakoff. 2002. Why Cognitive Linguistics Requires Embodied Realism. Cognitive Linguistics 13 (3): 245–264."><span data-dcnode-id="5967" instrument_node="">2002</span></a><span data-dcnode-id="5965" instrument_node="">; Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5963" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1038" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5964" instrument_node="">2009</span></a><span data-dcnode-id="5962" instrument_node="">).</span></p><p data-dcnode-id="5950"><span data-dcnode-id="5960" instrument_node="">The implications of the modal conception of linguistic meaning for cultural sociology are important. Acts of linguistic categorization are not just products of arbitrary convention, precariously maintained by social consensus. Instead, cultural categories are grounded in non-arbitrary resources, based on people’s ability to extract the correlational structure of experience from continued, pragmatic, embodied engagement with the material affordances of the environment (Bloch </span><a aria-label="Reference 2012" data-dcnode-id="5958" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d251514731e1044" title="Bloch, M. 2012. Anthropology and the Cognitive Challenge. Anthropology and the Cognitive Challenge. Cambridge: Cambridge University Press."><span data-dcnode-id="5959" instrument_node="">2012</span></a><span data-dcnode-id="5957" instrument_node="">; Bourdieu </span><a aria-label="Reference 1990" data-dcnode-id="5955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d251514731e1047" title="Bourdieu, P. 1990. The Logic of Practice. Palo Alto: Stanford University Press."><span data-dcnode-id="5956" instrument_node="">1990</span></a><span data-dcnode-id="5954" instrument_node="">; Wood et al. </span><a aria-label="Reference 2018" data-dcnode-id="5952" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR191" id="ref-link-section-d251514731e1050" title="Wood, M.L., D.S. Stoltz, J. Van Ness, and M.A. Taylor. 2018. Schemas and Frames. Sociological Theory 36 (3): 244–261."><span data-dcnode-id="5953" instrument_node="">2018</span></a><span data-dcnode-id="5951" instrument_node="">). We illustrate the implications of this overall claim in two domains: (1) how people represent and categorize objects, and (2) how people recruit modal representations obtained from concrete experiences to reason metaphorically about abstract concepts.</span></p><p data-dcnode-id="5936"><span data-dcnode-id="5949" instrument_node="">In a review of functional neuroimaging research on object perception, Martin (</span><a aria-label="Reference 2007" data-dcnode-id="5947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d251514731e1056" title="Martin, A. 2007. The Representation of Object Concepts in the Brain. Annual Review of Psychology 58: 25–45."><span data-dcnode-id="5948" instrument_node="">2007</span></a><span data-dcnode-id="5946" instrument_node="">) finds perceived properties of objects are stored in sensorimotor systems active during the time of exposure. During conversations, when objects are referenced but not present, the same sensorimotor traces are activated to “represent” these objects for both speaker and recipient (see also Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1059" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5945" instrument_node="">2009</span></a><span data-dcnode-id="5943" instrument_node="">). This tenet is contrary to amodal theories of language, which presume that “we can begin to speak of language only when vocal expressions have become capable of detachment from the immediate ‘here and now’” (Berger and Luckmann </span><a aria-label="Reference 1966" data-dcnode-id="5941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d251514731e1062" title="Berger, P.L., and T. Luckmann. 1966. The Social Construction of Reality: A Treatise in the Sociology of Knowledge. London: Anchor Books."><span data-dcnode-id="5942" instrument_node="">1966</span></a><span data-dcnode-id="5940" instrument_node="">, p. 51). Instead, comprehension of words happens via similar neural mechanisms as those involved in the comprehension and execution of other “indexical” signifying actions such as gestures. This postulate is also true for “speech sound” as an object, as there is evidence the act of auditory comprehension incorporates the same “motor representations of the articulatory gestures that would be necessary to produce these speech sounds” (Willems and Hagoort </span><a aria-label="Reference 2007" data-dcnode-id="5938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR185" id="ref-link-section-d251514731e1065" title="Willems, R.M., and P. Hagoort. 2007. Neural Evidence for the Interplay Between Language, Gesture, and Action: A Review. Brain and Language 101 (3): 278–289."><span data-dcnode-id="5939" instrument_node="">2007</span></a><span data-dcnode-id="5937" instrument_node="">, p. 279).</span></p><p data-dcnode-id="5919"><span data-dcnode-id="5935" instrument_node="">These findings are taken one step further with the motor theory of speech perception: not only does speech perception recruit motor systems, but this is a requisite for speech comprehension. Because of this integration of language and action, researchers find sign languages recruit cortical structures in deaf signers that are functionally equivalent to those that subserve spoken language in hearing persons (Willems and Hagoort </span><a aria-label="Reference 2007" data-dcnode-id="5933" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR185" id="ref-link-section-d251514731e1072" title="Willems, R.M., and P. Hagoort. 2007. Neural Evidence for the Interplay Between Language, Gesture, and Action: A Review. Brain and Language 101 (3): 278–289."><span data-dcnode-id="5934" instrument_node="">2007</span></a><span data-dcnode-id="5932" instrument_node="">, p. 286). The finding that variability at the linguistic surface is grounded in shared semantic concepts holds in fMRI studies of bilingual individuals. For instance, one study concludes that “it is possible to identify which word [the bilingual participants] are thinking about using the semantic neural representation elicited by words in either language” (Buchweitz et al. </span><a aria-label="Reference 2012" data-dcnode-id="5930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d251514731e1075" title="Buchweitz, A., B. Augusto, S.V. Shinkareva, et al. 2012. Identifying Bilingual Semantic Neural Representations Across Languages. Brain and Language 120 (3): 282–289."><span data-dcnode-id="5931" instrument_node="">2012</span></a><span data-dcnode-id="5929" instrument_node="">, p. 286; see also De Grauwe et al. </span><a aria-label="Reference 2014" data-dcnode-id="5927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d251514731e1078" title="De Grauwe, S., R.M. Willems, R. Shirley-Ann, et al. 2014. Embodied Language in First- and Second-Language Speakers: Neural Correlates of Processing Motor Verbs. Neuropsychologia 56: 334–349."><span data-dcnode-id="5928" instrument_node="">2014</span></a><span data-dcnode-id="5926" instrument_node="">). Therefore it is misleading for sociologists to speak of language as a disembodied, abstract structure, or of different languages as constructing entirely discrete worlds based on pure relations of signification (e.g., Shotter </span><a aria-label="Reference 1993" data-dcnode-id="5924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d251514731e1081" title="Shotter, J. 1993. Conversational Realities: Constructing Life Through Language. Thousand Oaks: SAGE."><span data-dcnode-id="5925" instrument_node="">1993</span></a><span data-dcnode-id="5923" instrument_node="">; Wierzbicka </span><a aria-label="Reference 1996" data-dcnode-id="5921" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR184" id="ref-link-section-d251514731e1084" title="Wierzbicka, A. 1996. Semantics: Primes and Universals. Oxford: Oxford University Press."><span data-dcnode-id="5922" instrument_node="">1996</span></a><span data-dcnode-id="5920" instrument_node="">).</span></p><p data-dcnode-id="5905"><span data-dcnode-id="5918" instrument_node="">Cultural theorists may grant that work on the neural embodiment of language may be restricted to the acquisition and use of concrete conceptual knowledge, but claim that it cannot account for how persons engage the world of more “abstract” concepts. That is, we see abstractions as more properly “cultural” with their meaning fixed by arbitrary convention (Parsons </span><a aria-label="Reference 1938" data-dcnode-id="5916" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d251514731e1090" title="Parsons, T. 1938. The Role of Ideas in Social Action. American Sociological Review 3 (5): 652–664."><span data-dcnode-id="5917" instrument_node="">1938</span></a><span data-dcnode-id="5915" instrument_node="">). Contrary to this view, the neural embodiment thesis is a general account of how people process the meanings of all concepts: both “experience-near” and “experience-distant” (Barsalou </span><a aria-label="Reference 2003a" data-dcnode-id="5913" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d251514731e1093" title="Barsalou, L.W. 2003a. Abstraction in Perceptual Symbol Systems. Philosophical Transactions of the Royal Society of London. Series B, Biological Sciences 358 (1435): 1177–1187."><span data-dcnode-id="5914" instrument_node="">2003a</span></a><span data-dcnode-id="5912" instrument_node="">; Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5910" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1096" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5911" instrument_node="">2009</span></a><span data-dcnode-id="5909" instrument_node="">). The key is to outline an infra-individual mechanism, capable of neurocognitive implementation, allowing persons to conceptualize abstractions—i.e., those not directly grounded in imminent experience—using embodied resources (Barsalou </span><a aria-label="Reference 2016" data-dcnode-id="5907" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d251514731e1099" title="Barsalou, L.W. 2016. On Staying Grounded and Avoiding Quixotic Dead Ends. Psychonomic Bulletin &amp; Review 23 (4): 1122–1142."><span data-dcnode-id="5908" instrument_node="">2016</span></a><span data-dcnode-id="5906" instrument_node="">).</span></p><p data-dcnode-id="5870"><span data-dcnode-id="5904" instrument_node="">This mechanism is </span><i data-dcnode-id="5902"><span data-dcnode-id="5903" instrument_node="">analogical transfer</span></i><span data-dcnode-id="5901" instrument_node="">, especially as instantiated in conceptual metaphors (Lakoff </span><a aria-label="Reference 1993" data-dcnode-id="5899" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d251514731e1108" title="Lakoff, G. 1993. The Contemporary Theory of Metaphor. In Metaphor and Thought, ed. A. Ortony, 202–251. Cambridge: Cambridge University Press."><span data-dcnode-id="5900" instrument_node="">1993</span></a><span data-dcnode-id="5898" instrument_node="">, </span><a aria-label="Reference 2009" data-dcnode-id="5896" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1111" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5897" instrument_node="">2009</span></a><span data-dcnode-id="5895" instrument_node="">). Via this mechanism, resources can be recruited from an experience-near (concrete) source-domain to conceptualize the structure of an experience-distant (abstract) target domain. This mechanism, foundational to first-generation work on conceptual metaphor (Gentner </span><a aria-label="Reference 1983" data-dcnode-id="5893" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d251514731e1114" title="Gentner, D. 1983. Structure-Mapping: A Theoretical Framework for Analogy. Cognitive Science 7 (2): 155–170."><span data-dcnode-id="5894" instrument_node="">1983</span></a><span data-dcnode-id="5892" instrument_node="">; Lakoff and Johnson </span><a aria-label="Reference 1980" data-dcnode-id="5890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR88" id="ref-link-section-d251514731e1117" title="Lakoff, G., and M. Johnson. 1980. Conceptual Metaphor in Everyday Language. The Journal of Philosophy 77 (8): 453–486."><span data-dcnode-id="5891" instrument_node="">1980</span></a><span data-dcnode-id="5889" instrument_node="">) and Schwartz’s exemplary sociological work on vertical classification (Hertz </span><a aria-label="Reference 2013" data-dcnode-id="5887" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d251514731e1121" title="Hertz, R. 2013[1960]. Death and the Right Hand. New York: Routledge"><span data-dcnode-id="5888" instrument_node="">2013</span></a><span data-dcnode-id="5886" instrument_node="">[1960]; Lukes </span><a aria-label="Reference 2003" data-dcnode-id="5884" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d251514731e1124" title="Lukes, S. 2003. The Grand Dichotomy of the Twentieth Century. In The Cambridge History of Twentieth Century Though, ed. Terence Ball, 602–626. Cambridge: Cambridge University Press."><span data-dcnode-id="5885" instrument_node="">2003</span></a><span data-dcnode-id="5883" instrument_node="">; Schwartz </span><a aria-label="Reference 1981" data-dcnode-id="5881" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d251514731e1127" title="Schwartz, B. 1981. Vertical Classification: A Study in Structuralism and the Sociology of Knowledge. Chicago: University of Chicago Press."><span data-dcnode-id="5882" instrument_node="">1981</span></a><span data-dcnode-id="5880" instrument_node="">),</span><sup data-dcnode-id="5875"><a data-dcnode-id="5876" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">Footnote </span></span><span data-dcnode-id="5877" instrument_node="">2</span></a></sup><span data-dcnode-id="5874" instrument_node=""> is naturally realizable in realistic neural architectures, yielding the contemporary “neural theory of metaphor” (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5872" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1140" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5873" instrument_node="">2009</span></a><span data-dcnode-id="5871" instrument_node="">).</span></p><p data-dcnode-id="5808"><span data-dcnode-id="5869" instrument_node="">Take, for example, professional success, which people often associate with verticality metaphors such as “moving [on] </span><i data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">up</span></i><span data-dcnode-id="5866" instrument_node="">,” “</span><i data-dcnode-id="5864"><span data-dcnode-id="5865" instrument_node="">climbing</span></i><span data-dcnode-id="5863" instrument_node=""> the corporate ladder,” “getting a </span><i data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">raise</span></i><span data-dcnode-id="5860" instrument_node="">,” or “coming out on </span><i data-dcnode-id="5858"><span data-dcnode-id="5859" instrument_node="">top</span></i><span data-dcnode-id="5857" instrument_node="">.” Success may also be associated with forward movement along a path, “getting </span><i data-dcnode-id="5855"><span data-dcnode-id="5856" instrument_node="">ahead</span></i><span data-dcnode-id="5854" instrument_node="">,” “</span><i data-dcnode-id="5852"><span data-dcnode-id="5853" instrument_node="">surpassing</span></i><span data-dcnode-id="5851" instrument_node="">,” “</span><i data-dcnode-id="5849"><span data-dcnode-id="5850" instrument_node="">advancing</span></i><span data-dcnode-id="5848" instrument_node="">,” “going the </span><i data-dcnode-id="5846"><span data-dcnode-id="5847" instrument_node="">distance</span></i><span data-dcnode-id="5845" instrument_node="">,” or “leaving everyone else </span><i data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">behind</span></i><span data-dcnode-id="5842" instrument_node="">.” Often success is not without difficulty, which tends to be understood as </span><i data-dcnode-id="5840"><span data-dcnode-id="5841" instrument_node="">obstacles</span></i><span data-dcnode-id="5839" instrument_node=""> along the path or ladder that must be </span><i data-dcnode-id="5837"><span data-dcnode-id="5838" instrument_node="">overcome</span></i><span data-dcnode-id="5836" instrument_node="">, however, certain people may “run into a </span><i data-dcnode-id="5834"><span data-dcnode-id="5835" instrument_node="">barrier</span></i><span data-dcnode-id="5833" instrument_node="">,” or certain groups may encounter a “glass </span><i data-dcnode-id="5831"><span data-dcnode-id="5832" instrument_node="">ceiling</span></i><span data-dcnode-id="5830" instrument_node="">,” stopping their forward progress (see Lakoff and Johnson </span><a aria-label="Reference 1999" data-dcnode-id="5828" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR89" id="ref-link-section-d251514731e1187" title="Lakoff, G., and M. Johnson. 1999. Philosophy in the Flesh: The Embodied Mind and Its Challenge to Western Thought. New York: Basic Books."><span data-dcnode-id="5829" instrument_node="">1999</span></a><span data-dcnode-id="5827" instrument_node="">, pp. 52–53). At the level of lexical choices there is a variety of words and phrases, but when reduced to the embodied concepts underlying each, we can see an implicit (and coherent) </span><i data-dcnode-id="5825"><span data-dcnode-id="5826" instrument_node="">cultural model</span></i><span data-dcnode-id="5824" instrument_node=""> of professional success/failure. As this domain is less experience-near than, say, walking in a field or up a hill, it is conceptualized by analogy to bodies moving along more or less difficult terrain. Conceptualizing abstract domains using motion metaphors re-activates many of the same sensorimotor schemas that would be used if one was moving (Casasanto and Boroditsky </span><a aria-label="Reference 2008" data-dcnode-id="5822" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d251514731e1193" title="Casasanto, D., and L. Boroditsky. 2008. Time in the Mind: Using Space to Think About Time. Cognition 106 (2): 579–593."><span data-dcnode-id="5823" instrument_node="">2008</span></a><span data-dcnode-id="5821" instrument_node="">; Sakreida et al. </span><a aria-label="Reference 2013" data-dcnode-id="5819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR139" id="ref-link-section-d251514731e1196" title="Sakreida, K., S. Katrin, S. Claudia, et al. 2013. Are abstract action words embodied? An fMRI investigation at the interface between language and motor cognition. Frontiers in Human Neuroscience 7: 125."><span data-dcnode-id="5820" instrument_node="">2013</span></a><span data-dcnode-id="5818" instrument_node="">; Wood et al. </span><a aria-label="Reference 2018" data-dcnode-id="5816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR191" id="ref-link-section-d251514731e1200" title="Wood, M.L., D.S. Stoltz, J. Van Ness, and M.A. Taylor. 2018. Schemas and Frames. Sociological Theory 36 (3): 244–261."><span data-dcnode-id="5817" instrument_node="">2018</span></a><span data-dcnode-id="5815" instrument_node="">), providing intuitive internal coherence to the model (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1203" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5814" instrument_node="">2009</span></a><span data-dcnode-id="5812" instrument_node="">), and explaining its “catchiness” (Sperber </span><a aria-label="Reference 1996" data-dcnode-id="5810" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR152" id="ref-link-section-d251514731e1206" title="Sperber, D. 1996. Explaining Culture: A Naturalistic Approach. New York: Wiley."><span data-dcnode-id="5811" instrument_node="">1996</span></a><span data-dcnode-id="5809" instrument_node="">, pp. 57–67).</span></p><p data-dcnode-id="5791"><span data-dcnode-id="5807" instrument_node="">The modal conception of linguistic meaning and conceptualization just sketched also suggests cultural sociologists should handle neo-Saussurean “meaning contrastive” notions with care and a little more skepticism (Bloch </span><a aria-label="Reference 2012" data-dcnode-id="5805" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d251514731e1212" title="Bloch, M. 2012. Anthropology and the Cognitive Challenge. Anthropology and the Cognitive Challenge. Cambridge: Cambridge University Press."><span data-dcnode-id="5806" instrument_node="">2012</span></a><span data-dcnode-id="5804" instrument_node="">). Perhaps the most influential neo-Saussurean concept in American cultural sociology is that of the “binary code.” Alexander and Smith, for instance, claim that “binary opposition” is “a </span><i data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">precondition</span></i><span data-dcnode-id="5801" instrument_node=""> of discourse” (</span><a aria-label="Reference 2001" data-dcnode-id="5799" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d251514731e1218" title="Alexander, J.C., and P. Smith. 2001. The Strong Program in Cultural Theory: Elements of a Structural Hermeneutics. In Handbooks of Sociological Theory, ed. Jonathan H. Turner, 135–150. New York: Springer."><span data-dcnode-id="5800" instrument_node="">2001</span></a><span data-dcnode-id="5798" instrument_node="">, p. 143, emphasis added) and go even further to argue “that culture [is] a classification system consisting of binary oppositions” (</span><a aria-label="Reference 2001" data-dcnode-id="5796" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d251514731e1221" title="Alexander, J.C., and P. Smith. 2001. The Strong Program in Cultural Theory: Elements of a Structural Hermeneutics. In Handbooks of Sociological Theory, ed. Jonathan H. Turner, 135–150. New York: Springer."><span data-dcnode-id="5797" instrument_node="">2001</span></a><span data-dcnode-id="5795" instrument_node="">, p. 145). With “political culture,” this binary structure establishes “the categories of sacred and profane in civic life” (Alexander </span><a aria-label="Reference 1992a" data-dcnode-id="5793" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d251514731e1224" title="Alexander, J.C. 1992a. Cultivating Differences: Symbolic Boundaries and the Making of Inequality. In Citizen and Enemy as Symbolic Classification: On the Polarizing Discourse of Civil Society, ed. M. Lamont and M. Fournier, 289–308. Chicago: University of Chicago Press."><span data-dcnode-id="5794" instrument_node="">1992a</span></a><span data-dcnode-id="5792" instrument_node="">, p. 302).</span></p><p data-dcnode-id="5768"><span data-dcnode-id="5790" instrument_node="">Although binaries are pervasive in social life, their power to “structure” may not be necessarily due to their foundational status in a </span><i data-dcnode-id="5788"><span data-dcnode-id="5789" instrument_node="">disembodied</span></i><span data-dcnode-id="5787" instrument_node=""> sign system. Rather, we can conceive binaries from a modal embodiment perspective, as emerging from the sensorimotor and proprioceptive experience of our “binary” bodies as first noted in classic work in embodied phenomenology (e.g., Todes </span><a aria-label="Reference 2001" data-dcnode-id="5785" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR170" id="ref-link-section-d251514731e1233" title="Todes, S. 2001. Body and World. Cambridge: MIT Press."><span data-dcnode-id="5786" instrument_node="">2001</span></a><span data-dcnode-id="5784" instrument_node="">)—back and front, up and down, left and right—which carry their own unique, and often asymmetrical, entailments, as also recognized by Durkheim, Mauss, and their students (Hertz </span><a aria-label="Reference 2013" data-dcnode-id="5782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d251514731e1236" title="Hertz, R. 2013. Death and the Right Hand. New York: Routledge."><span data-dcnode-id="5783" instrument_node="">2013</span></a><span data-dcnode-id="5781" instrument_node="">; Lukes </span><a aria-label="Reference 2003" data-dcnode-id="5779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d251514731e1239" title="Lukes, S. 2003. The Grand Dichotomy of the Twentieth Century. In The Cambridge History of Twentieth Century Though, ed. Terence Ball, 602–626. Cambridge: Cambridge University Press."><span data-dcnode-id="5780" instrument_node="">2003</span></a><span data-dcnode-id="5778" instrument_node="">; Schwartz </span><a aria-label="Reference 1981" data-dcnode-id="5776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR143" id="ref-link-section-d251514731e1242" title="Schwartz, B. 1981. Vertical Classification: A Study in Structuralism and the Sociology of Knowledge. Chicago: University of Chicago Press."><span data-dcnode-id="5777" instrument_node="">1981</span></a><span data-dcnode-id="5775" instrument_node="">). The enablements and constraints of binary discourse are thus grounded in the meaning-making potential of the body (Dreyfus and Spinosa </span><a aria-label="Reference 1999" data-dcnode-id="5773" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d251514731e1246" title="Dreyfus, H.L., and C. Spinosa. 1999. Coping with Things-in-Themselves: A Practice-Based Phenomenological Argument for Realism. Inquiry: A Journal of Medical Care Organization, Provision and Financing 42 (1): 49–78."><span data-dcnode-id="5774" instrument_node="">1999</span></a><span data-dcnode-id="5772" instrument_node="">) linking action, conceptualization, and culture at an infra-individual level (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5770" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1249" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5771" instrument_node="">2009</span></a><span data-dcnode-id="5769" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="5557" data-title="Neural embodiment and the problem of intersubjectivity"><div class="c-article-section" data-dcnode-id="5558" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5763" id="Sec10"><span data-dcnode-id="5764" instrument_node="">Neural embodiment and the problem of intersubjectivity</span></h2><div class="c-article-section__content" data-dcnode-id="5559" id="Sec10-content"><p data-dcnode-id="5740"><span data-dcnode-id="5762" instrument_node="">“Every day” reality is taken-for-granted as shared; it is an “intersubjective” world (Garfinkel </span><a aria-label="Reference 1967" data-dcnode-id="5760" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d251514731e1261" title="Garfinkel, H. 1967. Studies in Ethnomethodology. Upper Saddle River: Prentice-Hall."><span data-dcnode-id="5761" instrument_node="">1967</span></a><span data-dcnode-id="5759" instrument_node="">, p. 36). Intersubjectivity maintains a hallowed place in cultural sociology as it would be hard to imagine social organization at any level without some attunement of thought and feeling between two or more individuals.</span><sup data-dcnode-id="5754"><a data-dcnode-id="5755" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="5757"><span data-dcnode-id="5758" instrument_node="">Footnote </span></span><span data-dcnode-id="5756" instrument_node="">3</span></a></sup><span data-dcnode-id="5753" instrument_node=""> Beginning with Berger and Luckmann (</span><a aria-label="Reference 1966" data-dcnode-id="5751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d251514731e1271" title="Berger, P.L., and T. Luckmann. 1966. The Social Construction of Reality: A Treatise in the Sociology of Knowledge. London: Anchor Books."><span data-dcnode-id="5752" instrument_node="">1966</span></a><span data-dcnode-id="5750" instrument_node="">), and the dividends paid by Schutz’s phenomenological sociology, the “problem” of intersubjectivity is the “enigma of how man [sic] can understand his fellow man [sic]” (Schutz </span><a aria-label="Reference 1962" data-dcnode-id="5748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR142" id="ref-link-section-d251514731e1274" title="Schutz, A. 1962. Collected Papers. Netherlands: Springer."><span data-dcnode-id="5749" instrument_node="">1962</span></a><span data-dcnode-id="5747" instrument_node="">, p. 179; see also Russell </span><a aria-label="Reference 1905" data-dcnode-id="5745" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR136" id="ref-link-section-d251514731e1277" title="Russell, B. 1905. On Denoting. Mind: A Quarterly Review of Psychology and Philosophy 14 (56): 479–493."><span data-dcnode-id="5746" instrument_node="">1905</span></a><span data-dcnode-id="5744" instrument_node="">, p. 480). It is interesting, however, precisely because it is only an enigma for those who have time and motivation to think about it. It takes a “special motive” to make our intersubjective reality problematic (Garfinkel </span><a aria-label="Reference 1967" data-dcnode-id="5742" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d251514731e1281" title="Garfinkel, H. 1967. Studies in Ethnomethodology. Upper Saddle River: Prentice-Hall."><span data-dcnode-id="5743" instrument_node="">1967</span></a><span data-dcnode-id="5741" instrument_node="">, p. 37), and therefore it happens rarely. Presumably, we cannot have direct experience of another’s subjectivity, and so, since Schutz, sociologists have attempted to explain the ease with which ego can seem to know what alter is thinking.</span></p><p data-dcnode-id="5726"><span data-dcnode-id="5739" instrument_node="">The phenomenological solution involves positing that persons rely on a set of </span><i data-dcnode-id="5737"><span data-dcnode-id="5738" instrument_node="">default assumptions</span></i><span data-dcnode-id="5736" instrument_node=""> presuming the existence of intersubjective agreement before examining whether such evidence exists (Stoltz and Lizardo </span><a aria-label="Reference 2018" data-dcnode-id="5734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR158" id="ref-link-section-d251514731e1290" title="Stoltz, D.S., and O. Lizardo. 2018. Deliberate Trust and Intuitive Faith: A Dual-Process Model of Reliance. Journal for the Theory of Social Behaviour 48 (2): 230–250."><span data-dcnode-id="5735" instrument_node="">2018</span></a><span data-dcnode-id="5733" instrument_node="">). When such assumptions are violated, the situation requires more or less deliberate repair. People learn the default assumptions via prior experience; shared understandings are built “by people testing and checking each other’s talk, by them questioning and challenging it, reformulating and elaborating it” (Shotter </span><a aria-label="Reference 1993" data-dcnode-id="5731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR149" id="ref-link-section-d251514731e1293" title="Shotter, J. 1993. Conversational Realities: Constructing Life Through Language. Thousand Oaks: SAGE."><span data-dcnode-id="5732" instrument_node="">1993</span></a><span data-dcnode-id="5730" instrument_node="">, p. 1; see Iacoboni </span><a aria-label="Reference 2009" data-dcnode-id="5728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d251514731e1296" title="Iacoboni, M. 2009. Imitation, Empathy, and Mirror Neurons. Annual Review of Psychology 60: 653–670."><span data-dcnode-id="5729" instrument_node="">2009</span></a><span data-dcnode-id="5727" instrument_node="">, p. 666 for a critique).</span></p><p data-dcnode-id="5712"><span data-dcnode-id="5725" instrument_node="">This solution, which we might call </span><i data-dcnode-id="5723"><span data-dcnode-id="5724" instrument_node="">deliberative</span></i><span data-dcnode-id="5722" instrument_node="">, is valid sometimes, but it is unlikely to represent the fundamental way in which persons relate to one another at an intersubjective level (Gallese and Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5720" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251514731e1305" title="Gallese, V., and T. Metzinger. 2003. Motor Ontology: The Representational Reality of Goals, Actions and Selves. Philosophical Psychology 16 (3): 365–388."><span data-dcnode-id="5721" instrument_node="">2003</span></a><span data-dcnode-id="5719" instrument_node="">). One problem is that the deliberative solution overlooks what Maurice Bloch calls the “indeterminacy concerning the physical boundaries of individuals” (</span><a aria-label="Reference 2015" data-dcnode-id="5717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d251514731e1308" title="Bloch, M. 2015. In and Out of Each Other’s Bodies: Theory of Mind, Evolution, Truth, and the Nature of the Social. New York: Routledge."><span data-dcnode-id="5718" instrument_node="">2015</span></a><span data-dcnode-id="5716" instrument_node="">, p. 5; see also Wilson </span><a aria-label="Reference 2004a" data-dcnode-id="5714" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR187" id="ref-link-section-d251514731e1311" title="Wilson, R.A. 2004a. Boundaries of the Mind: The Individual in the Fragile Sciences-Cognition. Cambridge: Cambridge University Press."><span data-dcnode-id="5715" instrument_node="">2004a</span></a><span data-dcnode-id="5713" instrument_node="">). It glosses over an important question (where do the selves of persons begin and end?), one which is especially problematic outside of Western cultural coordinates.</span></p><p data-dcnode-id="5695"><span data-dcnode-id="5711" instrument_node="">If experience does not dictate the “natural” boundaries of other persons, and if individuals do not rely on linguistically mediated assumptions and principles to deal with this demarcation issue, then is this massive empirical underdetermination problem solved? Recent work in the cognitive neuroscience of social cognition may hold the key to an answer. We refer in particular to the discovery of the “mirror neuron” system in humans and other primates (Gallese </span><a aria-label="Reference 1998" data-dcnode-id="5709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d251514731e1317" title="Gallese, V. 1998. Mirror Neurons and the Simulation Theory of Mind-Reading. Trends in Cognitive Sciences 2 (12): 493–501."><span data-dcnode-id="5710" instrument_node="">1998</span></a><span data-dcnode-id="5708" instrument_node="">; Iacoboni </span><a aria-label="Reference 2009" data-dcnode-id="5706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d251514731e1320" title="Iacoboni, M. 2009. Imitation, Empathy, and Mirror Neurons. Annual Review of Psychology 60: 653–670."><span data-dcnode-id="5707" instrument_node="">2009</span></a><span data-dcnode-id="5705" instrument_node="">; Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5703" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1323" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5704" instrument_node="">2009</span></a><span data-dcnode-id="5702" instrument_node="">; Lizardo </span><a aria-label="Reference 2007" data-dcnode-id="5700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR94" id="ref-link-section-d251514731e1326" title="Lizardo, O. 2007. ‘Mirror Neurons’, Collective Objects and the Problem of Transmission: Reconsidering Stephen Turner’s Critique of Practice Theory. Journal for the Theory of Social Behaviour 37 (3): 319–350."><span data-dcnode-id="5701" instrument_node="">2007</span></a><span data-dcnode-id="5699" instrument_node="">). This neural system instantiates a mechanism capable of accounting for the routine ability of persons to “read” minds and to comprehend the meaning of actions at a direct (non-symbolic) level (Gallese and Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251514731e1329" title="Gallese, V., and T. Metzinger. 2003. Motor Ontology: The Representational Reality of Goals, Actions and Selves. Philosophical Psychology 16 (3): 365–388."><span data-dcnode-id="5698" instrument_node="">2003</span></a><span data-dcnode-id="5696" instrument_node="">, p. 381).</span></p><p data-dcnode-id="5678"><span data-dcnode-id="5694" instrument_node="">As Bloch (</span><a aria-label="Reference 2015" data-dcnode-id="5692" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d251514731e1336" title="Bloch, M. 2015. In and Out of Each Other’s Bodies: Theory of Mind, Evolution, Truth, and the Nature of the Social. New York: Routledge."><span data-dcnode-id="5693" instrument_node="">2015</span></a><span data-dcnode-id="5691" instrument_node="">) argues, just as humans “go in and out of” each other’s bodies in sex and birth, they interpenetrate each other’s minds. This feat is made possible by a shared neural substrate that becomes active whenever a person performs an action </span><i data-dcnode-id="5689"><span data-dcnode-id="5690" instrument_node="">and</span></i><span data-dcnode-id="5688" instrument_node=""> perceives the execution of the same action by conspecifics (Iacoboni </span><a aria-label="Reference 2009" data-dcnode-id="5686" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d251514731e1342" title="Iacoboni, M. 2009. Imitation, Empathy, and Mirror Neurons. Annual Review of Psychology 60: 653–670."><span data-dcnode-id="5687" instrument_node="">2009</span></a><span data-dcnode-id="5685" instrument_node="">; Rizzolatti et al. </span><a aria-label="Reference 1988" data-dcnode-id="5683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d251514731e1345" title="Rizzolatti, G., R. Camarda, L. Fogassi, et al. 1988. Functional Organization of Inferior area 6 in the Macaque Monkey. Experimental Brain Research 71 (3): 491–507."><span data-dcnode-id="5684" instrument_node="">1988</span></a><span data-dcnode-id="5682" instrument_node="">). As Ferrari and Gallese (</span><a aria-label="Reference 2007" data-dcnode-id="5680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d251514731e1348" title="Ferrari, P.F., and V. Gallese. 2007. Mirror Neurons and Intersubjectivity. Advances in Consciousness Research 68: 73–88."><span data-dcnode-id="5681" instrument_node="">2007</span></a><span data-dcnode-id="5679" instrument_node="">, p. 73) note, “our nervous system has been constructed in such a way it enables us to capture others’ living experiences just by watching them.” Thus, besides providing a non-deliberative, infra-individual solution to the problem of intersubjectivity, one aligned with the actor’s phenomenological experience of the pervasive ease of mutual understanding. As such, the infra-individual mirror neuron mechanism has fruitful implications for cultural sociology. Here we briefly consider two: role-taking and solidarity, and thick description.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5676" id="Sec11"><span data-dcnode-id="5677" instrument_node="">Role-taking and solidarity</span></h3><p data-dcnode-id="5659"><span data-dcnode-id="5675" instrument_node="">As Franks notes, in Mead’s classic theory of role-taking the “actor incorporates the imagined response of the other into his emerging behavior” (</span><a aria-label="Reference 2013" data-dcnode-id="5673" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d251514731e1358" title="Franks, D.D. 2013. Why We Need Neurosociology as Well as Social Neuroscience. In Handbook of Neurosociology, ed. D.D. Franks and J.H. Turner, 27–32. New York: Springer."><span data-dcnode-id="5674" instrument_node="">2013</span></a><span data-dcnode-id="5672" instrument_node="">, p. 28). For Mead, the medium of this incorporation is the “significant symbol.” The mirror neuron mechanism reveals the embodied foundations of intersubjectivity, including the neural representation of selves, intentions, and goals at a motor level (Gallese and Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5670" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251514731e1361" title="Gallese, V., and T. Metzinger. 2003. Motor Ontology: The Representational Reality of Goals, Actions and Selves. Philosophical Psychology 16 (3): 365–388."><span data-dcnode-id="5671" instrument_node="">2003</span></a><span data-dcnode-id="5669" instrument_node="">), thus overcoming the residual linguistic bias in Mead’s conceptualization of role-taking. In this account, inferences as to the other’s state of mind can be automatically simulated from the perceptual and sensorimotor schemas gained from mundane experience in the world (Lakoff </span><a aria-label="Reference 2009" data-dcnode-id="5667" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR87" id="ref-link-section-d251514731e1364" title="Lakoff, G. 2009. The Neural Theory of Metaphor. 
https://doi.org/10.2139/ssrn.1437794

."><span data-dcnode-id="5668" instrument_node="">2009</span></a><span data-dcnode-id="5666" instrument_node="">; Wood et al. </span><a aria-label="Reference 2018" data-dcnode-id="5664" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR191" id="ref-link-section-d251514731e1367" title="Wood, M.L., D.S. Stoltz, J. Van Ness, and M.A. Taylor. 2018. Schemas and Frames. Sociological Theory 36 (3): 244–261."><span data-dcnode-id="5665" instrument_node="">2018</span></a><span data-dcnode-id="5663" instrument_node="">). This implies persons mutually coordinate at an infra-individual level without the mediation of significant symbols (linguistic or otherwise), a phenomenon with a long history of examination in sociology and psychology (going by the name of “imitation” in Tarde) and “entrainment” in contemporary interactionism (Summers-Effler et al. </span><a aria-label="Reference 2014" data-dcnode-id="5661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR164" id="ref-link-section-d251514731e1370" title="Summers-Effler, E., J. Van Ness, and C. Hausmann. 2014. Peeking in the Black Box Studying, Theorizing, and Representing the Micro-Foundations of Day-to-Day Interactions. Journal of Contemporary 44 (4): 450–479."><span data-dcnode-id="5662" instrument_node="">2014</span></a><span data-dcnode-id="5660" instrument_node="">).</span></p><p data-dcnode-id="5633"><span data-dcnode-id="5658" instrument_node="">For instance, Chartrand and Bargh (</span><a aria-label="Reference 1999" data-dcnode-id="5656" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d251514731e1376" title="Chartrand, T.L., and J.A. Bargh. 1999. The Chameleon Effect: The Perception-Behavior Link and Social Interaction. Journal of Personality and Social Psychology 76 (6): 893–910."><span data-dcnode-id="5657" instrument_node="">1999</span></a><span data-dcnode-id="5655" instrument_node="">; see also Lakin et al. </span><a aria-label="Reference 2003" data-dcnode-id="5653" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d251514731e1379" title="Lakin, J.L., V.E. Jefferis, C.M. Cheng, et al. 2003. The Chameleon Effect as Social Glue: Evidence for the Evolutionary Significance of Nonconscious Mimicry. Journal of Nonverbal Behavior 27 (3): 145–162."><span data-dcnode-id="5654" instrument_node="">2003</span></a><span data-dcnode-id="5652" instrument_node="">) refer to the automatic tendency to adopt the postures, gestures, and mannerisms of interaction partners the “chameleon effect” (cf. Collins </span><a aria-label="Reference 2004" data-dcnode-id="5650" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d251514731e1382" title="Collins, R. 2004. Interaction Ritual Chains. Princeton: Princeton University Press."><span data-dcnode-id="5651" instrument_node="">2004</span></a><span data-dcnode-id="5649" instrument_node=""> on ‘entrainment’; and see Summers-Effler et al. </span><a aria-label="Reference 2014" data-dcnode-id="5647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR164" id="ref-link-section-d251514731e1385" title="Summers-Effler, E., J. Van Ness, and C. Hausmann. 2014. Peeking in the Black Box Studying, Theorizing, and Representing the Micro-Foundations of Day-to-Day Interactions. Journal of Contemporary 44 (4): 450–479."><span data-dcnode-id="5648" instrument_node="">2014</span></a><span data-dcnode-id="5646" instrument_node=""> for an application of the neural embodiment approach to ethnography). Whether persons can “mirror” one another, and by implication share the same “lifeworld” as the other person, may thus depend on whether there is a common experiential history between them. The extent to which we can observe mirroring thus becomes an empirical question and may be tied to traditional concerns with socio-cultural processes generating and perpetuating “symbolic boundaries” between groups (Lamont et al. </span><a aria-label="Reference 2008" data-dcnode-id="5644" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR90" id="ref-link-section-d251514731e1388" title="Lamont, M., M.L. Small, D. Harris, et al. 2008. Culture Matters. The Role of Culture in Explaining Poverty. In The Colors of Poverty: Why Racial and Ethnic Disparities Persist, ed. A.L. David Harris, 76–102. New York: Russell Sage Foundation."><span data-dcnode-id="5645" instrument_node="">2008</span></a><span data-dcnode-id="5643" instrument_node="">) and reinforcing status hierarchies (Ridgeway </span><a aria-label="Reference 1991" data-dcnode-id="5641" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d251514731e1392" title="Ridgeway, C. 1991. The Social Construction of Status Value: Gender and Other Nominal Characteristics. Social Forces: A Scientific Medium of Social Study and Interpretation 70 (2): 367–386."><span data-dcnode-id="5642" instrument_node="">1991</span></a><span data-dcnode-id="5640" instrument_node="">). For instance, Cheng and Chartrand (</span><a aria-label="Reference 2003" data-dcnode-id="5638" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d251514731e1395" title="Cheng, C.M., and T.L. Chartrand. 2003. Self-Monitoring Without Awareness: Using Mimicry as a Nonconscious Affiliation Strategy. Journal of Personality and Social Psychology 85 (6): 1170–1179."><span data-dcnode-id="5639" instrument_node="">2003</span></a><span data-dcnode-id="5637" instrument_node="">) find participants more likely to mimic another if they believed them to be a “peer” rather than a “superior” (see also Molnar-Szakacs et al. </span><a aria-label="Reference 2007" data-dcnode-id="5635" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d251514731e1398" title="Molnar-Szakacs, I., M.-S. Istvan, A.D. Wu, et al. 2007. Do You See What I Mean? Corticospinal Excitability During Observation of Culture-Specific Gestures. PLoS ONE 2 (7): e626."><span data-dcnode-id="5636" instrument_node="">2007</span></a><span data-dcnode-id="5634" instrument_node=""> for cross-national comparisons of gestures).</span></p><p data-dcnode-id="5616"><span data-dcnode-id="5632" instrument_node="">This dovetails rather seamlessly to a key observation from sociology and anthropology regarding the importance of ritual in producing solidarity. Certainly, Durkheim’s </span><i data-dcnode-id="5630"><span data-dcnode-id="5631" instrument_node="">Elementary Forms</span></i><span data-dcnode-id="5629" instrument_node=""> is central to this tradition. Specifically, he observes otherwise dispersed populations “com[ing] together, concentrating itself at specified places for a period…because a collective emotion cannot be expressed collectively without some order that permits harmony and unison of movement, [their] gestures and cries tend to fall into rhythm and regularity” (quoted in Bellah </span><a aria-label="Reference 2005" data-dcnode-id="5627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR194" id="ref-link-section-d251514731e1407" title="Bellah, R.N. 2005. Durkheim and Ritual. In The Cambridge Companion to Durkheim, ed. J. C. Alexander and P. Smith, 183–210. New York: Cambridge University Press."><span data-dcnode-id="5628" instrument_node="">2005</span></a><span data-dcnode-id="5626" instrument_node="">, pp. 183–210). Similar observations are made by McNeill in </span><i data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">Keeping Together in Time,</span></i><span data-dcnode-id="5623" instrument_node=""> as it relates to “muscular bonding,” in which militaries, religions, and social movements exploit the emotional consequences of moving together in time such that individuals experience “boundary loss” or they feel as if they are one (</span><a aria-label="Reference 1997" data-dcnode-id="5621" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR195" id="ref-link-section-d251514731e1413" title="McNeill, W.H. 1997. Keeping Together in Time. Cambridge: Harvard University Press."><span data-dcnode-id="5622" instrument_node="">1997</span></a><span data-dcnode-id="5620" instrument_node="">, p. 8). More recently, Summers-Effler (</span><a aria-label="Reference 2010" data-dcnode-id="5618" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR200" id="ref-link-section-d251514731e1416" title="Summers-Effler, E. 2010. Laughing Saints and Righteous Heroes. Chicago: University of Chicago Press."><span data-dcnode-id="5619" instrument_node="">2010</span></a><span data-dcnode-id="5617" instrument_node="">), building upon Collins’ interaction rituals, explores why social movements fail or succeed. She argues that what we tend to think of as stable groups should actually be conceived as “rhythmic patterns of organization.” The mirror system provides the neural mechanism by which moving together in rhythms lays the pre-linguistic foundations of solidarity.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5614" id="Sec12"><span data-dcnode-id="5615" instrument_node="">Thick description</span></h3><p data-dcnode-id="5597"><span data-dcnode-id="5613" instrument_node="">Many sociologists are already sensitized to the diversity of embodied skill and capacity (Engman and Cranford </span><a aria-label="Reference 2016" data-dcnode-id="5611" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d251514731e1427" title="Engman, A., and C. Cranford. 2016. Habit and the Body: Lessons for Social Theories of Habit from the Experiences of People with Physical Disabilities. Sociological Theory 34 (1): 27–44."><span data-dcnode-id="5612" instrument_node="">2016</span></a><span data-dcnode-id="5610" instrument_node="">; Mellor and Shilling </span><a aria-label="Reference 2010" data-dcnode-id="5608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d251514731e1430" title="Mellor, P.A., and C. Shilling. 2010. Body Pedagogics and the Religious Habitus: A New Direction for the Sociological Study of Religion. Religion 40 (1): 27–38."><span data-dcnode-id="5609" instrument_node="">2010</span></a><span data-dcnode-id="5607" instrument_node="">; Pitts-Taylor </span><a aria-label="Reference 2015" data-dcnode-id="5605" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d251514731e1433" title="Pitts-Taylor, V. 2015. A Feminist Carnal Sociology?: Embodiment in Sociology, Feminism, and Naturalized Philosophy. Qualitative Sociology 38 (1): 19–25."><span data-dcnode-id="5606" instrument_node="">2015</span></a><span data-dcnode-id="5604" instrument_node="">) and can contribute to the growing body of research on the neuroscience of social cognition. While this opens several rich possibilities for cultural analysis, we should pursue this project with caution. Incongruences in mirroring are likely to be of social significance, but it is unlikely that we can find a limiting case of no mirroring between persons at all; only gradations in the degree of mirroring. In this respect, the existence of the mirror neuron mechanism rules out the possibility of persons occupying completely unbridgeable worlds of meaning and experience as an empirical absurdity (Gallese and Metzinger </span><a aria-label="Reference 2003" data-dcnode-id="5602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d251514731e1436" title="Gallese, V., and T. Metzinger. 2003. Motor Ontology: The Representational Reality of Goals, Actions and Selves. Philosophical Psychology 16 (3): 365–388."><span data-dcnode-id="5603" instrument_node="">2003</span></a><span data-dcnode-id="5601" instrument_node="">), thus deflating a popular argument against the unity of the natural and social sciences (e.g., Winch </span><a aria-label="Reference 2012" data-dcnode-id="5599" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR189" id="ref-link-section-d251514731e1439" title="Winch, P. 2012. The Idea of a Social Science and Its Relation to Philosophy. New York: Routledge."><span data-dcnode-id="5600" instrument_node="">2012</span></a><span data-dcnode-id="5598" instrument_node="">). Even people with drastically different life experiences, languages, and “cultures” (in the folk sense) are still likely to share a great deal of practical experiences by dint of sharing a common physical world of objects and structured experiences afforded by the body.</span></p><p data-dcnode-id="5580"><span data-dcnode-id="5596" instrument_node="">In this respect, the operation of the mirror neuron mechanism also has concrete </span><i data-dcnode-id="5594"><span data-dcnode-id="5595" instrument_node="">methodological</span></i><span data-dcnode-id="5593" instrument_node=""> implications for cultural analysis. We can draw a relevant example from Geertz’s extensive discussion (</span><a aria-label="Reference 1973" data-dcnode-id="5591" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d251514731e1448" title="Geertz, C. 1973. The Interpretation of Cultures: Selected Essays. New York: Basic Books."><span data-dcnode-id="5592" instrument_node="">1973</span></a><span data-dcnode-id="5590" instrument_node="">, pp. 6–7) of Gilbert Ryle’s (</span><a aria-label="Reference 1971" data-dcnode-id="5588" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR137" id="ref-link-section-d251514731e1451" title="Ryle, G. 1971. The Thinking of Thoughts: What is ‘le Penseur’ Doing? In Collected Papers, ed. S. Freeman. London: Hutchinson &amp; Co."><span data-dcnode-id="5589" instrument_node="">1971</span></a><span data-dcnode-id="5587" instrument_node="">) example of boys winking in his essay on “thick description.” Seen in the above light, knowing the difference between blinking and winking (or a parody of the wink) may be possible even in the absence of a shared “public code” that settles the meaning of the action (Mukerji </span><a aria-label="Reference 2014" data-dcnode-id="5585" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d251514731e1454" title="Mukerji, C. 2014. The Cultural Power of Tacit Knowledge: Inarticulacy and Bourdieu’s Habitus. American Journal of Cultural Sociology 2 (3): 348–375."><span data-dcnode-id="5586" instrument_node="">2014</span></a><span data-dcnode-id="5584" instrument_node="">). Cultural sociologists may have to countenance the possibility that the embodied simulation mechanism associating specific bodily actions with action-intentions at a non-linguistic level may fix the “meaning” of certain actions among persons. This approach also suggests that learning the “public code” of winking may not be a sufficient condition for noticing how the various fine-grained (and provisional) distinctions between, for instance, a sincere wink and a parody of a wink in situ (Lempert </span><a aria-label="Reference 2014" data-dcnode-id="5582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR91" id="ref-link-section-d251514731e1457" title="Lempert, M. 2014. Imitation. Annual Review of Anthropology 43 (1): 379–395."><span data-dcnode-id="5583" instrument_node="">2014</span></a><span data-dcnode-id="5581" instrument_node="">).</span></p><p data-dcnode-id="5560"><span data-dcnode-id="5579" instrument_node="">The implication is that so-called “thick description” may only be achieved by a deployment (whether intuitive or reflexively) of the techniques that have recently been codified as “carnal sociology” (Mears </span><a aria-label="Reference 2014" data-dcnode-id="5577" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d251514731e1463" title="Mears, A. 2014. Seeing Culture Through the Eye of the Beholder: Four Methods in Pursuit of Taste. Theory and Society 43 (3–4): 291–309."><span data-dcnode-id="5578" instrument_node="">2014</span></a><span data-dcnode-id="5576" instrument_node="">; Pitts-Taylor </span><a aria-label="Reference 2015" data-dcnode-id="5574" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d251514731e1466" title="Pitts-Taylor, V. 2015. A Feminist Carnal Sociology?: Embodiment in Sociology, Feminism, and Naturalized Philosophy. Qualitative Sociology 38 (1): 19–25."><span data-dcnode-id="5575" instrument_node="">2015</span></a><span data-dcnode-id="5573" instrument_node="">; Wacquant </span><a aria-label="Reference 2004" data-dcnode-id="5571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR179" id="ref-link-section-d251514731e1469" title="Wacquant, L.J.D. 2004. Body &amp; Soul: Notebooks of an Apprentice Boxer. Oxford: Oxford University Press."><span data-dcnode-id="5572" instrument_node="">2004</span></a><span data-dcnode-id="5570" instrument_node="">). Becker and Geer (</span><a aria-label="Reference 1957" data-dcnode-id="5568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d251514731e1472" title="Becker, H., and B. Geer. 1957. Participant Observation and Interviewing: A Comparison. Human Organization 16 (3): 28–32."><span data-dcnode-id="5569" instrument_node="">1957</span></a><span data-dcnode-id="5567" instrument_node="">, p. 28), comparing the virtues of participant observation to that of the interview, suggest that a problem for the latter is the degree to which “the researcher has observed the behavior he [sic] is talking about.” A virtue of ethnography that Geertz, Becker, Geer, and many others omit is that “participant observation” is more than just being present to “objectively” record activities on paper as they unfold (in fact, as even the well-honed human mind can only focus on so much, a great deal of potentially relevant information in the situation will evade conscious perception). Rather, the significance of the technique is that, as the analyst engages in the same activities of the participants, recording the practical requirements of those activities in the body of the analyst (Mears </span><a aria-label="Reference 2014" data-dcnode-id="5565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d251514731e1475" title="Mears, A. 2014. Seeing Culture Through the Eye of the Beholder: Four Methods in Pursuit of Taste. Theory and Society 43 (3–4): 291–309."><span data-dcnode-id="5566" instrument_node="">2014</span></a><span data-dcnode-id="5564" instrument_node="">). The participant observer can grow increasingly confident in their automatic inferences as to the meaning of an action, phrase, or event in that context as they become enculturated into the local context (Pagis </span><a aria-label="Reference 2010" data-dcnode-id="5562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d251514731e1479" title="Pagis, M. 2010. From Abstract Concepts to Experiential Knowledge: Embodying Enlightenment in a Meditation Center. Qualitative Sociology 33 (4): 469–489."><span data-dcnode-id="5563" instrument_node="">2010</span></a><span data-dcnode-id="5561" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="5390" data-title="Making one out of many: the binding problem"><div class="c-article-section" data-dcnode-id="5391" id="Sec13-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5555" id="Sec13"><span data-dcnode-id="5556" instrument_node="">Making one out of many: the binding problem</span></h2><div class="c-article-section__content" data-dcnode-id="5392" id="Sec13-content"><p data-dcnode-id="5550"><span data-dcnode-id="5554" instrument_node="">Binding is the infra-individual processes via which two initially separate cognitive (or affective) elements are “fused” into a single representation. This operation results in perceptual, cognitive, and affective constructs endowed with unitary experiential qualities. From the perspective of cultural sociology, binding may, therefore, be one of the most fundamental neurocognitive processes (Taylor et al. </span><a aria-label="Reference 2019" data-dcnode-id="5552" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR166" id="ref-link-section-d251514731e1491" title="Taylor, M.A., D.S. Stoltz, and T.E. McDonnel
