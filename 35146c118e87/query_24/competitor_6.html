</span><div class="atButton" data-dcnode-id="2949"><span data-dcnode-id="2958" instrument_node="">
</span><a addthis:description="Cognitive neuroscience seeks to discover the biological foundations of the human mind. One goal is to explain how mental operations are generated by the information processing architecture of the human brain. Our aim is to assess whether this is a well-defined objective. Our contention will be that it is not because the information processing of any given individual is not contained entirely within that individual’s brain. Rather, it typically includes components situated in the heads of others, in addition to being distributed across parts of the individual’s body and physical environment. Our focus here will be on cognition distributed across individuals, or on what we call the “community of knowledge,” the challenge that poses for reduction of cognition to neurobiology and the contribution of cognitive neuroscience to the study of communal processes." addthis:title="Cognitive Neuroscience Meets the Community of Knowledge" addthis:url="https://www.frontiersin.org/article/10.3389/fnsys.2021.675127" class="addthis_button_facebook at300b" data-dcnode-id="2951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2952" style="background-color: rgb(59, 89, 152); line-height: 16px; height: 16px; width: 16px;"><svg alt="Facebook" aria-labelledby="at-svg-facebook-1" class="at-icon at-icon-facebook" data-dcnode-id="2953" role="img" style="width: 16px; height: 16px;" title="Facebook" version="1.1" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><title data-dcnode-id="2956" id="at-svg-facebook-1">Facebook</title><g data-dcnode-id="2954"><path d="M22 5.16c-.406-.054-1.806-.16-3.43-.16-3.4 0-5.733 1.825-5.733 5.17v2.882H9v3.913h3.837V27h4.604V16.965h3.823l.587-3.913h-4.41v-2.5c0-1.123.347-1.903 2.198-1.903H22V5.16z" data-dcnode-id="2955" fill-rule="evenodd"> </span><a class="reset-hash-position" data-dcnode-id="2840" id="h1" name="h1"></a><h1 data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">Cognitive Neuroscience Meets the Community of Knowledge</span></h1><span data-dcnode-id="2837" instrument_node="">
</span><div class="authors" data-dcnode-id="2818"><span data-dcnode-id="2836" instrument_node="">
</span><a class="user-id-1251398" data-dcnode-id="2833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/1251398"><img alt="" class="pr5" data-dcnode-id="2835" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/1251398/24&amp;raw"><span data-dcnode-id="2834" instrument_node="">Steven A. Sloman</span></a><sup data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">1</span></sup><span data-dcnode-id="2830" instrument_node="">, </span><a class="user-id-40182" data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/40182"><img alt="" class="pr5" data-dcnode-id="2829" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//loop.frontiersin.org/images/profile/40182/24&amp;raw"><span data-dcnode-id="2828" instrument_node="">Richard Patterson</span></a><sup data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">2</span></sup><span data-dcnode-id="2824" instrument_node=""> and </span><a class="user-id-20101" data-dcnode-id="2821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/people/u/20101"><img alt="" class="pr5" data-dcnode-id="2823" onerror="this.src='https://f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg'" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f96a1a95aaa960e01625-a34624e694c43cdf8b40aa048a644ca4.ssl.cf2.rackcdn.com/Design/Images/newprofile_default_profileimage_new.jpg&amp;raw"><span data-dcnode-id="2822" instrument_node="">Aron K. Barbey</span></a><sup data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">3,4,5,6*</span></sup></div><span data-dcnode-id="2817" instrument_node="">
</span><ul class="notes" data-dcnode-id="2779"><span data-dcnode-id="2816" instrument_node="">
</span><li data-dcnode-id="2811"><span data-dcnode-id="2813"><sup data-dcnode-id="2814"><span data-dcnode-id="2815" instrument_node="">1</span></sup></span><span data-dcnode-id="2812" instrument_node="">Department of Cognitive, Linguistic, and Psychological Sciences, Brown University, Providence, RI, United States</span></li><span data-dcnode-id="2810" instrument_node="">
</span><li data-dcnode-id="2805"><span data-dcnode-id="2807"><sup data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">2</span></sup></span><span data-dcnode-id="2806" instrument_node="">Department of Philosophy, Emory University, Atlanta, GA, United States</span></li><span data-dcnode-id="2804" instrument_node="">
</span><li data-dcnode-id="2799"><span data-dcnode-id="2801"><sup data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">3</span></sup></span><span data-dcnode-id="2800" instrument_node="">Department of Psychology, University of Illinois at Urbana-Champaign, Champaign, IL, United States</span></li><span data-dcnode-id="2798" instrument_node="">
</span><li data-dcnode-id="2793"><span data-dcnode-id="2795"><sup data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">4</span></sup></span><span data-dcnode-id="2794" instrument_node="">Department of Bioengineering, University of Illinois at Urbana-Champaign, Champaign, IL, United States</span></li><span data-dcnode-id="2792" instrument_node="">
</span><li data-dcnode-id="2787"><span data-dcnode-id="2789"><sup data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">5</span></sup></span><span data-dcnode-id="2788" instrument_node="">Neuroscience Program, University of Illinois at Urbana-Champaign, Champaign, IL, United States</span></li><span data-dcnode-id="2786" instrument_node="">
</span><li data-dcnode-id="2781"><span data-dcnode-id="2783"><sup data-dcnode-id="2784"><span data-dcnode-id="2785" instrument_node="">6</span></sup></span><span data-dcnode-id="2782" instrument_node="">Beckman Institute for Advanced Science and Technology, University of Illinois at Urbana-Champaign, Champaign, IL, United States</span></li><span data-dcnode-id="2780" instrument_node="">
</span></ul><span data-dcnode-id="2778" instrument_node="">
</span><p class="mb0" data-dcnode-id="2776"><span data-dcnode-id="2777" instrument_node="">Cognitive neuroscience seeks to discover the biological foundations of the human mind. One goal is to explain how mental operations are generated by the information processing architecture of the human brain. Our aim is to assess whether this is a well-defined objective. Our contention will be that it is not because the information processing of any given individual is not contained entirely within that individual’s brain. Rather, it typically includes components situated in the heads of others, in addition to being distributed across parts of the individual’s body and physical environment. Our focus here will be on cognition distributed across individuals, or on what we call the “community of knowledge,” the challenge that poses for reduction of cognition to neurobiology and the contribution of cognitive neuroscience to the study of communal processes.</span></p><span data-dcnode-id="2775" instrument_node="">
</span><div class="clear" data-dcnode-id="2774"></div><span data-dcnode-id="2773" instrument_node="">
</span></div><span data-dcnode-id="2771" instrument_node="">
</span><div class="JournalFullText" data-dcnode-id="462"><span data-dcnode-id="2770" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2769" id="h2" name="h2"></a><h2 data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">The Individual Brain and Collective Mind</span></h2><span data-dcnode-id="2766" instrument_node="">
</span><p class="mb15" data-dcnode-id="2761"><span data-dcnode-id="2765" instrument_node="">A central aim of cognitive neuroscience is to explain how people think, elucidating the representations and processes that allow humans to judge, reason, remember, and decide (</span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2764" instrument_node="">Barbey et al., 2021</span></a><span data-dcnode-id="2762" instrument_node="">). To achieve this goal, cognitive neuroscientific theories have as a rule made certain fundamental assumptions:</span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758" style="margin-left: 2em;text-indent:-1.4em;margin-top: 0.5em;margin-bottom: 0em;"><span data-dcnode-id="2759" instrument_node="">(a) Knowledge is represented in the brain.</span></p><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755" style="margin-left: 2em;text-indent:-1.4em;margin-top: 0em;margin-bottom: 0em;"><span data-dcnode-id="2756" instrument_node="">(b) Knowledge is represented by the individual.</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2752" style="margin-left: 2em;text-indent:-1.4em;margin-top: 0em;margin-bottom: 0.5em;"><span data-dcnode-id="2753" instrument_node="">(c) Knowledge is transferred between individuals.</span></p><span data-dcnode-id="2751" instrument_node="">
</span><p class="mb15" data-dcnode-id="2731"><span data-dcnode-id="2750" instrument_node="">where “knowledge” is understood broadly—as it usually is in behavioral science—as people’s attempts to represent their world, including both observable and latent objects and processes, in ways that support memory, understanding, reasoning, and decision making. It includes beliefs that are more or less justified, and that might correspond to factual truth or not. Evidence to suggest that knowledge is represented in the brain [assumption (a)] may reflect: (1) correlations with neural activity (e.g., spike trains generated by neurons in V1 correlate with the presence and location of edges in the visual environment), (2) causal effects of knowledge on the operation of neural systems (e.g., spike trains generated by neurons in V1 are used by downstream areas for further processing), and/or (3) neural computations applied to manipulate and process knowledge. Although assumption (a) is typical of theories in the psychological and brain sciences (for reviews, see </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2749" instrument_node="">Gazzaniga et al., 2019</span></a><span data-dcnode-id="2747" instrument_node="">; </span><a data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2746" instrument_node="">Barbey et al., 2021</span></a><span data-dcnode-id="2744" instrument_node="">), it is not universal. Proponents of embodied cognition see knowledge as distributed across the brain, the body, and artifacts used to process information (e.g., </span><a data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="2743" instrument_node="">Barsalou, 2008</span></a><span data-dcnode-id="2741" instrument_node="">) and proponents of cultural psychology sometimes see knowledge as embedded in cultural practices (</span><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="2740" instrument_node="">Duque et al., 2010</span></a><span data-dcnode-id="2738" instrument_node="">; </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2737" instrument_node="">Holmes, 2020</span></a><span data-dcnode-id="2735" instrument_node="">). But assumptions (b) and (c) are widely shared by disciplines that focus on cognition (for a review, see </span><a data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="2734" instrument_node="">Boone and Piccinini, 2016</span></a><span data-dcnode-id="2732" instrument_node="">). The idea is that what really counts as cognition is mediated by individual processes of reasoning and decision making; that cognitive processing is distinct from interactions with books, the internet, other people, and so on. Moreover, other people are obviously sources of information, but their value for an individual is in the information they transfer. The goal of this manuscript is to question the generality of these assumptions, spell out some of the resulting limitations of the cognitive neuroscience approach, and try to suggest some more constructive directions for the field. Our contention will be that the information processing of any given individual is not contained entirely within that individual’s brain (or even their bodies or physical environments). Rather, it typically includes components situated in the heads of others, and that the transfer of information is more the exception than the rule.</span></p><span data-dcnode-id="2730" instrument_node="">
</span><p class="mb15" data-dcnode-id="2722"><span data-dcnode-id="2729" instrument_node="">Assumption (a) as usually understood implies (b). If knowledge is represented in the brain, then it is represented by individuals. Thus standard neuroimaging methods assess brain activity and task performance within the individual (for a review of fMRI methods, see </span><a data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2728" instrument_node="">Bandettini, 2012</span></a><span data-dcnode-id="2726" instrument_node="">). According to this view, the neural foundations of the human mind can be discovered by studying the individual brain and identifying common patterns of brain activity across individuals. Thus, by averaging data from multiple subjects, cognitive neuroscience seeks to derive general principles of brain function and thereby reveal the mechanisms that drive human cognition. This approach lies at the heart of modern research in cognitive neuroscience, reflecting a disciplinary aim to generalize beyond the individual to characterize fundamental properties of the human mind using widely held methodological conventions, such as averaging data from multiple subjects, to infer general principles of brain function (</span><a data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2725" instrument_node="">Gazzaniga et al., 2019</span></a><span data-dcnode-id="2723" instrument_node="">).</span></p><span data-dcnode-id="2721" instrument_node="">
</span><p class="mb0" data-dcnode-id="2716"><span data-dcnode-id="2720" instrument_node="">Although assumption (a) implies (b), the converse does not also hold. If knowledge is represented by the individual, it need not be represented exclusively within the brain. More importantly, as we will argue, an individual’s knowledge not only arises in large part from communal interactions, but also depends on cognitive states of other members of the community. This places limits on the utility of studying individual brains to infer general principles of the collective mind. Our conclusion is decidedly not that cognitive neuroscience makes no contribution to the study of cognition. It is that cognitive neuroscience does not provide a sufficient basis to model cognition. Social neuroscience is an emerging field that addresses part of the problem, as it takes as a central tenet that “brains are not solitary information processing devices” (</span><a data-dcnode-id="2718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="2719" instrument_node="">Cacioppo and Decety, 2011</span></a><span data-dcnode-id="2717" instrument_node="">). Nevertheless, the discussions we are aware of within the field of cognitive neuroscience still abide by assumptions (b) and (c).</span></p><span data-dcnode-id="2715" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2714" id="h3" name="h3"></a><h2 data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">The Community of Knowledge and the Limits of the Individual</span></h2><span data-dcnode-id="2711" instrument_node="">
</span><p class="mb15" data-dcnode-id="2691"><span data-dcnode-id="2710" instrument_node="">We start with assumption (b). Years of research in psychology, cognitive science, philosophy, and anthropology have shown that human cognition is a collective enterprise and is therefore not to be found within a single individual. Human cognition is an emergent property that reflects communal knowledge and representations that are distributed within a community (</span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2709" instrument_node="">Hutchins, 1995</span></a><span data-dcnode-id="2707" instrument_node="">; </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2706" instrument_node="">Clark and Chalmers, 1998</span></a><span data-dcnode-id="2704" instrument_node="">; </span><a data-dcnode-id="2702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="2703" instrument_node="">Wilson and Keil, 1998</span></a><span data-dcnode-id="2701" instrument_node="">; </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2700" instrument_node="">Henrich, 2015</span></a><span data-dcnode-id="2698" instrument_node="">; </span><a data-dcnode-id="2696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="2697" instrument_node="">Mercier and Sperber, 2017</span></a><span data-dcnode-id="2695" instrument_node="">; </span><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2694" instrument_node="">Sloman and Fernbach, 2017</span></a><span data-dcnode-id="2692" instrument_node="">). By “emergent” property we mean nothing elusive or mysterious, but simply certain well-documented properties of groups that would not exist in the absence of relevant properties of individuals, but are not properties of any individual member of the group, or any aggregation of properties of some or all members of the group.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p class="mb15" data-dcnode-id="2679"><span data-dcnode-id="2689" instrument_node="">Accumulating evidence indicates that memory, reasoning, decision-making, and other higher-level functions take place across people. The evidence that mental processing is engaged by a community of knowledge is multifaceted (for a review, see </span><a data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2688" instrument_node="">Rabb et al., 2019</span></a><span data-dcnode-id="2686" instrument_node="">). The claim that the mind is a social entity is an extension of the extended mind hypothesis (</span><a data-dcnode-id="2684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="2685" instrument_node="">Clark and Chalmers, 1998</span></a><span data-dcnode-id="2683" instrument_node="">): Cognition extends into the physical world and the brains of others. The point is not that other people know things that I do not; the point is that my knowledge often </span><i data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">depends</span></i><span data-dcnode-id="2680" instrument_node=""> on what others know even in the absence of any knowledge transfer from them to me. I might say, “I know how to get to Montreal,” when what I really mean is that I know how to get to the airport and the team piloting the aircraft can get from the airport to Montreal. Similarly, one might say that “what makes a car go” is the motor: that’s why it’s called a “motor,” after all. But while a full account will include the engine as a key contributor, the propulsion system is distributed over the engine, drive shaft, the human who turns the key, fuel, a roadway, and more. Changing the boundaries of what has traditionally been considered cognitive processing in an analogous way – from individual brains to interacting communities – perhaps raises questions of who should get credit and who should take responsibility for the effects of an individual’s action, but it is nevertheless an accurate description of the mechanisms humans use to process information. Furthermore, as the boundaries for what counts as cognitive processing shift, the operational target for studying the human mind moves beyond the scope of methods that examine performance through the lens of the individual.</span></p><span data-dcnode-id="2678" instrument_node="">
</span><p class="mb15" data-dcnode-id="2664"><span data-dcnode-id="2677" instrument_node="">Philosophers analyzing natural language illustrate how cognitive processes are extended into the world. The classic analysis is by </span><a data-dcnode-id="2675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2676" instrument_node="">Putnam (1975)</span></a><span data-dcnode-id="2674" instrument_node="">, who points out that we often use words whose reference (or denotation or extension) and therefore, according to Putnam, their meaning, is determined by factors outside one’s brain or mind (i.e., externalism). One could see Humpty Dumpty as an extreme and defiant internalist: “When I use a word, it means precisely what I want it to mean, no more and no less” (</span><a data-dcnode-id="2672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="2673" instrument_node="">Carroll, 1872</span></a><span data-dcnode-id="2671" instrument_node="">). Putnam’s argument is the subject of vigorous and sophisticated but not entirely conclusive debate (</span><a data-dcnode-id="2669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="2670" instrument_node="">Goldberg, 2016</span></a><span data-dcnode-id="2668" instrument_node="">; see also </span><a data-dcnode-id="2666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2667" instrument_node="">Burge, 1979</span></a><span data-dcnode-id="2665" instrument_node="">). Nonetheless it is now widely agreed that some form of externalism is at least a necessary part of an explanation of how our everyday terms have their referents (or denotations) and meanings.</span></p><span data-dcnode-id="2663" instrument_node="">
</span><p class="mb15" data-dcnode-id="2655"><span data-dcnode-id="2662" instrument_node="">The philosopher whom one might call the Godfather of Externalism, </span><a data-dcnode-id="2660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B89"><span data-dcnode-id="2661" instrument_node="">Wittgenstein (1973)</span></a><span data-dcnode-id="2659" instrument_node="">, preferred to draw attention to what he saw as linguistic facts that had been overlooked, above all, that the meaning of words depends on (or is even identical to) their use. Although that bald statement is highly controversial, what matters from our point of view is that the meaning of a word and its correct use depend on collective knowledge that extends beyond the individual, reflecting a social context (</span><a data-dcnode-id="2657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="2658" instrument_node="">Boroditsky and Gaby, 2010</span></a><span data-dcnode-id="2656" instrument_node="">). Thus, for a community of knowledge to support meaning and communication, there must be sufficient stability of common usage even as usage typically changes over time. The same holds for sentence meanings, as in, “Zirconium comes after Yttrium in the Periodic Table.” The speaker may have long ago forgotten—or never even knew—what exactly Zirconium is and why one thing comes after another in the Periodic Table. Nonetheless the statement has a meaning that has been fixed by the appropriate members of the scientific community, and propagated more-or-less successfully to generations of students. The speaker’s statement is true and has that communally established meaning, no matter how confused the speaker may be. Some might distinguish the speaker’s meaning from the correct, communally-ordained meaning. That is important in some contexts (e.g., in teaching and in evaluating students), but the point here is that the sentence has a precise meaning established by chemical science, even if that is not precisely what is in the speaker’s head, but only in the heads of others.</span></p><span data-dcnode-id="2654" instrument_node="">
</span><p class="mb15" data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">The same holds of theories. The statement “According to modern chemistry there are more than a hundred elements” is true regardless of how well or poorly the speaker might understand modern chemistry. It is true because “modern chemistry” means the chemical theories agreed upon by socially recognized experts. This holds even if the relevant theories are no longer in the speaker’s head, and even if the speaker never understood the theories.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p class="mb15" data-dcnode-id="2643"><span data-dcnode-id="2650" instrument_node="">These remarks on social meaning converge with recent work in the emerging discipline of “social epistemology” (</span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2649" instrument_node="">Goldman, 1999</span></a><span data-dcnode-id="2647" instrument_node="">), the study of knowledge as a social entity. We will speak of “knowledge” in an everyday sense, without entering into the labyrinthine and ultimately inconclusive attempts at definition offered by philosophers from the time of Plato, including what “really constitutes” social knowledge. What matters here is that research within social epistemology demonstrates that successful transmission of knowledge clearly does occur and depends on three general conditions (</span><a data-dcnode-id="2645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="2646" instrument_node="">Goldberg, 2016</span></a><span data-dcnode-id="2644" instrument_node="">): (i) social norms of assertion; (ii) reliable means of comprehending what is said (which depend on social norms of meaning and usage); and (iii) a reliable way of telling a reliable source of knowledge from an unreliable one. For reasons we elaborate below, we believe that the role of society in epistemology is not only to transmit knowledge from one individual to another, but to retain knowledge even when it is not transmitted.</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p class="mb15" data-dcnode-id="2608"><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2641" instrument_node="">Sloman and Fernbach (2017)</span></a><span data-dcnode-id="2639" instrument_node=""> extended the externalist project well beyond a concern with the meanings of words, to large swathes of conceptual knowledge. Outside their narrow areas of expertise, individuals are relatively ignorant (</span><a data-dcnode-id="2637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B91"><span data-dcnode-id="2638" instrument_node="">Zaller, 1992</span></a><span data-dcnode-id="2636" instrument_node="">; </span><a data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2635" instrument_node="">Dunning, 2011</span></a><span data-dcnode-id="2633" instrument_node="">). In any given domain, they know much less than there is to know, but nonetheless do know certain things that others understand more fully. The extent to which we rely on others in this way is often obscured by the fact that people tend to overestimate how much they know about how things work (</span><a data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="2632" instrument_node="">Rozenblit and Keil, 2002</span></a><span data-dcnode-id="2630" instrument_node="">; </span><a data-dcnode-id="2628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="2629" instrument_node="">Lawson, 2006</span></a><span data-dcnode-id="2627" instrument_node="">; </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2626" instrument_node="">Fernbach et al., 2013</span></a><span data-dcnode-id="2624" instrument_node="">; </span><a data-dcnode-id="2622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B84"><span data-dcnode-id="2623" instrument_node="">Vitriol and Marsh, 2018</span></a><span data-dcnode-id="2621" instrument_node="">). They overestimate their ability to reason causally (</span><a data-dcnode-id="2619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2620" instrument_node="">Sloman and Fernbach, 2017</span></a><span data-dcnode-id="2618" instrument_node="">). They also overestimate what they know about concept meanings (</span><a data-dcnode-id="2616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="2617" instrument_node="">Kominsky and Keil, 2014</span></a><span data-dcnode-id="2615" instrument_node="">) and their ability to justify an argument (</span><a data-dcnode-id="2613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2614" instrument_node="">Fisher and Keil, 2014</span></a><span data-dcnode-id="2612" instrument_node="">) and claim to have knowledge of events and concepts that are fabricated (</span><a data-dcnode-id="2610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="2611" instrument_node="">Paulhus et al., 2003</span></a><span data-dcnode-id="2609" instrument_node="">).</span></p><span data-dcnode-id="2607" instrument_node="">
</span><p class="mb15" data-dcnode-id="2599"><span data-dcnode-id="2606" instrument_node="">The best explanation for our tendency to overestimate how much we know is that we confuse what others know for what we know (</span><a data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B88"><span data-dcnode-id="2605" instrument_node="">Wilson and Keil, 1998</span></a><span data-dcnode-id="2603" instrument_node="">). Others know how things work, and we sometimes fail to distinguish their knowledge from our own. The idea is the converse of the curse of knowledge (</span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2602" instrument_node="">Nickerson, 1999</span></a><span data-dcnode-id="2600" instrument_node="">). In that case, people tend to believe that others know what they themselves know (this is part of what makes teaching hard). In both cases, people are failing to note the boundary among individuals. Circumstances can produce a rude awakening if things go wrong and we suddenly need to understand how to fix them, or if we are otherwise challenged to produce a full explanation either in a real world situation or by a psychologist.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p class="mb15" data-dcnode-id="2572"><span data-dcnode-id="2597" instrument_node="">Nonetheless, as </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2596" instrument_node="">Goldman (1999)</span></a><span data-dcnode-id="2594" instrument_node=""> observes, even a shallow understanding of a concept, idea, or statement can give us valuable practical information. Fortunately, we can know and make use of a good many truths without ourselves possessing the wherewithal to prove them, so long as our limited understanding is properly anchored elsewhere. We develop multiple examples below. Meanwhile, from a very broad perspective, we note that the conceptual web is tangled and immense, containing far more than a mere mortal could store and make sense of </span><a data-dcnode-id="2592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2593" instrument_node="">Sloman and Fernbach (2017)</span></a><span data-dcnode-id="2591" instrument_node="">. Thus we are by nature creatures that rely heavily on others to have full understandings of word meanings (“semantic deference” in the philosophical literature) and a more full and secure grasp of ideas, statements, or theories than our own incomplete grasp reflected in our shallow understanding. This dovetails not only with experimental results (</span><a data-dcnode-id="2589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="2590" instrument_node="">Rozenblit and Keil, 2002</span></a><span data-dcnode-id="2588" instrument_node="">; </span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2587" instrument_node="">Fernbach et al., 2013</span></a><span data-dcnode-id="2585" instrument_node="">; </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="2584" instrument_node="">Kominsky and Keil, 2014</span></a><span data-dcnode-id="2582" instrument_node="">; </span><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2581" instrument_node="">Sloman and Rabb, 2016</span></a><span data-dcnode-id="2579" instrument_node="">), but also with recent anthropological work on culture-gene coevolution showing that cultural accumulation exerted selective pressure for genetic evolution of our abilities to identify and access reliable sources of information and expertise (e.g., </span><a data-dcnode-id="2577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="2578" instrument_node="">Richerson et al., 2010</span></a><span data-dcnode-id="2576" instrument_node="">; </span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2575" instrument_node="">Henrich, 2015</span></a><span data-dcnode-id="2573" instrument_node="">).</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p class="mb0" data-dcnode-id="2560"><span data-dcnode-id="2570" instrument_node="">At a social level, the fact that knowledge is communal also has a political dimension. As societies develop, group policy and decision-making will depend on the aggregation, coordination, and codification of various sorts of knowledge distributed across many individuals (e.g., experts in the production, storage, distribution, and preparation of food). There is lively debate among political theorists about whether command and control societies, democracies, or something else can best fulfill the needs and aspirations of its members (</span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2569" instrument_node="">Anderson, 2006</span></a><span data-dcnode-id="2567" instrument_node="">; </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2566" instrument_node="">Ober, 2008</span></a><span data-dcnode-id="2564" instrument_node="">). Is decision-making best served by cloistered experts or through information gathered from non-experts as well? Non-experts presumably have greater access to details of local situations, but attempts to utilize widely distributed knowledge poses greater problems of aggregation and coordination. As </span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="2563" instrument_node="">Hayek (1945)</span></a><span data-dcnode-id="2561" instrument_node=""> remarked, the aggregation and deployment of widely distributed information is a central issue for theories of government. However, our interest here is not the relative merits of different forms of government. We mention these issues only to illustrate the far-reaching and pervasive importance of information processing in social networks and by implication the need for a political level of explanation in the understanding of a community of knowledge.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2558" id="h4" name="h4"></a><h2 data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">Social Knowledge Without Social Transmission: Outsourcing</span></h2><span data-dcnode-id="2555" instrument_node="">
</span><p class="mb15" data-dcnode-id="2532"><span data-dcnode-id="2554" instrument_node="">Work on collective cognition points to several ways that individual cognition depends on others (</span><a data-dcnode-id="2552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2553" instrument_node="">Hemmatian and Sloman, 2018</span></a><span data-dcnode-id="2551" instrument_node="">). One is collaboration: Problem-solving, decision-making, memory, and other cognitive processes involve the joint activity of more than one person, and in many contexts mutual awareness of a joint intention to perform some task. Work on collaboration has focused on team dynamics (</span><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="2550" instrument_node="">Pentland, 2012</span></a><span data-dcnode-id="2548" instrument_node="">) and group intelligence (</span><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="2547" instrument_node="">Woolley et al., 2010</span></a><span data-dcnode-id="2545" instrument_node="">). A second form of cognitive dependence on others, and the one that grounds our argument, is outsourcing: The knowledge people use often sits (or sat) in the head of someone else, someone not necessarily present (or even alive). Frequently, outsourcing requires that we have </span><i data-dcnode-id="2543"><span data-dcnode-id="2544" instrument_node="">access</span></i><span data-dcnode-id="2542" instrument_node=""> to outsourced knowledge when the need arises. But often merely knowing we have access is sufficient for practical purposes (e.g., we go to Tahiti assuming we’ll find what we need to enjoy ourselves when we’re there). On occasion we do access the information, and this requires some type of social transmission. Such transmission comes in the form of social learning of a skill, practice, norm, or theory on the one hand, or in the form of more episodic or </span><i data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">ad hoc</span></i><span data-dcnode-id="2539" instrument_node=""> accessing of information for limited, perhaps one-time, use (</span><a data-dcnode-id="2537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2538" instrument_node="">Barsalou, 1983</span></a><span data-dcnode-id="2536" instrument_node="">). A prime example of the former would be an apprentice learning a trade from a master; of the latter, “googling” to find out who won the 1912 World Series. The transmission of information around a social network is a key determinant of human behavior (</span><a data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2535" instrument_node="">Christakis and Fowler, 2009</span></a><span data-dcnode-id="2533" instrument_node="">).</span></p><span data-dcnode-id="2531" instrument_node="">
</span><p class="mb0" data-dcnode-id="2529"><span data-dcnode-id="2530" instrument_node="">A key requirement in using information that is sitting in someone else’s head is the possession of what we will call epistemic pointers (“epistemic” meaning having to do with knowledge): the conscious or implicit awareness of where some needed information can be found. Sometimes we can envision many potential pathways to an information source, whether direct or indirect, and sometimes very few. Thus we may envision many potential information sources for how to get to Rome (travel agents, friends who have been there), and various pathways by which we might access a given source (e.g., find the phone number of a friend who said she had a good travel agent) but fewer pathways to find out how to get to the rock shaped like an elephant that someone mentioned in passing. Our representations of pointers, to a source or to a step on a pathway to a source, can be partial and vague, providing little or no practical guidance (“some physics Professor knows it”), or full and precise (“it’s in Einstein’s manuscript on the special theory of relativity”). If we are completely clueless, we can be said to lack pointers and pathways, and simply have a placeholder for information. The evidence of human ignorance that we review below leads us to suspect that the vast majority of the knowledge that we have access to and use is in the form of placeholders.</span></p><span data-dcnode-id="2528" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2527" id="h5" name="h5"></a><h2 data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">Setting the Stage: Collaboration</span></h2><span data-dcnode-id="2524" instrument_node="">
</span><p class="mb15" data-dcnode-id="2516"><span data-dcnode-id="2523" instrument_node="">The centrality of collaboration for human activity derives from the fact that humans are unique in the cognitive tools they have for collaboration. </span><a data-dcnode-id="2521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B79"><span data-dcnode-id="2522" instrument_node="">Tomasello and Carpenter (2007)</span></a><span data-dcnode-id="2520" instrument_node=""> make the case that no other animal can share intentionality in the way that humans can in the sense of establishing common ground to jointly pursue a common goal, and a large body of work describes the unique tools humans have to model the thoughts and feelings, including intentions and motivations, of those around them (e.g., </span><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2519" instrument_node="">Baron-Cohen, 1991</span></a><span data-dcnode-id="2517" instrument_node="">).</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p class="mb15" data-dcnode-id="2501"><span data-dcnode-id="2514" instrument_node="">The role of collaboration in specifically cognitive performance has been most fully studied in memory. </span><a data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B86"><span data-dcnode-id="2513" instrument_node="">Wegner et al. (1991)</span></a><span data-dcnode-id="2511" instrument_node=""> report some of the early work showing that groups, especially married couples, distribute storage demands according to relative expertise. They call these “transactive memory systems.” </span><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B78"><span data-dcnode-id="2510" instrument_node="">Theiner (2013)</span></a><span data-dcnode-id="2508" instrument_node=""> argues that transactive memory systems reflect emergent group-level memories, providing evidence that: (i) members of a transactive memory system are not interchangeable (because each member makes unique contributions to the group); (ii) if members are removed from the group, the system will no longer function (omitting essential components of the group-level memory); (iii) the disassembly and reassembly of the group may impair its function (for example, when members of the group no longer understand the distribution of knowledge within the system and what information they are responsible for knowing); and (iv) cooperative and inhibitory actions among members are critical (given the interactive and emergent nature of transactive memories) (for a review, see </span><a data-dcnode-id="2506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2507" instrument_node="">Meade et al., 2018</span></a><span data-dcnode-id="2505" instrument_node="">). </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B87"><span data-dcnode-id="2504" instrument_node="">Wilson (2005)</span></a><span data-dcnode-id="2502" instrument_node=""> claims that these properties of a transactive memory system have important political consequences as they affect the commemoration and memorialization of politically relevant events and culturally important origin stories that shape nationalism and attitudes toward human rights and other issues. Memory systems play a critical role in communities.</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p class="mb0" data-dcnode-id="2489"><span data-dcnode-id="2499" instrument_node="">Further evidence for the importance of collaboration in thought comes from naturalistic studies of group behavior. The seminal work was conducted by </span><a data-dcnode-id="2497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2498" instrument_node="">Hutchins (1995)</span></a><span data-dcnode-id="2496" instrument_node="">. He offered a classic description of navigating a Navy ship to harbor, a complex and risky task. The process involves multiple people contributing to a dynamic representation of the ship’s changing location with reference to a target channel while looking out for changing currents and other vessels. Various forms of representation are used, all feeding into performance of a distributed task with a common goal. Sometimes the common goal is known only by leadership (in the case of a secret mission, say). Nevertheless, successful collaboration involves individuals pursuing their goals so as to contribute to the common goal. Many of the tasks we perform everyday have this collaborative nature, from shopping to crossing the street. If a car is coming as we cross, we trust that the driver won’t accelerate into us, and the more assertive street crossers among us expect them to slow down in order to obtain the common goal of traffic flow without harm to anyone. </span><a data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2495" instrument_node="">Banks and Millward (2000)</span></a><span data-dcnode-id="2493" instrument_node=""> discuss the nature of distributed representation and review data showing that distributing the components of a task across a group so that each member is a resident expert can lead to better performance than giving everyone the same shared information. Hutchin’s nautical example illustrates this, insofar as some essential jobs require multiple types of expertise. Other jobs might not require this, so that crew members may substitute for one another, because all of them have the same basic information or skill level needed for the job. Often in real life there will be a mix, so that the task occupies an intermediate position relative to Banks and Millward’s two types of group (i.e., diverse local experts versus all group members having the same knowledge). Work on collective intelligence also provides a good example of emergent group properties, illustrating how collective problem-solving relies more on collaboration and social interconnectedness than on having individual experts on the team (</span><a data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="2492" instrument_node="">Woolley et al., 2010</span></a><span data-dcnode-id="2490" instrument_node="">).</span></p><span data-dcnode-id="2488" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2487" id="h6" name="h6"></a><h2 data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Collaboration and Neuroscience: The Case of Neural Coupling</span></h2><span data-dcnode-id="2484" instrument_node="">
</span><p class="mb15" data-dcnode-id="2452"><span data-dcnode-id="2483" instrument_node="">Research in cognitive neuroscience has not ignored these trends in the study of cognition. An emerging area of research investigates the communal nature of brain networks, examining how the coupling of brain-to-brain networks enables pairs of individuals or larger groups to interact (</span><a data-dcnode-id="2481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2482" instrument_node="">Montague et al., 2002</span></a><span data-dcnode-id="2480" instrument_node="">; </span><a data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="2479" instrument_node="">Schilbach et al., 2013</span></a><span data-dcnode-id="2477" instrument_node="">; </span><a data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2476" instrument_node="">Hasson and Frith, 2016</span></a><span data-dcnode-id="2474" instrument_node="">). These studies deploy a generalization of neuroimaging methods, applying techniques that were once used to assess intra-brain connectivity (i.e., within the individual) to examine inter-subject connectivity (i.e., between different subjects; </span><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="2473" instrument_node="">Simony et al., 2016</span></a><span data-dcnode-id="2471" instrument_node="">). This can be achieved through experiments in which brain activity within multiple participants is simultaneously examined (i.e., “hyperscanning;” </span><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2470" instrument_node="">Montague et al., 2002</span></a><span data-dcnode-id="2468" instrument_node="">) or analyzed </span><i data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">post hoc</span></i><span data-dcnode-id="2465" instrument_node=""> (</span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2464" instrument_node="">Babiloni and Astolfi, 2014</span></a><span data-dcnode-id="2462" instrument_node="">). Such approaches have been applied to assess brain-to-brain communication dynamics underlying natural language (e.g., </span><a data-dcnode-id="2460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="2461" instrument_node="">Schmalzle et al., 2015</span></a><span data-dcnode-id="2459" instrument_node="">). Recently, researchers have placed two people face-to-face in a single scanner to examine, for example, the neural mechanisms underlying social interaction (e.g., when people make eye contact; for a review, see </span><a data-dcnode-id="2457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2458" instrument_node="">Servick, 2020</span></a><span data-dcnode-id="2456" instrument_node="">). The situation – very noisy and now also very crowded – does not score high on ecological validity. Also, it is hard to see how one could scale this approach up to study larger groups (big scanners, little participants?). Nonetheless this is a reasonable place to start, and here, as with hyperscanning and retrospective analysis of neuroimaging data, one might well secure suggestive results. So although the examination of brain-to-brain networks is rare in cognitive neuroscience, with only a handful of studies conducted to date (for a review, see </span><a data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2455" instrument_node="">Hasson and Frith, 2016</span></a><span data-dcnode-id="2453" instrument_node="">), this approach represents a promising framework for extending cognitive neuroscience beyond the study of individuals to an investigation of dyads, groups, and perhaps one day to larger communities.</span></p><span data-dcnode-id="2451" instrument_node="">
</span><p class="mb0" data-dcnode-id="2419"><span data-dcnode-id="2450" instrument_node="">This approach has set the stage for research on the neural foundations of communal knowledge, investigating how cognitive and neural representations are distributed within the community and how information propagates through social networks, for example, based on their composition, structure, and dynamics (for a review, see </span><a data-dcnode-id="2448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="2449" instrument_node="">Falk and Bassett, 2017</span></a><span data-dcnode-id="2447" instrument_node="">; for a discussion of hyperscanning methods, see </span><a data-dcnode-id="2445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="2446" instrument_node="">Novembre and Iannetti, 2020</span></a><span data-dcnode-id="2444" instrument_node="">; </span><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2443" instrument_node="">Moreau and Dumas, 2021</span></a><span data-dcnode-id="2441" instrument_node="">). Evidence from this literature indicates that the strength of the coupling between the neural representation of communication partners is associated with communication success (i.e., successful comprehension of the transmitted signal; </span><a data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B77"><span data-dcnode-id="2440" instrument_node="">Stephens et al., 2010</span></a><span data-dcnode-id="2438" instrument_node="">; </span><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="2437" instrument_node="">Silbert et al., 2014</span></a><span data-dcnode-id="2435" instrument_node="">; </span><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2434" instrument_node="">Hasson and Frith, 2016</span></a><span data-dcnode-id="2432" instrument_node="">). For example, the degree of brain-to-brain synchrony within networks associated with learning and memory (e.g., the default mode network) predicts successful comprehension and memory of a story told among communication partners (</span><a data-dcnode-id="2430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B77"><span data-dcnode-id="2431" instrument_node="">Stephens et al., 2010</span></a><span data-dcnode-id="2429" instrument_node="">). Indeed, evidence indicates that people who are closely related within their social network (i.e., individuals with a social distance of one) demonstrate more similar brain responses to a variety of stimuli (e.g., movie clips) relative to individuals who share only distant relations (</span><a data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="2428" instrument_node="">Parkinson et al., 2017</span></a><span data-dcnode-id="2426" instrument_node="">). Research further suggests that the efficiency of inter-subject brain connectivity increases with the level of interaction between subjects, providing evidence that strong social ties predict the efficiency of brain-to-brain network coupling (</span><a data-dcnode-id="2424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B81"><span data-dcnode-id="2425" instrument_node="">Toppi et al., 2015</span></a><span data-dcnode-id="2423" instrument_node="">; for a discussion of the timescale of social dynamics, see </span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2422" instrument_node="">Flack, 2012</span></a><span data-dcnode-id="2420" instrument_node="">).</span></p><span data-dcnode-id="2418" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2417" id="h7" name="h7"></a><h2 data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">The Main Event: Outsourcing</span></h2><span data-dcnode-id="2414" instrument_node="">
</span><p class="mb15" data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">A community of knowledge involves more than coupling. We do collaborate, and we engage in joint actions involving shared attention, but we also make use of others without coupling: We outsource to knowledge housed in our culture, beyond the small groups we collaborate with. In the best cases, we outsource to experts. A great many people know that the earth revolves around the sun, but only a much smaller number know how to show that. Both sorts of people are part of a typical community of knowledge, and both are, by community standards, said to know that the earth revolves around the sun. This holds even though the non-expert does not know who the experts are, does not remember how she came to have that knowledge, and does not know what observations and reasoning show that our solar system is heliocentric.</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p class="mb15" data-dcnode-id="2400"><span data-dcnode-id="2410" instrument_node="">Outsourcing in some circumstances can make us vulnerable to a lack of valuable knowledge. </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2409" instrument_node="">Henrich (2015)</span></a><span data-dcnode-id="2407" instrument_node=""> describes how an epidemic that killed off many older and more knowledgeable members of the Polar Inuit tribe resulted in the tribe losing access to much of its technology: Weapons, architectural features of their snow homes, and transportation (e.g., a particular type of kayak). Knowledge about how to build and use these tools resided in the heads of those lost members. Without them, the remaining members of the tribe were unable to figure out how to build such tools, and were forced to resort to less effective means of hunting, staying warm, and traveling. The issue here is not collaboration. Tool users were not cognitively coupling with the tool providers. Rather, they were accessing and making use of the latter’s knowledge without acquiring it, in this case outsourcing both the expertise and the production of vital artifacts. Assumptions that individuals had been able to rely on (i.e., that they would have access to a tool for obtaining food) no longer held. The problem was that the younger members of the tribe had outsourced their knowledge to others who were no longer available. Anthropologists have documented numerous cases of loss of technology through death of the possessors of a society’s specialized knowledge, or through isolation from formerly available knowledge sources (e.g., </span><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2406" instrument_node="">Henrich and Henrich, 2007</span></a><span data-dcnode-id="2404" instrument_node="">). By the same token, a community can add new expertise by admitting (or forcibly adding) new members with special skills (e.g., </span><a data-dcnode-id="2402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B85"><span data-dcnode-id="2403" instrument_node="">Weatherford, 2005</span></a><span data-dcnode-id="2401" instrument_node="">).</span></p><span data-dcnode-id="2399" instrument_node="">
</span><p class="mb15" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Sometimes we are aware that we are outsourcing, for instance when we explicitly decide to let someone else do our cognitive work for us (as one lets an accountant file one’s taxes). In such cases, we explicitly build a pointer, a mental representation that indicates the repository of knowledge we do not ourselves fully possess and that anchors the shallow or incomplete knowledge we do possess. We have a pointer to an accountant or tax lawyer (whether to a specific person or just to a “tax preparer to be determined”), just in case we are audited.</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p class="mb15" data-dcnode-id="2385"><span data-dcnode-id="2395" instrument_node="">But often we outsource without full awareness, acting as if we have filled gaps in our knowledge even though no information has been transferred. Our use of words is often licensed by knowledge only others have, our explanations often appeal to causal models that sit in the heads of scientists and engineers, and our political beliefs and values are inherited from our spiritual and political communities. More generally, people’s sense of understanding, reasoning, decision-making, and use of words and concepts are often outsourced to others, and often we do not know whom we are outsourcing to, or even that we are doing it. For instance, when we say “</span><i data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">they</span></i><span data-dcnode-id="2392" instrument_node=""> landed on the moon,” most of us have little idea who </span><i data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">they</span></i><span data-dcnode-id="2389" instrument_node=""> refers to, and often lack conscious awareness that we don’t know who </span><i data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">they</span></i><span data-dcnode-id="2386" instrument_node=""> were. Or we say, “We know that Pluto is not strictly speaking a planet.” We know that much on reliable grounds. What little we know is anchored by the possibility of transmission (direct or perhaps very indirect) from communal experts; specifically, the scientists who set the criteria for planethood, and who know whether Pluto qualifies and on the basis of what evidence. Again, it is highly advantageous to be able to outsource – and in fact necessary – since we can’t all master full knowledge of all the crafts, skills, theoretical knowledge, and up-to-date-details of local situations that we need or might need to navigate our environment.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><p class="mb15" data-dcnode-id="2370"><span data-dcnode-id="2383" instrument_node="">Moreover, people believe they understand the basics of helicopters, toilets, and ballpoint pens even when they do not (</span><a data-dcnode-id="2381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="2382" instrument_node="">Rozenblit and Keil, 2002</span></a><span data-dcnode-id="2380" instrument_node="">). Fortunately, others do. In addition, the knowledge that others do increases our sense of understanding not only of artifacts, but of scientific phenomena and political policies (</span><a data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2379" instrument_node="">Sloman and Rabb, 2016</span></a><span data-dcnode-id="2377" instrument_node="">; </span><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2376" instrument_node="">Rabb et al., 2019</span></a><span data-dcnode-id="2374" instrument_node="">). In fact, just having access to the Internet also increases our sense of understanding even when we are unable to use it (</span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="2373" instrument_node="">Fisher et al., 2015</span></a><span data-dcnode-id="2371" instrument_node="">). These findings cannot be attributed to memory failures because, in the vast majority of cases, the relevant mechanisms were never understood. And the studies include control conditions to rule out alternative explanations based on self-presentation effects and task demands. What they show is that mere access to information increases our sense of understanding. This suggests our sense of understanding reflects our roles as members of a community of knowledge, and suggests that we maintain pointers to or placeholders for information that others retain. The fact that access causes us to attribute greater understanding to ourselves implies that our sense of understanding is inflated. This in turn implies that we fail to distinguish those pointers or placeholders from actual possession of information; we don’t know that we do not really know how artifacts like toilets work, but the awareness that others do leads us to think we ourselves do, at least until we are challenged or we land in a situation demanding genuine expertise (Call the plumber now!).</span></p><span data-dcnode-id="2369" instrument_node="">
</span><p class="mb15" data-dcnode-id="2361"><span data-dcnode-id="2368" instrument_node="">More evidence for this kind of implicit outsourcing comes from work on what makes an explanation satisfying. People find explanations of value even if they provide no information, as long as the explanations use words that are entrenched in a community. For example, </span><a data-dcnode-id="2366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2367" instrument_node="">Hemmatian and Sloman (2018)</span></a><span data-dcnode-id="2365" instrument_node=""> gave subjects a label for a phenomenon (e.g., “Carimaeric”) and told them that the label referred to instances with a specific defining feature (e.g., stars whose size and brightness varied over time). Then the label was used as an explanation for the defining property (someone asked why a particular star’s size and brightness varied over time and was told that it’s because the star is Carimaeric). Subjects were asked to what extent the explanation answered the question. They answered more positively if the label was entrenched within a community than if it was not. Similar findings have been obtained using mental health terms, even among mental health professionals (</span><a data-dcnode-id="2363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2364" instrument_node="">Hemmatian et al., 2019</span></a><span data-dcnode-id="2362" instrument_node="">). In these cases, there is no coupling between the unidentified community members who use the explanation and the agent. There is merely the heuristic that the fact that others know increases my sense of understanding. This heuristic is so powerful that it operates even when others’ knowledge has no informational content.</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p class="mb15" data-dcnode-id="2320"><span data-dcnode-id="2359" instrument_node="">Some of the clearest evidence for this heuristic comes from the political domain. We often take strong stances on issues that we are ignorant about. These authors believe strongly in anthropogenic climate change despite being relatively ignorant of both the full range of evidence and the mechanism for it. We rely on those scientists who study such things. Political issues tend to be complex and we need to rely on others, at least in part, to form and justify our opinions. In a representative democracy, for instance, we try to be informed on key issues, but rely on specialized committees to investigate matters more thoroughly. For better or for worse, individual support for policies, positions, and leaders comes largely from partisan cues rather than non-partisan weighing of evidence (</span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2358" instrument_node="">Cohen, 2003</span></a><span data-dcnode-id="2356" instrument_node="">; </span><a data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2355" instrument_node="">Hawkins and Nosek, 2012</span></a><span data-dcnode-id="2353" instrument_node="">; </span><a data-dcnode-id="2351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="2352" instrument_node="">Anduiza et al., 2013</span></a><span data-dcnode-id="2350" instrument_node="">; </span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2349" instrument_node="">Han and Federico, 2017</span></a><span data-dcnode-id="2347" instrument_node="">; </span><a data-dcnode-id="2345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B83"><span data-dcnode-id="2346" instrument_node="">Van Boven et al., 2018</span></a><span data-dcnode-id="2344" instrument_node="">). A growing body of evidence indicates that partisan cues determine how we understand events (</span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="2343" instrument_node="">Jacobson, 2010</span></a><span data-dcnode-id="2341" instrument_node="">; </span><a data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2340" instrument_node="">Frenda et al., 2013</span></a><span data-dcnode-id="2338" instrument_node="">; but see </span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2337" instrument_node="">Bullock et al., 2015</span></a><span data-dcnode-id="2335" instrument_node="">) and even whether we take steps to protect ourselves from infectious disease (</span><a data-dcnode-id="2333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="2334" instrument_node="">Geana et al., 2021</span></a><span data-dcnode-id="2332" instrument_node="">)</span><sup data-dcnode-id="2328" id="footnotesuper1"><a data-dcnode-id="2331" id="footnote1a"></a><a class="footnoteanchor" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23footnote1"><span data-dcnode-id="2330" instrument_node="">1</span></a></sup><span data-dcnode-id="2327" instrument_node="">. </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2326" instrument_node="">Marks et al. (2019)</span></a><span data-dcnode-id="2324" instrument_node=""> show that people use partisan cues to decide whose advice to follow in a competitive game even when they have objective evidence about who the better players are. When evaluating data, we are often more concerned with being perceived as good community citizens by acceding to our community’s mores than we are with making accurate judgments (</span><a data-dcnode-id="2322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="2323" instrument_node="">Kahan et al., 2011</span></a><span data-dcnode-id="2321" instrument_node="">). Such a bias has a rationale if it maintains community membership, and membership is deemed more important than being correct.</span></p><span data-dcnode-id="2319" instrument_node="">
