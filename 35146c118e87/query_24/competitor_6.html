</span><p class="mb15" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Outsourcing knowledge, including the choice of whom to outsource to, is a risky affair. One must estimate what the source does and does not know, their ability to transmit information, and whether their interests align with yours. One must determine how much to trust potential sources of information. Outsourcing, whether influenced by partisan bias or not, is a direct consequence of the human need and tendency to construct pointers to knowledge that other people store.</span></p><span data-dcnode-id="2316" instrument_node="">
</span><p class="mb15" data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">The basic features of how a community holds knowledge—relative ignorance associated with epistemic pointers to expertise—apply to both social information and disinformation, to well-grounded knowledge, as well as fervently held nonsense perpetrated by unreliable sources. Community norms about what counts as knowledge, and as a reliable pathway of knowledge transmission, may vary greatly: One subculture will require, for some subject matters, scientific expertise on the part of an ultimate source, along with reliable paths of transmission of scientific knowledge, paths often institutionalized, as with schools or trade unions and their certifications. Another subculture will consider God the ultimate source of understanding in important areas, and divine revelation, or the word of officially ordained spokespersons, as appropriate paths of dissemination.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p class="mb0" data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">Thus the role of our social networks goes beyond actively sharing information. We use them to represent and process information, such that the network itself serves as an external processor and storage site. We trust others to maintain accurate statistics, to distil news, to total our grocery bill, help us fill out our tax forms, and to tell us what position to take on complex policy. In all such tasks, representation and processing of essential information does not in general occur in individual brains. They do not occur in individual brains even if we allow that those brains are coupled within a social network. Representation and processing occur over a larger portion of an encompassing network, and potentially over the entire network, branching out to include our sources, our sources’ sources, and any intermediaries such as books, the internet, or other people, along the paths of transmission.</span></p><span data-dcnode-id="2310" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2309" id="h8" name="h8"></a><h2 data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">Outsourcing in Cognitive Neuroscience: Constructing Epistemic Pointers</span></h2><span data-dcnode-id="2306" instrument_node="">
</span><p class="mb0" data-dcnode-id="2292"><span data-dcnode-id="2305" instrument_node="">To explain phenomena associated with outsourcing, we cannot appeal to coupling, because coupling requires specification of who is coupling with whom. To explain outsourcing, cognitive neuroscientists must appeal to a different theoretical construct: Neural pointers or placeholders, representations in the brain that act as pointers to knowledge held elsewhere. The work in cognitive neuroscience that most directly addresses the mechanisms of outsourcing concerns how the representation of knowledge relates to affiliation, on whom we trust to retain reliable knowledge. Putting aside the role of trust in institutions, social neuroscience research examining trust in more personal contexts indicates that trust and cooperation are mediated by a network of brain regions that support core social skills, such as the capacity to infer and reason about the mental states of others (for reviews, see </span><a data-dcnode-id="2303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="2304" instrument_node="">Adolphs, 2009</span></a><span data-dcnode-id="2302" instrument_node="">; </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="2301" instrument_node="">Rilling and Sanfey, 2011</span></a><span data-dcnode-id="2299" instrument_node="">). This work provides the basis for future research investigating how the neurobiology of trust contributes to the representation and use of outsourcing in collective cognition. To do so, however, the field will need to move beyond the use of “isolation paradigms” in which subjects observe others whom they might or might not then trust (</span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2298" instrument_node="">Becchio et al., 2010</span></a><span data-dcnode-id="2296" instrument_node="">). In such cases, subjects neither participate in direct social interaction with potential objects of trust nor outsource their own reasoning to others (</span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="2295" instrument_node="">Schilbach et al., 2013</span></a><span data-dcnode-id="2293" instrument_node="">). Such observation is seldom the sole basis of epistemic pointers, and often is not involved at all. Instead, pointers typically depend on cues that reflect how third parties or the community as a whole regard a potential source. This can involve informal gossip or more institutionalized “rating systems” and reviews, where the latter will bring us back to social institutions. So there is a vast arena, virtually unexplored by social neuroscience, starting with the origin and nature of the neural mechanisms that serve as pointers to communal knowledge.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2290" id="h9" name="h9"></a><h2 data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">The Irreducibility of the Community of Knowledge</span></h2><span data-dcnode-id="2287" instrument_node="">
</span><p class="mb15" data-dcnode-id="2282"><span data-dcnode-id="2286" instrument_node="">The implication of our discussion is that many activities that seem solitary—like writing a scientific paper—require a cultural community as well as the physical world now including the Internet (to ground language, to support claims, to provide inspiration and an audience, etc.). Does this mean there is no solely neurobiological representation for performing such tasks? Perhaps neurobiological reduction can be accomplished by giving up on the idea of reduction to a single brain, and instead appeal to reduction to a network of brains (</span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="2285" instrument_node="">Falk and Bassett, 2017</span></a><span data-dcnode-id="2283" instrument_node="">). Perhaps a broader view of cognitive neuroscience as the study of information processing in a social network of neural networks can overcome the challenge posed for cognitive neuroscience by the community of knowledge. Can networks of individuals processing together be reduced to networks of brains interconnected by some common resource, perhaps some form of neural synchrony?</span></p><span data-dcnode-id="2281" instrument_node="">
</span><p class="mb15" data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node="">We believe the answer is “no.” For one thing, the relevant social network is frequently changing, as is membership in groups addressing different problems (for climate change, it involves climate scientists but for predicting football scores, it involves football fans). So there are no fixed neurobiological media to appeal to. This might seem to be irrelevant, as the goal of cognitive neuroscience is not to reduce cognition to a group of specific brains. Rather, one studies specific brains in order to find general patterns of activity that occur in different brains. But this is precisely the problem; namely, the general pattern may not capture specific properties exhibited by the individual. Generalization from the group to the individual depends on equivalence of the mean and variance at each level; an equivalence that has increasingly been called into question (</span><a data-dcnode-id="2278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2279" instrument_node="">Fisher et al., 2018</span></a><span data-dcnode-id="2277" instrument_node="">). The same problem will almost certainly arise with generalizations about multiple groups’ performance of a given task. Indeed the problem may be much worse, as changing group membership may introduce even greater variation across groups of the patterns of interaction that produce a group’s performance.</span></p><span data-dcnode-id="2275" instrument_node="">
</span><p class="mb15" data-dcnode-id="2267"><span data-dcnode-id="2274" instrument_node="">Changes in membership will not just mean changes in the attributes and resources the members bring to the group, but also – and more strikingly – potentially very large differences in the way members interact, even if they happen to produce the same result (e.g., if they forecast the same football score as another group whose members interacted in their own, different way in arriving at that prediction). Studies of group dynamics and organizational behavior recognize that many factors affect the efficiency and result of group collaboration: the relative dominance of discussion by some particular member(s), the timidity of others, the motivations of members, the level of experience and expertise of the members, the level of relevant knowledge about the particular teams involved, the stakes involved in making a good prediction, time limitations, the degree of synergy among team members, size of the group, form of discussion used (</span><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="2273" instrument_node="">Hirst and Manier, 1996</span></a><span data-dcnode-id="2271" instrument_node="">; </span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2270" instrument_node="">Cuc et al., 2006</span></a><span data-dcnode-id="2268" instrument_node="">), demographic makeup of the members, and so on. Different fans, or even the same fans on different occasions, can arrive at the same score forecasts for the same game by an unlimited number of patterns of interaction. This not only produces the problem of multiple realization (of a type of group performance on a given task) on a grand scale, but indicates that there will be no tolerably definite and generalizable pattern of group dynamics that applies to particular groups addressing the same given task. Hence there is no one general pattern, or even manageable number of patterns, to be reduced to neuroscience.</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p class="mb0" data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">On a more positive note, research in group dynamics and organizational behavior has, as just noted, identified numerous factors that enter into group performance. So cognitive neuroscience (social and individual) can, by drawing on that research, investigate the neural underpinnings of types of factors such as trust, mind-reading capacities, and many others that drive different forms of group interaction, and this will be essential for an account of group cognition if such an account is ever to be had. But that is a far cry from reducing group behavior to any variety of neuroscience.</span></p><span data-dcnode-id="2263" instrument_node="">
</span><a data-dcnode-id="2262" id="S9" name="S9"></a><h2 data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">Group Intelligence and Inventiveness</span></h2><span data-dcnode-id="2259" instrument_node="">
</span><p class="mb15" data-dcnode-id="2254"><span data-dcnode-id="2258" instrument_node="">Anthropological and psychological research, in the lab and in the field, strongly reinforces the point: group intelligence and group inventiveness are not just the properties of an individual (such as the smartest or most inventive member of the group), or an average of the members’ properties, or an aggregate of the members’ individual cognitive properties (</span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B90"><span data-dcnode-id="2257" instrument_node="">Woolley et al., 2010</span></a><span data-dcnode-id="2255" instrument_node="">). They are sometimes quite surprising properties that emerge from interactions among members of the group, in some cases as a matter of learning, sometimes just from a repeated exchange of ideas, sometimes from a group of initially equal members, sometimes from a group with one or two initial stand outs. The effect of group interaction can be positive or negative depending on the motivations, personal traits, group camaraderie and various situational constraints (e.g., time limitations, availability of paper and pencil, food, and rest).</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p class="mb15" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">The moral is that examination of the brains of group members will not reveal or predict precisely how the group as a whole will perform, nor through what complex pattern of interaction or mechanisms it arrived at a given result. Even in a relatively small group there will be an enormous number of interactions that might produce any given result, and that number will increase exponentially with any increase in group size, not to mention the introduction of other potentially influential factors.</span></p><span data-dcnode-id="2250" instrument_node="">
</span><p class="mb0" data-dcnode-id="2245"><span data-dcnode-id="2249" instrument_node="">Thus there is no way to identify any particular neurobiological pattern (or manageably small number of patterns) across brains as </span><i data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">the</span></i><span data-dcnode-id="2246" instrument_node=""> way(s) in which groups produce new knowledge, or even the way the same group functions on different occasions or with regard to different sorts of cognitive tasks. Put another way, even if we could find out through observation, self-report, or fMRI conducted in everyone, that specific members of a given group engaged in certain specific types of interaction with other specific members, and we were able to reduce that to neurobiological terms, we would not be able to say more than that this is one of innumerable ways a particular group result might be realized in a particular social and physical context. An open-ended list of possible realizations at the psychological or behavioral level does not support a reduction of this bit of psychological description to cognitive neuroscience even if it tells us a lot about what goes into that performance. Note once again that we need functional descriptions, which will themselves be complex and predictive of behavior in only a limited way. Functional descriptions will, as with individual psychology and neuroscience, provide essential guidance and support for social neuroscience, and potentially draw on insights from neuroscience.</span></p><span data-dcnode-id="2244" instrument_node="">
</span><a data-dcnode-id="2243" id="S10" name="S10"></a><h2 data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Justification and Communal Norms</span></h2><span data-dcnode-id="2240" instrument_node="">
</span><p class="mb15" data-dcnode-id="2235"><span data-dcnode-id="2239" instrument_node="">We saw earlier that within a community of knowledge most of what we know is anchored in the heads of people doing scientific, technical, and other sorts of intellectual work, or in the knowhow of expert mechanics, electricians, potters, and so on. Thus, most of an individual’s knowledge is just more or less shallow understanding or very limited practical knowhow, along with a more-or-less precise pointer to expert knowledge (</span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2238" instrument_node="">Rabb et al., 2019</span></a><span data-dcnode-id="2236" instrument_node="">). For instance, we know that “smoking causes lung cancer” but most of us are not sure why. So the neurobiological representations under study are really mostly pointers to knowledge that experts have or to pathways of transmission by which we can reliably access that information. Hence, the network that anchors much of our knowledge about the causal structure of the world is actually a network that sits across brains, not within a brain: It is not an aggregate of brain contents, but a pattern of interactions among brains with certain contents. Because it is the contents that are important, and not the specific brains, there are an unlimited number of patterns of interactions that would generate and maintain the same causal beliefs.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><p class="mb15" data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">But the actual justification for those beliefs is more systematic than that. We have seen that it depends on community norms for attributing knowledge and associated institutions of knowledge certification. Within a given community, whatever complies with those norms qualifies as knowledge. Some communities may have rather eccentric norms, and regard some things as general knowledge that another community regards as wild-eyed conspiracy theory (issues of fake news and slander come to mind). Accordingly, an account of most of our knowledge will need to include the role of such social institutions and norms. I can legitimately claim to know that the sun does not revolve around the earth, that anthropocentric climate change is real, that the Pythagorean Theorem is true, and a great many other things I “learned in school,” even if I cannot myself produce proofs for any of them, or even say precisely what they amount to (Note that this is different from the case in which I could produce a proof if I sat down and tried to work one out). I know these things because they are known by recognized knowledge sources and I got them from socially recognized reliable transmitters of knowledge. This holds even if I can’t now remember where I learned it and am not capable of coming up with the evidence or proofs that sit in the heads of others.</span></p><span data-dcnode-id="2231" instrument_node="">
</span><p class="mb15" data-dcnode-id="2229"><span data-dcnode-id="2230" instrument_node="">My indirect and usually very superficial knowledge is anchored in the social network of experts and paths of transmission. Similarly, even the knowledge of experts is typically anchored in large part in that of other experts, as architects rely on results in materials science, industrial design, designers and manufacturers of drafting tables and instruments, and so on. Again, an enormous amount of anyone’s knowledge exists only by way of a larger community of cognizers and their interactions. These aspects of knowledge—including knowledge worked out in the privacy of my study or laboratory—are “knowledge” only by virtue of being anchored in a larger social network, independently of the particular neurobiology they are grounded in.</span></p><span data-dcnode-id="2228" instrument_node="">
</span><p class="mb15" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">Consider a team of researchers writing a manuscript together. A complete account of collaboration and outsourcing involved in joint manuscript writing would have to include not only the brains of the authors, but also those whose evidence or testimony provides the support for claims made in the manuscript. If the manuscript presents findings summarizing a report, then the network would have to include the brains of everybody who wrote the report, or perhaps only those who contributed relevant parts. But how would you decide whose brain is relevant? It would depend on whether relevant knowledge was referenced in the manuscript. In other words, the structure of the knowledge is necessary to determine the relevant source and corresponding neural network to represent that knowledge. The knowledge would therefore not be reducible to a neural network, because identifying the network would depend on the knowledge.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p class="mb15" data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">Anyone attempting to describe the cross-brain neural network involved in writing a given manuscript, in the relevant processing and transmission (or lack thereof) of various sorts of information from multiple diverse sources, would not know which brains to look at, or what to look for in different brains, without already being able to identify how each bit of information in the manuscript is grounded. But even if we could identify </span><i data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">a posteriori</span></i><span data-dcnode-id="2221" instrument_node=""> the network of brains or profiles of brain activity pertinent to a given piece of collaborative writing, we would be no further in explaining how or why the article came to be written. The reason that some ideas enter into a representation is because they elaborate on or integrate the representation in a more or less coherent way. One reason a report gets cited in a manuscript is that it supports or illustrates some informational point. If there is resonance among neural networks, it is because the information they represent is resonant; the neural networks are secondary. The knowledge held by the community is driving; any emergent neural networks are coming along for the ride.</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p class="mb0" data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node="">At the beginning of this essay, we stated three widely-held assumptions in cognitive neuroscience that are inconsistent with facts about what and how people know. Our aim is not to diminish the important contributions of cognitive neuroscience. The assumptions we stated do hold for a variety of critical functions: Procedural knowledge is held in individual brains (or at least individual nervous systems in interaction with the world), and people obviously retain some symbolic knowledge in their individual brains. Moreover, common sense is enough to indicate that knowledge at a basic-level (</span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="2217" instrument_node="">Rosch, 1978</span></a><span data-dcnode-id="2215" instrument_node="">) is regularly transferred between individuals. But far more symbolic knowledge than people are aware of is held by others – outside the individual’s brain. Thus, the purpose of much of cognitive neuroscience, to reduce knowledge to the neural level, is a pipe dream. The fact of communal knowledge creates a key limitation or boundary conditions for cognitive neuroscience.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><a data-dcnode-id="2212" id="S11" name="S11"></a><h2 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Summary and Implications</span></h2><span data-dcnode-id="2209" instrument_node="">
</span><p class="mb15" data-dcnode-id="2195"><span data-dcnode-id="2208" instrument_node="">We have elaborated a theory of the community of knowledge, identifying as primary components outsourcing and collaboration, along with an hypothesis about how we construct epistemic pointers to potential sources of knowledge, whether those sources be people to whom we outsource knowledge or with whom we might collaborate. Our hypothesis places limits on the power of cognitive neuroscience to explain mental functioning (</span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23boxenv-star-1"><span data-dcnode-id="2207" instrument_node="">Text Box 1</span></a><span data-dcnode-id="2205" instrument_node="">). Cognitive neuroscience has often focused on tasks that, at least on their face, are performed by individuals (cf., </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2204" instrument_node="">Becchio et al., 2010</span></a><span data-dcnode-id="2202" instrument_node="">; </span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="2201" instrument_node="">Schilbach et al., 2013</span></a><span data-dcnode-id="2199" instrument_node="">). But the limited predictive power of these tasks for human behavior may reflect the fact that these tasks and methods do not capture normal human thinking and may explain some of the limited replicability and generalization of fMRI findings (</span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B82"><span data-dcnode-id="2198" instrument_node="">Turner et al., 2019</span></a><span data-dcnode-id="2196" instrument_node="">). People devote themselves to tasks that involve artifacts and representational media designed by other people, to issues created by other people, to ideas developed by and with other people, to actions that involve other people, and of course to learning from sources outside themselves. None of these tasks are amenable to a full accounting from cognitive neuroscience.</span></p><span data-dcnode-id="2194" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="2193"></div><span data-dcnode-id="2192" instrument_node="">
</span><p class="mb15" data-dcnode-id="2189" id="boxenv-star-1"><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">Box 1. Cognitive neuroscience meets the community of knowledge.</span></strong></p><span data-dcnode-id="2188" instrument_node="">
</span><p class="mb15" data-dcnode-id="2183"><span data-dcnode-id="2187" instrument_node="">Our understanding of how the world works is limited and we often rely on experts for knowledge and advice. One way that we rely on others is by </span><i data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">outsourcing</span></i><span data-dcnode-id="2184" instrument_node=""> the cognitive work and task of reasoning to experts in our community. For example, we believe that “smoking causes lung cancer” even though many of us have little understanding of why this is the case. Here, we simply appeal to knowledge and expertise that scientists within our community hold.</span></p><span data-dcnode-id="2182" instrument_node="">
</span><p class="mb15" data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">And we behave in a manner that is consistent with knowing this information. We believe that smoking would elevate the risk of lung cancer; if a person were diagnosed with lung cancer, we would suppose they were a smoker; and we choose not to smoke because of the perceived cancer risk. But, again, an explanation for why “smoking causes lung cancer” is something that most of us do not know or understand. Our limited understanding simply relies on experts in the community who have this knowledge; we outsource the cognitive task of knowing and rely on experts for advice.</span></p><span data-dcnode-id="2179" instrument_node="">
</span><p class="mb15" data-dcnode-id="2174"><span data-dcnode-id="2178" instrument_node="">It may appear that this example is a special case and that we rarely outsource our knowledge to others. But, in fact, we do this all the time. Think of how well people understand principles of science, medicine, philosophy, history, and politics, or how modern technology works. We often have very little knowledge ourselves and instead rely on others to understand, think, reason, and decide. This reliance reflects how our individual beliefs are grounded in a </span><i data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">community of knowledge</span></i><span data-dcnode-id="2175" instrument_node="">.</span></p><span data-dcnode-id="2173" instrument_node="">
</span><p class="mb15" data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">By appealing to the community, we can ground our limited understanding in expert knowledge, scientific conventions, and normative social practices. Thus, the community justifies and gives meaning to our shallow knowledge and beliefs. Without relying on the community, our beliefs would become untethered from the social conventions and scientific evidence that are necessary to support them. It would become unclear, for example, whether “smoking causes lung cancer,” bringing into question the truth of our beliefs, the motivation for our actions, and no longer supporting the function that this knowledge serves in guiding our thought and behavior. Thus, to understand the role that knowledge serves in human intelligence, it is necessary to look beyond the individual and to study the community.</span></p><span data-dcnode-id="2170" instrument_node="">
</span><p class="mb15" data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">In this article, we explore the implications of outsourcing for the field of cognitive neuroscience: To what extent is cognitive neuroscience able to study the communal nature of knowledge? How would standard neuroscience methods, such as fMRI or EEG, capture knowledge that is distributed within the community?In the case of outsourcing, knowledge is not represented by the individual and knowledge is not transferred between individuals (i.e., it is the expert(s) who hold the knowledge). Thus, to study outsourcing, cognitive neuroscience would need to establish methods to identify the source of knowledge (i.e., who has the relevant information within the community?) and characterize the socially distributed nature of brain network function (e.g., what is the neural basis of outsourcing and the capacity to refer to knowledge held in the community?).</span></p><span data-dcnode-id="2167" instrument_node="">
</span><p class="mb15" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">In this article, we identify the challenges this poses for cognitive neuroscience. One challenge is that representing the source of expertise for a given belief is not straightforward because expertise is time and context dependent, may rely on multiple members of the community, and may even depend on experts that are no longer alive. Another challenge is that outsourcing may reflect emergent knowledge that is distributed across the community rather than located within a given expert (e.g., knowledge of how to operate a navy ship is distributed across several critical roles; Hutchins, 1995). Standard methods in cognitive neuroscience, such as fMRI or EEG, are unable to directly assess knowledge distributed in the community because they are limited to examining the brains of individuals (or, at most, very small groups).</span></p><span data-dcnode-id="2164" instrument_node="">
</span><p class="mb15" data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">Thus, we argue that the outsourcing of knowledge to the community cannot be captured by methods in cognitive neuroscience that attempt to localize knowledge within the brain of an individual. We conclude that outsourcing is a central feature of human intelligence that appears to be beyond the reach of cognitive neuroscience.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p class="mb15" data-dcnode-id="2156"><span data-dcnode-id="2160" instrument_node="">Furthermore, our appeal to collective knowledge serves to reinforce the multiple realizability problem (</span><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="2159" instrument_node="">Marr, 1982</span></a><span data-dcnode-id="2157" instrument_node="">), allowing functional states to operate over complex and dynamic social networks. Whatever neural representations correspond to a bit of knowledge, they are tied to my belief by virtue of a functional relation (a placeholder in my brain that expresses the equivalent of “experts believe this!”), along with the existence of a reliable pedigree for that belief, not simply because my brain is part of a larger neural network. Functional states reflect communal knowledge. Because the human knowledge system is distributed across people, the parts of it that are anchored in others’ knowledge are beyond the reach of cognitive neuroscience.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p class="mb15" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">In sum, the community of knowledge hypothesis implies that it’s a mistake to think of neurobiology as sitting beneath and potentially explaining the cognition that constitutes the emergent thinking in which groups and communities engage. And that’s most thinking. It also implies that components of that socially distributed cognitive system cannot in principle be defined in terms of or eliminated in favor of neurobiology.</span></p><span data-dcnode-id="2152" instrument_node="">
</span><p class="mb15" data-dcnode-id="2144"><span data-dcnode-id="2151" instrument_node="">Notice that our argument against reductionism has nothing to do with the nature of consciousness, the target of many such arguments (</span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="2150" instrument_node="">Searle, 2000</span></a><span data-dcnode-id="2148" instrument_node="">; </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="2147" instrument_node="">Dennett, 2018</span></a><span data-dcnode-id="2145" instrument_node="">). In our view, this is a virtue because consciousness has escaped serious scientific analysis and therefore provides little ground for a serious scientific argument. The representations entailed by collective cognition, in contrast, can be analyzed. In principle, the representations involved in (say) designing a complex object may be abstract in the sense that they reflect interactions among knowledge stored in multiple brains, as well as the physical and virtual worlds, but they are describable nonetheless. As such, the emergent features of human cognition that we are advocating are well-documented and well-established as subjects of fruitful scientific research.</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p class="mb0" data-dcnode-id="2138"><span data-dcnode-id="2142" instrument_node="">Our argument does have positive implications about how to make progress in cognitive neuroscience. To mention only some of the most basic of these, it suggests that our models of information processing for most tasks should focus on communal, not individual, representations. Because most of what we know and reason about is stored outside our heads, our models should not be exclusively about how we represent content, but also about how we represent pointers toward knowledge that is housed elsewhere. Because our actions are joint with others, models of information processing require not only a notion of intention, but a notion of shared intention (</span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B80"><span data-dcnode-id="2141" instrument_node="">Tomasello et al., 2005</span></a><span data-dcnode-id="2139" instrument_node="">). Finally, models of judgment that apply to objects of any complexity need to address how we outsource information, not just how we aggregate beliefs and evidence.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><a data-dcnode-id="2136" id="S12" name="S12"></a><h2 data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Conclusion</span></h2><span data-dcnode-id="2133" instrument_node="">
</span><p class="mb0" data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">The goal of this article is to focus cognitive neuroscientists on important facts about cognitive processing that have been neglected, and that, if attended to, would facilitate the project of cognitive neuroscience. Greater understanding of how people collaborate would help reveal how neural processing makes use of group dynamics and affiliation, and it would support a more realistic model of mental activity that acknowledges individual limitations. Greater understanding of how people outsource would help reveal the actual nature and limits of neural representation, and shed light on how people organize information by revealing how they believe it is distributed in the community and the world. And greater appreciation of the emergent nature of knowledge in society would help us recognize the limits of cognitive neuroscience, that the study of the brain alone cannot reveal the representations responsible for activities that involve the community. Thus, we join the call for a new era in cognitive neuroscience, one that seeks to establish explanatory theories of the human mind that recognize the communal nature of knowledge and the need to assess cognitive and neural representations at the level of the community – broadening the scope of research and theory in cognitive neuroscience by recognizing how much of what we think depends on other people.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><a data-dcnode-id="2129" id="S13" name="S13"></a><h2 data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Data Availability Statement</span></h2><span data-dcnode-id="2126" instrument_node="">
