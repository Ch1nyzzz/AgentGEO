</span><ul class="nav nav-tabs" data-dcnode-id="1093" id="myTab"><span data-dcnode-id="1116" instrument_node="">
</span><li class="active" data-dcnode-id="1113"><a data-dcnode-id="1114" data-toggle="tab" href="#tab1"><span data-dcnode-id="1115" instrument_node="">Profile</span></a></li><span data-dcnode-id="1112" instrument_node="">
</span><li class="" data-dcnode-id="1109"><a data-dcnode-id="1110" data-toggle="tab" href="#tab2"><span data-dcnode-id="1111" instrument_node="">Vision </span></a></li><span data-dcnode-id="1108" instrument_node="">
</span><li class="" data-dcnode-id="1105"><a data-dcnode-id="1106" data-toggle="tab" href="#tab3"><span data-dcnode-id="1107" instrument_node="">Mission</span></a></li><span data-dcnode-id="1104" instrument_node="">
</span><li class="" data-dcnode-id="1101"><a data-dcnode-id="1102" data-toggle="tab" href="#tab4"><span data-dcnode-id="1103" instrument_node="">Ethical Management</span></a></li><span data-dcnode-id="1100" instrument_node="">
</span><li class="" data-dcnode-id="1097"><a data-dcnode-id="1098" data-toggle="tab" href="#tab5"><span data-dcnode-id="1099" instrument_node="">Quality and Safety Policy</span></a></li><span data-dcnode-id="1096" instrument_node="">
</span><span data-dcnode-id="1094" instrument_node="">
</span></ul><span data-dcnode-id="1092" instrument_node="">
</span><div class="tab-content" data-dcnode-id="995" id="myTabContent"><span data-dcnode-id="1091" instrument_node="">
</span><div class="tab-pane fade in active" data-dcnode-id="1059" id="tab1"><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><span data-dcnode-id="1089" instrument_node=""> 	
						Institute for Communicative and Cognitive Neuro Sciences [ICCONS], established in 1998, is the first of its kind of Institutions in the field of Cognitive Neurosciences in Asian countries. The institute has a broad perspective of research and development in the field of cognition, communication, human robotics and navigation. The working philosophy and mandate of ICCONS includes,</span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">
						•	Unraveling the evolutionary, genetic and neurobiological mechanisms involved in basic cognitive functions (e.g. intelligence, perception, attention, memory, learning, language, motor planning, execution) as well as robotic functions through multidisciplinary research.
						</span></p><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">
						•	Through research and development, ICCONS aims at developing novel management, rehabilitation and remediation strategies for developmental and acquired disorders affecting all age groups, from infancy to elderly. The major disorders that come under this category include autism,  developmental language disorders, learning disability, mental retardation, cerebral palsy, global developmental delay, hearing impairment, single and multiple congenital anomalies, acquired locomotor disabilities, aphasia and other stroke-related problems, dementia of Alzheimer’s type, post-traumatic syndrome, and other neurodegenerative  and neurometabolic disorders. The rehabilitation and management of these disorders are formulated and updated according to the protocols of WHO based on ICIDH-1 (International Classification of Impairments, Disabilities and Handicaps), ICIDH-2 and ICF (International Classification of Functioning, Disability and Health). ICCONS also aims at updating existing management, rehabilitation and remediation strategies in accordance with socio-cultural situations.
						</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">
						•	Generation of sufficient manpower through regular academic programs and long- and short- term training programs for the service of individuals affected with cognitive and communicative disorders.
						</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">
						•	Collaboration/interaction with national and international institutions, universities and NGOs working in similar areas to achieve the general objectives
						</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">
						Clinical, research and academic activities of the institution are achieved through a multidisciplinary team comprising of Neurologists, Neurosurgeons, Psychiatrists, Pediatricians, ENT specialists, Physiatrists, Speech Language Pathologists, Clinical Psychologists, Clinical Linguists, Physiotherapists and Special Educators. The institutes has well established Departments of Genetics (Molecular Genetics and Cytogenetics), Neurocradiology, Neurochemistry 	(evaluation of the neurochemical, endocrinological, neurometabolic and biochemical factors underlying cognitive processing and its defects). ICCONS has an Economic and Public Health division dealing with the epidemiological and public health aspects, and economic burden created by cognitive disorders and other non- communicable neurological disorders. Departments of Integrated Medical research and Center for Yoga and Meditation have been added recently. 
						</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">
						ICCONS provide clinical services  to all kinds of cognitive and communicative disorders across all age groups- childhood autism, developmental language disorders, specific learning disabilities, intellectual disability, global developmental delay, cerebral palsy, epilepsy, stroke- and traumatic brain injury- related neurological complications both in acute and chronic phase, dementia of Alzheimer’s type, other degenerative disorders such as Parkinson’s Disease, motor neuron diseases and multiple system atrophy, and any other non-communicable neurological disorders of developmental and acquired nature. 
						</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">
						ICCONS is established under the Society for Rehabilitation of Cognitive and communicative Disorders (SRCCD), an autonomous body registered under the Travancore-Cochin Literary, Scientific and Charitable Societies Act 1955. The Minister for Health and family welfare is the Chairman of the society and Minister for Social welfare is the co-chairman. The Secretary to Government Health and Family department is the Vice chairman and the Director of Sree Chithira Thirunal Institute of Medical Science and Technology is the Vice Chairman of the Society. 
						</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">
						ICCONS is the first Neurocenter in India to obtain National Accreditation Board for Hospitals &amp; Healthcare Providers (NABH) accreditation.
						</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">
						The human brain is the most complex structure known in the universe. It weighs ~1,500 grams consisting of an amalgamation of 100 billion cells, each of which is capable of making up to 1,000 connections forming a complex network. This makes the human beings unique with respect to their ability for communication through language, bipedal locomotion, complex cognitive processing (thinking, analyzing and responding to complex problems through parallel and serial computing programs), inventing novel ideas through self-exploratory programs, and developing corrections/remedies for biological systems. Yet, not even 1/3rd of the cerebral functions are known to mankind. ICCONS is a humble initiative with an ambitious program to unravel the unseen frontiers of brain functions. We solicit the collaboration of like-minded individuals, institutions and organizations in our multidisciplinary research programs.

						</span></p><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span><div class="tab-pane fade" data-dcnode-id="1035" id="tab2"><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">ICCONS will be recognized as one of the best and first of its kind institutions for communicative and cognitive neurosciences and non communicable neurological disorders in Asian countries.</span></p><span data-dcnode-id="1054" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">We will achieve this:</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">•	By providing compassionate, ethical accessible quality health care that meets or exceeds the needs and expectations of our patients, their families and others whom we serve.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p class="topdec" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">•	Through research and development we will develop novel strategies in the early detection, prevention and management of diseases.</span></p><span data-dcnode-id="1045" instrument_node="">
</span><p class="topdec" data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">•	By providing a good work environment that fosters motivations and commitment in our staff.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p class="topdec" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">•	By enabling leadership in education and communication that improves the health of the people.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><p class="topdec" data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">•	Through collaborative work with national and international scientific communities engaged in missions of similar nature.</span></p><span data-dcnode-id="1036" instrument_node="">
</span></div><span data-dcnode-id="1034" instrument_node="">
</span><div class="tab-pane fade" data-dcnode-id="1026" id="tab3"><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">The mission of ICCONS is embodied in a summery statement, which is as follows:</span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">To Provide unique and quality healthcare to developmental and acquired cognitive and communicative disorders as well as other non communicable neurological disorders gender and age across through development of specific strategies and system encompassing primary, secondary and tertiary care, and not geographically confined to existing hospital facility, to develop new services, technologies and remedial measures through research and development and carry out assigned programs and missions that would demonstrate a model for all developed and developing nations.</span></p><span data-dcnode-id="1027" instrument_node="">
</span></div><span data-dcnode-id="1025" instrument_node="">
</span><div class="tab-pane fade" data-dcnode-id="1020" id="tab4"><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">Ethics committee issues policy on medical ethics. Review, evaluate, and approve cases for ethical dilemmas, terminal care, any other potential conflict of ethical issues and Medical policy and practice</span></p><span data-dcnode-id="1021" instrument_node="">
</span></div><span data-dcnode-id="1019" instrument_node="">
</span><div class="tab-pane fade" data-dcnode-id="997" id="tab5"><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">We, at ICCONS </span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">•	Believe that quality and safety are integral to our mission and a responsibility of all staff.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><p class="topdec" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">•	Provide compassionate, ethical, accessible, safe and high quality care that meets the needs or expectations of our patients, their families and others whom we serve.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p class="topdec" data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">•	Provide an environment of quality care that promotes patient and staff safety practices as well as a culture of continuous quality improvement.
						</span></p><p class="topdec" data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">•	 Provide a safe work environment which fosters professionalism,motivation and commitment in our staff.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p class="topdec" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">•	Enable leadership in health and education that improves the physical and mental wellbeing of the patient and their families.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The activities of the Institution are controlled by a Governing body and executive committee constituted by order of Govt. of Kerala (order no) and comprising of Ministers of Health &amp; Social Welfare, the Secretaries to Govt.,   Health, Finance, Education, Social Welfare and Head of the Departments of Health Services and Medical Education services, eminent social scientists and academicians. The Director of the Institute according to the MOU is a Neurologist having outstanding contribution in the field of Cognitive and Communicative Neuro Sciences.</span></p><span data-dcnode-id="998" instrument_node="">
</span></div><span data-dcnode-id="996" instrument_node="">
</span></div><span data-dcnode-id="994" instrument_node="">
</span></div></div><span data-dcnode-id="991" instrument_node="">
