</span><meta content="This article outlines a framework of creativity based on functional neuroanatomy. Recent advances in the field of cognitive neuroscience have identified distinct brain circuits that are involved in specific higher brain functions. To date, these findings have not been applied to research on creativity. It is proposed that there are four basic types of creative insights, each mediated by a distinctive neural circuit. By definition, creative insights occur in consciousness. Given the view that the working memory buffer of the prefrontal cortex holds the content of consciousness, each of the four distinctive neural loops terminates there. When creativity is the result of deliberate control, as opposed to spontaneous generation, the prefrontal cortex also instigates the creative process. Both processing modes, deliberate and spontaneous, can guide neural computation in structures that contribute emotional content and in structures that provide cognitive analysis, yielding the four basic types of creativity. Supportive evidence from psychological, cognitive, and neuroscientific studies is presented and integrated in this article. The new theoretical framework systematizes the interaction between knowledge and creative thinking, and how the nature of this relationship changes as a function of domain and age. Implications for the arts and sciences are briefly discussed." data-dcnode-id="6875" name="dc.description"><span data-dcnode-id="6874" instrument_node="">

</span><meta content="This article outlines a framework of creativity based on functional neuroanatomy. Recent advances in the field of cognitive neuroscience have identified distinct brain circuits that are involved in specific higher brain functions. To date, these findings have not been applied to research on creativity. It is proposed that there are four basic types of creative insights, each mediated by a distinctive neural circuit. By definition, creative insights occur in consciousness. Given the view that the working memory buffer of the prefrontal cortex holds the content of consciousness, each of the four distinctive neural loops terminates there. When creativity is the result of deliberate control, as opposed to spontaneous generation, the prefrontal cortex also instigates the creative process. Both processing modes, deliberate and spontaneous, can guide neural computation in structures that contribute emotional content and in structures that provide cognitive analysis, yielding the four basic types of creativity. Supportive evidence from psychological, cognitive, and neuroscientific studies is presented and integrated in this article. The new theoretical framework systematizes the interaction between knowledge and creative thinking, and how the nature of this relationship changes as a function of domain and age. Implications for the arts and sciences are briefly discussed." data-dcnode-id="6479" property="og:description"><span data-dcnode-id="6478" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="3094" data-track-component="article body"><span data-dcnode-id="6052" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="6045" data-gtm-vis-first-on-screen-50443292_562="2878" data-gtm-vis-first-on-screen-50443292_563="2877" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2878" data-gtm-vis-recent-on-screen-50443292_563="2877" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="6046" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="6050" id="Abs1"><span data-dcnode-id="6051" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="6047" id="Abs1-content"><p data-dcnode-id="6048"><span data-dcnode-id="6049" instrument_node="">This article outlines a framework of creativity based on functional neuroanatomy. Recent advances in the field of cognitive neuroscience have identified distinct brain circuits that are involved in specific higher brain functions. To date, these findings have not been applied to research on creativity. It is proposed that there are four basic types of creative insights, each mediated by a distinctive neural circuit. By definition, creative insights occur in consciousness. Given the view that the working memory buffer of the prefrontal cortex holds the content of consciousness, each of the four distinctive neural loops terminates there. When creativity is the result of deliberate control, as opposed to spontaneous generation, the prefrontal cortex also instigates the creative process. Both processing modes, deliberate and spontaneous, can guide neural computation in structures that contribute emotional content and in structures that provide cognitive analysis, yielding the four basic types of creativity. Supportive evidence from psychological, cognitive, and neuroscientific studies is presented and integrated in this article. The new theoretical framework systematizes the interaction between knowledge and creative thinking, and how the nature of this relationship changes as a function of domain and age. Implications for the arts and sciences are briefly discussed.</span></p></div></div></section><span data-dcnode-id="6044" instrument_node="">
