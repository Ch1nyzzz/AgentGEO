2,0.6-0.1c0.2,0.1,0.2,0.4,0.1,0.6c-0.1,0.1-1.3,1.8-4.3,1.8c-3,0-4.2-1.7-4.3-1.8c-0.1-0.2-0.1-0.5,0.1-0.6C5.9,14.4,6,14.3,6.1,14.3z" data-dcnode-id="952"></path><span data-dcnode-id="951" instrument_node=""> </span><span data-dcnode-id="949" instrument_node=""> </span><span data-dcnode-id="947"><span data-dcnode-id="948" instrument_node=""> Reddit </span></span><span data-dcnode-id="946" instrument_node=""> </span></a></li></ul></div><div class="entry-content" data-dcnode-id="866"><p data-dcnode-id="938"><a data-dcnode-id="940" data-slb-active="1" data-slb-asset="1704441082" data-slb-internal="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/wp-content/uploads/2018/02/shadow-people-dark.jpeg"><img alt="" class="alignleft size-medium wp-image-2586" data-dcnode-id="941" height="168" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/wp-content/uploads/2018/02/shadow-people-dark-300x168.jpeg&amp;raw" srcset="https://anomalien.com/wp-content/uploads/2018/02/shadow-people-dark-300x168.jpeg 300w, https://anomalien.com/wp-content/uploads/2018/02/shadow-people-dark-696x390.jpeg 696w, https://anomalien.com/wp-content/uploads/2018/02/shadow-people-dark.jpeg 749w" width="300"></a><span data-dcnode-id="939" instrument_node="">As with most supernatural phenomena there is usually a proposed logical, scientifically valid explanation for those who claim to have experienced some form of paranormal phenomenon. Usually these scientific explanations are neither geared to vilify eyewitnesses, nor do they require the violation of generally accepted scientific principles.   However, for some die-hard believers who know what they saw these explanations sometimes tend to offend mostly because these articles on average tend to be written in a condescending tone.  Yet, even though some of these explanations might offend them it doesn’t discredit the probability that in most of the cases these theories might have been a factor.</span></p><p data-dcnode-id="937"></p><div data-dcnode-id="930" style="content: '';display: block;margin-bottom: 10px;text-align: center;clear: both;"><span data-dcnode-id="935" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-8663321385541888" data-ad-slot="8952875417" data-dcnode-id="934" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="933" instrument_node=""> </span></div><p data-dcnode-id="929"></p><p data-dcnode-id="926"><strong data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Chemical Agents</span></strong></p><p data-dcnode-id="925"></p><div class="ct-mailchimp-block" data-dcnode-id="919"><h3 data-dcnode-id="922" style="margin-bottom: 0px;"><span data-dcnode-id="924" instrument_node="">Like anomalien.com on Facebook </span><iframe allow="encrypted-media" allowtransparency="true" data-dcnode-id="923" frameborder="0" height="30" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/plugins/like.php%3Fhref%3Dhttps%253A%252F%252Fwww.facebook.com%252FAnomalien.com%26width%3D94%26layout%3Dbutton_count%26action%3Dlike%26size%3Dlarge%26show_faces%3Dfalse%26share%3Dfalse%26height%3D21%26appId%3D369769210447038&amp;raw" style="border:none;overflow:hidden" width="120"></iframe></h3><p class="ct-mailchimp-description" data-dcnode-id="920" style="margin-bottom: 0px;margin-top: 0px;"><span data-dcnode-id="921" instrument_node="">To stay in touch &amp; get our latest news</span></p></div><p data-dcnode-id="918"></p><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The use of narcotics and psychotropic agents including methamphetamine, cocaine, and LSD can produce shadow human shaped hallucinations. Dopaminergic drugs such as pramlpexole can sometimes cause these hallucinations. Common over-the-counter medication can also have a similar effect if taken in sufficient quantity.</span></p><p data-dcnode-id="915"></p><p data-dcnode-id="912"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Electromagnetic fields</span></strong></p><p data-dcnode-id="911"></p><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">It has also been proven recently that areas with erratic or powerful electromagnetic fields can interfere with the electrical impulses or firing synapses of the human mind, thus influencing people subjected to such environments over time to believe that they are hearing or seeing ghosts, aliens, or perhaps shadow beings.  Such environments include old buildings with substandard wiring, power plants, and areas with naturally occurring strong magnetic fields.</span></p><p data-dcnode-id="908"></p><div data-dcnode-id="901" style="content: '';display: block;margin-bottom: 10px;text-align: center;clear: both;"><span data-dcnode-id="906" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-8663321385541888" data-ad-slot="9014963901" data-dcnode-id="905" style="display:inline-block;width:300px;height:250px"></ins><span data-dcnode-id="904" instrument_node=""> </span></div><p data-dcnode-id="900"></p><p data-dcnode-id="897"><strong data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Pareidolia</span></strong></p><p data-dcnode-id="896"></p><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">In most instances, witnesses report seeing shadow people in the peripheral areas of their vision. This area of vision is linked to the areas of the brain that recognizes patterns, however, it provides less detail to the brain than macular (center-forward) vision.  This can lead to a condition known as pareidolia in which the brain incorrectly interprets random patterns of light-shadow or texture as being familiar patterns such as faces and human forms. The same condition can also be observed in macular vision in low light conditions or when viewing a complex but random image. A common example, would be perceiving a shadow thrown by an item of furniture in a darkened room as being a person.</span></p><p data-dcnode-id="893"></p><p data-dcnode-id="890"><strong data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Hypnogogla</span></strong></p><p data-dcnode-id="889"></p><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Hypnogogla which is also known as waking-sleep is a documented physiological condition in which a person is part way between sleeping and waking. It is during Hypnogogla that a person can experience both being conscious of their surrounding while also being in a dream-like state where they can perceive images from their subconscious.  People experiencing waking sleep commonly report the sensation of lights or shadows moving around them, as well as other visual hallucinations. A feeling of dread is also a sensation that occurs when experiencing waking-sleep.  Hypnogogla is also known as ‘the faces in the dark phenomenon’ because those who experience the state commonly report seeing faces while experiencing waking-sleep. Similar hypothesis have been put forward linking the condition to a number of other apparent paranormal experiences including alien abduction and paranormal nocturnal visitations.</span></p><p data-dcnode-id="886"></p><p data-dcnode-id="883"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Neurological Conditions</span></strong></p><p data-dcnode-id="882"></p><div data-dcnode-id="875" style="content: '';display: block;margin-bottom: 15px;text-align: center;clear: both;"><span data-dcnode-id="880" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-8663321385541888" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="7240244974" data-dcnode-id="879" style="display:block; text-align:center;"></ins><span data-dcnode-id="878" instrument_node=""> </span></div><p data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Certain neurological conditions, such as Photosensitive Epilepsy, and complex partial Seizures, have also been shown to cause sufferers to see shadow people. Photosensitive epilepsy is a form of epilepsy in which seizures are triggered by visual stimuli that form patterns in time or space, such as flashing lights, bold, regular patterns, or regular moving patterns. While Complex partial seizures are epileptic seizures that is limited to one cerebral hemisphere and causes impairment of awareness or responsiveness.</span></p><p data-dcnode-id="872"></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">In conclusion, all of these theories that have been put forward by scientists are plausible as long as those factors that brought on the effect where present at the time the witness claimed to have seen the shadow person.  Yet, here lies the heart of the problem between the believer and the skeptic one side says I know what I saw and none of this applies.   While the other side hasn’t done enough out of the lab experiments in the home to verify their claims.  Yet, it should be also noted that one aspect of alleged eyewitness accounts of shadow people that remains difficult to explain in objective scientific terms is the similarity of the shadow beings seen in these alleged accounts since children as young as four years old have seen them.  Could it be a cultural throw back? that is making people around the globe to see the same thing? It is probable since there are many similarities between shadow people reports and the grim reaper that are shared in the subconscious of all people. Just as people all over the world report dreams of flying and failing.</span></p><p data-dcnode-id="869"></p><p data-dcnode-id="868"></p><p data-dcnode-id="867"></p></div><ul class="entry-meta entry-tags" data-dcnode-id="853" data-label="" data-type="simple"><li data-dcnode-id="863"><a data-dcnode-id="864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/tag/aliens/" rel="tag"><span data-dcnode-id="865" instrument_node="">Aliens</span></a></li><li data-dcnode-id="860"><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/tag/ghost-stories/" rel="tag"><span data-dcnode-id="862" instrument_node="">Ghost Stories</span></a></li><li data-dcnode-id="857"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/tag/monsters/" rel="tag"><span data-dcnode-id="859" instrument_node="">Monsters</span></a></li><li data-dcnode-id="854"><a data-dcnode-id="855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anomalien.com/tag/space-secrets/" rel="tag"><span data-dcnode-id="856" instrument_node="">Space Secrets</span></a></li></ul><div class="share-box" data-dcnode-id="795" data-location="bottom" data-type="type-1"><ul data-dcnode-id="796"><li class="share_count" data-dcnode-id="845"><svg data-dcnode-id="849" height="16" viewBox="0 0 22 22" width="16"></svg><span data-dcnode-id="852" instrument_node=""> </span><path d="M 18 2 A 3 3 0 0 0 15 5 A 3 3 0 0 0 15.054688 5.5605469 L 7.9394531 9.7109375 A 3 3 0 0 0 6 9 A 3 3 0 0 0 3 12 A 3 3 0 0 0 6 15 A 3 3 0 0 0 7.9355469 14.287109 L 15.054688 18.439453 A 3 3 0 0 0 15 19 A 3 3 0 0 0 18 22 A 3 3 0 0 0 21 19 A 3 3 0 0 0 18 16 A 3 3 0 0 0 16.0625 16.712891 L 8.9453125 12.560547 A 3 3 0 0 0 9 12 A 3 3 0 0 0 8.9453125 11.439453 L 16.060547 7.2890625 A 3 3 0 0 0 18 8 A 3 3 0 0 0 21 5 A 3 3 0 0 0 18 2 z" data-dcnode-id="851"></path><span data-dcnode-id="850" instrument_node=""> </span><span data-dcnode-id="848" instrument_node=""> 1492 </span><span class="share_text" data-dcnode-id="846"><span data-dcnode-id="847" instrument_node=""> Shares</span></span></li><li class="share_facebook" data-dcnode-id="833" data-share-network="facebook"><span data-dcnode-id="844" instrument_node=""> </span><a data-dcnode-id=
