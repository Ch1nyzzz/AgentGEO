</span><h2 data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Sleep deprivation</span></h2><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="738" instrument_node="">Many of us have experienced the effects: feeling tired and cranky, or finding it hard to concentrate. </span><a data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cosmosmagazine.com/health/surprising-insights-into-sleeps-purpose/"><span data-dcnode-id="737" instrument_node="">Sleep</span></a><span data-dcnode-id="735" instrument_node=""> is more important for our </span><a data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cosmosmagazine.com/science/biology/the-brains-wiring-as-youve-never-seen-it-before/"><span data-dcnode-id="734" instrument_node="">brains</span></a><span data-dcnode-id="732" instrument_node=""> than you may realise.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Although it may appear you’re “switching off” when you fall asleep, the brain is far from inactive. What we know from studying patterns of brain electrical activity is that while you sleep, your brain cycles through two main types of patterns: rapid eye movement (REM) sleep and slow-wave sleep.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Slow-wave sleep, which occurs more at the beginning of the night, is characterised by slow rhythms of electrical activity across large numbers of brain cells (occurring one to four times per second). As the night progresses, we have more and more REM sleep. During REM sleep we often have vivid dreams, and our brains show similar patterns of activity to when we are awake.</span></p><span data-dcnode-id="724" instrument_node="">
</span><h2 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">What are our brains doing while we sleep?</span></h2><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Sleep serves many different functions. One of these is to help us remember experiences we had during the day. REM sleep is thought to be important for emotional memories (for example, memories involving fear) or procedural memory (such as how to ride a bike). On the other hand, slow-wave sleep is thought to reflect the storing of so-called “declarative” memories, which are the conscious record of your experiences and what you know (for example, what you had for breakfast).</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">We also know experiences are replayed in the brain during sleep – the memories of these experiences are like segments from a movie that can be rewound and played forward again. Replay occurs in neurons in the hippocampus – </span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qbi.uq.edu.au/brain-basics/memory/where-are-memories-stored" rel="noopener" target="_blank"><span data-dcnode-id="716" instrument_node="">a brain region important for memory</span></a><span data-dcnode-id="714" instrument_node="">&nbsp;–&nbsp;and has been best studied in rats learning to navigate a maze. After a navigation exercise, when the rat is resting, its brain replays the path it took. This helps to strengthen the connections between brain cells, and is therefore thought to be important for consolidating memories.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">But is it that important for you to remember what you had for breakfast? Probably not. That’s why the brain needs to be selective. Sleep allows it to sift through memories, forgetting certain things and prioritising what’s important. One way it may do this is by pruning away or scaling down unwanted connections.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">A leading theory of sleep function – the </span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24411729" rel="noopener" target="_blank"><span data-dcnode-id="707" instrument_node="">synaptic homeostasis hypothesis</span></a><span data-dcnode-id="705" instrument_node=""> – suggests that during sleep there is a widespread weakening of synapses, the connections throughout the brain.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">This is thought to counterbalance the overall strengthening of these connections that occurs when we are awake and learning. By pruning away excess connections, </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cosmosmagazine.com/health/sleep-cleans-the-brain/"><span data-dcnode-id="701" instrument_node="">sleep effectively cleans the slate</span></a><span data-dcnode-id="699" instrument_node="">, so we can learn again the next day. Interfering with this scaling down process can, in some cases, lead to more intense (and perhaps unwanted) memories.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The importance of sleep for keeping our brains active may be reflected in our changing sleep patterns as we age. Babies and children sleep much more than adults, probably because their developing brains are learning much more, and being exposed to new situations.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Later in life, sleep declines and becomes more fragmented. This may reflect either a reduced need for sleep (because we are learning less), or a breakdown in sleep processes as we age.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">Sleep is also needed to do a bit of brain housekeeping. A </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/24136970" rel="noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">2013 US study in mice</span></a><span data-dcnode-id="687" instrument_node=""> found that sleep cleanses the brain of toxins that accumulate during waking hours. During sleep, the space between brain cells increases, allowing toxic proteins to be flushed out. It’s possible that by removing these, sleep may stave off neurodegenerative diseases such as Alzheimer’s.</span></p><span data-dcnode-id="685" instrument_node="">
</span><h2 data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Sleep deprivation: the reality</span></h2><span data-dcnode-id="682" instrument_node="">
</span><figure aria-describedby="caption-attachment-119361" class="wp-caption alignright" data-dcnode-id="678" id="attachment_119361" style="width: 300px"><img alt="Sleep deprivation effects" class="size-thumbnail wp-image-119361" data-dcnode-id="681" data-spai="1" data-spai-exclude="none" data-spai-height="300" data-spai-lazy-loaded="true" data-spai-orig="/wp-content/uploads/2020/10/190319_four-ways-sleep-deprivation-affects-you_Body_cartoon-animation-man-sleep-insomnia-300x300.jpg" data-spai-orig-obs="true" data-spai-target="src" data-spai-width="300" height="300" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shortpixel.ai/spai/q_lossy%2Bto_webp%2Bret_img/https%3A//cosmosmagazine.com/wp-content/uploads/2020/10/190319_four-ways-sleep-deprivation-affects-you_Body_cartoon-animation-man-sleep-insomnia-300x300.jpg&amp;raw" srcset="https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://cosmosmagazine.com/wp-content/uploads/2020/10/190319_four-ways-sleep-deprivation-affects-you_Body_cartoon-animation-man-sleep-insomnia-300x300.jpg 300w, https://cdn.shortpixel.ai/spai/q_lossy+ret_img+to_webp/https://cosmosmagazine.com/wp-content/uploads/2020/10/190319_four-ways-sleep-deprivation-affects-you_Body_cartoon-animation-man-sleep-insomnia-100x100.jpg 100w" width="300"><figcaption class="wp-caption-text" data-dcnode-id="679" id="caption-attachment-119361"><span data-dcnode-id="680" instrument_node="">Credit: Tetiana Lazunova/Getty Images</span></figcaption></figure><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Getting enough sleep is important for attention and learning during our waking hours. When we are sleep-deprived, we can’t focus on large amounts of information or sustain attention for long periods. Our reaction times are slowed. We are also less likely to be creative or discover hidden rules when trying to solve a problem.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">When you haven’t had enough sleep, your brain may force itself to shut down for a few seconds while you’re awake. This is called a micro-sleep and is potentially very dangerous. Drowsiness is a leading cause of motor vehicle accidents, and sleep deprivation affects the brain as severely as alcohol. Sleep deprivation can also lead to fatal accidents in the workplace – a major issue in shift workers.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="670" instrument_node="">The beneficial effects of sleep on attention and concentration are particularly important for children, who often become hyperactive and disruptive in class when they don’t have enough sleep. </span><a data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pediatrics.aappublications.org/content/early/2012/10/10/peds.2012-0564" rel="noopener" target="_blank"><span data-dcnode-id="669" instrument_node="">A 2012 study in the journal </span></a><i data-dcnode-id="665"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pediatrics.aappublications.org/content/early/2012/10/10/peds.2012-0564" rel="noopener" target="_blank"><span data-dcnode-id="667" instrument_node="">Pediatrics</span></a></i><span data-dcnode-id="664" instrument_node=""> found getting just one hour less sleep per night over several nights could adversely affect a child’s behaviour in class.</span></p><span data-dcnode-id="662" instrument_node="">
</span><h2 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Chronic sleep deprivation</span></h2><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">The longer-term effects of sleep deprivation are more difficult to study in humans for ethical reasons, but chronic sleep disturbances have been linked to brain disorders such as schizophrenia, autism and Alzheimer’s. We don’t know if sleep disturbances are a cause or symptom of these disorders.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Overall, the evidence suggests having healthy sleep patterns is key to having a healthy and well-functioning brain.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="647"><i data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">This story was prepared by the Queensland Brain Institute and first published on The Conversation. Read </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/why-our-brain-needs-sleep-and-what-happens-if-we-dont-get-enough-of-it-83145" rel="noopener" target="_blank"><span data-dcnode-id="651" instrument_node="">the original article</span></a><span data-dcnode-id="649" instrument_node="">.</span></i></p><span data-dcnode-id="646" instrument_node="">
