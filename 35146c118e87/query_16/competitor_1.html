</span><h3 data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">In This Article</span></h3><span data-dcnode-id="2398" instrument_node="">
</span><ul data-dcnode-id="2384"><span data-dcnode-id="2397" instrument_node="">
</span><li data-dcnode-id="2394"><a class="scrollto" data-dcnode-id="2395" href="javascript:void(0);" id="toc-how-are-memory-and-sleep-connected--1"><span data-dcnode-id="2396" instrument_node="">How Are Memory and Sleep Connected?</span></a></li><span data-dcnode-id="2393" instrument_node="">
</span><li data-dcnode-id="2390"><a class="scrollto" data-dcnode-id="2391" href="javascript:void(0);" id="toc-how-does-sleep-deprivation-affect-brain-function-and-memory--2"><span data-dcnode-id="2392" instrument_node="">How Does Sleep Deprivation Affect Brain Function and Memory?</span></a></li><span data-dcnode-id="2389" instrument_node="">
</span><li data-dcnode-id="2386"><a class="scrollto" data-dcnode-id="2387" href="javascript:void(0);" id="toc-sleep-apnea-and-memory-loss-3"><span data-dcnode-id="2388" instrument_node="">Sleep Apnea and Memory Loss</span></a></li><span data-dcnode-id="2385" instrument_node="">

</span><div data-dcnode-id="2378" id="speechkit-player" style="height:60px;"></div><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2376" instrument_node="">Scientists and researchers have studied the relationship between </span><span class="trusted-wrap" data-dcnode-id="2371"><a class="add-trustee trusted" data-dcnode-id="2372" data-href="https://www.nih.gov/news-events/news-releases/brain-may-actively-forget-during-dream-sleep" data-reference-id="1" data-source-id="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2375" instrument_node="">memory and sleep</span><sup data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">1</span></sup></a></span><span data-dcnode-id="2370" instrument_node=""> for more than 100 years. The general consensus today is that </span><span class="trusted-wrap" data-dcnode-id="2365"><a class="add-trustee trusted" data-dcnode-id="2366" data-href="https://www.ninds.nih.gov/Disorders/patient-caregiver-education/understanding-sleep" data-reference-id="2" data-source-id="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2369" instrument_node="">memory consolidation</span><sup data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">2</span></sup></a></span><span data-dcnode-id="2364" instrument_node=""> – the process of preserving key memories and discarding excessive information – takes place during both the non-rapid eye movement (NREM) and rapid eye movement (REM) stages of your </span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/stages-of-sleep"><span data-dcnode-id="2363" instrument_node="">sleep cycle</span></a><span data-dcnode-id="2361" instrument_node="">.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2348"><span data-dcnode-id="2358" instrument_node="">Recent studies also suggest that </span><span class="trusted-wrap" data-dcnode-id="2353"><a class="add-trustee trusted" data-dcnode-id="2354" data-href="https://jamanetwork.com/journals/jamanetworkopen/fullarticle/2770743" data-reference-id="3" data-source-id="73" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2357" instrument_node="">insufficient and excessive sleep</span><sup data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">3</span></sup></a></span><span data-dcnode-id="2352" instrument_node=""> can affect memory processing and other cognitive processes. A good night’s rest not only promotes good </span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/physical-health"><span data-dcnode-id="2351" instrument_node="">physical health</span></a><span data-dcnode-id="2349" instrument_node=""> but also enables our brains to function properly, so getting the recommended amount of sleep each night is key to consolidating memories.</span></p><span data-dcnode-id="2347" instrument_node="">
</span><h2 data-dcnode-id="2345" id="how-are-memory-and-sleep-connected--1"><span data-dcnode-id="2346" instrument_node="">How Are Memory and Sleep Connected?</span></h2><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2343" instrument_node="">Sleep and memory share a complex relationship. Getting enough rest helps you </span><span class="trusted-wrap" data-dcnode-id="2338"><a class="add-trustee trusted" data-dcnode-id="2339" data-href="https://newsinhealth.nih.gov/2013/04/sleep-it" data-reference-id="4" data-source-id="55" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2342" instrument_node="">process new information</span><sup data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">4</span></sup></a></span><span data-dcnode-id="2337" instrument_node=""> once you wake up, and sleeping after learning can consolidate this information into memories, allowing you to store them in your brain.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">A healthy adult’s sleep cycle consists of four distinct stages. The first two stages are considered light NREM sleep, and the third is deep (or “slow-wave”) NREM sleep. These three stages prepare your brain to learn new information the following day. Not sleeping or getting enough sleep can lower your learning abilities by as much as 40%.</span></p><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">During these NREM stages, the brain also sorts through your various memories from the previous day, filtering out important memories and eliminating other information. These selected memories will become more concrete as deep NREM sleep begins, and this process will continue during REM sleep. Emotional memories are also processed in the REM stage, which can help you cope with difficult experiences.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Most dreaming occurs in REM sleep. The thalamus of the brain transmits cues from your five senses to the cerebral cortex, a thin layer of the cerebrum that interprets and processes information from your memories. The thalamus is largely inactive during NREM stages, but when REM sleep begins, it will relay images, sounds, and other sensations to the cerebral cortex that are then integrated into your dreams.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><h2 data-dcnode-id="2324" id="how-does-sleep-deprivation-affect-brain-function-and-memory--2"><span data-dcnode-id="2325" instrument_node="">How Does Sleep Deprivation Affect Brain Function and Memory?</span></h2><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2312"><span data-dcnode-id="2322" instrument_node="">People who don’t get enough sleep may experience the effects of </span><a data-dcnode-id="2320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-deprivation"><span data-dcnode-id="2321" instrument_node="">sleep deprivation</span></a><span data-dcnode-id="2319" instrument_node="">. </span><span class="trusted-wrap" data-dcnode-id="2314"><a class="add-trustee trusted" data-dcnode-id="2315" data-href="https://www.nhlbi.nih.gov/health-topics/sleep-deprivation-and-deficiency" data-reference-id="5" data-source-id="37" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2318" instrument_node="">Difficulty remembering things</span><sup data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">5</span></sup></a></span><span data-dcnode-id="2313" instrument_node=""> is one common symptom. Since the brain does not have sufficient time to create new pathways for the information you’ve recently learned, sleep deprivation often affects how memories are consolidated. Other potential cognitive impacts include trouble learning and focusing, reduced decision-making skills, and poor emotional and behavioral control.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2310" instrument_node="">How much sleep you should get each night largely depends on your age. In addition to adults, studies have concluded children experience stronger </span><a data-dcnode-id="2306" data-reference-id="6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-020-66880-3" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2309" instrument_node="">memory consolidation</span><sup data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">6</span></sup></a><span data-dcnode-id="2305" instrument_node=""> after a good night’s sleep. That said, excessive sleep can also lead to cognitive impairments. Every person should strive for the optimal amount of nightly sleep, as too little or too much can have negative repercussions.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">Our </span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works/how-much-sleep-do-we-really-need"><span data-dcnode-id="2301" instrument_node="">recommendations for nightly sleep</span></a><span data-dcnode-id="2299" instrument_node=""> based on age are as follows:</span></p><span data-dcnode-id="2297" instrument_node="">

23" instrument_node="">School-age</span></td><td data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">6-13 years</span></td><td data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">9-11 hours</span></td></tr><tr data-dcnode-id="2202"><td data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Teen</span></td><td data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">14-17 years</span></td><td data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">8-10 hours</span></td></tr><tr data-dcnode-id="2190"><td data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Young Adult</span></td><td data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">18-25 years</span></td><td data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">7-9 hours</span></td></tr><tr data-dcnode-id="2178"><td data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">Adult</span></td><td data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">26-64 years</span></td><td data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">7-9 hours</span></td></tr><tr data-dcnode-id="2166"><td data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Older Adult</span></td><td data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">65 years or older</span></td><td data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">7-8 hours</span></td></tr></tbody></table><span data-dcnode-id="2161" instrument_node="">
</span></div><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2158" instrument_node="">Some studies have found </span><a data-dcnode-id="2154" data-reference-id="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/nn.3324" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2157" instrument_node="">sleep quality decreases with age</span><sup data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">7</span></sup></a><span data-dcnode-id="2153" instrument_node="">. This is tied to slow-wave sleep. Slow waves are produced in an area of the brain known as the medial prefrontal cortex. The medial prefrontal cortex will deteriorate over time, and as a result, older people typically experience less slow-wave sleep during a normal sleep cycle and have a harder time processing memories.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><div class="klaviyo-form-QT7Gq7" data-dcnode-id="2150"></div><span data-dcnode-id="2149" instrument_node="">

</span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2144" instrument_node="">
</span><h2 data-dcnode-id="2142" id="sleep-apnea-and-memory-loss-3"><span data-dcnode-id="2143" instrument_node="">Sleep Apnea and Memory Loss</span></h2><span data-dcnode-id="2141" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2140" instrument_node="">Since sleep is so crucial to the formation and consolidation of memories, some </span><span class="trusted-wrap" data-dcnode-id="2135"><a class="add-trustee trusted" data-dcnode-id="2136" data-href="https://learn.aasm.org/Users/LearningActivity/LearningActivityDetail.aspx?LearningActivityID=%2fgqQVDMQIT%2fEDy86PWgqgQ%3d%3d" data-reference-id="8" data-source-id="65" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2139" instrument_node="">sleep disorders</span><sup data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">8</span></sup></a></span><span data-dcnode-id="2134" instrument_node=""> are associated with memory problems. </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/insomnia"><span data-dcnode-id="2133" instrument_node="">Insomnia</span></a><span data-dcnode-id="2131" instrument_node="">, defined as persistent difficulty initiating or maintaining sleep, is known to cause daytime cognitive impairments including reduced memory functioning. Sleep disorders that lead to </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/excessive-sleepiness"><span data-dcnode-id="2130" instrument_node="">excessive daytime sleepiness</span></a><span data-dcnode-id="2128" instrument_node=""> such as </span><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/narcolepsy"><span data-dcnode-id="2127" instrument_node="">narcolepsy</span></a><span data-dcnode-id="2125" instrument_node=""> can cause memory lapses.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2122" instrument_node="">One disorder, </span><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-apnea"><span data-dcnode-id="2121" instrument_node="">sleep apnea</span></a><span data-dcnode-id="2119" instrument_node="">, may actually promote memory loss. Sleep apnea is characterized by the temporary cessation of the airway during sleep that can cause people to choke or gasp for air. Heavy snoring and excessive daytime sleepiness are other common symptoms of sleep apnea.</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2107"><span class="trusted-wrap" data-dcnode-id="2112"><a class="add-trustee trusted" data-dcnode-id="2113" data-href="https://www.sciencedaily.com/releases/2019/01/190131101103.htm" data-reference-id="9" data-source-id="50" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/how-sleep-works" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2116" instrument_node="">More than 900 million people</span><sup data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">9</span></sup></a></span><span data-dcnode-id="2111" instrument_node=""> across the globe live with </span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-apnea/obstructive-sleep-apnea"><span data-dcnode-id="2110" instrument_node="">obstructive sleep apnea (OSA)</span></a><span data-dcnode-id="2108" instrument_node="">, a subtype of the disorder that occurs when a physical blockage impedes the airway. OSA has long been linked to chronic depression. People with depression often have a difficult time processing memories, specifically autobiographical memories that pertain to their own experiences. People with OSA have also demonstrated difficulty with memory consolidation.</span></p><span data-dcnode-id="2106" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2105" instrument_node="">One study sought to explore the </span><a data-dcnode-id="2101" data-reference-id="10" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cambridge.org/core/services/aop-cambridge-core/content/view/F670296A50D24B80F4D805CBC8DE430E/S1355617718001091a.pdf/autobiographical_memory_from_different_life_stages_in_individuals_with_obstructive_sleep_apnea.pdf" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="2104" instrument_node="">relationship between OSA and depression</span><sup data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">10</span></sup></a><span data-dcnode-id="2100" instrument_node=""> in terms of memory processing. The findings show subjects with OSA struggled more to form semantic memories, or individual facts from their personal history, than the control group. This is not surprising since healthy sleep is needed to properly consolidate semantic memories, and OSA causes sleep fragmentation that interferes with the sleep cycle. Interestingly, OSA did not affect the consolidation of episodic memories – or those related to events and experiences – to the same extent.</span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">These results suggest sleep apnea can interfere with the memory consolidation process, causing people to have a hard time recalling certain memories of their own life. However, more research is needed to explore whether OSA leads to both depression and memory problems, or if OSA and depression independently affect memory consolidation.</span></p><span data-dcnode-id="2095" instrument_node="">

</span><h3 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Fact-Checking: Our Process</span></h3><span data-dcnode-id="228" instrument_node="">
</span><span class="close-popup-factcheck close-modal" data-dcnode-id="227"></span><span data-dcnode-id="226" instrument_node="">
</span></div><span data-dcnode-id="224" instrument_node="">
</span><div class="popup-content content-editor" data-dcnode-id="192"><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">The Sleep Foundation editorial team is dedicated to providing content that meets the highest standards for accuracy and objectivity. Our editors and medical experts rigorously evaluate every article and guide to ensure the information is factual, up-to-date, and free of bias.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The Sleep Foundation fact-checking guidelines are as follows:</span></p><span data-dcnode-id="217" instrument_node="">
</span><ol data-dcnode-id="194"><span data-dcnode-id="216" instrument_node="">
</span><li class="check" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">We only cite reputable sources when researching our guides and articles. These include peer-reviewed journals, government reports, academic and medical associations, and interviews with credentialed medical experts and practitioners.</span></li><span data-dcnode-id="213" instrument_node="">
</span><li class="check" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">All scientific data and information must be backed up by at least one reputable source. Each guide and article includes a comprehensive bibliography with full citations and links to the original sources</span></li><span data-dcnode-id="210" instrument_node="">
</span><li class="check" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Some guides and articles feature links to other relevant Sleep Foundation pages. These internal links are intended to improve ease of navigation across the site, and are never used as original sources for scientific data or information.</span></li><span data-dcnode-id="207" instrument_node="">
