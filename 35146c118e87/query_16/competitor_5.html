</span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="1152"><p class="tml-image--attribution" data-dcnode-id="1153" itemprop="author"><a data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.mit.edu/2017/networks-neurons-stretch-compress-control-timing-1204" onclick="return phoenixTrackClickEvent(this, event);" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1155" instrument_node="">MIT</span></a></p></figcaption></figure></div><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">The funny thing about memory is that it involves past recall for our present to help anticipate the future. Dean Buonomano has given the brain the title of a time machine because of this, just not necessarily in the conventional sense. In fact, pinning down the behavior of memory is tricky for this very reason: it is a feature of temporal data. And that, folks, gets very tricky very quickly.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1145"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-0" data-dcnode-id="1146" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScr ot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-7336f77d61c741d9ae7978aa7384563d&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1056"></phoenix-ad></div></aside><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">Thus arose isolation experiments, which aimed to see how circadian cycles were impacted without those external cues. One of the most famous of these experiments was conducted in 1972 by Michel Siffre, who stayed in a cave for </span><em data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">6 months</span></em><span data-dcnode-id="1050" instrument_node="">. Now that is dedication to science, people. He was able to communicate with the outside world via phone but had no external sources of light to indicate what time of day it was (37-9).</span></p><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">And to no one’s surprise, once removed from normal cycling the human mind goes through depression and forgetfulness. Michel’s circadian cycle went nuts, too. He eventually ended up in a 48-hour cycle, with 16 straight hours sleeping and 32 straight hours awake. After 6 months (really, 179 days), Michel exited the cave and reported only 151 days had passed by. He lost nearly a month of his life, from his vantage point (Ibid).</span></p><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Does this just happen to humans? Well, an experiment with rats points to no and in fact revealed the sleep center of the brain. Called the suprachiasmatic nucleus, the sleep center only has about 10,000 neurons and is located below the hypothalamus and above the optic chiasm. In experiments from the 1980s, rats with altered centers were found to have free running circadian cycle like Michel (40-1).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1042"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-2" data-dcnode-id="1043" data-zone-count="11"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-fc12be3321cb4b76bf411f7bd2a2674e&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-2&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300, om/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1038"></phoenix-ad></div></aside><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="1033"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="1034" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-588d26dd36364bf581436ce03171e641&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-3&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-588d26dd36364bf581436ce03171e641&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1035"></phoenix-ad></div></aside><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">But one bonus of this brain structure is that it is easily removable and transplantable (in fact, it’s one of the few places with the brain that operate like this, mainly due to its compartmentalized nature). So scientists took the altered centers and transplanted them into normal rats, which quickly developed the sleep habits of the prior rat (Ibid).</span></p><p data-dcnode-id="1026"><span data-dcnode-id="1030" instrument_node="">And if that wasn’t weird enough, there is evidence that </span><em data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">cells</span></em><span data-dcnode-id="1027" instrument_node=""> can have some free running circadian cycles! Looking at the oscillations of incoming and outgoing proteins, and it does form a cycle. How long? If temperature and fluidity are kept constant, then…24 hours. Woah seems that cells didn’t get the message of the arbitrariness of a day length! (42)</span></p><p data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">So time perception seems to be broad, with complex life forms like us and single cells demonstrating different methods for tracking it. In fact, that hints at not equating the suprachiasmatic nucleus to being in charge of </span><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">all</span></em><span data-dcnode-id="1022" instrument_node=""> our time perception. The isolation experiments also point to this. People were asked to report when they felt 10-120 seconds, 16 hours, and 44 hours had passed by (52-4).</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1018"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-4" data-dcnode-id="1019" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-4e97069b06eb43928cea756ebfc15210&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-4&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-4e97069b06eb43928cea756ebfc15210&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1020"></phoenix-ad></div></aside><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">The results showed during the 44-hour window people scales 1 of their hours to 3.5 of ours or a 1:3.5 ratio, the 16-hour window had a 1:2 ratio, and the 10-120 seconds had a 1:1 ratio. Smaller time intervals were pretty accurate but long-time spans were not. Different pieces of the brain govern different time scales of perception, it seems (Ibid).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1013"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1014" data-zone-count="11"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdRe " role="heading"><span data-dcnode-id="895" instrument_node="">Gerard Manley Hopkins’ "Pied Beauty"</span></h2></a></phoenix-ellipsis></div></phoenix-card></phoenix-super-link></div></phoenix-recommendations></section></div></section><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">One model that accounts for this is the internal clock model, where certain neurons which fire at a specific frequency are counted by other neurons and that count give a beat for the timing of a microevent. Neurons certain do oscillate, but count? Not so much as we now know (101-2).</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">So it is time (probably not the only pun you will find here) to delve into the brain and see what’s going on. And trust me, it’s a plenty. The brain is composed of roughly 100 billion neurons and 100s of trillions of synapses. Neurons are what send/receive electrical signals and synapses are the space between neurons where the transference occurs (27-9).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="877"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-4" data-dcnode-id="878" data-zone-count="11"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit W  not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-6590978f9f8b475e85e462c8929b48b7&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-6590978f9f8b475e85e462c8929b48b7&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="868"></phoenix-ad></div></aside><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Signs point to short-term synaptic plasticity (STSP) as a more likely model than the internal clock. In STSP, changes to synaptic strength can be gauged based on their usage. And the time range of these changes? Why, over the desired millisecond to second range, as “short-term fluctuations” increase or decrease synaptic firing. The amount of that change will depend on the time interval between the synaptic firings, with the maximum change usually occurring before 100 milliseconds post-firing, with subsequent peaks decreasing much like ripples on a pond (106-7).</span></p><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Buonomano contends that it is through STSP that the time management of the brain over the millisecond range is achieved. To demonstrate, he considers a 2-neuron circuit (for simplicities sake). The presynaptic neuron fires at a 50, 100, or 200 millisecond intervals between spikes. The first one will be at constant 1 millivolt but the second one will be hampered by STSP. If the postsynaptic neuron only fires for a certain spike value, then we could have a timer of sorts (based on the time interval required for the STSP to yield the spike we desire). There is evidence that simple circuits of excitatory and inhibitory neurons with STSP behavior have this interval selectivity, but as to how a neuron selects this sensitivity is still a mystery (107-9).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="859"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-5" data-dcnode-id="860" data-zone-count="11"><phoenix-ad class="m-ad not-size-a alse,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-05b231fb833647c187f7d2914b82c661&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="852"></phoenix-ad></div></aside><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Of course, a two-neuron network just isn’t realistic. One cubic millimeter contains about 100,000 neurons and 100s of millions of synapses. How these circuits process space and time is a hot topic especially when considering the potential STSP implications. One possible theory, developed by Buonomano and Wolfgang Maass, is state-dependent networks. Its overall idea is physics simplified: if you know a state of a system at a certain point then you can backtrack and predict the system going forward. How could we do this with neuron circuits? (109-12)</span></p><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Well, one has to map out the firing phase of a neuron network at several time intervals and note the strength at 50, 100, and 200 millisecond intervals. Then, one can note any STSP changes that occur and so build a model that can be backtracked based upon a later firing. That is why it is state-dependent, for it relies on the prior firings to build a history of behavior. It is likely that the brain tracks subpopulations of neurons and notes the state-dependent network firing at a given moment to gauge the timing (Ibid).</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="843"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="844" data-zone-count="14"><phoenix-ad class="m-ad no imensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="845"></phoenix-ad></div></aside><p data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Now, this is all fine and dandy for really small time scales, but what about your perceived notions of the past, present, and future? Surely the neurocircuitry governing when you perceived something as happening has too much complexity to fully understand. Well, perhaps we are beginning to get a handle on how the brain does this. Work by Marc Howard and Karthik Shankar developed a mathematical model that accurately shows mental past processing, and it is though indirect methods. The brain doesn’t keep a temporal data section like it does for other pieces of information (Cepelewicz).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="838"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-6" data-dcnode-id="839" data-zone-count="11"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&q ot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="829"></phoenix-ad></div></aside><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Further evidence for this modeling came from work by Albert Tsao, who was researching the lateral entorhinal cortex, the companion structure to the medial entorhinal cortex which is used for spatial navigation. Both of these feed into the hippocampus, which is the center for episodic memory, but did the lateral entorhinal cortex really have time information encoded into it? (Ibid)</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">An experiment was set up with rats looking for food, being removed for a few minutes, then placed back in. This was done 12 times over about 90 minutes. Brain activity was recorded at that cortex and the surrounding areas during all of this. Each time the rat was placed back into the box (whose walls were alternated with black and white colors), that cortex fired off, and since the environment was different the rat was remembering the timing of the last event (Ibid).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="820"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-7" data-dcnode-id="821" data-zone-count="11"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisemen t;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-8&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],[970,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;width&quot;:970,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;B&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-010a9aa85ccc49e9be6a931b61456c56&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="744"></phoenix-ad></div></aside><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">And as anyone who is excited can tell you that perception seems to be accelerated while boredom takes forever to pass by. Therefore, it’s safe to say that the level of interest in the activity we are participating in is inversely related to the awareness of the time passing by. And the transition from prospective to retrospective timing seems to only take the highlights of the vents and condenses their time value (Ibid).</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="737"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="738" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-fedfc581d64b4ad490f7611bccef710c&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;11&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-fedfc581d64b4ad490f7611bccef710c&quot;,&quot;adUnitPath&quot;:&quot;/88059007/owlcation.com/stem&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="739"></phoenix-ad></div></aside><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">But where is some science to back this up? Can we actually note these transitions? Or even their individual behavior? Time scaling does seem related to the activities we do but really this is code for what cognitive load we have at a given moment. So fluctuate that and start taking some brains scans.</span></p><p data-dcnode-id="730"><span data-dcnode-id="734" instrument_node="">One such experiment is done with a deck of cards. A task with little thinking required would be putting the cards face up while a higher thinking task would be to put the cards into piles of each suit. Then people were asked to estimate the time length of the task they had just performed. For those who knew they were going to be asked this before the task, they had to be prospective in their thinking and the lower load people averaged 53 seconds while the higher load averaged 31 seconds (in self reporting). But people who were not told beforehand that they were going to give an estimate averaged roughly the same (33 seconds to 28 seconds) amount of time. So, if </span><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">aware</span></em><span data-dcnode-id="731" instrument_node=""> of the timing when we tend to induce dilating effects to our subjective time. Interest does impact our timing (61-2).</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="727"><div
