dcnode-id="605" instrument_node="">Decent Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="596"><li data-dcnode-id="600"><span class="text-s" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">631 Words</span></span></li><li data-dcnode-id="597"><span class="text-s" data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">3 Pages</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="593"><a class="button button--orange button--squarish text-m button--orange" data-dcnode-id="594" data-href="/writing/document/PKXQCN3TC" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="595" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="589" id="AdPreviewRowSidebar"></div></div><div class="row essay-preview-block" data-dcnode-id="531" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="546"><div class="" data-dcnode-id="548"><div class="position-relative margin-4 text-xl" data-dcnode-id="549"><div data-dcnode-id="587" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="554"><span class="document__preview text-l source-serif" data-dcnode-id="569"><span data-dcnode-id="584" instrument_node="">Why do we Dream?</span><br data-dcnode-id="583"><span data-dcnode-id="582" instrument_node="">
</span><br data-dcnode-id="581"><span data-dcnode-id="580" instrument_node="">
It has been said by researchers that everyone dreams during sleep and it is thought to be a universal psychical feature of our human lives. However, many of us are unable to recall vividly what happens throughout our dreams, if anything at all. Due to this clouded unique nature that is dreaming, most of the knowledge why we </span><a data-dcnode-id="578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/dream" style="color:#3174a3"><span data-dcnode-id="579" instrument_node="">dream</span></a><span data-dcnode-id="577" instrument_node=""> is largely inconclusive. Nonetheless, after many years of theoretical debate on the subject, three arguments have remained prominent of which I will I will be discussing.</span><br data-dcnode-id="576"><span data-dcnode-id="575" instrument_node="">
</span><br data-dcnode-id="574"><span data-dcnode-id="573" instrument_node="">
Perhaps the most renowned theory of dreaming comes from the famous psychologist, Dr </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/sigmund-freud" style="color:#3174a3"><span data-dcnode-id="572" instrument_node="">Sigmund Freud</span></a><span data-dcnode-id="570" instrument_node="">. He proposed that our dreams were likened to a royal road' (Plotnik 2005) to our unconscious thoughts and desires. In this</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="566" data-href="/writing/document/PKXQCN3TC" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="565"><span class="document__preview text-l source-serif" data-dcnode-id="555"><span data-dcnode-id="564" instrument_node="">Many have creditably theorised that dreams are extensions of our waking life. It is believed that this close link between our daily lives and that of our dreams acts as a restorative function deeply analysing our current thoughts, fears, concerns, problems and emotions. Researchers have also discovered that our dreaming can exhibit various other tasks including problem solving and the enlightening of creativity. Such occurrences have been proven with musician Paul McCartney having written the famous dream inspired hit yesterday'. He recalls I just woke up one morning and I supposed I'd been dreaming or something and I'd got this little tune in my head' (www0.bbc.co.uk/radio2/soldonsong/songlibrary/indepth/yesterday.shtml).</span><br data-dcnode-id="563"><span data-dcnode-id="562" instrument_node="">
</span><br data-dcnode-id="561"><span data-dcnode-id="560" instrument_node="">
Dreaming can also be viewed in a more biological sense known as the activation-synthesis theory, in which areas of our brain that are usually inactive while awake, are activated when asleep. The areas stimulated have been found, due to Hobson's brain scans or the 1970's, to be that of visual (visual cortex) and emotional (limbic system) areas of our brain. Such theory explains the random, hallucinatory images induced by dreamers and the disorder of events remembered due to the inaction of thought processing areas (prefrontal cortex). </span><br data-dcnode-id="559"><span data-dcnode-id="558" instrument_node="">
</span><br data-dcnode-id="557"><span data-dcnode-id="556" instrument_node="">
In all, dreaming is a phenomenon that can generally be argued as serviceable to our being and is certainly fascinating, however it's clear purposes remain uncertain.</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="553"></div><div class="center paper__cta" data-dcnode-id="550"><a class="button text-m button--orange" data-dcnode-id="551" data-href="/writing/document/PKXQCN3TC" href="javascript:void(0)" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="552" instrument_node="">Get Access</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="547" id="AdCenterMiddle"></div></div><div class="columns large-4 hide-for-medium-only hide-for-small-only" data-dcnode-id="532"><div class="rhino-slot center" data-dcnode-id="545" id="AdSidebarTop"></div><ul class="card--sidebar-nav__list" data-dcnode-id="534"><li class="rhino-slot side-items" data-dcnode-id="544" id="sidebar-nav1"></li><li class="rhino-slot side-items" data-dcnode-id="543" id="sidebar-nav2"></li><li class="rhino-slot side-items" data-dcnode-id="542" id="sidebar-nav3"></li><li class="rhino-slot side-items" data-dcnode-id="541" id="sidebar-nav4"></li><li class="rhino-slot side-items" data-dcnode-id="540" id="sidebar-nav5"></li><li class="rhino-slot side-items" data-dcnode-id="539" id="sidebar-nav6"></li><li class="rhino-slot side-items" data-dcnode-id="538" id="sidebar-nav7"></li><li class="rhino-slot side-items" data-dcnode-id="537" id="sidebar-nav8"></li><li class="rhino-slot side-items" data-dcnode-id="536" id="sidebar-nav9"></li><li class="rhino-slot side-items" data-dcnode-id="535" id="sidebar-nav10"></li></ul><div class="rhino-slot center" data-dcnode-id="533" id="AdSidebarBottom"></div></div></div><div class="row essay-preview-block essay-related-block" data-dcnode-id="166"><div class="columns large-12 padding-1 no-padding-large" data-dcnode-id="167"><div class="columns large-12 paper--related-separator-new" data-dcnode-id="528"><span class="pa
