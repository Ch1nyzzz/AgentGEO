</span><div class="pre-content" data-dcnode-id="554"><div data-dcnode-id="555"><div class="bk_prnt" data-dcnode-id="592"><p class="small" data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">NCBI Bookshelf. A service of the National Library of Medicine, National Institutes of Health.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Purves D, Augustine GJ, Fitzpatrick D, et al., editors. Neuroscience. 2nd edition. Sunderland (MA): Sinauer Associates; 2001. </span></p></div><div class="messagearea bk_noprnt" data-dcnode-id="587" style="margin-bottom:1.3846em "><ul class="messages" data-dcnode-id="588"><li class="info icon" data-dcnode-id="589"><span class="icon" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">By agreement with the publisher, this book is accessible by the search feature, but cannot be browsed.</span></span></li></ul></div><div class="iconblock clearfix whole_rhythm no_top_margin bk_noprnt" data-dcnode-id="556"><a class="img_link icnblk_img" data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/neurosci/" title="Table of Contents Page"><img alt="Cover of Neuroscience" class="source-thumb" data-dcnode-id="586" height="100px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/corehtml/pmc/pmcgifs/bookshelf/thumbs/th-neurosci-lrg.png&amp;raw" width="80px"></a><div class="icnblk_cntnt eight_col" data-dcnode-id="557"><h2 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Neuroscience. 2nd edition.</span></h2><a aria-expanded="false" class="ui-widget ui-ncbitoggler" data-dcnode-id="579" data-jig="ncbitoggler" href="#__NBK11121_dtls__" id="ui-ncbitoggler-6" role="button"><span class="ui-ncbitoggler-master-text" data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Show details</span></span><span class="ui-icon ui-icon-triangle-1-e" data-dcnode-id="580">  instrument_node="">
</span><div class="main-content lit-style" data-dcnode-id="508" itemscope="itemscope" itemtype="http://schema.org/CreativeWork"><div class="meta-content fm-sec" data-dcnode-id="549"><h1 data-dcnode-id="550" id="_NBK11121_"><span class="title" data-dcnode-id="551" itemprop="name"><span data-dcnode-id="552" instrument_node="">The Possible Functions of REM Sleep and Dreaming</span></span></h1></div><div class="body-content whole_rhythm" data-dcnode-id="509" itemprop="text"><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Despite this wealth of descriptive information about the stages of sleep, the
functional purposes of the various sleep states are not known. Whereas most sleep
researchers accept the idea that the purpose of non-REM sleep is at least in part
restorative, the function of REM sleep remains a matter of considerable
controversy.</span></p><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">A possible clue about the purposes of REM sleep is the prevalence of dreams during
these epochs of the sleep cycle. The occurrence of dreams can be tested by waking
volunteers during either non-REM or REM sleep and asking them if they were dreaming.
Subjects awakened from REM sleep recall elaborate, vivid, hallucinogenic and
emotional dreams, whereas subjects awakened during non-REM sleep report fewer
dreams, which, when they occur, are more conceptual, less vivid and less
emotion-laden.</span></p><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">Dreams have been studied in a variety of ways, perhaps most notably within the
psychoanalytic framework of revealing unconscious thought processes considered to be
at the root of neuroses. Sigmund Freud's </span><i data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">The Interpretation of
Dreams</span></i><span data-dcnode-id="541" instrument_node="">, published in 1900, speaks eloquently to the complex
relationship between conscious and unconscious mentation. It is by no means agreed
upon, however, that dreams have the deep significance that Freud and others have
given them, and the psychoanalytic interpretation of dreams has recently fallen into
disfavor. Nevertheless, most people probably give some credence to the significance
of dream content, at least privately. In more recent studies of dreams, about 65%
are associated with sadness, apprehension, or anger; 20% with happiness or
excitement; and, somewhat surprisingly, only 1% with sexual feelings or acts.</span></p><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Adding to the uncertainty about the purposes of REM sleep and dreaming is the fact
that deprivation of REM sleep in humans for as much as two weeks has little or no
obvious effect on behavior. Such studies have been done by waking volunteers
whenever their EEG recordings showed the characteristic signs of REM sleep. Although
the subjects in these experiments compensate for the lack of REM sleep by having
more of it after the period of deprivation has ended, they suffer no obvious adverse
effects. Similarly, patients taking certain antidepressants (MAO inhibitors) have
little or no REM sleep, yet show no obvious ill effects, even after months or years
of treatment. The apparent innocuousness of REM sleep deprivation contrasts markedly
with the effects of total sleep deprivation (see earlier). The implication of these
several findings is that we can get along without REM sleep, but need non-REM sleep
in </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/neurosci/A2251/def-item/A2714/" role="button"><span data-dcnode-id="538" instrument_node="">order</span></a><span data-dcnode-id="536" instrument_node=""> to survive.</span></p><p data-dcnode-id="524"><span data-dcnode-id="534" instrument_node="">Several general hypotheses about dreams and REM sleep have been advanced. Francis
Crick (of DNA fame) and Grahame Mitchison suggested that dreams act as an
“unlearning” mechanism, whereby certain modes of neural activity
are erased by random </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/neurosci/A2251/def-item/A2255/" role="button"><span data-dcnode-id="533" instrument_node="">activation</span></a><span data-dcnode-id="531" instrument_node=""> of cortical connections. The hypothesis is based on
the idea that the human brain represents information by the activity of sets of
neuronal networks that are widely distributed and overlapping. In computers, neural
network architectures are subject to unwanted patterns of activity that can indeed
degrade rather than enhance the information content of the system. By analogy, these
“parasitic” modes of activity might be unwanted thoughts or
erroneous information, which, if not expunged, could become the basis for obsession,
paranoia, or other pathologies of thought that prevent the
“system” from working as efficiently as it should. In a
different vein, Michel Jouvet proposed that dreaming reinforces behaviors not
commonly encountered during the awake state (aggression, fearful situations) by
rehearsing them while dreaming. Yet another hypothesis is that REM sleep and dreams
are involved in the transfer of memories between the </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/neurosci/A2251/def-item/A2521/" role="button"><span data-dcnode-id="530" instrument_node="">hippocampus</span></a><span data-dcnode-id="528" instrument_node=""> and </span><a aria-expanded="false" aria-haspopup="true" class="def" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/n/neurosci/A2251/def-item/A2656/" role="button"><span data-dcnode-id="527" instrument_node="">neocortex</span></a><span data-dcnode-id="525" instrument_node="">.
Finally, it has been suggested that dreaming is simply an incidental consequence of
REM sleep. None of these ideas are generally accepted.</span></p><p data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">In short, the questions of why we have REM sleep and why we dream remain unanswered,
as are questions about consciousness per se (</span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK11121/box/A1990/%3Freport%3Dobjectonly" rid-ob="figobA1990" target="object"><span data-dcnode-id="522" instrument_node="">Box D</span></a><span data-dcnode-id="520" instrument_node="">).</span></p><div class="iconblock whole_rhythm clearfix ten_col boxed-text" data-dcnode-id="510" id="figA1990"><a class="img_link icnblk_img" data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK11121/box/A1990/%3Freport%3Dobjectonly" rid-ob="figobA1990" target="object" title="Box D"><img alt="Box Icon" class="small-thumb" data-dcnode-id="518" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/corehtml/pmc/css/bookshelf/2.26/img/box-icon.gif&amp;raw"></a><div class="icnblk_cntnt" data-dcnode-id="511"><h4 data-dcnode-id="514" id="A1990"><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK11121/box/A1990/%3Freport%3Dobjectonly" rid-ob="figobA1990" target="object"><span data-dcnode-id="516" instrument_node="">Box D</span></a></h4><p class="float-caption no_bottom_margin" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Consciousness. </span></p></div></div></div></div><span data-dcnode-id="507" instrument_node="">
