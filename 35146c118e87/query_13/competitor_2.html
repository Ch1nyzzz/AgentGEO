</span><section class="article-section article-section--first" data-behaviour="ArticleSection" data-behaviour-initialised="true" data-dcnode-id="2055" id="abstract"><span data-dcnode-id="2068" instrument_node="">
</span><header class="article-section__header" data-dcnode-id="2063"><span data-dcnode-id="2067" instrument_node="">
</span><h2 class="article-section__header_text" data-dcnode-id="2065"><span data-dcnode-id="2066" instrument_node="">Abstract</span></h2><span data-dcnode-id="2064" instrument_node="">
</span></header><span data-dcnode-id="2062" instrument_node="">
</span><div class="article-section__body" data-dcnode-id="2057"><span data-dcnode-id="2061" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Deep inside the temporal lobe of the brain, the hippocampus has a central role in our ability to remember, imagine and dream.</span></p><span data-dcnode-id="2058" instrument_node="">
</span></div><span data-dcnode-id="2056" instrument_node="">
</span></section><span data-dcnode-id="2054" instrument_node="">
</span><section class="article-section article-section--js" data-behaviour="ArticleSection" data-behaviour-initialised="true" data-dcnode-id="1972" id="s0"><span data-dcnode-id="2053" instrument_node="">
</span><header class="article-section__header" data-dcnode-id="2047"><span data-dcnode-id="2052" instrument_node="">
</span><span data-dcnode-id="2051" instrument_node="">
</span><a class="article-section__toggle" data-dcnode-id="2048" href="#"><h2 class="article-section__header_text" data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Main text</span></h2></a></header><span data-dcnode-id="2046" instrument_node="">
</span><div class="article-section__body" data-dcnode-id="1974"><span data-dcnode-id="2045" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2028"><span data-dcnode-id="2044" instrument_node="">Our most vivid dreams are a remarkable replication of reality, combining disparate objects, actions and perceptions into a richly detailed hallucinatory experience. How does our brain accomplish this? It has long been suspected that the hippocampus contributes to dreaming, in part due to its close association with memory: according to one estimate, about half of all dreams contain at least one element originating from a specific experience while the subject was awake (</span><a data-behaviour-initialised="true" data-dcnode-id="2042" href="#bib1"><span data-dcnode-id="2043" instrument_node="">Fosse et al., 2003</span></a><span data-dcnode-id="2041" instrument_node="">). Although these dreams are rarely a faithful replication of any one memory, fragments of various recent experiences intermingle with other memories (usually related remote and semantic memories) to create a novel dream. Given all this, one might guess that dreams are created by those regions of the brain responsible for memory. However, studies dating back to the 1960s have suggested that patients with a damaged hippocampus still dream (</span><a data-behaviour-initialised="true" data-dcnode-id="2039" href="#bib10"><span data-dcnode-id="2040" instrument_node="">Torda, 1969a</span></a><span data-dcnode-id="2038" instrument_node="">; </span><a data-behaviour-initialised="true" data-dcnode-id="2036" href="#bib11"><span data-dcnode-id="2037" instrument_node="">Torda, 1969b</span></a><span data-dcnode-id="2035" instrument_node="">; </span><a data-behaviour-initialised="true" data-dcnode-id="2033" href="#bib7"><span data-dcnode-id="2034" instrument_node="">Solms, 2014</span></a><span data-dcnode-id="2032" instrument_node="">) and, somewhat amazingly, such patients can have dreams involving recent experiences of which they have no conscious memory (</span><a data-behaviour-initialised="true" data-dcnode-id="2030" href="#bib9"><span data-dcnode-id="2031" instrument_node="">Stickgold et al., 2000</span></a><span data-dcnode-id="2029" instrument_node="">)!</span></p><span data-dcnode-id="2027" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2016"><span data-dcnode-id="2026" instrument_node="">But are the dreams of patients with damage to hippocampus truly ‘normal’? Or alternatively, might such damage, while not preventing dreams, alter the form in which they are expressed? Indeed, there is reason to think that the hippocampus supports crucial aspects of dream construction beyond the simple insertion of memories. Recent work in the cognitive neurosciences has established that the hippocampus, in addition to being involved in the formation of memories, is also part of a brain system that is involved in using memory to construct novel imagined scenarios and simulate possible future events (</span><a data-behaviour-initialised="true" data-dcnode-id="2024" href="#bib4"><span data-dcnode-id="2025" instrument_node="">Hassabis et al., 2007</span></a><span data-dcnode-id="2023" instrument_node="">; </span><a data-behaviour-initialised="true" data-dcnode-id="2021" href="#bib5"><span data-dcnode-id="2022" instrument_node="">Hassabis and Maguire, 2009</span></a><span data-dcnode-id="2020" instrument_node="">; </span><a data-behaviour-initialised="true" data-dcnode-id="2018" href="#bib6"><span data-dcnode-id="2019" instrument_node="">Schacter and Addis, 2007</span></a><span data-dcnode-id="2017" instrument_node="">). As a result, patients without a hippocampus find it difficult to imagine scenes that are coherent, possibly because the hippocampus is responsible for combining different elements of memory into a spatially coherent whole.</span></p><span data-dcnode-id="2015" instrument_node="">
</span><p class="paragraph" data-dcnode-id="2004"><span data-dcnode-id="2014" instrument_node="">Now, in eLife, Eleanor Maguire of University College London (UCL) and colleagues – including Goffredina Spanò as first author – report that the dreams of four amnesia patients lacking a hippocampal memory system do not have the richness of detail found in most dreams (</span><a data-behaviour-initialised="true" data-dcnode-id="2012" href="#bib8"><span data-dcnode-id="2013" instrument_node="">Spanò et al., 2020</span></a><span data-dcnode-id="2011" instrument_node="">). Besides reporting substantially fewer dreams than the patients in a control group, the four patients with amnesia also reported dreams that were markedly less detailed: their dreams contained fewer details of spatial location (e.g., descriptions like ‘behind the bar’ or ‘to my left I can see’) and fewer sensory details. These observations support the emerging view that dreams are generated by networks in the brain similar to the networks that are involved in recalling memories and constructing imagined scenarios during wakefulness (</span><a data-behaviour-initialised="true" data-dcnode-id="2009" href="#bib2"><span data-dcnode-id="2010" instrument_node="">Fox et al., 2013</span></a><span data-dcnode-id="2008" instrument_node="">; </span><a data-behaviour-initialised="true" data-dcnode-id="2006" href="#bib3"><span data-dcnode-id="2007" instrument_node="">Graveline and Wamsley, 2015</span></a><span data-dcnode-id="2005" instrument_node="">). Like memory and imagination, a vivid dream requires the construction of detailed, memory-based imagined scenes – and this process appears to rely on the hippocampus.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">These observations partially echo the reports of Clara Torda from more than a half century ago, who characterized the dreams of amnesia patients as ‘shorter’, ‘simpler’, ‘repetitious’ and ‘stereotyped’ (</span><a data-behaviour-initialised="true" data-dcnode-id="2000" href="#bib10"><span data-dcnode-id="2001" instrument_node="">Torda, 1969a</span></a><span data-dcnode-id="1999" instrument_node="">). But Torda’s papers were written before the invention of noninvasive methods for imaging the brain, so it is not completely clear which structures may have been damaged in her patients. In contrast, the patients in the work of Spanò et al. all have well-characterized lesion sites with damage restricted solely to the hippocampus. This allows us to confidently attribute their impoverished dreams to the loss of the hippocampus itself, rather than to other regions of nearby temporal lobe which might also have a role in dreaming.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">As with many studies of rare neurological patients, the latest work must be interpreted with caution due to the small sample size. For example, patient dreams were not significantly shorter than control dreams, leading to an apparently selective deficit in specific types of details reported (such as spatial details and sensory details), rather than a general deficit in the length of the dream. On average, however, the control dreams contained more than twice the number of informative words as the patient dreams, and the lack of a statistical difference between the two groups may be a mere artifact of the low sample size.</span></p><span data-dcnode-id="1994" instrument_node="">
</span><p class="paragraph" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Nonetheless, these observations and a handful of similar studies are helping us to understand how the hippocampus contributes to the dreaming process. The work of Spanò et al. – who are&nbsp;based at UCL, the Royal Free Hospital in London, University Hospital Bonn and the universities of Arizona and Oxford – suggests hippocampal damage disrupts dreaming in ways that mirror how it also disrupts imagination. This suggests that, rather than being an entirely distinct phenomenon, dreaming is a part of a continuum of spontaneous, constructive thought and imagery continuously generated across the sleep and waking states.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><div class="speech-bubble--container" data-dcnode-id="1975"><button aria-live="polite" class="speech-bubble speech-bubble--has-placeholder speech-bubble--wrapped hypothesis-opener" data-behaviour="SpeechBubble HypothesisOpener" data-behaviour-initialised="true" data-dcnode-id="1976" data-hypothesis-trigger="" style="display: block; cursor: pointer; float: right; margin-bottom: 48px;"><span data-dcnode-id="1990" instrument_node="">

</span><h1 class="content-header__title content-header__title--long" data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">
</span><a class="content-header__title_link" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elifesciences.org/articles/56211"><span data-dcnode-id="808" instrument_node="">Dreaming with hippocampal damage</span></a><span data-dcnode-id="806" instrument_node="">
</span></h1><span data-dcnode-id="804" instrument_node="">
</span></div><span data-dcnode-id="802" instrument_node="">
</span><div class="authors authors--line" data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Goffredina Spanò et al.</span></div><span data-dcnode-id="799" instrument_node="">

</span><span class="date" data-dcnode-id="790"><span data-dcnode-id="793" instrument_node=""> </span><time data-dcnode-id="791" datetime="2020-06-08"><span data-dcnode-id="792" instrument_node="">Jun 8, 2020</span></time></span><span data-dcnode-id="789" instrument_node="">

</span></div><span data-dcnode-id="785" instrument_node="">

</span><div class="listing-list__content" data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">
</span><p class="paragraph" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">The hippocampus is linked with both sleep and memory, but there is debate about whether a salient aspect of sleep – dreaming – requires its input. To address this question, we investigated if human patients with focal bilateral hippocampal damage and amnesia engaged in dreaming. We employed a provoked awakening protocol where participants were woken up at various points throughout the night, including during non-rapid eye movement and rapid eye movement sleep, to report their thoughts in that moment. Despite being roused a similar number of times, dream frequency was reduced in the patients compared to control participants, and the few dreams they reported were less episodic-like in nature and lacked content. These results suggest that hippocampal integrity may be necessary for typical dreaming to occur, and aligns dreaming with other hippocampal-dependent processes such as episodic memory that are central to supporting our mental life.</span></p><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">

</span><h1 class="content-header__title content-header__title--long" data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">
</span><a class="content-header__title_link" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elifesciences.org/articles/76539"><span data-dcnode-id="753" instrument_node="">Cohesin-dependence of neuronal gene expression relates to chromatin loop length</span></a><span data-dcnode-id="751" instrument_node="">
</span></h1><span data-dcnode-id="749" instrument_node="">
</span></div><span data-dcnode-id="747" instrument_node="">
</span><div class="authors authors--line" data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Lesly Calderon et al.</span></div><span data-dcnode-id="744" instrument_node="">
</span><div class="content-header__meta" data-dcnode-id="731"><span data-dcnode-id="743" instrument_node="">
</span><div class="meta" data-dcnode-id="733"><span data-dcnode-id="742" instrument_node="">
</span><a class="meta__type" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elifesciences.org/articles/research-article"><span data-dcnode-id="741" instrument_node="">Research Article</span></a><span data-dcnode-id="739" instrument_node="">
</span><span class="date" data-dcnode-id="735"><span data-dcnode-id="738" instrument_node=""> Updated </span><time data-dcnode-id="736" datetime="2022-05-13"><span data-dcnode-id="737" instrument_node="">May 13, 2022</span></time></span><span data-dcnode-id="734" instrument_node="">
</span></div><span data-dcnode-id="732" instrument_node="">
</span></div><span data-dcnode-id="730" instrument_node="">
</span></header><span data-dcnode-id="728" instrument_node="">
</span><div class="listing-list__content" data-dcnode-id="720"><span data-dcnode-id="727" instrument_node="">
</span><p class="paragraph" data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Cohesin and CTCF are major drivers of 3D genome organization, but their role in neurons is still emerging. Here, we show a prominent role for cohesin in the expression of genes that facilitate neuronal maturation and homeostasis. Unexpectedly, we observed two major classes of activity-regulated genes with distinct reliance on cohesin in mouse primary cortical neurons. Immediate early genes (IEGs) remained fully inducible by KCl and BDNF, and short-range enhancer-promoter contacts at the IEGs </span><i data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Fos</span></i><span data-dcnode-id="723" instrument_node=""> formed robustly in the absence of cohesin. In contrast, cohesin was required for full expression of a subset of secondary response genes characterized by long-range chromatin contacts. Cohesin-dependence of constitutive neuronal genes with key functions in synaptic transmission and neurotransmitter signaling also scaled with chromatin loop length. Our data demonstrate that key genes required for the maturation and activation of primary cortical neurons depend on cohesin for their full expression, and that the degree to which these genes rely on cohesin scales with the genomic distance traversed by their chromatin contacts.</span></p><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">
</span></li><span data-dcnode-id="717" instrument_node="">

</span><span class="content-header__subject" data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Neuroscience</span></span><span data-dcnode-id="708" instrument_node="">

</span><div class="content-header__body" data-dcnode-id="696"><span data-dcnode-id="703" instrument_node="">
</span><h1 class="content-header__title content-header__title--long" data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">
</span><a class="content-header__title_link" data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elifesciences.org/articles/74462"><span data-dcnode-id="701" instrument_node="">Early detection of cerebrovascular pathology and protective antiviral immunity by MRI</span></a><span data-dcnode-id="699" instrument_node="">
</span></h1><span data-dcnode-id="697" instrument_node="">
</span></div><span data-dcnode-id="695" instrument_node="">
</span><div class="authors authors--line" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Li Liu et al.</span></div><span data-dcnode-id="692" instrument_node="">
</span><div class="content-header__meta" data-dcnode-id="679"><span data-dcnode-id="691" instrument_node="">
</span><div class="meta" data-dcnode-id="681"><span data-dcnode-id="690" instrument_node="">
</span><a class="meta__type" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//elifesciences.org/articles/research-article"><span data-dcnode-id="689" instrument_node="">Research Article</span></a><span data-dcnode-id="687" instrument_node="">
</span><span class="date" data-dcnode-id="683"><span data-dcnode-id="686" instrument_node=""> Updated </span><time data-dcnode-id="684" datetime="2022-05-13"><span data-dcnode-id="685" instrument_node="">May 13, 2022</span></time></span><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span></div><span data-dcnode-id="678" instrument_node="">
</span></header><span data-dcnode-id="676" instrument_node="">
</span><div class="listing-list__content" data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">
</span><p class="paragraph" data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Central nervous system (CNS) infections are a major cause of human morbidity and mortality worldwide. Even patients that survive, CNS infections can have lasting neurological dysfunction resulting from immune and pathogen induced pathology. Developing approaches to noninvasively track pathology and immunity in the infected CNS is crucial for patient management and development of new therapeutics. Here, we develop novel MRI-based approaches to monitor virus-specific CD8+ T cells and their relationship to cerebrovascular pathology in the living brain. We studied a relevant murine model in which a neurotropic virus (vesicular stomatitis virus) was introduced intranasally and then entered the brain via olfactory sensory neurons – a route exploited by many pathogens in humans. Using T2*-weighted high-resolution MRI, we identified small cerebral microbleeds as an early form of pathology associated with viral entry into the brain. Mechanistically, these microbleeds occurred in the absence of peripheral immune cells and were associated with infection of vascular endothelial cells. We monitored the adaptive response to this infection by developing methods to iron label and track individual virus specific CD8+ T cells by MRI. Transferred antiviral T cells were detected in the brain within a day of infection and were able to reduce cerebral microbleeds. These data demonstrate the utility of MRI in detecting the earliest pathological events in the virally infected CNS as well as the therapeutic potential of antiviral T cells in mitigating this pathology.</span></p><span data-dcnode-id="672" instrument_node="">
</span></div><span data-dcnode-id="670" instrument_node="">
