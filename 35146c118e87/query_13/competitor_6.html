</span><article class="post-567 post type-post status-publish format-standard has-post-thumbnail hentry category-brain tag-how-does-the-brain-play-into-mindset" data-dcnode-id="156" id="post-567" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="468" instrument_node="">
</span><div class="inside-article" data-dcnode-id="158"><span data-dcnode-id="467" instrument_node="">
</span><div class="featured-image page-header-image-single grid-container grid-parent" data-dcnode-id="463"><span data-dcnode-id="466" instrument_node="">
</span><img alt="" class="attachment-full size-full wp-post-image" data-dcnode-id="465" height="1707" itemprop="image" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-scaled.jpg&amp;raw" srcset="https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-scaled.jpg 2560w, https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-300x200.jpg 300w, https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-1024x683.jpg 1024w, https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-768x512.jpg 768w, https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-1536x1024.jpg 1536w, https://neurotray.com/wp-content/uploads/2020/11/amadeo-valar-G2BRwDpsuXo-unsplash-2048x1365.jpg 2048w" width="2560"><span data-dcnode-id="464" instrument_node=""> </span></div><span data-dcnode-id="462" instrument_node="">
</span><header aria-label="Content" class="entry-header" data-dcnode-id="441"><span data-dcnode-id="461" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="459" itemprop="headline"><span data-dcnode-id="460" instrument_node="">How does the brain play into mindset?</span></h1><span data-dcnode-id="458" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="443"><span data-dcnode-id="457" instrument_node="">
</span><span class="posted-on" data-dcnode-id="452"><time class="updated" data-dcnode-id="455" datetime="2021-02-21T03:06:37+00:00" itemprop="dateModified"><span data-dcnode-id="456" instrument_node="">February 21, 2021</span></time><time class="entry-date published" data-dcnode-id="453" datetime="2020-11-26T14:41:52+00:00" itemprop="datePublished"><span data-dcnode-id="454" instrument_node="">November 26, 2020</span></time></span><span data-dcnode-id="451" instrument_node=""> </span><span class="byline" data-dcnode-id="445"><span data-dcnode-id="450" instrument_node="">by </span><span class="author vcard" data-dcnode-id="446" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//neurotray.com/author/neurotray/" itemprop="url" rel="author" title="View all posts by Jaimar Tuarez"><span class="author-name" data-dcnode-id="448" itemprop="name"><span data-dcnode-id="449" instrument_node="">Jaimar Tuarez</span></span></a></span></span><span data-dcnode-id="444" instrument_node=""> </span></div><span data-dcnode-id="442" instrument_node="">
</span></header><span data-dcnode-id="440" instrument_node="">
</span><div class="entry-content" data-dcnode-id="190" itemprop="text"><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Do you think intelligence is fixed? That we are born with an unchanging IQ that cannot be developed? Or do you think it is a muscle and as such working it can improve it?</span></p><span data-dcnode-id="436" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">What about our abilities and personality? We can improve?</span></p><span data-dcnode-id="433" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Our brain is a complex organ that works in parallel, making continuous predictions and assimilating information through the association of already known patterns.</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">As it is very malleable, life experiences cause it to reorganize itself and it is this process of continuous adaptation that allows us to learn throughout life, which has enormous educational repercussions.</span></p><span data-dcnode-id="427" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">In this post we are going to answer the question ‘’How does the brain play into mindset?’’ We will discover what the role of the brain is in the adoption of a mindset and if mindsets can be modified with experience.</span></p><span data-dcnode-id="424" instrument_node="">
</span><h2 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">How does the brain play into mindset?</span></h2><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The brain plays a role in the mindset as mindset is related to brain plasticity and neural networks formed by learning.</span></p><span data-dcnode-id="418" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">The psychologist and researcher Carol Dweck has spent decades studying how there are people who develop their full potential and others who, with the same talent, do not.</span></p><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">She has come to the conclusion that people have two different types of mentalities, fixed or growth, and that this mindsethas a decisive influence on the development of our potential.</span></p><span data-dcnode-id="412" instrument_node="">
</span><h2 data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Carol Dweck’s Two Mindsets</span></h2><span data-dcnode-id="409" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">The fixed mindset is one in which we assume that our character, intelligence and creative ability are static and that we cannot change it in a meaningful way and therefore avoid failure at all costs.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">The growth mindset is one that allows us to have big dreams, where ideas can be developed and you are resilient to achieve it, where you are able to quickly recover from difficult situations. This type of mindset involves an effort that allows you to transform the complicated.</span></p><span data-dcnode-id="403" instrument_node="">
</span><h3 data-dcnode-id="400"><strong data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Fixed mindset</span></strong></h3><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">The fixed mindset defends that talent is everything and if you do not achieve something it is because you are not good at it. Either you are good, or you are not good; if you are not, you cannot do anything.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">It is a kind of Calvinistic predestination in the realm of learning: God designates people with talents; Success is proof that the believer has been granted the grace of God and is led by the divine hand towards positive results.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">The fixed mindset corresponds to a theory of fixed intelligence, where you can do little to improve your intelligence. “I am intelligent” or “I am good in this or that area” and that determines everything.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Failure and failure, unsuccessful attempts, clumsiness, are quickly interpreted as indications that the person in question has no talent.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Many teachers and coaches think that they can detect talents in young children and very confidently determine their worth and their worth just by watching them wield a tennis racket, write an essay or poem, or play an instrument a couple of times.</span></p><span data-dcnode-id="384" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">A person who lives in the fixed mindset will more easily abandon effort and work when the first signs of difficulty arrive, because any failure or failure is not just a testimony that they are not good at this moment at something, but that they are not they are good in general, that they do not have what it takes and that they are basket cases.</span></p><span data-dcnode-id="381" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">The usual reflex is therefore to avoid everything in which one is not good immediately or in a short time, to abandon or avoid any area of activity in which he shows difficulties. The person who lives in the fixed paradigm suffers from certain ego fragility and will constantly be comparing himself with others trying to glimpse symptoms of inferiority or superiority.</span></p><span data-dcnode-id="378" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="376"><img alt="" data-dcnode-id="377" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh5.googleusercontent.com/MUudE3wv-kq-tof4o06v7mRWqtXS2xl47eYIsQ82u2I_iIdcCojmD6yiNSSyVZyRBNaUSQu923A0O1U31ewCq-pZ4oftP_gievS1GBbm2reKQhrC4AgjNSF4y0xMuirbNKzGL0CX&amp;raw"></figure><span data-dcnode-id="375" instrument_node="">
</span><h3 data-dcnode-id="372"><strong data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Growth mindset</span></strong></h3><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">The growth mindset is the opposite paradigm.</span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">A person with a growth mindset holds a theory of dynamic intelligence, instead of “I am intelligent” it is said “I am being intelligent in this task and at this given moment.” Intelligence is a skill that can be developed more or less and skill is the product of effort and concentration.</span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">This morning he can be being very smart (because I have tried something a lot and I got a good result), after lunch I can be a clumsy learner, and at night of the lot.</span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Failure and failure are interpreted as normal events in any learning process. If at any given moment they detect that they are doing something with ease and brilliance, they attribute it not to their prodigious talent, but to all the previous hours of practice.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">The facility is not so much a trophy or a symbol of distinction as a sign that they are in a familiar zone that they dominate and in which they have stopped learning. After all, if they were learning something, it would be challenging, complicated, and the journey would not be that easy.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">A person who lives in a growth mindset will always be more effortless, he will not be aware at all times of what the results say about him, or how high or low he is in a ranking compared to others.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Rather, you will focus on the job at hand, focus on the skill and the results you want to produce; when the inevitable difficulties come, you will be more resilient and more likely to continue, you will be more persistent.</span></p><span data-dcnode-id="350" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="348"><img alt="" data-dcnode-id="349" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh4.googleusercontent.com/me8jgl8uzOjZotbik3h3e1WSV8ZVVb9NskOCSH7UBhOCwGsBxS0ZirRsVr0kLJ6zfA3wyB8Bnj6Dklil4u2BSdlNUSQU-_YrzNOpeJ4vJ_P2EW6alDNbATC024l5iHGxOH1JJZYS&amp;raw"></figure><span data-dcnode-id="347" instrument_node="">
</span><h2 data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">So, how does the brain play into mindset?</span></h2><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">The brain is amazing.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="340" instrument_node="">Synaptic </span><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//neurotray.com/when-does-the-brain-have-the-most-plasticity/"><span data-dcnode-id="339" instrument_node="">plasticity or neuroplasticity is the ability of the brain</span></a><span data-dcnode-id="337" instrument_node=""> to renew itself, modify itself and create new neural connections at any age through stimuli from the environment and from one’s own conscious intentions.</span></p><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">When the world in which you operate changes, your brain does too.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">The connections between your brain cells are rearranged in response to your changing needs throughout life, in a dynamic process that allows you to learn and adapt to very different experiences.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">For example, the auditory cortex of a musician’s brain grows denser than anyone else’s, because all new neural connections were made through musical practice. The more we learn, the more connections are formed in the brain, and the more densely it grows.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Jason S. Moser and his colleagues at Michigan State University have discovered what happens to our brains when we face a mistake. Depending on whether our mindset is learning or fixed, the neural activity in the face of an error will be more active or less.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">In other words, when we think that we can learn, if we are wrong, an intense neural dance is awakened to identify causes, patterns or learning that will serve us for the future.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">However, if our mindset is fixed, in the face of a mistake, we will throw balls out, we will justify ourselves with a thousand and one arguments and our neural activity to find reasons for learning will fall asleep somewhat.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">And all this does not depend on age. According to </span><a data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindsetworks.com/science/" rel="noopener" target="_blank"><span data-dcnode-id="315" instrument_node="">Dweck</span></a><span data-dcnode-id="313" instrument_node="">, 40 percent of people have a “growth mindset”; another 40 percent, their “mindset is fixed” and the rest, depending on the moment.</span></p><span data-dcnode-id="311" instrument_node="">
</span><h2 data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Final words</span></h2><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">There are many people who consider that since something has gone wrong throughout their life then they will not be able to change it. They believe that intelligence is innate; as if it were a gift and that it stays that way for the rest of your life.</span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">For example, it is often believed that people draw better or worse in a natural way, that it is a skill that only a few “chosen” possess. Thus, they show a fixed mindset.</span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">It is true that our cognitive abilities and abilities depend in part on our genetic makeup, but only up to a point.</span></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">A lot of neuroscientific research shows that the brain is like a muscle: it changes and gets stronger when you use it. At birth our brain is not made up of a number of neurons and immovable neuronal connections, but rather they change.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="291"><span data-dcnode-id="295" instrument_node="">Studies have been trying to explain how the </span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//neurotray.com/how-do-connections-in-the-brain-become-strengthened/"><span data-dcnode-id="294" instrument_node="">brain evolves and how when you learn new things, those small brain links grow and become</span></a><span data-dcnode-id="292" instrument_node=""> stronger. And then you stimulate your mind to think, the greater the development of your neurons.</span></p><span data-dcnode-id="290" instrument_node="">
</span><p data-dcnode-id="285"><span data-dcnode-id="289" instrument_node="">And, unexpectedly, what once seemed very complicated, or even unimaginable, like speaking a foreign </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//neurotray.com/how-does-the-brain-learn-language/"><span data-dcnode-id="288" instrument_node="">language or learning</span></a><span data-dcnode-id="286" instrument_node=""> algebra, becomes simple. A stronger and smarter brain is the result.</span></p><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Thus, our brain is a plastic organ, in such a way that with training it can be modified. In fact, we are the only species that uses plasticity to perfect and evolve the brain, which makes us different and unique.</span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">In addition, it indicates that each individual of our species is unique and unpredictable and participates in its own evolution due to the influence of lived experiences.</span></p><span data-dcnode-id="278" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">Knowing that our brain is plastic, that is, that we can generate new neurons or that intelligence is a malleable capacity, constitutes an open door to hope because it allows us to develop the growth mindset, one that allows us to better face challenges by believing that our personal skills can be developed.</span></p><span data-dcnode-id="275" instrument_node="">
</span><figure class="wp-block-image" data-dcnode-id="273"><img alt="" data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lh6.googleusercontent.com/SENXwZj7RvFpogvNkLdqA3yO-SIkogNNrTpPdTKz6OM4KsjBJvvdRZOU2MSLkm_VH1PxcrtlBEC5F8sFCrY0r-vDLE3lV0tu_PUc_6FT_nb2S7mZFyebhSyzDXUPljLAS1iSyTN6&amp;raw"></figure><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">In this way, you can choose the type of mindset. As Carol Dweck, professor of psychology at Stanford University, says, mentalities are just beliefs (meaning belief is an idea or thought that is assumed to be true), which are powerful and difficult to change when dealing with a conviction. However, they are only something that is in the mind, and the mind, as stated, can be changed.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">In addition, scientists also point out that human beings have the ability to learn throughout life and to develop their brain more than can be imagined.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Each person has a different genetic endowment, which somewhat predetermines their temperament and abilities, but experience, education and personal effort is what marks the rest of the way.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">Then improvement is always possible. Learning to change is not easy for many people, but it is never too late.</span></p><span data-dcnode-id="260" instrument_node="">
</span><h3 data-dcnode-id="257"><strong data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">So, can we change our mindset?</span></strong></h3><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">With more effort than our children, of course, but adults can also adapt our mindset. Numerous studies demonstrate what has been called neuroplasticity – the brain’s ability to adapt and create new neural connections and pathways at any age (so there’s no excuse).</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The first thing we need is to know what our predominant mindset is. And knowing this we can be vigilant to modify what does not work for our benefit. It is not about modifying behaviors, but belief. The above behaviors are the consequence of the belief, not its cause.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">It’s true, it’s not that easy. I work every day on my personal growth and I keep getting caught in a fixed mindset many times. It is not as easy for those who have educated us as they have educated us, the traditional system.</span></p><span data-dcnode-id="247" instrument_node="">
</span><p data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">But I keep working on it. Every day. Because it is worth it. I have spent too many years in “my comfort zone, a nice place, where nothing ever grows.” I encourage you to do the same.</span></p><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Good luck and have fun.</span></p><span data-dcnode-id="241" instrument_node="">
</span><h2 data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">FAQS: How does the brain play into mindset?</span></h2><span data-dcnode-id="238" instrument_node="">
</span><h3 data-dcnode-id="235"><strong data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">How does a fixed mindset affect the brain?</span></strong></h3><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">People with a fixed mindset think that their intelligence and skills are fixed, so they avoid hard work, try to avoid mistakes (and therefore challenges) and do not improve.</span></p><span data-dcnode-id="231" instrument_node="">
</span><h3 data-dcnode-id="228"><strong data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">How neuroplasticity plays into a mindset?</span></strong></h3><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Neuroplasticity is the ability of the brain to restructure itself based on repetitive practices, this can make us understand that their brain can actually grow and become stronger.&nbsp;</span></p><span data-dcnode-id="224" instrument_node="">
</span><h3 data-dcnode-id="221"><strong data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">What is the science behind growth mindset?</span></strong></h3><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">What Dweck discovered is that people on the right (growth mindset) appear to assume that their intellect and abilities are malleable, that they can alter depending on how much effort they put into it.</span></p><span data-dcnode-id="217" instrument_node="">
</span><h3 data-dcnode-id="214"><strong data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">What is mind growth?</span></strong></h3><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Growth mindset refers to how we deal with challenges and setbacks.</span></p><span data-dcnode-id="210" instrument_node="">
</span><h3 data-dcnode-id="207"><strong data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">What are the 7 mindsets?</span></strong></h3><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">The 7 Mindsets are a comprehensive plan for happiness, intentionality and success, which is written in simple and powerful language to teach how to activate success strategies so that people can live the life of their dreams.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">In this post we answered the question ‘’How does the brain play into mindset?’’ We discovered what the role of the brain is in the adoption of a mindset and if mindsets can be modified with experience.</span></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">If you have any questions or comments please let us know!</span></p><span data-dcnode-id="197" instrument_node="">
</span><h2 data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">References</span></h2><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Dweck, C. S. (2008). Mindset: The New Psychology of Success. Random House; New York.</span></p><span data-dcnode-id="191" instrument_node="">
