</span><div class="article-content retro-folders" data-dcnode-id="1153" id="main-article"><span data-dcnode-id="2906" instrument_node="">
</span><p data-dcnode-id="2905"></p><div class="quoteright" data-dcnode-id="2902" style="width:320px;"><div class="lazy_load_img_box" data-dcnode-id="2903" style="padding-top:75%"><img alt="https://static.tvtropes.org/pmwiki/pub/images/weird_science-show_8512.jpg" border="0" class="embeddedimage" data-dcnode-id="2904" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/images/weird_science-show_8512.jpg&amp;raw" width="320"></div></div><p data-dcnode-id="2901"></p><div class="indent" data-dcnode-id="2893"><em data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">"Submitted for your approval: two troubled teens and one magic genie. Seemingly the perfect formula for mirth and mayhem."</span></em><div class="indent" data-dcnode-id="2894"><span data-dcnode-id="2898" instrument_node="">— Chett Donnelly, imitating </span><a class="twikilink" data-dcnode-id="2896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RodSerling" title="/pmwiki/pmwiki.php/Creator/RodSerling"><span data-dcnode-id="2897" instrument_node="">Rod Serling</span></a><span data-dcnode-id="2895" instrument_node=""> in "Sci-Fi Zoned"</span></div></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2887"><span class="ad-caption" data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2888" id="proper-ad-tvtropes_mobile_ad_1"></div></div><p data-dcnode-id="2864"><span data-dcnode-id="2886" instrument_node="">A 1990s television </span><a class="twikilink" data-dcnode-id="2884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FantasticComedy" title="/pmwiki/pmwiki.php/Main/FantasticComedy"><span data-dcnode-id="2885" instrument_node="">Fantastic Comedy</span></a><span data-dcnode-id="2883" instrument_node=""> series based on the </span><a class="twikilink" data-dcnode-id="2881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/WeirdScience" title="/pmwiki/pmwiki.php/Film/WeirdScience"><span data-dcnode-id="2882" instrument_node="">1985 movie</span></a><span data-dcnode-id="2880" instrument_node=""> of the same name. </span><a class="twikilink" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodNerd" title="/pmwiki/pmwiki.php/Main/HollywoodNerd"><span data-dcnode-id="2879" instrument_node="">Hollywood Nerds</span></a><span data-dcnode-id="2877" instrument_node=""> Gary (</span><a class="twikilink" data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JohnAsher" title="/pmwiki/pmwiki.php/Creator/JohnAsher"><span data-dcnode-id="2876" instrument_node="">John Asher</span></a><span data-dcnode-id="2874" instrument_node="">) and Wyatt (</span><a class="createlink" data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/MichaelManasseri" title="/pmwiki/pmwiki.php/Creator/MichaelManasseri"><span data-dcnode-id="2873" instrument_node="">Michael Manasseri</span></a><span data-dcnode-id="2871" instrument_node="">), unable to hook up with real girls, use a computer to "create" the perfect woman: </span><a class="twikilink" data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MagicalGirl" title="/pmwiki/pmwiki.php/Main/MagicalGirl"><span data-dcnode-id="2870" instrument_node="">Magical Girl</span></a><span data-dcnode-id="2868" instrument_node=""> Lisa (</span><a class="twikilink" data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VanessaAngel" title="/pmwiki/pmwiki.php/Creator/VanessaAngel"><span data-dcnode-id="2867" instrument_node="">Vanessa Angel</span></a><span data-dcnode-id="2865" instrument_node="">), whose powers initiate wacky adventures.</span></p><p data-dcnode-id="2859"><span data-dcnode-id="2863" instrument_node="">The series, which aired on the </span><a class="twikilink" data-dcnode-id="2861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/USANetwork" title="/pmwiki/pmwiki.php/Creator/USANetwork"><span data-dcnode-id="2862" instrument_node="">USA Network</span></a><span data-dcnode-id="2860" instrument_node=""> from 1994 to 1997, changed settings from Illinois (in the original film) to California.</span></p><hr data-dcnode-id="2858"><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2852"><span class="ad-caption" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2853" id="proper-ad-tvtropes_mobile_ad_2"></div></div><h2 data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Tropes exhibited by this series include:</span></h2><p data-dcnode-id="2849"></p><div class="folderlabel toggle-all-folders-button" data-dcnode-id="2847" onclick="toggleAllFolders();"><span data-dcnode-id="2848" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;open/close all folders&nbsp; </span></div><p data-dcnode-id="2846"></p><div class="folderlabel" data-dcnode-id="2844" onclick="togglefolder('folder0');"><span data-dcnode-id="2845" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;A&nbsp;</span></div><div class="folder" data-dcnode-id="2715" id="folder0" isfolder="true" style="display:block;"><ul data-dcnode-id="2716"><li data-dcnode-id="2839"><span data-dcnode-id="2843" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AbsenteeActor" title="/pmwiki/pmwiki.php/Main/AbsenteeActor"><span data-dcnode-id="2842" instrument_node="">Absentee Actor</span></a><span data-dcnode-id="2840" instrument_node="">: Chett missed a few episodes here and there, with no explanation given for his whereabouts.</span></li><li data-dcnode-id="2829"><span data-dcnode-id="2838" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheAce" title="/pmwiki/pmwiki.php/Main/TheAce"><span data-dcnode-id="2837" instrument_node="">The Ace</span></a><span data-dcnode-id="2835" instrument_node="">:</span><ul data-dcnode-id="2830"><li data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node=""> As goofy as he could be, Scampi was always able to rein in Chett during high school and foil all of his pranks.</span></li><li data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node=""> In "The Bazooka Boys", Wyatt and Gary's clones do a better job of leading their lives than they do.</span></li></ul></li><li data-dcnode-id="2811"><span data-dcnode-id="2828" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdamWesting" title="/pmwiki/pmwiki.php/Main/AdamWesting"><span data-dcnode-id="2827" instrument_node="">Adam Westing</span></a><span data-dcnode-id="2825" instrument_node="">: By </span><a class="twikilink" data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/AdamWest" title="/pmwiki/pmwiki.php/Creator/AdamWest"><span data-dcnode-id="2824" instrument_node="">Adam West</span></a><span data-dcnode-id="2822" instrument_node=""> himself in "Strangers in Paradise". During </span><a class="twikilink" data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="2821" instrument_node="">a bidding war over a ceramic squirrel</span></a><span data-dcnode-id="2819" instrument_node="">, several nods are made to </span><em data-dcnode-id="2816"><a class="twikilink" data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Batman1966" title="/pmwiki/pmwiki.php/Series/Batman1966"><span data-dcnode-id="2818" instrument_node="">Batman</span></a></em><span data-dcnode-id="2815" instrument_node="">.</span><div class="indent" data-dcnode-id="2812"><a class="twikilink" data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HitFlash" title="/pmwiki/pmwiki.php/Main/HitFlash"><span data-dcnode-id="2814" instrument_node="">BID!</span></a></div></li><li data-dcnode-id="2806"><span data-dcnode-id="2810" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalJobChange" title="/pmwiki/pmwiki.php/Main/AdaptationalJobChange"><span data-dcnode-id="2809" instrument_node="">Adaptational Job Change</span></a><span data-dcnode-id="2807" instrument_node="">: In the film, Gary's father Al is a plumber. In the TV series, he owns a towing business.</span></li><li data-dcnode-id="2786"><span data-dcnode-id="2805" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptationalVillainy" title="/pmwiki/pmwiki.php/Main/AdaptationalVillainy"><span data-dcnode-id="2804" instrument_node="">Adaptational Villainy</span></a><span data-dcnode-id="2802" instrument_node="">: Unintentional example. While Movie!Lisa was very affectionate towards the boys and helped them become more confident and less socially awkward, Series!Lisa definitely has a mean streak and her </span><a class="twikilink" data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackassGenie" title="/pmwiki/pmwiki.php/Main/JackassGenie"><span data-dcnode-id="2801" instrument_node="">Jackass Genie</span></a><span data-dcnode-id="2799" instrument_node=""> antics (which aren't </span><em data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">always</span></em><span data-dcnode-id="2796" instrument_node=""> unintentional) often seem like something that if anything would make them even </span><em data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">less</span></em><span data-dcnode-id="2793" instrument_node=""> confident and more depressive. Any attempts to portray her as </span><a class="twikilink" data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TricksterMentor" title="/pmwiki/pmwiki.php/Main/TricksterMentor"><span data-dcnode-id="2792" instrument_node="">Trickster Mentor</span></a><span data-dcnode-id="2790" instrument_node=""> type also fall flat thanks to </span><a class="twikilink" data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StatusQuoIsGod" title="/pmwiki/pmwiki.php/Main/StatusQuoIsGod"><span data-dcnode-id="2789" instrument_node="">Status Quo Is God</span></a><span data-dcnode-id="2787" instrument_node=""> ensuring Gary and Wyatt won't ever change in any significant way, meaning she is either really bad at the 'Mentor' part or is simply messing with them for her own amusement.</span></li><li data-dcnode-id="2781"><span data-dcnode-id="2785" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AdaptedOut" title="/pmwiki/pmwiki.php/Main/AdaptedOut"><span data-dcnode-id="2784" instrument_node="">Adapted Out</span></a><span data-dcnode-id="2782" instrument_node="">: A very minor example. In the film, Wyatt has an unseen elder sister named Chloe. In the TV series, Chloe is entirely omitted and Chett is Wyatt's only sibling.</span></li><li data-dcnode-id="2757"><span data-dcnode-id="2780" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AesopAmnesia" title="/pmwiki/pmwiki.php/Main/AesopAmnesia"><span data-dcnode-id="2779" instrument_node="">Aesop Amnesia</span></a><span data-dcnode-id="2777" instrument_node="">:</span><ul data-dcnode-id="2758"><li data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node=""> In "Cyrano De Brainiac", Wyatt realizes that getting turned down wouldn't be the end of the world and gains a new level of confidence. He's back to his old shy self in the very next episode.</span></li><li data-dcnode-id="2759"><span data-dcnode-id="2774" instrument_node=""> At the end of "Grampira", Wyatt realizes that being old isn't something to be ashamed of, but Gary still complains about it (evidenced by him whining about the shows with old people on TV — e.g. </span><em data-dcnode-id="2771"><a class="twikilink" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheGoldenGirls" title="/pmwiki/pmwiki.php/Series/TheGoldenGirls"><span data-dcnode-id="2773" instrument_node="">The Golden Girls</span></a></em><span data-dcnode-id="2770" instrument_node="">) despite spending the whole episode's events with him and wishes to "never age". Lisa promptly metalizes him and seals him inside a block of metal.</span><div class="indent" data-dcnode-id="2764"><strong data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Wyatt</span></strong><span data-dcnode-id="2767" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="2766" instrument_node="">He's not gonna learn from that, either.</span></a></div><div class="indent" data-dcnode-id="2760"><strong data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">Lisa</span></strong><span data-dcnode-id="2761" instrument_node="">: But at least we can watch TV in peace.</span></div></li></ul></li><li data-dcnode-id="2749"><span data-dcnode-id="2756" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AesopCollateralDamage" title="/pmwiki/pmwiki.php/Main/AesopCollateralDamage"><span data-dcnode-id="2755" instrument_node="">Aesop Collateral Damage</span></a><span data-dcnode-id="2753" instrument_node="">: In “The Feminine Mistake” Gary makes Lisa mad and so she turns the boys into girls. When Wyatt protests about the fact that he's being punished for something Gary did, Lisa simply insists “he’s </span><em data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node="">your</span></em><span data-dcnode-id="2750" instrument_node=""> friend”.</span></li><li data-dcnode-id="2744"><span data-dcnode-id="2748" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AffectionateNickname" title="/pmwiki/pmwiki.php/Main/AffectionateNickname"><span data-dcnode-id="2747" instrument_node="">Affectionate Nickname</span></a><span data-dcnode-id="2745" instrument_node="">: Gary often referred to Wyatt as "Big Guy," presumably because Wyatt was quite a bit shorter than him.</span></li><li data-dcnode-id="2739"><span data-dcnode-id="2743" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlphaBitch" title="/pmwiki/pmwiki.php/Main/AlphaBitch"><span data-dcnode-id="2742" instrument_node="">Alpha Bitch</span></a><span data-dcnode-id="2740" instrument_node="">: Although they only appear in "Teen Lisa", Brenda Tomlinson and Heather are seemingly the resident alpha bitches of Farber High School. Brenda laughs in Gary's face when he asks her out and then proceeds to mock "Larry Wallace" with her friends in Gary's presence. When Lisa and the boys trade places and Lisa becomes a socially awkward teenager, Brenda and Heather take great delight in trying to make her life miserable while pretending to be her friend.</span></li><li data-dcnode-id="2730"><span data-dcnode-id="2738" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlwaysSomeoneBetter" title="/pmwiki/pmwiki.php/Main/AlwaysSomeoneBetter"><span data-dcnode-id="2737" instrument_node="">Always Someone Better</span></a><span data-dcnode-id="2735" instrument_node="">: A constant sore spot for Chett is how Wyatt is constantly the favorite in the family.</span><div class="indent" data-dcnode-id="2731"><strong data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Chett:</span></strong><span data-dcnode-id="2732" instrument_node=""> You've never been second best. You've always been the good son. You're gonna get the good job. You're the one Nana wants to see at Christmas. Well, not anymore. Now you can see how I felt when you potty trained at eight months.</span></div></li><li data-dcnode-id="2722"><span data-dcnode-id="2729" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AndStarring" title="/pmwiki/pmwiki.php/Main/AndStarring"><span data-dcnode-id="2728" instrument_node="">And Starring</span></a><span data-dcnode-id="2726" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VanessaAngel" title="/pmwiki/pmwiki.php/Creator/VanessaAngel"><span data-dcnode-id="2725" instrument_node="">Vanessa Angel</span></a><span data-dcnode-id="2723" instrument_node=""> as Lisa.</span></li><li data-dcnode-id="2717"><span data-dcnode-id="2721" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheArtifact" title="/pmwiki/pmwiki.php/Main/TheArtifact"><span data-dcnode-id="2720" instrument_node="">The Artifact</span></a><span data-dcnode-id="2718" instrument_node="">: Discussed in "Magic Comet Ride" in regards to Lisa herself. She makes all the magical adventures possible, but the Genie Master points out that she was created because Gary and Wyatt were hopeless social outcasts and that they've long since been able to manage just fine. Lisa concedes she fulfilled her original purpose, but she says she's not ready to move on and leave her friends.</span></li></ul></div><p data-dcnode-id="2714"></p><div class="folderlabel" data-dcnode-id="2712" onclick="togglefolder('folder1');"><span data-dcnode-id="2713" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;B&nbsp;</span></div><div class="folder" data-dcnode-id="2617" id="folder1" isfolder="true" style="display:block;"><ul data-dcnode-id="2658"><li data-dcnode-id="2697"><span data-dcnode-id="2711" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BadassBoast" title="/pmwiki/pmwiki.php/Main/BadassBoast"><span data-dcnode-id="2710" instrument_node="">Badass Boast</span></a><span data-dcnode-id="2708" instrument_node="">: During "Searching for Boris Karloff", when the guys are preparing to use Frankenstein's laboratory to revitalize Lisa.</span><div class="indent" data-dcnode-id="2698"><strong data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="2705" instrument_node=""> We're not exactly in our element here. </span><br data-dcnode-id="2704"><strong data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">Gary:</span></strong><span data-dcnode-id="2701" instrument_node=""> We belong here! We captured the elusive spark of life from the vast nothingness. We created a beautiful woman from that inky void, and we can do it again! </span><a class="twikilink" data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllMenArePerverts" title="/pmwiki/pmwiki.php/Main/AllMenArePerverts"><span data-dcnode-id="2700" instrument_node="">And maybe this time, she'll shower with us!</span></a></div></li><li data-dcnode-id="2683"><span data-dcnode-id="2696" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor" title="/pmwiki/pmwiki.php/Main/BeCarefulWhatYouWishFor"><span data-dcnode-id="2695" instrument_node="">Be Careful What You Wish For</span></a><span data-dcnode-id="2693" instrument_node="">: A frequently used trope to the point of being </span><a class="twikilink" data-dcnode-id="2691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OncePerEpisode" title="/pmwiki/pmwiki.php/Main/OncePerEpisode"><span data-dcnode-id="2692" instrument_node="">Once per Episode</span></a><span data-dcnode-id="2690" instrument_node="">.</span><ul data-dcnode-id="2684"><li data-dcnode-id="2685"><span data-dcnode-id="2689" instrument_node=""> "The Most Dangerous Wish" revolves around the guys being given a brand new computer game by Lisa; they then blow her off completely to play the game but are disappointed that the game turns out to be too short. When they complain to Lisa — well, she's so miffed at being ignored, she brings the video game villain to life. See also </span><a class="twikilink" data-dcnode-id="2687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TurnedAgainstTheirMasters" title="/pmwiki/pmwiki.php/Main/TurnedAgainstTheirMasters"><span data-dcnode-id="2688" instrument_node="">Turned Against Their Masters</span></a><span data-dcnode-id="2686" instrument_node="">.</span></li></ul></li><li data-dcnode-id="2671"><span data-dcnode-id="2682" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeachEpisode" title="/pmwiki/pmwiki.php/Main/BeachEpisode"><span data-dcnode-id="2681" instrument_node="">Beach Episode</span></a><span data-dcnode-id="2679" instrument_node="">: In "Free Gary", the guys get to live out a </span><em data-dcnode-id="2676"><a class="twikilink" data-dcnode-id="2677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/Baywatch" title="/pmwiki/pmwiki.php/Series/Baywatch"><span data-dcnode-id="2678" instrument_node="">Baywatch</span></a></em><span data-dcnode-id="2675" instrument_node="">-esque scenario, but it turns out Gary can't swim. When he has to save the </span><a class="twikilink" data-dcnode-id="2673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GirlOfTheWeek" title="/pmwiki/pmwiki.php/Main/GirlOfTheWeek"><span data-dcnode-id="2674" instrument_node="">Girl of the Week</span></a><span data-dcnode-id="2672" instrument_node="">, Lisa accidentally turns him into a merman.</span></li><li data-dcnode-id="2659"><span data-dcnode-id="2670" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BerserkButton" title="/pmwiki/pmwiki.php/Main/BerserkButton"><span data-dcnode-id="2669" instrument_node="">Berserk Button</span></a><span data-dcnode-id="2667" instrument_node="">: Heaven help the boys if they ever try to </span><em data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">command</span></em><span data-dcnode-id="2664" instrument_node=""> Lisa to do something, or refer to themselves as her masters.</span><div class="indent" data-dcnode-id="2660"><strong data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="2661" instrument_node=""> Geez, Gary, not the "M-word!"</span></div></li></ul><ul data-dcnode-id="2618"><li data-dcnode-id="2652"><span data-dcnode-id="2656" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakTheHaughty" title="/pmwiki/pmwiki.php/Main/BreakTheHaughty"><span data-dcnode-id="2655" instrument_node="">Break the Haughty</span></a><span data-dcnode-id="2653" instrument_node="">: In "Show Chett", Chett ends up convincing Lisa to make him a successful male stripper. Everything goes great until his female fanbase begins to stalk him, his female boss forces him to have sex with her to keep his job, and finds his attempts to become a "legitimate" dancer squashed by sexist talent agents who see him as a glorified whore.</span></li><li data-dcnode-id="2647"><span data-dcnode-id="2651" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrilliantButLazy" title="/pmwiki/pmwiki.php/Main/BrilliantButLazy"><span data-dcnode-id="2650" instrument_node="">Brilliant, but Lazy</span></a><span data-dcnode-id="2648" instrument_node="">: Gary. In "Slow Times at Farber High", he spent hours writing cheat notes all over his body (writing backwards for his back so he could read them in the bathroom mirror) rather than just study. Scampi tells him he could be a great mind if he devoted that kind of energy to his studies.</span></li><li data-dcnode-id="2639"><span data-dcnode-id="2646" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrokenAce" title="/pmwiki/pmwiki.php/Main/BrokenAce"><span data-dcnode-id="2645" instrument_node="">Broken Ace</span></a><span data-dcnode-id="2643" instrument_node="">: Chett in the </span><a class="twikilink" data-dcnode-id="2641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAWonderfulPlot" title="/pmwiki/pmwiki.php/Main/ItsAWonderfulPlot"><span data-dcnode-id="2642" instrument_node="">It's a Wonderful Plot</span></a><span data-dcnode-id="2640" instrument_node=""> episode "It's a Wonderful Life...Without You". In a world without Wyatt, Chett is a model student that constantly gets good grades, has numerous outside activities, and is adored by his parents. The problem is that without a sibling to divvy up the attention, the parents put too much pressure on him to succeed; he's constantly on the edge of a nervous breakdown and dreads letting everyone down.</span></li><li data-dcnode-id="2634"><span data-dcnode-id="2638" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BroughtDownToNormal" title="/pmwiki/pmwiki.php/Main/BroughtDownToNormal"><span data-dcnode-id="2637" instrument_node="">Brought Down to Normal</span></a><span data-dcnode-id="2635" instrument_node="">: In "Horseradish", Wyatt's computer gets a security upgrade, but Gary forgets the password - locking Lisa out and cutting off her magic.</span></li><li data-dcnode-id="2627"><span data-dcnode-id="2633" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BullyingADragon" title="/pmwiki/pmwiki.php/Main/BullyingADragon"><span data-dcnode-id="2632" instrument_node="">Bullying a Dragon</span></a><span data-dcnode-id="2630" instrument_node="">: After learning about her, Chett had a habit of purposefully annoying or goading Lisa. It went as well as you'd expect.</span><div class="indent" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">"Note to self: stop pissing off the genie."</span></div></li><li data-dcnode-id="2619"><span data-dcnode-id="2626" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButtMonkey" title="/pmwiki/pmwiki.php/Main/ButtMonkey"><span data-dcnode-id="2625" instrument_node="">Butt-Monkey</span></a><span data-dcnode-id="2623" instrument_node="">: Both male leads but especially Gary. Wyatt usually at least managed to keep some dignity even when kicked by another wish gone wrong. Chett probably qualifies too, though he (mostly) </span><a class="twikilink" data-dcnode-id="2621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AssholeVictim" title="/pmwiki/pmwiki.php/Main/AssholeVictim"><span data-dcnode-id="2622" instrument_node="">deserves it</span></a><span data-dcnode-id="2620" instrument_node="">.</span></li></ul></div><p data-dcnode-id="2616"></p><div class="folderlabel" data-dcnode-id="2614" onclick="togglefolder('folder2');"><span data-dcnode-id="2615" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;C-D&nbsp;</span></div><div class="folder" data-dcnode-id="2471" id="folder2" isfolder="true" style="display:block;"><ul data-dcnode-id="2608"><li data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CannotKeepASecret" title="/pmwiki/pmwiki.php/Main/CannotKeepASecret"><span data-dcnode-id="2612" instrument_node="">Cannot Keep a Secret</span></a><span data-dcnode-id="2610" instrument_node="">: In "Girl Talk", Lisa feels bad about keeping secrets from her new friend and tells her she's a genie. Unfortunately, the friend tells her sister and ultimately leads to about thirty other people (including Scampi somewhere along the line) finding out. In the end, Lisa's friend asks to have her memory wiped of Lisa's secret because she'd never be able to keep from telling everyone.</span></li></ul><ul data-dcnode-id="2580"><li data-dcnode-id="2602"><span data-dcnode-id="2606" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CaughtInTheRipple" title="/pmwiki/pmwiki.php/Main/CaughtInTheRipple"><span data-dcnode-id="2605" instrument_node="">Caught in the Ripple</span></a><span data-dcnode-id="2603" instrument_node="">: "What Genie?" starts with Gary and Wyatt getting bullied which they're used to, but they seemingly have no knowledge of Lisa. They then discover evidence of her existence and look into her. It's later discovered they told a classmate about Lisa and the classmate made Lisa her slave. One of the first things she did was wish Gary and Wyatt forgot about Lisa.</span></li><li data-dcnode-id="2594"><span data-dcnode-id="2601" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CensorBox" title="/pmwiki/pmwiki.php/Main/CensorBox"><span data-dcnode-id="2600" instrument_node="">Censor Box</span></a><span data-dcnode-id="2598" instrument_node="">: In "Magnifico Dad", Gary wishes to see Lisa naked. She grants the wish, sort of, by using censor boxes to block off the parts you can't show on TV, explaining that if the boys actually saw </span><a class="twikilink" data-dcnode-id="2596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WorldsMostBeautifulWoman" title="/pmwiki/pmwiki.php/Main/WorldsMostBeautifulWoman"><span data-dcnode-id="2597" instrument_node="">her</span></a><span data-dcnode-id="2595" instrument_node=""> naked, "it would spoil you for real women."</span></li><li data-dcnode-id="2589"><span data-dcnode-id="2593" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Catchphrase" title="/pmwiki/pmwiki.php/Main/Catchphrase"><span data-dcnode-id="2592" instrument_node="">Catchphrase</span></a><span data-dcnode-id="2590" instrument_node="">: When Gary is proven wrong or surprised, he usually responds with "Son of a gun."</span></li><li data-dcnode-id="2581"><span data-dcnode-id="2588" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterizationMarchesOn" title="/pmwiki/pmwiki.php/Main/CharacterizationMarchesOn"><span data-dcnode-id="2587" instrument_node="">Characterization Marches On</span></a><span data-dcnode-id="2585" instrument_node="">: Gary's dad, Al, was initially a lot stricter towards him and more distant towards his wife. A few appearances later, he became more of a loving </span><a class="twikilink" data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BumblingDad" title="/pmwiki/pmwiki.php/Main/BumblingDad"><span data-dcnode-id="2584" instrument_node="">Bumbling Dad</span></a><span data-dcnode-id="2582" instrument_node="">.</span></li></ul><ul data-dcnode-id="2472"><li data-dcnode-id="2574"><span data-dcnode-id="2578" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CityWithNoName" title="/pmwiki/pmwiki.php/Main/CityWithNoName"><span data-dcnode-id="2577" instrument_node="">City with No Name</span></a><span data-dcnode-id="2575" instrument_node="">: The town is unnamed, but somewhere in southern California.</span></li><li data-dcnode-id="2566"><span data-dcnode-id="2573" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ClingyJealousGirl" title="/pmwiki/pmwiki.php/Main/ClingyJealousGirl"><span data-dcnode-id="2572" instrument_node="">Clingy Jealous Girl</span></a><span data-dcnode-id="2570" instrument_node="">: In "Fatal Lisa", a botched wish causes Lisa to fall in love with Wyatt. She becomes increasingly clingy and possessive - to the point of making </span><em data-dcnode-id="2568"><span data-dcnode-id="2569" instrument_node="">everyone</span></em><span data-dcnode-id="2567" instrument_node=""> else disappear to leave the two of them alone.</span></li><li data-dcnode-id="2554"><span data-dcnode-id="2565" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComedicSociopathy" title="/pmwiki/pmwiki.php/Main/ComedicSociopathy"><span data-dcnode-id="2564" instrument_node="">Comedic Sociopathy</span></a><span data-dcnode-id="2562" instrument_node="">: Lisa is very casual about endangering the boys' lives or even </span><a class="twikilink" data-dcnode-id="2560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsCheap" title="/pmwiki/pmwiki.php/Main/DeathIsCheap"><span data-dcnode-id="2561" instrument_node="">temporarily killing them</span></a><span data-dcnode-id="2559" instrument_node="">.</span><div class="indent" data-dcnode-id="2555"><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Lisa:</span></strong><span data-dcnode-id="2556" instrument_node=""> If I told you every time I put your lives in danger, we'd never get out of the house.</span></div></li><li data-dcnode-id="2549"><span data-dcnode-id="2553" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComesGreatResponsibility" title="/pmwiki/pmwiki.php/Main/ComesGreatResponsibility"><span data-dcnode-id="2552" instrument_node="">Comes Great Responsibility</span></a><span data-dcnode-id="2550" instrument_node="">: In "Rock Hard Chett", a prank on Chett is about to go horribly wrong, so Lisa gives him invincibility to save his life. He finds out about his new powers when he stumbles onto and foils a bank robbery. He quickly decides to put on a costume and become a superhero. Amazingly enough, he takes it very seriously and does a great job.</span></li><li data-dcnode-id="2541"><span data-dcnode-id="2548" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ComicallyMissingThePoint" title="/pmwiki/pmwiki.php/Main/ComicallyMissingThePoint"><span data-dcnode-id="2547" instrument_node="">Comically Missing the Point</span></a><span data-dcnode-id="2545" instrument_node="">: When Gary and Wyatt sneak onto a talk show (see below) and reveal they have a genie in "What Genie?", Chett, Principal Scampi and a </span><a class="twikilink" data-dcnode-id="2543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkJock" title="/pmwiki/pmwiki.php/Main/JerkJock"><span data-dcnode-id="2544" instrument_node="">Jerk Jock</span></a><span data-dcnode-id="2542" instrument_node=""> at school feel "that explains a lot." Gary's father, however, asks, "Where'd Gary get the money for a sex change operation?"</span></li><li data-dcnode-id="2528"><span data-dcnode-id="2540" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="2539" instrument_node="">Continuity Nod</span></a><span data-dcnode-id="2537" instrument_node="">:</span><ul data-dcnode-id="2529"><li data-dcnode-id="2532"><span data-dcnode-id="2536" instrument_node=""> In "What Genie?", the boys sneak onto the the set of a talk show and appear as guests. The topic of the day? "Men who turned into women who turned into men again." See </span><a class="twikilink" data-dcnode-id="2534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenderBender" title="/pmwiki/pmwiki.php/Main/GenderBender"><span data-dcnode-id="2535" instrument_node="">Gender Bender</span></a><span data-dcnode-id="2533" instrument_node=""> below. This episode also sees Wyatt and Gary going over the former's journal - referencing several past episodes.</span></li><li data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node=""> "Free Gary" has him reveal that he can't swim. A later episode ("It Takes a Geek") has a couple scenes involving being on a boat in a lake, so Gary is shown wearing a life-jacket.</span></li></ul></li><li data-dcnode-id="2523"><span data-dcnode-id="2527" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CoolLoser" title="/pmwiki/pmwiki.php/Main/CoolLoser"><span data-dcnode-id="2526" instrument_node="">Cool Loser</span></a><span data-dcnode-id="2524" instrument_node="">: Like in the movie, Wyatt and Gary start out as absolutely pathetic. After about a season or so, they become this—able to interact socially with their peers and ask girls out. They're still considered unpopular, but that's shown to be because the popular kids are assholes.</span></li><li data-dcnode-id="2518"><span data-dcnode-id="2522" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CourtroomEpisode" title="/pmwiki/pmwiki.php/Main/CourtroomEpisode"><span data-dcnode-id="2521" instrument_node="">Courtroom Episode</span></a><span data-dcnode-id="2519" instrument_node="">: In "Community Property", Wyatt and Gary fight over Lisa, leading to a cyber-court battle over who should get custody.</span></li><li data-dcnode-id="2506"><span data-dcnode-id="2517" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CrossOver" title="/pmwiki/pmwiki.php/Main/CrossOver"><span data-dcnode-id="2516" instrument_node="">Crossover</span></a><span data-dcnode-id="2514" instrument_node="">: The three male characters all appeared, voicing themselves, on another USA network show, </span><em data-dcnode-id="2511"><a class="twikilink" data-dcnode-id="2512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Duckman" title="/pmwiki/pmwiki.php/WesternAnimation/Duckman"><span data-dcnode-id="2513" instrument_node="">Duckman</span></a></em><span data-dcnode-id="2510" instrument_node="">, where the villain was </span><a class="twikilink" data-dcnode-id="2508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BreakingTheFourthWall" title="/pmwiki/pmwiki.php/Main/BreakingTheFourthWall"><span data-dcnode-id="2509" instrument_node="">planning to kill the regulars from both shows</span></a><span data-dcnode-id="2507" instrument_node="">.</span></li><li data-dcnode-id="2501"><span data-dcnode-id="2505" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeadpanSnarker" title="/pmwiki/pmwiki.php/Main/DeadpanSnarker"><span data-dcnode-id="2504" instrument_node="">Deadpan Snarker</span></a><span data-dcnode-id="2502" instrument_node="">: Gary.</span></li><li data-dcnode-id="2481"><span data-dcnode-id="2500" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeliberatelyMonochrome" title="/pmwiki/pmwiki.php/Main/DeliberatelyMonochrome"><span data-dcnode-id="2499" instrument_node="">Deliberately Monochrome</span></a><span data-dcnode-id="2497" instrument_node="">:</span><ul data-dcnode-id="2482"><li data-dcnode-id="2488"><span data-dcnode-id="2496" instrument_node=""> As a </span><a class="twikilink" data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholePlotReference" title="/pmwiki/pmwiki.php/Main/WholePlotReference"><span data-dcnode-id="2495" instrument_node="">Whole Plot Reference</span></a><span data-dcnode-id="2493" instrument_node=""> to </span><em data-dcnode-id="2490"><a class="twikilink" data-dcnode-id="2491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1959" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1959"><span data-dcnode-id="2492" instrument_node="">The Twilight Zone (1959)</span></a></em><span data-dcnode-id="2489" instrument_node="">, the vast majority of "Sci-Fi Zoned" is in black and white.</span></li><li data-dcnode-id="2483"><span data-dcnode-id="2487" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="2485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoirEpisode" title="/pmwiki/pmwiki.php/Main/NoirEpisode"><span data-dcnode-id="2486" instrument_node="">Noir Episode</span></a><span data-dcnode-id="2484" instrument_node=""> "The Genie Detective" is also predominantly in black and white.</span></li></ul></li><li data-dcnode-id="2473"><span data-dcnode-id="2480" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment" title="/pmwiki/pmwiki.php/Main/DepartmentOfRedundancyDepartment"><span data-dcnode-id="2479" instrument_node="">Department of Redundancy Department</span></a><span data-dcnode-id="2477" instrument_node="">: Lisa is </span><a class="twikilink" data-dcnode-id="2475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InsistentTerminology" title="/pmwiki/pmwiki.php/Main/InsistentTerminology"><span data-dcnode-id="2476" instrument_node="">insistently</span></a><span data-dcnode-id="2474" instrument_node=""> referred to as a "magic genie."</span></li></ul></div><div class="proper-ad-unit mobile-ad square_ad" data-dcnode-id="2465"><span class="ad-caption" data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Advertisement:</span></span><div data-dcnode-id="2466" id="proper-ad-tvtropes_mobile_ad_3"></div></div><p data-dcnode-id="2464"></p><div class="folderlabel" data-dcnode-id="2462" onclick="togglefolder('folder3');"><span data-dcnode-id="2463" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;E-F&nbsp;</span></div><div class="folder" data-dcnode-id="2360" id="folder3" isfolder="true" style="display:block;"><ul data-dcnode-id="2361"><li data-dcnode-id="2457"><span data-dcnode-id="2461" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness" title="/pmwiki/pmwiki.php/Main/EarlyInstallmentWeirdness"><span data-dcnode-id="2460" instrument_node="">Early Installment Weirdness</span></a><span data-dcnode-id="2458" instrument_node="">: In the first few episodes, Wyatt and Gary would actually have to type on the computer to summon Lisa. Afterwards, they could still do this, but Lisa was far more likely to pop in on her own.</span></li><li data-dcnode-id="2452"><span data-dcnode-id="2456" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EasyAmnesia" title="/pmwiki/pmwiki.php/Main/EasyAmnesia"><span data-dcnode-id="2455" instrument_node="">Easy Amnesia</span></a><span data-dcnode-id="2453" instrument_node="">: In "By the Time We Got to Woodstock", Lisa gets amnesia after banging her head on the sign reading "You Must Be As Tall as This Sign to Enter the Time Hole" that she placed above Wyatt's bed before she, Gary and Wyatt went back in time to 1969.</span></li><li data-dcnode-id="2447"><span data-dcnode-id="2451" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EnemyMine" title="/pmwiki/pmwiki.php/Main/EnemyMine"><span data-dcnode-id="2450" instrument_node="">Enemy Mine</span></a><span data-dcnode-id="2448" instrument_node="">: Chett and Scampi had to (begrudgingly) team up in "Gary and Wyatt's Bloodsucking Adventure" and "Stalag 16".</span></li><li data-dcnode-id="2442"><span data-dcnode-id="2446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/EverythingsDeaderWithZombies" title="/pmwiki/pmwiki.php/Main/EverythingsDeaderWithZombies"><span data-dcnode-id="2445" instrument_node="">Everything's Deader with Zombies</span></a><span data-dcnode-id="2443" instrument_node="">: In "You'll Never Eat Brains in This Town Again", Lisa is trying to make an indie horror movie with zombies. When the student actors don't work out, she zaps up some real zombies. The zombies do what they're told and behave, but when the sun goes down, they get hungry. And one of them bites Lisa...</span></li><li data-dcnode-id="2434"><span data-dcnode-id="2441" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Expy" title="/pmwiki/pmwiki.php/Main/Expy"><span data-dcnode-id="2440" instrument_node="">Expy</span></a><span data-dcnode-id="2438" instrument_node="">: The FBI characters in "Fly Boy" are patterned after </span><a class="twikilink" data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheXFiles" title="/pmwiki/pmwiki.php/Series/TheXFiles"><span data-dcnode-id="2437" instrument_node="">Mulder, Scully and the Cigarette-Smoking Man</span></a><span data-dcnode-id="2435" instrument_node="">.</span></li><li data-dcnode-id="2426"><span data-dcnode-id="2433" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFamilyForTheWholeFamily" title="/pmwiki/pmwiki.php/Main/TheFamilyForTheWholeFamily"><span data-dcnode-id="2432" instrument_node="">The Family for the Whole Family</span></a><span data-dcnode-id="2430" instrument_node="">: In "It's a Mob, Mob, Mob, Mob World", the Donnellys become the Donnellis, a loving family that runs the Homeowners Association like a criminal empire. This later leads to a goofy </span><a class="twikilink" data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MobWar" title="/pmwiki/pmwiki.php/Main/MobWar"><span data-dcnode-id="2429" instrument_node="">Mob War</span></a><span data-dcnode-id="2427" instrument_node=""> between them and the Wallaces.</span></li><li data-dcnode-id="2418"><span data-dcnode-id="2425" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Flanderization" title="/pmwiki/pmwiki.php/Main/Flanderization"><span data-dcnode-id="2424" instrument_node="">Flanderization</span></a><span data-dcnode-id="2422" instrument_node="">: Lisa, from a competent but unpredictable genie to a full-fledged </span><a class="twikilink" data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IneptMage" title="/pmwiki/pmwiki.php/Main/IneptMage"><span data-dcnode-id="2421" instrument_node="">Inept Mage</span></a><span data-dcnode-id="2419" instrument_node=""> whose spells never work right.</span></li><li data-dcnode-id="2399"><span data-dcnode-id="2417" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ForgotAboutHisPowers" title="/pmwiki/pmwiki.php/Main/ForgotAboutHisPowers"><span data-dcnode-id="2416" instrument_node="">Forgot About His Powers</span></a><span data-dcnode-id="2414" instrument_node="">: Lisa and the boys are constantly resorting to </span><a class="twikilink" data-dcnode-id="2412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ZanyScheme" title="/pmwiki/pmwiki.php/Main/ZanyScheme"><span data-dcnode-id="2413" instrument_node="">zany schemes</span></a><span data-dcnode-id="2411" instrument_node=""> to do things that Lisa could accomplish with one wave of her hand. </span><a class="twikilink" data-dcnode-id="2409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="2410" instrument_node="">Lampshaded</span></a><span data-dcnode-id="2408" instrument_node=""> in "Searching for Boris Karloff" after Lisa makes a heartbroken speech over the dead body of Frankenstein's monster:</span><div class="indent" data-dcnode-id="2400"><strong data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Gary:</span></strong><span data-dcnode-id="2405" instrument_node=""> Uh, Lis? Can't you just, you know, zap him back to life? </span><br data-dcnode-id="2404"><strong data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Lisa:</span></strong><span data-dcnode-id="2401" instrument_node=""> Oh. Yeah.</span></div></li><li data-dcnode-id="2391"><span data-dcnode-id="2398" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreakyFridayFlip" title="/pmwiki/pmwiki.php/Main/FreakyFridayFlip"><span data-dcnode-id="2397" instrument_node="">"Freaky Friday" Flip</span></a><span data-dcnode-id="2395" instrument_node="">: In "Switched at Birth", feeling the other doesn't appreciate their current life, Wyatt gets to enjoy time with the down-to-Earth, </span><em data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">present</span></em><span data-dcnode-id="2392" instrument_node=""> Wallaces and Gary gets to enjoy parental free life with a working credit card.</span></li><li data-dcnode-id="2381"><span data-dcnode-id="2390" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreudianExcuse" title="/pmwiki/pmwiki.php/Main/FreudianExcuse"><span data-dcnode-id="2389" instrument_node="">Freudian Excuse</span></a><span data-dcnode-id="2387" instrument_node="">:</span><ul data-dcnode-id="2382"><li data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node=""> Chett's bullying of Wyatt. A flashback in "Strangers in Paradise" shows Chett was moved into a smaller room to make way for newborn Wyatt. This is followed by a montage of moments of their parents constantly praising Wyatt and criticizing Chett.</span></li><li data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node=""> His grudge against Scampi, as well. At first, it just seems solely based on Scampi foiling his pranks and disciplining him, but "Stalag 16" reveals that he blames Scampi for being expelled and sent to military school.</span></li></ul></li><li data-dcnode-id="2376"><span data-dcnode-id="2380" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheFriendNobodyLikes" title="/pmwiki/pmwiki.php/Main/TheFriendNobodyLikes"><span data-dcnode-id="2379" instrument_node="">The Friend Nobody Likes</span></a><span data-dcnode-id="2377" instrument_node="">: Chett. Wyatt tends to stick up for him out of family loyalty, but Gary often snarks at him and Lisa has a lot of issues with him, too. It turns out that the people Chett regularly hangs out with look down on him, too.</span></li><li data-dcnode-id="2371"><span data-dcnode-id="2375" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FriendlyEnemy" title="/pmwiki/pmwiki.php/Main/FriendlyEnemy"><span data-dcnode-id="2374" instrument_node="">Friendly Enemy</span></a><span data-dcnode-id="2372" instrument_node="">: Rhett and Mickey (the two rats turned human in "Chett World") want to take over the world and avenge their kind for being experimented on, but they genuinely like Chett and offer him a position of power.</span></li><li data-dcnode-id="2362"><span data-dcnode-id="2370" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FromBadToWorse" title="/pmwiki/pmwiki.php/Main/FromBadToWorse"><span data-dcnode-id="2369" instrument_node="">From Bad to Worse</span></a><span data-dcnode-id="2367" instrument_node="">: "Sci-Fi Zoned" builds up to this. Lisa zaps Gary and Wyatt into </span><em data-dcnode-id="2364"><a class="twikilink" data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1959" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1959"><span data-dcnode-id="2366" instrument_node="">The Sci-Fi Zone</span></a></em><span data-dcnode-id="2363" instrument_node="">, the show that helped them become best friends. They're told it'll only last for a day, but once time is up, they instead crash into a city with no food or water. Lisa realizes she forgot that time has no meaning here, so a day could last a lifetime. Worse, the guys find this Lisa is just a hologram—meaning they're completely on their own.</span></li></ul></div><p data-dcnode-id="2359"></p><div class="folderlabel" data-dcnode-id="2357" onclick="togglefolder('folder4');"><span data-dcnode-id="2358" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;G-H&nbsp;</span></div><div class="folder" data-dcnode-id="2236" id="folder4" isfolder="true" style="display:block;"><ul data-dcnode-id="2237"><li data-dcnode-id="2332"><span data-dcnode-id="2356" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenderBender" title="/pmwiki/pmwiki.php/Main/GenderBender"><span data-dcnode-id="2355" instrument_node="">Gender Bender</span></a><span data-dcnode-id="2353" instrument_node="">:</span><ul data-dcnode-id="2333"><li data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node=""> In "The Feminine Mistake", when Gary tries to command her, Lisa gets her own back by turning the boys into girls.</span></li><li data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node=""> And nobody could forget the episode, "Grumpy Old Genie", where an underage online thief steals Lisa's image, replacing it with Abe Vigoda. (Yes, TV's </span><em data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Fish</span></em><span data-dcnode-id="2347" instrument_node="">.).</span></li><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node=""> In "Quantum Wyatt", Gary jumps into a phone-sex operator at the end.</span></li><li data-dcnode-id="2340"><span data-dcnode-id="2343" instrument_node=""> In the Pilot, Gary (thinking that Lisa had left forever) told Wyatt that he wouldn't be happy unless Wyatt was a "killer babe." Cue Wyatt turning into a gorgeous blonde. </span><a class="twikilink" data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome" title="/pmwiki/pmwiki.php/Main/OffscreenMomentOfAwesome"><span data-dcnode-id="2342" instrument_node="">And then cue credits before anything interesting happens.</span></a></li><li data-dcnode-id="2334"><span data-dcnode-id="2339" instrument_node=""> In "Bee in There", Wyatt asks Lisa to not only send himself and Gary back in time to 1987 but to leap them into their fathers a la </span><em data-dcnode-id="2336"><a class="twikilink" data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/QuantumLeap" title="/pmwiki/pmwiki.php/Series/QuantumLeap"><span data-dcnode-id="2338" instrument_node="">Quantum Leap</span></a></em><span data-dcnode-id="2335" instrument_node=""> so they can teach their younger selves show to throw a baseball. Gary, however, leaps into his mother. This leads his dad and Wyatt's mother to believe that their spouses are having an affair.</span></li></ul></li><li data-dcnode-id="2318"><span data-dcnode-id="2331" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GenreSavvy" title="/pmwiki/pmwiki.php/Main/GenreSavvy"><span data-dcnode-id="2330" instrument_node="">Genre Savvy</span></a><span data-dcnode-id="2328" instrument_node="">:</span><ul data-dcnode-id="2319"><li data-dcnode-id="2326"><span data-dcnode-id="2327" instrument_node=""> Gary with slasher movies, as seen in "Bikini Camp Slasher".</span></li><li data-dcnode-id="2320"><span data-dcnode-id="2325" instrument_node=""> Both Gary and Wyatt with respect to </span><em data-dcnode-id="2322"><a class="twikilink" data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1959" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1959"><span data-dcnode-id="2324" instrument_node="">The Sci-Fi Zone</span></a></em><span data-dcnode-id="2321" instrument_node=""> in "Sci-Fi Zoned".</span></li></ul></li><li data-dcnode-id="2307"><span data-dcnode-id="2317" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="2316" instrument_node="">Grand Finale</span></a><span data-dcnode-id="2314" instrument_node="">: "WS4." Aliens invade, Gary is killed by said aliens but then </span><a class="twikilink" data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DeathIsCheap" title="/pmwiki/pmwiki.php/Main/DeathIsCheap"><span data-dcnode-id="2313" instrument_node="">resurrected</span></a><span data-dcnode-id="2311" instrument_node="">; Chett and Scampi have a </span><a class="twikilink" data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LukeIAmYourFather" title="/pmwiki/pmwiki.php/Main/LukeIAmYourFather"><span data-dcnode-id="2310" instrument_node="">Luke, I Am Your Father</span></a><span data-dcnode-id="2308" instrument_node=""> moment.</span></li><li data-dcnode-id="2302"><span data-dcnode-id="2306" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalloweenEpisode" title="/pmwiki/pmwiki.php/Main/HalloweenEpisode"><span data-dcnode-id="2305" instrument_node="">Halloween Episode</span></a><span data-dcnode-id="2303" instrument_node="">: In "Demon Lisa", Wyatt and Gary throw a Halloween party, as Lisa is possessed by an Internet virus/demon.</span></li><li data-dcnode-id="2291"><span data-dcnode-id="2301" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HighClassGlass" title="/pmwiki/pmwiki.php/Main/HighClassGlass"><span data-dcnode-id="2300" instrument_node="">High-Class Glass</span></a><span data-dcnode-id="2298" instrument_node="">: </span><a class="twikilink" data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Exaggerated" title="/pmwiki/pmwiki.php/Main/Exaggerated"><span data-dcnode-id="2297" instrument_node="">Exaggerated</span></a><span data-dcnode-id="2295" instrument_node="">, "Stalag 16" has a stereotypical Nazi officer wears a monocle on </span><em data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">each</span></em><span data-dcnode-id="2292" instrument_node=""> eye.</span></li><li data-dcnode-id="2283"><span data-dcnode-id="2290" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HateSink" title="/pmwiki/pmwiki.php/Main/HateSink"><span data-dcnode-id="2289" instrument_node="">Hate Sink</span></a><span data-dcnode-id="2287" instrument_node="">: Chett starts out as an unrepentant asshole that regularly bullies and annoys others. Over time, </span><a class="twikilink" data-dcnode-id="2285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CharacterDevelopment" title="/pmwiki/pmwiki.php/Main/CharacterDevelopment"><span data-dcnode-id="2286" instrument_node="">Character Development</span></a><span data-dcnode-id="2284" instrument_node=""> gave him more likable qualities.</span></li><li data-dcnode-id="2278"><span data-dcnode-id="2282" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HeterosexualLifePartners" title="/pmwiki/pmwiki.php/Main/HeterosexualLifePartners"><span data-dcnode-id="2281" instrument_node="">Heterosexual Life-Partners</span></a><span data-dcnode-id="2279" instrument_node="">: Gary and Wyatt are almost always together, yet are always after girls.</span></li><li data-dcnode-id="2273"><span data-dcnode-id="2277" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodDateless" title="/pmwiki/pmwiki.php/Main/HollywoodDateless"><span data-dcnode-id="2276" instrument_node="">Hollywood Dateless</span></a><span data-dcnode-id="2274" instrument_node="">: Averted. Early on, Wyatt was too timid to ask girls out and Gary often stuck his foot in his mouth. Over time, the conflict was involved complaining about not getting a date with a particular girl instead of not getting one in general.</span></li><li data-dcnode-id="2268"><span data-dcnode-id="2272" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HonorBeforeReason" title="/pmwiki/pmwiki.php/Main/HonorBeforeReason"><span data-dcnode-id="2271" instrument_node="">Honor Before Reason</span></a><span data-dcnode-id="2269" instrument_node="">: In "Rock Hard Chett", Chett uses his new invulnerability to become a superhero. When the wish wears off, he gets shot during a bank heist, and though Lisa manages to bring him back to life, it leaves her unconscious and unable to help any further. Wyatt suggests just walking away, but Chett goes back in to save the day despite losing his powers. (He manages to talk the robbers down by convincing them their guns have already failed to stop him.)</span></li><li data-dcnode-id="2263"><span data-dcnode-id="2267" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HypocriticalHeartwarming" title="/pmwiki/pmwiki.php/Main/HypocriticalHeartwarming"><span data-dcnode-id="2266" instrument_node="">Hypocritical Heartwarming</span></a><span data-dcnode-id="2264" instrument_node="">: Chett has these moments with Wyatt and less often Gary.</span></li><li data-dcnode-id="2238"><span data-dcnode-id="2262" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HypocriticalHumor" title="/pmwiki/pmwiki.php/Main/HypocriticalHumor"><span data-dcnode-id="2261" instrument_node="">Hypocritical Humor</span></a><span data-dcnode-id="2259" instrument_node="">:</span><ul data-dcnode-id="2256"><li data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node=""> In "Genie Junior", Wyatt chastises Lisa for willingly kissing Chett and calls the guy the most immature person he knows.</span></li></ul><div class="indent" data-dcnode-id="2242"><strong data-dcnode-id="2254"><span data-dcnode-id="2255" instrument_node="">Gary:</span></strong><span data-dcnode-id="2253" instrument_node=""> </span><em data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">[having jammed two large fries under his upper lip]</span></em><span data-dcnode-id="2250" instrument_node=""> Rah, I am Walrus Man! </span><br data-dcnode-id="2249"><strong data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="2246" instrument_node=""> </span><em data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">[to Lisa]</span></em><span data-dcnode-id="2243" instrument_node=""> I stand by my statement.</span></div><ul data-dcnode-id="2239"><li data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node=""> In "The Feminine Mistake" when Gary and Wyatt are lamenting their inability to ask girls out, Lisa insists they should just do it and that women weren't unapproachable, and are just waiting for guys to ask them out. This is immediately followed by a guy coming up and politely attempting to ask Lisa out, only for her to shut him down halfway through.</span></li></ul></li></ul></div><p data-dcnode-id="2235"></p><div class="folderlabel" data-dcnode-id="2233" onclick="togglefolder('folder5');"><span data-dcnode-id="2234" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;I-L&nbsp;</span></div><div class="folder" data-dcnode-id="2116" id="folder5" isfolder="true" style="display:block;"><ul data-dcnode-id="2117"><li data-dcnode-id="2228"><span data-dcnode-id="2232" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IdenticalGrandson" title="/pmwiki/pmwiki.php/Main/IdenticalGrandson"><span data-dcnode-id="2231" instrument_node="">Identical Grandson</span></a><span data-dcnode-id="2229" instrument_node="">: In "The Legend of Red Brick Wallace", Gary's great-great-grandfather Red Brick Wallace looks exactly like his father Al. In the same episode, Wyatt and Chett's ancestor Sheriff Donnelly looks exactly like Chett, only with a moustache.</span></li><li data-dcnode-id="2220"><span data-dcnode-id="2227" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IJustWantToBeYou" title="/pmwiki/pmwiki.php/Main/IJustWantToBeYou"><span data-dcnode-id="2226" instrument_node="">I Just Want to Be You!</span></a><span data-dcnode-id="2224" instrument_node="">: What helps get the </span><a class="twikilink" data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreakyFridayFlip" title="/pmwiki/pmwiki.php/Main/FreakyFridayFlip"><span data-dcnode-id="2223" instrument_node="">"Freaky Friday" Flip</span></a><span data-dcnode-id="2221" instrument_node=""> in "Switched at Birth" going. After his parents again bail on him, Wyatt says Gary is lucky to have parents who are always around and want to do family activities. Gary, however, is annoyed by how his parents never leave him alone and wouldn't mind having absentee folks that shower a kid with money and gifts.</span></li><li data-dcnode-id="2211"><span data-dcnode-id="2219" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IKnowMortalKombat" title="/pmwiki/pmwiki.php/Main/IKnowMortalKombat"><span data-dcnode-id="2218" instrument_node="">I Know Mortal Kombat</span></a><span data-dcnode-id="2216" instrument_node="">: "Quantum Wyatt" has Wyatt and Lisa pretending to be brain surgeons who perform an operation on Gary and Wyatt's principal. Afterward, Wyatt says that he didn't know Lisa knew how to perform brain surgery, and Lisa says she didn't, but that she saw it performed on last night's </span><em data-dcnode-id="2213"><a class="twikilink" data-dcnode-id="2214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ER" title="/pmwiki/pmwiki.php/Series/ER"><span data-dcnode-id="2215" instrument_node="">ER</span></a></em><span data-dcnode-id="2212" instrument_node="">.</span></li><li data-dcnode-id="2206"><span data-dcnode-id="2210" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InstantlyProvenWrong" title="/pmwiki/pmwiki.php/Main/InstantlyProvenWrong"><span data-dcnode-id="2209" instrument_node="">Instantly Proven Wrong</span></a><span data-dcnode-id="2207" instrument_node="">: At the neighborhood block party in "Bee in There", Wyatt blames his father for his inability to throw a baseball. Gary likes the idea of blaming the parents for his own failings—calling Al a cold, distant man. We then immediately see Al has been entertaining the neighborhood children and clearly enjoying himself.</span></li><li data-dcnode-id="2201"><span data-dcnode-id="2205" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAWonderfulPlot" title="/pmwiki/pmwiki.php/Main/ItsAWonderfulPlot"><span data-dcnode-id="2204" instrument_node="">It's a Wonderful Plot</span></a><span data-dcnode-id="2202" instrument_node="">: Double subverted in "It's a Wonderful Life...Without You" when Wyatt and Lisa see a world where the former was never born. A world without Wyatt seems perfect, as Chett is a straight A overachiever, while Gary is the most popular guy in school and has a steady girlfriend. However, without Wyatt around, the parents have put so much pressure on Chett that he hates his life and is about ready to crack, while Gary was so desperate for popularity that he resorted to chronic lying and stealing.</span></li><li data-dcnode-id="2183"><span data-dcnode-id="2200" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackassGenie" title="/pmwiki/pmwiki.php/Main/JackassGenie"><span data-dcnode-id="2199" instrument_node="">Jackass Genie</span></a><span data-dcnode-id="2197" instrument_node="">:</span><ul data-dcnode-id="2184"><li data-dcnode-id="2192"><span data-dcnode-id="2196" instrument_node=""> </span><em data-dcnode-id="2194"><span data-dcnode-id="2195" instrument_node="">Not</span></em><span data-dcnode-id="2193" instrument_node=""> Lisa (usually), but her powers seem to do this to her as well without her wanting it by making wishes come true with unnecessary caveats and in ways that cause all kinds of trouble/plot. As one of the guys once puts it, "Your magic sucks."</span></li><li data-dcnode-id="2187"><span data-dcnode-id="2191" instrument_node=""> Gene the Genie, played by </span><a class="twikilink" data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/BruceCampbell" title="/pmwiki/pmwiki.php/Creator/BruceCampbell"><span data-dcnode-id="2190" instrument_node="">Bruce Campbell</span></a><span data-dcnode-id="2188" instrument_node="">.</span></li><li data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node=""> Invoked in "Master Chett", where Lisa cons Chett into making three wishes and purposefully does a bad job in order to get him to stop bothering her.</span></li></ul></li><li data-dcnode-id="2175"><span data-dcnode-id="2182" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JailBaitWait" title="/pmwiki/pmwiki.php/Main/JailBaitWait"><span data-dcnode-id="2181" instrument_node="">Jail Bait Wait</span></a><span data-dcnode-id="2179" instrument_node="">: Inverted. In the very first episode, Lisa </span><a class="twikilink" data-dcnode-id="2177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AllMenArePerverts" title="/pmwiki/pmwiki.php/Main/AllMenArePerverts"><span data-dcnode-id="2178" instrument_node="">quickly deduces what the boys' first wish will be,</span></a><span data-dcnode-id="2176" instrument_node=""> and tells them her ethical programming wont let her do that until they are of legal age.</span></li><li data-dcnode-id="2164"><span data-dcnode-id="2174" instrument_node=""
