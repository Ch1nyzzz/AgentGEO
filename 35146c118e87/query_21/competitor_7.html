 data-dcnode-id="1437" instrument_node="">This Is Gonna Suck</span></a><span data-dcnode-id="1435" instrument_node="">: In "Teen Lisa", Lisa (disguised as a </span><img class="ymmv1 rounded" data-dcnode-id="1434" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodHomely" title="/pmwiki/pmwiki.php/Main/HollywoodHomely"><span data-dcnode-id="1433" instrument_node="">Hollywood Homely</span></a><span data-dcnode-id="1431" instrument_node=""> teenager) suffers a lot of misfortune at school before being asked out by one of the popular guys. Gary and Wyatt are initially confused and worried, but just as they think this is all on the up and up, they overhear the </span><a class="twikilink" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AlphaBitch" title="/pmwiki/pmwiki.php/Main/AlphaBitch"><span data-dcnode-id="1430" instrument_node="">Alpha Bitch</span></a><span data-dcnode-id="1428" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BetaBitch" title="/pmwiki/pmwiki.php/Main/BetaBitch"><span data-dcnode-id="1427" instrument_node="">Beta Bitch</span></a><span data-dcnode-id="1425" instrument_node=""> talk about how "happy" they are for Lisa.</span><div class="indent" data-dcnode-id="1421"><strong data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">Gary:</span></strong><span data-dcnode-id="1422" instrument_node=""> Something's horribly wrong.</span></div></li><li data-dcnode-id="1415"><span data-dcnode-id="1419" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThoseTwoGuys" title="/pmwiki/pmwiki.php/Main/ThoseTwoGuys"><span data-dcnode-id="1418" instrument_node="">Those Two Guys</span></a><span data-dcnode-id="1416" instrument_node="">: Matthew and Roger, seemingly the only friends that Gary and Wyatt have except for each other and Lisa.</span></li><li data-dcnode-id="1395"><span data-dcnode-id="1414" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TimeTravelersAreSpies" title="/pmwiki/pmwiki.php/Main/TimeTravelersAreSpies"><span data-dcnode-id="1413" instrument_node="">Time-Travelers Are Spies</span></a><span data-dcnode-id="1411" instrument_node="">: In "By the Time We Got to Woodstock", Gary, Wyatt and Chett are mistaken for spies when they visit </span><a class="twikilink" data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/ThePentagon" title="/pmwiki/pmwiki.php/UsefulNotes/ThePentagon"><span data-dcnode-id="1410" instrument_node="">The Pentagon</span></a><span data-dcnode-id="1408" instrument_node=""> in 1969 as Chett reveals that he knows about the US Army secretly bombing </span><a class="twikilink" data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/Cambodia" title="/pmwiki/pmwiki.php/UsefulNotes/Cambodia"><span data-dcnode-id="1407" instrument_node="">Cambodia</span></a><span data-dcnode-id="1405" instrument_node="">, </span><a class="twikilink" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/RichardNixon" title="/pmwiki/pmwiki.php/UsefulNotes/RichardNixon"><span data-dcnode-id="1404" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="1402" instrument_node=""> taping conversations in the Oval Office, J. Edgar Hoover being a crossdresser and the exploding cigars that the </span><a class="twikilink" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/CIA" title="/pmwiki/pmwiki.php/UsefulNotes/CIA"><span data-dcnode-id="1401" instrument_node="">CIA</span></a><span data-dcnode-id="1399" instrument_node=""> sent to </span><a class="twikilink" data-dcnode-id="1397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/FidelCastro" title="/pmwiki/pmwiki.php/UsefulNotes/FidelCastro"><span data-dcnode-id="1398" instrument_node="">Fidel Castro</span></a><span data-dcnode-id="1396" instrument_node="">.</span></li><li data-dcnode-id="1386"><span data-dcnode-id="1394" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TitleDrop" title="/pmwiki/pmwiki.php/Main/TitleDrop"><span data-dcnode-id="1393" instrument_node="">Title Drop</span></a><span data-dcnode-id="1391" instrument_node="">: During "Grampira", after realizing the effects the wish will have on everyone.</span><div class="indent" data-dcnode-id="1387"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">Gary:</span></strong><span data-dcnode-id="1388" instrument_node=""> Grampira must be stopped!</span></div></li><li data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ToplessnessFromTheBack" title="/pmwiki/pmwiki.php/Main/ToplessnessFromTheBack"><span data-dcnode-id="1384" instrument_node="">Toplessness from the Back</span></a><span data-dcnode-id="1382" instrument_node="">: The girls in the co-ed shower room in "Strange Daze" are seen in this fashion.</span></li><li data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TrueCompanions" title="/pmwiki/pmwiki.php/Main/TrueCompanions"><span data-dcnode-id="1379" instrument_node="">True Companions</span></a><span data-dcnode-id="1377" instrument_node="">: Wyatt, Gary, and Lisa. Chett is begrudgingly included after he learns the big secret.</span></li><li data-dcnode-id="1363"><span data-dcnode-id="1375" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TurnedAgainstTheirMasters" title="/pmwiki/pmwiki.php/Main/TurnedAgainstTheirMasters"><span data-dcnode-id="1374" instrument_node="">Turned Against Their Masters</span></a><span data-dcnode-id="1372" instrument_node="">:</span><ul data-dcnode-id="1364"><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node=""> After Lisa brings a video game villain to life, it promptly kidnaps her; Gary and Wyatt must fight for her release.</span></li><li data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node=""> Lisa herself fits this at times. In several episodes (such as the above example), she </span><a class="twikilink" data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JackassGenie" title="/pmwiki/pmwiki.php/Main/JackassGenie"><span data-dcnode-id="1368" instrument_node="">purposefully misinterprets the boys' wishes</span></a><span data-dcnode-id="1366" instrument_node=""> to teach them a lesson.</span></li></ul></li></ul><ul data-dcnode-id="1337"><li data-dcnode-id="1348"><span data-dcnode-id="1360" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TheUnreveal" title="/pmwiki/pmwiki.php/Main/TheUnreveal"><span data-dcnode-id="1359" instrument_node="">The Unreveal</span></a><span data-dcnode-id="1357" instrument_node="">:</span><div class="indent" data-dcnode-id="1349"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Lisa:</span></strong><span data-dcnode-id="1354" instrument_node=""> Did Wyatt and Gary make me, or did the universe make me for them? </span><br data-dcnode-id="1353"><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">Genie Master:</span></strong><span data-dcnode-id="1350" instrument_node=""> Sent by the universe to help the boys you were. All that you are, created they did.</span></div></li><li data-dcnode-id="1343"><span data-dcnode-id="1347" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VampiricDraining" title="/pmwiki/pmwiki.php/Main/VampiricDraining"><span data-dcnode-id="1346" instrument_node="">Vampiric Draining</span></a><span data-dcnode-id="1344" instrument_node="">: When Wyatt wishes for his Nana to have the energy of a teenager in "Grampira", Lisa inadvertently gives her this ability: when Nana touches a young person, she drains the youthfulness out of them, making teens act old while she gets progressively more and more energetic and excited.</span></li><li data-dcnode-id="1338"><span data-dcnode-id="1342" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/VillainDecay" title="/pmwiki/pmwiki.php/Main/VillainDecay"><span data-dcnode-id="1341" instrument_node="">Villain Decay</span></a><span data-dcnode-id="1339" instrument_node="">: The Steves were always comical, but in their first appearance, they were a true threat—effortlessly capturing the protagonists and being poised to destroy Earth. In their second appearance, they were instead quite hapless and pathetic.</span></li></ul></div><p data-dcnode-id="1335"></p><div class="folderlabel" data-dcnode-id="1333" onclick="togglefolder('folder11');"><span data-dcnode-id="1334" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;W-Z&nbsp;</span></div><div class="folder" data-dcnode-id="1156" id="folder11" isfolder="true" style="display:block;"><ul data-dcnode-id="1157"><li data-dcnode-id="1322"><span data-dcnode-id="1332" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeirdScience" title="/pmwiki/pmwiki.php/Main/WeirdScience"><span data-dcnode-id="1331" instrument_node="">Weird Science</span></a><span data-dcnode-id="1329" instrument_node="">: Like the film, this is the premise of the series and thus what named it (making it another </span><a class="twikilink" data-dcnode-id="1327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InvertedTrope" title="/pmwiki/pmwiki.php/Main/InvertedTrope"><span data-dcnode-id="1328" instrument_node="">inversion</span></a><span data-dcnode-id="1326" instrument_node=""> of the </span><a class="twikilink" data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TropeNamer" title="/pmwiki/pmwiki.php/Main/TropeNamer"><span data-dcnode-id="1325" instrument_node="">Trope Namer</span></a><span data-dcnode-id="1323" instrument_node="">).</span></li><li data-dcnode-id="1317"><span data-dcnode-id="1321" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WeirdnessCensor" title="/pmwiki/pmwiki.php/Main/WeirdnessCensor"><span data-dcnode-id="1320" instrument_node="">Weirdness Censor</span></a><span data-dcnode-id="1318" instrument_node="">: In "Sex Ed", Lisa takes over Farber's health class and openly performs magic in front of the class. To get around the problems of that, she zaps the other students and tells them that nothing they see in the class for the next week will seem out of the ordinary.</span></li><li data-dcnode-id="1312"><span data-dcnode-id="1316" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamEpisode" title="/pmwiki/pmwiki.php/Main/WhamEpisode"><span data-dcnode-id="1315" instrument_node="">Wham Episode</span></a><span data-dcnode-id="1313" instrument_node="">: "Master Chett", where Chett has developed immunity to memory wipes and learns about Lisa permanently.</span></li><li data-dcnode-id="1303"><span data-dcnode-id="1311" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhamLine" title="/pmwiki/pmwiki.php/Main/WhamLine"><span data-dcnode-id="1310" instrument_node="">Wham Line</span></a><span data-dcnode-id="1308" instrument_node="">: After Wyatt drops his grandmother off at the home, she encourages him to visit more often and to bring Lisa.</span><div class="indent" data-dcnode-id="1304"><span data-dcnode-id="1307" instrument_node="">"But tell her to leave her magic at home. I don't need it." </span><em data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">[smiles]</span></em></div></li><li data-dcnode-id="1295"><span data-dcnode-id="1302" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse" title="/pmwiki/pmwiki.php/Main/WhatHappenedToTheMouse"><span data-dcnode-id="1301" instrument_node="">What Happened to the Mouse?</span></a><span data-dcnode-id="1299" instrument_node="">: Some episodes ended with Wyatt or Gary actually getting/impressing girls, </span><a class="twikilink" data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StatusQuoIsGod" title="/pmwiki/pmwiki.php/Main/StatusQuoIsGod"><span data-dcnode-id="1298" instrument_node="">only for them to be single the very next episode</span></a><span data-dcnode-id="1296" instrument_node="">.</span></li><li data-dcnode-id="1290"><span data-dcnode-id="1294" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhenYouComingHomeDad" title="/pmwiki/pmwiki.php/Main/WhenYouComingHomeDad"><span data-dcnode-id="1293" instrument_node="">When You Coming Home, Dad?</span></a><span data-dcnode-id="1291" instrument_node="">: As explored in several episodes such as "Switched at Birth" and "It's a Mob, Mob, Mob, Mob World", Wyatt's parents Wayne and Marcia are too wrapped up in their own lives (work for him, various voluntary organizations for her) to pay him much attention.</span></li><li data-dcnode-id="1285"><span data-dcnode-id="1289" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WhoWritesThisCrap" title="/pmwiki/pmwiki.php/Main/WhoWritesThisCrap"><span data-dcnode-id="1288" instrument_node="">Who Writes This Crap?!</span></a><span data-dcnode-id="1286" instrument_node="">: In "What Genie?", Lisa is genie-napped and the boys lose all memory of her. Wyatt, reviewing past entries of his journal, finds references to her. He lists the plots of a few past episodes to Gary and exclaims: "Who could come up with this stuff?" Gary remarks: "Oh, please, a 4-year-old could come up with this stuff."</span></li><li data-dcnode-id="1278"><span data-dcnode-id="1284" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholeEpisodeFlashback" title="/pmwiki/pmwiki.php/Main/WholeEpisodeFlashback"><span data-dcnode-id="1283" instrument_node="">Whole Episode Flashback</span></a><span data-dcnode-id="1281" instrument_node="">: "Chett World" turns out to be one: the episode opens with Chett running down the street screaming for help, then telling his story to a mysterious shadowy figure. </span><span class="spoiler" data-dcnode-id="1279" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1280" instrument_node=""> Turns out it's his dad, and Chett's explaining why he should be let back into the house.</span></span></li><li data-dcnode-id="1207"><span data-dcnode-id="1277" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholePlotReference" title="/pmwiki/pmwiki.php/Main/WholePlotReference"><span data-dcnode-id="1276" instrument_node="">Whole Plot Reference</span></a><span data-dcnode-id="1274" instrument_node="">: Several episodes take the premise of existing shows.</span><ul data-dcnode-id="1208"><li data-dcnode-id="1268"><span data-dcnode-id="1273" instrument_node=""> In "Sci-Fi Zoned", when the boys were fighting, Lisa zaps them into a world based on their favorite show, </span><em data-dcnode-id="1270"><a class="twikilink" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/TheTwilightZone1959" title="/pmwiki/pmwiki.php/Series/TheTwilightZone1959"><span data-dcnode-id="1272" instrument_node="">The Sci-Fi Zone</span></a></em><span data-dcnode-id="1269" instrument_node="">.</span></li><li data-dcnode-id="1262"><span data-dcnode-id="1267" instrument_node=""> In "Quantum Wyatt", Lisa helps Wyatt figure out possible careers by spoofing </span><em data-dcnode-id="1264"><a class="twikilink" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/QuantumLeap" title="/pmwiki/pmwiki.php/Series/QuantumLeap"><span data-dcnode-id="1266" instrument_node="">Quantum Leap</span></a></em><span data-dcnode-id="1263" instrument_node="">.</span></li><li data-dcnode-id="1252"><span data-dcnode-id="1261" instrument_node=""> "Searching for Boris Karloff" to Universal's </span><em data-dcnode-id="1258"><a class="twikilink" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Frankenstein1931" title="/pmwiki/pmwiki.php/Film/Frankenstein1931"><span data-dcnode-id="1260" instrument_node="">Frankenstein (1931)</span></a></em><span data-dcnode-id="1257" instrument_node=""> and </span><em data-dcnode-id="1254"><a class="twikilink" data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BrideOfFrankenstein" title="/pmwiki/pmwiki.php/Film/BrideOfFrankenstein"><span data-dcnode-id="1256" instrument_node="">Bride of Frankenstein</span></a></em><span data-dcnode-id="1253" instrument_node="">.</span></li><li data-dcnode-id="1246"><span data-dcnode-id="1251" instrument_node=""> "Wicked Wish" to </span><em data-dcnode-id="1248"><a class="twikilink" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/SnowWhiteAndTheSevenDwarfs" title="/pmwiki/pmwiki.php/WesternAnimation/SnowWhiteAndTheSevenDwarfs"><span data-dcnode-id="1250" instrument_node="">Snow White and the Seven Dwarfs</span></a></em><span data-dcnode-id="1247" instrument_node="">. Gary lampshades it at one point.</span></li><li data-dcnode-id="1236"><span data-dcnode-id="1245" instrument_node=""> "Stalag 16" is mostly </span><em data-dcnode-id="1242"><a class="twikilink" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Stalag17" title="/pmwiki/pmwiki.php/Film/Stalag17"><span data-dcnode-id="1244" instrument_node="">Stalag 17</span></a></em><span data-dcnode-id="1241" instrument_node=""> with a little </span><em data-dcnode-id="1238"><a class="twikilink" data-dcnode-id="1239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/HogansHeroes" title="/pmwiki/pmwiki.php/Series/HogansHeroes"><span data-dcnode-id="1240" instrument_node="">Hogan's Heroes</span></a></em><span data-dcnode-id="1237" instrument_node=""> thrown in.</span></li><li data-dcnode-id="1230"><span data-dcnode-id="1235" instrument_node=""> "Chett's World" to </span><em data-dcnode-id="1232"><a class="twikilink" data-dcnode-id="1233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/InvasionOfTheBodySnatchers1956" title="/pmwiki/pmwiki.php/Film/InvasionOfTheBodySnatchers1956"><span data-dcnode-id="1234" instrument_node="">Invasion of the Body Snatchers (1956)</span></a></em><span data-dcnode-id="1231" instrument_node="">, complete with Chett running through the streets and telling his story in flashback. However, instead of aliens, the threat is mind-altering beef jerky that makes everyone act like Chett.</span></li><li data-dcnode-id="1218"><span data-dcnode-id="1229" instrument_node=""> "Show Chett" is one to </span><em data-dcnode-id="1226"><a class="twikilink" data-dcnode-id="1227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Showgirls" title="/pmwiki/pmwiki.php/Film/Showgirls"><span data-dcnode-id="1228" instrument_node="">Showgirls</span></a></em><span data-dcnode-id="1225" instrument_node="">. Lisa forces Chett to be a stripper to teach him a lesson about objectifying women, but he actually likes it and tries to make it to the top.</span><div class="indent" data-dcnode-id="1219"><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Gary:</span></strong><span data-dcnode-id="1222" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="1221" instrument_node="">If he licks the pole, I'm gonna hurl.</span></a></div></li><li data-dcnode-id="1209"><span data-dcnode-id="1217" instrument_node=""> The </span><a class="twikilink" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SeriesFinale" title="/pmwiki/pmwiki.php/Main/SeriesFinale"><span data-dcnode-id="1216" instrument_node="">Series Finale</span></a><span data-dcnode-id="1214" instrument_node=""> "WS4" is one to </span><em data-dcnode-id="1211"><a class="twikilink" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/IndependenceDay" title="/pmwiki/pmwiki.php/Film/IndependenceDay"><span data-dcnode-id="1213" instrument_node="">Independence Day</span></a></em><span data-dcnode-id="1210" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1200"><span data-dcnode-id="1206" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WillTheyOrWontThey" title="/pmwiki/pmwiki.php/Main/WillTheyOrWontThey"><span data-dcnode-id="1205" instrument_node="">Will They or Won't They?</span></a><span data-dcnode-id="1203" instrument_node="">: Chett and Lisa in the final season. </span><span class="spoiler" data-dcnode-id="1201" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1202" instrument_node="">They don't.</span></span></li><li data-dcnode-id="1195"><span data-dcnode-id="1199" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WithFriendsLikeThese" title="/pmwiki/pmwiki.php/Main/WithFriendsLikeThese"><span data-dcnode-id="1198" instrument_node="">With Friends Like These...</span></a><span data-dcnode-id="1196" instrument_node="">: Chett's friends can be just as obnoxious to him as he is to others. "Man's Best Friend" even opens with them abandoning Chett in the woods and forcing him to walk back home.</span></li><li data-dcnode-id="1183"><span data-dcnode-id="1194" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WireDilemma" title="/pmwiki/pmwiki.php/Main/WireDilemma"><span data-dcnode-id="1193" instrument_node="">Wire Dilemma</span></a><span data-dcnode-id="1191" instrument_node="">: Parodied. Gary and Wyatt, </span><a class="twikilink" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TaughtByTelevision" title="/pmwiki/pmwiki.php/Main/TaughtByTelevision"><span data-dcnode-id="1190" instrument_node="">based on what they've seen in movies</span></a><span data-dcnode-id="1188" instrument_node="">, hesitate whether the red wire will stop the bomb or is a decoy that'll detonate it. Lisa grabs the whole bundle of wires and yanks them all out at once.</span><div class="indent" data-dcnode-id="1184"><strong data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Lisa:</span></strong><span data-dcnode-id="1185" instrument_node=""> You guys watch too many movies.</span></div></li><li data-dcnode-id="1178"><span data-dcnode-id="1182" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WondrousLadiesRoom" title="/pmwiki/pmwiki.php/Main/WondrousLadiesRoom"><span data-dcnode-id="1181" instrument_node="">Wondrous Ladies Room</span></a><span data-dcnode-id="1179" instrument_node="">: After entering the ladies room, a virus-afflicted Lisa zaps herself into a soap opera set in a seaport town. Trying to find her, Chett enters the ladies room and arrives in the soap opera, too. Observing his spacious and beautiful surroundings, Chett remarked that this why women spend so much time in the ladies room.</span></li><li data-dcnode-id="1158"><span data-dcnode-id="1177" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WrittenInAbsence" title="/pmwiki/pmwiki.php/Main/WrittenInAbsence"><span data-dcnode-id="1176" instrument_node="">Written-In Absence</span></a><span data-dcnode-id="1174" instrument_node="">:</span><ul data-dcnode-id="1159"><li data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node=""> </span><a class="createlink" data-dcnode-id="1171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JohnMallory" title="/pmwiki/pmwiki.php/Creator/JohnMallory"><span data-dcnode-id="1172" instrument_node="">John Mallory</span></a><span data-dcnode-id="1170" instrument_node=""> Asher doesn't appear in "Phantom Scampi". (Point of fact, it's the only one he missed.) Gary is said to have wished for shrinking pills, leading to a brief scene of a pile of clothes and some low-level squeaking.</span></li><li data-dcnode-id="1160"><span data-dcnode-id="1168" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/VanessaAngel" title="/pmwiki/pmwiki.php/Creator/VanessaAngel"><span data-dcnode-id="1167" instrument_node="">Vanessa Angel</span></a><span data-dcnode-id="1165" instrument_node=""> was unavailable for some episodes while she was shooting the movie </span><em data-dcnode-id="1162"><a class="twikilink" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Kingpin" title="/pmwiki/pmwiki.php/Film/Kingpin"><span data-dcnode-id="1164" instrument_node="">Kingpin</span></a></em><span data-dcnode-id="1161" instrument_node="">, so the writers wrote in various excuses for why Lisa has only one scene, including a computer hacking incident that makes her look like Abe Vigoda.</span></li></ul></li></ul></div><hr data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
