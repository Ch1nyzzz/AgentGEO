> </span><a class="twikilink" data-dcnode-id="2172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold" title="/pmwiki/pmwiki.php/Main/JerkWithAHeartOfGold"><span data-dcnode-id="2173" instrument_node="">Jerk with a Heart of Gold</span></a><span data-dcnode-id="2171" instrument_node="">: Chett. While generally a </span><a class="twikilink" data-dcnode-id="2169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Jerkass" title="/pmwiki/pmwiki.php/Main/Jerkass"><span data-dcnode-id="2170" instrument_node="">Jerkass</span></a><span data-dcnode-id="2168" instrument_node=""> to Wyatt and Gary and often brazenly hitting on Lisa, Chett would demonstrate genuine concern and affection for Lisa. He also showed genuine care </span><a class="twikilink" data-dcnode-id="2166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PetTheDog" title="/pmwiki/pmwiki.php/Main/PetTheDog"><span data-dcnode-id="2167" instrument_node="">for a pet dog</span></a><span data-dcnode-id="2165" instrument_node=""> he had for an episode.</span></li><li data-dcnode-id="2155"><span data-dcnode-id="2163" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LastMinuteHookup" title="/pmwiki/pmwiki.php/Main/LastMinuteHookup"><span data-dcnode-id="2162" instrument_node="">Last-Minute Hookup</span></a><span data-dcnode-id="2160" instrument_node="">: "WS4" reveals that Lisa and </span><em data-dcnode-id="2157"><span class="spoiler" data-dcnode-id="2158" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="2159" instrument_node="">Wyatt</span></span></em><span data-dcnode-id="2156" instrument_node=""> had been secretly dating for some time. Course, they actually break-up before the episode is over.</span></li><li data-dcnode-id="2145"><span data-dcnode-id="2154" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LightningCanDoAnything" title="/pmwiki/pmwiki.php/Main/LightningCanDoAnything"><span data-dcnode-id="2153" instrument_node="">Lightning Can Do Anything</span></a><span data-dcnode-id="2151" instrument_node="">:</span><ul data-dcnode-id="2146"><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node=""> How Lisa was created.</span></li><li data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node=""> This is the cover story the guys give Chett in "Rock Hard Chett" to explain his sudden invulnerability. When the wish wears off, Wyatt then tries to tell him, "The lightning wore off!"</span></li></ul></li><li data-dcnode-id="2134"><span data-dcnode-id="2144" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralGenie" title="/pmwiki/pmwiki.php/Main/LiteralGenie"><span data-dcnode-id="2143" instrument_node="">Literal Genie</span></a><span data-dcnode-id="2141" instrument_node="">: In "Cyrano De Brainac", Gary wishes for the brain of </span><a class="twikilink" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/AlbertEinstein" title="/pmwiki/pmwiki.php/UsefulNotes/AlbertEinstein"><span data-dcnode-id="2140" instrument_node="">Albert Einstein</span></a><span data-dcnode-id="2138" instrument_node="">, so Lisa zaps up Einstein's </span><a class="twikilink" data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BrainInAJar" title="/pmwiki/pmwiki.php/Main/BrainInAJar"><span data-dcnode-id="2137" instrument_node="">Brain in a Jar</span></a><span data-dcnode-id="2135" instrument_node="">. Note this was after he tried to be very careful with his wording to avoid a mishap like his head being replaced by Einstein's.</span></li><li data-dcnode-id="2123"><span data-dcnode-id="2133" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LiteralSplitPersonality" title="/pmwiki/pmwiki.php/Main/LiteralSplitPersonality"><span data-dcnode-id="2132" instrument_node="">Literal Split Personality</span></a><span data-dcnode-id="2130" instrument_node="">: In "A Tale of Two Lisas", Gary wants Lisa to take him to </span><a class="twikilink" data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItsAlwaysMardiGrasInNewOrleans" title="/pmwiki/pmwiki.php/Main/ItsAlwaysMardiGrasInNewOrleans"><span data-dcnode-id="2129" instrument_node="">Mardi Gras</span></a><span data-dcnode-id="2127" instrument_node=""> and Wyatt wants her to help him study for his biology test the next day. As she was programmed to please both of them, Lisa cannot choose between them and she splits into two. Gary's Lisa is wild and impulsive while Wyatt's Lisa is reliable and responsible. Both boys are initially happy with their respective Lisas but it turns out that things have </span><a class="twikilink" data-dcnode-id="2125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GoneHorriblyRight" title="/pmwiki/pmwiki.php/Main/GoneHorriblyRight"><span data-dcnode-id="2126" instrument_node="">Gone Horribly Right</span></a><span data-dcnode-id="2124" instrument_node="">: Gary's Lisa is so impulsive that she is uncontrollable and Wyatt's Lisa is so responsible that she won't allow him to have any fun. As such, each Lisa possesses an exaggerated version of the relevant boy's personality. Gary's Lisa also has a more pronounced version of the normal Lisa's mean streak, turning first Gary and then Wyatt into trolls. The two Lisa recombine when Gary and Wyatt patch up their friendship.</span></li><li data-dcnode-id="2118"><span data-dcnode-id="2122" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LocalHangout" title="/pmwiki/pmwiki.php/Main/LocalHangout"><span data-dcnode-id="2121" instrument_node="">Local Hangout</span></a><span data-dcnode-id="2119" instrument_node="">: The Java Man coffee shop.</span></li></ul></div><p data-dcnode-id="2115"></p><div class="folderlabel" data-dcnode-id="2113" onclick="togglefolder('folder6');"><span data-dcnode-id="2114" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;M&nbsp;</span></div><div class="folder" data-dcnode-id="1989" id="folder6" isfolder="true" style="display:block;"><ul data-dcnode-id="1990"><li data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MayflyDecemberRomance" title="/pmwiki/pmwiki.php/Main/MayflyDecemberRomance"><span data-dcnode-id="2111" instrument_node="">Mayfly–December Romance</span></a><span data-dcnode-id="2109" instrument_node="">: Wyatt falls in love with a robot, but she dumps him when she finds out he's human. She loves him but doesn't want to get involved with someone who's going to grow old and die someday.</span></li><li data-dcnode-id="2100"><span data-dcnode-id="2107" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MadLibsCatchPhrase" title="/pmwiki/pmwiki.php/Main/MadLibsCatchPhrase"><span data-dcnode-id="2106" instrument_node="">Mad Libs Catch Phrase</span></a><span data-dcnode-id="2104" instrument_node="">: "Oh, man! Dumped by a ______!" Usually said by Wyatt ("Oh, man! Dumped by a robot/car/fictional character!") but also by Lisa when she experiences the ultimate humiliation: "Oh, man! Dumped by </span><a class="twikilink" data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ButtMonkey" title="/pmwiki/pmwiki.php/Main/ButtMonkey"><span data-dcnode-id="2103" instrument_node="">Gary Wallace</span></a><span data-dcnode-id="2101" instrument_node="">!"</span></li><li data-dcnode-id="2095"><span data-dcnode-id="2099" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ManIFeelLikeAWoman" title="/pmwiki/pmwiki.php/Main/ManIFeelLikeAWoman"><span data-dcnode-id="2098" instrument_node="">Man, I Feel Like a Woman</span></a><span data-dcnode-id="2096" instrument_node="">: Averted in "The Feminine Mistake" when Lisa seemingly turns Gary and Wyatt into girls. Everyone else sees their feminine forms, but it's just an optical illusion. While they can see the female reflections in the mirror, Gary is quite disappointed to be unable to feel the supposed breasts.</span></li><li data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MemoryWipeExploitation" title="/pmwiki/pmwiki.php/Main/MemoryWipeExploitation"><span data-dcnode-id="2093" instrument_node="">Memory Wipe Exploitation</span></a><span data-dcnode-id="2091" instrument_node="">: One episode of gives Gary a remote control that lets him fast forward, rewind, or pause time. Unfortunately the remote breaks and he and Wyatt get stuck in a loop. Wyatt figures it out and rushes to fix things, but before doing so the last time he takes a moment to kiss his French teacher.</span></li><li data-dcnode-id="2085"><span data-dcnode-id="2089" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MiseryBuildsCharacter" title="/pmwiki/pmwiki.php/Main/MiseryBuildsCharacter"><span data-dcnode-id="2088" instrument_node="">Misery Builds Character</span></a><span data-dcnode-id="2086" instrument_node="">: Gary's actions in "Switched at Birth" make it look like Wyatt is out of control and in need of discipline. Marcia believes the only solution is to send Wyatt to the same military school Chett was sent to.</span></li><li data-dcnode-id="2080"><span data-dcnode-id="2084" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MovingTheGoalposts" title="/pmwiki/pmwiki.php/Main/MovingTheGoalposts"><span data-dcnode-id="2083" instrument_node="">Moving the Goalposts</span></a><span data-dcnode-id="2081" instrument_node="">: In “Sex Ed” Lisa takes over teaching the boys’ sex education class. She tells the students that after they demonstrate that they’ve learnt the material, they will conclude the class by having sex. To her surprise, Gary (not normally a good student) passes the test on the material with flying colours. Lisa then decides that, before he can have sex, he also needs to pass a completely different test to get a “Sex License”.</span></li><li data-dcnode-id="2066"><span data-dcnode-id="2079" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MsFanservice" title="/pmwiki/pmwiki.php/Main/MsFanservice"><span data-dcnode-id="2078" instrument_node="">Ms. Fanservice</span></a><span data-dcnode-id="2076" instrument_node="">: Lisa, who's gorgeous and wears many </span><a class="twikilink" data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Fanservice" title="/pmwiki/pmwiki.php/Main/Fanservice"><span data-dcnode-id="2075" instrument_node="">Fanservice</span></a><span data-dcnode-id="2073" instrument_node=""> outfits through the story, at least </span><a class="twikilink" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OncePerEpisode" title="/pmwiki/pmwiki.php/Main/OncePerEpisode"><span data-dcnode-id="2072" instrument_node="">Once per Episode</span></a><span data-dcnode-id="2070" instrument_node="">. Her </span><a class="twikilink" data-dcnode-id="2068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/ComicBook/Catwoman" title="/pmwiki/pmwiki.php/ComicBook/Catwoman"><span data-dcnode-id="2069" instrument_node="">Catwoman</span></a><span data-dcnode-id="2067" instrument_node=""> outfit in "A Tale of Two Lisas" is probably the best example of that.</span></li><li data-dcnode-id="2036"><span data-dcnode-id="2065" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MundaneWish" title="/pmwiki/pmwiki.php/Main/MundaneWish"><span data-dcnode-id="2064" instrument_node="">Mundane Wish</span></a><span data-dcnode-id="2062" instrument_node="">: Despite Lisa's nearly-limitless (if temporary) powers, nearly all Gary and Wyatt's wishes are for incredibly mundane things. </span><a class="twikilink" data-dcnode-id="2060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/LampshadeHanging" title="/pmwiki/pmwiki.php/Main/LampshadeHanging"><span data-dcnode-id="2061" instrument_node="">Lampshaded</span></a><span data-dcnode-id="2059" instrument_node=""> within an inch of its life in the </span><a class="twikilink" data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="2058" instrument_node="">Grand Finale</span></a><span data-dcnode-id="2056" instrument_node=""> after Wyatt reveals Lisa's existence to the school:</span><div class="indent" data-dcnode-id="2037"><strong data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Student:</span></strong><span data-dcnode-id="2053" instrument_node=""> So how come you're not, like, the richest men in the world living on an island with Cindy Crawford and Naomi Campbell? </span><br data-dcnode-id="2052"><strong data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="2049" instrument_node=""> We, uh, never really wished for that. </span><br data-dcnode-id="2048"><strong data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Student:</span></strong><span data-dcnode-id="2045" instrument_node=""> So what did you wish for? </span><br data-dcnode-id="2044"><strong data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="2041" instrument_node=""> I </span><a class="twikilink" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ContinuityNod" title="/pmwiki/pmwiki.php/Main/ContinuityNod"><span data-dcnode-id="2040" instrument_node="">wished to be president of the chess club once</span></a><span data-dcnode-id="2038" instrument_node="">. It didn't work out.</span></div></li><li data-dcnode-id="2031"><span data-dcnode-id="2035" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MusicalEpisode" title="/pmwiki/pmwiki.php/Main/MusicalEpisode"><span data-dcnode-id="2034" instrument_node="">Musical Episode</span></a><span data-dcnode-id="2032" instrument_node="">: "Pirates!" Wyatt is cast as the lead in the school musical, but Lisa accidentally brings singing pirates to life, and they make Chett their leader. After four brief interludes, the episode ends with a lengthy musical number.</span></li><li data-dcnode-id="2023"><span data-dcnode-id="2030" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyBrainIsBig" title="/pmwiki/pmwiki.php/Main/MyBrainIsBig"><span data-dcnode-id="2029" instrument_node="">My Brain Is Big</span></a><span data-dcnode-id="2027" instrument_node="">: In "Party High, U.S.A.", Lisa initially gives Gary a huge brain so he can pass a </span><a class="twikilink" data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="2026" instrument_node="">test on the history of the bikini</span></a><span data-dcnode-id="2024" instrument_node=""> but he asks her to undo it since it would impede his efforts to score.</span></li><li data-dcnode-id="2015"><span data-dcnode-id="2022" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MyFutureSelfAndMe" title="/pmwiki/pmwiki.php/Main/MyFutureSelfAndMe"><span data-dcnode-id="2021" instrument_node="">My Future Self and Me</span></a><span data-dcnode-id="2019" instrument_node="">: In "Camp Wannabe", Gary has Lisa send him and Wyatt to Camp Hi-De-Ho in the summer of 1986 where he meets himself as an eight-year-old. When he reveals his identity to the 1986 Gary, he screams for help. The 1994 Gary is able to prove that he is telling the truth as he knows that his younger self vomited in his sock drawer and </span><a class="twikilink" data-dcnode-id="2017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ADogAteMyHomework" title="/pmwiki/pmwiki.php/Main/ADogAteMyHomework"><span data-dcnode-id="2018" instrument_node="">blamed it on the dog</span></a><span data-dcnode-id="2016" instrument_node=""> the previous summer.</span></li><li data-dcnode-id="1991"><span data-dcnode-id="2014" instrument_node=""> </span><a class="twikilink" data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/MythologyGag" title="/pmwiki/pmwiki.php/Main/MythologyGag"><span data-dcnode-id="2013" instrument_node="">Mythology Gag</span></a><span data-dcnode-id="2011" instrument_node="">:</span><ul data-dcnode-id="2005"><li data-dcnode-id="2006"><span data-dcnode-id="2010" instrument_node=""> Why is Gary so certain that they can create a woman on a computer? In a case of </span><a class="twikilink" data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/BeyondTheFourthWall" title="/pmwiki/pmwiki.php/Main/BeyondTheFourthWall"><span data-dcnode-id="2009" instrument_node="">Beyond The Fourth Wall</span></a><span data-dcnode-id="2007" instrument_node="">, he says...</span></li></ul><div class="indent" data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node="">"I saw it in a </span><a class="twikilink" data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JohnHughes" title="/pmwiki/pmwiki.php/Creator/JohnHughes"><span data-dcnode-id="2003" instrument_node="">John Hughes</span></a><span data-dcnode-id="2001" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/WeirdScience" title="/pmwiki/pmwiki.php/Film/WeirdScience"><span data-dcnode-id="2000" instrument_node="">movie</span></a><span data-dcnode-id="1998" instrument_node="">."</span></div><ul data-dcnode-id="1992"><li data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node=""> Like in the movie, it's Gary who names Lisa.</span></li><li data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node=""> In "A Tale of Two Lisas", Lisa is split into two parts and the wilder, more party-oriented Lisa ends up tranforming Gary and Wyatt in to trolls, who look like (somewhat less disgusting) versions of Chett's transformation from the film.</span></li></ul></li></ul></div><p data-dcnode-id="1988"></p><div class="folderlabel" data-dcnode-id="1986" onclick="togglefolder('folder7');"><span data-dcnode-id="1987" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;N-O&nbsp;</span></div><div class="folder" data-dcnode-id="1852" id="folder7" isfolder="true" style="display:block;"><ul data-dcnode-id="1853"><li data-dcnode-id="1974"><span data-dcnode-id="1985" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewJobEpisode" title="/pmwiki/pmwiki.php/Main/NewJobEpisode"><span data-dcnode-id="1984" instrument_node="">New Job Episode</span></a><span data-dcnode-id="1982" instrument_node="">:</span><ul data-dcnode-id="1975"><li data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node=""> "Nightmare on Chett Street" sees Chett get a job at the Java Man (which he hates) and gets fired.</span></li><li data-dcnode-id="1976"><span data-dcnode-id="1979" instrument_node=""> In "Chett's World"m he's thrown out of the house until he can find a job, so Lisa creates a store selling everything he cares about. </span><a class="twikilink" data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ItMakesSenseInContext" title="/pmwiki/pmwiki.php/Main/ItMakesSenseInContext"><span data-dcnode-id="1978" instrument_node="">(Course, that one turns into evolved mice trying to takeover the world.)</span></a></li></ul></li><li data-dcnode-id="1969"><span data-dcnode-id="1973" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NewPowersAsThePlotDemands" title="/pmwiki/pmwiki.php/Main/NewPowersAsThePlotDemands"><span data-dcnode-id="1972" instrument_node="">New Powers as the Plot Demands</span></a><span data-dcnode-id="1970" instrument_node="">: Taken to an extreme in "Rock Hard Chett" when Lisa discovers a previously-unknown power to bring Chett back to life.</span></li><li data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero" title="/pmwiki/pmwiki.php/Main/NiceJobBreakingItHero"><span data-dcnode-id="1967" instrument_node="">Nice Job Breaking It, Hero</span></a><span data-dcnode-id="1965" instrument_node="">: In "Master Chett". the guys and Lisa antagonize Chett without any on-screen justification and then openly brag about how they were able to do it with a genie. They do so because they think they can wipe his memory... only to then find out that they can't. Whoops.</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoHuggingNoKissing" title="/pmwiki/pmwiki.php/Main/NoHuggingNoKissing"><span data-dcnode-id="1962" instrument_node="">No Hugging, No Kissing</span></a><span data-dcnode-id="1960" instrument_node="">: Unlike the movie, Lisa tells the guys she won't do anything sexual with them until they're legal. While both are nonetheless attracted to her, Wyatt is too shy to broach the subject and Gary is repeatedly rejected.</span></li><li data-dcnode-id="1954"><span data-dcnode-id="1958" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOneGetsLeftBehind" title="/pmwiki/pmwiki.php/Main/NoOneGetsLeftBehind"><span data-dcnode-id="1957" instrument_node="">No One Gets Left Behind</span></a><span data-dcnode-id="1955" instrument_node="">: "Stalag 16" double subverts it in the prison camp plot. Chett is fully prepared to leave Scampi behind due to their history, but the latter later proves his worth by acting as a distraction. When the other men decide to leave Scampi behind anyway, Chett goes back for him.</span></li><li data-dcnode-id="1938"><span data-dcnode-id="1953" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoOntologicalInertia" title="/pmwiki/pmwiki.php/Main/NoOntologicalInertia"><span data-dcnode-id="1952" instrument_node="">No Ontological Inertia</span></a><span data-dcnode-id="1950" instrument_node="">:</span><ul data-dcnode-id="1939"><li data-dcnode-id="1945"><span data-dcnode-id="1949" instrument_node=""> Generally enforced. Due to limitations in Lisa's powers, wishes only last a short time and everything goes back to normal no matter what the characters experienced. (Whether or not other characters remember what was going on </span><a class="twikilink" data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/DependingOnTheWriter" title="/pmwiki/pmwiki.php/Main/DependingOnTheWriter"><span data-dcnode-id="1948" instrument_node="">depends on the given episode</span></a><span data-dcnode-id="1946" instrument_node="">.)</span></li><li data-dcnode-id="1940"><span data-dcnode-id="1944" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/FreakyFridayFlip" title="/pmwiki/pmwiki.php/Main/FreakyFridayFlip"><span data-dcnode-id="1943" instrument_node="">"Switched at Birth"</span></a><span data-dcnode-id="1941" instrument_node=""> discusses and defies the trope. Gary expected everything to just snap back to normal when the wish was over, so he went hog wild with Wyatt's parents' credit cards. However, Wyatt's computer was abruptly unplugged—cancelling the wish before it fully played out and forcing the characters to deal with the fallout of Gary's actions.</span></li></ul></li><li data-dcnode-id="1933"><span data-dcnode-id="1937" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NoirEpisode" title="/pmwiki/pmwiki.php/Main/NoirEpisode"><span data-dcnode-id="1936" instrument_node="">Noir Episode</span></a><span data-dcnode-id="1934" instrument_node="">: "The Genie Detective" plays it to the hilt. Lisa plays a VR game, where she is a detective named Legs MacGuffin. She has to figure out who poisoned a rich man (who looks like Chett) and find the cure, while the other side characters look like Wyatt, Gary, and Scampi. It turns out, though, the guy actually is Chett; he hooked into the VR game to play, too, only to learn he'll actually die from the poison if they don't solve the case.</span></li><li data-dcnode-id="1925"><span data-dcnode-id="1932" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/NotAllowedToGrowUp" title="/pmwiki/pmwiki.php/Main/NotAllowedToGrowUp"><span data-dcnode-id="1931" instrument_node="">Not Allowed to Grow Up</span></a><span data-dcnode-id="1929" instrument_node="">: Averted. Gary and Wyatt are starting their sophomore year in the first episode and are well-into their senior year by the </span><a class="twikilink" data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="1928" instrument_node="">Grand Finale</span></a><span data-dcnode-id="1926" instrument_node="">. The show did last five seasons, but its initial run was over the course of three years (barring six episodes being burned off a year later).</span></li><li data-dcnode-id="1900"><span data-dcnode-id="1924" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OhCrap" title="/pmwiki/pmwiki.php/Main/OhCrap"><span data-dcnode-id="1923" instrument_node="">Oh, Crap!</span></a><span data-dcnode-id="1921" instrument_node="">:</span><ul data-dcnode-id="1901"><li data-dcnode-id="1904"><span data-dcnode-id="1920" instrument_node=""> In "You'll Never Eat Brains in This Town Again", after Lisa realizes her zombie actors are about to turn carnivorous.</span><div class="indent" data-dcnode-id="1905"><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">Lisa:</span></strong><span data-dcnode-id="1917" instrument_node=""> Uh-oh. </span><em data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">(runs off)</span></em><span data-dcnode-id="1914" instrument_node=""> </span><br data-dcnode-id="1913"><strong data-dcnode-id="1911"><span data-dcnode-id="1912" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="1910" instrument_node=""> Before she ran out of here in a blind panic, did the all-powerful genie say "uh-oh?" </span><br data-dcnode-id="1909"><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Gary:</span></strong><span data-dcnode-id="1906" instrument_node=""> You heard that too, huh?</span></div></li><li data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node=""> Late in "Rock Hard Chett", Chett takes a bite out of a slice of the pizza Wyatt and Gary are having when he's about to go to a bank to fight off bank robbers, only to complain that the pizza burned his tongue due to how hot it was. Given he's made invincible due to Lisa's magic early in the episode, this incident alerts Wyatt and Gary to the possibility that he's no longer invincible, prompting them both to scream for Lisa and run to her for help at once.</span></li></ul></li><li data-dcnode-id="1892"><span data-dcnode-id="1899" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OlderThanTheyLook" title="/pmwiki/pmwiki.php/Main/OlderThanTheyLook"><span data-dcnode-id="1898" instrument_node="">Older Than They Look</span></a><span data-dcnode-id="1896" instrument_node="">: Done </span><a class="twikilink" data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/InUniverse" title="/pmwiki/pmwiki.php/Main/InUniverse"><span data-dcnode-id="1895" instrument_node="">In-Universe</span></a><span data-dcnode-id="1893" instrument_node=""> during "Grampira" when Wyatt wishes for his grandmother to feel young again. Unfortunately, as a side-effect, she takes the youthful energy of anyone she touches, and it soon spreads like a virus. All the infected teenagers still look the same, but they have really become as old as senior citizens and will die if the wish isn't reversed.</span></li><li data-dcnode-id="1864"><span data-dcnode-id="1891" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OpeningShoutOut" title="/pmwiki/pmwiki.php/Main/OpeningShoutOut"><span data-dcnode-id="1890" instrument_node="">Opening Shout-Out</span></a><span data-dcnode-id="1888" instrument_node="">: For most of the run, the </span><a class="urllink" data-dcnode-id="1885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DctMqEJuqBN8"><span data-dcnode-id="1887" instrument_node="">series intro</span><img data-dcnode-id="1886" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.tvtropes.org/pmwiki/pub/external_link.gif&amp;raw" style="border:none;" width="12"></a><span data-dcnode-id="1884" instrument_node=""> began and ended with </span><a class="twikilink" data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StockFootage" title="/pmwiki/pmwiki.php/Main/StockFootage"><span data-dcnode-id="1883" instrument_node="">Stock Footage</span></a><span data-dcnode-id="1881" instrument_node=""> from </span><em data-dcnode-id="1878"><a class="twikilink" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/BrideOfFrankenstein" title="/pmwiki/pmwiki.php/Film/BrideOfFrankenstein"><span data-dcnode-id="1880" instrument_node="">Bride of Frankenstein</span></a></em><span data-dcnode-id="1877" instrument_node="">. Since "Searching for Boris Karloff" was a salute to Universal's Frankenstein movies, the opening exchange was re-created (albeit with Frankenstein instead of Pretorius).</span><div class="indent" data-dcnode-id="1865"><strong data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Creature:</span></strong><span data-dcnode-id="1874" instrument_node=""> You... make man? </span><br data-dcnode-id="1873"><strong data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Frankenstein:</span></strong><span data-dcnode-id="1870" instrument_node=""> No. Woman! </span><br data-dcnode-id="1869"><strong data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">Creature:</span></strong><span data-dcnode-id="1866" instrument_node=""> Woman?</span></div></li><li data-dcnode-id="1859"><span data-dcnode-id="1863" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent" title="/pmwiki/pmwiki.php/Main/OurVampiresAreDifferent"><span data-dcnode-id="1862" instrument_node="">Our Vampires Are Different</span></a><span data-dcnode-id="1860" instrument_node="">: In "Gary &amp; Wyatt's Bloodsucking Adventure", the guys and Lisa become vampires, but substitute blood-drinking for Yoo-hoo and there's no indication that sunlight affects them. Of course, they run afoul of more typical vampires.</span></li><li data-dcnode-id="1854"><span data-dcnode-id="1858" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/OutOfFocus" title="/pmwiki/pmwiki.php/Main/OutOfFocus"><span data-dcnode-id="1857" instrument_node="">Out of Focus</span></a><span data-dcnode-id="1855" instrument_node="">: With the increased emphasis on Chett in the final season, Gary and Wyatt often didn't have much to do on their own show. Many final season episodes have them reduced to subplots or just standing around and making snarky comments.</span></li></ul></div><p data-dcnode-id="1851"></p><div class="folderlabel" data-dcnode-id="1849" onclick="togglefolder('folder8');"><span data-dcnode-id="1850" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;P-R&nbsp;</span></div><div class="folder" data-dcnode-id="1711" id="folder8" isfolder="true" style="display:block;"><ul data-dcnode-id="1712"><li data-dcnode-id="1844"><span data-dcnode-id="1848" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalAbandonment" title="/pmwiki/pmwiki.php/Main/ParentalAbandonment"><span data-dcnode-id="1847" instrument_node="">Parental Abandonment</span></a><span data-dcnode-id="1845" instrument_node="">: Wyatt and Chett's parents are usually always away on business, leaving them the run of the house.</span></li><li data-dcnode-id="1819"><span data-dcnode-id="1843" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalBonus" title="/pmwiki/pmwiki.php/Main/ParentalBonus"><span data-dcnode-id="1842" instrument_node="">Parental Bonus</span></a><span data-dcnode-id="1840" instrument_node="">: During the </span><a class="twikilink" data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/WholePlotReference" title="/pmwiki/pmwiki.php/Main/WholePlotReference"><span data-dcnode-id="1839" instrument_node="">Whole Plot Reference</span></a><span data-dcnode-id="1837" instrument_node=""> to </span><em data-dcnode-id="1834"><a class="twikilink" data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/TheTwilightZone" title="/pmwiki/pmwiki.php/Franchise/TheTwilightZone"><span data-dcnode-id="1836" instrument_node="">The Twilight Zone</span></a></em><span data-dcnode-id="1833" instrument_node="">, Gary has a moment that parodies the famous climax to </span><em data-dcnode-id="1830"><a class="twikilink" data-dcnode-id="1831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/PlanetOfTheApes1968" title="/pmwiki/pmwiki.php/Film/PlanetOfTheApes1968"><span data-dcnode-id="1832" instrument_node="">Planet of the Apes (1968)</span></a></em><span data-dcnode-id="1829" instrument_node="">. Seems like a simple unrelated-</span><a class="twikilink" data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1828" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1826" instrument_node="">, but as the writers knew, </span><em data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">TZ</span></em><span data-dcnode-id="1823" instrument_node=""> creator </span><a class="twikilink" data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/RodSerling" title="/pmwiki/pmwiki.php/Creator/RodSerling"><span data-dcnode-id="1822" instrument_node="">Rod Serling</span></a><span data-dcnode-id="1820" instrument_node=""> wrote a draft of the movie's script and originated said climax.</span></li><li data-dcnode-id="1807"><span data-dcnode-id="1818" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalFavoritism" title="/pmwiki/pmwiki.php/Main/ParentalFavoritism"><span data-dcnode-id="1817" instrument_node="">Parental Favoritism</span></a><span data-dcnode-id="1815" instrument_node="">: Wyatt is the folks' clear favorite—much to Chett's annoyance.</span><div class="indent" data-dcnode-id="1808"><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Chett:</span></strong><span data-dcnode-id="1812" instrument_node=""> </span><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">[to Wyatt]</span></em><span data-dcnode-id="1809" instrument_node=""> You're the good son. You're gonna get the good job. You're the one Nana wants to see at Christmas.</span></div></li><li data-dcnode-id="1794"><span data-dcnode-id="1806" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalNeglect" title="/pmwiki/pmwiki.php/Main/ParentalNeglect"><span data-dcnode-id="1805" instrument_node="">Parental Neglect</span></a><span data-dcnode-id="1803" instrument_node="">: Chett was neglected after Wyatt was born, while Wyatt gets neglected due to work.</span><div class="indent" data-dcnode-id="1795"><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Marcia:</span></strong><span data-dcnode-id="1800" instrument_node=""> Did we forget his birthday again? </span><br data-dcnode-id="1799"><strong data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">Wayne:</span></strong><span data-dcnode-id="1796" instrument_node=""> If we did, my secretary's going to be looking for a new job.</span></div></li><li data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ParentalSubstitute" title="/pmwiki/pmwiki.php/Main/ParentalSubstitute"><span data-dcnode-id="1792" instrument_node="">Parental Substitute</span></a><span data-dcnode-id="1790" instrument_node="">: Implied with Gary's parents to Wyatt. In "It's a Mob, Mob, Mob, Mob World", Al and Emily throw Wyatt a small celebration for his perfect scores on the SATs, while his own parents didn't even know he had taken them. Presumably, Gary's parents kept an eye on Wyatt before Chett moved back home.</span></li><li data-dcnode-id="1784"><span data-dcnode-id="1788" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PingPongNaivete" title="/pmwiki/pmwiki.php/Main/PingPongNaivete"><span data-dcnode-id="1787" instrument_node="">Ping-Pong Naïveté</span></a><span data-dcnode-id="1785" instrument_node="">: Lisa was created with a high IQ, but when she has to actually function in the real-world ("Horseradish", "Teen Lisa"), she tends to be clueless. Justified, because she may have intelligence and information, but no real life experience, being just created.</span></li><li data-dcnode-id="1774"><span data-dcnode-id="1783" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlanetOfSteves" title="/pmwiki/pmwiki.php/Main/PlanetOfSteves"><span data-dcnode-id="1782" instrument_node="">Planet of Steves</span></a><span data-dcnode-id="1780" instrument_node="">:</span><ul data-dcnode-id="1775"><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node=""> Quite literally, recurring characters from an alien race all named Steve who wanted Lisa as their new queen.</span></li><li data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node=""> This is is also the plot of Rhett and Mickey, two rats transformed into humans by Lisa's magic in "Chett's World" —use mind-altering jerky to make everyone in the world act like the moronic Chett, then use humans for science experiments.</span></li></ul></li><li data-dcnode-id="1761"><span data-dcnode-id="1773" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotDrivenBreakdown" title="/pmwiki/pmwiki.php/Main/PlotDrivenBreakdown"><span data-dcnode-id="1772" instrument_node="">Plot-Driven Breakdown</span></a><span data-dcnode-id="1770" instrument_node="">:</span><ul data-dcnode-id="1762"><li data-dcnode-id="1765"><span data-dcnode-id="1769" instrument_node=""> Lisa's powers would sometimes fail her at key moments (like during the </span><a class="twikilink" data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GrandFinale" title="/pmwiki/pmwiki.php/Main/GrandFinale"><span data-dcnode-id="1768" instrument_node="">Grand Finale</span></a><span data-dcnode-id="1766" instrument_node="">).</span></li><li data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node=""> Especially early on, the writers would frequently drive the plot by having Lisa's spell wear off at the most inconvenient time possible.</span></li></ul></li><li data-dcnode-id="1748"><span data-dcnode-id="1760" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/PlotMandatedFriendshipFailure" title="/pmwiki/pmwiki.php/Main/PlotMandatedFriendshipFailure"><span data-dcnode-id="1759" instrument_node="">Plot-Mandated Friendship Failure</span></a><span data-dcnode-id="1757" instrument_node="">:</span><ul data-dcnode-id="1749"><li data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node=""> In "Sci-Fi Zoned", after a scene in which </span><a class="twikilink" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/IronicEchoCut" title="/pmwiki/pmwiki.php/Main/IronicEchoCut"><span data-dcnode-id="1755" instrument_node="">they say they'll always be friends</span></a><span data-dcnode-id="1753" instrument_node="">, Wyatt and Gary are then shown fighting over some school humiliations and agreeing their friendship is over.</span></li><li data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node=""> In "Community Property", Wyatt and Gary accuse the other of hogging Lisa, leading to a fight and a custody battle.</span></li></ul></li><li data-dcnode-id="1737"><span data-dcnode-id="1747" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ProWrestlingEpisode" title="/pmwiki/pmwiki.php/Main/ProWrestlingEpisode"><span data-dcnode-id="1746" instrument_node="">Pro Wrestling Episode</span></a><span data-dcnode-id="1744" instrument_node="">: In "Men in Tights", after Chett picks a fight with a nasty wrestler, Lisa gives him wrestling skills to survive it. Because he was trying to pull him out of the ring at the time, Wyatt also got half the power. Chett and Wyatt subsequently become tag-team wrestlers Uncle Slam and Paul Severe. </span><a class="twikilink" data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Wrestling/KingKongBundy" title="/pmwiki/pmwiki.php/Wrestling/KingKongBundy"><span data-dcnode-id="1743" instrument_node="">King Kong Bundy</span></a><span data-dcnode-id="1741" instrument_node=""> makes an appearance </span><a class="twikilink" data-dcnode-id="1739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/AsHimself" title="/pmwiki/pmwiki.php/Main/AsHimself"><span data-dcnode-id="1740" instrument_node="">As Himself</span></a><span data-dcnode-id="1738" instrument_node="">.</span></li><li data-dcnode-id="1730"><span data-dcnode-id="1736" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RealAfterAll" title="/pmwiki/pmwiki.php/Main/RealAfterAll"><span data-dcnode-id="1735" instrument_node="">Real After All</span></a><span data-dcnode-id="1733" instrument_node="">: In "Free Gary", Lisa is drawn to a guy nicknamed Kahuna that seems to know everything about her, but speaks vaguely about it. She soon believes he's a genie (especially when Gary is somehow saved from a wish gone wrong), while Wyatt thinks he was just giving her pickup lines and everything else was a coincidence. </span><span class="spoiler" data-dcnode-id="1731" title="you can set spoilers visible by default on your profile"><span data-dcnode-id="1732" instrument_node="">The last scene reveals that Kahuna is a genie.</span></span></li><li data-dcnode-id="1723"><span data-dcnode-id="1729" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RedEyesTakeWarning" title="/pmwiki/pmwiki.php/Main/RedEyesTakeWarning"><span data-dcnode-id="1728" instrument_node="">Red Eyes, Take Warning</span></a><span data-dcnode-id="1726" instrument_node="">: Lisa fakes this in "Magnifico Dad" to mess with the guys.</span><div class="indent" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">"Who dares disturb my slumber? I did not wish to be summoned. For this impertinence, you shall be punished."</span></div></li><li data-dcnode-id="1718"><span data-dcnode-id="1722" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RepressedMemories" title="/pmwiki/pmwiki.php/Main/RepressedMemories"><span data-dcnode-id="1721" instrument_node="">Repressed Memories</span></a><span data-dcnode-id="1719" instrument_node="">: In "Fly Boy", Chett is hypnotized as part of an FBI interrogation to get to his subconscious. It turns out he remembers a lot of the weird things that have happened to him during the series.</span></li><li data-dcnode-id="1713"><span data-dcnode-id="1717" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/RippleEffectProofMemory" title="/pmwiki/pmwiki.php/Main/RippleEffectProofMemory"><span data-dcnode-id="1716" instrument_node="">Ripple Effect-Proof Memory</span></a><span data-dcnode-id="1714" instrument_node="">: In "Universal Remote", the guys use it to play around with time. As Gary increasingly hogs it for his own use, Wyatt remains aware of all the loops, rewinds and fast-forwards.</span></li></ul></div><p data-dcnode-id="1710"></p><div class="folderlabel" data-dcnode-id="1708" onclick="togglefolder('folder9');"><span data-dcnode-id="1709" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;S&nbsp;</span></div><div class="folder" data-dcnode-id="1484" id="folder9" isfolder="true" style="display:block;"><ul data-dcnode-id="1485"><li data-dcnode-id="1695"><span data-dcnode-id="1707" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SandInMyEyes" title="/pmwiki/pmwiki.php/Main/SandInMyEyes"><span data-dcnode-id="1706" instrument_node="">Sand In My Eyes</span></a><span data-dcnode-id="1704" instrument_node="">: In "Searching for Boris Karloff", after Wyatt gives a heartfelt monologue to a comatose Lisa.</span><div class="indent" data-dcnode-id="1696"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Gary:</span></strong><span data-dcnode-id="1701" instrument_node=""> I think I got something in my eyes. </span><br data-dcnode-id="1700"><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Creature:</span></strong><span data-dcnode-id="1697" instrument_node=""> Me, too.</span></div></li><li data-dcnode-id="1690"><span data-dcnode-id="1694" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ScrewDestiny" title="/pmwiki/pmwiki.php/Main/ScrewDestiny"><span data-dcnode-id="1693" instrument_node="">Screw Destiny</span></a><span data-dcnode-id="1691" instrument_node="">: Lisa gives Wyatt a watch that shows when he'll die and Gary a watch that shows when he'll lose his virginity. According to the watches, Wyatt will die in 90 years and Gary will lose his virginity in a few days. A few days later, they realize they have the wrong watches, which means Wyatt has 10 minutes to live. He avoids his death by refusing to help Chett soup up his Jeep with nitro. Then Gary ignores his destiny by having sex with a nerdy classmate.</span></li><li data-dcnode-id="1676"><span data-dcnode-id="1689" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretKeeper" title="/pmwiki/pmwiki.php/Main/SecretKeeper"><span data-dcnode-id="1688" instrument_node="">Secret-Keeper</span></a><span data-dcnode-id="1686" instrument_node="">:</span><ul data-dcnode-id="1677"><li data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node=""> Chett (begrudgingly) becomes this after repeated memory wipes give him an immunity.</span></li><li data-dcnode-id="1678"><span data-dcnode-id="1683" instrument_node=""> Wyatt's grandmother becomes one near the end of "Grampira", though she doesn't appear again.</span><div class="indent" data-dcnode-id="1679"><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Wyatt's grandmother</span></strong><span data-dcnode-id="1680" instrument_node="">: (to Wyatt) She [Lisa] is always welcome to join and visit us. *leans close to Wyatt and whispers* But keep her magic at home. I don't need it.</span></div></li></ul></li><li data-dcnode-id="1668"><span data-dcnode-id="1675" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SecretTestOfCharacter" title="/pmwiki/pmwiki.php/Main/SecretTestOfCharacter"><span data-dcnode-id="1674" instrument_node="">Secret Test of Character</span></a><span data-dcnode-id="1672" instrument_node="">: In "Magic Comet Ride", Lisa embarks on some training to be a better genie. In the end, her Yoda-like mentor tells her she can go to a place where all of her questions can be answered, but it would mean leaving Wyatt and Gary forever. While she admits that they're not the helpless losers they used to be, Lisa says </span><em data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">she</span></em><span data-dcnode-id="1669" instrument_node=""> still needs them and won't go. Her mentor replies, "Pass the most important test of all you did."</span></li><li data-dcnode-id="1649"><span data-dcnode-id="1667" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SetRightWhatOnceWentWrong" title="/pmwiki/pmwiki.php/Main/SetRightWhatOnceWentWrong"><span data-dcnode-id="1666" instrument_node="">Set Right What Once Went Wrong</span></a><span data-dcnode-id="1664" instrument_node="">:</span><ul data-dcnode-id="1650"><li data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node=""> In "Camp Wannabe", Gary tries to change history by having Lisa send him back in time to Camp Hi-De-Ho in 1986 so that he can win the heart of Julia Putnam, on whom he had a crush, and spare himself the embarrassment of being tied to a tree all night by Jeremy Scanlon. He succeeds in doing so but he changes history back, albeit very reluctantly, after Julia breaks up with him and Jeremy's life is ruined.</span></li><li data-dcnode-id="1657"><span data-dcnode-id="1661" instrument_node=""> In "By the Time We Got to Woodstock", Chett tries to prevent </span><a class="twikilink" data-dcnode-id="1659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/UsefulNotes/RichardNixon" title="/pmwiki/pmwiki.php/UsefulNotes/RichardNixon"><span data-dcnode-id="1660" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="1658" instrument_node="">'s downfall while in 1969.</span></li><li data-dcnode-id="1651"><span data-dcnode-id="1656" instrument_node=""> In "Bee In There", Gary and Wyatt ask Lisa to send them back in time in their fathers' bodies, as in </span><em data-dcnode-id="1653"><a class="twikilink" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/QuantumLeap" title="/pmwiki/pmwiki.php/Series/QuantumLeap"><span data-dcnode-id="1655" instrument_node="">Quantum Leap</span></a></em><span data-dcnode-id="1652" instrument_node="">, so that they can teach their younger selves to throw a baseball and impress girls in the present. As ever, things don't go according to plan. When they arrive in 1987, Wyatt is in his father Wayne's body but Gary is in his mother Emily's body. Due to a misunderstanding involving Wyatt helping Gary take off his bra, Gary's father Al and Wyatt's mother Marcia become convinced that their spouses are having an affair. Although Gary and Wyatt are able to save their parents' marriages, they never get around to teaching the 1987 versions of themselves how to throw a ball.</span></li></ul></li><li data-dcnode-id="1626"><span data-dcnode-id="1648" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SexGoddess" title="/pmwiki/pmwiki.php/Main/SexGoddess"><span data-dcnode-id="1647" instrument_node="">Sex Goddess</span></a><span data-dcnode-id="1645" instrument_node="">: In the final episode, Gary shows up with an alien girlfriend. Considering she looks the same as the rest of the weird-looking </span><a class="twikilink" data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HumanoidAlien" title="/pmwiki/pmwiki.php/Main/HumanoidAlien"><span data-dcnode-id="1644" instrument_node="">humanoid aliens</span></a><span data-dcnode-id="1642" instrument_node=""> of the species, nothing like a </span><a class="twikilink" data-dcnode-id="1640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/GreenSkinnedSpaceBabe" title="/pmwiki/pmwiki.php/Main/GreenSkinnedSpaceBabe"><span data-dcnode-id="1641" instrument_node="">Green-Skinned Space Babe</span></a><span data-dcnode-id="1639" instrument_node=""> or </span><a class="twikilink" data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/CuteMonsterGirl" title="/pmwiki/pmwiki.php/Main/CuteMonsterGirl"><span data-dcnode-id="1638" instrument_node="">Cute Monster Girl</span></a><span data-dcnode-id="1636" instrument_node="">, Wyatt wonders what exactly he sees in her — until he finds out </span><a class="twikilink" data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/Orgasmatron" title="/pmwiki/pmwiki.php/Main/Orgasmatron"><span data-dcnode-id="1635" instrument_node="">just touching her hand feels so good</span></a><span data-dcnode-id="1633" instrument_node=""> that it causes him to do an ecstatic </span><a class="twikilink" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JimCarrey" title="/pmwiki/pmwiki.php/Creator/JimCarrey"><span data-dcnode-id="1632" instrument_node="">Jim Carrey</span></a><span data-dcnode-id="1630" instrument_node=""> / </span><a class="twikilink" data-dcnode-id="1628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Creator/JerryLewis" title="/pmwiki/pmwiki.php/Creator/JerryLewis"><span data-dcnode-id="1629" instrument_node="">Jerry Lewis</span></a><span data-dcnode-id="1627" instrument_node=""> imitation. Apparently it's a feature of the species.</span></li><li data-dcnode-id="1543"><span data-dcnode-id="1625" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ShoutOut" title="/pmwiki/pmwiki.php/Main/ShoutOut"><span data-dcnode-id="1624" instrument_node="">Shout-Out</span></a><span data-dcnode-id="1622" instrument_node="">:</span><ul data-dcnode-id="1544"><li data-dcnode-id="1613"><span data-dcnode-id="1621" instrument_node=""> The first episode acknowledges </span><em data-dcnode-id="1618"><a class="twikilink" data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/IDreamOfJeannie" title="/pmwiki/pmwiki.php/Series/IDreamOfJeannie"><span data-dcnode-id="1620" instrument_node="">I Dream of Jeannie</span></a></em><span data-dcnode-id="1617" instrument_node=""> and </span><a class="twikilink" data-dcnode-id="1615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/WeirdScience" title="/pmwiki/pmwiki.php/Film/WeirdScience"><span data-dcnode-id="1616" instrument_node="">John Hughes</span></a><span data-dcnode-id="1614" instrument_node="">.</span></li><li data-dcnode-id="1575"><span data-dcnode-id="1612" instrument_node=""> "Bikini Camp Slasher" parodies the slasher/horror genres - throwing out references to </span><em data-dcnode-id="1609"><a class="twikilink" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheExorcist" title="/pmwiki/pmwiki.php/Film/TheExorcist"><span data-dcnode-id="1611" instrument_node="">The Exorcist</span></a></em><span data-dcnode-id="1608" instrument_node="">, </span><em data-dcnode-id="1605"><a class="twikilink" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/EvilDead2" title="/pmwiki/pmwiki.php/Film/EvilDead2"><span data-dcnode-id="1607" instrument_node="">Evil Dead 2</span></a></em><span data-dcnode-id="1604" instrument_node="">, </span><em data-dcnode-id="1601"><a class="twikilink" data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/Halloween" title="/pmwiki/pmwiki.php/Franchise/Halloween"><span data-dcnode-id="1603" instrument_node="">Halloween</span></a></em><span data-dcnode-id="1600" instrument_node="">, </span><em data-dcnode-id="1597"><a class="twikilink" data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/SilentNightDeadlyNight" title="/pmwiki/pmwiki.php/Film/SilentNightDeadlyNight"><span data-dcnode-id="1599" instrument_node="">Silent Night, Deadly Night</span></a></em><span data-dcnode-id="1596" instrument_node="">, </span><em data-dcnode-id="1593"><a class="twikilink" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Franchise/FridayThe13th" title="/pmwiki/pmwiki.php/Franchise/FridayThe13th"><span data-dcnode-id="1595" instrument_node="">Friday the 13th</span></a></em><span data-dcnode-id="1592" instrument_node="">, </span><em data-dcnode-id="1589"><a class="twikilink" data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Poltergeist1982" title="/pmwiki/pmwiki.php/Film/Poltergeist1982"><span data-dcnode-id="1591" instrument_node="">Poltergeist</span></a></em><span data-dcnode-id="1588" instrument_node="">, </span><em data-dcnode-id="1585"><a class="twikilink" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/TheTexasChainsawMassacre" title="/pmwiki/pmwiki.php/Film/TheTexasChainsawMassacre"><span data-dcnode-id="1587" instrument_node="">The Texas Chainsaw Massacre</span></a></em><span data-dcnode-id="1584" instrument_node=""> and </span><em data-dcnode-id="1581"><a class="twikilink" data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/NightOfTheLivingDead1968" title="/pmwiki/pmwiki.php/Film/NightOfTheLivingDead1968"><span data-dcnode-id="1583" instrument_node="">Night of the Living Dead (1968)</span></a></em><span data-dcnode-id="1580" instrument_node="">. (By the way, the episode premiered a good year before </span><em data-dcnode-id="1577"><a class="twikilink" data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/Scream1996" title="/pmwiki/pmwiki.php/Film/Scream1996"><span data-dcnode-id="1579" instrument_node="">Scream (1996)</span></a></em><span data-dcnode-id="1576" instrument_node=""> came out. Eerie.)</span></li><li data-dcnode-id="1566"><span data-dcnode-id="1574" instrument_node=""> The plots of both "Quantum Wyatt" and "Bee In There" are parodies of </span><em data-dcnode-id="1571"><a class="twikilink" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/QuantumLeap" title="/pmwiki/pmwiki.php/Series/QuantumLeap"><span data-dcnode-id="1573" instrument_node="">Quantum Leap</span></a></em><span data-dcnode-id="1570" instrument_node=""> and it is mentioned in the latter. For you trivia buffs, Michael Manasseri (Wyatt) appeared in the </span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Quantum Leap</span></em><span data-dcnode-id="1567" instrument_node=""> episode "Return of the Evil Leaper".</span></li><li data-dcnode-id="1560"><span data-dcnode-id="1565" instrument_node=""> In one episode, Gary dates a cheerleader from Santo Domingo High, the high school on </span><em data-dcnode-id="1562"><a class="twikilink" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/ParkerLewisCantLose" title="/pmwiki/pmwiki.php/Series/ParkerLewisCantLose"><span data-dcnode-id="1564" instrument_node="">Parker Lewis Can't Lose</span></a></em><span data-dcnode-id="1561" instrument_node="">, which many of the producers had previously worked on.</span></li><li data-dcnode-id="1556"><span data-dcnode-id="1559" instrument_node=""> In "Lisa's Childhood Memories", an animal-themed detective yells at Chett, </span><a class="twikilink" data-dcnode-id="1557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/Duckman" title="/pmwiki/pmwiki.php/WesternAnimation/Duckman"><span data-dcnode-id="1558" instrument_node="">"What the hell are you starin' at?!"</span></a></li><li data-dcnode-id="1551"><span data-dcnode-id="1555" instrument_node=""> In "Chett's World", Lisa's magic accidentally turns two rats into humans, who then proceed </span><a class="twikilink" data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/WesternAnimation/PinkyAndTheBrain" title="/pmwiki/pmwiki.php/WesternAnimation/PinkyAndTheBrain"><span data-dcnode-id="1554" instrument_node="">to try to take over the world</span></a><span data-dcnode-id="1552" instrument_node="">.</span></li><li data-dcnode-id="1545"><span data-dcnode-id="1550" instrument_node=""> In "A Tale of Two Lisas", when Gary has been transformed into a troll, Wyatt has to transport him in his bike's basket in the same way Elliot did to E.T. in </span><em data-dcnode-id="1547"><a class="twikilink" data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Film/ETTheExtraTerrestrial" title="/pmwiki/pmwiki.php/Film/ETTheExtraTerrestrial"><span data-dcnode-id="1549" instrument_node="">E.T. the Extra-Terrestrial</span></a></em><span data-dcnode-id="1546" instrument_node="">.</span></li></ul></li><li data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SitcomArchNemesis" title="/pmwiki/pmwiki.php/Main/SitcomArchNemesis"><span data-dcnode-id="1541" instrument_node="">Sitcom Arch-Nemesis</span></a><span data-dcnode-id="1539" instrument_node="">: Chett and the former "Ass-istant Principal Scampi."</span></li><li data-dcnode-id="1525"><span data-dcnode-id="1537" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SkepticismFailure" title="/pmwiki/pmwiki.php/Main/SkepticismFailure"><span data-dcnode-id="1536" instrument_node="">Skepticism Failure</span></a><span data-dcnode-id="1534" instrument_node="">: In "Girl Talk", Lisa tells her new friend Tisch that she's a genie. Tisch actually believes in a lot of supernatural-type stuff, but doesn't believe Lisa because she thought she was making fun of her. Lisa convinces her by making it rain... inside the Java Man... with men instead of rain.</span><div class="indent" data-dcnode-id="1526"><strong data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Gary:</span></strong><span data-dcnode-id="1531" instrument_node=""> I don't wanna even know. </span><br data-dcnode-id="1530"><strong data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Wyatt:</span></strong><span data-dcnode-id="1527" instrument_node=""> I can't feel my legs.</span></div></li><li data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SoProudOfYou" title="/pmwiki/pmwiki.php/Main/SoProudOfYou"><span data-dcnode-id="1523" instrument_node="">So Proud of You</span></a><span data-dcnode-id="1521" instrument_node="">: At the end of "It's a Mob, Mob, Mob, Mob World", Wayne tells Wyatt that he has always made him and Marcia proud.</span></li><li data-dcnode-id="1515"><span data-dcnode-id="1519" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SpotlightStealingSquad" title="/pmwiki/pmwiki.php/Main/SpotlightStealingSquad"><span data-dcnode-id="1518" instrument_node="">Spotlight-Stealing Squad</span></a><span data-dcnode-id="1516" instrument_node="">: Chett became so popular with the writers that in the final season he wound up getting more spotlight episodes than the leads.</span></li><li data-dcnode-id="1500"><span data-dcnode-id="1514" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/StatusQuoIsGod" title="/pmwiki/pmwiki.php/Main/StatusQuoIsGod"><span data-dcnode-id="1513" instrument_node="">Status Quo Is God</span></a><span data-dcnode-id="1511" instrument_node="">:</span><ul data-dcnode-id="1501"><li data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node=""> Taken to the extreme. In several episodes, one of the guys actually got a girlfriend. But since this would've left the writers without an objective to drive future plots, she would quietly disappear between episodes.</span></li><li data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node=""> A more in-universe example: Lisa's magic eventually wears off, resetting things back to normal no matter how out of control the wishes make things. Her only spells that seem to be permanent are the ones that </span><em data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">restore</span></em><span data-dcnode-id="1505" instrument_node=""> the original status quo, like erasing people's memories of her.</span></li><li data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node=""> Averted in "Master Chett", with the revelation that Chett had been mindwiped so many times by Lisa, that he had become immune to her ability to erase/alter memories. This leads to him becoming part of the group and participating in various adventures.</span></li></ul></li><li data-dcnode-id="1491"><span data-dcnode-id="1499" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwappedRoles" title="/pmwiki/pmwiki.php/Main/SwappedRoles"><span data-dcnode-id="1498" instrument_node="">Swapped Roles</span></a><span data-dcnode-id="1496" instrument_node="">: In "Teen Lisa", Lisa goes to school disguised as a </span><img class="ymmv1 rounded" data-dcnode-id="1495" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/images/article-hreficon-ymmv.png&amp;raw" title="This example contains a YMMV entry. It should be moved to the YMMV tab."><a class="twikilink" data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HollywoodHomely" title="/pmwiki/pmwiki.php/Main/HollywoodHomely"><span data-dcnode-id="1494" instrument_node="">Hollywood Homely</span></a><span data-dcnode-id="1492" instrument_node=""> teenager while the boys become the world's most inept genies.</span></li><li data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/SwordfishSabre" title="/pmwiki/pmwiki.php/Main/SwordfishSabre"><span data-dcnode-id="1489" instrument_node="">Swordfish Sabre</span></a><span data-dcnode-id="1487" instrument_node="">: "Bikini Camp Slasher" had the heroes trapped in a slasher movie. They managed to kill the murderer by running him through with a stuffed swordfish - or so they thought; after all, a slasher movie murderer never dies on the first try...</span></li></ul></div><p data-dcnode-id="1483"></p><div class="folderlabel" data-dcnode-id="1481" onclick="togglefolder('folder10');"><span data-dcnode-id="1482" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;T-V&nbsp;</span></div><div class="folder" data-dcnode-id="1336" id="folder10" isfolder="true" style="display:block;"><ul data-dcnode-id="1362"><li data-dcnode-id="1457"><span data-dcnode-id="1480" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TakeThat" title="/pmwiki/pmwiki.php/Main/TakeThat"><span data-dcnode-id="1479" instrument_node="">Take That!</span></a><span data-dcnode-id="1477" instrument_node="">:</span><ul data-dcnode-id="1458"><li data-dcnode-id="1468"><span data-dcnode-id="1476" instrument_node=""> In "Slow Times at Farber High", Gary's attempt to use a brain-draining machine on a nerd who humiliated him backfires when he inadvertently sucks up </span><em data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">everyone's</span></em><span data-dcnode-id="1473" instrument_node=""> intelligence. At one point, he wonders where all of the now-stupid teenagers have vanished to. It turns out they've all gathered to watch </span><em data-dcnode-id="1469"><a class="twikilink" data-dcnode-id="1471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Series/SavedByTheBell" title="/pmwiki/pmwiki.php/Series/SavedByTheBell"><span data-dcnode-id="1472" instrument_node="">Saved by the Bell</span></a><span data-dcnode-id="1470" instrument_node="">: The College Years.</span></em></li><li data-dcnode-id="1459"><span data-dcnode-id="1467" instrument_node=""> In the </span><a class="twikilink" data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HalloweenEpisode" title="/pmwiki/pmwiki.php/Main/HalloweenEpisode"><span data-dcnode-id="1466" instrument_node="">Halloween Episode</span></a><span data-dcnode-id="1464" instrument_node=""> "Demon Lisa", the guys are confronted by the cyber-demon possessing Lisa, and it refers to itself as the essence of all that is evil in the computer world.</span><div class="indent" data-dcnode-id="1460"><strong data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Gary:</span></strong><span data-dcnode-id="1461" instrument_node=""> You're Bill Gates?</span></div></li></ul></li><li data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TalkLikeAPirate" title="/pmwiki/pmwiki.php/Main/TalkLikeAPirate"><span data-dcnode-id="1455" instrument_node="">Talk Like a Pirate</span></a><span data-dcnode-id="1453" instrument_node="">: "Pirates!", of course.</span></li><li data-dcnode-id="1447"><span data-dcnode-id="1451" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TeasingTheSubstituteTeacher" title="/pmwiki/pmwiki.php/Main/TeasingTheSubstituteTeacher"><span data-dcnode-id="1450" instrument_node="">Teasing the Substitute Teacher</span></a><span data-dcnode-id="1448" instrument_node="">: "Party High, U.S.A." has Gary wish that the classes at his high school were geared more towards his likes. After Lisa grants the wish, one of the classes is about how to torment a substitute teacher.</span></li><li data-dcnode-id="1439"><span data-dcnode-id="1446" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/TemporaryBulkChange" title="/pmwiki/pmwiki.php/Main/TemporaryBulkChange"><span data-dcnode-id="1445" instrument_node="">Temporary Bulk Change</span></a><span data-dcnode-id="1443" instrument_node="">: "One Size Fits All" sees Wyatt wishing for larger muscles to impress an athletic girl. Lisa conjures up a suit that gives him a bodybuilder's physique, and trouble inevitably begins with Gary borrows it. Wyatt even lampshades the fact that people might be confused about his sudden musculature; Gary </span><a class="twikilink" data-dcnode-id="1441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/HandWave" title="/pmwiki/pmwiki.php/Main/HandWave"><span data-dcnode-id="1442" instrument_node="">explains</span></a><span data-dcnode-id="1440" instrument_node=""> that since Wyatt was a huge nerd before, no one ever noticed his body.</span></li><li data-dcnode-id="1420"><span data-dcnode-id="1438" instrument_node=""> </span><a class="twikilink" data-dcnode-id="1436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tvtropes.org/pmwiki/pmwiki.php/Main/ThisIsGonnaSuck" title="/pmwiki/pmwiki.php/Main/ThisIsGonnaSuck"><span
