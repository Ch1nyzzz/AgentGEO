Published by </span><i class="fa fa-user" data-dcnode-id="365"></i><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainz.org/author/editor/"><span data-dcnode-id="364" instrument_node=""> The Editors</span></a><span data-dcnode-id="362" instrument_node="">
</span></li><span data-dcnode-id="360" instrument_node="">
</span></ul><span data-dcnode-id="358" instrument_node="">
</span><div class="post-content clearfix" data-dcnode-id="260"><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><img data-dcnode-id="356" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/sleep-to-dream.jpg&amp;raw"></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Dreams are the subject of great debate amongst dream experts, sleep researchers and doctors. Psychoanalyst Sigmund Freud once stated: “Dreams are often most profound when they seem the most crazy.” Here are some of the most common and weird dreams many people experience while they sleep.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="350"></p><h3 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">1. Flying Dreams</span></h3><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="343"><img data-dcnode-id="346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/028_stop_kadr.jpg&amp;raw"><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node="">Flying dreams, with or without wings, airplanes, and other aircraft, often indicate an overall sense of accomplishment, freedom, and sense of power. Conversely, problems encountered while flying (power lines, trees, mountains, mechanical breakdowns, fear of flying too high, etc..) indicate struggles to stay on course. Often this means something or someone is standing in your way from moving forward or that you’re afraid of the next step and success.</span></p><span data-dcnode-id="342" instrument_node="">
</span><p data-dcnode-id="341"></p><h3 data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">2. Sex Dreams</span></h3><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="334"><img data-dcnode-id="337" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/100118_bed1.jpg&amp;raw"><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node="">Most of us have startled awake having traveled in our slumber to the arms of a stranger, ex, neighbor, mailman, or even a same gendered friend, to rise confounded and guilty next to our partner. Don’t worry, you’re not losing your mind. Dreaming of sex is often just fantasy, but could also mean your subconscious is working on merging parts of your inner self with your outer world. Dreaming of coital relations with your ex may signify your anxiety or hesitation to begin a new relationship or enter a new situation. Dreaming of sex with a stranger may be an indicator to loosen some of your inhibitions, dump emotional baggage, and may relate to your uncertainty about the future. If you dream of multiple partners, it may indicate your emotional detachment from a present relationship. If you dream of homosexual activities when you’re heterosexual, often it means you need to cultivate your self love and get in touch with your sexuality and is not usually an indicator of harbored homosexuality. </span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="332"></p><h3 data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">3. Public Nudity Dreams</span></h3><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="325"><img data-dcnode-id="328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/nude-in-public.jpg&amp;raw"><br data-dcnode-id="327"><span data-dcnode-id="326" instrument_node="">Many folks have had the naked dream: going dans le buff to work, sitting barebottomed on the bus, just doing your day to day activities and realizing you are without clothes. This dream often reflects a variety of issues, depending upon your response to your nakedness in the dream. If you’re embarrassed of your public nudity, you could be concealing something from yourself or others, are seeking acceptance, or are in a new environment which causes fear or apprehension. Being naked in a classroom often indicates that you’re off guard, unprepared to make a decision, or fear exposure. Being nude in a dream while no one else cares (or notices) often symbolizes freedom, honesty, openness, or perhaps even attention seeking in manner which is detrimental to personal well being.</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="323"></p><h3 data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">4. Falling Dreams Dreams</span></h3><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="316"><img data-dcnode-id="319" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/falling.jpg&amp;raw"><br data-dcnode-id="318"><span data-dcnode-id="317" instrument_node="">Falling dreams are a terrifying phenomenon nearly every person experiences at one point or another in their lives. Falling dreams often signify imbalance, insecurity, anxiety, inferiority, and/or the feeling that a situation in your life is out of control. Sigmund Freud believed falling dreams were an indication that the dreamer is considerably lacking indiscretion and standing at the threshold of giving into sexual urges and impulses. The Bible states falling dreams are a reflection of negatively turning away from God and acting against accordance with Him. Contrary to popular belief, hitting ground during a falling dream will not kill the dreamer.</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="314"></p><h3 data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">5. Test Dreams </span></h3><span data-dcnode-id="311" instrument_node="">
</span><p data-dcnode-id="307"><img data-dcnode-id="310" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/fail-a-test.jpg&amp;raw"><br data-dcnode-id="309"><span data-dcnode-id="308" instrument_node="">Test dreams also indicate a sense of anxiety, fears of scrutiny, or agitation stemming from a perplexing experience in your waking life. Most test dreams indicate self esteem issues and an overall lack of confidence depending upon the activities in your sleeping state. If you dream you fail a test, arrive late for a test, or your pencil keeps breaking and you can’t take the test, it often translates that in your wakeful world, you are not living up to others’ expectations of you. Often test dreams reveal wakeful feelings of inferiority. Test dreams also may mean you feel you are being judged or that you’re neglecting an integral aspect of your self, your feelings, or your experience. </span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="305"></p><h3 data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">6. Chase Dreams </span></h3><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="298"><img data-dcnode-id="301" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/sf25295.jpg&amp;raw"><br data-dcnode-id="300"><span data-dcnode-id="299" instrument_node="">Chase dreams are based in the “flight or fight” instinct. Often they stem from anxiety, fear of physical threat, or stressful situations based in your wakeful life. The actions taken in your dream and how you respond to the chase often parallel your response to difficulties encountered when you are awake. Paying attention to what chases you while you are dreaming give you a better idea how to lasso and face your fears. Often chase dreams mirror our feelings of anger, jealousy, fear, or threatened love. If you are chasing something in your dream, it indicates that you may be falling behind in terms of your drive and ambitions. If you are attacked following the chase, it may indicate physical vulnerabilities and the fear of violence. </span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="296"></p><h3 data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">7. Car Accident/Break Down Dreams </span></h3><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="289"><img data-dcnode-id="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/car-accident.jpg&amp;raw"><br data-dcnode-id="291"><span data-dcnode-id="290" instrument_node="">Car accidents and/or car problems often reveal an emotional state driven by anxiety and fear regarding one’s chosen path. Often when we dream of these instances, it’s our inner wisdom eliciting a warning to slow down, redirect, or rethink our present path to determine if its the one we really want to be on. Car accident and breakdown dreams are a direct symbol of our wakeful situations which make us feel out of control. Re-evauluating our wakeful lives and regaining control of ourselves is often implied by car accident or break down dreams.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="287"></p><h3 data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">8. Death Dreams Of Self Or Others </span></h3><span data-dcnode-id="284" instrument_node="">
</span><p data-dcnode-id="280"><img data-dcnode-id="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/death.jpg&amp;raw"><br data-dcnode-id="282"><span data-dcnode-id="281" instrument_node="">If you dream of death or dying, it often indicates change and usually is not a prophetic indicator of your death or someone elses. To dream of death or dying often means you are going through a transition, are lacking a specific skill or trait necessary to navigate present circumstances, or evolving in your development. Dreaming of death also may signify you are trying to shirk responsibility and demands of your waking life or need a new start.</span></p><span data-dcnode-id="279" instrument_node="">
</span><p data-dcnode-id="278"></p><h3 data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">9. Trapped Dreams </span></h3><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="271"><img data-dcnode-id="274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/buried-alive.jpg&amp;raw"><br data-dcnode-id="273"><span data-dcnode-id="272" instrument_node="">To dream you are lost or trapped often signifies feelings of restraint, imposition, restriction and confinement in your career, personal relationships, or because of health issues. This dream is often a good indicator to let go of your past and determine what is hindering your growth in your waking life. This dream often stems from loss, fear, indecision, and/or unresolved issues from your past.</span></p><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="269"></p><h3 data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">10. Break Ins/Burglary Dreams </span></h3><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="262"><img data-dcnode-id="265" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//brainz.org/wp-content/uploads/2017/08/burglar.jpg&amp;raw"><br data-dcnode-id="264"><span data-dcnode-id="263" instrument_node="">If you dream of break ins or being burglarized, it often indicates a feeling of helplessness, violation, or invasion of your space. This dream often occurs following highly traumatizing life experience, a major life change, or relationship issue. Burglary dreams often are a symptom of post traumatic stress and are the body’s signal to slow down, allow yourself to adjust, and, if recurring, perhaps seek the help of a qualified professional to assist you in working through your emotions.</span></p><span data-dcnode-id="261" instrument_node="">
