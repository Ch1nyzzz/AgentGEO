</span><li data-dcnode-id="1346"><link data-dcnode-id="1387" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation web cs1" data-dcnode-id="1367" id="CITEREFThink:Kids_–_Collaborative_Problem_Solving®"><a class="external text" data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20130611073740/http%3A//www.thinkkids.org/learn/our-collaborative-problem-solving-approach/" rel="nofollow"><span data-dcnode-id="1386" instrument_node="">"The Collaborative Problem Solving® (CPS) Approach"</span></a><span data-dcnode-id="1384" instrument_node="">. </span><i data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Think:Kids – Collaborative Problem Solving®</span></i><span data-dcnode-id="1381" instrument_node="">. Archived from </span><a class="external text" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thinkkids.org/learn/our-collaborative-problem-solving-approach/" rel="nofollow"><span data-dcnode-id="1380" instrument_node="">the original</span></a><span data-dcnode-id="1378" instrument_node=""> on June 11, 2013</span><span class="reference-accessdate" data-dcnode-id="1374"><span data-dcnode-id="1377" instrument_node="">. Retrieved </span><span class="nowrap" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">2018-08-10</span></span></span><span data-dcnode-id="1373" instrument_node="">. </span><q data-dcnode-id="1368"><span data-dcnode-id="1372" instrument_node="">Collaborative Problem Solving approach is applicable to diverse human interactions, but especially those that can result in conflict. Our </span><a data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CPS_model" title="CPS model"><span data-dcnode-id="1371" instrument_node="">CPS model</span></a><span data-dcnode-id="1369" instrument_node=""> can be applied to interactions between classmates, siblings, couples, parents and teachers, and employees and supervisors.</span></q></cite><span class="Z3988" data-dcnode-id="1366" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=unknown&amp;rft.jtitle=Think%3AKids+%E2%80%93+Collaborative+Problem+Solving%C2%AE&amp;rft.atitle=The+Collaborative+Problem+Solving%C2%AE+%28CPS%29+Approach&amp;rft_id=http%3A%2F%2Fwww.thinkkids.org%2Flearn%2Four-collaborative-problem-solving-approach%2F&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AProblem+solving"></span><span data-dcnode-id="1365" instrument_node=""> The Collaborative Problem Solving approach was originated by Dr. Ross Greene</span><sup class="reference" data-dcnode-id="1362" id="cite_ref-82"><a data-dcnode-id="1363" href="#cite_note-82"><span data-dcnode-id="1364" instrument_node="">[1]</span></a></sup><sup class="noprint Inline-Template noprint Template-Fact" data-dcnode-id="1355" style="white-space:nowrap;"><span data-dcnode-id="1361" instrument_node="">[</span><i data-dcnode-id="1357"><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Wikipedia_and_sources_that_mirror_or_use_it" title="Wikipedia:Verifiability"><span data-dcnode-id="1359" title="This claim cites another Wikipedia article. Articles need references to reliable third-party sources. (July 2019)"><span data-dcnode-id="1360" instrument_node="">circular reference</span></span></a></i><span data-dcnode-id="1356" instrument_node="">]</span></sup><span data-dcnode-id="1354" instrument_node="">. He now refers to his model as </span><a class="external text" data-dcnode-id="1351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.livesinthebalance.org/" rel="nofollow"><b data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Collaborative &amp; Proactive Solutions</span></b></a><span data-dc
