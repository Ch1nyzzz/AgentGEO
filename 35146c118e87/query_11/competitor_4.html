</span><h2 data-dcnode-id="5780"><span class="mw-headline" data-dcnode-id="5788" id="Definition"><span data-dcnode-id="5789" instrument_node="">Definition</span></span><span class="mw-editsection" data-dcnode-id="5781"><span class="mw-editsection-bracket" data-dcnode-id="5786"><span data-dcnode-id="5787" instrument_node="">[</span></span><a data-dcnode-id="5784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D1" title="Edit section: Definition"><span data-dcnode-id="5785" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5782"><span data-dcnode-id="5783" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5779" instrument_node="">
</span><p data-dcnode-id="5755"><span data-dcnode-id="5778" instrument_node="">The term </span><i data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">problem solving</span></i><span data-dcnode-id="5775" instrument_node=""> has a slightly different meaning depending on the discipline. For instance, it is a mental process in </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Psychology" title="Psychology"><span data-dcnode-id="5774" instrument_node="">psychology</span></a><span data-dcnode-id="5772" instrument_node=""> and a computerized process in </span><a data-dcnode-id="5770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_science" title="Computer science"><span data-dcnode-id="5771" instrument_node="">computer science</span></a><span data-dcnode-id="5769" instrument_node="">. There are two different types of problems: ill-defined and well-defined; different approaches are used for each. Well-defined problems have specific end goals and clearly expected solutions, while ill-defined problems do not. Well-defined problems allow for more initial planning than ill-defined problems.</span><sup class="reference" data-dcnode-id="5766" id="cite_ref-1"><a data-dcnode-id="5767" href="#cite_note-1"><span data-dcnode-id="5768" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5765" instrument_node=""> Solving problems sometimes involves dealing with </span><a data-dcnode-id="5763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pragmatics" title="Pragmatics"><span data-dcnode-id="5764" instrument_node="">pragmatics</span></a><span data-dcnode-id="5762" instrument_node="">, the way that context contributes to meaning, and </span><a data-dcnode-id="5760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semantics" title="Semantics"><span data-dcnode-id="5761" instrument_node="">semantics</span></a><span data-dcnode-id="5759" instrument_node="">, the interpretation of the problem. The ability to understand what the end goal of the problem is, and what rules could be applied represents the key to solving the problem. Sometimes the problem requires </span><a class="mw-redirect" data-dcnode-id="5757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstract_thinking" title="Abstract thinking"><span data-dcnode-id="5758" instrument_node="">abstract thinking</span></a><span data-dcnode-id="5756" instrument_node=""> or coming up with a creative solution.
</span></p><span data-dcnode-id="5754" instrument_node="">
</span><h3 data-dcnode-id="5744"><span class="mw-headline" data-dcnode-id="5752" id="Psychology"><span data-dcnode-id="5753" instrument_node="">Psychology</span></span><span class="mw-editsection" data-dcnode-id="5745"><span class="mw-editsection-bracket" data-dcnode-id="5750"><span data-dcnode-id="5751" instrument_node="">[</span></span><a data-dcnode-id="5748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D2" title="Edit section: Psychology"><span data-dcnode-id="5749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5743" instrument_node="">
</span><p data-dcnode-id="5692"><span data-dcnode-id="5742" instrument_node="">Problem solving in psychology refers to the process of finding solutions to problems encountered in life.</span><sup class="reference" data-dcnode-id="5739" id="cite_ref-2"><a data-dcnode-id="5740" href="#cite_note-2"><span data-dcnode-id="5741" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5738" instrument_node=""> Solutions to these problems are usually situation or context-specific. The process starts with </span><a data-dcnode-id="5736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Problem_finding" title="Problem finding"><span data-dcnode-id="5737" instrument_node="">problem finding</span></a><span data-dcnode-id="5735" instrument_node=""> and </span><a data-dcnode-id="5733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Problem_shaping" title="Problem shaping"><span data-dcnode-id="5734" instrument_node="">problem shaping</span></a><span data-dcnode-id="5732" instrument_node="">, where the problem is discovered and simplified. The next step is to generate possible solutions and evaluate them. Finally a solution is selected to be implemented and verified. Problems have an </span><i data-dcnode-id="5730"><span data-dcnode-id="5731" instrument_node="">end</span></i><span data-dcnode-id="5729" instrument_node=""> </span><i data-dcnode-id="5727"><span data-dcnode-id="5728" instrument_node="">goal</span></i><span data-dcnode-id="5726" instrument_node=""> to be reached and how you get there depends upon problem orientation (problem-solving coping style and skills) and systematic analysis.</span><sup class="reference" data-dcnode-id="5723" id="cite_ref-3"><a data-dcnode-id="5724" href="#cite_note-3"><span data-dcnode-id="5725" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5722" instrument_node=""> Mental health professionals study the human problem solving processes using methods such as </span><a data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Introspection" title="Introspection"><span data-dcnode-id="5721" instrument_node="">introspection</span></a><span data-dcnode-id="5719" instrument_node="">, </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Behaviorism" title="Behaviorism"><span data-dcnode-id="5718" instrument_node="">behaviorism</span></a><span data-dcnode-id="5716" instrument_node="">, </span><a data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simulation" title="Simulation"><span data-dcnode-id="5715" instrument_node="">simulation</span></a><span data-dcnode-id="5713" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computer_modeling" title="Computer modeling"><span data-dcnode-id="5712" instrument_node="">computer modeling</span></a><span data-dcnode-id="5710" instrument_node="">, and </span><a data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Experiment" title="Experiment"><span data-dcnode-id="5709" instrument_node="">experiment</span></a><span data-dcnode-id="5707" instrument_node="">. Social psychologists look into the person-environment relationship aspect of the problem and independent and interdependent problem-solving methods.</span><sup class="reference" data-dcnode-id="5704" id="cite_ref-4"><a data-dcnode-id="5705" href="#cite_note-4"><span data-dcnode-id="5706" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5703" instrument_node=""> Problem solving has been defined as a higher-order </span><a class="mw-redirect" data-dcnode-id="5701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive" title="Cognitive"><span data-dcnode-id="5702" instrument_node="">cognitive</span></a><span data-dcnode-id="5700" instrument_node=""> process and </span><a data-dcnode-id="5698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intelligence" title="Intelligence"><span data-dcnode-id="5699" instrument_node="">intellectual function</span></a><span data-dcnode-id="5697" instrument_node=""> that requires the modulation and control of more routine or fundamental skills.</span><sup class="reference" data-dcnode-id="5694" id="cite_ref-G&amp;L87_5-0"><a data-dcnode-id="5695" href="#cite_note-G&amp;L87-5"><span data-dcnode-id="5696" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5693" instrument_node="">
</span></p><p data-dcnode-id="5648"><span data-dcnode-id="5691" instrument_node="">Problem solving has two major domains: </span><a data-dcnode-id="5689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mathematical_problem" title="Mathematical problem"><span data-dcnode-id="5690" instrument_node="">mathematical problem solving</span></a><span data-dcnode-id="5688" instrument_node=""> and personal problem solving. Both are seen in terms of some difficulty or barrier that is encountered.</span><sup class="reference" data-dcnode-id="5685" id="cite_ref-Zimmermann_6-0"><a data-dcnode-id="5686" href="#cite_note-Zimmermann-6"><span data-dcnode-id="5687" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5684" instrument_node=""> Empirical research shows many different strategies and factors influence everyday problem solving.</span><sup class="reference" data-dcnode-id="5681" id="cite_ref-7"><a data-dcnode-id="5682" href="#cite_note-7"><span data-dcnode-id="5683" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5678" id="cite_ref-8"><a data-dcnode-id="5679" href="#cite_note-8"><span data-dcnode-id="5680" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="5675" id="cite_ref-9"><a data-dcnode-id="5676" href="#cite_note-9"><span data-dcnode-id="5677" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5674" instrument_node=""> </span><a data-dcnode-id="5672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rehabilitation_psychology" title="Rehabilitation psychology"><span data-dcnode-id="5673" instrument_node="">Rehabilitation psychologists</span></a><span data-dcnode-id="5671" instrument_node=""> studying individuals with frontal lobe injuries have found that deficits in emotional control and reasoning can be re-mediated with effective rehabilitation and could improve the capacity of injured persons to resolve everyday problems.</span><sup class="reference" data-dcnode-id="5668" id="cite_ref-Rath2003_10-0"><a data-dcnode-id="5669" href="#cite_note-Rath2003-10"><span data-dcnode-id="5670" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5667" instrument_node=""> Interpersonal everyday problem solving is dependent upon the individual personal motivational and contextual components. One such component is the </span><a data-dcnode-id="5665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valence_%28psychology%29" title="Valence (psychology)"><span data-dcnode-id="5666" instrument_node="">emotional valence</span></a><span data-dcnode-id="5664" instrument_node=""> of "real-world" problems and it can either impede or aid problem-solving performance. Researchers have focused on the role of emotions in problem solving,</span><sup class="reference" data-dcnode-id="5661" id="cite_ref-DZurilla1971_11-0"><a data-dcnode-id="5662" href="#cite_note-DZurilla1971-11"><span data-dcnode-id="5663" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="5658" id="cite_ref-DZurilla1982_12-0"><a data-dcnode-id="5659" href="#cite_note-DZurilla1982-12"><span data-dcnode-id="5660" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5657" instrument_node=""> demonstrating that poor emotional control can disrupt focus on the target task and impede problem resolution and likely lead to negative outcomes such as fatigue, depression, and inertia.</span><sup class="reference" data-dcnode-id="5654" id="cite_ref-rath2004_13-0"><a data-dcnode-id="5655" href="#cite_note-rath2004-13"><span data-dcnode-id="5656" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5653" instrument_node=""> In conceptualization, human problem solving consists of two related processes: problem orientation and the motivational/attitudinal/affective approach to problematic situations and problem-solving skills. Studies conclude people's strategies cohere with their goals</span><sup class="reference" data-dcnode-id="5650" id="cite_ref-14"><a data-dcnode-id="5651" href="#cite_note-14"><span data-dcnode-id="5652" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5649" instrument_node=""> and stem from the natural process of comparing oneself with others.
</span></p><span data-dcnode-id="5647" instrument_node="">
</span><h3 data-dcnode-id="5637"><span class="mw-headline" data-dcnode-id="5645" id="Cognitive_sciences"><span data-dcnode-id="5646" instrument_node="">Cognitive sciences</span></span><span class="mw-editsection" data-dcnode-id="5638"><span class="mw-editsection-bracket" data-dcnode-id="5643"><span data-dcnode-id="5644" instrument_node="">[</span></span><a data-dcnode-id="5641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D3" title="Edit section: Cognitive sciences"><span data-dcnode-id="5642" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5639"><span data-dcnode-id="5640" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5636" instrument_node="">
</span><p data-dcnode-id="5576"><span data-dcnode-id="5635" instrument_node="">The early experimental work of the </span><a data-dcnode-id="5633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gestalt_psychology" title="Gestalt psychology"><span data-dcnode-id="5634" instrument_node="">Gestaltists</span></a><span data-dcnode-id="5632" instrument_node=""> in </span><a data-dcnode-id="5630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="5631" instrument_node="">Germany</span></a><span data-dcnode-id="5629" instrument_node=""> placed the beginning of problem solving study (e.g., </span><a data-dcnode-id="5627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Duncker" title="Karl Duncker"><span data-dcnode-id="5628" instrument_node="">Karl Duncker</span></a><span data-dcnode-id="5626" instrument_node=""> in 1935 with his book </span><i data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">The psychology of productive thinking</span></i><sup class="reference" data-dcnode-id="5621" id="cite_ref-Duncker_15-0"><a data-dcnode-id="5622" href="#cite_note-Duncker-15"><span data-dcnode-id="5623" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5620" instrument_node="">). Later this experimental work continued through the 1960s and early 1970s with research conducted on relatively simple (but novel for participants) laboratory tasks of problem solving.</span><sup class="reference" data-dcnode-id="5617" id="cite_ref-16"><a data-dcnode-id="5618" href="#cite_note-16"><span data-dcnode-id="5619" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="5614" id="cite_ref-17"><a data-dcnode-id="5615" href="#cite_note-17"><span data-dcnode-id="5616" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5613" instrument_node=""> The use of simple, novel tasks was due to the clearly defined </span><a class="mw-redirect" data-dcnode-id="5611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Optimal_solution" title="Optimal solution"><span data-dcnode-id="5612" instrument_node="">optimal solutions</span></a><span data-dcnode-id="5610" instrument_node=""> and short time for solving, which made it possible for the researchers to trace participants' steps in problem-solving process. Researchers' underlying assumption was that simple tasks such as the </span><a data-dcnode-id="5608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tower_of_Hanoi" title="Tower of Hanoi"><span data-dcnode-id="5609" instrument_node="">Tower of Hanoi</span></a><span data-dcnode-id="5607" instrument_node=""> correspond to the main properties of "</span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reality" title="Reality"><span data-dcnode-id="5606" instrument_node="">real world</span></a><span data-dcnode-id="5604" instrument_node="">" problems and thus the characteristic </span><a class="mw-redirect" data-dcnode-id="5602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_process" title="Cognitive process"><span data-dcnode-id="5603" instrument_node="">cognitive processes</span></a><span data-dcnode-id="5601" instrument_node=""> within participants' attempts to solve simple problems are the same for "real world" problems too; simple problems were used for reasons of convenience and with the expectation that thought generalizations to more complex problems would become possible. Perhaps the best-known and most impressive example of this line of research is the work by </span><a data-dcnode-id="5599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allen_Newell" title="Allen Newell"><span data-dcnode-id="5600" instrument_node="">Allen Newell</span></a><span data-dcnode-id="5598" instrument_node=""> and </span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herbert_A._Simon" title="Herbert A. Simon"><span data-dcnode-id="5597" instrument_node="">Herbert A. Simon</span></a><span data-dcnode-id="5595" instrument_node="">.</span><sup class="reference" data-dcnode-id="5592" id="cite_ref-Newell_18-0"><a data-dcnode-id="5593" href="#cite_note-Newell-18"><span data-dcnode-id="5594" instrument_node="">[18]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="5585" style="white-space:nowrap;"><span data-dcnode-id="5591" instrument_node="">[</span><i data-dcnode-id="5587"><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANo_original_research%23Synthesis_of_published_material" title="Wikipedia:No original research"><span data-dcnode-id="5589" title="The material near this tag may be based upon an improper synthesis of sources. (September 2018)"><span data-dcnode-id="5590" instrument_node="">improper synthesis?</span></span></a></i><span data-dcnode-id="5586" instrument_node="">]</span></sup><span data-dcnode-id="5584" instrument_node=""> Other experts have shown that the principle of </span><a data-dcnode-id="5582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decomposition_%28computer_science%29" title="Decomposition (computer science)"><span data-dcnode-id="5583" instrument_node="">decomposition</span></a><span data-dcnode-id="5581" instrument_node=""> improves the ability of the problem solver to make good judgment.</span><sup class="reference" data-dcnode-id="5578" id="cite_ref-19"><a data-dcnode-id="5579" href="#cite_note-19"><span data-dcnode-id="5580" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5577" instrument_node="">
</span></p><span data-dcnode-id="5575" instrument_node="">
</span><h3 data-dcnode-id="5565"><span class="mw-headline" data-dcnode-id="5573" id="Computer_science"><span data-dcnode-id="5574" instrument_node="">Computer science</span></span><span class="mw-editsection" data-dcnode-id="5566"><span class="mw-editsection-bracket" data-dcnode-id="5571"><span data-dcnode-id="5572" instrument_node="">[</span></span><a data-dcnode-id="5569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D4" title="Edit section: Computer science"><span data-dcnode-id="5570" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5564" instrument_node="">
</span><table class="box-Expand_section plainlinks metadata ambox mbox-small-left ambox-content" data-dcnode-id="5543" role="presentation"><tbody data-dcnode-id="5544"><tr data-dcnode-id="5545"><td class="mbox-image" data-dcnode-id="5561"><a class="image" data-dcnode-id="5562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AWiki_letter_w_cropped.svg"><img alt="[icon]" data-dcnode-id="5563" data-file-height="31" data-file-width="44" decoding="async" height="14" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/20px-Wiki_letter_w_cropped.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/30px-Wiki_letter_w_cropped.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Wiki_letter_w_cropped.svg/40px-Wiki_letter_w_cropped.svg.png 2x" width="20"></a></td><td class="mbox-text" data-dcnode-id="5546"><div class="mbox-text-span" data-dcnode-id="5547"><span data-dcnode-id="5560" instrument_node="">This section </span><b data-dcnode-id="5558"><span data-dcnode-id="5559" instrument_node="">needs expansion</span></b><span data-dcnode-id="5557" instrument_node="">. You can help by </span><a class="external text" data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D"><span data-dcnode-id="5556" instrument_node="">adding to it</span></a><span data-dcnode-id="5554" instrument_node="">.  </span><span class="date-container" data-dcnode-id="5548"><i data-dcnode-id="5549"><span data-dcnode-id="5553" instrument_node="">(</span><span class="date" data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node="">September 2018</span></span><span data-dcnode-id="5550" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="5542" instrument_node="">
</span><p data-dcnode-id="5519"><span data-dcnode-id="5541" instrument_node="">In computer science and in the part of </span><a data-dcnode-id="5539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="5540" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="5538" instrument_node=""> that deals with algorithms, </span><a data-dcnode-id="5536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computational_problem" title="Computational problem"><span data-dcnode-id="5537" instrument_node="">problem</span></a><span data-dcnode-id="5535" instrument_node=""> solving includes techniques of </span><a data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algorithm" title="Algorithm"><span data-dcnode-id="5534" instrument_node="">algorithms</span></a><span data-dcnode-id="5532" instrument_node="">, </span><a data-dcnode-id="5530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heuristic" title="Heuristic"><span data-dcnode-id="5531" instrument_node="">heuristics</span></a><span data-dcnode-id="5529" instrument_node=""> and </span><a data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Root_cause_analysis" title="Root cause analysis"><span data-dcnode-id="5528" instrument_node="">root cause analysis</span></a><span data-dcnode-id="5526" instrument_node="">. The amount of resources (e.g. time, memory, energy) required to solve problems is described by </span><a data-dcnode-id="5524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Computational_complexity_theory" title="Computational complexity theory"><span data-dcnode-id="5525" instrument_node="">computational complexity theory</span></a><span data-dcnode-id="5523" instrument_node="">. In more general terms, problem solving is part of a larger process that encompasses problem determination, </span><a data-dcnode-id="5521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Data_deduplication" title="Data deduplication"><span data-dcnode-id="5522" instrument_node="">de-duplication</span></a><span data-dcnode-id="5520" instrument_node="">, analysis, diagnosis, repair, and other steps.
</span></p><p data-dcnode-id="5510"><span data-dcnode-id="5518" instrument_node="">Other problem solving tools are linear and nonlinear programming, </span><a class="mw-redirect" data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Queuing_systems" title="Queuing systems"><span data-dcnode-id="5517" instrument_node="">queuing systems</span></a><span data-dcnode-id="5515" instrument_node="">, and simulation.</span><sup class="reference" data-dcnode-id="5512" id="cite_ref-MalakootiMCDM_20-0"><a data-dcnode-id="5513" href="#cite_note-MalakootiMCDM-20"><span data-dcnode-id="5514" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5511" instrument_node="">
</span></p><p data-dcnode-id="5508"><span data-dcnode-id="5509" instrument_node="">Much of computer science involves designing completely automatic systems that will later solve some specific problem—systems to accept input data and, in a reasonable amount of time, calculate the correct response or a correct-enough approximation.
</span></p><p data-dcnode-id="5503"><span data-dcnode-id="5507" instrument_node="">In addition, people in computer science spend a surprisingly large amount of human time finding and fixing problems in their programs: </span><a data-dcnode-id="5505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Debugging" title="Debugging"><span data-dcnode-id="5506" instrument_node="">Debugging</span></a><span data-dcnode-id="5504" instrument_node="">.
</span></p><span data-dcnode-id="5502" instrument_node="">
</span><h3 data-dcnode-id="5492"><span class="mw-headline" data-dcnode-id="5500" id="Logic"><span data-dcnode-id="5501" instrument_node="">Logic</span></span><span class="mw-editsection" data-dcnode-id="5493"><span class="mw-editsection-bracket" data-dcnode-id="5498"><span data-dcnode-id="5499" instrument_node="">[</span></span><a data-dcnode-id="5496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D5" title="Edit section: Logic"><span data-dcnode-id="5497" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5494"><span data-dcnode-id="5495" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5491" instrument_node="">
</span><p data-dcnode-id="5474"><span data-dcnode-id="5490" instrument_node="">Formal </span><a data-dcnode-id="5488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logic" title="Logic"><span data-dcnode-id="5489" instrument_node="">logic</span></a><span data-dcnode-id="5487" instrument_node=""> is concerned with such issues as validity, truth, inference, argumentation and proof. In a problem-solving context, it can be used to formally represent a problem as a theorem to be proved, and to represent the knowledge needed to solve the problem as the premises to be used in a proof that the problem has a solution. The use of computers to prove mathematical theorems using formal logic emerged as the field of </span><a data-dcnode-id="5485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automated_theorem_proving" title="Automated theorem proving"><span data-dcnode-id="5486" instrument_node="">automated theorem proving</span></a><span data-dcnode-id="5484" instrument_node=""> in the 1950s. It included the use of heuristic methods designed to simulate human problem solving, as in the </span><a class="mw-redirect" data-dcnode-id="5482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logic_Theory_Machine" title="Logic Theory Machine"><span data-dcnode-id="5483" instrument_node="">Logic Theory Machine</span></a><span data-dcnode-id="5481" instrument_node="">, developed by Allen Newell, Herbert A. Simon and J. C. Shaw, as well as algorithmic methods, such as the </span><a data-dcnode-id="5479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resolution_%28logic%29" title="Resolution (logic)"><span data-dcnode-id="5480" instrument_node="">resolution</span></a><span data-dcnode-id="5478" instrument_node=""> principle developed by </span><a data-dcnode-id="5476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Alan_Robinson" title="John Alan Robinson"><span data-dcnode-id="5477" instrument_node="">John Alan Robinson</span></a><span data-dcnode-id="5475" instrument_node="">.
</span></p><p data-dcnode-id="5460"><span data-dcnode-id="5473" instrument_node="">In addition to its use for finding proofs of mathematical theorems, automated theorem-proving has also been used for </span><a class="mw-redirect" data-dcnode-id="5471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Program_verification" title="Program verification"><span data-dcnode-id="5472" instrument_node="">program verification</span></a><span data-dcnode-id="5470" instrument_node=""> in computer science. However, already in 1958, </span><a data-dcnode-id="5468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McCarthy_%28computer_scientist%29" title="John McCarthy (computer scientist)"><span data-dcnode-id="5469" instrument_node="">John McCarthy</span></a><span data-dcnode-id="5467" instrument_node=""> proposed the </span><a data-dcnode-id="5465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advice_taker" title="Advice taker"><span data-dcnode-id="5466" instrument_node="">advice taker</span></a><span data-dcnode-id="5464" instrument_node="">, to represent information in formal logic and to derive answers to questions using automated theorem-proving. An important step in this direction was made by </span><a data-dcnode-id="5462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cordell_Green" title="Cordell Green"><span data-dcnode-id="5463" instrument_node="">Cordell Green</span></a><span data-dcnode-id="5461" instrument_node=""> in 1969, using a resolution theorem prover for question-answering and for such other applications in artificial intelligence as robot planning.
</span></p><p data-dcnode-id="5437"><span data-dcnode-id="5459" instrument_node="">The resolution theorem-prover used by Cordell Green bore little resemblance to human problem solving methods. In response to criticism of his approach, emanating from researchers at MIT, </span><a data-dcnode-id="5457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Kowalski" title="Robert Kowalski"><span data-dcnode-id="5458" instrument_node="">Robert Kowalski</span></a><span data-dcnode-id="5456" instrument_node=""> developed </span><a data-dcnode-id="5454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Logic_programming" title="Logic programming"><span data-dcnode-id="5455" instrument_node="">logic programming</span></a><span data-dcnode-id="5453" instrument_node=""> and </span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SLD_resolution" title="SLD resolution"><span data-dcnode-id="5452" instrument_node="">SLD resolution</span></a><span data-dcnode-id="5450" instrument_node="">,</span><sup class="reference" data-dcnode-id="5447" id="cite_ref-21"><a data-dcnode-id="5448" href="#cite_note-21"><span data-dcnode-id="5449" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5446" instrument_node=""> which solves problems by problem decomposition. He has advocated logic for both computer and human problem solving</span><sup class="reference" data-dcnode-id="5443" id="cite_ref-22"><a data-dcnode-id="5444" href="#cite_note-22"><span data-dcnode-id="5445" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5442" instrument_node=""> and computational logic to improve human thinking</span><sup class="reference" data-dcnode-id="5439" id="cite_ref-23"><a data-dcnode-id="5440" href="#cite_note-23"><span data-dcnode-id="5441" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5438" instrument_node="">
</span></p><span data-dcnode-id="5436" instrument_node="">
</span><h3 data-dcnode-id="5426"><span class="mw-headline" data-dcnode-id="5434" id="Engineering"><span data-dcnode-id="5435" instrument_node="">Engineering</span></span><span class="mw-editsection" data-dcnode-id="5427"><span class="mw-editsection-bracket" data-dcnode-id="5432"><span data-dcnode-id="5433" instrument_node="">[</span></span><a data-dcnode-id="5430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D6" title="Edit section: Engineering"><span data-dcnode-id="5431" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5425" instrument_node="">
</span><p data-dcnode-id="5417"><span data-dcnode-id="5424" instrument_node="">Problem solving is used when products or processes fail, so corrective action can be taken to prevent further </span><a data-dcnode-id="5422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Failure" title="Failure"><span data-dcnode-id="5423" instrument_node="">failures</span></a><span data-dcnode-id="5421" instrument_node="">. It can also be applied to a product or process prior to an actual failure event—when a potential problem can be predicted and analyzed, and mitigation applied so the problem never occurs. Techniques such as </span><a data-dcnode-id="5419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Failure_mode_and_effects_analysis" title="Failure mode and effects analysis"><span data-dcnode-id="5420" instrument_node="">failure mode and effects analysis</span></a><span data-dcnode-id="5418" instrument_node=""> can be used to proactively reduce the likelihood of problems occurring.
</span></p><p data-dcnode-id="5410"><a data-dcnode-id="5415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forensic_engineering" title="Forensic engineering"><span data-dcnode-id="5416" instrument_node="">Forensic engineering</span></a><span data-dcnode-id="5414" instrument_node=""> is an important technique of </span><a data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Failure_analysis" title="Failure analysis"><span data-dcnode-id="5413" instrument_node="">failure analysis</span></a><span data-dcnode-id="5411" instrument_node=""> that involves tracing product defects and flaws. Corrective action can then be taken to prevent further failures.
</span></p><p data-dcnode-id="5404"><span data-dcnode-id="5409" instrument_node="">Reverse engineering attempts to discover the original problem-solving logic used in developing a product by taking it apart.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-24"><a data-dcnode-id="5407" href="#cite_note-24"><span data-dcnode-id="5408" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5405" instrument_node="">
</span></p><span data-dcnode-id="5403" instrument_node="">
</span><h3 data-dcnode-id="5393"><span class="mw-headline" data-dcnode-id="5401" id="Military_science"><span data-dcnode-id="5402" instrument_node="">Military science</span></span><span class="mw-editsection" data-dcnode-id="5394"><span class="mw-editsection-bracket" data-dcnode-id="5399"><span data-dcnode-id="5400" instrument_node="">[</span></span><a data-dcnode-id="5397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D7" title="Edit section: Military science"><span data-dcnode-id="5398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5395"><span data-dcnode-id="5396" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5392" instrument_node="">
</span><p data-dcnode-id="5346"><span data-dcnode-id="5391" instrument_node="">In </span><a data-dcnode-id="5389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_science" title="Military science"><span data-dcnode-id="5390" instrument_node="">military science</span></a><span data-dcnode-id="5388" instrument_node="">, problem solving is linked to the concept of "end-states", the desired condition or situation that strategists wish to generate.</span><sup class="reference" data-dcnode-id="5385" id="cite_ref-USJFCOM_25-0"><a data-dcnode-id="5386" href="#cite_note-USJFCOM-25"><span data-dcnode-id="5387" instrument_node="">[25]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5382"><span data-dcnode-id="5383" title="Page / location: xiii, E-2"><span data-dcnode-id="5384" instrument_node="">: xiii, E-2 </span></span></sup><span data-dcnode-id="5381" instrument_node=""> The ability to solve problems is important at any </span><a data-dcnode-id="5379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Military_rank" title="Military rank"><span data-dcnode-id="5380" instrument_node="">military rank</span></a><span data-dcnode-id="5378" instrument_node="">, but is highly critical at the </span><a data-dcnode-id="5376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Command_and_control" title="Command and control"><span data-dcnode-id="5377" instrument_node="">command and control</span></a><span data-dcnode-id="5375" instrument_node=""> level, where it is strictly correlated to the deep understanding of qualitative and quantitative scenarios.</span><sup class="noprint Inline-Template" data-dcnode-id="5368" style="margin-left:0.1em; white-space:nowrap;"><span data-dcnode-id="5374" instrument_node="">[</span><i data-dcnode-id="5370"><a data-dcnode-id="5371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3APlease_clarify" title="Wikipedia:Please clarify"><span data-dcnode-id="5372" title="What scenarios? (September 2018)"><span data-dcnode-id="5373" instrument_node="">clarification needed</span></span></a></i><span data-dcnode-id="5369" instrument_node="">]</span></sup><span data-dcnode-id="5367" instrument_node=""> </span><i data-dcnode-id="5365"><span data-dcnode-id="5366" instrument_node="">Effectiveness</span></i><span data-dcnode-id="5364" instrument_node=""> of problem solving is used to measure the result of problem solving, tied to accomplishing the goal.</span><sup class="reference" data-dcnode-id="5361" id="cite_ref-USJFCOM_25-1"><a data-dcnode-id="5362" href="#cite_note-USJFCOM-25"><span data-dcnode-id="5363" instrument_node="">[25]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5358"><span data-dcnode-id="5359" title="Page / location: IV-24"><span data-dcnode-id="5360" instrument_node="">: IV-24 </span></span></sup><span data-dcnode-id="5357" instrument_node=""> </span><i data-dcnode-id="5355"><span data-dcnode-id="5356" instrument_node="">Planning</span></i><span data-dcnode-id="5354" instrument_node=""> for problem-solving is the process of determining how to achieve the goal</span><sup class="reference" data-dcnode-id="5351" id="cite_ref-USJFCOM_25-2"><a data-dcnode-id="5352" href="#cite_note-USJFCOM-25"><span data-dcnode-id="5353" instrument_node="">[25]</span></a></sup><sup class="reference nowrap" data-dcnode-id="5348"><span data-dcnode-id="5349" title="Page / location: IV-1"><span data-dcnode-id="5350" instrument_node="">: IV-1 </span></span></sup><span data-dcnode-id="5347" instrument_node="">
</span></p><span data-dcnode-id="5345" instrument_node="">
</span><h2 data-dcnode-id="5335"><span class="mw-headline" data-dcnode-id="5343" id="Problem-solving_strategies"><span data-dcnode-id="5344" instrument_node="">Problem-solving strategies</span></span><span class="mw-editsection" data-dcnode-id="5336"><span class="mw-editsection-bracket" data-dcnode-id="5341"><span data-dcnode-id="5342" instrument_node="">[</span></span><a data-dcnode-id="5339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D8" title="Edit section: Problem-solving strategies"><span data-dcnode-id="5340" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5337"><span data-dcnode-id="5338" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5334" instrument_node="">
</span><link data-dcnode-id="5333" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5329" role="note"><span data-dcnode-id="5332" instrument_node="">See also: </span><a data-dcnode-id="5330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Category%3AProblem_solving_skills" title="Category:Problem solving skills"><span data-dcnode-id="5331" instrument_node="">Category:Problem solving skills</span></a></div><span data-dcnode-id="5328" instrument_node="">
</span><p data-dcnode-id="5322"><span data-dcnode-id="5327" instrument_node="">Problem-solving strategies are the steps that one would use to find the problems that are in the way to getting to one's own goal. Some refer to this as the "problem-solving cycle".</span><sup class="reference" data-dcnode-id="5324" id="cite_ref-Bransford1993_26-0"><a data-dcnode-id="5325" href="#cite_note-Bransford1993-26"><span data-dcnode-id="5326" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5323" instrument_node="">
</span></p><p data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">In this cycle one will acknowledge, recognize the problem, define the problem, develop a strategy to fix the problem, organize the knowledge of the problem cycle, figure out the resources at the user's disposal, monitor one's progress, and evaluate the solution for accuracy. The reason it is called a cycle is that once one is completed with a problem another will usually pop up.
</span></p><p data-dcnode-id="5293"><b data-dcnode-id="5318"><span data-dcnode-id="5319" instrument_node="">Insight</span></b><span data-dcnode-id="5317" instrument_node=""> is the sudden solution to a long-vexing </span><b data-dcnode-id="5315"><span data-dcnode-id="5316" instrument_node="">problem</span></b><span data-dcnode-id="5314" instrument_node="">, a sudden recognition of a new idea, or a sudden understanding of a complex situation, an </span><a class="mw-redirect" data-dcnode-id="5310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aha%21_moment" title="Aha! moment"><i data-dcnode-id="5312"><span data-dcnode-id="5313" instrument_node="">Aha!</span></i><span data-dcnode-id="5311" instrument_node=""> moment</span></a><span data-dcnode-id="5309" instrument_node="">. Solutions found through </span><b data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">insight</span></b><span data-dcnode-id="5306" instrument_node=""> are often more accurate than those found through step-by-step analysis. To solve more problems at a faster rate, insight is necessary for selecting productive moves at different stages of the problem-solving cycle. This problem-solving strategy pertains specifically to problems referred to as insight problem. Unlike Newell and Simon's formal definition of move problems, there has not been a generally agreed upon definition of an insight problem (Ash, Jee, and Wiley, 2012;</span><sup class="reference" data-dcnode-id="5303" id="cite_ref-27"><a data-dcnode-id="5304" href="#cite_note-27"><span data-dcnode-id="5305" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5302" instrument_node=""> Chronicle, MacGregor, and Ormerod, 2004;</span><sup class="reference" data-dcnode-id="5299" id="cite_ref-28"><a data-dcnode-id="5300" href="#cite_note-28"><span data-dcnode-id="5301" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5298" instrument_node=""> Chu and MacGregor, 2011).</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-29"><a data-dcnode-id="5296" href="#cite_note-29"><span data-dcnode-id="5297" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5294" instrument_node="">
</span></p><p data-dcnode-id="5286"><a data-dcnode-id="5291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fredda_Blanchard-Fields" title="Fredda Blanchard-Fields"><span data-dcnode-id="5292" instrument_node="">Blanchard-Fields</span></a><sup class="reference" data-dcnode-id="5288" id="cite_ref-Blanchard-Fields_30-0"><a data-dcnode-id="5289" href="#cite_note-Blanchard-Fields-30"><span data-dcnode-id="5290" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5287" instrument_node=""> looks at problem solving from one of two facets. The first looking at those problems that only have one solution (like mathematical problems, or fact-based questions) which are grounded in psychometric intelligence. The other is socioemotional in nature and have answers that change constantly (like what's your favorite color or what you should get someone for Christmas).
</span></p><p data-dcnode-id="5278"><span data-dcnode-id="5285" instrument_node="">The following techniques are usually called </span><i data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">problem-solving strategies</span></i><sup class="reference" data-dcnode-id="5280" id="cite_ref-31"><a data-dcnode-id="5281" href="#cite_note-31"><span data-dcnode-id="5282" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5279" instrument_node="">
</span></p><span data-dcnode-id="5277" instrument_node="">
</span><ul data-dcnode-id="5203"><li data-dcnode-id="5273"><a data-dcnode-id="5275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abstraction" title="Abstraction"><span data-dcnode-id="5276" instrument_node="">Abstraction</span></a><span data-dcnode-id="5274" instrument_node="">: solving the problem in a model of the system before applying it to the real system</span></li><span data-dcnode-id="5272" instrument_node="">
</span><li data-dcnode-id="5268"><a data-dcnode-id="5270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Analogy" title="Analogy"><span data-dcnode-id="5271" instrument_node="">Analogy</span></a><span data-dcnode-id="5269" instrument_node="">: using a solution that solves an analogous problem</span></li><span data-dcnode-id="5267" instrument_node="">
</span><li data-dcnode-id="5263"><a data-dcnode-id="5265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brainstorming" title="Brainstorming"><span data-dcnode-id="5266" instrument_node="">Brainstorming</span></a><span data-dcnode-id="5264" instrument_node="">: (especially among groups of people) suggesting a large number of solutions or ideas and combining and developing them until an optimum solution is found</span></li><span data-dcnode-id="5262" instrument_node="">
</span><li data-dcnode-id="5259"><a data-dcnode-id="5260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Critical_thinking" title="Critical thinking"><span data-dcnode-id="5261" instrument_node="">Critical thinking</span></a></li><span data-dcnode-id="5258" instrument_node="">
</span><li data-dcnode-id="5254"><a class="mw-redirect" data-dcnode-id="5256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Divide_and_conquer_algorithm" title="Divide and conquer algorithm"><span data-dcnode-id="5257" instrument_node="">Divide and conquer</span></a><span data-dcnode-id="5255" instrument_node="">: breaking down a large, complex problem into smaller, solvable problems</span></li><span data-dcnode-id="5253" instrument_node="">
</span><li data-dcnode-id="5249"><a class="mw-redirect" data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hypothesis_testing" title="Hypothesis testing"><span data-dcnode-id="5252" instrument_node="">Hypothesis testing</span></a><span data-dcnode-id="5250" instrument_node="">: assuming a possible explanation to the problem and trying to prove (or, in some contexts, disprove) the assumption</span></li><span data-dcnode-id="5248" instrument_node="">
</span><li data-dcnode-id="5244"><a data-dcnode-id="5246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lateral_thinking" title="Lateral thinking"><span data-dcnode-id="5247" instrument_node="">Lateral thinking</span></a><span data-dcnode-id="5245" instrument_node="">: approaching solutions indirectly and creatively</span></li><span data-dcnode-id="5243" instrument_node="">
</span><li data-dcnode-id="5239"><a class="mw-redirect" data-dcnode-id="5241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means-ends_analysis" title="Means-ends analysis"><span data-dcnode-id="5242" instrument_node="">Means-ends analysis</span></a><span data-dcnode-id="5240" instrument_node="">: choosing an action at each step to move closer to the goal</span></li><span data-dcnode-id="5238" instrument_node="">
</span><li data-dcnode-id="5234"><a data-dcnode-id="5236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Method_of_focal_objects" title="Method of focal objects"><span data-dcnode-id="5237" instrument_node="">Method of focal objects</span></a><span data-dcnode-id="5235" instrument_node="">: synthesizing seemingly non-matching characteristics of different objects into something new</span></li><span data-dcnode-id="5233" instrument_node="">
</span><li data-dcnode-id="5229"><a data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Morphological_analysis_%28problem-solving%29" title="Morphological analysis (problem-solving)"><span data-dcnode-id="5232" instrument_node="">Morphological analysis</span></a><span data-dcnode-id="5230" instrument_node="">: assessing the output and interactions of an entire system</span></li><span data-dcnode-id="5228" instrument_node="">
</span><li data-dcnode-id="5224"><a data-dcnode-id="5226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proof_%28truth%29" title="Proof (truth)"><span data-dcnode-id="5227" instrument_node="">Proof</span></a><span data-dcnode-id="5225" instrument_node="">: try to prove that the problem cannot be solved. The point where the proof fails will be the starting point for solving it</span></li><span data-dcnode-id="5223" instrument_node="">
</span><li data-dcnode-id="5219"><a data-dcnode-id="5221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reduction_%28complexity%29" title="Reduction (complexity)"><span data-dcnode-id="5222" instrument_node="">Reduction</span></a><span data-dcnode-id="5220" instrument_node="">: transforming the problem into another problem for which solutions exist</span></li><span data-dcnode-id="5218" instrument_node="">
</span><li data-dcnode-id="5214"><a data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Research" title="Research"><span data-dcnode-id="5217" instrument_node="">Research</span></a><span data-dcnode-id="5215" instrument_node="">: employing existing ideas or adapting existing solutions to similar problems</span></li><span data-dcnode-id="5213" instrument_node="">
</span><li data-dcnode-id="5209"><a data-dcnode-id="5211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Root_cause_analysis" title="Root cause analysis"><span data-dcnode-id="5212" instrument_node="">Root cause analysis</span></a><span data-dcnode-id="5210" instrument_node="">: identifying the cause of a problem</span></li><span data-dcnode-id="5208" instrument_node="">
</span><li data-dcnode-id="5204"><a class="mw-redirect" data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trial-and-error" title="Trial-and-error"><span data-dcnode-id="5207" instrument_node="">Trial-and-error</span></a><span data-dcnode-id="5205" instrument_node="">: testing possible solutions until the right one is found</span></li></ul><span data-dcnode-id="5202" instrument_node="">

</span><li data-dcnode-id="5134"><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A3_problem_solving" title="A3 problem solving"><span data-dcnode-id="5136" instrument_node="">A3 problem solving</span></a></li><span data-dcnode-id="5133" instrument_node="">
