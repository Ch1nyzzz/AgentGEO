</span><li data-dcnode-id="5126"><a data-dcnode-id="5127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Swarm_intelligence" title="Swarm intelligence"><span data-dcnode-id="5128" instrument_node="">Hive mind</span></a></li><span data-dcnode-id="5125" instrument_node="">
</span><li data-dcnode-id="5122"><a class="new" data-dcnode-id="5123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DExperimental_Action_Plan%26action%3Dedit%26redlink%3D1" title="Experimental Action Plan (page does not exist)"><span data-dcnode-id="5124" instrument_node="">Experimental Action Plan</span></a></li></ul><span data-dcnode-id="5120" instrument_node="">
</span><h2 data-dcnode-id="5109"><span class="mw-headline" data-dcnode-id="5117" id="Common_barriers"><span data-dcnode-id="5119" instrument_node="">Common barriers</span><span class="anchor" data-dcnode-id="5118" id="Common_barriers_to_problem_solving"></span></span><span class="mw-editsection" data-dcnode-id="5110"><span class="mw-editsection-bracket" data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">[</span></span><a data-dcnode-id="5113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D10" title="Edit section: Common barriers"><span data-dcnode-id="5114" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5111"><span data-dcnode-id="5112" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5108" instrument_node="">
</span><p data-dcnode-id="5097"><span data-dcnode-id="5107" instrument_node="">Common barriers to problem solving are mental constructs that impede our ability to correctly solve problems. These barriers prevent people from solving problems in the most efficient manner possible. Five of the most common processes and factors that researchers have identified as barriers to problem solving are </span><a data-dcnode-id="5105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confirmation_bias" title="Confirmation bias"><span data-dcnode-id="5106" instrument_node="">confirmation bias</span></a><span data-dcnode-id="5104" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mental_set" title="Mental set"><span data-dcnode-id="5103" instrument_node="">mental set</span></a><span data-dcnode-id="5101" instrument_node="">, </span><a data-dcnode-id="5099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_fixedness" title="Functional fixedness"><span data-dcnode-id="5100" instrument_node="">functional fixedness</span></a><span data-dcnode-id="5098" instrument_node="">, unnecessary constraints, and irrelevant information.
</span></p><span data-dcnode-id="5096" instrument_node="">
</span><h3 data-dcnode-id="5086"><span class="mw-headline" data-dcnode-id="5094" id="Confirmation_bias"><span data-dcnode-id="5095" instrument_node="">Confirmation bias</span></span><span class="mw-editsection" data-dcnode-id="5087"><span class="mw-editsection-bracket" data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">[</span></span><a data-dcnode-id="5090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D11" title="Edit section: Confirmation bias"><span data-dcnode-id="5091" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5088"><span data-dcnode-id="5089" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5085" instrument_node="">
</span><link data-dcnode-id="5084" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5080" role="note"><span data-dcnode-id="5083" instrument_node="">Main article: </span><a data-dcnode-id="5081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confirmation_bias" title="Confirmation bias"><span data-dcnode-id="5082" instrument_node="">Confirmation bias</span></a></div><span data-dcnode-id="5079" instrument_node="">
</span><p data-dcnode-id="5051"><span data-dcnode-id="5078" instrument_node="">Confirmation bias is an unintentional bias caused by the collection and use of data in a way that favors a preconceived notion. The beliefs affected by confirmation bias do not need to have </span><i data-dcnode-id="5075"><a data-dcnode-id="5076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Motivation" title="Motivation"><span data-dcnode-id="5077" instrument_node="">motivation</span></a></i><span data-dcnode-id="5074" instrument_node="">, the desire to defend or find substantiation for beliefs that are important to that person.</span><sup class="reference" data-dcnode-id="5071" id="cite_ref-Nickerson1998_32-0"><a data-dcnode-id="5072" href="#cite_note-Nickerson1998-32"><span data-dcnode-id="5073" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5070" instrument_node=""> Research has found that professionals within scientific fields of study also experience confirmation bias. Andreas Hergovich, Reinhard Schott, and Christoph Burger's experiment conducted online, for instance, suggested that professionals within the field of psychological research are likely to view scientific studies that agree with their preconceived notions more favorably than studies that clash with their established beliefs.</span><sup class="reference" data-dcnode-id="5067" id="cite_ref-33"><a data-dcnode-id="5068" href="#cite_note-33"><span data-dcnode-id="5069" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5066" instrument_node=""> According to Raymond Nickerson, one can see the consequences of confirmation bias in real-life situations, which range in severity from inefficient government policies to genocide. Nickerson argued that those who killed people accused of </span><a data-dcnode-id="5064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Witch-hunt" title="Witch-hunt"><span data-dcnode-id="5065" instrument_node="">witchcraft</span></a><span data-dcnode-id="5063" instrument_node=""> demonstrated confirmation bias with motivation. Researcher Michael Allen found evidence for confirmation bias with motivation in school children who worked to manipulate their science experiments in such a way that would produce favorable results.</span><sup class="reference" data-dcnode-id="5060" id="cite_ref-34"><a data-dcnode-id="5061" href="#cite_note-34"><span data-dcnode-id="5062" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5059" instrument_node=""> However, confirmation bias does not necessarily require motivation. In 1960, </span><a data-dcnode-id="5057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peter_Cathcart_Wason" title="Peter Cathcart Wason"><span data-dcnode-id="5058" instrument_node="">Peter Cathcart Wason</span></a><span data-dcnode-id="5056" instrument_node=""> conducted an experiment in which participants first viewed three numbers and then created a hypothesis that proposed a rule that could have been used to create that triplet of numbers. When testing their hypotheses, participants tended to only create additional triplets of numbers that would confirm their hypotheses, and tended not to create triplets that would negate or disprove their hypotheses. Thus research also shows that people can and do work to confirm theories or ideas that do not support or engage personally significant beliefs.</span><sup class="reference" data-dcnode-id="5053" id="cite_ref-35"><a data-dcnode-id="5054" href="#cite_note-35"><span data-dcnode-id="5055" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5052" instrument_node="">
</span></p><span data-dcnode-id="5050" instrument_node="">
</span><h3 data-dcnode-id="5040"><span class="mw-headline" data-dcnode-id="5048" id="Mental_set"><span data-dcnode-id="5049" instrument_node="">Mental set</span></span><span class="mw-editsection" data-dcnode-id="5041"><span class="mw-editsection-bracket" data-dcnode-id="5046"><span data-dcnode-id="5047" instrument_node="">[</span></span><a data-dcnode-id="5044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D12" title="Edit section: Mental set"><span data-dcnode-id="5045" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5042"><span data-dcnode-id="5043" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5039" instrument_node="">
</span><link data-dcnode-id="5038" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5034" role="note"><span data-dcnode-id="5037" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mental_set" title="Mental set"><span data-dcnode-id="5036" instrument_node="">Mental set</span></a></div><span data-dcnode-id="5033" instrument_node="">
</span><p data-dcnode-id="5006"><span data-dcnode-id="5032" instrument_node="">Mental set was first articulated by </span><a data-dcnode-id="5030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abraham_S._Luchins" title="Abraham S. Luchins"><span data-dcnode-id="5031" instrument_node="">Abraham Luchins</span></a><span data-dcnode-id="5029" instrument_node=""> in the 1940s and demonstrated in his well-known water jug experiments.</span><sup class="reference" data-dcnode-id="5026" id="cite_ref-36"><a data-dcnode-id="5027" href="#cite_note-36"><span data-dcnode-id="5028" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5025" instrument_node=""> In these experiments, participants were asked to fill one jug with a specific amount of water using only other jugs (typically three) with different maximum capacities as tools. After Luchins gave his participants a set of water jug problems that could all be solved by employing a single technique, he would then give them a problem that could either be solved using that same technique or a novel and simpler method. Luchins discovered that his participants tended to use the same technique that they had become accustomed to despite the possibility of using a simpler alternative.</span><sup class="reference" data-dcnode-id="5022" id="cite_ref-37"><a data-dcnode-id="5023" href="#cite_note-37"><span data-dcnode-id="5024" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5021" instrument_node=""> Thus mental set describes one's inclination to attempt to solve problems in such a way that has proved successful in previous experiences. However, as Luchins' work revealed, such methods for finding a solution that have worked in the past may not be adequate or optimal for certain new but similar problems. Therefore, it is often necessary for people to move beyond their mental sets in order to find solutions. This was again demonstrated in </span><a data-dcnode-id="5019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norman_Maier" title="Norman Maier"><span data-dcnode-id="5020" instrument_node="">Norman Maier</span></a><span data-dcnode-id="5018" instrument_node="">'s 1931 experiment, which challenged participants to solve a problem by using a household object (pliers) in an unconventional manner. Maier observed that participants were often unable to view the object in a way that strayed from its typical use, a phenomenon regarded as a particular form of mental set (more specifically known as functional fixedness, which is the topic of the following section). When people cling rigidly to their mental sets, they are said to be experiencing </span><i data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">fixation</span></i><span data-dcnode-id="5015" instrument_node="">, a seeming obsession or preoccupation with attempted strategies that are repeatedly unsuccessful.</span><sup class="reference" data-dcnode-id="5012" id="cite_ref-Wiley1998_38-0"><a data-dcnode-id="5013" href="#cite_note-Wiley1998-38"><span data-dcnode-id="5014" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5011" instrument_node=""> In the late 1990s, researcher Jennifer Wiley worked to reveal that expertise can work to create a mental set in people considered to be experts in their fields, and she gained evidence that the mental set created by expertise could lead to the development of fixation.</span><sup class="reference" data-dcnode-id="5008" id="cite_ref-Wiley1998_38-1"><a data-dcnode-id="5009" href="#cite_note-Wiley1998-38"><span data-dcnode-id="5010" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5007" instrument_node="">
</span></p><span data-dcnode-id="5005" instrument_node="">
</span><h3 data-dcnode-id="4995"><span class="mw-headline" data-dcnode-id="5003" id="Functional_fixedness"><span data-dcnode-id="5004" instrument_node="">Functional fixedness</span></span><span class="mw-editsection" data-dcnode-id="4996"><span class="mw-editsection-bracket" data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">[</span></span><a data-dcnode-id="4999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D13" title="Edit section: Functional fixedness"><span data-dcnode-id="5000" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4994" instrument_node="">
</span><link data-dcnode-id="4993" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4989" role="note"><span data-dcnode-id="4992" instrument_node="">Main article: </span><a data-dcnode-id="4990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Functional_fixedness" title="Functional fixedness"><span data-dcnode-id="4991" instrument_node="">Functional fixedness</span></a></div><span data-dcnode-id="4988" instrument_node="">
</span><p data-dcnode-id="4978"><span data-dcnode-id="4987" instrument_node="">Functional fixedness is a specific form of mental set and fixation, which was alluded to earlier in the Maier experiment, and furthermore it is another way in which cognitive bias can be seen throughout daily life. Tim German and Clark Barrett describe this barrier as the fixed design of an object hindering the individual's ability to see it serving other functions. In more technical terms, these researchers explained that "[s]ubjects become 'fixed' on the design function of the objects, and problem solving suffers relative to control conditions in which the object's function is not demonstrated."</span><sup class="reference" data-dcnode-id="4984" id="cite_ref-39"><a data-dcnode-id="4985" href="#cite_note-39"><span data-dcnode-id="4986" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4983" instrument_node=""> Functional fixedness is defined as only having that primary function of the object itself hinder the ability of it serving another purpose other than its original function. In research that highlighted the primary reasons that young children are immune to functional fixedness, it was stated that "functional fixedness...[is when] subjects are hindered in reaching the solution to a problem by their knowledge of an object's conventional function."</span><sup class="reference" data-dcnode-id="4980" id="cite_ref-40"><a data-dcnode-id="4981" href="#cite_note-40"><span data-dcnode-id="4982" instrument_node="">[40]</span></a></sup><span data-dcnode-id="4979" instrument_node=""> Furthermore, it is important to note that functional fixedness can be easily expressed in commonplace situations. For instance, imagine the following situation: a man sees a bug on the floor that he wants to kill, but the only thing in his hand at the moment is a can of air freshener. If the man starts looking around for something in the house to kill the bug with instead of realizing that the can of air freshener could in fact be used not only as having its main function as to freshen the air, he is said to be experiencing functional fixedness. The man's knowledge of the can being served as purely an air freshener hindered his ability to realize that it too could have been used to serve another purpose, which in this instance was as an instrument to kill the bug. Functional fixedness can happen on multiple occasions and can cause us to have certain cognitive biases. If people only see an object as serving one primary focus, then they fail to realize that the object can be used in various ways other than its intended purpose. This can in turn cause many issues with regards to problem solving.
</span></p><p data-dcnode-id="4972"><span data-dcnode-id="4977" instrument_node="">Functional fixedness limits the ability for people to solve problems accurately by causing one to have a very narrow way of thinking. Functional fixedness can be seen in other types of learning behaviors as well. For instance, research has discovered the presence of functional fixedness in many educational instances. Researchers Furio, Calatayud, Baracenas, and Padilla stated that "... functional fixedness may be found in learning concepts as well as in solving chemistry problems."</span><sup class="reference" data-dcnode-id="4974" id="cite_ref-41"><a data-dcnode-id="4975" href="#cite_note-41"><span data-dcnode-id="4976" instrument_node="">[41]</span></a></sup><span data-dcnode-id="4973" instrument_node=""> There was more emphasis on this function being seen in this type of subject and others.
</span></p><p data-dcnode-id="4966"><span data-dcnode-id="4971" instrument_node="">There are several hypotheses in regards to how functional fixedness relates to problem solving.</span><sup class="reference" data-dcnode-id="4968" id="cite_ref-42"><a data-dcnode-id="4969" href="#cite_note-42"><span data-dcnode-id="4970" instrument_node="">[42]</span></a></sup><span data-dcnode-id="4967" instrument_node=""> There are also many ways in which a person can run into problems while thinking of a particular object with having this function. If there is one way in which a person usually thinks of something rather than multiple ways then this can lead to a constraint in how the person thinks of that particular object. This can be seen as narrow minded thinking, which is defined as a way in which one is not able to see or accept certain ideas in a particular context. Functional fixedness is very closely related to this as previously mentioned. This can be done intentionally and or unintentionally, but for the most part it seems as if this process to problem solving is done in an unintentional way.
</span></p><p data-dcnode-id="4964"><span data-dcnode-id="4965" instrument_node="">Functional fixedness can affect problem solvers in at least two particular ways. The first is with regards to time, as functional fixedness causes people to use more time than necessary to solve any given problem. Secondly, functional fixedness often causes solvers to make more attempts to solve a problem than they would have made if they were not experiencing this cognitive barrier. In the worst case, functional fixedness can completely prevent a person from realizing a solution to a problem. Functional fixedness is a commonplace occurrence, which affects the lives of many people.
</span></p><span data-dcnode-id="4963" instrument_node="">
</span><h3 data-dcnode-id="4953"><span class="mw-headline" data-dcnode-id="4961" id="Unnecessary_constraints"><span data-dcnode-id="4962" instrument_node="">Unnecessary constraints</span></span><span class="mw-editsection" data-dcnode-id="4954"><span class="mw-editsection-bracket" data-dcnode-id="4959"><span data-dcnode-id="4960" instrument_node="">[</span></span><a data-dcnode-id="4957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D14" title="Edit section: Unnecessary constraints"><span data-dcnode-id="4958" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4955"><span data-dcnode-id="4956" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4952" instrument_node="">
</span><p data-dcnode-id="4946"><span data-dcnode-id="4951" instrument_node="">Unnecessary constraints are another very common barrier that people face while attempting to problem-solve. This particular phenomenon occurs when the subject, trying to solve the problem subconsciously, places boundaries on the task at hand, which in turn forces him or her to strain to be more innovative in their thinking. The solver hits a barrier when they become fixated on only one way to solve their problem, and it becomes increasingly difficult to see anything but the method they have chosen. Typically, the solver experiences this when attempting to use a method they have already experienced success from, and they can not help but try to make it work in the present circumstances as well, even if they see that it is counterproductive.</span><sup class="reference" data-dcnode-id="4948" id="cite_ref-Kellogg,_R._T._2003_43-0"><a data-dcnode-id="4949" href="#cite_note-Kellogg,_R._T._2003-43"><span data-dcnode-id="4950" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4947" instrument_node="">
</span></p><p data-dcnode-id="4926"><a data-dcnode-id="4944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Groupthink" title="Groupthink"><span data-dcnode-id="4945" instrument_node="">Groupthink</span></a><span data-dcnode-id="4943" instrument_node="">, or taking on the mindset of the rest of the group members, can also act as an unnecessary constraint while trying to solve problems.</span><sup class="reference" data-dcnode-id="4940" id="cite_ref-44"><a data-dcnode-id="4941" href="#cite_note-44"><span data-dcnode-id="4942" instrument_node="">[44]</span></a></sup><span data-dcnode-id="4939" instrument_node=""> This is due to the fact that with everybody thinking the same thing, stopping on the same conclusions, and inhibiting themselves to think beyond this. This is very common, but the most well-known example of this barrier making itself present is in the famous example of the dot problem. In this example, there are nine dots lying on a grid three dots across and three dots running up and down. The solver is then asked to draw no more than four lines, without lifting their pen or pencil from the paper. This series of lines should connect all of the dots on the paper. Then, what typically happens is the subject creates an assumption in their mind that they must connect the dots without letting his or her pen or pencil go outside of the square of dots. Standardized procedures like this can often bring mentally invented constraints of this kind,</span><sup class="reference" data-dcnode-id="4936" id="cite_ref-45"><a data-dcnode-id="4937" href="#cite_note-45"><span data-dcnode-id="4938" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4935" instrument_node=""> and researchers have found a 0% correct solution rate in the time allotted for the task to be completed.</span><sup class="reference" data-dcnode-id="4932" id="cite_ref-46"><a data-dcnode-id="4933" href="#cite_note-46"><span data-dcnode-id="4934" instrument_node="">[46]</span></a></sup><span data-dcnode-id="4931" instrument_node=""> The imposed constraint inhibits the solver to think beyond the bounds of the dots. It is from this phenomenon that the expression "think outside the box" is derived.</span><sup class="reference" data-dcnode-id="4928" id="cite_ref-Weiten,_Wayne_2011_47-0"><a data-dcnode-id="4929" href="#cite_note-Weiten,_Wayne_2011-47"><span data-dcnode-id="4930" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4927" instrument_node="">
</span></p><p data-dcnode-id="4913"><span data-dcnode-id="4925" instrument_node="">This problem can be quickly solved with a dawning of realization, or </span><i data-dcnode-id="4923"><span data-dcnode-id="4924" instrument_node="">insight</span></i><span data-dcnode-id="4922" instrument_node="">. A few minutes of struggling over a problem can bring these sudden insights, where the solver quickly sees the solution clearly. Problems such as this are most typically solved via insight and can be very difficult for the subject depending on either how they have structured the problem in their minds, how they draw on their past experiences, and how much they juggle this information in their working memories</span><sup class="reference" data-dcnode-id="4919" id="cite_ref-Weiten,_Wayne_2011_47-1"><a data-dcnode-id="4920" href="#cite_note-Weiten,_Wayne_2011-47"><span data-dcnode-id="4921" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4918" instrument_node=""> In the case of the nine-dot example, the solver has already been structured incorrectly in their minds because of the constraint that they have placed upon the solution. In addition to this, people experience struggles when they try to compare the problem to their prior knowledge, and they think they must keep their lines within the dots and not go beyond. They do this because trying to envision the dots connected outside of the basic square puts a strain on their working memory.</span><sup class="reference" data-dcnode-id="4915" id="cite_ref-Weiten,_Wayne_2011_47-2"><a data-dcnode-id="4916" href="#cite_note-Weiten,_Wayne_2011-47"><span data-dcnode-id="4917" instrument_node="">[47]</span></a></sup><span data-dcnode-id="4914" instrument_node="">
</span></p><p data-dcnode-id="4907"><span data-dcnode-id="4912" instrument_node="">The solution to the problem becomes obvious as insight occurs following incremental movements made toward the solution. These tiny movements happen without the solver knowing. Then when the insight is realized fully, the "aha" moment happens for the subject.</span><sup class="reference" data-dcnode-id="4909" id="cite_ref-48"><a data-dcnode-id="4910" href="#cite_note-48"><span data-dcnode-id="4911" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4908" instrument_node=""> These moments of insight can take a long while to manifest or not so long at other times, but the way that the solution is arrived at after toiling over these barriers stays the same.
</span></p><span data-dcnode-id="4906" instrument_node="">
</span><h3 data-dcnode-id="4896"><span class="mw-headline" data-dcnode-id="4904" id="Irrelevant_information"><span data-dcnode-id="4905" instrument_node="">Irrelevant information</span></span><span class="mw-editsection" data-dcnode-id="4897"><span class="mw-editsection-bracket" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">[</span></span><a data-dcnode-id="4900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D15" title="Edit section: Irrelevant information"><span data-dcnode-id="4901" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4898"><span data-dcnode-id="4899" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4895" instrument_node="">
</span><link data-dcnode-id="4894" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4887" role="note"><span data-dcnode-id="4893" instrument_node="">See also: </span><a data-dcnode-id="4891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_overload" title="Information overload"><span data-dcnode-id="4892" instrument_node="">Information overload</span></a><span data-dcnode-id="4890" instrument_node=""> and </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_media" title="Mass media"><span data-dcnode-id="4889" instrument_node="">Mass media</span></a></div><span data-dcnode-id="4886" instrument_node="">
</span><p data-dcnode-id="4870"><span data-dcnode-id="4885" instrument_node="">Irrelevant information is information presented within a problem that is unrelated or unimportant to the specific problem.</span><sup class="reference" data-dcnode-id="4882" id="cite_ref-Kellogg,_R._T._2003_43-1"><a data-dcnode-id="4883" href="#cite_note-Kellogg,_R._T._2003-43"><span data-dcnode-id="4884" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4881" instrument_node=""> Within the specific context of the problem, irrelevant information would serve no purpose in helping solve that particular problem. Often </span><i data-dcnode-id="4879"><span data-dcnode-id="4880" instrument_node="">irrelevant information</span></i><span data-dcnode-id="4878" instrument_node=""> is detrimental to the problem solving process. It is a common barrier that many people have trouble getting through, especially if they are not aware of it. </span><i data-dcnode-id="4876"><span data-dcnode-id="4877" instrument_node="">Irrelevant information</span></i><span data-dcnode-id="4875" instrument_node=""> makes solving otherwise relatively simple problems much harder.</span><sup class="reference" data-dcnode-id="4872" id="cite_ref-49"><a data-dcnode-id="4873" href="#cite_note-49"><span data-dcnode-id="4874" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4871" instrument_node="">
</span></p><p data-dcnode-id="4864"><span data-dcnode-id="4869" instrument_node="">For example: "Fifteen percent of the people in Topeka have unlisted telephone numbers. You select 200 names at random from the Topeka phone book. How many of these people have unlisted phone numbers?"</span><sup class="reference" data-dcnode-id="4866" id="cite_ref-50"><a data-dcnode-id="4867" href="#cite_note-50"><span data-dcnode-id="4868" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4865" instrument_node="">
</span></p><p data-dcnode-id="4852"><span data-dcnode-id="4863" instrument_node="">The people that are not listed in the phone book would not be among the 200 names you selected. The individuals looking at this task would have naturally wanted to use the 15% given to them in the problem. They see that there is information present and they immediately think that it needs to be used. This of course is not true. These kinds of questions are often used to test students taking aptitude tests or cognitive evaluations.</span><sup class="reference" data-dcnode-id="4860" id="cite_ref-Walinga,_Jennifer_2011_51-0"><a data-dcnode-id="4861" href="#cite_note-Walinga,_Jennifer_2011-51"><span data-dcnode-id="4862" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4859" instrument_node=""> They aren't meant to be difficult but they are meant to require thinking that is not necessarily common. </span><i data-dcnode-id="4857"><span data-dcnode-id="4858" instrument_node="">Irrelevant Information</span></i><span data-dcnode-id="4856" instrument_node=""> is commonly represented in math problems, </span><a data-dcnode-id="4854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Word_problem_%28mathematics_education%29" title="Word problem (mathematics education)"><span data-dcnode-id="4855" instrument_node="">word problems</span></a><span data-dcnode-id="4853" instrument_node=""> specifically, where numerical information is put for the purpose of challenging the individual.
</span></p><p data-dcnode-id="4846"><span data-dcnode-id="4851" instrument_node="">One reason irrelevant information is so effective at keeping a person off topic and away from the relevant information, is in how it is represented.</span><sup class="reference" data-dcnode-id="4848" id="cite_ref-Walinga,_Jennifer_2011_51-1"><a data-dcnode-id="4849" href="#cite_note-Walinga,_Jennifer_2011-51"><span data-dcnode-id="4850" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4847" instrument_node=""> The way information is represented can make a vast difference in how difficult the problem is to be overcome. Whether a problem is represented visually, verbally, spatially, or mathematically, irrelevant information can have a profound effect on how long a problem takes to be solved; or if it's even possible. The Buddhist monk problem is a classic example of irrelevant information and how it can be represented in different ways:
</span></p><span data-dcnode-id="4845" instrument_node="">
</span><dl data-dcnode-id="4840"><dd data-dcnode-id="4841"><dl data-dcnode-id="4842"><dd data-dcnode-id="4843"><span data-dcnode-id="4844" instrument_node="">A Buddhist monk begins at dawn one day walking up a mountain, reaches the top at sunset, meditates at the top for several days until one dawn when he begins to walk back to the foot of the mountain, which he reaches at sunset. Making no assumptions about his starting or stopping or about his pace during the trips, prove that there is a place on the path which he occupies at the same hour of the day on the two separate journeys.</span></dd></dl></dd></dl><span data-dcnode-id="4839" instrument_node="">
</span><p data-dcnode-id="4831"><span data-dcnode-id="4838" instrument_node="">This problem is near impossible to solve because of how the information is represented. Because it is written out in a way that represents the information verbally, it causes us to try and create a mental image of the paragraph. This is often very difficult to do especially with all the </span><i data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">irrelevant information</span></i><span data-dcnode-id="4835" instrument_node=""> involved in the question. This example is made much easier to understand when the paragraph is represented visually. Now if the same problem was asked, but it was also accompanied by a corresponding graph, it would be far easier to answer this question; </span><i data-dcnode-id="4833"><span data-dcnode-id="4834" instrument_node="">irrelevant information</span></i><span data-dcnode-id="4832" instrument_node=""> no longer serves as a road block. By representing the problem visually, there are no difficult words to understand or scenarios to imagine. The visual representation of this problem has removed the difficulty of solving it.
</span></p><p data-dcnode-id="4815"><span data-dcnode-id="4830" instrument_node="">These types of representations are often used to make difficult problems easier.</span><sup class="reference" data-dcnode-id="4827" id="cite_ref-52"><a data-dcnode-id="4828" href="#cite_note-52"><span data-dcnode-id="4829" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4826" instrument_node=""> They can be used on tests as a strategy to remove </span><i data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">Irrelevant Information,</span></i><span data-dcnode-id="4823" instrument_node=""> which is one of the most common forms of barriers when discussing the issues of problem solving.</span><sup class="reference" data-dcnode-id="4820" id="cite_ref-Kellogg,_R._T._2003_43-2"><a data-dcnode-id="4821" href="#cite_note-Kellogg,_R._T._2003-43"><span data-dcnode-id="4822" instrument_node="">[43]</span></a></sup><span data-dcnode-id="4819" instrument_node=""> Identifying crucial information presented in a problem and then being able to correctly identify its usefulness is essential. Being aware of </span><i data-dcnode-id="4817"><span data-dcnode-id="4818" instrument_node="">irrelevant information</span></i><span data-dcnode-id="4816" instrument_node=""> is the first step in overcoming this common barrier.
</span></p><span data-dcnode-id="4814" instrument_node="">
</span><h3 data-dcnode-id="4804"><span class="mw-headline" data-dcnode-id="4812" id="Other_barriers_for_individuals"><span data-dcnode-id="4813" instrument_node="">Other barriers for individuals</span></span><span class="mw-editsection" data-dcnode-id="4805"><span class="mw-editsection-bracket" data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">[</span></span><a data-dcnode-id="4808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D16" title="Edit section: Other barriers for individuals"><span data-dcnode-id="4809" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4806"><span data-dcnode-id="4807" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4803" instrument_node="">
</span><p data-dcnode-id="4786"><a data-dcnode-id="4801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Individual" title="Individual"><span data-dcnode-id="4802" instrument_node="">Individual</span></a><span data-dcnode-id="4800" instrument_node=""> humans engaged in problem-solving tend to overlook subtractive changes, including those that are critical elements of efficient solutions. This tendency to solve by first, only or mostly creating or adding elements, rather than by subtracting elements or processes is shown to intensify with higher </span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_load" title="Cognitive load"><span data-dcnode-id="4799" instrument_node="">cognitive loads</span></a><span data-dcnode-id="4797" instrument_node=""> such as </span><a data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_overload" title="Information overload"><span data-dcnode-id="4796" instrument_node="">information overload</span></a><span data-dcnode-id="4794" instrument_node="">.</span><sup class="reference" data-dcnode-id="4791" id="cite_ref-53"><a data-dcnode-id="4792" href="#cite_note-53"><span data-dcnode-id="4793" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="4788" id="cite_ref-54"><a data-dcnode-id="4789" href="#cite_note-54"><span data-dcnode-id="4790" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4787" instrument_node="">
</span></p><span data-dcnode-id="4785" instrument_node="">
</span><h2 data-dcnode-id="4775"><span class="mw-headline" data-dcnode-id="4783" id="Dreaming:_problem-solving_without_waking_consciousness"><span data-dcnode-id="4784" instrument_node="">Dreaming: problem-solving without waking consciousness</span></span><span class="mw-editsection" data-dcnode-id="4776"><span class="mw-editsection-bracket" data-dcnode-id="4781"><span data-dcnode-id="4782" instrument_node="">[</span></span><a data-dcnode-id="4779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D17" title="Edit section: Dreaming: problem-solving without waking consciousness"><span data-dcnode-id="4780" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4777"><span data-dcnode-id="4778" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4774" instrument_node="">
</span><p data-dcnode-id="4762"><span data-dcnode-id="4773" instrument_node="">Problem solving can also occur without waking consciousness. There are many reports of scientists and engineers who solved problems in their </span><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dream" title="Dream"><span data-dcnode-id="4772" instrument_node="">dreams</span></a><span data-dcnode-id="4770" instrument_node="">. </span><a data-dcnode-id="4768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elias_Howe" title="Elias Howe"><span data-dcnode-id="4769" instrument_node="">Elias Howe</span></a><span data-dcnode-id="4767" instrument_node="">, inventor of the sewing machine, figured out the structure of the bobbin from a dream.</span><sup class="reference" data-dcnode-id="4764" id="cite_ref-55"><a data-dcnode-id="4765" href="#cite_note-55"><span data-dcnode-id="4766" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4763" instrument_node="">
</span></p><p data-dcnode-id="4757"><span data-dcnode-id="4761" instrument_node="">The chemist </span><a data-dcnode-id="4759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/August_Kekul%25C3%25A9" title="August Kekulé"><span data-dcnode-id="4760" instrument_node="">August Kekulé</span></a><span data-dcnode-id="4758" instrument_node=""> was considering how benzene arranged its six carbon and hydrogen atoms. Thinking about the problem, he dozed off, and dreamt of dancing atoms that fell into a snakelike pattern, which led him to discover the benzene ring. As Kekulé wrote in his diary,
</span></p><span data-dcnode-id="4756" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="4748"><p data-dcnode-id="4749"><span data-dcnode-id="4753" instrument_node="">One of the snakes seized hold of its own tail, and the form whirled mockingly before my eyes. As if by a flash of lightning I awoke; and this time also I spent the rest of the night in working out the consequences of the hypothesis.</span><sup class="reference" data-dcnode-id="4750" id="cite_ref-56"><a data-dcnode-id="4751" href="#cite_note-56"><span data-dcnode-id="4752" instrument_node="">[56]</span></a></sup></p></blockquote><span data-dcnode-id="4747" instrument_node="">
</span><p data-dcnode-id="4738"><span data-dcnode-id="4746" instrument_node="">There also are empirical studies of how people can think consciously about a problem before going to sleep, and then solve the problem with a dream image. Dream researcher </span><a data-dcnode-id="4744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_C._Dement" title="William C. Dement"><span data-dcnode-id="4745" instrument_node="">William C. Dement</span></a><span data-dcnode-id="4743" instrument_node=""> told his undergraduate class of 500 students that he wanted them to think about an infinite series, whose first elements were OTTFF, to see if they could deduce the principle behind it and to say what the next elements of the series would be.</span><sup class="reference" data-dcnode-id="4740" id="cite_ref-Dement_1972_57-0"><a data-dcnode-id="4741" href="#cite_note-Dement_1972-57"><span data-dcnode-id="4742" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4739" instrument_node=""> He asked them to think about this problem every night for 15 minutes before going to sleep and to write down any dreams that they then had. They were instructed to think about the problem again for 15 minutes when they awakened in the morning.
</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4737" instrument_node="">The sequence OTTFF is the first letters of the numbers: one, two, three, four, five. The next five elements of the series are SSENT (six, seven, eight, nine, ten). Some of the students solved the puzzle by reflecting on their dreams. One example was a student who reported the following dream:</span><sup class="reference" data-dcnode-id="4734" id="cite_ref-Dement_1972_57-1"><a data-dcnode-id="4735" href="#cite_note-Dement_1972-57"><span data-dcnode-id="4736" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4733" instrument_node="">
</span></p><span data-dcnode-id="4731" instrument_node="">
</span><link data-dcnode-id="4730" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4727"><p data-dcnode-id="4728"><span data-dcnode-id="4729" instrument_node="">I was standing in an art gallery, looking at the paintings on the wall. As I walked down the hall, I began to count the paintings: one, two, three, four, five. As I came to the sixth and seventh, the paintings had been ripped from their frames. I stared at the empty frames with a peculiar feeling that some mystery was about to be solved. Suddenly I realized that the sixth and seventh spaces were the solution to the problem!</span></p></blockquote><span data-dcnode-id="4726" instrument_node="">
</span><p data-dcnode-id="4724"><span data-dcnode-id="4725" instrument_node="">With more than 500 undergraduate students, 87 dreams were judged to be related to the problems students were assigned (53 directly related and 34 indirectly related). Yet of the people who had dreams that apparently solved the problem, only seven were actually able to consciously know the solution. The rest (46 out of 53) thought they did not know the solution.
</span></p><p data-dcnode-id="4714"><span data-dcnode-id="4723" instrument_node="">Mark Blechner conducted this experiment and obtained results similar to Dement's.</span><sup class="reference" data-dcnode-id="4720" id="cite_ref-Blechner_2018_58-0"><a data-dcnode-id="4721" href="#cite_note-Blechner_2018-58"><span data-dcnode-id="4722" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4719" instrument_node=""> He found that while trying to solve the problem, people had dreams in which the solution appeared to be obvious from the dream, but it was rare for the dreamers to realize how their dreams had solved the puzzle. Coaxing or hints did not get them to realize it, although once they heard the solution, they recognized how their dream had solved it. For example, one person in that OTTFF experiment dreamed:</span><sup class="reference" data-dcnode-id="4716" id="cite_ref-Blechner_2018_58-1"><a data-dcnode-id="4717" href="#cite_note-Blechner_2018-58"><span data-dcnode-id="4718" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4715" instrument_node="">
</span></p><span data-dcnode-id="4713" instrument_node="">
</span><link data-dcnode-id="4712" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4709"><p data-dcnode-id="4710"><span data-dcnode-id="4711" instrument_node="">There is a big clock. You can see the movement. The big hand of the clock was on the number six. You could see it move up, number by number, six, seven, eight, nine, ten, eleven, twelve. The dream focused on the small parts of the machinery. You could see the gears inside.</span></p></blockquote><span data-dcnode-id="4708" instrument_node="">
</span><p data-dcnode-id="4706"><span data-dcnode-id="4707" instrument_node="">In the dream, the person counted out the next elements of the series&nbsp;–  six, seven, eight, nine, ten, eleven, twelve&nbsp;–  yet he did not realize that this was the solution of the problem. His sleeping mindbrain solved the problem, but his waking mindbrain was not aware how.
</span></p><p data-dcnode-id="4694"><a data-dcnode-id="4704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Einstein" title="Albert Einstein"><span data-dcnode-id="4705" instrument_node="">Albert Einstein</span></a><span data-dcnode-id="4703" instrument_node=""> believed that much problem solving goes on unconsciously, and the person must then figure out and formulate consciously what the mindbrain has already solved. He believed this was his process in formulating the theory of relativity: "The creator of the problem possesses the solution."</span><sup class="reference" data-dcnode-id="4700" id="cite_ref-59"><a data-dcnode-id="4701" href="#cite_note-59"><span data-dcnode-id="4702" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4699" instrument_node=""> Einstein said that he did his problem-solving without words, mostly in images. "The words or the language, as they are written or spoken, do not seem to play any role in my mechanism of thought. The psychical entities which seem to serve as elements in thought are certain signs and more or less clear images which can be 'voluntarily' reproduced and combined."</span><sup class="reference" data-dcnode-id="4696" id="cite_ref-60"><a data-dcnode-id="4697" href="#cite_note-60"><span data-dcnode-id="4698" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4695" instrument_node="">
</span></p><span data-dcnode-id="4693" instrument_node="">
</span><h2 data-dcnode-id="4683"><span class="mw-headline" data-dcnode-id="4691" id="Cognitive_sciences:_two_schools"><span data-dcnode-id="4692" instrument_node="">Cognitive sciences: two schools</span></span><span class="mw-editsection" data-dcnode-id="4684"><span class="mw-editsection-bracket" data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">[</span></span><a data-dcnode-id="4687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D18" title="Edit section: Cognitive sciences: two schools"><span data-dcnode-id="4688" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4685"><span data-dcnode-id="4686" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4682" instrument_node="">
</span><p data-dcnode-id="4676"><span class="anchor" data-dcnode-id="4681" id="acrossDomainsExpertise"></span><span data-dcnode-id="4680" instrument_node="">
In </span><a class="mw-redirect" data-dcnode-id="4678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cognitive_sciences" title="Cognitive sciences"><span data-dcnode-id="4679" instrument_node="">cognitive sciences</span></a><span data-dcnode-id="4677" instrument_node="">, researchers' realization that problem-solving processes differ across knowledge domains and across levels of expertise (e.g. Sternberg, 1995) and that, consequently, findings obtained in the laboratory cannot necessarily generalize to problem-solving situations outside the laboratory, has led to an emphasis on real-world problem solving since the 1990s. This emphasis has been expressed quite differently in North America and Europe, however. Whereas North American research has typically concentrated on studying problem solving in separate, natural knowledge domains, much of the European research has focused on novel, complex problems, and has been performed with computerized scenarios (see Funke, 1991, for an overview).
</span></p><span data-dcnode-id="4675" instrument_node="">
</span><h3 data-dcnode-id="4665"><span class="mw-headline" data-dcnode-id="4673" id="Europe"><span data-dcnode-id="4674" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="4666"><span class="mw-editsection-bracket" data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">[</span></span><a data-dcnode-id="4669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D19" title="Edit section: Europe"><span data-dcnode-id="4670" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4664" instrument_node="">
</span><p data-dcnode-id="4641"><span data-dcnode-id="4663" instrument_node="">In Europe, two main approaches have surfaced, one initiated by </span><a data-dcnode-id="4661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Broadbent" title="Donald Broadbent"><span data-dcnode-id="4662" instrument_node="">Donald Broadbent</span></a><span data-dcnode-id="4660" instrument_node=""> (1977; see </span><a data-dcnode-id="4658" href="#Reference-Berry"><span data-dcnode-id="4659" instrument_node="">Berry &amp; Broadbent, 1995</span></a><span data-dcnode-id="4657" instrument_node="">) in the United Kingdom and the other one by </span><a data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dietrich_D%25C3%25B6rner" title="Dietrich Dörner"><span data-dcnode-id="4656" instrument_node="">Dietrich Dörner</span></a><span data-dcnode-id="4654" instrument_node=""> (1975, 1985; see </span><a data-dcnode-id="4652" href="#Reference-D%C3%B6rner1995"><span data-dcnode-id="4653" instrument_node="">Dörner &amp; Wearing, 1995</span></a><span data-dcnode-id="4651" instrument_node="">) in Germany. The two approaches share an emphasis on relatively complex, semantically rich, computerized laboratory tasks, constructed to resemble real-life problems. The approaches differ somewhat in their theoretical goals and methodology, however. The tradition initiated by Broadbent emphasizes the distinction between cognitive problem-solving processes that operate under awareness versus outside of awareness, and typically employs mathematically well-defined computerized systems. The tradition initiated by Dörner, on the other hand, has an interest in the interplay of the cognitive, motivational, and social components of problem solving, and utilizes very complex computerized scenarios that contain up to 2,000 highly interconnected variables (e.g., </span><a data-dcnode-id="4649" href="#Reference-D%C3%B6rner1983"><span data-dcnode-id="4650" instrument_node="">Dörner, Kreuzig, Reither &amp; Stäudel's 1983</span></a><span data-dcnode-id="4648" instrument_node=""> LOHHAUSEN project; </span><a data-dcnode-id="4646" href="#Reference-Ringelband"><span data-dcnode-id="4647" instrument_node="">Ringelband, Misiak &amp; Kluwe, 1990</span></a><span data-dcnode-id="4645" instrument_node="">). </span><a data-dcnode-id="4643" href="#Reference-Buchner1995"><span data-dcnode-id="4644" instrument_node="">Buchner (1995)</span></a><span data-dcnode-id="4642" instrument_node=""> describes the two traditions in detail.
</span></p><span data-dcnode-id="4640" instrument_node="">
</span><h3 data-dcnode-id="4630"><span class="mw-headline" data-dcnode-id="4638" id="North_America"><span data-dcnode-id="4639" instrument_node="">North America</span></span><span class="mw-editsection" data-dcnode-id="4631"><span class="mw-editsection-bracket" data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">[</span></span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DProblem_solving%26action%3Dedit%26section%3D20" title="Edit section: North America"><span data-dcnode-id="4635" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4632"><span data-dcnode-id="4633" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4629" instrument_node="">
</span><p data-dcnode-id="4598"><span data-dcnode-id="4628" instrument_node="">In North America, initiated by the work of Herbert A. Simon on "learning by doing" in </span><a class="mw-redirect" data-dcnode-id="4626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semantic" title="Semantic"><span data-dcnode-id="4627" instrument_node="">semantically</span></a><span data-dcnode-id="4625" instrument_node=""> rich domains,</span><sup class="reference" data-dcnode-id="4622" id="cite_ref-Anzai1979_61-0"><a data-dcnode-id="4623" href="#cite_note-Anzai1979-61"><span data-dcnode-id="4624" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="4619" id="cite_ref-Bhaskar1977_62-0"><a data-dcnode-id="4620" href="#cite_note-Bhaskar1977-62"><span data-dcnode-id="4621" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4618" instrument_node=""> researchers began to investigate problem solving separately in different natural </span><a class="mw-redirect" data-dcnode-id="4616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knowledge_domain" title="Knowledge domain"><span data-dcnode-id="4617" instrument_node="">knowledge domains</span></a><span data-dcnode-id="4615" instrument_node="">&nbsp;– such as physics, writing, or </span><a data-dcnode-id="4613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chess" title="Chess"><span data-dcnode-id="4614" instrument_node="">chess</span></a><span data-dcnode-id="4612" instrument_node=""> playing&nbsp;– thus relinquishing their attempts to extract a global theory of problem solving (e.g. Sternberg &amp; Frensch, 1991). Instead, these researchers have frequently focused on the development of problem solving within a certain domain, that is on the development of </span><a class="mw-redirect" data-dcnode-id="4610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expertise" title="Expertise"><span data-dcnode-id="4611" instrument_node="">expertise</span></a><span data-dcnode-id="4609" instrument_node="">; </span><a data-dcnode-id="4607" href="#Reference-Chase"><span data-dcnode-id="4608" instrument_node="">Chase &amp; Simon, 1973</span></a><span data-dcnode-id="4606" instrument_node="">; </span><a data-dcnode-id="4604" href="#Reference-Chi"><span data-dcnode-id="4605" instrument_node="">Chi, Feltovich &amp; Glaser, 1981</span></a><span data-dcnode-id="4603" instrument_node="">).</span><sup class="reference" data-dcnode-id="4600" id="cite_ref-Anderson1985_63-0"><a data-dcnode-id="4601" href="#cite_note-Anderson1985-63"><span data-dcnode-id="4602" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4599" instrument_node="">
</span></p><p data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">Areas that have attracted rather intensive attention in North America include:

</span><p data-dcnode-id="4484"><span data-dcnode-id="4489" instrument_node="">Complex problem solving (CPS) is distinguishable from simple problem solving (SPS). When dealing with SPS there is a singular and simple obstacle in the way. But CPS comprises one or more obstacles at a time. In a real-life example, a surgeon at work has far more complex problems than an individual deciding what shoes to wear. As elucidated by Dietrich Dörner, and later expanded upon by Joachim Funke, complex problems have some typical characteristics as follows:</span><sup class="reference" data-dcnode-id="4486" id="cite_ref-67"><a data-dcnode-id="4487" href="#cite_note-67"><span data-dcnode-id="4488" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4485" instrument_node="">
</span></p><span data-dcnode-id="4483" instrument_node="">
</span><ul data-dcnode-id="4419"><li data-dcnode-id="4479"><a data-dcnode-id="4481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Complexity" title="Complexity"><span data-dcnode-id="4482" instrument_node="">Complexity</span></a><span data-dcnode-id="4480" instrument_node=""> (large numbers of items, interrelations and decisions)</span></li><span data-dcnode-id="4478" instrument_node="">
</span><li data-dcnode-id="4475"><a class="mw-redirect" data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enumerability" title="Enumerability"><span data-dcnode-id="4477" instrument_node="">enumerability</span></a></li><span data-dcnode-id="4474" instrument_node="">
</span><li data-dcnode-id="4471"><a data-dcnode-id="4472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homogeneity_and_heterogeneity" title="Homogeneity and heterogeneity"><span data-dcnode-id="4473" instrument_node="">heterogeneity</span></a></li><span data-dcnode-id="4470" instrument_node="">

</span><link data-dcnode-id="4406" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4378" role="note"><span data-dcnode-id="4405" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crowdsolving" title="Crowdsolving"><span data-dcnode-id="4404" instrument_node="">Crowdsolving</span></a><span data-dcnode-id="4402" instrument_node="">, </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_action" title="Collective action"><span data-dcnode-id="4401" instrument_node="">Collective action</span></a><span data-dcnode-id="4399" instrument_node="">, </span><a data-dcnode-id="4397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collaborative_intelligence" title="Collaborative intelligence"><span data-dcnode-id="4398" instrument_node="">Collaborative intelligence</span></a><span data-dcnode-id="4396" instrument_node="">, </span><a data-dcnode-id="4394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mass_collaboration" title="Mass collaboration"><span data-dcnode-id="4395" instrument_node="">Mass collaboration</span></a><span data-dcnode-id="4393" instrument_node="">, </span><a data-dcnode-id="4391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_wisdom" title="Collective wisdom"><span data-dcnode-id="4392" instrument_node="">Collective wisdom</span></a><span data-dcnode-id="4390" instrument_node="">, </span><a data-dcnode-id="4388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Wisdom_of_Crowds" title="The Wisdom of Crowds"><span data-dcnode-id="4389" instrument_node="">The Wisdom of Crowds</span></a><span data-dcnode-id="4387" instrument_node="">, </span><a data-dcnode-id="4385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Distributed_knowledge" title="Distributed knowledge"><span data-dcnode-id="4386" instrument_node="">Distributed knowledge</span></a><span data-dcnode-id="4384" instrument_node="">, </span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_participation" title="Online participation"><span data-dcnode-id="4383" instrument_node="">Online participation</span></a><span data-dcnode-id="4381" instrument_node="">, and </span><a data-dcnode-id="4379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Group_decision-making" title="Group decision-making"><span data-dcnode-id="4380" instrument_node="">Group decision-making</span></a></div><span data-dcnode-id="4377" instrument_node="">
</span><p data-dcnode-id="4375"><span data-dcnode-id="4376" instrument_node="">Problem solving is applied on many different levels − from the individual to the civilizational. Collective problem solving refers to problem solving performed collectively.
</span></p><p data-dcnode-id="4371"><a data-dcnode-id="4373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_issue" title="Social issue"><span data-dcnode-id="4374" instrument_node="">Social issues</span></a><span data-dcnode-id="4372" instrument_node=""> and global issues can typically only be solved collectively.
</span></p><p data-dcnode-id="4365"><span data-dcnode-id="4370" instrument_node="">It has been noted that the complexity of contemporary problems has exceeded the cognitive capacity of any individual and requires different but complementary expertise and collective problem solving ability.</span><sup class="reference" data-dcnode-id="4367" id="cite_ref-69"><a data-dcnode-id="4368" href="#cite_note-69"><span data-dcnode-id="4369" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4366" instrument_node="">
</span></p><p data-dcnode-id="4358"><a data-dcnode-id="4363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_intelligence" title="Collective intelligence"><span data-dcnode-id="4364" instrument_node="">Collective intelligence</span></a><span data-dcnode-id="4362" instrument_node=""> is shared or group intelligence that emerges from the </span><a data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collaboration" title="Collaboration"><span data-dcnode-id="4361" instrument_node="">collaboration</span></a><span data-dcnode-id="4359" instrument_node="">, collective efforts, and competition of many individuals.
</span></p><p data-dcnode-id="4316"><b data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">Collaborative problem solving</span></b><span data-dcnode-id="4355" instrument_node=""> is about people </span><a data-dcnode-id="4353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teamwork" title="Teamwork"><span data-dcnode-id="4354" instrument_node="">working together</span></a><span data-dcnode-id="4352" instrument_node=""> face-to-face or in </span><a class="mw-redirect" data-dcnode-id="4350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Online_workspace" title="Online workspace"><span data-dcnode-id="4351" instrument_node="">online workspaces</span></a><span data-dcnode-id="4349" instrument_node=""> with a focus on solving real world problems. These groups are made up of members that share a common concern, a similar passion, and/or a commitment to their work. Members are willing to ask questions, wonder, and try to understand common issues. They share expertise, experiences, tools, and methods.</span><sup class="reference" data-dcnode-id="4346" id="cite_ref-70"><a data-dcnode-id="4347" href="#cite_note-70"><span data-dcnode-id="4348" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4345" instrument_node=""> These groups can be assigned by instructors, or may be student regulated based on the individual student needs. The groups, or group members, may be fluid based on need, or may only occur temporarily to finish an assigned task. They may also be more permanent in nature depending on the needs of the learners. All members of the group must have some input into the decision-making process and have a role in the learning process. Group members are responsible for the thinking, teaching, and monitoring of all members in the group. Group work must be coordinated among its members so that each member makes an equal contribution to the whole work. Group members must identify and build on their individual strengths so that everyone can make a significant contribution to the task.</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-71"><a data-dcnode-id="4343" href="#cite_note-71"><span data-dcnode-id="4344" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4341" instrument_node=""> Collaborative groups require joint intellectual efforts between the members and involve </span><a class="mw-redirect" data-dcnode-id="4339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_interaction" title="Social interaction"><span data-dcnode-id="4340" instrument_node="">social interactions</span></a><span data-dcnode-id="4338" instrument_node=""> to solve problems together. The </span><a data-dcnode-id="4336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Knowledge_sharing" title="Knowledge sharing"><span data-dcnode-id="4337" instrument_node="">knowledge shared</span></a><span data-dcnode-id="4335" instrument_node=""> during these interactions is acquired during communication, negotiation, and production of materials.</span><sup class="reference" data-dcnode-id="4332" id="cite_ref-72"><a data-dcnode-id="4333" href="#cite_note-72"><span data-dcnode-id="4334" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4331" instrument_node=""> Members actively seek information from others by asking questions. The capacity to use questions to acquire new information increases understanding and the ability to solve problems.</span><sup class="reference" data-dcnode-id="4328" id="cite_ref-73"><a data-dcnode-id="4329" href="#cite_note-73"><span data-dcnode-id="4330" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4327" instrument_node=""> Collaborative group work has the ability to promote critical thinking skills, problem solving skills, </span><a data-dcnode-id="4325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_skills" title="Social skills"><span data-dcnode-id="4326" instrument_node="">social skills</span></a><span data-dcnode-id="4324" instrument_node="">, and </span><a data-dcnode-id="4322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self-esteem" title="Self-esteem"><span data-dcnode-id="4323" instrument_node="">self-esteem</span></a><span data-dcnode-id="4321" instrument_node="">. By using collaboration and communication, members often learn from one another and construct meaningful knowledge that often leads to better learning outcomes than individual work.</span><sup class="reference" data-dcnode-id="4318" id="cite_ref-74"><a data-dcnode-id="4319" href="#cite_note-74"><span data-dcnode-id="4320" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4317" instrument_node="">
</span></p><p data-dcnode-id="4307"><span data-dcnode-id="4315" instrument_node="">In a 1962 research report, </span><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douglas_Engelbart" title="Douglas Engelbart"><span data-dcnode-id="4314" instrument_node="">Douglas Engelbart</span></a><span data-dcnode-id="4312" instrument_node=""> linked collective intelligence to organizational effectiveness, and predicted that pro-actively 'augmenting human intellect' would yield a multiplier effect in group problem solving: "Three people working together in this augmented mode [would] seem to be more than three times as effective in solving a complex problem as is one augmented person working alone".</span><sup class="reference" data-dcnode-id="4309" id="cite_ref-75"><a data-dcnode-id="4310" href="#cite_note-75"><span data-dcnode-id="4311" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4308" instrument_node="">
</span></p><p data-dcnode-id="4292"><a data-dcnode-id="4305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Jenkins" title="Henry Jenkins"><span data-dcnode-id="4306" instrument_node="">Henry Jenkins</span></a><span data-dcnode-id="4304" instrument_node="">, a key theorist of new media and media convergence draws on the theory that collective intelligence can be attributed to media convergence and </span><a data-dcnode-id="4302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Participatory_culture" title="Participatory culture"><span data-dcnode-id="4303" instrument_node="">participatory culture</span></a><span data-dcnode-id="4301" instrument_node="">.</span><sup class="reference" data-dcnode-id="4298" id="cite_ref-76"><a data-dcnode-id="4299" href="#cite_note-76"><span data-dcnode-id="4300" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4297" instrument_node=""> He criticizes contemporary education for failing to incorporate online trends of collective problem solving into the classroom, stating "whereas a collective intelligence community encourages ownership of work as a group, schools grade individuals". Jenkins argues that interaction within a knowledge community builds vital skills for young people, and teamwork through collective intelligence communities contributes to the development of such skills.</span><sup class="reference" data-dcnode-id="4294" id="cite_ref-:25_77-0"><a data-dcnode-id="4295" href="#cite_note-:25-77"><span data-dcnode-id="4296" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4293" instrument_node="">
</span></p><p data-dcnode-id="4288"><a data-dcnode-id="4290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_impact" title="Collective impact"><span data-dcnode-id="4291" instrument_node="">Collective impact</span></a><span data-dcnode-id="4289" instrument_node=""> is the commitment of a group of actors from different sectors to a common agenda for solving a specific social problem, using a structured form of collaboration.
</span></p><p data-dcnode-id="4270"><span data-dcnode-id="4287" instrument_node="">After </span><a data-dcnode-id="4285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="4286" instrument_node="">World War II</span></a><span data-dcnode-id="4284" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN" title="UN"><span data-dcnode-id="4283" instrument_node="">UN</span></a><span data-dcnode-id="4281" instrument_node="">, the </span><a data-dcnode-id="4279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods_system" title="Bretton Woods system"><span data-dcnode-id="4280" instrument_node="">Bretton Woods organization</span></a><span data-dcnode-id="4278" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="4276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/WTO" title="WTO"><span data-dcnode-id="4277" instrument_node="">WTO</span></a><span data-dcnode-id="4275" instrument_node=""> were created; collective problem solving on the international level crystallized around these three types of organizations from the 1980s onward. As these global institutions remain state-like or state-centric it has been called unsurprising that these continue state-like or state-centric approaches to collective problem-solving rather than alternative ones.</span><sup class="reference" data-dcnode-id="4272" id="cite_ref-78"><a data-dcnode-id="4273" href="#cite_note-78"><span data-dcnode-id="4274" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4271" instrument_node="">
</span></p><p data-dcnode-id="4249"><a data-dcnode-id="4268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crowdsourcing" title="Crowdsourcing"><span data-dcnode-id="4269" instrument_node="">Crowdsourcing</span></a><span data-dcnode-id="4267" instrument_node=""> is a process of accumulating the ideas, thoughts or information from many independent participants, with aim to find the best solution for a given challenge. Modern </span><a class="mw-redirect" data-dcnode-id="4265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_technologies" title="Information technologies"><span data-dcnode-id="4266" instrument_node="">information technologies</span></a><span data-dcnode-id="4264" instrument_node=""> allow for massive number of subjects to be involved as well as systems of managing these suggestions that provide good results.</span><sup class="reference" data-dcnode-id="4261" id="cite_ref-79"><a data-dcnode-id="4262" href="#cite_note-79"><span data-dcnode-id="4263" instrument_node="">[79]</span></a></sup><sup class="reference" data-dcnode-id="4258" id="cite_ref-80"><a data-dcnode-id="4259" href="#cite_note-80"><span data-dcnode-id="4260" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4257" instrument_node=""> With the </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internet" title="Internet"><span data-dcnode-id="4256" instrument_node="">Internet</span></a><span data-dcnode-id="4254" instrument_node=""> a new capacity for collective, including planetary-scale, problem solving was created.</span><sup class="reference" data-dcnode-id="4251" id="cite_ref-81"><a data-dcnode-id="4252" href="#cite_note-81"><span data-dcnode-id="4253" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4250" instrument_node="">
</span></p><span data-dcnode-id="4248" instrument_node="">
