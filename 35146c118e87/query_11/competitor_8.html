ar--size-xs lite-page-avatar--radius-full" data-dcnode-id="753"><span data-dcnode-id="755" instrument_node=""> </span><img alt="Chu-Hsiang Chang" class="lite-image" data-dcnode-id="754" data-src="https://i1.rgstatic.net/ii/profile.image/272776648982532-1442046429707_Q64/Chu-Hsiang-Chang.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Chu-Hsiang Chang</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="738"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Robert-Lord"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="740"><span class="lite-person-inline-item__image" data-dcnode-id="743"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="744"><span data-dcnode-id="746" instrument_node=""> </span><img alt="Robert G. Lord" class="lite-image" data-dcnode-id="745" data-src="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Robert G. Lord</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="732"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="733"><span class="js-target-abstract-626b3c853682b lite-page-hidden" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">In 1994, R. G. Lord and P. E. Levy proposed a variant of control theory that incorporated human information processing principles. The current article evaluates the empirical evidence for their propositions and updates the theory by considering contemporary research on information processing. Considerable support drawing from diverse literatures was found for propositions concerning the activation of goal-relevant information, the inhibition of goal-irrelevant information, and the consequences of goal completion. These effects were verified by meta-analytic analyses, which also supported the meaningfulness of such effects on the basis of their unstandardized magnitudes. The authors conclude by proposing new directions for this version of control theory by invoking recent theorizing on goal emergence and the importance of velocity and acceleration information for goal striving and by reviewing research in cognitive neuroscience.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="716"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="717"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="718"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="719"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="720"><div class="nova-legacy-c-button-group__item" data-dcnode-id="726"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--co n data-dcnode-id="596" instrument_node="">The Neuroscientist</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="588"><li class="nova-legacy-e-list__item" data-dcnode-id="589"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="590"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="591"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Thomas-Herdegen-2121835713"><span data-dcnode-id="593" instrument_node="">Thomas Herdegen</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="582"><span data-dcnode-id="587" instrument_node="">The expression and activation of transcription factors and the control of gene transcription in the nervous system is a recent and rapidly expanding field in neurosciences. This research area may provide insights concerning the information transfer that arises from postsynaptic potentials or ligand-coupling of membrane receptors and terminates in gene expression. Visualization of both de novo </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="585" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626b3c8536aa8&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="586" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626b3c8536aa8" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node=""> synthesis of inducible transcription factors (ITFs) and phosphorylation of preexisting transcription factors have been used to mark neurons, pathways, and networks excited by various stimuli. This article summarizes basics of the transcription process and the complex functions of Jun, Fos, and CREB/ATF proteins, as well as the use of ITFs as experimental instruments in neurophysiology and neurobiology. The major focus is on the alterations in ITF expression following acute or chronic pathophysiological stimuli as mirrors of alterations in neuronal programs underlying adaptation, dysfunctions, or the development of diseases affecting the nervous system. NEUROSCIENTIST 2:153-161, 1996</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/240282591_REVIEW_Jun_Fos_and_CREBATF_Transcription_Factors_in_the_Brain_Control_of_Gene_Expression_under_Normal_and_Pathophysiological_Conditions"><span data-dcnode-id="581" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="545"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="546"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="547"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="548"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="572"><div class="nova-legacy-l-flex__item" data-dcnode-id="573"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Article</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="569"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/236315331_Encyclopedia_of_Neuroscience"><span data-dcnode-id="571" instrument_node="">Encyclopedia of Neuroscience</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="563"><span data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">July 1988</span></span><span data-dcnode-id="566" instrument_node=""> · </span><span data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">JAMA The Journal of the American Medical Association</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="557"><li class="nova-legacy-e-list__item" data-dcnode-id="558"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="559"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="560"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Donna-Bergen-2007804620"><span data-dcnode-id="562" instrument_node="">Donna Bergen</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="551"><span data-dcnode-id="556" instrument_node="">Notice the subject of this book: not "neurosciences" but "neuroscience." During the past 20 years, rapidly accelerating advances in neurochemistry, neurophysiology, neurobiology, neuropharmacology, neuroanatomy, etc, have brought about an exciting convergence of knowledge and techniques, which leaves the narrow specialist ever more isolated and ineffective. The scientist in neuronal membrane </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="554" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626b3c8536cf7&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="555" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626b3c8536cf7" data-dcnode-id="552"><span data-dcnode-id="553" instrument_node=""> physiology, for example, must integrate knowledge of physics, immunology, anatomy, chemistry, molecular biology, and more, all the while keeping an eye out for possible clinical implications of his or her work. In addition, the nervous system can no longer be viewed as a relatively separate entity, functioning independently of other physiological systems. Hence we have the development of neuroimmunology, neurogenetics, and neuroendocrinology as growing fields of inquiry.
The 1305+ pages of Dr George Adelman's Encyclopedia of Neuroscience are thus encyclopedic in scope but not in depth, since fine-honed reviews of all of these fields of knowledge would require many volumes.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/236315331_Encyclopedia_of_Neuroscience"><span data-dcnode-id="550" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="514"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="515"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="516"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="517"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="541"><div class="nova-legacy-l-flex__item" data-dcnode-id="542"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Article</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="538"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/31132288_The_Future_of_Comparative_Neurology"><span data-dcnode-id="540" instrument_node="">The Future of Comparative Neurology</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="532"><span data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">August 1984</span></span><span data-dcnode-id="535" instrument_node=""> · </span><span data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Integrative and Comparative Biology</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="526"><li class="nova-legacy-e-list__item" data-dcnode-id="527"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="528"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="529"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Theodore-H-Bullock-50355327"><span data-dcnode-id="531" instrument_node="">Theodore H. Bullock</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="520"><span data-dcnode-id="525" instrument_node="">Comparative neurology should be seen as not only anatomical but also physiological, chemical, developmental and behavioral neurobiology that exploits the vast diversity of nervous systems, revealing differences as well as commonalities. The anatomical approach has forged ahead rapidly in recent years but other approaches are lagging. Particularly scarce are studies that compare. The aims of </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="523" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626b3c8536ebf&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="524" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626b3c8536ebf" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node=""> comparative neurology are not unitary but several. Specific actions are urged for each of several classes of scientists. Two challenges are lifted up: the search for relevant behavioral correlates of known anatomical differences between taxa, and the search for brain correlates relevant to observed gross differences in behavior.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/31132288_The_Future_of_Comparative_Neurology"><span data-dcnode-id="519" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="486"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="487"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="488"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="489"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="510"><div class="nova-legacy-l-flex__item" data-dcnode-id="511"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Chapter</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="507"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/312866372_Learning_and_Representation"><span data-dcnode-id="509" instrument_node="">Learning and Representation</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="504"><span data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">December 2017</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="498"><li class="nova-legacy-e-list__item" data-dcnode-id="499"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="500"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="501"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Randy-Gallistel-2042393748"><span data-dcnode-id="503" instrument_node="">Randy Gallistel</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="492"><span data-dcnode-id="497" instrument_node="">Behavioral and electrophysiological evidence implies that brains compute representations of aspects of the experienced world. For example, they compute the animal's position in the world by integrating its velocity with respect to time. Other examples are the learning of the solar ephemeris, the construction of a cognitive map, and episodic memory in food caching. Representations require a </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="495" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626b3c8537088&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="496" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626b3c8537088" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node=""> symbolic read–write memory that carries information extracted from experience forward in time in a computationally accessible form. The analogy between the architecture of computer memory and the genetic architecture suggests the sort of memory structure to be looked for in the nervous system.</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/312866372_Learning_and_Representation"><span data-dcnode-id="491" instrument_node="">Read more</span></a></div></div></div></div><div class="nova-legacy-o-grid__column nova-legacy-o-grid__column--width-6/12@m-up publication-recommendation-item__item" data-dcnode-id="455"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-none" data-dcnode-id="456"><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="457"><div class="publication-recommendation-item publication-recommendation-item--redesign" data-dcnode-id="458"><div class="nova-legacy-l-flex__item nova-legacy-l-flex nova-legacy-l-flex--gutter-xxs nova-legacy-l-flex--direction-row@s-up nova-legacy-l-flex--align-items-center@s-up nova-legacy-l-flex--justify-content-flex-start@s-up nova-legacy-l-flex--wrap-wrap@s-up publication-recommendation-item__item-badges" data-dcnode-id="482"><div class="nova-legacy-l-flex__item" data-dcnode-id="483"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-inline nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-m nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m" data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Article</span></span></div></div><h3 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-inherit publication-recommendation-item__title" data-dcnode-id="479"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare gtm-recommendation-item-link" data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/272285983_Principles_of_Neural_Science"><span data-dcnode-id="481" instrument_node="">Principles of Neural Science</span></a></h3><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-xs nova-legacy-e-text--color-grey-500" data-dcnode-id="473"><span data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">December 1992</span></span><span data-dcnode-id="476" instrument_node=""> · </span><span data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">JAMA The Journal of the American Medical Association</span></span></div><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-auto" data-dcnode-id="467"><li class="nova-legacy-e-list__item" data-dcnode-id="468"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="469"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="470"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Vincent-P-Calabrese-2066650981"><span data-dcnode-id="472" instrument_node="">Vincent P. Calabrese</span></a></span></span></li></ul><div class="nova-legacy-e-text nova-legacy-e-text--size-s nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-grey-500 publication-recommendation-item__abstract" data-dcnode-id="461"><span data-dcnode-id="466" instrument_node="">This book has expanded in size through three editions but has maintained its preeminence as a leading text of neurobiology. I use the word "neurobiology" deliberately as it is often referred to as a neurophysiology text. It is not—it is much more. It is a textbook that tries to integrate biochemistry, physiology, and structure with function.The preface gives the philosophical background of the </span><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent js-lite-click" data-dcnode-id="464" data-lite="{&quot;click&quot;:[{&quot;t&quot;:&quot;.js-target-626b3c853717a&quot;,&quot;a&quot;:&quot;tc(lite-page-hidden)&quot;},{&quot;t&quot;:&quot;self&quot;,&quot;a&quot;:&quot;ac(lite-page-hidden)&quot;}]}"><span data-dcnode-id="465" instrument_node="">... [Show full abstract]</span></a><span class="lite-page-hidden js-target-626b3c853717a" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node=""> book, namely, "to write a coherent introduction to the nervous system for a broad range of students of behavior, biology and medicine." I might add that it is also an excellent review of neurobiology for the practitioner who wants to keep up to date with the latest in basic science. The chapters are clearly written (despite multiple authors) and cross-referenced. The cartoons and diagrams are clearly labeled with comprehensive explanations nicely integrated with the text. The reader who has not been in a laboratory for 20</span></span></div><a class="nova-legacy-e-link nova-legacy-e-link--color-blue nova-legacy-e-link--theme-silent publication-recommendation-item__more publication-recommendation-item__more--redesign" data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/272285983_Principles_of_Neural_Science"><span data-dcnode-id="460" instrument_node="">Read more</span></a></div></div></div></div></div></div></div></div></div></div><div class="lite-page-ad lite-page-ad--has-label lite-page-ad--empty" data-dcnode-id="420" id="lite-ad-aq5ry9h6p3u"><div class="lite-page-ad__inner" data-dcnode-id="421"><div class="lite-page-ad__close" data-dcnode-id="443"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-full nova-legacy-
