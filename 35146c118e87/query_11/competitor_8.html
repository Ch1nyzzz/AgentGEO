5"><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item" data-dcnode-id="3005" style="flex-basis:0px;flex-grow:2"><div class="nova-legacy-c-card nova-legacy-c-card--spacing-m nova-legacy-c-card--elevation-1-above" data-dcnode-id="3006"><div class="nova-legacy-c-card__header nova-legacy-c-card__header--show-divider nova-legacy-c-card__header--spacing-inherit" data-dcnode-id="3010"><h2 class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-700" data-dcnode-id="3011"><span data-dcnode-id="3012" instrument_node="">Abstract</span></h2></div><div class="nova-legacy-c-card__body nova-legacy-c-card__body--spacing-inherit" data-dcnode-id="3007"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-grey-800 research-detail-middle-section__abstract" data-dcnode-id="3008" itemprop="description"><span data-dcnode-id="3009" instrument_node="">Neuroscience is the study of nervous system concerning biological basis of consciousness, perception, memory, and learning. Neuroscience links our observations about cognitive behavior with the actual physical processes that support such behavior. Nervous system as a lineage structure with features of self-organizing and changes with use throughout the lifetime. Science when considering like a paradigm and solving problematic data by using theories in the light of philosophy. Successful pattern of theories enlightened improvement in chemistry and physics. In biology somehow disscussions in complicated systems are still lack of motive force of rules. Neurobiology itself is a dynamic wondering world. Researchers need some basic theories of neuroscience when dealing with sophisticated nervous system problems. A number of researchers in computational/systems neuroscience and in information/communication theory are investigating problems of information representation and processing. While the goals are often the same, these researchers bring different perspectives and points of view to a common set of neuroscience problems. Often they participate in different fora and their interaction is limited. Beyond these original methods there is a need to develop novel tools and approaches that are driven by problems arising in neuroscience. I would like to begin to discuss these four basic concepts of neuroscience as consciousness, perception, cognition and behaviour respectively.</span></div></div></div></div><div class="nova-legacy-l-flex__item nova-legacy-l-flex__item--grow research-detail-middle-section__item" data-dcnode-id="2986" style="flex-basis:0px;flex-grow:1"><div class="lite-page-promo research-detail-signup-promo" data-dcnode-id="2987"><picture class="lite-page-promo__brand research-detail-signup-promo__brand" data-dcnode-id="3001" height="14" width="100"><source data-dcnode-id="3004" data-srcset="images/icons/svgicons/researchgate-logo-white.svg" type="image/svg+xml"><span data-dcnode-id="3003" instrument_node=""> </span><img alt="ResearchGate Logo" class="lite-image" data-dcnode-id="3002" data-src="images/icons/svgicons/researchgate-logo-white.svg" height="14" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg==" width="100"></picture><p class="nova-legacy-e-text nova-legacy-e-text--size-xl nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-s nova-legacy-e-text--color-inherit lite-page-promo__headline research-detail-signup-promo__headline" data-dcnode-id="2998"><strong data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Discover the world's research</span></strong></p><ul class="nova-legacy-e-list nova-legacy-e-list--size-l nova-legacy-e-list--type-unordered nova-legacy-e-list--spacing-auto lite-page-promo__list research-detail-signup-promo__list" dat nitive behavior</span></span><span class="lsc ws8" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node=""> </span></span></div><div class="t m0 x0 h3 y12 ff1 fs1 fc0 sc0 ls9 ws13" data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">with the actual physical processes that </span></div><div class="t m0 x0 h3 y13 ff1 fs1 fc0 sc0 ls4 ws14" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">support such behavior. Nervous system as </span></div><div class="t m0 x0 h3 y14 ff1 fs1 fc0 sc0 ls7 ws15" data-dcnode-id="2817"><span data-dcnode-id="2820" instrument_node="">a lineage structure with</span><span class="ls5 ws16" data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node=""> features of self-</span></span></div><div class="t m0 x0 h3 y15 ff1 fs1 fc0 sc0 ls4 ws17" data-dcnode-id="2815"><span data-dcnode-id="2816" instrument_node="">organizing and changes with use </span></div><div class="t m0 x0 h3 y16 ff1 fs1 fc0 sc0 ls2 ws18" data-dcnode-id="2813"><span data-dcnode-id="2814" instrument_node="">throughout the lifetime. Science when </span></div><div class="t m0 x0 h3 y17 ff1 fs1 fc0 sc0 ls2 ws19" data-dcnode-id="2811"><span data-dcnode-id="2812" instrument_node="">considering like a paradigm and solving </span></div><div class="t m0 x0 h3 y18 ff1 fs1 fc0 sc0 ls8 ws1a" data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">problematic data by using theories in the </span></div><div class="t m0 x0 h3 y19 ff1 fs1 fc0 sc0 ls6 ws1b" data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">light of philosophy. Successful pattern of </span></div><div class="t m0 x0 h3 y1a ff1 fs1 fc0 sc0 ls9 ws1c" data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">theories enlightened improvement in </span></div><div class="t m0 x0 h3 y1b ff1 fs1 fc0 sc0 ls4 ws1d" data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">chemistry and physics. In biology </span></div><div class="t m0 x0 h3 y1c ff1 fs1 fc0 sc0 ls2 ws1e" data-dcnode-id="2801"><span data-dcnode-id="2802" instrument_node="">somehow disscussions in complicated </span></div><div class="t m0 x0 h3 y1d ff1 fs1 fc0 sc0 ls7 ws1f" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">systems are still lack of motive force of </span></div><div class="t m0 x0 h3 y1e ff1 fs1 fc0 sc0 lsa ws20" data-dcnode-id="2797"><span data-dcnode-id="2798" instrument_node="">rules. Neurobiology itself is a dynamic </span></div><div class="t m0 x0 h3 y1f ff1 fs1 fc0 sc0 ls6 ws21" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">wondering world. Researchers need some </span></div><div class="t m0 x0 h3 y20 ff1 fs1 fc0 sc0 ls4 ws22" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">basic theories of neuroscience when </span></div><div class="t m0 x0 h3 y21 ff1 fs1 fc0 sc0 lsb ws23" data-dcnode-id="2791"><span data-dcnode-id="2792" instrument_node="">dealing with sophisticated nervous system </span></div><div class="t m0 x0 h3 y22 ff1 fs1 fc0 sc0 lsa ws24" data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">problems. A number of researchers in </span></div><div class="t m0 x0 h3 y23 ff1 fs1 fc0 sc0 ls8 ws25" data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node="">computational/systems neuroscience and in </span></div><div class="t m0 x0 h3 y24 ff1 fs1 fc0 sc0 lsb ws26" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">information/communication theory are </span></div><div class="t m0 x0 h3 y25 ff1 fs1 fc0 sc0 ls2 ws1e" data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">investigating problems of information </span></div><div class="t m0 x0 h3 y26 ff1 fs1 fc0 sc0 lsb ws27" data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">representation and processing. While the </span></div><div class="t m0 x0 h3 y27 ff1 fs1 fc0 sc0 lsb ws28" data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">goals are often the same, these researchers </span></div><div class="t m0 x0 h3 y28 ff1 fs1 fc0 sc0 lsa ws29" data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">bring different perspectives and points of </span></div><div class="t m0 x0 h3 y29 ff1 fs1 fc0 sc0 lsa ws2a" data-dcnode-id="2775"><span data-dcnode-id="2776" instrument_node="">view to a common set of neuroscience </span></div><div class="t m0 x0 h3 y2a ff1 fs1 fc0 sc0 lsb ws2b" data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">problems. Often they participate in </span></div><div class="t m0 x0 h3 y2b ff1 fs1 fc0 sc0 ls2 ws2c" data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">different fora and their interaction is </span></div><div class="t m0 x0 h3 y2c ff1 fs1 fc0 sc0 lsb ws2d" data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">limited. Beyond these original methods </span></div><div class="t m0 x0 h3 y2d ff1 fs1 fc0 sc0 lsb ws2e" data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">there is a need to develop novel tools and </span></div><div class="t m0 x0 h3 y2e ff1 fs1 fc0 sc0 lsb ws2f" data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">approaches that are driven by problems </span></div><div class="t m0 x0 h3 y2f ff1 fs1 fc0 sc0 lsb ws30" data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">arising in neuroscience.  </span></div><div class="t m0 x0 h6 y30 ff1 fs3 fc0 sc0 lsc ws8" data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node=""> </span></div><div class="t m0 x0 h3 y31 ff1 fs1 fc0 sc0 ls2 ws31" data-dcnode-id="2759"><span data-dcnode-id="2760" instrument_node="">I would like to begin to discuss these four </span></div><div class="t m0 x0 h3 y32 ff1 fs1 fc0 sc0 ls2 ws32" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">basic concepts of neuroscience as </span></div><div class="t m0 x0 h3 y33 ff1 fs1 fc0 sc0 ls4 ws33" data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">consciousness, perception, cognition and </span></div><div class="t m0 x0 h3 y34 ff1 fs1 fc0 sc0 lsb ws30" data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">behaviour respectively.  </span></div><div class="t m0 x0 h6 y35 ff1 fs3 fc0 sc0 lsc ws8" data-dcnode-id="2751"><span data-dcnode-id="2752" instrument_node=""> </span></div><div class="t m0 x2 h4 yb ff2 fs1 fc0 sc0 ls3 ws8" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">Consciousness </span></div><div class="t m0 x2 h7 y36 ff2 fs3 fc0 sc0 lsc ws8" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node=""> </span></div><div class="t m0 x2 h3 yd ff1 fs1 fc0 sc0 ls8 ws34" data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Clinical observations have established that </span></div><div class="t m0 x2 h3 ye ff1 fs1 fc0 sc0 ls8 ws35" data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">certain parts of the brain are essential for </span></div><div class="t m0 x2 h3 yf ff1 fs1 fc0 sc0 lsb ws36" data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">consciousness whereas other parts are not. </span></div><div class="t m0 x2 h3 y10 ff1 fs1 fc0 sc0 ls2 ws37" data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">For example, different areas of the cerebral </span></div><div class="t m0 x2 h3 y11 ff1 fs1 fc0 sc0 ls9 ws38" data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">cortex contribute different modalities and </span></div><div class="t m0 x2 h3 y12 ff1 fs1 fc0 sc0 ls4 ws39" data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">submodalities of consciousness, whereas </span></div><div class="t m0 x2 h3 y13 ff1 fs1 fc0 sc0 lsb ws3a" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">the cerebellum does not, despite having </span></div><div class="t m0 x2 h3 y14 ff1 fs1 fc0 sc0 lsb ws3b" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">even more neurons. It is also well </span></div><div class="t m0 x2 h3 y15 ff1 fs1 fc0 sc0 ls2 ws3c" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">established that consciousness depends on </span></div><div class="t m0 x2 h3 y16 ff1 fs1 fc0 sc0 ls4 ws3d" data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">the way the brain functions. For example, </span></div><div class="t m0 x2 h3 y17 ff1 fs1 fc0 sc0 ls4 ws3e" data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">consciousness is much reduced during </span></div><div class="t m0 x2 h3 y18 ff1 fs1 fc0 sc0 ls2 ws3f" data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">slow wave sleep and generalized seizures, </span></div><div class="t m0 x2 h3 y19 ff1 fs1 fc0 sc0 lsb ws40" data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">even though the levels of neural activity </span></div><div class="t m0 x2 h3 y1a ff1 fs1 fc0 sc0 ls9 ws41" data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">are comparable or higher than in </span></div><div class="t m0 x2 h3 y1b ff1 fs1 fc0 sc0 ls1 ws42" data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">wakefulness. To understand why this is so, </span></div><div class="t m0 x2 h3 y1c ff1 fs1 fc0 sc0 ls8 ws43" data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">empirical observations on the neural </span></div><div class="t m0 x2 h3 y1d ff1 fs1 fc0 sc0 ls2 ws44" data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">correlates of consciousness need to be </span></div><div class="t m0 x2 h3 y1e ff1 fs1 fc0 sc0 ls9 ws45" data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">complemented by a principled theoretical </span></div><div class="t m0 x2 h3 y1f ff1 fs1 fc0 sc0 ls2 ws46" data-dcnode-id="2709"><span data-dcnode-id="2710" instrument_node="">approach. Otherwise, it is unlikely that we </span></div><div class="t m0 x2 h3 y20 ff1 fs1 fc0 sc0 ls2 ws47" data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">could ever establish to what extend </span></div><div class="t m0 x2 h3 y21 ff1 fs1 fc0 sc0 ls8 ws48" data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">consciousness is present in neurological </span></div><div class="t m0 x2 h3 y22 ff1 fs1 fc0 sc0 ls8 ws49" data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">conditions such as akinetic mutism, </span></div><div class="t m0 x2 h3 y23 ff1 fs1 fc0 sc0 ls4 ws4a" data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">psychomotor seizures, or sleepwalking, </span></div><div class="t m0 x2 h3 y24 ff1 fs1 fc0 sc0 lsb ws4b" data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">and to what extent it is present in newborn </span></div><div class="t m0 x2 h8 y25 ff1 fs1 fc0 sc0 lsb ws30" data-dcnode-id="2693"><span data-dcnode-id="2698" instrument_node="">babies and animals </span><span class="fs4 ls10 ws5 v1" data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">(15)</span></span><span class="lsc ws8" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">. </span></span></div><div class="t m0 x2 h6 y37 ff1 fs3 fc0 sc0 lsc ws8" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node=""> </span></div><div class="t m0 x2 h3 y38 ff1 fs1 fc0 sc0 ls2 ws4c" data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Each person has privileged access to his </span></div><div class="t m0 x2 h3 y39 ff1 fs1 fc0 sc0 lsa ws4d" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">own consciousness, but not to the </span></div><div class="t m0 x2 h3 y3a ff1 fs1 fc0 sc0 ls6 ws4e" data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">consciousness of others. So consciousness </span></div><div class="t m0 x2 h3 y3b ff1 fs1 fc0 sc0 ls4 ws4f" data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">is not a publicly observable, phenomenon </span></div><div class="t m0 x2 h3 y3c ff1 fs1 fc0 sc0 ls2 ws50" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">and, in this respect, unlike the phenomena </span></div><div class="t m0 x2 h3 y3d ff1 fs1 fc0 sc0 lsb ws51" data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">typically studied by the science. This </span></div><div class="t m0 x2 h8 y3e ff1 fs1 fc0 sc0 ls6 ws52" data-dcnode-id="2673"><span data-dcnode-id="2678" instrument_node="">conception of privacy is confused </span><span class="fs4 ls11 ws6 v1" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">(2)</span></span><span class="ls3 ws53" data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">. The </span></span></div><div class="t m0 x2 h3 y3f ff1 fs1 fc0 sc0 ls4 ws54" data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">mysteriousness of consciousness as </span></div><div class="t m0 x2 h3 y40 ff1 fs1 fc0 sc0 ls6 ws55" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">something we become, but not something </span></div><div class="t m0 x2 h3 y41 ff1 fs1 fc0 sc0 lsa ws56" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">we do or can be trained to become. One </span></div><div class="t m0 x2 h3 y31 ff1 fs1 fc0 sc0 lsa ws57" data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">can be good at learning, discovering, </span></div><div class="t m0 x2 h3 y32 ff1 fs1 fc0 sc0 ls2 ws58" data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">detecting or finding out certain things, but </span></div><div class="t m0 x2 h3 y33 ff1 fs1 fc0 sc0 lsa ws59" data-dcnode-id="2661"><span data-dcnode-id="2662" instrument_node="">one cannot be good at becoming conscious </span></div><div class="t m0 x2 h8 y34 ff1 fs1 fc0 sc0 ls3 wsa" data-dcnode-id="2655"><span data-dcnode-id="2660" instrument_node="">of things </span><span class="fs4 ls11 ws6 v1" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">(2)</span></span><span class="lsc ws8" data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">.  </span></span></div><div class="t m0 x3 h3 y42 ff1 fs1 fc0 sc0 lsc" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">155</span></div></div><div class="pi" data-data="{&quot;ctm&quot;:[1.647059,0.000000,0.000000,1.647059,0.000000,0.000000]}" data-dcnode-id="2651"></div></div><span data-dcnode-id="2649" instrument_node="">

 yb2 ff1 fs1 fc0 sc0 ls2 wsc5" data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">of science specifically about neuroscience. </span></div><div class="t m0 x0 h3 yb3 ff1 fs1 fc0 sc0 ls2 wsc6" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">Such questions now include: What is a </span></div><div class="t m0 x0 h3 yb4 ff1 fs1 fc0 sc0 ls7 wsc7" data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">neuroscientific explanation? What are the </span></div><div class="t m0 x0 h3 yb5 ff1 fs1 fc0 sc0 ls4 wsc8" data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">explananda of neuroscience? How is it that </span></div><div class="t m0 x0 h3 yb6 ff1 fs1 fc0 sc0 ls8 wsc9" data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">the instruments used by neuroscientists </span></div><div class="t m0 x0 h3 yb7 ff1 fs1 fc0 sc0 lsb wsca" data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">(e.g. neuroimaging, cell recordings, genetic </span></div><div class="t m0 x0 h3 yb8 ff1 fs1 fc0 sc0 ls9 wscb" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">manipulations, simulations) yield </span></div><div class="t m0 x0 h3 yb9 ff1 fs1 fc0 sc0 lsa wscc" data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">knowledge? Answers to these questions </span></div><div class="t m0 x0 h3 yba ff1 fs1 fc0 sc0 lsb wscd" data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">can be pursued either descriptively (how </span></div><div class="t m0 x0 h3 ybb ff4 fs1 fc0 sc0 ls1 ws3" data-dcnode-id="2309"><span data-dcnode-id="2312" instrument_node="">does</span><span class="ff1 ls7 wsce" data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node=""> neuroscience proceed?) or </span></span></div><div class="t m0 x0 h3 ybc ff1 fs1 fc0 sc0 ls4 wscf" data-dcnode-id="2303"><span data-dcnode-id="2308" instrument_node="">normatively (how </span><span class="ff4 ws4" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">should</span></span><span class="lsb wsd0" data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node=""> neuroscience </span></span></div><div class="t m0 x0 h3 ybd ff1 fs1 fc0 sc0 ls7 wsd1" data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">proceed)? Normative projects in </span></div><div class="t m0 x0 h3 ybe ff1 fs1 fc0 sc0 lsa wsd2" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">philosophy of neuroscience can be </span></div><div class="t m0 x0 h3 ybf ff1 fs1 fc0 sc0 ls9 wsd3" data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">deconstructive, by criticizing claims made </span></div><div class="t m0 x0 h3 yc0 ff1 fs1 fc0 sc0 ls2 wsd4" data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">by neuroscientists. Or they can be </span></div><div class="t m0 x0 h3 yc1 ff1 fs1 fc0 sc0 ls4 wsd5" data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">constructive, by proposing theories of </span></div><div class="t m0 x0 h3 yc2 ff1 fs1 fc0 sc0 ls4 wsd6" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">neuronal phenomena or methods for </span></div><div class="t m0 x0 h3 yc3 ff1 fs1 fc0 sc0 ls9 wsd7" data-dcnode-id="2289"><span data-dcnode-id="2290" instrument_node="">interpreting neuroscientific data. These </span></div><div class="t m0 x0 h3 yc4 ff1 fs1 fc0 sc0 ls9 wsd8" data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">latter projects are often indistinguishable </span></div><div class="t m0 x0 h8 yc5 ff1 fs1 fc0 sc0 ls9 wsd9" data-dcnode-id="2281"><span data-dcnode-id="2286" instrument_node="">from theoretical neuroscience </span><span class="fs4 ls11 ws6 v1" data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">(3)</span></span><span class="ls13 wsda" data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">. Neuro-</span></span></div><div c cnode-id="2258" instrument_node="">Hirstein (2003) examines implications of </span></div><div class="t m0 x0 h3 yd2 ff1 fs1 fc0 sc0 ls2 wse6" data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">neurological syndromes involving </span></div><div class="t m0 x2 h3 y43 ff1 fs1 fc0 sc0 ls6 wse7" data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">confabulation for the concept of self-</span></div><div class="t m0 x2 h8 y44 ff1 fs1 fc0 sc0 ls5 ws8" data-dcnode-id="2247"><span data-dcnode-id="2252" instrument_node="">knowledge </span><span class="fs4 ls11 ws6 v1" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">(5)</span></span><span class="lsc" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">.  </span></span></div><div class="t m0 x2 h6 y75 ff1 fs3 fc0 sc0 lsc ws8" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node=""> </span></div><div class="t m0 x2 h3 yd3 ff1 fs1 fc0 sc0 lsb wse8" data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Theoretical neuroscience should use the </span></div><div class="t m0 x2 h3 yd4 ff1 fs1 fc0 sc0 ls7 wse9" data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">tools of theoretical sciences like </span></div><div class="t m0 x2 h3 yd5 ff1 fs1 fc0 sc0 ls7 wsea" data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">cybernetics, informatics, computational </span></div><div class="t m0 x2 h3 yd6 ff1 fs1 fc0 sc0 lsb wseb" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">neurosciences or system science. For </span></div><div class="t m0 x2 h3 yd7 ff1 fs1 fc0 sc0 lsb wsec" data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">instance little is known about mechanisms </span></div><div class="t m0 x2 h3 yd8 ff1 fs1 fc0 sc0 ls8 wsed" data-dcnode-id="2233"><span data-dcnode-id="2234" instrument_node="">that initiate and maintain the growth of the </span></div><div class="t m0 x2 h3 class="nova-legacy-o-stack__item" data-dcnode-id="1742"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">... The overarching goal of theory, modelling and statistics in neuroscience is to create an understanding of how the brain works (Jorgenson et al., 2015). In discussing the theories in the field of neuroscience we can look at the four basic concepts on neuroscience which are consciousness, perception, cognition, and behavior </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">(Oktar, 2006)</span></mark><span data-dcnode-id="1744" instrument_node="">. These four concepts have complex, complementing and sometimes diverging theories as relates to neurotechnology, and the use and functioning of neurotechnology devices.  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1732"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1733"><div class="nova-legacy-o-stack__item" data-dcnode-id="1734"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">... These four concepts have complex, complementing and sometimes diverging theories as relates to neurotechnology, and the use and functioning of neurotechnology devices. According to </span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">Oktar (2006)</span></mark><span data-dcnode-id="1736" instrument_node="">, Consciousness is unique and exclusive to everyone. Within everyone also, consciousness is dynamic.  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1726"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1727"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1667"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1668"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1669"><div class="nova-legacy-v-publication-item__body" data-dcnode-id="1684"><div class="nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m" data-dcnode-id="1685"><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1719"><div class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title" data-dcnode-id="1720"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/355126758_Accessibility_Use_and_Effectiveness_of_Neurotechnology_Devices_for_Improved_Productivity_in_Workplace"><span data-dcnode-id="1722" instrument_node="">Accessibility, Use and Effectiveness of Neurotechnology Devices for Improved Productivity in Workplace</span></a></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1706"><div class="nova-legacy-v-publication-item__meta" data-dcnode-id="1707"><div class="nova-legacy-v-publication-item__meta-left" dat n-inline-item__image" data-dcnode-id="1702"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1703"><span data-dcnode-id="1705" instrument_node=""> </span><img alt="Aliyu Aminu Ahmed" class="lite-image" data-dcnode-id="1704" data-src="https://i1.rgstatic.net/ii/profile.image/1042966009364485-1625673882890_Q64/Aliyu-Ahmed-5.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Aliyu Aminu Ahmed</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1692"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Rukayya-Aminu-Muhammed-2203041550"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1694"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Rukayya Aminu Muhammed</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1686"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1687"><span class="js-target-abstract-626b3c8535929 lite-page-hidden" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Abstract- Technological advancement from the beginning of this new millennium has been unmatched since the history of humanity. Humanity has leaped into to new frontiers in information and communication technologies. One of the new frontiers in science is Neurotechnology. Neurotechnology is a multibillion-dollar industry that is exponentially growing and giving science the opportunity to effectively explore the human brain. The proliferation and interest in Neurotechnology devices make it no longer feasible to confine their use to laboratories, they are now sold directly to the customers (DTC). Neurotechnologies were primarily used in medical field and now gradually introduced to other areas. While these technologies have demonstrated significant benefits to the medical field as relates to enhancement of physical and cognitive capabilities, their application in human resource management might raise several ethical, legal, social, and human rights implications. This study used a qualitative approach of systematic literature review as a methodology to explore the accessibility and use of the neurotechnology devices towards improving human productivity in the workplace. The study gave insights on the long-term implications of the neurotechnological devices as relate to the issue of safety, protection, and privacy. There is a possibility that manufacturers of the devices are motivated by profits and not safety of the consumers. It is therefore necessary for consumers and policy makers to understand the neurotechnology landscape, use and ethical challenges at this early stage of development and introduction to the public. It is necessary to design adequate and timely regulatory standards for Neurotechnologies that will enhance policy formulation in the field.

Index Terms- Neurotechnology, Neuroscience, Neuroeconomics, Neurotechnology devices.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1670"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1671"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1672"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1673"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1674"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1680"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/355126758_Accessibility_Use_and_Effectiveness_of_Neurotechnology_Devices_for_Improved_Productivity_in_Workplace"><span class="nova-legacy-c-button__label" data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-id="1675"><button class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1676" type="button"><span class="nova-legacy-c-button__label" data-dcnode-id="1677"><span class="js-lite-click" data-dcnode-id="1678" data-lite="{&quot; rocesses that support these behaviors.  ...</span></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1640"><div class="nova-legacy-o-stack nova-legacy-o-stack--gutter-m nova-legacy-o-stack--spacing-none nova-legacy-o-stack--show-divider nova-legacy-o-stack--no-gutter-outside" data-dcnode-id="1641"><div class="nova-legacy-o-stack__item" data-dcnode-id="1642"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-v-citation-item__context-body" data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">... Neuroscience ties measurable observations about cognitive behavior to physical brain processes that support these behaviors. Oktar</span><mark class="nova-legacy-e-text-highlight nova-legacy-e-text-highlight--color-yellow" data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node=""> [5]</span></mark><span data-dcnode-id="1644" instrument_node=""> suggests four key neuroscience concepts: 1) consciousness, 2) perception, 3) cognition, and 4) behavior. Consciousness is not observable, and it is not something that a person does or can be educated to perform.  ...</span></div></div></div></div></div></div></div></div><div class="nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow nova-legacy-c-tooltip__arrow--body" data-dcnode-id="1634"><div class="nova-legacy-c-tooltip__arrow-tip" data-dcnode-id="1635"></div></div></div></div></div><div class="nova-legacy-o-stack__item" data-dcnode-id="1566"><div class="nova-legacy-v-citation-item__context-source" data-dcnode-id="1567"><div class="nova-legacy-v-publication-item nova-legacy-v-publication-item--size-m gtm-citation-item" data-dcnode-id="1568"><div class="nova-legacy-v-publication-item__body" data-dcnode-id="1583"><div class="nova-legacy-v-publication-item__stack nova-legacy-v-publication-item__stack--gutter-m" data-dcnode-id="1584"><div class="nova-legac fic-contributions/W-James-64170708"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1602"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">W James</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1591"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/James-Davis-27"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1593"><span class="lite-person-inline-item__image" data-dcnode-id="1596"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1597"><span data-dcnode-id="1599" instrument_node=""> </span><img alt="James W Davis" class="lite-image" data-dcnode-id="1598" data-src="https://i1.rgstatic.net/ii/profile.image/273634207989773-1442250887352_Q64/James-Davis-27.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">James W Davis</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1585"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1586"><span class="js-target-abstract-626b3c8535ca3 lite-page-hidden" data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">An increasing body of information is being assembled to understand how persuasive technology can be applied to develop successful persuasive health systems. Both technology and human issues contribute to reduced success of some persuasive systems. Neuroscience research has opened the door to improved understanding of how humans process information during attitude formation, attitude change, and during persuasion attempts. This article presents the Neural Persuasion Model, which delves more deeply into the human component of persuasion. The model draws on current neuroscience research and theories of neural readiness and neural organization to suggest ways in which understanding the neural activity of the brain might close the gap between persuasive technology design and behavioral outcomes, particularly for addiction recovery and other circumstances where neural disorder exists.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1569"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1570"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1571"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1572"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1573"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1579"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/237118996_The_Neural_Persuasion_Model_Aligning_Neural_Readiness_Perceived_Need_and_Intervention_Strategies"><span class=" 9073885384704-1605672441064_Q64/Ika-Noer-Syamsiana-3.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Ika Noer Syamsiana</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1498"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Tundung-Subali-Patma-2209304204"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1500"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Tundung Subali Patma</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1493"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Saryana-Suradirapradja-2209314967"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1495"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Saryana Suradirapradja</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1487"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1488"><span class="js-target-abstract-626b3c8535847 lite-page-hidden" data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Business Intelligence (BI) in essential is a collection of techniques, methods, architectures, tools, and approaches for enabling businesses carry out positive competition in information technology era. To become a winner in the era where knowledge is the most important key to decision making, BI has to be more utilized by using advanced technology such as Artificial Intelligence (AI) and Cognitive Artificial Intelligence (CAI) combined with the spirit of military intelligence. In this article we introduce a new method in CAI called as Knowledge Growing System (KGS), a system that is able to develop its own knowledge while interacting with a phenomenon or an object. KGS is very prospective to be applied to carry out predictive analytics on just-in-time time-series data. By implementing Sense-Inference and Knowledge Generation-Decide and Act (SIDA) cycle, this learning paradigm can accelerate the acquisition of knowledge from new data thus can speed the business decision making. An example of KGS usage to obtain knowledge of business performance insight is also given to show the power of KGS to keep the business performance stable and sustain.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1471"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1472"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1473"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1474"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1475"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1481"><a class="nova-legacy-c-button nova-legacy-c-button--align-center no ="lite-image" data-dcnode-id="1416" data-src="https://i1.rgstatic.net/ii/profile.image/901436623822849-1591930647385_Q64/Indranath-Chatterjee.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">Indranath Chatterjee</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1403"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1404"><span class="js-target-abstract-626b3c8535b1d lite-page-hidden" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Brain-computer interface's (BCI) potential applications increased tremendously over the past decade. The rising of this new technology is providing promising solutions in the field of aerospace and space exploration. As astronauts face diverse challenges in long-duration spaceflight, BCI can help astronauts deal with complicated tasks with a minimal mental workload. It may provide intelligent communication systems, maximize safety and security, facilitate space discovery missions, and enhance astronauts' overall health and wellbeing. In new ventures such as SpaceX, Starlink, and Neuralink, pioneers adopt futuristic strategies that use BCI as their main anchor. Such efforts are valuable in neuroscience as they will reveal information that will allow neuroscientists to deeper understand the brain's mechanisms.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1387"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1388"><div class="nova-legacy-o-pack nova-leg AJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Aeiman Rafiq</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1334"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1335"><span class="js-target-abstract-626b3c8535a46 lite-page-hidden" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Neuroscience plays an important role to inform about brain functioning and corresponding behaviors. While scientists have continuously studied about brain in its entirety, several other fields in science, arts, and humanities are drawing applications from these neuroscientific studies. Similarly, in terms of education too, there are several applications. Once such is brain-based learning. This is to learn and teach with an understanding about brain’s capability and functioning to increase one’s learning potential. In order to do so, effective teaching is required. This particular chapter thus focuses on different teaching strategies which adopt brain-based learning and are evidence-based. The chapter initially informs about neuroscience and cognitive science interaction and its impact on effective teaching-learning process. After which evidence-based teaching strategies in classrooms, their importance via evidence-based studies, and techniques to incorporate them in classroom settings are explained. Finally, the chapter concludes with challenges and benefits.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1318"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1319"><div class="nova-legacy-o-pack name" data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">Wilder Penfield</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1208"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1209"><span class="js-target-abstract-626b3c8535ea5 lite-page-hidden" data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">In the past fifty years scientists have begun to discover how the human brain functions. In this book Wilder Penfield, whose work has been at the forefront of such research, describes the current state of knowledge about the brain and asks to what extent recent findings explain the action of the mind. He offers the general reader a glimpse of exciting discoveries usually accessible to only a few scientists. He writes: "Throughout my own scientific career I, like other scientists, have struggled to prove that the brain accounts for the mind. But perhaps the time has come when we may profitably consider the evidence as it stands, and ask the question...Can the mind be explained by what is now known about the brain?". The central question, he points out, is whether man's being is determined by his body alone or by mind and body as separate elements. Before suggesting an answer, he gives a fascinating account of his experience as a neurosurgeon and scientist observing the brain in conscious patients. Originally published in 1975. The Princeton Legacy Library uses the latest print-on-demand technology to again make available previously out-of-print books from the distinguished backlist of Princeton University Press. These paperback editions preserve the original texts of these important books while presenting them in durable paperback editions. The goal of the Princeton Legacy Libra Philosophical foundations of neuroscience by M. R. Bennett and P. M. S. Hacker. Those who take up the task of reading the 450 pages of this book can accept or reject one or more of the ideas and conclusions of the authors--but they will be unable to go back to "science as usual," passively accepting the dogmas so strongly shaken by the current authors. This means that the book is mandatory reading material. The book has several important merits. First, the tandem of prominent authors--a neurophysiologist and a philosopher--are fully devoted to the search for truth and clarity, not to impress the public with a new bestseller. Second, it is written in excellent English, with a brilliant sense of humor. Third, it is extremely comprehensive and in this respect, reminds one of James's 
Psychology. The authors consecutively analyze all forms of mental activity: sensation, pain, perception, imagination, memory, thinking, knowledge and beliefs, emotions, volition, and different kinds and subdivisions of consciousness. In addition to this, the authors briefly review the history of philosophical ideas as manifested in the classics of neuroscience from Willis and Bell to Adrian, Eccles, and Penfield. They discuss methodological issues in the study of the mind-body problem and formulate a clear, though not uncontroversial, view on what is possible and impossible for neuroscience, as well as what is possible and impossible for philosophy. They close with an analysis of the several most influential approaches in the modern philosophy of mind, as represented in the recent books of the Churchlands, Dennett, and Searle. Thus, the authors do not leave out any of the important problems of interest for cognitive and behavioral neuroscience. (PsycINFO Database Record (c) 2012 APA, all rights reserved)</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1135"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1136"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1137"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1138"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1139"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1145"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width e-item__fullname" data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Henri Korn</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="1046"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Philippe-Faure"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1048"><span class="lite-person-inline-item__image" data-dcnode-id="1051"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="1052"><span data-dcnode-id="1054" instrument_node=""> </span><img alt="Philippe Faure" class="lite-image" data-dcnode-id="1053" data-src="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Philippe Faure</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1040"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="1041"><span class="js-target-abstract-626b3c853618f lite-page-hidden" data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">The search for chaotic patterns has occupied numerous investigators in neuroscience, as in many other fields of science. Their results and main conclusions are reviewed in the light of the most recent criteria that need to be satisfied since the first descriptions of the surrogate strategy. The methods used in each of these studies have almost invariably combined the analysis of experimental data with simulations using formal models, often based on modified Huxley and Hodgkin equations and/or of the Hindmarsh and Rose models of bursting neurons. Due to technical limitations, the results of these simulations have prevailed over experimental ones in studies on the nonlinear properties of large cortical networks and higher brain functions. Yet, and although a convincing proof of chaos (as defined mathematically) has only been obtained at the level of axons, of single and coupled cells, convergent results can be interpreted as compatible with the notion that signals in the brain are distributed according to chaotic patterns at all levels of its various forms of hierarchy. This chronological account of the main landmarks of nonlinear neurosciences follows an earlier publication (Faure, Korn, C. R. Acad. Sci. Paris, Ser. III 324 (2001) 773-793) that was focused on the basic concepts of nonlinear dynamics and methods of investigations which allow chaotic processes to be distinguished from stochastic ones and on the rationale for envisioning their control using external perturbations. Here we present the data and main arguments that support the existence of chaos at all levels from the simplest to the most complex forms of organization of the nervous system. We first provide a short mathematical description of the models of excitable cells and of the different modes of firing of bursting neurons (Section 1). The deterministic behavior reported in giant axons (principally squid), in pacemaker cells, in isolated or in paired neurons of Invertebrates acting as coupled oscillators is then described (Section 2). We also consider chaotic processes exhibited by coupled Vertebrate neurons and of several components of Central Pattern Generators (Section 3). It is then shown that as indicated by studies of synaptic noise, deterministic patterns of firing in presynaptic interneurons are reliably transmitted, to their postsynaptic targets, via probabilistic synapses (Section 4). This raises the more general issue of chaos as a possible neuronal code and of the emerging concept of stochastic resonance Considerations on cortical dynamics and of EEGs are divided in two parts. The first concerns the early attempts by several pioneer authors to demonstrate chaos in experimental material such as the olfactory system or in human recordings during various forms of epilepsies, and the belief in 'dynamical diseases' (Section 5). The second part explores the more recent period during which surrogate-testing, definition of unstable periodic orbits and period-doubling bifurcations have been used to establish more firmly the nonlinear features of retinal and cortical activities and to define predictors of epileptic seizures (Section 6). Finally studies of multidimensional</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="1024"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="1025"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="1026"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="1027"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="1028"><div class="nova-legacy-c-button-group__item" data-dcnode-id="1034"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;ur -dcnode-id="1014"><div class="nova-legacy-e-text nova-legacy-e-text--size-l nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-2 nova-legacy-v-publication-item__title" data-dcnode-id="1015"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/8120546_On_the_role_of_general_system_theory_for_functional_neuroimaging"><span data-dcnode-id="1017" instrument_node="">On the role of general system theory for functional neuroimaging</span></a></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="1004"><div class="nova-legacy-v-publication-item__meta" data-dcnode-id="1005"><div class="nova-legacy-v-publication-item__meta-left" data-dcnode-id="1011"><span class="nova-legacy-e-badge nova-legacy-e-badge--color-green nova-legacy-e-badge--display-block nova-legacy-e-badge--luminosity-high nova-legacy-e-badge--size-l nova-legacy-e-badge--theme-solid nova-legacy-e-badge--radius-m nova-legacy-v-publication-item__type" data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Article</span></span></div><div class="nova-legacy-v-publication-item__meta-right" data-dcnode-id="1006"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__meta-data" data-dcnode-id="1007"><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="1008"><span class="" data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Jan 2005</span></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="997"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="998"><li class="nova-legacy-e-list__item" data-dcnode-id="999"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/scientific-contributions/Klaas-E-Stephan-39225686"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="1001"><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Klaas E Stephan</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="993"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="994"><span class="js-target-abstract-626b3c8536294 lite-page-hidden" data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">One of the most important goals of neuroscience is to establish precise structure-function relationships in the brain. Since the 19th century, a major scientific endeavour has been to associate structurally distinct cortical regions with specific cognitive functions. This was traditionally accomplished by correlating microstructurally defined areas with lesion sites found in patients with specific neuropsychological symptoms. Modern neuroimaging techniques with high spatial resolution have promised an alternative approach, enabling non-invasive measurements of regionally specific changes of brain activity that are correlated with certain components of a cognitive process. Reviewing classic approaches towards brain structure-function relationships that are based on correlational approaches, this article argues that these approaches are not sufficient to provide an understanding of the operational principles of a dynamic system such as the brain but must be complemented by models based on general system theory. These models reflect the connectional structure of the system under investigation and emphasize context-dependent couplings between the system elements in terms of effective connectivity. The usefulness of system models whose parameters are fitted to measured functional imaging data for testing hypotheses about structure-function relationships in the brain and their potential for clinical applications is demonstrated by several empirical examples.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="977"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="978"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="979"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="980"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="981"><div class="nova-legacy-c-button-group__item" data-dcnode-id="987"><a class="nova-legacy-c-button nova-legacy-c-button--align-center nova-legacy-c-button--radius-m nova-legacy-c-button--size-s nova-legacy-c-button--color-blue nova-legacy-c-button--theme-bare nova-legacy-c-button--width-auto nova-legacy-v-publication-item__action" data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/8120546_On_the_role_of_general_system_theory_for_functional_neuroimaging"><span class="nova-legacy-c-button__label" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">View</span></span></a></div><div class="nova-legacy-c-button-group__item" data-dcnode-i class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="943"><li class="nova-legacy-e-list__item" data-dcnode-id="944"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Giulio-Tononi"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="946"><span class="lite-person-inline-item__image" data-dcnode-id="949"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="950"><span data-dcnode-id="952" instrument_node=""> </span><img alt="Giulio Tononi" class="lite-image" data-dcnode-id="951" data-src="https://i1.rgstatic.net/ii/profile.image/436375511146496-1481051437011_Q64/Giulio-Tononi.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Giulio Tononi</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="938"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="939"><span class="js-target-abstract-626b3c85362ff lite-page-hidden" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Clinical observations have established that certain parts of the brain are essential for consciousness whereas other parts are not. For example, different areas of the cerebral cortex contribute different modalities and submodalities of consciousness, whereas the cerebellum does not, despite having even more neurons. It is also well established that consciousness depends on the way the brain functions. For example, consciousness is much reduced during slow wave sleep and generalized seizures, even though the levels of neural activity are comparable or higher than in wakefulness. To understand why this is so, empirical observations on the neural correlates of consciousness need to be complemented by a principled theoretical approach. Otherwise, it is unlikely that we could ever establish to what extent consciousness is present in neurological conditions such as akinetic mutism, psychomotor seizures, or sleepwalking, and to what extent it is present in newborn babies and animals. A principled approach is provided by the information integration theory of consciousness. This theory claims that consciousness corresponds to a system's capacity to integrate information, and proposes a way to measure such capacity. The information integration theory can account for several neurobiological observations concerning consciousness, including: (i) the association of consciousness with certain neural systems rather than with others; (ii) the fact that neural processes underlying consciousness can influence or be influenced by neural processes that remain unconscious; (iii) the reduction of consciousness during dreamless sleep and generalized seizures; and (iv) the time requirements on neural interactions that support consciousness.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="922"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="923"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="924"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="925"><div class="nova-legacy-c-button-group nova-legacy-c-button-gr cing-none nova-legacy-v-publication-item__meta-data" data-dcnode-id="901"><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="906"><span class="" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">May 2006</span></span></li><li class="nova-legacy-e-list__item nova-legacy-v-publication-item__meta-data-item" data-dcnode-id="902"><span class="" data-dcnode-id="903"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-decorated" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/journal/Neuroscience-0306-4522"><span data-dcnode-id="905" instrument_node="">NEUROSCIENCE</span></a></span></li></ul></div></div></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="887"><ul class="nova-legacy-e-list nova-legacy-e-list--size-m nova-legacy-e-list--type-inline nova-legacy-e-list--spacing-none nova-legacy-v-publication-item__person-list" data-dcnode-id="888"><li class="nova-legacy-e-list__item" data-dcnode-id="889"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/Bradley-Postle"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="891"><span class="lite-person-inline-item__image" data-dcnode-id="894"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="895"><span data-dcnode-id="897" instrument_node=""> </span><img alt="Bradley R Postle" class="lite-image" data-dcnode-id="896" data-src="https://i1.rgstatic.net/ii/profile.image/272682042261513-1442023873721_Q64/Bradley-Postle.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Bradley R Postle</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="883"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="884"><span class="js-target-abstract-626b3c85363e6 lite-page-hidden" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Cognitive neuroscience research on working memory has been largely motivated by a standard model that arose from the melding of psychological theory with neuroscience data. Among the tenets of this standard model are that working memory functions arise from the operation of specialized systems that act as buffers for the storage and manipulation of information, and that frontal cortex (particularly prefrontal cortex) is a critical neural substrate for these specialized systems. However, the standard model has been a victim of its own success, and can no longer accommodate many of the empirical findings of studies that it has motivated. An alternative is proposed: Working memory functions arise through the coordinated recruitment, via attention, of brain systems that have evolved to accomplish sensory-, representation-, and action-related functions. Evidence from behavioral, neuropsychological, electrophysiological, and neuroimaging studies, from monkeys and humans, is considered, as is the question of how to interpret delay-period activity in the prefrontal cortex.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="867"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="868"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-a -dcnode-id="822"><span data-dcnode-id="824" instrument_node=""> </span><img alt="Gordon Winocur" class="lite-image" data-dcnode-id="823" data-src="https://c5.rgstatic.net/m/4671872220764/images/template/default/profile/profile_default_m.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Gordon Winocur</span></span></span></a></li><li class="nova-legacy-e-list__item" data-dcnode-id="807"><a class="nova-legacy-e-link nova-legacy-e-link--color-inherit nova-legacy-e-link--theme-bare" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/profile/R-Shayna-Rosenbaum"><span class="nova-legacy-v-person-inline-item" data-dcnode-id="809"><span class="lite-person-inline-item__image" data-dcnode-id="812"><picture class="lite-page-avatar lite-page-avatar--size-xs lite-page-avatar--radius-full" data-dcnode-id="813"><span data-dcnode-id="815" instrument_node=""> </span><img alt="R. Shayna Rosenbaum" class="lite-image" data-dcnode-id="814" data-src="https://i1.rgstatic.net/ii/profile.image/272336708435972-1441941539246_Q64/R-Shayna-Rosenbaum.jpg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN89OjNfwAJDwOxHEacwgAAAABJRU5ErkJggg=="></picture></span><span class="nova-legacy-v-person-inline-item__fullname" data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">R. Shayna Rosenbaum</span></span></span></a></li></ul></div><div class="nova-legacy-v-publication-item__stack-item" data-dcnode-id="801"><div class="nova-legacy-e-text nova-legacy-e-text--size-m nova-legacy-e-text--family-sans-serif nova-legacy-e-text--spacing-none nova-legacy-e-text--color-inherit nova-legacy-e-text--clamp-3 nova-legacy-v-publication-item__description" data-dcnode-id="802"><span class="js-target-abstract-626b3c85366c7 lite-page-hidden" data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">The processes and mechanisms implicated in retention and retrieval of memories as they age is an enduring problem in cognitive neuroscience. Research from lesion and functional neuroimaging studies on remote episodic, semantic and spatial memory in humans is crucial for evaluating three theories of hippocampal and/or medial temporal lobe-neocortical interaction in memory retention and retrieval: cognitive map theory, standard consolidation theory and multiple trace theory. Each theory makes different predictions regarding first, the severity and extent of retrograde amnesia following lesions to some or all of the structures mentioned; second, the extent of activation of these structures to retrieval of memory across time; and third, the type of memory being retrieved. Each of these theories has strengths and weaknesses, and there are various unresolved issues. We propose a unified account based on multiple trace theory. This theory states that the hippocampus is needed for re-experiencing detailed episodic and spatial memories no matter how old they are, and that it contributes to the formation and assimilation of semantic memories and schematic spatial maps.</span></span></div></div></div></div><footer class="nova-legacy-v-publication-item__footer" data-dcnode-id="785"><div class="nova-legacy-v-publication-item__footer-actions" data-dcnode-id="786"><div class="nova-legacy-o-pack nova-legacy-o-pack--gutter-m nova-legacy-o-pack--width-auto nova-legacy-o-pack--vertical-align-middle" data-dcnode-id="787"><div class="nova-legacy-o-pack__item nova-legacy-v-publication-item__footer-button-group" data-dcnode-id="788"><div class="nova-legacy-c-button-group nova-legacy-c-button-group--gutter-m nova-legacy-c-button-group--orientation-horizontal nova-legacy-c-button-group--width-auto nova-legacy-v-publication-item__actions" data-dcnode-id="789"><div class="n
