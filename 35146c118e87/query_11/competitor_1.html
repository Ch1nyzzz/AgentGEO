</span><a class="reset-hash-position" data-dcnode-id="1969" id="h6" name="h6"></a><h2 data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">5. Proposed Theory</span></h2><span data-dcnode-id="1966" instrument_node="">
</span><p class="mb0" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">I noted earlier that Ollinger's model for insight problem solving, while serving as a good candidate for RWPS, requires extension. In this section, I propose a candidate model that includes some necessary extensions to Ollinger's framework. I begin by laying out some preliminary notions that underlie the proposed model.</span></p><span data-dcnode-id="1963" instrument_node="">
</span><h3 data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">5.1. Dual Attentional Modes</span></h3><span data-dcnode-id="1960" instrument_node="">
</span><p class="mb15" data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">I propose that the attention-switching mechanism described earlier is at the heart of RWPS and enables two modes of operation: focused and defocused mode. In the focused mode, the problem representation is more or less fixed, and problem solving proceeds in a focused and goal directed manner through search, planning, and execution mechanisms. In the defocused mode, problem solving is not necessarily goal directed, but attempts to generate ideas, driven by both internal and external items.</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p class="mb15" data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">At first glance, these modes might seem similar to convergent and divergent thinking modes postulated by numerous others to account for creative problem solving. Divergent thinking allows for the generation of new ideas and convergent thinking allows for verification and selection of generated ideas. So, it might seem that focused mode and convergent thinking are similar and likewise divergent and defocused mode. They are, however, quite different. The modes relate less to idea generation and verification, and more to the specific mechanisms that are operating with regard to a particular problem at a particular moment in time. Convergent and divergent processes may be occurring during both defocused and focused modes. Some degree of divergent processes may be used to search and identify specific solution strategies in focused mode. Also, there might be some degree of convergent idea verification occuring in defocused mode as candidate items are evaluated for their fit with the problem and goal. Thus, convergent and divergent thinking are one amongst many mechanisms that are utilized in focused and defocused mode. Each of these two modes has to do with degree of attention placed on a particular problem.</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p class="mb15" data-dcnode-id="1943"><span data-dcnode-id="1953" instrument_node="">There have been numerous dual-process and dual-systems models of cognition proposed over the years. To address criticisms raised against these models and to unify some of the terminology, Evans &amp; Stanovich proposed a dual-process model comprising Type 1 and Type 2 thought (</span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B19"><span data-dcnode-id="1952" instrument_node="">Evans and Stanovich, 2013</span></a><span data-dcnode-id="1950" instrument_node="">; </span><a data-dcnode-id="1948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1949" instrument_node="">Sowden et al., 2015</span></a><span data-dcnode-id="1947" instrument_node="">). Type 1 processes are those that are believed to be autonomous and do not require working memory. Type 2 processes, on the other hand, are believed to require working memory and are cognitively decoupled to prevent real-world representations from becoming confused with mental simulations (</span><a data-dcnode-id="1945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1946" instrument_node="">Sowden et al., 2015</span></a><span data-dcnode-id="1944" instrument_node="">). While acknowledging various other attributes that are often used to describe dual process models (e.g., fast/slow, associative/rule-based, automatic/controlled), Evans &amp; Stanovich note that these attributes are merely frequent correlates and not defining characteristics of Type 1 or Type 2 processes. The proposed dual attentional modes share some similarities with the Evans &amp; Stanovich Type 1 and 2 models. Specifically, Type 2 processes might occur in focused attentional mode in the proposed model as they typically involve the working memory and certain amount of analytical thought and planning. Similarly, Type 1 processes are likely engaged in defocused attentional mode as there are notions of associative and generative thinking that might be facilitated when attention has been defocused. The crucial difference between the proposed model and other dual-process models is that the dividing line between focused and defocused attentional modes is the degree of openness to internal and external stimuli (by various networks and functional units in the brain) when problem solving. Many dual process models were designed to classify the “type” of thinking process or a form of cognitive processing. In some sense, the “processes” in dual process theories are characterized by the type of mechanism of operation or the type of output they produced. Here, I instead characterize and differentiate the modes of thinking by the receptivity of different functional units in the brain to input during problem solving.</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p class="mb0" data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">This, however, raises a different question of the relationship between these attentional modes and conscious vs. unconscious thinking. It is clear that both the conscious and unconscious are involved in problem solving, as well as in RWPS. Here, I claim that a problem being handled is, at any given point in time, in either a focused mode or in a defocused mode. When in the focused mode, problem solving primarily proceeds in a manner that is available for conscious deliberation. More specifically, problem space elements and representations are tightly managed and plans and strategies are available in the working memory and consciously accessible. There are, however, secondary unconscious operations in the focused modes that includes targeted memory retrieval and heuristic-based searches. In the defocused mode, the problem is primarily managed in an unconscious way. The problem space elements are broken apart and loosely managed by various mechanisms that do not allow for conscious deliberation. That said, it is possible that some problem parameters remain accessible. For example, it is possible that certain goal information is still maintained consciously. It is also possible that indexes to all the problems being considered by the solver are maintained and available to conscious awareness.</span></p><span data-dcnode-id="1939" instrument_node="">
</span><h3 data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">5.2. RWPS Model</span></h3><span data-dcnode-id="1936" instrument_node="">
</span><p class="mb0" data-dcnode-id="1928"><span data-dcnode-id="1935" instrument_node="">Returning to Ollinger's model for insight problem solving, it now becomes readily apparent how this model can be modified to incorporate environmental effects as well as generalizing the notion of intervening events beyond that of impasses. I propose a theory for RWPS that begins with standard analytical problem-solving process (See Figures </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F1"><span data-dcnode-id="1934" instrument_node="">1</span></a><span data-dcnode-id="1932" instrument_node="">, </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23F2"><span data-dcnode-id="1931" instrument_node="">2</span></a><span data-dcnode-id="1929" instrument_node="">).</span></p><span data-dcnode-id="1927" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1926"></div><span data-dcnode-id="1925" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">FIGURE 1</span></div><span data-dcnode-id="1922" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="1906"><span data-dcnode-id="1921" instrument_node="">
</span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/300338/fnhum-12-00261-HTML/image_m/fnhum-12-00261-g001.jpg" name="figure1" target="_blank"><span data-dcnode-id="1920" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1919" id="F1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/300338/fnhum-12-00261-HTML/image_t/fnhum-12-00261-g001.gif&amp;raw"></a><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1907"><strong data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">Figure 1</span></strong><span data-dcnode-id="1914" instrument_node="">. Summary of neural activations during focused problem-solving </span><strong data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">(Left)</span></strong><span data-dcnode-id="1911" instrument_node=""> and defocused problem-solving </span><strong data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">(Right)</span></strong><span data-dcnode-id="1908" instrument_node="">. During defocused problem-solving, the salience network (insula and ACC) coordinates the switching of several networks into a defocused attention mode that permits the reception of a more varied set of stimuli and interpretations via both the internally-guided networks (default mode network DMN) and externally guided networks (Attention). PFC, prefrontal cortex; ACC, anterior cingulate cortex; PCC, posterior cingulate cortex; IPC, inferior parietal cortex; PPC, posterior parietal cortex; IPS, intra-parietal sulcus; TPJ, temporoparietal junction; MTL, medial temporal lobe; FEF, frontal eye field.</span></p></div><span data-dcnode-id="1905" instrument_node="">
</span><div class="clear" data-dcnode-id="1904"></div><span data-dcnode-id="1903" instrument_node="">
</span><div class="DottedLine mb15" data-dcnode-id="1902"></div><span data-dcnode-id="1901" instrument_node="">
</span><div class="Imageheaders" data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">FIGURE 2</span></div><span data-dcnode-id="1898" instrument_node="">
</span><div class="FigureDesc" data-dcnode-id="1888"><span data-dcnode-id="1897" instrument_node="">
</span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/300338/fnhum-12-00261-HTML/image_m/fnhum-12-00261-g002.jpg" name="figure2" target="_blank"><span data-dcnode-id="1896" instrument_node="">
</span><img alt="www.frontiersin.org" data-dcnode-id="1895" id="F2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.frontiersin.org/files/Articles/300338/fnhum-12-00261-HTML/image_t/fnhum-12-00261-g002.gif&amp;raw"></a><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1889"><strong data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">Figure 2</span></strong><span data-dcnode-id="1890" instrument_node="">. Proposed Model for Real World Problem Solving (RWPS). The corresponding neural correlates are shown in italics. During problem-solving, an initial problem representation is formed based on prior knowledge and available perceptual information. The problem-solving then proceeds in a focused, goal-directed mode until the goal is achieved or a defocusing event (e.g., impasse or distraction) occurs. During focused mode operation, the solver interacts with the environment in directed manner, executing focused plans, and allowing for predicted items to be activated by the environment. When a defocusing event occurs, the problem-solving then switches into a defocused mode until a focusing event (e.g., discovery) occurs. In defocused mode, the solver performs actions unrelated to the problem (or is inactive) and is receptive to a set of environmental triggers that activate novel aspects using the three mechanisms discussed in this paper. When a focusing event occurs, the diffused problem elements cohere into a restructured representation and problem-solving returns into a focused mode.</span></p></div><span data-dcnode-id="1887" instrument_node="">
</span><div class="clear" data-dcnode-id="1886"></div><span data-dcnode-id="1885" instrument_node="">
</span><div class="DottedLine" data-dcnode-id="1884"></div><span data-dcnode-id="1883" instrument_node="">
</span><h4 data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">5.2.1. Focused Problem Solving Mode</span></h4><span data-dcnode-id="1880" instrument_node="">
</span><p class="mb0" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Initially, both prior knowledge and perceptual entities help guide the creation of problem representations in working memory. Prior optimal or rewarding solution strategies are obtained from LTM and encoded in the working memory as well. This process is largely analytical and the solver interacts with their environment through focused plan or idea execution, targeted observation of prescribed entities, and estimating prediction error of these known entities. More specifically, when a problem is presented, the problem representations are activated and populated into working memory in the PFC, possibly in structured representations along convergence zones. The PFC along with the Striatum and the MTL together attempt at retrieving an optimal or previously rewarded solution strategy from long term memory. If successfully retrieved, the solution strategy is encoded into the PPC as a mental template, which then guides relevant motor control regions to execute the plan.</span></p><span data-dcnode-id="1877" instrument_node="">
</span><h4 data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">5.2.2. Defocusing Event-Triggered Mode Switching</span></h4><span data-dcnode-id="1874" instrument_node="">
</span><p class="mb0" data-dcnode-id="1866"><span data-dcnode-id="1873" instrument_node="">The search and solve strategy then proceeds analytically until a “defocusing event” is encountered. The salience network (AI and ACC) monitor for conflicts and attempt to detect any such events in the problem-solving process. As long as no conflicts are detected, the salience network focuses on recruiting networks to achieve goals and suppresses the DMN (</span><a data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1872" instrument_node="">Beaty et al., 2016</span></a><span data-dcnode-id="1870" instrument_node="">). If the plan execution or retrieval of the solution strategy fails, then a defocusing event is detected and the salience network performs mode switching. The salience network dynamically switches from the focused problem-solving mode to a defocused problem-solving mode (</span><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B47"><span data-dcnode-id="1869" instrument_node="">Menon, 2015</span></a><span data-dcnode-id="1867" instrument_node="">). Ollinger's current model does not account for other defocusing events beyond an impasse, but it is not inconceivable that there could be other such events triggered by external stimuli (e.g., distraction or an affective event) or by internal stimuli (e.g., mind wandering).</span></p><span data-dcnode-id="1865" instrument_node="">
</span><h4 data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">5.2.3. Defocused Problem Solving Mode</span></h4><span data-dcnode-id="1862" instrument_node="">
</span><p class="mb15" data-dcnode-id="1845"><span data-dcnode-id="1861" instrument_node="">In defocused mode, the problem is operated on by mechanisms that allow for the generation and testing of novel ideas. Several large-scale brain networks are recruited to explore and generate new ideas. The search for novel ideas is facilitated by generally defocused attention, which in turn allows for creative idea generation from both internal as well as external sources. The salience network switches operations from defocused event detection to focused event or discovery detection, whereby for example, environmental events or ideas that are deemed interesting can be detected. During this idea exploration phase, internally, the DMN is no longer suppressed and attempts to generate new ideas for problem-solving. It is known that the IPC is involved in the generation of new ideas (</span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B10"><span data-dcnode-id="1860" instrument_node="">Benedek et al., 2014</span></a><span data-dcnode-id="1858" instrument_node="">) and together with the PPC in coupling different information together (</span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B61"><span data-dcnode-id="1857" instrument_node="">Simone Sandkühler, 2008</span></a><span data-dcnode-id="1855" instrument_node="">; </span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="1854" instrument_node="">Stocco et al., 2012</span></a><span data-dcnode-id="1852" instrument_node="">). </span><a data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1851" instrument_node="">Beaty et al. (2016)</span></a><span data-dcnode-id="1849" instrument_node=""> have proposed that even this internal idea-generation process can be goal directed, thereby allowing for a closer working relationship between the CEN and the DMN. They point to neuroimaging evidence that support the possibility that the executive control network (comprising the lateral prefrontal and inferior parietal regions) can constrain and direct the DMN in its process of generating ideas to meet task-specific goals via top down monitoring and executive control (</span><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1848" instrument_node="">Beaty et al., 2016</span></a><span data-dcnode-id="1846" instrument_node="">). The control network is believed to maintain an “internal train of thought” by keeping the task goal activated, thereby allowing for strategic and goal-congruent searches for ideas. Moreover, they suggest that the extent of CEN involvement in the DMN idea-generation may depend on the extent to which the creative task is constrained. In the RWPS setting, I would suspect that the internal search for creative solutions is not entirely unconstrained, even in the defocused mode. Instead, the solver is working on a specified problem and thus, must maintain the problem-thread while searching for solutions. Moreover, self-generated ideas must be evaluated against the problem parameters and thereby might need some top-down processing. This would suggest that in such circumstances, we would expect to see an increased involvement of the CEN in constraining the DMN.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p class="mb0" data-dcnode-id="1842"><span data-dcnode-id="1843" instrument_node="">On the external front, several mechanisms are operating in this defocused mode. Of particular note are the dorsal attention network, composed of the visual cortex (V), IPS and the frontal eye field (FEF) along with the precuneus and the caudate nucleus allow for partial cues to be considered. The MTL receives synthesized cue and contextual information and populates the WM in the PFC with a potentially expanded set of information that might be relevant for problem-solving. The precuneus, dlPFC and PPC together trigger the activation and use of a heuristic prototype based on an event in the environment. The caudate nucleus facilitates information routing between the PFC and PPC and is involved in learning and skill acquisition.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><h4 data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">5.2.4. Focusing Event-Triggered Mode Switching</span></h4><span data-dcnode-id="1838" instrument_node="">
</span><p class="mb0" data-dcnode-id="1833"><span data-dcnode-id="1837" instrument_node="">The problem's life in this defocused mode continues until a focusing event occurs, which could be triggered by either external (e.g., notification of impending deadline, discovery of a novel property in the environment) or internal items (e.g., goal completion, discovery of novel association or updated relevancy of a previously irrelevant item). As noted earlier, an internal train of thought may be maintained that facilitates top-down evaluation of ideas and tracking of these triggers (</span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="1836" instrument_node="">Beaty et al., 2016</span></a><span data-dcnode-id="1834" instrument_node="">). The salience network switches various networks back to the focused problem-solving mode, but not without the potential for problem restructuring. As noted earlier, problem space elements are maintained somewhat loosely in the defocused mode. Thus, upon a focusing event, a set or subset of these elements cohere into a tight (restructured) representation suitable for focused mode problem solving. The process then repeats itself until the goal has been achieved.</span></p><span data-dcnode-id="1832" instrument_node="">
</span><h3 data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">5.3. Model Predictions</span></h3><span data-dcnode-id="1829" instrument_node="">
</span><h4 class="pt0" data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">5.3.1. Single-Mode Operation</span></h4><span data-dcnode-id="1826" instrument_node="">
</span><p class="mb15" data-dcnode-id="1821"><span data-dcnode-id="1825" instrument_node="">The proposed RWPS model provides several interesting hypotheses, which I discuss next. First, the model assumes that any given problem being worked on is in one mode or another, but not both. Thus, the model predicts that there cannot be focused plan execution on a problem that is in defocused mode. The corollary prediction is that novel perceptual cues (as those discussed in section 4) cannot help the solver when in focused mode. The corollary prediction, presumably has some support from the inattentional blindness literature. Inattentional blindness is when perceptual cues are not noticed during a task (e.g., counting the number of basketball passes between several people, but not noticing a gorilla in the scene) (</span><a data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B62"><span data-dcnode-id="1824" instrument_node="">Simons and Chabris, 1999</span></a><span data-dcnode-id="1822" instrument_node="">). It is possible that during focused problem solving, that external and internally generated novel ideas are simply not considered for problem solving. I am not claiming that these perceptual cues are always ignored, but that they are not considered within the problem. Sometimes external cues (like distracting occurrences) can serve as defocusing events, but the model predicts that the actual content of these cues are not themselves useful for solving the specific problem at hand.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p class="mb0" data-dcnode-id="1815"><span data-dcnode-id="1819" instrument_node="">When comparing dual-process models </span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="1818" instrument_node="">Sowden et al. (2015)</span></a><span data-dcnode-id="1816" instrument_node=""> discuss shifting from one type of thinking to another and explore how this shift relates to creativity. In this regard, they weigh the pros and cons of serial vs. parallel shifts. In dual-process models that suggest serial shifts, it is necessary to disengage one type of thought prior to engaging the other or to shift along a continuum. Whereas, in models that suggest parallel shifts, each of the thinking types can operate in parallel. Per this construction, the proposed RWPS model is serial, however, not quite in the same sense. As noted earlier, the RWPS model is not a dual-process model in the same sense as other dual process model. Instead, here, the thrust is on when the brain is receptive or not receptive to certain kinds of internal and external stimuli that can influence problem solving. Thus, while the modes may be serial with respect to a certain problem, it does not preclude the possibility of serial and parallel thinking processes that might be involved within these modes.</span></p><span data-dcnode-id="1814" instrument_node="">
</span><h4 data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">5.3.2. Event-Driven Transitions</span></h4><span data-dcnode-id="1811" instrument_node="">
</span><p class="mb15" data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The model requires an event (defocusing or focusing) to transition from one mode to another. After all why else would a problem that is successfully being resolved in the focused mode (toward completion) need to necessarily be transferred to defocused mode? These events are interpreted as conflicts in the brain and therefore the mode-switching is enabled by the saliency network and the ACC. Thus, the model predicts that there can be no transition from one mode to another without an event. This is a bit circular, as an event is really what triggers the transition in the first place. But, here I am suggesting that an external or internal cue triggered event is what drives the transition, and that transitions cannot happen organically without such an event. In some sense, the argument is that the transition is discontinuous, rather than a smooth one. Mind-wandering is good example of when we might drift into defocused mode, which I suggest is an example of an internally driven event caused by an alternative thought that takes attention away from the problem.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p class="mb0" data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">A model assumption underlying RWPS is that events such as impasses have a similar effect to other events such as distraction or mind wandering. Thus, it is crucial to be able to establish that there exists of class of such events and they have a shared effect on RWPS, which is to switch attentional modes.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><h4 data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">5.3.3. Focused Mode Completion</span></h4><span data-dcnode-id="1802" instrument_node="">
</span><p class="mb0" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The model also predicts that problems cannot be solved (i.e., completed) within the defocused mode. A problem can be considered solved when a goal is reached. However, if a goal is reached and a problem is completed in the defocused mode, then there must have not been any converging event or coherence of problem elements. While it is possible that the solver arbitrarily arrived at the goal in a diffused problem space and without conscious awareness of completing the task or even any converging event or problem recompiling, it appears somewhat unlikely. It is true that there are many tasks that we complete without actively thinking about it. We do not think about what foot to place in front of another while walking, but this is not an instance of problem solving. Instead, this is an instance of unconscious task completion.</span></p><span data-dcnode-id="1799" instrument_node="">
</span><h4 data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">5.3.4. Restructuring Required</span></h4><span data-dcnode-id="1796" instrument_node="">
</span><p class="mb15" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">The model predicts that a problem cannot return to a focused mode without some amount of restructuring. That is, once defocused, the problem is essentially never the same again. The problem elements begin interacting with other internally and externally-generated items, which in turn become absorbed into the problem representation. This prediction can potentially be tested by establishing some preliminary knowledge, and then showing one group of subjects the same knowledge as before, while showing the another group of subjects different stimuli. If the model's predictions hold, the problem representation will be restructured in some way for both groups.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p class="mb0" data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">There are numerous other such predictions, which are beyond the scope of this paper. One of the biggest challenges then becomes evaluating the model to set up suitable experiments aimed at testing the predictions and falsifying the theory, which I address next.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1789" id="h7" name="h7"></a><h2 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">6. Experimental Challenges and Paradigms</span></h2><span data-dcnode-id="1786" instrument_node="">
</span><p class="mb15" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">One of challenges in evaluating the RWPS is that real world factors cannot realistically be accounted for and sufficiently controlled within a laboratory environment. So, how can one controllably test the various predictions and model assumptions of “real world” problem solving, especially given that by definition RWPS involves the external environment and unconscious processing? At the expense of ecological validity, much of insight problem solving research has employed an experimental paradigm that involves providing participants single instances of suitably difficult problems as stimuli and observing various physiological, neurological and behavioral measures. In addition, through verbal protocols, experimenters have been able to capture subjective accounts and problem solving processes that are available to the participants' conscious. These experiments have been made more sophisticated through the use of timed-hints and/or distractions. One challenge with this paradigm has been the selection of a suitable set of appropriately difficult problems. The classic insight problems (e.g., Nine-dot, eight-coin) can be quite difficult, requiring complicated problem solving processes, and also might not generalize to other problems or real world problems. Some in the insight research community have moved in the direction of verbal tasks (e.g., riddles, anagrams, matchstick rebus, remote associates tasks, and compound remote associates tasks). Unfortunately, these puzzles, while providing a great degree of controllability and repeatability, are even less realistic. These problems are not entirely congruent with the kinds of problems that humans are solving every day.</span></p><span data-dcnode-id="1783" instrument_node="">
</span><p class="mb15" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">The other challenge with insight experiments is the selection of appropriate performance and process tracking measures. Most commonly, insight researchers use measures such as time to solution, probability of finding solution, and the like for performance measures. For process tracking, verbal protocols, coded solution attempts, and eye tracking are increasingly common. In neuroscientific studies of insight various neurological measures using functional magnetic resonance imaging (fMRI), electroencephalography (EEGs), transcranial direct current stimulation (tDCS), and transcranial magnetic stimulation (tMS) are popular and allow for spatially and temporally localizing an insight event.</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p class="mb15" data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Thus, the challenge for RWPS is two-fold: (1) selection of stimuli (real world problems) that are generalizable, and (2) selection of measures (or a set of measures) that can capture key aspects of the problem solving process. Unfortunately, these two challenges are somewhat at odds with each other. While fMRI and various neuroscientific measures can capture the problem solving process in real time, it is practically difficult to provide participants a realistic scenario while they are laying flat on their back in an fMRI machine and allowed to move nothing more than a finger. To begin addressing this conundrum, I suggest returning to object manipulation problems (not all that different from those originally introduced by Maier and Duncker nearly a century ago), but using modern computing and user-interface technologies.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p class="mb15" data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">One pseudo-realistic approach is to generate challenging object manipulation problems in Virtual Reality (VR). VR has been used to describe 3-D environment displays that allows participants to interact with artificially projected, but experientially realistic scenarios. It has been suggested that virtual environments (VE) invoke the same cognitive modules as real equivalent environmental experience (</span><a data-dcnode-id="1774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B24"><span data-dcnode-id="1775" instrument_node="">Foreman, 2010</span></a><span data-dcnode-id="1773" instrument_node="">). Crucially, since VE's can be scaled and designed as desired, they provide a unique opportunity to study pseudo-RWPS. However, a VR-based research approach has its limitations, one of which is that it is nearly impossible to track participant progress through a virtual problem using popular neuroscientific measures such as fMRI because of the limited mobility of connected participants.</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p class="mb0" data-dcnode-id="1766"><span data-dcnode-id="1770" instrument_node="">Most of the studies cited in this paper utilized an fMRI-based approach in conjunction with a verbal or visual task involving problem-solving or creative thinking. Very few, if any, studies involved the use physical manipulation, and those physical manipulations were restricted to limited finger movements. Thus, another pseudo-realistic approach is allowing subjects to teleoperate robotic arms and legs from inside the fMRI machine. This paradigm has seen limited usage in psychology and robotics, in studies focused on Human-Robot interaction (</span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B39"><span data-dcnode-id="1769" instrument_node="">Loth et al., 2015</span></a><span data-dcnode-id="1767" instrument_node="">). It could be an invaluable tool in studying real-time dynamic problem-solving through the control of a robotic arm. In this paradigm a problem solving task involving physical manipulation is presented to the subject via the cameras of a robot. The subject (in an fMRI) can push buttons to operate the robot and interact with its environment. While the subjects are not themselves moving, they can still manipulate objects in the real world. What makes this paradigm all the more interesting is that the subject's manipulation-capabilities can be systematically controlled. Thus, for a particular problem, different robotic perceptual and manipulation capabilities can be exposed, allowing researchers to study solver-problem dynamics in a new way. For example, even simple manipulation problems (e.g., re-arranging and stacking blocks on a table) can be turned into challenging problems when the robotic movements are restricted. Here, the problem space restrictions are imposed not necessarily on the underlying problem, but on the solver's own capabilities. Problems of this nature, given their simple structure, may enable studying everyday practical creativity without the burden of devising complex creative puzzles. Crucial to note, both these pseudo-realistic paradigms proposed demonstrate a tight interplay between the solver's own capabilities and their environment.</span></p><span data-dcnode-id="1765" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="1764" id="h8" name="h8"></a><h2 data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">7. Conclusion</span></h2><span data-dcnode-id="1761" instrument_node="">
</span><p class="mb0" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">While the neural basis for problem-solving, creativity and insight have been studied extensively in the past, there is still a lack of understanding of the role of the environment in informing the problem-solving process. Current research has primarily focused on internally-guided mental processes for idea generation and evaluation. However, the type of real world problem-solving (RWPS) that is often considered a hallmark of human intelligence has involved both a dynamic interaction with the environment and the ability to handle intervening and interrupting events. In this paper, I have attempted to synthesize the literature into a unified theory of RWPS, with a specific focus on ways in which the environment can help problem-solve and the key neural networks involved in processing and utilizing relevant and useful environmental information. Understanding the neural basis for RWPS will allow us to be better situated to solve difficult problems. Moreover, for researchers in computer science and artificial intelligence, clues into the neural underpinnings of the computations taking place during creative RWPS, can inform the design the next generation of helper and exploration robots which need these capabilities in order to be resourceful and resilient in the open-world.</span></p><span data-dcnode-id="1758" instrument_node="">

</span><a class="reset-hash-position" data-dcnode-id="1729" id="h13" name="h13"></a><h2 data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">Footnotes</span></h2><span data-dcnode-id="1726" instrument_node="">
</span><div class="fulltextdescription" data-dcnode-id="1701" id="footnotetext"><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1720" id="note1" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="1724" instrument_node="">1. </span><a class="footnotetextanchor" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1a" title=""><span data-dcnode-id="1723" instrument_node="">^</span></a><span data-dcnode-id="1721" instrument_node="">My intention is not to ignore the benefits of a concentrated internal thought process which likely occurred as well, but merely to acknowledge the possibility that the environment might have also helped.</span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1714" id="note2" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="1718" instrument_node="">2. </span><a class="footnotetextanchor" data-dcnode-id="1716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2a" title=""><span data-dcnode-id="1717" instrument_node="">^</span></a><span data-dcnode-id="1715" instrument_node="">The research in insight does extensively use “hints” which are, arguably, a form of external influence. But these hints are highly targeted and might not be available in this explicit form when solving problems in the real world.</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1708" id="note3" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="1712" instrument_node="">3. </span><a class="footnotetextanchor" data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note3a" title=""><span data-dcnode-id="1711" instrument_node="">^</span></a><span data-dcnode-id="1709" instrument_node="">The accuracy of these accounts has been placed in doubt. They often are recounted years later, with inaccuracies, and embellished for dramatic effect.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1702" id="note4" style="margin-top:0em;margin-bottom:0em;margin-left:1em;text-indent:-1em;"><span data-dcnode-id="1706" instrument_node="">4. </span><a class="footnotetextanchor" data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note4a" title=""><span data-dcnode-id="1705" instrument_node="">^</span></a><span data-dcnode-id="1703" instrument_node="">I use the term “agent” to refer to the problem-solver. The term agent is more general than “creature” or “person” or “you" and is intentionally selected to broadly reference humans, animals as well as artificial agents. I also selectively use the term “solver.”</span></p></div><span data-dcnode-id="1700" instrument_node="">
