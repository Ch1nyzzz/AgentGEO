</span><meta content="Real world problem-solving (RWPS) is what we do every day. It requires flexibility, resilience, resourcefulness, and a certain degree of creativity. A crucial feature of RWPS is that it involves continuous interaction with the environment during the problem-solving process. In this process, the environment can be seen as not only a source of inspiration for new ideas but also as a tool to facilitate creative thinking. The cognitive neuroscience literature in creativity and problem-solving is extensive, but it has largely focused on neural networks that are active when subjects are not focused on the outside world, i.e., not using their environment. In this paper, I attempt to combine the relevant literature on creativity and problem-solving with the scattered and nascent work in perceptually-driven learning from the environment. I present my synthesis as a potential new theory for real world problem-solving and map out its hypothesized neural basis. I outline some testable predictions made by the model and provide some considerations and ideas for experimental paradigms that could be used to evaluate the model more thoroughly." data-dcnode-id="3393" name="Description" property="og:description"><span data-dcnode-id="3392" instrument_node="">

</span><div class="atButton" data-dcnode-id="2589"><span data-dcnode-id="2598" instrument_node="">
</span><a addthis:description="Real world problem-solving (RWPS) is what we do every day. It requires flexibility, resilience, resourcefulness, and a certain degree of creativity. A crucial feature of RWPS is that it involves continuous interaction with the environment during the problem-solving process. In this process, the environment can be seen as not only a source of inspiration for new ideas but also as a tool to facilitate creative thinking. The cognitive neuroscience literature in creativity and problem-solving is extensive, but it has largely focused on neural networks that are active when subjects are not focused on the outside world, i.e., not using their environment. In this paper, I attempt to combine the relevant literature on creativity and problem-solving with the scattered and nascent work in perceptually-driven learning from the environment. I present my synthesis as a potential new theory for real world problem-solving and map out its hypothesized neural basis. I outline some testable predictions made by the model and provide some considerations and ideas for experimental paradigms that could be used to evaluate the model more thoroughly." addthis:title="Real World Problem-Solving" addthis:url="https://www.frontiersin.org/article/10.3389/fnhum.2018.00261" class="addthis_button_facebook at300b" data-dcnode-id="2591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html" title="Facebook"><span class="at-icon-wrapper" data-dcnode-id="2592" style="background-color: rgb(59, 89, 152); line-height: 16px; height: 16px; width: 16px;"><svg alt="Facebook" aria-labelledby="at-svg-facebook-1" class="at-icon at-icon-facebook" data-dcnode-id="2593" role="img" style="width: 16px; height: 16px;" title="Facebook" version="1.1" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><title data-dcnode-id="2596" id="at-svg-facebook-1">Facebook</title </span><p data-dcnode-id="2458"><span data-dcnode-id="2462" instrument_node="">Real world problem-solving (RWPS) is what we do every day. It requires flexibility, resilience, resourcefulness, and a certain degree of creativity. A crucial feature of RWPS is that it involves continuous interaction with the environment during the problem-solving process. In this process, the environment can be seen as not only a source of inspiration for new ideas but also as a tool to facilitate creative thinking. The cognitive neuroscience literature in creativity and problem-solving is extensive, but it has largely focused on neural networks that are active when subjects are </span><i data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">not</span></i><span data-dcnode-id="2459" instrument_node=""> focused on the outside world, i.e., not using their environment. In this paper, I attempt to combine the relevant literature on creativity and problem-solving with the scattered and nascent work in perceptually-driven learning from the environment. I present my synthesis as a potential new theory for real world problem-solving and map out its hypothesized neural basis. I outline some testable predictions made by the model and provide some considerations and ideas for experimental paradigms that could be used to evaluate the model more thoroughly.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><div class="clear" data-dcnode-id="2456"></div></div><span data-dcnode-id="2454" instrument_node="">
</span><div class="JournalFullText" data-dcnode-id="430"><span data-dcnode-id="2453" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2452" id="h2" name="h2"></a><h2 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">1. Introduction</span></h2><span data-dcnode-id="2449" instrument_node="">
</span><p class="mb15" data-dcnode-id="2438"><span data-dcnode-id="2448" instrument_node="">In the Apollo 13 space mission, astronauts together with ground control had to overcome several challenges to bring the team safely back to Earth (</span><a data-dcnode-id="2446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B40"><span data-dcnode-id="2447" instrument_node="">Lovell and Kluger, 2006</span></a><span data-dcnode-id="2445" instrument_node="">). One of these challenges was controlling carbon dioxide levels onboard the space craft: “For 2 days straight [they] had worked on how to jury-rig the Odysseys canisters to the Aquarius's life support system. Now, using materials known to be available onboard the spacecraft—a sock, a plastic bag, the cover of a flight manual, lots of duct tape, and so on—the crew assembled a strange contraption and taped it into place. Carbon dioxide levels immediately began to fall into the safe range” (</span><a data-dcnode-id="2443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B69"><span data-dcnode-id="2444" instrument_node="">Team, 1970</span></a><span data-dcnode-id="2442" instrument_node="">; </span><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B13"><span data-dcnode-id="2441" instrument_node="">Cass, 2005</span></a><span data-dcnode-id="2439" instrument_node="">).</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p class="mb15" data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">The success of Apollo 13's recovery from failure is often cited as a glowing example of human resourcefulness and inventiveness alongside more well-known inventions and innovations over the course of human history. However, this sort of inventive capability is not restricted to a few creative geniuses, but an ability present in all of us, and exemplified in the following mundane example. Consider a situation when your only suit is covered in lint and you do not own a lint remover. You see a roll of duct tape, and being resourceful you reason that it might be a good substitute. You then solve the problem of lint removal by peeling a full turn's worth of tape and re-attaching it backwards onto the roll to expose the sticky side all around the roll. By rolling it over your suit, you can now pick up all the lint.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p class="mb15" data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">In both these examples (historic as well as everyday), we see evidence for our innate ability to problem-solve in the real world. Solving real world problems in real time given constraints posed by one's environment are crucial for survival. At the core of this skill is our mental capability to get out of “sticky situations” or impasses, i.e., difficulties that appear unexpectedly as impassable roadblocks to solving the problem at hand. But, what are the cognitive processes that enable a problem solver to overcome such impasses and arrive at a solution, or at least a set of promising next steps?</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p class="mb15" data-dcnode-id="2424"><span data-dcnode-id="2430" instrument_node="">A central aspect of this type of real world problem solving, is the role played by the solver's surrounding environment during the problem-solving process. Is it possible that interaction with one's environment can facilitate creative thinking? The answer to this question seems somewhat obvious when one considers the most famous anecdotal account of creative problem solving, namely that of Archimedes of Syracuse. During a bath, he found a novel way to check if the King's crown contained non-gold impurities. The story has traditionally been associated with the so-called “Eureka moment,” the sudden affective experience when a solution to a particularly thorny problem emerges. In this paper, I want to temporarily turn our attention away from the specific “aha!” experience itself and take particular note that Archimedes made this discovery, not with his eyes closed at a desk, but in a real-world context of a bath</span><sup data-dcnode-id="2426" id="footnotesuper1"><a data-dcnode-id="2429" id="note1a"></a><a class="footnoteanchor" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note1"><span data-dcnode-id="2428" instrument_node="">1</span></a></sup><span data-dcnode-id="2425" instrument_node="">. The bath was not only a passive, relaxing environment for Archimedes, but also a specific source of inspiration. Indeed it was his noticing the displacement of water that gave him a specific methodology for measuring the purity of the crown; by comparing how much water a solid gold bar of the same weight would displace as compared with the crown. This sort of continuous environmental interaction was present when the Apollo 13 engineers discovered their life-saving solution, and when you solved the suit-lint-removal problem with duct tape.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p class="mb15" data-dcnode-id="2407"><span data-dcnode-id="2422" instrument_node="">The neural mechanisms underlying problem-solving have been extensively studied in the literature, and there is general agreement about the key functional networks and nodes involved in various stages of problem-solving. In addition, there has been a great deal of work in studying the neural basis for creativity and insight problem solving, which is associated with the sudden emergence of solutions. However, in the context of problem-solving, creativity, and insight have been researched as largely an internal process without much interaction with and influence from the external environment (</span><a data-dcnode-id="2420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B73"><span data-dcnode-id="2421" instrument_node="">Wegbreit et al., 2012</span></a><span data-dcnode-id="2419" instrument_node="">; </span><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B1"><span data-dcnode-id="2418" instrument_node="">Abraham, 2013</span></a><span data-dcnode-id="2416" instrument_node="">; </span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2415" instrument_node="">Kounios and Beeman, 2014</span></a><span data-dcnode-id="2413" instrument_node="">)</span><sup data-dcnode-id="2409" id="footnotesuper2"><a data-dcnode-id="2412" id="note2a"></a><a class="footnoteanchor" data-dcnode-id="2410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note2"><span data-dcnode-id="2411" instrument_node="">2</span></a></sup><span data-dcnode-id="2408" instrument_node="">. Thus, there are open questions of what role the environment plays during real world problem-solving (RWPS) and how the brain enables the assimilation of novel items during these external interactions.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p class="mb0" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">In this paper, I synthesize the literature on problem-solving, creativity and insight, and particularly focus on how the environment can inform RWPS. I explore three environmentally-informed mechanisms that could play a critical role: (1) partial-cue driven context-shifting, (2) heuristic prototyping and learning novel associations, and (3) learning novel physical inferences. I begin first with some intuitions about real world problem solving, that might help ground this discussion and providing some key distinctions from more traditional problem solving research. Then, I turn to a review of the relevant literature on problem-solving, creativity, and insight first, before discussing the three above-mentioned environmentally-driven mechanisms. I conclude with a potential new model and map out its hypothesized neural basis.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2402" id="h3" name="h3"></a><h2 data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">2. Problem Solving, Creativity, and Insight</span></h2><span data-dcnode-id="2399" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">2.1. What is Real World Problem-Solving?</span></h3><span data-dcnode-id="2396" instrument_node="">
</span><p class="mb0" data-dcnode-id="2389"><span data-dcnode-id="2395" instrument_node="">Archimedes was embodied in the real world when he found his solution. In fact, the real world helped him solve the problem. Whether or not these sorts of historic accounts of creative inspiration are accurate</span><sup data-dcnode-id="2391" id="footnotesuper3"><a data-dcnode-id="2394" id="note3a"></a><a class="footnoteanchor" data-dcnode-id="2392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note3"><span data-dcnode-id="2393" instrument_node="">3</span></a></sup><span data-dcnode-id="2390" instrument_node="">, they do correlate with some of our own key intuitions about how problem solving occurs “in the wild.” Real world problem solving (RWPS) is different from those that occur in a classroom or in a laboratory during an experiment. They are often dynamic and discontinuous, accompanied by many starts and stops. Solvers are never working on just one problem. Instead, they are simultaneously juggling several problems of varying difficulties and alternating their attention between them. Real world problems are typically ill-defined, and even when they are well-defined, often have open-ended solutions. Coupled with that is the added aspect of uncertainty associated with the solver's problem solving strategies. As introduced earlier, an important dimension of RWPS is the continuous interaction between the solver and their environment. During these interactions, the solver might be inspired or arrive at an “aha!” moment. However, more often than not, the solver experiences dozens of minor discovery events— “hmmm, interesting…” or “wait, what?…” moments. Like discovery events, there's typically never one singular impasse or distraction event. The solver must iterate through the problem solving process experiencing and managing these sorts of intervening events (including impasses and discoveries). In summary, RWPS is quite messy and involves a tight interplay between problem solving, creativity, and insight. Next, I explore each of these processes in more detail and explicate a possible role of memory, attention, conflict management and perception.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><h3 data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">2.2. Analytical Problem-Solving</span></h3><span data-dcnode-id="2385" instrument_node="">
</span><p class="mb15" data-dcnode-id="2369"><span data-dcnode-id="2384" instrument_node="">In psychology and neuroscience, </span><i data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">problem-solving</span></i><span data-dcnode-id="2381" instrument_node=""> broadly refers to the inferential steps taken by an agent</span><sup data-dcnode-id="2377" id="footnotesuper4"><a data-dcnode-id="2380" id="note4a"></a><a class="footnoteanchor" data-dcnode-id="2378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23note4"><span data-dcnode-id="2379" instrument_node="">4</span></a></sup><span data-dcnode-id="2376" instrument_node=""> that leads from a given state of affairs to a desired goal state (</span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2375" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="2373" instrument_node="">). The agent does not immediately know how this goal can be reached and must perform some mental operations (i.e., thinking) to determine a solution (</span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2372" instrument_node="">Duncker, 1945</span></a><span data-dcnode-id="2370" instrument_node="">).</span></p><span data-dcnode-id="2368" instrument_node="">
</span><p class="mb0" data-dcnode-id="2360"><span data-dcnode-id="2367" instrument_node="">The problem solving literature divides problems based on clarity (well-defined vs. ill-defined) or on the underlying cognitive processes (analytical, memory retrieval, and insight) (</span><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2366" instrument_node="">Sprugnoli et al., 2017</span></a><span data-dcnode-id="2364" instrument_node="">). While memory retrieval is an important process, I consider it as a sub-process to problem solving more generally. I first focus on analytical problem-solving process, which typically involves problem-representation and encoding, and the process of forming and executing a solution plan (</span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B57"><span data-dcnode-id="2363" instrument_node="">Robertson, 2016</span></a><span data-dcnode-id="2361" instrument_node="">).</span></p><span data-dcnode-id="2359" instrument_node="">
</span><h4 data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">2.2.1. Problem Definition and Representation</span></h4><span data-dcnode-id="2356" instrument_node="">
</span><p class="mb0" data-dcnode-id="2342"><span data-dcnode-id="2355" instrument_node="">An important initial phase of problem-solving involves defining the problem and forming a representation in the working memory. During this phase, components of the prefrontal cortex (PFC), default mode network (DMN), and the dorsal anterior cingulate cortex (dACC) have been found to be activated. If the problem is familiar and well-structured, top-down executive control mechanisms are engaged and the left prefrontal cortex including the frontopolar, dorso-lateral (dlPFC), and ventro-lateral (vlPFC) are activated (</span><a data-dcnode-id="2353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2354" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="2352" instrument_node="">). The DMN along with the various structures in the medial temporal lobe (MTL) including the hippocampus (HF), parahippocampal cortex, perirhinal and entorhinal cortices are also believed to have limited involvement, especially in episodic memory retrieval activities during this phase (</span><a data-dcnode-id="2350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2351" instrument_node="">Beaty et al., 2016</span></a><span data-dcnode-id="2349" instrument_node="">). The problem representation requires encoding problem information for which certain visual and parietal areas are also involved, although the extent of their involvement is less clear (</span><a data-dcnode-id="2347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B2"><span data-dcnode-id="2348" instrument_node="">Anderson and Fincham, 2014</span></a><span data-dcnode-id="2346" instrument_node="">; </span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="2345" instrument_node="">Anderson et al., 2014</span></a><span data-dcnode-id="2343" instrument_node="">).</span></p><span data-dcnode-id="2341" instrument_node="">
</span><h5 data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">2.2.1.1. Working memory</span></h5><span data-dcnode-id="2338" instrument_node="">
</span><p class="mb0" data-dcnode-id="2327"><span data-dcnode-id="2337" instrument_node="">An important aspect of problem representation is the engagement and use of working memory (WM). The WM allows for the maintenance of relevant problem information and description in the mind (</span><a data-dcnode-id="2335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B26"><span data-dcnode-id="2336" instrument_node="">Gazzaley and Nobre, 2012</span></a><span data-dcnode-id="2334" instrument_node="">). Research has shown that WM tasks consistently recruit the dlPFC and left inferior frontal cortex (IC) for encoding an manipulating information; dACC for error detection and performance adjustment; and vlPFC and the anterior insula (AI) for retrieving, selecting information and inhibitory control (</span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B15"><span data-dcnode-id="2333" instrument_node="">Chung and Weyandt, 2014</span></a><span data-dcnode-id="2331" instrument_node="">; </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B20"><span data-dcnode-id="2330" instrument_node="">Fang et al., 2016</span></a><span data-dcnode-id="2328" instrument_node="">).</span></p><span data-dcnode-id="2326" instrument_node="">
</span><h5 data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">2.2.1.2. Representation</span></h5><span data-dcnode-id="2323" instrument_node="">
</span><p class="mb15" data-dcnode-id="2312"><span data-dcnode-id="2322" instrument_node="">While we generally have a sense for the brain regions that are functionally influential in problem definition, less is known about how exactly events are represented </span><i data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">within</span></i><span data-dcnode-id="2319" instrument_node=""> these regions. One theory for how events are represented in the PFC is the structured event complex theory (SEC), in which components of the event knowledge are represented by increasingly higher-order convergence zones localized within the PFC, akin to the convergence zones (from posterior to anterior) that integrate sensory information in the brain (</span><a data-dcnode-id="2317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B6"><span data-dcnode-id="2318" instrument_node="">Barbey et al., 2009</span></a><span data-dcnode-id="2316" instrument_node="">). Under this theory, different zones in the PFC (left vs. right, anterior vs. posterior, lateral vs. medial, and dorsal vs. ventral) represent different aspects of the information contained in the events (e.g., number of events to be integrated together, the complexity of the event, whether planning, and action is needed). Other studies have also suggested the CEN's role in tasks requiring cognitive flexibility, and functions to switch thinking modes, levels of abstraction of thought and consider multiple concepts simultaneously (</span><a data-dcnode-id="2314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B49"><span data-dcnode-id="2315" instrument_node="">Miyake et al., 2000</span></a><span data-dcnode-id="2313" instrument_node="">).</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p class="mb0" data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Thus, when the problem is well-structured, problem representation is largely an executive control activity coordinated by the PFC in which problem information from memory populates WM in a potentially structured representation. Once the problem is defined and encoded, planning and execution of a solution can begin.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><h4 data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">2.2.2. Planning</span></h4><span data-dcnode-id="2305" instrument_node="">
</span><p class="mb0" data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">The central executive network (CEN), particularly the PFC, is largely involved in plan formation and in plan execution. Planning is the process of generating a strategy to advance from the current state to a goal state. This in turn involves retrieving a suitable solution strategy from memory and then coordinating its execution.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><h5 data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">2.2.2.1. Plan formation</span></h5><span data-dcnode-id="2299" instrument_node="">
</span><p class="mb15" data-dcnode-id="2273"><span data-dcnode-id="2298" instrument_node="">The dlPFC supports sequential planning and plan formation, which includes the generation of hypothesis and construction of plan steps (</span><a data-dcnode-id="2296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2297" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="2295" instrument_node="">). Interestingly, the vlPFC and the angular gyrus (AG), implicated in a variety of functions including memory retrieval, are also involved in plan formation (</span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B3"><span data-dcnode-id="2294" instrument_node="">Anderson et al., 2014</span></a><span data-dcnode-id="2292" instrument_node="">). Indeed, the AG together with the regions in the MTL (including the HF) and several other regions form a what is known as the “core” network. The core network is believed to be activated when recalling past experiences, imagining fictitious, and future events and navigating large-scale spaces (</span><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B67"><span data-dcnode-id="2291" instrument_node="">Summerfield et al., 2010</span></a><span data-dcnode-id="2289" instrument_node="">), all key functions for generating plan hypotheses. A recent study suggests that the AG is critical to both episodic simulation, representation, and episodic memory (</span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B70"><span data-dcnode-id="2288" instrument_node="">Thakral et al., 2017</span></a><span data-dcnode-id="2286" instrument_node="">). One possibility for how plans are formulated could involve a dynamic process of retrieving an optimal strategy from memory. Research has shown significant interaction between striatal and frontal regions (</span><a data-dcnode-id="2284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="2285" instrument_node="">Scimeca and Badre, 2012</span></a><span data-dcnode-id="2283" instrument_node="">; </span><a data-dcnode-id="2281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B32"><span data-dcnode-id="2282" instrument_node="">Horner et al., 2015</span></a><span data-dcnode-id="2280" instrument_node="">). The striatum is believed to play a key role in declarative memory retrieval, and specifically helping retrieve </span><i data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">optimal</span></i><span data-dcnode-id="2277" instrument_node=""> (or previously rewarded) memories (</span><a data-dcnode-id="2275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B60"><span data-dcnode-id="2276" instrument_node="">Scimeca and Badre, 2012</span></a><span data-dcnode-id="2274" instrument_node="">). Relevant to planning and plan formation, Scimeca &amp; Badre have suggested that the striatum plays two important roles: (1) in mapping acquired value/utility to action selection, and thereby helping plan formation, and (2) modulation and re-encoding of actions and other plan parameters. Different types of problems require different sets of specialized knowledge. For example, the knowledge needed to solve mathematical problems might be quite different (albeit overlapping) from the knowledge needed to select appropriate tools in the environment.</span></p><span data-dcnode-id="2272" instrument_node="">
</span><p class="mb0" data-dcnode-id="2267"><span data-dcnode-id="2271" instrument_node="">Thus far, I have discussed planning and problem representation as being domain-independent, which has allowed me to outline key areas of the PFC, MTL, and other regions relevant to all problem-solving. However, some types of problems require domain-specific knowledge for which other regions might need to be recruited. For example, when planning for tool-use, the superior parietal lobe (SPL), supramarginal gyrus (SMG), anterior inferior parietal lobe (AIPL), and certain portions of the temporal and occipital lobe involved in visual and spatial integration have been found to be recruited (</span><a data-dcnode-id="2269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B12"><span data-dcnode-id="2270" instrument_node="">Brandi et al., 2014</span></a><span data-dcnode-id="2268" instrument_node="">). It is believed that domain-specific information stored in these regions is recovered and used for planning.</span></p><span data-dcnode-id="2266" instrument_node="">
</span><h5 data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">2.2.2.2. Plan execution</span></h5><span data-dcnode-id="2263" instrument_node="">
</span><p class="mb0" data-dcnode-id="2252"><span data-dcnode-id="2262" instrument_node="">Once a solution plan has been recruited from memory and suitably tuned for the problem on hand, the left-rostral PFC, caudate nucleus (CN), and bilateral posterior parietal cortices (PPC) are responsible for translating the plan into executable form (</span><a data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B66"><span data-dcnode-id="2261" instrument_node="">Stocco et al., 2012</span></a><span data-dcnode-id="2259" instrument_node="">). The PPC stores and maintains “mental template” of the executable form. Hemispherical division of labor is particularly relevant in planning where it was shown that when planning to solve a Tower of Hanoi (block moving) problem, the right PFC is involved in plan construction whereas the left PFC is involved in controlling processes necessary to supervise the execution of the plan (</span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B50"><span data-dcnode-id="2258" instrument_node="">Newman and Green, 2015</span></a><span data-dcnode-id="2256" instrument_node="">). On a separate note and not the focus of this paper, plan execution and problem-solving can require the recruitment of affective and motivational processing in order to supply the agent with the resolve to solve problems, and the vmPFC has been found to be involved in coordinating this process (</span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="2255" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="2253" instrument_node="">).</span></p><span data-dcnode-id="2251" instrument_node="">
</span><h3 data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">2.3. Creativity</span></h3><span data-dcnode-id="2248" instrument_node="">
</span><p class="mb15" data-dcnode-id="2231"><span data-dcnode-id="2247" instrument_node="">During the gestalt movement in the 1930s, Maier noted that “most instances of “real” problem solving involves creative thinking” (</span><a data-dcnode-id="2245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B43"><span data-dcnode-id="2246" instrument_node="">Maier, 1930</span></a><span data-dcnode-id="2244" instrument_node="">). Maier performed several experiments to study mental fixation and insight problem solving. This close tie between insight and creativity continues to be a recurring theme, one that will be central to the current discussion. If creativity and insight are linked to RWPS as noted by Maier, then it is reasonable to turn to the creativity and insight literature for understanding the role played by the environment. A large portion of the creativity literature has focused on viewing creativity as an internal process, one in which the solvers attention is directed inwards, and toward internal stimuli, to facilitate the generation of novel ideas and associations in memory (</span><a data-dcnode-id="2242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2243" instrument_node="">Beaty et al., 2016</span></a><span data-dcnode-id="2241" instrument_node="">). Focusing on imagination, a number of researchers have looked at blinking, eye fixation, closing eyes, and looking nowhere behavior and suggested that there is a shift of attention from external to internal stimuli during creative problem solving (</span><a data-dcnode-id="2239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B58"><span data-dcnode-id="2240" instrument_node="">Salvi and Bowden, 2016</span></a><span data-dcnode-id="2238" instrument_node="">). The idea is that shutting down external stimuli reduces cognitive load and focuses attention internally. Other experiments studying sleep behavior have also noted the beneficial role of internal stimuli in problem solving. The notion of ideas popping into ones consciousness, suddenly, during a shower is highly intuitive for many and researchers have attempted to study this phenomena through the lens of incubation, and unconscious thought that is internally-driven. There have been several theories and counter-theories proposed to account specifically for the cognitive processes underlying incubation (</span><a data-dcnode-id="2236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B56"><span data-dcnode-id="2237" instrument_node="">Ritter and Dijksterhuis, 2014</span></a><span data-dcnode-id="2235" instrument_node="">; </span><a data-dcnode-id="2233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B27"><span data-dcnode-id="2234" instrument_node="">Gilhooly, 2016</span></a><span data-dcnode-id="2232" instrument_node="">), but none of these theories specifically address the role of the external environment.</span></p><span data-dcnode-id="2230" instrument_node="">
</span><p class="mb15" data-dcnode-id="2195"><span data-dcnode-id="2229" instrument_node="">The neuroscience of creativity has also been extensively studied and I do not focus on an exhaustive literature review in this paper (a nice review can be found in </span><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B59"><span data-dcnode-id="2228" instrument_node="">Sawyer, 2011</span></a><span data-dcnode-id="2226" instrument_node="">). From a problem-solving perspective, it has been found that unlike well-structured problems, ill-structured problems activate the right dlPFC. Most of the past work on creativity and creative problem-solving has focused on exploring memory structures and performing internally-directed searches. Creative idea generation has primarily been viewed as internally directed attention (</span><a data-dcnode-id="2224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B34"><span data-dcnode-id="2225" instrument_node="">Jauk et al., 2012</span></a><span data-dcnode-id="2223" instrument_node="">; </span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B9"><span data-dcnode-id="2222" instrument_node="">Benedek et al., 2016</span></a><span data-dcnode-id="2220" instrument_node="">) and a primary mechanism involved is </span><i data-dcnode-id="2218"><span data-dcnode-id="2219" instrument_node="">divergent thinking</span></i><span data-dcnode-id="2217" instrument_node="">, which is the ability to produce a variety of responses in a given situation (</span><a data-dcnode-id="2215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B28"><span data-dcnode-id="2216" instrument_node="">Guilford, 1962</span></a><span data-dcnode-id="2214" instrument_node="">). Divergent thinking is generally thought to involve interactions between the DMN, CEN, and the salience network (</span><a data-dcnode-id="2212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2213" instrument_node="">Yoruk and Runco, 2014</span></a><span data-dcnode-id="2211" instrument_node="">; </span><a data-dcnode-id="2209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2210" instrument_node="">Heinonen et al., 2016</span></a><span data-dcnode-id="2208" instrument_node="">). One psychological model of creative cognition is the Geneplore model that considers two major phases of generation (memory retrieval and mental synthesis) and exploration (conceptual interpretation and functional inference) (</span><a data-dcnode-id="2206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B21"><span data-dcnode-id="2207" instrument_node="">Finke et al., 1992</span></a><span data-dcnode-id="2205" instrument_node="">; </span><a data-dcnode-id="2203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B11"><span data-dcnode-id="2204" instrument_node="">Boccia et al., 2015</span></a><span data-dcnode-id="2202" instrument_node="">). It has been suggested that the associative mode of processing to generate new creative association is supported by the DMN, which includes the medial PFC, posterior cingulate cortex (PCC), tempororparietal juntion (TPJ), MTL, and IPC (</span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B8"><span data-dcnode-id="2201" instrument_node="">Beaty et al., 2014</span></a><span data-dcnode-id="2199" instrument_node="">, </span><a data-dcnode-id="2197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B7"><span data-dcnode-id="2198" instrument_node="">2016</span></a><span data-dcnode-id="2196" instrument_node="">).</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p class="mb0" data-dcnode-id="2177"><span data-dcnode-id="2193" instrument_node="">That said, the creativity literature is not completely devoid of acknowledging the role of the environment. In fact, it is quite the opposite. Researchers have looked closely at the role played by externally provided hints from the time of the early gestalt psychologists and through to present day studies (</span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="2192" instrument_node="">Öllinger et al., 2017</span></a><span data-dcnode-id="2190" instrument_node="">). In addition to studying how hints can help problem solving, researchers have also looked at how directed action can influence subsequent problem solving—e.g., swinging arms prior to solving the two-string puzzle, which requires swinging the string (</span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B71"><span data-dcnode-id="2189" instrument_node="">Thomas and Lleras, 2009</span></a><span data-dcnode-id="2187" instrument_node="">). There have also been numerous studies looking at how certain external perceptual cues are correlated with creativity measures. Vohs et al. suggested that untidiness in the environment and the increased number of potential distractions helps with creativity (</span><a data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B72"><span data-dcnode-id="2186" instrument_node="">Vohs et al., 2013</span></a><span data-dcnode-id="2184" instrument_node="">). Certain colors such as blue have been shown to help with creativity and attention to detail (</span><a data-dcnode-id="2182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B45"><span data-dcnode-id="2183" instrument_node="">Mehta and Zhu, 2009</span></a><span data-dcnode-id="2181" instrument_node="">). Even environmental illumination, or lack thereof, have been shown to promote creativity (</span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B65"><span data-dcnode-id="2180" instrument_node="">Steidle and Werth, 2013</span></a><span data-dcnode-id="2178" instrument_node="">). However, it is important to note that while these and the substantial body of similar literature show the relationship of the environment to creative problem solving, they do not specifically account for the cognitive processes underlying the RWPS when external stimuli are received.</span></p><span data-dcnode-id="2176" instrument_node="">
</span><h3 data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">2.4. Insight Problem Solving</span></h3><span data-dcnode-id="2173" instrument_node="">
</span><p class="mb15" data-dcnode-id="2138"><span data-dcnode-id="2172" instrument_node="">Analytical problem solving is believed to involve deliberate and conscious processing that advances step by step, allowing solvers to be able to explain exactly how they solved it. Inability to solve these problems is often associated with lack of required prior knowledge, which if provided, immediately makes the solution tractable. Insight, on the other hand, is believed to involve a sudden and unexpected emergence of an obvious solution or strategy sometimes accompanied by an affective aha! experience. Solvers find it difficult to consciously explain how they generated a solution in a sequential manner. That said, research has shown that having an aha! moment is neither necessary nor sufficient to insight and vice versa (</span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B17"><span data-dcnode-id="2171" instrument_node="">Danek et al., 2016</span></a><span data-dcnode-id="2169" instrument_node="">). Generally, it is believed that insight solvers acquire a full and deep understanding of the problem when they have solved it (</span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2168" instrument_node="">Chu and Macgregor, 2011</span></a><span data-dcnode-id="2166" instrument_node="">). There has been an active debate in the problem solving community about whether insight is something special. Some have argued that it is not, and that there are no special or spontaneous processes, but simply a good old-fashioned search of a large problem space (</span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B35"><span data-dcnode-id="2165" instrument_node="">Kaplan and Simon, 1990</span></a><span data-dcnode-id="2163" instrument_node="">; </span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2162" instrument_node="">MacGregor et al., 2001</span></a><span data-dcnode-id="2160" instrument_node="">; </span><a data-dcnode-id="2158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B4"><span data-dcnode-id="2159" instrument_node="">Ash and Wiley, 2006</span></a><span data-dcnode-id="2157" instrument_node="">; </span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B23"><span data-dcnode-id="2156" instrument_node="">Fleck, 2008</span></a><span data-dcnode-id="2154" instrument_node="">). Others have argued that insight is special and suggested that it is likely a different process (</span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B18"><span data-dcnode-id="2153" instrument_node="">Duncker, 1945</span></a><span data-dcnode-id="2151" instrument_node="">; </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B48"><span data-dcnode-id="2150" instrument_node="">Metcalfe, 1986</span></a><span data-dcnode-id="2148" instrument_node="">; </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B37"><span data-dcnode-id="2147" instrument_node="">Kounios and Beeman, 2014</span></a><span data-dcnode-id="2145" instrument_node="">). This debate lead to two theories for insight problem solving. MacGregor et al. proposed the Criterion for Satisfactory Progress Theory (CSPT), which is based on Newell and Simons original notion of problem solving as being a heuristic search through the problem space (</span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B42"><span data-dcnode-id="2144" instrument_node="">MacGregor et al., 2001</span></a><span data-dcnode-id="2142" instrument_node="">). The key aspect of CSPT is that the solver is continually monitoring their progress with some set of criteria. Impasses arise when there is a criterion failure, at which point the solver tries non-maximal but promising states. The representational change theory (RCT) proposed by Ohlsson et al., on the other hand, suggests that impasses occur when the goal state is not reachable from an initial problem representation (which may have been generated through unconscious spreading activation) (</span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B51"><span data-dcnode-id="2141" instrument_node="">Ohlsson, 1992</span></a><span data-dcnode-id="2139" instrument_node="">). In order to overcome an impasse, the solver needs to restructure the problem representation, which they can do by (1) elaboration (noticing new features of a problem), (2) re-encoding fixing mistaken or incomplete representations of the problem, and by (3) changing constraints. Changing constraints is believed to involve two sub-processes of constraint relaxation and chunk-decomposition.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p class="mb15" data-dcnode-id="2129"><span data-dcnode-id="2136" instrument_node="">The current position is that these two theories do not compete with each other, but instead complement each other by addressing different stages of problem solving: pre- and post-impasse. Along these lines, Ollinger et al. proposed an extended RCT (eRCT) in which revising the search space and using heuristics was suggested as being a dynamic and iterative and recursive process that involves repeated instances of search, impasse and representational change (</span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B53"><span data-dcnode-id="2135" instrument_node="">Öllinger et al., 2014</span></a><span data-dcnode-id="2133" instrument_node="">, </span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B52"><span data-dcnode-id="2132" instrument_node="">2017</span></a><span data-dcnode-id="2130" instrument_node="">). Under this theory, a solver first forms a problem representation and begins searching for solutions, presumably using analytical problem solving processes as described earlier. When a solution cannot be found, the solver encounters an impasse, at which point the solver must restructure or change the problem representation and once again search for a solution. The model combines both analytical problem solving (through heuristic searches, hill climbing and progress monitoring), and creative mechanisms of constraint relaxation and chunk decomposition to enable restructuring.</span></p><span data-dcnode-id="2128" instrument_node="">
</span><p class="mb15" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Ollingers model appears to comprehensively account for both analytical and insight problem solving and, therefore, could be a strong candidate to model RWPS. However, while compelling, it is nevertheless an insufficient model of RWPS for many reasons, of which two are particularly significant for the current paper. First, the model does explicitly address mechanisms by which external stimuli might be assimilated. Second, the model is not sufficiently flexible to account for other events (beyond impasse) occurring during problem solving, such as distraction, mind-wandering and the like.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><p class="mb0" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">So, where does this leave us? I have shown the interplay between problem solving, creativity and insight. In particular, using Ollinger's proposal, I have suggested (maybe not quite explicitly up until now) that RWPS involves some degree of analytical problem solving as well as the post-impasse more creative modes of problem restructuring. I have also suggested that this model might need to be extended for RWPS along two dimensions. First, events such as impasses might just be an instance of a larger class of events that intervene during problem solving. Thus, there needs to be an accounting of the cognitive mechanisms that are potentially influenced by impasses and these other intervening events. It is possible that these sorts of events are crucial and trigger a switch in attentional focus, which in turn facilitates switching between different problem solving modes. Second, we need to consider when and how externally-triggered stimuli from the solver's environment can influence the problem solving process. I detail three different mechanisms by which external knowledge might influence problem solving. I address each of these ideas in more detail in the next two sections.</span></p><span data-dcnode-id="2122" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2121" id="h4" name="h4"></a><h2 data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">3. Event-Triggered Mode Switching During Problem-Solving</span></h2><span data-dcnode-id="2118" instrument_node="">
</span><h3 class="pt0" data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">3.1. Impasse</span></h3><span data-dcnode-id="2115" instrument_node="">
</span><p class="mb15" data-dcnode-id="2101"><span data-dcnode-id="2114" instrument_node="">When solving certain types of problems, the agent might encounter an impasse, i.e., some block in its ability to solve the problem (</span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2113" instrument_node="">Sprugnoli et al., 2017</span></a><span data-dcnode-id="2111" instrument_node="">). The impasse may arise because the problem may have been ill-defined to begin with causing incomplete and unduly constrained representations to have been formed. Alternatively, impasses can occur when suitable solution strategies cannot be retrieved from memory or fail on execution. In certain instances, the solution strategies may not exist and may need to be generated from scratch. Regardless of the reason, an impasse is an interruption in the problem solving process; one that was running conflict-free up until the point when a seemingly unresolvable issue or an error in the predicted solution path was encountered. Seen as a conflict encountered in the problem-solving process it activates the anterior cingulate cortex (ACC). It is believed that the ACC not only helps detect the conflict, but also switch modes from one of “exploitation” (planning) to “exploration” (search) (</span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B55"><span data-dcnode-id="2110" instrument_node="">Quilodran et al., 2008</span></a><span data-dcnode-id="2108" instrument_node="">; </span><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B68"><span data-dcnode-id="2107" instrument_node="">Tang et al., 2012</span></a><span data-dcnode-id="2105" instrument_node="">), and monitors progress during resolution (</span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B14"><span data-dcnode-id="2104" instrument_node="">Chu and Macgregor, 2011</span></a><span data-dcnode-id="2102" instrument_node="">). Some mode switching duties are also found to be shared with the AI (the ACC's partner in the salience network), however, it is unclear exactly the extent of this function-sharing.</span></p><span data-dcnode-id="2100" instrument_node="">
</span><p class="mb0" data-dcnode-id="2092"><span data-dcnode-id="2099" instrument_node="">Even though it is debatable if impasses are a necessary component of insight, they are still important as they provide a starting point for the creativity (</span><a data-dcnode-id="2097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2098" instrument_node="">Sprugnoli et al., 2017</span></a><span data-dcnode-id="2096" instrument_node="">). Indeed, it is possible that around the moment of impasse, the AI and ACC together, as part of the salience network play a crucial role in switching thought modes from analytical planning mode to creative search and discovery mode. In the latter mode, various creative mechanisms might be activated allowing for a solution plan to emerge. Sowden et al. and many others have suggested that the salience network is potentially a candidate neurobiological mechanism for shifting between thinking processes, more generally (</span><a data-dcnode-id="2094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2095" instrument_node="">Sowden et al., 2015</span></a><span data-dcnode-id="2093" instrument_node="">). When discussing various dual-process models as they relate to creative cognition, Sowden et al. have even noted that the ACC activation could be useful marker to identify shifting as participants work creative problems.</span></p><span data-dcnode-id="2091" instrument_node="">
</span><h3 data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">3.2. Defocused Attention</span></h3><span data-dcnode-id="2088" instrument_node="">
</span><p class="mb15" data-dcnode-id="2077"><span data-dcnode-id="2087" instrument_node="">As noted earlier, in the presence of an impasse there is a shift from an exploitative (analytical) thinking mode to an exploratory (creative) thinking mode. This shift impacts several networks including, for example, the attention network. It is believed attention can switch between a focused mode and a defocused mode. Focused attention facilitates analytic thought by constraining activation such that items are considered in a compact form that is amenable to complex mental operations. In the defocused mode, agents expand their attention allowing new associations to be considered. </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2086" instrument_node="">Sowden et al. (2015)</span></a><span data-dcnode-id="2084" instrument_node=""> note that the mechanism responsible for adjustments in cognitive control may be linked to the mechanisms responsible for attentional focus. The generally agreed position is that during generative thinking, unconscious cognitive processes activated through defocused attention are more prevalent, whereas during exploratory thinking, controlled cognition activated by focused attention becomes more prevalent (</span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B36"><span data-dcnode-id="2083" instrument_node="">Kaufman, 2011</span></a><span data-dcnode-id="2081" instrument_node="">; </span><a data-dcnode-id="2079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B63"><span data-dcnode-id="2080" instrument_node="">Sowden et al., 2015</span></a><span data-dcnode-id="2078" instrument_node="">).</span></p><span data-dcnode-id="2076" instrument_node="">
</span><p class="mb0" data-dcnode-id="2062"><span data-dcnode-id="2075" instrument_node="">Defocused attention allows agents to not only process different aspects of a situation, but to also activate additional neural structures in long term memory and find new associations (</span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B46"><span data-dcnode-id="2074" instrument_node="">Mendelsohn, 1976</span></a><span data-dcnode-id="2072" instrument_node="">; </span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B75"><span data-dcnode-id="2071" instrument_node="">Yoruk and Runco, 2014</span></a><span data-dcnode-id="2069" instrument_node="">). It is believed that cognitive material attended to and cued by positive affective state results in defocused attention, allowing for more complex cognitive contexts and therefore a greater range of interpretation and integration of information (</span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B33"><span data-dcnode-id="2068" instrument_node="">Isen et al., 1987</span></a><span data-dcnode-id="2066" instrument_node="">). High attentional levels are commonly considered a typical feature of highly creative subjects (</span><a data-dcnode-id="2064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B64"><span data-dcnode-id="2065" instrument_node="">Sprugnoli et al., 2017</span></a><span data-dcnode-id="2063" instrument_node="">).</span></p><span data-dcnode-id="2061" instrument_node="">
</span><a class="reset-hash-position" data-dcnode-id="2060" id="h5" name="h5"></a><h2 data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">4. Role of the Environment</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><p class="mb0" data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">In much of the past work the focus has been on treating creativity as largely an internal process engaging the DMN to assist in making novel connections in memory. The suggestion has been that “individual needs to suppress external stimuli and concentrate on the inner creative process during idea generation” (</span><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B31"><span data-dcnode-id="2055" instrument_node="">Heinonen et al., 2016</span></a><span data-dcnode-id="2053" instrument_node="">). These ideas can then function as seeds for testing and problem-solving. While true of many creative acts, this characterization does not capture how creative ideas arise in many real-world creative problems. In these types of problems, the agent is functioning and interacting with its environment before, during and after problem-solving. It is natural then to expect that stimuli from the environment might play a role in problem-solving. More specifically, it can be expected that through passive and active involvement with the environment, the agent is (1) able to trigger an unrelated, but potentially useful memory relevant for problem-solving, (2) make novel connections between two events in memory with the environmental cue serving as the missing link, and (3) incorporate a completely novel information from events occuring in the environment directly into the problem-solving process. I explore potential neural mechanisms for these three types of environmentally informed creative cognition, which I hypothesize are enabled by defocused attention.</span></p><span data-dcnode-id="2051" instrument_node="">
</span><h3 data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">4.1. Partial Cues Trigger Relevant Memories Through Context-Shifting</span></h3><span data-dcnode-id="2048" instrument_node="">
</span><p class="mb15" data-dcnode-id="2040"><span data-dcnode-id="2047" instrument_node="">I have previously discussed the interaction between the MTL and PFC in helping select task-relevant and critical memories for problem-solving. It is well-known that pattern completion is an important function of the MTL and one that enables memory retrieval. Complementary Learning Theory (CLS) and its recently updated version suggest that the MTL and related structures support initial storage as well as retrieval of item and context-specific information (</span><a data-dcnode-id="2045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2046" instrument_node="">Kumaran et al., 2016</span></a><span data-dcnode-id="2044" instrument_node="">). According to CLS theory, the dentate gyrus (DG) and the CA3 regions of the HF are critical to selecting neural activity patterns that correspond to particular experiences (</span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B38"><span data-dcnode-id="2043" instrument_node="">Kumaran et al., 2016</span></a><span data-dcnode-id="2041" instrument_node="">). These patterns might be distinct even if experiences are similar and are stabilized through increases in connection strengths between the DG and CA3. Crucially, because of the connection strengths, reactivation of part of the pattern can activate the rest of it (i.e., pattern completion). Kumaran et al. have further noted that if consistent with existing knowledge, these new experiences can be quickly replayed and interleaved into structured representations that form part of the semantic memory.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p class="mb15" data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node="">Cues in the environment provided by these experiences hold partial information about past stimuli or events and this partial information converges in the MTL. CLS accounts for how these cues might serve to reactivate partial patterns, thereby triggering pattern completion. When attention is defocused I hypothesize that (1) previously unnoticed partial cues are considered, and (2) previously noticed partial cues are decomposed to produce previously unnoticed sub-cues, which in turn are considered. </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B76"><span data-dcnode-id="2037" instrument_node="">Zabelina et al. (2016)</span></a><span data-dcnode-id="2035" instrument_node=""> have shown that real-world creativity and creative achievement is associated with “leaky attention,” i.e., attention that allows for irrelevant information to be noticed. In two experiments they systematically explored the relationship between two notions of creativity— divergent thinking and real-world creative achievement—and the use of attention. They found that attentional use is associated in different ways for each of the two notions of creativity. While divergent thinking was associated with flexible attention, it does not appear to be leaky. Instead, selective focus and inhibition components of attention were likely facilitating successful performance on divergent thinking tasks. On the other hand, real-world creative achievement was linked to leaky attention. RWPS involves elements of both divergent thinking and of real-world creative achievement, thus I would expect some amount of attentional leaks to be part of the problem solving process.</span></p><span data-dcnode-id="2033" instrument_node="">
</span><p class="mb0" data-dcnode-id="2025"><span data-dcnode-id="2032" instrument_node="">Thus, it might be the case that a new set of cues or sub-cues “leak” in and activate memories that may not have been previously considered. These cues serve to reactivate a diverse set of patterns that then enable accessing a wide range of memories. Some of these memories are extra-contextual, in that they consider the newly noticed cues in several contexts. For example, when unable to find a screwdriver, we might consider using a coin. It is possible that defocused attention allows us to consider the coin's edge as being a potentially relevant cue that triggers uses for the thin edge outside of its current context in a coin. The new cues (or contexts) may allow new associations to emerge with cues stored in memory, which can occur during incubation. Objects and contexts are integrated into memory automatically into a blended representation and changing contexts disrupts this recognition (</span><a data-dcnode-id="2030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B30"><span data-dcnode-id="2031" instrument_node="">Hayes et al., 2007</span></a><span data-dcnode-id="2029" instrument_node="">; </span><a data-dcnode-id="2027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B25"><span data-dcnode-id="2028" instrument_node="">Gabora, 2016</span></a><span data-dcnode-id="2026" instrument_node="">). Cue-triggered context shifting allows an agent to break-apart a memory representation, which can then facilitate problem-solving in new ways.</span></p><span data-dcnode-id="2024" instrument_node="">
</span><h3 data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">4.2. Heuristic Prototyping Facilitates Novel Associations</span></h3><span data-dcnode-id="2021" instrument_node="">
</span><p class="mb15" data-dcnode-id="2010"><span data-dcnode-id="2020" instrument_node="">It has long been the case that many scientific innovations have been inspired by events in nature and the surrounding environment. As noted earlier, Archimedes realized the relationship between the volume of an irregularly shaped object and the volume of water it displaced. This is an example of heuristic prototyping where the problem-solver notices an event in the environment, which then triggers the automatic activation of a heuristic prototype and the formation of novel associations (between the function of the prototype and the problem) which they can then use to solve the problem (</span><a data-dcnode-id="2018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2019" instrument_node="">Luo et al., 2013</span></a><span data-dcnode-id="2017" instrument_node="">). Although still in its relative infancy, there has been some recent research into the neural basis for heuristic prototyping. Heuristic prototype has generally been defined as an enlightening prototype event with a similar element to the current problem and is often composed of a feature and a function (</span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B29"><span data-dcnode-id="2016" instrument_node="">Hao et al., 2013</span></a><span data-dcnode-id="2014" instrument_node="">). For example, in designing a faster and more efficient submarine hull, a heuristic prototype might be a shark's skin, while an unrelated prototype might be a fisheye camera (</span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="2013" instrument_node="">Dandan et al., 2013</span></a><span data-dcnode-id="2011" instrument_node="">).</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p class="mb15" data-dcnode-id="1998"><span data-dcnode-id="2008" instrument_node="">Research has shown that activating the feature function of the right heuristic prototype and linking it by way of semantic similarity to the required function of the problem was the key mechanism people used to solve several scienitific insight problems (</span><a data-dcnode-id="2006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B74"><span data-dcnode-id="2007" instrument_node="">Yang et al., 2016</span></a><span data-dcnode-id="2005" instrument_node="">). A key region activated during heuristic prototyping is the dlPFC and it is believed to be generally responsible for encoding the events into memory and may play an important role in selecting and retrieving the matched unsolved technical problem from memory (</span><a data-dcnode-id="2003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B16"><span data-dcnode-id="2004" instrument_node="">Dandan et al., 2013</span></a><span data-dcnode-id="2002" instrument_node="">). It is also believed that the precuneus plays a role in automatic retrieval of heuristic information allowing the heuristic prototype and the problem to combine (</span><a data-dcnode-id="2000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B41"><span data-dcnode-id="2001" instrument_node="">Luo et al., 2013</span></a><span data-dcnode-id="1999" instrument_node="">). In addition to semantic processing, certain aspects of visual imagery have also been implicated in heuristic prototyping leading to the suggestion of the involvement of Broadman's area BA 19 in the occipital cortex.</span></p><span data-dcnode-id="1997" instrument_node="">
</span><p class="mb0" data-dcnode-id="1992"><span data-dcnode-id="1996" instrument_node="">There is some degree of overlap between the notions of heuristic prototyping and analogical transfer (the mapping of relations from one domain to another). Analogical transfer is believed to activate regions in the left medial fronto-parietal system (dlPFC and the PPC) (</span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1995" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="1993" instrument_node="">). I suggest here that analogical reasoning is largely an internally-guided process that is aided by heuristic prototyping which is an externally-guided process. One possible way this could work is if heuristic prototyping mechanisms help locate the relevant memory with which to then subsequently analogize.</span></p><span data-dcnode-id="1991" instrument_node="">
</span><h3 data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">4.3. Making Physical Inferences to Acquire Novel Information</span></h3><span data-dcnode-id="1988" instrument_node="">
</span><p class="mb0" data-dcnode-id="1971"><span data-dcnode-id="1987" instrument_node="">The agent might also be able to learn novel facts about their environment through passive observation as well as active experimentation. There has been some research into the neural basis for causal reasoning (</span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B5"><span data-dcnode-id="1986" instrument_node="">Barbey and Barsalou, 2009</span></a><span data-dcnode-id="1984" instrument_node="">; </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B54"><span data-dcnode-id="1983" instrument_node="">Operskalski and Barbey, 2016</span></a><span data-dcnode-id="1981" instrument_node="">), but beyond its generally distributed nature, we do not know too much more. Beyond abstract causal reasoning, some studies looked into the cortical regions that are activated when people watch and predict physical events unfolding in real-time and in the real-world (</span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B22"><span data-dcnode-id="1980" instrument_node="">Fischer et al., 2016</span></a><span data-dcnode-id="1978" instrument_node="">). It was found that certain regions were associated with representing types of physical concepts, with the left intraparietal sulcus (IPS) and left middle frontal gyrus (MFG) shown to play a role in attributing causality when viewing colliding objects (</span><a data-dcnode-id="1976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1977" instrument_node="">Mason and Just, 2013</span></a><span data-dcnode-id="1975" instrument_node="">). The parahippocampus (PHC) was associated with linking causal theory to observed data and the TPJ was involved in visualizing movement of objects and actions in space (</span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s7.addthis.com/static/sh.f48a1a04fe8dbf021b4cda1d.html%23B44"><span data-dcnode-id="1974" instrument_node="">Mason and Just, 2013</span></a><span data-dcnode-id="1972" instrument_node="">).</span></p><span data-dcnode-id="1970" instrument_node="">
