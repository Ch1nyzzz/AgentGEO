</span><meta content="Analogical problem solving requires using a known solution from one problem to apply to a related problem. Sleep is known to have profound effects on …" data-dcnode-id="5072" property="og:description"><span data-dcnode-id="5071" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;ab005&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;as005&quot;><p id=&quot;sp0005&quot;>Analogical problem solving requires using a known solution from one problem to apply to a related problem. Sleep is known to have profound effects on memory and information restructuring, and so we tested whether sleep promoted such analogical transfer, determining whether improvement was due to subjective memory for problems, subjective recognition of similarity across related problems, or by abstract generalisation of structure. In Experiment 1, participants were exposed to a set of source problems. Then, after a 12-h period involving sleep or wake, they attempted target problems structurally related to the source problems but with different surface features. Experiment 2 controlled for time of day effects by testing participants either in the morning or the evening. Sleep improved analogical transfer, but effects were not due to improvements in subjective memory or similarity recognition, but rather effects of structural generalisation across problems.</p></div></div></div>" data-dcnode-id="5070" lang="en" name="citation_abstract"><span data-dcnode-id="5069" instrument_node="">

 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="4549" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="4535" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="4538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.cognition.2015.06.005" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="4539" instrument_node="">https://doi.org/10.1016/j.cognition.2015.06.005</span></a><a class="rights-and-content" data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0010027715300159%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4537" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="4534"></section><section class="ReferencedArticles" data-dcnode-id="4533"></section><div class="PageDivider" data-dcnode-id="4532"></div><div class="Abstracts u-font-serif" data-dcnode-id="4525" id="abstracts"><div class="abstract author" data-dcnode-id="4526" id="ab005" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">Abstract</span></h2><div data-dcnode-id="4527" id="as005"><p data-dcnode-id="4528" id="sp0005"><span data-dcnode-id="4529" instrument_node="">Analogical problem solving requires using a known solution from one problem to apply to a related problem. Sleep is known to have profound effects on memory and information restructuring, and so we tested whether sleep promoted such analogical transfer, determining whether improvement was due to subjective memory for problems, subjective recognition of similarity across related problems, or by abstract generalisation of structure. In Experiment 1, participants were exposed to a set of source problems. Then, after a 12-h period involving sleep or wake, they attempted target problems structurally related to the source problems but with different surface features. Experiment 2 controlled for time of day effects by testing participants either in the morning or the evening. Sleep improved analogical transfer, but effects were not due to improvements in subjective memory or similarity recognition, but rather effects of structural generalisation across problems.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4502" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4514"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0010027715300287"><svg class="icon icon-navigate-left" data-dcnode-id="4523" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4524"></path></svg><span class="button-alternative-text" data-dcnode-id="4516"><strong data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4503"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0010027715300111"><span class="button-alternative-text" data-dcnode-id="4507"><strong data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4510"><span data-dcnode-id="4511" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4505" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4506"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4483"><div class="keywords-section" data-dcnode-id="4484" id="kg005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4500"><span data-dcnode-id="4501" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4497" id="k0005"><span data-dcnode-id="4498"><span data-dcnode-id="4499" instrument_node="">Problem solving</span></span></div><div class="keyword" data-dcnode-id="4494" id="k0010"><span data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Sleep</span></span></div><div class="keyword" data-dcnode-id="4491" id="k0015"><span data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">Analogical transfer</span></span></div><div class="keyword" data-dcnode-id="4488" id="k0020"><span data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Memory</span></span></div><div class="keyword" data-dcnode-id="4485" id="k0025"><span data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node="">Information restructuring</span></span></div></div></div><span data-dcnode-id="4482" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="3050" id="body"><div data-dcnode-id="3109"><section data-dcnode-id="4384" id="s0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4476" id="st015"><span data-dcnode-id="4481" instrument_node="">1</span><span data-dcnode-id="4479" instrument_node="">. </span><span data-dcnode-id="4477" instrument_node="">Introduction</span></h2><div data-dcnode-id="4427"><p data-dcnode-id="4447" id="p0005"><span data-dcnode-id="4475" instrument_node="">To be an effective problem solver, one must apply learning from previous experiences to new contexts. This application of knowledge is not simply a function of recalling previous information, because two situations are rarely identical. Consider the problems shown in </span><a class="workspace-trigger" data-dcnode-id="4473" href="#f0005" name="bf0005"><span data-dcnode-id="4474" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4472" instrument_node="">. Applying the tree problem solution to the matchsticks problem requires remembering the initial solution, evaluating the similarity between the two problems, and restructuring the first solution to apply to the matchsticks (e.g., remapping trees to matchsticks, and the hill to constructing matches in a third dimension above the working surface). Thus, in addition to explicit information recall, one must identify the procedural steps that led to success in the previous event and adapt them to apply to the current context (</span><a class="workspace-trigger" data-dcnode-id="4470" href="#b0045" name="bb0045"><span data-dcnode-id="4471" instrument_node="">Duncker, 1945</span></a><span data-dcnode-id="4469" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4467" href="#b0065" name="bb0065"><span data-dcnode-id="4468" instrument_node="">Gentner and Markman, 1997</span></a><span data-dcnode-id="4466" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4464" href="#b0095" name="bb0095"><span data-dcnode-id="4465" instrument_node="">Holyoak, 2012</span></a><span data-dcnode-id="4463" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4461" href="#b0130" name="bb0130"><span data-dcnode-id="4462" instrument_node="">Metcalfe and Weibe, 1987</span></a><span data-dcnode-id="4460" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4458" href="#b0145" name="bb0145"><span data-dcnode-id="4459" instrument_node="">Olton and Johnson, 1976</span></a><span data-dcnode-id="4457" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4455" href="#b0165" name="bb0165"><span data-dcnode-id="4456" instrument_node="">Scheerer, 1963</span></a><span data-dcnode-id="4454" instrument_node="">). This process is referred to as analogical reasoning and has been considered as the major contributor to humans’ mental agility (</span><a class="workspace-trigger" data-dcnode-id="4452" href="#b0060" name="bb0060"><span data-dcnode-id="4453" instrument_node="">Gentner &amp; Colhoun, 2010</span></a><span data-dcnode-id="4451" instrument_node="">) and the bedrock of human cognition (</span><a class="workspace-trigger" data-dcnode-id="4449" href="#b0090" name="bb0090"><span data-dcnode-id="4450" instrument_node="">Hofstadter, 2001</span></a><span data-dcnode-id="4448" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4428" id="f0005"><span data-dcnode-id="4437"><img alt="" aria-describedby="cn0055" data-dcnode-id="4446" height="375" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr1.jpg&amp;raw"><span data-dcnode-id="4445" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4438"><li data-dcnode-id="4439"><a class="anchor download-link u-font-sans" data-dcnode-id="4440" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4441"><span data-dcnode-id="4444" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4429"><span data-dcnode-id="4430" id="cn0055"><p data-dcnode-id="4431" id="sp0015"><span class="label" data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">Fig. 1</span></span><span data-dcnode-id="4434" instrument_node="">. </span><span data-dcnode-id="4432" instrument_node="">Example of a source and target problem in an analogical transfer task.</span></p></span></span></figure></div><p data-dcnode-id="4413" id="p0010"><span data-dcnode-id="4426" instrument_node="">Despite the importance of analogical reasoning to problem solving, people are notoriously poor at translating solutions from a previously attempted (source) problem to novel but structurally related (target) problems (</span><a class="workspace-trigger" data-dcnode-id="4424" href="#b0070" name="bb0070"><span data-dcnode-id="4425" instrument_node="">Gick and Holyoak, 1980</span></a><span data-dcnode-id="4423" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4421" href="#b0185" name="bb0185"><span data-dcnode-id="4422" instrument_node="">Vendetti et al., 2014</span></a><span data-dcnode-id="4420" instrument_node="">). Unfortunately, people only effectively transfer if the source and target problems have a high degree of surface similarity (e.g., </span><a class="workspace-trigger" data-dcnode-id="4418" href="#b0005" name="bb0005"><span data-dcnode-id="4419" instrument_node="">Bassock &amp; Holyoak, 1989</span></a><span data-dcnode-id="4417" instrument_node="">) or if attention is extensively and explicitly directed to the abstract schema underlying both the source and target problems’ solutions (e.g., </span><a class="workspace-trigger" data-dcnode-id="4415" href="#b0025" name="bb0025"><span data-dcnode-id="4416" instrument_node="">Catrambone &amp; Holyoak, 1989</span></a><span data-dcnode-id="4414" instrument_node="">). Consequently, discovering less intrusive means by which such transfer can be facilitated has become a major theoretical goal with important practical consequences.</span></p><p data-dcnode-id="4402" id="p0015"><span data-dcnode-id="4412" instrument_node="">There is good reason to believe that analogical transfer could benefit from something as simple as sleep. As analogical transfer depends in part on memory of the source problems, sleep can enhance transfer because sleep improves memory for previously experienced information (see </span><a class="workspace-trigger" data-dcnode-id="4410" href="#b0160" name="bb0160"><span data-dcnode-id="4411" instrument_node="">Rasch &amp; Born, 2013</span></a><span data-dcnode-id="4409" instrument_node="">, for a review). Additionally, analogical transfer requires recognition of similarity between source and target problems, and sleep can assist in identifying similarities across experiences (</span><a class="workspace-trigger" data-dcnode-id="4407" href="#b0115" name="bb0115"><span data-dcnode-id="4408" instrument_node="">Lewis and Durrant, 2011</span></a><span data-dcnode-id="4406" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4404" href="#b0190" name="bb0190"><span data-dcnode-id="4405" instrument_node="">Wagner et al., 2004</span></a><span data-dcnode-id="4403" instrument_node="">) subsequently creating a problem schema common to both source and target problems.</span></p><p data-dcnode-id="4385" id="p0020"><span data-dcnode-id="4401" instrument_node="">Here, we investigated whether sleep between exposure to source problems and related target problems improved analogical transfer. Previous studies of sleep have not tested transfer for complex problems with low surface similarities (e.g., </span><a class="workspace-trigger" data-dcnode-id="4399" href="#b0015" name="bb0015"><span data-dcnode-id="4400" instrument_node="">Beijamini et al., 2014</span></a><span data-dcnode-id="4398" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4396" href="#b0020" name="bb0020"><span data-dcnode-id="4397" instrument_node="">Cai et al., 2009</span></a><span data-dcnode-id="4395" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4393" href="#b0170" name="bb0170"><span data-dcnode-id="4394" instrument_node="">Sio et al., 2013</span></a><span data-dcnode-id="4392" instrument_node="">; for review see </span><a class="workspace-trigger" data-dcnode-id="4390" href="#b0030" name="bb0030"><span data-dcnode-id="4391" instrument_node="">Chatburn, Lushington, &amp; Kohler, 2014</span></a><span data-dcnode-id="4389" instrument_node="">). Further, we distinguished whether any facilitatory effects of sleep for problem solving were captured by subjective memory of the source problems or recognition of structural similarities between source and target problems (Experiment 1). We tested participants around their natural day-night sleep cycle which necessarily introduced a confound in time of day of testing. Experiment 2 ensured time of day was not driving the apparent effects of sleep from Experiment 1 (</span><a class="workspace-trigger" data-dcnode-id="4387" href="#b0055" name="bb0055"><span data-dcnode-id="4388" instrument_node="">Fröberg, 1977</span></a><span data-dcnode-id="4386" instrument_node="">).</span></p></section><section data-dcnode-id="3458" id="s0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4378" id="st020"><span data-dcnode-id="4383" instrument_node="">2</span><span data-dcnode-id="4381" instrument_node="">. </span><span data-dcnode-id="4379" instrument_node="">Experiment 1: Effect of sleep on analogical transfer</span></h2><section data-dcnode-id="4211" id="s0015"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4372" id="st025"><span data-dcnode-id="4377" instrument_node="">2.1</span><span data-dcnode-id="4375" instrument_node="">. </span><span data-dcnode-id="4373" instrument_node="">Method</span></h3><section data-dcnode-id="4351" id="s0020"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4366" id="st030"><span data-dcnode-id="4371" instrument_node="">2.1.1</span><span data-dcnode-id="4369" instrument_node="">. </span><span data-dcnode-id="4367" instrument_node="">Participants</span></h4><p data-dcnode-id="4352" id="p0025"><span data-dcnode-id="4365" instrument_node="">Sixty students at Lancaster University (17 males, 43 females) with mean age 20.1 (</span><em data-dcnode-id="4361"><span data-dcnode-id="4364" instrument_node="">SD</span><span data-dcnode-id="4362" instrument_node="">&nbsp;</span></em><span data-dcnode-id="4360" instrument_node="">=</span><span data-dcnode-id="4358" instrument_node="">&nbsp;</span><span data-dcnode-id="4356" instrument_node="">1.6) years volunteered to participate in the study. Participants were randomly allocated to a sleep (7 males, 23 females) or wake group (10 males, 20 females). Sample size was determined from a study by </span><a class="workspace-trigger" data-dcnode-id="4354" href="#b0155" name="bb0155"><span data-dcnode-id="4355" instrument_node="">Payne et al. (2009)</span></a><span data-dcnode-id="4353" instrument_node="">, who tested effects of sleep on high-level memory processes with 30 participants in a sleep and a wake group (referred to in their paper as the “Merrimack” participants).</span></p></section><section data-dcnode-id="4314" id="s0025"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4345" id="st035"><span data-dcnode-id="4350" instrument_node="">2.1.2</span><span data-dcnode-id="4348" instrument_node="">. </span><span data-dcnode-id="4346" instrument_node="">Materials</span></h4><p data-dcnode-id="4331" id="p0030"><span data-dcnode-id="4344" instrument_node="">We selected 6 pairs of source and target problems from the analogical transfer literature (</span><a class="workspace-trigger" data-dcnode-id="4342" href="#b0070" name="bb0070"><span data-dcnode-id="4343" instrument_node="">Gick and Holyoak, 1980</span></a><span data-dcnode-id="4341" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4339" href="#b0075" name="bb0075"><span data-dcnode-id="4340" instrument_node="">Gick and McGarry, 1992</span></a><span data-dcnode-id="4338" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4336" href="#b0135" name="bb0135"><span data-dcnode-id="4337" instrument_node="">Needham and Begg, 1991</span></a><span data-dcnode-id="4335" instrument_node="">). Target and source problems had similar structural relations between problem information and solution, but different surface features (see </span><a class="workspace-trigger" data-dcnode-id="4333" href="#s0090" name="bs0090"><span data-dcnode-id="4334" instrument_node="">Supplementary Materials</span></a><span data-dcnode-id="4332" instrument_node=""> for list of problems). An additional problem was used as a practice item.</span></p><p data-dcnode-id="4326" id="p0035"><span data-dcnode-id="4330" instrument_node="">We collected information on sleep habits and amount of sleep the night before the second session using a questionnaire, and also used the Stanford Sleepiness Scale (</span><a class="workspace-trigger" data-dcnode-id="4328" href="#b0085" name="bb0085"><span data-dcnode-id="4329" instrument_node="">Hoddes, Zarcone, Smythe, Phillips, &amp; Dement, 1973</span></a><span data-dcnode-id="4327" instrument_node="">).</span></p><p data-dcnode-id="4315" id="p0040"><span data-dcnode-id="4325" instrument_node="">Subjective memory for source problems was measured using a questionnaire that asked participants how accurately they remembered the solution to each of the 6 source problems. Responses to each problem were on a 7-point Likert scale from 1 (don’t remember) to 7 (remember accurately). We measured subjective recognition of similarity of source and target problems by asking participants the extent to which they noticed relations between pairs of problems, with a 7-point Likert scale from 1 (not similar) to 7 (very similar), adapted from </span><a class="workspace-trigger" data-dcnode-id="4323" href="#b0120" name="bb0120"><span data-dcnode-id="4324" instrument_node="">Lockhart, Lamon, and Gick (1988)</span></a><span data-dcnode-id="4322" instrument_node="">. In both questionnaires, problems were referred to by very brief descriptions (e.g., referring to </span><a class="workspace-trigger" data-dcnode-id="4320" href="#f0005" name="bf0005"><span data-dcnode-id="4321" instrument_node="">Fig. 1</span></a><span data-dcnode-id="4319" instrument_node=""> problem: “the problem about planting trees”). Questionnaires are available in </span><a class="workspace-trigger" data-dcnode-id="4317" href="#s0090" name="bs0090"><span data-dcnode-id="4318" instrument_node="">Supplementary Materials</span></a><span data-dcnode-id="4316" instrument_node="">.</span></p></section><section data-dcnode-id="4254" id="s0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4308" id="st040"><span data-dcnode-id="4313" instrument_node="">2.1.3</span><span data-dcnode-id="4311" instrument_node="">. </span><span data-dcnode-id="4309" instrument_node="">Procedure</span></h4><p data-dcnode-id="4274" id="p0045"><span data-dcnode-id="4307" instrument_node="">There were two testing sessions, 12-h apart. Participants in the wake group were tested between 9</span><span data-dcnode-id="4305" instrument_node="">&nbsp;</span><span data-dcnode-id="4303" instrument_node="">am and 10</span><span data-dcnode-id="4301" instrument_node="">&nbsp;</span><span data-dcnode-id="4299" instrument_node="">am in the first session, and between 9</span><span data-dcnode-id="4297" instrument_node="">&nbsp;</span><span data-dcnode-id="4295" instrument_node="">pm and 10</span><span data-dcnode-id="4293" instrument_node="">&nbsp;</span><span data-dcnode-id="4291" instrument_node="">pm on the same day for the second session. Participants in the sleep group were tested between 9</span><span data-dcnode-id="4289" instrument_node="">&nbsp;</span><span data-dcnode-id="4287" instrument_node="">pm and 10</span><span data-dcnode-id="4285" instrument_node="">&nbsp;</span><span data-dcnode-id="4283" instrument_node="">pm in the first, and 9</span><span data-dcnode-id="4281" instrument_node="">&nbsp;</span><span data-dcnode-id="4279" instrument_node="">am to 10</span><span data-dcnode-id="4277" instrument_node="">&nbsp;</span><span data-dcnode-id="4275" instrument_node="">am the next day for the second session. The wake versus sleep manipulation was conducted around participants’ diurnal cycle, such that they either stayed awake or slept according to their usual sleep routine.</span></p><p data-dcnode-id="4261" id="p0050"><span data-dcnode-id="4273" instrument_node="">In the first session, participants were instructed to try to remember the solution to the problems they were attempting, as they might be relevant to later problems. Expectation of future memory use has been shown to enhance memory consolidation associated with sleep (</span><a class="workspace-trigger" data-dcnode-id="4271" href="#b0205" name="bb0205"><span data-dcnode-id="4272" instrument_node="">Wilhelm et al., 2011</span></a><span data-dcnode-id="4270" instrument_node="">). Each source problem was presented for 3</span><span data-dcnode-id="4268" instrument_node="">&nbsp;</span><span data-dcnode-id="4266" instrument_node="">min on a computer screen, during which time participants wrote their workings and solution on paper. Then, participants were shown the answer, which they studied for 1</span><span data-dcnode-id="4264" instrument_node="">&nbsp;</span><span data-dcnode-id="4262" instrument_node="">min before the next problem was presented. Participants were asked to abstain from alcohol, caffeine and daytime naps during the course of the study, and to maintain their usual sleep and wake routine during the study. Participants then left the laboratory. All participants conformed to these requests, determined by self-report questionnaires at the second session.</span></p><p data-dcnode-id="4255" id="p0055"><span data-dcnode-id="4260" instrument_node="">In the second session, participants completed the sleep questionnaire, the Stanford Sleepiness Scale, and the memory for the source problems questionnaire. The 6 target problems were then presented on a computer screen for 3</span><span data-dcnode-id="4258" instrument_node="">&nbsp;</span><span data-dcnode-id="4256" instrument_node="">min each, whilst participants wrote down their workings and solution on paper. Then, the source and target problem similarity ratings questionnaire was given to participants.</span></p></section><section data-dcnode-id="4212" id="s0035"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4248" id="st045"><span data-dcnode-id="4253" instrument_node="">2.1.4</span><span data-dcnode-id="4251" instrument_node="">. </span><span data-dcnode-id="4249" instrument_node="">Scoring</span></h4><p data-dcnode-id="4213" id="p0060"><span data-dcnode-id="4247" instrument_node="">Problem solutions were each scored by two researchers, using a 3-point ordinal scale, which indicated no, partial, or full solution (</span><a class="workspace-trigger" data-dcnode-id="4245" href="#b0100" name="bb0100"><span data-dcnode-id="4246" instrument_node="">Hosenfeld et al., 1997</span></a><span data-dcnode-id="4244" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4242" href="#b0175" name="bb0175"><span data-dcnode-id="4243" instrument_node="">Stevenson et al., 2011</span></a><span data-dcnode-id="4241" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4239" href="#b0180" name="bb0180"><span data-dcnode-id="4240" instrument_node="">Tunteler et al., 2008</span></a><span data-dcnode-id="4238" instrument_node="">), see </span><a class="workspace-trigger" data-dcnode-id="4236" href="#s0090" name="bs0090"><span data-dcnode-id="4237" instrument_node="">Supplementary Materials</span></a><span data-dcnode-id="4235" instrument_node=""> for the precise coding scheme. Inter-rater reliability was assessed using weighted kappa (</span><a class="workspace-trigger" data-dcnode-id="4233" href="#b0050" name="bb0050"><span data-dcnode-id="4234" instrument_node="">Fleiss &amp; Cohen, 1973</span></a><span data-dcnode-id="4232" instrument_node="">). For first session scores, </span><em data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">κ</span></em><span data-dcnode-id="4229" instrument_node="">&nbsp;</span><span data-dcnode-id="4227" instrument_node="">=</span><span data-dcnode-id="4225" instrument_node="">&nbsp;</span><span data-dcnode-id="4223" instrument_node="">.96, for second session scores, </span><em data-dcnode-id="4221"><span data-dcnode-id="4222" instrument_node="">κ</span></em><span data-dcnode-id="4220" instrument_node="">&nbsp;</span><span data-dcnode-id="4218" instrument_node="">=</span><span data-dcnode-id="4216" instrument_node="">&nbsp;</span><span data-dcnode-id="4214" instrument_node="">.91. The small number of scoring differences was resolved in further discussion between the scorers.</span></p></section></section><section data-dcnode-id="3459" id="s0040"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4205" id="st050"><span data-dcnode-id="4210" instrument_node="">2.2</span><span data-dcnode-id="4208" instrument_node="">. </span><span data-dcnode-id="4206" instrument_node="">Results</span></h3><div data-dcnode-id="4037"><p data-dcnode-id="4200" id="p0065"><span data-dcnode-id="4204" instrument_node="">The dependent variable was the proportion of the maximum possible score (out of 2) for each problem. Analogical transfer was indicated by target problem solution scores. Descriptive statistics are shown in </span><a class="workspace-trigger" data-dcnode-id="4202" href="#t0005" name="bt0005"><span data-dcnode-id="4203" instrument_node="">Table 1</span></a><span data-dcnode-id="4201" instrument_node="">. To test the effect of sleep, we conducted a repeated-measures ANOVA for the sleep versus wake groups, with question pair (1–6) as within subjects factor to control for variation across the problems, session (source or target problems) as within subjects factor accounting for individual variation in problem solving ability, and group (sleep versus wake) as between subjects factor.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="4038" id="t0005"><span class="captions" data-dcnode-id="4192"><span data-dcnode-id="4193" id="cn0075"><p data-dcnode-id="4194" id="sp0035"><span class="label" data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">Table 1</span></span><span data-dcnode-id="4197" instrument_node="">. </span><span data-dcnode-id="4195" instrument_node="">Means and standard deviations of sleep and wake groups (Experiment 1) and morning and evening control groups (Experiment 2), for the first and second test session problem, and the subjective judgment measures.</span></p></span></span><div class="groups" data-dcnode-id="4039"><table data-dcnode-id="4040"><thead data-dcnode-id="4150"><tr class="valign-top" data-dcnode-id="4177"><th class="align-left" data-dcnode-id="4190" scope="col"><span data-dcnode-id="4191" instrument_node="">Group</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4188" scope="col"><span data-dcnode-id="4189" instrument_node="">Source problems</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4186" scope="col"><span data-dcnode-id="4187" instrument_node="">Target problems</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4184" scope="col"><span data-dcnode-id="4185" instrument_node="">Sleep duration (h)</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4182" scope="col"><span data-dcnode-id="4183" instrument_node="">Stanford sleepiness</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4180" scope="col"><span data-dcnode-id="4181" instrument_node="">Memory judgments</span></th><th class="align-char rowsep-1" colspan="2" data-dcnode-id="4178" scope="col"><span data-dcnode-id="4179" instrument_node="">Similarity judgments</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="4151"><th class="align-left" data-dcnode-id="4176" scope="col"></th><th class="align-char" data-dcnode-id="4174" scope="col"><span data-dcnode-id="4175" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4172" scope="col"><span data-dcnode-id="4173" instrument_node="">SD</span></th><th class="align-char" data-dcnode-id="4170" scope="col"><span data-dcnode-id="4171" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4168" scope="col"><span data-dcnode-id="4169" instrument_node="">SD</span></th><th class="align-char" data-dcnode-id="4166" scope="col"><span data-dcnode-id="4167" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4164" scope="col"><span data-dcnode-id="4165" instrument_node="">SD</span></th><th class="align-char" data-dcnode-id="4162" scope="col"><span data-dcnode-id="4163" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4160" scope="col"><span data-dcnode-id="4161" instrument_node="">SD</span></th><th class="align-char" data-dcnode-id="4158" scope="col"><span data-dcnode-id="4159" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4156" scope="col"><span data-dcnode-id="4157" instrument_node="">SD</span></th><th class="align-char" data-dcnode-id="4154" scope="col"><span data-dcnode-id="4155" instrument_node="">Mean</span></th><th class="align-char" data-dcnode-id="4152" scope="col" ment_node="">.16</span></td><td class="align-char" data-dcnode-id="3618"><span data-dcnode-id="3619" instrument_node="">.22</span></td></tr><tr class="valign-top" data-dcnode-id="3609"><td class="align-left" data-dcnode-id="3616"></td><td data-dcnode-id="3614"><span data-dcnode-id="3615" instrument_node="">Similarity</span></td><td class="align-char" data-dcnode-id="3612"><span data-dcnode-id="3613" instrument_node="">.01</span></td><td class="align-char" data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">.12</span></td></tr><tr class="valign-top" data-dcnode-id="3606"><td class="align-left" colspan="4" data-dcnode-id="3607"><br data-dcnode-id="3608"></td></tr><tr class="valign-top" data-dcnode-id="3603"><td class="align-left" colspan="4" data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">All groups combined</span></td></tr><tr class="valign-top" data-dcnode-id="3592"><td class="align-left" data-dcnode-id="3602"></td><td data-dcnode-id="3600"><span data-dcnode-id="3601" instrument_node="">Memory</span></td><td class="align-char" data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">.11</span></td><td class="align-char" data-dcnode-id="3593"><span data-dcnode-id="3597" instrument_node="">.27</span><a class="workspace-trigger" data-dcnode-id="3594" href="#tblfn2" name="btblfn2"><sup data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">⁎⁎</span></sup></a></td></tr><tr class="valign-top" data-dcnode-id="3581"><td class="align-left" data-dcnode-id="3591"></td><td data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">Similarity</span></td><td class="align-char" data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">.27</span></td><td class="align-char" data-dcnode-id="3582"><span data-dcnode-id="3586" instrument_node="">.44</span><a class="workspace-trigger" data-dcnode-id="3583" href="#tblfn3" name="btblfn3"><sup data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">⁎⁎⁎</span></sup></a></td></tr></tbody></table></div><p class="legend" data-dcnode-id="3573"></p><p data-dcnode-id="3574" id="sp0045"><em data-dcnode-id="3576"><span data-dcnode-id="3577" instrument_node="">N</span></em><span data-dcnode-id="3575" instrument_node=""> is smaller for the morning and evening groups.</span></p><p></p><dl class="footnotes" data-dcnode-id="3539"><dt data-dcnode-id="3571" id="tblfn1"><span data-dcnode-id="3572" instrument_node="">⁎</span></dt><dd data-dcnode-id="3562"><p data-dcnode-id="3563" id="np005"><span data-dcnode-id="3570" instrument_node="">Oneway: </span><em data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">p</span></em><span data-dcnode-id="3567" instrument_node="">&nbsp;</span><span data-dcnode-id="3566" instrument_node="">&lt;</span><span data-dcnode-id="3565" instrument_node="">&nbsp;</span><span data-dcnode-id="3564" instrument_node="">.05.</span></p></dd><dt data-dcnode-id="3560" id="tblfn2"><span data-dcnode-id="3561" instrument_node="">⁎⁎</span></dt><dd data-dcnode-id="3551"><p data-dcnode-id="3552" id="np010"><span data-dcnode-id="3559" instrument_node="">Oneway: </span><em data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">p</span></em><span data-dcnode-id="3556" instrument_node="">&nbsp;</span><span data-dcnode-id="3555" instrument_node="">&lt;</span><span data-dcnode-id="3554" instrument_node="">&nbsp;</span><span data-dcnode-id="3553" instrument_node="">.01.</span></p></dd><dt data-dcnode-id="3549" id="tblfn3"><span data-dcnode-id="3550" instrument_node="">⁎⁎⁎</span></dt><dd data-dcnode-id="3540"><p data-dcnode-id="3541" id="np015"><span data-dcnode-id="3548" instrument_node="">Oneway: </span><em data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">p</span></em><span data-dcnode-id="3545" instrument_node="">&nbsp;</span><span data-dcnode-id="3544" instrument_node="">&lt;</span><span data-dcnode-id="3543" instrument_node="">&nbsp;</span><span data-dcnode-id="3542" instrument_node="">.001.</span></p></dd></dl></div><figure class="figure text-xs" data-dcnode-id="3507" id="f0015"><span data-dcnode-id="3528"><img alt="" aria-describedby="cn0065" data-dcnode-id="3537" height="535" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr3.jpg&amp;raw"><span data-dcnode-id="3536" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3529"><li data-dcnode-id="3530"><a class="anchor download-link u-font-sans" data-dcnode-id="3531" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3532"><span data-dcnode-id="3535" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3533"><span data-dcnode-id="3534" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3508"><span data-dcnode-id="3509" id="cn0065"><p data-dcnode-id="3510" id="sp0025"><span class="label" data-dcnode-id="3526"><span data-dcnode-id="3527" instrument_node="">Fig. 3</span></span><span data-dcnode-id="3525" instrument_node="">. </span><span data-dcnode-id="3523" instrument_node="">Scatterplots of relation for sleep duration with source and target problem scores for the sleep (upper row) and wake (lower row) groups in Experiment 1. For the correlations, </span><sup data-dcnode-id="3521"><span data-dcnode-id="3522" instrument_node="">∗</span></sup><span data-dcnode-id="3520" instrument_node=""> indicates </span><em data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">p</span></em><span data-dcnode-id="3517" instrument_node="">&nbsp;</span><span data-dcnode-id="3515" instrument_node="">&lt;</span><span data-dcnode-id="3513" instrument_node="">&nbsp;</span><span data-dcnode-id="3511" instrument_node="">.05.</span></p></span></span></figure></div><div data-dcnode-id="3460"><p data-dcnode-id="3480" id="p0085"><a class="workspace-trigger" data-dcnode-id="3504" href="#t0010" name="bt0010"><span data-dcnode-id="3505" instrument_node="">Table 2</span></a><span data-dcnode-id="3503" instrument_node=""> also shows the correlations for subjective memory and similarity judgments. To test whether the effect of sleep was accounted for by enhanced subjective memory and similarity judgments, we conducted a mediation analysis that tested the effect of sleep versus wake on target problem scores, with memory and similarity judgments as mediating variables, and source problem scores as a covariate. The resulting models are shown in </span><a class="workspace-trigger" data-dcnode-id="3501" href="#f0020" name="bf0020"><span data-dcnode-id="3502" instrument_node="">Fig. 4</span></a><span data-dcnode-id="3500" instrument_node="">. Sleep had a significant direct effect on target problem scores, which was not mediated by memory or similarity judgments. Using a bias-corrected bootstrapping procedure with 5000 resamples (</span><a class="workspace-trigger" data-dcnode-id="3498" href="#b0080" name="bb0080"><span data-dcnode-id="3499" instrument_node="">Hayes, 2009</span></a><span data-dcnode-id="3497" instrument_node="">), we found no significant change in direct relation between sleep or wake group and target problem scores with or without the mediating variables, 95% CI</span><span data-dcnode-id="3495" instrument_node="">&nbsp;</span><span data-dcnode-id="3493" instrument_node="">=</span><span data-dcnode-id="3491" instrument_node="">&nbsp;</span><span data-dcnode-id="3489" instrument_node="">[−.12, .08]. Sleep or wake group had no significant relation to memory or similarity judgment scores, but similarity judgments were significantly related to target problem scores. A further mediation model showed that the relation between source and target problem scores was not mediated by memory or similarity judgments using the same bootstrapping method, 95% CI</span><span data-dcnode-id="3487" instrument_node="">&nbsp;</span><span data-dcnode-id="3485" instrument_node="">=</span><span data-dcnode-id="3483" instrument_node="">&nbsp;</span><span data-dcnode-id="3481" instrument_node="">[−.09, .26], therefore justifying inclusion of source problem scores as a covariate, rather than a mediated variable.</span></p><figure class="figure text-xs" data-dcnode-id="3461" id="f0020"><span data-dcnode-id="3470"><img alt="" aria-describedby="cn0070" data-dcnode-id="3479" height="286" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr4.jpg&amp;raw"><span data-dcnode-id="3478" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3471"><li data-dcnode-id="3472"><a class="anchor download-link u-font-sans" data-dcnode-id="3473" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0010027715300159-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3474"><span data-dcnode-id="3477" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3462"><span data-dcnode-id="3463" id="cn0070"><p data-dcnode-id="3464" id="sp0030"><span class="label" data-dcnode-id="3468"><span data-dcnode-id="3469" instrument_node="">Fig. 4</span></span><span data-dcnode-id="3467" instrument_node="">. </span><span data-dcnode-id="3465" instrument_node="">Effect of sleep versus wake on target problem scores (A) without and (B) with mediating variables of memory and similarity judgments in Experiment 1. Source problem scores are a covariate in the analysis.</span></p></span></span></figure></div></section></section><section data-dcnode-id="3186" id="s0045"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3452" id="st055"><span data-dcnode-id="3457" instrument_node="">3</span><span data-dcnode-id="3455" instrument_node="">. </span><span data-dcnode-id="3453" instrument_node="">Experiment 2: Effect of time of day on analogical transfer</span></h2><section data-dcnode-id="3355" id="s0050"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3446" id="st060"><span data-dcnode-id="3451" instrument_node="">3.1</span><span data-dcnode-id="3449" instrument_node="">. </span><span data-dcnode-id="3447" instrument_node="">Method</span></h3><section data-dcnode-id="3408" id="s0055"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3440" id="st065"><span data-dcnode-id="3445" instrument_node="">3.1.1</span><span data-dcnode-id="3443" instrument_node="">. </span><span data-dcnode-id="3441" instrument_node="">Participants</span></h4><p data-dcnode-id="3409" id="p0090"><span data-dcnode-id="3439" instrument_node="">Forty-two students (11 male, 31 female) at Lancaster University participated for course credit. Mean age was 19.0, SD</span><span data-dcnode-id="3437" instrument_node="">&nbsp;</span><span data-dcnode-id="3435" instrument_node="">=</span><span data-dcnode-id="3433" instrument_node="">&nbsp;</span><span data-dcnode-id="3431" instrument_node="">0.6. Participants were randomly assigned to a morning (</span><em data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">N</span></em><span data-dcnode-id="3428" instrument_node="">&nbsp;</span><span data-dcnode-id="3426" instrument_node="">=</span><span data-dcnode-id="3424" instrument_node="">&nbsp;</span><span data-dcnode-id="3422" instrument_node="">20, 6 male, 14 female) or an evening (</span><em data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">N</span></em><span data-dcnode-id="3419" instrument_node="">&nbsp;</span><span data-dcnode-id="3417" instrument_node="">=</span><span data-dcnode-id="3415" instrument_node="">&nbsp;</span><span data-dcnode-id="3413" instrument_node="">22, 5 male, 17 female) testing group. Again, sample size was determined from the evening/morning groups of </span><a class="workspace-trigger" data-dcnode-id="3411" href="#b0155" name="bb0155"><span data-dcnode-id="3412" instrument_node="">Payne et al. (2009)</span></a><span data-dcnode-id="3410" instrument_node=""> Experiment 1, who were time of day controls for a sleep versus wake condition. Data collection was stopped when sample size in both conditions met the minimum of 20.</span></p></section><section data-dcnode-id="3399" id="s0060"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3402" id="st070"><span data-dcnode-id="3407" instrument_node="">3.1.2</span><span data-dcnode-id="3405" instrument_node="">. </span><span data-dcnode-id="3403" instrument_node="">Materials</span></h4><p data-dcnode-id="3400" id="p0095"><span data-dcnode-id="3401" instrument_node="">The Materials were identical to Experiment 1.</span></p></section><section data-dcnode-id="3356" id="s0065"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3393" id="st075"><span data-dcnode-id="3398" instrument_node="">3.1.3</span><span data-dcnode-id="3396" instrument_node="">. </span><span data-dcnode-id="3394" instrument_node="">Procedure</span></h4><p data-dcnode-id="3357" id="p0100"><span data-dcnode-id="3392" instrument_node="">The morning group participants were tested between 9</span><span data-dcnode-id="3390" instrument_node="">&nbsp;</span><span data-dcnode-id="3388" instrument_node="">am and 10</span><span data-dcnode-id="3386" instrument_node="">&nbsp;</span><span data-dcnode-id="3384" instrument_node="">am, the evening group were tested between 9</span><span data-dcnode-id="3382" instrument_node="">&nbsp;</span><span data-dcnode-id="3380" instrument_node="">pm and 10</span><span data-dcnode-id="3378" instrument_node="">&nbsp;</span><span data-dcnode-id="3376" instrument_node="">pm. The procedure was identical to Experiment 1, except that the first testing session, involving presentation of the source problems, was immediately succeeded by the second testing session, when the target problems were presented. Scoring was conducted in the same way as for Experiment 1 with two raters demonstrating reliable ratings, weighted </span><em data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">κ</span></em><span data-dcnode-id="3373" instrument_node="">&nbsp;</span><span data-dcnode-id="3371" instrument_node="">=</span><span data-dcnode-id="3369" instrument_node="">&nbsp;</span><span data-dcnode-id="3367" instrument_node="">.88 for the source problems, and </span><em data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">κ</span></em><span data-dcnode-id="3364" instrument_node="">&nbsp;</span><span data-dcnode-id="3362" instrument_node="">=</span><span data-dcnode-id="3360" instrument_node="">&nbsp;</span><span data-dcnode-id="3358" instrument_node="">.95 for the target problems.</span></p></section></section><section data-dcnode-id="3187" id="s0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3349" id="st080"><span data-dcnode-id="3354" instrument_node="">3.2</span><span data-dcnode-id="3352" instrument_node="">. </span><span data-dcnode-id="3350" instrument_node="">Results</span></h3><p data-dcnode-id="3188" id="p0105"><span data-dcnode-id="3348" instrument_node="">An ANOVA on problem solving scores, with group (morning or evening) and session (source problems, or target problems), and problem (to control for variation across the problems) as factors resulted in no significant effects of session, </span><em data-dcnode-id="3344"><span data-dcnode-id="3347" instrument_node="">F</span><span data-dcnode-id="3345" instrument_node="">&nbsp;</span></em><span data-dcnode-id="3343" instrument_node="">&lt;</span><span data-dcnode-id="3341" instrument_node="">&nbsp;</span><span data-dcnode-id="3339" instrument_node="">1, but a significant effect of group, </span><em data-dcnode-id="3337"><span data-dcnode-id="3338" instrument_node="">F</span></em><span data-dcnode-id="3336" instrument_node="">(1,</span><span data-dcnode-id="3334" instrument_node="">&nbsp;</span><span data-dcnode-id="3332" instrument_node="">40)</span><span data-dcnode-id="3330" instrument_node="">&nbsp;</span><span data-dcnode-id="3328" instrument_node="">=</span><span data-dcnode-id="3326" instrument_node="">&nbsp;</span><span data-dcnode-id="3324" instrument_node="">6.86, </span><em data-dcnode-id="3322"><span data-dcnode-id="3323" instrument_node="">p</span></em><span data-dcnode-id="3321" instrument_node="">&nbsp;</span><span data-dcnode-id="3319" instrument_node="">=</span><span data-dcnode-id="3317" instrument_node="">&nbsp;</span><span data-dcnode-id="3315" instrument_node="">.012, </span><em data-dcnode-id="3311"><span data-dcnode-id="3314" instrument_node="">ŋ</span><sub data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">G</span></sub></em><sup data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">2</span></sup><span data-dcnode-id="3308" instrument_node="">&nbsp;</span><span data-dcnode-id="3306" instrument_node="">=</span><span data-dcnode-id="3304" instrument_node="">&nbsp;</span><span data-dcnode-id="3302" instrument_node="">.09, with higher scores overall in the evening than the morning group. Crucially, the interaction between session and group was not significant, </span><em data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">F</span></em><span data-dcnode-id="3299" instrument_node="">(1,</span><span data-dcnode-id="3297" instrument_node="">&nbsp;</span><span data-dcnode-id="3295" instrument_node="">40)</span><span data-dcnode-id="3293" instrument_node="">&nbsp;</span><span data-dcnode-id="3291" instrument_node="">=</span><span data-dcnode-id="3289" instrument_node="">&nbsp;</span><span data-dcnode-id="3287" instrument_node="">1.06, </span><em data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">p</span></em><span data-dcnode-id="3284" instrument_node="">&nbsp;</span><span data-dcnode-id="3282" instrument_node="">=</span><span data-dcnode-id="3280" instrument_node="">&nbsp;</span><span data-dcnode-id="3278" instrument_node="">.309, </span><em data-dcnode-id="3274"><span data-dcnode-id="3277" instrument_node="">ŋ</span><sub data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">G</span></sub></em><sup data-dcnode-id="3272"><span data-dcnode-id="3273" instrument_node="">2</span></sup><span data-dcnode-id="3271" instrument_node="">&nbsp;</span><span data-dcnode-id="3269" instrument_node="">=</span><span data-dcnode-id="3267" instrument_node="">&nbsp;</span><span data-dcnode-id="3265" instrument_node="">.01 (see </span><a class="workspace-trigger" data-dcnode-id="3263" href="#f0010" name="bf0010"><span data-dcnode-id="3264" instrument_node="">Fig. 2</span></a><span data-dcnode-id="3262" instrument_node="">). Even though problem solving was higher in the evening group, the only group that demonstrated a significant improvement from source to target problems across both experiments was the sleep group. An omnibus ANOVA combining data from Experiment 1 and 2, with all four groups (sleep, wake, morning, evening), test session, and problem as factors resulted in a significant interaction between group and test, </span><em data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">F</span></em><span data-dcnode-id="3259" instrument_node="">(3,</span><span data-dcnode-id="3257" instrument_node="">&nbsp;</span><span data-dcnode-id="3255" instrument_node="">98)</span><span data-dcnode-id="3253" instrument_node="">&nbsp;</span><span data-dcnode-id="3251" instrument_node="">=</span><span data-dcnode-id="3249" instrument_node="">&nbsp;</span><span data-dcnode-id="3247" instrument_node="">7.35, </span><em data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">p</span></em><span data-dcnode-id="3244" instrument_node="">&nbsp;</span><span data-dcnode-id="3242" instrument_node="">&lt;</span><span data-dcnode-id="3240" instrument_node="">&nbsp;</span><span data-dcnode-id="3238" instrument_node="">.001, </span><em data-dcnode-id="3234"><span data-dcnode-id="3237" instrument_node="">ŋ</span><sub data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">G</span></sub></em><sup data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">2</span></sup><span data-dcnode-id="3231" instrument_node="">&nbsp;</span><span data-dcnode-id="3229" instrument_node="">=</span><span data-dcnode-id="3227" instrument_node="">&nbsp;</span><span data-dcnode-id="3225" instrument_node="">.08. In Tukey’s post hoc comparisons, the difference between source and target problems was larger for the sleep group than each of the wake, morning, and evening groups, </span><em data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">p</span></em><span data-dcnode-id="3222" instrument_node="">&nbsp;</span><span data-dcnode-id="3220" instrument_node="">=</span><span data-dcnode-id="3218" instrument_node="">&nbsp;</span><span data-dcnode-id="3216" instrument_node="">.085, </span><em data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">p</span></em><span data-dcnode-id="3213" instrument_node="">&nbsp;</span><span data-dcnode-id="3211" instrument_node="">=</span><span data-dcnode-id="3209" instrument_node="">&nbsp;</span><span data-dcnode-id="3207" instrument_node="">.009, </span><em data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">p</span></em><span data-dcnode-id="3204" instrument_node="">&nbsp;</span><span data-dcnode-id="3202" instrument_node="">&lt;</span><span data-dcnode-id="3200" instrument_node="">&nbsp;</span><span data-dcnode-id="3198" instrument_node="">.001, respectively. No other groups were significantly different, </span><em data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">p</span></em><span data-dcnode-id="3195" instrument_node="">&nbsp;</span><span data-dcnode-id="3193" instrument_node="">⩾</span><span data-dcnode-id="3191" instrument_node="">&nbsp;</span><span data-dcnode-id="3189" instrument_node="">.120. The results demonstrate that sleep, rather than circadian effects, results in the enhancement of analogical transfer.</span></p></section></section><section data-dcnode-id="3110" id="s0075"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3180" id="st085"><span data-dcnode-id="3185" instrument_node="">4</span><span data-dcnode-id="3183" instrument_node="">. </span><span data-dcnode-id="3181" instrument_node="">Discussion</span></h2><p data-dcnode-id="3166" id="p0110"><span data-dcnode-id="3179" instrument_node="">Retrieving and identifying how previously encountered information applies to current situations is a challenging, but fundamental, task for human reasoning. Previous studies have shown that people require extended, overt instructions for them to effectively apply previously learned solutions to alternative situations that differ in their surface features (</span><a class="workspace-trigger" data-dcnode-id="3177" href="#b0025" name="bb0025"><span data-dcnode-id="3178" instrument_node="">Catrambone and Holyoak, 1989</span></a><span data-dcnode-id="3176" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3174" href="#b0070" name="bb0070"><span data-dcnode-id="3175" instrument_node="">Gick and Holyoak, 1980</span></a><span data-dcnode-id="3173" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3171" href="#b0105" name="bb0105"><span data-dcnode-id="3172" instrument_node="">Kaminski et al., 2013</span></a><span data-dcnode-id="3170" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3168" href="#b0140" name="bb0140"><span data-dcnode-id="3169" instrument_node="">Novick, 1988</span></a><span data-dcnode-id="3167" instrument_node="">). Experiment 1 demonstrated that a 12-h delay including sleep has a facilitating effect on such transfer compared to 12-h awake.</span></p><p data-dcnode-id="3164" id="p0115"><span data-dcnode-id="3165" instrument_node="">Experiment 2 suggested that the improvement from source to target problem performance in the sleep condition was not due to circadian effects, because the sleep group demonstrated a significant increase in performance compared to the other three groups. However, the evening group demonstrated better performance for both source and target problems compared to the morning group. An alternative explanation for the effect of sleep could therefore be that participants perform better on problems in the evening, potentially resulting in better encoding of the source problems. However, this interpretation cannot explain why the sleep and wake groups did not differ on their source problem performance, nor why the evening group was unable to transfer solutions, i.e., no improvement in performance from source to target problems. The direct correlation between sleep duration and target problem solution for the sleep group would also require an additional explanation. Hence, analogical transfer being improved by sleep is the more parsimonious explanation of the data.</span></p><p data-dcnode-id="3153" id="p0120"><span data-dcnode-id="3163" instrument_node="">The mediation analyses demonstrated that the facilitating effect of sleep was not reducible to subjective memory of the source problems or similarity judgments about the relation between source and targe st problems, consistent with previous remote analogical memory studies that transfer can operate not only on surface similarities between problems (</span><a class="workspace-trigger" data-dcnode-id="3161" href="#b0200" name="bb0200"><span data-dcnode-id="3162" instrument_node="">Wharton et al., 1996</span></a><span data-dcnode-id="3160" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3158" href="#b0195" name="bb0195"><span data-dcnode-id="3159" instrument_node="">Wharton et al., 1994</span></a><span data-dcnode-id="3157" instrument_node="">). However, self-report measures of memory are weakly correlated with objective memory measures (</span><a class="workspace-trigger" data-dcnode-id="3155" href="#b0035" name="bb0035"><span data-dcnode-id="3156" instrument_node="">Chua, Schacter, Rand-Giovannetti, &amp; Sperling, 2006</span></a><span data-dcnode-id="3154" instrument_node="">), and future research testing objective memory for the source problems would provide a clearer picture of the role of memory in analogical problem solving. However, the mediation analyses did demonstrate that similarity judgments do predict target problem solution rates, and showed that this was in addition to the effect of sleep.</span></p><p data-dcnode-id="3118" id="p0125"><span data-dcnode-id="3152" instrument_node="">The effect of sleep on analogical transfer may then be at some other stage of processing than memory for previous problem information (</span><a class="workspace-trigger" data-dcnode-id="3150" href="#b0060" name="bb0060"><span data-dcnode-id="3151" instrument_node="">Gentner and Colhoun, 2010</span></a><span data-dcnode-id="3149" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3147" href="#b0110" name="bb0110"><span data-dcnode-id="3148" instrument_node="">Knowlton et al., 2012</span></a><span data-dcnode-id="3146" instrument_node="">) and seems to be independent of explicit awareness of structural similarity. Though sleep has been found to improve explicit knowledge about structure of sequences in serial reaction time tests (</span><a class="workspace-trigger" data-dcnode-id="3144" href="#b0210" name="bb0210"><span data-dcnode-id="3145" instrument_node="">Wilhelm et al., 2013</span></a><span data-dcnode-id="3143" instrument_node="">) and linguistic material (</span><a class="workspace-trigger" data-dcnode-id="3141" href="#b0010" name="bb0010"><span data-dcnode-id="3142" instrument_node="">Batterink, Oudiette, Reber, &amp; Paller, 2014</span></a><span data-dcnode-id="3140" instrument_node="">) it may be that complex structural mappings do not become consciously available. We thus suggest that the effect of sleep appears to be more likely due to information restructuring. A possible mechanism for this is the sleep-dependent transfer of information from hippocampus to neocortex as a consequence of sleep (</span><a class="workspace-trigger" data-dcnode-id="3138" href="#b0040" name="bb0040"><span data-dcnode-id="3139" instrument_node="">Diekelmann &amp; Born, 2010</span></a><span data-dcnode-id="3137" instrument_node="">), where new information is integrated with previous experience to highlight schemata that current problems share with previously solved problems (</span><a class="workspace-trigger" data-dcnode-id="3135" href="#b0030" name="bb0030"><span data-dcnode-id="3136" instrument_node="">Chatburn et al., 2014</span></a><span data-dcnode-id="3134" instrument_node="">). Experiencing a novel but related problem can then activate these previously stored relations between problem concepts and solution structures (</span><a class="workspace-trigger" data-dcnode-id="3132" href="#b0020" name="bb0020"><span data-dcnode-id="3133" instrument_node="">Cai et al., 2009</span></a><span data-dcnode-id="3131" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3129" href="#b0115" name="bb0115"><span data-dcnode-id="3130" instrument_node="">Lewis and Durrant, 2011</span></a><span data-dcnode-id="3128" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3126" href="#b0150" name="bb0150"><span data-dcnode-id="3127" instrument_node="">Payne, 2014</span></a><span data-dcnode-id="3125" instrument_node="">). As a consequence, broader semantic activations in long-term memory can be observed (</span><a class="workspace-trigger" data-dcnode-id="3123" href="#b0015" name="bb0015"><span data-dcnode-id="3124" instrument_node="">Beijamini et al., 2014</span></a><span data-dcnode-id="3122" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3120" href="#b0170" name="bb0170"><span data-dcnode-id="3121" instrument_node="">Sio et al., 2013</span></a><span data-dcnode-id="3119" instrument_node="">), enabling newly experienced problems to more effectively access consolidated associations in a schema that can apply to the current task.</span></p><p data-dcnode-id="3113" id="p0130"><span data-dcnode-id="3117" instrument_node="">An alternative account is that sleep instead protects against interference from additional stimulation (</span><a class="workspace-trigger" data-dcnode-id="3115" href="#b0125" name="bb0125"><span data-dcnode-id="3116" instrument_node="">Mednick, Cai, Shuman, Anagnostaras, &amp; Wixted, 2011</span></a><span data-dcnode-id="3114" instrument_node="">). The wake group were exposed to the source problems, and then stayed awake conducting their normal daytime routine. They were therefore exposed to greater stimulation than the sleep group, which may have impeded analogical transfer of the problems. However, the wake group did not perform worse in terms of transfer than the morning and evening groups, indicating that interference during a 12-h intervening period is no more of an impediment to transfer than no time at all between source and target problem presentation.</span></p><p data-dcnode-id="3111" id="p0135"><span data-dcnode-id="3112" instrument_node="">In these studies, we show that previously observed positive effects of sleep on problem solving extend to complex analogical transfer. It is apparent that lying down on the job has a role, and that sleep may well facilitate abstract restructuring of information affecting transfer of problem schemas, in addition to promoting memory for previously experienced information.</span></p></se
