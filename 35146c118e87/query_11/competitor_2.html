-dcnode-id="362"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="354"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="355" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="356"><p data-dcnode-id="357" id="spar0015"><span data-dcnode-id="358" instrument_node="">Two vital memory functions — remembering specific experiences and generalizing across many experiences — are in tension with each other. In the complementary-learning-systems model, the hippocampus allows for fast learning of unique episodic memories while the cortex slowly extracts regularities from overlapping representations. Whereas episodic memories undergo consolidation over protracted time periods, many questions remain about how memory generalization evolves over time. Sleep’s role in consolidating individual memories has been convincingly demonstrated using targeted memory reactivation, a method whereby memories can be selectively strengthened through the unobtrusive presentation of learning-related stimuli during sleep. In this review, we argue that targeted memory reactivation can help advance understanding of memory transformation and the contrast between specificity and generalization.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="325"><div class="sub-heading" data-dcnode-id="341"><a data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0010027719302884" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="351" id="citing-articles-article2-title"><span data-dcnode-id="352" instrument_node="">Do questionnaires reflect their purported cognitive functions?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">2020, Cognition</span></div><div class="CitedSection" data-dcnode-id="342"><div class="snippet" data-dcnode-id="343"><div class="cite-header" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">They offer the opportunity to gain valuable insights into a person’s subjective thoughts, beliefs and meta-cognition which are not easy to derive from task performance measures alone. Even where performance on cognitive tasks or measures of brain activity are the main focus of investigation, questionnaires nevertheless often also play a role (Arnold, Iaria, &amp; Ekstrom, 2016; Auger, Zeidman, &amp; Maguire, 2017; Belardinelli et al., 2009; Monaghan et al., 2015; Sheldon, Farb, Palombo, &amp; Levine, 2016; Silani et al., 2008). Moreover, in some branches of psychology, questionnaire studies outnumber those involving the direct measurement of cognition and behaviour (e.g. Baumeister, Vohs, &amp; Funder, 2007).</span></p></div></div></div><div class="buttons" data-dcnode-id="335"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="336" type="button"><span class="button-link-text" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="337" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="338"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="326"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="327" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="328"><p data-dcnode-id="329" id="spar0260"><span data-dcnode-id="334" instrument_node="">Questionnaires are used widely across psychology and permit valuable insights into a person’s thoughts and beliefs, which are difficult to derive from task performance measures alone. Given their importance and widespread use, it is vital that questionnaires map onto the cognitive functions they purport to reflect. However, where performance on naturalistic tasks such as imagination, autobiographical memory, future thinking and navigation is concerned, there is a dearth of knowledge about the relationships between task performance and questionnaire measures. Questionnaires are also typically designed to probe a specific aspect of cognition, when instead researchers sometimes want to obtain a broad profile of a participant. To the best of our knowledge, no questionnaire exists that asks simple single questions about a wide range of cognitive functions. To address these gaps in the literature, we recruited a large sample of participants (n</span><span data-dcnode-id="333" instrument_node="">&nbsp;</span><span data-dcnode-id="332" instrument_node="">=</span><span data-dcnode-id="331" instrument_node="">&nbsp;</span><span data-dcnode-id="330" instrument_node="">217), all of whom completed a battery of widely used questionnaires and performed naturalistic tasks involving imagination, autobiographical memory, future thinking and navigation. We also devised a questionnaire that comprised simple single questions about the cognitive functions of interest. There were four main findings. First, imagination and navigation questionnaires reflected performance on their related tasks. Second, memory questionnaires were associated with autobiographical memory vividness and not internal (episodic) details. Third, imagery questionnaires were more associated with autobiographical memory vividness and future thinking than the questionnaires purporting to reflect these functions. Finally, initial exploratory analyses suggested that a broad profile of information can be obtained efficiently using a small number of simple single questions, and these modelled task performance comparably to established questionnaires in young, healthy adults. Overall, while some questionnaires can act as proxies for behaviour, the relationships between memory and future thinking tasks and questionnaires are more complex and require further elucidation.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="301"><div class="sub-heading" data-dcnode-id="313"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1364661318300706" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="323" id="citing-articles-article3-title"><span data-dcnode-id="324" instrument_node="">How Memory Replay in Sleep Boosts Creative Problem-Solving</span></h3></a><div class="article-source ellipsis" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">2018, Trends in Cognitive Sciences</span></div><div class="CitedSection" data-dcnode-id="314"><div class="snippet" data-dcnode-id="315"><div class="cite-header" data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Otto Loewi, who won the 1936 Nobel Prize for work on Chemical Transmission, was also inspired by a dream. Although it is commonly accepted that sleep promotes creative problem-solving [1–5], it is unclear how this occurs, and there is debate as to which sleep stage, rapid eye movement (REM) (see Glossary) sleep, or non-REM, is most critical. Creative problem-solving often involves reorganisation of existing knowledge in order to identify general rules or structures (Box 1).</span></p></div></div></div><div class="buttons" data-dcnode-id="307"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="308" type="button"><span class="button-link-text" data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="309" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="310"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="302"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="303" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="304"><p data-dcnode-id="305" id="spar0040"><span data-dcnode-id="306" instrument_node="">Creative thought relies on the reorganisation of existing knowledge. Sleep is known to be important for creative thinking, but there is a debate about which sleep stage is most relevant, and why. We address this issue by proposing that rapid eye movement sleep, or ‘REM’, and non-REM sleep facilitate creativity in different ways. Memory replay mechanisms in non-REM can abstract rules from corpuses of learned information, while replay in REM may promote novel associations. We propose that the iterative interleaving of REM and non-REM across a night boosts the formation of complex knowledge frameworks, and allows these frameworks to be restructured, thus facilitating creative thought. We outline a hypothetical computational model which will allow explicit testing of these hypotheses.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="277"><div class="sub-heading" data-dcnode-id="289"><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0022096517300279" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="299" id="citing-articles-article4-title"><span data-dcnode-id="300" instrument_node="">Naps improve new walkers’ locomotor problem solving</span></h3></a><div class="article-source ellipsis" data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">2017, Journal of Experimental Child Psychology</span></div><div class="CitedSection" data-dcnode-id="290"><div class="snippet" data-dcnode-id="291"><div class="cite-header" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">It may be that the particular combination of a novel task requiring switching between postures presented at the unique transitional period between crawling and walking created a motor problem that was especially difficult and, in turn, especially susceptible to benefits from sleep. Moreover, in an adult sample, sleep facilitated the analogical transfer of solutions from a training context to a similar but not identical test context, suggesting that sleep likely enhances performance via the restructuring of information (Monaghan et al., 2015). Given these findings, perhaps sleep improved infants’ performance in this motor context by facilitating memory consolidation and integration of earlier experiences (Stickgold &amp; Walker, 2013).</span></p></div></div></div><div class="buttons" data-dcnode-id="283"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="284" type="button"><span class="button-link-text" data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="285" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="286"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="278"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="279" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="280"><p data-dcnode-id="281" id="sp0010"><span data-dcnode-id="282" instrument_node="">In this first study of the impact of sleep on infants’ problem solving of a locomotor task, 28 newly walking infants who were within a week of having given up crawling trained to navigate a shoulder-height tunnel to reach a caregiver waiting at the end. During the transitional window between crawling and walking, infants are reluctant to return to crawling, making this task uniquely challenging. Infants were randomly assigned to either nap or stay awake during a delay between training and a later test session. For the Nap group, efficiency of problem solving improved from training to test, but there was no change for the No Nap group. These findings suggest that for newly walking infants, sleep facilitates learning to solve a novel motor problem.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959438816301611" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="275" id="citing-articles-article5-title"><span data-dcnode-id="276" instrument_node="">Oscillations, neural computations and learning during wake and sleep</span></h3></a><div class="article-source ellipsis" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">2017, Current Opinion in Neurobiology</span></div><div class="CitedSection" data-dcnode-id="266"><div class="snippet" data-dcnode-id="267"><div class="cite-header" data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Previous work has emphasized the contribution of sleep to the formation of episodic and semantic knowledge and to the identification of similar contexts in different environments [8••,10]. However, the discovery of insights or implicit rules for problem solving during sleep has been largely unaccounted for [7,58,59]. Here, we explored computational principles during sleep that endow the brain with the ability to find new solutions to familiar problems or to extrapolate previous strategies to new scenarios.</span></p></div></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="spar0025"><span data-dcnode-id="258" instrument_node="">Learning and memory theories consider sleep and the reactivation of waking hippocampal neural patterns to be crucial for the long-term consolidation of memories. Here we propose that precisely coordinated representations across brain regions allow the inference and evaluation of causal relationships to train an internal generative model of the world. This training starts during wakefulness and strongly benefits from sleep because its recurring nested oscillations may reflect compositional operations that facilitate a hierarchical processing of information, potentially including behavioral policy evaluations. This suggests that an important function of sleep activity is to provide conditions conducive to general inference, prediction and insight, which contribute to a more robust internal model that underlies generalization and adaptive behavior.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84934951879%26md5%3D6433dec18243517759e9fdd7b1edd225" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="251"></path></svg><span class="button-alternative-text" data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><a class="anchor abstract-link" data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0010027715300159"><span class="anchor-text" data-dcnode-id="241"><span data-dcnode-id="242" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Copyright © 2015 Elsevier B.V. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="127"><aside a
