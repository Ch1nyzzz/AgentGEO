</span><main class="clearfix" data-dcnode-id="93" id="main" role="main" style=""><div class="fusion-row" data-dcnode-id="95" style=""><section data-dcnode-id="96" id="content" style="width: 100%;"><span data-dcnode-id="1268" instrument_node="">
</span><article class="post post-632 type-post status-publish format-standard hentry category-common-questions" data-dcnode-id="98" id="post-632"><h2 class="entry-title fusion-post-title" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Solving the Body-Soul Problem</span></h2><div class="post-content" data-dcnode-id="942"><div class="fusion-fullwidth fullwidth-box nonhundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="996" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;"><div class="fusion-builder-row fusion-row" data-dcnode-id="997"><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_1 fusion-one-full fusion-column-first fusion-column-last 1_1" data-dcnode-id="998" style="margin-top:0px;margin-bottom:20px;"><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="999" style="padding: 0px 0px 0px 0px;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><div class="fusion-text" data-dcnode-id="1001"><p data-dcnode-id="1263"><span data-dcnode-id="1264" style="color: blue; font-size: medium;"><span class="timespan greater-than" data-dcnode-id="1265"></span></span></p><p data-dcnode-id="1258"><span data-dcnode-id="1262" instrument_node="">Reading Time:</span><span class="ts-time" data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node=""> 12</span></span><span data-dcnode-id="1259" instrument_node=""> minutes</span></p><p data-dcnode-id="1257"></p><p data-dcnode-id="1249"><span data-dcnode-id="1255" style="font-weight: 400;"><span data-dcnode-id="1256" instrument_node="">For a lot of my friends and family members, time has passed slowly over the last few weeks. So many people that I love are plastered with a somber, quiet stillness. Earlier this month, a car full of college students—who many people in my community knew through </span></span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.younglife.org/Pages/default.aspx"><span data-dcnode-id="1253" style="font-weight: 400;"><span data-dcnode-id="1254" instrument_node="">Young Life</span></span></a><span data-dcnode-id="1250" style="font-weight: 400;"><span data-dcnode-id="1251" instrument_node=""> ministries—were traveling to Colorado for a Young Life volunteer work week when one of their vehicle’s tires blew out, causing a rollover. One passenger died immediately, another suffered serious injury, and a third, Blake Rodgers, entered into a self-induced coma as a result of fatal brain trauma. </span></span></p><p data-dcnode-id="1238"><span data-dcnode-id="1247" style="font-weight: 400;"><span data-dcnode-id="1248" instrument_node="">That night, the community that raised and prayed for Blake throughout his life committed to flood hospital waiting rooms, host prayer vigils, cook meals, and show up for the Rodgers family in the endlessness and uncertainty of their crisis. </span></span><span data-dcnode-id="1245" style="font-weight: 400;"><span data-dcnode-id="1246" instrument_node="">It was both exhausting and inspiring to watch a community “show up” in so many faithful and loyal ways. </span></span><span data-dcnode-id="1243" style="font-weight: 400;"><span data-dcnode-id="1244" instrument_node="">While Blake slept suspended between life and death, family and friends were caught in </span></span><span data-dcnode-id="1241" style="font-weight: 400;"><span data-dcnode-id="1242" instrument_node="">this tide of praying then listening, begging for a miracle then surrendering to God’s plan. </span></span><span data-dcnode-id="1239" style="font-weight: 400;"><span data-dcnode-id="1240" instrument_node="">In some moments, it felt like all of Heaven prayed with us for Blake’s healing; but there were other inevitably lonely moments which were shadowed and empty, and my voice felt like one of the only ones left praying for a miracle, an explanation, or some morsel of peace. </span></span></p><p data-dcnode-id="1235"><span data-dcnode-id="1236" style="font-weight: 400;"><span data-dcnode-id="1237" instrument_node="">After holding on with the help of life support for over a week, he passed. </span></span></p><p data-dcnode-id="1224"><span data-dcnode-id="1233" style="font-weight: 400;"><span data-dcnode-id="1234" instrument_node="">And now, the conversation has changed. Now, we celebrate his passing from death to eternal life. Discussions that were grounded in God’s capacity to breathe life back into Blake’s body have evolved into discussions about </span></span><span data-dcnode-id="1231" style="font-weight: 400;"><span data-dcnode-id="1232" instrument_node="">Blake smiling, laughing, and walking hand in hand with His Creat</span></span><span data-dcnode-id="1229" style="font-weight: 400;"><span data-dcnode-id="1230" instrument_node="">or. Th</span></span><span data-dcnode-id="1227" style="font-weight: 400;"><span data-dcnode-id="1228" instrument_node="">is Christian community possesses a hopeful, Heaven-oriented imagination that is trained to picture Blake as already reunited with his Maker in both body and soul; as more than just a spirit. Even in their grief, </span></span><span data-dcnode-id="1225" style="font-weight: 400;"><span data-dcnode-id="1226" instrument_node="">Blake’s family and friends have let the outline of their memory of him be colored with the hope and assurance of his immediate and full reunion with Jesus.</span></span></p><p data-dcnode-id="1219"><span data-dcnode-id="1222" style="font-weight: 400;"><span data-dcnode-id="1223" instrument_node="">For Protestant American Evangelicals, this perspective is not uncommon. But not all Christians think about death that way. There are lots of ways to talk and think about the reality of dying. </span></span><span data-dcnode-id="1220" style="font-weight: 400;"><span data-dcnode-id="1221" instrument_node="">Since the church’s beginning, Christians have wrestled together with Scripture, science, and philosophy to understand God’s vision for our bodies and souls after death. </span></span></p><p data-dcnode-id="1216"><span data-dcnode-id="1217" style="font-weight: 400;"><span data-dcnode-id="1218" instrument_node="">Despite how little they may be talked about within the context of Christianity, bodies are deeply important to the church’s doctrines. The concept of bodies and human form is integral to the Christian religion, and this intersection of faith with human physicalness hits home in the midst of mourning. </span></span></p><p data-dcnode-id="1213"><b data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">The question is, how should we as Christians think about what will happen to our bodies and souls after death? In other words, how do we solve the mind-body problem? The way we think about the relationship between our bodies and souls is a direct reflection of what we believe will happen to them both in and after death.</span></b></p><p data-dcnode-id="1210"><span data-dcnode-id="1211" style="font-weight: 400;"><span data-dcnode-id="1212" instrument_node="">Though this conversation of what death does to our bodies and souls is not normally at the top of anybody’s list of theological questions, the death of a loved one puts it there. Witnessing another person pass from life into death jolts us into all kinds of questions. </span></span></p><p data-dcnode-id="1201"><span data-dcnode-id="1206" style="font-weight: 400;"><strong data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">The following 4 theories are attempts to answer those questions.</span></strong><span data-dcnode-id="1207" instrument_node=""> They tackle the </span></span><span data-dcnode-id="1204" style="font-weight: 400;"><span data-dcnode-id="1205" instrument_node="">“mind-body problem,”</span></span><span data-dcnode-id="1202" style="font-weight: 400;"><span data-dcnode-id="1203" instrument_node=""> (sometimes referred to in Christian circles as the “soul-body problem”) which is what Rene Descartes named this ongoing series of questions about what happens to our bodies and souls after death. It is appropriate to call it a “problem;” no one doctrine can pinpoint God’s design for humans in and after death perfectly. Still, a look at the different ways that theologians have tried to answer the question over the years can contribute to our own understanding of mortality, and the hope we have in eternal life. These conversations remind us that death is not the end of the story and that God has a good plan for our bodies and souls that extends past life as we know it.</span></span></p><h1 data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">HOLISTIC DUALISM</span></h1><p data-dcnode-id="1180"><span data-dcnode-id="1197" style="font-weight: 400;"><span data-dcnode-id="1198" instrument_node="">This is arguably the longest-standing and most commonly held belief in church history on the topic. Roman Catholic, Eastern Orthodox, and most Protestant traditions </span></span><span data-dcnode-id="1190" style="font-weight: 400;"><span data-dcnode-id="1196" instrument_node="">back this theory. </span><strong data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Essentially, holistic dualism says that God has created body and soul as unified, though not inseparable.</span></strong><span data-dcnode-id="1193" instrument_node=""> We are unified creatures, and our minds, bodies, and souls are integrated.</span><strong data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node=""> But holistic dualists also believe that souls enter a </span></strong></span><strong data-dcnode-id="1187"><i data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">disembodied intermediate state</span></i></strong><span data-dcnode-id="1181" style="font-weight: 400;"><strong data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node=""> after death.</span></strong><span data-dcnode-id="1184" instrument_node=""> This is an exception to the unity God intended for us in life and in resurrection. </span><strong data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">In that intermediate state, God takes the souls to Heaven and sustains them until the second coming, but our bodies die. When Jesus returns, souls are reintegrated with a renewed, resurrected body. </span></strong></span></p><p data-dcnode-id="1177"><span data-dcnode-id="1178" style="font-weight: 400;"><span data-dcnode-id="1179" instrument_node="">Holistic dualism is a combination of two theories, as the term suggests: holism and dualism. Though on the edge of conflicting with each other, both are essential for fleshing out the intricacies of this definition. </span></span></p><ul data-dcnode-id="1163"><li data-dcnode-id="1171" style="font-weight: 400;"><i data-dcnode-id="1174"><span data-dcnode-id="1175" style="font-weight: 400;"><span data-dcnode-id="1176" instrument_node="">Holism</span></span></i><span data-dcnode-id="1172" style="font-weight: 400;"><span data-dcnode-id="1173" instrument_node=""> says that humans are created by God as integral wholes—single beings with different dimensions (e.g. body, mind, soul) that cannot be naturally separated. </span></span></li><li data-dcnode-id="1164" style="font-weight: 400;"><i data-dcnode-id="1168"><span data-dcnode-id="1169" style="font-weight: 400;"><span data-dcnode-id="1170" instrument_node="">Dualism</span></span></i><span data-dcnode-id="1167" instrument_node=""> </span><span data-dcnode-id="1165" style="font-weight: 400;"><span data-dcnode-id="1166" instrument_node="">is concerned with our core personalities, sometimes called egos, souls, or spirits. These are distinguished and separate from our bodies–in God’s infinite power and omniscience, He is able to sustain our souls apart from embodiment. </span></span></li></ul><p data-dcnode-id="1160"><span data-dcnode-id="1161" style="font-weight: 400;"><span data-dcnode-id="1162" instrument_node="">Essentially, this separation exists as a temporary consequence of sin. Paul says in Romans 6:23 that death is the consequence for sin. God’s original plan for humans was an eternal Edenic existence with Him, but Adam and Eve’s sin changed that plan. It brought sin into the world. So now, our bodies must die and be separated from our souls until Jesus’s second coming. Holistic dualists say that this separation is “the wages of sin” that Paul talks about in Romans. They strike a good balance between recognizing the vision that God had for humans after death while realizing the fact that humans threw a wrench in that plan. The theory highlights God’s good intentions for embodied souls, while still recognizing the reality of sin’s consequences in their disembodied intermediate state. </span></span></p><p data-dcnode-id="1149"><span data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" instrument_node="">Paul’s letters provide the Biblical basis for holistic dualism. In 1 Corinthians 3, he writes, “</span></span><span data-dcnode-id="1156" style="font-weight: 400;"><span data-dcnode-id="1157" instrument_node="">Don’t you know that you yourselves are God’s temple and that God’s Spirit dwells in your midst?” </span></span><span data-dcnode-id="1154" style="font-weight: 400;"><span data-dcnode-id="1155" instrument_node="">Some interpret this to mean that we have a body on earth that serves as a temple for the spiritual soul, and a different but equally real version of that body in Heaven when we are reunited with God. 2 Corinthians 5:3 says that we will have “</span></span><span data-dcnode-id="1152" style="font-weight: 400;"><span data-dcnode-id="1153" instrument_node="">an eternal body made for us by God himself and not by human hands… We will not be spirits without bodies.” </span></span><span data-dcnode-id="1150" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node="">Life in the kingdom will be bodily, so instead of telling his readers to practice living apart from the body, Paul exhorts them to dedicate their bodies to God. And it is hard to ignore the deeply dualist language of Genesis 2:7, in which God creates man by breathing His spirit into the dust of the earth. A human’s equation is part Creator-breathed soul and part Creator-built body, two integrated but not indistinguishable components.</span></span></p><p data-dcnode-id="1146"><span data-dcnode-id="1147" style="font-weight: 400;"><span data-dcnode-id="1148" instrument_node="">Of those who affirm this belief, there are two main camps:</span></span></p><p data-dcnode-id="1140"><i data-dcnode-id="1143"><span data-dcnode-id="1144" style="font-weight: 400;"><span data-dcnode-id="1145" instrument_node="">Substance dualists</span></span></i><span data-dcnode-id="1141" style="font-weight: 400;"><span data-dcnode-id="1142" instrument_node="">, also dubbed Augustinian dualists because of the 4th century theologian who championed their cause, see the body as distinct entities that combine to form a whole person. Plato, John Calvin, and Rene Descartes also promoted substance dualism. </span></span></p><p data-dcnode-id="1132"><span data-dcnode-id="1138" style="font-weight: 400;"><span data-dcnode-id="1139" instrument_node="">The other camp, in support of </span></span><i data-dcnode-id="1135"><span data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" instrument_node="">soul-matter dualism</span></span></i><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">, holds that we are made up of substantial souls that, combined with skin and bones, constitute a human being. Aristotle, Thomas Aquinas, and the majority of the Catholic Church fall inside this subsection of holistic dualism, emphasizing that a human is not two substances but one being, made up of part soul and part matter. </span></span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" style="font-weight: 400;"><span data-dcnode-id="1131" instrument_node="">It is difficult to draw lines between the beliefs of substance and soul-matter dualists. Most crucial to keep in mind is the all-encompassing umbrella statement to which all holistic dualists would nod their head in agreement: body and soul are distinct, and with God’s aid, the soul exists temporarily unembodied in death.</span></span></p><h1 data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">MONISM</span></h1><p data-dcnode-id="1114"><span data-dcnode-id="1125" style="font-weight: 400;"><span data-dcnode-id="1126" instrument_node="">The diametrically opposing view to holistic dualism is Monism. </span></span><i data-dcnode-id="1122"><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">Monismus </span></span></i><span data-dcnode-id="1120" style="font-weight: 400;"><span data-dcnode-id="1121" instrument_node="">means “single” in Latin and is the word from which 18th century theologians derived the term </span></span><i data-dcnode-id="1117"><span data-dcnode-id="1118" style="font-weight: 400;"><span data-dcnode-id="1119" instrument_node="">monism </span></span></i><span data-dcnode-id="1115" style="font-weight: 400;"><span data-dcnode-id="1116" instrument_node="">to finally label a sect of Christians that had existed unnamed for centuries. While most theologians ascribe to holistic dualism, many great political philosophers believe that monism is more accurate to reality. To name a few, the famous thinkers Karl Marx, Friedrich Engels, and Georg Hegel were all monists. Paul Tillich, who was a prominent theologian and existentialist thinker in the 20th century, also championed this view.</span></span></p><p data-dcnode-id="1107"><b data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">In direct contradiction to holistic dualism, this theory posits that the human is composed of one substance only.</span></b><span data-dcnode-id="1110" style="font-weight: 400;"><span data-dcnode-id="1111" instrument_node=""> Any trace of body and soul distinctions, which are parsed out by holistic dualism, is simply acknowledged as fluctuating personalities or characteristics of the single substance. There is one reality for monists, that is, there is only one existing substance within human beings that cannot be separated into different entities. </span></span><b data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">It is impossible, in this view, to distinguish between the body and the soul.</span></b></p><p data-dcnode-id="1100"><b data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Death is powerless to change this reality, which leaves monists with many different theories about life after death.</span></b><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node=""> Most monists posit a theory similar to the pantheistic idea of reincarnation: that a human being, upon dying, immediately reappears in a different place and time. </span></span><b data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">The reincarnation that monists believe in is the reappearance of a human that looks, sounds, and acts similarly to how they did before dying. Until Jesus returns, you and I would keep reincarnating as very similar versions of ourselves, but in different places and historical periods than where we were in the last life.</span></b></p><p data-dcnode-id="1097"><span data-dcnode-id="1098" style="font-weight: 400;"><span data-dcnode-id="1099" instrument_node="">Since bodies and souls cannot separate, they go together in death, life, and everywhere in between. Believing in reincarnation upholds that singularity of body and soul that monists promote. If death takes a being’s body, it takes its soul, too. So, until Jesus returns, monists believe that our beings will continue that cycle of death and immediate reappearance. Before scoffing at a monist’s view of death and embodiment, John 2:19 warrants a re-reading. Jesus says, “Destroy this temple, and I will raise it again in three days.” His vague answer to the Jews’ challenge of his authority lends itself to both monist and dualist perspectives. Perhaps He meant that God will sustain his spirit bodiless for three days, but it is not outrageous to consider that Jesus implied the kind of reincarnation in which monists believe.</span></span></p><h1 data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">NON-REDUCTIVE PHYSICALISTS</span></h1><p data-dcnode-id="1075"><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">Within the last ten years, in an attempt to marry modern neuroscientific discoveries and ancient theological beliefs, a group of thinkers have emerged, calling themselves </span></span><i data-dcnode-id="1090"><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node="">non-reductive physicalists. </span></span></i><span data-dcnode-id="1088" style="font-weight: 400;"><span data-dcnode-id="1089" instrument_node="">Non-reductive physicalists argue for the brain as the soul’s origin. Because of that authority they give to the brain, which is a physical, material part of the body, these theorists conclude that a </span></span><i data-dcnode-id="1085"><span data-dcnode-id="1086" style="font-weight: 400;"><span data-dcnode-id="1087" instrument_node="">disembodied intermediate state</span></span></i><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node=""> would be unrealistic. In their view, there is no way for the brain to be separated from the soul after the death since it is the soul’s origin and generator. </span></span><b data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Consequently, our bodies and souls are either immediately resurrected after death or our bodies and souls “sleep” at death, waiting for the second coming when God will awake them in recreation. </span></b><span data-dcnode-id="1079" style="font-weight: 400;"><span data-dcnode-id="1080" instrument_node="">Regardless of which side you land on, the body and soul are a package deal in the theory of non-reductive physicalism</span></span><i data-dcnode-id="1076"><span data-dcnode-id="1077" style="font-weight: 400;"><span data-dcnode-id="1078" instrument_node="">.</span></span></i></p><p data-dcnode-id="1072"><span data-dcnode-id="1073" style="font-weight: 400;"><span data-dcnode-id="1074" instrument_node="">Research in neuroscience attributes progressively more autonomy to the brain with each new discovery, so they use this as reason to believe that the development of our souls and spirits mirrors that of our brains. The theory actually credits the human brain with generating personality, soul, and mind. Their anthem is the homogeneity between Scripture and science; but they do tread this middle ground lightly, admitting to the limits of science and the imperfections of their developing theory. This group of both theologians and scientists is attempting to bridge the gap that many modern thinkers point to as proof that there is no God.</span></span></p><h1 data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">EMERGENTISM</span></h1><p data-dcnode-id="1050"><span data-dcnode-id="1068" style="font-weight: 400;"><span data-dcnode-id="1069" instrument_node="">This philosophy was spearheaded by 19th and 20th century Christians, who drew much inspiration from contemporary theorists and their speculations about the soul’s evolutionary development. There are lots of similarities between </span></span><i data-dcnode-id="1065"><span data-dcnode-id="1066" style="font-weight: 400;"><span data-dcnode-id="1067" instrument_node="">emergentism </span></span></i><span data-dcnode-id="1063" style="font-weight: 400;"><span data-dcnode-id="1064" instrument_node="">and </span></span><i data-dcnode-id="1060"><span data-dcnode-id="1061" style="font-weight: 400;"><span data-dcnode-id="1062" instrument_node="">non-reductive physicalism</span></span></i><span data-dcnode-id="1058" style="font-weight: 400;"><span data-dcnode-id="1059" instrument_node="">. Both parties support that the soul gradually emerges from the physical brain during development. But </span></span><i data-dcnode-id="1055"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node="">emergentists</span></span></i><span data-dcnode-id="1053" style="font-weight: 400;"><span data-dcnode-id="1054" instrument_node=""> would be quick to defend the part of their philosophy that affirms holistic dualism. Namely, that the soul is distinct from the body and can develop its own characteristics apart from the brain. They see the relationship between soul and body as reciprocal: soul affects the brain, just as the brain affects the soul. </span></span><b data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Basically, emergentism wants to fuse together holistic dualism and non-reductive physicalism, agreeing that brain and soul are ultimately distinct, but deeply tied and connected.</span></b></p><p data-dcnode-id="1036"><span data-dcnode-id="1048" style="font-weight: 400;"><span data-dcnode-id="1049" instrument_node="">Remember: non-reductive physicalists believe that body and soul stick together after death, whether that means immediately dying or immediately resurrecting. Emergentists think about it differently. </span></span><b data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">They believe that the brain is not the only reason the soul is the way it is, so the two may be able to be separated in a disembodied intermediate state (like dualists believe).</span></b><span data-dcnode-id="1044" style="font-weight: 400;"><span data-dcnode-id="1045" instrument_node=""> But </span></span><i data-dcnode-id="1041"><span data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" instrument_node="">emergentists</span></span></i><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node=""> are split down the middle on the topic. Some would argue that, since they believe that soul and body are distinct, the soul has independence from the brain’s power to create, nurture, and sustain it. Then, the disembodied intermediate state would be realistic. But others argue that the soul, though not completely dependent on the brain, still would not be able to exist apart from the material body. </span></span><b data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">After all, for emergentists, the brain is still a major player in the soul’s development.</span></b></p><p data-dcnode-id="1030"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">Both non-reductive physicalism and emergentism are rooted in 1 Corinthians 15. Paul writes in verses 44-46, “If there is a natural body, there is also a spiritual body.</span></span><span data-dcnode-id="1033" instrument_node=""> </span><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1032" instrument_node="">So it is written: ‘The first man Adam became a living being’; the last Adam, a life-giving spirit. The spiritual did not come first, but the natural, and after that the spiritual.” This last sentence crystallizes what both parties emphasize in their theologies: first came natural, then came spiritual. They would argue it is a fairly direct affirmation of the body’s responsibility for the soul’s evolution. Paul gives a lot of agency to the physical here, and seems to, like emergentists and physicalists, credit our brains with being a kind of control center for the soul.</span></span></p><h1 data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">CONCLUSION</span></h1><p data-dcnode-id="1025"><span data-dcnode-id="1026" style="font-weight: 400;"><span data-dcnode-id="1027" instrument_node="">To say Christian theology is born from the combination of church tradition and the study of Scripture would be the technical truth, but an oversimplification of it. None of the theories or doctrines listed above have perfectly solved the body-soul problem, and none are sufficiently able to untangle God’s good ultimate plan for His creation from the tragedy of death. As finite and mistake-prone people in pursuit of a perfect and eternally present God, we will never fully understand that mystery. Still, each serves to broaden our minds, spark curiosity and conversation, and refocus our sight on God’s riddling grandeur. </span></span></p><p data-dcnode-id="1022"><span data-dcnode-id="1023" style="font-weight: 400;"><span data-dcnode-id="1024" instrument_node="">In all of these beliefs, there is a common thread of hope in life after death and confidence in God’s determination to not let death conquer His creation. Conversations about these theories will not necessarily find definite answers or across-the-board agreement, but they still important to have, even if only as reminders of that common confidence and hope woven throughout Christian traditions.</span></span></p><h1 data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">SOURCES</span></h1><p data-dcnode-id="1017"><span data-dcnode-id="1018" style="font-weight: 400;"><span data-dcnode-id="1019" instrument_node="">“Raised a Spiritual Body: bodily resurrection according to Paul” by Margaret Pamment</span></span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-weight: 400;"><span data-dcnode-id="1016" instrument_node="">“Why All the Fuss about the Body? A Medievalist’s Perspective” by Caroline Bynum</span></span></p><p data-dcnode-id="1011"><span data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node="">“Diseased Bodies, Defiled Souls: Corporality and Religious Difference in the Reformation” by Charles H. Parker</span></span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node="">“The Current Body-Soul Debate: A Case for Dualistic Holism” by John W. Cooper</span></span></p><p data-dcnode-id="1002"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">About the Author</span></strong><span data-dcnode-id="1005" instrument_node="">: </span><em data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Delaney Young lives in Chicago. She is studying English writing at Wheaton College with a focus on creative storytelling.</span></em></p></div><div class="fusion-clearfix" data-dcnode-id="1000"></div></div></div></div></div><div class="heateor_sss_sharing_container heateor_sss_vertical_sharing heateor_sss_bottom_sharing" data-dcnode-id="943" heateor-sss-data-href="https://theologyimpact.com/solving-the-body-soul-problem/" style="width:44px;left: 25px;top: 100px;-webkit-box-shadow:none;box-shadow:none;"><ul class="heateor_sss_sharing_ul" data-dcnode-id="946"><li class="heateorSssSharingRound" data-dcnode-id="988"><ss class="heateor_sss_square_count" data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">&nbsp;</span></ss><i class="heateorSssSharing heateorSssTCBackground" data-dcnode-id="989" style="width:40px;height:40px;border-radius:999px;margin-bottom:9px !important;visibility:visible;" title="Total Shares"><div class="heateorSssTotalShareCount" data-dcnode-id="992" style="font-size: 24.8px"><span data-dcnode-id="993" instrument_node="">7</span></div><div class="heateorSssTotalShareText" data-dcnode-id="990" style="font-size: 15.2px"><span data-dcnode-id="991" instrument_node="">Shares</span></div></i></li><li class="h
