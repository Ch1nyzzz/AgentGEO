</span><meta content="Working memory capacity (WMC) is important for many cognitive processes including problem solving. This chapter compiles the current literature regard…" data-dcnode-id="10841" property="og:description"><span data-dcnode-id="10840" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id5&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id6&quot;><p id=&quot;spar0005&quot;>Working memory capacity (WMC) is important for many cognitive processes including problem solving. This chapter compiles the current literature regarding WMC and problem solving, and discusses the various ways in which WMC can help and hinder people as they go about solving problems of varying types. In particular, three types of problem solving are examined: mathematical problem solving, problem solving as it relates to the Raven Progressive Matrices (RPM), and creative problem solving. One of the main benefits across both math and RPM problem solving seems to be that WMC helps solvers to focus their attention, resist distraction, or narrow their search through a problem space. Conversely, several lines of evidence are now showing that too much focus can actually harm performance on creative or insightful problem-solving tasks. It is suggested that in order to account for the differing relationships between WMC and different types of problem solving, a dual-process, analytical/insightful model of problem solving is required.</p></div></div></div>" data-dcnode-id="10839" lang="en" name="citation_abstract"><span data-dcnode-id="10838" instrument_node="">

r" data-dcnode-id="10202" id="social-popover"><div data-dcnode-id="10203" id="popover-trigger-social-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="10204" type="button"><svg class="icon icon-share" data-dcnode-id="10207" focusable="false" height="16" viewBox="0 0 128 128" width="16"><path d="m9e1 112c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm-66-36c-6.62 0-12-5.38-12-12s5.38-12 12-12 12 5.38 12 12-5.38 12-12 12zm66-6e1c6.62 0 12 5.38 12 12s-5.38 12-12 12-12-5.38-12-12 5.38-12 12-12zm0 62c-6.56 0-12.44 2.9-16.48 7.48l-28.42-15.28c0.58-1.98 0.9-4.04 0.9-6.2s-0.32-4.22-0.9-6.2l28.42-15.28c4.04 4.58 9.92 7.48 16.48 7.48 12.14 0 22-9.86 22-22s-9.86-22-22-22-22 9.86-22 22c0 1.98 0.28 3.9 0.78 5.72l-28.64 15.38c-4.02-4.34-9.76-7.1-16.14-7.1-12.14 0-22 9.86-22 22s9.86 22 22 22c6.38 0 12.12-2.76 16.14-7.12l28.64 15.38c-0.5 1.84-0.78 3.76-0.78 5.74 0 12.14 9.86 22 22 22s22-9.86 22-22-9.86-22-22-22z" data-dcnode-id="10208"></path></svg><span class="button-text" data-dcnode-id="10205"><span data-dcnode-id="10206" instrument_node="">Share</span></span></button></div></div></div><div class="ExportCitation u-display-inline-block" data-dcnode-id="10193" id="export-citation"><div class="popover export-citation-popover" data-dcnode-id="10194" id="export-citation-popover"><div data-dcnode-id="10195" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="10196" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="10199" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="10200" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="10197"><span data-dcnode-id="10198" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="10186" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="10189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/B978-0-12-394393-4.00006-6" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="10190" instrument_node="">https://doi.org/10.1016/B978-0-12-394393-4.00006-6</span></a><a class="rights-and-content" data-dcnode-id="10187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DB9780123943934000066%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="10188" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="10185"></section><section class="ReferencedArticles" data-dcnode-id="10184"></section><div class="PageDivider" data-dcnode-id="10183"></div><div class="Abstracts u-font-serif" data-dcnode-id="10166" id="abstracts"><div class="abstract author" data-dcnode-id="10167" id="aep-abstract-id5"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10181"><span data-dcnode-id="10182" instrument_node="">Abstract</span></h2><div data-dcnode-id="10168" id="aep-abstract-sec-id6"><p data-dcnode-id="10169" id="spar0005"><span data-dcnode-id="10173"><a class="topic-link" data-dcnode-id="10179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/working-memory-capacity" title="Learn more about Working Memory Capacity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10180" instrument_node="">Working memory capacity</span></a><span data-dcnode-id="10174"><span data-dcnode-id="10178" instrument_node=""> (WMC) is important for many cognitive processes including problem solving. This chapter compiles the current literature regarding WMC and problem solving, and discusses the various ways in which WMC can help and hinder people as they go about solving problems of varying types. In particular, three types of problem solving are examined: </span><a class="topic-link" data-dcnode-id="10176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/mathematical-problem" title="Learn more about Mathematical Problem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10177" instrument_node="">mathematical problem</span></a><span data-dcnode-id="10175" instrument_node=""> solving, problem solving as it relates to the </span></span></span><a class="topic-link" data-dcnode-id="10171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/ravens-progressive-matrices" title="Learn more about Raven's Progressive Matrices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10172" instrument_node="">Raven Progressive Matrices</span></a><span data-dcnode-id="10170" instrument_node=""> (RPM), and creative problem solving. One of the main benefits across both math and RPM problem solving seems to be that WMC helps solvers to focus their attention, resist distraction, or narrow their search through a problem space. Conversely, several lines of evidence are now showing that too much focus can actually harm performance on creative or insightful problem-solving tasks. It is suggested that in order to account for the differing relationships between WMC and different types of problem solving, a dual-process, analytical/insightful model of problem solving is required.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="10143" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="10155"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780123943934000054"><svg class="icon icon-navigate-left" data-dcnode-id="10164" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="10165"></path></svg><span class="button-alternative-text" data-dcnode-id="10157"><strong data-dcnode-id="10162"><span data-dcnode-id="10163" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="10160"><span data-dcnode-id="10161" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="10158"><span data-dcnode-id="10159" instrument_node=""> in volume</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="10144"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780123943934000078"><span class="button-alternative-text" data-dcnode-id="10148"><strong data-dcnode-id="10153"><span data-dcnode-id="10154" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="10151"><span data-dcnode-id="10152" instrument_node="">chapter</span></span><span class="extra-detail-2" data-dcnode-id="10149"><span data-dcnode-id="10150" instrument_node=""> in volume</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="10146" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="10147"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="10121"><div class="keywords-section" data-dcnode-id="10122" id="aep-keywords-id7"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10141"><span data-dcnode-id="10142" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="10138"><span data-dcnode-id="10139"><span data-dcnode-id="10140" instrument_node="">Analogy</span></span></div><div class="keyword" data-dcnode-id="10135"><span data-dcnode-id="10136"><span data-dcnode-id="10137" instrument_node="">Cognitive</span></span></div><div class="keyword" data-dcnode-id="10132"><span data-dcnode-id="10133"><span data-dcnode-id="10134" instrument_node="">Interference</span></span></div><div class="keyword" data-dcnode-id="10129"><span data-dcnode-id="10130"><span data-dcnode-id="10131" instrument_node="">Long-term memory</span></span></div><div class="keyword" data-dcnode-id="10126"><span data-dcnode-id="10127"><span data-dcnode-id="10128" instrument_node="">Paradigm</span></span></div><div class="keyword" data-dcnode-id="10123"><span data-dcnode-id="10124"><span data-dcnode-id="10125" instrument_node="">Problem solving</span></span></div></div></div><span data-dcnode-id="10120" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="8904" id="body"><div data-dcnode-id="8910"><section data-dcnode-id="10066" id="sec0005"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10116"><span data-dcnode-id="10119" instrument_node="">1</span><span data-dcnode-id="10118" instrument_node="">. </span><span data-dcnode-id="10117" instrument_node="">Introduction</span></h2><p data-dcnode-id="10111" id="par0005"><span data-dcnode-id="10115" instrument_node="">Problem solving is a higher-order cognitive process that usually relies on many subprocesses to be successful. On the face of it, it seems patently obvious that working memory should be important for successful problem solving. However, there are many different kinds of problem solving that rely more or less on many different kinds of processes. Not all of these processes may rely on working memory in the same way. In this review, we consider several ways of studying the contributions of working memory to problem solving, with a particular focus on how individual differences in </span><a class="topic-link" data-dcnode-id="10113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/working-memory-capacity" title="Learn more about Working Memory Capacity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10114" instrument_node="">working memory capacity</span></a><span data-dcnode-id="10112" instrument_node=""> (WMC) affect performance.</span></p><p data-dcnode-id="10098" id="par0010"><span data-dcnode-id="10106"><span data-dcnode-id="10110" instrument_node="">In much of the work on </span><a class="topic-link" data-dcnode-id="10108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/mathematical-problem" title="Learn more about Mathematical Problem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10109" instrument_node="">mathematical problem</span></a><span data-dcnode-id="10107" instrument_node=""> solving, working memory refers to the functioning of the multiple component system proposed by </span></span><a class="workspace-trigger" data-dcnode-id="10104" href="#bib0845" name="bbib0845"><span data-dcnode-id="10105" instrument_node="">Baddeley and Hitch (1974)</span></a><span data-dcnode-id="10099"><span data-dcnode-id="10103" instrument_node="">. This model defines working memory as the mental workspace used for short-term storage and manipulation of information required for diverse cognitive tasks. The working memory system was initially described as having three main subsystems: the visuospatial sketch pad for holding and manipulating visual-spatial information; the phonological loop for maintaining and rehearsing verbal information; and the central executive that is an </span><a class="topic-link" data-dcnode-id="10101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/attentional-control" title="Learn more about Attentional Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10102" instrument_node="">attentional control</span></a><span data-dcnode-id="10100" instrument_node=""> system involved in the coordination of performance on separate tasks, including selective attention, retrieval from long-term memory (LTM), set shifting, and inhibition. A common question in the mathematical-problem-solving literature has been determining which theoretical components of the working memory system relate to math performance. This tradition has largely used selective interference/dual-task paradigms, and investigations of selective deficits in groups diagnosed with specific disabilities, as a means to support the existence and independence of the different components of the working memory system.</span></span></p><p data-dcnode-id="10084" id="par0015"><span data-dcnode-id="10097" instrument_node="">A second way of studying the contributions of working memory to problem-solving performance is by considering the effects of individual differences in WMC. In this approach, WMC is generally considered as a trait of an individual in relation to their ability to engage and use their working memory system. Complex span tasks are explicitly designed to assess the functioning of the central executive; that is, they test for the maintenance of information in immediate memory in the face of an ongoing processing task (</span><a class="workspace-trigger" data-dcnode-id="10095" href="#bib0975" name="bbib0975"><span data-dcnode-id="10096" instrument_node="">Daneman and Carpenter, 1980</span></a><span data-dcnode-id="10094" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10092" href="#bib0240" name="bbib0240"><span data-dcnode-id="10093" instrument_node="">Engle, 2002</span></a><span data-dcnode-id="10091" instrument_node="">). As opposed to simple span tasks that do not involve a simultaneous processing component, all complex span tasks involve both a memory storage component and a processing component. While simple memory tasks without an additional processing task are considered to assess short-term memory (STM) or the capacity of the buffers in the working memory system, the presence of the processing task in complex span tasks renders it a measure of the central executive system, or the ability to allocate or control one's attention. Most modern versions of complex span tasks are based on the reading span task originally developed by </span><a class="workspace-trigger" data-dcnode-id="10089" href="#bib0975" name="bbib0975"><span data-dcnode-id="10090" instrument_node="">Daneman and Carpenter (1980)</span></a><span data-dcnode-id="10088" instrument_node="">, extending into many different processing domains other than just reading (</span><a class="workspace-trigger" data-dcnode-id="10086" href="#bib0955" name="bbib0955"><span data-dcnode-id="10087" instrument_node="">Conway, Kane, Bunting, Hambrick, Wilhelm, &amp; Engle, 2005</span></a><span data-dcnode-id="10085" instrument_node="">). Using these complex span tasks, individual differences in WMC can be correlated with differences in particular problem-solving performances or processes.</span></p><p data-dcnode-id="10072" id="par0020"><span data-dcnode-id="10083" instrument_node="">The individual differences approach has become more popular over the last 20 years largely driven by the development and advances in complex span tasks to tap this construct, as well as increasing interest in the role of executive functioning and attentional control on specific cognitive tasks (</span><a class="workspace-trigger" data-dcnode-id="10081" href="#bib0240" name="bbib0240"><span data-dcnode-id="10082" instrument_node="">Engle, 2002</span></a><span data-dcnode-id="10080" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10078" href="#bib0560" name="bbib0560"><span data-dcnode-id="10079" instrument_node="">Oberauer, 2009</span></a><span data-dcnode-id="10073"><span data-dcnode-id="10077" instrument_node="">). Yet, the relation of these individual differences to problem-solving performance, especially in terms of mechanisms that are affected, is not yet clear. “Better” performance on complex span tasks, or superior WMC, has generally been found to relate positively to performance on many other cognitive tasks. However, one of the main points of this review is to identify instances in which superior WMC may actually impede progress in problem solving. Although problem solving is in general a complex act of </span><a class="topic-link" data-dcnode-id="10075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/higher-order-cognition" title="Learn more about Higher Order Cognition from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10076" instrument_node="">higher-order cognition</span></a><span data-dcnode-id="10074" instrument_node=""> that relies on the combination of several component behaviors, only some of these may be helped by greater WMC. To foreshadow the results of our review, we find that many of the benefits of greater WMC on problem-solving performance relate to the ability to focus attention and resist distraction. Superior executive functions generally support more successful analytic problem solving. However, several lines of evidence are now showing that creative problem solving does not rely on these same executive functions. Too much focus, too much persistence on an initial approach, and a lack of sensitivity to peripheral cues can actually harm performance on creative problem-solving tasks.</span></span></p><p data-dcnode-id="10067" id="par0025"><span data-dcnode-id="10071" instrument_node="">There are three main literatures that have explored the role of the working memory system and WMC in problem-solving performance: mathematical problem solving, </span><a class="topic-link" data-dcnode-id="10069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/ravens-progressive-matrices" title="Learn more about Raven's Progressive Matrices from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10070" instrument_node="">Raven's progressive matrix</span></a><span data-dcnode-id="10068" instrument_node=""> (RPM) problem solving, and creative problem solving. In this review, we will discuss the findings from all three literatures with the goal of delineating how individual differences in WMC may affect problem-solving processes. To begin, we first outline a model of problem solving that can be applied to the three different classes of problem solving. Then, we can consider how WMC may influence different component problem-solving behaviors for each problem type. We end with a summary of themes that cross the literatures and their implications for models of problem solving.</span></p></section><section data-dcnode-id="10026" id="sec0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10062"><span data-dcnode-id="10065" instrument_node="">2</span><span data-dcnode-id="10064" instrument_node="">. </span><span data-dcnode-id="10063" instrument_node="">A Basic Outline of a Model of the Problem-Solving Process</span></h2><div data-dcnode-id="10029"><p data-dcnode-id="10048" id="par0030"><span data-dcnode-id="10061" instrument_node="">At their most basic level, traditional models of problem solving based in the information processing tradition divide processing into two stages, a representation phase and a solution phase (</span><a class="workspace-trigger" data-dcnode-id="10059" href="#bib0555" name="bbib0555"><span data-dcnode-id="10060" instrument_node="">Newell &amp; Simon, 1972</span></a><span data-dcnode-id="10058" instrument_node="">). Yet, the processing within these stages can be further articulated as shown in </span><a class="workspace-trigger" data-dcnode-id="10056" href="#fig0005" name="bfig0005"><span data-dcnode-id="10057" instrument_node="">Figure 1</span></a><span data-dcnode-id="10055" instrument_node="">. The representation phase is important for laying the groundwork for solution by identifying the givens and goals, the important elements in the problem statement, the operators that can be used, and the possible constraints that may be imposed on the solution space. The representation of the problem may also involve translation among propositions, symbols, and diagrams. Thus, there are a number of processes involved as a solver develops a problem representation by interpreting the problem statement that is posed to them. Experts and more skilled problem solvers tend to engage in representation to a greater extent than novices, and this allows them to engage in more forward solution processes (</span><a class="workspace-trigger" data-dcnode-id="10053" href="#bib0935" name="bbib0935"><span data-dcnode-id="10054" instrument_node="">Chi et al., 1988</span></a><span data-dcnode-id="10052" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10050" href="#bib0755" name="bbib0755"><span data-dcnode-id="10051" instrument_node="">Wagner et al., 2004</span></a><span data-dcnode-id="10049" instrument_node="">). Yet, even if they do not elaborate on it much, novices still must represent a problem minimally before proceeding to solution.</span></p><figure class="figure text-xs" data-dcnode-id="10030" id="fig0005"><span data-dcnode-id="10038"><img alt="" data-dcnode-id="10047" height="363" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-B9780123943934000066-gr1.jpg&amp;raw"><span data-dcnode-id="10046" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="10039"><li data-dcnode-id="10040"><a class="anchor download-link u-font-sans" data-dcnode-id="10041" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-B9780123943934000066-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="10042"><span data-dcnode-id="10045" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="10043"><span data-dcnode-id="10044" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="10031"><span data-dcnode-id="10032"><p data-dcnode-id="10033" id="spar0010"><span class="label" data-dcnode-id="10036"><span data-dcnode-id="10037" instrument_node="">Figure 1</span></span><span data-dcnode-id="10035" instrument_node="">. </span><span data-dcnode-id="10034" instrument_node="">An overview of basic problem-solving processes and different responses to failure. (For color version of this figure, the reader is referred to the web version of this book.)</span></p></span></span></figure></div><p data-dcnode-id="10027" id="par0035"><span data-dcnode-id="10028" instrument_node="">Once finished forming a problem representation, no matter how rudimentary, the problem solver then proceeds to a solution phase. Again, there are many processes that can be applied within this phase. Solvers use the problem representation to activate elements of LTM that may serve as the solution space. This enables a search for relevant problem-solving schemas, algorithms, strategies, potential analogs, or candidate solutions. Following activation, there may be a selection process where the solver needs to choose a promising schema, analogy, strategy, algorithm, solution or solution path to apply. Once selected, for some kinds of problem solving, some strategies and algorithms involve executing sequences of operations or computations. These processes can involve keeping track of multiple goals or steps in a solution process. They may involve storing and retrieving intermediate products or states. They may require maintaining a representation in memory while engaging in mental transformations or comparisons among the problem elements. Finally, once a solution path is chosen or executed, there must be an evaluation phase where the solver assesses whether the goal has been reached. In the face of failure or impasse, the solver can choose to either give up on the problem or persevere. If they choose to persevere, they can “backtrack” in the solution space—selecting other options from among the candidates they activated—or take the more drastic action of returning to the representation phase and re-representing the problem via questioning their interpretations and assumptions.</span></p></section><section data-dcnode-id="9564" id="sec0015"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10022"><span data-dcnode-id="10025" instrument_node="">3</span><span data-dcnode-id="10024" instrument_node="">. </span><span data-dcnode-id="10023" instrument_node="">Mathematical Problem Solving</span></h2><p data-dcnode-id="10005" id="par0040"><span data-dcnode-id="10021" instrument_node="">Perhaps the most extensive literature on the relation of working memory to problem solving resides in the area of math cognition. </span><a class="workspace-trigger" data-dcnode-id="10019" href="#bib0340" name="bbib0340"><span data-dcnode-id="10020" instrument_node="">Hitch (1978)</span></a><span data-dcnode-id="10010"><span data-dcnode-id="10014"><span data-dcnode-id="10018" instrument_node=""> is generally cited as the first to outline the contribution of the working memory system to </span><a class="topic-link" data-dcnode-id="10016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/mathematical-problem" title="Learn more about Mathematical Problem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10017" instrument_node="">mathematical problem</span></a><span data-dcnode-id="10015" instrument_node=""> solving as he attempted to understand the processes that people use while performing </span></span><a class="topic-link" data-dcnode-id="10012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/mental-arithmetic" title="Learn more about Mental Arithmetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10013" instrument_node="">mental arithmetic</span></a><span data-dcnode-id="10011" instrument_node="">. To examine this, multidigit arithmetic problems such as 325</span></span><span data-dcnode-id="10009" instrument_node="">&nbsp;</span><span data-dcnode-id="10008" instrument_node="">+</span><span data-dcnode-id="10007" instrument_node="">&nbsp;</span><span data-dcnode-id="10006" instrument_node="">46 were presented out loud to participants. In an initial study, he asked for self-reports of solution strategies. All subjects reported mentally breaking the solution into stages and executing the stages in a sequence. Other studies examined the impact of delaying the output of partial results and the effect of additional intervening calculation stages on accuracy and forgetting of both partial results as well as the initial problem information. Hitch's analysis showed that mental arithmetic requires the temporary storage of initial information and partial results including the parts in carry operations. He also noted that mental arithmetic requires the retrieval of information from LTM. A third observation is that mental arithmetic depends on the use of a variety of calculation strategies that determine solution sequences. These themes continue into present day. Although this initial study did not examine individual differences in WMC in relation to math performance, it provided the theoretical groundwork explicating that the execution of computational processes underlying mental arithmetic may depend on the working memory system.</span></p><section data-dcnode-id="9913" id="sec0020"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10001"><span data-dcnode-id="10004" instrument_node="">3.1</span><span data-dcnode-id="10003" instrument_node="">. </span><span data-dcnode-id="10002" instrument_node="">Correlations between WMC and Math Performance</span></h3><p data-dcnode-id="9975" id="par0045"><span data-dcnode-id="10000" instrument_node="">Since Hitch's (1978) early article on multistep arithmetic problem solving, the relation of WMC to mathematical performance more generally has been well documented. There are now a substantial number of studies that demonstrate the correlation between complex span measures and math performance. For example, many studies have shown a positive relation between complex span scores and math achievement as measured by school grades (</span><a class="workspace-trigger" data-dcnode-id="9998" href="#bib0440" name="bbib0440"><span data-dcnode-id="9999" instrument_node="">Lehto, 1995</span></a><span data-dcnode-id="9997" instrument_node="">) or standardized tests of math achievement (</span><a class="workspace-trigger" data-dcnode-id="9995" href="#bib0885" name="bbib0885"><span data-dcnode-id="9996" instrument_node="">Bull et al., 2008</span></a><span data-dcnode-id="9994" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9992" href="#bib0945" name="bbib0945"><span data-dcnode-id="9993" instrument_node="">Clair-Thompson and Gathercole, 2006</span></a><span data-dcnode-id="9991" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9989" href="#bib0380" name="bbib0380"><span data-dcnode-id="9990" instrument_node="">Jurden, 1995</span></a><span data-dcnode-id="9988" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9986" href="#bib0595" name="bbib0595"><span data-dcnode-id="9987" instrument_node="">Passolunghi et al., 2007</span></a><span data-dcnode-id="9985" instrument_node="">), with the correlations generally ranging from 0.3 to 0.5. Of course, school performance and standardized tests may measure more than just problem-solving ability, but one might assume that the ability to solve math problems is a large contributor to these outcomes. Other studies have targeted math problem-solving performance a bit more directly. </span><a class="workspace-trigger" data-dcnode-id="9983" href="#bib0425" name="bbib0425"><span data-dcnode-id="9984" instrument_node="">Kyllonen and Christal (1990)</span></a><span data-dcnode-id="9982" instrument_node=""> demonstrated a strong relation of performance on working memory tasks with “reasoning ability” (</span><em data-dcnode-id="9980"><span data-dcnode-id="9981" instrument_node="">r</span></em><span data-dcnode-id="9979" instrument_node="">&nbsp;</span><span data-dcnode-id="9978" instrument_node="">=</span><span data-dcnode-id="9977" instrument_node="">&nbsp;</span><span data-dcnode-id="9976" instrument_node="">0.82), where the reasoning construct was really the ability to solve word problems and algebra equations, along with a third math construct, knowledge of math operations.</span></p><p data-dcnode-id="9943" id="par0050"><span data-dcnode-id="9974" instrument_node="">The math cognition literature has concerned itself to a large extent with studies on which parts of the working memory system (which buffers, which executive functions) predict generalized measures of math performance. Early on, many of the correlations between WMC and math performance were found particularly with complex span tasks involving numbers (i.e. backwards digit span, counting span) suggesting a domain-specific relationship, but this is no longer the case and the relation of math performance to non-numerical complex span tasks has now been established (</span><a class="workspace-trigger" data-dcnode-id="9972" href="#bib0885" name="bbib0885"><span data-dcnode-id="9973" instrument_node="">Bull et al., 2008</span></a><span data-dcnode-id="9971" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9969" href="#bib0945" name="bbib0945"><span data-dcnode-id="9970" instrument_node="">Clair-Thompson and Gathercole, 2006</span></a><span data-dcnode-id="9968" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9966" href="#bib0350" name="bbib0350"><span data-dcnode-id="9967" instrument_node="">Holmes and Adams, 2006</span></a><span data-dcnode-id="9965" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9963" href="#bib0380" name="bbib0380"><span data-dcnode-id="9964" instrument_node="">Jurden, 1995</span></a><span data-dcnode-id="9962" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9960" href="#bib0595" name="bbib0595"><span data-dcnode-id="9961" instrument_node="">Passolunghi et al., 2007</span></a><span data-dcnode-id="9959" instrument_node="">). For the present purposes, what seems most important is the largely consistent finding that WMC contributes independently over and above any contribution of STM (</span><a class="workspace-trigger" data-dcnode-id="9957" href="#bib0305" name="bbib0305"><span data-dcnode-id="9958" instrument_node="">Geary et al., 1999</span></a><span data-dcnode-id="9956" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9954" href="#bib0590" name="bbib0590"><span data-dcnode-id="9955" instrument_node="">Passolunghi and Siegel, 2004</span></a><span data-dcnode-id="9953" instrument_node="">). Similarly, studies have included other covariates such as IQ and processing speed. WMC has generally been found to predict math performance even after these factors are considered (</span><a class="workspace-trigger" data-dcnode-id="9951" href="#bib0305" name="bbib0305"><span data-dcnode-id="9952" instrument_node="">Geary et al., 1999</span></a><span data-dcnode-id="9950" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9948" href="#bib0635" name="bbib0635"><span data-dcnode-id="9949" instrument_node="">Russell and Ginsburg, 1984</span></a><span data-dcnode-id="9947" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9945" href="#bib0705" name="bbib0705"><span data-dcnode-id="9946" instrument_node="">Swanson et al., 1993</span></a><span data-dcnode-id="9944" instrument_node="">).</span></p><p data-dcnode-id="9914" id="par0055"><span data-dcnode-id="9942" instrument_node="">Another well-established finding demonstrating a connection between WMC and problem solving is that children with mathematical disabilities (MD) or arithmetic disabilities (AD) do not perform as well as their same-age peers on working memory tasks (</span><a class="workspace-trigger" data-dcnode-id="9940" href="#bib0300" name="bbib0300"><span data-dcnode-id="9941" instrument_node="">Geary et al., 2004</span></a><span data-dcnode-id="9939" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9937" href="#bib0345" name="bbib0345"><span data-dcnode-id="9938" instrument_node="">Hitch and McAuley, 1991</span></a><span data-dcnode-id="9936" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9934" href="#bib0520" name="bbib0520"><span data-dcnode-id="9935" instrument_node="">McLean and Hitch, 1999</span></a><span data-dcnode-id="9933" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9931" href="#bib0575" name="bbib0575"><span data-dcnode-id="9932" instrument_node="">Passolunghi and Cornoldi, 2008</span></a><span data-dcnode-id="9930" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9928" href="#bib0670" name="bbib0670"><span data-dcnode-id="9929" instrument_node="">Siegel and Ryan, 1989</span></a><span data-dcnode-id="9927" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9925" href="#bib0705" name="bbib0705"><span data-dcnode-id="9926" instrument_node="">Swanson et al., 1993</span></a><span data-dcnode-id="9924" instrument_node="">). Further, it has also been shown that poor math problem solvers show impairments in WMC but not necessarily in STM (</span><a class="workspace-trigger" data-dcnode-id="9922" href="#bib0890" name="bbib0890"><span data-dcnode-id="9923" instrument_node="">Bull and Johnston, 1997</span></a><span data-dcnode-id="9921" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9919" href="#bib0900" name="bbib0900"><span data-dcnode-id="9920" instrument_node="">Butterworth et al., 1996</span></a><span data-dcnode-id="9918" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9916" href="#bib0285" name="bbib0285"><span data-dcnode-id="9917" instrument_node="">Gathercole and Pickering, 2000</span></a><span data-dcnode-id="9915" instrument_node="">).</span></p></section><section data-dcnode-id="9574" id="sec0025"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9909"><span data-dcnode-id="9912" instrument_node="">3.2</span><span data-dcnode-id="9911" instrument_node="">. </span><span data-dcnode-id="9910" instrument_node="">How Does WMC Affect Math Problem Solving?</span></h3><p data-dcnode-id="9897" id="par0060"><span data-dcnode-id="9904"><span data-dcnode-id="9908" instrument_node="">Although there has been a lot of interest at the intersection of working memory and mathematical performance, the vast majority of studies have concerned themselves with which individual differences measures (measures of phonological loop, </span><a class="topic-link" data-dcnode-id="9906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/visuospatial-sketchpad" title="Learn more about Visuospatial Sketchpad from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9907" instrument_node="">visuospatial sketchpad</span></a><span data-dcnode-id="9905" instrument_node="">, and executive functions) predict mathematical performances. Meanwhile there has been much less investigation of the other side of the relationship—that is, which exact processes or skills underlying mathematical problem solving depend on WMC (e.g., </span></span><a class="workspace-trigger" data-dcnode-id="9902" href="#bib0285" name="bbib0285"><span data-dcnode-id="9903" instrument_node="">Gathercole and Pickering, 2000</span></a><span data-dcnode-id="9901" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9899" href="#bib0350" name="bbib0350"><span data-dcnode-id="9900" instrument_node="">Holmes and Adams, 2006</span></a><span data-dcnode-id="9898" instrument_node="">).</span></p><p data-dcnode-id="9895" id="par0065"><span data-dcnode-id="9896" instrument_node="">Based in the lines of research reviewed below, there are several processes involved in mathematical problem solving that seem to be promising candidates to be influenced by WMC: skill at executing sequences and maintaining partial results; efficient retrieval of math facts and knowledge structures such as problem schemas; the successful generation or transformation of problem representations; and dealing with novelty.</span></p><section data-dcnode-id="9852" id="sec0030"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9891"><span data-dcnode-id="9894" instrument_node="">3.2.1</span><span data-dcnode-id="9893" instrument_node="">. </span><span data-dcnode-id="9892" instrument_node="">The Role of WMC in Executing Sequential Mathematical Procedures</span></h4><p data-dcnode-id="9853" id="par0070"><span data-dcnode-id="9890" instrument_node="">The most straightforward relationship between working memory and mathematical problem solving is the one foreshadowed in early work by Hitch on the execution of multistep procedures. Evidence from dual-task studies on arithmetic with adult participants suggests that the central executive may play an important role in executing multistep mathematical calculations. Central executive resources are needed to coordinate among various stages of procedures, including maintaining or retrieving interim results and planning or monitoring the execution of subgoals (</span><a class="workspace-trigger" data-dcnode-id="9888" href="#bib0835" name="bbib0835"><span data-dcnode-id="9889" instrument_node="">Ashcraft and Kirk, 2001</span></a><span data-dcnode-id="9887" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9885" href="#bib0220" name="bbib0220"><span data-dcnode-id="9886" instrument_node="">DeStefano and LeFevre, 2004</span></a><span data-dcnode-id="9884" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9882" href="#bib0270" name="bbib0270"><span data-dcnode-id="9883" instrument_node="">Fürst and Hitch, 2000</span></a><span data-dcnode-id="9881" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9879" href="#bib0465" name="bbib0465"><span data-dcnode-id="9880" instrument_node="">Logie et al., 1994</span></a><span data-dcnode-id="9878" instrument_node="">). Dual-task studies have demonstrated that the disruptive effects of concurrent tasks are particularly acute on multidigit addition and multiplication problems that require executing a sequence of steps or subgoals (</span><a class="workspace-trigger" data-dcnode-id="9876" href="#bib0210" name="bbib0210"><span data-dcnode-id="9877" instrument_node="">De Rammelaere et al., 2001</span></a><span data-dcnode-id="9875" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9873" href="#bib0445" name="bbib0445"><span data-dcnode-id="9874" instrument_node="">Lemaire et al., 1996</span></a><span data-dcnode-id="9872" instrument_node="">). They also cause deficits on problems that require carrying or borrowing operations (</span><a class="workspace-trigger" data-dcnode-id="9870" href="#bib0270" name="bbib0270"><span data-dcnode-id="9871" instrument_node="">Fürst and Hitch, 2000</span></a><span data-dcnode-id="9869" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9867" href="#bib0660" name="bbib0660"><span data-dcnode-id="9868" instrument_node="">Seitz and Schumann-Hengsteler, 2000</span></a><span data-dcnode-id="9866" instrument_node="">). Similarly, errors are particularly likely at points in problem solving where the retrieval of intermediate solutions or nested goals is required (</span><a class="workspace-trigger" data-dcnode-id="9864" href="#bib0840" name="bbib0840"><span data-dcnode-id="9865" instrument_node="">Ayres, 2001</span></a><span data-dcnode-id="9863" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9861" href="#bib0910" name="bbib0910"><span data-dcnode-id="9862" instrument_node="">Campbell and Charness, 1990</span></a><span data-dcnode-id="9860" instrument_node="">) and this has been attributed to demands on working memory. Using an individual differences approach, </span><a class="workspace-trigger" data-dcnode-id="9858" href="#bib0835" name="bbib0835"><span data-dcnode-id="9859" instrument_node="">Ashcraft and Kirk (2001)</span></a><span data-dcnode-id="9857" instrument_node=""> have shown that operation span predicts performance on multidigit problem solving, while </span><a class="workspace-trigger" data-dcnode-id="9855" href="#bib0310" name="bbib0310"><span data-dcnode-id="9856" instrument_node="">Geary and Widaman (1992)</span></a><span data-dcnode-id="9854" instrument_node=""> demonstrated that WMC particularly predicts successful problem solving involving the carry operation.</span></p></section><section data-dcnode-id="9775" id="sec0035"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9848"><span data-dcnode-id="9851" instrument_node="">3.2.2</span><span data-dcnode-id="9850" instrument_node="">. </span><span data-dcnode-id="9849" instrument_node="">The Role of WMC in Retrieval of Math Facts</span></h4><p data-dcnode-id="9838" id="par0075"><span data-dcnode-id="9847" instrument_node="">While the relation of WMC to the processes involved in multistep problem solving makes a lot of intuitive sense, this is not the whole story of how WMC relates to math performance. Importantly, concurrent executive tasks have also been found to disrupt single-digit addition and multiplication performance (e.g., Seitz &amp; Schumman-Hengsteler, 2000). One reason for this is that even adults may not use retrieval all of the time on these simple problems, and instead may use transformations of the stated problems in order to obtain an answer. For example, instead of directly retrieving the answer to 8</span><span data-dcnode-id="9846" instrument_node="">&nbsp;</span><span data-dcnode-id="9845" instrument_node="">×</span><span data-dcnode-id="9844" instrument_node="">&nbsp;</span><span data-dcnode-id="9843" instrument_node="">6, some people may opt to retrieve a math fact that may be more accessible (8</span><span data-dcnode-id="9842" instrument_node="">&nbsp;</span><span data-dcnode-id="9841" instrument_node="">×</span><span data-dcnode-id="9840" instrument_node="">&nbsp;</span><span data-dcnode-id="9839" instrument_node="">5) and then add another 8 to that retrieved solution. Because transforming the problem involves computation and multiple steps, performance on even single-digit problems can be impacted by working memory constraints.</span></p><p data-dcnode-id="9815" id="par0080"><span data-dcnode-id="9837" instrument_node="">In addition, it is also possible that individual differences in WMC may relate to the ability to successfully retrieve math facts from LTM. In turn, recognizing the likelihood of successful retrieval may also affect the strategies that people choose to use. It has been demonstrated that children with low WMC use retrieval strategies less often than those with high WMC, and switch to retrieval strategies later in their development (</span><a class="workspace-trigger" data-dcnode-id="9835" href="#bib0300" name="bbib0300"><span data-dcnode-id="9836" instrument_node="">Geary et al., 2004</span></a><span data-dcnode-id="9830"><span data-dcnode-id="9834" instrument_node="">). It is clear that low WMC </span><a class="topic-link" data-dcnode-id="9832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/elementary-school-student" title="Learn more about Elementary School Student from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9833" instrument_node="">elementary school students</span></a><span data-dcnode-id="9831" instrument_node=""> use counting as a strategy to answer simple problems (3</span></span><span data-dcnode-id="9829" instrument_node="">&nbsp;</span><span data-dcnode-id="9828" instrument_node="">+</span><span data-dcnode-id="9827" instrument_node="">&nbsp;</span><span data-dcnode-id="9826" instrument_node="">5</span><span data-dcnode-id="9825" instrument_node="">&nbsp;</span><span data-dcnode-id="9824" instrument_node="">=</span><span data-dcnode-id="9823" instrument_node="">&nbsp;</span><span data-dcnode-id="9822" instrument_node="">) more often and later into development than their higher WMC peers. Interestingly low WMC students are less likely to use retrieval, decomposition, adding on or min (adding from the larger number) strategies even when the relevant number facts are present in their LTM (</span><a class="workspace-trigger" data-dcnode-id="9820" href="#bib0300" name="bbib0300"><span data-dcnode-id="9821" instrument_node="">Geary et al., 2004</span></a><span data-dcnode-id="9819" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9817" href="#bib0575" name="bbib0575"><span data-dcnode-id="9818" instrument_node="">Passolunghi and Cornoldi, 2008</span></a><span data-dcnode-id="9816" instrument_node="">).</span></p><p data-dcnode-id="9783" id="par0085"><span data-dcnode-id="9814" instrument_node="">Several explanations have been offered for this finding. It may be that low WMC individuals are more susceptible to interference at retrieval. A number of studies have demonstrated that common incorrect responses on multiplication problems tend to be from the multiplication table of one of the operands (e.g., for 7</span><span data-dcnode-id="9813" instrument_node="">&nbsp;</span><span data-dcnode-id="9812" instrument_node="">×</span><span data-dcnode-id="9811" instrument_node="">&nbsp;</span><span data-dcnode-id="9810" instrument_node="">6, 48 may be a common incorrect response from the 6 times table family; </span><a class="workspace-trigger" data-dcnode-id="9808" href="#bib0850" name="bbib0850"><span data-dcnode-id="9809" instrument_node="">Barrouillet et al., 1997</span></a><span data-dcnode-id="9807" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9805" href="#bib0685" name="bbib0685"><span data-dcnode-id="9806" instrument_node="">Stickgold et al., 1999</span></a><span data-dcnode-id="9804" instrument_node="">). Similarly, when </span><a class="workspace-trigger" data-dcnode-id="9802" href="#bib0295" name="bbib0295"><span data-dcnode-id="9803" instrument_node="">Geary, Hamson, and Hoard (2000)</span></a><span data-dcnode-id="9801" instrument_node=""> instructed children to use only retrieval to reach the answers to addition problems, they found that incorrect responses were most often the next number on the number line from one of the addends, suggesting that this nearby information can interfere with retrieving the correct answer. Other typical competitors for correct solutions are those that are solutions from other operations, for example 7</span><span data-dcnode-id="9800" instrument_node="">&nbsp;</span><span data-dcnode-id="9799" instrument_node="">×</span><span data-dcnode-id="9798" instrument_node="">&nbsp;</span><span data-dcnode-id="9797" instrument_node="">6</span><span data-dcnode-id="9796" instrument_node="">&nbsp;</span><span data-dcnode-id="9795" instrument_node="">=</span><span data-dcnode-id="9794" instrument_node="">&nbsp;</span><span data-dcnode-id="9793" instrument_node="">13 (</span><a class="workspace-trigger" data-dcnode-id="9791" href="#bib0790" name="bbib0790"><span data-dcnode-id="9792" instrument_node="">Winkelman &amp; Schmidt, 1974</span></a><span data-dcnode-id="9790" instrument_node="">). In addition, it is likely that previous solution errors generated in response to problems can also be encoded in memory and may compete with correct responses (</span><a class="workspace-trigger" data-dcnode-id="9788" href="#bib0675" name="bbib0675"><span data-dcnode-id="9789" instrument_node="">Siegler &amp; Shrager, 1984</span></a><span data-dcnode-id="9787" instrument_node="">). Greater interference from all of these types of competitors could result in less efficient retrieval for low WMC solvers. In a direct test of this idea in relation to individual differences, </span><a class="workspace-trigger" data-dcnode-id="9785" href="#bib0500" name="bbib0500"><span data-dcnode-id="9786" instrument_node="">Mattarella-Micke and Beilock (2010)</span></a><span data-dcnode-id="9784" instrument_node=""> found that WMC helps reduce conflict from irrelevant operations (sums when products are required).</span></p><p data-dcnode-id="9778" id="par0090"><span data-dcnode-id="9782" instrument_node="">An alternative explanation traces the differences in the ability to use retrieval strategies back to differences in the quality of encoding of math information in LTM. For example, </span><a class="workspace-trigger" data-dcnode-id="9780" href="#bib0290" name="bbib0290"><span data-dcnode-id="9781" instrument_node="">Geary (1993)</span></a><span data-dcnode-id="9779" instrument_node=""> has suggested the Hebbian notion that in order for the answers to addition problems to be stored in LTM, both the two addends and the answer have to be experienced in working memory simultaneously. Because low WMC children use slow counting procedures, they may develop weak problem–answer associations. High WMC children, in contrast, may develop stronger problem–answer associations, resulting in more frequent and more efficient use of retrieval strategies during problem solving.</span></p><p data-dcnode-id="9776" id="par0095"><span data-dcnode-id="9777" instrument_node="">In short, in addition to differences that seem to be due to the “size of one's buffer” in multistep calculations, some effects of WMC on mathematical problem solving seem to be related to individual differences in the likelihood of using retrieval as a solution strategy instead of computation, or the inability to access math facts in LTM, which may either be due to weak encoding or interference at retrieval among low WMC solvers.</span></p></section><section data-dcnode-id="9642" id="sec0040"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9771"><span data-dcnode-id="9774" instrument_node="">3.2.3</span><span data-dcnode-id="9773" instrument_node="">. </span><span data-dcnode-id="9772" instrument_node="">The Role of WMC in Problem Representation</span></h4><p data-dcnode-id="9745" id="par0100"><span data-dcnode-id="9770" instrument_node="">Moving beyond the effects of WMC on arithmetic processing from numeric expressions, previous research has attributed a substantial proportion of the variance in solution accuracy of word problems to individual differences in WMC. This would seem to be due to the critical additional need to interpret the problem wording in order to represent the underlying mathematical problem (</span><a class="workspace-trigger" data-dcnode-id="9768" href="#bib0410" name="bbib0410"><span data-dcnode-id="9769" instrument_node="">Kintsch and Greeno, 1985</span></a><span data-dcnode-id="9767" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9765" href="#bib0435" name="bbib0435"><span data-dcnode-id="9766" instrument_node="">LeBlanc and Weber-Russell, 1996</span></a><span data-dcnode-id="9764" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9762" href="#bib0455" name="bbib0455"><span data-dcnode-id="9763" instrument_node="">Lewis and Mayer, 1987</span></a><span data-dcnode-id="9761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9759" href="#bib0620" name="bbib0620"><span data-dcnode-id="9760" instrument_node="">Riley et al., 1983</span></a><span data-dcnode-id="9758" instrument_node="">). Middle school children better at solving word problems have been demonstrated to have higher WMC than other children (</span><a class="workspace-trigger" data-dcnode-id="9756" href="#bib0980" name="bbib0980"><span data-dcnode-id="9757" instrument_node="">Dark &amp; Benbow, 1990</span></a><span data-dcnode-id="9755" instrument_node="">). Numerous other studies have supported that WMC is related to word problem solving (</span><a class="workspace-trigger" data-dcnode-id="9753" href="#bib0590" name="bbib0590"><span data-dcnode-id="9754" instrument_node="">Passolunghi and Siegel, 2004</span></a><span data-dcnode-id="9752" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9750" href="#bib0700" name="bbib0700"><span data-dcnode-id="9751" instrument_node="">Swanson and Beebe-Frankenberger, 2004</span></a><span data-dcnode-id="9749" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9747" href="#bib0705" name="bbib0705"><span data-dcnode-id="9748" instrument_node="">Swanson et al., 1993</span></a><span data-dcnode-id="9746" instrument_node="">). In particular, WMC seems to help with interpreting problem statements, resisting distraction from irrelevant problem information, and with the transformation of problem representations.</span></p><p data-dcnode-id="9728" id="par0105"><span data-dcnode-id="9744" instrument_node="">Word problems typically include irrelevant or misleading information in the problem statement. For example, many word problems may present numbers that seem relevant to solution in a problem, but that in actuality are not. This has been found to be particularly harmful to MD individuals (</span><a class="workspace-trigger" data-dcnode-id="9742" href="#bib0635" name="bbib0635"><span data-dcnode-id="9743" instrument_node="">Russell &amp; Ginsburg, 1984</span></a><span data-dcnode-id="9741" instrument_node="">). In an early study, </span><a class="workspace-trigger" data-dcnode-id="9739" href="#bib0960" name="bbib0960"><span data-dcnode-id="9740" instrument_node="">Cooney and Swanson (1990)</span></a><span data-dcnode-id="9738" instrument_node=""> were able to show that high WMC individuals remembered more relevant and less extraneous problem information, while low WMC showed the opposite pattern of results. </span><a class="workspace-trigger" data-dcnode-id="9736" href="#bib0580" name="bbib0580"><span data-dcnode-id="9737" instrument_node="">Passolunghi, Cornoldi, and De Liberto (1999)</span></a><span data-dcnode-id="9735" instrument_node=""> demonstrated that while both high and low math ability individuals were able to identify what information in the problem was relevant and irrelevant, low-ability individuals were more likely to remember the irrelevant information from word problems, and less likely to remember relevant information. Additionally, they found that low math ability individuals had lower WMC, and were more likely to commit intrusion errors (</span><a class="workspace-trigger" data-dcnode-id="9733" href="#bib0585" name="bbib0585"><span data-dcnode-id="9734" instrument_node="">Passolunghi and Siegel, 2001</span></a><span data-dcnode-id="9732" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9730" href="#bib0590" name="bbib0590"><span data-dcnode-id="9731" instrument_node="">Passolunghi and Siegel, 2004</span></a><span data-dcnode-id="9729" instrument_node="">).</span></p><p data-dcnode-id="9705" id="par0110"><span data-dcnode-id="9727" instrument_node="">Another topic related to problem representation which has received a substantial amount of attention in the word problem-solving literature has been the relative difficulty in solving </span><em data-dcnode-id="9725"><span data-dcnode-id="9726" instrument_node="">change, combination,</span></em><span data-dcnode-id="9724" instrument_node=""> and </span><em data-dcnode-id="9722"><span data-dcnode-id="9723" instrument_node="">comparison</span></em><span data-dcnode-id="9721" instrument_node=""> problems (</span><a class="workspace-trigger" data-dcnode-id="9719" href="#bib0455" name="bbib0455"><span data-dcnode-id="9720" instrument_node="">Lewis and Mayer, 1987</span></a><span data-dcnode-id="9718" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9716" href="#bib0615" name="bbib0615"><span data-dcnode-id="9717" instrument_node="">Riley and Greeno, 1988</span></a><span data-dcnode-id="9715" instrument_node="">). </span><em data-dcnode-id="9713"><span data-dcnode-id="9714" instrument_node="">Change</span></em><span data-dcnode-id="9712" instrument_node=""> problems involve an exchange of quantity: “Pete had 7 marbles. Then Sam gave him 5 more marbles. How many marbles does Pete have now?” </span><em data-dcnode-id="9710"><span data-dcnode-id="9711" instrument_node="">Combine</span></em><span data-dcnode-id="9709" instrument_node=""> problems involve joining or separating different quantities: “Fred has 7 marbles. John has 5 marbles. How many marbles do they have altogether?” Finally, </span><em data-dcnode-id="9707"><span data-dcnode-id="9708" instrument_node="">compare</span></em><span data-dcnode-id="9706" instrument_node=""> problems involve comparing different quantities: “Jane has 12 marbles. Mary has 7 marbles. How many marbles does Jane have more than Mary?”</span></p><p data-dcnode-id="9667" id="par0115"><span data-dcnode-id="9704" instrument_node="">A classic effect found with these problem sets is that </span><em data-dcnode-id="9702"><span data-dcnode-id="9703" instrument_node="">compare</span></em><span data-dcnode-id="9701" instrument_node=""> problems are less likely to be solved correctly. There may be a number of reasons for this. One common explanation is that these problems often have a wording that is inconsistent with the operations that are required for solution (i.e., </span><em data-dcnode-id="9696"><span data-dcnode-id="9700" instrument_node="">How many marbles does Jane have </span><u data-dcnode-id="9698"><span data-dcnode-id="9699" instrument_node="">more</span></u><span data-dcnode-id="9697" instrument_node=""> than Mary</span></em><span data-dcnode-id="9695" instrument_node=""> implies addition, but requires subtraction). Because creating a mental representation that differs from the straightforward reading of the text is an effortful process, it has been suggested that errors on compare problems could relate to WMC. It has been shown that the likelihood of making errors in the face of inconsistent or convoluted wording increase under conditions that are thought to increase demands on working memory (</span><a class="workspace-trigger" data-dcnode-id="9693" href="#bib0870" name="bbib0870"><span data-dcnode-id="9694" instrument_node="">Bestgen, 2009</span></a><span data-dcnode-id="9692" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9690" href="#bib0925" name="bbib0925"><span data-dcnode-id="9691" instrument_node="">Casey, 1993</span></a><span data-dcnode-id="9689" instrument_node="">). There are also a few individual differences studies that have suggested that </span><em data-dcnode-id="9687"><span data-dcnode-id="9688" instrument_node="">compare</span></em><span data-dcnode-id="9686" instrument_node=""> problems are more difficult particularly for individuals with low WMC. </span><a class="workspace-trigger" data-dcnode-id="9684" href="#bib0385" name="bbib0385"><span data-dcnode-id="9685" instrument_node="">Kail and Hall (1999)</span></a><span data-dcnode-id="9683" instrument_node=""> attribute this to the fact that there is no verb in the “static” compare problems that can cue to the solver to the correct operation, while </span><a class="workspace-trigger" data-dcnode-id="9681" href="#bib0720" name="bbib0720"><span data-dcnode-id="9682" instrument_node="">Thevenot and Oakhill (2010</span></a><span data-dcnode-id="9680" instrument_node="">; similar to the reasoning in </span><a class="workspace-trigger" data-dcnode-id="9678" href="#bib0330" name="bbib0330"><span data-dcnode-id="9679" instrument_node="">Hegarty, Mayer, &amp; Monk, 1995</span></a><span data-dcnode-id="9677" instrument_node="">) attribute this relation with WMC to the need to create multiple simultaneous representational expressions for </span><em data-dcnode-id="9675"><span data-dcnode-id="9676" instrument_node="">compare</span></em><span data-dcnode-id="9674" instrument_node=""> problems, while </span><em data-dcnode-id="9672"><span data-dcnode-id="9673" instrument_node="">combine</span></em><span data-dcnode-id="9671" instrument_node=""> and </span><em data-dcnode-id="9669"><span data-dcnode-id="9670" instrument_node="">change</span></em><span data-dcnode-id="9668" instrument_node=""> problems can be directly translated using a single, sequential arithmetic expression.</span></p><p data-dcnode-id="9654" id="par0120"><span data-dcnode-id="9666" instrument_node="">Other work suggests that individual differences in WMC relate to the ability to mentally transform the order of information in problem representations. For example, </span><a class="workspace-trigger" data-dcnode-id="9664" href="#bib0665" name="bbib0665"><span data-dcnode-id="9665" instrument_node="">Seyler, Kirk, and Ashcraft (2003)</span></a><span data-dcnode-id="9663" instrument_node=""> explored how performance on multidigit subtraction problems relates to WMC in a study that employed both a dual task and an individual differences design. Both load and capacity limitations were related to decrements in performance, and load especially impacted the low WMC participants. This was argued to be due to a decreased ability to transform subtraction problems such as 13–7 into addition problems _</span><span data-dcnode-id="9662" instrument_node="">&nbsp;</span><span data-dcnode-id="9661" instrument_node="">+</span><span data-dcnode-id="9660" instrument_node="">&nbsp;</span><span data-dcnode-id="9659" instrument_node="">7</span><span data-dcnode-id="9658" instrument_node="">&nbsp;</span><span data-dcnode-id="9657" instrument_node="">=</span><span data-dcnode-id="9656" instrument_node="">&nbsp;</span><span data-dcnode-id="9655" instrument_node="">13, which in turn enables more direct solution retrieval.</span></p><p data-dcnode-id="9643" id="par0125"><span data-dcnode-id="9653" instrument_node="">Finally, some other studies related to problem representation have suggested that WMC is related to accurate problem classification (</span><a class="workspace-trigger" data-dcnode-id="9651" href="#bib0960" name="bbib0960"><span data-dcnode-id="9652" instrument_node="">Cooney and Swanson, 1990</span></a><span data-dcnode-id="9650" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9648" href="#bib0710" name="bbib0710"><span data-dcnode-id="9649" instrument_node="">Sweller and Cooper, 1985</span></a><span data-dcnode-id="9647" instrument_node="">). That is, high WMC individuals are better able to determine the necessary operations required to solve a given problem. The ability to accurately classify a problem will necessarily be related to the ability to select the important information that should be included in a problem representation, which as noted above has also been shown to be related to WMC. Just as greater WMC may aid the retrieval or encoding of math facts in LTM, it is possible that individual differences in WMC may also relate to differences in the retrieval or encoding of problem classifications or schemas. As was argued for the results related to the accessibility of math facts in LTM, high WMC individuals may better encode problem schemas because they may be more likely to be able to consider multiple elements of a solution method in immediate memory simultaneously. This issue has generally been approached from a load perspective (</span><a class="workspace-trigger" data-dcnode-id="9645" href="#bib0715" name="bbib0715"><span data-dcnode-id="9646" instrument_node="">Sweller &amp; Cooper, 1985</span></a><span data-dcnode-id="9644" instrument_node="">), with arguments suggesting that worked examples may enable schema acquisition by making critical information simultaneously available to the solver, while also limiting the need to engage in other resource expensive processes such as a search of the solution space.</span></p></section><section data-dcnode-id="9602" id="sec0045"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9638"><span data-dcnode-id="9641" instrument_node="">3.2.4</span><span data-dcnode-id="9640" instrument_node="">. </span><span data-dcnode-id="9639" instrument_node="">The Role of WMC in Dealing with Novelty</span></h4><p data-dcnode-id="9603" id="par0130"><span data-dcnode-id="9637" instrument_node="">Mathematical problem solving, like other skills, also shows the expected relation between novelty and WMC (</span><a class="workspace-trigger" data-dcnode-id="9635" href="#bib0800" name="bbib0800"><span data-dcnode-id="9636" instrument_node="">Ackerman, 1988</span></a><span data-dcnode-id="9634" instrument_node="">). WMC plays a greater role early in early arithmetic skill acquisition, and working memory demands tend to decrease as processing becomes more automated and retrieval-based (</span><a class="workspace-trigger" data-dcnode-id="9632" href="#bib0865" name="bbib0865"><span data-dcnode-id="9633" instrument_node="">Beilock et al., 2004</span></a><span data-dcnode-id="9631" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9629" href="#bib0300" name="bbib0300"><span data-dcnode-id="9630" instrument_node="">Geary et al., 2004</span></a><span data-dcnode-id="9628" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9626" href="#bib0360" name="bbib0360"><span data-dcnode-id="9627" instrument_node="">Imbo and Vandierendonck, 2008</span></a><span data-dcnode-id="9625" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9623" href="#bib0450" name="bbib0450"><span data-dcnode-id="9624" instrument_node="">Lemaire and Siegler, 1995</span></a><span data-dcnode-id="9622" instrument_node="">). As a result, the relation of individual differences in WMC to performance in arithmetic is more pronounced for arithmetic in early elementary grades than in later grades. The relation of WMC to novel problem solving has also been demonstrated in experimental studies by </span><a class="workspace-trigger" data-dcnode-id="9620" href="#bib0855" name="bbib0855"><span data-dcnode-id="9621" instrument_node="">Beilock and Carr (2005)</span></a><span data-dcnode-id="9615"><span data-dcnode-id="9619" instrument_node="">, who introduced participants to a form of modular arithmetic. In these problems, individuals have to respond to a novel </span><a class="topic-link" data-dcnode-id="9617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/arithmetic-operation" title="Learn more about Arithmetic Operation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9618" instrument_node="">arithmetic operation</span></a><span data-dcnode-id="9616" instrument_node="">, which involves both subtraction and division. For example, if shown 27</span></span><span data-dcnode-id="9614" instrument_node="">&nbsp;</span><u data-dcnode-id="9612"><span data-dcnode-id="9613" instrument_node="">=</span></u><span data-dcnode-id="9611" instrument_node="">&nbsp;</span><span data-dcnode-id="9610" instrument_node="">14 mod(3), the solver would have to subtract the middle number from the first number, then divide the result by the mod number. The solver then responds “True” if the final result is a whole number and “False” if it is not. This task is both unfamiliar and requires multiple steps to complete. Results across several studies show that high WMC participants perform better on this novel mathematical problem-solving task (</span><a class="workspace-trigger" data-dcnode-id="9608" href="#bib0855" name="bbib0855"><span data-dcnode-id="9609" instrument_node="">Beilock and Carr, 2005</span></a><span data-dcnode-id="9607" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9605" href="#bib0860" name="bbib0860"><span data-dcnode-id="9606" instrument_node="">Beilock and DeCaro, 2007</span></a><span data-dcnode-id="9604" instrument_node="">).</span></p></section><section data-dcnode-id="9575" id="sec0050"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9598"><span data-dcnode-id="9601" instrument_node="">3.2.5</span><span data-dcnode-id="9600" instrument_node="">. </span><span data-dcnode-id="9599" instrument_node="">Math Anxiety, Stereotype Threat, and Performance Pressure</span></h4><p data-dcnode-id="9587" id="par0135"><span data-dcnode-id="9597" instrument_node="">A final burgeoning area of research related to WMC and mathematical problem solving has been exploring how different types of stressors may have their effects on performance. As one would expect, math anxiety relates negatively to math achievement. In studies examining specific effects on problem solving, Ashcraft and his colleagues have demonstrated that math anxiety tends to have little effect on finding solutions to simple addition and multiplication problems, but has larger effects on more complex math performances including mixed fractions, algebraic equations, and two-column arithmetic involving carry operations (</span><a class="workspace-trigger" data-dcnode-id="9595" href="#bib0830" name="bbib0830"><span data-dcnode-id="9596" instrument_node="">Ashcraft &amp; Faust, 1994</span></a><span data-dcnode-id="9594" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="9592" href="#bib0835" name="bbib0835"><span data-dcnode-id="9593" instrument_node="">Ashcraft and Kirk (2001)</span></a><span data-dcnode-id="9591" instrument_node=""> found that having to remember a string of six random letters made the task especially difficult for high-math-anxious individuals. This set of results, and many others, suggests that when anxiety is aroused there is a reduction in the available working memory resources for high-math-anxiety individuals. This has been attributed to the attention that is directed to ruminations or worry, which effectively adds a dual task (or triple task) to any target activity. Similarly, </span><a class="workspace-trigger" data-dcnode-id="9589" href="#bib0645" name="bbib0645"><span data-dcnode-id="9590" instrument_node="">Schmader and Johns (2003)</span></a><span data-dcnode-id="9588" instrument_node=""> have shown that even a subtle stereotype threat can significantly decrease performance for females on both a WMC measure as well as a set of GRE word problems.</span></p><p data-dcnode-id="9576" id="par0140"><span data-dcnode-id="9586" instrument_node="">Further research has explored whether stressors tend to impact high or low WMC individuals differently. Although one might intuitively suspect that low WMC participants might be more vulnerable to the negative effects of anxiety or threat due to their lower baseline levels of capacity, a series of studies has now demonstrated that it is the high WMC individuals who may be the most harmed by performance pressure conditions (</span><a class="workspace-trigger" data-dcnode-id="9584" href="#bib0855" name="bbib0855"><span data-dcnode-id="9585" instrument_node="">Beilock and Carr, 2005</span></a><span data-dcnode-id="9583" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9581" href="#bib0860" name="bbib0860"><span data-dcnode-id="9582" instrument_node="">Beilock and DeCaro, 2007</span></a><span data-dcnode-id="9580" instrument_node="">). Using the modular arithmetic task described above, performance pressure erased the normally superior performance of high WMC participants on high demand problems. The explanation for this seems to be that high WMC individuals are precisely the subjects who generally solve difficult problems using complex, high-demand algorithms. The load imposed by performance pressure deprives high WMC individuals of the very resources that they usually recruit to solve difficult problems in a more complex fashion than low WMC solvers, thus their performance suffers (</span><a class="workspace-trigger" data-dcnode-id="9578" href="#bib0995" name="bbib0995"><span data-dcnode-id="9579" instrument_node="">DeCaro, Rotar, Kendra, &amp; Beilock, 2010</span></a><span data-dcnode-id="9577" instrument_node="">). These results are also interesting as they point out that one should not assume that “load” manipulations will have a larger effect on low WMC participants. Although load and individual differences approaches are often discussed as interchangeable, the relation between them is all too rarely tested. Loading the working memory system may not have the same effects on processing as individual differences in WMC.</span></p></section></section><section data-dcnode-id="9565" id="sec0055"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9570"><span data-dcnode-id="9573" instrument_node="">3.3</span><span data-dcnode-id="9572" instrument_node="">. </span><span data-dcnode-id="9571" instrument_node="">Summary</span></h3><p data-dcnode-id="9568" id="par0145"><span data-dcnode-id="9569" instrument_node="">Several findings from the math problem-solving literature support that WMC helps in the maintenance of information including subgoals or intermediate products. This is especially helpful when solving multistep problems or problems with large numbers requiring carry or borrow operations. However, even on simple arithmetic problems, high WMC solvers can show differences from low WMC solvers. The source of these differences point to superiority in encoding or retrieval of math facts or knowledge structures in LTM, the ability to deal with interference from competing information, the ability to limit distraction from irrelevant problem features, and the ability to generate or manipulate mental problem representations.</span></p><p data-dcnode-id="9566" id="par0150"><span data-dcnode-id="9567" instrument_node="">Thus, from this perspective, WMC may generally support more effective problem solving in ways similar to expertise. It may increase the functional capacity of immediate memory stores. It may enable the retrieval and use of domain-relevant information. It may help to narrow the search space for correct solutions. It may help the solver to focus on relevant problem features and experience less interference from irrelevant information. In addition, WMC resources may contribute to the development of domain-related knowledge as it aids the integration and encoding of associations and problem elements into knowledge structures by supporting their simultaneous activation in immediate memory.</span></p></section></section><section data-dcnode-id="9349" id="sec0060"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9560"><span data-dcnode-id="9563" instrument_node="">4</span><span data-dcnode-id="9562" instrument_node="">. </span><span data-dcnode-id="9561" instrument_node="">Raven's Progressive Matrix Problem Solving</span></h2><p data-dcnode-id="9551" id="par0155"><span data-dcnode-id="9559" instrument_node="">A second relatively substantial literature has attempted to articulate the relation of WMC to performance on the various RPM problem sets (Standard, Advanced, Colored; </span><a class="workspace-trigger" data-dcnode-id="9557" href="#bib0600" name="bbib0600"><span data-dcnode-id="9558
