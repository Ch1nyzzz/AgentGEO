" instrument_node="">Raven, Raven, &amp; Court, 1998</span></a><span data-dcnode-id="9556" instrument_node="">), all of which require solvers to select the alternative that best completes a visual pattern. RPM items all follow a similar procedure. The solver is first presented with a 3</span><span data-dcnode-id="9555" instrument_node="">&nbsp;</span><span data-dcnode-id="9554" instrument_node="">×</span><span data-dcnode-id="9553" instrument_node="">&nbsp;</span><span data-dcnode-id="9552" instrument_node="">3 grid of figures with the bottom right figure missing. The figures within the grid follow a pattern, and the solver is instructed to look along the rows and down the columns, figure out what the missing figure must look like, and select that response from a bank of potential responses shown below the item.</span></p><section data-dcnode-id="9512" id="sec0065"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9547"><span data-dcnode-id="9550" instrument_node="">4.1</span><span data-dcnode-id="9549" instrument_node="">. </span><span data-dcnode-id="9548" instrument_node="">Correlations Between WMC and RPM</span></h3><p data-dcnode-id="9536" id="par0160"><span data-dcnode-id="9546" instrument_node="">The relation between WMC and performance on RPM tasks has been well documented, with many studies demonstrating positive correlations between the two, particularly when drawing a latent variable out of multiple measures of WMC (</span><a class="workspace-trigger" data-dcnode-id="9544" href="#bib0955" name="bbib0955"><span data-dcnode-id="9545" instrument_node="">Conway et al., 2005</span></a><span data-dcnode-id="9543" instrument_node="">). As in the math problem-solving literature, evidence suggests that measures of WMC need not be domain specific to predict performance on RPM problem-solving tasks (</span><a class="workspace-trigger" data-dcnode-id="9541" href="#bib0395" name="bbib0395"><span data-dcnode-id="9542" instrument_node="">Kane, Hambrick, Tuholski, Wilhelm, Payne, &amp; Engle, 2004</span></a><span data-dcnode-id="9540" instrument_node="">). Indeed, a recent meta-analysis demonstrated that WMC predicts performance on the RPM regardless of the modality that the complex span task is presented in (</span><a class="workspace-trigger" data-dcnode-id="9538" href="#bib0805" name="bbib0805"><span data-dcnode-id="9539" instrument_node="">Ackerman, Beier, &amp; Boyle, 2005</span></a><span data-dcnode-id="9537" instrument_node="">).</span></p><p data-dcnode-id="9527" id="par0165"><span data-dcnode-id="9535" instrument_node="">Much of the research in this area has concerned itself with why WMC tasks predict performance on the RPM by exploring their predictiveness when considered alongside other measures of memory or attention. A critical finding from this perspective is that WMC predicts RPM performance even after individual differences in STM have been accounted for (</span><a class="workspace-trigger" data-dcnode-id="9533" href="#bib0245" name="bbib0245"><span data-dcnode-id="9534" instrument_node="">Engle, Tuholski, Laughlin, &amp; Conway, 1999</span></a><span data-dcnode-id="9528"><span data-dcnode-id="9532" instrument_node="">). In fact, when simple span measures of STM storage capacity are entered alongside WMC, they generally do not predict RPM performance. This suggests that rather than just the size of some buffer within the working memory system, the parts of WMC that seem to matter for these tests of problem solving are related to executive functions or </span><a class="topic-link" data-dcnode-id="9530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/attentional-control" title="Learn more about Attentional Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9531" instrument_node="">attentional control</span></a><span data-dcnode-id="9529" instrument_node=""> processes.</span></span></p><p data-dcnode-id="9513" id="par0170"><span data-dcnode-id="9526" instrument_node="">Recently two other constructs, scope of attention and retrieval from secondary memory, have been investigated alongside complex span tasks to better determine what aspects of WMC relate to RPM. Cowan has been exploring how the scope of one's focus of attention affects performance on RPM (</span><a class="workspace-trigger" data-dcnode-id="9524" href="#bib0965" name="bbib0965"><span data-dcnode-id="9525" instrument_node="">Cowan et al., 2005</span></a><span data-dcnode-id="9523" instrument_node="">). In one typical scope of attention task, participants are briefly exposed to a visual array, and must identify changes in a second array. The scope of attention is determined by varying the number of squares in the array, with a score representing the highest number that can be processed with accuracy. Thus, scope of attention tasks seems to examine basic processing limitations in a slightly different way than simple span tasks. They attempt to capture the immediate span of apprehension, or how many items can be perceived simultaneously. Using these measures, </span><a class="workspace-trigger" data-dcnode-id="9521" href="#bib0965" name="bbib0965"><span data-dcnode-id="9522" instrument_node="">Cowan et al. (2005)</span></a><span data-dcnode-id="9520" instrument_node=""> have demonstrated independent contributions of both scope of attention constructs as well as more typical measures of WMC to RPM. A second kind of task that has been recently employed attempts to partial out the abilities required to retrieve information from secondary memory. Some examples of this kind of task include delayed recognition of a list of words among distracters, or recall of paired associates. Recent work has suggested that performance on tasks such as these can predict performance on the RPM (</span><a class="workspace-trigger" data-dcnode-id="9518" href="#bib0545" name="bbib0545"><span data-dcnode-id="9519" instrument_node="">Mogle, Lovett, Stawski, &amp; Sliwinski, 2008</span></a><span data-dcnode-id="9517" instrument_node="">). However, measures of WMC still seem to predict RPM even once retrieval from secondary memory is accounted for (</span><a class="workspace-trigger" data-dcnode-id="9515" href="#bib0730" name="bbib0730"><span data-dcnode-id="9516" instrument_node="">Unsworth &amp; Spillers, 2010</span></a><span data-dcnode-id="9514" instrument_node="">). In general, work from this tradition suggests that performance on complex span tasks may be a function of a collection of several attentional abilities or executive functions, and each of these may support better RPM problem solving in some way.</span></p></section><section data-dcnode-id="9357" id="sec0070"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9508"><span data-dcnode-id="9511" instrument_node="">4.2</span><span data-dcnode-id="9510" instrument_node="">. </span><span data-dcnode-id="9509" instrument_node="">How Does WMC Affect Solution of RPM?</span></h3><section data-dcnode-id="9490" id="sec0075"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9504"><span data-dcnode-id="9507" instrument_node="">4.2.1</span><span data-dcnode-id="9506" instrument_node="">. </span><span data-dcnode-id="9505" instrument_node="">Number of Rules</span></h4><p data-dcnode-id="9499" id="par0175"><span data-dcnode-id="9503" instrument_node="">One early suggestion was that a main determinant of the difficulty in RPM problems was the number of rules and goals that must be maintained in memory as one solves a problem. </span><a class="workspace-trigger" data-dcnode-id="9501" href="#bib0915" name="bbib0915"><span data-dcnode-id="9502" instrument_node="">Carpenter, Just, and Shell (1990)</span></a><span data-dcnode-id="9500" instrument_node=""> applied this idea to their work with the RPM. That is, they suggested that the reason why WMC and the RPM were correlated was due to differences in individuals’ capacity to consider multiple goals and rules simultaneously. As items require more rules and goals to solve, they would require more WMC to maintain those rules and goals. Low WMC individuals would therefore be less able to solve more difficult items. As evidence, Carpenter et al. demonstrated that as item difficulty increased so did the number or rules and instances of the same rule (called “rule tokens“) required to solve the item. Additionally, they developed two computer models with differing buffer capacities, and demonstrated that only the model with the higher buffer capacity was able to solve the more difficult problems.</span></p><p data-dcnode-id="9491" id="par0180"><span data-dcnode-id="9498" instrument_node="">However, later individual differences studies have failed to support this account. While item difficulty is related to the number of rules in the item, the relation of WMC to RPM does not increase with item difficulty (</span><a class="workspace-trigger" data-dcnode-id="9496" href="#bib0640" name="bbib0640"><span data-dcnode-id="9497" instrument_node="">Salthouse, 1993</span></a><span data-dcnode-id="9495" instrument_node="">). Likewise, other researchers have demonstrated that the correlation of performance on individual RPM items with WMC is independent of the number of rules contained in the item (</span><a class="workspace-trigger" data-dcnode-id="9493" href="#bib0725" name="bbib0725"><span data-dcnode-id="9494" instrument_node="">Unsworth &amp; Engle, 2005</span></a><span data-dcnode-id="9492" instrument_node="">).</span></p></section><section data-dcnode-id="9460" id="sec0080"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9486"><span data-dcnode-id="9489" instrument_node="">4.2.2</span><span data-dcnode-id="9488" instrument_node="">. </span><span data-dcnode-id="9487" instrument_node="">Attentional Control and Resisting Interference from Distraction</span></h4><p data-dcnode-id="9473" id="par0185"><span data-dcnode-id="9485" instrument_node="">One of the main advantages of WMC for most cognitive tasks seems to be that it relates to attentional control. This has led to several studies that have attempted to examine the relation of attentional processes to RPM problem solving. For example, </span><a class="workspace-trigger" data-dcnode-id="9483" href="#bib0735" name="bbib0735"><span data-dcnode-id="9484" instrument_node="">Unsworth, Spillers, and Brewer (2009)</span></a><span data-dcnode-id="9474"><span data-dcnode-id="9482" instrument_node=""> found that performance on </span><a class="topic-link" data-dcnode-id="9480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/flanker-task" title="Learn more about Flanker Task from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9481" instrument_node="">flanker tasks</span></a><span data-dcnode-id="9475"><span data-dcnode-id="9479" instrument_node=""> which require ignoring neighboring stimuli, and </span><a class="topic-link" data-dcnode-id="9477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/antisaccade" title="Learn more about Antisaccade from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9478" instrument_node="">antisaccade</span></a><span data-dcnode-id="9476" instrument_node=""> tasks which require looking in the opposite direction of a flash, predicted performance on the RPM. Further, significant contributions were found for both an attentional control factor including these measures and a factor based in measures of WMC. These results suggest that the ability to focus one's attention and inhibit irrelevant information relates to performance on the RPM.</span></span></span></p><p data-dcnode-id="9468" id="par0190"><span data-dcnode-id="9472" instrument_node="">Using a reading-with-distraction paradigm, Darowski et al. have demonstrated that susceptibility to distraction has been found to correlate with RPM performance (</span><a class="workspace-trigger" data-dcnode-id="9470" href="#bib0985" name="bbib0985"><span data-dcnode-id="9471" instrument_node="">Darowski, Helder, Zacks, Hasher, &amp; Hambrick, 2008</span></a><span data-dcnode-id="9469" instrument_node="">). In this study, distractibility was measured with reading times on a text containing both italicized and nonitalicized words. Participants were instructed to read only the italicized words and to ignore the nonitalicized words. Longer reading times on this task indicate disruption due to the distracting information, and the results showed the amount of distraction predicted both lower WMC and poorer performance on the RPM.</span></p><p data-dcnode-id="9463" id="par0195"><span data-dcnode-id="9467" instrument_node="">A later experiment adds to this line of reasoning by attempting to determine whether a possible source of distraction during RPM problem solving may be the incorrect responses in the answer bank (</span><a class="workspace-trigger" data-dcnode-id="9465" href="#bib1005" name="bbib1005"><span data-dcnode-id="9466" instrument_node="">Jarosz &amp; Wiley, 2010</span></a><span data-dcnode-id="9464" instrument_node="">). To test this, two versions of original RPM problems were created that either included the most commonly selected incorrect response in the response bank or not. The logic behind this design was that the presence of the most common incorrect response as an option should serve as a salient distracter requiring additional attentional control to ignore compared to a version of the problem without that distracter. The distracter manipulation had a small effect on overall performance, but a large effect on the relation between WMC and RPM. A strong relation between WMC and RPM was found only on the problems containing the most common incorrect response. When the salient distracter was removed from the answer bank, the relation between WMC and RPM was significantly weaker.</span></p><p data-dcnode-id="9461" id="par0200"><span data-dcnode-id="9462" instrument_node="">Taken together, the results in this section suggest that part of the relation between WMC and RPM may be due to individual differences in the ability to control one's attention and resist distraction during the problem-solving task.</span></p></section><section data-dcnode-id="9384" id="sec0085"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9456"><span data-dcnode-id="9459" instrument_node="">4.2.3</span><span data-dcnode-id="9458" instrument_node="">. </span><span data-dcnode-id="9457" instrument_node="">Subsets of Problems Approaches</span></h4><p data-dcnode-id="9454" id="par0205"><span data-dcnode-id="9455" instrument_node="">Another approach to exploring the relation of WMC to RPM has been recognizing that the problem sets that Raven created are not homogeneous. They are composed of many sorts of items that seem to vary along a number of dimensions. Several lines of research have attempted to explore whether some subsets or types of RPM items may be more dependent on WMC than others, with the goal of better understanding what may be driving the classic relationship.</span></p><section data-dcnode-id="9430" id="sec0090"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9450"><span data-dcnode-id="9453" instrument_node="">4.2.3.1</span><span data-dcnode-id="9452" instrument_node="">. </span><span data-dcnode-id="9451" instrument_node="">Novel Rules</span></h5><p data-dcnode-id="9442" id="par0210"><span data-dcnode-id="9449" instrument_node="">For example, </span><a class="workspace-trigger" data-dcnode-id="9447" href="#bib0785" name="bbib0785"><span data-dcnode-id="9448" instrument_node="">Wiley, Jarosz, Cushen, and Colflesh (2011)</span></a><span data-dcnode-id="9446" instrument_node=""> noticed that problems utilizing a combination of rules for the first time had a higher correlation with WMC than problems using a set of rules that had been experienced in a previous problem. This was directly contrary to predictions made by learning accounts, which suggested that WMC may contribute to the learning of rules, such that high WMC individuals might outperform low WMC individuals when rules were repeated later in the set (</span><a class="workspace-trigger" data-dcnode-id="9444" href="#bib0745" name="bbib0745"><span data-dcnode-id="9445" instrument_node="">Verguts &amp; DeBoeck, 2002</span></a><span data-dcnode-id="9443" instrument_node="">). To test this idea, Wiley et al. devised two subsets of 16 RPM items. In one of these subsets, each problem required a novel set of rules to solve. In the other, only four rules were required to solve all of the problems and the problems were presented in blocks by rule. Only performance on the novel rules problem set correlated with WMC. The repeated, blocked rule problem set did not correlate with WMC. Thus, the results suggest that WMC helps RPM problem solving by allowing solvers to identify novel rules or when novel rules are needed.</span></p><p data-dcnode-id="9431" id="par0215"><span data-dcnode-id="9441" instrument_node="">There are a number of ways that better attentional control could explain these results. Problems requiring novel rule combinations could experience proactive interference from previously encountered rules, and attentional control could help to reduce this interference. Resistance to proactive interference has been demonstrated to be one correlate of high WMC (</span><a class="workspace-trigger" data-dcnode-id="9439" href="#bib0895" name="bbib0895"><span data-dcnode-id="9440" instrument_node="">Bunting, 2006</span></a><span data-dcnode-id="9438" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9436" href="#bib0510" name="bbib0510"><span data-dcnode-id="9437" instrument_node="">May et al., 1999</span></a><span data-dcnode-id="9435" instrument_node="">). Relatedly, the ability to effectively retrieve rule-related information from secondary memory could explain these results, especially to the extent that this may help solvers to recognize when old rules do not apply. A third alternative is that being able to keep multiple elements active within the scope of attention may help solvers to recognize new patterns in the stimuli. When multiple features are active within in the focus of attention, one may be able to engage in relational integration and make comparisons (</span><a class="workspace-trigger" data-dcnode-id="9433" href="#bib0565" name="bbib0565"><span data-dcnode-id="9434" instrument_node="">Oberauer, Süß, Wilhelm, &amp; Sander, 2007</span></a><span data-dcnode-id="9432" instrument_node="">). Thus, a larger scope of attention may help solvers to map out the relations between items in the matrices during solution attempts.</span></p></section><section data-dcnode-id="9385" id="sec0095"><h5 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9426"><span data-dcnode-id="9429" instrument_node="">4.2.3.2</span><span data-dcnode-id="9428" instrument_node="">. </span><span data-dcnode-id="9427" instrument_node="">Visual versus Verbal-Analytic Problems</span></h5><p data-dcnode-id="9409" id="par0220"><span data-dcnode-id="9425" instrument_node="">Other researchers have suggested that there may be distinct subsets of items that vary in the way they are solved. The main distinction that is generally made is between an analytic or verbal approach versus a more perceptual or visual approach (</span><a class="workspace-trigger" data-dcnode-id="9423" href="#bib0225" name="bbib0225"><span data-dcnode-id="9424" instrument_node="">Dillon et al., 1981</span></a><span data-dcnode-id="9422" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9420" href="#bib0335" name="bbib0335"><span data-dcnode-id="9421" instrument_node="">Hertzog and Carter, 1988</span></a><span data-dcnode-id="9419" instrument_node="">). For example, </span><a class="workspace-trigger" data-dcnode-id="9417" href="#bib0355" name="bbib0355"><span data-dcnode-id="9418" instrument_node="">Hunt (1974)</span></a><span data-dcnode-id="9416" instrument_node=""> identified two general problem-solving algorithms that could be used to solve the matrices. One algorithm is an analytic strategy that “applies logical operations to features contained within elements of the problem matrix” (</span><a class="workspace-trigger" data-dcnode-id="9414" href="#bib0355" name="bbib0355"><span data-dcnode-id="9415" instrument_node="">Hunt, 1974</span></a><span data-dcnode-id="9413" instrument_node="">, p. 133), while the other is a visual strategy that “deals with a problem by using the operations of visual perception, such as the continuation of lines through blank areas and the superimposition of visual images upon each other” (p. 133). </span><a class="workspace-trigger" data-dcnode-id="9411" href="#bib0215" name="bbib0215"><span data-dcnode-id="9412" instrument_node="">DeShon, Chan, and Weissbein (1995)</span></a><span data-dcnode-id="9410" instrument_node=""> created subsets that seemed to invoke verbal–analytic versus visuospatial solutions, and corroborated this distinction by finding verbal overshadowing effects only for visuospatial problems.</span></p><p data-dcnode-id="9386" id="par0225"><span data-dcnode-id="9408" instrument_node="">Consistent with these earlier distinctions, </span><a class="workspace-trigger" data-dcnode-id="9406" href="#bib0740" name="bbib0740"><span data-dcnode-id="9407" instrument_node="">Van der Ven and Ellis (2000)</span></a><span data-dcnode-id="9405" instrument_node=""> suggested that only a subset of later items in the Standard Progressive Matrices (SPM) rely on reasoning processes for solution. A solution involving reasoning would be one in which the subject must deduce a certain change in the transition from the first element in a row to the next element in a row, and then apply this change in the following row. In contrast, they suggested many early items in the SPM can be solved by relying on principles of Gestalt continuation. A follow-up study by </span><a class="workspace-trigger" data-dcnode-id="9403" href="#bib0470" name="bbib0470"><span data-dcnode-id="9404" instrument_node="">Lynn, Allik, and Irwing (2004)</span></a><span data-dcnode-id="9402" instrument_node=""> produced converging evidence for this distinction. Based on these factor analyses, </span><a class="workspace-trigger" data-dcnode-id="9400" href="#bib0325" name="bbib0325"><span data-dcnode-id="9401" instrument_node="">Gimmig, Huguet, Caverni, and Cury (2006)</span></a><span data-dcnode-id="9399" instrument_node=""> further suggested that Gestalt continuation problems may have low working memory demands because solutions may be obtained through perception of the pattern as a gestalt without the use of reasoning. On the other hand, other problems that do require reasoning should impose more demands, as they may be more likely to be solved via sequential, hypothetical processing (</span><a class="workspace-trigger" data-dcnode-id="9397" href="#bib0470" name="bbib0470"><span data-dcnode-id="9398" instrument_node="">Lynn et al., 2004</span></a><span data-dcnode-id="9396" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9394" href="#bib0515" name="bbib0515"><span data-dcnode-id="9395" instrument_node="">McGrew and Flanagan, 1998</span></a><span data-dcnode-id="9393" instrument_node="">). Using an individual differences approach, Gimmig et al. found that high and low WMC participants did not differ in their performance on the Gestalt completion problems from the SPM. However, significant differences were seen on the verbal-analytic reasoning items, with high WMC participants outperforming the low WMC participants. Thus, similar to performance on math problems, WMC may contribute to performance on at least some RPM problems by supporting sequential, systematic solution processes (</span><a class="workspace-trigger" data-dcnode-id="9391" href="#bib0480" name="bbib0480"><span data-dcnode-id="9392" instrument_node="">Marshalek et al., 1983</span></a><span data-dcnode-id="9390" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9388" href="#bib0550" name="bbib0550"><span data-dcnode-id="9389" instrument_node="">Mulholland et al., 1980</span></a><span data-dcnode-id="9387" instrument_node="">).</span></p></section></section><section data-dcnode-id="9371" id="sec0100"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9380"><span data-dcnode-id="9383" instrument_node="">4.2.4</span><span data-dcnode-id="9382" instrument_node="">. </span><span data-dcnode-id="9381" instrument_node="">Strategy Approaches</span></h4><p data-dcnode-id="9372" id="par0230"><span data-dcnode-id="9379" instrument_node="">In addition to the visual/verbal strategy distinction that is often made based on the items themselves, the literature has suggested that individuals may differ in whether they use constructive matching or response elimination strategies (</span><a class="workspace-trigger" data-dcnode-id="9377" href="#bib0750" name="bbib0750"><span data-dcnode-id="9378" instrument_node="">Vigneau, Caissie, &amp; Bors, 2006</span></a><span data-dcnode-id="9376" instrument_node="">). Using a constructive matching strategy on the RPM entails looking at the matrix, determining what the correct answer should look like, and only then going to the response bank to find the solution. A response elimination strategy, on the other hand, involves examining each potential response, and checking it against the matrix to see if it solves the problem. Research on these strategies suggests that constructive matching may be used by all participants on easy items because the answer is obvious before inspecting the response bank. However, as items become more difficult solvers tend to switch from constructive matching to response elimination strategies. Further, individuals higher in general fluid intelligence (gF) as measured by several tests including the RPM tend to persist longer in using constructive matching strategies (</span><a class="workspace-trigger" data-dcnode-id="9374" href="#bib0875" name="bbib0875"><span data-dcnode-id="9375" instrument_node="">Bethel-Fox, Lohman, &amp; Snow, 1984</span></a><span data-dcnode-id="9373" instrument_node="">). Despite its utility, constructive matching places a heavier burden on processing especially as the complexity of the solutions increase. While no studies have yet examined the direct relation between strategy differences and WMC, the generally high correlation between gF and WMC suggests that high WMC individuals are probably more likely to use constructive matching. This would also be consistent with the suggestion that a constructive matching strategy may require more attentional resources, and thus high WMC participants may be more likely to engage in this more demanding approach to problem solving, rather than relying on solution recognition or perceptually guided solution.</span></p></section><section data-dcnode-id="9358" id="sec0105"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9367"><span data-dcnode-id="9370" instrument_node="">4.2.5</span><span data-dcnode-id="9369" instrument_node="">. </span><span data-dcnode-id="9368" instrument_node="">Effects of Pressure on Performance</span></h4><p data-dcnode-id="9359" id="par0235"><span data-dcnode-id="9366" instrument_node="">Building on the work of </span><a class="workspace-trigger" data-dcnode-id="9364" href="#bib0855" name="bbib0855"><span data-dcnode-id="9365" instrument_node="">Beilock and Carr (2005)</span></a><span data-dcnode-id="9363" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9361" href="#bib0325" name="bbib0325"><span data-dcnode-id="9362" instrument_node="">Gimmig et al. (2006)</span></a><span data-dcnode-id="9360" instrument_node=""> tested for the effects of pressure on performance on the RPM. The participants in this study were all students who had selected concentrations in math or science, and Gimmig et al. manipulated pressure by referring to the RPM either as a measure of analytical reasoning that was highly related to success in math and science, or more simply as a measure of attentional and perceptual capacities. Parallel to the findings with modular math, they found high WMC students in the high-pressure scenario were the most harmed, particularly on the most demanding problems. These students lost the advantage shown by the high WMC participants in the control condition. Gimmig et al. suggest that there may in fact be strategy differences due to WMC under normal conditions, with high WMC individuals utilizing more of a controlled processing approach, and low WMC individuals relying more on automatic processes. Thus, in a situation where WMC is compromised, such as when one is put under pressure, those with low WMC are not affected, while those with high WMC are unable to use the complex methods they would normally use.</span></p></section></section><section data-dcnode-id="9350" id="sec0110"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9353"><span data-dcnode-id="9356" instrument_node="">4.3</span><span data-dcnode-id="9355" instrument_node="">. </span><span data-dcnode-id="9354" instrument_node="">Summary</span></h3><p data-dcnode-id="9351" id="par0240"><span data-dcnode-id="9352" instrument_node="">Although there are still few studies directly testing how WMC affects performance on the RPM, some themes are beginning to emerge. High WMC individuals are better able to deal with distraction, including the presence of a salient distracter among potential solutions to a problem, than low WMC individuals. The role of WMC also seems to vary as a function of several different subtypes of RPM problems. WMC seems to play a role on problems in which a novel rule combination is required. This could potentially be due to the effects of WMC on the ability to resist interference from previously encountered rules, the ability to attend to multiple elements of a problem at once, or the accessibility of rules in memory. WMC may also be more important for problems that cannot be solved perceptually, which may require more systematic, sequential analytic processing. In general, the results support that the superior attentional and executive processes that accompany higher WMC are important for performance on the RPM.</span></p></section></section><section data-dcnode-id="8963" id="sec0115"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9345"><span data-dcnode-id="9348" instrument_node="">5</span><span data-dcnode-id="9347" instrument_node="">. </span><span data-dcnode-id="9346" instrument_node="">Creative Problem Solving</span></h2><p data-dcnode-id="9343" id="par0245"><span data-dcnode-id="9344" instrument_node="">As outlined above, several processes underlying effective problem-solving performance are aided by WMC. One of the main benefits across both math and RPM solving seems to be that WMC helps solvers to focus their attention, resist distraction, or narrow their search through a problem space. However, one can imagine that these aspects of WMC might harm solution on problems that require a broader search of memory or the solution space. Several lines of evidence are now showing that too much focus can actually harm performance on creative or insightful problem-solving tasks, suggesting that solution to these problems may require a different set of processes than those that support solution in the analytic problem-solving tasks discussed above.</span></p><section data-dcnode-id="9298" id="sec0120"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9339"><span data-dcnode-id="9342" instrument_node="">5.1</span><span data-dcnode-id="9341" instrument_node="">. </span><span data-dcnode-id="9340" instrument_node="">A Model of Creative Problem Solving</span></h3><p data-dcnode-id="9334" id="par0250"><span data-dcnode-id="9338" instrument_node="">The creative problem-solving process may start in the same general way as the initial model shown in </span><a class="workspace-trigger" data-dcnode-id="9336" href="#fig0005" name="bfig0005"><span data-dcnode-id="9337" instrument_node="">Figure 1</span></a><span data-dcnode-id="9335" instrument_node=""> that is based in the information processing tradition. A solver must represent the problem and then attempt to solve it. However, a critical distinction between creative and analytic problem solving is that for creative problem solving, the most dominant solutions or most obvious solution paths will not lead to success. When a person approaches a creative problem, the solution requires either a completely original approach or a novel combination of diverse bits of information through remote associations in memory.</span></p><p data-dcnode-id="9323" id="par0255"><span data-dcnode-id="9333" instrument_node="">Given this definition, the Remote Associates Test (RAT) problems created by </span><a class="workspace-trigger" data-dcnode-id="9331" href="#bib0525" name="bbib0525"><span data-dcnode-id="9332" instrument_node="">Mednick (1962)</span></a><span data-dcnode-id="9330" instrument_node=""> have been a popular model for studying the creative problem-solving process. In RAT problems, solvers are presented with three words (such as </span><em data-dcnode-id="9328"><span data-dcnode-id="9329" instrument_node="">High, Book,</span></em><span data-dcnode-id="9327" instrument_node=""> and </span><em data-dcnode-id="9325"><span data-dcnode-id="9326" instrument_node="">Sour</span></em><span data-dcnode-id="9324" instrument_node="">), and asked to find a fourth word that forms a meaningful expression with each of the words. Critically, the solution word for these problems is a weak associate of each of the words. Also note that the solution is typically not one of the first solution words to come to mind. Because the problems are designed so that initial attempts will fail and a search for more remote solutions will be needed, the RAT has become a common paradigm for investigating the insight process. (And, in case you didn’t benefit from the embedded hint above, one answer to the above problem is note.)</span></p><p data-dcnode-id="9321" id="par0260"><span data-dcnode-id="9322" instrument_node="">Other popular models include insight problems, such as Duncker's candle problem, or puzzles such as the Triangle of Coins problem, where initial approaches to solution need to be overcome. In Duncker's candle problem, participants are told they have a candle, matches, and a box of tacks, and their goal is to mount the candle to the wall. An accompanying picture shows that the candle is too large for the participants to use the tacks to directly attach it to the wall, although this is generally the first solution that is suggested. Because the box is initially seen as a container for the tacks and not an object in itself, few participants think of the intended answer of using the box as a candle holder (attaching the box to the wall with the tacks). In the Triangle of Coins problem, 10 coins are arranged in a triangle with one coin on the top row, two on a second row, three on a third row, and four forming the base. The goal is to move just three coins to make the triangle point downward. Initial attempts almost always include attempting to move an intact set of three pennies that form a point to another location, a strategy that will always fail. Thus, these problems are specifically designed to invoke inappropriate approaches to solution that ensure the failure by most solvers in their initial attempts.</span></p><p data-dcnode-id="9304" id="par0265"><span data-dcnode-id="9320" instrument_node="">How does the solver proceed in the face of this initial failure? One possibility is that once a solver reaches impasse, they employ the same strategies to deal with failure as are used in more routine problem solving (</span><a class="workspace-trigger" data-dcnode-id="9318" href="#bib0400" name="bbib0400"><span data-dcnode-id="9319" instrument_node="">Kaplan and Simon, 1990</span></a><span data-dcnode-id="9317" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9315" href="#bib0770" name="bbib0770"><span data-dcnode-id="9316" instrument_node="">Wertheimer, 1954</span></a><span data-dcnode-id="9314" instrument_node="">). That is, they might try making incremental modifications in the solution process, back-tracking in a solution tree, attempting an exhaustive search of the solution space or a systematic search of a space of representations. All of these would depend on WMC for their execution. However, an alternative proposition is that the solution of insight problems may require a different problem-solving approach. Since early Gestalt theorizing, solution via insight has been suggested to require not just incremental tweaking during the solution process, but a more fundamental restructuring of the problem representation in order to achieve solution (</span><a class="workspace-trigger" data-dcnode-id="9312" href="#bib0815" name="bbib0815"><span data-dcnode-id="9313" instrument_node="">Ash et al., 2009</span></a><span data-dcnode-id="9311" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9309" href="#bib0230" name="bbib0230"><span data-dcnode-id="9310" instrument_node="">Duncker, 1945/1972</span></a><span data-dcnode-id="9308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9306" href="#bib0775" name="bbib0775"><span data-dcnode-id="9307" instrument_node="">Wiley, 1998</span></a><span data-dcnode-id="9305" instrument_node="">/1959). The hallmark of insightful problem solving is not the initial failure per se, but what happens once initial solution attempts fail. Further, the critical distinction between analytic and creative problem solving may not just be due to the need to revise an initial representation, but in the way that this can be achieved. In particular, the question is whether insightful solution seems to be the result of intentional, goal-directed processing, or if restructuring is achieved through more automatic processes, operating without controlled attention. This, in turn, would serve to alter the relation between problem-solving success and individual differences in WMC.</span></p><p data-dcnode-id="9299" id="par0270"><span data-dcnode-id="9303" instrument_node="">Because the solutions to creative problems are generally only weakly associated with their initial representations, the path to those solutions may be different than in analytic problem solving. If </span><a class="topic-link" data-dcnode-id="9301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/attentional-control" title="Learn more about Attentional Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9302" instrument_node="">attentional control</span></a><span data-dcnode-id="9300" instrument_node=""> is exercised during creative problem solving to focus attention, then it is possible that only the most accessible (incorrect, dominant, stereotypical) responses may be considered. It may be that a more passive and less directed search process is needed in order for the alternative representations, or remote solution candidates, to be accessed. Thus, a basic distinction between analytic and creative problem solving could be based on the intentionality with which one can engage in search. If insightful solution is generally not accomplished via the same kinds of controlled processing as used in analytic problem solving, this would suggest that either no relationship should be found between individual differences in attentional control and creative problem solving, or, to the extent that attentional control keeps solvers focused in irrelevant features, inappropriate representations, or incorrect portions of the solution space, perhaps even a negative relationship.</span></p></section><section data-dcnode-id="8990" id="sec0125"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9294"><span data-dcnode-id="9297" instrument_node="">5.2</span><span data-dcnode-id="9296" instrument_node="">. </span><span data-dcnode-id="9295" instrument_node="">Studies Examining WMC and Creative Problem Solving</span></h3><p data-dcnode-id="9292" id="par0275"><span data-dcnode-id="9293" instrument_node="">There are now several studies that suggest that the processes used to solve problems analytically and insightfully may differentially load on WMC.</span></p><section data-dcnode-id="9262" id="sec0130"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9288"><span data-dcnode-id="9291" instrument_node="">5.2.1</span><span data-dcnode-id="9290" instrument_node="">. </span><span data-dcnode-id="9289" instrument_node="">Studies Contrasting Creative and Analytic Problem Solving</span></h4><p data-dcnode-id="9283" id="par0280"><span data-dcnode-id="9287" instrument_node="">One of the first studies to explore the relative contribution of WMC to creative and analytic problem solving was reported by </span><a class="workspace-trigger" data-dcnode-id="9285" href="#bib0430" name="bbib0430"><span data-dcnode-id="9286" instrument_node="">Lavric, Forstmeier, and Rippon (2000)</span></a><span data-dcnode-id="9284" instrument_node="">. In this study, they took ERP recordings while participants engaged in problem solving, either alone or concurrently with a tone-counting task. They contrasted performance on Duncker's Candle problem with performance on the immigration version of the Wason 4 Card problem. In this problem, participants are told they are an immigration official and their task is to check the medical form of each passenger. One side of the form indicates whether the passenger is entering the country or is in transit, while the other side of the form lists names of tropical diseases for which the passenger has passed the medical check-up. The participant's duty is to make sure that passengers who enter the country have passed the medical check-up for cholera. They are then shown only one side of a form for four different passengers and asked which forms they need to turn over before they can admit the passenger. This problem requires logical, rule-based reasoning and is therefore an analytic problem.</span></p><p data-dcnode-id="9281" id="par0285"><span data-dcnode-id="9282" instrument_node="">The results from the concurrent tone-counting manipulation demonstrated interference specifically for analytic problem solving. The counting task decreased solution rates for the immigration problem, but it did not influence performance on the candle problem. The authors suggested that this differential effect of secondary task load on performance was due to the planning requirements of the analytic problem, whereas the failure to find a relationship between insight problem solving and load was due to the absence of planning during solution of the insight problem. In addition, event-related potential (ERP) data collected during problem solving revealed greater P300 amplitude over the prefrontal region for the analytic problem relative to the insight problem. Because prior research has suggested that increases in the amplitude of the P300 effect have been linked to working memory demands, these results also suggest that analytic problem solving was more dependent on working memory.</span></p><p data-dcnode-id="9277" id="par0290"><a class="workspace-trigger" data-dcnode-id="9279" href="#bib0820" name="bbib0820"><span data-dcnode-id="9280" instrument_node="">Ash and Wiley (2006)</span></a><span data-dcnode-id="9278" instrument_node=""> also examined the relation of WMC to insight problem solving. To differentiate working memory involvement in the initial search phase of problem solving and the subsequent phase of solution following impasse, Ash and Wiley developed two versions of a set of insight problems. For each problem in the set, there was a many moves available (MMA) version and few moves available (FMA) version. FMA problems were created by restricting the number of possible moves a participant could consider in the initial search phase of problem solving, decreasing the processing needed to reach impasse. On the other hand MMA problems included a greater number of possible solution attempts. Importantly, other than the number of incorrect moves that were available, the underlying solutions to both versions of the problem were the same. Both versions of the problems required restructuring of an initial problem representation in order to generate the problems’ solutions. Using an individual differences approach, Ash and Wiley observed that WMC only predicted solving success on MMA but not FMA problems. Because FMA problems isolated the restructuring component of the problems, these results suggest that restructuring during insightful solution does not require controlled attention, whereas the search through the initial problem space in the MMA problems does.</span></p><p data-dcnode-id="9273" id="par0295"><a class="workspace-trigger" data-dcnode-id="9275" href="#bib0260" name="bbib0260"><span data-dcnode-id="9276" instrument_node="">Fleck (2008)</span></a><span data-dcnode-id="9274" instrument_node=""> has also used an individual differences approach to examine the relative contribution of WMC to analytic and insightful problem solving. In her study, participants attempted to solve sets of both analytic and insight problems. Importantly, in addition to measures of WMC (complex span tasks requiring both storage and processing), participants also completed simple STM span measures (requiring only storage). The addition of these measures nicely allows one to disentangle the “storage” portion of WMC from the attentional control portion. With these data, Fleck was able to find that WMC did uniquely predict analytic problem-solving performance over and above the effects of the short-term measures, while insight problem solving was only uniquely related to the short-term measures. This study makes the very cogent point that all forms of problem solving may rely on STM storage in order for the solver to engage in basic problem representation and solution processes. However, one can see that the part of WMC that allows for attentional control during solution is specifically related to the solution of analytic problems. Another nice aspect of this study is that Fleck also collected think-aloud data to verify that solutions to insight problems were indeed more likely to occur via a change in the problem representation. Thus, Fleck's results suggest that the restructuring processes used in insightful problems do not seem to require attentional control.</span></p><p data-dcnode-id="9265" id="par0300"><span data-dcnode-id="9272" instrument_node="">Converging support for this conclusion comes from a subsequent study by </span><a class="workspace-trigger" data-dcnode-id="9270" href="#bib0315" name="bbib0315"><span data-dcnode-id="9271" instrument_node="">Gilhooly and Fioratou (2009)</span></a><span data-dcnode-id="9269" instrument_node=""> who also explored the relation of WMC to performance on insight and non-insight problem solving. In this study, instead of STM measures, they collected specific executive functioning measures requiring task switching (i.e., alternating between adding and subtracting 3 for a number list). Following the logic of </span><a class="workspace-trigger" data-dcnode-id="9267" href="#bib0260" name="bbib0260"><span data-dcnode-id="9268" instrument_node="">Fleck (2008)</span></a><span data-dcnode-id="9266" instrument_node=""> that working memory span measures tap both storage and executive functions, one might expect measures of WMC to correlate with both types of problem solving, whereas measures of executive functioning should only predict analytic problem solving. Indeed this was the case, as Gilhooly and Fioratou found that attentional control ability, measured by the task switching measures in this study, only predicted performance on the noninsight problems.</span></p><p data-dcnode-id="9263" id="par0305"><span data-dcnode-id="9264" instrument_node="">In sum, there are now several findings that have demonstrated that WMC, and the attentional control processes associated with WMC in particular, play a much more supportive role in analytic problem solving than insightful problem solving. Several findings suggest the restructuring processes involved in insight problem solving do not seem to depend on attentional control.</span></p></section><section data-dcnode-id="9061" id="sec0135"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9258"><span data-dcnode-id="9261" instrument_node="">5.2.2</span><span data-dcnode-id="9260" instrument_node="">. </span><span data-dcnode-id="9259" instrument_node="">When WMC Impedes Creative Problem Solving</span></h4><p data-dcnode-id="9244" id="par0310"><span data-dcnode-id="9257" instrument_node="">There is still another handful of studies that makes a more extreme observation. A provocative suggestion is that some of the very mechanisms that allow for successful solution for analytic problems might actually impair performance on creative problems. This was first demonstrated not with a study on WMC, but rather with a study examining the effects of domain-specific knowledge on creative problem solving (</span><a class="workspace-trigger" data-dcnode-id="9255" href="#bib0780" name="bbib0780"><span data-dcnode-id="9256" instrument_node="">Wiley, 1998</span></a><span data-dcnode-id="9254" instrument_node="">). Expertise generally aids problem solving by allowing solvers to restrict their attention to promising alternatives and search only a portion of the solution space. However, when solutions reside outside the range of typical responses, then does expertise still aid problem solving? To investigate this, Wiley created a special version of the RAT with some items related to baseball expressions. Further, the main target problems were ones in which the relation to baseball was misleading (</span><em data-dcnode-id="9252"><span data-dcnode-id="9253" instrument_node="">plate, broken, shot</span></em><span data-dcnode-id="9251" instrument_node="">). That is, the first word of each RAT problem could form a baseball-related expression with a potential solution word (</span><em data-dcnode-id="9249"><span data-dcnode-id="9250" instrument_node="">home plate</span></em><span data-dcnode-id="9248" instrument_node="">), and that solution word also formed a good phrase with the second word (</span><em data-dcnode-id="9246"><span data-dcnode-id="9247" instrument_node="">broken home</span></em><span data-dcnode-id="9245" instrument_node="">), but not the third. Baseball experts and novices were tested for their ability to solve both neutral and baseball-misleading RAT problems. Importantly, the two groups did not differ in their solution of the neutral problems. However, the baseball experts were much less likely to solve the baseball-misleading problems, and were more likely to intrude the baseball-related solutions, even though they knew they were incorrect. An explanation for this result is that the experts had used their prior knowledge to narrow their search space and activate candidate responses. The presence of these highly activated responses then prevented them from finding the remote, nonbaseball associates needed to solve the misleading RAT problems. The experts seemed to experience mental set and were fixated by their own knowledge, leaving them unable to engage in the broad search of memory required to solve the misleading problems. These results suggest that mechanisms that generally act to narrow the search space and improve performance in routine problem-solving circumstances may work against finding solutions in novel circumstances that require creativity.</span></p><p data-dcnode-id="9239" id="par0315"><span data-dcnode-id="9243" instrument_node="">A follow-up investigation added individual differences in WMC to this paradigm (</span><a class="workspace-trigger" data-dcnode-id="9241" href="#bib0610" name="bbib0610"><span data-dcnode-id="9242" instrument_node="">Ricks, Turley-Ames, &amp; Wiley, 2007</span></a><span data-dcnode-id="9240" instrument_node="">). Based on most prior research on problem solving, one generally would expect the best performance in a condition where participants have expertise and high WMC. The interesting finding in this study is that it was exactly those participants who were the least likely to be able to solve the misleading RAT problems. High WMC participants who were fixated by their prior knowledge of baseball were the least likely to overcome their mental sets and reach creative solutions.</span></p><p data-dcnode-id="9204" id="par0320"><span data-dcnode-id="9234"><span data-dcnode-id="9238" instrument_node="">Another study using patients with lateral </span><a class="topic-link" data-dcnode-id="9236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/prefrontal-cortex" title="Learn more about Prefrontal Cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9237" instrument_node="">prefrontal cortex</span></a><span data-dcnode-id="9235" instrument_node=""> lesions suggests that poor executive functioning may contribute to more creative problem solving (</span></span><a class="workspace-trigger" data-dcnode-id="9232" href="#bib0605" name="bbib0605"><span data-dcnode-id="9233" instrument_node="">Reverberi, Toraldo, D’Agostini, &amp; Skrap, 2005</span></a><span data-dcnode-id="9231" instrument_node="">). These solvers may be less fixated by their prior knowledge, or less likely to use it to limit their solution space. To examine this hypothesis, this study utilized both simple and difficult matchstick arithmetic problems as their stimuli. A matchstick arithmetic problem (</span><a class="workspace-trigger" data-dcnode-id="9229" href="#bib0420" name="bbib0420"><span data-dcnode-id="9230" instrument_node="">Knoblich, Ohlsson, Haider, &amp; Rhenius, 1999</span></a><span data-dcnode-id="9228" instrument_node="">) consists of a false arithmetic statement written with roman numerals (I, II, V, X) and arithmetic symbols (+, x, =) constructed out of matchsticks. For example, in the problem II</span><span data-dcnode-id="9227" instrument_node="">&nbsp;</span><span data-dcnode-id="9226" instrument_node="">=</span><span data-dcnode-id="9225" instrument_node="">&nbsp;</span><span data-dcnode-id="9224" instrument_node="">III</span><span data-dcnode-id="9223" instrument_node="">&nbsp;</span><span data-dcnode-id="9222" instrument_node="">+</span><span data-dcnode-id="9221" instrument_node="">&nbsp;</span><span data-dcnode-id="9220" instrument_node="">I, the participant is required to move a single stick to transform the initial false statement into a true arithmetic statement. The basic rules are that only one stick can be moved, a stick cannot be discarded, and a slanted stick cannot be interpreted as a vertical stick (and vice versa). Lateral-frontal patients performed equally as well as nonpatient controls on simple problems such as this example. Both groups were able to find the correct response over 90% of the time. However, other problems were more difficult, such as VI</span><span data-dcnode-id="9219" instrument_node="">&nbsp;</span><span data-dcnode-id="9218" instrument_node="">=</span><span data-dcnode-id="9217" instrument_node="">&nbsp;</span><span data-dcnode-id="9216" instrument_node="">VI</span><span data-dcnode-id="9215" instrument_node="">&nbsp;</span><span data-dcnode-id="9214" instrument_node="">+</span><span data-dcnode-id="9213" instrument_node="">&nbsp;</span><span data-dcnode-id="9208"><span data-dcnode-id="9212" instrument_node="">VI. On these problems, which were meant to be solved using a tautological expression, the frontal patients were significantly more successful, solving the problem over 80% of the time compared to less than 50% for the nonpatient controls. Although measures of WMC were not obtained, one would suspect that these frontal patients would do poorly on complex span tasks, due to the established relation of the </span><a class="topic-link" data-dcnode-id="9210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/dorsolateral-prefrontal-cortex" title="Learn more about Dorsolateral Prefrontal Cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9211" instrument_node="">dorsolateral prefrontal cortex</span></a><span data-dcnode-id="9209" instrument_node=""> (DLPFC) to the control of attention (</span></span><a class="workspace-trigger" data-dcnode-id="9206" href="#bib0390" name="bbib0390"><span data-dcnode-id="9207" instrument_node="">Kane &amp; Engle, 2002</span></a><span data-dcnode-id="9205" instrument_node="">).</span></p><p data-dcnode-id="9172" id="par0325"><span data-dcnode-id="9203" instrument_node="">Returning to studies using WMC measures specifically, </span><a class="workspace-trigger" data-dcnode-id="9201" href="#bib0860" name="bbib0860"><span data-dcnode-id="9202" instrument_node="">Beilock and DeCaro (2007)</span></a><span data-dcnode-id="9200" instrument_node=""> have also demonstrated that low WMC participants can outperform high WMC participants when a creative approach is required. In this study, they had individuals perform Luchins’ water jug task that consists of a series of math problems. On each trial in this task, participants are given an unlimited supply of water, three jug sizes, and a target quantity of water to be achieved through a sequence of addition and/or subtraction operations. So for example, in the first trial, participants may get the jug sizes 23, 96, and 3 with a goal of ending up with only 67 gallons of water. To accomplish this goal, they would need to fill the biggest jug with water, and then use the first jug to scoop out 23 gallons, and the third jug (twice) to remove 6 gallons. This procedure can be represented as b–a–2c. This formula was the only method of solution for the first three trials in a set of six. However, the final three trials (for example, A</span><span data-dcnode-id="9199" instrument_node="">&nbsp;</span><span data-dcnode-id="9198" instrument_node="">=</span><span data-dcnode-id="9197" instrument_node="">&nbsp;</span><span data-dcnode-id="9196" instrument_node="">15, B</span><span data-dcnode-id="9195" instrument_node="">&nbsp;</span><span data-dcnode-id="9194" instrument_node="">=</span><span data-dcnode-id="9193" instrument_node="">&nbsp;</span><span data-dcnode-id="9192" instrument_node="">39, C</span><span data-dcnode-id="9191" instrument_node="">&nbsp;</span><span data-dcnode-id="9190" instrument_node="">=</span><span data-dcnode-id="9189" instrument_node="">&nbsp;</span><span data-dcnode-id="9188" instrument_node="">3, Goal</span><span data-dcnode-id="9187" instrument_node="">&nbsp;</span><span data-dcnode-id="9186" instrument_node="">=</span><span data-dcnode-id="9185" instrument_node="">&nbsp;</span><span data-dcnode-id="9184" instrument_node="">18) were designed so that both the complex strategy worked, as well as a much simpler one (C</span><span data-dcnode-id="9183" instrument_node="">&nbsp;</span><span data-dcnode-id="9182" instrument_node="">–</span><span data-dcnode-id="9181" instrument_node="">&nbsp;</span><span data-dcnode-id="9180" instrument_node="">A or A</span><span data-dcnode-id="9179" instrument_node="">&nbsp;</span><span data-dcnode-id="9178" instrument_node="">+</span><span data-dcnode-id="9177" instrument_node="">&nbsp;</span><span data-dcnode-id="9176" instrument_node="">C). The interesting result here was that the higher individuals’ WMC, the less likely they were to find this creative solution. The high WMC participants experienced greater </span><em data-dcnode-id="9174"><span data-dcnode-id="9175" instrument_node="">Einstellung</span></em><span data-dcnode-id="9173" instrument_node="">, and seemed to be blinded to the possibility of the shortcut. Because all individuals were instructed to solve the problems using the simplest strategy possible, these results show that low WMC participants were better able to succeed on this task requiring breaking of mental set.</span></p><p data-dcnode-id="9164" id="par0450"><span data-dcnode-id="9171" instrument_node="">These results also suggest that sometimes high WMC participants may attempt to use complex strategies when simpler, more elegant, or more direct approaches are available. Similar results have been seen in studies of correlation detection (</span><a class="workspace-trigger" data-dcnode-id="9169" href="#bib0275" name="bbib0275"><span data-dcnode-id="9170" instrument_node="">Gaissmaier, Schooler, &amp; Rieskamp, 2006</span></a><span data-dcnode-id="9168" instrument_node="">), where high WMC participants attempt to fit more complex and less parsimonious patterns to data than low WMC participants. Poorer performance of high WMC participants has also been demonstrated in category learning tasks, where high WMC participants show particularly poor learning when categories are based in similarity. High WMC participants seem to perseverate on attempting to use rule-based hypothesis testing to determine category membership, whereas low WMC participants seem to more easily abstract these categories from exposure (</span><a class="workspace-trigger" data-dcnode-id="9166" href="#bib0205" name="bbib0205"><span data-dcnode-id="9167" instrument_node="">DeCaro, Thomas, &amp; Beilock, 2008</span></a><span data-dcnode-id="9165" instrument_node="">).</span></p><p data-dcnode-id="9156" id="par0335"><span data-dcnode-id="9163" instrument_node="">This collection of results suggests that poor attentional control might allow for the consideration of a broader range of solutions during creative problem solving. A second collection of studies suggests that less attentional control can also benefit creative problem solving through increased sensitivity to peripheral cues. One population in particular that tends to exhibit low WMC and poor attentional control is older adults. This tends to lead to less ability to focus and increased distractibility, which generally has negative effects on cognitive performance. However, one particular case in which benefits can be seen is when “distracting” information from an earlier task actually provides solution-related cues for later RAT problems. </span><a class="workspace-trigger" data-dcnode-id="9161" href="#bib0405" name="bbib0405"><span data-dcnode-id="9162" instrument_node="">Kim, Hasher, and Zacks (2007)</span></a><span data-dcnode-id="9160" instrument_node=""> demonstrated this using a “reading with distraction” paradigm. In this version of the task, some of the distracting words were actually solutions to a subsequent set of RAT problems. Older adults showed significant increases in solution due to the distracting words, whereas younger adults did not. </span><a class="workspace-trigger" data-dcnode-id="9158" href="#bib0505" name="bbib0505"><span data-dcnode-id="9159" instrument_node="">May (1999)</span></a><span data-dcnode-id="9157" instrument_node=""> found similar results with distracting words presented at the same time as the RAT problems. Older adults were marginally more likely to benefit from distracting words that primed the correct solution. In addition, May also found time-of-day effects. Both younger and older adults showed more benefit from the distracters when they performed the RAT task during their off-peak times.</span></p><p data-dcnode-id="9139" id="par0340"><span data-dcnode-id="9155" instrument_node="">In a similar line of work, </span><a class="workspace-trigger" data-dcnode-id="9153" href="#bib0810" name="bbib0810"><span data-dcnode-id="9154" instrument_node="">Ansburg and Hill (2003)</span></a><span data-dcnode-id="9152" instrument_node=""> attempted to directly measure individual differences in sensitivity to peripheral cues, and related this measure to RAT problem-solving performance. Following the work of </span><a class="workspace-trigger" data-dcnode-id="9150" href="#bib0535" name="bbib0535"><span data-dcnode-id="9151" instrument_node="">Mendelsohn and Griswold (1966)</span></a><span data-dcnode-id="9149" instrument_node="">, participants were exposed to background noise that actually contained words that would be the answers to later anagram problems. The increase in performance on hinted over unhinted anagrams provided a measure of each individual's sensitivity to peripheral cues. Interestingly, this paradigm bears strong similarity to the cocktail party effect (the ability to hear one's name when presented to an unattended channel) which has been demonstrated to be related to WMC. Low WMC participants are more likely to hear their name when they are instructed </span><em data-dcnode-id="9147"><span data-dcnode-id="9148" instrument_node="">not to attend</span></em><span data-dcnode-id="9146" instrument_node=""> to the second channel (</span><a class="workspace-trigger" data-dcnode-id="9144" href="#bib0950" name="bbib0950"><span data-dcnode-id="9145" instrument_node="">Conway, Cowan, &amp; Bunting, 2001</span></a><span data-dcnode-id="9143" instrument_node="">). The peripheral sensitivity scores derived from the anagram task were then correlated with measures of both creative problem solving (RAT) and analytic problem-solving (deductive reasoning) performance. While the relation between sensitivity scores and performance on the analytic problems was slightly negative, it was not significant. However, replicating the earlier work of </span><a class="workspace-trigger" data-dcnode-id="9141" href="#bib0535" name="bbib0535"><span data-dcnode-id="9142" instrument_node="">Mendelsohn and Griswold (1966)</span></a><span data-dcnode-id="9140" instrument_node="">, RAT performance was found to be significantly related to the ability to take advantage of peripherally presented cues. Thus a deficit in attentional control positively predicted performance on a creative problem-solving task. This suggests that “leaky” attention can sometimes be a good thing. It allows external cues to prime a range of solutions during the creative problem-solving process.</span></p><p data-dcnode-id="9134" id="par0345"><span data-dcnode-id="9138" instrument_node="">Another study demonstrates a link between attentional control and creative problem solving in yet another way—through manipulating attentional control via intoxication by alcohol (</span><a class="workspace-trigger" data-dcnode-id="9136" href="#bib1000" name="bbib1000"><span data-dcnode-id="9137" instrument_node="">Jarosz, Colflesh, &amp; Wiley, 2010</span></a><span data-dcnode-id="9135" instrument_node="">). After reaching a 0.08 Blood Alcohol Content, participants experienced a significant decrease in WMC as measured by complex span tasks both as compared to themselves sober, as well as to a matched control group of sober participants. At the same time, performance was improved on RAT problem-solving tasks versus the control group. This suggests that instead of narrowing the focus of attention, drinking makes attention more diffuse, which allowed the intoxicated participants to find the remote solutions to the RAT problems.</span></p><p data-dcnode-id="9117" id="par0350"><span data-dcnode-id="9133" instrument_node="">Similar findings have been found with studies using sleep states. This work builds on the idea that rapid eye movement (REM) sleep is thought to specifically decrease the activation of the cognitive control systems, as REM is marked by decreased cortical arousal in frontal areas and decreased noradrenergic activity relative to non-REM (NREM) sleep. Subjects awoken from REM sleep are better at solving anagrams compared to when awoken from NREM sleep (</span><a class="workspace-trigger" data-dcnode-id="9131" href="#bib0765" name="bbib0765"><span data-dcnode-id="9132" instrument_node="">Walker, Liston, Hobson, &amp; Stickgold, 2002</span></a><span data-dcnode-id="9130" instrument_node="">) and show improved access to distant semantic relations between concepts (</span><a class="workspace-trigger" data-dcnode-id="9128" href="#bib0690" name="bbib0690"><span data-dcnode-id="9129" instrument_node="">Stickgold, Scott, Rittenhouse, &amp; Hobson, 1999</span></a><span data-dcnode-id="9127" instrument_node="">). Subjects are also quicker to solve anagrams when lying down than when standing (</span><a class="workspace-trigger" data-dcnode-id="9125" href="#bib0460" name="bbib0460"><span data-dcnode-id="9126" instrument_node="">Lipnicki &amp; Byrne, 2005</span></a><span data-dcnode-id="9124" instrument_node="">), an effect also linked to lower noradrenergic system activity. Thus, lowering cognitive control and arousal during REM sleep, probably via alteration of adrenergic activity, seems to enable a transition from goal-directed thinking to a more associative, creative mode. As a result, participants who are exposed to problems and then sleep on it have been found to outperform waking controls in solving RAT problems (</span><a class="workspace-trigger" data-dcnode-id="9122" href="#bib0905" name="bbib0905"><span data-dcnode-id="9123" instrument_node="">Cai, Mednick, Harrison, Kanady, &amp; Mednick, 2009</span></a><span data-dcnode-id="9121" instrument_node="">) and are more likely to abstract a hidden relation in a number sequencing task (</span><a class="workspace-trigger" data-dcnode-id="9119" href="#bib0760" name="bbib0760"><span data-dcnode-id="9120" instrument_node="">Wagner, Gais, Haider, Verleger, &amp; Born, 2004</span></a><span data-dcnode-id="9118" instrument_node="">).</span></p><p data-dcnode-id="9103" id="par0355"><span data-dcnode-id="9116" instrument_node="">Another context that has long been thought to influence creative problem solving is mood, based in early work showing that positive affect can lead to improved performance on both RAT tasks and classic insight problems by broadening the scope of attention (</span><a class="workspace-trigger" data-dcnode-id="9114" href="#bib0280" name="bbib0280"><span data-dcnode-id="9115" instrument_node="">Gasper and Clore, 2002</span></a><span data-dcnode-id="9113" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9111" href="#bib0365" name="bbib0365"><span data-dcnode-id="9112" instrument_node="">Isen et al., 1987</span></a><span data-dcnode-id="9110" instrument_node="">). A parallel literature explores how priming “approach” or “avoidance” processing styles has similar effects, with findings showing selectively better performance on creative problems when primed with an “approach” motivation and on analytic problems when primed with an “avoidance” motivation (c.f. </span><a class="workspace-trigger" data-dcnode-id="9108" href="#bib0265" name="bbib0265"><span data-dcnode-id="9109" instrument_node="">Friedman and Förster, 2000</span></a><span data-dcnode-id="9107" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9105" href="#bib0655" name="bbib0655"><span data-dcnode-id="9106" instrument_node="">Schwarz and Bless, 1991</span></a><span data-dcnode-id="9104" instrument_node="">).</span></p><p data-dcnode-id="9075" id="par0360"><span data-dcnode-id="9102" instrument_node="">While negative affect has been proposed to narrow or focus attention, a study by </span><a class="workspace-trigger" data-dcnode-id="9100" href="#bib0630" name="bbib0630"><span data-dcnode-id="9101" instrument_node="">Rowe, Hirsh, and Anderson (2007)</span></a><span data-dcnode-id="9091"><span data-dcnode-id="9099" instrument_node=""> nicely demonstrates that positive affect serves to broaden it. They examined this hypothesis using two different tasks: the </span><a class="topic-link" data-dcnode-id="9097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/flanker-task" title="Learn more about Flanker Task from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9098" instrument_node="">flanker task</span></a><span data-dcnode-id="9092"><span data-dcnode-id="9096" instrument_node=""> and the RAT task. They found that positive affect impaired performance on the visual selective attention task, but enhanced performance on the RAT. Further, the amount of impairment in the flanker task predicted improvement on the RAT, suggesting that both effects were due to changes in attention allocation. Here, positive mood states were said to relax </span><a class="topic-link" data-dcnode-id="9094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/inhibitory-control" title="Learn more about Inhibitory Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9095" instrument_node="">inhibitory control</span></a><span data-dcnode-id="9093" instrument_node="">, which broadened the scope of attention, and led to more creative problem solving. This interpretation of this study is also consistent with the suggestion that creative people, and the brain states that underlie creativity, may be characterized by a </span></span></span><em data-dcnode-id="9089"><span data-dcnode-id="9090" instrument_node="">lack</span></em><span data-dcnode-id="9088" instrument_node=""> of inhibition (</span><a class="workspace-trigger" data-dcnode-id="9086" href="#bib0250" name="bbib0250"><span data-dcnode-id="9087" instrument_node="">Eysenck, 1995</span></a><span data-dcnode-id="9085" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9083" href="#bib0485" name="bbib0485"><span data-dcnode-id="9084" instrument_node="">Martindale, 1999</span></a><span data-dcnode-id="9082" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9080" href="#bib0495" name="bbib0495"><span data-dcnode-id="9081" instrument_node="">Martindale and Hines, 1975</span></a><span data-dcnode-id="9079" instrument_node="">). In particular, </span><a class="workspace-trigger" data-dcnode-id="9077" href="#bib0920" name="bbib0920"><span data-dcnode-id="9078" instrument_node="">Carson, Peterson, and Higgins (2003)</span></a><span data-dcnode-id="9076" instrument_node=""> found that latent inhibition was lower in a sample of subjects rated as high creative achievers than in a sample of low creative achievers.</span></p><p data-dcnode-id="9064" id="par0365"><span data-dcnode-id="9074" instrument_node="">These results are also consistent with a number of other studies suggesting that diffuse attention is better for creativity. According to </span><a class="workspace-trigger" data-dcnode-id="9072" href="#bib0255" name="bbib0255"><span data-dcnode-id="9073" instrument_node="">Finke, Ward, and Smith (1992)</span></a><span data-dcnode-id="9071" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="9069" href="#bib0490" name="bbib0490"><span data-dcnode-id="9070" instrument_node="">Martindale (1995)</span></a><span data-dcnode-id="9068" instrument_node="">, focused attention increases the probability that strong associates will be accessed while diffuse attention increases the likelihood that remote associates will be accessed. Thus, individuals who are able to cast broad attentional nets are more likely to capture unexpected cues and to generate remote associations than are those whose cognitive resources are more narrowly focused. Other work with dichotic listening tasks (</span><a class="workspace-trigger" data-dcnode-id="9066" href="#bib0235" name="bbib0235"><span data-dcnode-id="9067" instrument_node="">Dykes &amp; McGhie, 1976</span></a><span data-dcnode-id="9065" instrument_node="">) has shown that samples of individuals with more creative achievements have more difficulty ignoring a second channel of information than do those with fewer creative achievements. While the low creative individuals are able to maintain a more narrow focus of attention, highly creative individuals show more shadowing errors. Based on this finding, Dykes and McGhie suggested that creative individuals may habitually sample a wider range of environmental input than do other individuals which contributes to their creativity.</span></p><p data-dcnode-id="9062" id="par0370"><span data-dcnode-id="9063" instrument_node="">Taken together, the results of these studies suggest that “better” attentional control may limit creativity. It may support an approach during problem solving that is sometimes too selective or too persistent. Exercising attentional control during creative problem solving may limit the scope of solutions that are explored. It may also lead solvers to adopt nonoptimal strategies. It appears that sometimes a more passive approach, or a more diffuse or leaky attentional state is better, and creative problem solving is one of those times.</span></p></section><section data-dcnode-id="8991" id="sec0140"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9057"><span data-dcnode-id="9060" instrument_node="">5.2.3</span><span data-dcnode-id="9059" instrument_node="">. </span><span data-dcnode-id="9058" instrument_node="">When WMC Aids Creative Problem Solving</span></h4><p data-dcnode-id="9049" id="par0375"><span data-dcnode-id="9056" instrument_node="">Despite the results outlined above, it is not the case that that WMC cannot help with some aspects of the creative problem-solving process. </span><a class="workspace-trigger" data-dcnode-id="9054" href="#bib0570" name="bbib0570"><span data-dcnode-id="9055" instrument_node="">Ormerod, MacGregor, and Chronicle (2002)</span></a><span data-dcnode-id="9053" instrument_node=""> suggested that the solution of any problem may contain both insightful and analytic processes. Participants who misrepresent a problem need to exhaust the available search space before reaching the point of impasse that could set the stage for restructuring. During the search of the problem space for an insight problem, Ormerod et al. observed that participants applied the hill climbing heuristic, selecting moves that brought them closer to the configuration of the solution. Impasse occurred when solvers were unable to select a move that reduced the distance to the goal. Thus, up until impasse, solution proceeded in the same manner as one would expect in analytic problem solving. As mentioned above, </span><a class="workspace-trigger" data-dcnode-id="9051" href="#bib0820" name="bbib0820"><span data-dcnode-id="9052" instrument_node="">Ash and Wiley (2006)</span></a><span data-dcnode-id="9050" instrument_node=""> directly tested this notion that WMC can play a positive role in the initial stages insightful problem solving when there are a number of steps or alternatives that need to be considered before the solver can reach impasse. A positive relation with WMC was indeed found on the MMA problems. However, their results also suggested that the restructuring portion of solution (as represented by the FMA problems) did not depend on these resources.</span></p><p data-dcnode-id="9041" id="par0380"><span data-dcnode-id="9048" instrument_node="">Similarly, both analytic and insight problem solving seem to depend on the storage component of WMC. Both </span><a class="workspace-trigger" data-dcnode-id="9046" href="#bib0260" name="bbib0260"><span data-dcnode-id="9047" instrument_node="">Fleck (2008)</span></a><span data-dcnode-id="9045" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="9043" href="#bib0315" name="bbib0315"><span data-dcnode-id="9044" instrument_node="">Gilhooly and Fioratou (2009)</span></a><span data-dcnode-id="9042" instrumen
