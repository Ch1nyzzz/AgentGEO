t_node=""> reported significant correlations between WMC and insight problem solving. However, these results were then clarified by isolating the relation to the parts of WMC that relate to storage processes.</span></p><p data-dcnode-id="9033" id="par0385"><span data-dcnode-id="9040" instrument_node="">Another way in which WMC may contribute similarly to both analytic and insightful problem solving is that WMC may help solvers take advantage of hints or warnings while solving problems. </span><a class="workspace-trigger" data-dcnode-id="9038" href="#bib0930" name="bbib0930"><span data-dcnode-id="9039" instrument_node="">Chein, Weisberg, Streeter, and Kwok (2010)</span></a><span data-dcnode-id="9037" instrument_node=""> have shown that WMC relates to the ability to solve the nine-dot problem when given a hint, while </span><a class="workspace-trigger" data-dcnode-id="9035" href="#bib0695" name="bbib0695"><span data-dcnode-id="9036" instrument_node="">Storm and Angello (2010)</span></a><span data-dcnode-id="9034" instrument_node=""> have shown that a measure of inhibitory control relates to the ability to ignore fixating information when solvers are directly instructed to do so. In the Storm and Angello study, solvers who showed higher levels of retrieval induced forgetting (a form of inhibitory processing) were the best able to avoid fixation from distracting associates presented in a paired associates learning task before the RAT which they were explicitly told to ignore. However, although it was not significant, there was a tendency for this same inhibitory control measure to be negatively related to RAT problem solving in the nonfixated, no warning condition.</span></p><p data-dcnode-id="9022" id="par0390"><span data-dcnode-id="9032" instrument_node="">Another general approach that implicates a relation between WMC and insightful problem solving recognizes that even creative problem solving requires a mix of convergent and divergent processes (</span><a class="workspace-trigger" data-dcnode-id="9030" href="#bib0490" name="bbib0490"><span data-dcnode-id="9031" instrument_node="">Martindale, 1995</span></a><span data-dcnode-id="9029" instrument_node="">) or said another way, a mix of nongoal-directed associative processes and more controlled, attention-demanding processes (</span><a class="workspace-trigger" data-dcnode-id="9027" href="#bib0680" name="bbib0680"><span data-dcnode-id="9028" instrument_node="">Smallwood &amp; Schooler, 2006</span></a><span data-dcnode-id="9026" instrument_node="">). Although a main contention is that creative problem solving may rely </span><em data-dcnode-id="9024"><span data-dcnode-id="9025" instrument_node="">to a greater extent</span></em><span data-dcnode-id="9023" instrument_node=""> on such constructs as divergent thought or nonintentional processing than analytic problem solving, especially during the restructuring phase, in the end some aspects of attentional control are also needed to solve creative problems. For example, in the Carson et al. study cited above, it was actually only high IQ participants who were able to take advantage of low levels of latent inhibition. The authors suggested that although highly creative individuals may have to access a greater range of unfiltered stimuli (which increases the odds of discovering novel combinations of ideas), other cognitive strengths such as high IQ may need to be present.</span></p><p data-dcnode-id="9005" id="par0395"><span data-dcnode-id="9021" instrument_node="">These findings also do not imply that those with low WMC or a broad attentional capacity will necessarily be creative. Instead, it is better to think of the tendency to allocate attention in a diffuse way as a cognitive propensity that may serve to promote creative solutions (</span><a class="workspace-trigger" data-dcnode-id="9019" href="#bib0530" name="bbib0530"><span data-dcnode-id="9020" instrument_node="">Mendelsohn, 1976</span></a><span data-dcnode-id="9018" instrument_node="">). Alternatively, advantages in creative processing may be more likely to be found among people who are able to flexibly switch between different modes or types of processing. This has long been an attractive idea, but there is not yet a definitive paradigm that allows for measurement of an individual difference factor along these lines. Some promising leads have demonstrated that bilinguals have an increased likelihood of solving insight versus analytic problems as compared to monolinguals (</span><a class="workspace-trigger" data-dcnode-id="9016" href="#bib0970" name="bbib0970"><span data-dcnode-id="9017" instrument_node="">Cushen &amp; Wiley, 2011</span></a><span data-dcnode-id="9015" instrument_node="">). This has been attributed to the flexibility in executive functioning that develops as part of early experiences with multiple languages which has also been demonstrated to lead to advantages on tasks such as ambiguous figure reversal (the ability to see the same object in multiple ways, </span><a class="workspace-trigger" data-dcnode-id="9013" href="#bib0880" name="bbib0880"><span data-dcnode-id="9014" instrument_node="">Bialystok &amp; Shapero, 2005</span></a><span data-dcnode-id="9012" instrument_node="">). Another study has also found that individual differences in ambiguous figure reversal can be shown to predict creativity on a set of production tasks (</span><a class="workspace-trigger" data-dcnode-id="9010" href="#bib0790" name="bbib0790"><span data-dcnode-id="9011" instrument_node="">Wiseman, Watt, Gilhooly, &amp; Georgiou, 2011</span></a><span data-dcnode-id="9009" instrument_node="">). Interestingly, this ability is highly related to original Gestalt conceptions of insight (</span><a class="workspace-trigger" data-dcnode-id="9007" href="#bib0475" name="bbib0475"><span data-dcnode-id="9008" instrument_node="">Maier, 1931</span></a><span data-dcnode-id="9006" instrument_node="">) that likened the perception of the solution of an insight problem to the perceiving of a hidden figure in a puzzle picture.</span></p><p data-dcnode-id="8997" id="par0400"><span data-dcnode-id="9004" instrument_node="">Other measures that have been found to predict insight problem solving also seem to be related to the ability to identify hidden figures. </span><a class="workspace-trigger" data-dcnode-id="9002" href="#bib0650" name="bbib0650"><span data-dcnode-id="9003" instrument_node="">Schooler and Melcher (1995)</span></a><span data-dcnode-id="9001" instrument_node=""> found that both the Embedded Figures Test and the ability to recognize out-of-focus pictures predicted insight but not noninsight problem solving. In a more recent study, </span><a class="workspace-trigger" data-dcnode-id="8999" href="#bib0320" name="bbib0320"><span data-dcnode-id="9000" instrument_node="">Gilhooly and Murphy (2005)</span></a><span data-dcnode-id="8998" instrument_node=""> found that a Figural Fluency task uniquely predicted performance on a set of insight problems in a regression that also included the RPM and Span measures. In the Figural Fluency task, participants were presented with many instances of the same pattern of five dots. The goal was to produce as many different figures as possible by joining at least two dots in each pattern. Although they intended this as a task requiring attentional control because it requires inhibiting past responses, that portion of the variance would have been removed by the other measures in the regression. The prediction of insight by the remaining variance suggests that some portion of performance on this task seems to reflect some ability to find or generate novel patterns in the absence of controlled attention. For the noninsight problems, the RPM was the only unique predictor.</span></p><p data-dcnode-id="8992" id="par0405"><span data-dcnode-id="8996" instrument_node="">Although a straightforward interpretation of these tasks would suggest that it is something about the ability to perceive objects that relates to insight, an alternative suggestion is that the mode of processing that is required on these tasks is more global and passive than what is needed for most cognitive tasks. Therefore, a tendency to perform well on these tasks could actually be due to greater flexibility in the ability to switch between global and local, or passive versus analytic modes of processing, and very speculatively, this may be an ability that promotes successful insightful problem solving as well (</span><a class="workspace-trigger" data-dcnode-id="8994" href="#bib0680" name="bbib0680"><span data-dcnode-id="8995" instrument_node="">Smallwood &amp; Schooler, 2006</span></a><span data-dcnode-id="8993" instrument_node="">).</span></p></section></section><section data-dcnode-id="8964" id="sec0145"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8986"><span data-dcnode-id="8989" instrument_node="">5.3</span><span data-dcnode-id="8988" instrument_node="">. </span><span data-dcnode-id="8987" instrument_node="">Summary</span></h3><p data-dcnode-id="8965" id="par0410"><span data-dcnode-id="8985" instrument_node="">The main goal behind many studies in this area has been to find dissociations between insight and noninsight problem solving. Yet, it is necessary to recognize that measures of performance from insight and analytic problem sets are generally correlated. Many things that help analytic problem solving also aid creative problem solving. Similarly, performance on insight problems may also be related to many individual differences measures that predict analytic problem solving. For example, the RAT task requires both a great deal of verbal knowledge and effective retrieval from LTM, and both of these are likely to be correlated with WMC (</span><a class="workspace-trigger" data-dcnode-id="8983" href="#bib0625" name="bbib0625"><span data-dcnode-id="8984" instrument_node="">Rosen &amp; Engle, 1997</span></a><span data-dcnode-id="8982" instrument_node="">). Indeed, studies have shown that measures of WMC can correlate with RAT performance (</span><a class="workspace-trigger" data-dcnode-id="8980" href="#bib0395" name="bbib0395"><span data-dcnode-id="8981" instrument_node="">Kane et al., 2004</span></a><span data-dcnode-id="8979" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8977" href="#bib0610" name="bbib0610"><span data-dcnode-id="8978" instrument_node="">Ricks et al., 2007</span></a><span data-dcnode-id="8976" instrument_node="">). But, it is important to point out that these simple correlations do not tell us what affordances of WMC or its correlates (storage, relation to various executive functions, relation to verbal IQ) are actually causing the benefits in creative problem-solving performance. Although the </span><a class="workspace-trigger" data-dcnode-id="8974" href="#bib0395" name="bbib0395"><span data-dcnode-id="8975" instrument_node="">Kane et al. (2004)</span></a><span data-dcnode-id="8973" instrument_node=""> study did not directly test this issue, the pattern of relations among their constructs suggests that the storage capacity of WMC was more predictive of RAT performance than the executive functioning aspect, which is similar to the conclusions of </span><a class="workspace-trigger" data-dcnode-id="8971" href="#bib0260" name="bbib0260"><span data-dcnode-id="8972" instrument_node="">Fleck (2008)</span></a><span data-dcnode-id="8966"><span data-dcnode-id="8970" instrument_node=""> and Gilhooly and Foriatou (2009) in relation to insight problems. The bottom line is that one should not be surprised when acts of </span><a class="topic-link" data-dcnode-id="8968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/higher-order-cognition" title="Learn more about Higher Order Cognition from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8969" instrument_node="">higher-order cognition</span></a><span data-dcnode-id="8967" instrument_node=""> relate to WMC. There are many reasons why this may be the case. However, when negative relations are found, this is surprising. And, these observations may better inform us how WMC may have its influence on cognition by helping to isolate specific processes and mechanisms.</span></span></p></section></section><section data-dcnode-id="8923" id="sec0150"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8959"><span data-dcnode-id="8962" instrument_node="">6</span><span data-dcnode-id="8961" instrument_node="">. </span><span data-dcnode-id="8960" instrument_node="">Analysis, Insight, and Dual Process Accounts of Problem Solving</span></h2><p data-dcnode-id="8954" id="par0415"><span data-dcnode-id="8958" instrument_node="">The WMC-related results discussed above largely support that there are at least some processes underlying insight problem solving that are distinct from those involved in analytic problem solving. As such, the results are consistent with findings from other perspectives that suggest a distinction between analytic and insightful problem solving processes. Perhaps the most often-cited evidence in this respect comes from differences in metacognitive access to solution progress. </span><a class="workspace-trigger" data-dcnode-id="8956" href="#bib0540" name="bbib0540"><span data-dcnode-id="8957" instrument_node="">Metcalfe and Wiebe (1987)</span></a><span data-dcnode-id="8955" instrument_node=""> examined feelings-of-warmth ratings as participants solved insight and noninsight problems. They observed that participants were aware when they were approaching the correct solution of noninsight problems but were unaware of their progress towards the solution of insight problems. In fact, participants did not feel close to the solution of insight problems until seconds prior to generating the solution itself. Alternatively, when they did report feeling close to solution of an insight problem they were often incorrect. These results suggest that analytic problem-solving processes are open to awareness to a greater extent than insightful solution processes. This has been used to argue that this lack of monitoring accuracy may be because the insightful solution process is occurring outside of conscious awareness.</span></p><p data-dcnode-id="8947" id="par0420"><a class="workspace-trigger" data-dcnode-id="8952" href="#bib0825" name="bbib0825"><span data-dcnode-id="8953" instrument_node="">Ash and Wiley (2008)</span></a><span data-dcnode-id="8951" instrument_node=""> have further explored metacognitive awareness of the solution process in insight and noninsight problem solving. Using a hindsight bias (HB) paradigm, they tested for memory for initial problem representations after individuals either solved or were told solutions for insight and noninsight problems. HB occurred ONLY when insight problems were solved by solvers, and did not occur when nonsolvers were told the correct solution, and did not occur for incremental problems. Further, the lack of access to earlier problem representations for these problems is consistent with the suggestion that solution requires a fundamental change in the problem representation. Thus, this study can also be seen as evidence that restructuring occurs only during insightful problem solving, and this can serve as another distinction between the two methods of solution. Similarly, </span><a class="workspace-trigger" data-dcnode-id="8949" href="#bib0260" name="bbib0260"><span data-dcnode-id="8950" instrument_node="">Fleck (2008)</span></a><span data-dcnode-id="8948" instrument_node=""> found evidence for restructuring only on insight problems.</span></p><p data-dcnode-id="8942" id="par0425"><span data-dcnode-id="8946" instrument_node="">Studies on patterns of brain activation during problem solving also support a distinction between solution by insight and analysis. Beeman and Kounios have demonstrated in a series of studies that different structures are activated in relation to insightful versus noninsightful solutions of RAT problems (</span><a class="workspace-trigger" data-dcnode-id="8944" href="#bib0415" name="bbib0415"><span data-dcnode-id="8945" instrument_node="">Kounios &amp; Jung-Beeman, 2009</span></a><span data-dcnode-id="8943" instrument_node="">). The design of this work is particularly elegant because it leverages the fact that RAT problems can either be solved insightfully or through analysis. Their results suggest that the reported method of solution relates to the activation of different anatomical substrates, both before and after a solution is reached. Thus, the distinction between analytic and insightful solution processes suggested by the differential relation of WMC is consistent with several other lines of evidence.</span></p><p data-dcnode-id="8924" id="par0430"><span data-dcnode-id="8941" instrument_node="">In turn, the recognition that there may be two distinct routes to solution suggests that a dual process model of problem solving that incorporates both analysis and insight may be needed. Several of these models have been proposed. Beeman has suggested that the two processing styles may rely differentially on the two hemispheres. Left-hemisphere processing focuses attention on dominant or typical responses that may excel at analytic problem solving, whereas right-hemisphere processing is more diffuse and can allow for the activation of remote or novel alternatives needed for creative responses. Research on sleep suggests a slightly different set of systems. An executive functioning network including the DLPFC seems to underlie analytic, goal-directed thinking, whereas the inhibition of that system via adrenergic systems (particularly during REM sleep) allows the default system to take over. The lack of activation of the executive system allows the default system to engage in spontaneous thought—undirected associative thinking that can result in the activation of novel combinations and the recognition of implicit relations in patterns of stimuli (</span><a class="workspace-trigger" data-dcnode-id="8939" href="#bib0940" name="bbib0940"><span data-dcnode-id="8940" instrument_node="">Christoff, Gordon, &amp; Smith, 2008</span></a><span data-dcnode-id="8938" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="8936" href="#bib0990" name="bbib0990"><span data-dcnode-id="8937" instrument_node="">DeCaro and Beilock (2010)</span></a><span data-dcnode-id="8931"><span data-dcnode-id="8935" instrument_node=""> propose that a dual process model is needed that includes a role for both rule-based and associative processes. The key is that these processes differ specifically in their reliance on </span><a class="topic-link" data-dcnode-id="8933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/attentional-control" title="Learn more about Attentional Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8934" instrument_node="">attentional control</span></a><span data-dcnode-id="8932" instrument_node="">. They, along with others (</span></span><a class="workspace-trigger" data-dcnode-id="8929" href="#bib0320" name="bbib0320"><span data-dcnode-id="8930" instrument_node="">Gilhooly and Murphy, 2005</span></a><span data-dcnode-id="8928" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8926" href="#bib0315" name="bbib0315"><span data-dcnode-id="8927" instrument_node="">Gilhooly and Fioratou, 2009</span></a><span data-dcnode-id="8925" instrument_node="">), have likened the contrast between insight and analysis to the distinction made between System 1 and System 2 processes that have been used to explain patterns of performance in other areas of higher-order thinking including reasoning and decision making. This review of the literature at the intersection of WMC and problem solving has demonstrated that a second less-goal-directed, less-controlled route is needed to explain this body of results as well.</span></p></section><section data-dcnode-id="8911" id="sec0155"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8919"><span data-dcnode-id="8922" instrument_node="">7</span><span data-dcnode-id="8921" instrument_node="">. </span><span data-dcnode-id="8920" instrument_node="">Conclusions</span></h2><p data-dcnode-id="8914" id="par0435"><span data-dcnode-id="8918" instrument_node="">WMC has effects on problem solving, but they are not always positive. WMC is not just the size of one's buffer. Its storage functions are important and they do underlie basic problem-solving processes in both analytic and insightful problem solving. However, WMC also reflects differences in </span><a class="topic-link" data-dcnode-id="8916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/psychology/attentional-control" title="Learn more about Attentional Control from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8917" instrument_node="">attentional control</span></a><span data-dcnode-id="8915" instrument_node="">, and the effects of attentional control on problem solving are more differential. In analytic problem solving, the superior executive functions associated with higher WMC seem to generally support more successful problem solving. Yet, some processes involved in creative problem solving do not depend on these same executive functions, and progress can be harmed by too much focus, too much persistence at an initial approach, and a lack of sensitivity to peripheral cues.</span></p><p data-dcnode-id="8912" id="par0440"><span data-dcnode-id="8913" instrument_node="">The key to successful problem solving may actually be in the ability to flexibly adjust to the needs of the situation: to focus when it is needed, or to disengage when it is needed, or to seek out contexts that help to promote one or the other process (drinking, sleeping, altering mood, problem solving at different times of day). Revisions to our thinking about WMC, recognizing that attentional control may be both a function of trait and state factors, as well as revisions to our thinking about problem solving, recognizing the need for both analytic and nonanalytic processes, will give us a better understanding of both.</span></p></section></div><section data-dcnode-id="8905" id="aep-acknowledgment-id8"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8908"><span data-dcnode-id="8909" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="8906" id="par0445"><span data-dcnode-id="8907" instrument_node="">Preparation of this chapter was supported by a Humboldt Research Fellowship for Experienced Researchers to Jennifer Wiley. The authors thank Ivan Ash and Patrick Cushen for many discussions over the years on these topics.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="8900"><button class="button button-anchor" data-dcnode-id="8901" type="button"><span class="button-text" data-dcnode-id="8902"><span data-dcnode-id="8903" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="8899"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="345" id="bibl0005"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8897"><span data-dcnode-id="8898" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="346" id="bibs0005"><dl class="references" data-dcnode-id="347" id="reference-links-bibs0005"><dt class="label" data-dcnode-id="8894"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="8895" href="#bbib0800" id="ref-id-bib0800"><span data-dcnode-id="8896" instrument_node="">Ackerman, 1988</span></a></dt><dd class="reference" data-dcnode-id="8853"><div class="contribution" d 4" instrument_node="">622</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="349"><span data-dcnode-id="352" instrument_node=""></span><a class="link" data-dcnode-id="350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DCreativity%2520and%2520ease%2520of%2520ambiguous%2520figure%2520reversal%26publication_year%3D2011%26author%3DR.%2520Wiseman%26author%3DC.%2520Watt%26author%3DK.%2520Gilhooly%26author%3DG.%2520Georgiou" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="351" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="344"></div><header data-dcnode-id="341" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Cited by (68)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="320"><div class="sub-heading" data-dcnode-id="335"><a data-dcnode-id="338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0010027721003693" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="339" id="citing-articles-article0-title"><span data-dcnode-id="340" instrument_node="">Aha! under pressure: The Aha! experience is not constrained by cognitive load</span></h3></a><div class="article-source ellipsis" data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">2022, Cognition</span></div></div><div class="buttons" data-dcnode-id="329"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="330" type="button"><span class="button-link-text" data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="331" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="332"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="321"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="322" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="323"><p data-dcnode-id="324" id="sp0030"><span data-dcnode-id="328" instrument_node="">The Aha! moment– the sudden insight sometimes reached when solving a vexing problem– entails a different problem-solving experience than solution retrieval reached by an analytical, multistep strategy (i.e., non-insight). To date, the (un)conscious nature of insight remains debated. We addressed this by studying insight under cognitive load. If insight and non-insight problem solving rely on conscious, effortful processes, they should both be influenced by a concurrent cognitive load. However, if unconscious processes characterize insight, cognitive load might not affect it at all. Using a dual-task paradigm, young, healthy adults (</span><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">N</span></em><span data-dcnode-id="325" instrument_node=""> = 106) solved 70 word puzzles under different cognitive loads. We confirmed that insight solutions were more often correct and received higher solution confidence. Importantly, as cognitive load increased, non-insight solutions became less frequent and required more solution time, whereas insightful ones remained mostly unaffected. This implies that insight problem solving did not compete for limited cognitive resources.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="296"><div class="sub-heading" data-dcnode-id="308"><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S002396901730125X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="318" id="citing-articles-article1-title"><span data-dcnode-id="319" instrument_node="">The effect of monetary compensation on cognitive training outcomes</span></h3></a><div class="article-source ellipsis" data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">2018, Learning and Motivation</span></div><div class="CitedSection" data-dcnode-id="309"><div class="snippet" data-dcnode-id="310"><div class="cite-header" data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Jaeggi and colleagues initially suggested that the improvements to measures of fluid intelligence may be due to improvements in a common capacity constraint shared by fluid intelligence and working memory (Jaeggi et al., 2008). It is possible, for example, that these capacities are connected through attentional control processes, such as inhibitory control, and that extensive training on working memory tasks may improve these processes (Novick, Hussey, Teubner-Rhodes, Harbison, &amp; Bunting, 2013; Jarosz &amp; Wiley, 2012; Wiley &amp; Jarosz, 2012). It also remains possible that transfer effects, when they do occur, are related to strategy development during the training (Morrison &amp; Chein, 2011).</span></p></div></div></div><div class="buttons" data-dcnode-id="302"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="303" type="button"><span class="button-link-text" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="304" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="305"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="297"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="298" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="299"><p data-dcnode-id="300" id="spar0050"><span data-dcnode-id="301" instrument_node="">Recent work has established the possibility that messaging and incentive during recruitment may influence the outcome of cognitive training. These factors may impact intrinsic and extrinsic motivation to complete a training intervention, and one provocative single session study suggests that recruitment messaging may be responsible for an expectancy effect in certain training experiments. To examine the effects of payment and payment messaging during recruitment on a longer training program, participants were recruited to complete a twenty-session working memory regimen with or without payment, and with messaging that either emphasized payment or improving cognition. Significant group differences were observed at baseline; unpaid participants reported a significantly higher number of cognitive failures compared to compensated participants. However, both paid and unpaid training groups improved on transfer measures compared to an active control group, and payment had no effect on transfer. An additional post-test survey within the compensated group revealed different motivational orientations that were associated with significant performance differences on the visuospatial reasoning factor at baseline. While these differences in motivation were not predictive of transfer or training gain, it is possible that other elements of the study, including researcher involvement, may also play a role in determining the extent to which participants demonstrate transfer on untrained tasks. We conclude that while payment and recruitment messaging may affect training and transfer performance to some degree, a variety of additional factors likely contribute to the outcome of any individual study and the influence of certain factors may matter less during a longer-term program.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="285"><div class="sub-heading" data-dcnode-id="290"><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1002/jocb.536" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="294" id="citing-articles-article2-title"><span data-dcnode-id="295" instrument_node="">The Cognitive–Creative Profiles of Insightful Problem Solvers: A Person-Centered Insight Study</span></h3></a><div class="article-source ellipsis" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">2022, Journal of Creative Behavior</span></div></div><div class="buttons" data-dcnode-id="289"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="286"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="287" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="288"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="279"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/17470218211066410" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="283" id="citing-articles-article3-title"><span data-dcnode-id="284" instrument_node="">Working memory capacity an
