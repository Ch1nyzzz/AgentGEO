<div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="447"><div data-dcnode-id="454"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Social Media being useful to achieve dreams</span></h4></div><div data-dcnode-id="451"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">In the article, The American Dream Isn’t Dead, It Has Just Evolved by Gabrielle Pfeiffer, she states that now a days people around the world use the social media to successfully advance in their career. </span></p></div><div data-dcnode-id="448"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Social Media being useful to achieve dreams</span></p></div></div></div><div data-dcnode-id="433"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="442"><div data-dcnode-id="443"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Social Media helping out</span></h4></div></div><div data-dcnode-id="434"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeQs" data-dcnode-id="435"><div data-dcnode-id="439"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Social Media helping out</span></h4></div><div data-dcnode-id="436"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">With the use of social media we are encourage to begin our own dreams, not always as a bad idea but as in a good idea as Gabrielle says. " It is important to keep up on the advances in technology in order to succeed. Business owners who get blindsided by new apps and programs are missing out on reaching new customers and growing their audiences even more" She states that with the use of social platform it can come to achieve something not always having a bad idea in social media.</span></p></div></div></div></div><div data-dcnode-id="425"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="426"><div data-dcnode-id="430"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">The use of social media we are able to inspire ourselves by seeing the achievement and the advancement of social media in the world. "Digital marketing has grown into this huge entity that has helped the smallest of start-ups grow to major internet influences." Media affects the influencers to achieve to success. </span></p></div><div data-dcnode-id="427"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Impact on social media to the world</span></p></div></div></div><div data-dcnode-id="412"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="421"><div data-dcnode-id="422"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Learning from social media</span></h4></div></div><div data-dcnode-id="413"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeQs" data-dcnode-id="414"><div data-dcnode-id="418"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Learning from social media </span></h4></div><div data-dcnode-id="415"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Using social media has evolved and given a different meaning to the American Dream. It gave a meaning on how achieving the dream into comparing yourself to others may sometimes be a bad idea to it. It doesn't feel and look the same it used to. According to Gabrielle this isn't a problem since the important thing is to keep passion within yourself and follow your dreams.</span></p></div></div></div></div><div data-dcnode-id="401"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="402"><div data-dcnode-id="409"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Achieving Goals</span></h4></div><div data-dcnode-id="406"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Social gave a way for people to be more open with themselves and get stuff done. "The internet and social media allows you to put yourself out into this great big world, and connect with people from every corner of the globe. " This is a great way to start reaching the goals.</span></p></div><div data-dcnode-id="403"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Achieving Goals</span></h4></div></div></div><div data-dcnode-id="390"><div class="TranscriptTopic__StyledTextDiv-p179ej-0 kPSeIO" data-dcnode-id="391"><div data-dcnode-id="398"><h4 class="TranscriptText__StyledHeader4-sc-1jllhx4-4 bJJqpe" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Media helping out</span></h4></div><div data-dcnode-id="395"><p class="TranscriptText__Paragraph-sc-1jllhx4-1 edBsdN" data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">The media is availabe in each and every single one of us to use and to be able to achieve the dreams we desire to achieve, without being discriminated from what gender and religion you might be according to Gabrielle.  I have to say that in spite of very real inequalities out there, anyone can start their own business and thrive, no matter what their skin color, gender, sex, or social class is."</span></p></div><div data-dcnode-id="392"><h4 class="TranscriptTe
