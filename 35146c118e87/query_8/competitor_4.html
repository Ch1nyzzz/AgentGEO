</span><p data-dcnode-id="3675"><span data-dcnode-id="3676" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3674" instrument_node="">
</span><p data-dcnode-id="3672"><span data-dcnode-id="3673" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3671" instrument_node="">
</span><p data-dcnode-id="3666"><span data-dcnode-id="3670" instrument_node="">On World AIDS Day 2014, PEPFAR launched a bold new initiative –&nbsp;</span><a data-dcnode-id="3668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pepfar.gov/partnerships/ppp/dreams/"><span data-dcnode-id="3669" instrument_node="">‘DREAMS’</span></a><span data-dcnode-id="3667" instrument_node="">&nbsp;– to reduce new HIV infections by 40 percent among the highest risk adolescent girls and young women in 10 high-burden countries. With an initial commitment of US$385 million, quickly supplemented with $85 million for a DREAMS Innovation Fund, DREAMS partners – PEPFAR, Bill &amp; Melinda Gates Foundation, Girl Effect, Johnson &amp; Johnson, ViiV Healthcare and Gilead Sciences – aim to promote empowerment and prevent HIV acquisition through a core package of interventions for young women, their families, communities and male partners.</span></p><span data-dcnode-id="3665" instrument_node="">
</span><p data-dcnode-id="3663"><span data-dcnode-id="3664" instrument_node="">The Bill &amp; Melinda Gates Foundation has awarded LSHTM a 4-year grant to lead a portfolio of evaluation studies designed to track the impact of DREAMS in Kenya, South Africa and Zimbabwe. Led by Isolde Birdthistle and Sian Floyd, the evaluation draws on LSHTM expertise in HIV, adolescent health and evaluation across all faculties, and close research partnerships with experienced institutes in each country: the Africa Health Research Institute (AHRI) in Durban, South Africa, the African Population and Health Research Centre (APHRC) in Nairobi, Kenya; the Kenya Medical Research Institute (KEMRI) in Siaya, Kenya; and the Centre for Sexual Health HIV and AIDS Research (CeSHHAR) in Harare, Zimbabwe.</span></p></div><span data-dcnode-id="3661" instrument_node="">

</span><dd class="" data-dcnode-id="3266" style="display: none;"><span data-dcnode-id="3461" instrument_node="">

</span><p data-dcnode-id="3457"><strong data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">Isolde Birdthistle</span></strong></p><span data-dcnode-id="3456" instrument_node="">
</span><p data-dcnode-id="3453"><em data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">Principal Investigator</span></em></p><span data-dcnode-id="3452" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3449" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="9ec0af46-4079-4459-b2cb-e60767751354" data-langcode="en"><span data-dcnode-id="3451" instrument_node=""> </span><img alt="Isolde" data-dcnode-id="3450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Isolde-1.jpg&amp;raw" title="Isolde" typeof="foaf:Image"></div><span data-dcnode-id="3448" instrument_node="">
</span></td><td data-dcnode-id="3444"><span data-dcnode-id="3445" instrument_node="">It is a pleasure to lead the independent evaluation of DREAMS with excellent partner institutes in Kenya, South Africa and Zimbabwe. I work closely with Sian to oversee the scientific management, and with Antonio, to manage the financial aspects of the grant from BMGF. There are many lessons to be learned from DREAMS, about whether and how scaled-up integrated programs can improve the health&nbsp;and welfare of adolescent girls. It is exciting to see data from different disciplines and designs,&nbsp;contributing answers to the evaluations questions. A particularly enriching aspect of the project&nbsp;is engaging regularly with researchers from all sites via thematic working groups – these are virtual peer groups that share analyses in progress, to harmonise analyses and boost all of our analytical skills.</span></td></tr><tr data-dcnode-id="3423"><td data-dcnode-id="3428"><span data-dcnode-id="3441" instrument_node="">
</span><p data-dcnode-id="3438"><strong data-dcnode-id="3439"><span data-dcnode-id="3440" instrument_node="">Sian Floyd</span></strong></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3434"><em data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Principal Investigator</span></em></p><span data-dcnode-id="3433" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3430" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="2c815451-1f50-40ee-bf93-b1567db72134" data-langcode="en"><span data-dcnode-id="3432" instrument_node=""> </span><img alt="Sian Floyd" data-dcnode-id="3431" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Sian%2520Floyd%2520-%2520skype.jpg&amp;raw" title="Sian Floyd" typeof="foaf:Image"></div><span data-dcnode-id="3429" instrument_node="">
</span></td><td data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">My role on the DREAMS IE is as Principal Investigator and I work closely with Isolde to coordinate the Impact Evaluation work across the four settings in which we are evaluating DREAMS. I trained as a biostatistician, and together with Isolde I have provided oversight and guidance on design of the impact evaluation studies and how to analyse the quantitative data to estimate the causal effect of DREAMs on outcomes across the themes of biological, behavioural, and social protection. One thing that I have learned is that while the analysis of the effect of complex interventions is challenging when the interventions are allocated/received in a way that is non-randomised and outside the control of the evaluation team, it is possible so long as effort is made to understand the way in which interventions have been targeted/prioritised and to carefully measure what has actually been delivered/received and how this evolves over time.</span></td></tr><tr data-dcnode-id="3404"><td data-dcnode-id="3409"><span data-dcnode-id="3422" instrument_node="">
</span><p data-dcnode-id="3419"><strong data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Judith Glynn</span></strong></p><span data-dcnode-id="3418" instrument_node="">
</span><p data-dcnode-id="3415"><em data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">Co Investigator</span></em></p><span data-dcnode-id="3414" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3411" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="cbe35c8d-369b-40dc-a603-8f79613b2dd2" data-langcode="en"><span data-dcnode-id="3413" instrument_node=""> </span><img alt="Judith Glynn" data-dcnode-id="3412" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/glynn.judith.jpg&amp;raw" title="Judith Glynn" typeof="foaf:Image"></div><span data-dcnode-id="3410" instrument_node="">
</span></td><td data-dcnode-id="3406"><span data-dcnode-id="3407" instrument_node="">I am a co-investigator on the grant and Chair of the DREAMS IE Publications and Presentations (P&amp;P) Group. The aim of this group is to ensure and enhance the quality of all outputs from the grant. Multisite collaborations such as this are inspiring and worthwhile, despite the huge amounts of work involved.</span></td></tr><tr data-dcnode-id="3385"><td data-dcnode-id="3390"><span data-dcnode-id="3403" instrument_node="">
</span><p data-dcnode-id="3400"><strong data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">James Hargreaves</span></strong></p><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3396"><em data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Co Investigator</span></em></p><span data-dcnode-id="3395" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3392" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="6bdffc74-e943-493a-a87a-d38b9a13448c" data-langcode="en"><span data-dcnode-id="3394" instrument_node=""> </span><img alt="James Hargreaves" data-dcnode-id="3393" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Hargreaves_James.jpg&amp;raw" title="James Hargreaves" typeof="foaf:Image"></div><span data-dcnode-id="3391" instrument_node="">
</span></td><td data-dcnode-id="3387"><span data-dcnode-id="3388" instrument_node="">&nbsp;</span></td></tr><tr data-dcnode-id="3357"><td data-dcnode-id="3368"><span data-dcnode-id="3384" instrument_node="">
</span><p data-dcnode-id="3381"><strong data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node="">Antonio Durán</span></strong></p><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3377"><em data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Project Coordinator</span></em></p><span data-dcnode-id="3376" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3370" data-embed-button="media_browser" data-entity-embed-display="view_mode_select" data-entity-embed-display-settings="default" data-entity-type="media" data-entity-uuid="02b9968e-ae9e-4029-b8c5-4dc889cfbdf1" data-langcode="en"><article class="media media--type-image media--view-mode-" data-dcnode-id="3371"><div class="field field--name-image field--type-image field--label-hidden field__item" data-dcnode-id="3373"><span data-dcnode-id="3375" instrument_node=""> </span><img alt="Antonio Duran" data-dcnode-id="3374" height="472" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Duran-Aparicio%2520Antonio_0.jpg&amp;raw" typeof="foaf:Image" width="315"></div><span data-dcnode-id="3372" instrument_node="">
</span></article></div><span data-dcnode-id="3369" instrument_node="">
</span></td><td data-dcnode-id="3359"><span data-dcnode-id="3366" instrument_node="">
</span><p data-dcnode-id="3364"><span data-dcnode-id="3365" instrument_node="">In my role as Project Coordinator, I am in charge of the financial and administrative side of things. I support the PI in the financial management of the project, work with our partners for the allocation of funds, submit finance reports for the funder, as well as deal with project recruitment, dissemination, etc.&nbsp;</span></p><span data-dcnode-id="3363" instrument_node="">
</span><p data-dcnode-id="3361"><span data-dcnode-id="3362" instrument_node="">It is extremely rewarding&nbsp;to be involved in such a multidisciplinary, international project.&nbsp;</span></p><span data-dcnode-id="3360" instrument_node="">
</span></td></tr><tr data-dcnode-id="3332"><td data-dcnode-id="3343"><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3353"><strong data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">Sarah Mulwa</span></strong></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3349"><em data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Statistician</span></em></p><span data-dcnode-id="3348" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3345" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="01103873-e3e3-4707-8979-b24284a5f532" data-langcode="en"><span data-dcnode-id="3347" instrument_node=""> </span><img alt="Sarah Mulwah" data-dcnode-id="3346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Sarah%2520Mulwah.png&amp;raw" title="Sarah Mulwah" typeof="foaf:Image"></div><span data-dcnode-id="3344" instrument_node="">
</span></td><td data-dcnode-id="3334"><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">My work revolves around quantifying the uptake of DREAMS interventions in Nairobi - Kenya, as well as assessing factors that affect uptake. I am also a member of the Data Analysis Working Group, a platform where we discuss various methodologies relating to analysis of observational data. To better understand how the implementation is being done on the ground and the different contextual factors that can explain participation in DREAMS activities (or lack thereof), I also participate in the Social Science Working Group.</span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">There are many lessons one can learn by being part of such a multi-disciplinary team like DREAMS IE. What I enjoy the most are the numerous opportunities to learn new methods through sharing lessons, ideas and potential solutions to some of the challenges the team may face.</span></p><span data-dcnode-id="3335" instrument_node="">
</span></td></tr><tr data-dcnode-id="3307"><td data-dcnode-id="3315"><span data-dcnode-id="3331" instrument_node="">
</span><p data-dcnode-id="3328"><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">Annabelle Gourlay</span></strong></p><span data-dcnode-id="3327" instrument_node="">
</span><p data-dcnode-id="3324"><em data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">Epidemiologist</span></em></p><span data-dcnode-id="3323" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3317" data-embed-button="media_browser" data-entity-embed-display="view_mode:media.embedded" data-entity-type="media" data-entity-uuid="825ec4d4-4752-4f52-a809-29a89439bbd5" data-langcode="en"><article class="media media--type-image media--view-mode-" data-dcnode-id="3318"><div class="field field--name-image field--type-image field--label-hidden field__item" data-dcnode-id="3320"><span data-dcnode-id="3322" instrument_node=""> </span><img alt="" data-dcnode-id="3321" height="430" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Annabelle-Gourlay.JPG&amp;raw" typeof="foaf:Image" width="430"></div><span data-dcnode-id="3319" instrument_node="">
</span></article></div><span data-dcnode-id="3316" instrument_node="">
</span></td><td data-dcnode-id="3309"><span data-dcnode-id="3313" instrument_node="">
</span><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">I chair the Data Analysis Working Group, including epidemiologists, statisticians and data managers from each of our partner organisations in Kenya, South Africa and Zimbabwe, as well as colleagues at LSHTM. Recent work has included summarising early awareness and uptake of DREAMS, using population-wide data platforms and/or nested cohorts of AGYW in each setting. I also participate in the Social Science Working Group to keep up-to-date with progress on the process evaluation and facilitate my understanding of the implementation of DREAMS, to help contextualise the quantitative findings.</span></p><span data-dcnode-id="3310" instrument_node="">
				I have learned that it is very complex to define and measure ‘exposure’ to DREAMS, and that this is a very challenging package of interventions to implement. However, there are encouraging signs from the early analyses and some interesting synergies across settings, despite the different contexts in which DREAMS is being implemented. I’ve also learned that we have a great team of researchers!</span></td></tr><tr data-dcnode-id="3288"><td data-dcnode-id="3293"><span data-dcnode-id="3306" instrument_node="">
</span><p data-dcnode-id="3303"><strong data-dcnode-id="3304"><span data-dcnode-id="3305" instrument_node="">Bernadette Hensen</span></strong></p><span data-dcnode-id="3302" instrument_node="">
</span><p data-dcnode-id="3299"><em data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">Epidemiologist</span></em></p><span data-dcnode-id="3298" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3295" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="59e6a97e-2899-4db5-a7e0-66185f37292a" data-langcode="en"><span data-dcnode-id="3297" instrument_node=""> </span><img alt="Hensen Bernadette" data-dcnode-id="3296" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Hensen_Bernadette.jpg&amp;raw" title="Hensen Bernadette" typeof="foaf:Image"></div><span data-dcnode-id="3294" instrument_node="">
</span></td><td data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">My role on the DREAMS IE involves supporting the evaluation of DREAMS among young women who sell sex in Zimbabwe. Working with colleagues at the Centre for Sexual Health, HIV/AIDS Research (CeSHHAR) and LSHTM, I support the collection and analysis of data from a cohort of young women. We are aiming to follow-up a cohort of the most vulnerable young women in two DREAMS and four non-DREAMS site to help us understand whether DREAMS has had an impact on the health and well-being of this population. I have learnt so much through working on the DREAMS IE. One of these is that, although challenging, it is possible to identify and reach the most vulnerable young women who sell sex to men in exchange for money or other material support through their networks.</span></td></tr><tr data-dcnode-id="3269"><td data-dcnode-id="3274"><span data-dcnode-id="3287" instrument_node="">
</span><p data-dcnode-id="3284"><strong data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">Joanna Busza</span></strong></p><span data-dcnode-id="3283" instrument_node="">
</span><p data-dcnode-id="3280"><em data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">Social Scientist</span></em></p><span data-dcnode-id="3279" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3276" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="da26cfcc-2751-432e-9974-912f306899a6" data-langcode="en"><span data-dcnode-id="3278" instrument_node=""> </span><img alt="Joanna Busza" data-dcnode-id="3277" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/joanna_busza.jpg&amp;raw" title="Joanna Busza" typeof="foaf:Image"></div><span data-dcnode-id="3275" instrument_node="">
</span></td><td data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">I contribute to the impact and process evaluations of DREAMS in Zimbabwe. I work closely with the Centre for Sexual Health, HIV/AIDS Research (CeSHHAR) to track inclusion in and experiences of DREAMS activities among the most vulnerable adolescent girls and young women, those involved in exchanging sex for money or other material goods. We are following girls who benefit from different parts of the DREAMS package to try to understand how it affects their lives, particularly in regard to protecting them from risks. Young women’s perceptions of the programme, such as which components work well and which less so, will help answer questions about whether DREAMS is being implemented as planned, whether it is acceptable to those it aims to reach, and what challenges participants face. &nbsp;I have been impressed with how quickly young women see a change in themselves, particularly in terms of feeling a greater sense of purpose in their present lives and hope for the future. It remains to be seen whether relatively short exposure to DREAMS activities will be able to deliver on young women’s growing expectations.</span></td></tr></tbody></table></dd><span data-dcnode-id="3265" instrument_node="">

</span></td><td data-dcnode-id="3061"><span data-dcnode-id="3068" instrument_node="">
</span><p data-dcnode-id="3066"><span data-dcnode-id="3067" instrument_node="">I am the DREAMS Impact Evaluation project manager at the African Population and Health Research Center (APHRC). I oversee the technical (tools, field operations and data) and other management aspects including reporting and anchoring our participation in the consortium. I also serve on the Publications and Presentation working group.</span></p><span data-dcnode-id="3065" instrument_node="">
</span><p data-dcnode-id="3063"><span data-dcnode-id="3064" instrument_node="">I have learned that even the most complex of health and social interventions can be assessed for impact. Complex health challenges such as HIV/AIDS require complex interventions whose implementation is not straight forward and so is the measurement of impact attributable to such responses. Innovating to address and overcome some of these challenges is a big take away for me from this project.</span></p><span data-dcnode-id="3062" instrument_node="">
</span></td></tr><tr data-dcnode-id="3031"><td data-dcnode-id="3042"><span data-dcnode-id="3058" instrument_node="">
</span><p data-dcnode-id="3055"><strong data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">Benedict Orindi</span></strong></p><span data-dcnode-id="3054" instrument_node="">
</span><p data-dcnode-id="3051"><em data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">Statistician</span></em></p><span data-dcnode-id="3050" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="3044" data-embed-button="media_browser" data-entity-embed-display="view_mode:media.embedded" data-entity-type="media" data-entity-uuid="8793eb19-ad10-475b-9df2-3089c3cc73c8" data-langcode="en"><article class="media media--type-image media--view-mode-" data-dcnode-id="3045"><div class="field field--name-image field--type-image field--label-hidden field__item" data-dcnode-id="3047"><span data-dcnode-id="3049" instrument_node=""> </span><img alt="" data-dcnode-id="3048" height="430" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Benedict-Orindi.jpg&amp;raw" typeof="foaf:Image" width="430"></div><span data-dcnode-id="3046" instrument_node="">
</span></article></div><span data-dcnode-id="3043" instrument_node="">
</span></td><td data-dcnode-id="3033"><span data-dcnode-id="3040" instrument_node="">
</span><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">I provide statistical support – in terms of sampling, data processing and statistical analysis – to the DREAMS IE site at APHRC in Nairobi, Kenya. In addition, I represent the African Population and Health Research Centre in the DREAMS IE Data Analysis Working Group.</span></p><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3035"><span data-dcnode-id="3036" instrument_node="">Whereas I apply statistics in a wide variety of fields, my main areas of interest are Bayesian inference, factor analytic methods, complex data, healthcare experiences and infectious diseases. I developed interest in HIV/AIDS research, with a particular interest in knowledge gaps that result from statistical challenges.</span></p><span data-dcnode-id="3034" instrument_node="">
</span></td></tr><tr data-dcnode-id="3003"><td data-dcnode-id="3014"><span data-dcnode-id="3030" instrument_node="">
</span><p data-dcnode-id="3027"><strong data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">Jane Osindo</span></strong></p><span data-dcnode-id="3026" instrument_node="">
</span><p data-dcnode-id="3023"><em data-dcnode-id="3024"><span data-dcnode-id="3025" instrument_node="">Social Science Research Officer</span></em></p><span data-dcnode-id="3022" instrument_node="">

</span></article></div><span data-dcnode-id="3015" instrument_node="">
</span></td><td data-dcnode-id="3005"><span data-dcnode-id="3012" instrument_node="">
</span><p data-dcnode-id="3010"><span data-dcnode-id="3011" instrument_node="">My role on the DREAMS Impact Evaluation involves oversight on project activities at the field level. I am responsible for&nbsp; logistics for the quantitative and qualitative data collection which involves community sensitization on project related activities, preparation of data collection teams through training and field logistics, supervision of data collection activities and data monitoring and quality control. I am also involved in the process evaluation activities through which the progress of the DREAMS implementation gets monitored. I participate in the qualitative data analysis and interpretation and support scientific writing for the quantitative and qualitative arms of the evaluation.</span></p><span data-dcnode-id="3009" instrument_node="">
</span><p data-dcnode-id="3007"><span data-dcnode-id="3008" instrument_node="">Evaluating the intervention has taught me that despite the efforts to support the most vulnerable in the communities new challenges arise but the work still goes on.</span></p><span data-dcnode-id="3006" instrument_node="">

</span><p data-dcnode-id="2995"><em data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Research Assistant</span></em></p><span data-dcnode-id="2994" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="2991" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="5f8c0cbf-392c-41db-9e63-7b037a17bb45" data-langcode="en"><span data-dcnode-id="2993" instrument_node=""> </span><img alt="Beatrice Maina" data-dcnode-id="2992" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Beatrice%2520Maina.jpg&amp;raw" title="Beatrice Maina" typeof="foaf:Image"></div><span data-dcnode-id="2990" instrument_node="">
</span></td><td data-dcnode-id="2984"><span data-dcnode-id="2987" instrument_node="">My main role in the DREAMS IE involves supporting activities targeting the 10 – 14 age cohort, including data collection and analysis. I am also a member of the DREAMS IE Data Analysis Working Group.&nbsp;</span><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node="">
				Working with very young adolescents in the DREAMS IE project, I have learnt it is possible to reach this cohort with interventions – at a time when they are learning to adapt to societal norms - laying grounds for improved sexual and reproductive health outcomes.</span></td></tr><tr data-dcnode-id="2954"><td data-dcnode-id="2965"><span data-dcnode-id="2981" instrument_node="">
</span><p data-dcnode-id="2978"><strong data-dcnode-id="2979"><span data-dcnode-id="2980" instrument_node="">Elvis Wambiya</span></strong></p><span data-dcnode-id="2977" instrument_node="">
</span><p data-dcnode-id="2974"><em data-dcnode-id="2975"><span data-dcnode-id="2976" instrument_node="">Statistician&nbsp;</span></em></p><span data-dcnode-id="2973" instrument_node="">

</span></article></div><span data-dcnode-id="2966" instrument_node="">
</span></td><td data-dcnode-id="2956"><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">My role in the DREAMS impact evaluation at the African Population and Health Research Centre site involves project management, supporting project implementation activities, data quality assurance, management and analysis. I am an active member of the data analysis working group and participate in scientific writing for the project.</span></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">I have learnt that evaluation of complex interventions for a complex phenomenon such as HIV among adolescent girls and young women (influenced by multiple contextual factors) invites innovative and multi-pronged approaches so as to best capture the effects of the intervention. The project also sheds light and reiterates the importance of quality assurance during data collection which ultimately leads to quality data for the evaluation.</span></p><span data-dcnode-id="2957" instrument_node="">

</span><p data-dcnode-id="2798"><em data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">Study Coordinator</span></em></p><span data-dcnode-id="2797" instrument_node="">
</span><div class="align-center embedded-entity" data-dcnode-id="2791" data-embed-button="media_browser" data-entity-embed-display="view_mode:media.embedded" data-entity-type="media" data-entity-uuid="7e621821-7d36-4f64-9b76-1f22a9de519b" data-langcode="en"><article class="media media--type-image media--view-mode-" data-dcnode-id="2792"><div class="field field--name-image field--type-image field--label-hidden field__item" data-dcnode-id="2794"><span data-dcnode-id="2796" instrument_node=""> </span><img alt="" data-dcnode-id="2795" height="430" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/Vivienne-Kamire.jpg&amp;raw" typeof="foaf:Image" width="430"></div><span data-dcnode-id="2793" instrument_node="">
</span></article></div><span data-dcnode-id="2790" instrument_node="">
</span></td><td data-dcnode-id="2783"><span data-dcnode-id="2787" instrument_node="">
</span><p data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">As the study coordinator I have been assisting with the day–to-day survey implementation and work with the PI in developing an in-depth understanding of the study design and goals, and fully participate in the successful implementation and execution of the study. I have Participated in both county and community engagement which involves stakeholder consultation and community mobilization to discuss the study objectives and implications. I have ensured that the field staffs are well trained on the study protocol to enable them execute the field activities as required.</span></p><span data-dcnode-id="2784" instrument_node="">
				The lesson learnt so far is that before the study is commenced, holding meetings with various stakeholders both at the County and Community level to comprehensively discuss the aims and objectives is very crucial to avoid creating unrealistic expectations. Through this we have seen a positive response from the sampled participants and stakeholders where they are voluntarily participating in the study.</span></td></tr><tr data-dcnode-id="2753"><td data-dcnode-id="2764"><span data-dcnode-id="2780" instrument_node="">
</span><p data-dcnode-id="2777"><strong data-dcnode-id="2778"><span data-dcnode-id="2779" instrument_node="">Sammy Khagayi</span></strong></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2773"><em data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Statistician</span></em></p><span data-dcnode-id="2772" instrument_node="">

</span></article></div><span data-dcnode-id="2765" instrument_node="">
</span></td><td data-dcnode-id="2755"><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">I provide statistical support at the KEMRI DREAMS IE site in Gem-Western Kenya. I also oversee the overall data processing, management and analysis. I am also part of the DREAMS IE Data Analysis Working Group.</span></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">I have been greatly impressed by the ability of this multidisciplinary&nbsp;group to dig deep into the data and come up with different and important initial findings that not only inform the overall DREAMS objective but also increase our individual skills in complex data analysis.</span></p><span data-dcnode-id="2756" instrument_node="">

</span></article></div><span data-dcnode-id="2737" instrument_node="">
</span></td><td data-dcnode-id="2727"><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">I work as a data analyst at the KEMRI DREAMS IE site in Gem-Western Kenya. Besides data analysis, I also manage the data in preparation for analysis. I am also part of the DREAMS IE Data Analysis Working Group.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">There are many good lessons learnt from the work so far. The ability to incorporate complex analysis in our analysis with focus on details in order to draw conclusions has been the most important one. The platform has also helped gaining new and improving analytical skills and sharing ideas in order to achieve the objectives.</span></p><span data-dcnode-id="2728" instrument_node="">

</span><hr data-dcnode-id="770"><h3 data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Fighting HIV by Empowering Adolescent Girls and Young Women: A Learning Event on PEPFAR’s DREAMS Partnership</span></h3><span data-dcnode-id="767" instrument_node="">

</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">A discussion on lessons learned from the DREAMS program was held in Washington DC with representatives from the DREAMs partners, PEPFAR, the Bill &amp; Melinda Gates Foundation, Population Council and Centre for Global Development.&nbsp;</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="757"><a class="button" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cgdev.org/event/fighting-hiv-empowering-adolescent-girls-and-young-women-learning-event-pepfar%25E2%2580%2599s-dreams"><span data-dcnode-id="759" instrument_node="">Read the full story</span></a></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Dr Isolde Birdthistle, Project Director of DREAMS Impact Evaluation presented some of the data collected in Kenya and South Africa.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="750"><a class="button" data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cgdev.org/blog/dream-big-emerging-results-pepfar-partnership-reduce-hiv-among-adolescent-girls-and-young-women"><span data-dcnode-id="752" instrument_node="">Read the full story</span></a></p><span data-dcnode-id="749" instrument_node="">

</span><p data-dcnode-id="735"><a class="button" data-dcnode-id="736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aua.ac.uk/on-bonding-aua-blog/"><span data-dcnode-id="737" instrument_node="">Read the blog</span></a></p><span data-dcnode-id="734" instrument_node="">
</span><hr data-dcnode-id="733"><figure class="align-right" data-dcnode-id="726" role="group"><div class="embedded-entity" data-dcnode-id="730" data-embed-button="media_browser" data-entity-embed-display="media_image" data-entity-type="media" data-entity-uuid="18a195f0-bc2a-4b73-aaec-37a71f61344b" data-langcode="en"><span data-dcnode-id="732" instrument_node=""> </span><img alt="Photo taken in Stellenbosch, South Africa" data-dcnode-id="731" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/sites/default/files/DREAMS%2520team.png&amp;raw" title="DREAMS Photo taken in Stellenbosch, South Africa" typeof="foaf:Image"></div><span data-dcnode-id="729" instrument_node="">
</span><figcaption data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Photo taken in Stellenbosch, South Africa</span></figcaption></figure><h3 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Meetings in South Africa &amp; AIDS Impact Conference 2017</span></h3><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="720"><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Stellenbosch and Cape Town, 10-15 November 2017</span></em></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">The DREAMS IE team attended a 3 day meeting in Stellenbosch, South Africa to discuss current progress of the study. Representatives of all 4 partners shared progress reports from the implementation of DREAMS IE in Kenya, South Africa and Zimbabwe with the coordinating team from the London School of Hygiene and Tropical Medicine.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="715" instrument_node="">Following the meetings in Stellenbosch, the DREAMS IE team attended the </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aidsimpact.com/"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">AIDS Impact Conference</span></strong></a><span data-dcnode-id="711" instrument_node="">&nbsp;in Century City, Cape Town.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="708" instrument_node="">Contributions of the DREAMS IE teams to the conference are listed </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lshtm.ac.uk/media/17451"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">here</span></strong></a><span data-dcnode-id="704" instrument_node="">.</span></p><span data-dcnode-id="702" instrument_node="">

</span><hr data-dcnode-id="695"><h3 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">London Writing Workshop</span></h3><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="689"><em data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">London, 22-26 May 2017</span></em></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Partners from the DREAMS Impact Evaluation teams from Zimbabwe, Kenya and South Africa met in London to collaborate in a writing workshop to prepare manuscripts for publication in the journal PLoS One.</span></p><span data-dcnode-id="685" instrument_node="">
</span><hr data-dcnode-id="684"><h3 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">DREAMS M&amp;E &nbsp;Planning Meeting</span></h3><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="678"><em data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Durban, 23 July 2016</span></em></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">DREAMS IE participating organizations met in South Africa with members of the IE/IS working group for M&amp;E of DREAMS as well as representatives of the South African government and partners in uMkhanyakude to identify measures &amp; methods to help align the BMGF-funded impact evaluation of DREAMS in South Africa.</span></p><span data-dcnode-id="674" instrument_node="">
