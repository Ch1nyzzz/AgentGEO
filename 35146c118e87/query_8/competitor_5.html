</span><article about="/Memorandum/Estimating-Impact-DREAM-Act" class="publication is-promoted full clearfix" data-dcnode-id="365" data-history-node-id="2438" role="article"><span data-dcnode-id="678" instrument_node="">
</span><div class="content" data-dcnode-id="367"><span data-dcnode-id="677" instrument_node="">
</span><div class="author" data-dcnode-id="671"><span data-dcnode-id="676" instrument_node="">
By </span><span data-dcnode-id="673"><a data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cis.org/Camarota" hreflang="en"><span data-dcnode-id="675" instrument_node="">Steven A. Camarota</span></a></span><span data-dcnode-id="672" instrument_node="">
on November 30, 2010
</span></div><span data-dcnode-id="670" instrument_node="">
</span><div data-dcnode-id="669"></div><span data-dcnode-id="668" instrument_node="">
</span><div class="field field--name-body field--type-text-with-summary field--label-hidden field--item" data-dcnode-id="383"><p data-dcnode-id="663"><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cis.org/sites/cis.org/files/articles/2010/dream-act-costs.pdf"><span data-dcnode-id="667" instrument_node="">Download a pdf of this </span><i data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">memorandum</span></i></a></p><span data-dcnode-id="662" instrument_node="">
</span><hr data-dcnode-id="661"><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Steven A. Camarota is the Director of Research at the Center for Immigration Studies.</span></p><span data-dcnode-id="658" instrument_node="">
</span><hr data-dcnode-id="657"><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">This </span><i data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Memorandum</span></i><span data-dcnode-id="653" instrument_node=""> examines the costs and likely impact of the DREAM Act currently being considered by Congress. The act offers permanent legal status to illegal immigrants up to age 35 who arrived in the United States before age 16 provided they complete two years of college. Under the act, beneficiaries would receive in-state tuition. Given the low income of illegal immigrants, most can be expected to attend state schools, with a cost to taxpayers in the billions of dollars. As both funds and slots are limited at state universities and community colleges, the act may reduce the educational opportunities available to U.S. citizens.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Among the findings:</span></p><span data-dcnode-id="648" instrument_node="">
</span><ul data-dcnode-id="601"><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Assuming no fraud, we conservatively estimate that 1.03 million illegal immigrants will eventually enroll in public institutions (state universities or community colleges) as a result of the DREAM Act. That is, they meet the residence and age requirements of the act, have graduated high school, or will do so, and will come forward.</span></li><span data-dcnode-id="645" instrument_node="">
</span><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">On average, each illegal immigrant who attends a public institution will receive a tuition subsidy from taxpayers of nearly $6,000 for each year he or she attends, for total cost of $6.2 billion a year, not including other forms of financial assistance they may also receive.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">The above estimate is for the number who will enroll in public institutions. A large share of those who attend college may not complete the two full years necessary to receive permanent residence.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The cost estimate assumes that the overwhelming majority will enroll in community colleges, which are much cheaper for students and taxpayers than state universities.</span></li><span data-dcnode-id="636" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">The estimate is only for new students not yet enrolled. It does not include illegal immigrants currently enrolled at public institutions or those who have already completed two years of college. Moreover, it does not include the modest number of illegal immigrants who are expected to attend private institutions.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">The DREAM Act does not provide funding to states and counties to cover the costs it imposes. Since enrollment and funding are limited at public institutions, the act’s passage will require some combination of tuition increases, tax increases to expand enrollment, or a reduction in spaces available for American citizens at these schools.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Tuition hikes will be particularly difficult for students, as many Americans already find it difficult to pay for college. Research indicates that one out of three college students drops out before receiving a degree. Costs are a major reason for the high dropout rate.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">In 2009 there were 10.2 million U.S. citizens under age 35 who had dropped out of college without receiving a degree. There were an additional 15.2 million citizens under age 35 who had completed high school, but never attended college.</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Lawmakers need to consider the strains the DREAM Act will create and the impact of adding roughly one million students to state universities and community colleges on the educational opportunities available to American citizens.</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Providing state schools with added financial support to offset the costs of the DREAM Act would avoid the fiscal costs at the state and local level, but it would shift the costs to federal taxpayers.</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="617" instrument_node="">Advocates of the DREAM Act argue that it will significantly increase tax revenue, because with a college education, recipients will earn more and pay more in taxes over their lifetime. However, several factors need to be considered when evaluating this argument:
</span><ul data-dcnode-id="604"><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Any hoped-for tax benefit is in the long-term, and will not help public institutions deal with the large influx of new students the act creates in the short-term.</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Given limited spaces at public institutions, there will almost certainly be some crowding out of U.S. citizens ─ reducing their lifetime earnings and tax payments.</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">The DREAM Act only requires two years of college; no degree is necessary. The income gains for having some college, but no degree, are modest.</span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Because college dropout rates are high, many illegal immigrants who enroll at public institutions will not complete the two years the act requires, so taxpayers will bear the expense without a long-term benefit.</span></li><span data-dcnode-id="605" instrument_node="">
</span></ul></li><span data-dcnode-id="602" instrument_node="">
</span></ul><h2 data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Data and Methods</span></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">When estimating the immediate costs of the DREAM Act, there are two key methodological issues that have to be resolved. First, how many illegal immigrants are potentially eligible. Second, how many would come forward and enroll in college, particularly at state schools? The size of the illegal immigrant population, the share who would come forward for amnesty, and the potential for fraudulent applications all make for a degree of uncertainty when estimating the number of beneficiaries and the costs associated with the DREAM Act.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="583"><b data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Number of Potential Beneficiaries.</span></b><span data-dcnode-id="592" instrument_node=""> Based on an analysis of the 2006 to 2008 public-use files of the Current Population Survey (CPS), the Migration Policy Institute (MPI), working with Jeffrey S. Passel of the Pew Hispanic Center, has estimated a total of 2.15 million persons who might qualify for the DREAM Act.</span><a data-dcnode-id="589" href="#1"><sup data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">1</span></sup></a><span data-dcnode-id="588" instrument_node=""> Our analysis of the 2009 and 2010 CPS indicates that the number of potentially eligible illegal immigrants has declined by 7 percent, for a total of 1.998 million illegal immigrants who meet the age and residency requirements.</span><a data-dcnode-id="585" href="#2"><sup data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">2</span></sup></a><span data-dcnode-id="584" instrument_node=""> For the most part, in the estimates below we rely on MPI’s population share, but put in our slightly updated numbers for 2009 and 2010.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="581" instrument_node="">We think MPI’s estimate is correct that, of those who meet the age and residency requirement, 43 percent (859,000) are under age 18 and 57 percent (1.139 million) are adults. Of the 1.139 million adults who could potentially benefit from the DREAM act, 5 percent (100,000) have already completed two years of college. Of the remaining 1.039 million adults, we estimate that 51 percent (530,000) have graduated high school.</span><a data-dcnode-id="578" href="#3"><sup data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">3</span></sup></a><span data-dcnode-id="577" instrument_node=""> MPI estimates that 56 percent of these adults have completed high school. This difference slightly reduces our estimate for the number of potential beneficiaries of the DREAM Act compared to MPI’s estimate.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="574" instrument_node="">In addition to the 530,000 adult high school graduates who could benefit from the act, we estimate there are 509,000 adults who have not graduated high school, but meet the act’s age and residency requirements. MPI’s work is not entirely clear on what share of these high school dropouts expect to eventually receive GEDs, but what is provided in their report suggests that 13 percent of these individuals will eventually get a GED.</span><a data-dcnode-id="571" href="#4"><sup data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">4</span></sup></a><span data-dcnode-id="570" instrument_node=""> This is a reasonable estimate and, if correct, it would mean that 66,000 adult drop-outs will eventually complete high school and could enroll in college. MPI also estimates that 85 percent (730,000) of the children (currently under age 18) who meet the residency and age requirements of the DREAM Act will eventually graduate high school. Since we are interested in the added future costs of the act, we need to subtract from the above estimates the 60,000 illegal immigrants already enrolled in college at state expense.</span><a data-dcnode-id="567" href="#5"><sup data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">5</span></sup></a><span data-dcnode-id="566" instrument_node=""> Thus, the total potential population of those who might enroll in college, but who are not enrolled and have not completed two years of college is 1.266 million (530,000 + 66,000 + 730,000 – 60,000). Again these figures do not include the roughly 100,000 illegal immigrants who have already completed two or more years of college and meet the act’s age and residency requirements.</span></p><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="557"><b data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Number Who Will Enroll in College.</span></b><span data-dcnode-id="561" instrument_node=""> There is no way to know for certain what fraction of illegal immigrants who meet or will meet the DREAM Act’s age and residency will come forward and enroll in college. In the 1986 IRCA amnesty only a small share of potential amnesty beneficiaries did not come forward. Given that the illegal immigrants who can benefit from the DREAM Act have grown up in the United States in most cases, and the act allows six years to complete its requirements, we think it likely that 95 percent (1.203 million) of the 1.266 million illegal immigrants who could qualify will eventually come forward to register for provisional legal status under the DREAM Act. Of the 1.203 million high school graduates who will come forward, we assume 50,000 will enroll in the military, which leaves 1.154 million potential new college students. Our estimate for the military is consistent with MPI’s estimate. We estimate that 90 percent (1.038 million) of the 1.154 million high school graduates will enroll in public institutions (state universities and community colleges). The remaining 10 percent will enroll in private universities. Of those that enroll in public institutions, we assume that 80 percent will attend community colleges and 20 percent will enroll in state universities.</span><a data-dcnode-id="558" href="#6"><sup data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">6</span></sup></a></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="545"><b data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Impact on Taxpayers.</span></b><span data-dcnode-id="553" instrument_node=""> To estimate the cost to taxpayers of 1.038 million new students at public institutions of higher learning, we use the 10 states with the largest illegal immigrant populations as reported by the Department of Homeland Security.</span><a data-dcnode-id="550" href="#7"><sup data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">7</span></sup></a><span data-dcnode-id="549" instrument_node=""> Table 1 shows the average difference between in-state and out-of-state tuition at state universities and community colleges for one year of full-time tuition in the top states of illegal immigrant settlement. It is true that all students who attend college, even those that pay out-of-state tuition, receive indirect subsidies from taxpayers, but for the purposes of this analysis we ignore these added costs. If these costs were added into the estimate it would increase the fiscal burden created by the DREAM Act. To estimate the average costs illegal immigrants will create at community colleges we use the county or counties where illegal immigrants are concentrated in these 10 states.</span><a data-dcnode-id="546" href="#8"><sup data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">8</span></sup></a></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542" style="text-align:center"><img alt="Table: Estimated Tuition Subsidy Illegal Immigrants will Receive Under the Dream Act" data-dcnode-id="543" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cis.org/sites/cis.org/files/articles/2010/dream-act-costs-t1.jpg&amp;raw"></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Given the state distribution of illegal immigrants, and assuming an 80 percent/20 percent split between community colleges and state universities, the average per-year cost for the enrolled illegal immigrants students would be $5,970. This individual cost combined with our estimate of 1.038 million new students enrolled at public institutions of higher learning would create a total cost of $6.2 billion a year for each year these students are enrolled, assuming the current fee structure. In light of the age and educational distribution of those eligible for the DREAM Act discussed earlier, about half a million new students can be expected to enroll in public institutions soon after the act is passed, with the remaining half million coming enrolling over the next decade and half.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">Our estimate can be seen as conservative because it only includes taxpayer-provided tuition subsidies to in-state students, not the costs of providing student loans, work study, or any other taxpayer-provided assistance that college students often receive. There is confusion over what financial aid DREAM Act beneficiaries will be eligible to receive. Both the current House and Senate versions of the bill allow recipients to get student loans, which are directly subsidized by taxpayers. In the Senate version of the bill, illegal immigrants cannot receive PELL grants, while the House version of the act, as currently written, would seem to allow some illegal immigrants to receive PELL grants. It should also be remembered that a significant share of these new students will likely drop out. The academic preparation of many of these students is limited as are their financial resources. These factors will work against high rates of completing two years of college.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="527"><b data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Impact on American Students.</span></b><span data-dcnode-id="532" instrument_node=""> Much of the discussion of the DREAM Act has focused on the potential benefit it will create for those that receive the amnesty. Almost no attention has been paid to the impact on American citizens. The DREAM Act does not provide funding to states and counties to cover the costs it imposes. The $6.2 billion estimated cost reported above will have to be absorbed by state and local governments already struggling to close massive budget shortfalls. Public institutions of higher education, especially community colleges, have been hard hit by the drop in tax revenue caused by the current recession. Many are struggling to meet the current demand for enrollment.</span><a data-dcnode-id="529" href="#9"><sup data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">9</span></sup></a><span data-dcnode-id="528" instrument_node=""> Since enrollment and funding are limited at public institutions, the act’s passage will require some combination of tuition increases, tax increases to expand enrollment, or a reduction in spaces available for American citizens at these schools.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="517"><span data-dcnode-id="525" instrument_node="">Tuition hikes will be particularly hard on students, as many Americans already find it difficult to pay for college. Some research indicates that one in three American college students drops out before receiving a degree. Costs are a major reason for the high dropout rate.</span><a data-dcnode-id="522" href="#10"><sup data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">10</span></sup></a><span data-dcnode-id="521" instrument_node=""> In 2009, there were 10.2 million U.S. citizens under age 35 who had dropped out of college without receiving a degree. More than one in three of these college dropouts live in or near poverty. There were another 15.2 million citizens under age 35 who had completed high school, but never attended college. Nearly half of these younger citizens with no college experience live in or near poverty.</span><a data-dcnode-id="518" href="#11"><sup data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">11</span></sup></a></p><span data-dcnode-id="516" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">There is clearly a huge population of citizens who can or do attend college. Lawmakers need to consider the strains the DREAM Act will create and the impact of adding one million students to state universities and community colleges on the educational opportunities available to American Citizens.</span></p><span data-dcnode-id="513" instrument_node="">
</span><h2 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Conclusion</span></h2><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Supporters of the DREAM Act have emphasized the often-compelling stories of illegal immigrants brought to the United States as children. But there has been almost no discussion of the likely impact the act would have on public institutions of higher learning and the American citizens and legal immigrants who wish to attend these same institutions. Given the income of most illegal immigrant families, the overwhelming majority can be expected to attend community colleges and state universities, which are much cheaper than private institutions.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Enrollment and funding at American’s public institutions of higher learning are limited. As a result, passage of the DREAM Act will likely have significant negative implications for American citizens who wish to attend these same schools. Many of these institutions are already under enormous fiscal strain, as state and local governments struggle to close large budgetary shortfalls. The DREAM Act does not provide funding to states and counties to cover the costs it imposes. To deal with the added enrollment the act will create, public institutions will have to increase tuition, increase taxes, or reduce the number of spaces available for American citizens at these schools. Many Americans already find it difficult to pay for college. Research indicates that at least one in three American college students drops out before receiving a degree.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Advocates of the DREAM act argue that it will significantly increase tax revenue because the DREAM Act recipients will earn much more money over the course of their lifetimes. It is certainly true that college graduates earn dramatically more than those with only a high school diploma. But even if the lifetime income and tax payments of DREAM Act recipients is enhanced in the manner supporters hope, those benefits are all in the long-term and provide no assistance to public institution dealing with the influx the act creates in the short-term.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="500" instrument_node="">In addition, the difference in earnings between high school graduates and those with some college but no degree is not so great. The DREAM Act requires only that two years of college be completed; no degree, not even an associate’s, is necessary to gain permanent legal status. In 2009, foreign-born Hispanic high school graduates earned 77 percent as much as someone who had attended college, but not received a degree.</span><a data-dcnode-id="497" href="#12"><sup data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">12</span></sup></a><span data-dcnode-id="496" instrument_node=""> Perhaps most importantly, any argument that the act will increase tax revenue in the long-run has to address the fact that adding this many new students to public institutions of higher learning will have some negative impact on the college enrollment of U.S. citizens given the limited funds and spaces available at public initiations. Thus, passage of the DREAM act is likely to reduce the lifetime earnings of U.S. citizens who might have attended or otherwise completed college, but who are crowded or priced out of such opportunities by the DREAM Act.</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">We know that the college drop-out rate is very high. There are more than 10 million U.S. citizen college drop-outs under age 35 in the United States. One way to deal with the burden the DREAM Act creates is for it to include funding that would offset the costs the act creates for state and local governments. In its current form, the act provides no such funding. We have estimated that, given the number of eligible recipients and their distribution across states, the likely costs to tax payers would be $6.2 billion a year. This estimate provides a good starting point for the size of the funding Washington would need to provide public institutions of higher learning to avoid reducing educational opportunities for U.S. citizens and legal immigrants.</span></p><span data-dcnode-id="491" instrument_node="">
</span><hr data-dcnode-id="490"><h1 data-dcnode-id="487"><end data-dcnode-id="488" notes=""><span data-dcnode-id="489" instrument_node=""> End Notes</span></end></h1><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="478"><a data-dcnode-id="483" id="1" name="1"><sup data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">1</span></sup></a><span data-dcnode-id="482" instrument_node=""> See “DREAM vs. Reality: An Analysis of Potential DREAM Act Beneficiaries,” Migration Policy Institute, at </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf" title="http://www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf"><span data-dcnode-id="481" instrument_node="">http://www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf</span></a><span data-dcnode-id="479" instrument_node="">.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="466"><a data-dcnode-id="474" id="2" name="2"><sup data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">2</span></sup></a><span data-dcnode-id="473" instrument_node=""> Our analysis is based on the 2009 and 2010 Current Population Surveys, which are the same surveys the Pew Hispanic Center used to estimate the illegal immigrant population. The Department of Homeland Security estimates a 9 percent decline in the illegal immigrant population between 2007 and 2010. Our estimate is similar to these declines for the overall numbers, but among those who arrived at younger ages and have been here longer the decline is somewhat less pronounced. Our 2009 estimate of the illegal population can be found at </span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cis.org/illegalimmigration-shiftingtide" title="http://www.cis.org/illegalimmigration-shiftingtide"><span data-dcnode-id="472" instrument_node="">http://www.cis.org/illegalimmigration-shiftingtide</span></a><span data-dcnode-id="470" instrument_node="">. The Department of Homeland Security estimates of the illegal immigrant population can be found at </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_2009.pdf" title="http://www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_2009.pdf"><span data-dcnode-id="469" instrument_node="">http://www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_20...</span></a><span data-dcnode-id="467" instrument_node="">.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><a data-dcnode-id="462" id="3" name="3"><sup data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">3</span></sup></a><span data-dcnode-id="461" instrument_node=""> We base our estimate on analysis of the 2009 and 2010 March Current Population Surveys.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="451"><a data-dcnode-id="456" id="4" name="4"><sup data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">4</span></sup></a><span data-dcnode-id="455" instrument_node=""> See page 17 of “DREAM vs. Reality: An Analysis of Potential DREAM Act Beneficiaries,” Migration Policy Institute, at </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf" title="http://www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf"><span data-dcnode-id="454" instrument_node="">http://www.migrationpolicy.org/pubs/DREAM-Insight-July2010.pdf</span></a><span data-dcnode-id="452" instrument_node="">.</span></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="442"><a data-dcnode-id="447" id="5" name="5"><sup data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">5</span></sup></a><span data-dcnode-id="446" instrument_node=""> Based partly on reported numbers from the states that provide in-state tuition, the Federation for American Immigration Reform has estimated 60,000 illegal immigrant students enrolled in public institutions of higher learning. See page 52 of “The Fiscal Burden of Illegal Immigration on United States Taxpayers,” at </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fairus.org/site/DocServer/USCostStudy_2010.pdf%3FdocID%3D4921" title="http://www.fairus.org/site/DocServer/USCostStudy_2010.pdf?docID=4921"><span data-dcnode-id="445" instrument_node="">http://www.fairus.org/site/DocServer/USCostStudy_2010.pdf?docID=4921</span></a><span data-dcnode-id="443" instrument_node="">.</span></p><span data-dcnode-id="441" instrument_node="">
</span><p data-dcnode-id="436"><a data-dcnode-id="438" id="6" name="6"><sup data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">6</span></sup></a><span data-dcnode-id="437" instrument_node=""> In their estimates, MPI states that “community college systems would be the primary venues through which beneficiaries work to meet the law’s requirements,” page 11 of “DREAM vs. Reality: An Analysis of Potential DREAM Act Beneficiaries.” We think this correct. Our own research from 2007 estimated that 59 percent of illegal immigrants lived in or near poverty (under 200 percent of the poverty threshold). In their estimates, MPI emphasizes the low income of most illegal immigrants. As a result, our estimate that 80 percent will attempt to meet the act’s requirements by using community colleges is reasonable. However, if a larger share enroll in state universities then the cost to taxpayers would increase proportionally, as tuition subsidies are much more extensive at these schools.</span></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="424"><a data-dcnode-id="432" id="7" name="7"><sup data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">7</span></sup></a><span data-dcnode-id="431" instrument_node=""> DHS estimates of the illegal population can be found on page 4 of </span><i data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Estimates of the Unauthorized Immigrant Population Residing in the United States: January 2009,</span></i><span data-dcnode-id="428" instrument_node=""> at </span><a data-dcnode-id="426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_2009.pdf" title="http://www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_2009.pdf"><span data-dcnode-id="427" instrument_node="">http://www.dhs.gov/xlibrary/assets/statistics/publications/ois_ill_pe_20...</span></a><span data-dcnode-id="425" instrument_node="">.</span></p><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="418"><a data-dcnode-id="420" id="8" name="8"><sup data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">8</span></sup></a><span data-dcnode-id="419" instrument_node=""> For university costs we use the flagship school in each state university system, with the exception of California where we average costs for UC Berkeley and UCLA. California has a more centralized fee structure for community colleges than most states and so we use the overall state average for the difference between in- and out-of-state. For Arizona, we use the costs at Maricopa County Community College; for Nevada we use Clark County Community College; for Illinois we use Cook County; for Florida we use Miami-Dade County; and for New Jersey we use Bergen County. For Texas, we average the costs for Harris and Dallas Counties; for Georgia we average the costs for Fulton and DeKalb Counties; and for North Carolina we average the costs of Mecklenburg and Wake counties. For New York State we assume the following breakdown: 20 percent would attend state universities, 40 percent would attend New York City College, and 40 percent would attend community college. For New York community colleges we averaged the in- and out-of-state cost difference for Queens and Brooklyn.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="409"><a data-dcnode-id="414" id="9" name="9"><sup data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">9</span></sup></a><span data-dcnode-id="413" instrument_node=""> See, for example, “Workers seek new skills at community colleges, but classes are full,” by Peter Whoriskey, </span><i data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">The Washington Post,</span></i><span data-dcnode-id="410" instrument_node=""> November 27, 2010, and “Community Colleges Cutting Back on Open Access” by Tamar Lewin, June 23, 2010.</span></p><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="397"><a data-dcnode-id="405" id="10" name="10"><sup data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">10</span></sup></a><span data-dcnode-id="404" instrument_node=""> Based on an analysis of the U.S. Department of Education’s Integrated Postsecondary Education Data System (IPEDS), a widely cited recent report from the American Institute for Research estimated that 30 percent of full-time and 50 percent of part-time college students drop out after the first year. See page 16 of “Finishing the First Lap: The Cost of First-Year Student Attrition in America’s Four-Year Colleges and Universities,” at </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.air.org/files/AIR_Schneider_Finishing_the_First_Lap_Oct10.pdf" title="http://www.air.org/files/AIR_Schneider_Finishing_the_First_Lap_Oct10.pdf"><span data-dcnode-id="403" instrument_node="">http://www.air.org/files/AIR_Schneider_Finishing_the_First_Lap_Oct10.pdf</span></a><span data-dcnode-id="401" instrument_node="">. While there is some debate about the many reasons for the high drop-out rate, most researchers agree that the cost of college is one of the leading reasons. A report from Public Agenda found that more than half of those who left college stated as a reason the “need to work and make money.” See “With Their Whole Lives Ahead of Them,” at </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.publicagenda.org/files/pdf/theirwholelivesaheadofthem.pdf" title="www.publicagenda.org/files/pdf/theirwholelivesaheadofthem.pdf"><span data-dcnode-id="400" instrument_node="">www.publicagenda.org/files/pdf/theirwholelivesaheadofthem.pdf</span></a><span data-dcnode-id="398" instrument_node="">.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="391"><a data-dcnode-id="393" id="11" name="11"><sup data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">11</span></sup></a><span data-dcnode-id="392" instrument_node=""> Based on a Center for Immigration Studies analysis of the public-use file of the 2009 American Community Survey.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="385"><a data-dcnode-id="387" id="12" name="12"><sup data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">12</span></sup></a><span data-dcnode-id="386" instrument_node=""> Based on a Center for Immigration Studies analysis of the public-use file of the 2010 Current Population Survey. The figures are for foreign-born Hispanics ages 25 to 65. We use this population as a point of comparison because 80 percent of those expected to benefit from the act are Hispanic.</span></p><span data-dcnode-id="384" instrument_node="">
