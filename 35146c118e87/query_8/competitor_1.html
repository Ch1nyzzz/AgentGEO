</span><p data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">HIV/AIDS is a complex violence issue that has a huge impact on learning. It is a pandemic that is spread through the culture of violence. Those infected or affected by the disease are often treated violently and discriminated against. There are a myriad of traumatic experiences that result from this disease, the following links and stories reveal some of them.</span></p><span data-dcnode-id="151" instrument_node="">
