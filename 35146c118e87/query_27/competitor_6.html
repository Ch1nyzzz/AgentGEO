</span><h3 data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">In This Article</span></h3><span data-dcnode-id="1212" instrument_node="">
</span><ul data-dcnode-id="1194"><span data-dcnode-id="1211" instrument_node="">
</span><li data-dcnode-id="1208"><a class="scrollto" data-dcnode-id="1209" href="javascript:void(0);" id="toc-why-does-aging-affect-sleep--1"><span data-dcnode-id="1210" instrument_node="">Why Does Aging Affect Sleep?</span></a></li><span data-dcnode-id="1207" instrument_node="">
</span><li data-dcnode-id="1204"><a class="scrollto" data-dcnode-id="1205" href="javascript:void(0);" id="toc-how-does-aging-affect-sleep--2"><span data-dcnode-id="1206" instrument_node="">How Does Aging Affect Sleep?</span></a></li><span data-dcnode-id="1203" instrument_node="">
</span><li data-dcnode-id="1200"><a class="scrollto" data-dcnode-id="1201" href="javascript:void(0);" id="toc-common-sleep-issues-in-seniors-3"><span data-dcnode-id="1202" instrument_node="">Common Sleep Issues in Seniors</span></a></li><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1196"><a class="scrollto" data-dcnode-id="1197" href="javascript:void(0);" id="toc-sleep-tips-for-seniors-4"><span data-dcnode-id="1198" instrument_node="">Sleep Tips for Seniors</span></a></li><span data-dcnode-id="1195" instrument_node="">
</span></ul><span data-dcnode-id="1193" instrument_node="">
</span></div><span data-dcnode-id="1191" instrument_node="">
</span><div class="right-side" data-dcnode-id="592"><span data-dcnode-id="1190" instrument_node="">
</span><div class="content-editor" data-dcnode-id="798"><span data-dcnode-id="1189" instrument_node="">
</span><div data-dcnode-id="1188" id="speechkit-player" style="height:60px;"></div><span data-dcnode-id="1187" instrument_node="">
</span><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1183" instrument_node="">The number of older adults in the United States is expected to grow significantly over the next several decades. In fact, while people over 65 made up about 15% of the U.S. population in 2016, they’re expected to </span><span class="trusted-wrap" data-dcnode-id="1178"><a class="add-trustee trusted" data-dcnode-id="1179" data-href="https://acl.gov/sites/default/files/Aging%20and%20Disability%20in%20America/2017OlderAmericansProfile.pdf" data-reference-id="1" data-source-id="97" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1182" instrument_node="">make up over 21% of the population by 2040</span><sup data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">1</span></sup></a></span><span data-dcnode-id="1177" instrument_node="">. This trend is also playing out globally, as the United Nations estimates that the amount of </span><span class="trusted-wrap" data-dcnode-id="1172"><a class="add-trustee trusted" data-dcnode-id="1173" data-href="https://www.un.org/en/development/desa/publications/world-population-prospects-2015-revision.html" data-reference-id="2" data-source-id="98" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1176" instrument_node="">people over 60 will double by 2050 and triple by 2100</span><sup data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">2</span></sup></a></span><span data-dcnode-id="1171" instrument_node="">.</span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Aging is tied to numerous health concerns, including sleep difficulties. In fact, poor sleep can contribute to many of these problems, reducing quality of life in people over 65.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">In order to address the unique needs of older adults, it’s more important than ever to understand the effects of aging on health. Since almost one third of our lives are spent sleeping, reviewing the relationship between aging and sleep is a fundamental part of promoting overall health in the elderly.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><h2 data-dcnode-id="1161" id="why-does-aging-affect-sleep--1"><span data-dcnode-id="1162" instrument_node="">Why Does Aging Affect Sleep?</span></h2><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1159" instrument_node="">It’s common for older adults to experience changes in the quality and duration of their sleep. Many of these changes occur due to changes in the body’s internal clock. A master clock in a part of the brain called the hypothalamus is composed of about 20,000 cells that form the </span><span class="trusted-wrap" data-dcnode-id="1154"><a class="add-trustee trusted" data-dcnode-id="1155" data-href="https://www.nigms.nih.gov/education/fact-sheets/Pages/circadian-rhythms.aspx" data-reference-id="3" data-source-id="58" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1158" instrument_node=""> suprachiasmatic nucleus (SCN)</span><sup data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">3</span></sup></a></span><span data-dcnode-id="1153" instrument_node="">.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1150" instrument_node="">The SCN controls 24-hour daily cycles, called </span><a data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/circadian-rhythm"><span data-dcnode-id="1149" instrument_node="">circadian rhythms</span></a><span data-dcnode-id="1147" instrument_node="">. These circadian rhythms influence daily cycles, like when people get hungry, when the body releases certain hormones, and when a person feels sleepy or alert.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1137"><span data-dcnode-id="1144" instrument_node="">As people get older, their sleep changes due to </span><span class="trusted-wrap" data-dcnode-id="1139"><a class="add-trustee trusted" data-dcnode-id="1140" data-href="https://pubmed.ncbi.nlm.nih.gov/29412976/" data-reference-id="4" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1143" instrument_node="">effects of an aging SCN</span><sup data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">4</span></sup></a></span><span data-dcnode-id="1138" instrument_node="">. Deterioration in the function of the SCN can disrupt circadian rhythms, directly influencing when people feel tired and alert.</span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1128"><span data-dcnode-id="1135" instrument_node="">The SCN receives information from the eyes, and light is one of the most powerful cues for maintaining circadian rhythms. Unfortunately, research shows that many older people have </span><span class="trusted-wrap" data-dcnode-id="1130"><a class="add-trustee trusted" data-dcnode-id="1131" data-href="https://pubmed.ncbi.nlm.nih.gov/19122865/" data-reference-id="5" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1134" instrument_node="">insufficient exposure</span><sup data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">5</span></sup></a></span><span data-dcnode-id="1129" instrument_node=""> to daylight, averaging around one hour each day. Daylight exposure may be even more restricted for people who live in nursing homes as well as those with Alzheimer’s disease.</span></p><span data-dcnode-id="1127" instrument_node="">
</span><p data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Changes in production of hormones, such as melatonin and cortisol, may also play a role in disrupted sleep in older adults. As people age, the body secretes less melatonin, which is normally produced in response to darkness that helps promote sleep by coordinating circadian rhythms.</span></p><span data-dcnode-id="1124" instrument_node="">
</span><h3 data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Health Conditions and Sleep</span></h3><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1120" instrument_node="">Mental and physical health conditions may also interfere with sleep. Conditions that commonly affect sleep in older people include </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/mental-health/depression-and-sleep"><span data-dcnode-id="1119" instrument_node="">depression</span></a><span data-dcnode-id="1117" instrument_node="">, anxiety, heart disease, diabetes, and conditions that cause discomfort and pain, such as arthritis.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">The relationship between physical health and sleep is complicated by the fact that many older adults are diagnosed with more than one health condition. In fact, the 2003 National Sleep Foundation Sleep in America Poll looked at 11 common health conditions and found that 24% of people between 65 and 84 years old reported being diagnosed with four or more health conditions. Those with multiple health conditions were more likely to report getting less than six hours of sleep, having poor sleep quality, and experiencing symptoms of a sleep disorder.</span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1111" instrument_node="">Sleep issues may also be related to the side effects of medications. Almost 40% of adults over the age of 65 take </span><span class="trusted-wrap" data-dcnode-id="1106"><a class="add-trustee trusted" data-dcnode-id="1107" data-href="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4573668/" data-reference-id="6" data-source-id="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1110" instrument_node="">five or more medications</span><sup data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">6</span></sup></a></span><span data-dcnode-id="1105" instrument_node="">. Many over-the-counter and prescription drugs can contribute to sleep issues. For example, antihistamines and opiates may cause daytime drowsiness, while medications such as antidepressants and corticosteroids may keep older people awake and contribute to the symptoms of insomnia. The interactions of multiple medications may cause unanticipated effects on sleep.</span></p><span data-dcnode-id="1103" instrument_node="">
</span><h3 data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">Lifestyle and Sleep</span></h3><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Poor sleep quality in seniors can be related to the lifestyle changes that often come with aging. For example, retirement leads to less working outside of the home and possibly more napping and less of a structured sleep schedule. Other significant life changes, such as loss of independence and social isolation, can increase stress and anxiety, which can also contribute to sleep issues.</span></p><span data-dcnode-id="1097" instrument_node="">
</span><div class="klaviyo-form-QT7Gq7" data-dcnode-id="1096"></div><span data-dcnode-id="1095" instrument_node="">
</span><div class="klaviyo-form-UMmu6F" data-dcnode-id="1094"></div><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1090" instrument_node="">
</span><h2 data-dcnode-id="1088" id="how-does-aging-affect-sleep--2"><span data-dcnode-id="1089" instrument_node="">How Does Aging Affect Sleep?</span></h2><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Aging affects people differently. While some older adults may have no significant disruptions in their sleep, others complain about getting less sleep and having worse sleep quality. Experts have found several common sleep disturbances in older adults:</span></p><span data-dcnode-id="1084" instrument_node="">
</span><ul data-dcnode-id="1047"><span data-dcnode-id="1083" instrument_node="">
</span><li data-dcnode-id="1079"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">Shifting sleep schedule</span></strong><span data-dcnode-id="1080" instrument_node="">: As people age, the body’s circadian rhythms actually shift forward in time. This shift is called a phase advance. Many older adults experience this phase advance as getting tired earlier in the afternoon and waking up earlier in the morning.</span></li><span data-dcnode-id="1078" instrument_node="">
</span><li data-dcnode-id="1065"><strong data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Waking up at night</span></strong><span data-dcnode-id="1075" instrument_node="">: Research has also shown that as people get older, they often experience changes in their sleep architecture. Sleep architecture refers to how people cycle through the different </span><a data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/stages-of-sleep"><span data-dcnode-id="1074" instrument_node="">stages of sleep</span></a><span data-dcnode-id="1072" instrument_node="">. Older adults spend more time in the earlier, lighter stages of sleep and less time in the later, deeper stages. These shifts may contribute to older people </span><span class="trusted-wrap" data-dcnode-id="1067"><a class="add-trustee trusted" data-dcnode-id="1068" data-href="https://pubmed.ncbi.nlm.nih.gov/28384471/" data-reference-id="7" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1071" instrument_node="">waking up more often during the night</span><sup data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">7</span></sup></a></span><span data-dcnode-id="1066" instrument_node=""> and having more fragmented, less restful sleep.</span></li><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1054"><strong data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Daytime napping</span></strong><span data-dcnode-id="1061" instrument_node="">: Research estimates that about 25% of older adults take naps, compared with around </span><span class="trusted-wrap" data-dcnode-id="1056"><a class="add-trustee trusted" data-dcnode-id="1057" data-href="https://pubmed.ncbi.nlm.nih.gov/11560181/" data-reference-id="8" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1060" instrument_node="">8% of younger adults</span><sup data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">8</span></sup></a></span><span data-dcnode-id="1055" instrument_node="">. While some experts suggest that a short daytime nap may be beneficial, many agree that extended napping and napping later in the day can make it harder to fall asleep at bedtime and create nighttime sleep disruptions.</span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1049"><strong data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Longer recovery from changes in sleep schedule</span></strong><span data-dcnode-id="1050" instrument_node="">: Alterations in how the body regulates circadian rhythms make it more difficult for older people to adjust to sudden changes in their sleep schedules, like during daylight savings time or when experiencing jet lag.</span></li><span data-dcnode-id="1048" instrument_node="">
</span></ul><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Do Older People Need Less Sleep?</span></h3><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1042" instrument_node="">According to the National Institution on Aging, it is </span><span class="trusted-wrap" data-dcnode-id="1037"><a class="add-trustee trusted" data-dcnode-id="1038" data-href="https://www.nia.nih.gov/health/10-myths-about-aging" data-reference-id="9" data-source-id="34" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1041" instrument_node="">considered a myth</span><sup data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">9</span></sup></a></span><span data-dcnode-id="1036" instrument_node=""> that older adults require less sleep than younger individuals. Many older adults have a hard time getting the sleep they need, but that doesn’t mean they need less sleep. The amount of sleep that a person needs can decrease from infancy to adulthood, but this trend appears to stop around age 60. The </span><span class="trusted-wrap" data-dcnode-id="1031"><a class="add-trustee trusted" data-dcnode-id="1032" data-href="https://pubmed.ncbi.nlm.nih.gov/29073412/" data-reference-id="10" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1035" instrument_node="">National Sleep Foundation guidelines</span><sup data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">10</span></sup></a></span><span data-dcnode-id="1030" instrument_node=""> advise that people over 65 should get seven to eight hours of sleep each night.</span></p><span data-dcnode-id="1028" instrument_node="">
</span><h2 data-dcnode-id="1026" id="common-sleep-issues-in-seniors-3"><span data-dcnode-id="1027" instrument_node="">Common Sleep Issues in Seniors</span></h2><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1024" instrument_node="">Researchers estimate that between 40% and 70% of older adults have chronic sleep issues and up to </span><span class="trusted-wrap" data-dcnode-id="1019"><a class="add-trustee trusted" data-dcnode-id="1020" data-href="https://pubmed.ncbi.nlm.nih.gov/28159095/" data-reference-id="11" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1023" instrument_node="">half of cases may be undiagnosed</span><sup data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">11</span></sup></a></span><span data-dcnode-id="1018" instrument_node="">. Chronic sleep problems can significantly interfere with older adult’s daily activities and reduce their quality of life. Common sleep issues in older adults include:</span></p><span data-dcnode-id="1016" instrument_node="">
</span><ul data-dcnode-id="943"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1008"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Pain</span></strong><span data-dcnode-id="1012" instrument_node="">: Discomfort and </span><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/physical-health/pain-and-sleep"><span data-dcnode-id="1011" instrument_node="">pain</span></a><span data-dcnode-id="1009" instrument_node=""> can lead to inadequate rest for some older adults. Pain and sleeplessness can become a vicious cycle, in which less sleep can lead to more pain, so it’s important to talk to a doctor if pain is interfering with sleep.</span></li><span data-dcnode-id="1007" instrument_node="">
</span><li data-dcnode-id="994"><strong data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Nighttime urination</span></strong><span data-dcnode-id="1004" instrument_node="">: </span><a data-dcnode-id="1002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/physical-health/nocturia-or-frequent-unrination-night"><span data-dcnode-id="1003" instrument_node="">Nighttime urination</span></a><span data-dcnode-id="1001" instrument_node="">, also called nocturia, increases with age due to physical changes in the urinary system among other factors. This issue </span><span class="trusted-wrap" data-dcnode-id="996"><a class="add-trustee trusted" data-dcnode-id="997" data-href="https://pubmed.ncbi.nlm.nih.gov/26632430/" data-reference-id="12" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1000" instrument_node="">may affect up to 80% of older adults</span><sup data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">12</span></sup></a></span><span data-dcnode-id="995" instrument_node="">, contributing to increased sleep disruptions.</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="986"><strong data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Insomnia</span></strong><span data-dcnode-id="990" instrument_node="">: Having persistent difficulty in falling or staying asleep is one of the most common sleep issues in older adults. </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/insomnia/older-adults"><span data-dcnode-id="989" instrument_node="">Insomnia</span></a><span data-dcnode-id="987" instrument_node=""> may be caused by a variety of overlapping factors but can get better with treatment.</span></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="978"><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Daytime drowsiness</span></strong><span data-dcnode-id="982" instrument_node="">: Many people believe that feeling tired during the day is a normal part of getting older, but this is not the case. Around 20% of older people experience </span><a data-dcnode-id="980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/excessive-sleepiness"><span data-dcnode-id="981" instrument_node="">excessive daytime sleepiness</span></a><span data-dcnode-id="979" instrument_node="">, which may be a sign of an underlying health condition rather than merely old age. Excessive daytime sleepiness in older adults may be a symptom of health issues like sleep apnea, cognitive impairment, or cardiovascular issues.</span></li><span data-dcnode-id="977" instrument_node="">
</span><li data-dcnode-id="970"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Sleep Apnea</span></strong><span data-dcnode-id="974" instrument_node="">: </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-apnea/obstructive-sleep-apnea"><span data-dcnode-id="973" instrument_node="">Obstructive sleep apnea</span></a><span data-dcnode-id="971" instrument_node=""> can cause pauses in breathing during sleep. These pauses are related to a repeated collapse (apnea) or partial collapse (hypopnea) of the upper airway. Sleep apnea causes fragmented sleep and can affect oxygen levels in the body, leading to headaches, daytime sleepiness, and difficulty thinking clearly.</span></li><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="953"><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Restless Leg Syndrome</span></strong><span data-dcnode-id="966" instrument_node="">: </span><a data-dcnode-id="964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/restless-legs-syndrome"><span data-dcnode-id="965" instrument_node="">Restless leg syndrome</span></a><span data-dcnode-id="963" instrument_node=""> (RLS) affects 9% to 20% of older people, while </span><a data-dcnode-id="961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/periodic-limb-movement-disorder"><span data-dcnode-id="962" instrument_node="">periodic limb movements of sleep</span></a><span data-dcnode-id="960" instrument_node=""> (PLMS) </span><span class="trusted-wrap" data-dcnode-id="955"><a class="add-trustee trusted" data-dcnode-id="956" data-href="https://pubmed.ncbi.nlm.nih.gov/15172211/" data-reference-id="13" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="959" instrument_node="">affects 4% to 11%</span><sup data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">13</span></sup></a></span><span data-dcnode-id="954" instrument_node="">. RLS causes an urge to move the legs while resting or sleeping. PLMS causes involuntary movements in the lower limbs, most commonly in the feet. Both disorders can significantly impact sleep and overall quality of life.</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="945"><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">REM sleep behavior disorder</span></strong><span data-dcnode-id="949" instrument_node="">: </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/parasomnias/rem-sleep-behavior-disorder"><span data-dcnode-id="948" instrument_node="">REM sleep behavior disorder</span></a><span data-dcnode-id="946" instrument_node=""> (RBD) primarily affects older people. While most people’s bodies are still while they’re dreaming, this disorder can cause people to act out their dreams, sometimes violently.</span></li><span data-dcnode-id="944" instrument_node="">
</span></ul><span data-dcnode-id="942" instrument_node="">
</span><h2 data-dcnode-id="940" id="sleep-tips-for-seniors-4"><span data-dcnode-id="941" instrument_node="">Sleep Tips for Seniors</span></h2><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="938" instrument_node="">Research has shown that older people can take steps to improve their sleep. These steps often involve focusing on improving </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-hygiene"><span data-dcnode-id="937" instrument_node="">sleep hygiene</span></a><span data-dcnode-id="935" instrument_node=""> and developing habits that encourage quality sleep. Here are a few tips for getting a better night’s rest in your golden years:</span></p><span data-dcnode-id="933" instrument_node="">
</span><ul data-dcnode-id="904"><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="926"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Exercise</span></strong><span data-dcnode-id="929" instrument_node="">: Older people who exercise regularly fall asleep faster, sleep longer, and report better quality of sleep. Exercise is one of the best things older people can do for their health. The National Institute of Aging offers </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nia.nih.gov/health/exercise-physical-activity" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="928" instrument_node="">helpful tips for exercising safely as an older person.</span></a></li><span data-dcnode-id="925" instrument_node="">
</span><li data-dcnode-id="921"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Reduce bedroom distractions</span></strong><span data-dcnode-id="922" instrument_node="">: Televisions, cellphones, and bright lights can make it more challenging to fall asleep. Keep the television in another room and try not to fall asleep with it turned on. Move electronics out of the bedroom and reserve the bedroom for only sleeping and sex.</span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="916"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Avoid substances that discourage sleep</span></strong><span data-dcnode-id="917" instrument_node="">: Substances like alcohol, tobacco, caffeine, and even large meals late in the day can make sleep more challenging. Try quitting smoking, reducing caffeine intake, and eating dinner at least four hours before bedtime.</span></li><span data-dcnode-id="915" instrument_node="">
</span><li data-dcnode-id="911"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Keep a regular sleep schedule</span></strong><span data-dcnode-id="912" instrument_node="">: Remember that aging makes it more difficult to recover from lost sleep. Avoid sudden changes in sleep schedules. This means going to bed and waking up at the same time every day and being careful about napping too long.</span></li><span data-dcnode-id="910" instrument_node="">
</span><li data-dcnode-id="906"><strong data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Develop a bedtime routine</span></strong><span data-dcnode-id="907" instrument_node="">: Find activities that help you relax before bed. Many older people enjoy a bath, reading, or finding some quiet time before getting into bed.</span></li><span data-dcnode-id="905" instrument_node="">
</span></ul><span data-dcnode-id="903" instrument_node="">
</span><h3 data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Safe Sleeping for Seniors</span></h3><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">Insufficient sleep in older adults can lead to a higher risk of falls and accidents. As people age, it’s helpful to make changes to the bedroom environment that reduce the risk of accidents and makes it easier to call for help when needed. Here are some steps to consider for a safer night’s sleep:</span></p><span data-dcnode-id="897" instrument_node="">
</span><ul data-dcnode-id="880"><span data-dcnode-id="896" instrument_node="">
</span><li data-dcnode-id="892"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Keep a telephone by the bed</span></strong><span data-dcnode-id="893" instrument_node="">: It’s important to be able to call for help from bed. Put a phone on the nightstand and, even better, keep a list of important phone numbers nearby. Be careful about keeping a cell phone nearby particularly if it receives too many notifications during the night or if there’s too much temptation to look at the bright screen.</span></li><span data-dcnode-id="891" instrument_node="">
</span><li data-dcnode-id="887"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Make sure a light is within reach</span></strong><span data-dcnode-id="888" instrument_node="">: Having a light easily accessible reduces the need to stumble around in the dark when getting out of bed. This can reduce the risk of trips and falls when trying to find the lightswitch. Lights with motion sensors may be helpful in hallways or the bathroom.</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="882"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Reduce hazards in the bedroom</span></strong><span data-dcnode-id="883" instrument_node="">: Never smoke in bed and be careful when placing objects in the bedroom that may become trip hazards, like rugs, cords, stools, and furniture.</span></li><span data-dcnode-id="881" instrument_node="">
</span></ul><span data-dcnode-id="879" instrument_node="">

</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">The Sleep Foundation editorial team is dedicated to providing content that meets the highest standards for accuracy and objectivity. Our editors and medical experts rigorously evaluate every article and guide to ensure the information is factual, up-to-date, and free of bias.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The Sleep Foundation fact-checking guidelines are as follows:</span></p><span data-dcnode-id="217" instrument_node="">
</span><ol data-dcnode-id="194"><span data-dcnode-id="216" instrument_node="">
</span><li class="check" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">We only cite reputable sources when researching our guides and articles. These include peer-reviewed journals, government reports, academic and medical associations, and interviews with credentialed medical experts and practitioners.</span></li><span data-dcnode-id="213" instrument_node="">
</span><li class="check" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">All scientific data and information must be backed up by at least one reputable source. Each guide and article includes a comprehensive bibliography with full citations and links to the original sources</span></li><span data-dcnode-id="210" instrument_node="">
</span><li class="check" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Some guides and articles feature links to other relevant Sleep Foundation pages. These internal links are intended to improve ease of navigation across the site, and are never used as original sources for scientific data or information.</span></li><span data-dcnode-id="207" instrument_node="">
</span><li class="check" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">A member of our medical expert team provides a final review of the content and sources cited for every guide, article, and product review concerning medical- and health-related topics. Inaccurate or unverifiable information will be removed prior to publication.</span></li><span data-dcnode-id="204" instrument_node="">
</span><li class="check" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Plagiarism is never tolerated. Writers and editors caught stealing content or improperly citing sources are immediately terminated, and we will work to rectify the situation with the original publisher(s).</span></li><span data-dcnode-id="201" instrument_node="">
</span><li class="check" data-dcnode-id="196"><span data-dcnode-id="200" instrument_node="">Although Sleep Foundation maintains affiliate partnerships with brands and e-commerce portals, these relationships never have any bearing on our product reviews or recommendations. Read our full </span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/advertising-disclosure"><span data-dcnode-id="199" instrument_node="">Advertising Disclosure</span></a><span data-dcnode-id="197" instrument_node=""> for more information.</span></li><span data-dcnode-id="195" instrument_node="">
</span></ol><span data-dcnode-id="193" instrument_node="">
