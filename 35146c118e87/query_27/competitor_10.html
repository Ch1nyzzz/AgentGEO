n data-dcnode-id="998" instrument_node=""> — </span><span data-dcnode-id="996"><span data-dcnode-id="997" instrument_node=""> Updated on March 4, 2021</span></span></div></section><div data-dcnode-id="575"><nav class="css-1y9pypl" data-dcnode-id="980" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="981"><li class="css-t753mo" data-dcnode-id="991"><a class="css-12nlsmv" data-dcnode-id="992" href="#science-of-napping"><span data-dcnode-id="993" instrument_node="">Science of napping</span></a></li><li class="css-t753mo" data-dcnode-id="988"><a class="css-12nlsmv" data-dcnode-id="989" href="#long-vs-short-naps"><span data-dcnode-id="990" instrument_node="">Long vs. short naps</span></a></li><li class="css-t753mo" data-dcnode-id="985"><a class="css-12nlsmv" data-dcnode-id="986" href="#timing-tips"><span data-dcnode-id="987" instrument_node="">Timing tips</span></a></li><li class="css-t753mo" data-dcnode-id="982"><a class="css-12nlsmv" data-dcnode-id="983" href="#tl-dr"><span data-dcnode-id="984" instrument_node="">tl;dr</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="577"><div class="css-1u22pos" data-dcnode-id="933"><span data-dcnode-id="979" style="font-size:0;line-height:0"></span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">When even the most venti caffeine concoction isn’t cutting it, sneaking in a quick catnap might seem like the best way to recharge.</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">But could that midday snooze be throwing your whole nighttime sleep cycle out of whack? Let’s see what the science says about napping and nighttime sleep.</span></p><div class="css-16rz5eq" data-dcnode-id="956" id="widget_call_out_93e25da7-19c8-4d6b-8a90-d35d0150c65d"><span data-dcnode-id="974" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="957"><div data-dcnode-id="958"><h3 class="css-wfhrrn" data-dcnode-id="970"><div data-dcnode-id="971"><span class="css-98kufj" data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Does napping affect your evening snooze?</span></span></div></h3><div class="css-1t4ixj" data-dcnode-id="959"><ul data-dcnode-id="960"><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Naps for healthy adults can be beneficial for some.</span></li><li data-dcnode-id="963"><span data-dcnode-id="967" instrument_node="">Excessive or extra-long naps can disrupt your regular </span><a class="content-link css-1egta35" data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/how-much-deep-sleep-do-you-need"><span data-dcnode-id="966" instrument_node="">sleep cycle</span></a><span data-dcnode-id="964" instrument_node="">.</span></li><li data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Finding that timing sweet spot is key.</span></li></ul></div></div></div></div><div data-dcnode-id="941"><figure class="css-yhe8zq" data-dcnode-id="942"><span class="css-rwmw5v" data-dcnode-id="945"><span class="css-mjp0j9" data-dcnode-id="950"><picture class="css-16pk1is" data-dcnode-id="951"><source data-dcnode-id="955" media="(min-width: 1190px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/nap-flowers-meadow-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="954" media="(min-width: 990px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/nap-flowers-meadow-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="953" media="(min-width: 768px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/nap-flowers-meadow-1296x728-header.jpg?w=1845 879w"><img alt="Napping person: Will Napping Affect a Good Night’s Sleep?" class="css-1jytyml" data-dcnode-id="952" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/nap-flowers-meadow-1296x728-header.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="946"><a class="icon-hl-pinterest css-15usvu3" data-dcnode-id="947" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=_5zz72B8hxD8-1&amp;url=https%3A%2F%2Fgreatist.com%2Fhappiness%2Fwill-napping-affect-good-nights-sleep&amp;media=https%3A%2F%2Fpost.greatist.com%2Fwp-content%2Fuploads%2Fsites%2F2%2F2021%2F02%2Fnap-flowers-meadow-1296x728-header.jpg&amp;description=How%20Does%20Napping%20Affect%20a%20Good%20Night%E2%80%99s%20Sleep%3F" data-pin-log="button_pinit" data-share-url="https://post.greatist.com/wp-content/uploads/sites/2/2021/02/nap-flowers-meadow-1296x728-header.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-15eibl9" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Lumina/Stocksy United</span></figcaption></figure></div><div data-dcnode-id="940" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="934"><aside class="css-0 css-0" data-dcnode-id="935"><div data-dcnode-id="936"><div class="css-10gx9pb" data-dcnode-id="937" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="939"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="938" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="865"><span data-dcnode-id="932" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="928"><div data-dcnode-id="929"><a class="chartbeat-section" data-dcnode-id="930" name="science-of-napping"><span data-dcnode-id="931" instrument_node="">Siesta smarter: How napping affects sleep</span></a></div></h2><p data-dcnode-id="920"><span data-dcnode-id="927" instrument_node="">Need sleep? There’s a </span><a class="content-link css-1egta35" data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/discover/nap-trends"><span data-dcnode-id="926" instrument_node="">nap</span></a><span data-dcnode-id="924" instrument_node=""> for that. </span><a class="content-link css-1egta35" data-dcnode-id="922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5598771/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="923" instrument_node="">Research</span></a><span data-dcnode-id="921" instrument_node=""> suggests napping can give some much-needed perks, including improved mood and alertness throughout the day. But how does napping differ from a regular night’s sleep?</span></p><p data-dcnode-id="912"><span data-dcnode-id="919" instrument_node="">A full sleep cycle usually takes around </span><a class="content-link css-1egta35" data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK279322/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="918" instrument_node="">90 to 110 minutes</span></a><span data-dcnode-id="916" instrument_node=""> and cycles between 5 stages of non-REM (rapid eye movement) and </span><a class="content-link css-1egta35" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/deep-sleep"><span data-dcnode-id="915" instrument_node="">REM sleep</span></a><span data-dcnode-id="913" instrument_node=""> (or, lighter and deeper sleep).</span></p><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node="">When you sleep for shorter periods of time, you may only enter the first couple of stages which can give you a mental boost while avoiding that </span><a class="content-link css-1egta35" data-dcnode-id="909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/nap-tips"><span data-dcnode-id="910" instrument_node="">feeling of grogginess</span></a><span data-dcnode-id="908" instrument_node=""> when you wake up.</span></p><p data-dcnode-id="896"><span data-dcnode-id="906" instrument_node="">Children </span><a class="content-link css-1egta35" data-dcnode-id="904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/27287732/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="905" instrument_node="">benefit from naps</span></a><span data-dcnode-id="903" instrument_node=""> in a number of ways. But studies show that even in younger, healthy adults, those lighter stages of sleep are </span><a class="content-link css-1egta35" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/26918588/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="902" instrument_node="">positively associated</span></a><span data-dcnode-id="900" instrument_node=""> with better memory function and both </span><a class="content-link css-1egta35" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/25668196/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="899" instrument_node="">stress relief and better immune function</span></a><span data-dcnode-id="897" instrument_node="">.</span></p><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Some benefits of some quick vitamin Zzz’s include:</span></p><ul data-dcnode-id="877"><li data-dcnode-id="891"><a class="content-link css-1egta35" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/full/10.1080/15402002.2018.1425868" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="893" instrument_node="">better cognitive performance</span></a></li><li data-dcnode-id="888"><a class="content-link css-1egta35" data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economics.mit.edu/files/16994" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="890" instrument_node="">better productivity</span></a></li><li data-dcnode-id="884"><span data-dcnode-id="887" instrument_node="">some </span><a class="content-link css-1egta35" data-dcnode-id="885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6180010/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="886" instrument_node="">improved memory function</span></a></li><li data-dcnode-id="881"><a class="content-link css-1egta35" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acc.org/about-acc/press-releases/2019/03/07/08/56/a-nap-a-day-keeps-high-blood-pressure-at-bay/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="883" instrument_node="">lower blood pressure</span></a></li><li data-dcnode-id="878"><a class="content-link css-1egta35" data-dcnode-id="879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0191886915003943" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="880" instrument_node="">better mood</span></a></li></ul><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">What’s the trick to sneaking in that midday snooze without </span><a class="content-link css-1egta35" data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/cant-sleep-advice-and-tips"><span data-dcnode-id="875" instrument_node="">busting up your nighttime sleep</span></a><span data-dcnode-id="873" instrument_node="">? It all comes down to how long you hit the pillow.</span></p><div class="css-1cg0byz" data-dcnode-id="866"><aside class="css-0 css-0" data-dcnode-id="867"><div data-dcnode-id="868"><div class="css-az6x7v" data-dcnode-id="869" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="871"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="870" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="633"><span data-dcnode-id="864" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="860"><div data-dcnode-id="861"><a class="chartbeat-section" data-dcnode-id="862" name="long-vs-short-naps"><span data-dcnode-id="863" instrument_node="">Nap smarter, not longer</span></a></div></h2><p data-dcnode-id="855"><span data-dcnode-id="859" instrument_node="">Too much hardcore napping is pretty dependent on what you’re used to and your own health and habits. But generally speaking, naps over 20 minutes in length can affect what’s called </span><a class="content-link css-1egta35" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5337178/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="858" instrument_node="">sleep inertia</span></a><span data-dcnode-id="856" instrument_node="">.</span></p><p data-dcnode-id="850"><span data-dcnode-id="854" instrument_node="">Sleep inertia can happen when you’ve delved too deeply into those deep sleep stages and your body thinks you’re calling it a day for a full night of 40 winks but is </span><a class="content-link css-1egta35" data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/what-happens-when-you-dont-get-enough-sleep"><span data-dcnode-id="853" instrument_node="">woken up</span></a><span data-dcnode-id="851" instrument_node="">. You know, like when you wake up from a 2-hour nap and forget what day it is and who you are. You’ve seen the memes.</span></p><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">A 2015 </span><a class="content-link css-1egta35" data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4667384/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="848" instrument_node="">review of studies</span></a><span data-dcnode-id="846" instrument_node=""> also found that long daytime naps were associated with increased risk of cardiovascular disease.</span></p><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">The goal of a daytime kip should be to give you a bit of rest without taking you deep into sleep. Your body shouldn’t think it’s headed for 8 hours or it will begin to claw you right down into dreamland.</span></p><div data-dcnode-id="640" id="m900f5c7e-6fe9-4afc-91b4-3ca60c2f21a4"><div data-dcnode-id="641"><div class="myFinance-widget myFinance-ad-unit" data-campaign="greatist-pillow-driver" data-dcnode-id="642" data-sub-id="greatist-mattress-table_middle_36987" data-widget-id="30411ac4-72a3-437a-9cad-5bc730ded8e5"><iframe class="myFinance-iframe" data-dcnode-id="643" data-loaded="1" data-src="https://inline.greatist.com/r/ssr/30411ac4-72a3-437a-9cad-5bc730ded8e5?utm_campaign=greatist-pillow-driver&amp;utm_medium=embed&amp;selector=%23m900f5c7e-6fe9-4afc-91b4-3ca60c2f21a4+%3E+div+%3E+div&amp;csid=725ece2f-2a9a-46f7-8a4d-5d35d243166c&amp;caid=6268cfeb-8a8c-49f2-8279-53de7fd8f461&amp;ciid=ebb9dd7e-465f-47f4-8108-3371aed6bff4&amp;tenant=wk_1TqfGKfjQlq0Wmxsr0Mwwtf5gs5&amp;srckey=src_1TqfGONfDTz57za4CZkJKiygG7s&amp;cxsid=98b92862-da81-45a0-a409-e34028dc6c35&amp;imre=aHR0cHM6Ly9ncmVhdGlzdC5jb20vaGFwcGluZXNzL3dpbGwtbmFwcGluZy1hZmZlY3QtZ29vZC1uaWdodHMtc2xlZXA%3D&amp;_mfuuid_=16031f73-8d1f-459a-b090-56873ca161f3&amp;width=584&amp;subId=greatist-mattress-table_middle_36987" id="MyFiAd" loading="lazy" scrolling="no" src= </span><div data-dcnode-id="647" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="634"><aside class="css-0 css-0" data-dcnode-id="635"><div data-dcnode-id="636"><div class="css-10gx9pb" data-dcnode-id="637" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="639"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="638" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="599"><span data-dcnode-id="632" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="628"><div data-dcnode-id="629"><a class="chartbeat-section" data-dcnode-id="630" name="timing-tips"><span data-dcnode-id="631" instrument_node="">Nap timing: What’s the sweet spot for that disco nap?</span></a></div></h2><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">A bunch of factors affect how a nap affects your sleep cycle:</span></p><ul data-dcnode-id="609"><li data-dcnode-id="622"><span data-dcnode-id="625" instrument_node="">the </span><a class="content-link css-1egta35" data-dcnode-id="623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.greatist.com/discover/revenge-bedtime-procrastination"><span data-dcnode-id="624" instrument_node="">quality of the nighttime sleep</span></a></li><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">the duration of the nap</span></li><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">how often you nap</span></li><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">the timing of the nap during the day</span></li><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">your age and general health</span></li><li data-dcnode-id="610"><span data-dcnode-id="613" instrument_node="">any current sleep issues such as regular </span><a class="content-link css-1egta35" data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.greatist.com/health/chronic-insomnia"><span data-dcnode-id="612" instrument_node="">insomnia</span></a></li></ul><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Generally speaking, most healthy adults can test out power naps of 10 to 20 minutes. If you find that a quick 20 minutes during the early afternoon keeps away that afternoon fog and that you still sleep well at night, it can work for you.</span></p><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node="">Napping later in the afternoon and evening tends to be </span><a class="content-link css-1egta35" data-dcnode-id="604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1111/j.1365-2869.2008.00718.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="605" instrument_node="">more likely to cause issues</span></a><span data-dcnode-id="603" instrument_node="">, so keep your quick nap to the earlier hours away from your usual bedtime.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="601" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="600" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="578"><span data-dcnode-id="598" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="594"><div data-dcnode-id="595"><a class="chartbeat-section" data-dcnode-id="596" name="tl-dr"><span data-dcnode-id="597" instrument_node="">Takeaway</span></a></div></h2><p data-dcnode-id="589"><span data-dcnode-id="593" instrument_node="">If you find your eyes glazing over after lunch, a quick siesta (or </span><a class="content-link css-1egta35" data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.greatist.com/health/coffee-nap"><span data-dcnode-id="592" instrument_node="">coffee nap</span></a><span data-dcnode-id="590" instrument_node="">) of less than 20 minutes can revive you for an afternoon full of Zoom meetings or whatever you’ve got going on.</span></p><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">Just make sure to monitor how those naps affect your regular sleep schedule. If you start to </span><a class="content-link css-1egta35" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/waking-up-in-the-middle-of-the-night" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="587" instrument_node="">toss and turn</span></a><span data-dcnode-id="585" instrument_node=""> more, consider skipping the nap. </span></p><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">Talk with your doctor about any issues with sleep such as consistent sleepiness during your waking hours or issues with insomnia. </span><a class="content-link css-1egta35" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.greatist.com/health/how-to-fall-asleep-fast"><span data-dcnode-id="582" instrument_node="">Sleep is too important</span></a><span data-dcnode-id="580" instrument_node=""> to muck around with.</span></p></div></article><div data-dcnode-id="576" id="bottom-of-article"></div></div><p class="css-1kir5of" data-dcnode-id="572"><span data-dcnode-id="573"><span data-dcnode-id="574" instrument_node=""> Last medically reviewed on  March 3, 2021</span></span></p><div class="css-asbtiz" data-dcnode-id="447"><div class="css-55guol" data-dcnode-id="462"><div aria-controls="article-resources" aria-expanded="true" class="css-ln6pc0" data-dcnode-id="563" role="button"><p class="css-1fihp0g" data-dcnode-id="564"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="571"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="570"></span><span data-dcnode-id="569" instrument_node=""> </span><span
