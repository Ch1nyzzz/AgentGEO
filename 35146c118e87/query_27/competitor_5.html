</span><div class="entry-featured-image entry-featured-image--hero -full-left" data-dcnode-id="1034"><span data-dcnode-id="1037" instrument_node="">
</span><img alt="woman can't sleep at night" class="attachment-hero size-hero wp-post-image" data-dcnode-id="1036" height="428" sizes="(max-width: 650px) 100vw, 650px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-650x428.jpg&amp;raw" srcset="https://2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-650x428.jpg 650w, https://2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-370x245.jpg 370w, https://2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-745x490.jpg 745w, https://2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-275x180.jpg 275w, https://2rdnmg1qbg403gumla1v9i2h-wpengine.netdna-ssl.com/wp-content/uploads/sites/3/2021/10/wmnBadSleep-1329518599-770x533-1-690x455.jpg 690w" width="650"><span data-dcnode-id="1035" instrument_node=""> </span></div><span data-dcnode-id="1033" instrument_node="">
</span><div class="entry-content" data-dcnode-id="856"><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">You know that sleep is a pillar of good health, along with a nutritious diet and regular activity. Not getting the recommended seven to nine hours of slumber a night can contribute to a host of health problems, from higher blood pressure to an increased risk of obesity.</span></p><div class="ad-policy-wrapper ad-policy-mobile" data-dcnode-id="1011"><div class="ad ad-context-mobile" data-dcnode-id="1022" id="billboard_300x250_mobile" style="width: 300px; height: 250px"><span data-dcnode-id="1029" instrument_node="">
</span><span data-dcnode-id="1026" instrument_node="">
</span><a class="advertising-policy-link" data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/advertising"><span data-dcnode-id="1025" instrument_node="">Advertising Policy</span></a><span data-dcnode-id="1023" instrument_node="">
</span></div><span data-dcnode-id="1021" instrument_node=""> </span><div class="ad-policy-description" data-dcnode-id="1013"><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1019" instrument_node="">
				Cleveland Clinic is a non-profit academic medical center. Advertising on our site helps support our mission. We do not endorse non-Cleveland Clinic products or services.									</span><a data-dcnode-id="1017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/advertising"><span data-dcnode-id="1018" instrument_node="">Policy</span></a><span data-dcnode-id="1016" instrument_node="">
</span></p><span data-dcnode-id="1014" instrument_node="">
</span></div><span data-dcnode-id="1012" instrument_node="">
</span></div><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">But what if your sleep woes happen just occasionally? Can one miserable night of tossing and turning have negative impacts on your health?&nbsp;</span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1006" instrument_node="">Pulmonologist and sleep disorders specialist </span><a data-dcnode-id="1004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/staff/20492-samuel-gurevich"><span data-dcnode-id="1005" instrument_node="">Samuel Gurevich, MD</span></a><span data-dcnode-id="1003" instrument_node="">, explains how a sleepless night affects your mental and physical health — and how to get more shut-eye.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><h2 data-dcnode-id="998" style="font-size:38px"><strong data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Cognitive side effects of not sleeping</span></strong></h2><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">If you were up in the wee hours last night, odds are you’re feeling it today. “Sleep is important because being awake is important,” Dr. Gurevich says. “And one or two nights of bad sleep can impair your ability to function well the next day.”</span></p><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Too little sleep — even for just one night — can leave you dealing with several unpleasant cognitive effects:</span></p><span data-dcnode-id="991" instrument_node="">
</span><ul data-dcnode-id="978"><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Irritability.</span></li><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Daytime sleepiness.</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Slowed reaction time.</span></li><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Reduced focus and concentration.</span></li><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Problems with memory and attention.</span></li><li data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Symptoms of anxiety and depression.</span></li></ul><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="976" instrument_node="">Those effects do more than sour your mood (and make you reach </span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/how-much-caffeine-is-too-much/"><span data-dcnode-id="975" instrument_node="">for more coffee</span></a><span data-dcnode-id="973" instrument_node="">). “Paying attention to your surroundings and your reaction time are processes that keep us safe and on task,” Dr. Gurevich says.</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">When those processes aren’t working as well as they should, it can impair your performance at work or school and even put you </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/29554902/"><span data-dcnode-id="969" instrument_node="">at risk of car crashes</span></a><span data-dcnode-id="967" instrument_node=""> or other accidents, explains Dr. Gurevich.</span></p><div class="ad ad-context-mobile" data-dcnode-id="958" id="billboard2_300x250_mobile" style="width: 300px; height: 250px"><span data-dcnode-id="965" instrument_node="">
</span><span data-dcnode-id="962" instrument_node="">
</span><a class="advertising-policy-link" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/advertising"><span data-dcnode-id="961" instrument_node="">Advertising Policy</span></a><span data-dcnode-id="959" instrument_node="">
</span></div><span data-dcnode-id="957" instrument_node="">
</span><h2 data-dcnode-id="954" style="font-size:38px"><strong data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Physical effects of a bad night’s sleep</span></strong></h2><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="945"><span data-dcnode-id="952" instrument_node="">When </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/happens-body-dont-get-enough-sleep/"><span data-dcnode-id="951" instrument_node="">you don’t get enough sleep</span></a><span data-dcnode-id="949" instrument_node=""> night after night over the long term, it can lead to all sorts of physical effects — including problems for your </span><a data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/for-a-healthy-heart-get-enough-sleep/"><span data-dcnode-id="948" instrument_node="">heart health</span></a><span data-dcnode-id="946" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">But even a few missed nights of sleep can take a physical toll on your body, Dr. Gurevich says. “Lack of sleep causes an increase in stress hormones,” he explains. “That triggers your resting heart rate and blood pressure to increase.”</span></p><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Those changes aren’t usually worrisome if they happen occasionally. “The body and brain recuperate quite well from one or two sleepless nights,” says Dr. Gurevich. “But if it stretches into a month or more, that can have lasting impacts on your heart health, mental health and cognitive abilities.”</span></p><span data-dcnode-id="938" instrument_node="">
</span><h2 data-dcnode-id="935" style="font-size:38px"><strong data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">What are the health benefits of good sleep?</span></strong></h2><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Sleep isn’t just idle time. Many important body processes are happening while you snooze. A good night’s rest benefits your health and well-being in some important ways:</span></p><span data-dcnode-id="931" instrument_node="">
</span><h3 data-dcnode-id="928"><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Brain processing</span></strong></h3><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Sleeping helps to lock memories into your brain. When you’re sleep-deprived, you’re less able to remember things you learned while you were awake. Sleep also helps your brain regulate emotions. That’s why you might feel irritable and moody after a poor night’s rest.&nbsp;&nbsp;&nbsp;&nbsp;</span></p><span data-dcnode-id="924" instrument_node="">
</span><h3 data-dcnode-id="921"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Tissue repair</span></strong></h3><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">While you sleep, your body is hard at work repairing itself by releasing proteins and hormones that help restore damaged tissues, including muscles. If you’re sleep-deprived, your body heals more slowly. This tissue repair process is also important for helping athletes build muscle and recover from a workout.&nbsp;&nbsp;</span></p><div class="ad ad-context-mobile" data-dcnode-id="910" id="billboard3_300x250_mobile" style="width: 300px; height: 250px"><span data-dcnode-id="917" instrument_node="">
</span><span data-dcnode-id="914" instrument_node="">
</span><a class="advertising-policy-link" data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/advertising"><span data-dcnode-id="913" instrument_node="">Advertising Policy</span></a><span data-dcnode-id="911" instrument_node="">
</span></div><span data-dcnode-id="909" instrument_node="">
</span><h3 data-dcnode-id="906"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Immune system function</span></strong></h3><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Sleep helps boost your body’s ability to fight illness. During slumber, the body produces cytokines — proteins that direct immune cells to fight inflammation throughout the body.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Researchers have also found that sleep deprivation increases your body’s production of white blood cells, the same response the body shows when exposed to significant stress. That imbalance in your immune system is associated with illnesses such as heart disease.</span></p><span data-dcnode-id="899" instrument_node="">
</span><h2 data-dcnode-id="896" style="font-size:38px"><strong data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">How to catch more ZZZs</span></strong></h2><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="894" instrument_node="">You want to sleep well and get the </span><a data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/how-much-sleep-do-i-need/"><span data-dcnode-id="893" instrument_node="">amount of sleep you need</span></a><span data-dcnode-id="891" instrument_node="">. So why isn’t your brain cooperating? Unfortunately, falling asleep and staying asleep doesn’t always come easily. Dr. Gurevich offers these tips for </span><a data-dcnode-id="889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health.clevelandclinic.org/try-these-natural-tricks-to-fall-asleep-more-easily/"><span data-dcnode-id="890" instrument_node="">natural sleep remedies</span></a><span data-dcnode-id="888" instrument_node="">.</span></p><span data-dcnode-id="886" instrument_node="">
</span><ul data-dcnode-id="861"><li data-dcnode-id="882"><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Set yourself up for success:</span></strong><span data-dcnode-id="883" instrument_node=""> Make sure you have a cool, quiet, dark environment to sleep in. Avoid bright lights, screens and caffeine before bedtime. And if you exercise in the evening, finish two or three hours before you go to bed.</span></li><li data-dcnode-id="878"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Don’t panic:</span></strong><span data-dcnode-id="879" instrument_node=""> The more you worry about the sleep you’re not getting, the harder it is to fall asleep. Do what you can to maximize the chances of a restful night. Then do your best not to fret.</span></li><li data-dcnode-id="874"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Treat medical problems:</span></strong><span data-dcnode-id="875" instrument_node=""> If you’re having trouble falling or staying asleep, talk to your doctor. There may be an underlying cause. Common causes of poor-quality sleep include chronic pain, sleep apnea and thyroid disorder.</span></li><li data-dcnode-id="870"><strong data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Consider your stressors:</span></strong><span data-dcnode-id="871" instrument_node=""> Try to identify stressors and recognize how they’re affecting the quality and duration of sleep. Stress, anxiety and depression are among the biggest causes of tossing and turning.</span></li><li data-dcnode-id="866"><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Be boring:</span></strong><span data-dcnode-id="867" instrument_node=""> If you just can’t sleep, get out of bed and go to a different room, but do something boring. Whatever you do, put down the phone. Don’t watch TV and don’t look at anything that emits light.</span></li><li data-dcnode-id="862"><strong data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Treat insomnia: </span></strong><span data-dcnode-id="863" instrument_node="">Seeking out a therapist trained in cognitive behavioral therapy for insomnia (CBTi).</span></li></ul><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">“It takes some time to learn these skills,” says Dr. Gurevich, “but it pays dividends over your lifetime.”</span></p><span data-dcnode-id="857" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">

								The Case for Wearing a Sleep Mask							</span></a><span data-dcnode-id="686" instrument_node="">
