</span></ul></div></nav><div class="site-inner" data-dcnode-id="120"><div class="content-sidebar-wrap" data-dcnode-id="121"><main class="content" data-dcnode-id="193"><article aria-label="The Stages of Sleep: NREM Sleep and REM Sleep" class="post-106 page type-page status-publish has-post-thumbnail pmpro-has-access entry" data-dcnode-id="194"><header class="entry-header" data-dcnode-id="567"><h1 class="entry-title" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">The Stages of Sleep: NREM Sleep and REM Sleep</span></h1><span data-dcnode-id="568" instrument_node="">
</span></header><div class="entry-content" data-dcnode-id="432"><div class="wp-caption alignright" data-dcnode-id="563" id="attachment_1859" style="width: 160px"><img alt="Stages of Sleep" aria-describedby="caption-attachment-1859" class="size-full wp-image-1859" data-dcnode-id="566" height="150" loading="lazy" sizes="(max-width: 150px) 100vw, 150px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/wp-content/uploads/stages-of-sleep.png&amp;raw" srcset="https://sleepsurge.com/wp-content/uploads/stages-of-sleep.png 150w, https://sleepsurge.com/wp-content/uploads/stages-of-sleep-125x125.png 125w" width="150"><p class="wp-caption-text" data-dcnode-id="564" id="caption-attachment-1859"><span data-dcnode-id="565" instrument_node="">The four stages of sleep</span></p></div><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">There are four different stages of sleep and two different types of sleep. These two types of sleep are:</span></p><span data-dcnode-id="559" instrument_node="">
</span><ul data-dcnode-id="547"><span data-dcnode-id="558" instrument_node="">
</span><li data-dcnode-id="554"><b data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">REM</span></b><span data-dcnode-id="555" instrument_node=""> – Rapid Eye Movement</span></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="549"><b data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">NREM</span></b><span data-dcnode-id="550" instrument_node=""> – Non Rapid Eye Movement (often pronounced ‘non-REM’)</span></li><span data-dcnode-id="548" instrument_node="">
</span></ul><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">NREM has 3 stages that progressively take you from the lightest stage of sleep to the very deepest stage of sleep. REM has just the one stage.</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">In this article I will explain the differences between each type and stage of sleep and where they appear in your sleep cycle.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Understanding these different varieties of sleep and where they appear in your sleep cycle can help you get the very most out of your sleep and even tweak it a bit to maximize its effects.</span></p><span data-dcnode-id="537" instrument_node="">
</span><h2 data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">The Three NREM Sleep Stages</span></h2><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="530"><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/nrem-sleep"><span data-dcnode-id="533" instrument_node="">NREM sleep</span></a><span data-dcnode-id="531" instrument_node=""> is the first type of sleep you enter into when you first fall asleep. Most of our time asleep is spent here, making up for 75% of an adult’s sleep.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">NREM is split into 3 stages, with each stage taking you deeper and deeper into sleep.</span></p><span data-dcnode-id="526" instrument_node="">
</span><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">NREM Stage 1</span></h3><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">This is the first stage of NREM, starting from the moment you slowly drift off to sleep. Your brain begins preparing you for the deep sleep ahead. Your muscles relax and your breathing becomes slow and steady.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">It’s a very light sleep. If you wake up at this stage, you might not even know that you had just been sleeping. People who stay in this stage of sleep for long periods often claim they spent much less time sleep than they have. Although they would certainly feel like they slept much less if they missed out on deep sleep.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">At this stage you might experience what’s called sleep starts or hypnic jerks. This is a strange sensation that feels like you’re falling as if you’ve just tripped over something. It’s completely normal and just a sign that your body is slowly shutting down and sleep will soon be upon you.</span></p><span data-dcnode-id="514" instrument_node="">
</span><h3 data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">NREM Stage 2</span></h3><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Stage 2 is the next stage of sleep following on from stage 1. Here you’re in a deeper sleep than in stage 1. You can still be woken up pretty easily at this stage but you will certainly know that you had just been sleeping.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Here your body functions slow down even more. Your brainwaves become longer and slower as your body prepares for the next stage of sleep.</span></p><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">NREM Stage 3</span></h3><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Stage 3, also known as slow wave sleep is the last stage of sleep. Here your body is in a deep sleep. Waking someone from this stage would be pretty difficult and if you managed it, they would feel very groggy, tired and disoriented. They certainly wouldn’t thank you for it!</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Brainwaves are now at their longest and slowest. Your body functions slow down to their minimum. This is where sleep is at its best, deeply nourishing and refreshing.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Dreams are more common in this stage than other stages of NREM sleep, although you would only remember fragments of your dreams, if anything at all.</span></p><span data-dcnode-id="493" instrument_node="">
</span><h2 data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The REM Sleep Stage</span></h2><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="486"><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/rem-sleep"><span data-dcnode-id="489" instrument_node="">REM sleep</span></a><span data-dcnode-id="487" instrument_node=""> is the second type of sleep, often kicking in only after a full cycle of NREM sleep.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">This is the stage where most dreaming occurs. REM is sometimes called paradoxical sleep because brain scans of people who are in REM show that their brains are very active, despite the fact they’re fast asleep.</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">However, while your brain is active, only your eyes can move. There are exceptions though. &nbsp;Some people have a condition called REM Disorder where by their body is not paralysed during sleep and they can actually act out their dreams.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">From the age of 2 onwards, you spend around 25% of our sleep in REM. Newborns spent around half of their time asleep in REM.</span></p><span data-dcnode-id="476" instrument_node="">
</span><h2 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Why do we have two types of sleep?</span></h2><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="472" instrument_node="">It’s not really known why we have </span><a data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/sleep-types"><span data-dcnode-id="471" instrument_node="">two types of sleep</span></a><span data-dcnode-id="469" instrument_node="">. Logically, it’s easy to think we should only need the nourishing deep sleep NREM provides us.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">The purpose of REM sleep is not fully understood. Some scientists think REM sleep may have something to do with the role of acting on our memories and making sense of the day, which could explain why newborns have more REM sleep than others as they explore their new world.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">However people who have been scientifically deprived of REM sleep show no change to their memory or any aspect of their lives, so for the time being it remains a bit of a mystery.</span></p><span data-dcnode-id="461" instrument_node="">
</span><h2 data-dcnode-id="458"><a data-dcnode-id="460" name="sleep-cycle"></a><span data-dcnode-id="459" instrument_node="">The Stages of Sleep in your Sleep Cycle</span></h2><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Our body’s cycle between REM and the stages of NREM several times during the night. Here’s an average sleep cycle:</span></p><span data-dcnode-id="454" instrument_node="">
</span><div align="center" data-dcnode-id="452"><img align="middle" alt="Sleep Cycle" data-dcnode-id="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/images/sleep-cycle.png&amp;raw"></div><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Once you first fall asleep, you do a full stage of NREM, before arriving at your first dose of REM sleep.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">As the night progresses, the amount of time you spend in the deeper stages of NREM sleep decreases and the amount of time you spend in REM and the lighter stages of NREM increases.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">It’s natural to wake up a few times in the night after the REM stage. Most of the time you won’t even remember waking up at all.</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Being aware of your own sleep cycle can help you effectively plan your sleep schedule. For example, it would be a bad idea to schedule in an hour nap, since you’re most likely to be woken by your alarm clock in NREM stage 3 where you would no doubt feel much worse than before the nap. A better time for a nap would be around 20 minutes to make sure you don’t go beyond NREM stage 1 or a little over an hour so that you awake during REM after a complete cycle.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">Deep sleep is where you&nbsp;receive&nbsp;the&nbsp;nourishing&nbsp;refreshment sleep provides. But as you can see, it only happens during the first part of the night. So as it stands, a regular sleep pattern is a little inefficient. But if you were to somehow experience more deep sleep, then you can forego the majority of time spent in the weaker stages of sleep. How can we do that? Well it’s not easy, but the answer lies in altering your </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sleepsurge.com/sleep-patterns" title="Sleep Patterns"><span data-dcnode-id="437" instrument_node="">sleep pattern</span></a><span data-dcnode-id="435" instrument_node="">.</span></p><span data-dcnode-id="433" instrument_node="">
