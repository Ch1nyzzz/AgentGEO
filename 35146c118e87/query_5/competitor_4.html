</span><meta content="Most antidepressants suppress rapid eye movement (REM) sleep, which is thought to be important to brain function, yet the resulting REM sleep restrict…" data-dcnode-id="4953" property="og:description"><span data-dcnode-id="4952" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Most antidepressants suppress rapid eye movement (REM) sleep, which is thought to be important to brain function, yet the resulting REM sleep restriction is well tolerated. This study investigated the impact of antidepressants with different mechanisms of action, such as selective serotonin reuptake inhibitors (SSRIs) and tricyclic antidepressants (TCA), on the regulation of REM sleep in rats. REM sleep was first demonstrated to be homeostatically regulated using 5, 8 and 10&nbsp;h of REM-sleep specific restriction through EEG-triggered arousals, with an average of 91&nbsp;±&nbsp;10% of lost REM sleep recovered following a 26–29 -hour recovery period.</p><p id=&quot;abspara0015&quot;>Acute treatment with the antidepressants paroxetine, citalopram and imipramine inhibited REM sleep by 84&nbsp;±&nbsp;8, 84&nbsp;±&nbsp;8 and 69&nbsp;±&nbsp;9% respectively relative to vehicle control. The pharmacologically-induced REM sleep deficits by paroxetine and citalopram were not fully recovered, whereas, after imipramine the REM sleep deficit was fully compensated. Given the marked difference between REM sleep recovery following the administration of paroxetine, citalopram, imipramine and REM sleep restriction, the homeostatic response was further examined by pairing REM sleep specific restriction with the three antidepressants.</p><p id=&quot;abspara0020&quot;>Surprisingly, the physiologically-induced REM sleep deficits incurred prior to suppression of REM sleep by all antidepressants was consistently recovered. The data indicate that REM sleep homeostasis remains operative following subsequent treatment with antidepressants and is unaffected by additional pharmacological inhibition of REM sleep.</p></div></div></div>" data-dcnode-id="4951" lang="en" name="citation_abstract"><span data-dcnode-id="4950" instrument_node="">

div><div class="LicenseInfo" data-dcnode-id="4410"><div class="License" data-dcnode-id="4414"><span data-dcnode-id="4417"><span data-dcnode-id="4418" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="4415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4416" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="4411"><span class="access-indicator" data-dcnode-id="4413"></span><span data-dcnode-id="4412" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="4409"></section><section class="ReferencedArticles" data-dcnode-id="4408"></section><div class="PageDivider" data-dcnode-id="4407"></div><div class="Abstracts u-font-serif" data-dcnode-id="4375" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="4386" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4405"><span data-dcnode-id="4406" instrument_node="">Highlights</span></h2><div data-dcnode-id="4387" id="abssec0015"><p data-dcnode-id="4388" id="abspara0025"></p><dl class="list" data-dcnode-id="4389"><dt class="list-label" data-dcnode-id="4403"><span data-dcnode-id="4404" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4400"><p data-dcnode-id="4401" id="p0010"><span data-dcnode-id="4402" instrument_node="">Selective serotonin re-uptake inhibitor antidepressants do not activate the REM sleep homeostat.</span></p></dd><dt class="list-label" data-dcnode-id="4398"><span data-dcnode-id="4399" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4395"><p data-dcnode-id="4396" id="p0015"><span data-dcnode-id="4397" instrument_node="">In contrast, the tricyclic antidepressant imipramine elicits a homeostatic response in REM sleep similar to that of REM sleep restriction.</span></p></dd><dt class="list-label" data-dcnode-id="4393"><span data-dcnode-id="4394" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="4390"><p data-dcnode-id="4391" id="p0020"><span data-dcnode-id="4392" instrument_node="">The REM sleep homeostat remains active even in the presence of the pharmacological REM sleep inhibition antidepressants.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="4376" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4384"><span data-dcnode-id="4385" instrument_node="">Abstract</span></h2><div data-dcnode-id="4377" id="abssec0010"><p data-dcnode-id="4382" id="abspara0010"><span data-dcnode-id="4383" instrument_node="">Most antidepressants suppress rapid eye movement (REM) sleep, which is thought to be important to brain function, yet the resulting REM sleep restriction is well tolerated. This study investigated the impact of antidepressants with different mechanisms of action, such as selective serotonin reuptake inhibitors (SSRIs) and tricyclic antidepressants (TCA), on the regulation of REM sleep in rats. REM sleep was first demonstrated to be homeostatically regulated using 5, 8 and 10&nbsp;h of REM-sleep specific restriction through EEG-triggered arousals, with an average of 91&nbsp;±&nbsp;10% of lost REM sleep recovered following a 26–29 -hour recovery period.</span></p><p data-dcnode-id="4380" id="abspara0015"><span data-dcnode-id="4381" instrument_node="">Acute treatment with the antidepressants paroxetine, citalopram and imipramine inhibited REM sleep by 84&nbsp;±&nbsp;8, 84&nbsp;±&nbsp;8 and 69&nbsp;±&nbsp;9% respectively relative to vehicle control. The pharmacologically-induced REM sleep deficits by paroxetine and citalopram were not fully recovered, whereas, after imipramine the REM sleep deficit was fully compensated. Given the marked difference between REM sleep recovery following the administration of paroxetine, citalopram, imipramine and REM sleep restriction, the homeostatic response was further examined by pairing REM sleep specific restriction with the three antidepressants.</span></p><p data-dcnode-id="4378" id="abspara0020"><span data-dcnode-id="4379" instrument_node="">Surprisingly, the physiologically-induced REM sleep deficits incurred prior to suppression of REM sleep by all antidepressants was consistently recovered. The data indicate that REM sleep homeostasis remains operative following subsequent treatment with antidepressants and is unaffected by additional pharmacological inhibition of REM sleep.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="4352" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="4364"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0028390816302003"><svg class="icon icon-navigate-left" data-dcnode-id="4373" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="4374"></path></svg><span class="button-alternative-text" data-dcnode-id="4366"><strong data-dcnode-id="4371"><span data-dcnode-id="4372" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="4369"><span data-dcnode-id="4370" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4367"><span data-dcnode-id="4368" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="4353"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="4354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0028390816302040"><span class="button-alternative-text" data-dcnode-id="4357"><strong data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="4360"><span data-dcnode-id="4361" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="4358"><span data-dcnode-id="4359" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="4355" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="4356"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="4333"><div class="keywords-section" data-dcnode-id="4334" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="4347" id="kwrd0010"><span data-dcnode-id="4348"><span data-dcnode-id="4349" instrument_node="">Paradoxical sleep</span></span></div><div class="keyword" data-dcnode-id="4344" id="kwrd0015"><span data-dcnode-id="4345"><span data-dcnode-id="4346" instrument_node="">Recovery</span></span></div><div class="keyword" data-dcnode-id="4341" id="kwrd0020"><span data-dcnode-id="4342"><span data-dcnode-id="4343" instrument_node="">Selective serotonin reuptake inhibitors</span></span></div><div class="keyword" data-dcnode-id="4338" id="kwrd0025"><span data-dcnode-id="4339"><span data-dcnode-id="4340" instrument_node="">Tricyclic antidepressants</span></span></div><div class="keyword" data-dcnode-id="4335" id="kwrd0030"><span data-dcnode-id="4336"><span data-dcnode-id="4337" instrument_node="">Sleep deprivation</span></span></div></div></div><span data-dcnode-id="4332" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2859" id="body"><div data-dcnode-id="2889"><section data-dcnode-id="4252" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4326" id="sectitle0025"><span data-dcnode-id="4331" instrument_node="">1</span><span data-dcnode-id="4329" instrument_node="">. </span><span data-dcnode-id="4327" instrument_node="">Introduction</span></h2><p data-dcnode-id="4309" id="p0025"><span data-dcnode-id="4325" instrument_node="">Most antidepressants inhibit rapid eye movement (REM) sleep in animals and humans. In particular, selective serotonin re-uptake inhibitors (SSRIs), such as citalopram and paroxetine, the mainstay of depression treatment, are potent inhibitors of REM sleep when administered acutely, sub-chronically or chronically (reviewed in </span><a class="workspace-trigger" data-dcnode-id="4323" href="#bib19" name="bbib19"><span data-dcnode-id="4324" instrument_node="">Palagini et&nbsp;al., 2013</span></a><span data-dcnode-id="4322" instrument_node="">). Relatively few antidepressants offer psychiatric benefits without causing reductions in REM sleep (</span><a class="workspace-trigger" data-dcnode-id="4320" href="#bib25" name="bbib25"><span data-dcnode-id="4321" instrument_node="">Sharpley and Cowen, 1995</span></a><span data-dcnode-id="4319" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4317" href="#bib19" name="bbib19"><span data-dcnode-id="4318" instrument_node="">Palagini et&nbsp;al., 2013</span></a><span data-dcnode-id="4316" instrument_node="">) and extended courses of antidepressant treatment are well tolerated without the ill effects typically reported in experimental REM sleep deprivation paradigms (</span><a class="workspace-trigger" data-dcnode-id="4314" href="#bib30" name="bbib30"><span data-dcnode-id="4315" instrument_node="">Vertes and Eastman, 2000</span></a><span data-dcnode-id="4313" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4311" href="#bib27" name="bbib27"><span data-dcnode-id="4312" instrument_node="">Siegel, 2001</span></a><span data-dcnode-id="4310" instrument_node="">).</span></p><p data-dcnode-id="4286" id="p0030"><span data-dcnode-id="4308" instrument_node="">The most common sleep-electroencephalography (EEG) markers of major depressive disorder (MDD) include shorter latency to the onset of REM sleep, increased REM sleep time and increased density of rapid eye movements during REM sleep; reduced sleep efficiency and reduced total sleep time slow wave sleep (</span><a class="workspace-trigger" data-dcnode-id="4306" href="#bib21" name="bbib21"><span data-dcnode-id="4307" instrument_node="">Pillai et&nbsp;al., 2011</span></a><span data-dcnode-id="4305" instrument_node="">). Paradoxically, the changes in REM sleep parameters observed in MDD are similar to the effects seen following REM sleep restriction in humans and animals (</span><a class="workspace-trigger" data-dcnode-id="4303" href="#bib19" name="bbib19"><span data-dcnode-id="4304" instrument_node="">Palagini et&nbsp;al., 2013</span></a><span data-dcnode-id="4302" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4300" href="#bib14" name="bbib14"><span data-dcnode-id="4301" instrument_node="">Kupfer et&nbsp;al., 1981</span></a><span data-dcnode-id="4299" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4297" href="#bib4" name="bbib4"><span data-dcnode-id="4298" instrument_node="">Coble et&nbsp;al., 1976</span></a><span data-dcnode-id="4296" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4294" href="#bib15" name="bbib15"><span data-dcnode-id="4295" instrument_node="">Lucidi et&nbsp;al., 1996</span></a><span data-dcnode-id="4293" instrument_node="">). The strong correlation between REM sleep inhibition and drug activity has led to the hypothesis that suppression of REM sleep may contribute to an antidepressant action (</span><a class="workspace-trigger" data-dcnode-id="4291" href="#bib31" name="bbib31"><span data-dcnode-id="4292" instrument_node="">Vogel, 1983</span></a><span data-dcnode-id="4290" instrument_node="">). The antidepressant efficacy of REM-specific sleep restriction was tested by inducing awakenings upon the appearance of the first signs of REM sleep. REM sleep restriction alone was sufficient to improve depression and normalise the sleep architecture of patients (</span><a class="workspace-trigger" data-dcnode-id="4288" href="#bib32" name="bbib32"><span data-dcnode-id="4289" instrument_node="">Vogel et&nbsp;al., 1975</span></a><span data-dcnode-id="4287" instrument_node="">).</span></p><p data-dcnode-id="4260" id="p0035"><span data-dcnode-id="4285" instrument_node="">REM sleep is controlled by both circadian and homeostatic mechanisms (</span><a class="workspace-trigger" data-dcnode-id="4283" href="#bib3" name="bbib3"><span data-dcnode-id="4284" instrument_node="">Brunner et&nbsp;al., 1990</span></a><span data-dcnode-id="4282" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4280" href="#bib5" name="bbib5"><span data-dcnode-id="4281" instrument_node="">Dijk and Czeisler, 1995</span></a><span data-dcnode-id="4279" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4277" href="#bib36" name="bbib36"><span data-dcnode-id="4278" instrument_node="">Wurts and Edgar, 2000</span></a><span data-dcnode-id="4276" instrument_node="">). REM sleep homeostasis can be tested through methods that selectively inhibit REM sleep manifestation via EEG-driven feedback methods, which provide a waking stimulus only if an animal enters REM sleep as determined in real-time from EEG and EMG measures (53 </span><a class="workspace-trigger" data-dcnode-id="4274" href="#bib36" name="bbib36"><span data-dcnode-id="4275" instrument_node="">Wurts and Edgar, 2000</span></a><span data-dcnode-id="4273" instrument_node="">; 126 </span><a class="workspace-trigger" data-dcnode-id="4271" href="#bib23" name="bbib23"><span data-dcnode-id="4272" instrument_node="">Rechtschaffen and Bergmann, 1995</span></a><span data-dcnode-id="4270" instrument_node="">). Selective REM sleep deprivation leads to a progressive increase over time in attempts to enter REM sleep and REM sleep-enriched sleep following release from deprivation in both animals and humans (</span><a class="workspace-trigger" data-dcnode-id="4268" href="#bib33" name="bbib33"><span data-dcnode-id="4269" instrument_node="">Vogel, 1975</span></a><span data-dcnode-id="4267" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4265" href="#bib26" name="bbib26"><span data-dcnode-id="4266" instrument_node="">Shea et&nbsp;al., 2008</span></a><span data-dcnode-id="4264" instrument_node="">). Homeostatic control of REM sleep has even been shown to persist in the absence of circadian control (</span><a class="workspace-trigger" data-dcnode-id="4262" href="#bib36" name="bbib36"><span data-dcnode-id="4263" instrument_node="">Wurts and Edgar, 2000</span></a><span data-dcnode-id="4261" instrument_node="">). The conservation of REM sleep time suggests its importance in physiological processes and its homeostatic maintenance may be relevant to the antidepressant action of REM sleep restriction.</span></p><p data-dcnode-id="4255" id="p0040"><span data-dcnode-id="4259" instrument_node="">These observations raise the question: Is REM sleep inhibition caused by antidepressant therapeutics functionally equivalent to physiologically-induced forms of selective REM sleep deprivation? Antidepressants that suppress REM sleep potentially alter the neurochemical control mechanisms of REM sleep homeostasis. Many of the neurochemical circuits involved in controlling REM sleep onset and maintenance have been identified, with mutually inhibitory monoaminergic, GABAergic and glutamatergic systems (reviewed in </span><a class="workspace-trigger" data-dcnode-id="4257" href="#bib16" name="bbib16"><span data-dcnode-id="4258" instrument_node="">Luppi et&nbsp;al., 2013</span></a><span data-dcnode-id="4256" instrument_node="">). The mechanisms underlying REM sleep homeostasis however remain largely unknown. In the current study the interaction between a pharmacological and physiologically induced REM sleep loss was examined.</span></p><p data-dcnode-id="4253" id="p0045"><span data-dcnode-id="4254" instrument_node="">The homeostatic response following REM sleep inhibition by antidepressants may differ to the homeostatic response caused by a physiological REM sleep restriction. To address this possibility, we paired REM specific sleep restriction with antidepressant treatments and closely evaluated interactions between the two mechanisms of REM sleep suppression. Two selective serotonin reuptake inhibitors (SSRIs), paroxetine and citalopram, and the tri-cyclic antidepressant (TCA) imipramine were tested alone and in the presence of increased REM sleep homeostatic pressure.</span></p></section><section data-dcnode-id="4069" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4246" id="sectitle0030"><span data-dcnode-id="4251" instrument_node="">2</span><span data-dcnode-id="4249" instrument_node="">. </span><span data-dcnode-id="4247" instrument_node="">Methods</span></h2><section data-dcnode-id="4234" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4240" id="sectitle0035"><span data-dcnode-id="4245" instrument_node="">2.1</span><span data-dcnode-id="4243" instrument_node="">. </span><span data-dcnode-id="4241" instrument_node="">Subjects</span></h3><p data-dcnode-id="4235" id="p0050"><span data-dcnode-id="4239" instrument_node="">All procedures were carried out in accordance with the UK Animals Scientific Procedures Act (1986) and associated guidelines, the European Communities Council Directive of 24 November 1986 (86/609/EEC) and passed the Lilly UK ethical review. In accordance with the principles of the 3Rs, all efforts were made to minimise animal suffering, to reduce the number of animals used, to refine procedures and utilise alternatives to </span><em data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">in&nbsp;vivo</span></em><span data-dcnode-id="4236" instrument_node=""> techniques, if available. Male Wistar rats sourced from Charles River, Kent, UK were used as subjects for all experiments. At the time of surgery animals were approximately 70–80 days old and weighed 250–300&nbsp;g.</span></p></section><section data-dcnode-id="4225" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4228" id="sectitle0040"><span data-dcnode-id="4233" instrument_node="">2.2</span><span data-dcnode-id="4231" instrument_node="">. </span><span data-dcnode-id="4229" instrument_node="">Animal preparation and surgery</span></h3><p data-dcnode-id="4226" id="p0055"><span data-dcnode-id="4227" instrument_node="">Rats were anesthetized (2% isoflurane in 100% oxygen) and surgically prepared with a cranial implant for chronic EEG and electromyogram (EMG) recordings. Body temperature and locomotor activities were monitored via a miniature transmitter (Minimitter PDT4000G, Philips Respironics, Bend, OR) placed in the abdomen. The cranial implant consisted of stainless steel screws (2 frontal [+3.5&nbsp;AP from bregma, ±2.0&nbsp;ML] and 2 occipital [−6.5&nbsp;AP, ±5.2&nbsp;ML]) for collection of EEG signals. For EMG recordings two Teflon-coated stainless steel wires positioned under the nuchal trapezoid muscles. The implant assembly was affixed to the skull by the combination of the EEG recording screws, cyanoacrylate applied between the hermetically sealed implant connector and skull, and dental acrylic. An analgesic (buprenorphine 0.05&nbsp;mg/kg) was administered subcutaneously pre-operatively, at the end of the surgery day, and the morning of the first post-operative day. To provide additional pain relief, meloxicam 0.15&nbsp;mg/kg was administered orally twice daily for 6 days post-surgery. The antibiotic cephalexin 20&nbsp;mg/kg was administered orally 24&nbsp;h prior to and immediately before surgery, and twice daily for 7 days after surgery.</span></p></section><section data-dcnode-id="4203" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4219" id="sectitle0045"><span data-dcnode-id="4224" instrument_node="">2.3</span><span data-dcnode-id="4222" instrument_node="">. </span><span data-dcnode-id="4220" instrument_node="">Housing environment</span></h3><p data-dcnode-id="4217" id="p0060"><span data-dcnode-id="4218" instrument_node="">After a 4-week recovery period, animals were housed individually in custom-designed sleep deprivation chambers for the duration of the experiment.</span></p><p data-dcnode-id="4209" id="p0065"><span data-dcnode-id="4216" instrument_node="">Sleep restriction chambers consisted of a rotatable cylinder (39.7&nbsp;cm diameter by 32.1&nbsp;cm length, 637.2&nbsp;cm</span><sup data-dcnode-id="4214"><span data-dcnode-id="4215" instrument_node="">2</span></sup><span data-dcnode-id="4213" instrument_node=""> floor space) constructed of plexiglass rods, positioned horizontally inside a plexiglass frame. Cranial implants were connected to ultra-low-torque slip-ring commutators (Hypnion, Inc., Lexington, MA, USA) by metal coil reinforced flexible cables, allowing unrestrained movements. EEG/EMG-signal based sleep restriction used real-time feedback of ongoing sleep/wake states to prevent sleep, similar to the methods described by (</span><a class="workspace-trigger" data-dcnode-id="4211" href="#bib36" name="bbib36"><span data-dcnode-id="4212" instrument_node="">Wurts and Edgar, 2000</span></a><span data-dcnode-id="4210" instrument_node="">).</span></p><p data-dcnode-id="4204" id="p0070"><span data-dcnode-id="4208" instrument_node="">The study was conducted in a sound-attenuated, light and temperature-controlled recording room, to control for sensory modalities known to affect sleep. Each cage was provided with an infrared light source and digital video camera to allow continuous remote visual monitoring. A 24-hr light-dark cycle (LD 12:12) was maintained throughout the study using fluorescent light to act as a zeitgeber (ZT). Light intensity averaged 35–40 lux at mid-level inside the cage. Food and water were available </span><em data-dcnode-id="4206"><span data-dcnode-id="4207" instrument_node="">ad libitum</span></em><span data-dcnode-id="4205" instrument_node=""> and the ambient temperature was maintained at 21&nbsp;±&nbsp;1&nbsp;°C with a relative humidity of approximately 50%.</span></p></section><section data-dcnode-id="4182" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4197" id="sectitle0050"><span data-dcnode-id="4202" instrument_node="">2.4</span><span data-dcnode-id="4200" instrument_node="">. </span><span data-dcnode-id="4198" instrument_node="">Automated EEG/EMG data collection and sleep staging</span></h3><p data-dcnode-id="4183" id="p0075"><span data-dcnode-id="4196" instrument_node="">Amplified EEG 10,000-fold (band-pass filtered 1–30&nbsp;Hz: Grass Corp., Quincy, MA, USA) with an initial digitization rate of 400&nbsp;Hz and amplified EMG (band-pass 10–100&nbsp;Hz, RMS integration) were collected from the fixed electrodes. Concurrently, body temperature and locomotor activity were recorded. SCORE2004™, an automated sleep-wake and physiological monitoring system, was used to record and determine vigilance states, as previously described (</span><a class="workspace-trigger" data-dcnode-id="4194" href="#bib29" name="bbib29"><span data-dcnode-id="4195" instrument_node="">Van Gelder et&nbsp;al., 1991</span></a><span data-dcnode-id="4193" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4191" href="#bib24" name="bbib24"><span data-dcnode-id="4192" instrument_node="">Seidel et&nbsp;al., 1995</span></a><span data-dcnode-id="4190" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4188" href="#bib18" name="bbib18"><span data-dcnode-id="4189" instrument_node="">Olive et&nbsp;al., 1998</span></a><span data-dcnode-id="4187" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4185" href="#bib20" name="bbib20"><span data-dcnode-id="4186" instrument_node="">Phillips et&nbsp;al., 2012</span></a><span data-dcnode-id="4184" instrument_node="">). Vigilance states were classified on-line as NREM sleep, REM sleep, wake, or theta-dominated wake, every 10&nbsp;s, using EEG period and amplitude feature extraction and ranked membership algorithms. In addition to frequent on-line inspection of the EEG and EMG signals, quality control of the data was assured using a proprietary suite of programmes (SCOREVIEW™, Hypnion, Inc., Lexington, MA) that allowed data quality of all variables to be flexibly scrutinized at the level of (i) individual visual examination of raw EEG and EMG signals, (ii) individual hourly mean time series, and (iii) group mean time series, using a combination of graphical and statistical assessments. A fast Fourier transform was used to calculate the spectral EEG power in each 10-s epoch in 0.1&nbsp;Hz bins. Telemetry measures (locomotor activity and body temperature) were not part of the SCORE vigilance-state determination algorithm; thus, sleep-scoring and telemetry data were concurrent but independent measures.</span></p></section><section data-dcnode-id="4171" id="sec2.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4176" id="sectitle0055"><span data-dcnode-id="4181" instrument_node="">2.5</span><span data-dcnode-id="4179" instrument_node="">. </span><span data-dcnode-id="4177" instrument_node="">Dose selection and drug formulation</span></h3><p data-dcnode-id="4174" id="p0080"><span data-dcnode-id="4175" instrument_node="">Citalopram (synthesized at Eli Lilly), paroxetine (Sigma Aldrich) and imipramine (Zerenex Ltd) were formulated in pH-adjusted methylcellulose 15&nbsp;cP 0.25% vehicle. Compound was weighed using a Mettler Toledo AB104-S analytical balance then finely ground and suspended into vehicle. The doses of 10&nbsp;mg/kg citalopram, 5&nbsp;mg/kg paroxetine and 7&nbsp;mg/kg imipramine were administered orally (PO).</span></p><p data-dcnode-id="4172" id="p0085"><span data-dcnode-id="4173" instrument_node="">The rationale for dose selection was as follows: A similar level of pharmacological REM inhibition to the 8-h EEG-driven feedback sleep restriction was selected for citalopram from a database of dose response data of compounds given at ZT-5 (data not shown). The doses of the remaining compounds were selected to match the level of REM sleep inhibition of citalopram. Statistical analysis was performed to determine the loss and recovery of sleep as a result of each treatment and evaluate potential interactions between REM sleep homeostasis and antidepressants. At least 7 days “washout” preceded and followed any treatment and examination of normal baseline activity relative to non-treated animals was performed prior to entry into the study.</span></p></section><section data-dcnode-id="4160" id="sec2.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4165" id="sectitle0060"><span data-dcnode-id="4170" instrument_node="">2.6</span><span data-dcnode-id="4168" instrument_node="">. </span><span data-dcnode-id="4166" instrument_node="">REM sleep restriction protocol</span></h3><p data-dcnode-id="4163" id="p0090"><span data-dcnode-id="4164" instrument_node="">Rats underwent at least 48&nbsp;hrs of undisturbed baseline recording of sleep-wake patterns and before REM sleep restriction of 5, 8 or 10&nbsp;h’s duration starting ZT-0. Sleep and wake behaviours were determined automatically in real time using SCORE-2004™. Detection of REM sleep epochs by the SCORE2004™ program activates a motor to roll the cylindrical chamber around its axis for 8 s (265° of rotation at 11.5 cm/s), thereby initiating the righting reflex and waking the rat. The rotation caused a vestibular reflex, immediately awakening the rat.</span></p><p data-dcnode-id="4161" id="p0095"><span data-dcnode-id="4162" instrument_node="">In the studies combining REM sleep restriction with antidepressant administration, a REM sleep restriction period of 8&nbsp;h was chosen. This level of REM sleep restriction showed a clear REM sleep deficit, followed by a rebound. In addition, 4-h of the light phase remained, during which the antidepressant drug treatments most actively suppressed REM sleep.</span></p></section><section data-dcnode-id="4118" id="sec2.7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4154" id="sectitle0065"><span data-dcnode-id="4159" instrument_node="">2.7</span><span data-dcnode-id="4157" instrument_node="">. </span><span data-dcnode-id="4155" instrument_node="">Study design and statistical analysis methods</span></h3><p data-dcnode-id="4152" id="p0100"><span data-dcnode-id="4153" instrument_node="">The dose response to REM sleep restriction studies were conducted in distinct parallel groups, i.e., no animal was exposed to more than one REM sleep restriction. A total of 51 Wistar rats were used which at the start of the experiment were on average 131&nbsp;±&nbsp;6 days old and weighing 487&nbsp;±&nbsp;8.4&nbsp;g (all values reported as mean&nbsp;+SEM). The magnitude of sleep loss relative to non-sleep restricted controls was calculated using a mixed model procedure with length of REM sleep restriction as a fixed effect. 24-h of the undisturbed baseline was used as a covariate to represent prior sleep history.</span></p><div data-dcnode-id="4127"><p data-dcnode-id="4147" id="p0105"><span data-dcnode-id="4151" instrument_node="">A within subject, full crossover, repeated measures study design was used for each REM sleep restriction and antidepressant combination experiment. A total of 53 Wistar rats, on average 138&nbsp;±&nbsp;6 days old and weighing 484.3&nbsp;±&nbsp;6.5&nbsp;g&nbsp;at the start of each experiment, were randomly assigned to treatment groups. Prior to any treatment, animals were left undisturbed for 48-h to record a baseline from which drug effects could be evaluated. REM sleep restriction was performed between the hours of ZT-0 and ZT-8 and immediately following release from the REM sleep restriction, the rats were dosed orally with active compound or vehicle control (ZT-8, i.e., 8-h after lights on; </span><a class="workspace-trigger" data-dcnode-id="4149" href="#fig1" name="bfig1"><span data-dcnode-id="4150" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="4148" instrument_node="">). For drug administration, each animal was removed from its cage for about 60–90&nbsp;s to be weighed and treated.</span></p><figure class="figure text-xs" data-dcnode-id="4128" id="fig1"><span data-dcnode-id="4137"><img alt="" aria-describedby="cap0010" data-dcnode-id="4146" height="283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr1.jpg&amp;raw"><span data-dcnode-id="4145" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4138"><li data-dcnode-id="4139"><a class="anchor download-link u-font-sans" data-dcnode-id="4140" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4141"><span data-dcnode-id="4144" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4129"><span data-dcnode-id="4130" id="cap0010"><p data-dcnode-id="4131" id="fspara0010"><span class="label" data-dcnode-id="4135"><span data-dcnode-id="4136" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="4134" instrument_node="">. </span><span data-dcnode-id="4132" instrument_node="">Study protocol showing 12&nbsp;h light-dark schedule and relative times of REM sleep restriction onset (ZT-0) and drug treatment (ZT-8). Post-treatment measurements are broken down relative to the protocol and light-dark cycle to yield 5 distinct periods following: 0–8&nbsp;h; 8–12&nbsp;h; 12–24&nbsp;h; 24–36&nbsp;h and 26–48&nbsp;h. Corresponding periods in the baseline were used in the analysis: −24 to −18&nbsp;h; −18 to −12&nbsp;h; −12 to 0&nbsp;h; −24 to −12&nbsp;h and −12 to −0&nbsp;h.</span></p></span></span></figure></div><p data-dcnode-id="4119" id="p0110"><span data-dcnode-id="4126" instrument_node="">Statistical analyses and plotting were performed using the SAS (version 9.2, SAS Institute, Inc., Cary, NC) software package and SigmaPlot (version 12.5, Systat Software, Inc., San Jose California USA, </span><a data-dcnode-id="4124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sigmaplot.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="4125" instrument_node="">www.sigmaplot.com</span></a><span data-dcnode-id="4123" instrument_node="">). The effects of sleep restriction and drug were evaluated over the recording period as outlined in </span><a class="workspace-trigger" data-dcnode-id="4121" href="#fig1" name="bfig1"><span data-dcnode-id="4122" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="4120" instrument_node="">. The following time periods were used: 0–8&nbsp;h during the period of sleep restriction; 8–12&nbsp;h of light immediately following drug administration when drug activity was maximal; and a final recovery phase between 12 and 36&nbsp;h after the start of sleep restriction. Effects were evaluated using mixed model analysis with the magnitude of REM sleep restriction; drug treatment; and the interaction between the two factors as fixed effects with each subject acting as its own control. Hourly differences to baseline were evaluated using two-tailed repeated measures ANOVA with a Bonferroni correction. Percentage deficits were calculated relative to control from the least squares means generated in the mixed model described. Recovery sleep was calculated from the differences generated in the mixed model between treatment groups. The percentage recovery is the proportion of additional sleep throughout the recovery period relative to the deficit induced by the REM sleep restriction. For example, if a deficit of 20&nbsp;min is incurred and 15&nbsp;min of this is recovered by the end of 48&nbsp;h, a 75% recovery has been achieved.</span></p></section><section data-dcnode-id="4070" id="sec2.8"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4112" id="sectitle0070"><span data-dcnode-id="4117" instrument_node="">2.8</span><span data-dcnode-id="4115" instrument_node="">. </span><span data-dcnode-id="4113" instrument_node="">Sleep recovery modelling</span></h3><p data-dcnode-id="4094" id="p0115"><span data-dcnode-id="4111" instrument_node="">Accumulation of sleep was calculated after treatment, relative to the previous 24-h baseline. Bin&nbsp;=&nbsp;1 denotes the first 60&nbsp;min post-treatment. Subsequent bins accumulate the change from baseline. Thus, positive slopes imply more time in the vigilance state than during the baseline e.g., recovery sleep, and a negative slope implies less time in the state e.g., sleep loss. Recovery sleep was modelled using an exponential decay process previously described (</span><a class="workspace-trigger" data-dcnode-id="4109" href="#bib28" name="bbib28"><span data-dcnode-id="4110" instrument_node="">Stephenson et&nbsp;al., 2015</span></a><span data-dcnode-id="4108" instrument_node="">).</span><span class="display" data-dcnode-id="4101"><span class="formula" data-dcnode-id="4102" id="ufd1"><span data-dcnode-id="4103"><span data-dcnode-id="4107" instrument_node="">[tNREM, tREM]&nbsp;=&nbsp;Rspan&nbsp;·&nbsp;(1−exp[−t/τ])&nbsp;+&nbsp;Y</span><sub data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">0</span></sub><span data-dcnode-id="4104" instrument_node="">, and</span></span></span></span><span class="display" data-dcnode-id="4095"><span class="formula" data-dcnode-id="4096" id="ufd2"><span data-dcnode-id="4097"><span data-dcnode-id="4100" instrument_node="">tWAKE&nbsp;=&nbsp;Rspan&nbsp;·&nbsp;exp[−t/τ]&nbsp;+&nbsp;T</span><sub data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">0</span></sub></span></span></span></p><p data-dcnode-id="4071" id="p0120"><span data-dcnode-id="4093" instrument_node="">Three variables: Y</span><sub data-dcnode-id="4091"><span data-dcnode-id="4092" instrument_node="">0,</span></sub><span data-dcnode-id="4090" instrument_node=""> the initial sleep deficit; T</span><sub data-dcnode-id="4088"><span data-dcnode-id="4089" instrument_node="">0,</span></sub><span data-dcnode-id="4087" instrument_node=""> the response asymptote; and τ, the response time constant were used to describe the model. Rspan, the quantity of recovered sleep is equivalent to Y</span><sub data-dcnode-id="4085"><span data-dcnode-id="4086" instrument_node="">0</span></sub><span data-dcnode-id="4084" instrument_node="">–T</span><sub data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">0</span></sub><span data-dcnode-id="4081" instrument_node="">. Analysis was performed using the Python 3.4 Scipy module (</span><a class="workspace-trigger" data-dcnode-id="4079" href="#bib11" name="bbib11"><span data-dcnode-id="4080" instrument_node="">Jones et&nbsp;al., 2001</span></a><span data-dcnode-id="4078" instrument_node="">) and the curve_fit function. Regressions were provided to initial estimates for Y</span><sub data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">0</span></sub><span data-dcnode-id="4075" instrument_node=""> but not constrained as in the Stephenson et&nbsp;al. analysis (</span><a class="workspace-trigger" data-dcnode-id="4073" href="#bib28" name="bbib28"><span data-dcnode-id="4074" instrument_node="">Stephenson et&nbsp;al., 2015</span></a><span data-dcnode-id="4072" instrument_node="">). The characteristic rate of rebound, τ, is the exponential time constant of the response and is the time in hours to complete 1/e&nbsp;≈&nbsp;0.632 of Rspan).</span></p></section></section><section data-dcnode-id="3042" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4063" id="sectitle0075"><span data-dcnode-id="4068" instrument_node="">3</span><span data-dcnode-id="4066" instrument_node="">. </span><span data-dcnode-id="4064" instrument_node="">Results</span></h2><div data-dcnode-id="4036"><p data-dcnode-id="4056" id="p0125"><span data-dcnode-id="4062" instrument_node="">Sleep was evaluated over 72&nbsp;h, including an undisturbed baseline period 24&nbsp;h prior to treatment. During the baseline period, the rats displayed a clear 24-h (circadian) rhythm in their sleep that was consistent between treatment groups (</span><a class="workspace-trigger" data-dcnode-id="4060" href="#fig2" name="bfig2"><span data-dcnode-id="4061" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="4059" instrument_node="">A and C</span><span data-dcnode-id="4057" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="4037" id="fig2"><span data-dcnode-id="4046"><img alt="" aria-describedby="cap0015" data-dcnode-id="4055" height="458" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr2.jpg&amp;raw"><span data-dcnode-id="4054" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="4047"><li data-dcnode-id="4048"><a class="anchor download-link u-font-sans" data-dcnode-id="4049" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="4050"><span data-dcnode-id="4053" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="4038"><span data-dcnode-id="4039" id="cap0015"><p data-dcnode-id="4040" id="fspara0015"><span class="label" data-dcnode-id="4044"><span data-dcnode-id="4045" instrument_node="">Fig.&nbsp;2</span></span><span data-dcnode-id="4043" instrument_node="">. </span><span data-dcnode-id="4041" instrument_node="">Minutes spent in REM sleep per hour. (A) and cumulative hourly differences from baseline (B) with a REM specific sleep restriction protocol, beginning at the red vertical line 0 (grey, N&nbsp;=&nbsp;11), 5 (green, N&nbsp;=&nbsp;12), 8 (blue, N&nbsp;=&nbsp;14) and 10 (red N&nbsp;=&nbsp;14) hours of sleep restriction were given starting at ZT-0 (Data presented as mean and standard error of the mean). The REM sleep deficit elicited by the restriction leads to a subsequent rebound that compensates for all lost sleep at each length of sleep deprivation. NREM sleep time (C) and cumulative hourly differences from baseline (D) show that total NREM sleep time is largely unaltered by the protocol.</span></p></span></span></figure></div><section data-dcnode-id="3851" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4030" id="sectitle0080"><span data-dcnode-id="4035" instrument_node="">3.1</span><span data-dcnode-id="4033" instrument_node="">. </span><span data-dcnode-id="4031" instrument_node="">REM sleep restriction</span></h3><p data-dcnode-id="4016" id="p0130"><span data-dcnode-id="4029" instrument_node="">EEG-driven feedback REM sleep restriction reduced the total amount of REM sleep from 5 to 10% to between 0 and 3% of the recording time across the range of restriction lengths. REM sleep time during the REM sleep restriction, which reflects number of attempts to enter REM sleep, increased linearly over the course of the restriction protocol (</span><a class="workspace-trigger" data-dcnode-id="4027" href="#fig2" name="bfig2"><span data-dcnode-id="4028" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="4026" instrument_node="">A). A mean REM sleep debt of 13.1&nbsp;±&nbsp;1.6, 16.0&nbsp;±&nbsp;2.2 and 37.3&nbsp;±&nbsp;4.3&nbsp;min was accumulated over control at 5, 8 and 10&nbsp;h of REM sleep restriction respectively (</span><a class="workspace-trigger" data-dcnode-id="4024" href="#fig2" name="bfig2"><span data-dcnode-id="4025" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="4023" instrument_node="">B), representing a reduction of 64&nbsp;±&nbsp;9, 69&nbsp;±&nbsp;8 and 60&nbsp;±&nbsp;10% of REM sleep in the equivalent baseline light period. Release from REM restriction resulted in a prolonged elevation of REM sleep, in proportion to REM sleep loss. The elevation of REM sleep during the recovery phase compensated between 71% and 103% of REM sleep lost during the restriction, averaging 91&nbsp;±&nbsp;10% across all studies. The total time in NREM sleep (</span><a class="workspace-trigger" data-dcnode-id="4021" href="#fig2" name="bfig2"><span data-dcnode-id="4022" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="4020" instrument_node="">C and D) was not significantly affected relative to the non-sleep restricted control group, although in the first hour of sleep restriction a deficit in NREM sleep was elicited by the presence of the technicians. Interestingly, NREM bout sleep lengths were increasingly shortened as time in REM sleep restriction increased (</span><a class="workspace-trigger" data-dcnode-id="4018" href="#appsec1" name="bappsec1"><span data-dcnode-id="4019" instrument_node="">Supplementary Fig.&nbsp;1</span></a><span data-dcnode-id="4017" instrument_node="">).</span></p><div data-dcnode-id="3852"><p data-dcnode-id="4002" id="p0135"><span data-dcnode-id="4015" instrument_node="">The rate of REM sleep recovery was estimated using an exponential saturating function. Each REM sleep restriction length was modelled independently (</span><a class="workspace-trigger" data-dcnode-id="4013" href="#tbl1" name="btbl1"><span data-dcnode-id="4014" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="4012" instrument_node="">) and the model parameters representing the zero-cross deficit (Y</span><sub data-dcnode-id="4010"><span data-dcnode-id="4011" instrument_node="">0</span></sub><span data-dcnode-id="4009" instrument_node="">), recovery rate constant (τ) and asymptotic offset (T</span><sub data-dcnode-id="4007"><span data-dcnode-id="4008" instrument_node="">0</span></sub><span data-dcnode-id="4006" instrument_node="">) were evaluated. REM sleep deprivation resulted in full recovery, resulting in asymptotic offsets (T</span><sub data-dcnode-id="4004"><span data-dcnode-id="4005" instrument_node="">0</span></sub><span data-dcnode-id="4003" instrument_node="">) that were not significantly different to 0. Equivalent values for the recovery rate constant were also found at each dose level of REM sleep restriction; therefore increasing REM sleep deprivation only altered the initial deficit parameter.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3853" id="tbl1"><span class="captions" data-dcnode-id="3979"><span data-dcnode-id="3980" id="cap0035"><p data-dcnode-id="3981" id="tspara0010"><span class="label" data-dcnode-id="4000"><span data-dcnode-id="4001" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="3999" instrument_node="">. </span><span data-dcnode-id="3997" instrument_node="">Model parameters of the exponential recovery model of REM sleep. Y</span><sub data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">0</span></sub><span data-dcnode-id="3994" instrument_node=""> is the deficit at 0&nbsp;h (in minutes), T</span><sub data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">0</span></sub><span data-dcnode-id="3991" instrument_node=""> is the final deficit (in minutes) and τ is the recovery rate constant (in hours). Significance vs non-sleep restricted vehicle control was determined using ANOVA and is denoted by the following symbols: * 0.01 &lt; </span><em data-dcnode-id="3989"><span data-dcnode-id="3990" instrument_node="">p</span></em><span data-dcnode-id="3988" instrument_node=""> &lt; 0.05; ** 0.001 &lt; </span><em data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">p</span></em><span data-dcnode-id="3985" instrument_node=""> &lt; 0.01; ***</span><em data-dcnode-id="3983"><span data-dcnode-id="3984" instrument_node="">p</span></em><span data-dcnode-id="3982" instrument_node=""> &lt; 0.001.</span></p></span></span><div class="groups" data-dcnode-id="3854"><table data-dcnode-id="3855"><thead data-dcnode-id="3965"><tr class="rowsep-1 valign-top" data-dcnode-id="3966"><th data-dcnode-id="3977" scope="col"><span data-dcnode-id="3978" instrument_node="">REM sleep restriction length</span></th><th data-dcnode-id="3973" scope="col"><span data-dcnode-id="3976" instrument_node="">Y</span><sub data-dcnode-id="3974"><span data-dcnode-id="3975" instrument_node="">0</span></sub></th><th data-dcnode-id="3969" scope="col"><span data-dcnode-id="3972" instrument_node="">T</span><sub data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node="">0</span></sub></th><th data-dcnode-id="3967" scope="col"><span data-dcnode-id="3968" instrument_node="">τ</span></th></tr></thead><tbody data-dcnode-id="3856"><tr class="valign-top" data-dcnode-id="3956"><td data-dcnode-id="3963"><span data-dcnode-id="3964" instrument_node="">REM restriction 5&nbsp;hr</span></td><td class="align-char" data-dcnode-id="3961"><span data-dcnode-id="3962" instrument_node="">−25.2&nbsp;±&nbsp;2.5***</span></td><td class="align-char" data-dcnode-id="3959"><span data-dcnode-id="3960" instrument_node="">−3.5&nbsp;±&nbsp;3.8</span></td><td class="align-char" data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">6.5&nbsp;±&nbsp;1.4</span></td></tr><tr class="valign-top" data-dcnode-id="3947"><td data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">REM restriction 8&nbsp;hr</span></td><td class="align-char" data-dcnode-id="3952"><span data-dcnode-id="3953" instrument_node="">−42.6&nbsp;±&nbsp;1.3***</span></td><td class="align-char" data-dcnode-id="3950"><span data-dcnode-id="3951" instrument_node="">−5.1&nbsp;±&nbsp;3</span></td><td class="align-char" data-dcnode-id="3948"><span data-dcnode-id="3949" instrument_node="">8.0&nbsp;±&nbsp;0.7</span></td></tr><tr class="valign-top" data-dcnode-id="3938"><td data-dcnode-id="3945"><span data-dcnode-id="3946" instrument_node="">REM restriction 10&nbsp;hr</span></td><td class="align-char" data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">−46.7&nbsp;±&nbsp;2.5***</span></td><td class="align-char" data-dcnode-id="3941"><span data-dcnode-id="3942" instrument_node="">−6&nbsp;±&nbsp;2.7</span></td><td class="align-char" data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">6.3&nbsp;±&nbsp;1.4</span></td></tr><tr class="valign-top" data-dcnode-id="3929"><td data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">Citalopram</span></td><td class="align-char" data-dcnode-id="3934"><span data-dcnode-id="3935" instrument_node="">−25.1&nbsp;±&nbsp;1.3</span></td><td class="align-char" data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">−14.1&nbsp;±&nbsp;0.7***</span></td><td class="align-char" data-dcnode-id="3930"><span data-dcnode-id="3931" instrument_node="">5.4&nbsp;±&nbsp;2.3</span></td></tr><tr class="valign-top" data-dcnode-id="3920"><td data-dcnode-id="3927"><span data-dcnode-id="3928" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3925"><span data-dcnode-id="3926" instrument_node="">−26.9&nbsp;±&nbsp;0.8***</span></td><td class="align-char" data-dcnode-id="3923"><span data-dcnode-id="3924" instrument_node="">4.3&nbsp;±&nbsp;0.8**</span></td><td class="align-char" data-dcnode-id="3921"><span data-dcnode-id="3922" instrument_node="">6.9&nbsp;±&nbsp;1.1</span></td></tr><tr class="valign-top" data-dcnode-id="3911"><td data-dcnode-id="3918"><span data-dcnode-id="3919" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;citalopram</span></td><td class="align-char" data-dcnode-id="3916"><span data-dcnode-id="3917" instrument_node="">−41.4&nbsp;±&nbsp;0.8***</span></td><td class="align-char" data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">−12.2&nbsp;±&nbsp;0.8***</span></td><td class="align-char" data-dcnode-id="3912"><span data-dcnode-id="3913" instrument_node="">5.0&nbsp;±&nbsp;1.0</span></td></tr><tr class="valign-top" data-dcnode-id="3902"><td data-dcnode-id="3909"><span data-dcnode-id="3910" instrument_node="">Paroxetine</span></td><td class="align-char" data-dcnode-id="3907"><span data-dcnode-id="3908" instrument_node="">−29.3&nbsp;±&nbsp;3.7*</span></td><td class="align-char" data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">−20.3&nbsp;±&nbsp;0.6***</span></td><td class="align-char" data-dcnode-id="3903"><span data-dcnode-id="3904" instrument_node="">3.7&nbsp;±&nbsp;2.2</span></td></tr><tr class="valign-top" data-dcnode-id="3893"><td data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3898"><span data-dcnode-id="3899" instrument_node="">−29.9&nbsp;±&nbsp;1.1*</span></td><td class="align-char" data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">−7.8&nbsp;±&nbsp;0.9*</span></td><td class="align-char" data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">7.0&nbsp;±&nbsp;1.6</span></td></tr><tr class="valign-top" data-dcnode-id="3884"><td data-dcnode-id="3891"><span data-dcnode-id="3892" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;paroxetine</span></td><td class="align-char" data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">−43.4&nbsp;±&nbsp;0.7**</span></td><td data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">−19.6&nbsp;±&nbsp;0.7***</span></td><td class="align-char" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">9.1&nbsp;±&nbsp;1.3</span></td></tr><tr class="valign-top" data-dcnode-id="3875"><td data-dcnode-id="3882"><span data-dcnode-id="3883" instrument_node="">Imipramine</span></td><td class="align-char" data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">−25.6&nbsp;±&nbsp;8.1**</span></td><td class="align-char" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">3.5&nbsp;±&nbsp;4.2**</span></td><td class="align-char" data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">28.0&nbsp;±&nbsp;11.2***</span></td></tr><tr class="valign-top" data-dcnode-id="3866"><td data-dcnode-id="3873"><span data-dcnode-id="3874" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3871"><span data-dcnode-id="3872" instrument_node="">−33.7&nbsp;±&nbsp;0.8***</span></td><td class="align-char" data-dcnode-id="3869"><span data-dcnode-id="3870" instrument_node="">−3.13&nbsp;±&nbsp;0.5</span></td><td class="align-char" data-dcnode-id="3867"><span data-dcnode-id="3868" instrument_node="">5.9&nbsp;±&nbsp;1.0</span></td></tr><tr class="valign-top" data-dcnode-id="3857"><td data-dcnode-id="3864"><span data-dcnode-id="3865" instrument_node="">8&nbsp;h REM restriction&nbsp;+&nbsp;imipramine</span></td><td class="align-char" data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">−46.0&nbsp;±&nbsp;7.0***</span></td><td class="align-char" data-dcnode-id="3860"><span data-dcnode-id="3861" instrument_node="">0.21&nbsp;±&nbsp;3.7</span></td><td class="align-char" data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">21.5&nbsp;±&nbsp;6.0***</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="3170" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3845" id="sectitle0085"><span data-dcnode-id="3850" instrument_node="">3.2</span><span data-dcnode-id="3848" instrument_node="">. </span><span data-dcnode-id="3846" instrument_node="">Acute effects of antidepressants on REM sleep time under baseline conditions</span></h3><p data-dcnode-id="3837" id="p0140"><span data-dcnode-id="3844" instrument_node="">The effects of citalopram, paroxetine and imipramine were evaluated under baseline conditions and following an 8&nbsp;h REM sleep restriction using the experimental design shown in </span><a class="workspace-trigger" data-dcnode-id="3842" href="#fig1" name="bfig1"><span data-dcnode-id="3843" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="3841" instrument_node="">. REM sleep time during the undisturbed baseline period 24&nbsp;h prior to treatment was equivalent between treatment groups (</span><strong data-dcnode-id="3839"><span data-dcnode-id="3840" instrument_node="">data not shown</span></strong><span data-dcnode-id="3838" instrument_node="">).</span></p><div data-dcnode-id="3437"><p data-dcnode-id="3818" id="p0145"><span data-dcnode-id="3836" instrument_node="">Under baseline conditions, all doses of antidepressant given at ZT-8 inhibited REM sleep for the remaining 4&nbsp;h of the light cycle (</span><a class="workspace-trigger" data-dcnode-id="3834" href="#fig3" name="bfig3"><span data-dcnode-id="3835" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3833" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3831" href="#fig4" name="bfig4"><span data-dcnode-id="3832" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3830" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3828" href="#fig5" name="bfig5"><span data-dcnode-id="3829" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3827" instrument_node="">A</span><span data-dcnode-id="3825" instrument_node="">). Citalopram and paroxetine both resulted in an 84&nbsp;±&nbsp;8% reduction in REM sleep relative to vehicle controls (see </span><a class="workspace-trigger" data-dcnode-id="3823" href="#tbl2" name="btbl2"><span data-dcnode-id="3824" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="3822" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3820" href="#tbl3" name="btbl3"><span data-dcnode-id="3821" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3819" instrument_node=""> for corresponding values in minutes of REM sleep), whereas imipramine inhibited REM sleep by 69&nbsp;±&nbsp;9% reduction, relative to vehicle controls during the 8–12&nbsp;h analysis period.</span></p><figure class="figure text-xs" data-dcnode-id="3799" id="fig3"><span data-dcnode-id="3808"><img alt="" aria-describedby="cap0020" data-dcnode-id="3817" height="419" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr3.jpg&amp;raw"><span data-dcnode-id="3816" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3809"><li data-dcnode-id="3810"><a class="anchor download-link u-font-sans" data-dcnode-id="3811" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3812"><span data-dcnode-id="3815" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3800"><span data-dcnode-id="3801" id="cap0020"><p data-dcnode-id="3802" id="fspara0020"><span class="label" data-dcnode-id="3806"><span data-dcnode-id="3807" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="3805" instrument_node="">. </span><span data-dcnode-id="3803" instrument_node="">The effects of 10&nbsp;mg/kg citalopram upon REM sleep with and without prior REM sleep debt. –Citalopram (red); – Vehicle control (pink); – REM sleep restriction followed by citalopram administration (blue) and – REM sleep restriction control (light blue). Data presented as mean and standard error of the mean. (A) Hourly plot of total REM sleep time with vehicle and citalopram administration at 8&nbsp;h; (B) Hourly plot of total REM sleep time with vehicle and citalopram administration at 8&nbsp;h following REM sleep restriction (RR, 0–8&nbsp;h); (C) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of citalopram without prior REM sleep restriction; (D) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of citalopram with prior REM sleep restriction. *p&nbsp;&lt;&nbsp;0.05 repeated measures ANOVA; (E) Analysis of recovery from REM restriction (RR), citalopram (CIT), and the component of recovery from REM restriction (cRR) and citalopram (cCIT) attributed in the combination group. *p&nbsp;&lt;&nbsp;0.05; **p&nbsp;&lt;&nbsp;0.01; ***p&nbsp;&lt;&nbsp;0.001 ANCOVA.</span></p></span></span></figure><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3617" id="tbl2"><span class="captions" data-dcnode-id="3791"><span data-dcnode-id="3792" id="cap0040"><p data-dcnode-id="3793" id="tspara0015"><span class="label" data-dcnode-id="3797"><span data-dcnode-id="3798" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="3796" instrument_node="">. </span><span data-dcnode-id="3794" instrument_node="">Summary statistics from the mixed model analysis of REM restriction in combination with citalopram. Measurement periods are split into pre-defined analysis periods. Comparison [2-1] is the quantity of REM in the citalopram treated group relat d><td class="align-char" data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">[2-1]</span></td><td class="align-char" data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">−20.41&nbsp;±&nbsp;4.85***</span></td></tr><tr class="valign-top" data-dcnode-id="3460"><td data-dcnode-id="3467"><span data-dcnode-id="3468" instrument_node="">[2] Paroxetine</span></td><td class="align-char" data-dcnode-id="3465"><span data-dcnode-id="3466" instrument_node="">138.60&nbsp;±&nbsp;3.76</span></td><td class="align-char" data-dcnode-id="3463"><span data-dcnode-id="3464" instrument_node="">[4-3]</span></td><td class="align-char" data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">−13.68&nbsp;±&nbsp;5.37*</span></td></tr><tr class="valign-top" data-dcnode-id="3451"><td data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">[3] RR&nbsp;+&nbsp;Vehicle</span></td><td class="align-char" data-dcnode-id="3456"><span data-dcnode-id="3457" instrument_node="">178.57&nbsp;±&nbsp;4.19</span></td><td class="align-char" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">[3-1]</span></td><td class="align-char" data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">19.52&nbsp;±&nbsp;5.04***</span></td></tr><tr class="valign-top" data-dcnode-id="3442"><td data-dcnode-id="3449"><span data-dcnode-id="3450" instrument_node="">[4] RR&nbsp;+&nbsp;Paroxetine</span></td><td class="align-char" data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">164.89&nbsp;±&nbsp;4.12</span></td><td class="align-char" data-dcnode-id="3445"><span data-dcnode-id="3446" instrument_node="">[4-2]</span></td><td class="align-char" data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">26.25&nbsp;±&nbsp;5.15***</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="3194"><p data-dcnode-id="3415" id="p0150"><span data-dcnode-id="3436" instrument_node="">Following citalopram or paroxetine treatment, there was no significant recovery of REM sleep during the 12–48&nbsp;h analysis time period (</span><a class="workspace-trigger" data-dcnode-id="3434" href="#fig3" name="bfig3"><span data-dcnode-id="3435" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3433" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3431" href="#fig4" name="bfig4"><span data-dcnode-id="3432" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3430" instrument_node="">C</span><span data-dcnode-id="3428" instrument_node="">). Following citalopram administration, after 48&nbsp;h a total of 96&nbsp;±&nbsp;40% of the deficit in REM sleep remained (</span><a class="workspace-trigger" data-dcnode-id="3426" href="#tbl2" name="btbl2"><span data-dcnode-id="3427" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="3425" instrument_node="">). Paroxetine was tested to generalise findings to the selective serotonin reuptake inhibitor class and also showed no significant recovery, with a REM deficit of 105&nbsp;±&nbsp;25% remaining after 48&nbsp;h (</span><a class="workspace-trigger" data-dcnode-id="3423" href="#tbl3" name="btbl3"><span data-dcnode-id="3424" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3422" instrument_node="">). In contrast, imipramine, a tri-cyclic antidepressant, showed a full recovery of the REM deficit incurred during the 12–48&nbsp;h analysis time period (</span><a class="workspace-trigger" data-dcnode-id="3420" href="#fig5" name="bfig5"><span data-dcnode-id="3421" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3419" instrument_node="">B), which accounted for 93&nbsp;±&nbsp;28% of the REM sleep deficit (</span><a class="workspace-trigger" data-dcnode-id="3417" href="#tbl4" name="btbl4"><span data-dcnode-id="3418" instrument_node="">Table 4</span></a><span data-dcnode-id="3416" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="3396" id="fig4"><span data-dcnode-id="3405"><img alt="" aria-describedby="cap0025" data-dcnode-id="3414" height="420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr4.jpg&amp;raw"><span data-dcnode-id="3413" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3406"><li data-dcnode-id="3407"><a class="anchor download-link u-font-sans" data-dcnode-id="3408" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3409"><span data-dcnode-id="3412" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3397"><span data-dcnode-id="3398" id="cap0025"><p data-dcnode-id="3399" id="fspara0025"><span class="label" data-dcnode-id="3403"><span data-dcnode-id="3404" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="3402" instrument_node="">. </span><span data-dcnode-id="3400" instrument_node="">The effects of 5&nbsp;mg/kg paroxetine upon REM and NREM sleep with and without prior REM sleep debt. –Paroxetine (red) – Vehicle control (pink) – REM sleep restriction followed by Paroxetine administration (blue) – REM sleep restriction control (light blue). Data presented as mean and standard error of the mean. (A) Hourly plot of total REM sleep time with vehicle and paroxetine administration at 8&nbsp;h; (B) Hourly plot of total REM sleep time with vehicle and paroxetine administration at 8&nbsp;h following REM sleep restriction (RR, 0–8&nbsp;h); (C) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of paroxetine without prior REM sleep restriction; (D) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of paroxetine with prior REM sleep restriction. *p&nbsp;&lt;&nbsp;0.05 repeated measures ANOVA; (E) Analysis of recovery from REM restriction (RR), paroxetine (PAR), and the component of recovery from REM restriction (cRR) and paroxetine (cPAR) attributed in the combination group; *p&nbsp;&lt;&nbsp;0.05; **p&nbsp;&lt;&nbsp;0.01; ***p&nbsp;&lt;&nbsp;0.001 ANCOVA.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="3377" id="fig5"><span data-dcnode-id="3386"><img alt="" aria-describedby="cap0030" data-dcnode-id="3395" height="411" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr5.jpg&amp;raw"><span data-dcnode-id="3394" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="3387"><li data-dcnode-id="3388"><a class="anchor download-link u-font-sans" data-dcnode-id="3389" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0028390816301873-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="3390"><span data-dcnode-id="3393" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="3391"><span data-dcnode-id="3392" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="3378"><span data-dcnode-id="3379" id="cap0030"><p data-dcnode-id="3380" id="fspara0030"><span class="label" data-dcnode-id="3384"><span data-dcnode-id="3385" instrument_node="">Fig.&nbsp;5</span></span><span data-dcnode-id="3383" instrument_node="">. </span><span data-dcnode-id="3381" instrument_node="">The effects of imipramine upon REM and NREM sleep with and without prior REM sleep debt. . –Imipramine (red) – Vehicle control (pink) – REM sleep restriction followed by Imipramine administration (blue) – REM sleep restriction control (light blue). Data presented as mean and standard error of the mean. (A) Hourly plot of total REM sleep time with vehicle and imipramine administration at 8&nbsp;h; (B) Hourly plot of total REM sleep time with vehicle and imipramine administration at 8&nbsp;h following REM sleep restriction (RR, 0–8&nbsp;h); (C) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of imipramine without prior REM sleep restriction; (D) Accumulated REM sleep, relative to the baseline period 24&nbsp;h prior, showing REM sleep effects of imipramine with prior REM sleep restriction. *p&nbsp;&lt;&nbsp;0.05 repeated measures ANOVA; (E) Analysis of recovery from REM restriction (RR), imipramine (IMI), and the component of recovery from REM restriction (cRR) and imipramine (cIMI) attributed in the combination group; *p&nbsp;&lt;&nbsp;0.05; **p&nbsp;&lt;&nbsp;0.01; ***p&nbsp;&lt;&nbsp;0.001 ANCOVA.</span></p></span></span></figure><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="3195" id="tbl4"><span class="captions" data-dcnode-id="3369"><span data-dcnode-id="3370" id="cap0050"><p data-dcnode-id="3371" id="tspara0025"><span class="label" data-dcnode-id="3375"><span data-dcnode-id="3376" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="3374" instrument_node="">. </span><span data-dcnode-id="3372" instrument_node="">Summary statistics of REM restriction in combination with imipramine. Measurement periods are split into pre-defined analysis periods. Comparison [2-1] is the quantity of REM in the imipramine treated group relative to vehicle controls without REM sleep restriction. Comparison [4-3] is the quantity of REM in the imipramine treated group relative to vehicle controls in the REM sleep restricted condition. Comparison [3-1] is the quantity of REM in the sleep deprived group relative to non-sleep deprived controls that received vehicle treatment. Comparison [4-2] is the quantity of REM in the sleep deprived group relative to non-sleep deprived controls that received imipramine. Statistical significance was determined by repeated measures ANCOVA, where baseline and date were included as covariates and a Tukey adjustment used. Significance is denoted by the following symbols: * 0.01&nbsp;&lt;&nbsp;p&nbsp;&lt;&nbsp;0.05; ** 0.001&nbsp;&lt;&nbsp;p&nbsp;&lt;&nbsp;0.01; ***p&nbsp;&lt;&nbsp;0.001.</span></p></span></span><div class="groups" data-dcnode-id="3196"><table data-dcnode-id="3197"><thead data-dcnode-id="3354"><tr class="rowsep-1 valign-top" data-dcnode-id="3362"><th data-dcnode-id="3367" rowspan="2" scope="col"><span data-dcnode-id="3368" instrument_node="">Condition</span></th><th data-dcnode-id="3365" rowspan="2" scope="col"><span data-dcnode-id="3366" instrument_node="">Measurement period</span></th><th colspan="3" data-dcnode-id="3363" scope="col"><span data-dcnode-id="3364" instrument_node="">Minutes of REM sleep</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="3355"><th data-dcnode-id="3360" scope="col"><span data-dcnode-id="3361" instrument_node="">Least squares means</span></th><th data-dcnode-id="3358" scope="col"><span data-dcnode-id="3359" instrument_node="">Comparison</span></th><th data-dcnode-id="3356" scope="col"><span data-dcnode-id="3357" instrument_node="">Difference from comparison group</span></th></tr></thead><tbody data-dcnode-id="3198"><tr class="valign-top" data-dcnode-id="3343"><td data-dcnode-id="3352"><span data-dcnode-id="3353" instrument_node="">[1] Vehicle</span></td><td data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">0–8 hrs (RR)</span></td><td class="align-char" data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node="">36.72&nbsp;±&nbsp;1.32</span></td><td class="align-char" data-dcnode-id="3346"><span data-dcnode-id="3347" instrument_node="">[2-1]</span></td><td class="align-char" data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">
