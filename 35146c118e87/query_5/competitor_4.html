ata-dcnode-id="3308" instrument_node="">22.90&nbsp;±&nbsp;1.56</span></td><td class="align-char" data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">[2-1]</span></td><td class="align-char" data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">−15.69&nbsp;±&nbsp;2.09***</span></td></tr><tr class="valign-top" data-dcnode-id="3293"><td data-dcnode-id="3300"><span data-dcnode-id="3301" instrument_node="">[2] Imipramine</span></td><td class="align-char" data-dcnode-id="3298"><span data-dcnode-id="3299" instrument_node="">7.21&nbsp;±&nbsp;1.57</span></td><td class="align-char" data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">[4-3]</span></td><td class="align-char" data-dcnode-id="3294"><span data-dcnode-id="3295" instrument_node="">−15.36&nbsp;±&nbsp;1.96***</span></td></tr><tr class="valign-top" data-dcnode-id="3284"><td data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">[3] RR&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">29.77&nbsp;±&nbsp;1.43</span></td><td class="align-char" data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">[3-1]</span></td><td class="align-char" data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">6.87&nbsp;±&nbsp;1.93***</span></td></tr><tr class="valign-top" data-dcnode-id="3275"><td data-dcnode-id="3282"><span data-dcnode-id="3283" instrument_node="">[4] RR&nbsp;+&nbsp;imipramine</span></td><td class="align-char" data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">14.41&nbsp;±&nbsp;1.55</span></td><td class="align-char" data-dcnode-id="3278"><span data-dcnode-id="3279" instrument_node="">[4-2]</span></td><td class="align-char" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node="">7.19&nbsp;±&nbsp;2.20**</span></td></tr><tr class="valign-top" data-dcnode-id="3264"><td data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">[1] Vehicle</span></td><td data-dcnode-id="3271" rowspan="4"><span data-dcnode-id="3272" instrument_node="">12–48&nbsp;hrs</span></td><td class="align-char" data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">126.77&nbsp;±&nbsp;4.34</span></td><td class="align-char" data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">[2-1]</span></td><td class="align-char" data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">14.58&nbsp;±&nbsp;4.41**</span></td></tr><tr class="valign-top" data-dcnode-id="3255"><td data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">[2] Imipramine</span></td><td class="align-char" data-dcnode-id="3260"><span data-dcnode-id="3261" instrument_node="">138.30&nbsp;±&nbsp;4.045</span></td><td class="align-char" data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">[4-3]</span></td><td class="align-char" data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">16.74&nbsp;±&nbsp;4.06***</span></td></tr><tr class="valign-top" data-dcnode-id="3246"><td data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">[3] RR&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">134.73&nbsp;±&nbsp;4.01</span></td><td class="align-char" data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">[3-1]</span></td><td class="align-char" data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">10.28&nbsp;±&nbsp;3.33***</span></td></tr><tr class="valign-top" data-dcnode-id="3237"><td data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">[4] RR&nbsp;+&nbsp;imipramine</span></td><td class="align-char" data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">151.47&nbsp;±&nbsp;4.15</span></td><td class="align-char" data-dcnode-id="3240"><span data-dcnode-id="3241" instrument_node="">[4-2]</span></td><td class="align-char" data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">12.44&nbsp;±&nbsp;3.63***</span></td></tr><tr class="valign-top" data-dcnode-id="3226"><td data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">[1] Vehicle</span></td><td data-dcnode-id="3233" rowspan="4"><span data-dcnode-id="3234" instrument_node="">8–48&nbsp;hrs</span></td><td class="align-char" data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">147.44&nbsp;±&nbsp;4.80</span></td><td class="align-char" data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">[2-1]</span></td><td class="align-char" data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">−3.68&nbsp;±&nbsp;4.93</span></td></tr><tr class="valign-top" data-dcnode-id="3217"><td data-dcnode-id="3224"><span data-dcnode-id="3225" instrument_node="">[2] Imipramine</span></td><td class="align-char" data-dcnode-id="3222"><span data-dcnode-id="3223" instrument_node="">143.75&nbsp;±&nbsp;4.57</span></td><td class="align-char" data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">[4-3]</span></td><td class="align-char" data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">−1.6264&nbsp;±&nbsp;4.64</span></td></tr><tr class="valign-top" data-dcnode-id="3208"><td data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">[3] RR&nbsp;+&nbsp;vehicle</span></td><td class="align-char" data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">165.31&nbsp;±&nbsp;4.54</span></td><td class="align-char" data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">[3-1]</span></td><td class="align-char" data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">19.93&nbsp;±&nbsp;4.84***</span></td></tr><tr class="valign-top" data-dcnode-id="3199"><td data-dcnode-id="3206"><span data-dcnode-id="3207" instrument_node="">[4] RR&nbsp;+&nbsp;imipramine</span></td><td class="align-char" data-dcnode-id="3204"><span data-dcnode-id="3205" instrument_node="">163.68&nbsp;±&nbsp;4.69</span></td><td class="align-char" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node="">[4-2]</span></td><td class="align-char" data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">17.87&nbsp;±&nbsp;4.57***</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="3171" id="p0155"><span data-dcnode-id="3193" instrument_node="">REM sleep recovery was also modelled following pharmacological REM sleep inhibition (</span><a class="workspace-trigger" data-dcnode-id="3191" href="#tbl1" name="btbl1"><span data-dcnode-id="3192" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="3190" instrument_node="">). The citalopram induced deficit was not fully compensated (T</span><sub data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">0</span></sub><span data-dcnode-id="3187" instrument_node="">&nbsp;=&nbsp;−14.1&nbsp;±&nbsp;0.7&nbsp;min) but an equivalent recovery rate was estimated to REM sleep restriction (tau&nbsp;=&nbsp;5.4&nbsp;±&nbsp;2.3&nbsp;h). Paroxetine also showed a lack of REM sleep compensation (T</span><sub data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">0</span></sub><span data-dcnode-id="3184" instrument_node="">&nbsp;=&nbsp;20.3&nbsp;±&nbsp;0.6&nbsp;min) and a similar recovery rate constant (tau&nbsp;=&nbsp;3.7&nbsp;±&nbsp;2.2&nbsp;h). In comparison to the SSRI treatments, imipramine showed a full recovery (T</span><sub data-dcnode-id="3182"><span data-dcnode-id="3183" instrument_node="">0</span></sub><span data-dcnode-id="3181" instrument_node="">&nbsp;=&nbsp;3.5&nbsp;±&nbsp;4.2) and significantly altered recovery rate constant relative to vehicle controls (tau&nbsp;=&nbsp;28.0&nbsp;±&nbsp;11.2&nbsp;h). Although the onset of the compensatory REM sleep period was clear following citalopram and paroxetine treatment, the inflection point (Y</span><sub data-dcnode-id="3179"><span data-dcnode-id="3180" instrument_node="">0)</span></sub><span data-dcnode-id="3178" instrument_node=""> following imipramine treatment was less so (</span><a class="workspace-trigger" data-dcnode-id="3176" href="#fig5" name="bfig5"><span data-dcnode-id="3177" instrument_node="">Figs.&nbsp;5</span></a><span data-dcnode-id="3175" instrument_node="">C and D). The onset point of recovery was systematically increased to evaluate the effect of the choice of inflection (Y</span><sub data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node="">0</span></sub><span data-dcnode-id="3172" instrument_node="">) and shown to decrease from 28.0&nbsp;±&nbsp;11.2 with choice of onset 4&nbsp;h after treatment to 18.1&nbsp;±&nbsp;6.2 with choice of onset 7&nbsp;h after drug administration. Subsequent increases in the inflection point prevented the model from converging.</span></p></section><section data-dcnode-id="3077" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3164" id="sectitle0090"><span data-dcnode-id="3169" instrument_node="">3.3</span><span data-dcnode-id="3167" instrument_node="">. </span><span data-dcnode-id="3165" instrument_node="">Acute effects of antidepressants on REM sleep time in the presence of increased REM sleep pressure</span></h3><p data-dcnode-id="3132" id="p0160"><span data-dcnode-id="3163" instrument_node="">Each experiment included a REM specific sleep restriction during the 8&nbsp;h following lights on (ZT-0) with vehicle treatment as a placebo control. REM specific sleep restriction induced a 75&nbsp;±&nbsp;10, 74&nbsp;±&nbsp;9 and 67&nbsp;±&nbsp;4% reduction in REM sleep relative to the non-sleep restricted control group in the citalopram, paroxetine and imipramine experiments respectively (</span><a class="workspace-trigger" data-dcnode-id="3161" href="#fig3" name="bfig3"><span data-dcnode-id="3162" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3160" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3158" href="#fig4" name="bfig4"><span data-dcnode-id="3159" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3157" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3155" href="#fig5" name="bfig5"><span data-dcnode-id="3156" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3154" instrument_node="">B). In each case, a rebound in REM sleep occurred and after 48&nbsp;h a total of 115&nbsp;±&nbsp;28, 73&nbsp;±&nbsp;19, 86&nbsp;±&nbsp;21% of the deficit in REM sleep was recovered (</span><a class="workspace-trigger" data-dcnode-id="3152" href="#tbl2" name="btbl2"><span data-dcnode-id="3153" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="3151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3149" href="#tbl3" name="btbl3"><span data-dcnode-id="3150" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="3148" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3146" href="#tbl4" name="btbl4"><span data-dcnode-id="3147" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="3145" instrument_node="">). The recovery rate constants for each of these studies were lower than those of the sleep restriction dose response, although these differences were not statistically significant (post-hoc </span><em data-dcnode-id="3143"><span data-dcnode-id="3144" instrument_node="">t</span></em><span data-dcnode-id="3142" instrument_node="">-test </span><em data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">p</span></em><span data-dcnode-id="3139" instrument_node="">&nbsp;=&nbsp;0.50, </span><em data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">p</span></em><span data-dcnode-id="3136" instrument_node="">&nbsp;=&nbsp;0.55, </span><em data-dcnode-id="3134"><span data-dcnode-id="3135" instrument_node="">p</span></em><span data-dcnode-id="3133" instrument_node="">&nbsp;=&nbsp;0.32 vs. 8&nbsp;hr sleep restriction for the citalopram, paroxetine and imipramine study respectively).</span></p><p data-dcnode-id="3112" id="p0165"><span data-dcnode-id="3131" instrument_node="">In the presence of homeostatic REM sleep pressure caused by 8&nbsp;h of REM sleep restriction prior to treatment all antidepressants elicited a similar deficit in REM sleep to acute administration without prior REM sleep restriction (</span><a class="workspace-trigger" data-dcnode-id="3129" href="#fig3" name="bfig3"><span data-dcnode-id="3130" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3128" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3126" href="#fig4" name="bfig4"><span data-dcnode-id="3127" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3125" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3123" href="#fig5" name="bfig5"><span data-dcnode-id="3124" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3122" instrument_node="">B). In the case of citalopram, a difference of only 2.7&nbsp;±&nbsp;2.7&nbsp;min (ANCOVA, </span><em data-dcnode-id="3120"><span data-dcnode-id="3121" instrument_node="">p</span></em><span data-dcnode-id="3119" instrument_node="">&nbsp;=&nbsp;0.33) was found between the two groups. Paroxetine also gave an equivalent reduction of REM sleep to the non-sleep restricted group, with a difference of only 0.1&nbsp;±&nbsp;2.4&nbsp;min (ANCOVA, </span><em data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">p</span></em><span data-dcnode-id="3116" instrument_node="">&nbsp;=&nbsp;0.96) during the 8–12&nbsp;h analysis period. Finally, there was no significant difference between the REM inhibition of imipramine under control conditions and following REM sleep restriction (1.6&nbsp;±&nbsp;2.7&nbsp;min, ANCOVA, </span><em data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">p</span></em><span data-dcnode-id="3113" instrument_node="">&nbsp;=&nbsp;0.57).</span></p><p data-dcnode-id="3101" id="p0170"><span data-dcnode-id="3111" instrument_node="">The homeostatic response to the 8&nbsp;h REM sleep restriction was still evident in each of the treatment groups regardless of which antidepressant was administered (</span><a class="workspace-trigger" data-dcnode-id="3109" href="#fig3" name="bfig3"><span data-dcnode-id="3110" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3108" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3106" href="#fig4" name="bfig4"><span data-dcnode-id="3107" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3103" href="#fig5" name="bfig5"><span data-dcnode-id="3104" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3102" instrument_node="">D). In the citalopram experiment, a total 115&nbsp;±&nbsp;28 and 104&nbsp;±&nbsp;26% of REM sleep deficit was recovered in the vehicle and citalopram treated groups respectively. During the period of REM sleep inhibition induced by citalopram, between 8 and 12&nbsp;h after the onset of REM sleep restriction, REM sleep recovery from the sleep restriction continued with a recovery of 23&nbsp;±&nbsp;7% of the deficit achieved during this time period. There were no significant interactions between citalopram and REM sleep restriction at any time point analysed.</span></p><p data-dcnode-id="3099" id="p0175"><span data-dcnode-id="3100" instrument_node="">In the case of paroxetine, 91&nbsp;±&nbsp;18 and 73&nbsp;±&nbsp;19% respectively of the REM sleep lost from the REM sleep restriction was recovered in the paroxetine and vehicle treated groups respectively. Furthermore, during the 8–12&nbsp;h analysis period, 25&nbsp;±&nbsp;6 and 26&nbsp;±&nbsp;7% of the REM sleep deficit induced by EEG-driven REM deprivation was recovered in both the paroxetine and vehicle treatment groups respectively. As with citalopram, there were no interactions between paroxetine and REM sleep restriction recovery.</span></p><p data-dcnode-id="3094" id="p0180"><span data-dcnode-id="3098" instrument_node="">Finally, imipramine also showed no significant difference in REM inhibition between control conditions and following REM sleep restriction. Imipramine inhibited REM sleep causing an additional deficit of 15.4&nbsp;±&nbsp;2.0&nbsp;min during the 8–12&nbsp;h analysis period, a 52&nbsp;±&nbsp;5% reduction, relative to vehicle controls. Additionally, imipramine did appear to interfere with REM sleep recovery from the REM sleep restriction (</span><a class="workspace-trigger" data-dcnode-id="3096" href="#tbl4" name="btbl4"><span data-dcnode-id="3097" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="3095" instrument_node="">).</span></p><p data-dcnode-id="3083" id="p0185"><span data-dcnode-id="3093" instrument_node="">The absence of recovery sleep resulting from SSRI treatment was also still evident following REM sleep inhibition (</span><a class="workspace-trigger" data-dcnode-id="3091" href="#fig3" name="bfig3"><span data-dcnode-id="3092" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="3090" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3088" href="#fig4" name="bfig4"><span data-dcnode-id="3089" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="3087" instrument_node="">E). During the 12–48&nbsp;h analysis time period there was no significant recovery in REM sleep as a result of paroxetine treatment. In contrast, recovery REM sleep following imipramine treatment combined additively with the recovery elicited by prior REM inhibition (</span><a class="workspace-trigger" data-dcnode-id="3085" href="#fig5" name="bfig5"><span data-dcnode-id="3086" instrument_node="">Fig.&nbsp;5</span></a><span data-dcnode-id="3084" instrument_node="">E). These results show that firstly REM sleep inhibition by the citalopram or paroxetine was unaltered by the presence of REM sleep pressure and secondly that citalopram had no impact upon the recovery of REM sleep following physiological REM restriction.</span></p><p data-dcnode-id="3078" id="p0190"><span data-dcnode-id="3082" instrument_node="">The recovery rates following the combination of both REM sleep restriction and citalopram administration remained similar to both citalopram and REM sleep restriction groups (</span><a class="workspace-trigger" data-dcnode-id="3080" href="#tbl1" name="btbl1"><span data-dcnode-id="3081" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="3079" instrument_node="">). In contrast, paroxetine administered following REM sleep restriction, elicited a recovery rate that was greater than paroxetine alone but not different to that of the REM sleep restriction group. Imipramine had the clearest effect on the recovery rate constant. When administered following REM sleep restriction, imipramine further increased the REM deficit but complete recovery was still achieved albeit at a faster rate.</span></p></section><section data-dcnode-id="3043" id="sec3.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3071" id="sectitle0095a"><span data-dcnode-id="3076" instrument_node="">3.4</span><span data-dcnode-id="3074" instrument_node="">. </span><span data-dcnode-id="3072" instrument_node="">Acute effects of antidepressants on NREM sleep time under baseline conditions and in the presence of increased REM sleep pressure.</span></h3><p data-dcnode-id="3060" id="p0200"><span data-dcnode-id="3070" instrument_node="">There were minimal effects of either REM sleep restriction or citalopram on NREM sleep time. Without prior REM sleep restriction, citalopram did not alter NREM sleep duration, relative to vehicle controls when given at ZT-8 (</span><a class="workspace-trigger" data-dcnode-id="3068" href="#appsec1" name="bappsec1"><span data-dcnode-id="3069" instrument_node="">Supplementary Fig.&nbsp;2</span></a><span data-dcnode-id="3067" instrument_node="">A). In this experiment, EEG-driven feedback REM sleep restriction caused a 10&nbsp;±&nbsp;4% reduction of the NREM sleep prior to drug treatment. NREM sleep continuity was unaltered by citalopram treatment (</span><a class="workspace-trigger" data-dcnode-id="3065" href="#appsec1" name="bappsec1"><span data-dcnode-id="3066" instrument_node="">Supplementary Fig.&nbsp;2</span></a><span data-dcnode-id="3064" instrument_node="">B). Relative to the loss of NREM during the sleep restriction, a slight overshoot in the recovery of NREM sleep occurred in the vehicle treated group, but NREM sleep time was fully compensated in the citalopram treated group (</span><a class="workspace-trigger" data-dcnode-id="3062" href="#appsec1" name="bappsec1"><span data-dcnode-id="3063" instrument_node="">Supplementary Fig.&nbsp;2</span></a><span data-dcnode-id="3061" instrument_node="">C).</span></p><p data-dcnode-id="3052" id="p0205"><span data-dcnode-id="3059" instrument_node="">Paroxetine treatment at ZT-8 also did not alter NREM sleep time or continuity, either when dosed alone or following REM sleep restriction (</span><a class="workspace-trigger" data-dcnode-id="3057" href="#appsec1" name="bappsec1"><span data-dcnode-id="3058" instrument_node="">Supplementary Figs. 3</span></a><span data-dcnode-id="3056" instrument_node="">A and B). However, the recovery of lost NREM sleep up to 36&nbsp;h post treatment, which was unaltered by the addition of paroxetine, showed full compensation of that lost during the REM-sleep restriction (</span><a class="workspace-trigger" data-dcnode-id="3054" href="#appsec1" name="bappsec1"><span data-dcnode-id="3055" instrument_node="">Supplementary Fig.&nbsp;3</span></a><span data-dcnode-id="3053" instrument_node="">C).</span></p><p data-dcnode-id="3044" id="p0210"><span data-dcnode-id="3051" instrument_node="">In addition to REM sleep inhibition, imipramine also reduced NREM sleep time (</span><a class="workspace-trigger" data-dcnode-id="3049" href="#appsec1" name="bappsec1"><span data-dcnode-id="3050" instrument_node="">Supplementary Fig.&nbsp;4</span></a><span data-dcnode-id="3048" instrument_node="">). Relative to vehicle controls, imipramine induced a total loss of 16.8&nbsp;±&nbsp;3.0&nbsp;min, which was 16.2&nbsp;±&nbsp;2.9% of the equivalent baseline period, when dosed at ZT-8. Following REM sleep restriction this NREM sleep reduction did not occur, resulting in an interaction effect between the treatments (−14.6&nbsp;±&nbsp;4.4, ANCOVA, </span><em data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">p</span></em><span data-dcnode-id="3045" instrument_node="">&nbsp;=&nbsp;0.002). Finally, recovery of lost NREM sleep resulting from imipramine was not recovered up to 36&nbsp;h post treatment, whereas the loss resulting from REM sleep restriction was fully compensated.</span></p></section></section><section data-dcnode-id="2926" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3036" id="sectitle0095"><span data-dcnode-id="3041" instrument_node="">4</span><span data-dcnode-id="3039" instrument_node="">. </span><span data-dcnode-id="3037" instrument_node="">Discussion</span></h2><p data-dcnode-id="3034" id="p0215"><span data-dcnode-id="3035" instrument_node="">This study shows for the first time that the inhibition of manifest REM sleep by SSRI antidepressants occurs without augmenting or impairing compensatory REM sleep following EEG-driven physiological REM sleep restriction. In contrast, an equivalent level of REM inhibition induced by the TCA imipramine showed complete recovery adding to the compensatory response to prior REM sleep restriction.</span></p><section data-dcnode-id="3016" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3028" id="sectitle0100"><span data-dcnode-id="3033" instrument_node="">4.1</span><span data-dcnode-id="3031" instrument_node="">. </span><span data-dcnode-id="3029" instrument_node="">Homeostatic recovery of REM sleep time following REM sleep restriction</span></h3><p data-dcnode-id="3017" id="p0220"><span data-dcnode-id="3027" instrument_node="">The recovery of REM sleep across the range of 5, 8 and 10&nbsp;h of REM sleep restrictions demonstrates the homeostatic regulation of REM sleep in rodents. The existence of REM sleep homeostasis, particularly in human studies, has been questioned due to a lack of significant recovery relative to the quantity of REM sleep (</span><a class="workspace-trigger" data-dcnode-id="3025" href="#bib7" name="bbib7"><span data-dcnode-id="3026" instrument_node="">Endo et&nbsp;al., 1998</span></a><span data-dcnode-id="3024" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="3022" href="#bib34" name="bbib34"><span data-dcnode-id="3023" instrument_node="">Werth et&nbsp;al., 2002</span></a><span data-dcnode-id="3021" instrument_node="">). However, in these studies recording time was often limited, in contrast to the present study. The current study found that, in male Wistar rats, REM sleep returned to a theoretical set point in accordance with previous studies in which the dynamics of this recovery were evaluated as an exponential decay process (</span><a class="workspace-trigger" data-dcnode-id="3019" href="#bib28" name="bbib28"><span data-dcnode-id="3020" instrument_node="">Stephenson et&nbsp;al., 2015</span></a><span data-dcnode-id="3018" instrument_node="">). Overall these recovery data and the increased REM sleep attempts throughout the physiological REM sleep restriction period show that, under physiological conditions, REM sleep duration is tightly regulated through homeostatic mechanisms.</span></p></section><section data-dcnode-id="2998" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="3010" id="sectitle0105"><span data-dcnode-id="3015" instrument_node="">4.2</span><span data-dcnode-id="3013" instrument_node="">. </span><span data-dcnode-id="3011" instrument_node="">Acute suppression of time spent in REM sleep following antidepressant treatment</span></h3><p data-dcnode-id="2999" id="p0225"><span data-dcnode-id="3009" instrument_node="">The loss of REM sleep induced by the three antidepressant was similar to that reported in previous studies in rats (</span><a class="workspace-trigger" data-dcnode-id="3007" href="#bib38" name="bbib38"><span data-dcnode-id="3008" instrument_node="">Ivarsson et&nbsp;al., 2005</span></a><span data-dcnode-id="3006" instrument_node="">) and humans (</span><a class="workspace-trigger" data-dcnode-id="3004" href="#bib35" name="bbib35"><span data-dcnode-id="3005" instrument_node="">Wilson et&nbsp;al., 2004</span></a><span data-dcnode-id="3003" instrument_node="">). Acute REM sleep suppression induced by antidepressants was not significantly affected by prior physiological REM sleep restriction and we conclude that acute drug-induced suppression of REM sleep was independent of REM sleep pressure. A previous study that combined REM sleep restriction with the SSRI, escitalopram, also concluded that prior REM sleep restriction did not significantly alter the REM sleep inhibition effect of the compound (</span><a class="workspace-trigger" data-dcnode-id="3001" href="#bib12" name="bbib12"><span data-dcnode-id="3002" instrument_node="">Kátai et&nbsp;al., 2013</span></a><span data-dcnode-id="3000" instrument_node="">). However, REM sleep recovery was only observed over the first 3&nbsp;h of the recovery period and significant REM sleep homeostatic recovery was unlikely to have occurred relative to the deficit of a 72&nbsp;h sleep restriction.</span></p></section><section data-dcnode-id="2978" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2992" id="sectitle0110"><span data-dcnode-id="2997" instrument_node="">4.3</span><span data-dcnode-id="2995" instrument_node="">. </span><span data-dcnode-id="2993" instrument_node="">Homeostatic recovery of REM sleep time following acute antidepressant treatment</span></h3><p data-dcnode-id="2981" id="p0230"><span data-dcnode-id="2991" instrument_node="">We monitored REM sleep for at least 28&nbsp;h following dosing, which is beyond the expected action of the drugs: citalopram and paroxetine have half-lives of approximately 3.7&nbsp;h, and 2.2&nbsp;h (unpublished Lilly data) respectively and imipramine has a half-life of 2.5&nbsp;h (</span><a class="workspace-trigger" data-dcnode-id="2989" href="#bib6" name="bbib6"><span data-dcnode-id="2990" instrument_node="">Dingell et&nbsp;al., 1964</span></a><span data-dcnode-id="2988" instrument_node="">) in male Wistar rats. Administration of citalopram and paroxetine induced a REM sleep deficit that was not recovered over the following 28&nbsp;h. Directly comparable data are not reported for humans, although in a single dose study of another SSRI (60&nbsp;mg fluoxetine) in healthy volunteers, it was reported that despite an acute suppression of REM sleep in the first night, no significant rebound of REM sleep was observed for the following three nights (</span><a class="workspace-trigger" data-dcnode-id="2986" href="#bib8" name="bbib8"><span data-dcnode-id="2987" instrument_node="">Feige et&nbsp;al., 2002</span></a><span data-dcnode-id="2985" instrument_node="">). In rats, </span><a class="workspace-trigger" data-dcnode-id="2983" href="#bib2" name="bbib2"><span data-dcnode-id="2984" instrument_node="">Benington and Heller (1995)</span></a><span data-dcnode-id="2982" instrument_node=""> have also reported that ritanserin, a serotonin receptor antagonist, and quinuclydinyl benzilate (QNB), a cholinergic agonist, suppress REM sleep without a compensatory rebound.</span></p><p data-dcnode-id="2979" id="p0235"><span data-dcnode-id="2980" instrument_node="">Although a certain level of tolerance for lost REM sleep may exist following pharmacological treatment, equivalent physiological REM sleep inhibition showed a distinct rebound of REM sleep. A full recovery of the REM sleep deficit occurred following acute imipramine administration without prior REM sleep restriction, suggesting that in contrast to SSRIs, imipramine-induced REM sleep inhibition increases REM sleep homeostatic pressure, similar to REM sleep restriction. However, modelling of the recovery process following imipramine administration showed a significantly slower recovery rate relative to physiological REM sleep restriction.</span></p></section><section data-dcnode-id="2963" id="sec4.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2972" id="sectitle0115"><span data-dcnode-id="2977" instrument_node="">4.4</span><span data-dcnode-id="2975" instrument_node="">. </span><span data-dcnode-id="2973" instrument_node="">Homeostatic recovery of REM sleep following the combination of selective REM sleep restriction and antidepressant treatment</span></h3><p data-dcnode-id="2964" id="p0240"><span data-dcnode-id="2971" instrument_node="">Compensatory rebound following physiological sleep restriction remained similar even in the presence of SSRI antidepressant treatments. Furthermore, the additional loss of REM sleep induced by the SSRIs was not recovered throughout the recording period and the recovery rate constant remained unchanged despite the additional sleep pressure. Studies, using the ‘flower pot’ method to induce selective REM sleep deprivation, paired with es-citalopram treatment have previously been reported, although interactions between the treatments on REM sleep recovery were not extensively examined (</span><a class="workspace-trigger" data-dcnode-id="2969" href="#bib17" name="bbib17"><span data-dcnode-id="2970" instrument_node="">Maudhuit et&nbsp;al., 1996</span></a><span data-dcnode-id="2968" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2966" href="#bib22" name="bbib22"><span data-dcnode-id="2967" instrument_node="">Prevot et&nbsp;al., 1996</span></a><span data-dcnode-id="2965" instrument_node="">). Based on our data, we propose that the mechanisms by which SSRIs inhibit REM sleep are not tracked by the REM sleep homeostatic process. In contrast, when imipramine was paired with prior REM sleep restriction, the recovery of both pharmacological and physiological REM sleep loss coincided, resulting in the recovery of all REM sleep lost.</span></p></section><section data-dcnode-id="2941" id="sec4.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2957" id="sectitle0120"><span data-dcnode-id="2962" instrument_node="">4.5</span><span data-dcnode-id="2960" instrument_node="">. </span><span data-dcnode-id="2958" instrument_node="">Pharmacological mechanisms of REM sleep regulation</span></h3><p data-dcnode-id="2955" id="p0245"><span data-dcnode-id="2956" instrument_node="">It is likely that a homeostat, distinct from that controlling NREM sleep, is responsible for maintaining the amount of REM sleep over time. Throughout physiological REM sleep restriction a deficit in REM sleep is created via an arousal, which was followed by a rebound in REM sleep after release from the physiological REM sleep restriction. However, the mechanisms by which aspects of REM sleep are controlled are not well understood and no biological substrate for the homeostat has yet been identified.</span></p><p data-dcnode-id="2950" id="p0250"><span data-dcnode-id="2954" instrument_node="">In the present study, SSRI induced REM sleep loss showed no sign of recovery and the lack or presence of REM recovery was not dose-dependent (unpublished Lilly data). Rats treated with SSRIs awaken at the transition from NREM to REM (</span><a class="workspace-trigger" data-dcnode-id="2952" href="#bib13" name="bbib13"><span data-dcnode-id="2953" instrument_node="">Kostyalik et&nbsp;al., 2014</span></a><span data-dcnode-id="2951" instrument_node="">) but SSRIs may only mask the electrophysiological signs of REM sleep in rats, such as theta power and muscle atonia whilst its function may remain intact. However, the SSRI treatments did not reduce the recovery REM sleep induced by prior physiological REM sleep deprivation. If REM sleep were masked, then this would be expected to prevent the detection of both normal REM sleep and recovery REM sleep.</span></p><p data-dcnode-id="2942" id="p0255"><span data-dcnode-id="2949" instrument_node="">These results can be placed in the context of the hypothesis proposed by Franken that initiation and maintenance of REM sleep are controlled by separate processes (</span><a class="workspace-trigger" data-dcnode-id="2947" href="#bib9" name="bbib9"><span data-dcnode-id="2948" instrument_node="">Franken, 2002</span></a><span data-dcnode-id="2946" instrument_node="">). SSRIs inhibit REM sleep by reducing NREM – REM transitions (</span><a class="workspace-trigger" data-dcnode-id="2944" href="#bib13" name="bbib13"><span data-dcnode-id="2945" instrument_node="">Kostyalik et&nbsp;al., 2014</span></a><span data-dcnode-id="2943" instrument_node="">), without altering the lengths of NREM sleep bouts. Franken proposed that REM sleep initiation is a NREM sleep-dependent sensitization process whose level rises during NREM sleep episodes. The SSRIs did not alter NREM sleep bout lengths, suggesting that the sensitization process does not occur. However, why this is the case remains unknown. Imipramine by contrast extends NREM sleep bouts, which induces greater sensitization and reduces the opportunity for REM sleep. This leads to the subsequent increase in REM sleep during the recovery period. In the present study we have not explored to what extent effects on REM sleep may be accompanied by changes in EEG slow wave activity in NREM sleep, or attempts to enter REM sleep. Further exploratory analyses are warranted given the interactions between the sleep states.</span></p></section><section data-dcnode-id="2927" id="sec4.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2935" id="sectitle0125"><span data-dcnode-id="2940" instrument_node="">4.6</span><span data-dcnode-id="2938" instrument_node="">. </span><span data-dcnode-id="2936" instrument_node="">Limitations</span></h3><p data-dcnode-id="2930" id="p0260"><span data-dcnode-id="2934" instrument_node="">Circadian factors may greatly influence the effects of pharmacological treatments as many treatments target circadian gene products (</span><a class="workspace-trigger" data-dcnode-id="2932" href="#bib37" name="bbib37"><span data-dcnode-id="2933" instrument_node="">Zhang et&nbsp;al., 2014</span></a><span data-dcnode-id="2931" instrument_node="">). In this study, the REM sleep inhibition is confounded to some degree by the timing of the light-dark cycle. There is significantly less REM sleep to inhibit during the dark phase which may mask the true extent of REM inhibition by the SSRIs. However, any REM sleep recovery would likely have been observed over the subsequent 28&nbsp;h, which was often evident during the dark phase following physiological REM sleep restriction. Further work to examine how circadian rhythmicity and the REM sleep homeostat interact may provide clues to the mechanism of REM sleep regulation. In addition to these effects, limitations in the mathematical model of REM sleep recovery were apparent once REM sleep homeostasis was blocked or strongly attenuated. Without a significant recovery, the exponential function was a poor fit to the data, leading to large errors. Furthermore, the exponential recovery model may introduce systematic discrepancies between the fitted curve and the data, as observed in the REM sleep restriction recovery of the citalopram experiment between hours 4–6. Better models of sleep recovery should be flexible enough to cope with these situations. One potential model is a power law function that could reduce the impact of selecting the initial onset recovery time upon the estimated rate of recovery.</span></p><p data-dcnode-id="2928" id="p0265"><span data-dcnode-id="2929" instrument_node="">The present findings may be relevant to potential side effects and efficacy associated with pharmacological REM sleep restriction by antidepressant treatments. We hypothesise that SSRIs do not engage the REM sleep homeostatic mechanism, which may minimise the effects of lost REM sleep. In contrast, the TCA imipramine does engage the REM sleep homeostat in a similar way to EEG-driven feedback- REM sleep restriction, which may suggest mechanism of action -based differences in which antidepressants impact sleep and potentially produce their antidepressant efficacy.</span></p></section></section><section data-dcnode-id="2921" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2924" id="sectitle0130"><span data-dcnode-id="2925" instrument_node="">Conflict of interest statement</span></h2><p data-dcnode-id="2922" id="p0270"><span data-dcnode-id="2923" instrument_node="">The authors declare no conflicts of interest in this research.</span></p></section><section data-dcnode-id="2895" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2919" id="sectitle0135"><span data-dcnode-id="2920" instrument_node="">Contributions</span></h2><p data-dcnode-id="2915" id="p0275"><em data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Andrew McCarthy</span></em><span data-dcnode-id="2916" instrument_node=""> was involved in study design and interpretation, EEG and data analysis, and contributed to writing the manuscript.</span></p><p data-dcnode-id="2911" id="p0280"><em data-dcnode-id="2913"><span data-dcnode-id="2914" instrument_node="">Keith Wafford</span></em><span data-dcnode-id="2912" instrument_node="">, was involved in study design and interpretation and contributed to writing the manuscript.</span></p><p data-dcnode-id="2904" id="p0285"><em data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Elaine Shanks</span></em><span data-dcnode-id="2908" instrument_node=""> and </span><em data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">Marcin Ligocki</span></em><span data-dcnode-id="2905" instrument_node node-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960894X19304251" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="353" id="citing-articles-article0-title"><span data-dcnode-id="354" instrument_node="">Sleep modulating agents</span></h3></a><div class="article-source ellipsis" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">2019, Bioorganic and Medicinal Chemistry Letters</span></div><div class="CitedSection" data-dcnode-id="344"><div class="snippet" data-dcnode-id="345"><div class="cite-header" data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The elimination half-life of fluoxetine is approximately one to four days with its metabolite, norfluoxetine, possessing a half-life of seven to fifteen days.134 Of note, SSRI antidepressants have been shown to suppress REM sleep and narcolepsy type 1 can be considered a sleep disorder where inappropriate switching between wake and REM sleep occurs.135,136 Histamine levels have long been associated with sleep and wakefulness, mainly through the well-studied H1 and H2 receptors.137</span></p></div></div></div><div class="buttons" data-dcnode-id="337"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="338" type="button"><span class="button-link-text" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="339" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="340"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="332"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="333" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="334"><p data-dcnode-id="335" id="sp0010"><span data-dcnode-id="336" instrument_node="">Sleep and wake are two fundamental states of human existence. Conditions such as insomnia and hypersomnia can have profound negative effects on human health. Many pharmacological interventions impacting sleep and wake are available or are under development. This brief digest surveys early approaches to sleep modulation and highlights recent developments in sleep modulating agents.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="307"><div class="sub-heading" data-dcnode-id="325"><a data-dcnode-id="328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128133231000104" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="329" id="citing-articles-article1-title"><span data-dcnode-id="330" instrument_node="">Serotonin and sleep</span></h3></a><div class="article-source ellipsis" data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">2019, The Serotonin System: History, Neuropharmacology, and Pathology</span></div></div><div class="buttons" data-dcnode-id="319"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="320" type="button"><span class="button-link-text" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="321" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="322"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="308"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="309" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="310"><p data-dcnode-id="311" id="sp0010"><span data-dcnode-id="318" instrument_node="">The modulation of sleep states has long been associated with serotonergic activity since it was noted that arousal closely correlates with the firing rate of dorsal raphe neurons. The pharmacological tools for investigating serotonin metabolism became more selective with respect to affinity for the many subtypes of serotonin receptor. The most commonly used serotoninergic drugs, the SSRIs, have been found to strongly suppress rapid eye movement (REM) sleep. The injection of serotonin into the cat lateral ventricle elicited first arousal followed by prolonged synchronous discharges characteristic of slow-wave sleep. Injecting serotonin toxins showed a reduction in sleep in parallel with the reduction in serotonin content. The depletion of serotonin using para chlorophenyl alanine also markedly reduced sleep, which is readily reversed by administration of 5-hydroxytryptophan. In contrast the indoleamine melatonin can ameliorate sleep disturbance. Compounds with high affinity for the 5-HT2A receptor increase slow-wave sleep in both man and animals. The supracuprachiasmatic nucleus in the hypothalamus functions as a master circadian pacemaker. Mutant fruit files have demonstrated that circadian rhythms are heritable, some strains being arrhythmic, while others showing periodicity in excess of 24 hours. These observations gave rise to the concept of the existence of clock genes with the hypothetical master gene termed </span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Period</span></em><span data-dcnode-id="315" instrument_node="">. An antibody to period has been obtained, which showed that there was a 24 hours cycling in the amount of period protein expressed. </span><em data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Period</span></em><span data-dcnode-id="312" instrument_node=""> is a nuclear protein which shuttles between the cell nucleus and cytoplasm in a temporally regulated manner which is abolished in the timeless mutant. It has been suggested that melatonin secreted from the pineal gland serves as a temporal feedback on the oscillator since the suprachiasmatic nucleus regulating circadian phase and maintaining rhythm stability. Compounds with affinity and selectivity for 5-HT6 and 5-HT7 receptors are prime candidates for influencing sleep. 5-HT7 is strongly expressed in the suprachiasmatic nucleus and an agonist action at the receptor increases wakefulness and reduces REM sleep. The selective 5-HT6 receptor antagonist Ro4368554 reduces sleep latency and wakefulness. It is surely significant that there is a very strong relationship between sleep disturbance and depression with 50%–60% of young adults with depression having sleep disturbance perhaps linking serotonin to the underlying the antidepressant effects of sleep deprivation. Sleep electrosomnography is a key tool in the clinical profiling of any new serotonergic compound.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="283"><div class="sub-heading" data-dcnode-id="295"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128137437000177" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="305" id="citing-articles-article2-title"><span data-dcnode-id="306" instrument_node="">Functions and Circuits of REM Sleep</span></h3></a><div class="article-source ellipsis" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">2019, Handbook of Behavioral Neuroscience</span></div><div class="CitedSection" data-dcnode-id="296"><div class="snippet" data-dcnode-id="297"><div class="cite-header" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Historically, cholinergic pedunculopontine tegmental (PPT) and laterodorsal tegmental (LDT) neurons were thought to generate REM sleep, whereas monoaminergic nuclei, including the noradrenergic locus coeruleus and the serotonergic dorsal raphe nucleus, were considered as REM-suppressing nuclei (Scammell, Arrigoni, &amp; Lipton, 2017). Accordingly, serotonin and noradrenaline inhibit cholinergic neurons in the PPT/LDT (Crochet &amp; Sakai, 1999), and antidepressant drugs that enhance monoamine signaling often suppress REM sleep (McCarthy et al., 2016). On the other hand, cholinergic PPT/LDT neurons initiate firing just before a transition from NREM sleep into wakefulness or REM sleep (Boucetta et al., 2014).</span></p></div></div></div><div class="buttons" data-dcnode-id="289"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="290" type="button"><span class="button-link-text" data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="291" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="292"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="284"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="285" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="286"><p data-dcnode-id="287" id="sp0020"><span data-dcnode-id="288" instrument_node="">Ever since its discovery by Aserinsky and Kleitman in 1953, the quest to understand the function of rapid eye movement (REM) sleep has inspired researchers. Experimental evidence implicates both nonrapid eye movement (NREM) and REM sleep in learning and memory consolidation, although the underlying mechanisms remain unclear. It was suggested that REM sleep might provide a neural environment supporting processes essential to learning and cognition, including synaptic remodeling mechanisms such as long-term potentiation (LTP) and depotentiation or synaptic pruning of spines formed during previous wakefulness. Furthermore, the hypothesis “Sleep to remember, sleep to forget” posits that NREM sleep is important for the consolidation of newly formed memories, whereas the REM sleep state eliminates dispensable spines, thereby improving the signal-to-noise ratio in neural networks, the latter process often being referred to as an “unlearning” process that helps stabilize newly formed synapses and memories. In humans, REM sleep has frequently been associated with dreaming, which led to the hypothesis that REM sleep is important for the reactivation of emotional events that occurred during the previous waking period. Accordingly, the reactivation of brain regions linked to emotion regulation has been suggested to facilitate the consolidation of newly formed memories. Finally, the abundance of REM sleep during perinatal periods has supported the idea that REM sleep provides a context during which the development of neural circuits is facilitated.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="272"><div class="sub-heading" data-dcnode-id="277"><a data-dcnode-id="280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1038/s41398-022-01846-9" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="281" id="citing-articles-article3-title"><span data-dcnode-id="282" instrument_node="">Psilocin acutely alters sleep-wake architecture and cortical brain activity in laboratory mice</span></h3></a><div class="article-source ellipsis" data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">2022, Translational Psychiatry</span></div></div><div class="buttons" data-dcnode-id="276"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="273"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="274" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="275"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="261"><div class="sub-heading" data-dcnode-id="266"><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1007/s11325-021-02390-4" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="270" id="citing-articles-article4-title"><span data-dcnode-id="271" instrument_node="">Comorbidity clusters in patients with moderate-to-severe OSA</span></h3></a><div class="article-source ellipsis" data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">2022, Sleep and Breathing</span></div></div><div class="buttons" data-dcnode-id="265"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="262"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="263" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="264"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="255"><a data-dcnode-id="258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.3389/fpsyt.2021.648713" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="259" id="citing-articles-article5-title"><span data-dcnode-id="260" instrument_node="">Electroencephalographic Pa
