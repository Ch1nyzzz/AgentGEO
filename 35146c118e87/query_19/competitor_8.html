</span><h2 data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Begin your journey to a fuller understanding of consciousness</span></h2><span data-dcnode-id="2183" instrument_node="">
</span><h3 data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Gain a new appreciation for your most amazing superpower</span></h3><span data-dcnode-id="2180" instrument_node="">
</span><hr data-dcnode-id="2179"><span data-dcnode-id="2178" instrument_node="">
</span><div class="custom-theme" data-dcnode-id="2169"><div class="fr-view" data-dcnode-id="2170"><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2175" id="isPasted"><span data-dcnode-id="2176" instrument_node="">For more than 2000 years, great minds have struggled to understand consciousness. We’re finally inching towards an explanation, which makes this the perfect time to take this neuroscience course focusing on the world’s deepest mystery: exactly how can the human brain conjure up our unique subjective experiences?</span></p><span data-dcnode-id="2174" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">During this online course you will learn about the deep history of research into consciousness and unconsciousness, and see how philosophers such as Rene Descartes posed questions that are still taxing cognitive scientists today. You’ll also learn how the modern tools of neuroscience are bringing us closer than ever before to understanding the neural basis of consciousness.</span></p><span data-dcnode-id="2171" instrument_node="">

</span><li data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">The history and philosophy of consciousness</span></li><span data-dcnode-id="2084" instrument_node="">

</span><div class="Grid__Row Grid__Row--Center" data-dcnode-id="2025"><span data-dcnode-id="2051" instrument_node="">

</span><h3 data-dcnode-id="2047"><span data-dcnode-id="2048" instrument_node="">Who is this course suitable for?</span></h3><span data-dcnode-id="2046" instrument_node="">
</span><div class="custom-theme" data-dcnode-id="2031"><div class="fr-view" data-dcnode-id="2032"><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">This course is for anyone who has ever wondered why and how we are conscious, and who is eager to know about the ingenious experiments that are bringing scientists closer than ever to answering the mystery.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">You may be curious to understand how modern empirical science can study a phenomenon that is so central to our lives but still seems strangely detached from our physical bodies.</span></p><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">Alternatively, you might approach the course from the world of science fiction, with an active interest in whether efforts to understand consciousness will ever result in conscious machines.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Some course participants might also be considering taking a university degree course in neuroscience, philosophy or physics, and want a flavour of how a profound subject like consciousness is relevant to all three academic disciplines. The CPD accreditation that you achieve upon completion will add klout to your application.</span></p><span data-dcnode-id="2033" instrument_node="">

</span><p data-dcnode-id="1981" style="display: block;"><span data-dcnode-id="1982" instrument_node="">Anil Seth is a professor of cognitive and computational neuroscience at the University of Sussex. Anil’s research seeks to understand the biological basis of consciousness by bringing together research across neuroscience, mathematics, computer science, psychology, philosophy and psychiatry.
</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">
As a co-director of the Sackler Centre for Consciousness Science, his work contributes to the centre’s aim of translating an enhanced understanding of the complex brain networks underpinning consciousness into new clinical approaches to psychiatric disorders, and to drive new developments in artificial intelligence and virtual reality. 
</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">
Anil contributes to a variety of media including New Scientist, The Guardian and the BBC . He was a consultant for Eye Benders, winner of the Royal Society Young People’s Book Prize in 2014 and he writes the blog NeuroBanter. His latest book, Being You: The Inside Story of Your Inner Universe, was published in 2021.</span></p><span data-dcnode-id="1974" instrument_node="">

</span><p data-dcnode-id="1943" style="display: block;"><span data-dcnode-id="1944" instrument_node="">Nicola Clayton is a psychologist and professor of comparative cognition at the University of Cambridge. She is also science in residence at British dance company Rambert, and collaborates with Clive Wilkins, who is Artist in Residence in the Psychology Department at the University of Cambridge. 
</span></p><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">
Nicola studies the development and evolution of cognition in members of the crow family and humans. She contributes to media including New Scientist, and her work has been showcased in several television documentaries. 
</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">

</span><p data-dcnode-id="1911"><span data-dcnode-id="1915" instrument_node="">
</span><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Chief scientist and President of the Allen Institute for Brain Science, Seattle, Washington</span></strong><span data-dcnode-id="1912" instrument_node="">

</span><div class="ExpertBios__ExpertDescription" data-dcnode-id="1897"><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905" style="display: block;"><span data-dcnode-id="1906" instrument_node="">Christof Koch is the Chief Scientist and president of the Allen Institute for Brain Science, where he is particularly interested in the study or neurons. 
</span></p><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">
Earlier in his career, working in collaboration with Nobel laureate Francis Crick – a co-discoverer of the helical structure of DNA – Christof initiated the modern search for the neuronal correlates of consciousness. More recently, in collaboration with Giulio Tononi, he co-developed the Integrated Information Theory of consciousness.
</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">
Christof has written many peer-reviewed research papers; his writing has also appeared in publications including Scientific American and New Scientist. He is the author of Consciousness: Confessions of a Romantic Reductionist published in 2012, and The Feeling of Life Itself: Why Consciousness Is Widespread but Can't Be Computed published in 2019.</span></p><span data-dcnode-id="1898" instrument_node="">

</span><p data-dcnode-id="1867" style="display: block;"><span data-dcnode-id="1868" instrument_node="">David Robson is a science writer and author specialising in neuroscience and psychology. A graduate of Cambridge University, he has worked as an editor at New Scientist and a senior journalist at the BBC. His writing has appeared in The Guardian, The Atlantic, The Psychologist, and many other publications.
</span></p><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">
