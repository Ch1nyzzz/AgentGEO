x)" srcset="https://static.scientificamerican.com/sciam/cache/file/9686D4FA-A9E0-4E47-AE9CF4D9D4B68E30_source.jpg?w=690&amp;h=930&amp;56C01425-2B7C-4E33-90334FB8BBC7FFC5"><source data-dcnode-id="439" media="(max-width: 767px)" srcset="https://static.scientificamerican.com/sciam/cache/file/9686D4FA-A9E0-4E47-AE9CF4D9D4B68E30_source.jpg?w=390&amp;h=520&amp;56C01425-2B7C-4E33-90334FB8BBC7FFC5"><source data-dcnode-id="438" media="(min-width: 768px) and (max-width: 1023px)" srcset="https://static.scientificamerican.com/sciam/cache/file/9686D4FA-A9E0-4E47-AE9CF4D9D4B68E30_source.jpg?w=690&amp;h=930&amp;56C01425-2B7C-4E33-90334FB8BBC7FFC5"><source data-dcnode-id="437" media="(max-width: 767px)" srcset="https://static.scientificamerican.com/sciam/cache/file/9686D4FA-A9E0-4E47-AE9CF4D9D4B68E30_source.jpg?w=390&amp;h=520&amp;56C01425-2B7C-4E33-90334FB8BBC7FFC5"><img alt="The Science Behind Dreaming" border="0" data-dcnode-id="436" importance="high" itemprop="url" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.scientificamerican.com/sciam/cache/file/9686D4FA-A9E0-4E47-AE9CF4D9D4B68E30_source.jpg%3Fw%3D590%26h%3D800%2656C01425-2B7C-4E33-90334FB8BBC7FFC5&amp;raw"></picture></div><figcaption class="t_caption" data-dcnode-id="430" itemprop="caption description"><span data-dcnode-id="433" instrument_node=""> Credit: </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gettyimages.com/detail/photo/do-not-disturb-royalty-free-image/1058385764" target="_blank"><span data-dcnode-id="432" instrument_node="">Getty Images</span></a></figcaption></figure><figure class="aside-banner medium-up-hide" data-dcnode-id="424"><div data-dcnode-id="427" id="dfp-right-article-mobile"><div data-behavior="dfp" data-dcnode-id="428" data-dfp-adcontainer="dfp-right-article-mobile" data-dfp-adname="right" data-dfp-mobileonly="mobile" data-dfp-positionname="MPU1"></div></div><figcaption class="aside-banner__label" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Advertisement</span></figcaption></figure><div class="article-block article-text" data-behavior="newsletter_promo dfp_article_rendering" data-dcnode-id="337" data-dfp-adword="Advertisement" data-newsletterpromo_article-button-link="https://www.scientificamerican.com/page/newsletter-sign-up/?origincode=2018_sciam_ArticlePromo_NewsletterSignUp" data-newsletterpromo_article-button-text="Sign Up" data-newsletterpromo_article-image="https://static.scientificamerican.com/sciam/cache/file/4641809D-B8F1-41A3-9E5A87C21ADB2FD8_source.png" data-newsletterpromo_article-text="<p>Sign up for <em>Scientific American</em>&amp;rsquo;s free newsletters.</p>" itemprop="articleBody" name="articleBody"><div class="mura-region mura-region-loose" data-dcnode-id="338"><span data-dcnode-id="423" instrument_node="">
</span><div class="mura-region-local" data-dcnode-id="340"><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">For centuries people have pondered the meaning of dreams. Early civilizations thought of dreams as a medium between our earthly world and that of the gods. In fact, the Greeks and Romans were convinced that dreams had certain prophetic powers. While there has always been a great interest in the interpretation of human dreams, it wasn’t until the end of the nineteenth century that Sigmund Freud and Carl Jung put forth some of the most widely-known modern theories of dreaming. Freud’s theory centred around the notion of repressed longing -- the idea that dreaming allows us to sort through unresolved, repressed wishes. Carl Jung (who studied under Freud) also believed that dreams had psychological importance, but proposed different theories about their meaning.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="419" instrument_node="">Since then, technological advancements have allowed for the development of other theories. One prominent neurobiological theory of dreaming is the “activation-synthesis hypothesis,” which states that dreams don’t actually mean anything: they are merely electrical brain impulses that pull random thoughts and imagery from our memories. Humans, the theory goes, construct dream stories after they wake up, in a natural attempt to make sense of it all. Yet, given the vast documentation of realistic aspects to human dreaming as well as indirect experimental </span><a data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sciencedirect.com/science/article/pii/S1053810003000199"><span data-dcnode-id="418" instrument_node="">evidence</span></a><span data-dcnode-id="416" instrument_node=""> that other mammals such as cats also dream, evolutionary psychologists have theorized that dreaming really does serve a purpose. In particular, the “threat simulation theory” suggests that dreaming should be seen as an ancient biological defence mechanism that provided an evolutionary advantage because of&nbsp; its capacity to repeatedly simulate potential threatening events – enhancing the neuro-cognitive mechanisms required for efficient threat perception and avoidance.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">So, over the years, numerous theories have been put forth in an attempt to illuminate the mystery behind human dreams, but, until recently, strong tangible evidence has remained largely elusive.</span></p><span data-dcnode-id="411" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="410" instrument_node="">Yet, new </span><a data-dcnode-id="408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jneurosci.org/content/31/18/6674.abstract"><span data-dcnode-id="409" instrument_node="">research</span></a><span data-dcnode-id="407" instrument_node=""> published in the Journal of Neuroscience provides compelling insights into the mechanisms that underlie dreaming and the strong relationship our dreams have with our memories. Cristina Marzano and her colleagues at the University of Rome have succeeded, for the first time, in explaining how humans remember their dreams. The scientists predicted the likelihood of successful dream recall based on a signature pattern of brain waves. In order to do this, the Italian research team invited 65 students to spend two consecutive nights in their research laboratory.</span></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">During the first night, the students were left to sleep, allowing them to get used to the sound-proofed and temperature-controlled rooms. During the second night the researchers measured the student’s brain waves while they slept. Our brain experiences four types of electrical brain waves: “delta,” “theta,” “alpha,” and “beta.” Each represents a different speed of oscillating electrical voltages and together they form the electroencephalography (EEG). The Italian research team used this technology to measure the participant’s brain waves during various sleep-stages. (There are five stages of sleep; most dreaming and our most intense dreams occur during the REM stage.) The students were woken at various times and asked to fill out a diary detailing whether or not they dreamt, how often they dreamt and whether they could remember the content of their dreams.</span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">While previous </span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dreamscience.ca/en/documents/publications/_2000_Nielsen_BBS_23_851-866_c-rem.pdf"><span data-dcnode-id="400" instrument_node="">studies</span></a><span data-dcnode-id="398" instrument_node=""> have already indicated that people are more likely to remember their dreams when woken directly after REM sleep, the current study explains why. Those participants who exhibited more low frequency theta waves in the frontal lobes were also more likely to remember their dreams.</span></p><span data-dcnode-id="396" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">This finding is interesting because the increased frontal theta activity the researchers observed looks just like the successful encoding and retrieval of autobiographical memories seen while we are awake. That is, it is the same electrical oscillations in the frontal cortex that make the recollection of episodic memories (e.g., things that happened to you) possible. Thus, these findings suggest that the neurophysiological mechanisms that we employ while dreaming (and recalling dreams) are the same as when we construct and retrieve memories while we are awake.</span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="392" instrument_node="">In another recent </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1002/hbm.21120/abstract"><span data-dcnode-id="391" instrument_node="">study</span></a><span data-dcnode-id="389" instrument_node=""> conducted by the same research team, the authors used the latest MRI techniques to investigate the relation between dreaming and the role of deep-brain structures. In their study, the researchers found that vivid, bizarre and emotionally intense dreams (the dreams that people usually remember) are linked to parts of the amygdala and hippocampus. While the amygdala plays a primary role in the processing and memory of emotional reactions, the hippocampus has been implicated in important memory functions, such as the consolidation of information from short-term to long-term memory.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="379"><span data-dcnode-id="386" instrument_node="">The proposed link between our dreams and emotions is also highlighted in another recent </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//walkerlab.berkeley.edu/reprints/Gujar-Walker_CC_2011.pdf"><span data-dcnode-id="385" instrument_node="">study</span></a><span data-dcnode-id="383" instrument_node=""> published by Matthew Walker and colleagues at the Sleep and Neuroimaging Lab at UC Berkeley, who found that a reduction in REM sleep (or less “dreaming”) influences our ability to understand complex emotions in daily life – an essential feature of human social functioning.&nbsp; Scientists have also </span><a data-dcnode-id="381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1002/ana.20246/abstract"><span data-dcnode-id="382" instrument_node="">recently</span></a><span data-dcnode-id="380" instrument_node=""> identified where dreaming is likely to occur in the brain.&nbsp; A very rare clinical condition known as “Charcot-Wilbrand Syndrome” has been known to cause (among other neurological symptoms) loss of the ability to dream.&nbsp; However, it was not until a few years ago that a patient reported to have lost her ability to dream while having virtually no other permanent neurological symptoms. The patient suffered a lesion in a part of the brain known as the right inferior lingual gyrus (located in the visual cortex). Thus, we know that dreams are generated in, or transmitted through this particular area of the brain, which is associated with visual processing, emotion and visual memories.</span></p><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Taken together, these recent findings tell an important story about the underlying mechanism and possible purpose of dreaming.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Dreams seem to help us process emotions by encoding and constructing memories of them. What we see and experience in our dreams might not necessarily be real, but the emotions attached to these experiences certainly are. Our dream stories essentially try to strip the emotion out of a certain experience by creating a memory of it. This way, the emotion itself is no longer active.&nbsp; This mechanism fulfils an important role because when we don’t process our emotions, especially negative ones, this increases personal worry and anxiety. In fact, severe REM sleep-deprivation is increasingly correlated to the development of mental disorders. In short, dreams help regulate traffic on that fragile bridge which connects our experiences with our emotions and memories.</span></p><figure class="newsletter-promo container" data-dcnode-id="348"><span data-dcnode-id="372" instrument_node="">
