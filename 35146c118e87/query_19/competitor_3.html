</span><div class="c-article-body u-clearfix" data-dcnode-id="1525"><span data-dcnode-id="1691" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">In the 1990s, neuroscientist Melvyn Goodale began to study people with a condition called visual form agnosia. Such individuals cannot consciously see the shape or orientation of objects, yet act as though they can. “If you hold up a pencil in front of them and ask them if it’s horizontal or vertical, they cannot tell you,” says Goodale, founding director of the Brain and Mind Institute at Western University in London, Canada. “But remarkably, they can reach out and grab that pencil, orienting their hand correctly as they reach out to make contact with it.”</span></p><p data-dcnode-id="1687"><span data-dcnode-id="1688" instrument_node="">
</span></p><div class="recommended pull pull--left u-sans-serif" data-dcnode-id="1680" data-label="Related"><span data-dcnode-id="1686" instrument_node="">
</span><a class="u-link-inherit" data-dcnode-id="1682" data-track="click" data-track-label="recommended article" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/collections/jigfghaeje"><img alt="" class="recommended__image" data-dcnode-id="1685" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.nature.com/w400/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16963858.jpg&amp;raw"><p class="recommended__title u-serif" data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Part of Nature Outlook: The brain</span></p></a><span data-dcnode-id="1681" instrument_node="">
</span></div><p data-dcnode-id="1679"></p><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Goodale’s initial interest related to how the brain processes vision. But as his work to document the two visual systems that govern conscious and unconscious sight progressed, it caught the eye of philosophers, who drew him into conversations about consciousness — a melding of fields that has transformed both.</span></p><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">Newly developed techniques for measuring brain activity are enabling scientists to refine their theories about what consciousness is, how it forms in the brain and where the boundaries lie between being conscious and unconscious. And as our understanding of consciousness improves, some researchers are beginning to build strategies for its manipulation, with the possibility of treating brain injuries, phobias and mental-health conditions such as post-traumatic stress disorder (PTSD) and schizophrenia.</span></p><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">But even as research progresses, and ideas from science and philosophy continue to meld, essential questions remain unanswered. “It’s still just fundamentally mysterious how consciousness happens,” says Anil Seth, a cognitive and computational neuroscientist and co-director of the Sackler Centre for Consciousness Science at the University of Sussex in Brighton, UK.</span></p><h2 data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Detective story</span></h2><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">Consciousness is often described as the mind’s subjective experience. Whereas a basic robot can unconsciously detect conditions such as colour, temperature or sound, consciousness describes the qualitative feeling that is associated with those perceptions, together with the deeper processes of reflection, communication and thought, says Matthias Michel, a philosopher of science and a PhD student at Sorbonne University in Paris.</span></p><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">By the second half of the nineteenth century, scientists had developed a programme for studying consciousness that resembles present approaches, Michel says. But research lulled throughout much of the twentieth century as psychologists rejected introspection to focus instead on observable behaviours and the stimuli that caused them. Even in the 1970s and 1980s, as cognitive science became established, consciousness remained a controversial topic among scientists, who openly questioned whether it was a valid area of scientific investigation. Early in his career, molecular biologist and Nobel laureate Francis Crick wanted to study consciousness, but instead chose to work on the more tangible mysteries of DNA.</span></p><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Eventually, prominent scientists (including Crick) did decide to tackle consciousness, which ushered in a shift in thinking that surged in the 1990s, fuelled by the increasing availability of brain-scanning technologies such as functional magnetic resonance imaging (fMRI) and electroencephalography (EEG). At this point, scientists finally embarked on a major search for the mechanisms in the brain that are associated with the conscious processing of information.</span></p><p data-dcnode-id="1659"><span data-dcnode-id="1664" instrument_node="">A succession of breakthroughs followed, including the case of a 23-year-old woman who sustained a severe brain injury in a car accident in July 2005, which left her in a non-responsive state, also known as wakeful unawareness. She could open her eyes and exhibited cycles of sleep and wakefulness, but did not respond to commands or show signs of voluntary movement. She was still unresponsive five months later. In a first-of-its-kind study, Adrian Owen, a neuroscientist then at the University of Cambridge, UK, and now at Western University, and his colleagues observed the woman using fMRI while giving her a series of verbal commands</span><sup data-dcnode-id="1661"><a data-action="anchor-link" data-dcnode-id="1662" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR1"><span data-dcnode-id="1663" instrument_node="">1</span></a></sup><span data-dcnode-id="1660" instrument_node="">. When the team asked her to imagine playing tennis, they observed activity in a part of her brain called the supplementary motor area. When they asked her to imagine walking through her home, activity ramped up instead in three areas of the brain that are associated with movement and memory. The researchers observed the same patterns in healthy volunteers who were given identical instructions.</span></p><figure class="figure" data-dcnode-id="1640"><span data-dcnode-id="1658" instrument_node="">
</span><div class="embed intensity--high" data-dcnode-id="1642"><span data-dcnode-id="1657" instrument_node="">
</span><img alt="" class="figure__image" data-dcnode-id="1656" data-src="//media.nature.com/lw800/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16961074.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.nature.com/lw800/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16961074.jpg&amp;raw"><span data-dcnode-id="1655" instrument_node="">
</span><noscript data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">
   &lt;img class="" alt="" src="//media.nature.com/lw800/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16961074.jpg"&gt;
  </span></noscript><span data-dcnode-id="1652" instrument_node="">
</span><figcaption data-dcnode-id="1644"><span data-dcnode-id="1651" instrument_node="">
</span><p class="figure__caption u-sans-serif" data-dcnode-id="1646"><span class="mr10" data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">Brain activity in people in an apparently non-responsive state can be similar to that of healthy people.</span></span><span data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Credit: Adrian M. Owen</span></span></p><span data-dcnode-id="1645" instrument_node="">
</span></figcaption><span data-dcnode-id="1643" instrument_node="">
</span></div><span data-dcnode-id="1641" instrument_node="">
</span></figure><p data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">The finding that some people in a coma show signs of consciousness was transformative for neuroscience, says Seth. The work suggested that some people could understand speech and possibly communicate, even when they seemed not to respond to doctors and family members.</span></p><p data-dcnode-id="1632"><span data-dcnode-id="1637" instrument_node="">In the years since Owen’s study was published, investigations of people with brain injuries have offered more evidence that consciousness is detectable in as many as 10–20% of people who are non-responsive. In 2010, a study used fMRI to monitor the brains of 54 people in Belgium and the United Kingdom with severe brain injuries</span><sup data-dcnode-id="1634"><a data-action="anchor-link" data-dcnode-id="1635" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR2"><span data-dcnode-id="1636" instrument_node="">2</span></a></sup><span data-dcnode-id="1633" instrument_node="">. Five showed signs of brain responsiveness when they were instructed to imagine playing tennis or walking through their house or city, a protocol similar to that established by Owen’s team five years earlier. Two of those five people did not demonstrate any awareness in conventional bedside assessments.</span></p><p data-dcnode-id="1626"><span data-dcnode-id="1631" instrument_node="">Scientists have also started to test ways of detecting consciousness without the need to give people verbal instructions. In a series of studies that began in 2013</span><sup data-dcnode-id="1628"><a data-action="anchor-link" data-dcnode-id="1629" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR3"><span data-dcnode-id="1630" instrument_node="">3</span></a></sup><span data-dcnode-id="1627" instrument_node="">, neuroscientist Marcello Massimini at the University of Milan and his colleagues have used transcranial magnetic stimulation (TMS) to create electrical ‘echoes’ in the brain that can be recorded using EEG. The technique is similar to knocking on the brain, in the same way that a person might knock on a wall to gauge its thickness, says Martin Monti, a neuroscientist at the University of California, Los Angeles. While a person is under general anaesthesia, or in a dreamless sleep, the echoes that are produced are simple. But in the conscious brain, the echoes are complex and spread widely over the surface of the cerebral cortex (the outer layer of the brain). The work could eventually lead to a tool that is capable of detecting consciousness even in people who can’t see, hear or respond to verbal commands.</span></p><h2 data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Location, location, location</span></h2><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">As scientists have become more adept at detecting consciousness, they have begun to determine which brain regions and circuits are most important. But there is still much debate about what constitutes consciousness in neural terms, with particular disagreement over which brain processes and regions matter most.</span></p><p data-dcnode-id="1616"><span data-dcnode-id="1621" instrument_node="">Since at least the nineteenth century, scientists have known that the cerebral cortex is important for consciousness. Fresh evidence has highlighted a posterior-cortical ‘hot zone’ that is responsible for sensory experiences. For example, in a 2017 sleep study, researchers roused people throughout the night while monitoring them with EEG</span><sup data-dcnode-id="1618"><a data-action="anchor-link" data-dcnode-id="1619" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR4"><span data-dcnode-id="1620" instrument_node="">4</span></a></sup><span data-dcnode-id="1617" instrument_node="">. Around 30% of the time, participants who were jolted from sleep reported not experiencing anything just before they woke up. The study showed that those people without conscious experiences during sleep had lots of low-frequency activity in the posterior-cortical region of their brains before waking. People who reported that they had been dreaming, however, had less low-frequency activity and more high-frequency activity. As a result, the researchers suggest that by observing a person’s posterior-cortical hot zone during sleep, it might be possible to predict whether they are dreaming — and even the specific contents of their dreams, including faces, speech and movement.</span></p><p data-dcnode-id="1610"><span data-dcnode-id="1615" instrument_node="">It has become increasingly clear, however, that consciousness is not confined to only one region of the brain. Various cells and pathways are engaged, depending on what is being perceived or the type of perception that is involved. Investigating the coordination of neural signalling might help researchers to find reliable signatures of consciousness. In a 2019 study that collected fMRI data from 159 people, researchers found that, compared with people in minimally conscious states and those under anaesthesia, the brains of healthy individuals had more complex patterns of coordinated signalling that also changed constantly</span><sup data-dcnode-id="1612"><a data-action="anchor-link" data-dcnode-id="1613" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR5"><span data-dcnode-id="1614" instrument_node="">5</span></a></sup><span data-dcnode-id="1611" instrument_node="">.</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Plenty of unknowns remain. Scientists disagree about how study results should be interpreted, and measuring whether a person is ‘in’ or ‘out’ of consciousness is a challenge that differs from looking at what happens in the brain as it becomes aware of different types of information. Nevertheless, studies of brain function at various levels of consciousness are starting to offer alternative ways of looking at the brain at a mechanistic level. The hope, says Seth, is that consciousness researchers can “move to a more twenty-first century sort of psychiatry, where we can intervene more specifically in the mechanisms to resolve specific symptoms”.</span></p><h2 data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Tinkering and treating</span></h2><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Attempts at intervention are in progress, and people with brain injuries could be among the first to benefit. On the basis of research that points to the thalamus as playing an important part in consciousness, for example, Monti and his colleagues have been experimenting with a non-invasive technique that uses ultrasound to stimulate that region of the brain in people with brain damage.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">They conducted their initial test of the procedure on a 25-year-old man who was in a coma after a car accident 19 days earlier. Within 3 days, the man recovered his ability to understand language, to respond to commands and to answer yes–no questions with head gestures. Five days later, he was trying to walk.</span></p><p data-dcnode-id="1596"><span data-dcnode-id="1601" instrument_node="">The case report</span><sup data-dcnode-id="1598"><a data-action="anchor-link" data-dcnode-id="1599" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR6"><span data-dcnode-id="1600" instrument_node="">6</span></a></sup><span data-dcnode-id="1597" instrument_node="">, published in 2016, makes it clear that his recovery could have been a coincidence — people often emerge from comas spontaneously. But unpublished follow-up work suggests that the ultrasound approach probably does make a difference. Monti’s team has since performed the thalamus-stimulating procedure on a man with a brain injury who had been involved a car accident several years before. The patient had long been in a minimally conscious state, in which people show some evidence of awareness of their environment or themselves. Several days after the experimental treatment, the man’s wife asked him whether he recognized specific people in family photographs. He was able to reliably answer yes by looking up, and no by looking down. Monti remembers visiting the patient and his wife soon after the procedure. “She looked at me and she didn’t even say hello. She said, ‘I want more’,” Monti says. It was the first time that she’d had a conversation with her husband since the accident.</span></p><figure class="figure" data-dcnode-id="1577"><span data-dcnode-id="1595" instrument_node="">
</span><div class="embed intensity--high" data-dcnode-id="1579"><span data-dcnode-id="1594" instrument_node="">
</span><img alt="" class="figure__image" data-dcnode-id="1593" data-src="//media.nature.com/lw800/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16961076.jpg"><span data-dcnode-id="1592" instrument_node="">
</span><noscript data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">
   &lt;img class="" alt="" src="//media.nature.com/lw800/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16961076.jpg"&gt;
  </span></noscript><span data-dcnode-id="1589" instrument_node="">
</span><figcaption data-dcnode-id="1581"><span data-dcnode-id="1588" instrument_node="">
</span><p class="figure__caption u-sans-serif" data-dcnode-id="1583"><span class="mr10" data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">A hallucination created by a machine-learning algorithm that simulates altered visual perception.</span></span><span data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Credit: Keisuke Suzuki/Univ. Sussex</span></span></p><span data-dcnode-id="1582" instrument_node="">
</span></figcaption><span data-dcnode-id="1580" instrument_node="">
</span></div><span data-dcnode-id="1578" instrument_node="">
</span></figure><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Monti and his colleagues have found similarly encouraging results in several other people in persistent comas, but it is unclear whether the benefits last for more than a few weeks before recipients revert to their original state. The team’s work is ongoing, and the researchers are now trying to work out whether repeat treatments will make the benefits last longer. “I really think this is going to prove to be a possible way in which we can help patients recover,” Monti says. “Somebody once called it jump-starting the brain. We’re not quite jump-starting it, but the metaphor is valid.”</span></p><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Further inroads into the mechanisms of consciousness might lead to better treatments for anxiety, phobias and PTSD, suggests work by Hakwan Lau, a neuroscientist at the University of California, Los Angeles, and his colleagues. The standard approach to treating fears is exposure therapy, which pushes people to repeatedly face the thing that scares them the most. But such treatment is unpleasant, and drop-out rates can reach 50% or more.</span></p><p data-dcnode-id="1567"><span data-dcnode-id="1572" instrument_node="">Instead, Lau’s team is attempting to reprogram the unconscious using an fMRI-based technique that rewards people for activating specific brain regions. In a double-blind trial, the researchers challenged 17 people to make a dot on a computer screen bigger, using any mental strategy</span><sup data-dcnode-id="1569"><a data-action="anchor-link" data-dcnode-id="1570" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR7"><span data-dcnode-id="1571" instrument_node="">7</span></a></sup><span data-dcnode-id="1568" instrument_node="">. The larger they could make it, the more money they would be paid for completing the study. Participants could think about whatever they wanted. What they didn’t know, however, was that the dot would expand only when they activated parts of their brain that, according to previous observations made in a larger group of people, would became active when they saw pictures of animals of which they were afraid, such as spiders or snakes.</span></p><p data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Over time, participants became better at activating the correct parts of their brain, but without knowingly thinking of fear-evoking creatures. After the experiment, the sweatiness of people’s palms — a trait that reflects their stress levels — in response to seeing these animals, was decreased. Activation of the amygdala, an area of the brain that responds to threats, was also reduced. The technique seemed to have reprogrammed the brain’s fear responses outside the conscious awareness of participants.</span></p><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Lau and his colleagues are testing the procedure on people with phobias, and eventually they hope to use it to treat PTSD. But the technique has a considerable limitation. Despite diminishing physical symptoms, it does not seem to affect how people feel about spiders and snakes. “If you ask the patients if they are actually afraid,” Lau says, “they say yes.”</span></p><p data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Ultimately, tackling fear might require targeting both unconscious and conscious pathways, which work in different ways in the brain, says Joseph LeDoux, a neuroscientist at New York University in New York City. The unconscious pathway, he says, emerges from the amygdala. But those hardwired reactions to threats, he suggests, should not be considered as fear at all. Instead, the conscious experience of fear comes from cognitive awareness and the emotional interpretation of a situation. The resulting experiences are not centred on the amygdala. LeDoux says that the difference is evident in people who have blindsight, who cannot consciously perceive visual stimuli but act as though they can. When presented with a threat, they exhibit activity in the amygdala together with physical responses. But they don’t report feeling afraid.</span></p><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">That disconnect might also offer insight into why current medications for anxiety do not always work as well as people hope, LeDoux says. Developed through animal studies, these medications might target circuits in the amygdala and affect a person’s behaviours, such as their level of timidity — making it easier for them to go to social events. But such drugs don’t necessarily affect the conscious experience of fear, which suggests that future treatments might need to address both unconscious and conscious processes separately. “We can take a brain-based approach that sees these different kinds of symptoms as products of different circuits, and design therapies that target the different circuits systematically,” he says. “Turning down the volume doesn’t change the song — only its level.”</span></p><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Psychiatric disorders are another area of interest for consciousness researchers, Lau says, on the basis that some mental-health conditions, including schizophrenia, obsessive–compulsive disorder and depression, might be caused by problems at the unconscious level — or even by conflicts between conscious and unconscious pathways. The link is only hypothetical so far, but Seth has been probing the neural basis of hallucinations with a ‘hallucination machine’ — a virtual-reality program that uses machine learning to simulate visual hallucinatory experiences in people with healthy brains. Through experiments, he and his colleagues have shown that these hallucinations resemble the types of visions that people experience while taking psychedelic drugs, which have increasingly been used as a tool to investigate the neural underpinnings of consciousness.</span></p><p data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">If researchers can uncover the mechanisms behind hallucinations, they might be able to manipulate the relevant areas of the brain and, in turn, treat the underlying cause of psychosis — rather than just address the symptoms. By demonstrating how easy it is to manipulate people’s perceptions, Seth adds, the work suggests that our sense of reality is just another facet of how we experience the world.</span></p><h2 data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">In search of legitimacy</span></h2><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Every year, tens of thousands of people in the United States become conscious while under general anaesthesia. They cannot move or speak, but they might be able to hear voices or equipment noises, and to feel pain. The experience can be traumatic and is fraught with ethical and legal ramifications for the doctors who are caring for them. Some scientists are working to promote guidelines for communicating with unresponsive patients, as well as ways of looking for signs of discomfort in such people. And they are urging the development of improved training and laws to deal with the possibility that alternative ways of detecting consciousness will alter the definition of informed consent for medical procedures.</span></p><p data-dcnode-id="1545"><span data-dcnode-id="1550" instrument_node="">Researchers are also starting to push for better communication with the public about what consciousness science can and cannot achieve. Michel says that claims that are unsupported by empirical data have proliferated in consciousness research. One, in particular, called integrated information theory, has received plenty of private funding and media attention, even though it has been dismissed by him and other experts in the field. In an informal survey of 249 researchers in 2018, Michel and his colleagues found that around 22% of those who had not published papers or attended major meetings on consciousness — and were therefore deemed to be non-experts — trusted integrated information theory</span><sup data-dcnode-id="1547"><a data-action="anchor-link" data-dcnode-id="1548" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR8"><span data-dcnode-id="1549" instrument_node="">8</span></a></sup><span data-dcnode-id="1546" instrument_node="">. Michel suspects that a ‘guru effect’ could be to blame, with non-experts thinking that complex and obscure statements made by intelligent people who project authority are more likely to be true than simpler ideas. “In a sense, the apparent complexity of the theory is used as a proxy for its probability of being true,” Michel says. “They don’t really understand it, but they come to believe that if they understood it, they would likely consider it as the right theory of consciousness.”</span></p><p data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">

</span><a class="u-link-inherit" data-dcnode-id="1538" data-track="click" data-track-label="recommended article" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/nature/collections%3Ftype%3Doutlook"><img alt="" class="recommended__image" data-dcnode-id="1541" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.nature.com/w400/magazine-assets/d41586-019-02207-1/d41586-019-02207-1_16963878.jpg&amp;raw"><p class="recommended__title u-serif" data-dcnode-id="1539"><span data-dcnode-id="1540" instrument_node="">More from Nature Outlooks</span></p></a><span data-dcnode-id="1537" instrument_node="">
</span></div><p data-dcnode-id="1535"></p><p data-dcnode-id="1529"><span data-dcnode-id="1534" instrument_node="">To solidify the legitimacy of consciousness science and to encourage acceptance of evidence-based ideas, he and a group of 57 colleagues from a range of disciplines — including Seth, Lau, Goodale and LeDoux — followed up the informal study with a 2019 paper that reviewed the state of the field</span><sup data-dcnode-id="1531"><a data-action="anchor-link" data-dcnode-id="1532" data-track="click" data-track-category="references" data-track-label="go to reference" href="#ref-CR9"><span data-dcnode-id="1533" instrument_node="">9</span></a></sup><span data-dcnode-id="1530" instrument_node="">. Its findings were mixed. Consciousness research is not yet recognized as a strategically focused area by the US National Institute of Mental Health, they wrote. Job creation in the field has lagged behind other nascent disciplines such as neuroeconomics and social neuroscience. And public funding, especially in the United States, has been relatively scarce. But certain areas are gaining attention. Since the mid-2000s, the US National Institutes of Health has provided several large grants to support research that addresses, among other important topics, the neurological differences between consciousness and being in a coma, or wakefulness and being asleep. Such studies might offer a window on the neural signatures of consciousness. Some major private philanthropic foundations and organizations are also supporting research on big ideas in consciousness, says Goodale, who receives funding from one such charitable organization, the Canadian Institute for Advanced Research in Toronto.</span></p><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">As funding and publications accumulate, scientists have become increasingly able to make investigations into consciousness a reasonable — if not central — part of their research plan, Seth says. “There has been a general assimilation of consciousness within the standard practice of neuroscience and psychology and medicine,” he says. “It has become more normalized, which is a good thing.”</span></p><span data-dcnode-id="1526" instrument_node="">
