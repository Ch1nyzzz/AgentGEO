iv></div></div><div class="card" data-align="left" data-dcnode-id="595" data-type="" id="global-education"><div class="inner" data-dcnode-id="596"><span class="ico ico-sapling ico--lime" data-dcnode-id="603"><svg data-dcnode-id="604" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M25 11a5 5 0 0 0-4.91 4.07 6.91 6.91 0 0 0-4.09 2V11.9a5 5 0 1 0-2 0v13.69l-2.83-2.84a5 5 0 1 0-1.42 1.42L14 28.41V32h2V22a5 5 0 0 1 4.13-4.91A5 5 0 1 0 25 11zM12 7a3 3 0 1 1 4 2.82V7h-2v2.82A3 3 0 0 1 12 7zM7 23a3 3 0 1 1 2.7-1.71l-2-2-1.41 1.42 2 2A3 3 0 0 1 7 23zm18-4a3 3 0 0 1-2.82-2H25v-2h-2.82A3 3 0 1 1 25 19z" data-dcnode-id="605" data-name="Layer 2"></path></svg></span><div class="card__title" data-dcnode-id="600"><h2 class="h3" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Global education</span></h2></div><div class="card__content" data-dcnode-id="597"><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">You’ll have access to a range of international study opportunities.</span></p></div></div></div></div><div class="offering__sections" data-dcnode-id="503"><div class="promotion-banner" data-dcnode-id="579"><div class="promotion-banner__image" data-dcnode-id="591"><span data-dcnode-id="593" instrument_node=""> </span><img alt="" data-dcnode-id="592" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//central-cdn.curtin.edu.au/wp-content/uploads/sites/3/2022/04/5221UM_2204-Early-Offers-Social-and-Web_2a-1-aspect-ratio-1-1-768x768-c-center.jpg&amp;raw"></div><div class="promotion-banner__content" data-dcnode-id="580"><h2 class="promotion-banner__title" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Curtin Early Offers for 2023</span></h2><div class="promotion-banner__description small last-mb0" data-dcnode-id="583"><span data-dcnode-id="588" instrument_node="">Are you in year 12 and keen to lock in your place at Curtin early? Let us take the pressure off. </span><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node=""> </span><br data-dcnode-id="585"><span data-dcnode-id="584" instrument_node=""> Our Early Offers Program is available for most Curtin courses, and will help you secure a place in your chosen course before you even receive your ATAR.</span></div><a class="promotion-banner__button button button--deep-blue" data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.curtin.edu.au/undergraduate/early-offers/%23linkid%3Dum-corp-ug-earlyoffers"><span data-dcnode-id="582" instrument_node="">Find out more</span></a></div></div><div class="outline__content content reduced" data-dcnode-id="548"><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Nervous system development, overview, plasticity, blood supply, meninges, CSF, receptors, somatosensation, visual, auditory vestibular perception, cortical, cerebellar and brainstem control of movement. Hypothalamus structure and role with autonomic nervous system function, control and interaction with cerebral function. The role of the limbic system in emotion, learning and memory. Behaviour, sleep &amp; dreaming, hunger &amp; thirst.</span></p><h3 data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Student profile</span></h3><p data-dcnode-id="570"><span data-dcnode-id="574" instrument_node="">View our </span><a data-dcnode-id="572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.curtin.edu.au/undergraduate/student-profile/" rel="noopener" target="_blank"><span data-dcnode-id="573" instrument_node="">student profile table</span></a><span data-dcnode-id="571" instrument_node=""> to get an indication of the likely peer cohort for new students at Curtin University. This table provides data on students that commenced undergraduate study and passed the census date in the most relevant recent intake period for which data are available. It includes those admitted through all offer rounds and international students studying in Australia.</span></p><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">What you'll learn</span></h3><ul class="first-capitalize" data-dcnode-id="552"><span data-dcnode-id="567" instrument_node=""> </span><li class="active" data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">identify core components of the nervous system their relationship to neural function, integration and dysfunction</span></li><span data-dcnode-id="564" instrument_node=""> </span><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">examine information processing within the nervous system in response to the internal and external environments</span></li><span data-dcnode-id="561" instrument_node=""> </span><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">apply scientific methods and techniques used in neuroscience research to demonstrate neurophysiological principles</span></li><span data-dcnode-id="558" instrument_node=""> </span><li data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">evaluate cortical input underpinning complex behaviours</span></li><span data-dcnode-id="555" instrument_node=""> </span><li data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">critique current research literature in selected neuroscience topics</span></li></ul><span data-dcnode-id="551" instrument_node=""> </span><button class="button outline__more" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Load more…</span></button></div><section class="offering-section content advanced-standing" data-content="advanced-standing" data-dcnode-id="518" id="advanced-standing"><h2 class="offering-section__title" data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Advanced standing</span></h2><div class="tab-content__domestic" data-dcnode-id="519" data-segment="dom"><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">At Curtin, we understand that everyone’s study journey has been different.</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">You may have already studied some of the units (subjects) listed in your Curtin course, or you may have work experience that matches the degree requirements.</span></p><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">If this applies to you, you can apply for credit for recognised learning (CRL), which means your previous study is recognised and matched against a similar unit in your intended Curtin course.</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">A successful CRL application exempts you from having to complete certain units within your course and means you could finish your degree in a shorter amount of time.</span></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">CRL is also known as recognition of prior learning, advanced standing and credit transfer.</span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Use the CRL search to find out how much CRL you qualify for, or contact us at:</span></p><p data-dcnode-id="529"><strong data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Webform: </span></strong><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//students.connect.curtin.edu.au/app/ask_general"><span data-dcnode-id="531" instrument_node="">Submit here</span></a></p><p data-dcnode-id="523"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Curtin Connect:</span></strong><span data-dcnode-id="526" instrument_node=""> </span><a data-dcnode-id="524" href="tel:1300222888"><span data-dcnode-id="525" instrument_node="">1300 222 888</span></a></p><p data-dcnode-id="520"><a class="button" data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//study.curtin.edu.au/applying/credit-recognised-learning/%23linkid%3Dum-study-crl-dom"><span data-dcnode-id="522" instrument_node="">CRL search</span></a></p></div></section><section class="offering-section content location active" data-content="location" data-dcnode-id="504" id="location"><h2 class="offering-section__title" data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Location</span></h2><p data-dcnode-id="511"><span data-dcnode-id="515" instrument_node="">For start dates, please view the&nbsp;</span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//students.curtin.edu.au/essentials/academic-calendar/" rel="noopener" target="_blank"><span data-dcnode-id="514" instrument_node="">academic calendar</span></a><span data-dcnode-id="512" instrument_node="">.</span></p><div class="locations" data-dcnode-id="510"></div><div class="locations__disclaimer" data-dcnode-id="505"><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">All endeavours are made to ensure location information for courses is up to date but please note they are subject to change.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The University reserves the right to withdraw any unit of study or program which it offers, to impose limitations on enrolment in any unit or program, and/or to vary arrangements for any program.</span></p></div></section></div></div></div></div><div class="contained" data-dcnode-id="333"><section class="support support--default" data-dcnode-id="431" data-segment="dom" id="help"><div class="grid" data-dcnode-id="432"><div class="support__wrap" data-dcnode-id="433"><div class="support__content-wrap" data-dcnode-id="494"><h2 class="support__title h2" data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Help is at hand</span></h2><div class="support__content content small last-mb0" data-dcnode-id="495"><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">See our frequently asked questions or get
