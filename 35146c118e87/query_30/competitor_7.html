</span><p data-dcnode-id="788"><strong data-dcnode-id="792"><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
Psychological Meaning:</span></strong><span data-dcnode-id="791" instrument_node=""> The shadow is the dark side of your nature. It represents everything that you wish not to be. It is also the unused or rejected side of yourself and your emotions. It is your dark side that you refuse to recognize. It is the repressed aspects of the self. Try to bring these hidden feelings into the light of day so that they loosen their hold over you otherwise you are likely to project this ‘other self’</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">
on to other people. Do you accuse others of fault that are, in reality, your own?</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="783"><strong data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Mystical Meaning:</span></strong><span data-dcnode-id="784" instrument_node=""> Many superstitions say that the shadow is a part of a person’s soul. To tread on it or throw stones at it is unlucky and may cause a person harm. Beware if you dream that this happens to you.</span></p><span data-dcnode-id="782" instrument_node="">
</span><img alt="Shadow Dream Meaning" class="size-full wp-image-796 aligncenter" data-attachment-id="796" data-comments-opened="1" data-dcnode-id="781" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="shadow-dream" data-large-file="https://i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg?fit=500%2C334" data-medium-file="https://i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg?fit=300%2C200" data-orig-file="https://i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg?fit=500%2C334" data-orig-size="500,334" data-permalink="http://www.dreamsleep.net/meanings/shadow/shadow-dream/" height="334" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg%3Fresize%3D500%252C334&amp;raw" srcset="https://i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg?w=500 500w, https://i1.wp.com/www.dreamsleep.net/meanings/wp-content/uploads/2016/08/shadow-dream.jpg?resize=300%2C200 300w" width="500"><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">EXAMPLE:</span></p><span data-dcnode-id="777" instrument_node="">
</span><h3 data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Dream About Ghost Train</span></h3><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">My fiancé and I were recently on holiday in Florida and we stopped over at a hotel. After much difficulty getting to sleep I had a disturbing dream. I was on a ghost train and went through lots of large black doors and into different rooms. Suddenly it stopped and I panicked. I awoke to hear my fiancé saying “Oh no what are we going to do it’s stopped!” It took two or three minutes to realize that I was only dreaming. My fiancé couldn’t believe what had happened. We had dreamed the same dream, woke up at exactly the same time, and both still thought that the dream was still happening. Can you explain?</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Lynne C</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">It’s an eerie feeling to wake up and still think you’re dreaming but to both wake from the same dream must be very disconcerting. You communicated with your fiancé in your dream and together tried to resolve a problem that was troubling you both.&nbsp;Telepathic Dreams like this are sometimes called Mutual Dreams.&nbsp;Ghosts ,in dreams, often represent shadowy anxieties that have to be brought into the light of reason.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">EXAMPLE 2</span></p><span data-dcnode-id="762" instrument_node="">
</span><h3 data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Dreams About Shadow Attack</span></h3><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">I am in prison and have the most terrible experience at night about every three months for the last six years. The last time it happened I was tossing and turning and trying to get to sleep when a strange dark power pulled me off the bed and pushed me against the wall.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">My cell mate stood screaming but when I looked at him again he was fast asleep. I don’t know whether these experiences are dreams or something real. The doctor will probably say they are only nightmares but if they are real what can he do?</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">A worried inmate-H M Prison</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Prolonged confinement can create some very disturbing hallucinations. People deprived of all sensory stimuli, under experimental conditions, find it difficult to distinguish between dream and reality. Prison with it’s continual boredom and routine create a similar environment.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">You are probably having a lucid dream that is as real as your waking experience. The conditions you describe may also be linked to Narcolepsy and sleep paralysis. Your doctor would be familiar with the problems caused by prison life and should be able to help.</span></p><span data-dcnode-id="744" instrument_node="">

</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">I had a dream last night, I’ve had it once before, of a shadow man that kept appearing in dark corners of the house I was in. I don’t know who’s house it was, but every time I saw this shadow man he was closer and closer. In my dream there was a orb of light, it was my orb of light, that someone had to catch before the shadow man got too close to me and takes me. I’ve never let the dream get to the point to where someone catches my orb or the shadow man get too close. I’ve been able to wake myself up. I am very curious about what this dream means. I wake up in a panic and I’m unwilling to fall back asleep. If someone is able to explain to me why I’m having this dream or what it means, that would be great!</span></p><span data-dcnode-id="555" instrument_node="">
