uot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;4&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;id&quot;:&quot;ad-e364b21ae7ba4b11b2d5d3c011ddd118&quot;,&quot;adUnitPath&quot;:&quot;/88059007/exemplore.com/dreams&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="1276"></phoenix-ad></div></aside><h2 data-dcnode-id="1272" id="turtle-mythology"><span data-dcnode-id="1273" instrument_node="">Turtle Mythology</span></h2><p data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">What does mythology have to do with dream symbolism?  Mythology is the storehouse of humanity's associations with various symbols and as such, it provides a wealth of information and insight into the meaning of symbols when they appear in dreams.  Here are just a few myths cross cultural myths involving turtles. </span></p><div class="m-table m-detail--body-item l-inline" data-dcnode-id="1223"><table data-dcnode-id="1224"><caption class="caption" data-dcnode-id="1267"><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Turtles typify strength, longevity, wisdom, and power in cross cultural mythologies. </span></p></caption><thead data-dcnode-id="1261"><tr data-dcnode-id="1262"><th data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Culture</span></th><th data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Mythology </span></th></tr></thead><tbody data-dcnode-id="1225"><tr data-dcnode-id="1254"><td data-dcnode-id="1258"><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Vietnamese</span></p></td><td data-dcnode-id="1255"><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Ho Hoan Kiem (Lake of the Restored Sword)  This myth resonates with Grail mythology with 15th century Emperor Ly Thai To defeating invaders via the use of a magical sword.  After he defeated his enemies, a giant golden turtle swam up and took the sword from the emperor, returning it to the realm of the divine. </span></p></td></tr><tr data-dcnode-id="1247"><td data-dcnode-id="1251"><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Nigeria</span></p></td><td data-dcnode-id="1248"><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">The turtle in Nigeria is viewed primarily as a trickster archetype.  Sometimes the tricks lead the turtle to triumph, other times, he simply finds trouble.  Either way, what he is mainly known for is his ability to craftily sum up his enemies and circumstances with slow, deliberate patience, and find a way out of whatever he has crawled into.</span></p></td></tr><tr data-dcnode-id="1240"><td data-dcnode-id="1244"><p data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Ancient Greece</span></p></td><td data-dcnode-id="1241"><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Sciron, an Isthmian bandit, employed a titanic turtle to eat the bodies of those who Sciron robbed and tossed off the cliffs and into the sea.  He was killed by Theseus. </span></p></td></tr><tr data-dcnode-id="1233"><td data-dcnode-id="1237"><p data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Chinese</span></p></td><td data-dcnode-id="1234"><p data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">The turtle is, in Chinese mythology, one of the "Four Fabulous Animals"--the animals charged with ruling over the four directions.  The Black Turtle, who has some interesting additions to its normal appearance such as fiery tentacles and dragon ears, was emblazoned on the banners of the Chinese Imperial Army as a symbol of unsurpassed strength and invincibility due to its inaccessibility. </span></p></td></tr><tr data-dcnode-id="1226"><td data-dcnode-id="1230"><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Native American </span></p></td><td data-dcnode-id="1227"><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">In North America, many aboriginal cultures believed a 'World Turtle' who carried the earth on her back.  Earthquakes were ascribed to the activity of the World Turtle stretching.  Due to the belief in the World Turtle, some Native American cultures call the North American continent 'Turtle Island.' </span></p></td></tr></tbody></table></div><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1220"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-3" data-dcnode-id="1221" data-zone-count="10"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&qu ta-ad-group="in_content-6" data-dcnode-id="1142"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-6" data-dcnode-id="1143" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-82d49eca94ab4009b46753378a1dfbc5&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-6&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;6&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quo les.</span></p><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">When we focus on the outer world, it makes it easy to avoid looking into ourselves, to our own inner world and deal with what we're carrying around in the depths of our own psyches.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="1040"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-8" data-dcnode-id="1041" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-9e6cd8221f9e44c08df5aec01db6d31b&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-8&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;8&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot simply people who get their energy from being alone. They are wise men and women who find solitude refreshing, who find time alone invigorating and restorative. It isn't that they dislike going out; they simply don't find outings the place where they find their energy.</span></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Dreams of turtles can signify a longing for some time by ourselves, some time where we can curl up into our own shells and relax, read, or create a masterpiece in our own time.</span></p><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="869"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-11" data-dcnode-id="870" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-b24bee3cf3894592a1c552f09f0623fc&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-11&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]] tent-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="790"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-12" data-dcnode-id="791" data-zone-count="14"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-ce8a04ad04d94dfd9bf8ceb16dc4ca84&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-12&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;12&quot;,&quot;isOutstream&quot;:false
