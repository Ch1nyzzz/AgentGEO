9-.58.363a3.37 3.37 0 0 1-.642.3c-.2.068-.387.101-.558.101H9.99c-.171 0-.357-.033-.558-.1a3.367 3.367 0 0 1-.642-.301c-.227-.134-.42-.255-.58-.363-.16-.108-.361-.25-.603-.424-.242-.175-.4-.289-.474-.34a559.717 559.717 0 0 0-2.924-2.038 516.753 516.753 0 0 1-2.288-1.59c-.462-.313-.897-.742-1.306-1.29C.204 3.009 0 2.5 0 2.032 0 1.451.154.967.463.581.772.192 1.213 0 1.786 0z" data-dcnode-id="250"></path></svg></a></div></div><div class="tn" data-dcnode-id="180"><div class="tc AO" data-adroot="true" data-dcnode-id="181"><p data-dcnode-id="241"><span data-dcnode-id="245" instrument_node="">By their very nature, our dreams are divorced from the mundane reality of our waking lives, which is why they feature so many giant talking spiders and cameo appearances by Jaden Smith (just me?). But every so often, the people who occupy our conscious minds leak into our dreaming minds, which is why most of us have had </span><a data-dcnode-id="243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dreammoods.com/cgibin/dreamdictionarysearch.pl%3Fmethod%3Dexact%26header%3Ddreamsymbol%26search%3Dfamily" rel="noreferrer" target="_blank"><span data-dcnode-id="244" instrument_node="">dreams about our parents and family</span></a><span data-dcnode-id="242" instrument_node="">. Whether we love them, hate them, or just wish they'd stop including us on so many email chains about inspirational YouTube videos, our families occupy a key place in our subconscious. And when they show up in our dreams, they don't just help us better understand what's on our minds — sometimes, dreams about our families help us better understand our relationships with our families themselves.</span></p><div class="adWrapper G8 zz d7 hz Ud" data-dcnode-id="239"><div data-dcnode-id="240" id="ad-1"></div></div><p data-dcnode-id="231"><span data-dcnode-id="238" instrument_node="">So what is the </span><a data-dcnode-id="236" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/understanding-your-dreams-2795935" rel="noreferrer" target="_blank"><span data-dcnode-id="237" instrument_node="">meaning of dreams</span></a><span data-dcnode-id="235" instrument_node=""> about family? Unfortunately, there isn't one set of dream meanings we can use to interpret every dream — dreams are personal, especially when it comes to something as personal as family. But according to George Oliva, publisher of </span><a data-dcnode-id="233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamdoctor.com/" rel="noreferrer" target="_blank"><span data-dcnode-id="234" instrument_node="">DreamDoctor.com</span></a><span data-dcnode-id="232" instrument_node="">, there are some tips you can use to interpret what your own family dreams mean to you. </span></p><h2 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Dreams Express Your Feelings At The Moment</span></h2><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Oliva tells Bustle that dreams are "expressions of the dreamer's feelings,&nbsp;thoughts and awarenesses (including intuition) about their waking life at the time." This means that symbols in your dream don't have static, set meanings that carry over from one dream to the next — your mom could be a symbol of comfort in one dream, after you spend a nice weekend together; then, after you have an awful fight with her, she could be a symbol of pain or anxiety in a dream. </span></p><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">So in order to understand your family dream meanings, you'll have to dive into your feelings about your family at the moment.</span></p><h2 data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Pay Attention To The Details Of Your Family Dreams</span></h2><p data-dcnode-id="218"><span data-dcnode-id="222" instrument_node="">Even if it feels like the only important part of a dream is that it featured your weird first cousin Ed, try to remember as many details as you can, including where you were in the dream.&nbsp;According to Oliva, "to understand the meaning of </span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">any</span></em><span data-dcnode-id="219" instrument_node=""> dream, you have to take into account&nbsp;who is in the dream, what happens, where it happens, the symbols (that&nbsp;which stands out as odd/out of place) &amp; how the dreamer feels IN the&nbsp;dream."</span></p><p data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">So your weird first cousin Ed's presence was only one element you need to interpret — you'll also want to try to remember where you were and what you were doing, as well as your feelings, both in the dream and now that you're awake. Was Ed setting off firecrackers in your elementary school parking lot? Did you feel annoyance in the dream? Fear? Child-like wonder at the pretty, sparkly lights? </span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">&nbsp; </span></p><div class="sW WG CE" data-dcnode-id="206"><figure class="Qq E1" data-dcnode-id="207"><div class="vm ap vB" data-dcnode-id="212" style="padding-top: 66.7391%;"><img alt="" class="Ed" data-dcnode-id="213" sizes="(min-width:768px) 760px, 414px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgix.bustle.com/uploads/image/2019/7/3/17051a80-e4dc-4fcc-8ed0-367bd3c24edd-shutterstock_1432838015.jpg%3Fw%3D414%26h%3D276%26fit%3Dcrop%26crop%3Dfaces%26auto%3Dformat%252Ccompress&amp;raw" srcset="https://imgix.bustle.com/uploads/image/2019/7/3/17051a80-e4dc-4fcc-8ed0-367bd3c24edd-shutterstock_1432838015.jpg?w=414&amp;h=276&amp;fit=crop&amp;crop=faces&amp;auto=format%2Ccompress 414w, https://imgix.bustle.com/uploads/image/2019/7/3/17051a80-e4dc-4fcc-8ed0-367bd3c24edd-shutterstock_1432838015.jpg?w=414&amp;h=276&amp;fit=crop&amp;crop=faces&amp;auto=format%2Ccompress&amp;q=50&amp;dpr=2 828w, https://imgix.bustle.com/uploads/image/2019/7/3/17051a80-e4dc-4fcc-8ed0-367bd3c24edd-shutterstock_1432838015.jpg?w=760&amp;h=507&amp;fit=crop&amp;crop=faces&amp;auto=format%2Ccompress 760w, https://imgix.bustle.com/uploads/image/2019/7/3/17051a80-e4dc-4fcc-8ed0-367bd3c24edd-shutterstock_1432838015.jpg?w=760&amp;h=507&amp;fit=crop&amp;crop=faces&amp;auto=format%2Ccompress&amp;q=50&amp;dpr=2 1520w"></div><div data-dcnode-id="208"><figcaption class="rv Tr" data-dcnode-id="209"><cite data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Photo credit: LightField Studios/ Shutterstock</span></cite></figcaption></div></figure></div><h2 data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Notice How You Felt In The Dream</span></h2><p data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">According to Oliva, "how the dreamer&nbsp;feels IN a dream is exactly how the dreamer feels (at the time of the dream... because feelings over time change) about the subject of their&nbsp;dream...So, for instance, if the dreamer&nbsp;feels afraid in a dream, he/she should try to ID where he/she is&nbsp;feeling afraid in their waking life. The dream contains all of the&nbsp;clues."</span></p><p data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">By this thinking, your dream feelings are a jumping off point. Let's say that you dream your mother is trying to murder you — freaky, yes, but common. The fear you feel in the dream likely doesn't mean that in real life, you're actually afraid your mother is going to murder you. But it does likely mean that you're experiencing fear or anxiety about your relationship. "It reflects the dreamer's feeling (at the time of the dream) that the mother wants the dreamer out of her life," says Oliva. "The dreamer may have gotten into an argument with the mother or gotten a disapproving response, look or attitude that made [them] feel as if their mom wanted them 'gone.'" </span></p><h2 data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">Use Your Feelings About Family Dreams To Work On Family Issues</span></h2><p data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">Well, maybe you don't want to work on your relationship with weird first cousin Ed. But your feelings in dreams can be revealing, and give you an opportunity not just to face uncomfortable feelings about family members — but, once you tease out the dream meanings, begin to heal from them. "How the dreamer feels about that IN the dream (shocked, scared, unsafe, incredulous, threatened) is how the dreamer feels about his/her mother at that moment in time," says Oliva. "Knowing that, the dreamer can take steps to improve the situation or relationship."</span></p><p data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Dreams can offer us an opportunity to face emotions we may be working hard to suppress in waking life. For example, I'm estranged from my mother, and in my conscious life, I believe I don't have any unresolved feelings about her; however, a recent dream where I was mourning her after her  (non-existent) death showed me that perhaps I have a lot of sadness about our relationship that I've never faced. </span></p><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Of course, you're the ultimate judge of how to interpret your dreams meanings; you're also the only one who can decide what improving a family situation means to you. But know that dreams might offer you access to your most honest feelings about your family, if you want to actually understand them.</span></p><p data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">And remember what Tolstoy said: "Happy families are all alike; but every dream family is super bizarre in its own way."</span></p><p data-dcnode-id="189"></p><h3 data-dcnode-id="188"></h3><div class="CC" data-dcnode-id="182"><p data-dcnode-id="183"><span data-dcnode-id="187" instrument_node="">This article was originally published on</span><span data-dcnode-id="186" instrument_node=""> </span><time data-dcnode-id="184" datetime="2015-04-24T14:07:17.949Z"><span data-dcnode-id="185" instrument_node="">April 24, 2015</span></time></p></div></div></div></article><div class="PQ h5" data-dcnode-id="178"></div></div><div class="vx" data-dcnode-id="172"><button class="g-" data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">✕</span></button><div class="adWrapper zz" data-dcnode-id="173"><div data-dcnode-id="174" id="ad-flyout"></div></div></div><div class="Jq" data-dcnode-id="11"><input class="ec n7 wJ" data-dcnode-id="171" id="navCheckbox" type="checkbox"><input class="n7 wY" data-dcnode-id="170" id="searchCheckbox" type="checkbox"><nav class="za" data-dcnode-id="12"><div class="K8" data-dcnode-id="13"><div class="hw" data-dcnode-id="152"><div class="sI" data-dcnode-id="168"><i class="id" data-dcnode-id="169"></i></div><div class="jD" data-dcnode-id="159"><label class="V8 wV" data-dcnode-id="164" for="searchCheckbox"><span data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">SEARCH</span></span><button aria-label="open search" class="yl" data-dcnode-id="165" type="button"></button></label><label class="V8 wV BR" data-dcnode-id="160" for="navCheckbox"><span data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">CLOSE</span></span><button aria-label="close nav" class="yl" data-dcnode-id="161" type="button"></button></label></div><div class="hb" data-dcnode-id="155"><form action="/search" autocapitalize="off" autocomplete="off" class="jI ER a5" data-dcnode-id="156" target="_top"><div class="oK" data-dcnode-id="158"></div><input aria-label="Search Bustle" class="X0" data-dcnode-id="157" name="q" placeholder="Search Bustle..." type="search" value=""></form></div><label class="V8 gp" data-dcnode-id="153" for="searchCheckbox"><button aria-label="close search" class="yl" data-dcnode-id="154" type="button"></button></label></div><form class="_O" data-dcnod
