</span><h2 class="blog-title" data-dcnode-id="2337"><span data-dcnode-id="2341" instrument_node="">
</span><a class="blog-title-link blog-link" data-dcnode-id="2339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mathgiraffe.com/blog/how-color-affects-student-learning"><span data-dcnode-id="2340" instrument_node="">How Color Affects Student Learning</span></a><span data-dcnode-id="2338" instrument_node="">
</span></h2><span data-dcnode-id="2336" instrument_node="">
</span></div><span data-dcnode-id="2334" instrument_node="">
</span><div class="blog-content" data-dcnode-id="1882"><span data-dcnode-id="2333" instrument_node="">

</span><a data-dcnode-id="2322"><img alt="Picture" data-dcnode-id="2323" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mathgiraffe.com/uploads/4/3/0/4/43044167/color-and-student-learning-post_orig.jpg&amp;raw" style="width:auto;max-width:100%"></a><span data-dcnode-id="2321" instrument_node="">
</span><div data-dcnode-id="2320" style="display:block;font-size:90%"></div><span data-dcnode-id="2319" instrument_node="">
</span></div><span data-dcnode-id="2317" instrument_node="">

</span></td><td class="wsite-multicol-col" data-dcnode-id="2293" style="width:43.778110944528%; padding:0 15px;"><span data-dcnode-id="2312" instrument_node="">
</span><div class="paragraph" data-dcnode-id="2295"><span data-dcnode-id="2311" instrument_node="">
​Did you know that incorporating color (correctly!) into your lessons can boost student learning and memory?</span><br data-dcnode-id="2310"><span data-dcnode-id="2309" instrument_node="">
&nbsp;</span><br data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">
If you’re anything like me, you probably put a lot of effort into designing your dream classroom.&nbsp; But, have you ever thought about the science behind how colors around your classroom affect your students’ learning?&nbsp;</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">
</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">
​Different colors, their combinations, and their placement can have an effect on </span><strong data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">attention, memory, feelings, and behaviors</span></strong><span data-dcnode-id="2300" instrument_node=""> of students.&nbsp; So, it’s time we take a look at all of this research and use colors to our advantage!</span><br data-dcnode-id="2299"><span data-dcnode-id="2298" instrument_node="">
</span><br data-dcnode-id="2297"><span data-dcnode-id="2296" instrument_node="">
Considering the following ideas, research, and infographic will help you to rethink your use of color in the classroom to give your students a stronger learning experience.
</span></div><span data-dcnode-id="2294" instrument_node="">

</span><div data-dcnode-id="2269"><span data-dcnode-id="2279" instrument_node="">
</span><div align="center" class="wcustomhtml" data-dcnode-id="2271" id="345835655275845472" style="width: 100%; overflow-y: hidden;"><span data-dcnode-id="2278" instrument_node="">
</span><span class="PIN_1650916338104_button_pin PIN_1650916338104_beside PIN_1650916338104_save PIN_1650916338104_tall" data-dcnode-id="2274" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet" data-pin-x="20"><span class="PIN_1650916338104_count" data-dcnode-id="2276" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet" data-pin-x="20"><span data-dcnode-id="2277" instrument_node="">20</span></span><span data-dcnode-id="2275" instrument_node="">Save</span></span><span data-dcnode-id="2273" instrument_node=""> </span><span data-dcnode-id="2272" instrument_node="">

</span><div class="paragraph" data-dcnode-id="2246"><span data-dcnode-id="2267" instrument_node="">
​We can benefit our students by using color effectively in many different ways:</span><br data-dcnode-id="2266"><span data-dcnode-id="2265" instrument_node="">
</span><ul data-dcnode-id="2248"><span data-dcnode-id="2264" instrument_node="">
</span><li data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">thoughtful choices of color in atmosphere &amp; surroundings</span></li><span data-dcnode-id="2261" instrument_node="">
</span><li data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">maximizing use of color in lesson content (printing in color, using colored paper, incorporating color in notes, presentations, and student work)</span></li><span data-dcnode-id="2258" instrument_node="">
</span><li data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">considering how students interact with lesson material (doodling, color coding, using colored patterns and tools, etc.)</span></li><span data-dcnode-id="2255" instrument_node="">
</span><li data-dcnode-id="2253"><span data-dcnode-id="2254" instrument_node="">rethinking even the colors we use when grading and giving feedback</span></li><span data-dcnode-id="2252" instrument_node="">
</span><li data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">using colorful memory triggers</span></li><span data-dcnode-id="2249" instrument_node="">
</span></ul><span data-dcnode-id="2247" instrument_node="">
</span></div><span data-dcnode-id="2245" instrument_node="">

prove-memory-354326" style="top: 679px !important; left: 23px !important; width: 114px !important; height: 172px !important;" tl-thing-id="979080991966494722"><div class="nubbin unpinned" data-dcnode-id="2208" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2211" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2210" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2209" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div><div class="tlThingContainer" data-dcnode-id="2200"><div class="tagx nubbin-transparent tl-a-979082864245080066" data-dcnode-id="2201" href="https://blog.edynco.com/instructional-design/how-colors-can-enhance-memory-performance/" style="top: 149px !important; left: 204px !important; width: 180px !important; height: 211px !important;" tl-thing-id="979082864245080066"><div class="nubbin unpinned" data-dcnode-id="2202" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2205" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2204" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2203" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div><div class="tlThingContainer" data-dcnode-id="2194"><div class="tagx nubbin-transparent tl-a-979084091326464002" data-dcnode-id="2195" href="https://www.shiftelearning.com/blog/how-do-colors-influence-learning" style="top: 687px !important; left: 222px !important; width: 136px !important; height: 128px !important;" tl-thing-id="979084091326464002"><div class="nubbin unpinned" data-dcnode-id="2196" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2199" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2198" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2197" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div><div class="tlThingContainer" data-dcnode-id="2188"><div class="tagx nubbin-transparent tl-a-979084298743185410" data-dcnode-id="2189" href="http://www.nytimes.com/2009/02/06/health/06iht-color.1.19983382.html" style="top: 951px !important; left: 5px !important; width: 374px !important; height: 142px !important;" tl-thing-id="979084298743185410"><div class="nubbin unpinned" data-dcnode-id="2190" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2193" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2192" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2191" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div><div class="tlThingContainer" data-dcnode-id="2182"><div class="tagx nubbin-transparent tl-a-979085128032583682" data-dcnode-id="2183" href="http://www.mathgiraffe.com/blog/teaching-math-with-creativity" style="top: 872px !important; left: 206px !important; width: 165px !important; height: 64px !important;" tl-thing-id="979085128032583682"><div class="nubbin unpinned" data-dcnode-id="2184" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2187" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2186" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2185" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div><div class="tlThingContainer" data-dcnode-id="2176"><div class="tagx nubbin-transparent tl-a-979085535215616002" data-dcnode-id="2177" href="http://www.mathgiraffe.com/" style="top: 1101px !important; left: 8px !important; width: 190px !important; height: 48px !important;" tl-thing-id="979085535215616002"><div class="nubbin unpinned" data-dcnode-id="2178" style="z-index: 1;"><div class="nubbinGlow" data-dcnode-id="2181" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/highlight') !important;"></div><div class="nubbinIcon" data-dcnode-id="2180" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/plain') !important;"></div><div class="nubbinHoverIcon" data-dcnode-id="2179" style="background-image: url('https://cdn.thinglink.me/api/nubbin/transparent/hoverlink') !important;"></div></div></div></div></div><span data-dcnode-id="2172" instrument_node="">

</span></div><span data-dcnode-id="2168" instrument_node="">
</span><div data-dcnode-id="2157"><span data-dcnode-id="2167" instrument_node="">
</span><div align="center" class="wcustomhtml" data-dcnode-id="2159" id="356124863549744020" style="width: 100%; overflow-y: hidden;"><span data-dcnode-id="2166" instrument_node="">
</span><span class="PIN_1650916338104_button_pin PIN_1650916338104_beside PIN_1650916338104_save PIN_1650916338104_tall" data-dcnode-id="2162" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet" data-pin-x="20"><span class="PIN_1650916338104_count" data-dcnode-id="2164" data-pin-href="https://www.pinterest.com/pin/create/button/" data-pin-log="button_pinit_bookmarklet" data-pin-x="20"><span data-dcnode-id="2165" instrument_node="">20</span></span><span data-dcnode-id="2163" instrument_node="">Save</span></span><span data-dcnode-id="2161" instrument_node=""> </span><span data-dcnode-id="2160" instrument_node="">
</span></div><span data-dcnode-id="2158" instrument_node="">
</span></div><span data-dcnode-id="2156" instrument_node="">
</span><div class="paragraph" data-dcnode-id="1985"><span data-dcnode-id="2155" instrument_node="">
When we see color we process it in a complex way, involving multiple parts of our brain.&nbsp; According to the </span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.td.org/Publications/Blogs/Science-of-Learning-Blog/2015/04/How-Color-Can-Affect-Learning"><span data-dcnode-id="2154" instrument_node="">Association of Talent Development</span></a><span data-dcnode-id="2152" instrument_node="">, neuroscientists discovered that information first goes to a color center in our brains, and from there information moves to other parts of the brain that detect motion, shapes, edges, and transitions; this tells us our response to color is very complicated and significant.</span><br data-dcnode-id="2151"><span data-dcnode-id="2150" instrument_node="">
&nbsp;</span><br data-dcnode-id="2149"><span data-dcnode-id="2148" instrument_node="">
First, how does memory work? </span><a data-dcnode-id="2146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicaldaily.com/pulse/how-human-memory-works-why-brain-remembers-and-forgets-plus-3-ways-improve-memory-354326"><span data-dcnode-id="2147" instrument_node="">Medical Daily</span></a><span data-dcnode-id="2145" instrument_node=""> states, “When you experience something, this event is converted into a pulse of electrical energy that zips along a network of neurons, according to Young. This information first gets stored in short-term memory, where it's available anywhere from a few seconds to a couple of minutes. Then, the experience gets transferred to long-term memory areas such as the&nbsp;</span><a data-dcnode-id="2143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicaldaily.com/hippocampus-shape-not-bulk-volume-indicates-how-well-our-memory-functions-333402"><span data-dcnode-id="2144" instrument_node="">hippocampus</span></a><span data-dcnode-id="2142" instrument_node="">&nbsp;—&nbsp;the center of emotion, memory, and the automatic nervous system —&nbsp;and finally reaching several storage regions across the brain.”</span><br data-dcnode-id="2141"><span data-dcnode-id="2140" instrument_node="">
&nbsp;</span><br data-dcnode-id="2139"><span data-dcnode-id="2138" instrument_node="">
</span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.edynco.com/instructional-design/how-colors-can-enhance-memory-performance/"><span data-dcnode-id="2137" instrument_node="">Edynco</span></a><span data-dcnode-id="2135" instrument_node=""> tells us, color is the most powerful stimulus to our brain.&nbsp; As information enters our brain through our eyes and ears it is stored in sensory memory.&nbsp; We can only pay attention to a small amount of information at once.&nbsp; When something attracts our attention it goes into working memory, or short-term memory, and color is what our brain notices first!&nbsp; According to the </span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3743993/"><span data-dcnode-id="2134" instrument_node="">National Center for Biotechnology Information</span></a><span data-dcnode-id="2132" instrument_node="">, information is then moved to long-term memory as a result of various control processes; this depends on the degree attached to a certain stimuli.&nbsp; In short, </span><em data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">what we give more attention to is more likely to be stored in long-term memory.</span></em><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">
&nbsp;</span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">
We also know that color aids pattern recognition.&nbsp; </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.td.org/Publications/Blogs/Science-of-Learning-Blog/2015/04/How-Color-Can-Affect-Learning"><span data-dcnode-id="2125" instrument_node="">The Association for Talent Development</span></a><span data-dcnode-id="2123" instrument_node=""> states, “In 2002, researchers discovered that subjects performed&nbsp;</span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cvcl.mit.edu/SUNSeminar/Gegenfurtner_colorscenememory_JEPLMC02.pdf" target="_blank"><span data-dcnode-id="2122" instrument_node="">five to 10 percent better</span></a><span data-dcnode-id="2120" instrument_node="">&nbsp;on standardized pattern recognition tests when they were administered in color rather black and white. The effect also boosted memory over time.”&nbsp; This result shows how much benefit color can have in our teaching and standardized test results if we use it to our advantage!</span><br data-dcnode-id="2119"><span data-dcnode-id="2118" instrument_node="">
&nbsp;</span><br data-dcnode-id="2117"><span data-dcnode-id="2116" instrument_node="">
Those in business and marketing would tell you the same thing- there is a strong correlation between what is stored in our memory and color; many advertisements use color to their advantage.&nbsp; For example, many fast-food restaurants use bright, vivid colors in their advertising, like McDonald’s red and yellow, to grab your attention and store in your memory.</span><br data-dcnode-id="2115"><span data-dcnode-id="2114" instrument_node="">
&nbsp;</span><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">
So, how can you use color to benefit your students’ learning?&nbsp; You need to take into consideration a couple of different factors, including individual colors, combination of colors, and the results you are trying to achieve.</span><br data-dcnode-id="2111"><span data-dcnode-id="2110" instrument_node="">
&nbsp;</span><br data-dcnode-id="2109"><span data-dcnode-id="2108" instrument_node="">
First, since individual colors elicit different responses, it is important to know these responses.&nbsp; </span><a data-dcnode-id="2106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.shiftelearning.com/blog/how-do-colors-influence-learning"><span data-dcnode-id="2107" instrument_node="">Shift Learning</span></a><span data-dcnode-id="2105" instrument_node=""> gives helpful explanations of colors and how they enhance learning.</span><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node="">
&nbsp;</span><br data-dcnode-id="2102"><span data-dcnode-id="2101" instrument_node="">
</span><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Green</span></strong><br data-dcnode-id="2098"><span data-dcnode-id="2097" instrument_node="">
&nbsp;</span><br data-dcnode-id="2096"><span data-dcnode-id="2095" instrument_node="">
Imagine a lush forest or a beautiful field.&nbsp; Does it give you a brief sense of calmness?&nbsp; Green reminds us of nature, and because of this has a calming effect.&nbsp; Green increases efficiency and focus, and is great for when you need your students to concentrate for a long time.&nbsp;</span><br data-dcnode-id="2094"><span data-dcnode-id="2093" instrument_node="">
&nbsp;</span><br data-dcnode-id="2092"><span data-dcnode-id="2091" instrument_node="">
</span><strong data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Red</span></strong><br data-dcnode-id="2088"><span data-dcnode-id="2087" instrument_node="">
&nbsp;</span><br data-dcnode-id="2086"><span data-dcnode-id="2085" instrument_node="">
The color red stimulates the adrenal glands, according to </span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.td.org/Publications/Blogs/Science-of-Learning-Blog/2015/04/How-Color-Can-Affect-Learning"><span data-dcnode-id="2084" instrument_node="">The Association for Talent Development</span></a><span data-dcnode-id="2082" instrument_node="">.&nbsp; It can evoke feelings of energy and threat, but has also appears to improve focus and performance.</span><br data-dcnode-id="2081"><span data-dcnode-id="2080" instrument_node="">
&nbsp;</span><br data-dcnode-id="2079"><span data-dcnode-id="2078" instrument_node="">
</span><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Orange</span></strong><br data-dcnode-id="2075"><span data-dcnode-id="2074" instrument_node="">
&nbsp;</span><br data-dcnode-id="2073"><span data-dcnode-id="2072" instrument_node="">
Orange is a definite mood-lifter! This welcoming color provides comfort and enhances neural functioning.</span><br data-dcnode-id="2071"><span data-dcnode-id="2070" instrument_node="">
&nbsp;</span><br data-dcnode-id="2069"><span data-dcnode-id="2068" instrument_node="">
However, the color orange may be over stimulating for some students; keep this in mind if you have an exceptionally energetic class.&nbsp; So although, orange can be a great color to use, it’s best in small doses!</span><br data-dcnode-id="2067"><span data-dcnode-id="2066" instrument_node="">
&nbsp;</span><br data-dcnode-id="2065"><span data-dcnode-id="2064" instrument_node="">
</span><strong data-dcnode-id="2062"><span data-dcnode-id="2063" instrument_node="">Pink</span></strong><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">
&nbsp;</span><br data-dcnode-id="2059"><span data-dcnode-id="2058" instrument_node="">
The color pink promotes calmness and can reduce heart rate.</span><br data-dcnode-id="2057"><span data-dcnode-id="2056" instrument_node="">
&nbsp;</span><br data-dcnode-id="2055"><span data-dcnode-id="2054" instrument_node="">
</span><strong data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">Blue</span></strong><br data-dcnode-id="2051"><span data-dcnode-id="2050" instrument_node="">
&nbsp;</span><br data-dcnode-id="2049"><span data-dcnode-id="2048" instrument_node="">
Contrary to popular belief, blue does not equal sadness!&nbsp; Blue promotes productivity and is best for challenging learning situations.&nbsp; </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//info.shiftelearning.com/blog/how-do-colors-influence-learning"><span data-dcnode-id="2047" instrument_node="">Shift Learning</span></a><span data-dcnode-id="2045" instrument_node=""> states, “…blue is great for promoting high levels of thought, but too much can create a sense of detachment and coldness.” It is helpful to mix blue with warmer colors.</span><br data-dcnode-id="2044"><span data-dcnode-id="2043" instrument_node="">
&nbsp;</span><br data-dcnode-id="2042"><span data-dcnode-id="2041" instrument_node="">
</span><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Yellow</span></strong><br data-dcnode-id="2038"><span data-dcnode-id="2037" instrument_node="">
&nbsp;</span><br data-dcnode-id="2036"><span data-dcnode-id="2035" instrument_node="">
Typically known as a cheerful color, the color yellow can improve happiness; too much yellow can produce stress, though.</span><br data-dcnode-id="2034"><span data-dcnode-id="2033" instrument_node="">
&nbsp;</span><br data-dcnode-id="2032"><span data-dcnode-id="2031" instrument_node="">
</span><strong data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Red vs. Blue</span></strong><br data-dcnode-id="2028"><span data-dcnode-id="2027" instrument_node="">
&nbsp;</span><br data-dcnode-id="2026"><span data-dcnode-id="2025" instrument_node="">
There was a </span><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2009/02/06/health/06iht-color.1.19983382.html"><span data-dcnode-id="2024" instrument_node="">study</span></a><span data-dcnode-id="2022" instrument_node=""> done at the University of British Columbia, published in Science magazine, to observe how the cognitive performance of participants varied depending on whether they saw red or blue when they performed tasks.&nbsp; “Red groups did better on tests of recall and attention to detail, like remembering words or checking spelling and punctuation. Blue groups did better on tests requiring invention and imagination: coming up with creative uses for a brick or creating toys from collections of shapes.”</span><br data-dcnode-id="2021"><span data-dcnode-id="2020" instrument_node="">
&nbsp;</span><br data-dcnode-id="2019"><span data-dcnode-id="2018" instrument_node="">
Red color should be used when you want to improve memory on completing a task like proofreading.&nbsp; Blue should be used when your students are brainstorming or you want them to think creatively and out-of-the-box.</span><br data-dcnode-id="2017"><span data-dcnode-id="2016" instrument_node="">
&nbsp;</span><br data-dcnode-id="2015"><span data-dcnode-id="2014" instrument_node="">
Another factor that needs to be considered is when multiple colors are involved.&nbsp; When the right combination of colors is used, it can produce higher levels of contrast.&nbsp; It’s important to consider the contrast of colors in your classroom.&nbsp; The background of what students see should contrast with the foreground, or text.&nbsp; If the background and foreground are monochromatic (same color, different hue), then it will not stick as well to your students’ memory.&nbsp;</span><br data-dcnode-id="2013"><span data-dcnode-id="2012" instrument_node="">
&nbsp;</span><br data-dcnode-id="2011"><span data-dcnode-id="2010" instrument_node="">
Teaching tools such as PowerPoint slides, posters, worksheets, etc. should have contrast between the background and foreground, but should also be aesthetically pleasing and easy to look at.&nbsp; A lighter background and darker foreground enhances readability.</span><br data-dcnode-id="2009"><span data-dcnode-id="2008" instrument_node="">
&nbsp;</span><br data-dcnode-id="2007"><span data-dcnode-id="2006" instrument_node="">
Different colors and combinations of colors can have a stronger effect in one area over another area, so it’s important to think about what you are hoping to achieve.&nbsp; For example, </span><a data-dcnode-id="2004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.edynco.com/instructional-design/how-colors-can-enhance-memory-performance/"><span data-dcnode-id="2005" instrument_node="">Edynco</span></a><span data-dcnode-id="2003" instrument_node=""> tells us to use warm colors (red, orange, yellow) to stimulate, and cool colors (blue, green, purple) to calm.</span><br data-dcnode-id="2002"><span data-dcnode-id="2001" instrument_node="">
&nbsp;</span><br data-dcnode-id="2000"><span data-dcnode-id="1999" instrument_node="">
You can use coloring as an interactive experience as often as you want in class, but blend colors strategically in visuals or decor, keeping in mind that too many different colors can create chaos and confusion.&nbsp; When used the right way, color can have an immense benefit to your students’ memory and performance!&nbsp;</span><br data-dcnode-id="1998"><span data-dcnode-id="1997" instrument_node="">
</span><br data-dcnode-id="1996"><span data-dcnode-id="1995" instrument_node="">
A great way to get started with incorporating color is to try visual note taking strategies in your classroom. &nbsp;With </span><a data-dcnode-id="1993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mathgiraffe.com/doodle-notes.html"><span data-dcnode-id="1994" instrument_node="">doodle notes</span></a><span data-dcnode-id="1992" instrument_node="">, students can interact with their note pages through doodling, coloring, patterns, embellishments, color coding, and lettering in ways that increase memory. &nbsp;Learn more about </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mathgiraffe.com/blog/dual-coding-theory-visual-note-taking"><span data-dcnode-id="1991" instrument_node="">how visual notes blend graphics and text to increase student focus, learning, and retention.</span></a><br data-dcnode-id="1989"><span data-dcnode-id="1988" instrument_node="">
&nbsp;</span><br data-dcnode-id="1987"><span data-dcnode-id="1986" instrument_node="">

</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">
							I know this comment is a few years late, but due to the pandemic, I have been homeschooling my son and a friend's daughter. I make them draw colour margins and borders on each page and let them use colour pencils to write their headings, subheadings and titles. Their teachers have a problem with this. I explained to my son's teacher that my reasons are to stimulate their brain development and to teach them to take pride in their work. Do teachers not learn about child psycology and many different techniques to help kids instead of sending them to doctors? I was and am still in shocked at the teachers's comment. Both children have improved tremendously in their schoolwork and cursive skills. Thank you for this article. I will share your insights with the teachers.

</span><p data-dcnode-id="945"><span data-dcnode-id="950" instrument_node="">
							Hi Melanie,</span><br data-dcnode-id="949"><span data-dcnode-id="948" instrument_node="">
Thanks so much for commenting. I'm so glad you are enjoying the blog. Make sure you also sign up for my emails in the "Subscribe" tab on the mathgiraffe.com website so you can get all kinds of freebies and tips to try in your classroom. They do get some benefit from you as the teacher using color coding, but these effects are always enhanced if they can do it themselves in their own notes with their own hands. This will activate those neural pathways and help them to make connections. Using colors consistently is nice for things that continue across lessons (like always doing like terms in the same color for example, always using red for negatives, etc.) but starting with baby steps using it here and there while you can is great! It's good to just get started and you'll then slowly see how to build upon it as you go. Enjoy!</span><br data-dcnode-id="947"><span data-dcnode-id="946" instrument_node="">
-Brigid
