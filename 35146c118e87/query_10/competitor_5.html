sk (see above). They trained two groups of subjects on the task, and following training, one group was allowed normal sleep and the other was sleep deprived, and then both groups were tested on the next day. There was no difference in performance of the sleep- and non-sleep-deprived subjects on the task, indicating a time-dependent and not a state-dependent process of consolidation. They addressed inconsistencies between their findings and earlier ones suggesting that sleep serves a special role in procedural consolidation, stating: “A number of studies have found a role for sleep in consolidation of certain kinds of perceptual skills. In those studies, sleep, and not simply the passage of time, has been shown to be required for changes in performance between the end of training and test of recall.” By contrast, “we found no significant effect of sleep on performance.”</span></p><p data-dcnode-id="9535"><span data-dcnode-id="9536" instrument_node="">Until recently, “consolidation” in the sleep literature was used in the classic sense of referring to processes that strengthen labile traces—with straightforward predictions. In this sense, learned material of waking would reside in a temporarily unstable state requiring the stabilization/consolidation of sleep. Accordingly, normal sleep would “consolidate” waking experiences, maintaining levels of performance, whereas alterations of sleep would disrupt consolidation, leading to poorer performance.</span></p><p data-dcnode-id="9530"><span data-dcnode-id="9534" instrument_node="">Seemingly lost in the current debate is the fact that the term “consolidation” (at least for recent human sleep studies) has taken on a very different meaning; that is, rather than referring to a stabilization of learning, it is used to signify </span><em data-dcnode-id="9532"><span data-dcnode-id="9533" instrument_node="">improvements</span></em><span data-dcnode-id="9531" instrument_node=""> in learning—or gains in performance with sleep.</span></p><p data-dcnode-id="9516"><span data-dcnode-id="9529" instrument_node="">In an initial report, which became the prototype for others that followed, </span><a class="workspace-trigger" data-dcnode-id="9527" href="#BIB66" name="bBIB66"><span data-dcnode-id="9528" instrument_node="">Karni and Sagi (1993)</span></a><span data-dcnode-id="9526" instrument_node=""> showed that the mere passage of time improved performance on a perceptual learning task. The task involved identifying the orientation of three diagonal lines (arranged horizontally or vertically) embedded in a background of horizontal lines. The stimulus (target and background elements) was presented briefly (10 ms) in one quadrant of the visual field followed by a blank screen and then a masking pattern (100 ms). The interval between the onset of the stimulus and onset of the mask (stimulus-to-mask onset asynchrony [SOA]) was varied, and the measure of performance was an 80% correct identification (threshold SOA) of the stimulus (horizontal or vertical lines) at a set interval. The index of improved performance was a decrease in threshold SOA </span><a class="workspace-trigger" data-dcnode-id="9524" href="#BIB66" name="bBIB66"><span data-dcnode-id="9525" instrument_node="">Karni and Sagi 1993</span></a><span data-dcnode-id="9523" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9521" href="#BIB67" name="bBIB67"><span data-dcnode-id="9522" instrument_node="">Karni et al. 1994</span></a><span data-dcnode-id="9520" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="9518" href="#BIB66" name="bBIB66"><span data-dcnode-id="9519" instrument_node="">Karni and Sagi (1993)</span></a><span data-dcnode-id="9517" instrument_node=""> reported that subjects showed no improvement on the task immediately after training but marked improvement 8–10 hr following training.</span></p><p data-dcnode-id="9508"><span data-dcnode-id="9515" instrument_node="">In a follow-up examination of the effects of sleep on this perceptual task, </span><a class="workspace-trigger" data-dcnode-id="9513" href="#BIB67" name="bBIB67"><span data-dcnode-id="9514" instrument_node="">Karni et al. (1994)</span></a><span data-dcnode-id="9512" instrument_node=""> described gains in performance over a normal night of sleep, but none when REM sleep (but not SWS) was eliminated, and they concluded that consolidation in sleep “is strongly dependent on REM sleep.” Interestingly, </span><a class="workspace-trigger" data-dcnode-id="9510" href="#BIB67" name="bBIB67"><span data-dcnode-id="9511" instrument_node="">Karni et al. (1994)</span></a><span data-dcnode-id="9509" instrument_node=""> drew attention to differences between their paradigm and earlier ones, pointing out that they examined improvements in learning (and not loss), whereas previous studies assessed the effects of sleep on the retention of material, or the rate of forgetting.</span></p><p data-dcnode-id="9497"><span data-dcnode-id="9507" instrument_node="">As discussed, in an initial report, </span><a class="workspace-trigger" data-dcnode-id="9505" href="#BIB66" name="bBIB66"><span data-dcnode-id="9506" instrument_node="">Karni and Sagi (1993)</span></a><span data-dcnode-id="9504" instrument_node=""> demonstrated improved learning over time during waking, and in a follow-up study </span><a class="workspace-trigger" data-dcnode-id="9502" href="#BIB67" name="bBIB67"><span data-dcnode-id="9503" instrument_node="">(Karni et al., 1994)</span></a><span data-dcnode-id="9501" instrument_node="">, improvements over time during sleep (and during waking), raising the question as to the similarity/differences of the processes in the two states. This was clarified by </span><a class="workspace-trigger" data-dcnode-id="9499" href="#BIB65" name="bBIB65"><span data-dcnode-id="9500" instrument_node="">Karni (1995)</span></a><span data-dcnode-id="9498" instrument_node=""> stating: “Indeed our results suggest that REM sleep is not a unique brain state for memory processing in adults—normal skill (procedural) learning does occur during the waking state. Our somewhat counter-intuitive finding was, however, that much of this improvement happens not during or immediately after practice but rather 8–10 hr after a training session has ended, suggesting a slow, latent process of learning.” And further, “The issue of whether experienced-triggered brain changes, presumably occurring during sleep (for which REM sleep is needed) are qualitatively different from the neural mechanisms subserving waking state consolidation remains open. Nevertheless, one would expect that systematic deprivation of REM sleep would not be very detrimental to skill learning in general because normal consolidation should occur during the waking state.”</span></p><p data-dcnode-id="9495"><span data-dcnode-id="9496" instrument_node="">In effect, then, as discussed for consolidation as stabilization, consolidation as enhancement (improvement) appears to be state independent. Enhancement would be expected to occur 8–10 hr following training, independent of state.</span></p><p data-dcnode-id="9469"><span data-dcnode-id="9494" instrument_node="">Although Karni described comparable enhancement on the perceptual task in waking and sleep, subsequent studies </span><a class="workspace-trigger" data-dcnode-id="9492" href="#BIB119" name="bBIB119"><span data-dcnode-id="9493" instrument_node="">Stickgold et al. 2000a</span></a><span data-dcnode-id="9491" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9489" href="#BIB120" name="bBIB120"><span data-dcnode-id="9490" instrument_node="">Stickgold et al. 2000b</span></a><span data-dcnode-id="9488" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9486" href="#BIB47" name="bBIB47"><span data-dcnode-id="9487" instrument_node="">Gais et al. 2000</span></a><span data-dcnode-id="9485" instrument_node=""> using this same task reported significant gains in performance (enhancement) during sleep, but failed to demonstrate the same degree of improvement during waking as shown by Karni and associates </span><a class="workspace-trigger" data-dcnode-id="9483" href="#BIB66" name="bBIB66"><span data-dcnode-id="9484" instrument_node="">Karni and Sagi 1993</span></a><span data-dcnode-id="9482" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9480" href="#BIB67" name="bBIB67"><span data-dcnode-id="9481" instrument_node="">Karni et al. 1994</span></a><span data-dcnode-id="9479" instrument_node="">. It was also the case that studies differed with respect to the role served by different states of sleep in consolidation, reporting, for instance, that consolidation/enhancement occurs during REM sleep </span><a class="workspace-trigger" data-dcnode-id="9477" href="#BIB67" name="bBIB67"><span data-dcnode-id="9478" instrument_node="">(Karni et al., 1994)</span></a><span data-dcnode-id="9476" instrument_node="">, during SWS (early sleep dominated by SWS) </span><a class="workspace-trigger" data-dcnode-id="9474" href="#BIB47" name="bBIB47"><span data-dcnode-id="9475" instrument_node="">(Gais et al., 2000)</span></a><span data-dcnode-id="9473" instrument_node="">, or both (amount of SWS in the first quartile of the night + amount of REM sleep in the last quartile of the night) </span><a class="workspace-trigger" data-dcnode-id="9471" href="#BIB119" name="bBIB119"><span data-dcnode-id="9472" instrument_node="">(Stickgold et al., 2000a)</span></a><span data-dcnode-id="9470" instrument_node="">. The source of these differences remains unclear, but resolving them is undoubtedly important, particularly the extent to which performance improves during waking on the task.</span></p><p data-dcnode-id="9464"><span data-dcnode-id="9468" instrument_node="">There has been a recent shift in research paradigms in this area from perceptual learning to motor learning. Avi Karni (with Leslie Ungerleider) developed a motor task, which like Karni's perceptual discrimination task, has subsequently been adopted by others. The task consists of a sequence of four finger movements (excluding the thumb), with one sequence (e.g., 4-1-3-2-4) serving as the trained sequence and another as the untrained or control sequence. The measure of improved performance is a reduction in errors (accuracy) and an increase in speed. </span><a class="workspace-trigger" data-dcnode-id="9466" href="#BIB68" name="bBIB68"><span data-dcnode-id="9467" instrument_node="">Karni et al. (1998)</span></a><span data-dcnode-id="9465" instrument_node=""> reported that (1) 10–20 min of daily practice on the task produced large gains in performance that reached asymptote in 3 weeks; and (2) germane to present issues, brief training on the task (six 40 s spaced sessions) resulted in improvement (enhancement) on the task 24 hr after training—similar to that described for perceptual learning. According to the authors, limited training on the task not only produced gains during the sessions but also initiated delayed improvement, indicating that “some gains require time to become effective and continue to develop after motor practice has ended.”</span></p><p data-dcnode-id="9453"><span data-dcnode-id="9463" instrument_node="">Although these investigators </span><a class="workspace-trigger" data-dcnode-id="9461" href="#BIB68" name="bBIB68"><span data-dcnode-id="9462" instrument_node="">(Karni et al., 1998)</span></a><span data-dcnode-id="9460" instrument_node=""> described changes in performance 24 hr after training, this interval was apparently not chosen to assess the effects of sleep on the task. No mention was made of sleep. They instead </span><a class="workspace-trigger" data-dcnode-id="9458" href="#BIB126" name="bBIB126"><span data-dcnode-id="9459" instrument_node="">(Ungerleider et al., 2002)</span></a><span data-dcnode-id="9457" instrument_node=""> noted the similarity between their findings and earlier ones on perceptual and motor learning and concluded: “These results, and those of </span><a class="workspace-trigger" data-dcnode-id="9455" href="#BIB66" name="bBIB66"><span data-dcnode-id="9456" instrument_node="">Karni and Sagi (1993)</span></a><span data-dcnode-id="9454" instrument_node="">, thus point to a window of about 6 hr for consolidation to occur.”</span></p><p data-dcnode-id="9439"><span data-dcnode-id="9452" instrument_node="">The effects of sleep on performance on the finger tapping task have subsequently been examined using sleep deprivation </span><a class="workspace-trigger" data-dcnode-id="9450" href="#BIB40" name="bBIB40"><span data-dcnode-id="9451" instrument_node="">(Fischer et al., 2002)</span></a><span data-dcnode-id="9449" instrument_node=""> and non-sleep deprivation </span><a class="workspace-trigger" data-dcnode-id="9447" href="#BIB137" name="bBIB137"><span data-dcnode-id="9448" instrument_node="">Walker et al. 2002</span></a><span data-dcnode-id="9446" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9444" href="#BIB138" name="bBIB138"><span data-dcnode-id="9445" instrument_node="">Walker et al. 2003a</span></a><span data-dcnode-id="9443" instrument_node=""> techniques. </span><a class="workspace-trigger" data-dcnode-id="9441" href="#BIB138" name="bBIB138"><span data-dcnode-id="9442" instrument_node="">Walker et al. (2003a)</span></a><span data-dcnode-id="9440" instrument_node=""> reported that training subjects in the morning (10:00 AM) and then testing them at three successive 4 hr intervals throughout the day resulted in linear increases in performance, but gains in performance during waking were significantly less than with overnight sleep.</span></p><p data-dcnode-id="9434"><span data-dcnode-id="9438" instrument_node="">Using a deprivation procedure, </span><a class="workspace-trigger" data-dcnode-id="9436" href="#BIB40" name="bBIB40"><span data-dcnode-id="9437" instrument_node="">Fischer et al. (2002)</span></a><span data-dcnode-id="9435" instrument_node=""> trained four groups of subjects on the finger tapping task—two groups in the evening (10:00 PM) and two in the morning (10:00 AM) and then tested each group 8 hr later. One pair of each group was sleep deprived and the other received normal sleep, resulting in the following four groups: nighttime waking (sleep deprivation), nighttime sleep (as normal), daytime waking (as normal), and daytime sleep (not normal). They described greater gains in performance (speed on the task) over intervals of sleep (nighttime and daytime) than waking (nighttime and daytime).</span></p><p data-dcnode-id="9426"><span data-dcnode-id="9433" instrument_node="">Similar to differences in stages of sleep contributing to perceptual learning, overnight improvement on the finger tapping task was variously attributed to stage two SWS </span><a class="workspace-trigger" data-dcnode-id="9431" href="#BIB137" name="bBIB137"><span data-dcnode-id="9432" instrument_node="">(Walker et al., 2002)</span></a><span data-dcnode-id="9430" instrument_node=""> and to REM sleep </span><a class="workspace-trigger" data-dcnode-id="9428" href="#BIB40" name="bBIB40"><span data-dcnode-id="9429" instrument_node="">(Fischer et al., 2002)</span></a><span data-dcnode-id="9427" instrument_node="">.</span></p><p data-dcnode-id="9412"><span data-dcnode-id="9425" instrument_node="">While the foregoing studies showed that sleep contributes to overnight improvement on the task, they also importantly demonstrated that effects are not restricted to sleep but also occur during waking. In the </span><a class="workspace-trigger" data-dcnode-id="9423" href="#BIB138" name="bBIB138"><span data-dcnode-id="9424" instrument_node="">Walker et al. (2003a)</span></a><span data-dcnode-id="9422" instrument_node=""> report, changes in waking were progressive but marginally statistically significant (see their Figure 2A), whereas for </span><a class="workspace-trigger" data-dcnode-id="9420" href="#BIB40" name="bBIB40"><span data-dcnode-id="9421" instrument_node="">Fischer et al. (2002)</span></a><span data-dcnode-id="9419" instrument_node="">, improvements in waking were highly statistically significant (daytime waking group). These findings, combined with those on perceptual learning </span><a class="workspace-trigger" data-dcnode-id="9417" href="#BIB66" name="bBIB66"><span data-dcnode-id="9418" instrument_node="">Karni and Sagi 1993</span></a><span data-dcnode-id="9416" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9414" href="#BIB67" name="bBIB67"><span data-dcnode-id="9415" instrument_node="">Karni et al. 1994</span></a><span data-dcnode-id="9413" instrument_node="">, thus point to a time-dependent process of improvement on some perceptual and motor skills during both waking and sleep.</span></p><p data-dcnode-id="9389"><span data-dcnode-id="9411" instrument_node="">Although enhancement may prove to be a significant mechanism for the slow, time-dependent reorganization of procedural skills, it is important to note, as discussed by </span><a class="workspace-trigger" data-dcnode-id="9409" href="#BIB138" name="bBIB138"><span data-dcnode-id="9410" instrument_node="">Walker et al. (2003a)</span></a><span data-dcnode-id="9408" instrument_node="">, that gains in performance with the passage of time (in waking or sleep) are very small compared to those found with practice on a task. Specifically, </span><a class="workspace-trigger" data-dcnode-id="9406" href="#BIB138" name="bBIB138"><span data-dcnode-id="9407" instrument_node="">Walker et al. (2003a)</span></a><span data-dcnode-id="9405" instrument_node=""> reported that the performance of subjects receiving repeated practice on the finger tapping task </span><a class="workspace-trigger" data-dcnode-id="9403" href="#BIB68" name="bBIB68"><span data-dcnode-id="9404" instrument_node="">(Karni et al., 1998)</span></a><span data-dcnode-id="9402" instrument_node=""> was “far in excess of values achieved by subjects in this study” (i.e., values due to enhancement in sleep). In addition, while enhancement has been described for the finger tapping task, it has not been demonstrated for other motor tasks </span><a class="workspace-trigger" data-dcnode-id="9400" href="#BIB30" name="bBIB30"><span data-dcnode-id="9401" instrument_node="">Donchin et al. 2002</span></a><span data-dcnode-id="9399" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9397" href="#BIB51" name="bBIB51"><span data-dcnode-id="9398" instrument_node="">Goedert and Willingham 2002</span></a><span data-dcnode-id="9396" instrument_node="">. For instance, </span><a class="workspace-trigger" data-dcnode-id="9394" href="#BIB30" name="bBIB30"><span data-dcnode-id="9395" instrument_node="">Donchin et al. (2002)</span></a><span data-dcnode-id="9393" instrument_node=""> trained subjects over three sessions on an arm reaching task (see above), tested them 24 hr later, and reported that performance </span><em data-dcnode-id="9391"><span data-dcnode-id="9392" instrument_node="">declined</span></em><span data-dcnode-id="9390" instrument_node=""> on 24 hr retest from peak performance on the third session of training (i.e., lack of enhancement).</span></p><section data-dcnode-id="9351" id="aep-section-id19"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9387"><span data-dcnode-id="9388" instrument_node="">Unresolved Issues</span></h4><p data-dcnode-id="9382"><span data-dcnode-id="9386" instrument_node="">To summarize, procedural memories, like declarative memories, consolidate over time (time dependent). This process begins with task initiation, and if not disrupted by competing tasks, proceeds unabated until completion, generally in 4–8 hr. Consolidation (as stabilization) appears to be state independent; that is, once initiated (in waking) it proceeds continuously through waking and possibly into sleep. Sleep, however, serves no unique role in procedural consolidation. A process of enhancement has recently been described for some perceptual and motor skills consisting of </span><em data-dcnode-id="9384"><span data-dcnode-id="9385" instrument_node="">improvements</span></em><span data-dcnode-id="9383" instrument_node=""> in performance with the passage of time without further practice on a task. Enhancement has been shown to occur during both waking and sleep, but reportedly to a much greater degree in sleep than waking for some tasks in some studies.</span></p><p data-dcnode-id="9380"><span data-dcnode-id="9381" instrument_node="">To a large extent, the current debate on the role of sleep in memory consolidation appears to revolve around the question of whether enhancement is unique to sleep or is more pronounced in sleep than in waking. In the following, we briefly address some unresolved issues/questions on enhancement.</span></p><p data-dcnode-id="9375"><span data-dcnode-id="9379" instrument_node="">1. Is enhancement a general phenomenon of perceptual/motor learning? To date, enhancement has been demonstrated for one perceptual skill (perceptual discrimination task) and one motor task (finger tapping task). As a relatively new phenomenon, enhancement has not been widely examined. As discussed, however, </span><a class="workspace-trigger" data-dcnode-id="9377" href="#BIB30" name="bBIB30"><span data-dcnode-id="9378" instrument_node="">Donchin et al. (2002)</span></a><span data-dcnode-id="9376" instrument_node=""> described consolidation (as stabilization) for an arm reaching task but were unable to show enhancement with this same task. The tasks to which enhancement applies need to be determined.</span></p><p data-dcnode-id="9373"><span data-dcnode-id="9374" instrument_node="">2. If enhancement were to be demonstrated for other tasks, would it differ in degree across behavioral states as reported for the perceptual discrimination and finger tapping tasks in some studies?</span></p><p data-dcnode-id="9368"><span data-dcnode-id="9372" instrument_node="">3. What is the contribution of enhancement to improvements in skill learning? As noted above, </span><a class="workspace-trigger" data-dcnode-id="9370" href="#BIB138" name="bBIB138"><span data-dcnode-id="9371" instrument_node="">Walker et al. (2003a)</span></a><span data-dcnode-id="9369" instrument_node=""> reported that gains in performance with the passage of time (enhancement) on the finger tapping task were very small compared to those found with repeated practice on the task. This raises the question of the overall contribution of enhancement, relative to rehearsals, in the mastery of skills. For example, certain professions (concert musicians, professional athletes) require finely tuned motor skills that develop with years (or a lifetime) of practice. What is the relative contribution of practice to enhancement in the development of the skills required for these professions—or the common skills of daily life?</span></p><p data-dcnode-id="9354"><span data-dcnode-id="9367" instrument_node="">4. What mechanisms may be responsible for enhancement in sleep—or waking? In a recent review, </span><a class="workspace-trigger" data-dcnode-id="9365" href="#BIB136" name="bBIB136"><span data-dcnode-id="9366" instrument_node="">Walker (2004)</span></a><span data-dcnode-id="9364" instrument_node=""> discussed several processes that could account for enhancement in sleep, including sleep spindles, PGO waves </span><a class="workspace-trigger" data-dcnode-id="9362" href="#BIB26" name="bBIB26"><span data-dcnode-id="9363" instrument_node="">(Datta, 2000)</span></a><span data-dcnode-id="9361" instrument_node="">, levels of transmitters/neuromodulators, and immediate early gene expression. For example, he pointed out that “during REM sleep, there is a significant increase in cholinergic tone, which has been considered to play a role in sleep-dependent plasticity.” But continuing, </span><a class="workspace-trigger" data-dcnode-id="9359" href="#BIB136" name="bBIB136"><span data-dcnode-id="9360" instrument_node="">Walker (2004)</span></a><span data-dcnode-id="9358" instrument_node=""> indicated that it is probably premature to attribute the possible beneficial effects of sleep on memory (enhancement) to any one or group of factors, including transmitter levels, stating that “direct evidence implicating post-sleep behavioral learning associated with changes in neurotransmitter concentration during either NREM or REM sleep remains scarce.” It also is quite likely that general properties of sleep, rather than sleep mechanisms per se, may be responsible for the reported greater degree of enhancement in sleep than waking in some studies; that is, less interference from competing behaviors in sleep than waking for some tasks. In this regard, </span><a class="workspace-trigger" data-dcnode-id="9356" href="#BIB52" name="bBIB52"><span data-dcnode-id="9357" instrument_node="">Gottselig et al. (2004)</span></a><span data-dcnode-id="9355" instrument_node=""> recently reported that subjects showed the same degree of improvement on an auditory sequence task following periods of restful waking or sleep and attributed improvement in both instances to the lack of interference from competing events.</span></p><p data-dcnode-id="9352"><span data-dcnode-id="9353" instrument_node="">5. Finally, what stage(s) of sleep is critical for enhancement? As discussed, findings conflict regarding the specific stages of sleep involved in consolidation/enhancement; reports have variously implicated SWS, REM sleep, or both in these processes. This needs to be resolved.</span></p></section></section><section data-dcnode-id="9248" id="aep-section-id20"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9348"><span data-dcnode-id="9349" instrument_node="">“Replay” of Patterns of Neural Activity of Waking in Subsequent Sleep in Animals</span></h3><p data-dcnode-id="9304"><span data-dcnode-id="9347" instrument_node="">A process commonly referred to as “replay” has recently been described wherein patterns of neural activity in waking are repeated in subsequent episodes of sleep </span><a class="workspace-trigger" data-dcnode-id="9345" href="#BIB95" name="bBIB95"><span data-dcnode-id="9346" instrument_node="">Pavlides and Winson 1989</span></a><span data-dcnode-id="9344" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9342" href="#BIB140" name="bBIB140"><span data-dcnode-id="9343" instrument_node="">Wilson and McNaughton 1994</span></a><span data-dcnode-id="9341" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9339" href="#BIB108" name="bBIB108"><span data-dcnode-id="9340" instrument_node="">Skaggs and McNaughton 1996</span></a><span data-dcnode-id="9338" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9336" href="#BIB72" name="bBIB72"><span data-dcnode-id="9337" instrument_node="">Kudrimoti et al. 1999</span></a><span data-dcnode-id="9335" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9333" href="#BIB90" name="bBIB90"><span data-dcnode-id="9334" instrument_node="">Nadasdy et al. 1999</span></a><span data-dcnode-id="9332" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9330" href="#BIB56" name="bBIB56"><span data-dcnode-id="9331" instrument_node="">Hirase et al. 2001</span></a><span data-dcnode-id="9329" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9327" href="#BIB80" name="bBIB80"><span data-dcnode-id="9328" instrument_node="">Louie and Wilson 2001</span></a><span data-dcnode-id="9326" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9324" href="#BIB58" name="bBIB58"><span data-dcnode-id="9325" instrument_node="">Hoffman and McNaughton 2002</span></a><span data-dcnode-id="9323" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9321" href="#BIB77" name="bBIB77"><span data-dcnode-id="9322" instrument_node="">Lee and Wilson 2002</span></a><span data-dcnode-id="9320" instrument_node="">. Replay has been mainly, but not solely, demonstrated in the hippocampus and is thought to represent a reactivation, and hence consolidation, of hippocampally dependent memories in sleep. Although replay supports the view that sleep consolidates memories by rehearsing or replaying them in sleep, it is important to note that replay is not restricted to sleep, but has been shown to occur equally in (quiet) waking and sleep in rats </span><a class="workspace-trigger" data-dcnode-id="9318" href="#BIB72" name="bBIB72"><span data-dcnode-id="9319" instrument_node="">(Kudrimoti et al., 1999)</span></a><span data-dcnode-id="9317" instrument_node=""> and primates </span><a class="workspace-trigger" data-dcnode-id="9315" href="#BIB58" name="bBIB58"><span data-dcnode-id="9316" instrument_node="">(Hoffman and McNaughton, 2002)</span></a><span data-dcnode-id="9314" instrument_node="">. Although first described for sleep </span><a class="workspace-trigger" data-dcnode-id="9312" href="#BIB95" name="bBIB95"><span data-dcnode-id="9313" instrument_node="">Pavlides and Winson 1989</span></a><span data-dcnode-id="9311" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9309" href="#BIB140" name="bBIB140"><span data-dcnode-id="9310" instrument_node="">Wilson and McNaughton 1994</span></a><span data-dcnode-id="9308" instrument_node="">, replay is not specific to sleep. In addition, there is no evidence that replay serves to secure or consolidate memories </span><a class="workspace-trigger" data-dcnode-id="9306" href="#BIB6" name="bBIB6"><span data-dcnode-id="9307" instrument_node="">(Benington and Frank, 2003)</span></a><span data-dcnode-id="9305" instrument_node="">. It is very possible that neural circuits that are repeatedly or strongly activated in waking would, consequently, be those most likely to show rebound activation in subsequent sleep—or in waking. This reactivation would not necessarily consolidate replayed traces but may merely reflect their previous activation.</span></p><p data-dcnode-id="9302"><span data-dcnode-id="9303" instrument_node="">Although replay appears to be a reliable phenomenon for rats, the possibility exists that replay in sleep is unique to lower animals and has no counterpart in humans. For example, sequences of hippocampal activity corresponding to movements through a maze may be repeated during sleep in rats, whereas our hippocampal activity during sleep would poorly replicate routes taken to the grocery store and back—as seems to be the case. In effect, replay in sleep was lost with evolution.</span></p><p data-dcnode-id="9297"><span data-dcnode-id="9301" instrument_node="">As developed below, we view replay in animals as a process analogous to the episodic transfer of information from waking to sleep in humans </span><a class="workspace-trigger" data-dcnode-id="9299" href="#BIB45" name="bBIB45"><span data-dcnode-id="9300" instrument_node="">(Fosse et al., 2003)</span></a><span data-dcnode-id="9298" instrument_node="">. As will be discussed, the amount of material transferred from waking to sleep, however, in both animals and humans, appears to be quite small and unlikely serves a mnemonic function.</span></p><p data-dcnode-id="9286"><span data-dcnode-id="9296" instrument_node="">As mentioned, </span><a class="workspace-trigger" data-dcnode-id="9294" href="#BIB46" name="bBIB46"><span data-dcnode-id="9295" instrument_node="">Freud (1900)</span></a><span data-dcnode-id="9293" instrument_node=""> initially considered, but then dismissed, the notion that sleep serves a role in memory consolidation. This was based, in large part, on the mismatch between the cognitive content of waking and sleep; that is, other than brief intrusions of daytime material into sleep (day residue), waking experiences are not replicated in sleep. Although this is well recognized, surprisingly few studies have systematically examined the transfer of waking material into sleep </span><a class="workspace-trigger" data-dcnode-id="9291" href="#BIB28" name="bBIB28"><span data-dcnode-id="9292" instrument_node="">Dement et al. 1965</span></a><span data-dcnode-id="9290" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9288" href="#BIB45" name="bBIB45"><span data-dcnode-id="9289" instrument_node="">Fosse et al. 2003</span></a><span data-dcnode-id="9287" instrument_node="">.</span></p><p data-dcnode-id="9278"><span data-dcnode-id="9285" instrument_node="">In the most thorough study to date, </span><a class="workspace-trigger" data-dcnode-id="9283" href="#BIB45" name="bBIB45"><span data-dcnode-id="9284" instrument_node="">Fosse et al. (2003)</span></a><span data-dcnode-id="9282" instrument_node=""> examined the correspondence between waking experiences and dream reports of 29 subjects over a 14 day period, focusing on locations, actions, objects, characters, themes, and emotions. Of a total of 299 dream reports of SWS/REM sleep, only 5 (1.4%) were judged to be highly similar to waking events and qualified as strong candidates for the transfer of episodic memories from waking to sleep. </span><a class="workspace-trigger" data-dcnode-id="9280" href="#BIB45" name="bBIB45"><span data-dcnode-id="9281" instrument_node="">Fosse et al. (2003)</span></a><span data-dcnode-id="9279" instrument_node=""> thus concluded that “sleep has no role in episodic memory consolidation”; and further that “reactivation of episodic memories appears to be actively blocked during sleep.”</span></p><p data-dcnode-id="9274"><a class="workspace-trigger" data-dcnode-id="9276" href="#BIB103" name="bBIB103"><span data-dcnode-id="9277" instrument_node="">Schwartz (2003)</span></a><span data-dcnode-id="9275" instrument_node=""> recently drew attention to the seeming discrepancy between the small amount (1%–2%) of episodic material transferred from waking to sleep in humans and the presumably significant repetition of patterns of waking activity in sleep in animals—or replay.</span></p><p data-dcnode-id="9272"><span data-dcnode-id="9273" instrument_node="">In effect, replay in animals suggests that patterns of neural activity in the hippocampus/cortex are similar during waking and sleep, whereas the human data would indicate very dissimilar patterns during these two states, as shown by the pronounced mismatch between the episodic content of waking and sleep—only 1%–2% overlap.</span></p><p data-dcnode-id="9270"><span data-dcnode-id="9271" instrument_node="">The typical procedure for assessing replay in animals is to compare patterns of unit activity during well-trained tasks (task) of waking to patterns in sleep preceding (presleep) and following (postsleep) the task. The measure of “reactivation” is a greater similarity of patterns of activity in postsleep to task than presleep to task. Although not always the case, animals generally receive concentrated training on a familiar task which is followed immediately (or at least without intervening experiences) by sleep. These conditions favor reactivation—and certainly legitimately so.</span></p><p data-dcnode-id="9256"><span data-dcnode-id="9269" instrument_node="">Even under these circumstances, however, effects are quite small, i.e., percentages of reactivated patterns of hippocampal activity in sleep from waking (for review, see </span><a class="workspace-trigger" data-dcnode-id="9267" href="#BIB6" name="bBIB6"><span data-dcnode-id="9268" instrument_node="">Benington and Frank, 2003</span></a><span data-dcnode-id="9266" instrument_node="">). For instance, </span><a class="workspace-trigger" data-dcnode-id="9264" href="#BIB90" name="bBIB90"><span data-dcnode-id="9265" instrument_node="">Nadasdy et al. (1999)</span></a><span data-dcnode-id="9263" instrument_node=""> reported that 87 of 1716 (5%) sequences of hippocampal unit activity (triplets) were common to presleep and task (see above) compared to 160 of 1716 (9%) common to postsleep and task. Although this represented a statistically significant change from pre- to postsleep, the difference (4%) was not robust. In like manner, using a method of explained variance </span><a class="workspace-trigger" data-dcnode-id="9261" href="#BIB88" name="bBIB88"><span data-dcnode-id="9262" instrument_node="">(McNaughton et al., 2003)</span></a><span data-dcnode-id="9260" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9258" href="#BIB72" name="bBIB72"><span data-dcnode-id="9259" instrument_node="">Kudrimoti et al. (1999)</span></a><span data-dcnode-id="9257" instrument_node=""> reported that ∼15% of the variance of ensemble activity (unit pairs) in the hippocampus during waking in rats could be explained by changes in postsleep relative to presleep.</span></p><p data-dcnode-id="9251"><span data-dcnode-id="9255" instrument_node="">Although these values (4%–15%) are higher than shown for episodic transfer in humans (1%–2%), it is important to again note that these studies generally involved well-trained tasks in confined environments. Transfer is reduced in unrestricted settings. For instance, McNaughton and colleagues (J.L. Gerrard et al., 2001, Soc. Neurosci., abstract Volume </span><em data-dcnode-id="9253"><span data-dcnode-id="9254" instrument_node="">27</span></em><span data-dcnode-id="9252" instrument_node="">, p. 1698) examined reactivation (replay) in sleep of two groups of rats: one group repeatedly circled a small tract (1–2 m), and the other group spent an equivalent amount of time exploring a long corridor (2 m × 13 m), rarely revisiting the same locations. They demonstrated that reactivation/replay was significantly less in the open environment than in the restricted environment, leading them to conclude that “repetition facilitates trace reactivation.” The foregoing suggests that reactivation decreases as the environment expands, such that reactivation for rats in their natural habitat would be quite low, possibly approaching episodic transfer in humans of 1%–2%.</span></p><p data-dcnode-id="9249"><span data-dcnode-id="9250" instrument_node="">In summary, a small percentage (1%–2%) of waking experiences transfer from waking to sleep in humans. Freud termed this the “day-residue” which can be incorporated into dreams. A similar phenomenon has been described in animals—the replay of ensembles of neural activity of waking in subsequent sleep. Although the precise relationship between replay in animals and episodic transfer in humans remains to be determined, there are parallels: the two processes appear to be of the same magnitude, involve the same structures, and apparently do not produce lasting changes.</span></p></section><section data-dcnode-id="9192" id="aep-section-id21"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9246"><span data-dcnode-id="9247" instrument_node="">Other Factors</span></h3><p data-dcnode-id="9232"><span data-dcnode-id="9245" instrument_node="">If sleep serves to consolidate experiences, it might be expected that species with the greatest cognitive demands would have the most sleep—or a direct relationship would be found between percentages of sleep/REM sleep and degree of cortical development (encephalization). </span><a class="workspace-trigger" data-dcnode-id="9243" href="#BIB106" name="bBIB106"><span data-dcnode-id="9244" instrument_node="">Siegel (2001)</span></a><span data-dcnode-id="9242" instrument_node=""> recently demonstrated, however, that no such relationship exists. Humans do not exhibit exceptionally high amounts of REM sleep but rather place intermediate among species in amounts of REM sleep and total sleep. Presumably, the most important factor in determining amounts of sleep/REM sleep is the degree of maturity at birth—animals mature at birth have low amounts of REM, while those immature at birth have high amounts of REM sleep </span><a class="workspace-trigger" data-dcnode-id="9240" href="#BIB144" name="bBIB144"><span data-dcnode-id="9241" instrument_node="">Zepelin 1989</span></a><span data-dcnode-id="9239" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9237" href="#BIB145" name="bBIB145"><span data-dcnode-id="9238" instrument_node="">Zepelin 2000</span></a><span data-dcnode-id="9236" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9234" href="#BIB107" name="bBIB107"><span data-dcnode-id="9235" instrument_node="">Siegel et al. 1999</span></a><span data-dcnode-id="9233" instrument_node="">.</span></p><p data-dcnode-id="9215"><span data-dcnode-id="9231" instrument_node="">Importantly, levels of sleep/REM sleep do not covary with encephalization or intelligence. The egg-laying platypus, a primitive mammal with a lisencephalic cortex, has the highest recorded amounts of REM sleep (8 hr/day) </span><a class="workspace-trigger" data-dcnode-id="9229" href="#BIB107" name="bBIB107"><span data-dcnode-id="9230" instrument_node="">(Siegel et al., 1999)</span></a><span data-dcnode-id="9228" instrument_node="">, whereas whales and dolphins, which by all accounts are very intelligent species, have the lowest levels of REM sleep (about 15 min/day) </span><a class="workspace-trigger" data-dcnode-id="9226" href="#BIB145" name="bBIB145"><span data-dcnode-id="9227" instrument_node="">Zepelin 2000</span></a><span data-dcnode-id="9225" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9223" href="#BIB106" name="bBIB106"><span data-dcnode-id="9224" instrument_node="">Siegel 2001</span></a><span data-dcnode-id="9222" instrument_node="">. It could be argued that the quality (or efficiency) of REM and not the quantity is the critical factor in determining its role in consolidation (e.g., humans can do more with less sleep). The sleep of higher organisms, however, does not appear to exhibit any unique characteristics that would set it apart from that of lower organisms, i.e., render it more efficient. For instance, the sleep architecture of cats and humans is remarkably similar, though differing with respect to amounts of REM and total sleep: 3.2 hr and 15.9 hr, respectively, for cats, and 1.9 hr and 8.0 hr for humans </span><a class="workspace-trigger" data-dcnode-id="9220" href="#BIB144" name="bBIB144"><span data-dcnode-id="9221" instrument_node="">Zepelin 1989</span></a><span data-dcnode-id="9219" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9217" href="#BIB145" name="bBIB145"><span data-dcnode-id="9218" instrument_node="">Zepelin 2000</span></a><span data-dcnode-id="9216" instrument_node="">.</span></p><p data-dcnode-id="9198"><span data-dcnode-id="9214" instrument_node="">With recent advances in gene expression profiling, several reports have demonstrated that a host of genes is differentially expressed in waking and sleep (for review, see </span><a class="workspace-trigger" data-dcnode-id="9212" href="#BIB123" name="bBIB123"><span data-dcnode-id="9213" instrument_node="">Tononi and Cirelli, 2001</span></a><span data-dcnode-id="9211" instrument_node="">). In initial studies, Tononi, Cirelli, and colleagues </span><a class="workspace-trigger" data-dcnode-id="9209" href="#BIB19" name="bBIB19"><span data-dcnode-id="9210" instrument_node="">Cirelli et al. 1996</span></a><span data-dcnode-id="9208" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9206" href="#BIB16" name="bBIB16"><span data-dcnode-id="9207" instrument_node="">Cirelli and Tononi 1998</span></a><span data-dcnode-id="9205" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9203" href="#BIB17" name="bBIB17"><span data-dcnode-id="9204" instrument_node="">Cirelli and Tononi 2000a</span></a><span data-dcnode-id="9202" instrument_node=""> reported that important “plasticity-related” genes are more highly expressed in waking than in sleep in rats, such as phosphorlyated CRE binding protein (P-CREB), Arc, BDNF, and nerve growth factor-induced A (NGFI-A). In a subsequent analysis of ∼10,000 genes, they found that only 0.5% were differentially expressed across behavioral states but emphasized that those showing greater expression in waking than sleep constituted important functional categories </span><a class="workspace-trigger" data-dcnode-id="9200" href="#BIB18" name="bBIB18"><span data-dcnode-id="9201" instrument_node="">(Cirelli and Tononi, 2000b)</span></a><span data-dcnode-id="9199" instrument_node="">. These included immediate early genes (IEGs) and transcription factors, genes related to energy metabolism, chaperones/heat shock proteins, growth factors/adhesion molecules, vesicle and synapse-related genes, neurotransmitter/hormone receptors, neurotransmitter transporters, and various enzymes.</span></p><p data-dcnode-id="9193"><span data-dcnode-id="9197" instrument_node="">The finding that genes associated with energy metabolism and transmitter functions are more highly expressed in waking than sleep supports other measures indicating that the brain (or cortex) is very “activated” in waking relative to sleep (SWS), while the further demonstration that IEGs and transcription factors (plasticity-related genes) are selectively upregulated in waking suggests that needs for information processing are high in waking and low (or absent) in sleep. Or, according to </span><a class="workspace-trigger" data-dcnode-id="9195" href="#BIB17" name="bBIB17"><span data-dcnode-id="9196" instrument_node="">Cirelli and Tononi (2000a)</span></a><span data-dcnode-id="9194" instrument_node="">, this would indicate that “molecular changes associated with the establishment of long term changes take place during waking and much less or not at all during sleep.”</span></p></section><section data-dcnode-id="9158" id="aep-section-id22"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9190"><span data-dcnode-id="9191" instrument_node="">What Is the Function of Sleep/REM Sleep?</span></h3><p data-dcnode-id="9182"><span data-dcnode-id="9189" instrument_node="">Although the proposal that sleep serves a role in memory consolidation </span><a class="workspace-trigger" data-dcnode-id="9187" href="#BIB62" name="bBIB62"><span data-dcnode-id="9188" instrument_node="">(Jenkins and Dallenbach, 1924)</span></a><span data-dcnode-id="9186" instrument_node=""> predates the discovery of REM sleep, the discovery of REM </span><a class="workspace-trigger" data-dcnode-id="9184" href="#BIB4" name="bBIB4"><span data-dcnode-id="9185" instrument_node="">(Aserinsky and Kleitman, 1953)</span></a><span data-dcnode-id="9183" instrument_node=""> undoubtedly provided a major boost to the view that sleep (or REM sleep) serves to process information. In effect, the identification of a sleep state with properties similar to wakefulness reinforced the notion that the function(s) of REM overlapped with those of waking, including information processing.</span></p><p data-dcnode-id="9177"><span data-dcnode-id="9181" instrument_node="">Although it is commonly believed that REM sleep is analogous to wakefulness, the two states are, in fact, very different. Aside from an activated forebrain (hippocampus and allo/neocortex), waking and REM share few properties. There is no counterpart in waking to various events of REM, including uncontrolled horizontal movement of the eyes, random contractions of various muscle groups, PGO waves, and profound muscle atonia </span><a class="workspace-trigger" data-dcnode-id="9179" href="#BIB131" name="bBIB131"><span data-dcnode-id="9180" instrument_node="">(Vertes, 1984)</span></a><span data-dcnode-id="9178" instrument_node="">. In many ways, REM is more similar to slow wave sleep than to waking. Unlike waking, both SWS and REM are unconscious states in which normal sensory input and motor output are blocked. In addition, REM is imbedded in SWS (all transitions to REM are through SWS) and dreams are present in both sleep states.</span></p><p data-dcnode-id="9166"><span data-dcnode-id="9176" instrument_node="">In accord with others </span><a class="workspace-trigger" data-dcnode-id="9174" href="#BIB8" name="bBIB8"><span data-dcnode-id="9175" instrument_node="">Benington and Heller 1995</span></a><span data-dcnode-id="9173" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9171" href="#BIB9" name="bBIB9"><span data-dcnode-id="9172" instrument_node="">Berger and Phillips 1995</span></a><span data-dcnode-id="9170" instrument_node="">, we believe that the primary function of sleep is restitution for the brain/CNS, and within this context, the role of REM sleep is to prepare the brain for recovery from sleep. As previously discussed in detail </span><a class="workspace-trigger" data-dcnode-id="9168" href="#BIB132" name="bBIB132"><span data-dcnode-id="9169" instrument_node="">(Vertes, 1986)</span></a><span data-dcnode-id="9167" instrument_node="">, we hold that the foremost function of REM sleep is to provide periodic endogenous stimulation to the brain, which serves to maintain minimum requisite levels of CNS activity throughout sleep. REM is the mechanism used by the brain to ensure and promote recovery from sleep. The brain is strongly depressed in SWS, particularly in delta sleep, and incapable of tolerating long continuous periods of relative suppression. REM serves the critical function of periodically activating the brain during sleep without awakening the organism or disturbing the continuity of sleep.</span></p><p data-dcnode-id="9164"><span data-dcnode-id="9165" instrument_node="">Our theory is consistent with sleep state organization, the main elements of which are that (1) the percentage of REM sleep is very high in early infancy (about 50% of total sleep time) and declines sharply at 2–3 months of age; (2) sleep continuously cycles from light to deep sleep and back to lighter stages of sleep as the cycle repeats itself; and (3) REM sleep is quite evenly distributed throughout sleep (occurring about every 90 min) and the duration of REM periods become progressively longer throughout sleep.</span></p><p data-dcnode-id="9159"><span data-dcnode-id="9163" instrument_node="">Regarding this organization, we suggest that the high percentage of REM sleep in neonates serves to offset equally high amounts of SWS in newborns (see also </span><a class="workspace-trigger" data-dcnode-id="9161" href="#BIB7" name="bBIB7"><span data-dcnode-id="9162" instrument_node="">Benington and Heller, 1994</span></a><span data-dcnode-id="9160" instrument_node="">); that sleep cyclically alternates between light and deep sleep to prevent the brain from dwelling too long in deep SWS; and that the progressively longer periods of REM throughout sleep serve to prime the brain for a return to consciousness as waking approaches. In summary, SWS and REM sleep serve complementary functions: SWS is restorative for the brain (and possibly the body), whereas REM sleep ensures smooth transitions between SWS and waking.</span></p></section><section data-dcnode-id="9140" id="aep-section-id23"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9156"><span data-dcnode-id="9157" instrument_node="">Summary and Conclusions</span></h3><p data-dcnode-id="9154"><span data-dcnode-id="9155" instrument_node="">Although there appears to be fairly widespread support for the notion that memories are processed/consolidated offline in sleep, there is not sufficient evidence for it. Early work in animals and humans failed to establish a link between sleep and learning/memory, and no compelling evidence has emerged from recent studies to support such a relationship.</span></p><p data-dcnode-id="9152"><span data-dcnode-id="9153" instrument_node="">The consensus position is that sleep serves no role in declarative memory; that is, no role in memory for facts and events—or the type of memory commonly referred to by the terms “memory” or “remembering.” The lack of involvement of sleep in declarative processes is supported by the demonstration that the marked suppression or complete loss of REM sleep in human subjects on antidepressant drugs or with brainstem lesions has no detrimental effects on learning/memory. In addition, the recent demonstration that only a very small amount of declarative/episodic material transfers from waking to sleep in humans (about 1%–2%) indicates that an exceedingly small percentage of waking experiences are even available for consolidation in sleep.</span></p><p data-dcnode-id="9150"><span data-dcnode-id="9151" instrument_node="">Attention has recently focused on the role of sleep in the consolidation of procedural memory in humans. Two processes have been described: consolidation and enhancement. Consolidation refers to the slow, time-dependent transformation of procedural material from labile to secure forms, largely resistant to interference—analogous to processes shown for declarative memories. Consolidation (as stabilization) begins with task initiation, and unless disrupted by competing events, proceeds continuously through waking and possibly into sleep in a time-dependent manner. There is no indication that sleep serves a unique role in the consolidation of procedural skills. Disruptions of sleep do not alter procedural consolidation.</span></p><p data-dcnode-id="9145"><span data-dcnode-id="9149" instrument_node="">A process of enhancement has recently been described for some perceptual and motor skills, consisting of </span><em data-dcnode-id="9147"><span data-dcnode-id="9148" instrument_node="">improvements</span></em><span data-dcnode-id="9146" instrument_node=""> in performance with the mere passage of time without further practice on a task. Unlike consolidation (as stabilization), some recent studies have reported that sleep serves a special role in enhancement; that is, enhancement is selective for sleep—or more pronounced in sleep than in waking.</span></p><p data-dcnode-id="9143"><span data-dcnode-id="9144" instrument_node="">Although enhancement may prove to be an important mechanism in procedural learning/memory, this remains to be determined. As discussed, as a relatively new phenomenon, enhancement has been demonstrated for some procedural tasks but not for others, has been shown to be more pronounced in sleep than waking in some studies but not in others, and importantly appears to contribute little to the learning of procedural skills relative to practice on tasks.</span></p><p data-dcnode-id="9141"><span data-dcnode-id="9142" instrument_node="">In summary, there is simply not enough evidence, or evidence of sufficient weight, to maintain that one of the functions of sleep is memory consolidation.</span></p></section></section></div><section data-dcnode-id="9133" id="aep-acknowledgment-id24"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9136"><span data-dcnode-id="9137" instrument_node="">Acknowledgements</span></h2><p data-dcnode-id="9134"><span data-dcnode-id="9135" instrument_node="">This work was supported by NIMH grants MH63519 and MH01476 to the author.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="9128"><button class="button button-anchor" data-dcnode-id="9129" type="button"><span class="button-text" data-dcnode-id="9130"><span data-dcnode-id="9131" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="9127"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="404" id="aep-bibliography-id25"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9125"><span data-dcnode-id="9126" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="405" id="aep-bibliography-sec-id26"><dl class="references" data-dcnode-id="406" id="reference-links-aep-bibliography-sec-id26"><dt class="label" data-dcnode-id="9122"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="9123" href="#bBIB1" id= /www.sciencedirect.com/science/article/pii/S2666389921000647" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="398" id="citing-articles-article0-title"><span data-dcnode-id="399" instrument_node="">The overfitted brain: Dreams evolved to assist generalization</span></h3></a><div class="article-source ellipsis" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">2021, Patterns</span></div></div><div class="buttons" data-dcnode-id="388"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="389" type="button"><span class="button-link-text" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="390" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="391"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="377"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="378" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="379"><p data-dcnode-id="380" id="abspara0010"><span data-dcnode-id="387" instrument_node="">Understanding of the evolved biological function of sleep has advanced considerably in the past decade. However, no equivalent understanding of dreams has emerged. Contemporary neuroscientific theories often view dreams as epiphenomena, and many of the proposals for their biological function are contradicted by the phenomenology of dreams themselves. Now, the recent advent of deep neural networks (DNNs) has finally provided the novel conceptual framework within which to understand the evolved function of dreams. Notably, all DNNs face the issue of overfitting as they learn, which is when performance on one dataset increases but the network's performance fails to generalize (often measured by the divergence of performance on training versus testing datasets). This ubiquitous problem in DNNs is often solved by modelers via “noise injections” in the form of noisy or corrupted inputs. The goal of this paper is to argue that the brain faces a similar challenge of overfitting and that nightly dreams evolved to combat the brain's overfitting during its daily learning. That is, dreams are a biological mechanism for increasing generalizability via the creation of corrupted sensory inputs from stochastic activity across the hierarchy of neural structures. Sleep loss, specifically dream loss, leads to an overfitted brain that can still memorize and learn but fails to generalize appropriately. Herein this ”overfitted brain hypothesis” is explicitly developed and then compared and contrasted with existing contemporary neuroscientific theories of dreams. Existing evidence for the hypothesis is surveyed within both neuroscience and deep learning, and a set of testable predictions is put forward that can be pursued both </span><em data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">in&nbsp;vivo</span></em><span data-dcnode-id="384" instrument_node=""> and </span><em data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">in silico</span></em><span data-dcnode-id="381" instrument_node="">.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="358"><div class="sub-heading" data-dcnode-id="370"><a data-dcnode-id="373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0925231220303660" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="374" id="citing-articles-article1-title"><span data-dcnode-id="375" instrument_node="">Prevention of catastrophic interference and imposing active forgetting with generative methods</span></h3></a><div class="article-source ellipsis" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">2020, Neurocomputing</span></div></div><div class="buttons" data-dcnode-id="364"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="365" type="button"><span class="button-link-text" data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="366" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="367"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="359"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="360" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="361"><p data-dcnode-id="362" id="spara010"><span data-dcnode-id="363" instrument_node="">Artificial neural networks experience serious catastrophic forgetting (or interference) when information is learned sequentially. A significant effort in the machine learning community is devoted to the solution of this problem. Many approaches to overcome the catastrophic interference (CI) find parallels with an organization of the human memory system. In this paper, we provide a review of biologically inspired approaches for CI prevention. The main emphasis is made on the development of methods inspired by generative properties of the brain. We developed and tested several methods for preventing CI using an artificial dataset generated on the base of previous experience of neural network. The proposed methods include the activation maximization approach, the method based on Bayesian learning, and the method based on generative neural networks. The methods based on a combination of episodic memory (several stored samples) and semantic memory (sampling of posterior probability function) show superiority compared to other recent methods devoted to CI prevention. Based on generative approaches, the biologically plausible mechanisms of active forgetting and memory reconsolidation are also demonstrated. The proof of concept experiments were performed on several publicly available datasets.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="337"><div class="sub-heading" data-dcnode-id="352"><a data-dcnode-id="355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128137437000323" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="356" id="citing-articles-article2-title"><span data-dcnode-id="357" instrument_node="">Sleep and Memory Consolidation: Conceptual and Methodological Challenges</span></h3></a><div class="article-source ellipsis" data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">2019, Handbook of Behavioral Neuroscience</span></div></div><div class="buttons" data-dcnode-id="346"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="347" type="button"><span class="button-link-text" data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="348" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="349"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="338"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="339" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="340"><p data-dcnode-id="341" id="sp0025"><span data-dcnode-id="345" instrument_node="">There is broad consensus that sleep benefits the consolidation, reorganization, and retrieval of learned information. Mechanisms thought to mediate memory consolidation during sleep include the hormonal milieu (low cortisol levels), specific patterns of oscillatory brain activity (sharp-wave ripples (SWR), delta activity, and slow oscillations), and neuronal replay or reactivation of encoding-related network activity. We review evidence that these presumed “sleep-dependent” consolidation mechanisms also operate during wakefulness. Importantly, studies that successfully dissociate sleep from these mechanisms (e.g., SWRs, neuronal replay/reactivation, or slow oscillations without sleep) indicate that they mediate consolidation even when they occur without behavioral and polysomnographic sleep, particularly during quiet wakefulness. However, the common use of an “active wake” condition serves to actively inhibit the operation of consolidation mechanisms, thus amplifying the apparent difference in memory between sleep and waking. The evidence that cellular consolidation mechanisms are functional during both sleep and wakefulness challenges the notion of a specialized or critical role of sleep </span><em data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">per se</span></em><span data-dcnode-id="342" instrument_node=""> in memory consolidation. A stringent test of the role of sleep in memory storage necessitates the inclusion of control conditions that allow for the maximal engagement of consolidation mechanisms in the absence of behavioral and polysomnographic sleep.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="295"><div class="sub-heading" data-dcnode-id="331"><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S221315821930052X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="335" id="citing-articles-article3-title"><span data-dcnode-id="336" instrument_node="">Structural connectome alterations in patients with disorders of consciousness revealed by 7-tesla magnetic resonance imaging</span></h3></a><div class="article-source ellipsis" data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">2019, NeuroImage: Clinical</span></div></div><div class="buttons" data-dcnode-id="325"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="326" type="button"><span class="button-link-text" data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="327" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="328"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="296"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="297" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="298"><p data-dcnode-id="299" id="sp0080"><span data-dcnode-id="324" instrument_node="">Although the functional connectivity of patients with disorders of consciousness (DOC) has been widely examined, less is known about brain white matter connectivity. The aim of this study was to explore structural network alterations for the diagnosis and prognosis of patients with chronic DOC. Eleven DOC patients and 11 sex- and age-matched controls were included in the study. Participants underwent diffusion magnetic resonance imaging (MRI) and T1-weighted structural MRI at 7 tesla (7 T). Graph-theoretical analysis and network-based statistics were used to analyze the group differences. Two patients were scanned twice for a longitudinal study to examine the relationship between connectome metrics and the patients' prognoses. Compared with healthy controls, DOC patients showed significantly elevated transitivity (</span><em data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">p</span></em><span data-dcnode-id="321" instrument_node=""> &lt; .001), local efficiency (</span><em data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">p</span></em><span data-dcnode-id="318" instrument_node=""> = .009), and clustering coefficient (</span><em data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">p</span></em><span data-dcnode-id="315" instrument_node=""> = .039). When comparing the connectome metrics within the three groups (healthy controls, minimally conscious state (MCS), and vegetative state/unresponsive wakefulness syndrome (VS/UWS)), significant group differences were observed in transitivity (</span><em data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">p</span></em><span data-dcnode-id="312" instrument_node=""> &lt; .001) and local efficiency (</span><em data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">p</span></em><span data-dcnode-id="309" instrument_node=""> = .031). Significantly increased transitivity was observed in vegetative state/unresponsive wakefulness syndrome compared with minimally conscious state (</span><em data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">p</span></em><span data-dcnode-id="306" instrument_node=""> = .0217, Bonferroni corrected). Transitivity showed significant negative correlations with the Coma Recovery Scale-Revised score (</span><em data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">r</span></em><span data-dcnode-id="303" instrument_node=""> = −0.6902, </span><em data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">p</span></em><span data-dcnode-id="300" instrument_node=""> = .023), consistent with the longitudinal study results. A subnetwork with significantly decreased structural connections was identified using network-based statistical analysis comparing DOC patients with healthy controls, which was mainly located in the frontal cortex, limbic system, and occipital and parietal lobes. This preliminary study suggests that graph theoretical approaches for assessing white matter connectivity may enable various states of DOC to be distinguished. Of the metrics analyzed, transitivity had a critical role in distinguishing the diagnostic groups. Larger cohorts will be necessary to confirm the predictive value of 7 T MRI in the prognosis of DOC patients.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="271"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0166432818302699" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="293" id="citing-articles-article4-title"><span data-dcnode-id="294" instrument_node="">The role of omega-3 on modulation of cognitive deficiency induced by REM sleep deprivation in rats</span></h3></a><div class="article-source ellipsis" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">2018, Behavioural Brain Research</span></div><div class="CitedSection" data-dcnode-id="284"><div class="snippet" data-dcnode-id="285"><div class="cite-header" data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Activating synaptic plasticity and neuronal recovery is one of the main roles of sleep which results in a suitable brain activity [9,10]. Several researches on humans and animals reveal that REM sleep affects the enhancement and modulation of spatial and emotional memory [11–14], and the memory formation and consolidation [15–19]. Recent studies show that the information obtained during waking is reactivated and probably consolidated during REM sleep [20–22].</span></p></div></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="272"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="273" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="274"><p data-dcnode-id="275" id="spar0040"><span data-dcnode-id="276" instrument_node="">Prolonged sleep deprivation causes cognitive deficits. In rats, for instance, sleep deprivation weakens spatial learning and long-term potentiation (LTP). We examined the effects of omega-3 on cognitive deficiency induced by REM sleep deprivation (RSD). For this purpose, we used a fear conditioning paradigm, forced swim test (FST) apparatus, and hot plate test. Intravenously omega-3 injection was performed during 3 consecutive days. Rats trained in the fear conditioning apparatus after 24 h. During conditioning, animals were received foot shocks, either alone or paired with a sound. Sleep deprivation paradigm was carried out in which REM sleep was completely prevented and non-REM sleep was intensely declined for 24 h. Then, context-dependent retention, anxiety behaviors, and hot plate tests were done. Auditory-dependent retention, anxiety behaviors, and FST were carried out 24 h later. 24 h of RSD impaired cognitive function, however intravenously administration of omega-3 improved (0.25, 0.5 and 1 mg/kg) context- or auditory-dependent memory, induced anxiolytic (1 mg/kg), antidepressant (1.25 mg/kg), and anti-nociceptive (0.25 mg/kg) effects. The results revealed that RSD interferes with the neural systems underlying cognitive functions and supports the involvement of omega-3 in the modulation of cognitive functions.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="253"><div class="sub-heading" data-dcnode-id="265"><a data-dcnode-id="268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960982217313295" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="269" id="citing-articles-article5-title"><span data-dcnode-id="270" instrument_node="">The Biology of REM Sleep</span></h3></a><div class="article-source ellipsis" data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">2017, Current Biology</span></div></div><div class="buttons" data-dcnode-id="259"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="260" type="button"><span class="button-link-text" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="261" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="262"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="254"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="255" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="256"><p data-dcnode-id="257" id="abspara0010"><span data-dcnode-id="258" instrument_node="">Considerable advances in our understanding of the mechanisms and functions of rapid-eye-movement (REM) sleep have occurred over the past decade. Much of this progress can be attributed to the development of new neuroscience tools that have enabled high-precision interrogation of brain circuitry linked with REM sleep control, in turn revealing how REM sleep mechanisms themselves impact processes such as sensorimotor function. This review is intended to update the general scientific community about the recent mechanistic, functional and conceptual developments in our current understanding of REM sleep biology and pathobiology. Specifically, this review outlines the historical origins of the discovery of REM sleep, the diversity of REM sleep expression across and within species, the potential functions of REM sleep (e.g., memory consolidation), the neural circuits that control REM sleep, and how dysfunction of REM sleep mechanisms underlie debilitating sleep disorders such as REM sleep behaviour disorder and narcolepsy.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-5344243772%26md5%3Dad9d6ac0a1627f214813c16e79429a9a" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="250" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-5
