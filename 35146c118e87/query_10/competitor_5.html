</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id3&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;aep-abstract-sec-id4&quot;><p>We discuss several lines of evidence refuting the hypothesis that procedural or declarative memories are processed/consolidated in sleep. One of the strongest arguments against a role for sleep in declarative memory involves the demonstration that the marked suppression or elimination of REM sleep in subjects on antidepressant drugs or with brainstem lesions produces no detrimental effects on cognition. Procedural memory, like declarative memory, undergoes a slow, time-dependent period of consolidation. A process has recently been described wherein performance on some procedural tasks improves with the mere passage of time and has been termed “enhancement.” Some studies, but not others, have reported that the consolidation/enhancement of perceptual and motor skills is dependent on sleep. We suggest that consolidation or enhancement, initiated in waking with task acquisition, could in some instances extend to sleep, but sleep would serve no unique role in these processes. In sum, there is no compelling evidence to support a relationship between sleep and memory consolidation.</p></div></div></div>" data-dcnode-id="10790" lang="en" name="citation_abstract"><span data-dcnode-id="10789" instrument_node="">

-dcnode-id="10217" id="popover-trigger-export-citation-popover"><button aria-expanded="false" aria-haspopup="true" class="button button-anchor" data-dcnode-id="10218" type="button"><svg class="icon icon-cited-by-66" data-dcnode-id="10221" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="10222" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="10219"><span data-dcnode-id="10220" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="10208" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="10211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.neuron.2004.08.034" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="10212" instrument_node="">https://doi.org/10.1016/j.neuron.2004.08.034</span></a><a class="rights-and-content" data-dcnode-id="10209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0896627304005653%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="10210" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="10199"><div class="License" data-dcnode-id="10203"><span data-dcnode-id="10206"><span data-dcnode-id="10207" instrument_node="">Under an Elsevier </span></span><a data-dcnode-id="10204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/open-access/userlicense/1.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="10205" instrument_node="">user license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="10200"><span class="access-indicator" data-dcnode-id="10202"></span><span data-dcnode-id="10201" instrument_node="">Open archive</span></div></div><section class="ReferencedArticles" data-dcnode-id="10198"></section><section class="ReferencedArticles" data-dcnode-id="10197"></section><div class="PageDivider" data-dcnode-id="10196"></div><div class="Abstracts u-font-serif" data-dcnode-id="10178" id="abstracts"><div class="abstract author" data-dcnode-id="10179" id="aep-abstract-id3"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10194"><span data-dcnode-id="10195" instrument_node="">Abstract</span></h2><div data-dcnode-id="10180" id="aep-abstract-sec-id4"><p data-dcnode-id="10181"><span data-dcnode-id="10185"><span data-dcnode-id="10189"><span data-dcnode-id="10193" instrument_node="">We discuss several lines of evidence refuting the hypothesis that procedural or </span><a class="topic-link" data-dcnode-id="10191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/declarative-memory" title="Learn more about declarative memories from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10192" instrument_node="">declarative memories</span></a><span data-dcnode-id="10190" instrument_node=""> are processed/consolidated in sleep. One of the strongest arguments against a role for sleep in declarative memory involves the demonstration that the marked suppression or elimination of </span></span><a class="topic-link" data-dcnode-id="10187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/rapid-eye-movement-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10188" instrument_node="">REM sleep</span></a><span data-dcnode-id="10186" instrument_node=""> in subjects on antidepressant drugs or with </span></span><a class="topic-link" data-dcnode-id="10183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/brainstem" title="Learn more about brainstem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="10184" instrument_node="">brainstem</span></a><span data-dcnode-id="10182" instrument_node=""> lesions produces no detrimental effects on cognition. Procedural memory, like declarative memory, undergoes a slow, time-dependent period of consolidation. A process has recently been described wherein performance on some procedural tasks improves with the mere passage of time and has been termed “enhancement.” Some studies, but not others, have reported that the consolidation/enhancement of perceptual and motor skills is dependent on sleep. We suggest that consolidation or enhancement, initiated in waking with task acquisition, could in some instances extend to sleep, but sleep would serve no unique role in these processes. In sum, there is no compelling evidence to support a relationship between sleep and memory consolidation.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="10155" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="10167"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0896627304005409"><svg class="icon icon-navigate-left" data-dcnode-id="10176" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="10177"></path></svg><span class="button-alternative-text" data-dcnode-id="10169"><strong data-dcnode-id="10174"><span data-dcnode-id="10175" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="10172"><span data-dcnode-id="10173" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10170"><span data-dcnode-id="10171" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="10156"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="10157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0896627304005276"><span class="button-alternative-text" data-dcnode-id="10160"><strong data-dcnode-id="10165"><span data-dcnode-id="10166" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="10163"><span data-dcnode-id="10164" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="10161"><span data-dcnode-id="10162" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="10158" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="10159"></path></svg></a></li></ul><span data-dcnode-id="10154" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="9132" id="body"><div data-dcnode-id="9138"><section data-dcnode-id="9139" id="aep-section-id5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10152"><span data-dcnode-id="10153" instrument_node="">Main Text</span></h2><section data-dcnode-id="10137" id="aep-section-id6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10150"><span data-dcnode-id="10151" instrument_node="">Introduction</span></h3><p data-dcnode-id="10148"><span data-dcnode-id="10149" instrument_node="">The issue of memory consolidation in sleep, long dormant, is currently a lively topic in the sleep field and, seemingly, in the neurosciences in general. It would appear that current interest in this topic stems in part from the possible intersection of two important processes—memory consolidation and the functions of sleep.</span></p><p data-dcnode-id="10140"><span data-dcnode-id="10147" instrument_node="">If a link between sleep and memory were to be demonstrated, the ramifications could be far reaching, possibly extending to lifestyle changes involving a redistribution/reorganization of sleep-waking states, favoring sleep. Recent claims that sleep beneficially affects cognition suggest that sleep may be an important, untapped route to learning and perhaps should be utilized for that purpose. Robert Stickgold suggested that sleep may be as important, or even more so, than traditional factors in determining intelligence or academic success. Based on his findings </span><a class="workspace-trigger" data-dcnode-id="10145" href="#BIB119" name="bBIB119"><span data-dcnode-id="10146" instrument_node="">(Stickgold et al., 2000a)</span></a><span data-dcnode-id="10144" instrument_node=""> of improved performance on a perceptual discrimination task following sleep, Stickgold remarked </span><a class="workspace-trigger" data-dcnode-id="10142" href="#BIB10" name="bBIB10"><span data-dcnode-id="10143" instrument_node="">(Blakeslee, 2000)</span></a><span data-dcnode-id="10141" instrument_node=""> that “The study challenges expectations and prejudices about what makes a smart student. How well Harvard undergrads do the next day on a retest does not depend on what prep school they went to, their SAT scores or how hard they tried. Rather, it mostly depends on how well they slept.”</span></p><p data-dcnode-id="10138"><span data-dcnode-id="10139" instrument_node="">We present a wide spectrum of evidence that refutes the position that sleep serves a role in the processing or consolidation of memory. The following main topics will be covered: (1) early work in this area—a brief history; (2) some important general considerations on this topic; (3) REM sleep deprivation studies in animals; (4) cognitive capacities of humans with greatly suppressed or absent REM sleep; (5) recent human studies on procedural memory and sleep; (6) the “replay” of patterns of neural activity of waking in subsequent sleep in animals; (7) “other factors” that dispute a role for sleep in memory processing; and (8) a proposed function for sleep.</span></p></section><section data-dcnode-id="10065" id="aep-section-id7"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10135"><span data-dcnode-id="10136" instrument_node="">A Revisiting of This Issue</span></h3><p data-dcnode-id="10109"><span data-dcnode-id="10134" instrument_node="">Although possibly not recognized outside of the sleep field, the role of sleep in memory processing is not a new issue, but is one that was thoroughly examined in the 1960s to 1970s. There was a wealth of research in animals, and to a lesser extent in humans, devoted to this topic (for review, see </span><a class="workspace-trigger" data-dcnode-id="10132" href="#BIB86" name="bBIB86"><span data-dcnode-id="10133" instrument_node="">McGrath and Cohen 1978</span></a><span data-dcnode-id="10131" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10129" href="#BIB61" name="bBIB61"><span data-dcnode-id="10130" instrument_node="">Horne and McGrath 1984</span></a><span data-dcnode-id="10128" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10126" href="#BIB109" name="bBIB109"><span data-dcnode-id="10127" instrument_node="">Smith 1985</span></a><span data-dcnode-id="10125" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10123" href="#BIB59" name="bBIB59"><span data-dcnode-id="10124" instrument_node="">Horne 1988</span></a><span data-dcnode-id="10122" instrument_node="">). Current interest represents a second wave. Most of the early work in this area in both animals and humans examined the effects of REM sleep deprivation on previously learned material. As later discussed in detail, the results of numerous studies on this subject, involving various manipulations across species, were divided. There were as many reports that failed to describe a link between sleep and memory as there were those that claimed such a relationship </span><a class="workspace-trigger" data-dcnode-id="10120" href="#BIB61" name="bBIB61"><span data-dcnode-id="10121" instrument_node="">Horne and McGrath 1984</span></a><span data-dcnode-id="10119" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10117" href="#BIB59" name="bBIB59"><span data-dcnode-id="10118" instrument_node="">Horne 1988</span></a><span data-dcnode-id="10116" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10114" href="#BIB133" name="bBIB133"><span data-dcnode-id="10115" instrument_node="">Vertes and Eastman 2000a</span></a><span data-dcnode-id="10113" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10111" href="#BIB134" name="bBIB134"><span data-dcnode-id="10112" instrument_node="">Vertes and Eastman 2000b</span></a><span data-dcnode-id="10110" instrument_node="">.</span></p><p data-dcnode-id="10095"><span data-dcnode-id="10108" instrument_node="">Several authors have chronicled this early work, but none more comprehensively than James Horne </span><a class="workspace-trigger" data-dcnode-id="10106" href="#BIB61" name="bBIB61"><span data-dcnode-id="10107" instrument_node="">Horne and McGrath 1984</span></a><span data-dcnode-id="10105" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10103" href="#BIB59" name="bBIB59"><span data-dcnode-id="10104" instrument_node="">Horne 1988</span></a><span data-dcnode-id="10102" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10100" href="#BIB60" name="bBIB60"><span data-dcnode-id="10101" instrument_node="">Horne 2000</span></a><span data-dcnode-id="10099" instrument_node="">. Following a review of this work, </span><a class="workspace-trigger" data-dcnode-id="10097" href="#BIB59" name="bBIB59"><span data-dcnode-id="10098" instrument_node="">Horne (1988)</span></a><span data-dcnode-id="10096" instrument_node=""> concluded: “Findings from REM sleep deprivation studies are not convincing enough to warrant there being any vital association between REM sleep and memory or other aspects of the learning and forgetting process in the adult mammal.” And further, “In view of the attention paid to REM sleep and dreaming, and the importance given to this form of sleep by many people, REM sleep deprivation in human adults is surprisingly uneventful—it can even be of benefit to people suffering from certain forms of depression.”</span></p><p data-dcnode-id="10093"><span data-dcnode-id="10094" instrument_node="">There was a marked decline in research in this area beginning about the mid-1970s, undoubtedly reflecting the fact that, on balance, the early work failed to convincingly demonstrate a relationship between sleep and memory. As most would agree, we are now in a period of revival—sleep and memory consolidation is again a very topical issue.</span></p><p data-dcnode-id="10088"><span data-dcnode-id="10092" instrument_node="">Interestingly, this revival may have been sparked by a report by Francis Crick—an eminent scientist but seemingly removed from the sleep field. In 1983, Crick and Mitchison published a theoretical paper in </span><em data-dcnode-id="10090"><span data-dcnode-id="10091" instrument_node="">Nature</span></em><span data-dcnode-id="10089" instrument_node=""> entitled “The Function of Dream Sleep” in which they put forth the intriguing idea that the primary function of dream sleep (or REM sleep) was to purge unwanted or extraneous memories during sleep—or, in their terms, “reverse learning.” In a well-crafted (and subsequently oft-quoted) synthesis of their position, they stated that “We dream in order to forget.” From a historical perspective, it is surprising that Crick and Mitchison's theory attracted few adherents.</span></p><p data-dcnode-id="10083"><span data-dcnode-id="10087" instrument_node="">It is evident that we do not support the notion that sleep serves a role in the processing of information—either to store or erase it. Of the two contrasting views, however, we feel that Crick and Mitchison's position (reverse learning) is more compelling than its counterpart (memory consolidation in sleep). In brief, based on neural net models, </span><a class="workspace-trigger" data-dcnode-id="10085" href="#BIB23" name="bBIB23"><span data-dcnode-id="10086" instrument_node="">Crick and Mitchison (1983)</span></a><span data-dcnode-id="10084" instrument_node=""> proposed that as information is continuously stored in cortical networks, these networks become overloaded, resulting in the development of “parasitic modes” that need to be removed. This is accomplished in REM sleep by a process of reverse learning. Although the model leaves much unanswered, it is consistent with well-recognized properties of dreams as bizarre/unreal events (unstable networks) that are probably best forgotten (reverse learning). Crick and Mitchison's message seems to be that we remember few of our dreams, and thankfully so. Or, in their words, “In this model, attempting to remember one's dreams should perhaps not be encouraged, because such remembering may help to retain patterns of thought which are better forgotten. These are the very patterns the organism was attempting to damp down.” Although Crick and Mitchison's theory did not generate much enthusiasm in the sleep field, it refocused attention on the possible involvement of sleep in cognitive functions.</span></p><p data-dcnode-id="10066"><span data-dcnode-id="10082" instrument_node="">The most immediate impetus, however, to the resurgence of interest in sleep-memory consolidation came from two complementary articles that appeared in </span><em data-dcnode-id="10080"><span data-dcnode-id="10081" instrument_node="">Science</span></em><span data-dcnode-id="10079" instrument_node=""> in 1994: one by </span><a class="workspace-trigger" data-dcnode-id="10077" href="#BIB140" name="bBIB140"><span data-dcnode-id="10078" instrument_node="">Wilson and McNaughton (1994)</span></a><span data-dcnode-id="10076" instrument_node=""> in rats and the other by </span><a class="workspace-trigger" data-dcnode-id="10074" href="#BIB67" name="bBIB67"><span data-dcnode-id="10075" instrument_node="">Karni et al. (1994)</span></a><span data-dcnode-id="10073" instrument_node=""> in humans. </span><a class="workspace-trigger" data-dcnode-id="10071" href="#BIB140" name="bBIB140"><span data-dcnode-id="10072" instrument_node="">Wilson and McNaughton (1994)</span></a><span data-dcnode-id="10070" instrument_node=""> reported that ensembles of hippocampal “place” cells tend to repeat patterns of waking activity in subsequent episodes of slow wave sleep, while </span><a class="workspace-trigger" data-dcnode-id="10068" href="#BIB67" name="bBIB67"><span data-dcnode-id="10069" instrument_node="">Karni et al. (1994)</span></a><span data-dcnode-id="10067" instrument_node=""> showed that improvement on a visual task in humans was dependent upon REM sleep. The two studies supported the position that memories are consolidated in sleep.</span></p></section><section data-dcnode-id="9924" id="aep-section-id8"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10063"><span data-dcnode-id="10064" instrument_node="">General Considerations Relevant to the Current Debate</span></h3><p data-dcnode-id="10061"><span data-dcnode-id="10062" instrument_node="">In the following, we discuss some general issues that we believe are relevant to the current debate on the role of sleep in memory consolidation, namely that (1) there is no correspondence between the cognitive content of waking and sleep, making it unlikely that sleep serves to consolidate waking experiences; (2) sleep is an amnesiac state, rendering it a very poor candidate for memory processing; and (3) by all accounts, sleep is involved in procedural but not in declarative memory, thereby narrowing the debate to the role of sleep in procedural memory.</span></p><section data-dcnode-id="10034" id="aep-section-id9"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10059"><span data-dcnode-id="10060" instrument_node="">Mismatch between the Cognitive Content of Waking and Sleep</span></h4><p data-dcnode-id="10054"><span data-dcnode-id="10058" instrument_node="">The mental/cognitive content of sleep (SWS/REM) is dreams </span><a class="workspace-trigger" data-dcnode-id="10056" href="#BIB92" name="bBIB92"><span data-dcnode-id="10057" instrument_node="">(Nielsen, 2000)</span></a><span data-dcnode-id="10055" instrument_node="">. Dreams are the sole window to the cognitive processes of sleep. The hypothesis that sleep serves a role in memory consolidation would be more appealing if dreams reproduced waking experiences (or even approximately so), but they do not.</span></p><p data-dcnode-id="10046"><span data-dcnode-id="10053" instrument_node="">More than 100 years ago, </span><a class="workspace-trigger" data-dcnode-id="10051" href="#BIB46" name="bBIB46"><span data-dcnode-id="10052" instrument_node="">Freud (1900)</span></a><span data-dcnode-id="10050" instrument_node=""> considered the possibility that dreams/sleep may serve a role in memory processing, but he dismissed it. Freud speculated that “It might perhaps occur to us that the phenomenon of dreaming could be reduced entirely to that of memory: dreams, it might be supposed, are a manifestation of a reproductive activity which is at work even in the night and which is an end in itself.” Continuing, “But views of this sort are inherently improbable owing to the manner in which dreams deal with the material to be remembered. Strümpell rightly points out that dreams do not reproduce experiences. They take one step forward, but the next step in the chain is omitted, or appears in altered form, or is replaced by something entirely extraneous. Dreams yield no more than </span><em data-dcnode-id="10048"><span data-dcnode-id="10049" instrument_node="">fragments</span></em><span data-dcnode-id="10047" instrument_node=""> of reproductions; and this is so general a rule that theoretical conclusions may be based on it.”</span></p><p data-dcnode-id="10044"><span data-dcnode-id="10045" instrument_node="">Freud states the obvious. It is not unreasonable to suggest that dreams (or sleep) “could be reduced entirely to that of memory” or may represent “a reproductive activity which is at work even in the night,” but this view is “inherently improbable” owing to the fact that “dreams do not reproduce [waking] experiences.” In a sense, case closed.</span></p><p data-dcnode-id="10039"><span data-dcnode-id="10043" instrument_node="">More recently, Owen </span><a class="workspace-trigger" data-dcnode-id="10041" href="#BIB44" name="bBIB44"><span data-dcnode-id="10042" instrument_node="">Flanagan (2000)</span></a><span data-dcnode-id="10040" instrument_node=""> expressed a similar view, stating: “since we rarely dream about what we need to remember, the hypothesis that dreams themselves serve any memory enhancing function appears unwarranted.”</span></p><p data-dcnode-id="10037"><span data-dcnode-id="10038" instrument_node="">It would seem that most proponents of the sleep-memory consolidation hypothesis (S-MC) would agree that waking experiences are not faithfully reproduced in dreams or committed to memory through dreams. However, in a twist of logic that we find difficult to understand, it appears that adherents to this view would acknowledge that material that reaches consciousness in sleep (dreams) is not stored, while at the same time holding that material that never reaches consciousness (whatever its nature) is somehow magically processed and consolidated in sleep.</span></p><p data-dcnode-id="10035"><span data-dcnode-id="10036" instrument_node="">The S-MC position seems to require two parallel systems (seemingly sharing the same neural substrates) involved in the processing of waking material in sleep: a “sleep conscious” system (dreams) that distorts and imprecisely codes waking events and a “sleep unconscious” system that faithfully records and stores waking events. If the latter system exists, it is surprising that it has so far escaped detection.</span></p></section><section data-dcnode-id="10002" id="aep-section-id10"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10032"><span data-dcnode-id="10033" instrument_node="">Sleep Is an Amnesiac State</span></h4><p data-dcnode-id="10027"><span data-dcnode-id="10031" instrument_node="">It is well recognized that the contents of sleep are poorly remembered. This suggests that structures responsible for the encoding and storage of information in waking are suppressed or absent in sleep. This was pointed out by </span><a class="workspace-trigger" data-dcnode-id="10029" href="#BIB57" name="bBIB57"><span data-dcnode-id="10030" instrument_node="">Hobson et al. (1998)</span></a><span data-dcnode-id="10028" instrument_node="">, stating: “The loss of memory in REM sleep makes dreaming consciousness much more difficult to recall than waking consciousness. This phenomenological deficit logically implies a physiological deficit: some functional process, present and responsible for memory in waking, is absent, or at least greatly diminished, in REM sleep.”</span></p><p data-dcnode-id="10013"><span data-dcnode-id="10026" instrument_node="">Insights into the amnesiac quality of sleep are provided by recent functional imaging studies in humans identifying patterns of brain activity in sleep/REM sleep. Although differences exist among reports, a fairly consistent pattern of brain activity in REM has emerged from these studies. Some important findings are as follows: (1) the pontine reticular formation is highly active in REM sleep; (2) primary sensory areas (e.g., striate cortex for the visual system) are inactive in REM, whereas sensory association regions are very active in REM sleep; (3) limbic and paralimbic regions, including the lateral hypothalamus, the amygdala and anterior cingulate, and parahippocampal cortices are intensely activated in REM; and (4) widespread regions of the frontal cortex, including the lateral orbital and dorsolateral prefrontal cortices, show marked reductions in activity in REM sleep </span><a class="workspace-trigger" data-dcnode-id="10024" href="#BIB81" name="bBIB81"><span data-dcnode-id="10025" instrument_node="">Maquet et al. 1996</span></a><span data-dcnode-id="10023" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10021" href="#BIB13" name="bBIB13"><span data-dcnode-id="10022" instrument_node="">Braun et al. 1997</span></a><span data-dcnode-id="10020" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10018" href="#BIB14" name="bBIB14"><span data-dcnode-id="10019" instrument_node="">Braun et al. 1998</span></a><span data-dcnode-id="10017" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="10015" href="#BIB93" name="bBIB93"><span data-dcnode-id="10016" instrument_node="">Nofzinger et al. 1997</span></a><span data-dcnode-id="10014" instrument_node="">.</span></p><p data-dcnode-id="10005"><span data-dcnode-id="10012" instrument_node="">This general pattern of activity in REM has been viewed as a “closed system” </span><a class="workspace-trigger" data-dcnode-id="10010" href="#BIB14" name="bBIB14"><span data-dcnode-id="10011" instrument_node="">(Braun et al., 1998)</span></a><span data-dcnode-id="10009" instrument_node="">, essentially, an internal network disconnected from normal inputs and outputs. For instance, the suppression of activity in the primary visual cortex (input) is consistent with the well-characterized sensory blockade of REM sleep, whereas the deactivation of the prefrontal cortex (output) parallels the failure of dreams to influence executive systems for behavior. In essence, patterns of brain activity in sleep are quite consistent with what would be expected of the “dreaming brain”; that is, internally generated images removed from reality are processed and manipulated in sleep and then quickly discarded. More specifically, internal (mainly visual) images are fed to the limbic system, where they become incorporated into dreams, but due to the suppression of activity of the prefrontal cortex, these dream scenarios are not permanently stored, nor do they influence behavior. Commenting on the effects of dampened prefrontal cortical activity on memory in sleep, </span><a class="workspace-trigger" data-dcnode-id="10007" href="#BIB63" name="bBIB63"><span data-dcnode-id="10008" instrument_node="">Jones (1998)</span></a><span data-dcnode-id="10006" instrument_node=""> stated that this produces “an attenuation of processes important in episodic and working memory and perhaps explaining why, unless awakened from a dream, a sleeping person has no memory of the dream.”</span></p><p data-dcnode-id="10003"><span data-dcnode-id="10004" instrument_node="">To conclude, the brain is in a non-memory encoding mode in sleep/REM sleep, which accounts for the amnesiac quality of dreams—and importantly, in our view, amnesia for all cognitive contents of sleep. As indicated above, we find great difficulty with the position that acknowledges, on the one hand, that material reaching awareness in sleep (dreams) is lost to memory (reflecting a nonencoding mode of the brain in sleep), while on the other hand claiming that material that never reaches consciousness is faithfully processed and committed to memory during sleep.</span></p></section><section data-dcnode-id="9925" id="aep-section-id11"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="10000"><span data-dcnode-id="10001" instrument_node="">Sleep Is Not Involved in Declarative Memory</span></h4><p data-dcnode-id="9983"><span data-dcnode-id="9999" instrument_node="">It is well documented that there are two main classes of memory: declarative and procedural memory </span><a class="workspace-trigger" data-dcnode-id="9997" href="#BIB21" name="bBIB21"><span data-dcnode-id="9998" instrument_node="">Cohen 1984</span></a><span data-dcnode-id="9996" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9994" href="#BIB116" name="bBIB116"><span data-dcnode-id="9995" instrument_node="">Squire and Cohen 1984</span></a><span data-dcnode-id="9993" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9991" href="#BIB35" name="bBIB35"><span data-dcnode-id="9992" instrument_node="">Eichenbaum and Cohen 2001</span></a><span data-dcnode-id="9990" instrument_node="">. Declarative (or explicit) memory consists of general factual knowledge of the world and its inhabitants (facts, events, people, places, etc.) and has two recognized subclasses, semantic memory (impersonal facts) and episodic memory (personal or autobiographical facts and experiences) </span><a class="workspace-trigger" data-dcnode-id="9988" href="#BIB124" name="bBIB124"><span data-dcnode-id="9989" instrument_node="">Tulving 1972</span></a><span data-dcnode-id="9987" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9985" href="#BIB125" name="bBIB125"><span data-dcnode-id="9986" instrument_node="">Tulving 1984</span></a><span data-dcnode-id="9984" instrument_node="">. Procedural (implicit) memory, on the other hand, has been described as “how to” memory and largely involves the unconscious acquisition and utilization of perceptual and motor skills.</span></p><p data-dcnode-id="9975"><span data-dcnode-id="9982" instrument_node="">In a previous report </span><a class="workspace-trigger" data-dcnode-id="9980" href="#BIB133" name="bBIB133"><span data-dcnode-id="9981" instrument_node="">(Vertes and Eastman, 2000a)</span></a><span data-dcnode-id="9979" instrument_node="">, we reviewed a large body of literature showing that the major classes of antidepressant drugs (monoamine oxidase inhibitors, tricyclic antidepressants, and selective serotonin reuptake inhibitors) suppress REM sleep, but despite this marked suppression of sleep, these compounds, on the whole, have no adverse effects on learning and memory (also see below). In response, </span><a class="workspace-trigger" data-dcnode-id="9977" href="#BIB118" name="bBIB118"><span data-dcnode-id="9978" instrument_node="">Stickgold (2000)</span></a><span data-dcnode-id="9976" instrument_node=""> remarked that these findings were not unexpected in that subjects were tested for declarative memory and this type of memory is not processed/consolidated in sleep. According to Stickgold, “Since all proponents of REM-dependent memory consolidation agree that REM is not involved in declarative memories, such as those formed in paired associates training, the failure to observe REM-dependent consolidation may simply reflect the testing of a memory system that is not REM-dependent.”</span></p><p data-dcnode-id="9970"><span data-dcnode-id="9974" instrument_node="">In like manner, following a recent review of memory processing and sleep in humans, </span><a class="workspace-trigger" data-dcnode-id="9972" href="#BIB111" name="bBIB111"><span data-dcnode-id="9973" instrument_node="">Smith (2001)</span></a><span data-dcnode-id="9971" instrument_node=""> similarly concluded that REM sleep is not involved in declarative memory. He described six of seven studies showing no increases in the amounts of REM sleep following learning and seven of seven studies demonstrating that REM deprivation did not disrupt declarative learning/memory and concluded that “REM sleep is not involved with consolidation of declarative material.”</span></p><p data-dcnode-id="9926"><span data-dcnode-id="9969" instrument_node="">With few exceptions </span><a class="workspace-trigger" data-dcnode-id="9967" href="#BIB39" name="bBIB39"><span data-dcnode-id="9968" instrument_node="">(Fenn et al., 2003)</span></a><span data-dcnode-id="9966" instrument_node="">, all recent human experimentation in this field has employed procedural tasks—either perceptual </span><a class="workspace-trigger" data-dcnode-id="9964" href="#BIB67" name="bBIB67"><span data-dcnode-id="9965" instrument_node="">Karni et al. 1994</span></a><span data-dcnode-id="9963" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9961" href="#BIB47" name="bBIB47"><span data-dcnode-id="9962" instrument_node="">Gais et al. 2000</span></a><span data-dcnode-id="9960" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9958" href="#BIB119" name="bBIB119"><span data-dcnode-id="9959" instrument_node="">Stickgold et al. 2000a</span></a><span data-dcnode-id="9957" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9955" href="#BIB120" name="bBIB120"><span data-dcnode-id="9956" instrument_node="">Stickgold et al. 2000b</span></a><span data-dcnode-id="9954" instrument_node=""> or motor/visuomotor tasks </span><a class="workspace-trigger" data-dcnode-id="9952" href="#BIB82" name="bBIB82"><span data-dcnode-id="9953" instrument_node="">Maquet et al. 2000</span></a><span data-dcnode-id="9951" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9949" href="#BIB83" name="bBIB83"><span data-dcnode-id="9950" instrument_node="">Maquet et al. 2003</span></a><span data-dcnode-id="9948" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9946" href="#BIB40" name="bBIB40"><span data-dcnode-id="9947" instrument_node="">Fischer et al. 2002</span></a><span data-dcnode-id="9945" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9943" href="#BIB137" name="bBIB137"><span data-dcnode-id="9944" instrument_node="">Walker et al. 2002</span></a><span data-dcnode-id="9942" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9940" href="#BIB138" name="bBIB138"><span data-dcnode-id="9941" instrument_node="">Walker et al. 2003a</span></a><span data-dcnode-id="9939" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9937" href="#BIB139" name="bBIB139"><span data-dcnode-id="9938" instrument_node="">Walker et al. 2003b</span></a><span data-dcnode-id="9936" instrument_node="">. This concentration on procedural learning appears to reflect the current view that sleep is involved in procedural but not in declarative memory </span><a class="workspace-trigger" data-dcnode-id="9934" href="#BIB118" name="bBIB118"><span data-dcnode-id="9935" instrument_node="">Stickgold 2000</span></a><span data-dcnode-id="9933" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9931" href="#BIB112" name="bBIB112"><span data-dcnode-id="9932" instrument_node="">Smith and Rose 2000</span></a><span data-dcnode-id="9930" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9928" href="#BIB111" name="bBIB111"><span data-dcnode-id="9929" instrument_node="">Smith 2001</span></a><span data-dcnode-id="9927" instrument_node="">.</span></p></section></section><section data-dcnode-id="9658" id="aep-section-id12"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9922"><span data-dcnode-id="9923" instrument_node="">Sleep Suppression/Elimination in Animals and Humans: Effects on Memory Processing and Consolidation</span></h3><section data-dcnode-id="9855" id="aep-section-id13"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9920"><span data-dcnode-id="9921" instrument_node="">Animal Studies</span></h4><p data-dcnode-id="9903"><span data-dcnode-id="9919" instrument_node="">There is a long history of research on the role of sleep on cognition in animals that peaked in the 1960s to 1970s. Several reviews have been devoted to this topic </span><a class="workspace-trigger" data-dcnode-id="9917" href="#BIB86" name="bBIB86"><span data-dcnode-id="9918" instrument_node="">McGrath and Cohen 1978</span></a><span data-dcnode-id="9916" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9914" href="#BIB61" name="bBIB61"><span data-dcnode-id="9915" instrument_node="">Horne and McGrath 1984</span></a><span data-dcnode-id="9913" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9911" href="#BIB109" name="bBIB109"><span data-dcnode-id="9912" instrument_node="">Smith 1985</span></a><span data-dcnode-id="9910" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9908" href="#BIB110" name="bBIB110"><span data-dcnode-id="9909" instrument_node="">Smith 1996</span></a><span data-dcnode-id="9907" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9905" href="#BIB59" name="bBIB59"><span data-dcnode-id="9906" instrument_node="">Horne 1988</span></a><span data-dcnode-id="9904" instrument_node="">. The effects of sleep on memory in animals have commonly been assessed using sleep/REM sleep deprivation techniques; that is, training animals to criteria on tasks, depriving them of sleep (SWS, REM, or both), and then retesting them on the tasks.</span></p><p data-dcnode-id="9901"><span data-dcnode-id="9902" instrument_node="">Studies involving sleep deprivation techniques in animals have been equally divided, favoring, or not favoring, a role for sleep in memory consolidation. Although several factors have undoubtedly contributed to the mixed results, one of the most important appears to be the general state of the animals in these reports. It is widely acknowledged that the animals (mostly rodents) in many of these studies were compromised due to the severe methods used to deprive them of sleep. The most commonly used deprivation procedure has been the “flower pot” method. In brief, animals are placed on top of a small pedestal (usually a small inverted flower pot) sitting in a larger jar containing water. As animals enter sleep/REM sleep, they lose postural tone (atonia), partially or fully slip from the pedestal into the water, and awaken. Controls are placed on larger diameter pedestals or are allowed normal sleep in their home cages.</span></p><p data-dcnode-id="9890"><span data-dcnode-id="9900" instrument_node="">Although the flower pot (or pedestal) technique is an effective means of depriving animals of sleep, it is known to produce several secondary effects that are very stressful to animals, including isolation, heat loss, and muscle fatigue. Accordingly, as a group, these effects have been referred to as the “stress factor” associated with this method of deprivation </span><a class="workspace-trigger" data-dcnode-id="9898" href="#BIB43" name="bBIB43"><span data-dcnode-id="9899" instrument_node="">Fishbein and Gutwein 1977</span></a><span data-dcnode-id="9897" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9895" href="#BIB61" name="bBIB61"><span data-dcnode-id="9896" instrument_node="">Horne and McGrath 1984</span></a><span data-dcnode-id="9894" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9892" href="#BIB20" name="bBIB20"><span data-dcnode-id="9893" instrument_node="">Coenen and van Luijtelaar 1985</span></a><span data-dcnode-id="9891" instrument_node="">. It has been proposed that “stress,” rather than the loss of sleep per se, largely accounted for the learning impairments in many of these studies. Specifically, it has been argued that impairments with sleep deprivation were not true learning/memory deficits but merely performance deficits; that is, animals were simply unable to perform the required task(s) due, in large part, to the physically debilitating effects of the deprivation.</span></p><p data-dcnode-id="9864"><span data-dcnode-id="9889" instrument_node="">There have been attempts to separate learning from performance deficits (or control for the stress factor), principally (1) by using less-stressful sleep deprivation techniques, such as the multiple platform, pendulum, or the disk-over-water techniques </span><a class="workspace-trigger" data-dcnode-id="9887" href="#BIB128" name="bBIB128"><span data-dcnode-id="9888" instrument_node="">van Hulzen and Coenen 1980</span></a><span data-dcnode-id="9886" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9884" href="#BIB129" name="bBIB129"><span data-dcnode-id="9885" instrument_node="">van Hulzen and Coenen 1982</span></a><span data-dcnode-id="9883" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9881" href="#BIB130" name="bBIB130"><span data-dcnode-id="9882" instrument_node="">van Luijtelaar and Coenen 1986</span></a><span data-dcnode-id="9880" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9878" href="#BIB99" name="bBIB99"><span data-dcnode-id="9879" instrument_node="">Rechtschaffen and Bergmann 1995</span></a><span data-dcnode-id="9877" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9875" href="#BIB98" name="bBIB98"><span data-dcnode-id="9876" instrument_node="">Rechtschaffen 1998</span></a><span data-dcnode-id="9874" instrument_node="">; and/or (2) by allowing animals to recover from the effects of deprivation before testing them. In both instances, these procedures have been shown to produce minimal or no disruption of learning/memory—or considerably less than seen without them </span><a class="workspace-trigger" data-dcnode-id="9872" href="#BIB41" name="bBIB41"><span data-dcnode-id="9873" instrument_node="">Fishbein 1970</span></a><span data-dcnode-id="9871" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9869" href="#BIB42" name="bBIB42"><span data-dcnode-id="9870" instrument_node="">Fishbein 1971</span></a><span data-dcnode-id="9868" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9866" href="#BIB129" name="bBIB129"><span data-dcnode-id="9867" instrument_node="">van Hulzen and Coenen 1982</span></a><span data-dcnode-id="9865" instrument_node="">.</span></p><p data-dcnode-id="9856"><span data-dcnode-id="9863" instrument_node="">In effect, then, the stress associated with the use of the pedestal technique has confounded the findings of many of the animal studies. </span><a class="workspace-trigger" data-dcnode-id="9861" href="#BIB11" name="bBIB11"><span data-dcnode-id="9862" instrument_node="">Born and Gais (2000)</span></a><span data-dcnode-id="9860" instrument_node=""> (supporters of the sleep-memory consolidation hypothesis) recently addressed this, stating that “There are obvious flaws of REM sleep suppression paradigms that do not allow for any conclusion, either pro or contra the REM sleep-memory hypothesis.” </span><a class="workspace-trigger" data-dcnode-id="9858" href="#BIB59" name="bBIB59"><span data-dcnode-id="9859" instrument_node="">Horne (1988)</span></a><span data-dcnode-id="9857" instrument_node="">, following a review of this literature, similarly concluded that “In sum, and in relation to the memory consolidation hypothesis for REM sleep, I find the field of REM sleep deprivation and learning in animals unconvincing.”</span></p></section><section data-dcnode-id="9841" id="aep-section-id14"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9853"><span data-dcnode-id="9854" instrument_node="">Human Studies</span></h4><p data-dcnode-id="9842"><span data-dcnode-id="9852" instrument_node="">Studies examining the effects of sleep deprivation on memory processing in humans are considerably less numerous than those with animals, but like reports in animals, the results have been mixed—and if anything, on balance, they show no relationship between sleep and memory consolidation (for review, see </span><a class="workspace-trigger" data-dcnode-id="9850" href="#BIB59" name="bBIB59"><span data-dcnode-id="9851" instrument_node="">Horne 1988</span></a><span data-dcnode-id="9849" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9847" href="#BIB133" name="bBIB133"><span data-dcnode-id="9848" instrument_node="">Vertes and Eastman 2000a</span></a><span data-dcnode-id="9846" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9844" href="#BIB111" name="bBIB111"><span data-dcnode-id="9845" instrument_node="">Smith 2001</span></a><span data-dcnode-id="9843" instrument_node="">). These reports generally involve depriving subjects of a single night, or at most a couple of nights, of sleep. Although these studies are informative, it appears that a clearer understanding of the role of sleep in memory processing may be gained from an examination of the cognitive functioning of individuals that lack sleep/REM sleep. The effects of the marked suppression or elimination of sleep (mainly REM sleep) on memory processing/consolidation are discussed below.</span></p></section><section data-dcnode-id="9812" id="aep-section-id15"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9839"><span data-dcnode-id="9840" instrument_node="">Brainstem Lesions</span></h4><p data-dcnode-id="9819"><span data-dcnode-id="9838" instrument_node="">Although large lesions of the brainstem generally result in coma or death </span><a class="workspace-trigger" data-dcnode-id="9836" href="#BIB15" name="bBIB15"><span data-dcnode-id="9837" instrument_node="">(Cairns, 1952)</span></a><span data-dcnode-id="9835" instrument_node="">, there are a few documented cases of individuals who have survived these lesions with normal faculties intact. They were conscious, ambulatory, and verbally communicative—and importantly, they lacked REM sleep </span><a class="workspace-trigger" data-dcnode-id="9833" href="#BIB94" name="bBIB94"><span data-dcnode-id="9834" instrument_node="">Osorio and Daroff 1980</span></a><span data-dcnode-id="9832" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9830" href="#BIB76" name="bBIB76"><span data-dcnode-id="9831" instrument_node="">Lavie et al. 1984</span></a><span data-dcnode-id="9829" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9827" href="#BIB127" name="bBIB127"><span data-dcnode-id="9828" instrument_node="">Valldeoriola et al. 1993</span></a><span data-dcnode-id="9826" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="9824" href="#BIB94" name="bBIB94"><span data-dcnode-id="9825" instrument_node="">Osorio and Daroff (1980)</span></a><span data-dcnode-id="9823" instrument_node=""> described two such patients and reported that, aside from minor neurological deficits, they led normal lives. They stated that “Our two patients are the first awake and ambulatory humans in whom total absence of REM sleep has been demonstrated. These REM deprived patients behaved entirely appropriately and were by no means psychotic.” The “psychotic” reference alludes to the early notion, subsequently dispelled </span><a class="workspace-trigger" data-dcnode-id="9821" href="#BIB135" name="bBIB135"><span data-dcnode-id="9822" instrument_node="">(Vogel, 1975)</span></a><span data-dcnode-id="9820" instrument_node="">, that long-term REM deprivation produces psychosis.</span></p><p data-dcnode-id="9815"><a class="workspace-trigger" data-dcnode-id="9817" href="#BIB76" name="bBIB76"><span data-dcnode-id="9818" instrument_node="">Lavie et al. (1984)</span></a><span data-dcnode-id="9816" instrument_node=""> described the interesting case of a man who at the age of 20 suffered damage to the pontine region of the brainstem from shrapnel from a gunshot wound. Following the injury, the man was comatose for 10 days, remained in critical condition for another 2 weeks, and then recovered. An examination of his patterns of sleep at the age of 33 revealed a virtual absence of REM sleep. Despite this, the man led a normal life. Following the injury, he completed college, then law school, and at the time of the study was a practicing attorney.</span></p><p data-dcnode-id="9813"><span data-dcnode-id="9814" instrument_node="">Although no systematic attempt was made to examine the cognitive capacities of these patients, the virtual total loss of REM sleep did not seem to result in any apparent cognitive deficits.</span></p></section><section data-dcnode-id="9659" id="aep-section-id16"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9810"><span data-dcnode-id="9811" instrument_node="">Antidepressant Drugs</span></h4><p data-dcnode-id="9808"><span data-dcnode-id="9809" instrument_node="">It is well recognized that virtually all major antidepressant drugs suppress REM sleep, i.e., the monoamine oxidase inhibitors (MAOIs), the tricyclic antidepressants (TCAs), and the selective serotonin reuptake inhibitors (SSRIs).</span></p><p data-dcnode-id="9788"><span data-dcnode-id="9807" instrument_node="">Of the three classes of antidepressants, the MAOIs have the most pronounced REM-suppressive actions, virtually completely (or completely) eliminating REM sleep for months to years </span><a class="workspace-trigger" data-dcnode-id="9805" href="#BIB141" name="bBIB141"><span data-dcnode-id="9806" instrument_node="">Wyatt et al. 1969</span></a><span data-dcnode-id="9804" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9802" href="#BIB142" name="bBIB142"><span data-dcnode-id="9803" instrument_node="">Wyatt et al. 1971a</span></a><span data-dcnode-id="9801" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9799" href="#BIB143" name="bBIB143"><span data-dcnode-id="9800" instrument_node="">Wyatt et al. 1971b</span></a><span data-dcnode-id="9798" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9796" href="#BIB73" name="bBIB73"><span data-dcnode-id="9797" instrument_node="">Kupfer and Bowers 1972</span></a><span data-dcnode-id="9795" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9793" href="#BIB34" name="bBIB34"><span data-dcnode-id="9794" instrument_node="">Dunleavy and Oswald 1973</span></a><span data-dcnode-id="9792" instrument_node="">. Although not systematically examined, the general cognitive status of individuals on MAOIs has been described in several case reports. Richard Wyatt, a pioneer in this field, reported that various MAOIs, while strongly suppressing REM sleep, did not noticeably alter behavior. For instance, in a study of narcoleptics, </span><a class="workspace-trigger" data-dcnode-id="9790" href="#BIB143" name="bBIB143"><span data-dcnode-id="9791" instrument_node="">Wyatt et al. (1971b)</span></a><span data-dcnode-id="9789" instrument_node=""> reported that phenelzine completely abolished REM sleep in five patients for periods of 14–226 days without obvious complications. They stated: “The complete drug-induced suppression of REM sleep in these patients is longer and more profound than any previously described”; and yet, “No adverse psychological effects were noted during the period of total rapid-eye-movement suppression.”</span></p><p data-dcnode-id="9774"><span data-dcnode-id="9787" instrument_node="">Several other studies have similarly reported that MAOIs profoundly suppress (or eliminate) REM sleep without observable cognitive or motor dysfunctions </span><a class="workspace-trigger" data-dcnode-id="9785" href="#BIB1" name="bBIB1"><span data-dcnode-id="9786" instrument_node="">Akindele et al. 1970</span></a><span data-dcnode-id="9784" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9782" href="#BIB48" name="bBIB48"><span data-dcnode-id="9783" instrument_node="">Georgotas et al. 1983</span></a><span data-dcnode-id="9781" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9779" href="#BIB49" name="bBIB49"><span data-dcnode-id="9780" instrument_node="">Georgotas et al. 1989</span></a><span data-dcnode-id="9778" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9776" href="#BIB97" name="bBIB97"><span data-dcnode-id="9777" instrument_node="">Raskin et al. 1983</span></a><span data-dcnode-id="9775" instrument_node="">.</span></p><p data-dcnode-id="9757"><span data-dcnode-id="9773" instrument_node="">Unlike the MAOIs, the TCAs and SSRIs do not eliminate REM sleep, but profoundly suppress it by 75%–85% in the short term (days) and 30%–50% in the long term (weeks to years). Since the newer antidepressants, particularly SSRIs, are in such widespread use, considerably more attention has been paid to their possible effects on cognitive functions. Several reviews have been devoted to this topic </span><a class="workspace-trigger" data-dcnode-id="9771" href="#BIB122" name="bBIB122"><span data-dcnode-id="9772" instrument_node="">Thompson and Trimble 1982</span></a><span data-dcnode-id="9770" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9768" href="#BIB29" name="bBIB29"><span data-dcnode-id="9769" instrument_node="">Deptula and Pomara 1990</span></a><span data-dcnode-id="9767" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9765" href="#BIB121" name="bBIB121"><span data-dcnode-id="9766" instrument_node="">Thompson 1991</span></a><span data-dcnode-id="9764" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9762" href="#BIB71" name="bBIB71"><span data-dcnode-id="9763" instrument_node="">Knegtering et al. 1994</span></a><span data-dcnode-id="9761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9759" href="#BIB3" name="bBIB3"><span data-dcnode-id="9760" instrument_node="">Amado-Boccara et al. 1995</span></a><span data-dcnode-id="9758" instrument_node="">.</span></p><p data-dcnode-id="9716"><span data-dcnode-id="9756" instrument_node="">As a group, the TCAs have no adverse actions on memory </span><a class="workspace-trigger" data-dcnode-id="9754" href="#BIB122" name="bBIB122"><span data-dcnode-id="9755" instrument_node="">Thompson and Trimble 1982</span></a><span data-dcnode-id="9753" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9751" href="#BIB29" name="bBIB29"><span data-dcnode-id="9752" instrument_node="">Deptula and Pomara 1990</span></a><span data-dcnode-id="9750" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9748" href="#BIB121" name="bBIB121"><span data-dcnode-id="9749" instrument_node="">Thompson 1991</span></a><span data-dcnode-id="9747" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9745" href="#BIB3" name="bBIB3"><span data-dcnode-id="9746" instrument_node="">Amado-Boccara et al. 1995</span></a><span data-dcnode-id="9744" instrument_node="">. A notable exception is amitriptyline, which is known to affect memory, but does so through its sedative and anti-cholinergic actions </span><a class="workspace-trigger" data-dcnode-id="9742" href="#BIB25" name="bBIB25"><span data-dcnode-id="9743" instrument_node="">Curran et al. 1988</span></a><span data-dcnode-id="9741" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9739" href="#BIB113" name="bBIB113"><span data-dcnode-id="9740" instrument_node="">Spring et al. 1992</span></a><span data-dcnode-id="9738" instrument_node="">. By contrast, several other TCAs, including doxepin, desipramine, nortriptyline, amoxapine, protriptyline, maprotiline, and chlorimipramine have virtually no detrimental effects on memory </span><a class="workspace-trigger" data-dcnode-id="9736" href="#BIB78" name="bBIB78"><span data-dcnode-id="9737" instrument_node="">Liljequist et al. 1974</span></a><span data-dcnode-id="9735" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9733" href="#BIB96" name="bBIB96"><span data-dcnode-id="9734" instrument_node="">Pishkin et al. 1978</span></a><span data-dcnode-id="9732" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9730" href="#BIB79" name="bBIB79"><span data-dcnode-id="9731" instrument_node="">Linnoila et al. 1983</span></a><span data-dcnode-id="9729" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9727" href="#BIB87" name="bBIB87"><span data-dcnode-id="9728" instrument_node="">McNair et al. 1984</span></a><span data-dcnode-id="9726" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9724" href="#BIB25" name="bBIB25"><span data-dcnode-id="9725" instrument_node="">Curran et al. 1988</span></a><span data-dcnode-id="9723" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9721" href="#BIB49" name="bBIB49"><span data-dcnode-id="9722" instrument_node="">Georgotas et al. 1989</span></a><span data-dcnode-id="9720" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9718" href="#BIB2" name="bBIB2"><span data-dcnode-id="9719" instrument_node="">Allain et al. 1992</span></a><span data-dcnode-id="9717" instrument_node="">.</span></p><p data-dcnode-id="9669"><span data-dcnode-id="9715" instrument_node="">As is well recognized, SSRIs are currently the preferred treatment for depression. Unlike the TCAs, the SSRIs have no sedative or anti-cholinergic actions. The SSRIs have been extensively examined, with no evidence of adverse actions on motor or cognitive functions </span><a class="workspace-trigger" data-dcnode-id="9713" href="#BIB102" name="bBIB102"><span data-dcnode-id="9714" instrument_node="">Saletu et al. 1980</span></a><span data-dcnode-id="9712" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9710" href="#BIB79" name="bBIB79"><span data-dcnode-id="9711" instrument_node="">Linnoila et al. 1983</span></a><span data-dcnode-id="9709" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9707" href="#BIB74" name="bBIB74"><span data-dcnode-id="9708" instrument_node="">Lamping et al. 1984</span></a><span data-dcnode-id="9706" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9704" href="#BIB24" name="bBIB24"><span data-dcnode-id="9705" instrument_node="">Curran and Lader 1986</span></a><span data-dcnode-id="9703" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9701" href="#BIB54" name="bBIB54"><span data-dcnode-id="9702" instrument_node="">Hindmarch and Bhatti 1988</span></a><span data-dcnode-id="9700" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9698" href="#BIB101" name="bBIB101"><span data-dcnode-id="9699" instrument_node="">Saletu and Grunberger 1988</span></a><span data-dcnode-id="9697" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9695" href="#BIB55" name="bBIB55"><span data-dcnode-id="9696" instrument_node="">Hindmarch et al. 1990</span></a><span data-dcnode-id="9694" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9692" href="#BIB113" name="bBIB113"><span data-dcnode-id="9693" instrument_node="">Spring et al. 1992</span></a><span data-dcnode-id="9691" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9689" href="#BIB69" name="bBIB69"><span data-dcnode-id="9690" instrument_node="">Kerr et al. 1992</span></a><span data-dcnode-id="9688" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9686" href="#BIB70" name="bBIB70"><span data-dcnode-id="9687" instrument_node="">Kerr et al. 1993</span></a><span data-dcnode-id="9685" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9683" href="#BIB37" name="bBIB37"><span data-dcnode-id="9684" instrument_node="">Fairweather et al. 1993</span></a><span data-dcnode-id="9682" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9680" href="#BIB38" name="bBIB38"><span data-dcnode-id="9681" instrument_node="">Fairweather et al. 1996</span></a><span data-dcnode-id="9679" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9677" href="#BIB50" name="bBIB50"><span data-dcnode-id="9678" instrument_node="">Geretsegger et al. 1994</span></a><span data-dcnode-id="9676" instrument_node="">. For instance, an early review </span><a class="workspace-trigger" data-dcnode-id="9674" href="#BIB121" name="bBIB121"><span data-dcnode-id="9675" instrument_node="">(Thompson, 1991)</span></a><span data-dcnode-id="9673" instrument_node=""> concluded that “Newer compounds devoid of antimuscarinic effects, particularly the serotonin reuptake inhibitors, if not sedative, have not been associated with memory impairment”; while a more recent one </span><a class="workspace-trigger" data-dcnode-id="9671" href="#BIB3" name="bBIB3"><span data-dcnode-id="9672" instrument_node="">(Amado-Boccara et al., 1995)</span></a><span data-dcnode-id="9670" instrument_node=""> similarly stated: “antidepressants which inhibit serotonin reuptake seem to have no deleterious cognitive effects.”</span></p><p data-dcnode-id="9667"><span data-dcnode-id="9668" instrument_node="">It appears, then, that the marked suppression or complete loss of REM sleep in humans with brainstem lesions or antidepressant drugs has no detrimental effect on cognitive functions.</span></p><p data-dcnode-id="9662"><span data-dcnode-id="9666" instrument_node="">Commenting on this, </span><a class="workspace-trigger" data-dcnode-id="9664" href="#BIB118" name="bBIB118"><span data-dcnode-id="9665" instrument_node="">Stickgold (2000)</span></a><span data-dcnode-id="9663" instrument_node=""> remarked that this was not surprising, for the memories generally examined in these cases were working memory and declarative memory, which would not be expected to be altered by a disruption of REM sleep. Stickgold stated: “It is not surprising that simple cognitive and psychomotor memory tests fail to show any obvious impairment of performance after administration of drugs that disrupt REM sleep. These tests classically measure working memory and declarative memory systems that we would not expect to be affected by REM deprivation. We know of no cases in which anyone, for example, tested the effects of these drugs on complex perceptual procedural learning.”</span></p><p data-dcnode-id="9660"><span data-dcnode-id="9661" instrument_node="">Although it is possible that antidepressants, while not affecting declarative processes, may disrupt procedural memory, the evidence is lacking. As discussed, the widespread use of antidepressants has prompted a close examination of their possible side effects, not only cognitive but motor. With few exceptions, most of the commonly used antidepressants have little or no adverse actions on motor functions—indirectly indicating a lack of an effect on procedural memory.</span></p></section></section><section data-dcnode-id="9568" id="aep-section-id17"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9656"><span data-dcnode-id="9657" instrument_node="">Memory Consolidation, Procedural Memory, and Sleep</span></h3><p data-dcnode-id="9651"><span data-dcnode-id="9655" instrument_node="">Memory consolidation refers to the process of the conversion of information from initially “labile” states to more enduring forms, largely resistant to interference. </span><a class="workspace-trigger" data-dcnode-id="9653" href="#BIB91" name="bBIB91"><span data-dcnode-id="9654" instrument_node="">Nadel and Moscovitch (1997)</span></a><span data-dcnode-id="9652" instrument_node=""> described memory consolidation as the “neural processing that occurs after information is initially registered which contributes to its permanent storage in memory.”</span></p><p data-dcnode-id="9631"><span data-dcnode-id="9650" instrument_node="">Two types of memory consolidation have been described: short-term consolidation requiring minutes to hours and long-term processes that could stretch for years or a lifetime </span><a class="workspace-trigger" data-dcnode-id="9648" href="#BIB114" name="bBIB114"><span data-dcnode-id="9649" instrument_node="">Squire 1987</span></a><span data-dcnode-id="9647" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9645" href="#BIB85" name="bBIB85"><span data-dcnode-id="9646" instrument_node="">McGaugh 2000</span></a><span data-dcnode-id="9644" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9642" href="#BIB35" name="bBIB35"><span data-dcnode-id="9643" instrument_node="">Eichenbaum and Cohen 2001</span></a><span data-dcnode-id="9641" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9639" href="#BIB32" name="bBIB32"><span data-dcnode-id="9640" instrument_node="">Dudai 1989</span></a><span data-dcnode-id="9638" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9636" href="#BIB33" name="bBIB33"><span data-dcnode-id="9637" instrument_node="">Dudai 2004</span></a><span data-dcnode-id="9635" instrument_node="">. </span><a class="workspace-trigger" data-dcnode-id="9633" href="#BIB33" name="bBIB33"><span data-dcnode-id="9634" instrument_node="">Dudai (2004)</span></a><span data-dcnode-id="9632" instrument_node=""> has aptly designated these two types of memory consolidation as “synaptic” and “systems” consolidation, reflecting localization at the neuronal or systems level.</span></p><p data-dcnode-id="9608"><span data-dcnode-id="9630" instrument_node="">The demonstration that the storage of information could be disrupted shortly after acquisition by several factors (electroconvulsive shock, protein synthesis inhibition) focused attention on early events that transform traces from labile to stable states </span><a class="workspace-trigger" data-dcnode-id="9628" href="#BIB117" name="bBIB117"><span data-dcnode-id="9629" instrument_node="">Squire et al. 1975</span></a><span data-dcnode-id="9627" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9625" href="#BIB27" name="bBIB27"><span data-dcnode-id="9626" instrument_node="">Davis and Squire 1984</span></a><span data-dcnode-id="9624" instrument_node="">. These processes have now been well characterized and basically involve a series of molecular and cellular events that culminate in gene activation, protein synthesis, and synaptic restructuring </span><a class="workspace-trigger" data-dcnode-id="9622" href="#BIB5" name="bBIB5"><span data-dcnode-id="9623" instrument_node="">Bailey et al. 1996</span></a><span data-dcnode-id="9621" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9619" href="#BIB84" name="bBIB84"><span data-dcnode-id="9620" instrument_node="">Martin et al. 2000</span></a><span data-dcnode-id="9618" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9616" href="#BIB64" name="bBIB64"><span data-dcnode-id="9617" instrument_node="">Kandel 2001</span></a><span data-dcnode-id="9615" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9613" href="#BIB31" name="bBIB31"><span data-dcnode-id="9614" instrument_node="">Dubnau et al. 2003</span></a><span data-dcnode-id="9612" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9610" href="#BIB75" name="bBIB75"><span data-dcnode-id="9611" instrument_node="">Lamprecht and LeDoux 2004</span></a><span data-dcnode-id="9609" instrument_node="">.</span></p><p data-dcnode-id="9585"><span data-dcnode-id="9607" instrument_node="">Systems consolidation, on the other hand, refers to long-term processes extending for months to years that secure older memories, presumably by shifting their locus of storage from the hippocampus to the neocortex </span><a class="workspace-trigger" data-dcnode-id="9605" href="#BIB115" name="bBIB115"><span data-dcnode-id="9606" instrument_node="">Squire and Alvarez 1995</span></a><span data-dcnode-id="9604" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9602" href="#BIB36" name="bBIB36"><span data-dcnode-id="9603" instrument_node="">Eichenbaum et al. 1996</span></a><span data-dcnode-id="9601" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9599" href="#BIB100" name="bBIB100"><span data-dcnode-id="9600" instrument_node="">Rempel-Clower et al. 1996</span></a><span data-dcnode-id="9598" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9596" href="#BIB85" name="bBIB85"><span data-dcnode-id="9597" instrument_node="">McGaugh 2000</span></a><span data-dcnode-id="9595" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9593" href="#BIB35" name="bBIB35"><span data-dcnode-id="9594" instrument_node="">Eichenbaum and Cohen 2001</span></a><span data-dcnode-id="9592" instrument_node="">. “Systems consolidation” largely developed from observations of memory dysfunctions of H.M. and other patients with extensive damage to the medial temporal lobes. As is well documented, H.M. suffered a total anterograde amnesia and a temporally graded retrograde amnesia involving a nearly complete memory loss dating back to about 11 years prior to surgery, but relatively intact memories before that time </span><a class="workspace-trigger" data-dcnode-id="9590" href="#BIB104" name="bBIB104"><span data-dcnode-id="9591" instrument_node="">Scoville and Milner 1957</span></a><span data-dcnode-id="9589" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9587" href="#BIB22" name="bBIB22"><span data-dcnode-id="9588" instrument_node="">Corkin 1984</span></a><span data-dcnode-id="9586" instrument_node="">.</span></p><p data-dcnode-id="9580"><span data-dcnode-id="9584" instrument_node="">“Consolidation” has been used ambiguously in the sleep literature to denote a rather ill-defined sleep-associated mechanism that serves to consolidate waking experiences. It has essentially been used operationally to refer to sleep-dependent processes that produce greater gains in performance with sleep than without it. Only recently have attempts been made </span><a class="workspace-trigger" data-dcnode-id="9582" href="#BIB53" name="bBIB53"><span data-dcnode-id="9583" instrument_node="">(Graves et al., 2001)</span></a><span data-dcnode-id="9581" instrument_node=""> to relate sleep-dependent consolidation to processes well characterized at the synaptic or systems level.</span></p><p data-dcnode-id="9569"><span data-dcnode-id="9579" instrument_node="">Although not discussed in these terms, sleep-dependent consolidation would appear to be a variant of synaptic consolidation—primarily for two reasons. In the first instance, sleep-dependent consolidation is a short-term event; major changes are observed within 24 hr postacquisition and progressively decline thereafter </span><a class="workspace-trigger" data-dcnode-id="9577" href="#BIB109" name="bBIB109"><span data-dcnode-id="9578" instrument_node="">Smith 1985</span></a><span data-dcnode-id="9576" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9574" href="#BIB110" name="bBIB110"><span data-dcnode-id="9575" instrument_node="">Smith 1996</span></a><span data-dcnode-id="9573" instrument_node="">. Second, as discussed, sleep is selectively involved in the consolidation of procedural memories, and being procedural, would not seem to involve temporal lobe structures associated with the long-term storage and reorganization of information—or systems consolidation. As </span><a class="workspace-trigger" data-dcnode-id="9571" href="#BIB33" name="bBIB33"><span data-dcnode-id="9572" instrument_node="">Dudai (2004)</span></a><span data-dcnode-id="9570" instrument_node=""> recently noted: “At the time of this writing, no evidence is available for more prolonged consolidation of skill.”</span></p></section><section data-dcnode-id="9350" id="aep-section-id18"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9566"><span data-dcnode-id="9567" instrument_node="">Procedural Memory and Time- Dependent Consolidation</span></h3><p data-dcnode-id="9552"><span data-dcnode-id="9565" instrument_node="">As indicated, procedural memory is one of the two major classes of memory and is characterized as “how to” memory, the essentially unconscious acquisition and storage of perceptual and motor skills. Until fairly recently, procedural memory was not thought to be governed by the same principles as declarative memory, including short-term consolidation over time. In a series of studies, however, Shadmehr and colleagues </span><a class="workspace-trigger" data-dcnode-id="9563" href="#BIB12" name="bBIB12"><span data-dcnode-id="9564" instrument_node="">Brashers-Krug et al. 1996</span></a><span data-dcnode-id="9562" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9560" href="#BIB105" name="bBIB105"><span data-dcnode-id="9561" instrument_node="">Shadmehr and Brashers-Krug 1997</span></a><span data-dcnode-id="9559" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9557" href="#BIB30" name="bBIB30"><span data-dcnode-id="9558" instrument_node="">Donchin et al. 2002</span></a><span data-dcnode-id="9556" instrument_node=""> reported that human motor learning, like other types of learning, undergoes a process of consolidation. Specifically, they showed that the learning of a motor task (reaching movements with planar manipulandum) was significantly disrupted when a second task followed the first by 5 or 60 min, but not when the two tasks were separated by more than 4 hr. They concluded that motor skills are “consolidated” over an approximately 4–6 hr period, comparable to the consolidation of declarative memories. They stated: “Previous studies in humans and other primates have found this time-dependent disruption of consolidation only in explicit memory tasks which rely on brain structures of the medial temporal lobe. Our results indicate that motor memories, which do not depend on the medial temporal lobe, can be transformed by a similar process of consolidation” </span><a class="workspace-trigger" data-dcnode-id="9554" href="#BIB12" name="bBIB12"><span data-dcnode-id="9555" instrument_node="">(Brashers-Krug et al., 1996)</span></a><span data-dcnode-id="9553" instrument_node="">.</span></p><p data-dcnode-id="9547"><span data-dcnode-id="9551" instrument_node="">In line with the foregoing, </span><a class="workspace-trigger" data-dcnode-id="9549" href="#BIB89" name="bBIB89"><span data-dcnode-id="9550" instrument_node="">Muellbacher et al. (2002)</span></a><span data-dcnode-id="9548" instrument_node=""> demonstrated that transcranial magnetic stimulation of the primary motor cortex (M1) disrupted performance on a motor task (finger movements) when applied immediately following training, but not when given 6 hr after acquisition.</span></p><p data-dcnode-id="9542"><span data-dcnode-id="9546" instrument_node="">If, as indicated above, motor learning involves a period of consolidation lasting about 4–6 hr, it is not unreasonable to surmise that this process, initiated with task acquisition in waking, could continue into sleep in a time-dependent manner. In this sense, then, (procedural) consolidation </span><em data-dcnode-id="9544"><span data-dcnode-id="9545" instrument_node="">would</span></em><span data-dcnode-id="9543" instrument_node=""> (or could) take place during sleep. This could account for the beneficial effects of sleep on procedural learning in some studies. Importantly, however, this would be a time-dependent, and not state-dependent, process that begins with acquisition in waking and could, in some instances, extend to sleep. An obviously important difference between state- and time-dependent mechanisms is that changes in state (e.g., sleep to waking) would not alter the process; that is, awakenings from sleep would not disrupt time-dependent consolidation begun in waking.</span></p><p data-dcnode-id="9537"><span data-dcnode-id="9541" instrument_node="">In this regard, Shadmehr and associates </span><a class="workspace-trigger" data-dcnode-id="9539" href="#BIB30" name="bBIB30"><span data-dcnode-id="9540" instrument_node="">(Donchin et al., 2002)</span></a><span data-dcnode-id="9538" instrument_node=""> recently demonstrated time (but not state) dependency on an arm reaching ta
