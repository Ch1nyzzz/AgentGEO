uage_learning"><span class="toc_number toc_depth_1" data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">26</span></span><span data-dcnode-id="1270" instrument_node=""> How do socioeconomics and ethnicity affect language learning?</span></a></li><li data-dcnode-id="1263"><a data-dcnode-id="1264" href="#How_poverty_affects_children_in_the_Philippines"><span class="toc_number toc_depth_1" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">27</span></span><span data-dcnode-id="1265" instrument_node=""> How poverty affects children in the Philippines?</span></a></li><li data-dcnode-id="1258"><a data-dcnode-id="1259" href="#What_are_the_effects_of_poverty_in_the_Philippines"><span class="toc_number toc_depth_1" data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">28</span></span><span data-dcnode-id="1260" instrument_node=""> What are the effects of poverty in the Philippines?</span></a></li><li data-dcnode-id="1253"><a data-dcnode-id="1254" href="#Why_lack_of_education_is_a_problem_in_the_Philippines"><span class="toc_number toc_depth_1" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">29</span></span><span data-dcnode-id="1255" instrument_node=""> Why lack of education is a problem in the Philippines?</span></a></li><li data-dcnode-id="1248"><a data-dcnode-id="1249" href="#How_does_poverty_affect_psychology"><span class="toc_number toc_depth_1" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">30</span></span><span data-dcnode-id="1250" instrument_node=""> How does poverty affect psychology?</span></a></li><li data-dcnode-id="1243"><a data-dcnode-id="1244" href="#How_does_poverty_affect_us"><span class="toc_number toc_depth_1" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">31</span></span><span data-dcnode-id="1245" instrument_node=""> How does poverty affect us?</span></a></li><li data-dcnode-id="1238"><a data-dcnode-id="1239" href="#How_does_poverty_affect_a_teens_mental_health"><span class="toc_number toc_depth_1" data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">32</span></span><span data-dcnode-id="1240" instrument_node=""> How does poverty affect a teens mental health?</span></a></li><li data-dcnode-id="1233"><a data-dcnode-id="1234" href="#How_does_poverty_impact_the_well_being_of_humans_today"><span class="toc_number toc_depth_1" data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">33</span></span><span data-dcnode-id="1235" instrument_node=""> How does poverty impact the well being of humans today?</span></a></li><li data-dcnode-id="1228"><a data-dcnode-id="1229" href="#Does_poverty_affect_learning_and_attainment"><span class="toc_number toc_depth_1" data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">34</span></span><span data-dcnode-id="1230" instrument_node=""> Does poverty affect learning and attainment?</span></a></li><li data-dcnode-id="1223"><a data-dcnode-id="1224" href="#Does_poverty_affect_children_in_education"><span class="toc_number toc_depth_1" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">35</span></span><span data-dcnode-id="1225" instrument_node=""> Does poverty affect children in education?</span></a></li></ul></div><span data-dcnode-id="1220" instrument_node="">
</span><h2 data-dcnode-id="1216"><span data-dcnode-id="1217" id="How_Does_Poverty_Affect_Learning"><span data-dcnode-id="1218" id="How Does Poverty Affect Learning?"><span data-dcnode-id="1219" instrument_node="">How Does Poverty Affect Learning?</span></span></span></h2><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1206"><span class="ILfuVd" data-dcnode-id="1209"><span class="hgKElc" data-dcnode-id="1210"><span data-dcnode-id="1214" instrument_node="">Poverty </span><b data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">reduces a child’s readiness for school</span></b><span data-dcnode-id="1211" instrument_node=""> because it leads to poor physical health and motor skills, diminishes a child’s ability to concentrate and remember information, and reduces attentiveness, curiosity and motivation.</span></span></span><span class="kX21rb ZYHQ7e" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Nov 4, 2013</span></span></p><span data-dcnode-id="1205" instrument_node="">
</span><h2 data-dcnode-id="1201"><span data-dcnode-id="1202" id="How_does_poverty_influence_learning"><span data-dcnode-id="1203" id="How does poverty influence learning?"><span data-dcnode-id="1204" instrument_node="">How does poverty influence learning?</span></span></span></h2><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1194"><span class="hgKElc" data-dcnode-id="1195"><span data-dcnode-id="1199" instrument_node="">Poverty affects children on several levels, including physical, social-emotional and cognitive. According to the NIH, “the stresses of poverty lead to </span><b data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">impaired learning ability in children from impoverished backgrounds</span></b><span data-dcnode-id="1196" instrument_node="">.” … This poor sense of agency affects their focus, initiative and engagement in the classroom.</span></span></p><span data-dcnode-id="1193" instrument_node="">
</span><h2 data-dcnode-id="1189"><span data-dcnode-id="1190" id="How_does_poverty_affect_teaching_and_learning"><span data-dcnode-id="1191" id="How does poverty affect teaching and learning?"><span data-dcnode-id="1192" instrument_node="">How does poverty affect teaching and learning?</span></span></span></h2><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1182"><span class="hgKElc" data-dcnode-id="1183"><span data-dcnode-id="1187" instrument_node="">Poor nutrition and being malnourished can </span><b data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">affect a child’s cognitive abilities</span></b><span data-dcnode-id="1184" instrument_node=""> as well as their level of concentration. This can set them back when it comes to learning new concepts and developing new skills.</span></span></p><span data-dcnode-id="1181" instrument_node="">
</span><h2 data-dcnode-id="1177"><span data-dcnode-id="1178" id="How_does_poverty_affect_the_learning_environment"><span data-dcnode-id="1179" id="How does poverty affect the learning environment?"><span data-dcnode-id="1180" instrument_node="">How does poverty affect the learning environment?</span></span></span></h2><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1170"><span class="hgKElc" data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">It is well documented that </span><b data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">poverty decreases a child’s readiness for school through aspects of health, home life, schooling and neighbourhoods</span></b><span data-dcnode-id="1172" instrument_node="">. … Children from low-income families often do not receive the stimulation and do not learn the social skills required to prepare them for school.</span></span></p><span data-dcnode-id="1169" instrument_node="">
</span><h2 data-dcnode-id="1165"><span data-dcnode-id="1166" id="How_does_poverty_affect_academic_performance"><span data-dcnode-id="1167" id="How does poverty affect academic performance?"><span data-dcnode-id="1168" instrument_node="">How does poverty affect academic performance?</span></span></span></h2><span data-dcnode-id="1164" instrument_node="">
</span><p data-dcnode-id="1158"><span class="hgKElc" data-dcnode-id="1159"><span data-dcnode-id="1163" instrument_node="">Children raised in poverty experience </span><b data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">many emotional and social challenges, chronic stressors</span></b><span data-dcnode-id="1160" instrument_node="">, and cognitive lags due to significant changes in brain structure in areas related to memory and emotion, which result in lower academic achievement and more behavioural issues in the classroom.</span></span></p><span data-dcnode-id="1157" instrument_node="">
</span><h2 data-dcnode-id="1153"><span data-dcnode-id="1154" id="How_does_poverty_affect_early_childhood_education"><span data-dcnode-id="1155" id="How does poverty affect early childhood education?"><span data-dcnode-id="1156" instrument_node="">How does poverty affect early childhood education?</span></span></span></h2><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1146"><span class="hgKElc" data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">These young children suffer in the classroom: Poverty-stricken youth show </span><b data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">higher rates of academic failure and an increased probability of grade retention</span></b><span data-dcnode-id="1148" instrument_node="">. Children from poor families are twice as likely to repeat a grade, and they are about 10 times as likely to drop out of high school.</span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><h2 data-dcnode-id="1141"><span data-dcnode-id="1142" id="How_can_poverty_be_a_barrier_to_learning"><span data-dcnode-id="1143" id="How can poverty be a barrier to learning?"><span data-dcnode-id="1144" instrument_node="">How can poverty be a barrier to learning?</span></span></span></h2><span data-dcnode-id="1140" instrument_node="">
</span><div class="di3YZe" data-dcnode-id="73"><span data-dcnode-id="1139" instrument_node="">
</span><div aria-level="3" class="co8aDb" data-dcnode-id="1136" role="heading"><b data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">Check out these 5 concrete ways to help students living in poverty.</span></b></div><span data-dcnode-id="1135" instrument_node="">
</span><div class="RqBzHd" data-dcnode-id="74"><span data-dcnode-id="1134" instrument_node="">
</span><ol class="X5LH0c" data-dcnode-id="1117"><span data-dcnode-id="1133" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Have high expectations. … </span></li><span data-dcnode-id="1130" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Expose students to places outside of the classroom. … </span></li><span data-dcnode-id="1127" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Build relationships with your students and their families. … </span></li><span data-dcnode-id="1124" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Teach them social-emotional learning strategies. … </span></li><span data-dcnode-id="1121" instrument_node="">
</span><li class="TrT0Xe" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Create a positive classroom culture.</span></li><span data-dcnode-id="1118" instrument_node="">
</span></ol><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1112"><span data-dcnode-id="1113" id="How_does_poverty_affect_literacy"><span data-dcnode-id="1114" id="How does poverty affect literacy?"><span data-dcnode-id="1115" instrument_node="">How does poverty affect literacy?</span></span></span></h2><span data-dcnode-id="1111" instrument_node="">
</span><div class="wDYxhc" data-dcnode-id="75" data-md="61" style="clear:none"><span data-dcnode-id="1110" instrument_node="">
</span><div aria-level="3" class="LGOjhe" data-attrid="wa:/description" data-dcnode-id="76" data-hveid="CAQQAA" role="heading"><span class="ILfuVd" data-dcnode-id="1104"><span class="hgKElc" data-dcnode-id="1105"><span data-dcnode-id="1109" instrument_node="">It is undeniable that poverty leads to disparities in reading and language development. Research has consistently demonstrated that poverty levels are associated with </span><b data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">a decrease in phonological awareness, vocabulary, and syntax throughout</span></b><span data-dcnode-id="1106" instrument_node=""> the various stages of development.</span></span></span><p data-dcnode-id="1103"></p><span data-dcnode-id="1102" instrument_node="">
</span><h2 data-dcnode-id="1098"><span data-dcnode-id="1099" id="How_does_poverty_affect_a_child8217s_brain_development"><span data-dcnode-id="1100" id="How does poverty affect a child's brain development?"><span data-dcnode-id="1101" instrument_node="">How does poverty affect a child’s brain development?</span></span></span></h2><span data-dcnode-id="1097" instrument_node="">
</span><div class="wDYxhc" data-dcnode-id="77" data-md="61" style="clear:none"><span data-dcnode-id="1096" instrument_node="">

</span><p data-dcnode-id="780"><span class="hgKElc" data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">Issues like </span><b data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">hunger, illness, and poor sanitation</span></b><span data-dcnode-id="782" instrument_node=""> are all causes and effects of poverty. Bad sanitation makes one susceptible to diseases, and hunger and lack of clean water makes one even more vulnerable to diseases. …</span></span></p><span data-dcnode-id="779" instrument_node="">
</span><h2 data-dcnode-id="775"><span data-dcnode-id="776" id="How_does_poverty_affect_a_teens_mental_health"><span data-dcnode-id="777" id="How does poverty affect a teens mental health?"><span data-dcnode-id="778" instrument_node="">How does poverty affect a teens mental health?</span></span></span></h2><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="768"><span class="hgKElc" data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">Chronic exposure to poverty increases adolescents’ risks for mental disorders such as </span><b data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">depression, behavioral risks such as substance use</span></b><span data-dcnode-id="770" instrument_node=""> (Fergusson et al., 2000), early sexual debut (McBride, Paikoff, &amp; Holmbeck, 2003), and criminal activity (Davis, Banks, Fisher, &amp; Grudzinsksa, 2004).</span></span></p><span data-dcnode-id="767" instrument_node="">
</span><h2 data-dcnode-id="763"><span data-dcnode-id="764" id="How_does_poverty_impact_the_well_being_of_humans_today"><span data-dcnode-id="765" id="How does poverty impact the well being of humans today?"><span data-dcnode-id="766" instrument_node="">How does poverty impact the well being of humans today?</span></span></span></h2><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="756"><span class="hgKElc" data-dcnode-id="757"><span data-dcnode-id="761" instrument_node="">Poverty can </span><b data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">affect the health of people at all ages</span></b><span data-dcnode-id="758" instrument_node="">. In infancy, it is associated with a low birth weight, shorter life expectancy and a higher risk of death in the first year of life. Children living in poverty are more likely to suffer from chronic diseases and diet-related problems.</span></span></p><span data-dcnode-id="755" instrument_node="">
</span><h2 data-dcnode-id="751"><span data-dcnode-id="752" id="Does_poverty_affect_learning_and_attainment"><span data-dcnode-id="753" id="Does poverty affect learning and attainment?"><span data-dcnode-id="754" instrument_node="">Does poverty affect learning and attainment?</span></span></span></h2><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="744"><span class="hgKElc" data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">Children growing up in poorer families emerge from school with </span><b data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">substantially lower levels of educational attainment</span></b><span data-dcnode-id="746" instrument_node="">. This is a major contributing factor to patterns of social mobility and poverty.</span></span></p><span data-dcnode-id="743" instrument_node="">
</span><h2 data-dcnode-id="739"><span data-dcnode-id="740" id="Does_poverty_affect_children_in_education"><span data-dcnode-id="741" id="Does poverty affect children in education?"><span data-dcnode-id="742" instrument_node="">Does poverty affect children in education?</span></span></span></h2><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="732"><span class="hgKElc" data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">Low income is a strong predictor of low educational performance. </span><b data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">White children in poverty have on average lower educational achievement</span></b><span data-dcnode-id="734" instrument_node=""> and are more likely to continue to under-achieve. … This influences the development of different attitudes to education at primary school that help shape their future.</span></span></p><span data-dcnode-id="731" instrument_node="">
