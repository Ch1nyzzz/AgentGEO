</span><h2 data-dcnode-id="4258"><span data-dcnode-id="4259" instrument_node="">Association:</span></h2><span data-dcnode-id="4257" instrument_node="">
</span><p data-dcnode-id="4255"><span data-dcnode-id="4256" instrument_node="">– Weak point &amp; place of torture.</span></p><span data-dcnode-id="4254" instrument_node="">
</span><h2 data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">Question:</span></h2><span data-dcnode-id="4251" instrument_node="">
</span><p data-dcnode-id="4249"><span data-dcnode-id="4250" instrument_node="">– What or which injuries I can or must to heal now?</span></p><p data-dcnode-id="4248"></p><center data-dcnode-id="4247"></center><p data-dcnode-id="4246"></p><span data-dcnode-id="4245" instrument_node="">
</span><h2 data-dcnode-id="4243"><span data-dcnode-id="4244" instrument_node="">General Meanings:</span></h2><span data-dcnode-id="4242" instrument_node="">
</span><p data-dcnode-id="4238"><strong data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">Aggression and Inner Hurt</span></strong><span data-dcnode-id="4239" instrument_node=""> Dreaming of any wounds or injuries stand for injured feelings. If the dreamer himself is the cause of the wound, or if he is injuring himself in the dream, then this is evidence of his aggression and his distrust in waking life.</span></p><span data-dcnode-id="4237" instrument_node="">
</span><h2 data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">Psychological Meanings:</span></h2><span data-dcnode-id="4234" instrument_node="">
</span><p data-dcnode-id="4230"><strong data-dcnode-id="4232"><span data-dcnode-id="4233" instrument_node="">Suffer</span></strong><span data-dcnode-id="4231" instrument_node=""> Wounds or injuries are dreams which stands for the painful experiences of the dreamer.</span></p><span data-dcnode-id="4229" instrument_node="">
</span><ul data-dcnode-id="4213"><span data-dcnode-id="4228" instrument_node="">
</span><li data-dcnode-id="4222"><strong data-dcnode-id="4226"><span data-dcnode-id="4227" instrument_node="">Wish to forget suffer</span></strong><span data-dcnode-id="4225" instrument_node=""> – </span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">If the wound is protected in a dream or already healed, it reflects the wish of the dreamer to forget suffering disappointments and overcome it.</span></em></li><span data-dcnode-id="4221" instrument_node="">
</span><li data-dcnode-id="4215"><strong data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">Need for changes in life</span></strong><span data-dcnode-id="4218" instrument_node=""> –</span><em data-dcnode-id="4216"><span data-dcnode-id="4217" instrument_node=""> If the wound does not hurt in the dream, it’s just a metaphor for the fact, that our psychic is in disarray, that we must change our life style to overcome a mental mess.</span></em></li><span data-dcnode-id="4214" instrument_node="">
</span></ul><span data-dcnode-id="4212" instrument_node="">

nd all he says is “you’ve probably done erased all the txts now” seriously? No I didn’t. Anyways. Idk if the dream is tellin me to make a change by leaving him or make a change as in tell him how I feel (like a child trapped in my own home) to try to fix things and move on to where I don’t feel like he’s more of my dad than my fiancé. Can anyone help? My email is </span><a data-dcnode-id="3370" href="mailto:brandialeman@ymail.com"><span data-dcnode-id="3371" instrument_node="">brandialeman@ymail.com</span></a><span data-dcnode-id="3369" instrument_node=""> if more info is needed. Thanks.</span></p><span data-dcnode-id="3367" instrument_node="">

</span><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">In my dream two weeks ago I was standing above a covered swimming pool with no one in it. My ex-lover appeared out of nowhere. She either jumped in it, or i thought she did, and I followed. I felt I went all the way down, touching the bottom with my knees. I swam under water comfortably. At the other side of the pool, still under water i realised something was amiss and i decided to get out. The area right above my calf and slightly below my knee had a deep cut, bleeding profusely. I remember feeling alarmed at the detailed view of my muscles, veins and bones as well as shocked at the severity as it didn’t quite feel that painful. I tried to stop the blood from escaping by covering the wound with my hands, but it was spilling out uncontrollably. I draged the leg to the emergency where the only person on duty was some drug addict, who ignored my pleas for help and offered a syringe filled with something i refused to take. Suddenly my sister shows up and shocked screams at me and i wake up.</span></p><span data-dcnode-id="907" instrument_node="">

</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">A month or two after this, I had a similar dream. This time, I dreamt that I was slicing my older sister’s arm with a knife. I don’t remember having an expression on my face, and I wasn’t stabbing her either. I remember her telling me to do it “Nice and slow.” Then, she snatched the knife from me and proceeded to stab me with it. I remember trying to get away, but my fate remains unknown because it was then I woke up.</span></p><span data-dcnode-id="571" instrument_node="">
