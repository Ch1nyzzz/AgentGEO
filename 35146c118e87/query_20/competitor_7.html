</span><h2 class="relatedtitle" data-dcnode-id="2524"><a data-dcnode-id="2525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - The Complete Guide to Interpreting Your Dreams"><span data-dcnode-id="2526" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2520"><span data-dcnode-id="2523" instrument_node="">Bubble, bubble, toil and trouble will be yonrs if you dreamed of anything black, unless you saw it at a funeral, in which case it predicts success, especially in love affairs.</span><p data-dcnode-id="2521"><span data-dcnode-id="2522" instrument_node="">See also Colors.... The Complete Guide to Interpreting Your Dreams</span></p></div><p class="readmore" data-dcnode-id="2517"><a data-dcnode-id="2518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2519" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2514"><a data-dcnode-id="2515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-complete-guide-to-interpreting-your-dreams" title="Dream Source: The Complete Guide to Interpreting Your Dreams"><span data-dcnode-id="2516" instrument_node="">The Complete Guide to Interpreting Your Dreams</span></a></strong></div><span data-dcnode-id="2512" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2467"><span data-dcnode-id="2511" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2508"><a data-dcnode-id="2509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - A Dictionary of Dream Symbols"><span data-dcnode-id="2510" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2474"><span data-dcnode-id="2507" instrument_node="">(1) A black hole or dark depths - for example, an unlit cellar or a deep well or oceanic depths - may represent the unconscious. This blackness mav be frightening, so long as the unconscious remains alien and unfamiliar. However, black can also be warm and comforting - which is whv insomniacs arc sometimes advised to close their eyes and imagine themselves wrapped.round in black velvet.</span><p data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">If you begin to trust your unconscious (which means trusting Nature), each previously horrifying or disgusting part of your unconscious will show itself in a new light, as something vou need for personal fulfilment. Putting vour consciousness</span></p><p data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">into the unconscious - becoming aware of it - means putting more and more light into the darkness.</span></p><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">If a star or other bright light appears in the blackness, this may be seen as a ‘light at the end of the tunnel’, that is, as a symbol of the ‘illumination’ - new wisdom or insight - that may be achieved by dwelling a while in the unconscious and making its better acquaintance.</span></p><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">(2) Black (particularly for white people) may symbolize evil.</span></p><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">If so, bear in mind that, as a general rule, what appears in your dreams is always some part of you, and that the so-called ‘evil’ (and therefore repressed) parts of you are really evil only if, because of neglect, they become rebellious, or if you let them take control away from your conscious self. These ‘evil’ things are transformed into good things - creative, and bringing fuller life, happiness and wholeness - when conscious and unconscious interact and establish a harmonious working relationship.</span></p><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">NB It is only Judaism, Christianity and Islam that have a thoroughgoing dualism of good and evil, and a matching moral dogmatism. In the earliest known forms of religion, and in traditions (such as the Hindu, Buddhist and Taoist traditions) that have not cut themselves off from their early roots, good and evil are opposite but equally necessary’ components of reality; and in mystical traditions (including Jewish, Christian and Islamic mysticism) even God is described as a coming together of opposites - good and evil, but also masculine and feminine.</span></p><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">(3) A person dressed in black may represent vour shadow.</span></p><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">(4) A black-skinned person (if you are white-skinned) may represent either the shadow or closeness to Nature.</span></p><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">(5) A black animal probably represents some unconscious repressed drive or emotion.</span></p><p data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">If the animal is fierce, this possibly means that something yrou have repressed is now urgently pressing you to give it your conscious attention and let it have some expression in your w aking life.</span></p><p data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">(6) Blackness (as in a black night, etc.) may simply signify’ diminished visibility, in which case the meaning of the dream may have something to do w ith a loss of orientation in your life. Do vou feel you don’t know’ which w’ay to go; or that you don’t hav e the energy’ or will to go in any direction? If so, make a pact w ith v our unconscious to die effect that, if it will tell you where you have the potential - and the need - to go, you will respond accordingly in your life. Then pav close attention</span></p><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">to the dreams that follow. (If you go the next few nights without dreaming - or, more precisely, without recalling any dreams - this probably means that you are backing out of the pact and setting up a defence against what you fear your unconscious might have to tell you.)</span></p><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">(7) Black may symbolize despair or deep depression.</span></p><p data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">If so, follow the advice given in (6) above.</span></p><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">(8) In many parts of the world black is associated with death.</span></p><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">It is possible, therefore, that this is what the colour signifies in your dream. Bear in mind, however, that death in a dream may refer to something internal: the ‘death’ - or the giving up - of something within you (for example, some irrational fear, or other negative attitude or emotion). See also Death.... A Dictionary of Dream Symbols</span></p></div><p class="readmore" data-dcnode-id="2471"><a data-dcnode-id="2472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2473" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2468"><a data-dcnode-id="2469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/a-dictionary-of-dream-symbols" title="Dream Source: A Dictionary of Dream Symbols"><span data-dcnode-id="2470" instrument_node="">A Dictionary of Dream Symbols</span></a></strong></div><span data-dcnode-id="2466" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2453"><span data-dcnode-id="2465" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2462"><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - The Dream Books Symbols"><span data-dcnode-id="2464" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Unconscious, unknown parts of self, sometimes those we have rejected through fear. See Color.... The Dream Books Symbols</span></div><p class="readmore" data-dcnode-id="2457"><a data-dcnode-id="2458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2459" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2454"><a data-dcnode-id="2455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-dream-books-symbols" title="Dream Source: The Dream Books Symbols"><span data-dcnode-id="2456" instrument_node="">The Dream Books Symbols</span></a></strong></div><span data-dcnode-id="2452" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2437"><span data-dcnode-id="2451" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2448"><a data-dcnode-id="2449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - The Big Dictionary of Dreams"><span data-dcnode-id="2450" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2444"><span data-dcnode-id="2447" instrument_node="">The color black represents fear, the absence of light, and ignorance.</span><p data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">It is also associated with death, pain, and sadness. When this color predominates in a dream, it means you are being brought down by pessimism and confusion. (See DESERT, MIDNIGHT, and DEATH)... The Big Dictionary of Dreams</span></p></div><p class="readmore" data-dcnode-id="2441"><a data-dcnode-id="2442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2443" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2438"><a data-dcnode-id="2439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-big-dictionary-of-dreams" title="Dream Source: The Big Dictionary of Dreams"><span data-dcnode-id="2440" instrument_node="">The Big Dictionary of Dreams</span></a></strong></div><span data-dcnode-id="2436" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2421"><span data-dcnode-id="2435" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2432"><a data-dcnode-id="2433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - Complete Dictionary of Dreams"><span data-dcnode-id="2434" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2428"><span data-dcnode-id="2431" instrument_node="">The darker sides of life connect with the color black. Though it is thought of as the absence of color to some, in the world of physics, black is actually the presence of all colors in the object that embodies it.</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">It is the color that absorbs the most light, retains heat, and is associated with death, as it is the opposite of life-affirming white. As the color of mourning, black clothing represents the social construct of receiving consolation in some cultures. When we are in mourning, we are surrounded by people who share in our sadness. In the same way that a black shirt will absorb all wavelengths of sunlight, a person in mourning wears black in order to absorb the light from those who surround him or her. In the world of fashion, black has a connotation of being trendy and sophisticated. Nighttime is when blackness reigns, bringing secrecy and the ability to hide into this color’s symbolic meaning.... Complete Dictionary of Dreams</span></p></div><p class="readmore" data-dcnode-id="2425"><a data-dcnode-id="2426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2427" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2422"><a data-dcnode-id="2423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/complete-dictionary-of-dreams" title="Dream Source: Complete Dictionary of Dreams"><span data-dcnode-id="2424" instrument_node="">Complete Dictionary of Dreams</span></a></strong></div><span data-dcnode-id="2420" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2403"><span data-dcnode-id="2419" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2416"><a data-dcnode-id="2417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Dream Interpretation black - The Element Encyclopedia"><span data-dcnode-id="2418" instrument_node="">Black</span></a></h2><div class="relatedmean" data-dcnode-id="2410"><span data-dcnode-id="2415" instrument_node="">Black is viewed as a symbol of death and mourning in many cultures, and when it appears in dreams it is linked with feelings of sadness, loss and even passivity. Its appearance may also represent the death of old ideas, or some other aspect of change. Another possible explanation is that it represents a hidden or rejected aspect of the dreamer, as it is also the color of mystery, the unconscious and sometimes even protection. Some dream analysts refer to the shadowy effects of black in dreams, suggesting that they are symbols of the dreamer’s shadow or of an unfulfilled part of their life. It may therefore symbolize absolute recklessness and disregard of life, without considering or caring about the consequences.</span><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">If black predominates in a dream, consider taking a rational and reasonable approach in waking life</span></p><p data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">A black coffin in a dream may represent the end of a friendship and the dream may force the dreamer to re-evaluate the friendship, or let it go.&nbsp;... The Element Encyclopedia</span></p></div><p class="readmore" data-dcnode-id="2407"><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black" title="Black Dream Meaning | Read More... "><span data-dcnode-id="2409" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2404"><a data-dcnode-id="2405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-element-encyclopedia" title="Dream Source: The Element Encyclopedia"><span data-dcnode-id="2406" instrument_node="">The Element Encyclopedia</span></a></strong></div><span data-dcnode-id="2402" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2389"><span data-dcnode-id="2401" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2398"><a data-dcnode-id="2399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-white-birds" title="Dream Interpretation black / white birds - Dream Meanings of Versatile"><span data-dcnode-id="2400" instrument_node="">Black / White Birds</span></a></h2><div class="relatedmean" data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">The two aspects of the anima or self may be represented as two opposites; the black bird signifies the dark, neglected or shadowy side; the white the open, clear, free side. ... Dream Meanings of Versatile</span></div><p class="readmore" data-dcnode-id="2393"><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-white-birds" title="Black / white birds Dream Meaning | Read More... "><span data-dcnode-id="2395" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2390"><a data-dcnode-id="2391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/dream-meanings-of-versatile" title="Dream Source: Dream Meanings of Versatile"><span data-dcnode-id="2392" instrument_node="">Dream Meanings of Versatile</span></a></strong></div><span data-dcnode-id="2388" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2372"><span data-dcnode-id="2387" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2384"><a data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-and-white" title="Dream Interpretation black and white - My Dream Interpretation"><span data-dcnode-id="2386" instrument_node="">Black And White</span></a></h2><div class="relatedmean" data-dcnode-id="2379"><span data-dcnode-id="2383" instrument_node="">If your dream is all in black and white </span><b data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">(with no color)</span></b><span data-dcnode-id="2380" instrument_node="">, you are experiencing an internal change. Your conscious and unconscious selves are merging to create a greater self. This is a positive dream of unification.... My Dream Interpretation</span></div><p class="readmore" data-dcnode-id="2376"><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-and-white" title="Black and white Dream Meaning | Read More... "><span data-dcnode-id="2378" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2373"><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/my-dream-interpretation" title="Dream Source: My Dream Interpretation"><span data-dcnode-id="2375" instrument_node="">My Dream Interpretation</span></a></strong></div><span data-dcnode-id="2371" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2350"><span data-dcnode-id="2370" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2367"><a data-dcnode-id="2368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-and-white-dreams" title="Dream Interpretation black and white dreams - The Element Encyclopedia"><span data-dcnode-id="2369" instrument_node="">Black And White Dreams</span></a></h2><div class="relatedmean" data-dcnode-id="2357"><span data-dcnode-id="2366" instrument_node="">To dream in black and white suggests that you need to be more objective in formulating your decisions. You may be a little too unyielding in your thought processes, and thus need to find some sort of balance between two opposing views. Consider the views and opinions of others. Alternatively, black and white dreams may be a sign of depression or sadness. You may feel that there is not enough excitement in your life.</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">It is a quite commonly held belief that we only dream in black and white, but many people are able to identify tones of color in their dreams.</span></p><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">If this is the case, why is it believed that we only dream in black and white? It may be because dreams that appear to be black and white only appear so because the color is not relevant. This doesn’t necessarily mean, however, that such dreams are in black and white. Black and white is a function of television when the color information is removed, but the same is not true of the mind. For example, grass might not be green in a dream, but it’s not gray as it is in a black and white movie; the color simply is not relevant and your unconscious isn’t highlighting it. This non-relevance fools the conscious mind on waking up into concluding that, by implication, the dream must have been in black and white.</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">A black funeral may suggest difficulties in, or the need for a new approach to, a relationship or work issue, as the current approach is doomed. Or are you grieving for a phase or aspect of your life that has recently come to an end? As stated above, black often represents the death of new ideas, so could your dream be telling you to prepare for the transition? Black animals that appear in dreams are usually associated with notions of temptation, unconscious drives and urges, whilst black clothes and underwear are a symbol of hidden or unconscious feelings, or sexuality. A night dream scene shrouded in darkness may relate to a certain lack of direction in your waking life. According to traditional symbolism, black is also associated with wickedness, so if you are menaced by a person wearing black in your dream, could the dream be a depiction of your darkest fears. Do you worry that someone is a threat to you or are you your own worst enemy?</span></p><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Keywords: the unknown, the unconscious, danger, mystery, darkness, death, mourning, hate and malice.... The Element Encyclopedia</span></p></div><p class="readmore" data-dcnode-id="2354"><a data-dcnode-id="2355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-and-white-dreams" title="Black and white dreams Dream Meaning | Read More... "><span data-dcnode-id="2356" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2351"><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-element-encyclopedia" title="Dream Source: The Element Encyclopedia"><span data-dcnode-id="2353" instrument_node="">The Element Encyclopedia</span></a></strong></div><span data-dcnode-id="2349" instrument_node="">
</span><div class="divfigure" data-dcnode-id="2336"><span data-dcnode-id="2348" instrument_node="">
</span><h2 class="relatedtitle" data-dcnode-id="2345"><a data-dcnode-id="2346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-ass" title="Dream Interpretation black ass - Islamic Dream Interpretation"><span data-dcnode-id="2347" instrument_node="">Black Ass</span></a></h2><div class="relatedmean" data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">It means prosperity and becoming a leader in his community.... Islamic Dream Interpretation</span></div><p class="readmore" data-dcnode-id="2340"><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-ass" title="Black ass Dream Meaning | Read More... "><span data-dcnode-id="2342" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="2337"><a data-dcnode-id="2338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/islamic-dream-interpretation" title="Dream Source: Islamic Dream Interpretation"><span data-dcnode-id="2339" instrument_node="">Islamic Dream Interpretation</span></a></strong></div><span data-dcnode-id="2335" instrument_node="">

</span><h2 class="relatedtitle" data-dcnode-id="1945"><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-person" title="Dream Interpretation black person - A Guide to Dreams and Sleep Experiences"><span data-dcnode-id="1947" instrument_node="">Black Person</span></a></h2><div class="relatedmean" data-dcnode-id="1924"><span data-dcnode-id="1944" instrument_node="">Depends which skin colour one has.</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">If white: one’s natural drives, feelings about coloured people; or if per­son is known, what you feel about them.</span></p><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">If black or brown: one’s own cultural feelings; same as any person’ dream.</span></p><p data-dcnode-id="1935"><span data-dcnode-id="1939" instrument_node="">Example: \ was in a cubicle or small toilet with a very black coloured woman. She told me there was something wrong with her vagina. She was undressed. I rubbed her va­gina and we both felt enormous passion. I then awoke but couldn’t at first remember the dream. I have refrained from sexual intercourse for some weeks, as I always feel shattered/ tired afterwards. Anyway I woke very wet, yet couldn’t re­member any orgasm. I could remember some question of sex as I awoke. Then I remembered the dream and continued it in fantasy. I experienced powerful urges to find a woman to have a non-committed sexual relationship with. But in the end I wanted to share my feelings with my wife, but she seemed deep asleep and unresponsive. When I slept again I dreamt I was in London, had got off one bus, but was not at any desti­nation. I was standing about not making a move to find my direction. Then I began to look’ </span><b data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">(Alfred C)</span></b><span data-dcnode-id="1936" instrument_node="">.</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">To understand this dream in some depth it is helpful to think of a sexual drive as a flow, like a river. As such it can be blocked, in which case it will seek an alternative route. Sexual energy or flow is not simply a mechanical thing, ihough; it is also deeply feeling in its connection with the most profound sides of hu­man life such as parenthood and the canng and providing for young. In the history of white people a great deal of sexual frustration has arisen out of the ideas of sin and guilt in their religion.</span></p><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">A view arose for the white race that the black races had an easier and less frustrating relationship with the natural —which includes not only sexuality but the body as a whole, and nature also. So when Alfred dreams of the black woman, he is meeting what is natural and flowing in himself, but which he has blocked by his will because he felt shattered after sex.</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">The pan about the bus shows him trying to find a direction in which his sexual feelings could move satisfyingly in connection with other people. </span></p><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Unfonunately, as Jung points out in Man and His Symbols, people in modern society, whether black, yellow, brown or white, have lost their sense of nature and the cosmos as being anything other than processes without consciousness or living feeling. Jung says. No river contains a spirit, no tree is the life principle of a man. no snake the embodiment of wisdom. No voice now speaks to man from stones, plants, and animals, nor does he speak to them believing they can hear.’ The im­portance of such dreams as Arthur’s is that it shows the pas­sionate relationship between our personality and the pnmitive and natural.</span></p><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">A black person, born and bred in a modern setting, would most likely dream of a black bushman to depict their own natural drives. See identity and dreams; Africa; sex in dreams. ... A Guide to Dreams and Sleep Experiences</span></p></div><p class="readmore" data-dcnode-id="1921"><a data-dcnode-id="1922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-person" title="Black person Dream Meaning | Read More... "><span data-dcnode-id="1923" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="1918"><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/a-guide-to-dreams-and-sleep-experiences" title="Dream Source: A Guide to Dreams and Sleep Experiences"><span data-dcnode-id="1920" instrument_node="">A Guide to Dreams and Sleep Experiences</span></a></strong></div><span data-dcnode-id="1916" instrument_node="">

</span><h2 class="relatedtitle" data-dcnode-id="1898"><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-sheep" title="Dream Interpretation black sheep - The Complete Guide to Interpreting Your Dreams"><span data-dcnode-id="1900" instrument_node="">Black Sheep</span></a></h2><div class="relatedmean" data-dcnode-id="1894"><span data-dcnode-id="1897" instrument_node="">If you were called a “black sheep*’ in your dream, it’s a warning to guard your tongue.</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">To see a black sheep forecasts some unexpected profit See also Sheep and Animals.... The Complete Guide to Interpreting Your Dreams</span></p></div><p class="readmore" data-dcnode-id="1891"><a data-dcnode-id="1892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-sheep" title="Black sheep Dream Meaning | Read More... "><span data-dcnode-id="1893" instrument_node="">Read More...</span></a></p><strong class="relateddreamcats" data-dcnode-id="1888"><a data-dcnode-id="1889" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/dream-sources/the-complete-guide-to-interpreting-your-dreams" title="Dream Source: The Complete Guide to Interpreting Your Dreams"><span data-dcnode-id="1890" instrument_node="">The Complete Guide to Interpreting Your Dreams</span></a></strong></div><span data-dcnode-id="1886" instrument_node="">

</span><h2 class="relatedtitle" data-dcnode-id="1882"><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/black-stone" title="Dream Interpretation black stone - Islamic Dream Interpretation"><span data-dcnode-id="1884" instrument_node="">Black Stone</span></a></h2><div class="relatedmean" data-dcnode-id="1864"><b data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">(The corner stone of the Ka’aba; God’s House in Mecca)</span></b><span data-dcnode-id="1879" instrument_node=""> Seeing or holding the Black Stone of the Ka’aba in one’s dream means paying allegiance to the ruler, or it could mean repentance from sin at the hand of a pious Imam, or it could mean kissing one’s son, wife or bosom friend. It also means serving people in the government.</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">If one sees himself touching the Black Stone in his dream, it means that he will follow and learn at the hand of one of the Imams of the Arabian peninsula. Seeing the sacred Black Stone in a dream is perhaps an indication of going to perform one’s pilgrimage.</span></p><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">If one sees himself cutting into the Black Stone in a dream, it means that he wants people to follow his personal opinions.</span></p><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">If he sees the pilgrims searching for the Black Stone but cannot find it in a dream, it means that he thinks of himself to be right and the rest of the people to be wrong. It also could mean that he possesses a knowledge which he hides from others. Ifhe touches the Black Stone in his dream, it means that he follows the teachings of an Imam from among the Hijazite Arabs.</span></p><p data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">If he sees the Black Stone being a castle for himself in a dream, it means </span><h2 class="relatedtitle" data-dcnode-id="832"><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/fox" title="Dream Interpretation fox - Islamic Dream Interpretation"><span data-dcnode-id="834" instrument_node="">Fox</span></a></h2><div class="relatedmean" data-dcnode-id="818"><span data-dcnode-id="831" instrument_node="">A fox in a dream represents a lethal enemy, a perfidious person, a liar, a poet, someone who defraud people, a schemer and a trickster. Somehow, a fox in a dream is also interpreted generally as a fortuneteller, a dangerous state inspector, a physician or a good business manager. Killing a fox in a dream means taking advantage of a noble woman.</span><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">A fox in a dream also means ingratiating oneself before a noble man or a noble woman.</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">If one sees a fox toadying him and seeking his protection in a dream, it represents his fear of spirits, jinns or human beings.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">If one sees himself battling a foxffi a dream, it means that his wife has committed adultery. Capturing a piece offox skin or his hair in a dream means victory and strength, or it may be interpreted as receiving an inheritance.</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">A fox in one’s dream also represents profits, new clothing, one’s wife or marriage.</span></p><p data-dcnode-id="819"><b data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">(Also see Fur)</span></b><span data-dcnode-id="820" instrument_node="">... Islamic Dream Interpretation</span></p></div><p class="readmore" data-dcnode-id="815"><a data-dcnode-id="816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dreamencyclopedia.net/fox" title="Fox
