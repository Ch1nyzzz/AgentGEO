</span><img alt="Recency Statement Icon" data-dcnode-id="1718" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/wp-content/themes/sleepfoundation/assets/images/clock-circular-outline.svg&amp;raw" width="30"><span data-dcnode-id="1717" instrument_node="">

</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node=""> Our dedicated team rigorously evaluates every article and guide to ensure the information is factual, up-to-date and free of bias.</span></p><span data-dcnode-id="1709" instrument_node="">
</span></div><span data-dcnode-id="1707" instrument_node="">
</span></div><span data-dcnode-id="1705" instrument_node="">
</span></div><span data-dcnode-id="1703" instrument_node="">

</span><div class="right-side" data-dcnode-id="1206"><span data-dcnode-id="1700" instrument_node="">
</span><div class="content-editor" data-dcnode-id="1471"><span data-dcnode-id="1699" instrument_node="">
</span><div data-dcnode-id="1698" id="speechkit-player" style="height:60px;"></div><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1696" instrument_node="">Dreaming is one of the most unique and intriguing aspects of sleep. During a normal night’s sleep, it’s typical to spend </span><span class="trusted-wrap" data-dcnode-id="1691"><a class="add-trustee trusted" data-dcnode-id="1692" data-href="https://www.ninds.nih.gov/Disorders/patient-caregiver-education/understanding-sleep" data-reference-id="1" data-source-id="7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1695" instrument_node="">about two hours dreaming</span><sup data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">1</span></sup></a></span><span data-dcnode-id="1690" instrument_node="">. The most intense dreams happen during the rapid eye movement (REM) </span><a data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams/how-do-dreams-affect-sleep"><span data-dcnode-id="1689" instrument_node="">sleep stage</span></a><span data-dcnode-id="1687" instrument_node="">, but distinct types of dreams can </span><span class="trusted-wrap" data-dcnode-id="1682"><a class="add-trustee trusted" data-dcnode-id="1683" data-href="https://pubmed.ncbi.nlm.nih.gov/10779247/" data-reference-id="2" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1686" instrument_node="">occur during any part of the sleep cycle</span><sup data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">2</span></sup></a></span><span data-dcnode-id="1681" instrument_node="">.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1678" instrument_node="">Dreams can have imagery that is positive, negative, or outright confusing, likely reflecting a period of </span><span class="trusted-wrap" data-dcnode-id="1673"><a class="add-trustee trusted" data-dcnode-id="1674" data-href="https://www.ncbi.nlm.nih.gov/pubmed/20079677" data-reference-id="3" data-source-id="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1677" instrument_node="">immense imagination during sleep</span><sup data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">3</span></sup></a></span><span data-dcnode-id="1672" instrument_node="">. Nevertheless, whether in good or bad dreams, experiences from when you’re awake are </span><span class="trusted-wrap" data-dcnode-id="1667"><a class="add-trustee trusted" data-dcnode-id="1668" data-href="https://pubmed.ncbi.nlm.nih.gov/31569467/" data-reference-id="4" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1671" instrument_node="">frequently incorporated into dream content</span><sup data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">4</span></sup></a></span><span data-dcnode-id="1666" instrument_node="">.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1663" instrument_node="">Experts continue to </span><span class="trusted-wrap" data-dcnode-id="1658"><a class="add-trustee trusted" data-dcnode-id="1659" data-href="https://www.ncbi.nlm.nih.gov/pubmed/30127760" data-reference-id="5" data-source-id="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1662" instrument_node="">debate about why we dream</span><sup data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">5</span></sup></a></span><span data-dcnode-id="1657" instrument_node="">, but considerable evidence points to dreams playing a role in facilitating brain functions like memory and emotional processing. Dreams appear to be an important part of normal, healthy sleep. At the same time, though, nightmares can disrupt sleep and even affect a person during their waking hours.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Given that virtually everyone has dreams, both good and bad, it’s natural to wonder how dreaming affects sleep quality, whether nightmares are bad for sleep, and how to avoid bad dreams.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><h2 data-dcnode-id="1650" id="do-dreams-impact-sleep-quality--1"><span data-dcnode-id="1651" instrument_node="">Do Dreams Impact Sleep Quality?</span></h2><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Dreaming is a normal part of healthy sleep. Good sleep has been connected to better cognitive function and emotional health, and studies have also linked dreams to effective thinking, memory, and emotional processing. In this way, many experts believe dreaming is either a reflection of or a contributor to quality sleep.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1638"><span data-dcnode-id="1645" instrument_node="">However, not all dreams are created equal. Some dreams may have a negative impact on sleep. Bad dreams involve content that is scary, threatening, or traumatic. When a bad dream causes an awakening from sleep, it can be </span><span class="trusted-wrap" data-dcnode-id="1640"><a class="add-trustee trusted" data-dcnode-id="1641" data-href="https://www.ncbi.nlm.nih.gov/pubmed/26401306" data-reference-id="6" data-source-id="36" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1644" instrument_node="">considered a nightmare</span><sup data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">6</span></sup></a></span><span data-dcnode-id="1639" instrument_node="">.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><h3 data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Are Nightmares Bad For Sleep?</span></h3><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1630"><a data-dcnode-id="1632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/nightmares"><span data-dcnode-id="1633" instrument_node="">Nightmares</span></a><span data-dcnode-id="1631" instrument_node=""> can negatively affect sleep but usually only when they occur frequently or are especially disturbing.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Most people have a bad dream or nightmare every once in a while with no notable impact on their sleep quality. When nightmares happen often, though, they can become a barrier to sleep. For some people, nightmares occur multiple times per week and/or more than once in any given night.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1615"><span data-dcnode-id="1625" instrument_node="">Nightmare disorder can be loosely defined as the occurrence of frequent nightmares that interfere </span><span class="trusted-wrap" data-dcnode-id="1620"><a class="add-trustee trusted" data-dcnode-id="1621" data-href="https://pubmed.ncbi.nlm.nih.gov/20726290/" data-reference-id="7" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1624" instrument_node="">with a person’s sleep and/or their mood or thinking during the day</span><sup data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">7</span></sup></a></span><span data-dcnode-id="1619" instrument_node="">. People with nightmare disorder may have restless sleep with more awakenings and greater difficulty getting back to sleep. In addition, they may avoid sleep because of their fear of disturbing dreams, increasing their risk of </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/insomnia"><span data-dcnode-id="1618" instrument_node="">insomnia</span></a><span data-dcnode-id="1616" instrument_node=""> and sleep deprivation.</span></p><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1613" instrument_node="">People </span><span class="trusted-wrap" data-dcnode-id="1608"><a class="add-trustee trusted" data-dcnode-id="1609" data-href="https://medlineplus.gov/ency/article/003209.htm" data-reference-id="8" data-source-id="8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1612" instrument_node="">should talk with their doctor</span><sup data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">8</span></sup></a></span><span data-dcnode-id="1607" instrument_node=""> if they have nightmares more than once a week, have their sleep disrupted by nightmares, or notice that their daytime mood, thinking, or energy level is affected by nightmares. A doctor can work with them to identify the most likely cause and optimal treatment to reduce these bothersome dreams.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><h2 data-dcnode-id="1603" id="do-dreams-affect-everyday-life--2"><span data-dcnode-id="1604" instrument_node="">Do Dreams Affect Everyday Life?</span></h2><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Knowing the exact impact of dreams on daily life remains subject to further research, but there are a number of ways that dreams may influence our waking hours:</span></p><span data-dcnode-id="1599" instrument_node="">
</span><ul data-dcnode-id="1567"><span data-dcnode-id="1598" instrument_node="">
</span><li data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Healthy dreaming may be indicative of quality sleep that facilitates sharper thinking, better mood, and overall health.</span></li><span data-dcnode-id="1595" instrument_node="">
</span><li data-dcnode-id="1581"><span data-dcnode-id="1594" instrument_node="">People who remember their dreams often </span><span class="trusted-wrap" data-dcnode-id="1589"><a class="add-trustee trusted" data-dcnode-id="1590" data-href="https://onlinelibrary.wiley.com/doi/full/10.1002/jocb.168" data-reference-id="9" data-source-id="21" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1593" instrument_node="">show higher levels of creativity</span><sup data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">9</span></sup></a></span><span data-dcnode-id="1588" instrument_node="">. Creative insights may also be increased by </span><span class="trusted-wrap" data-dcnode-id="1583"><a class="add-trustee trusted" data-dcnode-id="1584" data-href="https://www.tandfonline.com/doi/abs/10.1080/10400419.2003.9651412" data-reference-id="10" data-source-id="96" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1587" instrument_node="">incorporating the imaginative thinking of dreams into waking life</span><sup data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">10</span></sup></a></span><span data-dcnode-id="1582" instrument_node="">.</span></li><span data-dcnode-id="1580" instrument_node="">
</span><li data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Dreaming may provide for more expansive or inspirational thinking, forming the underlying concept behind the maxim to “follow your dreams.”</span></li><span data-dcnode-id="1577" instrument_node="">
</span><li data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">Dreaming may enhance memory consolidation, making it easier to remember important information.</span></li><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">People with mental health disorders, such as anxiety or post-traumatic stress disorder (PTSD), may experience worse symptoms as a result of recurring nightmares.</span></li><span data-dcnode-id="1571" instrument_node="">
</span><li data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Nightmares may interrupt sleep, causing daytime sleepiness, worsened mood, or thinking problems during the day.</span></li><span data-dcnode-id="1568" instrument_node="">
</span></ul><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1563" instrument_node="">
</span><div class="klaviyo-form-QT7Gq7" data-dcnode-id="1562"></div><span data-dcnode-id="1561" instrument_node="">
</span><div class="klaviyo-form-UMmu6F" data-dcnode-id="1560"></div><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1556" instrument_node="">
</span><h2 data-dcnode-id="1554" id="how-can-you-stop-bad-dreams-and-nightmares--3"><span data-dcnode-id="1555" instrument_node="">How Can You Stop Bad Dreams and Nightmares?</span></h2><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">If you have frequent bad dreams, start by talking with your doctor who can help determine if you have nightmare disorder. Treatment for nightmare disorder can include behavioral therapy and/or medications.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">Improving habits and </span><a data-dcnode-id="1547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-hygiene"><span data-dcnode-id="1548" instrument_node="">sleep hygiene</span></a><span data-dcnode-id="1546" instrument_node=""> can help reduce bad dreams. Some specific tips include:</span></p><span data-dcnode-id="1544" instrument_node="">
</span><ul data-dcnode-id="1524"><span data-dcnode-id="1543" instrument_node="">
</span><li data-dcnode-id="1538"><span data-dcnode-id="1542" instrument_node="">Practice </span><a data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/sleep-hygiene/relaxation-exercises-to-help-fall-asleep"><span data-dcnode-id="1541" instrument_node="">relaxation techniques</span></a><span data-dcnode-id="1539" instrument_node=""> to minimize stress and anxiety, both of which can provoke nightmares.</span></li><span data-dcnode-id="1537" instrument_node="">
</span><li data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Give yourself time to wind down before bed in a calm and comforting bedroom environment.</span></li><span data-dcnode-id="1534" instrument_node="">
</span><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Avoid screen time for an hour or more before bed, and make sure not to watch scary or bothersome content at night.</span></li><span data-dcnode-id="1531" instrument_node="">
</span><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Don’t drink alcohol, which affects your REM sleep, in the evening and especially before bed.</span></li><span data-dcnode-id="1528" instrument_node="">
</span><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Keep a consistent sleep schedule, even on weekends, to avoid sleep deprivation, which can spur more REM sleep and intense dreaming.</span></li><span data-dcnode-id="1525" instrument_node="">
</span></ul><span data-dcnode-id="1523" instrument_node="">
</span><h3 data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Does Sleeping Position Affect Dreams and Nightmares?</span></h3><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">Many factors influence dreaming, but it is not clearly established that sleeping position is one of those factors.</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1503"><span data-dcnode-id="1516" instrument_node="">Some researchers have theorized that dream content may vary based on a person’s sleeping position because physical sensations and pressure applied to the body are different for back, stomach, and side sleepers. One study found that people who sleep on their left side were </span><span class="trusted-wrap" data-dcnode-id="1511"><a class="add-trustee trusted" data-dcnode-id="1512" data-href="https://psycnet.apa.org/record/2004-14976-002" data-reference-id="11" data-source-id="78" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1515" instrument_node="">more likely to have nightmares</span><sup data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">11</span></sup></a></span><span data-dcnode-id="1510" instrument_node="">, and another found that vivid dreams, including some nightmares and erotic dreams, were </span><span class="trusted-wrap" data-dcnode-id="1505"><a class="add-trustee trusted" data-dcnode-id="1506" data-href="https://psycnet.apa.org/record/2012-19542-001" data-reference-id="12" data-source-id="78" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1509" instrument_node="">more common in stomach sleepers</span><sup data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">12</span></sup></a></span><span data-dcnode-id="1504" instrument_node="">.</span></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1501" instrument_node="">A limitation of these studies, though, is that they relied on self-reported data, which is subject to inaccuracies. For example, many people switch their sleeping position during the night without being aware of it. In addition, prior research has shown that </span><span class="trusted-wrap" data-dcnode-id="1496"><a class="add-trustee trusted" data-dcnode-id="1497" data-href="https://pubmed.ncbi.nlm.nih.gov/9646377/" data-reference-id="13" data-source-id="40" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/dreams" rel="noopener nofollow noindex" target="_blank"><span data-dcnode-id="1500" instrument_node="">sleep position doesn’t affect the amount of time spent in the different sleep stages</span><sup data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">13</span></sup></a></span><span data-dcnode-id="1495" instrument_node="">.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Overall, more robust research is needed to establish a link between sleeping position and nightmares.</span></p><span data-dcnode-id="1490" instrument_node="">

</span><h3 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Fact-Checking: Our Process</span></h3><span data-dcnode-id="228" instrument_node="">
</span><span class="close-popup-factcheck close-modal" data-dcnode-id="227"></span><span data-dcnode-id="226" instrument_node="">

</span><div class="popup-content content-editor" data-dcnode-id="192"><span data-dcnode-id="223" instrument_node="">
</span><p data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">The Sleep Foundation editorial team is dedicated to providing content that meets the highest standards for accuracy and objectivity. Our editors and medical experts rigorously evaluate every article and guide to ensure the information is factual, up-to-date, and free of bias.</span></p><span data-dcnode-id="220" instrument_node="">
</span><p data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">The Sleep Foundation fact-checking guidelines are as follows:</span></p><span data-dcnode-id="217" instrument_node="">
</span><ol data-dcnode-id="194"><span data-dcnode-id="216" instrument_node="">
</span><li class="check" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">We only cite reputable sources when researching our guides and articles. These include peer-reviewed journals, government reports, academic and medical associations, and interviews with credentialed medical experts and practitioners.</span></li><span data-dcnode-id="213" instrument_node="">
</span><li class="check" data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">All scientific data and information must be backed up by at least one reputable source. Each guide and article includes a comprehensive bibliography with full citations and links to the original sources</span></li><span data-dcnode-id="210" instrument_node="">
</span><li class="check" data-dcnode-id="208"><span data-dcnode-id="209" instrument_node="">Some guides and articles feature links to other relevant Sleep Foundation pages. These internal links are intended to improve ease of navigation across the site, and are never used as original sources for scientific data or information.</span></li><span data-dcnode-id="207" instrument_node="">
</span><li class="check" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">A member of our medical expert team provides a final review of the content and sources cited for every guide, article, and product review concerning medical- and health-related topics. Inaccurate or unverifiable information will be removed prior to publication.</span></li><span data-dcnode-id="204" instrument_node="">
</span><li class="check" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Plagiarism is never tolerated. Writers and editors caught stealing content or improperly citing sources are immediately terminated, and we will work to rectify the situation with the original publisher(s).</span></li><span data-dcnode-id="201" instrument_node="">
</span><li class="check" data-dcnode-id="196"><span data-dcnode-id="200" instrument_node="">Although Sleep Foundation maintains affiliate partnerships with brands and e-commerce portals, these relationships never have any bearing on our product reviews or recommendations. Read our full </span><a data-dcnode-id="198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/advertising-disclosure"><span data-dcnode-id="199" instrument_node="">Advertising Disclosure</span></a><span data-dcnode-id="197" instrument_node=""> for more information.</span></li><span data-dcnode-id="195" instrument_node="">
</span></ol><span data-dcnode-id="193" instrument_node="">
