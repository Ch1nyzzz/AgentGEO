a-hidden="true" class="vjs-icon-placeholder" data-dcnode-id="1041"></span><span aria-live="polite" class="vjs-control-text" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Close Modal Dialog</span></span></button><p class="vjs-control-text" data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">End of dialog window.</span></p></div><div class="top-title" data-dcnode-id="1032"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicaldaily.com/"><span data-dcnode-id="1034" instrument_node="">Dreaming of a White Halloween Weekend</span></a></div></div></div></div></div></div><div class="article-content" data-dcnode-id="932"><div class="social-share" data-dcnode-id="1018"><span data-dcnode-id="1026" instrument_node=""> </span><a class="genericon genericon-facebook-alt" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.medicaldaily.com/room-temperature-affect-dreams-437204" target="_blank"></a><span data-dcnode-id="1024" instrument_node=""> </span><a class="genericon genericon-twitter" data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DHow%2BRoom%2BTemperature%2BAffects%2BOur%2BDreams%2Bhttps%3A//www.medicaldaily.com/room-temperature-affect-dreams-437204" target="_blank"></a><span data-dcnode-id="1022" instrument_node=""> </span><a class="genericon genericon-pinterest" data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Fwww.medicaldaily.com%252Froom-temperature-affect-dreams-437204%26media%3Dhttps%253A%252F%252Fimages.medicaldaily.com%252Fsites%252Fmedicaldaily.com%252Ffiles%252Fstyles%252Flg%252Fpublic%252F2014%252F02%252F17%252Fdreaming.jpg%26description%3DHow%2520Room%2520Temperature%2520Affects%2520Our%2520Dreams" target="_blank"></a><span data-dcnode-id="1020" instrument_node=""> </span><a class="genericon genericon-mail" data-dcnode-id="1019" href="mailto:?&amp;subject=How%20Room%20Temperature%20Affects%20Our%20Dreams&amp;body=https://www.medicaldaily.com/room-temperature-affect-dreams-437204" target="_blank"></a></div><div class="article-body" data-dcnode-id="952" itemprop="articleBody"><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">You likely won’t dream when it’s either too hot or too cold. That’s because your brain will focus all its energies on its primordial role -- keeping you alive.</span></p><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">Swiss scientists studying the brains of genetically engineered mice were able to watch how changes in temperature affected the sleep state of these animals. What they found is the brain prioritizes temperature control over dreaming especially in severe temperatures.</span></p><p data-dcnode-id="1010"><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencealert.com/new-mouse-experiment-shows-why-we-only-dream-when-the-temperature-is-perfect" rel="nofollow" target="_blank"><span data-dcnode-id="1013" instrument_node="">Dreaming also suppresses temperature regulation</span></a><span data-dcnode-id="1011" instrument_node=""> or thermoregulation, which keeps our bodies at the right temperature for continuing to sleep. Our body normally reacts to heat and cold by sweating, shivering, panting and flushing.</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">These defense mechanisms, however, can’t maintain our core temperature once REM (rapid eye movement) sleep starts. That’s because REM sleep demands a lot of energy.</span></p><div class="dfp-tag-wrapper" data-dcnode-id="1003" id="dfp-ad-oop2" style="line-height:0;"><span data-dcnode-id="1007" instrument_node="">
</span><span data-dcnode-id="1004" instrument_node="">
</span></div><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Unbeknownst to most of us, REM sleep places a lot of physical demands on the human body. The brain of a person in REM sleep, which can account for up to 25 percent of an adult’s sleep cycle, eats up almost as much energy as when it’s awake.</span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Also during REM sleep, your breathing can increase, your eyes keep moving to track imagined characters, and your arms and feet twitch as they fight against the urge to move and wake you. All these activities drain you of energy when you’re asleep and combine to create an energy-depleting mental workout.</span></p><span data-dcnode-id="998" instrument_node="">
</span><span data-dcnode-id="995" instrument_node="">
</span><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">If you add a sleep environment that’s either too hot or too cold, your brain will compensate for this additional stress by refusing to let you dream so you can conserve enough energy to stay alive.</span></p><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Faced with this scenario, our brain makes a choice. It either lets you dream or refuses to let you dream in favor of keeping your body from freezing or frying. The study said you brain can't do both.</span></p><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">"This loss of thermoregulation in REM sleep is one of the most peculiar aspects of sleep, particularly since we have finely-tuned mechanisms that control our body temperature while awake or in non-REM sleep,” said neuroscientist Markus Schmidt from the University of Bern and the Department of Neurology at Bern University Hospital.</span></p><p data-dcnode-id="982"><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainfacts.org/Brain-Anatomy-and-Function/Anatomy/2019/How-Much-Energy-Does-the-Brain-Use-020119" rel="nofollow" target="_blank"><span data-dcnode-id="985" instrument_node="">It’s wise to remember</span></a><span data-dcnode-id="983" instrument_node=""> the human brain consumes about 20 percent of a person’s body's energy for the average adult in a resting state. It demands so much to allow the brain to achieve its primary function – which is to process and transmit information through electrical signals.</span></p><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">This is a very energy intensive process in which about 25 percent of the brain’s energy goes to maintaining neurons and glial cells. The remaining 75 percent is used for signaling. This consists of sending and processing electrical signals across the brain’s circuits.</span></p><p data-dcnode-id="953"><span data-dcnode-id="979" instrument_node=""> </span><span class="figure hidden-print" data-dcnode-id="954" itemprop="image" itemscope="" itemtype="http://schema.org/ImageObject"><span data-dcnode-id="978" instrument_node=""> </span><picture class="mapping-full lazysize" data-dcnode-id="970" height="909" itemprop="contentUrl" title="dreaming " width="1000"><source data-dcnode-id="976" data-srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_desktop_1x/public/2014/02/17/dreaming.jpg 1x" media="(min-width: 992px)" srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_desktop_1x/public/2014/02/17/dreaming.jpg 1x"><source data-dcnode-id="975" data-srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_tablet_1x/public/2014/02/17/dreaming.jpg 1x" media="(min-width: 768px)" srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_tablet_1x/public/2014/02/17/dreaming.jpg 1x"><source data-dcnode-id="974" data-srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_narrow_1x/public/2014/02/17/dreaming.jpg 1x" media="(min-width: 481px)" srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_narrow_1x/public/2014/02/17/dreaming.jpg 1x"><source data-dcnode-id="973" data-srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_mobile_1x/public/2014/02/17/dreaming.jpg 1x" media="(min-width: 0px)" srcset="https://images.medicaldaily.com/sites/medicaldaily.com/files/styles/full_breakpoints_theme_medicaldaily_mobile_1x/public/2014/02/17/dreaming.jpg 1x"><img alt="dreaming " class="mapping-full lazysize lazyloaded" data-dcnode-id="971" height="909" itemprop="contentUrl" src="https://chatnoir-
