</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">While we sleep, our minds become fields of dreams. Usually, these dreams are benign; some fall under the category of harmless yet bizarre, and some are downright pleasant. At times dreams are difficult to recall.&nbsp;</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1473"><strong data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">➤  </span></strong><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//card.cannigma.com/" rel="noreferrer noopener" target="_blank"><strong data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Get your medical card now with The Cannigma Medical</span></strong></a><strong data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node=""> </span></strong></p><div class="code-block code-block-1" data-dcnode-id="1465" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1472" instrument_node="">
</span><div class="engver" data-dcnode-id="1466" data-mantis-zone="cannigma_incontent_feb_responsive_728x90_300x250" id="mantis_ad_6"><div data-dcnode-id="1467" style="padding: 0px; margin: 0px; border: 0px; display: inline-block; width: 100%; max-width: 728px;"><div data-dcnode-id="1470" style="height: 0px; overflow: hidden; padding-bottom: 12.3626%;"><iframe data-dcnode-id="1471" style="padding: 0px; margin: 0px; border: 0px; width: 100%; height: 90px;"></iframe></div><img data-dcnode-id="1469" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/impression%3Fe%3Dp-bb1dd85d-55c7-4bc2-9d5d-609e976cf9ac%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D99d98f95-981b-4921-bf71-d3ec425856b2%26b%3D04b49777-e3f6-490f-a67c-196c5ebeb712%26r%3D7%26c%3D6260549c41b5000018a38cdc&amp;raw" style="display: none !important;"><img data-dcnode-id="1468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecs.mantisadnetwork.com/track/visible%3Fe%3Dp-bb1dd85d-55c7-4bc2-9d5d-609e976cf9ac%26p%3D5fb0ee2a4ef6f80015b62c3b%26q%3D99d98f95-981b-4921-bf71-d3ec425856b2%26b%3D04b49777-e3f6-490f-a67c-196c5ebeb712%26r%3D7%26c%3D6260549c41b5000018a38cdc%26l%3D1&amp;raw" style="display: none !important;"></div></div></div><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">While some may blame those strange dreams on things like worries, last night’s pizza with extra red pepper flakes and anchovies, or that sleep aid for their lack of dreams, these aren’t the only kinds of things that influence our nocturnal adventures.&nbsp;</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1457"><a data-dcnode-id="1459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/treatment/how-cannabis-affects-sleep/"><span data-dcnode-id="1460" instrument_node="">Cannabis can also affect our sleep</span></a><span data-dcnode-id="1458" instrument_node=""> —&nbsp;and our dreams.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">Most research points to cannabis affecting dreams in two ways: directly and positively, by suppressing dreams. Or indirectly and negatively, as many regular users find that suddenly stopping their consumption results in </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21724338/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1454" instrument_node="">strange, vivid dreams, or even nightmares.</span></a><span data-dcnode-id="1452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1450" instrument_node="">
</span><p data-dcnode-id="1445"><span data-dcnode-id="1449" instrument_node="">The way cannabis directly affects dreams is by </span><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/18313952-effect-of-illicit-recreational-drugs-upon-sleep-cocaine-ecstasy-and-marijuana/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1448" instrument_node="">suppressing the REM stage of sleep,</span></a><span data-dcnode-id="1446" instrument_node=""> where most dreaming occurs, thus preventing many dreams from ever taking shape.&nbsp;</span></p><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">How this happens depends upon many variables, not the least of which are things like the specific cannabinoids, terpenes, and other constituents of the cannabis plant you consume, and how much of each is present. Method of ingestion, dosage, and individual body chemistry all come into play as well.&nbsp;</span></p><span data-dcnode-id="1441" instrument_node="">
</span><h2 data-dcnode-id="1438" id="h-how-sleep-works"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">How sleep works</span></strong></h2><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1433"><span data-dcnode-id="1436" instrument_node="">To understand how cannabis may affect dreaming, we first need to have a basic understanding of sleep itself, or more specifically, the four stages of sleep that we go through when we doze off each evening, including the </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/the-four-stages-of-sleep-2795920" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1435" instrument_node="">following:</span></a></p><span data-dcnode-id="1432" instrument_node="">
</span><ol data-dcnode-id="1421"><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">NREM Stage 1 (Non-Rapid Eye Movement) – That transition period between waking and sleeping.</span></li><li data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">NREM Stage 2 – A light sleep, where the person is less aware of their surroundings.</span></li><li data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">NREM Stage 3 – The deepest stage of sleep, where the muscles relax, and breathing and blood pressure drop.&nbsp;</span></li><li data-dcnode-id="1422"><span data-dcnode-id="1425" instrument_node="">REM Sleep (Rapid Eye Movement) – The brain is more active and often dreams occur during this stage of sleep. Curiously, a sort of “sleep paralysis” happens, where the sleeper is unable to anything other than their diaphragm for breathing, the eyes, and penis in men. This is a good thing; scientists think that it happens to keep people from </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/how-much-deep-sleep-do-you-need%23stages" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1424" instrument_node="">acting out their dreams.</span></a></li></ol><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Despite their numbering system, these stages don’t all progress in sequence as one might imagine. Instead, they move through stages one, two, and three, then repeat stage two before hopping straight to stage four, where most of the business of dreaming takes place. Then, the cycle begins all over again and continues, to the tune of four to five cycles throughout the night.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><h2 data-dcnode-id="1414" id="h-to-sleep-perchance-to-scream"><strong data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">To sleep, perchance to scream</span></strong></h2><span data-dcnode-id="1413" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1408"><figure class="aligncenter" data-dcnode-id="1409"><img alt="Deep sleep" class="wp-image-12822 lazyload" data-dcnode-id="1412" data-srcset="https://cannigma.imgix.net/2020/03/deep-sleep.jpg?auto=compress%2Cformat&amp;ixlib=php-3.3.1&amp;q=45" height="493" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.imgix.net/2020/03/deep-sleep.jpg%3Fauto%3Dcompress%252Cformat%26ixlib%3Dphp-3.3.1%26q%3D45&amp;raw" srcset="https://cannigma.imgix.net/2020/03/deep-sleep.jpg?auto=compress%2Cformat&amp;ixlib=php-3.3.1&amp;q=45" width="740"><figcaption data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">It’s estimated that 2-8% of people have nightmares often enough to cause sleep problems. (Lightpoet/123rf)</span></figcaption></figure></div><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1406" instrument_node="">While most dreams could be classified as neutral, pleasant, or merely strange, sometimes the dream landscape becomes more akin to a minefield, with horrifying dreams seemingly popping up out of nowhere, often sending us to the brink of death before erupting into that </span><em data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">something</span></em><span data-dcnode-id="1403" instrument_node=""> – whatever it is – that jolts us awake in a surge of terror.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><p data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Nightmares can happen to anyone, for a variety of reasons. Stress, anxiety, exhaustion, or a disruption in sleep routine can trigger nightmares, as can many drugs. In addition to Prazosin, antidepressants and some medication given for Parkinson’s disease may cause these unwelcome horror movies to run rampant in our minds, as can some medical conditions and mental health disorders.&nbsp;</span></p><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">It’s estimated that 2-8% of people have nightmares often enough to cause sleep problems, and up to 50% of young children have nightmares that send them running to their parent’s rooms or crying loud enough to awaken them.</span></p><span data-dcnode-id="1395" instrument_node="">
</span><h2 data-dcnode-id="1392" id="h-cannabis-treating-ptsd-nightmares"><strong data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Cannabis treating PTSD nightmares</span></strong></h2><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">Nightmares are extremely common for those suffering from Post-Traumatic Stress Disorder, or PTSD. It’s estimated that </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6263296/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1389" instrument_node="">up to 72% of PTSD patients</span></a><span data-dcnode-id="1387" instrument_node=""> experience nightmares in which the trauma that caused the PTSD is played out over and over again, causing them to constantly relive the event.&nbsp;</span></p><span data-dcnode-id="1385" instrument_node="">
</span><figure class="wp-block-embed is-type-video is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="1377"><div class="wp-block-embed__wrapper" data-dcnode-id="1378"><span data-dcnode-id="1384" instrument_node="">
</span><div class="le-video-container lazyload" data-dcnode-id="1380"><span data-dcnode-id="1383" instrument_node="">
</span><iframe allowfullscreen="" data-dcnode-id="1382" frameborder="0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/H6Yl6840-_E&amp;raw" srcdoc="<style>*{padding:0;margin:0;box-sizing:border-box}a,img{display:block;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}a:before,a:after{position:absolute;content:'';left:50%;top:50%;display:block;z-index:1}a:before{margin:-4.9% 0 0 -7%;background:rgba(31,31,30,.8);padding-top:9.8%;width:15%;border-radius:16% / 27%}a:after{margin:-1.9vw 0 0 -1vw;border:2vw solid transparent;border-left:3.8vw solid #fff}a:hover:before{background:#c0171c}</style><a href='https://www.youtube.com/embed/H6Yl6840-_E?autoplay=1&amp;origin=https://cannigma.com'><img src='https://img.youtube.com/vi/H6Yl6840-_E/hqdefault.jpg' alt=''></a>"></iframe><span data-dcnode-id="1381" instrument_node="">
</span></div><span data-dcnode-id="1379" instrument_node="">
</span></div></figure><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1375" instrument_node="">There is some evidence that cannabis helps treat PTSD patients suffering from persistent nightmares. In </span><a data-dcnode-id="1373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/19228182/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1374" instrument_node="">one study</span></a><span data-dcnode-id="1372" instrument_node="">, researchers reviewed the charts of 47 PTSD patients with continued nightmares that were unrelieved with the use of conventional antidepressants and hypnotics.&nbsp;</span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1365"><span data-dcnode-id="1369" instrument_node="">With the conventional treatments unsuccessful, the patients were then given nabilone, a </span><a data-dcnode-id="1367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/products/synthetic-cannabinoids-the-good-the-bad-and-the-ugly-4/"><span data-dcnode-id="1368" instrument_node="">synthetic form of THC</span></a><span data-dcnode-id="1366" instrument_node="">. For 72 percent of these patients, their nightmares were significantly reduced or stopped altogether. And some patients experienced more sleep and better quality of sleep, as well as reduced night sweats and daytime flashbacks.&nbsp;</span></p><div class="code-block code-block-2" data-dcnode-id="1362" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1364" instrument_node="">
</span><div data-dcnode-id="1363" data-mantis-video=""></div></div><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1357"><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/24987795/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1360" instrument_node="">Another study</span></a><span data-dcnode-id="1358" instrument_node=""> done on 104 prison inmates described as having “serious mental illness” showed significant improvement in PTSD symptoms such as nightmares and insomnia, plus improvements in chronic pain. The study also noted that medications with the potential for adverse effects – mostly antipsychotics and sedative/hypnotics – were often discontinued once the inmates were given nabilone.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1355" instrument_node="">Yet another </span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40261-014-0212-3" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1354" instrument_node="">study found</span></a><span data-dcnode-id="1352" instrument_node=""> cannabis use led to statistically significant improvements in sleep quality, frequency of nightmares, and PTSD hyper-arousal symptoms.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><h2 data-dcnode-id="1347" id="h-what-about-cbd"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">What about CBD?</span></strong></h2><span data-dcnode-id="1346" instrument_node="">
</span><p data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">It’s hard to say if </span><a data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/cbd/what-is-cbd/"><span data-dcnode-id="1344" instrument_node="">CBD</span></a><span data-dcnode-id="1342" instrument_node=""> causes unusual dreams, as no known studies have been done in that respect. Information on whether it does would be subjective and anecdotal. However, as with THC, there have been studies done on CBD’s effects on dream suppression and even a potentially dangerous sleep disorder called REM behavioral disorder, or RBD.</span></p><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1335"><span data-dcnode-id="1339" instrument_node="">In the first of hopefully many studies to determine the </span><a data-dcnode-id="1337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liebertpub.com/doi/full/10.1089/acm.2018.0437" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1338" instrument_node="">benefit of CBD for patients with PTSD,</span></a><span data-dcnode-id="1336" instrument_node=""> 11 patients at an outpatient psychiatry clinic were given CBD in addition to their regular care, for eight weeks. At the end of the eight weeks, PTSD severity had decreased in 91 percent of the patients, and CBD also brought relief to a subset of patients who were suffering from frequent nightmares. Researchers also noted that the CBD was well-tolerated.</span></p><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1330"><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//accp1.onlinelibrary.wiley.com/doi/abs/10.1002/j.1552-4604.1981.tb02622.x" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1333" instrument_node="">In a review of studies</span></a><span data-dcnode-id="1331" instrument_node=""> done between 1972 and 1981, researchers found that the subjects with insomnia who were given CBD reported significantly more sleep than those who were given a placebo, along with much less dream recall.&nbsp;</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">The results of these studies may be especially good news for the parents of children with sleep disorders, as most parents eschew the idea of </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/treatment/children-and-cannabis/"><span data-dcnode-id="1327" instrument_node="">giving THC to their little ones</span></a><span data-dcnode-id="1325" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1322" instrument_node="">Finally, </span><a data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/full/10.1111/jcpt.12179" rel="noreferrer noopener nofollow" target="_blank"><span data-dcnode-id="1321" instrument_node="">a small study</span></a><span data-dcnode-id="1319" instrument_node=""> using CBD was done with patients suffering from Parkinson’s disease and REM behavioral disorder. RBD is a serious sleep disorder that occurs during REM sleep. With RBD, the muscles that would normally be temporarily paralyzed during REM sleep, are not, leaving the patients to “act out” their dreams, sometimes dramatically and even violently.&nbsp;</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">After being given CBD, the patients in the study had an immediate and significant drop in the frequency of RBD events during their REM sleep, and with no reported side effects.&nbsp;</span></p><span data-dcnode-id="1314" instrument_node="">
</span><h2 data-dcnode-id="1311" id="h-what-to-know-before-you-try-it"><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">What to know before you try it</span></strong></h2><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1309" instrument_node="">Although CBD appears to be generally safe for most people, be aware that it can </span><a data-dcnode-id="1307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/treatment/cannabis-side-effects-and-drug-interactions-everything-you-need-to-know/"><span data-dcnode-id="1308" instrument_node="">interact with certain drugs</span></a><span data-dcnode-id="1306" instrument_node="">, so check with your health care provider before embarking on your CBD sleep journey. Of course, the same goes for THC: seeing a cannabis-literate doctor who can advise you would be invaluable. And whether using THC or CBD, the adage, “</span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cannigma.com/treatment/cannabis-dosing-a-physicians-perspective/"><span data-dcnode-id="1305" instrument_node="">Start low and go slow</span></a><span data-dcnode-id="1303" instrument_node="">” is some of the best advice you can heed.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><span data-dcnode-id="1299" instrument_node="">
