                  </span></p></div><span data-dcnode-id="353" instrument_node=""> </span><div class="column has-text-right" data-dcnode-id="350"><p class="article__date" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">
                  Mar 18, 2021
                </span></p></div></div></div><span data-dcnode-id="347" instrument_node=""> </span><article class="article article--single clearfix" data-dcnode-id="269"><div class="container-thin has-mobile-padding" data-dcnode-id="342"><h1 class="title is-6 is-tablet-2 is-widescreen-1 article__title" data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">
                How do our hormones affect our dreams
              </span></h1><span data-dcnode-id="344" instrument_node=""> </span><p class="article__attribution" data-dcnode-id="343"></p></div><span data-dcnode-id="341" instrument_node=""> </span><div class="article-content has-mobile-padding" data-dcnode-id="270"><div class="flexible-content" data-dcnode-id="271"><div class="container-thin" data-dcnode-id="338"><div class="article-intro" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">
      Women dream more vividly than men, according to a study; but how else does our menstrual cycle affect our dreams? Sleep therapist Natalie Pennicotte-Collier, who works with Team GB on 360 well-being techniques, explains more
    </span></div></div><span data-dcnode-id="337" instrument_node=""> </span><div class="container-thin" data-dcnode-id="326"><div class="article-text-row content" data-dcnode-id="327"><p data-dcnode-id="334"><span data-dcnode-id="335" style="background-color: transparent; color: rgb(17, 17, 17);"><span data-dcnode-id="336" instrument_node="">Even in the latest sleep science, dreaming is still somewhat a mystery. But it seems to be essential to what makes us human. Dreams usually happen during the REM (rapid eye movement) sleep cycle; we get 4-5 per night – the first one starts approximately 90 minutes after falling asleep, and it is typically the shortest REM cycle. If we go straight from REM sleep back to non-REM sleep without waking, the dream is often lost forever.</span></span></p><p data-dcnode-id="331"><span data-dcnode-id="332" style="background-color: transparent; color: rgb(17, 17, 17);"><span data-dcnode-id="333" instrument_node="">REM sleep and dreaming are crucially important; they improve the creative process more than any other state – asleep or awake. This wisdom moment – creative solutions to problems come to us when we are sleeping – sleep science calls this “pattern recognition.” This happens when the brain is in a relaxed-enough state to create new connections and neural pathways – also known as neuroplasticity. This explains why great ideas often come to you in the shower, on a walk, lying in bed at night, and dreaming, because the brain is relaxed enough to enable those new connections to form.</span></span></p><p data-dcnode-id="328"><span data-dcnode-id="329" style="background-color: transparent; color: rgb(17, 17, 17);"><span data-dcnode-id="330" instrument_node="">While the sleep cycles happen every night they collide with the body’s other internal cycles – none more so powerful than our menstrual and hormonal cycles. A study from University of the West of England found that women have more vivid dreams than men. Researchers believe this is due to changes in the body temperature caused by our monthly cycle. It’s not the only way it affects our dreams…</span></span></p></div></div><span data-dcnode-id="325" instrument_node=""> </span><div class="container-thin" data-dcnode-id="272"><div class="article-text-row content" data-dcnode-id="273"><h3 data-dcnode-id="322"><strong data-dcnode-id="323" style="background-color: transparent;"><span data-dcnode-id="324" instrument_node="">What’s happening in our brains when we dream?</span></strong></h3><p data-dcnode-id="319"><span data-dcnode-id="320" style="background-color: transparent;"><span data-dcnode-id="321" instrument_node="">Whilst we are dreaming, we are in fact in subconscious creative mode. We process over 70k images that we see on average each day, made up of interactions, emotions and experiences, and then extract overarching rules and commonalties. Neuroscience research has since demonstrated that dreaming is not just a by-product of REM sleep, but actually serves critical functions for our well-being and mental health.</span></span></p><h3 data-dcnode-id="316"><strong data-dcnode-id="317" style="background-color: transparent;"><span data-dcnode-id="318" instrument_node="">How do hormones affect our dreams?</span></strong></h3><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">All dreams, nightmares and night terrors are all caused by different chemicals being released while you are sleeping. The way you fall asleep is through the activation of the neurotransmitter GABA (gamma-aminobutyric-acid) and, when dreaming, the neurotransmitter acetylcholine (a chemical that motor neurons of the nervous system release) is released in high levels as a result of wakefulness and alertness during the day. But it is also found in high levels during REM sleep. GABA is calming, and can reduce anxiety.</span></p><h3 data-dcnode-id="311"><strong data-dcnode-id="312" style="background-color: transparent;"><span data-dcnode-id="313" instrument_node="">Does my period affect my sleep?</span></strong></h3><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Pre-menstrual-induced insomnia and restless nights are real, and also really normal. When you get your period, you have drops in oestrogen and progesterone levels and that unbalances your sleep cycle as well. We know that the amount of REM sleep – which is when we have most of our dreams – is less in this part of the menstrual cycle. Hormonal changes at this time (e.g. sudden drops in progesterone) affect the body’s temperature control. In turn can affect sleep quality.</span></p><p data-dcnode-id="306"><span data-dcnode-id="307" style="background-color: transparent;"><span data-dcnode-id="308" instrument_node="">In women with PMS, disturbances of sleep are very common in the second half of the menstrual cycle (as compared with the first half of the cycle), and dream sleep is greatly reduced. Lower levels of allopregnanolone (a breakdown product of progesterone which helps block anxiety) are also found in women with PMS, as well as lower GABA receptor activity levels. </span></span></p><h3 data-dcnode-id="303"><strong data-dcnode-id="304" style="background-color: transparent;"><span data-dcnode-id="305" instrument_node="">What about the menopause?</span></strong></h3><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Our age matters here as well, as when we approach the menopause, our overall oestrogen levels decline. So, right at and just before ovulation we will mostly notice some sleep disturbance. I know from patients I see at my sleep clinic that it can become a bigger problem for women after 35/40 years, because most women begin the 10 to 15-year journey of perimenopause around that age. During this time, production of progesterone decreases slowly. When this hormone is low, you have less ability to balance out your oestrogen levels. This is the source of the insomnia: elevated oestrogen negatively impacts melatonin and serotonin production. The combination of both is what we need to fall asleep and stay asleep.</span></p><h3 data-dcnode-id="298"><strong data-dcnode-id="299" style="background-color: transparent;"><span data-dcnode-id="300" instrument_node="">How to boost your sleep during your cycle</span></strong></h3><p data-dcnode-id="294"><span data-dcnode-id="296" style="background-color: transparent;"><span data-dcnode-id="297" instrument_node="">1. &nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="295" instrument_node="">For so many of my clients a caffeine curfew after 12pm, or even a week off entirely, is hugely helpful.</span></p><p data-dcnode-id="290"><span data-dcnode-id="292" style="background-color: transparent;"><span data-dcnode-id="293" instrument_node="">2. &nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="291" instrument_node="">If you’re knackered, boost your hormones with a quality magnesium supplement. Magnesium deficiency is often a reason you you’re feeling so wiped out and waking really early missing out on REM Sleep.</span></p><p data-dcnode-id="286"><span data-dcnode-id="288" style="background-color: transparent;"><span data-dcnode-id="289" instrument_node="">3. &nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="287" instrument_node="">Feed your gut bacteria. Right after you ovulate, you have much more oestrogen circulating in your body. What you eat can help your body metabolise this, and fermented foods and probiotics are a great place to start.</span></p><p data-dcnode-id="282"><span data-dcnode-id="284" style="background-color: transparent;"><span data-dcnode-id="285" instrument_node="">4. 	E</span></span><span data-dcnode-id="283" instrument_node="">at tryptophan-rich foods – the amino acid found in oats, cheese, turkey, bananas – to help promote sleep, or try supplements including Cherry Juice Extract, the amino acid L-theanine which can help promote sleep.</span></p><p data-dcnode-id="278"><span data-dcnode-id="280" style="background-color: transparent;"><span data-dcnode-id="281" instrument_node="">5. &nbsp;&nbsp;&nbsp;</span></span><span data-dcnode-id="279" instrument_node="">Make morning daily exercise a priority. This supports hormones and ensures that you'll be tired by bedtime.</span></p><p data-dcnode-id="276"><br data-dcnode-id="277"></p><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">To find out more about Natalie’s techniques and coaching, visit mindtonictherapy.com or follow her on Instagram @calmerrama</span></p></div></div></div></div></article></div><span data-dcnode-id="267" instrument_node=""> </span><div class="article-column-left" data-dcnode-id="201"><div class="has-mobile-padding" data-dcnode-id="202"><div class="sidebar" data-dcnode-id="203"><h2 class="section-title" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Recent Related</span></h2><span data-dcnode-id="264" instrument_node=""> </span><div class="columns is-multiline" data-dcnode-id="204"><div class="column is-half-tablet is-12-widescreen" data-dcnode-id="245"><a data-dcnode-id="246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moodymonth.com/articles/endometriosis-mini-series"><div class="card is-common-width is-common-height is-compact" data-dcnode-id="247"><div class="card-image" data-dcnode-id="261"><figure class="image is-2by1 has-background-primary" data-dcnode-id="262"><img alt="" data-dcnode-id="263" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moodymonth.s3.eu-west-2.amazonaws.com/media/images/articles/preview_images/2_1_768/moody-articles-images-endo1-5c8a8e10d9d01.jpg&amp;raw"></figure></div><span data-dcnode-id="260" instrument_node=""> </span><div class="card-content" data-dcnode-id="248"><p class="card-title card-title-small-2-line" data-dcnode-id="255"></p><div data-dcnode-id="256" style="overflow: hidden;"><span data-dcnode-id="257" style="box-shadow: transparent 0px 0px;"><span aria-label="Endometr
