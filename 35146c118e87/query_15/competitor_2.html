a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/what-part-of-the-brain-is-responsible-for-dreams/" rel="bookmark" title="What Part Of The Brain Is Responsible For Dreams"><span data-dcnode-id="998" instrument_node="">What Part Of The Brain Is Responsible For Dreams</span></a></h3><div class="td-editor-date" data-dcnode-id="988"><span data-dcnode-id="995" instrument_node=""> </span><span class="td-author-date" data-dcnode-id="989"><span data-dcnode-id="994" instrument_node=""> </span><span class="td-post-date" data-dcnode-id="991"><time class="entry-date updated td-module-date" data-dcnode-id="992" datetime="2021-10-31T21:27:45+00:00"><span data-dcnode-id="993" instrument_node="">October 31, 2021</span></time></span><span data-dcnode-id="990" instrument_node=""> </span></span></div></div></div></div></div></div><div class="clearfix" data-dcnode-id="982"></div><div class="clearfix" data-dcnode-id="981"></div></div></div></div><div class="vc_column_inner tdi_88 wpb_column vc_column_container tdc-inner-column td-pb-span8" data-dcnode-id="508"><span data-dcnode-id="977" instrument_node=""> </span><div class="vc_column-inner" data-dcnode-id="509"><div class="wpb_wrapper" data-dcnode-id="510"><div class="clearfix" data-dcnode-id="974"></div><div class="clearfix" data-dcnode-id="973"></div><div class="td_block_wrap tdb_single_content tdi_89 td-pb-border-top td_block_template_1 td-post-content tagdiv-type" data-dcnode-id="568" data-td-block-uid="tdi_89"><span data-dcnode-id="972" instrument_node=""> </span><span data-dcnode-id="969" instrument_node=""> </span><div class="tdb-block-inner td-fix-index" data-dcnode-id="569"><div class="code-block code-block-1" data-dcnode-id="959" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="966" instrument_node=""> </span><span data-dcnode-id="964" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="963" style="display:block; text-align:center;"></ins><span data-dcnode-id="962" instrument_node=""> </span></div><p data-dcnode-id="958"></p><h2 data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Use And Abuse Of Stimulants</span></h2><div class="youtube-player" data-dcnode-id="948" data-id="hGA_NgY9f7s"><span data-dcnode-id="955" instrument_node=""> How do psychoactive drugs affect the brain?</span><div data-dcnode-id="952" data-id="hGA_NgY9f7s"><img class="td-animation-stack-type0-2" data-dcnode-id="954" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/hGA_NgY9f7s/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="953"></div></div><div data-dcnode-id="949" data-id="hGA_NgY9f7s"><img class="td-animation-stack-type0-2" data-dcnode-id="951" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/hGA_NgY9f7s/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="950"></div></div></div><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Therapeutically, stimulants are used and/or prescribed for a variety of reasons. They are used to increase or maintain alertness to boost endurance or productivity to counteract fatigue and lethargy throughout the day to counteract abnormal states that diminish alertness or consciousness to decrease appetite and promote weight loss and to enhance concentration . Many stimulants are also capable of improving mood and relieving anxiety, and are occasionally used to treat symptoms of depression.</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">The euphoria produced by some stimulants leads to their recreational use, so many stimulants are either illegal or very carefully controlled in the United States. Some may be legally available only by prescription. Addiction to some central-nervous-system stimulants can quickly lead to medical, psychiatric, and psychosocial deterioration. Drug tolerance, dependence, sensitization, and withdrawal can occur after repeated use. Over time, stimulants can disrupt the functioning of the brains dopamine system, dampening users ability to feel any pleasure at all.</span></p><h2 data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Categories Of Psychoactive Drugs</span></h2><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Psychoactive drugs are divided into three categories :</span></p><ul data-dcnode-id="927"><li data-dcnode-id="936"><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Depressants </span></strong><span data-dcnode-id="937" instrument_node="">slow down the activity of the central nervous system , which reduces a person’s alertness, and also slows down functions such as breathing and heart rate. Examples of depressants are alcohol, heroin, cannabis, the prescription drug group of benzodiazepines and other prescription tranquilisers.</span></li><li data-dcnode-id="932"><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Stimulants </span></strong><span data-dcnode-id="933" instrument_node="">increase the activity of the central nervous system, making the person more alert and aroused. Examples of stimulants are nicotine, caffeine, cocaine, ecstasy and the methamphetamines, speed and ice.</span></li><li data-dcnode-id="928"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Hallucinogens </span></strong><span data-dcnode-id="929" instrument_node="">make a person see, hear, smell or feel things that aren’t there. Examples of hallucinogens are LSD, magic mushrooms, ecstasy and cannabis.</span></li></ul><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Some drugs fall into more than one category. For example, cannabis is both a depressant and hallucinogen, while ecstasy is a stimulant and hallucinogen.</span></p><div class="code-block code-block-2" data-dcnode-id="917" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="924" instrument_node=""> </span><span data-dcnode-id="922" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1522786578" data-dcnode-id="921" style="display:block; text-align:center;"></ins><span data-dcnode-id="920" instrument_node=""> </span></div><h2 data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Your Brain On Psychedelics</span></h2><p data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">If youve ever eaten a super-sugary donut, smoked a cigarette, or drank a really strong cup of coffee, you probably noticed its effects. These are all drugs and, like psychedelics, all produce different physiological effects when introduced to the body. Everything we consumeillegal or otherwiseaffects the brain.</span></p><p data-dcnode-id="908"><span data-dcnode-id="912" instrument_node="">But of course, different psychedelics create unique experiences and their specific interactions with the human brain can vary. Psychedelics and their effect on the brain can be </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3181663/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="911" instrument_node="">classified by their chemical structure</span></a><span data-dcnode-id="909" instrument_node=""> and mode of action :</span></p><li data-dcnode-id="901"><strong data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Serotonergic hallucinogens </span></strong><span data-dcnode-id="905" instrument_node="">are a class of psychedelic drugs strongly linked to the neurotransmitter serotonincommonly referred to as 5-HTwhich is linked to mood, social behavior, sexual desire, memory, sleep, appetite and digestion among many other things. </span><strong data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Includes: </span></strong><span data-dcnode-id="902" instrument_node="">LSD, psilocybin, MDMA, DMT, 5-MeO-DMT, mescaline, DOI</span></li><li data-dcnode-id="894"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Psychedelic or dissociative anesthetics </span></strong><span data-dcnode-id="898" instrument_node="">are commonly associated with distorted sensory perceptions and feelings of being disconnected from oneself and the environment . </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Includes: </span></strong><span data-dcnode-id="895" instrument_node="">PCP, ketamine</span></li><li data-dcnode-id="884"><strong data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Entactogens </span></strong><span data-dcnode-id="891" instrument_node="">produce psychedelic-like effects, but typically dont produce hallucinogens. Entactogens are typically associated with </span><em data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">feelings of oneness, emotional communion, and emotional relatedness</span></em><span data-dcnode-id="888" instrument_node="">.</span><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node=""> Includes: </span></strong><span data-dcnode-id="885" instrument_node="">MDMA, MDE</span></li><p data-dcnode-id="878"><strong data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Recommended Reading: </span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/does-prevagen-help-with-memory-loss/"><span data-dcnode-id="882" instrument_node="">Does Prevagen Help With Memory Loss</span></a><span data-dcnode-id="880" instrument_node=""> </span></strong></p><h2 data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">In Vivo Microdialysis Findings</span></h2><p data-dcnode-id="872"><i data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">In vivo</span></i><span data-dcnode-id="873" instrument_node=""> brain microdialysis enables the monitoring of neurotransmitters in the extracellular brain compartment and provides information on the relationship between pharmacological manipulations, neurotransmitters release and behavior . Monitoring extracellular DA in the accumbens and striatum in animals is a useful preclinical method to identify new drugs of abuse through revealing their rewarding properties .</span></p><div class="code-block code-block-3" data-dcnode-id="864" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="871" instrument_node=""> </span><span data-dcnode-id="869" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="868" style="display:block; text-align:center;"></ins><span data-dcnode-id="867" instrument_node=""> </span></div><p data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">The present profile of the on-and-off of extracellular DA in response to i.v. 2-DPMP, with a decisive descending phase, resembles that of DA responses to cocaine as observed in a comparable experimental design applied previously in the same research lab of Di Chiara . Amphetamine-induced extracellular DA response in the NAc shell has a slow descending phase that does not return to the basal levels within the same time scale . Thus, the present </span><i data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">in vivo</span></i><span data-dcnode-id="860" instrument_node=""> findings not only prove that 2-DPMP causes a direct dose-dependent increase in extracellular DA in the brains reward pathway, but also suggest that the mode of its action is more similar to that of cocaine. The DA response to 2-DPMP observed here may account for the high abuse potential of this drug, higher than that of cocaine .</span></p><h2 data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Summary Of Psychoactive Drugs</span></h2><div data-dcnode-id="852"><span data-dcnode-id="856" instrument_node=""> </span><img alt="Neuropharmacology" class="lazyloaded td-animation-stack-type0-2" data-dcnode-id="855" data-src="https://www.knowyourbrain.net/wp-content/uploads/neuropharmacology.png" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/wp-content/uploads/neuropharmacology.png&amp;raw" title="Neuropharmacology"><noscript data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">&lt;img class="lazyload" src="https://www.knowyourbrain.net/wp-content/uploads/neuropharmacology.png" title="Neuropharmacology" alt="Neuropharmacology"&gt;</span></noscript></div><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Substance use disorder is defined in DSM-5 as a compulsive pattern of drug use despite negative consequences. Both physical and psychological dependence are important parts of this disorder. Alcohol, barbiturates, and benzodiazepines are central nervous system depressants that affect GABA neurotransmission. Cocaine, amphetamine, cathinones, and MDMA are all central nervous stimulants that agonize dopamine neurotransmission, while nicotine and caffeine affect acetylcholine and adenosine, respectively. Opiate drugs serve as powerful analgesics through their effects on the endogenous opioid neurotransmitter system, and hallucinogenic drugs cause pronounced changes in sensory and perceptual experiences. The hallucinogens are variable with regards to the specific neurotransmitter systems they affect.</span></p><p data-dcnode-id="844"><strong data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">Also Check: </span><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/why-do-people-get-brain-freeze/"><span data-dcnode-id="848" instrument_node="">Why Do People Get Brain Freeze</span></a><span data-dcnode-id="846" instrument_node=""> </span></strong></p><h2 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">What Youll Learn To Do: Explain How Drugs Affect Consciousness</span></h2><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">While we all experience altered states of consciousness in the form of sleep on a regular basis, some people use drugs and other substances that result in altered states of consciousness as well. This section will present information relating to the use of various psychoactive drugs and problems associated with such use. Youll also learned about other altered states of consciousness like hypnosis and meditation.</span></p><h2 data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Individualized Therapy Metabolic Differences And Potential Prescribing Approaches For The Future</span></h2><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Mental illnesses contribute to more disability in western countries than all other illnesses including cancer and heart disease. Depression alone is predicted to be the second largest contributor to disease burden by 2020 . The numbers of people affected by mental health issues are pretty astonishing, with estimates that 25% of adults experience a mental health issue in any given year, and this affects not only the individual but their friends and family. One in 17 adults experiences a serious mental illness . Newer antidepressants are probably the most frequently prescribed drugs for treating mental health issues, although there is no magic bullet for treating depression or other conditions. Pharmacotherapy with psychological therapy may be the most beneficial treatment approach for many psychiatric conditions, but there are still many unanswered questions. For example, why does one antidepressant help one individual yet have no effect for another? Antidepressants can take 4 to 6 weeks to start improving depressive symptoms, and we dont really understand why. Many people do not respond to the first antidepressant prescribed and may have to try different drugs before finding something that works for them. Other people just do not improve with antidepressants . As we better understand why individuals differ, the easier and more rapidly we will be able to help people in distress.</span></p><p data-dcnode-id="830"><strong data-dcnode-id="831"><span data-dcnode-id="835" instrument_node="">Don’t Miss: </span><a data-dcnode-id="833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/what-does-fluoride-do-to-your-brain/"><span data-dcnode-id="834" instrument_node="">What Does Fluoride Do To Your Brain</span></a><span data-dcnode-id="832" instrument_node=""> </span></strong></p><div class="code-block code-block-4" data-dcnode-id="822" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="829" instrument_node=""> </span><span data-dcnode-id="827" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="826" style="display:block; text-align:center;"></ins><span data-dcnode-id="825" instrument_node=""> </span></div><h2 data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Feature: Human Biology In The News</span></h2><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">In North America, a lot of media attention is currently given to a rising tide of opioid addiction and overdose deaths. </span><strong data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Opioids</span></strong><span data-dcnode-id="816" instrument_node=""> are drugs derived from the opium poppy or synthetic versions of such drugs. They include the illegal drug heroin, as well as prescription painkillers such as codeine, morphine, hydrocodone, oxycodone, and fentanyl. In 2016, fentanyl received wide media attention when it was announced that an accidental fentanyl overdose was responsible for the death of music icon Prince. Fentanyl is an extremely strong and dangerous drug, said to be 50 to 100 times stronger than morphine, making risk of overdose death from fentanyl very high.</span></p><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">The dramatic increase in opioid addiction and overdose deaths has been called an opioid epidemic. It is considered to be the worst drug crisis in Canadian history. Consider the following facts:</span></p><ul data-dcnode-id="800"><li data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">In 2016, there were almost 2,500 opioid-related deaths in Canada  almost 7 per day.</span></li><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">The number of prescriptions written for opioids quadrupled between 1999 and 2010. If you have been prescribed codeine, fentanyl, morphine, oxycodone, hydromorphone or medical heroin, then you have been prescribed an opiate.</span></li><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">There are many long-term health effects of using opioids, which include:</span></li><li data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Increased tolerance to the drug.</span></li><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Liver damage.</span></li><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Substance use disorder or addiction.</span></li></ul><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">What, if anything, will work to stop the opioid epidemic in Canada and the United States? Keep watching the news to find out.</span></p><h2 data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Stimulants Effect On The Brain</span></h2><div class="youtube-player" data-dcnode-id="788" data-id="8qK0hxuXOC8"><span data-dcnode-id="795" instrument_node=""> How do drugs affect the brain? – Sara Garofalo</span><div data-dcnode-id="792" data-id="8qK0hxuXOC8"><img class="td-animation-stack-type0-2" data-dcnode-id="794" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/8qK0hxuXOC8/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="793"></div></div><div data-dcnode-id="789" data-id="8qK0hxuXOC8"><img class="td-animation-stack-type0-2" data-dcnode-id="791" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/8qK0hxuXOC8/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="790"></div></div></div><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">Stimulants include illicit drugs like cocaine, and amphetamine, as well as legal drugs like caffeine and medical prescription drugs to treat ADHD.</span></p><p data-dcnode-id="781"><span data-dcnode-id="785" instrument_node="">Like all drugs that may lead to abuse, stimulants affect the </span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK64328/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="784" instrument_node="">limbic reward system of the brain</span></a><span data-dcnode-id="782" instrument_node="">. Stimulants increase the release of dopamine, a neurotransmitter in the brain that regulates the feelings of pleasure and alters the control of movement, cognition, motivation, and euphoria. When there are high levels of dopamine, a person will feel their mood enhances and increased motor activity. However, when there is a dopamine surge, people may become nervous, irritable, aggressive, or paranoid. Other effects of stimulants include hallucinations as well as bizarre thoughts and paranoia that approaches schizophrenia.</span></p><div class="code-block code-block-5" data-dcnode-id="773" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="780" instrument_node=""> </span><span data-dcnode-id="778" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="777" style="display:block; text-align:center;"></ins><span data-dcnode-id="776" instrument_node=""> </span></div><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Like depressants, stimulants can lead to increased tolerance, dependence, and addiction.</span></p><p data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">Read Also: </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/can-diabetes-cause-memory-loss/"><span data-dcnode-id="769" instrument_node="">Can Diabetes Cause Memory Loss</span></a><span data-dcnode-id="767" instrument_node=""> </span></strong></p><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Hypothalamus Area Of The Brain And Drug Addiction</span></h2><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Hypothalamus area of the brain and drug addiction. This is the section of the brain that is most affected</span></p><p data-dcnode-id="756"><strong data-dcnode-id="757"><span data-dcnode-id="760" instrument_node="">Hypothalamus area of the brain and drug addiction:</span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.i-am-i.com/wp-admin" rel="nofollow noopener" target="_blank"><span data-dcnode-id="759" instrument_node=""> Stress management</span></a></strong></p><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Of the components of the brain, the hypothalamus area often bears the greater risk of attack by substance abuse. This is actually the part of the brain that is responsible for several functions including body temperature regulations, hunger, thirst and sleep. Besides these functions, the hypothalamus is also task a key role of the interpretation of how we respond to stress. According to the experts at AWAREmed Health and Wellness Resource Center which is one of the leading pioneers in natural and holistic addiction treatment, we cannot effectively talk about addiction without the mention of stress. Doctor Dalal Akoury MD and also the founder of this facility agree that stress regulation is highly relevant to our understanding of addiction. And that is why we want to explore further into details the effects of addiction on the hypothalamus area of the brain alongside the regulation of stress and withdrawal.</span></p><div class="code-block code-block-6" data-dcnode-id="746" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="753" instrument_node=""> </span><span data-dcnode-id="751" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="750" style="display:block; text-align:center;"></ins><span data-dcnode-id="749" instrument_node=""> </span></div><h2 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">The Chemical Imbalance Hypothesis</span></h2><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">In the 1960s, researchers discovered how antipsychotics and antidepressants interfered with this messaging process, and their discoveries led to a hypothesis that mental disorders are due to chemical imbalances in the brain, which are then fixed, or put back to normal, by psychiatric drugs.</span></p><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">For example, antidepressants were found to increase levels of the neurotransmitter serotonin in the brain, and thus researchers hypothesized that depression was due to too little serotonin. Antipsychotics were found to block dopamine pathways in the brain, and so researchers hypothesized that schizophrenia was due to too much dopamine.</span></p><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">To test these hypotheses, researchers conducted studies to determine whether people with depression had too little serotonin in their brain, or whether people with schizophrenia regularly had too much dopamine activity. Decades of research failed to provide the confirming evidence.</span></p><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">In 2005, Kenneth Kendler, coeditor in chief of </span><em data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Psychological Medicine</span></em><span data-dcnode-id="734" instrument_node=""> summed up these research findings in this succinct way: We have hunted for big simple neurochemical explanations for psychiatric disorders and have not found them.</span></p><p data-dcnode-id="727"><strong data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">Read Also: </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/how-does-parkinsons-disease-affect-the-brain/"><span data-dcnode-id="731" instrument_node="">How Does Parkinson’s Disease Affect The Brain</span></a><span data-dcnode-id="729" instrument_node=""> </span></strong></p><div class="code-block code-block-7" data-dcnode-id="719" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="726" instrument_node=""> </span><span data-dcnode-id="724" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="723" style="display:block; text-align:center;"></ins><span data-dcnode-id="722" instrument_node=""> </span></div><h2 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">A Note On The Term Narcotics</span></h2><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">The term narcotic originally referred medically to any psychoactive compound with sleep-inducing properties. In the United States, it has since become associated with opioids, commonly morphine and heroin and their derivatives. The term is, today, imprecisely defined and typically has negative connotations. When used in a legal context in the United States, the term narcotic drug refers to a substance that is completely prohibited, or one, such as codeine or morphine, that is used in violation of governmental regulation. From a medical standpoint, it is no longer a useful term.</span></p><h2 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Grapefruit Juice And Metabolism</span></h2><div data-dcnode-id="708"><span data-dcnode-id="712" instrument_node=""> </span><img alt="Heroin In The Brain" class="lazyload td-animation-stack-type0-1" data-dcnode-id="711" data-src="https://www.knowyourbrain.net/wp-content/uploads/heroin-in-the-brain-gameinsights.jpeg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Heroin In The Brain"><noscript data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">&lt;img class="lazyload" src="https://www.knowyourbrain.net/wp-content/uploads/heroin-in-the-brain-gameinsights.jpeg" title="Heroin In The Brain" alt="Heroin In The Brain"&gt;</span></noscript></div><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Certain types of food in the stomach can alter the rate of drug absorption, and other foods can also alter the rate of drug metabolism. The most well known is grapefruit juice. Grapefruit juice suppresses cytochrome P450 enzymes in the liver, and these liver enzymes normally break down a large variety of drugs . If the enzymes are suppressed, drug levels can build up to potentially toxic levels. In this case, the effects can persist for extended periods of time after the consumption of grapefruit juice. As of 2013, there are at least 85 drugs shown to adversely interact with grapefruit juice . Some psychotropic drugs that are likely to interact with grapefruit juice include carbamazepine , prescribed for bipolar disorder diazepam , used to treat anxiety, alcohol withdrawal, and muscle spasms and fluvoxamine , used to treat obsessive compulsive disorder and depression. A link at the end of this module gives the latest list of drugs reported to have this unusual interaction.</span></p><p data-dcnode-id="700"><strong data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">You May Like: </span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/why-do-people-get-brain-freeze/"><span data-dcnode-id="704" instrument_node="">Why Do People Get Brain Freeze</span></a><span data-dcnode-id="702" instrument_node=""> </span></strong></p><h2 data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Psychoactive Drugs Things That You Need To Consider</span></h2><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Since youve discovered what psychoactive drugs are and how can they affect your brains functionality, consciousness, and mood, you must know how different people respond to them. Knowing that will help you evaluate the effects of psychoactive drugs that youre taking in different forms.</span></p><p data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">To reiterate psychoactive drugs are strong enough to alter the brain functions and the way an individual feels, perceives or understands the world around him or her.</span></p><div class="code-block code-block-8" data-dcnode-id="686" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="693" instrument_node=""> </span><span data-dcnode-id="691" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="690" style="display:block; text-align:center;"></ins><span data-dcnode-id="689" instrument_node=""> </span></div><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node=""> There is no doubt that some types of psychoactive drugs are ubiquitous, such as sedatives, opiods, cannabis, hallucinogens and tobacco. The list includes both ones that come with psychoactive effects naturally and once that are synthesized in the laboratory.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node=""> Regardless of how they are manufactured or grown, these psychoactive drugs have a strong impact on your brain receptors.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">That is what makes considering different aspects, such as age, method of administration, setting and purity, highly important before taking them.</span></p><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">What Are The Long</span></h2><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">While the long-term use of most dissociative drugs has not been investigated systematically, research shows that repeated use of PCP can lead to tolerance and the development of a substance use disorder that includes a withdrawal syndrome when drug use is stopped. Other effects of long-term PCP use include persistent speech difficulties, memory loss, depression, suicidal thoughts, anxiety, and social withdrawal that may persist for a year or more after chronic use stops.</span></p><p data-dcnode-id="670"><strong data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">Read Also: </span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/what-happened-to-jfks-brain/"><span data-dcnode-id="674" instrument_node="">What Happened To Jfk’s Brain</span></a><span data-dcnode-id="672" instrument_node=""> </span></strong></p><div class="code-block code-block-9" data-dcnode-id="662" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="669" instrument_node=""> </span><span data-dcnode-id="667" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="666" style="display:block; text-align:center;"></ins><span data-dcnode-id="665" instrument_node=""> </span></div><h2 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Effect Of Psychedelics On The Brain</span></h2><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Most psychedelics work by interacting with serotonin receptors in the brain. Effects include increased breathing and heart rate, dilated pupils, dehydration, increased color perception, a state of empathetic well-being , and visual distortion: things may appear to move, shapes may appear on textures and exhibit a kaleidoscope-like effect, or lighting may dramatically change for no apparent reason.</span></p><h2 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Psychoactive Drugs Tobacco Alcohol And Illicit Substances</span></h2><div class="youtube-player" data-dcnode-id="648" data-id="Shb7iUGkgn0"><span data-dcnode-id="655" instrument_node=""> Did You Know: Synthetic Psychoactive Substances</span><div data-dcnode-id="652" data-id="Shb7iUGkgn0"><img class="td-animation-stack-type0-1" data-dcnode-id="654" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/Shb7iUGkgn0/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="653"></div></div><div data-dcnode-id="649" data-id="Shb7iUGkgn0"><img class="td-animation-stack-type0-1" data-dcnode-id="651" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/Shb7iUGkgn0/hqdefault.jpg&amp;raw"><div class="play" data-dcnode-id="650"></div></div></div><p data-dcnode-id="644"><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Context</span></strong><span data-dcnode-id="645" instrument_node=""> – Psychoactive drugs such as tobacco, alcohol, cannabis, amphetamines, ecstasy, cocaine, and heroin can change consciousness, mood, and thoughts. The use of these drugs imposes a substantial health burden on society.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">How do psychoactive drugs affect the brain? How does drug addiction develop and how can it be treated?</span></p><p data-dcnode-id="635"><span data-dcnode-id="641" instrument_node="">This Digest is a faithful summary of the leading </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/what-part-of-the-brain-controls-vomiting/"><span data-dcnode-id="640" instrument_node="">scientific consensus report</span></a><span data-dcnode-id="638" instrument_node=""> produced in 2004 by the World Health Organization : </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">“</span></em></p><p data-dcnode-id="629"><strong data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">Also Check: </span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/why-do-people-get-brain-freeze/"><span data-dcnode-id="633" instrument_node="">Why Do People Get Brain Freeze</span></a><span data-dcnode-id="631" instrument_node=""> </span></strong></p><div class="code-block code-block-10" data-dcnode-id="621" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="628" instrument_node=""> </span><span data-dcnode-id="626" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="625" style="display:block; text-align:center;"></ins><span data-dcnode-id="624" instrument_node=""> </span></div><h2 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Construction Of The Simulated Systems</span></h2><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">A standard protocol was used to study these docked homology models of rat DAT based on the crystal structure of the </span><i data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Drosophila Melanogaster</span></i><span data-dcnode-id="615" instrument_node=""> dopamine transporter with all-atom MD simulations in explicit models of the hydrated lipid membrane environment . To summarize, a multistep equilibration protocol was performed with the NAMD software, version 2.13 , to remove the close contacts in the structure, the backbones were initially fixed and then harmonically constrained, and water was restrained by small forces from penetrating the protein-lipid interface. The constraints on the protein were released gradually in three steps of 300 ps each, changing the force constants from 1 to 0.5 and 0.1 kcal/ respectively, with a time step of 1 fs. This was then followed by a short unbiased MD simulation performed with a 2 fs integration time step and under constant temperature maintained with Langevin dynamics, and 1 atm constant pressure achieved by using the hybrid Nosé-Hoover Langevin piston method on a flexible periodic cell to capture long-range effects. The simulated system, including the transporter embedded in a membrane patch and water layers on each side containing Na+ and Cl ions , was composed of approximately 149,664 atoms in a box with the final dimensions of 121 × 121 × 139 Å. After this equilibration phase, 3 each of unbiased production MD simulations were carried out using GPUS and the ACEMD software with an established protocol for a further 400 ns .</span></p><h2 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Neurological Mechanisms Of Stimulants</span></h2><p data-dcnode-id="608"><span data-dcnode-id="611" instrument_node="">Stimulants exert their effects through a number of different mechanisms. Some stimulants facilitate the activity of certain neurotransmitters, specifically norepinephrine and/or dopamine. Others block the action of certain receptors in a process known as receptor antagonism. Still others cause action in other receptors in a process known as receptor</span><em data-dcnode-id="609"><span data-dcnode-id="610" instrument_node=""> agonism.</span></em></p><p data-dcnode-id="602"><strong data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">Read Also: </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.knowyourbrain.net/how-to-shrink-a-brain-tumor-naturally/"><span data-dcnode-id="606" instrument_node="">Curcumin Brain Tumor</span></a><span data-dcnode-id="604" instrument_node=""> </span></strong></p><h2 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Speeding Up The Brain With Stimulants: Caffeine Nicotine Cocaine And Amphetamines</span></h2><p data-dcnode-id="592"><span data-dcnode-id="599" instrument_node="">A </span><strong data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">stimulant </span></strong><span data-dcnode-id="596" instrument_node="">is </span><em data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">a psychoactive drug that operates by blocking the reuptake of dopamine, norepinephrine, and serotonin in the synapses of the CNS</span></em><span data-dcnode-id="593" instrument_node="">. Because more of these neurotransmitters remain active in the brain, the result is an increase in the activity of the sympathetic division of the autonomic nervous system . Effects of stimulants include increased heart and breathing rates, pupil dilation, and increases in blood sugar accompanied by decreases in appetite. For these reasons, stimulants are frequently used to help people stay awake and to control weight.</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Used in moderation, some stimulants may increase alertness, but used in an irresponsible fashion they can quickly create dependency. A major problem is the crash that results when the drug loses its effectiveness and the activity of the neurotransmitters returns to normal. The withdrawal from stimulants can create profound depression and lead to an intense desire to repeat the high.</span></p><div class="code-block code-block-11" data-dcnode-id="582" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="589" instrument_node=""> </span><span data-dcnode-id="587" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-3139171956867407" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="2049400185" data-dcnode-id="586" style="display:block; text-align:center;"></ins><span data-dcnode-id="585" instrument_node=""> </span></div><p data-dcnode-id="575"><strong data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Nicotine </span></strong><span data-dcnode-id="579" instrument_node=""> is </span><em data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">a psychoactive drug found in tobacco and other members of the nightshade family of plants, where it acts as a natural pesticide</span></em><span data-dcnode-id="576" instrument_node="">. Nicotine is the main cause for the dependence-forming properties of tobacco use, and tobacco use is a major health threat. Nicotine creates both psychological and physical addiction, and it is one of the hardest addictions to break. Nicotine content in cigarettes has slowly increased over the years, making quitting smoking more and more difficult. Nicotine is also found in smokeless tobacco.</span></p><p data-dcnode-id="572"><span data-dcnode-id="574" instrument_node=""> </span></p><span data-dcnode-id="571" instrument_node=""> </span></div></div><div class="td_block_wrap tdb_single_post_share tdi_90 td-pb-border-top td_block_template_1" data-dcnode-id="531" data-td-block-uid="tdi_90"><span data-dcnode-id="567" instrument_node=""> </span><div class="td-post-sharing tdb-block td-ps-bg td-ps-notext td-post-sharing-style1" data-dcnode-id="532" id="tdi_90"><div class="td-post-sharing-visible" data-dcnode-id="539"><div class="td-social-sharing-button td-social-sharing-button-js td-social-handler td-social-share-text" data-dcnode-id="560" style="transition: opacity 0.2s ease 0s; opacity: 1;"><div class="td-social-but-icon" data-dcnode-id="563"><i class="td-icon-share" data-dcnode-id="564"></i></div><div class="td-social-but-text" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Share</span></div></div><a class="td-social-sharing-button td-social-sharing-button-js td-social-network td-social-facebook" data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer.php%3Fu%3Dhttps%253A%252F%252Fwww.knowyourbrain.net%252Fhow-do-psychoactive-drugs-affect-the-brain%252F" style="transition: opacity 0.2s ease 0s; opacity: 1;" title="Facebook"><div class="td-social-but-icon" data-dcnode-id="558"><i class="td-icon-facebook" data-dcnode-id="559"></i></div><div class="td-social-but-text" data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Facebook</span></div></a><a class="td-social-sharing-button td-social-sharing-button-js td-social-network td-social-twitter" data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DHow%2BDo%2BPsychoactive%2BDrugs%2BAffect%2BThe%2BBrain%26url%3Dhttps%253A%252F%252Fwww.knowyour
