</span><dd data-dcnode-id="2080" id="abstract"><span data-dcnode-id="2081" instrument_node="">A scientific indicator of how easily distracted you are has been designed by a psychologist. It could be used as another assessment tool during the recruitment process and would have particular benefits in fields where employee distraction could lead to fatal errors. People who are more easily distracted are at greater risk of being involved in accidents.
</span></dd><span data-dcnode-id="2079" instrument_node="">

</span><div class="hyphenate less-top-margin" data-dcnode-id="1900" id="story_text"><span data-dcnode-id="2043" instrument_node="">
</span><p class="lead" data-dcnode-id="2041" id="first"><span data-dcnode-id="2042" instrument_node="">A scientific indicator of how easily distracted you are has been designed by a UCL (University College London) psychologist. It could be used as another assessment tool during the recruitment process and would have particular benefits in fields where employee distraction could lead to fatal errors. </span></p><span data-dcnode-id="2040" instrument_node="">
</span><div class="mobile-top-rectangle hidden-md hidden-lg" data-dcnode-id="2022"><span data-dcnode-id="2039" instrument_node="">
</span><div class="textrule" data-dcnode-id="2034"><span data-dcnode-id="2038" instrument_node="">
</span><span data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">advertisement</span></span><span data-dcnode-id="2035" instrument_node="">
</span></div><span data-dcnode-id="2033" instrument_node="">
</span><span data-dcnode-id="2031" instrument_node="">
</span><div data-dcnode-id="2026" id="adslot-mobile-top-rectangle"><span data-dcnode-id="2030" instrument_node="">
</span><span data-dcnode-id="2027" instrument_node="">
</span></div><span data-dcnode-id="2025" instrument_node="">
</span><hr class="hrrule" data-dcnode-id="2024"><span data-dcnode-id="2023" instrument_node="">
</span></div><span data-dcnode-id="2021" instrument_node="">
</span><div data-dcnode-id="1989" id="text"><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">People who are more easily distracted are at greater risk of being involved in accidents. Professor Nilli Lavie, UCL Psychology, who led the research published in the Association for Psychological Science journal, said: “When you are easily distracted, you are more liable to do things like put your keys in the fridge or call out ‘come in’ when answering the phone. These are the more amusing consequences of distraction but distraction can have more serious implications. For example, it is known to be associated with a higher risk of being involved in various types of accidents such as car and workplace accidents.”</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Some jobs – such as bus driver or pilot – put the employee in situations where the potential for distraction is very high and yet focused attention is crucial. This computer-based test, which measures subjects’ accuracy and reaction times when they are exposed to distractions, would effectively filter out any candidates who were easily distracted.</span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">Professor Lavie said: “This test could act as another form of psychometric testing for employers who want to know how focused the staff they are hiring are likely to be. Some jobs can be undertaken very well even if you are prone to being distracted. For example, you can be a great scientist or writer and still be absent-minded! But there are many areas where productivity critically depends on the ability of staff to stay focused, yet current psychometric tests do not measure it.”</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">This test correlates with responses given to the ‘Cognitive Failures Questionnaire’, which predicts a person’s level of distractibility provided that the subject answers honestly. The questions include: “How often do you find you accidentally throw away the thing you want and keep what you meant to throw away – as in the example of throwing away the matchbox and putting the used match in your pocket?”</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Professor Lavie said: “Relying on questionnaires to assess how easily distracted potential employees might be obviously has its downsides – people are not always honest about their negative attributes during interviews. </span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">“People come away from our test thinking they’ve done really well and haven’t been distracted at all when in fact their response times increase and they tend to make more mistakes; showing that they have been distracted. So the test is objective and there’s no way of doctoring the results.” </span></p><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">61 subjects took a short computerised test during which letters, acting as distractions, flashed up on screen. The test involves finding the odd-one-out in a circular display of letters. For example, subjects had to find the letter X amongst similar letters such as H, M, K and Z; or, in the easier task, a letter X or N among Os. At the same time, letters were flashed on-screen outside the circle of letters to distract the participant from their task. Subjects were asked to ignore the distracter letters and focus on the odd-one-out in the circle of letters. They had to rapidly press the relevant key on a keyboard when they located the odd-one-out. This measures reaction times and the effects of distracters on performance. </span></p><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">The second finding in the paper showed that all people – whether they are generally easily distracted or not – were far less distracted when they were performing the more difficult task. Because the brain was loaded with information that was relevant to the task, there was no extra brain capacity for processing distracting information and so even people who are more easily distracted are able to focus all their attention on the task in hand. </span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Professor Lavie said: “This second finding shows that, even if you are more easily distracted than others, you can decrease your susceptibility to being distracted. This could have important implications for increasing attention and performance. I am currently working on specific applications for education that aim to improve attention in school pupils and reduce the likelihood of them being distracted both in class and when doing homework. We could make commercial applications of the distraction test available on demand.”</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Reference: ‘Perceptual Load and Differences in Distractibility’ is published in the journal Psychological Science on May 31st 2007. </span></p><span data-dcnode-id="1990" instrument_node="">
