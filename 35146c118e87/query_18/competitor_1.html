</span><header aria-label="Content" class="entry-header" data-dcnode-id="2086"><span data-dcnode-id="2106" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2104" itemprop="headline"><span data-dcnode-id="2105" instrument_node="">5 Weird Signs of Fibromyalgia</span></h1><span data-dcnode-id="2103" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2088"><span data-dcnode-id="2102" instrument_node="">
</span><span class="posted-on" data-dcnode-id="2097"><time class="updated" data-dcnode-id="2100" datetime="2021-11-13T15:14:44+00:00" itemprop="dateModified"><span data-dcnode-id="2101" instrument_node="">November 13, 2021</span></time><time class="entry-date published" data-dcnode-id="2098" datetime="2021-11-12T07:24:48+00:00" itemprop="datePublished"><span data-dcnode-id="2099" instrument_node="">November 12, 2021</span></time></span><span data-dcnode-id="2096" instrument_node=""> </span><span class="byline" data-dcnode-id="2090"><span data-dcnode-id="2095" instrument_node="">by </span><span class="author vcard" data-dcnode-id="2091" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chronicbodypain.net/author/chronic-pain/" itemprop="url" rel="author" title="View all posts by chronic pain"><span class="author-name" data-dcnode-id="2093" itemprop="name"><span data-dcnode-id="2094" instrument_node="">chronic pain</span></span></a></span></span><span data-dcnode-id="2089" instrument_node=""> </span></div><span data-dcnode-id="2087" instrument_node="">
</span></header><span data-dcnode-id="2085" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1886" itemprop="text"><span data-dcnode-id="2084" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Fibromyalgia is a condition that affects nearly 5 million women and men—but mostly women—in the United States alone.</span></p><div data-dcnode-id="2080" data-inserter-version="2" id="ezoic-pub-ad-placeholder-143"></div><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Anyone who has fibromyalgia can tell of the constant chronic pain and relentless fatigue that are two of the syndrome’s signature symptoms.</span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">But the condition reaches beyond bodily pain and a kind of exhaustion that is not just physical, but mental and emotional as well.</span></p><div data-dcnode-id="2071" data-inserter-version="2" id="ezoic-pub-ad-placeholder-151"></div><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2068" instrument_node="">There are other indications of fibromyalgia that only the sufferer has any sense of, and it presents a hefty challenge to others around them—beloved family and friends—who want to understand what they are going through.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">There are even some sufferers of fibromyalgia who don’t yet know the real name of their bane.</span></p><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">They have the shared experiences and sufferings of other fibromyalgia patients but have yet to be diagnosed. All they can be sure of is that they hurt.</span></p><div data-dcnode-id="2059" data-inserter-version="2" id="ezoic-pub-ad-placeholder-152"></div><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2053"><a data-dcnode-id="2055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chronicbodypain.net/27-invisible-symptoms-of-fibromyalgia-you-just-cannot-miss/"><span data-dcnode-id="2056" instrument_node="">These are some lesser-known indicators of fibromyalgia</span></a><span data-dcnode-id="2054" instrument_node="">. If you share in any combination of these symptoms, you might consider seeking professional diagnosis and treatment for this condition.</span></p><span data-dcnode-id="2052" instrument_node="">
</span><h3 data-dcnode-id="2049"><span data-dcnode-id="2050" style="color: #3366ff;"><span data-dcnode-id="2051" instrument_node="">Allodynia</span></span></h3><span data-dcnode-id="2048" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Unless you suffer from allodynia, it probably would never occur to you that patting a friend on the back or rubbing the shoulder of a loved one might actually cause them excruciating pain.</span></p><span data-dcnode-id="2045" instrument_node="">
</span><p data-dcnode-id="2041"><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fightfibromyalgia.net/allodynia-a-painful-to-touch-symptom-of-fibromyalgia/" rel="noopener" target="_blank"><span data-dcnode-id="2044" instrument_node="">Allodynia is the condition of having an increased sensitivity to touch</span></a><span data-dcnode-id="2042" instrument_node="">, making normal contact causes great degrees of discomfort and pain.</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">There are a number of different reasons that people with fibromyalgia might suffer from heightened skin sensitivity.</span></p><div data-dcnode-id="2036" data-inserter-version="2" id="ezoic-pub-ad-placeholder-153"></div><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">Chronic pain, a prevailing </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thefibrowarriors.com/the-29-1-invisible-symptoms-of-fibromyalgia/" rel="noopener" target="_blank"><span data-dcnode-id="2032" instrument_node="">symptom of fibromyalgia</span></a><span data-dcnode-id="2030" instrument_node="">, causes more than a third of people diagnosed with fibromyalgia to incur damage to nerve endings in their skin’s outer layers.</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">It is the same chronic pain that causes itself to be amplified in the brain because of maladapted neurotransmitters dedicated to the relay of pain signals.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Sometimes pharmaceuticals called NMDA receptor antagonists are prescribed to help. And only sometimes, they do.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">The condition of allodynia also has connections to lacking restorative sleep. This is why exercise, physical therapy and techniques in stress reduction and relief are such common approaches in the treatment of fibromyalgia.</span></p><div data-dcnode-id="2018" data-inserter-version="2" id="ezoic-pub-ad-placeholder-154"></div><span data-dcnode-id="2016" instrument_node="">
</span><h3 data-dcnode-id="2013"><span data-dcnode-id="2014" style="color: #3366ff;"><span data-dcnode-id="2015" instrument_node="">Heightened Sensitivity to Smell</span></span></h3><span data-dcnode-id="2012" instrument_node="">
</span><p data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">This symptom of fibromyalgia is not far removed from the condition of allodynia because it is wrought and processed through the brain in a similar fashion.</span></p><span data-dcnode-id="2009" instrument_node="">
</span><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">At any given moment, there is what can be considered an overwhelming amount of sensory input received—sounds, smells and sights—that all require energy in order to separate, categorize and process in the brain.</span></p><span data-dcnode-id="2006" instrument_node="">
</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">When the brain encounters difficulty trying to sort through all the information at once, the input is reflected in heightened sensitivity responses.</span></p><span data-dcnode-id="2003" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Fibromyalgia treatments tend to be whole-body oriented in nature. Sometimes medication that is usually prescribed for the prevention of seizures can be used to counter these elevated sensitivities.</span></p><div data-dcnode-id="1999" data-inserter-version="2" id="ezoic-pub-ad-placeholder-155"></div><span data-dcnode-id="1997" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" style="color: #3366ff;"><b data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">Brain Fog</span></b></span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1985"><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chronicbodypain.net/what-are-the-causes-of-fibrofog/"><span data-dcnode-id="1991" instrument_node="">This serious symptom of fibromyalgia</span></a><span data-dcnode-id="1989" instrument_node="">, sometimes also referred to as </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">fibro fog</span></i><span data-dcnode-id="1986" instrument_node="">, is a very distressing effect of the syndrome upon its sufferers.</span></p><span data-dcnode-id="1984" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">It is highlighted by the inability to find or substitute words in common usage. It is accented by short-term memory loss and even sporadic episodes of utter disorientation that can last between 30 and 60 seconds with each incident.</span></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">It is not uncommon to misspeak the names of loved ones and then delay some in finding the correct name upon realizing the mistake.</span></p><div data-dcnode-id="1977" data-inserter-version="2" id="ezoic-pub-ad-placeholder-156"></div><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Brain fog tends to find its cause in a combination of factors that includes poor sleep and sleeping habits, deficient thyroid levels, and undiagnosed infections.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">An insufficient flow of blood to the brain’s temporal lobes that regulate speech is also usually a likely contributor to fibro fog.</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1968" instrument_node="">The standard thought among rheumatologists is that </span><strong data-dcnode-id="1965"><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2siXZSB" rel="noopener" target="_blank"><span data-dcnode-id="1967" instrument_node="">getting treatment</span></a></strong><span data-dcnode-id="1964" instrument_node=""> and learning better sleep habits from a qualified sleep specialist may be beneficial in thwarting this classic component of fibromyalgia.</span></p><span data-dcnode-id="1962" instrument_node="">
</span><h3 data-dcnode-id="1959"><span data-dcnode-id="1960" style="color: #3366ff;"><span data-dcnode-id="1961" instrument_node="">Paresthesia</span></span></h3><span data-dcnode-id="1958" instrument_node="">
</span><p data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">A pricking, burning, or tickling sensation that comes from no visible source is called paresthesia. It is a common symptom of fibromyalgia, and may include numbness that seems to occur for no known reason.</span></p><div data-dcnode-id="1954" data-inserter-version="2" id="ezoic-pub-ad-placeholder-157"></div><span data-dcnode-id="1952" instrument_node="">
</span><p data-dcnode-id="1948"><a data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chronicbodypain.net/paresthesia-one-of-fibromyalgias-nastiest-symptoms/"><span data-dcnode-id="1951" instrument_node="">Paresthesia is sometimes believed to be an anxious </span></a><span data-dcnode-id="1949" instrument_node="">or nervous response to the other symptoms of fibromyalgia.</span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">It is also sometimes characterized by deep, rapid breathing that can lead to tingling in the extremities—acroparesthesia—due to lacking carbon dioxide.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">As parasthesia is considered a type of physical response to mental or emotional anxiety, it is </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//chronicbodypain.net/what-treats-paresthesia-the-various-treatments-for-paresthesia/"><span data-dcnode-id="1942" instrument_node="">best treated by techniques for stress reduction</span></a><span data-dcnode-id="1940" instrument_node=""> and relief and an adequate amount of physical exercise.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><h3 data-dcnode-id="1935"><span data-dcnode-id="1936" style="color: #3366ff;"><span data-dcnode-id="1937" instrument_node="">Lipomas</span></span></h3><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Lipomas appear to emerge as lumps in various body parts. They are really benign tumors not wholly connected to fibromyalgia, but in fibromyalgia patients, turn out to be much more sufferable than most other people.</span></p><div data-dcnode-id="1930" data-inserter-version="2" id="ezoic-pub-ad-placeholder-158"></div><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">The point here is that lipomas do not indicate the fibromyalgia syndrome, but a heightened level of discomfort because of them and the parts of the body in which they develop may be indicators instead.</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">When lipomas develop, they tend to grow in the areas of the body that are most susceptible to inappropriate and excessive pain.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><h3 data-dcnode-id="1919"><span data-dcnode-id="1920" style="color: #3366ff;"><span data-dcnode-id="1921" instrument_node="">Excessive sweating</span></span></h3><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Sufferers of fibromyalgia syndrome tend to sweat profusely without cause. They might be led to believe that they have a fever because of similar indicators, though no rise in body temperature has occurred.</span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1911"><a data-dcnode-id="1913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fibromyalgiasymptoms.info/fibromyalgia-and-night-sweats/" rel="noopener" target="_blank"><span data-dcnode-id="1914" instrument_node="">The excessive degree of sweating </span></a><span data-dcnode-id="1912" instrument_node="">is caused by dysfunction on the part of the brain, called the hypothalamus, that regulates automatic involuntary bodily functions like heart rate, gastrointestinal secretion and blood pressure.</span></p><span data-dcnode-id="1910" instrument_node="">
</span><p data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">This symptom of fibromyalgia may be treated with a combination of pharmaceutical medication and specific adaptations to lifestyle aimed to help keep patients dry and cool as often as possible.</span></p><div data-dcnode-id="1906" data-inserter-version="2" id="ezoic-pub-ad-placeholder-159"></div><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">While many of these regular symptoms of fibromyalgia may be seen as irregular and unusual, nearly all of them respond positively to general approaches in treatment.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1899"><span data-dcnode-id="1900" instrument_node="">It is always wise, to be honest with your doctor about any and all symptoms that you encounter as well as their degree of seriousness.</span></p><span data-dcnode-id="1898" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1897" instrument_node="">You must work together to develop a treatment plan and re-target those areas that don’t immediately respond to your first treatment approach.</span></p><span data-dcnode-id="1895" instrument_node="">
</span><h3 data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Comments</span></h3><p data-dcnode-id="1889"><fb:comments-count data-dcnode-id="1891" href="https://www.chronicbodypain.net/5-fibromyalgia-signs/"></fb:comments-count><span data-dcnode-id="1890" instrument_node=""> comments</span></p><div class="fb-comments" data-colorscheme="light" data-dcnode-id="1888" data-href="https://www.chronicbodypain.net/5-fibromyalgia-signs/" data-numposts="5" data-width="450"></div><span data-dcnode-id="1887" instrument_node=""> </span></div><span data-dcnode-id="1885" instrument_node="">

</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Please keep the info coming. Some to most, of what I am reading is new to me.  I’ve suffered with IBS,  Fibro fog, and the sweeting and none of my Drs have ever told me that it can be part of Fibro.  I was diagnosed about about 40 yrs ago by a Dr at the Oregon Health Sciences University OHSU, in Portland Oregon. Prior to that all Drs said it was “all in my head” and that “I just wanted to feel this way.”  I take 50 mg of Amatriptyline and Lyrica for burning feet and leg pain.  I have a myriad of other health issues.</span></p><span data-dcnode-id="1692" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1619" itemprop="text"><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">I have had the IBS and migraines since age 9. I was in a life altering accident in 2001 and suffered many injuries, the worst for me is a TBI. The Traumatic Brain Injury causes many of the same symptoms as the Fibromyalgia. Perhaps this is ‘ lucky ‘ for me in that I was diagnosed and there also were ‘legitimate reasons’ that one could see that caused some of my pain. Part of the TBI was short-term memory loss and ‘swiss cheese’ brain. I have lost chunks of time during my life, most significantly the entire year of 1966. I never used drugs as a kid and do not drink a lot so I know that this in not due to being a ‘child of the 60’s’ thing. I take 50 mg of Amitriptyline each day along with 1800 mg. of Gabapentin/Neurontin for the pain. The drugs certainly help for some of the symptoms, most notably the pain. The Amitriptyline was prescribed to me by the neurologist whom I saw for the brain injury as my vestibular/balance systems was ‘knocked’ out. This helps me to be able to stand and walk etc. altho I still have problems with it. The days when it hurts to touch my skin, I am able to just stay home and do nothing. As for the hugs etc., my family members are very aware of when I do not feel well and touching is off limits. I have always been a very touchy, feely person and so this is different for me. The fog is the worst when you are trying to talk and just cannot get the words out, or cannot recall a name and/or a person or a word that you have used all of your life etc. I let my friends and family know very early on that these things happen and when they do happen these people are very supportive. People around you do need to know that you are not purposely ‘snubbing’ them and that there is a problem. You need not tell all of your life story, I am sorry but that is funny because how many of us would even be ABLE to do that?? Letting people know that you have a problem is not asking for, okay THAT word will not come to me. This should have no stigma attached to it and we should not feel that it does. I don’t really talk about my fibro aches and pains to people because they would get tired of hearing it. I get tired of hearing myself complain in the morning when I cannot get out of bed. It is what it is, it is not going to leave you and you are the only one who is able to do something about it. If your doctor will not listen than change doctors, fire yours and go to a neurologist who will actually check you for signs and symptoms. Doctors are supposed to ‘work for’ you. If yours is not, than get rid of him or her. You deserve better.</span></p><span data-dcnode-id="1620" instrument_node="">
</span></div><span data-dcnode-id="1618" instrument_node="">

</span><p data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">I have had Fibromyalgia for 14 years now which stemmed from a car accident.  I finally found the combination that helps with all the different aspects of my pain.  Ambien CR for sleep, Mirapex for RLS, Cymbalta for depression and mood, and Oxycontin twice a day for pain.  These things are very helpful in controlling my being able to function and be semi-normal.</span></p><span data-dcnode-id="1584" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1547" itemprop="text"><span data-dcnode-id="1551" instrument_node="">
</span><p data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Excellent article. My wife found this and passed it to me. It is very accurate and informative. It clearly explains the various symptoms that accompany Fibro that are so hard to explain and convince others they really exist. I was diagnosed almost 10 years ago and the only reason was because I saw my wife’s female doctor. Even now it is not universally accepted that men can have FMS. The age old attitude of “Suck it up and deal with it buddy” as has been applied to men since forever still exists. Fibro may be much more common in women but there are plenty of men that have it too. It is just as bad and may even be worse in males according to some studies. I have been dealing with it for decades and it is one of those things that may be eased to some degree by medical treatment but does not go away. I am 65 and have learned to simply deal with it most of the time. To a great degree that has been with the assistance of my loving wife of 43 years. Without her by my side I might well not be here.</span></p><span data-dcnode-id="1548" instrument_node="">

</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">I was diagnosed with Fibromyalgia in 2001, after going thru a neck surgery.  In order to function and to continue to work, I had to take pain meds.  But the stress of working really took a toll on me.  The fibromyalgia fog and disorganization and forgetfulness was very hard to handle.  I have since retired and can deal with life much easily now.  Pain is still an issue but it is under control by taking Norco and pain patches.  I suffer with IBS. which is still an issue. After reading about The Brain Fog, I thought Wow, this is me!!!  That is the hardest thing to deal with, forgetting simple words and not being able to find the right word.</span></p><span data-dcnode-id="1512" instrument_node="">

</span><p data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">I thank you all for sharing all of your symptoms. I have Lipomas all over my left are,but on inside. Sometimes they hurt so much because the are sitting right on the nerves. I had a hysterectomy in 1996. about a yr ago I started getting menstrual cramps. It was crazy. How could that be? Now I know. Thanks to Bev for posting the weird things of Fibromyalgia. I feel normal now. I pray for all the sufferers that they somehow find some sort of relief.!!!!! 🙂 &lt;3</span></p><span data-dcnode-id="1222" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1185" itemprop="text"><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">If I may, I would run so far from a person who could not support me, and I mean emotional support. We suffer so much, and if your SO cannot deal, then they are not worthy of your affection. I lost all desire for sex, between fibro and menopause. But my husband of 25 years is still here, because we didn’t get married to have sex. I guess it plays a bigger role for some people, but at the end of the day marriage is for love and companionship. The couples we see who have been together for 50, 60+ years are not burning up the sheets. They have found a deeper level of love. And sex is not a huge part of it. If someone loves you, they take the good with the bad. Better you find out now, then after you are married. I’ve been there too. Gentle hugs.</span></p><span data-dcnode-id="1186" instrument_node="">

</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Hi Amy,</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">I was diagnosed in 2010. I’ve tried all the fibromyalgia meds out there. None of which gave me any long-term relief. I am currently receiving trigger point injections. I’ve had 2 treatments and so far and have noticed a little bit of relief. After my last injection my Dr told me I will need the 2nd tier of treatment. It’s called peripheral nerve blocks. I still have to research this. At this point tho I’m willing to try anything. I couldn’t.stand all the side effects of the meds. I wish you luck on your journey. </span></p><span data-dcnode-id="965" instrument_node="">

</span><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Kandi, I too suffer from Fibro. I get pins and needles kind of feelings and often muscle spasms that hurt so bad I want to cry. When I was switched to a different muscle relaxer, Tizanidine, that I take when the spasms start and at night I finally started getting some sleep!! I went from 2-3 hrs to up to 6! I don’t like to sleep longer than 6 because my pain meds are then out of my system and I wake up in more pain than usual. But it’s nice to finally get sleep at night when I’m supposed to sleep.</span></p><span data-dcnode-id="890" instrument_node="">

</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">There is no way to tell if anyone will ever be completely pain free. The best thing is to find what works for you. There will be days that are better than others! I personally have a tendency to overdo it on the better days. Especially if it’s a really good day. Sadly, I end up paying for it by spending 1-3 days in bed in pain trying to recover for that good day. But I would rather do that and enjoy the good days when I can!</span></p><span data-dcnode-id="854" instrument_node="">

</span><div class="comment-content" data-dcnode-id="817" itemprop="text"><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">I was diagnosed in 97 and was told then that most doctors did not accept it.  So true . As for pain free. I don’t think there is any one who could tell you that you will be pain free.  I look for the days I can function despite the pain.  I use the better days as a goal.  Just try not to overdo on those days.  Even the really bad days I do some things.  I also have spinal stenosis which causes muscle spasms in my legs so if I have to sit on stool to do dishes I do it.  The big thing is going to be to find a kind of middle ground.  I had to learn that my house would not be as clean as I would like and had to give up somethings.  And the biggest change I found helped was to be able to say no and I need some help.</span></p><span data-dcnode-id="818" instrument_node="">

</span><div class="comment-content" data-dcnode-id="779" itemprop="text"><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="784" instrument_node="">It’s pretty ludicrous to say that FMS patients will become reliant on cannabinol. First of all, cannabinol has NO addictive qualities. Secondly, FMS patients have SO VERY FEW options for relief from chronic pain — is it really any wonder people self medicare? Thirdly, the statement that marijuana is natural and has no standardization is folly. There could be excellent quality over the huge number of strains that COULD be used to treat any number of diseases/conditions/illnesses if the FDA and the government would get their act together and acknowledge there’s a reason why human beings have Cannabinoid receptors!  And lastly, FMS patients are no more likely to become “reliant” on cannabinol than we have been to the crap the pharmaceutical companies have been pushing for years — drugs with significant side effects for which we have no receptors! For example Lyrica. Cymbalta, pregabalin, ect… I don’t know about others, but these never did a thing for me as far as pain, and another, EFFEXOR, has one of the WORST withdrawal profiles of ANY drug on the market!!! It’s a nightmare – literally!</span><br data-dcnode-id="783"><span data-dcnode-id="782" instrument_node="">
So don’t get all holier than thou about any evils regarding “medical mj”. It’s a veritable miracle for so many people, and could be for SO  many more</span></p><span data-dcnode-id="780" instrument_node="">

</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Fibromyalgia is a horrible condition. My mother suffers from it so therefore I have learnt all about the condition and the nasty symptoms she suffers from. It had lead me to spend countless hours of research &amp; discussion on how to treat it and relieve symptoms. Below is a few tips I wanted to share that have dramatically calmed her symptoms:</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">1. Vitamin D Supplements! Fibromyalgia patients often have low levels of this vitamin so its important to keep topped up.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">2. Take up one of the following: tai chi, yoga or meditation. Not only will it ease symptoms but it will improve mental state to help coping skills.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">3. Take 5-HTP. It helps raise levels of serotonin, balancing abnormal brain function.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Seeing my mum now and seeing how she was 5 years ago is a sight to behold and she is proof that sufferers should fight the condition as best as they can. I am just hoping that my comment will be of help to others!</span></p><span data-dcnode-id="732" instrument_node="">

</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">This list of symptoms has been correlated by the Arthritis Foundation S.A.</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">1. PAIN- in the muscle: often described as aching, burning, throbbing, gnawing, shooting, tingling. Almost always exacerbated by exercise and may or may not be present at rest. Can be migratory and differing from day to day.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">2. FATIGUE- From feeling tired to exhausted and requiring rest periods during the day.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">3. SLEEP DISTURBANCE- not being able to fall asleep and or able to stay asleep. Unrefreshing sleep patterns ” feels like I haven’t slept.”</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">4. PARESTHESIA- numbness or tingling. ( non dermatomal)</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">5. DEPRESSION- most often reactive as with chronic pain condition.</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">6. ANXIETY- may include panic attacks.</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">7. PERSONALITY CHANGES- usually a worsening of a previous tendency.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">8. MOOD SWINGS</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">9. SUBJECTIVE SWELLING OF EXTREMITIES- i.e. feels swollen but no-one can find anything.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">10. HEADACHES- tension and or migraine.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="516" instrument_node="">11. COGNITIVE FUNCTION PROBLEMS: calculation difficulties, memory disturbances, spatial disorientation, difficulty with concentration, short</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
term memory loss.</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">12. FREQUENT UNUSUAL NIGHTMARES- or being unable to dream.</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">13. DYSTONIA- stiff muscles due to involuntary contracture. Difficulty in moving tongue to speak.</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">14. FREQUENTLY SAYING WRONG WORDS</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">15. BURNING SENSATIONS</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">16. LIGHT HEADEDNESS- “Fibro Fog”, spaced out, cloudy.</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">17. MORNING STIFFNESS</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">18. EASY BRUISING</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">19. MILD BUTTERFLY RASH- (LUPUS TYPE) May be photo sensitive.</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">20. NEUROGENIC INFLAMMATION- rashes, may be severe itching. NI causes the symptoms and signs of Dermatographia.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">21. DISEQUILIBRIUM- Vertigo</span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">22. MUSCLE WEAKNESS- variable with no “objective” abnormality to formal testing.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">23. SCIATICA- like pain</span></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">24. PHOTOPHOBIA- Intolerance of bright lights.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">25. ALTERATION OF TASTE, SMELL and HEARING.</span></p><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">26. LOW FREQUENCY, SENSORINEURAL HEARING LOSS.</span></p><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">27. DECRESED PAINFUL SOUND THRESHOLD.</span></p><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">28. TINNITUS- ringing in the ears.</span></p><span data-dcnode-id="461" instrument_node="">
</span><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">29. OCCASIONAL EXAGGERATED NYSTAGMUS- involuntary rapid movementof the eye ball.</span></p><span data-dcnode-id="458" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">30. CHANGES IN VISUAL ACUITY- impaired function of the smooth muscle used for focus as well as skeletal muscles for tracking.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">31. INTOLERANCE OF ALCOHOL</span></p><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">32. ENHANCEMENT OF MEDICATION SIDE EFFECTS</span></p><span data-dcnode-id="449" instrument_node="">
</span><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">33. INTOLERANCE OF PREVIOUSLY TOLERATED MEDICATIONS</span></p><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">34. WEIGHT CHANGES- usually gained due to the lack of exercise through pain and or tricyclic antidepressants</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">35. RESTLESS LEGS</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">36. HEIGHTENED AWARENESS- of symptoms of HYPOGLYCEMIA 9 when blood sugar falls)</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">37. POSSIBLE CARBOHYDRATE INTOLERANCE</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">38. SYMPTOMS OF IRRITABLE BOWEL SYNDROME (I.B.S.)</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">39. HEARTBURN- secondary to I.B.S.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">40. SUB-NORMAL TEMPERATURE</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">41. NIGHT SWEATS.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">42. SENSITIVE TO TEMPERATURE EXTREMES</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">43. HEART PALPITATIONS</span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">44. BREATHING DIFFICULTIES</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">45. HEART MURMUR-Mitral Valve Prolapse appears to be more symptomatic in FM than normal.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">46. IMPOTENCE- reactive and occasionally.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">47. SEVERE PREMENSTRUAL SYNDROME</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">48. FREQUENT VAGINAL YEAST INFECTIONS.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">49. MUSCLE SPASM- twitching.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">50. NON-CARDIAC CHEST PAIN- which may simulate cardiac disorder.</span></p><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">51. PELVIC PAIN.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">52. ABDOMINAL WALL PAIN.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">53. DRY EYES AND MOUTH.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">54. TEMPOROMANDIBULAR JOINT DISORDER- usually due to abnormal muscle tone.</span></p><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">55. RAYNAUD’S- like symptoms.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">56. CARPAL TUNNEL SYNDROME-possible related condition.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">57. HAIR LOSS-secondary to psychological stress from FM.</span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">58. VULVODYNIA- Vulvar discomfort or pain, burning, stinging and irritation.</span></p><span data-dcnode-id="371" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">59. PLANTAR ARCH-or heel pain. Exacerbated in FM.</span></p><span data-dcnode-id="368" instrument_node="">
</span></div><span data-dcnode-id="366" instrument_node="">

</span><div class="comment-content" data-dcnode-id="325" itemprop="text"><span data-dcnode-id="335" instrument_node="">
</span><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Fun list that gin2772 posted!  I have had ME/FMS, Hashimotos and some other random things about  7 years.  I only have about 3/4 of the things on that long list, thank goodness.  My husband of 12 years is mainly supportive but has yet to read anything about the diseases so not as informed as he should be.  He told me he is learning by what I tell him, then takes my comments as complaining.  Sometimes when he is having his nightly drinks, he gets verbally mean and told me the other night how much he resented taking care of me and listening to me whine about feeling bad, blah, blah,blah.  Needless to say, it crushed me. Even though I knew the alcohol was helping him be blunt, it was obvious what was in his heart.  I’m 69 and he’s 63 and are still working our small business together so we’re kind of stuck.  He really doesn’t do that much for me but bring me things from the kitchen when he’s home in the evenings and has taken on a couple of my light chores.  The rest I do on my own, at my own pace, rather than ask him to do it for me.   I’m a type A personality and would rather do things for myself to be honest but this terrible disease will stop you in your tracks.</span></p><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">For those who have not picked a mate, my advise would be to choose wisely.  We never know what life will throw at us and as a married couple you should be able to willingly and lovingly take care of each other in good times and bad.  Know who you are giving your life to and be sure they are compassionate and caring and not self serving.  Be that giving person for your spouse also.  It is very important.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">I am sorry to hear of all those physically hurting and also those being misunderstood.  It is nice to know people here “get it” and we can be open about what’s going on with a group that can relate.  It’s a lonely disease so I’m glad to have the support wherever I can find it.  The Lord helps me get through as I take one day at a time.  Overall I still love life; I just wish it were easier and I still had friends to share things with.  Thank goodness I’m a crazy cat lady and they give really soft cuddles and make very good listeners.  🙂</span></p><span data-dcnode-id="326" instrument_node="">
</span></div><span data-dcnode-id="324" instrument_node="">

</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">In 1990 following a virus or Lyme infection I became suddenly plagued with debilitating widespread pain, pronounced fatigue, chemical sensitivities, and violent migraines necessitating injections. After 2 yrs. of these mysterious symptoms I was diagnosed with fibromyalgia by a rheumatologist on the spot.  My hips were injected with steroids with immediate relief of limping, and I was just thrilled to finally have a diagnosis.  As an RN I was blessed with rewarding profession and wonderfully supportive family who learned with me about the unknown condition.  My advice is to stay physically active, accept the fibro fog without guilt, try to stay positive, and be a well-educated consumer.</span></p><span data-dcnode-id="254" instrument_node="">

</span><p data-dcnode-id="219"><span data-dcnode-id="220" instrument_node="">I have had fibromyalgia, degenerative disc disease, spinal stenosis, osteoarthritis, osteoporosis, for 24 years. I am on nothing. All the doctor think I’m drug seeking. I have a rod at L5-S1, C5-C6 is fused with my own hip bone. I have had a total right hip replacement, both big toes are fused with metal plates and screws and my second toes have just been cut down and fused. I’m in so much pain I’ve thought of ending it all but I’m a fighter. I had some vicodan 5s for after surgery but only one refill. They got infected and I felt embarrassed to ask for more pain meds but she agreed. Now, that’s it. I’m in a small town where all doctors find me too complicated. I’m at the end of my rope, here. I’m going to try a big pain clinic hopefully and pray they help. I’m out of options.</span></p><span data-dcnode-id="218" instrument_node="">
</span></div><span data-dcnode-id="216" instrument_node="">

</span><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">I’ve had this since I was only 4 or 5 &amp; I’m now 31… I’ve been through almost every opiate &amp; anti-inflamitory med on the market here in Canada but I’ve found that none of the “inflamation” meds worked at all &amp; that the opiates work for some of my pain but not most of  it. One thing that does help most of the time is Cannabis… The problem is it works best WITH the opiates but my Dr. is trying to take me off them even though I’ve always stopped functioning without them plus she doesn’t actually want me smoking pot so I’ve been finding that it’s getting harder &amp; harder just to do basic things for myself let alone housework etc… I’m not sure what to do anymore… any advice OTHER than finding a new Dr. cause that’s not really an option… I’m starting to feel hopeless. If it weren’t for my husband’s support I’d feel completely alone.</span></p><span data-dcnode-id="181" instrument_node="">
