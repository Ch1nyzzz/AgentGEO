</span><div class="entry-content" data-dcnode-id="1409" itemprop="text"><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Love is beautiful, love is sweet, love can move mountains, and love can take you places you never knew existed! Loving someone with all your heart is the most wonderful feeling in the world and being away from them makes your heart sink! Below are 8 psychological facts about thinking of someone worth knowing!</span></p><div class="code-block code-block-2" data-dcnode-id="1673" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1682" instrument_node="">
</span><span data-dcnode-id="1680" instrument_node="">
</span><span data-dcnode-id="1678" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6519776099992558" data-ad-format="auto" data-ad-slot="9057684401" data-dcnode-id="1677" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="1676" instrument_node="">
</span></div><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">If you are in a long-distance relationship with someone you adore and can’t seem to get them off your mind, the following psychological facts will help put your mind at ease. Thinking of someone you love is a bittersweet feeling that is similar to wanting something you can have! Grab a cup of coffee and let’s get this show on the road baby!</span></p><span data-dcnode-id="1669" instrument_node="">

oads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?resize=1024%2C576&amp;amp;ssl=1 1024w, https://i0.wp.com/psycofacts.com/wp-content/uploads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?resize=300%2C169&amp;amp;ssl=1 300w, https://i0.wp.com/psycofacts.com/wp-content/uploads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?resize=768%2C432&amp;amp;ssl=1 768w, https://i0.wp.com/psycofacts.com/wp-content/uploads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?resize=107%2C60&amp;amp;ssl=1 107w, https://i0.wp.com/psycofacts.com/wp-content/uploads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?resize=840%2C473&amp;amp;ssl=1 840w, https://i0.wp.com/psycofacts.com/wp-content/uploads/2021/02/Psychological-Facts-About-Thinking-Of-Someone.jpg?w=1120&amp;amp;ssl=1 1120w" sizes="(max-width: 840px) 100vw, 840px" data-recalc-dims="1" /&gt;</span></noscript></p><div class="code-block code-block-4" data-dcnode-id="1657" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1664" instrument_node="">

</span><p data-dcnode-id="1655"></p><span data-dcnode-id="1654" instrument_node="">
</span><h2 data-dcnode-id="1652" style="text-align: center;"><span data-dcnode-id="1653" instrument_node="">8 Psychological Facts About Thinking Of Someone</span></h2><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">It is natural to think about someone you love, attracted to, or have a crush on every now and then but did you know that thinking of someone constantly and not being able to get them off your mind actually means that they could be thinking about you too? Yes, it’s true, psychology says that when you are thinking of someone a lot, it means that the person is thinking of you too! Let’s take a look at other facts below.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><h2 data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">1. Smiling Without Knowing</span></h2><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Studies show that thinking of someone you like, attracted to, or love will have you smiling without knowing that you actually are. You know how you suddenly think of something someone did that you found funny or interesting and you smile without even trying? This is what happens when you think of someone you like.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><h2 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">2. Warmness</span></h2><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Thinking of someone will make you feel warm inside especially if you like the person. If you are attracted to the person or are in love with them, your brain will release a stress hormone which causes a heating effect on your body. This effect will make you feel warm without knowing it.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><h2 data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">3. No Reason To Be Close</span></h2><span data-dcnode-id="1633" instrument_node="">
</span><p data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">One of the most common ways to tell if you are thinking of someone or vice versa is having the feeling of wanting to be close to the person or contacting the person for no reason. Feeling the urge to talk to someone suddenly is a subconscious sign that indicates thinking of the person.</span></p><span data-dcnode-id="1630" instrument_node="">
</span><h2 data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">4. The Feeling Is Mutual</span></h2><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Psychology studies show that when you can’t seem to get someone off your mind, 90% of the time, the feeling is actually mutual. So if you find yourself thinking hard of someone, the person may be thinking about you too.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><h2 data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">5. Change In Emotions</span></h2><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">When you are thinking of someone negatively or positively, there will be a sudden change in your emotions. You know how sometimes when talking to someone and they are smiling, laughing, joking or having fun and then they suddenly stop and change their facial expression? Well, it usually means that the person suddenly thought of someone. If this happens to you for no reason, the thought of someone changed your emotions.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><h2 data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">6. Dreaming Of The Person</span></h2><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Psychology says that when you continuously dream of someone it means that you may be thinking of the person during the day consciously or subconsciously. It could also mean that the person is thinking of you too. You see the mind is very powerful and it can sense it when someone is sending energy your way.</span></p><span data-dcnode-id="1612" instrument_node="">
</span><h2 data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">7. You Are In Love</span></h2><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">If you can’t stop thinking of someone no matter how hard you try, it may indicate that you have strong feelings for the person, are attracted to the person, have a crush on the person or it would mean that you are in love. This can sometimes feel bittersweet especially if the person does not share your emotions or does not know you feel so strongly about them.</span></p><span data-dcnode-id="1606" instrument_node="">
</span><h2 data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">8. Trouble Focusing</span></h2><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">Similar to </span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycofacts.com/psychological-facts-about-missing-someone/" rel="noopener" target="_blank"><span data-dcnode-id="1601" instrument_node="">missing someone</span></a><span data-dcnode-id="1599" instrument_node="">, thinking of someone will cause you to have trouble focusing on your daily tasks. Reading, writing, daily chores, work, or other activities will become harder to accomplish when you have someone on your mind. Try to find handle the situation before it gets out of hand.</span></p><span data-dcnode-id="1597" instrument_node="">
</span><h3 data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">What To Do When You Can’t Stop Thinking Of Someone</span></h3><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">It is absolutely frustrating when you can’t seem to get someone off your mind no matter how hard you try. It can get in the way of your daily activities, it is not healthy and can cause stress hormone cortisol levels to rise. Below are a few ways to help you stop thinking of someone constantly and get on with life.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><ul data-dcnode-id="1568"><span data-dcnode-id="1590" instrument_node="">
</span><li data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">First things first, do some soul searching and find out why you are constantly thinking of the person</span></li><span data-dcnode-id="1587" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1586" instrument_node="">Try to confront the person about your emotions if it is related to </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycofacts.com/psychological-facts-about-attraction/" rel="noopener" target="_blank"><span data-dcnode-id="1585" instrument_node="">attraction</span></a><span data-dcnode-id="1583" instrument_node="">, crush, anger, </span><a data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psycofacts.com/psychological-facts-about-love/" rel="noopener" target="_blank"><span data-dcnode-id="1582" instrument_node="">love</span></a><span data-dcnode-id="1580" instrument_node="">, or hate</span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Find a new hobby or activity that you can engage yourself in</span></li><span data-dcnode-id="1575" instrument_node="">
</span><li data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Go out with friends or spend some time with family, just try to be around others as much as possible</span></li><span data-dcnode-id="1572" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Join a charity organization, helping others gives life a new meaning and changes your perspective</span></li><span data-dcnode-id="1569" instrument_node="">
</span></ul><span data-dcnode-id="1567" instrument_node="">
</span><h3 data-dcnode-id="1565"><span data-dcnode-id="1566" instrument_node="">Conclusion</span></h3><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1563" instrument_node="">Now you know about the psychological facts about thinking of someone you love! Don’t be afraid to leave your comments below cause I will be happy to send you a reply ASAP! You can also find me on </span><a data-dcnode-id="1561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/psycofacts2" rel="noopener" target="_blank"><span data-dcnode-id="1562" instrument_node="">Facebook</span></a><span data-dcnode-id="1560" instrument_node=""> and </span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pinterest.com/psycofacts/" rel="noopener" target="_blank"><span data-dcnode-id="1559" instrument_node="">Pinterest</span></a><span data-dcnode-id="1557" instrument_node=""> to get updates when I post new articles about awesome psychological facts.</span></p><span data-dcnode-id="1555" instrument_node="">

</span><div class="comment-content" data-dcnode-id="942" itemprop="commentText"><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">My dear Loveth, I understand your frustration, it is hard to be attracted to someone and not know if they feel the same way about you. That being said, he will never know how you feel unless you make him know. There are subtle ways to show someone that you like them such as light flirting, smiling at them, making friendly gestures like getting them a cup of coffee, etc.</span></p><span data-dcnode-id="949" instrument_node="">
</span><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">You can also try spicing up a friendly conversation to try to get to know more about him, he could already be in a relationship with someone or not ready for a relationship at all. Either way, doing your initial research is vital as not to waste your time.</span></p><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Start slowly by trying to be his friend and see where it takes you both. They say, you never try, you’ll never know!</span></p><span data-dcnode-id="943" instrument_node="">
