-id="4428" instrument_node="">2</span></a><span data-dcnode-id="4426" instrument_node="">.</span></p><p data-dcnode-id="4420"><span data-dcnode-id="4424" instrument_node="">To test for differences in the measures of dynamics, amount of switching and range of HMM states, we also employed paired </span><i data-dcnode-id="4422"><span data-dcnode-id="4423" instrument_node="">t</span></i><span data-dcnode-id="4421" instrument_node=""> tests and the permutation scheme explained above to establish chance levels.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4418" id="Sec16"><span data-dcnode-id="4419" instrument_node="">Analysis and visualisation of HMM transitions</span></h3><p data-dcnode-id="4393"><span data-dcnode-id="4417" instrument_node="">The matrix of transition probabilities, which were explicitly modelled by the HMM, contained a clear organisation, in which subnetworks of HMM states expressed more frequent transitions within each other than to states outside. In other words, the transition matrix represented a directed graph with modular organisation. We demonstrated this by submitting the transition matrix (shown in Fig.&nbsp;</span><a data-dcnode-id="4415" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4416" instrument_node="">4a</span></a><span data-dcnode-id="4414" instrument_node="">) to a modularity analysis, using Matlab functions from the Brain Connectivity Toolbox (</span><a data-dcnode-id="4412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sites.google.com/site/bctnet/Home"><span data-dcnode-id="4413" instrument_node="">https://sites.google.com/site/bctnet/Home</span></a><span data-dcnode-id="4411" instrument_node="">)</span><sup data-dcnode-id="4408"><a aria-label="Reference 69" data-dcnode-id="4409" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d116695769e1910" title="Rubinov, M. &amp; Sporns, O. Complex network measures of brain connectivity: uses and interpretations. Neuroimage 52, 1059–1069 (2010)."><span data-dcnode-id="4410" instrument_node="">69</span></a></sup><span data-dcnode-id="4407" instrument_node="">, based on Newman’s spectral community detection</span><sup data-dcnode-id="4404"><a aria-label="Reference 70" data-dcnode-id="4405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d116695769e1914" title="Leicht, E. A. &amp; Newman, M. E. J. Community structure in directed networks. Phys. Rev. Lett. 100, 118703 (2008)."><span data-dcnode-id="4406" instrument_node="">70</span></a></sup><span data-dcnode-id="4403" instrument_node="">. Prior to running the modularity algorithm, we excluded the transitions of the HMM states that did not occur consistently across participants, i.e., sporadic states (see Methods, Choice of number of states, and Fig.&nbsp;</span><a data-dcnode-id="4401" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4402" instrument_node="">4b</span></a><span data-dcnode-id="4400" instrument_node="">), and thresholded the remaining transition matrix to include the strongest elements. The choice of this latter threshold was done for visualisation purposes (for the results shown in the main text using 19 states we included the 21% strongest transitions), however, different thresholds resulted in highly similar module partitions. The modular organisation is presented in a reordered matrix (Fig.&nbsp;</span><a data-dcnode-id="4398" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4399" instrument_node="">4c</span></a><span data-dcnode-id="4397" instrument_node="">) and as a map (Fig.&nbsp;</span><a data-dcnode-id="4395" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4396" instrument_node="">4d</span></a><span data-dcnode-id="4394" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4391" id="Sec17"><span data-dcnode-id="4392" instrument_node="">Visualising mean activation maps of HMM states</span></h3><p data-dcnode-id="4380"><span data-dcnode-id="4390" instrument_node="">The mean activation maps have been overlaid on brain surfaces in Figs.&nbsp;</span><a data-dcnode-id="4388" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4389" instrument_node="">5</span></a><span data-dcnode-id="4387" instrument_node=""> and </span><a data-dcnode-id="4385" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="4386" instrument_node="">6</span></a><span data-dcnode-id="4384" instrument_node=""> of the main text, using the Human Connectome Project software Connectome Workbench (</span><a data-dcnode-id="4382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.humanconnectome.org/software/connectome-workbench"><span data-dcnode-id="4383" instrument_node="">https://www.humanconnectome.org/software/connectome-workbench</span></a><span data-dcnode-id="4381" instrument_node="">). The HMM was inferred in volumetric MNI152 space and mapped to the surface of the Conte-69 template using the Workbench function wb_command –volume-to-surface-mapping. The presented surface maps are shown with the 50% strongest increases and the 50% strongest decreases in activation for each HMM state relative to baseline averaged over all HMM states.</span></p></div></div></section><span data-dcnode-id="4376" instrument_node="">
