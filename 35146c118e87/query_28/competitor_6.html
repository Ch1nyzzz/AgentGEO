</span><meta content="The modern understanding of sleep is based on the classification of sleep into stages defined by their electroencephalography (EEG) signatures, but the underlying brain dynamics remain unclear. Here we aimed to move significantly beyond the current state-of-the-art description of sleep, and in particular to characterise the spatiotemporal complexity of whole-brain networks and state transitions during sleep. In order to obtain the most unbiased estimate of how whole-brain network states evolve through the human sleep cycle, we used a Markovian data-driven analysis of continuous neuroimaging data from 57 healthy participants falling asleep during simultaneous functional magnetic resonance imaging (fMRI) and EEG. This Hidden Markov Model (HMM) facilitated discovery of the dynamic choreography between different whole-brain networks across the wake-non-REM sleep cycle. Notably, our results reveal key trajectories to switch within and between EEG-based sleep stages, while highlighting the heterogeneities of stage N1 sleep and wakefulness before and after sleep. Sleep is composed of a number of different stages, each associated with a different pattern of brain activity. Here, using a data-driven Hidden Markov Model (HMM) of fMRI data, the authors discover a more complex set of neural activity states underlying the conventional stages of non-REM sleep." data-dcnode-id="6699" name="dc.description"><span data-dcnode-id="6698" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="5507" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5508" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5512" id="Abs1"><span data-dcnode-id="5513" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5509" id="Abs1-content"><p data-dcnode-id="5510"><span data-dcnode-id="5511" instrument_node="">The modern understanding of sleep is based on the classification of sleep into stages defined by their electroencephalography (EEG) signatures, but the underlying brain dynamics remain unclear. Here we aimed to move significantly beyond the current state-of-the-art description of sleep, and in particular to characterise the spatiotemporal complexity of whole-brain networks and state transitions during sleep. In order to obtain the most unbiased estimate of how whole-brain network states evolve through the human sleep cycle, we used a Markovian data-driven analysis of continuous neuroimaging data from 57 healthy participants falling asleep during simultaneous functional magnetic resonance imaging (fMRI) and EEG. This Hidden Markov Model (HMM) facilitated discovery of the dynamic choreography between different whole-brain networks across the wake-non-REM sleep cycle. Notably, our results reveal key trajectories to switch within and between EEG-based sleep stages, while highlighting the heterogeneities of stage N1 sleep and wakefulness before and after sleep.</span></p></div></div></section><span data-dcnode-id="5506" instrument_node="">
</span><noscript data-dcnode-id="5504"><span data-dcnode-id="5505" instrument_node="">
</span></noscript><span data-dcnode-id="5503" instrument_node="">
</span><section data-dcnode-id="5392" data-title="Introduction"><div class="c-article-section" data-dcnode-id="5393" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5501" id="Sec1"><span data-dcnode-id="5502" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="5394" id="Sec1-content"><p data-dcnode-id="5495"><span data-dcnode-id="5500" instrument_node="">The primary behavioural observation of sleep is a lack of interaction with, and responsiveness to, the external world, i.e., a decreased level of arousal</span><sup data-dcnode-id="5497"><a aria-label="Reference 1" data-dcnode-id="5498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d116695769e753" title="Laureys, S., Perrin, F. &amp; Bredart, S. Self-consciousness in non-communicative patients. Conscious. Cogn. 16, 722–741 (2007)."><span data-dcnode-id="5499" instrument_node="">1</span></a></sup><span data-dcnode-id="5496" instrument_node="">. The lack of communication with sleeping subjects implies that we rely on physiological recordings to scientifically describe and categorise sleep. The advent of modern neuroimaging techniques and network analyses has been explored to map and characterise spontaneous large-scale brain activity during wakefulness with high-spatiotemporal precision. Yet, our understanding of brain activity during sleep remains dictated by observations in a few channels of electroencephalographic (EEG) recordings.</span></p><p data-dcnode-id="5481"><span data-dcnode-id="5494" instrument_node="">Today, the dominant description of normal human sleep is represented by polysomnography (PSG), which relies mainly on EEG but also electromyography (EMG), electrooculography (EOG) and electrocardiography (ECG), as well as measures of respiration</span><sup data-dcnode-id="5491"><a aria-label="Reference 2" data-dcnode-id="5492" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d116695769e760" title="Iber C., Ancoli-Israel S., Chesson A. &amp; Quan, S. F. The AASM Manual for the Scoring of Sleep and Associated Events: Rules, Terminology and Technical Specifications (American Academy of Sleep Medicine, Westchester, IL, 2007)."><span data-dcnode-id="5493" instrument_node="">2</span></a></sup><span data-dcnode-id="5490" instrument_node="">. On-going brain activity is recorded from a low number of EEG electrodes and typically categorised into wakefulness, rapid-eye movement (REM) sleep and—according to the most recent set of guidelines—three stages of non-REM (NREM) sleep (N1–N3)</span><sup data-dcnode-id="5487"><a aria-label="Reference 2" data-dcnode-id="5488" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d116695769e764" title="Iber C., Ancoli-Israel S., Chesson A. &amp; Quan, S. F. The AASM Manual for the Scoring of Sleep and Associated Events: Rules, Terminology and Technical Specifications (American Academy of Sleep Medicine, Westchester, IL, 2007)."><span data-dcnode-id="5489" instrument_node="">2</span></a></sup><span data-dcnode-id="5486" instrument_node="">. Staging is based on the visual detection of spectral EEG qualities (e.g., alpha- and delta-frequency power) and sleep graphoelements (sleep spindles and K-complexes), many of which have been known since the 1930s</span><sup data-dcnode-id="5483"><a aria-label="Reference 3" data-dcnode-id="5484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d116695769e768" title="Loomis, A. L., Harvey, E. N. &amp; Hobart, G. Potential rhythms of the cerebral cortex during sleep. Science 81, 597–598 (1935)."><span data-dcnode-id="5485" instrument_node="">3</span></a></sup><span data-dcnode-id="5482" instrument_node="">.</span></p><p data-dcnode-id="5475"><span data-dcnode-id="5480" instrument_node="">PSG has been essential in the development of modern sleep research, and remains undoubtedly the quickest and easiest way to establish arousal levels in individuals. Indeed, PSG-defined sleep stages were originally devised from EEG as surrogate markers of arousal thresholds, yet over time many have come to see them as a more or less exhaustive set of intrinsic canonical states that cover the full repertoire of brain activity during sleep. However, the use of (1) fixed scoring windows of 30 s and (2) only a few EEG electrodes means that PSG involves considerable averaging of brain activity in both time and space</span><sup data-dcnode-id="5477"><a aria-label="Reference 4" data-dcnode-id="5478" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d116695769e775" title="Himanen, S. L. &amp; Hasan, J. Limitations of Rechtschaffen and Kales. Sleep. Med. Rev. 4, 149–167 (2000)."><span data-dcnode-id="5479" instrument_node="">4</span></a></sup><span data-dcnode-id="5476" instrument_node="">—arguably leading to an incomplete representation of brain activity.</span></p><p data-dcnode-id="5459"><span data-dcnode-id="5474" instrument_node="">Furthermore, PSG corresponds relatively poorly to the subjective perception of sleep. Participants may experience being awake during periods with EEG signals otherwise fulfilling PSG criteria of NREM sleep</span><sup data-dcnode-id="5468"><a aria-label="Reference 5" data-dcnode-id="5472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d116695769e782" title="Ogilvie, R. D. &amp; Wilkinson, R. T. The detection of sleep onset: behavioral and physiological convergence. Psychophysiology 21, 510–520 (1984)."><span data-dcnode-id="5473" instrument_node="">5</span></a><span data-dcnode-id="5471" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="5469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d116695769e785" title="Bonnet, M. H. &amp; Moore, S. E. The threshold of sleep: perception of sleep as a function of time asleep and auditory threshold. Sleep 5, 267–276 (1982)."><span data-dcnode-id="5470" instrument_node="">6</span></a></sup><span data-dcnode-id="5467" instrument_node="">. The relative lack of correspondence between PSG and subjective experience becomes important in populations with sleep complaints, where PSG is not indicated in the clinical evaluation of insomnia, the most common of all sleep disorders</span><sup data-dcnode-id="5461"><a aria-label="Reference 7" data-dcnode-id="5465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d116695769e789" title="Manconi, M. et al. Measuring the error in sleep estimation in normal subjects and in patients with insomnia. J. Sleep Res. 19, 478–486 (2010)."><span data-dcnode-id="5466" instrument_node="">7</span></a><span data-dcnode-id="5464" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="5462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d116695769e792" title="Edinger, J. D., Ulmer, C. S. &amp; Means, M. K. Sensitivity and specificity of polysomnographic criteria for defining insomnia. J. Clin. Sleep. Med. 9, 481–491 (2013)."><span data-dcnode-id="5463" instrument_node="">8</span></a></sup><span data-dcnode-id="5460" instrument_node="">.</span></p><p data-dcnode-id="5409"><span data-dcnode-id="5458" instrument_node="">Recent developments in whole-brain neuroimaging and analyses support the examination of more sophisticated features of brain networks through functional connectivity (FC) and structural connectivity analyses, the detection of task-related and resting-state functional networks</span><sup data-dcnode-id="5452"><a aria-label="Reference 9" data-dcnode-id="5456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d116695769e800" title="Raichle, M. E. Two views of brain function. Trends Cogn. Sci. 14, 180–190 (2010)."><span data-dcnode-id="5457" instrument_node="">9</span></a><span data-dcnode-id="5455" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="5453" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d116695769e803" title="Smith, S. M. et al. Correspondence of the brain’s functional architecture during activation and rest. Proc. Natl Acad. Sci. USA 106, 13040–13045 (2009)."><span data-dcnode-id="5454" instrument_node="">10</span></a></sup><span data-dcnode-id="5451" instrument_node="">, and the development of mechanistic computational models</span><sup data-dcnode-id="5445"><a aria-label="Reference 11" data-dcnode-id="5449" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d116695769e807" title="Deco, G., Jirsa, V. K. &amp; McIntosh, A. R. Emerging concepts for the dynamical organization of resting-state activity in the brain. Nat. Rev. Neurosci. 12, 43–56 (2011)."><span data-dcnode-id="5450" instrument_node="">11</span></a><span data-dcnode-id="5448" instrument_node="">,</span><a aria-label="Reference 12" data-dcnode-id="5446" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d116695769e810" title="Woolrich, M. W. &amp; Stephan, K. E. Biophysical network models and the human connectome. Neuroimage 80, 330–338 (2013)."><span data-dcnode-id="5447" instrument_node="">12</span></a></sup><span data-dcnode-id="5444" instrument_node="">. Yet, studies that have applied these promising tools to investigate large-scale brain activity of sleep have commonly relied upon PSG in a strict sense, thus regressing PSG stages onto functional brain data. This approach has yielded whole-brain correlates of PSG stages and sleep graphoelements, in terms of activation maps</span><sup data-dcnode-id="5438"><a aria-label="Reference 13" data-dcnode-id="5442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d116695769e814" title="Maquet, P. Functional neuroimaging of normal human sleep by positron emission tomography. J. Sleep Res. 9, 207–231 (2000)."><span data-dcnode-id="5443" instrument_node="">13</span></a><span data-dcnode-id="5441" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="5439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d116695769e817" title="Dang-Vu, T. T. et al. Functional neuroimaging insights into the physiology of human sleep. Sleep 33, 1589–1603 (2010)."><span data-dcnode-id="5440" instrument_node="">14</span></a></sup><span data-dcnode-id="5437" instrument_node="">, FC patterns</span><sup data-dcnode-id="5422"><a data-dcnode-id="5435" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d116695769e821" title="Sämann, P. G. et al. Development of the brain’s default mode network from wakefulness to slow wave sleep. Cereb. Cortex 21, 2082–2093 (2011)."><span data-dcnode-id="5436" instrument_node="">15</span></a><span data-dcnode-id="5434" instrument_node="">,</span><a data-dcnode-id="5432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d116695769e821_1" title="Spoormaker, V. I. et al. Development of a large-scale functional brain network during human non-rapid eye movement sleep. J. Neurosci. 30, 11379–11387 (2010)."><span data-dcnode-id="5433" instrument_node="">16</span></a><span data-dcnode-id="5431" instrument_node="">,</span><a data-dcnode-id="5429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d116695769e821_2" title="Larson-Prior, L. J. et al. Cortical network functional connectivity in the descent to sleep. Proc. Natl Acad. Sci. USA 106, 4489–4494 (2009)."><span data-dcnode-id="5430" instrument_node="">17</span></a><span data-dcnode-id="5428" instrument_node="">,</span><a data-dcnode-id="5426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d116695769e821_3" title="Tagliazucchi, E. &amp; Laufs, H. Decoding wakefulness levels from typical fMRI resting-state data reveals reliable drifts between wakefulness and sleep. Neuron 82, 695–708 (2014)."><span data-dcnode-id="5427" instrument_node="">18</span></a><span data-dcnode-id="5425" instrument_node="">,</span><a aria-label="Reference 19" data-dcnode-id="5423" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d116695769e824" title="Altmann, A. et al. Validation of non-REM sleep stage decoding from resting state fMRI using linear support vector machines. Neuroimage 125, 544–555 (2016)."><span data-dcnode-id="5424" instrument_node="">19</span></a></sup><span data-dcnode-id="5421" instrument_node="">, graph-theoretical measures</span><sup data-dcnode-id="5415"><a aria-label="Reference 20" data-dcnode-id="5419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d116695769e828" title="Boly, M. et al. Hierarchical clustering of brain activity during human nonrapid eye movement sleep. Proc. Natl Acad. Sci. USA 109, 5856–5861 (2012)."><span data-dcnode-id="5420" instrument_node="">20</span></a><span data-dcnode-id="5418" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="5416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d116695769e831" title="Tagliazucchi, E. et al. Large-scale brain functional modularity is reflected in slow electroencephalographic rhythms across the human non-rapid eye movement sleep cycle. Neuroimage 70, 327–339 (2013)."><span data-dcnode-id="5417" instrument_node="">21</span></a></sup><span data-dcnode-id="5414" instrument_node=""> and EEG-microstates</span><sup data-dcnode-id="5411"><a aria-label="Reference 22" data-dcnode-id="5412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d116695769e836" title="Brodbeck, V. et al. EEG microstates of wakefulness and NREM sleep. Neuroimage 62, 2129–2139 (2012)."><span data-dcnode-id="5413" instrument_node="">22</span></a></sup><span data-dcnode-id="5410" instrument_node="">. However, this top-down constraint by the low-resolution PSG scoring comes at the cost of exploring only a small fraction of the information available in the high-resolution neuroimaging data.</span></p><p data-dcnode-id="5395"><span data-dcnode-id="5408" instrument_node="">Rather than constraining analyses by traditional definitions of sleep stages, we propose to use novel data-driven analysis methods to elucidate whole-brain networks that can complement and potentially expand the classical understanding of sleep. This requires a sufficiently sensitive decomposition of whole-brain network activity in time. Building on a recent study showing that individual PSG stages can be extracted from functional magnetic resonance imaging (fMRI) recordings in a data-driven way</span><sup data-dcnode-id="5405"><a aria-label="Reference 23" data-dcnode-id="5406" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d116695769e843" title="Haimovici, A., Tagliazucchi, E., Balenzuela, P. &amp; Laufs, H. On wakefulness fluctuations as a source of BOLD functional connectivity dynamics. Sci. Rep. 7, 5908 (2017)."><span data-dcnode-id="5407" instrument_node="">23</span></a></sup><span data-dcnode-id="5404" instrument_node="">, we here leveraged the full spatiotemporal resolution of blood-oxygen-level dependent (BOLD) signals to find large-scale networks in sleep, applying a Hidden Markov Model (HMM)</span><sup data-dcnode-id="5401"><a aria-label="Reference 24" data-dcnode-id="5402" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e847" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="5403" instrument_node="">24</span></a></sup><span data-dcnode-id="5400" instrument_node=""> on fMRI recordings of 57 healthy participants, who—according to simultaneously acquired EEG—cycled through PSG-defined stages of wakefulness and NREM sleep. Crucially, the HMM decomposition was not constrained by PSG stages, but rather allowed us to discover directly from the data, at a time-scale of seconds, the relevant brain network transitions explored by the human brain during the wake-NREM sleep cycle. Compared to other methods for extracting dynamic FC</span><sup data-dcnode-id="5397"><a aria-label="Reference 25" data-dcnode-id="5398" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d116695769e851" title="Preti, M. G., Bolton, T. A. W. &amp; Ville, D. V. D. The dynamic functional connectome: state-of-the-art and perspectives. NeuroImage 160, 41–54&nbsp;(2017)."><span data-dcnode-id="5399" instrument_node="">25</span></a></sup><span data-dcnode-id="5396" instrument_node="">, the HMM framework explicitly models the transition probabilities between its inferred states. We show that this information can be used to discover new whole-brain aspects of sleep, complementing the traditional segmentation of brain activity offered by PSG.</span></p></div></div></section><section data-dcnode-id="4840" data-title="Results"><div class="c-article-section" data-dcnode-id="4841" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5390" id="Sec2"><span data-dcnode-id="5391" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="4842" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="5388" id="Sec3"><span data-dcnode-id="5389" instrument_node="">Whole-brain network states identified by HMM</span></h3><p data-dcnode-id="5375"><span data-dcnode-id="5387" instrument_node="">In order to extract the large-scale networks inherent to whole-brain recordings of the wakefulness-NREM sleep cycle, we estimated an HMM on fMRI data from 57 healthy participants (age 23.5 ± 3.3&nbsp;years, 39 females). Participants were instructed to lie still in the scanner with their eyes closed. Each recording had a duration of 52 min, and was accompanied by acquisitions of EEG, EMG, ECG and EOG, based on which PSG staging was performed by an expert, according to the AASM criteria</span><sup data-dcnode-id="5384"><a aria-label="Reference 2" data-dcnode-id="5385" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d116695769e867" title="Iber C., Ancoli-Israel S., Chesson A. &amp; Quan, S. F. The AASM Manual for the Scoring of Sleep and Associated Events: Rules, Terminology and Technical Specifications (American Academy of Sleep Medicine, Westchester, IL, 2007)."><span data-dcnode-id="5386" instrument_node="">2</span></a></sup><span data-dcnode-id="5383" instrument_node=""> (see Supplementary Table&nbsp;</span><a data-dcnode-id="5381" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5382" instrument_node="">1</span></a><span data-dcnode-id="5380" instrument_node="">). Following preprocessing, the voxel-wise BOLD timecourses were temporally averaged over 90 region-of-interest (ROI) timecourses, using the cortical and subcortical regions of the automated anatomical labelling (AAL) atlas</span><sup data-dcnode-id="5377"><a aria-label="Reference 26" data-dcnode-id="5378" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d116695769e874" title="Tzourio-Mazoyer, N. et al. Automated anatomical labeling of activations in SPM using a macroscopic anatomical parcellation of the MNI MRI single-subject brain. Neuroimage 15, 273–289 (2002)."><span data-dcnode-id="5379" instrument_node="">26</span></a></sup><span data-dcnode-id="5376" instrument_node="">. ROI timecourses were demeaned and variance-normalised for each participant, and subsequently concatenated across participants along the temporal dimension.</span></p><p data-dcnode-id="5363"><span data-dcnode-id="5374" instrument_node="">The estimated HMM contained a set of whole-brain network states, each defined as a multivariate Gaussian distribution, including: (i) a mean activation distribution, representing the mean level of activity in each ROI when a state is active; and (ii) an FC matrix, summarising the pairwise temporal co-variations occurring between the ROIs during that state. The HMM also contained a transition probability matrix with the probabilities of transitioning between each pair of states. Each state also had an associated state timecourse describing the points in time (defined by the fMRI sampling, TR = 2.08 s) where the state was active</span><sup data-dcnode-id="5368"><a aria-label="Reference 24" data-dcnode-id="5372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e881" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="5373" instrument_node="">24</span></a><span data-dcnode-id="5371" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="5369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e884" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="5370" instrument_node="">27</span></a></sup><span data-dcnode-id="5367" instrument_node="">. The HMM was endowed with 19 states, and, crucially, was given no information about the PSG staging for its estimation. An illustration of the analysis workflow is given in Fig.&nbsp;</span><a data-dcnode-id="5365" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5366" instrument_node="">1</span></a><span data-dcnode-id="5364" instrument_node=""> (see Methods for details).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5309" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="5310"><figcaption data-dcnode-id="5360"><b class="c-article-section__figure-caption" data-dcnode-id="5361" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5362" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5321"><div class="c-article-section__figure-item" data-dcnode-id="5355"><a class="c-article-section__figure-link" data-dcnode-id="5356" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/1" rel="nofollow"><picture data-dcnode-id="5357"><source data-dcnode-id="5359" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5358" height="860" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5322" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5323"><span data-dcnode-id="5354" instrument_node="">Dynamic whole-brain networks from fMRI sleep recordings using a Hidden Markov Model. </span><b data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">a</span></b><span data-dcnode-id="5351" instrument_node=""> ROI timecourses were extracted by averaging BOLD signals across voxels within each of the 90 cortical and subcortical AAL areas for each participant. Each ROI timecourse was demeaned and normalised by its standard deviation. </span><b data-dcnode-id="5349"><span data-dcnode-id="5350" instrument_node="">b</span></b><span data-dcnode-id="5348" instrument_node=""> The data were concatenated across participants, and the dimensionality was reduced using PCA&nbsp;(principal component analysis), such that ~90% of the variance of the ROI timecourses was retained. The HMM was run on the PCA timecourses, resulting in </span><i data-dcnode-id="5346"><span data-dcnode-id="5347" instrument_node="">K</span></i><span data-dcnode-id="5345" instrument_node=""> number of states with associated timecourses, each describing the points in time each state is active and inactive. </span><b data-dcnode-id="5343"><span data-dcnode-id="5344" instrument_node="">c</span></b><span data-dcnode-id="5342" instrument_node=""> Each HMM state was characterised by a multivariate Gaussian distribution comprising a covariance matrix, </span><i data-dcnode-id="5340"><span data-dcnode-id="5341" instrument_node="">Σ</span></i><sub data-dcnode-id="5337"><i data-dcnode-id="5338"><span data-dcnode-id="5339" instrument_node="">K</span></i></sub><span data-dcnode-id="5336" instrument_node="">, and a mean distribution, </span><i data-dcnode-id="5334"><span data-dcnode-id="5335" instrument_node="">μ</span></i><sub data-dcnode-id="5330"><i data-dcnode-id="5332"><span data-dcnode-id="5333" instrument_node="">K</span></i><span data-dcnode-id="5331" instrument_node="">.</span></sub><span data-dcnode-id="5329" instrument_node=""> The state-specific mean distributions and covariance matrices were back-projected to the MNI space of the AAL by using the mixing matrix, </span><i data-dcnode-id="5327"><span data-dcnode-id="5328" instrument_node="">M</span></i><sup data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">T</span></sup><span data-dcnode-id="5324" instrument_node=""> from the PCA decomposition, yielding a mean activation map and an FC matrix for each HMM state</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5311"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5312" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/1" rel="nofollow"><span data-dcnode-id="5319"><span data-dcnode-id="5320" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5313" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5314" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5315" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5318" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5317" fill-rule="evenodd"></path><span data-dcnode-id="5316" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5304"><span data-dcnode-id="5308" instrument_node="">To allow for unbiased within-participant testing, when comparing the HMM output to the PSG scoring we considered the subset of the HMM output that corresponded to the data from the 18 participants that reached all four PSG stages (wakefulness, N1, N2 and N3, see Supplementary Table&nbsp;</span><a data-dcnode-id="5306" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5307" instrument_node="">1</span></a><span data-dcnode-id="5305" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5302" id="Sec4"><span data-dcnode-id="5303" instrument_node="">Whole-brain network states underlie PSG sleep stages</span></h3><p data-dcnode-id="5297"><span data-dcnode-id="5301" instrument_node="">The 19 whole-brain network states, inferred solely from the fMRI by the HMM, contained most of the temporal information given by the PSG stages that were scored from the EEG independently of the fMRI. The HMM state timecourses and the PSG scoring are plotted together in Fig.&nbsp;</span><a data-dcnode-id="5299" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5300" instrument_node="">2a</span></a><span data-dcnode-id="5298" instrument_node=""> for the 18 participants that included all four PSG stages, illustrating how the activity of the different HMM states co-varied with specific PSG stages. We have highlighted the HMM state timecourses of two participants to ease visual inspection, however, the temporal relationships between HMM states and PSG stages were consistent across the group. It can be observed, for example, that HMM state 8 occurred most often during wakefulness, HMM state 3 occurred during N2 sleep and HMM state 16 occurred during N3 sleep.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5267" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="5268"><figcaption data-dcnode-id="5294"><b class="c-article-section__figure-caption" data-dcnode-id="5295" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="5296" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5279"><div class="c-article-section__figure-item" data-dcnode-id="5289"><a class="c-article-section__figure-link" data-dcnode-id="5290" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/2" rel="nofollow"><picture data-dcnode-id="5291"><source data-dcnode-id="5293" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="5292" height="627" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5280" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="5281"><span data-dcnode-id="5288" instrument_node="">State timecourses of whole-brain network states and their association to polysomnography. </span><b data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">a</span></b><span data-dcnode-id="5285" instrument_node=""> The figure shows the 19 HMM state timecourses describing each state’s probability of being active at each sample point of the fMRI sessions in the 18 participants that reached all four PSG stages. Below the HMM state timecourses are shown the independently obtained PSG sleep scoring (based on the simultaneously acquired EEG). The coloured overlay shows periods scored as wakefulness (red), N1 (white), N2 (blue) and N3 (green). The two dashed boxes highlight the HMM state timecourses and PSG scoring of two representative participants. Note, how the majority of HMM timecourses varied with the PSG stages, in highly consistent ways across participants. A few ‘sporadic’ HMM states, occurring mainly in a few participants, are also visible (e.g., states 11 and 12). </span><b data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">b</span></b><span data-dcnode-id="5282" instrument_node=""> Quantifying the multivariate relationship between the HMM states and the PSG scoring, through the use of MANOVA, revealed a hierarchical grouping of the HMM states, in which wakefulness and N1 sleep were separated from N2 sleep, which in turn was separated from N3</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5269"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="5270" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/2" rel="nofollow"><span data-dcnode-id="5277"><span data-dcnode-id="5278" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5271" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5272" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5273" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5276" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5275" fill-rule="evenodd"></path><span data-dcnode-id="5274" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5253"><span data-dcnode-id="5266" instrument_node="">We quantified the temporal association between the PSG stages and the HMM state timecourses using multivariate analysis of variance (MANOVA). This allowed us to ask if the 19 HMM states were significantly grouped in time by the four PSG stages (for the 18 participants that included all four PSG stages). Through non-parametric testing (see Methods) we confirmed this temporal relationship (</span><i data-dcnode-id="5264"><span data-dcnode-id="5265" instrument_node="">p</span></i><span data-dcnode-id="5263" instrument_node=""> </span><i data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">&lt;</span></i><span data-dcnode-id="5260" instrument_node=""> 0.05, permutation testing, see Supplementary Figure&nbsp;</span><a data-dcnode-id="5258" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5259" instrument_node="">1b</span></a><span data-dcnode-id="5257" instrument_node="">). The MANOVA placed the PSG stages in the space of the HMM state timecourses, resulting in the clustering dendrogram of Fig.&nbsp;</span><a data-dcnode-id="5255" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5256" instrument_node="">2b</span></a><span data-dcnode-id="5254" instrument_node="">, with wakefulness and N1 sleep significantly separated from N2 sleep, which in turn was further separated from N3 sleep.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5251" id="Sec5"><span data-dcnode-id="5252" instrument_node="">Whole-brain network states track different PSG stages</span></h3><p data-dcnode-id="5237"><span data-dcnode-id="5250" instrument_node="">Next, we examined the contribution of the individual whole-brain network states to the multivariate relationship, established above, between the HMM and the PSG scoring. We quantified the temporal sensitivity and specificity of the HMM states for each of the PSG stages. For each of the 18 participants that included all four PSG stages, we defined the sensitivity of each HMM state as the proportion of total time spent in a PSG stage, in which this HMM state was active. Specificity was defined as the likelihood of finding each HMM state active during a given PSG stage. We compared the sensitivity and specificity for each PSG stage within each of the HMM states, using paired </span><i data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">t</span></i><span data-dcnode-id="5247" instrument_node=""> tests and a randomisation scheme of the PSG scoring (see Methods). The results are presented in Fig.&nbsp;</span><a data-dcnode-id="5245" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5246" instrument_node="">3a</span></a><span data-dcnode-id="5244" instrument_node="">, b. HMM state 8 occupied a large proportion of PSG-scored wakefulness, i.e., it exhibited high sensitivity for wakefulness (see Fig.&nbsp;</span><a data-dcnode-id="5242" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5243" instrument_node="">3a</span></a><span data-dcnode-id="5241" instrument_node="">). Since this whole-brain network state was significantly more sensitive to wakefulness than to any of the other PSG stages, i.e., it rarely occurred outside of wakefulness, its specificity for wakefulness was also high (see Fig.&nbsp;</span><a data-dcnode-id="5239" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5240" instrument_node="">3b</span></a><span data-dcnode-id="5238" instrument_node="">). This combined sensitivity and specificity for wakefulness was also found for HMM states 10 and 18.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5165" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="5166"><figcaption data-dcnode-id="5234"><b class="c-article-section__figure-caption" data-dcnode-id="5235" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="5236" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5177"><div class="c-article-section__figure-item" data-dcnode-id="5229"><a class="c-article-section__figure-link" data-dcnode-id="5230" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/3" rel="nofollow"><picture data-dcnode-id="5231"><source data-dcnode-id="5233" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="5232" height="731" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5178" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="5179"><span data-dcnode-id="5228" instrument_node="">Sensitivity and specificity of HMM states and dynamics within polysomnography stages. </span><b data-dcnode-id="5226"><span data-dcnode-id="5227" instrument_node="">a</span></b><span data-dcnode-id="5225" instrument_node=""> Fractional occupancies of each of the 19 HMM states computed within the four PSG stages corresponded to the PSG-sensitivity of the whole-brain network states. The coloured bars and error bars show the average and standard error, respectively, across the 18 participants that included all four PSG stages. </span><b data-dcnode-id="5223"><span data-dcnode-id="5224" instrument_node="">b</span></b><span data-dcnode-id="5222" instrument_node=""> PSG-specificity of the HMM states for each of the four PSG stages. Specificity corresponds to the probability of an HMM state occurring within a PSG stage. The bars represent the group average and the error bars the standard error (</span><i data-dcnode-id="5220"><span data-dcnode-id="5221" instrument_node="">n</span></i><span data-dcnode-id="5219" instrument_node=""> = 18). In </span><b data-dcnode-id="5217"><span data-dcnode-id="5218" instrument_node="">a</span></b><span data-dcnode-id="5216" instrument_node=""> and </span><b data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">b</span></b><span data-dcnode-id="5213" instrument_node=""> horizontal lines show significant differences within HMM states, with </span><i data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">p</span></i><span data-dcnode-id="5210" instrument_node=""> values &lt; 0.01 as evaluated through paired </span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">t</span></i><span data-dcnode-id="5207" instrument_node=""> tests and permutation testing. </span><b data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">c</span></b><span data-dcnode-id="5204" instrument_node=""> The mean life times of the 19 HMM states are shown by the bars, representing values averaged across the 18 participants. Error-bars represent the standard error across participants. Each HMM state is coloured according to the probability of finding it within each of the four PSG stages, i.e., their PSG specificity. Note how HMM states with high specificity for N3—and to a lesser extent N2—exhibit longer mean life times. </span><b data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">d</span></b><span data-dcnode-id="5201" instrument_node=""> The dynamics of the HMM transitions were calculated within each of the four PSG stages, in terms of switching frequency (‘Switching’), and </span><b data-dcnode-id="5199"><span data-dcnode-id="5200" instrument_node="">e</span></b><span data-dcnode-id="5198" instrument_node=""> the number of different HMM states visited per time (‘Range of HMM states’). These measures significantly separate the four PSG stages suggestive of a higher dynamical repertoire during wakefulness and N1. In </span><b data-dcnode-id="5196"><span data-dcnode-id="5197" instrument_node="">d</span></b><span data-dcnode-id="5195" instrument_node=""> and </span><b data-dcnode-id="5193"><span data-dcnode-id="5194" instrument_node="">e</span></b><span data-dcnode-id="5192" instrument_node=""> error bars represent standard error across participants and significant differences between PSG stages are denoted by stars: one star: </span><i data-dcnode-id="5190"><span data-dcnode-id="5191" instrument_node="">p</span></i><span data-dcnode-id="5189" instrument_node=""> &lt; 0.05, two stars: </span><i data-dcnode-id="5187"><span data-dcnode-id="5188" instrument_node="">p</span></i><span data-dcnode-id="5186" instrument_node=""> &lt; 0.01 and three stars </span><i data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">p</span></i><span data-dcnode-id="5183" instrument_node=""> &lt; 0.001; all evaluated using paired </span><i data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">t</span></i><span data-dcnode-id="5180" instrument_node=""> tests and permutations. W: wakefulness, N1: N1 sleep, N2: N2 sleep, N3: N3 sleep</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5167"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="5168" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/3" rel="nofollow"><span data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5169" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5170" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5171" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5174" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5173" fill-rule="evenodd"></path><span data-dcnode-id="5172" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5163"><span data-dcnode-id="5164" instrument_node="">Select whole-brain network states displayed similarly exclusive sensitivity and specificity profiles for N2 (HMM states 3 and 6) and N3 sleep (HMM states 16). Notably, this was not the case for N1 sleep. The whole-brain network states occupying most of N1 sleep, such as HMM states 1, 4 and 15, were not found specific for this PSG stage. Instead these states would also occur with considerable likelihood outside of N1 sleep, although rarely during N3 sleep.</span></p><p data-dcnode-id="5161"><span data-dcnode-id="5162" instrument_node="">In summary, wakefulness was found to correspond to a collection of whole-brain networks states, while N2 and N3 were characterised by less state-diversity, and dominated by two and one whole-brain states, respectively. In contrast, no single whole-brain states were found specific for N1 sleep, which instead was modelled by a collection of HMM states with mixed PSG profiles.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5159" id="Sec6"><span data-dcnode-id="5160" instrument_node="">Changes in whole-brain network dynamics between PSG stages</span></h3><p data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">Having the whole-brain network states temporally defined allowed us to investigate the large-scale brain dynamics of the traditionally defined PSG stages in the 18 participants that reached all PSG stages during their recordings.</span></p><p data-dcnode-id="5152"><span data-dcnode-id="5156" instrument_node="">In Fig.&nbsp;</span><a data-dcnode-id="5154" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5155" instrument_node="">3c</span></a><span data-dcnode-id="5153" instrument_node="">, the HMM states are represented by a bar plot showing their mean lifetimes, i.e., the average duration of the state visits. The bars have been overlaid with colours depicting the PSG specificity averaged across the corresponding HMM states. HMM states with high specificity for N2 and N3 (HMM states 3, 6 and 16) generally expressed longer mean lifetimes than those related to wakefulness and N1. The mean lifetimes of the HMM states ranged from seconds to tens of seconds.</span></p><p data-dcnode-id="5147"><span data-dcnode-id="5151" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="5149" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="5150" instrument_node="">3d</span></a><span data-dcnode-id="5148" instrument_node="">, e shows two summary measures for the dynamics of the whole-brain network states during the individual PSG stages: (i) the amount of switching defined as the average number of transitions between HMM states during a given PSG stage divided by the total time a participant spent in this PSG stage and (ii) the range of HMM states defined as the number of unique states visited during the given PSG stage divided by the total time a participant spent in this PSG stage. Both measures were estimated for each PSG stage, within each of the 18 participants that included all four PSG stages, and normalised by time. Wakefulness and N1 sleep expressed significantly higher values than N2 and N3. Interestingly, the amount of switching was particularly low for N3 sleep.</span></p><p data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">In summary, unique state visits per time were few and of long durations during N2 and N3 relative to wakefulness and N1 sleep. Consequently, the switching between and range of HMM states were significantly higher in wakefulness and N1.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5143" id="Sec7"><span data-dcnode-id="5144" instrument_node="">Sleep stages as modules of whole-brain network transitions</span></h3><p data-dcnode-id="5137"><span data-dcnode-id="5142" instrument_node="">So far, we have used the traditional PSG stages to organise and evaluate the temporally resolved whole-brain network states. Yet, the data-driven nature of the HMM also allowed us to perform reverse inference, and consider the temporal progression of HMM states, taking this—rather than the PSG staging—as a starting point. This way, we were able to ask if the high-resolution, fMRI-based, HMM suggests new aspects of the wake-NREM sleep cycle, hidden from the EEG-based PSG. For this purpose, we examined the transition probabilities of the HMM states, extracting modules of HMM states that transitioned more often between each other than to other states—as recently identified for the waking resting state in ref. </span><sup data-dcnode-id="5139"><a aria-label="Reference 24" data-dcnode-id="5140" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1121" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="5141" instrument_node="">24</span></a></sup><span data-dcnode-id="5138" instrument_node="">.</span></p><p data-dcnode-id="5116"><span data-dcnode-id="5136" instrument_node="">The whole-brain network states organised into a transition map as presented in Fig.&nbsp;</span><a data-dcnode-id="5134" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5135" instrument_node="">4</span></a><span data-dcnode-id="5133" instrument_node="">, where the 19 × 19 transition probability matrix (Fig.&nbsp;</span><a data-dcnode-id="5131" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5132" instrument_node="">4a</span></a><span data-dcnode-id="5130" instrument_node="">) was submitted to a modularity analysis (see Methods). By considering the most frequent transitions between the HMM states that were consistent across participants (see Fig.&nbsp;</span><a data-dcnode-id="5128" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5129" instrument_node="">4b</span></a><span data-dcnode-id="5127" instrument_node="">), the thresholded transition matrix organised into four partitions or transition modules (see Fig.&nbsp;</span><a data-dcnode-id="5125" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5126" instrument_node="">4c</span></a><span data-dcnode-id="5124" instrument_node="">, and Methods), suggestive of a lower time scale (see ref. </span><sup data-dcnode-id="5121"><a aria-label="Reference 24" data-dcnode-id="5122" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1140" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="5123" instrument_node="">24</span></a></sup><span data-dcnode-id="5120" instrument_node=""> and Supplementary Discussion 1). When these most consistent transitions are presented as a transition map, and each whole-brain network state is represented by a circle plot indicating its specificity for each of the four PSG stages, it can be seen that the HMM states exhibit a strong temporal structure (Fig.&nbsp;</span><a data-dcnode-id="5118" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5119" instrument_node="">4d</span></a><span data-dcnode-id="5117" instrument_node="">). In line with the MANOVA results above, this transition map describes an overall progression from states with high specificity for PSG-defined wakefulness (red module) through states with more activity during, albeit not significant specificity for, N1. From here transitions lead towards states specific to N2 sleep and finally to a single whole-brain network state modelling N3 sleep. The N2- and N3-related HMM states thus grouped together in the blue module.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5074" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="5075"><figcaption data-dcnode-id="5113"><b class="c-article-section__figure-caption" data-dcnode-id="5114" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="5115" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5086"><div class="c-article-section__figure-item" data-dcnode-id="5108"><a class="c-article-section__figure-link" data-dcnode-id="5109" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/4" rel="nofollow"><picture data-dcnode-id="5110"><source data-dcnode-id="5112" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="5111" height="787" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5087" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="5088"><span data-dcnode-id="5107" instrument_node="">Investigating modules of transitions between whole-brain network states. </span><b data-dcnode-id="5105"><span data-dcnode-id="5106" instrument_node="">a</span></b><span data-dcnode-id="5104" instrument_node=""> The figure shows the 19 × 19 transition probability matrix of the HMM states calculated for the 18 participants that included all four PSG stages in their respective scanning session. This quantifies the likelihood of transitioning from any given state to any other state, yielding each matrix entry: transition probability from departure state to destination state. </span><b data-dcnode-id="5102"><span data-dcnode-id="5103" instrument_node="">b</span></b><span data-dcnode-id="5101" instrument_node=""> A few HMM states were ‘sporadic’ and did not occur consistently across participants. HMM states not occurring in more than 25% of the participants were excluded. </span><b data-dcnode-id="5099"><span data-dcnode-id="5100" instrument_node="">c</span></b><span data-dcnode-id="5098" instrument_node=""> The strongest transitions of the consistent HMM states were partitioned through a modularity analysis, and reorganised in a matrix according to the four resulting modules. </span><b data-dcnode-id="5096"><span data-dcnode-id="5097" instrument_node="">d</span></b><span data-dcnode-id="5095" instrument_node=""> The transitions shown in </span><b data-dcnode-id="5093"><span data-dcnode-id="5094" instrument_node="">c</span></b><span data-dcnode-id="5092" instrument_node=""> are presented as a transition map with each state depicted as a pie plot expressing its specificity for each of the four PSG stages. Arrows show the direction of the transitions with thickness proportional to the transition probability. The transitions describe a passage from HMM states with high activity during wakefulness in the top, further down through HMM states including more N1, and down to HMM states specific to N2 and finally N3. Interestingly, wakefulness appears to be represented by two modules (red and black). Even though no individual HMM state showed clear specificity for N1 sleep, a module (white) is evident between HMM states with specificity for wakefulness and HMM states with specificity for N2 and N3 sleep. </span><b data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">e</span></b><span data-dcnode-id="5089" instrument_node=""> Pie chart showing the total proportion PSG stages within the 18 participants. Transition prob.: transition probability</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5076"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="5077" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/4" rel="nofollow"><span data-dcnode-id="5084"><span data-dcnode-id="5085" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5078" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5079" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5080" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5083" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5082" fill-rule="evenodd"></path><span data-dcnode-id="5081" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="5072"><span data-dcnode-id="5073" instrument_node="">Interestingly a collection of HMM states with mixed PSG-specificity formed a transition module of their own. This white module was intercalated between the red module of wakefulness in the top and the blue module of N2/N3 sleep. Even if the included HMM states were not specific for PSG-defined N1 sleep, the white module appears in the location of the transition map, where one would expect to find N1 or rather sleep onset.</span></p><p data-dcnode-id="5060"><span data-dcnode-id="5071" instrument_node="">The transition map suggested two sub-divisions of HMM states with high specificity for wakefulness. The red module in close proximity to the white module of N1-related states, and the black module sending transitions to the blue module of consolidated NREM sleep. This apparent separation of wakefulness and the asymmetric relationship to the sleep-related HMM states led us to the hypothesis that one of these could represent wakefulness after sleep onset (WASO). Given the poor correspondence between the HMM states and the general uncertainty associated with the staging of PSG-defined N1 sleep (see Discussion), we chose to define WASO as PSG-staged wakefulness, which followed after visits to N2 sleep</span><sup data-dcnode-id="5068"><a aria-label="Reference 28" data-dcnode-id="5069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d116695769e1191" title="Balkin, T. J. et al. The process of awakening: a PET study of regional brain activity patterns mediating the re‐establishment of alertness and consciousness. Brain 125, 2308–2319 (2002)."><span data-dcnode-id="5070" instrument_node="">28</span></a></sup><span data-dcnode-id="5067" instrument_node="">. By computing the sensitivity and specificity of the whole-brain network states in the subset of the data corresponding to the 31 participants who woke up after having reached N2 sleep (see Supplementary Table&nbsp;</span><a data-dcnode-id="5065" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5066" instrument_node="">2</span></a><span data-dcnode-id="5064" instrument_node="">), we were able to confirm this hypothesis. As shown in Supplementary Figure&nbsp;</span><a data-dcnode-id="5062" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5063" instrument_node="">2</span></a><span data-dcnode-id="5061" instrument_node="">, HMM states 5, 17 and 18 were all more sensitive and specific to WASO compared to wakefulness prior to N2 sleep. Whereas periods of wakefulness prior to and after sleep are scored equally in PSG, the whole-brain network states separated these into two different transition modules.</span></p><p data-dcnode-id="5058"><span data-dcnode-id="5059" instrument_node="">Although this transition map suggests multiple pathways from wakefulness (red module) to the white module of NREM sleep, it is interesting to note that HMM state 8 has direct access to HMM state 15, which in turn guards the transition to the blue module of N2/N3 sleep. Similarly, waking-up relates to a transition from HMM state 4 to HMM state 10, which in turn connects with HMM state 18 of the black WASO module. Further it is worth noticing the strong triangular transition structure within the blue module between the N2-specific whole-brain network states (HMM states 3 and 6) and the N3-modelling HMM state 16.</span></p><p data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">In summary, while agreeing with the overall sequence of PSG stages, the organisation of the transition modules also points to aspects of sleep-related brain activity that the PSG scoring cannot access, including the data-driven suggestions of N1 sleep, WASO-related whole-brain network states, and multiple transition pathways between wakefulness and sleep.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="5054" id="Sec8"><span data-dcnode-id="5055" instrument_node="">Spatial activation and FC maps of whole-brain network states</span></h3><p data-dcnode-id="5037"><span data-dcnode-id="5053" instrument_node="">We present the spatial maps of the whole-brain network states in the order suggested by the transition modules of Fig.&nbsp;</span><a data-dcnode-id="5051" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="5052" instrument_node="">4d</span></a><span data-dcnode-id="5050" instrument_node="">. Figure&nbsp;</span><a data-dcnode-id="5048" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="5049" instrument_node="">5</span></a><span data-dcnode-id="5047" instrument_node=""> and Fig.&nbsp;</span><a data-dcnode-id="5045" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="5046" instrument_node="">6</span></a><span data-dcnode-id="5044" instrument_node=""> show the mean activation maps, while the corresponding FC information is presented in Supplementary Figures&nbsp;</span><a data-dcnode-id="5042" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5043" instrument_node="">3</span></a><span data-dcnode-id="5041" instrument_node="">–</span><a data-dcnode-id="5039" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="5040" instrument_node="">5</span></a><span data-dcnode-id="5038" instrument_node=""> and 17–18 (see also Supplementary Note 5).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5007" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="5008"><figcaption data-dcnode-id="5034"><b class="c-article-section__figure-caption" data-dcnode-id="5035" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="5036" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5019"><div class="c-article-section__figure-item" data-dcnode-id="5029"><a class="c-article-section__figure-link" data-dcnode-id="5030" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/5" rel="nofollow"><picture data-dcnode-id="5031"><source data-dcnode-id="5033" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig5_HTML.png?as=webp" type="image/webp"><img alt="figure 5" aria-describedby="Fig5" data-dcnode-id="5032" height="795" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig5_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5020" data-test="bottom-caption" id="figure-5-desc"><p data-dcnode-id="5021"><span data-dcnode-id="5028" instrument_node="">Mean activation distributions of wakefulness-related HMM states. </span><b data-dcnode-id="5026"><span data-dcnode-id="5027" instrument_node="">a</span></b><span data-dcnode-id="5025" instrument_node=""> Three HMM states identified as sensitive and specific to wakefulness prior to sleep. Note HMM state 8 with DMN-like configuration increases, and concomitant decreases in DAN/CEN-like areas. </span><b data-dcnode-id="5023"><span data-dcnode-id="5024" instrument_node="">b</span></b><span data-dcnode-id="5022" instrument_node=""> Three HMM states associated to wakefulness after sleep. There are marked frontal increases in mean activation in HMM states 5 and 17. All maps were thresholded above the 50% strongest positive and negative changes, respectively</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5009"><a aria-label="Full size image figure 5" class="c-article__pill-button" data-dcnode-id="5010" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure5 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/5" rel="nofollow"><span data-dcnode-id="5017"><span data-dcnode-id="5018" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5011" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5012" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5013" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5016" instrument_node="">

x. </span><b data-dcnode-id="4993"><span data-dcnode-id="4994" instrument_node="">b</span></b><span data-dcnode-id="4992" instrument_node=""> Three HMM states related to N2 sleep. HMM states 3 and 6 in particular showed peak increases and decreases, respectively, in areas previously identified as fMRI-correlates of sleep spindles. </span><b data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">c</span></b><span data-dcnode-id="4989" instrument_node=""> HMM state 16 is dominating slow wave sleep (N3). Interestingly, there are marked decreases in mean activation in frontal areas and insula, and very localised increases in the supplementary motor area and paracentral lobule. All maps were thresholded above the 50% strongest positive and negative changes, respectively</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4976"><a aria-label="Full size image figure 6" class="c-article__pill-button" data-dcnode-id="4977" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure6 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/6" rel="nofollow"><span data-dcnode-id="4984"><span data-dcnode-id="4985" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4978" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4979" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4980" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4983" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="4921"><span data-dcnode-id="4973" instrument_node="">In Fig.&nbsp;</span><a data-dcnode-id="4971" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4972" instrument_node="">5a</span></a><span data-dcnode-id="4970" instrument_node="">, which shows the red module of wakefulness, the mean activation maps of HMM states 2 and 8 resemble resting-state network (RSN) configurations</span><sup data-dcnode-id="4964"><a aria-label="Reference 9" data-dcnode-id="4968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d116695769e1289" title="Raichle, M. E. Two views of brain function. Trends Cogn. Sci. 14, 180–190 (2010)."><span data-dcnode-id="4969" instrument_node="">9</span></a><span data-dcnode-id="4967" instrument_node="">,</span><a aria-label="Reference 10" data-dcnode-id="4965" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d116695769e1292" title="Smith, S. M. et al. Correspondence of the brain’s functional architecture during activation and rest. Proc. Natl Acad. Sci. USA 106, 13040–13045 (2009)."><span data-dcnode-id="4966" instrument_node="">10</span></a></sup><span data-dcnode-id="4963" instrument_node="">. The main increases of HMM state 8 were thus seen in key areas of the default-mode network (DMN)</span><sup data-dcnode-id="4960"><a aria-label="Reference 29" data-dcnode-id="4961" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d116695769e1296" title="Raichle, M. E. et al. A default mode of brain function. Proc. Natl Acad. Sci. USA 98, 676–682 (2001)."><span data-dcnode-id="4962" instrument_node="">29</span></a></sup><span data-dcnode-id="4959" instrument_node="">, including the bilateral posterior cingulate cortex, bilateral angular cortex, bilateral middle temporal cortex, and bilateral medial prefrontal cortex. These DMN-like increases in HMM state 8 were accompanied by decreases in the so-called anti-correlated network (ACN), involving the supramarginal gyrus and the dorsolateral part of the frontal cortex</span><sup data-dcnode-id="4956"><a aria-label="Reference 30" data-dcnode-id="4957" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d116695769e1300" title="Fox, M. D. et al. The human brain is intrinsically organized into dynamic, anticorrelated functional networks. Proc. Natl Acad. Sci. USA 102, 9673–9678 (2005)."><span data-dcnode-id="4958" instrument_node="">30</span></a></sup><span data-dcnode-id="4955" instrument_node="">. In contrast, HMM state 2 was characterised by increases in many of these ACN-areas, including the bilateral supramarginal gyrus, middle cingulate cortex and dorsolateral part of the frontal cortex. These results suggest an inverse relationship between the activity of the DMN and the ACN, which is an established trait of these RSNs</span><sup data-dcnode-id="4952"><a aria-label="Reference 30" data-dcnode-id="4953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d116695769e1304" title="Fox, M. D. et al. The human brain is intrinsically organized into dynamic, anticorrelated functional networks. Proc. Natl Acad. Sci. USA 102, 9673–9678 (2005)."><span data-dcnode-id="4954" instrument_node="">30</span></a></sup><span data-dcnode-id="4951" instrument_node="">. Since the discovery of these RSN patterns they have been hypothesised to reflect complex cognitive processes. The DMN has been linked to inwardly directed mentation, such as autobiographical memory and mind wandering</span><sup data-dcnode-id="4945"><a aria-label="Reference 31" data-dcnode-id="4949" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d116695769e1309" title="Buckner, R. L., Andrews-Hanna, J. R. &amp; Schacter, D. L. The brain’s default network: anatomy, function, and relevance to disease. Ann. N. Y. Acad. Sci. 1124, 1–38 (2008)."><span data-dcnode-id="4950" instrument_node="">31</span></a><span data-dcnode-id="4948" instrument_node="">,</span><a aria-label="Reference 32" data-dcnode-id="4946" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d116695769e1312" title="Spreng, R. N., Mar, R. A. &amp; Kim, A. S. The common neural basis of autobiographical memory, prospection, navigation, theory of mind, and the default mode: a quantitative meta-analysis. J. Cogn. Neurosci. 21, 489–510 (2009)."><span data-dcnode-id="4947" instrument_node="">32</span></a></sup><span data-dcnode-id="4944" instrument_node="">. The ACN overlaps with areas also referred to as the dorsal attention network</span><sup data-dcnode-id="4941"><a aria-label="Reference 33" data-dcnode-id="4942" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d116695769e1316" title="Fox, M. D., Corbetta, M., Snyder, A. Z., Vincent, J. L. &amp; Raichle, M. E. Spontaneous neuronal activity distinguishes human dorsal and ventral attention systems. Proc. Natl Acad. Sci. USA 103, 10046–10051 (2006)."><span data-dcnode-id="4943" instrument_node="">33</span></a></sup><span data-dcnode-id="4940" instrument_node=""> or the central executive network (CEN)</span><sup data-dcnode-id="4937"><a aria-label="Reference 34" data-dcnode-id="4938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d116695769e1320" title="Koech
