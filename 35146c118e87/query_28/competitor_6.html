lin, E. &amp; Summerfield, C. An information theoretical approach to prefrontal executive function. Trends Cogn. Sci. 11, 229–235 (2007)."><span data-dcnode-id="4939" instrument_node="">34</span></a></sup><span data-dcnode-id="4936" instrument_node="">, and has been proposed to be involved in more externally directed processes, including attention</span><sup data-dcnode-id="4933"><a aria-label="Reference 35" data-dcnode-id="4934" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d116695769e1324" title="Menon, V. &amp; Uddin, L. Q. Saliency, switching, attention and control: a network model of insula function. Brain Struct. Funct. 214, 655–667 (2010)."><span data-dcnode-id="4935" instrument_node="">35</span></a></sup><span data-dcnode-id="4932" instrument_node="">. In agreement with this, we found these high-order RSNs to be relatively exclusive for wakefulness. However, previous investigations have suggested a rather ubiquitous presence of both the DMN and the ACN, not just in wakefulness but, in all stages of NREM sleep</span><sup data-dcnode-id="4923"><a aria-label="Reference 15" data-dcnode-id="4930" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d116695769e1328" title="Sämann, P. G. et al. Development of the brain’s default mode network from wakefulness to slow wave sleep. Cereb. Cortex 21, 2082–2093 (2011)."><span data-dcnode-id="4931" instrument_node="">15</span></a><span data-dcnode-id="4929" instrument_node="">,</span><a aria-label="Reference 17" data-dcnode-id="4927" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d116695769e1331" title="Larson-Prior, L. J. et al. Cortical network functional connectivity in the descent to sleep. Proc. Natl Acad. Sci. USA 106, 4489–4494 (2009)."><span data-dcnode-id="4928" instrument_node="">17</span></a><span data-dcnode-id="4926" instrument_node="">,</span><a aria-label="Reference 36" data-dcnode-id="4924" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d116695769e1334" title="Tagliazucchi, E. et al. Breakdown of long-range temporal dependence in default mode and attention networks during deep sleep. Proc. Natl Acad. Sci. USA 110, 15419–15424 (2013)."><span data-dcnode-id="4925" instrument_node="">36</span></a></sup><span data-dcnode-id="4922" instrument_node=""> (see Supplementary Discussion 1).</span></p><p data-dcnode-id="4899"><span data-dcnode-id="4920" instrument_node="">Figure&nbsp;</span><a data-dcnode-id="4918" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4919" instrument_node="">5b</span></a><span data-dcnode-id="4917" instrument_node=""> shows the mean activation maps of whole-brain network states with higher sensitivity and specificity for WASO (black module). The mean activation map of HMM state 18 expressed a distribution similar to that of HMM state 8 (see Fig.&nbsp;</span><a data-dcnode-id="4915" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="4916" instrument_node="">5a</span></a><span data-dcnode-id="4914" instrument_node="">), but with opposite signs. Hence, HMM state 18 showed decreases in DMN-related areas, and increases in regions overlapping the ACN. HMM states 5 and 17 were both characterised by mean activation increases in the frontal cortices. Interestingly, findings from high-density EEG studies of participants waking up from sleep show that the posterior parts of the cortex are particularly ‘slowʼ at returning to levels of activity seen prior to sleep</span><sup data-dcnode-id="4911"><a aria-label="Reference 37" data-dcnode-id="4912" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d116695769e1347" title="Ferrara, M. et al. The electroencephalographic substratum of the awakening. Behav. Brain Res. 167, 237–244 (2006)."><span data-dcnode-id="4913" instrument_node="">37</span></a></sup><span data-dcnode-id="4910" instrument_node="">. Consistent with this, converging evidence from PET and fMRI have indicated frontal cortical activity to be increased relative to that of posterior areas upon awakening</span><sup data-dcnode-id="4901"><a aria-label="Reference 28" data-dcnode-id="4908" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d116695769e1351" title="Balkin, T. J. et al. The process of awakening: a PET study of regional brain activity patterns mediating the re‐establishment of alertness and consciousness. Brain 125, 2308–2319 (2002)."><span data-dcnode-id="4909" instrument_node="">28</span></a><span data-dcnode-id="4907" instrument_node="">,</span><a aria-label="Reference 38" data-dcnode-id="4905" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d116695769e1354" title="Tsai, P. J. et al. Local awakening: regional reorganizations of brain oscillations after sleep. Neuroimage 102(Pt 2), 894–903 (2014)."><span data-dcnode-id="4906" instrument_node="">38</span></a><span data-dcnode-id="4904" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="4902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d116695769e1357" title="Braun, A. R. et al. Regional cerebral blood flow throughout the sleep-wake cycle. An H2(15)O PET study. Brain 120(Pt 7), 1173–1197 (1997)."><span data-dcnode-id="4903" instrument_node="">39</span></a></sup><span data-dcnode-id="4900" instrument_node="">.</span></p><p data-dcnode-id="4873"><span data-dcnode-id="4898" instrument_node="">The whole-brain network states of the white N1-related module are represented in Fig.&nbsp;</span><a data-dcnode-id="4896" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="4897" instrument_node="">6a</span></a><span data-dcnode-id="4895" instrument_node="">. A general observation for these spatial maps is the inverse relationship between mean activation in subcortical areas (thalamus and parts of the basal ganglia) and primary sensory cortical areas. Increases in subcortical activity were accompanied by decreases in primary sensory areas of the cortex and vice versa. This was true for HMM states 4 and 15 (and HMM state 1 although its decreases were not confined to subcortical areas, but supplemented by decreases in the anterior and middle cingulate cortex). This is consistent with intracortical studies of the sleep onset process in rats</span><sup data-dcnode-id="4892"><a aria-label="Reference 40" data-dcnode-id="4893" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d116695769e1367" title="Baker, R. et al. Altered activity in the central medial thalamus precedes changes in the neocortex during transitions into both sleep and propofol anesthesia. J. Neurosci. 34, 13326–13335 (2014)."><span data-dcnode-id="4894" instrument_node="">40</span></a></sup><span data-dcnode-id="4891" instrument_node=""> and in humans</span><sup data-dcnode-id="4888"><a aria-label="Reference 41" data-dcnode-id="4889" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d116695769e1371" title="Magnin, M. et al. Thalamic deactivation at sleep onset precedes that of the cerebral cortex in humans. Proc. Natl Acad. Sci. USA 107, 3829–3833 (2010)."><span data-dcnode-id="4890" instrument_node="">41</span></a></sup><span data-dcnode-id="4887" instrument_node=""> showing that thalamic changes in dynamics precede those of cortical areas near the onset of NREM sleep. Previous fMRI studies of NREM sleep have suggested decreased connectivity between the thalamus and cortical regions as perhaps the most consistent trait of FC during N1 sleep</span><sup data-dcnode-id="4875"><a aria-label="Reference 16" data-dcnode-id="4885" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d116695769e1375" title="Spoormaker, V. I. et al. Development of a large-scale functional brain network during human non-rapid eye movement sleep. J. Neurosci. 30, 11379–11387 (2010)."><span data-dcnode-id="4886" instrument_node="">16</span></a><span data-dcnode-id="4884" instrument_node="">,</span><a aria-label="Reference 18" data-dcnode-id="4882" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d116695769e1378" title="Tagliazucchi, E. &amp; Laufs, H. Decoding wakefulness levels from typical fMRI resting-state data reveals reliable drifts between wakefulness and sleep. Neuron 82, 695–708 (2014)."><span data-dcnode-id="4883" instrument_node="">18</span></a><span data-dcnode-id="4881" instrument_node="">,</span><a aria-label="Reference 19" data-dcnode-id="4879" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d116695769e1381" title="Altmann, A. et al. Validation of non-REM sleep stage decoding from resting state fMRI using linear support vector machines. Neuroimage 125, 544–555 (2016)."><span data-dcnode-id="4880" instrument_node="">19</span></a><span data-dcnode-id="4878" instrument_node="">,</span><a aria-label="Reference 23" data-dcnode-id="4876" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d116695769e1384" title="Haimovici, A., Tagliazucchi, E., Balenzuela, P. &amp; Laufs, H. On wakefulness fluctuations as a source of BOLD functional connectivity dynamics. Sci. Rep. 7, 5908 (2017)."><span data-dcnode-id="4877" instrument_node="">23</span></a></sup><span data-dcnode-id="4874" instrument_node="">.</span></p><p data-dcnode-id="4852"><span data-dcnode-id="4872" instrument_node="">N2 sleep was dominated by HMM states 3 and 6, and the mean activation maps of these whole-brain network states are shown in Fig.&nbsp;</span><a data-dcnode-id="4870" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="4871" instrument_node="">6b</span></a><span data-dcnode-id="4869" instrument_node="">. The supplementary motor area was involved in both of these states; in HMM state 3 as increases in concert with the bilateral precuneus and primary motor cortices; and in HMM state 6 as decreases together with the bilateral thalamus, middle cingulate, supramarginal cortex, and the rolandic operculum. Interestingly, these configurations overlap considerably with those previously reported in studies mapping fMRI-correlates of sleep spindles</span><sup data-dcnode-id="4863"><a aria-label="Reference 42" data-dcnode-id="4867" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d116695769e1395" title="Schabus, M. et al. Hemodynamic cerebral correlates of sleep spindles during human non-rapid eye movement sleep. Proc. Natl Acad. Sci. USA 104, 13164–13169 (2007)."><span data-dcnode-id="4868" instrument_node="">42</span></a><span data-dcnode-id="4866" instrument_node="">,</span><a aria-label="Reference 43" data-dcnode-id="4864" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d116695769e1398" title="Caporro, M. et al. Functional MRI of sleep spindles and K-complexes. Clin. Neurophysiol. 123, 303–309 (2012)."><span data-dcnode-id="4865" instrument_node="">43</span></a></sup><span data-dcnode-id="4862" instrument_node="">, which represent a defining EEG-feature of N2 sleep. However, no HMM state appeared to be driven solely by either sleep spindles or K-complexes. By identifying sleep spindles and K-complexes from the EEG data, we assessed the temporal relationships between these graphoelements and the HMM states. In summary the HMM states that were dominant during N2 sleep showed comparable sensitivity and specificity to both types of graphoelements, and hence the HMM did not appear to have assigned individual states for either spindles or K-complexes (for further information please see the Supplementary Discussion 1, Supplementary Note 4, Supplementary Table&nbsp;</span><a data-dcnode-id="4860" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4861" instrument_node="">3</span></a><span data-dcnode-id="4859" instrument_node="">, and Supplementary Figures&nbsp;</span><a data-dcnode-id="4857" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4858" instrument_node="">19</span></a><span data-dcnode-id="4856" instrument_node="">–</span><a data-dcnode-id="4854" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4855" instrument_node="">21</span></a><span data-dcnode-id="4853" instrument_node="">).</span></p><p data-dcnode-id="4843"><span data-dcnode-id="4851" instrument_node="">HMM state 16 accounted for the majority of time spent in N3 sleep. The corresponding mean activation map is shown in Fig.&nbsp;</span><a data-dcnode-id="4849" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig6"><span data-dcnode-id="4850" instrument_node="">6c</span></a><span data-dcnode-id="4848" instrument_node="">. Apart from some very localised increases in the paracentral lobule and adjacent supplementary motor area the mean activation was characterised mainly by decreases, particularly in the bilateral middle and superior temporal pole, the orbital part and the operculum of the inferior frontal cortex, bilateral insula as well as medial temporal areas. These frontal decreases are consistent with previous PET findings of decreased metabolism in these areas during N3 sleep, which in turn are believed to reflect the high, localised concentration of slow-wave activity</span><sup data-dcnode-id="4845"><a aria-label="Reference 44" data-dcnode-id="4846" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d116695769e1417" title="Werth, E., Achermann, P. &amp; Borbely, A. A. Fronto-occipital EEG power gradients in human sleep. J. Sleep Res. 6, 102–112 (1997)."><span data-dcnode-id="4847" instrument_node="">44</span></a></sup><span data-dcnode-id="4844" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="4641" data-title="Discussion"><div class="c-article-section" data-dcnode-id="4642" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4838" id="Sec9"><span data-dcnode-id="4839" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="4643" id="Sec9-content"><p data-dcnode-id="4836"><span data-dcnode-id="4837" instrument_node="">Using a data-driven exploration of large-scale brain networks and associated dynamics from continuous fMRI recordings, we have explored the rich dynamical complexity in spatiotemporal patterns of brain activity during the healthy wake-NREM sleep cycle. Moving beyond the traditional PSG stages of sleep, we used a HMM to extract 19 recurring whole-brain network states, defined in space by patterns of mean BOLD activation and FC, and defined in time as the probability of being active at each time point of the fMRI sampling. Comparing the temporal evolution of the HMM-derived whole-brain network states with the independently obtained EEG-based PSG scoring, we have discovered a rich repertoire of brain dynamics underpinning the traditional PSG stages. The temporal resolution of the HMM identified state lifetimes on the order of seconds, providing a temporally fine-grained description of the traditional PSG stages. Crucially, a close examination of the HMM transition map furthermore revealed a heterogeneity of large-scale network activity that PSG cannot fully capture.</span></p><p data-dcnode-id="4809"><span data-dcnode-id="4835" instrument_node="">The description of brain activity offered by PSG has for long been acknowledged as incomplete, and attempts have been made to harvest more information from scalp EEG in a search for features relevant for sleep, overlooked by PSG</span><sup data-dcnode-id="4826"><a data-dcnode-id="4833" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d116695769e1433" title="Hori, T. et al. Proposed supplements and amendments to ‘a manual of standardized terminology, techniques and scoring system for sleep stages of human subjects’, the Rechtschaffen &amp; Kales (1968) standard. Psychiatry Clin. Neurosci. 55, 305–310 (2001)."><span data-dcnode-id="4834" instrument_node="">45</span></a><span data-dcnode-id="4832" instrument_node="">,</span><a data-dcnode-id="4830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d116695769e1433_1" title="Olbrich, E. &amp; Achermann, P. Analysis of oscillatory patterns in the human sleep EEG using a novel detection algorithm. J. Sleep Res. 14, 337–346 (2005)."><span data-dcnode-id="4831" instrument_node="">46</span></a><span data-dcnode-id="4829" instrument_node="">,</span><a aria-label="Reference 47" data-dcnode-id="4827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d116695769e1436" title="Abeysuriya, R. G. &amp; Robinson, P. A. Real-time automated EEG tracking of brain states using neural field theory. J. Neurosci. Methods 258, 28–45 (2016)."><span data-dcnode-id="4828" instrument_node="">47</span></a></sup><span data-dcnode-id="4825" instrument_node="">. Our work adheres to this aim, while, through fMRI, incorporating evidence of whole-brain spatial detail. Previous studies have indicated that fMRI can be used to identify dynamic re-configurations of large-scale brain activity during the conventional EEG-based sleep stages, either in form of voxel-wise changes in activity</span><sup data-dcnode-id="4822"><a aria-label="Reference 48" data-dcnode-id="4823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d116695769e1440" title="Picchioni, D. et al. fMRI differences between early and late stage-1 sleep. Neurosci. Lett. 441, 81–85 (2008)."><span data-dcnode-id="4824" instrument_node="">48</span></a></sup><span data-dcnode-id="4821" instrument_node="">, changes in connection strengths in resting-state networks</span><sup data-dcnode-id="4818"><a aria-label="Reference 49" data-dcnode-id="4819" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d116695769e1444" title="Watanabe, T. et al. Network-dependent modulation of brain activity during sleep. Neuroimage 98, 1–10 (2014)."><span data-dcnode-id="4820" instrument_node="">49</span></a></sup><span data-dcnode-id="4817" instrument_node=""> or through long-range temporal dependencies in the BOLD signal</span><sup data-dcnode-id="4814"><a aria-label="Reference 36" data-dcnode-id="4815" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d116695769e1448" title="Tagliazucchi, E. et al. Breakdown of long-range temporal dependence in default mode and attention networks during deep sleep. Proc. Natl Acad. Sci. USA 110, 15419–15424 (2013)."><span data-dcnode-id="4816" instrument_node="">36</span></a></sup><span data-dcnode-id="4813" instrument_node="">. Rather than direct reflections of the conventional sleep stages, what has emerged from our HMM analysis is a probabilistic representation of the PSG scoring in the space of whole-brain network states and transitions. Agreements as well as disagreements between the PSG scoring and the independent HMM decomposition became clear in the transition map (Fig.&nbsp;</span><a data-dcnode-id="4811" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="4812" instrument_node="">7</span></a><span data-dcnode-id="4810" instrument_node="">). Wakefulness, N2 sleep and N3 sleep were each represented by one or more whole-brain network states, forming a good correspondence with PSG. In contrast, no states were found specific for N1 sleep. Furthermore, while treated equivalently in PSG staging, wakefulness prior to sleep and WASO were represented in the transition map as two different modules with different repertoires of large-scale brain networks. Consequently, the transition map also identified specific whole-brain network transitions underlying the descent to, and ascent from, NREM sleep.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4785" data-test="figure" data-title="Fig. 7" id="figure-7"><figure data-dcnode-id="4786"><figcaption data-dcnode-id="4806"><b class="c-article-section__figure-caption" data-dcnode-id="4807" data-test="figure-caption-text" id="Fig7"><span data-dcnode-id="4808" instrument_node="">Fig. 7</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4797"><div class="c-article-section__figure-item" data-dcnode-id="4801"><a class="c-article-section__figure-link" data-dcnode-id="4802" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/7" rel="nofollow"><picture data-dcnode-id="4803"><source data-dcnode-id="4805" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41467-019-08934-3/MediaObjects/41467_2019_8934_Fig7_HTML.png?as=webp" type="image/webp"><img alt="figure 7" aria-describedby="Fig7" data-dcnode-id="4804" height="895" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41467-019-08934-3/MediaObjects/41467_2019_8934_Fig7_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4798" data-test="bottom-caption" id="figure-7-desc"><p data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">A whole-brain network perspective on the human wake-NREM sleep cycle. The main discussion points of our results have been highlighted in the transition map of the whole-brain network states. Boxes a to e summarise the new perspectives provided by our HMM analysis</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4787"><a aria-label="Full size image figure 7" class="c-article__pill-button" data-dcnode-id="4788" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure7 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41467-019-08934-3/figures/7" rel="nofollow"><span data-dcnode-id="4795"><span data-dcnode-id="4796" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4789" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4790" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4791" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4794" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4793" fill-rule="evenodd"></path><span data-dcnode-id="4792" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4741"><span data-dcnode-id="4784" instrument_node="">Consistent with previous neuroimaging studies that have used regression analyses to identify consistent differences between traditionally defined sleep stages in terms of large-scale brain activity</span><sup data-dcnode-id="4775"><a aria-label="Reference 13" data-dcnode-id="4782" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d116695769e1476" title="Maquet, P. Functional neuroimaging of normal human sleep by positron emission tomography. J. Sleep Res. 9, 207–231 (2000)."><span data-dcnode-id="4783" instrument_node="">13</span></a><span data-dcnode-id="4781" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="4779" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d116695769e1479" title="Dang-Vu, T. T. et al. Functional neuroimaging insights into the physiology of human sleep. Sleep 33, 1589–1603 (2010)."><span data-dcnode-id="4780" instrument_node="">14</span></a><span data-dcnode-id="4778" instrument_node="">,</span><a aria-label="Reference 50" data-dcnode-id="4776" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d116695769e1482" title="Tagliazucchi, E. &amp; van Someren, E. J. W. The large-scale functional connectivity correlates of consciousness and arousal during the healthy and pathological human sleep cycle. Neuroimage 160, 55–72 (2017)."><span data-dcnode-id="4777" instrument_node="">50</span></a></sup><span data-dcnode-id="4774" instrument_node="">, PSG-defined wakefulness, N2 and N3 sleep each corresponded well to specific collections of whole-brain network states (see Supplementary Discussion 1). However, the HMM additionally provided access to the large-scale brain dynamics of the PSG stages, showing that the state repertoire, when estimated as amount of switching and range of states visited, is higher in wakefulness than in both N2 and N3 sleep. That a higher and more complex state repertoire is important for the brain to support wakeful consciousness follows from theoretical frameworks</span><sup data-dcnode-id="4765"><a data-dcnode-id="4772" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d116695769e1486" title="Tononi, G. Consciousness as integrated information: a provisional manifesto. Biol. Bull. 215, 216–242 (2008)."><span data-dcnode-id="4773" instrument_node="">51</span></a><span data-dcnode-id="4771" instrument_node="">,</span><a data-dcnode-id="4769" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d116695769e1486_1" title="Tononi, G., Edelman, G. M. &amp; Sporns, O. Complexity and coherency: integrating information in the brain. Trends Cogn. Sci. 2, 474–484 (1998)."><span data-dcnode-id="4770" instrument_node="">52</span></a><span data-dcnode-id="4768" instrument_node="">,</span><a aria-label="Reference 53" data-dcnode-id="4766" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d116695769e1489" title="Marshall, W., Gomez-Ramirez, J. &amp; Tononi, G. Integrated information and state differentiation. Front. Psychol. 7, 926 (2016)."><span data-dcnode-id="4767" instrument_node="">53</span></a></sup><span data-dcnode-id="4764" instrument_node=""> and has received empirical support from a series of combined TMS and EEG studies</span><sup data-dcnode-id="4761"><a aria-label="Reference 54" data-dcnode-id="4762" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d116695769e1493" title="Casali, A. G. et al. A theoretically based index of consciousness independent of sensory processing and behavior. Sci. Transl. Med 5, 198ra105 (2013)."><span data-dcnode-id="4763" instrument_node="">54</span></a></sup><span data-dcnode-id="4760" instrument_node="">. From a large-scale network perspective fMRI has been used to show how an enhanced state repertoire is associated with an ‘expandedʼ consciousness during the psychedelic experience</span><sup data-dcnode-id="4754"><a aria-label="Reference 55" data-dcnode-id="4758" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d116695769e1497" title="Carhart-Harris, R. L. et al. The entropic brain: a theory of conscious states informed by neuroimaging research with psychedelic drugs. Front. Hum. Neurosci. 8, 20 (2014)."><span data-dcnode-id="4759" instrument_node="">55</span></a><span data-dcnode-id="4757" instrument_node="">,</span><a aria-label="Reference 56" data-dcnode-id="4755" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d116695769e1500" title="Tagliazucchi, E., Carhart-Harris, R., Leech, R., Nutt, D. &amp; Chialvo, D. R. Enhanced repertoire of brain dynamical states during the psychedelic experience. Hum. Brain Mapp. 35, 5442–5456 (2014)."><span data-dcnode-id="4756" instrument_node="">56</span></a></sup><span data-dcnode-id="4753" instrument_node="">. In the context of sleep, however, the large-scale network evidence is mainly represented by static FC studies suggesting decreased information integration during N2 and N3 sleep using graph theory</span><sup data-dcnode-id="4747"><a aria-label="Reference 20" data-dcnode-id="4751" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d116695769e1504" title="Boly, M. et al. Hierarchical clustering of brain activity during human nonrapid eye movement sleep. Proc. Natl Acad. Sci. USA 109, 5856–5861 (2012)."><span data-dcnode-id="4752" instrument_node="">20</span></a><span data-dcnode-id="4750" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="4748" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d116695769e1507" title="Tagliazucchi, E. et al. Large-scale brain functional modularity is reflected in slow electroencephalographic rhythms across the human non-rapid eye movement sleep cycle. Neuroimage 70, 327–339 (2013)."><span data-dcnode-id="4749" instrument_node="">21</span></a></sup><span data-dcnode-id="4746" instrument_node="">, as well as a higher exploration of the structural connectome during wakefulness</span><sup data-dcnode-id="4743"><a aria-label="Reference 57" data-dcnode-id="4744" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d116695769e1512" title="Tagliazucchi, E., Crossley, N., Bullmore, E. T. &amp; Laufs, H. Deep sleep divides the cortex into opposite modes of anatomical–functional coupling. Brain Struct. Funct. 221, 4221–4234 (2016)."><span data-dcnode-id="4745" instrument_node="">57</span></a></sup><span data-dcnode-id="4742" instrument_node="">. Here, we have provided more direct evidence of a higher state repertoire in whole-brain dynamics during wakefulness.</span></p><p data-dcnode-id="4711"><span data-dcnode-id="4740" instrument_node="">The transition map identified a key trajectory from wakefulness in the red transition module to NREM sleep in the white transition module (see Fig.&nbsp;</span><a data-dcnode-id="4738" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="4739" instrument_node="">7d</span></a><span data-dcnode-id="4737" instrument_node="">), represented by the transition departing from the whole-brain network state with increased mean activation in the DMN. The proposed association between the DMN and inwardly directed mentation</span><sup data-dcnode-id="4731"><a aria-label="Reference 31" data-dcnode-id="4735" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d116695769e1522" title="Buckner, R. L., Andrews-Hanna, J. R. &amp; Schacter, D. L. The brain’s default network: anatomy, function, and relevance to disease. Ann. N. Y. Acad. Sci. 1124, 1–38 (2008)."><span data-dcnode-id="4736" instrument_node="">31</span></a><span data-dcnode-id="4734" instrument_node="">,</span><a aria-label="Reference 32" data-dcnode-id="4732" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d116695769e1525" title="Spreng, R. N., Mar, R. A. &amp; Kim, A. S. The common neural basis of autobiographical memory, prospection, navigation, theory of mind, and the default mode: a quantitative meta-analysis. J. Cogn. Neurosci. 21, 489–510 (2009)."><span data-dcnode-id="4733" instrument_node="">32</span></a></sup><span data-dcnode-id="4730" instrument_node=""> makes this finding intriguing, in the sense that it may suggest a role for the DMN as a ‘gate’ in the process of initiating sleep. Whole-brain network evidence of sleep initiation may improve our understanding of sleep disorders like insomnia where PSG criteria are difficult to apply</span><sup data-dcnode-id="4724"><a aria-label="Reference 7" data-dcnode-id="4728" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d116695769e1529" title="Manconi, M. et al. Measuring the error in sleep estimation in normal subjects and in patients with insomnia. J. Sleep Res. 19, 478–486 (2010)."><span data-dcnode-id="4729" instrument_node="">7</span></a><span data-dcnode-id="4727" instrument_node="">,</span><a aria-label="Reference 58" data-dcnode-id="4725" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d116695769e1532" title="Littner, M. et al. Practice parameters for using polysomnography to evaluate insomnia: an update. Sleep 26, 754–760 (2003)."><span data-dcnode-id="4726" instrument_node="">58</span></a></sup><span data-dcnode-id="4723" instrument_node="">, and hypersomnia disorders</span><sup data-dcnode-id="4720"><a aria-label="Reference 59" data-dcnode-id="4721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d116695769e1536" title="Larson-Prior, L. J., Ju, Y. E. &amp; Galvin, J. E. Cortical–subcortical interactions in hypersomnia disorders: mechanisms underlying cognitive and behavioral aspects of the sleep–wake cycle. Front. Neurol. 5, 165 (2014)."><span data-dcnode-id="4722" instrument_node="">59</span></a></sup><span data-dcnode-id="4719" instrument_node="">. Related hereto, a recent study identified switching instability to and from N2 sleep, together with difficulties reaching N3 sleep as important traits of insomnia</span><sup data-dcnode-id="4716"><a aria-label="Reference 60" data-dcnode-id="4717" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d116695769e1540" title="Wei, Y. et al. Sleep stage transition dynamics reveal specific stage 2 vulnerability in insomnia. Sleep 40, zsx117 (2017)."><span data-dcnode-id="4718" instrument_node="">60</span></a></sup><span data-dcnode-id="4715" instrument_node="">. In the transition map we saw N2- and N3-related whole-brain network states forming a strong triangular loop of transitions (see Fig.&nbsp;</span><a data-dcnode-id="4713" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig7"><span data-dcnode-id="4714" instrument_node="">7e</span></a><span data-dcnode-id="4712" instrument_node="">). This stable configuration of transitions may not be present in people suffering from insomnia.</span></p><p data-dcnode-id="4672"><span data-dcnode-id="4710" instrument_node="">The two main incongruities between the temporal segmentation suggested by the HMM and the PSG scoring concerned N1 sleep and WASO. N1 sleep did not correspond to any single state or any group of states identified by the HMM. This is likely related to the current consensus that PSG-defined N1 does not represent a clear-cut sleep stage</span><sup data-dcnode-id="4707"><a aria-label="Reference 61" data-dcnode-id="4708" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d116695769e1552" title="Carskadon, M. A. &amp; Dement, W. C. in Principles and Practice of Sleep Medicine5th edn&nbsp;(eds. Kryger, M. H., Roth T. &amp; Dement, W. C.) Ch. 2 (W.B. Saunders, Elsevier, Philadelphia, 2011)."><span data-dcnode-id="4709" instrument_node="">61</span></a></sup><span data-dcnode-id="4706" instrument_node="">, but rather an ill-understood mix of wakefulness and sleep. Compared to N2 and N3 sleep with their well-defined EEG spectral properties, such as K-complexes, spindles, and slow waves, N1 remains the most vaguely defined sleep stage within PSG. A recent report by the American Academy of Sleep Medicine (AASM) shows that staging of N1 is associated with the highest inter-rater scoring uncertainty of all PSG stages</span><sup data-dcnode-id="4703"><a aria-label="Reference 62" data-dcnode-id="4704" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d116695769e1556" title="Rosenberg, R. S. &amp; Van Hout, S. The American Academy of Sleep Medicine inter-scorer reliability program: sleep stage scoring. J. Clin. Sleep. Med. 9, 81–87 (2013)."><span data-dcnode-id="4705" instrument_node="">62</span></a></sup><span data-dcnode-id="4702" instrument_node="">. Furthermore, N1 sleep has proven the most difficult PSG stage to classify from fMRI FC information in machine-learning studies</span><sup data-dcnode-id="4696"><a aria-label="Reference 18" data-dcnode-id="4700" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d116695769e1560" title="Tagliazucchi, E. &amp; Laufs, H. Decoding wakefulness levels from typical fMRI resting-state data reveals reliable drifts between wakefulness and sleep. Neuron 82, 695–708 (2014)."><span data-dcnode-id="4701" instrument_node="">18</span></a><span data-dcnode-id="4699" instrument_node="">,</span><a aria-label="Reference 19" data-dcnode-id="4697" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d116695769e1563" title="Altmann, A. et al. Validation of non-REM sleep stage decoding from resting state fMRI using linear support vector machines. Neuroimage 125, 544–555 (2016)."><span data-dcnode-id="4698" instrument_node="">19</span></a></sup><span data-dcnode-id="4695" instrument_node="">. Addressing the microstructure of N1, a line of evoked response potential-studies have demonstrated a high degree of variability in the cortical processing of external stimuli during early NREM sleep (for reviews, see ref. </span><sup data-dcnode-id="4689"><a aria-label="Reference 63" data-dcnode-id="4693" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d116695769e1567" title="Colrain, I. M. &amp; Campbell, K. B. The use of evoked potentials in sleep research. Sleep Med. Rev. 11, 277–293 (2007)."><span data-dcnode-id="4694" instrument_node="">63</span></a><span data-dcnode-id="4692" instrument_node="">,</span><a aria-label="Reference 64" data-dcnode-id="4690" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d116695769e1570" title="Ogilvie, R. D. The process of falling asleep. Sleep Med. Rev. 5, 247–270 (2001)."><span data-dcnode-id="4691" instrument_node="">64</span></a></sup><span data-dcnode-id="4688" instrument_node="">). Phenomenologically, the sleep onset period is known to be rather complex, with varying mental content and responsiveness to sensory stimuli</span><sup data-dcnode-id="4682"><a aria-label="Reference 64" data-dcnode-id="4686" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d116695769e1574" title="Ogilvie, R. D. The process of falling asleep. Sleep Med. Rev. 5, 247–270 (2001)."><span data-dcnode-id="4687" instrument_node="">64</span></a><span data-dcnode-id="4685" instrument_node="">,</span><a aria-label="Reference 65" data-dcnode-id="4683" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d116695769e1577" title="Goupil, L. &amp; Bekinschtein, T. A. Cognitive processing during the transition to sleep. Arch. Ital. Biol. 150, 140–154 (2012)."><span data-dcnode-id="4684" instrument_node="">65</span></a></sup><span data-dcnode-id="4681" instrument_node="">, and authors have long argued against the assumed homogeneity found in PSG definitions of N1 sleep, an opposition exemplified by Hori’s proposal of nine stages of early sleep</span><sup data-dcnode-id="4678"><a aria-label="Reference 45" data-dcnode-id="4679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d116695769e1582" title="Hori, T. et al. Proposed supplements and amendments to ‘a manual of standardized terminology, techniques and scoring system for sleep stages of human subjects’, the Rechtschaffen &amp; Kales (1968) standard. Psychiatry Clin. Neurosci. 55, 305–310 (2001)."><span data-dcnode-id="4680" instrument_node="">45</span></a></sup><span data-dcnode-id="4677" instrument_node="">. If PSG-defined N1 does in fact represent a mix of wakefulness and sleep, this would explain why we found the highest range of whole-brain states during this PSG stage. While this primarily serves to underline the common notion that N1 is unlikely to be a reliable demarcation between wakefulness and sleep, the fact that the data-driven HMM was able to identify a transition module occurring between wakefulness and consolidated sleep (N2 and N3)—represented by whole-brain states characterised by subcortico-cortical decoupling consistent with intracortical evidence of brain activity during sleep onset</span><sup data-dcnode-id="4674"><a aria-label="Reference 41" data-dcnode-id="4675" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d116695769e1586" title="Magnin, M. et al. Thalamic deactivation at sleep onset precedes that of the cerebral cortex in humans. Proc. Natl Acad. Sci. USA 107, 3829–3833 (2010)."><span data-dcnode-id="4676" instrument_node="">41</span></a></sup><span data-dcnode-id="4673" instrument_node="">—suggests that an improved and principled categorisation of early sleep could be within reach.</span></p><p data-dcnode-id="4666"><span data-dcnode-id="4671" instrument_node="">PSG does not differentiate between brain activity prior to and after sleep onset. However, in line with the common subjective experience of grogginess when waking from sleep, behavioural experiments have shown cognitive deficits in the period following awakening. The term sleep inertia is often used to describe this phenomenon</span><sup data-dcnode-id="4668"><a aria-label="Reference 66" data-dcnode-id="4669" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d116695769e1593" title="Tassi, P. &amp; Muzet, A. Sleep inertia. Sleep Med. Rev. 4, 341–353 (2000)."><span data-dcnode-id="4670" instrument_node="">66</span></a></sup><span data-dcnode-id="4667" instrument_node="">. Our results confirm that falling asleep and waking up are two asymmetric processes, leading to two separated transition modules of whole-brain network states during wakefulness, with one more likely to occur after consolidated sleep. Like the N1-related findings discussed above, this too serves as a prime example of how information-rich neuroimaging data, when treated in a data-driven way, can be carefully evaluated in light of established knowledge (PSG in this case) to make new discoveries from, and categorisations of, brain activity. The presented findings point ahead to a research agenda making hypothesis-driven assessments of how the alternative, data-driven, temporal segmentations and dynamics of whole-brain networks across the NREM sleep cycle relate to sleep-behaviour and cognition, when the latter is measured independently of PSG (see Supplementary Discussion 3). Furthermore, there is scope for HMM explorations with higher temporal detail using electrophysiological modalities, such as magnetoencephalography (MEG) and high-density EEG (see Supplementary Discussion 3).</span></p><p data-dcnode-id="4646"><span data-dcnode-id="4665" instrument_node="">For further discussion about the reproducibility of our results across different numbers of states, different initialisations of the HMM, and different parcellation schemes, as well as discussion about our choice of data inclusion, pre-processing steps, such as spatial smoothing, and the use of the RETROICOR method to remove physiological signals from the fMRI data, we refer to the Supplementary Discussion 2, </span><a data-dcnode-id="4663" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4664" instrument_node="">Supplementary Notes</span></a><span data-dcnode-id="4662" instrument_node=""> 1–3, and Supplementary Figures&nbsp;</span><a data-dcnode-id="4660" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4661" instrument_node="">1</span></a><span data-dcnode-id="4659" instrument_node="">, </span><a data-dcnode-id="4657" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4658" instrument_node="">6</span></a><span data-dcnode-id="4656" instrument_node="">–</span><a data-dcnode-id="4654" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4655" instrument_node="">16</span></a><span data-dcnode-id="4653" instrument_node="">, and </span><a data-dcnode-id="4651" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4652" instrument_node="">22</span></a><span data-dcnode-id="4650" instrument_node="">–</span><a data-dcnode-id="4648" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4649" instrument_node="">25</span></a><span data-dcnode-id="4647" instrument_node="">.</span></p><p data-dcnode-id="4644"><span data-dcnode-id="4645" instrument_node="">In summary, the work presented here demonstrates how data-driven, temporally sensitive analyses of large-scale fMRI brain activity can be used to explore fundamental changes in behaviour and cognition, in the form of the wake-NREM sleep cycle. The results reveal a higher complexity of brain activity than what traditional sleep scoring—and neuroimaging relying strictly on PSG—can reveal. We projected the traditional stages of wakefulness and NREM sleep onto a probabilistic map of transitions between whole-brain network states. By studying these transitions we have shown a significant decrease in whole-brain dynamics during consolidated stages of NREM sleep; that brain activity prior to sleep is significantly different from just after sleep; that whole-brain network activity do not support traditional criteria to define N1 sleep; and that increased activity in the DMN might serve a gate-function for the entry into NREM sleep. By using fMRI data we have increased the spatiotemporal resolution of traditional NREM sleep stages, using a framework that should be sought expanded to include other fundamental changes in brain activity, such as REM sleep, sleep disorders, anaesthesia and psychedelic experiences. Finally, future work should aim to leverage even finer temporal details through modalities such as MEG and high-density EEG.</span></p></div></div></section><section data-dcnode-id="4377" data-title="Methods"><div class="c-article-section" data-dcnode-id="4378" id="Sec10-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4639" id="Sec10"><span data-dcnode-id="4640" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="4379" id="Sec10-content"><h3 class="c-article__sub-heading" data-dcnode-id="4637" id="Sec11"><span data-dcnode-id="4638" instrument_node="">Acquisition and processing of fMRI and PSG data</span></h3><p data-dcnode-id="4629"><span data-dcnode-id="4636" instrument_node="">fMRI was acquired on a 3 T system (Siemens Trio, Erlangen, Germany) with the following settings: 1505 volumes of T2*-weighted echo planar images with a repetition time (TR) of 2.08 s, and an echo time of 30 ms; matrix 64 × 64, voxel size 3 × 3 × 2 mm</span><sup data-dcnode-id="4634"><span data-dcnode-id="4635" instrument_node="">3</span></sup><span data-dcnode-id="4633" instrument_node="">, distance factor 50%, FOV 192 mm</span><sup data-dcnode-id="4631"><span data-dcnode-id="4632" instrument_node="">2</span></sup><span data-dcnode-id="4630" instrument_node="">.</span></p><p data-dcnode-id="4611"><span data-dcnode-id="4628" instrument_node="">The EPI data were realigned, normalised to MNI space, and spatially smoothed using a Gaussian kernel of 8 mm</span><sup data-dcnode-id="4626"><span data-dcnode-id="4627" instrument_node="">3</span></sup><span data-dcnode-id="4625" instrument_node=""> FWHM in SPM8 (</span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fil.ion.ucl.ac.uk/spm/"><span data-dcnode-id="4624" instrument_node="">http://www.fil.ion.ucl.ac.uk/spm/</span></a><span data-dcnode-id="4622" instrument_node="">). Spatial downsampling was then performed to a 4 × 4 × 4 mm resolution. From the simultaneously recorded ECG and respiration, cardiac- and respiratory-induced noise components were estimated using the RETROICOR method</span><sup data-dcnode-id="4619"><a aria-label="Reference 67" data-dcnode-id="4620" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d116695769e1650" title="Glover, G. H., Li, T. Q. &amp; Ress, D. Image-based method for retrospective correction of physiological motion effects in fMRI: RETROICOR. Magn. Reson. Med. 44, 162–167 (2000)."><span data-dcnode-id="4621" instrument_node="">67</span></a></sup><span data-dcnode-id="4618" instrument_node="">, and together with motion parameters these were regressed out of the signals. The data were temporally band-pass filtered in the range 0.01–0.1 Hz using a sixth-order Butterworth filter. Please note that the fMRI data were temporally filtered with no consideration of the later established PSG structure of the data. Hence, our findings of relative differences between the various PSG stages should not be affected by these pre-processing steps. We show that this is the case for the temporal filter in Supplementary Figure&nbsp;</span><a data-dcnode-id="4616" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4617" instrument_node="">16</span></a><span data-dcnode-id="4615" instrument_node="">, where the plots of Fig.&nbsp;</span><a data-dcnode-id="4613" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="4614" instrument_node="">3</span></a><span data-dcnode-id="4612" instrument_node=""> from the main text have been re-computed for an HMM with 19 states on BOLD data, which had not been temporally filtered.</span></p><p data-dcnode-id="4605"><span data-dcnode-id="4610" instrument_node="">Simultaneous PSG was performed through the recording of EEG, EMG, ECG, EOG, pulse oximetry and respiration. EEG was recorded using a cap (modified BrainCapMR, Easycap, Herrsching, Germany) with 30 channels, of which the FCz electrode was used as reference. The sampling rate of the EEG was 5 kHz, and a low-pass filter was applied at 250 Hz. MRI and pulse artefact correction were applied based on the average artefact subtraction method</span><sup data-dcnode-id="4607"><a aria-label="Reference 68" data-dcnode-id="4608" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d116695769e1663" title="Allen, P. J., Polizzi, G., Krakow, K., Fish, D. R. &amp; Lemieux, L. Identification of EEG events in the MR scanner: the problem of pulse artifact and a method for its subtraction. Neuroimage 8, 229–239 (1998)."><span data-dcnode-id="4609" instrument_node="">68</span></a></sup><span data-dcnode-id="4606" instrument_node=""> in Vision Analyzer2 (Brain Products, Germany). EMG was collected with chin and tibial derivations, and as the ECG and EOG recorded bipolarly at a sampling rate of 5 kHz with a low-pass filter at 1 kHz. Pulse oximetry was collected using the Trio scanner, and respiration with MR-compatible devices (BrainAmp MR+, BrainAmp ExG; Brain Products, Gilching, Germany).</span></p><p data-dcnode-id="4603"><span data-dcnode-id="4604" instrument_node="">Participants were instructed to lie still in the scanner with their eyes closed and relax. Sleep classification was performed by a sleep expert based on the EEG recordings in accordance with the AASM criteria (2007).</span></p><p data-dcnode-id="4597"><span data-dcnode-id="4602" instrument_node="">Results using the same data and the same preprocessing have previously been reported in ref. </span><sup data-dcnode-id="4599"><a aria-label="Reference 18" data-dcnode-id="4600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d116695769e1674" title="Tagliazucchi, E. &amp; Laufs, H. Decoding wakefulness levels from typical fMRI resting-state data reveals reliable drifts between wakefulness and sleep. Neuron 82, 695–708 (2014)."><span data-dcnode-id="4601" instrument_node="">18</span></a></sup><span data-dcnode-id="4598" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4595" id="Sec12"><span data-dcnode-id="4596" instrument_node="">Participants</span></h3><p data-dcnode-id="4589"><span data-dcnode-id="4594" instrument_node="">We used fMRI and PSG data from 57 participants taken from a larger data-base</span><sup data-dcnode-id="4591"><a aria-label="Reference 18" data-dcnode-id="4592" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d116695769e1686" title="Tagliazucchi, E. &amp; Laufs, H. Decoding wakefulness levels from typical fMRI resting-state data reveals reliable drifts between wakefulness and sleep. Neuron 82, 695–708 (2014)."><span data-dcnode-id="4593" instrument_node="">18</span></a></sup><span data-dcnode-id="4590" instrument_node="">. Exclusion criteria focussed on the quality of the concomitant acquisition of EEG, EMG, fMRI and physiological recordings. Written informed consent was obtained, and the study was approved by the ethics committee of the Faculty of Medicine at the Goethe University of Frankfurt, Germany.</span></p><p data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">Following the HMM decomposition, two different subsets of the solution were used for post hoc evaluation of the HMM. The first corresponded to the 18 participants that reached all four stages of PSG, and the second corresponded to the 31 participants that woke up after having reached consolidated sleep&nbsp;(the WASO group).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4585" id="Sec13"><span data-dcnode-id="4586" instrument_node="">HMM general overview</span></h3><p data-dcnode-id="4572"><span data-dcnode-id="4584" instrument_node="">In order to resolve dynamic whole-brain networks in the fMRI signals in a data-driven way, we applied a HMM</span><sup data-dcnode-id="4578"><a aria-label="Reference 24" data-dcnode-id="4582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1701" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="4583" instrument_node="">24</span></a><span data-dcnode-id="4581" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="4579" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e1704" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="4580" instrument_node="">27</span></a></sup><span data-dcnode-id="4577" instrument_node=""> to timecourses extracted from 90 ROIs defined by the cortical and subcortical areas of the AAL</span><sup data-dcnode-id="4574"><a aria-label="Reference 26" data-dcnode-id="4575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d116695769e1708" title="Tzourio-Mazoyer, N. et al. Automated anatomical labeling of activations in SPM using a macroscopic anatomical parcellation of the MNI MRI single-subject brain. Neuroimage 15, 273–289 (2002)."><span data-dcnode-id="4576" instrument_node="">26</span></a></sup><span data-dcnode-id="4573" instrument_node="">, however, please see Supplementary Note 1 for a demonstration of the robustness of our results using an alternative parcellation.</span></p><p data-dcnode-id="4551"><span data-dcnode-id="4571" instrument_node="">We used the FSL (</span><a data-dcnode-id="4569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fsl.fmrib.ox.ac.uk/fsl/fslwiki/"><span data-dcnode-id="4570" instrument_node="">https://fsl.fmrib.ox.ac.uk/fsl/fslwiki/</span></a><span data-dcnode-id="4568" instrument_node="">) function fslmeants to average over voxels within each ROI to get the representative timecourses. The participant-specific sets of 90 ROI-timecourses were demeaned, divided by their standard deviation, and concatenated across participants, yielding a data matrix of dimensions 90 × (57 × 1500), with 1500 samples corresponding to 52 min given a TR of 2.08 s. The HMM inference estimated a number of recurring discrete states, each of which was characterised by a unique configuration of data statistics. We employed a Gaussian HMM, implemented using the Matlab toolbox HMM-MAR (</span><a data-dcnode-id="4566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/OHBA-analysis/HMM-MAR"><span data-dcnode-id="4567" instrument_node="">https://github.com/OHBA-analysis/HMM-MAR</span></a><span data-dcnode-id="4565" instrument_node="">), such that each state was modelled as a multivariate normal distribution with first (mean activity) and second order statistics (covariance matrix). The parameters of the states were defined at the group level, whereas the state timecourses are defined for each subject separately. Therefore, the HMM inference identified periods of time of quasi-stationary activity, where the 90 ROI timecourses could be described by certain configurations of mean activity and FC. The HMM represents a tool for decomposing multivariate data into fewer dimensions. Given the high spatial dimensionality of fMRI, it is common to use principal component analysis (PCA) to reduce the number of parameters to be estimated in the decomposition, increasing the signal-to-noise ratio of the data and improving the robustness of the results</span><sup data-dcnode-id="4559"><a aria-label="Reference 24" data-dcnode-id="4563" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1729" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="4564" instrument_node="">24</span></a><span data-dcnode-id="4562" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="4560" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e1732" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="4561" instrument_node="">27</span></a></sup><span data-dcnode-id="4558" instrument_node="">. Accordingly, we submitted the demeaned, standardised and concatenated BOLD timecourses to PCA prior to the HMM inference. Keeping approximately 90% of the signal variance, we used the top 25 principal components (see Fig.&nbsp;</span><a data-dcnode-id="4556" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4557" instrument_node="">1</span></a><span data-dcnode-id="4555" instrument_node="">), yielding a data matrix of dimensions 25 × (57 × 1500), which were then fed to the HMM. An overview of the analysis workflow is given in Fig.&nbsp;</span><a data-dcnode-id="4553" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="4554" instrument_node="">1</span></a><span data-dcnode-id="4552" instrument_node=""> of the main text. For certain analyses, such as the MANOVA and the test for WASO-specific HMM states, we used subsets of the full set of HMM states.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4549" id="Sec14"><span data-dcnode-id="4550" instrument_node="">Choice of number of HMM states</span></h3><p data-dcnode-id="4537"><span data-dcnode-id="4548" instrument_node="">The HMM was implemented with variational Bayes inference, which was used to probabilistically estimate the state statistics and transition probabilities</span><sup data-dcnode-id="4542"><a aria-label="Reference 24" data-dcnode-id="4546" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1750" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="4547" instrument_node="">24</span></a><span data-dcnode-id="4545" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="4543" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e1753" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="4544" instrument_node="">27</span></a></sup><span data-dcnode-id="4541" instrument_node="">. The number of states of the HMM was a free parameter, which had to be chosen before further evaluation. Determining the number of states present in recordings of spontaneous brain activity is a non-trivial task, which may be approached in a number of ways. We ran the HMM for model orders spanning 4–45, and evaluated each solution by a number of summary statistics, the most important of which are plotted in Supplementary Figure&nbsp;</span><a data-dcnode-id="4539" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4540" instrument_node="">1</span></a><span data-dcnode-id="4538" instrument_node="">.</span></p><p data-dcnode-id="4522"><span data-dcnode-id="4536" instrument_node="">Supplementary Figure&nbsp;</span><a data-dcnode-id="4534" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4535" instrument_node="">1a</span></a><span data-dcnode-id="4533" instrument_node=""> shows the minimum free energy as a function of the HMM model order. The free energy is the statistical measure that is minimised during the (variational inference) Bayesian optimisation process. Technically speaking, it is an approximation of the model evidence, and includes two terms: how well the model fits the data, and the complexity of the model (measured as how much it departs from the prior distribution). Whereas the free energy is a reasonable criterion for choosing the ideal number of states for the HMM, its biological validity remains unclear in so far as the HMM does not represent a biophysical model. As apparent from the plot in Supplementary Figure&nbsp;</span><a data-dcnode-id="4531" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4532" instrument_node="">1a</span></a><span data-dcnode-id="4530" instrument_node="">, the minimum free energy was monotonically decreasing over the large range of tested numbers of states, showing no negative peaks. Hence, like in previous applications of the HMM</span><sup data-dcnode-id="4524"><a aria-label="Reference 24" data-dcnode-id="4528" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d116695769e1769" title="Vidaurre, D., Smith, S. M. &amp; Woolrich, M. W. Brain network dynamics are hierarchically organized in time. Proc. Natl Acad. Sci. USA 114, 12827–12832 (2017)."><span data-dcnode-id="4529" instrument_node="">24</span></a><span data-dcnode-id="4527" instrument_node="">,</span><a aria-label="Reference 27" data-dcnode-id="4525" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e1772" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="4526" instrument_node="">27</span></a></sup><span data-dcnode-id="4523" instrument_node="">, the free energy was not informative for choosing the number of states in our case.</span></p><p data-dcnode-id="4498"><span data-dcnode-id="4521" instrument_node="">We defined fractional occupancy as the temporal proportion of a recording, in which an HMM state was active</span><sup data-dcnode-id="4518"><a aria-label="Reference 27" data-dcnode-id="4519" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d116695769e1779" title="Vidaurre, D. et al. Discovering dynamic brain networks from big data in rest and task. Neuroimage 180(Pt 4), 646–656 (2018)."><span data-dcnode-id="4520" instrument_node="">27</span></a></sup><span data-dcnode-id="4517" instrument_node="">. In Supplementary Figure&nbsp;</span><a data-dcnode-id="4515" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4516" instrument_node="">1c</span></a><span data-dcnode-id="4514" instrument_node=""> is plotted the development of the median fractional occupancy across HMM states as a function of model order. While the curve decreases rapidly for low values of </span><i data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">K</span></i><span data-dcnode-id="4511" instrument_node="">, meaning that, as expected, each HMM state on average accounted for less of the total recording time as the number of states was increased, this trend ceased from around </span><i data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">K</span></i><span data-dcnode-id="4508" instrument_node=""> = 19. This stagnation for higher model orders was caused by the occurrence of ‘sporadic’ states, which modelled very (participant-) specific subparts of the data (see Supplementary Figure&nbsp;</span><a data-dcnode-id="4506" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4507" instrument_node="">6</span></a><span data-dcnode-id="4505" instrument_node="">). This phenomenon was also reflected in the development of the average HMM state lifetime, which too stabilised around the same value of </span><i data-dcnode-id="4503"><span data-dcnode-id="4504" instrument_node="">K</span></i><span data-dcnode-id="4502" instrument_node="">, as shown in Supplementary Figure&nbsp;</span><a data-dcnode-id="4500" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4501" instrument_node="">1d</span></a><span data-dcnode-id="4499" instrument_node="">.</span></p><p data-dcnode-id="4478"><span data-dcnode-id="4497" instrument_node="">To test whether the fMRI-based HMM states showed a significant relationship with the EEG-based sleep scoring, we used a multivariate analysis of variance (MANOVA). The built-in MATLAB function manova1 provided the summary statistic Wilk’s </span><i data-dcnode-id="4495"><span data-dcnode-id="4496" instrument_node="">Λ</span></i><span data-dcnode-id="4494" instrument_node="">, which described how well the </span><i data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">K</span></i><span data-dcnode-id="4491" instrument_node=""> number of HMM state timecourses could be grouped according to the sleep scoring. In order to test if the relationship was significant, we performed MANOVA’s on 1000 permuted cases of the sleep scoring, collecting the Wilk’s </span><i data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">Λ</span></i><span data-dcnode-id="4488" instrument_node=""> for each run. Each permutation was constructed, such that the original stage transition points, stage counts, and periods were preserved, while the sleep-stage labelling of each of these periods was shuffled randomly within participants. For each permutation, each participant thus retained the same sleep stages, but the temporal orderings of these were random. Supplementary Figure&nbsp;</span><a data-dcnode-id="4486" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4487" instrument_node="">1b</span></a><span data-dcnode-id="4485" instrument_node=""> plots Wilk’s </span><i data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">Λ</span></i><span data-dcnode-id="4482" instrument_node=""> as a function of the HMM model order for both the original sleep scoring and the permuted cases. For number of states above </span><i data-dcnode-id="4480"><span data-dcnode-id="4481" instrument_node="">K</span></i><span data-dcnode-id="4479" instrument_node=""> = 7, the HMM state timecourses were grouped significantly better by the original compared to the permuted sleep scoring. This result suggests that only when using more than seven states, the HMM identified states with a significant dependency on the PSG scoring.</span></p><p data-dcnode-id="4467"><span data-dcnode-id="4477" instrument_node="">The results in Supplementary Figure&nbsp;</span><a data-dcnode-id="4475" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4476" instrument_node="">1b–d</span></a><span data-dcnode-id="4474" instrument_node=""> are computed from a subset of the HMM solutions corresponding to the participants including all four available PSG stages (18 participants with: wakefulness, N1 sleep, N2 sleep, and N3, see right part of Supplementary Table&nbsp;</span><a data-dcnode-id="4472" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode-id="4473" instrument_node="">1</span></a><span data-dcnode-id="4471" instrument_node="">). This was done to minimise the unevenness in the representation of PSG stages. Based on the evaluations above, we concluded that the HMM was able to, in data-driven fashion, estimate the temporal structure given by the EEG-based sleep scoring for model orders above 7. We chose </span><i data-dcnode-id="4469"><span data-dcnode-id="4470" instrument_node="">K</span></i><span data-dcnode-id="4468" instrument_node=""> = 19 states, because increasing the number of states above this point mainly resulted in the addition of HMM states of low-fractional occupancy and participant-specific occurrences.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="4465" id="Sec15"><span data-dcnode-id="4466" instrument_node="">Significance testing</span></h3><p data-dcnode-id="4430"><span data-dcnode-id="4464" instrument_node="">In order to evaluate the PSG-sensitivity and -specificity, we used paired </span><i data-dcnode-id="4462"><span data-dcnode-id="4463" instrument_node="">t</span></i><span data-dcnode-id="4461" instrument_node=""> tests to test for significant differences within the HMM states. As such, with the original PSG stages, we compared the sensitivity and the specificity, respectively, for W, N1, N2 and N3 within each HMM state for the 18 participants that included all of these four stages. This yielded six comparisons within each HMM state (W-vs.-N1, W-vs.-N2, W-vs.-N3, N1-vs.-N2, N1-vs.-N3, N2-vs.-N3), for both the sensitivity and specificity measures, and each of these comparisons was associated with a </span><i data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">t</span></i><span data-dcnode-id="4458" instrument_node="">-statistic. To test if these </span><i data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">t</span></i><span data-dcnode-id="4455" instrument_node="">-statistics were larger than random, we used permutation testing as explained above (see section Choice of number of HMM states), where the EEG-based sleep scoring vector was permuted 1000 times with number of PSG stages and periods kept constant, but with their temporal order randomly shuffled within each participant. We computed the PSG-sensitivity and -specificity for each permutation and performed paired </span><i data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">t</span></i><span data-dcnode-id="4452" instrument_node=""> tests for every case. The resulting </span><i data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">t</span></i><span data-dcnode-id="4449" instrument_node="">-statistics were used to build null-distributions, and the original </span><i data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">t</span></i><span data-dcnode-id="4446" instrument_node="">-statistics were compared against these to get </span><i data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">p</span></i><span data-dcnode-id="4443" instrument_node=""> values for the original tests. The bar plots of PSG-sensitivity and -specificity in Fig.&nbsp;</span><a data-dcnode-id="4441" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4442" instrument_node="">3a</span></a><span data-dcnode-id="4440" instrument_node="">, b of the main text include line crossbars indicating the cases with </span><i data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">p</span></i><span data-dcnode-id="4437" instrument_node=""> values &lt; 0.01 (paired </span><i data-dcnode-id="4435"><span data-dcnode-id="4436" instrument_node="">t</span></i><span data-dcnode-id="4434" instrument_node=""> tests with permutations). Please note that the use of paired </span><i data-dcnode-id="4432"><span data-dcnode-id="4433" instrument_node="">t</span></i><span data-dcnode-id="4431" instrument_node=""> tests ensured that the identified differences were consistent within participants, and not merely as a group effect.</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4429" instrument_node="">We evaluated the hypothesis that certain HMM states had higher activity in periods of wakefulness after sleep onset (WASO) by considering the subgroup of participants that, according to PSG scoring, woke up after having reached N2 sleep. This corresponded to 31 participants, and we defined WASO as polysomnographically estimated periods of wakefulness that followed N2 sleep. From here we followed the same steps outlines above for the original PSG stages, and the results are shown in Supplementary Figure&nbsp;</span><a data-dcnode-id="4427" data-track="click" data-track-action="supplementary material anchor" data-track-label="link" href="#MOESM1"><span data-dcnode
