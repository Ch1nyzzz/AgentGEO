</span><picture data-dcnode-id="2492" style="display: none;"><source data-dcnode-id="2494" data-srcset="//cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_180x.jpg?v=1604510164 180w 120h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_360x.jpg?v=1604510164 360w 240h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_540x.jpg?v=1604510164 540w 360h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_720x.jpg?v=1604510164 720w 480h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_900x.jpg?v=1604510164 900w 600h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_1080x.jpg?v=1604510164 1080w 719h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep.jpg?v=1604510164 1201w 800h" sizes="757px" srcset="//cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_180x.jpg?v=1604510164 180w 120h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_360x.jpg?v=1604510164 360w 240h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_540x.jpg?v=1604510164 540w 360h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_720x.jpg?v=1604510164 720w 480h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_900x.jpg?v=1604510164 900w 600h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep_1080x.jpg?v=1604510164 1080w 719h, //cdn.shopify.com/s/files/1/0504/3542/4417/articles/what_is_nrem_sleep.jpg?v=1604510164 1201w 800h"><img alt="" class="lazyautosizes lazyloaded" data-dcnode-id="2493" data-parent-fit="cover" data-sizes="auto" sizes="757px"></picture></div><div class="rte" data-dcnode-id="2326"><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2487"><span data-dcnode-id="2489" style="font-weight: 400;"></span><span data-dcnode-id="2488" instrument_node="">Congratulations! You’ve found your way to the ingredients list of sleep. Having a clear sense of the constituents of sleep is a good place to start in the commendable journey towards identifying what constitutes quality sleep.&nbsp;</span></p><span data-dcnode-id="2486" instrument_node="">
</span><p data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Unlike what scientists thought way back when, sleep isn’t just one long stint of coma-like unconsciousness. Like any good recipe, a restful night of sleep is composed of a few primary ingredients added together in a particular order and in the right ratio.&nbsp;</span></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">The right amount of sleep is essential for your body to recover from the stresses of your daily activities and process new ideas. Sleep is comprised of subcomponents called stages, defined primarily by electrical activity in the brain. While you’re asleep, you cycle through these different sleep stages in a particular order.&nbsp;</span></p><span data-dcnode-id="2480" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">There are two main types of sleep, during which, you accomplish different outcomes for the body and mind. The two types include non-rapid eye movement (NREM) and rapid eye movement (REM). You can read about REM sleep in this article.&nbsp;</span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">NREM sleep is made up of three distinct stages. Each NREM stage is similar, but they serve different purposes. What is the purpose of NREM sleep in your life? How do you know that you’re getting enough NREM sleep? Let’s find out.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><h2 data-dcnode-id="2472"><span data-dcnode-id="2473" instrument_node="">What is NREM sleep?</span></h2><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">NREM sleep accounts for three of the four sleep stages in one sleep cycle. There are three distinct NREM stages and one REM stage per cycle.&nbsp;</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Each of these NREM sleep stages can vary in length from five to 60 minutes of your total 90-minute sleep cycle. The longest of these sleep stages being stage 2 of NREM, which comprises approximately 40-60% of total sleep time.&nbsp;&nbsp;</span></p><span data-dcnode-id="2465" instrument_node="">
</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">You might have read elsewhere that there are four NREM stages and here we are saying that there are only three. As recently as 2008 the American Academy of Sleep Medicine decided that the difference between NREM stage three and stage four was inconsequential and started referring to them both as N3. You might also see it here and there as N3 (and N4), and in some cases, some still use N4 — apparently old habits die hard.&nbsp;</span></p><span data-dcnode-id="2462" instrument_node="">
</span><h2 data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">NREM Stages</span></h2><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Each night you cycle through all of the sleep stages between five to six times over a period of seven to nine hours. For each complete cycle, you move from N1 to N2, N3, and finally to REM.&nbsp;</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Each stage of NREM sleep is slightly different, but there are some similar characteristics of these stages of sleep.&nbsp;</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">In the later stages: your body relaxes, blood pressure drops, brain activity slows, and you fall into a deep sleep. You can dream in all stages of NREM, but the dreams won’t be as vivid and fantastical as they would in REM sleep.&nbsp;</span></p><span data-dcnode-id="2450" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2449" instrument_node="">Here’s what happens in each of the stages.</span></p><span data-dcnode-id="2447" instrument_node="">
</span><h3 data-dcnode-id="2445"><span data-dcnode-id="2446" instrument_node="">NREM 1</span></h3><span data-dcnode-id="2444" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2443" instrument_node="">This is a very light stage of sleep that starts your sleep cycle. So, you can consider this the transition to sleep, when you first dose off. This sleep is very light.&nbsp;</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Picture the guy on the bus whose head keeps on flopping over and then righting itself. You know who I’m talking about, if you haven’t been on a bus lately, this guy also flies and takes trains. He’s alert enough to pull his head to a normal upright position, but just asleep enough to drool on his shoulder. Sound familiar?&nbsp;</span></p><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">During this type of sleep, your brain creates high amplitude theta waves. These are also known as slow brain waves, not to be confused with delta waves. These theta waves are at a frequency similar to that of daydreaming or open road freeway driving.&nbsp;</span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Stage N1 sleep only lasts between five to 10 minutes. If you wake someone up during NREM 1, they might not think that they were actually asleep.&nbsp;</span></p><span data-dcnode-id="2432" instrument_node="">
</span><h3 data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">NREM 2</span></h3><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">This is the second stage of sleep. During this stage, your body temperature drops and your heart rate and breathing slow, deepen and become more regular.&nbsp;</span></p><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">In stage N2 you shift to a deeper sleep and your muscles relax. This stage of sleep lasts for around 20 minutes. N2 is the sleep stage you spend most of your time, approximately half of the total sleep time.</span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">Sleep spindles and K-complexes are also produced during this stage of sleep. Sleep spindles are a type of high-frequency burst of brain activity that occurs at the end of a slow wave, while K-complexes are high-amplitude peaks of activity that usually precede sleep spindles.&nbsp;</span></p><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">These events can be measured on an EEG (electroencephalogram) and are thought to occur in order to shield the brain from external noises. The more frequent the sleep spindles, the more resilient a sleeper is to external noises that may awaken them.&nbsp;</span></p><span data-dcnode-id="2417" instrument_node="">
</span><h3 data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">NREM 3</span></h3><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">NREM 3 is the deepest level of sleep for your body. This stage is often known as the delta sleep stage, because your brain produces delta waves. These waves are the slowest frequency of brain waves, approximately ten times slower than brain activity while you are awake.&nbsp;</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Stage N3 sleep is often also called deep sleep, delta sleep or slow-wave sleep (SWS). In NREM 3, you wouldn’t be bothered as easily by noises or outside stimulus as you might in other sleep stages.&nbsp;</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">In this stage of sleep your body continues to relax and your blood pressure drops. Your breathing rate drops as well. Your muscles aren’t paralyzed in this stage, however, which is why parasomnias such as sleepwalking and night terrors can occur in this stage.&nbsp;</span></p><span data-dcnode-id="2405" instrument_node="">
</span><h2 data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">REM vs NREM sleep</span></h2><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">During REM sleep your dreams become more fantastic and your brain becomes highly active, even more active than during wakefulness. This is the part of your sleep where your brain forms memories and addresses emotional stress. REM sleep is healing for your brain, where NREM sleep is seen as healing for the body.</span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Your body enters REM sleep about 90 minutes after you fall asleep. You need to go through all three stages of NREM sleep before you enter REM.&nbsp;</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">During NREM sleep, your brain produces slower brain waves that are associated with a deeper sleep. So, it is easier to wake up from your REM sleep stage than N3 stage. It’s during the N3 stage that your brain is least active but most collaborative. These slow brain waves ripple across the brain, allowing disparate brain regions to communicate and transfer information. This in part is why this phase of sleep is so crucial for memory consolidation, where our brains store and strengthen new memories and skills. Without adequate deep sleep, we would never be able to learn new skills or transfer short-term memories into more resilient long-term ones.</span></p><span data-dcnode-id="2393" instrument_node="">
</span><p data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">NREM sleep is also the time that tissues in the body are repaired and your heart and vascular system get a break. Since your body is resting, it doesn’t require as much work from your organ systems. So, NREM sleep is seen as a time that your body gets to repair and restore itself. In REM sleep, the body builds bones and restores tissues thanks to a heavy secretion of human growth hormone, the great healer of the body. The immune system is likewise strengthened and restored.&nbsp;</span></p><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">When you get older your body spends less time in NREM sleep, which is linked to more physical issues as you age. Sleepers under 30 years old might get around two hours of NREM sleep a night, while those over 65 years of age get around 30 minutes.&nbsp;</span></p><span data-dcnode-id="2387" instrument_node="">
</span><h2 data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">How much NREM sleep is normal?</span></h2><span data-dcnode-id="2384" instrument_node="">
</span><p data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">We get most of our NREM sleep earlier in the night, and then the balance shifts towards longer REM cycles towards the early morning. Everybody is different, but it is recommended that you get between seven and nine hours of sleep a night. In order to get your best deep sleep, aim to be in bed before early morning, possibly 11pm or earlier. If you wake up groggy, or you don’t have enough energy to get through your day, you might have a poor sleep schedule.&nbsp;</span></p><span data-dcnode-id="2381" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">In most cases, you cycle through all of the stages of sleep within 90-120 minutes of falling asleep. The seven to nine hours of sleep recommended per night by experts usually translates to five to six complete sleep cycles composed of roughly 75-80% NREM sleep.&nbsp;</span></p><span data-dcnode-id="2378" instrument_node="">
</span><h2 data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">What is the deepest level of sleep in your sleep cycle?</span></h2><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Even though we spend much of our sleep cycle in NREM 2 each night, it’s actually NREM 3 where we get our deepest sleep. This sleep stage is also referred to as restorative sleep. Our blood pressure drops because our blood flows out to our tissues and muscles.&nbsp;</span></p><span data-dcnode-id="2372" instrument_node="">
</span><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">We spend around 20% of the night in this sleep stage, and we sleep deeper during the first half of the night. Since this is the sleep stage for the deepest sleep, it can be difficult waking sleepers from N3. It also starts out as longer cycles and shortens over the night.&nbsp;</span></p><span data-dcnode-id="2369" instrument_node="">
</span><h2 data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">How does your sleep cycle change with age?</span></h2><span data-dcnode-id="2366" instrument_node="">
</span><p data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">The architecture of your sleep shifts throughout your life, which makes sense if you think about the life of a baby versus an adult. As a newborn, you don’t really have sleep waves, and you spend most of your time in active sleep, the baby version of REM sleep. This is important because babies need to wake up to feed and get their diapers changed.&nbsp;</span></p><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Toddlers have fully developed sleep patterns with sleep stages. Then, as an adult, sleep cycles become more challenging. It can take more time to fall asleep, and elderly sleepers frequently wake up in the middle of the night and achieve less deep sleep.&nbsp;</span></p><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Even though your body needs a similar amount of sleep your entire life, it can be hard to get this sleep without the assistance of sleep aids.&nbsp;&nbsp;</span></p><span data-dcnode-id="2357" instrument_node="">
</span><h2 data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">The bigger picture: sleep cycle</span></h2><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">While NREM sleep makes up approximately 75% of the time you spend sleeping, getting a better sense of sleep cycles can give you a clearer picture of what constitutes quality sleep. You can learn more about sleep cycles here. Also, check out this article on REM sleep.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">For more on how to improve your sleep through sleep hygiene, read this. For details about traditional Chinese medicine looks at sleep, check this out.</span></p><span data-dcnode-id="2348" instrument_node="">
</span><h3 data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">Glossary</span></h3><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2340"><b data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">REM sleep: </span></b><span data-dcnode-id="2341" style="font-weight: 400;"><span data-dcnode-id="2342" instrument_node="">One of the two fundamental sleep states, along with NREM (Non-rapid eye movement) sleep. It is known as dream sleep, due to the presence of many dreams during this period. It is characterized by rapid eye movements, desynchronized brain waves, low muscle tone, and irregular breathing and heart rate compared to NREM sleep.</span></span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2333"><span data-dcnode-id="2338" style="font-weight: 400;"></span><b data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Sleep Spindles: </span></b><span data-dcnode-id="2334" style="font-weight: 400;"><span data-dcnode-id="2335" instrument_node="">Bursts of neural activity with a frequency of 11-16Hz during stage 2 NREM sleep. Thought to play a role in memory consolidation and shielding the brain from awakening from external sensory stimuli</span></span></p><span data-dcnode-id="2332" instrument_node="">
</span><br data-dcnode-id="2331"><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2327" instrument_node="">

ode-id="282" instrument_node="">日本語</span></span><span data-dcnode-id="280" instrument_node=""> </span></div><span data-dcnode-id="278" instrument_node=""> </span></div><span data-dcnode-id="276" instrument_node="">
</span></div><span data-dcnode-id="274" instrument_node=""> </span></div><span data-dcnode-id="272" instrument_node=""> </span></div><span data-dcnode-id="270" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="88" tabindex="0"><span data-dcnode-id="268" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="267"></div><span data-dcnode-id="266" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="90" role="dialog"><span data-dcnode-id="265" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="261" role="button" tabindex="0"><span data-dcnode-id="264" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="263"></i><span data-dcnode-id="262" instrument_node=""> </span></span><span data-dcnode-id="260" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="92"><span data-dcnode-id="259" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="94"><strong class="acsb-title-main" data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Compliance status</span></strong><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="252"><span data-dcnode-id="253" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="251" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="239" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="233" instrument_node="">
</span><ol data-dcnode-id="207"><span data-dcnode-id="232" instrument_node="">
</span><li data-dcnode-id="220"><strong class="acsb-title" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="229" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="228"><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="225"><br data-dcnode-id="224"><span data-dcnode-id="223" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="222"><br data-dcnode-id="221"></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="209"><strong class="acsb-title" data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="216" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="215"><br data-dcnode-id="214"><span data-dcnode-id="213" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="212"><br data-dcnode-id="211"><span data-dcnode-id="210" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="208" instrument_node="">
</span></ol><span data-dcnode-id="206" instrument_node="">
</span><strong data-dcnode-id="203" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="204" lang="EN-US"><span data-dcnode-id="205" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="202" instrument_node="">
</span><ul data-dcnode-id="170"><span data-dcnode-id="201" instrument_node="">
</span><li data-dcnode-id="197"><strong class="acsb-title" data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="198" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="196" instrument_node="">
</span><li data-dcnode-id="192"><strong class="acsb-title" data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="193" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="191" instrument_node="">
</span><li data-dcnode-id="187"><strong class="acsb-title" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="188" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="186" instrument_node="">
</span><li data-dcnode-id="182"><strong class="acsb-title" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="183" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="177"><strong class="acsb-title" data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="178" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="176" instrument_node="">
</span><li data-dcnode-id="172"><strong class="acsb-title" data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="173" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="171" instrument_node="">
</span></ul><span data-dcnode-id="169" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="166"><span data-dcnode-id="167" lang="EN-US"><span data-dcnode-id="168" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="165" instrument_node="">
</span><ol data-dcnode-id="107"><span data-dcnode-id="164" instrument_node="">
</span><li data-dcnode-id="157"><strong class="acsb-title" data-dcnode-id="160"><span data-dcnode-id="162" lang="EN-US"><span data-dcnode-id="163" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="161" instrument_node="">–</span></strong><span data-dcnode-id="158" lang="EN-US"><span data-dcnode-id="159" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="156" instrument_node="">
</span><li data-dcnode-id="149"><span data-dcnode-id="152" lang="EN-US"><strong class="acsb-title" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="153" instrument_node="">&nbsp;</span></span><span data-dcnode-id="150" lang="EN-US"><span data-dcnode-id="151" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="148" instrument_node="">
</span><li data-dcnode-id="142"><span data-dcnode-id="144" lang="EN-US"><strong class="acsb-title" data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Animations –</span></strong><span data-dcnode-id="145" instrument_node="">&nbsp;</span></span><span data-dcnode-id="143" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="141" instrument_node="">
</span><li data-dcnode-id="134"><span data-dcnode-id="137" lang="EN-US"><strong class="acsb-title" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="138" instrument_node="">&nbsp;</span></span><span data-dcnode-id="135" lang="EN-US"><span data-dcnode-id="136" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="133" instrument_node="">
</span><li data-dcnode-id="126"><span data-dcnode-id="129" lang="EN-US"><strong class="acsb-title" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="130" instrument_node="">&nbsp;</span></span><span data-dcnode-id="127" lang="EN-US"><span data-dcnode-id="128" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="125" instrument_node="">
</span><li data-dcnode-id="118"><span data-dcnode-id="121" lang="EN-US"><strong class="acsb-title" data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="122" instrument_node="">&nbsp;</span></span><span data-dcnode-id="119" lang="EN-US"><span data-dcnode-id="120" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="117" instrument_node="">
</span><li data-dcnode-id="109"><strong class="acsb-title" data-dcnode-id="114"><span data-dcnode-id="115" lang="EN-US"><span data-dcnode-id="116" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="110" lang="EN-US"><strong class="acsb-title" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">–</span></strong><span data-dcnode-id="111" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="108" instrument_node="">
</span></ol><span data-dcnode-id="106" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="104"><span data-dcnode-id="105" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="103" instrument_node="">
</span><p data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="100" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="98"><span data-dcnode-id="99" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="97" instrument_node="">
</span><p data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="93" instrument_node=""> </span></div><span data-dcnode-id="91" instrument_node=""> </span></div><span data-dcnode-id="89" instrument_node="">
