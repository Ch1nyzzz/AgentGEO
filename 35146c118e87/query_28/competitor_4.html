</span><h1 class="headline heading-content margin-8-top" data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Why Dreaming May Be Important for Your Health</span></h1><span data-dcnode-id="1255" instrument_node="">
</span></div><span data-dcnode-id="1253" instrument_node=""> </span></div><span data-dcnode-id="1251" instrument_node="">
</span></div><span data-dcnode-id="1249" instrument_node="">

</span><div aria-label="Video Player" class="jwplayer jw-reset jw-state-setup jw-stretch-uniform jw-flag-aspect-mode" data-dcnode-id="1223" id="jw-1BWlFwPe-0a5f457d-eea5-4517-afc5-9a62ac2a89ba" role="application" style="width: 100%;" tabindex="0"><div class="jw-aspect jw-reset" data-dcnode-id="1241" style="padding-top: 56.25%;"></div><div class="jw-wrapper jw-reset" data-dcnode-id="1226"><div class="jw-top jw-reset" data-dcnode-id="1240"></div><div class="jw-aspect jw-reset" data-dcnode-id="1239" style="padding-top: 56.25%;"></div><div class="jw-media jw-reset" data-dcnode-id="1238"></div><div class="jw-preview jw-reset" data-dcnode-id="1237"></div><div class="jw-captions jw-reset" data-dcnode-id="1234"><div class="jw-captions-window jw-reset" data-dcnode-id="1235"><span class="jw-captions-text jw-reset" data-dcnode-id="1236"></span></div></div><div class="jw-title jw-reset-text" data-dcnode-id="1231" dir="auto"><div class="jw-title-primary jw-reset-text" data-dcnode-id="1233"></div><div class="jw-title-secondary jw-reset-text" data-dcnode-id="1232"></div></div><div class="jw-overlays jw-reset" data-dcnode-id="1230"></div><div class="jw-hidden-accessibility" data-dcnode-id="1227"><span aria-live="assertive" class="jw-time-update" data-dcnode-id="1229"></span><span aria-live="assertive" class="jw-volume-update" data-dcnode-id="1228"></span></div></div><div class="afs_ads ad-placement" data-dcnode-id="1224" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="1225" instrument_node="">&nbsp;</span></div></div><span data-dcnode-id="1222" instrument_node="">

</span><div class="author scale-12 padded margin-24-tb clearfix" data-dcnode-id="1200"><span data-dcnode-id="1213" instrument_node="">
</span><div class="author-text" data-dcnode-id="1202" data-tracking-zone="author"><span data-dcnode-id="1212" instrument_node="">
</span><div class="padding-8-right author-byline" data-dcnode-id="1207"><span data-dcnode-id="1211" instrument_node="">
                    By 
                        </span><a class="bold author-name" data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/author/amanda-macmillan/"><span data-dcnode-id="1210" instrument_node="">
                          Amanda MacMillan
                        </span></a><span data-dcnode-id="1208" instrument_node="">
</span></div><span data-dcnode-id="1206" instrument_node="">
</span><div class="timestamp published-date padding-12-left" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">
                  October 27, 2017 11:55 AM EDT
                </span></div><span data-dcnode-id="1203" instrument_node="">
</span></div><span data-dcnode-id="1201" instrument_node="">
</span></div><span data-dcnode-id="1199" instrument_node="">
</span><span data-dcnode-id="1197" instrument_node="">
</span><div class="article content body clearfix" data-dcnode-id="885" data-tracking-zone="body" id="article-body"><span data-dcnode-id="1196" instrument_node="">
</span><div class="padded" data-dcnode-id="887"><span data-dcnode-id="1195" instrument_node="">
</span><p data-dcnode-id="1191"><span class="dropcap" data-dcnode-id="1193" role="presentation"><span data-dcnode-id="1194" instrument_node="">D</span></span><span data-dcnode-id="1192" instrument_node="">octors have warned for years that Americans are not getting enough sleep, with health consequences ranging from drowsy driving and irritability to an increased risk of dementia, heart disease and early death. Now, a recent study suggests that one particular type of sleep may be especially important when it comes to how the brain responds to stressful situations.</span></p><span data-dcnode-id="1190" instrument_node=""> </span><p data-dcnode-id="1183"><span data-dcnode-id="1189" instrument_node="">The research, </span><a data-dcnode-id="1185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//dx.doi.org/10.1523/JNEUROSCI.0578-17.2017" target="_blank"><span data-dcnode-id="1188" instrument_node="">published in the </span><em data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Journal of Neuroscience</span></em></a><span data-dcnode-id="1184" instrument_node="">, found that people who spent more time in rapid-eye-movement (REM) sleep — the phase when dreaming occurs — had lower fear-related brain activity when they were given mild electric shocks the next day. The findings suggest that getting sufficient REM sleep prior to fearful experiences may make a person less prone to developing post-traumatic stress disorder (PTSD), the authors hypothesize.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1180" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_1" role="complementary"><span data-dcnode-id="1181" instrument_node="">
</span></div><span data-dcnode-id="1179" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1177" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_1" role="complementary"><span data-dcnode-id="1178" instrument_node="">
</span></div><span data-dcnode-id="1176" instrument_node="">
</span><p data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">The study isn’t the first to suggest that REM sleep delivers unique benefits. Some experts even believe that it’s actually a lack of REM sleep and a lack of dreaming — rather than just poor sleep in general — that’s responsible for many of the health problems Americans suffer from today. Here’s what scientists know so far — and what they suspect — about REM sleep, dreams and what happens when people are deprived of both.</span></p><span data-dcnode-id="1173" instrument_node=""> </span><div class="component video-jw" data-dcnode-id="1148" data-description="MONEY VIDEO" data-media-id="pXVzXiJY" data-player-id="1BWlFwPe" data-playlist-id="" data-title="What Highly Successful People Do Right Before They Go To Bed"><span data-dcnode-id="1172" instrument_node="">
</span><div class="partial aspect-ratio-box" data-dcnode-id="1150" style="--aspect-ratio:1.7777777777777777; --mobile-aspect-ratio:1.7777777777777777;"><span data-dcnode-id="1171" instrument_node="">
</span><div aria-label="Video Player" class="jwplayer jw-reset jw-state-setup jw-stretch-uniform jw-flag-aspect-mode" data-dcnode-id="1152" id="jw-1BWlFwPe-76324419-38f3-4021-bce3-6150fa7c2f6d" role="application" style="width: 100%;" tabindex="0"><div class="jw-aspect jw-reset" data-dcnode-id="1170" style="padding-top: 56.25%;"></div><div class="jw-wrapper jw-reset" data-dcnode-id="1155"><div class="jw-top jw-reset" data-dcnode-id="1169"></div><div class="jw-aspect jw-reset" data-dcnode-id="1168" style="padding-top: 56.25%;"></div><div class="jw-media jw-reset" data-dcnode-id="1167"></div><div class="jw-preview jw-reset" data-dcnode-id="1166"></div><div class="jw-captions jw-reset" data-dcnode-id="1163"><div class="jw-captions-window jw-reset" data-dcnode-id="1164"><span class="jw-captions-text jw-reset" data-dcnode-id="1165"></span></div></div><div class="jw-title jw-reset-text" data-dcnode-id="1160" dir="auto"><div class="jw-title-primary jw-reset-text" data-dcnode-id="1162"></div><div class="jw-title-secondary jw-reset-text" data-dcnode-id="1161"></div></div><div class="jw-overlays jw-reset" data-dcnode-id="1159"></div><div class="jw-hidden-accessibility" data-dcnode-id="1156"><span aria-live="assertive" class="jw-time-update" data-dcnode-id="1158"></span><span aria-live="assertive" class="jw-volume-update" data-dcnode-id="1157"></span></div></div><div class="afs_ads ad-placement" data-dcnode-id="1153" style="width: 1px; height: 1px; position: absolute; background: transparent;"><span data-dcnode-id="1154" instrument_node="">&nbsp;</span></div></div><span data-dcnode-id="1151" instrument_node="">
</span></div><span data-dcnode-id="1149" instrument_node=""> </span></div><span data-dcnode-id="1147" instrument_node="">
</span><h2 data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">What happens during REM sleep?</span></h2><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">Sleep involves five distinct phases, which the brain and body cycle through several times during the night. The first four phases involve a transition from shallow to deep sleep, while the fifth phase, REM sleep, involves heightened brain activity and vivid dreams.</span></p><span data-dcnode-id="1141" instrument_node=""> </span><p data-dcnode-id="1134"><span data-dcnode-id="1140" instrument_node="">REM sleep stages tend to be relatively short during the first two-thirds of the night as the body prioritizes deeper, slow-wave sleep. And because longer periods of REM sleep only happen during the final hours of sleep (in the early morning, for most people), it can get cut off when you don’t spend a full seven or eight hours in bed, says psychologist Rubin Naiman, a sleep and dream specialist at the University of Arizona Center for Integrative Medicine and the author of a </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/nyas.13447/abstract" target="_blank"><span data-dcnode-id="1139" instrument_node="">recent review</span></a><span data-dcnode-id="1137" instrument_node=""> about dreaming published in the </span><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Annals of the New York Academy of Sciences.</span></em></p><span data-dcnode-id="1133" instrument_node=""> </span><p data-dcnode-id="1127"><span data-dcnode-id="1132" instrument_node="">During REM sleep, there is more activity in the visual, motor, emotional and autobiographical memory regions of the brain, says Matthew Walker, professor of psychology at the University of California, Berkeley and author of the new book </span><a data-dcnode-id="1129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/1501144324/ref%3Das_li_qf_asin_il_tl%3Fie%3DUTF8%26tag%3Dtime037-20%26creative%3D9325%26linkCode%3Das2%26creativeASIN%3D1501144324%26linkId%3Dbdc4212ff81418f992288d2e4281f3f4" target="_blank"><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">Why We Sleep</span></em></a><span data-dcnode-id="1128" instrument_node="">. But there is also decreased activity in other regions, like the one involved in rational thought — hence the reason for extremely lucid, but often nonsensical, dreams. (The dreams you remember when you wake up are only part of REM sleep, says Walker; in reality, the brain is highly active throughout the entire phase.)</span></p><span data-dcnode-id="1126" instrument_node=""> </span><h2 data-dcnode-id="1123"><strong data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">What happens when you dream?</span></strong></h2><span data-dcnode-id="1122" instrument_node=""> </span><p data-dcnode-id="1114"><span data-dcnode-id="1121" instrument_node="">Scientists are divided as to whether dreams are simply a product of random neurons firing during sleep, or if they’re something more — like a </span><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4921605/dreams-meaning/"><span data-dcnode-id="1120" instrument_node="">data dump</span></a><span data-dcnode-id="1118" instrument_node=""> that helps the brain separate important memories from non-important ones, or a way for people to </span><a data-dcnode-id="1116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/1210/what-dreams-are-made-of-understanding-why-we-dream-about-sex-and-other-things/"><span data-dcnode-id="1117" instrument_node="">prepare for challenges</span></a><span data-dcnode-id="1115" instrument_node=""> and play through different scenarios in their heads.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1111" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_2" role="complementary"><span data-dcnode-id="1112" instrument_node="">
</span></div><span data-dcnode-id="1110" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1108" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_2" role="complementary"><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Naiman describes the brain during REM sleep as a sort of “second gut” that digests all of the information gathered that day. “Everything we see, every conversation we have, is chewed on and swallowed and filtered through while we dream, and either excreted or assimilated,” he says.</span></p><span data-dcnode-id="1104" instrument_node=""> </span><h2 data-dcnode-id="1101"><strong data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">What are the health benefits of REM sleep? </span></strong></h2><span data-dcnode-id="1100" instrument_node=""> </span><p data-dcnode-id="1095"><span data-dcnode-id="1099" instrument_node="">Several studies in recent years have suggested that REM sleep can affect how accurately people can read emotions and process external stimuli. Walker’s research, for example, has demonstrated that people who achieved REM sleep during a nap were better able to </span><a data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//content.time.com/time/health/article/0%2C8599%2C1904561%2C00.html"><span data-dcnode-id="1098" instrument_node="">judge facial expressions</span></a><span data-dcnode-id="1096" instrument_node=""> afterward than those who’d napped without reaching REM.</span></p><span data-dcnode-id="1094" instrument_node=""> </span><p data-dcnode-id="1089"><span data-dcnode-id="1093" instrument_node="">Walker and his colleagues have also found that people who view emotional images before getting a good night’s sleep are less likely to have </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//news.berkeley.edu/2011/11/23/dream-sleep/" target="_blank"><span data-dcnode-id="1092" instrument_node="">strong reactions</span></a><span data-dcnode-id="1090" instrument_node=""> to the same images the next day, compared to those who didn’t sleep well. “I think of dreaming as overnight therapy,” Walker says. “It provides a nocturnal soothing balm that takes the short edges off of our emotional experiences so we feel better the next day.”</span></p><span data-dcnode-id="1088" instrument_node=""> </span><p data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Adding to that research, the most recent study — from researchers at Rutgers University — suggests that the quality of a person’s sleep before a traumatic event can play a role in how the brain reacts to a scary situation. “The more REM, the weaker the fear-related effect,” the authors write in their paper.</span></p><span data-dcnode-id="1085" instrument_node=""> </span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">Researchers aren’t certain why this happens. But the part of the brain that secretes norepinephrine during wakefulness and non-REM sleep takes a break during REM sleep. “Norepinephrine is associated with stress, and it affects the degree to which the amygdala — the fear center of the brain — is sensitive to stimuli,” says Itamar Lerner, co-author of the new paper and a postdoctoral sleep researcher at Rutgers University.</span></p><span data-dcnode-id="1082" instrument_node=""> </span><p data-dcnode-id="1076"><strong data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">MORE</span></strong><span data-dcnode-id="1079" instrument_node="">: </span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/4737463/dream-therapy-sleep/"><span data-dcnode-id="1078" instrument_node="">How Dream Therapy Can Change Your Life</span></a></p><span data-dcnode-id="1075" instrument_node=""> </span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">One theory, known as the REM calibration hypothesis, holds that norepinephrine builds up during the day and can be reset to normal levels during REM sleep. “When that happens, we believe that the amygdala may become less sensitive to stimuli, and less likely to overreact to something that really shouldn’t be fearful,” says Lerner.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-300x250;320x480 instream-ad mobile-ad" data-dcnode-id="1070" data-dimensions="300x250;320x480" data-tgxlazy="200" data-tgxtargeting="%7B%7D" data-tgxupdatecorrelator="true" id="ad-300x250_320x480_LL_m_3" role="complementary"><span data-dcnode-id="1071" instrument_node="">
</span></div><span data-dcnode-id="1069" instrument_node="">
</span><div aria-hidden="true" class="ad ad-container ad-wrapper type-728x90;300x250 instream-ad type-728-flex tablet-ad desktop-ad x2" data-dcnode-id="1067" data-dimensions="728x90;300x250" data-tgxlazy="200" data-tgxtargeting="%7B%7D" id="ad-728x90_300x250_LL_td_3" role="complementary"><span data-dcnode-id="1068" instrument_node="">
</span></div><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1065" instrument_node="">Other studies have suggested that REM sleep may be important for other reasons, but there’s less evidence of direct, REM-specific benefits in these areas. In his recent review, Naiman writes that dreaming has effects on memory and mood, and cites research linking poor-quality REM sleep to conditions like </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sciencedirect.com/science/article/pii/B9781416066453000918" target="_blank"><span data-dcnode-id="1064" instrument_node="">Alzheimer’s disease</span></a><span data-dcnode-id="1062" instrument_node=""> and </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.health.com/depression/poor-rem-sleep-may-be-linked-to-higher-risk-for-anxiety-depression" target="_blank"><span data-dcnode-id="1061" instrument_node="">depression</span></a><span data-dcnode-id="1059" instrument_node="">. (It’s worth noting that these studies only prove associations — not whether one problem actually causes or contributes to the other.)</span></p><span data-dcnode-id="1057" instrument_node=""> </span><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Walker, too, believes that dreams and REM sleep have benefits — but he says it’s not the only stage of sleep that matters. In fact, he says, extensive evidence suggests that slow-wave, non-REM sleep “still seems to carry the majority of health benefits,” including regulating blood flow and blood glucose levels, and clearing Alzheimer’s-related plaque from the brain. “REM sleep may have its own function, but most of the research still focuses on the restorative and very important benefits of the other phases,” he says.</span></p><span data-dcnode-id="1054" instrument_node=""> </span><h2 data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">How to get more REM sleep</span></h2><span data-dcnode-id="1051" instrument_node=""> </span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">If you wake up every morning with vivid memories of last night’s dreams, chances are you’re getting at least some decent quality REM sleep, says Walker. But besides that there’s no easy way to monitor your levels for REM sleep specifically. Most consumer sleep trackers aren’t an accurate judge, says Lerner, and neither is how refreshed you feel when you wake up.</span></p><span data-dcnode-id="1048" instrument_node=""> </span><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">“For most people, REM sleep makes up about 20 to 25% of the time they spend asleep,” says Lerner’s co-author and research assistant, Shira Lupkin. “So for now, the best way we can recommend getting more REM sleep is to simply get more sleep overall.”</span></p><span data-dcnode-id="1045" instrument_node=""> </span><p data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">There are, however, some known culprits that disrupt normal sleep patterns and reduce total time spent in REM sleep. A big one is obstructive sleep apnea, a condition that interferes with nighttime breathing and causes people to wake up many times throughout the night. “Seeking help for a sleep disorder, like using a CPAP machine for sleep apnea, can help elevate REM efficiency back to relatively normal levels,” Lerner says.</span></p><span data-dcnode-id="1042" instrument_node=""> </span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Other aspects of modern life — including alcohol, drugs, nicotine, the use of artificial light at night and dependency on alarm clocks — interferes with REM sleep as well, Naiman writes in his review. “Routinely waking up with an alarm clock repeatedly shears off the endings of our most protracted REM/dream periods,” he writes. “Imagine being abruptly ushered out of a movie theater whenever a film was nearing its conclusion.”</span></p><span data-dcnode-id="1039" instrument_node=""> </span><p data-dcnode-id="1031"><span data-dcnode-id="1038" instrument_node="">For </span><a data-dcnode-id="1036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/collection/guide-to-sleep/"><span data-dcnode-id="1037" instrument_node="">better sleep overall</span></a><span data-dcnode-id="1035" instrument_node="">, it helps to sleep in a cool, dark room and </span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//time.com/3183183/best-time-to-sleep/"><span data-dcnode-id="1034" instrument_node="">go to bed at the same time</span></a><span data-dcnode-id="1032" instrument_node=""> every night, Walker says. Practicing other aspects of good sleep hygiene — like powering down electronics and nixing the nightcap — may also help improve your sleep —and maybe even your dreams.</span></p><span data-dcnode-id="1030" instrument_node=""> </span><div class="component inline-article-recirc" data-dcnode-id="963"><span data-dcnode-id="1029" instrument_node="">
