</span><meta content="Considerable advances in our understanding of the mechanisms and functions of rapid-eye-movement (REM) sleep have occurred over the past decade. Much …" data-dcnode-id="13398" property="og:description"><span data-dcnode-id="13397" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Summary</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Considerable advances in our understanding of the mechanisms and functions of rapid-eye-movement (REM) sleep have occurred over the past decade. Much of this progress can be attributed to the development of new neuroscience tools that have enabled high-precision interrogation of brain circuitry linked with REM sleep control, in turn revealing how REM sleep mechanisms themselves impact processes such as sensorimotor function. This review is intended to update the general scientific community about the recent mechanistic, functional and conceptual developments in our current understanding of REM sleep biology and pathobiology. Specifically, this review outlines the historical origins of the discovery of REM sleep, the diversity of REM sleep expression across and within species, the potential functions of REM sleep (e.g., memory consolidation), the neural circuits that control REM sleep, and how dysfunction of REM sleep mechanisms underlie debilitating sleep disorders such as REM sleep behaviour disorder and narcolepsy.</p></div></div></div>" data-dcnode-id="13396" lang="en" name="citation_abstract"><span data-dcnode-id="13395" instrument_node="">

rue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="12753" instrument_node="">Get rights and content</span></a></div><div class="LicenseInfo" data-dcnode-id="12742"><div class="License" data-dcnode-id="12746"><span data-dcnode-id="12749"><span data-dcnode-id="12750" instrument_node="">Under an Elsevier </span></span><a data-dcnode-id="12747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/open-access/userlicense/1.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="12748" instrument_node="">user license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="12743"><span class="access-indicator" data-dcnode-id="12745"></span><span data-dcnode-id="12744" instrument_node="">Open archive</span></div></div><section class="ReferencedArticles" data-dcnode-id="12741"></section><section class="ReferencedArticles" data-dcnode-id="12740"></section><div class="PageDivider" data-dcnode-id="12739"></div><div class="Abstracts u-font-serif" data-dcnode-id="12713" id="abstracts"><div class="abstract author" data-dcnode-id="12714" id="abs0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12737"><span data-dcnode-id="12738" instrument_node="">Summary</span></h2><div data-dcnode-id="12715" id="abssec0010"><p data-dcnode-id="12716" id="abspara0010"><span data-dcnode-id="12728"><span data-dcnode-id="12732"><span data-dcnode-id="12736" instrument_node="">Considerable advances in our understanding of the mechanisms and functions of rapid-eye-movement (REM) sleep have occurred over the past decade. Much of this progress can be attributed to the development of new </span><a class="topic-link" data-dcnode-id="12734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/neurosciences" title="Learn more about neuroscience from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12735" instrument_node="">neuroscience</span></a><span data-dcnode-id="12733" instrument_node=""> tools that have enabled high-precision interrogation of brain circuitry linked with REM sleep control, in turn revealing how REM sleep mechanisms themselves impact processes such as </span></span><a class="topic-link" data-dcnode-id="12730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/sensorimotor-function" title="Learn more about sensorimotor function from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12731" instrument_node="">sensorimotor function</span></a><span data-dcnode-id="12729" instrument_node="">. This review is intended to update the general scientific community about the recent mechanistic, functional and conceptual developments in our current understanding of REM sleep biology and pathobiology. Specifically, this review outlines the historical origins of the discovery of REM sleep, the diversity of REM sleep expression across and within species, the potential functions of REM sleep (e.g., memory consolidation), the neural circuits that control REM sleep, and how dysfunction of REM sleep mechanisms underlie debilitating </span></span><a class="topic-link" data-dcnode-id="12726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/sleep-disorders" title="Learn more about sleep disorders from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12727" instrument_node="">sleep disorders</span></a><span data-dcnode-id="12717"><span data-dcnode-id="12721"><span data-dcnode-id="12725" instrument_node=""> such as </span><a class="topic-link" data-dcnode-id="12723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/rapid-eye-movement-sleep-behavior-disorder" title="Learn more about REM sleep behaviour disorder from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12724" instrument_node="">REM sleep behaviour disorder</span></a><span data-dcnode-id="12722" instrument_node=""> and </span></span><a class="topic-link" data-dcnode-id="12719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/narcolepsy" title="Learn more about narcolepsy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12720" instrument_node="">narcolepsy</span></a><span data-dcnode-id="12718" instrument_node="">.</span></span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="12690" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="12702"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="12703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960982217313076"><svg class="icon icon-navigate-left" data-dcnode-id="12711" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="12712"></path></svg><span class="button-alternative-text" data-dcnode-id="12704"><strong data-dcnode-id="12709"><span data-dcnode-id="12710" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="12707"><span data-dcnode-id="12708" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="12705"><span data-dcnode-id="12706" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="12691"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="12692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960982217312630"><span class="button-alternative-text" data-dcnode-id="12695"><strong data-dcnode-id="12700"><span data-dcnode-id="12701" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="12698"><span data-dcnode-id="12699" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="12696"><span data-dcnode-id="12697" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="12693" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="12694"></path></svg></a></li></ul><span data-dcnode-id="12689" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="11352" id="body"><div data-dcnode-id="11353"><section data-dcnode-id="11354" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="12687" id="sectitle0015"><span data-dcnode-id="12688" instrument_node="">Main Text</span></h2><section data-dcnode-id="12603" id="sec1.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12685" id="sectitle0020"><span data-dcnode-id="12686" instrument_node="">Introduction</span></h3><p data-dcnode-id="12664" id="p0010"><span data-dcnode-id="12684" instrument_node="">Although the first description of rapid-eye-movement (REM) sleep was met with skepticism and indifference, the initial report is now widely viewed as a true watershed moment in science, having forever changed the way scientists and the medical community view the sleeping brain. While historical accounts vary as to where true credit for this discovery might reside, the discovery of REM sleep links most strongly to Eugene Aserinsky, Nathaniel Kleitman, William Dement and Michel Jouvet. In 1953, Kleitman and Aserinsky showed in human infants that periods of ‘active’&nbsp;sleep were marked by rapid eye movements and that these&nbsp;active sleep periods alternated with quiescent sleep periods </span><a class="workspace-trigger" data-dcnode-id="12682" href="#bib1" name="bbib1"><span data-dcnode-id="12683" instrument_node="">[1]</span></a><span data-dcnode-id="12681" instrument_node="">. Several years later Kleitman and Dement showed that these rapid eye movements in human adults were correlated with specific brain-wave patterns and that periods of dreaming occurred during periods of sleep with rapid-eye-movements </span><a class="workspace-trigger" data-dcnode-id="12679" href="#bib2" name="bbib2"><span data-dcnode-id="12680" instrument_node="">2</span></a><span data-dcnode-id="12678" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12676" href="#bib3" name="bbib3"><span data-dcnode-id="12677" instrument_node="">3</span></a><span data-dcnode-id="12671"><span data-dcnode-id="12675" instrument_node="">. Shortly after this, Jouvet identified REM sleep in cats, showing that, like humans, cats experience periods of rapid-eye-movements that occur in tandem with </span><a class="topic-link" data-dcnode-id="12673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/loss-of-muscle-tone" title="Learn more about loss of muscle tone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12674" instrument_node="">loss of muscle tone</span></a><span data-dcnode-id="12672" instrument_node="">, muscle twitches and wake-like cortical activity </span></span><a class="workspace-trigger" data-dcnode-id="12669" href="#bib4" name="bbib4"><span data-dcnode-id="12670" instrument_node="">4</span></a><span data-dcnode-id="12668" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12666" href="#bib5" name="bbib5"><span data-dcnode-id="12667" instrument_node="">5</span></a><span data-dcnode-id="12665" instrument_node="">.</span></p><p data-dcnode-id="12604" id="p0015"><span data-dcnode-id="12659"><span data-dcnode-id="12663" instrument_node="">While the behavioural state of REM sleep was initially distinguished on the basis of the rapid-eye-movements produced by bursting of oculomotor muscles, we now know that REM sleep is also characterized (and hence differentiated from wake and non-REM sleep) by other defining physiologic and behavioral features, including a reduced amplitude and faster frequency cortical electroencephalogram (EEG) that is reminiscent of waking, high-amplitude </span><a class="topic-link" data-dcnode-id="12661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/theta-rhythm" title="Learn more about theta waves from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12662" instrument_node="">theta waves</span></a><span data-dcnode-id="12660" instrument_node=""> in the hippocampal EEG, active suppression of skeletal muscle activity, intermittent muscle twitches, autonomic and respiratory activation, fluctuations in brain/body temperature, and an elevated arousal threshold </span></span><a class="workspace-trigger" data-dcnode-id="12657" href="#bib6" name="bbib6"><span data-dcnode-id="12658" instrument_node="">[6]</span></a><span data-dcnode-id="12656" instrument_node="">. Because REM sleep is marked by a waking-like EEG pattern coupled with skeletal motor atonia, some scientists prefer the terms ‘active sleep’ or ‘paradoxical sleep’ when referring to this behavioral state </span><a class="workspace-trigger" data-dcnode-id="12654" href="#bib7" name="bbib7"><span data-dcnode-id="12655" instrument_node="">7</span></a><span data-dcnode-id="12653" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12651" href="#bib8" name="bbib8"><span data-dcnode-id="12652" instrument_node="">8</span></a><span data-dcnode-id="12650" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12648" href="#bib9" name="bbib9"><span data-dcnode-id="12649" instrument_node="">9</span></a><span data-dcnode-id="12647" instrument_node="">. In healthy humans, REM sleep alternates with, is preceded by, and occupies a significantly smaller fraction of our nightly sleep time than non-REM sleep (also termed slow-wave sleep) </span><a class="workspace-trigger" data-dcnode-id="12645" href="#bib6" name="bbib6"><span data-dcnode-id="12646" instrument_node="">[6]</span></a><span data-dcnode-id="12644" instrument_node="">. While long viewed as an enigmatic behavioural state, work over the past several decades has begun to inform our understanding of the biological functions of REM sleep </span><a class="workspace-trigger" data-dcnode-id="12642" href="#bib10" name="bbib10"><span data-dcnode-id="12643" instrument_node="">10</span></a><span data-dcnode-id="12641" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12639" href="#bib11" name="bbib11"><span data-dcnode-id="12640" instrument_node="">11</span></a><span data-dcnode-id="12638" instrument_node=""> and has provided us with considerable insights into the anatomic, circuit and synaptic bases by which it is regulated </span><a class="workspace-trigger" data-dcnode-id="12636" href="#bib12" name="bbib12"><span data-dcnode-id="12637" instrument_node="">12</span></a><span data-dcnode-id="12635" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12633" href="#bib13" name="bbib13"><span data-dcnode-id="12634" instrument_node="">13</span></a><span data-dcnode-id="12632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12630" href="#bib14" name="bbib14"><span data-dcnode-id="12631" instrument_node="">14</span></a><span data-dcnode-id="12629" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12627" href="#bib15" name="bbib15"><span data-dcnode-id="12628" instrument_node="">15</span></a><span data-dcnode-id="12626" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12624" href="#bib16" name="bbib16"><span data-dcnode-id="12625" instrument_node="">16</span></a><span data-dcnode-id="12623" instrument_node="">. For example, we now know that hippocampal neural activity during REM sleep is critically involved in memory consolidation </span><a class="workspace-trigger" data-dcnode-id="12621" href="#bib17" name="bbib17"><span data-dcnode-id="12622" instrument_node="">[17]</span></a><span data-dcnode-id="12620" instrument_node="">, and that a distributed network of brain circuits and a myriad of neuromodulators regulates REM sleep timing, duration and its hallmark features </span><a class="workspace-trigger" data-dcnode-id="12618" href="#bib12" name="bbib12"><span data-dcnode-id="12619" instrument_node="">12</span></a><span data-dcnode-id="12617" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12615" href="#bib13" name="bbib13"><span data-dcnode-id="12616" instrument_node="">13</span></a><span data-dcnode-id="12614" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12612" href="#bib18" name="bbib18"><span data-dcnode-id="12613" instrument_node="">18</span></a><span data-dcnode-id="12611" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12609" href="#bib19" name="bbib19"><span data-dcnode-id="12610" instrument_node="">19</span></a><span data-dcnode-id="12608" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12606" href="#bib20" name="bbib20"><span data-dcnode-id="12607" instrument_node="">20</span></a><span data-dcnode-id="12605" instrument_node="">.</span></p></section><section data-dcnode-id="12445" id="sec1.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12601" id="sectitle0025"><span data-dcnode-id="12602" instrument_node="">REM Sleep Across Species</span></h3><p data-dcnode-id="12567" id="p0020"><span data-dcnode-id="12600" instrument_node="">REM sleep — as operationally defined by the foregoing electrophysiological and behavioral signs (see introduction) — has been identified in terrestrial mammals </span><a class="workspace-trigger" data-dcnode-id="12598" href="#bib21" name="bbib21"><span data-dcnode-id="12599" instrument_node="">21</span></a><span data-dcnode-id="12597" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12595" href="#bib22" name="bbib22"><span data-dcnode-id="12596" instrument_node="">22</span></a><span data-dcnode-id="12594" instrument_node="">, birds </span><a class="workspace-trigger" data-dcnode-id="12592" href="#bib23" name="bbib23"><span data-dcnode-id="12593" instrument_node="">23</span></a><span data-dcnode-id="12591" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12589" href="#bib24" name="bbib24"><span data-dcnode-id="12590" instrument_node="">24</span></a><span data-dcnode-id="12588" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12586" href="#bib25" name="bbib25"><span data-dcnode-id="12587" instrument_node="">25</span></a><span data-dcnode-id="12585" instrument_node="">, reptiles (e.g., bearded dragons) </span><a class="workspace-trigger" data-dcnode-id="12583" href="#bib26" name="bbib26"><span data-dcnode-id="12584" instrument_node="">[26]</span></a><span data-dcnode-id="12578"><span data-dcnode-id="12582" instrument_node=""> and some </span><a class="topic-link" data-dcnode-id="12580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/aquatic-invertebrates" title="Learn more about aquatic invertebrates from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12581" instrument_node="">aquatic invertebrates</span></a><span data-dcnode-id="12579" instrument_node=""> (e.g., cuttlefish) </span></span><a class="workspace-trigger" data-dcnode-id="12576" href="#bib27" name="bbib27"><span data-dcnode-id="12577" instrument_node="">[27]</span></a><span data-dcnode-id="12571"><span data-dcnode-id="12575" instrument_node="">, suggesting that this behavioral state is conserved across the animal kingdom. Possible exceptions include insects and </span><a class="topic-link" data-dcnode-id="12573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/secernentea" title="Learn more about nematodes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12574" instrument_node="">nematodes</span></a><span data-dcnode-id="12572" instrument_node="">, although there is some anecdotal evidence that even these animals may exhibit some of the classical features of mammalian REM sleep such as REM sleep-like muscle twitches </span></span><a class="workspace-trigger" data-dcnode-id="12569" href="#bib28" name="bbib28"><span data-dcnode-id="12570" instrument_node="">[28]</span></a><span data-dcnode-id="12568" instrument_node="">.</span></p><p data-dcnode-id="12520" id="p0025"><span data-dcnode-id="12566" instrument_node="">Daily amounts of REM sleep vary considerably across species. For example, horses, giraffes and elephants spend very little time (if any) in REM sleep each day (e.g., &lt;1 hour) </span><a class="workspace-trigger" data-dcnode-id="12564" href="#bib29" name="bbib29"><span data-dcnode-id="12565" instrument_node="">29</span></a><span data-dcnode-id="12563" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12561" href="#bib30" name="bbib30"><span data-dcnode-id="12562" instrument_node="">30</span></a><span data-dcnode-id="12560" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12558" href="#bib31" name="bbib31"><span data-dcnode-id="12559" instrument_node="">31</span></a><span data-dcnode-id="12557" instrument_node="">, whereas ferrets, platypuses and house cats can spend 3 to 8 hours per day in REM sleep </span><a class="workspace-trigger" data-dcnode-id="12555" href="#bib32" name="bbib32"><span data-dcnode-id="12556" instrument_node="">32</span></a><span data-dcnode-id="12554" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12552" href="#bib33" name="bbib33"><span data-dcnode-id="12553" instrument_node="">33</span></a><span data-dcnode-id="12551" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12549" href="#bib34" name="bbib34"><span data-dcnode-id="12550" instrument_node="">34</span></a><span data-dcnode-id="12548" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12546" href="#bib35" name="bbib35"><span data-dcnode-id="12547" instrument_node="">35</span></a><span data-dcnode-id="12545" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12543" href="#bib36" name="bbib36"><span data-dcnode-id="12544" instrument_node="">36</span></a><span data-dcnode-id="12542" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12540" href="#bib37" name="bbib37"><span data-dcnode-id="12541" instrument_node="">37</span></a><span data-dcnode-id="12539" instrument_node="">. REM sleep expression patterns also differ across animal species. For example, in mice, periods of REM sleep occur roughly every 10–15&nbsp;minutes </span><a class="workspace-trigger" data-dcnode-id="12537" href="#bib38" name="bbib38"><span data-dcnode-id="12538" instrument_node="">[38]</span></a><span data-dcnode-id="12536" instrument_node="">, whereas, in humans, REM sleep periods occur every 90–120&nbsp;minutes </span><a class="workspace-trigger" data-dcnode-id="12534" href="#bib39" name="bbib39"><span data-dcnode-id="12535" instrument_node="">39</span></a><span data-dcnode-id="12533" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12531" href="#bib40" name="bbib40"><span data-dcnode-id="12532" instrument_node="">40</span></a><span data-dcnode-id="12530" instrument_node="">. Why REM sleep amounts and expression differ between animals remains unclear. But, there is evidence that the length of the REM sleep cycle (i.e., the time between the start of an REM sleep period to the start of the next) scales with brain or body mass </span><a class="workspace-trigger" data-dcnode-id="12528" href="#bib41" name="bbib41"><span data-dcnode-id="12529" instrument_node="">[41]</span></a><span data-dcnode-id="12527" instrument_node="">, which might suggest that small animals need more frequent periods of REM sleep than larger ones. However, the marked variation in REM sleep amounts across species has also been used to argue that REM sleep does not function to facilitate learning and memory processing given that some intelligent animals (e.g., elephants) spend very little time (if any) engaged in REM sleep </span><a class="workspace-trigger" data-dcnode-id="12525" href="#bib21" name="bbib21"><span data-dcnode-id="12526" instrument_node="">21</span></a><span data-dcnode-id="12524" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12522" href="#bib42" name="bbib42"><span data-dcnode-id="12523" instrument_node="">42</span></a><span data-dcnode-id="12521" instrument_node="">.</span></p><p data-dcnode-id="12491" id="p0030"><span data-dcnode-id="12519" instrument_node="">Daily amounts of REM sleep are also labile even within a single species. REM sleep amounts depend on an animal’s developmental age and can expand and contract as a function of environmental and ecological pressures. For example, newborn mammals, especially developmentally immature (i.e., altricial) ones, spend the majority of their early lives in REM sleep, with the amount of REM sleep declining and eventually plateauing at developmental maturity </span><a class="workspace-trigger" data-dcnode-id="12517" href="#bib43" name="bbib43"><span data-dcnode-id="12518" instrument_node="">43</span></a><span data-dcnode-id="12516" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12514" href="#bib44" name="bbib44"><span data-dcnode-id="12515" instrument_node="">44</span></a><span data-dcnode-id="12513" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12511" href="#bib45" name="bbib45"><span data-dcnode-id="12512" instrument_node="">45</span></a><span data-dcnode-id="12510" instrument_node="">. Northern fur-seals exhibit REM sleep while sleeping on land, but rarely when at sea </span><a class="workspace-trigger" data-dcnode-id="12508" href="#bib46" name="bbib46"><span data-dcnode-id="12509" instrument_node="">[46]</span></a><span data-dcnode-id="12507" instrument_node="">, and elephants can go for days without sleeping under certain circumstances </span><a class="workspace-trigger" data-dcnode-id="12505" href="#bib30" name="bbib30"><span data-dcnode-id="12506" instrument_node="">[30]</span></a><span data-dcnode-id="12504" instrument_node="">. In addition, birds can effectively suspend sleep for days and weeks while migrating or flying out to sea, and some birds will suppress sleep (including REM sleep) in order to mate and take care of their hatchlings </span><a class="workspace-trigger" data-dcnode-id="12502" href="#bib47" name="bbib47"><span data-dcnode-id="12503" instrument_node="">47</span></a><span data-dcnode-id="12501" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12499" href="#bib48" name="bbib48"><span data-dcnode-id="12500" instrument_node="">48</span></a><span data-dcnode-id="12498" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12496" href="#bib49" name="bbib49"><span data-dcnode-id="12497" instrument_node="">49</span></a><span data-dcnode-id="12495" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12493" href="#bib50" name="bbib50"><span data-dcnode-id="12494" instrument_node="">50</span></a><span data-dcnode-id="12492" instrument_node="">.</span></p><p data-dcnode-id="12462" id="p0035"><span data-dcnode-id="12486"><span data-dcnode-id="12490" instrument_node="">The physiological and behavioral markers of REM sleep also differ between animals. For example, the platypus and </span><a class="topic-link" data-dcnode-id="12488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/ostriches" title="Learn more about ostrich from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12489" instrument_node="">ostrich</span></a><span data-dcnode-id="12487" instrument_node=""> do not exhibit the classic EEG signatures of REM sleep; rather, they combine features of both REM and non-REM sleep into a single sleep-like state </span></span><a class="workspace-trigger" data-dcnode-id="12484" href="#bib24" name="bbib24"><span data-dcnode-id="12485" instrument_node="">24</span></a><span data-dcnode-id="12483" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12481" href="#bib34" name="bbib34"><span data-dcnode-id="12482" instrument_node="">34</span></a><span data-dcnode-id="12480" instrument_node="">. The platypus and ostrich both exhibit muscle atonia and twitches as well as rapid-eye-movements, but the appearance of these classic REM sleep features is concurrent with a non-REM sleep-like EEG (i.e., moderate or high in voltage) </span><a class="workspace-trigger" data-dcnode-id="12478" href="#bib24" name="bbib24"><span data-dcnode-id="12479" instrument_node="">24</span></a><span data-dcnode-id="12477" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12475" href="#bib34" name="bbib34"><span data-dcnode-id="12476" instrument_node="">34</span></a><span data-dcnode-id="12466"><span data-dcnode-id="12474" instrument_node="">. In contrast, </span><a class="topic-link" data-dcnode-id="12472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/monotreme" title="Learn more about monotremes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12473" instrument_node="">monotremes</span></a><span data-dcnode-id="12467"><span data-dcnode-id="12471" instrument_node=""> (e.g., echidna) do not exhibit most of the classic features of REM sleep (i.e.,&nbsp;reduced EEG amplitude, rapid-eye-movements, muscle twitches and atonia), but they do exhibit a pattern of cellular </span><a class="topic-link" data-dcnode-id="12469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/brainstem" title="Learn more about brainstem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12470" instrument_node="">brainstem</span></a><span data-dcnode-id="12468" instrument_node=""> activity similar to that associated with REM sleep in cats, rats and mice </span></span></span><a class="workspace-trigger" data-dcnode-id="12464" href="#bib51" name="bbib51"><span data-dcnode-id="12465" instrument_node="">[51]</span></a><span data-dcnode-id="12463" instrument_node="">. Such findings suggest that REM sleep may manifest in different ways in different animals.</span></p><p data-dcnode-id="12448" id="p0040"><span data-dcnode-id="12461" instrument_node="">While all terrestrial mammals appear to exhibit some form of REM sleep, this may not hold true for some sea mammals. For example, dolphins and whales show little to no signs of REM sleep </span><a class="workspace-trigger" data-dcnode-id="12459" href="#bib52" name="bbib52"><span data-dcnode-id="12460" instrument_node="">52</span></a><span data-dcnode-id="12458" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12456" href="#bib53" name="bbib53"><span data-dcnode-id="12457" instrument_node="">53</span></a><span data-dcnode-id="12455" instrument_node="">, but there is evidence that whales exhibit muscle jerks during periods of immobility and this could represent a form of REM sleep </span><a class="workspace-trigger" data-dcnode-id="12453" href="#bib54" name="bbib54"><span data-dcnode-id="12454" instrument_node="">[54]</span></a><span data-dcnode-id="12452" instrument_node="">. It nevertheless remains possible that these sea mammals may be similar to the echidna in that they do not exhibit the classic behavioural features of REM sleep, but may still exhibit patterns of ‘REM-like’ cellular activity in the brainstem </span><a class="workspace-trigger" data-dcnode-id="12450" href="#bib51" name="bbib51"><span data-dcnode-id="12451" instrument_node="">[51]</span></a><span data-dcnode-id="12449" instrument_node="">.</span></p><p data-dcnode-id="12446" id="p0045"><span data-dcnode-id="12447" instrument_node="">Because the majority of animals studied to date exhibit some form of REM sleep, it seems reasonable to hypothesize that this behavioural state subserves an important biological purpose(s). Yet it remains unclear what that purpose is or whether REM sleep serves the same function(s) in all animals. What, however, is much more clear is that the brain circuits that generate REM sleep are generally conserved across species. Below, we consider the potential functions of REM sleep and discuss the neural mechanisms that produce this behavioural state.</span></p></section><section data-dcnode-id="12163" id="sec1.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12443" id="sectitle0030"><span data-dcnode-id="12444" instrument_node="">REM Sleep Function</span></h3><p data-dcnode-id="12435" id="p0050"><span data-dcnode-id="12442" instrument_node="">The functional role of REM sleep in normal biology remains an open question as well as one of the more intriguing mysteries in science. Indeed, </span><em data-dcnode-id="12440"><span data-dcnode-id="12441" instrument_node="">Science</span></em><span data-dcnode-id="12439" instrument_node=""> magazine identified how and why we dream during REM sleep as one of the most important and conspicuous knowledge gaps in science </span><a class="workspace-trigger" data-dcnode-id="12437" href="#bib55" name="bbib55"><span data-dcnode-id="12438" instrument_node="">[55]</span></a><span data-dcnode-id="12436" instrument_node="">. While the biological and neuropsychiatric function of dreams and dream mentation remains unclear, considerable insights into the biological and physiological functions of REM sleep have nevertheless been gleaned.</span></p><p data-dcnode-id="12415" id="p0055"><span data-dcnode-id="12434" instrument_node="">The observation that most newborn mammals spend a majority of their early lives in an REM sleep-like state (termed active sleep in newborns because they lack the cortical EEG features of adult REM sleep), inspired the hypothesis that REM sleep (or a REM sleep-specific behaviour) is important for brain development </span><a class="workspace-trigger" data-dcnode-id="12432" href="#bib44" name="bbib44"><span data-dcnode-id="12433" instrument_node="">44</span></a><span data-dcnode-id="12431" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12429" href="#bib56" name="bbib56"><span data-dcnode-id="12430" instrument_node="">56</span></a><span data-dcnode-id="12428" instrument_node="">. This concept is supported by the fact that altricial mammals, which have relatively immature and underdeveloped brains, spend longer periods in REM sleep than precocial animals do </span><a class="workspace-trigger" data-dcnode-id="12426" href="#bib56" name="bbib56"><span data-dcnode-id="12427" instrument_node="">56</span></a><span data-dcnode-id="12425" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12423" href="#bib57" name="bbib57"><span data-dcnode-id="12424" instrument_node="">57</span></a><span data-dcnode-id="12422" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12420" href="#bib58" name="bbib58"><span data-dcnode-id="12421" instrument_node="">58</span></a><span data-dcnode-id="12419" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12417" href="#bib59" name="bbib59"><span data-dcnode-id="12418" instrument_node="">59</span></a><span data-dcnode-id="12416" instrument_node="">.</span></p><p data-dcnode-id="12398" id="p0060"><span data-dcnode-id="12414" instrument_node="">In immature animals, REM sleep is dominated by flurries of muscle twitches, with some estimates that newborn mammals experience tens of thousands of REM sleep-specific muscle twitches each day </span><a class="workspace-trigger" data-dcnode-id="12412" href="#bib44" name="bbib44"><span data-dcnode-id="12413" instrument_node="">44</span></a><span data-dcnode-id="12411" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12409" href="#bib60" name="bbib60"><span data-dcnode-id="12410" instrument_node="">60</span></a><span data-dcnode-id="12408" instrument_node="">. This observation has led some researchers to suggest that REM sleep twitches may function to engage brain development, and in particular motor learning, which is relatively underdeveloped at birth, in particular for altricial animals </span><a class="workspace-trigger" data-dcnode-id="12406" href="#bib61" name="bbib61"><span data-dcnode-id="12407" instrument_node="">61</span></a><span data-dcnode-id="12405" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12403" href="#bib62" name="bbib62"><span data-dcnode-id="12404" instrument_node="">62</span></a><span data-dcnode-id="12402" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12400" href="#bib63" name="bbib63"><span data-dcnode-id="12401" instrument_node="">63</span></a><span data-dcnode-id="12399" instrument_node="">.</span></p><p data-dcnode-id="12348" id="p0065"><span data-dcnode-id="12397" instrument_node="">Muscle twitches were long viewed as functionless features of REM sleep </span><a class="workspace-trigger" data-dcnode-id="12395" href="#bib62" name="bbib62"><span data-dcnode-id="12396" instrument_node="">62</span></a><span data-dcnode-id="12394" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12392" href="#bib64" name="bbib64"><span data-dcnode-id="12393" instrument_node="">64</span></a><span data-dcnode-id="12391" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12389" href="#bib65" name="bbib65"><span data-dcnode-id="12390" instrument_node="">65</span></a><span data-dcnode-id="12384"><span data-dcnode-id="12388" instrument_node="">. But, recent research has raised the interesting possibility that twitches are a distinct class of movement that may function to aid sensorimotor system development. Unlike waking movements, REM sleep twitches occur against a background of muscle atonia, thereby allowing the </span><a class="topic-link" data-dcnode-id="12386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/central-nervous-system" title="Learn more about central nervous system from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12387" instrument_node="">central nervous system</span></a><span data-dcnode-id="12385" instrument_node=""> to more effectively monitor the specific origins of each muscle twitch on the basis of a greater signal-to-noise ratio </span></span><a class="workspace-trigger" data-dcnode-id="12382" href="#bib62" name="bbib62"><span data-dcnode-id="12383" instrument_node="">62</span></a><span data-dcnode-id="12381" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12379" href="#bib64" name="bbib64"><span data-dcnode-id="12380" instrument_node="">64</span></a><span data-dcnode-id="12378" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12376" href="#bib65" name="bbib65"><span data-dcnode-id="12377" instrument_node="">65</span></a><span data-dcnode-id="12367"><span data-dcnode-id="12375" instrument_node="">. Indeed, multiple brain regions are activated by muscle twitches during REM sleep; notably, these same regions are not activated by motor activity during wakefulness. For example, the </span><a class="topic-link" data-dcnode-id="12373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/hippocampus" title="Learn more about hippocampus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12374" instrument_node="">hippocampus</span></a><span data-dcnode-id="12368"><span data-dcnode-id="12372" instrument_node="">, cerebellar cortex and </span><a class="topic-link" data-dcnode-id="12370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/red-nucleus" title="Learn more about red nucleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12371" instrument_node="">red nucleus</span></a><span data-dcnode-id="12369" instrument_node=""> are all activated by REM sleep twitches </span></span></span><a class="workspace-trigger" data-dcnode-id="12365" href="#bib61" name="bbib61"><span data-dcnode-id="12366" instrument_node="">61</span></a><span data-dcnode-id="12364" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12362" href="#bib63" name="bbib63"><span data-dcnode-id="12363" instrument_node="">63</span></a><span data-dcnode-id="12361" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12359" href="#bib66" name="bbib66"><span data-dcnode-id="12360" instrument_node="">66</span></a><span data-dcnode-id="12358" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12356" href="#bib67" name="bbib67"><span data-dcnode-id="12357" instrument_node="">67</span></a><span data-dcnode-id="12355" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12353" href="#bib68" name="bbib68"><span data-dcnode-id="12354" instrument_node="">68</span></a><span data-dcnode-id="12352" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12350" href="#bib69" name="bbib69"><span data-dcnode-id="12351" instrument_node="">69</span></a><span data-dcnode-id="12349" instrument_node="">, providing evidence that REM sleep twitches contribute to activity-dependent development of the sensorimotor system.</span></p><p data-dcnode-id="12313" id="p0070"><span data-dcnode-id="12347" instrument_node="">One of the most widely supported ideas in sleep science is that REM sleep functions to facilitate the formation and consolidation of certain types of memory </span><a class="workspace-trigger" data-dcnode-id="12345" href="#bib10" name="bbib10"><span data-dcnode-id="12346" instrument_node="">10</span></a><span data-dcnode-id="12344" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12342" href="#bib70" name="bbib70"><span data-dcnode-id="12343" instrument_node="">70</span></a><span data-dcnode-id="12341" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12339" href="#bib71" name="bbib71"><span data-dcnode-id="12340" instrument_node="">71</span></a><span data-dcnode-id="12338" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12336" href="#bib72" name="bbib72"><span data-dcnode-id="12337" instrument_node="">72</span></a><span data-dcnode-id="12335" instrument_node="">, although this notion is not universally upheld </span><a class="workspace-trigger" data-dcnode-id="12333" href="#bib21" name="bbib21"><span data-dcnode-id="12334" instrument_node="">21</span></a><span data-dcnode-id="12332" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12330" href="#bib42" name="bbib42"><span data-dcnode-id="12331" instrument_node="">42</span></a><span data-dcnode-id="12329" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12327" href="#bib73" name="bbib73"><span data-dcnode-id="12328" instrument_node="">73</span></a><span data-dcnode-id="12326" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12324" href="#bib74" name="bbib74"><span data-dcnode-id="12325" instrument_node="">74</span></a><span data-dcnode-id="12323" instrument_node="">. Numerous studies in rodents and humans have shown, for example, that REM sleep deprivation impairs formation (or expression) of spatial and emotional memories. A major and persisting critique of these types of studies is the fact that REM sleep deprivation typically impacts non-REM sleep </span><a class="workspace-trigger" data-dcnode-id="12321" href="#bib75" name="bbib75"><span data-dcnode-id="12322" instrument_node="">[75]</span></a><span data-dcnode-id="12320" instrument_node="">, and that some of the methodologies employed to restrict REM sleep are inherently stressful </span><a class="workspace-trigger" data-dcnode-id="12318" href="#bib76" name="bbib76"><span data-dcnode-id="12319" instrument_node="">[76]</span></a><span data-dcnode-id="12317" instrument_node="">, making it difficult to firmly establish a causal role for REM sleep </span><em data-dcnode-id="12315"><span data-dcnode-id="12316" instrument_node="">per se</span></em><span data-dcnode-id="12314" instrument_node=""> in memory formation.</span></p><div data-dcnode-id="12257"><p data-dcnode-id="12297" id="p0075"><span data-dcnode-id="12312" instrument_node="">In an effort to resolve this controversy, Boyce and colleagues </span><a class="workspace-trigger" data-dcnode-id="12310" href="#bib17" name="bbib17"><span data-dcnode-id="12311" instrument_node="">[17]</span></a><span data-dcnode-id="12301"><span data-dcnode-id="12305"><span data-dcnode-id="12309" instrument_node=""> took advantage of new </span><a class="topic-link" data-dcnode-id="12307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optogenetics" title="Learn more about optogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12308" instrument_node="">optogenetic</span></a><span data-dcnode-id="12306" instrument_node=""> tools to temporally silence GABA cells in the medial septum that drive </span></span><a class="topic-link" data-dcnode-id="12303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/hippocampus-theta-rhythm" title="Learn more about hippocampal theta activity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12304" instrument_node="">hippocampal theta activity</span></a><span data-dcnode-id="12302" instrument_node="">, in turn permitting specific attenuation of the memory-associated theta rhythm during REM sleep without disturbing sleeping behaviour (</span></span><a class="workspace-trigger" data-dcnode-id="12299" href="#fig1" name="bfig1"><span data-dcnode-id="12300" instrument_node="">Figure&nbsp;1</span></a><span data-dcnode-id="12298" instrument_node="">). They found that selectively silencing GABA neurons during REM sleep erased subsequent novel object place recognition and impaired fear-conditioned contextual memory. Silencing these same neurons outside of REM sleep episodes was without any detectable effect on memory processing, providing evidence that activity of GABA neurons in the medial septum during REM sleep is crucial for theta activity in the hippocampus, and subsequent memory consolidation.</span></p><figure class="figure text-xs" data-dcnode-id="12258" id="fig1"><span data-dcnode-id="12281"><img alt="" aria-describedby="cap0010" data-dcnode-id="12296" height="715" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr1.jpg&amp;raw"><span data-dcnode-id="12295" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12282"><li data-dcnode-id="12289"><a class="anchor download-link u-font-sans" data-dcnode-id="12290" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr1_lrg.jpg" target="_blank" title="Download high-res image (586KB)"><span class="anchor-text" data-dcnode-id="12291"><span data-dcnode-id="12294" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12292"><span data-dcnode-id="12293" instrument_node="">Download high-res image (586KB)</span></span></span></a></li><li data-dcnode-id="12283"><a class="anchor download-link u-font-sans" data-dcnode-id="12284" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12285"><span data-dcnode-id="12288" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12286"><span data-dcnode-id="12287" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12259"><span data-dcnode-id="12260" id="cap0010"><p data-dcnode-id="12270" id="fspara0010"><span class="label" data-dcnode-id="12279"><span data-dcnode-id="12280" instrument_node="">Figure&nbsp;1</span></span><span data-dcnode-id="12278" instrument_node="">. </span><a class="topic-link" data-dcnode-id="12276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/theta-rhythm" title="Learn more about Theta activity from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12277" instrument_node="">Theta activity</span></a><span data-dcnode-id="12271"><span data-dcnode-id="12275" instrument_node=""> during </span><a class="topic-link" data-dcnode-id="12273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rem-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12274" instrument_node="">REM sleep</span></a><span data-dcnode-id="12272" instrument_node=""> is associated with learning and memory consolidation.</span></span></p><p data-dcnode-id="12261" id="fspara0015"><span data-dcnode-id="12269" instrument_node="">A schematic diagram demonstrating how </span><a class="topic-link" data-dcnode-id="12267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/optogenetics" title="Learn more about optogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12268" instrument_node="">optogenetic</span></a><span data-dcnode-id="12262"><span data-dcnode-id="12266" instrument_node=""> inhibition of GABA cells in the medial septum (MS) of mice affects acquisition of new memory associations. Top two figures show that naturally sleeping mice were fitted with optic fibers targeted above the MS. Delivery of orange laser light to the MS during REM sleep periods allowed for high precision optical inhibition of GABA cells in the MS since these cells expressed the inhibitory opsin archaerhodopsin (ArchT). The panel below the top two shows a sample recording of how optical inhibition of GABA inhibition during REM sleep impacts theta activity. Upon light-induced optogenetic inhibition (orange shading), a rapid reduction in amplitude of </span><a class="topic-link" data-dcnode-id="12264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/hippocampus-theta-rhythm" title="Learn more about hippocampal theta rhythm from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12265" instrument_node="">hippocampal theta rhythm</span></a><span data-dcnode-id="12263" instrument_node=""> is observed. REM sleep-specific inhibition of theta activity results in a reduction in learning and memory consolidation.</span></span></p></span></span></figure></div><div data-dcnode-id="12205"><p data-dcnode-id="12241" id="p0080"><span data-dcnode-id="12256" instrument_node="">Intriguing new data also suggest that REM sleep may function to facilitate learning and memory by regulating neuronal synapses. Li and colleagues </span><a class="workspace-trigger" data-dcnode-id="12254" href="#bib77" name="bbib77"><span data-dcnode-id="12255" instrument_node="">[77]</span></a><span data-dcnode-id="12253" instrument_node=""> showed that REM sleep appears to selectively prune and maintain new synapses associated with particular types of motor learning (</span><a class="workspace-trigger" data-dcnode-id="12251" href="#fig2" name="bfig2"><span data-dcnode-id="12252" instrument_node="">Figure&nbsp;2</span></a><span data-dcnode-id="12242"><span data-dcnode-id="12246"><span data-dcnode-id="12250" instrument_node="">). Specifically, they found that REM sleep prunes newly formed postsynaptic </span><a class="topic-link" data-dcnode-id="12248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/dendritic-spine" title="Learn more about dendritic spines from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12249" instrument_node="">dendritic spines</span></a><span data-dcnode-id="12247" instrument_node=""> on pyramidal neurons in the </span></span><a class="topic-link" data-dcnode-id="12244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/motor-cortex" title="Learn more about motor cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12245" instrument_node="">motor cortex</span></a><span data-dcnode-id="12243" instrument_node=""> after a new motor task is learned, and that REM sleep also strengthens and maintains these newly formed spines. They also showed that REM sleep-related calcium spikes within dendrites are important for pruning and strengthening new spines, suggesting that REM sleep facilitates learning and memory consolidation by selectively eliminating and maintaining new synapses by calcium spike-dependent mechanisms.</span></span></p><figure class="figure text-xs" data-dcnode-id="12206" id="fig2"><span data-dcnode-id="12225"><img alt="" aria-describedby="cap0015" data-dcnode-id="12240" height="404" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr2.jpg&amp;raw"><span data-dcnode-id="12239" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12226"><li data-dcnode-id="12233"><a class="anchor download-link u-font-sans" data-dcnode-id="12234" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr2_lrg.jpg" target="_blank" title="Download high-res image (496KB)"><span class="anchor-text" data-dcnode-id="12235"><span data-dcnode-id="12238" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12236"><span data-dcnode-id="12237" instrument_node="">Download high-res image (496KB)</span></span></span></a></li><li data-dcnode-id="12227"><a class="anchor download-link u-font-sans" data-dcnode-id="12228" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12229"><span data-dcnode-id="12232" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12230"><span data-dcnode-id="12231" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12207"><span data-dcnode-id="12208" id="cap0015"><p data-dcnode-id="12218" id="fspara0020"><span class="label" data-dcnode-id="12223"><span data-dcnode-id="12224" instrument_node="">Figure&nbsp;2</span></span><span data-dcnode-id="12222" instrument_node="">. </span><a class="topic-link" data-dcnode-id="12220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rem-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12221" instrument_node="">REM sleep</span></a><span data-dcnode-id="12219" instrument_node=""> facilitates learning and memory by regulating neuronal synapses.</span></p><p data-dcnode-id="12209" id="fspara0025"><span data-dcnode-id="12217" instrument_node="">A schematic diagram demonstrating that REM sleep strengthens persistent new spines induced by motor learning and facilitates long-term maintenance of synapses. (A) REM sleep prunes newly formed postsynaptic </span><a class="topic-link" data-dcnode-id="12215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/dendritic-spine" title="Learn more about dendritic spines from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12216" instrument_node="">dendritic spines</span></a><span data-dcnode-id="12210"><span data-dcnode-id="12214" instrument_node=""> (yellow circles) of pyramidal neurons in the mouse </span><a class="topic-link" data-dcnode-id="12212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/motor-cortex" title="Learn more about motor cortex from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12213" instrument_node="">motor cortex</span></a><span data-dcnode-id="12211" instrument_node=""> after motor learning (forward walking: Task&nbsp;1). This REM sleep-dependent elimination of new spines facilitates subsequent spine formation (red circles) when a new motor task is learned (backward walking: Task 2), indicating a role for&nbsp;REM sleep in pruning to balance the number of&nbsp;new spines formed. (B) REM sleep also strengthens persistent new spines (orange halo around yellow circles) induced by motor learning and facilitates long-term maintenance, which are&nbsp;important for behavioral improvement after learning.</span></span></p></span></span></figure></div><p data-dcnode-id="12176" id="p0085"><span data-dcnode-id="12204" instrument_node="">Several additional functions have also been ascribed to REM sleep, ranging from facilitating cortical plasticity </span><a class="workspace-trigger" data-dcnode-id="12202" href="#bib10" name="bbib10"><span data-dcnode-id="12203" instrument_node="">10</span></a><span data-dcnode-id="12201" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12199" href="#bib78" name="bbib78"><span data-dcnode-id="12200" instrument_node="">78</span></a><span data-dcnode-id="12198" instrument_node=""> to restoration of aminergic cell/receptor function </span><a class="workspace-trigger" data-dcnode-id="12196" href="#bib79" name="bbib79"><span data-dcnode-id="12197" instrument_node="">[79]</span></a><span data-dcnode-id="12195" instrument_node=""> and heightening general creativity </span><a class="workspace-trigger" data-dcnode-id="12193" href="#bib80" name="bbib80"><span data-dcnode-id="12194" instrument_node="">80</span></a><span data-dcnode-id="12192" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12190" href="#bib81" name="bbib81"><span data-dcnode-id="12191" instrument_node="">81</span></a><span data-dcnode-id="12189" instrument_node="">. It is worth noting that all of these proposals assume that REM&nbsp;sleep functions to restore some deficit incurred during </span><em data-dcnode-id="12187"><span data-dcnode-id="12188" instrument_node="">prior</span></em><span data-dcnode-id="12186" instrument_node=""> wakefulness. Emerging evidence suggests, however, that REM sleep may also function to prepare for ensuing wakefulness by stimulating the central nervous system </span><a class="workspace-trigger" data-dcnode-id="12184" href="#bib64" name="bbib64"><span data-dcnode-id="12185" instrument_node="">[64]</span></a><span data-dcnode-id="12183" instrument_node="">. This idea derives from the facts that virtually all REM sleep periods are immediately followed by wakefulness </span><a class="workspace-trigger" data-dcnode-id="12181" href="#bib75" name="bbib75"><span data-dcnode-id="12182" instrument_node="">[75]</span></a><span data-dcnode-id="12180" instrument_node="">, that the amount of time spent in REM sleep increases toward the end of the sleep period, and that humans and animals are more alert when woken from REM sleep than they are from non-REM sleep </span><a class="workspace-trigger" data-dcnode-id="12178" href="#bib82" name="bbib82"><span data-dcnode-id="12179" instrument_node="">[82]</span></a><span data-dcnode-id="12177" instrument_node="">.</span></p><p data-dcnode-id="12164" id="p0090"><span data-dcnode-id="12175" instrument_node="">Recently, Brooks and Peever </span><a class="workspace-trigger" data-dcnode-id="12173" href="#bib64" name="bbib64"><span data-dcnode-id="12174" instrument_node="">[64]</span></a><span data-dcnode-id="12168"><span data-dcnode-id="12172" instrument_node=""> found that the level of motor activity during individual REM periods reliably predicts the termination of REM sleep and the switch to wakefulness in rodents. Specifically, they found that levels of motor activity increase during REM sleep episodes and peak immediately before the transition from REM sleep to wakefulness, suggesting that motor activity during REM sleep may function to trigger and engage arousal from REM sleep into wakefulness. This observation aligns nicely with data showing that </span><a class="topic-link" data-dcnode-id="12170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/sensorimotor-function" title="Learn more about sensorimotor function from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12171" instrument_node="">sensorimotor function</span></a><span data-dcnode-id="12169" instrument_node=""> is more intact following arousal from REM sleep as compared to arousal from non-REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="12166" href="#bib82" name="bbib82"><span data-dcnode-id="12167" instrument_node="">[82]</span></a><span data-dcnode-id="12165" instrument_node="">, and that animals are generally more alert when aroused from REM sleep than they are from non-REM sleep.</span></p></section><section data-dcnode-id="11772" id="sec1.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="12161" id="sectitle0035"><span data-dcnode-id="12162" instrument_node="">Brain Circuitry Controlling REM Sleep</span></h3><div data-dcnode-id="12061"><p data-dcnode-id="12138" id="p0095"><span data-dcnode-id="12160" instrument_node="">The location of the brain circuitry governing REM sleep genesis was first investigated by Michel Jouvet, who during the course of his pioneering work identified a region in the dorsal pontine brainstem that appeared critical for the generation of muscle atonia during REM sleep </span><a class="workspace-trigger" data-dcnode-id="12158" href="#bib83" name="bbib83"><span data-dcnode-id="12159" instrument_node="">[83]</span></a><span data-dcnode-id="12157" instrument_node="">. Jouvet specifically found that lesions of this region in cats caused a perculiar state dissociation in which the animals appeared to ‘act out’ their dreams. Subsequent experimental work spanning several decades further refined the location of this ‘atonia generator’ to a region of the pons called the sublaterodorsal nucleus (SLD) in rodents (also termed the subcoeruleus region) </span><a class="workspace-trigger" data-dcnode-id="12155" href="#bib8" name="bbib8"><span data-dcnode-id="12156" instrument_node="">8</span></a><span data-dcnode-id="12154" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12152" href="#bib14" name="bbib14"><span data-dcnode-id="12153" instrument_node="">14</span></a><span data-dcnode-id="12151" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12149" href="#bib84" name="bbib84"><span data-dcnode-id="12150" instrument_node="">84</span></a><span data-dcnode-id="12148" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12146" href="#bib85" name="bbib85"><span data-dcnode-id="12147" instrument_node="">85</span></a><span data-dcnode-id="12145" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12143" href="#bib86" name="bbib86"><span data-dcnode-id="12144" instrument_node="">86</span></a><span data-dcnode-id="12142" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="12140" href="#fig3" name="bfig3"><span data-dcnode-id="12141" instrument_node="">Figure&nbsp;3</span></a><span data-dcnode-id="12139" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="12062" id="fig3"><span data-dcnode-id="12122"><img alt="" aria-describedby="cap0020" data-dcnode-id="12137" height="343" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr3.jpg&amp;raw"><span data-dcnode-id="12136" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="12123"><li data-dcnode-id="12130"><a class="anchor download-link u-font-sans" data-dcnode-id="12131" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr3_lrg.jpg" target="_blank" title="Download high-res image (317KB)"><span class="anchor-text" data-dcnode-id="12132"><span data-dcnode-id="12135" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12133"><span data-dcnode-id="12134" instrument_node="">Download high-res image (317KB)</span></span></span></a></li><li data-dcnode-id="12124"><a class="anchor download-link u-font-sans" data-dcnode-id="12125" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="12126"><span data-dcnode-id="12129" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="12127"><span data-dcnode-id="12128" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="12063"><span data-dcnode-id="12064" id="cap0020"><p data-dcnode-id="12114" id="fspara0030"><span class="label" data-dcnode-id="12120"><span data-dcnode-id="12121" instrument_node="">Figure&nbsp;3</span></span><span data-dcnode-id="12119" instrument_node="">. </span><span data-dcnode-id="12118" instrument_node="">The circuit basis of </span><a class="topic-link" data-dcnode-id="12116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rem-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12117" instrument_node="">REM sleep</span></a><span data-dcnode-id="12115" instrument_node="">.</span></p><p data-dcnode-id="12065" id="fspara0035"><span data-dcnode-id="12069"><span data-dcnode-id="12077"><span data-dcnode-id="12097"><span data-dcnode-id="12113" instrument_node="">Together the caudal </span><a class="topic-link" data-dcnode-id="12111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/laterodorsal-tegmental-nucleus" title="Learn more about laterodorsal tegmental nucleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12112" instrument_node="">laterodorsal tegmental nucleus</span></a><span data-dcnode-id="12098"><span data-dcnode-id="12102"><span data-dcnode-id="12106"><span data-dcnode-id="12110" instrument_node=""> (cLDT), sublaterodorsal nucleus (SLD) and precoeruleus region (PC) comprise an executive pontine circuit element for REM sleep. REM-on </span><a class="topic-link" data-dcnode-id="12108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/glutamatergic" title="Learn more about glutamatergic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12109" instrument_node="">glutamatergic</span></a><span data-dcnode-id="12107" instrument_node=""> neurons of the ventral SLD mediate REM motor atonia through direct synaptic activation of </span></span><a class="topic-link" data-dcnode-id="12104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/glycinergic" title="Learn more about glycinergic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12105" instrument_node="">glycinergic</span></a><span data-dcnode-id="12103" instrument_node=""> </span></span><a class="topic-link" data-dcnode-id="12100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/interneurons" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12101" instrument_node="">interneurons</span></a><span data-dcnode-id="12099" instrument_node=""> of the spinal ventral horn (svh) as well as via GABAergic/glycinergic neurons of the ventral medial medulla (vM). vM&nbsp;neurons in turn project and inhibit </span></span></span><a class="topic-link" data-dcnode-id="12095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/motor-neuron" title="Learn more about motor neurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12096" instrument_node="">motor neurons</span></a><span data-dcnode-id="12078"><span data-dcnode-id="12090"><span data-dcnode-id="12094" instrument_node=""> (MN) of the spinal ventral horn. REM-on </span><a class="topic-link" data-dcnode-id="12092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/gaba-receptor" title="Learn more about GABAergic neurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12093" instrument_node="">GABAergic neurons</span></a><span data-dcnode-id="12091" instrument_node=""> of the SLD are reciprocally connected with REM-off GABAergic neurons of the ventrolateral </span></span><a class="topic-link" data-dcnode-id="12088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/periaqueductal-gray" title="Learn more about periaqueductal gray from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12089" instrument_node="">periaqueductal gray</span></a><span data-dcnode-id="12079"><span data-dcnode-id="12083"><span data-dcnode-id="12087" instrument_node=""> and lateral </span><a class="topic-link" data-dcnode-id="12085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/pontine-tegmentum" title="Learn more about pontine tegmentum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12086" instrument_node="">pontine tegmentum</span></a><span data-dcnode-id="12084" instrument_node=""> (vlPAG/LPT), forming the basis of a pontine REM ‘flip-flop’ switch. GABAergic neurons of the vM can also drive REM sleep and do so by inhibiting REM-off vlPAG/LPT neurons. Lateral hypothalamic neurons containing </span></span><a class="topic-link" data-dcnode-id="12081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/orexin" title="Learn more about orexin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12082" instrument_node="">orexin</span></a><span data-dcnode-id="12080" instrument_node=""> (OX) provide excitatory and stabilizing synaptic control over REM-off vlPAG/LPT neurons. REM-off noradrenergic </span></span></span></span><a class="topic-link" data-dcnode-id="12075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/locus-coeruleus" title="Learn more about locus coeruleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12076" instrument_node="">locus coeruleus</span></a><span data-dcnode-id="12070"><span data-dcnode-id="12074" instrument_node=""> (LC) and serotoninergic dorsal raphe (DR) neurons provide additional synaptic control over SLD activity. Cholinergic laterodorsal tegmental and pedunculopontine tegmental (LDT/PPT) neurons may produce REM sleep through activation of REM-on SLD neurons. Lateral hypothalamic neurons containing melanin-concentrating hormone (MCH) also regulate REM sleep, possibly through direct inhibition of REM-off vlPAG/LPT neurons. Glutamatergic neurons of the SLD/PC regulate the corticohippocampal features of REM sleep, likely via projections to the medial septum, parabrachial nucleus, </span><a class="topic-link" data-dcnode-id="12072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/basal-forebrain" title="Learn more about basal forebrain from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12073" instrument_node="">basal forebrain</span></a><span data-dcnode-id="12071" instrument_node=""> and supramamillary </span></span></span><a class="topic-link" data-dcnode-id="12067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hypothalamus" title="Learn more about hypothalamus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12068" instrument_node="">hypothalamus</span></a><span data-dcnode-id="12066" instrument_node="">.</span></p></span></span></figure></div><p data-dcnode-id="11984" id="p0100"><span data-dcnode-id="12052"><span data-dcnode-id="12056"><span data-dcnode-id="12060" instrument_node="">It is now well established that the ventral portion of the SLD&nbsp;contains a substantial population of spinally projecting neurons that function to produce the motor atonia of REM sleep.&nbsp;For example, work over the past two decades has shown that SLD neurons increase firing in anticipation of, and are maximally active in, REM sleep (i.e., REM-on cells), are </span><a class="topic-link" data-dcnode-id="12058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/glutamatergic" title="Learn more about glutamatergic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12059" instrument_node="">glutamatergic</span></a><span data-dcnode-id="12057" instrument_node="">, and produce motor atonia by activating inhibitory </span></span><a class="topic-link" data-dcnode-id="12054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/interneurons" title="Learn more about interneurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12055" instrument_node="">interneurons</span></a><span data-dcnode-id="12053" instrument_node=""> in both the ventral medulla (vM) and the spinal cord </span></span><a class="workspace-trigger" data-dcnode-id="12050" href="#bib14" name="bbib14"><span data-dcnode-id="12051" instrument_node="">14</span></a><span data-dcnode-id="12049" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12047" href="#bib60" name="bbib60"><span data-dcnode-id="12048" instrument_node="">60</span></a><span data-dcnode-id="12046" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12044" href="#bib87" name="bbib87"><span data-dcnode-id="12045" instrument_node="">87</span></a><span data-dcnode-id="12043" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12041" href="#bib88" name="bbib88"><span data-dcnode-id="12042" instrument_node="">88</span></a><span data-dcnode-id="12040" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12038" href="#bib89" name="bbib89"><span data-dcnode-id="12039" instrument_node="">89</span></a><span data-dcnode-id="12037" instrument_node="">. Selective disruption of glutamatergic transmission of SLD and dorsally adjacent caudal laterodorsal tegmental (cLDT) neurons produces REM sleep without atonia. Interestingly, inactivation of these same neurons also reduced total time spent in REM sleep in mice </span><a class="workspace-trigger" data-dcnode-id="12035" href="#bib86" name="bbib86"><span data-dcnode-id="12036" instrument_node="">86</span></a><span data-dcnode-id="12034" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12032" href="#bib90" name="bbib90"><span data-dcnode-id="12033" instrument_node="">90</span></a><span data-dcnode-id="12027"><span data-dcnode-id="12031" instrument_node="">. Hence in addition to regulating REM sleep motor atonia, glutamatergic cLDT-SLD neurons also play a role in generating the forebrain features of REM sleep. Recent experimental work has shown that selective and acute opto- or </span><a class="topic-link" data-dcnode-id="12029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/chemogenetics" title="Learn more about chemogenetic from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12030" instrument_node="">chemogenetic</span></a><span data-dcnode-id="12028" instrument_node=""> activation of cLDT-SLD glutamatergic neurons can potently drive REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="12025" href="#bib91" name="bbib91"><span data-dcnode-id="12026" instrument_node="">91</span></a><span data-dcnode-id="12024" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12022" href="#bib92" name="bbib92"><span data-dcnode-id="12023" instrument_node="">92</span></a><span data-dcnode-id="12021" instrument_node="">. In fact, it now appears that the cLDT-SLC contains two functionally segregated sets of glutamatergic neurons, the first of which includes reticulospinal REM sleep atonia-generating neurons and the second of which, likely via the parabrachial nucleus (PB) and medially adjacent precoeruleus (PC) region, promote corticohippocampal activation during REM sleep as well as regulate REM sleep amounts </span><a class="workspace-trigger" data-dcnode-id="12019" href="#bib8" name="bbib8"><span data-dcnode-id="12020" instrument_node="">8</span></a><span data-dcnode-id="12018" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12016" href="#bib14" name="bbib14"><span data-dcnode-id="12017" instrument_node="">14</span></a><span data-dcnode-id="12015" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12013" href="#bib90" name="bbib90"><span data-dcnode-id="12014" instrument_node="">90</span></a><span data-dcnode-id="12012" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="12010" href="#bib93" name="bbib93"><span data-dcnode-id="12011" instrument_node="">93</span></a><span data-dcnode-id="12009" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="12007" href="#fig3" name="bfig3"><span data-dcnode-id="12008" instrument_node="">Figure&nbsp;3</span></a><span data-dcnode-id="11994"><span data-dcnode-id="12002"><span data-dcnode-id="12006" instrument_node="">). Little more, however, is known about the ‘downstream’ circuits by which these excitatory SLD/cLDT/PC projections contribute to the forebrain features, e.g., reduction in cortical EEG amplitude
