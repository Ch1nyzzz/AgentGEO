-id="426" instrument_node="">S.F.</span><span data-dcnode-id="424" instrument_node=""> </span><span data-dcnode-id="422" instrument_node="">de Lacy</span><span data-dcnode-id="420" instrument_node="">, </span><span data-dcnode-id="418" instrument_node="">S.</span><span data-dcnode-id="416" instrument_node=""> </span><span data-dcnode-id="414" instrument_node="">Agrawal</span><span data-dcnode-id="412" instrument_node="">, </span><span data-dcnode-id="410" instrument_node="">A.J.</span><span data-dcnode-id="408" instrument_node=""> </span><span data-dcnode-id="406" instrument_node="">Williams</span><div data-dcnode-id="403" id="ref-id-sref158"><strong class="title" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">The association between narcolepsy and REM behavior disorder (RBD)</span></strong></div></div><div class="host" data-dcnode-id="382"><span data-dcnode-id="401" instrument_node="">Sleep Med.</span><span data-dcnode-id="399" instrument_node="">, </span><span data-dcnode-id="397" instrument_node="">6</span><span data-dcnode-id="395" instrument_node=""> (</span><span data-dcnode-id="393" instrument_node="">2005</span><span data-dcnode-id="391" instrument_node="">)</span><span data-dcnode-id="389" instrument_node="">, pp. </span><span data-dcnode-id="387" instrument_node="">253</span><span data-dcnode-id="385" instrument_node="">-</span><span data-dcnode-id="383" instrument_node="">258</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="378"><span data-dcnode-id="381" instrument_node=""></span><a aria-describedby="ref-id-sref158" class="link" data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar%3Fq%3DThe%2520association%2520between%2520narcolepsy%2520and%2520REM%2520behavior%2520disorder" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="380" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="240" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="241"><div class="PageDivider" data-dcnode-id="373"></div><header data-dcnode-id="370" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Cited by (117)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="242"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="243"><ul data-dcnode-id="249"><li class="ListArticleItem" data-dcnode-id="346"><div class="sub-heading" data-dcnode-id="364"><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1059131122000711" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="368" id="citing-articles-article0-title"><span data-dcnode-id="369" instrument_node="">Reduced REM sleep: a potential biomarker for epilepsy – a retrospective case-control study</span></h3></a><div class="article-source ellipsis" data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">2022, Seizure</span></div></div><div class="buttons" data-dcnode-id="358"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="359" type="button"><span class="button-link-text" data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="360" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="361"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="347"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="348" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="349"><p data-dcnode-id="356" id="spara014"><span data-dcnode-id="357" instrument_node="">Establishing the diagnosis of epilepsy can be challenging if interictal epileptic discharges (IEDs) or seizures are undetectable. Many individuals with epilepsy experience sleep disturbances. A reduced percentage of REM sleep (REM%) has been observed following seizures. We aimed to assess differences of REM% in individuals with epilepsy in comparison with differential diagnoses.</span></p><p data-dcnode-id="354" id="spara015"><span data-dcnode-id="355" instrument_node="">We performed a retrospective, monocentric, two-armed case-control study with 128 age-matched individuals who underwent ≥72 hours of continuous video-EEG monitoring at our epilepsy monitoring unit (EMU) for diagnostic evaluation. We assessed REM% on the first and last night of EMU admission. Logistic regressions models were used to evaluate the predictive value of REM%.</span></p><p data-dcnode-id="352" id="spara016"><span data-dcnode-id="353" instrument_node="">We included 64 individuals diagnosed with epilepsy and 64 with a differential diagnosis. REM% in the epilepsy group was significantly lower [12.2% (±4.7) vs. 17.2% (±5.2), p&lt;0.001]. We found no significant influence of sex, age, anti-seizure, or other medications. A REM%-based and an IED and seizure-based regression model were not significantly different [area under the curve (AUC) 0.791 (95% confidence interval (CI): 0.713-0.870) vs. 0.853 (95% CI: 0.788-0.919), p=0.23]. A combined model, based on IEDs, seizures, and REM%, was superior to the IED model alone [0.933 (0.891-0.975), p&lt;0.01].</span></p><p data-dcnode-id="350" id="spara017"><span data-dcnode-id="351" instrument_node="">Our study shows significantly reduced REM% in individuals with epilepsy. REM%-based models show a good predictive performance. REM% assessment could improve diagnostic accuracy – especially for challenging cases, e.g., when IEDs or seizures are absent and patient history and semiology appear ambiguous. REM% as a biomarker should be evaluated in prospective, multicentric trials.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="325"><div class="sub-heading" data-dcnode-id="340"><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0896627321010886" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="344" id="citing-articles-article1-title"><span data-dcnode-id="345" instrument_node="">The subthalamic corticotropin-releasing hormone neurons mediate adaptive REM-sleep responses to threat</span></h3></a><div class="article-source ellipsis" data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">2022, Neuron</span></div></div><div class="buttons" data-dcnode-id="334"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="335" type="button"><span class="button-link-text" data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="336" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="337"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="326"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="327" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="328"><p data-dcnode-id="329" id="abspara0010"><span data-dcnode-id="333" instrument_node="">When an animal faces a threatening situation while asleep, rapid arousal is the essential prerequisite for an adequate response. Here, we find that predator stimuli induce immediate arousal from REM sleep compared with NREM sleep. Using </span><em data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">in&nbsp;vivo</span></em><span data-dcnode-id="330" instrument_node=""> neural activity recording and cell-type-specific manipulations, we identify neurons in the medial subthalamic nucleus (mSTN) expressing corticotropin-releasing hormone (CRH) that mediate arousal and defensive responses to acute predator threats received through multiple sensory modalities across REM sleep and wakefulness. We observe involvement of the same neurons in the normal regulation of REM sleep and the adaptive increase in REM sleep induced by sustained predator stress. Projections to the lateral globus pallidus (LGP) are the effector pathway for the threat-coping responses and REM-sleep expression. Together, our findings suggest adaptive REM-sleep responses could be protective against threats and uncover a critical component of the neural circuitry at their basis.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="307"><div class="sub-heading" data-dcnode-id="319"><a data-dcnode-id="322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1087079222000053" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="323" id="citing-articles-article2-title"><span data-dcnode-id="324" instrument_node="">Importance of the locus coeruleus-norepinephrine system in sleep-wake regulation: Implications for aging and Alzheimer's disease</span></h3></a><div class="article-source ellipsis" data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">2022, Sleep Medicine Reviews</span></div></div><div class="buttons" data-dcnode-id="313"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="314" type="button"><span class="button-link-text" data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="315" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="316"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="308"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="309" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="310"><p data-dcnode-id="311" id="abspara0010"><span data-dcnode-id="312" instrument_node="">Five decades ago, seminal studies positioned the brainstem locus coeruleus (LC) norepinephrine (NE) system as a key substrate for the regulation of wakefulness and sleep, and this picture has recently been elaborated thanks to methodological advances in the precise investigation and experimental modulation of LC structure and functions. This review presents and discusses findings that support the major role of the LC-NE system at different levels of sleep-wake organization, ranging from its involvement in the overall architecture of the sleep-wake cycle to its associations with sleep microstructure, while accounting for the intricate neuroanatomy surrounding the LC. Given the particular position held by the LC-NE system by being at the intersection of sleep-wake dysregulation and initial pathophysiological processes of Alzheimer's disease (AD), we conclude by examining emerging opportunities to investigate LC-NE mediated relationships between sleep-wake alteration and AD in human aging. We further propose several research perspectives that could support the LC-NE system as a promising target for the identification of at-risk individuals in the preclinical stages of AD, and for the development of novel preventive interventions.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="289"><div class="sub-heading" data-dcnode-id="301"><a data-dcnode-id="304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0960982221014196" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="305" id="citing-articles-article3-title"><span data-dcnode-id="306" instrument_node="">Regulation of REM sleep by inhibitory neurons in the dorsomedial medulla</span></h3></a><div class="article-source ellipsis" data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">2022, Current Biology</span></div></div><div class="buttons" data-dcnode-id="295"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="296" type="button"><span class="button-link-text" data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="297" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="298"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="290"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="291" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="292"><p data-dcnode-id="293" id="abspara0010"><span data-dcnode-id="294" instrument_node="">The two major stages of mammalian sleep—rapid eye movement sleep (REMs) and non-REM sleep (NREMs)—are characterized by distinct brain rhythms ranging from millisecond to minute-long (infraslow) oscillations. The&nbsp;mechanisms controlling transitions between sleep stages and how they are synchronized with infraslow rhythms remain poorly understood. Using opto- and chemogenetic manipulation in mice, we show that GABAergic neurons in the dorsomedial medulla (dmM) promote the initiation and maintenance of REMs, in part through their projections to the dorsal and median raphe nuclei. Fiber photometry revealed that their activity is strongly increased during REMs and fluctuates during NREMs in close synchrony with infraslow oscillations in the sleep spindle band of the electroencephalogram. The phase of this rhythm influenced the latency and probability with which dmM activation induced REMs. Thus, dmM inhibitory neurons strongly promote REMs, and their slow activity fluctuations may coordinate the timing of REMs episodes with infraslow brain rhythms.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="268"><div class="sub-heading" data-dcnode-id="283"><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0014483521004267" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="287" id="citing-articles-article4-title"><span data-dcnode-id="288" instrument_node="">REM phase: An ingenious mechanism to enhance clearance of metabolic waste from the retina</span></h3></a><div class="article-source ellipsis" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">2022, Experimental Eye Research</span></div></div><div class="buttons" data-dcnode-id="277"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="278" type="button"><span class="button-link-text" data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="279" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="280"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="269"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="270" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="271"><p data-dcnode-id="272" id="abspara0010"><span data-dcnode-id="276" instrument_node="">The Rapid Eye Movement (REM) phase of sleep, also known as “active sleep” because of physiological similarities to waking state</span><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">,</span></strong><span data-dcnode-id="273" instrument_node=""> is characterized by intense cerebral electrical activity, propensity to dream vividly and suppression of skeletal muscle activity (atonia) except for the extraocular muscles which give rise to the so-called REM. In 1998 David Maurice, an ophthalmologist, proposed that REM sleep was associated with an eye function: it would be required to stir the anterior chamber and bath it with aqueous humor to prevent corneal anoxia during sleep. However, potential metabolic problems could arise in the outer retinal layers which lack a direct blood supply. New research lends support to the hypothesis that a para-vascular transport system, the so-called “glymphatic”, is present in the eye analogous to the one recently discovered in the brain. It is a functional waste clearance pathway which promotes elimination of interstitial solutes from the brain along para-vascular channels. Glymphatic function increases during sleep and just as a “brain pump” moves fluids in the central nervous system, a “vitreous pump” moves them into the eyeballs during REM phase. A number of similarities between Alzheimer's disease and several retinal degenerations have been described, particularly with respect to either age-related macular degeneration and chronic open-angle glaucoma. Impairment of this mechanism in some disease states and in the normal aging process could have serious consequences for visual function. In this manuscript I propose a new hypothesis regarding the role of REM phase on physio-pathology of the human eye: it would be an ingenious mechanism to enhanced clearance of metabolic waste from the retina.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="250"><div class="sub-heading" data-dcnode-id="262"><a data-dcnode-id="265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1053810021001409" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="266" id="citing-articles-article5-title"><span data-dcnode-id="267" instrument_node="">Do animals dream?</span></h3></a><div class="article-source ellipsis" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">2021, Consciousness and Cognition</span></div></div><div class="buttons" data-dcnode-id="256"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="257" type="button"><span class="button-link-text" data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="258" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="259"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="251"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="252" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="253"><p data-dcnode-id="254" id="sp0010"><span data-dcnode-id="255" instrument_node="">The understanding of biological functions of sleep has improved recently, including an understanding of the deep evolutionary roots of sleep among animals. However, dreaming as an element of sleep may be particularly difficult to address in non-human animals because in humans dreaming involves a non-wakeful form of awareness typically identified through verbal report. Here, we argue that parallels that exist between the phenomenology, physiology, and sleep behaviors during human dreaming provide an avenue to investigate dreaming in non-human animals. We review three alternative measurements of human dreaming – neural correlates of dreaming, ‘replay’ of newly-acquired memories, and dream-enacting behaviors – and consider how these may be applied to non-human animal models. We suggest that while animals close in brain structure to humans (such as mammals and birds) may be optimal models for the first two of these measurements, cephalopods, especially octopuses, may be particularly good candidates for the third.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85034969198%26md5%3D15dabd267ac43b339f18726cbbf49052" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="247" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="248"></path></svg><span class="button-alternative-text" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">View all citing articles on Scopus</span></
