 and hippocampal EEG theta waves associated with REM sleep, suggesting a priority focus for future investigations. From a clinical perspective, the existence of two functionally segregated sets of glutamatergic SLD REM-on neurons may provide a framework for understanding the occasional dissociation of cortical activation and muscle atonia observed during various REM sleep pathologies, including </span><a class="topic-link" data-dcnode-id="12004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/cataplexy" title="Learn more about cataplexy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12005" instrument_node="">cataplexy</span></a><span data-dcnode-id="12003" instrument_node="">, </span></span><a class="topic-link" data-dcnode-id="12000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/sleep-paralysis" title="Learn more about sleep paralysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="12001" instrument_node="">sleep paralysis</span></a><span data-dcnode-id="11995"><span data-dcnode-id="11999" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="11997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/rapid-eye-movement-sleep-behavior-disorder" title="Learn more about REM sleep behavior disorder from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11998" instrument_node="">REM sleep behavior disorder</span></a><span data-dcnode-id="11996" instrument_node=""> </span></span></span><a class="workspace-trigger" data-dcnode-id="11992" href="#bib94" name="bbib94"><span data-dcnode-id="11993" instrument_node="">94</span></a><span data-dcnode-id="11991" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11989" href="#bib95" name="bbib95"><span data-dcnode-id="11990" instrument_node="">95</span></a><span data-dcnode-id="11988" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11986" href="#bib96" name="bbib96"><span data-dcnode-id="11987" instrument_node="">96</span></a><span data-dcnode-id="11985" instrument_node="">.</span></p><p data-dcnode-id="11884" id="p0105"><span data-dcnode-id="11967"><span data-dcnode-id="11979"><span data-dcnode-id="11983" instrument_node="">It is also unclear how </span><a class="topic-link" data-dcnode-id="11981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/cell-nucleus" title="Learn more about SLD cells from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11982" instrument_node="">SLD cells</span></a><span data-dcnode-id="11980" instrument_node=""> are regulated, although many different sources of synaptic inputs to the SLD have been identified, including those containing </span></span><a class="topic-link" data-dcnode-id="11977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/acetylcholine" title="Learn more about acetylcholine from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11978" instrument_node="">acetylcholine</span></a><span data-dcnode-id="11968"><span data-dcnode-id="11976" instrument_node="">, </span><a class="topic-link" data-dcnode-id="11974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/norepinephrine" title="Learn more about noradrenaline from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11975" instrument_node="">noradrenaline</span></a><span data-dcnode-id="11969"><span data-dcnode-id="11973" instrument_node="">, serotonin, GABA, </span><a class="topic-link" data-dcnode-id="11971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/glutamic-acid" title="Learn more about glutamate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11972" instrument_node="">glutamate</span></a><span data-dcnode-id="11970" instrument_node=""> and various peptides </span></span></span></span><a class="workspace-trigger" data-dcnode-id="11965" href="#bib14" name="bbib14"><span data-dcnode-id="11966" instrument_node="">14</span></a><span data-dcnode-id="11964" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11962" href="#bib97" name="bbib97"><span data-dcnode-id="11963" instrument_node="">97</span></a><span data-dcnode-id="11961" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11959" href="#bib98" name="bbib98"><span data-dcnode-id="11960" instrument_node="">98</span></a><span data-dcnode-id="11958" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11956" href="#bib99" name="bbib99"><span data-dcnode-id="11957" instrument_node="">99</span></a><span data-dcnode-id="11955" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11953" href="#bib100" name="bbib100"><span data-dcnode-id="11954" instrument_node="">100</span></a><span data-dcnode-id="11952" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11950" href="#bib101" name="bbib101"><span data-dcnode-id="11951" instrument_node="">101</span></a><span data-dcnode-id="11937"><span data-dcnode-id="11945"><span data-dcnode-id="11949" instrument_node="">. Of these inputs, the most important source arises from </span><a class="topic-link" data-dcnode-id="11947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/gaba-receptor" title="Learn more about GABAergic neurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11948" instrument_node="">GABAergic neurons</span></a><span data-dcnode-id="11946" instrument_node=""> in the nearby ventrolateral </span></span><a class="topic-link" data-dcnode-id="11943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/periaqueductal-gray" title="Learn more about periaqueductal gray from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11944" instrument_node="">periaqueductal gray</span></a><span data-dcnode-id="11938"><span data-dcnode-id="11942" instrument_node=""> matter (vlPAG) and adjacent lateral </span><a class="topic-link" data-dcnode-id="11940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/pontine-tegmentum" title="Learn more about pontine tegmentum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11941" instrument_node="">pontine tegmentum</span></a><span data-dcnode-id="11939" instrument_node=""> (LPT; also called the deep mesencephalic nuclei, DpMe) </span></span></span><a class="workspace-trigger" data-dcnode-id="11935" href="#bib14" name="bbib14"><span data-dcnode-id="11936" instrument_node="">14</span></a><span data-dcnode-id="11934" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11932" href="#bib15" name="bbib15"><span data-dcnode-id="11933" instrument_node="">15</span></a><span data-dcnode-id="11931" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11929" href="#bib97" name="bbib97"><span data-dcnode-id="11930" instrument_node="">97</span></a><span data-dcnode-id="11928" instrument_node="">. GABAergic vlPAG/LPT neurons appear to provide inhibitory control over SLD cells since lesions or pharmacological inactivation of these neurons produces excessive REM sleep as well as cataplexy-like events </span><a class="workspace-trigger" data-dcnode-id="11926" href="#bib14" name="bbib14"><span data-dcnode-id="11927" instrument_node="">14</span></a><span data-dcnode-id="11925" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11923" href="#bib15" name="bbib15"><span data-dcnode-id="11924" instrument_node="">15</span></a><span data-dcnode-id="11922" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11920" href="#bib102" name="bbib102"><span data-dcnode-id="11921" instrument_node="">102</span></a><span data-dcnode-id="11919" instrument_node="">. In addition, optogenetic inhibition of vlPAG GABA neurons promotes REM sleep&nbsp;</span><a class="workspace-trigger" data-dcnode-id="11917" href="#bib13" name="bbib13"><span data-dcnode-id="11918" instrument_node="">[13]</span></a><span data-dcnode-id="11916" instrument_node="">. Finally, application of a GABA</span><sub data-dcnode-id="11914"><span data-dcnode-id="11915" instrument_node="">A</span></sub><span data-dcnode-id="11913" instrument_node=""> antagonist into the SLD of rats rapidly induces an REM sleep-like state, suggesting that disinhibition from GABAergic inputs is an important synaptic mechanism for ‘activating’ SLD REM-ON neurons </span><a class="workspace-trigger" data-dcnode-id="11911" href="#bib97" name="bbib97"><span data-dcnode-id="11912" instrument_node="">97</span></a><span data-dcnode-id="11910" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11908" href="#bib103" name="bbib103"><span data-dcnode-id="11909" instrument_node="">103</span></a><span data-dcnode-id="11907" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11905" href="#bib104" name="bbib104"><span data-dcnode-id="11906" instrument_node="">104</span></a><span data-dcnode-id="11904" instrument_node="">. On the collective basis of these findings it has been proposed that GABAergic vlPAG/LPT neurons tonically inhibit REM-ON SLD neurons. The vlPAG/LDT-SLD/PC circuit thus functions to&nbsp;prevent inappropriate activation of REM sleep atonia-generating neurons during wakefulness and at the same time ensures rapid reconstitution of muscle tone on awakening </span><a class="workspace-trigger" data-dcnode-id="11902" href="#bib14" name="bbib14"><span data-dcnode-id="11903" instrument_node="">14</span></a><span data-dcnode-id="11901" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11899" href="#bib19" name="bbib19"><span data-dcnode-id="11900" instrument_node="">19</span></a><span data-dcnode-id="11898" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11896" href="#bib96" name="bbib96"><span data-dcnode-id="11897" instrument_node="">96</span></a><span data-dcnode-id="11891"><span data-dcnode-id="11895" instrument_node="">. A&nbsp;dramatic example of failure of this circuitry (or at least the synaptic balance of this circuitry) is seen in animals and humans&nbsp;lacking </span><a class="topic-link" data-dcnode-id="11893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/orexin" title="Learn more about orexin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11894" instrument_node="">orexin</span></a><span data-dcnode-id="11892" instrument_node=""> signalling </span></span><a class="workspace-trigger" data-dcnode-id="11889" href="#bib105" name="bbib105"><span data-dcnode-id="11890" instrument_node="">105</span></a><span data-dcnode-id="11888" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11886" href="#bib106" name="bbib106"><span data-dcnode-id="11887" instrument_node="">106</span></a><span data-dcnode-id="11885" instrument_node="">. The absence of excitatory orexin ‘tone’ is thought to disfacilitate vlPAG/LPT/DpMe REM-off&nbsp;neurons (i.e., cells that are minimally active in REM sleep), in turn inappropriately biasing activation of SLD neurons during wake and leading to the loss of postural muscle tone, i.e., cataplexy.</span></p><p data-dcnode-id="11859" id="p0110"><span data-dcnode-id="11879"><span data-dcnode-id="11883" instrument_node="">Given the accumulating data on SLD function, it is perhaps not surprising that many investigators view the SLD as a critical region for REM sleep control. And while there is ample evidence to support this view, it is important to bear in mind that both old and recent studies have inferred the existence of at least one additional region that is important for REM sleep control. Specifically, outcomes of lesion, unit recording and chemogenetic studies have suggested an important role for the vM, including the medially located ventral </span><a class="topic-link" data-dcnode-id="11881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/gigantocellular-reticular-nucleus" title="Learn more about gigantocellular reticular nucleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11882" instrument_node="">gigantocellular reticular nucleus</span></a><span data-dcnode-id="11880" instrument_node=""> (GiV) and α-gigantocellular reticular nuclei (GiA) and laterally adjacent paragigantocellular (LPGi) cell groups, in REM sleep control and REM sleep atonia </span></span><a class="workspace-trigger" data-dcnode-id="11877" href="#bib8" name="bbib8"><span data-dcnode-id="11878" instrument_node="">8</span></a><span data-dcnode-id="11876" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11874" href="#bib107" name="bbib107"><span data-dcnode-id="11875" instrument_node="">107</span></a><span data-dcnode-id="11873" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11871" href="#bib108" name="bbib108"><span data-dcnode-id="11872" instrument_node="">108</span></a><span data-dcnode-id="11870" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11868" href="#bib109" name="bbib109"><span data-dcnode-id="11869" instrument_node="">109</span></a><span data-dcnode-id="11863"><span data-dcnode-id="11867" instrument_node="">. In general support of this concept, a recent optogenetic study found that activation of vM GABA neurons could potently trigger REM sleep and produce REM sleep atonia, and that this effect was likely mediated through the vlPAG-SLD circuit and direct, i.e., SLD-independent, projections to spinal </span><a class="topic-link" data-dcnode-id="11865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/motor-neuron" title="Learn more about motor neurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11866" instrument_node="">motor neurons</span></a><span data-dcnode-id="11864" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="11861" href="#bib13" name="bbib13"><span data-dcnode-id="11862" instrument_node="">[13]</span></a><span data-dcnode-id="11860" instrument_node="">.</span></p><p data-dcnode-id="11798" id="p0115"><span data-dcnode-id="11858" instrument_node="">Thus, while glutamatergic neurons of the SLD and GABAergic neurons of the vM are widely viewed as key circuit elements that work jointly in REM sleep control, our interpretation of the literature yields the more nuanced view that REM sleep control is supported by a </span><em data-dcnode-id="11856"><span data-dcnode-id="11857" instrument_node="">distributed network of circuits</span></em><span data-dcnode-id="11843"><span data-dcnode-id="11847"><span data-dcnode-id="11851"><span data-dcnode-id="11855" instrument_node="">, with this distributed circuit network spanning the brainstem, </span><a class="topic-link" data-dcnode-id="11853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/protocerebrum" title="Learn more about midbrain from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11854" instrument_node="">midbrain</span></a><span data-dcnode-id="11852" instrument_node=""> and </span></span><a class="topic-link" data-dcnode-id="11849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/hypothalamus" title="Learn more about hypothalamus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11850" instrument_node="">hypothalamus</span></a><span data-dcnode-id="11848" instrument_node="">. We now know, for example, that lateral hypothalamic cells that contain </span></span><a class="topic-link" data-dcnode-id="11845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/melanin-concentrating-hormone" title="Learn more about melanin concentrating hormone from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11846" instrument_node="">melanin concentrating hormone</span></a><span data-dcnode-id="11844" instrument_node=""> (MCH) play a role in promoting REM sleep, possibly through inhibition of REM-off neurons in the vlPAG/LPT </span></span><a class="workspace-trigger" data-dcnode-id="11841" href="#bib16" name="bbib16"><span data-dcnode-id="11842" instrument_node="">16</span></a><span data-dcnode-id="11840" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11838" href="#bib110" name="bbib110"><span data-dcnode-id="11839" instrument_node="">110</span></a><span data-dcnode-id="11837" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11835" href="#bib111" name="bbib111"><span data-dcnode-id="11836" instrument_node="">111</span></a><span data-dcnode-id="11834" instrument_node="">. The synaptic mechanism by which MCH cells regulate the vlPAG/LPT remains unclear, but could be directly through MCH or GABA release or indirectly through glutamate-mediated feedforward inhibition </span><a class="workspace-trigger" data-dcnode-id="11832" href="#bib16" name="bbib16"><span data-dcnode-id="11833" instrument_node="">16</span></a><span data-dcnode-id="11831" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11829" href="#bib112" name="bbib112"><span data-dcnode-id="11830" instrument_node="">112</span></a><span data-dcnode-id="11824"><span data-dcnode-id="11828" instrument_node="">. </span><a class="topic-link" data-dcnode-id="11826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/microinjection" title="Learn more about Microinjections from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11827" instrument_node="">Microinjections</span></a><span data-dcnode-id="11825" instrument_node=""> of MCH into the SLD also increase REM sleep, suggesting that MCH, acting at the level of the SLD, may contribute to both the descending (atonia) and ascending (EEG desynchronization and theta activity) aspects of REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="11822" href="#bib113" name="bbib113"><span data-dcnode-id="11823" instrument_node="">[113]</span></a><span data-dcnode-id="11817"><span data-dcnode-id="11821" instrument_node="">. Also, </span><a class="topic-link" data-dcnode-id="11819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/cholinergic-neuron" title="Learn more about cholinergic neurons from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11820" instrument_node="">cholinergic neurons</span></a><span data-dcnode-id="11818" instrument_node=""> of the pedunculopontine and laterodorsal tegmental nuclei (PPT/LDT) are active during REM sleep and project to the SLD and optogenetic activation of these neurons during non-REM sleep promotes REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="11815" href="#bib114" name="bbib114"><span data-dcnode-id="11816" instrument_node="">114</span></a><span data-dcnode-id="11814" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11812" href="#bib115" name="bbib115"><span data-dcnode-id="11813" instrument_node="">115</span></a><span data-dcnode-id="11811" instrument_node="">. It should, however, be noted that more recent studies have cast doubt on the claim of sufficiency and necessity of the cholinergic PPT/LDT or cholinergic inputs to the SLD in REM sleep control </span><a class="workspace-trigger" data-dcnode-id="11809" href="#bib116" name="bbib116"><span data-dcnode-id="11810" instrument_node="">116</span></a><span data-dcnode-id="11808" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11806" href="#bib117" name="bbib117"><span data-dcnode-id="11807" instrument_node="">117</span></a><span data-dcnode-id="11805" instrument_node="">. Finally, a role for the supramammillary hypothalamus, in particular resident glutamate-releasing/Nos1-expressing neurons, in the regulation of REM sleep and REM hippocampal theta has been recently reported </span><a class="workspace-trigger" data-dcnode-id="11803" href="#bib118" name="bbib118"><span data-dcnode-id="11804" instrument_node="">118</span></a><span data-dcnode-id="11802" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11800" href="#bib119" name="bbib119"><span data-dcnode-id="11801" instrument_node="">119</span></a><span data-dcnode-id="11799" instrument_node="">.</span></p><p data-dcnode-id="11773" id="p0120"><span data-dcnode-id="11797" instrument_node="">Because REM sleep propensity is greatest during the latter part of the rest phase and REM sleep propensity coincides with the nadir of the body temperature circadian rhythm, an active role for the circadian clock in REM sleep regulation is indicated </span><a class="workspace-trigger" data-dcnode-id="11795" href="#bib75" name="bbib75"><span data-dcnode-id="11796" instrument_node="">75</span></a><span data-dcnode-id="11794" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11792" href="#bib120" name="bbib120"><span data-dcnode-id="11793" instrument_node="">120</span></a><span data-dcnode-id="11791" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11789" href="#bib121" name="bbib121"><span data-dcnode-id="11790" instrument_node="">121</span></a><span data-dcnode-id="11780"><span data-dcnode-id="11784"><span data-dcnode-id="11788" instrument_node="">. Consistent with this, </span><a class="topic-link" data-dcnode-id="11786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/lesion-studies" title="Learn more about lesion studies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11787" instrument_node="">lesion studies</span></a><span data-dcnode-id="11785" instrument_node=""> in rodents have shown that the circadian clock actively promotes REM sleep during the rest, but not active, period but has almost no role in determining the total amount of REM sleep, which instead is determined by </span></span><a class="topic-link" data-dcnode-id="11782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/homeostasis" title="Learn more about homeostatic mechanisms from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11783" instrument_node="">homeostatic mechanisms</span></a><span data-dcnode-id="11781" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="11778" href="#bib122" name="bbib122"><span data-dcnode-id="11779" instrument_node="">[122]</span></a><span data-dcnode-id="11777" instrument_node="">. Other studies suggest that the circadian clock actively suppresses REM sleep during the active period, and that this suppression is mediated by orexin neurons </span><a class="workspace-trigger" data-dcnode-id="11775" href="#bib123" name="bbib123"><span data-dcnode-id="11776" instrument_node="">[123]</span></a><span data-dcnode-id="11774" instrument_node="">.</span></p></section><section data-dcnode-id="11374" id="sec1.5"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11770" id="sectitle0040"><span data-dcnode-id="11771" instrument_node="">Pathobiology of REM Sleep</span></h3><p data-dcnode-id="11761" id="p0125"><span data-dcnode-id="11765"><span data-dcnode-id="11769" instrument_node="">Identifying the circuit mechanisms underlying REM sleep has also yielded a far deeper understanding of disorders associated with abnormal REM sleep control. For example, REM sleep behaviour disorder and </span><a class="topic-link" data-dcnode-id="11767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/narcolepsy" title="Learn more about narcolepsy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11768" instrument_node="">narcolepsy</span></a><span data-dcnode-id="11766" instrument_node=""> are two common </span></span><a class="topic-link" data-dcnode-id="11763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/sleep-disorders" title="Learn more about sleep disorders from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11764" instrument_node="">sleep disorders</span></a><span data-dcnode-id="11762" instrument_node=""> that link, at least in part, to pathogenic changes in the circuit control mechanisms underlying healthy REM sleep. Here, we discuss how recent advances in dissecting REM sleep&nbsp;biology have led to a deeper understanding of these two disorders.</span></p><section data-dcnode-id="11569" id="sec1.5.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11759" id="sectitle0045"><span data-dcnode-id="11760" instrument_node="">REM Sleep Behaviour Disorder</span></h4><p data-dcnode-id="11719" id="p0130"><span data-dcnode-id="11758" instrument_node="">REM sleep behaviour disorder (RBD) is a neurological condition characterized by loss of the biological mechanisms that cause REM sleep paralysis, resulting in excessive motor behaviors during REM sleep </span><a class="workspace-trigger" data-dcnode-id="11756" href="#bib124" name="bbib124"><span data-dcnode-id="11757" instrument_node="">124</span></a><span data-dcnode-id="11755" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11753" href="#bib125" name="bbib125"><span data-dcnode-id="11754" instrument_node="">125</span></a><span data-dcnode-id="11752" instrument_node="">. Movements in RBD range from shouting and sporadic limb jerks to more complex movements such as punching or kicking </span><a class="workspace-trigger" data-dcnode-id="11750" href="#bib126" name="bbib126"><span data-dcnode-id="11751" instrument_node="">126</span></a><span data-dcnode-id="11749" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11747" href="#bib127" name="bbib127"><span data-dcnode-id="11748" instrument_node="">127</span></a><span data-dcnode-id="11746" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11744" href="#bib128" name="bbib128"><span data-dcnode-id="11745" instrument_node="">128</span></a><span data-dcnode-id="11743" instrument_node="">. These movements in RBD are not innocuous as they often result in physical injury of the patient and/or their bed-partner </span><a class="workspace-trigger" data-dcnode-id="11741" href="#bib129" name="bbib129"><span data-dcnode-id="11742" instrument_node="">[129]</span></a><span data-dcnode-id="11740" instrument_node="">. But, the most alarming aspect of RBD is that the majority of patients develop a neurodegenerative disease within 6–15 years of initial RBD diagnosis </span><a class="workspace-trigger" data-dcnode-id="11738" href="#bib129" name="bbib129"><span data-dcnode-id="11739" instrument_node="">[129]</span></a><span data-dcnode-id="11729"><span data-dcnode-id="11733"><span data-dcnode-id="11737" instrument_node="">. RBD is currently the strongest known predictor of a class of neurodegenerative disorders known as synucleinopathies with 80–90% of patients developing Parkinson’s disease, </span><a class="topic-link" data-dcnode-id="11735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/dementia-with-lewy-bodies" title="Learn more about dementia with Lewy bodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11736" instrument_node="">dementia with Lewy bodies</span></a><span data-dcnode-id="11734" instrument_node="">, or </span></span><a class="topic-link" data-dcnode-id="11731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/multiple-system-atrophy" title="Learn more about multiple system atrophy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11732" instrument_node="">multiple system atrophy</span></a><span data-dcnode-id="11730" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="11727" href="#bib130" name="bbib130"><span data-dcnode-id="11728" instrument_node="">130</span></a><span data-dcnode-id="11726" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11724" href="#bib131" name="bbib131"><span data-dcnode-id="11725" instrument_node="">131</span></a><span data-dcnode-id="11723" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11721" href="#bib132" name="bbib132"><span data-dcnode-id="11722" instrument_node="">132</span></a><span data-dcnode-id="11720" instrument_node="">.</span></p><div data-dcnode-id="11645"><p data-dcnode-id="11686" id="p0135"><span data-dcnode-id="11714"><span data-dcnode-id="11718" instrument_node="">The link between RBD and synucleinopathies suggests that RBD itself stems from a </span><a class="topic-link" data-dcnode-id="11716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/neurodegenerative-process" title="Learn more about neurodegenerative process from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11717" instrument_node="">neurodegenerative process</span></a><span data-dcnode-id="11715" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="11712" href="#bib133" name="bbib133"><span data-dcnode-id="11713" instrument_node="">[133]</span></a><span data-dcnode-id="11711" instrument_node="">. Emerging new data indicate that RBD patients exhibit degeneration within the brainstem circuits that control REM sleep (e.g.,&nbsp;the SLD and vM, </span><a class="workspace-trigger" data-dcnode-id="11709" href="#fig4" name="bfig4"><span data-dcnode-id="11710" instrument_node="">Figure&nbsp;4</span></a><span data-dcnode-id="11708" instrument_node="">). For example, neuro-imaging studies show that RBD patients exhibit signs of degeneration within the dorsal pons where REM sleep circuits are located </span><a class="workspace-trigger" data-dcnode-id="11706" href="#bib134" name="bbib134"><span data-dcnode-id="11707" instrument_node="">[134]</span></a><span data-dcnode-id="11693"><span data-dcnode-id="11697"><span data-dcnode-id="11705" instrument_node="">. In addition, post-mortem analysis of brains from RBD patients with comorbid Parkinson’s disease demonstrate neural loss, </span><a class="topic-link" data-dcnode-id="11703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/gliosis" title="Learn more about gliosis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11704" instrument_node="">gliosis</span></a><span data-dcnode-id="11698"><span data-dcnode-id="11702" instrument_node=""> and </span><a class="topic-link" data-dcnode-id="11700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/lewy-body" title="Learn more about Lewy body from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11701" instrument_node="">Lewy body</span></a><span data-dcnode-id="11699" instrument_node=""> and </span></span></span><a class="topic-link" data-dcnode-id="11695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/neurite" title="Learn more about neurite from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11696" instrument_node="">neurite</span></a><span data-dcnode-id="11694" instrument_node=""> deposition (indicators of synucleinopathies) in the brainstem areas that control REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="11691" href="#bib124" name="bbib124"><span data-dcnode-id="11692" instrument_node="">124</span></a><span data-dcnode-id="11690" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11688" href="#bib135" name="bbib135"><span data-dcnode-id="11689" instrument_node="">135</span></a><span data-dcnode-id="11687" instrument_node="">. These data suggest that degeneration within the REM sleep circuits could underlie RBD.</span></p><figure class="figure text-xs" data-dcnode-id="11646" id="fig4"><span data-dcnode-id="11670"><img alt="" aria-describedby="cap0025" data-dcnode-id="11685" height="291" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr4.jpg&amp;raw"><span data-dcnode-id="11684" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11671"><li data-dcnode-id="11678"><a class="anchor download-link u-font-sans" data-dcnode-id="11679" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr4_lrg.jpg" target="_blank" title="Download high-res image (273KB)"><span class="anchor-text" data-dcnode-id="11680"><span data-dcnode-id="11683" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11681"><span data-dcnode-id="11682" instrument_node="">Download high-res image (273KB)</span></span></span></a></li><li data-dcnode-id="11672"><a class="anchor download-link u-font-sans" data-dcnode-id="11673" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11674"><span data-dcnode-id="11677" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11675"><span data-dcnode-id="11676" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11647"><span data-dcnode-id="11648" id="cap0025"><p data-dcnode-id="11658" id="fspara0040"><span class="label" data-dcnode-id="11668"><span data-dcnode-id="11669" instrument_node="">Figure&nbsp;4</span></span><span data-dcnode-id="11667" instrument_node="">. </span><span data-dcnode-id="11662"><span data-dcnode-id="11666" instrument_node="">Involvement of </span><a class="topic-link" data-dcnode-id="11664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rem-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11665" instrument_node="">REM sleep</span></a><span data-dcnode-id="11663" instrument_node=""> circuitry in </span></span><a class="topic-link" data-dcnode-id="11660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/rapid-eye-movement-sleep-behavior-disorder" title="Learn more about REM sleep behavior disorder from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11661" instrument_node="">REM sleep behavior disorder</span></a><span data-dcnode-id="11659" instrument_node=""> (RBD).</span></p><p data-dcnode-id="11649" id="fspara0045"><span data-dcnode-id="11657" instrument_node="">The hypothesized mechanisms and pathways by&nbsp;which synucleinopathic degeneration causes RBD. Synucleinopathic-mediated degeneration begins in the caudal </span><a class="topic-link" data-dcnode-id="11655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/brainstem" title="Learn more about brainstem from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11656" instrument_node="">brainstem</span></a><span data-dcnode-id="11650"><span data-dcnode-id="11654" instrument_node=""> and spreads inexorably rostrally, in a cell-to-cell fashion. Degeneration initially targets the sublaterodorsal nucleus (SLD) and ventral medulla (vM), impairing their functions and thereby causing loss of REM sleep atonia and the motor behaviors associated with RBD. But, as degenerative processes advance, they spread rostrally into the forebrain circuits that control normal cognition and waking motor behaviors (i.e., the </span><a class="topic-link" data-dcnode-id="11652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/substantia-nigra" title="Learn more about substantia nigra from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11653" instrument_node="">substantia nigra</span></a><span data-dcnode-id="11651" instrument_node="">, SN), thus leading to the classic cognitive and motor symptoms associated with synucleinopathies (e.g., Parkinson’s disease) that follow initial RBD symptoms.</span></span></p></span></span></figure></div><p data-dcnode-id="11619" id="p0140"><span data-dcnode-id="11644" instrument_node="">Classic lesion studies also suggest that damage to REM sleep&nbsp;circuitry contributes to RBD. For example, chemical, electrolytic and neuron-specific lesions of the REM sleep circuit, including the SLD and vM, result in loss of normal REM sleep paralysis and RBD-like motor behaviours in cats and rodents </span><a class="workspace-trigger" data-dcnode-id="11642" href="#bib8" name="bbib8"><span data-dcnode-id="11643" instrument_node="">8</span></a><span data-dcnode-id="11641" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11639" href="#bib14" name="bbib14"><span data-dcnode-id="11640" instrument_node="">14</span></a><span data-dcnode-id="11638" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11636" href="#bib84" name="bbib84"><span data-dcnode-id="11637" instrument_node="">84</span></a><span data-dcnode-id="11635" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11633" href="#bib85" name="bbib85"><span data-dcnode-id="11634" instrument_node="">85</span></a><span data-dcnode-id="11632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11630" href="#bib86" name="bbib86"><span data-dcnode-id="11631" instrument_node="">86</span></a><span data-dcnode-id="11629" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11627" href="#fig3" name="bfig3"><span data-dcnode-id="11628" instrument_node="">Figure&nbsp;3</span></a><span data-dcnode-id="11626" instrument_node="">). In addition, tumours or strokes that cause lesions of the dorsal pons where REM sleep circuits are located also cause RBD-like behaviours in humans </span><a class="workspace-trigger" data-dcnode-id="11624" href="#bib136" name="bbib136"><span data-dcnode-id="11625" instrument_node="">136</span></a><span data-dcnode-id="11623" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11621" href="#bib137" name="bbib137"><span data-dcnode-id="11622" instrument_node="">137</span></a><span data-dcnode-id="11620" instrument_node="">. Therefore, both clinical and basic science data indicate that RBD is caused by damage of the brainstem circuits that produce normal REM sleep.</span></p><p data-dcnode-id="11610" id="p0145"><span data-dcnode-id="11618" instrument_node="">Because 80% of RBD patients ultimately develop a synucleinopathy, it seems reasonable to assume that RBD is the earliest symptom in these disorders, that is, RBD is itself a synucleinopathy </span><a class="workspace-trigger" data-dcnode-id="11616" href="#bib132" name="bbib132"><span data-dcnode-id="11617" instrument_node="">[132]</span></a><span data-dcnode-id="11611"><span data-dcnode-id="11615" instrument_node="">. But, why does </span><a class="topic-link" data-dcnode-id="11613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/neurodegeneration" title="Learn more about neurodegeneration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11614" instrument_node="">neurodegeneration</span></a><span data-dcnode-id="11612" instrument_node=""> affect REM sleep circuitry years before the onset of synpucleinopathies such as Parkinson’s disease? New research concerning the root mechanisms of how synucleinopathies spread throughout the central nervous system is providing new clues about the potential link between RBD, neurodegeneration and synucleinopathies.</span></span></p><p data-dcnode-id="11572" id="p0150"><span data-dcnode-id="11609" instrument_node="">Emerging new research suggests that cell-to-cell transmission of mis-folded alpha-synuclein is the disease-causing mechanism in synucleinopathies, with mis-folded alpha-synuclein causing neuronal dysfunction and death </span><a class="workspace-trigger" data-dcnode-id="11607" href="#bib138" name="bbib138"><span data-dcnode-id="11608" instrument_node="">138</span></a><span data-dcnode-id="11606" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11604" href="#bib139" name="bbib139"><span data-dcnode-id="11605" instrument_node="">139</span></a><span data-dcnode-id="11599"><span data-dcnode-id="11603" instrument_node="">. Recent data show that synucleinopathies actually begin in the periphery and then spread into the central nervous system. Pathogenic alpha-synuclein appears to travel along </span><a class="topic-link" data-dcnode-id="11601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/vagus-nerve" title="Learn more about vagus nerve from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11602" instrument_node="">vagus nerve</span></a><span data-dcnode-id="11600" instrument_node=""> afferents </span></span><a class="workspace-trigger" data-dcnode-id="11597" href="#bib140" name="bbib140"><span data-dcnode-id="11598" instrument_node="">140</span></a><span data-dcnode-id="11596" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11594" href="#bib141" name="bbib141"><span data-dcnode-id="11595" instrument_node="">141</span></a><span data-dcnode-id="11593" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11591" href="#bib142" name="bbib142"><span data-dcnode-id="11592" instrument_node="">142</span></a><span data-dcnode-id="11582"><span data-dcnode-id="11586"><span data-dcnode-id="11590" instrument_node="">, which terminate in the nucleus of the </span><a class="topic-link" data-dcnode-id="11588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/solitary-tract" title="Learn more about solitary tract from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11589" instrument_node="">solitary tract</span></a><span data-dcnode-id="11587" instrument_node=""> and dorsal motor nucleus of the vagus, which sits in close apposition to REM sleep circuitry (i.e., the SLD and vM). Therefore, synucleinopathies may initially impact the cells that control REM sleep atonia before spreading rostrally into the brain structures (e.g., </span></span><a class="topic-link" data-dcnode-id="11584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/substantia-nigra" title="Learn more about substantia nigra from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11585" instrument_node="">substantia nigra</span></a><span data-dcnode-id="11583" instrument_node=""> and cortex) that cause the classic cognitive and motor impairments associated with synucleinopathies. Although this idea remains speculative it nonetheless fits with a classic model of Parkinson’s disease pathogenesis, which proposes that neurodegeneration starts in the brainstem before ascending rostrally </span></span><a class="workspace-trigger" data-dcnode-id="11580" href="#bib143" name="bbib143"><span data-dcnode-id="11581" instrument_node="">[143]</span></a><span data-dcnode-id="11579" instrument_node="">. Several lines of clinical data also support the idea that RBD could result from synucleinopathic degeneration that starts in the periphery and then spreads into the brainstem. For example, RBD patients exhibit not only alpha-synuclein deposition in peripheral tissues </span><a class="workspace-trigger" data-dcnode-id="11577" href="#bib144" name="bbib144"><span data-dcnode-id="11578" instrument_node="">[144]</span></a><span data-dcnode-id="11576" instrument_node=""> but also cell loss and alpha-synuclein deposition in the brainstem regions&nbsp;that control REM sleep motor atonia (i.e., the SLD and&nbsp;vM) </span><a class="workspace-trigger" data-dcnode-id="11574" href="#bib124" name="bbib124"><span data-dcnode-id="11575" instrument_node="">[124]</span></a><span data-dcnode-id="11573" instrument_node="">.</span></p><p data-dcnode-id="11570" id="p0155"><span data-dcnode-id="11571" instrument_node="">While these new data suggest that synucleinopathic-mediated degeneration affects the circuits that control REM sleep, it remains unclear why REM sleep circuits themselves are the initial target of, and are vulnerable to, neurodegeneration. This is an important concept because the REM sleep circuits are located in a region of the brainstem that also houses circuits that control other vital behaviors (e.g., breathing, chewing and swallowing) that are largely unaffected in RBD. Therefore, understanding how and why cells in the REM sleep circuit are targeted by degeneration will not only shed light on the pathophysiology of RBD, but may also help identify the origins and mechanisms of synucleinopathies themselves.</span></p></section><section data-dcnode-id="11375" id="sec1.5.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11567" id="sectitle0050"><span data-dcnode-id="11568" instrument_node="">Narcolepsy/Cataplexy</span></h4><p data-dcnode-id="11556" id="p0160"><span data-dcnode-id="11566" instrument_node="">Narcolepsy is another common sleep disorder that is associated with changes in REM sleep function. Narcolepsy is linked to the loss of hypothalamic orexin cells and is characterized by excessive sleepiness, disturbed REM sleep, sleep paralysis, and dream-like hallucinations before falling asleep (called hypnagogic hallucinations) </span><a class="workspace-trigger" data-dcnode-id="11564" href="#bib145" name="bbib145"><span data-dcnode-id="11565" instrument_node="">[145]</span></a><span data-dcnode-id="11563" instrument_node="">. Another common symptom of narcolepsy is cataplexy, which is the involuntary onset of skeletal muscle paralysis or weakness during wakefulness (a link to video demonstrating cataplexy can be found here: </span><a data-dcnode-id="11561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D3MBCeKn0Oeo" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="11562" instrument_node="">https://www.youtube.com/watch?v=3MBCeKn0Oeo</span></a><span data-dcnode-id="11560" instrument_node="">) </span><a class="workspace-trigger" data-dcnode-id="11558" href="#bib96" name="bbib96"><span data-dcnode-id="11559" instrument_node="">[96]</span></a><span data-dcnode-id="11557" instrument_node="">. The neural mechanisms that trigger cataplexy are hypothesized to result from intrusion of normal REM sleep paralysis into wakefulness.</span></p><p data-dcnode-id="11518" id="p0165"><span data-dcnode-id="11551"><span data-dcnode-id="11555" instrument_node="">Understanding mechanisms of REM sleep are helping to identify some of the potential causes of cataplexy. Converging lines of evidence suggest that cataplexy and REM sleep share a common neural mechanism. </span><a class="topic-link" data-dcnode-id="11553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/tricyclic-antidepressant" title="Learn more about Tricyclic antidepressants from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11554" instrument_node="">Tricyclic antidepressants</span></a><span data-dcnode-id="11552" instrument_node=""> are used to mitigate cataplexy, but they also suppress REM sleep, and withdrawal of these medications causes rebounds in cataplexy and REM sleep </span></span><a class="workspace-trigger" data-dcnode-id="11549" href="#bib146" name="bbib146"><span data-dcnode-id="11550" instrument_node="">146</span></a><span data-dcnode-id="11548" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11546" href="#bib147" name="bbib147"><span data-dcnode-id="11547" instrument_node="">147</span></a><span data-dcnode-id="11541"><span data-dcnode-id="11545" instrument_node="">. Neuroimaging studies in people with narcolepsy and </span><a class="topic-link" data-dcnode-id="11543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/electrophysiological-procedures" title="Learn more about electrophysiological recordings from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11544" instrument_node="">electrophysiological recordings</span></a><span data-dcnode-id="11542" instrument_node=""> from neurons in narcoleptic dogs show that the brainstem circuitry involved in REM sleep has similar activity during both REM sleep and cataplexy </span></span><a class="workspace-trigger" data-dcnode-id="11539" href="#bib148" name="bbib148"><span data-dcnode-id="11540" instrument_node="">148</span></a><span data-dcnode-id="11538" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11536" href="#bib149" name="bbib149"><span data-dcnode-id="11537" instrument_node="">149</span></a><span data-dcnode-id="11535" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11533" href="#bib150" name="bbib150"><span data-dcnode-id="11534" instrument_node="">150</span></a><span data-dcnode-id="11528"><span data-dcnode-id="11532" instrument_node="">. In narcoleptic dogs, cells in the </span><a class="topic-link" data-dcnode-id="11530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/locus-coeruleus" title="Learn more about locus coeruleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11531" instrument_node="">locus coeruleus</span></a><span data-dcnode-id="11529" instrument_node=""> (LC) are highly active during periods of wakefulness, but abruptly stop firing during cataplexy when muscle tone is lost </span></span><a class="workspace-trigger" data-dcnode-id="11526" href="#bib148" name="bbib148"><span data-dcnode-id="11527" instrument_node="">[148]</span></a><span data-dcnode-id="11525" instrument_node="">, which mirrors LC activity during REM sleep. Because LC cells project to and activate motoneurons, their inactivity during cataplexy (and REM sleep) could be a neural mechanism by which motor paralysis occurs during these states </span><a class="workspace-trigger" data-dcnode-id="11523" href="#bib151" name="bbib151"><span data-dcnode-id="11524" instrument_node="">[151]</span></a><span data-dcnode-id="11522" instrument_node="">. Motor paralysis during cataplexy and REM sleep may also be mediated by GABA/glycine cells in the vM (a region critical for promoting REM sleep paralysis) since their activity increases during both REM sleep and cataplexy </span><a class="workspace-trigger" data-dcnode-id="11520" href="#bib152" name="bbib152"><span data-dcnode-id="11521" instrument_node="">[152]</span></a><span data-dcnode-id="11519" instrument_node="">.</span></p><p data-dcnode-id="11499" id="p0170"><span data-dcnode-id="11513"><span data-dcnode-id="11517" instrument_node="">Some patients with narcolepsy report </span><a class="topic-link" data-dcnode-id="11515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/hypnagogic-hallucination" title="Learn more about hypnagogic hallucinations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11516" instrument_node="">hypnagogic hallucinations</span></a><span data-dcnode-id="11514" instrument_node=""> during cataplectic attacks, and some enter into REM sleep during cataplexy, suggesting that such attacks result from inappropriate recruitment of REM sleep circuits </span></span><a class="workspace-trigger" data-dcnode-id="11511" href="#bib96" name="bbib96"><span data-dcnode-id="11512" instrument_node="">96</span></a><span data-dcnode-id="11510" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11508" href="#bib145" name="bbib145"><span data-dcnode-id="11509" instrument_node="">145</span></a><span data-dcnode-id="11503"><span data-dcnode-id="11507" instrument_node="">. Recent data show that cataplexy-like attacks can be triggered in both wild-type and orexin </span><a class="topic-link" data-dcnode-id="11505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/knockout-mouse" title="Learn more about knockout mice from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11506" instrument_node="">knockout mice</span></a><span data-dcnode-id="11504" instrument_node=""> by directly activating the brainstem circuits that control REM sleep atonia (i.e., the SLD) </span></span><a class="workspace-trigger" data-dcnode-id="11501" href="#bib92" name="bbib92"><span data-dcnode-id="11502" instrument_node="">[92]</span></a><span data-dcnode-id="11500" instrument_node="">. This observation suggests that cataplexy may result from pathological recruitment of the circuits that cause REM sleep paralysis, and that muscle paralysis in REM sleep and cataplexy stem from a common neural mechanism.</span></p><div data-dcnode-id="11393"><p data-dcnode-id="11450" id="p0175"><span data-dcnode-id="11498" instrument_node="">Cataplexy is generally triggered by strong emotions such as hardy laughter, surprise or fear, and recent data suggest that there is a link between the brain structures that underlie emotional processing and those that trigger muscle atonia during REM sleep </span><a class="workspace-trigger" data-dcnode-id="11496" href="#bib96" name="bbib96"><span data-dcnode-id="11497" instrument_node="">96</span></a><span data-dcnode-id="11495" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11493" href="#bib153" name="bbib153"><span data-dcnode-id="11494" instrument_node="">153</span></a><span data-dcnode-id="11488"><span data-dcnode-id="11492" instrument_node="">. The </span><a class="topic-link" data-dcnode-id="11490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/amygdala" title="Learn more about amygdala from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11491" instrument_node="">amygdala</span></a><span data-dcnode-id="11489" instrument_node=""> not only processes emotions, but is also associated with REM sleep regulation and cataplexy </span></span><a class="workspace-trigger" data-dcnode-id="11486" href="#bib149" name="bbib149"><span data-dcnode-id="11487" instrument_node="">[149]</span></a><span data-dcnode-id="11485" instrument_node="">. Imaging studies showing that the amygdala is activated during cataplexy and REM sleep further support the link between the amygdala and cataplexy </span><a class="workspace-trigger" data-dcnode-id="11483" href="#bib149" name="bbib149"><span data-dcnode-id="11484" instrument_node="">[149]</span></a><span data-dcnode-id="11482" instrument_node="">. In narcoleptic dogs, neurons of the amygdala increase firing during cataplectic attacks </span><a class="workspace-trigger" data-dcnode-id="11480" href="#bib154" name="bbib154"><span data-dcnode-id="11481" instrument_node="">[154]</span></a><span data-dcnode-id="11475"><span data-dcnode-id="11479" instrument_node="">. Several recent studies indicate that the amygdala is associated with controlling cataplexy. Chemogenetic activation of GABA cells in the </span><a class="topic-link" data-dcnode-id="11477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/central-nucleus-of-the-amygdala" title="Learn more about central nucleus of the amygdala from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11478" instrument_node="">central nucleus of the amygdala</span></a><span data-dcnode-id="11476" instrument_node=""> (CeA) were found to promote cataplexy in orexin knockout mice, whereas, chemogenetic inhibition of these same cells reduced cataplexy </span></span><a class="workspace-trigger" data-dcnode-id="11473" href="#bib153" name="bbib153"><span data-dcnode-id="11474" instrument_node="">153</span></a><span data-dcnode-id="11472" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11470" href="#bib155" name="bbib155"><span data-dcnode-id="11471" instrument_node="">155</span></a><span data-dcnode-id="11469" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11467" href="#bib156" name="bbib156"><span data-dcnode-id="11468" instrument_node="">156</span></a><span data-dcnode-id="11466" instrument_node="">. It is hypothesized that GABA neurons in the CeA send descending projections to critical elements of the circuits that control REM sleep atonia, including the LC, the LPT and vlPAG, as well as the SLD.&nbsp;In narcolepsy, positive emotions activate GABA neurons in the CeA that inhibit cells in the LC, LPT, and vlPAG, which in turn disinhibit the SLD, which in turn activates the vM to produce motoneuron inhibition and muscle atonia during cataplexy </span><a class="workspace-trigger" data-dcnode-id="11464" href="#bib153" name="bbib153"><span data-dcnode-id="11465" instrument_node="">153</span></a><span data-dcnode-id="11463" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11461" href="#bib155" name="bbib155"><span data-dcnode-id="11462" instrument_node="">155</span></a><span data-dcnode-id="11460" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11458" href="#bib157" name="bbib157"><span data-dcnode-id="11459" instrument_node="">157</span></a><span data-dcnode-id="11457" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="11455" href="#fig5" name="bfig5"><span data-dcnode-id="11456" instrument_node="">Figure&nbsp;5</span></a><span data-dcnode-id="11454" instrument_node="">). But, in non-narcoleptics, positive emotions are unable to trigger muscle atonia because CeA-mediated inhibition of the LC/LDT/vlPAG is offset by excitatory orexin inputs, which prevent positive emotions from manipulating the SLD (</span><a class="workspace-trigger" data-dcnode-id="11452" href="#fig5" name="bfig5"><span data-dcnode-id="11453" instrument_node="">Figure&nbsp;5</span></a><span data-dcnode-id="11451" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="11394" id="fig5"><span data-dcnode-id="11434"><img alt="" aria-describedby="cap0030" data-dcnode-id="11449" height="198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr5.jpg&amp;raw"><span data-dcnode-id="11448" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="11435"><li data-dcnode-id="11442"><a class="anchor download-link u-font-sans" data-dcnode-id="11443" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr5_lrg.jpg" target="_blank" title="Download high-res image (195KB)"><span class="anchor-text" data-dcnode-id="11444"><span data-dcnode-id="11447" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11445"><span data-dcnode-id="11446" instrument_node="">Download high-res image (195KB)</span></span></span></a></li><li data-dcnode-id="11436"><a class="anchor download-link u-font-sans" data-dcnode-id="11437" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0960982217313295-gr5.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="11438"><span data-dcnode-id="11441" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="11439"><span data-dcnode-id="11440" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="11395"><span data-dcnode-id="11396" id="cap0030"><p data-dcnode-id="11422" id="fspara0050"><span class="label" data-dcnode-id="11432"><span data-dcnode-id="11433" instrument_node="">Figure&nbsp;5</span></span><span data-dcnode-id="11431" instrument_node="">. </span><span data-dcnode-id="11426"><span data-dcnode-id="11430" instrument_node="">Circuits that produce </span><a class="topic-link" data-dcnode-id="11428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/biochemistry-genetics-and-molecular-biology/rem-sleep" title="Learn more about REM sleep from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11429" instrument_node="">REM sleep</span></a><span data-dcnode-id="11427" instrument_node=""> atonia underlie </span></span><a class="topic-link" data-dcnode-id="11424" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/cataplexy" title="Learn more about cataplexy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11425" instrument_node="">cataplexy</span></a><span data-dcnode-id="11423" instrument_node="">.</span></p><p data-dcnode-id="11397" id="fspara0055"><span data-dcnode-id="11421" instrument_node="">The sublaterodorsal nucleus (SLD) and ventral medulla (vM) represent the core circuits that produce REM sleep atonia. </span><a class="topic-link" data-dcnode-id="11419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/glutamic-acid" title="Learn more about Glutamate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11420" instrument_node="">Glutamate</span></a><span data-dcnode-id="11398"><span data-dcnode-id="11414"><span data-dcnode-id="11418" instrument_node=""> cells in the SLD activate GABA and glycine neurons in the vM to trigger REM sleep atonia by inhibiting motoneurons in the spinal cord (SC). In </span><a class="topic-link" data-dcnode-id="11416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/narcolepsy" title="Learn more about narcolepsy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11417" instrument_node="">narcolepsy</span></a><span data-dcnode-id="11415" instrument_node="">, positive emotions activate GABA neurons in the central nucleus (CeA) that inhibit cells in the </span></span><a class="topic-link" data-dcnode-id="11412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/locus-coeruleus" title="Learn more about locus coeruleus from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11413" instrument_node="">locus coeruleus</span></a><span data-dcnode-id="11399"><span data-dcnode-id="11407"><span data-dcnode-id="11411" instrument_node=""> (LC), laterodorsal </span><a class="topic-link" data-dcnode-id="11409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/tegmentum" title="Learn more about tegmentum from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11410" instrument_node="">tegmentum</span></a><span data-dcnode-id="11408" instrument_node=""> (LDT), and ventrolateral </span></span><a class="topic-link" data-dcnode-id="11405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/periaqueductal-gray" title="Learn more about periaqueductal grey from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11406" instrument_node="">periaqueductal grey</span></a><span data-dcnode-id="11400"><span data-dcnode-id="11404" instrument_node=""> (vlPAG), which in turn disinhibit the SLD, which in turn activates the vM to produce motoneuron inhibition and muscle atonia during cataplexy. In non-narcoleptics, positive emotions are unable to trigger muscle atonia because CeA-mediated inhibition of the LC/LDT/vlPAG is offset by excitatory </span><a class="topic-link" data-dcnode-id="11402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/neuroscience/orexin" title="Learn more about orexin from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="11403" instrument_node="">orexin</span></a><span data-dcnode-id="11401" instrument_node=""> inputs, which prevent positive emotions from manipulating the SLD.</span></span></span></span></p></span></span></figure></div><p data-dcnode-id="11376" id="p0180"><span data-dcnode-id="11392" instrument_node="">If both RBD and narcolepsy arise from disturbances in REM sleep control, then there should be a link between these disorders. In fact, approximately 50% of patients with narcolepsy/cataplexy experience RBD </span><a class="workspace-trigger" data-dcnode-id="11390" href="#bib158" name="bbib158"><span data-dcnode-id="11391" instrument_node="">[158]</span></a><span data-dcnode-id="11389" instrument_node="">. Also, RBD can be triggered or aggravated by antidepressant treatment in narcoleptic patients, and many narcoleptic patients exhibit marked increases in overall levels of motor activity during REM sleep, even if they do not experience frank RBD </span><a class="workspace-trigger" data-dcnode-id="11387" href="#bib158" name="bbib158"><span data-dcnode-id="11388" instrument_node="">[158]</span></a><span data-dcnode-id="11386" instrument_node="">. Therefore, one major commonality between RBD and narcolepsy is abnormal motor activity, with RBD resulting from loss of normal REM sleep paralysis, and cataplexy resulting from intrusion of REM sleep paralysis into wakefulness. These clinical observations suggest that RBD and narcolepsy may result from abnormal control of the circuits that underlie REM sleep, and particularly those that regulate REM sleep atonia (</span><a class="workspace-trigger" data-dcnode-id="11384" href="#fig3" name="bfig3"><span data-dcnode-id="11385" instrument_node="">Figure&nbsp;3</span></a><span data-dcnode-id="11383" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11381" href="#fig4" name="bfig4"><span data-dcnode-id="11382" instrument_node="">Figure&nbsp;4</span></a><span data-dcnode-id="11380" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="11378" href="#fig5" name="bfig5"><span data-dcnode-id="11379" instrument_node="">Figure&nbsp;5</span></a><span data-dcnode-id="11377" instrument_node="">).</span></p></section></section><section data-dcnode-id="11355" id="sec1.6"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="11372" id="sectitle0055"><span data-dcnode-id="11373" instrument_node="">Conclusions and Future Directions</span></h3><p data-dcnode-id="11370" id="p0185"><span data-dcnode-id="11371" instrument_node="">Even though REM sleep was only identified as a distinct behavioural state in the early 1950s, considerable progress has been made in understanding its mechanisms and functions, with most of this headway being made within the past decade. And while it is undeniable that many of these advances in our understanding of REM sleep biology link to the development of new technologies (e.g., chemo- and opto-genetics), we would argue that it is the combinatorial application of these newer techniques with more classical approaches (e.g., functional anatomy, unit recording, and cellular imaging) that has truly enabled the effective probing and elucidation of the delimited circuits that drive REM sleep and, in turn, revealed how these circuits influence the function and activity of brain structures associated with learning, memory and motor control.</span></p><p data-dcnode-id="11368" id="p0190"><span data-dcnode-id="11369" instrument_node="">Although scientists have made important progress in identifying REM sleep mechanisms and elucidating some of its biological functions, many important questions remain. For example, is REM sleep actually present in all animals? While many biologists believe that sleep is a universal behaviour, we have only studied and identified sleep in a small fraction of all existing animal species. Understanding sleep biology across species, including differences, is important because such insight could provide new clues about the potential functions of REM sleep. For example, does REM sleep serve the same function in all animals?</span></p><p data-dcnode-id="11363" id="p0195"><span data-dcnode-id="11367" instrument_node="">Although REM sleep appears important for certain types of learning and memory, it remains virtually unknown how REM sleep actually facilitates plasticity and learning. While recent evidence indicates that theta activity during REM sleep (</span><a class="workspace-trigger" data-dcnode-id="11365" href="#fig1" name="bfig1"><span data-dcnode-id="11366" instrument_node="">Figure&nbsp;1</span></a><span data-dcnode-id="11364" instrument_node="">) is critical for facilitating motor learning, it remains unknown how or why theta activity promotes memory-related plasticity. It also&nbsp;remains unclear if REM sleep serves the same biological function(s) across the lifespan. For example, why are REM sleep amounts typically higher in young and developing animals than in&nbsp;older ones? These age-related differences in REM sleep amounts suggest that REM sleep function may vary across an animal’s lifespan, but what those potential functions are remains unclear.</span></p><p data-dcnode-id="11361" id="p0200"><span data-dcnode-id="11362" instrument_node="">While some of the circuits underlying REM sleep generation have been identified, the full extent of REM sleep circuits remains unidentified. For example, it was only within the last several years that neuroscientists identified that structures beyond the brainstem (e.g., MCH cells in the hypothalamus) also play a critical role in modulating REM sleep. It also remains unclear how circuits that control REM sleep communicate with those that promote wakefulness and non-REM sleep. And this is a critical question in science and medicine because changes in REM sleep control are associated with some of the symptoms in narcolepsy (e.g., cataplexy).</span></p><p data-dcnode-id="11356" id="p0205"><span data-dcnode-id="11360" instrument_node="">Arguably, the most pressing issues in REM sleep biology relate to human disease. As discussed above, multiple lines of evidence indicate that degeneration of REM sleep circuits underlies RBD (</span><a class="workspace-trigger" data-dcnode-id="11358" href="#fig4" name="bfig4"><span data-dcnode-id="11359" instrument_node="">Figure&nbsp;4</span></a><span data-dcnode-id="11357" instrument_node="">). A major challenge therefore for sleep biologists and clinicians is to gain a better understanding of how and why cells in the REM sleep circuit are targeted by degeneration. Answering this question will not only shed light on the pathophysiology of RBD, but may also help identify the origins and mechanisms of synucleinopathies themselves.</span></p></section></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="11348"><button class="button button-anchor" data-dcnode-id="11349" type="button"><span class="button-text" data-dcnode-id="11350"><span data-dcnode-id="11351" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="11347"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="374" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="11345"><span data-dcnode-id="11346" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="375" id="cebibsec0010"><dl class="references" data-dcnode-id="376" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="11342"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="11343" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="11344" instrument_node="">1</span></a></dt><dd class="reference" data-dcnode-id="11292" id="sref1"><div class="contribution" data-dcnode-id="11325"><span data-dcnode-id="11341" instrument_node="">E.</span><span data-dcnode-id="11339" instrument_node=""> </span><span data-dcnode-id="11337" instrument_node="">Aserinsky</span><span data-dcnode-id="11335" instrum
