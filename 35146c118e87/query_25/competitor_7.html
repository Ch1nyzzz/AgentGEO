</span><h1 class="entry-title" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">This is How Sound Affects Your Brain</span></h1><span data-dcnode-id="712" instrument_node="">
</span><time class="updated" data-dcnode-id="710" datetime="2017-02-21T10:03:05-05:00"><span data-dcnode-id="711" instrument_node="">Posted on February 21, 2017</span></time><span data-dcnode-id="709" instrument_node=""> </span></header><span data-dcnode-id="707" instrument_node="">

</span><h3 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">How sound affects our brain</span></h3><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="692" instrument_node="">How does sound affect our brain? &nbsp; Sound and music actually changes our brain waves; This all traces back to how we feel when we listen to certain genres of music or hear certain noises.&nbsp; Brains may be a confusing thing to understand but it is actually quite interesting. Every brain is made up of billions of brain cells called neurons.&nbsp; Neurons use electricity to communicate from one to another, just like the rest of the communication that happens in our body.&nbsp;</span><span data-dcnode-id="691" id="more-4072"></span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="688" instrument_node="">&nbsp;</span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//monatomic-orme.com/wp-content/uploads/2017/02/brainwaves.jpg"><img alt="brain waves" class="alignright lazyloaded" data-dcnode-id="687" data-src="https://monatomic-orme.com/wp-content/uploads/2017/02/brainwaves.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//monatomic-orme.com/wp-content/uploads/2017/02/brainwaves.jpg&amp;raw"><noscript data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">&lt;img src="https://monatomic-orme.com/wp-content/uploads/2017/02/brainwaves.jpg" alt="brain waves" class="alignright" /&gt;</span></noscript></a></p><span data-dcnode-id="682" instrument_node="">
</span><h3 data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">How do we know this is true?</span></h3><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">When millions of neuron signals happen at the same time it can cause large amounts of electrical activity in your brain. &nbsp;This is detected medically by an EEG (electroencephalography).&nbsp; This medical instrument detects and measures the electricity levels all over your scalp.&nbsp; Once the electrical activity is graphed and such, it generates a pattern.&nbsp; This pattern is known as a brain wave because of its wave-like appearance on the graph.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">&nbsp;</span></p><span data-dcnode-id="673" instrument_node="">
</span><h3 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Types of Brain Waves</span></h3><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">There are 4 categories of brainwaves that branch into more detailed types.&nbsp; First is Beta (14-30Hz), which are concentration and alertness. When there is a higher level of “Beta” it is commonly diagnosed by anxiety or a feeling of separation. &nbsp;The second is Alpha (8-13.9Hz), which is relaxation and the increase of serotonin production.&nbsp; During “Alpha” we can begin to enter the unconscious mind or a state of mediation.&nbsp; The third is Theta (4-7.9Hz), which is dreaming sleep (REM).&nbsp; This state is when you can access deep meditation or access to the unconscious.&nbsp; The last is called Delta (.1-3.9Hz), which is a dreamless sleep or when the growth hormone is released. Delta is also known to be a trance-like state or nonphysical.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">As you see here in this video listed below, there is different patterns and such with different frequencies and the sacred geometric star (monatomic symbol) is one of the patterns.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="654"><iframe allowfullscreen="" class="lazyload" data-dcnode-id="655" data-src="https://www.youtube.com/embed/wvJAgrUBF4w?feature=oembed" frameborder="0" height="281" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="500"><html data-dcnode-id="657" style="height: 100%;"><head data-dcnode-id="660"><meta charset="utf-8"><meta content="width=device-width, minimum-scale=0.1" data-dcnode-id="663" name="viewport"/><title data-dcnode-id="661">gif (1×1)</title></meta></head><body data-dcnode-id="658" style="margin: 0px; height: 100%"><img data-dcnode-id="659" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" style="-webkit-user-select: none;"/></body></html></iframe></p><span data-dcnode-id="653" instrument_node="">
