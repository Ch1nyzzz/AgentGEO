ype | element_id" data-track-prop-link="https://www.sciencedirect.com/topics/agricultural-and-biological-sciences/brain-waves" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/agricultural-and-biological-sciences/brain-waves" target="_blank"><span data-dcnode-id="443" instrument_node="">help our brains reach certain states</span></a><span data-dcnode-id="441" instrument_node="">, from focused to relaxed.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Theta brain waves happen during a drowsy yet still awake period. Here's what you need to know about theta waves, including their relationship with sleep, and how you can tap into them to achieve your goals.</span></p></div></div><aside class="sc-1jito7k-0 bktOnI" data-dcnode-id="432" id="right-rail-0"><div data-dcnode-id="435"></div><div data-dcnode-id="434" style="display: none;"></div><div data-dcnode-id="433"></div></aside></div><div class="sc-11rlt5o-3 fCWRcB" data-dcnode-id="413"><div class="sc-11rlt5o-4 jfJpfi" data-dcnode-id="414"><div class="sc-1yed2pf-0 Otxcd" data-dcnode-id="415"><section class="sc-10p0iao-0 dXGrkM sc-1yed2pf-1 Oafzr" data-dcnode-id="416"><div class="sc-10p0iao-1 iRpNmt" data-dcnode-id="418"><h5 data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Advertisement</span></h5><div class="sc-10p0iao-3 fha-DMn" data-dcnode-id="422" tabindex="0"><svg class="sc-10p0iao-4 iKIyvM" data-dcnode-id="423" height="19px" viewBox="0 0 19 19" width="19px" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="424" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="425" fill="#222222" fill-rule="nonzero" transform="translate(-1310.000000, -4332.000000)"><g data-dcnode-id="426" transform="translate(1310.000000, 4332.000000)"><path d="M10.243,13.4 L8.384,13.4 L8.384,7.03 L10.243,7.03 L10.243,13.4 Z M8.241,5.223 C8.241,4.612 8.722,4.144 9.307,4.144 C9.91 ;url=https%3A//www.mindbodygreen.com/articles/theta-waves/%23mbg-JBv4zlXiXG"><div class="sc-11i09ik-4 hLYBmV" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">2</span></div><div class="sc-11i09ik-5 jFQZtH" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Brain waves intro</span></div></a><a class="sc-11i09ik-3 eudSFQ" data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/theta-waves/%23mbg-RaD_RCVDBN"><div class="sc-11i09ik-4 hLYBmV" data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">3</span></div><div class="sc-11i09ik-5 jFQZtH" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Can theta waves be manipulated?</span></div></a><a class="sc-11i09ik-3 eudSFQ" data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/theta-waves/%23mbg-yZ7rN9Fdtu"><div class="sc-11i09ik-4 hLYBmV" data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">4</span></div><div class="sc-11i09ik-5 jFQZtH" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Theta waves &amp; sleep</span></div></a><a class="sc-11i09ik-3 eudSFQ" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/theta-waves/%23mbg-GSoCD2TSL4"><div class="sc-11i09ik-4 hLYBmV" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">5</span></div><div class="sc-11i09ik-5 jFQZtH" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Theta waves &amp; manifestation</span></div></a></div></div><div class="sc-1osfqhu-0 jrfcTB" data-dcnode-id="381"><h2 class="sc-1osfqhu-3 lbbmEV" data-dcnode-id="382" id="mbg-NAflGYhUE"><span data-dcnode-id="383" instrument_node="">What are theta waves?</span></h2></div><div class="sc-11rlt5o-5 jBVvoX" data-dcnode-id="351"><p data-dcnode-id="369"><span data-dcnode-id="380" instrument_node="">"Theta waves are one of the electrical patterns in the brain we see on a quantitative electroencephalogram (qEEG)—a test that measures electrical activity inside the brain," says communication pathologist and cognitive neuroscientist&nbsp;</span><a class="mbg-track-event" data-dcnode-id="378" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://drleaf.com/pages/about-dr-leaf" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drleaf.com/pages/about-dr-leaf" target="_blank"><span data-dcnode-id="379" instrument_node="">Caroline Leaf, Ph.D.,</span></a><span data-dcnode-id="377" instrument_node=""> author of</span><em data-dcnode-id="375"><span data-dcnode-id="376" instrument_node=""> </span></em><a class="mbg-track-event" data-dcnode-id="372" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://drleaf.com/collections/all/products/pre-order-cleaning-up-your-mental-mess" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//drleaf.com/collections/all/products/pre-order-cleaning-up-your-mental-mess" rel="nofollow" target="_blank"><em data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Cleaning Up Your Mental Mess</span></em></a><em data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">.</span></em></p><p data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">"Theta waves have a frequency of 4-8 Hz. and are activated when we are being insightful or creative. It's often referred to as the healing wave," Leaf adds.</span></p><p data-dcnode-id="359"><span data-dcnode-id="366" instrument_node="">Theta waves are very prevalent in children, says </span><a class="mbg-track-event" data-dcnode-id="364" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://chiariedscenter.com/ilene-s-ruhoy-md-phd/" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chiariedscenter.com/ilene-s-ruhoy-md-phd/" target="_blank"><span data-dcnode-id="365" instrument_node="">Ilene S. Ruhoy, M.D., Ph.D.,</span></a><span data-dcnode-id="363" instrument_node=""> a board-certified neurologist and medical director for the EDS/Chiari Center at Mount Sinai South Nassau Hospital in Hewlett, New York. However, they are also seen in adults in a non-alert, drowsy state where awareness of the physical world is lessened (such as </span><a class="mbg-track-event" data-dcnode-id="361" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/how-to-hypnotize-yourself" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/how-to-hypnotize-yourself" target="_blank"><span data-dcnode-id="362" instrument_node="">hypnosis</span></a><span data-dcnode-id="360" instrument_node="">).</span></p><p data-dcnode-id="354"><span data-dcnode-id="358" instrument_node="">The fact that these waves are visible in both </span><a class="mbg-track-event" data-dcnode-id="356" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/stage-1-sleep" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/stage-1-sleep" target="_blank"><span data-dcnode-id="357" instrument_node="">light sleep stages</span></a><span data-dcnode-id="355" instrument_node=""> as well as during focused tasks is what makes them so interesting.</span></p><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">"Theta waves are the dominant frequency in healing, high creative states, remembering emotional experiences (good and bad), memory retrieval, and encoding new memories into thoughts," explains Leaf.</span></p></div><section class="sc-10p0iao-0 dJOxYf sc-ewkazq-0 heuTwn" data-dcnode-id="336"><div class="sc-10p0iao-1 iRpNmt" data-dcnode-id="338"><h5 data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Advertisement</span></h5><div class="sc-10p0iao-3 fha-DMn" data-dcnode-id="342" tabindex="0"><svg class="sc-10p0iao-4 iKIyvM" data-dcnode-id="343" height="19px" viewBox="0 0 19 19" width="19px" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="344" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="345" fill="#222222" fill-rule="nonzero" transform="translate(-1310.000000, -4332.000000)"><g data-dcnode-id="346" transform="translate(1310.000000, 4332.000000)"><path d="M10.243,13.4 L8.384,13.4 L8.384,7.03 L10.243,7.03 L10.243,13.4 Z M8.241,5.223 C8.241,4.612 8.722,4.144 9.307,4.144 C9.918,4.144 10.386,4.612 10.386,5.223 C10.386,5.808 9.892,6.289 9.307,6.289 C8.722,6.289 8.241,5.808 8.241,5.223 Z" data-dcnode-id="348"></path><path d="M9.2,18.05 C14.08772,18.05 18.05,14.08772 18.05,9.2 C18.05,4.31227996 14.08772,0.35 9.2,0.35 C4.31227996,0.35 0.35,4.31227996 0.35,9.2 C0.35,14.08772 4.31227996,18.05 9.2,18.05 Z M9.2,16.75 C5.03025014,16.75 1.65,13.3697499 1.65,9.2 C1.65,5.03025014 5.03025014,1.65 9.2,1.65 C13.3697499,1.65 16.75,5.03025014 16.75,9.2 C16.75,13.3697499 13.3697499,16.75 9.2,16.75 Z" data-dcnode-id="347"></path></g></g></g></svg></div><div class="sc-10p0iao-2 eodmLO" data-dcnode-id="339"><div class="sc-10p0iao-5 diwEKe" data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">This ad is displayed using third party content and we do not control its accessibility features.</span></div></div></div><div class="htl-ad" data-dcnode-id="337" data-eager="" data-prebid="0x0:InLine_Article_2_S|768x0:InLine_Article_2_M|1024x0:InLine_Article_2_L" data-sizes="0x0:320x50,300x250|768x0:728x90,620x366|1024x0:728x90,620x366" data-unit="InLine_Article_2"></div></section><div class="sc-1osfqhu-0 jrfcTB" data-dcnode-id="333"><h2 class="sc-1osfqhu-3 lbbmEV" data-dcnode-id="334" id="mbg-JBv4zlXiXG"><span data-dcnode-id="335" instrument_node="">How brain waves work.</span></h2></div><div class="sc-11rlt5o-5 jBVvoX" data-dcnode-id="326"><p data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">All brain waves are measured using a qEEG. This test is conducted by placing electrodes on the person's scalp to measure electrical activity inside the brain as it responds to what the person is doing or thinking about.</span></p><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">"Typically, qEEG data is viewed onto a 'map' of the head, so we can see which areas of the brain have electrical activity, such as over the prefrontal cortex [PFC], amygdala, or hippocampus," says Leaf. "This also helps show which brain frequencies are more active and how they are working in relationship to each other."</span></p><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">There are five major types of brain waves, Ruhoy explains. Here's a quick breakdown of each:</span></p></div><div class="sc-8nga9g-0 egpofY" data-dcnode-id="301"><ul class="sc-8nga9g-2 cYkSoB" data-dcnode-id="302" id="mbg-U4wdleOrSR"><li class="sc-8nga9g-3 PLYjp" data-dcnode-id="322"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Gamma waves (&gt; 25 Hz.)</span></strong><span data-dcnode-id="323" instrument_node="">: This is the fastest brain wave. It's responsible for learning, memory, and processing new information.</span></li><li class="sc-8nga9g-3 PLYjp" data-dcnode-id="318"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Beta waves (&gt; 13 Hz.)</span></strong><span data-dcnode-id="319" instrument_node="">: This brain wave is most prominent when we are awake and problem-solving or concentrating.</span></li><li class="sc-8nga9g-3 PLYjp" data-dcnode-id="314"><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Alpha waves (8–13 Hz.)</span></strong><span data-dcnode-id="315" instrument_node="">: This wave often occurs when we are awake and resting comfortably, responding to any visual stimulation, or actively thinking about something.</span></li><li class="sc-8nga9g-3 PLYjp" data-dcnode-id="310"><strong data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Theta waves (4–8 Hz.)</span></strong><span data-dcnode-id="311" instrument_node="">: These occur when a person is in a light sleep stage or dreaming, as well as in a relaxed, meditative state of mind (commonly referred to as being on "autopilot").</span></li><li class="sc-8nga9g-3 PLYjp" data-dcnode-id="303"><strong data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Delta waves (&lt; 4 Hz.)</span></strong><span data-dcnode-id="307" instrument_node="">: These brain waves happen during deep sleep stages (think stage 3, or </span><a class="mbg-track-event" data-dcnode-id="305" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/slow-wave-sleep-what-it-is-and-how-to-get-more-of-it" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/slow-wave-sleep-what-it-is-and-how-to-get-more-of-it" target="_blank"><span data-dcnode-id="306" instrument_node="">slow-wave sleep</span></a><span data-dcnode-id="304" instrument_node="">).</span></li></ul></div><section class="sc-10p0iao-0 dJOxYf sc-ewkazq-0 heuTwn" data-dcnode-id="286"><div class="sc-10p0iao-1 iRpNmt" data-dcnode-id="288"><h5 data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Advertisement</span></h5><div class="sc-10p0iao-3 fha-DMn" data-dcnode-id="292" tabindex="0"><svg class="sc-10p0iao-4 iKIyvM" data-dcnode-id="293" height="19px" viewBox="0 0 19 19" width="19px" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="294" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="295" fill="#222222" fill-rule="nonzero" transform="translate(-1310.000000, -4332.000000)"><g data-dcnode-id="296" transform="translate(1310.000000, 4332.000000)"><path d="M10.243,13.4 L8.384,13.4 L8.384,7.03 L10.243,7.03 L10.243,13.4 Z M8.241,5.223 C8.241,4.612 8.722,4.144 9.307,4.144 C9.918,4.144 10.386,4.612 10.386,5.223 C10.386,5.808 9.892,6.289 9.307,6.289 C8.722,6.289 8.241,5.808 8.241,5.223 Z" data-dcnode-id="298"></path><path d="M9.2,18.05 C14.08772,18.05 18.05,14.08772 18.05,9.2 C18.05,4.31227996 14.08772,0.35 9.2,0.35 C4.31227996,0.35 0.35,4.31227996 0.35,9.2 C0.35,14.08772 4.31227996,18.05 9.2,18.05 Z M9.2,16.75 C5.03025014,16.75 1.65,13.3697499 1.65,9.2 C1.65,5.03025014 5.03025014,1.65 9.2,1.65 C13.3697499,1.65 16.75,5.03025014 16.75,9.2 C16.75,13.3697499 13.3697499,16.75 9.2,16.75 Z" data-dcnode-id="297"></path></g></g></g></svg></div><div class="sc-10p0iao-2 eodmLO" data-dcnode-id="289"><div class="sc-10p0iao-5 diwEKe" data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">This ad is displayed using third party content and we do not control its accessibility features.</span></div></div></div><div class="htl-ad" data-dcnode-id="287" data-eager="" data-prebid="0x0:InLine_Article_3_S|768x0:InLine_Article_3_M|1024x0:InLine_Article_3_L" data-sizes="0x0:320x50,300x250|768x0:728x90,620x366|1024x0:728x90,620x366" data-unit="InLine_Article_3"></div></section><div class="sc-1osfqhu-0 jrfcTB" data-dcnode-id="283"><h2 class="sc-1osfqhu-3 lbbmEV" data-dcnode-id="284" id="mbg-RaD_RCVDBN"><span data-dcnode-id="285" instrument_node="">Can theta waves be manipulated?</span></h2></div><div class="sc-11rlt5o-5 jBVvoX" data-dcnode-id="275"><p data-dcnode-id="278"><span data-dcnode-id="282" instrument_node="">Our brain waves can tell us a lot about how we're feeling and coping with stress. "Head maps produced from a qEEG can help tell us if someone is feeling anxious, burnt out, </span><a class="mbg-track-event" data-dcnode-id="280" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/chronic-stress-reversible" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/chronic-stress-reversible" target="_blank"><span data-dcnode-id="281" instrument_node="">isn't managing stress</span></a><span data-dcnode-id="279" instrument_node="">, feels that their identity is being affected, is battling with executive functioning, and more," says Leaf.</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">On the other hand, she says they also show when a person is in control of their mind, processing their issues, and learning new ways of thinking.</span></p></div><div class="sc-v06xdv-0 jnDoMk" data-dcnode-id="244" data-exp-id="article-product"><a data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//calm.mindbodygreen.com/products/calm%3Fitc_content%3D46797" rel="sponsored" target="_blank"><div class="sc-v06xdv-1 cFfZch" data-dcnode-id="246" id="7329725382876"><div class="sc-v06xdv-8 kfnreW" data-dcnode-id="254"><div class="sc-v06xdv-3 jTRmkV" data-dcnode-id="270"><h3 class="sc-v06xdv-5 cipcFq" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">calm+</span></h3><svg class="sc-v06xdv-12 bZlUJZ" data-dcnode-id="271" priority="2" productid="7329725382876" viewBox="0 0 17 20" xmlns="http://www.w3.org/2000/svg"><path d="M4.373 6.266c.005-.274.008-.536.008-.785 0-1.813.337-3.094 1.269-4.006C6.417.725 7.385.3 8.414.3c1.134 0 2.19.514 2.985 1.406.804.903 1.086 2.086 1.086 3.774 0 .248.002.51.007.783.862-.05 1.754-.115 2.677-.195a1 1 0 011.086 1.016c-.051 2.632-.043 4.552.025 5.762.047.835.16 2.01.341 3.525a3 3 0 01-2.979 3.355H3.25a3 3 0 01-2.99-3.24l.291-3.64V7.063a1 1 0 011.087-.996c.944.082 1.856.148 2.736.2zm1.698.08c.811.03 1.592.044 2.343.044.762 0 1.555-.015 2.38-.045a48.61 48.61 0 01-.009-.864c0-1.308-.195-2.126-.655-2.643-.485-.543-1.088-.837-1.716-.837-.568 0-1.116.24-1.575.689-.528.516-.758 1.393-.758 2.79 0 .275-.003.564-.01.866zm-1.757 1.62a93.362 93.362 0 01-2.064-.142v5.023l-.005.135-.291 3.641a1.3 1.3 0 001.295 1.404h10.393a1.3 1.3 0 001.291-1.454c-.184-1.547-.301-2.754-.35-3.63-.064-1.138-.077-2.838-.041-5.116-.683.054-1.349.1-1.999.137.046 1.093.119 2.33.218 3.71a.85.85 0 01-1.695.123c-.1-1.392-.174-2.643-.22-3.753-.842.03-1.652.046-2.432.046-.771 0-1.572-.015-2.402-.045a111.149 111.149 0 01-.251 3.76.85.85 0 11-1.695-.14c.113-1.375.196-2.609.248-3.7z" data-dcnode-id="272" fill="currentColor"></path></svg></div><div class="sc-v06xdv-2 cTqUOg" data-dcnode-id="267"><object data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">undefined</span></object></div><div class="sc-7pkg3r-0 gaRTqS" data-dcnode-id="257"><div class="sc-7pkg3r-1 dJreMh" data-dcnode-id="260"><div class="sc-7pkg3r-3 cZpYFA" color="#222" data-dcnode-id="264"><span data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">★ ★ ★ ★ ★</span></span></div><div class="sc-7pkg3r-2 IgjAW" data-dcnode-id="261"><span data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">★ ★ ★ ★ ★</span></span></div></div><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">(18)</span></p></div><button class="sc-v06xdv-11 kTpMsX" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Shop now</span></button></div><div class="sc-11lw232-0 cFewFa sc-v06xdv-7 kLkFXA" data-dcnode-id="249"><picture data-dcnode-id="250"><source data-dcnode-id="253" media="(min-width: 1024px)" srcset="https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800, https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800 2x"><source data-dcnode-id="252" media="(min-width: 768px)" srcset="https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800, https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800 2x"><img alt="" data-dcnode-id="251" role="presentation" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png%3F2800x2800&amp;raw" srcset="https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800, https://cdn.accentuate.io/7329725382876/21787065516252/calm-v1634237591971.png?2800x2800 2x"></picture></div><button class="sc-v06xdv-10 iRHXCy" data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Shop now</span></button></div></a></div><div class="sc-11rlt5o-5 jBVvoX" data-dcnode-id="207"><p data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">With this in mind, if someone is looking to </span><a class="mbg-track-event" data-dcnode-id="241" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/the-stress-response-and-how-to-change-it-in-your-body" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/the-stress-response-and-how-to-change-it-in-your-body" target="_blank"><span data-dcnode-id="242" instrument_node="">feel less stressed</span></a><span data-dcnode-id="240" instrument_node="">, is it possible to encourage theta waves for more relaxation? Some science suggests yes.</span></p><p data-dcnode-id="231"><span data-dcnode-id="238" instrument_node="">For example, research published in </span><em data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Neuroscience &amp; Biobehavioral Reviews </span></em><span data-dcnode-id="235" instrument_node="">states that a systematic review of 56 studies including 1,715 people determined that </span><a class="mbg-track-event" data-dcnode-id="233" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.sciencedirect.com/science/article/abs/pii/S0149763415002511?via%3Dihub" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0149763415002511%3Fvia%253Dihub" target="_blank"><span data-dcnode-id="234" instrument_node="">mindfulness meditation was commonly associated with an increase in theta waves</span></a><span data-dcnode-id="232" instrument_node="">—more so than if the person was just resting with their eyes closed, not actively meditating.</span></p><p data-dcnode-id="226"><span data-dcnode-id="230" instrument_node="">"Theta waves can be manipulated through meditation," reiterates Ruhoy. "Depending on how deep the meditation is, it can create theta bursts or rhythmic chains of theta waves. There is some evidence that with true and deep meditation, </span><a class="mbg-track-event" data-dcnode-id="228" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.ncbi.nlm.nih.gov/labs/pmc/articles/PMC6778007/" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/labs/pmc/articles/PMC6778007/" target="_blank"><span data-dcnode-id="229" instrument_node="">theta waves can persist</span></a><span data-dcnode-id="227" instrument_node=""> even after meditation is complete."</span></p><p data-dcnode-id="215"><span data-dcnode-id="225" instrument_node="">Auditory forms of mindfulness like </span><a class="mbg-track-event" data-dcnode-id="223" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/articles/sound-bath" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/articles/sound-bath" target="_blank"><span data-dcnode-id="224" instrument_node="">sound bathing</span></a><span data-dcnode-id="222" instrument_node=""> may also be useful for encouraging theta waves. Research published in </span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Neuron</span></em><span data-dcnode-id="219" instrument_node=""> suggests that </span><a class="mbg-track-event" data-dcnode-id="217" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.cell.com/neuron/fulltext/S0896-6273(17)30198-8" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cell.com/neuron/fulltext/S0896-6273%2817%2930198-8" target="_blank"><span data-dcnode-id="218" instrument_node="">certain rhythmic sounds can increase theta waves</span></a><span data-dcnode-id="216" instrument_node="">, which may then boost memory retention and concentration even after the listening session ends.</span></p><p data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">"Theta wave pattern activity highlights the interaction that happens between the conscious and nonconscious mind as we think deeply," says Leaf. "This is a pattern that we want to see in our brain because it reflects improving mind management."</span></p><p data-dcnode-id="208"><span data-dcnode-id="212" instrument_node="">Any time a person intentionally builds new memory or has </span><a class="mbg-track-event" data-dcnode-id="210" data-track-event-types="click" data-track-prop-category="Link" data-track-prop-element-id="in-body-link" data-track-prop-label="page_type | element_id" data-track-prop-link="https://www.mindbodygreen.com/0-22916/an-8step-guide-to-tapping-into-your-spiritual-side-today.html" data-track-type="article-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mindbodygreen.com/0-22916/an-8step-guide-to-tapping-into-your-spiritual-side-today.html" target="_blank"><span data-dcnode-id="211" instrument_node="">meaningful introspection</span></a><span data-dcnode-id="209" instrument_node="">, she adds that there will also be an increase in theta wave activity.</span></p></div><section class="sc-10p0iao-0 dJOxYf sc-ewkazq-0 heuTwn" data-dcnode-id="192"><div class="sc-10p0iao-1 iRpNmt" data-dcnode-id="194"><h5 data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Advertisement</span></h5><div class="sc-10p0iao-3 fha-DMn" data-dcnode-id="198" tabindex="0"><svg class="sc-10p0iao-4 iKIyvM" data-dcnode-id="199" height="19px" viewBox="0 0 19 19" width="19px" xmlns="http://www.w3.org/2000/svg"><g data-dcnode-id="200" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="201" fill="#222222" fill-rule="nonzero" transform="translate(-1310.000000, -4332.000000)"><g data-dcnode-id="202" transform="translate(1310.000000, 4332.000000)"><path d="M10.243,13.4 L8.384,13.4 L8.384,7.03 L10.243,7.03 L10.243,13.4 Z M8.241,5.223 C8.241,4.612 8.722,4.144 9.307,4.144 C9.918,4.144 10.386,4.612 10.386,5.22
