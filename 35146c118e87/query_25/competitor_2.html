</span><div class="comp structured-content article-content expert-content right-rail__offset lock-journey health-sc-page mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1221" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[400, 1400, 1400, 1700, 2000, 2200, 2400, 2600, 2800]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="60" id="health-sc-page_1-0"><span data-dcnode-id="1794" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1792" id="mntl-sc-block_1-0"><span data-dcnode-id="1793" instrument_node="">
What are the effects of smartphones on the brain? Given the prevalence of smartphones today, it is a question of interest for healthcare practitioners, mental health professionals, educators, parents, and anyone who happens to use a smartphone on a regular basis.
</span></p><span data-dcnode-id="1791" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1790" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1789" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1787" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1788" instrument_node="">
If you were asked to go a day without your smartphone, do you think you could do&nbsp;it easily? Researchers who have asked participants to go without their phones for various periods of time have found that breaking the technology habit, even for a relatively short interval, can be exceedingly difficult.
</span></p><span data-dcnode-id="1786" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1785" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1784" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1782" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1783" instrument_node="">
Walk into any public venue and you will probably find people using their phones for a variety of purposes, from conducting business calls to checking their email to updating their Twitter. Our phones have become an inextricable part of our lives. But does this reliance on smartphones have any impact on our&nbsp;brains?
</span></p><span data-dcnode-id="1781" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1773" id="mntl-sc-block_1-0-5"><div class="comp mntl-native" data-dcnode-id="1774" data-right-rail-index="1" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1780" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1776" id="mntl-native__adunit_1-0"><span data-dcnode-id="1779" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1778" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1777" instrument_node="">
</span></div><span data-dcnode-id="1775" instrument_node="">
</span></div></div><span data-dcnode-id="1772" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1770" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1771" instrument_node="">
Some recent research suggests that it might. Experts suggest that all of this phone use can have an impact on children’s social and emotional development, that it can impair our sleep patterns, and that it might even turn some people into lazy thinkers.
</span></p><span data-dcnode-id="1769" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1768" id="mntl-sc-block_1-0-7"></div><span data-dcnode-id="1767" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1761" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1766" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1763" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/youtube-addiction-signs-causes-effects-and-treatment-5222236" id="mntl-sc-block-featuredlink__link_1-0"><span class="link__wrapper" data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Is It Possible to Have a YouTube Addiction?</span></span></a><span data-dcnode-id="1762" instrument_node="">
</span></div><span data-dcnode-id="1760" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1759" id="mntl-sc-block_1-0-10"></div><span data-dcnode-id="1758" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1757" id="toc-cognitive-ability"></span><span data-dcnode-id="1756" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1751" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1755" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node=""> Cognitive Ability </span></span><span data-dcnode-id="1752" instrument_node=""> </span></h2><span data-dcnode-id="1750" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1748" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1749" instrument_node="">
Recent research suggests that smartphone usage does indeed have an effect on the brain, although the long-term effects remain to be seen.&nbsp;
</span></p><span data-dcnode-id="1747" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1746" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1745" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1737" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1744" instrument_node="">
In one study presented to the Radiological Society of North America, researchers found that young people with a so-called </span><a data-component="link" data-dcnode-id="1742" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/internet-addiction-4157289" rel="noopener noreferrer"><span data-dcnode-id="1743" instrument_node="">internet and smartphone addiction</span></a><span data-dcnode-id="1741" instrument_node=""> actually demonstrated imbalances in brain chemistry compared to a control group.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1739" data-id="#citation-1"><span data-dcnode-id="1740" instrument_node="">1</span></span><span data-dcnode-id="1738" instrument_node="">﻿
</span></p><span data-dcnode-id="1736" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1735" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1734" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1726" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1733" instrument_node="">
Another study appearing in the </span><em data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Journal of the Association for Consumer Research</span></em><span data-dcnode-id="1730" instrument_node=""> found that cognitive capacity was significantly reduced whenever a smartphone is within reach, even when the phone is off.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1728" data-id="#citation-2"><span data-dcnode-id="1729" instrument_node="">2</span></span><span data-dcnode-id="1727" instrument_node="">﻿
</span></p><span data-dcnode-id="1725" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1724" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="1723" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1722" id="toc-social-emotional-skills"></span><span data-dcnode-id="1721" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1716" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1720" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node=""> Social-Emotional Skills </span></span><span data-dcnode-id="1717" instrument_node=""> </span></h2><span data-dcnode-id="1715" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1707" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1714" instrument_node="">
In the commentary appearing in the journal </span><em data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Pediatrics</span></em><span data-dcnode-id="1711" instrument_node="">, researchers from the Boston University School of Medicine took a closer look at the available literature on smartphone and iPad use among very young children.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1709" data-id="#citation-5"><span data-dcnode-id="1710" instrument_node="">3</span></span><span data-dcnode-id="1708" instrument_node="">﻿
</span></p><span data-dcnode-id="1706" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1705" id="mntl-sc-block_1-0-20"></div><span data-dcnode-id="1704" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1697" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1703" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1699" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Using such devices to entertain or pacify children, they warn, might have a detrimental effect on their social and emotional development.</span></p></div><span data-dcnode-id="1698" instrument_node="">
</span></div><span data-dcnode-id="1696" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1691" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1695" instrument_node="">
"If these devices become the predominant method to calm and distract young children, will they be able to develop their own internal mechanisms of self-regulation?" the researchers ask.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1693" data-id="#citation-5"><span data-dcnode-id="1694" instrument_node="">3</span></span><span data-dcnode-id="1692" instrument_node="">﻿
</span></p><span data-dcnode-id="1690" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1689" id="mntl-sc-block_1-0-24"></div><span data-dcnode-id="1688" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1683" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1687" instrument_node="">
Hands-on activities and those involving direct human interaction are superior to interactive screen games, the experts suggest. The use of mobile devices becomes especially problematic when such devices replace hands-on activities that help develop visual-motor and </span><a data-component="link" data-dcnode-id="1685" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/sensorimotor-stage-of-cognitive-development-2795462" rel="noopener noreferrer"><span data-dcnode-id="1686" instrument_node="">sensorimotor</span></a><span data-dcnode-id="1684" instrument_node=""> skills.
</span></p><span data-dcnode-id="1682" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1681" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1680" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1675" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1679" instrument_node="">
The researchers note, however, that there are still many unknowns about how the use of mobile devices influences child development. They question whether overuse of smartphones and tablets might interfere with the development of social and </span><a data-component="link" data-dcnode-id="1677" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/what-is-problem-solving-2795485" rel="noopener noreferrer"><span data-dcnode-id="1678" instrument_node="">problem-solving skills</span></a><span data-dcnode-id="1676" instrument_node=""> that are better acquired during unstructured play with interaction with peers.
</span></p><span data-dcnode-id="1674" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1673" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1672" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1671" id="toc-disrupted-sleep"></span><span data-dcnode-id="1670" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1665" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1669" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node=""> Disrupted Sleep </span></span><span data-dcnode-id="1666" instrument_node=""> </span></h2><span data-dcnode-id="1664" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1662" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1663" instrument_node="">
Using your smartphone or tablet at bedtime might be interfering with your sleep, and not because you’re staying up late to check your email, scrolling through your Facebook newsfeed, or playing a game of Trivia Crack.
</span></p><span data-dcnode-id="1661" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1660" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="1659" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1657" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1658" instrument_node="">
Instead, some sleep experts warn, it is the type of light emitted from your mobile device’s screen that might just be messing up your sleep cycle, even after you turn off your device.
</span></p><span data-dcnode-id="1656" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1655" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1654" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1646" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1653" instrument_node="">
In a study published in the </span><em data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Proceeding of the National Academy of Sciences</span></em><span data-dcnode-id="1650" instrument_node="">, a dozen adult participants were asked to either read on an iPad for four hours each night before bed or read printed books in dim lighting. After five consecutive nights, the two groups switched.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1648" data-id="#citation-3"><span data-dcnode-id="1649" instrument_node="">4</span></span><span data-dcnode-id="1647" instrument_node="">
</span></p><span data-dcnode-id="1645" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1644" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1643" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1638" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1642" instrument_node="">
What the researchers discovered was that those who had read on an iPad before bedtime displayed a reduction in levels of melatonin, a hormone that increases throughout the evening and induces sleepiness. It also took these participants more time to fall asleep, and they experienced less </span><a data-component="link" data-dcnode-id="1640" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/understanding-dreams-2224258" rel="noopener noreferrer"><span data-dcnode-id="1641" instrument_node="">REM sleep</span></a><span data-dcnode-id="1639" instrument_node=""> throughout the night.
</span></p><span data-dcnode-id="1637" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1636" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="1635" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1633" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1634" instrument_node="">
The culprit? The type of blue light emitted by most mobile devices. The cells at the back of the eyes contain a light-sensitive protein that picks up certain wavelengths of light. These light-sensitive cells then send signals to the brain's "clock" that regulates the body's circadian rhythms.
</span></p><span data-dcnode-id="1632" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1631" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="1630" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1628" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1629" instrument_node="">
Normally, blue light peaks in the morning, signaling your body to wake up for the day. Red light increases in the evening, signaling that it is time to wind down and go to bed. By interrupting this natural cycle with the blue light emitted by mobile devices, the normal sleep-wake cycles are thrown out of whack.
</span></p><span data-dcnode-id="1627" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1626" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="1625" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1623" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1624" instrument_node="">
"There's a lot of skepticism out there; a lot of people think this is psychological," explained one of the study's authors, Charles Czeisler. "But what we showed is that reading from light-emitting, e-reader devices has profound biological effects."
</span></p><span data-dcnode-id="1622" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1621" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="1620" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1613" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-45"><span data-dcnode-id="1619" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1615" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">The next time you’re tempted to play with your mobile device in bed, think about the possible effect this might have on your brain and your sleep and consider picking up a paperback book instead.</span></p></div><span data-dcnode-id="1614" instrument_node="">
</span></div><span data-dcnode-id="1612" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1606" id="mntl-sc-block_1-0-47"><span data-dcnode-id="1611" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1608" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/reasons-why-you-re-not-sleeping-well-4783598" id="mntl-sc-block-featuredlink__link_1-0-1"><span class="link__wrapper" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Why You're Not Sleeping Well</span></span></a><span data-dcnode-id="1607" instrument_node="">
</span></div><span data-dcnode-id="1605" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1604" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="1603" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1602" id="toc-mental-laziness"></span><span data-dcnode-id="1601" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1596" id="mntl-sc-block_1-0-49"><span data-dcnode-id="1600" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node=""> Mental Laziness </span></span><span data-dcnode-id="1597" instrument_node=""> </span></h2><span data-dcnode-id="1595" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1593" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1594" instrument_node="">
Mobile devices don't just offer distraction these days. You no longer have to memorize phone numbers or keep a Rolodex on your desk—all that information is neatly stored on your phone’s contact list.
</span></p><span data-dcnode-id="1592" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1591" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="1590" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1585" id="mntl-sc-block_1-0-52"><span data-dcnode-id="1589" instrument_node="">
Instead of mulling over questions you might have about the world around you, you can just grab your phone and Google the answers. Instead of </span><a data-component="link" data-dcnode-id="1587" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/great-ways-to-improve-your-memory-2795356" rel="noopener noreferrer"><span data-dcnode-id="1588" instrument_node="">trying to remember</span></a><span data-dcnode-id="1586" instrument_node=""> important appointments, meetings, or dates, you simply rely on an iPhone app to remind you of what you need to accomplish each day.
</span></p><span data-dcnode-id="1584" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1583" id="mntl-sc-block_1-0-53"></div><span data-dcnode-id="1582" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1577" id="mntl-sc-block_1-0-54"><span data-dcnode-id="1581" instrument_node="">
And some experts warn that this over-reliance on your mobile device for all the answers might lead to&nbsp;mental laziness. In fact, one recent study has found that there is actually a link between relying on a smartphone and mental laziness.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1579" data-id="#citation-4"><span data-dcnode-id="1580" instrument_node="">5</span></span><span data-dcnode-id="1578" instrument_node="">﻿
</span></p><span data-dcnode-id="1576" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1575" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="1574" instrument_node="">
</span><div class="comp theme-takeaway mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1567" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1573" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1569" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">Smartphones don't necessarily turn people from deep thinkers into lazy thinkers, but the research does suggest that people who are naturally intuitive thinkers—or those who act based on instinct and emotions—tend to rely on their phones more frequently.</span></p></div><span data-dcnode-id="1568" instrument_node="">
</span></div><span data-dcnode-id="1566" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1564" id="mntl-sc-block_1-0-58"><span data-dcnode-id="1565" instrument_node="">
"The problem with relying on the internet too much is that you can't know you have the correct answer unless you think about it in an analytical or logical way," explained Gordon Pennycook, one of the study's co-authors.
</span></p><span data-dcnode-id="1563" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1562" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="1561" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1556" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1560" instrument_node="">
"Our research provides support for an association between heavy smartphone use and lowered intelligence," said Pennycook. "Whether smartphones actually decrease intelligence is still an open question that requires future research."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1558" data-id="#citation-4"><span data-dcnode-id="1559" instrument_node="">5</span></span><span data-dcnode-id="1557" instrument_node="">﻿
</span></p><span data-dcnode-id="1555" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1554" id="mntl-sc-block_1-0-61"></div><span data-dcnode-id="1553" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1551" id="mntl-sc-block_1-0-62"><span data-dcnode-id="1552" instrument_node="">
The researchers warn, however, that the use of mobile devices has far out-paced the available research on the subject. Researchers are just at the beginning stages of understanding the potential short-term and long-term effects that smartphone use might have on the brain.
</span></p><span data-dcnode-id="1550" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1549" id="mntl-sc-block_1-0-63"></div><span data-dcnode-id="1548" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1546" id="mntl-sc-block_1-0-64"><span data-dcnode-id="1547" instrument_node="">
Mobile devices are certainly bound to have their detriments, but the researchers also suggest that we have yet to fully understand the possible ways that they might also benefit the brain.
</span></p><span data-dcnode-id="1545" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1544" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="1543" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1537" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1542" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1539" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellmind.com/nomophobia-the-fear-of-being-without-your-phone-4781725" id="mntl-sc-block-featuredlink__link_1-0-2"><span class="link__wrapper" data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">Do You Have a Fear of Being Without Your Phone?</span></span></a><span data-dcnode-id="1538" instrument_node="">
</span></div><span data-dcnode-id="1536" instrument_node="">

</span><div class="window__info-description" data-dcnode-id="1385" dir="auto"><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">For most of us, our days revolve around screen time. We stare at our computers to work. We use our phones to socialize. We watch TV for entertainment.</span></p><p data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">But too much screen time can drain our mental strength.</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Excessive screen time has been linked to everything from relationship issues to increased mental health problems. Screen time can also interfere with sleep, reduce productivity, and take a toll on our physical health.</span></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">And while there are many recommendations out there about the importance of reducing screen time, actually doing so isn’t always easy.</span></p><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">We know that staring at social media and scrolling through news stories isn’t good for our health. Yet sometimes we feel compelled to keep doing these things anyway.</span></p><p data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">On today’s Friday Fix episode, I share how to keep your screen time from draining the mental strength you need to be your best. Tune in for three realistic strategies to incorporate into your life so that you can enjoy the moment more and be less glued to your screens.</span></p><span data-dcnode-id="1386" instrument_node="">
