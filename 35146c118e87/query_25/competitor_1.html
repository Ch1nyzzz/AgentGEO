</span><h1 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Brain Wave Frequency: 5 Brain States and How They Affect You</span></h1><span data-dcnode-id="553" instrument_node="">
</span><span data-dcnode-id="551" instrument_node="">
</span><div class="" data-dcnode-id="543" style="width: 100%; box-sizing: border-box"><p data-dcnode-id="547"><span data-dcnode-id="548" style="font-size: 16px;"><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/about_Val.html"><span data-dcnode-id="550" instrument_node="">By Val Silver</span></a></span></p><span data-dcnode-id="546" instrument_node="">
</span><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Understanding how brain wave frequency levels work and how they affect you is the first step to harnessing their powers for learning, healing, and manifesting. Your success with visualization, meditation, focused attention, and hypnosis all rely on your ability to get into receptive brain wave states.&nbsp;</span></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">As you relax, focus, and get in the zone, your subconscious mind can accept your visual and verbal suggestions that will change its programming. With training and practice you can get your brain waves into the zone at will within a short amount of time.</span></p><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Receptive brain wave patterns combined with implanting visual and auditory suggestions get your brain on board with the new thoughts and behaviors you want.&nbsp;</span></p><span data-dcnode-id="533" instrument_node="">
</span><h2 data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Five Brain Wave Frequency Levels</span></h2><span data-dcnode-id="530" instrument_node="">
</span><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Brainwaves are the measured as neurons in the brain fire together in rhythmic patterns. As they do, they communicate across the brain. </span></p><p data-dcnode-id="524"><span data-dcnode-id="527" instrument_node="">Brain wave frequency is measured in cycles per second or hertz (Hz). The amplitude, the size and strength of the wave, is also measured.&nbsp;</span><span data-dcnode-id="525" style="background-color: initial;"><span data-dcnode-id="526" instrument_node="">Gamma brain waves are the fastest and smallest waves. Delta waves are the slowest and largest.&nbsp;</span></span></p><p data-dcnode-id="518"><span data-dcnode-id="519" style="background-color: initial;"><span data-dcnode-id="523" instrument_node="">Mind frequency patterns naturally vary throughout the day and night. Usually, all frequencies are present at any given time. How balanced they are, or which ones are dominating, is determined by how mentally relaxed, engaged, and active you are. Patterns can vary from left to right hemispheres. </span><b data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Coherence</span></b><span data-dcnode-id="520" instrument_node=""> occurs when the electrical activity of each hemisphere is in sync.&nbsp;</span></span></p><p data-dcnode-id="515"><span data-dcnode-id="516" style="background-color: initial;"><span data-dcnode-id="517" instrument_node="">It is important to remember that these are not altered states of consciousness, but normal levels you flow through during the day and night.</span></span></p><span data-dcnode-id="514" instrument_node="">
The following beta, alpha theta and delta EEG brain wave frequency samples are by Hugo Gamboa (own work) [</span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gnu.org/copyleft/fdl.html"><span data-dcnode-id="513" instrument_node="">GFDL</span></a><span data-dcnode-id="511" instrument_node=""> or </span><a data-dcnode-id="509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//creativecommons.org/licenses/by-sa/3.0/"><span data-dcnode-id="510" instrument_node="">CC-BY-SA-3.0</span></a><span data-dcnode-id="508" instrument_node="">], </span><a data-dcnode-id="506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//commons.wikimedia.org/wiki/File%253AEeg_beta.svg"><span data-dcnode-id="507" instrument_node="">via Wikimedia Commons</span></a><span data-dcnode-id="505" instrument_node="">
</span><h3 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Beta</span></h3><span data-dcnode-id="502" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="500"><img alt="beta brain wave frequency" data-dcnode-id="501" data-pin-media="https://www.holistic-mindbody-healing.com/images/720px-Eeg_beta.svg.png" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/images/720px-Eeg_beta.svg.png&amp;raw" style="width: 720px; height: auto" title="beta brain wave frequency" width="720"></div><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Beta waves vary from 12-40 cycles a second.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Beta&nbsp;is the level of normal waking consciousness and focus. Your brain waves are at the faster beta level when you are engaged in conversation or an activity. &nbsp;You are alert, can make decisions and comparisons, and solve problems.&nbsp;</span></p><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Usually in beta, one side of the brain is dominant. Most women are right brain dominant while men tend to be left brain dominant.&nbsp;</span></p><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Low beta levels of 12-15 Hz synchronize the body's automatic functions. It is required for clear thinking, processing information and linear thinking. Brain hemispheres synchronize and can communicate better with each other.</span></p><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">High beta above 25 Hz is associated with the monkey mind, anxiety, stress, frustration and dis-ease. The more stress you are experiencing, the higher the amplitude of beta. Large flares of beta occur when you feel anger, blame, shame, and guilt.&nbsp;</span></p><p data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">At high beta levels, blood flow to </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/conscious-mind-power.html"><span data-dcnode-id="487" instrument_node="">the prefrontal cortex</span></a><span data-dcnode-id="485" instrument_node=""> can be diminished by 80 percent. This makes it difficult to think clearly. It is difficult to be rational, objective, or to make good decisions.&nbsp;</span></p><span data-dcnode-id="483" instrument_node="">
</span><h3 data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Gamma</span></h3><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="478" style="font-weight: normal;"><span data-dcnode-id="479" instrument_node="">Gamma brain waves</span></span><span data-dcnode-id="477" instrument_node="">&nbsp;are the fastest and smallest brainwaves ranging from 40-70 Hz (more or less). Most commonly, they appear to be in the 40 Hz range. It has been noted that higher level cognitive activities occur when brain waves suddenly hit the 40 cycle range.</span></p><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">There is some debate over whether gamma brain waves are in a distinct class or are just another level of beta waves. Until recently, they have received little attention from researchers and were just thought of as "noise".&nbsp;</span></p><p data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Gamma brain waves naturally occur while awakening and during REM sleep. They are found throughout the brain and allow parts of the brain to communicate with each other.</span></p><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Thanks to this brain wave frequency,  you can experience multiple sensory inputs all at the same time and recall past events. Gamma brain waves are associated with precognition, processing high levels of information, and a greater perception of reality and consciousness.</span></p><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">People with plenty of gamma waves are usually happier, more energetic, more creative, and have a higher I.Q. than people with fewer gamma waves. They are more focused and aware, and tend to be more compassionate than folks with fewer gamma brain waves.&nbsp;</span></p><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Top athletes and peak performers often have more gamma waves than others. Experienced Buddhist meditators reach the gamma mind frequency during focused meditations and loving-kindness meditations.</span></p><span data-dcnode-id="465" instrument_node="">
</span><h3 data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Alpha</span></h3><span data-dcnode-id="462" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="460"><img alt="alpha brain wave frequency" data-dcnode-id="461" data-pin-media="https://www.holistic-mindbody-healing.com/images/720px-Eeg_alpha.svg.png" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/images/720px-Eeg_alpha.svg.png&amp;raw" style="width: 720px; height: auto" title="alpha brain wave frequency" width="720"></div><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">The alpha brain wave frequency is slower than beta. Alpha brain waves range from 9-14 cycles per second. </span></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Faster alpha brain waves are related to relaxed focused attention and a receptive learning state of mind. </span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">You experience alpha when engrossed in a movie, book or activity. That is all you are aware of. This is a very light trance or hypnotic state.&nbsp;</span></p><p data-dcnode-id="450"><span data-dcnode-id="452" instrument_node="">At deeper, slower alpha you are not quite asleep and still have some conscious awareness and waking. This state is related to focused attention and intuition. Having more alpha brain waves is equated with feeling happier and a greater sense of well-being.</span><br data-dcnode-id="451"></p><p data-dcnode-id="439"><span data-dcnode-id="449" instrument_node="">Generating more alpha waves is easily achieved with&nbsp;</span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/stress-reduction-exercises.html"><span data-dcnode-id="448" instrument_node="">relaxation techniques</span></a><span data-dcnode-id="446" instrument_node="">,&nbsp;such as meditation, and&nbsp;</span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/benefits-of-hypnosis.html"><span data-dcnode-id="445" instrument_node="">hypnosis</span></a><span data-dcnode-id="443" instrument_node="">.&nbsp; Feeling blissful or full of love also generate more alpha, theta and delta waves. Most people generate alpha brain waves when&nbsp;</span><a data-dcnode-id="441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/why-meditate.html"><span data-dcnode-id="442" instrument_node="">meditating</span></a><span data-dcnode-id="440" instrument_node="">.</span></p><p data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">Alpha waves are important for connecting the higher brain wave frequencies of beta and gamma with the lower frequencies of theta and delta. This "alpha bridge" allows a flow of consciousness across the brain and integrates </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/levels-of-consciousness.html"><span data-dcnode-id="437" instrument_node="">all levels of mind</span></a><span data-dcnode-id="435" instrument_node="">. When fear or distress causes a spike in high beta waves, alpha waves diminish and this link is disconnected.&nbsp;</span></p><span data-dcnode-id="433" instrument_node="">
</span><div class="responsive_grid_block-2 responsive_grid_block-204748584" data-dcnode-id="420"><div class="responsive-row" data-dcnode-id="422"><div class="responsive_col-1 responsive_grid_block-204748584" data-dcnode-id="427"><span data-dcnode-id="432" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="431" instrument_node="">The Silva Mind Method for learning, manifesting, and healing yourself and others works by first entering the alpha level of mind. At alpha, it is easier to change and reprogram your mind to heal and manifest your intentions.&nbsp;</span><br data-dcnode-id="430"></p><span data-dcnode-id="428" instrument_node="">
</span></div><div class="responsive_col-2 responsive_grid_block-204748584" data-dcnode-id="423"><span data-dcnode-id="426" instrument_node="">
</span><iframe data-dcnode-id="425" frameborder="0" marginheight="0" marginwidth="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ws-na.amazon-adsystem.com/widgets/q%3FServiceVersion%3D20070822%26OneJS%3D1%26Operation%3DGetAdHtml%26MarketPlace%3DUS%26source%3Dac%26ref%3Dqf_sp_asin_til%26ad_type%3Dproduct_link%26tracking_id%3Dholimindheal-20%26marketplace%3Damazon%26region%3DUS%26placement%3D0915811375%26asins%3D0915811375%26linkId%3D78f97ac623461f274de68a5f96c06663%26show_border%3Dfalse%26link_opens_in_new_window%3Dfalse%26price_color%3D333333%26title_color%3D0066c0%26bg_color%3Dffffff&amp;raw" style="width:120px;height:240px;"></iframe><span data-dcnode-id="424" instrument_node="">
</span></div></div></div><span data-dcnode-id="418" instrument_node="">
</span><h3 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Theta</span></h3><span data-dcnode-id="415" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="413"><img alt="theta brain wave frequency" data-dcnode-id="414" data-pin-media="https://www.holistic-mindbody-healing.com/images/720px-Eeg_theta.svg.png" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/images/720px-Eeg_theta.svg.png&amp;raw" style="width: 720px; height: auto" title="theta brain wave frequency" width="720"></div><span data-dcnode-id="412" instrument_node="">
</span><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Theta brain waves&nbsp;vary from 5-8 cycles per second. They are associated with dreaming, visions, healing, and more contact with the unconscious mind. </span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">When a healer is sending energy, the amount of theta waves increases. As clients receive the energy, their brains also start making more theta waves. This is entrainment. </span></p><p data-dcnode-id="405"><span data-dcnode-id="407" instrument_node="">The mind frequency of young children is mostly theta. Their subconscious minds are easily programmed and they have difficulty discerning between reality and imagination. Adults&nbsp;who make too many theta brain waves may be considered delusional.</span><br data-dcnode-id="406"></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">When you drive the car while lost in a day dream, that is the theta mind frequency.&nbsp;At theta, you have&nbsp;free flowing ideas and think creatively. You release a burst of theta waves and pleasurable brain chemicals as a reward for learning something new, making a fundamental shift in your perspective, or have an "aha" moment.</span></p><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">You can really put&nbsp;the power of your subconscious mind&nbsp;to work&nbsp;for you&nbsp;when you reach deep alpha or theta brain wave frequency levels. &nbsp;Your healing and manifesting&nbsp;</span><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/mind-power-techniques.html"><span data-dcnode-id="401" instrument_node="">visualizations&nbsp;and affirmations</span></a><span data-dcnode-id="399" instrument_node="">&nbsp;are more likely to get to your subconscious mind and have the power to influence it.</span></p><p data-dcnode-id="393"><span data-dcnode-id="397" instrument_node="">Until recently, purposely dropping into theta and delta states required&nbsp;years of meditation practice or the help of a skilled hypnotist.&nbsp;Now, we have </span><a data-dcnode-id="395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/brain-entrainment.html"><span data-dcnode-id="396" instrument_node="">brainwave entrainment technologies</span></a><span data-dcnode-id="394" instrument_node=""> that effortlessly guide you into deeper states. When your brainwaves slow, there is less&nbsp;interference from the conscious mind. You relax and your brain is more open to incoming suggestions.&nbsp;</span></p><span data-dcnode-id="392" instrument_node="">
</span><h3 data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Delta</span></h3><span data-dcnode-id="389" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="387"><img alt="delta brain wave frequency" data-dcnode-id="388" data-pin-media="https://www.holistic-mindbody-healing.com/images/720px-Eeg_delta.svg.png" height="144" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.holistic-mindbody-healing.com/images/720px-Eeg_delta.svg.png&amp;raw" style="width: 720px; height: auto" title="delta brain wave frequency" width="720"></div><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="382"><span data-dcnode-id="384" style="font-weight: normal;"><span data-dcnode-id="385" instrument_node="">Delta waves&nbsp;</span></span><span data-dcnode-id="383" instrument_node="">are the slowest mind frequency. They occur during deep dreamless sleep. Your unconscious autonomic processes are carried out through these slow, large brainwaves. They occur at 1.5 to 4Hz.</span></p><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">&nbsp;You are in an advanced state of meditation during waking delta. This state is associated with kundalini experiences.</span></p><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Because delta waves are so large, the brain is forced to handle a lot more energy than usual. It has to create new neural pathways to accommodate the extra energy. This helps improve communication between both sides of the brain.</span></p><p data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">People who make a lot of delta waves are incredibly persuasive with other people and manifest powerfully. In the right hands this ability&nbsp;can be used for great good.&nbsp;It is said that if you can stay awake at the delta level you can subconscious mind power to deliberately affect not only your own programming, but the universal consciousness as well.</span></p><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="370"><b data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">When you are in the relaxed brain frequencies</span></b><span data-dcnode-id="372" instrument_node="">&nbsp;of alpha, theta and delta brain waves, your mind and your body heal naturally and are open to suggestion. The goal of slowing brain wave frequency via entrainment, meditation, hypnosis or relaxation is to help you&nbsp;program your mind with suggestions that are in line with your current health and life&nbsp;desires instead of just being at the mercy of&nbsp;past programming from your childhood.&nbsp;</span><br data-dcnode-id="371"></p><span data-dcnode-id="369" instrument_node="">
