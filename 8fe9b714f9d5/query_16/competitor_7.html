</span></p><p data-dcnode-id="6469"><span data-dcnode-id="6494" instrument_node="">One notable theory is that decentralization of state authority allowed local leaders to experiment with various ways to privatize the state sector and energize the economy.</span><sup class="reference" data-dcnode-id="6491" id="cite_ref-Loren_17-18_63-1"><a data-dcnode-id="6492" href="#cite_note-Loren_17-18-63"><span data-dcnode-id="6493" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6490" instrument_node=""> Although Deng was not the originator of many of the reforms, he approved them. Another theory focuses on internal incentives within the Chinese government, in which officials presiding over areas of high economic growth were more likely to be promoted. This made local and provincial governments "hungry for investment," who competed to reduce regulations and </span><a class="mw-redirect" data-dcnode-id="6488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_barrier" title="Market barrier"><span data-dcnode-id="6489" instrument_node="">barriers</span></a><span data-dcnode-id="6487" instrument_node=""> to investment to boost both economic growth and their careers. Such reforms were possible because Deng cultivated pro-market followers in the government.</span><sup class="reference" data-dcnode-id="6484" id="cite_ref-125"><a data-dcnode-id="6485" href="#cite_note-125"><span data-dcnode-id="6486" instrument_node="">[125]</span></a></sup><span data-dcnode-id="6483" instrument_node=""> </span><a data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Herman_Kahn" title="Herman Kahn"><span data-dcnode-id="6482" instrument_node="">Herman Kahn</span></a><span data-dcnode-id="6480" instrument_node=""> argued that </span><a data-dcnode-id="6478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Confucianism" title="Confucianism"><span data-dcnode-id="6479" instrument_node="">Confucian ethic</span></a><span data-dcnode-id="6477" instrument_node=""> was playing a "similar but more spectacular role in the modernization of East Asia than the </span><a data-dcnode-id="6475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestant_work_ethic" title="Protestant work ethic"><span data-dcnode-id="6476" instrument_node="">Protestant ethic</span></a><span data-dcnode-id="6474" instrument_node=""> played in Europe".</span><sup class="reference" data-dcnode-id="6471" id="cite_ref-126"><a data-dcnode-id="6472" href="#cite_note-126"><span data-dcnode-id="6473" instrument_node="">[126]</span></a></sup><span data-dcnode-id="6470" instrument_node="">
</span></p><p data-dcnode-id="6457"><span data-dcnode-id="6468" instrument_node="">Taken together, </span><a data-dcnode-id="6466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuen_Yuen_Ang" title="Yuen Yuen Ang"><span data-dcnode-id="6467" instrument_node="">Yuen Yuen Ang</span></a><span data-dcnode-id="6465" instrument_node=""> argues in </span><i data-dcnode-id="6463"><span data-dcnode-id="6464" instrument_node="">Foreign Affairs</span></i><span data-dcnode-id="6462" instrument_node=""> that political reforms took place with economic reforms under Deng, except the former did not take Western forms. She writes, "To be sure, Deng's reforms emphasized brute capital accumulation rather than holistic development, which led to environmental degradation, inequality, and other social problems. Still they undoubtedly kicked China's growth machine into gear by making the bureaucracy results oriented, fiercely competitive, and responsive to business needs, qualities that are normally associated with democracies." But this only applies to the Deng era. Ang notes that since 2012, when Xi Jinping took over, the new leader has reversed Deng's political reforms and limits to power, "just as political freedoms have become imperative for continued economic growth."</span><sup class="reference" data-dcnode-id="6459" id="cite_ref-127"><a data-dcnode-id="6460" href="#cite_note-127"><span data-dcnode-id="6461" instrument_node="">[127]</span></a></sup><span data-dcnode-id="6458" instrument_node="">
</span></p><span data-dcnode-id="6456" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6436"><div class="thumbinner" data-dcnode-id="6437" style="width:222px;"><a class="image" data-dcnode-id="6454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADirector-General_Roberto_Azev%25C3%25AAdo_met_with_China%25E2%2580%2599s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg"><img alt="" class="thumbimage" data-dcnode-id="6455" data-file-height="1166" data-file-width="1800" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/62/Director-General_Roberto_Azev%25C3%25AAdo_met_with_China%25E2%2580%2599s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg/220px-Director-General_Roberto_Azev%25C3%25AAdo_met_with_China%25E2%2580%2599s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/62/Director-General_Roberto_Azev%C3%AAdo_met_with_China%E2%80%99s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg/330px-Director-General_Roberto_Azev%C3%AAdo_met_with_China%E2%80%99s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/62/Director-General_Roberto_Azev%C3%AAdo_met_with_China%E2%80%99s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg/440px-Director-General_Roberto_Azev%C3%AAdo_met_with_China%E2%80%99s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg 2x" width="220"></a><span data-dcnode-id="6453" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6438"><div class="magnify" data-dcnode-id="6451"><a class="internal" data-dcnode-id="6452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADirector-General_Roberto_Azev%25C3%25AAdo_met_with_China%25E2%2580%2599s_Minister_of_Commerce_Gao_Hucheng_in_Qingdao.jpg" title="Enlarge"></a></div><a data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roberto_Azev%25C3%25AAdo" title="Roberto Azevêdo"><span data-dcnode-id="6450" instrument_node="">Roberto Azevêdo</span></a><span data-dcnode-id="6448" instrument_node="">, </span><a data-dcnode-id="6446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Director-General_of_the_World_Trade_Organization" title="Director-General of the World Trade Organization"><span data-dcnode-id="6447" instrument_node="">Director-General of WTO</span></a><span data-dcnode-id="6445" instrument_node="">, met with China's Minister of Commerce </span><a data-dcnode-id="6443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gao_Hucheng" title="Gao Hucheng"><span data-dcnode-id="6444" instrument_node="">Gao Hucheng</span></a><span data-dcnode-id="6442" instrument_node=""> in </span><a data-dcnode-id="6440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qingdao" title="Qingdao"><span data-dcnode-id="6441" instrument_node="">Qingdao</span></a><span data-dcnode-id="6439" instrument_node=""> (2014).</span></div></div></div><span data-dcnode-id="6435" instrument_node="">
</span><p data-dcnode-id="6342"><span data-dcnode-id="6434" instrument_node="">China's success is also due to the </span><a class="mw-redirect" data-dcnode-id="6432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Export-led_growth" title="Export-led growth"><span data-dcnode-id="6433" instrument_node="">export-led growth</span></a><span data-dcnode-id="6431" instrument_node=""> strategy used successfully by the </span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Asian_Tigers" title="Four Asian Tigers"><span data-dcnode-id="6430" instrument_node="">Four Asian Tigers</span></a><span data-dcnode-id="6428" instrument_node=""> beginning with </span><a class="mw-redirect" data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_post-war_economic_miracle" title="Japanese post-war economic miracle"><span data-dcnode-id="6427" instrument_node="">Japan in the 1960s–1970s</span></a><span data-dcnode-id="6425" instrument_node=""> and other </span><a data-dcnode-id="6423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newly_industrialized_country" title="Newly industrialized country"><span data-dcnode-id="6424" instrument_node="">newly industrialized countries</span></a><span data-dcnode-id="6422" instrument_node="">.</span><sup class="reference" data-dcnode-id="6419" id="cite_ref-sharma_128-0"><a data-dcnode-id="6420" href="#cite_note-sharma-128"><span data-dcnode-id="6421" instrument_node="">[128]</span></a></sup><span data-dcnode-id="6418" instrument_node=""> In 2001, China joined the </span><a data-dcnode-id="6416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="6417" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="6415" instrument_node=""> (WTO).</span><sup class="reference" data-dcnode-id="6412" id="cite_ref-129"><a data-dcnode-id="6413" href="#cite_note-129"><span data-dcnode-id="6414" instrument_node="">[129]</span></a></sup><span data-dcnode-id="6411" instrument_node=""> As of 2006, over 400 of the </span><a class="mw-redirect" data-dcnode-id="6409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fortune_500_companies" title="Fortune 500 companies"><span data-dcnode-id="6410" instrument_node="">Fortune 500 companies</span></a><span data-dcnode-id="6408" instrument_node=""> had entered the </span><a class="mw-redirect" data-dcnode-id="6406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_market" title="Chinese market"><span data-dcnode-id="6407" instrument_node="">Chinese market</span></a><span data-dcnode-id="6405" instrument_node="">, while at the same time a considerable number of Chinese companies had </span><a data-dcnode-id="6403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Go_Out_policy" title="Go Out policy"><span data-dcnode-id="6404" instrument_node="">opened their markets outside of China</span></a><span data-dcnode-id="6402" instrument_node="">.</span><sup class="reference" data-dcnode-id="6399" id="cite_ref-130"><a data-dcnode-id="6400" href="#cite_note-130"><span data-dcnode-id="6401" instrument_node="">[130]</span></a></sup><span data-dcnode-id="6398" instrument_node=""> Foreign aids to China, including those from Hong Kong, Macau and Taiwan, also played an important role.</span><sup class="reference" data-dcnode-id="6395" id="cite_ref-:3_131-0"><a data-dcnode-id="6396" href="#cite_note-:3-131"><span data-dcnode-id="6397" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="6392" id="cite_ref-:5_132-0"><a data-dcnode-id="6393" href="#cite_note-:5-132"><span data-dcnode-id="6394" instrument_node="">[132]</span></a></sup><sup class="reference" data-dcnode-id="6389" id="cite_ref-:4_133-0"><a data-dcnode-id="6390" href="#cite_note-:4-133"><span data-dcnode-id="6391" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6388" instrument_node=""> Since the beginning of opening, China has received </span><a data-dcnode-id="6386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_aid_to_China" title="Foreign aid to China"><span data-dcnode-id="6387" instrument_node="">a significant amount of aid</span></a><span data-dcnode-id="6385" instrument_node=""> from major </span><a class="mw-redirect" data-dcnode-id="6383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developed_countries" title="Developed countries"><span data-dcnode-id="6384" instrument_node="">developed countries</span></a><span data-dcnode-id="6382" instrument_node=""> such as the United States, Japan, Germany, France and the United Kingdom.</span><sup class="reference" data-dcnode-id="6379" id="cite_ref-:3_131-1"><a data-dcnode-id="6380" href="#cite_note-:3-131"><span data-dcnode-id="6381" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="6376" id="cite_ref-:5_132-1"><a data-dcnode-id="6377" href="#cite_note-:5-132"><span data-dcnode-id="6378" instrument_node="">[132]</span></a></sup><span data-dcnode-id="6375" instrument_node=""> For instance, through its </span><a data-dcnode-id="6373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Official_Development_Assistance_%28Japan%29" title="Official Development Assistance (Japan)"><span data-dcnode-id="6374" instrument_node="">Official Development Assistance</span></a><span data-dcnode-id="6372" instrument_node=""> (ODA), Japan had offered China various forms of assistance worth 3.65 trillion </span><a data-dcnode-id="6370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_yen" title="Japanese yen"><span data-dcnode-id="6371" instrument_node="">Yen</span></a><span data-dcnode-id="6369" instrument_node=""> as of 2018.</span><sup class="reference" data-dcnode-id="6366" id="cite_ref-:3_131-2"><a data-dcnode-id="6367" href="#cite_note-:3-131"><span data-dcnode-id="6368" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="6363" id="cite_ref-134"><a data-dcnode-id="6364" href="#cite_note-134"><span data-dcnode-id="6365" instrument_node="">[134]</span></a></sup><span data-dcnode-id="6362" instrument_node=""> On the other hand, the assistance from the U.S. reached a total of </span><a class="mw-redirect" data-dcnode-id="6360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US%24" title="US$"><span data-dcnode-id="6361" instrument_node="">US$</span></a><span data-dcnode-id="6359" instrument_node="">556 million as of 2012, and has "helped </span><a data-dcnode-id="6357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tibet_Autonomous_Region" title="Tibet Autonomous Region"><span data-dcnode-id="6358" instrument_node="">Tibetan</span></a><span data-dcnode-id="6356" instrument_node=""> communities improve livelihoods, promote sustainable development and environmental conservation, and preserve cultural traditions...also supports targeted programs that strengthen cooperation on combatting the spread of </span><a data-dcnode-id="6354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/HIV/AIDS" title="HIV/AIDS"><span data-dcnode-id="6355" instrument_node="">HIV/AIDS</span></a><span data-dcnode-id="6353" instrument_node=""> and other pandemic and emerging diseases as well as </span><a data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rule_of_law" title="Rule of law"><span data-dcnode-id="6352" instrument_node="">rule of law</span></a><span data-dcnode-id="6350" instrument_node=""> programs."</span><sup class="reference" data-dcnode-id="6347" id="cite_ref-:3_131-3"><a data-dcnode-id="6348" href="#cite_note-:3-131"><span data-dcnode-id="6349" instrument_node="">[131]</span></a></sup><sup class="reference" data-dcnode-id="6344" id="cite_ref-:4_133-1"><a data-dcnode-id="6345" href="#cite_note-:4-133"><span data-dcnode-id="6346" instrument_node="">[133]</span></a></sup><span data-dcnode-id="6343" instrument_node="">
</span></p><p data-dcnode-id="6329"><span data-dcnode-id="6341" instrument_node="">The collapse of the Soviet Bloc and centrally planned economies in 1989 provided renewed impetus for China to further reform its economy through different policies in order to avoid a similar fate.</span><sup class="reference" data-dcnode-id="6338" id="cite_ref-jdorn_135-0"><a data-dcnode-id="6339" href="#cite_note-jdorn-135"><span data-dcnode-id="6340" instrument_node="">[135]</span></a></sup><span data-dcnode-id="6337" instrument_node=""> China also wanted to avoid the Russian ad-hoc experiments with market capitalism under Boris Yeltsin resulting in the rise of powerful oligarchs, corruption, and the loss of state revenue which exacerbated economic </span><a data-dcnode-id="6335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_inequality" title="Economic inequality"><span data-dcnode-id="6336" instrument_node="">disparity</span></a><span data-dcnode-id="6334" instrument_node="">.</span><sup class="reference" data-dcnode-id="6331" id="cite_ref-remnick_136-0"><a data-dcnode-id="6332" href="#cite_note-remnick-136"><span data-dcnode-id="6333" instrument_node="">[136]</span></a></sup><span data-dcnode-id="6330" instrument_node="">
</span></p><p data-dcnode-id="6306"><a data-dcnode-id="6327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="6328" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="6326" instrument_node=""> contributes to China's economic growth in long run. According to </span><a data-dcnode-id="6324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mancur_Olson" title="Mancur Olson"><span data-dcnode-id="6325" instrument_node="">Mancur Olson</span></a><span data-dcnode-id="6323" instrument_node="">, Cultural Revolution attacked the very administrators and managers on which Chinese economy depended, and the immediate result was instability and administrative chaos in short run. A longer-run result was that there were not nearly as many well-entrenched </span><a class="mw-redirect" data-dcnode-id="6321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interest_group" title="Interest group"><span data-dcnode-id="6322" instrument_node="">interest groups</span></a><span data-dcnode-id="6320" instrument_node=""> as in the Soviet Union and the European communist states, so when </span><a data-dcnode-id="6318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="6319" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="6317" instrument_node=""> and the other pragmatists take power, there were few </span><a class="mw-redirect" data-dcnode-id="6315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Interest_group" title="Interest group"><span data-dcnode-id="6316" instrument_node="">interest groups</span></a><span data-dcnode-id="6314" instrument_node=""> whose lobbying could undermine Deng's market-oriented reforms, because the Cultural Revolution had destroyed the narrowly entrenched interests with a stake in the </span><i data-dcnode-id="6312"><span data-dcnode-id="6313" instrument_node="">status quo</span></i><span data-dcnode-id="6311" instrument_node="">.</span><sup class="reference" data-dcnode-id="6308" id="cite_ref-137"><a data-dcnode-id="6309" href="#cite_note-137"><span data-dcnode-id="6310" instrument_node="">[137]</span></a></sup><span data-dcnode-id="6307" instrument_node="">
</span></p><span data-dcnode-id="6305" instrument_node="">
</span><h3 data-dcnode-id="6295"><span class="mw-headline" data-dcnode-id="6303" id="Comparison_to_other_developing_economies"><span data-dcnode-id="6304" instrument_node="">Comparison to other developing economies</span></span><span class="mw-editsection" data-dcnode-id="6296"><span class="mw-editsection-bracket" data-dcnode-id="6301"><span data-dcnode-id="6302" instrument_node="">[</span></span><a data-dcnode-id="6299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D21" title="Edit section: Comparison to other developing economies"><span data-dcnode-id="6300" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6297"><span data-dcnode-id="6298" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6294" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6282"><div class="thumbinner" data-dcnode-id="6283" style="width:277px;"><a class="image" data-dcnode-id="6292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_per_capita_of_China_and_India.svg"><img alt="" class="thumbimage" data-dcnode-id="6293" data-file-height="560" data-file-width="750" decoding="async" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/GDP_per_capita_of_China_and_India.svg/275px-GDP_per_capita_of_China_and_India.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/GDP_per_capita_of_China_and_India.svg/413px-GDP_per_capita_of_China_and_India.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2b/GDP_per_capita_of_China_and_India.svg/550px-GDP_per_capita_of_China_and_India.svg.png 2x" width="275"></a><span data-dcnode-id="6291" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6284"><div class="magnify" data-dcnode-id="6289"><a class="internal" data-dcnode-id="6290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGDP_per_capita_of_China_and_India.svg" title="Enlarge"></a></div><span data-dcnode-id="6288" instrument_node="">Development trends of Chinese and </span><a data-dcnode-id="6286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hindu_rate_of_growth" title="Hindu rate of growth"><span data-dcnode-id="6287" instrument_node="">Indian GDP</span></a><span data-dcnode-id="6285" instrument_node=""> (1950–2010)</span></div></div></div><span data-dcnode-id="6281" instrument_node="">
</span><p data-dcnode-id="6240"><span data-dcnode-id="6280" instrument_node="">China's transition from a </span><a data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economy" title="Planned economy"><span data-dcnode-id="6279" instrument_node="">planned economy</span></a><span data-dcnode-id="6277" instrument_node=""> to a </span><a data-dcnode-id="6275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_market_economy" title="Socialist market economy"><span data-dcnode-id="6276" instrument_node="">socialist market economy</span></a><span data-dcnode-id="6274" instrument_node=""> has often been compared with economies in Eastern Europe that are undergoing a similar transition. China's performance has been praised for avoiding the major shocks and inflation that plagued the </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="6273" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="6271" instrument_node="">.</span><sup class="reference" data-dcnode-id="6268" id="cite_ref-138"><a data-dcnode-id="6269" href="#cite_note-138"><span data-dcnode-id="6270" instrument_node="">[138]</span></a></sup><span data-dcnode-id="6267" instrument_node=""> The Eastern bloc economies saw declines of 13% to 65% in GDP at the beginning of reforms, while Chinese growth has been very strong since the beginning of reform.</span><sup class="reference" data-dcnode-id="6264" id="cite_ref-139"><a data-dcnode-id="6265" href="#cite_note-139"><span data-dcnode-id="6266" instrument_node="">[139]</span></a></sup><span data-dcnode-id="6263" instrument_node=""> China also managed to avoid the hyperinflation of 200 to 1,000% that Eastern Europe experienced.</span><sup class="reference" data-dcnode-id="6260" id="cite_ref-140"><a data-dcnode-id="6261" href="#cite_note-140"><span data-dcnode-id="6262" instrument_node="">[140]</span></a></sup><span data-dcnode-id="6259" instrument_node=""> This success is attributed to the gradualist and decentralized approach of the Chinese government, which allowed market institutions to develop to the point where they could replace state planning. This contrasts with the </span><a data-dcnode-id="6257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1989%23Economic_reforms" title="Revolutions of 1989"><span data-dcnode-id="6258" instrument_node="">"big bang" approach</span></a><span data-dcnode-id="6256" instrument_node=""> of Eastern Europe, where the state-owned sector was rapidly privatized with employee buyouts, but retained much of the earlier, inefficient management.</span><sup class="reference" data-dcnode-id="6253" id="cite_ref-141"><a data-dcnode-id="6254" href="#cite_note-141"><span data-dcnode-id="6255" instrument_node="">[141]</span></a></sup><span data-dcnode-id="6252" instrument_node=""> Other factors thought to account for the differences are the greater urbanization of the </span><a data-dcnode-id="6250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Commonwealth_of_Independent_States" title="Commonwealth of Independent States"><span data-dcnode-id="6251" instrument_node="">CIS</span></a><span data-dcnode-id="6249" instrument_node=""> economies and differences in social welfare and other institutions.</span><sup class="reference" data-dcnode-id="6246" id="cite_ref-142"><a data-dcnode-id="6247" href="#cite_note-142"><span data-dcnode-id="6248" instrument_node="">[142]</span></a></sup><span data-dcnode-id="6245" instrument_node=""> Another argument is that, in the Eastern European economies, political change is sometimes seen to have made gradualist reforms impossible, so the shocks and inflation were unavoidable.</span><sup class="reference" data-dcnode-id="6242" id="cite_ref-143"><a data-dcnode-id="6243" href="#cite_note-143"><span data-dcnode-id="6244" instrument_node="">[143]</span></a></sup><span data-dcnode-id="6241" instrument_node="">
</span></p><p data-dcnode-id="6214"><span data-dcnode-id="6239" instrument_node="">China's economic growth has been compared with other developing countries, such as </span><a data-dcnode-id="6237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="6238" instrument_node="">Brazil</span></a><span data-dcnode-id="6236" instrument_node="">, </span><a data-dcnode-id="6234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mexico" title="Mexico"><span data-dcnode-id="6235" instrument_node="">Mexico</span></a><span data-dcnode-id="6233" instrument_node="">, and </span><a data-dcnode-id="6231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="6232" instrument_node="">India</span></a><span data-dcnode-id="6230" instrument_node="">. GDP growth in China outstrips all other developing countries, with only India after 1990 coming close to China's experience.</span><sup class="reference" data-dcnode-id="6227" id="cite_ref-Heston_37_144-0"><a data-dcnode-id="6228" href="#cite_note-Heston_37-144"><span data-dcnode-id="6229" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6226" instrument_node=""> Scholars believe that high rates of investments, especially increases in capital invested per worker, have contributed to China's superior economic performance.</span><sup class="reference" data-dcnode-id="6223" id="cite_ref-Heston_37_144-1"><a data-dcnode-id="6224" href="#cite_note-Heston_37-144"><span data-dcnode-id="6225" instrument_node="">[144]</span></a></sup><span data-dcnode-id="6222" instrument_node=""> China's relatively free economy, with less government intervention and regulation, is cited by scholars as an important factor in China's superior performance compared to other </span><a class="mw-redirect" data-dcnode-id="6220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Developing_countries" title="Developing countries"><span data-dcnode-id="6221" instrument_node="">developing countries</span></a><span data-dcnode-id="6219" instrument_node="">.</span><sup class="reference" data-dcnode-id="6216" id="cite_ref-145"><a data-dcnode-id="6217" href="#cite_note-145"><span data-dcnode-id="6218" instrument_node="">[145]</span></a></sup><span data-dcnode-id="6215" instrument_node="">
</span></p><span data-dcnode-id="6213" instrument_node="">
</span><h3 data-dcnode-id="6203"><span class="mw-headline" data-dcnode-id="6211" id="Criticism_and_development_issues"><span data-dcnode-id="6212" instrument_node="">Criticism and development issues</span></span><span class="mw-editsection" data-dcnode-id="6204"><span class="mw-editsection-bracket" data-dcnode-id="6209"><span data-dcnode-id="6210" instrument_node="">[</span></span><a data-dcnode-id="6207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D22" title="Edit section: Criticism and development issues"><span data-dcnode-id="6208" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6205"><span data-dcnode-id="6206" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6202" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6185"><div class="thumbinner" data-dcnode-id="6186" style="width:222px;"><a class="image" data-dcnode-id="6200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E8%25BF%259C%25E7%259C%25BA%25E9%2599%2586%25E5%25AE%25B6%25E5%2598%25B4-%25E9%259B%25BE%25E9%259C%25BE_Lujiazui_in_the_haze_-_panoramio.jpg"><img alt="" class="thumbimage" data-dcnode-id="6201" data-file-height="3240" data-file-width="4320" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/%25E8%25BF%259C%25E7%259C%25BA%25E9%2599%2586%25E5%25AE%25B6%25E5%2598%25B4-%25E9%259B%25BE%25E9%259C%25BE_Lujiazui_in_the_haze_-_panoramio.jpg/220px-%25E8%25BF%259C%25E7%259C%25BA%25E9%2599%2586%25E5%25AE%25B6%25E5%2598%25B4-%25E9%259B%25BE%25E9%259C%25BE_Lujiazui_in_the_haze_-_panoramio.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/ba/%E8%BF%9C%E7%9C%BA%E9%99%86%E5%AE%B6%E5%98%B4-%E9%9B%BE%E9%9C%BE_Lujiazui_in_the_haze_-_panoramio.jpg/330px-%E8%BF%9C%E7%9C%BA%E9%99%86%E5%AE%B6%E5%98%B4-%E9%9B%BE%E9%9C%BE_Lujiazui_in_the_haze_-_panoramio.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/ba/%E8%BF%9C%E7%9C%BA%E9%99%86%E5%AE%B6%E5%98%B4-%E9%9B%BE%E9%9C%BE_Lujiazui_in_the_haze_-_panoramio.jpg/440px-%E8%BF%9C%E7%9C%BA%E9%99%86%E5%AE%B6%E5%98%B4-%E9%9B%BE%E9%9C%BE_Lujiazui_in_the_haze_-_panoramio.jpg 2x" width="220"></a><span data-dcnode-id="6199" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6187"><div class="magnify" data-dcnode-id="6197"><a class="internal" data-dcnode-id="6198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E8%25BF%259C%25E7%259C%25BA%25E9%2599%2586%25E5%25AE%25B6%25E5%2598%25B4-%25E9%259B%25BE%25E9%259C%25BE_Lujiazui_in_the_haze_-_panoramio.jpg" title="Enlarge"></a></div><a class="mw-redirect" data-dcnode-id="6195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_pollution_in_China" title="Air pollution in China"><span data-dcnode-id="6196" instrument_node="">Air pollution</span></a><span data-dcnode-id="6194" instrument_node=""> has become a major environmental issue in China resulting from the economic development. (The picture shows thick </span><a data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Haze" title="Haze"><span data-dcnode-id="6193" instrument_node="">haze</span></a><span data-dcnode-id="6191" instrument_node=""> in </span><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lujiazui" title="Lujiazui"><span data-dcnode-id="6190" instrument_node="">Lujiazui</span></a><span data-dcnode-id="6188" instrument_node=""> of Shanghai)</span></div></div></div><span data-dcnode-id="6184" instrument_node="">
</span><p data-dcnode-id="6139"><span data-dcnode-id="6183" instrument_node="">The government retains monopolies in several sectors, such as petroleum and banking. The recent reversal of some reforms have left some observers dubbing 2008 the "third anniversary of the end of reforms".</span><sup class="reference" data-dcnode-id="6180" id="cite_ref-scissors_16-3"><a data-dcnode-id="6181" href="#cite_note-scissors-16"><span data-dcnode-id="6182" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6179" instrument_node=""> Nevertheless, observers</span><sup class="noprint Inline-Template" data-dcnode-id="6172" style="white-space:nowrap;"><span data-dcnode-id="6178" instrument_node="">[</span><i data-dcnode-id="6174"><a data-dcnode-id="6175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="6176" title="The material near this tag possibly uses too-vague attribution or weasel words. (September 2013)"><span data-dcnode-id="6177" instrument_node="">who?</span></span></a></i><span data-dcnode-id="6173" instrument_node="">]</span></sup><span data-dcnode-id="6171" instrument_node=""> believe that China's economy can continue growing at rates of 6–8 percent until 2025,</span><sup class="reference" data-dcnode-id="6168" id="cite_ref-146"><a data-dcnode-id="6169" href="#cite_note-146"><span data-dcnode-id="6170" instrument_node="">[146]</span></a></sup><span data-dcnode-id="6167" instrument_node=""> though a reduction in state intervention is considered by some to be necessary for sustained growth.</span><sup class="reference" data-dcnode-id="6164" id="cite_ref-147"><a data-dcnode-id="6165" href="#cite_note-147"><span data-dcnode-id="6166" instrument_node="">[147]</span></a></sup><span data-dcnode-id="6163" instrument_node=""> However, it has been reported over the years that the GDP figures and other economic data from the Chinese government may be inflated or manipulated otherwise.</span><sup class="reference" data-dcnode-id="6160" id="cite_ref-:15_19-1"><a data-dcnode-id="6161" href="#cite_note-:15-19"><span data-dcnode-id="6162" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="6157" id="cite_ref-:16_20-1"><a data-dcnode-id="6158" href="#cite_note-:16-20"><span data-dcnode-id="6159" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="6154" id="cite_ref-:17_21-1"><a data-dcnode-id="6155" href="#cite_note-:17-21"><span data-dcnode-id="6156" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6151" id="cite_ref-148"><a data-dcnode-id="6152" href="#cite_note-148"><span data-dcnode-id="6153" instrument_node="">[148]</span></a></sup><sup class="reference" data-dcnode-id="6148" id="cite_ref-149"><a data-dcnode-id="6149" href="#cite_note-149"><span data-dcnode-id="6150" instrument_node="">[149]</span></a></sup><span data-dcnode-id="6147" instrument_node=""> Officials from central government have admitted that local economic statistics are sometimes falsified, in order to meet the economic growth targets for personal promotion of local officials, for example.</span><sup class="reference" data-dcnode-id="6144" id="cite_ref-:15_19-2"><a data-dcnode-id="6145" href="#cite_note-:15-19"><span data-dcnode-id="6146" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="6141" id="cite_ref-150"><a data-dcnode-id="6142" href="#cite_note-150"><span data-dcnode-id="6143" instrument_node="">[150]</span></a></sup><span data-dcnode-id="6140" instrument_node="">
</span></p><p data-dcnode-id="6114"><span data-dcnode-id="6138" instrument_node="">Despite reducing poverty and increasing China's wealth, Deng's reforms have been criticized by the </span><a data-dcnode-id="6136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_New_Left" title="Chinese New Left"><span data-dcnode-id="6137" instrument_node="">Chinese New Left</span></a><span data-dcnode-id="6135" instrument_node=""> for increasing inequality and allowing private entrepreneurs to purchase state assets at reduced prices. These accusations were especially intense during the </span><a class="mw-redirect" data-dcnode-id="6133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lang-Gu_dispute" title="Lang-Gu dispute"><span data-dcnode-id="6134" instrument_node="">Lang-Gu dispute</span></a><span data-dcnode-id="6132" instrument_node="">, in which New Left academic </span><a class="mw-redirect" data-dcnode-id="6130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Larry_Lang" title="Larry Lang"><span data-dcnode-id="6131" instrument_node="">Larry Lang</span></a><span data-dcnode-id="6129" instrument_node=""> accused entrepreneur Gu Sujung of usurping state assets, after which Gu was imprisoned.</span><sup class="reference" data-dcnode-id="6126" id="cite_ref-151"><a data-dcnode-id="6127" href="#cite_note-151"><span data-dcnode-id="6128" instrument_node="">[151]</span></a></sup><span data-dcnode-id="6125" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu-Wen_Administration" title="Hu-Wen Administration"><span data-dcnode-id="6124" instrument_node="">Hu-Wen Administration</span></a><span data-dcnode-id="6122" instrument_node=""> adopted some New Left policies, such as halting privatizations and increasing the state sector's importance in the economy, and </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keynesian_economics" title="Keynesian economics"><span data-dcnode-id="6121" instrument_node="">Keynesian policies</span></a><span data-dcnode-id="6119" instrument_node=""> that have been criticized by some Chinese economists who advocate a policy of deregulation, tax cuts and privatization.</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-Weiyin_Zhang_92-1"><a data-dcnode-id="6117" href="#cite_note-Weiyin_Zhang-92"><span data-dcnode-id="6118" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6115" instrument_node="">
</span></p><span data-dcnode-id="6113" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6101"><div class="thumbinner" data-dcnode-id="6102" style="width:222px;"><a class="image" data-dcnode-id="6111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACO2_emission_pie_chart.svg"><img alt="" class="thumbimage" data-dcnode-id="6112" data-file-height="540" data-file-width="540" decoding="async" height="220" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/ca/CO2_emission_pie_chart.svg/220px-CO2_emission_pie_chart.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/ca/CO2_emission_pie_chart.svg/330px-CO2_emission_pie_chart.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/ca/CO2_emission_pie_chart.svg/440px-CO2_emission_pie_chart.svg.png 2x" width="220"></a><span data-dcnode-id="6110" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6103"><div class="magnify" data-dcnode-id="6108"><a class="internal" data-dcnode-id="6109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACO2_emission_pie_chart.svg" title="Enlarge"></a></div><span data-dcnode-id="6107" instrument_node="">Global </span><a data-dcnode-id="6105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gas" title="Greenhouse gas"><span data-dcnode-id="6106" instrument_node="">CO2 gas</span></a><span data-dcnode-id="6104" instrument_node=""> emissions by country (2015).</span></div></div></div><span data-dcnode-id="6100" instrument_node="">
</span><p data-dcnode-id="6085"><span data-dcnode-id="6099" instrument_node="">Other criticisms focus on the effects of rapid </span><a class="mw-redirect" data-dcnode-id="6097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialization" title="Industrialization"><span data-dcnode-id="6098" instrument_node="">industrialization</span></a><span data-dcnode-id="6096" instrument_node=""> on public health and the environment. However, scholars believe that public health issues are unlikely to become major obstacles to the growth of China's economy during the coming decades, and studies have shown that air quality and other environmental measures in China are better than those in developed countries, such as the </span><a data-dcnode-id="6094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="6095" instrument_node="">United States</span></a><span data-dcnode-id="6093" instrument_node=""> and </span><a data-dcnode-id="6091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="6092" instrument_node="">Japan</span></a><span data-dcnode-id="6090" instrument_node="">, at the same level of development.</span><sup class="reference" data-dcnode-id="6087" id="cite_ref-152"><a data-dcnode-id="6088" href="#cite_note-152"><span data-dcnode-id="6089" instrument_node="">[152]</span></a></sup><span data-dcnode-id="6086" instrument_node="">
</span></p><p data-dcnode-id="6043"><span data-dcnode-id="6084" instrument_node="">The economic reforms were accompanied with a series of </span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_People%2527s_Republic_of_China%23Political_reforms" title="History of the People's Republic of China"><span data-dcnode-id="6083" instrument_node="">political reforms</span></a><span data-dcnode-id="6081" instrument_node=""> in the 1980s, supported by Deng Xiaoping. However, many of the planned political reforms ended after the </span><a class="mw-redirect" data-dcnode-id="6079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Tiananmen_Square_massacre" title="1989 Tiananmen Square massacre"><span data-dcnode-id="6080" instrument_node="">1989 Tiananmen Square massacre</span></a><span data-dcnode-id="6078" instrument_node="">.</span><sup class="reference" data-dcnode-id="6075" id="cite_ref-153"><a data-dcnode-id="6076" href="#cite_note-153"><span data-dcnode-id="6077" instrument_node="">[153]</span></a></sup><span data-dcnode-id="6074" instrument_node=""> Lack of political reform contributed to the serious </span><a data-dcnode-id="6072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption_in_China" title="Corruption in China"><span data-dcnode-id="6073" instrument_node="">corruption issue in China</span></a><span data-dcnode-id="6071" instrument_node="">.</span><sup class="reference" data-dcnode-id="6068" id="cite_ref-154"><a data-dcnode-id="6069" href="#cite_note-154"><span data-dcnode-id="6070" instrument_node="">[154]</span></a></sup><span data-dcnode-id="6067" instrument_node=""> In addition, </span><a data-dcnode-id="6065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_property_bubble_%282005%25E2%2580%25932011%29" title="Chinese property bubble (2005–2011)"><span data-dcnode-id="6066" instrument_node="">real state bubble</span></a><span data-dcnode-id="6064" instrument_node="">, </span><a data-dcnode-id="6062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pollution_in_China" title="Pollution in China"><span data-dcnode-id="6063" instrument_node="">pollution</span></a><span data-dcnode-id="6061" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Population_crisis" title="Population crisis"><span data-dcnode-id="6060" instrument_node="">population crisis</span></a><span data-dcnode-id="6058" instrument_node=""> are among the most serious development issues in China.</span><sup class="reference" data-dcnode-id="6055" id="cite_ref-:6_17-1"><a data-dcnode-id="6056" href="#cite_note-:6-17"><span data-dcnode-id="6057" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="6052" id="cite_ref-:13_18-1"><a data-dcnode-id="6053" href="#cite_note-:13-18"><span data-dcnode-id="6054" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6051" instrument_node=""> For instance, China is the </span><a data-dcnode-id="6049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_carbon_dioxide_emissions" title="List of countries by carbon dioxide emissions"><span data-dcnode-id="6050" instrument_node="">largest CO2 emitter in the world</span></a><span data-dcnode-id="6048" instrument_node="">.</span><sup class="reference" data-dcnode-id="6045" id="cite_ref-155"><a data-dcnode-id="6046" href="#cite_note-155"><span data-dcnode-id="6047" instrument_node="">[155]</span></a></sup><span data-dcnode-id="6044" instrument_node="">
</span></p><p data-dcnode-id="6001"><span data-dcnode-id="6042" instrument_node="">On the other hand, since the late 1970s, Deng and other senior leaders including </span><a data-dcnode-id="6040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chen_Yun" title="Chen Yun"><span data-dcnode-id="6041" instrument_node="">Chen Yun</span></a><span data-dcnode-id="6039" instrument_node=""> and </span><a data-dcnode-id="6037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Li_Xiannian" title="Li Xiannian"><span data-dcnode-id="6038" instrument_node="">Li Xiannian</span></a><span data-dcnode-id="6036" instrument_node=""> supported the "</span><a data-dcnode-id="6034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/One-child_policy" title="One-child policy"><span data-dcnode-id="6035" instrument_node="">one-child policy</span></a><span data-dcnode-id="6033" instrument_node="">" in order to cope with the </span><a data-dcnode-id="6031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_overpopulation" title="Human overpopulation"><span data-dcnode-id="6032" instrument_node="">overpopulation crisis</span></a><span data-dcnode-id="6030" instrument_node="">.</span><sup class="reference" data-dcnode-id="6027" id="cite_ref-156"><a data-dcnode-id="6028" href="#cite_note-156"><span data-dcnode-id="6029" instrument_node="">[156]</span></a></sup><span data-dcnode-id="6026" instrument_node=""> But the </span><a class="mw-redirect" data-dcnode-id="6024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sixth_National_Population_Census_of_the_People%2527s_Republic_of_China" title="Sixth National Population Census of the People's Republic of China"><span data-dcnode-id="6025" instrument_node="">2010 census data</span></a><span data-dcnode-id="6023" instrument_node=""> showed that the population growth rate had remained very low,</span><sup class="reference" data-dcnode-id="6020" id="cite_ref-157"><a data-dcnode-id="6021" href="#cite_note-157"><span data-dcnode-id="6022" instrument_node="">[157]</span></a></sup><span data-dcnode-id="6019" instrument_node=""> and due to the financial pressure and other factors, many young couples choose to delay or even abandon the plan of raising a second child even though the Chinese government has largely relaxed the one-child policy in late 2015.</span><sup class="reference" data-dcnode-id="6016" id="cite_ref-158"><a data-dcnode-id="6017" href="#cite_note-158"><span data-dcnode-id="6018" instrument_node="">[158]</span></a></sup><sup class="reference" data-dcnode-id="6013" id="cite_ref-:14_159-0"><a data-dcnode-id="6014" href="#cite_note-:14-159"><span data-dcnode-id="6015" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="6010" id="cite_ref-160"><a data-dcnode-id="6011" href="#cite_note-160"><span data-dcnode-id="6012" instrument_node="">[160]</span></a></sup><span data-dcnode-id="6009" instrument_node=""> The population crisis threatens further economic development.</span><sup class="reference" data-dcnode-id="6006" id="cite_ref-:14_159-1"><a data-dcnode-id="6007" href="#cite_note-:14-159"><span data-dcnode-id="6008" instrument_node="">[159]</span></a></sup><sup class="reference" data-dcnode-id="6003" id="cite_ref-161"><a data-dcnode-id="6004" href="#cite_note-161"><span data-dcnode-id="6005" instrument_node="">[161]</span></a></sup><span data-dcnode-id="6002" instrument_node="">
</span></p><span data-dcnode-id="6000" instrument_node="">
