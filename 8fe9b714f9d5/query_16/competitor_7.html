s to CCP history, theory and practice.</span><sup class="reference" data-dcnode-id="7292" id="cite_ref-Naughton_114_65-2"><a data-dcnode-id="7293" href="#cite_note-Naughton_114-65"><span data-dcnode-id="7294" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7291" instrument_node="">
</span></p><p data-dcnode-id="7255"><span data-dcnode-id="7289" instrument_node="">Although Deng died in 1997, reforms continued under his handpicked successors, </span><a data-dcnode-id="7287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiang_Zemin" title="Jiang Zemin"><span data-dcnode-id="7288" instrument_node="">Jiang Zemin</span></a><span data-dcnode-id="7286" instrument_node=""> and </span><a data-dcnode-id="7284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhu_Rongji" title="Zhu Rongji"><span data-dcnode-id="7285" instrument_node="">Zhu Rongji</span></a><span data-dcnode-id="7283" instrument_node="">, who were ardent reformers who also abided by Chen Yun advice to keep the reforms steady and keep the state still in charge of key areas. In 1997 and 1998, large-scale </span><a data-dcnode-id="7281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privatization" title="Privatization"><span data-dcnode-id="7282" instrument_node="">privatization</span></a><span data-dcnode-id="7280" instrument_node=""> occurred, in which all state enterprises, except a few large monopolies, were liquidated and their assets sold to private investors. Between 2001 and 2004, the number of state-owned enterprises decreased by 48 percent.</span><sup class="reference" data-dcnode-id="7277" id="cite_ref-Rawski_573_64-1"><a data-dcnode-id="7278" href="#cite_note-Rawski_573-64"><span data-dcnode-id="7279" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7276" instrument_node=""> During the same period, Jiang and Zhu also reduced </span><a class="mw-redirect" data-dcnode-id="7274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tariffs" title="Tariffs"><span data-dcnode-id="7275" instrument_node="">tariffs</span></a><span data-dcnode-id="7273" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_barriers" title="Trade barriers"><span data-dcnode-id="7272" instrument_node="">trade barriers</span></a><span data-dcnode-id="7270" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="7268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regulations" title="Regulations"><span data-dcnode-id="7269" instrument_node="">regulations</span></a><span data-dcnode-id="7267" instrument_node="">; reformed the banking system; dismantled much of the Mao-era social welfare system; forced the Chinese army (PLA) to divest itself of military-run businesses;</span><sup class="reference" data-dcnode-id="7264" id="cite_ref-69"><a data-dcnode-id="7265" href="#cite_note-69"><span data-dcnode-id="7266" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7263" instrument_node=""> reduced inflation; and joined the </span><a data-dcnode-id="7261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="7262" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="7260" instrument_node="">. These moves invoked discontent among some groups, especially laid-off workers of state enterprises that had been privatized.</span><sup class="reference" data-dcnode-id="7257" id="cite_ref-70"><a data-dcnode-id="7258" href="#cite_note-70"><span data-dcnode-id="7259" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7256" instrument_node="">
</span></p><p data-dcnode-id="7242"><span data-dcnode-id="7254" instrument_node="">The domestic private sector first exceeded 50% of GDP in 2005 and has further expanded since.  Also in 2005, China was able to surpass </span><a data-dcnode-id="7252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_Japan" title="Economy of Japan"><span data-dcnode-id="7253" instrument_node="">Japan</span></a><span data-dcnode-id="7251" instrument_node=""> as the largest economy in Asia.</span><sup class="reference" data-dcnode-id="7248" id="cite_ref-8km_71-0"><a data-dcnode-id="7249" href="#cite_note-8km-71"><span data-dcnode-id="7250" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7247" instrument_node=""> However, some state monopolies still remained, such as in petroleum and banking.</span><sup class="reference" data-dcnode-id="7244" id="cite_ref-72"><a data-dcnode-id="7245" href="#cite_note-72"><span data-dcnode-id="7246" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7243" instrument_node="">
</span></p><span data-dcnode-id="7241" instrument_node="">
</span><h3 data-dcnode-id="7230"><span data-dcnode-id="7240" id="2005.E2.80.932012"></span><span class="mw-headline" data-dcnode-id="7238" id="2005–2012"><span data-dcnode-id="7239" instrument_node="">2005–2012</span></span><span class="mw-editsection" data-dcnode-id="7231"><span class="mw-editsection-bracket" data-dcnode-id="7236"><span data-dcnode-id="7237" instrument_node="">[</span></span><a data-dcnode-id="7234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D6" title="Edit section: 2005–2012"><span data-dcnode-id="7235" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7229" instrument_node="">
</span><p data-dcnode-id="7198"><a data-dcnode-id="7227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Jintao" title="Hu Jintao"><span data-dcnode-id="7228" instrument_node="">Hu Jintao</span></a><span data-dcnode-id="7226" instrument_node=""> and his conservative </span><a class="mw-redirect" data-dcnode-id="7224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu-Wen_Administration" title="Hu-Wen Administration"><span data-dcnode-id="7225" instrument_node="">administration</span></a><span data-dcnode-id="7223" instrument_node=""> began to reverse some of Deng Xiaoping's reforms in 2005. Observers note that the government adopted more egalitarian and populist policies.</span><sup class="reference" data-dcnode-id="7220" id="cite_ref-73"><a data-dcnode-id="7221" href="#cite_note-73"><span data-dcnode-id="7222" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7219" instrument_node=""> It increased subsidies and control over the health care sector,</span><sup class="reference" data-dcnode-id="7216" id="cite_ref-74"><a data-dcnode-id="7217" href="#cite_note-74"><span data-dcnode-id="7218" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7215" instrument_node=""> halted privatization,</span><sup class="reference" data-dcnode-id="7212" id="cite_ref-scissors_16-1"><a data-dcnode-id="7213" href="#cite_note-scissors-16"><span data-dcnode-id="7214" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7211" instrument_node=""> and adopted a loose monetary policy, which led to the formation of a U.S.-style property bubble in which property prices tripled.</span><sup class="reference" data-dcnode-id="7208" id="cite_ref-75"><a data-dcnode-id="7209" href="#cite_note-75"><span data-dcnode-id="7210" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7207" instrument_node=""> The privileged state sector was the primary recipient of government investment, which, under the new administration, promoted the rise of large "national champions" which could compete with large foreign corporations.</span><sup class="reference" data-dcnode-id="7204" id="cite_ref-scissors_16-2"><a data-dcnode-id="7205" href="#cite_note-scissors-16"><span data-dcnode-id="7206" instrument_node="">[16]</span></a></sup><span data-dcnode-id="7203" instrument_node=""> China would finally surpass Japan's economy in 2010.</span><sup class="reference" data-dcnode-id="7200" id="cite_ref-76"><a data-dcnode-id="7201" href="#cite_note-76"><span data-dcnode-id="7202" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7199" instrument_node="">
</span></p><span data-dcnode-id="7197" instrument_node="">
</span><h3 data-dcnode-id="7186"><span data-dcnode-id="7196" id="2012.E2.80.932020"></span><span class="mw-headline" data-dcnode-id="7194" id="2012–2020"><span data-dcnode-id="7195" instrument_node="">2012–2020</span></span><span class="mw-editsection" data-dcnode-id="7187"><span class="mw-editsection-bracket" data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node="">[</span></span><a data-dcnode-id="7190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D7" title="Edit section: 2012–2020"><span data-dcnode-id="7191" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7188"><span data-dcnode-id="7189" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7185" instrument_node="">
</span><p data-dcnode-id="7159"><span data-dcnode-id="7184" instrument_node="">Under Party general secretary </span><a data-dcnode-id="7182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi_Jinping" title="Xi Jinping"><span data-dcnode-id="7183" instrument_node="">Xi Jinping</span></a><span data-dcnode-id="7181" instrument_node=""> and his </span><a data-dcnode-id="7179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi%25E2%2580%2593Li_Administration" title="Xi–Li Administration"><span data-dcnode-id="7180" instrument_node="">administration</span></a><span data-dcnode-id="7178" instrument_node="">, the CCP has sought numerous reforms. Some of these had increased control over state-owned and private enterprises, at least 288 firms have revised their corporate charters to allow the Communist Party greater influence in corporate management, and to reflect the party line.</span><sup class="reference" data-dcnode-id="7175" id="cite_ref-:0_27-1"><a data-dcnode-id="7176" href="#cite_note-:0-27"><span data-dcnode-id="7177" instrument_node="">[27]</span></a></sup><span data-dcnode-id="7174" instrument_node=""> This trend also includes </span><a data-dcnode-id="7172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hong_Kong" title="Hong Kong"><span data-dcnode-id="7173" instrument_node="">Hong Kong</span></a><span data-dcnode-id="7171" instrument_node=""> listed firms, who have traditionally downplayed their party links, but are now "redrafting bylaws to formally establish party committees that previously existed only at the group level."</span><sup class="reference" data-dcnode-id="7168" id="cite_ref-JOE_77-0"><a data-dcnode-id="7169" href="#cite_note-JOE-77"><span data-dcnode-id="7170" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7167" instrument_node=""> In other dimensions, according to </span><a data-dcnode-id="7165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ray_Dalio" title="Ray Dalio"><span data-dcnode-id="7166" instrument_node="">Ray Dalio</span></a><span data-dcnode-id="7164" instrument_node="">, the Xi era has also been marked by economic opening, greater market-oriented decision-making and discontinuation of support for poorly-managed state-owned enterprises.</span><sup class="reference" data-dcnode-id="7161" id="cite_ref-:7_78-0"><a data-dcnode-id="7162" href="#cite_note-:7-78"><span data-dcnode-id="7163" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7160" instrument_node="">
</span></p><span data-dcnode-id="7158" instrument_node="">
</span><h3 data-dcnode-id="7147"><span data-dcnode-id="7157" id="2020.E2.80.93present"></span><span class="mw-headline" data-dcnode-id="7155" id="2020–present"><span data-dcnode-id="7156" instrument_node="">2020–present</span></span><span class="mw-editsection" data-dcnode-id="7148"><span class="mw-editsection-bracket" data-dcnode-id="7153"><span data-dcnode-id="7154" instrument_node="">[</span></span><a data-dcnode-id="7151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D8" title="Edit section: 2020–present"><span data-dcnode-id="7152" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7146" instrument_node="">
</span><link data-dcnode-id="7145" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7141" role="note"><span data-dcnode-id="7144" instrument_node="">Main article: </span><a data-dcnode-id="7142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2020%25E2%2580%25932021_Xi_Jinping_Administration_reform_spree" title="2020–2021 Xi Jinping Administration reform spree"><span data-dcnode-id="7143" instrument_node="">2020–2021 Xi Jinping Administration reform spree</span></a></div><span data-dcnode-id="7140" instrument_node="">
</span><p data-dcnode-id="7119"><span data-dcnode-id="7139" instrument_node="">On 21 July 2020, general secretary of the Chinese Communist Party, Xi Jinping made a speech to a group of public and private business leaders at the entrepreneur forum in Beijing. Xi emphasized that "We must gradually form a new development pattern with the domestic internal circulation as the main body and the domestic and international dual circulations mutually promoting each other."</span><sup class="reference" data-dcnode-id="7136" id="cite_ref-79"><a data-dcnode-id="7137" href="#cite_note-79"><span data-dcnode-id="7138" instrument_node="">[79]</span></a></sup><sup class="noprint Inline-Template noprint noexcerpt Template-Fact" data-dcnode-id="7129" style="white-space:nowrap;"><span data-dcnode-id="7135" instrument_node="">[</span><i data-dcnode-id="7131"><a class="mw-redirect" data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANOTRS" title="Wikipedia:NOTRS"><span data-dcnode-id="7133" title="This claim needs references to better sources. (October 2020)"><span data-dcnode-id="7134" instrument_node="">better&nbsp;source&nbsp;needed</span></span></a></i><span data-dcnode-id="7130" instrument_node="">]</span></sup><span data-dcnode-id="7128" instrument_node="">
Since then "internal circulation" became a hot word in China. Some Chinese worry that the emphasis of "internal circulation" signals returning to 1960s-era seclusion, and ending of Chinese economic reform.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7121" style="white-space:nowrap;"><span data-dcnode-id="7127" instrument_node="">[</span><i data-dcnode-id="7123"><a data-dcnode-id="7124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7125" title="This claim needs references to reliable sources. (October 2020)"><span data-dcnode-id="7126" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7122" instrument_node="">]</span></sup><span data-dcnode-id="7120" instrument_node="">
</span></p><p data-dcnode-id="7113"><span data-dcnode-id="7118" instrument_node="">In September 2020, the CCP announced that it would strengthen United Front work in the private sector by establishing more party committees in the regional federations of industry and commerce (FIC), and by arranging a special liaison between FIC and the CCP.</span><sup class="reference" data-dcnode-id="7115" id="cite_ref-80"><a data-dcnode-id="7116" href="#cite_note-80"><span data-dcnode-id="7117" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7114" instrument_node="">
</span></p><p data-dcnode-id="7100"><span data-dcnode-id="7112" instrument_node="">The Xi Jinping era had considerably different economic objectives, in line with two campaigns, </span><i data-dcnode-id="7109"><a data-dcnode-id="7110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Made_in_China_2025" title="Made in China 2025"><span data-dcnode-id="7111" instrument_node="">Made in China 2025</span></a></i><span data-dcnode-id="7108" instrument_node=""> and </span><i data-dcnode-id="7106"><span data-dcnode-id="7107" instrument_node="">China Standards 2035</span></i><span data-dcnode-id="7105" instrument_node=""> which sought to scale up and displace US dominance in various high-tech sectors.</span><sup class="reference" data-dcnode-id="7102" id="cite_ref-:7_78-1"><a data-dcnode-id="7103" href="#cite_note-:7-78"><span data-dcnode-id="7104" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7101" instrument_node=""> This is alongside more aggressive pursuit of trade policies, in line with an outlook that sees China move towards taking a more active role in writing the rules of trade.
</span></p><span data-dcnode-id="7099" instrument_node="">
</span><h2 data-dcnode-id="7089"><span class="mw-headline" data-dcnode-id="7097" id="Effects_of_the_reforms"><span data-dcnode-id="7098" instrument_node="">Effects of the reforms</span></span><span class="mw-editsection" data-dcnode-id="7090"><span class="mw-editsection-bracket" data-dcnode-id="7095"><span data-dcnode-id="7096" instrument_node="">[</span></span><a data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D9" title="Edit section: Effects of the reforms"><span data-dcnode-id="7094" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7088" instrument_node="">
</span><h3 data-dcnode-id="7078"><span class="mw-headline" data-dcnode-id="7086" id="Economic_performance"><span data-dcnode-id="7087" instrument_node="">Economic performance</span></span><span class="mw-editsection" data-dcnode-id="7079"><span class="mw-editsection-bracket" data-dcnode-id="7084"><span data-dcnode-id="7085" instrument_node="">[</span></span><a data-dcnode-id="7082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D10" title="Edit section: Economic performance"><span data-dcnode-id="7083" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7077" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="7065"><div class="thumbinner" data-dcnode-id="7066" style="width:252px;"><a class="image" data-dcnode-id="7075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrc1952-2005gdp.gif"><img alt="" class="thumbimage" data-dcnode-id="7076" data-file-height="675" data-file-width="1161" decoding="async" height="145" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Prc1952-2005gdp.gif/250px-Prc1952-2005gdp.gif&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Prc1952-2005gdp.gif/375px-Prc1952-2005gdp.gif 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Prc1952-2005gdp.gif/500px-Prc1952-2005gdp.gif 2x" width="250"></a><span data-dcnode-id="7074" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7067"><div class="magnify" data-dcnode-id="7072"><a class="internal" data-dcnode-id="7073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APrc1952-2005gdp.gif" title="Enlarge"></a></div><span data-dcnode-id="7071" instrument_node="">China's nominal </span><a class="mw-redirect" data-dcnode-id="7069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gross_Domestic_Product" title="Gross Domestic Product"><span data-dcnode-id="7070" instrument_node="">GDP</span></a><span data-dcnode-id="7068" instrument_node=""> trend from 1952 to 2015. Note the rapid increase since reform in the late 1970s.</span></div></div></div><span data-dcnode-id="7064" instrument_node="">
</span><p data-dcnode-id="7058"><span data-dcnode-id="7063" instrument_node="">After three decades of reform, China's economy experienced one of the world's biggest booms. Agriculture and light industry have largely been privatized, while the state still retains control over some heavy industries. Despite the dominance of state ownership in finance, telecommunications, petroleum and other important sectors of the economy, private entrepreneurs continue to expand into sectors formerly reserved for public enterprise. Prices have also been liberalized.</span><sup class="reference" data-dcnode-id="7060" id="cite_ref-81"><a data-dcnode-id="7061" href="#cite_note-81"><span data-dcnode-id="7062" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7059" instrument_node="">
</span></p><p data-dcnode-id="7030"><span data-dcnode-id="7057" instrument_node="">China's economic growth since the reform has been very rapid, exceeding the </span><a data-dcnode-id="7055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Asian_Tigers" title="Four Asian Tigers"><span data-dcnode-id="7056" instrument_node="">East Asian Tigers</span></a><span data-dcnode-id="7054" instrument_node="">. Since the beginning of Deng Xiaoping's reforms, China's GDP has risen tenfold.</span><sup class="reference" data-dcnode-id="7051" id="cite_ref-People's_Daily_Online_2005_82-0"><a data-dcnode-id="7052" href="#cite_note-People's_Daily_Online_2005-82"><span data-dcnode-id="7053" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7050" instrument_node=""> The increase in </span><a data-dcnode-id="7048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Total_factor_productivity" title="Total factor productivity"><span data-dcnode-id="7049" instrument_node="">total factor productivity</span></a><span data-dcnode-id="7047" instrument_node=""> (TFP) was the most important factor, with productivity accounting for 40.1% of the GDP increase, compared with a decline of 13.2% for the period 1957 to 1978—the height of Maoist policies. For the period 1978–2005, Chinese GDP per capita increased from 2.7% to 15.7% of U.S. GDP per capita, and from 53.7% to 188.5% of Indian GDP per capita. Per capita incomes grew at 6.6% a year.</span><sup class="reference" data-dcnode-id="7044" id="cite_ref-83"><a data-dcnode-id="7045" href="#cite_note-83"><span data-dcnode-id="7046" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7043" instrument_node=""> Average wages rose sixfold between 1978 and 2005,</span><sup class="reference" data-dcnode-id="7040" id="cite_ref-84"><a data-dcnode-id="7041" href="#cite_note-84"><span data-dcnode-id="7042" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7039" instrument_node=""> while absolute poverty declined from 41% of the population to  5% from 1978 to 2001.</span><sup class="reference" data-dcnode-id="7036" id="cite_ref-85"><a data-dcnode-id="7037" href="#cite_note-85"><span data-dcnode-id="7038" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7035" instrument_node=""> Some scholars believed that China's economic growth has been understated, due to large sectors of the economy not being counted.</span><sup class="reference" data-dcnode-id="7032" id="cite_ref-86"><a data-dcnode-id="7033" href="#cite_note-86"><span data-dcnode-id="7034" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7031" instrument_node="">
</span></p><span data-dcnode-id="7029" instrument_node="">
</span><h3 data-dcnode-id="7019"><span class="mw-headline" data-dcnode-id="7027" id="Impact_on_world_growth"><span data-dcnode-id="7028" instrument_node="">Impact on world growth</span></span><span class="mw-editsection" data-dcnode-id="7020"><span class="mw-editsection-bracket" data-dcnode-id="7025"><span data-dcnode-id="7026" instrument_node="">[</span></span><a data-dcnode-id="7023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D11" title="Edit section: Impact on world growth"><span data-dcnode-id="7024" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7021"><span data-dcnode-id="7022" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7018" instrument_node="">
</span><p data-dcnode-id="7004"><span data-dcnode-id="7017" instrument_node="">China is widely seen as an engine of world and regional growth.</span><sup class="reference" data-dcnode-id="7014" id="cite_ref-Branstetter_668_87-0"><a data-dcnode-id="7015" href="#cite_note-Branstetter_668-87"><span data-dcnode-id="7016" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7013" instrument_node=""> Surges in Chinese demand account for 50, 44 and 66 percent of export growth of the Hong Kong SAR of China, Japan and Taiwan respectively, and China's trade deficit with the rest of East Asia helped to revive the economies of Japan and Southeast Asia.</span><sup class="reference" data-dcnode-id="7010" id="cite_ref-Branstetter_668_87-1"><a data-dcnode-id="7011" href="#cite_note-Branstetter_668-87"><span data-dcnode-id="7012" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7009" instrument_node=""> Asian leaders view China's economic growth as an "engine of growth for all Asia".</span><sup class="reference" data-dcnode-id="7006" id="cite_ref-Branstetter_669_88-0"><a data-dcnode-id="7007" href="#cite_note-Branstetter_669-88"><span data-dcnode-id="7008" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7005" instrument_node="">
</span></p><span data-dcnode-id="7003" instrument_node="">
</span><h3 data-dcnode-id="6993"><span class="mw-headline" data-dcnode-id="7001" id="Effect_on_inequality"><span data-dcnode-id="7002" instrument_node="">Effect on inequality</span></span><span class="mw-editsection" data-dcnode-id="6994"><span class="mw-editsection-bracket" data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">[</span></span><a data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D12" title="Edit section: Effect on inequality"><span data-dcnode-id="6998" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6992" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6983"><div class="thumbinner" data-dcnode-id="6984" style="width:352px;"><a class="image" data-dcnode-id="6990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGini_Coefficient_World_CIA_Report_2009.png"><img alt="" class="thumbimage" data-dcnode-id="6991" data-file-height="625" data-file-width="1425" decoding="async" height="154" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Gini_Coefficient_World_CIA_Report_2009.png/350px-Gini_Coefficient_World_CIA_Report_2009.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/34/Gini_Coefficient_World_CIA_Report_2009.png/525px-Gini_Coefficient_World_CIA_Report_2009.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/34/Gini_Coefficient_World_CIA_Report_2009.png/700px-Gini_Coefficient_World_CIA_Report_2009.png 2x" width="350"></a><span data-dcnode-id="6989" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6985"><div class="magnify" data-dcnode-id="6987"><a class="internal" data-dcnode-id="6988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGini_Coefficient_World_CIA_Report_2009.png" title="Enlarge"></a></div><span data-dcnode-id="6986" instrument_node="">Gini-coefficient of national income distribution around the world (dark green: &lt;0.25, red: &gt;0.60)</span></div></div></div><span data-dcnode-id="6982" instrument_node="">
</span><p data-dcnode-id="6973"><span data-dcnode-id="6981" instrument_node="">The economic reforms have increased inequality dramatically within China. Despite rapid economic growth which has virtually eliminated poverty in urban China and reduced it greatly in rural regions and the fact that living standards for everyone in China have drastically increased in comparison to the pre-reform era, the </span><a data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gini_coefficient" title="Gini coefficient"><span data-dcnode-id="6980" instrument_node="">Gini coefficient</span></a><span data-dcnode-id="6978" instrument_node=""> of China is estimated to be above 0.45, comparable to some Latin American countries and the United States.</span><sup class="reference" data-dcnode-id="6975" id="cite_ref-89"><a data-dcnode-id="6976" href="#cite_note-89"><span data-dcnode-id="6977" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6974" instrument_node="">
</span></p><p data-dcnode-id="6953"><span data-dcnode-id="6972" instrument_node="">Increased inequality is attributed to the disappearance of the </span><a data-dcnode-id="6970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare_state" title="Welfare state"><span data-dcnode-id="6971" instrument_node="">welfare state</span></a><span data-dcnode-id="6969" instrument_node=""> and differences between coastal and interior provinces, the latter being burdened by a larger state sector.</span><sup class="reference" data-dcnode-id="6966" id="cite_ref-90"><a data-dcnode-id="6967" href="#cite_note-90"><span data-dcnode-id="6968" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6965" instrument_node=""> Some Western scholars have suggested that reviving the welfare state and instituting a re-distributive </span><a data-dcnode-id="6963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_tax" title="Income tax"><span data-dcnode-id="6964" instrument_node="">income tax</span></a><span data-dcnode-id="6962" instrument_node=""> system is needed to relieve inequality,</span><sup class="reference" data-dcnode-id="6959" id="cite_ref-91"><a data-dcnode-id="6960" href="#cite_note-91"><span data-dcnode-id="6961" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6958" instrument_node=""> while some Chinese economists have suggested that privatizing state monopolies and distributing the proceeds to the population can reduce inequality.</span><sup class="reference" data-dcnode-id="6955" id="cite_ref-Weiyin_Zhang_92-0"><a data-dcnode-id="6956" href="#cite_note-Weiyin_Zhang-92"><span data-dcnode-id="6957" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6954" instrument_node="">
</span></p><span data-dcnode-id="6952" instrument_node="">
</span><h2 data-dcnode-id="6942"><span class="mw-headline" data-dcnode-id="6950" id="Reforms_in_specific_sectors"><span data-dcnode-id="6951" instrument_node="">Reforms in specific sectors</span></span><span class="mw-editsection" data-dcnode-id="6943"><span class="mw-editsection-bracket" data-dcnode-id="6948"><span data-dcnode-id="6949" instrument_node="">[</span></span><a data-dcnode-id="6946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D13" title="Edit section: Reforms in specific sectors"><span data-dcnode-id="6947" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6941" instrument_node="">
</span><h3 data-dcnode-id="6931"><span class="mw-headline" data-dcnode-id="6939" id="Agriculture"><span data-dcnode-id="6940" instrument_node="">Agriculture</span></span><span class="mw-editsection" data-dcnode-id="6932"><span class="mw-editsection-bracket" data-dcnode-id="6937"><span data-dcnode-id="6938" instrument_node="">[</span></span><a data-dcnode-id="6935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D14" title="Edit section: Agriculture"><span data-dcnode-id="6936" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6933"><span data-dcnode-id="6934" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6930" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6915"><div class="thumbinner" data-dcnode-id="6916" style="width:302px;"><a class="image" data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChina-wheat-prod.png"><img alt="" class="thumbimage" data-dcnode-id="6929" data-file-height="426" data-file-width="711" decoding="async" height="180" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/China-wheat-prod.png/300px-China-wheat-prod.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e2/China-wheat-prod.png/450px-China-wheat-prod.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e2/China-wheat-prod.png/600px-China-wheat-prod.png 2x" width="300"></a><span data-dcnode-id="6927" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6917"><div class="magnify" data-dcnode-id="6925"><a class="internal" data-dcnode-id="6926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChina-wheat-prod.png" title="Enlarge"></a></div><span data-dcnode-id="6924" instrument_node="">Production of </span><a data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wheat" title="Wheat"><span data-dcnode-id="6923" instrument_node="">wheat</span></a><span data-dcnode-id="6921" instrument_node=""> from 1961 to 2004. Data from </span><a class="mw-redirect" data-dcnode-id="6919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/FAO" title="FAO"><span data-dcnode-id="6920" instrument_node="">FAO</span></a><span data-dcnode-id="6918" instrument_node="">, year 2005. Y-axis: Production in metric ton.</span></div></div></div><span data-dcnode-id="6914" instrument_node="">
</span><p data-dcnode-id="6894"><span data-dcnode-id="6913" instrument_node="">During the pre-reform period, Chinese agricultural performance was extremely poor and food shortages were common.</span><sup class="reference" data-dcnode-id="6910" id="cite_ref-Huang_478_93-0"><a data-dcnode-id="6911" href="#cite_note-Huang_478-93"><span data-dcnode-id="6912" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6909" instrument_node=""> After Deng Xiaoping implemented the </span><a data-dcnode-id="6907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Household_responsibility_system" title="Household responsibility system"><span data-dcnode-id="6908" instrument_node="">household responsibility system</span></a><span data-dcnode-id="6906" instrument_node="">, agricultural output increased by 8.2% a year, compared with 2.7% in the pre-reform period, despite a decrease in the area of land used.</span><sup class="reference" data-dcnode-id="6903" id="cite_ref-Huang_478_93-1"><a data-dcnode-id="6904" href="#cite_note-Huang_478-93"><span data-dcnode-id="6905" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6902" instrument_node=""> </span><a data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_prices" title="Food prices"><span data-dcnode-id="6901" instrument_node="">Food prices</span></a><span data-dcnode-id="6899" instrument_node=""> fell nearly 50%, while agricultural incomes rose.</span><sup class="reference" data-dcnode-id="6896" id="cite_ref-Huang_480_94-0"><a data-dcnode-id="6897" href="#cite_note-Huang_480-94"><span data-dcnode-id="6898" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6895" instrument_node="">
</span></p><p data-dcnode-id="6877"><span data-dcnode-id="6893" instrument_node="">A more fundamental transformation was the economy's growing adoption of </span><a data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cash_crop" title="Cash crop"><span data-dcnode-id="6892" instrument_node="">cash crops</span></a><span data-dcnode-id="6890" instrument_node=""> instead of just growing rice and grain.</span><sup class="reference" data-dcnode-id="6887" id="cite_ref-Huang_480_94-1"><a data-dcnode-id="6888" href="#cite_note-Huang_480-94"><span data-dcnode-id="6889" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6886" instrument_node=""> Vegetable and meat production increased to the point that Chinese agricultural production was adding the equivalent of California's vegetable industry every two years. Growth in the sector slowed after 1984, with agriculture falling from 40% of GDP to 16%; however, increases in agricultural productivity allowed workers to be released for work in industry and services, while simultaneously increasing agricultural production.</span><sup class="reference" data-dcnode-id="6883" id="cite_ref-95"><a data-dcnode-id="6884" href="#cite_note-95"><span data-dcnode-id="6885" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6882" instrument_node=""> Trade in agriculture was also liberalized and China became an exporter of food, a great contrast to its previous famines and shortages.</span><sup class="reference" data-dcnode-id="6879" id="cite_ref-96"><a data-dcnode-id="6880" href="#cite_note-96"><span data-dcnode-id="6881" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6878" instrument_node="">
</span></p><span data-dcnode-id="6876" instrument_node="">
</span><h3 data-dcnode-id="6866"><span class="mw-headline" data-dcnode-id="6874" id="Industry"><span data-dcnode-id="6875" instrument_node="">Industry</span></span><span class="mw-editsection" data-dcnode-id="6867"><span class="mw-editsection-bracket" data-dcnode-id="6872"><span data-dcnode-id="6873" instrument_node="">[</span></span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D15" title="Edit section: Industry"><span data-dcnode-id="6871" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6868"><span data-dcnode-id="6869" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6865" instrument_node="">
</span><p data-dcnode-id="6848"><span data-dcnode-id="6864" instrument_node="">In the pre-reform period, industry was largely stagnant and the socialist system presented few incentives for improvements in quality and productivity. With the introduction of the dual-price system and greater autonomy for enterprise managers, productivity increased greatly in the early 1980s.</span><sup class="reference" data-dcnode-id="6861" id="cite_ref-97"><a data-dcnode-id="6862" href="#cite_note-97"><span data-dcnode-id="6863" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6860" instrument_node=""> Foreign enterprises and newly formed </span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Township_and_Village_Enterprises" title="Township and Village Enterprises"><span data-dcnode-id="6859" instrument_node="">Township and Village Enterprises</span></a><span data-dcnode-id="6857" instrument_node="">, owned by local government and often de facto private firms, competed successfully with state-owned enterprises. By the 1990s, large-scale privatizations reduced the market share of both the Township and Village Enterprises and state-owned enterprises and increased the private sector's market share. The state sector's share of industrial output dropped from 81% in 1980 to 15% in 2005.</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-Perkins_862_98-0"><a data-dcnode-id="6855" href="#cite_note-Perkins_862-98"><span data-dcnode-id="6856" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> Foreign capital controls much of Chinese industry and plays an important role.</span><sup class="reference" data-dcnode-id="6850" id="cite_ref-Rawski_573_64-2"><a data-dcnode-id="6851" href="#cite_note-Rawski_573-64"><span data-dcnode-id="6852" instrument_node="">[64]</span></a></sup><span data-dcnode-id="6849" instrument_node="">
</span></p><p data-dcnode-id="6824"><span data-dcnode-id="6847" instrument_node="">From virtually an industrial backwater in 1978, China is now the world's biggest producer of concrete, steel, ships and textiles, and has the world's largest </span><a class="mw-redirect" data-dcnode-id="6845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automobile_industry_in_China" title="Automobile industry in China"><span data-dcnode-id="6846" instrument_node="">automobile market</span></a><span data-dcnode-id="6844" instrument_node="">. Chinese steel output quadrupled between 1980 and 2000, and from 2000 to 2006 rose from 128.5&nbsp;million tons to 418.8&nbsp;million tons, one-third of global production.</span><sup class="reference" data-dcnode-id="6841" id="cite_ref-Rawski,_G._Thomas_2008_99-0"><a data-dcnode-id="6842" href="#cite_note-Rawski,_G._Thomas_2008-99"><span data-dcnode-id="6843" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6840" instrument_node=""> Labor productivity at some Chinese steel firms exceeds Western productivity.</span><sup class="reference" data-dcnode-id="6837" id="cite_ref-Rawski,_G._Thomas_2008_99-1"><a data-dcnode-id="6838" href="#cite_note-Rawski,_G._Thomas_2008-99"><span data-dcnode-id="6839" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6836" instrument_node=""> From 1975 to 1992, China's automobile production rose from 139,800 to 1.1&nbsp;million, rising to 9.35&nbsp;million in 2008.</span><sup class="reference" data-dcnode-id="6833" id="cite_ref-100"><a data-dcnode-id="6834" href="#cite_note-100"><span data-dcnode-id="6835" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6832" instrument_node=""> Light industries such as textiles saw an even greater increase, due to reduced government interference. </span><a data-dcnode-id="6830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Textile_industry_in_China" title="Textile industry in China"><span data-dcnode-id="6831" instrument_node="">Chinese textile</span></a><span data-dcnode-id="6829" instrument_node=""> exports increased from 4.6% of world exports in 1980 to 24.1% in 2005. Textile output increased 18-fold over the same period.</span><sup class="reference" data-dcnode-id="6826" id="cite_ref-101"><a data-dcnode-id="6827" href="#cite_note-101"><span data-dcnode-id="6828" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6825" instrument_node="">
</span></p><p data-dcnode-id="6802"><span data-dcnode-id="6823" instrument_node="">This increase in production is largely the result of the removal of barriers to entry and increased competition; the number of industrial firms rose from 377,300 in 1980 to nearly 8 million in 1990 and 1996; the 2004 economic census, which excluded enterprises with annual sales below RMB 5&nbsp;million, counted 1.33&nbsp;million manufacturing firms, with </span><a data-dcnode-id="6821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiangsu" title="Jiangsu"><span data-dcnode-id="6822" instrument_node="">Jiangsu</span></a><span data-dcnode-id="6820" instrument_node=""> and </span><a data-dcnode-id="6818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhejiang" title="Zhejiang"><span data-dcnode-id="6819" instrument_node="">Zhejiang</span></a><span data-dcnode-id="6817" instrument_node=""> reporting more firms than the nationwide total for 1980.</span><sup class="reference" data-dcnode-id="6814" id="cite_ref-Loren_13_102-0"><a data-dcnode-id="6815" href="#cite_note-Loren_13-102"><span data-dcnode-id="6816" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6813" instrument_node=""> Compared to other East Asian industrial growth spurts, China's industrial performance exceeded Japan's but remained behind </span><a data-dcnode-id="6811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="6812" instrument_node="">South Korea</span></a><span data-dcnode-id="6810" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China" title="Republic of China"><span data-dcnode-id="6809" instrument_node="">Taiwan</span></a><span data-dcnode-id="6807" instrument_node="">'s economies.</span><sup class="reference" data-dcnode-id="6804" id="cite_ref-103"><a data-dcnode-id="6805" href="#cite_note-103"><span data-dcnode-id="6806" instrument_node="">[103]</span></a></sup><span data-dcnode-id="6803" instrument_node="">
</span></p><span data-dcnode-id="6801" instrument_node="">
</span><h3 data-dcnode-id="6791"><span class="mw-headline" data-dcnode-id="6799" id="Trade_and_foreign_investment"><span data-dcnode-id="6800" instrument_node="">Trade and foreign investment</span></span><span class="mw-editsection" data-dcnode-id="6792"><span class="mw-editsection-bracket" data-dcnode-id="6797"><span data-dcnode-id="6798" instrument_node="">[</span></span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D16" title="Edit section: Trade and foreign investment"><span data-dcnode-id="6796" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6793"><span data-dcnode-id="6794" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6790" instrument_node="">
</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="6766" role="presentation"><tbody data-dcnode-id="6767"><tr data-dcnode-id="6768"><td class="mbox-image" data-dcnode-id="6787"><div data-dcnode-id="6788" style="width:52px"><img alt="Ambox current red Asia Australia.svg" data-dcnode-id="6789" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/42px-Ambox_current_red_Asia_Australia.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/63px-Ambox_current_red_Asia_Australia.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Ambox_current_red_Asia_Australia.svg/84px-Ambox_current_red_Asia_Australia.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="6769"><div class="mbox-text-span" data-dcnode-id="6770"><span data-dcnode-id="6786" instrument_node="">This section needs to be </span><b data-dcnode-id="6784"><span data-dcnode-id="6785" instrument_node="">updated</span></b><span data-dcnode-id="6783" instrument_node="">. The reason given is: </span><a data-dcnode-id="6781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_trade_war" title="China–United States trade war"><span data-dcnode-id="6782" instrument_node="">China–United States trade war</span></a><span data-dcnode-id="6780" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="6778"><span data-dcnode-id="6779" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="6777" instrument_node=""> </span><span class="date-container" data-dcnode-id="6771"><i data-dcnode-id="6772"><span data-dcnode-id="6776" instrument_node="">(</span><span class="date" data-dcnode-id="6774"><span data-dcnode-id="6775" instrument_node="">October 2020</span></span><span data-dcnode-id="6773" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="6765" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6756"><div class="thumbinner" data-dcnode-id="6757" style="width:302px;"><a class="image" data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2006Chinese_exports.PNG"><img alt="" class="thumbimage" data-dcnode-id="6764" data-file-height="625" data-file-width="1425" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/80/2006Chinese_exports.PNG/300px-2006Chinese_exports.PNG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/80/2006Chinese_exports.PNG/450px-2006Chinese_exports.PNG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/80/2006Chinese_exports.PNG/600px-2006Chinese_exports.PNG 2x" width="300"></a><span data-dcnode-id="6762" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6758"><div class="magnify" data-dcnode-id="6760"><a class="internal" data-dcnode-id="6761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A2006Chinese_exports.PNG" title="Enlarge"></a></div><span data-dcnode-id="6759" instrument_node="">Global distribution of Chinese exports in 2006 as a percentage of the top market</span></div></div></div><span data-dcnode-id="6755" instrument_node="">
</span><p data-dcnode-id="6717"><span data-dcnode-id="6754" instrument_node="">Some scholars assert that China has maintained a high degree of openness that is unusual among the other large and populous nations,</span><sup class="noprint Inline-Template" data-dcnode-id="6742" style="white-space:nowrap;"><span data-dcnode-id="6753" instrument_node="">[</span><i data-dcnode-id="6744"><a data-dcnode-id="6750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AAccuracy_dispute%23Disputed_statement" title="Wikipedia:Accuracy dispute"><span data-dcnode-id="6751" title="The material near this tag is possibly inaccurate or nonfactual. (December 2018)"><span data-dcnode-id="6752" instrument_node="">dubious</span></span></a><span data-dcnode-id="6749" instrument_node=""> </span><span class="metadata" data-dcnode-id="6745"><span data-dcnode-id="6748" instrument_node=""> – </span><a data-dcnode-id="6746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3AChinese_economic_reform%23Dubious" title="Talk:Chinese economic reform"><span data-dcnode-id="6747" instrument_node="">discuss</span></a></span></i><span data-dcnode-id="6743" instrument_node="">]</span></sup><span data-dcnode-id="6741" instrument_node=""> with competition from foreign goods in almost every sector of the economy. Foreign investment helped to greatly increase quality, knowledge and standards, especially in heavy industry. China's experience supports the assertion that </span><a data-dcnode-id="6739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalization" title="Globalization"><span data-dcnode-id="6740" instrument_node="">globalization</span></a><span data-dcnode-id="6738" instrument_node=""> greatly increases wealth for poor countries.</span><sup class="reference" data-dcnode-id="6735" id="cite_ref-Loren_13_102-1"><a data-dcnode-id="6736" href="#cite_note-Loren_13-102"><span data-dcnode-id="6737" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6734" instrument_node=""> Throughout the reform period, the government reduced tariffs and other trade barriers, with the overall tariff rate falling from 56% to 15%. By 2001, less than 40% of imports were subject to tariffs and only 9 percent of import were subject to licensing and import quotas. Even during the early reform era, protectionist policies were often circumvented by smuggling.</span><sup class="reference" data-dcnode-id="6731" id="cite_ref-104"><a data-dcnode-id="6732" href="#cite_note-104"><span data-dcnode-id="6733" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6730" instrument_node=""> When China joined the WTO, it agreed to considerably harsher conditions than other developing countries.</span><sup class="reference" data-dcnode-id="6727" id="cite_ref-105"><a data-dcnode-id="6728" href="#cite_note-105"><span data-dcnode-id="6729" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6726" instrument_node=""> Trade has increased from under 10% of GDP to 64% of GDP over the same period.</span><sup class="reference" data-dcnode-id="6723" id="cite_ref-106"><a data-dcnode-id="6724" href="#cite_note-106"><span data-dcnode-id="6725" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6722" instrument_node=""> China is considered the most open large country; by 2005, China's average statutory tariff on industrial products was 8.9%. The average was 30.9% for Argentina, 27.0% for Brazil, 32.4% for India, and 36.9% for Indonesia.</span><sup class="reference" data-dcnode-id="6719" id="cite_ref-107"><a data-dcnode-id="6720" href="#cite_note-107"><span data-dcnode-id="6721" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6718" instrument_node="">
</span></p><p data-dcnode-id="6701"><span data-dcnode-id="6716" instrument_node="">China's trade surplus is considered by some in the </span><a data-dcnode-id="6714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="6715" instrument_node="">United States</span></a><span data-dcnode-id="6713" instrument_node=""> as threatening American jobs. In the 2000s, the Bush administration pursued protectionist policies such as tariffs and quotas to limit the import of Chinese goods. Some scholars argue that China's growing trade surplus is the result of industries in more developed Asian countries moving to China, and not a new phenomenon.</span><sup class="reference" data-dcnode-id="6710" id="cite_ref-Branstetter_669_88-1"><a data-dcnode-id="6711" href="#cite_note-Branstetter_669-88"><span data-dcnode-id="6712" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6709" instrument_node=""> China's trade policy, which allows producers to avoid paying the </span><a class="mw-redirect" data-dcnode-id="6707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Value_Added_Tax" title="Value Added Tax"><span data-dcnode-id="6708" instrument_node="">Value Added Tax</span></a><span data-dcnode-id="6706" instrument_node=""> (VAT) for exports and undervaluation of the currency since 2002, has resulted in an overdeveloped export sector and distortion of the economy overall, a result that could hamper future growth.</span><sup class="reference" data-dcnode-id="6703" id="cite_ref-108"><a data-dcnode-id="6704" href="#cite_note-108"><span data-dcnode-id="6705" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6702" instrument_node="">
</span></p><p data-dcnode-id="6692"><span data-dcnode-id="6700" instrument_node="">Foreign investment was also liberalized upon Deng's ascension. </span><a class="mw-redirect" data-dcnode-id="6698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_Economic_Zone" title="Special Economic Zone"><span data-dcnode-id="6699" instrument_node="">Special Economic Zones</span></a><span data-dcnode-id="6697" instrument_node=""> (SEZs) were created in the early 1980s to attract foreign capital by exempting them from taxes and regulations. This experiment was successful and SEZs were expanded to cover the whole Chinese coast. Although FDI fell briefly after the 1989 student protests, it increased again to 160&nbsp;billion by 2004.</span><sup class="reference" data-dcnode-id="6694" id="cite_ref-109"><a data-dcnode-id="6695" href="#cite_note-109"><span data-dcnode-id="6696" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6693" instrument_node="">
</span></p><span data-dcnode-id="6691" instrument_node="">
</span><h3 data-dcnode-id="6681"><span class="mw-headline" data-dcnode-id="6689" id="Services"><span data-dcnode-id="6690" instrument_node="">Services</span></span><span class="mw-editsection" data-dcnode-id="6682"><span class="mw-editsection-bracket" data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">[</span></span><a data-dcnode-id="6685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D17" title="Edit section: Services"><span data-dcnode-id="6686" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6683"><span data-dcnode-id="6684" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6680" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6670"><div class="thumbinner" data-dcnode-id="6671" style="width:222px;"><a class="image" data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShanghaistockexchange.jpg"><img alt="" class="thumbimage" data-dcnode-id="6679" data-file-height="600" data-file-width="800" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Shanghaistockexchange.jpg/220px-Shanghaistockexchange.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Shanghaistockexchange.jpg/330px-Shanghaistockexchange.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Shanghaistockexchange.jpg/440px-Shanghaistockexchange.jpg 2x" width="220"></a><span data-dcnode-id="6677" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6672"><div class="magnify" data-dcnode-id="6675"><a class="internal" data-dcnode-id="6676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShanghaistockexchange.jpg" title="Enlarge"></a></div><a data-dcnode-id="6673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Stock_Exchange" title="Shanghai Stock Exchange"><span data-dcnode-id="6674" instrument_node="">Shanghai Stock Exchange</span></a></div></div></div><span data-dcnode-id="6669" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6659"><div class="thumbinner" data-dcnode-id="6660" style="width:222px;"><a class="image" data-dcnode-id="6667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShenzhen_stock_exchange_2018_%2840984942355%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6668" data-file-height="4032" data-file-width="3024" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Shenzhen_stock_exchange_2018_%252840984942355%2529.jpg/220px-Shenzhen_stock_exchange_2018_%252840984942355%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Shenzhen_stock_exchange_2018_%2840984942355%29.jpg/330px-Shenzhen_stock_exchange_2018_%2840984942355%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Shenzhen_stock_exchange_2018_%2840984942355%29.jpg/440px-Shenzhen_stock_exchange_2018_%2840984942355%29.jpg 2x" width="220"></a><span data-dcnode-id="6666" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6661"><div class="magnify" data-dcnode-id="6664"><a class="internal" data-dcnode-id="6665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShenzhen_stock_exchange_2018_%2840984942355%29.jpg" title="Enlarge"></a></div><a data-dcnode-id="6662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen_Stock_Exchange" title="Shenzhen Stock Exchange"><span data-dcnode-id="6663" instrument_node="">Shenzhen Stock Exchange</span></a></div></div></div><span data-dcnode-id="6658" instrument_node="">
</span><p data-dcnode-id="6641"><span data-dcnode-id="6657" instrument_node="">In the 1990s, the financial sector was liberalized.</span><sup class="reference" data-dcnode-id="6654" id="cite_ref-110"><a data-dcnode-id="6655" href="#cite_note-110"><span data-dcnode-id="6656" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6653" instrument_node=""> After China joined the </span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="6652" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="6650" instrument_node=""> (WTO), the service sector was considerably liberalized and foreign investment was allowed; restrictions on retail, wholesale and distribution ended.</span><sup class="reference" data-dcnode-id="6647" id="cite_ref-111"><a data-dcnode-id="6648" href="#cite_note-111"><span data-dcnode-id="6649" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6646" instrument_node=""> Banking, financial services, insurance and telecommunications were also opened up to foreign investment.</span><sup class="reference" data-dcnode-id="6643" id="cite_ref-112"><a data-dcnode-id="6644" href="#cite_note-112"><span data-dcnode-id="6645" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6642" instrument_node="">
</span></p><p data-dcnode-id="6603"><span data-dcnode-id="6640" instrument_node="">China's banking sector is dominated by four large state-owned banks, which are largely inefficient and monopolistic.</span><sup class="reference" data-dcnode-id="6637" id="cite_ref-113"><a data-dcnode-id="6638" href="#cite_note-113"><span data-dcnode-id="6639" instrument_node="">[113]</span></a></sup><span data-dcnode-id="6636" instrument_node=""> China's largest bank, </span><a data-dcnode-id="6634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_and_Commercial_Bank_of_China" title="Industrial and Commercial Bank of China"><span data-dcnode-id="6635" instrument_node="">ICBC</span></a><span data-dcnode-id="6633" instrument_node="">, is the largest bank in the world. The financial sector is widely seen as a drag on the economy due to the inefficient state management.</span><sup class="reference" data-dcnode-id="6630" id="cite_ref-114"><a data-dcnode-id="6631" href="#cite_note-114"><span data-dcnode-id="6632" instrument_node="">[114]</span></a></sup><span data-dcnode-id="6629" instrument_node=""> Non-performing loans, mostly made to local governments and unprofitable state-owned enterprises for political purposes,</span><sup class="reference" data-dcnode-id="6626" id="cite_ref-115"><a data-dcnode-id="6627" href="#cite_note-115"><span data-dcnode-id="6628" instrument_node="">[115]</span></a></sup><span data-dcnode-id="6625" instrument_node=""> especially the political goal of keeping unemployment low, are a big drain on the financial system and economy, reaching over 22% of GDP by 2000, with a drop to 6.3% by 2006 due to government recapitalization of these banks. In 2006, the total amount of </span><a data-dcnode-id="6623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-performing_loan" title="Non-performing loan"><span data-dcnode-id="6624" instrument_node="">non-performing loans</span></a><span data-dcnode-id="6622" instrument_node=""> was estimated at $160&nbsp;billion.</span><sup class="reference" data-dcnode-id="6619" id="cite_ref-Allen_528_116-0"><a data-dcnode-id="6620" href="#cite_note-Allen_528-116"><span data-dcnode-id="6621" instrument_node="">[116]</span></a></sup><span data-dcnode-id="6618" instrument_node=""> Observers recommend privatization of the banking system to solve this problem, a move that was partially carried out when the four banks were floated on the stock market.</span><sup class="reference" data-dcnode-id="6615" id="cite_ref-117"><a data-dcnode-id="6616" href="#cite_note-117"><span data-dcnode-id="6617" instrument_node="">[117]</span></a></sup><span data-dcnode-id="6614" instrument_node=""> China's financial markets, the </span><a data-dcnode-id="6612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Stock_Exchange" title="Shanghai Stock Exchange"><span data-dcnode-id="6613" instrument_node="">Shanghai Stock Exchange</span></a><span data-dcnode-id="6611" instrument_node=""> and </span><a data-dcnode-id="6609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen_Stock_Exchange" title="Shenzhen Stock Exchange"><span data-dcnode-id="6610" instrument_node="">Shenzhen Stock Exchange</span></a><span data-dcnode-id="6608" instrument_node="">, are relatively ineffective at raising capital, as they comprise only 11% of GDP.</span><sup class="reference" data-dcnode-id="6605" id="cite_ref-118"><a data-dcnode-id="6606" href="#cite_note-118"><span data-dcnode-id="6607" instrument_node="">[118]</span></a></sup><span data-dcnode-id="6604" instrument_node="">
</span></p><p data-dcnode-id="6593"><span data-dcnode-id="6602" instrument_node="">Due to the weakness of the banks, firms raise most of their capital through an informal, nonstandard financial sector developed during the 1980s and 1990s, consisting largely of underground businesses and private banks.</span><sup class="reference" data-dcnode-id="6599" id="cite_ref-Allen_556_119-0"><a data-dcnode-id="6600" href="#cite_note-Allen_556-119"><span data-dcnode-id="6601" instrument_node="">[119]</span></a></sup><span data-dcnode-id="6598" instrument_node=""> Internal finance is the most important method successful firms use to fund their activities.</span><sup class="reference" data-dcnode-id="6595" id="cite_ref-Allen_556_119-1"><a data-dcnode-id="6596" href="#cite_note-Allen_556-119"><span data-dcnode-id="6597" instrument_node="">[119]</span></a></sup><span data-dcnode-id="6594" instrument_node="">
</span></p><p data-dcnode-id="6587"><span data-dcnode-id="6592" instrument_node="">By the 1980s much emphasis was placed on the role of advertising in meeting the modernization goals being promoted by Deng. Lip service was still paid to old Maoist ideals of egalitarianism, but it did not inhibit the growth of consumerism.</span><sup class="reference" data-dcnode-id="6589" id="cite_ref-120"><a data-dcnode-id="6590" href="#cite_note-120"><span data-dcnode-id="6591" instrument_node="">[120]</span></a></sup><span data-dcnode-id="6588" instrument_node="">
</span></p><span data-dcnode-id="6586" instrument_node="">
</span><h3 data-dcnode-id="6576"><span class="mw-headline" data-dcnode-id="6584" id="Government_finances"><span data-dcnode-id="6585" instrument_node="">Government finances</span></span><span class="mw-editsection" data-dcnode-id="6577"><span class="mw-editsection-bracket" data-dcnode-id="6582"><span data-dcnode-id="6583" instrument_node="">[</span></span><a data-dcnode-id="6580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D18" title="Edit section: Government finances"><span data-dcnode-id="6581" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6578"><span data-dcnode-id="6579" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6575" instrument_node="">
</span><p data-dcnode-id="6552"><span data-dcnode-id="6574" instrument_node="">In the pre-reform era, government was funded by profits from </span><a class="mw-redirect" data-dcnode-id="6572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State-owned_enterprises" title="State-owned enterprises"><span data-dcnode-id="6573" instrument_node="">state-owned enterprises</span></a><span data-dcnode-id="6571" instrument_node="">, much like the </span><a data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6570" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6568" instrument_node="">.</span><sup class="reference" data-dcnode-id="6565" id="cite_ref-121"><a data-dcnode-id="6566" href="#cite_note-121"><span data-dcnode-id="6567" instrument_node="">[121]</span></a></sup><span data-dcnode-id="6564" instrument_node=""> As the state sector fell in importance and profitability, government revenues, especially that of the central government in Beijing, fell substantially and the government relied on a confused system of inventory taxes. Government revenues fell from 35% of GDP to 11% of GDP in the mid-1990s, excluding revenue from state-owned enterprises, with the central government's budget at just 3% of GDP.</span><sup class="reference" data-dcnode-id="6561" id="cite_ref-122"><a data-dcnode-id="6562" href="#cite_note-122"><span data-dcnode-id="6563" instrument_node="">[122]</span></a></sup><span data-dcnode-id="6560" instrument_node=""> The tax system was reformed in 1994 when inventory taxes were unified into a single VAT of 17% on all manufacturing, repair, and assembly activities and an </span><a class="mw-redirect" data-dcnode-id="6558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Excise_tax" title="Excise tax"><span data-dcnode-id="6559" instrument_node="">excise tax</span></a><span data-dcnode-id="6557" instrument_node=""> on 11 items, with the VAT becoming the main income source, accounting for half of government revenue. The 1994 reform also increased the central government's share of revenues, increasing it to 9% of GDP.</span><sup class="reference" data-dcnode-id="6554" id="cite_ref-123"><a data-dcnode-id="6555" href="#cite_note-123"><span data-dcnode-id="6556" instrument_node="">[123]</span></a></sup><span data-dcnode-id="6553" instrument_node="">
</span></p><span data-dcnode-id="6551" instrument_node="">
</span><h2 data-dcnode-id="6541"><span class="mw-headline" data-dcnode-id="6549" id="Academic_studies"><span data-dcnode-id="6550" instrument_node="">Academic studies</span></span><span class="mw-editsection" data-dcnode-id="6542"><span class="mw-editsection-bracket" data-dcnode-id="6547"><span data-dcnode-id="6548" instrument_node="">[</span></span><a data-dcnode-id="6545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D19" title="Edit section: Academic studies"><span data-dcnode-id="6546" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6540" instrument_node="">
</span><h3 data-dcnode-id="6530"><span class="mw-headline" data-dcnode-id="6538" id="Reasons_for_success"><span data-dcnode-id="6539" instrument_node="">Reasons for success</span></span><span class="mw-editsection" data-dcnode-id="6531"><span class="mw-editsection-bracket" data-dcnode-id="6536"><span data-dcnode-id="6537" instrument_node="">[</span></span><a data-dcnode-id="6534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D20" title="Edit section: Reasons for success"><span data-dcnode-id="6535" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6529" instrument_node="">
</span><link data-dcnode-id="6528" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6521" role="note"><span data-dcnode-id="6527" instrument_node="">See also: </span><a data-dcnode-id="6525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_aid_to_China" title="Foreign aid to China"><span data-dcnode-id="6526" instrument_node="">Foreign aid to China</span></a><span data-dcnode-id="6524" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_model" title="China model"><span data-dcnode-id="6523" instrument_node="">China model</span></a></div><span data-dcnode-id="6520" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6508"><div class="thumbinner" data-dcnode-id="6509" style="width:277px;"><a class="image" data-dcnode-id="6518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="6519" data-file-height="2282" data-file-width="5136" decoding="async" height="122" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%25282%2529.jpg/275px-Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%25282%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg/413px-Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/30/Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg/550px-Chinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg 2x" width="275"></a><span data-dcnode-id="6517" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6510"><div class="magnify" data-dcnode-id="6515"><a class="internal" data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChinas_Next_Global_Agenda_Panel_World_Economic_Forum_2013_%282%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="6514" instrument_node="">Discussion of "China's Next Global Agenda" during the </span><a data-dcnode-id="6512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Economic_Forum" title="World Economic Forum"><span data-dcnode-id="6513" instrument_node="">World Economic Forum</span></a><span data-dcnode-id="6511" instrument_node=""> (2013).</span></div></div></div><span data-dcnode-id="6507" instrument_node="">
</span><p data-dcnode-id="6495"><span data-dcnode-id="6506" instrument_node="">Scholars have proposed a number of theories to explain China's successful transition from a planned to a </span><a data-dcnode-id="6504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_market_economy" title="Socialist market economy"><span data-dcnode-id="6505" instrument_node="">socialist market economy</span></a><span data-dcnode-id="6503" instrument_node="">. This occurred despite unfavorable factors such as the troublesome legacies of socialism, considerable erosion of the work ethic, decades of anti-market propaganda, and the "lost generation" whose education disintegrated amid the disruption of the </span><a data-dcnode-id="6501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="6502" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="6500" instrument_node="">.</span><sup class="reference" data-dcnode-id="6497" id="cite_ref-124"><a data-dcnode-id="6498" href="#cite_note-124"><span data-dcnode-id="6499" instrument_node="">[124]</span></a></sup><span data-dcnode-id="6496" instrument_node="">
