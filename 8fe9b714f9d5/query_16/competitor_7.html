n data-dcnode-id="8528" instrument_node="">
</span><p data-dcnode-id="8446"><span data-dcnode-id="8527" instrument_node="">The </span><b data-dcnode-id="8525"><span data-dcnode-id="8526" instrument_node="">Chinese economic reform</span></b><span data-dcnode-id="8524" instrument_node=""> or </span><b data-dcnode-id="8522"><span data-dcnode-id="8523" instrument_node="">reform and opening-up</span></b><span data-dcnode-id="8521" instrument_node="">, known in the </span><a data-dcnode-id="8519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="8520" instrument_node="">West</span></a><span data-dcnode-id="8518" instrument_node=""> as the </span><b data-dcnode-id="8516"><span data-dcnode-id="8517" instrument_node="">opening of China</span></b><span data-dcnode-id="8515" instrument_node="">, is the program of </span><a data-dcnode-id="8513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microeconomic_reform" title="Microeconomic reform"><span data-dcnode-id="8514" instrument_node="">economic reforms</span></a><span data-dcnode-id="8512" instrument_node=""> termed "</span><a data-dcnode-id="8510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism_with_Chinese_characteristics" title="Socialism with Chinese characteristics"><span data-dcnode-id="8511" instrument_node="">Socialism with Chinese characteristics</span></a><span data-dcnode-id="8509" instrument_node="">" and "</span><a data-dcnode-id="8507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_market_economy" title="Socialist market economy"><span data-dcnode-id="8508" instrument_node="">socialist market economy</span></a><span data-dcnode-id="8506" instrument_node="">" in the </span><a data-dcnode-id="8504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="8505" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="8503" instrument_node=""> (PRC). Led by </span><a data-dcnode-id="8501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="8502" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="8500" instrument_node="">, often credited as the "General Architect", the reforms were launched by </span><a data-dcnode-id="8498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reformism" title="Reformism"><span data-dcnode-id="8499" instrument_node="">reformists</span></a><span data-dcnode-id="8497" instrument_node=""> within the </span><a data-dcnode-id="8495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Party" title="Chinese Communist Party"><span data-dcnode-id="8496" instrument_node="">Chinese Communist Party</span></a><span data-dcnode-id="8494" instrument_node=""> (CCP) on December 18, 1978, during the "</span><a data-dcnode-id="8492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boluan_Fanzheng" title="Boluan Fanzheng"><span data-dcnode-id="8493" instrument_node="">Boluan Fanzheng</span></a><span data-dcnode-id="8491" instrument_node="">" period.</span><sup class="reference" data-dcnode-id="8488" id="cite_ref-1"><a data-dcnode-id="8489" href="#cite_note-1"><span data-dcnode-id="8490" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="8485" id="cite_ref-2"><a data-dcnode-id="8486" href="#cite_note-2"><span data-dcnode-id="8487" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="8482" id="cite_ref-3"><a data-dcnode-id="8483" href="#cite_note-3"><span data-dcnode-id="8484" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="8479" id="cite_ref-4"><a data-dcnode-id="8480" href="#cite_note-4"><span data-dcnode-id="8481" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8478" instrument_node=""> The reforms went into stagnation after the military crackdown on </span><a class="mw-redirect" data-dcnode-id="8476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Tiananmen_Square_protests" title="1989 Tiananmen Square protests"><span data-dcnode-id="8477" instrument_node="">1989 Tiananmen Square protests</span></a><span data-dcnode-id="8475" instrument_node="">, but were revived after </span><a class="mw-redirect" data-dcnode-id="8473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping%2527s_Southern_Tour" title="Deng Xiaoping's Southern Tour"><span data-dcnode-id="8474" instrument_node="">Deng Xiaoping's Southern Tour</span></a><span data-dcnode-id="8472" instrument_node=""> in 1992. In 2010, China overtook Japan as the </span><a data-dcnode-id="8470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28nominal%29" title="List of countries by GDP (nominal)"><span data-dcnode-id="8471" instrument_node="">world's second-largest economy</span></a><span data-dcnode-id="8469" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="8467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nominal_GDP" title="Nominal GDP"><span data-dcnode-id="8468" instrument_node="">nominal GDP</span></a><sup class="reference" data-dcnode-id="8464" id="cite_ref-5"><a data-dcnode-id="8465" href="#cite_note-5"><span data-dcnode-id="8466" instrument_node="">[5]</span></a></sup><sup class="reference" data-dcnode-id="8461" id="cite_ref-6"><a data-dcnode-id="8462" href="#cite_note-6"><span data-dcnode-id="8463" instrument_node="">[6]</span></a></sup><span data-dcnode-id="8460" instrument_node=""> and in 2014 overtook the United States by becoming the </span><a data-dcnode-id="8458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_countries_by_GDP_%28PPP%29" title="List of countries by GDP (PPP)"><span data-dcnode-id="8459" instrument_node="">world's largest economy</span></a><span data-dcnode-id="8457" instrument_node=""> by </span><a class="mw-redirect" data-dcnode-id="8455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GDP_%28PPP%29" title="GDP (PPP)"><span data-dcnode-id="8456" instrument_node="">GDP (PPP)</span></a><span data-dcnode-id="8454" instrument_node="">.</span><sup class="reference" data-dcnode-id="8451" id="cite_ref-7"><a data-dcnode-id="8452" href="#cite_note-7"><span data-dcnode-id="8453" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="8448" id="cite_ref-8"><a data-dcnode-id="8449" href="#cite_note-8"><span data-dcnode-id="8450" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8447" instrument_node="">
</span></p><p data-dcnode-id="8394"><span data-dcnode-id="8445" instrument_node="">Prior to the reforms, the Chinese economy was dominated by </span><a data-dcnode-id="8443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_ownership" title="State ownership"><span data-dcnode-id="8444" instrument_node="">state ownership</span></a><span data-dcnode-id="8442" instrument_node=""> and central planning. From 1950 to 1973, Chinese real GDP per capita grew at a rate of 2.9% per year on average, albeit with major fluctuations stemming from the </span><a data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Leap_Forward" title="Great Leap Forward"><span data-dcnode-id="8441" instrument_node="">Great Leap Forward</span></a><span data-dcnode-id="8439" instrument_node=""> and the </span><a data-dcnode-id="8437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="8438" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="8436" instrument_node="">.</span><sup class="reference" data-dcnode-id="8433" id="cite_ref-:1_9-0"><a data-dcnode-id="8434" href="#cite_note-:1-9"><span data-dcnode-id="8435" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8432" instrument_node=""> This placed it near the middle of the Asian nations during the same period,</span><sup class="reference" data-dcnode-id="8429" id="cite_ref-FOOTNOTEWalder2015321_10-0"><a data-dcnode-id="8430" href="#cite_note-FOOTNOTEWalder2015321-10"><span data-dcnode-id="8431" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8428" instrument_node=""> with neighboring </span><a class="mw-redirect" data-dcnode-id="8426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalist" title="Capitalist"><span data-dcnode-id="8427" instrument_node="">capitalist</span></a><span data-dcnode-id="8425" instrument_node=""> countries such as </span><a data-dcnode-id="8423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="8424" instrument_node="">Japan</span></a><span data-dcnode-id="8422" instrument_node="">, </span><a data-dcnode-id="8420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="8421" instrument_node="">South Korea</span></a><span data-dcnode-id="8419" instrument_node="">, </span><a data-dcnode-id="8417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Singapore" title="Singapore"><span data-dcnode-id="8418" instrument_node="">Singapore</span></a><span data-dcnode-id="8416" instrument_node=""> and then rival </span><a data-dcnode-id="8414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="8415" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="8413" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="8411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China" title="Republic of China"><span data-dcnode-id="8412" instrument_node="">Republic of China</span></a><span data-dcnode-id="8410" instrument_node=""> (ROC) outstripping mainland China's rate of growth.</span><sup class="reference" data-dcnode-id="8407" id="cite_ref-FOOTNOTEBrandt20088_11-0"><a data-dcnode-id="8408" href="#cite_note-FOOTNOTEBrandt20088-11"><span data-dcnode-id="8409" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8406" instrument_node=""> Starting in 1970, the economy entered into a period of stagnation,</span><sup class="reference" data-dcnode-id="8403" id="cite_ref-FOOTNOTEWalder2015322_12-0"><a data-dcnode-id="8404" href="#cite_note-FOOTNOTEWalder2015322-12"><span data-dcnode-id="8405" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8402" instrument_node=""> and after the death of </span><a data-dcnode-id="8400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="8401" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="8399" instrument_node="">, the Communist Party leadership decided to turn to market-oriented reforms to salvage the stagnant economy.</span><sup class="reference" data-dcnode-id="8396" id="cite_ref-FOOTNOTEBrandt20087–8_13-0"><a data-dcnode-id="8397" href="#cite_note-FOOTNOTEBrandt20087%E2%80%938-13"><span data-dcnode-id="8398" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8395" instrument_node="">
</span></p><p data-dcnode-id="8353"><span data-dcnode-id="8393" instrument_node="">The Communist Party authorities carried out the market reforms in two stages. The first stage, in the late 1970s and early 1980s, involved the de-</span><a data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_farming" title="Collective farming"><span data-dcnode-id="8392" instrument_node="">collectivization of agriculture</span></a><span data-dcnode-id="8390" instrument_node="">, the opening up of the country to </span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_direct_investment" title="Foreign direct investment"><span data-dcnode-id="8389" instrument_node="">foreign investment</span></a><span data-dcnode-id="8387" instrument_node="">, and permission for </span><a data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Entrepreneurship" title="Entrepreneurship"><span data-dcnode-id="8386" instrument_node="">entrepreneurs</span></a><span data-dcnode-id="8384" instrument_node=""> to start </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business" title="Business"><span data-dcnode-id="8383" instrument_node="">businesses</span></a><span data-dcnode-id="8381" instrument_node="">. However, a large percentage of industries remained state-owned. The second stage of reform, in the late 1980s and 1990s, involved the </span><a data-dcnode-id="8379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Privatization" title="Privatization"><span data-dcnode-id="8380" instrument_node="">privatization</span></a><span data-dcnode-id="8378" instrument_node=""> and </span><a data-dcnode-id="8376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chengbao_system" title="Chengbao system"><span data-dcnode-id="8377" instrument_node="">contracting out</span></a><span data-dcnode-id="8375" instrument_node=""> of much state-owned industry. The </span><a data-dcnode-id="8373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_history_of_China_%281949%25E2%2580%2593present%29%23Prices" title="Economic history of China (1949–present)"><span data-dcnode-id="8374" instrument_node="">1985 lifting</span></a><span data-dcnode-id="8372" instrument_node=""> of </span><a data-dcnode-id="8370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Price_controls" title="Price controls"><span data-dcnode-id="8371" instrument_node="">price controls</span></a><sup class="reference" data-dcnode-id="8367" id="cite_ref-longworth01_14-0"><a data-dcnode-id="8368" href="#cite_note-longworth01-14"><span data-dcnode-id="8369" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8366" instrument_node=""> was a major reform, and the lifting of </span><a data-dcnode-id="8364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protectionism" title="Protectionism"><span data-dcnode-id="8365" instrument_node="">protectionist</span></a><span data-dcnode-id="8363" instrument_node=""> policies and regulations soon followed, although </span><a class="mw-redirect" data-dcnode-id="8361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_monopolies" title="State monopolies"><span data-dcnode-id="8362" instrument_node="">state monopolies</span></a><span data-dcnode-id="8360" instrument_node=""> in sectors such as </span><a data-dcnode-id="8358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Banking_in_China" title="Banking in China"><span data-dcnode-id="8359" instrument_node="">banking</span></a><span data-dcnode-id="8357" instrument_node=""> and </span><a data-dcnode-id="8355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Petroleum_industry_in_China" title="Petroleum industry in China"><span data-dcnode-id="8356" instrument_node="">petroleum</span></a><span data-dcnode-id="8354" instrument_node=""> remained. 
</span></p><p data-dcnode-id="8310"><span data-dcnode-id="8352" instrument_node="">In 2001, China </span><a data-dcnode-id="8350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_and_the_World_Trade_Organization" title="China and the World Trade Organization"><span data-dcnode-id="8351" instrument_node="">joined</span></a><span data-dcnode-id="8349" instrument_node=""> the </span><a data-dcnode-id="8347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Trade_Organization" title="World Trade Organization"><span data-dcnode-id="8348" instrument_node="">World Trade Organization</span></a><span data-dcnode-id="8346" instrument_node=""> (WTO). The </span><a data-dcnode-id="8344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_sector" title="Private sector"><span data-dcnode-id="8345" instrument_node="">private sector</span></a><span data-dcnode-id="8343" instrument_node=""> grew remarkably, accounting for as much as 70 percent of </span><a class="mw-redirect" data-dcnode-id="8341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Historical_GDP_of_the_People%2527s_Republic_of_China" title="Historical GDP of the People's Republic of China"><span data-dcnode-id="8342" instrument_node="">China's gross domestic product</span></a><span data-dcnode-id="8340" instrument_node=""> by 2005.</span><sup class="reference" data-dcnode-id="8337" id="cite_ref-Businessweek_15-0"><a data-dcnode-id="8338" href="#cite_note-Businessweek-15"><span data-dcnode-id="8339" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8336" instrument_node=""> From 1978 until 2013, unprecedented growth occurred, with the economy increasing by 9.5% a year. The conservative </span><a data-dcnode-id="8334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Jintao" title="Hu Jintao"><span data-dcnode-id="8335" instrument_node="">Hu Jintao</span></a><span data-dcnode-id="8333" instrument_node="">'s </span><a data-dcnode-id="8331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu%25E2%2580%2593Wen_Administration" title="Hu–Wen Administration"><span data-dcnode-id="8332" instrument_node="">administration</span></a><span data-dcnode-id="8330" instrument_node=""> regulated and controlled the economy more heavily after 2005, reversing some reforms.</span><sup class="reference" data-dcnode-id="8327" id="cite_ref-scissors_16-0"><a data-dcnode-id="8328" href="#cite_note-scissors-16"><span data-dcnode-id="8329" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8326" instrument_node=""> On the other hand, </span><a data-dcnode-id="8324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_People%2527s_Republic_of_China%23Political_reforms" title="History of the People's Republic of China"><span data-dcnode-id="8325" instrument_node="">a parallel set of political reforms</span></a><span data-dcnode-id="8323" instrument_node=""> were launched by Deng in 1980, which also inspired the then </span><a data-dcnode-id="8321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8322" instrument_node="">Soviet Union</span></a><span data-dcnode-id="8320" instrument_node="">'s </span><a data-dcnode-id="8318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasnost" title="Glasnost"><span data-dcnode-id="8319" instrument_node="">Glasnost</span></a><span data-dcnode-id="8317" instrument_node=""> and </span><a data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="8316" instrument_node="">Perestroika</span></a><span data-dcnode-id="8314" instrument_node="">, but eventually ended in 1989 due to the crackdown on </span><a class="mw-redirect" data-dcnode-id="8312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Tiananmen_Square_protests" title="1989 Tiananmen Square protests"><span data-dcnode-id="8313" instrument_node="">Tiananmen Square protests</span></a><span data-dcnode-id="8311" instrument_node="">.
</span></p><p data-dcnode-id="8255"><span data-dcnode-id="8309" instrument_node="">The success of China's economic policies and the manner of their implementation resulted in immense changes in Chinese society in the last 40 years, including greatly decreased poverty while both average incomes and </span><a data-dcnode-id="8307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_inequality_in_China" title="Income inequality in China"><span data-dcnode-id="8308" instrument_node="">income inequality</span></a><span data-dcnode-id="8306" instrument_node=""> have increased, leading to a backlash led by the </span><a class="mw-redirect" data-dcnode-id="8304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Left_in_China" title="New Left in China"><span data-dcnode-id="8305" instrument_node="">New Left</span></a><span data-dcnode-id="8303" instrument_node="">. In the academic scene, scholars have debated the reason for the success of the Chinese </span><a data-dcnode-id="8301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dual-track_economy" title="Dual-track economy"><span data-dcnode-id="8302" instrument_node="">"dual-track" economy</span></a><span data-dcnode-id="8300" instrument_node="">, and have compared it to attempts to reform socialism in the </span><a data-dcnode-id="8298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="8299" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="8297" instrument_node=""> and the </span><a data-dcnode-id="8295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="8296" instrument_node="">Soviet Union</span></a><span data-dcnode-id="8294" instrument_node="">; as well as to the growth of other developing economies. Additionally, these series of reforms have led to China's rise as a </span><a class="mw-redirect" data-dcnode-id="8292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_power" title="World power"><span data-dcnode-id="8293" instrument_node="">world power</span></a><span data-dcnode-id="8291" instrument_node=""> and a shift of international </span><a data-dcnode-id="8289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geopolitics" title="Geopolitics"><span data-dcnode-id="8290" instrument_node="">geopolitical</span></a><span data-dcnode-id="8288" instrument_node=""> interests especially in matters relating to the </span><a data-dcnode-id="8286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_status_of_Taiwan" title="Political status of Taiwan"><span data-dcnode-id="8287" instrument_node="">political status of Taiwan</span></a><span data-dcnode-id="8285" instrument_node="">. However, matters such as </span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corruption_in_China" title="Corruption in China"><span data-dcnode-id="8284" instrument_node="">corruption</span></a><span data-dcnode-id="8282" instrument_node="">, </span><a data-dcnode-id="8280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pollution_in_China" title="Pollution in China"><span data-dcnode-id="8281" instrument_node="">pollution</span></a><span data-dcnode-id="8279" instrument_node=""> and an aging </span><a class="mw-redirect" data-dcnode-id="8277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Population_crisis" title="Population crisis"><span data-dcnode-id="8278" instrument_node="">population crisis</span></a><span data-dcnode-id="8276" instrument_node=""> remain the most serious development issues today.</span><sup class="reference" data-dcnode-id="8273" id="cite_ref-:6_17-0"><a data-dcnode-id="8274" href="#cite_note-:6-17"><span data-dcnode-id="8275" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="8270" id="cite_ref-:13_18-0"><a data-dcnode-id="8271" href="#cite_note-:13-18"><span data-dcnode-id="8272" instrument_node="">[18]</span></a></sup><span data-dcnode-id="8269" instrument_node=""> In addition, alleged manipulation of economic data by provincial Chinese officials, such as reporting inflated GDP figures for their </span><a data-dcnode-id="8267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Provinces_of_China" title="Provinces of China"><span data-dcnode-id="8268" instrument_node="">provinces</span></a><span data-dcnode-id="8266" instrument_node=""> or other fake figures, is also a major concern.</span><sup class="reference" data-dcnode-id="8263" id="cite_ref-:15_19-0"><a data-dcnode-id="8264" href="#cite_note-:15-19"><span data-dcnode-id="8265" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="8260" id="cite_ref-:16_20-0"><a data-dcnode-id="8261" href="#cite_note-:16-20"><span data-dcnode-id="8262" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="8257" id="cite_ref-:17_21-0"><a data-dcnode-id="8258" href="#cite_note-:17-21"><span data-dcnode-id="8259" instrument_node="">[21]</span></a></sup><span data-dcnode-id="8256" instrument_node="">
</span></p><p data-dcnode-id="8185"><span data-dcnode-id="8254" instrument_node="">The reform era has been said to end during the </span><a data-dcnode-id="8252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi_Jinping_Administration" title="Xi Jinping Administration"><span data-dcnode-id="8253" instrument_node="">leadership</span></a><span data-dcnode-id="8251" instrument_node=""> of current </span><a data-dcnode-id="8249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Chinese_Communist_Party" title="General Secretary of the Chinese Communist Party"><span data-dcnode-id="8250" instrument_node="">CCP General Secretary</span></a><span data-dcnode-id="8248" instrument_node=""> </span><a data-dcnode-id="8246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi_Jinping" title="Xi Jinping"><span data-dcnode-id="8247" instrument_node="">Xi Jinping</span></a><span data-dcnode-id="8245" instrument_node="">,</span><sup class="reference" data-dcnode-id="8242" id="cite_ref-22"><a data-dcnode-id="8243" href="#cite_note-22"><span data-dcnode-id="8244" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="8239" id="cite_ref-23"><a data-dcnode-id="8240" href="#cite_note-23"><span data-dcnode-id="8241" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="8236" id="cite_ref-24"><a data-dcnode-id="8237" href="#cite_note-24"><span data-dcnode-id="8238" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8235" instrument_node=""> who generally opposes the reforms and has rolled back many of the Deng-era reforms.</span><sup class="reference" data-dcnode-id="8232" id="cite_ref-25"><a data-dcnode-id="8233" href="#cite_note-25"><span data-dcnode-id="8234" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8229" id="cite_ref-:18_26-0"><a data-dcnode-id="8230" href="#cite_note-:18-26"><span data-dcnode-id="8231" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8226" id="cite_ref-:0_27-0"><a data-dcnode-id="8227" href="#cite_note-:0-27"><span data-dcnode-id="8228" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="8223" id="cite_ref-28"><a data-dcnode-id="8224" href="#cite_note-28"><span data-dcnode-id="8225" instrument_node="">[28]</span></a></sup><sup class="reference" data-dcnode-id="8220" id="cite_ref-29"><a data-dcnode-id="8221" href="#cite_note-29"><span data-dcnode-id="8222" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8219" instrument_node=""> Meanwhile, the CCP under Xi has reasserted state control over different aspects of Chinese society, including the economy.</span><sup class="reference" data-dcnode-id="8216" id="cite_ref-:18_26-1"><a data-dcnode-id="8217" href="#cite_note-:18-26"><span data-dcnode-id="8218" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="8213" id="cite_ref-:1_9-1"><a data-dcnode-id="8214" href="#cite_note-:1-9"><span data-dcnode-id="8215" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="8210" id="cite_ref-:2_30-0"><a data-dcnode-id="8211" href="#cite_note-:2-30"><span data-dcnode-id="8212" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8209" instrument_node=""> This de-liberalization is also seen by one Hong Kong commentator as part of the subject of the </span><a class="mw-redirect" data-dcnode-id="8207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_trade_war_%282018%25E2%2580%2593present%29" title="China–United States trade war (2018–present)"><span data-dcnode-id="8208" instrument_node="">present US–China trade war</span></a><span data-dcnode-id="8206" instrument_node="">,</span><sup class="reference" data-dcnode-id="8203" id="cite_ref-:2_30-1"><a data-dcnode-id="8204" href="#cite_note-:2-30"><span data-dcnode-id="8205" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8202" instrument_node=""> in which </span><a data-dcnode-id="8200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="8201" instrument_node="">Washington</span></a><span data-dcnode-id="8199" instrument_node=""> alleges that </span><a data-dcnode-id="8197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing" title="Beijing"><span data-dcnode-id="8198" instrument_node="">Beijing</span></a><span data-dcnode-id="8196" instrument_node=""> has been giving unfair and discriminatory competitive trade advantages to Chinese state-owned and domestic private companies.</span><sup class="reference" data-dcnode-id="8193" id="cite_ref-31"><a data-dcnode-id="8194" href="#cite_note-31"><span data-dcnode-id="8195" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="8190" id="cite_ref-32"><a data-dcnode-id="8191" href="#cite_note-32"><span data-dcnode-id="8192" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="8187" id="cite_ref-33"><a data-dcnode-id="8188" href="#cite_note-33"><span data-dcnode-id="8189" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8186" instrument_node="">

</span><table class="box-Unreferenced_section plainlinks metadata ambox ambox-content ambox-Unreferenced" data-dcnode-id="7879" role="presentation"><tbody data-dcnode-id="7880"><tr data-dcnode-id="7881"><td class="mbox-image" data-dcnode-id="7918"><div data-dcnode-id="7919" style="width:52px"><a class="image" data-dcnode-id="7920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AQuestion_book-new.svg"><img alt="" data-dcnode-id="7921" data-file-height="399" data-file-width="512" decoding="async" height="39" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/50px-Question_book-new.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/75px-Question_book-new.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/9/99/Question_book-new.svg/100px-Question_book-new.svg.png 2x" width="50"></a></div></td><td class="mbox-text" data-dcnode-id="7882"><div class="mbox-text-span" data-dcnode-id="7883"><span data-dcnode-id="7917" instrument_node="">This section </span><b data-dcnode-id="7910"><span data-dcnode-id="7916" instrument_node="">does not </span><a data-dcnode-id="7914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="7915" instrument_node="">cite</span></a><span data-dcnode-id="7913" instrument_node=""> any </span><a data-dcnode-id="7911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="7912" instrument_node="">sources</span></a></b><span data-dcnode-id="7909" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="7898"><span data-dcnode-id="7908" instrument_node=""> Please help </span><a class="external text ="7878" instrument_node="">
</span><p data-dcnode-id="7858"><span data-dcnode-id="7877" instrument_node="">In September 1976, </span><a data-dcnode-id="7875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="7876" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="7874" instrument_node=""> died, and in October, </span><a data-dcnode-id="7872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hua_Guofeng" title="Hua Guofeng"><span data-dcnode-id="7873" instrument_node="">Hua Guofeng</span></a><span data-dcnode-id="7871" instrument_node=""> together with </span><a data-dcnode-id="7869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ye_Jianying" title="Ye Jianying"><span data-dcnode-id="7870" instrument_node="">Ye Jianying</span></a><span data-dcnode-id="7868" instrument_node=""> and </span><a data-dcnode-id="7866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wang_Dongxing" title="Wang Dongxing"><span data-dcnode-id="7867" instrument_node="">Wang Dongxing</span></a><span data-dcnode-id="7865" instrument_node=""> arrested the </span><a data-dcnode-id="7863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gang_of_Four" title="Gang of Four"><span data-dcnode-id="7864" instrument_node="">Gang of Four</span></a><span data-dcnode-id="7862" instrument_node="">, putting an end to the </span><a data-dcnode-id="7860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="7861" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="7859" instrument_node="">.
</span></p><p data-dcnode-id="7844"><span data-dcnode-id="7857" instrument_node="">Economic reforms began during the "</span><a data-dcnode-id="7855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boluan_Fanzheng" title="Boluan Fanzheng"><span data-dcnode-id="7856" instrument_node="">Boluan Fanzheng</span></a><span data-dcnode-id="7854" instrument_node="">" period, especially after </span><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="7853" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="7851" instrument_node=""> and his reformist allies rose to power with Deng replacing Hua Guofeng as the </span><a class="mw-redirect" data-dcnode-id="7849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paramount_Leader_of_China" title="Paramount Leader of China"><span data-dcnode-id="7850" instrument_node="">paramount leader of China</span></a><span data-dcnode-id="7848" instrument_node=""> in December 1978. By the time Deng took power, there was widespread support among the elite for economic reforms. As the </span><i data-dcnode-id="7846"><span data-dcnode-id="7847" instrument_node="">de facto</span></i><span data-dcnode-id="7845" instrument_node=""> leader, Deng's policies faced opposition from party conservatives but were extremely successful in increasing the country's wealth.
</span></p><span data-dcnode-id="7843" instrument_node="">
</span><h3 data-dcnode-id="7832"><span data-dcnode-id="7842" id="1979.E2.80.931984"></span><span class="mw-headline" data-dcnode-id="7840" id="1979–1984"><span data-dcnode-id="7841" instrument_node="">1979–1984</span></span><span class="mw-editsection" data-dcnode-id="7833"><span class="mw-editsection-bracket" data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">[</span></span><a data-dcnode-id="7836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D3" title="Edit section: 1979–1984"><span data-dcnode-id="7837" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7834"><span data-dcnode-id="7835" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7831" instrument_node="">
</span><link data-dcnode-id="7830" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7826" role="note"><span data-dcnode-id="7829" instrument_node="">See also: </span><a data-dcnode-id="7827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_People%2527s_Republic_of_China%23Political_reforms" title="History of the People's Republic of China"><span data-dcnode-id="7828" instrument_node="">History of the People's Republic of China §&nbsp;Political reforms</span></a></div><span data-dcnode-id="7825" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7810"><div class="thumbinner" data-dcnode-id="7811" style="width:252px;"><a class="image" data-dcnode-id="7823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E6%25B7%25B1%25E5%259C%25B3%25E9%2582%2593%25E5%25B0%258F%25E5%25B9%25B3%25E7%2594%25BB%25E5%2583%258F.jpg"><img alt="" class="thumbimage" data-dcnode-id="7824" data-file-height="1443" data-file-width="2048" decoding="async" height="176" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/%25E6%25B7%25B1%25E5%259C%25B3%25E9%2582%2593%25E5%25B0%258F%25E5%25B9%25B3%25E7%2594%25BB%25E5%2583%258F.jpg/250px-%25E6%25B7%25B1%25E5%259C%25B3%25E9%2582%2593%25E5%25B0%258F%25E5%25B9%25B3%25E7%2594%25BB%25E5%2583%258F.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/09/%E6%B7%B1%E5%9C%B3%E9%82%93%E5%B0%8F%E5%B9%B3%E7%94%BB%E5%83%8F.jpg/375px-%E6%B7%B1%E5%9C%B3%E9%82%93%E5%B0%8F%E5%B9%B3%E7%94%BB%E5%83%8F.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/09/%E6%B7%B1%E5%9C%B3%E9%82%93%E5%B0%8F%E5%B9%B3%E7%94%BB%E5%83%8F.jpg/500px-%E6%B7%B1%E5%9C%B3%E9%82%93%E5%B0%8F%E5%B9%B3%E7%94%BB%E5%83%8F.jpg 2x" width="250"></a><span data-dcnode-id="7822" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7812"><div class="magnify" data-dcnode-id="7820"><a class="internal" data-dcnode-id="7821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E6%25B7%25B1%25E5%259C%25B3%25E9%2582%2593%25E5%25B0%258F%25E5%25B9%25B3%25E7%2594%25BB%25E5%2583%258F.jpg" title="Enlarge"></a></div><span data-dcnode-id="7819" instrument_node="">The image of Deng Xiaoping in </span><a class="mw-redirect" data-dcnode-id="7817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen%2C_Guangdong" title="Shenzhen, Guangdong"><span data-dcnode-id="7818" instrument_node="">Shenzhen, Guangdong</span></a><span data-dcnode-id="7816" instrument_node="">, one of the first </span><a data-dcnode-id="7814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_economic_zones_of_China" title="Special economic zones of China"><span data-dcnode-id="7815" instrument_node="">special economic zones</span></a><span data-dcnode-id="7813" instrument_node=""> approved by Deng in 1979.</span></div></div></div><span data-dcnode-id="7809" instrument_node="">
</span><p data-dcnode-id="7778"><span data-dcnode-id="7808" instrument_node="">In 1979, Deng Xiaoping emphasized the goal of "</span><a data-dcnode-id="7806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Modernizations" title="Four Modernizations"><span data-dcnode-id="7807" instrument_node="">Four Modernizations</span></a><span data-dcnode-id="7805" instrument_node="">" and further proposed the idea of "</span><a class="mw-redirect" data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xiaokang" title="Xiaokang"><span data-dcnode-id="7804" instrument_node="">xiaokang</span></a><span data-dcnode-id="7802" instrument_node="">", or "</span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moderately_prosperous_society" title="Moderately prosperous society"><span data-dcnode-id="7801" instrument_node="">moderately prosperous society</span></a><span data-dcnode-id="7799" instrument_node="">".</span><sup class="reference" data-dcnode-id="7796" id="cite_ref-34"><a data-dcnode-id="7797" href="#cite_note-34"><span data-dcnode-id="7798" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="7793" id="cite_ref-35"><a data-dcnode-id="7794" href="#cite_note-35"><span data-dcnode-id="7795" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="7790" id="cite_ref-36"><a data-dcnode-id="7791" href="#cite_note-36"><span data-dcnode-id="7792" instrument_node="">[36]</span></a></sup><span data-dcnode-id="7789" instrument_node=""> The achievements of </span><a data-dcnode-id="7787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lee_Kuan_Yew" title="Lee Kuan Yew"><span data-dcnode-id="7788" instrument_node="">Lee Kuan Yew</span></a><span data-dcnode-id="7786" instrument_node=""> to create an economic superpower in </span><a data-dcnode-id="7784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Singapore" title="History of Singapore"><span data-dcnode-id="7785" instrument_node="">Singapore</span></a><span data-dcnode-id="7783" instrument_node=""> had a profound effect on the Communist leadership in China. Leaders in China made a major effort, especially under Deng Xiaoping, to emulate his policies of economic growth, entrepreneurship, and subtle suppression of dissent. Over the years, more than 22,000 Chinese officials were sent to Singapore to study its methods.</span><sup class="reference" data-dcnode-id="7780" id="cite_ref-37"><a data-dcnode-id="7781" href="#cite_note-37"><span data-dcnode-id="7782" instrument_node="">[37]</span></a></sup><span data-dcnode-id="7779" instrument_node="">
</span></p><p data-dcnode-id="7742"><span data-dcnode-id="7777" instrument_node="">Deng's first reforms </span><a class="mw-redirect" data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_agriculture_in_the_People%2527s_Republic_of_China" title="History of agriculture in the People's Republic of China"><span data-dcnode-id="7776" instrument_node="">began in agriculture</span></a><span data-dcnode-id="7774" instrument_node="">, a sector long mismanaged by the Chinese Communist Party. By the late 1970s, food supplies and production had become so deficient that government officials were warning that China was about to repeat the "</span><a data-dcnode-id="7772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Chinese_Famine" title="Great Chinese Famine"><span data-dcnode-id="7773" instrument_node="">disaster of 1959</span></a><span data-dcnode-id="7771" instrument_node="">", the famines which killed tens of millions during the </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Leap_Forward" title="Great Leap Forward"><span data-dcnode-id="7770" instrument_node="">Great Leap Forward</span></a><span data-dcnode-id="7768" instrument_node="">.</span><sup class="reference" data-dcnode-id="7765" id="cite_ref-38"><a data-dcnode-id="7766" href="#cite_note-38"><span data-dcnode-id="7767" instrument_node="">[38]</span></a></sup><span data-dcnode-id="7764" instrument_node=""> Deng responded by decollectivizing agriculture and emphasizing the </span><a class="mw-redirect" data-dcnode-id="7762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Household-responsibility_system" title="Household-responsibility system"><span data-dcnode-id="7763" instrument_node="">household-responsibility system</span></a><span data-dcnode-id="7761" instrument_node="">, which divided the land of the </span><a data-dcnode-id="7759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_commune" title="People's commune"><span data-dcnode-id="7760" instrument_node="">People's communes</span></a><span data-dcnode-id="7758" instrument_node=""> into private plots. Under the new policy, peasants were able to exercise formal control of their land as long as they sold a contracted portion of their crops to the government.</span><sup class="reference" data-dcnode-id="7755" id="cite_ref-auto_39-0"><a data-dcnode-id="7756" href="#cite_note-auto-39"><span data-dcnode-id="7757" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7754" instrument_node=""> This move increased agricultural production by 25 percent between 1975 and 1985, setting a precedent for privatizing other parts of the economy.</span><sup class="reference" data-dcnode-id="7751" id="cite_ref-auto_39-1"><a data-dcnode-id="7752" href="#cite_note-auto-39"><span data-dcnode-id="7753" instrument_node="">[39]</span></a></sup><span data-dcnode-id="7750" instrument_node=""> The bottom-up approach of the reforms promoted by Deng, in contrast to the top-down approach of the </span><a data-dcnode-id="7748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="7749" instrument_node="">Perestroika</span></a><span data-dcnode-id="7747" instrument_node=""> in the Soviet Union, is considered an important factor contributing to the success of China's economic transition.</span><sup class="reference" data-dcnode-id="7744" id="cite_ref-40"><a data-dcnode-id="7745" href="#cite_note-40"><span data-dcnode-id="7746" instrument_node="">[40]</span></a></sup><span data-dcnode-id="7743" instrument_node="">
</span></p><p data-dcnode-id="7729"><span data-dcnode-id="7741" instrument_node="">Reforms were also implemented in urban industry to increase productivity. A dual-price system was introduced, in which (State-owned enterprise reform 1979) state-owned industries  were allowed to sell any production above the plan quota, and commodities were sold at both plan and market prices, allowing citizens to avoid the </span><a class="mw-redirect" data-dcnode-id="7739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shortages" title="Shortages"><span data-dcnode-id="7740" instrument_node="">shortages</span></a><span data-dcnode-id="7738" instrument_node=""> of the Maoist era. Moreover, the adoption of Industrial Responsibility System 1980s further promote the development of state-owned enterprise by allowing individuals or groups to manage the enterprise by contract. Private businesses were allowed to operate for the first time since the Communist takeover, and they gradually began to make up a greater percentage of industrial output.</span><sup class="reference" data-dcnode-id="7735" id="cite_ref-41"><a data-dcnode-id="7736" href="#cite_note-41"><span data-dcnode-id="7737" instrument_node="">[41]</span></a></sup><span data-dcnode-id="7734" instrument_node=""> Price flexibility was also increased, expanding the service sector.</span><sup class="reference" data-dcnode-id="7731" id="cite_ref-Loren_11_42-0"><a data-dcnode-id="7732" href="#cite_note-Loren_11-42"><span data-dcnode-id="7733" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7730" instrument_node="">
</span></p><p data-dcnode-id="7661"><span data-dcnode-id="7728" instrument_node="">At the same time, in December 1978, Deng announced a new policy, the </span><a data-dcnode-id="7726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_Door_Policy" title="Open Door Policy"><span data-dcnode-id="7727" instrument_node="">Open Door Policy</span></a><span data-dcnode-id="7725" instrument_node="">, to open the door to foreign businesses that wanted to set up in China.</span><sup class="reference" data-dcnode-id="7722" id="cite_ref-bbc_43-0"><a data-dcnode-id="7723" href="#cite_note-bbc-43"><span data-dcnode-id="7724" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="7719" id="cite_ref-44"><a data-dcnode-id="7720" href="#cite_note-44"><span data-dcnode-id="7721" instrument_node="">[44]</span></a></sup><span data-dcnode-id="7718" instrument_node="">  For the first time since the </span><a data-dcnode-id="7716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuomintang" title="Kuomintang"><span data-dcnode-id="7717" instrument_node="">Kuomintang</span></a><span data-dcnode-id="7715" instrument_node=""> era, the country was opened to </span><a data-dcnode-id="7713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_direct_investment" title="Foreign direct investment"><span data-dcnode-id="7714" instrument_node="">foreign investment</span></a><span data-dcnode-id="7712" instrument_node="">. Deng created a series of </span><a class="mw-redirect" data-dcnode-id="7710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_Economic_Zones_of_the_People%2527s_Republic_of_China" title="Special Economic Zones of the People's Republic of China"><span data-dcnode-id="7711" instrument_node="">Special Economic Zones</span></a><span data-dcnode-id="7709" instrument_node="">, including </span><a data-dcnode-id="7707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen" title="Shenzhen"><span data-dcnode-id="7708" instrument_node="">Shenzhen</span></a><span data-dcnode-id="7706" instrument_node="">, </span><a data-dcnode-id="7704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhuhai" title="Zhuhai"><span data-dcnode-id="7705" instrument_node="">Zhuhai</span></a><span data-dcnode-id="7703" instrument_node=""> and </span><a data-dcnode-id="7701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xiamen" title="Xiamen"><span data-dcnode-id="7702" instrument_node="">Xiamen</span></a><span data-dcnode-id="7700" instrument_node="">, for foreign investment that were relatively free of the bureaucratic regulations and interventions that hampered economic growth.  These regions became engines of growth for the national economy.</span><sup class="reference" data-dcnode-id="7697" id="cite_ref-Loren_11_42-1"><a data-dcnode-id="7698" href="#cite_note-Loren_11-42"><span data-dcnode-id="7699" instrument_node="">[42]</span></a></sup><span data-dcnode-id="7696" instrument_node=""> On January 31, 1979, the </span><a data-dcnode-id="7694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shekou" title="Shekou"><span data-dcnode-id="7695" instrument_node="">Shekou Industrial Zone</span></a><span data-dcnode-id="7693" instrument_node=""> of Shenzhen was founded, becoming the first experimental area in China to "open up".</span><sup class="reference" data-dcnode-id="7690" id="cite_ref-:11_45-0"><a data-dcnode-id="7691" href="#cite_note-:11-45"><span data-dcnode-id="7692" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="7687" id="cite_ref-46"><a data-dcnode-id="7688" href="#cite_note-46"><span data-dcnode-id="7689" instrument_node="">[46]</span></a></sup><span data-dcnode-id="7686" instrument_node=""> Under the leadership of </span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yuan_Geng" title="Yuan Geng"><span data-dcnode-id="7685" instrument_node="">Yuan Geng</span></a><span data-dcnode-id="7683" instrument_node="">, the "Shekou model" of development was gradually formed, embodied in its famous slogan </span><i data-dcnode-id="7680"><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Time_is_Money%2C_Efficiency_is_Life" title="Time is Money, Efficiency is Life"><span data-dcnode-id="7682" instrument_node="">Time is Money, Efficiency is Life</span></a></i><span data-dcnode-id="7679" instrument_node="">, which then widely spread to other parts of China.</span><sup class="reference" data-dcnode-id="7676" id="cite_ref-:11_45-1"><a data-dcnode-id="7677" href="#cite_note-:11-45"><span data-dcnode-id="7678" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="7673" id="cite_ref-47"><a data-dcnode-id="7674" href="#cite_note-47"><span data-dcnode-id="7675" instrument_node="">[47]</span></a></sup><span data-dcnode-id="7672" instrument_node=""> In January 1984, Deng Xiaoping made his first inspection tour to Shenzhen and Zhuhai, praising the "</span><a data-dcnode-id="7670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen_speed" title="Shenzhen speed"><span data-dcnode-id="7671" instrument_node="">Shenzhen Speed</span></a><span data-dcnode-id="7669" instrument_node="">" of development as well as the success of the special economics zones.</span><sup class="reference" data-dcnode-id="7666" id="cite_ref-48"><a data-dcnode-id="7667" href="#cite_note-48"><span data-dcnode-id="7668" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="7663" id="cite_ref-49"><a data-dcnode-id="7664" href="#cite_note-49"><span data-dcnode-id="7665" instrument_node="">[49]</span></a></sup><span data-dcnode-id="7662" instrument_node="">
</span></p><span data-dcnode-id="7660" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7640"><div class="thumbinner" data-dcnode-id="7641" style="width:202px;"><a class="image" data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg"><img alt="" class="thumbimage" data-dcnode-id="7659" data-file-height="3456" data-file-width="5184" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg/200px-Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg/300px-Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg/400px-Hu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg 2x" width="200"></a><span data-dcnode-id="7657" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7642"><div class="magnify" data-dcnode-id="7655"><a class="internal" data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AHu_Yaobang_Bronze_statue_at_Yaobang_Cemetery.jpg" title="Enlarge"></a></div><a data-dcnode-id="7653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Yaobang" title="Hu Yaobang"><span data-dcnode-id="7654" instrument_node="">Hu Yaobang</span></a><span data-dcnode-id="7652" instrument_node="">, then </span><a class="mw-redirect" data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_Chinese_Communist_Party" title="General Secretary of Chinese Communist Party"><span data-dcnode-id="7651" instrument_node="">General Secretary of CCP</span></a><span data-dcnode-id="7649" instrument_node="">, played an important role in implementing the reforms together with </span><a data-dcnode-id="7647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhao_Ziyang" title="Zhao Ziyang"><span data-dcnode-id="7648" instrument_node="">Zhao Ziyang</span></a><span data-dcnode-id="7646" instrument_node="">, then </span><a data-dcnode-id="7644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_the_People%2527s_Republic_of_China" title="Premier of the People's Republic of China"><span data-dcnode-id="7645" instrument_node="">Premier of China</span></a><span data-dcnode-id="7643" instrument_node="">.</span></div></div></div><span data-dcnode-id="7639" instrument_node="">
</span><p data-dcnode-id="7539"><span data-dcnode-id="7638" instrument_node="">Besides Deng Xiaoping himself, important high-ranking reformists who helped carry out the reforms include </span><a data-dcnode-id="7636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Yaobang" title="Hu Yaobang"><span data-dcnode-id="7637" instrument_node="">Hu Yaobang</span></a><span data-dcnode-id="7635" instrument_node="">, then </span><a class="mw-redirect" data-dcnode-id="7633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_Chinese_Communist_Party" title="General Secretary of Chinese Communist Party"><span data-dcnode-id="7634" instrument_node="">General Secretary of Chinese Communist Party</span></a><span data-dcnode-id="7632" instrument_node="">, and </span><a data-dcnode-id="7630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhao_Ziyang" title="Zhao Ziyang"><span data-dcnode-id="7631" instrument_node="">Zhao Ziyang</span></a><span data-dcnode-id="7629" instrument_node="">, then </span><a data-dcnode-id="7627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_the_People%2527s_Republic_of_China" title="Premier of the People's Republic of China"><span data-dcnode-id="7628" instrument_node="">Premier of the People's Republic of China</span></a><span data-dcnode-id="7626" instrument_node="">.</span><sup class="reference" data-dcnode-id="7623" id="cite_ref-50"><a data-dcnode-id="7624" href="#cite_note-50"><span data-dcnode-id="7625" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="7620" id="cite_ref-51"><a data-dcnode-id="7621" href="#cite_note-51"><span data-dcnode-id="7622" instrument_node="">[51]</span></a></sup><span data-dcnode-id="7619" instrument_node=""> Other leaders who favored Deng's reforms include </span><a data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi_Zhongxun" title="Xi Zhongxun"><span data-dcnode-id="7618" instrument_node="">Xi Zhongxun</span></a><span data-dcnode-id="7616" instrument_node=""> (the father of </span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xi_Jinping" title="Xi Jinping"><span data-dcnode-id="7615" instrument_node="">Xi Jinping</span></a><span data-dcnode-id="7613" instrument_node="">), </span><a data-dcnode-id="7611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wan_Li" title="Wan Li"><span data-dcnode-id="7612" instrument_node="">Wan Li</span></a><span data-dcnode-id="7610" instrument_node="">, </span><a data-dcnode-id="7608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Qili" title="Hu Qili"><span data-dcnode-id="7609" instrument_node="">Hu Qili</span></a><span data-dcnode-id="7607" instrument_node=""> and others.</span><sup class="reference" data-dcnode-id="7604" id="cite_ref-52"><a data-dcnode-id="7605" href="#cite_note-52"><span data-dcnode-id="7606" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="7601" id="cite_ref-53"><a data-dcnode-id="7602" href="#cite_note-53"><span data-dcnode-id="7603" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="7598" id="cite_ref-54"><a data-dcnode-id="7599" href="#cite_note-54"><span data-dcnode-id="7600" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7597" instrument_node=""> Another influential leader was </span><a data-dcnode-id="7595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chen_Yun" title="Chen Yun"><span data-dcnode-id="7596" instrument_node="">Chen Yun</span></a><span data-dcnode-id="7594" instrument_node="">, regarded by some as the second most powerful person in China after Deng with more conservative ideology of the reforms.</span><sup class="reference" data-dcnode-id="7591" id="cite_ref-55"><a data-dcnode-id="7592" href="#cite_note-55"><span data-dcnode-id="7593" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="7588" id="cite_ref-:8_56-0"><a data-dcnode-id="7589" href="#cite_note-:8-56"><span data-dcnode-id="7590" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="7585" id="cite_ref-:10_57-0"><a data-dcnode-id="7586" href="#cite_note-:10-57"><span data-dcnode-id="7587" instrument_node="">[57]</span></a></sup><span data-dcnode-id="7584" instrument_node=""> Though Deng Xiaoping is credited as the architect of modern China's economic reforms, Chen was more directly involved in the details of its planning and construction, and led a force that opposed many of the reforms from Deng's side.</span><sup class="reference" data-dcnode-id="7581" id="cite_ref-:8_56-1"><a data-dcnode-id="7582" href="#cite_note-:8-56"><span data-dcnode-id="7583" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="7578" id="cite_ref-:12_58-0"><a data-dcnode-id="7579" href="#cite_note-:12-58"><span data-dcnode-id="7580" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7577" instrument_node=""> The two sides struggled over the general direction of the reforms until Chen died in 1995.</span><sup class="reference" data-dcnode-id="7574" id="cite_ref-:8_56-2"><a data-dcnode-id="7575" href="#cite_note-:8-56"><span data-dcnode-id="7576" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="7571" id="cite_ref-:10_57-1"><a data-dcnode-id="7572" href="#cite_note-:10-57"><span data-dcnode-id="7573" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="7568" id="cite_ref-:12_58-1"><a data-dcnode-id="7569" href="#cite_note-:12-58"><span data-dcnode-id="7570" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7567" instrument_node=""> A key feature of Chen's ideas was to use the market to allocate resources, within the scope of an overall plan. Some reforms of the early 1980s were, in effect, the implementation of a program that Chen had outlined in the mid-1950s. Chen called this the "birdcage economy (鸟笼经济/鳥籠經濟)".</span><sup class="reference" data-dcnode-id="7564" id="cite_ref-59"><a data-dcnode-id="7565" href="#cite_note-59"><span data-dcnode-id="7566" instrument_node="">[59]</span></a></sup><sup class="reference" data-dcnode-id="7561" id="cite_ref-:9_60-0"><a data-dcnode-id="7562" href="#cite_note-:9-60"><span data-dcnode-id="7563" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7560" instrument_node=""> According to Chen, "the cage is the plan, and it may be large or small. But within the cage the bird [the economy] is free to fly as he wishes."</span><sup class="reference" data-dcnode-id="7557" id="cite_ref-:8_56-3"><a data-dcnode-id="7558" href="#cite_note-:8-56"><span data-dcnode-id="7559" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="7554" id="cite_ref-:9_60-1"><a data-dcnode-id="7555" href="#cite_note-:9-60"><span data-dcnode-id="7556" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7553" instrument_node=""> Chen and some other conservative leaders including </span><a data-dcnode-id="7551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Li_Xiannian" title="Li Xiannian"><span data-dcnode-id="7552" instrument_node="">Li Xiannian</span></a><span data-dcnode-id="7550" instrument_node=""> never visited </span><a data-dcnode-id="7548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen" title="Shenzhen"><span data-dcnode-id="7549" instrument_node="">Shenzhen</span></a><span data-dcnode-id="7547" instrument_node="">, the leading </span><a data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_economic_zones_of_China" title="Special economic zones of China"><span data-dcnode-id="7546" instrument_node="">special economic zone</span></a><span data-dcnode-id="7544" instrument_node=""> championed by Deng.</span><sup class="reference" data-dcnode-id="7541" id="cite_ref-:9_60-2"><a data-dcnode-id="7542" href="#cite_note-:9-60"><span data-dcnode-id="7543" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7540" instrument_node="">

 2020)"><span data-dcnode-id="7424" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7420" instrument_node="">]</span></sup><span data-dcnode-id="7418" instrument_node="">

n</span></a><span data-dcnode-id="7404" instrument_node="">, representing the "</span><a data-dcnode-id="7402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen_speed" title="Shenzhen speed"><span data-dcnode-id="7403" instrument_node="">Shenzhen speed</span></a><span data-dcnode-id="7401" instrument_node="">".</span></div></div></div><span data-dcnode-id="7397" instrument_node="">
</span><p data-dcnode-id="7360"><span data-dcnode-id="7396" instrument_node="">On the other hand, the conservative elders led by </span><a data-dcnode-id="7394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chen_Yun" title="Chen Yun"><span data-dcnode-id="7395" instrument_node="">Chen Yun</span></a><span data-dcnode-id="7393" instrument_node=""> called to strike a balance between too much laissez-faire market economy and retaining state control over key areas of the economy. Chen Yun helped preserve the economy by preventing policies that would have damaged the interests of special interest groups in the government bureaucracy.</span><sup class="reference" data-dcnode-id="7390" id="cite_ref-Naughton_114_65-0"><a data-dcnode-id="7391" href="#cite_note-Naughton_114-65"><span data-dcnode-id="7392" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7389" instrument_node=""> Corruption and increased inflation increased discontent, contributing to the </span><a class="mw-redirect" data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiananmen_Square_protests_of_1989" title="Tiananmen Square protests of 1989"><span data-dcnode-id="7388" instrument_node="">Tiananmen Square protests of 1989</span></a><span data-dcnode-id="7386" instrument_node=""> and a conservative backlash after that event which ousted several key reformers and threatened to reverse many of Deng's reforms.</span><sup class="reference" data-dcnode-id="7383" id="cite_ref-Naughton,_Barry_2008,_105_66-0"><a data-dcnode-id="7384" href="#cite_note-Naughton,_Barry_2008,_105-66"><span data-dcnode-id="7385" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7382" instrument_node=""> However, Deng stood by his reforms and in 1992, he affirmed the need to continue reforms in his </span><a class="mw-redirect" data-dcnode-id="7380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping%2527s_Southern_Tour" title="Deng Xiaoping's Southern Tour"><span data-dcnode-id="7381" instrument_node="">southern tour</span></a><span data-dcnode-id="7379" instrument_node="">.</span><sup class="reference" data-dcnode-id="7376" id="cite_ref-Naughton_114_65-1"><a data-dcnode-id="7377" href="#cite_note-Naughton_114-65"><span data-dcnode-id="7378" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7375" instrument_node=""> He also reopened the </span><a data-dcnode-id="7373" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_Stock_Exchange" title="Shanghai Stock Exchange"><span data-dcnode-id="7374" instrument_node="">Shanghai Stock Exchange</span></a><span data-dcnode-id="7372" instrument_node=""> in November 1990 which was closed by Mao 40 years earlier, while the </span><a data-dcnode-id="7370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shenzhen_Stock_Exchange" title="Shenzhen Stock Exchange"><span data-dcnode-id="7371" instrument_node="">Shenzhen Stock Exchange</span></a><span data-dcnode-id="7369" instrument_node=""> was founded in December 1990.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="7362" style="white-space:nowrap;"><span data-dcnode-id="7368" instrument_node="">[</span><i data-dcnode-id="7364"><a data-dcnode-id="7365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="7366" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="7367" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="7363" instrument_node="">]</span></sup><span data-dcnode-id="7361" instrument_node="">
</span></p><p data-dcnode-id="7337"><span data-dcnode-id="7359" instrument_node="">Although the economy grew quickly during this period, economic troubles in the inefficient </span><a class="mw-redirect" data-dcnode-id="7357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_sector" title="State sector"><span data-dcnode-id="7358" instrument_node="">state sector</span></a><span data-dcnode-id="7356" instrument_node=""> increased. Heavy losses had to be made up by state revenues and acted as a drain upon the economy.</span><sup class="reference" data-dcnode-id="7353" id="cite_ref-67"><a data-dcnode-id="7354" href="#cite_note-67"><span data-dcnode-id="7355" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7352" instrument_node=""> Inflation became problematic in 1985, 1988 and 1992.</span><sup class="reference" data-dcnode-id="7349" id="cite_ref-Naughton,_Barry_2008,_105_66-1"><a data-dcnode-id="7350" href="#cite_note-Naughton,_Barry_2008,_105-66"><span data-dcnode-id="7351" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7348" instrument_node=""> Privatizations began to accelerate after 1992, and the </span><a data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Private_sector" title="Private sector"><span data-dcnode-id="7347" instrument_node="">private sector</span></a><span data-dcnode-id="7345" instrument_node=""> grew as a percentage of GDP. China's government slowly expanded recognition of the private economy, first as a "complement" to the state sector (1988) and then as an "important component" (1999) of the </span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_market_economy" title="Socialist market economy"><span data-dcnode-id="7344" instrument_node="">socialist market economy</span></a><span data-dcnode-id="7342" instrument_node="">.</span><sup class="reference" data-dcnode-id="7339" id="cite_ref-68"><a data-dcnode-id="7340" href="#cite_note-68"><span data-dcnode-id="7341" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7338" instrument_node="">
</span></p><span data-dcnode-id="7336" instrument_node="">
</span><h3 data-dcnode-id="7325"><span data-dcnode-id="7335" id="1993.E2.80.932005"></span><span class="mw-headline" data-dcnode-id="7333" id="1993–2005"><span data-dcnode-id="7334" instrument_node="">1993–2005</span></span><span class="mw-editsection" data-dcnode-id="7326"><span class="mw-editsection-bracket" data-dcnode-id="7331"><span data-dcnode-id="7332" instrument_node="">[</span></span><a data-dcnode-id="7329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DChinese_economic_reform%26action%3Dedit%26section%3D5" title="Edit section: 1993–2005"><span data-dcnode-id="7330" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7327"><span data-dcnode-id="7328" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7324" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7306"><div class="thumbinner" data-dcnode-id="7307" style="width:252px;"><a class="image" data-dcnode-id="7322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShanghai_Skyline%2C_Dec2014.jpg"><img alt="" class="thumbimage" data-dcnode-id="7323" data-file-height="1260" data-file-width="1890" decoding="async" height="167" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Shanghai_Skyline%252C_Dec2014.jpg/250px-Shanghai_Skyline%252C_Dec2014.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Shanghai_Skyline%2C_Dec2014.jpg/375px-Shanghai_Skyline%2C_Dec2014.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Shanghai_Skyline%2C_Dec2014.jpg/500px-Shanghai_Skyline%2C_Dec2014.jpg 2x" width="250"></a><span data-dcnode-id="7321" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7308"><div class="magnify" data-dcnode-id="7319"><a class="internal" data-dcnode-id="7320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AShanghai_Skyline%2C_Dec2014.jpg" title="Enlarge"></a></div><span data-dcnode-id="7318" instrument_node="">The </span><a data-dcnode-id="7316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lujiazui" title="Lujiazui"><span data-dcnode-id="7317" instrument_node="">Lujiazui</span></a><span data-dcnode-id="7315" instrument_node=""> financial district of </span><a data-dcnode-id="7313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pudong" title="Pudong"><span data-dcnode-id="7314" instrument_node="">Pudong</span></a><span data-dcnode-id="7312" instrument_node="">, </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai" title="Shanghai"><span data-dcnode-id="7311" instrument_node="">Shanghai</span></a><span data-dcnode-id="7309" instrument_node="">, the financial and commercial hub of modern China</span></div></div></div><span data-dcnode-id="7305" instrument_node="">
</span><p data-dcnode-id="7290"><span data-dcnode-id="7304" instrument_node="">In the 1990s, Deng allowed many radical reforms to be carried out. In the beginning, Chen supported Deng, carried out and implemented many of the influential reforms that made a generation of Chinese richer. But later, Chen realized that the state still needed an active iron hand involvement in the market to prevent the private sector from becoming untamable. Chen's criticism of Deng's later economic reforms was widely influential within the Communist Party and was reflected in the policies of China's leaders after Deng. Chen's theories supported the efforts of </span><a data-dcnode-id="7302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiang_Zemin" title="Jiang Zemin"><span data-dcnode-id="7303" instrument_node="">Jiang Zemin</span></a><span data-dcnode-id="7301" instrument_node=""> and </span><a data-dcnode-id="7299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hu_Jintao" title="Hu Jintao"><span data-dcnode-id="7300" instrument_node="">Hu Jintao</span></a><span data-dcnode-id="7298" instrument_node=""> to use state power to provide boundaries for the operation of the market, and to mediate the damage that capitalism can do to those who find it difficult to benefit from the free market. Chen's notion of the CPC as a "ruling party" was central to the redefinition of the role of the Party in Jiang Zemin's </span><a data-dcnode-id="7296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Represents" title="Three Represents"><span data-dcnode-id="7297" instrument_node="">Three Represents</span></a><span data-dcnode-id="7295" instrument_node="">. In 2005, on the occasion of the hundredth anniversary of Chen's birth, the Party press published, over the course of several weeks, the proceedings of a symposium discussing Chen's contribution
