exports amounted to around 10% of national income. In effect then,
the Polish government had been converted into a kind of comprador
bourgeoisie, managing the extraction of profits from the Polish
working class and exporting them to the West.</span></p><span data-dcnode-id="311" instrument_node="">
</span><p class="quoteb" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">
“Poland’s debt to capitalist countries increased in dollar
terms 23.5-fold over the decade [1970-80]. As early as 1975 the
value of debt to capitalist countries was almost twice as high
as the annual receipts from exports to these countries  .. the
debt service to exports ratio amounted then to 32%. ... in 1980
the debt service charges alone exceeded the export value.”</span></p><span data-dcnode-id="308" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="307" instrument_node="">
The</span><b data-dcnode-id="305"><span data-dcnode-id="306" instrument_node=""> German Democratic Republic</span></b><span data-dcnode-id="304" instrument_node=""> (DDR) was regarded as the
healthiest of these economies, and yet it was facing a continual
drain of thousands of workers and professional people fleeing
to the West. On the other hand, the Rumanian people lived in poverty,
as </span><a data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/biographies.htm%23Ceausescu"><span data-dcnode-id="303" instrument_node="">Ceausescu</span></a><span data-dcnode-id="301" instrument_node=""> sought to pay
off Rumania’s debts while frittering
the country’s resources on personal extravagances. 
</span><a data-dcnode-id="300" name="3-1"></a></p><span data-dcnode-id="298" instrument_node="">
</span><h3 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">Poland</span></h3><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">
At the same time as blood was being shed in Tien An Mien Square,
an historic election was taking place to elect 35% of seats in
the parliament in Poland. </span></p><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">
Attempts at relaxation of the martial law imposed in 1981 had
not succeeded in dampening the resistance of the Polish workers.
Nor had it succeeded in dealing with the economic crisis, as Poland
slid further into debt to the Western banks. </span></p><span data-dcnode-id="289" instrument_node="">
</span><p class="quoteb" data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">
“Poland’s hard-currency debt amounted to $26.8 billion in
1984, $29.3b in 1985, $33.5b in 1986, $39.2 in 1987 and $41.4b
in 1989. The ratio of debt to exports was 4.8:1 in 1985, 5.15:1
in 1986 and 5.5:1 in 1987. With its interests payments amounting
to 41% of export earnings in 1985, Poland came third in the league
of top debtors after Argentina and Chile ... the total credits
extended to Poland during the years 1971 – 87 amounted to $47.5b,
while the total of interest and amortisation payments worked out
at $50.6b. Thus, Poland repaid over $3b more than it received,
and nonetheless, its debt, the world’s fourth largest, approached
$40b.”</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23178"><sup class="enote" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">[178]</span></sup></a></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">
Formally speaking the bureaucracy defended social ownership, but
already, the share of personal income coming from the private
sector had increased from about 8% in 1980 to about 10% in 1983
to about 20% in 1988. About half of private sector employment
was “illegal.”</span></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">
The Polish United Workers Party (PUWP) had become more and more
remote from its original working class base. In the late 1980s,
workers accounted for only 24% of the Party members, while of
2.1 million Party members, 900,000 occupied executive positions
in the state administration and the economy.
</span></p><p data-dcnode-id="276"><span data-dcnode-id="277" instrument_node="">
The leaders of Solidarity had been released from prison and allowed
to regroup. Rising food prices in 1988 had led to increased protests,
and in April 1989 talks between the government and Solidarity
reached an agreement on June 18 1989.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">
Now confident that there would be no Soviet intervention, Solidarity
swept the board.</span></p><span data-dcnode-id="272" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">
The new Parliament still contained a majority of Deputies appointed
by the old system. General Jaruzelsky was re-elected President,
but offered Solidarity seats in a coalition government. Three
weeks later General Czeslaw Kiszczak resigned as Prime Minister
and Tadeusz Mazowiecki, a founder member of Solidarity, became
Prime Minister of a coalition government –  the first Prime Minister
in Eastern Europe not a member of the Communist Party. Jacek Kuron,
who had entered Solidarity as a revolutionary Marxist, and had
been associated with the IS and other revolutionary groups in
the West, was appointed Labour Minister.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">
The Finance Minister was Leszek Balcerowicz, a former Polish United
Workers Party member who had gone to the US to study economics.
His ‘shock treatment’ for Poland began with the blessing of the IMF
on January 1 1990, with 2000% pa inflation and a foreign debt
of $40,000m. The IMF blessing came with a $1.5b loan and a stay
on loan repayments. All state subsidies (formerly worth one third
of the nations’ economy) were abolished, price controls lifted,
wages frozen by means of penal taxation of wage rises above the
norm, interest rates set very high and the zloty made convertible
at a bargain price.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">
The result was an immediate 20% drop in the standard of living
with prices rising 80% in January alone. There was however no
initial political backlash against this from the working class
which had rioted against price rises in 1956, 1970, 1976 and 1988.</span></p><span data-dcnode-id="263" instrument_node="">
</span><p data-dcnode-id="261"><span data-dcnode-id="262" instrument_node="">
Solidarity had become transformed from a mass movement of opposition
to Stalinism, to a party of government. In the process, its membership
had declined from 10 million in 1980 to 1 million. At the same
time, Solidarity had become home to a spectrum of political tendencies
from one extreme to the other.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">
Solidarity’s ‘popularity’ was estimated at 59% in November 1989.
By February 1990, it was estimated at 48%. The Communist Party,
now called Social Democracy of the Polish Republic, was at  2%.</span></p><span data-dcnode-id="257" instrument_node="">
</span><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">
The impact of the ‘Shock Treatment’ was dramatic. 100,000 car
owners handed in their registration because they could no longer
afford to run a car. Queues at petrol stations and taxi ranks
disappeared, since no-one can afford them. The price of gas and
electricity increased 400%. Farmers were now driving into Warsaw
to sell their produce direct to the public in the streets, after
enjoying free use of the state co-operative equipment. The state-owned
stores could not compete, with prices 50-100% above the street
price.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="249"><span data-dcnode-id="253" instrument_node="">
In August 1990, </span><i data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">The Guardian’s</span></i><span data-dcnode-id="250" instrument_node=""> Victor Keegan described
Warsaw as like one giant car boot sale. Poles travelled to Germany
and Russians came to Poland to cash in on price differences. While
inflation fell to 3.4% by June, unemployment had grown steadily
from nil to 568,000 in July. The state budget surplus had reached
6% of GDP and the exchange rate fixed in January had been held,
and the foreign trade surplus leapt to about half a billion US$
a month. However, industrial output had fallen by about 30% and
living standards by about 30% on average. On average, families
were now spending 60% of their income on food, compared to 40%
before. Virtually the only public spending going on was the building
of hundreds of new churches.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">
80% of agriculture was always privately owned in Poland, and the
farmers benefited from the liberalisation of trade. The major
manufacturing industries remained public property and there was
little interest in purchasing them. The management of these enterprises
responded to the loss of state subsidies by sacking workers and
upping prices to compensate.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="240"><span data-dcnode-id="244" instrument_node="">
Despite the considerable pressure that the Catholic Church was
able to exert, Poles defeated a referendum promoted by the Church
to ban abortion. A fierce protracted struggle between the Church
on the one and Polish women’s groups on the other, arrived at
the passing of an abortion law in February 1993. Abortion was
made legal only in the case of a threat to the life of the woman
or as a result of rape or incest, and doctors liable to two years’
prison for illegal abortions. </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23179"><sup class="enote" data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">[179]</span></sup></a></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">
In December 1990, following the withdrawal of General Jaruzelski,
Lech Walesa was elected President in an election marked by an
upsurge of anti-Semitism. Walesa’s statements that he was “100
per cent Pole, going back generations” were interpreted as
aimed at winning the anti-Semitic vote, and gain a hold over Prime
Minister Mazowiecki who was becoming less enthusiastic about the
Polish ‘shock therapy’. Mazowiecki later resigned as Prime Minister,
and formed the Democratic Union with Jacek Kuron  and Hanna Suchocka.</span></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">
The right-wing parties governed during 1992 under Jan Olszewski,
and tore themselves to ribbons in crazy right-wing disputes and
conflicts with their natural allies in the Church and business
community, while inflation had climbed to 43% p.a.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="232" instrument_node="">
The privatisation program combined with the organised sabotage
of the public sector proceeded apace. The private sector, excluding
co-operatives and agriculture employed 13% of the workforce in
1989, 34% in 1992. Agriculture, co-operatives and the private
sector jointly employed 60% of the workforce by 1992, producing
almost 50% of GDP – a statistic which interestingly demonstrates
that even at this stage, the private sector was still less productive
than the struggling public sector!  </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23180"><sup class="enote" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">[180]</span></sup></a></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">
Hanna Suchocka then formed a government which continued the privatisation
of the Polish economy, even if at a slower pace than under Andrzej
Olechowski’s  and Leszek Balcerowicz’s ‘shock therapy’.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="219"><span data-dcnode-id="223" instrument_node="">
Commenting on the failure of the West to help Poland make a success
of its transition to capitalism, in particular the continued protectionist
policies of the EEC in relation to trade with Poland, Walesa commented
in an interview with </span><i data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Le Monde</span></i><span data-dcnode-id="220" instrument_node=""> in September 1991: </span></p><span data-dcnode-id="218" instrument_node="">
</span><p class="quoteb" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">
‘That’s capitalist philosophy for you. We were naive: we believed
all those slogans and were sold down the river. But now everyone
is going to have to pick up the bill, including the West. </span></p><span data-dcnode-id="215" instrument_node="">
</span><p class="quoteb" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">
‘Yes, I am still a capitalist and shall remain so’.</span></p><span data-dcnode-id="212" instrument_node="">
</span><p data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">
In the October 1991 general election, voter turn-out was only
40%, the worst turn-out in any general election in Europe this
century. 18 parties won seats, and no party received more than
14 per cent of the vote. The largest vote was for Mazowiecki and
Kuron’s Democratic Union. The main Stalinist party finished second,
and the Liberal Democrats, which included all the main architects
of the ‘shock therapy’, won only 8% of the vote. Eventually, Jan
Olszewski formed a minority government of the ‘centre-right’.</span></p><span data-dcnode-id="209" instrument_node="">
</span><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">
In April 1992, talks aimed at forming a coalition government which
would command a majority and end the incessant and unproductive
political in-fighting broke down, and the government remained
more or less impotent. Walesa dissolved parliament in June 1993
and set elections for September 1993.</span></p><span data-dcnode-id="206" instrument_node="">
</span><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">
The September 1993 elections gave 300 of the 460 seats in the
Sejm to the SLD (Democratic Left Alliance) and the PSL (Polish
Peasants Party), which between them received 35 per cent of the
vote. The Democratic Union received 12 per cent. Lech Walesa’s
supporters in the BBWR were the main recipients of right-wing
votes, but received only  6 per cent, for 21 seats in the Sejm.</span></p><span data-dcnode-id="203" instrument_node="">
</span><p data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">
The Democratic Left Alliance (SLD) was an umbrella organisation
under which members and supporters of the former ruling Stalinist
parties regrouped. The front included the Social-Democratic Workers
Party, the Democratic Union of Women, the Polish Socialist Party,
the Polish United Workers Party, United Peasants Party.</span></p><span data-dcnode-id="200" instrument_node="">
</span><p data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">
The Polish Peasants’ Party (PSL), led by the new Prime Minister
Waldemar Pawiak was the successor of the ‘party’ set up under
Red Army occupation in 1945.  </span></p><span data-dcnode-id="197" instrument_node="">
</span><p data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">
The Democratic Union (UD) led by Jacek Kuron, the newspaper Editor
Adam Michnik, Prime Minister Hanna Suchocka, Tadeusz Mazowiecki
and Bronislaw Geremek was the principal representative of “economic
rationalism” in the election.</span></p><span data-dcnode-id="194" instrument_node="">
</span><p data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">
The Nonpartisan Reform Support Bloc (BBWR), the grouping most
closely identified with President Lech Walesa, was led by former
finance minister Andrzej Olechowski.</span></p><span data-dcnode-id="191" instrument_node="">
</span><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">
Prior to the election, Wieslaw Chrzanowski, leader of the right-wing
Christian National Union, commented: </span></p><span data-dcnode-id="188" instrument_node="">
</span><p class="quoteb" data-dcnode-id="183"><span data-dcnode-id="187" instrument_node="">
“Poland is not threatened by a return of communism, even
if left-wing parties win the election,“ in fact opinion polls
have shown that the SLD was the most popular choice among Poland’s
entrepreneurs. Slawomir Majman of the Warsaw Voice said that ‘people
are not afraid of the return of the Stalinist regime because they
are disillusioned with the right and the centre. ... the left-wing
rhetoric [of the SLD] is now replaced by liberal economic concepts
with a small touch of socialism .. they would be kicked out of
the [British] Labour Party as dangerous right-wingers’. </span><a data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23181"><sup class="enote" data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">[181]</span></sup></a></p><span data-dcnode-id="182" instrument_node="">
</span><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">
The SLD has promised to increase pensions, assist some state industries
and are committed to maintaining legal abortion. Deputy leader
of the SLD, Leszek Miller said that ‘We want to even out the sectors
of the Polish economy. Until now the private sector was privileged
and the public sector was repressed’. Measures would include removal
of penalties on state industries paying overtime, and credits
to assist export.</span></p><span data-dcnode-id="179" instrument_node="">
</span><p data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">
The IMF has told the new government that it must keep the government’s
budget deficit below 5% to continue receiving assistance and Miller
said ‘We will not do anything without prior consultation with
the IMF’.</span></p><span data-dcnode-id="176" instrument_node="">
</span><p data-dcnode-id="174"><span data-dcnode-id="175" instrument_node="">
Poland’s economy is already well down the capitalist road. The
service sector has grown to 46% of GDP at the expense of manufacturing
and agriculture. Unemployment stood at 14% at the end of 1993.
Trade with OECD countries increased by a factor of 2.5 over 1990-2.</span></p><span data-dcnode-id="173" instrument_node="">
</span><p data-dcnode-id="168"><span data-dcnode-id="172" instrument_node="">
In the first stage of their struggle, the workers fought simply
for democracy. There was not an economic objective at this stage,
in fact the government was selling the economy off and putting
the country into hock to foreign capital, and where possible workers
opposed this privatisation drive. In the second stage, because
of the lack of any alternative political leadership, and disillusionment
with the kind of “socialism” advocated by the bureaucracy,
capitalism presented itself and the masses accepted this perspective
as the only alternative on offer. In the third stage, beginning
in 1990, the masses realised that what they had got did not correspond
to what they had been fighting for. In about mid-1992 a fourth
stage began as the workers turned against the government, and
since July 1992 strikes began to spread and affect whole branches
of industry. Inter-union strike committees began to form, including
a national Interfactory Committee. </span><a data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23182"><sup class="enote" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">[182]</span></sup></a></p><span data-dcnode-id="167" instrument_node="">
</span><p data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">
The demands of Interfactory were for social welfare, health, housing
and education policies and policies to reduce unemployment, an
end to privatisation, steps against the take-over by foreign capital,
a minimum wage, for those responsible for the economic crisis
to be put on trial, and an end to taxes which penalise state-owned
enterprises. This was a ‘syndicalist’ phase.</span></p><span data-dcnode-id="164" instrument_node="">
</span><p data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">
The September 1993 election marked the beginning of a new fifth
phase as workers began to look for political solutions. The first
beneficiary of this new turn was the Polish Stalinists. But the
Stalinists offered no significant alternative to the policies
carried out by the right and centre. The only argument between
these leaders was over the speed of change and the degree of attention
to be paid to social welfare policies.</span></p><span data-dcnode-id="161" instrument_node="">
</span><p data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">
Neither the IMF, the Polish entrepreneurs nor Polish workers have
any fear that the Stalinists will be willing or able to impose
the kind of regime instituted under Red Army diktat. The Polish
working class has now begun its struggle for a new leadership
which has an alternative to restoration of capitalism. The Polish
economy is now already predominantly capitalist in character,
although many enterprises still remain in state hands. The problem
of building a planned, socialist economy cannot be solved in Poland,
while the big capitalist powers dominate the world market. However,
the Polish state is very weak, and the only barrier to workers’
power in Poland is the crisis of working class leadership.</span></p><span data-dcnode-id="158" instrument_node="">
</span><p data-dcnode-id="155"><span data-dcnode-id="157" instrument_node="">
The Polish working class is seething with political discussion
and organisation. Situated mid-way between Russia and Western
Europe, the working class of Poland seems likely to continue its
role in leading the way for political change in the region.
</span><a data-dcnode-id="156" name="3-2"></a></p><span data-dcnode-id="154" instrument_node="">
</span><h3 data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Hungary</span></h3><span data-dcnode-id="151" instrument_node="">
</span><p data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">
In May 1988, Karoly Grosz succeeded the ageing Janos Kadar as
leader of the Socialist Workers Party of Hungary (CP), and one
third of the Central Committee were replaced. In January 1989,
multi-party elections were promised for the following year. In
April 1989, the body of Imre Nagy was exhumed from its unmarked
plot, where he was buried along with other leaders of the 1956
revolt and animal corpses from the zoo. Officially, the reburial
was for humanitarian reasons. But at the same time the government
established an ‘historical sub-committee’ to review the events
of 1956, Nagy’s trial and execution in 1958 and report to the
government. </span></p><span data-dcnode-id="148" instrument_node="">
</span><p data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">
The sub-committee found that the Uprising was a ‘popular uprising’
and that Nagy and the others were ‘victims of illegal show trials’.
Accordingly, Nagy was reburied at a ceremony on the 31st anniversary
of his execution, attended by returned exiles and current political
leaders alike.</span></p><span data-dcnode-id="145" instrument_node="">
</span><p data-dcnode-id="140"><span data-dcnode-id="144" instrument_node="">
With the HSWP losing members rapidly, the top leadership decided
to steer the country to a new course in order to avoid the disintegration
of the Party. Imre Pozsgay, the leading reformer in the Politburo,
closely associated with Gorbachev, told </span><i data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">The Guardian</span></i><span data-dcnode-id="141" instrument_node="">: ‘The
Party cannot split – it would not be a split, but disintegration’.
It was more sensible for the reformers to stay and fight from
within, he said. If some sort of consensus could not be achieved,
there could be ‘a catastrophe, very precisely and very frankly,
like the one in 1956. But dissatisfaction and anger are increasing,
as living standards deteriorate. If there is not a peaceful transition,
it will come out in rebellion’. He said that the HSWP leadership
had drawn the lesson from Poland’s recent experience ‘that a country
cannot be made to function by force’.</span></p><span data-dcnode-id="139" instrument_node="">
</span><p data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">
Hungarian TV broadcast interviews with Dubcek, which could be
viewed in Czechoslovakia, much to the annoyance of the Czech leadership.
And on May 3, Hungarian troops ceremonially dismantled the barbed
wire ‘iron curtain’ along the already fairly porous border with
Austria. Pieces of the wire later fetched a good price as souvenirs.
The opening of the border placed additional pressure on its Warsaw
Pact neighbours, especially East Germany, where the escalating
exodus to the West via Hungary, threatened to de-populate the
entire country. Hungarian support for the ethnic Hungarian minority
in the Transylvanian area of Rumania was also helping to exacerbate
tensions in Rumania.</span></p><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">
The Social-Democratic Party, forcibly absorbed by the HSWP in
the 1940s, was relaunched, as was the Smallholders Party, which
had won a majority in the 1945 election, and whose sole policy
was now restoration of land nationalised since 1945. The Ferenc
Munnich Society, based on the workers’ militia which the government
dissolved in October, organised itself to oppose the ‘reform’
process. A majority of the HSWP later joined forces with the Social-Democrats,
leaving behind a rump in the ‘People’s Party’. In these combinations,
the workers’ organisations remained predominant. </span></p><span data-dcnode-id="133" instrument_node="">
</span><p data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">
Following elections in May 1990, a ‘centre-right’ coalition government
of the ‘Hungarian Democratic Forum’, headed by Jozsef Antall,
assumed government with 42 per cent of the vote. The Stalinist
rump, which opposed full-on return to capitalism, received less
than the 4 per cent required for representation in the Parliament,
although the ‘reformed’ Stalinists in the Hungarian Socialist
Party received about 10 per cent of the vote. These elections
were remarkable for the calmness and equanimity with which they
were conducted, given the profound historical questions which
were apparently at stake in the vote.</span></p><span data-dcnode-id="130" instrument_node="">
</span><p data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">
Hungary’s smooth transition to capitalism has helped it to a situation
whereby more than half of all Western investment in the former
Stalinist bloc goes to Hungary, while trade with former COMECON
countries has shrunk from 49 per cent in 1989 to 25 per cent in
1991, and Hungary continued to press its application to join the
EEC. Inflation is running at about 30 per cent, and the living
standards of workers and pensioners has declined. The benefits
of the market economy have gone to the former elite and those
who have benefited from the compensation vouchers handed out to
farmers and the Church for property nationalised in the 1940s.</span></p><span data-dcnode-id="127" instrument_node="">
</span><p data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">
Blessed because of its imperial past, with an absence of national
divisions within its own borders and a national leadership with
a highly developed propensity to flow with the tide, the Hungarian
counter-revolution went smoothly. The return to capitalism solved
nothing for the Hungarian workers however. </span></p><span data-dcnode-id="124" instrument_node="">
</span><p data-dcnode-id="121"><span data-dcnode-id="123" instrument_node="">
Parliamentary elections were held in June 1994. Following the
trend which had been set in Poland, the Hungarian Stalinists,
regrouped as the Hungarian Socialist Party, increased from 33
to 209 seats – an absolute majority of 16 seats, while support
for the Democratic Forum cut their representation from 165 to
37 seats. The HSP was led by Gyula Horn, who had collaborated
in the crushing of the 1956 Uprising and was Foreign Minister
in 1989. The election victory was immediately followed by attempts
to lure other parties into a “coalition,” in order to
share responsibility for the continued impoverishment of the Hungarian
working class that would follow from the HSP’s policy of “social
market economy.”
</span><a data-dcnode-id="122" name="3-3"></a></p><span data-dcnode-id="120" instrument_node="">
</span><h3 data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">Bulgaria</span></h3><span data-dcnode-id="117" instrument_node="">
</span><p data-dcnode-id="112"><span data-dcnode-id="116" instrument_node="">
</span><a data-dcnode-id="114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/biographies.htm%23Zhivkov"><span data-dcnode-id="115" instrument_node="">Todor Zhivkov</span></a><span data-dcnode-id="113" instrument_node=""> was Secretary of the Bulgarian CP from 1956 and
loyally towed the Moscow line. Unlike the countries of Eastern
Europe for whom Russia was the ‘invader from the East’, historically
Bulgaria has always viewed Russia as a friend and liberator, dating
back to its liberation from the Ottoman Empire  in 1878, courtesy
of the Russian Army. </span></p><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">
In 1984, Zhivkov initiated a program of ‘assimilation’ of the
Turkish ethnic minority which comprised 10 per cent of the population.
This involved suppression of their language and customs, backed
up by severe repressive measures. Opposition to this repression
grew and in July 1989 led to a mass exodus and deportation of
Turks across the border into Turkey. The Turkish minority received
widespread sympathy from the majority population as the pressure
of changes in neighbouring Hungary, East Germany and the USSR
encouraged the opposition currents.</span></p><span data-dcnode-id="108" instrument_node="">
</span><p data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">
In  January 1988 Zhivkov began what was claimed to be a Bulgarian
version of perestroika, but in reality very little at all changed.</span></p><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">
Zhivkov’s Bulgaria had suffered not only politically by the changes
in the USSR and Eastern Europe, but economically it had suffered
in the redistribution of trade out of COMECON, and the loss of
the favourable trading relations Bulgaria had enjoyed with the
USSR during the Brezhnev period. By 1989, electricity was available
only on alternate hours even in the main cities and all commodities
were in drastically short supply.</span></p><span data-dcnode-id="102" instrument_node="">
</span><p data-dcnode-id="100"><span data-dcnode-id="101" instrument_node="">
In October 1989, opposition groups such as the Green group Ecoglasnost
held public meetings and rallies under the glare of foreign television
cameras, and found to their joy that they were not broken up.
Soon, demands for liberalisation escalated, and forced Zhivkov’s
resignation in November 1989. The new General Secretary of the
Party was Petar Mladenov. An organiser for Ecoglasnost commented
on Mladenov’s appointment: ‘Mladenov is certainly the most pronounced
liberal of the whole Politburo, which makes his democratic election
by them very, very unlikely, unless Mladenov had a strong backer
– the Soviet Union’. In other words, the implication was that
like Honecker in East Germany the previous month, Zhivkov had
been ‘leant on’ by Gorbachev. The alternative hypothesis, that
the Bulgarian Stalinists were themselves voluntarily handing over
power to a bourgeois opposition still too weak to seize it from
them, amounts to the same thing.</span></p><span data-dcnode-id="99" instrument_node="">
</span><p data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">
The opposition immediately began to organise demonstrations calling
for the sacking of the entire government. The speed with which
the opposition movement built up with its demands for political
liberalisation, showed the strength of the influence of the movement
sweeping across the whole Soviet bloc. Bulgaria had never had
a democratic tradition, a strong bourgeoisie or an anti-Russian
sentiment. </span></p><span data-dcnode-id="96" instrument_node="">
</span><p data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">
Seizing its opportunity, the opposition grouped itself into Citizens
Initiative, led by a long-standing dissident Lyobomir Sobajiev.
In January 1990, Zhivkov was placed under house arrest facing
charges of corruption, abuse of power and inciting ethnic hatred.
Elections held in June led to a victory for the renamed Stalinist
party, the Bulgarian Socialist Party. Mladenov, the ‘liberal’,
resigned after admitting that he had sent tanks to suppress a
demonstration in December.</span></p><span data-dcnode-id="93" instrument_node="">
</span><p data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">
The BSP tried to persuade the opposition parties to join them
in a coalition, but the opposition parties refused. In January
1991, a wave of increasingly violent strikes and demonstrations
forced the BSP to resign and Dimitar Popov, a former judge, formed
a coalition government without the BSP. The Stalinist deputies
still had a majority of seats, but exercised their discretion
by not opposing opposition proposals.</span></p><span data-dcnode-id="90" instrument_node="">
</span><p data-dcnode-id="88"><span data-dcnode-id="89" instrument_node="">
Further demonstrations forced a further election. Popov removed
price controls, and prices immediately leapt, but the measure
did succeed in coaxing the peasants into letting their produce
on to the market. Wages were held down with a penal tax against
employers granting wage rises, and a bill was passed for the return
of nationalised land to its former owners. The currency was floated,
eliminating the ‘black market’ in foreign exchange. The result
was a blossoming in petty trade, but no noticeable investment
in production, which remained the domain of the nationalised economy.</span></p><span data-dcnode-id="87" instrument_node="">
</span><p data-dcnode-id="84"><span data-dcnode-id="86" instrument_node="">
At the elections in October 1991, the opposition grouping Union
of Democratic Forces won the largest vote (36%), and formed a
coalition government in alliance with the Turkish Movement for
Rights and Freedoms (6%). The BSP received about 30 per cent,
and the remaining 20 or so parties failed to reach the 4 per cent
required for representation.
</span><a data-dcnode-id="85" name="3-4"></a></p><span data-dcnode-id="83" instrument_node="">
</span><h3 data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">Czechoslovakia</span></h3><span data-dcnode-id="80" instrument_node="">
</span><p data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">
Gustav Husak resigned as First Secretary of the Czechoslovakian
Communist Party in December 1987, succeeded by Milos Jakes. The
modest reform programme, emulating Soviet policy, begun during
Husak’s later days was ended. </span></p><span data-dcnode-id="77" instrument_node="">
</span><p data-dcnode-id="72"><span data-dcnode-id="76" instrument_node="">
A series of peaceful protests by dissidents in January 1989 was
met with such severe repression, meted out to passers-by as liberally
as to the protesters, that many formerly loyal citizens were polarised
into opposition. It was the last straw. A campaign for the release
of the dissident playwright, </span><a data-dcnode-id="74" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/biographies.htm%23Havel"><span data-dcnode-id="75" instrument_node="">Vaclav Havel</span></a><span data-dcnode-id="73" instrument_node="">, provided the nucleus around which opposition to the regime could polarise.</span></p><span data-dcnode-id="71" instrument_node="">
</span><p data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">
A petition calling for his release started with 700 signatures
of leading intellectuals collected in a few days, and continued
to circulate, collecting thousands of signatures, ‘from the top
down’. </span></p><span data-dcnode-id="68" instrument_node="">
</span><p data-dcnode-id="66"><span data-dcnode-id="67" instrument_node="">
Jiri Menzel, a film-maker who had been loyally serving the regime
for 20 years said: </span></p><span data-dcnode-id="65" instrument_node="">
</span><p class="quoteb" data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">
‘I can no longer bear to sit here enjoying my creature comforts
while someone of greater intellectual honesty than myself is having
to pay the penalty in prison. Havel isn’t against the state. He’s
someone who is more progressive and more useful to our republic
than all those who, in their heart of hearts, are against the
regime but accept and even exploit the situation. </span></p><span data-dcnode-id="62" instrument_node="">
</span><p class="quoteb" data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">
‘Havel is a person who is prepared to express his opinions and
then take the consequences. ... I’m an opportunist, I prefer to
take the line of least resistance ... Havel is more honest than
I am.’</span></p><span data-dcnode-id="59" instrument_node="">
</span><p data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">
Referring to the changes taking place in Hungary, Poland and the
USSR, he said: </span></p><span data-dcnode-id="56" instrument_node="">
</span><p class="quoteb" data-dcnode-id="50"><span data-dcnode-id="55" instrument_node="">
‘They have demonstrated that change is actually possible. The
government’s response to the January demonstrations was terribly
hamfisted. It revealed weak points. ... It’s no longer possible
to keep quiet. ... It’s like the Middle Ages here’.  </span><a data-dcnode-id="52" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23183"><sup class="enote" data-dcnode-id="53"><span data-dcnode-id="54" instrument_node="">[183]</span></sup></a><span data-dcnode-id="51" instrument_node="">
</span></p><span data-dcnode-id="49" instrument_node="">
</span><p data-dcnode-id="47"><span data-dcnode-id="48" instrument_node="">
The opposition was predominantly in the Czech republic; the Slovaks
were more or less by-standers in this process.</span></p><span data-dcnode-id="46" instrument_node="">
</span><p data-dcnode-id="44"><span data-dcnode-id="45" instrument_node="">
The official May Day parade was joined by protesters waving portraits
of Gorbachev and chanting ‘Freedom’. The usual police violence
was applied. Inspired by the disintegration of the Stalinist regimes
in the neighbouring countries, the protests continued to grow.
Eventually, mass protests led by the opposition coalition, Civic
Forum, began on 19 November 1989 with 250,000 people on the streets
of Prague, and continued until Jakes and the whole Politburo resigned
on 24 November. Alexander Dubcek joined Havel before exuberant
crowds in Wenceslas Square, and elections were fixed for December.</span></p><span data-dcnode-id="43" instrument_node="">
</span><p data-dcnode-id="41"><span data-dcnode-id="42" instrument_node="">
Vaclav Havel was elected President on 29 December 1989 and immediately
arranged a visit to Washington where he addressed both Houses,
invited the Pope to visit Prague and applied for Czechoslovakia
to join the EEC. Soviet troops stationed in Czechoslovakia took
the train home in February 1990.</span></p><span data-dcnode-id="40" instrument_node="">
</span><p data-dcnode-id="38"><span data-dcnode-id="39" instrument_node="">
It later emerged that members of the Czech Security forces, the
SDB, were wanting to fight on, but were leant on by the KGB. Walter
Komarek, later Deputy Prime Minister, had visited Moscow some
months before the overturn, and was invited to speak to the Central
Committee, where Gorbachev told him that Milos Jakes was ‘unacceptable’.
The army commander, Miroslav Vacek, who afterwards became Defence
Minister, had ensured that the army remained on the side-lines.</span></p><span data-dcnode-id="37" instrument_node="">
</span><p data-dcnode-id="35"><span data-dcnode-id="36" instrument_node="">
The election of the playwright Vaclav Havel as President in Czechoslovakia
was the most extreme case of a phenomenon which was seen in all
of the over-turns which took place in Eastern Europe in 1989.
The prominent role of intellectuals in this stage reflected the
lack of any perspective in the movement beyond the overthrow of
Stalinism – the regaining of national political self-determination.</span></p><span data-dcnode-id="34" instrument_node="">
</span><p data-dcnode-id="32"><span data-dcnode-id="33" instrument_node="">
The masses were fed up to the back teeth with the double-talk,
the patronising moralism, cowardice, hypocrisy and stultifying
bureaucracy of the Stalinist ‘nomenklatura’. Intellectuals like
Havel represented the opposite. Havel did not have any particular
economic program, and if he did, no-one was asking him to talk
about it.</span></p><span data-dcnode-id="31" instrument_node="">
</span><p data-dcnode-id="29"><span data-dcnode-id="30" instrument_node="">
As soon as the political process was ‘domesticated’, the intellectuals
and ‘dissidents’ were sidelined, a process which was most extreme
in East Germany.</span></p><span data-dcnode-id="28" instrument_node="">
</span><p data-dcnode-id="26"><span data-dcnode-id="27" instrument_node="">
At the elections held in June, all parties advocated a return
to capitalism, with the Czech Civic Forum and the smaller Slovakian
Public Against Violence winning large majorities. Already capitalism
was getting under way with a 200% increase in pick-pocketing and
a boom in pornography and prostitution.</span></p><span data-dcnode-id="25" instrument_node="">
</span><p data-dcnode-id="23"><span data-dcnode-id="24" instrument_node="">
In elections in June 1992 however, both Civic Forum and PAV, which
had led the overthrow of Stalinism, failed to receive the 5 per
cent necessary for representation in the Federal parliament. The
‘reformed’ Stalinists on the other hand got 14 per cent for their
Czech party and 16 per cent for their Slovak party. Tensions between
the two republics were exacerbated when the Czechs gave a majority
to the right-wing Vaclav Klaus, while the Slovaks voted overwhelmingly
for the ‘left-wing’ Slovak nationalist, Vladimir Meciar. The economic
reforms instituted by the Federal government under Klaus had led
to unemployment three times as high in Slovakia than in the Czech
lands, and only 10 per cent of sought-after foreign investment
had gone into Slovakia. Meciar’s response was ‘If there are two
reform programs, then there will be two states’. Klaus’s reply
was in effect “good riddance.”</span></p><span data-dcnode-id="22" instrument_node="">
</span><p data-dcnode-id="20"><span data-dcnode-id="21" instrument_node="">
In January 1993 the two Republics parted, Vaclav Havel being re-elected
as President of the reluctant new Czech Republic. With no foreign
investment in an economy formerly closely linked to the Soviet
economy, Slovakia’s economy has since stagnated with unemployment
at 14% in 1994. The Czech economy has enjoyed substantial foreign
investment and modest growth.</span></p><span data-dcnode-id="19" instrument_node="">
</span><p class="skip" data-dcnode-id="17"><span data-dcnode-id="18" instrument_node="">&nbsp;</span></p><span data-dcnode-id="16" instrument_node="">
</span><hr class="end" data-dcnode-id="15"><span data-dcnode-id="14" instrument_node="">
