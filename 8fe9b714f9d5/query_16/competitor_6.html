</span><meta content="width=device-width, initial-scale=1" data-dcnode-id="998" name="viewport"><title data-dcnode-id="996">The Collapse of Eastern Europe</title><span data-dcnode-id="995" instrument_node="">
</span><meta content="Analysis of the collapse of the Stalinist States in Eastern Europe following close on the June 1989 events in China" data-dcnode-id="994" name="DESCRIPTION"><span data-dcnode-id="993" instrument_node="">
</span><meta content="Andy Blunden" data-dcnode-id="992" name="AUTHOR"><span data-dcnode-id="991" instrument_node="">
</span><meta content="Stalinism, Czechoslovakia, Hungary, Poland, East Germany, Yugoslavia, Albania, Rumania, China" data-dcnode-id="990" name="KEYWORDS"><span data-dcnode-id="989" instrument_node="">
</span><link data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/css/works-red.css&amp;raw" rel="stylesheet" type="text/css"><span data-dcnode-id="987" instrument_node="">
</span><span data-dcnode-id="985" instrument_node="">
</span><span data-dcnode-id="984" instrument_node="">
</span><p class="title" data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Stalinism: It’s Origin and Future. Andy Blunden 1993</span></p><span data-dcnode-id="981" instrument_node="">
</span><a data-dcnode-id="980" name="0-0"></a><span data-dcnode-id="979" instrument_node="">
</span><h1 data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">The Collapse of Eastern Europe</span></h1><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">
After the death of the ageing </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/biographies.htm%23Chernyenko"><span data-dcnode-id="974" instrument_node="">Konstantin Chernyenko</span></a><span data-dcnode-id="972" instrument_node="">, Mikhail Gorbachev became General Secretary of the Communist Party of the
Soviet Union in March 1985. Gorbachev launched his campaign for
glasnost  (openness), perestroika (restructuring) and ‘New Thinking’ 
in international relations, at the 27th Congress of CPSU in February
1986.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">
Gorbachev’s period in office from March 1985 to August 1991 brought
to an end Stalinist rule in the Soviet Union after 70 years, almost
50 years in Eastern Europe. What was the state of the Soviet Union
when Mikhail Gorbachev took the helm?</span></p><span data-dcnode-id="967" instrument_node="">
</span><a data-dcnode-id="966" name="1-0"></a><span data-dcnode-id="965" instrument_node="">
</span><h2 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">I: The Crisis in the Soviet Economy</span></h2><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">
Aggregate economic data do not well reflect the situation in the
Soviet economy. The bureaucratic planning mechanisms are oriented
to quantity, but its crisis was most sharply expressed in quality
rather than quantity, and in the imbalance between quantities
rather than in the aggregate. Nevertheless, the stagnation afflicting
the Soviet economy during a period in which the majority of capitalist
economies experienced a considerable expansion can be measured.</span></p><span data-dcnode-id="959" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="958" instrument_node="">
The </span><i data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Left Business Observer</span></i><span data-dcnode-id="955" instrument_node=""> published the following growth figures
(per cent per annum) which show that, with the exception of the
war years, the Soviet Union grew faster than the US until the
mid-70s:</span><a data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23166"><sup class="enote" data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">[166]</span></sup></a></p><span data-dcnode-id="950" instrument_node="">
</span><span data-dcnode-id="949" instrument_node="">
</span><span data-dcnode-id="941" instrument_node="">
</span><span data-dcnode-id="933" instrument_node="">
</span><span data-dcnode-id="925" instrument_node="">
</span><span data-dcnode-id="917" instrument_node="">
</span><span data-dcnode-id="909" instrument_node="">
</span><span data-dcnode-id="901" instrument_node="">
</span><span data-dcnode-id="893" instrument_node="">
</span><table align="center" data-dcnode-id="891" width="40%"><tbody data-dcnode-id="892"><tr data-dcnode-id="942"><td class="textc" data-dcnode-id="947" width="60%"><span data-dcnode-id="948" instrument_node="">      period      </span></td><td class="data" data-dcnode-id="945" width="20%"><span data-dcnode-id="946" instrument_node="">USSR</span></td><td class="data" data-dcnode-id="943" width="20%"><span data-dcnode-id="944" instrument_node="">US</span></td></tr><tr data-dcnode-id="934"><td class="textc" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">1929 – 1940:</span></td><td class="data" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">4.5</span></td><td class="data" data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">2.2</span></td></tr><tr data-dcnode-id="926"><td class="textc" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">1941 – 1944:</span></td><td class="data" data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">-2.4</span></td><td class="data" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">16.0</span></td></tr><tr data-dcnode-id="918"><td class="textc" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">1945 – 1960:</span></td><td class="data" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">6.5</span></td><td class="data" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">1.5</span></td></tr><tr data-dcnode-id="910"><td class="textc" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">1961 – 1965:</span></td><td class="data" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">5.0</span></td><td class="data" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">4.5</span></td></tr><tr data-dcnode-id="902"><td class="textc" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">1966 – 1975:</span></td><td class="data" data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">4.0</span></td><td class="data" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">1.5</span></td></tr><tr data-dcnode-id="894"><td class="textc" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">1976 – 1988:</span></td><td class="data" data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">2.0</span></td><td class="data" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">6.7</span></td></tr></tbody></table><span data-dcnode-id="890" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">
The following table shows the growth rate (per cent per annum)
of labour productivity according to official Soviet data, [compared
with CIA figures] for labour productivity and per capita GNP at
real prices:</span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23167"><sup class="enote" data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">[167]</span></sup></a></p><span data-dcnode-id="884" instrument_node="">
</span><span data-dcnode-id="883" instrument_node="">
</span><span data-dcnode-id="875" instrument_node="">
</span><span data-dcnode-id="867" instrument_node="">
</span><span data-dcnode-id="859" instrument_node="">
</span><span data-dcnode-id="851" instrument_node="">
</span><span data-dcnode-id="843" instrument_node="">
</span><table align="center" data-dcnode-id="841" width="40%"><tbody data-dcnode-id="842"><tr data-dcnode-id="876"><td class="textc" data-dcnode-id="881" width="60%"><span data-dcnode-id="882" instrument_node="">      period      </span></td><td class="data" data-dcnode-id="879" width="20%"><span data-dcnode-id="880" instrument_node="">labour productivity</span></td><td class="data" data-dcnode-id="877" width="20%"><span data-dcnode-id="878" instrument_node="">per capita GNP</span></td></tr><tr data-dcnode-id="868"><td class="textc" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">1966 – 1970</span></td><td class="data" data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">6.8 [3.2]</span></td><td class="data" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">3.0</span></td></tr><tr data-dcnode-id="860"><td class="textc" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">1971 – 1975</span></td><td class="data" data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">4.6 [2.0]</span></td><td class="data" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">4.0</span></td></tr><tr data-dcnode-id="852"><td class="textc" data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">1976 – 1980</span></td><td class="data" data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">3.3 [1.4]</span></td><td class="data" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">3.0</span></td></tr><tr data-dcnode-id="844"><td class="textc" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">1981 – 1983</span></td><td class="data" data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">3.3 [1.7]</span></td><td class="data" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">2.0</span></td></tr></tbody></table><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">
These figures do not take account of the fact that Soviet industry
absorbs a far greater proportion of its output in the production
process itself, and consumes far more energy and raw materials
per unit output than its equivalent in the advanced capitalist
countries. By the mid-1980s, the Soviet economy was at a dead end.</span></p><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">
Abel Agenbagyan, one of Gorbachev’s circle of academic advisers
wrote that ‘unprecedented stagnation and crisis occurred during
the period 1979-82’ and in many sectors of the economy production
actually fell, and ‘overall the 1981-85 plan was not fulfilled
and the country fell into a serious economic situation.</span></p><span data-dcnode-id="834" instrument_node="">
</span><p class="quoteb" data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">
‘Negative tendencies developed in many sectors, stagnation began
and economic imbalances intensified. ... </span></p><span data-dcnode-id="831" instrument_node="">
</span><p class="quoteb" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">
‘The USSR produces 4.5 times more tractors than the USA. What
for? Crop output in our country is a third of that in the USA.
But we produce only half as many trailers and mounted equipment
as we need.</span></p><span data-dcnode-id="828" instrument_node="">
</span><p class="quoteb" data-dcnode-id="823"><span data-dcnode-id="827" instrument_node="">
‘Up to a quarter of the output of many industries is useless.
The tractor paradox is also true of lorries. Eighty per cent of
them have 4 – 5 tons carrying capacity. This is needed by the
Likhachev and Gorky motor works, but not by the national economy.
In the whole world only three per cent of automobiles have such
a capacity. No wonder Zil lorries run half empty’. </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23168"><sup class="enote" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">[168]</span></sup></a></p><span data-dcnode-id="822" instrument_node="">
</span><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">
The 1986 programme drafted by Gorbachev however,  aimed for ‘the
planned and all-round perfection (!) of socialism, for Soviet
society’s further advance to communism through the country’s accelerated
socio-economic development’ by means of perestroika. </span></p><span data-dcnode-id="819" instrument_node="">
</span><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">
Gorbachev, in his report on perestroika to the Central Committee
of the CPSU on 27 January 1987, promised that the policy of perestroika
would double the national income and make the productivity of
the economy equal to that of the West by the end of the century.
In terms of productivity the Soviet Union was at that time 35
to 40% of that of the USA, 40 to 50% that of other developed Western
countries. </span></p><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">
But by the end of 1990, national income had fallen by 3% over
the year; labour productivity had fallen by 2% and the printing
of money owing to inflation had doubled over what had been planned.</span></p><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">
On July 22 1987, </span><i data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The Guardian</span></i><span data-dcnode-id="809" instrument_node=""> published a document secretly
circulated amongst some of the Soviet elite in November 1986 by
“The Movement for Socialist Renewal” – ‘desperately
worried patriots and socialists who are convinced that the Gorbachev
reforms hitherto enacted had not gone far enough’:</span></p><span data-dcnode-id="807" instrument_node="">
</span><p class="quoteb" data-dcnode-id="801"><span data-dcnode-id="806" instrument_node="">
‘The Soviet Union lags 10 to 15 years behind the capitalist countries
in its economic development and this lag is growing’ ... ‘the
Soviet people’s standard of living is one of the lowest in the
industrially developed world, including the member nations of
COMECON ... Low pay is vitiated by difficult living conditions.
Chronic shortage of basic foodstuffs like meat, milk and butter
in a number of areas, and frequent stoppages of the products altogether
in others, have a bad effect on people’s health, especially children’s,
and create an atmosphere of nervousness and uncertainty with people
wasting their free time, and even taking time off work to search
for food and to stand in queues’. Their conclusion: ‘the USSR
is now on the path of becoming one of the undeveloped nations’.</span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23169"><sup class="enote" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">[169]</span></sup></a><span data-dcnode-id="802" instrument_node="">
</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">
In 1987-88, the Reagan administration in the US launched a massive
escalation in the arms race known as ‘star wars’. This policy
aimed to put weapons into orbit which would provide an effective
shield against an attack by intercontinental missiles. In reality,
even for the USA this was a prohibitively expensive strategy.
For the USSR it meant that if its nuclear arsenal was to maintain
even the appearance of being an effective deterrent, there would
have to be a massive increase in investment. The military and
weapons sector of the economy was however already absorbing a
crippling proportion of the country’s resources. </span></p><span data-dcnode-id="797" instrument_node="">
</span><p data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">
In January 1988, Gorbachev terminated centralised direction of
the economy, and Soviet enterprises henceforth had to be self-financing
on the basis of “cost accounting.” While consumer prices
remained fixed, the directors of enterprises could set the price
of their products. Given that the markets for most industrial
products were dominated by a single producer, and were still generally
isolated from the world market, this system lacked any mechanism
of control or regulation, was wide open to corruption and, in
short, was unworkable.</span></p><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">
In 1989, the growth rate fell to 2.4% in gross material output
but in net material production this amounted to  1.5%, which fell
to a mere 0.7% per capita. In 1989, output actually declined in
coal, oil, steel, chemical fertilisers, automobiles; agricultural
deliveries to the state fell 30% after a fall of 37% in 1988.</span></p><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="790" instrument_node="">
</span><i data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">TASS</span></i><span data-dcnode-id="787" instrument_node="">, the official newsagency, declared in April 1991 that
‘the consumer market is disorganised, the financial system is
unbalanced, the purchasing power of the rouble is diminishing’.</span></p><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="784" instrument_node="">
Quentin Peel, Moscow correspondent of the </span><i data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Financial Times</span></i><span data-dcnode-id="781" instrument_node="">
reported on 12 April 1991 that:</span></p><span data-dcnode-id="779" instrument_node="">
</span><p class="quoteb" data-dcnode-id="773"><span data-dcnode-id="778" instrument_node="">
‘the oil industry is collapsing, with production falling by almost
10% last year. Its leaders warn that the world’s greatest oil
producer could be a net oil importer by 1994. And oil accounts
for 60% of all export revenues.’ </span><a data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23170"><sup class="enote" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">[170]</span></sup></a><span data-dcnode-id="774" instrument_node="">
</span></p><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">
By the middle of 1991, the economy had plummeted drastically.
Foreign trade was down by 32 per cent. The 1991 budget deficit
planned to be 26 billion roubles was now estimated at 125 billion.
GNP in the first quarter of 1991 was down by 10 per cent. Living
standards were estimated to have fallen by between 15 and 20 per
cent.</span></p><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">
In other words, all Gorbachev’s efforts to ‘restructure’ the Soviet
economy totally failed to resolve the economic crisis. In fact,
it got worse.</span></p><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">
Nothing in the perestroika programme of decentralisation or the
campaign for glasnost fundamentally altered the basis of the Soviet
economy. The mainstream economy remained driven not by the needs
of consumption, but by bureaucratic direction. The bureaucracy
doggedly held on to its power and privileges; bureaucratic planning
continued as before, only more disorganised and more corrupted.
Without an alternative political leadership, facing an entrenched
and repressive bureaucracy, workers’ democracy was never a serious
possibility under Gorbachev.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">
Throughout this period the people were admonished with appeals
to improve efficiency and productivity along with the kind of
empty cliches which had for decades been stuffed down the throats
of people in the Stalinist countries – about “criticism and
self-criticism,“ “truthful assessment of our history,“
developing “socialist democracy” and so on. All of which
could only serve to deepen the cynicism of the Soviet workers
and the arrogance of the bureaucracy.</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">
While the official economy gradually ground to a standstill, the
level of graft and corruption escalated. During the Gorbachev
period, corruption and illegal trading actually more and more
came out into the open as the authority of the state declined.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">
In his book </span><i data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Secrets of a Corrupt Society</span></i><span data-dcnode-id="753" instrument_node="">, Konstantin Simis
described the scandalous relations that developed over decades
of Stalinist rule: </span></p><span data-dcnode-id="751" instrument_node="">
</span><p class="quoteb" data-dcnode-id="745"><span data-dcnode-id="750" instrument_node="">
‘Massive corruption at the district level of the Party apparatus
has forged close ties between it and the system of organised crime
that has come into existence in the Soviet Union which has permeated
the political power centres of the districts as well as the administrative
apparatus, the legal system and key economic systems. Although
not conceived as such by its creators, this Soviet variety of
organised crime is derived from, and has become an organic part
of the very Communist Party of the Soviet Union’. </span><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23171"><sup class="enote" data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">[171]</span></sup></a><span data-dcnode-id="746" instrument_node="">
</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">
He adds that ‘at the very top is the Politburo – those 13-15 people
who make up the highest organ in the party apparatus. Without
restrictions and completely free of charge, they get anything
they want in limitless quantity. A special office exists in the
Kremlin devoted to providing the Politburo with their benefits’. </span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">
In the Gorbachev era, the nepotism, bribery and other criminal
activities developed even further. Bureaucrats built fortunes
through speculation, thieving and exploiting the chaos in distribution
and shortages. The “mafia” flourished. </span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">
In the </span><i data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Moscow News</span></i><span data-dcnode-id="734" instrument_node=""> of September 21-26 1990, Alexander Kabakov
gave a picture of the Soviet mafia millionaires, operating everywhere
in Soviet life with graft and speculation and with a thousand
links to the bureaucratic apparatus. ‘Anyone starting a co-op’,
he wrote, ‘whether a gentleman or a racketeer, must have a Mercedes,
a video, a leather jacket and pack of Marlboro in his pocket’.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="727"><span data-dcnode-id="731" instrument_node="">
By 1989 about 700 ‘joint ventures’ had been set up in the Soviet
Union. In </span><i data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">The struggle for power in Soviet Society</span></i><span data-dcnode-id="728" instrument_node="">, David
Mandel wrote that: </span></p><span data-dcnode-id="726" instrument_node="">
</span><p class="quoteb" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">
 ‘most of Moscow’s “joint venture” construction companies
are too busy importing and selling computers to put up any buildings.
And why should they, when their profits can reach 4000%? As a
minister in the Latvian government put it, “cooperatives
and joint enterprises are often oriented not toward the production
of consumer goods but toward their redistribution. From the state’s
pockets into their own. ... Mention must also be made of the party
apparatus, many of whose former and current members are using
their connections and illegally accumulated wealth to go into
business. In Leningrad, for example, the once mighty regional
party apparatus has been reduced to 37 people. But they keep busy
renting out offices to cooperatives, private banks and foreign
companies in the Smolny Institute, an historic landmark and prime
piece of real estate that rightfully belongs to the people. They
have also turned one of the Committee’s hotels into a joint venture’.
</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">
Sections of the bureaucracy have been preparing for years for
 the day when private enterprise is legal – bleeding public funds,
building real financial empires inside and outside the country,
and above all controlling the means of distribution. </span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">
A fundamental mechanism of this accumulation has been the bureaucracy’s
control over distribution. One example: confronted by the terrible
shortage of cheese in Moscow markets, the police raided the distribution
centre (in the USSR all products go to centres from which they
are daily distributed to shops). They discovered that although
the cheese factories were producing normally, officials re-sold
almost everything that came in, which was in turn re-sold at several
times the price fixed by the state. </span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">
Thus while breakdowns and delays in the production system meant
unparalleled suffering for the vast majority of the people, the
bureaucratic mafias were making an excellent profit. 
</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">
Is it any wonder that the masses of the Soviet Union treated with
contempt Gorbachev’s remonstrations to sacrifice, harbouring instead
a seething hatred of the elite who continued to enjoy luxuries
and privileges equal to those of Western capitalists?</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">
The immunity of the bureaucracy from any kind of political or
economic control; their privileged life-style, inherited from
one generation to the next; their parasitism – all contributed
to a bureaucratic culture utterly remote from the conditions of
the masses, arrogant and deeply cynical.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">
These words of Mikhail Gorbachev in his book, </span><i data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Perestroika</span></i><span data-dcnode-id="705" instrument_node="">
published by Fontana in the US in 1987 to the considerable personal
profit of Gorbachev show just how sensitive Gorbachev was to the
experiences of Soviet workers:</span></p><span data-dcnode-id="703" instrument_node="">
</span><p class="quoteb" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">
‘To do something better, you must work an extra bit harder. I
like this phrase: working an extra bit harder. For me it is not
just a slogan, but a habitual state of mind, a disposition. Any
job one takes on must be grasped and felt with one’s soul. ...</span></p><span data-dcnode-id="700" instrument_node="">
</span><p class="quoteb" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">
‘The high degree of social protection in our society. On the one
hand it is doubtless a benefit and a major achievement of ours.
On the other hand, it makes some people spongers. ... dishonest
people try to exploit these advantages of socialism ... they work
poorly, shirk and drink hard’. </span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">
In 1989 the miners threatened strike action against the price
rises and abysmal living standards. How would these words have
appealed to them? 10,000 miners had died of accident and lung
disease since 1980. Journalist Peter Pringle, interviewed a Ukrainian
miner, Igor, in Donbass: </span></p><span data-dcnode-id="694" instrument_node="">
</span><p class="quoteb" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">
‘The average life expectancy at the Oktyabraskaya mine is 38 years,
and each miner who has worked more than 10 has lung disease’.
His flat was ‘two small rooms and a tiny kitchen and bathroom
for himself, his wife and two children. His boy, 10, dreams of
being a pilot or an astronaut, says Igor, “But it’s hopeless.
To enter an institute of higher learning you have to bribe a party
official and I don’t have the money.”’</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">
The boss of the official steel workers’ union, Mr Kamchanka, who
accused the strikers of “unrealistic demands” told Pringle:</span></p><span data-dcnode-id="688" instrument_node="">
</span><p class="quoteb" data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">
“Our equipment in these industries is from the sixties and
seventies. Some of it has been thirty years without an overhaul”.
Pringle commented that Mr Kamchenka’s office desk ‘would not fit
in Igor’s kitchen’.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">
The Soviet Pacific island of Sakhalin is 10,000 km from Moscow,
has a population of 700,000, is rich in raw materials and has
been used as a prison from Czarist days until the 1950s. The Washington
Post’s David Remnick visited Sakhalin in 1987. He told a story
of how he saw a few hundred thousand salmon rotting in shore line
nets, while the fishermen were waiting for a telegram from Moscow
before they could make a move.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">
In September 1989, Phillipe Pons of </span><i data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Le Monde</span></i><span data-dcnode-id="678" instrument_node=""> visited Sakhalin
and saw the first impact of perestroika. A trickle of Japanese
tourists were visiting the island, and there were hopes that a
deal could be signed with Japanese oil companies for the extraction
of the island’s vast reserves. The Democratic Movement had stood
candidates in the March elections and got 65% of the vote, with
a program of seeking economic independence for the island and
environmental protection. 150 CP members had since resigned in
protest at the slowness of the reforms.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">
In 1991, Pons returned to Sakhalin, and interviewed Valentin Fedorov.
Fedorov was now president of the Executive Committee of Sakhalin.
He called himself the “governor”: </span></p><span data-dcnode-id="673" instrument_node="">
</span><p class="quoteb" data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">
“We’re building capitalism in Sakhalin! We’re using forceps
to assist the birth of a market economy on the ruins of collectivism!”</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">
Pons said:</span></p><span data-dcnode-id="667" instrument_node="">
</span><p class="quoteb" data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">
‘The Sakhalin authorities’ laxity allows all sorts of criminals,
mainly South Koreans, to operate freely. They traffic in various
goods, including secondhand Japanese cars. The traffickers are
often better armed than the local militia: with arms factories
facing dwindling sales, surplus production has been “recycled”
in the private sector. ... drug dealers have moved on to the scene.
... A thriving parallel market has sprung up, and with a new breed
of “fixers” ... Many people have set up shop in their
own flats. The biggest losers have been those who have nothing
to barter, in other words the military and minor officials.</span></p><span data-dcnode-id="664" instrument_node="">
</span><p class="quoteb" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">
‘But foreign currency is the lifeblood of the new economy. Those
who have made arrangements with foreign companies have a head
start: with an advance of several thousand dollars, they are able
to “generate” enough capital in roubles on the black
market to be able to set up in business. They repay their partners
as soon as profits start coming in.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p class="quoteb" data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">
‘There are currently 23 joint ventures in Sakhalin, mainly in
the seafood processing sector. In most cases, foreign partners
chip in only with a small initial stake. What they are really
interested in is acquiring the right to exploit the region’s natural
resources’.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">
As inflation undermined the monetary system, Soviet enterprises
increasingly resorted to barter. The managers of the Sverdlovsk
transformer factory are reported to have supplied the Uralmash
tractor factory in exchange for piping, scrap metal, kitchen fittings
and rest home passes. Suppliers of consumer goods increasingly
preferred to put products on to the “black market,”
rather than into state shops who had to pay fixed prices.</span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">
A J Sherbakov, one of the leaders of the Social Democratic Party
in Leningrad described how the bureaucrats used the system to
enrich themselves:</span></p><span data-dcnode-id="652" instrument_node="">
</span><p class="quoteb" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">
“People who have had leading positions in the apparatus go
to say Britain and register a company for 120 British pounds.
Then they come back and say “Hello, I am a representative
of a British company.” They make contact with bureaucrats
they know in some big enterprise, which provides them an office.
The state enterprise puts in a few million rubles and the “foreign
representative” forks out 20 pounds. The juridically this
becomes a 50-50 relationship.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p class="quoteb" data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
“The new enterprise produces nothing, employs no-one, but
it makes its director and his accomplices rich. The tax laws are
different for joint ventures, and so other big enterprises hide
their assets there. And this new “enterprise” is supplied
with sought-after things, such as metals.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p class="quoteb" data-dcnode-id="641"><span data-dcnode-id="645" instrument_node="">
“They just steal. When there is a delivery of 10 tons of
prime aluminium, a ton is simply classed as scrap. The little
“joint venture” gets it. It is then taken abroad by
various routes, exchanged for computers or Mercedes, which are
brought into the country and sold to bureaucrats.” </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23172"><sup class="enote" data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">[172]</span></sup></a></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">
What was the significance of the spread of bureaucratic corruption?
And why was it growing? The growth of crime and corruption was
rooted in the economic bankruptcy of the bureaucratic system –
its inability to develop the forces of production. In fact, the
magnitude of the illegal “black” economy grew over the
eighties to a point where it was overshadowing the “official”
economy. And yet the “official” economy could not operate
without the aid of the “black” economy.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">
Up until the Gorbachev period, private enterprise remained illegal
in the Soviet Union, except for a sharply circumscribed legal
private sector. This legal private sector amounted to 9% of GNP
in 1970, 18% in 1986, almost entirely in agriculture, handicrafts
and services.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">
With the bureaucratic method of economic management, with the
total suppression of workers’ democracy and with prices set by
the state without regard for supply and demand, economic objectives
were determined not by the needs of the economy as such, but by
the requirements of “preserving the system” of bureaucratic
privilege.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">
As a result, the economy uniformly declined from the middle to
late sixties onwards, after the completion of the post-war period
of reconstruction. Gradually the economy became incapable of supplying
the elementary needs of the population. Under these conditions
an illicit “black” economy grew up in the ‘pores’ of
the legal, bureaucratically regulated economy. The bribery and
corruption of the officials, their privileged life-style, and
their immunity from any kind of social control or restraint, facilitated
the growth of organised crime. Indeed, the emergent criminal class
merged imperceptibly into the bureaucracy.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">
In this way, a petit-capitalist economy increasingly flourished
underneath the official economy. The nature of the process is
typified by the practice of bureaucrats who deliberately created
shortages by hoarding or stealing products, and then made a killing
selling the products on the “black market.”</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
Under these conditions, it is hardly surprising that the resistance
of the Soviet working class to intensified exploitation remained
stubborn, even in the face of a collapse in living standards and
economic paralysis. </span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="617"><span data-dcnode-id="621" instrument_node="">
What was taking place was the birth of a new capitalist class.
One is reminded of the period of ‘primitive accumulation’ of the
English bourgeoisie described by Marx in </span><i data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Capital</span></i><span data-dcnode-id="618" instrument_node="">. Because
of the connection between organised crime and the state bureaucracy,
the Soviet police proved unable to check the growth and spread
of theft, robbery, drug peddling, prostitution, fraud, protection
rackets, and so on.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">
So much for perestroika. Glasnost, or ‘openness’, was the other
side of Gorbachev’s programme of restructuring. What was meant
was that the bureaucracy should discuss the crisis more ‘openly’,
in order to co-opt the working class, the better to persuade them
to ‘work an extra little bit harder’. Glasnost was also essential
in order to de-centralise, corporatise and privatise the economy.
None of these measures impinged upon the policy of bureaucratic
command however. What was involved was the method of implementing
bureaucratic direction.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">
Gorbachev’s policy of openness recognised the fact that the state
had lost all authority in the eyes of the people. Like the prisoner
who hopes that a full confession and a plea of guilty will elicit
a more lenient sentence from the judge, Gorbachev hoped to weather
the unavoidable storm. Exposure followed exposure in the Soviet
press, but no amount of criticism and exposure could halt practices
that were endemic to the economic and social system, nor palliate
the hatred of the masses.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">
But far from being encouraged to take responsibility for regenerating
the economy, the working masses were becoming more alienated than
ever before. Every autumn since the Revolution, urban workers
had gone out to the countryside to help the peasants bring in
the harvest. Now that the state was unable to compel people to
go, no-one went. </span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">
In August 1990, Soviet agriculture was blessed with bumper crops,
but these crops were to rot in the fields despite critical food
shortages in the cities. Three hundred million tonnes of grain
was waiting to be harvested, but there were dire shortages of
machinery, fuel, spare parts and storage facilities. One in five
combine harvesters and 25,000 railway wagons were standing idle.
With the breakdown in regional organisation and the authority
of the Communist Party, the usual appeal to workers and youth
from the cities to help with the harvest was falling upon deaf
ears. Workers in the agricultural machinery factories had been
leaving their jobs because they were not receiving wages, and
were looking for work in privately run cooperatives. Soldiers
had to be drafted in to save what could be saved.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">
The mainstream economy was grinding to a halt, but already one
third of the USSR’s food was being produced on private plots,
though these occupied only 3 per cent of arable land. The peasants
had no reason to bring in more than they needed to satisfy their
own needs, since nothing was available to buy with the proceeds
of sale to the state. </span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">
During 1990, there was growing disillusionment among Western business
people on the prospects for capitalist penetration into the Soviet
Union. In December 1990, </span><i data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">The Guardian</span></i><span data-dcnode-id="597" instrument_node=""> wrote:</span></p><span data-dcnode-id="595" instrument_node="">
</span><p class="quoteb" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">
‘Nine months ago in the West it became unfashionable to talk of
a Marshall Plan to help the USSR. Most businessmen travelling
to the Ukraine or Moldavia hoping to reap the rewards of being
pioneer investor already faced immense political, legal and cultural
difficulties.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p class="quoteb" data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">
‘Small and medium-sized companies have generally fallen by the
wayside, and the MacDonald restaurants and Estee Lauder shops
in the centre of Moscow are regarded as mere window dressing for
a market economy, but multi-nationals able to take a longterm
perspective did still offer a chance that the Soviets would move
to a market economy.’</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">
But in February 1991, </span><i data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">The Economist</span></i><span data-dcnode-id="585" instrument_node=""> wrote: </span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">
‘The foreign businesses and banks that will have to play a big
part in any Soviet revival are busily downgrading their expectations
of the Soviet market. Quicker than Western politicians, western
businessmen and bankers have realised how bankrupt Soviet economic
policy is. ... the push for radical reform now comes not from
the central government but from the Republics’. </span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">
In the US, there were suggestions for the jettisoning of Gorbachev.
Imperialism was discovering that the workers’ state in the USSR
could not be taken over, it had to be smashed.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="576" instrument_node="">
Over the space of several years, Gorbachev’s rhetoric of ‘restructuring’
and ‘perfecting socialism’ became transformed into the call for
a complete restoration of market relations. </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23173"><sup class="enote" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">[173]</span></sup></a></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">
In June 1991, Gorbachev claimed to have “confronted the past
decisively” and to have initiated a “vast historical
period during which the administrative command system is being
replaced.” “History is no longer a continuous process
of building socialism,” but instead required a “rapid
but orderly transition to the market” to construct “the
model of an open economy.” No longer were Gorbachev and his
academic advisers even attempting to justify in the name of socialism
what they were trying to do. </span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">
In July 1991, Gorbachev proposed that the Communist Party formally
abandon Marxism and Leninism and the USSR apply to join the IMF.
The process of formal abandonment of the most basic raisons d’etre
of Communist Parties, which had begun in Europe thirty years before,
had now come home to the Soviet Union.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">
The Soviet economy could only extricate itself from crisis by
integrating itself with the world market. This was impossible
without a convertible ruble, which in turn was impossible without
the aid of imperialism. Gorbachev’s Prime Minister, Valentin Pavlov,
told the Duma that if nothing was done production would fall by
20 per cent in 1991, and ‘the number of unemployed may reach 18
million, and a social explosion could erupt before the year is
out’, but on the other hand a rapid move to the market would lead
to a 30 per cent drop in output and unemployment of 30 million. </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23174"><sup class="enote" data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">[174]</span></sup></a></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">
Now imperialism began to exert real pressure on Gorbachev for
total privatisation of the Soviet economy and withheld food aid
and loans to force the pace.</span></p><span data-dcnode-id="556" instrument_node="">
</span><a data-dcnode-id="555" name="2-1"></a><span data-dcnode-id="554" instrument_node="">
</span><h2 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">II: Tien An Men Square</span></h2><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">
While perestroika was proving ineffective in resolving the economic
crisis in the Soviet Union, with a consequent continuation in
the decline of the influence of the Soviet Union, the policy of
glasnost was sending messages to its ‘allies’.</span></p><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">
In May 1989, Gorbachev visited Peking – the first ever visit to
China from the leader of the world’s first workers’ state. To
the workers and youth of China Gorbachev provided the most powerful
symbol possible for the demand for political liberalisation in
China. Furthermore, his visit guarantied the attention of the
world on the demonstrations that gathered in support of a “Chinese
glasnost.”</span></p><span data-dcnode-id="545" instrument_node="">
</span><a data-dcnode-id="544" name="2-2"></a><span data-dcnode-id="543" instrument_node="">
</span><h3 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Background</span></h3><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">
Since the de-collectivisation of land in 1978, the Chinese bureaucracy
had been encouraging the hire of labour power and the accumulation
of capital. Between 1979 and 1984 productivity had increased at
a rate of 9.5% annually, and the average standard of living of
peasants had doubled during this period. Productivity on collective
land was only 1/5 to 1/7 that of private plots. During the same
period there had also been a rapid growth of non-agricultural
enterprises in the countryside. While 200 million peasants still
lived below the poverty line, petit-capitalism flourished and
the better-off sections had grown. The government opened the way
to the import of consumer goods, white goods, televisions, etc,
upon which to spend the profits. Inflation reached the level of
30% as a result of the inflationary policies necessary to finance
the foreign trade deficit with which the loyalty of the rising
petit-bourgeoisie was being bought. Between 1979 and 1985, 20%
of the rural workforce either moved to the city or moved into
rural industries. Unemployment was now growing and swelling the
population of the cities with discontented workers.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">
After 1985, the clamp down on agricultural trade and sale of land
locked agriculture into a system of single family farms which
was not productive. The resulting increase in prices forced the
government to take measures which then reduced the profitability
of agriculture and caused many peasants to leave the land and
seek work in industry. This in turn resulted in scarcities of
agricultural products. Many rich peasants also moved to the city
seeking to further their entrepreneurial ventures. The two-tier
distribution system (free market and state-set price) led to rapid
growth of corruption which was aggravated by decentralisation
of the bureaucratic control of industry.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">
In China the peasants now constitute 63% of the population. Despite
the changes, the average standard of living in the cities is three
times that in the countryside, and standards of living vary widely
in the countryside.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">
Workers’ wages are low ($40 pm for railway workers for example),
and have hardly improved since the early 1950s however, although
the availability of free health care and cheap though scarce (6
sqm/person) housing has improved living standards significantly.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">
As elsewhere under Stalinism, workers did not have independent
unions, but defended themselves against speed-up and loss of job
security, for example with strikes and the use of violence against
“model workers” and managers. Many of the lowest paid
workers had dropped out of the state system and found jobs as
taxi drivers or as small traders. These workers were amongst the
most militant opponents of the government.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">
Tens of thousands of Chinese students were now studying abroad,
and foreign business people and tourists were coming into China,
foreign radio and TV broadcasts were increasingly accessible to
people on the mainland, leading to increased consciousness of
the conditions of workers in the capitalist world. However, political
liberalisation was not a part of the government’s program.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">
The introduction of the market in China without political liberalisation
contrasts to the situation in Russia, where political liberalisation
preceded the official switch to the market.</span></p><span data-dcnode-id="519" instrument_node="">
</span><a data-dcnode-id="518" name="2-3"></a><span data-dcnode-id="517" instrument_node="">
</span><h3 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">The May/June 1989 demonstrations</span></h3><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">
The uprising which took place in May/June 1989 had been in preparation
for two or three years, as a myriad of student discussion circles
and trade union groups emerged forming a loose network of opposition.
There had been continual social ferment among the students since
big student demonstrations in 1986. CCP General Secretary Hu Yaobang,
who had opposed the repression of this movement was removed from
office as a result. </span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">
The movement of 1989 began in a debate over education issues in
the Universities at the start of the academic year. The death
of Hu Yaobang triggered the first student demonstrations on April
17. On April 19,  over 100,000 people gathered in Tien An Men Square
commemorating Hu Yaobang. Students symbolically sat with their
backs to Mao’s tomb.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">
On April 20, students attempted to invade the Great Hall of the
People, and after Hu Yaobang’s funeral on April 22, the movement
began to spread.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="504" instrument_node="">
The following week, students from Beijing University marched the
30 kilometres to Tien An Men Square and back, and were joined by
students from the People’s University (an Institute of Technology)
and marched through the city carrying torches and chanting slogans
and singing </span><i data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">The Internationale</span></i><span data-dcnode-id="501" instrument_node="">. They were joined by young
workers and small traders – many of whom were ‘refugees’ from
low paid industrial jobs – swelling to 350,000.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">
On May 4, the 70th anniversary of the 1919 student demonstration
that initiated the Chinese national movement, a large contingent
of young workers joined the demonstration with their own demands,
and 1,000 workers joined 6,000 students in Changsha.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">
A hunger strike by 1,000 students in Tien An Men Square began on
May 13, and on May 15 Soviet leader Mikhail Gorbachev arrived
in Beijing. Following this time, the students were increasingly
joined by workers. Bank workers, public servants and teachers
went on strike and marched in orderly columns behind their banners.
Over the next couple of days, the demonstrations swelled to 1
million, and were demanding resignation of Premier Li Peng.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">
On May 17, thousands of workers at the Beijing steelworks (which
employs 200,000 workers) went on strike. The works was surrounded
by troops, but large contingents of steelworkers managed to join
the march. Banners from most of the city’s industrial plants were
present. Martial law was proclaimed on May 19, and the Army was
called upon to “restore order.”</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">
On May 20 and 21, hundreds of thousands came on to streets of
Beijing to block the Army intervention, 100,000 in Shanghai, 300,000
in Nanking, 200,000 in Shenzhen, and 1 million demonstrated in
Hong Kong. </span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">
The students were supported by the Beijing Independent Workers
Union, founded on May 21. Workers came from other cities to Tien An Men
Square to contact the leaders of BIWU. The independent union was
formed because workers found it impossible to give expression
to their aspirations through the official union structures. Nevertheless,
the workers forming the independent unions wanted not to ‘break
away’, but rather to win the support of the official General Federation
of Unions.</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">
According to Trini Leung, a Hong Kong union activist, workers
in China had been inspired by Polish Solidarity, despite the
fact that Polish Solidarity had never been mentioned in the official
media, and had asked her for information on Polish workers attitudes
and methods of organisation.</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">
The students and workers condemned the fake unions because the
unions did not represent them, but in the main they did not call
‘Down with the Communist Party’, but hoped to reform the Communist
Party, and secure the right to organise unions independently.</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">
On May 29, the Statue of Democracy was erected in Tien An Men Square
with 1 million demonstrating. The workers came out spontaneously
and protected the students, surrounding them with lines of stewards.
Army divisions from Inner Mongolia were brought in to replace
the Beijing garrison. On May 30 the first arrests of student and
worker leaders took place. The Beijing Independent Workers Union
claimed 300,000 members by “the end,” but 400 of its
leaders were arrested. On June 2-3, the Army clamp-down began.
40 demonstrators were killed in the first attack on Saturday 3 June.
On Sunday, people gathered in the streets leading to Tien An Men
Square trying to obstruct the Army assault. Some people were shot
by snipers; a soldier responsible for the death of a 9-year-old
girl was lynched by the crowd; students took 20 soldiers hostage
in the University.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">
Nevertheless, the Army ruthlessly moved into Tien An Men Square
and occupied it, though the rest of the city was still seething
with defiant demonstrators. The hospitals estimated 1,500 dead
and 10,000 wounded.</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">
Street demonstrations occurred in Shanghai after the massacre
in Beijing –  500,000 people were involved after a train ran over
protesters – but the workers’ and students’ leaders were rounded
up and the cities “pacified.”</span></p><span data-dcnode-id="469" instrument_node="">
</span><a data-dcnode-id="468" name="2-4"></a><span data-dcnode-id="467" instrument_node="">
</span><h3 data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">The Demands of the Students and Workers</span></h3><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">
The demands of the Student Organising Committee, Beijing University,
21 April 1989, were:</span></p><span data-dcnode-id="461" instrument_node="">
</span><ol class="numbered" data-dcnode-id="441"><span data-dcnode-id="460" instrument_node="">
</span><li data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">‘To re-evaluate Hu Yaobang’s contribution and approve his
appreciation of the great harmony between democracy and freedom.
</span></li><li data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">To severely punish the thugs who attacked the students and
the masses. Those responsible to present their apologies and compensation
to the victims.
</span></li><li data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">To speed up the publication of the Law on the Press, authorise
newspapers written by citizens and guarantee freedom of the press.
</span></li><li data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">State leaders must make public their incomes and inheritance,
including those of their family, to the people and to the country
as a whole. An inquiry to be held into corruption, with all the
details published.
</span></li><li data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">State leaders implicated in policy errors concerning education
should make an official self-criticism in front of the whole people.
The education budget must be substantially increased, alongside
teachers’ wages.
</span></li><li data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">The campaign against “bourgeois liberalisation”
to be re-evaluated, with total rehabilitation for those citizens
who have suffered unwarranted injustices.
</span></li><li data-dcnode-id="442"><span data-dcnode-id="447" instrument_node="">We strongly demand that there is an impartial and truthful
assessment of this democratic and patriotic movement’. </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23175"><sup class="enote" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">[175]</span></sup></a><span data-dcnode-id="443" instrument_node="">
</span></li></ol><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">
The Beijing students formed a union and submitted a petition with
12 demands to the Central Committee. These demands could be summarised
as follows: For a substantive dialogue to take place as early
as possible, in which elected representatives of the students
would speak as equals with the government representatives. The
students would not recognise the representatives of the “official”
student bodies and insisted on the right to form their own autonomous
union. Representatives of other social groups would be invited
to observe and the dialogue would be televised and the outcome
of the dialogue should be legally binding with guarantees of no
victimisation.</span></p><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">
The Beijing Independent Workers Union was founded on 21 April
1989. On May 21 they declared:</span></p><span data-dcnode-id="434" instrument_node="">
</span><p class="quoteb" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">
‘..The task of the moment is for teams of workers’ inspectors
to act in coordination with the autonomous associations of the
students’ union, in order to protect and defend the lives of the
student comrades and the stability of the social order in Beijing.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p class="quoteb" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">
‘While maintaining political and social peace, they will guarantee
the dispatch and transport of necessary products for the civil
life of Beijing city, including vegetables and grain as well as
everyday manufactured goods’.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">
The Provisional Committee of the BIWU, made the following Proposals
on May 21 1989. (The  leaders were arrested immediately after
they issued these documents):</span></p><span data-dcnode-id="425" instrument_node="">
</span><p class="quoteb" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">
‘Since the middle of April, in the democratic movement of all
the nationalities led by students, many Chinese workers have shown
their desire to participate in political life, while recognising
that, until now, they have lacked a truly representative workers’
organisation to express their opinions. For this reason we believe
it necessary to set up an independent organisation to speak in
the name of the workers and take up the issues that concern them,
To this end, we are preparing to organise an Independent Workers
Union in Beijing and are putting forward the following proposals
for a programme:</span></p><span data-dcnode-id="422" instrument_node="">
</span><p class="quoteb" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">
This organisation must be totally independent and it must be set
up as the result of a democratic process in which workers take
part of their own free will. It must not be under the control
of other organisations and must have equal status with other mass
organisations.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p class="quoteb" data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">
The basic aim of this organisation must be to put forward the
views of the greatest number of workers on political and economic
questions, and not to be merely a welfare organisation.</span></p><span data-dcnode-id="416" instrument_node="">
</span><p class="quoteb" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">
This organisation must have a monitoring role over the Communist
Party.</span></p><span data-dcnode-id="413" instrument_node="">
</span><p class="quoteb" data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">
 In firms and businesses which are the property of the whole people
or under collective ownership, this organisation must have the
right to use all the appropriate and legal means to monitor the
legal representatives and ensure that the workers are really the
masters of the firms. In other firms and businesses, it must uphold
the workers interests through negotiation with the enterprise
directors or through other legal means.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p class="quoteb" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">
This organisation must guarantee all the legal rights of its members
in the constitutional and legal spheres’.</span></p><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="406" instrument_node="">
</span><a data-dcnode-id="405" name="2-5"></a><span data-dcnode-id="404" instrument_node="">
</span></p><h3 data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Declaration by the Provisional Committee of the BWIU</span></h3><span data-dcnode-id="400" instrument_node="">
</span><p class="quoteb" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">
‘The working class is the most advanced class; we must be the
shock troops of the democratic movement. The People’s Republic
of China is under the leadership of the working class, and we
have the right to drive out every tyrant.</span></p><span data-dcnode-id="397" instrument_node="">
</span><p class="quoteb" data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">
‘The workers have understood perfectly the need for knowledge
and technology in production. This is why we absolutely reject
the outrages suffered by the students and educated people.</span></p><span data-dcnode-id="394" instrument_node="">
</span><p class="quoteb" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">
‘We must not flinch from our duty to destroy tyranny and dictatorship
and promote the democratisation of the state.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p class="quoteb" data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">
‘Unity is our strength; our unshakeable conviction is the guarantee
of our success.</span></p><span data-dcnode-id="388" instrument_node="">
</span><p class="quoteb" data-dcnode-id="383"><span data-dcnode-id="387" instrument_node="">
‘In the democratic movement, “We have nothing to lose but
our chains, and a world to win.”’</span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23176"><sup class="enote" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">[176]</span></sup></a></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="381" instrument_node="">
</span><a data-dcnode-id="380" name="2-6"></a><span data-dcnode-id="379" instrument_node="">
</span></p><h3 data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Significance</span></h3><span data-dcnode-id="375" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">
There were no discernible economic demands. Both workers’ and
students’ demands were overwhelmingly centred on the need for
political liberalisation and the right to organise independently
of the state, although it is likely that the majority of the young
demonstrators believed that economic prosperity would follow naturally
from political liberalisation. Demonstrators sang The Internationale,
emphasising that the movement was motivated not by capitalist
greed, but by the need for political rights and to be ‘part of
the world’.</span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">
The heroic challenge issued to the Stalinist leadership of China
in Beijing and in many other urban centres across China was an
inspiration to workers across the Stalinist bloc. Soldiers wheeled
from Inner Mongolia were used to crush the rebellion however.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="368" instrument_node="">
The </span><i data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">International Viewpoint</span></i><span data-dcnode-id="365" instrument_node=""> headline of May 29, 1989: “Political
Revolution begins in China” was typical of the reaction of
most revolutionaries at the time. </span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">
Communist Intervention was a little more cautious, and commented
in its first public statement:</span></p><span data-dcnode-id="360" instrument_node="">
</span><p class="quoteb" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">
‘It is clearly evident that the movement was essentially and overwhelmingly
socialist in character, having as its aim, the renovation of socialist
democracy within the framework of socialised property. This was
clearly expressed by the singing of The Internationale by demonstrators
as they faced the troops.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p class="quoteb" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">
‘Not a single call for the restoration of capitalism was picked
up by the media who were obviously hungry for it. This would indicate
that there was absolutely nothing on which any such report could
be hung.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p class="quoteb" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">
‘The movement was political in its aspirations and economic demands
were not raised; contrasting with the reform of the economy by
the bureaucracy in the direction of restoration of foreign ownership,
market relations and capital accumulation. The movement was an
urban movement; initiated by the young intelligentsia, supported
by the urban workers and those sections of the military that were
close to the workers. ...</span></p><span data-dcnode-id="351" instrument_node="">
</span><p class="quoteb" data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">
‘The formulation of democratic demands in opposition to pro-capitalist
economic reform is very important. It is the bureaucracy that
has been promoting bourgeois economic reform, and the Chinese
workers and students gave no support whatever to those reforms.
What was demanded was political freedom and an end to bureaucratic
centralism. ...</span></p><span data-dcnode-id="348" instrument_node="">
</span><p class="quoteb" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">
‘It is likely that the movement will re-emerge in the Soviet Union,
continuing the process of cross-pollination between the USSR and
China. Here it is possible that the more politically progressive
character of the Chinese uprising will have a most profound and
healthy effect on the very diverse movement in the Soviet Union.</span></p><span data-dcnode-id="345" instrument_node="">
</span><p class="quoteb" data-dcnode-id="340"><span data-dcnode-id="344" instrument_node="">
...’ </span><a data-dcnode-id="341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/subject/stalinism/origins-future/footnote.htm%23177"><sup class="enote" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">[177]</span></sup></a></p><span data-dcnode-id="339" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="338" instrument_node="">
</span><a data-dcnode-id="337" name="3-0"></a><span data-dcnode-id="336" instrument_node="">
</span></p><h2 data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">III: The Dominoes fall in Europe</span></h2><span data-dcnode-id="332" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">
In July 1989, miners in the Siberian coal field of Kuzbass began
a campaign of strike action and within a week were joined by miners
in the Donbass field, Ukraine. The strike was by far the most
serious since the 1920s, and the Siberian miners were demanding
a complete re-organisation of management as well as improvements
in pay and conditions. A member of the Politburo was despatched
to negotiate with the miners.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">
Meanwhile, the Polish workers tested out the meaning of glasnost
for Soviet foreign policy insofar as it applied to Poland. Solidarity
had swept the board in a general election, and now Stalinist General
Jaruzelski had indicated that he would not run for the Presidency
in the coming poll. And there was no sign of any Soviet intention
to intervene.</span></p><span data-dcnode-id="326" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">
In Hungary, Janos Kadar, leader of the country since 1957, died
as a Supreme Court proceeded to posthumously acquit Imre Nagy,
a leader of the 1956 Hungarian revolt crushed by Soviet tanks.</span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">
Europe was ready to blow. And the Chinese workers and youth had
lit the fuse.</span></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">
Eastern Europe was in the grip of a huge economic crisis. By 1989,
all the Eastern European states were in debt to Western banks
to the tune of about $100,000 million, as the bureaucracy in each
country sought to develop its economy independently of the declining
Soviet economy, and help quell the rising dissatisfaction with
falling living standards. Trade with the capitalist world now
amounted, on average, to about 50% of the value of trade with
other COMECON countries. Thus, the full impact of the world capitalist
crisis was flowing into Eastern Europe.</span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="312"><span data-dcnode-id="316" instrument_node="">
By the 1980s Eastern Europe was, like most of the commodity exporting
countries, caught firmly in the IMF trap. Jacek Tittenbrun argues
in </span><i data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">The Collapse of “Real Socialism” in Poland</span></i><span data-dcnode-id="313" instrument_node="">,
that the capitalist creditors were in effect the owners of the
means of production in Poland, and extracted their profits in
the form of the products of labour exported by Poland. By 1980,
