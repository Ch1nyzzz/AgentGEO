</span><span class="marker before-article" data-dcnode-id="380"></span><span data-dcnode-id="379" data-level="2" id="ref58373"></span><div class="md-sentinel--spy-target" data-dcnode-id="378"></div><section data-dcnode-id="258" data-has-spy="true" data-level="3" id="ref58375"><span data-dcnode-id="377" instrument_node=""> </span><h1 class="h3" data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Early capitalism</span></h1><span data-dcnode-id="374" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="330"><span data-dcnode-id="373" instrument_node="">Two broad trends can be discerned. The shift from the Mediterranean and its hinterlands to the Atlantic seaboard continued, although there was still vigorous entrepreneurial activity in certain Mediterranean regions; Venice stood still, but Marseille and Barcelona prospered. More striking was the growing gap between the economic systems of the east, where capital remained largely locked up in the large estates, and the west, where conditions were more favourable to enterprise. With more widespread adoption of utilitarian </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="371" data-term="criteria" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/criteria"><span data-dcnode-id="372" instrument_node="">criteria</span></a><span data-dcnode-id="370" instrument_node=""> for management went a sterner view of the obligation of </span><span data-dcnode-id="369" id="ref310752"></span><a class="md-crosslink" data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/work-economics"><span data-dcnode-id="368" instrument_node="">workers</span></a><span data-dcnode-id="366" instrument_node="">. Respect for the clock, with regular hours and the reduction of holidays for saints’ days (already achieved in Protestant countries), was preparing the way psychologically for the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="364" data-term="discipline" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/discipline"><span data-dcnode-id="365" instrument_node="">discipline</span></a><span data-dcnode-id="363" instrument_node=""> of the factory and mill. Handsome streets and squares of merchants’ houses witnessed to the prosperity of Atlantic ports such as Bordeaux, Nantes, and Bristol, which benefited from the reorientation of trade. Above all, Amsterdam and London reflected the mutually </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="361" data-term="beneficial" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/beneficial"><span data-dcnode-id="362" instrument_node="">beneficial</span></a><span data-dcnode-id="360" instrument_node=""> activity of trade and services. From shipbuilding, so demanding in skills and raw materials, a network of suppliers reached back to forests, fields, and forges, where timber, iron, canvas, and rope were first worked. Chandlering, insurance, brokerage, and credit-trading </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="358" data-term="facilitated" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/facilitated"><span data-dcnode-id="359" instrument_node="">facilitated</span></a><span data-dcnode-id="357" instrument_node=""> international dealing and amassing of capital. Fairs had long counteracted the isolation of regional economies: Lyon on the Rhône, Hamburg on the Elbe, and Danzig on the Vistula had become centres of exchange, where sales were facilitated by price lists, auctions, and specialization in certain commodities. Retailing acquired a modern look with shops catering to those who could afford coffee from Brazil or tobacco from Virginia; unlike earlier retailing, the goods offered for sale were not the products of work carried out on the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="355" data-term="premises" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/premises"><span data-dcnode-id="356" instrument_node="">premises</span></a><span data-dcnode-id="354" instrument_node="">. The dissemination of news was another strand in the pattern. By 1753 the sale of newspapers exceeded seven million: the emphasis was on news, not opinion, and price lists were carried with the news that affected them. Seamen were assisted by the dredging of harbours and improved docks and by more accurate navigational instruments and charts. In 1600 there were 18 lighthouses on or off the shores of Europe; in 1750 there were 82. The state also improved roads and made them safe for travelers; by 1789 France had 7,500 miles of fine roads, built largely by </span><a class="md-crosslink autoxref" data-dcnode-id="352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/forced-labour"><span data-dcnode-id="353" instrument_node="">forced labour</span></a><span data-dcnode-id="351" instrument_node="">. By 1660 nearly every Dutch city was linked by </span><span data-dcnode-id="350" id="ref310753"></span><a class="md-crosslink" data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/canal-waterway"><span data-dcnode-id="349" instrument_node="">canals</span></a><span data-dcnode-id="347" instrument_node="">. Following their example, Elector Frederick William in Brandenburg and Peter the Great in Russia linked rivers to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="345" data-term="facilitate" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/facilitate"><span data-dcnode-id="346" instrument_node="">facilitate</span></a><span data-dcnode-id="344" instrument_node=""> trade. In France Colbert’s plan for the Languedoc canal (completed 1682) involved private as well as state capital. England’s canal builders, notably the duke of Bridgewater, had to find their own resources: consequently, capital was applied to the best effect to serve mines and factories. The general survival of tolls and the resistance of interested parties to their removal imposed constraints on most governments. The abolition of internal customs was therefore a priority for </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="342" data-term="enlightened" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/enlightened"><span data-dcnode-id="343" instrument_node="">enlightened</span></a><span data-dcnode-id="341" instrument_node=""> reformers such as Anne-Robert-Jacques Turgot in France and </span><a class="md-crosslink autoxref" data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Joseph-II"><span data-dcnode-id="340" instrument_node="">Joseph II</span></a><span data-dcnode-id="338" instrument_node=""> in Austria. Germany’s many princes had taken advantage of weak imperial authority to impose the tolls, which produced revenue at the cost of long-distance trade. Numerous external tariffs remained an obstacle to the growth of trade. Radical action, however, could be dangerous. Turgot’s attempt to liberate the grain trade in </span><span data-dcnode-id="337" id="ref310754"></span><a class="md-crosslink" data-dcnode-id="335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-France"><span data-dcnode-id="336" instrument_node="">France</span></a><span data-dcnode-id="334" instrument_node=""> led to shortages, price rises, and his own downfall. The </span><a class="md-crosslink autoxref" data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/free-trade"><span data-dcnode-id="333" instrument_node="">free trade</span></a><span data-dcnode-id="331" instrument_node=""> treaty of 1786 of the French foreign minister, the count de Vergennes, also had unfortunate consequences: France was flooded by cheap English textiles, peasant weavers were distressed, and the ground was prepared for the popular risings of 1789.</span></p><span class="marker p1" data-dcnode-id="328"></span><span class="marker AM1 am-inline" data-dcnode-id="326"></span><span class="marker MOD1 mod-inline" data-dcnode-id="324"></span><span data-dcnode-id="323" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="289"><span data-dcnode-id="322" instrument_node="">One important development was the adoption in western Europe of the existing Italian practice of using bills of exchange as negotiable instruments; it was legalized in Holland in 1651 and in England in 1704. </span><span data-dcnode-id="321" id="ref310755"></span><a class="md-crosslink" data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/bank"><span data-dcnode-id="320" instrument_node="">Bankers</span></a><span data-dcnode-id="318" instrument_node=""> who bought bills, at a discount to cover risk, thereby released credit that would otherwise have been immobilized. The other aspect of the financial revolution was the growth of banking facilities. In 1660 there had been little advance in a century, since princes and magnates, after raising money too easily, had </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="316" data-term="reneged" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/reneged"><span data-dcnode-id="317" instrument_node="">reneged</span></a><span data-dcnode-id="315" instrument_node=""> on debts and damaged the fragile system. Great houses, such as the Fuggers, had been ruined. The high interest rates demanded by survivors contributed to the recession of the 17th century. There were some municipal institutions, such as the Bank of Hamburg and the great Bank of Amsterdam, which played a crucial part in Dutch </span><a class="md-crosslink autoxref" data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/economic-growth"><span data-dcnode-id="314" instrument_node="">economic growth</span></a><span data-dcnode-id="312" instrument_node=""> by bringing order to the currency and </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="310" data-term="facilitating" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/facilitating"><span data-dcnode-id="311" instrument_node="">facilitating</span></a><span data-dcnode-id="309" instrument_node=""> transfers. They provided the model for the </span><span data-dcnode-id="308" id="ref310756"></span><a class="md-crosslink" data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/Bank-of-England"><span data-dcnode-id="307" instrument_node="">Bank of England</span></a><span data-dcnode-id="305" instrument_node="">, which was founded in 1694 as a private company and was soon to have a relationship of mutual dependence with the state. The first state bank was that founded in </span><span data-dcnode-id="304" id="ref310757"></span><a class="md-crosslink" data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-Sweden"><span data-dcnode-id="303" instrument_node="">Sweden</span></a><span data-dcnode-id="301" instrument_node=""> in 1656; to provide a substitute for Sweden’s copper currency, it issued the first bank notes. Overproduced and not properly secured, they soon lost value. </span><span data-dcnode-id="300" id="ref310758"></span><a class="md-crosslink" data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/John-Law"><span data-dcnode-id="299" instrument_node="">Law</span></a><span data-dcnode-id="297" instrument_node="">’s ambitious scheme for a royal </span><span data-dcnode-id="296" id="ref310759"></span><a class="md-crosslink" data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/place/Banque-Generale"><span data-dcnode-id="295" instrument_node="">bank</span></a><span data-dcnode-id="293" instrument_node=""> in France foundered in 1720 because it was linked to his Louisiana company and its inflated prospects. After its failure tax farmers resumed their hold over state finance, and as a result interest rates remained higher than those of Britain because there was no secure central agency of investment. Law’s opponents were shortsighted: in Britain, where a </span><a class="md-crosslink autoxref" data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/central-bank"><span data-dcnode-id="292" instrument_node="">central bank</span></a><span data-dcnode-id="290" instrument_node=""> was successful, a large expansion of private banking also took place.</span></p><span class="marker p2" data-dcnode-id="287"></span><span class="marker AM2 am-inline" data-dcnode-id="285"></span><span class="marker MOD2 mod-inline" data-dcnode-id="283"></span><span data-dcnode-id="282" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="266"><span data-dcnode-id="281" instrument_node="">Meanwhile </span><span data-dcnode-id="280" id="ref310760"></span><a class="md-crosslink" data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/science/silver"><span data-dcnode-id="279" instrument_node="">silver</span></a><span data-dcnode-id="277" instrument_node="">, everywhere the basic </span><span data-dcnode-id="276" id="ref310761"></span><a class="md-crosslink" data-dcnode-id="274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/money"><span data-dcnode-id="275" instrument_node="">unit of value</span></a><span data-dcnode-id="273" instrument_node="">, remained in short supply. One-sided trade with the east meant a </span><a class="md-dictionary-link md-dictionary-tt-off eb" data-dcnode-id="271" data-term="continuous" data-type="EB" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/dictionary/continuous"><span data-dcnode-id="272" instrument_node="">continuous</span></a><span data-dcnode-id="270" instrument_node=""> drain. Insufficient silver was mined; declining imports from the New World did not affect only Spain. Governments tried to prevent the clipping of coins and so revalued. The deficiency remained, providing evidence for mercantilist policies. Negotiable paper in one form or other went some way to meet the shortage of specie. Stock exchanges, commercial in their original function, dealt increasingly in government stocks. Joint-stock companies became a common device for attracting money and spreading risk. By the mid-18th century the operations of commerce, manufacturing, and public finance were linked in one general system; a military defeat or economic setback affecting credit in one area might undermine confidence throughout the entire investing </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="268" data-term="community" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/community"><span data-dcnode-id="269" instrument_node="">community</span></a><span data-dcnode-id="267" instrument_node="">.</span></p><span class="marker p3" data-dcnode-id="264"></span><span class="marker AM3 am-inline" data-dcnode-id="262"></span><span class="marker MOD3 mod-inline" data-dcnode-id="260"></span><span data-dcnode-id="259" instrument_node=""> </span></section><span data-dcnode-id="257" instrument_node=""> </span><span class="marker end-of-content" data-dcnode-id="255"></span><span class="marker after-article" data-dcnode-id="253"></span></div><span data-dcnode-id="251" instrument_node="">
</span></div><span data-dcnode-id="249" instrument_node="">

</span><div class="mt-60 mt-sm-0" data-dcnode-id="238"></div><span data-dcnode-id="237" instrument_node="">
</span><span class="marker before-article" data-dcnode-id="235"></span><section data-dcnode-id="95" data-level="2" id="ref"><span data-dcnode-id="234" data-level="2" id="ref58373"></span><div class="md-sentinel--spy-target" data-dcnode-id="233"></div><section data-dcnode-id="97" data-has-spy="true" data-level="3" id="ref58376"><span data-dcnode-id="232" instrument_node=""> </span><h1 class="h3" data-dcnode-id="226"><span data-dcnode-id="231" instrument_node="">The old </span><span data-dcnode-id="230" id="ref310762"></span><a class="md-crosslink" data-dcnode-id="228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/industrialization"><span data-dcnode-id="229" instrument_node="">industrial</span></a><span data-dcnode-id="227" instrument_node=""> order</span></h1><span data-dcnode-id="224" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="216"><span data-dcnode-id="223" instrument_node="">Operations of high finance represented the future of capitalist Europe. The economy as a whole was still closer in most respects to the Middle Ages. Midland and northern England, a belt along the Urals, Catalonia, the Po valley, and Flanders were scenes of exceptionally large-scale operations during the 18th century. The mines, quarries, mills, and factories of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="221" data-term="entrepreneurs" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/entrepreneurs"><span data-dcnode-id="222" instrument_node="">entrepreneurs</span></a><span data-dcnode-id="220" instrument_node=""> such as Josse van Robais, the Dutch industrialist brought in by Colbert to produce textiles in Abbeville, only emphasized, by contrast, the primitive conditions of most manufacturing enterprise. Technology relied on limited equipment. Peter the Great saw it at its most impressive when he visited Holland in 1697. In villages along the Zaan River were lumber saws powered by 500 windmills and yards equipped with cranes and stacked with timber cut to set lengths to build </span><em data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">fluitschips</span></em><span data-dcnode-id="217" instrument_node=""> to a standard design.</span></p><span class="marker p1" data-dcnode-id="214"></span><span class="marker AM1 am-inline" data-dcnode-id="212"></span><span class="marker MOD1 mod-inline" data-dcnode-id="210"></span><span data-dcnode-id="209" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="194"><span data-dcnode-id="208" instrument_node="">The typical unit of production, however, was the domestic enterprise, with apprentices and journeymen living with family and servants. The merchant played a vital part in the provision of capital. When metalworkers made knives or needles for a local market, they could remain their own masters. For a larger market, they had to rely on businessmen for fuel, ore, wages, and transport. In </span><span data-dcnode-id="207" id="ref310763"></span><a class="md-crosslink" data-dcnode-id="205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/textile"><span data-dcnode-id="206" instrument_node="">textiles</span></a><span data-dcnode-id="204" instrument_node=""> the capital and marketing skills of the </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="202" data-term="entrepreneur" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/entrepreneur"><span data-dcnode-id="203" instrument_node="">entrepreneur</span></a><span data-dcnode-id="201" instrument_node=""> were essential to cottagers. This </span><a class="md-crosslink autoxref" data-dcnode-id="199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/domestic-system"><span data-dcnode-id="200" instrument_node="">putting-out system</span></a><span data-dcnode-id="198" instrument_node=""> spread as merchants saw the advantages of evading guild control. When the cotton industry was developed around Rouen and Barcelona, it was organized in the same way as woolen textiles. In the old industrial order, output could be increased only in proportion to the number of workers involved. In England the new order was evolving, and ranks of machines in barracklike mills were producing for a mass market. The need to produce economically could transform an industry, as in Brabant, where peasants moved into the weaving side of the linen trade and then established bleaching works that ruined traditionally dominant Haarlem. It also altered the social balance, as in electoral Saxony where, between 1550 and 1750, the proportion of peasants who made most of their living by industry rose from 5 to 30 percent of the population. With such change came the dependence on capital and the market that was to make the worker so </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="196" data-term="vulnerable" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/vulnerable"><span data-dcnode-id="197" instrument_node="">vulnerable</span></a><span data-dcnode-id="195" instrument_node="">.</span></p><span class="marker p2" data-dcnode-id="192"></span><span class="marker AM2 am-inline" data-dcnode-id="190"></span><span class="marker MOD2 mod-inline" data-dcnode-id="188"></span><span data-dcnode-id="187" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="144"><span data-dcnode-id="186" instrument_node="">Inevitably the expansion of domestic manufactures brought problems of control, which were eventually resolved by concentration in factories and by technical advances large enough to justify investment in machinery. Starting with the Lombe brothers’ silk mills, their exploitation of secrets acquired from Italy (1733), and </span><a class="md-crosslink autoxref" data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/John-Caius"><span data-dcnode-id="185" instrument_node="">John Kaye’s</span></a><span data-dcnode-id="183" instrument_node=""> </span><a class="md-crosslink autoxref" data-dcnode-id="181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/flying-shuttle"><span data-dcnode-id="182" instrument_node="">flying shuttle</span></a><span data-dcnode-id="180" instrument_node="">, </span><span data-dcnode-id="179" id="ref310764"></span><a class="md-crosslink" data-dcnode-id="177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/history-of-United-Kingdom"><span data-dcnode-id="178" instrument_node="">British</span></a><span data-dcnode-id="176" instrument_node=""> inventions set textile production on a dizzy path of growth. </span><a class="md-crosslink autoxref" data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Abraham-Darby"><span data-dcnode-id="175" instrument_node="">Abraham Darby’s</span></a><span data-dcnode-id="173" instrument_node=""> process of coke smelting was perhaps the most important single improvement, since it liberated the iron founder from dependence on charcoal. The shortage of timber, a source of anxiety everywhere except in Russia and Scandinavia, proved to be a stimulus to invention and progress. Technical development on the Continent was less remarkable. The nine volumes of the </span><em data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">Theatrum Machinarum</span></em><span data-dcnode-id="170" instrument_node=""> (1724), Jakob Leupold’s description of engineering, records steady development reflecting the craftsman’s </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="168" data-term="empirical" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/empirical"><span data-dcnode-id="169" instrument_node="">empirical</span></a><span data-dcnode-id="167" instrument_node=""> outlook. Improvement could be modest indeed. A miller could grind 37 pounds (17 kilograms) of flour each day in the 12th century; by 1700 it might have been 55 pounds. In some areas there were long intervals between theoretical advances and technological application. Galileo, </span><a class="md-crosslink autoxref" data-dcnode-id="165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Evangelista-Torricelli"><span data-dcnode-id="166" instrument_node="">Evangelista Torricelli</span></a><span data-dcnode-id="164" instrument_node="">, </span><a class="md-crosslink autoxref" data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Otto-von-Guericke"><span data-dcnode-id="163" instrument_node="">Otto von Guericke</span></a><span data-dcnode-id="161" instrument_node="">, and </span><a class="md-crosslink autoxref" data-dcnode-id="159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Blaise-Pascal"><span data-dcnode-id="160" instrument_node="">Blaise Pascal</span></a><span data-dcnode-id="158" instrument_node=""> worked on the vacuum in the first half of the 17th century, and </span><a class="md-crosslink autoxref" data-dcnode-id="156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Denis-Papin"><span data-dcnode-id="157" instrument_node="">Denis Papin</span></a><span data-dcnode-id="155" instrument_node=""> later experimented with steam engines; however, it was not until 1711 that </span><a class="md-crosslink autoxref" data-dcnode-id="153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Thomas-Newcomen"><span data-dcnode-id="154" instrument_node="">Thomas Newcomen</span></a><span data-dcnode-id="152" instrument_node=""> produced a model that was of any practical use despite the great need for power. </span><span data-dcnode-id="151" id="ref310765"></span><a class="md-crosslink" data-dcnode-id="149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/mining"><span data-dcnode-id="150" instrument_node="">Mining</span></a><span data-dcnode-id="148" instrument_node="">, already well advanced, was held back by difficulties of drainage. In the Rohrerbuhel copper mines in the Tyrol, the Heiliger Geist shaft, at 2,900 feet (886 metres), remained the deepest in the world until 1872; a third of its </span><a class="md-crosslink autoxref" data-dcnode-id="146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/labor-in-economics"><span data-dcnode-id="147" instrument_node="">labour force</span></a><span data-dcnode-id="145" instrument_node=""> was employed in draining. Increases in productivity were generally found in those manufacturing activities where, as in the part-time production of linen in Silesia, the skills required were modest and the raw material could be produced locally.</span></p><span class="marker p3" data-dcnode-id="142"></span><span class="marker AM3 am-inline" data-dcnode-id="140"></span><span class="marker MOD3 mod-inline" data-dcnode-id="138"></span><span data-dcnode-id="137" instrument_node=""> </span><p class="topic-paragraph" data-dcnode-id="105"><span data-dcnode-id="136" instrument_node="">Specialized manufacturing, evolving to meet the rising demand generated by the enrichment of the upper classes, showed significant growth. Wherever technical ingenuity was challenged by the needs of the market, results could be impressive. </span><span data-dcnode-id="135" id="ref310766"></span><a class="md-crosslink" data-dcnode-id="133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/printing-publishing"><span data-dcnode-id="134" instrument_node="">Printing</span></a><span data-dcnode-id="132" instrument_node=""> was of </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="130" data-term="seminal" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/seminal"><span data-dcnode-id="131" instrument_node="">seminal</span></a><span data-dcnode-id="129" instrument_node=""> importance, since the advance of knowledge depended on it. Improvements in type molds and founding contributed to a threefold increase between 1600 and 1700 in the number of pages printed in a day. The Hollander, a pulverizing machine (</span><em data-dcnode-id="127"><span data-dcnode-id="128" instrument_node="">c.</span></em><span data-dcnode-id="126" instrument_node=""> 1670), could produce more pulp for paper than eight stamping mills. The connection between technical </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="124" data-term="innovation" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/innovation"><span data-dcnode-id="125" instrument_node="">innovation</span></a><span data-dcnode-id="123" instrument_node=""> and style is illustrated by improvements in </span><span data-dcnode-id="122" id="ref310767"></span><a class="md-crosslink" data-dcnode-id="120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/glass"><span data-dcnode-id="121" instrument_node="">glassmaking</span></a><span data-dcnode-id="119" instrument_node=""> that made possible not only the casting of large sheets for mirrors but also, by 1700, the larger panes required for the sash windows that were replacing the leaded panes of casements. Venice lost its dominant position in the manufacture of glass as rulers set up works to save expensive imports. A new product sometimes followed a single discovery, as when the Saxons Ehrenfried Walter von Tschirnhaus and Johann Friedrich Böttger successfully imitated Chinese hard paste and created the porcelain of Meissen. A way of life could be affected by one invention. The pendulum </span><span data-dcnode-id="118" id="ref310768"></span><a class="md-crosslink" data-dcnode-id="116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/technology/clock"><span data-dcnode-id="117" instrument_node="">clock</span></a><span data-dcnode-id="115" instrument_node=""> of the Dutch scientist </span><a class="md-crosslink autoxref" data-dcnode-id="113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/biography/Christiaan-Huygens"><span data-dcnode-id="114" instrument_node="">Christiaan Huygens</span></a><span data-dcnode-id="112" instrument_node=""> introduced an age of reliable timekeeping. Clocks were produced in great numbers, and Geneva’s production of 5,000 timepieces a year was overtaken by 1680 by the clockmakers of both London and Paris. With groups of workers each responsible for a particular task, such as the making of wheels or the decoration of dials, specialization led to </span><a class="md-dictionary-link md-dictionary-tt-off mw" data-dcnode-id="110" data-term="enhanced" data-type="MW" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/enhanced"><span data-dcnode-id="111" instrument_node="">enhanced</span></a><span data-dcnode-id="109" instrument_node=""> production, and in these elegant products of traditional craftsmanship the </span><a class="md-crosslink autoxref" data-dcnode-id="107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/division-of-labour"><span data-dcnode-id="108" instrument_node="">division of labour</span></a><span data-dcnode-id="106" instrument_node=""> appeared.</span></p><span class="marker p4" data-dcnode-id="103"></span><span class="marker AM4 am-inline" data-dcnode-id="101"></span><span class="marker MOD4 mod-inline" data-dcnode-id="99"></span><span data-dcnode-id="98" instrument_node=""> </span></section><span data-dcnode-id="96" instrument_node=""> </span></section><span class="marker end-of-content" data-dcnode-id="93"></span><span class="marker after-article" data-dcnode-id="91"></span></div><span data-dcnode-id="89" instrument_node="">
