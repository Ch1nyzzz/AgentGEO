</span><p data-dcnode-id="5740"><b data-dcnode-id="5768"><span data-dcnode-id="5769" instrument_node="">Soviet-type economic planning</span></b><span data-dcnode-id="5767" instrument_node=""> (</span><b data-dcnode-id="5765"><span data-dcnode-id="5766" instrument_node="">STP</span></b><span data-dcnode-id="5764" instrument_node="">) is the specific model of </span><a class="mw-redirect" data-dcnode-id="5762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Centralized_planning" title="Centralized planning"><span data-dcnode-id="5763" instrument_node="">centralized planning</span></a><span data-dcnode-id="5761" instrument_node=""> employed by </span><a data-dcnode-id="5759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="5760" instrument_node="">Marxist–Leninist</span></a><span data-dcnode-id="5758" instrument_node=""> </span><a data-dcnode-id="5756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_state" title="Socialist state"><span data-dcnode-id="5757" instrument_node="">socialist states</span></a><span data-dcnode-id="5755" instrument_node=""> modeled on the </span><a data-dcnode-id="5753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_the_Soviet_Union" title="Economy of the Soviet Union"><span data-dcnode-id="5754" instrument_node="">economy</span></a><span data-dcnode-id="5752" instrument_node=""> of the </span><a data-dcnode-id="5750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5751" instrument_node="">Soviet Union</span></a><span data-dcnode-id="5749" instrument_node=""> (USSR). Although there was significant variation among these economies, Soviet-type planning and Soviet-type economies refers to the major structural characteristics common to these economies.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5742" style="white-space:nowrap;"><span data-dcnode-id="5748" instrument_node="">[</span><i data-dcnode-id="5744"><a data-dcnode-id="5745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5746" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="5747" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5743" instrument_node="">]</span></sup><span data-dcnode-id="5741" instrument_node="">
</span></p><p data-dcnode-id="5724"><span data-dcnode-id="5739" instrument_node="">Soviet-type planning is a form of economic planning involving centralized investment decisions, administrative allocation of economic inputs, </span><a data-dcnode-id="5737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Material_balance_planning" title="Material balance planning"><span data-dcnode-id="5738" instrument_node="">material balances</span></a><span data-dcnode-id="5736" instrument_node=""> to reach equilibrium between available inputs and targeted outputs, and to some extent the use of </span><a class="mw-redirect" data-dcnode-id="5734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linear_optimization" title="Linear optimization"><span data-dcnode-id="5735" instrument_node="">linear optimization</span></a><span data-dcnode-id="5733" instrument_node=""> to optimize the plans.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5726" style="white-space:nowrap;"><span data-dcnode-id="5732" instrument_node="">[</span><i data-dcnode-id="5728"><a data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5730" title="This claim needs references to reliable sources. (May 2021)"><span data-dcnode-id="5731" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5727" instrument_node="">]</span></sup><span data-dcnode-id="5725" instrument_node="">
</span></p><p data-dcnode-id="5705"><span data-dcnode-id="5723" instrument_node="">The post-</span><i data-dcnode-id="5720"><a data-dcnode-id="5721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="5722" instrument_node="">perestroika</span></a></i><span data-dcnode-id="5719" instrument_node=""> analysis of the system of the Soviet economic planning describes it as the </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Administrative-command_system" title="Administrative-command system"><span data-dcnode-id="5718" instrument_node="">administrative-command system</span></a><span data-dcnode-id="5716" instrument_node=""> due to the </span><i data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">de facto</span></i><span data-dcnode-id="5713" instrument_node=""> priority of highly centralized management over planning.</span><sup class="reference" data-dcnode-id="5710" id="cite_ref-1"><a data-dcnode-id="5711" href="#cite_note-1"><span data-dcnode-id="5712" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="5707" id="cite_ref-2"><a data-dcnode-id="5708" href="#cite_note-2"><span data-dcnode-id="5709" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5706" instrument_node="">

</span><h3 data-dcnode-id="5575"><span class="mw-headline" data-dcnode-id="5583" id="Institutions"><span data-dcnode-id="5584" instrument_node="">Institutions</span></span><span class="mw-editsection" data-dcnode-id="5576"><span class="mw-editsection-bracket" data-dcnode-id="5581"><span data-dcnode-id="5582" instrument_node="">[</span></span><a data-dcnode-id="5579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D2" title="Edit section: Institutions"><span data-dcnode-id="5580" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5577"><span data-dcnode-id="5578" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5574" instrument_node="">
</span><p data-dcnode-id="5563"><span data-dcnode-id="5573" instrument_node="">The major institutions of Soviet-type planning in the USSR included a planning agency (</span><a data-dcnode-id="5571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gosplan" title="Gosplan"><span data-dcnode-id="5572" instrument_node="">Gosplan</span></a><span data-dcnode-id="5570" instrument_node="">), an organization for allocating state supplies among the various organizations and enterprises in the economy (</span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gossnab" title="Gossnab"><span data-dcnode-id="5569" instrument_node="">Gossnab</span></a><span data-dcnode-id="5567" instrument_node="">) and </span><a data-dcnode-id="5565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enterprises_in_the_Soviet_Union" title="Enterprises in the Soviet Union"><span data-dcnode-id="5566" instrument_node="">enterprises</span></a><span data-dcnode-id="5564" instrument_node=""> which were engaged in the production and delivery of goods and services in the economy. Enterprises comprised production associations and institutes that were linked together by the plans formulated by Gosplan.
</span></p><p data-dcnode-id="5555"><span data-dcnode-id="5562" instrument_node="">In the Eastern bloc countries (Bulgaria, Czechoslovakia, East Germany, Hungary, Poland, Romania, and Albania), economic planning was primarily accomplished through the </span><a data-dcnode-id="5560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comecon" title="Comecon"><span data-dcnode-id="5561" instrument_node="">Council for Mutual Economic Assistance</span></a><span data-dcnode-id="5559" instrument_node=""> (CMEA), an international organization meant to promote the coordination of Soviet economic policy amongst the participating countries. The council was founded in 1949 and worked to maintain the Soviet style of economic planning in the Eastern bloc until the </span><a data-dcnode-id="5557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="5558" instrument_node="">Soviet Union's dissolution in 1991</span></a><span data-dcnode-id="5556" instrument_node="">.
</span></p><p data-dcnode-id="5538"><span data-dcnode-id="5554" instrument_node="">There is a small amount of information in state archives regarding the founding of CMEA, but documents from the Romania state archive suggest that the </span><a data-dcnode-id="5552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_Communist_Party" title="Romanian Communist Party"><span data-dcnode-id="5553" instrument_node="">Romanian Communist Party</span></a><span data-dcnode-id="5551" instrument_node=""> was instrumental in beginning the process which led to the creation of the council. Originally, Romania wanted to create a collaborative economic system which would bolster the country's efforts to industrialize.</span><sup class="reference" data-dcnode-id="5548" id="cite_ref-:0_3-0"><a data-dcnode-id="5549" href="#cite_note-:0-3"><span data-dcnode-id="5550" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5547" instrument_node=""> However, the Czech and Polish representatives wanted to have a system of specialization put into place, wherein production plans would be shared amongst members, and each country would specialize in a different area of production.</span><sup class="reference" data-dcnode-id="5544" id="cite_ref-:0_3-1"><a data-dcnode-id="5545" href="#cite_note-:0-3"><span data-dcnode-id="5546" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5543" instrument_node=""> The USSR encouraged the formation of the council as a response to the United States’ Marshall Plan, in hopes of maintaining their sphere of influence in Eastern Europe. There also existed the hope that the less developed member states would ‘catch-up’ economically with the more industrialized ones.</span><sup class="reference" data-dcnode-id="5540" id="cite_ref-:12_4-0"><a data-dcnode-id="5541" href="#cite_note-:12-4"><span data-dcnode-id="5542" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5539" instrument_node="">
</span></p><span data-dcnode-id="5537" instrument_node="">
</span><h3 data-dcnode-id="5527"><span class="mw-headline" data-dcnode-id="5535" id="Material_balances"><span data-dcnode-id="5536" instrument_node="">Material balances</span></span><span class="mw-editsection" data-dcnode-id="5528"><span class="mw-editsection-bracket" data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">[</span></span><a data-dcnode-id="5531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D3" title="Edit section: Material balances"><span data-dcnode-id="5532" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5529"><span data-dcnode-id="5530" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5526" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5520" role="note"><span data-dcnode-id="5523" instrument_node="">Main article: </span><a data-dcnode-id="5521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Material_balance_planning" title="Material balance planning"><span data-dcnode-id="5522" instrument_node="">Material balance planning</span></a></div><span data-dcnode-id="5519" instrument_node="">
</span><p data-dcnode-id="5510"><span data-dcnode-id="5518" instrument_node="">Material balance planning was the major function of Gosplan in the USSR. This method of planning involved the accounting of material supplies in natural units (as opposed to monetary terms) which are used to balance the supply of available inputs with targeted outputs. Material balancing involves taking a survey of available inputs and raw </span><a class="mw-redirect" data-dcnode-id="5516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Materials" title="Materials"><span data-dcnode-id="5517" instrument_node="">materials</span></a><span data-dcnode-id="5515" instrument_node=""> in the economy and then using a balance-sheet to balance them with output targets specified by industry to achieve a balance between supply and demand. This balance is used to formulate a plan for the national economy.</span><sup class="reference" data-dcnode-id="5512" id="cite_ref-5"><a data-dcnode-id="5513" href="#cite_note-5"><span data-dcnode-id="5514" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5511" instrument_node="">
</span></p><span data-dcnode-id="5509" instrument_node="">

</span><ul data-dcnode-id="4868"><li data-dcnode-id="4869"><a class="image" data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEmblem-money.svg"><img alt="Emblem-money.svg" class="noviewer" data-dcnode-id="4874" data-file-height="48" data-file-width="48" decoding="async" height="16" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/16px-Emblem-money.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/24px-Emblem-money.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Emblem-money.svg/32px-Emblem-money.svg.png 2x" width="16"></a><span data-dcnode-id="4872" instrument_node="">&nbsp;</span><a class="mw-redirect" data-dcnode-id="4870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Portal%3ABusiness_and_economics" title="Portal:Business and economics"><span data-dcnode-id="4871" instrument_node="">Business and economics portal</span></a></li></ul></td></tr><tr data-dcnode-id="4849"><td class="sidebar-navbar" data-dcnode-id="4850"><link data-dcnode-id="4865" href="mw-data:TemplateStyles:r1063604349" rel="mw-deduplicated-inline-style"><div class="navbar plainlinks hlist navbar-mini" data-dcnode-id="4851"><ul data-dcnode-id="4852"><li class="nv-view" data-dcnode-id="4861"><a data-dcnode-id="4862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3AEconomic_systems_sidebar" title="Template:Economic systems sidebar"><abbr data-dcnode-id="4863" title="View this template"><span data-dcnode-id="4864" instrument_node="">v</span></abbr></a></li><li class="nv-talk" data-dcnode-id="4857"><a data-dcnode-id="4858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template_talk%3AEconomic_systems_sidebar" title="Template talk:Economic systems sidebar"><abbr data-dcnode-id="4859" title="Discuss this template"><span data-dcnode-id="4860" instrument_node="">t</span></abbr></a></li><li class="nv-edit" data-dcnode-id="4853"><a class="external text" data-dcnode-id="4854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3AEconomic_systems_sidebar%26action%3Dedit"><abbr data-dcnode-id="4855" title="Edit this template"><span data-dcnode-id="4856" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="4846" instrument_node="">
</span><p data-dcnode-id="4834"><span data-dcnode-id="4845" instrument_node="">There are two fundamental ways scholars have carried out an analysis of Soviet-type economic planning. The first involves adapting standard </span><a data-dcnode-id="4843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassical_economics" title="Neoclassical economics"><span data-dcnode-id="4844" instrument_node="">neoclassical</span></a><span data-dcnode-id="4842" instrument_node=""> economic models and theories to analyze the Soviet economic system. This paradigm stresses the importance of </span><a data-dcnode-id="4840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pareto_efficiency" title="Pareto efficiency"><span data-dcnode-id="4841" instrument_node="">Pareto efficiency</span></a><span data-dcnode-id="4839" instrument_node=""> standard.</span><sup class="reference" data-dcnode-id="4836" id="cite_ref-Rosefielde_6-0"><a data-dcnode-id="4837" href="#cite_note-Rosefielde-6"><span data-dcnode-id="4838" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4835" instrument_node="">
</span></p><p data-dcnode-id="4825"><span data-dcnode-id="4833" instrument_node="">In contrast to this approach, scholars such as Pawel Dembinski argue that neoclassical tools are somewhat inappropriate for evaluating Soviet-type planning because they attempt to quantify and measure phenomena specific to capitalist-based economies.</span><sup class="reference" data-dcnode-id="4830" id="cite_ref-Dembinski_7-0"><a data-dcnode-id="4831" href="#cite_note-Dembinski-7"><span data-dcnode-id="4832" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4829" instrument_node=""> They contend that because standard economic models rely on assumptions not fulfilled in the Soviet system (especially the </span><a data-dcnode-id="4827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rational_choice_theory" title="Rational choice theory"><span data-dcnode-id="4828" instrument_node="">assumption of economic rationality</span></a><span data-dcnode-id="4826" instrument_node=""> underlying decision-making), the results obtained from a neoclassical analysis will distort the actual effects of STP. These other scholars proceed along a different course by trying to engage with STP on its own terms, investigating the philosophical, historical and political influences that gave rise to STP whilst evaluating its economic successes and failures (theoretical and actual) with reference to those contexts.
</span></p><p data-dcnode-id="4817"><span data-dcnode-id="4824" instrument_node="">The USSR practiced some form of </span><a class="mw-redirect" data-dcnode-id="4822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_planning" title="Central planning"><span data-dcnode-id="4823" instrument_node="">central planning</span></a><span data-dcnode-id="4821" instrument_node=""> beginning in 1918 with </span><a class="mw-redirect" data-dcnode-id="4819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_Communism" title="War Communism"><span data-dcnode-id="4820" instrument_node="">War Communism</span></a><span data-dcnode-id="4818" instrument_node=""> until it dissolved in 1991, although the type and extent of planning was of a different nature before imperative centralized planning was introduced in the 1930s. While there were many subtleties to the various forms of economic organization the USSR employed during this 70-year time period, enough features were shared that scholars have broadly examined advantages and disadvantages of Soviet-type economic planning.
</span></p><p data-dcnode-id="4809"><span data-dcnode-id="4816" instrument_node="">Soviet-type planning is not the same as </span><a data-dcnode-id="4814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_planning" title="Economic planning"><span data-dcnode-id="4815" instrument_node="">economic planning</span></a><span data-dcnode-id="4813" instrument_node=""> in general as there are other theoretical models of economic planning and modern </span><a class="mw-redirect" data-dcnode-id="4811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_economies" title="Mixed economies"><span data-dcnode-id="4812" instrument_node="">mixed economies</span></a><span data-dcnode-id="4810" instrument_node=""> also practice economic planning to a certain extent, but they are not subject to all of the advantages and disadvantages enumerated here.
</span></p><span data-dcnode-id="4808" instrument_node="">
</span><h2 data-dcnode-id="4798"><span class="mw-headline" data-dcnode-id="4806" id="Features"><span data-dcnode-id="4807" instrument_node="">Features</span></span><span class="mw-editsection" data-dcnode-id="4799"><span class="mw-editsection-bracket" data-dcnode-id="4804"><span data-dcnode-id="4805" instrument_node="">[</span></span><a data-dcnode-id="4802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D5" title="Edit section: Features"><span data-dcnode-id="4803" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4797" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="4785"><div class="thumbinner" data-dcnode-id="4786" style="width:222px;"><a class="image" data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%259A%25D1%2582%25D0%25BE_%25D0%25BA%25D0%25BE%25D0%25B3%25D0%25BE%253F_%25D0%2594%25D0%25BE%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C_%25D0%25B8_%25D0%25BF%25D0%25B5%25D1%2580%25D0%25B5%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C.jpg"><img alt="Кто кого? Догнать и перегнать" class="thumbimage" data-dcnode-id="4796" data-file-height="4000" data-file-width="2543" decoding="async" height="346" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/%25D0%259A%25D1%2582%25D0%25BE_%25D0%25BA%25D0%25BE%25D0%25B3%25D0%25BE%253F_%25D0%2594%25D0%25BE%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C_%25D0%25B8_%25D0%25BF%25D0%25B5%25D1%2580%25D0%25B5%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C.jpg/220px-%25D0%259A%25D1%2582%25D0%25BE_%25D0%25BA%25D0%25BE%25D0%25B3%25D0%25BE%253F_%25D0%2594%25D0%25BE%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C_%25D0%25B8_%25D0%25BF%25D0%25B5%25D1%2580%25D0%25B5%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2b/%D0%9A%D1%82%D0%BE_%D0%BA%D0%BE%D0%B3%D0%BE%3F_%D0%94%D0%BE%D0%B3%D0%BD%D0%B0%D1%82%D1%8C_%D0%B8_%D0%BF%D0%B5%D1%80%D0%B5%D0%B3%D0%BD%D0%B0%D1%82%D1%8C.jpg/330px-%D0%9A%D1%82%D0%BE_%D0%BA%D0%BE%D0%B3%D0%BE%3F_%D0%94%D0%BE%D0%B3%D0%BD%D0%B0%D1%82%D1%8C_%D0%B8_%D0%BF%D0%B5%D1%80%D0%B5%D0%B3%D0%BD%D0%B0%D1%82%D1%8C.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2b/%D0%9A%D1%82%D0%BE_%D0%BA%D0%BE%D0%B3%D0%BE%3F_%D0%94%D0%BE%D0%B3%D0%BD%D0%B0%D1%82%D1%8C_%D0%B8_%D0%BF%D0%B5%D1%80%D0%B5%D0%B3%D0%BD%D0%B0%D1%82%D1%8C.jpg/440px-%D0%9A%D1%82%D0%BE_%D0%BA%D0%BE%D0%B3%D0%BE%3F_%D0%94%D0%BE%D0%B3%D0%BD%D0%B0%D1%82%D1%8C_%D0%B8_%D0%BF%D0%B5%D1%80%D0%B5%D0%B3%D0%BD%D0%B0%D1%82%D1%8C.jpg 2x" width="220"></a><span data-dcnode-id="4794" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4787"><div class="magnify" data-dcnode-id="4792"><a class="internal" data-dcnode-id="4793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%259A%25D1%2582%25D0%25BE_%25D0%25BA%25D0%25BE%25D0%25B3%25D0%25BE%253F_%25D0%2594%25D0%25BE%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C_%25D0%25B8_%25D0%25BF%25D0%25B5%25D1%2580%25D0%25B5%25D0%25B3%25D0%25BD%25D0%25B0%25D1%2582%25D1%258C.jpg" title="Enlarge"></a></div><span data-dcnode-id="4791" instrument_node="">"Catch up and overtake" (Russian: </span><i data-dcnode-id="4789"><span data-dcnode-id="4790" instrument_node="">Кто кого? Догнать и перегнать</span></i><span data-dcnode-id="4788" instrument_node="">). A 1929 Soviet propaganda poster based on 1917 paraphrase from Lenin, praising the economic superiority of Marxian economy.</span></div></div></div><span data-dcnode-id="4784" instrument_node="">
</span><p data-dcnode-id="4775"><span data-dcnode-id="4783" instrument_node="">The unique features of Soviet-style economy were an ideologically driven attempt to build a total economic plan for the whole society, as well as unquestioned paradigm of superiority of </span><a class="mw-redirect" data-dcnode-id="4781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxian_economy" title="Marxian economy"><span data-dcnode-id="4782" instrument_node="">Marxian economy</span></a><span data-dcnode-id="4780" instrument_node="">. Attempts to modify or optimize the former based on pragmatic analysis of economic outcomes were hindered by the latter. Dembinski describes the Soviet approach to Marxist economy as "quasi-religious" with economic publications by Marx and Lenin being treated as a "Scripture".</span><sup class="reference" data-dcnode-id="4777" id="cite_ref-Dembinski_7-1"><a data-dcnode-id="4778" href="#cite_note-Dembinski-7"><span data-dcnode-id="4779" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4776" instrument_node="">
</span></p><p data-dcnode-id="4756"><span data-dcnode-id="4774" instrument_node="">Michael Ellman describes specific features of the Soviet economic planning in economic and mathematical terms, highlighting its primarily computational challenges.</span><sup class="reference" data-dcnode-id="4771" id="cite_ref-8"><a data-dcnode-id="4772" href="#cite_note-8"><span data-dcnode-id="4773" instrument_node="">[8]</span></a></sup><span data-dcnode-id="4770" instrument_node=""> The theoretical objective of the Soviet economic planning, as executed by Gosplan, was </span><i data-dcnode-id="4768"><span data-dcnode-id="4769" instrument_node="">rational</span></i><span data-dcnode-id="4767" instrument_node=""> allocation of resources in a way that resulted in output of </span><i data-dcnode-id="4765"><span data-dcnode-id="4766" instrument_node="">desired</span></i><span data-dcnode-id="4764" instrument_node=""> assortment of goods and services. The plan was built and executed in annual cycles: each year, a target output of specific goods were determined and using estimates of available input resources Gosplan would calculate </span><a data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balance_sheet" title="Balance sheet"><span data-dcnode-id="4763" instrument_node="">balance sheets</span></a><span data-dcnode-id="4761" instrument_node=""> planning output for all factories. As the number of commodities reached hundreds of thousands, a number of aggregations and simplifications were made to facilitate the calculations, which until late 60's were performed manually.</span><sup class="reference" data-dcnode-id="4758" id="cite_ref-9"><a data-dcnode-id="4759" href="#cite_note-9"><span data-dcnode-id="4760" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4757" instrument_node="">
</span></p><span data-dcnode-id="4755" instrument_node="">
</span><h3 data-dcnode-id="4745"><span class="mw-headline" data-dcnode-id="4753" id="Actual_performance"><span data-dcnode-id="4754" instrument_node="">Actual performance</span></span><span class="mw-editsection" data-dcnode-id="4746"><span class="mw-editsection-bracket" data-dcnode-id="4751"><span data-dcnode-id="4752" instrument_node="">[</span></span><a data-dcnode-id="4749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D6" title="Edit section: Actual performance"><span data-dcnode-id="4750" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4747"><span data-dcnode-id="4748" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4744" instrument_node="">
</span><p data-dcnode-id="4735"><span data-dcnode-id="4743" instrument_node="">At first, the USSR's growth in GDP per capita compared favorably with Western Europe. In 1913, prior to the revolution of 1917, the Russian Empire had a </span><a class="mw-redirect" data-dcnode-id="4741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GDP_per_capita" title="GDP per capita"><span data-dcnode-id="4742" instrument_node="">GDP per capita</span></a><span data-dcnode-id="4740" instrument_node=""> of $1,488 in 1990 international dollars which grew 461% to $6,871 by 1990. By comparison, Western Europe grew from a higher base of $3,688 international dollars by a comparable 457% to $16,872 in the same period and reached $17,921 by 1998. Following the fall of the USSR in 1991, its GDP per capita figure fell to $3,893 by 1998.</span><sup class="reference" data-dcnode-id="4737" id="cite_ref-10"><a data-dcnode-id="4738" href="#cite_note-10"><span data-dcnode-id="4739" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4736" instrument_node="">
</span></p><p data-dcnode-id="4717"><span data-dcnode-id="4734" instrument_node="">One 1986 publication compared Physical Quality of Life Index (PQLI) based on </span><a data-dcnode-id="4732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infant_mortality" title="Infant mortality"><span data-dcnode-id="4733" instrument_node="">infant mortality</span></a><span data-dcnode-id="4731" instrument_node="">, </span><a data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_expectancy" title="Life expectancy"><span data-dcnode-id="4730" instrument_node="">life expectancy</span></a><span data-dcnode-id="4728" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy_rate" title="Literacy rate"><span data-dcnode-id="4727" instrument_node="">literacy rate</span></a><span data-dcnode-id="4725" instrument_node=""> (</span><a data-dcnode-id="4723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_Bank" title="World Bank"><span data-dcnode-id="4724" instrument_node="">World Bank</span></a><span data-dcnode-id="4722" instrument_node=""> data) and other indicators such as number of patients per physician and argued that countries with socialist-style economic planning achieved slightly better indicators at low and medium levels of income than capitalist countries at the same levels of economic development. The gap narrowed down in case of medium and high income countries, all of the latter however in the "high income" category and none "socialist".</span><sup class="reference" data-dcnode-id="4719" id="cite_ref-11"><a data-dcnode-id="4720" href="#cite_note-11"><span data-dcnode-id="4721" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4718" instrument_node="">
</span></p><p data-dcnode-id="4695"><span data-dcnode-id="4716" instrument_node="">Starting in the 1960's, the Soviet economy suffered from </span><a data-dcnode-id="4714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Era_of_Stagnation" title="Era of Stagnation"><span data-dcnode-id="4715" instrument_node="">stagnation</span></a><span data-dcnode-id="4713" instrument_node=""> and became increasingly dependent on undisclosed loans from capitalist countries that were members of the </span><a data-dcnode-id="4711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paris_Club" title="Paris Club"><span data-dcnode-id="4712" instrument_node="">Paris Club</span></a><span data-dcnode-id="4710" instrument_node="">, while continuing to present Marxism as progressive and superior to a market economy. At the moment of its default and the </span><a data-dcnode-id="4708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="4709" instrument_node="">dissolution of USSR</span></a><span data-dcnode-id="4707" instrument_node="">, Russia alone owed $22 billion to the club,</span><sup class="reference" data-dcnode-id="4704" id="cite_ref-12"><a data-dcnode-id="4705" href="#cite_note-12"><span data-dcnode-id="4706" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4703" instrument_node=""> with other Eastern Bloc countries taking loans on their own account.</span><sup class="reference" data-dcnode-id="4700" id="cite_ref-13"><a data-dcnode-id="4701" href="#cite_note-13"><span data-dcnode-id="4702" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4697" id="cite_ref-14"><a data-dcnode-id="4698" href="#cite_note-14"><span data-dcnode-id="4699" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4696" instrument_node="">
</span></p><span data-dcnode-id="4694" instrument_node="">
</span><link data-dcnode-id="4693" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4689" role="note"><span data-dcnode-id="4692" instrument_node="">Main article: </span><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Era_of_Stagnation" title="Era of Stagnation"><span data-dcnode-id="4691" instrument_node="">Era of Stagnation</span></a></div><span data-dcnode-id="4688" instrument_node="">
</span><p data-dcnode-id="4658"><span data-dcnode-id="4687" instrument_node="">Widespread shortage of goods and failures of </span><a data-dcnode-id="4685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supply_chain" title="Supply chain"><span data-dcnode-id="4686" instrument_node="">supply chain</span></a><span data-dcnode-id="4684" instrument_node=""> were presented as "temporary difficulties" by official propaganda, but numerous scholars in the Eastern bloc argued that these are systemic flaws of the Marxian economy. </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C3%25A1nos_Kornai" title="János Kornai"><span data-dcnode-id="4683" instrument_node="">János Kornai</span></a><span data-dcnode-id="4681" instrument_node=""> coined the term "</span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shortage_economy" title="Shortage economy"><span data-dcnode-id="4680" instrument_node="">economy of shortage</span></a><span data-dcnode-id="4678" instrument_node="">" to describe the state of the Soviet economy.</span><sup class="reference" data-dcnode-id="4675" id="cite_ref-15"><a data-dcnode-id="4676" href="#cite_note-15"><span data-dcnode-id="4677" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4674" instrument_node=""> </span><a data-dcnode-id="4672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leszek_Ko%25C5%2582akowski" title="Leszek Kołakowski"><span data-dcnode-id="4673" instrument_node="">Leszek Kołakowski</span></a><span data-dcnode-id="4671" instrument_node=""> presented the political and economic state of Eastern bloc authoritarianism as a logical consequence of Marxism–Leninism, rather than a "deviation".</span><sup class="reference" data-dcnode-id="4668" id="cite_ref-16"><a data-dcnode-id="4669" href="#cite_note-16"><span data-dcnode-id="4670" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4667" instrument_node=""> Nikolay Shmelyov described the state of the Soviet economy in the 80's as having large-scale systemic inefficiencies and unbalanced outputs, with one good being constantly in shortage, while others were constantly in surplus and wasted.</span><sup class="reference" data-dcnode-id="4664" id="cite_ref-17"><a data-dcnode-id="4665" href="#cite_note-17"><span data-dcnode-id="4666" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4663" instrument_node=""> These issues were naturally observed by Soviet economists, but any proposals to change the basic operating paradigms of the economic planning in response to observed inefficiencies were blocked by ideological hardliners, who perceived them as an unacceptable deviation from Marxism–Leninism, an economic model which they perceived to be "scientifically" proven to be superior.</span><sup class="reference" data-dcnode-id="4660" id="cite_ref-Dembinski_7-2"><a data-dcnode-id="4661" href="#cite_note-Dembinski-7"><span data-dcnode-id="4662" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4659" instrument_node="">
</span></p><p data-dcnode-id="4650"><span data-dcnode-id="4657" instrument_node="">The </span><a data-dcnode-id="4655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Economic_Policy" title="New Economic Policy"><span data-dcnode-id="4656" instrument_node="">New Economic Policy</span></a><span data-dcnode-id="4654" instrument_node=""> (1921-1928) was a short period of economic pragmatism in the Soviet economics, introduced by Lenin in response to widely observed shortcomings of the </span><a data-dcnode-id="4652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_communism" title="War communism"><span data-dcnode-id="4653" instrument_node="">War Communism</span></a><span data-dcnode-id="4651" instrument_node=""> system following the 1917 revolution. NEP, however, was criticized as reactionary and reversed by Stalin, who returned to total economic planning.
</span></p><p data-dcnode-id="4642"><span data-dcnode-id="4649" instrument_node="">Falsification of statistics and "output juggling" of factories in order to satisfy central plans became a widespread phenomenon, leading to discrepancies between "reality of the plan" and the actual availability of goods as observed on site by consumers. Plan failures, when it was no longer possible to hide them, were blamed on sabotage and </span><a data-dcnode-id="4647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wrecking_%28Soviet_Union%29" title="Wrecking (Soviet Union)"><span data-dcnode-id="4648" instrument_node="">"wrecking"</span></a><span data-dcnode-id="4646" instrument_node="">. Shortages and poor living conditions led to industrial actions and protests, usually violently suppressed by the military and security forces, such as the </span><a data-dcnode-id="4644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Novocherkassk_massacre" title="Novocherkassk massacre"><span data-dcnode-id="4645" instrument_node="">Novocherkassk massacre</span></a><span data-dcnode-id="4643" instrument_node="">.
</span></p><span data-dcnode-id="4641" instrument_node="">
</span><link data-dcnode-id="4640" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4630" role="note"><span data-dcnode-id="4639" instrument_node="">See also: </span><a data-dcnode-id="4637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ryazan_miracle" title="Ryazan miracle"><span data-dcnode-id="4638" instrument_node="">Ryazan miracle</span></a><span data-dcnode-id="4636" instrument_node="">, </span><a data-dcnode-id="4634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_emulation" title="Socialist emulation"><span data-dcnode-id="4635" instrument_node="">Socialist emulation</span></a><span data-dcnode-id="4633" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="4631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vreditelstvo" title="Vreditelstvo"><span data-dcnode-id="4632" instrument_node="">Vreditelstvo</span></a></div><span data-dcnode-id="4629" instrument_node="">
</span><h3 data-dcnode-id="4619"><span class="mw-headline" data-dcnode-id="4627" id="Performance_in_the_Eastern_Bloc"><span data-dcnode-id="4628" instrument_node="">Performance in the Eastern Bloc</span></span><span class="mw-editsection" data-dcnode-id="4620"><span class="mw-editsection-bracket" data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">[</span></span><a data-dcnode-id="4623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D7" title="Edit section: Performance in the Eastern Bloc"><span data-dcnode-id="4624" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4618" instrument_node="">
</span><p data-dcnode-id="4608"><span data-dcnode-id="4617" instrument_node="">During the 1950s, the economic alliance between members of the Eastern bloc and the state monopoly acted as a safety net in the face of Western sanctions being imposed. As a result, the Eastern Bloc countries started to develop autarkic tendencies which would last until the Soviet Union's dissolution.</span><sup class="reference" data-dcnode-id="4614" id="cite_ref-18"><a data-dcnode-id="4615" href="#cite_note-18"><span data-dcnode-id="4616" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4613" instrument_node=""> Trade was also able to grow, not just between member states but within them as well,</span><sup class="reference" data-dcnode-id="4610" id="cite_ref-:12_4-1"><a data-dcnode-id="4611" href="#cite_note-:12-4"><span data-dcnode-id="4612" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4609" instrument_node=""> and the agrarian states of the eastern bloc began to industrialize. The Soviet Union also gave Eastern bloc countries subsidies in the form of raw materials at prices lower than those offered in the global market. However, despite these efforts, varying degrees of development still remained between the industrialized countries and the more agrarian ones, which would contribute to the Bloc's economic stagnation in later decades.
</span></p><p data-dcnode-id="4582"><span data-dcnode-id="4607" instrument_node="">The council began to lose its credibility from the 1960s onwards, because disagreements between member countries over the necessity of various reforms led to the slowing of economic growth. In order to encourage economic integration and maintain soviet economic planning, the International Bank for Economic Cooperation was established in Moscow in 1963, and the ‘transferable ruble’ was introduced.</span><sup class="reference" data-dcnode-id="4604" id="cite_ref-:12_4-2"><a data-dcnode-id="4605" href="#cite_note-:12-4"><span data-dcnode-id="4606" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4603" instrument_node=""> The integration failed to materialize for a number of reasons. Firstly, the new currency was separated from foreign trade as is characteristic of centralized planned economies, and so was not able to perform the various functions of money outside of being a unit of account </span><sup class="reference" data-dcnode-id="4600" id="cite_ref-19"><a data-dcnode-id="4601" href="#cite_note-19"><span data-dcnode-id="4602" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4599" instrument_node=""> Additionally, integration failed due to a general lack of interest, as well as the implementation of ‘market liberalization’ policies within several member states throughout the decade.</span><sup class="reference" data-dcnode-id="4596" id="cite_ref-:12_4-3"><a data-dcnode-id="4597" href="#cite_note-:12-4"><span data-dcnode-id="4598" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4595" instrument_node=""> Hence, the CMEA switched gears in the second half of the 1960s, and instead a reform was proposed which encouraged countries to pursue their own specialized industrialization projects without the needed participation of all other member states.</span><sup class="reference" data-dcnode-id="4592" id="cite_ref-:2_20-0"><a data-dcnode-id="4593" href="#cite_note-:2-20"><span data-dcnode-id="4594" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4591" instrument_node=""> East Germany, Poland, Hungary, and Czechoslovakia agreed to these terms, however Bulgaria and Romania did not, and many political officials throughout the Eastern bloc prevented the ‘market liberalization’ policies from being implemented at the CMEA level.</span><sup class="reference" data-dcnode-id="4588" id="cite_ref-:12_4-4"><a data-dcnode-id="4589" href="#cite_note-:12-4"><span data-dcnode-id="4590" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4587" instrument_node=""> The inability for member countries to reach a consensus about economic reforms coupled with the desire to create ‘dynamics of dissent’ within the Council against the USSR contributed to a lack of planning coordination by the CMEA throughout the decade.</span><sup class="reference" data-dcnode-id="4584" id="cite_ref-:2_20-1"><a data-dcnode-id="4585" href="#cite_note-:2-20"><span data-dcnode-id="4586" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4583" instrument_node="">
</span></p><p data-dcnode-id="4572"><span data-dcnode-id="4581" instrument_node="">In the 1970s, the CMEA adopted a few initiatives in order to continue economic growth and to modernize the economy. Firstly, the Eastern bloc heavily imported technology from the West in order to modernize, increasing the debt of the Eastern Bloc to the West dramatically.</span><sup class="reference" data-dcnode-id="4578" id="cite_ref-:12_4-5"><a data-dcnode-id="4579" href="#cite_note-:12-4"><span data-dcnode-id="4580" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4577" instrument_node=""> In 1971, the CMEA introduced the ‘complex program’, designed to promote further trade integration. This integration plan heavily relied on countries specializing in the production of certain goods and services, and parallel initiatives were discouraged and to be avoided. For instance, Hungary specialized in the manufacturing of buses for local and long-distance transport, which encouraged other member countries to trade with Hungary in order to acquire them.</span><sup class="reference" data-dcnode-id="4574" id="cite_ref-:12_4-6"><a data-dcnode-id="4575" href="#cite_note-:12-4"><span data-dcnode-id="4576" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4573" instrument_node="">
</span></p><p data-dcnode-id="4555"><span data-dcnode-id="4571" instrument_node="">However, the economic problems of the Eastern bloc continued to increase as reforms failed to pass and specialization efforts failed to incentivize states to improve their products. This resulted in economic growth which paled in comparison to that of the West. In a study assessing the technical efficiency of three Eastern bloc countries (Hungary, Poland, and Yugoslavia) from the 1970s to the 1980s and comparing it to that of developed and developing countries, it was found that the three European socialist countries were less efficient than both developed and developing countries, and this efficiency gap had only widened in the years of analysis.</span><sup class="reference" data-dcnode-id="4568" id="cite_ref-:3_21-0"><a data-dcnode-id="4569" href="#cite_note-:3-21"><span data-dcnode-id="4570" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4567" instrument_node=""> Additionally, among those three countries, Yugoslavia was consistently the most efficient throughout the period of study, followed by Hungary, then Poland.</span><sup class="reference" data-dcnode-id="4564" id="cite_ref-:3_21-1"><a data-dcnode-id="4565" href="#cite_note-:3-21"><span data-dcnode-id="4566" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4563" instrument_node=""> The raw material subsidies (</span><a data-dcnode-id="4561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov_Plan" title="Molotov Plan"><span data-dcnode-id="4562" instrument_node="">Molotov Plan</span></a><span data-dcnode-id="4560" instrument_node="">) that the Soviet Union had provided since the 1950s were drastically reduced to the point of insignificance by the end of the 1980s, due to Eastern bloc countries having to buy industrial goods at a higher price than what was offered on the global market.</span><sup class="reference" data-dcnode-id="4557" id="cite_ref-:12_4-7"><a data-dcnode-id="4558" href="#cite_note-:12-4"><span data-dcnode-id="4559" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4556" instrument_node=""> The lack of support from the USSR as well as the lack of political consensus over reforms only hastened the decline of the CMEA.
</span></p><span data-dcnode-id="4554" instrument_node="">
</span><h3 data-dcnode-id="4544"><span class="mw-headline" data-dcnode-id="4552" id="Advantages"><span data-dcnode-id="4553" instrument_node="">Advantages</span></span><span class="mw-editsection" data-dcnode-id="4545"><span class="mw-editsection-bracket" data-dcnode-id="4550"><span data-dcnode-id="4551" instrument_node="">[</span></span><a data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D8" title="Edit section: Advantages"><span data-dcnode-id="4549" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4543" instrument_node="">
</span><p data-dcnode-id="4389"><span data-dcnode-id="4542" instrument_node="">From a neoclassical perspective, the advantages of STP are quite limited. One advantage of STP is the theoretical possibility to avoid </span><a data-dcnode-id="4540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inflation" title="Inflation"><span data-dcnode-id="4541" instrument_node="">inflation</span></a><span data-dcnode-id="4539" instrument_node="">.</span><sup class="reference" data-dcnode-id="4536" id="cite_ref-Jeffries_22-0"><a data-dcnode-id="4537" href="#cite_note-Jeffries-22"><span data-dcnode-id="4538" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4535" instrument_node=""> Complete price stability is achievable, not only because the state plans all prices and quantities, but also because the state has complete control over the </span><a data-dcnode-id="4533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money_supply" title="Money supply"><span data-dcnode-id="4534" instrument_node="">money supply</span></a><span data-dcnode-id="4532" instrument_node=""> via the wages it pays as the sole employer. To maintain a fixed currency value, all the state must do is balance the total value of goods available during a given planning period with the amount of wages it pays according to the following equation,</span><sup class="reference" data-dcnode-id="4529" id="cite_ref-23"><a data-dcnode-id="4530" href="#cite_note-23"><span data-dcnode-id="4531" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4528" instrument_node=""> where </span><span class="mwe-math-element" data-dcnode-id="4508"><span class="mwe-math-mathml-inline mwe-math-mathml-a11y" data-dcnode-id="4510" style="display: none;"><math alttext="{\displaystyle P}" data-dcnode-id="4511" xmlns="http://www.w3.org/1998/Math/MathML"></math><span data-dcnode-id="4527" instrument_node="">

</span><annotation data-dcnode-id="4334" encoding="application/x-tex"><span data-dcnode-id="4335" instrument_node="">{\displaystyle P\times Q=Y+{\mathit {TP}}-S-T}</span></annotation><span data-dcnode-id="4333" instrument_node="">

</span></div><img alt="{\displaystyle P\times Q=Y+{\mathit {TP}}-S-T}" aria-hidden="true" class="mwe-math-fallback-image-display" data-dcnode-id="4328" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wikimedia.org/api/rest_v1/media/math/render/svg/b6802ec411ac178459b50a5bb0072b85631b0cd8&amp;raw" style="vertical-align: -0.671ex; width:26.193ex; height:2.509ex;"></div><span data-dcnode-id="4326" instrument_node="">
</span><p data-dcnode-id="4325"></p><p data-dcnode-id="4319"><span data-dcnode-id="4324" instrument_node="">However, the USSR arguably never realized this theoretical possibility.</span><sup class="reference" data-dcnode-id="4321" id="cite_ref-24"><a data-dcnode-id="4322" href="#cite_note-24"><span data-dcnode-id="4323" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4320" instrument_node=""> It suffered from both open and repressed inflation throughout much of its history because of failure to balance the above equation.
</span></p><p data-dcnode-id="4296"><span data-dcnode-id="4318" instrument_node="">Another advantage of economic planning from the neoclassical perspective is the ability to eliminate </span><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unemployment" title="Unemployment"><span data-dcnode-id="4317" instrument_node="">unemployment</span></a><span data-dcnode-id="4315" instrument_node=""> (with the exception of </span><a data-dcnode-id="4313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frictional_unemployment" title="Frictional unemployment"><span data-dcnode-id="4314" instrument_node="">frictional unemployment</span></a><span data-dcnode-id="4312" instrument_node="">) and </span><a class="mw-redirect" data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Business_cycles" title="Business cycles"><span data-dcnode-id="4311" instrument_node="">business cycles</span></a><span data-dcnode-id="4309" instrument_node="">.</span><sup class="reference" data-dcnode-id="4306" id="cite_ref-Jeffries,_12_25-0"><a data-dcnode-id="4307" href="#cite_note-Jeffries,_12-25"><span data-dcnode-id="4308" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4305" instrument_node=""> Since the state is effectively the sole business proprietor and controls banking, it theoretically avoids classic financial frictions and consumer confidence challenges. Because the state makes labor compulsory and can run enterprises at a loss, full employment is a theoretical possibility even when capital stocks are too low to justify it in a market system. This was an advantage that the USSR arguably realized by 1930,</span><sup class="reference" data-dcnode-id="4302" id="cite_ref-Jeffries,_12_25-1"><a data-dcnode-id="4303" href="#cite_note-Jeffries,_12-25"><span data-dcnode-id="4304" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4301" instrument_node=""> although critics argue that sometimes certain segments of Soviet labor exhibited zero productivity, meaning that although workers were on employment rolls, they essentially sat idle because of capital deficiencies, i.e. there was employed unemployment.</span><sup class="reference" data-dcnode-id="4298" id="cite_ref-26"><a data-dcnode-id="4299" href="#cite_note-26"><span data-dcnode-id="4300" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4297" instrument_node="">
</span></p><p data-dcnode-id="4276"><span data-dcnode-id="4295" instrument_node="">Those scholars who reject the neoclassical viewpoint consider the benefits of STP that the USSR itself adduced. One is the ability to control for </span><a class="mw-redirect" data-dcnode-id="4293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Externalities" title="Externalities"><span data-dcnode-id="4294" instrument_node="">externalities</span></a><span data-dcnode-id="4292" instrument_node=""> directly in the pricing mechanism.</span><sup class="reference" data-dcnode-id="4289" id="cite_ref-Dembinski,_70_27-0"><a data-dcnode-id="4290" href="#cite_note-Dembinski,_70-27"><span data-dcnode-id="4291" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4288" instrument_node=""> Another is the total capture of value obtained in STP which is neglected in market economies.</span><sup class="reference" data-dcnode-id="4285" id="cite_ref-28"><a data-dcnode-id="4286" href="#cite_note-28"><span data-dcnode-id="4287" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4284" instrument_node=""> By this, it is meant that while a worker might put in a certain amount of work to produce a good, a market might value that good at less than the cost of labor the worker put in, effectively negating the value of the work done. Because in STP prices are set by the state, STP avoids this pitfall by never pricing an item below its labor value. While these do seem to be valid theoretical advantages to STP (especially under a </span><a class="mw-redirect" data-dcnode-id="4282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist%25E2%2580%2593Leninist" title="Marxist–Leninist"><span data-dcnode-id="4283" instrument_node="">Marxist–Leninist</span></a><span data-dcnode-id="4281" instrument_node=""> framework), it has been argued by some that STP as implemented by the USSR failed to achieve these theoretical possibilities.</span><sup class="reference" data-dcnode-id="4278" id="cite_ref-Dembinski,_70_27-1"><a data-dcnode-id="4279" href="#cite_note-Dembinski,_70-27"><span data-dcnode-id="4280" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4277" instrument_node="">
</span></p><span data-dcnode-id="4275" instrument_node="">
</span><h3 data-dcnode-id="4265"><span class="mw-headline" data-dcnode-id="4273" id="Disadvantages"><span data-dcnode-id="4274" instrument_node="">Disadvantages</span></span><span class="mw-editsection" data-dcnode-id="4266"><span class="mw-editsection-bracket" data-dcnode-id="4271"><span data-dcnode-id="4272" instrument_node="">[</span></span><a data-dcnode-id="4269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSoviet-type_economic_planning%26action%3Dedit%26section%3D9" title="Edit section: Disadvantages"><span data-dcnode-id="4270" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4267"><span data-dcnode-id="4268" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4264" instrument_node="">
</span><table class="box-POV plainlinks metadata ambox ambox-content ambox-POV" data-dcnode-id="4226" role="presentation"><tbody data-dcnode-id="4227"><tr data-dcnode-id="4228"><td class="mbox-image" data-dcnode-id="4261"><div data-dcnode-id="4262" style="width:52px"><img alt="Unbalanced scales.svg" data-dcnode-id="4263" data-file-height="354" data-file-width="400" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/45px-Unbalanced_scales.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/68px-Unbalanced_scales.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Unbalanced_scales.svg/90px-Unbalanced_scales.svg.png 2x" width="45"></div></td><td class="mbox-text" data-dcnode-id="4229"><div class="mbox-text-span" data-dcnode-id="4230"><span data-dcnode-id="4260" instrument_node="">The </span><b data-dcnode-id="4254"><a data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANeutral_point_of_view" title="Wikipedia:Neutral point of view"><span data-dcnode-id="4259" instrument_node="">neutrality</span></a><span data-dcnode-id="4257" instrument_node=""> of this section is </span><a data-dcnode-id="4255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ANPOV_dispute" title="Wikipedia:NPOV dispute"><span data-dcnode-id="4256" instrument_node="">disputed</span></a></b><span data-dcnode-id="4253" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="4245"><span data-dcnode-id="4252" instrument_node=""> Relevant discussion may be found on the </span><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Talk%3ASoviet-type_economic_planning%23%2523" title="Talk:Soviet-type economic planning"><span data-dcnode-id="4251" instrument_node="">talk page</span></a><span data-dcnode-id="4249" instrument_node="">. Please do not remove this message until </span><a data-dcnode-id="4247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Template%3APOV%23When_to_remove" title="Template:POV"><span data-dcnode-id="4248" instrument_node="">conditions to do so are met</span></a><span data-dcnode-id="4246" instrument_node="">.</span></span><span data-dcnode-id="4244" instrument_node=""> </span><span class="date-container" data-dcnode-id="4238"><i data-dcnode-id="4239"><span data-dcnode-id="4243" instrument_node="">(</span><span class="date" data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">December 2017</span></span><span data-dcnode-id="4240" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="4231"><i data-dcnode-id="4232"><span data-dcnode-id="4237" instrument_node=""> (</span><small data-dcnode-id="4234"><a data-dcnode-id="4235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="4236" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="4233" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4217"><span data-dcnode-id="4224" instrument_node="">From a neoclassical perspective, there were many disadvantages to STP. They can be divided into two categories: </span><a class="mw-redirect" data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macroeconomic" title="Macroeconomic"><span data-dcnode-id="4223" instrument_node="">macroeconomic</span></a><span data-dcnode-id="4221" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microeconomic" title="Microeconomic"><span data-dcnode-id="4220" instrument_node="">microeconomic</span></a><span data-dcnode-id="4218" instrument_node="">.
</span></p><p data-dcnode-id="4177"><span data-dcnode-id="4216" instrument_node="">Macroeconomic disadvantages included systemic </span><a class="mw-redirect" data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Undersupply" title="Undersupply"><span data-dcnode-id="4215" instrument_node="">undersupply</span></a><span data-dcnode-id="4213" instrument_node="">, the pursuit of </span><a data-dcnode-id="4211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_employment" title="Full employment"><span data-dcnode-id="4212" instrument_node="">full employment</span></a><span data-dcnode-id="4210" instrument_node=""> at a steep cost, price fixing's devastating effect on agricultural </span><a class="mw-redirect" data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Incentives" title="Incentives"><span data-dcnode-id="4209" instrument_node="">incentives</span></a><span data-dcnode-id="4207" instrument_node=""> and the loss of the advantages of </span><a data-dcnode-id="4205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Money" title="Money"><span data-dcnode-id="4206" instrument_node="">money</span></a><span data-dcnode-id="4204" instrument_node=""> because STP eschews money's classic role.</span><sup class="reference" data-dcnode-id="4201" id="cite_ref-29"><a data-dcnode-id="4202" href="#cite_note-29"><span data-dcnode-id="4203" instrument_node="">[29]</span></a></sup><span data-dcnode-id="4200" instrument_node=""> Systemic undersupply was caused in STP because of the use of </span><a class="mw-redirect" data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Material_balances" title="Material balances"><span data-dcnode-id="4199" instrument_node="">material balances</span></a><span data-dcnode-id="4197" instrument_node=""> (plans for the balanced production and consumption of goods and productive inputs) which are theoretically possible, but practically impossible to produce because planners cannot acquire enough </span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perfect_information" title="Perfect information"><span data-dcnode-id="4196" instrument_node="">information</span></a><span data-dcnode-id="4194" instrument_node=""> to craft them accurately.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4187" style="white-space:nowrap;"><span data-dcnode-id="4193" instrument_node="">[</span><i data-dcnode-id="4189"><a data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4191" title="This claim needs references to reliable sources. (June 2012)"><span data-dcnode-id="4192" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4188" instrument_node="">]</span></sup><span data-dcnode-id="4186" instrument_node=""> Additionally, planners had to aggregate many types of goods and inputs into a single material balance because it was impossible to create an individual balance for each of the approximately 24 million items produced and consumed in the USSR.</span><sup class="reference" data-dcnode-id="4183" id="cite_ref-Jeffries,_15_30-0"><a data-dcnode-id="4184" href="#cite_note-Jeffries,_15-30"><span data-dcnode-id="4185" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4182" instrument_node=""> This system introduced a strong bias towards underproduction, resulting in a scarcity of consumer goods. Another disadvantage is that while STP does allow for the theoretically possibility of full employment, the USSR often achieved full employment by operating enterprises at a loss or leaving workers idle. There was always a Pareto superior alternative available to the USSR rather than full employment, specifically with the option to close some enterprises and make transfer payments to the unemployed.</span><sup class="reference" data-dcnode-id="4179" id="cite_ref-31"><a data-dcnode-id="4180" href="#cite_note-31"><span data-dcnode-id="4181" instrument_node="">[31]</span></a></sup><span data-dcnode-id="4178" instrument_node="">
</span></p><p data-dcnode-id="4171"><span data-dcnode-id="4176" instrument_node="">The microeconomic disadvantages from a neoclassical perspective include the following:</span><sup class="reference" data-dcnode-id="4173" id="cite_ref-32"><a data-dcnode-id="4174" href="#cite_note-32"><span data-dcnode-id="4175" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4172" instrument_node="">
</span></p><span data-dcnode-id="4170" instrument_node="">
</span><ul data-dcnode-id="4133"><li data-dcnode-id="4165"><span data-dcnode-id="4169" instrument_node="">Encouragement of </span><a class="mw-redirect" data-dcnode-id="4167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black-market" title="Black-market"><span data-dcnode-id="4168" instrument_node="">black-market</span></a><span data-dcnode-id="4166" instrument_node=""> activity because of fixed resource allocation.</span></li><span data-dcnode-id="4164" instrument_node="">
</span><li data-dcnode-id="4159"><span data-dcnode-id="4163" instrument_node="">Low quality of Soviet goods induced by </span><a data-dcnode-id="4161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade_barrier" title="Trade barrier"><span data-dcnode-id="4162" instrument_node="">shielding</span></a><span data-dcnode-id="4160" instrument_node=""> them from world markets.</span></li><span data-dcnode-id="4158" instrument_node="">
</span><li data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">The neglect of consumer need because of the challenge in measuring good quality.</span></li><span data-dcnode-id="4155" instrument_node="">
</span><li data-dcnode-id="4150"><span data-dcnode-id="4154" instrument_node="">The tendency of enterprise-level Soviet managers to understate productive capacity in fear of the </span><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ratchet_effect" title="Ratchet effect"><span data-dcnode-id="4153" instrument_node="">ratchet effect</span></a><span data-dcnode-id="4151" instrument_node="">. This effect resulted from an enterprise overproducing in a given plan cycle. They would have to match their new level of higher production in the next cycle as the plan was adjusted to fit the new data.</span></li><span data-dcnode-id="4149" instrument_node="">
</span><li data-dcnode-id="4147"><span data-dcnode-id="4148" instrument_node="">An anti-innovation bias (also from fear of the ratchet effect).</span></li><span data-dcnode-id="4146" instrument_node="">
</span><li data-dcnode-id="4140"><span data-dcnode-id="4145" instrument_node="">Storming (</span><i data-dcnode-id="4142"><a data-dcnode-id="4143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shturmovshchina" title="Shturmovshchina"><span data-dcnode-id="4144" instrument_node="">shturmovshchina</span></a></i><span data-dcnode-id="4141" instrument_node="">), i.e. the hurry to complete the plan at the end of a planning cycle resulting in poor production quality.</span></li><span data-dcnode-id="4139" instrument_node="">
</span><li data-dcnode-id="4134"><span data-dcnode-id="4138" instrument_node="">Scattering of resources, i.e. excessive spread (</span><i data-dcnode-id="4136"><span data-dcnode-id="4137" instrument_node="">raspylenie sredstv</span></i><span data-dcnode-id="4135" instrument_node="">), where too many projects (especially construction) would have been started simultaneously and it took much longer to complete because of a lack of available inputs on time</span></li></ul><span data-dcnode-id="4132" instrument_node="">
</span><p data-dcnode-id="4104"><span data-dcnode-id="4131" instrument_node="">Scholars who reject the neoclassical approach produce a shorter list of disadvantages, but because these disadvantages are valid even from the Soviet perspective, they are perhaps even more damning of STP than those listed above. These scholars consider STP's inability to predict things like weather, trade and technological advancement as an insurmountable drawback to the planning procedure.</span><sup class="reference" data-dcnode-id="4128" id="cite_ref-33"><a data-dcnode-id="4129" href="#cite_note-33"><span data-dcnode-id="4130" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4127" instrument_node=""> Without exhaustive knowledge of those things, planning would systemically misappropriate resources.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4120" style="white-space:nowrap;"><span data-dcnode-id="4126" instrument_node="">[</span><i data-dcnode-id="4122"><a data-dcnode-id="4123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4124" title="This claim needs references to reliable sources. (December 2017)"><span data-dcnode-id="4125" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4121" instrument_node="">]</span></sup><span data-dcnode-id="4119" instrument_node=""> STP's use of coercive techniques such as the ratchet effect and </span><a data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gulag" title="Gulag"><span data-dcnode-id="4118" instrument_node="">labor camps</span></a><span data-dcnode-id="4116" instrument_node=""> which are argued to be inherent to STP on the one hand ensured the system's survival and on the other hand resulted in the </span><a data-dcnode-id="4114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_asymmetry" title="Information asymmetry"><span data-dcnode-id="4115" instrument_node="">distorted information</span></a><span data-dcnode-id="4113" instrument_node=""> that made effective planning challenging if not impossible.</span><sup class="reference" data-dcnode-id="4110" id="cite_ref-34"><a data-dcnode-id="4111" href="#cite_note-34"><span data-dcnode-id="4112" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4109" instrument_node=""> Lastly, these scholars argue that the semantic limitations of language made it impossible for STP planners to communicate their desires to enterprises in sufficient detail for planning to fully direct economic outcomes.</span><sup class="reference" data-dcnode-id="4106" id="cite_ref-35"><a data-dcnode-id="4107" href="#cite_note-35"><span data-dcnode-id="4108" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4105" instrument_node=""> Enterprises themselves under STP still made a variety of economic decisions autonomously.
</span></p><p data-dcnode-id="4095"><span data-dcnode-id="4103" instrument_node="">After the collapse of the USSR, other scholars have argued that a central deficiency of Soviet economic planning was that it was not premised on final consumer demand and that such a system would be increasingly feasible with advances in information technology.</span><sup class="reference" data-dcnode-id="4100" id="cite_ref-36"><a data-dcnode-id="4101" href="#cite_note-36"><span data-dcnode-id="4102" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="4097" id="cite_ref-37"><a data-dcnode-id="4098" href="#cite_note-37"><span data-dcnode-id="4099" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4096" instrument_node="">
</span></p><span data-dcnode-id="4094" instrument_node="">
