l></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="485"></div></div></aside></header></div><div class="ArticlePageContentBackGround-eCrksR ksmyRn" data-attribute-verso-pattern="article-body" data-dcnode-id="200"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="206" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq dEYrZE" data-dcnode-id="216" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="360"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="382"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="383" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="384"><p data-dcnode-id="469"><em data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">This article is part of</span></em><span data-dcnode-id="478" instrument_node=""> In Session: The Teen Vogue Lesson Plan. </span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Find the full lesson plan</span></em><span data-dcnode-id="475" instrument_node=""> </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/teen-vogue-lesson-plan" target="_blank"><em data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">here</span></em></a><em data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">.</span></em></p><p data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">Capitalism </span><a class="external-link" data-dcnode-id="466" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.merriam-webster.com/dictionary/capitalism&quot;}" data-offer-url="https://www.merriam-webster.com/dictionary/capitalism" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/capitalism" rel="nofollow noopener" target="_blank"><span data-dcnode-id="467" instrument_node="">is defined as</span></a><span data-dcnode-id="465" instrument_node=""> an economic system in which a country’s trade, industry, and profits are controlled by private companies, instead of by the people whose time and labor powers those companies. The United States and many other nations around the world are capitalist countries, but capitalism is not the only economic system available.</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="461" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="463"></div><div class="journey-unit" data-dcnode-id="462"></div></div><p data-dcnode-id="447"><span data-dcnode-id="460" instrument_node="">Younger Americans, in particular, are </span><a class="external-link" data-dcnode-id="458" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx&quot;}" data-offer-url="https://news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx" rel="nofollow noopener" target="_blank"><span data-dcnode-id="459" instrument_node="">challenging long-held assumptions</span></a><span data-dcnode-id="457" instrument_node=""> about the way our economy functions. With climate crisis posing a grave threat to our collective future, millions </span><a class="external-link" data-dcnode-id="455" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.npr.org/2019/09/10/759512938/u-s-census-bureau-reports-poverty-rate-down-but-millions-still-poor&quot;}" data-offer-url="https://www.npr.org/2019/09/10/759512938/u-s-census-bureau-reports-poverty-rate-down-but-millions-still-poor" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2019/09/10/759512938/u-s-census-bureau-reports-poverty-rate-down-but-millions-still-poor" rel="nofollow noopener" target="_blank"><span data-dcnode-id="456" instrument_node="">living below the poverty line</span></a><span data-dcnode-id="454" instrument_node="">, the economic and social shocks of the coronavirus pandemic and unemployment wave still reverberating, and the richest 1% </span><a class="external-link" data-dcnode-id="452" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.epi.org/action/the-rich-get-richer-and-the-poor-get-poorer/&quot;}" data-offer-url="https://www.epi.org/action/the-rich-get-richer-and-the-poor-get-poorer/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epi.org/action/the-rich-get-richer-and-the-poor-get-poorer/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="453" instrument_node="">accumulating ever-more wealth</span></a><span data-dcnode-id="451" instrument_node="">, Gen Z and Millennials say they have </span><a class="external-link" data-dcnode-id="449" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx&quot;}" data-offer-url="https://news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.gallup.com/poll/268766/socialism-popular-capitalism-among-young-adults.aspx" rel="nofollow noopener" target="_blank"><span data-dcnode-id="450" instrument_node="">grown increasingly disillusioned</span></a><span data-dcnode-id="448" instrument_node=""> with capitalism.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="446" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">But it’s important to explore what capitalism actually involves and the arguments for and against it, so you can make your own decisions about the world you’d like to live in.</span></p><h2 data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Where did capitalism come from?</span></h2><p data-dcnode-id="425"><span data-dcnode-id="441" instrument_node="">The origins of capitalism are complicated, and stretch back to the 16th century, when the British systems of power largely collapsed after the Black Death, </span><a class="external-link" data-dcnode-id="439" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.historytoday.com/ole-j-benedictow/black-death-greatest-catastrophe-ever&quot;}" data-offer-url="https://www.historytoday.com/ole-j-benedictow/black-death-greatest-catastrophe-ever" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.historytoday.com/ole-j-benedictow/black-death-greatest-catastrophe-ever" rel="nofollow noopener" target="_blank"><span data-dcnode-id="440" instrument_node="">a deadly plague that killed off up to 60% of Europe’s entire population</span></a><span data-dcnode-id="438" instrument_node="">. A newly formed class of merchants </span><a class="external-link" data-dcnode-id="436" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.marxists.org/archive/harman/1989/xx/transition.html&quot;}" data-offer-url="https://www.marxists.org/archive/harman/1989/xx/transition.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/harman/1989/xx/transition.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="437" instrument_node="">began to trade</span></a><span data-dcnode-id="435" instrument_node=""> with foreign countries, and this newfound demand for exports </span><a class="external-link" data-dcnode-id="433" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://publishing.cdlib.org/ucpressebooks/view?docId=ft367nb2h4&amp;chunk.id=d0e121&amp;toc.depth=1&amp;toc.id=d0e121&amp;brand=ucpress&quot;}" data-offer-url="https://publishing.cdlib.org/ucpressebooks/view?docId=ft367nb2h4&amp;chunk.id=d0e121&amp;toc.depth=1&amp;toc.id=d0e121&amp;brand=ucpress" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//publishing.cdlib.org/ucpressebooks/view%3FdocId%3Dft367nb2h4%26chunk.id%3Dd0e121%26toc.depth%3D1%26toc.id%3Dd0e121%26brand%3Ducpress" rel="nofollow noopener" target="_blank"><span data-dcnode-id="434" instrument_node="">hurt local economies</span></a><span data-dcnode-id="432" instrument_node=""> and began to dictate overall production and pricing of goods. It also led to the spread of </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/colonialism-explained"><span data-dcnode-id="431" instrument_node="">colonialism</span></a><span data-dcnode-id="429" instrument_node="">, </span><a class="external-link" data-dcnode-id="427" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.huffingtonpost.com/2014/02/24/slavery_n_4847105.html&quot;}" data-offer-url="https://www.huffingtonpost.com/2014/02/24/slavery_n_4847105.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.com/2014/02/24/slavery_n_4847105.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="428" instrument_node="">slavery</span></a><span data-dcnode-id="426" instrument_node="">, and imperialism.</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="423"><div class="ad__slot ad__slot--in-content" data-dcnode-id="424" data-node-id="rctoyd"></div></div><p data-dcnode-id="418"><span data-dcnode-id="422" instrument_node="">The death of feudalism — a hierarchical system often seen as oppressive that kept poor people bonded to their masters’ land, which they farmed in exchange for a place to live and military protection — also left rural British peasants with no homes and no work, which eventually funneled them away from the countryside and into urban centers. These former farm workers then had to sell their labor in a newly competitive work environment in order to survive, while the state worked in concert with the new capitalists to establish a maximum wage and “</span><a class="external-link" data-dcnode-id="420" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism&quot;}" data-offer-url="http://www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism" rel="nofollow noopener" target="_blank"><span data-dcnode-id="421" instrument_node="">clamp down on beggars</span></a><span data-dcnode-id="419" instrument_node="">.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="417" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="405"><span data-dcnode-id="416" instrument_node="">By the 18th century, England had </span><a class="external-link" data-dcnode-id="414" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism&quot;}" data-offer-url="http://www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.solfed.org.uk/a-s-history/unit-1-the-origins-of-capitalism" rel="nofollow noopener" target="_blank"><span data-dcnode-id="415" instrument_node="">converted into an industrial nation</span></a><span data-dcnode-id="413" instrument_node="">, and the dawn of the Industrial Revolution saw an explosion of manufacturing overtake the island. It is within those smoky factories and flammable textile mills that our modern idea of capitalism — and the opposition to it — began to fully flourish. In 1776, Scottish economist Adam Smith published his treatise, </span><a class="external-link" data-dcnode-id="410" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.adamsmith.org/the-wealth-of-nations/&quot;}" data-offer-url="https://www.adamsmith.org/the-wealth-of-nations/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adamsmith.org/the-wealth-of-nations/" rel="nofollow noopener" target="_blank"><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">An Inquiry into the Nature and Causes of the Wealth of Nations</span></em></a><span data-dcnode-id="409" instrument_node="">, which is regarded as the bedrock upon which modern capitalism stands. Though some of his specific ideas about value and labor differ from those of modern economists, Smith is often called “</span><a class="external-link" data-dcnode-id="407" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://decodedpast.com/adam-smith-1723-1790-father-modern-capitalism/15048&quot;}" data-offer-url="http://decodedpast.com/adam-smith-1723-1790-father-modern-capitalism/15048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//decodedpast.com/adam-smith-1723-1790-father-modern-capitalism/15048" rel="nofollow noopener" target="_blank"><span data-dcnode-id="408" instrument_node="">the father of capitalism</span></a><span data-dcnode-id="406" instrument_node="">.”</span></p><h2 data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">What does it mean to be capitalist?</span></h2><p data-dcnode-id="398"><span data-dcnode-id="402" instrument_node="">Individual capitalists are typically wealthy people who have a large amount of capital (money or other financial assets) invested in business, and who benefit from the system of capitalism by making increased profits and thereby adding to their wealth. A capitalist nation is dominated by </span><a class="external-link" data-dcnode-id="400" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.imf.org/external/pubs/ft/fandd/2015/06/basics.htm&quot;}" data-offer-url="http://www.imf.org/external/pubs/ft/fandd/2015/06/basics.htm" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imf.org/external/pubs/ft/fandd/2015/06/basics.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="401" instrument_node="">the free market</span></a><span data-dcnode-id="399" instrument_node="">, which is an economic system in which both prices and production are dictated by corporations and private companies in competition with one another, and places a heavy focus on private property, economic growth, freedom of choice, and limited government intervention. Generally, those to the right of the political spectrum tend to be pro-capitalist; those on the left veer toward anti-capitalism.</span></p><h2 data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">How does capitalism impact people?</span></h2><p data-dcnode-id="385"><span data-dcnode-id="395" instrument_node="">The kind of impact that capitalism has on your life depends on whether you’re a worker or a boss. For someone who owns a company and employs other workers, capitalism may make sense: The more profits your company brings in, the more resources you have to share with your workers, which theoretically improves everyone’s standard of living. It’s all based on the principle of </span><a class="external-link" data-dcnode-id="393" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.investopedia.com/ask/answers/042215/what-difference-between-capitalist-system-and-free-market-system.asp&quot;}" data-offer-url="https://www.investopedia.com/ask/answers/042215/what-difference-between-capitalist-system-and-free-market-system.asp" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/ask/answers/042215/what-difference-between-capitalist-system-and-free-market-system.asp" rel="nofollow noopener" target="_blank"><span data-dcnode-id="394" instrument_node="">supply and demand</span></a><span data-dcnode-id="392" instrument_node="">, and in capitalism, consumption is king. The problem is that </span><a class="external-link" data-dcnode-id="390" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.washingtonpost.com/news/on-leadership/wp/2015/03/13/the-income-gap-between-bosses-and-workers-is-getting-even-bigger-worldwide/?utm_term=.46edceec0966&quot;}" data-offer-url="https://www.washingtonpost.com/news/on-leadership/wp/2015/03/13/the-income-gap-between-bosses-and-workers-is-getting-even-bigger-worldwide/?utm_term=.46edceec0966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/on-leadership/wp/2015/03/13/the-income-gap-between-bosses-and-workers-is-getting-even-bigger-worldwide/%3Futm_term%3D.46edceec0966" rel="nofollow noopener" target="_blank"><span data-dcnode-id="391" instrument_node="">many</span></a><span data-dcnode-id="389" instrument_node=""> capitalist bosses aren’t great at sharing the wealth, which is why one of the </span><a class="external-link" data-dcnode-id="387" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.nytimes.com/2018/01/27/opinion/corporate-tax-cuts-salaries.html&quot;}" data-offer-url="https://www.nytimes.com/2018/01/27/opinion/corporate-tax-cuts-salaries.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/01/27/opinion/corporate-tax-cuts-salaries.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="388" instrument_node="">major critiques of capitalism</span></a><span data-dcnode-id="386" instrument_node=""> is that it is a huge driver of inequality, both social and economic.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="361"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="362"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="364"><div class="Container-imGeBO ftlPuP" data-dcnode-id="370" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy cOXgPu" data-dcnode-id="371" data-testid="cne-interlude-container-right-rail"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU byjIhE kIoYMT" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">WATCH</span></p><figure class="CneVideoEmbedFigure-bJIZil dApMCp cne-video-embed" data-dcnode-id="375"><div data-dcnode-id="376" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="378" id="b9fa57d-5930-60c5-ec64-7def98ea593e" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="379" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU gRUVAY dhOqoy csoDwQ" data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/video/watch/riverdale-s-cole-sprouse-kj-apa-compete-in-a-compliment-battle" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeRightRailTitle-fiGQEr eTiIvU lhdBHp cWonjf" data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Riverdale's Cole Sprouse &amp; KJ Apa Compete in a Compliment Battle</span></p></a></figure></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="368"><div class="ad__slot ad__slot--rail" data-dcnode-id="369" data-node-id="jrl6ub"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="365" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="367"></div><div class="journey-unit" data-dcnode-id="366"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="363"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="357"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="358"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="359" data-node-id="pylwfn"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="280"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="291"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="292" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="293"><p data-dcnode-id="343"><span data-dcnode-id="356" instrument_node="">Capitalism takes the position that “</span><a class="external-link" data-dcnode-id="354" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.investors.com/politics/commentary/free-markets-depend-on-greed/&quot;}" data-offer-url="https://www.investors.com/politics/commentary/free-markets-depend-on-greed/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investors.com/politics/commentary/free-markets-depend-on-greed/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="355" instrument_node="">greed is good</span></a><span data-dcnode-id="353" instrument_node="">,” which its supporters say is a positive thing — greed drives profits and profits drive innovation and product development, which means there are more choices available for those who can afford them. </span><a class="external-link" data-dcnode-id="351" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.econlib.org/library/Enc/Capitalism.html&quot;}" data-offer-url="http://www.econlib.org/library/Enc/Capitalism.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.econlib.org/library/Enc/Capitalism.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="352" instrument_node="">Its opponents say</span></a><span data-dcnode-id="350" instrument_node=""> that capitalism is, by nature, exploitative, and leads to a brutally divided society that tramples the working classes in favor of fattening the rich’s wallets. The Occupy Wall Street movement, for example, </span><a class="external-link" data-dcnode-id="348" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.theguardian.com/world/2011/oct/16/occupy-protests-europe-london-assange&quot;}" data-offer-url="https://www.theguardian.com/world/2011/oct/16/occupy-protests-europe-london-assange" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2011/oct/16/occupy-protests-europe-london-assange" rel="nofollow noopener" target="_blank"><span data-dcnode-id="349" instrument_node="">began as an anti-capitalist protest</span></a><span data-dcnode-id="347" instrument_node=""> against “the 1%” — the richest of the rich of the capitalist class — and asked why they are allowed to grow fat and happy </span><a class="external-link" data-dcnode-id="345" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.huffingtonpost.com/obery-m-hendricks-jr-phd/the-uncompromising-anti-capitalism-of-martin-luther-king-jr_b_4629609.html&quot;}" data-offer-url="https://www.huffingtonpost.com/obery-m-hendricks-jr-phd/the-uncompromising-anti-capitalism-of-martin-luther-king-jr_b_4629609.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.com/obery-m-hendricks-jr-phd/the-uncompromising-anti-capitalism-of-martin-luther-king-jr_b_4629609.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="346" instrument_node="">while 20%</span></a><span data-dcnode-id="344" instrument_node=""> of all American children live in poverty.</span></p><h2 data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Why do people support capitalism?</span></h2><p data-dcnode-id="330"><span data-dcnode-id="340" instrument_node="">Capitalism’s supporters </span><a class="external-link" data-dcnode-id="338" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/&quot;}" data-offer-url="https://listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="339" instrument_node="">believe in several key points</span></a><span data-dcnode-id="337" instrument_node="">: Economic freedom leads to political freedom and having a state-owned means of production can lead to federal overreach and authoritarianism. They view it as the only sensible way to organize a society, insisting that alternatives like socialism, communism, or anarchism are doomed to fail. As former British prime minister Margaret Thatcher, whose pro-capitalism stance is said to have </span><a class="external-link" data-dcnode-id="335" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.spiegel.de/international/europe/margaret-thatcher-leaves-behind-an-economic-legacy-that-changed-world-a-893367.html&quot;}" data-offer-url="http://www.spiegel.de/international/europe/margaret-thatcher-leaves-behind-an-economic-legacy-that-changed-world-a-893367.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.spiegel.de/international/europe/margaret-thatcher-leaves-behind-an-economic-legacy-that-changed-world-a-893367.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="336" instrument_node="">devastated the British working class</span></a><span data-dcnode-id="334" instrument_node="">, </span><a class="external-link" data-dcnode-id="332" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.economist.com/node/13610705&quot;}" data-offer-url="https://www.economist.com/node/13610705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/node/13610705" rel="nofollow noopener" target="_blank"><span data-dcnode-id="333" instrument_node="">once</span></a><span data-dcnode-id="331" instrument_node=""> put it, “There is no alternative.”</span></p><p data-dcnode-id="322"><span data-dcnode-id="329" instrument_node="">When asked to consider capitalism’s negative impact on the environment and our shrinking natural resources, many say that </span><a class="external-link" data-dcnode-id="327" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/&quot;}" data-offer-url="https://listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//listverse.com/2010/12/24/top-10-greatest-benefits-of-capitalism/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="328" instrument_node="">those resources will only become more valuable</span></a><span data-dcnode-id="326" instrument_node=""> and able to generate more capital as they continue to diminish. They also believe that the competition between companies benefits consumers by making products more affordable, and that capitalism’s dog-eat-dog atmosphere encourages people to work harder to achieve their dreams. They are likely to dismiss anti-capitalists’ concerns about inequality and oppression by saying that </span><a class="external-link" data-dcnode-id="324" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.theguardian.com/money/us-money-blog/2014/sep/26/rich-work-harder-ceos-jack-ma&quot;}" data-offer-url="https://www.theguardian.com/money/us-money-blog/2014/sep/26/rich-work-harder-ceos-jack-ma" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/money/us-money-blog/2014/sep/26/rich-work-harder-ceos-jack-ma" rel="nofollow noopener" target="_blank"><span data-dcnode-id="325" instrument_node="">rich people are rich because they are more productive than their poorer counterparts</span></a><span data-dcnode-id="323" instrument_node="">.</span></p><p data-dcnode-id="317"><span data-dcnode-id="321" instrument_node="">Placing central importance on the individual, rather than the collective, is a classic hallmark of capitalism and is at the heart of the “</span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/the-pulling-yourself-up-by-your-bootstraps-myth-explained"><span data-dcnode-id="320" instrument_node="">pull yourself up by your bootstraps</span></a><span data-dcnode-id="318" instrument_node="">” narrative that capitalists find so compelling.</span></p><h2 data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Why do people oppose capitalism?</span></h2><p data-dcnode-id="303"><span data-dcnode-id="314" instrument_node="">Anti-capitalists view capitalism as an </span><a class="external-link" data-dcnode-id="312" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.counterpunch.org/2007/04/30/anti-capitalism-in-five-minutes/&quot;}" data-offer-url="https://www.counterpunch.org/2007/04/30/anti-capitalism-in-five-minutes/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counterpunch.org/2007/04/30/anti-capitalism-in-five-minutes/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="313" instrument_node="">inhuman, anti-democratic, unsustainable, deeply exploitative system that must be dismantled</span></a><span data-dcnode-id="311" instrument_node="">. They see it as inherently at odds with democracy because of how capitalist bosses hold power over workers in the workplace and the fact that, the more capital one accrues, the more power they have. As German Communist philosopher and economist Karl Marx — perhaps the </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/who-is-karl-marx"><span data-dcnode-id="310" instrument_node="">most famous opponent of capitalism in history</span></a><span data-dcnode-id="308" instrument_node="">, who ironically enough helped to popularize the term — wrote in his book </span><a class="external-link" data-dcnode-id="305" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i&quot;}" data-offer-url="https://www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i" rel="nofollow noopener" target="_blank"><em data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Capital, Volume 1: A Critical Analysis of Capitalist Production</span></em></a><span data-dcnode-id="304" instrument_node="">, “Just as man is governed, in religion, by the products of his own brain, so, in capitalist production, he is governed by the products of his own hand.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="302" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="294"><span data-dcnode-id="301" instrument_node="">The essential anti-capitalist argument is that “</span><a class="external-link" data-dcnode-id="299" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.jacobinmag.com/2015/12/erik-olin-wright-real-utopias-anticapitalism-democracy/&quot;}" data-offer-url="https://www.jacobinmag.com/2015/12/erik-olin-wright-real-utopias-anticapitalism-democracy/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2015/12/erik-olin-wright-real-utopias-anticapitalism-democracy/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="300" instrument_node="">the hallmark of capitalism is poverty</span></a><span data-dcnode-id="298" instrument_node=""> in the midst of plenty.” They say the immense suffering and violence that has been forced upon the laboring classes, the ruthless emphasis on profits over people, the proliferation of wage slavery — in which people have no choice but to sell their labor, which we see in every industry from fast food </span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vanityfair.com/news/2018/02/corporate-america-worries-revealing-how-badly-its-screwing-wage-slaves-will-hurt-morale"><span data-dcnode-id="297" instrument_node="">to corporate office work</span></a><span data-dcnode-id="295" instrument_node=""> — and the social alienation.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="281"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="282"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="284"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="289"><div class="ad__slot ad__slot--rail" data-dcnode-id="290" data-node-id="khqwjc"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="286" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="288"></div><div class="journey-unit" data-dcnode-id="287"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="285" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="283"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="277"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="278"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="279" data-node-id="u1re6c"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="217"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="227"><div class="BodyWrapper-ctnerm cneCLK body body__container article__body" data-dcnode-id="228" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="229"><p data-dcnode-id="272"><span data-dcnode-id="276" instrument_node="">Marx also emphasized the system’s capacity to dehumanize workers, </span><a class="external-link" data-dcnode-id="274" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i&quot;}" data-offer-url="https://www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/work/quotes/345846-das-kapital-der-produktionsprocess-des-kapitals---band-i" rel="nofollow noopener" target="_blank"><span data-dcnode-id="275" instrument_node="">writing that</span></a><span data-dcnode-id="273" instrument_node=""> capitalist methods of productivity “mutilate the labourer into a fragment of a man, degrade him to the level of an appendage of a machine, destroy every remnant of charm in his work and turn it into a hated toil.” As the looming threat of automation and erosion of public health care puts more pressure on the working class, its opponents worry that capitalism’s thirst for profit over everything else means that those who sell their labor will be worked to death.</span></p><h2 data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">What is the difference between capitalism and socialism?</span></h2><p data-dcnode-id="256"><span data-dcnode-id="269" instrument_node="">Capitalism and socialism are generally seen as polar opposites, and discussions of either system are often framed as </span><a class="external-link" data-dcnode-id="267" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.huffingtonpost.com/henryk-a-kowalczyk/capitalism-socialism-and-_b_8523486.html&quot;}" data-offer-url="https://www.huffingtonpost.com/henryk-a-kowalczyk/capitalism-socialism-and-_b_8523486.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffingtonpost.com/henryk-a-kowalczyk/capitalism-socialism-and-_b_8523486.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="268" instrument_node="">in opposition to the other</span></a><span data-dcnode-id="266" instrument_node="">. The modern idea of socialism has roots in Greek philosopher Plato but emerged as a popular political idea in the early 19th century </span><a class="external-link" data-dcnode-id="264" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.britannica.com/topic/socialism#ref276336&quot;}" data-offer-url="https://www.britannica.com/topic/socialism#ref276336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/socialism%23ref276336" rel="nofollow noopener" target="_blank"><span data-dcnode-id="265" instrument_node="">among German radicals like Karl Marx and Friedrich Engels</span></a><span data-dcnode-id="263" instrument_node="">. There are many forms of socialism, but at its core, socialism is an economic system in which a whole community — not just bosses or private companies — control the means of production equally. It assumes that people are naturally cooperative, instead of competitive. </span><a class="external-link" data-dcnode-id="261" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.britannica.com/topic/socialism#ref276336&quot;}" data-offer-url="https://www.britannica.com/topic/socialism#ref276336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.britannica.com/topic/socialism%23ref276336" rel="nofollow noopener" target="_blank"><span data-dcnode-id="262" instrument_node="">The goal of socialism</span></a><span data-dcnode-id="260" instrument_node=""> is an egalitarian society run by democratically elected representatives for the benefit of all in accordance with a set of collectively determined parameters; unlike under capitalism, industry and production is run by the state, and the acquisition of private property is seen as counterproductive. Capitalist </span><a class="external-link" data-dcnode-id="258" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.forbes.com/forbes/welcome/?toURL=https://www.forbes.com/sites/modeledbehavior/2017/02/12/socialism-is-bad/&amp;refURL=https://www.google.com/&amp;referrer=https://www.google.com/&quot;}" data-offer-url="https://www.forbes.com/forbes/welcome/?toURL=https://www.forbes.com/sites/modeledbehavior/2017/02/12/socialism-is-bad/&amp;refURL=https://www.google.com/&amp;referrer=https://www.google.com/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/forbes/welcome/%3FtoURL%3Dhttps%3A//www.forbes.com/sites/modeledbehavior/2017/02/12/socialism-is-bad/%26refURL%3Dhttps%3A//www.google.com/%26referrer%3Dhttps%3A//www.google.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="259" instrument_node="">critics of socialism</span></a><span data-dcnode-id="257" instrument_node=""> believe that the system slows economic growth, rewards worker laziness, and can stifle individual rights and free expression.</span></p><p data-dcnode-id="248"><span data-dcnode-id="255" instrument_node="">In a capitalist country, the focus is on profits over anything else; in a socialist country, the public is seen to be more important, and social welfare is a major priority. The United States, the U.K., and Germany are </span><a class="external-link" data-dcnode-id="253" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://communismandcapitalism.weebly.com/list-of-communist-and-capitalist-countries.html&quot;}" data-offer-url="https://communismandcapitalism.weebly.com/list-of-communist-and-capitalist-countries.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//communismandcapitalism.weebly.com/list-of-communist-and-capitalist-countries.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="254" instrument_node="">examples of modern capitalist countries</span></a><span data-dcnode-id="252" instrument_node="">. Many other countries like Norway, Sweden, Canada, and the Netherlands incorporate socialist ideas into their societies, as does the U.S. </span><a class="external-link" data-dcnode-id="250" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.latimes.com/opinion/readersreact/la-le-1023-friday-bernie-sanders-socialism-20151023-story.html&quot;}" data-offer-url="http://www.latimes.com/opinion/readersreact/la-le-1023-friday-bernie-sanders-socialism-20151023-story.html" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.latimes.com/opinion/readersreact/la-le-1023-friday-bernie-sanders-socialism-20151023-story.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="251" instrument_node="">to some degree</span></a><span data-dcnode-id="249" instrument_node="">; for example, universal health care and Social Security are both socialistic concepts.</span></p><p data-dcnode-id="245"><em data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Editor's note: This piece was originally published on April 10, 2018.</span></em></p><p data-dcnode-id="239"><strong data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Related:</span></strong><span data-dcnode-id="242" instrument_node=""> </span><a data-dcnode-id="240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.teenvogue.com/story/colonialism-explained"><span data-dcnode-id="241" instrument_node="">Colonialism, Explained</span></a></p><p data-dcnode-id="236"><strong data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Check this out:</span></strong></p><figure class="CneVideoEmbedFigure-bJIZil iOHMUe cne-video-embed" data-dcnode-id="230" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEVideoEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEVideoEmbed&quot;}" data-include-experiments="true"><div data-dcnode-id="232" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="234" id="f021a6de-f0c7-25f-4793-9ad28efc8e25" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;posit
