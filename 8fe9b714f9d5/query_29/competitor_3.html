</span><header class="article-header" data-dcnode-id="1558"><span data-dcnode-id="1574" instrument_node="">
</span><div class="field field-name-title field-type-ds field-label-hidden" data-dcnode-id="1569"><div class="field-items" data-dcnode-id="1570"><div class="field-item even" data-dcnode-id="1571"><h1 class="page-title" data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Authoritarian Capitalism Versus Democracy</span></h1></div></div></div><div class="field-name-field-research-authors field-meta" data-dcnode-id="1563"><span class="label-inline field-label" data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">by </span></span><span class="field-items" data-dcnode-id="1564"><a class="node node-4807 entityreference" data-dcnode-id="1565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hoover.org/profiles/ivan-krastev"><span data-dcnode-id="1566" instrument_node="">Ivan Krastev</span></a></span></div><div class="field-meta last" data-dcnode-id="1560"><span class="date-display-single" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Friday, March 30, 2012</span></span></div><span data-dcnode-id="1559" instrument_node=""> </span></header><span data-dcnode-id="1557" instrument_node="">
</span><div class="content-above" data-dcnode-id="1546"><span data-dcnode-id="1556" instrument_node="">
</span><div class="field field-name-tweet-count" data-dcnode-id="1548"><span data-dcnode-id="1555" instrument_node="">
</span><span data-dcnode-id="1553" instrument_node="">
</span><span data-dcnode-id="1550" instrument_node="">
</span></div><span data-dcnode-id="1547" instrument_node=""> </span></div><span data-dcnode-id="1545" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="1256"><div class="field-items" data-dcnode-id="1257"><div class="field-item even" data-dcnode-id="1258"><p data-dcnode-id="1540" style="text-indent:12px;text-align:right;"><span data-dcnode-id="1544" instrument_node="">“America is a power, Europe is an experience”</span><br data-dcnode-id="1543"><span class="italic" data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">— Joschka Fischer  </span></span></p><span data-dcnode-id="1539" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1534"><span data-dcnode-id="1538" instrument_node="">I</span><span class="smallcaps" data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">n 2002 robert kagan</span></span><span data-dcnode-id="1535" instrument_node="">, a leading neoconservative intellectual temporarily “exiled” in Brussels, wrote a brilliant essay, “Power and Weakness,” arguing that the political personality of European power as we know it today is
 the product of America’s Cold War policies and the universalization of Europe’s post-World War II political experience. But more than anything else, it is the
 product of Europe’s current military weakness.</span></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1528"><span data-dcnode-id="1532" instrument_node="">In his analysis, post-</span><span class="smallcaps" data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">9/11</span></span><span data-dcnode-id="1529" instrument_node="">&nbsp;America should naturally have cooperated with Europe, but Washington could not
 rely on the European Union as a strategic partner in managing the world because
 “on the all-important question of power — the efficacy of power, the morality of power, the desirability of power — American and European perspectives are diverging.”</span></p><span data-dcnode-id="1527" instrument_node="">
</span><p data-dcnode-id="1522"><span data-dcnode-id="1526" instrument_node="">A decade later American and European perspectives diverge on the all-important
 question of the decline of Western power. While American elites view the very
 discussion of “decline” as “pre-emptive superpower suicide,” Europeans are busy learning how to live in a world where the </span><span class="smallcaps" data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">eu</span></span><span data-dcnode-id="1523" instrument_node="">&nbsp;is not a leading actor and the European continent is not the center of the world
 but simply the wealthiest province. </span></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519"><span data-dcnode-id="1520" instrument_node="">Could it be that the clash between Washington’s denial of the very possibility of America’s decline and Europe’s excessive readiness to adjust to it can damage the Western alliance more than
 the controversy over the use of power did? Could it be that at the heart of the
 current troubles in the transatlantic relationship is a crisis of the political
 imagination of the West?</span></p><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">I want to argue that the paradox of the new world order emerging out of the
 ongoing recession is that the global spread of democracy and capitalism,
 instead of signaling “the end of history,” marked “the end of the West” as a political actor constructed in the days of the Cold War. In the decades to
 come the nature of the political regimes will be an unreliable predictor for
 the geopolitical alliances to emerge; and it is the blurring borders between
 democracies and authoritarian capitalism, rather than the triumph of democracy
 or the resurgence of authoritarianism, that defines the global political
 landscape.</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p class="heading" data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Kagan’s “Long Telegram”</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node="">I</span><span class="smallcaps" data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">n “power and weakness”</span></span><span data-dcnode-id="1508" instrument_node="">&nbsp;Robert Kagan eschewed political correctness, insisting that after the end of the
 Cold War Americans and Europeans no longer shared a common view of the world.
 They no longer shared a common strategic culture. The divergence between
 America and Europe can be best explained not by differences in “national character” or value systems but by the asymmetry of power. It is Europe’s relative military weakness that determines Europeans’ rejection of power as an instrument in international relations. And it is
 America’s strength that defines Americans’ readiness to use military power. In short, capabilities shape intentions.
 Forced to choose between increasing their military budgets and becoming
 second-rate powers, Europeans most likely will choose marginality.</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1505" instrument_node="">Contrary to the opinion of its critics, Kagan’s essay was not a dismissal of the </span><span class="smallcaps" data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">eu</span></span><span data-dcnode-id="1502" instrument_node="">’s relevance in the world. Paradoxically Kagan’s dispatch from Brussels was reaffirmation of the importance of the
 transatlantic alliance. Arguing with the prevailing consensus in Washington at
 the time, he asserted that it was true that Europe had lost its geostrategic
 and military significance for the U.S. But Europe had retained its critical
 ideological relevance for the American foreign policy, he believed, because the
 split between America and Europe meant the end of the post-Cold War world. And
 in Kagan’s strategic vision it is the post-Cold War world — a world without Soviet power but defined by the ideological confrontation
 between free nations and tyrannical regimes — that best suits American interests.</span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1499" instrument_node="">Re-reading Kagan’s article a decade later, we face three critical questions. Was Kagan right to
 expect that even a further decline of the </span><span class="smallcaps" data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">eu</span></span><span data-dcnode-id="1496" instrument_node="">’s influence in global politics, even a threat to the very survival of the </span><span class="smallcaps" data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">eu</span></span><span data-dcnode-id="1493" instrument_node="">, would not force Europe to invest in its military credibility? Was he right to
 expect that America’s political, economic, and military dominance in global politics would be
 sustainable in the medium- and long-term? And was he right to believe that the
 new world order would be structured along the lines of the Cold War
 confrontation between democracies and autocracies?</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p class="heading" data-dcnode-id="1486"><span data-dcnode-id="1490" instrument_node="">The </span><span class="smallcaps" data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">eu</span></span><span data-dcnode-id="1487" instrument_node=""> as a retired power </span></p><span data-dcnode-id="1485" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1478"><span data-dcnode-id="1484" instrument_node="">I</span><span class="smallcaps" data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">n his novel </span></span><span class="italic" data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Death with Interruptions</span></span><span data-dcnode-id="1479" instrument_node="">, Nobel Prize–winning writer José Saramago imagines a world where people will live so long that death will lose
 its central role in human life. At first, people are gripped by euphoria. But
 soon, “awkwardness” of various kinds — metaphysical, political, and practical — starts to reenter their world. The Catholic Church realizes that “without death there is no resurrection, and without resurrection there is no
 church.” For insurance companies, life without death also means oblivion. The state
 faces the impossible task of paying pensions forever. Families with elderly and
 infirm relatives understand that only death saves them from an eternity of
 attentive care. A mafia-style cabal emerges to smuggle old and sick people to
 neighboring countries to die (death is still an option there). The prime
 minister warns the monarch: “If we don’t start dying again, we have no future.”</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1476" instrument_node="">The challenges Europe faces today in many ways resemble the metaphysical
 dilemmas the citizens of Saramago’s “no death” utopian kingdom struggle with. Europe is still the best place to live, but it
 is not any more a good place to dream. What makes Europe a success is at the
 same time what threatens Europe — the welfare state; the multilayered model of </span><span class="smallcaps" data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">eu</span></span><span data-dcnode-id="1473" instrument_node="">&nbsp;governance. The current crisis forced Europe to re-perceive the world, but in a
 paradoxical way it only reinforces Europe’s shift away from military power. Today fear is Europe’s “dominant color,” but Europeans do not worry about being occupied or militarily defeated. What
 they fear is economic insecurity and a loss of their way of life. </span></p><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1470" instrument_node="">A study by the European Council on Foreign Relations, conducted in </span><span class="smallcaps" data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">2011</span></span><span data-dcnode-id="1467" instrument_node="">, found that both the </span><span class="smallcaps" data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">eu</span></span><span data-dcnode-id="1464" instrument_node="">’s security elites and the European public take peace for granted. They
 increasingly look at security through the eyes of insurance companies rather
 than military planners. While the crisis pushed emerging powers like China and
 India to increase their military spending, in Europe defense budgets were the
 first to be cut. </span><span class="smallcaps" data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">nato</span></span><span data-dcnode-id="1461" instrument_node="">’s military intervention in Libya initiated by the French President Nicolas
 Sarkozy and the British Prime Minister David Cameron, while meant to
 demonstrate Europe’s relevance as a military power, ended up confirming the fears that the European
 Union neither is ready nor has the capability to assert itself as a military
 power. The Europeans did not succeed in acting together; the performance of the
 European military units engaged in the operation revealed a dangerous
 dependence on America’s intelligence and logistics; and the European publics, while supportive in the
 beginning, very soon lost their appetite for the intervention. </span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1448"><span data-dcnode-id="1458" instrument_node="">Nobody has better captured the new situation than the former U.S. Secretary of
 Defense Robert Gates, who, echoing Robert Kagan, in a February </span><span class="smallcaps" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">2011</span></span><span data-dcnode-id="1455" instrument_node=""> speech at the National Defense University, expressed his fear that the “demilitarization of Europe — where large swaths of the general public and political class are averse to
 military force and the risks that go with it — has gone from a blessing in the </span><span class="smallcaps" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">20</span></span><span data-dcnode-id="1452" instrument_node="">th century to an impediment to achieving real security and lasting peace in the </span><span class="smallcaps" data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">21</span></span><span data-dcnode-id="1449" instrument_node="">st.”</span></p><span data-dcnode-id="1447" instrument_node="">
</span><div class="pr-inset" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The unfolding of
the post–Cold
War world
order has made
Europeans
nervous and
anxious about
the future.
</span></div><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">The unfolding of the post–Cold War world order has made Europeans nervous and anxious about the future.
 But what the crisis has revealed is Europeans’ strong tendency to translate security problems into economic and social issues
 that can be dealt with by regulation, criminal justice, or technology rather
 than classical foreign and military policies.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1436"><span data-dcnode-id="1440" instrument_node="">Reflecting on the self-destruction of the pre-</span><span class="smallcaps" data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">1914</span></span><span data-dcnode-id="1437" instrument_node="">&nbsp;liberal Europe, the Viennese writer Stefan Zweig was convinced that the outbreak
 of World War I “had nothing to do with ideas and hardly even with frontiers.” The catastrophe should be explained by “the surplus force, a tragic consequence of the internal dynamism that had
 accumulated in forty years of peace and now sought violent release.”</span></p><span data-dcnode-id="1435" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1434" instrument_node="">After </span><span class="smallcaps" data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">70</span></span><span data-dcnode-id="1431" instrument_node=""> years of peace, today’s Europe is not immune to the danger of violent outbursts. But it is not the
 surplus of energy (economic, political, cultural) but the </span><span class="italic" data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">deficit</span></span><span data-dcnode-id="1428" instrument_node=""> of energy that threatens Europe today. The risk-averse nature of the </span><span class="smallcaps" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">eu</span></span><span data-dcnode-id="1425" instrument_node=""> as an international player has its demographic explanation. Europe is aging and
 shrinking. The data projections tell us that the median age in Europe will
 increase to </span><span class="smallcaps" data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">52.3</span></span><span data-dcnode-id="1422" instrument_node=""> years in </span><span class="smallcaps" data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">2050</span></span><span data-dcnode-id="1419" instrument_node=""> from </span><span class="smallcaps" data-dcnode-id="1417"><span data-dcnode-id="1418" instrument_node="">37.7</span></span><span data-dcnode-id="1416" instrument_node=""> years in </span><span class="smallcaps" data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">2003</span></span><span data-dcnode-id="1413" instrument_node="">, while the median age for Americans in </span><span class="smallcaps" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">2050</span></span><span data-dcnode-id="1410" instrument_node=""> will be only </span><span class="smallcaps" data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">35.4</span></span><span data-dcnode-id="1407" instrument_node=""> years. Europe’s share of global </span><span class="smallcaps" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">gdp</span></span><span data-dcnode-id="1404" instrument_node="">&nbsp;is thus liable to shrink in the decades to come. Faced with the choice to either
 open the borders of Europe to immigrants, and thus preserve their standards of
 living, or close the borders and suffer economic declines, Europeans have
 decided to simply reject the political class that articulates this choice. In
 short, Europe is at a point where the demographic imagination defeats the
 democratic one. Europeans do not aspire any more to change other societies;
 they are preoccupied with the fear that others are trying to change them
 through immigration or economic pressure. </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node=""> A decade after the European-American clash over Washington’s military intervention in Iraq, Europeans are still proud of their position of
 nonintervention, but they have had second thoughts about the virtues of a
 multipolar world. If a decade ago Europeans were convinced that what the world
 needs in order to become a better place is a more European-minded America, they
 are not sure any more. America at last has a European-minded president, but
 Barack Obama did not succeed in solving the Israeli-Palestinian conflict, he
 did not succeed in getting Iran off the nuclear path, and he did not succeed in
 changing Russia’s political behavior. What Obama succeeded in doing is starting America’s withdrawal from Europe. It turned out that being European-minded is not the
 same as being interested in Europe. </span></p><span data-dcnode-id="1399" instrument_node="">
</span><div class="pr-inset" data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">It was America’s
global hegemony
that enabled the
EU to emerge on
the world stage
as an attractive
power in the
first place.
</span></div><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1395" instrument_node="">What many of the European critics of American power have discovered is that a
 world order built on seemingly unassailable American power was the one most
 hospitable to the European project. It was America’s global hegemony that enabled the European Union to emerge on the world stage
 as an attractive power in the first place. American hegemony made room for the
 European Union to experiment with being an unconventional, non-nation-state
 actor and freed it to concentrate on its internal scope and institutional
 architecture. America’s security umbrella, not least, allowed the European Union to become a global
 power without needing to become a military one. But while Europeans are
 nostalgic for the American world of yesterday, they do not believe that this is
 the world of tomorrow. Europeans have also lost their conviction that the </span><span class="smallcaps" data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">eu</span></span><span data-dcnode-id="1392" instrument_node="">&nbsp;is the governance model for the world to come. </span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">A decade ago, European public opinion assumed that globalization would prompt
 the decline of states as key international actors and nationalism as a seminal
 political motivator. But what until just yesterday seemed universally
 applicable begins to look exceptional today. Even a passing glance at China,
 India, and Russia, not to speak of the vast reaches of the Muslim world, makes
 clear that both ethnic nationalism and religion are back as major ideological
 driving forces shaping global politics. Post-modernism, post-nationalism, and
 secularism are making Europe different from the rest of the world, not making
 the rest of the world more like Europe.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1386" instrument_node=""> So, Europe is unhappy with the new reality but does not feel strong enough to
 change it. And Kagan was right a decade ago to predict that the </span><span class="smallcaps" data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">eu</span></span><span data-dcnode-id="1383" instrument_node="">’s relative weakness will end up in the narrowing of the European mind and will
 lead Europe away from engaging with global affairs. Only powerful nations can
 subscribe to a universalist agenda: This is the axiom of Kagan’s historically informed realism. The weakness comes together with parochialism.  </span></p><span data-dcnode-id="1381" instrument_node="">
</span><p class="heading" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Decline: A choice or a result of choices made? </span></p><span data-dcnode-id="1378" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1367"><span data-dcnode-id="1377" instrument_node="">A</span><span class="smallcaps" data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">&nbsp;decade after</span></span><span data-dcnode-id="1374" instrument_node=""> “Power and Weakness,” Robert Kagan wrote another piece that captured the imagination of the American
 president. This time the president was not George W. Bush but Barack Obama, and
 the piece was not about Europe but about America. “Against the Myth of American Decline,” an essay published in the </span><span class="italic" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">New Republic</span></span><span data-dcnode-id="1371" instrument_node=""> in February of this year, is Kagan’s argument with all those who believe in America’s decline. Looking back at history and interpreting the symptoms of America’s current malaise, Kagan is convinced that America is not in decline and that
 the fashion of declinism is rooted in analysts’ obsessions with trends at the expense of volumes, and in a nostalgic fallacy.
 Very much like Wall Street investors, most of the proponents of decline are
 preoccupied with leanings, so they tend to view the rising powers as stronger
 than and the United States as weaker than the situation warrants. But if
 analysts decide to look at volumes and not simply at trends, they will see that
 America has preserved its dominant position in military, political, and
 economic terms. Many people also view America as humiliatingly weak today
 because they have a very wrong impression of how strong it was yesterday. In
 reality, the United States was never as influential as some believe. And put in
 historical perspective, the current decline in America’s influence is less alarming compared with what happened to America’s power in </span><span class="smallcaps" data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">1970</span></span><span data-dcnode-id="1368" instrument_node="">s.</span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">What makes Kagan an optimist is his conviction that “the present world order — characterized by an unprecedented number of democratic nations; a greater
 global prosperity, even with the current global crisis, than the world has ever
 known; and a long peace among great powers — reflects American principles and preferences and was built and preserved by
 American power . . . If America’s power declines, this world order will decline with it.” In short, America is not in decline because the world cannot afford it. The
 very survival of the liberal international order is a proof of America’s strength.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1362" instrument_node="">It is true that the determinism of the pessimists who have already accepted
 America’s decline as inevitable is not much different from the determinism of the
 optimists who two decades ago endorsed the idea of the end of history. But
 while it is wrong to bet on America’s decline, it is fair to observe that nothing seems further from America in the </span><span class="smallcaps" data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">1990</span></span><span data-dcnode-id="1359" instrument_node="">s than America today. In the past decade, America’s global influence has suffered substantial setbacks. America has experienced
 the limits of hard power and the erosion of soft power. The wars in Afghanistan
 and Iraq that were meant to be illustrations of American capacity to project
 power and reshape the reality on the ground have turned into illustrations of
 the limits of America’s capacity to make a difference. In the three-worlds universe of postmodern,
 modern, and pre-modern described by Robert Cooper in his book </span><span class="italic" data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">The Breaking of Nations</span></span><span data-dcnode-id="1356" instrument_node="">, America experienced three different sets of constraints. In the postmodern
 world America does not have allies who are ready to share its ambition to
 manage history. In the world of modern nation-states America is constrained not
 by the risk-averse nature of her allies but by the growing military strength of
 her opponents. Nuclear proliferation is a fact and it will be more and more
 difficult for the U.S. to impose its will on hostile nuclear powers. And in the
 pre-modern world of failing states and tribal loyalties America experiences the
 unbearable lightness of nation-building. So, it is not that America has
 declined while others take top seat at the table; it is that on the field of
 global politics, America is not what it used to be.</span></p><span data-dcnode-id="1354" instrument_node="">
</span><div class="pr-inset" data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">America’s power
is manifested not
by capturing
imaginations but
by Washington’s
ability to load
its problems
on others.
</span></div><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">A decade ago, Washington’s power was best demonstrated by its capacity to shape the choices of others,
 making world politics look like a contest of who imitates America best — its economic model, educational institutions, and entertainment industry. Today
 America’s power is manifested not by its capacity to capture the imagination of others
 but by Washington’s capacity to load its problems on others. At present both Europe and America
 have mind-blowing debt problems, but while America succeeds in refinancing its
 debt on very favorable conditions, some of the Eurozone countries are forced to
 finance their debt at self-destructive interest rates. This is a painful
 demonstration of America being a power and Europe being not powerful enough.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">So, decline is a choice but also the outcome of choices that were already made.
 The newly-found weakness of the U.S. is not only in the imagination of the
 declinists but in the erosion of America’s economic power, the declining social mobility in American society, and the
 citizens’ loss of trust in American institutions. The crisis that American society is
 going through is not unprecedented, but that doesn’t mean that this time it cannot end up differently. Kagan is right to argue that
 America cannot turn its back on the world and its problems, but it is also
 unrealistic to believe that America’s reputation will not be hurt by the way others view the performance of the
 American economic and political system. Falling in love with the idea that
 American power is in decline presents a clear and present danger for American
 society. But the denial of America’s visible loss of influence cannot be the alternative to decline. </span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Reflecting on the West’s experience in the last decade, it is fair to observe that if Europe fell
 victim to its tendency to think of military power only in moral terms, America
 fell victim to the trivialization of war. The post–Cold War military interventions (the Balkans being the paradigmatic case)
 created the expectation that American engagements with the world would bring
 maximum glory and minimum casualties. War has lost its meaning as an
 exceptional collective experience that reaffirms the identity of the nation.
 War lost its meaning of national sacrifice and the ultimate concentration of
 national energy. America has become used to what the Brits used to call
 military expeditions. War has been turned into professional sport.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p class="heading" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">Is it tomorrow yet? </span></p><span data-dcnode-id="1339" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1331"><span data-dcnode-id="1338" instrument_node="">I</span><span class="smallcaps" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">n the days</span></span><span data-dcnode-id="1335" instrument_node=""> after the fall of the Berlin Wall, American political scientist Ken Jowitt
 observed that the end of communism is like a political volcano that in the
 beginning affects a circumscribed area but, depending on its force, eventually
 affects the entire globe. As Jowitt wrote in his book </span><span class="italic" data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">New World Disorder</span></span><span data-dcnode-id="1332" instrument_node="">, we cannot expect “the ‘clearing away’ effect of the Leninist extinction to be self-contained, to be a political storm
 that considerately loses its force as if approaches Western and ‘Third World’ coasts.”</span></p><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">Kagan’s unwillingness to acknowledge the dramatic way in which the end of the Cold War
 has affected not only the East but also the West, how it has transformed both
 the liberal democratic regimes and the regimes of authoritarian capitalism, is
 the real source of vulnerability of his insightful analysis. In the current
 world of soft borders he tends to blur the border between the normative and the
 analytical, the border between what should happen and what is most likely to
 happen.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">&nbsp;Kagan envisions international liberal order as a post-Soviet world disciplined
 by the moral clarity of the Cold War ideological confrontation between freedom
 and tyranny and dominated by a single power: the United States. He believes in
 a world divided between the league of democracies and the axis of autocracies.
 But could the Cold War’s ideological frame be preserved in the world of global capitalism, where money,
 technologies, and ideas are changing hands every minute? In a world in which
 the sons and daughters of authoritarian leaders are studying and living in the
 West, in which the money of authoritarian governments is managed by Western
 bankers, in which American voting machines are most likely manufactured in
 China?</span></p><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1323" instrument_node="">Between </span><span class="smallcaps" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">1917</span></span><span data-dcnode-id="1320" instrument_node=""> and </span><span class="smallcaps" data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">1989</span></span><span data-dcnode-id="1317" instrument_node="">, ideologies replaced national passions at the center of world politics. But
 this very exceptional period ended with the collapse of the Soviet Union. The
 end of the Cold War was a blessing for the West because it left capitalism and
 democracy without an alternative, but it was also a curse because it forced the
 alternatives to democracy and capitalism to mutate (taking the forms of
 democratic or market institutions) and because it profoundly changed the
 relations between the elites and societies. </span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The Cold War was a time when the democratic West successfully dismantled the
 borders between social classes while strengthening and successfully defending
 the borders between the states — and in particular between free nations and communist dictatorships. In the days
 of the Cold War, political and business elites haunted by the specter of the
 communist takeover were actively cooperating with the society at large,
 exposing themselves to the constraints of democratic politics. In the past two
 decades, however, the reverse is the trend. The borders between states are
 gradually losing their importance while the borders between social classes have
 become much more difficult to cross. Globalization dramatically increased the
 number of middle-class people in the world, but it has eroded the foundations
 of the middle-class societies that were the distinctive feature of the Cold War
 West. Social inequality has increased in most Western democracies, and social
 mobility has declined.</span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">The global emergence of a hovercraft elite, increasingly borderless and
 emotionally unrelated to their societies, is the fruit of a </span><span class="smallcaps" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">30</span></span><span data-dcnode-id="1308" instrument_node="">-year process that we might call “the movement for the liberation of the elites.” What distinguishes the new elites from previous generations of the rich and
 powerful is their lack of ideology and their escape from the restraints imposed
 by the nation-state. The social contract between rich and poor has been eroded
 by the ease with which the wealthy can stockpile their money beyond the
 redistributive power of the nation-state. But offshore tax shelters are only a
 symptom of a larger trend. The new global elites, elected as well as unelected,
 are less and less dependent on citizen-soldiers (because of volunteer armies
 using push-button weaponry), citizen-workers (because of outsourcing), and
 citizen-consumers (because of foreign purchasers of natural resources and
 high-tech products). And the declining capacity of citizen-voters to control
 politicians or hold their national elites accountable follows naturally from
 the declining influence of citizen-workers, citizen-soldiers, and
 citizen-consumers.</span></p><span data-dcnode-id="1306" instrument_node="">
</span><p class="firstLetter" data-dcnode-id="1301"><span data-dcnode-id="1305" instrument_node="">T</span><span class="smallcaps" data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">he experience of</span></span><span data-dcnode-id="1302" instrument_node="">&nbsp;the past decade demonstrates that the natures of political regimes are not the
 best predictors of emerging geopolitical alliances. Newly emerging democratic
 powers like India and Brazil are very reluctant to make democracy promotion the
 center of their foreign policy decision-making. Old-fashioned ideas of national
 interest, but also postcolonial solidarities, seem much better predicators for
 the foreign policy rationale of the new democratic powers. In Europe in the
 days of the Cold War, foreign policy was kept out of electoral politics, while
 economic decision-making was at its heart. Now, European policymakers are
 trying to place economic decision-making outside of politics; what remains are
 the issues of identity and foreign policy.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">So the world of tomorrow is unlikely to be disciplined by the Cold War corset.
 It is not only that the new democratic powers are unenthusiastic about making
 democracy promotion the defining feature of their international behavior, but
 also the fact that some of the recent democratic explosions in the world are
 likely to end with the establishment of illiberal and anti-Western regimes
 unattractive to American and European publics.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">China is a rising global power, but China is not the ideological “other” Kagan hopes for. The citizens of the democratic West do not see the world of
 authoritarian capitalism as a threat similar to the Soviet one. The Soviet
 Union was not simply a nondemocratic power. It was a hostile political
 universe. It was a power with the ambition to conquer the world and to remake
 it in its own way. None of the current spoilers in international politics has
 this combination of ideological vision and military and political power. Most
 Americans and Europeans are repelled by the realities of the Chinese or Russian
 regimes, but they do not view them as threats to their way of life.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">In a world of blurred borders and offshore elites, the rise of China does not
 necessary mean Chinese rules for the world. The return of “the world without meaning” makes it possible for the international liberal order to survive even if the
 West’s power declines (short of collapse) and the power of authoritarian capitalism
 is on a rise. What </span><span class="italic" data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">can</span></span><span data-dcnode-id="1290" instrument_node="">&nbsp;make China different from the United States as a world leader is not so much
 American democracy vs. Chinese authoritarianism as the contrasting ways in
 which Americans and Chinese have experienced the world beyond their borders.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><div class="pr-inset" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">The spread of
democracy and
capitalism makes
it more difficult
if not impossible
to build lasting
value-based
coalitions.
</span></div><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1284" instrument_node="">America is a nation of immigrants, but it is also a nation of people who never
 emigrate. Since the first Europeans settled there in the </span><span class="smallcaps" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">17</span></span><span data-dcnode-id="1281" instrument_node="">th century, people from around the world have been drawn to the American dream
 of a better future; America’s allure is partly its ability to transform others into Americans. It is,
 therefore, not surprising that America’s global agenda is transformative; it is a rule-maker.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The Chinese, on the other hand, have not tried to change the world, but rather
 to adjust to it. China’s relationships with other countries are channeled through its diaspora, and the
 Chinese perceive the world via their experience as immigrants. </span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Chinatowns — often-insular communities located in large cities around the world — are at the heart of the Chinese experience of the world. As the political
 scientist Lucian Pye once observed, “the Chinese see such an absolute difference between themselves and others that
 they unconsciously find it natural to refer to those in whose homeland they are
 living as ‘foreigners.’”</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">While the American melting pot transforms others, Chinatowns teach their
 inhabitants to adjust — to profit from their hosts’ rules and businesses while remaining separate. While Americans carry their flag
 high, Chinese work hard to be invisible.  </span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Because China is about adaptation, not transformation, it is unlikely to change
 the world dramatically should it ever assume the global driver’s seat. But this does not mean that China won’t exploit the world for its own purposes. </span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">America, at least in theory, prefers that other countries share its values and
 act like Americans. China can only fear a world where everybody acts like the
 Chinese. So, in a future dominated by China, the Chinese will not set the
 rules; rather, they will seek to extract the greatest possible benefit from the
 rules that already exist.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">So this is the paradoxical nature of our new world — the spread of democracy and capitalism makes it more difficult if not
 impossible to build lasting value-based coalitions. At the same time, it makes
 it possible for the international liberal order to survive even in the case
 that the West’s power declines and the powers of authoritarian capitalism enjoy a temporary
 rise.  </span></p><span data-dcnode-id="1261" instrument_node="">
</span><div class="body-footer" data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Ivan Krastev is the chairman of the Centre for Liberal Strategies in Sofia and
permanent fellow at the Institute for Human Sciences in Vienna. He is a member
of the board of the European Council on Foreign Relations.</span></div></div></div></div></div><span data-dcnode-id="1254" instrument_node="">
