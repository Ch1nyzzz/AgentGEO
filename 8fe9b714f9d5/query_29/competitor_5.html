_button" data-dcnode-id="1034"><a class="us_box" data-dcnode-id="1035" href="#"><div class="us_share" data-dcnode-id="1036"><i class="us-icon-ok" data-dcnode-id="1037"></i></div></a></div><div class="us_weibo us_after_more us_no_count us_button" data-dcnode-id="1030"><a class="us_box" data-dcnode-id="1031" href="#"><div class="us_share" data-dcnode-id="1032"><i class="us-icon-weibo" data-dcnode-id="1033"></i></div></a></div><div class="us_xing us_after_more us_no_count us_button" data-dcnode-id="1026"><a class="us_box" data-dcnode-id="1027" href="#"><div class="us_share" data-dcnode-id="1028"><i class="us-icon-xing" data-dcnode-id="1029"></i></div></a></div></div></div></div></div><span data-dcnode-id="1021" instrument_node=""> </span></div><span data-dcnode-id="1019" instrument_node="">

</span><div class="entry-content" data-dcnode-id="366"><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1014" instrument_node="">By </span><a data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evonomics.com/author/kotler/"><span data-dcnode-id="1013" instrument_node="">Philip Kotler</span></a><span data-dcnode-id="1011" instrument_node=""> and </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//christiansarkar.com/about-me/"><span data-dcnode-id="1010" instrument_node="">Christian Sarkar</span></a></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="1006" instrument_node="">The cover of the May 20, 2020 issue of&nbsp;</span><em data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Forbes</span></em><span data-dcnode-id="1003" instrument_node="">&nbsp;magazine carries a picture of&nbsp;</span><strong data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Larry Ellison</span></strong><span data-dcnode-id="1000" instrument_node="">, billionaire founder of Oracle Corporation.&nbsp;On page 114, there’s a&nbsp;</span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/forbespr/2020/04/07/forbes-publishes-34th-annual-list-of-global-billionaires/%3Fsh%3D5c84eacd3edf"><span data-dcnode-id="999" instrument_node="">Billionaires Index</span></a><span data-dcnode-id="997" instrument_node="">&nbsp;that runs six more pages in very small print.&nbsp; The following becomes clear:</span></p><span data-dcnode-id="995" instrument_node="">
</span><ol data-dcnode-id="979"><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Almost every country has billionaires. Even Venezuela and Zimbabwe each has one billionaire.</span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">The U.S. has the largest number of billionaires, around 624.</span></li><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">China has the second largest number of billionaires, 390. Not bad for a country professing communism. In fact, the number of Chinese billionaires is even higher, because Hong Kong is listed separately with 66 billionaires, and independent Taiwan adds additional 40 Chinese billionaires.</span></li><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Germany has 110 billionaires, Russia has 102 billionaires, followed by India with 94 billionaires.</span></li><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Each of the remaining countries has fewer than 100 billionaires, with many in Australia, Canada, France, Switzerland.</span></li><li data-dcnode-id="980"><span data-dcnode-id="984" instrument_node="">I would guess that there are more billionaires who were not known by&nbsp;</span><em data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Forbes</span></em><span data-dcnode-id="981" instrument_node="">&nbsp;or not counted because their wealth couldn’t be estimated. This would include royals, dictators, and criminals. I would venture that the world has somewhere between 2,000 to 2,200 billionaires. The estimated total net wealth of the world’s billionaires is over $8 trillion.</span></li></ol><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="977" instrument_node="">Our thesis is that billionaires could become a&nbsp;</span><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">force for good</span></strong><span data-dcnode-id="974" instrument_node="">&nbsp;– especially if their resources were used for the&nbsp;</span><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Common Good</span></strong><span data-dcnode-id="971" instrument_node="">. There are three way this can happen:</span></p><span data-dcnode-id="969" instrument_node="">
</span><ol data-dcnode-id="962"><li data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">The billionaires suddenly realize that the Common Good of the planet is an important goal for them, so they join forces to save humanity and Nature,</span></li><li data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Our governments make billionaires pay their “fair share” of taxes, or</span></li><li data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Society decides that billionaires shouldn’t exist, and our governments simply tax them out of existence.</span></li></ol><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Will the billionaires agree to higher taxes? In the recent US elections, we recall that Bernie Sanders suggested billionaires should be taxed out of existence, while Joe Biden warned us against demonizing the wealthy.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">There’s a common myth that there will always be billionaires. And the media worships billionaires like Bill Gates and Warren Buffett who illustrate that some billionaires can work for causes that are beyond their own selfish interests.</span></p><span data-dcnode-id="955" instrument_node="">
</span><h2 data-dcnode-id="952"><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">Where do Billionaires Come From?</span></strong></h2><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">We should start by asking where do billionaires come from?&nbsp; Do they just spring out of the fertile digital soil of Silicon Valley?&nbsp; Can anyone – with enough hard work – become a billionaire?</span></p><span data-dcnode-id="948" instrument_node="">
</span><div class="optshorts" data-dcnode-id="942"><h5 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Get Evonomics in your inbox</span></h5><form action="//evonomics.us9.list-manage.com/subscribe/post?u=004c485ee92dbf1aeb4e43681&amp;id=6135d6253e" class="validate" data-dcnode-id="943" id="mc-embedded-subscribe-form" method="post" name="mc-embedded-subscribe-form" novalidate="" target="_blank"><input class="required" data-dcnode-id="945" id="mce-EMAIL" name="EMAIL" placeholder="Enter Your Email" style="width: 50%; padding: 10px; margin-bottom: 10px; max-width: 678px" type="email" value=""><input class="button" data-dcnode-id="944" id="mc-embedded-subscribe" name="subscribe" style="width: auto; background-color: #3295c7; color: #fff; padding: 12px; font-size: 17px; border: none;" type="submit" value="Keep Me Posted!"></form></div><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">So how do you become a billionaire?&nbsp;&nbsp;</span><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Robert Reich</span></strong><span data-dcnode-id="937" instrument_node="">, former U.S. Secretary of Labor,&nbsp;</span><a data-dcnode-id="935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//robertreich.org/post/185986111450"><span data-dcnode-id="936" instrument_node="">explains</span></a><span data-dcnode-id="934" instrument_node="">&nbsp;four sources of wealth:</span></p><span data-dcnode-id="932" instrument_node="">
</span><ul data-dcnode-id="905"><li data-dcnode-id="924"><strong data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Inherited Wealth:</span></strong><span data-dcnode-id="929" instrument_node="">&nbsp;around&nbsp;</span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.piketty.pse.ens.fr/files/AlvaredoGarbintiPiketty2017.pdf"><em data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">60 percent of wealth</span></em></a><span data-dcnode-id="925" instrument_node="">&nbsp;in the US is inherited. The best chance you have of becoming a billionaire is to marry or be born into intergenerational riches.</span></li><li data-dcnode-id="920"><strong data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Monopolies:</span></strong><span data-dcnode-id="921" instrument_node="">&nbsp;Jeff Bezos’ Amazon accounts for nearly 50 percent of all e-commerce retail sales in America. Our patent and trademark systems, which have been extended in duration, create billionaire like George Lucas and Oprah Winfrey.</span></li><li data-dcnode-id="913"><strong data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Insider Information:</span></strong><span data-dcnode-id="917" instrument_node="">&nbsp;Hedge fund billionaire Steven A. Cohen made “hundreds of millions of dollars of&nbsp;</span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.justice.gov/sites/default/files/usao-sdny/legacy/2015/03/25/SAC%2520Capital%2520Complaint%2520-%252013%2520Civ%2520%25205182_1.pdf"><span data-dcnode-id="916" instrument_node="">illegal profits</span></a><span data-dcnode-id="914" instrument_node="">” – through his expertise in insider trading. This is not an isolated incident.</span></li><li data-dcnode-id="906"><strong data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Politics:</span></strong><span data-dcnode-id="910" instrument_node="">&nbsp;You can invest in politicians – or even bet on them, like racehorses – through your timely campaign contributions. Americans for Tax Fairness&nbsp;</span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americansfortaxfairness.org/issue/koch-brothers-1-billion-tax-cut/"><span data-dcnode-id="909" instrument_node="">estimates</span></a><span data-dcnode-id="907" instrument_node="">&nbsp;that Charles Koch and David Koch and/or Koch Industries could save between $1 billion and $1.4 billion combined in income taxes each year from the Trump tax law―and that doesn’t include how much the Koch Industries save in taxes on offshore profits or how much their heirs will benefit from weakening the estate tax.</span></li></ul><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Good luck with these four strategies.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="900" instrument_node="">Without them,&nbsp;</span><strong data-dcnode-id="895"><span data-dcnode-id="899" instrument_node="">the average US worker would have to work for&nbsp;</span><em data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">25 thousand years</span></em><span data-dcnode-id="896" instrument_node="">&nbsp;to become a billionaire</span></strong><span data-dcnode-id="894" instrument_node="">.</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="885"><strong data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">How has the number of billionaires grown over the past few decades?</span></strong><span data-dcnode-id="889" instrument_node="">&nbsp;In 1996 there were 423 billionaires&nbsp;</span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//stats.areppim.com/stats/stats_rich_19_trend_usdxnbr.htm"><span data-dcnode-id="888" instrument_node="">spotted</span></a><span data-dcnode-id="886" instrument_node="">&nbsp;in the wild.&nbsp; In 2019, that number rose to 2,153. Billionaires constitute just 0.00003 percent of the world population, but they currently own the equivalent of 12 percent of the GWP (gross world product) and a much larger percentage of the total wealth of the world.</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">Interestingly, even as COVID destroyed the economy, billionaires&nbsp;</span><a data-dcnode-id="881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2020/oct/07/covid-19-crisis-boosts-the-fortunes-of-worlds-billionaires"><span data-dcnode-id="882" instrument_node="">got richer</span></a><span data-dcnode-id="880" instrument_node="">&nbsp;– to the tune of $10.2 trillion.</span></p><span data-dcnode-id="878" instrument_node="">
</span><h2 data-dcnode-id="875"><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">The Billionaire’s Defense</span></strong></h2><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="873" instrument_node="">Arguments used to defend billionaires are often based on the story that&nbsp;</span><em data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">without billionaires, society would not progress</span></em><span data-dcnode-id="870" instrument_node="">&nbsp;–&nbsp;</span><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">innovation</span></strong><span data-dcnode-id="867" instrument_node="">&nbsp;and&nbsp;</span><strong data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">philanthropy</span></strong><span data-dcnode-id="864" instrument_node="">&nbsp;would diminish – making life even worse.&nbsp; Facebook CEO Mark Zuckerberg, worth $70bn,&nbsp;</span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2019/oct/21/mark-zuckerberg-plea-biillionaire-class-anti-democratic"><span data-dcnode-id="863" instrument_node="">explains</span></a><span data-dcnode-id="861" instrument_node="">&nbsp;this in an appearance on Fox News. Billionaires should not exist in a “cosmic sense,” but in reality most of them are simply “people who do really good things and kind of help a lot of other people. And you get well compensated for that.” He warned about the dangers of ceding too much control over their wealth to the government, allegedly bound to stifle innovation and competition and “deprive the market” of his fellow billionaires’ funding for philanthropy and scientific research.</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">“Some people think that, okay, well the issue or the way to deal with this sort of accumulation of wealth is, ‘Let’s just have the government take it all,” Zuckerberg said. “And now the government can basically decide, you know, all of the medical research that gets done.”</span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">So who decides what research gets done?&nbsp; The drug companies?&nbsp; The billionaires themselves?&nbsp; There is a serious argument to be made that allowing billionaires to decide societal priorities is profoundly undemocratic.&nbsp; Should mega-rich donors like Bill Gates drive philanthropy, usurping the role of democratic governments to decide what social ills to tackle and how?</span></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="852" instrument_node="">Even in terms of innovation, Zuckerberg is wrong. &nbsp;The Information Technology and Innovation Foundation (ITIF)&nbsp;</span><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itif.org/publications/2008/07/09/where-do-innovations-come-transformations-us-national-innovation-system-1970"><span data-dcnode-id="851" instrument_node="">reports</span></a><span data-dcnode-id="849" instrument_node="">&nbsp;that while in the 1970s almost all innovation winners came from corporations acting on their own, more recently over two-thirds of the winners have come from partnerships involving business and government, including federal labs and federally-funded university research. Moreover, in 2006, 77 of the 88 U.S. entities that produced award-winning innovations were beneficiaries of federal funding.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="846" instrument_node="">Facebook, for all Zuckerberg’s talk about innovation, makes the bulk of its profits from selling access to customer data via advertising.&nbsp; It’s certainly&nbsp;</span><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">not</span></em><span data-dcnode-id="843" instrument_node="">&nbsp;a fountain of societal innovation.</span></p><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="840" instrument_node="">Unfortunately, the record of&nbsp;</span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">billionaire activism</span></strong><span data-dcnode-id="837" instrument_node="">&nbsp;is not always a stellar example upholding human values or even democracy, for that matter.&nbsp; The John Birch society, for example, was principally backed by Fred Koch, the father of the infamous Koch brothers. The society famously&nbsp;</span><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prwatch.org/news/2016/01/13017/how-charles-koch-backed-john-birch-society-height-its-attacks-martin-luther-king"><span data-dcnode-id="836" instrument_node="">attacked Martin Luther King</span></a><span data-dcnode-id="834" instrument_node="">&nbsp;and the Civil Rights movement, as well as&nbsp;</span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffpost.com/entry/right-wing-wanted-poster-_b_4598090"><span data-dcnode-id="833" instrument_node="">JFK</span></a><span data-dcnode-id="831" instrument_node="">&nbsp;– with a&nbsp;</span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slate.com/human-interest/2013/11/jfk-assassination-flyer-distributed-in-dallas-by-edwin-walker-s-group-before-his-visit.html"><span data-dcnode-id="830" instrument_node="">campaign</span></a><span data-dcnode-id="828" instrument_node="">&nbsp;to spread hate just two weeks before his assassination in Dallas. This thread of&nbsp;</span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/news/daily-comment/the-john-birchers-tea-party"><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">regressive</span></strong><span data-dcnode-id="825" instrument_node="">&nbsp;billionaire activism</span></a><span data-dcnode-id="823" instrument_node="">&nbsp;continues to this day. The John Birch society’s tired&nbsp;</span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//slate.com/news-and-politics/2020/10/republic-democracy-mike-lee-astra-taylor.html"><span data-dcnode-id="822" instrument_node="">slogan</span></a><span data-dcnode-id="820" instrument_node="">&nbsp;– “this is a republic, not a democracy” is now being amplified by the Trumpists.</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="817" instrument_node="">These are billionaires who are&nbsp;</span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">not</span></em><span data-dcnode-id="814" instrument_node="">&nbsp;interested in the Common Good.&nbsp; In fact, it is their&nbsp;</span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theintercept.com/2018/11/29/alec-corporate-funders-charles-koch/"><span data-dcnode-id="813" instrument_node="">actions</span></a><span data-dcnode-id="811" instrument_node="">&nbsp;that have driven our society to a level of public insecurity and mistrust, not seen since the 60s, or the Civil War, as some have&nbsp;</span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.usc.edu/110124/political-polarization-at-its-worst-since-the-civil-war-2/"><span data-dcnode-id="810" instrument_node="">argued</span></a><span data-dcnode-id="808" instrument_node="">. Clearly, not all billionaires are interested in saving the world.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h2 data-dcnode-id="803"><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Will Billionaires Solve the World’s Biggest Problems?</span></strong></h2><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="801" instrument_node="">Our world is plagued with wicked problems.&nbsp; Recently, we started&nbsp;a project&nbsp;studying what we can do to mitigate the 7 most&nbsp;</span><a data-dcnode-id="799" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wicked7.org/"><span data-dcnode-id="800" instrument_node="">Wicked Problems</span></a><span data-dcnode-id="798" instrument_node="">&nbsp;in the world. COVID-19, for example,would be classified under “health and livelihood” and hopefully the new vaccines will get the coronavirus problem under control within a few years.</span></p><span data-dcnode-id="796" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="794"><img alt="" class="wp-image-7269" data-dcnode-id="795" height="1002" sizes="(max-width: 884px) 100vw, 884px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.55.19-PM.jpg&amp;raw" srcset="https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.55.19-PM.jpg 884w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.55.19-PM-265x300.jpg 265w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.55.19-PM-768x871.jpg 768w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.55.19-PM-132x150.jpg 132w" width="884"></figure><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="792" instrument_node="">Note that one of the Wicked7 problems is</span><strong data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">&nbsp;inequality</span></strong><span data-dcnode-id="789" instrument_node="">.&nbsp; As a problem, it also contributes to other problems such as&nbsp;</span><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">war&nbsp;</span></strong><span data-dcnode-id="786" instrument_node="">and&nbsp;</span><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">health and livelihood</span></strong><span data-dcnode-id="783" instrument_node="">.&nbsp; Inequality is an insidious and growing problem and it is intrinsically related to the growing number of billionaires in the world.&nbsp; As the number of billionaires increase, and average incomes remain the same, income inequality grows as a problem.</span></p><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Given that these wicked problems are an existential threat to our future as a civilization, why is it that the smartest minds in the world are still busy working on algorithms to maximize advertising efficiency or building financial instruments for hedge-fund profits?</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="777" instrument_node="">What would happen if the world drafted&nbsp;</span><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Bill Gates</span></strong><span data-dcnode-id="774" instrument_node="">,&nbsp;</span><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Elon Musk</span></strong><span data-dcnode-id="771" instrument_node="">,&nbsp;</span><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Tim Cook</span></strong><span data-dcnode-id="768" instrument_node="">,&nbsp;</span><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Jamie Dimon</span></strong><span data-dcnode-id="765" instrument_node="">, and&nbsp;</span><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Jeff Bezos</span></strong><span data-dcnode-id="762" instrument_node="">&nbsp;– gave them a mission to find solutions to&nbsp;</span><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">“save the planet in the interest of the common good”&nbsp;</span></strong><span data-dcnode-id="759" instrument_node="">and then presented their “solutions” to the governments of the world – put them to a global&nbsp;</span><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">vote</span></strong><span data-dcnode-id="756" instrument_node="">? The Big 5&nbsp;CEOs could afford to be paid&nbsp;</span><em data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">nothing</span></em><span data-dcnode-id="753" instrument_node="">&nbsp;for this challenge. Well, isn’t that what they should be working on?&nbsp;&nbsp;</span><a data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagine.one/"><strong data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Paul Polman</span></strong></a><strong data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">, former CEO of Unilever,</span></strong><span data-dcnode-id="747" instrument_node="">&nbsp;could also be drafted as the project manager of this&nbsp;</span><em data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Manhattan Project to save humanity</span></em><span data-dcnode-id="744" instrument_node="">. Let’s lock them in a “zoom-room” for the next six months and see what they come up with – we’re pretty sure their businesses will continue doing well without batting an eyelid.</span></p><span data-dcnode-id="742" instrument_node="">
</span><h2 data-dcnode-id="739"><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Narrowing the Distance between the Rich and the Poor?</span></strong></h2><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="737" instrument_node="">We also must ask:&nbsp;</span><strong data-dcnode-id="734"><span data-dcnode-id="736" instrument_node="">what would happen if our governments started working for the Common Good?</span><br data-dcnode-id="735"></strong><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">What would it mean to the world if we (1) got rid of&nbsp;</span><em data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">monopolies</span></em><span data-dcnode-id="729" instrument_node="">, (2) stopped the use of&nbsp;</span><em data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">insider information</span></em><span data-dcnode-id="726" instrument_node="">, (3) prevented billionaires from&nbsp;</span><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">buying off politicians</span></em><span data-dcnode-id="723" instrument_node="">, and (4) made it harder for the billionaires and their corporations to&nbsp;</span><em data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">avoid paying taxes</span></em><span data-dcnode-id="720" instrument_node="">?</span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">You can’t – as the late&nbsp;</span><a data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//paulpolak.com/books/"><span data-dcnode-id="716" instrument_node="">Paul Polak</span></a><span data-dcnode-id="714" instrument_node="">&nbsp;used to say – “donate your way out of poverty.” Billionaires know that just giving money to the poor is not a lasting solution.&nbsp; The statement is often made “don’t give fish to the hungry, just teach them how to fish.” The task is how to create a better education and better skills in people so that they can create value for others and get paid for the value they create.</span></p><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">A quick review of the&nbsp;</span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/tax/10/history-taxes.asp"><span data-dcnode-id="710" instrument_node="">history of taxation</span></a><span data-dcnode-id="708" instrument_node="">&nbsp;in the US shows us what’s been going on: for too long, too many wealthy persons have paid taxes on their wealth at a lower rate than their secretaries!&nbsp; Today’s top U.S. marginal income tax rate is 37%.&nbsp; This is the rate paid on the last bracket of income, not on the whole income.&nbsp; The rich person pays substantially less that 37% on his or her total income. The 37% bracket only affects persons earning an annual income of $518,400 or more.</span></p><span data-dcnode-id="706" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="704"><img alt="" class="wp-image-7270" data-dcnode-id="705" height="642" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-1024x642.jpg&amp;raw" srcset="https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-1024x642.jpg 1024w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-300x188.jpg 300w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-768x482.jpg 768w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-1536x963.jpg 1536w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-150x94.jpg 150w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM-1000x627.jpg 1000w, https://evonomics.com/wp-content/uploads/2020/12/Screen-Shot-2020-12-06-at-12.57.47-PM.jpg 1980w" width="1024"></figure><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Look at how high the top bracket income tax has been historically.&nbsp; The rate was almost 80% in World War 1, over 90% in World War II, and pushed down over time by Republicans to a low of 37%.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">This 37% top tax rate seems ridiculously lower compared to Scandinavian countries that pay a top income tax rate of 70%. What do Scandinavians get back for this very high marginal tax rate. They get back&nbsp;</span><strong data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">“freedom from insecurity.”</span></strong><span data-dcnode-id="696" instrument_node="">&nbsp; Scandinavians don’t have to pay for medicines, surgeries, college education, maternity leave, longer vacations, and so on.&nbsp; The evidence is clear that many Americans might prefer to live in a country with higher taxes on the rich, than in today’s America where at least 15-20% of U.S. citizens can’t meet their basic needs without help.&nbsp; Yes, most of us have plenty to eat but the important things we need like health care and a college education are priced as luxury goods.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="693" instrument_node="">Isn’t it interesting that US citizens have to pay US taxes no matter where in the world they earn their money, but our US corporations don’t have to do the same.&nbsp; And we thought&nbsp;</span><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">corporations were people too</span></em><span data-dcnode-id="690" instrument_node="">!</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">Americans for Tax Fairness&nbsp;</span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//americansfortaxfairness.org/tax-fairness-briefing-booklet/fact-sheet-offshore-corporate-tax-loopholes/"><span data-dcnode-id="686" instrument_node="">points out</span></a><span data-dcnode-id="684" instrument_node="">&nbsp;the&nbsp; loopholes:</span></p><span data-dcnode-id="682" instrument_node="">
</span><ul data-dcnode-id="669"><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Tax avoidance through offshore tax loopholes is a significant reason why corporations, which paid one-third of federal revenues 60 years ago,&nbsp;now pay one-tenth of federal revenues.</span></li><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">U.S. corporations dodge $90 billion a year in income taxes&nbsp;by shifting profits to subsidiaries — often no more than a post office box — in tax havens.</span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">U.S. corporations hold&nbsp;$2.1 trillion in profits offshore&nbsp;— much in tax havens — that have not been taxed in the U.S.</span></li><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">General Electric, which uses a loophole for offshore financial profits, earned $27.5 billion in profits from 2008 to 2012&nbsp;but claimed tax refunds of $3.1 billion.</span></li><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Apple made $74 billion from 2009-2012 on worldwide sales (excluding the Americas) and&nbsp;paid almost nothing in taxes&nbsp;to any country.</span></li><li data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">26 profitable Fortune 500 firms&nbsp;paid no federal income taxes&nbsp;from 2008-2012. 111 large, profitable corporations paid zero federal income taxes in at least one of those five years.</span></li></ul><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The simplest solution is to end tax “deferral.”&nbsp; Corporations would pay taxes on offshore income the year it is earned, rather than indefinitely avoid paying U.S. income taxes. This would also remove incentives to shift U.S. profits to tax havens, and it would raise $600 billion over 10 years.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="664" instrument_node="">Why isn’t this happening?&nbsp;&nbsp;</span><strong data-dcnode-id="660"><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usa.gov/elected-officials"><span data-dcnode-id="663" instrument_node="">Ask your local Senator or Congressperson</span></a><span data-dcnode-id="661" instrument_node="">.</span></strong><span data-dcnode-id="659" instrument_node="">&nbsp; Chances are they are too busy&nbsp;</span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/0e14/2cc5f8d29365f0b8534cbecab221d18f6cfd.pdf"><span data-dcnode-id="658" instrument_node="">raising campaign funds</span></a><span data-dcnode-id="656" instrument_node="">&nbsp;for their re-election.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Passing a higher tax on the rich only slows down the growth of their wealth. &nbsp;&nbsp;Senators Elizabeth Warren and Bernie Sanders have called for a wealth tax. Elizabeth Warren proposed that households should pay an&nbsp;annual 2% tax on their net worth above $50 million, and a&nbsp;3% tax on every dollar of net worth above $1 billion.&nbsp; She recently added possibly raising the billionaire wealth tax rate to 6 percent instead of 3 percent to help pay for “Medicare for All.” &nbsp;Note that the working poor and the middle class do not pay higher taxes. The wealth tax is only paid by very rich.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Another solution is to raise the estate tax.&nbsp; Wealthy persons need a plan describing how their wealth should be divided upon their death.&nbsp; They cannot be allowed to avoid paying estate taxes on their wealth. Married couples won’t pay any inheritance tax on the first $22.36 million in exemptions. The tax on the remaining wealth after exemption is 40 percent.</span></p><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The estate tax could yield more if two changes occurred:</span></p><span data-dcnode-id="645" instrument_node="">
</span><ol data-dcnode-id="640"><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">lower the tax-exempt amount to a much lower number, and</span></li><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">increase the tax rate on the remaining amount from 40% to a much higher number – say 70%.</span></li></ol><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">The government should increase the estate tax rate in a further effort to reduce the growing concentration of wealth in the U.S.&nbsp; Yet Republicans argue that higher estate taxes will lead to more avoidance and also lead talented people to work less hard or threaten to leave the country.&nbsp; I would counter-argue that there are a great many civic-minded talented people waiting to move up the wealth ladder and take their place.&nbsp; The tough issue is what the government will do with the higher estate taxes? Will it be used by government to increase wages and jobs?&nbsp; Or will it go into more defense spending and more bureaucracies? Why don’t we ask citizens to decide?</span></p><span data-dcnode-id="636" instrument_node="">
</span><h2 data-dcnode-id="633"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Convincing Billionaires to Consider the Future of the Planet</span></strong></h2><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="631" instrument_node="">Let’s return to how to encourage the super-rich to give back more of their wealth to society.&nbsp; Bill and Melinda Gates and Warren Buffett carried out an excellent approach to this problem, with their&nbsp;</span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//givingpledge.org/"><span data-dcnode-id="630" instrument_node="">giving pledge</span></a><span data-dcnode-id="628" instrument_node="">. They recruited billionaires to make a commitment to distribute half of their wealth to philanthropic causes within the next 10 years.&nbsp; Today 211 billionaires have made this pledge. Furthermore, each billionaire describes the cause(s) that might get his or her “give-back.” There is an argument to be made that&nbsp;</span><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">if the rich have to “give back” to society, they took too much from society to begin with.</span></strong></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The recruiting effort is continuing.&nbsp; Imagine how many low income persons would benefit if 2,000 billionaires, not just 211 would implement a giving pledge.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Billionaires face the problem of identifying which giving causes would do the most good.&nbsp; This problem faces all the billionaires, including the largest ones: Jeff Bezos ($200B), Bill Gates ($98B), Bernard Arnault and family ($76B), Warren Buffett ($67.5B), Larry Ellison ($59B), Amancio Ortega ($55.1B), Mark Zuckerberg ($54.7B), Jim Wolcott ($54.6B), Alice Wolcott ($54.4B), and S. Robson Walton ($54B).</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Billionaires prefer giving away their money to their favorite causes rather than giving their money as taxes to the U.S. Treasury.&nbsp; They want to control who gets the money. They might not want to see the money go to make or buy more weapons of war.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="614" instrument_node="">This problem has been dubbed “</span><a data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inequality.org/wp-content/uploads/2018/11/Gilded-Giving-2018-November-2018-FINAL.pdf"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">gilded giving</span></strong></a><span data-dcnode-id="610" instrument_node="">” by the&nbsp;</span><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Institute for Policy Studies</span></strong><span data-dcnode-id="607" instrument_node="">. Here is their description of the problem:</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="602"><em data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">The charitable sector is currently experiencing a transition from broad-based support across a wide range of donors to top-heavy philanthropy increasingly dominated by a small number of very wealthy individuals and foundations. This has significant implications for the practice of fundraising, the role of the independent nonprofit sector, and the health of our larger democratic civil society.</span></em></p><span data-dcnode-id="601" instrument_node="">
</span><ul data-dcnode-id="594"><li data-dcnode-id="598"><em data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Risks to charitable independent sector organizations include increased volatility and unpredictability in funding, making it more difficult to budget and forecast income into the future; an increased need to shift toward major donor cultivation; and an increased bias toward funding heavily major-donor-directed boutique organizations and projects. The increasing power of a small number of donors also greatly increases the potential for mission distortion.</span></em></li><li data-dcnode-id="595"><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Risks to the public include an increasingly unaccountable and undemocratic philanthropic sector; the rise of tax avoidance philanthropy; the warehousing of wealth in the face of urgent needs; self-dealing philanthropy; and the increasing use of philanthropy as an extension of power and privilege protection.</span></em></li></ul><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="592" instrument_node="">This&nbsp;</span><a data-dcnode-id="590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bostonglobe.com/opinion/2018/12/07/can-privatize-our-way-out-poverty/VxlSl3rNhjOrya10v36nZK/story.html"><span data-dcnode-id="591" instrument_node="">privatization</span></a><span data-dcnode-id="589" instrument_node="">&nbsp;of charity and the job of government does not bode well for democracy&nbsp;</span><em data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">or</span></em><span data-dcnode-id="586" instrument_node="">&nbsp;the common good. &nbsp;Yet there are exceptions.&nbsp; When Andrew Carnegie, the richest man at the time, decided to start giving back money to good causes, he landed on a brilliant idea.&nbsp; He wanted to raise the educational level of average Americans. Instead of giving money to colleges, he decided to build public libraries, first in America and later around the world. With public libraries, persons would have access to books and be able to build their knowledge in whatever field of interest. Young students could sit quietly in a library, do their homework and chance on seeing a book that might change their life.</span></p><span data-dcnode-id="584" instrument_node="">
</span><h2 data-dcnode-id="581"><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Lessons from the Gilded Age</span></strong></h2><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">The U.S. simply needs to look back at history, to our Gilded Age, to see what can be done to curb wealth growth.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">President Theodore Roosevelt, elected in 1901, moved to break up the monopolies. John D Rockefeller’s Standard Oil was split into 34 separate companies, including the predecessors of Exxon, BP and Chevron.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">What’s stopping us from doing this today?</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">We need to convince billionaires that contributing to an equitable and harmonious society is as pleasurable as earning a lot of money.</span></p><span data-dcnode-id="568" instrument_node="">
</span><h2 data-dcnode-id="565"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">The Danger to Democracy</span></strong></h2><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="563" instrument_node="">Finally,&nbsp;</span><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">are billionaires a threat to democracy?&nbsp;</span></strong></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="558" instrument_node="">Both Trump and Biden raised a substantial part of their&nbsp;</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/trump-biden-2020-election-donations/"><span data-dcnode-id="557" instrument_node="">campaign contributions from billionaires</span></a><span data-dcnode-id="555" instrument_node="">.&nbsp; Apparently the total cost of the 2020 election was close to $14 billion, making it the&nbsp;</span><a data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opensecrets.org/news/2020/10/cost-of-2020-election-14billion-update/"><span data-dcnode-id="554" instrument_node="">most expensive election in history</span></a><span data-dcnode-id="552" instrument_node="">&nbsp;and twice as expensive as the previous presidential election cycle! The&nbsp;</span><strong data-dcnode-id="549"><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.political-innovation.org/"><span data-dcnode-id="551" instrument_node="">Institute for Political Innovation</span></a></strong><span data-dcnode-id="548" instrument_node="">&nbsp;points out: although people tend to think of the American political system as a public institution based on high-minded principles, it’s not. Politics behaves according to the same kinds of incentives and forces that shape competition in any private industry.&nbsp;&nbsp;</span><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Katherine Gehl</span></strong><span data-dcnode-id="545" instrument_node="">&nbsp;and&nbsp;</span><strong data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">Michael Porter</span></strong><span data-dcnode-id="542" instrument_node="">&nbsp;</span><a data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2020/07/fixing-u-s-politics"><span data-dcnode-id="541" instrument_node="">sound the alarm</span></a><span data-dcnode-id="539" instrument_node="">, and make suggestions on what can be done to unrig our political system.</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="527"><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Rebecca Henderson</span></strong><span data-dcnode-id="534" instrument_node="">&nbsp;</span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hbr.org/2020/03/the-business-case-for-saving-democracy"><span data-dcnode-id="533" instrument_node="">points out</span></a><span data-dcnode-id="531" instrument_node="">&nbsp;that in the U.S. and the UK, only around 30% of the youngest voters&nbsp;</span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.journalofdemocracy.org/wp-content/uploads/2017/01/02_28.1_Foa-Mounk-pp-5-15.pdf"><span data-dcnode-id="530" instrument_node="">feel that it is “essential” to live in a democracy</span></a><span data-dcnode-id="528" instrument_node="">, compared with upwards of three-quarters of voters born before WWII.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">She explains:</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="515"><em data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">If government is the counterweight to the free market, democracy is the force that ensures that governments do not devolve into tyranny, seizing control of the markets in the process. I believe that strengthening democracy is the only way to ensure the widespread survival of free-market capitalism, and with it the prosperity and opportunity that has changed the lives of billions of people. It’s also the only way to tackle the world’s biggest threats, from global warming to inequality. Business has the resources, political power, incentives, and responsibility to make significant progress in this endeavor. Indeed, it has widespread support. People today report trusting their employer more than the government or the media, and a recent global survey finds that&nbsp;</span></em><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.edelman.com/sites/g/files/aatuss191/files/2019-02/2019_Edelman_Trust_Barometer_Global_Report.pdf"><em data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">71% of respondents</span></em></a><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">&nbsp;believe that “it is critically important for my CEO to respond to these challenging times.”</span></em></p><span data-dcnode-id="514" instrument_node="">
</span><p data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">So, the final outcome of this debate is political.&nbsp; And that is not always, as history has taught us, a pleasant outcome.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="510" instrument_node="">Studies show that as income inequality grows, so does social unrest and populism.&nbsp; The threat of&nbsp;</span><strong data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">fascism</span></strong><span data-dcnode-id="507" instrument_node="">&nbsp;increases exponentially.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">It’s time to come to our senses as a society, and put a stop to this unbalanced economic system.&nbsp; Times of crises call out for public leadership in service of the Common Good.&nbsp; Absent that leadership, businesses have a responsibility to not be silent, and more importantly, to act.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">In a Democracy, that means all of us, billionaires, businesses, and citizens, must act in a transparent way to:</span></p><span data-dcnode-id="499" instrument_node="">
</span><ol data-dcnode-id="492"><li data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">ensure the public is given access to the truth, and protected from misinformation and “alternative facts.”</span></li><li data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">ensure elections will be fair and free (without the imposition of poll taxes, and other suppression techniques)</span></li><li data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">promote policies for the Common Good, instead of tax-breaks that serve narrow, special interests.</span></li></ol><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">In short,&nbsp;</span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.activistbrands.com/will-business-save-democracy/"><span data-dcnode-id="489" instrument_node="">businesses should support Democracy</span></a><span data-dcnode-id="487" instrument_node="">, and protect society from corruption.&nbsp; Without this basic understanding, we will see a government, institutions, and markets that are no longer trusted by the consumer or the citizen.&nbsp; We will be unable to react to other, more difficult, challenges, and the government of the people, by the people, and for the people will perish from this Earth.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="481"><span data-dcnode-id="484" instrument_node="">If you’re a billionaire, ask yourself:&nbsp;</span><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">what kind of world do I want to leave to my children?</span></strong></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">The rest of us should ask ourselves this question as well. Our time as humans on this planet is almost up. Who will lead us?</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="476" instrument_node="">Originally published at </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fixcapitalism.com/why-cant-billionaires-advance-the-common-good/"><span data-dcnode-id="475" instrument_node="">Fix Capitalism</span></a><span data-dcnode-id="473" instrument_node="">.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">14 December 2020</span></p><span data-dcnode-id="468" instrument_node="">

        </span></div><div class="comment__content" data-dcnode-id="295"><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">When will economists start thinking about the economy and quit arguing about how to distribute "money".  O.K.  We live in a money culture so somebody has to do it. I agree we have to face up to class warfare.   But for once, wouldn't it be nice if economists just once tried solving an economic problem?  If economists would give up arguing about money and try understanding a critically important effect like energy, we would all be bettter off.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="284"><div class="comment__name clearfix" data-dcnode-id="288"><img class="comment__avatar" data-dcnode-id="293" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="290"><a data-dcnode-id="291" href=""><span data-dcnode-id="292" instrument_node="">coalminerson</span></a></strong><span data-dcnode-id="289" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="285"><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Ha, Billionaires need to ask themselves, what kind of world do I want to leave to my children? One where they can take the "unfair advantage" at will! Trump is the learning subject and poster boy who undermines common causes that are good for the people. His four year of authoritarian leadership is the reason we read great economic articles like this. No, we do not need billionaires. Most see innovation of others as an opportunity for monetization and stolen wealth.</span></p></div></div></div><span data-dcnode-id="282" instrument_node="">
