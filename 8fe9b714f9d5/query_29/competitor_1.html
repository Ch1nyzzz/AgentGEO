</span><i data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Economic voting or class voting</span></i><span data-dcnode-id="1785" instrument_node=""> is not the only explanation for electoral behavior. Socioeconomic conflicts are also divided along the lines of cultural conflicts. The latter can be religious or ethnic in nature, but is also apparent in attitudes on a scale of libertarianism to authoritarianism (Kitschelt </span><a aria-label="Reference 2001" data-dcnode-id="1783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d247477930e789" title="Kitschelt, Herbert. 2001. Politische Konfliktlinien in westlichen Demokratien. Ethnisch-kulturelle und wirtschaftliche Verteilungskonflikte. In Schattenseiten der Globalisierung. Rechtsradikalismus, Rechtspopulismus und separatistischer Regionalismus in westlichen Demokratien, ed. Wilhelm Heitmeyer and Dietmar Loch, 418–442. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="1784" instrument_node="">2001</span></a><span data-dcnode-id="1782" instrument_node="">). Particularly the lower (middle) classes (mainly men) are receptive to authoritarian and ethnocentric policies. Examples can be found in the right-wing populist parties of Scandinavia, France, Austria and Switzerland. In these countries the lower class electorate partially voted for authoritarian and xenophobic parties that sometimes pursue neo-liberal economic policies (e.g. SVP in Switzerland and FPÖ in Austria).</span></p><p data-dcnode-id="1764"><span data-dcnode-id="1780" instrument_node="">During the first three quarters of the twentieth century, the right to vote and democratic elections became “paper stones” (Przeworski </span><a aria-label="Reference 1986" data-dcnode-id="1778" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d247477930e795" title="Przeworski, Adam. 1986. Paper stones: A history of electoral socialism. Chicago: The University of Chicago Press."><span data-dcnode-id="1779" instrument_node="">1986</span></a><span data-dcnode-id="1777" instrument_node="">). The post-revolutionary working class used them to tame and socially entrench capitalism by electing left-wing (mostly reformist social democratic) parties, and to successfully establish workers’ rights, a progressive tax system and the expansion of the welfare state. This long period of social expansion witnessed a moderate redistribution of the economic growth gains in most industrially advanced countries, especially after 1945. However, this trend halted and even reversed in the 1970s.</span><sup data-dcnode-id="1772"><a data-dcnode-id="1773" href="#Fn12"><span class="u-visually-hidden" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Footnote </span></span><span data-dcnode-id="1774" instrument_node="">11</span></a></sup><span data-dcnode-id="1771" instrument_node=""> Regarding top-down redistribution, the </span><i data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">paper stones</span></i><span data-dcnode-id="1768" instrument_node=""> have lost their effectiveness and have instead turned into </span><i data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">paper tigers</span></i><span data-dcnode-id="1765" instrument_node="">. Since the 1970s, democratic elections have no longer stopped newly increasing inequality where the rich become richer and the poor and lower classes remain stuck in social immobility.</span></p><p data-dcnode-id="1759"><span data-dcnode-id="1763" instrument_node="">
</span><i data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Thesis 3: During times of financialization the state becomes more vulnerable.</span></i><span data-dcnode-id="1760" instrument_node="">
</span></p><p data-dcnode-id="1751"><span data-dcnode-id="1758" instrument_node="">The financialization of capitalism increased the vulnerability of the state to banks, hedge funds and large investors, making it more visible. Financialization describes a process that began in the US and UK as its core countries. In the last two to three decades it has changed capitalism as well as the relationship between capital and the state in all OECD countries. Heires and Nölke (</span><a aria-label="Reference 2013" data-dcnode-id="1756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d247477930e818" title="Heires, Marcel, and Andreas Nölke. 2013. Finanzialisierung. In Theorien der Internationalen Politischen Ökonomie, ed. Joscha Wullweber, Antonia Graf, and Maria Behrens, 253–266. Wiesbaden: Springer VS."><span data-dcnode-id="1757" instrument_node="">2013</span></a><span data-dcnode-id="1755" instrument_node="">, p.&nbsp;248) define financialization as a process that demands the deregulation of financial markets, eliminates national borders and facilitates the introduction of new “financial products” such as derivatives and debt obligations. It brought forth the rise of hedge and pension funds as well as other “institutional investors”. Financialization made the ideology of </span><i data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">shareholder value</span></i><span data-dcnode-id="1752" instrument_node=""> the primary, if not only, criterion for investment decisions.</span></p><p data-dcnode-id="1743"><span data-dcnode-id="1750" instrument_node="">The financial sector began to occupy a dominant key position in the economy. Its profits far outgrew those of the industrial sector. Industrial producers like Porsche earned more through speculation on financial products than in its core sector, the production of cars. Financialization, however, not only increased the dependence of industrial production on the financial industry; it also increased the dependence of the state and of society. Whether intentional or unintentional, the state emasculated itself by deregulating financial markets. Governments and parties dependent on economic prosperity because of the threat of being voted out of power became reliant on the decisions of big investors and foreign creditors. The financial and Euro crisis that began in 2008 made this visible. Many governments felt obliged to follow the self-help cry of banks that claimed to be “too big to fail” (at least in Europe</span><sup data-dcnode-id="1745"><a data-dcnode-id="1746" href="#Fn13"><span class="u-visually-hidden" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">Footnote </span></span><span data-dcnode-id="1747" instrument_node="">12</span></a></sup><span data-dcnode-id="1744" instrument_node="">). Being “system-relevant” became the characterization of an extra-constitutional state of emergency, which in doubt would justify sacrificing freedoms of parliamentary-democratic decision-making. The fact that taxpayers were the ones to foot the bill is yet further proof of how financial capitalism has become empowered to enforce policies on state and society that lead to bottom-to-top redistribution, both in times of success and crisis.</span></p><p data-dcnode-id="1729"><span data-dcnode-id="1742" instrument_node="">Following the logic of financial capitalism, some states gave up their authoritative role as the rule maker and regressed to being nothing more than a policy taker, constantly assessed by rating agencies. Every autonomous action or even discourse contradicting the new rules could lead to a lower credit rating or an increase in interest rates at which the state would be able to loan money on deregulated financial markets (Simmerl </span><a aria-label="Reference 2012" data-dcnode-id="1740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d247477930e836" title="Simmerl, Georg. 2012. Europäische Schuldenkrise als Demokratiekrise. Zur diskursiven Interaktion zwischen Politik und Finanzmarkt. Berliner Debatte Initial 23:108–124."><span data-dcnode-id="1741" instrument_node="">2012</span></a><span data-dcnode-id="1739" instrument_node="">). The combination of an international run on investments, national party competition and neoliberal economic dogma among those governing lead to a “liberation of the market from mass democracy” (Streeck </span><a aria-label="Reference 2013a" data-dcnode-id="1737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d247477930e839" title="Streeck, Wolfgang. 2013a. Gekaufte Zeit. Die vertagte Krise des demokratischen Kapitalismus. Berlin: Suhrkamp."><span data-dcnode-id="1738" instrument_node="">2013a</span></a><span data-dcnode-id="1736" instrument_node="">, p.&nbsp;77). In the long run this could lead to a “Hayekian dictatorship of the market”, which would be autonomous from democratic impositions. Should this process not be stopped, capitalism and democracy would have to separate eventually (Streeck </span><a aria-label="Reference 2013a" data-dcnode-id="1734" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d247477930e842" title="Streeck, Wolfgang. 2013a. Gekaufte Zeit. Die vertagte Krise des demokratischen Kapitalismus. Berlin: Suhrkamp."><span data-dcnode-id="1735" instrument_node="">2013a</span></a><span data-dcnode-id="1733" instrument_node="">, p.&nbsp;235). Even if one does not share the apocalyptic perspective of Streeck’s analysis, the core argument is amazingly precise: Deregulating markets has put a strain on the compatibility of capitalism and democracy, and has made their incompatibilities more visible. The gap between capitalism and democracy has become larger than during any of the democratic periods in the twentieth century. The state did not become a more proactive regulating force despite the fact that the financial sector caused the financial crisis. Neoliberalism survived the self-inflicted crisis, which Colin Crouch has aptly termed “the strange non-death of neoliberalism” (Crouch </span><a aria-label="Reference 2011" data-dcnode-id="1731" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d247477930e845" title="Crouch, Colin. 2011. Das befremdliche Überleben des Neoliberalismus. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="1732" instrument_node="">2011</span></a><span data-dcnode-id="1730" instrument_node="">). This shows the objective state of helplessness and subjective lack of willingness of democratic governments to act in times of financialization. Current Chancellor of Germany Angela Merkel highlighted this rather openly (and likely unintentionally) when she stated that a “market conformist democracy” is what we should aim for. Had she spoken from a democratic point of view, the argument would be clear: We should not aim for “market conformist democracy” but rather for “democracy conformist capitalism”. The direction of Merkel’s political course is clear: It is not the market that must submit to democracy, but rather democracy that must submit to the market. The most recent Euro crisis and the maneuver of the European Central Bank is further proof: Democracy is subordinate to the market, democracy must adjust to the market.</span></p><p data-dcnode-id="1724"><span data-dcnode-id="1728" instrument_node="">
</span><i data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">Thesis 4: Economic and political globalization increasingly move political decision-making away from parliament to the executive.</span></i><span data-dcnode-id="1725" instrument_node="">
</span></p><p data-dcnode-id="1704"><span data-dcnode-id="1723" instrument_node="">The hallmarks of financial capitalism in an age of globalization are the speed, volume, complexity and scope of financial transactions. By contrast, parliaments are always limited by their territorial scope and the need for time to prepare, deliberate and pass laws. In an age of digitalized computer-based financial flows, large-scale financial transactions take only a fraction of a second. American political scientist William Scheuermann (</span><a aria-label="Reference 2004" data-dcnode-id="1721" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d247477930e857" title="Scheuermann, William. 2004. Liberal democracy and the social acceleration of time. Baltimore: The Johns Hopkins University Press."><span data-dcnode-id="1722" instrument_node="">2004</span></a><span data-dcnode-id="1720" instrument_node="">) speaks in general terms of an “empire of speed”. German sociologist Harmut Rosa calls this the “desynchronization” (Rosa </span><a aria-label="Reference 2012" data-dcnode-id="1718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d247477930e860" title="Rosa, Hartmut. 2012. Weltbeziehungen im Zeitalter der Beschleunigung. Berlin: Suhrkamp."><span data-dcnode-id="1719" instrument_node="">2012</span></a><span data-dcnode-id="1717" instrument_node="">; Rosa and Scheuermann </span><a aria-label="Reference 2009" data-dcnode-id="1715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d247477930e863" title="Rosa, Hartmut, and William Scheuermann. 2009. High-speed society: Social acceleration, power and modernity. Pennsylvania: Penn State University Press."><span data-dcnode-id="1716" instrument_node="">2009</span></a><span data-dcnode-id="1714" instrument_node="">) of politics and economics, of democratic state decisions and private economic transactions. The increased speed of economy and society works in favor of political institutions that do not act deliberatively like the legislature, deliberative citizen councils or the judiciary, but rather act decisively like the executive. It would be naïve to assume that any political decision could keep pace with the speed of financial transactions. Yet, both the </span><i data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">demos</span></i><span data-dcnode-id="1711" instrument_node=""> and the global elites implicitly and explicitly demand faster political decision-making. This is valid especially in times of crises that call for a strong executive (Schmitt </span><a aria-label="Reference 1996 [1931]" data-dcnode-id="1709" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d247477930e869" title="Schmitt, Carl. 1996 [1931]. Der Hüter der Verfassung. 4.&nbsp;Aufl. Berlin: Duncker &amp; Humblot."><span data-dcnode-id="1710" instrument_node="">1996 [1931]</span></a><span data-dcnode-id="1708" instrument_node="">). The most recent example of this has been evident in the political discourse and actions of European governments since 2008. The demand for faster political decision-making illustrates a particular democratic paradox in times of crisis: Far-reaching crisis decisions often have considerable welfare and redistributive consequences. Thus, especially those decisions require reliable, democratic input legitimacy (Enderlein </span><a aria-label="Reference 2013" data-dcnode-id="1706" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d247477930e873" title="Enderlein, Henrik. 2013. Das erste Opfer der Krise ist die Demokratie: Wirtschftspolitik und ihre Legitimation in der Finanzmarktkrise 2008–2013. Politische Vierteljahresschrift 54:714–739."><span data-dcnode-id="1707" instrument_node="">2013</span></a><span data-dcnode-id="1705" instrument_node="">, p.&nbsp;720, 733). The objective or assumed time constraints typically result in technocratic-executive decision-making with thin input legitimacy. Within the context of democratic regimes, the circumvention of important central democratic procedures cannot be justified with better outcomes. This is what differentiates Denmark from Singapore, for example.</span></p></div></div></section><section data-dcnode-id="1609" data-title="Conclusion"><div class="c-article-section" data-dcnode-id="1610" id="Sec8-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1699" id="Sec8"><span data-dcnode-id="1700" instrument_node="">Conclusion</span></h2><div class="c-article-section__content" data-dcnode-id="1611" id="Sec8-content"><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Our theoretical and empirical analysis detects clear and distinct tension between capitalism and democracy. It is apparent that capitalism can prosper under both democratic and authoritarian regimes but that so far, democracy has existed only with capitalism. Nevertheless, capitalism and democracy are guided by different principles that create tensions between the two. This is expressed primarily in the different relations to equality and inequality. The level of inequality that defines specific variants of capitalism and supposedly secures productivity and profits is hardly compatible with the democratic principle of equal rights and opportunities for political participation. Socioeconomic inequality challenges the core democratic principle of equality in participation, representation and governance.</span></p><p data-dcnode-id="1683"><span data-dcnode-id="1696" instrument_node="">However, “the” capitalism does not exist; instead we see different “varieties of capitalism”. This is equally true today as in the past. Different forms of capitalism show different degrees of compatibility with democracy. In (Western) Europe full democracy only truly took root after 1945, when universal suffrage was introduced in most countries.</span><sup data-dcnode-id="1691"><a data-dcnode-id="1692" href="#Fn14"><span class="u-visually-hidden" data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">Footnote </span></span><span data-dcnode-id="1693" instrument_node="">13</span></a></sup><span data-dcnode-id="1690" instrument_node=""> As democracy was fully established in Western Europe, Australia, Canada and New Zealand,</span><sup data-dcnode-id="1685"><a data-dcnode-id="1686" href="#Fn15"><span class="u-visually-hidden" data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Footnote </span></span><span data-dcnode-id="1687" instrument_node="">14</span></a></sup><span data-dcnode-id="1684" instrument_node=""> a certain type of capitalism developed not uncoincidentally: a socially, embedded, and economically (often in a Keynesian form) stabilized and nationally regulated capitalism. However, the general tensions of socioeconomic inequality and the political principle of equality remained unresolved. Nevertheless, their effects were mitigated considerably by regulated labor markets, increased economic welfare, the welfare state, strong labor unions and the activism of class-conscious social democratic or communist (e.g. Italy and France) workers’ or center-left parties. Coexistence between (social) capitalism and (social) democracy never functioned better than during this period.</span></p><p data-dcnode-id="1666"><span data-dcnode-id="1682" instrument_node="">This coexistence has become gradually more difficult since the late 1970s. The OECD countries have moved closer to the Anglo-Saxon variant of capitalism: They were challenged by the neoliberal policies of deregulation and privatization pushed by Ronald Reagan and Margaret Thatcher. The IMF and the neoliberal concept of the European Single Market (ESM) forced their implementation (Scharpf </span><a aria-label="Reference 2012" data-dcnode-id="1680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d247477930e899" title="Scharpf, Fritz W. 2012. Kann man den Euro retten ohne Europa zu zerstören? 
                    http://www.mpifg.de/people/fs/documents/pdf/Kann_man_den_Euro_retten_2012.pdf
                    
                  . Zugegriffen: 20 Jan. 2014."><span data-dcnode-id="1681" instrument_node="">2012</span></a><span data-dcnode-id="1679" instrument_node="">; Streeck </span><a aria-label="Reference 2013a" data-dcnode-id="1677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d247477930e902" title="Streeck, Wolfgang. 2013a. Gekaufte Zeit. Die vertagte Krise des demokratischen Kapitalismus. Berlin: Suhrkamp."><span data-dcnode-id="1678" instrument_node="">2013a</span></a><span data-dcnode-id="1676" instrument_node="">, </span><a aria-label="Reference b" data-dcnode-id="1674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d247477930e905" title="Streeck, Wolfgang. 2013b. Vom DM Nationalismus zum Europatriotismus. Eine Replik auf Jürgen Habermas. Blätter für deutsche und internationale Politik 58 (9): 75–92."><span data-dcnode-id="1675" instrument_node="">b</span></a><span data-dcnode-id="1673" instrument_node="">): tax reforms in favor of companies, capital income, and the rich; labor markets and financial markets deregulated. Even the strongest welfare states of Northern and Western Europe were not able to shield themselves from the neoliberal winds of change. The financialization of capitalist accumulation advanced even in this context and today dominates the world of finance, labor and trade (Heires and Nölke </span><a aria-label="Reference 2013" data-dcnode-id="1671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d247477930e908" title="Heires, Marcel, and Andreas Nölke. 2013. Finanzialisierung. In Theorien der Internationalen Politischen Ökonomie, ed. Joscha Wullweber, Antonia Graf, and Maria Behrens, 253–266. Wiesbaden: Springer VS."><span data-dcnode-id="1672" instrument_node="">2013</span></a><span data-dcnode-id="1670" instrument_node="">, p.&nbsp;252, 2014). Table&nbsp;</span><a data-dcnode-id="1668" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="1669" instrument_node="">1</span></a><span data-dcnode-id="1667" instrument_node="">below summarizes and highlights the democratic drift that resulted from the transition from Keynesian welfare capitalism (KWC) to deregulated financial capitalism (DFC).</span></p><span data-dcnode-id="1665" instrument_node="">
</span><div class="c-article-table" data-container-section="table" data-dcnode-id="1650" data-test="inline-table" id="table-1"><figure data-dcnode-id="1651"><figcaption class="c-article-table__figcaption" data-dcnode-id="1662"><b data-dcnode-id="1663" data-test="table-caption" id="Tab1"><span data-dcnode-id="1664" instrument_node="">Table 1 Democratic drift from KWC to DFC</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1652"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="1653" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s12286-014-0199-4/tables/1" rel="nofollow"><span data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1654" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1655" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1656" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1659" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1658" fill-rule="evenodd"></path><span data-dcnode-id="1657" instrument_node="">
</span></a></div></figure></div><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Considering this (very concise) depiction of the development of democracy during the two stages of capitalism since 1945, a deteriorating quality of democracy can be witnessed in four out of five partial regimes of embedded democracy. They are not only and not always directly caused by financial capitalism, but financial capitalism plays a relevant role. A closer look, however, suggests two causal explanations:</span></p><span data-dcnode-id="1646" instrument_node="">
</span><ol class="u-list-style-none" data-dcnode-id="1626"><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1644" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">1.</span></span><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Deregulated financial capitalism led to increasing socioeconomic inequalities. This had a negative effect on elections and political participation, two of the partial regimes of democracy (A, B). Socioeconomic exclusion and inequality largely transformed into political exclusion and inequality. Exclusion and inequality affected mainly the bottom third of the social classes.</span></p><span data-dcnode-id="1638" instrument_node="">
</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1628"><span data-dcnode-id="1635" instrument_node="">
</span><span class="u-custom-list-number" data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">2.</span></span><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">The globalizing transformation of capitalism led to a transnationalization of markets and the partial supranationalization of important decisions on monetary and economic policy. These changes led to a significant loss of parliamentary powers in favor of the executive (partial regime D: horizontal checks on powers), central banks and the IMF. At the same time, the transnationalization of markets also diminished the effective power of national governments to govern (partial regime E: effective power to govern). This became visible especially during the financial crisis. The losses of the financial sector, forced by “systemic relevance”, and the fear of a negative domino effect, were “socialized” despite decades of previously reckless and politically supported (through deregulation) profitmaking.</span></p><span data-dcnode-id="1629" instrument_node="">
</span></li><span data-dcnode-id="1627" instrument_node="">
</span></ol><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1620"><span data-dcnode-id="1624" instrument_node="">Financial capitalism is harmful for democracy, as it has cracked its social and political “embeddedness”. This does not mean that capitalism </span><i data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">per se</span></i><span data-dcnode-id="1621" instrument_node=""> is incompatible with democracy. A sustainable coexistence of capitalism and democracy is achieved best through mutual embedding. The existence of the right to private property and functioning markets are vital restrictions on the centralization of political power in democratic regimes. Particularly in conjunction with industrialization, capitalism unleashes demands, protests and emancipatory movements that can, under favorable conditions, lead to democratization despite diverging capitalist intentions. The history of capitalism and democracy demonstrated this over large periods of the past century.</span></p><p data-dcnode-id="1612"><span data-dcnode-id="1619" instrument_node="">Since the late 1970s, protest movements have focused more on cultural than economic issues. These new movements were crucial. However, as social and political protest no longer paid much attention to socioeconomic inequalities, these problems grew in the shadows. The brief, more virtual than real protest of the “Occupy Wall Street” movement cannot be compared with the negotiating power of strong trade unions or labor parties in the 1960s and 1970s. The disembedding of capitalism is challenging democracy’s crucial principal of political equality. Representative democracy has not found effective antidotes against the disease of socioeconomic and political inequality. All countermeasures discussed in democratic theory—from referenda to deliberative assemblies, monitoring (Keane </span><a aria-label="Reference 2011" data-dcnode-id="1617" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d247477930e1091" title="Keane, John. 2011. Monitory democracy? In The future of representative democracy, ed. Sonia Alonso, John Keane, and Wolfgang Merkel. Cambridge: Cambridge University Press."><span data-dcnode-id="1618" instrument_node="">2011</span></a><span data-dcnode-id="1616" instrument_node="">), or counter-democracy (Rosanvallon </span><a aria-label="Reference 2008" data-dcnode-id="1614" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d247477930e1094" title="Rosanvallon, Pierre. 2008. Counter-democracy. Politics in an age of distrust. Cambridge: Cambridge University Press."><span data-dcnode-id="1615" instrument_node="">2008</span></a><span data-dcnode-id="1613" instrument_node="">)—may save whales, help control government and improve certain spheres of local democracy, but have little relevance for reregulating markets, restoring social welfare and halting progressing inequality. The cultural turn of progressive democratic politics has forgotten the problem of economic redistribution and now stands empty-handed, without a cure for democracy’s most obvious disease: inequality. Is capitalism compatible with democracy? It depends. It depends on the type of capitalism and on the type of democracy. If one insists that democracy is more than the minimalist concept proposed by Joseph Schumpeter and takes the imperative of political equality and Hans Kelsen’s dogma of “autonomous norms” seriously, the present form of financialized “disembedded capitalism” poses considerable challenges to democracy. If these challenges are not met with democratic and economic reforms, democracy may slowly transform into an oligarchy, formally legitimized by general elections. It is not the crisis of capitalism that challenges democracy, but its neoliberal triumph.</span></p></div></div></section><span data-dcnode-id="1608" instrument_node="">
</span><section data-dcnode-id="1519" data-title="Notes"><div class="c-article-section" data-dcnode-id="1520" id="notes-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1606" id="notes"><span data-dcnode-id="1607" instrument_node="">Notes</span></h2><div class="c-article-section__content" data-dcnode-id="1521" id="notes-content"><ol class="c-article-footnote c-article-footnote--listed" data-dcnode-id="1522"><li class="c-article-footnote--listed__item" data-counter="1." data-dcnode-id="1599" id="Fn1"><div class="c-article-footnote--listed__content" data-dcnode-id="1600"><p data-dcnode-id="1601"><span data-dcnode-id="1605" instrument_node="">The article is a modified version of a co-authored text by Jürgen Kocka and Wolfgang Merkel: “Kapitalismus und Demokratie” forthcoming in: Merkel, Wolfgang (ed.) “Ist die Krise der Demokratie eine Erfindung?” (Merkel </span><a aria-label="Reference 2014" data-dcnode-id="1603" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d247477930e315" title="Merkel, Wolfgang. 2010. Systemtransformation. Eine Einführung in die Theorie und Empirie der Transformationsforschung. 2.&nbsp;Aufl. Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="1604" instrument_node="">2014</span></a><span data-dcnode-id="1602" instrument_node="">). I am very grateful to J. Kocka, however, all remaining weaknesses or shortcomings of this text are my own.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="2." data-dcnode-id="1589" id="Fn2"><div class="c-article-footnote--listed__content" data-dcnode-id="1590"><p data-dcnode-id="1591"><span data-dcnode-id="1598" instrument_node="">Hall and Soskice, however, only describe two varieties of capitalism that they see represented in the context of the OECD: </span><i data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">liberal market economies</span></i><span data-dcnode-id="1595" instrument_node=""> und </span><i data-dcnode-id="1593"><span data-dcnode-id="1594" instrument_node="">coordinated market economies</span></i><span data-dcnode-id="1592" instrument_node="">. New hybrid types of Manchester-like state capitalism in China, gangster capitalism in Russia and Ukraine during the 1990s, and crony capitalism in South East Asia are not taken into consideration here, since they have emerged outside the context of the OECD.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="3." data-dcnode-id="1585" id="Fn3"><div class="c-article-footnote--listed__content" data-dcnode-id="1586"><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">The labels for this type of capitalism vary: “organized capitalism”, “coordinated capitalism”, “Keynesian welfare state” (KWS) or “Fordism”. We use the first two terms interchangeably and take KWS as a variety of “coordinated capitalism” that is particularly compatible with democracy.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="4." data-dcnode-id="1578" id="Fn4"><div class="c-article-footnote--listed__content" data-dcnode-id="1579"><p data-dcnode-id="1580"><span data-dcnode-id="1584" instrument_node="">Cp. more extensively: Merkel (</span><a aria-label="Reference 2004" data-dcnode-id="1582" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d247477930e475" title="Merkel, Wolfgang. 2004. Embedded and defective democracies. Democratization 11 (5): 33–58. (Special issue Consolidated or Defective Democracy? Problems of Regime Change, ed. Aurel Croissant and Wolfgang Merkel)."><span data-dcnode-id="1583" instrument_node="">2004</span></a><span data-dcnode-id="1581" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="5." data-dcnode-id="1574" id="Fn6"><div class="c-article-footnote--listed__content" data-dcnode-id="1575"><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Such cuts were only moderate in Scandinavia, Germany, Austria and France, but drastic within the context of Anglo-Saxon economies (USA, UK, NZ).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="6." data-dcnode-id="1564" id="Fn7"><div class="c-article-footnote--listed__content" data-dcnode-id="1565"><p data-dcnode-id="1566"><span data-dcnode-id="1573" instrument_node="">The welfare state and Keynesianism were, of course, developed to different degrees within the OECD countries (Esping-Andersen </span><a aria-label="Reference 1990" data-dcnode-id="1571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d247477930e627" title="Esping-Andersen, Gøsta. 1990. The three worlds of welfare capitalism. Cambridge: Polity Press."><span data-dcnode-id="1572" instrument_node="">1990</span></a><span data-dcnode-id="1570" instrument_node="">; Hall and Soskice </span><a aria-label="Reference 2001" data-dcnode-id="1568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d247477930e630" title="Hall, Peter A., and David Soskice, eds. 2001. Varieties of capitalism. The institutional foundation of comparative advantage. Oxford: Oxford University Press."><span data-dcnode-id="1569" instrument_node="">2001</span></a><span data-dcnode-id="1567" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="7." data-dcnode-id="1557" id="Fn8"><div class="c-article-footnote--listed__content" data-dcnode-id="1558"><p data-dcnode-id="1559"><span data-dcnode-id="1563" instrument_node="">It is thus even more surprising that neo-classical economics and neo-liberal political forces question this relationship. They see political equality fulfilled by the equal availability of political rights (cp. von Hayek </span><a aria-label="Reference 2003" data-dcnode-id="1561" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d247477930e682" title="von Hayek, Friedrich August. 2003. Recht, Gesetz und Freiheit. Tübingen: Mohr."><span data-dcnode-id="1562" instrument_node="">2003</span></a><span data-dcnode-id="1560" instrument_node="">; the Free Democratic Party of Germany (FDP) and the liberal political parties in the Netherlands and Scandinavia respectively).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="8." data-dcnode-id="1550" id="Fn9"><div class="c-article-footnote--listed__content" data-dcnode-id="1551"><p data-dcnode-id="1552"><span data-dcnode-id="1556" instrument_node="">When asked whether their vote or political participation influence political decision-making, more than two-thirds of lower class citizens in Germany answer with the negative. When confronted with the same question, more than two-thirds of middle class citizens resoundingly respond with the affirmative, stating that their voice has an impact (Merkel and Petring </span><a aria-label="Reference 2012" data-dcnode-id="1554" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d247477930e709" title="Merkel, Wolfgang, and Alexander Petring. 2012. Politische Partizipation und demokratische Inklusion. In Demokratie in Deutschland. Zustand—Herausforderungen—Perspektiven, ed. Tobias Mörschel and Christian Krell, 93–119. Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="1555" instrument_node="">2012</span></a><span data-dcnode-id="1553" instrument_node="">).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="9." data-dcnode-id="1543" id="Fn10"><div class="c-article-footnote--listed__content" data-dcnode-id="1544"><p data-dcnode-id="1545"><span data-dcnode-id="1549" instrument_node="">The exclusive character of US democracy becomes even more apparent if the 10–15&nbsp;% of the lower class without citizenship are taken into account. A considerably smaller part (5&nbsp;%) at the upper end of the income scale does not have citizenship (Bonica et al. </span><a aria-label="Reference 2013" data-dcnode-id="1547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d247477930e718" title="Bonica, Adam, Nolan McCarty, Keith T. Poole, and Howard Rosenthal. 2013. Why hasn’t democracy slowed rising inequality? Journal of Economic Perspectives 27 (3): 103–124."><span data-dcnode-id="1548" instrument_node="">2013</span></a><span data-dcnode-id="1546" instrument_node="">, p.&nbsp;110).</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="10." data-dcnode-id="1539" id="Fn11"><div class="c-article-footnote--listed__content" data-dcnode-id="1540"><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">The financial crisis and the bottom-to-top redistributive effects that have become visible within its context seem to have reached social democratic parties nonetheless. The minimum wage and the effects of deregulation on the financial and labor markets have, after two decades, slowly made their way back onto the front bench of programmatic party demands.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="11." data-dcnode-id="1535" id="Fn12"><div class="c-article-footnote--listed__content" data-dcnode-id="1536"><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">In non-Anglo-Saxon countries this shift did not happen by cutting back the welfare state, but was pushed through by a tax and income policy in favor of business and the better off.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="12." data-dcnode-id="1531" id="Fn13"><div class="c-article-footnote--listed__content" data-dcnode-id="1532"><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">The US government followed the capitalist rules of a free market more closely when it allowed many more banks to go bankrupt then did European governments.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="13." data-dcnode-id="1527" id="Fn14"><div class="c-article-footnote--listed__content" data-dcnode-id="1528"><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">US democracy is, of course, older than that. But even there universal suffrage for women was only introduced in 1920 (in Great Britain in 1928, in France in 1945). Until the mid-1960s six southern US states banned African Americans from voting for racist reasons. Only since that period can the “mother country” of democracy be seen as having fully implemented democratic values.</span></p></div></li><li class="c-article-footnote--listed__item" data-counter="14." data-dcnode-id="1523" id="Fn15"><div class="c-article-footnote--listed__content" data-dcnode-id="1524"><p data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">If one takes full suffrage of men and women as the crucial indicator for a complete democracy, then New Zealand (1900) was the first and Australia one of the first democracies, not the US or UK.</span></p></div></li></ol></div></div></section><div data-dcnode-id="1014" id="MagazineFulltextArticleBodySuffix"><section aria-labelledby="Bib1" data-dcnode-id="1015" data-title="References"><div class="c-article-section" data-dcnode-id="1016" id="Bib1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1517" id="Bib1"><span data-dcnode-id="1518" instrument_node="">References</span></h2><div class="c-article-section
