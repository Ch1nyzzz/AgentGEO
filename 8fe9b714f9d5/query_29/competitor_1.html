</span><meta content="Capitalism and democracy follow different logics: unequally distributed property rights on the one hand, equal civic and political rights on the other; profit-oriented trade within capitalism in contrast to the search for the common good within democracy; debate, compromise and majority decision-making within democratic politics versus hierarchical decision-making by managers and capital owners. Capitalism is not democratic, democracy not capitalist. During the first postwar decades, tensions between the two were moderated through the socio-political embedding of capitalism by an interventionist tax and welfare state. Yet, the financialization of capitalism since the 1980s has broken the precarious capitalist-democratic compromise. Socioeconomic inequality has risen continuously and has transformed directly into political inequality. The lower third of developed societies has retreated silently from political participation; thus its preferences are less represented in parliament and government. Deregulated and globalized markets have seriously inhibited the ability of democratic governments to govern. If these challenges are not met with democratic and economic reforms, democracy may slowly transform into an oligarchy, formally legitimized by general elections. It is not the crisis of capitalism that challenges democracy, but its neoliberal triumph." data-dcnode-id="2861" name="dc.description"><span data-dcnode-id="2860" instrument_node="">

</span><meta content="Is capitalism compatible with democracy? - Zeitschrift für Vergleichende Politikwissenschaft" data-dcnode-id="2657" property="og:title"><span data-dcnode-id="2656" instrument_node="">
</span><meta content="Capitalism and democracy follow different logics: unequally distributed property rights on the one hand, equal civic and political rights on the other; profit-oriented trade within capitalism in contrast to the search for the common good within democracy; debate, compromise and majority decision-making within democratic politics versus hierarchical decision-making by managers and capital owners. Capitalism is not democratic, democracy not capitalist.During the first postwar decades, tensions between the two were moderated through the socio-political embedding of capitalism by an interventionist tax and welfare state. Yet, the financialization of capitalism since the 1980s has broken the precarious capitalist-democratic compromise. Socioeconomic inequality has risen continuously and has transformed directly into political inequality. The lower third of developed societies has retreated silently from political participation; thus its preferences are less represented in parliament and government. Deregulated and globalized markets have seriously inhibited the ability of democratic governments to govern. If these challenges are not met with democratic and economic reforms, democracy may slowly transform into an oligarchy, formally legitimized by general elections. It is not the crisis of capitalism that challenges democracy, but its neoliberal triumph." data-dcnode-id="2655" property="og:description"><span data-dcnode-id="2654" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="2217" data-gtm-vis-first-on-screen-50443292_562="1238" data-gtm-vis-first-on-screen-50443292_563="1237" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1238" data-gtm-vis-recent-on-screen-50443292_563="1237" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2218" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2224" id="Abs1"><span data-dcnode-id="2225" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2219" id="Abs1-content"><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Capitalism and democracy follow different logics: unequally distributed property rights on the one hand, equal civic and political rights on the other; profit-oriented trade within capitalism in contrast to the search for the common good within democracy; debate, compromise and majority decision-making within democratic politics versus hierarchical decision-making by managers and capital owners. Capitalism is not democratic, democracy not capitalist.</span></p><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">During the first postwar decades, tensions between the two were moderated through the socio-political embedding of capitalism by an interventionist tax and welfare state. Yet, the financialization of capitalism since the 1980s has broken the precarious capitalist-democratic compromise. Socioeconomic inequality has risen continuously and has transformed directly into political inequality. The lower third of developed societies has retreated silently from political participation; thus its preferences are less represented in parliament and government. Deregulated and globalized markets have seriously inhibited the ability of democratic governments to govern. If these challenges are not met with democratic and economic reforms, democracy may slowly transform into an oligarchy, formally legitimized by general elections. It is not the crisis of capitalism that challenges democracy, but its neoliberal triumph.</span></p></div></div></section><section aria-labelledby="Abs2" data-dcnode-id="2208" data-gtm-vis-first-on-screen-50443292_562="1238" data-gtm-vis-first-on-screen-50443292_563="1237" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1238" data-gtm-vis-recent-on-screen-50443292_563="1237" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Zusammenfassung" lang="de"><div class="c-article-section" data-dcnode-id="2209" id="Abs2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2215" id="Abs2"><span data-dcnode-id="2216" instrument_node="">Zusammenfassung</span></h2><div class="c-article-section__content" data-dcnode-id="2210" id="Abs2-content"><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">Kapitalismus und Demokratie folgen unterschiedlichen Logiken. Ersterer basiert auf Eigentumsrechten, individueller Gewinnmaximierung, hierarchischen Entscheidungsstrukturen und ungleichen Besitzverhältnissen, Letztere gründet auf der Suche nach Allgemeinwohl, Diskurs, politischer Gleichheit und den Verfahren konsensueller oder majoritärer Entscheidungsfindung. Kapitalismus ist nicht demokratisch und Demokratie nicht kapitalistisch.</span></p><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">Während der ersten Nachkriegsjahrzehnte wurden die Spannungen zwischen Kapitalismus und Demokratie durch einen interventionistischen Steuer- und Wohlfahrtsstaat in Grenzen gehalten. Die Finanzialisierung des Kapitalismus seit den späten 1980er Jahren hat den prekären Kompromiss zerbrochen. Die kontinuierlich zunehmende sozioökonomische Ungleichheit übersetzt sich direkt in politische Ungleichheit. Das untere Drittel der Gesellschaft steigt schweigend aus der politischen Partizipation aus. Gleichzeitig haben Deregulierung und Globalisierung die Handlungsmöglichkeiten demokratischer Regierungen erheblich eingeschränkt. Dies sind gravierende Herausforderungen der Demokratie. Werden sie nicht ernst genommen und wird ihnen nicht mit wirtschaftlichen und politischen Reformen begegnet, werden sich die oligarchischen Tendenzen in Wirtschaft und Demokratie tiefer eingraben. Es ist nicht die Krise, sondern der Triumph des Kapitalismus, der die Demokratie in Bedrängnis gebracht hat.</span></p></div></div></section><span data-dcnode-id="2207" instrument_node="">
</span><section data-dcnode-id="2118" data-gtm-vis-first-on-screen-50443292_562="1238" data-gtm-vis-first-on-screen-50443292_563="1237" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1238" data-gtm-vis-recent-on-screen-50443292_563="1237" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2119" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2205" id="Sec1"><span data-dcnode-id="2206" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2120" id="Sec1-content"><p data-dcnode-id="2188"><span data-dcnode-id="2204" instrument_node="">Throughout the past two centuries, capitalism and democracy have proven themselves the most successful systems of economic and political order.</span><sup data-dcnode-id="2199"><a data-dcnode-id="2200" href="#Fn1"><span class="u-visually-hidden" data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Footnote </span></span><span data-dcnode-id="2201" instrument_node="">1</span></a></sup><span data-dcnode-id="2198" instrument_node=""> Following the demise of Soviet-style socialism after 1989 and the transformations of China’s economy, capitalism has become the predominant system around the world. Only a few isolated countries such as North Korea have been able to resist the success of capitalism through the use of brutal force. The market has become the main mechanism for economic coordination and the maximization of profits. The global competition of economic systems has been clearly won. Yet capitalism, used in singular form, conceals the differences in the “varieties of capitalism” (Hall and Soskice </span><a aria-label="Reference 2001" data-dcnode-id="2196" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d247477930e320" title="Hall, Peter A., and David Soskice, eds. 2001. Varieties of capitalism. The institutional foundation of comparative advantage. Oxford: Oxford University Press."><span data-dcnode-id="2197" instrument_node="">2001</span></a><span data-dcnode-id="2195" instrument_node="">).</span><sup data-dcnode-id="2190"><a data-dcnode-id="2191" href="#Fn2"><span class="u-visually-hidden" data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">Footnote </span></span><span data-dcnode-id="2192" instrument_node="">2</span></a></sup><span data-dcnode-id="2189" instrument_node=""> China’s state capitalism, the Anglo-Saxon neoliberal strand of capitalism or the Scandinavian welfare state economies differ substantially from one another. They function or malfunction rather differently in conjunction with democratic regimes.</span></p><p data-dcnode-id="2180"><span data-dcnode-id="2187" instrument_node="">The success of democracy in the last quarter of the twentieth century was impressive. However, democracy’s success pales in comparison to the spread of capitalism throughout the world. If we take the minimal standards of democracy as a measurement, there were 123 countries (out of around 200) that could be called an “electoral democracy” in 2010 (Freedom House </span><a aria-label="Reference 2010" data-dcnode-id="2185" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d247477930e338" title="Freedom House. 2010. Freedom in the world. 
                    http://www.freedomhouse.org/report/freedom-world/freedom-world-2010#.Uu_OLrS2yF8
                    
                  . Zugegriffen: 22 Jan. 2014."><span data-dcnode-id="2186" instrument_node="">2010</span></a><span data-dcnode-id="2184" instrument_node="">). If the much more stringent concept of a liberal democracy is applied, only 60 countries can be classified as liberal rule of law-based democracies (Merkel </span><a aria-label="Reference 2010" data-dcnode-id="2182" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d247477930e341" title="Merkel, Wolfgang. 2010. Systemtransformation. Eine Einführung in die Theorie und Empirie der Transformationsforschung. 2.&nbsp;Aufl. Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="2183" instrument_node="">2010</span></a><span data-dcnode-id="2181" instrument_node="">). Yet, both electoral and liberal democracies coexist with capitalist economies. Historical evidence also confirms that no developed democracy could exist without capitalism. Vice versa this is not the case. National Socialist Germany, the People’s Republic of China, Singapore and the capitalist dictatorships of Latin America or Asia in the twentieth century all exemplify that capitalism can coexist or even flourish in the context of different forms of political government, such as democracy and dictatorship.</span></p><p data-dcnode-id="2157"><span data-dcnode-id="2179" instrument_node="">The impressive advancement of democracy around the world coincides with the often-cited malaise of the established democracies. Since the turn of the millennium, an ever increasing number of theories and analyses define mature democracies along the lines of “diminished subtypes of democracy” (Offe </span><a aria-label="Reference 2003" data-dcnode-id="2177" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d247477930e347" title="Offe, Claus. 2003. Herausforderungen der Demokratie. Frankfurt a.&nbsp;M.: Campus."><span data-dcnode-id="2178" instrument_node="">2003</span></a><span data-dcnode-id="2176" instrument_node="">), “post-democracies” (Crouch </span><a aria-label="Reference 2004" data-dcnode-id="2174" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d247477930e350" title="Crouch, Colin. 2004. Post-democracy. Cambridge: Polity Press."><span data-dcnode-id="2175" instrument_node="">2004</span></a><span data-dcnode-id="2173" instrument_node="">), “defective democracies” (Merkel </span><a aria-label="Reference 2004" data-dcnode-id="2171" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d247477930e353" title="Merkel, Wolfgang. 2004. Embedded and defective democracies. Democratization 11 (5): 33–58. (Special issue Consolidated or Defective Democracy? Problems of Regime Change, ed. Aurel Croissant and Wolfgang Merkel)."><span data-dcnode-id="2172" instrument_node="">2004</span></a><span data-dcnode-id="2170" instrument_node="">) or mere “façades” (Streeck </span><a aria-label="Reference 2013a" data-dcnode-id="2168" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d247477930e356" title="Streeck, Wolfgang. 2013a. Gekaufte Zeit. Die vertagte Krise des demokratischen Kapitalismus. Berlin: Suhrkamp."><span data-dcnode-id="2169" instrument_node="">2013a</span></a><span data-dcnode-id="2167" instrument_node="">, p.&nbsp;241). Capitalism is primarily blamed for this development. Financial capitalism in particular raises inequalities in income and political participation, curbs the powers of parliaments and seriously constrains the capacity to govern from national executives. The latest financial crisis of 2008 and the subsequent Euro crisis have changed the thinking about the complementary nature of capitalism and democracy. Theoretical as well as empirical analyses are showing an increasing number of contradictions—even incompatibilities—between capitalism and democracy. Albeit with new arguments and insights, the debate contains some theoretical links to the leftist debate in the early 1970s about the legitimacy crisis of the “late capitalist state” (Offe </span><a aria-label="Reference 1972" data-dcnode-id="2165" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d247477930e359" title="Offe, Claus. 1972. Strukturprobleme des kapitalistischen Staates: Aufsätze zur Politischen Soziologie. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="2166" instrument_node="">1972</span></a><span data-dcnode-id="2164" instrument_node="">; Habermas </span><a aria-label="Reference 1973" data-dcnode-id="2162" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d247477930e363" title="Habermas, Jürgen. 1973. Legitimationsprobleme im Spätkapitalismus. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="2163" instrument_node="">1973</span></a><span data-dcnode-id="2161" instrument_node="">; O’Connor </span><a aria-label="Reference 1973" data-dcnode-id="2159" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d247477930e366" title="Habermas, Jürgen. 1973. Legitimationsprobleme im Spätkapitalismus. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="2160" instrument_node="">1973</span></a><span data-dcnode-id="2158" instrument_node="">).</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">How deeply seated are the incompatibilities of “varieties of capitalism” with different varieties of democracy? To what extent has capitalism, in its different varieties, become a challenge for democracy and its normative standards? In our approach capitalism is the challenger, the independent variable, while democracy functions as the dependent variable. Yet, this independent variable is in a constant process of change, conditioned by political, social and economic influences. Our argument is structured as follows:</span></p><span data-dcnode-id="2154" instrument_node="">
</span><ul class="u-list-style-bullet" data-dcnode-id="2122"><span data-dcnode-id="2153" instrument_node="">
</span><li data-dcnode-id="2148"><span data-dcnode-id="2152" instrument_node="">
</span><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">Presenting the main features of capitalism and democracy;</span></p><span data-dcnode-id="2149" instrument_node="">
</span></li><span data-dcnode-id="2147" instrument_node="">
</span><li data-dcnode-id="2142"><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Discussing the basic different logics of the two regimes;</span></p><span data-dcnode-id="2143" instrument_node="">
</span></li><span data-dcnode-id="2141" instrument_node="">
</span><li data-dcnode-id="2136"><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Showing the (in-)compatibility of specific varieties of the two regimes;</span></p><span data-dcnode-id="2137" instrument_node="">
</span></li><span data-dcnode-id="2135" instrument_node="">
</span><li data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Presenting the specifics of current financial capitalism;</span></p><span data-dcnode-id="2131" instrument_node="">
</span></li><span data-dcnode-id="2129" instrument_node="">
</span><li data-dcnode-id="2124"><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Analyzing the challenges posed by financial capitalism to “embedded democracies.”</span></p><span data-dcnode-id="2125" instrument_node="">
</span></li><span data-dcnode-id="2123" instrument_node="">
</span></ul><span data-dcnode-id="2121" instrument_node="">
</span></div></div></section><section data-dcnode-id="2065" data-gtm-vis-first-on-screen-50443292_562="1238" data-gtm-vis-first-on-screen-50443292_563="1237" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1238" data-gtm-vis-recent-on-screen-50443292_563="1237" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Three types of capitalism"><div class="c-article-section" data-dcnode-id="2066" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2116" id="Sec2"><span data-dcnode-id="2117" instrument_node="">Three types of capitalism</span></h2><div class="c-article-section__content" data-dcnode-id="2067" id="Sec2-content"><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The main difference in various types of capitalism is the relationship between the market and the state. Three types of capitalism can be identified as having prevailed during different periods of time over the last two centuries. They are historical types but can also be read as ideal types since the number of defining elements is reduced to the most important ones and the concrete properties of those single characteristics are described in a stylized manner.</span></p><span data-dcnode-id="2113" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">Market-liberal capitalism:</span></h3><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2109" instrument_node="">Coined by the prevailing market principles in the relationship between different companies, this type was dominant in Europe and North America throughout much of the nineteenth century. State institutions in this context largely refrained from interfering in markets (including labor markets), and economic and social policy (Berend and Schubert </span><a aria-label="Reference 2007" data-dcnode-id="2107" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d247477930e417" title="Winkler, Heinrich August, ed. 1974. Organisierter Kapitalismus. Voraussetzungen und Anfänge. Göttingen: Vandenhoek &amp; Ruprecht."><span data-dcnode-id="2108" instrument_node="">2007</span></a><span data-dcnode-id="2106" instrument_node="">). Taxes and expenditures were low; the welfare state had emerged only in an embryonic state.</span></p><span data-dcnode-id="2104" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">Organized and embedded capitalism:</span></h3><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2100" instrument_node="">Within the context of technological and organizational innovations, capitalism developed internal needs for coordination and regulation. Moreover, a barely regulated form of capitalism resulted in increasing social tensions. Together, these two factors were the driving force behind a more organized form of capitalism. This became visible on several fronts: Large businesses began to find ways of cooperating that limited competition (such as cartels, mergers and associations), and ways to identify and represent common interest. Furthermore, the state began to interfere increasingly in the economy and society by implementing labor laws, selective subsidies, nationalization and increasing regulation, but also by creating the welfare state and expanding its social policy—in Germany already in place since the 1880s (Winkler </span><a aria-label="Reference 1974" data-dcnode-id="2098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d247477930e428" title="Winkler, Heinrich August, ed. 1974. Organisierter Kapitalismus. Voraussetzungen und Anfänge. Göttingen: Vandenhoek &amp; Ruprecht."><span data-dcnode-id="2099" instrument_node="">1974</span></a><span data-dcnode-id="2097" instrument_node="">; Lash and Urry </span><a aria-label="Reference 1987" data-dcnode-id="2095" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d247477930e431" title="Winkler, Heinrich August, ed. 1974. Organisierter Kapitalismus. Voraussetzungen und Anfänge. Göttingen: Vandenhoek &amp; Ruprecht."><span data-dcnode-id="2096" instrument_node="">1987</span></a><span data-dcnode-id="2094" instrument_node="">). The ensuing </span><i data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">organized capitalism</span></i><span data-dcnode-id="2091" instrument_node=""> that developed in the twentieth century took different shapes: In the USA it appeared as the New Deal of the 1930s and 1940s, in the Federal Republic of Germany and other European countries as the social market economy, and in France and Scandinavia as distinctly Keynesian welfare state capitalism. It did and does, however, also coexist in a dictatorial variety: in National Socialist Germany and—again in a different shape—in the state capitalism of East Asia during the most recent decades.</span><sup data-dcnode-id="2086"><a data-dcnode-id="2087" href="#Fn3"><span class="u-visually-hidden" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Footnote </span></span><span data-dcnode-id="2088" instrument_node="">3</span></a></sup><span data-dcnode-id="2085" instrument_node="">
</span></p><span data-dcnode-id="2083" instrument_node="">
</span><h3 class="c-article__sub-heading" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Neoliberal capitalism:</span></h3><span data-dcnode-id="2080" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2079" instrument_node="">Since the late 1970s, “neoliberal” critique has gained traction, sometimes in sharp contrast to Keynesian welfare state capitalism. It stressed market mechanisms, the principle of capitalist self-regulation and the limits of state regulation (Harvey </span><a aria-label="Reference 2007" data-dcnode-id="2077" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d247477930e450" title="Harvey, David. 2007. A brief history of neoliberalism. Oxford: Oxford University Press."><span data-dcnode-id="2078" instrument_node="">2007</span></a><span data-dcnode-id="2076" instrument_node="">). John Maynard Keynes’s concept of managing capitalism through the demand side and Karl Polanyi’s idea of a socially </span><i data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">embedded capitalism</span></i><span data-dcnode-id="2073" instrument_node=""> were replaced by that of Friedrich August von Hayek and his understanding of the market as a </span><i data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">spontaneous order</span></i><span data-dcnode-id="2070" instrument_node="">, and by Milton Friedman’s pledge for a minimal state where state interference into the economy is restricted only to a modest variation in the supply of money. A new phase of capitalism began, shaped by deregulation, privatization and partial deconstruction of the welfare state. Globalization was advancing quickly, international financial capitalism became exceedingly important and socioeconomic inequalities within different societies began to increase.</span></p><span data-dcnode-id="2068" instrument_node="">
</span></div></div></section><section data-dcnode-id="2032" data-gtm-vis-first-on-screen-50443292_562="1238" data-gtm-vis-first-on-screen-50443292_563="1237" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="1238" data-gtm-vis-recent-on-screen-50443292_563="1237" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Three types of democracy"><div class="c-article-section" data-dcnode-id="2033" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2063" id="Sec3"><span data-dcnode-id="2064" instrument_node="">Three types of democracy</span></h2><div class="c-article-section__content" data-dcnode-id="2034" id="Sec3-content"><p data-dcnode-id="2052"><span data-dcnode-id="2062" instrument_node="">The definition of democracy is highly contested: liberal, social, pluralistic, elitist, decisionist, communitarian, cosmopolitan, republican, deliberative, participatory, feminist, critical, post-modern and multicultural concepts of democracy all compete with each other (Lembcke et al. </span><a aria-label="Reference 2012" data-dcnode-id="2060" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d247477930e468" title="Lembcke, Oliver W., Claudia Ritzi, and Gary S. Schaal, eds. 2012. Zeitgenössische Demokratietheorie, Bd.&nbsp;1: Normative Demokratietheorien. Wiesbaden: Springer VS."><span data-dcnode-id="2061" instrument_node="">2012</span></a><span data-dcnode-id="2059" instrument_node="">). From a more simplified perspective, however, three groups of democracy theories can be identified: the minimalist, middle-ground and maximizing theories. Depending on which concept of democracy is applied, a “crisis of democracy” can be identified seldom, often or almost always. In our analysis we will use the middle-ground model of democracy, more precisely, the concept of an embedded democracy as a point of reference.</span><sup data-dcnode-id="2054"><a data-dcnode-id="2055" href="#Fn4"><span class="u-visually-hidden" data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Footnote </span></span><span data-dcnode-id="2056" instrument_node="">4</span></a></sup><span data-dcnode-id="2053" instrument_node="">
</span></p><p data-dcnode-id="2035"><span data-dcnode-id="2051" instrument_node="">
</span><i data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">Embedded democracy</span></i><span data-dcnode-id="2048" instrument_node=""> consists of five partial regimes: the regime of democratic elections (A), the regime of political participation (B), the partial regime of civic rights (C), the institutional protection of the separation of powers (</span><i data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">horizontal accountability)</span></i><span data-dcnode-id="2045" instrument_node=""> (D) and the guarantee that the effective use of power by democratically elected representatives is assured </span><i data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">de jure</span></i><span data-dcnode-id="2042" instrument_node=""> and </span><i data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">de facto</span></i><span data-dcnode-id="2039" instrument_node=""> (E)</span><i data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">.</span></i><span data-dcnode-id="2036" instrument_node=""> In the democratic system these five partial regimes all fulfill specific functions. Every single one of them faces particular internal and external challenges. Each of the individual partial regimes has its own “crisis capacity” and specific inter- and independence within embedded democracy. Whether or not a partial regime is infected by crisis and how far a crisis can expand beyond a certain partial regime depends on these factors. In the following we will concentrate only on those challenges to democracy that are caused by capitalism and its different varieties.</span></p></div></div></section><section data-dcnode-id="2001" data-title="Compatibilities and incompatibilities"><div class="c-article-section" data-dcnode-id="2002" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2030" id="Sec4"><span data-dcnode-id="2031" instrument_node="">Compatibilities and incompatibilities</span></h2><div class="c-article-section__content" data-dcnode-id="2003" id="Sec4-content"><p data-dcnode-id="2022"><span data-dcnode-id="2029" instrument_node="">The basic logics of capitalism and democracy are fundamentally different and lead to considerable tension between the two. Both have different claims to legitimacy: unequally distributed property rights on the one side, equal civic rights on the other. Within these claims to legitimacy, different procedures prevail: profit-oriented trade within capitalism, debate and majority decision-making within democratic politics. Capitalist activities clearly aim to facilitate the selfish seeking behavior of particularistic advantages, even though, according to Adam Smith, it can be claimed that such selfish actions serve the common good. The realization of the common good is the aim of democratic politics, however in this context it is clear that the outcome of competition and cooperation of pluralist interests is only coming to light </span><i data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">a posteriori</span></i><span data-dcnode-id="2026" instrument_node=""> (Fraenkel </span><a aria-label="Reference 1974 [1964]" data-dcnode-id="2024" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d247477930e509" title="Fraenkel, Ernst. 1974 [1964]. Deutschland und die westlichen Demokratien. 6.&nbsp;Aufl. Stuttgart: Kohlhammer."><span data-dcnode-id="2025" instrument_node="">1974 [1964]</span></a><span data-dcnode-id="2023" instrument_node="">, p.&nbsp;189). Under capitalism, decisions and their implementation lead to a degree of economic and social inequality (of income, wealth, power and life chances) that is hardly acceptable in a democracy built on principles based on equal rights, opportunities and duties. Vice versa, full application of democratic decision-making—general and equal participation as well as majority decisions and minority protection—is unconceivable according to the rules of capitalism. Thus, capitalism is not democratic, democracy not capitalist.</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2021" instrument_node="">As this is only one aspect, two further aspects must be considered. </span><i data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">On the one hand</span></i><span data-dcnode-id="2018" instrument_node=""> it is a fundamental rule of liberal democracy that the reach of political decisions has to be limited: by securing basic rights (among them the right to private property since the time of John Locke and the Enlightenment), through constitutions and the rule of law, and not least through the recognition of the principle that democratic decision-making is a key element of the political system. However, other partial systems must have the freedom to work according to different logics (Luhmann: “communication codes”) within the framework given by a politically set and only democratically alterable constitution (Walzer </span><a aria-label="Reference 1983" data-dcnode-id="2016" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d247477930e518" title="Walzer, Michael. 1983. Spheres of justice: A defense of pluralism and equality. New York: Basic Books."><span data-dcnode-id="2017" instrument_node="">1983</span></a><span data-dcnode-id="2015" instrument_node="">; Luhmann </span><a aria-label="Reference 1984" data-dcnode-id="2013" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d247477930e521" title="Luhmann, Niklas. 1984. Soziale Systeme: Grundriß einer allgemeinen Theorie. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="2014" instrument_node="">1984</span></a><span data-dcnode-id="2012" instrument_node="">).</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">Capitalism and democracy can easily conflict in two situations: If the distribution and use of property rights lead to an accumulation of wealth large enough to hinder politics through capitalist pressure, and if democratic decisions are taken to massively limit the use of property rights. Weighing the two against each other, it is generally the case that rights to property and use of capital should be limited and regulated by democratic governments if they threaten to overshadow or transform democratic decisions in the political sphere. Within the hierarchy of legitimacy, democratic rights can claim a normative superiority as long as they do not violate human rights and abolish property rights.</span></p><p data-dcnode-id="2004"><span data-dcnode-id="2008" instrument_node="">
</span><i data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">On the other hand</span></i><span data-dcnode-id="2005" instrument_node="">, it is also important to highlight certain affinities and congruencies between capitalism and democracy. Competition and electoral decisions play key roles in both contexts. In theory, capitalism and democracy share common enemies: the uncontrollable agglomeration of state or economic power, disorder, unpredictability and corruption. But there is a decisive difference: whereas certain forms of capitalism produce and function with an extreme concentration of wealth and capital, democracies cannot coexist with a similar constellation and concentration of power. Finally, capitalism and democracy can support each other. Capitalism struggles without a generally predictable state order, something most likely to be achieved in the long run through democratic means. It is similarly true that socially embedded capitalism is most likely to achieve sustainable growth, which in turn legitimizes and strengthens democratic institutions.</span></p></div></div></section><section data-dcnode-id="1976" data-title="Social welfare capitalism: the golden age of coexistence?"><div class="c-article-section" data-dcnode-id="1977" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1999" id="Sec5"><span data-dcnode-id="2000" instrument_node="">Social welfare capitalism: the golden age of coexistence?</span></h2><div class="c-article-section__content" data-dcnode-id="1978" id="Sec5-content"><p data-dcnode-id="1979"><span data-dcnode-id="1998" instrument_node="">In the second half and especially in the third quarter of the twentieth century, an increasingly organized form of capitalism proved particularly compatible with democratic politics in Western Europe, North America and Japan. This was the result of an increasingly expansive, interventionist welfare state that interfered with the capitalist economy by regulating, stabilizing and equalizing it. The “Keynesian welfare state” (Offe </span><a aria-label="Reference 1984" data-dcnode-id="1996" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d247477930e540" title="Offe, Claus. 1984. Contradictions of the welfare state. Cambridge: The MIT Press."><span data-dcnode-id="1997" instrument_node="">1984</span></a><span data-dcnode-id="1995" instrument_node="">) emerged in certain Northern and Continental European countries as one form of social and coordinated capitalism. A specific system of strong interdependence developed between the state and the market, between democratic and economic institutions and the capitalist economy. Economic actors were multiply embedded, regulated and socially obligated. The state’s decision-making opened increasingly towards economic and social influence under the label of “tripartite neocorporatism” (Schmitter </span><a aria-label="Reference 1974" data-dcnode-id="1993" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d247477930e543" title="Schmitter, Philippe C. 1974. Still the century of corporatism. The Review of Politics 36:85–131."><span data-dcnode-id="1994" instrument_node="">1974</span></a><span data-dcnode-id="1992" instrument_node="">, </span><a aria-label="Reference 1982" data-dcnode-id="1990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d247477930e546" title="Schmitter, Philippe C. 1982. Reflections on where the theory of neo-corporatism has gone and where the praxis of neo-corporatism may be going. In Patterns of corporatist policy-making, ed. Gerhard Lehmbruch and Philippe C. Schmitter, 259–279. Beverly: Sage."><span data-dcnode-id="1991" instrument_node="">1982</span></a><span data-dcnode-id="1989" instrument_node="">). Even elements of democracy were introduced into the economic system, such as codetermination and workers’ councils. Several important historical factors facilitated the development towards this system of a rather cooperative, but nevertheless often precarious coexistence: rapid economic growth in the years following World War One, the shocking experience of the Great Recession in 1929, and political catastrophes during World War Two and the interwar years. The ongoing critique of capitalism in the name of democracy, and social justice in intellectual and political debates also contributed to the social and political embedding of capitalism. A major driving force behind that development was, however, the challenge to the Western model of capitalism by a non-capitalist alternative in the form of Soviet-style </span><i data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">actually existing socialism</span></i><span data-dcnode-id="1986" instrument_node="">. This period proved to be the zenith of coexistence between social capitalism and social democracy in Northern and Western Europe. Yet, it remained incomplete, precarious and different from country to country (Esping-Andersen </span><a aria-label="Reference 1990" data-dcnode-id="1984" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d247477930e552" title="Esping-Andersen, Gøsta. 1990. The three worlds of welfare capitalism. Cambridge: Polity Press."><span data-dcnode-id="1985" instrument_node="">1990</span></a><span data-dcnode-id="1983" instrument_node="">; Hall and Soskice </span><a aria-label="Reference 2001" data-dcnode-id="1981" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d247477930e556" title="Hall, Peter A., and David Soskice, eds. 2001. Varieties of capitalism. The institutional foundation of comparative advantage. Oxford: Oxford University Press."><span data-dcnode-id="1982" instrument_node="">2001</span></a><span data-dcnode-id="1980" instrument_node="">).</span></p></div></div></section><section data-dcnode-id="1926" data-title="Financial capitalism: the breakup of peaceful coexistence"><div class="c-article-section" data-dcnode-id="1927" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1974" id="Sec6"><span data-dcnode-id="1975" instrument_node="">Financial capitalism: the breakup of peaceful coexistence</span></h2><div class="c-article-section__content" data-dcnode-id="1928" id="Sec6-content"><div class="c-article-footnote" data-dcnode-id="1969"><span data-dcnode-id="1973" instrument_node="">
</span><p data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">The term financial capitalism resembles Rudolf Hilferding’s “Finance Capital” (Das Finanzkapital, Wien 1910) terminologically. Hilferding described the transformation of competitive liberal capitalism into monopolistic finance capital. However, whereas Hilferding’s “organized capitalism” must be understood as a fusion of industrial, mercantile and banking interest, today’s financial capitalism or “financialization” of capitalism emphasizes the dominance of finance capital over all other forms of capital.</span></p><span data-dcnode-id="1970" instrument_node="">
</span></div><p data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node="">Since the 1970s, capitalism has changed in a way that has challenged its compatibility with democracy considerably. The turn towards neoliberalism, deregulation and globalization, and the rise of financialization has contributed to these changes significantly (Heires and Nölke </span><a aria-label="Reference 2013" data-dcnode-id="1966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d247477930e574" title="Heires, Marcel, and Andreas Nölke. 2013. Finanzialisierung. In Theorien der Internationalen Politischen Ökonomie, ed. Joscha Wullweber, Antonia Graf, and Maria Behrens, 253–266. Wiesbaden: Springer VS."><span data-dcnode-id="1967" instrument_node="">2013</span></a><span data-dcnode-id="1965" instrument_node="">). The global financial crisis since 2008 has manifested and intensified the critical elements of this new divergence: It has once more changed the relationship between the economy and the state, capitalism and democracy. The crisis of capitalism threatens to turn into a crisis of democracy.</span></p><p data-dcnode-id="1953"><span data-dcnode-id="1963" instrument_node="">Beginning with Margaret Thatcher and Ronald Reagan in the early 1980s, there have been concerted efforts among most capitalist economies for more deregulation and privatization, as well as (in some countries) significant cuts in welfare benefits.</span><sup data-dcnode-id="1958"><a data-dcnode-id="1959" href="#Fn6"><span class="u-visually-hidden" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">Footnote </span></span><span data-dcnode-id="1960" instrument_node="">5</span></a></sup><span data-dcnode-id="1957" instrument_node=""> The process was initiated and driven by Anglo-Saxon capitalism, particularly from the UK and US. Following Friedrich von Hayek (neo-classical fiscal conservatism) and Milton Friedman (monetarism and minimal state), neoliberal theories became popular in science and journalism. They valued the self-regulating forces of the market and scorned the possibility of state intervention. The atmosphere changed: it turned away from organization, equality and solidarity as guiding principles toward favoring free markets, productive inequality and individualism. The decades of “organized capitalism” came to an end; the Anglo-American model of deregulated financial capitalism threatened to sideline other varieties of a more regulated, continental capitalism. The reasons for this turn were undoubtedly the weaknesses of the Keynesian welfare state, such as the “stagflation” and sticky unemployment of the 1970s, but also the technical-organizational innovations and the beginning of the IT age. The main impetus, however, came from cross-border competition and the worldwide interconnectedness that had developed alongside globalization. Globalization put the model of organized capitalism under enormous pressure, as it had been developed within the context of the nation state. The regulating capabilities of strong nation states now faced the opposition of cross-border competition. Globalization and neoliberalism went hand in hand. The globalization of capitalism did not and should not bring with it effective global governance structures beyond the G-7 or G-20. The balance between the market and the state shifted to the disadvantage of the regulatory state and hence to the disadvantage of democracy. Legitimate democratic political regulations were dismantled into many different economic spheres, such as labor and financial markets. The supposedly more efficient market forces restructured formerly regulated markets. The already precarious “power balance” during the era of organized capitalism and the Keynesian welfare state (Korpi </span><a aria-label="Reference 1983" data-dcnode-id="1955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d247477930e585" title="Korpi, Walter. 1983. Democratic class struggle. London: Routledge and Keegan Paul."><span data-dcnode-id="1956" instrument_node="">1983</span></a><span data-dcnode-id="1954" instrument_node="">) between capital and labor shifted in favor of capital. Globalization and deregulation were mainly the result of conscious political decisions by the US, UK and major capitalist international organizations such as the World Bank, International Monetary Fund (IMF) and European Union (EU).</span></p><p data-dcnode-id="1933"><span data-dcnode-id="1952" instrument_node="">Financial capitalism is the epitome of the kind of business that is not done through the production and exchange of goods but rather with money, conducted by brokers, banks, stock markets, investors and capital markets. It is not a new phenomenon. Following globalization, financial and monetary deregulation, and partial deindustrialization in some Western countries, the financial sector experienced a massive expansion, particularly within England and the US. Its share of total GDP in the US rose from 10&nbsp;% (industrial sector 40&nbsp;%) in 1950 to more than 50&nbsp;% (industrial sector 10&nbsp;%) in 2000 (Heires and Nölke </span><a aria-label="Reference 2013" data-dcnode-id="1950" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d247477930e591" title="Heires, Marcel, and Andreas Nölke. 2013. Finanzialisierung. In Theorien der Internationalen Politischen Ökonomie, ed. Joscha Wullweber, Antonia Graf, and Maria Behrens, 253–266. Wiesbaden: Springer VS."><span data-dcnode-id="1951" instrument_node="">2013</span></a><span data-dcnode-id="1949" instrument_node="">, p.&nbsp;251). The assets of banks and the profits of bankers rose exponentially. Investment banks, investment funds and newly formed equity companies were created in large numbers. Global capital flows increased massively. A large portion of this did not serve as investment in production but funded speculation instead. Large profits were created that were not matched by any added value. The expectation of high profits—as well as the willingness to accept high risks—increased. This part of the capitalist economy was particularly deregulated and left to itself. It was equipped with new, faster technology and increasingly complex instruments. It became driven by strong competition in and amongst itself. As such it was unable to develop sustainable, widely accepted business rules. Yet, at the same time, its overall importance for the economy increased. </span><i data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Shareholder value</span></i><span data-dcnode-id="1946" instrument_node=""> became the almost universal yardstick for success and business strategies became increasingly short-term oriented. Central elements of non-market coordination (e.g. regulatory state and neo-corporatism) that had stabilized organized capitalism were undermined. In many segments of the economy, speculative investment capitalism replaced the previously dominant manager’s capitalism. As investor George Soros already recognized in 1998, this transformation put “financial capitalism in the driver’s seat” (Windolf </span><a aria-label="Reference 2005" data-dcnode-id="1944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d247477930e597" title="Windolf, Paul, ed. 2005. Finanzmarkt-Kapitalismus. Analyse zum Wandel von Produktionsregimen. Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="1945" instrument_node="">2005</span></a><span data-dcnode-id="1943" instrument_node="">; Streeck </span><a aria-label="Reference 2009" data-dcnode-id="1941" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d247477930e600" title="Streeck, Wolfgang. 2009. Re-forming capitalism. Institutional change in the German political economy. Oxford: Oxford University Press."><span data-dcnode-id="1942" instrument_node="">2009</span></a><span data-dcnode-id="1940" instrument_node="">, pp.&nbsp;77–89, 230–272; Kocka </span><a aria-label="Reference 2013" data-dcnode-id="1938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d247477930e603" title="Kocka, Jürgen. 2013. Geschichte des Kapitalismus. München: C.H. Beck."><span data-dcnode-id="1939" instrument_node="">2013</span></a><span data-dcnode-id="1937" instrument_node="">, pp.&nbsp;96–99; Soros </span><a aria-label="Reference 1998" data-dcnode-id="1935" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d247477930e607" title="Soros, George. 1998. The crisis of global capitalism. New York: Public Affairs."><span data-dcnode-id="1936" instrument_node="">1998</span></a><span data-dcnode-id="1934" instrument_node="">, pp.&nbsp;XII, XX).</span></p><p data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">Profit seeking and investment are integral parts of both owner’s and manager’s capitalism. They are embedded in different functions of business leadership: the development of long-term strategies, human resource management and defining social relations. The new type of financial and investment capitalism leaves most of this behind. From the outside, investment fund directors and bankers decide on the future of businesses to which they have little personal relationship. They know little more about these enterprises beyond their score on standardized indices and profit relevant market information. A radical form of differentiation or, rather, a specialization of the investment function takes place. It is expressed in the absolute focus on profit as the almost only remaining criterion for evaluating business success and financial remuneration (e.g. salary, bonuses and shares) of equity fund managers. The internal dynamics of capitalism are increasing, but so is its instability. The gap between selfish equity fund success and the public good is becoming enormous. Despite being so inherently unstable and prone to crises, the changing capitalism has increased its ability to shape society. It is the driving force behind the increasing inequality of wealth and income, exemplified by the tremendously high income of today’s business leaders. The ever more radical, market-oriented and fast-paced capitalism is also the motor of labor market deregulation, bringing about an increasing number of short-term, limited and part-time contracts.</span></p><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">How did this transformation from coordinated and socially embedded capitalism into deregulated financial capitalism affect democracy?</span></p></div></div></section><section data-dcnode-id="1701" data-title="Challenges for democracy"><div class="c-article-section" data-dcnode-id="1702" id="Sec7-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1924" id="Sec7"><span data-dcnode-id="1925" instrument_node="">Challenges for democracy</span></h2><div class="c-article-section__content" data-dcnode-id="1703" id="Sec7-content"><p data-dcnode-id="1895"><span data-dcnode-id="1923" instrument_node="">From the 1950s to the 1970s, capitalism was characterized by a strict regulatory framework and the expansion of interventionist Keynesian welfare states.</span><sup data-dcnode-id="1918"><a data-dcnode-id="1919" href="#Fn7"><span class="u-visually-hidden" data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Footnote </span></span><span data-dcnode-id="1920" instrument_node="">6</span></a></sup><span data-dcnode-id="1917" instrument_node=""> In this way it was directly and indirectly constrained in its independence and modes of capital accumulation both </span><i data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">a priori</span></i><span data-dcnode-id="1914" instrument_node=""> (e.g. regulations) and</span><i data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node=""> ex post</span></i><span data-dcnode-id="1911" instrument_node=""> (e.g. high taxes and social obligations). If a golden age of capitalist-democratic coexistence could be identified during this period, it would be that of the “social market economy”—an embedded form of capitalism—rather than capitalism itself (Polanyi </span><a aria-label="Reference 1944" data-dcnode-id="1909" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d247477930e641" title="Polanyi, Karl. 1944. The great transformation. New York: Rinehart."><span data-dcnode-id="1910" instrument_node="">1944</span></a><span data-dcnode-id="1908" instrument_node="">; Offe </span><a aria-label="Reference 1984" data-dcnode-id="1906" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d247477930e644" title="Offe, Claus. 1984. Contradictions of the welfare state. Cambridge: The MIT Press."><span data-dcnode-id="1907" instrument_node="">1984</span></a><span data-dcnode-id="1905" instrument_node="">; Hall and Soskice </span><a aria-label="Reference 2001" data-dcnode-id="1903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d247477930e648" title="Hall, Peter A., and David Soskice, eds. 2001. Varieties of capitalism. The institutional foundation of comparative advantage. Oxford: Oxford University Press."><span data-dcnode-id="1904" instrument_node="">2001</span></a><span data-dcnode-id="1902" instrument_node="">). The postwar decades experienced decreasing socioeconomic inequality, the expansion of the welfare state, and financial and labor market regulation. Labor unions were at the height of their socioeconomic and political power. Walter Korpi (</span><a aria-label="Reference 1983" data-dcnode-id="1900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d247477930e651" title="Korpi, Walter. 1983. Democratic class struggle. London: Routledge and Keegan Paul."><span data-dcnode-id="1901" instrument_node="">1983</span></a><span data-dcnode-id="1899" instrument_node="">) and Esping-Andersen (</span><a aria-label="Reference 1990" data-dcnode-id="1897" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d247477930e654" title="Esping-Andersen, Gøsta. 1990. The three worlds of welfare capitalism. Cambridge: Polity Press."><span data-dcnode-id="1898" instrument_node="">1990</span></a><span data-dcnode-id="1896" instrument_node="">) have written about a “balance of class power”. At no other point in time did capitalism and democracy coexist as complimentarily as during this short period.</span></p><p data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">However, the actual triumph of capitalism in the twentieth century was not its power-balanced coexistence with democracy but its astonishing ability to successfully detach itself from social and regulatory frameworks. With the political support of democratic governments, capitalism managed to disengage itself from major social and political responsibilities. But since the financial crisis in 2008, it has become obvious that with this triumph comes the danger of self-destruction.</span></p><p data-dcnode-id="1888"><span data-dcnode-id="1892" instrument_node="">“Unleashed” financial capitalism implies more problems for the functioning of embedded democracy than the capitalism that was regulated by the welfare state or Keynesianism in the first decades after World War Two. The increased “denationalization” (Zürn </span><a aria-label="Reference 1998" data-dcnode-id="1890" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d247477930e662" title="Zürn, Michael. 1998. Regieren jenseits des Nationalstaates: Globalisierung und Denationalisierung als Chance. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="1891" instrument_node="">1998</span></a><span data-dcnode-id="1889" instrument_node="">) of the economy and political decision-making went hand in hand with increasing socioeconomic inequalities. Together they undermined two fundamental principles of democracy: (1) the democratic core principle that authoritative political decisions can only be taken by those who are legitimized by constitutional-democratic procedures and (2) the principle of political equality, which is diluted by the asymmetric distribution of socioeconomic resources among citizens, largely to the disadvantage of the lower societal classes. All OECD democracies are affected by these two developments, even if to different degrees. The more denationalization progresses, and the more capitalism loses its social ties and turns into (neo-)liberal financial capitalism, the more its negative effects on the quality of democracy can be observed, all other things being equal. We will elaborate on this central concept in four theses.</span></p><p data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">
</span><i data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Thesis 1: Increasing socioeconomic inequality and poverty lead to asymmetric political participation.</span></i><span data-dcnode-id="1884" instrument_node="">
</span></p><p data-dcnode-id="1869"><span data-dcnode-id="1882" instrument_node="">In 2010, economic inequality reached levels that characterized capitalism—at least Anglo-Saxon capitalism—before World War One (Piketty </span><a aria-label="Reference 2014" data-dcnode-id="1880" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d247477930e675" title="Piketty, Thomas. 2014. Capital in the twenty-first century. Cambridge: Belknap Press of Harvard University Press."><span data-dcnode-id="1881" instrument_node="">2014</span></a><span data-dcnode-id="1879" instrument_node="">). Economic inequality translates into social and then rapidly into political inequality. Much has been written about the connection between the availability of socioeconomic goods and their transformation into cognitive resources and political participation.</span><sup data-dcnode-id="1874"><a data-dcnode-id="1875" href="#Fn8"><span class="u-visually-hidden" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Footnote </span></span><span data-dcnode-id="1876" instrument_node="">7</span></a></sup><span data-dcnode-id="1873" instrument_node=""> It already becomes apparent in the context of the least demanding form of political participation, namely general elections. Election turnout is declining in Western Europe and to an even greater degree in Eastern Europe. The average turnout in Western Europe in 1975 stood at 85&nbsp;%; by 2012 it had declined to an average of 75&nbsp;%. In Eastern Europe the decline is even more dramatic: While an average of 72&nbsp;% of voters cast their vote in 1991, this figure had declined to 57&nbsp;% in 2012. Yet in the context of the US even those numbers would represent a positive development. The average turnout in US congressional elections over the last three decades (1980–2012) was a mere 45.4&nbsp;% (WZB </span><a aria-label="Reference 2014" data-dcnode-id="1871" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d247477930e687" title="WZB. 2014. Data collection on elections, parties and governments from 1950–2014. Database “Election, Parties, Governments” of the Research Unit “Democracy and Democratization” at the WZB Berlin Social Science Center. Accessed: 25 May 2014."><span data-dcnode-id="1872" instrument_node="">2014</span></a><span data-dcnode-id="1870" instrument_node="">).</span></p><p data-dcnode-id="1858"><span data-dcnode-id="1868" instrument_node="">General elections in which only 50&nbsp;% (or even less) of the electorate participate are problematic. The explicit consent for and therefore also legitimization of the elected is lower than for those representatives who were chosen in elections with a turnout of 70 or 80&nbsp;%. Yet, there is still no democratic theory that can determine the ideal electoral turnout in democracies. The absence of half the citizens during the most important act of legitimization in a representative democracy is evidence of how (un-)important political participation in the </span><i data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">res publica</span></i><span data-dcnode-id="1865" instrument_node=""> has become for the majority of citizens in the US and most of Eastern Europe. Empirical studies show that the vast majority of those who refrain from voting also do not engage in other forms of political participation (Przeworski </span><a aria-label="Reference 2010" data-dcnode-id="1863" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d247477930e696" title="Przeworski, Adam. 2010. Democracy and the limits of self-government. Cambridge: Cambridge University Press."><span data-dcnode-id="1864" instrument_node="">2010</span></a><span data-dcnode-id="1862" instrument_node="">). Bernard Manin (</span><a aria-label="Reference 1997" data-dcnode-id="1860" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d247477930e699" title="Manin, Bernard. 1997. The principles of representative government. Cambridge: Cambridge University Press."><span data-dcnode-id="1861" instrument_node="">1997</span></a><span data-dcnode-id="1859" instrument_node="">, pp.&nbsp;222&nbsp;f.) called this a “democracy of spectators”. Joseph Schumpeter, however, understood this state of democracy as the ideal type of a(n) (elitist) democracy.</span></p><p data-dcnode-id="1841"><span data-dcnode-id="1857" instrument_node="">The crucial problem democratic theory faces is not the turnout figures themselves but the social selectivity they imply. The empirically proven rule of thumb is that the lower the electoral turnout, the higher the social exclusion within the context of elections. Undeniable evidence confirms that the lower social classes are the ones taking the political exit option, while the middle and upper classes are the ones that stay.</span><sup data-dcnode-id="1852"><a data-dcnode-id="1853" href="#Fn9"><span class="u-visually-hidden" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">Footnote </span></span><span data-dcnode-id="1854" instrument_node="">8</span></a></sup><span data-dcnode-id="1851" instrument_node=""> Among US citizens, 80&nbsp;% of those with a disposable annual household income exceeding USD&nbsp;100,000 state that they vote, compared with only 33&nbsp;% of those with a household income of USD&nbsp;15,000 or less who state that they vote</span><sup data-dcnode-id="1846"><a data-dcnode-id="1847" href="#Fn10"><span class="u-visually-hidden" data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Footnote </span></span><span data-dcnode-id="1848" instrument_node="">9</span></a></sup><span data-dcnode-id="1845" instrument_node=""> (Bonica et al. </span><a aria-label="Reference 2013" data-dcnode-id="1843" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d247477930e723" title="Bonica, Adam, Nolan McCarty, Keith T. Poole, and Howard Rosenthal. 2013. Why hasn’t democracy slowed rising inequality? Journal of Economic Perspectives 27 (3): 103–124."><span data-dcnode-id="1844" instrument_node="">2013</span></a><span data-dcnode-id="1842" instrument_node="">, p.&nbsp;111).</span></p><p data-dcnode-id="1833"><span data-dcnode-id="1840" instrument_node="">Increasing evidence shows that the American symptoms of lower class exclusion are ever more pertinent within the context of European societies (Weßels 2014). The electoral </span><i data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">demos</span></i><span data-dcnode-id="1837" instrument_node=""> is unbalanced: The dominance of the middle classes is increasing, participation of the lower classes constantly decreasing. With regards to turnout, most OECD countries have become “</span><i data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Two-Third-Democracies</span></i><span data-dcnode-id="1834" instrument_node="">”, where the lower class is largely excluded from political participation. The political principle of equality is undermined: Voting tilts the policy scales in favor of top incomes (ibid.).</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1832" instrument_node="">The process of declining turnout and increasing social selectivity of the electorate has become ever more prevalent in Western Europe over the last three decades. There it is slow but steady; in Eastern Europe it is rapid, in the US chronic. The primary reason can be found in the rise of socioeconomic inequality (Hacker and Pierson </span><a aria-label="Reference 2010" data-dcnode-id="1830" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d247477930e738" title="Hacker, Jacob S., and Paul Pierson. 2010. Winner-take-all politics: How Washington made the rich richer—and turned its back on the middle class. New York: Simon &amp; Schuster."><span data-dcnode-id="1831" instrument_node="">2010</span></a><span data-dcnode-id="1829" instrument_node="">, p.&nbsp;194; Schäfer </span><a aria-label="Reference 2010" data-dcnode-id="1827" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d247477930e741" title="Schäfer, Armin. 2010. Die Folgen sozialer Ungleichheit für die Demokratie in Westeuropa. Zeitschrift für Vergleichende Politikwissenschaft 4 (1): 131–156."><span data-dcnode-id="1828" instrument_node="">2010</span></a><span data-dcnode-id="1826" instrument_node="">; Merkel and Petring </span><a aria-label="Reference 2012" data-dcnode-id="1824" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d247477930e744" title="Merkel, Wolfgang, and Alexander Petring. 2012. Politische Partizipation und demokratische Inklusion. In Demokratie in Deutschland. Zustand—Herausforderungen—Perspektiven, ed. Tobias Mörschel and Christian Krell, 93–119. Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="1825" instrument_node="">2012</span></a><span data-dcnode-id="1823" instrument_node="">; Bonica et al. </span><a aria-label="Reference 2013" data-dcnode-id="1821" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d247477930e747" title="Bonica, Adam, Nolan McCarty, Keith T. Poole, and Howard Rosenthal. 2013. Why hasn’t democracy slowed rising inequality? Journal of Economic Perspectives 27 (3): 103–124."><span data-dcnode-id="1822" instrument_node="">2013</span></a><span data-dcnode-id="1820" instrument_node="">, p.&nbsp;111; Weßels </span><a aria-label="Reference 2014" data-dcnode-id="1818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d247477930e750" title="Weßels, Bernhard. 2014. Politische Ungleichheit beim Wählen. In Ist die Krise der Demokratie eine Erfindung? Zum schwierigen Verhältnis von Theorie und Empirie, ed. Wolfgang Merkel. Wiesbaden: Springer VS (forthcoming)."><span data-dcnode-id="1819" instrument_node="">2014</span></a><span data-dcnode-id="1817" instrument_node="">). Declining turnout and increasing social selectivity of the electorate also stem from increasingly precarious conditions faced by the lower classes on the labor market as well as the decline of catch-all parties, labor unions and other large collective organizations that played a crucial role in the politicization and representation of the lower classes throughout the twentieth century.</span></p><p data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">The participation-representation gap has increased in almost all OECD countries over the past decade. Citizens from lower classes are participating less in politics than other social classes, resulting in considerable consequences for the representation of their interests. Parliamentary studies show that the interests of the “lower third” are less represented in parliament than those of the “upper third” of society (Lehmann et al. </span><a aria-label="Reference 2014" data-dcnode-id="1813" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d247477930e756" title="Kitschelt, Herbert. 2001. Politische Konfliktlinien in westlichen Demokratien. Ethnisch-kulturelle und wirtschaftliche Verteilungskonflikte. In Schattenseiten der Globalisierung. Rechtsradikalismus, Rechtspopulismus und separatistischer Regionalismus in westlichen Demokratien, ed. Wilhelm Heitmeyer and Dietmar Loch, 418–442. Frankfurt a.&nbsp;M.: Suhrkamp."><span data-dcnode-id="1814" instrument_node="">2014</span></a><span data-dcnode-id="1812" instrument_node="">).</span></p><p data-dcnode-id="1806"><span data-dcnode-id="1810" instrument_node="">
</span><i data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Thesis 2: In open, embedded democracies elections are increasingly unable to halt growing socioeconomic inequalities.</span></i><span data-dcnode-id="1807" instrument_node="">
</span></p><p data-dcnode-id="1789"><span data-dcnode-id="1805" instrument_node="">Considering the idea of class-oriented </span><i data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">economic voting</span></i><span data-dcnode-id="1802" instrument_node="">, it could be argued that all voters—or at least a considerable majority—with an income below the median would vote for political parties that fight for redistribution. This would give democracy an instrument to counterbalance severe socioeconomic inequalities. But why has this mechanism failed in the past decades? One of the reasons was already mentioned: The lower classes are, much more so than the middle and upper classes, increasingly staying home on Election Day. Moreover, vote-maximizing parties are tempted to abandon the lower classes as potential voters to be won over. Social democratic and other left-wing catch-all parties still sometimes claim to represent the interests of those classes in their party programs. However, this is often only lip service paid to preserve the party’s “social justice” image rather than a genuine attempt to mobilize the politically apathetic and indifferent lower classes.</span><sup data-dcnode-id="1797"><a data-dcnode-id="1798" href="#Fn11"><span class="u-visually-hidden" data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Footnote </span></span><span data-dcnode-id="1799" instrument_node="">10</span></a></sup><span data-dcnode-id="1796" instrument_node=""> Furthermore, party manifestos and actual policies have to be considered separately. For both ideological and electoral reasons, conservative, liberal and right-wing parties do not write normative or electoral interests into active policies of top-bottom redistribution. Left-wing parties that, when in office, wish to pass policies aimed at improving the situation of the lower classes—more education, minimum wages, maintenance of the welfare state, taxation of higher incomes to raise public revenues—are confronted with threats from capital owners and wealthier classes, both in discourse and in reality. The main threat from these classes is to move capital and investment abroad. The financialization of capitalism and the now easier option to move financial capital across national borders has made the democratic state vulnerable. For left-wing parties this quickly results in a conflict of interest. If investors begin to shift investments abroad, this costs jobs and results in lower economic growth, less public revenue, less social investment and ultimately less votes. Fritz Scharpf fittingly defined this dilemma: “In capitalist democracies, governments depend on the confidence of their voters. But to maintain this confidence they also depend on the performance of their real economies and, increasingly, on the confidence of&nbsp;financial markets” (Scharpf </span><a aria-label="Reference 2011" data-dcnode-id="1794" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d247477930e777" title="Scharpf, Fritz W. July 2011. Monetary union, fiscal crisis and the preemption of democracy. MPIfG Discussion Paper&nbsp;11/11. Köln: Max-Planck-Institut für Gesellschaftsforschung."><span data-dcnode-id="1795" instrument_node="">2011</span></a><span data-dcnode-id="1793" instrument_node="">, p.&nbsp;1). Not least with this in mind, the policies of the “third way”, implemented by most social democratic parties and governments, can be understood as a premature and obedient adjustment to a globalized economy. Within the context of economic and labor market policies, many social democratic parties have succumbed to the neoliberal globalization discourse of the past two decades. Issues of redistribution have thus lost their main advocate in the political arena (Merkel et al. </span><a aria-label="Reference 2006" data-dcnode-id="1791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d247477930e780" title="Merkel, Wolfgang, Christoph Egle, Christian Henkes, Tobias Ostheim, and Alexander Petring. 2006. Die Reformfähigkeit der Sozialdemokratie. Herausforderungen und Bilanz der Regierungspolitik in Westeuropa, Wiesbaden: VS Verlag für Sozialwissenschaften."><span data-dcnode-id="1792" instrument_node="">2006</span></a><span data-dcnode-id="1790" instrument_node="">).</span></p><p data-dcnode-id="1781"><span data-dcnode-id="1788" instrument_node="">
