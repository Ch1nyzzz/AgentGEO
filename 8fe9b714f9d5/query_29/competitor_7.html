</span><h1 class="py05 h2 md-h1" data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">The affects of democracy</span></h1><span data-dcnode-id="1387" instrument_node="">
</span><ul class="py05 fw700 lh3 h5 color-red" data-dcnode-id="1377"><span data-dcnode-id="1386" instrument_node="">
</span><li data-dcnode-id="1383"><a class="ul-white-10:hover" data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurozine.com/authors/mouffe-chantal/"><span data-dcnode-id="1385" instrument_node="">Chantal Mouffe</span></a></li><span data-dcnode-id="1382" instrument_node="">
</span><p class="fw700 lh4 f4 color-black-50" data-dcnode-id="1379"><time data-dcnode-id="1380" datetime="2018-11-23T13:06:07+00:00" itemprop="datePublished"><span data-dcnode-id="1381" instrument_node="">23 November 2018</span></time></p><span data-dcnode-id="1378" instrument_node="">
</span></ul><span data-dcnode-id="1376" instrument_node="">
</span></div><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
</span><span data-dcnode-id="1370" instrument_node="">
</span><div class="holygrail" data-dcnode-id="566"><span data-dcnode-id="1369" instrument_node="">
</span><div class="holygrail__center" data-dcnode-id="961"><span data-dcnode-id="1368" instrument_node="">
</span><div class="max40 mx2" data-dcnode-id="963"><span data-dcnode-id="1367" instrument_node="">
</span><span data-dcnode-id="1365" instrument_node="">
</span><div class="my1 excerpt md-h1 lh2 serif" data-dcnode-id="1361"><p data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The absence in liberal democracies of an agonistic confrontation between different political projects has led to a crisis of representation, argues Chantal Mouffe. Demonization of the ‘enemies’ of the bipartisan consensus might be morally comforting, but it is politically disempowering. We need a progressive populism that can mobilize common affects towards a defence of equality and social justice.</span></p><span data-dcnode-id="1362" instrument_node="">
</span></div><span data-dcnode-id="1360" instrument_node="">
</span><span data-dcnode-id="1358" instrument_node="">
</span><div class="py05" data-dcnode-id="965"><span data-dcnode-id="1357" instrument_node="">
</span><div class="md-h5 copy lh5 serif color-black-80" data-dcnode-id="1186" id="main-text"><span data-dcnode-id="1356" instrument_node="">
</span><p data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Emotions and affects have recently become a fashionable topic among philosophers and people working in social sciences and the humanities and there is a growing literature on what has been called the ‘affective turn’. It designates a very heterogeneous body of works among which it is not easy to find ‘family resemblances’, because the theorists who are sometimes put under this umbrella come from a variety of approaches that are difficult to reconcile. They disagree on the very meaning of the terms ‘affects’ and ‘emotions’, not to speak of their relation. Some of them are influenced by Deleuze and Guattari, others by the neurosciences, others by a variety of constructivist schools. I have for a long time in my work put a special emphasis on the role of ‘passions’ in politics, and I would like here to clarify what I understand by ‘passions’ and how I see their role in politics.</span></p><span data-dcnode-id="1353" instrument_node="">
</span><p data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">In fact, I have often been asked why I speak of passions instead of emotions. This is why I want to stress that, from the perspective that I advocate, it is essential to distinguish between ‘passions’ and ‘emotions’. It is with regard to the political domain that my approach has been elaborated; one of its central tenets is that, in that field, we are always dealing with collective identities – something that the term ‘emotions’ does not adequately convey because emotions are usually attached to individuals. To be sure, ‘passions’ can also be of an individual nature, but I have chosen to use that term, with its more violent connotations, because it allows me to underline the dimension of conflict and to suggest a confrontation between collective political identities, two aspects that I take to be constitutive of politics. I contend that, without understanding the crucial role played by common affects in the constitution of political forms of identification, it is not possible to envisage what is at stake in democratic politics. After presenting the main tenets of my theoretical approach, I will show how this approach is particularly suited to grasping the nature of the populist moment that characterizes our present conjuncture and of how to answer the challenge that it represents.</span></p><span data-dcnode-id="1350" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1344" id="attachment_14197" style="width: 685px"><img alt="" aria-describedby="caption-attachment-14197" class="size-full wp-image-14197" data-dcnode-id="1349" height="421" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurozine.com/wp-content/uploads/2018/11/Eurozine_Chouffe.jpg&amp;raw" width="675"><p class="wp-caption-text" data-dcnode-id="1345" id="caption-attachment-14197"><span data-dcnode-id="1348" instrument_node="">Victory of Alexis Tsipras (SYRIZA) during Greek legislative elections in 2015. Photo Source: </span><a data-dcnode-id="1346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/annalisaceolin/16181955347" target="_blank"><span data-dcnode-id="1347" instrument_node="">Flickr</span></a></p></div><span data-dcnode-id="1343" instrument_node="">
</span><h3 data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Antagonism and hegemony</span></h3><span data-dcnode-id="1340" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1339" instrument_node="">To understand what I mean by ‘passions’ and how I see their role in politics requires acquaintance with the theoretical framework that informs my approach. This approach has been first elaborated in </span><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">Hegemony and Socialist Strategy</span></em><span data-dcnode-id="1336" instrument_node="">, written with Ernesto Laclau, in which we argued that two fundamental concepts are needed to elaborate a theory of the political: antagonism and hegemony.</span><a data-content="Laclau, E<i class=&quot;dot&quot;></i> and C<i class=&quot;dot&quot;></i> Mouffe, Hegemony and Socialist Strategy: Towards a Radical Democratic Politics, New… <a href=&quot;#footnote-1&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1334" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-1" id="anchor-footnote-1"><span data-dcnode-id="1335" instrument_node="">1</span></a><span data-dcnode-id="1333" instrument_node=""> The concept of antagonism is central because it postulates the existence of a radical negativity that impedes the totalization of society and forecloses the possibility of society beyond division and power. It is linked to the concept of hegemony. To assert the ineradicability of antagonism requires acknowledging the impossibility of reaching a final ground, and instead recognizing the dimension of undecidability and of contingence that pervades every order. It is precisely this dimension to which the category of hegemony refers, as it indicates that every society is the product of practices that seek to institute an order in a context of contingency. In this view, the social is constituted by sedimented hegemonic practices; that is, practices that appear to proceed from a natural order, concealing the originary acts of their contingent political institution. This perspective reveals that every order results from the temporary and precarious articulation of contingent practices. Every order is the expression of a particular structure of power relations and it is always established through the exclusion of other possibilities, hence its political character.</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">I later suggested distinguishing between the political, to refer to the dimension of radical negativity, of antagonism – one that can emerge within a large variety of social relations ­– and politics, which deals with the ontic manifestations of this ontological dimension. Politics aims at establishing an order and organizing human coexistence under conditions that are traversed by the political, and are thus always conflictual. We find this distinction between the political and politics in other theories, though not always with the same signification. We can in fact distinguish two opposing ways of characterizing the political. There are those for whom the political refers to a space of liberty and common action, while others see the political as a site of conflict and antagonism. This second approach is the one that I advocate, and the thesis I defend is that it is only when the ineradicable character of division and antagonism is recognized that it is possible to think in a properly political manner and to grasp the challenge confronting democratic politics.</span></p><span data-dcnode-id="1328" instrument_node="">
</span><p data-dcnode-id="1325"><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patreon.com/Eurozine" target="_blank"><img data-dcnode-id="1327" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eurozine.com/wp-content/uploads/2022/04/we-need-your-support_new2.jpg&amp;raw" style="width:100%;"></a></p><p data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">Taking account of the dimension of the political signifies acknowledging the existence of conflicts that cannot have a rational solution – this is precisely what is meant by ‘antagonism’. To be sure, not all conflicts are of an antagonistic nature, but properly political ones are, because they always involve decisions that require a choice between alternatives that are undecidable from a strictly rational point of view. Political life will never be able to dispense with antagonism, for it concerns public action and the formation of collective identities. It aims at constituting a ‘we’ in a context of diversity and conflict. Yet, in order to constitute a ‘we’, one must distinguish it from a ‘they’, and there is always the possibility that, under certain conditions, this we/they takes the form of an antagonistic friend/enemy confrontation. This is why I have argued that the crucial question for democratic politics is not to reach a consensus without exclusion – which would amount to creating a ‘we’ without a corresponding ‘they’ – but to construct the we/they discrimination in a mode which is compatible with pluralist democratic institutions.</span></p><span data-dcnode-id="1322" instrument_node="">
</span><p data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">This is something that most liberal-democratic theorists have to elude, due to the inadequate way they envisage pluralism. While recognizing that we live in a world where a multiplicity of perspectives and values coexist, and that it is impossible that each of us would adopt them all, those theorists imagine that, brought together, these perspectives and values constitute a harmonious and non-conflictual ensemble. This type of thought is therefore incapable of accounting for the necessarily conflictual nature of pluralism, which stems from the impossibility of reconciling all points of view, and this is why it is bound to negate the political in its antagonistic dimension. To be sure, liberal pluralists acknowledge that, in democracy, ‘the people’ can no longer be considered as ‘one’, but they see it as being ‘multiple’, while according to the hegemonic perspective it should be understood as ‘divided’.</span></p><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">After writing </span><em data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Hegemony and Socialist Strategy</span></em><span data-dcnode-id="1315" instrument_node="">, while scrutinizing the discussion among liberal-democratic theorists, I realized that neither the aggregative nor the deliberative models allowed us to visualize the possibility of a democratic hegemonic politics. To account for the ineradicability of antagonism and the hegemonic nature of politics, a different approach was needed – an approach able to address the following questions: How might a democratic order acknowledge and manage the existence of conflicts that do not have a rational solution? How to conceive democracy in a way that allows in its midst a confrontation between conflicting hegemonic projects? My answer to this question is the agonistic model of democracy, which I see as providing the analytic framework necessary to visualize the possibility of a democratic confrontation between hegemonic projects.</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">According to the ‘agonistic’ model, to conceive pluralist democracy in a way that does not deny the antagonistic dimension supposes envisaging two possible modes of manifestation of the antagonistic dimension: as a friend/enemy confrontation or as a confrontation among adversaries. It is the latter that I have proposed to call ‘agonistic’. The agonistic confrontation is different from the antagonistic one, not because it allows for a possible consensus, but because the opponent is not considered an enemy to be destroyed but an adversary whose existence is perceived as legitimate. Her ideas will be fought with vigour, but her right to defend them will never be questioned.</span></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Asserting the constitutive character of social division and the impossibility of a final reconciliation, the agonistic perspective recognizes the necessary partisan character of democratic politics. By envisaging this confrontation in terms of adversaries, and not on a friend/enemy mode that might lead to civil war, it allows such a confrontation to take place within democratic institutions. What is at stake in the agonistic struggle is the very configuration of power relations that structure a social order and the type of hegemony they construct. It is a confrontation between conflicting hegemonic projects that can never be reconciled rationally. The antagonistic dimension is therefore always present, but it is enacted by means of a confrontation whose procedures are accepted by the adversaries. Such an agonistic perspective takes account of the fact that every social order is politically instituted and that the ground on which hegemonic interventions occur is never neutral, for it is always the product of previous hegemonic practices. It sees the public sphere as the battlefield on which hegemonic projects confront one another, with no possibility of a final reconciliation.</span></p><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The distinction between antagonism (friend/enemy relation) and agonism (relation between adversaries) permits us to understand why, contrary to what many democratic theorists believe, it is not necessary to negate the ineradicability of antagonism in order to visualize the establishment of a democratic order. The agonistic confrontation, far from representing a danger for democracy, is in reality the very condition of its existence. To be sure, democracy cannot survive without a certain form of consensus, a ‘conflictual consensus’ referring to allegiance to the ethico-political values that constitute its principles of legitimacy, and to the institutions in which these are inscribed. But it must also enable the availability of different and sometimes conflicting interpretations of those shared ethico-political values, in order for citizens to genuinely have the possibility of choosing between real alternatives.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1293"><span data-dcnode-id="1303" instrument_node="">In </span><em data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">On the Political</span></em><span data-dcnode-id="1300" instrument_node=""> (2005) and in </span><em data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Agonistics</span></em><span data-dcnode-id="1297" instrument_node=""> (2013), examining the current state of European democracies, I argued that we are witnessing a crisis of representation which is due to the lack of an agonistic framework.</span><a data-content="Mouffe, C<i class=&quot;dot&quot;></i>, On the Political, Abingdon 2005; Mouffe, C<i class=&quot;dot&quot;></i>, Agonistics: Thinking the World Politically, London… <a href=&quot;#footnote-2&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1295" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-2" id="anchor-footnote-2"><span data-dcnode-id="1296" instrument_node="">2</span></a><span data-dcnode-id="1294" instrument_node=""> It is the consequence of what I call the ‘post-political’ consensus at the centre that has been established between parties of the centre-right and the centre-left. This consensus, which is based on the idea that there is no alternative to neoliberal globalization, serves to entrench the existing hegemony. By not providing the possibility of an agonistic confrontation between different political projects, it deprives the citizens of a voice in the elections. As the Indignados in Spain claimed, ‘we have a vote but we do not have a voice’.</span></p><span data-dcnode-id="1292" instrument_node="">
</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">By postulating that we now live in societies where collective identities have disappeared, and where the opposition between left and right has become obsolete, the post-political perspective refuses to acknowledge that politics always consists in establishing a political frontier between we and they. Proclaiming that the adversarial model has been overcome, it curtails the agonistic dynamics and impedes the crystallization of collective forms of identifications around democratic political objectives. This is what explains the multiplication of other forms of collective identities of a moral, religious or ethnic nature. It is also at the origin – and I will come back to this point later – of the increasing success of rightwing populist parties, which are often the only ones to claim that there is an alternative and that they will give back to the people the power that the elites have taken away from them.</span></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">But in order to address the question of populism, I need to tackle the issue of ‘passions’ in the field of politics. As I have already indicated, by using the term ‘passions’ I want to distinguish my reflection from the issue of individual ‘emotions’. By ‘passions’ I designate a certain type of common affects, those that are mobilized in the political domain in the formation of the we/they forms of identification. My aim is to challenge the rationalist view dominant in democratic political theory, underlining both the collective and the partisan character of political action, bringing to light the crucial role played by affects in the construction of political identities. One of my key criticisms of liberal democratic theories is their incapacity to acknowledge this affective dimension, an incapacity which I take to be the consequence of their picture of the individual, who as an actor in the field of politics is presented as being moved either by the pursuit of her interests or by moral concerns. This precludes recognition of the collective nature of political actors and prevents us asking one of the key questions for politics: how are collective forms of identification created and what is the part played by affects in this process?</span></p><span data-dcnode-id="1286" instrument_node="">
</span><h3 data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Affects</span></h3><span data-dcnode-id="1283" instrument_node="">
</span><p data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Remember that I am posing this question within the post-foundationalist ontological framework that I have outlined earlier. Crucial to this framework is the assertion of the discursive nature of the social and the thesis that there are no essential identities but only forms of identification. What is at stake in politics is the construction of political identities; this always entails an affective dimension, what Freud calls a libidinal investment.</span></p><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1275"><span data-dcnode-id="1279" instrument_node="">Freud is central for my reflection. Besides asserting the general thesis that the social link is a libidinal link, he brought to the fore the crucial role played by affective libidinal bounds in processes of collective identification. As he stated in ‘Group psychology and the analysis of the ego’: ‘a group is clearly held together by a power of some kind: and to what power could this feat be better ascribed than to Eros, which holds together everything in the world’.</span><a data-content="Freud, S<i class=&quot;dot&quot;></i>, ‘Group… <a href=&quot;#footnote-3&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1277" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-3" id="anchor-footnote-3"><span data-dcnode-id="1278" instrument_node="">3</span></a><span data-dcnode-id="1276" instrument_node=""> For Freud, affects are the qualitative expression of the quantity of libidinal energy of the instincts. This libidinal energy is malleable and can be oriented in multiple directions, producing different affects. The point is that it is important to realize that different forms of politics can foster different affective libidinal attachments. This helps us to refute the essentialist view that attributes given affects to specific social agents.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1273" instrument_node="">To explain this point, I want to bring in insights from Spinoza’s conception of affects, namely his distinction between affection (</span><em data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">affectio</span></em><span data-dcnode-id="1270" instrument_node="">) and affect (</span><em data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">affectus</span></em><span data-dcnode-id="1267" instrument_node="">).</span><a data-content="<code>Spinoza B<i class=&quot;dot&quot;></i>, <em>Ethics</em>, trans<i class=&quot;dot&quot;></i> Edwin Curley<i class=&quot;dot&quot;></i> New York 1994, part 3<i class=&quot;dot&quot;></i></code> <a href=&quot;#footnote-4&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1265" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-4" id="anchor-footnote-4"><span data-dcnode-id="1266" instrument_node="">4</span></a><span data-dcnode-id="1264" instrument_node=""> Like Freud, Spinoza believes that it is desire that moves human beings to act, and he notes that what makes them act in one direction rather than in another are the affects. An affection, for him, is the state of a body insofar as it is subject to the action of another body. When affected by something exterior, the ‘conatus’ (the general striving to persevere in our being) will experience affects that will move it to desire something and to act accordingly. I find this dynamics of </span><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">affectio</span></em><span data-dcnode-id="1261" instrument_node="">/</span><em data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">affectus</span></em><span data-dcnode-id="1258" instrument_node=""> helpful in order to envisage the process of production of common affects, and I propose employing this dynamics to examine the modes of construction of political identities, seeing ‘affections’ as the space where the discursive and the affective are articulated in specific practices.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1255" instrument_node="">On the importance of practices, I take my inspiration from Wittgenstein, who taught us that it is by their inscription in ‘language games’, what we call discursive practices, that social agents form specific beliefs and desires and acquire their subjectivity (let me stress here that by ‘discursive’ I am not referring to practices concerned exclusively with speech or writing, but to signifying practices in which signification and action cannot be separated). In this view, allegiance to democracy is something based not on rationality, but on participation in specific forms of life. As Richard Rorty often pointed out, a Wittgensteinian perspective makes us realize that allegiance to democracy and the belief in the value of its institutions does not depend on giving them an intellectual foundation. Allegiance to democratic values is a question of identification; it is created not through rational argumentation but through an ensemble of language games that construct democratic forms of individuality. Wittgenstein clearly acknowledges the affective dimension of this allegiance, which he likens to ‘a passionate commitment to a system of reference’.</span><a data-content="<code>Wittgenstein, L<i class=&quot;dot&quot;></i>, <em>Culture and Value</em>, trans<i class=&quot;dot&quot;></i> Peter Winch, Chicago 1984, 64<i class=&quot;dot&quot;></i></code> <a href=&quot;#footnote-5&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1253" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-5" id="anchor-footnote-5"><span data-dcnode-id="1254" instrument_node="">5</span></a></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Bringing together Spinoza, Freud and Wittgenstein, I propose seeing inscription in discursive practices as providing the affections which, for Spinoza, bring about the affects that spur desire and lead to specific action. This recognizes that affects and desire play a crucial role in the constitution of collective forms of identification, and that they are the motivating forces of political action. I submit that this recognition of the crucial role of the affects and of the way they can be mobilized is decisive for envisaging democratic politics. And I am going to argue in the second part of my presentation that such a theoretical perspective is necessary to comprehend the nature of the populist moment that we are currently witnessing, and to envisage how to face the challenge that it represents.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><h3 data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Populism</span></h3><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1244" instrument_node="">To adequately address the question of populism, it is first necessary to discard the simplistic vision of populism as mere demagogy, and to adopt an analytical perspective. I follow Ernesto Laclau, who defines populism as a way to construct the we/they political frontier by appealing to the mobilization of the ‘underdog’ against ‘those in power’.</span><a data-content="<code>Laclau, E<i class=&quot;dot&quot;></i>, <em>On Populist Reason</em>, New York and London 2005<i class=&quot;dot&quot;></i></code> <a href=&quot;#footnote-6&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1242" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-6" id="anchor-footnote-6"><span data-dcnode-id="1243" instrument_node="">6</span></a><span data-dcnode-id="1241" instrument_node=""> It emerges when one aims at building a new subject of collective action – the people – capable of reconfiguring a social order lived as unfair. Populism, Laclau insists, is not an ideology or a political regime, and it does not have a specific programmatic content. It is a way of doing politics, a strategy, which can take various forms, depending on periods and the places, and it is compatible with different forms of government.</span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">Some populisms have led to fascist regimes, but there are many other forms. It is a mistake to affirm that all of them are incompatible with the existence of liberal-democratic institutions. Indeed, this type of mobilization can have democratizing results. This was, for instance, the case with the populist movement in the United States in the nineteenth century, which was able to redistribute political power in favour of the majority without calling into question the whole democratic system. In fact, populism constitutes an important dimension of democracy, since it refers to the dimension of popular sovereignty and to the construction of a demos that is constitutive of democracy.</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Scrutinizing the growth of a populist type of politics in Europe, we can ascertain that it is due to the convergence of several phenomena that, in recent years, have affected the conditions in which democracy is exercised. The first phenomenon, which I have already mentioned and that I call ‘post-politics’, refers to the blurring of political frontiers between right and left. As we have seen, it is the result of the consensus established between the parties of the centre-right and centre-left on the idea that there is no alternative to neoliberal globalization. Under the pretext of ‘modernization’ imposed by globalization, social-democratic parties have accepted the diktats of financial capitalism and the limits they have imposed to state intervention and their redistributive policies. The role of parliaments and other institutions that allow citizens to influence political decisions has been drastically reduced. Elections no longer offer any opportunity to decide on real alternatives through the traditional parties of ‘government’, and citizens have been deprived of the possibility of exercising their democratic rights. Popular sovereignty, the notion that constitutes the very heart of the democratic ideal – the power of people – has been declared obsolete, and democracy has been reduced to its liberal component. Politics has become a mere technical issue of managing the established order, a domain reserved for experts. The only thing that post-politics allows is a bipartisan alternation of power between the centre-right and centre-left parties. All those who oppose this ‘consensus in the centre’ are disqualified as ‘populists’ and accused of being ‘extremists’.</span></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">These changes at the political level have taken place within the context of a ‘neoliberal’ hegemonic formulation, characterized by a form of regulation of capitalism in which the role of financial capital is central. We have seen an exponential increase in inequality affecting not only the working class but also a great part of the middle classes, who have entered a process of pauperization and precarization. We are clearly witnessing a process of ‘oligarchization’ of western societies. Centre-left parties have abandoned the struggle for equality and their main slogans are now about ‘choice’ and ‘fairness’. The two democratic ideals of equality and popular sovereignty have been relinquished and it can be said that now we live in ‘post-democratic’ societies. To be sure, ‘democracy’ is still spoken of, but only to indicate universal suffrage and respect of the majority rule.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1229" instrument_node="">This evolution, far from being a progress towards a more mature society, as is sometimes claimed, undermines the very foundations of our western model of democracy, usually designated as ‘liberal democracy’. As C.B. MacPherson has shown, that model was the result of the articulation between two traditions.</span><a data-content="<code>Macpherson, C<i class=&quot;dot&quot;></i>B<i class=&quot;dot&quot;></i>, <em>The Life and Times of Liberal Democracy</em>, Oxford 1977<i class=&quot;dot&quot;></i></code> <a href=&quot;#footnote-7&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1227" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-7" id="anchor-footnote-7"><span data-dcnode-id="1228" instrument_node="">7</span></a><span data-dcnode-id="1226" instrument_node=""> The first one is the liberal tradition of the rule of law, separation of powers, and the affirmation of individual freedom; the second one is the democratic tradition of equality and popular sovereignty. No doubt, these two political logics are ultimately irreconcilable; there will always be a tension between the principles of freedom and equality. But, as I argued in </span><em data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">The Democratic Paradox</span></em><span data-dcnode-id="1223" instrument_node="">, that tension is constitutive of our democratic model, because it provides the space for an agonistic confrontation and guarantees pluralism.</span><a data-content="<code>Mouffe, C<i class=&quot;dot&quot;></i>, <em>The Democratic Paradox</em>, New York and London 2000<i class=&quot;dot&quot;></i></code> <a href=&quot;#footnote-8&quot;><span class=&quot;glyphicon glyphicon-circle-arrow-down&quot; aria-hidden=&quot;TRUE&quot;></span></a>" data-dcnode-id="1221" data-html="TRUE" data-placement="bottom" data-toggle="popover" data-trigger="manual" href="#footnote-8" id="anchor-footnote-8"><span data-dcnode-id="1222" instrument_node="">8</span></a><span data-dcnode-id="1220" instrument_node=""> Throughout European history, this tension has been negotiated through an ‘agonistic’ struggle between the ‘right’, which favours liberty, and the ‘left’, which emphasizes equality. In recent years, with the hegemony of neoliberalism, the left/right frontier has been blurred and the space has disappeared where that agonistic confrontation between adversaries could take place. A characteristic of our post-democratic conditions is that democratic aspirations can no longer find channels of expression within the traditional political framework. The passion for equality, which, according to Tocqueville, is the democratic passion par excellence, does not find a political terrain where it can be channelled towards emancipatory goals.</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">It is in such a context that various populist movements have emerged, rejecting post-politics and post-democracy. They claim to give back to the people the voice that has been confiscated by the elites. Regardless of the problematic forms that some of these movements do take, it is important to recognize that they are the expression of legitimate democratic aspirations, which unfortunately are expressed in a xenophobic vocabulary. This possibility for democratic demands to be constructed in a xenophobic way is something that most parties are unable to comprehend due to their essentialist approach. This is why I submit that, without adopting an anti-essentialist discursive approach, it is not possible to grasp the nature of the populist challenge. This challenge requires acknowledging that the ‘people’, as a political category, can be constructed in very different ways and that not all of them are of a progressive orientation. Indeed, in several European countries, the aspiration for recovering the democratic ideals of equality and popular sovereignty, discarded under post-democracy, has been captured by rightwing populist parties. They have successfully mobilized common affects in constructing a people whose voice calls for a democracy aimed at defending the interests of ‘true nationals’. They construct the people through an ethno-nationalist discourse that excludes immigrants, considered as a threat to national identity and prosperity.</span></p><span data-dcnode-id="1215" instrument_node="">
</span><h3 data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Towards a progressive populism</span></h3><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">It is urgent to realize that it is the absence of a narrative offering a different vocabulary for formulating these democratic demands that explains the success of rightwing populism in a growing number of social sectors. What is needed is another narrative embodied in an ensemble of practices providing the discursive inscriptions able to foster other forms of identifications. Disqualifying those parties as ‘extreme-right’ or ‘neo-fascist’ is an easy way to dismiss their demands, since it refuses to acknowledge the democratic dimension of many of them. Attributing their appeal to lack of education or to the influence of atavistic factors is, of course, especially convenient for the forces of the centre. It permits them to avoid recognizing their own responsibility in the emergence of those parties. Their answer is to protect the ‘good democrats’ against the danger of ‘irrational’ passions, by establishing a ‘moral’ frontier so as to exclude the ‘extremists’ from the democratic debate. This demonization of the ‘enemies’ of the bipartisan consensus might be morally comforting, but it is politically disempowering.</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Instead of denigrating those demands, the task is to formulate them in a progressive way, defining the adversary as the configuration of forces that strengthen and promote the neoliberal project. The strategy for combatting rightwing populism should consist in promoting a progressive populist movement, a leftwing populism that is receptive to those democratic aspirations, and that through the construction of another people will mobilize common affects towards a defence of equality and social justice. Because, as Spinoza was keen to stress, an affect can only be displaced by an opposed affect, stronger than the one to be repressed.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Facing the challenge that the populist moment represents for the future of democracy requires the articulation of a collective will that establishes a synergy between the multiplicity of social movements and political forces whose objective is to recover and deepen democracy. Given that numerous social sectors suffer the effects of financialized capitalism, there is a potential for this collective will to have a transversal character that exceeds the left/right distinction as traditionally configured. Conceived in a progressive way, populism, far from being a perversion of democracy, constitutes in today’s Europe the most adequate political force to defend it.</span></p><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">The main obstacle to such a politics is that most leftwing parties do not understand the crucial role played by common affects in the constitution of political identities and the importance of mobilizing passions in a democratic direction. They are influenced by the view dominant in democratic political theory, according to which passions should be excluded from democratic politics, which should limit itself to rational arguments and deliberative procedures. This is no doubt one of the reasons for liberal democratic hostility to populism, and this is why liberal democrats are unable to answer the challenges posed by the rise of rightwing populist movements. Such movements understand that politics is always partisan and that it requires the creation of a we/they relation. They are well aware of the need to mobilize affects to construct collective political identities.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><p data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">I am convinced that, in the next few years, the central axis of the political conflict will be between right-wing populism and left-wing populism. It is imperative that progressive sectors understand the importance of involving themselves in that struggle. The best way to fight against those parties is not by accusing them of ‘populism’, condemning their appeal to affects. It is only through the construction of another people, a collective will based on the mobilization of the passions in defence of equality and social justice, that it will be possible to combat the xenophobic policies promoted by right-wing populism.</span></p><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">In recreating political frontiers, the ‘populist moment’ we are witnessing in Europe points to a ‘return of the political’. A return that may open the way for authoritarian solutions – through regimes that weaken liberal-democratic institutions – but which can also lead to a reaffirmation and deepening of democratic values. Everything will depend on the kind of populism that emerges victorious from the struggle against post-politics and post-democracy.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><p data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1188"><em data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">This paper was first presented as a lecture at the seminar on ‘Populism and Propaganda: New Intersections’, organized in Sofia on 9 July 2018 by the Human and Social Studies Foundation (HSSF).</span></em></p><span data-dcnode-id="1187" instrument_node="">
