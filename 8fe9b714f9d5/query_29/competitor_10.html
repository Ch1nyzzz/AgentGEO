</span><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">After the 2007 economic recession, it is claimed that many people have defaulted in paying their taxes due to low returns and lack of jobs. The media has focused on the issue mainly because taxation is a sensitive issue to government. Anusha Shrivastava wrote that the Federal Reserve had not done enough during the last few years to boost the economy (1). In this regard, fiscal policies must be designed to ensure maximum taxation.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2202" id="cb-id10-default"><span data-dcnode-id="2250" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p100%26referrer%3Dhttps%3A//ivypanda.com/essays/taxation-essay/%26assignment%3Dessay%257CEssay%26level%3DBachelor%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2249" instrument_node=""> </span><div data-dcnode-id="2220"><span data-dcnode-id="2248" instrument_node=""> </span><p class="bn__text" data-dcnode-id="2235"><span data-dcnode-id="2247" instrument_node=""> We will write a custom </span><b data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Essay on Taxes, Capitalism, and Democracy: Karl Marx VS Plato</span></b><span data-dcnode-id="2244" instrument_node=""> specifically for you </span><br data-dcnode-id="2243"><span data-dcnode-id="2242" instrument_node="">for only </span><s data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">$16.05</span></s><span data-dcnode-id="2239" instrument_node=""> </span><b class="bn__text-focused" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">$11/page</span></b><span data-dcnode-id="2236" instrument_node=""> </span></p><span data-dcnode-id="2234" instrument_node=""> </span><p class="bn__text mb-0" data-dcnode-id="2222"><span data-dcnode-id="2233" instrument_node=""> </span><span class="bn__writers-online" data-dcnode-id="2224"><span data-dcnode-id="2232" instrument_node=""> </span><span class="bn__writers-slider lazy-bg-image bn__writers-slider--lazy" data-bgloading="bn__writers-slider--lazy" data-dcnode-id="2231"></span><span data-dcnode-id="2230" instrument_node=""> </span><span data-dcnode-id="2226"><span class="bn__writers-count" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">807</span></span><span data-dcnode-id="2227" instrument_node=""> certified writers online</span></span><span data-dcnode-id="2225" instrument_node=""> </span></span><span data-dcnode-id="2223" instrument_node=""> </span></p><span data-dcnode-id="2221" instrument_node=""> </span></div><span data-dcnode-id="2219" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2206"><span data-dcnode-id="2218" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2208" title="Learn More"><span data-dcnode-id="2217" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2210"><span data-dcnode-id="2216" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Learn More</span></span><span data-dcnode-id="2213" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2212"></span><span data-dcnode-id="2211" instrument_node=""> </span></span><span data-dcnode-id="2209" instrument_node=""> </span></div><span data-dcnode-id="2207" instrument_node=""> </span></div><span data-dcnode-id="2205" instrument_node=""> </span></a><span data-dcnode-id="2203" instrument_node=""> </span></div><span data-dcnode-id="2201" instrument_node=""> </span><p data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Policies made should be in line with the state’s monetary policies. This would stimulate the economy. Brenda Cronin observed that American households had witnessed a rise in their income in the recent days (2). She however predicts that economic growth could be temporary because of financial problems in other states. Cronin argues that there is some hope among Americans that the economy might favor them.</span></p><span data-dcnode-id="2198" instrument_node=""> </span><p data-dcnode-id="2196"><span data-dcnode-id="2197" instrument_node="">This is welcomed by the state because taxation would be enhanced. Conversely, many people are not sure whether economic growth rate will hold. Citizens argue that one-month growth rate should not be used to speculate good future. Brendan Conway argues that taxation is projected to fall because American stock market is experiencing tensions due to the on-going financial meltdown in Europe (2).</span></p><span data-dcnode-id="2195" instrument_node=""> </span><p data-dcnode-id="2193"><span data-dcnode-id="2194" instrument_node="">The columnist argues that Dow Jones Industrial unit had already witnessed a drop of 145 points or 1.2% of its total shares. This shows that economic tension is still a threat to taxation. Many citizens would not be able to pay their taxes.</span></p><span data-dcnode-id="2192" instrument_node=""> </span><p data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">The claims in the media belong to the camp of freedom and community. The columnists are discussing some of the key issues that touch on the freedom of people and their communal living. Citizens are burdened with the responsibility of paying taxes yet they are not in a position. Taxation denies people their freedom because they become slaves only to pay taxes.</span></p><span data-dcnode-id="2189" instrument_node=""> </span><p data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Therefore, the columnists present some problems that affect people in society. Citizens are seeking freedom although it is tied to other things. Economic freedom would liberate people from poverty. Cronin argues that the state does not except the poor from taxation. The rich are taxed in the same way as the poor. This represents inequality because the state should tax the rich to feed the poor. This shows that capitalism is a problem to society.</span></p><span data-dcnode-id="2186" instrument_node=""> </span><p data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">It affects the lives of citizens because it leads to domination, alienation and pauperization. The existing tax system portrays inequalities because it increases the gap between the rich and the poor. The rich pay fewer taxes while the poor are taxed heavily. Such system leads to instabilities in the community because it affects the social structure. Families continue suffering because able members are forced to work hard only to pay taxes.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2154" id="cb-id2-group2"><span data-dcnode-id="2183" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p97%26referrer%3Dhttps%3A//ivypanda.com/essays/taxation-essay/%26assignment%3Dessay%257CEssay%26level%3DBachelor%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2182" instrument_node=""> </span><div class="bn__text p m-0" data-dcnode-id="2172"><span data-dcnode-id="2181" instrument_node=""> Get your </span><b data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">100% original paper on any topic</span></b><span data-dcnode-id="2178" instrument_node=""> done </span><br data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">in as little as </span><b class="bn__text-focused" data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">3 hours</span></b><span data-dcnode-id="2173" instrument_node=""> </span></div><span data-dcnode-id="2171" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2158"><span data-dcnode-id="2170" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2160" title="Learn More"><span data-dcnode-id="2169" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2162"><span data-dcnode-id="2168" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Learn More</span></span><span data-dcnode-id="2165" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2164"></span><span data-dcnode-id="2163" instrument_node=""> </span></span><span data-dcnode-id="2161" instrument_node=""> </span></div><span data-dcnode-id="2159" instrument_node=""> </span></div><span data-dcnode-id="2157" instrument_node=""> </span></a><span data-dcnode-id="2155" instrument_node=""> </span></div><span data-dcnode-id="2153" instrument_node=""> </span><p data-dcnode-id="2151"><span data-dcnode-id="2152" instrument_node="">Karl Marx argued that the economy determines all aspects of life. In this respect, life is depended on production and distribution. Marx focused on the work that people do in order to sustain their lives. The most important aspect of life is the means of production. The means of production such as tools, raw materials and skills are the base of any society. He observed that a small group in the society controls capital. The main aim of the owners of the means of production is to maximize profits.</span></p><span data-dcnode-id="2150" instrument_node=""> </span><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Plato on his part observed that justice is only achieved when people pay taxes. The best in society should be allowed to rule because they are able to bring justice and order. Citizens must be governed because they are highly appetitive. This means that they can easily be corrupted by the earthly. The philosopher king is compared to gold, meaning that he/she is the best in society (Nettleship 89). Soldiers are likened to silver.</span></p><span data-dcnode-id="2147" instrument_node=""> </span><p data-dcnode-id="2145"><span data-dcnode-id="2146" instrument_node="">They do not have the best knowledge to run the economy but they help the philosopher king in enforcing the law. Their main role is to make sure that people conform to the set rules. Citizens are like bronze. This means that they are not much valued. Plato argued that citizens must be respected because they are taxpayers. Any government cannot do without citizens. However, Plato observed that citizens must not be given a chance to rule because they are least qualified.</span></p><span data-dcnode-id="2144" instrument_node=""> </span><p data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Karl Marx would argue that the state is the property of the ruling class. The state serves the interests of the owners of means of production (27). Marx could further observe that policies made are meant to subjugate and dominate workers. Workers are forced to pay taxes making them to work hard. The owners of the means of production benefit because workers produce more goods to earn more wages. The state makes sure that people participate in economic development by setting standards for each person.</span></p><span data-dcnode-id="2141" instrument_node=""> </span><p data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Workers do not benefit from government policies, which make them to rise up to the occasion and fight for their rights. Workers will one day overthrow the ruling class, leading to socialism. Marx argued that taxation is one of the reasons that will force workers to challenge the elites in society. He further observed that introduction of technology would contribute to worker’s dissatisfaction. Profits will fall among capitalists because of competition, which will force them to adopt technology because it is easy to control.</span></p><span data-dcnode-id="2138" instrument_node=""> </span><p data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Plato on his part was against capitalism because it supports democracy. Plato was disillusioned with the way Socrates was treated by the thirty tyrants (Blackburn 35). Socrates was falsely accused of inciting the youth against the aristocrats. Socrates was finally punished by death, something that did not go down well with Plato.</span></p><span data-dcnode-id="2135" instrument_node=""> </span><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Plato became an opponent of democracy, suggesting that the best form of government should be based on educational qualification. The most qualified would identify how much each person should pay in form of taxes. Democracy is the tyranny of the multitude according to Plato. He highly discouraged democracy because it oppressed some members of society.</span></p><div class="bn bn--white bn--shadow-pulse bn--white-with-hover" data-dcnode-id="2103" id="cb-id11-default"><span data-dcnode-id="2132" instrument_node=""> </span><a class="bn__body" data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//service.ivypanda.com/writing-help%3Fet%3Da1058o9p101%26referrer%3Dhttps%3A//ivypanda.com/essays/taxation-essay/%26assignment%3Dessay%257CEssay%26level%3DBachelor%26deadline%3Dd14%26numpages%3D1" rel="nofollow sponsored noopener" target="_blank" title="Learn More"><span data-dcnode-id="2131" instrument_node=""> </span><div class="bn__text p m-0" data-dcnode-id="2121"><span data-dcnode-id="2130" instrument_node=""> We will write a custom </span><b data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Essay on Taxes, Capitalism, and Democracy: Karl Marx VS Plato</span></b><span data-dcnode-id="2127" instrument_node=""> specifically for you! </span><br data-dcnode-id="2126"><span data-dcnode-id="2125" instrument_node="">Get your first paper with </span><b class="bn__text-focused" data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">15% OFF</span></b><span data-dcnode-id="2122" instrument_node=""> </span></div><span data-dcnode-id="2120" instrument_node=""> </span><div class="bn__btn" data-dcnode-id="2107"><span data-dcnode-id="2119" instrument_node=""> </span><div class="ivy-button ivy-button--orange-simple ivy-button--animate-arrow w-auto mb-0" data-dcnode-id="2109" title="Learn More"><span data-dcnode-id="2118" instrument_node=""> </span><span class="ivy-button__content" data-dcnode-id="2111"><span data-dcnode-id="2117" instrument_node=""> </span><span class="ivy-button__text text-capitalize" data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Learn More</span></span><span data-dcnode-id="2114" instrument_node=""> </span><span class="ivy-button__icon ivy-button__icon--arrow-white" data-dcnode-id="2113"></span><span data-dcnode-id="2112" instrument_node=""> </span></span><span data-dcnode-id="2110" instrument_node=""> </span></div><span data-dcnode-id="2108" instrument_node=""> </span></div><span data-dcnode-id="2106" instrument_node=""> </span></a><span data-dcnode-id="2104" instrument_node=""> </span></div><span data-dcnode-id="2102" instrument_node=""> </span><h2 data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Works Cited</span></h2><span data-dcnode-id="2099" instrument_node=""> </span><p data-dcnode-id="2090"><span data-dcnode-id="2098" instrument_node="">Anusha, Shrivastava. Fed’s Williams: Fiscal Policy Actions ‘Badly Needed’. </span><em data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">Wall Street Journal</span></
