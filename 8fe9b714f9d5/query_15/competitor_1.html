</ul></div></div></nav><div class="hfeed site grid-container container grid-parent" data-dcnode-id="213" id="page"><div class="site-content" data-dcnode-id="214" id="content"><div class="content-area grid-parent mobile-grid-100 grid-70 tablet-grid-70" data-dcnode-id="261" id="primary"><main class="site-main" data-dcnode-id="262" id="main"><article class="post-412 post type-post status-publish format-standard has-post-thumbnail hentry category-big-issues" data-dcnode-id="263" id="post-412" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="264"><header class="entry-header" data-dcnode-id="1070"><h1 class="entry-title" data-dcnode-id="1086" itemprop="headline"><span data-dcnode-id="1087" instrument_node="">17 Pros and Cons of Capitalism</span></h1><div class="entry-meta" data-dcnode-id="1071"><span data-dcnode-id="1085" instrument_node=""> </span><span class="posted-on" data-dcnode-id="1079"><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/17-pros-and-cons-of-capitalism" rel="bookmark" title="10:00 am"><time class="updated" data-dcnode-id="1083" datetime="2017-05-24T20:17:59+00:00" itemprop="dateModified"><span data-dcnode-id="1084" instrument_node="">May 24, 2017</span></time><time class="entry-date published" data-dcnode-id="1081" datetime="2017-05-27T10:00:16+00:00" itemprop="datePublished"><span data-dcnode-id="1082" instrument_node="">May 27, 2017</span></time></a></span><span data-dcnode-id="1078" instrument_node=""> </span><span class="byline" data-dcnode-id="1072"><span class="author vcard" data-dcnode-id="1073" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1077" instrument_node="">by </span><a class="url fn n" data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/author/vittanaadmin" itemprop="url" rel="author" title="View all posts by Louise Gaille"><span class="author-name" data-dcnode-id="1075" itemprop="name"><span data-dcnode-id="1076" instrument_node="">Louise Gaille</span></span></a></span></span></div></header><div class="entry-content" data-dcnode-id="284" itemprop="text"><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">How does society see the role of the government? If that society desires a lack of government intervention within the production and various economic systems, relying on market-based competition and supply/demand needs instead, then that society will desire Capitalism. In Capitalism, goods or services are distributed based on societal mechanisms instead of government controls or mandates.</span></p><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">The primary benefit of Capitalism is that every individual has some level of control over their own fate in life. They can choose to own a business, work at a specific employer, work as a freelancer, or not work at all. Whatever dream they have, there is an opportunity to pursue it at some level.</span></p><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Capitalism can also segregate people into socioeconomic classes that limit the opportunities that are available to them. People who become rich tend to reinforce their position because they have a greater access to the societal mechanisms which bring wealth. Because those who are poor have less access, they have fewer chances to change their circumstances. This causes the rich to become richer and the poor to stay poor.</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">Here are some additional key points to consider when looking at the overall pros and cons of Capitalism.</span></p><h3 data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">What Are the Pros of Capitalism?</span></h3><p data-dcnode-id="1055"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">1. Capitalism encourages innovation. </span></strong><br data-dcnode-id="1057"><span data-dcnode-id="1056" instrument_node=""> Because there is a need to compete to remain profitable, Capitalism is a system that encourages innovation like no other system of economics. This occurs at every level. Businesses invest into research and development to create better products. Employees focus on improving their best practices so they can remain as productive as possible. Services are improved to solve more problems.</span></p><p data-dcnode-id="1050"><strong data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">2. It is a society that is based on the service of others. </span></strong><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node=""> There are two ways to look at Capitalism. The first, and most common, is that people in a Capitalistic society are working for their own benefit. The second is that every job in a society focused on Capitalism helps someone else in some way. People who manufacture goods can earn a good paycheck while creating something that solves a problem for another person in that society. Goods and services in Capitalism are all designed to help someone live a better life.</span></p><p data-dcnode-id="1045"><strong data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">3. Capitalism promotes equality. </span></strong><br data-dcnode-id="1047"><span data-dcnode-id="1046" instrument_node=""> Although the rich do tend to get richer and the poor tend to stay poor, everyone within a society focused on Capitalism does have an initial opportunity to find success. Some may need to work harder at it than others, but there is always an opportunity available at some level. The rewards are not always monetary. There is one guiding principle: if you work hard, then you have the chance to meet your definition of success.</span></p><p data-dcnode-id="1040"><strong data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">4. It provides freedom. </span></strong><br data-dcnode-id="1042"><span data-dcnode-id="1041" instrument_node=""> Governments that intervene in an economic market are doing so for their benefit, not that of the individual. With Capitalism, the focus is on the individual. Pricing and supply is driven by demand. People have the freedom to choose the goods and services that best meet their needs instead of being given a limited set of options due to government interference that is intended to preserve the structure of the ruling body.</span></p><p data-dcnode-id="1035"><strong data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">5. Capitalism promotes self-regulation. </span></strong><br data-dcnode-id="1037"><span data-dcnode-id="1036" instrument_node=""> Businesses in a Capitalistic society only have power because consumers allow them to have it. If buyers are not interested in the goods or services that are offered by an organization, then that business will not continue to exist. This means businesses must create goods or services that are desired by the society and this helps to serve the needs of individuals and households.</span></p><p data-dcnode-id="1030"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">6. It provides a wider range of products or services. </span></strong><br data-dcnode-id="1032"><span data-dcnode-id="1031" instrument_node=""> People have unique problems which must be solved. This wide array of needs allows for businesses to find a niche so they can exist. If there is value in the goods or services being offered, defined as being able to solve a problem, then it will continue to operate. That results in a society that offers a wider range of products or services than those that operate with government interference or mandate.</span></p><p data-dcnode-id="1025"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">7. There is an opportunity to be involved in governance. </span></strong><br data-dcnode-id="1027"><span data-dcnode-id="1026" instrument_node=""> Capitalism encourages people to get involved in all aspects of society to create the best possible outcome for themselves. That means it is a system that encourages people to be involved with their governance. From voting to serving on local boards to running for a national office, people get involved with government so they can create their preferred outcome.</span></p><p data-dcnode-id="1020"><strong data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">8. Capitalism embraces a smaller world. </span></strong><br data-dcnode-id="1022"><span data-dcnode-id="1021" instrument_node=""> There are people with tremendous skills in the developing world that are under-utilized. Global Capitalism allows businesses to tap into these resources so they can innovate. These innovations allow for the developing world to continue improving conditions for local populations, which can eventually work toward ending hunger, water scarcity, and other potentially life-threatening conditions.</span></p><p data-dcnode-id="692"><iframe allowfullscreen="" data-dcnode-id="693" frameborder="0" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/KGPa5Ob-5Ps%3Fcontrols%3D0&amp;raw" width="640"><html data-cast-api-enabled="true" data-dcnode-id="695" dir="ltr" lang="en"><head data-dcnode-id="1013"><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1" data-dcnode-id="1018" name="viewport"/><link data-dcnode-id="1017" href="https://www.youtube.com/s/player/0e7373c2/www-player.css" name="www-player" nonce="9P7VGo_qHGmVAD9YWsh8vA" rel="stylesheet"/><title data-dcnode-id="1015">Top Three Common Myths of Capitalism | Learn Liberty - YouTube</title><link data-dcnode-id="1014" href="https://www.youtube.com/watch?v=KGPa5Ob-5Ps" rel="canonical"/></head><body class="date-20220701 en_US ltr site-center-aligned site-as-gi _node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;&lt;a href="https://www.youtube.com/watch?v=KGPa5Ob-5Ps" target="_blank"&gt;Try watching this video on www.youtube.com&lt;/a&gt;, or enable JavaScript if it is disabled in your browser.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe></p><h3 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">What Are the Cons of Capitalism?</span></h3><p data-dcnode-id="685"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">1. Capitalism creates an economy that is based on consumption. </span></strong><br data-dcnode-id="687"><span data-dcnode-id="686" instrument_node=""> There is a specific focus on money within a society that is based on Capitalism. You need money to consume items that are produced. You need to earn money so that you can purchase items that you want to consume. This means more people are driven toward working for an employer than working for themselves. There is a choice to work, but choosing not to work makes it difficult to be a participant in a society that is based on Capitalism.</span></p><p data-dcnode-id="680"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">2. It places the needs of the business above the needs of the individual. </span></strong><br data-dcnode-id="682"><span data-dcnode-id="681" instrument_node=""> Businesses take the place of the government in a Capitalistic society. The business must continue to innovate and reduce costs for it to remain operational. Because the largest expense of most businesses is the labor needed to produce goods and services, the emphasis of Capitalism is to eliminate the need for workers instead of creating more needs for them. Self-checkout stands at restaurants and grocery stores is an example of this evolution.</span></p><p data-dcnode-id="675"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">3. Equal opportunities can be brief and fleeting. </span></strong><br data-dcnode-id="677"><span data-dcnode-id="676" instrument_node=""> Everyone may have their own opportunities to succeed, but without some level of governmental interference, those opportunities can be extremely brief. People who have access to more resources can create more for themselves. At the same time, people with limited access to resources often focus their energy on self-perseverance instead of wealth-building. This creates two basic groups of people: haves and have nots.</span></p><p data-dcnode-id="670"><strong data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">4. People with an inability to be productive are left behind. </span></strong><br data-dcnode-id="672"><span data-dcnode-id="671" instrument_node=""> Capitalism focuses on able-bodied individuals. If someone is unable to be productive, either because of injury or disability, then they no longer have an ability to contribute. These individuals get left behind, discarded because they are essentially not necessary to the survival of the society. The focus on Capitalism is competitive supply and demand. If you can’t provide a supply and have no resources to be part of the demand, then you’re not needed.</span></p><p data-dcnode-id="665"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">5. Unregulated Capitalism eventually leads to consolidation. </span></strong><br data-dcnode-id="667"><span data-dcnode-id="666" instrument_node=""> Businesses will eventually consolidate in a pure form of Capitalism until only one provider is available in the market. The goal is to limit competition so the most profits can be obtained by the goods or services being offered. This is called a “monopoly.” When such a circumstance occurs, all the power in the business-to-consumer relationship lies with the business. They can charge any price for what is being offered and the customer must pay it.</span></p><p data-dcnode-id="660"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">6. Even when workers are needed, there is no incentive to pay them “fairly.” </span></strong><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node=""> Capitalism, in its pure form, is a race to the bottom for workers. Businesses are encouraged to pay the least amount possible to retain workers while charging the highest possible prices for their productive capability. There will always be someone willing to work for a lower wage, which means workers must either accept the lower wages or be without any wages.</span></p><p data-dcnode-id="655"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">7. Competition is forced out of the market. </span></strong><br data-dcnode-id="657"><span data-dcnode-id="656" instrument_node=""> Capitalism focus on providing only the best. This means larger businesses with more capital work to force smaller businesses out of their niche. It also means that workers with “superior” skills work to force out workers that may have an average skill base. That is why Capitalism creates gaps between different socioeconomic groups. At some point, people and businesses must either choose to learn the skills or find new ways to compete or they become discarded in the society.</span></p><p data-dcnode-id="650"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">8. There is no social or environmental point of focus. </span></strong><br data-dcnode-id="652"><span data-dcnode-id="651" instrument_node=""> The goal of Capitalism is based on consumption, so energy is placed on that need alone. There is no consideration given to the environment, the social structures of the society, or whatever harm may be done in any other area. If the actions are profitable, then they are worth pursuing. This creates a natural outcome of corporate and individualistic greed.</span></p><p data-dcnode-id="645"><strong data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">9. Governance serves the best and ignores the worst in Capitalism. </span></strong><br data-dcnode-id="647"><span data-dcnode-id="646" instrument_node=""> Governments support the best businesses and the wealthiest individuals because they contribute the most to the infrastructure of the society. The poor receive services as well, but not to the same extent, because their contribution levels are “less” than others.</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">The pros and cons of Capitalism encourage development. They also encourage people to surround themselves with like-minded individuals to create polarized cliques. It can be beneficial, but if left unregulated, can lead to a polarized society where the needs of the few outweigh the needs of the many.</span></p><p data-dcnode-id="315"><iframe allowfullscreen="" data-dcnode-id="316" frameborder="0" height="360" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/dvJSK4viVMs%3Fcontrols%3D0&amp;raw" width="640"><html data-cast-api-enabled="true" data-dcnode-id="318" dir="ltr" lang="en"><head data-dcnode-id="636"><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1" data-dcnode-id="641" name="viewport"/><link data-dcnode-id="640" href="https://www.youtube.com/s/player/0e7373c2/www-player.css" name="www-player" nonce="_8E4QDva6a90MEN5OqgX5Q" rel="stylesheet"/><title data-dcnode-id="638">Paul Tudor Jones II: Why we need to rethink capitalism - YouTube</title><link data-dcnode-id="637" href="https://www.youtube.com/watch?v=dvJSK4viVMs" rel="canonical"/></head><body class="date-20220701 en_US ltr site-center-aligned site-as-giant-card webkit webkit-534" data-dcnode-id="319" dir="ltr"><div data-dcnode-id="322" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-hide-controls ytp-exp-bot
