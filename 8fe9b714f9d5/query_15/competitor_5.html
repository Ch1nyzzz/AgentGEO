</span><section class="convo-intro" data-dcnode-id="750"><span data-dcnode-id="755" instrument_node="">
</span><div class="convo-intro__description edit-component__wrapper" data-artifactid="HpDbRdTtMBVPKjHshvrtvxtKm" data-artifacttype="convo" data-dcnode-id="752" data-editlabel="a description for this question" data-fieldname="Description" data-onlyinedit="true"><div class="edit-component__content" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Capitalism is an economic system in which the four factors of production (entrepreneurship, capital goods, natural resources, and labor) are owned by private entities with the aim of generating a profit. Capitalism requires a free market economy driven by supply and demand. There is a lack of government intervention. Competition helps keep prices moderate and production efficient. This stands in opposition to socialism, a system in which the means of production are owned by the state.</span></div></div><span data-dcnode-id="751" instrument_node="">
