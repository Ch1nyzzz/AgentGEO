</span><div class="thumb tright" data-dcnode-id="3846"><div class="thumbinner" data-dcnode-id="3847" style="width:302px;"><a class="image" data-dcnode-id="3864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClash_of_Civilizations.png"><img alt="" class="thumbimage" data-dcnode-id="3865" data-file-height="1400" data-file-width="2753" decoding="async" height="153" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Clash_of_Civilizations.png/300px-Clash_of_Civilizations.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Clash_of_Civilizations.png/450px-Clash_of_Civilizations.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Clash_of_Civilizations.png/600px-Clash_of_Civilizations.png 2x" width="300"></a><span data-dcnode-id="3863" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3848"><div class="magnify" data-dcnode-id="3861"><a class="internal" data-dcnode-id="3862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AClash_of_Civilizations.png" title="Enlarge"></a></div><a data-dcnode-id="3859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_P._Huntington" title="Samuel P. Huntington"><span data-dcnode-id="3860" instrument_node="">Samuel P. Huntington</span></a><span data-dcnode-id="3858" instrument_node=""> argues in the </span><a data-dcnode-id="3856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clash_of_Civilizations" title="Clash of Civilizations"><span data-dcnode-id="3857" instrument_node="">Clash of Civilizations</span></a><span data-dcnode-id="3855" instrument_node=""> theory that after the </span><a data-dcnode-id="3853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="3854" instrument_node="">Cold War</span></a><span data-dcnode-id="3852" instrument_node="">, cultural differences between the West and other civilizations would be the main source of conflicts.</span><sup class="reference" data-dcnode-id="3849" id="cite_ref-:0_1-0"><a data-dcnode-id="3850" href="#cite_note-:0-1"><span data-dcnode-id="3851" instrument_node="">[1]</span></a></sup></div></div></div><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3822"><b data-dcnode-id="3843"><span data-dcnode-id="3844" instrument_node="">Anti-Western sentiment</span></b><span data-dcnode-id="3842" instrument_node="">, also known as </span><b data-dcnode-id="3840"><span data-dcnode-id="3841" instrument_node="">Anti-Atlanticism</span></b><span data-dcnode-id="3839" instrument_node="">, or </span><b data-dcnode-id="3837"><span data-dcnode-id="3838" instrument_node="">Westernophobia</span></b><span data-dcnode-id="3836" instrument_node=""> refers to broad opposition, bias, or hostility to the people, </span><a data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_culture" title="Western culture"><span data-dcnode-id="3835" instrument_node="">culture</span></a><span data-dcnode-id="3833" instrument_node="">, or policies of the </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="3832" instrument_node="">Western world</span></a><span data-dcnode-id="3830" instrument_node="">.</span><sup class="reference" data-dcnode-id="3827" id="cite_ref-2"><a data-dcnode-id="3828" href="#cite_note-2"><span data-dcnode-id="3829" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3824" id="cite_ref-3"><a data-dcnode-id="3825" href="#cite_note-3"><span data-dcnode-id="3826" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3823" instrument_node="">

" data-dcnode-id="3614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit"><span data-dcnode-id="3615" instrument_node="">improve this section</span></a><span data-dcnode-id="3613" instrument_node=""> by </span><a data-dcnode-id="3611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AReferencing_for_beginners" title="Help:Referencing for beginners"><span data-dcnode-id="3612" instrument_node="">adding citations to reliable sources</span></a><span data-dcnode-id="3610" instrument_node="">. Unsourced material may be challenged and </span><a data-dcnode-id="3608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability%23Burden_of_evidence" title="Wikipedia:Verifiability"><span data-dcnode-id="3609" instrument_node="">removed</span></a><span data-dcnode-id="3607" instrument_node="">.</span></span><span data-dcnode-id="3605" instrument_node=""> </span><span class="date-container" data-dcnode-id="3599"><i data-dcnode-id="3600"><span data-dcnode-id="3604" instrument_node="">(</span><span class="date" data-dcnode-id="3602"><span data-dcnode-id="3603" instrument_node="">August 2018</span></span><span data-dcnode-id="3601" instrument_node="">)</span></i></span><span class="hide-when-compact" data-dcnode-id="3592"><i data-dcnode-id="3593"><span data-dcnode-id="3598" instrument_node=""> (</span><small data-dcnode-id="3595"><a data-dcnode-id="3596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Help%3AMaintenance_template_removal" title="Help:Maintenance template removal"><span data-dcnode-id="3597" instrument_node="">Learn how and when to remove this template message</span></a></small><span data-dcnode-id="3594" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3547"><span data-dcnode-id="3585" instrument_node="">In many modern cases, anti-Western sentiment is fueled by </span><a data-dcnode-id="3583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-imperialism" title="Anti-imperialism"><span data-dcnode-id="3584" instrument_node="">anti-imperialism</span></a><span data-dcnode-id="3582" instrument_node="">, particularly against countries that are "deemed guilty for colonial crimes of the past and present," namely </span><a data-dcnode-id="3580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="3581" instrument_node="">Germany</span></a><span data-dcnode-id="3579" instrument_node="">, the </span><a data-dcnode-id="3577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="3578" instrument_node="">United Kingdom</span></a><span data-dcnode-id="3576" instrument_node="">, and the </span><a data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="3575" instrument_node="">Netherlands</span></a><span data-dcnode-id="3573" instrument_node="">. Anti-Western sentiment occurs in many countries, including the West– especially European countries. Broad anti-Western sentiment also exists in the </span><a data-dcnode-id="3571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_world" title="Muslim world"><span data-dcnode-id="3572" instrument_node="">Muslim world</span></a><span data-dcnode-id="3570" instrument_node=""> against </span><a class="mw-redirect" data-dcnode-id="3568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europeans" title="Europeans"><span data-dcnode-id="3569" instrument_node="">Europeans</span></a><span data-dcnode-id="3567" instrument_node=""> and </span><a data-dcnode-id="3565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3566" instrument_node="">Americans</span></a><span data-dcnode-id="3564" instrument_node="">. </span><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Americanism" title="Anti-Americanism"><span data-dcnode-id="3563" instrument_node="">Anti-American sentiment</span></a><span data-dcnode-id="3561" instrument_node=""> stems from </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel%25E2%2580%2593United_States_relations" title="Israel–United States relations"><span data-dcnode-id="3560" instrument_node="">their support for Israel</span></a><span data-dcnode-id="3558" instrument_node="">, the </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2003_invasion_of_Iraq" title="2003 invasion of Iraq"><span data-dcnode-id="3557" instrument_node="">seizure of Iraq in 2003</span></a><span data-dcnode-id="3555" instrument_node="">, and </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanctions_against_Iran" title="Sanctions against Iran"><span data-dcnode-id="3554" instrument_node="">numerous sanctions against Iran</span></a><span data-dcnode-id="3552" instrument_node="">.</span><sup class="reference" data-dcnode-id="3549" id="cite_ref-:1_4-0"><a data-dcnode-id="3550" href="#cite_note-:1-4"><span data-dcnode-id="3551" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3548" instrument_node="">
</span></p><p data-dcnode-id="3521"><a data-dcnode-id="3545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_P._Huntington" title="Samuel P. Huntington"><span data-dcnode-id="3546" instrument_node="">Samuel P. Huntington</span></a><span data-dcnode-id="3544" instrument_node=""> argues that, after the Cold War, international conflict over economic ideology would be replaced with conflict over cultural differences.</span><sup class="reference" data-dcnode-id="3541" id="cite_ref-:0_1-1"><a data-dcnode-id="3542" href="#cite_note-:0-1"><span data-dcnode-id="3543" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3540" instrument_node=""> His "</span><a data-dcnode-id="3538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Clash_of_Civilizations" title="Clash of Civilizations"><span data-dcnode-id="3539" instrument_node="">Clash of Civilizations</span></a><span data-dcnode-id="3537" instrument_node="">" argues that </span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regional_integration" title="Regional integration"><span data-dcnode-id="3536" instrument_node="">economic</span></a><span data-dcnode-id="3534" instrument_node=""> and </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Regionalism_%28politics%29" title="Regionalism (politics)"><span data-dcnode-id="3533" instrument_node="">political</span></a><span data-dcnode-id="3531" instrument_node=""> regionalism will increasingly shift non-Western countries towards </span><a class="mw-redirect" data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geopolitical" title="Geopolitical"><span data-dcnode-id="3530" instrument_node="">geopolitical</span></a><span data-dcnode-id="3528" instrument_node=""> engagement with countries that share their values.  He argues that </span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_population_growth" title="Muslim population growth"><span data-dcnode-id="3527" instrument_node="">Muslim population growth</span></a><span data-dcnode-id="3525" instrument_node=""> simultaneous to a growth in Islamic fanaticism is leading to a rejection of </span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westernization" title="Westernization"><span data-dcnode-id="3524" instrument_node="">Westernization</span></a><span data-dcnode-id="3522" instrument_node="">. 
</span></p><span data-dcnode-id="3520" instrument_node="">
</span><h2 data-dcnode-id="3510"><span class="mw-headline" data-dcnode-id="3518" id="Africa"><span data-dcnode-id="3519" instrument_node="">Africa</span></span><span class="mw-editsection" data-dcnode-id="3511"><span class="mw-editsection-bracket" data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">[</span></span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D2" title="Edit section: Africa"><span data-dcnode-id="3515" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3512"><span data-dcnode-id="3513" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3509" instrument_node="">
</span><h3 data-dcnode-id="3499"><span class="mw-headline" data-dcnode-id="3507" id="Democratic_Republic_of_the_Congo"><span data-dcnode-id="3508" instrument_node="">Democratic Republic of the Congo</span></span><span class="mw-editsection" data-dcnode-id="3500"><span class="mw-editsection-bracket" data-dcnode-id="3505"><span data-dcnode-id="3506" instrument_node="">[</span></span><a data-dcnode-id="3503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D3" title="Edit section: Democratic Republic of the Congo"><span data-dcnode-id="3504" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3501"><span data-dcnode-id="3502" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3498" instrument_node="">
</span><p data-dcnode-id="3480"><span data-dcnode-id="3497" instrument_node="">Congolese independence leader </span><a data-dcnode-id="3495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patrice_Lumumba" title="Patrice Lumumba"><span data-dcnode-id="3496" instrument_node="">Patrice Lumumba</span></a><span data-dcnode-id="3494" instrument_node=""> blamed the Western world for imperialism. On 1 August 1960, he "gave a speech that indicated in no ambiguous terms that the United Nations, its Secretary-General, the United States, and the Western powers were all corrupt entities."</span><sup class="reference" data-dcnode-id="3491" id="cite_ref-5"><a data-dcnode-id="3492" href="#cite_note-5"><span data-dcnode-id="3493" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3490" instrument_node=""> During the </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congo_Crisis" title="Congo Crisis"><span data-dcnode-id="3489" instrument_node="">Congo Crisis</span></a><span data-dcnode-id="3487" instrument_node="">, Lumumba received support from the </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="3486" instrument_node="">Soviet Union</span></a><span data-dcnode-id="3484" instrument_node=""> which contributed to his overthrow and execution by the Western-backed </span><a data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mobutu_Sese_Seko" title="Mobutu Sese Seko"><span data-dcnode-id="3483" instrument_node="">Mobutu Sese Seko</span></a><span data-dcnode-id="3481" instrument_node="">.
</span></p><p data-dcnode-id="3472"><span data-dcnode-id="3479" instrument_node="">When Mobutu became leader of the Congo, he renamed the country </span><a data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zaire" title="Zaire"><span data-dcnode-id="3478" instrument_node="">Zaire</span></a><span data-dcnode-id="3476" instrument_node=""> and created the national policy of </span><a data-dcnode-id="3474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Authenticit%25C3%25A9_%28Zaire%29" title="Authenticité (Zaire)"><span data-dcnode-id="3475" instrument_node="">Authenticité</span></a><span data-dcnode-id="3473" instrument_node=""> or Zaireanization, which aimed to remove all Western cultural influence from the country.
</span></p><p data-dcnode-id="3463"><span data-dcnode-id="3471" instrument_node="">In 2001, anti-Western sentiment skyrocketed in the Congo following the assassination of Congolese president </span><a class="mw-redirect" data-dcnode-id="3469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Laurent_Kabila" title="Laurent Kabila"><span data-dcnode-id="3470" instrument_node="">Laurent Kabila</span></a><span data-dcnode-id="3468" instrument_node="">, with many Congolese citizens blaming the Western world for his death.</span><sup class="reference" data-dcnode-id="3465" id="cite_ref-6"><a data-dcnode-id="3466" href="#cite_note-6"><span data-dcnode-id="3467" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3464" instrument_node="">
</span></p><span data-dcnode-id="3462" instrument_node="">
</span><h3 data-dcnode-id="3452"><span class="mw-headline" data-dcnode-id="3460" id="Ghana"><span data-dcnode-id="3461" instrument_node="">Ghana</span></span><span class="mw-editsection" data-dcnode-id="3453"><span class="mw-editsection-bracket" data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">[</span></span><a data-dcnode-id="3456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D4" title="Edit section: Ghana"><span data-dcnode-id="3457" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3454"><span data-dcnode-id="3455" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3451" instrument_node="">
</span><p data-dcnode-id="3442"><span data-dcnode-id="3450" instrument_node="">The first president of Ghana </span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kwame_Nkrumah" title="Kwame Nkrumah"><span data-dcnode-id="3449" instrument_node="">Kwame Nkrumah</span></a><span data-dcnode-id="3447" instrument_node=""> had a staunch anti-Western stance and blamed the United States for many of Africa's difficulties.</span><sup class="reference" data-dcnode-id="3444" id="cite_ref-7"><a data-dcnode-id="3445" href="#cite_note-7"><span data-dcnode-id="3446" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3443" instrument_node="">
</span></p><span data-dcnode-id="3441" instrument_node="">
</span><h3 data-dcnode-id="3431"><span class="mw-headline" data-dcnode-id="3439" id="Nigeria"><span data-dcnode-id="3440" instrument_node="">Nigeria</span></span><span class="mw-editsection" data-dcnode-id="3432"><span class="mw-editsection-bracket" data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">[</span></span><a data-dcnode-id="3435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D5" title="Edit section: Nigeria"><span data-dcnode-id="3436" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3433"><span data-dcnode-id="3434" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3430" instrument_node="">
</span><p data-dcnode-id="3425"><span data-dcnode-id="3429" instrument_node="">In northeastern Nigeria, the name of the Islamic terrorist group </span><a data-dcnode-id="3427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boko_Haram" title="Boko Haram"><span data-dcnode-id="3428" instrument_node="">Boko Haram</span></a><span data-dcnode-id="3426" instrument_node=""> translates to "Western education is forbidden" or "Western civilization is forbidden."
</span></p><span data-dcnode-id="3424" instrument_node="">
</span><h3 data-dcnode-id="3414"><span class="mw-headline" data-dcnode-id="3422" id="Zimbabwe"><span data-dcnode-id="3423" instrument_node="">Zimbabwe</span></span><span class="mw-editsection" data-dcnode-id="3415"><span class="mw-editsection-bracket" data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">[</span></span><a data-dcnode-id="3418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D6" title="Edit section: Zimbabwe"><span data-dcnode-id="3419" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3413" instrument_node="">
</span><p data-dcnode-id="3404"><span data-dcnode-id="3412" instrument_node="">Former Zimbabwean president </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Mugabe" title="Robert Mugabe"><span data-dcnode-id="3411" instrument_node="">Robert Mugabe</span></a><span data-dcnode-id="3409" instrument_node=""> used anti-Western rhetoric in his speeches, and he implemented policies that revoked  farmland from white Western farmers.</span><sup class="reference" data-dcnode-id="3406" id="cite_ref-8"><a data-dcnode-id="3407" href="#cite_note-8"><span data-dcnode-id="3408" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3405" instrument_node="">
</span></p><span data-dcnode-id="3403" instrument_node="">
</span><h2 data-dcnode-id="3393"><span class="mw-headline" data-dcnode-id="3401" id="Asia"><span data-dcnode-id="3402" instrument_node="">Asia</span></span><span class="mw-editsection" data-dcnode-id="3394"><span class="mw-editsection-bracket" data-dcnode-id="3399"><span data-dcnode-id="3400" instrument_node="">[</span></span><a data-dcnode-id="3397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D7" title="Edit section: Asia"><span data-dcnode-id="3398" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3395"><span data-dcnode-id="3396" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3392" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="3386" role="note"><span data-dcnode-id="3389" instrument_node="">Main article: </span><a data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Western_sentiment_in_China" title="Anti-Western sentiment in China"><span data-dcnode-id="3388" instrument_node="">Anti-Western sentiment in China</span></a></div><span data-dcnode-id="3385" instrument_node="">
</span><h3 data-dcnode-id="3375"><span class="mw-headline" data-dcnode-id="3383" id="Mainland_China"><span data-dcnode-id="3384" instrument_node="">Mainland China</span></span><span class="mw-editsection" data-dcnode-id="3376"><span class="mw-editsection-bracket" data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">[</span></span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D8" title="Edit section: Mainland China"><span data-dcnode-id="3380" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3377"><span data-dcnode-id="3378" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3374" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3373" instrument_node="">Anti-Western sentiment in </span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mainland_China" title="Mainland China"><span data-dcnode-id="3372" instrument_node="">mainland China</span></a><span data-dcnode-id="3370" instrument_node=""> has been increasing since the early 1990s, particularly among Chinese youth.</span><sup class="reference" data-dcnode-id="3367" id="cite_ref-flourishes_9-0"><a data-dcnode-id="3368" href="#cite_note-flourishes-9"><span data-dcnode-id="3369" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3366" instrument_node=""> Notable incidents which have resulted in a significant anti-Western backlash have included the </span><a class="mw-redirect" data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO_bombing_of_the_Chinese_embassy_in_Belgrade" title="NATO bombing of the Chinese embassy in Belgrade"><span data-dcnode-id="3365" instrument_node="">1999 NATO bombing of the Chinese embassy in Belgrade</span></a><span data-dcnode-id="3363" instrument_node="">,</span><sup class="reference" data-dcnode-id="3360" id="cite_ref-ChinaJournal_10-0"><a data-dcnode-id="3361" href="#cite_note-ChinaJournal-10"><span data-dcnode-id="3362" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3359" instrument_node=""> the 2008 demonstrations during the </span><a data-dcnode-id="3357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Summer_Olympics_torch_relay" title="2008 Summer Olympics torch relay"><span data-dcnode-id="3358" instrument_node="">Olympic torch relay</span></a><span data-dcnode-id="3356" instrument_node="">,</span><sup class="reference" data-dcnode-id="3353" id="cite_ref-erupt_11-0"><a data-dcnode-id="3354" href="#cite_note-erupt-11"><span data-dcnode-id="3355" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3352" instrument_node=""> and alleged </span><a data-dcnode-id="3350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_media" title="Western media"><span data-dcnode-id="3351" instrument_node="">Western media</span></a><span data-dcnode-id="3349" instrument_node=""> bias,</span><sup class="reference" data-dcnode-id="3346" id="cite_ref-China_Daily_12-0"><a data-dcnode-id="3347" href="#cite_note-China_Daily-12"><span data-dcnode-id="3348" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3345" instrument_node=""> especially in relation to the </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2008_Tibetan_unrest" title="2008 Tibetan unrest"><span data-dcnode-id="3344" instrument_node="">2008 Tibetan unrest</span></a><span data-dcnode-id="3342" instrument_node="">.</span><sup class="reference" data-dcnode-id="3339" id="cite_ref-China_criticizes_13-0"><a data-dcnode-id="3340" href="#cite_note-China_criticizes-13"><span data-dcnode-id="3341" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3338" instrument_node=""> While available public opinion polls show that the </span><a data-dcnode-id="3336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_people" title="Chinese people"><span data-dcnode-id="3337" instrument_node="">Chinese</span></a><span data-dcnode-id="3335" instrument_node=""> people view the United States in a positive light, there remains suspicion over the West's motives toward China stemming largely from historical experiences and specifically the "</span><a data-dcnode-id="3333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Century_of_humiliation" title="Century of humiliation"><span data-dcnode-id="3334" instrument_node="">century of humiliation</span></a><span data-dcnode-id="3332" instrument_node="">."</span><sup class="reference" data-dcnode-id="3329" id="cite_ref-hope_and_fear_14-0"><a data-dcnode-id="3330" href="#cite_note-hope_and_fear-14"><span data-dcnode-id="3331" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="3326" id="cite_ref-chinese_vent_15-0"><a data-dcnode-id="3327" href="#cite_note-chinese_vent-15"><span data-dcnode-id="3328" instrument_node="">[15]</span></a></sup><span data-dcnode-id="3325" instrument_node="">
</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3323" instrument_node="">These suspicions have been increased by the </span><a data-dcnode-id="3321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Party" title="Chinese Communist Party"><span data-dcnode-id="3322" instrument_node="">Chinese Communist Party</span></a><span data-dcnode-id="3320" instrument_node="">'s "Patriotic Education Campaign".</span><sup class="reference" data-dcnode-id="3317" id="cite_ref-Post-Communist_Studies_1998._pp._287-302_16-0"><a data-dcnode-id="3318" href="#cite_note-Post-Communist_Studies_1998._pp._287-302-16"><span data-dcnode-id="3319" instrument_node="">[16]</span></a></sup><span data-dcnode-id="3316" instrument_node=""> Although Chinese millennials are largely apathetic to politics, China's Gen Z has recently formed an unprecedentedly low opinion of the West and Western values since the </span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_economic_reform" title="Chinese economic reform"><span data-dcnode-id="3315" instrument_node="">Chinese economic reforms of the 70s.</span></a><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3307" style="white-space:nowrap;"><span data-dcnode-id="3313" instrument_node="">[</span><i data-dcnode-id="3309"><a data-dcnode-id="3310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3311" title="Considering the gravity and conspicuousness of this statement (December 2021)"><span data-dcnode-id="3312" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3308" instrument_node="">]</span></sup><span data-dcnode-id="3306" instrument_node=""> Young Chinese have grievances such as the Western alienation of Chinese tech companies, </span><a class="mw-redirect" data-dcnode-id="3304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Asian_racism_in_the_United_States" title="Anti-Asian racism in the United States"><span data-dcnode-id="3305" instrument_node="">anti-Asian racism</span></a><span data-dcnode-id="3303" instrument_node="">, anti-China propaganda push, and pressure on China's internal affairs, among other issues. In a study conducted by Toronto University in April 2020, 4 out of every 5 Chinese under 30 years old said they do not trust Americans.</span><sup class="reference" data-dcnode-id="3300" id="cite_ref-17"><a data-dcnode-id="3301" href="#cite_note-17"><span data-dcnode-id="3302" instrument_node="">[17]</span></a></sup><sup class="reference" data-dcnode-id="3297" id="cite_ref-18"><a data-dcnode-id="3298" href="#cite_note-18"><span data-dcnode-id="3299" instrument_node="">[18]</span></a></sup><span data-dcnode-id="3296" instrument_node="">
</span></p><span data-dcnode-id="3294" instrument_node="">
</span><h3 data-dcnode-id="3284"><span class="mw-headline" data-dcnode-id="3292" id="Japan"><span data-dcnode-id="3293" instrument_node="">Japan</span></span><span class="mw-editsection" data-dcnode-id="3285"><span class="mw-editsection-bracket" data-dcnode-id="3290"><span data-dcnode-id="3291" instrument_node="">[</span></span><a data-dcnode-id="3288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D9" title="Edit section: Japan"><span data-dcnode-id="3289" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3286"><span data-dcnode-id="3287" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3283" instrument_node="">
</span><link data-dcnode-id="3282" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3272" role="note"><span data-dcnode-id="3281" instrument_node="">Further information: </span><a data-dcnode-id="3279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan%23Foreign_relations" title="Japan"><span data-dcnode-id="3280" instrument_node="">Japan §&nbsp;Foreign relations</span></a><span data-dcnode-id="3278" instrument_node="">, </span><a data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Foreign_relations_of_Japan%23Europe" title="Foreign relations of Japan"><span data-dcnode-id="3277" instrument_node="">Foreign relations of Japan §&nbsp;Europe</span></a><span data-dcnode-id="3275" instrument_node="">, and </span><a data-dcnode-id="3273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan%25E2%2580%2593United_States_relations" title="Japan–United States relations"><span data-dcnode-id="3274" instrument_node="">Japan–United States relations</span></a></div><span data-dcnode-id="3271" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3270" instrument_node="">There is a history of criticism of the so-called West within the intellectual history of </span><a data-dcnode-id="3268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="3269" instrument_node="">Japan</span></a><span data-dcnode-id="3267" instrument_node="">.</span><sup class="reference" data-dcnode-id="3264" id="cite_ref-19"><a data-dcnode-id="3265" href="#cite_note-19"><span data-dcnode-id="3266" instrument_node="">[19]</span></a></sup><span data-dcnode-id="3263" instrument_node="">

</span><p data-dcnode-id="3166"><a data-dcnode-id="3202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lee_Kuan_Yew" title="Lee Kuan Yew"><span data-dcnode-id="3203" instrument_node="">Lee Kuan Yew</span></a><span data-dcnode-id="3201" instrument_node="">, the former </span><a data-dcnode-id="3199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_Minister_of_Singapore" title="Prime Minister of Singapore"><span data-dcnode-id="3200" instrument_node="">Prime Minister of Singapore</span></a><span data-dcnode-id="3198" instrument_node="">, argued that </span><a data-dcnode-id="3196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Asia" title="East Asia"><span data-dcnode-id="3197" instrument_node="">East Asian</span></a><span data-dcnode-id="3195" instrument_node=""> countries such as </span><a data-dcnode-id="3193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3194" instrument_node="">China</span></a><span data-dcnode-id="3192" instrument_node="">, </span><a data-dcnode-id="3190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="3191" instrument_node="">Japan</span></a><span data-dcnode-id="3189" instrument_node="">, </span><a data-dcnode-id="3187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korea" title="Korea"><span data-dcnode-id="3188" instrument_node="">Korea</span></a><span data-dcnode-id="3186" instrument_node=""> and </span><a data-dcnode-id="3184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam" title="Vietnam"><span data-dcnode-id="3185" instrument_node="">Vietnam</span></a><span data-dcnode-id="3183" instrument_node=""> should be based on "</span><a data-dcnode-id="3181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asian_values" title="Asian values"><span data-dcnode-id="3182" instrument_node="">Asian values</span></a><span data-dcnode-id="3180" instrument_node="">."</span><sup class="reference" data-dcnode-id="3177" id="cite_ref-21"><a data-dcnode-id="3178" href="#cite_note-21"><span data-dcnode-id="3179" instrument_node="">[21]</span></a></sup><span data-dcnode-id="3176" instrument_node=""> Countries such as the </span><a data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Four_Asian_Tigers" title="Four Asian Tigers"><span data-dcnode-id="3175" instrument_node="">Four Asian Tigers</span></a><span data-dcnode-id="3173" instrument_node=""> should aspire to have Western-style </span><a class="mw-redirect" data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standards_of_living" title="Standards of living"><span data-dcnode-id="3172" instrument_node="">standards of living</span></a><span data-dcnode-id="3170" instrument_node="">, but without accepting </span><a class="mw-redirect" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_democratic" title="Liberal democratic"><span data-dcnode-id="3169" instrument_node="">liberal democratic</span></a><span data-dcnode-id="3167" instrument_node=""> social institutions and principles.

</span><h4 data-dcnode-id="3144"><span class="mw-headline" data-dcnode-id="3152" id="Islamism"><span data-dcnode-id="3153" instrument_node="">Islamism</span></span><span class="mw-editsection" data-dcnode-id="3145"><span class="mw-editsection-bracket" data-dcnode-id="3150"><span data-dcnode-id="3151" instrument_node="">[</span></span><a data-dcnode-id="3148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D13" title="Edit section: Islamism"><span data-dcnode-id="3149" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3146"><span data-dcnode-id="3147" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3143" instrument_node="">
</span><link data-dcnode-id="3142" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3138" role="note"><span data-dcnode-id="3141" instrument_node="">Main article: </span><a data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamism" title="Islamism"><span data-dcnode-id="3140" instrument_node="">Islamism</span></a></div><span data-dcnode-id="3137" instrument_node="">
</span><p data-dcnode-id="3098"><span data-dcnode-id="3136" instrument_node="">Together with political </span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Salafi_movement" title="Salafi movement"><span data-dcnode-id="3135" instrument_node="">Salafis</span></a><span data-dcnode-id="3133" instrument_node="">, </span><a data-dcnode-id="3131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jihadism" title="Jihadism"><span data-dcnode-id="3132" instrument_node="">jihadists</span></a><span data-dcnode-id="3130" instrument_node=""> (also called militant Salafis) view </span><a data-dcnode-id="3128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Europe" title="Europe"><span data-dcnode-id="3129" instrument_node="">Europe</span></a><span data-dcnode-id="3127" instrument_node=""> as lands inhabited by </span><a data-dcnode-id="3125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infidel" title="Infidel"><span data-dcnode-id="3126" instrument_node="">infidels</span></a><span data-dcnode-id="3124" instrument_node=""> (</span><i data-dcnode-id="3121"><a class="mw-redirect" data-dcnode-id="3122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dar_al-Kufr" title="Dar al-Kufr"><span data-dcnode-id="3123" instrument_node="">Dar al-Kufr</span></a></i><span data-dcnode-id="3120" instrument_node="">). For jihadists this makes Europe a just target for armed jihad, e.g., acts of war or terrorist attacks. Such lands go under the name of </span><i data-dcnode-id="3117"><a class="mw-redirect" data-dcnode-id="3118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dar_al-Harb" title="Dar al-Harb"><span data-dcnode-id="3119" instrument_node="">Dar al-Harb</span></a></i><span data-dcnode-id="3116" instrument_node=""> (lands of war).</span><sup class="reference" data-dcnode-id="3113" id="cite_ref-22"><a data-dcnode-id="3114" href="#cite_note-22"><span data-dcnode-id="3115" instrument_node="">[22]</span></a></sup><span data-dcnode-id="3112" instrument_node=""> Jihadists themselves motivate their attacks in two prominent ways: to resist Western military intervention in </span><a data-dcnode-id="3110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muslim_world" title="Muslim world"><span data-dcnode-id="3111" instrument_node="">Muslim countries</span></a><span data-dcnode-id="3109" instrument_node=""> and to discourage insults against </span><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islam" title="Islam"><span data-dcnode-id="3108" instrument_node="">Islam</span></a><span data-dcnode-id="3106" instrument_node=""> such as </span><a class="mw-redirect" data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muhammad_Cartoons" title="Muhammad Cartoons"><span data-dcnode-id="3105" instrument_node="">Muhammad Cartoons</span></a><span data-dcnode-id="3103" instrument_node="">.</span><sup class="reference" data-dcnode-id="3100" id="cite_ref-23"><a data-dcnode-id="3101" href="#cite_note-23"><span data-dcnode-id="3102" instrument_node="">[23]</span></a></sup><span data-dcnode-id="3099" instrument_node="">
</span></p><p data-dcnode-id="3075"><a data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Calvert_%28scholar%29" title="John Calvert (scholar)"><span data-dcnode-id="3097" instrument_node="">John Calvert</span></a><span data-dcnode-id="3095" instrument_node=""> writes that in their critique of the West the </span><a class="mw-redirect" data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamists" title="Islamists"><span data-dcnode-id="3094" instrument_node="">Islamists</span></a><span data-dcnode-id="3092" instrument_node=""> use Western thinkers like </span><a data-dcnode-id="3090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexis_Carrel" title="Alexis Carrel"><span data-dcnode-id="3091" instrument_node="">Alexis Carrel</span></a><span data-dcnode-id="3089" instrument_node="">, </span><a data-dcnode-id="3087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oswald_Spengler" title="Oswald Spengler"><span data-dcnode-id="3088" instrument_node="">Oswald Spengler</span></a><span data-dcnode-id="3086" instrument_node="">, </span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arnold_J._Toynbee" title="Arnold J. Toynbee"><span data-dcnode-id="3085" instrument_node="">Arnold J. Toynbee</span></a><span data-dcnode-id="3083" instrument_node="">, and </span><a data-dcnode-id="3081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arthur_Koestler" title="Arthur Koestler"><span data-dcnode-id="3082" instrument_node="">Arthur Koestler</span></a><span data-dcnode-id="3080" instrument_node="">.</span><sup class="reference" data-dcnode-id="3077" id="cite_ref-24"><a data-dcnode-id="3078" href="#cite_note-24"><span data-dcnode-id="3079" instrument_node="">[24]</span></a></sup><span data-dcnode-id="3076" instrument_node="">
</span></p><p data-dcnode-id="3060"><span data-dcnode-id="3074" instrument_node="">Terrorist groups </span><a data-dcnode-id="3072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Qaeda" title="Al-Qaeda"><span data-dcnode-id="3073" instrument_node="">al-Qaeda</span></a><span data-dcnode-id="3071" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_State_of_Iraq_and_the_Levant" title="Islamic State of Iraq and the Levant"><span data-dcnode-id="3070" instrument_node="">ISIL/ISIS</span></a><span data-dcnode-id="3068" instrument_node=""> are said to be both anti-Western. They have been known to promote </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="3067" instrument_node="">terrorism</span></a><span data-dcnode-id="3065" instrument_node=""> in Western countries.</span><sup class="reference" data-dcnode-id="3062" id="cite_ref-25"><a data-dcnode-id="3063" href="#cite_note-25"><span data-dcnode-id="3064" instrument_node="">[25]</span></a></sup><span data-dcnode-id="3061" instrument_node="">
</span></p><span data-dcnode-id="3059" instrument_node="">
</span><h4 data-dcnode-id="3049"><span class="mw-headline" data-dcnode-id="3057" id="Turkey"><span data-dcnode-id="3058" instrument_node="">Turkey</span></span><span class="mw-editsection" data-dcnode-id="3050"><span class="mw-editsection-bracket" data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node="">[</span></span><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D14" title="Edit section: Turkey"><span data-dcnode-id="3054" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3051"><span data-dcnode-id="3052" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3048" instrument_node="">
</span><link data-dcnode-id="3047" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3040" role="note"><span data-dcnode-id="3046" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="3044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Union%25E2%2580%2593Turkey_relations" title="European Union–Turkey relations"><span data-dcnode-id="3045" instrument_node="">European Union–Turkey relations</span></a><span data-dcnode-id="3043" instrument_node=""> and </span><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey%23Foreign_relations" title="Turkey"><span data-dcnode-id="3042" instrument_node="">Turkey §&nbsp;Foreign relations</span></a></div><span data-dcnode-id="3039" instrument_node="">
</span><p data-dcnode-id="3024"><span data-dcnode-id="3038" instrument_node="">During the </span><a class="mw-redirect" data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ottoman_empire" title="Ottoman empire"><span data-dcnode-id="3037" instrument_node="">Ottoman period</span></a><span data-dcnode-id="3035" instrument_node=""> of </span><a data-dcnode-id="3033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="3034" instrument_node="">Turkey</span></a><span data-dcnode-id="3032" instrument_node="">, a tradition of anti-Westernism developed.</span><sup class="reference" data-dcnode-id="3029" id="cite_ref-26"><a data-dcnode-id="3030" href="#cite_note-26"><span data-dcnode-id="3031" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="3026" id="cite_ref-27"><a data-dcnode-id="3027" href="#cite_note-27"><span data-dcnode-id="3028" instrument_node="">[27]</span></a></sup><span data-dcnode-id="3025" instrument_node="">
</span></p><span data-dcnode-id="3023" instrument_node="">
</span><h2 data-dcnode-id="3013"><span class="mw-headline" data-dcnode-id="3021" id="Europe"><span data-dcnode-id="3022" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="3014"><span class="mw-editsection-bracket" data-dcnode-id="3019"><span data-dcnode-id="3020" instrument_node="">[</span></span><a data-dcnode-id="3017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D15" title="Edit section: Europe"><span data-dcnode-id="3018" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3012" instrument_node="">
</span><h3 data-dcnode-id="3002"><span class="mw-headline" data-dcnode-id="3010" id="Russia"><span data-dcnode-id="3011" instrument_node="">Russia</span></span><span class="mw-editsection" data-dcnode-id="3003"><span class="mw-editsection-bracket" data-dcnode-id="3008"><span data-dcnode-id="3009" instrument_node="">[</span></span><a data-dcnode-id="3006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D16" title="Edit section: Russia"><span data-dcnode-id="3007" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3001" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="2992"><div class="thumbinner" data-dcnode-id="2993" style="width:222px;"><a class="image" data-dcnode-id="2999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_21_February_2001-2.jpg"><img alt="" class="thumbimage" data-dcnode-id="3000" data-file-height="334" data-file-width="500" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/220px-Vladimir_Putin_21_February_2001-2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/330px-Vladimir_Putin_21_February_2001-2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/14/Vladimir_Putin_21_February_2001-2.jpg/440px-Vladimir_Putin_21_February_2001-2.jpg 2x" width="220"></a><span data-dcnode-id="2998" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2994"><div class="magnify" data-dcnode-id="2996"><a class="internal" data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVladimir_Putin_21_February_2001-2.jpg" title="Enlarge"></a></div><span data-dcnode-id="2995" instrument_node="">Russian President Vladimir Putin with religious leaders of Russia, 2001. Putin has promoted religious traditionalism and the rejection of some Western liberal principles, like toleration of homosexuality.</span></div></div></div><span data-dcnode-id="2991" instrument_node="">
</span><p data-dcnode-id="2974"><span data-dcnode-id="2990" instrument_node="">Anti-Western sentiment in </span><a data-dcnode-id="2988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="2989" instrument_node="">Russia</span></a><span data-dcnode-id="2987" instrument_node=""> dates back to 19th century from an intellectual debate between </span><a data-dcnode-id="2985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Westernizer" title="Westernizer"><span data-dcnode-id="2986" instrument_node="">Westernists</span></a><span data-dcnode-id="2984" instrument_node=""> and </span><a data-dcnode-id="2982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavophilia" title="Slavophilia"><span data-dcnode-id="2983" instrument_node="">Slavophiles</span></a><span data-dcnode-id="2981" instrument_node="">. While the former deemed Russia to be a lagging Western country, the latter rejected these claims outright and dubbed West to be 'rotten'. An important figure in Western criticism under reign of </span><a data-dcnode-id="2979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexander_III_of_Russia" title="Alexander III of Russia"><span data-dcnode-id="2980" instrument_node="">Alexander III</span></a><span data-dcnode-id="2978" instrument_node=""> was </span><a data-dcnode-id="2976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantin_Pobedonostsev" title="Konstantin Pobedonostsev"><span data-dcnode-id="2977" instrument_node="">Konstantin Pobedonostsev</span></a><span data-dcnode-id="2975" instrument_node="">, a former liberal who eventually renounced and thoroughly criticized his former views.
</span></p><p data-dcnode-id="2966"><span data-dcnode-id="2973" instrument_node="">Under the </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="2972" instrument_node="">Communist rule</span></a><span data-dcnode-id="2970" instrument_node=""> 'the West' eventually became synonymous with '</span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_World" title="First World"><span data-dcnode-id="2969" instrument_node="">the capitalist world</span></a><span data-dcnode-id="2967" instrument_node="">', resulting in appearance of famous propagandist cliché 'corrupting influence of the West'.
</span></p><p data-dcnode-id="2955"><span data-dcnode-id="2965" instrument_node="">After the </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="2964" instrument_node="">Cold War</span></a><span data-dcnode-id="2962" instrument_node="">, a number of politicians in the Russian Federation have supported an explicit promotion of </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="2961" instrument_node="">Russian Orthodox traditionalism</span></a><span data-dcnode-id="2959" instrument_node=""> and a rejection of </span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberalism" title="Liberalism"><span data-dcnode-id="2958" instrument_node="">Western liberalism</span></a><span data-dcnode-id="2956" instrument_node="">.
</span></p><p data-dcnode-id="2947"><span data-dcnode-id="2954" instrument_node="">Some </span><a class="mw-redirect" data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ultra-nationalist" title="Ultra-nationalist"><span data-dcnode-id="2953" instrument_node="">ultra-nationalist</span></a><span data-dcnode-id="2951" instrument_node=""> politicians, such as </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Zhirinovsky" title="Vladimir Zhirinovsky"><span data-dcnode-id="2950" instrument_node="">Vladimir Zhirinovsky</span></a><span data-dcnode-id="2948" instrument_node="">, express the most anti-Western sentiment.
</span></p><p data-dcnode-id="2907"><a data-dcnode-id="2945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Putin" title="Vladimir Putin"><span data-dcnode-id="2946" instrument_node="">Vladimir Putin</span></a><span data-dcnode-id="2944" instrument_node=""> has promoted explicitly conservative policies in social, cultural and political matters, both at home and abroad.  Putin has attacked </span><a data-dcnode-id="2942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalism" title="Globalism"><span data-dcnode-id="2943" instrument_node="">globalism</span></a><span data-dcnode-id="2941" instrument_node=""> and </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="2940" instrument_node="">neoliberalism</span></a><sup class="reference" data-dcnode-id="2936" id="cite_ref-28"><a data-dcnode-id="2937" href="#cite_note-28"><span data-dcnode-id="2938" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2935" instrument_node=""> and promoted new think tanks that stress </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_nationalism" title="Russian nationalism"><span data-dcnode-id="2934" instrument_node="">Russian nationalism</span></a><span data-dcnode-id="2932" instrument_node="">; the restoration of Russia's historical greatness; and systematic opposition to liberal ideas and policies.</span><sup class="reference" data-dcnode-id="2929" id="cite_ref-29"><a data-dcnode-id="2930" href="#cite_note-29"><span data-dcnode-id="2931" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2928" instrument_node=""> Putin has collaborated closely with the </span><a data-dcnode-id="2926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Orthodox_Church" title="Russian Orthodox Church"><span data-dcnode-id="2927" instrument_node="">Russian Orthodox Church</span></a><span data-dcnode-id="2925" instrument_node="">. </span><a data-dcnode-id="2923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Patriarch_Kirill_of_Moscow" title="Patriarch Kirill of Moscow"><span data-dcnode-id="2924" instrument_node="">Patriarch Kirill of Moscow</span></a><span data-dcnode-id="2922" instrument_node="">, head of the Church, endorsed his election in 2012 stating Putin's terms were like "a miracle of God."</span><sup class="reference" data-dcnode-id="2919" id="cite_ref-30"><a data-dcnode-id="2920" href="#cite_note-30"><span data-dcnode-id="2921" instrument_node="">[30]</span></a></sup><sup class="reference" data-dcnode-id="2916" id="cite_ref-31"><a data-dcnode-id="2917" href="#cite_note-31"><span data-dcnode-id="2918" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2915" instrument_node=""> The Russian Orthodox Church is known to host groups that promote nationalist and anti-Western tendencies.</span><sup class="reference" data-dcnode-id="2912" id="cite_ref-32"><a data-dcnode-id="2913" href="#cite_note-32"><span data-dcnode-id="2914" instrument_node="">[32]</span></a></sup><sup class="reference" data-dcnode-id="2909" id="cite_ref-33"><a data-dcnode-id="2910" href="#cite_note-33"><span data-dcnode-id="2911" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2908" instrument_node="">
</span></p><p data-dcnode-id="2881"><span data-dcnode-id="2906" instrument_node="">The </span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Russia" title="Government of Russia"><span data-dcnode-id="2905" instrument_node="">Russian government</span></a><span data-dcnode-id="2903" instrument_node=""> has restricted foreign funding of some pro-liberal NGOs. Pro-Russian activists in the former Soviet Union frequently equate the West with </span><a data-dcnode-id="2901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homosexuality" title="Homosexuality"><span data-dcnode-id="2902" instrument_node="">homosexuality</span></a><span data-dcnode-id="2900" instrument_node=""> and the </span><a data-dcnode-id="2898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gay_agenda" title="Gay agenda"><span data-dcnode-id="2899" instrument_node="">gay agenda</span></a><span data-dcnode-id="2897" instrument_node="">.</span><sup class="reference" data-dcnode-id="2894" id="cite_ref-gaywest_34-0"><a data-dcnode-id="2895" href="#cite_note-gaywest-34"><span data-dcnode-id="2896" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2893" instrument_node=""> </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_gay_propaganda_law" title="Russian gay propaganda law"><span data-dcnode-id="2892" instrument_node="">Russian gay propaganda law</span></a><span data-dcnode-id="2890" instrument_node=""> was welcomed by nationalist and religious political figures in Russia as a bulwark against Western influence.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2883" style="white-space:nowrap;"><span data-dcnode-id="2889" instrument_node="">[</span><i data-dcnode-id="2885"><a data-dcnode-id="2886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2887" title="This claim needs references to reliable sources. (December 2020)"><span data-dcnode-id="2888" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2884" instrument_node="">]</span></sup><span data-dcnode-id="2882" instrument_node="">
</span></p><p data-dcnode-id="2866"><span data-dcnode-id="2880" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yarovaya_Law" title="Yarovaya Law"><span data-dcnode-id="2879" instrument_node="">Yarovaya Law</span></a><span data-dcnode-id="2877" instrument_node=""> prohibits evangelism by religious minorities. It was used to ban the </span><a data-dcnode-id="2875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2876" instrument_node="">U.S.</span></a><span data-dcnode-id="2874" instrument_node="">-based </span><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jehovah%2527s_Witnesses" title="Jehovah's Witnesses"><span data-dcnode-id="2873" instrument_node="">Jehovah's Witnesses</span></a><span data-dcnode-id="2871" instrument_node="">.</span><sup class="reference" data-dcnode-id="2868" id="cite_ref-35"><a data-dcnode-id="2869" href="#cite_note-35"><span data-dcnode-id="2870" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2867" instrument_node="">
</span></p><span data-dcnode-id="2865" instrument_node="">
</span><h2 data-dcnode-id="2855"><span class="mw-headline" data-dcnode-id="2863" id="Latin-America"><span data-dcnode-id="2864" instrument_node="">Latin-America</span></span><span class="mw-editsection" data-dcnode-id="2856"><span class="mw-editsection-bracket" data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">[</span></span><a data-dcnode-id="2859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Western_sentiment%26action%3Dedit%26section%3D17" title="Edit section: Latin-America"><span data-dcnode-id="2860" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2857"><span data-dcnode-id="2858" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2854" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2853" instrument_node="">Anti-western sentiment exists in Latin-America especially in places where the population consists mostly of ethnic indigenous people, like in </span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peru" title="Peru"><span data-dcnode-id="2852" instrument_node="">Peru</span></a><span data-dcnode-id="2850" instrument_node="">, </span><a data-dcnode-id="2848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paraguay" title="Paraguay"><span data-dcnode-id="2849" instrument_node="">Paraguay</span></a><span data-dcnode-id="2847" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bol%25C3%25ADvia" title="Bolívia"><span data-dcnode-id="2846" instrument_node="">Bolivia</span></a><span data-dcnode-id="2844" instrument_node="">.</span><sup class="reference" data-dcnode-id="2841" id="cite_ref-36"><a data-dcnode-id="2842" href="#cite_note-36"><span data-dcnode-id="2843" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2840" instrument_node=""> In countries like </span><a data-dcnode-id="2838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="2839" instrument_node="">Brazil</span></a><span data-dcnode-id="2837" instrument_node="">, </span><a data-dcnode-id="2835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chile" title="Chile"><span data-dcnode-id="2836" instrument_node="">Chile</span></a><span data-dcnode-id="2834" instrument_node="">, </span><a data-dcnode-id="2832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venezuela" title="Venezuela"><span data-dcnode-id="2833" instrument_node="">Venezuela</span></a><span data-dcnode-id="2831" instrument_node="">, </span><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uruguay" title="Uruguay"><span data-dcnode-id="2830" instrument_node="">Uruguay</span></a><span data-dcnode-id="2828" instrument_node="">, and </span><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Argentina" title="Argentina"><span data-dcnode-id="2827" instrument_node="">Argentina</span></a><span data-dcnode-id="2825" instrument_node="">, European descendants are more represented in the population. Consequently, there are many Latin Americans who identify as western. Anti-western discourse is therefore not as prominent as in other continents. That is not to say, however, that there is no anti-western discourse. Indeed, it can be found in countries with nationalist populist leaders or movements, or even in left-wing political parties.</span><sup class="reference" data-dcnode-id="2822" id="cite_ref-37"><a data-dcnode-id="2823" href="#cite_note-37"><span data-dcnode-id="2824" instrument_node="">[37]</span></a></sup><span data-dcnode-id="2821" instrument_node=""> In recent years</span><sup class="noprint Inline-Template" data-dcnode-id="2814" style="white-space:nowrap;"><span data-dcnode-id="2820" instrument_node="">[</span><i data-dcnode-id="2816"><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="2818" title="The time period mentioned near this tag is ambiguous. (May 2022)"><span data-dcnode-id="2819" instrument_node="">when?</span></span></a></i><span data-dcnode-id="2815" instrument_node="">]</span></sup><span data-dcnode-id="2813" instrument_node="">, Latin American nations have increasingly turned away from the United States and toward Europe.</span><sup class="reference" data-dcnode-id="2810" id="cite_ref-38"><a data-dcnode-id="2811" href="#cite_note-38"><span data-dcnode-id="2812" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2809" instrument_node="">
</span></p><p data-dcnode-id="2787"><span data-dcnode-id="2807" instrument_node="">Anti-American and Anti-western sentiments are related to the history of American and European political interventions in Latin America. Many people lay sharp criticism on the United States for supporting </span><a data-dcnode-id="2805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="2806" instrument_node="">Cold War</span></a><span data-dcnode-id="2804" instrument_node=""> era </span><a class="mw-redirect" data-dcnode-id="2802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coup" title="Coup"><span data-dcnode-id="2803" instrument_node="">coups</span></a><span data-dcnode-id="2801" instrument_node="">. Most Latin-American countries tend to be more regional, focusing on internal cooperation. Accompanied this is a notable distrust of globalization.</span><sup class="reference" data-dcnode-id="2798" id="cite_ref-39"><a data-dcnode-id="2799" href="#cite_note-39"><span data-dcnode-id="2800" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2797" instrument_node=""> Latin-American organizations like </span><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercosur" title="Mercosur"><span data-dcnode-id="2796" instrument_node="">Mercosur</span></a><span data-dcnode-id="2794" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="2792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Forum_for_the_Progress_and_Development_of_South_America" title="Forum for the Progress and Development of South America"><span data-dcnode-id="2793" instrument_node="">Prosur</span></a><span data-dcnode-id="2791" instrument_node=""> and </span><a data-dcnode-id="2789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_South_American_Nations" title="Union of South American Nations"><span data-dcnode-id="2790" instrument_node="">Unasur</span></a><span data-dcnode-id="2788" instrument_node=""> are strong groups that represent this aspect of Latin-American foreign policy.
</span></p><p data-dcnode-id="2777"><a data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_P._Huntington" title="Samuel P. Huntington"><span data-dcnode-id="2786" instrument_node="">Samuel P. Huntington</span></a><span data-dcnode-id="2784" instrument_node=""> in </span><i data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">The Clash of Civilizations</span></i><span data-dcnode-id="2781" instrument_node=""> classifies Latin-America as a different civilization from </span><a class="mw-redirect" data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_civilization" title="Western civilization"><span data-dcnode-id="2780" instrument_node="">Western civilization</span></a><span data-dcnode-id="2778" instrument_node="">.
</span></p><span data-dcnode-id="2776" instrument_node="">
