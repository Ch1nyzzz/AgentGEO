</span><div class="thumb tright" data-dcnode-id="3297"><div class="thumbinner" data-dcnode-id="3298" style="width:222px;"><a class="image" data-dcnode-id="3307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="3308" data-file-height="2048" data-file-width="3087" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Anti-American_Protests_in_Nanjing%252C_1999_%2528flickr_2543499638%2529.jpg/220px-Anti-American_Protests_in_Nanjing%252C_1999_%2528flickr_2543499638%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Anti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg/330px-Anti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Anti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg/440px-Anti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg 2x" width="220"></a><span data-dcnode-id="3306" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3299"><div class="magnify" data-dcnode-id="3304"><a class="internal" data-dcnode-id="3305" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAnti-American_Protests_in_Nanjing%2C_1999_%28flickr_2543499638%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="3303" instrument_node="">Anti-American protests in Nanjing following the </span><a class="mw-redirect" data-dcnode-id="3301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._bombing_of_the_Chinese_embassy_in_Belgrade" title="U.S. bombing of the Chinese embassy in Belgrade"><span data-dcnode-id="3302" instrument_node="">U.S. bombing of the Chinese embassy in Belgrade</span></a><span data-dcnode-id="3300" instrument_node="">, 1999</span></div></div></div><span data-dcnode-id="3296" instrument_node="">
</span><p data-dcnode-id="3264"><span data-dcnode-id="3295" instrument_node="">There is a history of </span><a data-dcnode-id="3293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Americanism" title="Anti-Americanism"><span data-dcnode-id="3294" instrument_node="">anti-Americanism</span></a><span data-dcnode-id="3292" instrument_node=""> in China, beginning with the general disdain for foreigners in the early 19th century that culminated in the </span><a data-dcnode-id="3290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boxer_Rebellion" title="Boxer Rebellion"><span data-dcnode-id="3291" instrument_node="">Boxer Rebellion</span></a><span data-dcnode-id="3289" instrument_node=""> of 1900, which the </span><a data-dcnode-id="3287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Marine_Corps" title="United States Marine Corps"><span data-dcnode-id="3288" instrument_node="">United States Marine Corps</span></a><span data-dcnode-id="3286" instrument_node=""> participated with other powers in suppressing. The </span><a data-dcnode-id="3284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1905_Chinese_boycott" title="1905 Chinese boycott"><span data-dcnode-id="3285" instrument_node="">1905 Chinese boycott</span></a><span data-dcnode-id="3283" instrument_node=""> of American goods to protest discrimination against the Chinese living in America had a major negative impact on Chinese attitudes. After the Chinese Civil War, the </span><a data-dcnode-id="3281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="3282" instrument_node="">United States</span></a><span data-dcnode-id="3280" instrument_node=""> and </span><a data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="3279" instrument_node="">China</span></a><span data-dcnode-id="3277" instrument_node=""> fought an undeclared war during the </span><a data-dcnode-id="3275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="3276" instrument_node="">Korean War</span></a><span data-dcnode-id="3274" instrument_node="">, in which 148,000 Chinese soldiers died, that left bitter feelings on both sides. Relations warmed up after 1970, but large-scale anti-American sentiments significantly increased since </span><a class="mw-redirect" data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/US" title="US"><span data-dcnode-id="3273" instrument_node="">US</span></a><span data-dcnode-id="3271" instrument_node=""> President </span><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="3270" instrument_node="">Donald Trump</span></a><span data-dcnode-id="3268" instrument_node=""> launched a </span><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_trade_war" title="China–United States trade war"><span data-dcnode-id="3267" instrument_node="">trade war</span></a><span data-dcnode-id="3265" instrument_node=""> against China in the late 2010s.
</span></p><span data-dcnode-id="3263" instrument_node="">

</span><h2 data-dcnode-id="3169"><span class="mw-headline" data-dcnode-id="3177" id="History"><span data-dcnode-id="3178" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="3170"><span class="mw-editsection-bracket" data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">[</span></span><a data-dcnode-id="3173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="3174" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3171"><span data-dcnode-id="3172" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3168" instrument_node="">
</span><h3 data-dcnode-id="3158"><span class="mw-headline" data-dcnode-id="3166" id="1905_boycott"><span data-dcnode-id="3167" instrument_node="">1905 boycott</span></span><span class="mw-editsection" data-dcnode-id="3159"><span class="mw-editsection-bracket" data-dcnode-id="3164"><span data-dcnode-id="3165" instrument_node="">[</span></span><a data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D2" title="Edit section: 1905 boycott"><span data-dcnode-id="3163" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3160"><span data-dcnode-id="3161" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3157" instrument_node="">
</span><p data-dcnode-id="3141"><span data-dcnode-id="3156" instrument_node="">In response to severe restrictions on Chinese immigration to the United States, the overseas Chinese living in the United States organized a boycott whereby people in China refuse to purchase American products. The project was organized by a reform organization based in the United States, Baohuang Hui. Unlike the reactionary Boxers, these reformers were modernizers. The Manchu government had supported the Boxers, but these reformers—of whom Sun Yat-sen was representative, opposed the government. The boycott was put into effect by merchants and students in the south and central China. It made only a small economic impact because China bought few American products apart from Standard Oil's kerosene. Washington was outraged and treated the boycott as a Boxer-like violent attack, and demanded the Peking government stop it or else. President Theodore Roosevelt asked Congress for special funding for a naval expedition. Washington refused to consider softening the exclusion laws because it responded to deep-seated anti-Chinese prejudices that were widespread, especially on the West Coast. It now began to denounce Chinese nationalism.</span><sup class="reference" data-dcnode-id="3153" id="cite_ref-1"><a data-dcnode-id="3154" href="#cite_note-1"><span data-dcnode-id="3155" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3152" instrument_node=""> The impact on the Chinese people, in China and abroad, was far-reaching. Jane Larson argues the boycott, "marked the beginning of mass politics and modern nationalism in China. Never before had shared nationalistic aspirations mobilized Chinese across the world in political action, joining the cause of Chinese migrants with the fate of the Chinese nation."</span><sup class="reference" data-dcnode-id="3149" id="cite_ref-2"><a data-dcnode-id="3150" href="#cite_note-2"><span data-dcnode-id="3151" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="3146" id="cite_ref-3"><a data-dcnode-id="3147" href="#cite_note-3"><span data-dcnode-id="3148" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="3143" id="cite_ref-4"><a data-dcnode-id="3144" href="#cite_note-4"><span data-dcnode-id="3145" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3142" instrument_node="">
</span></p><span data-dcnode-id="3140" instrument_node="">
</span><h3 data-dcnode-id="3130"><span class="mw-headline" data-dcnode-id="3138" id="Cold_War"><span data-dcnode-id="3139" instrument_node="">Cold War</span></span><span class="mw-editsection" data-dcnode-id="3131"><span class="mw-editsection-bracket" data-dcnode-id="3136"><span data-dcnode-id="3137" instrument_node="">[</span></span><a data-dcnode-id="3134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D3" title="Edit section: Cold War"><span data-dcnode-id="3135" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3132"><span data-dcnode-id="3133" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3073"><span data-dcnode-id="3128" instrument_node="">During the </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sino-Japanese_War" title="Second Sino-Japanese War"><span data-dcnode-id="3127" instrument_node="">Second Sino-Japanese War</span></a><span data-dcnode-id="3125" instrument_node=""> and World War II, the U.S. provided economic and military assistance to the </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="3124" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="3122" instrument_node=""> regime against the Japanese invasion. In particular, the "</span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_Hands" title="China Hands"><span data-dcnode-id="3121" instrument_node="">China Hands</span></a><span data-dcnode-id="3119" instrument_node="">" (American diplomats known for their knowledge of China) also attempted to establish diplomatic contacts with </span><a data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="3118" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="3116" instrument_node="">'s communists </span><a data-dcnode-id="3114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dixie_Mission" title="Dixie Mission"><span data-dcnode-id="3115" instrument_node="">in their stronghold in Yan'an</span></a><span data-dcnode-id="3113" instrument_node="">, with a goal of fostering unity between the Nationalists and Communists.</span><sup class="reference" data-dcnode-id="3110" id="cite_ref-5"><a data-dcnode-id="3111" href="#cite_note-5"><span data-dcnode-id="3112" instrument_node="">[5]</span></a></sup><span data-dcnode-id="3109" instrument_node=""> However, relations soured after the communist victory in the </span><a data-dcnode-id="3107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Civil_War" title="Chinese Civil War"><span data-dcnode-id="3108" instrument_node="">Chinese Civil War</span></a><span data-dcnode-id="3106" instrument_node=""> and the relocation of the Chiang regime to </span><a data-dcnode-id="3104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="3105" instrument_node="">Taiwan</span></a><span data-dcnode-id="3103" instrument_node="">, together with the start of the </span><a data-dcnode-id="3101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="3102" instrument_node="">Cold War</span></a><span data-dcnode-id="3100" instrument_node=""> and rise of </span><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/McCarthyism" title="McCarthyism"><span data-dcnode-id="3099" instrument_node="">McCarthyism</span></a><span data-dcnode-id="3097" instrument_node=""> in U.S. politics. While the U.S. initially expected the Chiang regime to quickly fall, China and the U.S. fought a major undeclared </span><a data-dcnode-id="3095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="3096" instrument_node="">war in Korea, 1950–53</span></a><span data-dcnode-id="3094" instrument_node=""> and, as a result, President </span><a data-dcnode-id="3092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harry_S._Truman" title="Harry S. Truman"><span data-dcnode-id="3093" instrument_node="">Harry S. Truman</span></a><span data-dcnode-id="3091" instrument_node=""> began advocating a policy of containment and sent the </span><a data-dcnode-id="3089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Seventh_Fleet" title="United States Seventh Fleet"><span data-dcnode-id="3090" instrument_node="">United States Seventh Fleet</span></a><span data-dcnode-id="3088" instrument_node=""> to deter a possible communist invasion of Taiwan.</span><sup class="reference" data-dcnode-id="3085" id="cite_ref-6"><a data-dcnode-id="3086" href="#cite_note-6"><span data-dcnode-id="3087" instrument_node="">[6]</span></a></sup><span data-dcnode-id="3084" instrument_node=""> The U.S. signed the </span><a data-dcnode-id="3082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-American_Mutual_Defense_Treaty" title="Sino-American Mutual Defense Treaty"><span data-dcnode-id="3083" instrument_node="">Sino-American Mutual Defense Treaty</span></a><span data-dcnode-id="3081" instrument_node=""> with Taiwan which lasted until 1979 and, during this period, the communist government in Beijing was not diplomatically recognized by the U.S. By 1950, virtually all American diplomatic staff had left mainland China, and one of Mao's political goals was to identify and destroy factions inside China that might be favorable to capitalism.</span><sup class="reference" data-dcnode-id="3078" id="cite_ref-7"><a data-dcnode-id="3079" href="#cite_note-7"><span data-dcnode-id="3080" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3075" id="cite_ref-8"><a data-dcnode-id="3076" href="#cite_note-8"><span data-dcnode-id="3077" instrument_node="">[8]</span></a></sup><span data-dcnode-id="3074" instrument_node="">
</span></p><p data-dcnode-id="3037"><span data-dcnode-id="3072" instrument_node="">Mao initially ridiculed the U.S. as "</span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paper_tiger" title="Paper tiger"><span data-dcnode-id="3071" instrument_node="">paper tiger</span></a><span data-dcnode-id="3069" instrument_node="">" occupiers of Taiwan, "the enemy of the people of the world and has increasingly isolated itself" and "monopoly capitalist groups",</span><sup class="reference" data-dcnode-id="3066" id="cite_ref-9"><a data-dcnode-id="3067" href="#cite_note-9"><span data-dcnode-id="3068" instrument_node="">[9]</span></a></sup><span data-dcnode-id="3065" instrument_node=""> and it was argued that Mao never intended friendly relations with the U.S.</span><sup class="reference" data-dcnode-id="3062" id="cite_ref-10"><a data-dcnode-id="3063" href="#cite_note-10"><span data-dcnode-id="3064" instrument_node="">[10]</span></a></sup><span data-dcnode-id="3061" instrument_node=""> However, due to the </span><a data-dcnode-id="3059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_split" title="Sino-Soviet split"><span data-dcnode-id="3060" instrument_node="">Sino-Soviet split</span></a><span data-dcnode-id="3058" instrument_node=""> and increasing tension between China and the Soviet Union, US President </span><a data-dcnode-id="3056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="3057" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="3055" instrument_node=""> signaled a diplomatic re-rapprochement with communist China, and </span><a class="mw-redirect" data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon%2527s_1972_visit_to_China" title="Richard Nixon's 1972 visit to China"><span data-dcnode-id="3054" instrument_node="">embarked on an official visit in 1972</span></a><span data-dcnode-id="3052" instrument_node="">.</span><sup class="reference" data-dcnode-id="3049" id="cite_ref-11"><a data-dcnode-id="3050" href="#cite_note-11"><span data-dcnode-id="3051" instrument_node="">[11]</span></a></sup><span data-dcnode-id="3048" instrument_node=""> Diplomatic relations between the two countries were eventually restored in 1979. After Mao's death, </span><a data-dcnode-id="3046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="3047" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="3045" instrument_node=""> embarked on economic reforms, and hostility diminished sharply, while large-scale trade and investments, as well as cultural exchanges, became major factors. Following the </span><a class="mw-redirect" data-dcnode-id="3043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tiananmen_Square_protests_of_1989" title="Tiananmen Square protests of 1989"><span data-dcnode-id="3044" instrument_node="">Tiananmen Square protests of 1989</span></a><span data-dcnode-id="3042" instrument_node="">, the U.S. placed economic and military sanctions upon China, although official diplomatic relations continued.</span><sup class="reference" data-dcnode-id="3039" id="cite_ref-12"><a data-dcnode-id="3040" href="#cite_note-12"><span data-dcnode-id="3041" instrument_node="">[12]</span></a></sup><span data-dcnode-id="3038" instrument_node="">
</span></p><span data-dcnode-id="3036" instrument_node="">
</span><h3 data-dcnode-id="3026"><span class="mw-headline" data-dcnode-id="3034" id="From_1990"><span data-dcnode-id="3035" instrument_node="">From 1990</span></span><span class="mw-editsection" data-dcnode-id="3027"><span class="mw-editsection-bracket" data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node="">[</span></span><a data-dcnode-id="3030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D4" title="Edit section: From 1990"><span data-dcnode-id="3031" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3028"><span data-dcnode-id="3029" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="2990"><span data-dcnode-id="3024" instrument_node="">Anti-American and Chinese nationalist sentiments surged following the </span><a data-dcnode-id="3022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yinhe_incident" title="Yinhe incident"><span data-dcnode-id="3023" instrument_node="">Yinhe incident</span></a><span data-dcnode-id="3021" instrument_node=""> of 1993, where a Chinese ship was detained by the US Navy in international waters, allegedly containing chemical components headed for Iran, but was eventually cleared after months of inspection.</span><sup class="reference" data-dcnode-id="3018" id="cite_ref-13"><a data-dcnode-id="3019" href="#cite_note-13"><span data-dcnode-id="3020" instrument_node="">[13]</span></a></sup><span data-dcnode-id="3017" instrument_node=""> The </span><a data-dcnode-id="3015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Taiwan_Strait_Crisis" title="Third Taiwan Strait Crisis"><span data-dcnode-id="3016" instrument_node="">Third Taiwan Strait Crisis</span></a><span data-dcnode-id="3014" instrument_node=""> in 1996 has led the Chinese government to be concerned about a supposed </span><a class="mw-redirect" data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_containment_policy" title="China containment policy"><span data-dcnode-id="3013" instrument_node="">China containment policy</span></a><span data-dcnode-id="3011" instrument_node="">, and began viewing the United States as responsible for major issues that arise in the bilateral relationship between China and Taiwan, as the Chinese government believed that American support of Taiwan is an effort to weaken China.</span><sup class="reference" data-dcnode-id="3008" id="cite_ref-14"><a data-dcnode-id="3009" href="#cite_note-14"><span data-dcnode-id="3010" instrument_node="">[14]</span></a></sup><span data-dcnode-id="3007" instrument_node=""> During this time, there was also a sense of disillusionment with the U.S among Chinese intellectuals, and popular books such as </span><a data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_Can_Say_No" title="China Can Say No"><span data-dcnode-id="3006" instrument_node="">China Can Say No</span></a><span data-dcnode-id="3004" instrument_node=""> criticized U.S. foreign policy towards China and promoted grass-roots Chinese nationalism. Relations became severely strained by the </span><a class="mw-redirect" data-dcnode-id="3002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/U.S._bombing_of_the_Chinese_embassy_in_Belgrade" title="U.S. bombing of the Chinese embassy in Belgrade"><span data-dcnode-id="3003" instrument_node="">U.S. bombing of the Chinese embassy in Belgrade</span></a><span data-dcnode-id="3001" instrument_node=""> in May 1999, which was reported by U.S. media as an intelligence error, but cited in several foreign sources and believed by many Chinese to be deliberate.</span><sup class="reference" data-dcnode-id="2998" id="cite_ref-15"><a data-dcnode-id="2999" href="#cite_note-15"><span data-dcnode-id="3000" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="2995" id="cite_ref-16"><a data-dcnode-id="2996" href="#cite_note-16"><span data-dcnode-id="2997" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2994" instrument_node=""> The bombing, alongside the perceived lack of apology from the U.S., led to mass protests in Beijing and other major Chinese cities. In 2001, diplomatic relations were further damaged by the </span><a data-dcnode-id="2992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hainan_Island_incident" title="Hainan Island incident"><span data-dcnode-id="2993" instrument_node="">Hainan Island incident</span></a><span data-dcnode-id="2991" instrument_node="">, where a collision between a U.S. and Chinese aircraft resulted in the death of the Chinese pilot and detention of the 24 American crew.
</span></p><p data-dcnode-id="2964"><span data-dcnode-id="2989" instrument_node="">While the Chinese government officially condemned the </span><a data-dcnode-id="2987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/September_11_attacks" title="September 11 attacks"><span data-dcnode-id="2988" instrument_node="">September 11 attacks</span></a><span data-dcnode-id="2986" instrument_node="">, </span><i data-dcnode-id="2984"><span data-dcnode-id="2985" instrument_node="">The Washington Post</span></i><span data-dcnode-id="2983" instrument_node=""> recorded the mixed reactions among the general public after it had been reported: “While average Chinese routinely approach Americans to offer condolences for Tuesday's terrorist attacks, many others in their offices, schools and Internet chats have voiced satisfaction at what they describe as a well-deserved blow against U.S. arrogance.”</span><sup class="reference" data-dcnode-id="2980" id="cite_ref-17"><a data-dcnode-id="2981" href="#cite_note-17"><span data-dcnode-id="2982" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2979" instrument_node=""> A 2001 </span><a class="mw-redirect" data-dcnode-id="2977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harris_Insights_%2526_Analytics" title="Harris Insights &amp; Analytics"><span data-dcnode-id="2978" instrument_node="">Harris poll</span></a><span data-dcnode-id="2976" instrument_node=""> conducted 2 months afterwards also showed that Beijing respondents were much more likely to disapprove of the U.S. government's military actions against terrorism compared to Japanese, South Korean, and American respondents.</span><sup class="reference" data-dcnode-id="2973" id="cite_ref-18"><a data-dcnode-id="2974" href="#cite_note-18"><span data-dcnode-id="2975" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2972" instrument_node=""> However it was noted that the Chinese discourse primarily revolved around revenge against U.S. state policy instead of hatred for Americans, and a 2002 survey of Chinese netizens in light of 9/11 found that "international cooperation" was among the policies most would favour for fighting terrorism.</span><sup class="reference" data-dcnode-id="2969" id="cite_ref-19"><a data-dcnode-id="2970" href="#cite_note-19"><span data-dcnode-id="2971" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="2966" id="cite_ref-20"><a data-dcnode-id="2967" href="#cite_note-20"><span data-dcnode-id="2968" instrument_node="">[20]</span></a></sup><span data-dcnode-id="2965" instrument_node=""> A Chinese media report on the 2019 anniversary of 9/11 also suggested there to be more restrained rhetoric online in discussing the topic compared to the past.
</span></p><span data-dcnode-id="2963" instrument_node="">
</span><h4 data-dcnode-id="2953"><span class="mw-headline" data-dcnode-id="2961" id="Obama_administration"><span data-dcnode-id="2962" instrument_node="">Obama administration</span></span><span class="mw-editsection" data-dcnode-id="2954"><span class="mw-editsection-bracket" data-dcnode-id="2959"><span data-dcnode-id="2960" instrument_node="">[</span></span><a data-dcnode-id="2957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D5" title="Edit section: Obama administration"><span data-dcnode-id="2958" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2951" instrument_node="">Although the election of US President </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="2950" instrument_node="">Barack Obama</span></a><span data-dcnode-id="2948" instrument_node=""> in 2008 created positive reactions in China</span><sup class="reference" data-dcnode-id="2945" id="cite_ref-21"><a data-dcnode-id="2946" href="#cite_note-21"><span data-dcnode-id="2947" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="2942" id="cite_ref-22"><a data-dcnode-id="2943" href="#cite_note-22"><span data-dcnode-id="2944" instrument_node="">[22]</span></a></sup><sup class="reference" data-dcnode-id="2939" id="cite_ref-23"><a data-dcnode-id="2940" href="#cite_note-23"><span data-dcnode-id="2941" instrument_node="">[23]</span></a></sup><span data-dcnode-id="2938" instrument_node=""> and a temporary increase in favorable views of the U.S,</span><sup class="reference" data-dcnode-id="2935" id="cite_ref-24"><a data-dcnode-id="2936" href="#cite_note-24"><span data-dcnode-id="2937" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2934" instrument_node=""> it also signified a shift in American foreign policy towards the country, as then Secretary of State </span><a data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hillary_Clinton" title="Hillary Clinton"><span data-dcnode-id="2933" instrument_node="">Hillary Clinton</span></a><span data-dcnode-id="2931" instrument_node=""> called for a "Pivot to Asia", or rebalancing of U.S, strategic and economic interests in East Asia, specifically freedom of navigation patrols in the </span><a data-dcnode-id="2929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_China_Sea" title="South China Sea"><span data-dcnode-id="2930" instrument_node="">South China Sea</span></a><span data-dcnode-id="2928" instrument_node="">.</span><sup class="reference" data-dcnode-id="2925" id="cite_ref-25"><a data-dcnode-id="2926" href="#cite_note-25"><span data-dcnode-id="2927" instrument_node="">[25]</span></a></sup><span data-dcnode-id="2924" instrument_node=""> This move was widely seen as attempts to counter Chinese interests in the region, and in response, the Chinese military began their own buildup in the region, such as the creation of its own </span><a data-dcnode-id="2922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_Defense_Identification_Zone_%28East_China_Sea%29" title="Air Defense Identification Zone (East China Sea)"><span data-dcnode-id="2923" instrument_node="">Air Defense Identification Zone</span></a><span data-dcnode-id="2921" instrument_node="">.</span><sup class="reference" data-dcnode-id="2918" id="cite_ref-26"><a data-dcnode-id="2919" href="#cite_note-26"><span data-dcnode-id="2920" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2917" instrument_node=""> Recently, in 2009, Luo Ping, a director-general at the </span><a data-dcnode-id="2915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_Banking_Regulatory_Commission" title="China Banking Regulatory Commission"><span data-dcnode-id="2916" instrument_node="">China Banking Regulatory Commission</span></a><span data-dcnode-id="2914" instrument_node="">, criticized America's laissez-faire capitalism and said that he hated America when the </span><a class="mw-redirect" data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Treasury" title="United States Treasury"><span data-dcnode-id="2913" instrument_node="">United States Treasury</span></a><span data-dcnode-id="2911" instrument_node=""> would start to print money and depreciate the value of the U.S. dollar, thus cheapening the value of China's purchase of U.S. bonds.</span><sup class="reference" data-dcnode-id="2908" id="cite_ref-27"><a data-dcnode-id="2909" href="#cite_note-27"><span data-dcnode-id="2910" instrument_node="">[27]</span></a></sup><span data-dcnode-id="2907" instrument_node=""> Furthermore, China's leaders present their country as an alternative to the meddling power of the West.</span><sup class="reference" data-dcnode-id="2904" id="cite_ref-28"><a data-dcnode-id="2905" href="#cite_note-28"><span data-dcnode-id="2906" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2903" instrument_node=""> In 2013, 53% of the Chinese surveyed had an unfavorable view of the U.S.,</span><sup class="reference" data-dcnode-id="2900" id="cite_ref-pew_29-0"><a data-dcnode-id="2901" href="#cite_note-pew-29"><span data-dcnode-id="2902" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2899" instrument_node=""> which slightly improved in 2016 where 44% of those surveyed had an unfavorable view compared to 50% expressing a favorable one.</span><sup class="reference" data-dcnode-id="2896" id="cite_ref-30"><a data-dcnode-id="2897" href="#cite_note-30"><span data-dcnode-id="2898" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2895" instrument_node="">
</span></p><p data-dcnode-id="2872"><span data-dcnode-id="2893" instrument_node="">A poll of 500,000 Chinese netizens, conducted by Hong Kong's </span><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Phoenix_Television" title="Phoenix Television"><span data-dcnode-id="2892" instrument_node="">Phoenix Television</span></a><span data-dcnode-id="2890" instrument_node=""> in 2011 suggested that 60% of those surveyed agreed </span><a data-dcnode-id="2888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Osama_bin_Laden" title="Osama bin Laden"><span data-dcnode-id="2889" instrument_node="">Osama bin Laden's</span></a><span data-dcnode-id="2887" instrument_node=""> death was a sad event because "he was an anti-US warrior".</span><sup class="reference" data-dcnode-id="2884" id="cite_ref-31"><a data-dcnode-id="2885" href="#cite_note-31"><span data-dcnode-id="2886" instrument_node="">[31]</span></a></sup><sup class="reference" data-dcnode-id="2881" id="cite_ref-32"><a data-dcnode-id="2882" href="#cite_note-32"><span data-dcnode-id="2883" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2880" instrument_node=""> However, another report by </span><a data-dcnode-id="2878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_Radio_International" title="Public Radio International"><span data-dcnode-id="2879" instrument_node="">Public Radio International</span></a><span data-dcnode-id="2877" instrument_node=""> documented more mixed responses on Chinese social media, and noted that most users did not care about his death.</span><sup class="reference" data-dcnode-id="2874" id="cite_ref-33"><a data-dcnode-id="2875" href="#cite_note-33"><span data-dcnode-id="2876" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2873" instrument_node="">
</span></p><p data-dcnode-id="2837"><span data-dcnode-id="2871" instrument_node="">Chinese hackers have also conducted </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cyberwarfare" title="Cyberwarfare"><span data-dcnode-id="2870" instrument_node="">cyberwarfare</span></a><span data-dcnode-id="2868" instrument_node=""> against American institutions.</span><sup class="reference" data-dcnode-id="2865" id="cite_ref-34"><a data-dcnode-id="2866" href="#cite_note-34"><span data-dcnode-id="2867" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="2862" id="cite_ref-35"><a data-dcnode-id="2863" href="#cite_note-35"><span data-dcnode-id="2864" instrument_node="">[35]</span></a></sup><sup class="reference" data-dcnode-id="2859" id="cite_ref-nyt_36-0"><a data-dcnode-id="2860" href="#cite_note-nyt-36"><span data-dcnode-id="2861" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="2856" id="cite_ref-reuters1_37-0"><a data-dcnode-id="2857" href="#cite_note-reuters1-37"><span data-dcnode-id="2858" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="2853" id="cite_ref-38"><a data-dcnode-id="2854" href="#cite_note-38"><span data-dcnode-id="2855" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2852" instrument_node=""> </span><i data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Quartz</span></i><span data-dcnode-id="2849" instrument_node=""> suggested that certain Hollywood films such as </span><i data-dcnode-id="2846"><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Django_Unchained" title="Django Unchained"><span data-dcnode-id="2848" instrument_node="">Django Unchained</span></a></i><span data-dcnode-id="2845" instrument_node=""> were allowed to slip past China's </span><a data-dcnode-id="2843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Film_censorship_in_China" title="Film censorship in China"><span data-dcnode-id="2844" instrument_node="">film censorship</span></a><span data-dcnode-id="2842" instrument_node="">, because they depicted a negative view of American society. It alleges that the film "depicts one of America's darker periods, when slavery was legal, which Chinese officials like to use to push back against criticism from the United States".</span><sup class="reference" data-dcnode-id="2839" id="cite_ref-39"><a data-dcnode-id="2840" href="#cite_note-39"><span data-dcnode-id="2841" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2838" instrument_node="">
</span></p><span data-dcnode-id="2836" instrument_node="">
</span><h4 data-dcnode-id="2826"><span class="mw-headline" data-dcnode-id="2834" id="Trump_administration"><span data-dcnode-id="2835" instrument_node="">Trump administration</span></span><span class="mw-editsection" data-dcnode-id="2827"><span class="mw-editsection-bracket" data-dcnode-id="2832"><span data-dcnode-id="2833" instrument_node="">[</span></span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-American_sentiment_in_mainland_China%26action%3Dedit%26section%3D6" title="Edit section: Trump administration"><span data-dcnode-id="2831" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2799"><span data-dcnode-id="2824" instrument_node="">There has been a significant increase in anti-US sentiment since American President </span><a data-dcnode-id="2822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Donald_Trump" title="Donald Trump"><span data-dcnode-id="2823" instrument_node="">Donald Trump</span></a><span data-dcnode-id="2821" instrument_node=""> launched a </span><a data-dcnode-id="2819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_trade_war" title="China–United States trade war"><span data-dcnode-id="2820" instrument_node="">trade war</span></a><span data-dcnode-id="2818" instrument_node=""> against China, with Chinese media airing </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="2817" instrument_node="">Korean War</span></a><span data-dcnode-id="2815" instrument_node=""> films.</span><sup class="reference" data-dcnode-id="2812" id="cite_ref-:0_40-0"><a data-dcnode-id="2813" href="#cite_note-:0-40"><span data-dcnode-id="2814" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="2809" id="cite_ref-41"><a data-dcnode-id="2810" href="#cite_note-41"><span data-dcnode-id="2811" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2808" instrument_node=""> In May 2019, </span><i data-dcnode-id="2805"><a data-dcnode-id="2806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Global_Times" title="Global Times"><span data-dcnode-id="2807" instrument_node="">Global Times</span></a></i><span data-dcnode-id="2804" instrument_node=""> has said that "the trade war with the U.S. at the moment reminds Chinese of military struggles between China and the U.S. during the Korean War."</span><sup class="reference" data-dcnode-id="2801" id="cite_ref-:0_40-1"><a data-dcnode-id="2802" href="#cite_note-:0-40"><span data-dcnode-id="2803" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2800" instrument_node="">
</span></p><p data-dcnode-id="2784"><span data-dcnode-id="2798" instrument_node="">According to </span><a data-dcnode-id="2796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SET_News" title="SET News"><span data-dcnode-id="2797" instrument_node="">SET News</span></a><span data-dcnode-id="2795" instrument_node="">, a minority of Chinese online believe that the </span><a data-dcnode-id="2793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="2794" instrument_node="">coronavirus outbreak in Wuhan</span></a><span data-dcnode-id="2792" instrument_node=""> is a </span><a data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_bioweapon" title="Ethnic bioweapon"><span data-dcnode-id="2791" instrument_node="">genetic bio-attack</span></a><span data-dcnode-id="2789" instrument_node=""> executed by United States.</span><sup class="reference" data-dcnode-id="2786" id="cite_ref-42"><a data-dcnode-id="2787" href="#cite_note-42"><span data-dcnode-id="2788" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2785" instrument_node="">
</span></p><span data-dcnode-id="2783" instrument_node="">
