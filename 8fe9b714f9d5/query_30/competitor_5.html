</span><p data-dcnode-id="2808"><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Voltaire" title="Voltaire"><span data-dcnode-id="2828" instrument_node="">Voltaire</span></a><span data-dcnode-id="2826" instrument_node=""> reputedly joked that Canada was "</span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A_few_acres_of_snow" title="A few acres of snow"><span data-dcnode-id="2825" instrument_node="">a few acres of snow</span></a><span data-dcnode-id="2823" instrument_node="">."</span><sup class="reference" data-dcnode-id="2820" id="cite_ref-1"><a data-dcnode-id="2821" href="#cite_note-1"><span data-dcnode-id="2822" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2819" instrument_node=""> He was in fact referring to </span><a data-dcnode-id="2817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_France" title="New France"><span data-dcnode-id="2818" instrument_node="">New France</span></a><span data-dcnode-id="2816" instrument_node=""> as it existed in the 18th century. The quote meant that New France was economically worthless and that </span><a data-dcnode-id="2814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="2815" instrument_node="">France</span></a><span data-dcnode-id="2813" instrument_node=""> thus did not need to keep it. Many Canadians believe Voltaire's statement to be more an indictment of conquest in general.</span><sup class="reference" data-dcnode-id="2810" id="cite_ref-2"><a data-dcnode-id="2811" href="#cite_note-2"><span data-dcnode-id="2812" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2809" instrument_node="">
</span></p><span data-dcnode-id="2807" instrument_node="">

</span><h3 data-dcnode-id="2150"><span class="mw-headline" data-dcnode-id="2158" id="United_States"><span data-dcnode-id="2159" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="2151"><span class="mw-editsection-bracket" data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">[</span></span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D3" title="Edit section: United States"><span data-dcnode-id="2155" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2149" instrument_node="">
</span><link data-dcnode-id="2148" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="2144" role="note"><span data-dcnode-id="2147" instrument_node="">See also: </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada%25E2%2580%2593United_States_relations" title="Canada–United States relations"><span data-dcnode-id="2146" instrument_node="">Canada–United States relations</span></a></div><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2129"><span data-dcnode-id="2142" instrument_node="">In the </span><a data-dcnode-id="2140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="2141" instrument_node="">United States</span></a><span data-dcnode-id="2139" instrument_node="">, Canada is often a target of </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservatism" title="Conservatism"><span data-dcnode-id="2138" instrument_node="">conservative</span></a><span data-dcnode-id="2136" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right-wing" title="Right-wing"><span data-dcnode-id="2135" instrument_node="">right-wing</span></a><span data-dcnode-id="2133" instrument_node=""> commentators who hold the nation up as an example of what a government and society that are too </span><a data-dcnode-id="2131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modern_liberalism_in_the_United_States" title="Modern liberalism in the United States"><span data-dcnode-id="2132" instrument_node="">liberal</span></a><span data-dcnode-id="2130" instrument_node=""> would look like.
</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2128" instrument_node="">"</span><b data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Soviet Canuckistan</span></b><span data-dcnode-id="2125" instrument_node="">" (full name being The People's Republic of Soviet Canuckistan) is an </span><a data-dcnode-id="2123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epithet" title="Epithet"><span data-dcnode-id="2124" instrument_node="">epithet</span></a><span data-dcnode-id="2122" instrument_node=""> for Canada, used by </span><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pat_Buchanan" title="Pat Buchanan"><span data-dcnode-id="2121" instrument_node="">Pat Buchanan</span></a><span data-dcnode-id="2119" instrument_node=""> on October 31, 2002, on his </span><a data-dcnode-id="2117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Television" title="Television"><span data-dcnode-id="2118" instrument_node="">television</span></a><span data-dcnode-id="2116" instrument_node=""> show on </span><a data-dcnode-id="2114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MSNBC" title="MSNBC"><span data-dcnode-id="2115" instrument_node="">MSNBC</span></a><span data-dcnode-id="2113" instrument_node=""> in which he denounced Canadians as </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Americanism" title="Anti-Americanism"><span data-dcnode-id="2112" instrument_node="">anti-American</span></a><span data-dcnode-id="2110" instrument_node=""> and the country as a haven for </span><a data-dcnode-id="2108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Terrorism" title="Terrorism"><span data-dcnode-id="2109" instrument_node="">terrorists</span></a><span data-dcnode-id="2107" instrument_node="">. He was reacting to Canadian criticisms of US security measures regarding </span><a data-dcnode-id="2105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Canadians" title="Arab Canadians"><span data-dcnode-id="2106" instrument_node="">Arab Canadians</span></a><span data-dcnode-id="2104" instrument_node="">.</span><sup class="reference" data-dcnode-id="2101" id="cite_ref-4"><a data-dcnode-id="2102" href="#cite_note-4"><span data-dcnode-id="2103" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2100" instrument_node="">
</span></p><p data-dcnode-id="2086"><span data-dcnode-id="2098" instrument_node="">Buchanan has a history of unflattering references to Canada, having said in 1990 that if Canada were to break apart due to the failure of the </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meech_Lake_Accord" title="Meech Lake Accord"><span data-dcnode-id="2097" instrument_node="">Meech Lake Accord</span></a><span data-dcnode-id="2095" instrument_node="">, "America would pick up the pieces."</span><sup class="reference" data-dcnode-id="2092" id="cite_ref-5"><a data-dcnode-id="2093" href="#cite_note-5"><span data-dcnode-id="2094" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2091" instrument_node=""> He said two years after that "for most Americans, Canada is sort of like a case of latent arthritis. We really don't think about it, unless it acts up."</span><sup class="reference" data-dcnode-id="2088" id="cite_ref-6"><a data-dcnode-id="2089" href="#cite_note-6"><span data-dcnode-id="2090" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2087" instrument_node="">
</span></p><p data-dcnode-id="2065"><span data-dcnode-id="2085" instrument_node="">In 2005, the year in which Canada refused to participate in an American </span><a class="mw-redirect" data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballistic_Missile_Defense" title="Ballistic Missile Defense"><span data-dcnode-id="2084" instrument_node="">ballistic missile defense</span></a><span data-dcnode-id="2082" instrument_node=""> system and in which </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Martin" title="Paul Martin"><span data-dcnode-id="2081" instrument_node="">Paul Martin</span></a><span data-dcnode-id="2079" instrument_node=""> denounced American environmental policies, a new wave of "anti-Canadian" sentiment was reported. Media articles portraying Canada in a negative fashion increased substantially, appearing in newspapers such as the </span><a class="mw-redirect" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weekly_Standard" title="Weekly Standard"><span data-dcnode-id="2078" instrument_node="">Weekly Standard</span></a><span data-dcnode-id="2076" instrument_node="">, </span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_New_York_Times" title="The New York Times"><span data-dcnode-id="2075" instrument_node="">The New York Times</span></a><span data-dcnode-id="2073" instrument_node="">, and the </span><a class="mw-redirect" data-dcnode-id="2071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wall_Street_Journal" title="Wall Street Journal"><span data-dcnode-id="2072" instrument_node="">Wall Street Journal</span></a><span data-dcnode-id="2070" instrument_node="">.</span><sup class="reference" data-dcnode-id="2067" id="cite_ref-:0_7-0"><a data-dcnode-id="2068" href="#cite_note-:0-7"><span data-dcnode-id="2069" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2066" instrument_node="">
</span></p><p data-dcnode-id="2057"><span data-dcnode-id="2064" instrument_node="">
In a December 2005 interview, </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tucker_Carlson" title="Tucker Carlson"><span data-dcnode-id="2063" instrument_node="">Tucker Carlson</span></a><span data-dcnode-id="2061" instrument_node=""> remarked on </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/MSNBC" title="MSNBC"><span data-dcnode-id="2060" instrument_node="">MSNBC</span></a><span data-dcnode-id="2058" instrument_node=""> that:</span></p><blockquote data-dcnode-id="2051"><p data-dcnode-id="2052"><span data-dcnode-id="2056" instrument_node="">First of all, anybody with any ambition at all, or intelligence, has left Canada and is now living in New York. Second, anybody who sides with Canada internationally in a debate between the U.S. and Canada, say, Belgium, is somebody whose opinion we shouldn't care about in the first place. Third, Canada is a sweet country. It is like your retarded cousin you see at Thanksgiving and sort of pat him on the head. You know, he's nice, but you don't take him seriously. That's Canada.</span><sup class="reference" data-dcnode-id="2053" id="cite_ref-:0_7-1"><a data-dcnode-id="2054" href="#cite_note-:0-7"><span data-dcnode-id="2055" instrument_node="">[7]</span></a></sup></p></blockquote><span data-dcnode-id="2050" instrument_node="">
</span><h3 data-dcnode-id="2040"><span class="mw-headline" data-dcnode-id="2048" id="Saudi_Arabia"><span data-dcnode-id="2049" instrument_node="">Saudi Arabia</span></span><span class="mw-editsection" data-dcnode-id="2041"><span class="mw-editsection-bracket" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">[</span></span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D4" title="Edit section: Saudi Arabia"><span data-dcnode-id="2045" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="2038" instrument_node="">Amid a diplomatic row between </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saudi_Arabia" title="Saudi Arabia"><span data-dcnode-id="2037" instrument_node="">Saudi Arabia</span></a><span data-dcnode-id="2035" instrument_node=""> and Canada,</span><sup class="noprint Inline-Template" data-dcnode-id="2028" style="white-space:nowrap;"><span data-dcnode-id="2034" instrument_node="">[</span><i data-dcnode-id="2030"><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers%23Chronological_items" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="2032" title="The time period mentioned near this tag is ambiguous. (December 2018)"><span data-dcnode-id="2033" instrument_node="">when?</span></span></a></i><span data-dcnode-id="2029" instrument_node="">]</span></sup><span data-dcnode-id="2027" instrument_node=""> there has been an apparent smear-campaign targeting Canada in </span><a class="mw-redirect" data-dcnode-id="2025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_of_Saudi_Arabia" title="Media of Saudi Arabia"><span data-dcnode-id="2026" instrument_node="">Saudi media</span></a><span data-dcnode-id="2024" instrument_node="">. An </span><a data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al_Arabiya" title="Al Arabiya"><span data-dcnode-id="2023" instrument_node="">al-Arabiya</span></a><span data-dcnode-id="2021" instrument_node=""> segment accused Canada of human rights abuses.</span><sup class="reference" data-dcnode-id="2018" id="cite_ref-8"><a data-dcnode-id="2019" href="#cite_note-8"><span data-dcnode-id="2020" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2017" instrument_node="">
(Saudi-owned al Arabiya broadcasts from Dubai.)
On August 6, 2018, a pro-government youth group uploaded a controversial photo which depicted an </span><a data-dcnode-id="2015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_Canada" title="Air Canada"><span data-dcnode-id="2016" instrument_node="">Air Canada</span></a><span data-dcnode-id="2014" instrument_node=""> airliner heading towards the </span><a data-dcnode-id="2012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CN_Tower" title="CN Tower"><span data-dcnode-id="2013" instrument_node="">CN Tower</span></a><span data-dcnode-id="2011" instrument_node=""> with the words "sticking ones nose where it doesn't belong". The account later deleted the Twitter post and apologized and the </span><a data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Media_%28Saudi_Arabia%29" title="Ministry of Media (Saudi Arabia)"><span data-dcnode-id="2010" instrument_node="">Ministry of Media</span></a><span data-dcnode-id="2008" instrument_node=""> of Saudi Arabia ordered the account @Infographic_KSA to shut down "until investigations are completed."</span><sup class="reference" data-dcnode-id="2005" id="cite_ref-9"><a data-dcnode-id="2006" href="#cite_note-9"><span data-dcnode-id="2007" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2002" id="cite_ref-10"><a data-dcnode-id="2003" href="#cite_note-10"><span data-dcnode-id="2004" instrument_node="">[10]</span></a></sup><sup class="reference" data-dcnode-id="1999" id="cite_ref-11"><a data-dcnode-id="2000" href="#cite_note-11"><span data-dcnode-id="2001" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1998" instrument_node="">
</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h3 data-dcnode-id="1986"><span class="mw-headline" data-dcnode-id="1994" id="Islamic_State"><span data-dcnode-id="1995" instrument_node="">Islamic State</span></span><span class="mw-editsection" data-dcnode-id="1987"><span class="mw-editsection-bracket" data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">[</span></span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D5" title="Edit section: Islamic State"><span data-dcnode-id="1991" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">]</span></span></span></h3><p data-dcnode-id="1965"><span data-dcnode-id="1985" instrument_node="">
The </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Islamic_State" title="Islamic State"><span data-dcnode-id="1984" instrument_node="">Islamic State's</span></a><span data-dcnode-id="1982" instrument_node=""> former spokesman, </span><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abu_Mohammad_al-Adnani" title="Abu Mohammad al-Adnani"><span data-dcnode-id="1981" instrument_node="">Abu Mohammad al-Adnani</span></a><span data-dcnode-id="1979" instrument_node="">, has called for loyalists to the organization worldwide to murder the "Disbelievers" from those countries that took part in the </span><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_military_intervention_against_the_Islamic_State" title="International military intervention against the Islamic State"><span data-dcnode-id="1978" instrument_node="">International Action against ISIL</span></a><span data-dcnode-id="1976" instrument_node="">, including Canada (which he singled out three times),</span><sup class="reference" data-dcnode-id="1973" id="cite_ref-12"><a data-dcnode-id="1974" href="#cite_note-12"><span data-dcnode-id="1975" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1972" instrument_node=""> which was responsible for </span><a data-dcnode-id="1970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Impact" title="Operation Impact"><span data-dcnode-id="1971" instrument_node="">Operation Impact</span></a><span data-dcnode-id="1969" instrument_node="">.</span><sup class="reference" data-dcnode-id="1966" id="cite_ref-13"><a data-dcnode-id="1967" href="#cite_note-13"><span data-dcnode-id="1968" instrument_node="">[13]</span></a></sup></p><blockquote data-dcnode-id="1954"><p data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">“If you kill a disbelieving American or European – especially the spiteful and filthy French – or an Australian, or a Canadian, or any other disbeliever from the disbelievers waging war, including the citizens of the countries that entered into a coalition against the Islamic State, then rely upon Allah, and kill him I any manner or way however it may be,”
</span></p><p data-dcnode-id="1960"><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">
</span></p><p data-dcnode-id="1955"><span data-dcnode-id="1959" instrument_node="">
-Abu Mohammad al-Adnani</span><sup class="reference" data-dcnode-id="1956" id="cite_ref-14"><a data-dcnode-id="1957" href="#cite_note-14"><span data-dcnode-id="1958" instrument_node="">[14]</span></a></sup></p></blockquote><span data-dcnode-id="1953" instrument_node="">
</span><h3 data-dcnode-id="1943"><span class="mw-headline" data-dcnode-id="1951" id="Brazil"><span data-dcnode-id="1952" instrument_node="">Brazil</span></span><span class="mw-editsection" data-dcnode-id="1944"><span class="mw-editsection-bracket" data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">[</span></span><a data-dcnode-id="1947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D6" title="Edit section: Brazil"><span data-dcnode-id="1948" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1942" instrument_node="">
</span><link data-dcnode-id="1941" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1937" role="note"><span data-dcnode-id="1940" instrument_node="">See also: </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil%25E2%2580%2593Canada_relations" title="Brazil–Canada relations"><span data-dcnode-id="1939" instrument_node="">Brazil–Canada relations</span></a></div><span data-dcnode-id="1936" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1935" instrument_node="">Anti-Canadian sentiment has been observed in </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="1934" instrument_node="">Brazil</span></a><span data-dcnode-id="1932" instrument_node="">. People boycotted Canadian goods to protest a Canadian ban of Brazilian beef imports, reportedly because of fears of </span><a class="mw-redirect" data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mad-cow_disease" title="Mad-cow disease"><span data-dcnode-id="1931" instrument_node="">mad-cow disease</span></a><span data-dcnode-id="1929" instrument_node="">.</span><sup class="reference" data-dcnode-id="1926" id="cite_ref-15"><a data-dcnode-id="1927" href="#cite_note-15"><span data-dcnode-id="1928" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1925" instrument_node=""> A few Brazilians believed the Canadian ban was motivated by a trade dispute between the two nations. Canada's subsidies to aircraft manufacturer </span><a class="mw-redirect" data-dcnode-id="1923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bombardier_Aerospace" title="Bombardier Aerospace"><span data-dcnode-id="1924" instrument_node="">Bombardier</span></a><span data-dcnode-id="1922" instrument_node=""> and Brazil's subsidies to Bombardier's Brazilian rival </span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embraer" title="Embraer"><span data-dcnode-id="1921" instrument_node="">Embraer</span></a><span data-dcnode-id="1919" instrument_node=""> have been a source of much tension because they are said to interfere with each other's business.</span><sup class="reference" data-dcnode-id="1916" id="cite_ref-16"><a data-dcnode-id="1917" href="#cite_note-16"><span data-dcnode-id="1918" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1915" instrument_node="">
</span></p><span data-dcnode-id="1913" instrument_node="">
</span><h3 data-dcnode-id="1903"><span class="mw-headline" data-dcnode-id="1911" id="Canada"><span data-dcnode-id="1912" instrument_node="">Canada</span></span><span class="mw-editsection" data-dcnode-id="1904"><span class="mw-editsection-bracket" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">[</span></span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D7" title="Edit section: Canada"><span data-dcnode-id="1908" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1901" instrument_node="">Some hostility towards or criticism of Canada as a nation can be seen within Canada itself, most prominently by </span><a class="mw-redirect" data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quebec_nationalists" title="Quebec nationalists"><span data-dcnode-id="1900" instrument_node="">Quebec nationalists</span></a><span data-dcnode-id="1898" instrument_node=""> and First Nations. Some First Nations refuse to celebrate Canada day.
</span></p><span data-dcnode-id="1896" instrument_node="">
</span><h4 data-dcnode-id="1886"><span class="mw-headline" data-dcnode-id="1894" id="Quebec"><span data-dcnode-id="1895" instrument_node="">Quebec</span></span><span class="mw-editsection" data-dcnode-id="1887"><span class="mw-editsection-bracket" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">[</span></span><a data-dcnode-id="1890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D8" title="Edit section: Quebec"><span data-dcnode-id="1891" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1884" instrument_node="">Anti-Canadianism in the </span><a class="mw-redirect" data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francophone" title="Francophone"><span data-dcnode-id="1883" instrument_node="">Francophone</span></a><span data-dcnode-id="1881" instrument_node=""> province of </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quebec" title="Quebec"><span data-dcnode-id="1880" instrument_node="">Quebec</span></a><span data-dcnode-id="1878" instrument_node=""> has its roots originally stemming from the resentment since the </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_and_Indian_War" title="French and Indian War"><span data-dcnode-id="1877" instrument_node="">conquest</span></a><span data-dcnode-id="1875" instrument_node=""> of </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_France" title="New France"><span data-dcnode-id="1874" instrument_node="">New France</span></a><span data-dcnode-id="1872" instrument_node=""> by </span><a data-dcnode-id="1870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Great_Britain" title="Kingdom of Great Britain"><span data-dcnode-id="1871" instrument_node="">Great Britain</span></a><span data-dcnode-id="1869" instrument_node=""> in 1760, even before the official existence as entities of Canada and Quebec themselves. However, after the </span><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Constitution_Act%2C_1867" title="Constitution Act, 1867"><span data-dcnode-id="1868" instrument_node="">Constitution Act, 1867</span></a><span data-dcnode-id="1866" instrument_node="">, which officially made Canada a country on July 1, 1867, with four provinces: Ontario, Quebec, Nova Scotia, and New Brunswick, which marked the separate existence and de facto independence and de jure evolutionary independence of Canada, these sentiments developed into Anti-Canadianism. Anti-Canadianism is sometimes intertwined with </span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quebec_nationalism" title="Quebec nationalism"><span data-dcnode-id="1865" instrument_node="">Quebec nationalism</span></a><span data-dcnode-id="1863" instrument_node="">.
</span></p><p data-dcnode-id="1828"><span data-dcnode-id="1861" instrument_node="">From the invasion of New France in the 1760s and the formation of Canada in 1867 until the </span><a data-dcnode-id="1859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quiet_Revolution" title="Quiet Revolution"><span data-dcnode-id="1860" instrument_node="">Quiet Revolution</span></a><span data-dcnode-id="1858" instrument_node=""> of the 1960s, the </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy_of_Quebec" title="Economy of Quebec"><span data-dcnode-id="1857" instrument_node="">economy of Quebec</span></a><span data-dcnode-id="1855" instrument_node=""> and its high-ranking positions were controlled by the </span><a class="mw-redirect" data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Quebecer" title="Anglo-Quebecer"><span data-dcnode-id="1854" instrument_node="">English speaking minority in Quebec</span></a><span data-dcnode-id="1852" instrument_node="">, who were always a small minority comprising less than 10% throughout Quebec's post–Royal French Canadian history and who used to be mostly </span><a class="mw-redirect" data-dcnode-id="1850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unilingual" title="Unilingual"><span data-dcnode-id="1851" instrument_node="">unilingual</span></a><span data-dcnode-id="1849" instrument_node=""> English speakers, despite the Francophone </span><a class="mw-redirect" data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French-speaking_Quebecer" title="French-speaking Quebecer"><span data-dcnode-id="1848" instrument_node="">Québécois</span></a><span data-dcnode-id="1846" instrument_node="">' comprising more than 80% of the province's population.  This led nationalist thinkers to denounce a </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Colonialism" title="Colonialism"><span data-dcnode-id="1845" instrument_node="">colonial</span></a><span data-dcnode-id="1843" instrument_node=""> phenomenon that, as they believed, was at work between Quebec and the rest of Canada; some hold that residuals of this are still there in the present relationship.  Journalist </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Normand_Lester" title="Normand Lester"><span data-dcnode-id="1842" instrument_node="">Normand Lester</span></a><span data-dcnode-id="1840" instrument_node=""> published three volumes of </span><i data-dcnode-id="1837"><a class="mw-redirect" data-dcnode-id="1838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Black_Book_of_English_Canada" title="The Black Book of English Canada"><span data-dcnode-id="1839" instrument_node="">The Black Book of English Canada</span></a></i><span data-dcnode-id="1836" instrument_node=""> detailing events of </span><a class="mw-redirect" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_history" title="Canadian history"><span data-dcnode-id="1835" instrument_node="">Canadian history</span></a><span data-dcnode-id="1833" instrument_node=""> he saw as being crimes perpetrated by the majority on the minority.</span><sup class="reference" data-dcnode-id="1830" id="cite_ref-17"><a data-dcnode-id="1831" href="#cite_note-17"><span data-dcnode-id="1832" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1829" instrument_node="">
</span></p><p data-dcnode-id="1816"><span data-dcnode-id="1827" instrument_node="">Quebec, whose sole official language is </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_language" title="French language"><span data-dcnode-id="1826" instrument_node="">French</span></a><span data-dcnode-id="1824" instrument_node=""> since 1974, has introduced and implemented laws since the 1970s, especially with the adoption of the comprehensive </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Charter_of_the_French_Language" title="Charter of the French Language"><span data-dcnode-id="1823" instrument_node="">Charter of the French Language</span></a><span data-dcnode-id="1821" instrument_node=""> Law in 1977 that limits the visibility of English on non-official signs. Commercial signs in languages other than French (especially targeting those in English) have been permitted only if French is given marked prominence in size. This law has been the subject of periodic controversy since its inception. While the architects and advocates of the Charter of the French Language Law argue that it was adopted to promote and protect the French language, critics argue that it is anti-English Canadian in its purpose by rooting out the English language from all spheres in Quebec.</span><sup class="reference" data-dcnode-id="1818" id="cite_ref-18"><a data-dcnode-id="1819" href="#cite_note-18"><span data-dcnode-id="1820" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1817" instrument_node="">
</span></p><p data-dcnode-id="1810"><span data-dcnode-id="1815" instrument_node="">One of the charter's articles stipulates that all children under 16 must receive their primary and secondary education in French schools, unless one of the child's parents has received most of their education in English, in Canada, or the child themselves has already received a substantial part of their education in English, in Canada. Access to elementary and secondary English language schools by non-anglophone immigrants have also been limited with this law.</span><sup class="reference" data-dcnode-id="1812" id="cite_ref-19"><a data-dcnode-id="1813" href="#cite_note-19"><span data-dcnode-id="1814" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1811" instrument_node="">
</span></p><p data-dcnode-id="1802"><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lucien_Bouchard" title="Lucien Bouchard"><span data-dcnode-id="1809" instrument_node="">Lucien Bouchard</span></a><span data-dcnode-id="1807" instrument_node=""> said that Canada wasn't a "real country", sparking outrage across Canada. He later apologized for the remark.</span><sup class="reference" data-dcnode-id="1804" id="cite_ref-20"><a data-dcnode-id="1805" href="#cite_note-20"><span data-dcnode-id="1806" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1803" instrument_node="">
</span></p><span data-dcnode-id="1801" instrument_node="">
</span><h4 data-dcnode-id="1791"><span class="mw-headline" data-dcnode-id="1799" id="Newfoundland"><span data-dcnode-id="1800" instrument_node="">Newfoundland</span></span><span class="mw-editsection" data-dcnode-id="1792"><span class="mw-editsection-bracket" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">[</span></span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D9" title="Edit section: Newfoundland"><span data-dcnode-id="1796" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1789" instrument_node="">Many in </span><a data-dcnode-id="1787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfoundland_and_Labrador" title="Newfoundland and Labrador"><span data-dcnode-id="1788" instrument_node="">Newfoundland</span></a><span data-dcnode-id="1786" instrument_node=""> harbour an ambivalent attitude towards Canada. Many blame the federation for economic difficulties experienced since the dominion joined confederation in 1949. Some Newfoundlanders perceive a disrespectful attitude toward them from the rest of Canada, and </span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Newfie" title="Newfie"><span data-dcnode-id="1785" instrument_node="">Newfie</span></a><span data-dcnode-id="1783" instrument_node=""> stereotypes and </span><a class="mw-redirect" data-dcnode-id="1781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_jokes" title="Ethnic jokes"><span data-dcnode-id="1782" instrument_node="">ethnic jokes</span></a><span data-dcnode-id="1780" instrument_node=""> that depict Newfoundlanders as stupid or lazy are a source of ire. Former Newfoundland premier </span><a data-dcnode-id="1778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Danny_Williams_%28Canadian_politician%29" title="Danny Williams (Canadian politician)"><span data-dcnode-id="1779" instrument_node="">Danny Williams</span></a><span data-dcnode-id="1777" instrument_node=""> notably ordered all Canadian flags removed from provincial buildings during a dispute with the federal government in 2004.</span><sup class="reference" data-dcnode-id="1774" id="cite_ref-21"><a data-dcnode-id="1775" href="#cite_note-21"><span data-dcnode-id="1776" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1773" instrument_node=""> Williams was, and remains, personally popular in Newfoundland, at times receiving as much as 85% support in polls.</span><sup class="reference" data-dcnode-id="1770" id="cite_ref-22"><a data-dcnode-id="1771" href="#cite_note-22"><span data-dcnode-id="1772" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1769" instrument_node="">
</span></p><span data-dcnode-id="1767" instrument_node="">
</span><h4 data-dcnode-id="1757"><span class="mw-headline" data-dcnode-id="1765" id="Political_accusations"><span data-dcnode-id="1766" instrument_node="">Political accusations</span></span><span class="mw-editsection" data-dcnode-id="1758"><span class="mw-editsection-bracket" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">[</span></span><a data-dcnode-id="1761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D10" title="Edit section: Political accusations"><span data-dcnode-id="1762" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1755" instrument_node="">Sometimes Canadians accuse each other of being anti-Canadian:  For example, </span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manitoba" title="Manitoba"><span data-dcnode-id="1754" instrument_node="">Manitoba</span></a><span data-dcnode-id="1752" instrument_node=""> </span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_Manitoba" title="Premier of Manitoba"><span data-dcnode-id="1751" instrument_node="">Premier</span></a><span data-dcnode-id="1749" instrument_node=""> </span><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gary_Doer" title="Gary Doer"><span data-dcnode-id="1748" instrument_node="">Gary Doer</span></a><span data-dcnode-id="1746" instrument_node=""> (</span><a class="mw-redirect" data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Democratic_Party_of_Canada" title="New Democratic Party of Canada"><span data-dcnode-id="1745" instrument_node="">NDP</span></a><span data-dcnode-id="1743" instrument_node="">) accused the governments of </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario" title="Ontario"><span data-dcnode-id="1742" instrument_node="">Ontario</span></a><span data-dcnode-id="1740" instrument_node=""> and </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberta" title="Alberta"><span data-dcnode-id="1739" instrument_node="">Alberta</span></a><span data-dcnode-id="1737" instrument_node=""> of being "anti-Canadian" due to their dislike for </span><a class="mw-redirect" data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Equalization_payment" title="Equalization payment"><span data-dcnode-id="1736" instrument_node="">equalization payments</span></a><span data-dcnode-id="1734" instrument_node="">.</span><sup class="reference" data-dcnode-id="1731" id="cite_ref-23"><a data-dcnode-id="1732" href="#cite_note-23"><span data-dcnode-id="1733" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1730" instrument_node="">
</span></p><span data-dcnode-id="1728" instrument_node="">
</span><h5 data-dcnode-id="1718"><span class="mw-headline" data-dcnode-id="1726" id="From_the_political_right"><span data-dcnode-id="1727" instrument_node="">From the political right</span></span><span class="mw-editsection" data-dcnode-id="1719"><span class="mw-editsection-bracket" data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">[</span></span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D11" title="Edit section: From the political right"><span data-dcnode-id="1723" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">]</span></span></span></h5><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1716" instrument_node="">Some anti-Canadian criticism from a few in the right of the political spectrum is coupled with proposals that the province of </span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberta" title="Alberta"><span data-dcnode-id="1715" instrument_node="">Alberta</span></a><span data-dcnode-id="1713" instrument_node=""> </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alberta_separatism" title="Alberta separatism"><span data-dcnode-id="1712" instrument_node="">secede from the country</span></a><span data-dcnode-id="1710" instrument_node=""> to form a new nation, either on its own or with other </span><a data-dcnode-id="1708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Canada" title="Western Canada"><span data-dcnode-id="1709" instrument_node="">Western provinces</span></a><span data-dcnode-id="1707" instrument_node="">. A separatist party obtained more than one tenth of the vote in the </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1982_Alberta_general_election" title="1982 Alberta general election"><span data-dcnode-id="1706" instrument_node="">1982 Alberta general election</span></a><span data-dcnode-id="1704" instrument_node=""> although no other separatist party in Western Canada has obtained a similar share of the vote in a provincial election before or since 1982.
</span></p><p data-dcnode-id="1669"><span data-dcnode-id="1702" instrument_node="">An example of conservative anti-Canadianism arose in 1997 when </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Harper" title="Stephen Harper"><span data-dcnode-id="1701" instrument_node="">Stephen Harper</span></a><span data-dcnode-id="1699" instrument_node="">, who was at the time vice-president of the conservative lobby group the </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Citizens_Coalition" title="National Citizens Coalition"><span data-dcnode-id="1698" instrument_node="">National Citizens Coalition</span></a><span data-dcnode-id="1696" instrument_node="">, stated he believed "Canada is a Northern European welfare state in the worst sense of the term, and very proud of it."</span><sup class="reference" data-dcnode-id="1693" id="cite_ref-24"><a data-dcnode-id="1694" href="#cite_note-24"><span data-dcnode-id="1695" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1692" instrument_node=""> The speech was made to members of the American </span><a class="mw-redirect" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_think_tank" title="Conservative think tank"><span data-dcnode-id="1691" instrument_node="">conservative think tank</span></a><span data-dcnode-id="1689" instrument_node=""> the </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_for_National_Policy" title="Council for National Policy"><span data-dcnode-id="1688" instrument_node="">Council for National Policy</span></a><span data-dcnode-id="1686" instrument_node="">. In the years since, claims have been made both that Harper's words were heartfelt, and that they were not, and that he was embellishing for the benefit of his audience. Harper himself dismissed the comments when they were cited by the centre-left </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_of_Canada" title="Liberal Party of Canada"><span data-dcnode-id="1685" instrument_node="">Liberal Party</span></a><span data-dcnode-id="1683" instrument_node=""> in </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_campaigning" title="Negative campaigning"><span data-dcnode-id="1682" instrument_node="">attack ads</span></a><span data-dcnode-id="1680" instrument_node=""> against him during the </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2006_Canadian_federal_election" title="2006 Canadian federal election"><span data-dcnode-id="1679" instrument_node="">2006 Canadian federal election</span></a><span data-dcnode-id="1677" instrument_node="">, saying that they were meant as humour, not serious analysis.</span><sup class="reference" data-dcnode-id="1674" id="cite_ref-25"><a data-dcnode-id="1675" href="#cite_note-25"><span data-dcnode-id="1676" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1673" instrument_node=""> (Harper became </span><a class="mw-redirect" data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prime_minister_of_Canada" title="Prime minister of Canada"><span data-dcnode-id="1672" instrument_node="">prime minister of Canada</span></a><span data-dcnode-id="1670" instrument_node=""> in 2006.)
</span></p><span data-dcnode-id="1668" instrument_node="">
</span><h5 data-dcnode-id="1658"><span class="mw-headline" data-dcnode-id="1666" id="From_the_political_left"><span data-dcnode-id="1667" instrument_node="">From the political left</span></span><span class="mw-editsection" data-dcnode-id="1659"><span class="mw-editsection-bracket" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">[</span></span><a data-dcnode-id="1662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D12" title="Edit section: From the political left"><span data-dcnode-id="1663" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">]</span></span></span></h5><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1656" instrument_node="">Some </span><a class="mw-redirect" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist" title="Communist"><span data-dcnode-id="1655" instrument_node="">communist</span></a><span data-dcnode-id="1653" instrument_node=""> organizations in Canada view a Canadian nationalist or isolationist line as </span><a class="mw-redirect" data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist_revisionism" title="Marxist revisionism"><span data-dcnode-id="1652" instrument_node="">revisionist</span></a><span data-dcnode-id="1650" instrument_node="">, anti-communist and anti-</span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internationalism_%28politics%29" title="Internationalism (politics)"><span data-dcnode-id="1649" instrument_node="">internationalist</span></a><span data-dcnode-id="1647" instrument_node="">. They believe the communist view of the national question in Canada should be </span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Internationalism_%28politics%29" title="Internationalism (politics)"><span data-dcnode-id="1646" instrument_node="">internationalist</span></a><span data-dcnode-id="1644" instrument_node=""> and consider that other nationalities exist within the nation-state, such as the </span><a class="mw-redirect" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French-speaking_Quebecer" title="French-speaking Quebecer"><span data-dcnode-id="1643" instrument_node="">Québécois</span></a><span data-dcnode-id="1641" instrument_node="">, </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Nations_in_Canada" title="First Nations in Canada"><span data-dcnode-id="1640" instrument_node="">First Nations</span></a><span data-dcnode-id="1638" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Acadian" title="Acadian"><span data-dcnode-id="1637" instrument_node="">Acadian</span></a><span data-dcnode-id="1635" instrument_node=""> peoples; as well as the borders being artificial boundaries put in place during the colonial period and held in place under capitalism. These views are usually held by </span><a class="mw-redirect" data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maoist" title="Maoist"><span data-dcnode-id="1634" instrument_node="">Maoist</span></a><span data-dcnode-id="1632" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="1630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trotskyite" title="Trotskyite"><span data-dcnode-id="1631" instrument_node="">Trotskyite</span></a><span data-dcnode-id="1629" instrument_node=""> and other </span><a data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutionary" title="Revolutionary"><span data-dcnode-id="1628" instrument_node="">revolutionary</span></a><span data-dcnode-id="1626" instrument_node=""> groups that tend not to participate in mainstream activities such as </span><a class="mw-redirect" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elections" title="Elections"><span data-dcnode-id="1625" instrument_node="">elections</span></a><span data-dcnode-id="1623" instrument_node="">. Such alternative views can be viewed as anti-Canadianism by more nationalist tendencies on both the left and right.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1616" style="white-space:nowrap;"><span data-dcnode-id="1622" instrument_node="">[</span><i data-dcnode-id="1618"><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1620" title="This claim needs references to reliable sources. (August 2009)"><span data-dcnode-id="1621" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1617" instrument_node="">]</span></sup><span data-dcnode-id="1615" instrument_node="">
</span></p><span data-dcnode-id="1613" instrument_node="">
</span><h2 data-dcnode-id="1603"><span class="mw-headline" data-dcnode-id="1611" id="Anti-Canadianism_and_humour"><span data-dcnode-id="1612" instrument_node="">Anti-Canadianism and humour</span></span><span class="mw-editsection" data-dcnode-id="1604"><span class="mw-editsection-bracket" data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">[</span></span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAnti-Canadian_sentiment%26action%3Dedit%26section%3D13" title="Edit section: Anti-Canadianism and humour"><span data-dcnode-id="1608" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1601" instrument_node="">Humorous anti-Canadianism often focuses on broadly known attributes of Canada and Canadians such as cold weather or </span><a class="mw-redirect" data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Publicly-funded_health_care" title="Publicly-funded health care"><span data-dcnode-id="1600" instrument_node="">public health care</span></a><span data-dcnode-id="1598" instrument_node="">,</span><sup class="reference" data-dcnode-id="1595" id="cite_ref-26"><a data-dcnode-id="1596" href="#cite_note-26"><span data-dcnode-id="1597" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1594" instrument_node=""> as the finer details of Canadian culture and politics are generally not well known outside Canada. The sport of </span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Curling" title="Curling"><span data-dcnode-id="1593" instrument_node="">curling</span></a><span data-dcnode-id="1591" instrument_node=""> is also treated with some irreverence in the United States and most of Europe. However, these broad targets are more accurately caricatured within Canada itself. The fact that others are perceived to know surprisingly little about Canada is a frequent theme in Canadian humour and such examples of self-deprecating humour are nearly universal among Canadian humorists. In keeping with this attitude, some genuinely critical anti-Canadianisms such as "Soviet Canuckistan" are embraced by some Canadians as humorous, in defiance of the original intent.
</span></p><span data-dcnode-id="1589" instrument_node="">
