="10940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maoism" title="Maoism"><span data-dcnode-id="10941" instrument_node="">Maoism</span></a></td></tr><tr data-dcnode-id="10926"><th class="infobox-label" data-dcnode-id="10936" scope="row" style="white-space:nowrap;padding-right:0.65em;"><span data-dcnode-id="10937" instrument_node="">Methods</span></th><td class="infobox-data" data-dcnode-id="10927" style="line-height:1.3em;"><a data-dcnode-id="10934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_war" title="Proxy war"><span data-dcnode-id="10935" instrument_node="">Proxy war</span></a><span data-dcnode-id="10933" instrument_node="">, </span><a data-dcnode-id="10931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propaganda" title="Propaganda"><span data-dcnode-id="10932" instrument_node="">propaganda</span></a><span data-dcnode-id="10930" instrument_node=""> and </span><a data-dcnode-id="10928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_border_conflict" title="Sino-Soviet border conflict"><span data-dcnode-id="10929" instrument_node="">Sino-Soviet border conflict</span></a></td></tr><tr data-dcnode-id="10918"><th class="infobox-label" data-dcnode-id="10924" scope="row" style="white-space:nowrap;padding-right:0.65em;"><span data-dcnode-id="10925" instrument_node="">Resulted in</span></th><td class="infobox-data" data-dcnode-id="10919" style="line-height:1.3em;"><span data-dcnode-id="10923" instrument_node="">Tri-polar cold war and two-way competition for </span><a data-dcnode-id="10921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="10922" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="10920" instrument_node=""> allies</span></td></tr><tr data-dcnode-id="10915"><th class="infobox-header" colspan="2" data-dcnode-id="10916" style="background-color:#CEE0F2;"><span data-dcnode-id="10917" instrument_node="">Lead figures</span></th></tr><tr data-dcnode-id="10894"><td class="infobox-full-data" colspan="2" data-dcnode-id="10895" style="line-height:1.3em;"><span data-dcnode-id="10914" instrument_node="">

</span><table class="plainlist" data-dcnode-id="10896" style="width:100%; text-align:left; background-color:transparent; border:0; margin:0; padding:0; display:inline-table;"><tbody data-dcnode-id="10897"><tr data-dcnode-id="10898"><td data-dcnode-id="10907" style=";width:50%;"><span class="flagicon" data-dcnode-id="10911"><img alt="" class="thumbborder" data-dcnode-id="10912" data-file-height="600" data-file-width="900" decoding="async" height="15" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Flag_of_the_People%2527s_Republic_of_China.svg/23px-Flag_of_the_People%2527s_Republic_of_China.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Flag_of_the_People%27s_Republic_of_China.svg/35px-Flag_of_the_People%27s_Republic_of_China.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fa/Flag_of_the_People%27s_Republic_of_China.svg/45px-Flag_of_the_People%27s_Republic_of_China.svg.png 2x" width="23"></span><span data-dcnode-id="10910" instrument_node=""> </span><a data-dcnode-id="10908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="10909" instrument_node="">Mao Zedong</span></a></td><td data-dcnode-id="10900" style="padding-left:5px; border-left:1px dotted #aaa;;width:50%;"><span class="flagicon" data-dcnode-id="10904"><img alt="" class="thumbborder" data-dcnode-id="10905" data-file-height="600" data-file-width="1200" decoding="async" height="12" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/23px-Flag_of_the_Soviet_Union.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/35px-Flag_of_the_Soviet_Union.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/46px-Flag_of_the_Soviet_Union.svg.png 2x" width="23"></span><span data-dcnode-id="10903" instrument_node=""> </span><a data-dcnode-id="10901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="10902" instrument_node="">Nikita Khrushchev</span></a></td></tr></tbody></table></td></tr></tbody></table><span data-dcnode-id="10891" instrument_node="">
</span><p data-dcnode-id="10817"><span data-dcnode-id="10890" instrument_node="">The </span><b data-dcnode-id="10888"><span data-dcnode-id="10889" instrument_node="">Sino-Soviet split</span></b><span data-dcnode-id="10887" instrument_node=""> was the breaking of political relations between the </span><a data-dcnode-id="10885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="10886" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="10884" instrument_node=""> and the </span><a data-dcnode-id="10882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="10883" instrument_node="">Soviet Union</span></a><span data-dcnode-id="10881" instrument_node=""> caused by </span><a data-dcnode-id="10879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doctrine" title="Doctrine"><span data-dcnode-id="10880" instrument_node="">doctrinal</span></a><span data-dcnode-id="10878" instrument_node=""> divergences that arose from their different interpretations and practical applications of </span><a data-dcnode-id="10876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="10877" instrument_node="">Marxism–Leninism</span></a><span data-dcnode-id="10875" instrument_node="">, as influenced by their respective </span><a data-dcnode-id="10873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geopolitics" title="Geopolitics"><span data-dcnode-id="10874" instrument_node="">geopolitics</span></a><span data-dcnode-id="10872" instrument_node=""> during the </span><a data-dcnode-id="10870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="10871" instrument_node="">Cold War</span></a><span data-dcnode-id="10869" instrument_node=""> of 1945–1991.</span><sup class="reference" data-dcnode-id="10866" id="cite_ref-World_History_2000._p.&nbsp;769_2-0"><a data-dcnode-id="10867" href="#cite_note-World_History_2000._p._769-2"><span data-dcnode-id="10868" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10865" instrument_node=""> In the late 1950s and early 1960s, Sino-Soviet debates about the interpretation of </span><a data-dcnode-id="10863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orthodox_Marxism" title="Orthodox Marxism"><span data-dcnode-id="10864" instrument_node="">orthodox Marxism</span></a><span data-dcnode-id="10862" instrument_node=""> became specific disputes about the Soviet Union's policies of national </span><a data-dcnode-id="10860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-Stalinization" title="De-Stalinization"><span data-dcnode-id="10861" instrument_node="">de-Stalinization</span></a><span data-dcnode-id="10859" instrument_node=""> and international </span><a data-dcnode-id="10857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="10858" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="10856" instrument_node=""> with the </span><a data-dcnode-id="10854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Bloc" title="Western Bloc"><span data-dcnode-id="10855" instrument_node="">Western Bloc</span></a><span data-dcnode-id="10853" instrument_node="">, which Chinese founding father </span><a data-dcnode-id="10851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="10852" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="10850" instrument_node=""> decried as </span><a data-dcnode-id="10848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revisionism_%28Marxism%29" title="Revisionism (Marxism)"><span data-dcnode-id="10849" instrument_node="">Marxist revisionism</span></a><span data-dcnode-id="10847" instrument_node="">. Against that ideological background, China took a belligerent stance towards the </span><a data-dcnode-id="10845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_world" title="Western world"><span data-dcnode-id="10846" instrument_node="">Western world</span></a><span data-dcnode-id="10844" instrument_node="">, and publicly rejected the Soviet Union's policy of peaceful coexistence between the Western Bloc and </span><a data-dcnode-id="10842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="10843" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="10841" instrument_node="">.</span><sup class="reference" data-dcnode-id="10838" id="cite_ref-World_History_2000._p.&nbsp;769_2-1"><a data-dcnode-id="10839" href="#cite_note-World_History_2000._p._769-2"><span data-dcnode-id="10840" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10837" instrument_node=""> In addition, </span><a data-dcnode-id="10835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing" title="Beijing"><span data-dcnode-id="10836" instrument_node="">Beijing</span></a><span data-dcnode-id="10834" instrument_node=""> resented the Soviet Union's growing ties with </span><a data-dcnode-id="10832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="10833" instrument_node="">India</span></a><span data-dcnode-id="10831" instrument_node=""> due to factors such as the </span><a data-dcnode-id="10829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Indian_border_dispute" title="Sino-Indian border dispute"><span data-dcnode-id="10830" instrument_node="">Sino-Indian border dispute</span></a><span data-dcnode-id="10828" instrument_node="">, and </span><a data-dcnode-id="10826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="10827" instrument_node="">Moscow</span></a><span data-dcnode-id="10825" instrument_node=""> feared that Mao was too nonchalant about the horrors of </span><a data-dcnode-id="10823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_warfare" title="Nuclear warfare"><span data-dcnode-id="10824" instrument_node="">nuclear warfare</span></a><span data-dcnode-id="10822" instrument_node="">.</span><sup class="reference" data-dcnode-id="10819" id="cite_ref-3"><a data-dcnode-id="10820" href="#cite_note-3"><span data-dcnode-id="10821" instrument_node="">[3]</span></a></sup><span data-dcnode-id="10818" instrument_node="">
</span></p><span data-dcnode-id="10816" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="10774"><div class="thumbinner" data-dcnode-id="10775" style="width:352px;"><a class="image" data-dcnode-id="10814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_and_China_map_including_the_three_co-bordering_countries.svg"><img alt="" class="thumbimage" data-dcnode-id="10815" data-file-height="169" data-file-width="317" decoding="async" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/92/Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg/350px-Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/92/Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg/525px-Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/92/Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg/700px-Soviet_Union_and_China_map_including_the_three_co-bordering_countries.svg.png 2x" width="350"></a><span data-dcnode-id="10813" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="10776"><div class="magnify" data-dcnode-id="10811"><a class="internal" data-dcnode-id="10812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_and_China_map_including_the_three_co-bordering_countries.svg" title="Enlarge"></a></div><div class="legend" data-dcnode-id="10803"><span class="legend-color" data-dcnode-id="10807" style="background-color:#FFCC00; color:black;"><span data-dcnode-id="10808" instrument_node="">&nbsp;</span></span><span data-dcnode-id="10806" instrument_node="">&nbsp;</span><a data-dcnode-id="10804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="10805" instrument_node="">China</span></a></div><span data-dcnode-id="10802" instrument_node=""> </span><link data-dcnode-id="10801" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="10795"><span class="legend-color" data-dcnode-id="10799" style="background-color:#ff0000; color:black;"><span data-dcnode-id="10800" instrument_node="">&nbsp;</span></span><span data-dcnode-id="10798" instrument_node="">&nbsp;</span><a data-dcnode-id="10796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="10797" instrument_node="">Soviet Union</span></a></div><span data-dcnode-id="10794" instrument_node=""> </span><link data-dcnode-id="10793" href="mw-data:TemplateStyles:r981673959" rel="mw-deduplicated-inline-style"><div class="legend" data-dcnode-id="10777"><span class="legend-color" data-dcnode-id="10791" style="background-color:#FF6600; color:black;"><span data-dcnode-id="10792" instrument_node="">&nbsp;</span></span><span data-dcnode-id="10790" instrument_node="">&nbsp;Countries that shared borders with both: </span><a data-dcnode-id="10788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolian_People%2527s_Republic" title="Mongolian People's Republic"><span data-dcnode-id="10789" instrument_node="">Mongolia</span></a><span data-dcnode-id="10787" instrument_node=""> was Soviet-aligned while </span><a data-dcnode-id="10785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Afghanistan" title="Kingdom of Afghanistan"><span data-dcnode-id="10786" instrument_node="">Afghanistan</span></a><span data-dcnode-id="10784" instrument_node=""> and </span><a data-dcnode-id="10782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="10783" instrument_node="">North Korea</span></a><span data-dcnode-id="10781" instrument_node=""> remained neutral, with the former eventually </span><a data-dcnode-id="10779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Republic_of_Afghanistan" title="Democratic Republic of Afghanistan"><span data-dcnode-id="10780" instrument_node="">becoming Soviet-aligned in the late 1970s</span></a><span data-dcnode-id="10778" instrument_node="">.</span></div></div></div></div><span data-dcnode-id="10773" instrument_node="">

</span><p data-dcnode-id="9990"><span data-dcnode-id="10041" instrument_node="">In 1956, </span><a data-dcnode-id="10039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union" title="General Secretary of the Communist Party of the Soviet Union"><span data-dcnode-id="10040" instrument_node="">CPSU first secretary</span></a><span data-dcnode-id="10038" instrument_node=""> </span><a data-dcnode-id="10036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="10037" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="10035" instrument_node=""> denounced </span><a data-dcnode-id="10033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="10034" instrument_node="">Stalin</span></a><span data-dcnode-id="10032" instrument_node=""> and </span><a data-dcnode-id="10030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalinism" title="Stalinism"><span data-dcnode-id="10031" instrument_node="">Stalinism</span></a><span data-dcnode-id="10029" instrument_node=""> in the speech </span><i data-dcnode-id="10026"><a class="mw-redirect" data-dcnode-id="10027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_the_Cult_of_Personality_and_its_Consequences" title="On the Cult of Personality and its Consequences"><span data-dcnode-id="10028" instrument_node="">On the Cult of Personality and its Consequences</span></a></i><span data-dcnode-id="10025" instrument_node=""> and began the </span><a data-dcnode-id="10023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-Stalinization" title="De-Stalinization"><span data-dcnode-id="10024" instrument_node="">de-Stalinization</span></a><span data-dcnode-id="10022" instrument_node=""> of the USSR. Mao and the Chinese leadership were appalled as the PRC and the USSR progressively diverged in their interpretations and applications of Leninist theory. By 1961, their intractable ideological differences provoked the PRC's formal denunciation of </span><a data-dcnode-id="10020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ideology_of_the_Communist_Party_of_the_Soviet_Union" title="Ideology of the Communist Party of the Soviet Union"><span data-dcnode-id="10021" instrument_node="">Soviet communism</span></a><span data-dcnode-id="10019" instrument_node=""> as the work of "revisionist traitors" in the USSR.</span><sup class="reference" data-dcnode-id="10016" id="cite_ref-World_History_2000._p.&nbsp;769_2-2"><a data-dcnode-id="10017" href="#cite_note-World_History_2000._p._769-2"><span data-dcnode-id="10018" instrument_node="">[2]</span></a></sup><span data-dcnode-id="10015" instrument_node=""> The PRC also declared the Soviet Union </span><a data-dcnode-id="10013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_imperialism" title="Social imperialism"><span data-dcnode-id="10014" instrument_node="">social imperialist</span></a><span data-dcnode-id="10012" instrument_node="">.</span><sup class="reference" data-dcnode-id="10009" id="cite_ref-:2_4-0"><a data-dcnode-id="10010" href="#cite_note-:2-4"><span data-dcnode-id="10011" instrument_node="">[4]</span></a></sup><span data-dcnode-id="10008" instrument_node=""> For Eastern Bloc countries, the Sino-Soviet split was a question of who would lead the revolution for </span><a data-dcnode-id="10006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_communism" title="World communism"><span data-dcnode-id="10007" instrument_node="">world communism</span></a><span data-dcnode-id="10005" instrument_node="">, and to whom (China or the USSR) the </span><a data-dcnode-id="10003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vanguardism" title="Vanguardism"><span data-dcnode-id="10004" instrument_node="">vanguard parties</span></a><span data-dcnode-id="10002" instrument_node=""> of the world would turn for political advice, financial aid, and military assistance.</span><sup class="reference" data-dcnode-id="9999" id="cite_ref-5"><a data-dcnode-id="10000" href="#cite_note-5"><span data-dcnode-id="10001" instrument_node="">[5]</span></a></sup><span data-dcnode-id="9998" instrument_node=""> In that vein, both countries competed for the leadership of world communism through the vanguard parties native to the countries in their </span><a data-dcnode-id="9996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegemony" title="Hegemony"><span data-dcnode-id="9997" instrument_node="">spheres of influence</span></a><span data-dcnode-id="9995" instrument_node="">.</span><sup class="reference" data-dcnode-id="9992" id="cite_ref-6"><a data-dcnode-id="9993" href="#cite_note-6"><span data-dcnode-id="9994" instrument_node="">[6]</span></a></sup><span data-dcnode-id="9991" instrument_node="">
</span></p><p data-dcnode-id="9929"><span data-dcnode-id="9989" instrument_node="">In the Western world, the Sino-Soviet split transformed the bi-polar cold war into a tri-polar one. The rivalry facilitated Mao's realization of Sino-American rapprochement with the </span><a class="mw-redirect" data-dcnode-id="9987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1972_Nixon_visit_to_China" title="1972 Nixon visit to China"><span data-dcnode-id="9988" instrument_node="">US President Richard Nixon's visit to China in 1972</span></a><span data-dcnode-id="9986" instrument_node="">. In the West, the policies of </span><a data-dcnode-id="9984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Triangular_diplomacy" title="Triangular diplomacy"><span data-dcnode-id="9985" instrument_node="">triangular diplomacy</span></a><span data-dcnode-id="9983" instrument_node=""> and </span><a data-dcnode-id="9981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Linkage_%28policy%29" title="Linkage (policy)"><span data-dcnode-id="9982" instrument_node="">linkage</span></a><span data-dcnode-id="9980" instrument_node=""> emerged.</span><sup class="reference" data-dcnode-id="9977" id="cite_ref-7"><a data-dcnode-id="9978" href="#cite_note-7"><span data-dcnode-id="9979" instrument_node="">[7]</span></a></sup><span data-dcnode-id="9976" instrument_node=""> Moreover, the occurrence of the Sino-Soviet split also voided the concept of Monolithic Communism, the Western perception that the communist nations were collectively a unitary actor in post–Second World War geopolitics, especially during the </span><a class="mw-redirect" data-dcnode-id="9974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1947%25E2%2580%25931950_in_the_Vietnam_War" title="1947–1950 in the Vietnam War"><span data-dcnode-id="9975" instrument_node="">1947–1954 period in the Vietnam War</span></a><span data-dcnode-id="9973" instrument_node="">, when the US intervened to the </span><a data-dcnode-id="9971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Indochina_War" title="First Indochina War"><span data-dcnode-id="9972" instrument_node="">First Indochina War</span></a><span data-dcnode-id="9970" instrument_node=""> (1946–1954).</span><sup class="reference" data-dcnode-id="9967" id="cite_ref-8"><a data-dcnode-id="9968" href="#cite_note-8"><span data-dcnode-id="9969" instrument_node="">[8]</span></a></sup><span data-dcnode-id="9966" instrument_node=""> However, the USSR and China continued to cooperate in </span><a data-dcnode-id="9964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Vietnam" title="North Vietnam"><span data-dcnode-id="9965" instrument_node="">North Vietnam</span></a><span data-dcnode-id="9963" instrument_node=""> during the </span><a data-dcnode-id="9961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indochina_Wars" title="Indochina Wars"><span data-dcnode-id="9962" instrument_node="">Indochina Wars</span></a><span data-dcnode-id="9960" instrument_node=""> into the 1970s, despite rivalry elsewhere.</span><sup class="reference" data-dcnode-id="9957" id="cite_ref-:1_9-0"><a data-dcnode-id="9958" href="#cite_note-:1-9"><span data-dcnode-id="9959" instrument_node="">[9]</span></a></sup><span data-dcnode-id="9956" instrument_node=""> Historically, the Sino-Soviet split facilitated the Marxist–Leninist </span><i data-dcnode-id="9953"><a data-dcnode-id="9954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realpolitik" title="Realpolitik"><span data-dcnode-id="9955" instrument_node="">Realpolitik</span></a></i><span data-dcnode-id="9952" instrument_node=""> with which Mao established the tri-polar geopolitics (PRC–USA–USSR) of the late-period Cold War (1956–1991) to create an anti-Soviet front, which Maoists connected to </span><a data-dcnode-id="9950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_Worlds_Theory" title="Three Worlds Theory"><span data-dcnode-id="9951" instrument_node="">Three Worlds Theory</span></a><span data-dcnode-id="9949" instrument_node="">.</span><sup class="reference" data-dcnode-id="9946" id="cite_ref-:2_4-1"><a data-dcnode-id="9947" href="#cite_note-:2-4"><span data-dcnode-id="9948" instrument_node="">[4]</span></a></sup><span data-dcnode-id="9945" instrument_node=""> According to Lüthi, there is "no documentary evidence that the Chinese or the Soviets thought about their relationship within a triangular framework during the period."</span><sup class="reference" data-dcnode-id="9942" id="cite_ref-10"><a data-dcnode-id="9943" href="#cite_note-10"><span data-dcnode-id="9944" instrument_node="">[10]</span></a></sup><span data-dcnode-id="9941" instrument_node=""> The period has been compared to nominally quad-polar geopolitics (PRC-UK-USA-USSR) until the </span><a data-dcnode-id="9939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_Crisis" title="Suez Crisis"><span data-dcnode-id="9940" instrument_node="">Suez Crisis</span></a><span data-dcnode-id="9938" instrument_node=""> of 1956.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="9931" style="white-space:nowrap;"><span data-dcnode-id="9937" instrument_node="">[</span><i data-dcnode-id="9933"><a data-dcnode-id="9934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="9935" title="This claim needs references to reliable sources. (August 2021)"><span data-dcnode-id="9936" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="9932" instrument_node="">]</span></sup><span data-dcnode-id="9930" instrument_node="">
</span></p><span data-dcnode-id="9928" instrument_node="">

</span><h3 data-dcnode-id="9643"><span class="mw-headline" data-dcnode-id="9651" id="Reluctant_co-belligerents"><span data-dcnode-id="9652" instrument_node="">Reluctant co-belligerents</span></span><span class="mw-editsection" data-dcnode-id="9644"><span class="mw-editsection-bracket" data-dcnode-id="9649"><span data-dcnode-id="9650" instrument_node="">[</span></span><a data-dcnode-id="9647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D2" title="Edit section: Reluctant co-belligerents"><span data-dcnode-id="9648" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9645"><span data-dcnode-id="9646" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9642" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9633"><div class="thumbinner" data-dcnode-id="9634" style="width:252px;"><a class="image" data-dcnode-id="9640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E9%2587%258D%25E6%2585%25B6%25E6%259C%2583%25E8%25AB%2587_%25E8%2594%25A3%25E4%25BB%258B%25E7%259F%25B3%25E8%2588%2587%25E6%25AF%259B%25E6%25BE%25A4%25E6%259D%25B1.jpg"><img alt="" class="thumbimage" data-dcnode-id="9641" data-file-height="639" data-file-width="656" decoding="async" height="244" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/01/%25E9%2587%258D%25E6%2585%25B6%25E6%259C%2583%25E8%25AB%2587_%25E8%2594%25A3%25E4%25BB%258B%25E7%259F%25B3%25E8%2588%2587%25E6%25AF%259B%25E6%25BE%25A4%25E6%259D%25B1.jpg/250px-%25E9%2587%258D%25E6%2585%25B6%25E6%259C%2583%25E8%25AB%2587_%25E8%2594%25A3%25E4%25BB%258B%25E7%259F%25B3%25E8%2588%2587%25E6%25AF%259B%25E6%25BE%25A4%25E6%259D%25B1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/01/%E9%87%8D%E6%85%B6%E6%9C%83%E8%AB%87_%E8%94%A3%E4%BB%8B%E7%9F%B3%E8%88%87%E6%AF%9B%E6%BE%A4%E6%9D%B1.jpg/375px-%E9%87%8D%E6%85%B6%E6%9C%83%E8%AB%87_%E8%94%A3%E4%BB%8B%E7%9F%B3%E8%88%87%E6%AF%9B%E6%BE%A4%E6%9D%B1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/01/%E9%87%8D%E6%85%B6%E6%9C%83%E8%AB%87_%E8%94%A3%E4%BB%8B%E7%9F%B3%E8%88%87%E6%AF%9B%E6%BE%A4%E6%9D%B1.jpg/500px-%E9%87%8D%E6%85%B6%E6%9C%83%E8%AB%87_%E8%94%A3%E4%BB%8B%E7%9F%B3%E8%88%87%E6%AF%9B%E6%BE%A4%E6%9D%B1.jpg 2x" width="250"></a><span data-dcnode-id="9639" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9635"><div class="magnify" data-dcnode-id="9637"><a class="internal" data-dcnode-id="9638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25E9%2587%258D%25E6%2585%25B6%25E6%259C%2583%25E8%25AB%2587_%25E8%2594%25A3%25E4%25BB%258B%25E7%259F%25B3%25E8%2588%2587%25E6%25AF%259B%25E6%25BE%25A4%25E6%259D%25B1.jpg" title="Enlarge"></a></div><span data-dcnode-id="9636" instrument_node="">In the Asian theatre of World War II, Generalissimo Chiang Kai-shek of the KMT was kidnapped by one of his own officers and forced to ally with the Communist Mao Zedong of the CCP as reluctant co-belligerents to expel Imperial Japan from China.</span></div></div></div><span data-dcnode-id="9632" instrument_node="">
</span><p data-dcnode-id="9587"><span data-dcnode-id="9631" instrument_node="">During the </span><a data-dcnode-id="9629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sino-Japanese_War" title="Second Sino-Japanese War"><span data-dcnode-id="9630" instrument_node="">Second Sino-Japanese War</span></a><span data-dcnode-id="9628" instrument_node="">, the </span><a data-dcnode-id="9626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Party" title="Chinese Communist Party"><span data-dcnode-id="9627" instrument_node="">Chinese Communist Party</span></a><span data-dcnode-id="9625" instrument_node=""> (CCP) and the nationalist </span><a data-dcnode-id="9623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuomintang" title="Kuomintang"><span data-dcnode-id="9624" instrument_node="">Kuomintang</span></a><span data-dcnode-id="9622" instrument_node=""> party (KMT) set aside their </span><a data-dcnode-id="9620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Civil_War" title="Chinese Civil War"><span data-dcnode-id="9621" instrument_node="">civil war</span></a><span data-dcnode-id="9619" instrument_node=""> to expel the </span><a data-dcnode-id="9617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Empire_of_Japan" title="Empire of Japan"><span data-dcnode-id="9618" instrument_node="">Empire of Japan</span></a><span data-dcnode-id="9616" instrument_node=""> from the </span><a data-dcnode-id="9614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China_%281912%25E2%2580%25931949%29" title="Republic of China (1912–1949)"><span data-dcnode-id="9615" instrument_node="">Republic of China</span></a><span data-dcnode-id="9613" instrument_node="">. To that end, the Soviet leader, </span><a data-dcnode-id="9611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="9612" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="9610" instrument_node="">, ordered </span><a data-dcnode-id="9608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="9609" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="9607" instrument_node="">, leader of the CCP, to co-operate with Generalissimo </span><a data-dcnode-id="9605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="9606" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="9604" instrument_node="">, leader of the KMT, in fighting the </span><a data-dcnode-id="9602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Sino-Japanese_War" title="Second Sino-Japanese War"><span data-dcnode-id="9603" instrument_node="">Japanese</span></a><span data-dcnode-id="9601" instrument_node="">. Following the </span><a data-dcnode-id="9599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surrender_of_Japan" title="Surrender of Japan"><span data-dcnode-id="9600" instrument_node="">surrender of Japan</span></a><span data-dcnode-id="9598" instrument_node=""> at the end of </span><a data-dcnode-id="9596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_II" title="World War II"><span data-dcnode-id="9597" instrument_node="">World War II</span></a><span data-dcnode-id="9595" instrument_node="">, both parties resumed their civil war, which the communists </span><a data-dcnode-id="9593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Revolution" title="Chinese Communist Revolution"><span data-dcnode-id="9594" instrument_node="">won</span></a><span data-dcnode-id="9592" instrument_node=""> by 1949.</span><sup class="reference" data-dcnode-id="9589" id="cite_ref-11"><a data-dcnode-id="9590" href="#cite_note-11"><span data-dcnode-id="9591" instrument_node="">[11]</span></a></sup><span data-dcnode-id="9588" instrument_node="">
</span></p><p data-dcnode-id="9562"><span data-dcnode-id="9586" instrument_node="">At the war's conclusion, Stalin advised Mao not to seize political power at that time, and, instead, to collaborate with Chiang due to the 1945 </span><a data-dcnode-id="9584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_Treaty_of_Friendship_and_Alliance" title="Sino-Soviet Treaty of Friendship and Alliance"><span data-dcnode-id="9585" instrument_node="">USSR–KMT Treaty of Friendship and Alliance</span></a><span data-dcnode-id="9583" instrument_node="">. Mao abided Stalin in communist solidarity.</span><sup class="reference" data-dcnode-id="9580" id="cite_ref-12"><a data-dcnode-id="9581" href="#cite_note-12"><span data-dcnode-id="9582" instrument_node="">[12]</span></a></sup><span data-dcnode-id="9579" instrument_node=""> Yet, three months after the Japanese surrender, in November 1945, when Chiang opposed the annexation of </span><a data-dcnode-id="9577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tannu_Uriankhai" title="Tannu Uriankhai"><span data-dcnode-id="9578" instrument_node="">Tannu Uriankhai</span></a><span data-dcnode-id="9576" instrument_node=""> (Mongolia) to the USSR, Stalin broke the treaty requiring the Red Army's withdrawal from </span><a data-dcnode-id="9574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manchukuo" title="Manchukuo"><span data-dcnode-id="9575" instrument_node="">Manchuria</span></a><span data-dcnode-id="9573" instrument_node=""> (giving Mao regional control) and ordered General </span><a data-dcnode-id="9571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodion_Malinovsky" title="Rodion Malinovsky"><span data-dcnode-id="9572" instrument_node="">Rodion Malinovsky</span></a><span data-dcnode-id="9570" instrument_node=""> to give the Chinese communists the Japanese leftover weapons.</span><sup class="reference" data-dcnode-id="9567" id="cite_ref-13"><a data-dcnode-id="9568" href="#cite_note-13"><span data-dcnode-id="9569" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="9564" id="cite_ref-14"><a data-dcnode-id="9565" href="#cite_note-14"><span data-dcnode-id="9566" instrument_node="">[14]</span></a></sup><span data-dcnode-id="9563" instrument_node="">
</span></p><p data-dcnode-id="9547"><span data-dcnode-id="9561" instrument_node="">In the five-year post-World War II period, the United States partly financed Chiang, his nationalist political party, and the </span><a data-dcnode-id="9559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_Revolutionary_Army" title="National Revolutionary Army"><span data-dcnode-id="9560" instrument_node="">National Revolutionary Army</span></a><span data-dcnode-id="9558" instrument_node="">. However, Washington put heavy pressure on Chiang to form a joint government with the Communists. US envoy </span><a class="mw-redirect" data-dcnode-id="9556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Marshall" title="George Marshall"><span data-dcnode-id="9557" instrument_node="">George Marshall</span></a><span data-dcnode-id="9555" instrument_node=""> spent 13 months in China trying without success to broker peace.</span><sup class="reference" data-dcnode-id="9552" id="cite_ref-15"><a data-dcnode-id="9553" href="#cite_note-15"><span data-dcnode-id="9554" instrument_node="">[15]</span></a></sup><span data-dcnode-id="9551" instrument_node=""> In the concluding three-year period of the Chinese Civil War, the CCP defeated and expelled the KMT from mainland China. Consequently, the </span><a class="mw-redirect" data-dcnode-id="9549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China_retreat_to_Taiwan" title="Republic of China retreat to Taiwan"><span data-dcnode-id="9550" instrument_node="">KMT retreated to Taiwan</span></a><span data-dcnode-id="9548" instrument_node=""> in December 1949.
</span></p><span data-dcnode-id="9546" instrument_node="">
</span><h3 data-dcnode-id="9536"><span class="mw-headline" data-dcnode-id="9544" id="Chinese_communist_revolution"><span data-dcnode-id="9545" instrument_node="">Chinese communist revolution</span></span><span class="mw-editsection" data-dcnode-id="9537"><span class="mw-editsection-bracket" data-dcnode-id="9542"><span data-dcnode-id="9543" instrument_node="">[</span></span><a data-dcnode-id="9540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D3" title="Edit section: Chinese communist revolution"><span data-dcnode-id="9541" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9538"><span data-dcnode-id="9539" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9535" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9523"><div class="thumbinner" data-dcnode-id="9524" style="width:302px;"><a class="image" data-dcnode-id="9533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1967-12_1967%25E5%25B9%25B4_%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E4%25B8%258E%25E5%25AE%2589%25E5%25A8%259C%25C2%25B7%25E6%2596%25AF%25E7%2589%25B9%25E6%259C%2597.jpg"><img alt="" class="thumbimage" data-dcnode-id="9534" data-file-height="1207" data-file-width="1939" decoding="async" height="187" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/74/1967-12_1967%25E5%25B9%25B4_%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E4%25B8%258E%25E5%25AE%2589%25E5%25A8%259C%25C2%25B7%25E6%2596%25AF%25E7%2589%25B9%25E6%259C%2597.jpg/300px-1967-12_1967%25E5%25B9%25B4_%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E4%25B8%258E%25E5%25AE%2589%25E5%25A8%259C%25C2%25B7%25E6%2596%25AF%25E7%2589%25B9%25E6%259C%2597.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/74/1967-12_1967%E5%B9%B4_%E6%AF%9B%E6%B3%BD%E4%B8%9C%E4%B8%8E%E5%AE%89%E5%A8%9C%C2%B7%E6%96%AF%E7%89%B9%E6%9C%97.jpg/450px-1967-12_1967%E5%B9%B4_%E6%AF%9B%E6%B3%BD%E4%B8%9C%E4%B8%8E%E5%AE%89%E5%A8%9C%C2%B7%E6%96%AF%E7%89%B9%E6%9C%97.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/74/1967-12_1967%E5%B9%B4_%E6%AF%9B%E6%B3%BD%E4%B8%9C%E4%B8%8E%E5%AE%89%E5%A8%9C%C2%B7%E6%96%AF%E7%89%B9%E6%9C%97.jpg/600px-1967-12_1967%E5%B9%B4_%E6%AF%9B%E6%B3%BD%E4%B8%9C%E4%B8%8E%E5%AE%89%E5%A8%9C%C2%B7%E6%96%AF%E7%89%B9%E6%9C%97.jpg 2x" width="300"></a><span data-dcnode-id="9532" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9525"><div class="magnify" data-dcnode-id="9530"><a class="internal" data-dcnode-id="9531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1967-12_1967%25E5%25B9%25B4_%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E4%25B8%258E%25E5%25AE%2589%25E5%25A8%259C%25C2%25B7%25E6%2596%25AF%25E7%2589%25B9%25E6%259C%2597.jpg" title="Enlarge"></a></div><span data-dcnode-id="9529" instrument_node="">Chairman Mao with US journalist </span><a data-dcnode-id="9527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anna_Louise_Strong" title="Anna Louise Strong"><span data-dcnode-id="9528" instrument_node="">Anna Louise Strong</span></a><span data-dcnode-id="9526" instrument_node="">, whose work presented and explained the Chinese Communist revolution to the Western world. (1967)</span></div></div></div><span data-dcnode-id="9522" instrument_node="">
</span><p data-dcnode-id="9491"><span data-dcnode-id="9521" instrument_node="">As a revolutionary theoretician of </span><a data-dcnode-id="9519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="9520" instrument_node="">Communism</span></a><span data-dcnode-id="9518" instrument_node=""> seeking to realize a </span><a data-dcnode-id="9516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_state" title="Socialist state"><span data-dcnode-id="9517" instrument_node="">socialist state</span></a><span data-dcnode-id="9515" instrument_node=""> in China, Mao developed and adapted the urban ideology of </span><a data-dcnode-id="9513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orthodox_Marxism" title="Orthodox Marxism"><span data-dcnode-id="9514" instrument_node="">Orthodox Marxism</span></a><span data-dcnode-id="9512" instrument_node=""> for practical application to the agrarian conditions of pre-industrial China and the </span><a data-dcnode-id="9510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_people" title="Chinese people"><span data-dcnode-id="9511" instrument_node="">Chinese people</span></a><span data-dcnode-id="9509" instrument_node="">.</span><sup class="reference" data-dcnode-id="9506" id="cite_ref-16"><a data-dcnode-id="9507" href="#cite_note-16"><span data-dcnode-id="9508" instrument_node="">[16]</span></a></sup><span data-dcnode-id="9505" instrument_node=""> Mao's Sinification of Marxism-Leninism, </span><a class="mw-redirect" data-dcnode-id="9503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong_Thought" title="Mao Zedong Thought"><span data-dcnode-id="9504" instrument_node="">Mao Zedong Thought</span></a><span data-dcnode-id="9502" instrument_node="">, established political pragmatism as the first priority for realizing the accelerated </span><a class="mw-redirect" data-dcnode-id="9500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Modernization" title="Modernization"><span data-dcnode-id="9501" instrument_node="">modernization</span></a><span data-dcnode-id="9499" instrument_node=""> of a country and a people, and ideological orthodoxy as the secondary priority because Orthodox Marxism originated for practical application to the socio-economic conditions of industrialized </span><a data-dcnode-id="9497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="9498" instrument_node="">Western Europe</span></a><span data-dcnode-id="9496" instrument_node=""> in the 19th century.</span><sup class="reference" data-dcnode-id="9493" id="cite_ref-17"><a data-dcnode-id="9494" href="#cite_note-17"><span data-dcnode-id="9495" instrument_node="">[17]</span></a></sup><span data-dcnode-id="9492" instrument_node="">
</span></p><p data-dcnode-id="9483"><span data-dcnode-id="9490" instrument_node="">During the Chinese Civil War in 1947, Mao dispatched US journalist </span><a data-dcnode-id="9488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anna_Louise_Strong" title="Anna Louise Strong"><span data-dcnode-id="9489" instrument_node="">Anna Louise Strong</span></a><span data-dcnode-id="9487" instrument_node=""> to the West, bearing political documents explaining China's socialist future, and asked that she "show them to Party leaders in the United States and Europe", for their better understanding of the </span><a data-dcnode-id="9485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Revolution" title="Chinese Communist Revolution"><span data-dcnode-id="9486" instrument_node="">Chinese Communist Revolution</span></a><span data-dcnode-id="9484" instrument_node="">, but that it was not "necessary to take them to Moscow."
</span></p><p data-dcnode-id="9475"><span data-dcnode-id="9482" instrument_node="">Mao trusted Strong because of her positive reportage about him, as a theoretician of Communism, in the article "The Thought of Mao Tse-Tung", and about the CCP's communist revolution, in the 1948 book </span><i data-dcnode-id="9480"><span data-dcnode-id="9481" instrument_node="">Dawn Comes Up Like Thunder Out of China: An Intimate Account of the Liberated Areas in China</span></i><span data-dcnode-id="9479" instrument_node="">, which reports that Mao's </span><a data-dcnode-id="9477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intellectualism" title="Intellectualism"><span data-dcnode-id="9478" instrument_node="">intellectual</span></a><span data-dcnode-id="9476" instrument_node=""> achievement was "to change Marxism from a European [form] to an Asiatic form . . . in ways of which neither Marx nor Lenin could dream."
</span></p><span data-dcnode-id="9474" instrument_node="">
</span><h3 data-dcnode-id="9464"><span class="mw-headline" data-dcnode-id="9472" id="Treaty_of_Sino-Soviet_friendship"><span data-dcnode-id="9473" instrument_node="">Treaty of Sino-Soviet friendship</span></span><span class="mw-editsection" data-dcnode-id="9465"><span class="mw-editsection-bracket" data-dcnode-id="9470"><span data-dcnode-id="9471" instrument_node="">[</span></span><a data-dcnode-id="9468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D4" title="Edit section: Treaty of Sino-Soviet friendship"><span data-dcnode-id="9469" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9466"><span data-dcnode-id="9467" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9463" instrument_node="">
</span><link data-dcnode-id="9462" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9458" role="note"><span data-dcnode-id="9461" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="9459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_Treaty_of_Friendship" title="Sino-Soviet Treaty of Friendship"><span data-dcnode-id="9460" instrument_node="">Sino-Soviet Treaty of Friendship</span></a></div><span data-dcnode-id="9457" instrument_node="">
</span><p data-dcnode-id="9436"><span data-dcnode-id="9456" instrument_node="">In 1950, Mao and Stalin safeguarded the national interests of China and the Soviet Union with the </span><a class="mw-redirect" data-dcnode-id="9454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_Treaty_of_Friendship" title="Sino-Soviet Treaty of Friendship"><span data-dcnode-id="9455" instrument_node="">Treaty of Friendship, Alliance and Mutual Assistance</span></a><span data-dcnode-id="9453" instrument_node="">. The treaty improved the two countries' geopolitical relationship on political, military and economic levels.</span><sup class="reference" data-dcnode-id="9450" id="cite_ref-18"><a data-dcnode-id="9451" href="#cite_note-18"><span data-dcnode-id="9452" instrument_node="">[18]</span></a></sup><span data-dcnode-id="9449" instrument_node=""> Stalin's largesse to Mao included a loan for $300 million; military aid, should Japan attack the PRC; and the transfer of the </span><a data-dcnode-id="9447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Eastern_Railway" title="Chinese Eastern Railway"><span data-dcnode-id="9448" instrument_node="">Chinese Eastern Railway</span></a><span data-dcnode-id="9446" instrument_node=""> in Manchuria, </span><a data-dcnode-id="9444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/L%25C3%25BCshunkou_District" title="Lüshunkou District"><span data-dcnode-id="9445" instrument_node="">Port Arthur</span></a><span data-dcnode-id="9443" instrument_node=""> and </span><a data-dcnode-id="9441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dalian" title="Dalian"><span data-dcnode-id="9442" instrument_node="">Dalian</span></a><span data-dcnode-id="9440" instrument_node=""> to Chinese control. In return, the PRC recognized the independence of the </span><a data-dcnode-id="9438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolian_People%2527s_Republic" title="Mongolian People's Republic"><span data-dcnode-id="9439" instrument_node="">Mongolian People's Republic</span></a><span data-dcnode-id="9437" instrument_node="">.
</span></p><p data-dcnode-id="9421"><span data-dcnode-id="9435" instrument_node="">Despite the favourable terms, the treaty of socialist friendship included the PRC in the geopolitical </span><a data-dcnode-id="9433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hegemony" title="Hegemony"><span data-dcnode-id="9434" instrument_node="">hegemony</span></a><span data-dcnode-id="9432" instrument_node=""> of the USSR, but unlike the governments of the Soviet satellite states in Eastern Europe, the USSR did not control Mao's government. In six years, the great differences between the Soviet and the Chinese interpretations and applications of Marxism–Leninism voided the </span><a data-dcnode-id="9430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_Treaty_of_Friendship%2C_Alliance_and_Mutual_Assistance" title="Sino-Soviet Treaty of Friendship, Alliance and Mutual Assistance"><span data-dcnode-id="9431" instrument_node="">Sino-Soviet Treaty of Friendship</span></a><span data-dcnode-id="9429" instrument_node="">.</span><sup class="reference" data-dcnode-id="9426" id="cite_ref-19"><a data-dcnode-id="9427" href="#cite_note-19"><span data-dcnode-id="9428" instrument_node="">[19]</span></a></sup><sup class="reference" data-dcnode-id="9423" id="cite_ref-20"><a data-dcnode-id="9424" href="#cite_note-20"><span data-dcnode-id="9425" instrument_node="">[20]</span></a></sup><span data-dcnode-id="9422" instrument_node="">
</span></p><p data-dcnode-id="9394"><span data-dcnode-id="9420" instrument_node="">In 1953, guided by Soviet economists, the PRC applied the USSR's model of </span><a data-dcnode-id="9418" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economy" title="Planned economy"><span data-dcnode-id="9419" instrument_node="">planned economy</span></a><span data-dcnode-id="9417" instrument_node="">, which gave first priority to the development of </span><a data-dcnode-id="9415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Heavy_industry" title="Heavy industry"><span data-dcnode-id="9416" instrument_node="">heavy industry</span></a><span data-dcnode-id="9414" instrument_node="">, and second priority to the production of consumer goods. Later, ignoring the guidance of technical advisors, Mao launched the </span><a data-dcnode-id="9412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Leap_Forward" title="Great Leap Forward"><span data-dcnode-id="9413" instrument_node="">Great Leap Forward</span></a><span data-dcnode-id="9411" instrument_node=""> to </span><a data-dcnode-id="9409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_industrialization" title="Chinese industrialization"><span data-dcnode-id="9410" instrument_node="">transform agrarian China into an industrialized country</span></a><span data-dcnode-id="9408" instrument_node=""> with disastrous results for people and land. Mao's unrealistic goals for </span><a data-dcnode-id="9406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agriculture_in_China" title="Agriculture in China"><span data-dcnode-id="9407" instrument_node="">agricultural production</span></a><span data-dcnode-id="9405" instrument_node=""> went unfulfilled because of poor planning and realization, which aggravated rural starvation and increased the number of deaths caused by the </span><a data-dcnode-id="9403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Chinese_Famine" title="Great Chinese Famine"><span data-dcnode-id="9404" instrument_node="">Great Chinese Famine</span></a><span data-dcnode-id="9402" instrument_node="">, which resulted from three years of drought and poor weather.</span><sup class="reference" data-dcnode-id="9399" id="cite_ref-21"><a data-dcnode-id="9400" href="#cite_note-21"><span data-dcnode-id="9401" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="9396" id="cite_ref-22"><a data-dcnode-id="9397" href="#cite_note-22"><span data-dcnode-id="9398" instrument_node="">[22]</span></a></sup><span data-dcnode-id="9395" instrument_node="">
</span></p><span data-dcnode-id="9393" instrument_node="">
</span><h3 data-dcnode-id="9383"><span class="mw-headline" data-dcnode-id="9391" id="Socialist_relations_repaired"><span data-dcnode-id="9392" instrument_node="">Socialist relations repaired</span></span><span class="mw-editsection" data-dcnode-id="9384"><span class="mw-editsection-bracket" data-dcnode-id="9389"><span data-dcnode-id="9390" instrument_node="">[</span></span><a data-dcnode-id="9387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D5" title="Edit section: Socialist relations repaired"><span data-dcnode-id="9388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9385"><span data-dcnode-id="9386" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9382" instrument_node="">
</span><p data-dcnode-id="9363"><span data-dcnode-id="9381" instrument_node="">In 1954, Soviet first secretary </span><a data-dcnode-id="9379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="9380" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="9378" instrument_node=""> repaired relations between the USSR and the PRC with trade agreements, a formal acknowledgement of Stalin's economic unfairness to the PRC, fifteen industrial-development projects, and exchanges of technicians (c. 10,000) and political advisors (c. 1,500), whilst Chinese labourers were sent to fill shortages of manual workers in </span><a data-dcnode-id="9376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Siberia" title="Siberia"><span data-dcnode-id="9377" instrument_node="">Siberia</span></a><span data-dcnode-id="9375" instrument_node="">. Despite this, Mao and Khrushchev disliked each other, both personally and ideologically.</span><sup class="reference" data-dcnode-id="9372" id="cite_ref-Luthi40_23-0"><a data-dcnode-id="9373" href="#cite_note-Luthi40-23"><span data-dcnode-id="9374" instrument_node="">[23]</span></a></sup><span data-dcnode-id="9371" instrument_node=""> However, by 1955, consequent to Khrushchev's having repaired Soviet relations with Mao and the Chinese, 60% of the PRC's exports went to the USSR, by way of the </span><a data-dcnode-id="9369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Five-year_plans_of_China" title="Five-year plans of China"><span data-dcnode-id="9370" instrument_node="">Five-year plans of China</span></a><span data-dcnode-id="9368" instrument_node=""> begun in 1953.</span><sup class="reference" data-dcnode-id="9365" id="cite_ref-24"><a data-dcnode-id="9366" href="#cite_note-24"><span data-dcnode-id="9367" instrument_node="">[24]</span></a></sup><span data-dcnode-id="9364" instrument_node="">
</span></p><span data-dcnode-id="9362" instrument_node="">
</span><h3 data-dcnode-id="9352"><span class="mw-headline" data-dcnode-id="9360" id="Discontents_of_de-Stalinization"><span data-dcnode-id="9361" instrument_node="">Discontents of de-Stalinization</span></span><span class="mw-editsection" data-dcnode-id="9353"><span class="mw-editsection-bracket" data-dcnode-id="9358"><span data-dcnode-id="9359" instrument_node="">[</span></span><a data-dcnode-id="9356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D6" title="Edit section: Discontents of de-Stalinization"><span data-dcnode-id="9357" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9354"><span data-dcnode-id="9355" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9351" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9339"><div class="thumbinner" data-dcnode-id="9340" style="width:222px;"><a class="image" data-dcnode-id="9349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg"><img alt="" class="thumbimage" data-dcnode-id="9350" data-file-height="800" data-file-width="596" decoding="async" height="295" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Bundesarchiv_Bild_183-B0628-0015-035%252C_Nikita_S._Chruschtschow.jpg/220px-Bundesarchiv_Bild_183-B0628-0015-035%252C_Nikita_S._Chruschtschow.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Bundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg/330px-Bundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Bundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg/440px-Bundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg 2x" width="220"></a><span data-dcnode-id="9348" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9341"><div class="magnify" data-dcnode-id="9346"><a class="internal" data-dcnode-id="9347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-B0628-0015-035%2C_Nikita_S._Chruschtschow.jpg" title="Enlarge"></a></div><span data-dcnode-id="9345" instrument_node="">The Sino-Soviet split arose from the ideological clash between Soviet first secretary </span><a class="mw-redirect" data-dcnode-id="9343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khrushchev" title="Khrushchev"><span data-dcnode-id="9344" instrument_node="">Khrushchev</span></a><span data-dcnode-id="9342" instrument_node="">'s policies of De-Stalinisation and peaceful coexistence and Mao Zedong's bellicose and Stalinist policies.</span></div></div></div><span data-dcnode-id="9338" instrument_node="">
</span><p data-dcnode-id="9304"><span data-dcnode-id="9337" instrument_node="">In early 1956, Sino-Soviet relations began deteriorating, following Khrushchev's </span><a data-dcnode-id="9335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-Stalinization" title="De-Stalinization"><span data-dcnode-id="9336" instrument_node="">de-Stalinization</span></a><span data-dcnode-id="9334" instrument_node=""> of the USSR, which he initiated with the speech </span><i data-dcnode-id="9331"><a data-dcnode-id="9332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_the_Cult_of_Personality_and_Its_Consequences" title="On the Cult of Personality and Its Consequences"><span data-dcnode-id="9333" instrument_node="">On the Cult of Personality and its Consequences</span></a></i><span data-dcnode-id="9330" instrument_node=""> that criticized </span><a class="mw-redirect" data-dcnode-id="9328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalin" title="Stalin"><span data-dcnode-id="9329" instrument_node="">Stalin</span></a><span data-dcnode-id="9327" instrument_node=""> and </span><a data-dcnode-id="9325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stalinism" title="Stalinism"><span data-dcnode-id="9326" instrument_node="">Stalinism</span></a><span data-dcnode-id="9324" instrument_node=""> – especially the </span><a data-dcnode-id="9322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Purge" title="Great Purge"><span data-dcnode-id="9323" instrument_node="">Great Purge</span></a><span data-dcnode-id="9321" instrument_node=""> of Soviet society, of the rank-and-file of the </span><a data-dcnode-id="9319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Armed_Forces" title="Soviet Armed Forces"><span data-dcnode-id="9320" instrument_node="">Soviet Armed Forces</span></a><span data-dcnode-id="9318" instrument_node="">, and of the </span><a data-dcnode-id="9316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="9317" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="9315" instrument_node=""> (CPSU). In light of de-Stalinization, the CPSU's changed ideological orientation – from Stalin's confrontation of the West to Khrushchev's </span><a data-dcnode-id="9313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="9314" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="9312" instrument_node=""> with it– posed problems of ideological credibility and political authority for Mao, who had emulated Stalin's style of leadership and practical application of Marxism–Leninism in the development of </span><a data-dcnode-id="9310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism_with_Chinese_characteristics" title="Socialism with Chinese characteristics"><span data-dcnode-id="9311" instrument_node="">Socialism with Chinese characteristics</span></a><span data-dcnode-id="9309" instrument_node=""> and the PRC as a country.</span><sup class="reference" data-dcnode-id="9306" id="cite_ref-FOOTNOTELüthi201049–50_25-0"><a data-dcnode-id="9307" href="#cite_note-FOOTNOTEL%C3%BCthi201049%E2%80%9350-25"><span data-dcnode-id="9308" instrument_node="">[25]</span></a></sup><span data-dcnode-id="9305" instrument_node="">
</span></p><p data-dcnode-id="9292"><span data-dcnode-id="9303" instrument_node="">The </span><a data-dcnode-id="9301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Revolution_of_1956" title="Hungarian Revolution of 1956"><span data-dcnode-id="9302" instrument_node="">Hungarian Revolution of 1956</span></a><span data-dcnode-id="9300" instrument_node=""> against the rule of Moscow was a severe political concern for Mao, because it had required military intervention to suppress, and its occurrence weakened the political legitimacy of the Communist Party to be in government. In response to that discontent among the European members of the Eastern Bloc, the Chinese Communist Party denounced the USSR's de-Stalinization as </span><a class="mw-redirect" data-dcnode-id="9298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist_revisionism" title="Marxist revisionism"><span data-dcnode-id="9299" instrument_node="">revisionism</span></a><span data-dcnode-id="9297" instrument_node="">, and reaffirmed the Stalinist ideology, policies, and practices of Mao's government as the correct course for achieving socialism in China. This event, indicating Sino-Soviet divergences of Marxist–Leninist practice and interpretation, began fracturing "monolithic communism" — the Western perception of absolute ideological unity in the Eastern Bloc.</span><sup class="reference" data-dcnode-id="9294" id="cite_ref-FOOTNOTELüthi201062–63_26-0"><a data-dcnode-id="9295" href="#cite_note-FOOTNOTEL%C3%BCthi201062%E2%80%9363-26"><span data-dcnode-id="9296" instrument_node="">[26]</span></a></sup><span data-dcnode-id="9293" instrument_node="">
</span></p><p data-dcnode-id="9272"><span data-dcnode-id="9291" instrument_node="">From Mao's perspective, the success of the Soviet foreign policy of </span><a data-dcnode-id="9289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="9290" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="9288" instrument_node=""> with the West would geopolitically isolate the PRC;</span><sup class="reference" data-dcnode-id="9285" id="cite_ref-FOOTNOTELüthi201048_27-0"><a data-dcnode-id="9286" href="#cite_note-FOOTNOTEL%C3%BCthi201048-27"><span data-dcnode-id="9287" instrument_node="">[27]</span></a></sup><span data-dcnode-id="9284" instrument_node=""> whilst the Hungarian Revolution indicated the possibility of revolt in the PRC, and in China's sphere of influence. To thwart such discontent, Mao launched in 1956 the </span><a data-dcnode-id="9282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hundred_Flowers_Campaign" title="Hundred Flowers Campaign"><span data-dcnode-id="9283" instrument_node="">Hundred Flowers Campaign</span></a><span data-dcnode-id="9281" instrument_node=""> of political liberalization – the freedom of speech to criticize government, the bureaucracy, and the CCP publicly. However, the campaign proved too successful when blunt criticism of Mao was voiced.</span><sup class="reference" data-dcnode-id="9278" id="cite_ref-FOOTNOTELüthi201071–73_28-0"><a data-dcnode-id="9279" href="#cite_note-FOOTNOTEL%C3%BCthi201071%E2%80%9373-28"><span data-dcnode-id="9280" instrument_node="">[28]</span></a></sup><span data-dcnode-id="9277" instrument_node=""> Consequent to the relative freedoms of the de-Stalinized USSR, Mao retained the Stalinist model of Marxist–Leninist economy, government, and society.</span><sup class="reference" data-dcnode-id="9274" id="cite_ref-FOOTNOTELüthi201076–77_29-0"><a data-dcnode-id="9275" href="#cite_note-FOOTNOTEL%C3%BCthi201076%E2%80%9377-29"><span data-dcnode-id="9276" instrument_node="">[29]</span></a></sup><span data-dcnode-id="9273" instrument_node="">
</span></p><span data-dcnode-id="9271" instrument_node="">
</span><h3 data-dcnode-id="9261"><span class="mw-headline" data-dcnode-id="9269" id="Conflicting_national_interests"><span data-dcnode-id="9270" instrument_node="">Conflicting national interests</span></span><span class="mw-editsection" data-dcnode-id="9262"><span class="mw-editsection-bracket" data-dcnode-id="9267"><span data-dcnode-id="9268" instrument_node="">[</span></span><a data-dcnode-id="9265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D7" title="Edit section: Conflicting national interests"><span data-dcnode-id="9266" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9263"><span data-dcnode-id="9264" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9260" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9251"><div class="thumbinner" data-dcnode-id="9252" style="width:262px;"><a class="image" data-dcnode-id="9258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATaiwan_Strait.png"><img alt="" class="thumbimage" data-dcnode-id="9259" data-file-height="800" data-file-width="681" decoding="async" height="305" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Taiwan_Strait.png/260px-Taiwan_Strait.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Taiwan_Strait.png/390px-Taiwan_Strait.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Taiwan_Strait.png/520px-Taiwan_Strait.png 2x" width="260"></a><span data-dcnode-id="9257" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9253"><div class="magnify" data-dcnode-id="9255"><a class="internal" data-dcnode-id="9256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATaiwan_Strait.png" title="Enlarge"></a></div><span data-dcnode-id="9254" instrument_node="">The strait of Taiwan</span></div></div></div><span data-dcnode-id="9250" instrument_node="">
</span><p data-dcnode-id="9226"><span data-dcnode-id="9249" instrument_node="">In July 1958, in Beijing, Khrushchev and Mao were negotiating joint Sino-Soviet naval bases in China, from which nuclear-armed </span><a data-dcnode-id="9247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Navy" title="Soviet Navy"><span data-dcnode-id="9248" instrument_node="">Soviet Navy</span></a><span data-dcnode-id="9246" instrument_node=""> </span><a data-dcnode-id="9244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ballistic_missile_submarine" title="Ballistic missile submarine"><span data-dcnode-id="9245" instrument_node="">ballistic missile submarines</span></a><span data-dcnode-id="9243" instrument_node=""> would deter US intervention in East Asia. The agreement failed when Mao accused Khrushchev of trying to establish Soviet control of the PRC's coast.</span><sup class="reference" data-dcnode-id="9240" id="cite_ref-FOOTNOTELüthi201091–92_30-0"><a data-dcnode-id="9241" href="#cite_note-FOOTNOTEL%C3%BCthi201091%E2%80%9392-30"><span data-dcnode-id="9242" instrument_node="">[30]</span></a></sup><span data-dcnode-id="9239" instrument_node=""> At the end of August, Mao sought the PRC's sovereignty upon </span><a data-dcnode-id="9237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan" title="Taiwan"><span data-dcnode-id="9238" instrument_node="">Taiwan</span></a><span data-dcnode-id="9236" instrument_node=""> by attacking the </span><a class="mw-redirect" data-dcnode-id="9234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Matsu_islands" title="Matsu islands"><span data-dcnode-id="9235" instrument_node="">Matsu islands</span></a><span data-dcnode-id="9233" instrument_node=""> and </span><a data-dcnode-id="9231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kinmen" title="Kinmen"><span data-dcnode-id="9232" instrument_node="">Kinmen</span></a><span data-dcnode-id="9230" instrument_node=""> island which resulted in the </span><a data-dcnode-id="9228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Taiwan_Strait_Crisis" title="Second Taiwan Strait Crisis"><span data-dcnode-id="9229" instrument_node="">Second Taiwan Strait Crisis</span></a><span data-dcnode-id="9227" instrument_node="">.
</span></p><p data-dcnode-id="9220"><span data-dcnode-id="9225" instrument_node="">In launching that regional war, Mao did not inform Khrushchev. Formal, ideological response to that geopolitical contingency compelled Khrushchev to revise the USSR's policy of peaceful coexistence to include regional wars, such as the recent Taiwan crisis. Mao's withholding of information from Khrushchev worsened their personal–political relations, especially because the US threatened nuclear war upon China and the USSR, if the PRC invaded Taiwan; thus Mao's continual shoot-outs with Chiang Kai-shek caused Khrushchev to react to Sino-American quarrels about the remnants of the civil war in China.</span><sup class="reference" data-dcnode-id="9222" id="cite_ref-FOOTNOTELüthi2010103_31-0"><a data-dcnode-id="9223" href="#cite_note-FOOTNOTEL%C3%BCthi2010103-31"><span data-dcnode-id="9224" instrument_node="">[31]</span></a></sup><span data-dcnode-id="9221" instrument_node="">
</span></p><p data-dcnode-id="9214"><span data-dcnode-id="9219" instrument_node="">Khrushchev doubted Mao's mental sanity, because his unrealistic policies of geopolitical confrontation might provoke nuclear war between the capitalist and the communist blocs. To thwart Mao's warmongering, Khrushchev cancelled foreign-aid agreements and the delivery of Soviet atomic bombs to the PRC.</span><sup class="reference" data-dcnode-id="9216" id="cite_ref-32"><a data-dcnode-id="9217" href="#cite_note-32"><span data-dcnode-id="9218" instrument_node="">[32]</span></a></sup><span data-dcnode-id="9215" instrument_node="">
</span></p><span data-dcnode-id="9213" instrument_node="">
</span><h3 data-dcnode-id="9203"><span class="mw-headline" data-dcnode-id="9211" id="Two_Chinas"><span data-dcnode-id="9212" instrument_node="">Two Chinas</span></span><span class="mw-editsection" data-dcnode-id="9204"><span class="mw-editsection-bracket" data-dcnode-id="9209"><span data-dcnode-id="9210" instrument_node="">[</span></span><a data-dcnode-id="9207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D8" title="Edit section: Two Chinas"><span data-dcnode-id="9208" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9205"><span data-dcnode-id="9206" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9202" instrument_node="">
