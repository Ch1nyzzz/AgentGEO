</span><h3 data-dcnode-id="8436"><span class="mw-headline" data-dcnode-id="8444" id="Nuclear_China"><span data-dcnode-id="8445" instrument_node="">Nuclear China</span></span><span class="mw-editsection" data-dcnode-id="8437"><span class="mw-editsection-bracket" data-dcnode-id="8442"><span data-dcnode-id="8443" instrument_node="">[</span></span><a data-dcnode-id="8440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D18" title="Edit section: Nuclear China"><span data-dcnode-id="8441" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8438"><span data-dcnode-id="8439" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8435" instrument_node="">
</span><p data-dcnode-id="8426"><span data-dcnode-id="8434" instrument_node="">In the early 1960s, the United States feared that a "nuclear China" would imbalance the bi-polar Cold War between the US and the USSR. To keep the PRC from achieving the geopolitical status of a nuclear power, the US administrations of both John F. Kennedy and Lyndon B. Johnson considered ways either to sabotage or to attack directly the </span><a data-dcnode-id="8432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China_and_weapons_of_mass_destruction" title="China and weapons of mass destruction"><span data-dcnode-id="8433" instrument_node="">Chinese nuclear program</span></a><span data-dcnode-id="8431" instrument_node=""> — aided either by Nationalist China or by the USSR. To avert nuclear war, Khrushchev refused the US offer to participate in a US-Soviet pre-emptive attack against the PRC.
</span><sup class="reference" data-dcnode-id="8428" id="cite_ref-jstor2626706_70-0"><a data-dcnode-id="8429" href="#cite_note-jstor2626706-70"><span data-dcnode-id="8430" instrument_node="">[70]</span></a></sup><span data-dcnode-id="8427" instrument_node="">
</span></p><p data-dcnode-id="8396"><span data-dcnode-id="8425" instrument_node="">To prevent the Chinese from building a nuclear bomb, the </span><a data-dcnode-id="8423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_Armed_Forces" title="United States Armed Forces"><span data-dcnode-id="8424" instrument_node="">United States Armed Forces</span></a><span data-dcnode-id="8422" instrument_node=""> recommended indirect measures, such as diplomacy and propaganda, and direct measures, such as infiltration and sabotage, an invasion by the Chinese Nationalists in Taiwan, maritime blockades, a South Korean invasion of North Korea, conventional air attacks against the nuclear production facilities, and dropping a nuclear bomb against a "selected CHICOM [Chinese Communist] target".</span><sup class="reference" data-dcnode-id="8419" id="cite_ref-71"><a data-dcnode-id="8420" href="#cite_note-71"><span data-dcnode-id="8421" instrument_node="">[71]</span></a></sup><span data-dcnode-id="8418" instrument_node=""> On 16 October 1964, the PRC detonated their first nuclear bomb, a uranium-235 </span><a data-dcnode-id="8416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon_design" title="Nuclear weapon design"><span data-dcnode-id="8417" instrument_node="">implosion-fission device</span></a><span data-dcnode-id="8415" instrument_node="">,</span><sup class="reference" data-dcnode-id="8412" id="cite_ref-:0_72-0"><a data-dcnode-id="8413" href="#cite_note-:0-72"><span data-dcnode-id="8414" instrument_node="">[72]</span></a></sup><span data-dcnode-id="8411" instrument_node=""> with an explosive yield of 22 </span><a class="mw-redirect" data-dcnode-id="8409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kiloton" title="Kiloton"><span data-dcnode-id="8410" instrument_node="">kilotons</span></a><span data-dcnode-id="8408" instrument_node=""> of TNT;</span><sup class="reference" data-dcnode-id="8405" id="cite_ref-73"><a data-dcnode-id="8406" href="#cite_note-73"><span data-dcnode-id="8407" instrument_node="">[73]</span></a></sup><span data-dcnode-id="8404" instrument_node=""> and publicly acknowledged the USSR's technical assistance in realizing </span><a class="mw-redirect" data-dcnode-id="8402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/596_%28nuclear_test%29" title="596 (nuclear test)"><span data-dcnode-id="8403" instrument_node="">Project 596</span></a><span data-dcnode-id="8401" instrument_node="">.</span><sup class="reference" data-dcnode-id="8398" id="cite_ref-74"><a data-dcnode-id="8399" href="#cite_note-74"><span data-dcnode-id="8400" instrument_node="">[74]</span></a></sup><span data-dcnode-id="8397" instrument_node="">
</span></p><p data-dcnode-id="8376"><span data-dcnode-id="8395" instrument_node="">Aware of the Soviet nuclear threat, the PRC built large-scale underground bomb shelters, such as the </span><a data-dcnode-id="8393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underground_City_%28Beijing%29" title="Underground City (Beijing)"><span data-dcnode-id="8394" instrument_node="">Underground City</span></a><span data-dcnode-id="8392" instrument_node=""> in Beijing, and the military bomb shelters of </span><a data-dcnode-id="8390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Underground_Project_131" title="Underground Project 131"><span data-dcnode-id="8391" instrument_node="">Underground Project 131</span></a><span data-dcnode-id="8389" instrument_node="">, a command center in </span><a data-dcnode-id="8387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hubei" title="Hubei"><span data-dcnode-id="8388" instrument_node="">Hubei</span></a><span data-dcnode-id="8386" instrument_node="">, and the </span><a data-dcnode-id="8384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/816_Nuclear_Military_Plant" title="816 Nuclear Military Plant"><span data-dcnode-id="8385" instrument_node="">816 Nuclear Military Plant</span></a><span data-dcnode-id="8383" instrument_node="">, in the </span><a data-dcnode-id="8381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fuling_District" title="Fuling District"><span data-dcnode-id="8382" instrument_node="">Fuling District</span></a><span data-dcnode-id="8380" instrument_node=""> of </span><a data-dcnode-id="8378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chongqing" title="Chongqing"><span data-dcnode-id="8379" instrument_node="">Chongqing</span></a><span data-dcnode-id="8377" instrument_node="">.
</span></p><span data-dcnode-id="8375" instrument_node="">
</span><h3 data-dcnode-id="8365"><span class="mw-headline" data-dcnode-id="8373" id="Geopolitical_pragmatism"><span data-dcnode-id="8374" instrument_node="">Geopolitical pragmatism</span></span><span class="mw-editsection" data-dcnode-id="8366"><span class="mw-editsection-bracket" data-dcnode-id="8371"><span data-dcnode-id="8372" instrument_node="">[</span></span><a data-dcnode-id="8369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D19" title="Edit section: Geopolitical pragmatism"><span data-dcnode-id="8370" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8367"><span data-dcnode-id="8368" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8364" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8355"><div class="thumbinner" data-dcnode-id="8356" style="width:222px;"><a class="image" data-dcnode-id="8362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Richard_Nixon_and_Mao_Zedong.jpg"><img alt="" class="thumbimage" data-dcnode-id="8363" data-file-height="2289" data-file-width="2938" decoding="async" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/President_Richard_Nixon_and_Mao_Zedong.jpg/220px-President_Richard_Nixon_and_Mao_Zedong.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f5/President_Richard_Nixon_and_Mao_Zedong.jpg/330px-President_Richard_Nixon_and_Mao_Zedong.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f5/President_Richard_Nixon_and_Mao_Zedong.jpg/440px-President_Richard_Nixon_and_Mao_Zedong.jpg 2x" width="220"></a><span data-dcnode-id="8361" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8357"><div class="magnify" data-dcnode-id="8359"><a class="internal" data-dcnode-id="8360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Richard_Nixon_and_Mao_Zedong.jpg" title="Enlarge"></a></div><span data-dcnode-id="8358" instrument_node="">To counter the USSR, Chairman Mao met with US President Nixon, and established Sino-American rapprochement, in 1972.</span></div></div></div><span data-dcnode-id="8354" instrument_node="">
</span><p data-dcnode-id="8346"><span data-dcnode-id="8353" instrument_node="">In October 1969, after the seven-month Sino-Soviet border conflict, in Beijing, Premier Alexei Kosygin secretly spoke with Premier Zhou Enlai to determine jointly the demarcation of the Sino-Soviet border. Despite the border demarcation remaining indeterminate, the premiers' meetings restored Sino-Soviet diplomatic communications, which by 1970 allowed Mao to understand that the PRC could not simultaneously fight the US and the USSR while suppressing internal disorders throughout China. In July 1971, the US advisor for national security, </span><a data-dcnode-id="8351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Kissinger" title="Henry Kissinger"><span data-dcnode-id="8352" instrument_node="">Henry Kissinger</span></a><span data-dcnode-id="8350" instrument_node="">, went to Beijing to arrange for </span><a class="mw-redirect" data-dcnode-id="8348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon%2527s_1972_visit_to_China" title="Richard Nixon's 1972 visit to China"><span data-dcnode-id="8349" instrument_node="">President Nixon's visit to China</span></a><span data-dcnode-id="8347" instrument_node="">. Kissinger's Sino-American rapprochement offended the USSR, and Brezhnev then convoked a summit-meeting with Nixon, which re-cast the bi-polar geopolitics of the US-Soviet cold war into the tri-polar geopolitics of the PRC-US-USSR cold war.
</span></p><p data-dcnode-id="8290"><span data-dcnode-id="8345" instrument_node="">Concerning the Sino-Soviet disputes about the demarcation of 4,380 kilometres (2,720&nbsp;mi) of territorial borders, </span><a data-dcnode-id="8343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Propaganda_in_the_Soviet_Union" title="Propaganda in the Soviet Union"><span data-dcnode-id="8344" instrument_node="">Soviet propaganda</span></a><span data-dcnode-id="8342" instrument_node=""> agitated against the PRC's complaint about the unequal 1858 </span><a data-dcnode-id="8340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Aigun" title="Treaty of Aigun"><span data-dcnode-id="8341" instrument_node="">Treaty of Aigun</span></a><span data-dcnode-id="8339" instrument_node=""> and the 1860 </span><a data-dcnode-id="8337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_of_Peking" title="Convention of Peking"><span data-dcnode-id="8338" instrument_node="">Convention of Peking</span></a><span data-dcnode-id="8336" instrument_node="">, which cheated Imperial China of territory and natural resources in the 19th century. To that effect, in the 1972–1973 period, the USSR deleted the Chinese and Manchu place-names – Iman (伊曼, Yiman), Tetyukhe (野猪河, yĕzhūhé), and Suchan – from the map of the </span><a data-dcnode-id="8334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Far_East" title="Russian Far East"><span data-dcnode-id="8335" instrument_node="">Russian Far East</span></a><span data-dcnode-id="8333" instrument_node="">, and replaced them with the Russian place-names: </span><a data-dcnode-id="8331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dalnerechensk" title="Dalnerechensk"><span data-dcnode-id="8332" instrument_node="">Dalnerechensk</span></a><span data-dcnode-id="8330" instrument_node="">, </span><a data-dcnode-id="8328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dalnegorsk" title="Dalnegorsk"><span data-dcnode-id="8329" instrument_node="">Dalnegorsk</span></a><span data-dcnode-id="8327" instrument_node="">, and </span><a data-dcnode-id="8325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partizansk" title="Partizansk"><span data-dcnode-id="8326" instrument_node="">Partizansk</span></a><span data-dcnode-id="8324" instrument_node="">, respectively.</span><sup class="reference" data-dcnode-id="8321" id="cite_ref-stephan_75-0"><a data-dcnode-id="8322" href="#cite_note-stephan-75"><span data-dcnode-id="8323" instrument_node="">[75]</span></a></sup><sup class="reference" data-dcnode-id="8318" id="cite_ref-76"><a data-dcnode-id="8319" href="#cite_note-76"><span data-dcnode-id="8320" instrument_node="">[76]</span></a></sup><span data-dcnode-id="8317" instrument_node=""> To facilitate social acceptance of such cultural revisionism, the </span><a data-dcnode-id="8315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Printed_media_in_the_Soviet_Union" title="Printed media in the Soviet Union"><span data-dcnode-id="8316" instrument_node="">Soviet press</span></a><span data-dcnode-id="8314" instrument_node=""> misrepresented the historical presence of </span><a data-dcnode-id="8312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ethnic_Chinese_in_Russia" title="Ethnic Chinese in Russia"><span data-dcnode-id="8313" instrument_node="">Chinese people</span></a><span data-dcnode-id="8311" instrument_node=""> – in lands gained by the </span><a data-dcnode-id="8309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="8310" instrument_node="">Russian Empire</span></a><span data-dcnode-id="8308" instrument_node=""> – which provoked Russian violence against the local Chinese populations; moreover, politically inconvenient exhibits were removed from museums,</span><sup class="reference" data-dcnode-id="8305" id="cite_ref-stephan_75-1"><a data-dcnode-id="8306" href="#cite_note-stephan-75"><span data-dcnode-id="8307" instrument_node="">[75]</span></a></sup><span data-dcnode-id="8304" instrument_node=""> and vandals covered with cement the </span><a data-dcnode-id="8302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jurchen_script" title="Jurchen script"><span data-dcnode-id="8303" instrument_node="">Jurchen-script</span></a><span data-dcnode-id="8301" instrument_node=""> stele, about the </span><a data-dcnode-id="8299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jin_dynasty_%281115%25E2%2580%25931234%29" title="Jin dynasty (1115–1234)"><span data-dcnode-id="8300" instrument_node="">Jin dynasty</span></a><span data-dcnode-id="8298" instrument_node="">, in </span><a data-dcnode-id="8296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khabarovsk" title="Khabarovsk"><span data-dcnode-id="8297" instrument_node="">Khabarovsk</span></a><span data-dcnode-id="8295" instrument_node="">, some 30 kilometres from the Sino-Soviet border, at the confluence of the Amur and Ussuri rivers.</span><sup class="reference" data-dcnode-id="8292" id="cite_ref-77"><a data-dcnode-id="8293" href="#cite_note-77"><span data-dcnode-id="8294" instrument_node="">[77]</span></a></sup><span data-dcnode-id="8291" instrument_node="">
</span></p><span data-dcnode-id="8289" instrument_node="">
</span><h3 data-dcnode-id="8279"><span class="mw-headline" data-dcnode-id="8287" id="Rivalry_in_the_Third_World"><span data-dcnode-id="8288" instrument_node="">Rivalry in the Third World</span></span><span class="mw-editsection" data-dcnode-id="8280"><span class="mw-editsection-bracket" data-dcnode-id="8285"><span data-dcnode-id="8286" instrument_node="">[</span></span><a data-dcnode-id="8283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D20" title="Edit section: Rivalry in the Third World"><span data-dcnode-id="8284" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8281"><span data-dcnode-id="8282" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8278" instrument_node="">
</span><p data-dcnode-id="8218"><span data-dcnode-id="8277" instrument_node="">In the 1970s, the ideological rivalry between the PRC and the USSR extended into the countries of Africa, Asia and of the Middle East, where each socialist country funded the vanguardism of the local </span><a data-dcnode-id="8275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="8276" instrument_node="">Marxist–Leninist</span></a><span data-dcnode-id="8274" instrument_node=""> parties and militias. Their political advice, financial aid, and military assistance facilitated the realization of </span><a data-dcnode-id="8272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wars_of_national_liberation" title="Wars of national liberation"><span data-dcnode-id="8273" instrument_node="">wars of national liberation</span></a><span data-dcnode-id="8271" instrument_node="">, such as the </span><a data-dcnode-id="8269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ogaden_War" title="Ogaden War"><span data-dcnode-id="8270" instrument_node="">Ogaden War</span></a><span data-dcnode-id="8268" instrument_node=""> between Ethiopia and Somalia; the </span><a data-dcnode-id="8266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rhodesian_Bush_War" title="Rhodesian Bush War"><span data-dcnode-id="8267" instrument_node="">Rhodesian Bush War</span></a><span data-dcnode-id="8265" instrument_node=""> between white European colonists and anti-colonial black natives; the aftermath of the Bush War, the Zimbabwean </span><a data-dcnode-id="8263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gukurahundi" title="Gukurahundi"><span data-dcnode-id="8264" instrument_node="">Gukurahundi</span></a><span data-dcnode-id="8262" instrument_node=""> massacres; the </span><a data-dcnode-id="8260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Angolan_Civil_War" title="Angolan Civil War"><span data-dcnode-id="8261" instrument_node="">Angolan Civil War</span></a><span data-dcnode-id="8259" instrument_node=""> between competing national-liberation groups of guerrillas, which proved to be a US–Soviet </span><a data-dcnode-id="8257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proxy_war" title="Proxy war"><span data-dcnode-id="8258" instrument_node="">proxy war</span></a><span data-dcnode-id="8256" instrument_node="">; the </span><a data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mozambican_Civil_War" title="Mozambican Civil War"><span data-dcnode-id="8255" instrument_node="">Mozambican Civil War</span></a><span data-dcnode-id="8253" instrument_node="">; and the </span><a data-dcnode-id="8251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_political_violence" title="Palestinian political violence"><span data-dcnode-id="8252" instrument_node="">guerrilla factions fighting for the liberation of Palestine</span></a><span data-dcnode-id="8250" instrument_node="">. In </span><a data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thailand" title="Thailand"><span data-dcnode-id="8249" instrument_node="">Thailand</span></a><span data-dcnode-id="8247" instrument_node="">, the pro-Chinese front organizations were based upon the local </span><a data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thai_Chinese" title="Thai Chinese"><span data-dcnode-id="8246" instrument_node="">Chinese minority population</span></a><span data-dcnode-id="8244" instrument_node="">, and thus proved politically ineffective as a Maoist revolutionary vanguard.</span><sup class="reference" data-dcnode-id="8241" id="cite_ref-78"><a data-dcnode-id="8242" href="#cite_note-78"><span data-dcnode-id="8243" instrument_node="">[78]</span></a></sup><span data-dcnode-id="8240" instrument_node=""> In the </span><a data-dcnode-id="8238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="8239" instrument_node="">Soviet–Afghan War</span></a><span data-dcnode-id="8237" instrument_node="">, China covertly supported the opposing guerillas.</span><sup class="reference" data-dcnode-id="8234" id="cite_ref-79"><a data-dcnode-id="8235" href="#cite_note-79"><span data-dcnode-id="8236" instrument_node="">[79]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="8227" style="white-space:nowrap;"><span data-dcnode-id="8233" instrument_node="">[</span><i data-dcnode-id="8229"><a data-dcnode-id="8230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources" title="Wikipedia:Citing sources"><span data-dcnode-id="8231" title="This citation requires a reference to the specific page or range of pages in which the material appears. (August 2020)"><span data-dcnode-id="8232" instrument_node="">page&nbsp;needed</span></span></a></i><span data-dcnode-id="8228" instrument_node="">]</span></sup><span data-dcnode-id="8226" instrument_node=""> The KGB and Afghan </span><a data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KHAD" title="KHAD"><span data-dcnode-id="8225" instrument_node="">KHAD</span></a><span data-dcnode-id="8223" instrument_node=""> cracked down on many prominent pro-China and anti-Soviet activists and guerillas in 1980.</span><sup class="reference" data-dcnode-id="8220" id="cite_ref-80"><a data-dcnode-id="8221" href="#cite_note-80"><span data-dcnode-id="8222" instrument_node="">[80]</span></a></sup><span data-dcnode-id="8219" instrument_node="">
</span></p><span data-dcnode-id="8217" instrument_node="">
</span><h3 data-dcnode-id="8207"><span class="mw-headline" data-dcnode-id="8215" id="Occasional_cooperation"><span data-dcnode-id="8216" instrument_node="">Occasional cooperation</span></span><span class="mw-editsection" data-dcnode-id="8208"><span class="mw-editsection-bracket" data-dcnode-id="8213"><span data-dcnode-id="8214" instrument_node="">[</span></span><a data-dcnode-id="8211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D21" title="Edit section: Occasional cooperation"><span data-dcnode-id="8212" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8209"><span data-dcnode-id="8210" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8206" instrument_node="">
</span><p data-dcnode-id="8175"><span data-dcnode-id="8205" instrument_node="">At times, the 'competition' led to the USSR and PRC supporting the same factions in concert, such as when both supported </span><a data-dcnode-id="8203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Vietnam" title="North Vietnam"><span data-dcnode-id="8204" instrument_node="">North Vietnam</span></a><span data-dcnode-id="8202" instrument_node="">. Both Soviet and Chinese support was vital for the supply of </span><a data-dcnode-id="8200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NLF_and_PAVN_logistics_and_equipment" title="NLF and PAVN logistics and equipment"><span data-dcnode-id="8201" instrument_node="">logistics and equipment to the NLF and PAVN</span></a><span data-dcnode-id="8199" instrument_node="">. Most of the supplies were Soviet, sent through China overland.</span><sup class="reference" data-dcnode-id="8196" id="cite_ref-81"><a data-dcnode-id="8197" href="#cite_note-81"><span data-dcnode-id="8198" instrument_node="">[81]</span></a></sup><span data-dcnode-id="8195" instrument_node=""> Some analyses find that Chinese economic aid was larger than that of the Soviets as early as 1965-1968.</span><sup class="reference" data-dcnode-id="8192" id="cite_ref-82"><a data-dcnode-id="8193" href="#cite_note-82"><span data-dcnode-id="8194" instrument_node="">[82]</span></a></sup><span data-dcnode-id="8191" instrument_node=""> One estimate finds that 1971-1973, the PRC sent the largest amount of aid constituting 90 billion renminbi.</span><sup class="reference" data-dcnode-id="8188" id="cite_ref-:1_9-1"><a data-dcnode-id="8189" href="#cite_note-:1-9"><span data-dcnode-id="8190" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8187" instrument_node=""> Soviet supplies flowed freely through China from before 1965 until 1969, when they were cut off. In 1971 however, China encouraged Vietnam to seek more supplies from the Soviet Union. From 1972, Zhou Enlai encouraged expeditions of Soviet rail trips, missile shipments, allowed 400 Soviet experts to pass to Vietnam, and on 18 June 1971, reopened Soviet freight in Chinese ports. China then agreed to all Vietnamese requests of allowing Soviet warehouses to store materiel for shipment to Vietnam. The end result was a solid, and relatively continuous Communist Bloc support for North Vietnam during the Sino-Soviet split.</span><sup class="reference" data-dcnode-id="8184" id="cite_ref-:1_9-2"><a data-dcnode-id="8185" href="#cite_note-:1-9"><span data-dcnode-id="8186" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8183" instrument_node=""> However, some of the surmounting Soviet and Chinese tensions would grow into the </span><a data-dcnode-id="8181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Vietnamese_War" title="Sino-Vietnamese War"><span data-dcnode-id="8182" instrument_node="">Sino-Vietnamese War</span></a><span data-dcnode-id="8180" instrument_node=""> in 1979.</span><sup class="reference" data-dcnode-id="8177" id="cite_ref-:1_9-3"><a data-dcnode-id="8178" href="#cite_note-:1-9"><span data-dcnode-id="8179" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8176" instrument_node="">
</span></p><span data-dcnode-id="8174" instrument_node="">
</span><h2 data-dcnode-id="8164"><span class="mw-headline" data-dcnode-id="8172" id="After_Mao"><span data-dcnode-id="8173" instrument_node="">After Mao</span></span><span class="mw-editsection" data-dcnode-id="8165"><span class="mw-editsection-bracket" data-dcnode-id="8170"><span data-dcnode-id="8171" instrument_node="">[</span></span><a data-dcnode-id="8168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D22" title="Edit section: After Mao"><span data-dcnode-id="8169" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8166"><span data-dcnode-id="8167" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8163" instrument_node="">
</span><h3 data-dcnode-id="8152"><span data-dcnode-id="8162" id="Transition_from_idealism_to_pragmatism_.281976.E2.80.931978.29"></span><span class="mw-headline" data-dcnode-id="8160" id="Transition_from_idealism_to_pragmatism_(1976–1978)"><span data-dcnode-id="8161" instrument_node="">Transition from idealism to pragmatism (1976–1978)</span></span><span class="mw-editsection" data-dcnode-id="8153"><span class="mw-editsection-bracket" data-dcnode-id="8158"><span data-dcnode-id="8159" instrument_node="">[</span></span><a data-dcnode-id="8156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D23" title="Edit section: Transition from idealism to pragmatism (1976–1978)"><span data-dcnode-id="8157" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8151" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8136"><div class="thumbinner" data-dcnode-id="8137" style="width:222px;"><a class="image" data-dcnode-id="8149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALin_Biao.jpg"><img alt="" class="thumbimage" data-dcnode-id="8150" data-file-height="1194" data-file-width="896" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/48/Lin_Biao.jpg/220px-Lin_Biao.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/48/Lin_Biao.jpg/330px-Lin_Biao.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/48/Lin_Biao.jpg/440px-Lin_Biao.jpg 2x" width="220"></a><span data-dcnode-id="8148" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8138"><div class="magnify" data-dcnode-id="8146"><a class="internal" data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALin_Biao.jpg" title="Enlarge"></a></div><span data-dcnode-id="8145" instrument_node="">The elimination of Marshal </span><a data-dcnode-id="8143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lin_Biao" title="Lin Biao"><span data-dcnode-id="8144" instrument_node="">Lin Biao</span></a><span data-dcnode-id="8142" instrument_node="">, in 1971, lessened the political damage caused by Mao's Cultural Revolution and facilitated the PRC's transition to the </span><i data-dcnode-id="8140"><span data-dcnode-id="8141" instrument_node="">Realpolitik</span></i><span data-dcnode-id="8139" instrument_node=""> of the Tri-polar Cold War.</span></div></div></div><span data-dcnode-id="8135" instrument_node="">
</span><p data-dcnode-id="8102"><span data-dcnode-id="8134" instrument_node="">In 1971, the politically radical phase of the </span><a data-dcnode-id="8132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="8133" instrument_node="">Cultural Revolution</span></a><span data-dcnode-id="8131" instrument_node=""> concluded with the failure of </span><a data-dcnode-id="8129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_571" title="Project 571"><span data-dcnode-id="8130" instrument_node="">Project 571</span></a><span data-dcnode-id="8128" instrument_node=""> (the </span><i data-dcnode-id="8126"><span data-dcnode-id="8127" instrument_node="">coup d'état</span></i><span data-dcnode-id="8125" instrument_node=""> to depose Mao) and the death of the conspirator Marshal </span><a data-dcnode-id="8123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lin_Biao" title="Lin Biao"><span data-dcnode-id="8124" instrument_node="">Lin Biao</span></a><span data-dcnode-id="8122" instrument_node=""> (Mao's executive officer), who had colluded with the </span><a data-dcnode-id="8120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gang_of_Four" title="Gang of Four"><span data-dcnode-id="8121" instrument_node="">Gang of Four</span></a><span data-dcnode-id="8119" instrument_node="">—</span><a data-dcnode-id="8117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jiang_Qing" title="Jiang Qing"><span data-dcnode-id="8118" instrument_node="">Jiang Qing</span></a><span data-dcnode-id="8116" instrument_node=""> (Mao's last wife), </span><a data-dcnode-id="8114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhang_Chunqiao" title="Zhang Chunqiao"><span data-dcnode-id="8115" instrument_node="">Zhang Chunqiao</span></a><span data-dcnode-id="8113" instrument_node="">, </span><a data-dcnode-id="8111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yao_Wenyuan" title="Yao Wenyuan"><span data-dcnode-id="8112" instrument_node="">Yao Wenyuan</span></a><span data-dcnode-id="8110" instrument_node="">, and </span><a data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wang_Hongwen" title="Wang Hongwen"><span data-dcnode-id="8109" instrument_node="">Wang Hongwen</span></a><span data-dcnode-id="8107" instrument_node="">—to assume command of the PRC. As reactionary political radicals, the Gang of Four argued for regression to Stalinist ideological orthodoxy at the expense of internal economic development, but soon were suppressed by the PRC's secret intelligence service.</span><sup class="reference" data-dcnode-id="8104" id="cite_ref-Yao_Wenyuan_83-0"><a data-dcnode-id="8105" href="#cite_note-Yao_Wenyuan-83"><span data-dcnode-id="8106" instrument_node="">[83]</span></a></sup><span data-dcnode-id="8103" instrument_node="">
</span></p><p data-dcnode-id="8071"><span data-dcnode-id="8101" instrument_node="">The re-establishment of Chinese domestic tranquility ended armed confrontation with the USSR but it did not improve diplomatic relations, because in 1973, the </span><a data-dcnode-id="8099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Army" title="Soviet Army"><span data-dcnode-id="8100" instrument_node="">Soviet Army</span></a><span data-dcnode-id="8098" instrument_node=""> garrisons at the Sino-Soviet border were twice as large as in 1969. The continued military threat from the USSR&nbsp;prompted the PRC to denounce "Soviet </span><a data-dcnode-id="8096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_imperialism" title="Social imperialism"><span data-dcnode-id="8097" instrument_node="">social imperialism</span></a><span data-dcnode-id="8095" instrument_node="">", by accusing the USSR of being an enemy of </span><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_revolution" title="World revolution"><span data-dcnode-id="8094" instrument_node="">world revolution</span></a><span data-dcnode-id="8092" instrument_node="">.</span><sup class="reference" data-dcnode-id="8089" id="cite_ref-84"><a data-dcnode-id="8090" href="#cite_note-84"><span data-dcnode-id="8091" instrument_node="">[84]</span></a></sup><span data-dcnode-id="8088" instrument_node=""> Mao's statement that "the Soviet Union today is under the </span><a class="mw-redirect" data-dcnode-id="8086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dictatorship_of_the_bourgeoisie" title="Dictatorship of the bourgeoisie"><span data-dcnode-id="8087" instrument_node="">dictatorship of the bourgeoisie</span></a><span data-dcnode-id="8085" instrument_node="">, a dictatorship of the big bourgeoisie, a dictatorship of the </span><a data-dcnode-id="8083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazism" title="Nazism"><span data-dcnode-id="8084" instrument_node="">German fascist</span></a><span data-dcnode-id="8082" instrument_node=""> type, a dictatorship of the Hitler type." was also repeated by China's state press many times in the 1970s, reiterating the diplomatic position.</span><sup class="reference" data-dcnode-id="8079" id="cite_ref-85"><a data-dcnode-id="8080" href="#cite_note-85"><span data-dcnode-id="8081" instrument_node="">[85]</span></a></sup><sup class="reference" data-dcnode-id="8076" id="cite_ref-86"><a data-dcnode-id="8077" href="#cite_note-86"><span data-dcnode-id="8078" instrument_node="">[86]</span></a></sup><sup class="reference" data-dcnode-id="8073" id="cite_ref-87"><a data-dcnode-id="8074" href="#cite_note-87"><span data-dcnode-id="8075" instrument_node="">[87]</span></a></sup><span data-dcnode-id="8072" instrument_node=""> Sino-Soviet relations would slowly and gradually improve during the 1980s.
</span></p><p data-dcnode-id="8044"><span data-dcnode-id="8070" instrument_node="">A year after </span><a data-dcnode-id="8068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_and_state_funeral_of_Mao_Zedong" title="Death and state funeral of Mao Zedong"><span data-dcnode-id="8069" instrument_node="">Mao's death</span></a><span data-dcnode-id="8067" instrument_node="">, at the </span><a data-dcnode-id="8065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/11th_National_Congress_of_the_Chinese_Communist_Party" title="11th National Congress of the Chinese Communist Party"><span data-dcnode-id="8066" instrument_node="">11th National Congress of the Chinese Communist Party</span></a><span data-dcnode-id="8064" instrument_node=""> in 1977, the politically rehabilitated </span><a data-dcnode-id="8062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="8063" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="8061" instrument_node=""> was appointed to manage internal modernization programs. Avoiding attacks upon Mao, Deng's political moderation began the realization of </span><a data-dcnode-id="8059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_economic_reform" title="Chinese economic reform"><span data-dcnode-id="8060" instrument_node="">Chinese economic reform</span></a><span data-dcnode-id="8058" instrument_node=""> by way of systematic reversals of Mao's inefficient policies, and the transition from a </span><a data-dcnode-id="8056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economy" title="Planned economy"><span data-dcnode-id="8057" instrument_node="">planned economy</span></a><span data-dcnode-id="8055" instrument_node=""> to a </span><a data-dcnode-id="8053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_market_economy" title="Socialist market economy"><span data-dcnode-id="8054" instrument_node="">socialist market economy</span></a><span data-dcnode-id="8052" instrument_node="">.</span><sup class="reference" data-dcnode-id="8049" id="cite_ref-Modern_Thought_1999._pp.&nbsp;349_88-0"><a data-dcnode-id="8050" href="#cite_note-Modern_Thought_1999._pp._349-88"><span data-dcnode-id="8051" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="8046" id="cite_ref-Political_Terms_1983._pp.&nbsp;127_89-0"><a data-dcnode-id="8047" href="#cite_note-Political_Terms_1983._pp._127-89"><span data-dcnode-id="8048" instrument_node="">[89]</span></a></sup><span data-dcnode-id="8045" instrument_node="">
</span></p><span data-dcnode-id="8043" instrument_node="">
</span><h3 data-dcnode-id="8032"><span data-dcnode-id="8042" id="1978.E2.80.931989"></span><span class="mw-headline" data-dcnode-id="8040" id="1978–1989"><span data-dcnode-id="8041" instrument_node="">1978–1989</span></span><span class="mw-editsection" data-dcnode-id="8033"><span class="mw-editsection-bracket" data-dcnode-id="8038"><span data-dcnode-id="8039" instrument_node="">[</span></span><a data-dcnode-id="8036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D24" title="Edit section: 1978–1989"><span data-dcnode-id="8037" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8034"><span data-dcnode-id="8035" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8031" instrument_node="">
</span><p data-dcnode-id="8022"><span data-dcnode-id="8030" instrument_node="">In 1978, the United States and the PRC began to </span><a data-dcnode-id="8028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593United_States_relations%23Normalization" title="China–United States relations"><span data-dcnode-id="8029" instrument_node="">establish diplomatic relations</span></a><span data-dcnode-id="8027" instrument_node="">. US-China military cooperation began in 1979 and in 1981 it was revealed that a joint US-China listening post had been operated in Xinjiang to monitor Soviet missile testing bases.</span><sup class="reference" data-dcnode-id="8024" id="cite_ref-90"><a data-dcnode-id="8025" href="#cite_note-90"><span data-dcnode-id="8026" instrument_node="">[90]</span></a></sup><span data-dcnode-id="8023" instrument_node="">
</span></p><p data-dcnode-id="8006"><span data-dcnode-id="8021" instrument_node="">The Soviet Union provided intelligence and equipment support for Vietnam during the 1979 </span><a data-dcnode-id="8019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Vietnamese_War" title="Sino-Vietnamese War"><span data-dcnode-id="8020" instrument_node="">Sino-Vietnamese War</span></a><span data-dcnode-id="8018" instrument_node="">. Soviet troops were deployed at the Sino-Soviet and Mongolian-Chinese border as an act of showing support to Vietnam. However, the Soviet Union refused to take any direct action to defend their ally.</span><sup class="reference" data-dcnode-id="8015" id="cite_ref-91"><a data-dcnode-id="8016" href="#cite_note-91"><span data-dcnode-id="8017" instrument_node="">[91]</span></a></sup><span data-dcnode-id="8014" instrument_node=""> In December 1979, the </span><a class="mw-redirect" data-dcnode-id="8012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_invasion_of_Afghanistan" title="Soviet invasion of Afghanistan"><span data-dcnode-id="8013" instrument_node="">Soviet invasion of Afghanistan</span></a><span data-dcnode-id="8011" instrument_node=""> led the Chinese to suspend the talks on normalizing relations with the Soviet Union, which began in September of the same year. </span><sup class="reference" data-dcnode-id="8008" id="cite_ref-92"><a data-dcnode-id="8009" href="#cite_note-92"><span data-dcnode-id="8010" instrument_node="">[92]</span></a></sup><span data-dcnode-id="8007" instrument_node="">
</span></p><p data-dcnode-id="7984"><span data-dcnode-id="8005" instrument_node="">In the 1980s, the PRC pursued </span><i data-dcnode-id="8002"><a data-dcnode-id="8003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realpolitik" title="Realpolitik"><span data-dcnode-id="8004" instrument_node="">Realpolitik</span></a></i><span data-dcnode-id="8001" instrument_node=""> policies, such as "seeking truth from facts" and the "Chinese road to socialism", which withdrew the PRC from the high-level abstractions of ideology, </span><a data-dcnode-id="7999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polemic" title="Polemic"><span data-dcnode-id="8000" instrument_node="">polemic</span></a><span data-dcnode-id="7998" instrument_node="">, and the </span><a data-dcnode-id="7996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revisionism_%28Marxism%29" title="Revisionism (Marxism)"><span data-dcnode-id="7997" instrument_node="">revisionism</span></a><span data-dcnode-id="7995" instrument_node=""> of the USSR, which diminished the political importance of the Sino-Soviet split.</span><sup class="reference" data-dcnode-id="7992" id="cite_ref-Modern_Thought_1999._pp.&nbsp;349_88-1"><a data-dcnode-id="7993" href="#cite_note-Modern_Thought_1999._pp._349-88"><span data-dcnode-id="7994" instrument_node="">[88]</span></a></sup><sup class="reference" data-dcnode-id="7989" id="cite_ref-Political_Terms_1983._pp.&nbsp;127_89-1"><a data-dcnode-id="7990" href="#cite_note-Political_Terms_1983._pp._127-89"><span data-dcnode-id="7991" instrument_node="">[89]</span></a></sup><span data-dcnode-id="7988" instrument_node=""> Sino-Soviet relations were finally normalized after </span><a data-dcnode-id="7986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1989_Sino-Soviet_Summit" title="1989 Sino-Soviet Summit"><span data-dcnode-id="7987" instrument_node="">Mikhail Gorbachev visited China in 1989</span></a><span data-dcnode-id="7985" instrument_node=""> and shook Deng’s hand.
</span></p><span data-dcnode-id="7983" instrument_node="">
