</span><p data-dcnode-id="9190"><span data-dcnode-id="9201" instrument_node="">Throughout the 1950s, Khrushchev maintained positive Sino-Soviet relations with foreign aid, especially nuclear technology for the Chinese atomic bomb project, </span><a data-dcnode-id="9199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_596" title="Project 596"><span data-dcnode-id="9200" instrument_node="">Project 596</span></a><span data-dcnode-id="9198" instrument_node="">. However, political tensions persisted because the economic benefits of the USSR's peaceful-coexistence policy voided the belligerent PRC's geopolitical credibility among the nations under Chinese hegemony, especially after a failed PRC–US rapprochement. In the Chinese sphere of influence, that Sino-American diplomatic failure and the presence of </span><a data-dcnode-id="9196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taiwan_and_weapons_of_mass_destruction" title="Taiwan and weapons of mass destruction"><span data-dcnode-id="9197" instrument_node="">US nuclear weapons in Taiwan</span></a><span data-dcnode-id="9195" instrument_node=""> justified Mao's confrontational foreign policies with Taiwan.</span><sup class="reference" data-dcnode-id="9192" id="cite_ref-FOOTNOTELüthi201080_33-0"><a data-dcnode-id="9193" href="#cite_note-FOOTNOTEL%C3%BCthi201080-33"><span data-dcnode-id="9194" instrument_node="">[33]</span></a></sup><span data-dcnode-id="9191" instrument_node="">
</span></p><p data-dcnode-id="9175"><span data-dcnode-id="9189" instrument_node="">In late 1958, the CCP revived Mao's guerrilla-period </span><a data-dcnode-id="9187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cult_of_personality" title="Cult of personality"><span data-dcnode-id="9188" instrument_node="">cult of personality</span></a><span data-dcnode-id="9186" instrument_node=""> to portray </span><i data-dcnode-id="9184"><span data-dcnode-id="9185" instrument_node="">Chairman Mao</span></i><span data-dcnode-id="9183" instrument_node=""> as the charismatic, visionary leader solely qualified to control the policy, administration, and popular mobilization required to realize the </span><a data-dcnode-id="9181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Leap_Forward" title="Great Leap Forward"><span data-dcnode-id="9182" instrument_node="">Great Leap Forward</span></a><span data-dcnode-id="9180" instrument_node=""> to industrialize China.</span><sup class="reference" data-dcnode-id="9177" id="cite_ref-FOOTNOTELüthi201081–83_34-0"><a data-dcnode-id="9178" href="#cite_note-FOOTNOTEL%C3%BCthi201081%E2%80%9383-34"><span data-dcnode-id="9179" instrument_node="">[34]</span></a></sup><span data-dcnode-id="9176" instrument_node=""> Moreover, to the Eastern bloc, Mao portrayed the PRC's warfare with Taiwan and the accelerated modernization of the Great Leap Forward as Stalinist examples of Marxism–Leninism adapted to Chinese conditions. These circumstances allowed ideological Sino-Soviet competition, and Mao publicly criticized Khrushchev's economic and foreign policies as deviations from Marxism–Leninism.
</span></p><span data-dcnode-id="9174" instrument_node="">
</span><h2 data-dcnode-id="9164"><span class="mw-headline" data-dcnode-id="9172" id="Onset_of_the_disputes"><span data-dcnode-id="9173" instrument_node="">Onset of the disputes</span></span><span class="mw-editsection" data-dcnode-id="9165"><span class="mw-editsection-bracket" data-dcnode-id="9170"><span data-dcnode-id="9171" instrument_node="">[</span></span><a data-dcnode-id="9168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D9" title="Edit section: Onset of the disputes"><span data-dcnode-id="9169" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9166"><span data-dcnode-id="9167" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9163" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9154"><div class="thumbinner" data-dcnode-id="9155" style="width:262px;"><a class="image" data-dcnode-id="9161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASino-Soviet_split_1980.svg"><img alt="" class="thumbimage" data-dcnode-id="9162" data-file-height="477" data-file-width="940" decoding="async" height="132" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/260px-Sino-Soviet_split_1980.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/390px-Sino-Soviet_split_1980.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/520px-Sino-Soviet_split_1980.svg.png 2x" width="260"></a><span data-dcnode-id="9160" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9156"><div class="magnify" data-dcnode-id="9158"><a class="internal" data-dcnode-id="9159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASino-Soviet_split_1980.svg" title="Enlarge"></a></div><span data-dcnode-id="9157" instrument_node="">The Communist bloc: pro-Soviet (red), pro-Chinese (yellow), the non-aligned (black) North Korea and Yugoslavia.</span></div></div></div><span data-dcnode-id="9153" instrument_node="">
</span><p data-dcnode-id="9134"><span data-dcnode-id="9152" instrument_node="">To Mao, the events of the 1958–1959 period indicated that Khrushchev was politically untrustworthy as an orthodox Marxist.</span><sup class="reference" data-dcnode-id="9149" id="cite_ref-35"><a data-dcnode-id="9150" href="#cite_note-35"><span data-dcnode-id="9151" instrument_node="">[35]</span></a></sup><span data-dcnode-id="9148" instrument_node=""> In 1959, First Secretary Khrushchev met with US President </span><a class="mw-redirect" data-dcnode-id="9146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_Eisenhower" title="Dwight Eisenhower"><span data-dcnode-id="9147" instrument_node="">Dwight Eisenhower</span></a><span data-dcnode-id="9145" instrument_node=""> to decrease US-Soviet geopolitical tensions. To that end, the USSR: (i) reneged an agreement for technical aid to develop </span><a data-dcnode-id="9143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_596" title="Project 596"><span data-dcnode-id="9144" instrument_node="">Project 596</span></a><span data-dcnode-id="9142" instrument_node="">, and (ii) sided with India in the </span><a data-dcnode-id="9140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Indian_War" title="Sino-Indian War"><span data-dcnode-id="9141" instrument_node="">Sino-Indian War</span></a><span data-dcnode-id="9139" instrument_node="">. Each US-Soviet collaboration offended Mao and he perceived Khrushchev as an opportunist who had become too tolerant of the West. The CCP said that the CPSU concentrated too much on "Soviet–US co-operation for the domination of the world", with geopolitical actions that contradicted Marxism–Leninism.</span><sup class="reference" data-dcnode-id="9136" id="cite_ref-36"><a data-dcnode-id="9137" href="#cite_note-36"><span data-dcnode-id="9138" instrument_node="">[36]</span></a></sup><span data-dcnode-id="9135" instrument_node="">
</span></p><span data-dcnode-id="9133" instrument_node="">
</span><h3 data-dcnode-id="9122"><span data-dcnode-id="9132" id="Khrushchev.27s_criticism_of_Albania_at_the_22nd_CPSU_Congress"></span><span class="mw-headline" data-dcnode-id="9130" id="Khrushchev's_criticism_of_Albania_at_the_22nd_CPSU_Congress"><span data-dcnode-id="9131" instrument_node="">Khrushchev's criticism of Albania at the 22nd CPSU Congress</span></span><span class="mw-editsection" data-dcnode-id="9123"><span class="mw-editsection-bracket" data-dcnode-id="9128"><span data-dcnode-id="9129" instrument_node="">[</span></span><a data-dcnode-id="9126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D10" title="Edit section: Khrushchev's criticism of Albania at the 22nd CPSU Congress"><span data-dcnode-id="9127" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9124"><span data-dcnode-id="9125" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9121" instrument_node="">
</span><p data-dcnode-id="9116"><span data-dcnode-id="9120" instrument_node="">In June 1960, at the zenith of de-Stalinization, the USSR denounced the </span><a class="mw-redirect" data-dcnode-id="9118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Albania" title="People's Republic of Albania"><span data-dcnode-id="9119" instrument_node="">People's Republic of Albania</span></a><span data-dcnode-id="9117" instrument_node=""> as a politically backward country for retaining Stalinism as government and model of socialism. In turn, Bao Sansan said that the CCP's message to the cadres in China was: 
</span></p><span data-dcnode-id="9115" instrument_node="">
</span><blockquote data-dcnode-id="9103"><p data-dcnode-id="9104"><span data-dcnode-id="9114" instrument_node="">"When Khrushchev stopped Russian aid to Albania, </span><a data-dcnode-id="9112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Hoxha" title="Enver Hoxha"><span data-dcnode-id="9113" instrument_node="">Hoxha</span></a><span data-dcnode-id="9111" instrument_node=""> said to his people: 'Even if we have to eat the roots of grass to live, we won't take anything from Russia.' China is not guilty of </span><a data-dcnode-id="9109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chauvinism" title="Chauvinism"><span data-dcnode-id="9110" instrument_node="">chauvinism</span></a><span data-dcnode-id="9108" instrument_node="">, and immediately sent food to our brother country."</span><sup class="reference" data-dcnode-id="9105" id="cite_ref-37"><a data-dcnode-id="9106" href="#cite_note-37"><span data-dcnode-id="9107" instrument_node="">[37]</span></a></sup></p></blockquote><span data-dcnode-id="9102" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9087"><div class="thumbinner" data-dcnode-id="9088" style="width:222px;"><a class="image" data-dcnode-id="9100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMao_Zedong_and_Enver_Hoxha.jpg"><img alt="" class="thumbimage" data-dcnode-id="9101" data-file-height="346" data-file-width="400" decoding="async" height="190" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Mao_Zedong_and_Enver_Hoxha.jpg/220px-Mao_Zedong_and_Enver_Hoxha.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Mao_Zedong_and_Enver_Hoxha.jpg/330px-Mao_Zedong_and_Enver_Hoxha.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/5/5d/Mao_Zedong_and_Enver_Hoxha.jpg 2x" width="220"></a><span data-dcnode-id="9099" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9089"><div class="magnify" data-dcnode-id="9097"><a class="internal" data-dcnode-id="9098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMao_Zedong_and_Enver_Hoxha.jpg" title="Enlarge"></a></div><span data-dcnode-id="9096" instrument_node="">Solidarity: China's Mao Zedong and Albania's </span><a data-dcnode-id="9094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Hoxha" title="Enver Hoxha"><span data-dcnode-id="9095" instrument_node="">Enver Hoxha</span></a><span data-dcnode-id="9093" instrument_node=""> were united in both their stance against </span><a data-dcnode-id="9091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revisionism_%28Marxism%29" title="Revisionism (Marxism)"><span data-dcnode-id="9092" instrument_node="">Revisionism</span></a><span data-dcnode-id="9090" instrument_node=""> as well as retaining Stalinism as the form of government for their countries.</span></div></div></div><span data-dcnode-id="9086" instrument_node="">
</span><p data-dcnode-id="9059"><span data-dcnode-id="9085" instrument_node="">During his opening speech at the CPSU's </span><a data-dcnode-id="9083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/22nd_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="22nd Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="9084" instrument_node="">22nd Party Congress</span></a><span data-dcnode-id="9082" instrument_node=""> on 17 October 1961 in Moscow, Khrushchev once again criticized Albania as a politically backward state and the </span><a class="mw-redirect" data-dcnode-id="9080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albanian_Party_of_Labour" title="Albanian Party of Labour"><span data-dcnode-id="9081" instrument_node="">Albanian Party of Labour</span></a><span data-dcnode-id="9079" instrument_node=""> as well as its leadership, including </span><a data-dcnode-id="9077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Hoxha" title="Enver Hoxha"><span data-dcnode-id="9078" instrument_node="">Enver Hoxha</span></a><span data-dcnode-id="9076" instrument_node="">, for refusing to support reforms against Stalin's legacy, in addition to their criticism of </span><a data-dcnode-id="9074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Belgrade_declaration" title="Belgrade declaration"><span data-dcnode-id="9075" instrument_node="">rapprochement with Yugoslavia</span></a><span data-dcnode-id="9073" instrument_node="">, leading to the </span><a class="mw-redirect" data-dcnode-id="9071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Albanian_split" title="Soviet–Albanian split"><span data-dcnode-id="9072" instrument_node="">Soviet–Albanian split</span></a><span data-dcnode-id="9070" instrument_node="">.</span><sup class="reference" data-dcnode-id="9067" id="cite_ref-38"><a data-dcnode-id="9068" href="#cite_note-38"><span data-dcnode-id="9069" instrument_node="">[38]</span></a></sup><span data-dcnode-id="9066" instrument_node=""> In response to this rebuke, on the 19th of October the delegation representing China at the Party Congress led by </span><a data-dcnode-id="9064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_the_People%2527s_Republic_of_China" title="Premier of the People's Republic of China"><span data-dcnode-id="9065" instrument_node="">Chinese Premier</span></a><span data-dcnode-id="9063" instrument_node=""> </span><a data-dcnode-id="9061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhou_Enlai" title="Zhou Enlai"><span data-dcnode-id="9062" instrument_node="">Zhou Enlai</span></a><span data-dcnode-id="9060" instrument_node=""> sharply criticised Moscow's stance towards Tirana:
</span></p><span data-dcnode-id="9058" instrument_node="">
</span><blockquote data-dcnode-id="9049"><p data-dcnode-id="9050"><span data-dcnode-id="9057" instrument_node="">“We hold that should a dispute or difference unfortunately arise between fraternal parties or fraternal countries, it should be resolved patiently in the spirit of </span><a data-dcnode-id="9055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletarian_internationalism" title="Proletarian internationalism"><span data-dcnode-id="9056" instrument_node="">proletarian internationalism</span></a><span data-dcnode-id="9054" instrument_node=""> and according to the principles of equality and of unanimity through consultation. Public, one-sided censure of any fraternal party does not help unity and is not helpful in resolving problems. To bring a dispute between fraternal parties or fraternal countries into the open in the face of the enemy cannot be regarded as a serious Marxist- Leninist attitude."</span><sup class="reference" data-dcnode-id="9051" id="cite_ref-39"><a data-dcnode-id="9052" href="#cite_note-39"><span data-dcnode-id="9053" instrument_node="">[39]</span></a></sup></p></blockquote><span data-dcnode-id="9048" instrument_node="">
</span><p data-dcnode-id="9036"><span data-dcnode-id="9047" instrument_node="">Subsequently on the 21st of October, Zhou visited the </span><a class="mw-redirect" data-dcnode-id="9045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lenin_Mausoleum" title="Lenin Mausoleum"><span data-dcnode-id="9046" instrument_node="">Lenin Mausoleum</span></a><span data-dcnode-id="9044" instrument_node=""> (then still entombing Stalin's body), laying two wreathes at the base of the site, one of which read "Dedicated to the great Marxist, Comrade Stalin";  on the 23rd of October, the Chinese delegation left Moscow for Beijing early, before the Congress' conclusion; within days, Khrushchev had Stalin's body removed from the mausoleum.</span><sup class="reference" data-dcnode-id="9041" id="cite_ref-40"><a data-dcnode-id="9042" href="#cite_note-40"><span data-dcnode-id="9043" instrument_node="">[40]</span></a></sup><sup class="reference" data-dcnode-id="9038" id="cite_ref-MacFarquhar_41-0"><a data-dcnode-id="9039" href="#cite_note-MacFarquhar-41"><span data-dcnode-id="9040" instrument_node="">[41]</span></a></sup><span data-dcnode-id="9037" instrument_node="">
</span></p><span data-dcnode-id="9035" instrument_node="">
</span><h3 data-dcnode-id="9024"><span data-dcnode-id="9034" id="Mao.2C_Khrushchev.2C_and_the_US"></span><span class="mw-headline" data-dcnode-id="9032" id="Mao,_Khrushchev,_and_the_US"><span data-dcnode-id="9033" instrument_node="">Mao, Khrushchev, and the US</span></span><span class="mw-editsection" data-dcnode-id="9025"><span class="mw-editsection-bracket" data-dcnode-id="9030"><span data-dcnode-id="9031" instrument_node="">[</span></span><a data-dcnode-id="9028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D11" title="Edit section: Mao, Khrushchev, and the US"><span data-dcnode-id="9029" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9026"><span data-dcnode-id="9027" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9023" instrument_node="">
</span><p data-dcnode-id="9005"><span data-dcnode-id="9022" instrument_node="">In 1960, Mao expected Khrushchev to deal aggressively with </span><a data-dcnode-id="9020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_D._Eisenhower" title="Dwight D. Eisenhower"><span data-dcnode-id="9021" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="9019" instrument_node=""> by holding him to account for the USSR having </span><a data-dcnode-id="9017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1960_U-2_incident" title="1960 U-2 incident"><span data-dcnode-id="9018" instrument_node="">shot down a U-2 spy plane</span></a><span data-dcnode-id="9016" instrument_node="">, the </span><a data-dcnode-id="9014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Intelligence_Agency" title="Central Intelligence Agency"><span data-dcnode-id="9015" instrument_node="">CIA</span></a><span data-dcnode-id="9013" instrument_node="">'s photographing of military bases in the USSR; aerial espionage that the US said had been discontinued. In Paris, at the </span><a class="mw-redirect" data-dcnode-id="9011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1960_Paris_Summit" title="1960 Paris Summit"><span data-dcnode-id="9012" instrument_node="">Four Powers Summit</span></a><span data-dcnode-id="9010" instrument_node=""> meeting, Khrushchev demanded and failed to receive Eisenhower's apology for the CIA's continued aerial espionage of the USSR. In China, Mao and the CCP interpreted Eisenhower's refusal to apologize as disrespectful of the national sovereignty of socialist countries, and held political rallies aggressively demanding Khrushchev's military confrontation with US aggressors; without such decisive action, Khrushchev lost face with the PRC.</span><sup class="reference" data-dcnode-id="9007" id="cite_ref-42"><a data-dcnode-id="9008" href="#cite_note-42"><span data-dcnode-id="9009" instrument_node="">[42]</span></a></sup><span data-dcnode-id="9006" instrument_node="">
</span></p><p data-dcnode-id="8987"><span data-dcnode-id="9004" instrument_node="">In the Romanian capital of </span><a data-dcnode-id="9002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bucharest" title="Bucharest"><span data-dcnode-id="9003" instrument_node="">Bucharest</span></a><span data-dcnode-id="9001" instrument_node="">, at the </span><a data-dcnode-id="8999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1960_International_Meeting_of_Communist_and_Workers_Parties" title="1960 International Meeting of Communist and Workers Parties"><span data-dcnode-id="9000" instrument_node="">International Meeting of Communist and Workers Parties</span></a><span data-dcnode-id="8998" instrument_node=""> (November 1960), Mao and Khrushchev respectively attacked the Soviet and the Chinese interpretations of </span><a class="mw-redirect" data-dcnode-id="8996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism-Leninism" title="Marxism-Leninism"><span data-dcnode-id="8997" instrument_node="">Marxism-Leninism</span></a><span data-dcnode-id="8995" instrument_node=""> as the wrong road to world socialism in the USSR and in China. Mao said that Khrushchev's emphases on consumer goods and material plenty would make the Soviets ideologically soft and un-revolutionary, to which Khrushchev replied: "If we could promise the people nothing, except revolution, they would scratch their heads and say: 'Isn't it better to have good goulash?</span><span data-dcnode-id="8993" style="padding-right:.15em;"><span data-dcnode-id="8994" instrument_node="">'</span></span><span data-dcnode-id="8992" instrument_node="">"</span><sup class="reference" data-dcnode-id="8989" id="cite_ref-FOOTNOTEChi-Kwan201349_43-0"><a data-dcnode-id="8990" href="#cite_note-FOOTNOTEChi-Kwan201349-43"><span data-dcnode-id="8991" instrument_node="">[43]</span></a></sup><span data-dcnode-id="8988" instrument_node="">
</span></p><span data-dcnode-id="8986" instrument_node="">
</span><h3 data-dcnode-id="8976"><span class="mw-headline" data-dcnode-id="8984" id="Personal_attacks"><span data-dcnode-id="8985" instrument_node="">Personal attacks</span></span><span class="mw-editsection" data-dcnode-id="8977"><span class="mw-editsection-bracket" data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">[</span></span><a data-dcnode-id="8980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D12" title="Edit section: Personal attacks"><span data-dcnode-id="8981" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8978"><span data-dcnode-id="8979" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8975" instrument_node="">
</span><p data-dcnode-id="8957"><span data-dcnode-id="8974" instrument_node="">In the 1960s, public displays of acrimonious quarrels about Marxist-Leninist doctrine characterized relations between hardline Stalinist Chinese and post-Stalinist Soviet Communists. At the </span><a data-dcnode-id="8972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_Communist_Party" title="Romanian Communist Party"><span data-dcnode-id="8973" instrument_node="">Romanian Communist Party Congress</span></a><span data-dcnode-id="8971" instrument_node="">, the CCP's senior officer </span><a data-dcnode-id="8969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peng_Zhen" title="Peng Zhen"><span data-dcnode-id="8970" instrument_node="">Peng Zhen</span></a><span data-dcnode-id="8968" instrument_node=""> quarrelled with Khrushchev, after the latter had insulted Mao as being a Chinese nationalist, a geopolitical adventurist, and an </span><a data-dcnode-id="8966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deviationism" title="Deviationism"><span data-dcnode-id="8967" instrument_node="">ideological deviationist</span></a><span data-dcnode-id="8965" instrument_node=""> from Marxism-Leninism. In turn, Peng insulted Khrushchev as a </span><a data-dcnode-id="8963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-revisionism" title="Anti-revisionism"><span data-dcnode-id="8964" instrument_node="">revisionist</span></a><span data-dcnode-id="8962" instrument_node=""> whose régime showed him to be a "patriarchal, arbitrary, and tyrannical" ruler.</span><sup class="reference" data-dcnode-id="8959" id="cite_ref-44"><a data-dcnode-id="8960" href="#cite_note-44"><span data-dcnode-id="8961" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8958" instrument_node=""> In the event, Khrushchev denounced the PRC with 80 pages of criticism to the congress of the PRC. 
</span></p><p data-dcnode-id="8944"><span data-dcnode-id="8956" instrument_node="">In response to the insults, Khrushchev withdrew 1,400 Soviet technicians from the PRC, which cancelled some 200 joint scientific projects. In response, Mao justified his belief that Khrushchev had somehow caused China's great economic failures and the famines that occurred in the period of the Great Leap Forward. Nonetheless, the PRC and the USSR remained pragmatic allies, which allowed Mao to alleviate famine in China and to resolve Sino-Indian border disputes. To Mao, Khrushchev had lost political authority and ideological credibility, because his US-Soviet </span><i data-dcnode-id="8953"><a data-dcnode-id="8954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25A9tente" title="Détente"><span data-dcnode-id="8955" instrument_node="">détente</span></a></i><span data-dcnode-id="8952" instrument_node=""> had resulted in successful military (aerial) espionage against the USSR and public confrontation with an unapologetic capitalist enemy. Khrushchev's miscalculation of person and circumstance voided US-Soviet diplomacy at the </span><a class="mw-redirect" data-dcnode-id="8950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1960_Paris_Summit" title="1960 Paris Summit"><span data-dcnode-id="8951" instrument_node="">Four Powers Summit in Paris</span></a><span data-dcnode-id="8949" instrument_node="">.</span><sup class="reference" data-dcnode-id="8946" id="cite_ref-FOOTNOTEChi-Kwan201349–50_45-0"><a data-dcnode-id="8947" href="#cite_note-FOOTNOTEChi-Kwan201349%E2%80%9350-45"><span data-dcnode-id="8948" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8945" instrument_node="">
</span></p><span data-dcnode-id="8943" instrument_node="">
</span><h3 data-dcnode-id="8933"><span class="mw-headline" data-dcnode-id="8941" id="Monolithic_Communism_fractured"><span data-dcnode-id="8942" instrument_node="">Monolithic Communism fractured</span></span><span class="mw-editsection" data-dcnode-id="8934"><span class="mw-editsection-bracket" data-dcnode-id="8939"><span data-dcnode-id="8940" instrument_node="">[</span></span><a data-dcnode-id="8937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D13" title="Edit section: Monolithic Communism fractured"><span data-dcnode-id="8938" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8935"><span data-dcnode-id="8936" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8932" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8914"><div class="thumbinner" data-dcnode-id="8915" style="width:252px;"><a class="image" data-dcnode-id="8930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJupiter_IRBM.jpg"><img alt="" class="thumbimage" data-dcnode-id="8931" data-file-height="545" data-file-width="682" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Jupiter_IRBM.jpg/250px-Jupiter_IRBM.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Jupiter_IRBM.jpg/375px-Jupiter_IRBM.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Jupiter_IRBM.jpg/500px-Jupiter_IRBM.jpg 2x" width="250"></a><span data-dcnode-id="8929" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8916"><div class="magnify" data-dcnode-id="8927"><a class="internal" data-dcnode-id="8928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJupiter_IRBM.jpg" title="Enlarge"></a></div><span data-dcnode-id="8926" instrument_node="">In late 1962, the Cuban Missile Crisis concluded when the US and the USSR respectively agreed to remove intermediate-range </span><a data-dcnode-id="8924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/PGM-19_Jupiter" title="PGM-19 Jupiter"><span data-dcnode-id="8925" instrument_node="">PGM-19 Jupiter</span></a><span data-dcnode-id="8923" instrument_node=""> nuclear missiles from Italy and Turkey, and to remove intermediate-range </span><a data-dcnode-id="8921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R-12_Dvina" title="R-12 Dvina"><span data-dcnode-id="8922" instrument_node="">R-12 Dvina</span></a><span data-dcnode-id="8920" instrument_node=""> and </span><a data-dcnode-id="8918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/R-14_Chusovaya" title="R-14 Chusovaya"><span data-dcnode-id="8919" instrument_node="">R-14 Chusovaya</span></a><span data-dcnode-id="8917" instrument_node=""> nuclear missiles from Cuba. In the context of the Sino-Soviet split, Mao said that the USSR's military stand-down was Khrushchev's betrayal of Marxist–Leninist geopolitics.</span></div></div></div><span data-dcnode-id="8913" instrument_node="">
</span><p data-dcnode-id="8904"><span data-dcnode-id="8912" instrument_node="">In late 1961, at the </span><a data-dcnode-id="8910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/22nd_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="22nd Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="8911" instrument_node="">22nd Congress of the CPSU</span></a><span data-dcnode-id="8909" instrument_node="">, the PRC and the USSR revisited their doctrinal disputes about the orthodox interpretation and application of Marxism–Leninism.</span><sup class="reference" data-dcnode-id="8906" id="cite_ref-46"><a data-dcnode-id="8907" href="#cite_note-46"><span data-dcnode-id="8908" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8905" instrument_node=""> In December 1961, the USSR broke diplomatic relations with Albania, which escalated the Sino-Soviet disputes from the political-party level to the national-government level.
</span></p><p data-dcnode-id="8870"><span data-dcnode-id="8903" instrument_node="">In late 1962, the PRC broke relations with the USSR because Khrushchev did not go to war with the US over the </span><a data-dcnode-id="8901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="8902" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="8900" instrument_node="">. Regarding that Soviet loss-of-face, Mao said that "Khrushchev has moved from adventurism to capitulationism" with a negotiated, bilateral, military stand-down. Khrushchev replied that Mao's belligerent foreign policies would lead to an East–West nuclear war.</span><sup class="reference" data-dcnode-id="8897" id="cite_ref-47"><a data-dcnode-id="8898" href="#cite_note-47"><span data-dcnode-id="8899" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8896" instrument_node=""> For the Western powers, the averted atomic war threatened by the Cuban Missile Crisis made </span><a data-dcnode-id="8894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_disarmament" title="Nuclear disarmament"><span data-dcnode-id="8895" instrument_node="">nuclear disarmament</span></a><span data-dcnode-id="8893" instrument_node=""> their political priority. To that end, the US, the UK, and the USSR agreed to the </span><a data-dcnode-id="8891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partial_Nuclear_Test_Ban_Treaty" title="Partial Nuclear Test Ban Treaty"><span data-dcnode-id="8892" instrument_node="">Partial Nuclear Test Ban Treaty</span></a><span data-dcnode-id="8890" instrument_node=""> in 1963, which formally forbade </span><a data-dcnode-id="8888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons_testing" title="Nuclear weapons testing"><span data-dcnode-id="8889" instrument_node="">nuclear-detonation tests</span></a><span data-dcnode-id="8887" instrument_node=""> in the </span><a data-dcnode-id="8885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atmosphere_of_Earth" title="Atmosphere of Earth"><span data-dcnode-id="8886" instrument_node="">Earth's atmosphere</span></a><span data-dcnode-id="8884" instrument_node="">, in </span><a data-dcnode-id="8882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outer_space" title="Outer space"><span data-dcnode-id="8883" instrument_node="">outer space</span></a><span data-dcnode-id="8881" instrument_node="">, and </span><a class="mw-redirect" data-dcnode-id="8879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Under_water" title="Under water"><span data-dcnode-id="8880" instrument_node="">under water</span></a><span data-dcnode-id="8878" instrument_node=""> – yet did allow the underground testing and detonation of atomic bombs. In that time, the PRC's nuclear-weapons program, </span><a data-dcnode-id="8876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Project_596" title="Project 596"><span data-dcnode-id="8877" instrument_node="">Project 596</span></a><span data-dcnode-id="8875" instrument_node="">, was nascent, and Mao perceived the test-ban treaty as the nuclear powers' attempt to thwart the PRC's becoming a nuclear superpower.</span><sup class="reference" data-dcnode-id="8872" id="cite_ref-FOOTNOTEChi-Kwan201353–55_48-0"><a data-dcnode-id="8873" href="#cite_note-FOOTNOTEChi-Kwan201353%E2%80%9355-48"><span data-dcnode-id="8874" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8871" instrument_node="">
</span></p><p data-dcnode-id="8857"><span data-dcnode-id="8869" instrument_node="">Between 6–20 July 1963, a series of Soviet-Chinese negotiations were held in Moscow. However, both sides maintained their own ideological views and, therefore, negotiations failed.</span><sup class="reference" data-dcnode-id="8866" id="cite_ref-49"><a data-dcnode-id="8867" href="#cite_note-49"><span data-dcnode-id="8868" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8865" instrument_node=""> In March 1964, the </span><a data-dcnode-id="8863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_Communist_Party" title="Romanian Communist Party"><span data-dcnode-id="8864" instrument_node="">Romanian Workers' Party</span></a><span data-dcnode-id="8862" instrument_node=""> publicly announced the intention of the Bucharest authorities to mediate the Sino-Soviet conflict. In reality, however, the Romanian mediation approach represented only a pretext for forging a Sino-Romanian rapprochement, without arousing the Soviets' suspicions.</span><sup class="reference" data-dcnode-id="8859" id="cite_ref-50"><a data-dcnode-id="8860" href="#cite_note-50"><span data-dcnode-id="8861" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8858" instrument_node="">
</span></p><p data-dcnode-id="8813"><span data-dcnode-id="8856" instrument_node="">Romania was neutral in the Sino-Soviet split.</span><sup class="reference" data-dcnode-id="8853" id="cite_ref-51"><a data-dcnode-id="8854" href="#cite_note-51"><span data-dcnode-id="8855" instrument_node="">[51]</span></a></sup><sup class="reference" data-dcnode-id="8850" id="cite_ref-52"><a data-dcnode-id="8851" href="#cite_note-52"><span data-dcnode-id="8852" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="8847" id="cite_ref-53"><a data-dcnode-id="8848" href="#cite_note-53"><span data-dcnode-id="8849" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8846" instrument_node=""> Its neutrality in the Sino-Soviet dispute along with being the small Communist country with the most influence in global affairs enabled Romania to be recognized by the world as the "third force" of the Communist world. Romania's independence - achieved in the early 1960s through its </span><a data-dcnode-id="8844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-satellization_of_Communist_Romania" title="De-satellization of Communist Romania"><span data-dcnode-id="8845" instrument_node="">freeing from its Soviet satellite status</span></a><span data-dcnode-id="8843" instrument_node=""> - was tolerated by Moscow because Romania was not bordering the </span><a data-dcnode-id="8841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="8842" instrument_node="">Iron Curtain</span></a><span data-dcnode-id="8840" instrument_node=""> - being surrounded by socialist states - and because its ruling party was not going to abandon Communism.</span><sup class="reference" data-dcnode-id="8837" id="cite_ref-54"><a data-dcnode-id="8838" href="#cite_note-54"><span data-dcnode-id="8839" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="8834" id="cite_ref-55"><a data-dcnode-id="8835" href="#cite_note-55"><span data-dcnode-id="8836" instrument_node="">[55]</span></a></sup><span data-dcnode-id="8833" instrument_node=""> </span><a data-dcnode-id="8831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="8832" instrument_node="">North Korea</span></a><span data-dcnode-id="8830" instrument_node=""> under </span><a data-dcnode-id="8828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kim_Il-sung" title="Kim Il-sung"><span data-dcnode-id="8829" instrument_node="">Kim Il-sung</span></a><span data-dcnode-id="8827" instrument_node=""> also remained neutral because of its strategic status after the </span><a data-dcnode-id="8825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="8826" instrument_node="">Korean War</span></a><span data-dcnode-id="8824" instrument_node="">, although it later moved more decisively towards the USSR after </span><a data-dcnode-id="8822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Deng_Xiaoping" title="Deng Xiaoping"><span data-dcnode-id="8823" instrument_node="">Deng Xiaoping</span></a><span data-dcnode-id="8821" instrument_node="">'s </span><a data-dcnode-id="8819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_economic_reform" title="Chinese economic reform"><span data-dcnode-id="8820" instrument_node="">Chinese economic reform</span></a><span data-dcnode-id="8818" instrument_node="">.</span><sup class="reference" data-dcnode-id="8815" id="cite_ref-56"><a data-dcnode-id="8816" href="#cite_note-56"><span data-dcnode-id="8817" instrument_node="">[56]</span></a></sup><span data-dcnode-id="8814" instrument_node="">
</span></p><p data-dcnode-id="8801"><span data-dcnode-id="8812" instrument_node="">As a Marxist–Leninist, Mao was much angered that Khrushchev did not go to war with the US over their failed </span><a data-dcnode-id="8810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bay_of_Pigs_Invasion" title="Bay of Pigs Invasion"><span data-dcnode-id="8811" instrument_node="">Bay of Pigs Invasion</span></a><span data-dcnode-id="8809" instrument_node=""> and the </span><a data-dcnode-id="8807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_embargo_against_Cuba" title="United States embargo against Cuba"><span data-dcnode-id="8808" instrument_node="">United States embargo against Cuba</span></a><span data-dcnode-id="8806" instrument_node=""> of continual economic and agricultural sabotage. For the Eastern Bloc, Mao addressed those Sino-Soviet matters in "Nine Letters" critical of Khrushchev and his leadership of the USSR. Moreover, the break with the USSR allowed Mao to reorient the development of the PRC with formal relations (diplomatic, economic, political) with the countries of Asia, Africa, and Latin America.</span><sup class="reference" data-dcnode-id="8803" id="cite_ref-FOOTNOTEChi-Kwan201353–55_48-1"><a data-dcnode-id="8804" href="#cite_note-FOOTNOTEChi-Kwan201353%E2%80%9355-48"><span data-dcnode-id="8805" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8802" instrument_node="">
</span></p><span data-dcnode-id="8800" instrument_node="">
</span><h3 data-dcnode-id="8790"><span class="mw-headline" data-dcnode-id="8798" id="Formal_and_informal_statements"><span data-dcnode-id="8799" instrument_node="">Formal and informal statements</span></span><span class="mw-editsection" data-dcnode-id="8791"><span class="mw-editsection-bracket" data-dcnode-id="8796"><span data-dcnode-id="8797" instrument_node="">[</span></span><a data-dcnode-id="8794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D14" title="Edit section: Formal and informal statements"><span data-dcnode-id="8795" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8792"><span data-dcnode-id="8793" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8789" instrument_node="">
</span><link data-dcnode-id="8788" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><link data-dcnode-id="8787" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><link data-dcnode-id="8786" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><table class="infobox" data-dcnode-id="8713"><tbody data-dcnode-id="8714"><tr data-dcnode-id="8783"><th class="infobox-above" colspan="2" data-dcnode-id="8784" style="background-color:#b0c4de"><span data-dcnode-id="8785" instrument_node="">Sino-Soviet split</span></th></tr><tr data-dcnode-id="8779" style="display:none;"><td class="infobox-full-data" colspan="2" data-dcnode-id="8780"><link data-dcnode-id="8782" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><link data-dcnode-id="8781" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"></td></tr><tr data-dcnode-id="8776"><th class="infobox-header" colspan="2" data-dcnode-id="8777" style="background-color: #b0c4de;"><span data-dcnode-id="8778" instrument_node="">Chinese name</span></th></tr><tr data-dcnode-id="8768"><th class="infobox-label" data-dcnode-id="8773" scope="row" style="font-weight:normal;"><a data-dcnode-id="8774" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Traditional_Chinese_characters" title="Traditional Chinese characters"><span data-dcnode-id="8775" instrument_node="">Traditional&nbsp;Chinese</span></a></th><td class="infobox-data" data-dcnode-id="8769"><span data-dcnode-id="8770" title="Chinese-language text"><span data-dcnode-id="8771" lang="zh-Hant" style="font-size: 1rem;"><span data-dcnode-id="8772" instrument_node="">中蘇交惡</span></span></span></td></tr><tr data-dcnode-id="8760"><th class="infobox-label" data-dcnode-id="8765" scope="row" style="font-weight:normal;"><a data-dcnode-id="8766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simplified_Chinese_characters" title="Simplified Chinese characters"><span data-dcnode-id="8767" instrument_node="">Simplified Chinese</span></a></th><td class="infobox-data" data-dcnode-id="8761"><span data-dcnode-id="8762" title="Chinese-language text"><span data-dcnode-id="8763" lang="zh-Hans" style="font-size: 1rem;"><span data-dcnode-id="8764" instrument_node="">中苏交恶</span></span></span></td></tr><tr data-dcnode-id="8737"><td class="infobox-full-data" colspan="2" data-dcnode-id="8738"><link data-dcnode-id="8759" href="mw-data:TemplateStyles:r1066479718" rel="mw-deduplicated-inline-style"><table class="infobox-subbox collapsible collapsed mw-collapsible mw-collapsed mw-made-collapsible" data-dcnode-id="8739" style="display:inline-table; text-align: left;"><tbody data-dcnode-id="8740"><tr data-dcnode-id="8753"><th class="infobox-above" colspan="2" data-dcnode-id="8754" style="font-size: 100%; text-align: left; background-color: #f9ffbc;"><span aria-expanded="false" class="mw-collapsible-toggle mw-collapsible-toggle-default mw-collapsible-toggle-collapsed" data-dcnode-id="8756" role="button" tabindex="0"><a class="mw-collapsible-text" data-dcnode-id="8757"><span data-dcnode-id="8758" instrument_node="">show</span></a></span><span data-dcnode-id="8755" instrument_node="">Transcriptions</span></th></tr><tr data-dcnode-id="8749" style="display: none;"><th class="infobox-header" colspan="2" data-dcnode-id="8750" style="background-color: #dcffc9;"><a data-dcnode-id="8751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Standard_Chinese" title="Standard Chinese"><span data-dcnode-id="8752" instrument_node="">Standard Mandarin</span></a></th></tr><tr data-dcnode-id="8741" style="display: none;"><th class="infobox-label" data-dcnode-id="8746" scope="row" style="font-weight:normal;"><a class="mw-redirect" data-dcnode-id="8747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hanyu_Pinyin" title="Hanyu Pinyin"><span data-dcnode-id="8748" instrument_node="">Hanyu Pinyin</span></a></th><td class="infobox-data" data-dcnode-id="8742"><span data-dcnode-id="8743" title="Chinese-language romanization"><span data-dcnode-id="8744" lang="zh-Latn" style="font-style: normal"><span data-dcnode-id="8745" instrument_node="">Zhōngsū jiāowù</span></span></span></td></tr></tbody></table></td></tr><tr data-dcnode-id="8734"><th class="infobox-header" colspan="2" data-dcnode-id="8735" style="background-color: #b0c4de;"><span data-dcnode-id="8736" instrument_node="">Russian name</span></th></tr><tr data-dcnode-id="8726"><th class="infobox-label" data-dcnode-id="8731" scope="row" style="font-weight:normal;"><a data-dcnode-id="8732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_language" title="Russian language"><span data-dcnode-id="8733" instrument_node="">Russian</span></a></th><td class="infobox-data" data-dcnode-id="8727"><span data-dcnode-id="8728" title="Russian-language text"><span data-dcnode-id="8729" lang="ru"><span data-dcnode-id="8730" instrument_node="">Советско–китайский раскол</span></span></span></td></tr><tr data-dcnode-id="8718"><th class="infobox-label" data-dcnode-id="8723" scope="row" style="font-weight:normal;"><a data-dcnode-id="8724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanization_of_Russian" title="Romanization of Russian"><span data-dcnode-id="8725" instrument_node="">Romanization</span></a></th><td class="infobox-data" data-dcnode-id="8719"><span data-dcnode-id="8720" title="Russian-language text"><i data-dcnode-id="8721" lang="ru-Latn"><span data-dcnode-id="8722" instrument_node="">Sovetsko–kitayskiy raskol</span></i></span></td></tr><tr data-dcnode-id="8715" style="display:none"><td colspan="2" data-dcnode-id="8716"><span data-dcnode-id="8717" instrument_node="">
</span></td></tr></tbody></table><span data-dcnode-id="8712" instrument_node="">
</span><p data-dcnode-id="8687"><span data-dcnode-id="8711" instrument_node="">In the 1960s, the Sino-Soviet split allowed only written communications between the PRC and the USSR, in which each country supported their geopolitical actions with formal statements of Marxist–Leninist ideology as the true road to </span><a data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_communism" title="World communism"><span data-dcnode-id="8710" instrument_node="">world communism</span></a><span data-dcnode-id="8708" instrument_node="">, which is the </span><a data-dcnode-id="8706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_line_of_the_party" title="General line of the party"><span data-dcnode-id="8707" instrument_node="">general line of the party</span></a><span data-dcnode-id="8705" instrument_node="">. In June 1963, the PRC published </span><i data-dcnode-id="8703"><span data-dcnode-id="8704" instrument_node="">The Chinese Communist Party's Proposal Concerning the General Line of the International Communist Movement</span></i><span data-dcnode-id="8702" instrument_node="">,</span><sup class="reference" data-dcnode-id="8699" id="cite_ref-57"><a data-dcnode-id="8700" href="#cite_note-57"><span data-dcnode-id="8701" instrument_node="">[57]</span></a></sup><span data-dcnode-id="8698" instrument_node=""> to which the USSR replied with the </span><i data-dcnode-id="8696"><span data-dcnode-id="8697" instrument_node="">Open Letter of the Communist Party of the Soviet Union</span></i><span data-dcnode-id="8695" instrument_node="">; each ideological stance perpetuated the Sino-Soviet split.</span><sup class="reference" data-dcnode-id="8692" id="cite_ref-58"><a data-dcnode-id="8693" href="#cite_note-58"><span data-dcnode-id="8694" instrument_node="">[58]</span></a></sup><span data-dcnode-id="8691" instrument_node=""> In 1964, Mao said that, in light of the Chinese and Soviet differences about the interpretation and practical application of Orthodox Marxism, a counter-revolution had occurred and re-established capitalism in the USSR; consequently, following Soviet suit, the </span><a data-dcnode-id="8689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="8690" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="8688" instrument_node=""> countries broke relations with the PRC.
</span></p><p data-dcnode-id="8644"><span data-dcnode-id="8686" instrument_node="">In late 1964, after Nikita Khrushchev had been deposed, Chinese Premier </span><a data-dcnode-id="8684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhou_Enlai" title="Zhou Enlai"><span data-dcnode-id="8685" instrument_node="">Zhou Enlai</span></a><span data-dcnode-id="8683" instrument_node=""> met with the new Soviet leaders, First Secretary </span><a data-dcnode-id="8681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="8682" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="8680" instrument_node=""> and Premier </span><a data-dcnode-id="8678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexei_Kosygin" title="Alexei Kosygin"><span data-dcnode-id="8679" instrument_node="">Alexei Kosygin</span></a><span data-dcnode-id="8677" instrument_node="">, but their ideological differences proved a diplomatic impasse to renewed economic relations. The Soviet defense minister's statement damaged the prospects of improved Sino-Soviet relations. Historian Daniel Leese noted that improvement of the relations "that had seemed possible after Khrushchev's fall evaporated after the Soviet minister of defense, </span><a data-dcnode-id="8675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodion_Malinovsky" title="Rodion Malinovsky"><span data-dcnode-id="8676" instrument_node="">Rodion Malinovsky</span></a><span data-dcnode-id="8674" instrument_node="">... approached Chinese Marshal </span><a data-dcnode-id="8672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/He_Long" title="He Long"><span data-dcnode-id="8673" instrument_node="">He Long</span></a><span data-dcnode-id="8671" instrument_node="">, member of the Chinese delegation to Moscow, and asked when China would finally get rid of Mao like the </span><a class="mw-redirect" data-dcnode-id="8669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CPSU" title="CPSU"><span data-dcnode-id="8670" instrument_node="">CPSU</span></a><span data-dcnode-id="8668" instrument_node=""> had disposed of Khrushchev."</span><sup class="reference" data-dcnode-id="8665" id="cite_ref-59"><a data-dcnode-id="8666" href="#cite_note-59"><span data-dcnode-id="8667" instrument_node="">[59]</span></a></sup><span data-dcnode-id="8664" instrument_node=""> Back in China, Zhou reported to Mao that Brezhnev's Soviet government retained the policy of </span><a data-dcnode-id="8662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="8663" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="8661" instrument_node=""> which Mao had denounced as "</span><a data-dcnode-id="8659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Khrushchevism" title="Khrushchevism"><span data-dcnode-id="8660" instrument_node="">Khrushchevism</span></a><span data-dcnode-id="8658" instrument_node=""> without Khrushchev"; despite the change of leadership, the Sino-Soviet split remained open. At the </span><a data-dcnode-id="8656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glassboro_Summit_Conference" title="Glassboro Summit Conference"><span data-dcnode-id="8657" instrument_node="">Glassboro Summit Conference</span></a><span data-dcnode-id="8655" instrument_node="">, between Kosygin and US President </span><a data-dcnode-id="8653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_B._Johnson" title="Lyndon B. Johnson"><span data-dcnode-id="8654" instrument_node="">Lyndon B. Johnson</span></a><span data-dcnode-id="8652" instrument_node="">, the PRC accused the USSR of betraying the peoples of the Eastern bloc countries. The official interpretation, by </span><a class="mw-redirect" data-dcnode-id="8650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radio_Peking" title="Radio Peking"><span data-dcnode-id="8651" instrument_node="">Radio Peking</span></a><span data-dcnode-id="8649" instrument_node="">, reported that US and Soviet politicians discussed "a great conspiracy, on a worldwide basis ... criminally selling the rights of the revolution of [the] Vietnam people, [of the] Arabs, as well as [those of] Asian, African, and Latin-American peoples, to US imperialists".</span><sup class="reference" data-dcnode-id="8646" id="cite_ref-ap19670624_60-0"><a data-dcnode-id="8647" href="#cite_note-ap19670624-60"><span data-dcnode-id="8648" instrument_node="">[60]</span></a></sup><span data-dcnode-id="8645" instrument_node="">
</span></p><span data-dcnode-id="8643" instrument_node="">
</span><h2 data-dcnode-id="8633"><span class="mw-headline" data-dcnode-id="8641" id="Conflict"><span data-dcnode-id="8642" instrument_node="">Conflict</span></span><span class="mw-editsection" data-dcnode-id="8634"><span class="mw-editsection-bracket" data-dcnode-id="8639"><span data-dcnode-id="8640" instrument_node="">[</span></span><a data-dcnode-id="8637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D15" title="Edit section: Conflict"><span data-dcnode-id="8638" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8635"><span data-dcnode-id="8636" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8632" instrument_node="">
</span><h3 data-dcnode-id="8622"><span class="mw-headline" data-dcnode-id="8630" id="Cultural_Revolution"><span data-dcnode-id="8631" instrument_node="">Cultural Revolution</span></span><span class="mw-editsection" data-dcnode-id="8623"><span class="mw-editsection-bracket" data-dcnode-id="8628"><span data-dcnode-id="8629" instrument_node="">[</span></span><a data-dcnode-id="8626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D16" title="Edit section: Cultural Revolution"><span data-dcnode-id="8627" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8624"><span data-dcnode-id="8625" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8621" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8609"><div class="thumbinner" data-dcnode-id="8610" style="width:252px;"><a class="image" data-dcnode-id="8619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1966-11_1966%25E5%25B9%25B4%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E6%259E%2597%25E5%25BD%25AA%25E4%25B8%258E%25E7%25BA%25A2%25E5%258D%25AB%25E5%2585%25B5.jpg"><img alt="" class="thumbimage" data-dcnode-id="8620" data-file-height="1127" data-file-width="613" decoding="async" height="460" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/51/1966-11_1966%25E5%25B9%25B4%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E6%259E%2597%25E5%25BD%25AA%25E4%25B8%258E%25E7%25BA%25A2%25E5%258D%25AB%25E5%2585%25B5.jpg/250px-1966-11_1966%25E5%25B9%25B4%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E6%259E%2597%25E5%25BD%25AA%25E4%25B8%258E%25E7%25BA%25A2%25E5%258D%25AB%25E5%2585%25B5.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/51/1966-11_1966%E5%B9%B4%E6%AF%9B%E6%B3%BD%E4%B8%9C%E6%9E%97%E5%BD%AA%E4%B8%8E%E7%BA%A2%E5%8D%AB%E5%85%B5.jpg/375px-1966-11_1966%E5%B9%B4%E6%AF%9B%E6%B3%BD%E4%B8%9C%E6%9E%97%E5%BD%AA%E4%B8%8E%E7%BA%A2%E5%8D%AB%E5%85%B5.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/51/1966-11_1966%E5%B9%B4%E6%AF%9B%E6%B3%BD%E4%B8%9C%E6%9E%97%E5%BD%AA%E4%B8%8E%E7%BA%A2%E5%8D%AB%E5%85%B5.jpg/500px-1966-11_1966%E5%B9%B4%E6%AF%9B%E6%B3%BD%E4%B8%9C%E6%9E%97%E5%BD%AA%E4%B8%8E%E7%BA%A2%E5%8D%AB%E5%85%B5.jpg 2x" width="250"></a><span data-dcnode-id="8618" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8611"><div class="magnify" data-dcnode-id="8616"><a class="internal" data-dcnode-id="8617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1966-11_1966%25E5%25B9%25B4%25E6%25AF%259B%25E6%25B3%25BD%25E4%25B8%259C%25E6%259E%2597%25E5%25BD%25AA%25E4%25B8%258E%25E7%25BA%25A2%25E5%258D%25AB%25E5%2585%25B5.jpg" title="Enlarge"></a></div><span data-dcnode-id="8615" instrument_node="">A public appearance of Chairman Mao and Vice Chairman </span><a data-dcnode-id="8613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lin_Biao" title="Lin Biao"><span data-dcnode-id="8614" instrument_node="">Lin Biao</span></a><span data-dcnode-id="8612" instrument_node=""> among Red Guards, in Beijing, during the Cultural Revolution (November 1966)</span></div></div></div><span data-dcnode-id="8608" instrument_node="">
</span><p data-dcnode-id="8596"><span data-dcnode-id="8607" instrument_node="">To regain political supremacy in the PRC, Mao launched the </span><a data-dcnode-id="8605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cultural_Revolution" title="Cultural Revolution"><span data-dcnode-id="8606" instrument_node="">Great Proletarian Cultural Revolution</span></a><span data-dcnode-id="8604" instrument_node=""> in 1966 to counter the Soviet-style bureaucracies (personal-power-centres) that had become established in education, agriculture, and industrial management. Abiding Mao's proclamations for universal ideological orthodoxy, schools and universities closed throughout China when students organized themselves into politically radical </span><a class="mw-redirect" data-dcnode-id="8602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Guards_%28China%29" title="Red Guards (China)"><span data-dcnode-id="8603" instrument_node="">Red Guards</span></a><span data-dcnode-id="8601" instrument_node="">. Lacking a leader, a political purpose, and a social function, the ideologically discrete units of Red Guards soon degenerated into political factions, each of whom claimed to be more Maoist than the other factions.</span><sup class="reference" data-dcnode-id="8598" id="cite_ref-61"><a data-dcnode-id="8599" href="#cite_note-61"><span data-dcnode-id="8600" instrument_node="">[61]</span></a></sup><span data-dcnode-id="8597" instrument_node="">
</span></p><p data-dcnode-id="8578"><span data-dcnode-id="8595" instrument_node="">In establishing the ideological orthodoxy presented in the </span><a class="mw-redirect" data-dcnode-id="8593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Little_Red_Book" title="Little Red Book"><span data-dcnode-id="8594" instrument_node="">Little Red Book</span></a><span data-dcnode-id="8592" instrument_node=""> (</span><i data-dcnode-id="8590"><span data-dcnode-id="8591" instrument_node="">Quotations from Chairman Mao Tse-tung</span></i><span data-dcnode-id="8589" instrument_node="">), the political violence of the Red Guards provoked civil war in parts of China, which Mao suppressed with the </span><a data-dcnode-id="8587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Liberation_Army" title="People's Liberation Army"><span data-dcnode-id="8588" instrument_node="">People's Liberation Army</span></a><span data-dcnode-id="8586" instrument_node=""> (PLA), who imprisoned the fractious Red Guards. Moreover, when Red Guard factionalism occurred within the PLA – Mao's base of political power – he dissolved the Red Guards, and then reconstituted the CCP with the new generation of Maoists who had endured and survived the Cultural Revolution that </span><a data-dcnode-id="8584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purge" title="Purge"><span data-dcnode-id="8585" instrument_node="">purged</span></a><span data-dcnode-id="8583" instrument_node=""> the "anti-Communist" old generation from the party and from China.</span><sup class="reference" data-dcnode-id="8580" id="cite_ref-The_Columbia_Encyclopedia_1993._p.&nbsp;696_62-0"><a data-dcnode-id="8581" href="#cite_note-The_Columbia_Encyclopedia_1993._p._696-62"><span data-dcnode-id="8582" instrument_node="">[62]</span></a></sup><span data-dcnode-id="8579" instrument_node="">
</span></p><p data-dcnode-id="8543"><span data-dcnode-id="8577" instrument_node="">As social engineering, the Cultural Revolution reasserted the political primacy of </span><a data-dcnode-id="8575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maoism" title="Maoism"><span data-dcnode-id="8576" instrument_node="">Maoism</span></a><span data-dcnode-id="8574" instrument_node="">, but also stressed, strained, and broke the PRC's relations with the USSR and the West.</span><sup class="reference" data-dcnode-id="8571" id="cite_ref-63"><a data-dcnode-id="8572" href="#cite_note-63"><span data-dcnode-id="8573" instrument_node="">[63]</span></a></sup><span data-dcnode-id="8570" instrument_node=""> Geopolitically, despite their querulous "Maoism vs. Marxism–Leninism" disputes about interpretations and practical applications of </span><a class="mw-redirect" data-dcnode-id="8568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism-Leninism" title="Marxism-Leninism"><span data-dcnode-id="8569" instrument_node="">Marxism-Leninism</span></a><span data-dcnode-id="8567" instrument_node="">, the USSR and the PRC advised, aided, and supplied </span><a data-dcnode-id="8565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Vietnam" title="North Vietnam"><span data-dcnode-id="8566" instrument_node="">North Vietnam</span></a><span data-dcnode-id="8564" instrument_node=""> during the </span><a data-dcnode-id="8562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vietnam_War" title="Vietnam War"><span data-dcnode-id="8563" instrument_node="">Vietnam War</span></a><span data-dcnode-id="8561" instrument_node="">,</span><sup class="reference" data-dcnode-id="8558" id="cite_ref-64"><a data-dcnode-id="8559" href="#cite_note-64"><span data-dcnode-id="8560" instrument_node="">[64]</span></a></sup><span data-dcnode-id="8557" instrument_node=""> which Mao had defined as a peasant revolution against foreign imperialism. In socialist solidarity, the PRC allowed safe passage for the Soviet Union's </span><i data-dcnode-id="8555"><span data-dcnode-id="8556" instrument_node="">matériel</span></i><span data-dcnode-id="8554" instrument_node=""> to North Vietnam to prosecute the war against the US-sponsored </span><a data-dcnode-id="8552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Vietnam" title="South Vietnam"><span data-dcnode-id="8553" instrument_node="">Republic of Vietnam</span></a><span data-dcnode-id="8551" instrument_node="">, until 1968, after the Chinese withdrawal.</span><sup class="reference" data-dcnode-id="8548" id="cite_ref-65"><a data-dcnode-id="8549" href="#cite_note-65"><span data-dcnode-id="8550" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="8545" id="cite_ref-66"><a data-dcnode-id="8546" href="#cite_note-66"><span data-dcnode-id="8547" instrument_node="">[66]</span></a></sup><span data-dcnode-id="8544" instrument_node="">
</span></p><span data-dcnode-id="8542" instrument_node="">
</span><h3 data-dcnode-id="8532"><span class="mw-headline" data-dcnode-id="8540" id="Border_conflict"><span data-dcnode-id="8541" instrument_node="">Border conflict</span></span><span class="mw-editsection" data-dcnode-id="8533"><span class="mw-editsection-bracket" data-dcnode-id="8538"><span data-dcnode-id="8539" instrument_node="">[</span></span><a data-dcnode-id="8536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DSino-Soviet_split%26action%3Dedit%26section%3D17" title="Edit section: Border conflict"><span data-dcnode-id="8537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8534"><span data-dcnode-id="8535" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8531" instrument_node="">
</span><link data-dcnode-id="8530" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8526" role="note"><span data-dcnode-id="8529" instrument_node="">Main article: </span><a data-dcnode-id="8527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_border_conflict" title="Sino-Soviet border conflict"><span data-dcnode-id="8528" instrument_node="">Sino-Soviet border conflict</span></a></div><span data-dcnode-id="8525" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8516"><div class="thumbinner" data-dcnode-id="8517" style="width:242px;"><a class="image" data-dcnode-id="8523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChina_USSR_E_88.jpg"><img alt="" class="thumbimage" data-dcnode-id="8524" data-file-height="1278" data-file-width="1030" decoding="async" height="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/11/China_USSR_E_88.jpg/240px-China_USSR_E_88.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/11/China_USSR_E_88.jpg/360px-China_USSR_E_88.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/11/China_USSR_E_88.jpg/480px-China_USSR_E_88.jpg 2x" width="240"></a><span data-dcnode-id="8522" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8518"><div class="magnify" data-dcnode-id="8520"><a class="internal" data-dcnode-id="8521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AChina_USSR_E_88.jpg" title="Enlarge"></a></div><span data-dcnode-id="8519" instrument_node="">The Sino-Soviet split allowed minor border disputes to escalate to firefights for areas of the Argun and Amur rivers (Damansky–Zhenbao is southeast, north of the lake (2 March – 11 September 1969).</span></div></div></div><span data-dcnode-id="8515" instrument_node="">
</span><p data-dcnode-id="8506"><span data-dcnode-id="8514" instrument_node="">In the late 1960s, the continual quarrelling between the CCP and the CPSU about the correct interpretations and applications of Marxism–Leninism escalated to small-scale warfare at the </span><a data-dcnode-id="8512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China%25E2%2580%2593Russia_border" title="China–Russia border"><span data-dcnode-id="8513" instrument_node="">Sino-Soviet border</span></a><span data-dcnode-id="8511" instrument_node="">.</span><sup class="reference" data-dcnode-id="8508" id="cite_ref-Lüthi,_Lorenz_M._2008_p._340_67-0"><a data-dcnode-id="8509" href="#cite_note-L%C3%BCthi,_Lorenz_M._2008_p._340-67"><span data-dcnode-id="8510" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8507" instrument_node="">
</span></p><p data-dcnode-id="8492"><span data-dcnode-id="8505" instrument_node="">In 1966, for diplomatic resolution, the Chinese revisited the national matter of the Sino-Soviet border demarcated in the 19th century, but originally imposed upon the </span><a class="mw-redirect" data-dcnode-id="8503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Qing_Dynasty" title="Qing Dynasty"><span data-dcnode-id="8504" instrument_node="">Qing Dynasty</span></a><span data-dcnode-id="8502" instrument_node=""> by way of unequal treaties that annexed Chinese territory to the </span><a data-dcnode-id="8500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="8501" instrument_node="">Russian Empire</span></a><span data-dcnode-id="8499" instrument_node="">. Despite not asking the return of territory, the PRC asked the USSR to acknowledge formally and publicly that such an historic injustice against China (the 19th-century border) was dishonestly realized with the 1858 </span><a data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Aigun" title="Treaty of Aigun"><span data-dcnode-id="8498" instrument_node="">Treaty of Aigun</span></a><span data-dcnode-id="8496" instrument_node=""> and the 1860 </span><a data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Convention_of_Peking" title="Convention of Peking"><span data-dcnode-id="8495" instrument_node="">Convention of Peking</span></a><span data-dcnode-id="8493" instrument_node="">. The Soviet government ignored the matter.
</span></p><p data-dcnode-id="8456"><span data-dcnode-id="8491" instrument_node="">In 1968, the </span><a data-dcnode-id="8489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Army" title="Soviet Army"><span data-dcnode-id="8490" instrument_node="">Soviet Army</span></a><span data-dcnode-id="8488" instrument_node=""> had massed along the 4,380-kilometre (2,720&nbsp;mi) border with the PRC, especially at the </span><a data-dcnode-id="8486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Xinjiang" title="Xinjiang"><span data-dcnode-id="8487" instrument_node="">Xinjiang</span></a><span data-dcnode-id="8485" instrument_node=""> frontier, in </span><a data-dcnode-id="8483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northwest_China" title="Northwest China"><span data-dcnode-id="8484" instrument_node="">north-west China</span></a><span data-dcnode-id="8482" instrument_node="">, where the Soviets might readily induce the </span><a data-dcnode-id="8480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkic_peoples" title="Turkic peoples"><span data-dcnode-id="8481" instrument_node="">Turkic peoples</span></a><span data-dcnode-id="8479" instrument_node=""> into a separatist insurrection. In 1961, the USSR had stationed 12 divisions of soldiers and 200 aeroplanes at that border. By 1968, the </span><a data-dcnode-id="8477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Armed_Forces" title="Soviet Armed Forces"><span data-dcnode-id="8478" instrument_node="">Soviet Armed Forces</span></a><span data-dcnode-id="8476" instrument_node=""> had stationed six divisions of soldiers in </span><a data-dcnode-id="8474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Outer_Mongolia" title="Outer Mongolia"><span data-dcnode-id="8475" instrument_node="">Outer Mongolia</span></a><span data-dcnode-id="8473" instrument_node=""> and 16 divisions, 1,200 aeroplanes, and 120 medium-range missiles at the Sino-Soviet border to confront 47 light divisions of the Chinese Army. By March 1969, the border confrontations </span><a data-dcnode-id="8471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_border_conflict" title="Sino-Soviet border conflict"><span data-dcnode-id="8472" instrument_node="">escalated</span></a><span data-dcnode-id="8470" instrument_node="">, including fighting at the </span><a data-dcnode-id="8468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ussuri" title="Ussuri"><span data-dcnode-id="8469" instrument_node="">Ussuri River</span></a><span data-dcnode-id="8467" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="8465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zhenbao_Island_incident" title="Zhenbao Island incident"><span data-dcnode-id="8466" instrument_node="">Zhenbao Island incident</span></a><span data-dcnode-id="8464" instrument_node="">, and </span><a data-dcnode-id="8462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tielieketi" title="Tielieketi"><span data-dcnode-id="8463" instrument_node="">Tielieketi</span></a><span data-dcnode-id="8461" instrument_node="">.</span><sup class="reference" data-dcnode-id="8458" id="cite_ref-Lüthi,_Lorenz_M._2008_p._340_67-1"><a data-dcnode-id="8459" href="#cite_note-L%C3%BCthi,_Lorenz_M._2008_p._340-67"><span data-dcnode-id="8460" instrument_node="">[67]</span></a></sup><span data-dcnode-id="8457" instrument_node="">
</span></p><p data-dcnode-id="8447"><span data-dcnode-id="8455" instrument_node="">After the border conflict, "spy wars" involving numerous espionage agents occurred on Soviet and Chinese territory through the 1970s.</span><sup class="reference" data-dcnode-id="8452" id="cite_ref-68"><a data-dcnode-id="8453" href="#cite_note-68"><span data-dcnode-id="8454" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="8449" id="cite_ref-69"><a data-dcnode-id="8450" href="#cite_note-69"><span data-dcnode-id="8451" instrument_node="">[69]</span></a></sup><span data-dcnode-id="8448" instrument_node="">
</span></p><span data-dcnode-id="8446" instrument_node="">
