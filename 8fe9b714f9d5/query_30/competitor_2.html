</span><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The key role of military power is only shown clearly when someone does disturb the existing patterns of influence. We saw what happens then in the Middle East in 1990-1. Saddam Hussein of Iraq tried to escape from economic problems at home by seizing the oil rich statelet of Kuwait. The US ruling class saw a threat to the whole network of influence that enabled it to exercise leverage over the world’s number one commodity, oil. It undertook a massive deployment of military force which culminated in the bombing and the physical destruction of half the Iraqi armed forces.</span></p><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">There were arguments within the US ruling class over the tactics needed to deal with Saddam Hussein—especially over whether to use force simply to blockade Iraq or to move to all out war. But hardly anyone inside the ruling class challenged the assumption that it had to take concerted action to protect the networks of influence built up by its state. And the arguments certainly were not, as analyses like Nigel Harris’s suggest they should be, between the representatives of state power and the representatives of a capitalism which no longer needed its links to a national state.</span></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Capitalist interests in different parts of the world certainly expected the outcome of the war to increase the ability of US-based firms to get their way in international trade negotiations. They saw it as enhancing the possibilities for US capital, just as they had seen German unification as giving a big boost to German capital. So, while sections of US capital expected to benefit from their increased influence over Saudi Arabia and their virtual monopoly over contracts to rebuild Kuwait, an editorial in the leading Japanese business daily could warn that, ‘Japan should not stand idly by while the Anglo-Saxons create a new world order… Japan should take note of the anti-American, anti-colonial and pro-Islamic sentiments expressed in many Asian countries’.”J</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">The gains from military victory may well not be as great as expected—certainly, German capital is having trouble reaping any great gains from unification. The point, however, is that the overwhelming majority of capitalists still see their stale as essential to their chances of success.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The Gulf War will not be the last military confrontation between capitalist states. As John Rees and Alex Callinicos have both pointed out previously in this journal, the weakening of the geopolitical influence of the Soviet ruling class increases the instability of important areas of the world and the chances of small states inadvertently treading on the toes of stronger ones—leading them to use the force they previously only threatened to use. It is difficult to imagine either the Middle East or Eastern Europe stabilising sufficiently to reduce the chances of intra-regional conflicts which might well then draw in bigger powers. Hardly was the Gulf War over than George Bush was warning the Iranians not to intervene in Southern Iraq and, in ‘an unprecedented intervention’, telling the leaders of Croatia and Serbia not to overthrow the federal government of Yugoslavia.”5 Meanwhile the disproportion between the USSR’s present economic weakness and its continued military strength may well prompt its rulers to begin to intervene again in regional conflicts close to their own borders.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The world may no longer be made up of capitals fused one hundred percent to states. But it is not, and cannot be, a world in which capitals float free of states. It is a hybrid world, in which each capital increasingly spreads beyond state boundaries but at the same time depends as much as ever on its state (or, sometimes, its states). This is a world in which capitals look to both economic competition and political influence for obtaining the resources for accumulation. It is a world in which the jostling for position between capitals involves not only peaceful competition for markets but also the carving out of political alliances, not only arguments over trading arrangements but also the reinforcement of these arguments through the deployment of military force. It is a world which has gone beyond the stage of state capitalism, but which can neither slide backwards into a pure market system nor evolve gently forward into a new order of regional states. It is a world, in short, beset by a multitude of contradictory pressures and compelled, therefore, to experience one convulsive political crisis after another.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="661"></p><h2 data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Notes</span></h2><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="657"></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">M Kidron, ‘Two Insights Do Not Make a Theory’, Internationa/ Socialism (old series) 100; C Harman, ‘Better an Old Insight Than a Wrong Theory’, a reply to M Kidron, in International Socialism (old series) 100, and Explaining the Crisis, ch 3; N Harris. Of Bread and Guns and The End of the Third World; A Callinicos, ‘Imperialism, Capitalism and the State Today—a review of Nigel Harris’s ‘The End of the Third World’, Internationalism Socialism: 35.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">H Gulalp quite rightly observes that the discussion between Miliband and Poulantzas over the ‘autonomy’ of the capitalist state accepts ‘the liberal theory of the state’. They both ‘start from the premise of an analytical distinction between the economic and the political. This leads to the conception of the state as an independent entity with a power distinct from the relations of class domination’, while in reality the state has the job of maintaining the overall conditions for capital accumulation. ‘Capital Accumulation, Classes and the Relative Autonomy of the State’, Science and Society, vol 51 no 3, Fall 1987..</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">3      See R Miliband. The State in Capitalist Society: ‘Reply to Nicos Poulantzas’, New Left Review 59, January-February 1970; ‘Analysing the Bourgeois State’, New Left Review 82, November-December 1972; ‘Debates on the Slate’, New Left Review 138, March-April 1983.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">4      N Poulantzas, Political Power and Social Classes: ‘The problem of the Capitalist State’, New Left Review 58, November-December 1970; ‘Controversy over the State’, New Left Review 95, January-February 1976; ‘Dual Power and the State’, New Left Review 109, May-June 1978. This is what I take to be Poulantzas’ argument. But I have to admit that Poulantzas’ way of writing was so convoluted and obscure I could be wrong. I suspect few people will take the pointless labour of ploughing through his prose to see if that is so.</span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">5      This was, for instance, the sense of the contributions by P Anderson and F Halliday to the discussion after Robert Brenner’s 1987 Isaac Deutscher Memorial Lecture in London.</span></p><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">6      This, essentially, is what A Barnett argues in his Soviet Freedom, 1988.</span></p><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">7      N Harris in Socialist Worker Review (London, September 1987). He is referring specifically to the demonstrations in South Korea of August 1987, but it is clear that he sees his comments as having wider implications, as being part of a trend towards the emergence of a genuinely international capitalist class.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">8      VI Lenin. Imperialism: the Highest Stage of Capita/ism’, N Bukharin, Imperialism and the World Economy (with and introduction by Lenin) and The Economics of the Transformation Period (with marginal notes by Lenin).</span></p><span data-dcnode-id="632" instrument_node="">
