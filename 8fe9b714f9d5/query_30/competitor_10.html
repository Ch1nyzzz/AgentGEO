</span><h1 data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Soviet Show Trials </span></h1><span data-dcnode-id="1641" instrument_node="">
</span></header><div class="spacer" data-dcnode-id="1639"></div><span data-dcnode-id="1638" instrument_node="">
</span><nav data-dcnode-id="1610" id="inpage-links"><header data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Sections</span></header><ul data-dcnode-id="1611"><li data-dcnode-id="1633"><a data-dcnode-id="1634" href="#section1"><span data-dcnode-id="1635" instrument_node="">Assassination of Sergy Kirov </span></a></li><li data-dcnode-id="1630"><a data-dcnode-id="1631" href="#section2"><span data-dcnode-id="1632" instrument_node="">Zinoviev, Kamenev and Smirnov (August, 1936) </span></a></li><li data-dcnode-id="1627"><a data-dcnode-id="1628" href="#section3"><span data-dcnode-id="1629" instrument_node="">Piatakov, Radek and Sokolnikov (January, 1937) </span></a></li><li data-dcnode-id="1624"><a data-dcnode-id="1625" href="#section4"><span data-dcnode-id="1626" instrument_node="">Purge of the Soviet Army </span></a></li><li data-dcnode-id="1621"><a data-dcnode-id="1622" href="#section5"><span data-dcnode-id="1623" instrument_node="">Bukharin, Rykov and Yagoda (March, 1938) </span></a></li><li class="large" data-dcnode-id="1618"><a data-dcnode-id="1619" href="#source"><span data-dcnode-id="1620" instrument_node="">Primary Sources</span></a></li><li class="large" data-dcnode-id="1615"><a data-dcnode-id="1616" href="#activities"><span data-dcnode-id="1617" instrument_node="">Student Activities</span></a></li><li class="large" data-dcnode-id="1612"><a data-dcnode-id="1613" href="#references"><span data-dcnode-id="1614" instrument_node="">References</span></a></li></ul></nav><span data-dcnode-id="1609" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1608" instrument_node="">After the death of his wife, </span><a class="ajax" data-dcnode-id="1606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSstalin.htm"><span data-dcnode-id="1607" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="1605" instrument_node=""> became very close to </span><a class="ajax" data-dcnode-id="1603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkirov.htm"><span data-dcnode-id="1604" instrument_node="">Sergey Kirov</span></a><span data-dcnode-id="1602" instrument_node="">. The two men went on holiday together and many felt that he was being groomed for the future leadership of the party by Stalin. This appeared to give him more confidence and at meetings of the </span><a class="ajax" data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSpolitburo.htm"><span data-dcnode-id="1601" instrument_node="">Politburo</span></a><span data-dcnode-id="1599" instrument_node=""> he sometimes questioned Stalin's decisions. In September, 1932, when </span><a class="ajax" data-dcnode-id="1597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Martemyan_Ryutin.htm"><span data-dcnode-id="1598" instrument_node="">Martemyan Ryutin</span></a><span data-dcnode-id="1596" instrument_node=""> was arrested for calling for the re-admission of </span><a class="ajax" data-dcnode-id="1594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStrotsky.htm"><span data-dcnode-id="1595" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="1593" instrument_node=""> to the Communist Party, Stalin demanded his execution. Kirov argued against the death penalty being used. When the vote was taken, the majority of the Politburo supported Kirov against Stalin. (1) </span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1574"><span data-dcnode-id="1590" instrument_node="">Kirov was now seen as the leader of the liberal faction in the Politburo, a group that included </span><a class="ajax" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkalinin.htm"><span data-dcnode-id="1589" instrument_node="">Mikhail Kalinin</span></a><span data-dcnode-id="1587" instrument_node="">, </span><a class="ajax" data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUS-kliment-voroshilov.htm"><span data-dcnode-id="1586" instrument_node="">Kliment Voroshilov</span></a><span data-dcnode-id="1584" instrument_node=""> and </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C4%2581nis_Rudzutaks" rel="nofollow" target="_blank"><span data-dcnode-id="1583" instrument_node="">Janis Rudzutak</span></a><span data-dcnode-id="1581" instrument_node="">, that pleaded with Stalin for leniency towards those who disagreed with him. He argued that people should be released from prison who had opposed the government's policy on </span><a class="ajax" data-dcnode-id="1579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUScollectivization.htm"><span data-dcnode-id="1580" instrument_node="">collective farms</span></a><span data-dcnode-id="1578" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSfive.htm"><span data-dcnode-id="1577" instrument_node="">industrialization</span></a><span data-dcnode-id="1575" instrument_node="">. Kirov, who was the leader of Communist Party in Leningrad, did his best to restrain the political police in his own domain. Rudzutak, the vice-premier and the leader of the trade unions, exercised his influence in the same direction. (2) </span></p><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1572" instrument_node="">Stalin began to worry about the growing popularity of Kirov with the members of the Communist Party. As </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.goodreads.com/author/show/212297.Edward_P_Gazur" rel="nofollow" target="_blank"><span data-dcnode-id="1571" instrument_node="">Edward P. Gazur</span></a><span data-dcnode-id="1569" instrument_node=""> has pointed out: "In sharp contrast to Stalin, Kirov was a much younger man and an eloquent speaker, who was able to sway his listeners; above all, he possessed a charismatic personality. Unlike Stalin who was a Georgian, Kirov was also an ethnic Russian, which stood in his favour." (3) </span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">At the 17th Party Congress in 1934, when </span><a class="ajax" data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkirov.htm"><span data-dcnode-id="1565" instrument_node="">Sergey Kirov</span></a><span data-dcnode-id="1563" instrument_node=""> stepped up to the podium he was greeted by spontaneous applause that equalled that which was required to be given to Stalin. In his speech he put forward a policy of reconciliation. He argued that people should be released from prison who had opposed the government's policy on collective farms and industrialization. (4)</span></p><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">The last duty of a Congress was to elect the Central Committee. Usually this was a formality. The delegates were given the ballot, a list of names prepared by Stalin. The voters crossed out names they opposed and voted for the names left unmarked. Although the results were never published but according to some sources, Kirov received one or two negatives Stalin received over 200. All the candidates were automatically elected but this was another blow to Stalin's self-esteem. (5) </span></p><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">As usual, that summer Kirov and Stalin went on holiday together. Stalin, who treated Kirov like a son, used this opportunity to try to persuade him to remain loyal to his leadership. Stalin asked him to leave Leningrad to join him in Moscow. Stalin wanted Kirov in a place where he could keep a close eye on him. When Kirov refused, Stalin knew he had lost control over his protégé. Kirov had several advantages over Stalin, "his closeness to the masses, his tremendous energy, his oratorical talent". Whereas, Stalin "nasty, suspicious, cruel, and power-hungry, Stalin could not abide brilliant and independent people around him." (6) </span></p><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1554" instrument_node="">According to </span><a class="ajax" data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/SPorlov.htm"><span data-dcnode-id="1553" instrument_node="">Alexander Orlov</span></a><span data-dcnode-id="1551" instrument_node="">, who had been told this by </span><a class="ajax" data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSyagoda.htm"><span data-dcnode-id="1550" instrument_node="">Genrikh Yagoda</span></a><span data-dcnode-id="1548" instrument_node="">, Stalin decided that Kirov had to die. Yagoda assigned the task to </span><a class="ajax" data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Vania_Zaporozhets.htm"><span data-dcnode-id="1547" instrument_node="">Vania Zaporozhets</span></a><span data-dcnode-id="1545" instrument_node="">, one of his trusted lieutenants in the </span><a class="ajax" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUScheka.htm"><span data-dcnode-id="1544" instrument_node="">NKVD</span></a><span data-dcnode-id="1542" instrument_node="">. He selected a young man, </span><a class="ajax" data-dcnode-id="1540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Leonid_Nikolayev.htm"><span data-dcnode-id="1541" instrument_node="">Leonid Nikolayev</span></a><span data-dcnode-id="1539" instrument_node="">, as a possible candidate. Nikolayev had recently been expelled from the Communist Party and had vowed his revenge by claiming that he intended to assassinate a leading government figure. Zaporozhets met Nikolayev and when he discovered he was of low intelligence and appeared to be a person who could be easily manipulated, he decided that he was the ideal candidate as assassin. (7) </span></p><span data-dcnode-id="1537" instrument_node="">
</span><section data-dcnode-id="1462" id="section1"><header data-dcnode-id="1534"><h5 data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Assassination of Sergy Kirov </span></h5></header><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1532" instrument_node="">Zaporozhets provided him with a pistol and gave him instructions to kill Kirov in the </span><a data-dcnode-id="1530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Smolny_Institute" rel="nofollow" target="_blank"><span data-dcnode-id="1531" instrument_node="">Smolny Institute</span></a><span data-dcnode-id="1529" instrument_node=""> in </span><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Saint_Petersburg" rel="nofollow" target="_blank"><span data-dcnode-id="1528" instrument_node="">Leningrad</span></a><span data-dcnode-id="1526" instrument_node="">. However, soon after entering the building he was arrested. Zaporozhets had to use his influence to get him released. On 1st December, 1934, Nikolayev, got past the guards and was able to shoot Kirov dead. Nikolayev was immediately arrested and after being tortured by </span><a class="ajax" data-dcnode-id="1524" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSyagoda.htm"><span data-dcnode-id="1525" instrument_node="">Genrikh Yagoda</span></a><span data-dcnode-id="1523" instrument_node=""> he signed a statement saying that </span><a class="ajax" data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSzinoviev.htm"><span data-dcnode-id="1522" instrument_node="">Gregory Zinoviev</span></a><span data-dcnode-id="1520" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkamenev.htm"><span data-dcnode-id="1519" instrument_node="">Lev Kamenev</span></a><span data-dcnode-id="1517" instrument_node=""> had been the leaders of the conspiracy to assassinate Kirov. (8) </span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">On his arrest, Zinoviev wrote to Stalin: "I tell you, Comrade Stalin, honesty, that from the time of my return from Kustanai by order of the Central Committee, I have not taken a single step, spoken a single word, written a single line, or had a single thought which I need conceal from the Party, the Central Committee, and you personally... I have had only one thought - how to earn the trust of the Central Committee and you personally, how to achieve my aim of being employed by you in the work there is to be done. I swear by all a Bolshevik holds sacred, I swear by Lenin's memory... I implore you to believe my word of honor." (9) </span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1508"><a class="ajax" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkravechenko.htm"><span data-dcnode-id="1511" instrument_node="">Victor Kravchenko</span></a><span data-dcnode-id="1509" instrument_node=""> has pointed out: "Hundreds of suspects in Leningrad were rounded up and shot summarily, without trial. Hundreds of others, dragged from prison cells where they had been confined for years, were executed in a gesture of official vengeance against the Party's enemies. The first accounts of Kirov's death said that the assassin had acted as a tool of dastardly foreigners - Estonian, Polish, German and finally British. Then came a series of official reports vaguely linking Nikolayev with present and past followers of Trotsky, Zinoviev, Kamenev and other dissident old Bolsheviks." (10) </span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1506" instrument_node="">According to </span><a class="ajax" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/SPorlov.htm"><span data-dcnode-id="1505" instrument_node="">Alexander Orlov</span></a><span data-dcnode-id="1503" instrument_node="">, who was Chief of the Economic Department for Foreign Trade who worked closely with </span><a class="ajax" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSyagoda.htm"><span data-dcnode-id="1502" instrument_node="">Genrikh Yagoda</span></a><span data-dcnode-id="1500" instrument_node="">, the head of the Peoples Commissariat for Internal Affairs (</span><a class="ajax" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSnkvd.htm"><span data-dcnode-id="1499" instrument_node="">NKVD</span></a><span data-dcnode-id="1497" instrument_node="">): "Stalin decided to arrange for the assassination of Kirov and to lay the crime at the door of the former leaders of the opposition and thus with one blow do away with Lenin's former comrades. Stalin came to the conclusion that, if he could prove that Zinoviev and Kamenev and other leaders of the opposition had shed the blood of Kirov." (11) </span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1478"><a data-dcnode-id="1493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bodley.ox.ac.uk/dept/scwmss/wmss/online/modern/latey/latey.html" rel="nofollow" target="_blank"><span data-dcnode-id="1494" instrument_node="">Maurice Latey</span></a><span data-dcnode-id="1492" instrument_node="">, the author of </span><a data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Tyranny-Study-Abuse-Maurice-Latey/dp/0333099486/ref%3Dsr_1_1%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1523865004%26sr%3D1-1%26keywords%3DMaurice%2BLatey" rel="nofollow" target="_blank"><em data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">Tyranny: A Study in the Abuse of Power</span></em></a><span data-dcnode-id="1488" instrument_node=""> (1969), has put forward the theory that Stalin had learnt something from </span><a class="ajax" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/GERhitler.htm"><span data-dcnode-id="1487" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="1485" instrument_node="">, who the previous year, had used the case of the half-witted arsonist </span><a class="ajax" data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/GERlubbe.htm"><span data-dcnode-id="1484" instrument_node="">Marinus van der Lubbe</span></a><span data-dcnode-id="1482" instrument_node=""> had been found guilty of setting fire to the </span><a class="ajax" data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/GERreichstagF.htm"><span data-dcnode-id="1481" instrument_node="">Reichstag a</span></a><span data-dcnode-id="1479" instrument_node="">nd therefore gave him the pretext for destroying the opposition. "It may have been engineered by Stalin himself in order to kill two birds with one stone - to get rid of Kirov and to give an excuse for the great purges that were to follow." (12) </span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1470"><a class="ajax" data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Leonid_Nikolayev.htm"><span data-dcnode-id="1476" instrument_node="">Leonid Nikolayev</span></a><span data-dcnode-id="1474" instrument_node=""> and his fourteen co-defendants were executed after their trial but Zinoviev and Kamenev refused to confess. </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.co.uk/books%3Fid%3DSaIkK868enQC%26pg%3DPA207%26dq%3DYa%2BS.%2BAgranov%26hl%3Den%26sa%3DX%26ei%3D_104U_v8H_Sh7AbEjYGABg%26ved%3D0CDMQ6AEwAA%23v%3Donepage%26q%3DYa%2520S.%2520Agranov%26f%3Dfalse" rel="nofollow" target="_blank"><span data-dcnode-id="1473" instrument_node="">Y. S. Agranov</span></a><span data-dcnode-id="1471" instrument_node="">, the deputy commissar of the secret police, reported to Stalin he was not able to prove that they had been directly involved in the assassination. Therefore in January 1935 they were tried and convicted only for "moral complicity" in the crime. "That is, their opposition had created a climate in which others were incited to violence." Zinoviev was sentenced to ten years hard labour, Kamenev to five. (13) </span></p><span data-dcnode-id="1469" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">Stalin now had a new provision enacted into law on 8th April 1935 which would enable him to exert additional leverage over his enemies. The new law decreed that children of the age of twelve and over who were found guilty of crimes would be subjected to the same punishment as adults, up to and including the death penalty. This provision provided </span><a class="ajax" data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSnkvd.htm"><span data-dcnode-id="1467" instrument_node="">NKVD</span></a><span data-dcnode-id="1465" instrument_node=""> with the means by which they could coerce a confession from a political dissident simply by claiming that false charges would be brought against their children. Soon afterwards, Stalin began ordering the arrests of "tens of thousands of suspect Bolsheviks". (14) </span></p><span data-dcnode-id="1463" instrument_node="">
</span></section><section data-dcnode-id="1284" id="section2"><header data-dcnode-id="1459"><h5 data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Zinoviev, Kamenev and Smirnov (August, 1936) </span></h5></header><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1457" instrument_node="">On 20th November, 1935, </span><a class="ajax" data-dcnode-id="1455" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSzinoviev.htm"><span data-dcnode-id="1456" instrument_node="">Gregory Zinoviev</span></a><span data-dcnode-id="1454" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkamenev.htm"><span data-dcnode-id="1453" instrument_node="">Lev Kamenev</span></a><span data-dcnode-id="1451" instrument_node=""> were charged with espionage on behalf of hostile foreign powers. Early in 1936, about forty of the KGB's top operatives were summoned to Moscow for a conference. They were advised that a conspiracy against Stalin and the Government had been uncovered and that it would be left to them to secure confessions. Over 300 political prisoners were ruthlessly interrogated and subjected to inordinate pressure in order to gain information against Zinoviev and Kamenev that could be used in court against the defendants. One member of the interrogating team, claimed: "Give me long enough and I will have them confessing that they are the King of England". However, according to </span><a class="ajax" data-dcnode-id="1449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/SPorlov.htm"><span data-dcnode-id="1450" instrument_node="">Alexander Orlov</span></a><span data-dcnode-id="1448" instrument_node=""> only one of those men tortured was willing to give evidence against Zinoviev and Kamenev. (15) </span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1445" instrument_node="">In July 1936 Yezhov told Gregory Zinoviev and Lev Kamenev that their children would be charged with being part of the conspiracy and would face execution if found guilty. The two men now agreed to co-operate at the trial if </span><a class="ajax" data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSstalin.htm"><span data-dcnode-id="1444" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="1442" instrument_node=""> promised to spare their lives. At a meeting with Stalin, Kamenev told him that they would agree to co-operate on the condition that none of the old-line Bolsheviks who were considered the opposition and charged at the new trial would be executed, that their families would not be persecuted, and that in the future none of the former members of the opposition would be subjected to the death penalty. Stalin replied: "That goes without saying!" (16) </span></p><span data-dcnode-id="1440" instrument_node="">
</span><figure data-dcnode-id="1433"><img alt="Lev Kamenev" data-dcnode-id="1439" height="463" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/00kamenev1.jpg&amp;raw" width="333"><figcaption data-dcnode-id="1434"><span data-dcnode-id="1438" instrument_node=""> </span><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">The last known photograph of Lev Kamenev</span></strong><span data-dcnode-id="1435" instrument_node=""> (1936) </span></figcaption></figure><span data-dcnode-id="1432" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1431" instrument_node="">The trial opened on 19th August 1936. Also charged was </span><a class="ajax" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSsmirnov.htm"><span data-dcnode-id="1430" instrument_node="">Ivan Smirnov</span></a><span data-dcnode-id="1428" instrument_node="">, </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konon_Berman-Yurin" rel="nofollow" target="_blank"><span data-dcnode-id="1427" instrument_node="">Konon Berman-Yurin</span></a><span data-dcnode-id="1425" instrument_node="">, </span><a data-dcnode-id="1423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vagarshak_Ter-Vaganyan" rel="nofollow" target="_blank"><span data-dcnode-id="1424" instrument_node="">Vagarshak Ter-Vaganyan</span></a><span data-dcnode-id="1422" instrument_node=""> and twelve other defendants. It is claimed that five of these men were actually </span><a class="ajax" data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSnkvd.htm"><span data-dcnode-id="1421" instrument_node="">NKVD</span></a><span data-dcnode-id="1419" instrument_node=""> plants, whose confessional testimony was expected to solidify the state's case. The presiding judge was </span><a data-dcnode-id="1417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Vasiliy_Ulrikh" rel="nofollow" target="_blank"><span data-dcnode-id="1418" instrument_node="">Vasily Ulrikh</span></a><span data-dcnode-id="1416" instrument_node="">, a member of the secret police. The prosecutor was </span><a class="ajax" data-dcnode-id="1414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSvyshinsky.htm"><span data-dcnode-id="1415" instrument_node="">Andrei Vyshinsky</span></a><span data-dcnode-id="1413" instrument_node="">, who was to become well-known during the </span><a class="ajax" data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSshow.htm"><span data-dcnode-id="1412" instrument_node="">Show Trials</span></a><span data-dcnode-id="1410" instrument_node=""> over the next few years. The foreign press were allowed to attend the trial and were shocked to hear that Zinoviev, Kamenev and the other defendants, were part of a terrorist organisation, under the leadership of </span><a class="ajax" data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStrotsky.htm"><span data-dcnode-id="1409" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="1407" instrument_node="">, were attempting to overthrow the communist government of the Soviet Union. It was claimed that Trotsky was under the influence of Adolf Hitler and that he eventually planned to impose a fascist dictatorship on the Soviet people. (17) </span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1398"><a class="ajax" data-dcnode-id="1403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUS-Yuri-Piatakov.htm"><span data-dcnode-id="1404" instrument_node="">Yuri Piatakov</span></a><span data-dcnode-id="1402" instrument_node=""> accepted the post of chief witness "with all my heart." </span><a class="ajax" data-dcnode-id="1400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/USAshachtman.htm"><span data-dcnode-id="1401" instrument_node="">Max Shachtman</span></a><span data-dcnode-id="1399" instrument_node=""> pointed out that it was important to consider those who did not testify: "Of the hundreds and perhaps thousands arrested for the purposes of the trial, it is significant that only a small handful were found who could be prevailed upon to make the 'confessions' that fell in so neatly with every charge of the prosecution. Every single one of them (the GPU provocateurs excepted) was a capitulator, who had once, twice and three times in the past signed whatever statement was dictated to him by Stalin. (18) </span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1396" instrument_node="">On 20th August, 1936, </span><a class="ajax" data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkamenev.htm"><span data-dcnode-id="1395" instrument_node="">Lev Kamenev</span></a><span data-dcnode-id="1393" instrument_node=""> was cross-examined and admitted that he had worked with those on the right of the party, including </span><a class="ajax" data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSbulganin.htm"><span data-dcnode-id="1392" instrument_node="">Nikolai Bulganin</span></a><span data-dcnode-id="1390" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStomsky.htm"><span data-dcnode-id="1389" instrument_node="">Maihail Tomsky</span></a><span data-dcnode-id="1387" instrument_node="">, to undermine Stalin: "I personally conducted negotiations with the so-called 'Leftist' group of Lominadre and Shatsky. In this group I found enemies of the Party leadership quite prepared to resort to the most determined measures of struggle against it. At the same time, I myself and Zinoviev maintained constant contact with the former 'Workers' Opposition' group of Shlyapnikov and Medvedyev. In 1932, 1933 and 1934 I personally maintained relations with Tomsky and Bukharin and sounded their political sentiments. They sympathized with us... having set ourselves the monstrously criminal aim of disorganizing the government of the land of socialism, we resorted to methods of struggle which in our opinion suited this aim and which are as low and as vile as the aim which we set before ourselves." (19)</span></p><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1384" instrument_node="">He was followed by </span><a class="ajax" data-dcnode-id="1382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSzinoviev.htm"><span data-dcnode-id="1383" instrument_node="">Gregory Zinoviev</span></a><span data-dcnode-id="1381" instrument_node=""> who also made a full confession. He claimed that he worked closely with members of the </span><a class="ajax" data-dcnode-id="1379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSworkers.htm"><span data-dcnode-id="1380" instrument_node="">Workers' Opposition</span></a><span data-dcnode-id="1378" instrument_node="">, such as </span><a class="ajax" data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSshlyapnikov.htm"><span data-dcnode-id="1377" instrument_node="">Alexander Shlyapnikov</span></a><span data-dcnode-id="1375" instrument_node="">: "We were convinced that the leadership must be superseded at all costs, that it must be superseded by us, along with Trotsky... I spoke a great deal with Smirnov about choosing people for terroristic activities and also designated the persons against whom the weapon of terrorism was to be directed. The name of Stalin was mentioned in the first place, followed by those of Kirov, Voroshilov and other leaders of the Party and the government. For the purpose of executing these plans, a Trotskyite-Zinovievite terrorist centre was formed, the leading part in which was played by myself - Zinoviev,and by Smirnov on behalf of the Trotskyites." (20) </span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1372" instrument_node="">On the final date of the trial the defendants made further statements. </span><a class="ajax" data-dcnode-id="1370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSsmirnov.htm"><span data-dcnode-id="1371" instrument_node="">Ivan Smirnov</span></a><span data-dcnode-id="1369" instrument_node=""> said: "I communicated Trotsky's instructions on terrorism to the bloc to which I belonged as a member of the centre. The bloc accepted these instructions and began to act. There is no other path for our country but the one it is now treading, and there is not, nor can there be, any other leadership than that which history has given us. Trotsky, who sends direction and instructions on terrorism, and regards our state as a fascist state, is an enemy; he is on the other side of the barricade; he must be fought." (21) </span></p><span data-dcnode-id="1367" instrument_node="">
</span><figure data-dcnode-id="1361"><img alt="Gregory Zinoviev" data-dcnode-id="1366" height="508" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/00zinoviev.jpg&amp;raw" width="340"><figcaption data-dcnode-id="1362"><span data-dcnode-id="1365" instrument_node=""> </span><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">The last known photograph of Gregory Zinoviev (1936) </span></strong></figcaption></figure><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1355"><span data-dcnode-id="1359" instrument_node="">Gregory Zinoviev confessed to being involved in the assassination of </span><a class="ajax" data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkirov.htm"><span data-dcnode-id="1358" instrument_node="">Sergy Kirov</span></a><span data-dcnode-id="1356" instrument_node="">: "I would like to repeat that I am fully and utterly guilty. I am guilty of having been the organizer, second only to Trotsky, of that block whose chosen task was the killing of Stalin. I was the principal organizer of Kirov's assassination. The party saw where we were going, and warned us; Stalin warned as scores of times; but we did not heed these warnings. We entered into an alliance with Trotsky.... We took the place of the terrorism of the Socialist-Revolutionaries.... My defective Bolshevism became transformed into anti-Bolshevism, and through Trotskyism I arrived at fascism. Trotskyism is a variety of fascism, and Zinovievism is a variety of Trotskyism." (22) </span></p><span data-dcnode-id="1354" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Lev Kamenev added: "I Kamenev, together with Zinoviev and Trotsky, organised and guided this conspiracy. My motives? I had become convinced that the party's - Stalin's policy - was successful and victorious. We, the opposition, had banked on a split in the party; but this hope proved groundless. We could no longer count on any serious domestic difficulties to allow us to overthrow. Stalin's leadership we were actuated by boundless hatred and by lust of power." Kamenev's final words in the trial concerned the plight of his children: "I should like to say a few words to my children. I have two children, one is an army pilot, the other a Young Pioneer. Whatever my sentence may be, I consider it just... Together with the people, follow where Stalin leads." This was a reference to the promise that Stalin made about his sons." (23) </span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1350" instrument_node="">On 24th August, 1936, </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Vasiliy_Ulrikh" rel="nofollow" target="_blank"><span data-dcnode-id="1349" instrument_node="">Vasily Ulrikh</span></a><span data-dcnode-id="1347" instrument_node=""> entered the courtroom and began reading the long and dull summation leading up to the verdict. Ulrikh announced that all sixteen defendants were sentenced to death by shooting. </span><a data-dcnode-id="1345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.goodreads.com/author/show/212297.Edward_P_Gazur" rel="nofollow" target="_blank"><span data-dcnode-id="1346" instrument_node="">Edward P. Gazur</span></a><span data-dcnode-id="1344" instrument_node=""> has pointed out: "Those in attendance fully expected the customary addendum which was used in political trials that stipulated that the sentence was commuted by reason of a defendant's contribution to the Revolution. These words never came, and it was apparent that the death sentence was final when Ulrikh placed the summation on his desk and left the court-room." (24) </span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1341" instrument_node="">The following day Soviet newspapers carried the announcement that all sixteen defendants had been put to death. This included the </span><a class="ajax" data-dcnode-id="1339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSnkvd.htm"><span data-dcnode-id="1340" instrument_node="">NKVD</span></a><span data-dcnode-id="1338" instrument_node=""> agents who had provided false confessions. Joseph Stalin could not afford for any witnesses to the conspiracy to remain alive. </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Edvard_Radzinsky" rel="nofollow" target="_blank"><span data-dcnode-id="1337" instrument_node="">Edvard Radzinsky</span></a><span data-dcnode-id="1335" instrument_node="">, the author of </span><a data-dcnode-id="1332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/s/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dstripbooks%26field-keywords%3DEdvard%2BRadzinsky%252C%2BStalin%26rh%3Dn%253A266239%252Ck%253AEdvard%2BRadzinsky%255Cc%2BStalin" rel="nofollow" target="_blank"><em data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Stalin</span></em></a><span data-dcnode-id="1331" instrument_node=""> (1996), has pointed out that Stalin did not even keep his promise to Kamenev that his wife, </span><a class="ajax" data-dcnode-id="1329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Olga_Kamenev.htm"><span data-dcnode-id="1330" instrument_node="">Olga Kamenev</span></a><span data-dcnode-id="1328" instrument_node="">, and their two sons, would be saved. All three of them were either shot or died in a prison camp. (25) </span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1325" instrument_node="">Most journalists covering the trial were convinced that the confessions were statements of truth. </span><a class="ajax" data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/PRsundayobserver.htm"><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The Observer</span></em></a><span data-dcnode-id="1321" instrument_node=""> wrote: "It is futile to think the trial was staged and the charges trumped up. The government's case against the defendants (Zinoviev and Kamenev) is genuine." (26) </span><i data-dcnode-id="1318"><a class="ajax" data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Jstatesman.htm"><span data-dcnode-id="1320" instrument_node="">The New Statesman</span></a></i><span data-dcnode-id="1317" instrument_node=""> agreed: "It is their (Zinoviev and Kamenev) confession and decision to demand the death sentence for themselves that constitutes the mystery. If they had a hope of acquittal, why confess? If they were guilty of trying to murder Stalin and knew they would be shot in any case, why cringe and crawl instead of defiantly justifying their plot on revolutionary grounds? We would be glad to hear the explanation." (27) </span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310"><a class="ajax" data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/USArepublic.htm"><em data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The New Republic</span></em></a><span data-dcnode-id="1311" instrument_node=""> pointed out: "Some commentators, writing at a long distance from the scene, profess doubt that the executed men (Zinoviev and Kamenev) were guilty. It is suggested that they may have participated in a piece of stage play for the sake of friends or members of their families, held by the Soviet government as hostages and to be set free in exchange for this sacrifice. We see no reason to accept any of these laboured hypotheses, or to take the trial in other than its face value. Foreign correspondents present at the trial pointed out that the stories of these sixteen defendants, covering a series of complicated happenings over nearly five years, corroborated each other to an extent that would be quite impossible if they were not substantially true. The defendants gave no evidence of having been coached, parroting confessions painfully memorized in advance, or of being under any sort of duress." (28)  </span></p><span data-dcnode-id="1309" instrument_node="">
</span><figure data-dcnode-id="1301"><img alt="The Socialist Appeal (18th December, 1937)" data-dcnode-id="1308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/00StalinsVictims.jpg&amp;raw"><figcaption data-dcnode-id="1302"><span data-dcnode-id="1307" instrument_node=""> </span><a data-dcnode-id="1304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/history/etol/newspape/themilitant/socialist-appeal-1938/index.htm" rel="nofollow" target="_blank"><em data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The Socialist Appeal</span></em></a><span data-dcnode-id="1303" instrument_node=""> (18th December, 1937) </span></figcaption></figure><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1286"><a class="ajax" data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/USAdurantyW.htm"><span data-dcnode-id="1299" instrument_node="">Walter Duranty</span></a><span data-dcnode-id="1297" instrument_node="">, the </span><a class="ajax" data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/USAnytimes.htm"><em data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">New York Times</span></em></a><span data-dcnode-id="1293" instrument_node=""> correspondent based in </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Moscow" rel="nofollow" target="_blank"><span data-dcnode-id="1292" instrument_node="">Moscow</span></a><span data-dcnode-id="1290" instrument_node="">, also accepted the idea that the executed men were also involved with </span><a class="ajax" data-dcnode-id="1288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/GERhitler.htm"><span data-dcnode-id="1289" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="1287" instrument_node=""> in trying to bring down the Soviet government. "A widespread plot against the Kremlin was discovered, whose ramifications included not merely former oppositionists but agents of the Nazi Gestapo." When supporters of the men executed raised doubts about the conspiracy, Duranty commented that "it was unthinkable that Stalin and Voroshilov... could have sentenced their friends to death unless the proofs of guilt were overwhelming." (29) </span></p><span data-dcnode-id="1285" instrument_node="">
</span></section><section data-dcnode-id="1225" id="section3"><header data-dcnode-id="1281"><h5 data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Piatakov, Radek and Sokolnikov (January, 1937) </span></h5></header><span data-dcnode-id="1280" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1279" instrument_node="">In January, 1937, </span><a class="ajax" data-dcnode-id="1277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUS-Yuri-Piatakov.htm"><span data-dcnode-id="1278" instrument_node="">Yuri Piatakov</span></a><span data-dcnode-id="1276" instrument_node="">, </span><a class="ajax" data-dcnode-id="1274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSradek.htm"><span data-dcnode-id="1275" instrument_node="">Karl Radek</span></a><span data-dcnode-id="1273" instrument_node="">, </span><a class="ajax" data-dcnode-id="1271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUS-Grigori-Sokolnikov.htm"><span data-dcnode-id="1272" instrument_node="">Grigori Sokolnikov</span></a><span data-dcnode-id="1270" instrument_node="">, and fifteen other leading members of the </span><a class="ajax" data-dcnode-id="1268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUScp.htm"><span data-dcnode-id="1269" instrument_node="">Communist Party</span></a><span data-dcnode-id="1267" instrument_node=""> were put on trial. They were accused of working with </span><a class="ajax" data-dcnode-id="1265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStrotsky.htm"><span data-dcnode-id="1266" instrument_node="">Leon Trotsky</span></a><span data-dcnode-id="1264" instrument_node=""> in an attempt to overthrow the Soviet government with the objective of restoring capitalism. </span><a class="ajax" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/TUarnott.htm"><span data-dcnode-id="1263" instrument_node="">Robin Page Arnot</span></a><span data-dcnode-id="1261" instrument_node="">, a leading figure in the </span><a class="ajax" data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Pcommunist.htm"><span data-dcnode-id="1260" instrument_node="">British Communist Party</span></a><span data-dcnode-id="1258" instrument_node="">, wrote: "A second Moscow trial, held in January 1937, revealed the wider ramifications of the conspiracy. This was the trial of the Parallel Centre, headed by Piatakov, Radek, Sokolnikov, Serebriakov. The volume of evidence brought forward at this trial was sufficient to convince the most sceptical that these men, in conjunction with Trotsky and with the Fascist Powers, had carried through a series of abominable crimes involving loss of life and wreckage on a very considerable scale." (30)  </span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1248"><a data-dcnode-id="1254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Edvard_Radzinsky" rel="nofollow" target="_blank"><span data-dcnode-id="1255" instrument_node="">Edvard Radzinsky</span></a><span data-dcnode-id="1253" instrument_node="">, the author of </span><a data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/s/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dstripbooks%26field-keywords%3DEdvard%2BRadzinsky%252C%2BStalin%26rh%3Dn%253A266239%252Ck%253AEdvard%2BRadzinsky%255Cc%2BStalin" rel="nofollow" target="_blank"><em data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Stalin</span></em></a><span data-dcnode-id="1249" instrument_node=""> (1996) has pointed out: "After they saw that Piatakov was ready to collaborate in any way required, they gave him a more complicated role. In the 1937 trials he joined the defendants, those whom he had meant to blacken. He was arrested, but was at first recalcitrant. Ordzhonikidze in person urged him to accept the role assigned to him in exchange for his life. No one was so well qualified as Piatakov to destroy Trotsky, his former god and now the Party's worst enemy, in the eyes of the country and the whole world. He finally agreed I to do it as a matter of 'the highest expediency,' and began rehearsals with the interrogators." (31) </span></p><span data-dcnode-id="1247" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1246" instrument_node="">One of the journalists covering the trial, </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Lion_Feuchtwanger" rel="nofollow" target="_blank"><span data-dcnode-id="1245" instrument_node="">Lion Feuchtwanger</span></a><span data-dcnode-id="1243" instrument_node="">, commented: "Those who faced the court could not possibly be thought of as tormented and desperate beings. In appearance the accused were well-groomed and well-dressed men with relaxed and unconstrained manners. They drank tea, and there were newspapers sticking out of their pockets... Altogether, it looked more like a debate... conducted in conversational tones by educated people. The impression created was that the accused, the prosecutor, and the judges were all inspired by the same single - I almost said sporting - objective, to explain all that had happened with the maximum precision. If a theatrical producer had been called on to stage such a trial he would probably have needed several rehearsals to achieve that sort of teamwork among the accused." (32) </span></p><span data-dcnode-id="1241" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1240" instrument_node="">Piatakov and twelve of the accused were found guilty and sentenced to death. </span><a class="ajax" data-dcnode-id="1238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSradek.htm"><span data-dcnode-id="1239" instrument_node="">Karl Radek</span></a><span data-dcnode-id="1237" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUS-Grigori-Sokolnikov.htm"><span data-dcnode-id="1236" instrument_node="">Grigori Sokolnikov</span></a><span data-dcnode-id="1234" instrument_node=""> were sentenced to ten years. Feuchtwanger commented that Radek "gave the condemned men a guilty smile, as though embarrassed by his luck." </span><a data-dcnode-id="1232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Alexander_Svanidze" rel="nofollow" target="_blank"><span data-dcnode-id="1233" instrument_node="">Maria Svanidze</span></a><span data-dcnode-id="1231" instrument_node="">, who was later herself to be purged by </span><a class="ajax" data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSstalin.htm"><span data-dcnode-id="1230" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="1228" instrument_node=""> wrote in her diary: "They arrested Radek and others whom I knew, people I used to talk to, and always trusted.... But what transpired surpassed all my expectations of human baseness. It was all there, terrorism, intervention, the Gestapo, theft, sabotage, subversion.... All out of careerism, greed, and the love of pleasure, the desire to have mistresses, to travel abroad, together with some sort of nebulous prospect of seizing power by a palace revolution. Where was their elementary feeling of patriotism, of love for their motherland? These moral freaks deserved their fate.... My soul is ablaze with anger and hatred. Their execution will not satisfy me. I should like to torture them, break them on the wheel, burn them alive for all the vile things they have done." (33) </span></p><span data-dcnode-id="1226" instrument_node="">
</span></section><section data-dcnode-id="1173" id="section4"><header data-dcnode-id="1222"><h5 data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Purge of the Soviet Army </span></h5></header><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1220" instrument_node="">It is claimed that </span><a class="ajax" data-dcnode-id="1218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/GERheydrich.htm"><span data-dcnode-id="1219" instrument_node="">Reinhard Heydrich</span></a><span data-dcnode-id="1217" instrument_node=""> developed a plan to damage the </span><a class="ajax" data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSred.htm"><span data-dcnode-id="1216" instrument_node="">Red Army</span></a><span data-dcnode-id="1214" instrument_node="">. In January 1937, a Soviet journalist heard stories that senior members of the </span><a class="ajax" data-dcnode-id="1212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/2WWgermanA.htm"><span data-dcnode-id="1213" instrument_node="">German Army</span></a><span data-dcnode-id="1211" instrument_node=""> were having secret talks with General </span><a class="ajax" data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStukhachevsky.htm"><span data-dcnode-id="1210" instrument_node="">Mikhail Tukhachevsky</span></a><span data-dcnode-id="1208" instrument_node="">. This idea was reinforced by a diplomat from the Soviet embassy in Paris who sent a telegram to Moscow saying he had learned of plans "by German circles to promote a coup de'etat in the Soviet Union" using "persons from the command staff of the Red Army." (34) </span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1205" instrument_node="">According to </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Robert_Conquest" rel="nofollow" target="_blank"><span data-dcnode-id="1204" instrument_node="">Robert Conquest</span></a><span data-dcnode-id="1202" instrument_node="">, the author of </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/Great-Terror-Reassessment-Robert-Conquest/dp/0195071328/ref%3Dsr_1_4%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1403636424%26sr%3D1-4%26keywords%3DThe%2BGreat%2BTerror" rel="nofollow" target="_blank"><em data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">The Great Terror</span></em></a><span data-dcnode-id="1198" instrument_node=""> (1990), the story had been created by </span><a class="ajax" data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/Nikolai_Skoblin.htm"><span data-dcnode-id="1197" instrument_node="">Nikolai Skoblin</span></a><span data-dcnode-id="1195" instrument_node="">, a </span><a class="ajax" data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSnkvd.htm"><span data-dcnode-id="1194" instrument_node="">NKVD</span></a><span data-dcnode-id="1192" instrument_node=""> agent who had appeared to be one of the leaders of the Russian opposition based in </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Paris" rel="nofollow" target="_blank"><span data-dcnode-id="1191" instrument_node="">Paris</span></a><span data-dcnode-id="1189" instrument_node="">. "Skoblin had long worked as a double agent with both the Soviet and the German secret agencies, and there seems no doubt that he was one of the links by which information was passed between the SD and the NKVD. According to one version... the Soviet High Command and Tukhachevsky in particular were engaged in a conspiracy with the German General Staff. Although this was understood in SD circles as an NKVD plant, Heydrich determined to use it, in the first place, against the German High Command, with whom his organization was in intense rivalry." (35) </span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1186" instrument_node="">Major V. Dapishev of the Soviet General Staff has claimed that the plot "originated with Stalin" as he wanted to purge the leadership of the armed forces. </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Roy_Medvedev" rel="nofollow" target="_blank"><span data-dcnode-id="1185" instrument_node="">Roy A. Medvedev</span></a><span data-dcnode-id="1183" instrument_node="">, has argued in </span><a data-dcnode-id="1180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/s/ref%3Dnb_sb_noss%3Furl%3Dsearch-alias%253Dstripbooks%26field-keywords%3DRoy%2BA.%2BMedvedev%252C%2BLet%2BHistory%2BJudge%26rh%3Dn%253A266239%252Ck%253ARoy%2BA.%2BMedvedev%255Cc%2BLet%2BHistory%2BJudge" rel="nofollow" target="_blank"><em data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">Let History Judge: The Origins and Consequences of Stalinism</span></em></a><span data-dcnode-id="1179" instrument_node=""> (1971) that he is convinced that Heydrich arranged the forgery of the documents. However, he points out: "It would be a mistake to think that these false accusations were the main cause of the destruction of the best cadres. They were only a pretext. The real causes of the mass repression go much deeper. Any serious investigation would have exposed the Nazi forgery against Tukhachevsky, but Stalin did not order an expert investigation. It would have been even easier to establish the falseness of many other materials produced by the NKVD, but neither Stalin nor his closest aides checked or wanted to check the authenticity of these materials." (36) </span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">On 11th June, 1937, Tukhachevsky and seven other Soviet generals appeared in court on the charges of treason for having conspired with Germany. All were executed. "Following the Tukhachevsky trial, the wave of executions of the officer corps of the military was like a wind blowing over a huge field of wheat; no one escaped. Any officer, no matter how remotely connected to Tukhachevsky and the seven deposed generals in the past or present, was rounded up and executed. In turn, the military subordinates of the newly executed commanders became the next group of candidates for elimination and so on, like a never-ending web of destruction. Even the top echelon of Soviet marshals and generals, who had signed the verdict for the actually non-existent trial of Tukhachevsky and the other generals, disappeared one by one, never to be heard of again. By the end of the reign of terror, the officer corps of the Soviet Army had been decimated beyond recognition." (37) </span></p><span data-dcnode-id="1174" instrument_node="">
</span></section><section data-dcnode-id="1114" id="section5"><header data-dcnode-id="1170"><h5 data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Bukharin, Rykov and Yagoda (March, 1938) </span></h5></header><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1168" instrument_node="">The next show trials took place in March, 1938, and involved twenty-one leading members of the party. This included </span><a class="ajax" data-dcnode-id="1166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSbukharin.htm"><span data-dcnode-id="1167" instrument_node="">Nickolai Bukharin</span></a><span data-dcnode-id="1165" instrument_node="">, </span><a class="ajax" data-dcnode-id="1163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSrykov.htm"><span data-dcnode-id="1164" instrument_node="">Alexei Rykov</span></a><span data-dcnode-id="1162" instrument_node="">, </span><a class="ajax" data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSyagoda.htm"><span data-dcnode-id="1161" instrument_node="">Genrikh Yagoda</span></a><span data-dcnode-id="1159" instrument_node="">, </span><a class="ajax" data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSkrestinsky.htm"><span data-dcnode-id="1158" instrument_node="">Nikolai Krestinsky</span></a><span data-dcnode-id="1156" instrument_node=""> and </span><a class="ajax" data-dcnode-id="1154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSrakovsky.htm"><span data-dcnode-id="1155" instrument_node="">Christian Rakovsky</span></a><span data-dcnode-id="1153" instrument_node="">. Another leading figure in the government, </span><a class="ajax" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUStomsky.htm"><span data-dcnode-id="1152" instrument_node="">Maihail Tomsky</span></a><span data-dcnode-id="1150" instrument_node="">, committed suicide before the trial. They were all charged with attempting to assassinate </span><a class="ajax" data-dcnode-id="1148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSstalin.htm"><span data-dcnode-id="1149" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="1147" instrument_node="">  and the other members of the Politburo, "to restore capitalism, to wreck the country's military and economic power, and to poison or kill in any other way masses of Russian workers." (38) </span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1137"><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Raphael_Abramovitch" rel="nofollow" target="_blank"><span data-dcnode-id="1144" instrument_node="">Raphael R. Abramovitch</span></a><span data-dcnode-id="1142" instrument_node="">, the author of </span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/Soviet-Revolution-1917-1939-Raphael-Abramovitch/dp/B0007DMI64/ref%3Dsr_1_1%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1370437881%26sr%3D1-1%26keywords%3DThe%2BSoviet%2BRevolution%253A%2B1917-1939" rel="nofollow" target="_blank"><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">The Soviet Revolution: 1917-1939</span></em></a><span data-dcnode-id="1138" instrument_node=""> (1962) pointed out that at his trial: "Bukharin, who still had a little fight left in him, was extinguished by the concerted efforts of the public prosecutor, the presiding judge, GPU agents and former friends. Even a strong and proud man like Bukharin was unable to escape the traps set for him. The trial took its usual course, except that one session had to be hastily adjourned when Krestinsky refused to follow the script. At the next session, he was compliant." (39) However, he did write to Stalin and ask: "Koba, why is my death necessary for you." (40) </span></p><span data-dcnode-id="1136" instrument_node="">
</span><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">They were all found guilty and were either executed or died in labour camps. </span><a class="ajax" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSdeutscher.htm"><span data-dcnode-id="1134" instrument_node="">Isaac Deutscher</span></a><span data-dcnode-id="1132" instrument_node="">  has pointed out: "Among the men in the dock at these trials were all the members of Lenin's Politbureau, except Stalin himself and Trotsky, who, however, though absent, was the chief defendant. Among them, moreover, were one ex-premier, several vice-premiers, two ex-chiefs of the Communist International, the chief of the trade unions, the chief of the General Staff, the chief political Commissar of the Army, the Supreme Commanders of all important military districts, nearly all Soviet ambassadors in Europe and Asia, and last but not least, the two chiefs of the political police: Yagoda and Yezhov." (41) </span></p><span data-dcnode-id="1130" instrument_node="">
</span><p data-dcnode-id="1116"><a class="ajax" data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/USAdurantyW.htm"><span data-dcnode-id="1129" instrument_node="">Walter Duranty</span></a><span data-dcnode-id="1127" instrument_node=""> always underestimated the number killed during the </span><a class="ajax" data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSpurge.htm"><span data-dcnode-id="1126" instrument_node="">Great Purge</span></a><span data-dcnode-id="1124" instrument_node="">. As</span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/S.J.-Taylor/e/B001HCWB3O/ref%3Dntt_athr_dp_pel_1" rel="nofollow" target="_blank"><span data-dcnode-id="1123" instrument_node=""> Sally J. Taylor</span></a><span data-dcnode-id="1121" instrument_node="">, the author of </span><a data-dcnode-id="1118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.co.uk/Stalins-Apologist-Walter-Duranty-Timess/dp/0195057007/ref%3Dsr_1_1%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1356778663%26sr%3D1-1" rel="nofollow" target="_blank"><em data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Stalin's Apologist: Walter Duranty</span></em></a><span data-dcnode-id="1117" instrument_node=""> (1990) has pointed out: "As for the number of resulting casualties from the Great Purge, Duranty's estimates, which encompassed the years from 1936 to 1939, fell considerably short of other sources, a fact he himself admitted. Whereas the number of Party members arrested is usually put at just above one million, Duranty's own estimate was half this figure, and he neglected to mention that of those exiled into the forced labor camps of the GULAG, only a small percentage ever regained their freedom, as few as 50,000 by some estimates. As to those actually executed, reliable sources range from some 600,000 to one million, while Duranty maintained that only about 30,000 to 40,000 had been killed." (42) </span></p><span data-dcnode-id="1115" instrument_node="">
</span></section><span data-dcnode-id="1113" instrument_node="">

</span><h2 data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">Primary Sources</span></h2><span data-dcnode-id="1081" instrument_node="">
</span></header><span data-dcnode-id="1079" instrument_node="">
</span><section class="cite" data-dcnode-id="1052" itemprop="citation"><span data-dcnode-id="1078" instrument_node="">
</span><header data-dcnode-id="1072"><h4 data-dcnode-id="1073"><span data-dcnode-id="1077" instrument_node="">(1) </span><a class="ajax" data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//spartacus-educational.com/RUSzinoviev.htm"><span data-dcnode-id="1076" instrument_node="">Gregory Zinoviev</span></a><span data-dcnode-id="1074" instrument_node="">, speech at his trial (20th August, 1936)</span></h4></header><span data-dcnode-id="1071" instrument_node="">
</span><blockquote data-dcnode-id="1054"><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">We banked on a growth of difficulties. We hoped that they would grow to such an extent that we and the Rightists and the Trotskyites, and the smaller groups associated with them, could come out openly. We dreamt of coming out in a united front. At that time we thought that the Rightists had most chances of success,that their prognoses were more likely to come true, and that their names would have particular power of attraction. At that time we attempted to place particular emphasis on our closeness to them."</span></p><span data-dcnode-id="1067" instrument_node="">
</span><p data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">At the same time certain underground groups of the Right as well as of the so-called 'Left' trend, sought contact with me and Kamenev. Approaches were made by the remnants of the 'Workers' Opposition': by Shlyapnikov and Medvedyev. Approaches came from the groups of the so-called 'Leftists': that is, Lominadze, Shatskin, Sten and others. Approaches also came from the so-called 'individuals,' to whose numbers belonged Smilga, and to a certain extent, Sokolnikov."</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">In the second half of 1932 we relized that our banking on a growth of difficulties in the country had failed. We began to realize that the Party and its Central Committee would overcome these difficulties. But both in the first and in the second half of 1932 we were filled with hatred towards the Central Committee of the Party and towards Stalin.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">We were convinced that the leadership must be superseded at all costs, that it must be superseded by us, along with Trotsky. In this situation I had meetings with Smirnov who has accused me here of frequently telling untruths. Yes, I often told untruths. I started doing that from the moment I began flighting the Bolshevik Party. In so far as Smirnov took the road of fighting the Party, he too is telling untruths. But it seems, the difference between him and myself is that I have decided firmly and irrevocably to tell at this last moment the truth, whereas, he it seems has adopted a different decision...</span></p><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">I spoke a great deal with Smirnov about choosing people for terroristic activities and also designated the persons against whom the weapon of terrorism was to be directed. The name of Stalin was mentioned in the first place, followed by those of Kirov, Voroshilov and other leaders of the Party and the government. For the purpose of executing these plans, a Trotskyite-Zinovievite terrorist centre was formed, the leading part in which was played by myself-Zinoviev,and by Smirnov on behalf of the Trotskyites.</span></p><span data-dcnode-id="1055" instrument_node="">
</span></blockquote><span data-dcnode-id="1053" instrument_node="">
</span></section><span data-dcnode-id="1051" instrument_node="">
