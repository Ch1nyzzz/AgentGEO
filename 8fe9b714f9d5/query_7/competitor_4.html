lass="external text" data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DTemplate%3ACapitalism_sidebar%26action%3Dedit"><abbr data-dcnode-id="4826" title="Edit this template"><span data-dcnode-id="4827" instrument_node="">e</span></abbr></a></li></ul></div></td></tr></tbody></table><span data-dcnode-id="4817" instrument_node="">
</span><p data-dcnode-id="4754"><span data-dcnode-id="4816" instrument_node="">The </span><b data-dcnode-id="4814"><span data-dcnode-id="4815" instrument_node="">history of capitalism</span></b><span data-dcnode-id="4813" instrument_node=""> is diverse. The concept of capitalism has many debated roots, but fully</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4806" style="white-space:nowrap;"><span data-dcnode-id="4812" instrument_node="">[</span><i data-dcnode-id="4808"><a data-dcnode-id="4809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Dates_and_numbers" title="Wikipedia:Manual of Style/Dates and numbers"><span data-dcnode-id="4810" title="This term requires quantification. (March 2021)"><span data-dcnode-id="4811" instrument_node="">quantify</span></span></a></i><span data-dcnode-id="4807" instrument_node="">]</span></sup><span data-dcnode-id="4805" instrument_node=""> fledged </span><a data-dcnode-id="4803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capitalism" title="Capitalism"><span data-dcnode-id="4804" instrument_node="">capitalism</span></a><span data-dcnode-id="4802" instrument_node=""> is generally thought by scholars to have emerged in Northwestern Europe, especially in </span><a data-dcnode-id="4800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_history_of_the_United_Kingdom" title="Economic history of the United Kingdom"><span data-dcnode-id="4801" instrument_node="">Great Britain</span></a><span data-dcnode-id="4799" instrument_node=""> and </span><a data-dcnode-id="4797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_history_of_the_Netherlands_%281500%25E2%2580%25931815%29" title="Economic history of the Netherlands (1500–1815)"><span data-dcnode-id="4798" instrument_node="">the Netherlands</span></a><span data-dcnode-id="4796" instrument_node="">. Over the following centuries, </span><a data-dcnode-id="4794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_%28economics%29" title="Capital (economics)"><span data-dcnode-id="4795" instrument_node="">capital</span></a><span data-dcnode-id="4793" instrument_node=""> accumulated by a variety of methods, at a variety of scales, and became associated with much variation in the </span><a class="mw-redirect" data-dcnode-id="4791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concentration_of_wealth" title="Concentration of wealth"><span data-dcnode-id="4792" instrument_node="">concentration of wealth</span></a><span data-dcnode-id="4790" instrument_node=""> and </span><a data-dcnode-id="4788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_power" title="Economic power"><span data-dcnode-id="4789" instrument_node="">economic power</span></a><span data-dcnode-id="4787" instrument_node="">. Capitalism gradually became the dominant economic system throughout the world.</span><sup class="reference" data-dcnode-id="4784" id="cite_ref-1"><a data-dcnode-id="4785" href="#cite_note-1"><span data-dcnode-id="4786" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="4781" id="cite_ref-2"><a data-dcnode-id="4782" href="#cite_note-2"><span data-dcnode-id="4783" instrument_node="">[2]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="4774" style="white-space:nowrap;"><span data-dcnode-id="4780" instrument_node="">[</span><i data-dcnode-id="4776"><a data-dcnode-id="4777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4778" title="Quotation needed from source to verify. (March 2021)"><span data-dcnode-id="4779" instrument_node="">need quotation to verify</span></span></a></i><span data-dcnode-id="4775" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="4771" id="cite_ref-Scott_2005_3-0"><a data-dcnode-id="4772" href="#cite_note-Scott_2005-3"><span data-dcnode-id="4773" instrument_node="">[3]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="4764" style="white-space:nowrap;"><span data-dcnode-id="4770" instrument_node="">[</span><i data-dcnode-id="4766"><a data-dcnode-id="4767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AVerifiability" title="Wikipedia:Verifiability"><span data-dcnode-id="4768" title="Quotation needed from source to verify. (March 2021)"><span data-dcnode-id="4769" instrument_node="">need quotation to verify</span></span></a></i><span data-dcnode-id="4765" instrument_node="">]</span></sup><span data-dcnode-id="4763" instrument_node="">

</span><li class="toclevel-1 tocsection-21" data-dcnode-id="4554"><a data-dcnode-id="4555" href="#Future"><span class="tocnumber" data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">7</span></span><span data-dcnode-id="4558" instrument_node=""> </span><span class="toctext" data-dcnode-id="4556"><span data-dcnode-id="4557" instrument_node="">Future</span></span></a></li><span data-dcnode-id="4553" instrument_node="">
</span><li class="toclevel-1 tocsection-22" data-dcnode-id="4546"><a data-dcnode-id="4547" href="#Role_of_women"><span class="tocnumber" data-dcnode-id="4551"><span data-dcnode-id="4552" instrument_node="">8</span></span><span data-dcnode-id="4550" instrument_node=""> </span><span class="toctext" data-dcnode-id="4548"><span data-dcnode-id="4549" instrument_node="">Role of women</span></span></a></li><span data-dcnode-id="4545" instrument_node="">
</span><li class="toclevel-1 tocsection-23" data-dcnode-id="4538"><a data-dcnode-id="4539" href="#See_also"><span class="tocnumber" data-dcnode-id="4543"><span data-dcnode-id="4544" instrument_node="">9</span></span><span data-dcnode-id="4542" instrument_node=""> </span><span class="toctext" data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">See also</span></span></a></li><span data-dcnode-id="4537" instrument_node="">
</span><li class="toclevel-1 tocsection-24" data-dcnode-id="4530"><a data-dcnode-id="4531" href="#References"><span class="tocnumber" data-dcnode-id="4535"><span data-dcnode-id="4536" instrument_node="">10</span></span><span data-dcnode-id="4534" instrument_node=""> </span><span class="toctext" data-dcnode-id="4532"><span data-dcnode-id="4533" instrument_node="">References</span></span></a></li><span data-dcnode-id="4529" instrument_node="">

</span><h2 data-dcnode-id="4507"><span class="mw-headline" data-dcnode-id="4515" id="Historiography"><span data-dcnode-id="4516" instrument_node="">Historiography</span></span><span class="mw-editsection" data-dcnode-id="4508"><span class="mw-editsection-bracket" data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">[</span></span><a data-dcnode-id="4511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D1" title="Edit section: Historiography"><span data-dcnode-id="4512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4509"><span data-dcnode-id="4510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4506" instrument_node="">
</span><p data-dcnode-id="4496"><span data-dcnode-id="4505" instrument_node="">The processes by which capitalism emerged, evolved, and spread are the subject of extensive research and debate among historians. Debates sometimes focus on how to bring substantive historical data to bear on key questions.</span><sup class="reference" data-dcnode-id="4502" id="cite_ref-4"><a data-dcnode-id="4503" href="#cite_note-4"><span data-dcnode-id="4504" instrument_node="">[4]</span></a></sup><span data-dcnode-id="4501" instrument_node=""> Key parameters of debate include: the extent to which capitalism is a natural human behavior, versus the extent to which it arises from specific historical circumstances; whether its origins lie in towns and trade or in rural property relations; the role of class conflict; the role of the state; the extent to which capitalism is a distinctively European innovation; its relationship with European imperialism; whether technological change is a driver or merely a secondary byproduct of capitalism; and whether or not it is the most beneficial way to organize human societies.</span><sup class="reference" data-dcnode-id="4498" id="cite_ref-Ellen_Meiksins_Wood_2002_5-0"><a data-dcnode-id="4499" href="#cite_note-Ellen_Meiksins_Wood_2002-5"><span data-dcnode-id="4500" instrument_node="">[5]</span></a></sup><span data-dcnode-id="4497" instrument_node="">
</span></p><p data-dcnode-id="4474"><span data-dcnode-id="4495" instrument_node="">The historiography of capitalism can be divided into two broad schools.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4488" style="white-space:nowrap;"><span data-dcnode-id="4494" instrument_node="">[</span><i data-dcnode-id="4490"><a data-dcnode-id="4491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4492" title="This claim needs references to reliable sources. (April 2020)"><span data-dcnode-id="4493" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4489" instrument_node="">]</span></sup><span data-dcnode-id="4487" instrument_node=""> One is associated with </span><a data-dcnode-id="4485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_liberalism" title="Economic liberalism"><span data-dcnode-id="4486" instrument_node="">economic liberalism</span></a><span data-dcnode-id="4484" instrument_node="">, with the 18th-century economist </span><a data-dcnode-id="4482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="4483" instrument_node="">Adam Smith</span></a><span data-dcnode-id="4481" instrument_node=""> as a foundational figure. The other is associated with </span><a data-dcnode-id="4479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism" title="Marxism"><span data-dcnode-id="4480" instrument_node="">Marxism</span></a><span data-dcnode-id="4478" instrument_node="">, drawing particular inspiration from the 19th-century economist </span><a data-dcnode-id="4476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Marx" title="Karl Marx"><span data-dcnode-id="4477" instrument_node="">Karl Marx</span></a><span data-dcnode-id="4475" instrument_node="">.
</span></p><p data-dcnode-id="4456"><span data-dcnode-id="4473" instrument_node="">Liberals view capitalism as an expression of natural human behaviors that have been in evidence for millennia and the most beneficial way of promoting human well being.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4466" style="white-space:nowrap;"><span data-dcnode-id="4472" instrument_node="">[</span><i data-dcnode-id="4468"><a data-dcnode-id="4469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4470" title="This claim needs references to reliable sources. (May 2020)"><span data-dcnode-id="4471" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4467" instrument_node="">]</span></sup><span data-dcnode-id="4465" instrument_node=""> They see capitalism as originating in trade and commerce, and freeing people to exercise their entrepreneurial natures.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4458" style="white-space:nowrap;"><span data-dcnode-id="4464" instrument_node="">[</span><i data-dcnode-id="4460"><a data-dcnode-id="4461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4462" title="This claim needs references to reliable sources. (May 2020)"><span data-dcnode-id="4463" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4459" instrument_node="">]</span></sup><span data-dcnode-id="4457" instrument_node="">
</span></p><p data-dcnode-id="4428"><span data-dcnode-id="4455" instrument_node="">Marxists view capitalism as a unique </span><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mode_of_production" title="Mode of production"><span data-dcnode-id="4454" instrument_node="">mode of production</span></a><span data-dcnode-id="4452" instrument_node=""> involving the </span><a class="mw-redirect" data-dcnode-id="4450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourgeoise" title="Bourgeoise"><span data-dcnode-id="4451" instrument_node="">bourgeoise</span></a><span data-dcnode-id="4449" instrument_node=""> and </span><a data-dcnode-id="4447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletariat" title="Proletariat"><span data-dcnode-id="4448" instrument_node="">proletariat</span></a><span data-dcnode-id="4446" instrument_node=""> that emerged as a result of the fall of </span><a data-dcnode-id="4444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudalism" title="Feudalism"><span data-dcnode-id="4445" instrument_node="">feudalism</span></a><span data-dcnode-id="4443" instrument_node=""> and the beginning of the </span><a data-dcnode-id="4441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="4442" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="4440" instrument_node="">. This rejects the notion that capitalism has existed for millennia and is a part of </span><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_nature" title="Human nature"><span data-dcnode-id="4439" instrument_node="">human nature</span></a><span data-dcnode-id="4437" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4430" style="white-space:nowrap;"><span data-dcnode-id="4436" instrument_node="">[</span><i data-dcnode-id="4432"><a data-dcnode-id="4433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4434" title="This claim needs references to reliable sources. (April 2022)"><span data-dcnode-id="4435" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4431" instrument_node="">]</span></sup><span data-dcnode-id="4429" instrument_node="">
</span></p><span data-dcnode-id="4427" instrument_node="">
</span><h3 data-dcnode-id="4417"><span class="mw-headline" data-dcnode-id="4425" id="Origins"><span data-dcnode-id="4426" instrument_node="">Origins</span></span><span class="mw-editsection" data-dcnode-id="4418"><span class="mw-editsection-bracket" data-dcnode-id="4423"><span data-dcnode-id="4424" instrument_node="">[</span></span><a data-dcnode-id="4421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D2" title="Edit section: Origins"><span data-dcnode-id="4422" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4419"><span data-dcnode-id="4420" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4416" instrument_node="">
</span><p data-dcnode-id="4394"><span data-dcnode-id="4415" instrument_node="">The origins of capitalism have been much debated (and depend partly on how capitalism is defined). The traditional account, originating in classical 18th-century liberal economic thought and still often articulated, is the 'commercialisation model'. This sees capitalism originating in trade. In this reading, capitalism emerged from earlier trade once merchants had acquired sufficient wealth (referred to as '</span><a class="mw-redirect" data-dcnode-id="4413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primitive_capital" title="Primitive capital"><span data-dcnode-id="4414" instrument_node="">primitive capital</span></a><span data-dcnode-id="4412" instrument_node="">') to begin investing in increasingly productive technology. This account tends to see capitalism as a continuation of trade, arising when people's natural entrepreneurialism was freed from the constraints of </span><a data-dcnode-id="4410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudalism" title="Feudalism"><span data-dcnode-id="4411" instrument_node="">feudalism</span></a><span data-dcnode-id="4409" instrument_node="">, partly by urbanisation.</span><sup class="reference" data-dcnode-id="4406" id="cite_ref-6"><a data-dcnode-id="4407" href="#cite_note-6"><span data-dcnode-id="4408" instrument_node="">[6]</span></a></sup><span data-dcnode-id="4405" instrument_node=""> Thus it traces capitalism to early forms of </span><a data-dcnode-id="4403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merchant_capitalism" title="Merchant capitalism"><span data-dcnode-id="4404" instrument_node="">merchant capitalism</span></a><span data-dcnode-id="4402" instrument_node=""> practiced in Western Europe during the </span><a data-dcnode-id="4400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" title="Middle Ages"><span data-dcnode-id="4401" instrument_node="">Middle Ages</span></a><span data-dcnode-id="4399" instrument_node="">.</span><sup class="reference" data-dcnode-id="4396" id="cite_ref-Banaji_7-0"><a data-dcnode-id="4397" href="#cite_note-Banaji-7"><span data-dcnode-id="4398" instrument_node="">[7]</span></a></sup><span data-dcnode-id="4395" instrument_node="">
</span></p><span data-dcnode-id="4393" instrument_node="">
</span><h4 data-dcnode-id="4383"><span class="mw-headline" data-dcnode-id="4391" id="Other_views"><span data-dcnode-id="4392" instrument_node="">Other views</span></span><span class="mw-editsection" data-dcnode-id="4384"><span class="mw-editsection-bracket" data-dcnode-id="4389"><span data-dcnode-id="4390" instrument_node="">[</span></span><a data-dcnode-id="4387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D3" title="Edit section: Other views"><span data-dcnode-id="4388" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4385"><span data-dcnode-id="4386" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4382" instrument_node="">
</span><p data-dcnode-id="4362"><span data-dcnode-id="4381" instrument_node="">A competitor to the 'commercialisation model' is the 'agrarian model',</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4374" style="white-space:nowrap;"><span data-dcnode-id="4380" instrument_node="">[</span><i data-dcnode-id="4376"><a data-dcnode-id="4377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4378" title="source is needed to proove this theory is a major opposing theory (April 2020)"><span data-dcnode-id="4379" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4375" instrument_node="">]</span></sup><span data-dcnode-id="4373" instrument_node=""> which explains the rise of capitalism by unique circumstances in English agrarianism. The evidence it cites is that traditional mercantilism focused on moving goods from markets where they were cheap to markets where they were expensive rather than investing in production, and that many cultures (including the early modern </span><a data-dcnode-id="4371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dutch_Republic" title="Dutch Republic"><span data-dcnode-id="4372" instrument_node="">Dutch Republic</span></a><span data-dcnode-id="4370" instrument_node="">) saw urbanisation and the amassing of wealth by merchants without the emergence of capitalist production.</span><sup class="reference" data-dcnode-id="4367" id="cite_ref-8"><a data-dcnode-id="4368" href="#cite_note-8"><span data-dcnode-id="4369" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="4364" id="cite_ref-9"><a data-dcnode-id="4365" href="#cite_note-9"><span data-dcnode-id="4366" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4363" instrument_node="">
</span></p><p data-dcnode-id="4328"><span data-dcnode-id="4361" instrument_node="">The agrarian argument developed particularly through </span><a data-dcnode-id="4359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Polanyi" title="Karl Polanyi"><span data-dcnode-id="4360" instrument_node="">Karl Polanyi</span></a><span data-dcnode-id="4358" instrument_node="">'s </span><i data-dcnode-id="4355"><a data-dcnode-id="4356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Great_Transformation_%28book%29" title="The Great Transformation (book)"><span data-dcnode-id="4357" instrument_node="">The Great Transformation</span></a></i><span data-dcnode-id="4354" instrument_node=""> (1944), </span><a data-dcnode-id="4352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maurice_Dobb" title="Maurice Dobb"><span data-dcnode-id="4353" instrument_node="">Maurice Dobb</span></a><span data-dcnode-id="4351" instrument_node="">'s </span><i data-dcnode-id="4349"><span data-dcnode-id="4350" instrument_node="">Studies in the Development of Capitalism</span></i><span data-dcnode-id="4348" instrument_node=""> (1946), and </span><a data-dcnode-id="4346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Brenner" title="Robert Brenner"><span data-dcnode-id="4347" instrument_node="">Robert Brenner</span></a><span data-dcnode-id="4345" instrument_node="">'s research in the 1970s, the discussion of which is known as the </span><a class="mw-redirect" data-dcnode-id="4343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brenner_Debate" title="Brenner Debate"><span data-dcnode-id="4344" instrument_node="">Brenner Debate</span></a><span data-dcnode-id="4342" instrument_node="">. In the wake of the </span><a data-dcnode-id="4340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Norman_Conquest" title="Norman Conquest"><span data-dcnode-id="4341" instrument_node="">Norman Conquest</span></a><span data-dcnode-id="4339" instrument_node="">, the English state was unusually centralised. This gave aristocrats relatively limited powers to extract wealth directly from their feudal underlings through political means (not least the threat of violence). England's centralisation also meant that an unusual number of English farmers were not peasants (with their own land and thus direct access to subsistence) but </span><a data-dcnode-id="4337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tenant_farmer" title="Tenant farmer"><span data-dcnode-id="4338" instrument_node="">tenants</span></a><span data-dcnode-id="4336" instrument_node=""> (renting their land). These circumstances produced a market in leases. Landlords, lacking other ways to extract wealth, were motivated to rent to tenants who could pay the most, while tenants, lacking security of tenure, were motivated to farm as productively as possible to win leases in a competitive market. This led to a cascade of effects whereby successful tenant farmers became agrarian capitalists; unsuccessful ones became wage-labourers, required to sell their labour in order to live; and landlords promoted the privatisation and renting out of common land, not least through the </span><a class="mw-redirect" data-dcnode-id="4334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enclosures" title="Enclosures"><span data-dcnode-id="4335" instrument_node="">enclosures</span></a><span data-dcnode-id="4333" instrument_node="">. In this reading, 'it was not merchants or manufacturers who drove the process that propelled the early development of capitalism. The transformation of social property relations was firmly rooted in the countryside, and the transformation of England's trade and industry was result more than cause of England's transition to capitalism'.</span><sup class="reference" data-dcnode-id="4330" id="cite_ref-10"><a data-dcnode-id="4331" href="#cite_note-10"><span data-dcnode-id="4332" instrument_node="">[10]</span></a></sup><span data-dcnode-id="4329" instrument_node="">
</span></p><span data-dcnode-id="4327" instrument_node="">
</span><h3 data-dcnode-id="4317"><span class="mw-headline" data-dcnode-id="4325" id="21st-century_scholarship"><span data-dcnode-id="4326" instrument_node="">21st-century scholarship</span></span><span class="mw-editsection" data-dcnode-id="4318"><span class="mw-editsection-bracket" data-dcnode-id="4323"><span data-dcnode-id="4324" instrument_node="">[</span></span><a data-dcnode-id="4321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D4" title="Edit section: 21st-century scholarship"><span data-dcnode-id="4322" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4316" instrument_node="">
</span><p data-dcnode-id="4290"><span data-dcnode-id="4315" instrument_node="">The 21st century has seen renewed interest in the history of capitalism, and "History of Capitalism" has become a field in its own right, with courses in history departments. In the 2000s, Harvard University founded the Program on the Study of U.S. Capitalism; Cornell University established the History of Capitalism Initiative;</span><sup class="reference" data-dcnode-id="4312" id="cite_ref-11"><a data-dcnode-id="4313" href="#cite_note-11"><span data-dcnode-id="4314" instrument_node="">[11]</span></a></sup><span data-dcnode-id="4311" instrument_node=""> and Columbia University Press launched a monograph series titled </span><i data-dcnode-id="4309"><span data-dcnode-id="4310" instrument_node="">Studies in the History of U.S. Capitalism</span></i><span data-dcnode-id="4308" instrument_node="">.</span><sup class="reference" data-dcnode-id="4305" id="cite_ref-12"><a data-dcnode-id="4306" href="#cite_note-12"><span data-dcnode-id="4307" instrument_node="">[12]</span></a></sup><span data-dcnode-id="4304" instrument_node=""> This field includes topics such as insurance, banking and regulation, the political dimension, and the impact on the middle classes, the poor and women and minorities.</span><sup class="reference" data-dcnode-id="4301" id="cite_ref-13"><a data-dcnode-id="4302" href="#cite_note-13"><span data-dcnode-id="4303" instrument_node="">[13]</span></a></sup><sup class="reference" data-dcnode-id="4298" id="cite_ref-14"><a data-dcnode-id="4299" href="#cite_note-14"><span data-dcnode-id="4300" instrument_node="">[14]</span></a></sup><span data-dcnode-id="4297" instrument_node=""> These initiatives incorporate formerly neglected questions of race, gender, and sexuality into the history of capitalism. They have grown in the aftermath of the </span><a data-dcnode-id="4295" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%25932008" title="Financial crisis of 2007–2008"><span data-dcnode-id="4296" instrument_node="">financial crisis of 2007–2008</span></a><span data-dcnode-id="4294" instrument_node=""> and the associated </span><a data-dcnode-id="4292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Recession" title="Great Recession"><span data-dcnode-id="4293" instrument_node="">Great Recession</span></a><span data-dcnode-id="4291" instrument_node="">.
</span></p><p data-dcnode-id="4284"><span data-dcnode-id="4289" instrument_node="">Some other academic institutions, such as the Clemson Institute for the Study of Capitalism, reject the notion that race, gender, or sexuality have any significant relationship to capitalism at all and instead seek to show that laissez-faire capitalism, in particular, provides the best and most numerous economic opportunities for all people.</span><sup class="reference" data-dcnode-id="4286" id="cite_ref-15"><a data-dcnode-id="4287" href="#cite_note-15"><span data-dcnode-id="4288" instrument_node="">[15]</span></a></sup><span data-dcnode-id="4285" instrument_node="">
</span></p><span data-dcnode-id="4283" instrument_node="">
</span><h2 data-dcnode-id="4273"><span class="mw-headline" data-dcnode-id="4281" id="Agrarian_capitalism"><span data-dcnode-id="4282" instrument_node="">Agrarian capitalism</span></span><span class="mw-editsection" data-dcnode-id="4274"><span class="mw-editsection-bracket" data-dcnode-id="4279"><span data-dcnode-id="4280" instrument_node="">[</span></span><a data-dcnode-id="4277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D5" title="Edit section: Agrarian capitalism"><span data-dcnode-id="4278" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4275"><span data-dcnode-id="4276" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4272" instrument_node="">
</span><h3 data-dcnode-id="4262"><span class="mw-headline" data-dcnode-id="4270" id="Crisis_of_the_14th_century"><span data-dcnode-id="4271" instrument_node="">Crisis of the 14th century</span></span><span class="mw-editsection" data-dcnode-id="4263"><span class="mw-editsection-bracket" data-dcnode-id="4268"><span data-dcnode-id="4269" instrument_node="">[</span></span><a data-dcnode-id="4266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D6" title="Edit section: Crisis of the 14th century"><span data-dcnode-id="4267" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4264"><span data-dcnode-id="4265" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4261" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4233"><div class="thumbinner" data-dcnode-id="4234" style="width:302px;"><a class="image" data-dcnode-id="4259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlan_mediaeval_manor.jpg"><img alt="" class="thumbimage" data-dcnode-id="4260" data-file-height="2154" data-file-width="1458" decoding="async" height="443" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plan_mediaeval_manor.jpg/300px-Plan_mediaeval_manor.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plan_mediaeval_manor.jpg/450px-Plan_mediaeval_manor.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Plan_mediaeval_manor.jpg/600px-Plan_mediaeval_manor.jpg 2x" width="300"></a><span data-dcnode-id="4258" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4235"><div class="magnify" data-dcnode-id="4256"><a class="internal" data-dcnode-id="4257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APlan_mediaeval_manor.jpg" title="Enlarge"></a></div><span data-dcnode-id="4255" instrument_node="">Map of a </span><a data-dcnode-id="4253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manorialism" title="Manorialism"><span data-dcnode-id="4254" instrument_node="">medieval manor</span></a><span data-dcnode-id="4252" instrument_node="">. Notice the large commons area and the division of land into small strips. The mustard-colored areas are part of the </span><b data-dcnode-id="4249"><a data-dcnode-id="4250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demesne" title="Demesne"><span data-dcnode-id="4251" instrument_node="">demesne</span></a></b><span data-dcnode-id="4248" instrument_node="">, the </span><a data-dcnode-id="4246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hatching" title="Hatching"><span data-dcnode-id="4247" instrument_node="">hatched</span></a><span data-dcnode-id="4245" instrument_node=""> areas part of the </span><b data-dcnode-id="4242"><a data-dcnode-id="4243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glebe" title="Glebe"><span data-dcnode-id="4244" instrument_node="">glebe</span></a></b><span data-dcnode-id="4241" instrument_node="">.</span><br data-dcnode-id="4240"><span data-dcnode-id="4239" instrument_node="">William R. Shepherd, </span><i data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Historical Atlas</span></i><span data-dcnode-id="4236" instrument_node="">, 01923</span></div></div></div><span data-dcnode-id="4232" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4231" instrument_node="">According to some historians,</span><sup class="reference" data-dcnode-id="4228" id="cite_ref-16"><a data-dcnode-id="4229" href="#cite_note-16"><span data-dcnode-id="4230" instrument_node="">[16]</span></a></sup><span data-dcnode-id="4227" instrument_node=""> the modern capitalist system originated in the "</span><a data-dcnode-id="4225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crisis_of_the_Late_Middle_Ages" title="Crisis of the Late Middle Ages"><span data-dcnode-id="4226" instrument_node="">crisis of the Late Middle Ages</span></a><span data-dcnode-id="4224" instrument_node="">", a conflict between the land-owning aristocracy and the agricultural producers, or </span><a data-dcnode-id="4222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Serfdom" title="Serfdom"><span data-dcnode-id="4223" instrument_node="">serfs</span></a><span data-dcnode-id="4221" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="4219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manorial" title="Manorial"><span data-dcnode-id="4220" instrument_node="">Manorial</span></a><span data-dcnode-id="4218" instrument_node=""> arrangements inhibited the development of capitalism in a number of ways.  Serfs had obligations to produce for lords and therefore had no interest in technological innovation; they also had no interest in cooperating with one another because they produced to sustain their own families. The lords who owned the land</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4211" style="white-space:nowrap;"><span data-dcnode-id="4217" instrument_node="">[</span><i data-dcnode-id="4213"><a data-dcnode-id="4214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4215" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="4216" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4212" instrument_node="">]</span></sup><span data-dcnode-id="4210" instrument_node=""> relied on force to guarantee that they received sufficient food. Because lords were not producing to sell on the market, there was no competitive pressure for them to innovate. Finally, because lords expanded their power and wealth through military means, they spent their wealth on military equipment or on </span><a data-dcnode-id="4208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conspicuous_consumption" title="Conspicuous consumption"><span data-dcnode-id="4209" instrument_node="">conspicuous consumption</span></a><span data-dcnode-id="4207" instrument_node=""> that helped foster alliances with other lords; they had no incentive to invest in developing new productive technologies.</span><sup class="reference" data-dcnode-id="4204" id="cite_ref-17"><a data-dcnode-id="4205" href="#cite_note-17"><span data-dcnode-id="4206" instrument_node="">[17]</span></a></sup><span data-dcnode-id="4203" instrument_node="">
</span></p><p data-dcnode-id="4184"><span data-dcnode-id="4201" instrument_node="">The </span><a data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval_demography" title="Medieval demography"><span data-dcnode-id="4200" instrument_node="">demographic</span></a><span data-dcnode-id="4198" instrument_node=""> crisis of the 14th century upset this arrangement. This crisis had several causes: agricultural productivity reached its technological limitations and stopped growing, bad weather led to the </span><a data-dcnode-id="4196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Famine_of_1315%25E2%2580%25931317" title="Great Famine of 1315–1317"><span data-dcnode-id="4197" instrument_node="">Great Famine of 1315–1317</span></a><span data-dcnode-id="4195" instrument_node="">, and the </span><a data-dcnode-id="4193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Death" title="Black Death"><span data-dcnode-id="4194" instrument_node="">Black Death</span></a><span data-dcnode-id="4192" instrument_node=""> of 1348–1350 led to a population crash. These factors led to a decline in agricultural production. In response, </span><a class="mw-redirect" data-dcnode-id="4190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudal_lord" title="Feudal lord"><span data-dcnode-id="4191" instrument_node="">feudal lords</span></a><span data-dcnode-id="4189" instrument_node=""> sought to expand agricultural production by extending their domains through warfare; therefore they demanded more tribute from their serfs to pay for military expenses. In England, many serfs rebelled. Some moved to towns, some bought land, and some entered into favorable contracts to rent lands from lords who needed to repopulate their estates.</span><sup class="reference" data-dcnode-id="4186" id="cite_ref-18"><a data-dcnode-id="4187" href="#cite_note-18"><span data-dcnode-id="4188" instrument_node="">[18]</span></a></sup><span data-dcnode-id="4185" instrument_node="">
</span></p><p data-dcnode-id="4156"><span data-dcnode-id="4183" instrument_node="">The collapse of the </span><i data-dcnode-id="4180"><a data-dcnode-id="4181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manorialism" title="Manorialism"><span data-dcnode-id="4182" instrument_node="">manorial</span></a></i><span data-dcnode-id="4179" instrument_node=""> system in England enlarged the class of </span><a data-dcnode-id="4177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tenant_farmer" title="Tenant farmer"><span data-dcnode-id="4178" instrument_node="">tenant farmers</span></a><span data-dcnode-id="4176" instrument_node=""> with more freedom to market their goods and thus more incentive to invest in new technologies. Lords who did not want to rely on renters could buy out or evict tenant farmers, but then had to hire free labor to work their estates, giving them an incentive to invest in two kinds of commodity owners. One kind was those who had money, the means of production, and subsistence, who were eager to </span><a data-dcnode-id="4174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valorisation" title="Valorisation"><span data-dcnode-id="4175" instrument_node="">valorize</span></a><span data-dcnode-id="4173" instrument_node=""> the sum of value they had appropriated by buying the labor power of others.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4166" style="white-space:nowrap;"><span data-dcnode-id="4172" instrument_node="">[</span><i data-dcnode-id="4168"><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4170" title="This claim needs references to reliable sources. (April 2017)"><span data-dcnode-id="4171" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4167" instrument_node="">]</span></sup><span data-dcnode-id="4165" instrument_node=""> The other kind was free workers, who sold their own labor. The workers neither formed part of the means of production nor owned the means of production that transformed land and even money into what we now call "capital".</span><sup class="reference" data-dcnode-id="4162" id="cite_ref-19"><a data-dcnode-id="4163" href="#cite_note-19"><span data-dcnode-id="4164" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4161" instrument_node=""> Marx labeled this period the "pre-history of capitalism".</span><sup class="reference" data-dcnode-id="4158" id="cite_ref-ReferenceA_20-0"><a data-dcnode-id="4159" href="#cite_note-ReferenceA-20"><span data-dcnode-id="4160" instrument_node="">[20]</span></a></sup><span data-dcnode-id="4157" instrument_node="">
</span></p><p data-dcnode-id="4124"><span data-dcnode-id="4155" instrument_node="">In effect, </span><a data-dcnode-id="4153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudalism" title="Feudalism"><span data-dcnode-id="4154" instrument_node="">feudalism</span></a><span data-dcnode-id="4152" instrument_node=""> began to lay some of the foundations necessary for the development of </span><a data-dcnode-id="4150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercantilism" title="Mercantilism"><span data-dcnode-id="4151" instrument_node="">mercantilism</span></a><span data-dcnode-id="4149" instrument_node="">, a precursor of capitalism. Feudalism lasted from the medieval period through the 16th century. Feudal manors were almost entirely self-sufficient, and therefore limited the role of the market. This stifled any incipient tendency towards capitalism. However, the relatively sudden emergence of new technologies and discoveries, particularly in agriculture</span><sup class="reference" data-dcnode-id="4146" id="cite_ref-21"><a data-dcnode-id="4147" href="#cite_note-21"><span data-dcnode-id="4148" instrument_node="">[21]</span></a></sup><span data-dcnode-id="4145" instrument_node=""> and exploration, facilitated the growth of capitalism. The most important development at the end of feudalism</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4138" style="white-space:nowrap;"><span data-dcnode-id="4144" instrument_node="">[</span><i data-dcnode-id="4140"><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4142" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="4143" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4139" instrument_node="">]</span></sup><span data-dcnode-id="4137" instrument_node=""> was the emergence of what Robert Degan calls "the dichotomy between wage earners and capitalist merchants".</span><sup class="reference" data-dcnode-id="4134" id="cite_ref-22"><a data-dcnode-id="4135" href="#cite_note-22"><span data-dcnode-id="4136" instrument_node="">[22]</span></a></sup><span data-dcnode-id="4133" instrument_node=""> The competitive nature meant there are always winners and losers, and this became clear as feudalism evolved into mercantilism, an economic system characterized by the private or corporate ownership of capital goods, investments determined by private decisions, and by prices, production, and the distribution of goods determined mainly by competition in a free market.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4126" style="white-space:nowrap;"><span data-dcnode-id="4132" instrument_node="">[</span><i data-dcnode-id="4128"><a data-dcnode-id="4129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4130" title="This claim needs references to reliable sources. (June 2015)"><span data-dcnode-id="4131" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4127" instrument_node="">]</span></sup><span data-dcnode-id="4125" instrument_node="">
</span></p><span data-dcnode-id="4123" instrument_node="">
</span><h3 data-dcnode-id="4113"><span class="mw-headline" data-dcnode-id="4121" id="Enclosure"><span data-dcnode-id="4122" instrument_node="">Enclosure</span></span><span class="mw-editsection" data-dcnode-id="4114"><span class="mw-editsection-bracket" data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">[</span></span><a data-dcnode-id="4117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D7" title="Edit section: Enclosure"><span data-dcnode-id="4118" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4112" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="4106" role="note"><span data-dcnode-id="4109" instrument_node="">Main article: </span><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enclosure" title="Enclosure"><span data-dcnode-id="4108" instrument_node="">Enclosure</span></a></div><span data-dcnode-id="4105" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4096"><div class="thumbinner" data-dcnode-id="4097" style="width:302px;"><a class="image" data-dcnode-id="4103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADecaying_hedge_-_geograph.org.uk_-_1715089.jpg"><img alt="" class="thumbimage" data-dcnode-id="4104" data-file-height="512" data-file-width="640" decoding="async" height="240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Decaying_hedge_-_geograph.org.uk_-_1715089.jpg/300px-Decaying_hedge_-_geograph.org.uk_-_1715089.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Decaying_hedge_-_geograph.org.uk_-_1715089.jpg/450px-Decaying_hedge_-_geograph.org.uk_-_1715089.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Decaying_hedge_-_geograph.org.uk_-_1715089.jpg/600px-Decaying_hedge_-_geograph.org.uk_-_1715089.jpg 2x" width="300"></a><span data-dcnode-id="4102" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4098"><div class="magnify" data-dcnode-id="4100"><a class="internal" data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADecaying_hedge_-_geograph.org.uk_-_1715089.jpg" title="Enlarge"></a></div><span data-dcnode-id="4099" instrument_node="">Decaying hedges mark the lines of the straight field boundaries created by a Parliamentary Act of Enclosure.</span></div></div></div><span data-dcnode-id="4095" instrument_node="">
</span><p data-dcnode-id="4071"><span data-dcnode-id="4094" instrument_node="">England in the 16th century was already a centralized state, in which much of the feudal order of </span><a class="mw-redirect" data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medieval_Europe" title="Medieval Europe"><span data-dcnode-id="4093" instrument_node="">Medieval Europe</span></a><span data-dcnode-id="4091" instrument_node=""> had been swept away. This centralization was strengthened by a good system of roads and a disproportionately large capital city, </span><a data-dcnode-id="4089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London" title="London"><span data-dcnode-id="4090" instrument_node="">London</span></a><span data-dcnode-id="4088" instrument_node="">.</span><sup class="reference" data-dcnode-id="4085" id="cite_ref-23"><a data-dcnode-id="4086" href="#cite_note-23"><span data-dcnode-id="4087" instrument_node="">[23]</span></a></sup><span data-dcnode-id="4084" instrument_node=""> The capital acted as a central market for the entire country, creating a large internal market for goods, in contrast to the fragmented feudal holdings that prevailed in most parts of the </span><a data-dcnode-id="4082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Continental_Europe" title="Continental Europe"><span data-dcnode-id="4083" instrument_node="">Continent</span></a><span data-dcnode-id="4081" instrument_node="">. The economic foundations of the agricultural system were also beginning to diverge substantially; the manorial system had broken down by this time, and land began to be concentrated in the hands of fewer landlords with increasingly large estates. The system put pressure on both the landlords and the tenants to increase agricultural productivity to create profit. The weakened coercive power of the </span><a data-dcnode-id="4079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aristocracy" title="Aristocracy"><span data-dcnode-id="4080" instrument_node="">aristocracy</span></a><span data-dcnode-id="4078" instrument_node=""> to extract peasant </span><a data-dcnode-id="4076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Excess_supply" title="Excess supply"><span data-dcnode-id="4077" instrument_node="">surpluses</span></a><span data-dcnode-id="4075" instrument_node=""> encouraged them to try out better methods. The tenants also had an incentive to improve their methods to succeed in an increasingly competitive </span><a class="mw-redirect" data-dcnode-id="4073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_market" title="Labour market"><span data-dcnode-id="4074" instrument_node="">labour market</span></a><span data-dcnode-id="4072" instrument_node="">. Land rents had moved away from the previous stagnant system of custom and feudal obligation, and were becoming directly subject to economic market forces.
</span></p><p data-dcnode-id="4042"><span data-dcnode-id="4070" instrument_node="">An important aspect of this process of change was the </span><a data-dcnode-id="4068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enclosure" title="Enclosure"><span data-dcnode-id="4069" instrument_node="">enclosure</span></a><sup class="reference" data-dcnode-id="4065" id="cite_ref-24"><a data-dcnode-id="4066" href="#cite_note-24"><span data-dcnode-id="4067" instrument_node="">[24]</span></a></sup><span data-dcnode-id="4064" instrument_node=""> of the </span><a data-dcnode-id="4062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Common_land" title="Common land"><span data-dcnode-id="4063" instrument_node="">common land</span></a><span data-dcnode-id="4061" instrument_node=""> previously held in the </span><a class="mw-redirect" data-dcnode-id="4059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Open_field_system" title="Open field system"><span data-dcnode-id="4060" instrument_node="">open field system</span></a><span data-dcnode-id="4058" instrument_node=""> where peasants had traditional rights, such as </span><a class="mw-redirect" data-dcnode-id="4056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mowing" title="Mowing"><span data-dcnode-id="4057" instrument_node="">mowing</span></a><span data-dcnode-id="4055" instrument_node=""> </span><a data-dcnode-id="4053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Meadow" title="Meadow"><span data-dcnode-id="4054" instrument_node="">meadows</span></a><span data-dcnode-id="4052" instrument_node=""> for </span><a data-dcnode-id="4050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hay" title="Hay"><span data-dcnode-id="4051" instrument_node="">hay</span></a><span data-dcnode-id="4049" instrument_node=""> and </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grazing" title="Grazing"><span data-dcnode-id="4048" instrument_node="">grazing</span></a><span data-dcnode-id="4046" instrument_node=""> </span><a data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Livestock" title="Livestock"><span data-dcnode-id="4045" instrument_node="">livestock</span></a><span data-dcnode-id="4043" instrument_node="">. Once enclosed, these uses of the land became restricted to the owner, and it ceased to be land for commons. The process of enclosure began to be a widespread feature of the English agricultural landscape during the 16th century. By the 19th century, unenclosed commons had become largely restricted to rough pasture in mountainous areas and to relatively small parts of the lowlands.
</span></p><p data-dcnode-id="4011"><a data-dcnode-id="4040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist_historiography" title="Marxist historiography"><span data-dcnode-id="4041" instrument_node="">Marxist and neo-Marxist historians</span></a><span data-dcnode-id="4039" instrument_node=""> argue that rich landowners used their control of state processes to appropriate public land for their private benefit. This created a landless </span><a data-dcnode-id="4037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="4038" instrument_node="">working class</span></a><span data-dcnode-id="4036" instrument_node=""> that provided the labour required in the new industries developing in the </span><a class="mw-redirect" data-dcnode-id="4034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_of_England" title="North of England"><span data-dcnode-id="4035" instrument_node="">north of England</span></a><span data-dcnode-id="4033" instrument_node="">. For example: "In agriculture the years between 1760 and 1820 are the years of wholesale enclosure in which, in village after village, common rights are lost".</span><sup class="reference" data-dcnode-id="4030" id="cite_ref-25"><a data-dcnode-id="4031" href="#cite_note-25"><span data-dcnode-id="4032" instrument_node="">[25]</span></a></sup><span data-dcnode-id="4029" instrument_node=""> "Enclosure (when all the sophistications are allowed for) was a plain enough case of class robbery".</span><sup class="reference" data-dcnode-id="4026" id="cite_ref-26"><a data-dcnode-id="4027" href="#cite_note-26"><span data-dcnode-id="4028" instrument_node="">[26]</span></a></sup><span data-dcnode-id="4025" instrument_node=""> Anthropologist </span><a data-dcnode-id="4023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jason_Hickel" title="Jason Hickel"><span data-dcnode-id="4024" instrument_node="">Jason Hickel</span></a><span data-dcnode-id="4022" instrument_node=""> notes that this process of enclosure led to myriad peasant revolts, among them </span><a data-dcnode-id="4020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kett%2527s_Rebellion" title="Kett's Rebellion"><span data-dcnode-id="4021" instrument_node="">Kett's Rebellion</span></a><span data-dcnode-id="4019" instrument_node=""> and the </span><a data-dcnode-id="4017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Midland_Revolt" title="Midland Revolt"><span data-dcnode-id="4018" instrument_node="">Midland Revolt</span></a><span data-dcnode-id="4016" instrument_node="">, which culminated in violent repression and executions.</span><sup class="reference" data-dcnode-id="4013" id="cite_ref-27"><a data-dcnode-id="4014" href="#cite_note-27"><span data-dcnode-id="4015" instrument_node="">[27]</span></a></sup><span data-dcnode-id="4012" instrument_node="">
</span></p><p data-dcnode-id="3991"><span data-dcnode-id="4010" instrument_node="">Other scholars</span><sup class="reference" data-dcnode-id="4007" id="cite_ref-28"><a data-dcnode-id="4008" href="#cite_note-28"><span data-dcnode-id="4009" instrument_node="">[28]</span></a></sup><span data-dcnode-id="4006" instrument_node=""> argue that the better-off members of the European </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peasant" title="Peasant"><span data-dcnode-id="4005" instrument_node="">peasantry</span></a><span data-dcnode-id="4003" instrument_node=""> encouraged and participated actively in enclosure, seeking to end the perpetual poverty of </span><a class="mw-redirect" data-dcnode-id="4001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subsistence_farming" title="Subsistence farming"><span data-dcnode-id="4002" instrument_node="">subsistence farming</span></a><span data-dcnode-id="4000" instrument_node="">. "We should be careful not to ascribe to [enclosure] developments that were the consequence of a much broader and more complex process of historical change."</span><sup class="reference" data-dcnode-id="3997" id="cite_ref-29"><a data-dcnode-id="3998" href="#cite_note-29"><span data-dcnode-id="3999" instrument_node="">[29]</span></a></sup><span data-dcnode-id="3996" instrument_node=""> "[T]he impact of eighteenth and nineteenth century enclosure has been grossly exaggerated...."</span><sup class="reference" data-dcnode-id="3993" id="cite_ref-30"><a data-dcnode-id="3994" href="#cite_note-30"><span data-dcnode-id="3995" instrument_node="">[30]</span></a></sup><span data-dcnode-id="3992" instrument_node="">
</span></p><span data-dcnode-id="3990" instrument_node="">
</span><h2 data-dcnode-id="3980"><span class="mw-headline" data-dcnode-id="3988" id="Merchant_capitalism_and_mercantilism"><span data-dcnode-id="3989" instrument_node="">Merchant capitalism and mercantilism</span></span><span class="mw-editsection" data-dcnode-id="3981"><span class="mw-editsection-bracket" data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">[</span></span><a data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D8" title="Edit section: Merchant capitalism and mercantilism"><span data-dcnode-id="3985" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3979" instrument_node="">
</span><link data-dcnode-id="3978" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3971" role="note"><span data-dcnode-id="3977" instrument_node="">Main articles: </span><a data-dcnode-id="3975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Merchant_capitalism" title="Merchant capitalism"><span data-dcnode-id="3976" instrument_node="">Merchant capitalism</span></a><span data-dcnode-id="3974" instrument_node=""> and </span><a data-dcnode-id="3972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercantilism" title="Mercantilism"><span data-dcnode-id="3973" instrument_node="">Mercantilism</span></a></div><span data-dcnode-id="3970" instrument_node="">
</span><h3 data-dcnode-id="3960"><span class="mw-headline" data-dcnode-id="3968" id="Precedents"><span data-dcnode-id="3969" instrument_node="">Precedents</span></span><span class="mw-editsection" data-dcnode-id="3961"><span class="mw-editsection-bracket" data-dcnode-id="3966"><span data-dcnode-id="3967" instrument_node="">[</span></span><a data-dcnode-id="3964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D9" title="Edit section: Precedents"><span data-dcnode-id="3965" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3962"><span data-dcnode-id="3963" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3959" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3950"><div class="thumbinner" data-dcnode-id="3951" style="width:222px;"><a class="image" data-dcnode-id="3957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALorrain.seaport.jpg"><img alt="" class="thumbimage" data-dcnode-id="3958" data-file-height="818" data-file-width="1089" decoding="async" height="165" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Lorrain.seaport.jpg/220px-Lorrain.seaport.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/29/Lorrain.seaport.jpg/330px-Lorrain.seaport.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/29/Lorrain.seaport.jpg/440px-Lorrain.seaport.jpg 2x" width="220"></a><span data-dcnode-id="3956" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3952"><div class="magnify" data-dcnode-id="3954"><a class="internal" data-dcnode-id="3955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ALorrain.seaport.jpg" title="Enlarge"></a></div><span data-dcnode-id="3953" instrument_node="">A painting of a French seaport from 1638, at the height of mercantilism.</span></div></div></div><span data-dcnode-id="3949" instrument_node="">
</span><p data-dcnode-id="3933"><span data-dcnode-id="3948" instrument_node="">While trade has existed since early in human history, it was not capitalism.</span><sup class="reference" data-dcnode-id="3945" id="cite_ref-31"><a data-dcnode-id="3946" href="#cite_note-31"><span data-dcnode-id="3947" instrument_node="">[31]</span></a></sup><span data-dcnode-id="3944" instrument_node=""> The earliest recorded activity of long-distance profit-seeking merchants can be traced to the Old </span><a data-dcnode-id="3942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assyria" title="Assyria"><span data-dcnode-id="3943" instrument_node="">Assyrian</span></a><span data-dcnode-id="3941" instrument_node=""> merchants active in </span><a data-dcnode-id="3939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mesopotamia" title="Mesopotamia"><span data-dcnode-id="3940" instrument_node="">Mesopotamia</span></a><span data-dcnode-id="3938" instrument_node=""> the 2nd millennium BCE.</span><sup class="reference" data-dcnode-id="3935" id="cite_ref-32"><a data-dcnode-id="3936" href="#cite_note-32"><span data-dcnode-id="3937" instrument_node="">[32]</span></a></sup><span data-dcnode-id="3934" instrument_node=""> The Roman Empire developed more advanced forms of commerce, and similarly widespread networks existed in Islamic nations. However, capitalism took shape in Europe in the late Middle Ages and Renaissance.
</span></p><p data-dcnode-id="3894"><span data-dcnode-id="3932" instrument_node="">An early emergence of commerce occurred on monastic estates in Italy and France and in the independent </span><a data-dcnode-id="3930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Italian_city-states" title="Italian city-states"><span data-dcnode-id="3931" instrument_node="">city republics</span></a><span data-dcnode-id="3929" instrument_node=""> of Italy during the late </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_Ages" title="Middle Ages"><span data-dcnode-id="3928" instrument_node="">Middle Ages</span></a><span data-dcnode-id="3926" instrument_node="">. Innovations in banking, insurance, accountancy, and various production and commercial practices linked closely to a 'spirit' of frugality, reinvestment, and city life, promoted attitudes that sociologists have tended to associate only with </span><a data-dcnode-id="3924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northern_Europe" title="Northern Europe"><span data-dcnode-id="3925" instrument_node="">northern Europe</span></a><span data-dcnode-id="3923" instrument_node="">, </span><a data-dcnode-id="3921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestantism" title="Protestantism"><span data-dcnode-id="3922" instrument_node="">Protestantism</span></a><span data-dcnode-id="3920" instrument_node="">, and a much later age. The city republics maintained their political independence from </span><a data-dcnode-id="3918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holy_Roman_Empire" title="Holy Roman Empire"><span data-dcnode-id="3919" instrument_node="">Empire</span></a><span data-dcnode-id="3917" instrument_node=""> and </span><a data-dcnode-id="3915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Catholic_Church" title="Catholic Church"><span data-dcnode-id="3916" instrument_node="">Church</span></a><span data-dcnode-id="3914" instrument_node="">, traded with </span><a data-dcnode-id="3912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Africa" title="North Africa"><span data-dcnode-id="3913" instrument_node="">North Africa</span></a><span data-dcnode-id="3911" instrument_node="">, the </span><a data-dcnode-id="3909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Middle_East" title="Middle East"><span data-dcnode-id="3910" instrument_node="">Middle East</span></a><span data-dcnode-id="3908" instrument_node=""> and </span><a data-dcnode-id="3906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Asia" title="Asia"><span data-dcnode-id="3907" instrument_node="">Asia</span></a><span data-dcnode-id="3905" instrument_node="">, and introduced Eastern practices. They were also considerably different from the absolutist monarchies of Spain and France, and were strongly attached to civic liberty.</span><sup class="reference" data-dcnode-id="3902" id="cite_ref-33"><a data-dcnode-id="3903" href="#cite_note-33"><span data-dcnode-id="3904" instrument_node="">[33]</span></a></sup><sup class="reference" data-dcnode-id="3899" id="cite_ref-34"><a data-dcnode-id="3900" href="#cite_note-34"><span data-dcnode-id="3901" instrument_node="">[34]</span></a></sup><sup class="reference" data-dcnode-id="3896" id="cite_ref-35"><a data-dcnode-id="3897" href="#cite_note-35"><span data-dcnode-id="3898" instrument_node="">[35]</span></a></sup><span data-dcnode-id="3895" instrument_node="">
</span></p><span data-dcnode-id="3893" instrument_node="">
</span><h3 data-dcnode-id="3883"><span class="mw-headline" data-dcnode-id="3891" id="Emergence"><span data-dcnode-id="3892" instrument_node="">Emergence</span></span><span class="mw-editsection" data-dcnode-id="3884"><span class="mw-editsection-bracket" data-dcnode-id="3889"><span data-dcnode-id="3890" instrument_node="">[</span></span><a data-dcnode-id="3887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D10" title="Edit section: Emergence"><span data-dcnode-id="3888" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3885"><span data-dcnode-id="3886" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3882" instrument_node="">
</span><p data-dcnode-id="3845"><span data-dcnode-id="3881" instrument_node="">Modern capitalism only fully emerged in the </span><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Early_modern_period" title="Early modern period"><span data-dcnode-id="3880" instrument_node="">early modern period</span></a><span data-dcnode-id="3878" instrument_node=""> between the 16th and 18th centuries, with the establishment of </span><a data-dcnode-id="3876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercantilism" title="Mercantilism"><span data-dcnode-id="3877" instrument_node="">mercantilism</span></a><span data-dcnode-id="3875" instrument_node=""> or merchant capitalism.</span><sup class="reference" data-dcnode-id="3872" id="cite_ref-Burnham_2003_36-0"><a data-dcnode-id="3873" href="#cite_note-Burnham_2003-36"><span data-dcnode-id="3874" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="3869" id="cite_ref-Encyclopædia_Britannica_2006_37-0"><a data-dcnode-id="3870" href="#cite_note-Encyclop%C3%A6dia_Britannica_2006-37"><span data-dcnode-id="3871" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3868" instrument_node=""> Early evidence for mercantilistic practices appears in early modern </span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venice" title="Venice"><span data-dcnode-id="3867" instrument_node="">Venice</span></a><span data-dcnode-id="3865" instrument_node="">, </span><a data-dcnode-id="3863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genoa" title="Genoa"><span data-dcnode-id="3864" instrument_node="">Genoa</span></a><span data-dcnode-id="3862" instrument_node="">, and </span><a data-dcnode-id="3860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pisa" title="Pisa"><span data-dcnode-id="3861" instrument_node="">Pisa</span></a><span data-dcnode-id="3859" instrument_node=""> over the </span><a class="mw-redirect" data-dcnode-id="3857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mediterranean" title="Mediterranean"><span data-dcnode-id="3858" instrument_node="">Mediterranean</span></a><span data-dcnode-id="3856" instrument_node=""> trade in </span><a data-dcnode-id="3854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullion" title="Bullion"><span data-dcnode-id="3855" instrument_node="">bullion</span></a><span data-dcnode-id="3853" instrument_node="">. The region of mercantilism's real birth, however, was the </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atlantic_Ocean" title="Atlantic Ocean"><span data-dcnode-id="3852" instrument_node="">Atlantic Ocean</span></a><span data-dcnode-id="3850" instrument_node="">.</span><sup class="reference" data-dcnode-id="3847" id="cite_ref-38"><a data-dcnode-id="3848" href="#cite_note-38"><span data-dcnode-id="3849" instrument_node="">[38]</span></a></sup><span data-dcnode-id="3846" instrument_node="">
</span></p><span data-dcnode-id="3844" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3827"><div class="thumbinner" data-dcnode-id="3828" style="width:172px;"><a class="image" data-dcnode-id="3842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASir_Josiah_Child%2C_Bt_by_John_Riley.jpg"><img alt="" class="thumbimage" data-dcnode-id="3843" data-file-height="2772" data-file-width="2400" decoding="async" height="196" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/68/Sir_Josiah_Child%252C_Bt_by_John_Riley.jpg/170px-Sir_Josiah_Child%252C_Bt_by_John_Riley.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/68/Sir_Josiah_Child%2C_Bt_by_John_Riley.jpg/255px-Sir_Josiah_Child%2C_Bt_by_John_Riley.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/68/Sir_Josiah_Child%2C_Bt_by_John_Riley.jpg/340px-Sir_Josiah_Child%2C_Bt_by_John_Riley.jpg 2x" width="170"></a><span data-dcnode-id="3841" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3829"><div class="magnify" data-dcnode-id="3839"><a class="internal" data-dcnode-id="3840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASir_Josiah_Child%2C_Bt_by_John_Riley.jpg" title="Enlarge"></a></div><a data-dcnode-id="3837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josiah_Child" title="Josiah Child"><span data-dcnode-id="3838" instrument_node="">Sir Josiah Child</span></a><span data-dcnode-id="3836" instrument_node="">, an influential proponent of </span><a data-dcnode-id="3834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercantilism" title="Mercantilism"><span data-dcnode-id="3835" instrument_node="">mercantilism</span></a><span data-dcnode-id="3833" instrument_node="">. Painting attributed to </span><a data-dcnode-id="3831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Riley_%28painter%29" title="John Riley (painter)"><span data-dcnode-id="3832" instrument_node="">John Riley</span></a><span data-dcnode-id="3830" instrument_node="">.</span></div></div></div><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3804"><span data-dcnode-id="3825" instrument_node="">England began a large-scale and integrative approach to mercantilism during the </span><a class="mw-redirect" data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabethan_Era" title="Elizabethan Era"><span data-dcnode-id="3824" instrument_node="">Elizabethan Era</span></a><span data-dcnode-id="3822" instrument_node="">. An early statement on national balance of trade appeared in </span><i data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">Discourse of the Common Weal of this Realm of England</span></i><span data-dcnode-id="3819" instrument_node="">, 1549: "We must always take heed that we buy no more from strangers than we sell them, for so should we impoverish ourselves and enrich them."</span><sup class="reference" data-dcnode-id="3816" id="cite_ref-39"><a data-dcnode-id="3817" href="#cite_note-39"><span data-dcnode-id="3818" instrument_node="">[39]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="3809" style="white-space:nowrap;"><span data-dcnode-id="3815" instrument_node="">[</span><i data-dcnode-id="3811"><a data-dcnode-id="3812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACiting_sources%23What_information_to_include" title="Wikipedia:Citing sources"><span data-dcnode-id="3813" title="A complete citation is needed. (March 2021)"><span data-dcnode-id="3814" instrument_node="">full citation needed</span></span></a></i><span data-dcnode-id="3810" instrument_node="">]</span></sup><span data-dcnode-id="3808" instrument_node=""> The period featured various but often disjointed efforts by the court of </span><a class="mw-redirect" data-dcnode-id="3806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elizabeth_I_of_England" title="Elizabeth I of England"><span data-dcnode-id="3807" instrument_node="">Queen Elizabeth</span></a><span data-dcnode-id="3805" instrument_node=""> to develop a naval and merchant fleet capable of challenging the Spanish stranglehold on trade and of expanding the growth of bullion at home. Elizabeth promoted the Trade and Navigation Acts in Parliament and issued orders to her navy for the protection and promotion of English shipping.
