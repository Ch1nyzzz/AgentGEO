</span><p data-dcnode-id="3061"><span data-dcnode-id="3078" instrument_node="">Several major challenges to capitalism appeared in the early part of the 20th century. The </span><a class="mw-redirect" data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution_of_1917" title="Russian Revolution of 1917"><span data-dcnode-id="3077" instrument_node="">Russian revolution</span></a><span data-dcnode-id="3075" instrument_node=""> in 1917 established the first Communist state in the world; a decade later, the </span><a data-dcnode-id="3073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Depression" title="Great Depression"><span data-dcnode-id="3074" instrument_node="">Great Depression</span></a><span data-dcnode-id="3072" instrument_node=""> triggered increasing criticism of the existing capitalist system. One response to this crisis was a turn to </span><a data-dcnode-id="3070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="3071" instrument_node="">fascism</span></a><span data-dcnode-id="3069" instrument_node="">, an ideology that advocated </span><a data-dcnode-id="3067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_capitalism" title="State capitalism"><span data-dcnode-id="3068" instrument_node="">state capitalism</span></a><span data-dcnode-id="3066" instrument_node="">.</span><sup class="reference" data-dcnode-id="3063" id="cite_ref-49"><a data-dcnode-id="3064" href="#cite_note-49"><span data-dcnode-id="3065" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3062" instrument_node=""> Another response was to reject capitalism altogether in favour of communist or democratic socialist ideologies.
</span></p><span data-dcnode-id="3060" instrument_node="">
</span><h3 data-dcnode-id="3050"><span class="mw-headline" data-dcnode-id="3058" id="Keynesianism_and_free_markets"><span data-dcnode-id="3059" instrument_node="">Keynesianism and free markets</span></span><span class="mw-editsection" data-dcnode-id="3051"><span class="mw-editsection-bracket" data-dcnode-id="3056"><span data-dcnode-id="3057" instrument_node="">[</span></span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D18" title="Edit section: Keynesianism and free markets"><span data-dcnode-id="3055" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3049" instrument_node="">
</span><link data-dcnode-id="3048" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3041" role="note"><span data-dcnode-id="3047" instrument_node="">Main articles: </span><a class="mw-redirect" data-dcnode-id="3045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keynesianism" title="Keynesianism"><span data-dcnode-id="3046" instrument_node="">Keynesianism</span></a><span data-dcnode-id="3044" instrument_node=""> and </span><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="3043" instrument_node="">Neoliberalism</span></a></div><span data-dcnode-id="3040" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3025"><div class="thumbinner" data-dcnode-id="3026" style="width:222px;"><a class="image" data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANY_stock_exchange_traders_floor_LC-U9-10548-6.jpg"><img alt="" class="thumbimage" data-dcnode-id="3039" data-file-height="3004" data-file-width="4537" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg/220px-NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/ea/NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg/330px-NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/ea/NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg/440px-NY_stock_exchange_traders_floor_LC-U9-10548-6.jpg 2x" width="220"></a><span data-dcnode-id="3037" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3027"><div class="magnify" data-dcnode-id="3035"><a class="internal" data-dcnode-id="3036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANY_stock_exchange_traders_floor_LC-U9-10548-6.jpg" title="Enlarge"></a></div><span data-dcnode-id="3034" instrument_node="">The New York </span><a data-dcnode-id="3032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock_exchange" title="Stock exchange"><span data-dcnode-id="3033" instrument_node="">stock exchange</span></a><span data-dcnode-id="3031" instrument_node=""> </span><a data-dcnode-id="3029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trading_room" title="Trading room"><span data-dcnode-id="3030" instrument_node="">traders' floor</span></a><span data-dcnode-id="3028" instrument_node=""> (1963)</span></div></div></div><span data-dcnode-id="3024" instrument_node="">
</span><p data-dcnode-id="3015"><span data-dcnode-id="3023" instrument_node="">The economic recovery of the world's leading capitalist economies in the period following the end of the Great Depression and the </span><a class="mw-redirect" data-dcnode-id="3021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_World_War" title="Second World War"><span data-dcnode-id="3022" instrument_node="">Second World War</span></a><span data-dcnode-id="3020" instrument_node="">—a period of unusually rapid growth by historical standards—eased discussion of capitalism's eventual decline or demise.</span><sup class="reference" data-dcnode-id="3017" id="cite_ref-50"><a data-dcnode-id="3018" href="#cite_note-50"><span data-dcnode-id="3019" instrument_node="">[50]</span></a></sup><span data-dcnode-id="3016" instrument_node=""> The state began to play an increasingly prominent role to moderate and regulate the capitalistic system throughout much of the world.
</span></p><p data-dcnode-id="3008"><a class="mw-redirect" data-dcnode-id="3013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keynesian" title="Keynesian"><span data-dcnode-id="3014" instrument_node="">Keynesian</span></a><span data-dcnode-id="3012" instrument_node=""> economics became a widely accepted method of government regulation and countries such as the United Kingdom experimented with </span><a class="mw-redirect" data-dcnode-id="3010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mixed_economies" title="Mixed economies"><span data-dcnode-id="3011" instrument_node="">mixed economies</span></a><span data-dcnode-id="3009" instrument_node=""> in which the state owned and operated certain major industries.
</span></p><p data-dcnode-id="2999"><span data-dcnode-id="3007" instrument_node="">The state also expanded in the US; in 1929, total government expenditures amounted to less than one-tenth of </span><a class="mw-redirect" data-dcnode-id="3005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GNP" title="GNP"><span data-dcnode-id="3006" instrument_node="">GNP</span></a><span data-dcnode-id="3004" instrument_node="">; from the 1970s they amounted to around one-third.</span><sup class="reference" data-dcnode-id="3001" id="cite_ref-Encyclopædia_Britannica_2006_37-1"><a data-dcnode-id="3002" href="#cite_note-Encyclop%C3%A6dia_Britannica_2006-37"><span data-dcnode-id="3003" instrument_node="">[37]</span></a></sup><span data-dcnode-id="3000" instrument_node=""> Similar increases were seen in all industrialised capitalist economies, some of which, such as France, have reached even higher ratios of government expenditures to GNP than the United States.
</span></p><p data-dcnode-id="2984"><span data-dcnode-id="2998" instrument_node="">A broad array of new analytical tools in the </span><a class="mw-redirect" data-dcnode-id="2996" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_sciences" title="Social sciences"><span data-dcnode-id="2997" instrument_node="">social sciences</span></a><span data-dcnode-id="2995" instrument_node=""> were developed to explain the social and economic trends of the period, including the concepts of </span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-industrial_society" title="Post-industrial society"><span data-dcnode-id="2994" instrument_node="">post-industrial society</span></a><span data-dcnode-id="2992" instrument_node=""> and the </span><a data-dcnode-id="2990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare_state" title="Welfare state"><span data-dcnode-id="2991" instrument_node="">welfare state</span></a><span data-dcnode-id="2989" instrument_node="">.</span><sup class="reference" data-dcnode-id="2986" id="cite_ref-Burnham_2003_36-3"><a data-dcnode-id="2987" href="#cite_note-Burnham_2003-36"><span data-dcnode-id="2988" instrument_node="">[36]</span></a></sup><span data-dcnode-id="2985" instrument_node="">
</span></p><p data-dcnode-id="2944"><span data-dcnode-id="2983" instrument_node="">The long post-war boom ended in the 1970s, amid the economic crises experienced following the </span><a data-dcnode-id="2981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1973_oil_crisis" title="1973 oil crisis"><span data-dcnode-id="2982" instrument_node="">1973 oil crisis</span></a><span data-dcnode-id="2980" instrument_node="">.</span><sup class="reference" data-dcnode-id="2977" id="cite_ref-51"><a data-dcnode-id="2978" href="#cite_note-51"><span data-dcnode-id="2979" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2976" instrument_node=""> The "</span><a data-dcnode-id="2974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stagflation" title="Stagflation"><span data-dcnode-id="2975" instrument_node="">stagflation</span></a><span data-dcnode-id="2973" instrument_node="">" of the 1970s led many economic commentators and politicians to embrace </span><a data-dcnode-id="2971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberalism" title="Neoliberalism"><span data-dcnode-id="2972" instrument_node="">market-oriented</span></a><span data-dcnode-id="2970" instrument_node=""> policy prescriptions inspired by the laissez-faire capitalism and </span><a data-dcnode-id="2968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Classical_liberalism" title="Classical liberalism"><span data-dcnode-id="2969" instrument_node="">classical liberalism</span></a><span data-dcnode-id="2967" instrument_node=""> of the nineteenth century, particularly under the influence of </span><a data-dcnode-id="2965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Friedrich_Hayek" title="Friedrich Hayek"><span data-dcnode-id="2966" instrument_node="">Friedrich Hayek</span></a><span data-dcnode-id="2964" instrument_node=""> and </span><a data-dcnode-id="2962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milton_Friedman" title="Milton Friedman"><span data-dcnode-id="2963" instrument_node="">Milton Friedman</span></a><span data-dcnode-id="2961" instrument_node="">. The theoretical alternative to </span><a class="mw-redirect" data-dcnode-id="2959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keynesianism" title="Keynesianism"><span data-dcnode-id="2960" instrument_node="">Keynesianism</span></a><span data-dcnode-id="2958" instrument_node=""> was more compatible with laissez-faire and emphasised rapid expansion of the economy. Market-oriented solutions gained increasing support in the Western world, especially under the leadership of </span><a data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="2957" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="2955" instrument_node=""> in the United States and </span><a data-dcnode-id="2953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Thatcher" title="Margaret Thatcher"><span data-dcnode-id="2954" instrument_node="">Margaret Thatcher</span></a><span data-dcnode-id="2952" instrument_node=""> in the UK in the 1980s. Public and political interest began shifting away from the so-called </span><a class="mw-redirect" data-dcnode-id="2950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivist" title="Collectivist"><span data-dcnode-id="2951" instrument_node="">collectivist</span></a><span data-dcnode-id="2949" instrument_node=""> concerns of Keynes's managed capitalism to a focus on individual choice, called "remarketized capitalism".</span><sup class="reference" data-dcnode-id="2946" id="cite_ref-Fulcher,_James_2004_52-0"><a data-dcnode-id="2947" href="#cite_note-Fulcher,_James_2004-52"><span data-dcnode-id="2948" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2945" instrument_node="">
</span></p><span data-dcnode-id="2943" instrument_node="">
</span><h3 data-dcnode-id="2933"><span class="mw-headline" data-dcnode-id="2941" id="Globalization"><span data-dcnode-id="2942" instrument_node="">Globalization</span></span><span class="mw-editsection" data-dcnode-id="2934"><span class="mw-editsection-bracket" data-dcnode-id="2939"><span data-dcnode-id="2940" instrument_node="">[</span></span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D19" title="Edit section: Globalization"><span data-dcnode-id="2938" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2935"><span data-dcnode-id="2936" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2932" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2920"><div class="thumbinner" data-dcnode-id="2921" style="width:222px;"><a class="image" data-dcnode-id="2930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANYSESecurity.JPG"><img alt="" class="thumbimage" data-dcnode-id="2931" data-file-height="640" data-file-width="480" decoding="async" height="293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/2/25/NYSESecurity.JPG/220px-NYSESecurity.JPG&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/25/NYSESecurity.JPG/330px-NYSESecurity.JPG 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/25/NYSESecurity.JPG/440px-NYSESecurity.JPG 2x" width="220"></a><span data-dcnode-id="2929" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2922"><div class="magnify" data-dcnode-id="2927"><a class="internal" data-dcnode-id="2928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ANYSESecurity.JPG" title="Enlarge"></a></div><span data-dcnode-id="2926" instrument_node="">The </span><a data-dcnode-id="2924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_York_Stock_Exchange" title="New York Stock Exchange"><span data-dcnode-id="2925" instrument_node="">New York Stock Exchange</span></a><span data-dcnode-id="2923" instrument_node="">.</span></div></div></div><span data-dcnode-id="2919" instrument_node="">
</span><p data-dcnode-id="2907"><span data-dcnode-id="2918" instrument_node="">Although overseas trade has been associated with the development of capitalism for over five hundred years, some thinkers argue that a number of trends associated with </span><a class="mw-redirect" data-dcnode-id="2916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Globalisation" title="Globalisation"><span data-dcnode-id="2917" instrument_node="">globalisation</span></a><span data-dcnode-id="2915" instrument_node=""> have acted to increase the mobility of people and capital since the last quarter of the twentieth century, combining to circumscribe the room to manoeuvre of states in choosing non-capitalist models of development. Today, these trends have bolstered the argument that capitalism should now be viewed as a truly </span><a class="mw-redirect" data-dcnode-id="2913" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_system" title="World system"><span data-dcnode-id="2914" instrument_node="">world system</span></a><span data-dcnode-id="2912" instrument_node=""> (Burnham). However, other thinkers argue that globalisation, even in its quantitative degree, is no greater now than during earlier periods of capitalist trade.</span><sup class="reference" data-dcnode-id="2909" id="cite_ref-53"><a data-dcnode-id="2910" href="#cite_note-53"><span data-dcnode-id="2911" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2908" instrument_node="">
</span></p><p data-dcnode-id="2898"><span data-dcnode-id="2906" instrument_node="">After the abandonment of the </span><a data-dcnode-id="2904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bretton_Woods_system" title="Bretton Woods system"><span data-dcnode-id="2905" instrument_node="">Bretton Woods system</span></a><span data-dcnode-id="2903" instrument_node=""> in 1971, and the strict state control of foreign exchange rates, the total value of transactions in foreign exchange was estimated to be at least twenty times greater than that of all foreign movements of goods and services (EB). The internationalisation of finance, which some see as beyond the reach of state control, combined with the growing ease with which large corporations have been able to relocate their operations to low-wage states, has posed the question of the 'eclipse' of state sovereignty, arising from the growing 'globalization' of capital.</span><sup class="reference" data-dcnode-id="2900" id="cite_ref-54"><a data-dcnode-id="2901" href="#cite_note-54"><span data-dcnode-id="2902" instrument_node="">[54]</span></a></sup><span data-dcnode-id="2899" instrument_node="">
</span></p><p data-dcnode-id="2757"><span data-dcnode-id="2897" instrument_node="">While economists generally agree about the size of global </span><a class="mw-redirect" data-dcnode-id="2895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Income_inequality" title="Income inequality"><span data-dcnode-id="2896" instrument_node="">income inequality</span></a><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2888" style="white-space:nowrap;"><span data-dcnode-id="2894" instrument_node="">[</span><i data-dcnode-id="2890"><a data-dcnode-id="2891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2892" title="This claim needs references to reliable sources. (May 2010)"><span data-dcnode-id="2893" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2889" instrument_node="">]</span></sup><span data-dcnode-id="2887" instrument_node="">, there is a general disagreement about the recent direction of change of it.</span><sup class="reference" data-dcnode-id="2884" id="cite_ref-55"><a data-dcnode-id="2885" href="#cite_note-55"><span data-dcnode-id="2886" instrument_node="">[55]</span></a></sup><span data-dcnode-id="2883" instrument_node=""> In cases such as China, where income inequality is clearly growing</span><sup class="reference" data-dcnode-id="2880" id="cite_ref-56"><a data-dcnode-id="2881" href="#cite_note-56"><span data-dcnode-id="2882" instrument_node="">[56]</span></a></sup><span data-dcnode-id="2879" instrument_node=""> it is also evident that overall economic growth has rapidly increased with capitalist reforms.</span><sup class="reference" data-dcnode-id="2876" id="cite_ref-57"><a data-dcnode-id="2877" href="#cite_note-57"><span data-dcnode-id="2878" instrument_node="">[57]</span></a></sup><span data-dcnode-id="2875" instrument_node=""> The book </span><i data-dcnode-id="2872"><a data-dcnode-id="2873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Improving_State_of_the_World" title="The Improving State of the World"><span data-dcnode-id="2874" instrument_node="">The Improving State of the World</span></a></i><span data-dcnode-id="2871" instrument_node="">, published by the libertarian think tank </span><a data-dcnode-id="2869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cato_Institute" title="Cato Institute"><span data-dcnode-id="2870" instrument_node="">Cato Institute</span></a><span data-dcnode-id="2868" instrument_node="">, argues that economic growth since the Industrial Revolution has been very strong and that factors such as adequate </span><a data-dcnode-id="2866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nutrition" title="Nutrition"><span data-dcnode-id="2867" instrument_node="">nutrition</span></a><span data-dcnode-id="2865" instrument_node="">, </span><a data-dcnode-id="2863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Life_expectancy" title="Life expectancy"><span data-dcnode-id="2864" instrument_node="">life expectancy</span></a><span data-dcnode-id="2862" instrument_node="">, </span><a data-dcnode-id="2860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infant_mortality" title="Infant mortality"><span data-dcnode-id="2861" instrument_node="">infant mortality</span></a><span data-dcnode-id="2859" instrument_node="">, </span><a data-dcnode-id="2857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Literacy" title="Literacy"><span data-dcnode-id="2858" instrument_node="">literacy</span></a><span data-dcnode-id="2856" instrument_node="">, prevalence of </span><a class="mw-redirect" data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_labor" title="Child labor"><span data-dcnode-id="2855" instrument_node="">child labor</span></a><span data-dcnode-id="2853" instrument_node="">, education, and available free time have improved greatly.</span><sup class="reference" data-dcnode-id="2850" id="cite_ref-58"><a data-dcnode-id="2851" href="#cite_note-58"><span data-dcnode-id="2852" instrument_node="">[58]</span></a></sup><span data-dcnode-id="2849" instrument_node=""> Some scholars, including </span><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Hawking" title="Stephen Hawking"><span data-dcnode-id="2848" instrument_node="">Stephen Hawking</span></a><sup class="reference" data-dcnode-id="2844" id="cite_ref-59"><a data-dcnode-id="2845" href="#cite_note-59"><span data-dcnode-id="2846" instrument_node="">[59]</span></a></sup><span data-dcnode-id="2843" instrument_node=""> and researchers for the </span><a data-dcnode-id="2841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_Monetary_Fund" title="International Monetary Fund"><span data-dcnode-id="2842" instrument_node="">International Monetary Fund</span></a><span data-dcnode-id="2840" instrument_node="">,</span><sup class="reference" data-dcnode-id="2837" id="cite_ref-60"><a data-dcnode-id="2838" href="#cite_note-60"><span data-dcnode-id="2839" instrument_node="">[60]</span></a></sup><sup class="reference" data-dcnode-id="2834" id="cite_ref-61"><a data-dcnode-id="2835" href="#cite_note-61"><span data-dcnode-id="2836" instrument_node="">[61]</span></a></sup><span data-dcnode-id="2833" instrument_node=""> contend that globalization and </span><a class="mw-redirect" data-dcnode-id="2831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoliberal" title="Neoliberal"><span data-dcnode-id="2832" instrument_node="">neoliberal</span></a><span data-dcnode-id="2830" instrument_node=""> economic policies are not ameliorating inequality and poverty but exacerbating it,</span><sup class="reference" data-dcnode-id="2827" id="cite_ref-BusEth_62-0"><a data-dcnode-id="2828" href="#cite_note-BusEth-62"><span data-dcnode-id="2829" instrument_node="">[62]</span></a></sup><sup class="reference" data-dcnode-id="2824" id="cite_ref-63"><a data-dcnode-id="2825" href="#cite_note-63"><span data-dcnode-id="2826" instrument_node="">[63]</span></a></sup><sup class="reference" data-dcnode-id="2821" id="cite_ref-64"><a data-dcnode-id="2822" href="#cite_note-64"><span data-dcnode-id="2823" instrument_node="">[64]</span></a></sup><span data-dcnode-id="2820" instrument_node=""> and are creating new forms of </span><a data-dcnode-id="2818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Slavery%23Contemporary_slavery" title="Slavery"><span data-dcnode-id="2819" instrument_node="">contemporary slavery</span></a><span data-dcnode-id="2817" instrument_node="">.</span><sup class="reference" data-dcnode-id="2814" id="cite_ref-65"><a data-dcnode-id="2815" href="#cite_note-65"><span data-dcnode-id="2816" instrument_node="">[65]</span></a></sup><sup class="reference" data-dcnode-id="2811" id="cite_ref-66"><a data-dcnode-id="2812" href="#cite_note-66"><span data-dcnode-id="2813" instrument_node="">[66]</span></a></sup><span data-dcnode-id="2810" instrument_node=""> Such policies are also expanding populations of the displaced, the unemployed and the imprisoned</span><sup class="reference" data-dcnode-id="2807" id="cite_ref-67"><a data-dcnode-id="2808" href="#cite_note-67"><span data-dcnode-id="2809" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="2804" id="cite_ref-68"><a data-dcnode-id="2805" href="#cite_note-68"><span data-dcnode-id="2806" instrument_node="">[68]</span></a></sup><span data-dcnode-id="2803" instrument_node=""> along with accelerating the </span><a data-dcnode-id="2801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_degradation" title="Environmental degradation"><span data-dcnode-id="2802" instrument_node="">destruction of the environment</span></a><sup class="reference" data-dcnode-id="2798" id="cite_ref-BusEth_62-1"><a data-dcnode-id="2799" href="#cite_note-BusEth-62"><span data-dcnode-id="2800" instrument_node="">[62]</span></a></sup><span data-dcnode-id="2797" instrument_node=""> and </span><a data-dcnode-id="2795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Holocene_extinction" title="Holocene extinction"><span data-dcnode-id="2796" instrument_node="">species extinction</span></a><span data-dcnode-id="2794" instrument_node="">.</span><sup class="reference" data-dcnode-id="2791" id="cite_ref-Dawson_69-0"><a data-dcnode-id="2792" href="#cite_note-Dawson-69"><span data-dcnode-id="2793" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="2788" id="cite_ref-70"><a data-dcnode-id="2789" href="#cite_note-70"><span data-dcnode-id="2790" instrument_node="">[70]</span></a></sup><span data-dcnode-id="2787" instrument_node=""> In 2017, the IMF warned that inequality within nations, in spite of global inequality falling in recent decades, has risen so sharply that it threatens economic growth and could result in further </span><a class="mw-redirect" data-dcnode-id="2785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polarization_%28politics%29" title="Polarization (politics)"><span data-dcnode-id="2786" instrument_node="">political polarization</span></a><span data-dcnode-id="2784" instrument_node="">.</span><sup class="reference" data-dcnode-id="2781" id="cite_ref-71"><a data-dcnode-id="2782" href="#cite_note-71"><span data-dcnode-id="2783" instrument_node="">[71]</span></a></sup><span data-dcnode-id="2780" instrument_node=""> Surging economic inequality following the </span><a data-dcnode-id="2778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Recession" title="Great Recession"><span data-dcnode-id="2779" instrument_node="">economic crisis</span></a><span data-dcnode-id="2777" instrument_node=""> and the anger associated with it have resulted in a resurgence of </span><a class="mw-redirect" data-dcnode-id="2775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist" title="Socialist"><span data-dcnode-id="2776" instrument_node="">socialist</span></a><span data-dcnode-id="2774" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nationalist" title="Nationalist"><span data-dcnode-id="2773" instrument_node="">nationalist</span></a><span data-dcnode-id="2771" instrument_node=""> ideas throughout the Western world, which has some economic elites from places including </span><a data-dcnode-id="2769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Silicon_Valley" title="Silicon Valley"><span data-dcnode-id="2770" instrument_node="">Silicon Valley</span></a><span data-dcnode-id="2768" instrument_node="">, </span><a data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Davos" title="Davos"><span data-dcnode-id="2767" instrument_node="">Davos</span></a><span data-dcnode-id="2765" instrument_node=""> and </span><a data-dcnode-id="2763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Harvard_Business_School" title="Harvard Business School"><span data-dcnode-id="2764" instrument_node="">Harvard Business School</span></a><span data-dcnode-id="2762" instrument_node=""> concerned about the future of capitalism.</span><sup class="reference" data-dcnode-id="2759" id="cite_ref-72"><a data-dcnode-id="2760" href="#cite_note-72"><span data-dcnode-id="2761" instrument_node="">[72]</span></a></sup><span data-dcnode-id="2758" instrument_node="">
</span></p><span data-dcnode-id="2756" instrument_node="">
</span><h2 data-dcnode-id="2746"><span class="mw-headline" data-dcnode-id="2754" id="21st_century"><span data-dcnode-id="2755" instrument_node="">21st century</span></span><span class="mw-editsection" data-dcnode-id="2747"><span class="mw-editsection-bracket" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">[</span></span><a data-dcnode-id="2750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D20" title="Edit section: 21st century"><span data-dcnode-id="2751" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2744" instrument_node="">By the beginning of the twenty-first century, mixed economies with capitalist elements had become the pervasive economic systems worldwide. The collapse of the </span><a class="mw-redirect" data-dcnode-id="2742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_bloc" title="Soviet bloc"><span data-dcnode-id="2743" instrument_node="">Soviet bloc</span></a><span data-dcnode-id="2741" instrument_node=""> in 1991 significantly reduced the influence of Communism as an alternative economic system. Leftist movements continue to be influential in some parts of the world, most notably Latin-American </span><a data-dcnode-id="2739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolivarianism" title="Bolivarianism"><span data-dcnode-id="2740" instrument_node="">Bolivarianism</span></a><span data-dcnode-id="2738" instrument_node="">, with some having ties to more traditional anti-capitalist movements, such as Bolivarian </span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Venezuela" title="Communist Party of Venezuela"><span data-dcnode-id="2737" instrument_node="">Venezuela</span></a><span data-dcnode-id="2735" instrument_node="">'s ties to </span><a data-dcnode-id="2733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Cuba" title="Communist Party of Cuba"><span data-dcnode-id="2734" instrument_node="">Cuba</span></a><span data-dcnode-id="2732" instrument_node="">.
</span></p><p data-dcnode-id="2725"><span data-dcnode-id="2730" instrument_node="">In many emerging markets, the influence of banking and financial capital have come to increasingly shape national developmental strategies, leading some to argue we are in a new phase of financial capitalism.</span><sup class="reference" data-dcnode-id="2727" id="cite_ref-73"><a data-dcnode-id="2728" href="#cite_note-73"><span data-dcnode-id="2729" instrument_node="">[73]</span></a></sup><span data-dcnode-id="2726" instrument_node="">
</span></p><p data-dcnode-id="2707"><span data-dcnode-id="2724" instrument_node="">State intervention in global capital markets following the </span><a class="mw-redirect" data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_crisis_of_2007%25E2%2580%25932010" title="Financial crisis of 2007–2010"><span data-dcnode-id="2723" instrument_node="">financial crisis of 2007–2010</span></a><span data-dcnode-id="2721" instrument_node=""> was perceived by some as signalling a crisis for free-market capitalism. Serious turmoil in the banking system and financial markets due in part to the </span><a data-dcnode-id="2719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subprime_mortgage_crisis" title="Subprime mortgage crisis"><span data-dcnode-id="2720" instrument_node="">subprime mortgage crisis</span></a><span data-dcnode-id="2718" instrument_node=""> reached a critical stage during September 2008, characterised by severely contracted </span><a data-dcnode-id="2716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_liquidity" title="Market liquidity"><span data-dcnode-id="2717" instrument_node="">liquidity</span></a><span data-dcnode-id="2715" instrument_node=""> in the global credit markets posed an existential threat to investment banks and other institutions.</span><sup class="reference" data-dcnode-id="2712" id="cite_ref-74"><a data-dcnode-id="2713" href="#cite_note-74"><span data-dcnode-id="2714" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="2709" id="cite_ref-75"><a data-dcnode-id="2710" href="#cite_note-75"><span data-dcnode-id="2711" instrument_node="">[75]</span></a></sup><span data-dcnode-id="2708" instrument_node="">
</span></p><span data-dcnode-id="2706" instrument_node="">
</span><h2 data-dcnode-id="2696"><span class="mw-headline" data-dcnode-id="2704" id="Future"><span data-dcnode-id="2705" instrument_node="">Future</span></span><span class="mw-editsection" data-dcnode-id="2697"><span class="mw-editsection-bracket" data-dcnode-id="2702"><span data-dcnode-id="2703" instrument_node="">[</span></span><a data-dcnode-id="2700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D21" title="Edit section: Future"><span data-dcnode-id="2701" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2695" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2694" instrument_node="">According to some,</span><sup class="noprint Inline-Template" data-dcnode-id="2687" style="white-space:nowrap;"><span data-dcnode-id="2693" instrument_node="">[</span><i data-dcnode-id="2689"><a data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AManual_of_Style/Words_to_watch%23Unsupported_attributions" title="Wikipedia:Manual of Style/Words to watch"><span data-dcnode-id="2691" title="The material near this tag possibly uses too-vague attribution or weasel words. (August 2018)"><span data-dcnode-id="2692" instrument_node="">who?</span></span></a></i><span data-dcnode-id="2688" instrument_node="">]</span></sup><sup class="reference" data-dcnode-id="2684" id="cite_ref-Michio_1999_76-0"><a data-dcnode-id="2685" href="#cite_note-Michio_1999-76"><span data-dcnode-id="2686" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2683" instrument_node=""> the transition to the </span><a data-dcnode-id="2681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Information_society" title="Information society"><span data-dcnode-id="2682" instrument_node="">information society</span></a><span data-dcnode-id="2680" instrument_node=""> involves abandoning some parts of capitalism, as the "capital" required to produce and process information becomes available to the masses and difficult to control, and is closely related to the controversial issues of </span><a data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intellectual_property" title="Intellectual property"><span data-dcnode-id="2679" instrument_node="">intellectual property</span></a><span data-dcnode-id="2677" instrument_node="">. Some</span><sup class="reference" data-dcnode-id="2674" id="cite_ref-Michio_1999_76-1"><a data-dcnode-id="2675" href="#cite_note-Michio_1999-76"><span data-dcnode-id="2676" instrument_node="">[76]</span></a></sup><span data-dcnode-id="2673" instrument_node=""> even speculate that the development of mature </span><a class="mw-redirect" data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molecular_manufacturing" title="Molecular manufacturing"><span data-dcnode-id="2672" instrument_node="">nanotechnology</span></a><span data-dcnode-id="2670" instrument_node="">, particularly of </span><a class="mw-redirect" data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_assembler" title="Universal assembler"><span data-dcnode-id="2669" instrument_node="">universal assemblers</span></a><span data-dcnode-id="2667" instrument_node="">, may make capitalism obsolete, with </span><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Capital_%28economics%29" title="Capital (economics)"><span data-dcnode-id="2666" instrument_node="">capital</span></a><span data-dcnode-id="2664" instrument_node=""> ceasing to be an important factor in the economic life of humanity. Various thinkers have also explored what kind of economic system </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-capitalism" title="Post-capitalism"><span data-dcnode-id="2663" instrument_node="">might replace</span></a><span data-dcnode-id="2661" instrument_node=""> capitalism, such as </span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bob_Avakian" title="Bob Avakian"><span data-dcnode-id="2660" instrument_node="">Bob Avakian</span></a><span data-dcnode-id="2658" instrument_node=""> and </span><a data-dcnode-id="2656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Mason_%28journalist%29" title="Paul Mason (journalist)"><span data-dcnode-id="2657" instrument_node="">Paul Mason</span></a><span data-dcnode-id="2655" instrument_node="">.
</span></p><span data-dcnode-id="2653" instrument_node="">
</span><h2 data-dcnode-id="2643"><span class="mw-headline" data-dcnode-id="2651" id="Role_of_women"><span data-dcnode-id="2652" instrument_node="">Role of women</span></span><span class="mw-editsection" data-dcnode-id="2644"><span class="mw-editsection-bracket" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">[</span></span><a data-dcnode-id="2647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D22" title="Edit section: Role of women"><span data-dcnode-id="2648" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2645"><span data-dcnode-id="2646" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2641" instrument_node="">Women's historians have debated the impact of capitalism on the status of women.</span><sup class="reference" data-dcnode-id="2638" id="cite_ref-77"><a data-dcnode-id="2639" href="#cite_note-77"><span data-dcnode-id="2640" instrument_node="">[77]</span></a></sup><sup class="reference" data-dcnode-id="2635" id="cite_ref-78"><a data-dcnode-id="2636" href="#cite_note-78"><span data-dcnode-id="2637" instrument_node="">[78]</span></a></sup><span data-dcnode-id="2634" instrument_node=""> </span><a data-dcnode-id="2632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alice_Clark" title="Alice Clark"><span data-dcnode-id="2633" instrument_node="">Alice Clark</span></a><span data-dcnode-id="2631" instrument_node=""> argues that, when capitalism arrived in 17th-century England, it negatively impacted the status of women, who lost much of their economic importance. Clark argues that, in 16th-century England, women were engaged in many aspects of industry and agriculture. The home was a central unit of production, and women played a vital role in running farms and in some trades and landed estates. Their useful economic roles gave them a sort of equality with their husbands. However, Clark argues, as capitalism expanded in the 17th century, there was more and more division of labor, with the husband taking paid labor jobs outside the home, and the wife reduced to unpaid household work. Middle-class women were confined to an idle domestic existence, supervising servants; lower-class women were forced to take poorly paid jobs. Capitalism, therefore, had a negative effect on women.</span><sup class="reference" data-dcnode-id="2628" id="cite_ref-79"><a data-dcnode-id="2629" href="#cite_note-79"><span data-dcnode-id="2630" instrument_node="">[79]</span></a></sup><span data-dcnode-id="2627" instrument_node=""> By contrast, </span><a data-dcnode-id="2625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ivy_Pinchbeck" title="Ivy Pinchbeck"><span data-dcnode-id="2626" instrument_node="">Ivy Pinchbeck</span></a><span data-dcnode-id="2624" instrument_node=""> argues that capitalism created the conditions for women's emancipation.</span><sup class="reference" data-dcnode-id="2621" id="cite_ref-80"><a data-dcnode-id="2622" href="#cite_note-80"><span data-dcnode-id="2623" instrument_node="">[80]</span></a></sup><span data-dcnode-id="2620" instrument_node=""> Tilly and Scott have emphasized the continuity and the status of women, finding three stages in European history. In the preindustrial era, production was mostly for home use, and women produced many household needs. The second stage was the "family wage economy" of early industrialization. During this stage, the entire family depended on the collective wages of its members, including husband, wife, and older children. The third, or modern, stage is the "family consumer economy", in which the family is the site of consumption, and women are employed in large numbers in retail and clerical jobs to support rising standards of consumption.</span><sup class="reference" data-dcnode-id="2617" id="cite_ref-81"><a data-dcnode-id="2618" href="#cite_note-81"><span data-dcnode-id="2619" instrument_node="">[81]</span></a></sup><span data-dcnode-id="2616" instrument_node="">
</span></p><span data-dcnode-id="2614" instrument_node="">

</span><p data-dcnode-id="1486"><span data-dcnode-id="1503" instrument_node="">(See also </span><link data-dcnode-id="1502" href="mw-data:TemplateStyles:r1067248974" rel="mw-deduplicated-inline-style"><cite class="citation book cs1" data-dcnode-id="1489" id="CITEREFHenwood2003"><span data-dcnode-id="1501" instrument_node="">Henwood, Doug (October 1, 2003). </span><a class="external text" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.org/details/afterneweconomy00henw" rel="nofollow"><i data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">After the New Economy</span></i></a><span data-dcnode-id="1497" instrument_node="">. New Press. </span><a class="mw-redirect" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/ISBN_%28identifier%29" title="ISBN (identifier)"><span data-dcnode-id="1496" instrument_node="">ISBN</span></a><span data-dcnode-id="1494" instrument_node="">&nbsp;</span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special%3ABookSources/1-56584-770-9" title="Special:BookSources/1-56584-770-9"><bdi data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">1-56584-770-9</span></bdi></a><span data-dcnode-id="1490" instrument_node="">.</span></cite><span class="Z3988" data-dcnode-id="1488" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Abook&amp;rft.genre=book&amp;rft.btitle=After+the+New+Economy&amp;rft.pub=New+Press&amp;rft.date=2003-10-01&amp;rft.isbn=1-56584-770-9&amp;rft.aulast=Henwood&amp;rft.aufirst=Doug&amp;rft_id=https%3A%2F%2Farchive.org%2Fdetails%2Fafterneweconomy00henw&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3AHistory+of+capitalism"></span><span data-dcnode-id="1487" instrument_node="">)
