</span></p><p data-dcnode-id="3760"><span data-dcnode-id="3803" instrument_node="">These efforts organized national resources sufficiently in the defense of England against the far larger and more powerful </span><a data-dcnode-id="3801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_Empire" title="Spanish Empire"><span data-dcnode-id="3802" instrument_node="">Spanish Empire</span></a><span data-dcnode-id="3800" instrument_node="">, and in turn paved the foundation for establishing a global empire in the 19th century.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3793" style="white-space:nowrap;"><span data-dcnode-id="3799" instrument_node="">[</span><i data-dcnode-id="3795"><a data-dcnode-id="3796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3797" title="This claim needs references to reliable sources. (July 2010)"><span data-dcnode-id="3798" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3794" instrument_node="">]</span></sup><span data-dcnode-id="3792" instrument_node=""> The authors noted most for establishing the English mercantilist system include </span><a data-dcnode-id="3790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerard_de_Malynes" title="Gerard de Malynes"><span data-dcnode-id="3791" instrument_node="">Gerard de Malynes</span></a><span data-dcnode-id="3789" instrument_node=""> and </span><a data-dcnode-id="3787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Mun" title="Thomas Mun"><span data-dcnode-id="3788" instrument_node="">Thomas Mun</span></a><span data-dcnode-id="3786" instrument_node="">, who first articulated the </span><a class="new" data-dcnode-id="3784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DElizabethan_System%26action%3Dedit%26redlink%3D1" title="Elizabethan System (page does not exist)"><span data-dcnode-id="3785" instrument_node="">Elizabethan System</span></a><span data-dcnode-id="3783" instrument_node="">. The latter's  </span><i data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">England's Treasure by Forraign Trade, or the Balance of our Forraign Trade is The Rule of Our Treasure</span></i><span data-dcnode-id="3780" instrument_node=""> gave a systematic and coherent explanation of the concept of </span><a data-dcnode-id="3778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balance_of_trade" title="Balance of trade"><span data-dcnode-id="3779" instrument_node="">balance of trade</span></a><span data-dcnode-id="3777" instrument_node="">. It was written in the 1620s and published in 1664.</span><sup class="reference" data-dcnode-id="3774" id="cite_ref-40"><a data-dcnode-id="3775" href="#cite_note-40"><span data-dcnode-id="3776" instrument_node="">[40]</span></a></sup><span data-dcnode-id="3773" instrument_node=""> Mercantile doctrines were further developed by </span><a data-dcnode-id="3771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josiah_Child" title="Josiah Child"><span data-dcnode-id="3772" instrument_node="">Josiah Child</span></a><span data-dcnode-id="3770" instrument_node="">. Numerous French authors helped to cement French policy around mercantilism in the 17th century. </span><a class="mw-redirect" data-dcnode-id="3768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_mercantilism" title="French mercantilism"><span data-dcnode-id="3769" instrument_node="">French mercantilism</span></a><span data-dcnode-id="3767" instrument_node=""> was best articulated by </span><a data-dcnode-id="3765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jean-Baptiste_Colbert" title="Jean-Baptiste Colbert"><span data-dcnode-id="3766" instrument_node="">Jean-Baptiste Colbert</span></a><span data-dcnode-id="3764" instrument_node=""> (in office, 1665–1683), although his policies were greatly liberalised under </span><a data-dcnode-id="3762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon" title="Napoleon"><span data-dcnode-id="3763" instrument_node="">Napoleon</span></a><span data-dcnode-id="3761" instrument_node="">.
</span></p><span data-dcnode-id="3759" instrument_node="">
</span><h3 data-dcnode-id="3749"><span class="mw-headline" data-dcnode-id="3757" id="Doctrines"><span data-dcnode-id="3758" instrument_node="">Doctrines</span></span><span class="mw-editsection" data-dcnode-id="3750"><span class="mw-editsection-bracket" data-dcnode-id="3755"><span data-dcnode-id="3756" instrument_node="">[</span></span><a data-dcnode-id="3753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D11" title="Edit section: Doctrines"><span data-dcnode-id="3754" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3751"><span data-dcnode-id="3752" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3748" instrument_node="">
</span><p data-dcnode-id="3730"><span data-dcnode-id="3747" instrument_node="">Under mercantilism, European merchants, backed by state controls, </span><a data-dcnode-id="3745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Subsidy" title="Subsidy"><span data-dcnode-id="3746" instrument_node="">subsidies</span></a><span data-dcnode-id="3744" instrument_node="">, and monopolies, made most of their profits from buying and selling goods. In the words of </span><a data-dcnode-id="3742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Francis_Bacon" title="Francis Bacon"><span data-dcnode-id="3743" instrument_node="">Francis Bacon</span></a><span data-dcnode-id="3741" instrument_node="">, the purpose of mercantilism was "the opening and well-balancing of trade; the cherishing of manufacturers; the banishing of idleness; the repressing of waste and excess by sumptuary laws; the improvement and husbanding of the soil; the regulation of prices..."</span><sup class="reference" data-dcnode-id="3738" id="cite_ref-41"><a data-dcnode-id="3739" href="#cite_note-41"><span data-dcnode-id="3740" instrument_node="">[41]</span></a></sup><span data-dcnode-id="3737" instrument_node=""> Similar practices of economic regimentation had begun earlier in medieval towns. However, under mercantilism, given the contemporaneous rise of </span><a data-dcnode-id="3735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Absolutism_%28European_history%29" title="Absolutism (European history)"><span data-dcnode-id="3736" instrument_node="">absolutism</span></a><span data-dcnode-id="3734" instrument_node="">, the state superseded the local </span><a data-dcnode-id="3732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guild" title="Guild"><span data-dcnode-id="3733" instrument_node="">guilds</span></a><span data-dcnode-id="3731" instrument_node=""> as the regulator of the economy.
</span></p><span data-dcnode-id="3729" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3717"><div class="thumbinner" data-dcnode-id="3718" style="width:252px;"><a class="image" data-dcnode-id="3727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADe_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="3728" data-file-height="4288" data-file-width="7342" decoding="async" height="146" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/05/De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%2528Willem_van_de_Velde_I%252C_1657%2529.jpg/250px-De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%2528Willem_van_de_Velde_I%252C_1657%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/05/De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg/375px-De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/05/De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg/500px-De_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg 2x" width="250"></a><span data-dcnode-id="3726" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3719"><div class="magnify" data-dcnode-id="3724"><a class="internal" data-dcnode-id="3725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADe_slag_bij_Terheide_-_The_Battle_of_Schevening_-_August_10_1653_%28Willem_van_de_Velde_I%2C_1657%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="3723" instrument_node="">The </span><a data-dcnode-id="3721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Dutch_Wars" title="Anglo-Dutch Wars"><span data-dcnode-id="3722" instrument_node="">Anglo-Dutch Wars</span></a><span data-dcnode-id="3720" instrument_node=""> were fought between the English and the Dutch for control over the seas and trade routes.</span></div></div></div><span data-dcnode-id="3716" instrument_node="">
</span><p data-dcnode-id="3705"><span data-dcnode-id="3715" instrument_node="">Among the major tenets of mercantilist theory was </span><a data-dcnode-id="3713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullionism" title="Bullionism"><span data-dcnode-id="3714" instrument_node="">bullionism</span></a><span data-dcnode-id="3712" instrument_node="">, a doctrine stressing the importance of accumulating </span><a class="mw-redirect" data-dcnode-id="3710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precious_metals" title="Precious metals"><span data-dcnode-id="3711" instrument_node="">precious metals</span></a><span data-dcnode-id="3709" instrument_node="">. Mercantilists argued that a state should export more goods than it imported so that foreigners would have to pay the difference in precious metals. Mercantilists asserted that only raw materials that could not be extracted at home should be imported. They promoted the idea that government subsidies, such as granting monopolies and protective </span><a data-dcnode-id="3707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tariff" title="Tariff"><span data-dcnode-id="3708" instrument_node="">tariffs</span></a><span data-dcnode-id="3706" instrument_node="">, were necessary to encourage home production of manufactured goods.
</span></p><p data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Proponents of mercantilism emphasized state power and overseas conquest as the principal aim of economic policy. If a state could not supply its own raw materials, according to the mercantilists, it should acquire colonies from which they could be extracted. Colonies constituted not only sources of raw materials but also markets for finished products. Because it was not in the interests of the state to allow competition, to help the mercantilists, colonies should be prevented from engaging in manufacturing and trading with foreign powers.
</span></p><p data-dcnode-id="3690"><span data-dcnode-id="3702" instrument_node="">Mercantilism was a system of trade for profit, although commodities were still largely produced by non-capitalist production methods.</span><sup class="reference" data-dcnode-id="3699" id="cite_ref-Scott_2005_3-1"><a data-dcnode-id="3700" href="#cite_note-Scott_2005-3"><span data-dcnode-id="3701" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3698" instrument_node=""> Noting the various pre-capitalist features of mercantilism, </span><a data-dcnode-id="3696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Polanyi" title="Karl Polanyi"><span data-dcnode-id="3697" instrument_node="">Karl Polanyi</span></a><span data-dcnode-id="3695" instrument_node=""> argued that "mercantilism, with all its tendency toward commercialization, never attacked the safeguards which protected [the] two basic elements of production – labor and land – from becoming the elements of commerce." Thus mercantilist regulation was more akin to feudalism than capitalism. According to Polanyi, "not until 1834 was a competitive labor market established in England, hence industrial capitalism as a social system cannot be said to have existed before that date."</span><sup class="reference" data-dcnode-id="3692" id="cite_ref-42"><a data-dcnode-id="3693" href="#cite_note-42"><span data-dcnode-id="3694" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3691" instrument_node="">
</span></p><span data-dcnode-id="3689" instrument_node="">
</span><h3 data-dcnode-id="3679"><span class="mw-headline" data-dcnode-id="3687" id="Chartered_trading_companies"><span data-dcnode-id="3688" instrument_node="">Chartered trading companies</span></span><span class="mw-editsection" data-dcnode-id="3680"><span class="mw-editsection-bracket" data-dcnode-id="3685"><span data-dcnode-id="3686" instrument_node="">[</span></span><a data-dcnode-id="3683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D12" title="Edit section: Chartered trading companies"><span data-dcnode-id="3684" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3681"><span data-dcnode-id="3682" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3678" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3669"><div class="thumbinner" data-dcnode-id="3670" style="width:227px;"><a class="image" data-dcnode-id="3676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlag_of_the_British_East_India_Company_%281801%29.svg"><img alt="" class="thumbimage" data-dcnode-id="3677" data-file-height="600" data-file-width="1000" decoding="async" height="135" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Flag_of_the_British_East_India_Company_%25281801%2529.svg/225px-Flag_of_the_British_East_India_Company_%25281801%2529.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Flag_of_the_British_East_India_Company_%281801%29.svg/338px-Flag_of_the_British_East_India_Company_%281801%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c0/Flag_of_the_British_East_India_Company_%281801%29.svg/450px-Flag_of_the_British_East_India_Company_%281801%29.svg.png 2x" width="225"></a><span data-dcnode-id="3675" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3671"><div class="magnify" data-dcnode-id="3673"><a class="internal" data-dcnode-id="3674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFlag_of_the_British_East_India_Company_%281801%29.svg" title="Enlarge"></a></div><span data-dcnode-id="3672" instrument_node="">British East India Company 1801</span></div></div></div><span data-dcnode-id="3668" instrument_node="">
</span><p data-dcnode-id="3626"><span data-dcnode-id="3667" instrument_node="">The </span><a data-dcnode-id="3665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muscovy_Company" title="Muscovy Company"><span data-dcnode-id="3666" instrument_node="">Muscovy Company</span></a><span data-dcnode-id="3664" instrument_node=""> was the first major </span><a data-dcnode-id="3662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chartered_company" title="Chartered company"><span data-dcnode-id="3663" instrument_node="">chartered</span></a><span data-dcnode-id="3661" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="3659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint_stock_company" title="Joint stock company"><span data-dcnode-id="3660" instrument_node="">joint stock</span></a><span data-dcnode-id="3658" instrument_node=""> English </span><a data-dcnode-id="3656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trading_company" title="Trading company"><span data-dcnode-id="3657" instrument_node="">trading company</span></a><span data-dcnode-id="3655" instrument_node="">. It was established in 1555 with a </span><a data-dcnode-id="3653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monopoly" title="Monopoly"><span data-dcnode-id="3654" instrument_node="">monopoly</span></a><span data-dcnode-id="3652" instrument_node=""> on </span><a data-dcnode-id="3650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trade" title="Trade"><span data-dcnode-id="3651" instrument_node="">trade</span></a><span data-dcnode-id="3649" instrument_node=""> between England and </span><a data-dcnode-id="3647" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tsardom_of_Russia" title="Tsardom of Russia"><span data-dcnode-id="3648" instrument_node="">Muscovy</span></a><span data-dcnode-id="3646" instrument_node="">. It was an offshoot of the earlier </span><i data-dcnode-id="3643"><a data-dcnode-id="3644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Company_of_Merchant_Adventurers_to_New_Lands" title="Company of Merchant Adventurers to New Lands"><span data-dcnode-id="3645" instrument_node="">Company of Merchant Adventurers to New Lands</span></a></i><span data-dcnode-id="3642" instrument_node="">, founded in 1551 by </span><a data-dcnode-id="3640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Chancellor" title="Richard Chancellor"><span data-dcnode-id="3641" instrument_node="">Richard Chancellor</span></a><span data-dcnode-id="3639" instrument_node="">, </span><a data-dcnode-id="3637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sebastian_Cabot_%28explorer%29" title="Sebastian Cabot (explorer)"><span data-dcnode-id="3638" instrument_node="">Sebastian Cabot</span></a><span data-dcnode-id="3636" instrument_node=""> and Sir </span><a class="mw-redirect" data-dcnode-id="3634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hugh_Willoughby_%28sea_captain%29" title="Hugh Willoughby (sea captain)"><span data-dcnode-id="3635" instrument_node="">Hugh Willoughby</span></a><span data-dcnode-id="3633" instrument_node=""> to locate the </span><a data-dcnode-id="3631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Northeast_Passage" title="Northeast Passage"><span data-dcnode-id="3632" instrument_node="">Northeast Passage</span></a><span data-dcnode-id="3630" instrument_node=""> to China to allow trade. This was the precursor to a type of business that would soon flourish in England, the </span><a data-dcnode-id="3628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dutch_Republic" title="Dutch Republic"><span data-dcnode-id="3629" instrument_node="">Dutch Republic</span></a><span data-dcnode-id="3627" instrument_node=""> and elsewhere.
</span></p><p data-dcnode-id="3588"><span data-dcnode-id="3625" instrument_node="">The British </span><a data-dcnode-id="3623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_India_Company" title="East India Company"><span data-dcnode-id="3624" instrument_node="">East India Company</span></a><span data-dcnode-id="3622" instrument_node=""> (1600) and the </span><a data-dcnode-id="3620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dutch_East_India_Company" title="Dutch East India Company"><span data-dcnode-id="3621" instrument_node="">Dutch East India Company</span></a><span data-dcnode-id="3619" instrument_node=""> (1602) launched an era of large state chartered trading companies.</span><sup class="reference" data-dcnode-id="3616" id="cite_ref-Banaji_7-1"><a data-dcnode-id="3617" href="#cite_note-Banaji-7"><span data-dcnode-id="3618" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="3613" id="cite_ref-britannica2_43-0"><a data-dcnode-id="3614" href="#cite_note-britannica2-43"><span data-dcnode-id="3615" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3612" instrument_node=""> These companies were characterized by their monopoly on trade, granted by </span><a data-dcnode-id="3610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Letters_patent" title="Letters patent"><span data-dcnode-id="3611" instrument_node="">letters patent</span></a><span data-dcnode-id="3609" instrument_node=""> provided by the state. Recognized as chartered </span><a data-dcnode-id="3607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joint-stock_company" title="Joint-stock company"><span data-dcnode-id="3608" instrument_node="">joint-stock companies</span></a><span data-dcnode-id="3606" instrument_node=""> by the state, these companies enjoyed lawmaking, military, and treaty-making privileges.</span><sup class="reference" data-dcnode-id="3603" id="cite_ref-44"><a data-dcnode-id="3604" href="#cite_note-44"><span data-dcnode-id="3605" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3602" instrument_node=""> Characterized by its colonial and </span><a data-dcnode-id="3600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Expansionism" title="Expansionism"><span data-dcnode-id="3601" instrument_node="">expansionary</span></a><span data-dcnode-id="3599" instrument_node=""> powers by states, powerful nation-states sought to accumulate </span><a data-dcnode-id="3597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precious_metal" title="Precious metal"><span data-dcnode-id="3598" instrument_node="">precious metals</span></a><span data-dcnode-id="3596" instrument_node="">, and military conflicts arose.</span><sup class="reference" data-dcnode-id="3593" id="cite_ref-Banaji_7-2"><a data-dcnode-id="3594" href="#cite_note-Banaji-7"><span data-dcnode-id="3595" instrument_node="">[7]</span></a></sup><span data-dcnode-id="3592" instrument_node=""> During this era, merchants, who had previously traded on their own, invested capital in the East India Companies and other colonies, seeking a </span><a data-dcnode-id="3590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Return_on_investment" title="Return on investment"><span data-dcnode-id="3591" instrument_node="">return on investment</span></a><span data-dcnode-id="3589" instrument_node="">.
</span></p><span data-dcnode-id="3587" instrument_node="">
</span><h2 data-dcnode-id="3577"><span class="mw-headline" data-dcnode-id="3585" id="Industrial_capitalism"><span data-dcnode-id="3586" instrument_node="">Industrial capitalism</span></span><span class="mw-editsection" data-dcnode-id="3578"><span class="mw-editsection-bracket" data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">[</span></span><a data-dcnode-id="3581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D13" title="Edit section: Industrial capitalism"><span data-dcnode-id="3582" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3576" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3565"><div class="thumbinner" data-dcnode-id="3566" style="width:222px;"><a class="image" data-dcnode-id="3574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADore_London.jpg"><img alt="" class="thumbimage" data-dcnode-id="3575" data-file-height="550" data-file-width="650" decoding="async" height="186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Dore_London.jpg/220px-Dore_London.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Dore_London.jpg/330px-Dore_London.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Dore_London.jpg/440px-Dore_London.jpg 2x" width="220"></a><span data-dcnode-id="3573" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3567"><div class="magnify" data-dcnode-id="3571"><a class="internal" data-dcnode-id="3572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADore_London.jpg" title="Enlarge"></a></div><a data-dcnode-id="3569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gustave_Dor%25C3%25A9" title="Gustave Doré"><span data-dcnode-id="3570" instrument_node="">Gustave Doré</span></a><span data-dcnode-id="3568" instrument_node="">'s 19th-century engraving depicted the dirty, overcrowded slums where the industrial workers of London lived.</span></div></div></div><span data-dcnode-id="3564" instrument_node="">
</span><p data-dcnode-id="3548"><a data-dcnode-id="3562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mercantilism" title="Mercantilism"><span data-dcnode-id="3563" instrument_node="">Mercantilism</span></a><span data-dcnode-id="3561" instrument_node=""> declined in </span><a data-dcnode-id="3559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="3560" instrument_node="">Great Britain</span></a><span data-dcnode-id="3558" instrument_node=""> in the mid-18th century, when a new group of economic theorists, led by </span><a data-dcnode-id="3556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="3557" instrument_node="">Adam Smith</span></a><span data-dcnode-id="3555" instrument_node="">, challenged fundamental mercantilist doctrines, such as that the world's wealth remained constant and that a state could only increase its wealth at the expense of another state. However, mercantilism continued in less developed economies, such as </span><a data-dcnode-id="3553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prussia" title="Prussia"><span data-dcnode-id="3554" instrument_node="">Prussia</span></a><span data-dcnode-id="3552" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperial_Russia" title="Imperial Russia"><span data-dcnode-id="3551" instrument_node="">Russia</span></a><span data-dcnode-id="3549" instrument_node="">, with their much younger manufacturing bases.
</span></p><p data-dcnode-id="3535"><span data-dcnode-id="3547" instrument_node="">The mid-18th century gave rise to industrial capitalism, made possible by (1) the accumulation of vast amounts of capital under the merchant phase of capitalism and its investment in machinery, and (2) the fact that the enclosures meant that Britain had a large population of people with no access to subsistence agriculture, who needed to buy basic commodities via the market, ensuring a mass consumer market.</span><sup class="reference" data-dcnode-id="3544" id="cite_ref-45"><a data-dcnode-id="3545" href="#cite_note-45"><span data-dcnode-id="3546" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3543" instrument_node=""> Industrial capitalism, which Marx dated from the last third of the 18th century, marked the development of the factory system of manufacturing, characterized by a complex </span><a class="mw-redirect" data-dcnode-id="3541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Division_of_labor" title="Division of labor"><span data-dcnode-id="3542" instrument_node="">division of labor</span></a><span data-dcnode-id="3540" instrument_node=""> between and within work processes and the routinization of work tasks. Industrial capitalism finally established the global domination of the capitalist mode of production.</span><sup class="reference" data-dcnode-id="3537" id="cite_ref-Burnham_2003_36-1"><a data-dcnode-id="3538" href="#cite_note-Burnham_2003-36"><span data-dcnode-id="3539" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3536" instrument_node="">
</span></p><p data-dcnode-id="3512"><span data-dcnode-id="3534" instrument_node="">During the resulting </span><a data-dcnode-id="3532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="3533" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="3531" instrument_node="">, the industrialist replaced the merchant as a dominant actor in the capitalist system, which led to the decline of the traditional handicraft skills of </span><a data-dcnode-id="3529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artisan" title="Artisan"><span data-dcnode-id="3530" instrument_node="">artisans</span></a><span data-dcnode-id="3528" instrument_node="">, </span><a data-dcnode-id="3526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guild" title="Guild"><span data-dcnode-id="3527" instrument_node="">guilds</span></a><span data-dcnode-id="3525" instrument_node="">, and </span><a data-dcnode-id="3523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Journeyman" title="Journeyman"><span data-dcnode-id="3524" instrument_node="">journeymen</span></a><span data-dcnode-id="3522" instrument_node="">. Also during this period, capitalism transformed relations between the British landowning gentry and peasants, giving rise to the production of </span><a data-dcnode-id="3520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cash_crop" title="Cash crop"><span data-dcnode-id="3521" instrument_node="">cash crops</span></a><span data-dcnode-id="3519" instrument_node=""> for the market rather than for subsistence on a </span><a class="mw-redirect" data-dcnode-id="3517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Feudal" title="Feudal"><span data-dcnode-id="3518" instrument_node="">feudal</span></a><span data-dcnode-id="3516" instrument_node=""> </span><a data-dcnode-id="3514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manorialism" title="Manorialism"><span data-dcnode-id="3515" instrument_node="">manor</span></a><span data-dcnode-id="3513" instrument_node="">. The surplus generated by the rise of commercial agriculture encouraged increased mechanization of agriculture.
</span></p><span data-dcnode-id="3511" instrument_node="">
</span><h3 data-dcnode-id="3501"><span class="mw-headline" data-dcnode-id="3509" id="Industrial_Revolution"><span data-dcnode-id="3510" instrument_node="">Industrial Revolution</span></span><span class="mw-editsection" data-dcnode-id="3502"><span class="mw-editsection-bracket" data-dcnode-id="3507"><span data-dcnode-id="3508" instrument_node="">[</span></span><a data-dcnode-id="3505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D14" title="Edit section: Industrial Revolution"><span data-dcnode-id="3506" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3500" instrument_node="">
</span><link data-dcnode-id="3499" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="3495" role="note"><span data-dcnode-id="3498" instrument_node="">Main article: </span><a data-dcnode-id="3496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="3497" instrument_node="">Industrial Revolution</span></a></div><span data-dcnode-id="3494" instrument_node="">
</span><p data-dcnode-id="3480"><span data-dcnode-id="3493" instrument_node="">The productivity gains of capitalist production began a sustained and unprecedented increase at the turn of the 19th century, in a process commonly referred to as the </span><a data-dcnode-id="3491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_Revolution" title="Industrial Revolution"><span data-dcnode-id="3492" instrument_node="">Industrial Revolution</span></a><span data-dcnode-id="3490" instrument_node="">. Starting in about 1760 in England, there was a steady transition to new manufacturing processes in a variety of industries, including going from hand production methods to machine production, new chemical manufacturing and iron production processes, improved efficiency of </span><a data-dcnode-id="3488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_wheel" title="Water wheel"><span data-dcnode-id="3489" instrument_node="">water power</span></a><span data-dcnode-id="3487" instrument_node="">, the increasing use of steam power and the development of </span><a data-dcnode-id="3485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Machine_tool" title="Machine tool"><span data-dcnode-id="3486" instrument_node="">machine tools</span></a><span data-dcnode-id="3484" instrument_node="">. It also included the change from wood and other </span><a class="mw-redirect" data-dcnode-id="3482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bio-fuels" title="Bio-fuels"><span data-dcnode-id="3483" instrument_node="">bio-fuels</span></a><span data-dcnode-id="3481" instrument_node=""> to coal.
</span></p><span data-dcnode-id="3479" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3464"><div class="thumbinner" data-dcnode-id="3465" style="width:222px;"><a class="image" data-dcnode-id="3477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMule-jenny.jpg"><img alt="" class="thumbimage" data-dcnode-id="3478" data-file-height="395" data-file-width="500" decoding="async" height="174" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Mule-jenny.jpg/220px-Mule-jenny.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Mule-jenny.jpg/330px-Mule-jenny.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Mule-jenny.jpg/440px-Mule-jenny.jpg 2x" width="220"></a><span data-dcnode-id="3476" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3466"><div class="magnify" data-dcnode-id="3474"><a class="internal" data-dcnode-id="3475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMule-jenny.jpg" title="Enlarge"></a></div><span data-dcnode-id="3473" instrument_node="">The </span><a data-dcnode-id="3471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_mule" title="Spinning mule"><span data-dcnode-id="3472" instrument_node="">Spinning mule</span></a><span data-dcnode-id="3470" instrument_node="">, built by the inventor </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Crompton" title="Samuel Crompton"><span data-dcnode-id="3469" instrument_node="">Samuel Crompton</span></a><span data-dcnode-id="3467" instrument_node="">.</span></div></div></div><span data-dcnode-id="3463" instrument_node="">
</span><p data-dcnode-id="3436"><span data-dcnode-id="3462" instrument_node="">In </span><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Textile_manufacturing" title="Textile manufacturing"><span data-dcnode-id="3461" instrument_node="">textile manufacturing</span></a><span data-dcnode-id="3459" instrument_node="">, mechanized cotton spinning powered by steam or water increased the output of a worker by a factor of about 1000, due to the application of </span><a data-dcnode-id="3457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Hargreaves" title="James Hargreaves"><span data-dcnode-id="3458" instrument_node="">James Hargreaves</span></a><span data-dcnode-id="3456" instrument_node="">' </span><a data-dcnode-id="3454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_jenny" title="Spinning jenny"><span data-dcnode-id="3455" instrument_node="">spinning jenny</span></a><span data-dcnode-id="3453" instrument_node="">, </span><a data-dcnode-id="3451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Arkwright" title="Richard Arkwright"><span data-dcnode-id="3452" instrument_node="">Richard Arkwright</span></a><span data-dcnode-id="3450" instrument_node="">'s </span><a data-dcnode-id="3448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Water_frame" title="Water frame"><span data-dcnode-id="3449" instrument_node="">water frame</span></a><span data-dcnode-id="3447" instrument_node="">, </span><a data-dcnode-id="3445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Samuel_Crompton" title="Samuel Crompton"><span data-dcnode-id="3446" instrument_node="">Samuel Crompton</span></a><span data-dcnode-id="3444" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="3442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spinning_Mule" title="Spinning Mule"><span data-dcnode-id="3443" instrument_node="">Spinning Mule</span></a><span data-dcnode-id="3441" instrument_node=""> and other inventions. The power loom increased the output of a worker by a factor of over 40.</span><sup class="reference" data-dcnode-id="3438" id="cite_ref-Ayers1989_46-0"><a data-dcnode-id="3439" href="#cite_note-Ayers1989-46"><span data-dcnode-id="3440" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3437" instrument_node=""> The cotton gin increased the productivity of removing seed from cotton by a factor of 50. Large gains in productivity also occurred in spinning and weaving wool and linen, although they were not as great as in cotton.
</span></p><span data-dcnode-id="3435" instrument_node="">
</span><h3 data-dcnode-id="3425"><span class="mw-headline" data-dcnode-id="3433" id="Finance"><span data-dcnode-id="3434" instrument_node="">Finance</span></span><span class="mw-editsection" data-dcnode-id="3426"><span class="mw-editsection-bracket" data-dcnode-id="3431"><span data-dcnode-id="3432" instrument_node="">[</span></span><a data-dcnode-id="3429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D15" title="Edit section: Finance"><span data-dcnode-id="3430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3427"><span data-dcnode-id="3428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3424" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3406"><div class="thumbinner" data-dcnode-id="3407" style="width:222px;"><a class="image" data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrankfurt_Taunusbahnhof_1850.jpg"><img alt="" class="thumbimage" data-dcnode-id="3423" data-file-height="1194" data-file-width="1781" decoding="async" height="147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/40/Frankfurt_Taunusbahnhof_1850.jpg/220px-Frankfurt_Taunusbahnhof_1850.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/40/Frankfurt_Taunusbahnhof_1850.jpg/330px-Frankfurt_Taunusbahnhof_1850.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/40/Frankfurt_Taunusbahnhof_1850.jpg/440px-Frankfurt_Taunusbahnhof_1850.jpg 2x" width="220"></a><span data-dcnode-id="3421" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3408"><div class="magnify" data-dcnode-id="3419"><a class="internal" data-dcnode-id="3420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFrankfurt_Taunusbahnhof_1850.jpg" title="Enlarge"></a></div><span data-dcnode-id="3418" instrument_node="">The </span><a data-dcnode-id="3416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rothschild_banking_family_of_England" title="Rothschild banking family of England"><span data-dcnode-id="3417" instrument_node="">Rothschild family</span></a><span data-dcnode-id="3415" instrument_node=""> revolutionised international finance. The </span><a data-dcnode-id="3413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frankfurt_%28Main%29_Hauptbahnhof" title="Frankfurt (Main) Hauptbahnhof"><span data-dcnode-id="3414" instrument_node="">Frankfurt terminus</span></a><span data-dcnode-id="3412" instrument_node=""> of the </span><a data-dcnode-id="3410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Taunus_Railway" title="Taunus Railway"><span data-dcnode-id="3411" instrument_node="">Taunus Railway</span></a><span data-dcnode-id="3409" instrument_node=""> was financed by the Rothschilds and opened in 1840 as one of Germany's first railways.</span></div></div></div><span data-dcnode-id="3405" instrument_node="">
</span><p data-dcnode-id="3385"><span data-dcnode-id="3404" instrument_node="">The growth of Britain's industry stimulated a concomitant growth in its system of </span><a data-dcnode-id="3402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finance" title="Finance"><span data-dcnode-id="3403" instrument_node="">finance</span></a><span data-dcnode-id="3401" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Credit_%28finance%29" title="Credit (finance)"><span data-dcnode-id="3400" instrument_node="">credit</span></a><span data-dcnode-id="3398" instrument_node="">. In the 18th century, services offered by banks increased. Clearing facilities, security investments, </span><a data-dcnode-id="3396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cheque" title="Cheque"><span data-dcnode-id="3397" instrument_node="">cheques</span></a><span data-dcnode-id="3395" instrument_node=""> and </span><a data-dcnode-id="3393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overdraft" title="Overdraft"><span data-dcnode-id="3394" instrument_node="">overdraft</span></a><span data-dcnode-id="3392" instrument_node=""> protections were introduced. Cheques had been invented in the 17th century in England, and banks settled payments by direct courier to the issuing bank.  Around 1770, they began meeting in a central location, and by the 19th century a dedicated space was established, known as a </span><a class="mw-redirect" data-dcnode-id="3390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bankers%2527_clearing_house" title="Bankers' clearing house"><span data-dcnode-id="3391" instrument_node="">bankers' clearing house</span></a><span data-dcnode-id="3389" instrument_node="">.  The London clearing house used a method where each bank paid cash to and then was paid cash by an inspector at the end of each day. The first overdraft facility was set up in 1728 by </span><a class="mw-redirect" data-dcnode-id="3387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Royal_Bank_of_Scotland" title="The Royal Bank of Scotland"><span data-dcnode-id="3388" instrument_node="">The Royal Bank of Scotland</span></a><span data-dcnode-id="3386" instrument_node="">.
</span></p><p data-dcnode-id="3374"><span data-dcnode-id="3384" instrument_node="">The end of the </span><a class="mw-redirect" data-dcnode-id="3382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_War" title="Napoleonic War"><span data-dcnode-id="3383" instrument_node="">Napoleonic War</span></a><span data-dcnode-id="3381" instrument_node=""> and the subsequent rebound in trade led to an expansion in the </span><a data-dcnode-id="3379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bullion" title="Bullion"><span data-dcnode-id="3380" instrument_node="">bullion</span></a><span data-dcnode-id="3378" instrument_node=""> reserves held by the </span><a data-dcnode-id="3376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_England" title="Bank of England"><span data-dcnode-id="3377" instrument_node="">Bank of England</span></a><span data-dcnode-id="3375" instrument_node="">, from a low of under 4 million pounds in 1821 to 14&nbsp;million pounds by late 1824.
</span></p><p data-dcnode-id="3349"><span data-dcnode-id="3373" instrument_node="">Older innovations became routine parts of financial life during the 19th century. The </span><a data-dcnode-id="3371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_of_England" title="Bank of England"><span data-dcnode-id="3372" instrument_node="">Bank of England</span></a><span data-dcnode-id="3370" instrument_node=""> first issued bank notes during the 17th century, but the notes were hand written and few in number. After 1725, they were partially printed, but cashiers still had to sign each note and make them payable to a named person. In 1844, parliament passed the </span><a class="mw-redirect" data-dcnode-id="3368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bank_Charter_Act" title="Bank Charter Act"><span data-dcnode-id="3369" instrument_node="">Bank Charter Act</span></a><span data-dcnode-id="3367" instrument_node=""> tying these notes to </span><a class="mw-redirect" data-dcnode-id="3365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_reserves" title="Gold reserves"><span data-dcnode-id="3366" instrument_node="">gold reserves</span></a><span data-dcnode-id="3364" instrument_node="">, effectively creating the institution of </span><a data-dcnode-id="3362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_bank" title="Central bank"><span data-dcnode-id="3363" instrument_node="">central banking</span></a><span data-dcnode-id="3361" instrument_node=""> and </span><a data-dcnode-id="3359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monetary_policy" title="Monetary policy"><span data-dcnode-id="3360" instrument_node="">monetary policy</span></a><span data-dcnode-id="3358" instrument_node="">. The notes became fully printed and widely available from 1855.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3351" style="white-space:nowrap;"><span data-dcnode-id="3357" instrument_node="">[</span><i data-dcnode-id="3353"><a data-dcnode-id="3354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3355" title="This claim needs references to reliable sources. (September 2011)"><span data-dcnode-id="3356" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3352" instrument_node="">]</span></sup><span data-dcnode-id="3350" instrument_node="">
</span></p><p data-dcnode-id="3335"><span data-dcnode-id="3348" instrument_node="">Growing international trade increased the number of banks, especially in London. These new "merchant banks" facilitated trade growth, profiting from England's emerging dominance in seaborne shipping. Two immigrant families, </span><a data-dcnode-id="3346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rothschild_banking_family_of_England" title="Rothschild banking family of England"><span data-dcnode-id="3347" instrument_node="">Rothschild</span></a><span data-dcnode-id="3345" instrument_node=""> and </span><a data-dcnode-id="3343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barings_Bank" title="Barings Bank"><span data-dcnode-id="3344" instrument_node="">Baring</span></a><span data-dcnode-id="3342" instrument_node="">, established merchant banking firms in London in the late 18th century and came to dominate world banking in the next century. The tremendous wealth amassed by these banking firms soon attracted much attention. The poet </span><a class="mw-redirect" data-dcnode-id="3340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/George_Gordon_Byron" title="George Gordon Byron"><span data-dcnode-id="3341" instrument_node="">George Gordon Byron</span></a><span data-dcnode-id="3339" instrument_node=""> wrote in 1823: "Who makes politics run glibber all?/ The shade of Bonaparte's noble daring?/ Jew </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rothschild_banking_family_of_England" title="Rothschild banking family of England"><span data-dcnode-id="3338" instrument_node="">Rothschild</span></a><span data-dcnode-id="3336" instrument_node=""> and his fellow-Christian, Baring."
</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3334" instrument_node="">The operation of banks also shifted. At the beginning of the century, banking was still an elite preoccupation of a handful of very wealthy families. Within a few decades, however, a new sort of banking had emerged, owned by anonymous </span><a class="mw-redirect" data-dcnode-id="3332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stockholder" title="Stockholder"><span data-dcnode-id="3333" instrument_node="">stockholders</span></a><span data-dcnode-id="3331" instrument_node="">, run by professional </span><a data-dcnode-id="3329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Management" title="Management"><span data-dcnode-id="3330" instrument_node="">managers</span></a><span data-dcnode-id="3328" instrument_node="">, and the recipient of the deposits of a growing body of small middle-class savers. Although this breed of banks was newly prominent, it was not new – the </span><a class="mw-redirect" data-dcnode-id="3326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Quaker" title="Quaker"><span data-dcnode-id="3327" instrument_node="">Quaker</span></a><span data-dcnode-id="3325" instrument_node=""> family </span><a class="mw-redirect" data-dcnode-id="3323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barclays_Bank" title="Barclays Bank"><span data-dcnode-id="3324" instrument_node="">Barclays</span></a><span data-dcnode-id="3322" instrument_node=""> had been banking in this way since 1690.
</span></p><span data-dcnode-id="3320" instrument_node="">
</span><h3 data-dcnode-id="3310"><span class="mw-headline" data-dcnode-id="3318" id="Free_trade_and_globalization"><span data-dcnode-id="3319" instrument_node="">Free trade and globalization</span></span><span class="mw-editsection" data-dcnode-id="3311"><span class="mw-editsection-bracket" data-dcnode-id="3316"><span data-dcnode-id="3317" instrument_node="">[</span></span><a data-dcnode-id="3314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D16" title="Edit section: Free trade and globalization"><span data-dcnode-id="3315" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3281"><span data-dcnode-id="3308" instrument_node="">At the height of the </span><a data-dcnode-id="3306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_French_Empire" title="First French Empire"><span data-dcnode-id="3307" instrument_node="">First French Empire</span></a><span data-dcnode-id="3305" instrument_node="">, </span><a data-dcnode-id="3303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleon" title="Napoleon"><span data-dcnode-id="3304" instrument_node="">Napoleon</span></a><span data-dcnode-id="3302" instrument_node=""> sought to introduce a "</span><a class="mw-redirect" data-dcnode-id="3300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Continental_system" title="Continental system"><span data-dcnode-id="3301" instrument_node="">continental system</span></a><span data-dcnode-id="3299" instrument_node="">" that would render Europe economically autonomous, thereby emasculating British trade and commerce. It involved such stratagems as the use of </span><a data-dcnode-id="3297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sugar_beet" title="Sugar beet"><span data-dcnode-id="3298" instrument_node="">beet sugar</span></a><span data-dcnode-id="3296" instrument_node=""> in preference to the cane sugar that had to be imported from the tropics. Although this caused businessmen in England to agitate for peace, Britain persevered, in part because it was well into the </span><a class="mw-redirect" data-dcnode-id="3294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrial_revolution" title="Industrial revolution"><span data-dcnode-id="3295" instrument_node="">industrial revolution</span></a><span data-dcnode-id="3293" instrument_node="">. The war had the opposite effect – it stimulated the growth of certain industries, such as </span><a data-dcnode-id="3291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pig_iron" title="Pig iron"><span data-dcnode-id="3292" instrument_node="">pig-iron</span></a><span data-dcnode-id="3290" instrument_node=""> production which increased from 68,000 tons in 1788 to 244,000 by 1806.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3283" style="white-space:nowrap;"><span data-dcnode-id="3289" instrument_node="">[</span><i data-dcnode-id="3285"><a data-dcnode-id="3286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3287" title="This claim needs references to reliable sources. (April 2010)"><span data-dcnode-id="3288" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3284" instrument_node="">]</span></sup><span data-dcnode-id="3282" instrument_node="">
</span></p><span data-dcnode-id="3280" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="3259"><div class="thumbinner" data-dcnode-id="3260" style="width:222px;"><a class="image" data-dcnode-id="3278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarshall%2527s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg"><img alt="" class="thumbimage" data-dcnode-id="3279" data-file-height="957" data-file-width="1254" decoding="async" height="168" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Marshall%2527s_flax-mill%252C_Holbeck%252C_Leeds_-_interior_-_c.1800.jpg/220px-Marshall%2527s_flax-mill%252C_Holbeck%252C_Leeds_-_interior_-_c.1800.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Marshall%27s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg/330px-Marshall%27s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Marshall%27s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg/440px-Marshall%27s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg 2x" width="220"></a><span data-dcnode-id="3277" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3261"><div class="magnify" data-dcnode-id="3275"><a class="internal" data-dcnode-id="3276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMarshall%2527s_flax-mill%2C_Holbeck%2C_Leeds_-_interior_-_c.1800.jpg" title="Enlarge"></a></div><span data-dcnode-id="3274" instrument_node="">19th-century </span><a data-dcnode-id="3272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom_of_Great_Britain_and_Ireland" title="United Kingdom of Great Britain and Ireland"><span data-dcnode-id="3273" instrument_node="">Great Britain</span></a><span data-dcnode-id="3271" instrument_node=""> become the first global economic </span><a data-dcnode-id="3269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Superpower" title="Superpower"><span data-dcnode-id="3270" instrument_node="">superpower</span></a><span data-dcnode-id="3268" instrument_node="">, because of superior manufacturing technology and improved global communications such as </span><a data-dcnode-id="3266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steamship" title="Steamship"><span data-dcnode-id="3267" instrument_node="">steamships</span></a><span data-dcnode-id="3265" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="3263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Railroad" title="Railroad"><span data-dcnode-id="3264" instrument_node="">railroads</span></a><span data-dcnode-id="3262" instrument_node="">.</span></div></div></div><span data-dcnode-id="3258" instrument_node="">
</span><p data-dcnode-id="3238"><span data-dcnode-id="3257" instrument_node="">In 1817, </span><a data-dcnode-id="3255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Ricardo" title="David Ricardo"><span data-dcnode-id="3256" instrument_node="">David Ricardo</span></a><span data-dcnode-id="3254" instrument_node="">, </span><a data-dcnode-id="3252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Mill" title="James Mill"><span data-dcnode-id="3253" instrument_node="">James Mill</span></a><span data-dcnode-id="3251" instrument_node=""> and </span><a data-dcnode-id="3249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Robert_Torrens_%28economist%29" title="Robert Torrens (economist)"><span data-dcnode-id="3250" instrument_node="">Robert Torrens, in the famous theory of</span></a><span data-dcnode-id="3248" instrument_node=""> </span><a data-dcnode-id="3246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comparative_advantage" title="Comparative advantage"><span data-dcnode-id="3247" instrument_node="">comparative advantage</span></a><span data-dcnode-id="3245" instrument_node="">, argued that free trade would benefit the industrially weak as well as the strong. In </span><a class="mw-redirect" data-dcnode-id="3243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Principles_of_Political_Economy_and_Taxation" title="Principles of Political Economy and Taxation"><span data-dcnode-id="3244" instrument_node="">Principles of Political Economy and Taxation</span></a><span data-dcnode-id="3242" instrument_node="">, Ricardo advanced the doctrine still considered the most counterintuitive in </span><a data-dcnode-id="3240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economics" title="Economics"><span data-dcnode-id="3241" instrument_node="">economics</span></a><span data-dcnode-id="3239" instrument_node="">:
</span></p><span data-dcnode-id="3237" instrument_node="">
</span><dl data-dcnode-id="3233"><dd data-dcnode-id="3234"><i data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">When an inefficient producer sends the merchandise it produces best to a country able to produce it more efficiently, both countries benefit.</span></i></dd></dl><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3205"><span data-dcnode-id="3231" instrument_node="">By the mid 19th century, Britain was firmly wedded to the notion of </span><a data-dcnode-id="3229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="3230" instrument_node="">free trade</span></a><span data-dcnode-id="3228" instrument_node="">, and the first era of globalization began.</span><sup class="reference" data-dcnode-id="3225" id="cite_ref-Burnham_2003_36-2"><a data-dcnode-id="3226" href="#cite_note-Burnham_2003-36"><span data-dcnode-id="3227" instrument_node="">[36]</span></a></sup><span data-dcnode-id="3224" instrument_node=""> In the 1840s, the </span><a data-dcnode-id="3222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Corn_Laws" title="Corn Laws"><span data-dcnode-id="3223" instrument_node="">Corn Laws</span></a><span data-dcnode-id="3221" instrument_node=""> and the </span><a data-dcnode-id="3219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Navigation_Acts" title="Navigation Acts"><span data-dcnode-id="3220" instrument_node="">Navigation Acts</span></a><span data-dcnode-id="3218" instrument_node=""> were repealed, ushering in a new age of free trade. In line with the teachings of the classical political economists, led by </span><a data-dcnode-id="3216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="3217" instrument_node="">Adam Smith</span></a><span data-dcnode-id="3215" instrument_node=""> and </span><a data-dcnode-id="3213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/David_Ricardo" title="David Ricardo"><span data-dcnode-id="3214" instrument_node="">David Ricardo</span></a><span data-dcnode-id="3212" instrument_node="">, Britain embraced </span><a data-dcnode-id="3210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Classical_liberalism" title="Classical liberalism"><span data-dcnode-id="3211" instrument_node="">liberalism</span></a><span data-dcnode-id="3209" instrument_node="">, encouraging competition and the development of a </span><a data-dcnode-id="3207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Market_economy" title="Market economy"><span data-dcnode-id="3208" instrument_node="">market economy</span></a><span data-dcnode-id="3206" instrument_node="">.
</span></p><p data-dcnode-id="3165"><a class="mw-redirect" data-dcnode-id="3203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialization" title="Industrialization"><span data-dcnode-id="3204" instrument_node="">Industrialization</span></a><span data-dcnode-id="3202" instrument_node=""> allowed cheap production of household items using </span><a data-dcnode-id="3200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economies_of_scale" title="Economies of scale"><span data-dcnode-id="3201" instrument_node="">economies of scale</span></a><span data-dcnode-id="3199" instrument_node="">,</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3192" style="white-space:nowrap;"><span data-dcnode-id="3198" instrument_node="">[</span><i data-dcnode-id="3194"><a data-dcnode-id="3195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3196" title="This claim needs references to reliable sources. (June 2011)"><span data-dcnode-id="3197" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3193" instrument_node="">]</span></sup><span data-dcnode-id="3191" instrument_node=""> while rapid population growth created sustained demand for commodities. Nineteenth-century </span><a data-dcnode-id="3189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperialism" title="Imperialism"><span data-dcnode-id="3190" instrument_node="">imperialism</span></a><span data-dcnode-id="3188" instrument_node=""> decisively shaped globalization in this period. After the </span><a data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Opium_War" title="First Opium War"><span data-dcnode-id="3187" instrument_node="">First</span></a><span data-dcnode-id="3185" instrument_node=""> and </span><a data-dcnode-id="3183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Opium_War" title="Second Opium War"><span data-dcnode-id="3184" instrument_node="">Second Opium Wars</span></a><span data-dcnode-id="3182" instrument_node=""> and the completion of the British conquest of India, vast populations of these regions became ready consumers of European exports. During this period, areas of </span><a class="mw-redirect" data-dcnode-id="3180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub_Saharan_Africa" title="Sub Saharan Africa"><span data-dcnode-id="3181" instrument_node="">sub-Saharan</span></a><span data-dcnode-id="3179" instrument_node=""> Africa and the Pacific islands were incorporated into the world system. Meanwhile, the European conquest of new parts of the globe, notably sub-Saharan Africa, yielded valuable natural resources such as </span><a class="mw-redirect" data-dcnode-id="3177" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rubber" title="Rubber"><span data-dcnode-id="3178" instrument_node="">rubber</span></a><span data-dcnode-id="3176" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="3174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diamonds" title="Diamonds"><span data-dcnode-id="3175" instrument_node="">diamonds</span></a><span data-dcnode-id="3173" instrument_node=""> and </span><a data-dcnode-id="3171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Coal" title="Coal"><span data-dcnode-id="3172" instrument_node="">coal</span></a><span data-dcnode-id="3170" instrument_node=""> and helped fuel trade and investment between the European imperial powers, their colonies, and the United States.</span><sup class="reference" data-dcnode-id="3167" id="cite_ref-47"><a data-dcnode-id="3168" href="#cite_note-47"><span data-dcnode-id="3169" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3166" instrument_node="">
</span></p><span data-dcnode-id="3164" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="3152"><div class="thumbinner" data-dcnode-id="3153" style="width:132px;"><a class="image" data-dcnode-id="3162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMcKinley_Prosperity.jpg"><img alt="" class="thumbimage" data-dcnode-id="3163" data-file-height="4267" data-file-width="2786" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/McKinley_Prosperity.jpg/130px-McKinley_Prosperity.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/0a/McKinley_Prosperity.jpg/196px-McKinley_Prosperity.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/0a/McKinley_Prosperity.jpg/261px-McKinley_Prosperity.jpg 2x" width="130"></a><span data-dcnode-id="3161" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="3154"><div class="magnify" data-dcnode-id="3159"><a class="internal" data-dcnode-id="3160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMcKinley_Prosperity.jpg" title="Enlarge"></a></div><span data-dcnode-id="3158" instrument_node="">The </span><a data-dcnode-id="3156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_standard" title="Gold standard"><span data-dcnode-id="3157" instrument_node="">gold standard</span></a><span data-dcnode-id="3155" instrument_node=""> formed the financial basis of the international economy from 1870 to 1914.</span></div></div></div><span data-dcnode-id="3151" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="3146"><p data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">The inhabitant of London could order by telephone, sipping his morning tea, the various products of the whole earth, and reasonably expect their early delivery upon his doorstep. Militarism and imperialism of racial and cultural rivalries were little more than the amusements of his daily newspaper. What an extraordinary episode in the economic progress of man was that age which came to an end in August 1914.</span></p></blockquote><span data-dcnode-id="3145" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3144" instrument_node="">The global financial system was mainly tied to the </span><a data-dcnode-id="3142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gold_standard" title="Gold standard"><span data-dcnode-id="3143" instrument_node="">gold standard</span></a><span data-dcnode-id="3141" instrument_node=""> during this period. The United Kingdom first formally adopted this standard in 1821. Soon to follow was </span><a class="mw-redirect" data-dcnode-id="3139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Province_of_Canada" title="United Province of Canada"><span data-dcnode-id="3140" instrument_node="">Canada</span></a><span data-dcnode-id="3138" instrument_node=""> in 1853, </span><a data-dcnode-id="3136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Newfoundland_and_Labrador" title="History of Newfoundland and Labrador"><span data-dcnode-id="3137" instrument_node="">Newfoundland</span></a><span data-dcnode-id="3135" instrument_node=""> in 1865, and the United States and Germany (</span><i data-dcnode-id="3132"><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_jure" title="De jure"><span data-dcnode-id="3134" instrument_node="">de jure</span></a></i><span data-dcnode-id="3131" instrument_node="">) in 1873. New technologies, such as the </span><a class="mw-redirect" data-dcnode-id="3129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telegraph" title="Telegraph"><span data-dcnode-id="3130" instrument_node="">telegraph</span></a><span data-dcnode-id="3128" instrument_node="">, the </span><a data-dcnode-id="3126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Transatlantic_telegraph_cable" title="Transatlantic telegraph cable"><span data-dcnode-id="3127" instrument_node="">transatlantic cable</span></a><span data-dcnode-id="3125" instrument_node="">, the </span><a data-dcnode-id="3123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radiotelephone" title="Radiotelephone"><span data-dcnode-id="3124" instrument_node="">Radiotelephone</span></a><span data-dcnode-id="3122" instrument_node="">, the </span><a data-dcnode-id="3120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Steamship" title="Steamship"><span data-dcnode-id="3121" instrument_node="">steamship</span></a><span data-dcnode-id="3119" instrument_node="">, and the </span><a class="mw-redirect" data-dcnode-id="3117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Railway" title="Railway"><span data-dcnode-id="3118" instrument_node="">railway</span></a><span data-dcnode-id="3116" instrument_node=""> allowed goods and information to move around the world at an unprecedented degree.</span><sup class="reference" data-dcnode-id="3113" id="cite_ref-48"><a data-dcnode-id="3114" href="#cite_note-48"><span data-dcnode-id="3115" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3112" instrument_node="">
</span></p><p data-dcnode-id="3091"><span data-dcnode-id="3110" instrument_node="">The eruption of </span><a class="mw-redirect" data-dcnode-id="3108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_civil_war" title="American civil war"><span data-dcnode-id="3109" instrument_node="">civil war</span></a><span data-dcnode-id="3107" instrument_node=""> in the United States in 1861 and the blockade of its ports to international commerce meant that the main supply of </span><a data-dcnode-id="3105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cotton" title="Cotton"><span data-dcnode-id="3106" instrument_node="">cotton</span></a><span data-dcnode-id="3104" instrument_node=""> for the </span><a data-dcnode-id="3102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lancashire" title="Lancashire"><span data-dcnode-id="3103" instrument_node="">Lancashire</span></a><span data-dcnode-id="3101" instrument_node=""> looms was cut off. The textile industries shifted to reliance upon cotton from Africa and Asia during the course of the U.S. civil war, and this created pressure for an Anglo-French controlled canal through the </span><a data-dcnode-id="3099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez" title="Suez"><span data-dcnode-id="3100" instrument_node="">Suez</span></a><span data-dcnode-id="3098" instrument_node=""> peninsula. The </span><a class="mw-redirect" data-dcnode-id="3096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_canal" title="Suez canal"><span data-dcnode-id="3097" instrument_node="">Suez canal</span></a><span data-dcnode-id="3095" instrument_node=""> opened in 1869, the same year in which the </span><a data-dcnode-id="3093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Pacific_Railroad" title="Central Pacific Railroad"><span data-dcnode-id="3094" instrument_node="">Central Pacific Railroad</span></a><span data-dcnode-id="3092" instrument_node=""> that spanned the North American continent was completed. Capitalism and the engine of profit were making the globe a smaller place.
</span></p><span data-dcnode-id="3090" instrument_node="">
</span><h2 data-dcnode-id="3080"><span class="mw-headline" data-dcnode-id="3088" id="20th_century"><span data-dcnode-id="3089" instrument_node="">20th century</span></span><span class="mw-editsection" data-dcnode-id="3081"><span class="mw-editsection-bracket" data-dcnode-id="3086"><span data-dcnode-id="3087" instrument_node="">[</span></span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DHistory_of_capitalism%26action%3Dedit%26section%3D17" title="Edit section: 20th century"><span data-dcnode-id="3085" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3082"><span data-dcnode-id="3083" instrument_node="">]</span></span></span></h2><span data-dcnode-id="3079" instrument_node="">
