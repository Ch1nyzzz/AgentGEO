/42px-Flag_of_Albania_%281946%25E2%2580%25931992%29.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Flag_of_Albania_%281946%E2%80%931992%29.svg/63px-Flag_of_Albania_%281946%E2%80%931992%29.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Flag_of_Albania_%281946%E2%80%931992%29.svg/84px-Flag_of_Albania_%281946%E2%80%931992%29.svg.png 2x" width="42"><br data-dcnode-id="5784"><a data-dcnode-id="5782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Socialist_Republic_of_Albania" title="People's Socialist Republic of Albania"><span data-dcnode-id="5783" instrument_node="">Albania</span></a></th><th data-dcnode-id="5775" scope="col" style="width:50%; text-align:center; border-left:thin solid lightgrey;"><img alt="" class="thumbborder" data-dcnode-id="5779" data-file-height="600" data-file-width="1200" decoding="async" height="30" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/60px-Flag_of_the_Soviet_Union.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/90px-Flag_of_the_Soviet_Union.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Flag_of_the_Soviet_Union.svg/120px-Flag_of_the_Soviet_Union.svg.png 2x" width="60"><br data-dcnode-id="5778"><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="5777" instrument_node="">Soviet Union</span></a></th></tr><tr data-dcnode-id="5770" style="display:none"><th colspan="2" data-dcnode-id="5771"><span data-dcnode-id="5772" instrument_node="">

</span><p data-dcnode-id="5738"><span data-dcnode-id="5766" instrument_node="">The </span><b data-dcnode-id="5764"><span data-dcnode-id="5765" instrument_node="">Albanian–Soviet split</span></b><span data-dcnode-id="5763" instrument_node=""> was the gradual deterioration of </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albania%25E2%2580%2593Russia_relations%23Albania_and_the_USSR" title="Albania–Russia relations"><span data-dcnode-id="5762" instrument_node="">relations</span></a><span data-dcnode-id="5760" instrument_node=""> between the </span><a class="mw-redirect" data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Soviet_Socialist_Republics" title="Union of Soviet Socialist Republics"><span data-dcnode-id="5759" instrument_node="">Union of Soviet Socialist Republics</span></a><span data-dcnode-id="5757" instrument_node=""> (USSR) and the </span><a class="mw-redirect" data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Albania" title="People's Republic of Albania"><span data-dcnode-id="5756" instrument_node="">People's Republic of Albania</span></a><span data-dcnode-id="5754" instrument_node="">, which occurred in the 1955–1961 period as a result of Soviet leader </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="5753" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="5751" instrument_node="">'s rapprochement with </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Federal_Republic_of_Yugoslavia" title="Socialist Federal Republic of Yugoslavia"><span data-dcnode-id="5750" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="5748" instrument_node=""> along with his "</span><a data-dcnode-id="5746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_the_Cult_of_Personality_and_Its_Consequences" title="On the Cult of Personality and Its Consequences"><span data-dcnode-id="5747" instrument_node="">Secret Speech</span></a><span data-dcnode-id="5745" instrument_node="">" and subsequent </span><a data-dcnode-id="5743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-Stalinization" title="De-Stalinization"><span data-dcnode-id="5744" instrument_node="">de-Stalinization</span></a><span data-dcnode-id="5742" instrument_node="">, including efforts to extend these policies into Albania as was occurring in other </span><a data-dcnode-id="5740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="5741" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="5739" instrument_node=""> states at the time.
</span></p><p data-dcnode-id="5732"><span data-dcnode-id="5737" instrument_node="">However, the Albanian-Soviet split did not become public until 1960, when, during the Bucharest Conference of Representatives of Communist and Workers Parties, the Albanian delegation, led by Hysni Kapo, did not support Khrushchev's ideological views on the Sino-Soviet split.</span><sup class="reference" data-dcnode-id="5734" id="cite_ref-1"><a data-dcnode-id="5735" href="#cite_note-1"><span data-dcnode-id="5736" instrument_node="">[1]</span></a></sup><span data-dcnode-id="5733" instrument_node="">
</span></p><p data-dcnode-id="5706"><span data-dcnode-id="5731" instrument_node="">The Albanian leadership under </span><a data-dcnode-id="5729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Enver_Hoxha" title="Enver Hoxha"><span data-dcnode-id="5730" instrument_node="">Enver Hoxha</span></a><span data-dcnode-id="5728" instrument_node=""> perceived Khrushchev's policies as contrary to </span><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="5727" instrument_node="">Marxist–Leninist doctrine</span></a><span data-dcnode-id="5725" instrument_node=""> and his denunciation of </span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="5724" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="5722" instrument_node=""> as an opportunistic act meant to legitimize </span><a class="mw-redirect" data-dcnode-id="5720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist_revisionism" title="Marxist revisionism"><span data-dcnode-id="5721" instrument_node="">revisionism</span></a><span data-dcnode-id="5719" instrument_node=""> within the </span><a data-dcnode-id="5717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_communism" title="World communism"><span data-dcnode-id="5718" instrument_node="">international communist movement</span></a><span data-dcnode-id="5716" instrument_node="">. Occurring within the context of the larger </span><a data-dcnode-id="5714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_split" title="Sino-Soviet split"><span data-dcnode-id="5715" instrument_node="">split between China and the USSR</span></a><span data-dcnode-id="5713" instrument_node="">, the Soviet–Albanian split culminated in the termination of relations in 1961, however Albania did not withdraw from the </span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="5712" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="5710" instrument_node=""> until 1968, mainly as a reaction to the </span><a class="mw-redirect" data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Invasion_of_Czechoslovakia" title="Invasion of Czechoslovakia"><span data-dcnode-id="5709" instrument_node="">Invasion of Czechoslovakia</span></a><span data-dcnode-id="5707" instrument_node="">.
</span></p><span data-dcnode-id="5705" instrument_node="">

</span><h2 data-dcnode-id="5507"><span class="mw-headline" data-dcnode-id="5515" id="Background"><span data-dcnode-id="5516" instrument_node="">Background</span></span><span class="mw-editsection" data-dcnode-id="5508"><span class="mw-editsection-bracket" data-dcnode-id="5513"><span data-dcnode-id="5514" instrument_node="">[</span></span><a data-dcnode-id="5511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D1" title="Edit section: Background"><span data-dcnode-id="5512" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5506" instrument_node="">
</span><p data-dcnode-id="5466"><span data-dcnode-id="5505" instrument_node="">The Communist Party of Albania—known as the </span><a data-dcnode-id="5503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Party_of_Labour_of_Albania" title="Party of Labour of Albania"><span data-dcnode-id="5504" instrument_node="">Party of Labour of Albania</span></a><span data-dcnode-id="5502" instrument_node=""> after 1948—was founded in November 1941 in the context of the </span><a class="mw-redirect" data-dcnode-id="5500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albanian_Kingdom_%281939%25E2%2580%25931943%29" title="Albanian Kingdom (1939–1943)"><span data-dcnode-id="5501" instrument_node="">foreign occupation</span></a><span data-dcnode-id="5499" instrument_node=""> of the country, with the majority of its members including its leader, Enver Hoxha, having no connection to the </span><a class="mw-redirect" data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comintern" title="Comintern"><span data-dcnode-id="5498" instrument_node="">Comintern</span></a><span data-dcnode-id="5496" instrument_node="">.</span><sup class="reference" data-dcnode-id="5493" id="cite_ref-FOOTNOTEHeld199229_2-0"><a data-dcnode-id="5494" href="#cite_note-FOOTNOTEHeld199229-2"><span data-dcnode-id="5495" instrument_node="">[2]</span></a></sup><span data-dcnode-id="5492" instrument_node=""> Historian </span><a data-dcnode-id="5490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jon_Halliday" title="Jon Halliday"><span data-dcnode-id="5491" instrument_node="">Jon Halliday</span></a><span data-dcnode-id="5489" instrument_node=""> commented "it was set up without any known direct contact with Moscow." Halliday argues that "middle-class intellectuals" with "</span><em data-dcnode-id="5487"><span data-dcnode-id="5488" instrument_node="">Western</span></em><span data-dcnode-id="5486" instrument_node=""> intellectual traditions" were the most significant force behind the foundation of the Communist party of Albania. </span><sup class="reference" data-dcnode-id="5483" id="cite_ref-FOOTNOTEHalliday198622_3-0"><a data-dcnode-id="5484" href="#cite_note-FOOTNOTEHalliday198622-3"><span data-dcnode-id="5485" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5482" instrument_node=""> Albania was also the only Eastern European country liberated from Axis occupation without the presence of the </span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Army" title="Red Army"><span data-dcnode-id="5481" instrument_node="">Red Army</span></a><span data-dcnode-id="5479" instrument_node=""> on its soil.</span><sup class="reference" data-dcnode-id="5476" id="cite_ref-FOOTNOTEHeld199233_4-0"><a data-dcnode-id="5477" href="#cite_note-FOOTNOTEHeld199233-4"><span data-dcnode-id="5478" instrument_node="">[4]</span></a></sup><span data-dcnode-id="5475" instrument_node=""> A combination of these factors led Stalin to initially have been "both curious and suspicious about the only leader of a Communist regime in the Soviet bloc who escaped from any historical ties or contact with the Soviet Union." This, Halliday continues, "was true not just of Hoxha as an individual, but of almost the entire leading group in Albania."</span><sup class="reference" data-dcnode-id="5472" id="cite_ref-FOOTNOTEHalliday19866_5-0"><a data-dcnode-id="5473" href="#cite_note-FOOTNOTEHalliday19866-5"><span data-dcnode-id="5474" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5471" instrument_node=""> Despite this, however, for Halliday, Hoxha's cult of personality made him "the quintessential Stalinist". Halliday considers that many of the reasons used by Nikita Khrushchev to denounce Josef Stalin, were applicable to Enver Hoxha. </span><sup class="reference" data-dcnode-id="5468" id="cite_ref-FOOTNOTEO'Donnell1999195_6-0"><a data-dcnode-id="5469" href="#cite_note-FOOTNOTEO'Donnell1999195-6"><span data-dcnode-id="5470" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5467" instrument_node="">
</span></p><p data-dcnode-id="5450"><span data-dcnode-id="5465" instrument_node="">Following Albania's liberation on November 29, 1944, the country's economic and foreign policies were dominated by its neighbour Yugoslavia under the leadership of </span><a data-dcnode-id="5463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josip_Broz_Tito" title="Josip Broz Tito"><span data-dcnode-id="5464" instrument_node="">Josip Broz Tito</span></a><span data-dcnode-id="5462" instrument_node="">, and Albania became in the words of historian Miranda Vickers a "sub-</span><a data-dcnode-id="5460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Satellite_state" title="Satellite state"><span data-dcnode-id="5461" instrument_node="">satellite</span></a><span data-dcnode-id="5459" instrument_node="">."</span><sup class="reference" data-dcnode-id="5456" id="cite_ref-FOOTNOTEVickers1999173_7-0"><a data-dcnode-id="5457" href="#cite_note-FOOTNOTEVickers1999173-7"><span data-dcnode-id="5458" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5455" instrument_node=""> During this period ties with the Soviet Union remained limited, though formal diplomatic relations were established in December 1945.</span><sup class="reference" data-dcnode-id="5452" id="cite_ref-FOOTNOTEPano196886OmariPollo198882_8-0"><a data-dcnode-id="5453" href="#cite_note-FOOTNOTEPano196886OmariPollo198882-8"><span data-dcnode-id="5454" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5451" instrument_node="">
</span></p><span data-dcnode-id="5449" instrument_node="">
</span><div class="center" data-dcnode-id="5439"><div class="thumb tnone" data-dcnode-id="5440"><div class="thumbinner" data-dcnode-id="5441" style="width:502px;"><a class="image" data-dcnode-id="5447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlbanian%25E2%2580%2593Soviet_split.png"><img alt="" class="thumbimage" data-dcnode-id="5448" data-file-height="3167" data-file-width="7743" decoding="async" height="205" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Albanian%25E2%2580%2593Soviet_split.png/500px-Albanian%25E2%2580%2593Soviet_split.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Albanian%E2%80%93Soviet_split.png/750px-Albanian%E2%80%93Soviet_split.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Albanian%E2%80%93Soviet_split.png/1000px-Albanian%E2%80%93Soviet_split.png 2x" width="500"></a><span data-dcnode-id="5446" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="5442"><div class="magnify" data-dcnode-id="5444"><a class="internal" data-dcnode-id="5445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AAlbanian%25E2%2580%2593Soviet_split.png" title="Enlarge"></a></div><span data-dcnode-id="5443" instrument_node="">Geopolitical situation in 1956</span></div></div></div></div><span data-dcnode-id="5438" instrument_node="">
</span><h3 data-dcnode-id="5427"><span data-dcnode-id="5437" id="Soviet.E2.80.93Yugoslav_split"></span><span class="mw-headline" data-dcnode-id="5435" id="Soviet–Yugoslav_split"><span data-dcnode-id="5436" instrument_node="">Soviet–Yugoslav split</span></span><span class="mw-editsection" data-dcnode-id="5428"><span class="mw-editsection-bracket" data-dcnode-id="5433"><span data-dcnode-id="5434" instrument_node="">[</span></span><a data-dcnode-id="5431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D2" title="Edit section: Soviet–Yugoslav split"><span data-dcnode-id="5432" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5429"><span data-dcnode-id="5430" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5426" instrument_node="">
</span><p data-dcnode-id="5403"><span data-dcnode-id="5425" instrument_node="">Within the leadership of the Communist Party of Albania tensions arose between pro– and anti–Yugoslav factions and personalities, with the latter increasingly coming under attack by </span><a data-dcnode-id="5423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ko%25C3%25A7i_Xoxe" title="Koçi Xoxe"><span data-dcnode-id="5424" instrument_node="">Koçi Xoxe</span></a><span data-dcnode-id="5422" instrument_node="">, the head of the pro–Yugoslav faction.</span><sup class="reference" data-dcnode-id="5419" id="cite_ref-FOOTNOTELogoreci197793–100_9-0"><a data-dcnode-id="5420" href="#cite_note-FOOTNOTELogoreci197793%E2%80%93100-9"><span data-dcnode-id="5421" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5418" instrument_node=""> Hoxha was threatened on the basis of his opposition to the pro–Yugoslav line, as Xoxe's final goal was to overthrow Hoxha and to incorporate Albania into Yugoslavia as its Seventh Republic.</span><sup class="reference" data-dcnode-id="5415" id="cite_ref-FOOTNOTEVickers1999173_7-1"><a data-dcnode-id="5416" href="#cite_note-FOOTNOTEVickers1999173-7"><span data-dcnode-id="5417" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5414" instrument_node=""> The </span><a class="mw-redirect" data-dcnode-id="5412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Yugoslav_split" title="Soviet–Yugoslav split"><span data-dcnode-id="5413" instrument_node="">Soviet–Yugoslav split</span></a><span data-dcnode-id="5411" instrument_node=""> in 1948, however, had allowed Albania to break from Yugoslav dominance, and it became the first state to side with the Information Bureau (better known in the West as the </span><a data-dcnode-id="5409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cominform" title="Cominform"><span data-dcnode-id="5410" instrument_node="">Cominform</span></a><span data-dcnode-id="5408" instrument_node="">) with its resolution attacking the Yugoslav leadership for allegedly pursuing a road of nationalist deviation and capitalist restoration.</span><sup class="reference" data-dcnode-id="5405" id="cite_ref-FOOTNOTEPano196883–86_10-0"><a data-dcnode-id="5406" href="#cite_note-FOOTNOTEPano196883%E2%80%9386-10"><span data-dcnode-id="5407" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5404" instrument_node="">
</span></p><p data-dcnode-id="5379"><span data-dcnode-id="5402" instrument_node="">From that point onward, relations between Albania and the Soviet Union were relatively close until March 5, 1953, following the death of Stalin.</span><sup class="reference" data-dcnode-id="5399" id="cite_ref-FOOTNOTEO'Donnell199938_11-0"><a data-dcnode-id="5400" href="#cite_note-FOOTNOTEO'Donnell199938-11"><span data-dcnode-id="5401" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5398" instrument_node=""> In the words of historian Nicholas C. Pano, "by the beginning of 1949, Albania had progressed from the status of a sub-satellite to that of a full-fledged satellite of the Soviet Union."</span><sup class="reference" data-dcnode-id="5395" id="cite_ref-FOOTNOTEPano196889_12-0"><a data-dcnode-id="5396" href="#cite_note-FOOTNOTEPano196889-12"><span data-dcnode-id="5397" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5394" instrument_node=""> Albania became a member of </span><a data-dcnode-id="5392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comecon" title="Comecon"><span data-dcnode-id="5393" instrument_node="">Comecon</span></a><span data-dcnode-id="5391" instrument_node=""> in 1949, and joined the Warsaw Treaty upon its founding in 1955.</span><sup class="reference" data-dcnode-id="5388" id="cite_ref-FOOTNOTEOmariPollo1988153–154_13-0"><a data-dcnode-id="5389" href="#cite_note-FOOTNOTEOmariPollo1988153%E2%80%93154-13"><span data-dcnode-id="5390" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5387" instrument_node=""> In addition the Soviets built a submarine base at </span><a class="mw-redirect" data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vlora" title="Vlora"><span data-dcnode-id="5386" instrument_node="">Vlora</span></a><span data-dcnode-id="5384" instrument_node=""> in 1952.</span><sup class="reference" data-dcnode-id="5381" id="cite_ref-FOOTNOTEO'Donnell199937–38_14-0"><a data-dcnode-id="5382" href="#cite_note-FOOTNOTEO'Donnell199937%E2%80%9338-14"><span data-dcnode-id="5383" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5380" instrument_node="">
</span></p><span data-dcnode-id="5378" instrument_node="">
</span><h3 data-dcnode-id="5368"><span class="mw-headline" data-dcnode-id="5376" id="Death_of_Stalin"><span data-dcnode-id="5377" instrument_node="">Death of Stalin</span></span><span class="mw-editsection" data-dcnode-id="5369"><span class="mw-editsection-bracket" data-dcnode-id="5374"><span data-dcnode-id="5375" instrument_node="">[</span></span><a data-dcnode-id="5372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D3" title="Edit section: Death of Stalin"><span data-dcnode-id="5373" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5370"><span data-dcnode-id="5371" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5367" instrument_node="">
</span><p data-dcnode-id="5352"><span data-dcnode-id="5366" instrument_node="">In his memoirs, Hoxha recounts the apprehension he and others had about the post-Stalin leadership, just days after Stalin's death. "The way in which the death of Stalin was announced and his funeral ceremony was organized created the impression&nbsp;... that many members of the </span><a class="mw-redirect" data-dcnode-id="5364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politburo_of_the_Central_Committee_of_the_Communist_Party_of_the_Soviet_Union" title="Politburo of the Central Committee of the Communist Party of the Soviet Union"><span data-dcnode-id="5365" instrument_node="">Presidium</span></a><span data-dcnode-id="5363" instrument_node=""> of the </span><a data-dcnode-id="5361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Committee_of_the_Communist_Party_of_the_Soviet_Union" title="Central Committee of the Communist Party of the Soviet Union"><span data-dcnode-id="5362" instrument_node="">Central Committee</span></a><span data-dcnode-id="5360" instrument_node=""> of the </span><a data-dcnode-id="5358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="5359" instrument_node="">Communist Party of the Soviet Union</span></a><span data-dcnode-id="5357" instrument_node=""> had been awaiting his death impatiently."</span><sup class="reference" data-dcnode-id="5354" id="cite_ref-FOOTNOTEHoxha198413–14_15-0"><a data-dcnode-id="5355" href="#cite_note-FOOTNOTEHoxha198413%E2%80%9314-15"><span data-dcnode-id="5356" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5353" instrument_node="">
</span></p><p data-dcnode-id="5335"><span data-dcnode-id="5351" instrument_node="">A meeting with Soviet leaders held in June that year further raised his suspicions about the intentions of the new leadership, as did a reduction in Soviet and Eastern Bloc aid to Albania in early-1954 as Soviet leader Nikita Khrushchev 'generally believed that the trade cost for the support of Albania did not generate enough return for soviet interests and their Strategic interests'.</span><sup class="reference" data-dcnode-id="5348" id="cite_ref-FOOTNOTEO'Donnell199938–39_16-0"><a data-dcnode-id="5349" href="#cite_note-FOOTNOTEO'Donnell199938%E2%80%9339-16"><span data-dcnode-id="5350" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5347" instrument_node=""> Reacting to early post-Stalin Soviet pressure on the East European countries to pursue economic and political reforms, Albania announced slight changes in planning priorities and some willingness to improve state relations with Yugoslavia as the Soviets were doing.</span><sup class="reference" data-dcnode-id="5344" id="cite_ref-FOOTNOTEPano1968113–114_17-0"><a data-dcnode-id="5345" href="#cite_note-FOOTNOTEPano1968113%E2%80%93114-17"><span data-dcnode-id="5346" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5343" instrument_node=""> There was also a reshuffling of political portfolios in line with the Soviet re-emphasis on the principle of </span><a data-dcnode-id="5341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_leadership" title="Collective leadership"><span data-dcnode-id="5342" instrument_node="">collective leadership</span></a><span data-dcnode-id="5340" instrument_node="">.</span><sup class="reference" data-dcnode-id="5337" id="cite_ref-FOOTNOTEPano1968113–114_17-1"><a data-dcnode-id="5338" href="#cite_note-FOOTNOTEPano1968113%E2%80%93114-17"><span data-dcnode-id="5339" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5336" instrument_node="">
</span></p><p data-dcnode-id="5333"><span data-dcnode-id="5334" instrument_node="">Hoxha regarded Soviet pressure as acting in the service of ulterior, revisionist aims in an effort to unseat or otherwise undermine "Stalinist" leaders. Thus in a meeting with Khrushchev on the issue of collective leadership, he recalled:
</span></p><span data-dcnode-id="5332" instrument_node="">
</span><blockquote class="templatequote" data-dcnode-id="5318"><p data-dcnode-id="5319"><span data-dcnode-id="5329" instrument_node="">Khrushchev told us that the other sister parties had been told of the Soviet "experience" of who should be first secretary of the party and who prime minister in the countries of people's democracy. "We talked over these questions with the Polish comrades before the congress of their party," Khrushchev told us. "We thrashed matters out thoroughly and thought that Comrade </span><a data-dcnode-id="5327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boles%25C5%2582aw_Bierut" title="Bolesław Bierut"><span data-dcnode-id="5328" instrument_node="">Bierut</span></a><span data-dcnode-id="5326" instrument_node=""> should remain chairman of the Council of Ministers and Comrade </span><a data-dcnode-id="5324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Edward_Ochab" title="Edward Ochab"><span data-dcnode-id="5325" instrument_node="">Ochab</span></a><span data-dcnode-id="5323" instrument_node=""> should be appointed first secretary of the party&nbsp;..." Hence, right from the start Khrushchev was for pushing Bierut aside in the leadership of the party&nbsp;... [the Soviets] were giving the green light for all the revisionist elements, who, up till yesterday, were wriggling and keeping a low profile, awaiting the opportune moments. Now these moments were being created by Khrushchev who, with his actions, stands and "new ideas", was becoming the inspirer and organizer of "changes" and "reorganizations".</span><sup class="reference" data-dcnode-id="5320" id="cite_ref-FOOTNOTEHoxha198438–39_18-0"><a data-dcnode-id="5321" href="#cite_note-FOOTNOTEHoxha198438%E2%80%9339-18"><span data-dcnode-id="5322" instrument_node="">[18]</span></a></sup></p></blockquote><span data-dcnode-id="5317" instrument_node="">
</span><h2 data-dcnode-id="5307"><span class="mw-headline" data-dcnode-id="5315" id="Beginnings_of_the_split"><span data-dcnode-id="5316" instrument_node="">Beginnings of the split</span></span><span class="mw-editsection" data-dcnode-id="5308"><span class="mw-editsection-bracket" data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">[</span></span><a data-dcnode-id="5311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D4" title="Edit section: Beginnings of the split"><span data-dcnode-id="5312" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5309"><span data-dcnode-id="5310" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5306" instrument_node="">
</span><p data-dcnode-id="5289"><span data-dcnode-id="5305" instrument_node="">Jon Halliday noted that Moscow and Tirana's relationship was observably good until late 1950s, but Khrushchev's rapprochement with Yugoslavia in 1955 and his denunciation of Stalin in 1956 were the two main issues responsible for the deterioration of relations between the two states.</span><sup class="reference" data-dcnode-id="5302" id="cite_ref-FOOTNOTEHalliday1986143_19-0"><a data-dcnode-id="5303" href="#cite_note-FOOTNOTEHalliday1986143-19"><span data-dcnode-id="5304" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5301" instrument_node=""> In June 1954, Khrushchev sent a letter to the leaders of the parties of the Eastern Bloc in which the Cominform resolutions denouncing Yugoslavia in the 1948–1949 period were criticised for allegedly forcing Tito and the rest of the Yugoslav leadership "into the arms of the United States and Great Britain and had led to Yugoslavia's </span><a data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Balkan_Pact_%281953%29" title="Balkan Pact (1953)"><span data-dcnode-id="5300" instrument_node="">conclusion of a military pact</span></a><span data-dcnode-id="5298" instrument_node=""> with two NATO members."</span><sup class="reference" data-dcnode-id="5295" id="cite_ref-FOOTNOTEKola2003113_20-0"><a data-dcnode-id="5296" href="#cite_note-FOOTNOTEKola2003113-20"><span data-dcnode-id="5297" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5294" instrument_node=""> Hoxha, however, disagreed with this view, later writing, "even if the Yugoslav leadership had been unjustly condemned in 1949, as Khrushchev was claiming, nothing could permit or justify its falling into the lap of imperialism."</span><sup class="reference" data-dcnode-id="5291" id="cite_ref-FOOTNOTEHoxha1984110–111_21-0"><a data-dcnode-id="5292" href="#cite_note-FOOTNOTEHoxha1984110%E2%80%93111-21"><span data-dcnode-id="5293" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5290" instrument_node="">
</span></p><p data-dcnode-id="5276"><span data-dcnode-id="5288" instrument_node="">In May 1955, Khrushchev led a Soviet delegation to the Yugoslav capital of Belgrade with the aim of </span><a data-dcnode-id="5286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Political_rehabilitation" title="Political rehabilitation"><span data-dcnode-id="5287" instrument_node="">rehabilitating</span></a><span data-dcnode-id="5285" instrument_node=""> Tito, a move which encouraged reformist and dissident trends in Eastern Europe.</span><sup class="reference" data-dcnode-id="5282" id="cite_ref-FOOTNOTELogoreci1977115–116_22-0"><a data-dcnode-id="5283" href="#cite_note-FOOTNOTELogoreci1977115%E2%80%93116-22"><span data-dcnode-id="5284" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5281" instrument_node=""> The Albanian government had received a letter two days before the Soviet delegation was to leave Moscow. The Soviets requested the Albanians approve a statement drawn up by Khrushchev in the name of the Information Bureau even though he had not convened it. The move was refused by the Albanians 'with reasoning that the Yugoslav leadership had had no change since its condemnation in 1948 by the communist and workers' parties represented on the Bureau'.</span><sup class="reference" data-dcnode-id="5278" id="cite_ref-FOOTNOTEAsh1974182_23-0"><a data-dcnode-id="5279" href="#cite_note-FOOTNOTEAsh1974182-23"><span data-dcnode-id="5280" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5277" instrument_node="">
</span></p><p data-dcnode-id="5266"><span data-dcnode-id="5275" instrument_node="">On May 25, the Central Committee of the Party of Labour sent a letter to its Soviet counterpart, stating among other things, "In our opinion such a hasty (and ill-considered) decision on an issue of great importance and of principle" was conducted "without first making a profound analysis together with all the parties interested in this issue."</span><sup class="reference" data-dcnode-id="5272" id="cite_ref-FOOTNOTEHoxha1984122_24-0"><a data-dcnode-id="5273" href="#cite_note-FOOTNOTEHoxha1984122-24"><span data-dcnode-id="5274" instrument_node="">[24]</span></a></sup><span data-dcnode-id="5271" instrument_node=""> With only Albania among the Eastern Bloc states opposing Khrushchev's move, the Soviets succeeded in unilaterally rehabilitating Tito's standing within the international communist movement and apologized for past Soviet activities in relation to Yugoslavia.</span><sup class="reference" data-dcnode-id="5268" id="cite_ref-FOOTNOTEKola2003114_25-0"><a data-dcnode-id="5269" href="#cite_note-FOOTNOTEKola2003114-25"><span data-dcnode-id="5270" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5267" instrument_node="">
</span></p><span data-dcnode-id="5265" instrument_node="">
</span><h3 data-dcnode-id="5255"><span class="mw-headline" data-dcnode-id="5263" id="20th_Congress_of_the_Communist_Party_of_the_Soviet_Union"><span data-dcnode-id="5264" instrument_node="">20th Congress of the Communist Party of the Soviet Union</span></span><span class="mw-editsection" data-dcnode-id="5256"><span class="mw-editsection-bracket" data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">[</span></span><a data-dcnode-id="5259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D5" title="Edit section: 20th Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="5260" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5254" instrument_node="">
</span><p data-dcnode-id="5249"><span data-dcnode-id="5253" instrument_node="">At the </span><a data-dcnode-id="5251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/20th_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="20th Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="5252" instrument_node="">20th Congress of the Communist Party of the Soviet Union</span></a><span data-dcnode-id="5250" instrument_node=""> in February 1956, Khrushchev issued—in addition to his main report—his "Secret Speech" denouncing Stalin. In addition to its attack on Stalin, Hoxha later stated about the Congress that:
</span></p><span data-dcnode-id="5248" instrument_node="">
</span><link data-dcnode-id="5247" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5241"><p data-dcnode-id="5242"><span data-dcnode-id="5246" instrument_node="">all the distortions of the major issues of principle, such as those about the character of our epoch, the roads of transition to socialism, peaceful coexistence, war and peace, the stand towards modern revisionism and towards imperialism, etc., etc., which later became the basis of the great, open polemic with modern revisionism, have their official beginning in Khrushchev's report to the 20th Congress&nbsp;... we saw how the Khrushchevites, in order to consolidate their power, operated allegedly with "a great party spirit", "free from the fear of Stalin"&nbsp;... Every good thing of the past was distorted, allegedly in light of the "new situations", "new developments", "new roads and possibilities", in order to go ahead.</span><sup class="reference" data-dcnode-id="5243" id="cite_ref-FOOTNOTEHoxha1984185–186_26-0"><a data-dcnode-id="5244" href="#cite_note-FOOTNOTEHoxha1984185%E2%80%93186-26"><span data-dcnode-id="5245" instrument_node="">[26]</span></a></sup></p></blockquote><span data-dcnode-id="5240" instrument_node="">
</span><p data-dcnode-id="5221"><span data-dcnode-id="5239" instrument_node="">A notable event at the Congress was the promotion of the policy of "peaceful coexistence" by Khrushchev, which officially was a policy to increase East–West collaboration against the threat of nuclear war, but which </span><a data-dcnode-id="5237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-revisionism" title="Anti-revisionism"><span data-dcnode-id="5238" instrument_node="">anti-revisionists</span></a><span data-dcnode-id="5236" instrument_node=""> believed to be a means to separate the world into influential provinces in which each side would occupy complete control.</span><sup class="reference" data-dcnode-id="5233" id="cite_ref-FOOTNOTEO'Donnell199942_27-0"><a data-dcnode-id="5234" href="#cite_note-FOOTNOTEO'Donnell199942-27"><span data-dcnode-id="5235" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5232" instrument_node=""> One anti-revisionist author described Khrushchev's policy as follows: "Khrushchev made it clear that he was prepared to give up international class struggle, renouncing on behalf of the colonial peoples any right to liberate themselves from oppression and reassuring capitalist governments by emphasising 'peaceful transition to socialism' or the Parliamentary road&nbsp;..." He then quoted Khrushchev as saying </span><span data-dcnode-id="5230" style="padding-right:.15em;"><span data-dcnode-id="5231" instrument_node="">"</span></span><span data-dcnode-id="5229" instrument_node="">'if any mad man wanted war, we [the Soviet Union and the United States], the two strongest countries in the world, would have but to shake our fingers to warn him off.</span><span data-dcnode-id="5227" style="padding-right:.15em;"><span data-dcnode-id="5228" instrument_node="">'</span></span><span data-dcnode-id="5226" instrument_node="">"</span><sup class="reference" data-dcnode-id="5223" id="cite_ref-FOOTNOTEAsh1974183–184_28-0"><a data-dcnode-id="5224" href="#cite_note-FOOTNOTEAsh1974183%E2%80%93184-28"><span data-dcnode-id="5225" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5222" instrument_node="">
</span></p><span data-dcnode-id="5220" instrument_node="">
</span><h3 data-dcnode-id="5210"><span class="mw-headline" data-dcnode-id="5218" id="Third_Congress_of_the_Party_of_Labour_of_Albania"><span data-dcnode-id="5219" instrument_node="">Third Congress of the Party of Labour of Albania</span></span><span class="mw-editsection" data-dcnode-id="5211"><span class="mw-editsection-bracket" data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node="">[</span></span><a data-dcnode-id="5214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D6" title="Edit section: Third Congress of the Party of Labour of Albania"><span data-dcnode-id="5215" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5212"><span data-dcnode-id="5213" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5209" instrument_node="">
</span><p data-dcnode-id="5181"><span data-dcnode-id="5208" instrument_node="">One of Tito's preconditions for improving relations with the Soviets was for a Soviet-backed removal of "Stalinist" leaders in Eastern Europe, such as </span><a data-dcnode-id="5206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/M%25C3%25A1ty%25C3%25A1s_R%25C3%25A1kosi" title="Mátyás Rákosi"><span data-dcnode-id="5207" instrument_node="">Mátyás Rákosi</span></a><span data-dcnode-id="5205" instrument_node=""> of Hungary and </span><a data-dcnode-id="5203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Valko_Chervenkov" title="Valko Chervenkov"><span data-dcnode-id="5204" instrument_node="">Valko Chervenkov</span></a><span data-dcnode-id="5202" instrument_node=""> of Bulgaria; Hoxha was also an obvious target for removal due to his intransigent position on Yugoslavia.</span><sup class="reference" data-dcnode-id="5199" id="cite_ref-FOOTNOTEGriffith196324_29-0"><a data-dcnode-id="5200" href="#cite_note-FOOTNOTEGriffith196324-29"><span data-dcnode-id="5201" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5198" instrument_node=""> The Soviets sought without success to force Hoxha to rehabilitate Koçi Xoxe.</span><sup class="reference" data-dcnode-id="5195" id="cite_ref-FOOTNOTEFreedman197061O'Donnell199940Vickers1999181_30-0"><a data-dcnode-id="5196" href="#cite_note-FOOTNOTEFreedman197061O'Donnell199940Vickers1999181-30"><span data-dcnode-id="5197" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5194" instrument_node=""> In April 1956, a party conference was held in Tirana: various delegates, inspired by Khrushchev's actions, attacked the line of the Party of Labour, calling for a review of the case of Xoxe along with other political and economic policies and phenomena.</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-FOOTNOTELogoreci1977119–120_31-0"><a data-dcnode-id="5192" href="#cite_note-FOOTNOTELogoreci1977119%E2%80%93120-31"><span data-dcnode-id="5193" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5190" instrument_node=""> However, Hoxha entered the conference and managed to defeat these proposals.</span><sup class="reference" data-dcnode-id="5187" id="cite_ref-FOOTNOTELogoreci1977119–120_31-1"><a data-dcnode-id="5188" href="#cite_note-FOOTNOTELogoreci1977119%E2%80%93120-31"><span data-dcnode-id="5189" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5186" instrument_node=""> The Third Congress of the Party of Labour was convened a month later, electing a Central Committee and Politburo "composed of staunch Hoxha loyalists" while also demonstrating "Hoxha's first public defiance of the Soviet Union" by refusing to rehabilitate Xoxe and other persons linked with, or otherwise supportive of, rapprochement with Yugoslavia.</span><sup class="reference" data-dcnode-id="5183" id="cite_ref-FOOTNOTEHeld199237_32-0"><a data-dcnode-id="5184" href="#cite_note-FOOTNOTEHeld199237-32"><span data-dcnode-id="5185" instrument_node="">[32]</span></a></sup><span data-dcnode-id="5182" instrument_node="">
</span></p><p data-dcnode-id="5175"><span data-dcnode-id="5180" instrument_node="">Although the Third Party Congress did not openly criticize the 20th Party Congress of the CPSU partly because "the real aims of [the Soviets] were still not fully recognized", and because of a perceived necessity to preserve the unity of the international communist movement, it did declare the line of the Party of Labour had been "followed [correctly] up to now", and thus tacitly rejected Khrushchev's de-Stalinization policies.</span><sup class="reference" data-dcnode-id="5177" id="cite_ref-FOOTNOTEOmariPollo1988165_33-0"><a data-dcnode-id="5178" href="#cite_note-FOOTNOTEOmariPollo1988165-33"><span data-dcnode-id="5179" instrument_node="">[33]</span></a></sup><span data-dcnode-id="5176" instrument_node="">
</span></p><p data-dcnode-id="5162"><span data-dcnode-id="5174" instrument_node="">Following the </span><a class="mw-redirect" data-dcnode-id="5172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Uprising_of_1956" title="Hungarian Uprising of 1956"><span data-dcnode-id="5173" instrument_node="">Hungarian Uprising</span></a><span data-dcnode-id="5171" instrument_node=""> in November 1956, relations between Albania and the Soviet Union improved somewhat due to Yugoslavia's part in the event, which caused friction in Yugoslav–Soviet relations. On November 7, Hoxha wrote an article for </span><i data-dcnode-id="5168"><a data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pravda" title="Pravda"><span data-dcnode-id="5170" instrument_node="">Pravda</span></a></i><span data-dcnode-id="5167" instrument_node=""> denouncing Tito for encouraging the activity of the rebels, though the Soviets rebuked Hoxha for his harsh tone soon after.</span><sup class="reference" data-dcnode-id="5164" id="cite_ref-FOOTNOTELogoreci1977122Freedman197062_34-0"><a data-dcnode-id="5165" href="#cite_note-FOOTNOTELogoreci1977122Freedman197062-34"><span data-dcnode-id="5166" instrument_node="">[34]</span></a></sup><span data-dcnode-id="5163" instrument_node=""> Soviet efforts to improve relations with Yugoslavia resumed before long, prompting a further deterioration in Soviet–Albanian relations.
</span></p><span data-dcnode-id="5161" instrument_node="">
</span><h3 data-dcnode-id="5151"><span class="mw-headline" data-dcnode-id="5159" id="Plenum_of_1957"><span data-dcnode-id="5160" instrument_node="">Plenum of 1957</span></span><span class="mw-editsection" data-dcnode-id="5152"><span class="mw-editsection-bracket" data-dcnode-id="5157"><span data-dcnode-id="5158" instrument_node="">[</span></span><a data-dcnode-id="5155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D7" title="Edit section: Plenum of 1957"><span data-dcnode-id="5156" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5153"><span data-dcnode-id="5154" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5150" instrument_node="">
</span><p data-dcnode-id="5133"><span data-dcnode-id="5149" instrument_node="">In a February 1957 speech to a </span><a data-dcnode-id="5147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plenary_session" title="Plenary session"><span data-dcnode-id="5148" instrument_node="">plenum</span></a><span data-dcnode-id="5146" instrument_node=""> of the Central Committee of the Party subsequently published in the newspaper </span><i data-dcnode-id="5143"><a data-dcnode-id="5144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Z%25C3%25ABri_i_Popullit" title="Zëri i Popullit"><span data-dcnode-id="5145" instrument_node="">Zëri i Popullit</span></a></i><span data-dcnode-id="5142" instrument_node="">, Hoxha defended Stalin's legacy and attacked the Yugoslavs&nbsp;– but not the Soviet leadership by name.</span><sup class="reference" data-dcnode-id="5139" id="cite_ref-FOOTNOTEHoxha1975691_35-0"><a data-dcnode-id="5140" href="#cite_note-FOOTNOTEHoxha1975691-35"><span data-dcnode-id="5141" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5138" instrument_node=""> He added that, "In blackening Stalin, the enemies are not concerned about him as a person, but their aim is to discredit the Soviet Union, the socialist system, and the international communist movement, consequently, to undermine the workers' faith in socialism."</span><sup class="reference" data-dcnode-id="5135" id="cite_ref-FOOTNOTEHoxha1975691_35-1"><a data-dcnode-id="5136" href="#cite_note-FOOTNOTEHoxha1975691-35"><span data-dcnode-id="5137" instrument_node="">[35]</span></a></sup><span data-dcnode-id="5134" instrument_node="">
</span></p><p data-dcnode-id="5127"><span data-dcnode-id="5132" instrument_node="">As a result of the February plenum of 1957, which was seen as directly rebuffing many post-Stalin Soviet views, the Soviet leadership invited Hoxha to visit Moscow in April that year allegedly for consultations. Instead, Khrushchev called on Hoxha to rehabilitate and reinstate party members who had been sacked for their support of Yugoslavia and the theses of the 20th Party Congress; Hoxha refused. In response to this Khrushchev accused Hoxha of sectarianism and of being "hell-bent on pursuing Stalinist policies."</span><sup class="reference" data-dcnode-id="5129" id="cite_ref-FOOTNOTELogoreci1977123_36-0"><a data-dcnode-id="5130" href="#cite_note-FOOTNOTELogoreci1977123-36"><span data-dcnode-id="5131" instrument_node="">[36]</span></a></sup><span data-dcnode-id="5128" instrument_node="">
</span></p><p data-dcnode-id="5125"><span data-dcnode-id="5126" instrument_node="">Hoxha later recalled the meeting as follows: Khrushchev advised the Albanians to improve their relations with Yugoslavia, to which Hoxha replied, "We have always wanted to have good relations with Yugoslavia, but to put it bluntly, we do not trust the Yugoslav leaders, because they speak against the social system in our countries and are opposed to the foundations of Marxism–Leninism. In all their propaganda, they do not say one word against imperialism, on the contrary, [they] have joined the chorus of the Western powers against us."
</span></p><p data-dcnode-id="5119"><span data-dcnode-id="5124" instrument_node="">He once more said that the Yugoslav leadership failed to understand "any of its grave mistakes and deviations," to which Khrushchev replied that Yugoslavia did not betray Marxism–Leninism though it had "slipped" from its positions. "According to you," Khrushchev continued, "we ought to return to what Stalin did, which caused all these things we know about." The meeting became increasingly acrimonious and when the subject of rehabilitating disgraced Albanian politicians came up Khrushchev eventually concluded, "You are like Stalin who killed people," to which Hoxha replied, "Stalin killed traitors, and we kill them, too."</span><sup class="reference" data-dcnode-id="5121" id="cite_ref-FOOTNOTEHoxha1984364–365,_374_37-0"><a data-dcnode-id="5122" href="#cite_note-FOOTNOTEHoxha1984364%E2%80%93365,_374-37"><span data-dcnode-id="5123" instrument_node="">[37]</span></a></sup><span data-dcnode-id="5120" instrument_node="">
</span></p><span data-dcnode-id="5118" instrument_node="">
</span><h3 data-dcnode-id="5108"><span class="mw-headline" data-dcnode-id="5116" id="Trade"><span data-dcnode-id="5117" instrument_node="">Trade</span></span><span class="mw-editsection" data-dcnode-id="5109"><span class="mw-editsection-bracket" data-dcnode-id="5114"><span data-dcnode-id="5115" instrument_node="">[</span></span><a data-dcnode-id="5112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D8" title="Edit section: Trade"><span data-dcnode-id="5113" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5110"><span data-dcnode-id="5111" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5107" instrument_node="">
</span><p data-dcnode-id="5087"><span data-dcnode-id="5106" instrument_node="">In an effort to persuade the Albanian leadership to reconcile itself with the Soviets, the USSR gave a credit of $160&nbsp;million </span><a data-dcnode-id="5104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_ruble" title="Soviet ruble"><span data-dcnode-id="5105" instrument_node="">ruble</span></a><span data-dcnode-id="5103" instrument_node=""> loan to Albania in late-1957 for Albania's Third Five-Year Plan and among other things forgave $105&nbsp;million in past debts Albania owed the Soviet Union. These efforts proved unsuccessful in persuading the Albanians to change their course.</span><sup class="reference" data-dcnode-id="5100" id="cite_ref-FOOTNOTELogoreci1977123Vickers1999183_38-0"><a data-dcnode-id="5101" href="#cite_note-FOOTNOTELogoreci1977123Vickers1999183-38"><span data-dcnode-id="5102" instrument_node="">[38]</span></a></sup><span data-dcnode-id="5099" instrument_node=""> James S. O'Donnell observed that the Soviets, then in an early stage of the Sino-Soviet split, may have also tried to demonstrate Soviet "generosity" in an effort to counteract the amount of trade Albania was conducting with the </span><a class="mw-redirect" data-dcnode-id="5097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_China" title="People's Republic of China"><span data-dcnode-id="5098" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="5096" instrument_node="">.</span><sup class="reference" data-dcnode-id="5093" id="cite_ref-FOOTNOTEO'Donnell199944_39-0"><a data-dcnode-id="5094" href="#cite_note-FOOTNOTEO'Donnell199944-39"><span data-dcnode-id="5095" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5092" instrument_node=""> Albania's passive trade balance with China had grown from 4.2&nbsp;percent in 1955 to 21.6&nbsp;percent in 1957.</span><sup class="reference" data-dcnode-id="5089" id="cite_ref-FOOTNOTEO'Donnell199944_39-1"><a data-dcnode-id="5090" href="#cite_note-FOOTNOTEO'Donnell199944-39"><span data-dcnode-id="5091" instrument_node="">[39]</span></a></sup><span data-dcnode-id="5088" instrument_node="">
</span></p><span data-dcnode-id="5086" instrument_node="">
</span><h3 data-dcnode-id="5076"><span class="mw-headline" data-dcnode-id="5084" id="Moscow_Conference"><span data-dcnode-id="5085" instrument_node="">Moscow Conference</span></span><span class="mw-editsection" data-dcnode-id="5077"><span class="mw-editsection-bracket" data-dcnode-id="5082"><span data-dcnode-id="5083" instrument_node="">[</span></span><a data-dcnode-id="5080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D9" title="Edit section: Moscow Conference"><span data-dcnode-id="5081" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5078"><span data-dcnode-id="5079" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5075" instrument_node="">
</span><p data-dcnode-id="5066"><span data-dcnode-id="5074" instrument_node="">Relations between the Soviet Union and Yugoslavia deteriorated further following Tito's refusal to attend the </span><a class="mw-redirect" data-dcnode-id="5072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1957_International_Conference_of_the_Communist_and_Workers%2527_Parties" title="1957 International Conference of the Communist and Workers' Parties"><span data-dcnode-id="5073" instrument_node="">1957 International Conference of the Communist and Workers' Parties</span></a><span data-dcnode-id="5071" instrument_node="">, the goal of which was to establish the general line and common positions of the international communist movement.</span><sup class="reference" data-dcnode-id="5068" id="cite_ref-FOOTNOTEO'Donnell199945_40-0"><a data-dcnode-id="5069" href="#cite_note-FOOTNOTEO'Donnell199945-40"><span data-dcnode-id="5070" instrument_node="">[40]</span></a></sup><span data-dcnode-id="5067" instrument_node=""> As Hoxha later wrote:
</span></p><span data-dcnode-id="5065" instrument_node="">
</span><link data-dcnode-id="5064" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="5055"><p data-dcnode-id="5056"><span data-dcnode-id="5063" instrument_node="">Khrushchev and Co. made feverish efforts not only to ensure that the </span><a data-dcnode-id="5061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Communists_of_Yugoslavia" title="League of Communists of Yugoslavia"><span data-dcnode-id="5062" instrument_node="">League of Communists of Yugoslavia</span></a><span data-dcnode-id="5060" instrument_node=""> would take part as a "party of a socialist country", but if possible also, to ensure that Tito would reach agreement with Khrushchev over the platform&nbsp;... Each side wanted to exploit the meeting for its own aims: Khrushchev, to declare "unity", even with painful concessions to satisfy and draw in Tito, while the latter, to urge the others to openly and finally abandon Marxism–Leninism, the struggle against modern revisionism and any principled stand.</span><sup class="reference" data-dcnode-id="5057" id="cite_ref-FOOTNOTEHoxha1984334–335_41-0"><a data-dcnode-id="5058" href="#cite_note-FOOTNOTEHoxha1984334%E2%80%93335-41"><span data-dcnode-id="5059" instrument_node="">[41]</span></a></sup></p></blockquote><span data-dcnode-id="5054" instrument_node="">
</span><p data-dcnode-id="5044"><span data-dcnode-id="5053" instrument_node="">The Albanian delegation led by Hoxha worked with the Chinese and other like-minded delegations to the Conference in drafting a declaration alongside the CPSU and the pro–Soviet parties, with the resulting document being described by some Western observers as a compromise; historian William E. Griffith wrote that "the statement leaned strongly toward the Russian position but usually was sufficiently ambiguous so that the Chinese and Albanians could (and did) interpret it in their favor."</span><sup class="reference" data-dcnode-id="5050" id="cite_ref-FOOTNOTEGriffith196357–59_42-0"><a data-dcnode-id="5051" href="#cite_note-FOOTNOTEGriffith196357%E2%80%9359-42"><span data-dcnode-id="5052" instrument_node="">[42]</span></a></sup><span data-dcnode-id="5049" instrument_node=""> In a notable example, the Albanian and Chinese view that revisionism was the "principal danger in the communist world" existed alongside the Soviet view that the 20th Party Congress "opened a new stage in the international communist movement," but despite this the declaration was considered overall by both Albania and China as an ideological victory.</span><sup class="reference" data-dcnode-id="5046" id="cite_ref-FOOTNOTEAsh1974192–193_43-0"><a data-dcnode-id="5047" href="#cite_note-FOOTNOTEAsh1974192%E2%80%93193-43"><span data-dcnode-id="5048" instrument_node="">[43]</span></a></sup><span data-dcnode-id="5045" instrument_node="">
</span></p><p data-dcnode-id="5034"><span data-dcnode-id="5043" instrument_node="">In Hoxha's view, "The whole concern of the Soviet Khrushchevites was 'to preserve unity', to keep the socialist countries and the communist parties of different countries in check&nbsp;... They retreated, held back temporarily, in order to gather strength and take their revisionist revenge in the future."</span><sup class="reference" data-dcnode-id="5040" id="cite_ref-FOOTNOTEHoxha1984344–345_44-0"><a data-dcnode-id="5041" href="#cite_note-FOOTNOTEHoxha1984344%E2%80%93345-44"><span data-dcnode-id="5042" instrument_node="">[44]</span></a></sup><span data-dcnode-id="5039" instrument_node=""> O'Donnell states that after the Moscow Conference any trouble in Soviet–Albanian relations "was kept strictly private" until June 1960.</span><sup class="reference" data-dcnode-id="5036" id="cite_ref-FOOTNOTEO'Donnell199946_45-0"><a data-dcnode-id="5037" href="#cite_note-FOOTNOTEO'Donnell199946-45"><span data-dcnode-id="5038" instrument_node="">[45]</span></a></sup><span data-dcnode-id="5035" instrument_node="">
</span></p><span data-dcnode-id="5033" instrument_node="">
</span><h2 data-dcnode-id="5023"><span class="mw-headline" data-dcnode-id="5031" id="Split_deepens"><span data-dcnode-id="5032" instrument_node="">Split deepens</span></span><span class="mw-editsection" data-dcnode-id="5024"><span class="mw-editsection-bracket" data-dcnode-id="5029"><span data-dcnode-id="5030" instrument_node="">[</span></span><a data-dcnode-id="5027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D10" title="Edit section: Split deepens"><span data-dcnode-id="5028" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5025"><span data-dcnode-id="5026" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5022" instrument_node="">
</span><p data-dcnode-id="5012"><span data-dcnode-id="5021" instrument_node="">At the end of 1958, Comecon had begun to push for what was later termed an "international socialist division of labor," in which Albania was relegated to "the task of supplying the member states with agricultural and mineral raw materials."</span><sup class="reference" data-dcnode-id="5018" id="cite_ref-FOOTNOTEPano1968130–131_46-0"><a data-dcnode-id="5019" href="#cite_note-FOOTNOTEPano1968130%E2%80%93131-46"><span data-dcnode-id="5020" instrument_node="">[46]</span></a></sup><span data-dcnode-id="5017" instrument_node=""> In May 1959, Khrushchev paid a visit to Albania with the aim of pressuring Albania's leadership into building up Yugoslav–Albanian and Soviet–Albanian ties and also to, in the words of historian Miranda Vickers, "focus their economy on the growing of citrus fruits rather than concentrate on industrialization and the expansion of their oil industry&nbsp;... Khrushchev's visit was clouded by an atmosphere of mistrust, which culminated in a hurried departure two days earlier than scheduled."</span><sup class="reference" data-dcnode-id="5014" id="cite_ref-FOOTNOTEVickers1999184_47-0"><a data-dcnode-id="5015" href="#cite_note-FOOTNOTEVickers1999184-47"><span data-dcnode-id="5016" instrument_node="">[47]</span></a></sup><span data-dcnode-id="5013" instrument_node="">
</span></p><p data-dcnode-id="4992"><span data-dcnode-id="5011" instrument_node="">According to Hoxha, Khrushchev displayed contempt for Albanian archaeology in </span><a data-dcnode-id="5009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Butrint" title="Butrint"><span data-dcnode-id="5010" instrument_node="">Butrint</span></a><span data-dcnode-id="5008" instrument_node=""> and said to </span><a data-dcnode-id="5006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rodion_Malinovsky" title="Rodion Malinovsky"><span data-dcnode-id="5007" instrument_node="">Rodion Malinovsky</span></a><span data-dcnode-id="5005" instrument_node="">, the Soviet Defense Minister who was visiting the country with him, "Look, how marvelous this is! An ideal base for our submarines could be built here. These old things [reference to archaeological findings] should be dug up and thrown into the sea&nbsp;... We shall have the most ideal and most secure base in the Mediterranean. From here we can paralyze and attack everything."</span><sup class="reference" data-dcnode-id="5002" id="cite_ref-FOOTNOTEHoxha1984385_48-0"><a data-dcnode-id="5003" href="#cite_note-FOOTNOTEHoxha1984385-48"><span data-dcnode-id="5004" instrument_node="">[48]</span></a></sup><span data-dcnode-id="5001" instrument_node=""> He was also said to have remarked to Hoxha to turn his country "into a flourishing garden," suggested he make it an attractive holiday spot for Soviet tourists, and rather than produce grain, Albania should focus on growing oranges for export.</span><sup class="reference" data-dcnode-id="4998" id="cite_ref-FOOTNOTEAsh1974195_49-0"><a data-dcnode-id="4999" href="#cite_note-FOOTNOTEAsh1974195-49"><span data-dcnode-id="5000" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4997" instrument_node=""> Khrushchev allegedly said, "The Soviet Union has such an abundance of grain that the mice eat more than you can produce here."</span><sup class="reference" data-dcnode-id="4994" id="cite_ref-FOOTNOTEAsh1974195_49-1"><a data-dcnode-id="4995" href="#cite_note-FOOTNOTEAsh1974195-49"><span data-dcnode-id="4996" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4993" instrument_node="">
</span></p><p data-dcnode-id="4982"><span data-dcnode-id="4991" instrument_node="">By the beginning of 1960, Albania and China had concurred "on such questions as Yugoslav revisionism, global strategy, and de-Stalinization", and the Albanian leadership made "little secret of their sympathies for the Chinese stand."</span><sup class="reference" data-dcnode-id="4988" id="cite_ref-FOOTNOTEPano1968134_50-0"><a data-dcnode-id="4989" href="#cite_note-FOOTNOTEPano1968134-50"><span data-dcnode-id="4990" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4987" instrument_node=""> With the Sino-Soviet split also deepening the Soviet leadership began applying its first signs of economic pressure on Albania in March 1960, stating its intention to alter a scholarship agreement for Albanians to study in the USSR in which the Soviets paid 60&nbsp;percent of tuition costs and upkeep for the students. This threat was subsequently retracted on the eve of the Bucharest Conference in June that year, possibly in an attempt not to push Albania further into the Chinese orbit.</span><sup class="reference" data-dcnode-id="4984" id="cite_ref-FOOTNOTEFreedman197071_51-0"><a data-dcnode-id="4985" href="#cite_note-FOOTNOTEFreedman197071-51"><span data-dcnode-id="4986" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4983" instrument_node="">
</span></p><p data-dcnode-id="4963"><span data-dcnode-id="4981" instrument_node="">Early in June, Khrushchev met with Greek politician </span><a class="mw-redirect" data-dcnode-id="4979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sophocles_Venizelos" title="Sophocles Venizelos"><span data-dcnode-id="4980" instrument_node="">Sophocles Venizelos</span></a><span data-dcnode-id="4978" instrument_node=""> and reacted positively to the latter's suggestion of greater autonomy for </span><a data-dcnode-id="4976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greeks_in_Albania" title="Greeks in Albania"><span data-dcnode-id="4977" instrument_node="">Greeks in Albania</span></a><span data-dcnode-id="4975" instrument_node="">. O'Donnell comments: "The obvious purpose of this discussion was to infuriate Enver Hoxha as Albanian–Greek relations were strained at this time. It became known that Khrushchev had hinted to Venizelos that the Soviet Union would not be against territorial and/or </span><a data-dcnode-id="4973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Concession_%28politics%29" title="Concession (politics)"><span data-dcnode-id="4974" instrument_node="">political concessions</span></a><span data-dcnode-id="4972" instrument_node=""> to the Greeks by the Albanians&nbsp;... It is likely that Khrushchev used the meeting with Venizelos as a way to pay back Hoxha for snubbing him during his visit to Albania."</span><sup class="reference" data-dcnode-id="4969" id="cite_ref-FOOTNOTEO'Donnell199946_45-1"><a data-dcnode-id="4970" href="#cite_note-FOOTNOTEO'Donnell199946-45"><span data-dcnode-id="4971" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4968" instrument_node=""> Griffith added: "Hoxha viewed this move by Khrushchev as an implicit threat to partition Albania – the overwhelming traditional fear of all Albanian nationalists."</span><sup class="reference" data-dcnode-id="4965" id="cite_ref-FOOTNOTEGriffith196340_52-0"><a data-dcnode-id="4966" href="#cite_note-FOOTNOTEGriffith196340-52"><span data-dcnode-id="4967" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4964" instrument_node="">
</span></p><span data-dcnode-id="4962" instrument_node="">
</span><h3 data-dcnode-id="4952"><span class="mw-headline" data-dcnode-id="4960" id="Bucharest_Conference"><span data-dcnode-id="4961" instrument_node="">Bucharest Conference</span></span><span class="mw-editsection" data-dcnode-id="4953"><span class="mw-editsection-bracket" data-dcnode-id="4958"><span data-dcnode-id="4959" instrument_node="">[</span></span><a data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D11" title="Edit section: Bucharest Conference"><span data-dcnode-id="4957" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4951" instrument_node="">
</span><p data-dcnode-id="4929"><span data-dcnode-id="4950" instrument_node="">At the opening of the Bucharest Conference on June 21, 1960, which was held on the occasion of the Third Congress of the </span><a class="mw-redirect" data-dcnode-id="4948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Romanian_Workers%2527_Party" title="Romanian Workers' Party"><span data-dcnode-id="4949" instrument_node="">Romanian Workers' Party</span></a><span data-dcnode-id="4947" instrument_node="">, Hoxha was not among the various heads of </span><a class="mw-redirect" data-dcnode-id="4945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_parties" title="Communist parties"><span data-dcnode-id="4946" instrument_node="">communist parties</span></a><span data-dcnode-id="4944" instrument_node=""> and </span><a data-dcnode-id="4942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_state" title="Communist state"><span data-dcnode-id="4943" instrument_node="">states</span></a><span data-dcnode-id="4941" instrument_node=""> in attendance; Politburo member </span><a data-dcnode-id="4939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hysni_Kapo" title="Hysni Kapo"><span data-dcnode-id="4940" instrument_node="">Hysni Kapo</span></a><span data-dcnode-id="4938" instrument_node=""> took his place.</span><sup class="reference" data-dcnode-id="4935" id="cite_ref-FOOTNOTEO'Donnell199946–47_53-0"><a data-dcnode-id="4936" href="#cite_note-FOOTNOTEO'Donnell199946%E2%80%9347-53"><span data-dcnode-id="4937" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4934" instrument_node=""> The stated purpose of the Conference was to have "the character of a preliminary meeting of the representatives of the communist and workers' parties, mainly for the purpose of 'exchanging opinions' and taking a joint decision on the date and place of a future meeting of the communist and workers' parties of the world."</span><sup class="reference" data-dcnode-id="4931" id="cite_ref-FOOTNOTEOmariPollo1988201_54-0"><a data-dcnode-id="4932" href="#cite_note-FOOTNOTEOmariPollo1988201-54"><span data-dcnode-id="4933" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4930" instrument_node="">
</span></p><p data-dcnode-id="4923"><span data-dcnode-id="4928" instrument_node="">In his memoirs Hoxha describes the Conference as being a "putsch" and adds, "The revisionist renegades needed another meeting of international communism to gain approval for their old plan for the final legitimization of modern revisionism," he did not attend because "[we] suspected that the problem of the differences which had emerged between China and the Soviet Union would be discussed&nbsp;... we had heard only one side of the argument, the Soviet side, and we were not acquainted with the objections of the Chinese&nbsp;... They had to be thrashed out thoroughly, they had to be studied carefully, and time was required for this. Therefore our Party sent Comrade Hysni Kapo to Bucharest to discuss only the date of the future meeting," for decisions besides this date were not to be taken at the Conference itself.</span><sup class="reference" data-dcnode-id="4925" id="cite_ref-FOOTNOTEHoxha1984394,_400–401_55-0"><a data-dcnode-id="4926" href="#cite_note-FOOTNOTEHoxha1984394,_400%E2%80%93401-55"><span data-dcnode-id="4927" instrument_node="">[55]</span></a></sup><span data-dcnode-id="4924" instrument_node="">
</span></p><p data-dcnode-id="4917"><span data-dcnode-id="4922" instrument_node="">In the words of Nicholas C. Pano, "Khrushchev attempted to transform the Bucharest Conference into a communist summit meeting for the purpose of securing the condemnation of the Chinese" with Kapo being the only representative of a European party "to refrain from criticizing Peking, to attack Yugoslav revisionism, and to refuse to alter his stand on the Chinese and Yugoslav issues despite Soviet pressure. Khrushchev's hopes of bringing the Albanians to heel by means of peaceful persuasion were certainly shattered by the time the Bucharest Conference had come to an end."</span><sup class="reference" data-dcnode-id="4919" id="cite_ref-FOOTNOTEPano1968136_56-0"><a data-dcnode-id="4920" href="#cite_note-FOOTNOTEPano1968136-56"><span data-dcnode-id="4921" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4918" instrument_node="">
</span></p><p data-dcnode-id="4911"><span data-dcnode-id="4916" instrument_node="">During the Conference Hoxha communicated with Kapo via radiogram, stating for instance on June 24, in response to a lengthy document distributed at the Conference by the Soviets attacking the Chinese, "When you make your speech at the meeting you should declare: 'I am not authorized to make statements on these matters because our leadership knows that these matters will be discussed at the forthcoming Meeting of representatives of the parties, as we have all agreed.'&nbsp;... We understand your difficult situation, but don't worry at all, for we are on the right road."</span><sup class="reference" data-dcnode-id="4913" id="cite_ref-FOOTNOTEHoxha197615–16_57-0"><a data-dcnode-id="4914" href="#cite_note-FOOTNOTEHoxha197615%E2%80%9316-57"><span data-dcnode-id="4915" instrument_node="">[57]</span></a></sup><span data-dcnode-id="4912" instrument_node="">
</span></p><span data-dcnode-id="4910" instrument_node="">
</span><h3 data-dcnode-id="4900"><span class="mw-headline" data-dcnode-id="4908" id="Hostilities"><span data-dcnode-id="4909" instrument_node="">Hostilities</span></span><span class="mw-editsection" data-dcnode-id="4901"><span class="mw-editsection-bracket" data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">[</span></span><a data-dcnode-id="4904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D12" title="Edit section: Hostilities"><span data-dcnode-id="4905" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4902"><span data-dcnode-id="4903" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4899" instrument_node="">
</span><p data-dcnode-id="4893"><span data-dcnode-id="4898" instrument_node="">After the Conference ended, Khrushchev stepped up economic pressure on Albania, delaying a reply concerning 50,000&nbsp;tons of requested grain to offset an acute food shortage caused by drought, and then issuing significant reductions in the amount of grain shipments.</span><sup class="reference" data-dcnode-id="4895" id="cite_ref-FOOTNOTEFreedman197061O'Donnell199972O'Donnell199947Pano1968137_58-0"><a data-dcnode-id="4896" href="#cite_note-FOOTNOTEFreedman197061O'Donnell199972O'Donnell199947Pano1968137-58"><span data-dcnode-id="4897" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4894" instrument_node=""> According to an Albanian account, the Soviet Union:
</span></p><span data-dcnode-id="4892" instrument_node="">
</span><link data-dcnode-id="4891" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4885"><p data-dcnode-id="4886"><span data-dcnode-id="4890" instrument_node="">cut systematically all economic aid to Albania. It delayed and in some cases ceased altogether the delivery of goods and industrial equipment to Albania, refused to ship the grain our people were in urgent need of&nbsp;... sell[ing it] not through clearing but in free currency&nbsp;... stopped all supplies for the Albanian People's Army, from food and clothing to weapons and technical equipment whose delivery had been approved by the Joint Command of the Warsaw Treaty. The countries of Eastern Europe, too, set out on the course of aggravating relations with the PRA [People's Republic of Albania] and created a difficult situation by setting up a blockade on Albania jointly with the Soviet government.</span><sup class="reference" data-dcnode-id="4887" id="cite_ref-FOOTNOTEOmariPollo1988203–204_59-0"><a data-dcnode-id="4888" href="#cite_note-FOOTNOTEOmariPollo1988203%E2%80%93204-59"><span data-dcnode-id="4889" instrument_node="">[59]</span></a></sup></p></blockquote><span data-dcnode-id="4884" instrument_node="">
