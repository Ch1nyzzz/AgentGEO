</span><p data-dcnode-id="4857"><span data-dcnode-id="4883" instrument_node="">The Soviets also attempted to threaten the Albanians with force; </span><a data-dcnode-id="4881" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrei_Grechko" title="Andrei Grechko"><span data-dcnode-id="4882" instrument_node="">Andrei Grechko</span></a><span data-dcnode-id="4880" instrument_node="">, then </span><a class="mw-redirect" data-dcnode-id="4878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supreme_Commander_%28Warsaw_Pact%29" title="Supreme Commander (Warsaw Pact)"><span data-dcnode-id="4879" instrument_node="">Supreme Commander of the Warsaw Treaty forces</span></a><span data-dcnode-id="4877" instrument_node="">, remarked to an Albanian military delegation that they would not get military equipment agreed upon beforehand, saying, "You are only in the Warsaw Pact for the time being, anyway."</span><sup class="reference" data-dcnode-id="4874" id="cite_ref-FOOTNOTEAsh1974197_60-0"><a data-dcnode-id="4875" href="#cite_note-FOOTNOTEAsh1974197-60"><span data-dcnode-id="4876" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4873" instrument_node=""> Attempts were made to inoculate anti-government views in Albanian students studying abroad in the USSR and to convince the armed forces to go against the government.</span><sup class="reference" data-dcnode-id="4870" id="cite_ref-FOOTNOTELogoreci1977127_61-0"><a data-dcnode-id="4871" href="#cite_note-FOOTNOTELogoreci1977127-61"><span data-dcnode-id="4872" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4869" instrument_node=""> According to an Albanian account, the Soviet embassy in Albania also "carried out intensive diversionist activity in order to create an atmosphere of uncertainty and ideological confusion about the correct line of the PLA [Party of Labour of Albania]."</span><sup class="reference" data-dcnode-id="4866" id="cite_ref-FOOTNOTEOmariPollo1988202_62-0"><a data-dcnode-id="4867" href="#cite_note-FOOTNOTEOmariPollo1988202-62"><span data-dcnode-id="4868" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4865" instrument_node=""> In July, a military plot headed by Soviet-trained Rear Admiral </span><a data-dcnode-id="4863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Teme_Sejko" title="Teme Sejko"><span data-dcnode-id="4864" instrument_node="">Teme Sejko</span></a><span data-dcnode-id="4862" instrument_node=""> was uncovered and the plotters executed.</span><sup class="reference" data-dcnode-id="4859" id="cite_ref-FOOTNOTEO'Donnell199947–48Pano1968137–138_63-0"><a data-dcnode-id="4860" href="#cite_note-FOOTNOTEO'Donnell199947%E2%80%9348Pano1968137%E2%80%93138-63"><span data-dcnode-id="4861" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4858" instrument_node="">
</span></p><span data-dcnode-id="4856" instrument_node="">
</span><h3 data-dcnode-id="4845"><span data-dcnode-id="4855" id="Pro.E2.80.93Soviet_faction_in_Albania"></span><span class="mw-headline" data-dcnode-id="4853" id="Pro–Soviet_faction_in_Albania"><span data-dcnode-id="4854" instrument_node="">Pro–Soviet faction in Albania</span></span><span class="mw-editsection" data-dcnode-id="4846"><span class="mw-editsection-bracket" data-dcnode-id="4851"><span data-dcnode-id="4852" instrument_node="">[</span></span><a data-dcnode-id="4849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D13" title="Edit section: Pro–Soviet faction in Albania"><span data-dcnode-id="4850" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4847"><span data-dcnode-id="4848" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4844" instrument_node="">
</span><p data-dcnode-id="4832"><span data-dcnode-id="4843" instrument_node="">Within the Party itself an effort was also made by pro–Soviet elements to overthrow Hoxha. In June, Politburo member </span><a data-dcnode-id="4841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liri_Belishova" title="Liri Belishova"><span data-dcnode-id="4842" instrument_node="">Liri Belishova</span></a><span data-dcnode-id="4840" instrument_node=""> visited China, giving a speech on June&nbsp;6 which, in the words of Griffith, "could hardly have made her pro–Soviet sympathies clearer," having been full of praise for the Soviet Union, with said praise being omitted when the text was published the day after in the Party newspaper </span><i data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">Zëri i Popullit</span></i><span data-dcnode-id="4837" instrument_node="">.</span><sup class="reference" data-dcnode-id="4834" id="cite_ref-FOOTNOTEGriffith196338–39_64-0"><a data-dcnode-id="4835" href="#cite_note-FOOTNOTEGriffith196338%E2%80%9339-64"><span data-dcnode-id="4836" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4833" instrument_node="">
</span></p><p data-dcnode-id="4819"><span data-dcnode-id="4831" instrument_node="">While in China Belishova made contact with the Soviet embassy there, telling them what the Chinese had told her without authorization from the Albanian Politburo.</span><sup class="reference" data-dcnode-id="4828" id="cite_ref-FOOTNOTEHoxha197692–93_65-0"><a data-dcnode-id="4829" href="#cite_note-FOOTNOTEHoxha197692%E2%80%9393-65"><span data-dcnode-id="4830" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4827" instrument_node=""> Belishova and Koço Tashko, Chairman of the Central Auditing Committee, shared leadership of the pro–Soviet faction. Foreign journalist Harry Hamm was told by Albanian functionaries that "Belishova and Tashko had never made any secret of their pro–Soviet leanings, and that they had maintained their attitude long after the decision had been made to move closer to </span><a data-dcnode-id="4825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beijing" title="Beijing"><span data-dcnode-id="4826" instrument_node="">Peking</span></a><span data-dcnode-id="4824" instrument_node="">'s general line. Their stubborn attitude was bound to lead to their expulsion from the Party and to their being relieved of all their offices."</span><sup class="reference" data-dcnode-id="4821" id="cite_ref-FOOTNOTEHamm196314_66-0"><a data-dcnode-id="4822" href="#cite_note-FOOTNOTEHamm196314-66"><span data-dcnode-id="4823" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4820" instrument_node="">
</span></p><p data-dcnode-id="4806"><span data-dcnode-id="4818" instrument_node="">Tashko, asked to speak on his own behalf, had his text prepared beforehand by the Soviet embassy and, having gotten confused, accidentally read the punctuation mark for a </span><a data-dcnode-id="4816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_stop" title="Full stop"><span data-dcnode-id="4817" instrument_node="">full stop</span></a><span data-dcnode-id="4815" instrument_node=""> in Russian amid a burst of laughter from those present.</span><sup class="reference" data-dcnode-id="4812" id="cite_ref-FOOTNOTEO'Donnell199948Hoxha1976109–110_67-0"><a data-dcnode-id="4813" href="#cite_note-FOOTNOTEO'Donnell199948Hoxha1976109%E2%80%93110-67"><span data-dcnode-id="4814" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4811" instrument_node=""> Both Belishova and Tashko were expelled from the Party in September.</span><sup class="reference" data-dcnode-id="4808" id="cite_ref-FOOTNOTEPano1968137_68-0"><a data-dcnode-id="4809" href="#cite_note-FOOTNOTEPano1968137-68"><span data-dcnode-id="4810" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4807" instrument_node="">
</span></p><span data-dcnode-id="4805" instrument_node="">
</span><h3 data-dcnode-id="4794"><span data-dcnode-id="4804" id="International_Conference_of_the_Communist_and_Workers.27_Parties"></span><span class="mw-headline" data-dcnode-id="4802" id="International_Conference_of_the_Communist_and_Workers'_Parties"><span data-dcnode-id="4803" instrument_node="">International Conference of the Communist and Workers' Parties</span></span><span class="mw-editsection" data-dcnode-id="4795"><span class="mw-editsection-bracket" data-dcnode-id="4800"><span data-dcnode-id="4801" instrument_node="">[</span></span><a data-dcnode-id="4798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D14" title="Edit section: International Conference of the Communist and Workers' Parties"><span data-dcnode-id="4799" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4796"><span data-dcnode-id="4797" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4793" instrument_node="">
</span><p data-dcnode-id="4784"><span data-dcnode-id="4792" instrument_node="">In October 1960, a preparatory Commission for the upcoming International Conference of the Communist and Workers' Parties scheduled for November that year was held from October 1–21, with the Albanian delegation being led by Hysni Kapo and </span><a data-dcnode-id="4790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramiz_Alia" title="Ramiz Alia"><span data-dcnode-id="4791" instrument_node="">Ramiz Alia</span></a><span data-dcnode-id="4789" instrument_node="">. Alia later recalled: "the aim of the Soviets was to ensure that our Party did not come out against their party and Khrushchev, did not bring the fight out in the open, and speak about Bucharest and the contradictions which existed. To this end, they created around our delegation a harsh and dangerous atmosphere, in which open threats were combined with cunning flattery."</span><sup class="reference" data-dcnode-id="4786" id="cite_ref-FOOTNOTEAlia1988265_69-0"><a data-dcnode-id="4787" href="#cite_note-FOOTNOTEAlia1988265-69"><span data-dcnode-id="4788" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4785" instrument_node="">
</span></p><p data-dcnode-id="4778"><span data-dcnode-id="4783" instrument_node="">Hoxha once again communicated via radiogram, writing to Kapo on October 13: "We are not of the same opinion as those who are trying to smooth out the problems by means of phrases in resolutions or declarations&nbsp;... We are for carrying the matter through to the end. If this is not understood, it means that the danger which the Khrushchev group represents for the world communist movement is not understood. It does not depend on us whether this group should continue in power or not, but it is essential that we, should expose this group with Khrushchev at the head, as they deserve&nbsp;... we shall not allow ourselves to be impressed by those who say: 'How can one attack the glorious Soviet Union or the great Communist Party of Lenin for the faults of a few rascals?' We say: Precisely to defend the Soviet Union and the Party of Lenin, these 'rascals' must be exposed, and there must be no toning down of criticism or covering up of the deviationists."</span><sup class="reference" data-dcnode-id="4780" id="cite_ref-FOOTNOTEHoxha1976151–152_70-0"><a data-dcnode-id="4781" href="#cite_note-FOOTNOTEHoxha1976151%E2%80%93152-70"><span data-dcnode-id="4782" instrument_node="">[70]</span></a></sup><span data-dcnode-id="4779" instrument_node="">
</span></p><p data-dcnode-id="4769"><span data-dcnode-id="4777" instrument_node="">On October 22, after the work of the commission had ended, Khrushchev invited the delegates to a dinner which, according to Alia, was used "to threaten those parties which might oppose the line of the Soviets in November." He gave as an example an exchange between Soviet Politburo member </span><a data-dcnode-id="4775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yekaterina_Furtseva" title="Yekaterina Furtseva"><span data-dcnode-id="4776" instrument_node="">Yekaterina Furtseva</span></a><span data-dcnode-id="4774" instrument_node=""> and Kapo, in which the former asked, "Are you Hysni Kapo?! I've heard so much about you&nbsp;..." Kapo replied, "For good or bad?" to which Furtseva stated, "You have attacked the Soviet Union, but you are heading for trouble on that course," getting "the reply she deserved" from Kapo, with Alia further writing "her mission was just to transmit the signal. Throughout the whole dinner she did not speak to us again."</span><sup class="reference" data-dcnode-id="4771" id="cite_ref-FOOTNOTEAlia1988278–279_71-0"><a data-dcnode-id="4772" href="#cite_note-FOOTNOTEAlia1988278%E2%80%93279-71"><span data-dcnode-id="4773" instrument_node="">[71]</span></a></sup><span data-dcnode-id="4770" instrument_node="">
</span></p><p data-dcnode-id="4756"><span data-dcnode-id="4768" instrument_node="">From November 3–25, Enver Hoxha headed the Albanian delegation which would present its case at the Second International Conference of the Communist and Workers' Parties together with Kapo, Alia, and others.</span><sup class="reference" data-dcnode-id="4765" id="cite_ref-FOOTNOTEAlia1988282–283_72-0"><a data-dcnode-id="4766" href="#cite_note-FOOTNOTEAlia1988282%E2%80%93283-72"><span data-dcnode-id="4767" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4764" instrument_node=""> Alia later noted, "The Soviets' aim was to ensure that Comrade Enver did not speak openly in Moscow, that, at the most, he should restrict himself to general criticisms on a theoretical plane&nbsp;... they brought all-sided pressure to bear on our delegation&nbsp;... even us[ing] the official reception for the celebration of </span><a data-dcnode-id="4762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="4763" instrument_node="">November 7</span></a><span data-dcnode-id="4761" instrument_node=""> against our delegation for these purposes."</span><sup class="reference" data-dcnode-id="4758" id="cite_ref-FOOTNOTEAlia1988282–283_72-1"><a data-dcnode-id="4759" href="#cite_note-FOOTNOTEAlia1988282%E2%80%93283-72"><span data-dcnode-id="4760" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4757" instrument_node="">
</span></p><p data-dcnode-id="4746"><span data-dcnode-id="4755" instrument_node="">On November 5, a 125-page letter was sent from the Central Committee of the CPSU to its Chinese counterpart ignoring the existence of Albania as a socialist country and "malign[ing] the Party of Labour of Albania."</span><sup class="reference" data-dcnode-id="4752" id="cite_ref-FOOTNOTELogoreci1977126Hoxha198070_73-0"><a data-dcnode-id="4753" href="#cite_note-FOOTNOTELogoreci1977126Hoxha198070-73"><span data-dcnode-id="4754" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4751" instrument_node=""> Later noting this letter in regards to China, Hoxha wrote that, "They distributed this voluminous material against China before the meeting, in order to prepare the terrain and to brainwash the delegations of other parties, and to intimidate the Chinese, to compel them to take a moderate stand, if they would not submit. This anti-Chinese material did not surprise us, but it strengthened the conviction we had in the correctness of the line and the Marxist–Leninist stands of our Party in defence of the Communist Party of China."</span><sup class="reference" data-dcnode-id="4748" id="cite_ref-FOOTNOTEHoxha1984444_74-0"><a data-dcnode-id="4749" href="#cite_note-FOOTNOTEHoxha1984444-74"><span data-dcnode-id="4750" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4747" instrument_node="">
</span></p><p data-dcnode-id="4732"><span data-dcnode-id="4745" instrument_node="">On November 10, 1960, the second International Conference of the Communist and Workers' Parties was convened.</span><sup class="reference" data-dcnode-id="4742" id="cite_ref-FOOTNOTEPano1968139_75-0"><a data-dcnode-id="4743" href="#cite_note-FOOTNOTEPano1968139-75"><span data-dcnode-id="4744" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4741" instrument_node=""> As Hoxha recalled, "In his speech Khrushchev expressed the revisionist views completely and attacked the Communist Party of China and the Party of Labour of Albania, as well as those who were going to follow these parties, but without mentioning any names&nbsp;... wanted to keep all the communist and workers' parties of the world under his conductor's baton, under his dictate."</span><sup class="reference" data-dcnode-id="4738" id="cite_ref-FOOTNOTEHoxha1984446–447_76-0"><a data-dcnode-id="4739" href="#cite_note-FOOTNOTEHoxha1984446%E2%80%93447-76"><span data-dcnode-id="4740" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4737" instrument_node=""> On November 12, a private meeting was held between members of the Albanian delegation including Hoxha and members of the Soviet leadership, which "showed that no compromise between them was possible."</span><sup class="reference" data-dcnode-id="4734" id="cite_ref-FOOTNOTELogoreci1977126_77-0"><a data-dcnode-id="4735" href="#cite_note-FOOTNOTELogoreci1977126-77"><span data-dcnode-id="4736" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4733" instrument_node="">
</span></p><p data-dcnode-id="4726"><span data-dcnode-id="4731" instrument_node="">During the meeting Hoxha noted that "[The Soviet ambassador to Albania] has asked to whom the Albanian army will be loyal. This question he addressed to our generals at the airport, in the presence of one of your generals. Our officers replied that our army would be loyal to Marxism–Leninism, to the Party of Labour and socialism." Khrushchev replied, "If our ambassador said such a thing, he was foolish." Hoxha in turn replied, "He was no fool. He committed this 'foolishness' following the Bucharest Meeting." The subject eventually came to the Vlora naval base, which was the subject of a Soviet–Albanian dispute to become acute months later. Khrushchev threatened Hoxha, saying, "We can dismantle the base if you like." Hoxha replied, "If you dismantle the base you will be making a big mistake. We have fought empty-bellied and bare-footed, but have never kowtowed to anybody." As the meeting's atmosphere became increasingly hostile Khrushchev declared, "You flare up in anger. You spat on me; no one can talk to you." The meeting ended after Kapo declared, "I do not agree that the talks should be conducted like this."</span><sup class="reference" data-dcnode-id="4728" id="cite_ref-FOOTNOTEHoxha198084–92_78-0"><a data-dcnode-id="4729" href="#cite_note-FOOTNOTEHoxha198084%E2%80%9392-78"><span data-dcnode-id="4730" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4727" instrument_node="">
</span></p><p data-dcnode-id="4720"><span data-dcnode-id="4725" instrument_node="">Hoxha delivered his speech to the Conference on November 16, where he spoke "of the tremendous Soviet pressures to which the Albanian party and government had been subjected after the Bucharest meeting&nbsp;... The only crime his régime had committed, the Albanian leader added, was that it did not agree that the Chinese communist party should be summarily and unjustly condemned. For this it had been treated in a manner that was shabby, anti-Marxist and uncomradely. Hoxha's speech had a shattering effect on the Moscow gathering."</span><sup class="reference" data-dcnode-id="4722" id="cite_ref-FOOTNOTELogoreci1977127–128_79-0"><a data-dcnode-id="4723" href="#cite_note-FOOTNOTELogoreci1977127%E2%80%93128-79"><span data-dcnode-id="4724" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4721" instrument_node="">
</span></p><p data-dcnode-id="4706"><span data-dcnode-id="4719" instrument_node="">According to Krushchev, Hoxha said—amongst other things—that the Party of Labour and Albania itself "should merely applaud and approve, but express no opinion of its own. But this is neither Marxist nor acceptable. Marxism–Leninism has granted us the right to have our say, and no one can take this from us, either by means of political and economic pressure, or by means of threats and names they might call us."</span><sup class="reference" data-dcnode-id="4716" id="cite_ref-FOOTNOTEHoxha1980126–127_80-0"><a data-dcnode-id="4717" href="#cite_note-FOOTNOTEHoxha1980126%E2%80%93127-80"><span data-dcnode-id="4718" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4715" instrument_node=""> According to Alia, Khrushchev "tried to appear calm" when first replying, reading his written text "almost mechanically" in regards to China but as soon as he began to reply to Hoxha's speech "he lost his head and began to shout, scream and splutter."</span><sup class="reference" data-dcnode-id="4712" id="cite_ref-FOOTNOTEAlia1988289_81-0"><a data-dcnode-id="4713" href="#cite_note-FOOTNOTEAlia1988289-81"><span data-dcnode-id="4714" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4711" instrument_node=""> Khrushchev was said to have angrily remarked, "Comrade Hoxha, you have poured a bucket of filth over me: you are going to have to wash it off again."</span><sup class="reference" data-dcnode-id="4708" id="cite_ref-FOOTNOTEHamm196319_82-0"><a data-dcnode-id="4709" href="#cite_note-FOOTNOTEHamm196319-82"><span data-dcnode-id="4710" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4707" instrument_node="">
</span></p><p data-dcnode-id="4693"><span data-dcnode-id="4705" instrument_node="">Jon Halliday states "on this occasion Hoxha truly succeeded in putting himself and Albania on the world map. His denunciation of Khrushchev made headlines round the world and even his harshest critics usually concede Hoxha turned in an able performance and showed personal courage."</span><sup class="reference" data-dcnode-id="4702" id="cite_ref-FOOTNOTEHalliday1986227_83-0"><a data-dcnode-id="4703" href="#cite_note-FOOTNOTEHalliday1986227-83"><span data-dcnode-id="4704" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4701" instrument_node=""> In retirement, Khrushchev recalled the Conference and said Hoxha "bared his fangs at us even more menacingly than the Chinese themselves. After his speech, comrade </span><a class="mw-redirect" data-dcnode-id="4699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dolores_Ibarruri" title="Dolores Ibarruri"><span data-dcnode-id="4700" instrument_node="">Dolores Ibarruri</span></a><span data-dcnode-id="4698" instrument_node="">, an old revolutionary and a devoted worker in the Communist movement, got up indignantly and said, very much to the point, that Hoxha was like a dog who bites the hand that feeds it."</span><sup class="reference" data-dcnode-id="4695" id="cite_ref-FOOTNOTEO'Donnell199947_84-0"><a data-dcnode-id="4696" href="#cite_note-FOOTNOTEO'Donnell199947-84"><span data-dcnode-id="4697" instrument_node="">[84]</span></a></sup><span data-dcnode-id="4694" instrument_node="">
</span></p><p data-dcnode-id="4677"><span data-dcnode-id="4692" instrument_node="">Alia relates that during the Conference a Soviet security officer had said to both him and Kapo that the Soviet leadership might have been contemplating Hoxha's assassination.</span><sup class="reference" data-dcnode-id="4689" id="cite_ref-FOOTNOTEAlia1988284–285_85-0"><a data-dcnode-id="4690" href="#cite_note-FOOTNOTEAlia1988284%E2%80%93285-85"><span data-dcnode-id="4691" instrument_node="">[85]</span></a></sup><span data-dcnode-id="4688" instrument_node=""> For this reason, as Hoxha relates in his memoirs, "The Khrushchevites were capable of anything and we took our own measures&nbsp;... Hysni and Ramiz stayed on in Moscow, as they had to sign the declaration" while Hoxha left the Soviet Union by train and "arrived in Austria, went down by train through Italy and from Bari returned safe and sound to Tirana on our own aircraft and went directly to the reception organized on the occasion of the </span><a class="mw-redirect" data-dcnode-id="4686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albanian_independence_day" title="Albanian independence day"><span data-dcnode-id="4687" instrument_node="">28th</span></a><span data-dcnode-id="4685" instrument_node=""> and </span><a data-dcnode-id="4683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberation_Day_%28Albania%29" title="Liberation Day (Albania)"><span data-dcnode-id="4684" instrument_node="">29th of November</span></a><span data-dcnode-id="4682" instrument_node="">."</span><sup class="reference" data-dcnode-id="4679" id="cite_ref-FOOTNOTEHoxha1984455_86-0"><a data-dcnode-id="4680" href="#cite_note-FOOTNOTEHoxha1984455-86"><span data-dcnode-id="4681" instrument_node="">[86]</span></a></sup><span data-dcnode-id="4678" instrument_node="">
</span></p><p data-dcnode-id="4671"><span data-dcnode-id="4676" instrument_node="">At the Conference itself the Albanian delegation played a leading role together with its Chinese counterpart in giving the draft declaration "Marxist–Leninist content", and despite "serious flaws" (in the view of these delegations) "the Declaration eventually signed by the 81&nbsp;parties was a repudiation of revisionist theses&nbsp;... [and] condemned the Yugoslav form of 'international opportunism which is a concentrated expression of the theories of modern revisionism.'&nbsp;... the Soviet revisionists and the revisionists in other countries and parties demonstrated [in the view of Albania and China] their opportunistic character by completely disregarding the principles set forth in a document they had found it expedient to sign."</span><sup class="reference" data-dcnode-id="4673" id="cite_ref-FOOTNOTEAsh1974201–202_87-0"><a data-dcnode-id="4674" href="#cite_note-FOOTNOTEAsh1974201%E2%80%93202-87"><span data-dcnode-id="4675" instrument_node="">[87]</span></a></sup><span data-dcnode-id="4672" instrument_node="">
</span></p><p data-dcnode-id="4665"><span data-dcnode-id="4670" instrument_node="">On December 19, Hoxha delivered his report to a plenum of the Central Committee of the Party concerning the Moscow Conference, remarking on the mutual defenses Albania and China provided for each other at Bucharest and Moscow and adding, "In the future our Party will strengthen its ties and friendship with the Communist Party of China and the great Chinese people, always upholding the teachings of Marxism–Leninism and the correct line always pursued by the Central Committee of our Party."</span><sup class="reference" data-dcnode-id="4667" id="cite_ref-FOOTNOTEHoxha1976277_88-0"><a data-dcnode-id="4668" href="#cite_note-FOOTNOTEHoxha1976277-88"><span data-dcnode-id="4669" instrument_node="">[88]</span></a></sup><span data-dcnode-id="4666" instrument_node="">
</span></p><span data-dcnode-id="4664" instrument_node="">
</span><h2 data-dcnode-id="4654"><span class="mw-headline" data-dcnode-id="4662" id="Culmination"><span data-dcnode-id="4663" instrument_node="">Culmination</span></span><span class="mw-editsection" data-dcnode-id="4655"><span class="mw-editsection-bracket" data-dcnode-id="4660"><span data-dcnode-id="4661" instrument_node="">[</span></span><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D15" title="Edit section: Culmination"><span data-dcnode-id="4659" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4653" instrument_node="">
</span><p data-dcnode-id="4647"><span data-dcnode-id="4652" instrument_node="">At the Fourth Congress of the Party of Labour held in February 1961, Hoxha declared—although still not mentioning the Soviets by name—that, "During the past few years, our Party and other Marxist–Leninist parties have waged a successful struggle against the views of modern revisionists&nbsp;... But in spite of all the crushing blows and defeats it has received, revisionism&nbsp;... remains the main danger to the international communist movement&nbsp;... a resolute and uncompromising struggle must be waged against revisionism until it is utterly destroyed."</span><sup class="reference" data-dcnode-id="4649" id="cite_ref-FOOTNOTEHoxha1980278–278_89-0"><a data-dcnode-id="4650" href="#cite_note-FOOTNOTEHoxha1980278%E2%80%93278-89"><span data-dcnode-id="4651" instrument_node="">[89]</span></a></sup><span data-dcnode-id="4648" instrument_node="">
</span></p><p data-dcnode-id="4637"><span data-dcnode-id="4646" instrument_node="">According to an Albanian account, "Right after the 4th Congress of the PLA, when it became clear that its attempts at imposing its will on Albania were futile, the Soviet leadership cut off all the credits envisaged in the agreements between the two countries."</span><sup class="reference" data-dcnode-id="4643" id="cite_ref-FOOTNOTEOmariPollo1988213_90-0"><a data-dcnode-id="4644" href="#cite_note-FOOTNOTEOmariPollo1988213-90"><span data-dcnode-id="4645" instrument_node="">[90]</span></a></sup><span data-dcnode-id="4642" instrument_node=""> The Congress, which was the last one in which Soviet and East European representatives from other parties would attend, "confirmed that the rift with Russia was almost complete and the alliance between China and Albania an accomplished fact."</span><sup class="reference" data-dcnode-id="4639" id="cite_ref-FOOTNOTELogoreci1977128–129_91-0"><a data-dcnode-id="4640" href="#cite_note-FOOTNOTELogoreci1977128%E2%80%93129-91"><span data-dcnode-id="4641" instrument_node="">[91]</span></a></sup><span data-dcnode-id="4638" instrument_node="">
</span></p><p data-dcnode-id="4618"><span data-dcnode-id="4636" instrument_node="">On January 20 that year, the Soviets announced a withdrawal of their oil specialists within a seven- to ten-day period. The Albanians later claimed the specialists had sabotaged Albania's oil installations before departing.</span><sup class="reference" data-dcnode-id="4633" id="cite_ref-FOOTNOTEFreedman197076–77_92-0"><a data-dcnode-id="4634" href="#cite_note-FOOTNOTEFreedman197076%E2%80%9377-92"><span data-dcnode-id="4635" instrument_node="">[92]</span></a></sup><span data-dcnode-id="4632" instrument_node=""> Although Khrushchev had symbolically delivered blueprints for the </span><a data-dcnode-id="4630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palace_of_Culture_of_Tirana" title="Palace of Culture of Tirana"><span data-dcnode-id="4631" instrument_node="">Palace of Culture of Tirana</span></a><span data-dcnode-id="4629" instrument_node=""> on the occasion of his 1959 visit, all Soviet construction efforts on it ceased by April 1961. A shipment of materials for the Palace, which arrived in </span><a data-dcnode-id="4627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Durr%25C3%25ABs" title="Durrës"><span data-dcnode-id="4628" instrument_node="">Durrës</span></a><span data-dcnode-id="4626" instrument_node="">, was "withdrawn at once on the pretext that the materials 'had been loaded by mistake and were not really intended for Albania.</span><span data-dcnode-id="4624" style="padding-right:.15em;"><span data-dcnode-id="4625" instrument_node="">'</span></span><span data-dcnode-id="4623" instrument_node="">"</span><sup class="reference" data-dcnode-id="4620" id="cite_ref-FOOTNOTEAsh1974204Hamm196334_93-0"><a data-dcnode-id="4621" href="#cite_note-FOOTNOTEAsh1974204Hamm196334-93"><span data-dcnode-id="4622" instrument_node="">[93]</span></a></sup><span data-dcnode-id="4619" instrument_node="">
</span></p><p data-dcnode-id="4601"><span data-dcnode-id="4617" instrument_node="">On April 23, a Sino-Albanian trade agreement was concluded; Soviet First Deputy Premier </span><a data-dcnode-id="4615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexei_Kosygin" title="Alexei Kosygin"><span data-dcnode-id="4616" instrument_node="">Alexei Kosygin</span></a><span data-dcnode-id="4614" instrument_node=""> sent a letter five days later which effectively signaled the end to Soviet–Albanian trade agreements. Among other things it stated that "It is understandable that the Albanian leadership cannot expect in the future that the USSR will help it as it has in the past, with aid from which only true friends and brothers have a right to benefit."</span><sup class="reference" data-dcnode-id="4611" id="cite_ref-FOOTNOTEFreedman197077–78_94-0"><a data-dcnode-id="4612" href="#cite_note-FOOTNOTEFreedman197077%E2%80%9378-94"><span data-dcnode-id="4613" instrument_node="">[94]</span></a></sup><span data-dcnode-id="4610" instrument_node=""> On August 19, the Soviet ambassador to Albania left Tirana "and was never to return."</span><sup class="reference" data-dcnode-id="4607" id="cite_ref-FOOTNOTEFreedman197079Ash1974205_95-0"><a data-dcnode-id="4608" href="#cite_note-FOOTNOTEFreedman197079Ash1974205-95"><span data-dcnode-id="4609" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4606" instrument_node=""> On August 26, "only five days before the beginning of the fall semester," the Soviets canceled scholarships for Albanian students studying in the USSR; these students given a deadline to leave by October.</span><sup class="reference" data-dcnode-id="4603" id="cite_ref-FOOTNOTEFreedman197079Ash1974205_95-1"><a data-dcnode-id="4604" href="#cite_note-FOOTNOTEFreedman197079Ash1974205-95"><span data-dcnode-id="4605" instrument_node="">[95]</span></a></sup><span data-dcnode-id="4602" instrument_node="">
</span></p><p data-dcnode-id="4595"><span data-dcnode-id="4600" instrument_node="">An Albanian account of the economy during this period states observes "the foreign specialists left unfinished about 40 important objects of the 2nd Five-year Plan in the industrial sector alone. Difficulties increased even more after the cessation of military aid. Thus in the first years of the 3rd Five-year Plan the fulfillment of the plan in many sectors of the economy was made very difficult and to a certain extent the development of the Albanian economy as a whole was impaired."</span><sup class="reference" data-dcnode-id="4597" id="cite_ref-FOOTNOTEOmariPollo1988214_96-0"><a data-dcnode-id="4598" href="#cite_note-FOOTNOTEOmariPollo1988214-96"><span data-dcnode-id="4599" instrument_node="">[96]</span></a></sup><span data-dcnode-id="4596" instrument_node="">
</span></p><p data-dcnode-id="4585"><span data-dcnode-id="4594" instrument_node="">Military pressure was stepped up still further; during summer "the training of all Albanian officers, cadets, and noncoms in the Soviet Union or the East European satellite countries was brought to a stop. Since then, there has been not a single Albanian studying at a military academy in the Eastern Bloc. It has been impossible, therefore, for the Tirana Government to keep its army up-to-date on military theory."</span><sup class="reference" data-dcnode-id="4591" id="cite_ref-FOOTNOTEHamm196328_97-0"><a data-dcnode-id="4592" href="#cite_note-FOOTNOTEHamm196328-97"><span data-dcnode-id="4593" instrument_node="">[97]</span></a></sup><span data-dcnode-id="4590" instrument_node=""> In March, Albania had not been invited to attend a meeting of the Warsaw Treaty states.</span><sup class="reference" data-dcnode-id="4587" id="cite_ref-FOOTNOTEO'Donnell199953_98-0"><a data-dcnode-id="4588" href="#cite_note-FOOTNOTEO'Donnell199953-98"><span data-dcnode-id="4589" instrument_node="">[98]</span></a></sup><span data-dcnode-id="4586" instrument_node="">
</span></p><p data-dcnode-id="4579"><span data-dcnode-id="4584" instrument_node="">Hoxha later recalled: "When we returned from Moscow [in November 1960], the provocations at the [Vlora submarine] base were increased and in order to exert pressure on and impress us, the Soviet deputy foreign minister, Firyubin, came to Tirana with two other 'deputies': the first deputy-chief of the General Staff of the Soviet Army and Navy, Antonov, and the deputy chief of the Supreme Staff of the Soviet Navy, Sergeyev. They came allegedly 'to reach agreement', but in fact they brought us an ultimatum: The Vlora base must be put completely and solely under Soviet command, which was to be subordinate to the commander-in-chief of the Armed Forces of the Warsaw Treaty."</span><sup class="reference" data-dcnode-id="4581" id="cite_ref-FOOTNOTEHoxha1984466–467_99-0"><a data-dcnode-id="4582" href="#cite_note-FOOTNOTEHoxha1984466%E2%80%93467-99"><span data-dcnode-id="4583" instrument_node="">[99]</span></a></sup><span data-dcnode-id="4580" instrument_node="">
</span></p><p data-dcnode-id="4573"><span data-dcnode-id="4578" instrument_node="">An Albanian account describes the dispute as follows: "By violating the formal Albanian–Soviet agreements signed in September 1957 and May 1959, the Soviet government did everything in its power to put under its control this Albanian base which at the same time served the defence of the socialist countries&nbsp;... On April 5, 1961, in a letter addressed to the governments of the Soviet Union and the East-European states it resolutely reaffirmed that it accepted only one solution of the problem: the base of Vlora belonged to Albania and all the naval means that were its property should be handed over to Albanian crew as soon as possible. Any other solution was an act which would lead to the unilateral violation on the part of the Soviet Union of the existing Albanian–Soviet agreements of the years 1957 and 1959."</span><sup class="reference" data-dcnode-id="4575" id="cite_ref-FOOTNOTEOmariPollo1988282–283_100-0"><a data-dcnode-id="4576" href="#cite_note-FOOTNOTEOmariPollo1988282%E2%80%93283-100"><span data-dcnode-id="4577" instrument_node="">[100]</span></a></sup><span data-dcnode-id="4574" instrument_node="">
</span></p><p data-dcnode-id="4560"><span data-dcnode-id="4572" instrument_node="">In May 1961, the Soviets began dismantling the base and tried to seize the submarines, seizing some Albanian ships undergoing repairs at </span><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sevastopol" title="Sevastopol"><span data-dcnode-id="4571" instrument_node="">Sevastopol</span></a><span data-dcnode-id="4569" instrument_node=""> in the process.</span><sup class="reference" data-dcnode-id="4566" id="cite_ref-FOOTNOTEPano1968148Logoreci1977129_101-0"><a data-dcnode-id="4567" href="#cite_note-FOOTNOTEPano1968148Logoreci1977129-101"><span data-dcnode-id="4568" instrument_node="">[101]</span></a></sup><span data-dcnode-id="4565" instrument_node=""> As the Albanian account describes it, "The Soviet sailors and officers carried out numerous provocations, trying by all manner of means to create a pretext for the Soviet military intervention in Albania&nbsp;... On May 26, it seized in a demonstrative manner eight submarines, the floating base 'Kotelnikov', as well as the Albanian warships that were laid for repair in the port of Sevastopol. On June 5, the personnel of Soviet advisers left the base at Vlora, too."</span><sup class="reference" data-dcnode-id="4562" id="cite_ref-FOOTNOTEOmariPollo1988285–286_102-0"><a data-dcnode-id="4563" href="#cite_note-FOOTNOTEOmariPollo1988285%E2%80%93286-102"><span data-dcnode-id="4564" instrument_node="">[102]</span></a></sup><span data-dcnode-id="4561" instrument_node="">
</span></p><p data-dcnode-id="4548"><span data-dcnode-id="4559" instrument_node="">Hoxha's account is as follows: Admiral </span><a data-dcnode-id="4557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladimir_Kasatonov" title="Vladimir Kasatonov"><span data-dcnode-id="4558" instrument_node="">Vladimir Kasatonov</span></a><span data-dcnode-id="4556" instrument_node=""> of the </span><a data-dcnode-id="4554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Black_Sea_Fleet" title="Black Sea Fleet"><span data-dcnode-id="4555" instrument_node="">Black Sea Fleet</span></a><span data-dcnode-id="4553" instrument_node=""> "came to Tirana with the mission of seizing not only the eight submarines&nbsp;... but even the submarines which we had taken over earlier. We told him bluntly: Either you hand the submarines over to us according to the agreement, or within a short time (we set the date) you must withdraw immediately from the bay&nbsp;... He did not hand over the submarines, but went to Vlora, boarded the command submarine and lined up the others in fighting formation. We gave orders to close the Sazan Narrows and to train the guns on the Soviet ships. Admiral Kasatonov, who had wanted to frighten us, was frightened himself. He was caught like a rat in a trap and if he attempted to implement his plan he might find himself at the bottom of the sea. In these conditions the admiral was obliged to take only the submarines with Soviet crews, and he sailed out of the bay back home with his tail between his legs."</span><sup class="reference" data-dcnode-id="4550" id="cite_ref-FOOTNOTEHoxha1984467–468_103-0"><a data-dcnode-id="4551" href="#cite_note-FOOTNOTEHoxha1984467%E2%80%93468-103"><span data-dcnode-id="4552" instrument_node="">[103]</span></a></sup><span data-dcnode-id="4549" instrument_node="">
</span></p><p data-dcnode-id="4539"><span data-dcnode-id="4547" instrument_node="">At the </span><a data-dcnode-id="4545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/22nd_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="22nd Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="4546" instrument_node="">22nd Congress of the Communist Party of the Soviet Union</span></a><span data-dcnode-id="4544" instrument_node=""> in October that year, Khrushchev openly attacked the Albanian leadership, proclaiming Hoxha a "leftist nationalist deviationist" and calling for his overthrow, declaring that, "We are certain the time will come when the Albanian communists and the Albanian people will have their say, and then the Albanian leaders will have to answer for the harm they have done their country, their people and the cause of socialist construction in Albania."</span><sup class="reference" data-dcnode-id="4541" id="cite_ref-FOOTNOTEFreedman197079_104-0"><a data-dcnode-id="4542" href="#cite_note-FOOTNOTEFreedman197079-104"><span data-dcnode-id="4543" instrument_node="">[104]</span></a></sup><span data-dcnode-id="4540" instrument_node="">
</span></p><p data-dcnode-id="4529"><span data-dcnode-id="4538" instrument_node="">He further stated that "The imperialists are always prepared to pay 30&nbsp;pieces of silver to those who split the Communist ranks." To this Hoxha replied in a November 7 speech, "the Albanian people and their Party of Labor will even live on grass if need be, but they will never sell themselves 'for 30&nbsp;pieces of silver'&nbsp;... They would rather die honourably on their feet than live in shame on their knees."</span><sup class="reference" data-dcnode-id="4535" id="cite_ref-FOOTNOTEO'Donnell199956–57_105-0"><a data-dcnode-id="4536" href="#cite_note-FOOTNOTEO'Donnell199956%E2%80%9357-105"><span data-dcnode-id="4537" instrument_node="">[105]</span></a></sup><span data-dcnode-id="4534" instrument_node=""> Nicholas C. Pano noted that "[Khrushchev's] pronouncements [at the 22nd Congress], at least insofar as the Soviet leadership was concerned, had made the policies of de-Stalinization, peaceful coexistence, and reconciliation with Yugoslavia adopted at the 20th Congress of the CPSU binding upon the members of the communist system."</span><sup class="reference" data-dcnode-id="4531" id="cite_ref-FOOTNOTEPano1968150–151_106-0"><a data-dcnode-id="4532" href="#cite_note-FOOTNOTEPano1968150%E2%80%93151-106"><span data-dcnode-id="4533" instrument_node="">[106]</span></a></sup><span data-dcnode-id="4530" instrument_node="">
</span></p><p data-dcnode-id="4523"><span data-dcnode-id="4528" instrument_node="">Despite Albanian calls for the continued existence of state relations between the two countries, the Soviet government formally withdrew its ambassador on November 25, and on December 3, withdrew "the whole personnel of its embassy and commercial representation from the PRA, while at the same time demanding that the personnel of the Albanian embassy and the Albanian commercial adviser should leave the territory of the Soviet Union." "Thus," the Albanian account continues, "the Khrushchev revisionist group, consistent in its line, cut off all relations with socialist Albania at a time when it maintained contacts with and was drawing ever closer to the most reactionary regimes of the world."</span><sup class="reference" data-dcnode-id="4525" id="cite_ref-FOOTNOTEOmariPollo1988287–288_107-0"><a data-dcnode-id="4526" href="#cite_note-FOOTNOTEOmariPollo1988287%E2%80%93288-107"><span data-dcnode-id="4527" instrument_node="">[107]</span></a></sup><span data-dcnode-id="4524" instrument_node="">
</span></p><p data-dcnode-id="4518"><span data-dcnode-id="4522" instrument_node="">In a December 10 </span><i data-dcnode-id="4520"><span data-dcnode-id="4521" instrument_node="">Zëri i Popullit</span></i><span data-dcnode-id="4519" instrument_node=""> article, Hoxha wrote:
</span></p><span data-dcnode-id="4517" instrument_node="">
</span><link data-dcnode-id="4516" href="mw-data:TemplateStyles:r996844942" rel="mw-deduplicated-inline-style"><blockquote class="templatequote" data-dcnode-id="4506"><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">The real cause [of the break in diplomatic relations] must be sought in the revisionist views of Khrushchev and in his anti-Marxist efforts to impose them on the other parties by any means&nbsp;... with a view to silencing our Party, to subjugating it and giving a lesson to anyone that would dare to oppose him, Khrushchev extended the ideological disagreements to the field of state relations and began to behave with the PRA as towards an enemy country&nbsp;... he aims to intimidate and subjugate the PLA, to shift it from its revolutionary Marxist–Leninist positions, to shake the confidence of our people in the PLA and its leadership, to upset the feelings of friendship of the Albanian people towards the Soviet Union&nbsp;...
</span></p><p data-dcnode-id="4512"><span data-dcnode-id="4513" instrument_node="">But Khrushchev is trying in vain&nbsp;... Under the leadership of the PLA, the Albanian people have scored historic victories in the course of these 20&nbsp;years: they liberated the country from the fascist invaders and established the people's state power, reconstructed the war-ravaged country, liquidated the centuries-old backwardness and achieved great successes in the construction of socialist society&nbsp;... Our Party is fighting for a great cause, for the truth of Marxism–Leninism&nbsp;...
</span></p><p data-dcnode-id="4507"><span data-dcnode-id="4511" instrument_node="">
On this course, marching shoulder to shoulder with the sister Marxist–Leninist parties and the fraternal peoples of the socialist countries, as well as with all the revolutionary forces of the world, our Party and people will score complete victory over the imperialist and revisionist enemies. Marxism–Leninism cannot be vanquished! Socialism and communism will triumph!</span><sup class="reference" data-dcnode-id="4508" id="cite_ref-FOOTNOTEHoxha1980352–356_108-0"><a data-dcnode-id="4509" href="#cite_note-FOOTNOTEHoxha1980352%E2%80%93356-108"><span data-dcnode-id="4510" instrument_node="">[108]</span></a></sup></p></blockquote><span data-dcnode-id="4505" instrument_node="">
</span><h2 data-dcnode-id="4495"><span class="mw-headline" data-dcnode-id="4503" id="Subsequent_developments"><span data-dcnode-id="4504" instrument_node="">Subsequent developments</span></span><span class="mw-editsection" data-dcnode-id="4496"><span class="mw-editsection-bracket" data-dcnode-id="4501"><span data-dcnode-id="4502" instrument_node="">[</span></span><a data-dcnode-id="4499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D16" title="Edit section: Subsequent developments"><span data-dcnode-id="4500" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4497"><span data-dcnode-id="4498" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4494" instrument_node="">
</span><p data-dcnode-id="4481"><span data-dcnode-id="4493" instrument_node="">In his memoirs Khrushchev described the Albanian leadership as "monsters," saying that, "The rift which developed between the Soviet Union and Albania stemmed mainly from the Albanians' fear of democratisation."</span><sup class="reference" data-dcnode-id="4490" id="cite_ref-FOOTNOTEHalliday1986143_19-1"><a data-dcnode-id="4491" href="#cite_note-FOOTNOTEHalliday1986143-19"><span data-dcnode-id="4492" instrument_node="">[19]</span></a></sup><span data-dcnode-id="4489" instrument_node=""> The downfall of Khrushchev in 1964 saw Hoxha write an article for </span><i data-dcnode-id="4487"><span data-dcnode-id="4488" instrument_node="">Zëri i Popullit</span></i><span data-dcnode-id="4486" instrument_node=""> in which he stated that, "Despite the fact that Khrushchev was the head of modern revisionism, his political liquidation as a person does not mean the liquidation of his political, ideological, economic and organizational course&nbsp;... Khrushchevite revisionism is not dead, his ideology and policy expressed in the line of the 20th and 22nd Congresses of the CPSU are not liquidated."</span><sup class="reference" data-dcnode-id="4483" id="cite_ref-FOOTNOTEHoxha1980663_109-0"><a data-dcnode-id="4484" href="#cite_note-FOOTNOTEHoxha1980663-109"><span data-dcnode-id="4485" instrument_node="">[109]</span></a></sup><span data-dcnode-id="4482" instrument_node="">
</span></p><p data-dcnode-id="4469"><span data-dcnode-id="4480" instrument_node="">In the view of </span><a data-dcnode-id="4478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bill_Ash" title="Bill Ash"><span data-dcnode-id="4479" instrument_node="">Bill Ash</span></a><span data-dcnode-id="4477" instrument_node="">, writing in support of the Albanian position, "The final proof of the correctness of Albania's characterisation of Soviet revisionism came with the </span><a data-dcnode-id="4475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact_invasion_of_Czechoslovakia" title="Warsaw Pact invasion of Czechoslovakia"><span data-dcnode-id="4476" instrument_node="">invasion and military occupation of Czechoslovakia</span></a><span data-dcnode-id="4474" instrument_node=""> in 1968&nbsp;– 'Khrushchevism without Khrushchev', since Brezhnev who succeeded the deposed revisionist leader followed the same line."</span><sup class="reference" data-dcnode-id="4471" id="cite_ref-FOOTNOTEAsh1974207_110-0"><a data-dcnode-id="4472" href="#cite_note-FOOTNOTEAsh1974207-110"><span data-dcnode-id="4473" instrument_node="">[110]</span></a></sup><span data-dcnode-id="4470" instrument_node="">
</span></p><p data-dcnode-id="4456"><span data-dcnode-id="4468" instrument_node="">An Albanian account discussing the invasion notes, "Albania resolutely denounced this act, calling it 'an aggression of the fascist type' which 'represented the greatest debasement of the honour and authority of the Soviet Union and the Soviet people on the part of the Khrushchevite revisionist Brezhnev–Kosygin clique'&nbsp;... the Warsaw Treaty had completely been transformed from a means of defence into a means of aggression" and having been </span><i data-dcnode-id="4465"><a data-dcnode-id="4466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De_facto" title="De facto"><span data-dcnode-id="4467" instrument_node="">de facto</span></a></i><span data-dcnode-id="4464" instrument_node=""> excluded from the Pact since 1961, "on September 13, 1968, at an extraordinary session the People's Assembly of the People's Republic of Albania decided to denounce this Treaty and exonerate Albania from any obligation deriving from it."</span><sup class="reference" data-dcnode-id="4461" id="cite_ref-FOOTNOTEOmariPollo1988289–290_111-0"><a data-dcnode-id="4462" href="#cite_note-FOOTNOTEOmariPollo1988289%E2%80%93290-111"><span data-dcnode-id="4463" instrument_node="">[111]</span></a></sup><span data-dcnode-id="4460" instrument_node=""> In the 1970s, the alliance between Albania and China against perceived Soviet revisionism gradually began to break down, resulting in the </span><a data-dcnode-id="4458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Albanian_split" title="Sino-Albanian split"><span data-dcnode-id="4459" instrument_node="">Sino-Albanian split</span></a><span data-dcnode-id="4457" instrument_node="">.
</span></p><p data-dcnode-id="4450"><span data-dcnode-id="4455" instrument_node="">Writing in 1988, Ramiz Alia reiterated the Albanian view that, "The revisionist current most dangerous to the world communist movement has been and still is Soviet revisionism" and that, "To oppose the Communist Party of the Soviet Union, which had great political and theoretical authority, meant to isolate oneself, at least for a time, from most of the communist parties of the world. Precisely here lies the heroism of the Party of Labour of Albania, the majesty of its decision, and its courage and determination for the cause of Marxism–Leninism, for the cause of socialism and communism."</span><sup class="reference" data-dcnode-id="4452" id="cite_ref-FOOTNOTEAlia1988236,_238–239_112-0"><a data-dcnode-id="4453" href="#cite_note-FOOTNOTEAlia1988236,_238%E2%80%93239-112"><span data-dcnode-id="4454" instrument_node="">[112]</span></a></sup><span data-dcnode-id="4451" instrument_node="">
</span></p><p data-dcnode-id="4434"><span data-dcnode-id="4449" instrument_node="">In July 1990, after the fall of the Eastern Bloc and political upheaval in Albania itself, Alia announced the restoration of diplomatic relations with the Soviet Union.</span><sup class="reference" data-dcnode-id="4446" id="cite_ref-FOOTNOTEVickers1999215_113-0"><a data-dcnode-id="4447" href="#cite_note-FOOTNOTEVickers1999215-113"><span data-dcnode-id="4448" instrument_node="">[113]</span></a></sup><span data-dcnode-id="4445" instrument_node=""> In an official communiqué the Soviets "attributed the normalisation [of diplomatic relations] to the better political climate in Europe, and the state radio reported that, as the Soviet Union was on course for reform, 'there has been a marked trend recently towards democratisation of Albanian society'."</span><sup class="reference" data-dcnode-id="4442" id="cite_ref-FOOTNOTEKola2003196_114-0"><a data-dcnode-id="4443" href="#cite_note-FOOTNOTEKola2003196-114"><span data-dcnode-id="4444" instrument_node="">[114]</span></a></sup><span data-dcnode-id="4441" instrument_node=""> In June 1991, the ruling Party of Labour became the social-democratic </span><a data-dcnode-id="4439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Party_of_Albania" title="Socialist Party of Albania"><span data-dcnode-id="4440" instrument_node="">Socialist Party</span></a><span data-dcnode-id="4438" instrument_node="">, dropping its prior commitment to Marxism–Leninism, and in December 1991, the </span><a data-dcnode-id="4436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="4437" instrument_node="">Soviet Union was dissolved</span></a><span data-dcnode-id="4435" instrument_node="">.
</span></p><span data-dcnode-id="4433" instrument_node="">
</span><h2 data-dcnode-id="4423"><span class="mw-headline" data-dcnode-id="4431" id="See_also"><span data-dcnode-id="4432" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="4424"><span class="mw-editsection-bracket" data-dcnode-id="4429"><span data-dcnode-id="4430" instrument_node="">[</span></span><a data-dcnode-id="4427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAlbanian%25E2%2580%2593Soviet_split%26action%3Dedit%26section%3D17" title="Edit section: See also"><span data-dcnode-id="4428" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4425"><span data-dcnode-id="4426" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4422" instrument_node="">
