</span><h2 data-dcnode-id="7958"><span data-dcnode-id="7968" id="Cold_War_.281947.E2.80.931991.29"></span><span class="mw-headline" data-dcnode-id="7966" id="Cold_War_(1947–1991)"><span data-dcnode-id="7967" instrument_node="">Cold War (1947–1991)</span></span><span class="mw-editsection" data-dcnode-id="7959"><span class="mw-editsection-bracket" data-dcnode-id="7964"><span data-dcnode-id="7965" instrument_node="">[</span></span><a data-dcnode-id="7962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D20" title="Edit section: Cold War (1947–1991)"><span data-dcnode-id="7963" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7960"><span data-dcnode-id="7961" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7957" instrument_node="">
</span><link data-dcnode-id="7956" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7952" role="note"><span data-dcnode-id="7955" instrument_node="">Main article: </span><a data-dcnode-id="7953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="7954" instrument_node="">Cold War</span></a></div><span data-dcnode-id="7951" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7939"><div class="thumbinner" data-dcnode-id="7940" style="width:252px;"><a class="image" data-dcnode-id="7949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEasternBloc_BasicMembersOnly.svg"><img alt="" class="thumbimage" data-dcnode-id="7950" data-file-height="612" data-file-width="404" decoding="async" height="379" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/57/EasternBloc_BasicMembersOnly.svg/250px-EasternBloc_BasicMembersOnly.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/57/EasternBloc_BasicMembersOnly.svg/375px-EasternBloc_BasicMembersOnly.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/57/EasternBloc_BasicMembersOnly.svg/500px-EasternBloc_BasicMembersOnly.svg.png 2x" width="250"></a><span data-dcnode-id="7948" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7941"><div class="magnify" data-dcnode-id="7946"><a class="internal" data-dcnode-id="7947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AEasternBloc_BasicMembersOnly.svg" title="Enlarge"></a></div><span data-dcnode-id="7945" instrument_node="">The Soviet Union is seen in red while states in light pink were satellites; Yugoslavia, a communist state that was a Soviet ally until 1948, is marked in purple; and Albania, a communist state which ceased being allied to the Soviet Union in the 1960s after the </span><a data-dcnode-id="7943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_split" title="Sino-Soviet split"><span data-dcnode-id="7944" instrument_node="">Sino-Soviet split</span></a><span data-dcnode-id="7942" instrument_node="">, is marked in orange</span></div></div></div><span data-dcnode-id="7938" instrument_node="">
</span><h3 data-dcnode-id="7928"><span class="mw-headline" data-dcnode-id="7936" id="Europe"><span data-dcnode-id="7937" instrument_node="">Europe</span></span><span class="mw-editsection" data-dcnode-id="7929"><span class="mw-editsection-bracket" data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">[</span></span><a data-dcnode-id="7932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D21" title="Edit section: Europe"><span data-dcnode-id="7933" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7930"><span data-dcnode-id="7931" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7927" instrument_node="">
</span><link data-dcnode-id="7926" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7922" role="note"><span data-dcnode-id="7925" instrument_node="">Main article: </span><a data-dcnode-id="7923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="7924" instrument_node="">Eastern Bloc</span></a></div><span data-dcnode-id="7921" instrument_node="">
</span><p data-dcnode-id="7910"><span data-dcnode-id="7920" instrument_node="">The Soviet Union emerged from World War II devastated in human and economic terms, but much enlarged in area. Militarily it was one of the two major world powers, a position maintained for four decades through its hegemony in Eastern Europe, military strength, involvement in many countries through local Communist parties, and scientific research especially into space technology and weaponry. The Union's effort to extend its influence or control over many states and peoples resulted in the formation of a world socialist system of states. Established in 1949 as an economic bloc of communist countries led by Moscow, the </span><a class="mw-redirect" data-dcnode-id="7918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Council_for_Mutual_Economic_Assistance" title="Council for Mutual Economic Assistance"><span data-dcnode-id="7919" instrument_node="">Council for Mutual Economic Assistance</span></a><span data-dcnode-id="7917" instrument_node=""> (COMECON) served as a framework for cooperation among the planned economies of the Soviet Union, its allies in Eastern Europe and, later, Soviet allies in the </span><a data-dcnode-id="7915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World" title="Third World"><span data-dcnode-id="7916" instrument_node="">Third World</span></a><span data-dcnode-id="7914" instrument_node="">. The military counterpart to the Comecon was the </span><a data-dcnode-id="7912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="7913" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="7911" instrument_node="">.
</span></p><p data-dcnode-id="7896"><span data-dcnode-id="7909" instrument_node="">The Soviet Union concentrated on its own recovery. It seized and transferred most of Germany's industrial plants and it exacted war reparations from </span><a data-dcnode-id="7907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="7908" instrument_node="">East Germany</span></a><span data-dcnode-id="7906" instrument_node="">, </span><a data-dcnode-id="7904" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_People%2527s_Republic" title="Hungarian People's Republic"><span data-dcnode-id="7905" instrument_node="">Hungary</span></a><span data-dcnode-id="7903" instrument_node="">, </span><a data-dcnode-id="7901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialist_Republic_of_Romania" title="Socialist Republic of Romania"><span data-dcnode-id="7902" instrument_node="">Romania</span></a><span data-dcnode-id="7900" instrument_node="">, and </span><a data-dcnode-id="7898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Bulgaria" title="People's Republic of Bulgaria"><span data-dcnode-id="7899" instrument_node="">Bulgaria</span></a><span data-dcnode-id="7897" instrument_node="">, using Soviet-dominated joint enterprises. It used trading arrangements deliberately designed to favor the Soviet Union. Moscow controlled the Communist parties that ruled the satellite states, and they followed orders from the Kremlin. Historian Mark Kramer concludes:
</span></p><span data-dcnode-id="7895" instrument_node="">
</span><dl data-dcnode-id="7886"><dd data-dcnode-id="7887"><span data-dcnode-id="7894" instrument_node="">The net outflow of resources from eastern Europe to the Soviet Union was approximately $15 billion to $20 billion in the first decade after World War II, an amount roughly equal to the total aid provided by the United States to western Europe under the </span><a data-dcnode-id="7892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="7893" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="7891" instrument_node="">.</span><sup class="reference" data-dcnode-id="7888" id="cite_ref-59"><a data-dcnode-id="7889" href="#cite_note-59"><span data-dcnode-id="7890" instrument_node="">[59]</span></a></sup></dd></dl><span data-dcnode-id="7885" instrument_node="">
</span><p data-dcnode-id="7874"><span data-dcnode-id="7884" instrument_node="">Moscow considered Eastern Europe to be a buffer zone for the forward defense of its western borders and ensured its control of the region by transforming the East European countries into subservient allies. In 1956, Soviet troops crushed a </span><a data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Revolution_of_1956" title="Hungarian Revolution of 1956"><span data-dcnode-id="7883" instrument_node="">popular uprising and rebellion in Hungary</span></a><span data-dcnode-id="7881" instrument_node=""> and </span><a data-dcnode-id="7879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact_invasion_of_Czechoslovakia" title="Warsaw Pact invasion of Czechoslovakia"><span data-dcnode-id="7880" instrument_node="">acted again in 1968</span></a><span data-dcnode-id="7878" instrument_node=""> to end the Czechoslovak government's </span><a data-dcnode-id="7876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prague_Spring" title="Prague Spring"><span data-dcnode-id="7877" instrument_node="">Prague Spring</span></a><span data-dcnode-id="7875" instrument_node=""> attempts at reform. In addition to military occupation and intervention, the Soviet Union controlled Eastern European states through its ability to supply or withhold vital natural resources.
</span></p><span data-dcnode-id="7873" instrument_node="">
</span><h3 data-dcnode-id="7863"><span class="mw-headline" data-dcnode-id="7871" id="Espionage"><span data-dcnode-id="7872" instrument_node="">Espionage</span></span><span class="mw-editsection" data-dcnode-id="7864"><span class="mw-editsection-bracket" data-dcnode-id="7869"><span data-dcnode-id="7870" instrument_node="">[</span></span><a data-dcnode-id="7867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D22" title="Edit section: Espionage"><span data-dcnode-id="7868" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7865"><span data-dcnode-id="7866" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7862" instrument_node="">
</span><link data-dcnode-id="7861" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7857" role="note"><span data-dcnode-id="7860" instrument_node="">Main article: </span><a class="mw-redirect" data-dcnode-id="7858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_espionage" title="Soviet espionage"><span data-dcnode-id="7859" instrument_node="">Soviet espionage</span></a></div><span data-dcnode-id="7856" instrument_node="">
</span><p data-dcnode-id="7840"><span data-dcnode-id="7855" instrument_node="">All sides in the Cold War engaged in espionage. The Soviet </span><a data-dcnode-id="7853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KGB" title="KGB"><span data-dcnode-id="7854" instrument_node="">KGB</span></a><span data-dcnode-id="7852" instrument_node=""> ("Committee for State Security"), the bureau responsible for foreign espionage and internal surveillance, was famous for its effectiveness.</span><sup class="reference" data-dcnode-id="7849" id="cite_ref-60"><a data-dcnode-id="7850" href="#cite_note-60"><span data-dcnode-id="7851" instrument_node="">[60]</span></a></sup><span data-dcnode-id="7848" instrument_node=""> A massive network of informants throughout the Soviet Union was used to monitor dissent from official Soviet politics and morals.</span><sup class="reference" data-dcnode-id="7845" id="cite_ref-61"><a data-dcnode-id="7846" href="#cite_note-61"><span data-dcnode-id="7847" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="7842" id="cite_ref-62"><a data-dcnode-id="7843" href="#cite_note-62"><span data-dcnode-id="7844" instrument_node="">[62]</span></a></sup><span data-dcnode-id="7841" instrument_node="">
</span></p><p data-dcnode-id="7835"><span data-dcnode-id="7839" instrument_node="">Historian </span><a data-dcnode-id="7837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Raymond_L._Garthoff" title="Raymond L. Garthoff"><span data-dcnode-id="7838" instrument_node="">Raymond L. Garthoff</span></a><span data-dcnode-id="7836" instrument_node=""> concludes there probably was parity in the quantity and quality of secret information obtained by each side. The Soviets probably had an advantage in terms of HUMINT (espionage) and "sometimes in its reach into high policy circles." Did it matter? In terms of decisive impact Garthoff concludes:
</span></p><span data-dcnode-id="7834" instrument_node="">
</span><dl data-dcnode-id="7828"><dd data-dcnode-id="7829"><span data-dcnode-id="7833" instrument_node="">We also can now have high confidence in the judgment that there were no successful “moles” at the political decision-making level on either side. Similarly, there is no evidence, on either side, of any major political or military decision that was prematurely discovered through espionage and thwarted by the other side. There also is no evidence of any major political or military decision that was crucially influenced (much less generated) by an agent of the other side.</span><sup class="reference" data-dcnode-id="7830" id="cite_ref-63"><a data-dcnode-id="7831" href="#cite_note-63"><span data-dcnode-id="7832" instrument_node="">[63]</span></a></sup></dd></dl><span data-dcnode-id="7827" instrument_node="">
</span><p data-dcnode-id="7821"><span data-dcnode-id="7826" instrument_node="">in terms of the impact of intelligence on national policy it was not so much the minute details, or capture of top-secret plans that mattered most. Instead, every major country used its intelligence services to develop complex images of their adversaries, and to predict to the top leadership what they would do next.</span><sup class="reference" data-dcnode-id="7823" id="cite_ref-64"><a data-dcnode-id="7824" href="#cite_note-64"><span data-dcnode-id="7825" instrument_node="">[64]</span></a></sup><span data-dcnode-id="7822" instrument_node="">
</span></p><p data-dcnode-id="7785"><span data-dcnode-id="7820" instrument_node="">The USSR and </span><a data-dcnode-id="7818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/East_Germany" title="East Germany"><span data-dcnode-id="7819" instrument_node="">East Germany</span></a><span data-dcnode-id="7817" instrument_node=""> proved especially successful in placing spies in Britain and </span><a data-dcnode-id="7815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Germany" title="West Germany"><span data-dcnode-id="7816" instrument_node="">West Germany</span></a><span data-dcnode-id="7814" instrument_node="">. Moscow was largely unable to repeat its successes from 1933 to 1945 in the United States. NATO, on the other hand, also had a few successes of importance, of whom </span><a data-dcnode-id="7812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oleg_Gordievsky" title="Oleg Gordievsky"><span data-dcnode-id="7813" instrument_node="">Oleg Gordievsky</span></a><span data-dcnode-id="7811" instrument_node=""> was perhaps the most influential. He was a senior KGB officer who was a double agent on behalf of Britain's </span><a class="mw-redirect" data-dcnode-id="7809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Secret_Intelligence_Service" title="Secret Intelligence Service"><span data-dcnode-id="7810" instrument_node="">MI6</span></a><span data-dcnode-id="7808" instrument_node="">, providing a stream of high-grade intelligence that had an important influence on the thinking of </span><a data-dcnode-id="7806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Thatcher" title="Margaret Thatcher"><span data-dcnode-id="7807" instrument_node="">Margaret Thatcher</span></a><span data-dcnode-id="7805" instrument_node=""> and </span><a data-dcnode-id="7803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="7804" instrument_node="">Ronald Reagan</span></a><span data-dcnode-id="7802" instrument_node=""> in the 1980s. He was spotted by </span><a data-dcnode-id="7800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aldrich_Ames" title="Aldrich Ames"><span data-dcnode-id="7801" instrument_node="">Aldrich Ames</span></a><span data-dcnode-id="7799" instrument_node=""> a Soviet agent who worked for the </span><a data-dcnode-id="7797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Central_Intelligence_Agency" title="Central Intelligence Agency"><span data-dcnode-id="7798" instrument_node="">CIA</span></a><span data-dcnode-id="7796" instrument_node="">, but he was successfully exfiltrated from Moscow in 1985. Biographer Ben McIntyre argues he was the West's most valuable human asset, especially for his deep psychological insights into the inner circles of the Kremlin. He convinced Washington and London that the fierceness and bellicosity of the Kremlin was a product of fear, and military weakness, rather than an urge for world conquest. Thatcher and Reagan concluded they could moderate their own </span><a data-dcnode-id="7794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Sovietism" title="Anti-Sovietism"><span data-dcnode-id="7795" instrument_node="">anti-Soviet rhetoric</span></a><span data-dcnode-id="7793" instrument_node="">, as successfully happened when </span><a data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7792" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7790" instrument_node=""> took power, thus ending the Cold War.</span><sup class="reference" data-dcnode-id="7787" id="cite_ref-65"><a data-dcnode-id="7788" href="#cite_note-65"><span data-dcnode-id="7789" instrument_node="">[65]</span></a></sup><span data-dcnode-id="7786" instrument_node="">
</span></p><span data-dcnode-id="7784" instrument_node="">
</span><h3 data-dcnode-id="7774"><span class="mw-headline" data-dcnode-id="7782" id="Sub-Saharan_Africa"><span data-dcnode-id="7783" instrument_node="">Sub-Saharan Africa</span></span><span class="mw-editsection" data-dcnode-id="7775"><span class="mw-editsection-bracket" data-dcnode-id="7780"><span data-dcnode-id="7781" instrument_node="">[</span></span><a data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D23" title="Edit section: Sub-Saharan Africa"><span data-dcnode-id="7779" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7776"><span data-dcnode-id="7777" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7773" instrument_node="">
</span><link data-dcnode-id="7772" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7768" role="note"><span data-dcnode-id="7771" instrument_node="">Main article: </span><a data-dcnode-id="7769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Africa%25E2%2580%2593Soviet_Union_relations" title="Africa–Soviet Union relations"><span data-dcnode-id="7770" instrument_node="">Africa–Soviet Union relations</span></a></div><span data-dcnode-id="7767" instrument_node="">
</span><p data-dcnode-id="7759"><span data-dcnode-id="7766" instrument_node="">Stalin made </span><a data-dcnode-id="7764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Africa" title="Africa"><span data-dcnode-id="7765" instrument_node="">Africa</span></a><span data-dcnode-id="7763" instrument_node=""> a very low priority, and discouraged relationships or studies of the continent. However, the </span><a data-dcnode-id="7761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decolonisation_of_Africa" title="Decolonisation of Africa"><span data-dcnode-id="7762" instrument_node="">decolonization</span></a><span data-dcnode-id="7760" instrument_node=""> process of the 1950s and early 1960s opened new opportunities, which Soviet leader Nikita Khrushchev was eager to exploit.
</span></p><p data-dcnode-id="7757"><span data-dcnode-id="7758" instrument_node="">The Kremlin developed four major long-term policy goals:
</span></p><span data-dcnode-id="7756" instrument_node="">
</span><ul data-dcnode-id="7738"><li data-dcnode-id="7754"><span data-dcnode-id="7755" instrument_node="">to gain a lasting presence on the continent,</span></li><span data-dcnode-id="7753" instrument_node="">
</span><li data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">to gain a voice in African affairs,</span></li><span data-dcnode-id="7750" instrument_node="">
</span><li data-dcnode-id="7745"><span data-dcnode-id="7749" instrument_node="">to undermine Western/NATO influence, especially by identifying capitalism with </span><a data-dcnode-id="7747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Imperialism" title="Imperialism"><span data-dcnode-id="7748" instrument_node="">Western imperialism</span></a><span data-dcnode-id="7746" instrument_node="">,</span></li><span data-dcnode-id="7744" instrument_node="">
</span><li data-dcnode-id="7739"><span data-dcnode-id="7743" instrument_node="">and, after 1962, it fought hard to prevent the </span><a data-dcnode-id="7741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="7742" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="7740" instrument_node=""> from developing its own countervailing presence.</span></li></ul><span data-dcnode-id="7737" instrument_node="">
</span><p data-dcnode-id="7719"><span data-dcnode-id="7736" instrument_node="">At no time was Moscow willing to engage in combat in Africa, although its ally </span><a data-dcnode-id="7734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="7735" instrument_node="">Cuba</span></a><span data-dcnode-id="7733" instrument_node=""> did so. Indeed, the Kremlin at first assumed that the Russian model of socialized development would prove attractive to Africans eager to modernize. That did not happen, and instead, the Soviets emphasized identifying likely analyze and giving them financial aid and munitions, as well as credits to purchase from the Soviet bloc. Although some countries became allies for a while, including </span><a data-dcnode-id="7731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Angola" title="People's Republic of Angola"><span data-dcnode-id="7732" instrument_node="">Angola</span></a><span data-dcnode-id="7730" instrument_node="">, </span><a data-dcnode-id="7728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Somali_Democratic_Republic" title="Somali Democratic Republic"><span data-dcnode-id="7729" instrument_node="">Somalia</span></a><span data-dcnode-id="7727" instrument_node="">, and </span><a data-dcnode-id="7725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Democratic_Republic_of_Ethiopia" title="People's Democratic Republic of Ethiopia"><span data-dcnode-id="7726" instrument_node="">Ethiopia</span></a><span data-dcnode-id="7724" instrument_node="">, the connections proved temporary. With the collapse of the Soviet Union in 1991, Russian influence greatly diminished.</span><sup class="reference" data-dcnode-id="7721" id="cite_ref-66"><a data-dcnode-id="7722" href="#cite_note-66"><span data-dcnode-id="7723" instrument_node="">[66]</span></a></sup><span data-dcnode-id="7720" instrument_node="">
</span></p><span data-dcnode-id="7718" instrument_node="">
</span><h3 data-dcnode-id="7708"><span class="mw-headline" data-dcnode-id="7716" id="Middle_East_and_North_Africa"><span data-dcnode-id="7717" instrument_node="">Middle East and North Africa</span></span><span class="mw-editsection" data-dcnode-id="7709"><span class="mw-editsection-bracket" data-dcnode-id="7714"><span data-dcnode-id="7715" instrument_node="">[</span></span><a data-dcnode-id="7712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D24" title="Edit section: Middle East and North Africa"><span data-dcnode-id="7713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7710"><span data-dcnode-id="7711" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7707" instrument_node="">
</span><link data-dcnode-id="7706" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7699" role="note"><span data-dcnode-id="7705" instrument_node="">Main articles: </span><a data-dcnode-id="7703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union_and_the_Arab%25E2%2580%2593Israeli_conflict" title="Soviet Union and the Arab–Israeli conflict"><span data-dcnode-id="7704" instrument_node="">Soviet Union and the Arab–Israeli conflict</span></a><span data-dcnode-id="7702" instrument_node=""> and </span><a data-dcnode-id="7700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Middle_Eastern_foreign_policy_during_the_Cold_War" title="Soviet Middle Eastern foreign policy during the Cold War"><span data-dcnode-id="7701" instrument_node="">Soviet Middle Eastern foreign policy during the Cold War</span></a></div><span data-dcnode-id="7698" instrument_node="">
</span><h4 data-dcnode-id="7688"><span class="mw-headline" data-dcnode-id="7696" id="Relations_with_Israel"><span data-dcnode-id="7697" instrument_node="">Relations with Israel</span></span><span class="mw-editsection" data-dcnode-id="7689"><span class="mw-editsection-bracket" data-dcnode-id="7694"><span data-dcnode-id="7695" instrument_node="">[</span></span><a data-dcnode-id="7692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D25" title="Edit section: Relations with Israel"><span data-dcnode-id="7693" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7690"><span data-dcnode-id="7691" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7687" instrument_node="">
</span><p data-dcnode-id="7662"><span data-dcnode-id="7686" instrument_node="">The first source of tension in relations between Israel and the Soviet Union occurred on February 9, 1953 (four weeks before the death of </span><a data-dcnode-id="7684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="7685" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="7683" instrument_node="">), when the USSR severed relations with </span><a data-dcnode-id="7681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="7682" instrument_node="">Israel</span></a><span data-dcnode-id="7680" instrument_node="">. The USSR used a bomb incident against the Soviet Legation in </span><a data-dcnode-id="7678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tel_Aviv" title="Tel Aviv"><span data-dcnode-id="7679" instrument_node="">Tel Aviv</span></a><span data-dcnode-id="7677" instrument_node=""> as an excuse to end relations and claimed that the government was responsible.</span><sup class="reference" data-dcnode-id="7674" id="cite_ref-Govrin_67-0"><a data-dcnode-id="7675" href="#cite_note-Govrin-67"><span data-dcnode-id="7676" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7673" instrument_node=""> The Israeli government received this news with shock and concern. This was the first breach in diplomatic relations that Israel had experienced with a superpower. There is a general consensus that Israeli charges against the USSR </span><a class="mw-redirect" data-dcnode-id="7671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doctors%2527_Plot" title="Doctors' Plot"><span data-dcnode-id="7672" instrument_node="">Doctors' Plot</span></a><span data-dcnode-id="7670" instrument_node=""> and public want for improvement for the </span><a data-dcnode-id="7668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_the_Jews_in_the_Soviet_Union" title="History of the Jews in the Soviet Union"><span data-dcnode-id="7669" instrument_node="">Soviet Jews</span></a><span data-dcnode-id="7667" instrument_node=""> were deciding factors. Without Israel's fierce hostility to the false allegations of the Doctors' Plot, the Soviet Union most likely would not have ended relations. After the rupture, Israel continued to speak out against the Doctors' Plot, and successfully attracted international attention.</span><sup class="reference" data-dcnode-id="7664" id="cite_ref-Govrin_67-1"><a data-dcnode-id="7665" href="#cite_note-Govrin-67"><span data-dcnode-id="7666" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7663" instrument_node="">
</span></p><p data-dcnode-id="7650"><span data-dcnode-id="7661" instrument_node="">After the </span><a data-dcnode-id="7659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Death_of_Joseph_Smith" title="Death of Joseph Smith"><span data-dcnode-id="7660" instrument_node="">death of Stalin</span></a><span data-dcnode-id="7658" instrument_node=""> in 1953, the Soviet Union's foreign policy was less hostile. The new Soviet Prime Minister, </span><a data-dcnode-id="7656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyacheslav_Molotov" title="Vyacheslav Molotov"><span data-dcnode-id="7657" instrument_node="">Vyacheslav Molotov</span></a><span data-dcnode-id="7655" instrument_node="">, presented a new policy of openness and peacefulness. This new policy inspired Israel to initiate relations with the USSR again, on condition that Israel would no longer criticize the USSR publicly, especially regarding the Soviet Jews. Moscow began to support the Arab states in the Arab-Israeli conflict in order to use this conflict for its own confrontation with the West.</span><sup class="reference" data-dcnode-id="7652" id="cite_ref-Govrin_67-2"><a data-dcnode-id="7653" href="#cite_note-Govrin-67"><span data-dcnode-id="7654" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7651" instrument_node="">
</span></p><p data-dcnode-id="7620"><span data-dcnode-id="7649" instrument_node="">On February 2, 1958</span><sup class="reference" data-dcnode-id="7646" id="cite_ref-68"><a data-dcnode-id="7647" href="#cite_note-68"><span data-dcnode-id="7648" instrument_node="">[68]</span></a></sup><span data-dcnode-id="7645" instrument_node=""> </span><a data-dcnode-id="7643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egypt" title="Egypt"><span data-dcnode-id="7644" instrument_node="">Egypt</span></a><span data-dcnode-id="7642" instrument_node=""> and </span><a data-dcnode-id="7640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Syrian_Republic" title="Second Syrian Republic"><span data-dcnode-id="7641" instrument_node="">Syria</span></a><span data-dcnode-id="7639" instrument_node=""> declared the establishment of a common federation: the </span><a data-dcnode-id="7637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Republic" title="United Arab Republic"><span data-dcnode-id="7638" instrument_node="">United Arab Republic</span></a><span data-dcnode-id="7636" instrument_node="">.</span><sup class="reference" data-dcnode-id="7633" id="cite_ref-Govrin_67-3"><a data-dcnode-id="7634" href="#cite_note-Govrin-67"><span data-dcnode-id="7635" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7632" instrument_node=""> The destruction of Israel was their main goal. In 1955, the USSR made an arms deal with Egypt.</span><sup class="reference" data-dcnode-id="7629" id="cite_ref-Primakov_69-0"><a data-dcnode-id="7630" href="#cite_note-Primakov-69"><span data-dcnode-id="7631" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7628" instrument_node=""> This angered Israel. While Britain sided with the US and agreed to withhold further funding for the construction of Egypt's </span><a data-dcnode-id="7626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aswan_Dam" title="Aswan Dam"><span data-dcnode-id="7627" instrument_node="">Aswan Dam</span></a><span data-dcnode-id="7625" instrument_node=""> in July 1956, Britain was also furious at the action and believed that America's withdrawal of aid had provided the opening for Soviet penetration of Egypt.</span><sup class="reference" data-dcnode-id="7622" id="cite_ref-aswane_70-0"><a data-dcnode-id="7623" href="#cite_note-aswane-70"><span data-dcnode-id="7624" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7621" instrument_node=""> Both Britain and Israel now saw Egypt as a threat to regional stability.
</span></p><p data-dcnode-id="7600"><span data-dcnode-id="7619" instrument_node="">The </span><a data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_Crisis" title="Suez Crisis"><span data-dcnode-id="7618" instrument_node="">Suez Crisis</span></a><span data-dcnode-id="7616" instrument_node=""> occurred in the second half of 1956. At this time, Britain, France and Israel invaded Egypt, claiming that they were protecting the </span><a data-dcnode-id="7614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suez_Canal" title="Suez Canal"><span data-dcnode-id="7615" instrument_node="">Suez Canal</span></a><span data-dcnode-id="7613" instrument_node="">.</span><sup class="reference" data-dcnode-id="7610" id="cite_ref-aswane_70-1"><a data-dcnode-id="7611" href="#cite_note-aswane-70"><span data-dcnode-id="7612" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7609" instrument_node=""> The USSR saw this event as a threat to its security and international prestige by the West.</span><sup class="reference" data-dcnode-id="7606" id="cite_ref-Primakov_69-1"><a data-dcnode-id="7607" href="#cite_note-Primakov-69"><span data-dcnode-id="7608" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7605" instrument_node=""> Britain and France lost prestige when the United States opposed the invasion and forced a withdrawal. The Suez Crisis was the first clash between Israel's security interests and the strategic interests of the USSR in the Middle East.</span><sup class="reference" data-dcnode-id="7602" id="cite_ref-Primakov_69-2"><a data-dcnode-id="7603" href="#cite_note-Primakov-69"><span data-dcnode-id="7604" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7601" instrument_node="">
</span></p><p data-dcnode-id="7587"><span data-dcnode-id="7599" instrument_node="">On June 5, 1967 the </span><a data-dcnode-id="7597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Six-Day_War" title="Six-Day War"><span data-dcnode-id="7598" instrument_node="">Six-Day War</span></a><span data-dcnode-id="7596" instrument_node=""> commenced.</span><sup class="reference" data-dcnode-id="7593" id="cite_ref-Morozov_71-0"><a data-dcnode-id="7594" href="#cite_note-Morozov-71"><span data-dcnode-id="7595" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7592" instrument_node=""> Immediately, the Soviet Union went to the United Nations to stop the war and remove Israeli forces from the border. The USSR threatened to break off relations with Israel. The USSR never wanted a war to occur in the Middle East. By June 10, the Soviet Union threatened to intervene militarily if Israel did not stop its advance towards Syria.</span><sup class="reference" data-dcnode-id="7589" id="cite_ref-Morozov_71-1"><a data-dcnode-id="7590" href="#cite_note-Morozov-71"><span data-dcnode-id="7591" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7588" instrument_node="">
</span></p><p data-dcnode-id="7579"><span data-dcnode-id="7586" instrument_node="">In March 1985 </span><a data-dcnode-id="7584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="7585" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="7583" instrument_node=""> became the Secretary General of the CPSU and in April he declared </span><a data-dcnode-id="7581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="7582" instrument_node="">Perestroika</span></a><span data-dcnode-id="7580" instrument_node="">. It took more than 6 years before Moscow consented to restore diplomatic relations with Israel on October 19, 1991, just 2 months prior to the collapse of the USSR.
</span></p><span data-dcnode-id="7578" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7562"><div class="thumbinner" data-dcnode-id="7563" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="7572"><video class="thumbimage" data-dcnode-id="7577" data-durationhint="1162" data-mwprovider="wikimediacommons" data-mwtitle="Soviet_Union_Welcomes_Nasser.ogv" disabled="disabled" height="165" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/d/d1/Soviet_Union_Welcomes_Nasser.ogv/220px--Soviet_Union_Welcomes_Nasser.ogv.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="7575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_Welcomes_Nasser.ogv" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="7576"></span></a><span aria-label="19 minutes and 22 seconds" class="mw-tmh-duration mw-tmh-label" data-dcnode-id="7573"><span data-dcnode-id="7574" instrument_node="">19:22</span></span></span><span data-dcnode-id="7571" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7564"><div class="magnify" data-dcnode-id="7569"><a class="internal" data-dcnode-id="7570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASoviet_Union_Welcomes_Nasser.ogv" title="Enlarge"></a></div><span data-dcnode-id="7568" instrument_node="">The Soviet Union welcomes </span><a class="mw-redirect" data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nasser" title="Nasser"><span data-dcnode-id="7567" instrument_node="">Nasser</span></a><span data-dcnode-id="7565" instrument_node=""> in 1958</span></div></div></div><span data-dcnode-id="7561" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7552"><div class="thumbinner" data-dcnode-id="7553" style="width:222px;"><a class="image" data-dcnode-id="7559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1961_CPA_2566_%281%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="7560" data-file-height="810" data-file-width="817" decoding="async" height="218" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/1961_CPA_2566_%25281%2529.jpg/220px-1961_CPA_2566_%25281%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8f/1961_CPA_2566_%281%29.jpg/330px-1961_CPA_2566_%281%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8f/1961_CPA_2566_%281%29.jpg/440px-1961_CPA_2566_%281%29.jpg 2x" width="220"></a><span data-dcnode-id="7558" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7554"><div class="magnify" data-dcnode-id="7556"><a class="internal" data-dcnode-id="7557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A1961_CPA_2566_%281%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="7555" instrument_node="">1961 Soviet postage stamp</span></div></div></div><span data-dcnode-id="7551" instrument_node="">
</span><h5 data-dcnode-id="7541"><span class="mw-headline" data-dcnode-id="7549" id="Six-Day_War_against_Israel"><span data-dcnode-id="7550" instrument_node="">Six-Day War against Israel</span></span><span class="mw-editsection" data-dcnode-id="7542"><span class="mw-editsection-bracket" data-dcnode-id="7547"><span data-dcnode-id="7548" instrument_node="">[</span></span><a data-dcnode-id="7545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D26" title="Edit section: Six-Day War against Israel"><span data-dcnode-id="7546" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7543"><span data-dcnode-id="7544" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7540" instrument_node="">
</span><link data-dcnode-id="7539" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7535" role="note"><span data-dcnode-id="7538" instrument_node="">Main article: </span><a data-dcnode-id="7536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Six-Day_War" title="Six-Day War"><span data-dcnode-id="7537" instrument_node="">Six-Day War</span></a></div><span data-dcnode-id="7534" instrument_node="">
</span><p data-dcnode-id="7515"><span data-dcnode-id="7533" instrument_node="">On June 5, 1967, the </span><a data-dcnode-id="7531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Six-Day_War" title="Six-Day War"><span data-dcnode-id="7532" instrument_node="">Six-Day War</span></a><span data-dcnode-id="7530" instrument_node=""> began. During the war, the </span><a data-dcnode-id="7528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Republic" title="United Arab Republic"><span data-dcnode-id="7529" instrument_node="">United Arab Republic</span></a><span data-dcnode-id="7527" instrument_node=""> asked the Soviet Union for more arms, but the Soviet Union denied its request because it wanted the war to end. The war ended in the defeat of the UAR and Syria on June 10. Once the war was over, though, the Soviet Union was satisfied with the state of the Middle East and gave weapons to the Arabs in order to repair relations with them. For the Soviet Union, defeat meant that its position in the Middle East was impaired and its weapons and military training were given a poor reputation.</span><sup class="reference" data-dcnode-id="7524" id="cite_ref-Morozov_71-2"><a data-dcnode-id="7525" href="#cite_note-Morozov-71"><span data-dcnode-id="7526" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7523" instrument_node=""> Following this loss, </span><a data-dcnode-id="7521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamal_Abdel_Nasser" title="Gamal Abdel Nasser"><span data-dcnode-id="7522" instrument_node="">Gamal Abdel Nasser</span></a><span data-dcnode-id="7520" instrument_node=""> agreed to allow the Soviets to keep military bases in the country.</span><sup class="reference" data-dcnode-id="7517" id="cite_ref-72"><a data-dcnode-id="7518" href="#cite_note-72"><span data-dcnode-id="7519" instrument_node="">[72]</span></a></sup><span data-dcnode-id="7516" instrument_node="">
</span></p><span data-dcnode-id="7514" instrument_node="">
</span><h4 data-dcnode-id="7504"><span class="mw-headline" data-dcnode-id="7512" id="Egypt"><span data-dcnode-id="7513" instrument_node="">Egypt</span></span><span class="mw-editsection" data-dcnode-id="7505"><span class="mw-editsection-bracket" data-dcnode-id="7510"><span data-dcnode-id="7511" instrument_node="">[</span></span><a data-dcnode-id="7508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D27" title="Edit section: Egypt"><span data-dcnode-id="7509" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7506"><span data-dcnode-id="7507" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7503" instrument_node="">
</span><p data-dcnode-id="7487"><span data-dcnode-id="7502" instrument_node="">In 1955, </span><a data-dcnode-id="7500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egypt" title="Egypt"><span data-dcnode-id="7501" instrument_node="">Egypt</span></a><span data-dcnode-id="7499" instrument_node=""> made an arms deal with </span><a data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovakia" title="Czechoslovakia"><span data-dcnode-id="7498" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="7496" instrument_node="">.</span><sup class="reference" data-dcnode-id="7493" id="cite_ref-Primakov_69-3"><a data-dcnode-id="7494" href="#cite_note-Primakov-69"><span data-dcnode-id="7495" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7492" instrument_node=""> This was technically a deal between Egypt and the Soviet Union because Czechoslovakia had Soviet arms. At this point, Egypt was neutral towards the Soviet Union and made the deal to manipulate the United States into giving it financial aid. The arms deal was the Soviet Union's first step in creating relations with Arab states and gaining a foothold in the Middle East for expansion and domination.</span><sup class="reference" data-dcnode-id="7489" id="cite_ref-Primakov_69-4"><a data-dcnode-id="7490" href="#cite_note-Primakov-69"><span data-dcnode-id="7491" instrument_node="">[69]</span></a></sup><span data-dcnode-id="7488" instrument_node="">
</span></p><p data-dcnode-id="7435"><span data-dcnode-id="7486" instrument_node="">US Secretary of State </span><a data-dcnode-id="7484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Foster_Dulles" title="John Foster Dulles"><span data-dcnode-id="7485" instrument_node="">John Foster Dulles</span></a><span data-dcnode-id="7483" instrument_node=""> was deeply suspicious of Egyptian president </span><a data-dcnode-id="7481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gamal_Abdel_Nasser" title="Gamal Abdel Nasser"><span data-dcnode-id="7482" instrument_node="">Gamal Abdel Nasser</span></a><span data-dcnode-id="7480" instrument_node="">, whom he believed to be a reckless and dangerous </span><a data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_nationalism" title="Arab nationalism"><span data-dcnode-id="7479" instrument_node="">nationalist</span></a><span data-dcnode-id="7477" instrument_node="">.</span><sup class="reference" data-dcnode-id="7474" id="cite_ref-aswane_70-2"><a data-dcnode-id="7475" href="#cite_note-aswane-70"><span data-dcnode-id="7476" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7473" instrument_node=""> Following Egypt's arms deal with Czechoslovakia, however, others in the Eisenhower administration convinced Dulles that the American aid might pull Nasser back from his relationship with the Soviet Union and prevent the growth of Soviet power in the Middle East.</span><sup class="reference" data-dcnode-id="7470" id="cite_ref-aswane_70-3"><a data-dcnode-id="7471" href="#cite_note-aswane-70"><span data-dcnode-id="7472" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7469" instrument_node=""> In December 1955, Secretary Dulles announced that the United States, together with Great Britain, was providing nearly $75 million in </span><a data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States_foreign_aid" title="United States foreign aid"><span data-dcnode-id="7468" instrument_node="">foreign aid</span></a><span data-dcnode-id="7466" instrument_node=""> to Egypt to help in the construction of the </span><a data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aswan_Dam" title="Aswan Dam"><span data-dcnode-id="7465" instrument_node="">Aswan Dam</span></a><span data-dcnode-id="7463" instrument_node=""> on the </span><a data-dcnode-id="7461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nile" title="Nile"><span data-dcnode-id="7462" instrument_node="">Nile River</span></a><span data-dcnode-id="7460" instrument_node="">.</span><sup class="reference" data-dcnode-id="7457" id="cite_ref-aswane_70-4"><a data-dcnode-id="7458" href="#cite_note-aswane-70"><span data-dcnode-id="7459" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7456" instrument_node=""> In response to Nasser's increasing attacks on Western colonialism and imperialism and Egypt's continued alliance with the Soviet Union,</span><sup class="reference" data-dcnode-id="7453" id="cite_ref-aswane_70-5"><a data-dcnode-id="7454" href="#cite_note-aswane-70"><span data-dcnode-id="7455" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7452" instrument_node=""> Britain and the United States withdrew funds for the Aswan Dam in July 1956.</span><sup class="reference" data-dcnode-id="7449" id="cite_ref-aswane_70-6"><a data-dcnode-id="7450" href="#cite_note-aswane-70"><span data-dcnode-id="7451" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7448" instrument_node=""> That action drove Egypt further toward an alliance with the Soviet Union and was a contributing factor to the Suez Crisis later in 1956.</span><sup class="reference" data-dcnode-id="7445" id="cite_ref-aswane_70-7"><a data-dcnode-id="7446" href="#cite_note-aswane-70"><span data-dcnode-id="7447" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7444" instrument_node=""> Nasser responded to the aid cut by nationalizing the Suez Canal and the Soviets then rushed to Egypt's aid;</span><sup class="reference" data-dcnode-id="7441" id="cite_ref-aswane_70-8"><a data-dcnode-id="7442" href="#cite_note-aswane-70"><span data-dcnode-id="7443" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7440" instrument_node=""> the Aswan Dam was officially opened in 1964.</span><sup class="reference" data-dcnode-id="7437" id="cite_ref-aswane_70-9"><a data-dcnode-id="7438" href="#cite_note-aswane-70"><span data-dcnode-id="7439" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7436" instrument_node="">
</span></p><p data-dcnode-id="7399"><span data-dcnode-id="7434" instrument_node="">During the 1956 Suez Crisis, the Soviet Union sided with Egypt. The USSR viewed the nationalization of the Suez Canal as important to the removal of Western influence from within the Middle East.</span><sup class="reference" data-dcnode-id="7431" id="cite_ref-Govrin_67-4"><a data-dcnode-id="7432" href="#cite_note-Govrin-67"><span data-dcnode-id="7433" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7430" instrument_node=""> Additionally, the Soviet Union was willing to fund Egypt because in return, it received access to warm-water ports, which it desperately needed to spread its influence. Though US President </span><a data-dcnode-id="7428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_D._Eisenhower" title="Dwight D. Eisenhower"><span data-dcnode-id="7429" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="7427" instrument_node=""> was also infuriated at the invasion and had successfully brought an end to end to Suez Crisis by pressuring the invading forces to withdraw from Egypt by early 1957,</span><sup class="reference" data-dcnode-id="7424" id="cite_ref-aswane_70-10"><a data-dcnode-id="7425" href="#cite_note-aswane-70"><span data-dcnode-id="7426" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7423" instrument_node=""> the United States continued to maintain good relations with Britain, France and Israel and sought to limit Soviet ally Nasser's influence, thus damaging its relations with the Middle East for the next 35 years.</span><sup class="reference" data-dcnode-id="7420" id="cite_ref-aswane_70-11"><a data-dcnode-id="7421" href="#cite_note-aswane-70"><span data-dcnode-id="7422" instrument_node="">[70]</span></a></sup><span data-dcnode-id="7419" instrument_node=""> By continuing to side with Egypt, the Soviet Union gained more prestige in the Middle East and succeeded in intimidating its superpower opponent, the United States.</span><sup class="reference" data-dcnode-id="7416" id="cite_ref-Govrin_67-5"><a data-dcnode-id="7417" href="#cite_note-Govrin-67"><span data-dcnode-id="7418" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7415" instrument_node=""> Nasser's </span><a class="mw-redirect" data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pan-Arab" title="Pan-Arab"><span data-dcnode-id="7414" instrument_node="">pan-Arab</span></a><span data-dcnode-id="7412" instrument_node=""> influence spread throughout the Middle East and he soon gained a popular image among those who resented Western colonialism. In spite of his alliance with the Soviet Union, Nasser would not sign a military alliance pact with the nation; made efforts to prevent the spread of </span><a data-dcnode-id="7410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sphere_of_influence" title="Sphere of influence"><span data-dcnode-id="7411" instrument_node="">Communism and other foreign influences</span></a><span data-dcnode-id="7409" instrument_node=""> throughout the </span><a class="mw-redirect" data-dcnode-id="7407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_region" title="Arab region"><span data-dcnode-id="7408" instrument_node="">Arab region</span></a><span data-dcnode-id="7406" instrument_node=""> by forming a civil union with Syria known as the </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Arab_Republic" title="United Arab Republic"><span data-dcnode-id="7405" instrument_node="">United Arab Republic</span></a><span data-dcnode-id="7403" instrument_node=""> (UAR)—a nation which he had hoped other Arab states would eventually join as well—in 1958; and was a founding father of the </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Aligned_Movement" title="Non-Aligned Movement"><span data-dcnode-id="7402" instrument_node="">Non-Aligned Movement</span></a><span data-dcnode-id="7400" instrument_node=""> in 1961; though the union with Syria collapsed in 1961, Egypt would still be officially known as the United Arab Republic for a while longer.
</span></p><span data-dcnode-id="7398" instrument_node="">
</span><h5 data-dcnode-id="7388"><span class="mw-headline" data-dcnode-id="7396" id="Egypt_and_Israel"><span data-dcnode-id="7397" instrument_node="">Egypt and Israel</span></span><span class="mw-editsection" data-dcnode-id="7389"><span class="mw-editsection-bracket" data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">[</span></span><a data-dcnode-id="7392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D28" title="Edit section: Egypt and Israel"><span data-dcnode-id="7393" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7390"><span data-dcnode-id="7391" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7387" instrument_node="">
</span><p data-dcnode-id="7328"><span data-dcnode-id="7386" instrument_node="">By 1969, Nasser had formed an alliance with Jordan's </span><a data-dcnode-id="7384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hussein_of_Jordan" title="Hussein of Jordan"><span data-dcnode-id="7385" instrument_node="">King Hussein</span></a><span data-dcnode-id="7383" instrument_node=""> and started to move towards cementing peace with Israel in exchange for the return of the </span><a data-dcnode-id="7381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinai_Peninsula" title="Sinai Peninsula"><span data-dcnode-id="7382" instrument_node="">Sinai Peninsula</span></a><span data-dcnode-id="7380" instrument_node=""> and the formation of a </span><a class="mw-redirect" data-dcnode-id="7378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinian_state" title="Palestinian state"><span data-dcnode-id="7379" instrument_node="">Palestinian state</span></a><span data-dcnode-id="7377" instrument_node=""> in the </span><a data-dcnode-id="7375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaza_Strip" title="Gaza Strip"><span data-dcnode-id="7376" instrument_node="">Gaza Strip</span></a><span data-dcnode-id="7374" instrument_node=""> and </span><a data-dcnode-id="7372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Bank" title="West Bank"><span data-dcnode-id="7373" instrument_node="">West Bank</span></a><span data-dcnode-id="7371" instrument_node="">.</span><sup class="reference" data-dcnode-id="7368" id="cite_ref-73"><a data-dcnode-id="7369" href="#cite_note-73"><span data-dcnode-id="7370" instrument_node="">[73]</span></a></sup><span data-dcnode-id="7367" instrument_node=""> On September 28, 1970, Nasser died of a heart attack and his vice president </span><a data-dcnode-id="7365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anwar_Sadat" title="Anwar Sadat"><span data-dcnode-id="7366" instrument_node="">Anwar Sadat</span></a><span data-dcnode-id="7364" instrument_node=""> succeeded him. Though Sadat sought to maintain good relations with the Soviet Union, he was also willing to consider economic assistance from nations outside the </span><a class="mw-redirect" data-dcnode-id="7362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_region" title="Arab region"><span data-dcnode-id="7363" instrument_node="">Arab region</span></a><span data-dcnode-id="7361" instrument_node=""> and the </span><a data-dcnode-id="7359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Bloc" title="Eastern Bloc"><span data-dcnode-id="7360" instrument_node="">Eastern Bloc</span></a><span data-dcnode-id="7358" instrument_node=""> as well. In 1971, Sadat, hoping to help the nation's economy recover from its losses in the Six-Day War, officially changed the UAR's name back to Egypt and signed a Treaty of Friendship and Cooperation with the Soviet Union. In 1972, however, the direction of Soviet-Egypt relations changed dramatically when Sadat ordered Soviet military personnel to leave the country.</span><sup class="reference" data-dcnode-id="7355" id="cite_ref-dpppqvb_74-0"><a data-dcnode-id="7356" href="#cite_note-dpppqvb-74"><span data-dcnode-id="7357" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7354" instrument_node=""> Throughout the remainder of the 1970s, Sadat developed strong relations with the Western powers, repealed Egypt's Treaty of Friendship and Cooperation with the Soviet Union in March 1976, made </span><a data-dcnode-id="7352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Egypt%25E2%2580%2593Israel_peace_treaty" title="Egypt–Israel peace treaty"><span data-dcnode-id="7353" instrument_node="">peace with Israel in March 1979</span></a><span data-dcnode-id="7351" instrument_node=""> following the </span><a data-dcnode-id="7349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_David_Accords" title="Camp David Accords"><span data-dcnode-id="7350" instrument_node="">Camp David Accords</span></a><span data-dcnode-id="7348" instrument_node="">—where it was agreed that Israel would depart from the </span><a data-dcnode-id="7346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israeli_occupation_of_the_Sinai_Peninsula" title="Israeli occupation of the Sinai Peninsula"><span data-dcnode-id="7347" instrument_node="">Sinai Peninsula</span></a><span data-dcnode-id="7345" instrument_node=""> in exchange for making the area a </span><a data-dcnode-id="7343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demilitarized_zone" title="Demilitarized zone"><span data-dcnode-id="7344" instrument_node="">demilitarized zone</span></a><span data-dcnode-id="7342" instrument_node=""> and that Egypt would not seek claims to a Palestinian state in the </span><a data-dcnode-id="7340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaza_Strip" title="Gaza Strip"><span data-dcnode-id="7341" instrument_node="">Gaza Strip</span></a><span data-dcnode-id="7339" instrument_node=""> and </span><a data-dcnode-id="7337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/West_Bank" title="West Bank"><span data-dcnode-id="7338" instrument_node="">West Bank</span></a><span data-dcnode-id="7336" instrument_node=""> in exchange for annual economic and military aid from the United States—and distanced Egypt from the Soviet Union. The Soviet Union now focused on building relations with its three other principal allies in the Middle East: Syria, Iraq and the </span><a data-dcnode-id="7334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestine_Liberation_Organization" title="Palestine Liberation Organization"><span data-dcnode-id="7335" instrument_node="">Palestine Liberation Organization</span></a><span data-dcnode-id="7333" instrument_node=""> (PLO).</span><sup class="reference" data-dcnode-id="7330" id="cite_ref-dpppqvb_74-1"><a data-dcnode-id="7331" href="#cite_note-dpppqvb-74"><span data-dcnode-id="7332" instrument_node="">[74]</span></a></sup><span data-dcnode-id="7329" instrument_node="">
</span></p><span data-dcnode-id="7327" instrument_node="">
</span><h4 data-dcnode-id="7317"><span class="mw-headline" data-dcnode-id="7325" id="PLO"><span data-dcnode-id="7326" instrument_node="">PLO</span></span><span class="mw-editsection" data-dcnode-id="7318"><span class="mw-editsection-bracket" data-dcnode-id="7323"><span data-dcnode-id="7324" instrument_node="">[</span></span><a data-dcnode-id="7321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D29" title="Edit section: PLO"><span data-dcnode-id="7322" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7319"><span data-dcnode-id="7320" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7316" instrument_node="">
</span><p data-dcnode-id="7266"><span data-dcnode-id="7315" instrument_node="">In 1964, Nasser and other </span><a data-dcnode-id="7313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1964_Arab_League_summit_%28Cairo%29" title="1964 Arab League summit (Cairo)"><span data-dcnode-id="7314" instrument_node="">Arab League in Cairo Summit 1964</span></a><span data-dcnode-id="7312" instrument_node=""> initiated the creation of the </span><a data-dcnode-id="7310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestine_Liberation_Organization" title="Palestine Liberation Organization"><span data-dcnode-id="7311" instrument_node="">Palestine Liberation Organization</span></a><span data-dcnode-id="7309" instrument_node=""> to represent the </span><a data-dcnode-id="7307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Palestinians" title="Palestinians"><span data-dcnode-id="7308" instrument_node="">Palestinian people</span></a><span data-dcnode-id="7306" instrument_node="">.</span><sup class="reference" data-dcnode-id="7303" id="cite_ref-fundingevil_75-0"><a data-dcnode-id="7304" href="#cite_note-fundingevil-75"><span data-dcnode-id="7305" instrument_node="">[75]</span></a></sup><span data-dcnode-id="7302" instrument_node=""> Despite establishing ties with the new organization, the Soviet government also feared the PLO would weaken their influence in the Arab region and reacted with skepticism towards the group's leadership.</span><sup class="reference" data-dcnode-id="7299" id="cite_ref-ipavatand_76-0"><a data-dcnode-id="7300" href="#cite_note-ipavatand-76"><span data-dcnode-id="7301" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7298" instrument_node=""> Following the Six-Day War, however, Soviet influence would further increase in the Arab region and PLO would follow suit.</span><sup class="reference" data-dcnode-id="7295" id="cite_ref-ipavatand_76-1"><a data-dcnode-id="7296" href="#cite_note-ipavatand-76"><span data-dcnode-id="7297" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7294" instrument_node=""> In March 1968, </span><a data-dcnode-id="7292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yasser_Arafat" title="Yasser Arafat"><span data-dcnode-id="7293" instrument_node="">Yasser Arafat</span></a><span data-dcnode-id="7291" instrument_node=""> and his </span><a data-dcnode-id="7289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fatah" title="Fatah"><span data-dcnode-id="7290" instrument_node="">Fatah</span></a><span data-dcnode-id="7288" instrument_node=""> organization gained international attention and popularity in the Arab region when it engaged in a </span><a data-dcnode-id="7286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Karameh" title="Battle of Karameh"><span data-dcnode-id="7287" instrument_node="">full-scale battle</span></a><span data-dcnode-id="7285" instrument_node=""> with the </span><a data-dcnode-id="7283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel_Defense_Forces" title="Israel Defense Forces"><span data-dcnode-id="7284" instrument_node="">Israel Defense Force</span></a><span data-dcnode-id="7282" instrument_node=""> at the city of </span><a data-dcnode-id="7280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karameh" title="Karameh"><span data-dcnode-id="7281" instrument_node="">Karameh</span></a><span data-dcnode-id="7279" instrument_node=""> in Jordan, in which 150 Palestinians and 29 Israelis were killed.</span><sup class="reference" data-dcnode-id="7276" id="cite_ref-arafatri_77-0"><a data-dcnode-id="7277" href="#cite_note-arafatri-77"><span data-dcnode-id="7278" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7275" instrument_node=""> Two months later, Fatah would join the PLO and Arafat was appointed as the organization's Chairman.</span><sup class="reference" data-dcnode-id="7272" id="cite_ref-arafatri_77-1"><a data-dcnode-id="7273" href="#cite_note-arafatri-77"><span data-dcnode-id="7274" instrument_node="">[77]</span></a></sup><span data-dcnode-id="7271" instrument_node=""> Under Arafat's leadership, favoritism towards the USSR was firmly established within the ranks of the PLO and the organization would frequently buy Eastern Bloc military equipment to carry out sporadic terrorist attacks against Israel.</span><sup class="reference" data-dcnode-id="7268" id="cite_ref-ipavatand_76-2"><a data-dcnode-id="7269" href="#cite_note-ipavatand-76"><span data-dcnode-id="7270" instrument_node="">[76]</span></a></sup><span data-dcnode-id="7267" instrument_node="">
</span></p><p data-dcnode-id="7237"><span data-dcnode-id="7265" instrument_node="">In 1972, the Soviets declared the PLO the vanguard of the Arab liberation movement.</span><sup class="reference" data-dcnode-id="7262" id="cite_ref-78"><a data-dcnode-id="7263" href="#cite_note-78"><span data-dcnode-id="7264" instrument_node="">[78]</span></a></sup><span data-dcnode-id="7261" instrument_node=""> Nevertheless, the Soviets still refused to let the PLO influence their standing in the </span><a class="mw-redirect" data-dcnode-id="7259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab-Israeli_peace_process" title="Arab-Israeli peace process"><span data-dcnode-id="7260" instrument_node="">Arab–Israeli peace process</span></a><span data-dcnode-id="7258" instrument_node=""> and sought to push their own proposed resolutions before the </span><a data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council" title="United Nations Security Council"><span data-dcnode-id="7257" instrument_node="">UN Security Council</span></a><span data-dcnode-id="7255" instrument_node="">. In September 1978, however, Soviet influence over the Arab-Israeli peace progress weakened significantly after Egypt and Israel agreed to make peace with one another during the </span><a data-dcnode-id="7253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Camp_David_Accords" title="Camp David Accords"><span data-dcnode-id="7254" instrument_node="">Camp David Accords</span></a><span data-dcnode-id="7252" instrument_node="">. Afterwards, the </span><a data-dcnode-id="7250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union" title="General Secretary of the Communist Party of the Soviet Union"><span data-dcnode-id="7251" instrument_node="">Soviet General Secretary</span></a><span data-dcnode-id="7249" instrument_node="">, </span><a data-dcnode-id="7247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="7248" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="7246" instrument_node="">, declared that "there is only one road" to a real settlement, “the road of full liberation of all Arab lands occupied by Israel in 1967, of full and unambiguous respect for the lawful rights of the Arab people of Palestine, including the right to create their own independent state.”</span><sup class="reference" data-dcnode-id="7243" id="cite_ref-79"><a data-dcnode-id="7244" href="#cite_note-79"><span data-dcnode-id="7245" instrument_node="">[79]</span></a></sup><span data-dcnode-id="7242" instrument_node=""> At the end of Arafat's visit to Moscow, 29 October to 1 November 1978, the Soviet authorities finally recognized the PLO as the "sole legitimate representative of the Palestinian people."</span><sup class="reference" data-dcnode-id="7239" id="cite_ref-80"><a data-dcnode-id="7240" href="#cite_note-80"><span data-dcnode-id="7241" instrument_node="">[80]</span></a></sup><span data-dcnode-id="7238" instrument_node="">
</span></p><span data-dcnode-id="7236" instrument_node="">
</span><h4 data-dcnode-id="7226"><span class="mw-headline" data-dcnode-id="7234" id="Syria"><span data-dcnode-id="7235" instrument_node="">Syria</span></span><span class="mw-editsection" data-dcnode-id="7227"><span class="mw-editsection-bracket" data-dcnode-id="7232"><span data-dcnode-id="7233" instrument_node="">[</span></span><a data-dcnode-id="7230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D30" title="Edit section: Syria"><span data-dcnode-id="7231" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7225" instrument_node="">
</span><p data-dcnode-id="7209"><span data-dcnode-id="7224" instrument_node="">In 1966, the </span><a data-dcnode-id="7222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Arab_Socialist_Ba%27ath_Party_%25E2%2580%2593_Syria_Region" title="Arab Socialist Ba'ath Party – Syria Region"><span data-dcnode-id="7223" instrument_node="">Arab Socialist Ba'ath Party – Syria Region</span></a><span data-dcnode-id="7221" instrument_node=""> gained power in a </span><a data-dcnode-id="7219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1966_Syrian_coup_d%27%25C3%25A9tat" title="1966 Syrian coup d'état"><span data-dcnode-id="7220" instrument_node="">coup d'état</span></a><span data-dcnode-id="7218" instrument_node=""> and intended to cooperate with the USSR.</span><sup class="reference" data-dcnode-id="7215" id="cite_ref-McInerney_81-0"><a data-dcnode-id="7216" href="#cite_note-McInerney-81"><span data-dcnode-id="7217" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7214" instrument_node=""> The Soviet Union was willing to take every effort to guarantee stability of the new regime in Syria in order to have support from a Communist regime in the Middle East. Once this regime gained power, the USSR's activity in the Middle East intensified. The USSR encouraged the new Syrian regime and admonished Israel. The USSR wished to gain more dominance in the Middle East, so it aggravated the Arab–Israeli conflict. However, the Soviet Union did not want a war, so it acted to pacify Israel's policy towards Syria. The USSR desired to be the sole defender of the Arab world, and so did everything in its power to increase the Arab states' dependence.</span><sup class="reference" data-dcnode-id="7211" id="cite_ref-McInerney_81-1"><a data-dcnode-id="7212" href="#cite_note-McInerney-81"><span data-dcnode-id="7213" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7210" instrument_node="">
