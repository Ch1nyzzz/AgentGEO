</span><h3 data-dcnode-id="8722"><span class="mw-headline" data-dcnode-id="8730" id="Stalin:_Socialism_in_one_country"><span data-dcnode-id="8731" instrument_node="">Stalin: Socialism in one country</span></span><span class="mw-editsection" data-dcnode-id="8723"><span class="mw-editsection-bracket" data-dcnode-id="8728"><span data-dcnode-id="8729" instrument_node="">[</span></span><a data-dcnode-id="8726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D7" title="Edit section: Stalin: Socialism in one country"><span data-dcnode-id="8727" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8724"><span data-dcnode-id="8725" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8721" instrument_node="">
</span><link data-dcnode-id="8720" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8713" role="note"><span data-dcnode-id="8719" instrument_node="">Main articles: </span><a data-dcnode-id="8717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism_in_one_country" title="Socialism in one country"><span data-dcnode-id="8718" instrument_node="">Socialism in one country</span></a><span data-dcnode-id="8716" instrument_node=""> and </span><a data-dcnode-id="8714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_front" title="United front"><span data-dcnode-id="8715" instrument_node="">United front</span></a></div><span data-dcnode-id="8712" instrument_node="">
</span><p data-dcnode-id="8700"><span data-dcnode-id="8711" instrument_node="">Trotsky argued for the continuation of the revolutionary process, in terms of his theory of </span><a data-dcnode-id="8709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Permanent_revolution" title="Permanent revolution"><span data-dcnode-id="8710" instrument_node="">Permanent Revolution</span></a><span data-dcnode-id="8708" instrument_node="">. After Lenin's death in 1924, Trotsky was defeated by Stalin and </span><a data-dcnode-id="8706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bukharin" title="Nikolai Bukharin"><span data-dcnode-id="8707" instrument_node="">Nikolai Bukharin</span></a><span data-dcnode-id="8705" instrument_node="">. Trotsky was sent into exile and in 1940 was assassinated on Stalin's orders.</span><sup class="reference" data-dcnode-id="8702" id="cite_ref-20"><a data-dcnode-id="8703" href="#cite_note-20"><span data-dcnode-id="8704" instrument_node="">[20]</span></a></sup><span data-dcnode-id="8701" instrument_node="">
</span></p><p data-dcnode-id="8686"><span data-dcnode-id="8699" instrument_node="">Stalin's main policy was </span><a data-dcnode-id="8697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Socialism_in_one_country" title="Socialism in one country"><span data-dcnode-id="8698" instrument_node="">Socialism in one country</span></a><span data-dcnode-id="8696" instrument_node="">—that is, he focused modernization of the Soviet Union, developing manufacturing, building infrastructure and improving agriculture. Expansion and wars were no longer on the agenda. The Kremlin-sponsored the </span><a data-dcnode-id="8694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_front" title="United front"><span data-dcnode-id="8695" instrument_node="">united front</span></a><span data-dcnode-id="8693" instrument_node=""> policy, with foreign Communist parties taking the lead in education and national liberation movements. The goal was </span><a data-dcnode-id="8691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-fascism" title="Anti-fascism"><span data-dcnode-id="8692" instrument_node="">opposition to fascism</span></a><span data-dcnode-id="8690" instrument_node="">, especially the </span><a data-dcnode-id="8688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazism" title="Nazism"><span data-dcnode-id="8689" instrument_node="">Nazi</span></a><span data-dcnode-id="8687" instrument_node=""> variety.
</span></p><p data-dcnode-id="8643"><span data-dcnode-id="8685" instrument_node="">The high point of the United Front was the partnership in </span><a data-dcnode-id="8683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_China_%281912%25E2%2580%25931949%29" title="Republic of China (1912–1949)"><span data-dcnode-id="8684" instrument_node="">China</span></a><span data-dcnode-id="8682" instrument_node=""> between the </span><a data-dcnode-id="8680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Communist_Party" title="Chinese Communist Party"><span data-dcnode-id="8681" instrument_node="">Chinese Communist Party</span></a><span data-dcnode-id="8679" instrument_node=""> and the </span><a data-dcnode-id="8677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_nationalism" title="Chinese nationalism"><span data-dcnode-id="8678" instrument_node="">nationalist</span></a><span data-dcnode-id="8676" instrument_node=""> </span><a data-dcnode-id="8674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kuomintang" title="Kuomintang"><span data-dcnode-id="8675" instrument_node="">Kuomintang</span></a><span data-dcnode-id="8673" instrument_node="">. The </span><a data-dcnode-id="8671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_United_Front" title="First United Front"><span data-dcnode-id="8672" instrument_node="">United Front policy in China</span></a><span data-dcnode-id="8670" instrument_node=""> effectively crashed to ruin in 1927, when Kuomintang leader </span><a data-dcnode-id="8668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chiang_Kai-shek" title="Chiang Kai-shek"><span data-dcnode-id="8669" instrument_node="">Chiang Kai-shek</span></a><span data-dcnode-id="8667" instrument_node=""> </span><a data-dcnode-id="8665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shanghai_massacre" title="Shanghai massacre"><span data-dcnode-id="8666" instrument_node="">massacred</span></a><span data-dcnode-id="8664" instrument_node=""> the native Communists and expelled all of his Soviet advisors, notably </span><a data-dcnode-id="8662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Borodin" title="Mikhail Borodin"><span data-dcnode-id="8663" instrument_node="">Mikhail Borodin</span></a><span data-dcnode-id="8661" instrument_node="">.</span><sup class="reference" data-dcnode-id="8658" id="cite_ref-21"><a data-dcnode-id="8659" href="#cite_note-21"><span data-dcnode-id="8660" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="8655" id="cite_ref-22"><a data-dcnode-id="8656" href="#cite_note-22"><span data-dcnode-id="8657" instrument_node="">[22]</span></a></sup><span data-dcnode-id="8654" instrument_node=""> A </span><a data-dcnode-id="8652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_conflict_%281929%29" title="Sino-Soviet conflict (1929)"><span data-dcnode-id="8653" instrument_node="">short war erupted in 1929</span></a><span data-dcnode-id="8651" instrument_node=""> as the Soviets successfully fought to keep control of the </span><a data-dcnode-id="8649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chinese_Eastern_Railway" title="Chinese Eastern Railway"><span data-dcnode-id="8650" instrument_node="">Chinese Eastern Railway</span></a><span data-dcnode-id="8648" instrument_node=""> in Manchuria.</span><sup class="reference" data-dcnode-id="8645" id="cite_ref-23"><a data-dcnode-id="8646" href="#cite_note-23"><span data-dcnode-id="8647" instrument_node="">[23]</span></a></sup><span data-dcnode-id="8644" instrument_node="">
</span></p><p data-dcnode-id="8625"><span data-dcnode-id="8642" instrument_node="">After defeating all his opponents from both the left (led by Trotsky and </span><a data-dcnode-id="8640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grigory_Zinoviev" title="Grigory Zinoviev"><span data-dcnode-id="8641" instrument_node="">Grigory Zinoviev</span></a><span data-dcnode-id="8639" instrument_node="">) and the right (led by </span><a data-dcnode-id="8637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bukharin" title="Nikolai Bukharin"><span data-dcnode-id="8638" instrument_node="">Nikolai Bukharin</span></a><span data-dcnode-id="8636" instrument_node="">), Stalin was in full charge. He began the wholesale </span><a class="mw-redirect" data-dcnode-id="8634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collectivization" title="Collectivization"><span data-dcnode-id="8635" instrument_node="">collectivization</span></a><span data-dcnode-id="8633" instrument_node=""> of Soviet agriculture, accompanied by a massive program of </span><a data-dcnode-id="8631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Industrialization_in_the_Soviet_Union" title="Industrialization in the Soviet Union"><span data-dcnode-id="8632" instrument_node="">planned industrialization</span></a><span data-dcnode-id="8630" instrument_node="">.</span><sup class="reference" data-dcnode-id="8627" id="cite_ref-24"><a data-dcnode-id="8628" href="#cite_note-24"><span data-dcnode-id="8629" instrument_node="">[24]</span></a></sup><span data-dcnode-id="8626" instrument_node="">
</span></p><span data-dcnode-id="8624" instrument_node="">
</span><h3 data-dcnode-id="8614"><span class="mw-headline" data-dcnode-id="8622" id="Respectability_and_normal_relations"><span data-dcnode-id="8623" instrument_node="">Respectability and normal relations</span></span><span class="mw-editsection" data-dcnode-id="8615"><span class="mw-editsection-bracket" data-dcnode-id="8620"><span data-dcnode-id="8621" instrument_node="">[</span></span><a data-dcnode-id="8618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D8" title="Edit section: Respectability and normal relations"><span data-dcnode-id="8619" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8616"><span data-dcnode-id="8617" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8613" instrument_node="">
</span><p data-dcnode-id="8594"><span data-dcnode-id="8612" instrument_node="">After 1921 the main foreign policy goal was to be treated as a normal country by the major powers, and open trade relations and diplomatic recognition. There was no more crusading for world revolution, which the Communist Party leadership began to recognize would not come and that Soviet Russia would have to reach some form of temporary accommodation with the "bourgeois" capitalist countries.</span><sup class="reference" data-dcnode-id="8609" id="cite_ref-:3_15-1"><a data-dcnode-id="8610" href="#cite_note-:3-15"><span data-dcnode-id="8611" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8608" instrument_node=""> The first breakthrough came in 1921 with the </span><a data-dcnode-id="8606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo-Soviet_Trade_Agreement" title="Anglo-Soviet Trade Agreement"><span data-dcnode-id="8607" instrument_node="">Anglo-Soviet Trade Agreement</span></a><span data-dcnode-id="8605" instrument_node=""> that signified the de facto recognition of the Soviet state. The United States refused recognition until 1933, however, </span><a data-dcnode-id="8603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Henry_Ford" title="Henry Ford"><span data-dcnode-id="8604" instrument_node="">Henry Ford</span></a><span data-dcnode-id="8602" instrument_node=""> and other capitalists invested heavily in the Soviet Union, bringing along modern management techniques and new industrial technology.</span><sup class="reference" data-dcnode-id="8599" id="cite_ref-25"><a data-dcnode-id="8600" href="#cite_note-25"><span data-dcnode-id="8601" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="8596" id="cite_ref-Bailes_26-0"><a data-dcnode-id="8597" href="#cite_note-Bailes-26"><span data-dcnode-id="8598" instrument_node="">[26]</span></a></sup><span data-dcnode-id="8595" instrument_node="">
</span></p><p data-dcnode-id="8566"><a data-dcnode-id="8592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Georgy_Chicherin" title="Georgy Chicherin"><span data-dcnode-id="8593" instrument_node="">Georgy Chicherin</span></a><span data-dcnode-id="8591" instrument_node=""> was Soviet foreign minister, from 1918 to 1930. He worked against the League of Nations and attempted to lure the </span><a data-dcnode-id="8589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Weimar_Republic" title="Weimar Republic"><span data-dcnode-id="8590" instrument_node="">Weimar Republic</span></a><span data-dcnode-id="8588" instrument_node=""> into an alliance with Moscow, an effort aided by his close personal friendship with German Ambassador </span><a data-dcnode-id="8586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ulrich_von_Brockdorff-Rantzau" title="Ulrich von Brockdorff-Rantzau"><span data-dcnode-id="8587" instrument_node="">Ulrich von Brockdorff-Rantzau</span></a><span data-dcnode-id="8585" instrument_node="">.</span><sup class="reference" data-dcnode-id="8582" id="cite_ref-:3_15-2"><a data-dcnode-id="8583" href="#cite_note-:3-15"><span data-dcnode-id="8584" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="8579" id="cite_ref-Timothy_27-0"><a data-dcnode-id="8580" href="#cite_note-Timothy-27"><span data-dcnode-id="8581" instrument_node="">[27]</span></a></sup><span data-dcnode-id="8578" instrument_node=""> The League made several efforts to develop better relations with Russia but were always rebuffed because the Soviets regarded the League as simply an alliance of hostile, capitalist powers.</span><sup class="reference" data-dcnode-id="8575" id="cite_ref-Buzinkai_28-0"><a data-dcnode-id="8576" href="#cite_note-Buzinkai-28"><span data-dcnode-id="8577" instrument_node="">[28]</span></a></sup><span data-dcnode-id="8574" instrument_node=""> The USSR did not seek admission to the </span><a data-dcnode-id="8572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="8573" instrument_node="">League of Nations</span></a><span data-dcnode-id="8571" instrument_node=""> until 1934, when it joined with French backing.</span><sup class="reference" data-dcnode-id="8568" id="cite_ref-Jelavich_29-0"><a data-dcnode-id="8569" href="#cite_note-Jelavich-29"><span data-dcnode-id="8570" instrument_node="">[29]</span></a></sup><span data-dcnode-id="8567" instrument_node="">
</span></p><span data-dcnode-id="8565" instrument_node="">
</span><h4 data-dcnode-id="8555"><span class="mw-headline" data-dcnode-id="8563" id="Rapallo_Treaty_1922"><span data-dcnode-id="8564" instrument_node="">Rapallo Treaty 1922</span></span><span class="mw-editsection" data-dcnode-id="8556"><span class="mw-editsection-bracket" data-dcnode-id="8561"><span data-dcnode-id="8562" instrument_node="">[</span></span><a data-dcnode-id="8559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D9" title="Edit section: Rapallo Treaty 1922"><span data-dcnode-id="8560" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8557"><span data-dcnode-id="8558" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8554" instrument_node="">
</span><link data-dcnode-id="8553" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8549" role="note"><span data-dcnode-id="8552" instrument_node="">Main article: </span><a data-dcnode-id="8550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Rapallo_%281922%29" title="Treaty of Rapallo (1922)"><span data-dcnode-id="8551" instrument_node="">Treaty of Rapallo (1922)</span></a></div><span data-dcnode-id="8548" instrument_node="">
</span><p data-dcnode-id="8523"><span data-dcnode-id="8547" instrument_node="">The </span><a data-dcnode-id="8545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Genoa_Conference_%281922%29" title="Genoa Conference (1922)"><span data-dcnode-id="8546" instrument_node="">Genoa Conference of 1922</span></a><span data-dcnode-id="8544" instrument_node=""> brought the Soviet Union and Germany for the first time into negotiations with the major European powers. The conference broke down when France insisted that Germany pay more in </span><a data-dcnode-id="8542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I_reparations" title="World War I reparations"><span data-dcnode-id="8543" instrument_node="">reparations</span></a><span data-dcnode-id="8541" instrument_node="">, and demanded in Moscow start paying off the czarist era debts that it had repudiated. The Soviet Union and Germany were both pariah countries, deeply distrusted. The solution was to get together at the nearby city of </span><a data-dcnode-id="8539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rapallo" title="Rapallo"><span data-dcnode-id="8540" instrument_node="">Rapallo</span></a><span data-dcnode-id="8538" instrument_node="">, </span><a data-dcnode-id="8536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Italy" title="Kingdom of Italy"><span data-dcnode-id="8537" instrument_node="">Italy</span></a><span data-dcnode-id="8535" instrument_node="">, where they quickly negotiated the </span><a data-dcnode-id="8533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Rapallo_%281922%29" title="Treaty of Rapallo (1922)"><span data-dcnode-id="8534" instrument_node="">Treaty of Rapallo</span></a><span data-dcnode-id="8532" instrument_node="">.</span><sup class="reference" data-dcnode-id="8529" id="cite_ref-Salzmann_30-0"><a data-dcnode-id="8530" href="#cite_note-Salzmann-30"><span data-dcnode-id="8531" instrument_node="">[30]</span></a></sup><span data-dcnode-id="8528" instrument_node=""> In a friendly agreement, they made a clean break with the past, repudiating all old financial and territorial obligations and agreeing to normalize diplomatic and economic relations. Secretly, the two sides established elaborate military cooperation, while publicly denying it. This enabled Germany to rebuild its army and air force secretly at camps in the Soviet Union, in violation of the Treaty of Versailles.</span><sup class="reference" data-dcnode-id="8525" id="cite_ref-Mueller_31-0"><a data-dcnode-id="8526" href="#cite_note-Mueller-31"><span data-dcnode-id="8527" instrument_node="">[31]</span></a></sup><span data-dcnode-id="8524" instrument_node="">
</span></p><span data-dcnode-id="8522" instrument_node="">
</span><h4 data-dcnode-id="8512"><span class="mw-headline" data-dcnode-id="8520" id="Great_Britain"><span data-dcnode-id="8521" instrument_node="">Great Britain</span></span><span class="mw-editsection" data-dcnode-id="8513"><span class="mw-editsection-bracket" data-dcnode-id="8518"><span data-dcnode-id="8519" instrument_node="">[</span></span><a data-dcnode-id="8516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D10" title="Edit section: Great Britain"><span data-dcnode-id="8517" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8514"><span data-dcnode-id="8515" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8511" instrument_node="">
</span><h5 data-dcnode-id="8501"><span class="mw-headline" data-dcnode-id="8509" id="Trade_and_recognition"><span data-dcnode-id="8510" instrument_node="">Trade and recognition</span></span><span class="mw-editsection" data-dcnode-id="8502"><span class="mw-editsection-bracket" data-dcnode-id="8507"><span data-dcnode-id="8508" instrument_node="">[</span></span><a data-dcnode-id="8505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D11" title="Edit section: Trade and recognition"><span data-dcnode-id="8506" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8503"><span data-dcnode-id="8504" instrument_node="">]</span></span></span></h5><span data-dcnode-id="8500" instrument_node="">
</span><p data-dcnode-id="8478"><span data-dcnode-id="8499" instrument_node="">At the direction of the Comintern, by 1937, 10% of </span><a data-dcnode-id="8497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Great_Britain" title="Communist Party of Great Britain"><span data-dcnode-id="8498" instrument_node="">Communist Party of Great Britain</span></a><span data-dcnode-id="8496" instrument_node=""> members were operating secretly inside the </span><a data-dcnode-id="8494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="8495" instrument_node="">British Labour Party</span></a><span data-dcnode-id="8493" instrument_node="">, campaigning to change its policy on affiliation and engineer a </span><a data-dcnode-id="8491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Front_%28UK%29" title="Popular Front (UK)"><span data-dcnode-id="8492" instrument_node="">Popular Front</span></a><span data-dcnode-id="8490" instrument_node="">.</span><sup class="reference" data-dcnode-id="8487" id="cite_ref-Campbell_32-0"><a data-dcnode-id="8488" href="#cite_note-Campbell-32"><span data-dcnode-id="8489" instrument_node="">[32]</span></a></sup><span data-dcnode-id="8486" instrument_node=""> The Labour leadership fought back and became bitter enemies of Communism. When Labour came to power in the </span><a data-dcnode-id="8484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1945_United_Kingdom_general_election" title="1945 United Kingdom general election"><span data-dcnode-id="8485" instrument_node="">1945 general election</span></a><span data-dcnode-id="8483" instrument_node="">, it was increasingly hostile to the Soviet Union and supported the Cold War.</span><sup class="reference" data-dcnode-id="8480" id="cite_ref-Thorpe_33-0"><a data-dcnode-id="8481" href="#cite_note-Thorpe-33"><span data-dcnode-id="8482" instrument_node="">[33]</span></a></sup><span data-dcnode-id="8479" instrument_node="">
</span></p><span data-dcnode-id="8477" instrument_node="">
</span><h5 data-dcnode-id="8467"><span class="mw-headline" data-dcnode-id="8475" id="Zinoviev_letter"><span data-dcnode-id="8476" instrument_node="">Zinoviev letter</span></span><span class="mw-editsection" data-dcnode-id="8468"><span class="mw-editsection-bracket" data-dcnode-id="8473"><span data-dcnode-id="8474" instrument_node="">[</span></span><a data-dcnode-id="8471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D12" title="Edit section: Zinoviev letter"><span data-dcnode-id="8472" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8469"><span data-dcnode-id="8470" instrument_node="">]</span></span></span></h5><span data-dcnode-id="8466" instrument_node="">
</span><p data-dcnode-id="8409"><span data-dcnode-id="8465" instrument_node="">The </span><a data-dcnode-id="8463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Zinoviev_letter" title="Zinoviev letter"><span data-dcnode-id="8464" instrument_node="">Zinoviev letter</span></a><span data-dcnode-id="8462" instrument_node=""> was a document published by the London </span><i data-dcnode-id="8459"><a data-dcnode-id="8460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Daily_Mail" title="Daily Mail"><span data-dcnode-id="8461" instrument_node="">Daily Mail</span></a></i><span data-dcnode-id="8458" instrument_node=""> newspaper four days before the </span><a data-dcnode-id="8456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1924_United_Kingdom_general_election" title="1924 United Kingdom general election"><span data-dcnode-id="8457" instrument_node="">British general election in 1924</span></a><span data-dcnode-id="8455" instrument_node="">. It purported to be a directive from </span><a data-dcnode-id="8453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grigory_Zinoviev" title="Grigory Zinoviev"><span data-dcnode-id="8454" instrument_node="">Grigory Zinoviev</span></a><span data-dcnode-id="8452" instrument_node="">, the head of the </span><a data-dcnode-id="8450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_International" title="Communist International"><span data-dcnode-id="8451" instrument_node="">Communist International</span></a><span data-dcnode-id="8449" instrument_node=""> in Moscow, to the </span><a data-dcnode-id="8447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_Great_Britain" title="Communist Party of Great Britain"><span data-dcnode-id="8448" instrument_node="">Communist Party of Great Britain</span></a><span data-dcnode-id="8446" instrument_node="">, ordering it to engage in seditious activities. It said the resumption of diplomatic relations (by a </span><a data-dcnode-id="8444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="8445" instrument_node="">Labour</span></a><span data-dcnode-id="8443" instrument_node=""> government) would hasten the radicalization of the </span><a class="mw-redirect" data-dcnode-id="8441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_working_class" title="British working class"><span data-dcnode-id="8442" instrument_node="">British working class</span></a><span data-dcnode-id="8440" instrument_node="">. This would have constituted a significant interference in </span><a data-dcnode-id="8438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Politics_of_the_United_Kingdom" title="Politics of the United Kingdom"><span data-dcnode-id="8439" instrument_node="">British politics</span></a><span data-dcnode-id="8437" instrument_node="">, and as a result, it was deeply offensive to British voters, turning them against the Labour Party. The letter seemed authentic at the time, but historians now agree it was a forgery.</span><sup class="reference" data-dcnode-id="8434" id="cite_ref-34"><a data-dcnode-id="8435" href="#cite_note-34"><span data-dcnode-id="8436" instrument_node="">[34]</span></a></sup><span data-dcnode-id="8433" instrument_node=""> The letter aided the </span><a data-dcnode-id="8431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conservative_Party_%28UK%29" title="Conservative Party (UK)"><span data-dcnode-id="8432" instrument_node="">Conservative Party</span></a><span data-dcnode-id="8430" instrument_node=""> under </span><a data-dcnode-id="8428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stanley_Baldwin" title="Stanley Baldwin"><span data-dcnode-id="8429" instrument_node="">Stanley Baldwin</span></a><span data-dcnode-id="8427" instrument_node="">, by hastening the collapse of the </span><a data-dcnode-id="8425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Party_%28UK%29" title="Liberal Party (UK)"><span data-dcnode-id="8426" instrument_node="">Liberal Party</span></a><span data-dcnode-id="8424" instrument_node=""> vote that produced a Conservative landslide against </span><a data-dcnode-id="8422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ramsay_MacDonald" title="Ramsay MacDonald"><span data-dcnode-id="8423" instrument_node="">Ramsay MacDonald</span></a><span data-dcnode-id="8421" instrument_node="">'s Labour Party.</span><sup class="reference" data-dcnode-id="8418" id="cite_ref-mowat_35-0"><a data-dcnode-id="8419" href="#cite_note-mowat-35"><span data-dcnode-id="8420" instrument_node="">[35]</span></a></sup><span data-dcnode-id="8417" instrument_node=""> </span><a data-dcnode-id="8415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/A._J._P._Taylor" title="A. J. P. Taylor"><span data-dcnode-id="8416" instrument_node="">A. J. P. Taylor</span></a><span data-dcnode-id="8414" instrument_node=""> argued that the most important impact was on the psychology of Labourites, who for years afterward blamed their defeat on foul play, thereby misunderstanding the political forces at work and postponing necessary reforms in the Labour Party.</span><sup class="reference" data-dcnode-id="8411" id="cite_ref-taylor_36-0"><a data-dcnode-id="8412" href="#cite_note-taylor-36"><span data-dcnode-id="8413" instrument_node="">[36]</span></a></sup><span data-dcnode-id="8410" instrument_node="">
</span></p><span data-dcnode-id="8408" instrument_node="">
</span><h4 data-dcnode-id="8398"><span class="mw-headline" data-dcnode-id="8406" id="Battling_Social_Democracy"><span data-dcnode-id="8407" instrument_node="">Battling Social Democracy</span></span><span class="mw-editsection" data-dcnode-id="8399"><span class="mw-editsection-bracket" data-dcnode-id="8404"><span data-dcnode-id="8405" instrument_node="">[</span></span><a data-dcnode-id="8402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D13" title="Edit section: Battling Social Democracy"><span data-dcnode-id="8403" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8400"><span data-dcnode-id="8401" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8397" instrument_node="">
</span><p data-dcnode-id="8370"><span data-dcnode-id="8396" instrument_node="">In the late 1920s and early 1930s, Stalin insisted on a policy of fighting against non-communist socialist movements everywhere. In Germany, Stalin gave a high priority to an anti-capitalist revolution in Germany. His </span><a data-dcnode-id="8394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Communist_Party" title="German Communist Party"><span data-dcnode-id="8395" instrument_node="">German Communist Party</span></a><span data-dcnode-id="8393" instrument_node=""> (KPD) split the working-class vote with the moderate </span><a data-dcnode-id="8391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Democratic_Party_of_Germany" title="Social Democratic Party of Germany"><span data-dcnode-id="8392" instrument_node="">Social Democratic Party</span></a><span data-dcnode-id="8390" instrument_node="">. The SPD was the historic social democratic party in Germany, and tempered its Marxism to drop revolutionary goals and instead focus on systematic improvement of the condition of the working-class. This approach ran contrary to the goals and beliefs of the KPD which considered such short term consessions for the working that served only to delay the revolution. In the </span><a data-dcnode-id="8388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reichstag_%28Weimar_Republic%29" title="Reichstag (Weimar Republic)"><span data-dcnode-id="8389" instrument_node="">Reichstag</span></a><span data-dcnode-id="8387" instrument_node="">, the KPD sought to overthrow the Weimar regie, which was historically controlled by a moderate coalition of liberals, Catholics, and the social democrats. As the </span><a data-dcnode-id="8385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Party" title="Nazi Party"><span data-dcnode-id="8386" instrument_node="">Nazi Party</span></a><span data-dcnode-id="8384" instrument_node=""> grew rapidly throughout the early 1930s, winning support among </span><a data-dcnode-id="8382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Protestantism_in_Germany" title="Protestantism in Germany"><span data-dcnode-id="8383" instrument_node="">Protestant</span></a><span data-dcnode-id="8381" instrument_node=""> workers and financial capitalists, this system became increasingly undermined by political extremists. Though there was some fighting between the KPD and the Nazis in Germany's industrial cities-upon coming to power, Hitler almost immediately had the KPD destroyed. A few leaders managed to escape into exile in Moscow, some of whom would later become leaders of East Germany. Simultaneously in Germany, the Nazis completely destroyed the SPD, imprisoning its leaders or forcing them into exile as well.</span><sup class="reference" data-dcnode-id="8378" id="cite_ref-Jelavich_29-1"><a data-dcnode-id="8379" href="#cite_note-Jelavich-29"><span data-dcnode-id="8380" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="8375" id="cite_ref-Beloff_37-0"><a data-dcnode-id="8376" href="#cite_note-Beloff-37"><span data-dcnode-id="8377" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="8372" id="cite_ref-birchall_38-0"><a data-dcnode-id="8373" href="#cite_note-birchall-38"><span data-dcnode-id="8374" instrument_node="">[38]</span></a></sup><span data-dcnode-id="8371" instrument_node="">
</span></p><span data-dcnode-id="8369" instrument_node="">
</span><h4 data-dcnode-id="8359"><span class="mw-headline" data-dcnode-id="8367" id="Alliance_with_France"><span data-dcnode-id="8368" instrument_node="">Alliance with France</span></span><span class="mw-editsection" data-dcnode-id="8360"><span class="mw-editsection-bracket" data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">[</span></span><a data-dcnode-id="8363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D14" title="Edit section: Alliance with France"><span data-dcnode-id="8364" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8361"><span data-dcnode-id="8362" instrument_node="">]</span></span></span></h4><span data-dcnode-id="8358" instrument_node="">
</span><link data-dcnode-id="8357" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8353" role="note"><span data-dcnode-id="8356" instrument_node="">Main article: </span><a data-dcnode-id="8354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franco-Soviet_Treaty_of_Mutual_Assistance" title="Franco-Soviet Treaty of Mutual Assistance"><span data-dcnode-id="8355" instrument_node="">Franco-Soviet Treaty of Mutual Assistance</span></a></div><span data-dcnode-id="8352" instrument_node="">
</span><p data-dcnode-id="8325"><span data-dcnode-id="8351" instrument_node="">By 1935 Moscow and Paris identified </span><a data-dcnode-id="8349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi_Germany" title="Nazi Germany"><span data-dcnode-id="8350" instrument_node="">Nazi Germany</span></a><span data-dcnode-id="8348" instrument_node=""> as the main military, diplomatic, ideological and economic threat. Germany could probably defeat each one separately in a war, but would avoid a </span><a data-dcnode-id="8346" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Two-front_war" title="Two-front war"><span data-dcnode-id="8347" instrument_node="">two-front war</span></a><span data-dcnode-id="8345" instrument_node=""> against both of them simultaneously. The solution, therefore, was a military alliance. It was pursued by </span><a data-dcnode-id="8343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Louis_Barthou" title="Louis Barthou"><span data-dcnode-id="8344" instrument_node="">Louis Barthou</span></a><span data-dcnode-id="8342" instrument_node="">, the French foreign minister, but he was assassinated in October 1934 and his successor, </span><a data-dcnode-id="8340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Laval" title="Pierre Laval"><span data-dcnode-id="8341" instrument_node="">Pierre Laval</span></a><span data-dcnode-id="8339" instrument_node="">, was more inclined to Germany. However, after the declaration of </span><a class="mw-redirect" data-dcnode-id="8337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_re-armament" title="German re-armament"><span data-dcnode-id="8338" instrument_node="">German rearmament</span></a><span data-dcnode-id="8336" instrument_node=""> in March 1935 the French government forced the reluctant Laval to conclude a treaty. Written in 1935, it took effect in 1936. Both Paris and Moscow hoped other countries would join in and </span><a data-dcnode-id="8334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Czechoslovakia" title="Czechoslovakia"><span data-dcnode-id="8335" instrument_node="">Czechoslovakia</span></a><span data-dcnode-id="8333" instrument_node=""> to sign treaties with both France and the Soviet Union. Prague wanted to use the USSR as a counterweight against the growing strength of Nazi Germany. Poland might make a good partner too, but it refused to join in. The military provisions were practically useless because of multiple conditions and the requirement that the United Kingdom and </span><a data-dcnode-id="8331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascist_Italy_%281922%25E2%2580%25931943%29" title="Fascist Italy (1922–1943)"><span data-dcnode-id="8332" instrument_node="">Fascist Italy</span></a><span data-dcnode-id="8330" instrument_node=""> approve any action. The effectiveness was undermined even further by the French government's insistent refusal to accept a military convention stipulating the way in which the two armies would coordinate actions in the event of war with Germany. The result was a symbolic pact of friendship and mutual assistance of little consequence other than raising the prestige of both parties.</span><sup class="reference" data-dcnode-id="8327" id="cite_ref-Carley_39-0"><a data-dcnode-id="8328" href="#cite_note-Carley-39"><span data-dcnode-id="8329" instrument_node="">[39]</span></a></sup><span data-dcnode-id="8326" instrument_node="">
</span></p><p data-dcnode-id="8297"><span data-dcnode-id="8324" instrument_node="">The Treaty marked a large scale shift in Soviet policy in the Comintern from a pro-revisionist stance against the </span><a data-dcnode-id="8322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Versailles" title="Treaty of Versailles"><span data-dcnode-id="8323" instrument_node="">Treaty of Versailles</span></a><span data-dcnode-id="8321" instrument_node=""> to a more western-oriented foreign policy as championed by </span><a data-dcnode-id="8319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maxim_Litvinov" title="Maxim Litvinov"><span data-dcnode-id="8320" instrument_node="">Maxim Litvinov</span></a><span data-dcnode-id="8318" instrument_node="">. Hitler justified the </span><a data-dcnode-id="8316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Remilitarization_of_the_Rhineland" title="Remilitarization of the Rhineland"><span data-dcnode-id="8317" instrument_node="">remilitarization of the Rhineland</span></a><span data-dcnode-id="8315" instrument_node=""> by the ratification of the treaty in the French parliament, claiming that he felt threatened by the pact. However, after 1936, the French lost interest, and all parties in Europe realized the treaty was effectively a dead letter. The </span><a data-dcnode-id="8313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appeasement" title="Appeasement"><span data-dcnode-id="8314" instrument_node="">appeasement</span></a><span data-dcnode-id="8312" instrument_node=""> policies of the prime ministers of Britain and France, </span><a data-dcnode-id="8310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neville_Chamberlain" title="Neville Chamberlain"><span data-dcnode-id="8311" instrument_node="">Neville Chamberlain</span></a><span data-dcnode-id="8309" instrument_node=""> and </span><a data-dcnode-id="8307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/%25C3%2589douard_Daladier" title="Édouard Daladier"><span data-dcnode-id="8308" instrument_node="">Édouard Daladier</span></a><span data-dcnode-id="8306" instrument_node=""> were widely held because they seemed to promise what Chamberlain called "peace for our time."</span><sup class="reference" data-dcnode-id="8303" id="cite_ref-40"><a data-dcnode-id="8304" href="#cite_note-40"><span data-dcnode-id="8305" instrument_node="">[40]</span></a></sup><span data-dcnode-id="8302" instrument_node=""> However, by early 1939 it was clear that it further encouraged Nazi aggression.</span><sup class="reference" data-dcnode-id="8299" id="cite_ref-Zhilin_41-0"><a data-dcnode-id="8300" href="#cite_note-Zhilin-41"><span data-dcnode-id="8301" instrument_node="">[41]</span></a></sup><span data-dcnode-id="8298" instrument_node="">
</span></p><p data-dcnode-id="8278"><span data-dcnode-id="8296" instrument_node="">The Soviet Union was not invited to the critical </span><a data-dcnode-id="8294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Agreement" title="Munich Agreement"><span data-dcnode-id="8295" instrument_node="">Munich conference</span></a><span data-dcnode-id="8293" instrument_node=""> in late September 1938, where Britain, France and Italy appeased Hitler by giving in to his demands to take over the </span><a data-dcnode-id="8291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sudetenland" title="Sudetenland"><span data-dcnode-id="8292" instrument_node="">Sudetenland</span></a><span data-dcnode-id="8290" instrument_node="">, a largely German-speaking area of Western Czechoslovakia. Distrust was high in all directions. Leaders in London and Paris felt that Stalin wanted to see a major war between the capitalist nations Germany on the one hand, and Britain and France on the other, in order to advance the prospects of a working-class revolution in Europe. Meanwhile, Stalin felt the Western Powers were plotting to embroil Germany and Russia in war in order to preserve bourgeois capitalism.</span><sup class="reference" data-dcnode-id="8287" id="cite_ref-Wallace_42-0"><a data-dcnode-id="8288" href="#cite_note-Wallace-42"><span data-dcnode-id="8289" instrument_node="">[42]</span></a></sup><span data-dcnode-id="8286" instrument_node=""> After Hitler took over all of Czechoslovakia in 1939, proving appeasement was a disaster, Britain and France tried to involve the Soviet Union and a real military alliance. Their attempts were futile because Poland refused to allow any Soviet troops on its soil.</span><sup class="reference" data-dcnode-id="8283" id="cite_ref-Duroselle_43-0"><a data-dcnode-id="8284" href="#cite_note-Duroselle-43"><span data-dcnode-id="8285" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="8280" id="cite_ref-Carley2_44-0"><a data-dcnode-id="8281" href="#cite_note-Carley2-44"><span data-dcnode-id="8282" instrument_node="">[44]</span></a></sup><span data-dcnode-id="8279" instrument_node="">
</span></p><span data-dcnode-id="8277" instrument_node="">
</span><h3 data-dcnode-id="8267"><span class="mw-headline" data-dcnode-id="8275" id="Attack_social_democratic_parties"><span data-dcnode-id="8276" instrument_node="">Attack social democratic parties</span></span><span class="mw-editsection" data-dcnode-id="8268"><span class="mw-editsection-bracket" data-dcnode-id="8273"><span data-dcnode-id="8274" instrument_node="">[</span></span><a data-dcnode-id="8271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D15" title="Edit section: Attack social democratic parties"><span data-dcnode-id="8272" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8269"><span data-dcnode-id="8270" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8266" instrument_node="">
</span><p data-dcnode-id="8240"><span data-dcnode-id="8265" instrument_node="">This new radical phase was paralleled by the formulation of a new doctrine in the International, that of the so-called </span><a data-dcnode-id="8263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Period" title="Third Period"><span data-dcnode-id="8264" instrument_node="">Third Period</span></a><span data-dcnode-id="8262" instrument_node="">, an ultra-left switch in policy, which argued that </span><a data-dcnode-id="8260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_democracy" title="Social democracy"><span data-dcnode-id="8261" instrument_node="">social democracy</span></a><span data-dcnode-id="8259" instrument_node="">, whatever shape it took, was a form of </span><a data-dcnode-id="8257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_fascism" title="Social fascism"><span data-dcnode-id="8258" instrument_node="">social fascism</span></a><span data-dcnode-id="8256" instrument_node="">, socialist in theory but </span><a data-dcnode-id="8254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascism" title="Fascism"><span data-dcnode-id="8255" instrument_node="">fascist</span></a><span data-dcnode-id="8253" instrument_node=""> in practice. All foreign Communist parties – increasingly agents of Soviet policy – were to concentrate their efforts in a struggle against their rivals in the working-class movement, ignoring the threat of real fascism. There were to be no united fronts against a greater enemy. The catastrophic effects of this policy, and the negative effect it had on Soviet security, was to be fully demonstrated by </span><a data-dcnode-id="8251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adolf_Hitler" title="Adolf Hitler"><span data-dcnode-id="8252" instrument_node="">Adolf Hitler</span></a><span data-dcnode-id="8250" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="8248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Machtergreifung" title="Machtergreifung"><span data-dcnode-id="8249" instrument_node="">seizure of power</span></a><span data-dcnode-id="8247" instrument_node=""> in Germany in 1933, followed by the destruction of the </span><a class="mw-redirect" data-dcnode-id="8245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/KPD" title="KPD"><span data-dcnode-id="8246" instrument_node="">German Communist Party</span></a><span data-dcnode-id="8244" instrument_node="">, the strongest in Europe. The </span><a data-dcnode-id="8242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Way" title="Third Way"><span data-dcnode-id="8243" instrument_node="">Third Way</span></a><span data-dcnode-id="8241" instrument_node=""> and social fascism were quickly dropped into the dustbin of history.
</span></p><span data-dcnode-id="8239" instrument_node="">
</span><h3 data-dcnode-id="8229"><span class="mw-headline" data-dcnode-id="8237" id="Popular_Fronts"><span data-dcnode-id="8238" instrument_node="">Popular Fronts</span></span><span class="mw-editsection" data-dcnode-id="8230"><span class="mw-editsection-bracket" data-dcnode-id="8235"><span data-dcnode-id="8236" instrument_node="">[</span></span><a data-dcnode-id="8233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D16" title="Edit section: Popular Fronts"><span data-dcnode-id="8234" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8231"><span data-dcnode-id="8232" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8228" instrument_node="">
</span><link data-dcnode-id="8227" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8223" role="note"><span data-dcnode-id="8226" instrument_node="">Main article: </span><a data-dcnode-id="8224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_front" title="Popular front"><span data-dcnode-id="8225" instrument_node="">Popular front</span></a></div><span data-dcnode-id="8222" instrument_node="">
</span><p data-dcnode-id="8189"><span data-dcnode-id="8221" instrument_node="">Communists and parties on the left were increasingly threatened by the growth of the Nazi movement. Hitler came to power in January 1933 and rapidly consolidated his control over Germany, destroyed the communist and socialist movements in Germany, and rejected the restraints imposed by the Versailles treaty. Stalin in 1934 reversed his decision in 1928 to attack socialists, and introduced his new plan: the "popular front." It was a coalition of anti-fascist parties usually organized by the local Communists acting under instructions from the Comintern.</span><sup class="reference" data-dcnode-id="8218" id="cite_ref-45"><a data-dcnode-id="8219" href="#cite_note-45"><span data-dcnode-id="8220" instrument_node="">[45]</span></a></sup><span data-dcnode-id="8217" instrument_node=""> The new policy was to work with all parties on the left and center in a multiparty coalition against fascism and Nazi Germany in particular. The new slogan was: "The People's Front Against Fascism and War". Under this policy, Communist Parties were instructed to form broad alliances with all anti-fascist parties with the aim of both securing social advance at home and a military alliance with the USSR to isolate the fascist dictatorships.</span><sup class="reference" data-dcnode-id="8214" id="cite_ref-46"><a data-dcnode-id="8215" href="#cite_note-46"><span data-dcnode-id="8216" instrument_node="">[46]</span></a></sup><span data-dcnode-id="8213" instrument_node=""> The "Popular Fronts" thus formed proved to be successful in only a few countries, and only for a few years each, forming the government in </span><a data-dcnode-id="8211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Front_%28France%29" title="Popular Front (France)"><span data-dcnode-id="8212" instrument_node="">France</span></a><span data-dcnode-id="8210" instrument_node="">, </span><a data-dcnode-id="8208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Front_%28Chile%29" title="Popular Front (Chile)"><span data-dcnode-id="8209" instrument_node="">Chile</span></a><span data-dcnode-id="8207" instrument_node=""> and </span><a data-dcnode-id="8205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Popular_Front_%28Spain%29" title="Popular Front (Spain)"><span data-dcnode-id="8206" instrument_node="">Spain</span></a><span data-dcnode-id="8204" instrument_node="">, and also China.</span><sup class="reference" data-dcnode-id="8201" id="cite_ref-47"><a data-dcnode-id="8202" href="#cite_note-47"><span data-dcnode-id="8203" instrument_node="">[47]</span></a></sup><span data-dcnode-id="8200" instrument_node=""> It was not a political success elsewhere. The Popular Front approach played a major role in </span><a data-dcnode-id="8198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resistance_during_World_War_II" title="Resistance during World War II"><span data-dcnode-id="8199" instrument_node="">Resistance movements</span></a><span data-dcnode-id="8197" instrument_node=""> in </span><a data-dcnode-id="8195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/French_Resistance" title="French Resistance"><span data-dcnode-id="8196" instrument_node="">France</span></a><span data-dcnode-id="8194" instrument_node=""> and other countries conquered by Germany after 1939. After the war it played a major role in French and Italian politics.</span><sup class="reference" data-dcnode-id="8191" id="cite_ref-48"><a data-dcnode-id="8192" href="#cite_note-48"><span data-dcnode-id="8193" instrument_node="">[48]</span></a></sup><span data-dcnode-id="8190" instrument_node="">
</span></p><span data-dcnode-id="8188" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8174"><div class="thumbinner" data-dcnode-id="8175" style="width:252px;"><a class="image" data-dcnode-id="8186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeck%2C_Litwinow_1934.jpg"><img alt="" class="thumbimage" data-dcnode-id="8187" data-file-height="700" data-file-width="1115" decoding="async" height="157" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beck%252C_Litwinow_1934.jpg/250px-Beck%252C_Litwinow_1934.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beck%2C_Litwinow_1934.jpg/375px-Beck%2C_Litwinow_1934.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Beck%2C_Litwinow_1934.jpg/500px-Beck%2C_Litwinow_1934.jpg 2x" width="250"></a><span data-dcnode-id="8185" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8176"><div class="magnify" data-dcnode-id="8183"><a class="internal" data-dcnode-id="8184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABeck%2C_Litwinow_1934.jpg" title="Enlarge"></a></div><a data-dcnode-id="8181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maxim_Litvinov" title="Maxim Litvinov"><span data-dcnode-id="8182" instrument_node="">Maxim Litvinov</span></a><span data-dcnode-id="8180" instrument_node=""> with Polish foreign minister </span><a data-dcnode-id="8178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/J%25C3%25B3zef_Beck" title="Józef Beck"><span data-dcnode-id="8179" instrument_node="">Józef Beck</span></a><span data-dcnode-id="8177" instrument_node=""> in Moscow, February 1934</span></div></div></div><span data-dcnode-id="8173" instrument_node="">
</span><p data-dcnode-id="8156"><span data-dcnode-id="8172" instrument_node="">Hand-in-hand with the promotion of Popular Fronts, </span><a data-dcnode-id="8170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maxim_Litvinov" title="Maxim Litvinov"><span data-dcnode-id="8171" instrument_node="">Maxim Litvinov</span></a><span data-dcnode-id="8169" instrument_node="">, the Soviet Commissar for Foreign Affairs between 1930 and 1939, aimed at closer alliances with Western governments, and placed ever greater emphasis on </span><a data-dcnode-id="8167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_security" title="Collective security"><span data-dcnode-id="8168" instrument_node="">collective security</span></a><span data-dcnode-id="8166" instrument_node="">. The new policy led to the Soviet Union joining the </span><a data-dcnode-id="8164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/League_of_Nations" title="League of Nations"><span data-dcnode-id="8165" instrument_node="">League of Nations</span></a><span data-dcnode-id="8163" instrument_node=""> in 1934 and the subsequent non-aggression pacts with France and Czechoslovakia. In the League the Soviets were active in demanding action against imperialist aggression, a particular danger to them after the 1931 </span><a data-dcnode-id="8161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japanese_invasion_of_Manchuria" title="Japanese invasion of Manchuria"><span data-dcnode-id="8162" instrument_node="">Japanese invasion of Manchuria</span></a><span data-dcnode-id="8160" instrument_node="">, which eventually resulted in the Soviet-Japanese </span><a class="mw-redirect" data-dcnode-id="8158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Khalkhin_Gol" title="Battle of Khalkhin Gol"><span data-dcnode-id="8159" instrument_node="">Battle of Khalkhin Gol</span></a><span data-dcnode-id="8157" instrument_node="">.
</span></p><p data-dcnode-id="8137"><span data-dcnode-id="8155" instrument_node="">Ignoring the agreement it signed to avoid involvement in the </span><a data-dcnode-id="8153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spanish_Civil_War" title="Spanish Civil War"><span data-dcnode-id="8154" instrument_node="">Spanish Civil War</span></a><span data-dcnode-id="8152" instrument_node="">, the USSR sent arms and troops and organized volunteers to fight for the </span><a data-dcnode-id="8150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republican_faction_%28Spanish_Civil_War%29" title="Republican faction (Spanish Civil War)"><span data-dcnode-id="8151" instrument_node="">republican government</span></a><span data-dcnode-id="8149" instrument_node="">. Communist forces systematically killed their old enemies the </span><a data-dcnode-id="8147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anarchism_in_Spain" title="Anarchism in Spain"><span data-dcnode-id="8148" instrument_node="">Spanish anarchists</span></a><span data-dcnode-id="8146" instrument_node="">, even though they were on the same Republican side.</span><sup class="reference" data-dcnode-id="8143" id="cite_ref-49"><a data-dcnode-id="8144" href="#cite_note-49"><span data-dcnode-id="8145" instrument_node="">[49]</span></a></sup><span data-dcnode-id="8142" instrument_node=""> The Spanish government sent its entire treasury to Moscow for safekeeping, but it was never returned.</span><sup class="reference" data-dcnode-id="8139" id="cite_ref-50"><a data-dcnode-id="8140" href="#cite_note-50"><span data-dcnode-id="8141" instrument_node="">[50]</span></a></sup><span data-dcnode-id="8138" instrument_node="">
</span></p><p data-dcnode-id="8129"><span data-dcnode-id="8136" instrument_node="">The </span><a data-dcnode-id="8134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Munich_Agreement" title="Munich Agreement"><span data-dcnode-id="8135" instrument_node="">Munich Agreement</span></a><span data-dcnode-id="8133" instrument_node=""> of 1938, the first stage in the dismemberment of Czechoslovakia, gave rise to Soviet fears that they were likely to be abandoned in a possible war with Germany. In the face of continually dragging and seemingly hopeless negotiations with Britain and France, a new cynicism and hardness entered Soviet foreign relations when Litvinov was replaced by </span><a data-dcnode-id="8131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyacheslav_Molotov" title="Vyacheslav Molotov"><span data-dcnode-id="8132" instrument_node="">Vyacheslav Molotov</span></a><span data-dcnode-id="8130" instrument_node=""> in May 1939.
</span></p><span data-dcnode-id="8128" instrument_node="">
</span><h3 data-dcnode-id="8118"><span class="mw-headline" data-dcnode-id="8126" id="Diplomats_purged"><span data-dcnode-id="8127" instrument_node="">Diplomats purged</span></span><span class="mw-editsection" data-dcnode-id="8119"><span class="mw-editsection-bracket" data-dcnode-id="8124"><span data-dcnode-id="8125" instrument_node="">[</span></span><a data-dcnode-id="8122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D17" title="Edit section: Diplomats purged"><span data-dcnode-id="8123" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8120"><span data-dcnode-id="8121" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8117" instrument_node="">
</span><link data-dcnode-id="8116" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8112" role="note"><span data-dcnode-id="8115" instrument_node="">Main article: </span><a data-dcnode-id="8113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Purge" title="Great Purge"><span data-dcnode-id="8114" instrument_node="">Great Purge</span></a></div><span data-dcnode-id="8111" instrument_node="">
</span><p data-dcnode-id="8087"><span data-dcnode-id="8110" instrument_node="">In 1937–38, Stalin took total personal control of the party, by purging and executing tens of thousands of high-level and mid-level party officials, especially the </span><a data-dcnode-id="8108" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Old_Bolshevik" title="Old Bolshevik"><span data-dcnode-id="8109" instrument_node="">Old Bolsheviks</span></a><span data-dcnode-id="8107" instrument_node=""> who had joined before 1917. The entire diplomatic service was downsized; many consular offices abroad were closed, and restrictions were placed on the activities and movements of foreign diplomats in the USSR. About a third of all foreign ministry officials were shot or imprisoned, including 62 of the 100 most senior officials. Key ambassadorial posts abroad, such as those in </span><a data-dcnode-id="8105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tokyo" title="Tokyo"><span data-dcnode-id="8106" instrument_node="">Tokyo</span></a><span data-dcnode-id="8104" instrument_node="">, </span><a data-dcnode-id="8102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw" title="Warsaw"><span data-dcnode-id="8103" instrument_node="">Warsaw</span></a><span data-dcnode-id="8101" instrument_node="">, </span><a data-dcnode-id="8099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Washington%2C_D.C." title="Washington, D.C."><span data-dcnode-id="8100" instrument_node="">Washington</span></a><span data-dcnode-id="8098" instrument_node="">, </span><a data-dcnode-id="8096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bucharest" title="Bucharest"><span data-dcnode-id="8097" instrument_node="">Bucharest</span></a><span data-dcnode-id="8095" instrument_node="">, and </span><a data-dcnode-id="8093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Budapest" title="Budapest"><span data-dcnode-id="8094" instrument_node="">Budapest</span></a><span data-dcnode-id="8092" instrument_node="">, were vacant.</span><sup class="reference" data-dcnode-id="8089" id="cite_ref-51"><a data-dcnode-id="8090" href="#cite_note-51"><span data-dcnode-id="8091" instrument_node="">[51]</span></a></sup><span data-dcnode-id="8088" instrument_node="">
</span></p><span data-dcnode-id="8086" instrument_node="">
</span><h3 data-dcnode-id="8075"><span data-dcnode-id="8085" id="Non-Aggression_Pact_with_Germany_.281939.E2.80.931941.29"></span><span class="mw-headline" data-dcnode-id="8083" id="Non-Aggression_Pact_with_Germany_(1939–1941)"><span data-dcnode-id="8084" instrument_node="">Non-Aggression Pact with Germany (1939–1941)</span></span><span class="mw-editsection" data-dcnode-id="8076"><span class="mw-editsection-bracket" data-dcnode-id="8081"><span data-dcnode-id="8082" instrument_node="">[</span></span><a data-dcnode-id="8079" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D18" title="Edit section: Non-Aggression Pact with Germany (1939–1941)"><span data-dcnode-id="8080" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8077"><span data-dcnode-id="8078" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8074" instrument_node="">
</span><link data-dcnode-id="8073" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8069" role="note"><span data-dcnode-id="8072" instrument_node="">Main article: </span><a data-dcnode-id="8070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="8071" instrument_node="">Molotov–Ribbentrop Pact</span></a></div><span data-dcnode-id="8068" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8059"><div class="thumbinner" data-dcnode-id="8060" style="width:202px;"><a class="image" data-dcnode-id="8066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg"><img alt="" class="thumbimage" data-dcnode-id="8067" data-file-height="1562" data-file-width="1185" decoding="async" height="264" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Bundesarchiv_Bild_183-H27337%252C_Moskau%252C_Stalin_und_Ribbentrop_im_Kreml.jpg/200px-Bundesarchiv_Bild_183-H27337%252C_Moskau%252C_Stalin_und_Ribbentrop_im_Kreml.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Bundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg/300px-Bundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/38/Bundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg/400px-Bundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg 2x" width="200"></a><span data-dcnode-id="8065" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8061"><div class="magnify" data-dcnode-id="8063"><a class="internal" data-dcnode-id="8064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABundesarchiv_Bild_183-H27337%2C_Moskau%2C_Stalin_und_Ribbentrop_im_Kreml.jpg" title="Enlarge"></a></div><span data-dcnode-id="8062" instrument_node="">Stalin and Ribbentrop shaking hands after the signing of the pact in Moscow in August 1939.</span></div></div></div><span data-dcnode-id="8058" instrument_node="">
</span><p data-dcnode-id="8040"><span data-dcnode-id="8057" instrument_node="">In 1938–39, the Soviet Union attempted to form strong military alliances with Germany's enemies, including Poland, France, and Great Britain, but they all refused. In an effort to delay a Nazi invasion and build up the Soviet military, Stalin made a non-aggression pact with Hitler and received control of a large swath of Eastern Europe, including the Baltic countries. The agreement provided for large sales of Russian grain and oil to Germany, while Germany would share its military technology with the Soviet Union.</span><sup class="reference" data-dcnode-id="8054" id="cite_ref-52"><a data-dcnode-id="8055" href="#cite_note-52"><span data-dcnode-id="8056" instrument_node="">[52]</span></a></sup><span data-dcnode-id="8053" instrument_node=""> The ensuing </span><a data-dcnode-id="8051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="8052" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="8050" instrument_node=""> astonished the world and signaled the war would start very soon. French historian </span><a data-dcnode-id="8048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fran%25C3%25A7ois_Furet" title="François Furet"><span data-dcnode-id="8049" instrument_node="">François Furet</span></a><span data-dcnode-id="8047" instrument_node=""> says, "The pact signed in Moscow by Ribbentrop and Molotov on 23 August 1939 inaugurated the alliance between the USSR and Nazi Germany. It was presented as an alliance and not just a nonaggression pact." Other historians dispute the characterization of this treaty as an "alliance," because Hitler secretly intended to </span><a data-dcnode-id="8045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Barbarossa" title="Operation Barbarossa"><span data-dcnode-id="8046" instrument_node="">invade the USSR in the future.</span></a><sup class="reference" data-dcnode-id="8042" id="cite_ref-53"><a data-dcnode-id="8043" href="#cite_note-53"><span data-dcnode-id="8044" instrument_node="">[53]</span></a></sup><span data-dcnode-id="8041" instrument_node="">
</span></p><span data-dcnode-id="8039" instrument_node="">
</span><h2 data-dcnode-id="8029"><span class="mw-headline" data-dcnode-id="8037" id="World_War_II"><span data-dcnode-id="8038" instrument_node="">World War II</span></span><span class="mw-editsection" data-dcnode-id="8030"><span class="mw-editsection-bracket" data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">[</span></span><a data-dcnode-id="8033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D19" title="Edit section: World War II"><span data-dcnode-id="8034" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8031"><span data-dcnode-id="8032" instrument_node="">]</span></span></span></h2><span data-dcnode-id="8028" instrument_node="">
</span><link data-dcnode-id="8027" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8020" role="note"><span data-dcnode-id="8026" instrument_node="">Further information: </span><a data-dcnode-id="8024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_history_of_World_War_II%23Soviet_Union" title="Diplomatic history of World War II"><span data-dcnode-id="8025" instrument_node="">Diplomatic history of World War II §&nbsp;Soviet Union</span></a><span data-dcnode-id="8023" instrument_node="">, and </span><a data-dcnode-id="8021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union_in_World_War_II" title="Soviet Union in World War II"><span data-dcnode-id="8022" instrument_node="">Soviet Union in World War II</span></a></div><span data-dcnode-id="8019" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7998"><div class="thumbinner" data-dcnode-id="7999" style="width:252px;"><a class="image" data-dcnode-id="8017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJalta_1945.jpg"><img alt="" class="thumbimage" data-dcnode-id="8018" data-file-height="905" data-file-width="1138" decoding="async" height="199" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Jalta_1945.jpg/250px-Jalta_1945.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Jalta_1945.jpg/375px-Jalta_1945.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Jalta_1945.jpg/500px-Jalta_1945.jpg 2x" width="250"></a><span data-dcnode-id="8016" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8000"><div class="magnify" data-dcnode-id="8014"><a class="internal" data-dcnode-id="8015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJalta_1945.jpg" title="Enlarge"></a></div><span data-dcnode-id="8013" instrument_node="">Soviet General Secretary </span><a data-dcnode-id="8011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="8012" instrument_node="">Stalin</span></a><span data-dcnode-id="8010" instrument_node="">, U.S. President </span><a data-dcnode-id="8008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Franklin_D._Roosevelt" title="Franklin D. Roosevelt"><span data-dcnode-id="8009" instrument_node="">Roosevelt</span></a><span data-dcnode-id="8007" instrument_node=""> and British Prime Minister </span><a data-dcnode-id="8005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Winston_Churchill" title="Winston Churchill"><span data-dcnode-id="8006" instrument_node="">Churchill</span></a><span data-dcnode-id="8004" instrument_node=""> </span><a data-dcnode-id="8002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yalta_Conference" title="Yalta Conference"><span data-dcnode-id="8003" instrument_node="">confer in Yalta</span></a><span data-dcnode-id="8001" instrument_node=""> in 1945.</span></div></div></div><span data-dcnode-id="7997" instrument_node="">
</span><p data-dcnode-id="7970"><span data-dcnode-id="7996" instrument_node="">Stalin controlled the foreign policy of the Soviet Union, with </span><a data-dcnode-id="7994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vyacheslav_Molotov" title="Vyacheslav Molotov"><span data-dcnode-id="7995" instrument_node="">Vyacheslav Molotov</span></a><span data-dcnode-id="7993" instrument_node=""> as the foreign minister.</span><sup class="reference" data-dcnode-id="7990" id="cite_ref-54"><a data-dcnode-id="7991" href="#cite_note-54"><span data-dcnode-id="7992" instrument_node="">[54]</span></a></sup><span data-dcnode-id="7989" instrument_node=""> Their policy was neutrality until August 1939, followed by friendly relations with Germany in order to carve up Eastern Europe. The USSR helped supply oil and munitions to Germany as its armies rolled across Western Europe in May–June 1940. Despite repeated warnings, Stalin refused to believe that Hitler was planning an all-out war on the USSR.</span><sup class="reference" data-dcnode-id="7986" id="cite_ref-55"><a data-dcnode-id="7987" href="#cite_note-55"><span data-dcnode-id="7988" instrument_node="">[55]</span></a></sup><span data-dcnode-id="7985" instrument_node=""> Stalin was stunned and temporarily helpless when Hitler invaded in June 1941. Stalin quickly came to terms with Britain and the United States, cemented through a series of summit meetings. The U.S. and Britain supplied war materials in large quantity through </span><a class="mw-redirect" data-dcnode-id="7983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lend_Lease" title="Lend Lease"><span data-dcnode-id="7984" instrument_node="">Lend Lease</span></a><span data-dcnode-id="7982" instrument_node="">.</span><sup class="reference" data-dcnode-id="7979" id="cite_ref-auto_56-0"><a data-dcnode-id="7980" href="#cite_note-auto-56"><span data-dcnode-id="7981" instrument_node="">[56]</span></a></sup><span data-dcnode-id="7978" instrument_node=""> There was some coordination of military action, especially in summer 1944. At war's end the central issue was whether Stalin would allow free elections in eastern Europe.</span><sup class="reference" data-dcnode-id="7975" id="cite_ref-57"><a data-dcnode-id="7976" href="#cite_note-57"><span data-dcnode-id="7977" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="7972" id="cite_ref-58"><a data-dcnode-id="7973" href="#cite_note-58"><span data-dcnode-id="7974" instrument_node="">[58]</span></a></sup><span data-dcnode-id="7971" instrument_node="">
</span></p><span data-dcnode-id="7969" instrument_node="">
