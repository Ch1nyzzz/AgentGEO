</span><p data-dcnode-id="10328"><span data-dcnode-id="10380" instrument_node="">After the </span><a data-dcnode-id="10378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Revolution" title="Russian Revolution"><span data-dcnode-id="10379" instrument_node="">Russian Revolution</span></a><span data-dcnode-id="10377" instrument_node="">, in which the Bolsheviks took over the old </span><a data-dcnode-id="10375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="10376" instrument_node="">Russian Empire</span></a><span data-dcnode-id="10374" instrument_node=""> in 1918, they faced enormous odds against the </span><a data-dcnode-id="10372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Empire" title="German Empire"><span data-dcnode-id="10373" instrument_node="">German Empire</span></a><span data-dcnode-id="10371" instrument_node=""> and eventually negotiated terms to pull out of </span><a data-dcnode-id="10369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_War_I" title="World War I"><span data-dcnode-id="10370" instrument_node="">World War I</span></a><span data-dcnode-id="10368" instrument_node="">. They then went to war against both </span><a data-dcnode-id="10366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_movement" title="White movement"><span data-dcnode-id="10367" instrument_node="">domestic</span></a><span data-dcnode-id="10365" instrument_node=""> and </span><a data-dcnode-id="10363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Allied_intervention_in_the_Russian_Civil_War" title="Allied intervention in the Russian Civil War"><span data-dcnode-id="10364" instrument_node="">international enemies</span></a><span data-dcnode-id="10362" instrument_node=""> in the </span><a data-dcnode-id="10360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="10361" instrument_node="">bitter civil war</span></a><span data-dcnode-id="10359" instrument_node="">. </span><a class="mw-redirect" data-dcnode-id="10357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Russian_Empire" title="The Russian Empire"><span data-dcnode-id="10358" instrument_node="">Tsarist Russia</span></a><span data-dcnode-id="10356" instrument_node=""> was reorganized as the </span><a data-dcnode-id="10354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="10355" instrument_node="">Soviet Union</span></a><span data-dcnode-id="10353" instrument_node=""> in 1922 with Vladimir Lenin in charge. At first, it was treated as an unrecognized </span><a data-dcnode-id="10351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pariah_state" title="Pariah state"><span data-dcnode-id="10352" instrument_node="">pariah state</span></a><span data-dcnode-id="10350" instrument_node=""> because of its </span><a data-dcnode-id="10348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Repudiation_of_debt_at_the_Russian_Revolution" title="Repudiation of debt at the Russian Revolution"><span data-dcnode-id="10349" instrument_node="">repudiating of tsarist debts</span></a><span data-dcnode-id="10347" instrument_node=""> and threats to destroy capitalism at home and around the world. By 1922, Moscow had repudiated the goal of world revolution, and sought diplomatic recognition and friendly trade relations with the capitalist world, starting with Britain and Germany. Finally in 1933, the United States gave recognition. Trade and technical help from Germany and the United States arrived in the late 1920s. After Lenin died in 1924, </span><a data-dcnode-id="10345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Joseph_Stalin" title="Joseph Stalin"><span data-dcnode-id="10346" instrument_node="">Joseph Stalin</span></a><span data-dcnode-id="10344" instrument_node="">, became leader. He transformed the country in the 1930s into an industrial and military power. After the </span><a data-dcnode-id="10342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Appeasement" title="Appeasement"><span data-dcnode-id="10343" instrument_node="">appeasement</span></a><span data-dcnode-id="10341" instrument_node=""> policy of Britain and France, the Soviet Union shifted from a strategy of antifascist </span><a data-dcnode-id="10339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Collective_security" title="Collective security"><span data-dcnode-id="10340" instrument_node="">collective security</span></a><span data-dcnode-id="10338" instrument_node=""> to one of </span><a data-dcnode-id="10336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_security" title="National security"><span data-dcnode-id="10337" instrument_node="">national security</span></a><span data-dcnode-id="10335" instrument_node="">. By signing the </span><a data-dcnode-id="10333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Molotov%25E2%2580%2593Ribbentrop_Pact" title="Molotov–Ribbentrop Pact"><span data-dcnode-id="10334" instrument_node="">Molotov–Ribbentrop Pact</span></a><span data-dcnode-id="10332" instrument_node=""> with Germany in August 1939, relations improved and the Soviet Union delayed the German invasion while occupying nearby territories in Eastern Europe. Despite repeated warnings that Hitler planned to invade, Stalin was caught by surprise in June 1941 when </span><a data-dcnode-id="10330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Barbarossa" title="Operation Barbarossa"><span data-dcnode-id="10331" instrument_node="">Nazi Germany invaded the Soviet Union</span></a><span data-dcnode-id="10329" instrument_node=""> and reached the outskirts of Leningrad and Moscow. However, the Soviet Union proved strong enough to defeat Nazi Germany, with help from its key allies.
</span></p><p data-dcnode-id="10305"><span data-dcnode-id="10327" instrument_node="">In 1945 the USSR became one of the five permanent members of the </span><a class="mw-redirect" data-dcnode-id="10325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UN_Security_Council" title="UN Security Council"><span data-dcnode-id="10326" instrument_node="">UN Security Council</span></a><span data-dcnode-id="10324" instrument_node="">—along with the United States, Britain, France, and China, giving it the right to </span><a data-dcnode-id="10322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Security_Council_veto_power" title="United Nations Security Council veto power"><span data-dcnode-id="10323" instrument_node="">veto</span></a><span data-dcnode-id="10321" instrument_node=""> any of the Security Council's resolutions (</span><i data-dcnode-id="10319"><span data-dcnode-id="10320" instrument_node="">see</span></i><span data-dcnode-id="10318" instrument_node=""> </span><a data-dcnode-id="10316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union_and_the_United_Nations" title="Soviet Union and the United Nations"><span data-dcnode-id="10317" instrument_node="">Soviet Union and the United Nations</span></a><span data-dcnode-id="10315" instrument_node="">). By 1947, American and European anger at Soviet control over Eastern Europe led to a Cold War, with Western Europe organized economically with large sums of </span><a data-dcnode-id="10313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marshall_Plan" title="Marshall Plan"><span data-dcnode-id="10314" instrument_node="">Marshall Plan</span></a><span data-dcnode-id="10312" instrument_node=""> money from Washington. Opposition to the danger of Soviet expansion formed the basis of the </span><a data-dcnode-id="10310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="10311" instrument_node="">NATO</span></a><span data-dcnode-id="10309" instrument_node=""> military alliance in 1949. There was no hot war, but the </span><a data-dcnode-id="10307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="10308" instrument_node="">Cold War</span></a><span data-dcnode-id="10306" instrument_node=""> was fought diplomatically and politically across the world by the Soviet and NATO blocks.
</span></p><p data-dcnode-id="10276"><span data-dcnode-id="10304" instrument_node="">The Kremlin controlled the socialist states that it established in the parts of Eastern Europe its army occupied in 1945. After eliminating capitalism and its advocates, it linked them to the USSR in terms of economics through </span><a class="mw-redirect" data-dcnode-id="10302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COMECON" title="COMECON"><span data-dcnode-id="10303" instrument_node="">COMECON</span></a><span data-dcnode-id="10301" instrument_node=""> and later the military through the </span><a data-dcnode-id="10299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="10300" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="10298" instrument_node="">. In 1948, relations with </span><a class="mw-redirect" data-dcnode-id="10296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SFR_Yugoslavia" title="SFR Yugoslavia"><span data-dcnode-id="10297" instrument_node="">Yugoslavia</span></a><span data-dcnode-id="10295" instrument_node=""> </span><a data-dcnode-id="10293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tito%25E2%2580%2593Stalin_split" title="Tito–Stalin split"><span data-dcnode-id="10294" instrument_node="">disintegrated</span></a><span data-dcnode-id="10292" instrument_node=""> over mutual distrust between Stalin and </span><a data-dcnode-id="10290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Josip_Broz_Tito" title="Josip Broz Tito"><span data-dcnode-id="10291" instrument_node="">Tito</span></a><span data-dcnode-id="10289" instrument_node="">. A similar </span><a class="mw-redirect" data-dcnode-id="10287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Albanian_split" title="Soviet–Albanian split"><span data-dcnode-id="10288" instrument_node="">split</span></a><span data-dcnode-id="10286" instrument_node=""> happened with </span><a class="mw-redirect" data-dcnode-id="10284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Albania" title="People's Republic of Albania"><span data-dcnode-id="10285" instrument_node="">Albania</span></a><span data-dcnode-id="10283" instrument_node=""> in 1955. Like Yugoslavia and Albania, China was never controlled by the Soviet Army. The Kremlin wavered between the two factions fighting the Chinese Civil War, but ultimately supported the winner, </span><a data-dcnode-id="10281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mao_Zedong" title="Mao Zedong"><span data-dcnode-id="10282" instrument_node="">Mao Zedong</span></a><span data-dcnode-id="10280" instrument_node="">. Stalin and Mao both supported North Korea in its invasion of South Korea in 1950. But the United States and the United Nations mobilized the counterforce in the </span><a data-dcnode-id="10278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_War" title="Korean War"><span data-dcnode-id="10279" instrument_node="">Korean War</span></a><span data-dcnode-id="10277" instrument_node=""> (1950–53). Moscow provided air support but no ground troops; China sent in its large army that eventually stalemated the war. By 1960, disagreements between Beijing and Moscow had escalated out of control, and the two nations became bitter enemies in the contest for control of worldwide communist activities.
</span></p><p data-dcnode-id="10268"><span data-dcnode-id="10275" instrument_node="">Tensions between the Soviet Union and the United States reached an all-time high during the 1962 </span><a data-dcnode-id="10273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Missile_Crisis" title="Cuban Missile Crisis"><span data-dcnode-id="10274" instrument_node="">Cuban Missile Crisis</span></a><span data-dcnode-id="10272" instrument_node="">, in which Soviet missiles were placed on the island of Cuba well within range of US territory as a response to the failed </span><a data-dcnode-id="10270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bay_of_Pigs_Invasion" title="Bay of Pigs Invasion"><span data-dcnode-id="10271" instrument_node="">Bay of Pigs Invasion</span></a><span data-dcnode-id="10269" instrument_node=""> and to deter more US attacks. This was retrospectively viewed as the closest the world ever came to a nuclear war. After the crisis was resolved, relations with the United States gradually eased into the 1970s, reaching a degree of détente as both Moscow and Beijing sought American favor.
</span></p><p data-dcnode-id="10245"><span data-dcnode-id="10267" instrument_node="">In 1979 a socialist government took power in Afghanistan but was hard-pressed and requested military help from Moscow. </span><a data-dcnode-id="10265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="10266" instrument_node="">The Soviet army intervened</span></a><span data-dcnode-id="10264" instrument_node=""> to support the socialists, but found itself in a major confrontation. The presidency of Ronald Reagan in the United States was fiercely anti-Soviet, and mobilized its allies to support the guerrilla war against the Soviets in Afghanistan. The goal was to create something akin to the Vietnam War which would drain Soviet forces and morale. When </span><a data-dcnode-id="10262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="10263" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="10261" instrument_node=""> became the leader of the Soviet Union in 1985, he sought to </span><a data-dcnode-id="10259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Perestroika" title="Perestroika"><span data-dcnode-id="10260" instrument_node="">restructure</span></a><span data-dcnode-id="10258" instrument_node=""> the Soviet Union to resemble the </span><a data-dcnode-id="10256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nordic_model" title="Nordic model"><span data-dcnode-id="10257" instrument_node="">Scandinavian model</span></a><span data-dcnode-id="10255" instrument_node=""> of western </span><a data-dcnode-id="10253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_democracy" title="Social democracy"><span data-dcnode-id="10254" instrument_node="">social democracy</span></a><span data-dcnode-id="10252" instrument_node=""> and thus create a private sector economy. He removed Soviet troops from Afghanistan and began a hands-off approach in the USSR's relations with its Eastern European allies. This was well received by the United States, but it led to the breakaway of the Eastern European satellites in 1989, and the final collapse and </span><a data-dcnode-id="10250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dissolution_of_the_Soviet_Union" title="Dissolution of the Soviet Union"><span data-dcnode-id="10251" instrument_node="">dissolution of the USSR in 1991</span></a><span data-dcnode-id="10249" instrument_node="">. The new Russia, under </span><a data-dcnode-id="10247" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="10248" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="10246" instrument_node="">, was no longer communist.
</span></p><p data-dcnode-id="10237"><span data-dcnode-id="10244" instrument_node="">The </span><a data-dcnode-id="10242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_%28Soviet_Union%29" title="Ministry of Foreign Affairs (Soviet Union)"><span data-dcnode-id="10243" instrument_node="">Ministry of Foreign Affairs</span></a><span data-dcnode-id="10241" instrument_node=""> implemented the foreign policies set by Stalin and after his death by the Politburo. </span><a data-dcnode-id="10239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrei_Gromyko" title="Andrei Gromyko"><span data-dcnode-id="10240" instrument_node="">Andrei Gromyko</span></a><span data-dcnode-id="10238" instrument_node=""> served as the Minister of Foreign Affairs for nearly thirty years (1957–1985).
</span></p><span data-dcnode-id="10236" instrument_node="">

</span><h2 data-dcnode-id="9742"><span class="mw-headline" data-dcnode-id="9750" id="Ideology_and_objectives_of_Soviet_foreign_policy"><span data-dcnode-id="9751" instrument_node="">Ideology and objectives of Soviet foreign policy</span></span><span class="mw-editsection" data-dcnode-id="9743"><span class="mw-editsection-bracket" data-dcnode-id="9748"><span data-dcnode-id="9749" instrument_node="">[</span></span><a data-dcnode-id="9746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D1" title="Edit section: Ideology and objectives of Soviet foreign policy"><span data-dcnode-id="9747" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9744"><span data-dcnode-id="9745" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9741" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="9729" role="note"><span data-dcnode-id="9738" instrument_node="">Main articles: </span><a data-dcnode-id="9736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="9737" instrument_node="">Marxism–Leninism</span></a><span data-dcnode-id="9735" instrument_node="">, </span><a data-dcnode-id="9733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletarian_internationalism" title="Proletarian internationalism"><span data-dcnode-id="9734" instrument_node="">Proletarian internationalism</span></a><span data-dcnode-id="9732" instrument_node="">, and </span><a data-dcnode-id="9730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="9731" instrument_node="">Peaceful coexistence</span></a></div><span data-dcnode-id="9728" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9717"><div class="thumbinner" data-dcnode-id="9718" style="width:222px;"><a class="image" data-dcnode-id="9726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoscow_July_2011-38a.jpg"><img alt="" class="thumbimage" data-dcnode-id="9727" data-file-height="5524" data-file-width="4480" decoding="async" height="271" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Moscow_July_2011-38a.jpg/220px-Moscow_July_2011-38a.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Moscow_July_2011-38a.jpg/330px-Moscow_July_2011-38a.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Moscow_July_2011-38a.jpg/440px-Moscow_July_2011-38a.jpg 2x" width="220"></a><span data-dcnode-id="9725" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9719"><div class="magnify" data-dcnode-id="9723"><a class="internal" data-dcnode-id="9724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AMoscow_July_2011-38a.jpg" title="Enlarge"></a></div><a data-dcnode-id="9721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_of_Russia_main_building" title="Ministry of Foreign Affairs of Russia main building"><span data-dcnode-id="9722" instrument_node="">Ministry of Foreign Affairs main building</span></a><span data-dcnode-id="9720" instrument_node="">, completed in 1953</span></div></div></div><span data-dcnode-id="9716" instrument_node="">
</span><p data-dcnode-id="9682"><span data-dcnode-id="9715" instrument_node="">According to Soviet </span><a data-dcnode-id="9713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="9714" instrument_node="">Marxist–Leninist</span></a><span data-dcnode-id="9712" instrument_node=""> theorists, the basic character of Soviet foreign policy was set forth in Vladimir Lenin's </span><i data-dcnode-id="9709"><a data-dcnode-id="9710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Decree_on_Peace" title="Decree on Peace"><span data-dcnode-id="9711" instrument_node="">Decree on Peace</span></a></i><span data-dcnode-id="9708" instrument_node="">, adopted by the </span><a class="mw-redirect" data-dcnode-id="9706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Congress_of_Soviets" title="Second Congress of Soviets"><span data-dcnode-id="9707" instrument_node="">Second Congress of Soviets</span></a><span data-dcnode-id="9705" instrument_node=""> in November 1917. It set forth the dual nature of Soviet foreign policy, which encompasses both </span><a data-dcnode-id="9703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletarian_internationalism" title="Proletarian internationalism"><span data-dcnode-id="9704" instrument_node="">proletarian internationalism</span></a><span data-dcnode-id="9702" instrument_node=""> and </span><a data-dcnode-id="9700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="9701" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="9699" instrument_node="">. On the one hand, proletarian internationalism refers to the common cause of the </span><a data-dcnode-id="9697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Working_class" title="Working class"><span data-dcnode-id="9698" instrument_node="">working class</span></a><span data-dcnode-id="9696" instrument_node=""> (or the </span><a data-dcnode-id="9694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Proletariat" title="Proletariat"><span data-dcnode-id="9695" instrument_node="">proletariat</span></a><span data-dcnode-id="9693" instrument_node="">) of all countries in struggling to overthrow the </span><a data-dcnode-id="9691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bourgeoisie" title="Bourgeoisie"><span data-dcnode-id="9692" instrument_node="">bourgeoisie</span></a><span data-dcnode-id="9690" instrument_node=""> and to start a </span><a data-dcnode-id="9688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_revolution" title="Communist revolution"><span data-dcnode-id="9689" instrument_node="">communist revolution</span></a><span data-dcnode-id="9687" instrument_node="">. Peaceful coexistence, on the other hand, refers to measures to ensure relatively peaceful government-to-government relations with capitalist states. Both policies can be pursued simultaneously: "Peaceful coexistence does not rule out but presupposes determined opposition to imperialist aggression and support for peoples defending their revolutionary gains or fighting foreign oppression."</span><sup class="reference" data-dcnode-id="9684" id="cite_ref-LOCCSussr_1-0"><a data-dcnode-id="9685" href="#cite_note-LOCCSussr-1"><span data-dcnode-id="9686" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9683" instrument_node="">
</span></p><p data-dcnode-id="9670"><span data-dcnode-id="9681" instrument_node="">The Soviet commitment in practice to proletarian internationalism declined since the founding of the Soviet state, although this component of ideology still had some effect on later formulation and execution of Soviet foreign policy. Although pragmatic </span><i data-dcnode-id="9679"><span data-dcnode-id="9680" instrument_node="">raisons d'état</span></i><span data-dcnode-id="9678" instrument_node=""> undoubtedly accounted for much of more recent Soviet foreign policy, the ideology of </span><a class="mw-redirect" data-dcnode-id="9676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Class_struggle" title="Class struggle"><span data-dcnode-id="9677" instrument_node="">class struggle</span></a><span data-dcnode-id="9675" instrument_node=""> still played a role in providing a worldview and certain loose guidelines for action in the 1980s. Marxist–Leninist ideology reinforces other characteristics of political culture that create an attitude of competition and conflict with other states.</span><sup class="reference" data-dcnode-id="9672" id="cite_ref-LOCCSussr_1-1"><a data-dcnode-id="9673" href="#cite_note-LOCCSussr-1"><span data-dcnode-id="9674" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9671" instrument_node="">
</span></p><p data-dcnode-id="9646"><span data-dcnode-id="9669" instrument_node="">The general foreign policy goals of the Soviet Union were formalized in a party program ratified by delegates to the </span><a data-dcnode-id="9667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/27th_Congress_of_the_Communist_Party_of_the_Soviet_Union" title="27th Congress of the Communist Party of the Soviet Union"><span data-dcnode-id="9668" instrument_node="">Twenty-Seventh Party Congress</span></a><span data-dcnode-id="9666" instrument_node=""> in February–March 1986. According to the programme, "the main goals and guidelines of the CPSU's international policy" included ensuring favorable external conditions conducive to building </span><a data-dcnode-id="9664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communism" title="Communism"><span data-dcnode-id="9665" instrument_node="">communism</span></a><span data-dcnode-id="9663" instrument_node=""> in the Soviet Union; eliminating the threat of world war; </span><a data-dcnode-id="9661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Disarmament" title="Disarmament"><span data-dcnode-id="9662" instrument_node="">disarmament</span></a><span data-dcnode-id="9660" instrument_node="">; strengthening the </span><a data-dcnode-id="9658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_revolution" title="World revolution"><span data-dcnode-id="9659" instrument_node="">world socialist system</span></a><span data-dcnode-id="9657" instrument_node="">; developing equal and friendly relations with liberated (</span><a class="mw-redirect" data-dcnode-id="9655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_world" title="Third world"><span data-dcnode-id="9656" instrument_node="">third world</span></a><span data-dcnode-id="9654" instrument_node="">) countries; peaceful coexistence with the capitalist countries; and solidarity with communist and revolutionary-democratic parties, the international workers' movement, and </span><a data-dcnode-id="9652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/National_liberation_%28Marxism%29" title="National liberation (Marxism)"><span data-dcnode-id="9653" instrument_node="">national liberation struggles</span></a><span data-dcnode-id="9651" instrument_node="">.</span><sup class="reference" data-dcnode-id="9648" id="cite_ref-LOCCSussr_1-2"><a data-dcnode-id="9649" href="#cite_note-LOCCSussr-1"><span data-dcnode-id="9650" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9647" instrument_node="">
</span></p><p data-dcnode-id="9625"><span data-dcnode-id="9645" instrument_node="">Although these general foreign policy goals were apparently conceived in terms of priorities, the emphasis and ranking of the priorities have changed over time in response to domestic and international stimuli. After </span><a data-dcnode-id="9643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="9644" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="9642" instrument_node=""> became </span><a data-dcnode-id="9640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union" title="General Secretary of the Communist Party of the Soviet Union"><span data-dcnode-id="9641" instrument_node="">General Secretary of the Communist Party</span></a><span data-dcnode-id="9639" instrument_node=""> in 1985, for instance, some Western analysts discerned in the ranking of priorities a possible de-emphasis of Soviet support for </span><a data-dcnode-id="9637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wars_of_national_liberation" title="Wars of national liberation"><span data-dcnode-id="9638" instrument_node="">national liberation movements</span></a><span data-dcnode-id="9636" instrument_node="">. Although the emphasis and ranking of priorities were subject to change, two basic goals of Soviet foreign policy remained constant: national security (safeguarding </span><a data-dcnode-id="9634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_Party_of_the_Soviet_Union" title="Communist Party of the Soviet Union"><span data-dcnode-id="9635" instrument_node="">Communist Party</span></a><span data-dcnode-id="9633" instrument_node=""> rule through internal control and the maintenance of adequate military forces) and, since the late 1940s, influence over </span><a data-dcnode-id="9631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iron_Curtain" title="Iron Curtain"><span data-dcnode-id="9632" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="9630" instrument_node="">.</span><sup class="reference" data-dcnode-id="9627" id="cite_ref-LOCCSussr_1-3"><a data-dcnode-id="9628" href="#cite_note-LOCCSussr-1"><span data-dcnode-id="9629" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9626" instrument_node="">
</span></p><p data-dcnode-id="9568"><span data-dcnode-id="9624" instrument_node="">Many Western analysts have examined the way Soviet behavior in various regions and countries supported the general goals of Soviet foreign policy. These analysts have assessed Soviet behavior in the 1970s and 1980s as placing primary emphasis on relations with the United States, which was considered the foremost threat to the national security of the Soviet Union. Second priority was given to relations with </span><a data-dcnode-id="9622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_Europe" title="Eastern Europe"><span data-dcnode-id="9623" instrument_node="">Eastern Europe</span></a><span data-dcnode-id="9621" instrument_node=""> (the other members of the </span><a data-dcnode-id="9619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Warsaw_Pact" title="Warsaw Pact"><span data-dcnode-id="9620" instrument_node="">Warsaw Pact</span></a><span data-dcnode-id="9618" instrument_node="">) and </span><a data-dcnode-id="9616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Europe" title="Western Europe"><span data-dcnode-id="9617" instrument_node="">Western Europe</span></a><span data-dcnode-id="9615" instrument_node=""> (the European members of the </span><a data-dcnode-id="9613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/NATO" title="NATO"><span data-dcnode-id="9614" instrument_node="">North Atlantic Treaty Organization</span></a><span data-dcnode-id="9612" instrument_node="">). Third priority was given to the littoral or propinquitous states along the southern border of the Soviet Union: </span><a data-dcnode-id="9610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="9611" instrument_node="">Turkey</span></a><span data-dcnode-id="9609" instrument_node=""> (a NATO member), </span><a data-dcnode-id="9607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="9608" instrument_node="">Iran</span></a><span data-dcnode-id="9606" instrument_node="">, </span><a data-dcnode-id="9604" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghanistan" title="Afghanistan"><span data-dcnode-id="9605" instrument_node="">Afghanistan</span></a><span data-dcnode-id="9603" instrument_node="">, </span><a data-dcnode-id="9601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/China" title="China"><span data-dcnode-id="9602" instrument_node="">China</span></a><span data-dcnode-id="9600" instrument_node="">, </span><a data-dcnode-id="9598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mongolia" title="Mongolia"><span data-dcnode-id="9599" instrument_node="">Mongolia</span></a><span data-dcnode-id="9597" instrument_node="">, </span><a data-dcnode-id="9595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Korea" title="North Korea"><span data-dcnode-id="9596" instrument_node="">North Korea</span></a><span data-dcnode-id="9594" instrument_node="">, and </span><a data-dcnode-id="9592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Japan" title="Japan"><span data-dcnode-id="9593" instrument_node="">Japan</span></a><span data-dcnode-id="9591" instrument_node="">. Regions near to, but not bordering, the Soviet Union were assigned fourth priority. These included the </span><a data-dcnode-id="9589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greater_Middle_East" title="Greater Middle East"><span data-dcnode-id="9590" instrument_node="">greater Middle East</span></a><span data-dcnode-id="9588" instrument_node="">, </span><a data-dcnode-id="9586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Asia" title="South Asia"><span data-dcnode-id="9587" instrument_node="">South Asia</span></a><span data-dcnode-id="9585" instrument_node="">, and </span><a data-dcnode-id="9583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southeast_Asia" title="Southeast Asia"><span data-dcnode-id="9584" instrument_node="">Southeast Asia</span></a><span data-dcnode-id="9582" instrument_node="">. Last priority was given to </span><a data-dcnode-id="9580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sub-Saharan_Africa" title="Sub-Saharan Africa"><span data-dcnode-id="9581" instrument_node="">sub-Saharan Africa</span></a><span data-dcnode-id="9579" instrument_node="">, </span><a data-dcnode-id="9577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oceania" title="Oceania"><span data-dcnode-id="9578" instrument_node="">Oceania</span></a><span data-dcnode-id="9576" instrument_node="">, and </span><a data-dcnode-id="9574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Latin_America" title="Latin America"><span data-dcnode-id="9575" instrument_node="">Latin America</span></a><span data-dcnode-id="9573" instrument_node="">, except insofar as these regions either provided opportunities for strategic basing or bordered on strategic naval straits or sea lanes. In general, Soviet foreign policy was most concerned with superpower relations (and, more broadly, relations between the members of NATO and the Warsaw Pact), but during the 1980s Soviet leaders pursued improved relations with all regions of the world as part of its foreign policy objectives.</span><sup class="reference" data-dcnode-id="9570" id="cite_ref-LOCCSussr_1-4"><a data-dcnode-id="9571" href="#cite_note-LOCCSussr-1"><span data-dcnode-id="9572" instrument_node="">[1]</span></a></sup><span data-dcnode-id="9569" instrument_node="">
</span></p><span data-dcnode-id="9567" instrument_node="">
</span><h2 data-dcnode-id="9557"><span class="mw-headline" data-dcnode-id="9565" id="Commissars_and_ministers"><span data-dcnode-id="9566" instrument_node="">Commissars and ministers</span></span><span class="mw-editsection" data-dcnode-id="9558"><span class="mw-editsection-bracket" data-dcnode-id="9563"><span data-dcnode-id="9564" instrument_node="">[</span></span><a data-dcnode-id="9561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D2" title="Edit section: Commissars and ministers"><span data-dcnode-id="9562" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9559"><span data-dcnode-id="9560" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9556" instrument_node="">
</span><p data-dcnode-id="9551"><span data-dcnode-id="9555" instrument_node="">The </span><a data-dcnode-id="9553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ministry_of_Foreign_Affairs_%28Soviet_Union%29" title="Ministry of Foreign Affairs (Soviet Union)"><span data-dcnode-id="9554" instrument_node="">Ministry of Foreign Affairs</span></a><span data-dcnode-id="9552" instrument_node="">—called "Narkomindel" until 1949—drafted policy papers for the approval of Stalin and the Politburo, and then sent their orders out to the Soviet embassies. The following persons headed the Commissariat/Ministry as commissars (narkoms), ministers, and deputy ministers during the Soviet era:

</span><h2 data-dcnode-id="9072"><span data-dcnode-id="9082" id="1917.E2.80.931939"></span><span class="mw-headline" data-dcnode-id="9080" id="1917–1939"><span data-dcnode-id="9081" instrument_node="">1917–1939</span></span><span class="mw-editsection" data-dcnode-id="9073"><span class="mw-editsection-bracket" data-dcnode-id="9078"><span data-dcnode-id="9079" instrument_node="">[</span></span><a data-dcnode-id="9076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D3" title="Edit section: 1917–1939"><span data-dcnode-id="9077" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9074"><span data-dcnode-id="9075" instrument_node="">]</span></span></span></h2><span data-dcnode-id="9071" instrument_node="">
</span><link data-dcnode-id="9070" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9063" role="note"><span data-dcnode-id="9069" instrument_node="">Further information: </span><a data-dcnode-id="9067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/International_relations_%281919%25E2%2580%25931939%29" title="International relations (1919–1939)"><span data-dcnode-id="9068" instrument_node="">International relations (1919–1939)</span></a><span data-dcnode-id="9066" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="9064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany%25E2%2580%2593Soviet_Union_relations_before_1941" title="Germany–Soviet Union relations before 1941"><span data-dcnode-id="9065" instrument_node="">Germany–Soviet Union relations before 1941</span></a></div><span data-dcnode-id="9062" instrument_node="">
</span><p data-dcnode-id="9054"><span data-dcnode-id="9061" instrument_node="">There were three distinct phases in Soviet foreign policy between the conclusion of the </span><a data-dcnode-id="9059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="9060" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="9058" instrument_node=""> and the </span><a class="mw-redirect" data-dcnode-id="9056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nazi-Soviet_Pact" title="Nazi-Soviet Pact"><span data-dcnode-id="9057" instrument_node="">Nazi-Soviet Pact</span></a><span data-dcnode-id="9055" instrument_node=""> in 1939, determined in part by political struggles within the USSR, and in part by dynamic developments in international relations and the effect these had on Soviet security.
</span></p><span data-dcnode-id="9053" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="9038"><div class="thumbinner" data-dcnode-id="9039" style="width:222px;"><a class="image" data-dcnode-id="9051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATrotzki_Deutsche_Brest-Litowsk1917.jpg"><img alt="" class="thumbimage" data-dcnode-id="9052" data-file-height="621" data-file-width="612" decoding="async" height="223" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Trotzki_Deutsche_Brest-Litowsk1917.jpg/220px-Trotzki_Deutsche_Brest-Litowsk1917.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Trotzki_Deutsche_Brest-Litowsk1917.jpg/330px-Trotzki_Deutsche_Brest-Litowsk1917.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Trotzki_Deutsche_Brest-Litowsk1917.jpg/440px-Trotzki_Deutsche_Brest-Litowsk1917.jpg 2x" width="220"></a><span data-dcnode-id="9050" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="9040"><div class="magnify" data-dcnode-id="9048"><a class="internal" data-dcnode-id="9049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ATrotzki_Deutsche_Brest-Litowsk1917.jpg" title="Enlarge"></a></div><span data-dcnode-id="9047" instrument_node="">Soviet delegation with </span><a data-dcnode-id="9045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leon_Trotsky" title="Leon Trotsky"><span data-dcnode-id="9046" instrument_node="">Trotsky</span></a><span data-dcnode-id="9044" instrument_node=""> greeted by German officers at </span><a data-dcnode-id="9042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brest-Litovsk" title="Treaty of Brest-Litovsk"><span data-dcnode-id="9043" instrument_node="">Brest-Litovsk</span></a><span data-dcnode-id="9041" instrument_node="">, 8 January 1918</span></div></div></div><span data-dcnode-id="9037" instrument_node="">
</span><p data-dcnode-id="9022"><span data-dcnode-id="9036" instrument_node="">Lenin, once in power, believed the </span><a data-dcnode-id="9034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="9035" instrument_node="">October Revolution</span></a><span data-dcnode-id="9033" instrument_node=""> would ignite the world's socialists and lead to a "World Revolution."  Lenin set up the Communist International (</span><a class="mw-redirect" data-dcnode-id="9031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Comintern" title="Comintern"><span data-dcnode-id="9032" instrument_node="">Comintern</span></a><span data-dcnode-id="9030" instrument_node="">) to </span><a class="mw-redirect" data-dcnode-id="9028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Export_of_revolution" title="Export of revolution"><span data-dcnode-id="9029" instrument_node="">export revolution</span></a><span data-dcnode-id="9027" instrument_node=""> to the rest of Europe and Asia. Indeed, Lenin set out to "liberate" all of Asia from imperialist and capitalist control. The first stage not only was  defeated in key attempts, but angered the other powers by its promise to overthrow capitalism.</span><sup class="reference" data-dcnode-id="9024" id="cite_ref-2"><a data-dcnode-id="9025" href="#cite_note-2"><span data-dcnode-id="9026" instrument_node="">[2]</span></a></sup><span data-dcnode-id="9023" instrument_node="">
</span></p><span data-dcnode-id="9021" instrument_node="">
</span><h3 data-dcnode-id="9011"><span class="mw-headline" data-dcnode-id="9019" id="World_revolution"><span data-dcnode-id="9020" instrument_node="">World revolution</span></span><span class="mw-editsection" data-dcnode-id="9012"><span class="mw-editsection-bracket" data-dcnode-id="9017"><span data-dcnode-id="9018" instrument_node="">[</span></span><a data-dcnode-id="9015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D4" title="Edit section: World revolution"><span data-dcnode-id="9016" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="9013"><span data-dcnode-id="9014" instrument_node="">]</span></span></span></h3><span data-dcnode-id="9010" instrument_node="">
</span><link data-dcnode-id="9009" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="9002" role="note"><span data-dcnode-id="9008" instrument_node="">See also: </span><a data-dcnode-id="9006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_revolution" title="World revolution"><span data-dcnode-id="9007" instrument_node="">World revolution</span></a><span data-dcnode-id="9005" instrument_node=""> and </span><a data-dcnode-id="9003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revolutions_of_1917%25E2%2580%25931923" title="Revolutions of 1917–1923"><span data-dcnode-id="9004" instrument_node="">Revolutions of 1917–1923</span></a></div><div class="thumb tright" data-dcnode-id="8993"><div class="thumbinner" data-dcnode-id="8994" style="width:222px;"><a class="image" data-dcnode-id="9000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A1%25D0%25BA%25D0%25BE%25D1%2580%25D0%25BE_%25D0%25B2%25D0%25B5%25D1%2581%25D1%258C_%25D0%25BC%25D0%25B8%25D1%2580_%25D0%25B1%25D1%2583%25D0%25B4%25D0%25B5%25D1%2582_%25D0%25BD%25D0%25B0%25D1%2588.jpg"><img alt="" class="thumbimage" data-dcnode-id="9001" data-file-height="1959" data-file-width="3020" decoding="async" height="143" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/41/%25D0%25A1%25D0%25BA%25D0%25BE%25D1%2580%25D0%25BE_%25D0%25B2%25D0%25B5%25D1%2581%25D1%258C_%25D0%25BC%25D0%25B8%25D1%2580_%25D0%25B1%25D1%2583%25D0%25B4%25D0%25B5%25D1%2582_%25D0%25BD%25D0%25B0%25D1%2588.jpg/220px-%25D0%25A1%25D0%25BA%25D0%25BE%25D1%2580%25D0%25BE_%25D0%25B2%25D0%25B5%25D1%2581%25D1%258C_%25D0%25BC%25D0%25B8%25D1%2580_%25D0%25B1%25D1%2583%25D0%25B4%25D0%25B5%25D1%2582_%25D0%25BD%25D0%25B0%25D1%2588.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/41/%D0%A1%D0%BA%D0%BE%D1%80%D0%BE_%D0%B2%D0%B5%D1%81%D1%8C_%D0%BC%D0%B8%D1%80_%D0%B1%D1%83%D0%B4%D0%B5%D1%82_%D0%BD%D0%B0%D1%88.jpg/330px-%D0%A1%D0%BA%D0%BE%D1%80%D0%BE_%D0%B2%D0%B5%D1%81%D1%8C_%D0%BC%D0%B8%D1%80_%D0%B1%D1%83%D0%B4%D0%B5%D1%82_%D0%BD%D0%B0%D1%88.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/41/%D0%A1%D0%BA%D0%BE%D1%80%D0%BE_%D0%B2%D0%B5%D1%81%D1%8C_%D0%BC%D0%B8%D1%80_%D0%B1%D1%83%D0%B4%D0%B5%D1%82_%D0%BD%D0%B0%D1%88.jpg/440px-%D0%A1%D0%BA%D0%BE%D1%80%D0%BE_%D0%B2%D0%B5%D1%81%D1%8C_%D0%BC%D0%B8%D1%80_%D0%B1%D1%83%D0%B4%D0%B5%D1%82_%D0%BD%D0%B0%D1%88.jpg 2x" width="220"></a><span data-dcnode-id="8999" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8995"><div class="magnify" data-dcnode-id="8997"><a class="internal" data-dcnode-id="8998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A%25D0%25A1%25D0%25BA%25D0%25BE%25D1%2580%25D0%25BE_%25D0%25B2%25D0%25B5%25D1%2581%25D1%258C_%25D0%25BC%25D0%25B8%25D1%2580_%25D0%25B1%25D1%2583%25D0%25B4%25D0%25B5%25D1%2582_%25D0%25BD%25D0%25B0%25D1%2588.jpg" title="Enlarge"></a></div><span data-dcnode-id="8996" instrument_node="">Soon all the World will be ours, 1920</span></div></div></div><span data-dcnode-id="8992" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="8983"><div class="thumbinner" data-dcnode-id="8984" style="width:222px;"><a class="image" data-dcnode-id="8990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADyadya_lenin.jpg"><img alt="" class="thumbimage" data-dcnode-id="8991" data-file-height="575" data-file-width="400" decoding="async" height="316" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/af/Dyadya_lenin.jpg/220px-Dyadya_lenin.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/af/Dyadya_lenin.jpg/330px-Dyadya_lenin.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/a/af/Dyadya_lenin.jpg 2x" width="220"></a><span data-dcnode-id="8989" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="8985"><div class="magnify" data-dcnode-id="8987"><a class="internal" data-dcnode-id="8988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADyadya_lenin.jpg" title="Enlarge"></a></div><span data-dcnode-id="8986" instrument_node="">Lenin wipes out kings, priests and capitalists off the globe.</span></div></div></div><span data-dcnode-id="8982" instrument_node="">
</span><p data-dcnode-id="8920"><span data-dcnode-id="8981" instrument_node="">The Bolsheviks seized power in Russia in the </span><a data-dcnode-id="8979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/October_Revolution" title="October Revolution"><span data-dcnode-id="8980" instrument_node="">October Revolution</span></a><span data-dcnode-id="8978" instrument_node=""> of November 1917 but they could not stop the </span><a class="mw-redirect" data-dcnode-id="8976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Army_%28German_Empire%29" title="German Army (German Empire)"><span data-dcnode-id="8977" instrument_node="">Imperial German Army</span></a><span data-dcnode-id="8975" instrument_node=""> from advancing rapidly deep into Russia in </span><a data-dcnode-id="8973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Faustschlag" title="Operation Faustschlag"><span data-dcnode-id="8974" instrument_node="">Operation Faustschlag</span></a><span data-dcnode-id="8972" instrument_node="">. The Bolsheviks saw Russia as only the first step—they planned to incite revolutions against capitalism in every western country. The immediate threat was an unstoppable German attack.  The Germans wanted to knock Russia out of the war so they could move their forces to the </span><a data-dcnode-id="8970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Front_%28World_War_I%29" title="Western Front (World War I)"><span data-dcnode-id="8971" instrument_node="">Western Front</span></a><span data-dcnode-id="8969" instrument_node=""> in spring 1918 before the </span><a data-dcnode-id="8967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Expeditionary_Forces" title="American Expeditionary Forces"><span data-dcnode-id="8968" instrument_node="">American Expeditionary Force</span></a><span data-dcnode-id="8966" instrument_node=""> soldiers arrived in force. In early March 1918, after bitter internal debate, Russia agreed to harsh German peace terms at the </span><a data-dcnode-id="8964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Brest-Litovsk" title="Treaty of Brest-Litovsk"><span data-dcnode-id="8965" instrument_node="">Treaty of Brest-Litovsk</span></a><span data-dcnode-id="8963" instrument_node="">. Moscow lost control of the </span><a data-dcnode-id="8961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baltic_states" title="Baltic states"><span data-dcnode-id="8962" instrument_node="">Baltic States</span></a><span data-dcnode-id="8960" instrument_node="">, </span><a data-dcnode-id="8958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Congress_Poland" title="Congress Poland"><span data-dcnode-id="8959" instrument_node="">Poland</span></a><span data-dcnode-id="8957" instrument_node="">, </span><a data-dcnode-id="8955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukraine" title="Ukraine"><span data-dcnode-id="8956" instrument_node="">Ukraine</span></a><span data-dcnode-id="8954" instrument_node="">, and other areas that before the war produced much of Russia's food supply, industrial base, coal, and communication links with Western Europe."</span><sup class="reference" data-dcnode-id="8951" id="cite_ref-3"><a data-dcnode-id="8952" href="#cite_note-3"><span data-dcnode-id="8953" instrument_node="">[3]</span></a></sup><span data-dcnode-id="8950" instrument_node=""> Russia's allies Britain and France felt betrayed: "The treaty was the ultimate betrayal of the Allied cause and sowed the seeds for the Cold War. With Brest-Litovsk the spectre of German domination in Eastern Europe threatened to become reality, and the Allies now began to think seriously about military intervention [in Russia]."</span><sup class="reference" data-dcnode-id="8947" id="cite_ref-4"><a data-dcnode-id="8948" href="#cite_note-4"><span data-dcnode-id="8949" instrument_node="">[4]</span></a></sup><span data-dcnode-id="8946" instrument_node="">
In 1918 Britain sent in money and some troops to support the </span><a data-dcnode-id="8944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/White_movement" title="White movement"><span data-dcnode-id="8945" instrument_node="">anti-Bolshevik "White" counter-revolutionaries</span></a><span data-dcnode-id="8943" instrument_node="">. France, Japan and the United States also sent forces to block German advances. In effect the Allies were helping the anti-Bolshevik White forces. The </span><a data-dcnode-id="8941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Civil_War" title="Russian Civil War"><span data-dcnode-id="8942" instrument_node="">Russian Civil War</span></a><span data-dcnode-id="8940" instrument_node=""> saw multiple uncoordinated attacks on the Bolsheviks from every direction. However, the Bolsheviks, operating a unified command from a central location, defeated all the opposition one by one and took full control of Russia, as well as breakaway provinces such as </span><a data-dcnode-id="8938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ukrainian_People%2527s_Republic" title="Ukrainian People's Republic"><span data-dcnode-id="8939" instrument_node="">Ukraine</span></a><span data-dcnode-id="8937" instrument_node="">, </span><a data-dcnode-id="8935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Democratic_Republic_of_Georgia" title="Democratic Republic of Georgia"><span data-dcnode-id="8936" instrument_node="">Georgia</span></a><span data-dcnode-id="8934" instrument_node="">, </span><a data-dcnode-id="8932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Republic_of_Armenia" title="First Republic of Armenia"><span data-dcnode-id="8933" instrument_node="">Armenia</span></a><span data-dcnode-id="8931" instrument_node="">, and </span><a data-dcnode-id="8929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azerbaijan_Democratic_Republic" title="Azerbaijan Democratic Republic"><span data-dcnode-id="8930" instrument_node="">Azerbaijan</span></a><span data-dcnode-id="8928" instrument_node="">. The U.S. and France refused to deal with the now successful Communist regime because of its promise to support revolutions to overthrow governments everywhere. U.S. Secretary of State </span><a data-dcnode-id="8926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bainbridge_Colby" title="Bainbridge Colby"><span data-dcnode-id="8927" instrument_node="">Bainbridge Colby</span></a><span data-dcnode-id="8925" instrument_node=""> stated:</span><sup class="reference" data-dcnode-id="8922" id="cite_ref-5"><a data-dcnode-id="8923" href="#cite_note-5"><span data-dcnode-id="8924" instrument_node="">[5]</span></a></sup><span data-dcnode-id="8921" instrument_node="">
</span></p><span data-dcnode-id="8919" instrument_node="">
</span><dl data-dcnode-id="8913"><dd data-dcnode-id="8914"><span data-dcnode-id="8918" instrument_node="">It is their [Bolshevik] understanding that the very existence of Bolshevism in Russia, the maintenance of their own rule, depends, and must continue to depend, upon the occurrence of revolutions in all other great civilized nations, including the United States, which will overthrow and destroy their governments and set up Bolshevist rule in their stead. They have made it quite plain that they intend to use every means, including, of course, diplomatic agencies, to promote such revolutionary movements in other countries.</span><sup class="reference" data-dcnode-id="8915" id="cite_ref-6"><a data-dcnode-id="8916" href="#cite_note-6"><span data-dcnode-id="8917" instrument_node="">[6]</span></a></sup></dd></dl><span data-dcnode-id="8912" instrument_node="">
</span><p data-dcnode-id="8881"><span data-dcnode-id="8911" instrument_node="">After Germany was defeated in November 1918 and the Whites were repulsed, the first priority for Moscow was instigating revolutions across Western Europe, above all Germany. It was the country that Lenin most admired and assumed to be most ready for revolution.</span><sup class="reference" data-dcnode-id="8908" id="cite_ref-7"><a data-dcnode-id="8909" href="#cite_note-7"><span data-dcnode-id="8910" instrument_node="">[7]</span></a></sup><span data-dcnode-id="8907" instrument_node=""> Lenin also encouraged revolutions that failed in </span><a class="mw-redirect" data-dcnode-id="8905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/German_Revolution_of_1918%25E2%2580%259319" title="German Revolution of 1918–19"><span data-dcnode-id="8906" instrument_node="">Germany</span></a><span data-dcnode-id="8904" instrument_node="">, </span><a data-dcnode-id="8902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bavarian_Soviet_Republic" title="Bavarian Soviet Republic"><span data-dcnode-id="8903" instrument_node="">Bavaria</span></a><span data-dcnode-id="8901" instrument_node=""> and </span><a data-dcnode-id="8899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hungarian_Soviet_Republic" title="Hungarian Soviet Republic"><span data-dcnode-id="8900" instrument_node="">Hungary</span></a><span data-dcnode-id="8898" instrument_node=""> from 1918 to 1920 - this support was solely political and economic, and the </span><a data-dcnode-id="8896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Red_Army" title="Red Army"><span data-dcnode-id="8897" instrument_node="">Red Army</span></a><span data-dcnode-id="8895" instrument_node=""> did not participate in these revolutions. In 1920 the newly formed state of Poland expanded eastwards into the Russian territories of Ukraine and Belarus. The Red Army </span><a data-dcnode-id="8893" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish%25E2%2580%2593Soviet_War" title="Polish–Soviet War"><span data-dcnode-id="8894" instrument_node="">retaliated</span></a><span data-dcnode-id="8892" instrument_node="">, but was </span><a data-dcnode-id="8890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Warsaw_%281920%29" title="Battle of Warsaw (1920)"><span data-dcnode-id="8891" instrument_node="">defeated outside Warsaw</span></a><span data-dcnode-id="8889" instrument_node=""> in August 1920. Shortly afterwards, the RSFSR sued for peace, which was signed at the </span><a data-dcnode-id="8887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peace_of_Riga" title="Peace of Riga"><span data-dcnode-id="8888" instrument_node="">Peace of Riga</span></a><span data-dcnode-id="8886" instrument_node=""> on 18 March 1921. The RSFSR recompensed 30 million rubles, as well as sizeable territory in Belarus and Ukraine.</span><sup class="reference" data-dcnode-id="8883" id="cite_ref-8"><a data-dcnode-id="8884" href="#cite_note-8"><span data-dcnode-id="8885" instrument_node="">[8]</span></a></sup><span data-dcnode-id="8882" instrument_node="">
</span></p><p data-dcnode-id="8872"><span data-dcnode-id="8880" instrument_node="">Independent revolutions had failed to overthrow capitalism. Moscow pulled back from military action and set up the </span><a data-dcnode-id="8878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_International" title="Communist International"><span data-dcnode-id="8879" instrument_node="">Comintern</span></a><span data-dcnode-id="8877" instrument_node="">, designed to foster local communist parties under Kremlin control.</span><sup class="reference" data-dcnode-id="8874" id="cite_ref-Service,_2007_9-0"><a data-dcnode-id="8875" href="#cite_note-Service,_2007-9"><span data-dcnode-id="8876" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8873" instrument_node="">
</span></p><span data-dcnode-id="8871" instrument_node="">
</span><h3 data-dcnode-id="8861"><span class="mw-headline" data-dcnode-id="8869" id="Success_in_Central_Asia_and_the_Caucasus"><span data-dcnode-id="8870" instrument_node="">Success in Central Asia and the Caucasus</span></span><span class="mw-editsection" data-dcnode-id="8862"><span class="mw-editsection-bracket" data-dcnode-id="8867"><span data-dcnode-id="8868" instrument_node="">[</span></span><a data-dcnode-id="8865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D5" title="Edit section: Success in Central Asia and the Caucasus"><span data-dcnode-id="8866" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8863"><span data-dcnode-id="8864" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8860" instrument_node="">
</span><p data-dcnode-id="8821"><span data-dcnode-id="8859" instrument_node="">Lenin's plans failed, although Russia did manage to hold onto the Central Asian and Caucasian domains that had been part of the </span><a data-dcnode-id="8857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Empire" title="Russian Empire"><span data-dcnode-id="8858" instrument_node="">Russian Empire</span></a><span data-dcnode-id="8856" instrument_node="">.</span><sup class="reference" data-dcnode-id="8853" id="cite_ref-10"><a data-dcnode-id="8854" href="#cite_note-10"><span data-dcnode-id="8855" instrument_node="">[10]</span></a></sup><span data-dcnode-id="8852" instrument_node=""> The revolutionary stage ended after the Soviet defeat in the </span><a data-dcnode-id="8850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Battle_of_Warsaw_%281920%29" title="Battle of Warsaw (1920)"><span data-dcnode-id="8851" instrument_node="">Battle of Warsaw</span></a><span data-dcnode-id="8849" instrument_node=""> during the </span><a data-dcnode-id="8847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Polish%25E2%2580%2593Soviet_War" title="Polish–Soviet War"><span data-dcnode-id="8848" instrument_node="">Soviet-Polish War</span></a><span data-dcnode-id="8846" instrument_node=""> of 1920-21.</span><sup class="reference" data-dcnode-id="8843" id="cite_ref-11"><a data-dcnode-id="8844" href="#cite_note-11"><span data-dcnode-id="8845" instrument_node="">[11]</span></a></sup><span data-dcnode-id="8842" instrument_node=""> As Europe's revolutions were crushed and revolutionary zeal dwindled, the Bolsheviks shifted their ideological focus from the </span><a data-dcnode-id="8840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_revolution" title="World revolution"><span data-dcnode-id="8841" instrument_node="">world revolution</span></a><span data-dcnode-id="8839" instrument_node=""> and building socialism around the globe to building socialism inside the Soviet Union, while keeping some of the rhetoric and operations of the Comintern continuing. In the mid-1920s, a policy of peaceful co-existence began to emerge, with Soviet diplomats attempting to end the country's isolation, and concluding bilateral arrangements with capitalist governments. An agreement was reached with Germany, Europe's other pariah, in the </span><a class="mw-redirect" data-dcnode-id="8837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Rapallo%2C_1922" title="Treaty of Rapallo, 1922"><span data-dcnode-id="8838" instrument_node="">Treaty of Rapallo</span></a><span data-dcnode-id="8836" instrument_node=""> in 1922.</span><sup class="reference" data-dcnode-id="8833" id="cite_ref-12"><a data-dcnode-id="8834" href="#cite_note-12"><span data-dcnode-id="8835" instrument_node="">[12]</span></a></sup><span data-dcnode-id="8832" instrument_node=""> At the same time the Rapallo treaty was signed it set up a secret system for hosting large-scale training and research facilities for the </span><a data-dcnode-id="8830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reichswehr" title="Reichswehr"><span data-dcnode-id="8831" instrument_node="">German army</span></a><span data-dcnode-id="8829" instrument_node=""> and air force, despite the strict prohibitions on Germany in the </span><a data-dcnode-id="8827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_of_Versailles" title="Treaty of Versailles"><span data-dcnode-id="8828" instrument_node="">Treaty of Versailles</span></a><span data-dcnode-id="8826" instrument_node="">. These facilities operated until 1933.</span><sup class="reference" data-dcnode-id="8823" id="cite_ref-13"><a data-dcnode-id="8824" href="#cite_note-13"><span data-dcnode-id="8825" instrument_node="">[13]</span></a></sup><span data-dcnode-id="8822" instrument_node="">
</span></p><p data-dcnode-id="8803"><span data-dcnode-id="8820" instrument_node="">The Soviet Union finalized a treaty of friendship with </span><a data-dcnode-id="8818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Emirate_of_Afghanistan" title="Emirate of Afghanistan"><span data-dcnode-id="8819" instrument_node="">Afghanistan</span></a><span data-dcnode-id="8817" instrument_node="">, which had gained full independence following the </span><a data-dcnode-id="8815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_Anglo-Afghan_War" title="Third Anglo-Afghan War"><span data-dcnode-id="8816" instrument_node="">Third Anglo-Afghan War</span></a><span data-dcnode-id="8814" instrument_node="">. The Afghan king, </span><a data-dcnode-id="8812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Amanullah_Khan" title="Amanullah Khan"><span data-dcnode-id="8813" instrument_node="">Amanullah Khan</span></a><span data-dcnode-id="8811" instrument_node="">, wrote to Moscow stressing his desire for permanent friendly relations; Lenin replied congratulating him and the Afghans for their defense. The Soviets saw possibilities in an alliance with Afghanistan against the United Kingdom, such as using it as a base for a revolutionary advance towards </span><a class="mw-redirect" data-dcnode-id="8809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/British_India" title="British India"><span data-dcnode-id="8810" instrument_node="">British-controlled India</span></a><span data-dcnode-id="8808" instrument_node="">. The treaty of friendship was finalized in 1921.</span><sup class="reference" data-dcnode-id="8805" id="cite_ref-14"><a data-dcnode-id="8806" href="#cite_note-14"><span data-dcnode-id="8807" instrument_node="">[14]</span></a></sup><span data-dcnode-id="8804" instrument_node="">
</span></p><span data-dcnode-id="8802" instrument_node="">
</span><h3 data-dcnode-id="8792"><span class="mw-headline" data-dcnode-id="8800" id="Comintern"><span data-dcnode-id="8801" instrument_node="">Comintern</span></span><span class="mw-editsection" data-dcnode-id="8793"><span class="mw-editsection-bracket" data-dcnode-id="8798"><span data-dcnode-id="8799" instrument_node="">[</span></span><a data-dcnode-id="8796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D6" title="Edit section: Comintern"><span data-dcnode-id="8797" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">]</span></span></span></h3><span data-dcnode-id="8791" instrument_node="">
</span><link data-dcnode-id="8790" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="8786" role="note"><span data-dcnode-id="8789" instrument_node="">Main article: </span><a data-dcnode-id="8787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_International" title="Communist International"><span data-dcnode-id="8788" instrument_node="">Communist International</span></a></div><span data-dcnode-id="8785" instrument_node="">
</span><p data-dcnode-id="8733"><span data-dcnode-id="8784" instrument_node="">The </span><b data-dcnode-id="8782"><span data-dcnode-id="8783" instrument_node="">Communist International</span></b><span data-dcnode-id="8781" instrument_node=""> (</span><b data-dcnode-id="8779"><span data-dcnode-id="8780" instrument_node="">Comintern</span></b><span data-dcnode-id="8778" instrument_node="">), (1919–1943), was an international organization of </span><a data-dcnode-id="8776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communist_party" title="Communist party"><span data-dcnode-id="8777" instrument_node="">communist parties</span></a><span data-dcnode-id="8775" instrument_node="">.</span><sup class="reference" data-dcnode-id="8772" id="cite_ref-Service,_2007_9-1"><a data-dcnode-id="8773" href="#cite_note-Service,_2007-9"><span data-dcnode-id="8774" instrument_node="">[9]</span></a></sup><span data-dcnode-id="8771" instrument_node=""> Obstensibly a new group to replace the former </span><a data-dcnode-id="8769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_International" title="Second International"><span data-dcnode-id="8770" instrument_node="">Second International</span></a><span data-dcnode-id="8768" instrument_node=""> after it had collapsed because of World War I, it served as an extension of Soviet foreign policy.</span><sup class="reference" data-dcnode-id="8765" id="cite_ref-:3_15-0"><a data-dcnode-id="8766" href="#cite_note-:3-15"><span data-dcnode-id="8767" instrument_node="">[15]</span></a></sup><span data-dcnode-id="8764" instrument_node=""> It was headed by </span><a data-dcnode-id="8762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grigory_Zinoviev" title="Grigory Zinoviev"><span data-dcnode-id="8763" instrument_node="">Grigory Zinoviev</span></a><span data-dcnode-id="8761" instrument_node=""> (1919–26) and based in the </span><a class="mw-redirect" data-dcnode-id="8759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_Kremlin" title="Moscow Kremlin"><span data-dcnode-id="8760" instrument_node="">Kremlin</span></a><span data-dcnode-id="8758" instrument_node="">; it reported to Lenin and later Stalin. Lenin envisioned the national branches not as political parties, but "as a centralized quasi-religious, and quasi-military movement devoted to the revolution and to service of the Soviet state."</span><sup class="reference" data-dcnode-id="8755" id="cite_ref-16"><a data-dcnode-id="8756" href="#cite_note-16"><span data-dcnode-id="8757" instrument_node="">[16]</span></a></sup><span data-dcnode-id="8754" instrument_node=""> Commentators compared it to the </span><a data-dcnode-id="8752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Society_of_Jesus" title="Society of Jesus"><span data-dcnode-id="8753" instrument_node="">Jesuit order</span></a><span data-dcnode-id="8751" instrument_node="">, with its </span><a data-dcnode-id="8749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vow_of_obedience" title="Vow of obedience"><span data-dcnode-id="8750" instrument_node="">vow of obedience</span></a><span data-dcnode-id="8748" instrument_node="">. It coordinated the different parties and issued orders that they obeyed. The Comintern resolved at its </span><a data-dcnode-id="8746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2nd_World_Congress_of_the_Comintern" title="2nd World Congress of the Comintern"><span data-dcnode-id="8747" instrument_node="">Second Congress</span></a><span data-dcnode-id="8745" instrument_node=""> to "struggle by all available means, including armed force, for the overthrow of the international bourgeoisie and the creation of an international Soviet republic as a transition stage to the complete abolition of the state".</span><sup class="reference" data-dcnode-id="8742" id="cite_ref-17"><a data-dcnode-id="8743" href="#cite_note-17"><span data-dcnode-id="8744" instrument_node="">[17]</span></a></sup><span data-dcnode-id="8741" instrument_node=""> That policy was soon dropped by 1921 because it interfered with the decision to seek friendly relations with capitalistic nations. The new economic policy at home required trade with the West and bank credits if possible. The main obstacle was Moscow's refusal to honor Tsarist era debts. The Comintern was officially dissolved by Stalin in 1943 to avoid antagonizing its new allies against Germany, the United States and Great Britain.</span><sup class="reference" data-dcnode-id="8738" id="cite_ref-18"><a data-dcnode-id="8739" href="#cite_note-18"><span data-dcnode-id="8740" instrument_node="">[18]</span></a></sup><sup class="reference" data-dcnode-id="8735" id="cite_ref-19"><a data-dcnode-id="8736" href="#cite_note-19"><span data-dcnode-id="8737" instrument_node="">[19]</span></a></sup><span data-dcnode-id="8734" instrument_node="">
</span></p><span data-dcnode-id="8732" instrument_node="">
