</span></p><p data-dcnode-id="7169"><span data-dcnode-id="7208" instrument_node="">On April 7, 1967, Syria executed terrorist attacks on Israel. The attacks were directed at an Israeli tractor working land in the demilitarized area on the </span><a class="mw-redirect" data-dcnode-id="7206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syria-Israel_Border" title="Syria-Israel Border"><span data-dcnode-id="7207" instrument_node="">Syrian–Israeli border</span></a><span data-dcnode-id="7205" instrument_node="">.</span><sup class="reference" data-dcnode-id="7202" id="cite_ref-Morozov_71-3"><a data-dcnode-id="7203" href="#cite_note-Morozov-71"><span data-dcnode-id="7204" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7201" instrument_node=""> Syria and Israel exchanged fire all day. At the end of the battle, Israel had shot down seven Soviet-made </span><a data-dcnode-id="7199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Air_Force" title="Syrian Air Force"><span data-dcnode-id="7200" instrument_node="">Syrian Air Force</span></a><span data-dcnode-id="7198" instrument_node=""> aircraft.</span><sup class="reference" data-dcnode-id="7195" id="cite_ref-Morozov_71-4"><a data-dcnode-id="7196" href="#cite_note-Morozov-71"><span data-dcnode-id="7197" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7194" instrument_node=""> This was the first air battle between the two nations. The USSR supported Syrian attacks and blamed the violent acts on Israel. Syria did not hesitate to act because it believed that the other Arab states would support it and Israel was not capable of defeating it. In the UAR, the USSR motivated Nasser to have the </span><a data-dcnode-id="7192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations_Emergency_Force" title="United Nations Emergency Force"><span data-dcnode-id="7193" instrument_node="">UN forces</span></a><span data-dcnode-id="7191" instrument_node=""> leave the </span><a data-dcnode-id="7189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sinai_Peninsula" title="Sinai Peninsula"><span data-dcnode-id="7190" instrument_node="">Sinai Peninsula</span></a><span data-dcnode-id="7188" instrument_node=""> and the </span><a data-dcnode-id="7186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gaza_Strip" title="Gaza Strip"><span data-dcnode-id="7187" instrument_node="">Gaza Strip</span></a><span data-dcnode-id="7185" instrument_node=""> and to blockade the </span><a data-dcnode-id="7183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Straits_of_Tiran" title="Straits of Tiran"><span data-dcnode-id="7184" instrument_node="">Straits of Tiran</span></a><span data-dcnode-id="7182" instrument_node="">.</span><sup class="reference" data-dcnode-id="7179" id="cite_ref-Govrin_67-6"><a data-dcnode-id="7180" href="#cite_note-Govrin-67"><span data-dcnode-id="7181" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7178" instrument_node=""> Like Nasser, the USSR didn't believe that Israel would start a war on its own.</span><sup class="reference" data-dcnode-id="7175" id="cite_ref-Govrin_67-7"><a data-dcnode-id="7176" href="#cite_note-Govrin-67"><span data-dcnode-id="7177" instrument_node="">[67]</span></a></sup><span data-dcnode-id="7174" instrument_node=""> Even if Israel did attack, it was unlikely that Israel would be capable of defeating the Arab states. Syria believed that, with the help of the UAR, it could beat Israel. On May 11, the USSR warned the UAR that Israel troops were gathering on the border with Syria and that an invasion was planned for May 18 to May 22. At this time, the USSR also began to publish accusations against Israel in order to cement the defensive unity of the UAR and Syria.</span><sup class="reference" data-dcnode-id="7171" id="cite_ref-Morozov_71-5"><a data-dcnode-id="7172" href="#cite_note-Morozov-71"><span data-dcnode-id="7173" instrument_node="">[71]</span></a></sup><span data-dcnode-id="7170" instrument_node="">
</span></p><span data-dcnode-id="7168" instrument_node="">
</span><h5 data-dcnode-id="7158"><span class="mw-headline" data-dcnode-id="7166" id="Syria_after_1966"><span data-dcnode-id="7167" instrument_node="">Syria after 1966</span></span><span class="mw-editsection" data-dcnode-id="7159"><span class="mw-editsection-bracket" data-dcnode-id="7164"><span data-dcnode-id="7165" instrument_node="">[</span></span><a data-dcnode-id="7162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D31" title="Edit section: Syria after 1966"><span data-dcnode-id="7163" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7160"><span data-dcnode-id="7161" instrument_node="">]</span></span></span></h5><span data-dcnode-id="7157" instrument_node="">
</span><p data-dcnode-id="7119"><span data-dcnode-id="7156" instrument_node="">Since 1966,</span><sup class="reference" data-dcnode-id="7153" id="cite_ref-McInerney_81-2"><a data-dcnode-id="7154" href="#cite_note-McInerney-81"><span data-dcnode-id="7155" instrument_node="">[81]</span></a></sup><span data-dcnode-id="7152" instrument_node=""> Syria had obtained most of its military equipment from the Soviet Union.</span><sup class="reference" data-dcnode-id="7149" id="cite_ref-vpppav_82-0"><a data-dcnode-id="7150" href="#cite_note-vpppav-82"><span data-dcnode-id="7151" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7148" instrument_node=""> In 1971, when </span><a data-dcnode-id="7146" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Syrian_Air_Force" title="Syrian Air Force"><span data-dcnode-id="7147" instrument_node="">Syrian Air Force</span></a><span data-dcnode-id="7145" instrument_node=""> Commander </span><a data-dcnode-id="7143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hafez_al-Assad" title="Hafez al-Assad"><span data-dcnode-id="7144" instrument_node="">Hafez al-Assad</span></a><span data-dcnode-id="7142" instrument_node=""> became </span><a data-dcnode-id="7140" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/President_of_Syria" title="President of Syria"><span data-dcnode-id="7141" instrument_node="">President of Syria</span></a><span data-dcnode-id="7139" instrument_node=""> by way of a coup, he elected to maintain a strategic policy of close cooperation with the Soviet Union.</span><sup class="reference" data-dcnode-id="7136" id="cite_ref-jewsyria_83-0"><a data-dcnode-id="7137" href="#cite_note-jewsyria-83"><span data-dcnode-id="7138" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7135" instrument_node=""> The same year, Assad agreed to allow Soviet military personnel to keep a naval base in </span><a data-dcnode-id="7133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_naval_facility_in_Tartus" title="Russian naval facility in Tartus"><span data-dcnode-id="7134" instrument_node="">Tartus</span></a><span data-dcnode-id="7132" instrument_node="">. In February 1972, Syria signed a peace and security pact with the Soviet Union as a means to strengthen its defense capability.</span><sup class="reference" data-dcnode-id="7129" id="cite_ref-jewsyria_83-1"><a data-dcnode-id="7130" href="#cite_note-jewsyria-83"><span data-dcnode-id="7131" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7128" instrument_node=""> During the year, Moscow delivered more than $135 million in Soviet arms to Damascus.</span><sup class="reference" data-dcnode-id="7125" id="cite_ref-jewsyria_83-2"><a data-dcnode-id="7126" href="#cite_note-jewsyria-83"><span data-dcnode-id="7127" instrument_node="">[83]</span></a></sup><span data-dcnode-id="7124" instrument_node=""> In 1980, Syria signed a Treaty of Friendship and Cooperation with the Soviet Union.</span><sup class="reference" data-dcnode-id="7121" id="cite_ref-vpppav_82-1"><a data-dcnode-id="7122" href="#cite_note-vpppav-82"><span data-dcnode-id="7123" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7120" instrument_node="">
</span></p><p data-dcnode-id="7085"><span data-dcnode-id="7118" instrument_node="">A secret protocol to the treaty reputedly detailed Soviet military obligations to Syria and gave the USSR to power to mandate the dispatch of Soviet troops to Syria in case of an Israeli invasion.</span><sup class="reference" data-dcnode-id="7115" id="cite_ref-vpppav_82-2"><a data-dcnode-id="7116" href="#cite_note-vpppav-82"><span data-dcnode-id="7117" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7114" instrument_node=""> Syrian defense minister </span><a data-dcnode-id="7112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mustafa_Tlass" title="Mustafa Tlass"><span data-dcnode-id="7113" instrument_node="">Mustafa Tlass</span></a><span data-dcnode-id="7111" instrument_node=""> warned in 1984 that the Soviet Union would dispatch two Soviet airborne divisions to Syria within eight hours in the event of a conflict with Israel.</span><sup class="reference" data-dcnode-id="7108" id="cite_ref-vpppav_82-3"><a data-dcnode-id="7109" href="#cite_note-vpppav-82"><span data-dcnode-id="7110" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7107" instrument_node=""> Tlas's has also stated that the Soviet Union would use nuclear weapons to protect Syria.</span><sup class="reference" data-dcnode-id="7104" id="cite_ref-vpppav_82-4"><a data-dcnode-id="7105" href="#cite_note-vpppav-82"><span data-dcnode-id="7106" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7103" instrument_node=""> Tlas's statements, however, were not endorsed by the Soviet Union.</span><sup class="reference" data-dcnode-id="7100" id="cite_ref-vpppav_82-5"><a data-dcnode-id="7101" href="#cite_note-vpppav-82"><span data-dcnode-id="7102" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7099" instrument_node=""> Syrian–Soviet nuclear cooperation was limited to a February 1983 agreement for cooperation and exchange for peaceful purposes.</span><sup class="reference" data-dcnode-id="7096" id="cite_ref-vpppav_82-6"><a data-dcnode-id="7097" href="#cite_note-vpppav-82"><span data-dcnode-id="7098" instrument_node="">[82]</span></a></sup><span data-dcnode-id="7095" instrument_node=""> In addition to the PLO, Syria and Iraq, the Soviet Union also developed good relations with </span><a data-dcnode-id="7093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Libya_under_Muammar_Gaddafi" title="History of Libya under Muammar Gaddafi"><span data-dcnode-id="7094" instrument_node="">Libya</span></a><span data-dcnode-id="7092" instrument_node="">, the </span><a data-dcnode-id="7090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yemen_Arab_Republic" title="Yemen Arab Republic"><span data-dcnode-id="7091" instrument_node="">Yemen Arab Republic</span></a><span data-dcnode-id="7089" instrument_node="">, and </span><a data-dcnode-id="7087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Yemen" title="South Yemen"><span data-dcnode-id="7088" instrument_node="">South Yemen</span></a><span data-dcnode-id="7086" instrument_node="">.
</span></p><span data-dcnode-id="7084" instrument_node="">
</span><h4 data-dcnode-id="7074"><span class="mw-headline" data-dcnode-id="7082" id="Iraq"><span data-dcnode-id="7083" instrument_node="">Iraq</span></span><span class="mw-editsection" data-dcnode-id="7075"><span class="mw-editsection-bracket" data-dcnode-id="7080"><span data-dcnode-id="7081" instrument_node="">[</span></span><a data-dcnode-id="7078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D32" title="Edit section: Iraq"><span data-dcnode-id="7079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7076"><span data-dcnode-id="7077" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7073" instrument_node="">
</span><p data-dcnode-id="7025"><span data-dcnode-id="7072" instrument_node="">Between 1958 and 1990, Soviet–Iraqi relations were very strong.</span><sup class="reference" data-dcnode-id="7069" id="cite_ref-Russian-IraqiRelations_84-0"><a data-dcnode-id="7070" href="#cite_note-Russian-IraqiRelations-84"><span data-dcnode-id="7071" instrument_node="">[84]</span></a></sup><span data-dcnode-id="7068" instrument_node=""> The </span><a data-dcnode-id="7066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="7067" instrument_node="">Soviet Union</span></a><span data-dcnode-id="7065" instrument_node=""> established </span><a class="mw-redirect" data-dcnode-id="7063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diplomatic_relations" title="Diplomatic relations"><span data-dcnode-id="7064" instrument_node="">diplomatic relations</span></a><span data-dcnode-id="7062" instrument_node=""> with the </span><a data-dcnode-id="7060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Iraq" title="Kingdom of Iraq"><span data-dcnode-id="7061" instrument_node="">Kingdom of Iraq</span></a><span data-dcnode-id="7059" instrument_node=""> on 9 September 1944.</span><sup class="reference" data-dcnode-id="7056" id="cite_ref-mid_85-0"><a data-dcnode-id="7057" href="#cite_note-mid-85"><span data-dcnode-id="7058" instrument_node="">[85]</span></a></sup><span data-dcnode-id="7055" instrument_node=""> The regime of King </span><a data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Faisal_II_of_Iraq" title="Faisal II of Iraq"><span data-dcnode-id="7054" instrument_node="">Faisal II</span></a><span data-dcnode-id="7052" instrument_node=""> was </span><a class="mw-redirect" data-dcnode-id="7050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-communist" title="Anti-communist"><span data-dcnode-id="7051" instrument_node="">anti-communist</span></a><span data-dcnode-id="7049" instrument_node=""> and only established links with Moscow due its dependence on the United Kingdom and the </span><a class="mw-redirect" data-dcnode-id="7047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anglo%25E2%2580%2593Soviet_Treaty_of_1942" title="Anglo–Soviet Treaty of 1942"><span data-dcnode-id="7048" instrument_node="">Anglo–Soviet Treaty of 1942</span></a><span data-dcnode-id="7046" instrument_node="">. In January 1955, the Soviet government criticised the Iraqi decision to join the </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baghdad_Pact" title="Baghdad Pact"><span data-dcnode-id="7045" instrument_node="">Baghdad Pact</span></a><span data-dcnode-id="7043" instrument_node="">, which led to Iraq cutting diplomatic relations with the Soviets. After Faisal II was overthrown in a military coup on </span><a data-dcnode-id="7041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/14_July_Revolution" title="14 July Revolution"><span data-dcnode-id="7042" instrument_node="">14 July 1958</span></a><span data-dcnode-id="7040" instrument_node="">, the newly proclaimed </span><a class="mw-redirect" data-dcnode-id="7038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Iraq" title="Republic of Iraq"><span data-dcnode-id="7039" instrument_node="">Republic of Iraq</span></a><span data-dcnode-id="7037" instrument_node=""> led by General </span><a data-dcnode-id="7035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abd_al-Karim_Qasim" title="Abd al-Karim Qasim"><span data-dcnode-id="7036" instrument_node="">Abd al-Karim Qasim</span></a><span data-dcnode-id="7034" instrument_node=""> re-established relations with the Soviet Union, and the Soviet Union began selling arms to Iraq. In 1967, Iraq signed an agreement with the USSR to supply the nation with oil in exchange for large-scale access to Eastern Bloc arms.</span><sup class="reference" data-dcnode-id="7031" id="cite_ref-ivapn_86-0"><a data-dcnode-id="7032" href="#cite_note-ivapn-86"><span data-dcnode-id="7033" instrument_node="">[86]</span></a></sup><span data-dcnode-id="7030" instrument_node=""> In 1972, Iraq, by now Moscow's closest Arab ally, signed a Treaty of Friendship and Cooperation with the Soviet Union.</span><sup class="reference" data-dcnode-id="7027" id="cite_ref-soviraq_87-0"><a data-dcnode-id="7028" href="#cite_note-soviraq-87"><span data-dcnode-id="7029" instrument_node="">[87]</span></a></sup><span data-dcnode-id="7026" instrument_node="">
</span></p><span data-dcnode-id="7024" instrument_node="">
</span><h4 data-dcnode-id="7014"><span class="mw-headline" data-dcnode-id="7022" id="Yemen"><span data-dcnode-id="7023" instrument_node="">Yemen</span></span><span class="mw-editsection" data-dcnode-id="7015"><span class="mw-editsection-bracket" data-dcnode-id="7020"><span data-dcnode-id="7021" instrument_node="">[</span></span><a data-dcnode-id="7018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D33" title="Edit section: Yemen"><span data-dcnode-id="7019" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7016"><span data-dcnode-id="7017" instrument_node="">]</span></span></span></h4><span data-dcnode-id="7013" instrument_node="">
</span><p data-dcnode-id="6982"><span data-dcnode-id="7012" instrument_node="">The Soviet Union was among the first group of nations to recognize North Yemen following its independence from the Ottoman Empire in 1918. On December 27, 1962, two treaties were concluded between the two countries, for setting up a study for economic projects and using soil and ground waters.</span><sup class="reference" data-dcnode-id="7009" id="cite_ref-yemrus_88-0"><a data-dcnode-id="7010" href="#cite_note-yemrus-88"><span data-dcnode-id="7011" instrument_node="">[88]</span></a></sup><span data-dcnode-id="7008" instrument_node=""> In 1963, the Soviet government appointed the first ambassador to the </span><a data-dcnode-id="7006" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yemen_Arab_Republic" title="Yemen Arab Republic"><span data-dcnode-id="7007" instrument_node="">Yemen Arab Republic</span></a><span data-dcnode-id="7005" instrument_node=""> (YAR) in </span><a data-dcnode-id="7003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sanaa" title="Sanaa"><span data-dcnode-id="7004" instrument_node="">Sana'a</span></a><span data-dcnode-id="7002" instrument_node="">.</span><sup class="reference" data-dcnode-id="6999" id="cite_ref-yemrus_88-1"><a data-dcnode-id="7000" href="#cite_note-yemrus-88"><span data-dcnode-id="7001" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6998" instrument_node=""> In September 1963, Russians finished constructing Arrahaba International Airport.</span><sup class="reference" data-dcnode-id="6995" id="cite_ref-yemrus_88-2"><a data-dcnode-id="6996" href="#cite_note-yemrus-88"><span data-dcnode-id="6997" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6994" instrument_node=""> On March 21, 1964, President of YAR </span><a data-dcnode-id="6992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Abdullah_al-Sallal" title="Abdullah al-Sallal"><span data-dcnode-id="6993" instrument_node="">Abdullah Assalal</span></a><span data-dcnode-id="6991" instrument_node=""> paid the first visit to Moscow.</span><sup class="reference" data-dcnode-id="6988" id="cite_ref-yemrus_88-3"><a data-dcnode-id="6989" href="#cite_note-yemrus-88"><span data-dcnode-id="6990" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6987" instrument_node=""> The visit resulted in signing a friendship treaty between the two countries in addition to conducting economic and military relations.</span><sup class="reference" data-dcnode-id="6984" id="cite_ref-yemrus_88-4"><a data-dcnode-id="6985" href="#cite_note-yemrus-88"><span data-dcnode-id="6986" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6983" instrument_node="">
</span></p><p data-dcnode-id="6949"><span data-dcnode-id="6981" instrument_node="">In 1967, the Soviet Union immediately recognized </span><a data-dcnode-id="6979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Yemen" title="South Yemen"><span data-dcnode-id="6980" instrument_node="">South Yemen</span></a><span data-dcnode-id="6978" instrument_node=""> after it gained independence from Britain.</span><sup class="reference" data-dcnode-id="6975" id="cite_ref-yemrus_88-5"><a data-dcnode-id="6976" href="#cite_note-yemrus-88"><span data-dcnode-id="6977" instrument_node="">[88]</span></a></sup><span data-dcnode-id="6974" instrument_node=""> In 1969, South Yemen became the first and only avowedly Communist nation in the Middle East. Unaccepted by Muslim nations in the region, South Yemen relied on aid from Communist nations and allowed the Soviets to keep naval bases in the country. In 1972, after a war broke out between the two neighboring Yemen states,</span><sup class="reference" data-dcnode-id="6971" id="cite_ref-89"><a data-dcnode-id="6972" href="#cite_note-89"><span data-dcnode-id="6973" instrument_node="">[89]</span></a></sup><span data-dcnode-id="6970" instrument_node=""> the Yemen Arab Republic and South Yemen agreed to eventually unify. In October 1979,</span><sup class="reference" data-dcnode-id="6967" id="cite_ref-yemaid_90-0"><a data-dcnode-id="6968" href="#cite_note-yemaid-90"><span data-dcnode-id="6969" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6966" instrument_node=""> the Soviet Union and South Yemen officially signed a Treaty of Friendship and Cooperation.</span><sup class="reference" data-dcnode-id="6963" id="cite_ref-nyyem_91-0"><a data-dcnode-id="6964" href="#cite_note-nyyem-91"><span data-dcnode-id="6965" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6962" instrument_node=""> Despite the aid it now received from the United States following a brief spat with South Yemen between 1978 and 1979,</span><sup class="reference" data-dcnode-id="6959" id="cite_ref-yemaid_90-1"><a data-dcnode-id="6960" href="#cite_note-yemaid-90"><span data-dcnode-id="6961" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6958" instrument_node=""> the Yemen Arab Republic would not break with the Soviets</span><sup class="reference" data-dcnode-id="6955" id="cite_ref-yemaid_90-2"><a data-dcnode-id="6956" href="#cite_note-yemaid-90"><span data-dcnode-id="6957" instrument_node="">[90]</span></a></sup><span data-dcnode-id="6954" instrument_node=""> and later renewed its Treaty of Friendship and Cooperation with the USSR in October 1984.</span><sup class="reference" data-dcnode-id="6951" id="cite_ref-nyyem_91-1"><a data-dcnode-id="6952" href="#cite_note-nyyem-91"><span data-dcnode-id="6953" instrument_node="">[91]</span></a></sup><span data-dcnode-id="6950" instrument_node="">
</span></p><span data-dcnode-id="6948" instrument_node="">
</span><h4 data-dcnode-id="6938"><span class="mw-headline" data-dcnode-id="6946" id="Libya"><span data-dcnode-id="6947" instrument_node="">Libya</span></span><span class="mw-editsection" data-dcnode-id="6939"><span class="mw-editsection-bracket" data-dcnode-id="6944"><span data-dcnode-id="6945" instrument_node="">[</span></span><a data-dcnode-id="6942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D34" title="Edit section: Libya"><span data-dcnode-id="6943" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6940"><span data-dcnode-id="6941" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6937" instrument_node="">
</span><p data-dcnode-id="6882"><span data-dcnode-id="6936" instrument_node="">Although Libya was not as firm a Soviet ally as many </span><a data-dcnode-id="6934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Third_World" title="Third World"><span data-dcnode-id="6935" instrument_node="">Third World</span></a><span data-dcnode-id="6933" instrument_node=""> Marxist regimes were, Moscow developed close ties with the anti-Western regime of </span><a data-dcnode-id="6931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Muammar_Gaddafi" title="Muammar Gaddafi"><span data-dcnode-id="6932" instrument_node="">Muammar Gaddafi</span></a><span data-dcnode-id="6930" instrument_node="">, who had overthrown Libya's </span><a data-dcnode-id="6928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kingdom_of_Libya" title="Kingdom of Libya"><span data-dcnode-id="6929" instrument_node="">pro-Western monarchy</span></a><span data-dcnode-id="6927" instrument_node=""> in 1969.</span><sup class="reference" data-dcnode-id="6924" id="cite_ref-libussr_92-0"><a data-dcnode-id="6925" href="#cite_note-libussr-92"><span data-dcnode-id="6926" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6923" instrument_node=""> The number-two Soviet leader at that time, </span><a data-dcnode-id="6921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alexei_Kosygin" title="Alexei Kosygin"><span data-dcnode-id="6922" instrument_node="">Alexei Kosygin</span></a><span data-dcnode-id="6920" instrument_node="">, went to Libya in 1975, and Gaddafi visited Moscow in 1976, 1981 and 1985. Soviet-Libyan trade volume during the 1970s and 1980s was approximately $100 million per year</span><sup class="reference" data-dcnode-id="6917" id="cite_ref-libussr_92-1"><a data-dcnode-id="6918" href="#cite_note-libussr-92"><span data-dcnode-id="6919" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6916" instrument_node=""> and relations between the two accelerated between the years 1981 and 1982.</span><sup class="reference" data-dcnode-id="6913" id="cite_ref-libya18812_93-0"><a data-dcnode-id="6914" href="#cite_note-libya18812-93"><span data-dcnode-id="6915" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6912" instrument_node=""> During this period, Moscow also supplied $4.6 billion in weaponry to Libya, providing about 90 percent of that country's arms inventory,</span><sup class="reference" data-dcnode-id="6909" id="cite_ref-libussr_92-2"><a data-dcnode-id="6910" href="#cite_note-libussr-92"><span data-dcnode-id="6911" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6908" instrument_node=""> and the Gaddafi regime assisted the Soviet Union by playing a key role in preserving the Communist regimes in both </span><a data-dcnode-id="6906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Angola" title="People's Republic of Angola"><span data-dcnode-id="6907" instrument_node="">Angola</span></a><sup class="reference" data-dcnode-id="6903" id="cite_ref-94"><a data-dcnode-id="6904" href="#cite_note-94"><span data-dcnode-id="6905" instrument_node="">[94]</span></a></sup><span data-dcnode-id="6902" instrument_node=""> and </span><a data-dcnode-id="6900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Democratic_Republic_of_Ethiopia" title="People's Democratic Republic of Ethiopia"><span data-dcnode-id="6901" instrument_node="">Ethiopia</span></a><span data-dcnode-id="6899" instrument_node="">.</span><sup class="reference" data-dcnode-id="6896" id="cite_ref-95"><a data-dcnode-id="6897" href="#cite_note-95"><span data-dcnode-id="6898" instrument_node="">[95]</span></a></sup><span data-dcnode-id="6895" instrument_node=""> According to Kommersant, "Libya was one of the Soviet Union's few partners that paid in full for the military equipment it purchased from the USSR,"</span><sup class="reference" data-dcnode-id="6892" id="cite_ref-libussr_92-3"><a data-dcnode-id="6893" href="#cite_note-libussr-92"><span data-dcnode-id="6894" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6891" instrument_node=""> though the Gaddafi regime still maintained good relations with the Western nations of France and Italy and refused to sign a Treaty of Friendship and Cooperation with the Soviet Union.</span><sup class="reference" data-dcnode-id="6888" id="cite_ref-libya18812_93-1"><a data-dcnode-id="6889" href="#cite_note-libya18812-93"><span data-dcnode-id="6890" instrument_node="">[93]</span></a></sup><span data-dcnode-id="6887" instrument_node=""> Libya, however, did run up a debt to Moscow during those years.</span><sup class="reference" data-dcnode-id="6884" id="cite_ref-libussr_92-4"><a data-dcnode-id="6885" href="#cite_note-libussr-92"><span data-dcnode-id="6886" instrument_node="">[92]</span></a></sup><span data-dcnode-id="6883" instrument_node="">
</span></p><p data-dcnode-id="6829"><span data-dcnode-id="6881" instrument_node="">Throughout much of the Cold War, Syria and Iraq were each ruled by rival fractions of the pan-Arab </span><a class="mw-redirect" data-dcnode-id="6879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baath_Party" title="Baath Party"><span data-dcnode-id="6880" instrument_node="">Baath Party</span></a><span data-dcnode-id="6878" instrument_node=""> and the two nations were often tense towards one another despite their close relations with the Soviet Union. Their relationship, which had been lukewarm at best since 1963, started to change in a dramatic fashion when </span><a data-dcnode-id="6876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mohammad_Reza_Pahlavi" title="Mohammad Reza Pahlavi"><span data-dcnode-id="6877" instrument_node="">Mohammad Reza Pahlavi</span></a><span data-dcnode-id="6875" instrument_node="">, the </span><a class="mw-redirect" data-dcnode-id="6873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_kings_of_Persia" title="List of kings of Persia"><span data-dcnode-id="6874" instrument_node="">Shah of Iran</span></a><span data-dcnode-id="6872" instrument_node="">, was </span><a data-dcnode-id="6870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_Revolution" title="Iranian Revolution"><span data-dcnode-id="6871" instrument_node="">overthrown in February 1979</span></a><span data-dcnode-id="6869" instrument_node=""> and replaced with the pro-Islamist regime of </span><a data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ayatollah" title="Ayatollah"><span data-dcnode-id="6868" instrument_node="">Ayatollah</span></a><span data-dcnode-id="6866" instrument_node=""> </span><a data-dcnode-id="6864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ruhollah_Khomeini" title="Ruhollah Khomeini"><span data-dcnode-id="6865" instrument_node="">Ruhollah Khomeini</span></a><span data-dcnode-id="6863" instrument_node="">. After seizing power, Khomeini established a system of laws which required the mostly </span><a data-dcnode-id="6861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shia_Islam" title="Shia Islam"><span data-dcnode-id="6862" instrument_node="">Shiite</span></a><span data-dcnode-id="6860" instrument_node=""> population of Iran to follow strict adherence to the </span><a class="mw-redirect" data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Twelver" title="Twelver"><span data-dcnode-id="6859" instrument_node="">Twelver</span></a><span data-dcnode-id="6857" instrument_node=""> school of thought. Assad, himself a Shiite, soon formed a strong alliance with Iran and sought to use this new relationship to greatly weaken Iraq.</span><sup class="reference" data-dcnode-id="6854" id="cite_ref-uoooqvbu6_96-0"><a data-dcnode-id="6855" href="#cite_note-uoooqvbu6-96"><span data-dcnode-id="6856" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6853" instrument_node=""> On July 16, 1979, </span><a data-dcnode-id="6851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ahmed_Hassan_al-Bakr" title="Ahmed Hassan al-Bakr"><span data-dcnode-id="6852" instrument_node="">Ahmed Hassan al-Bakr</span></a><span data-dcnode-id="6850" instrument_node="">, who had ruled Iraq following a </span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/17_July_Revolution" title="17 July Revolution"><span data-dcnode-id="6849" instrument_node="">coup in 1968</span></a><span data-dcnode-id="6847" instrument_node="">, stepped down from power and appointed his cousin </span><a data-dcnode-id="6845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Saddam_Hussein" title="Saddam Hussein"><span data-dcnode-id="6846" instrument_node="">Saddam Hussein</span></a><span data-dcnode-id="6844" instrument_node="">, a strongly anti-Shiite </span><a class="mw-redirect" data-dcnode-id="6842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sunni" title="Sunni"><span data-dcnode-id="6843" instrument_node="">Sunni</span></a><span data-dcnode-id="6841" instrument_node="">, to be his successor and the Syrian government officially closed its embassy in Baghdad soon afterwards.</span><sup class="reference" data-dcnode-id="6838" id="cite_ref-97"><a data-dcnode-id="6839" href="#cite_note-97"><span data-dcnode-id="6840" instrument_node="">[97]</span></a></sup><span data-dcnode-id="6837" instrument_node=""> In 1980, relations between Iraq and Syria officially broke apart when Syria declared its support for Iran during the </span><a data-dcnode-id="6835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran%25E2%2580%2593Iraq_War" title="Iran–Iraq War"><span data-dcnode-id="6836" instrument_node="">Iran–Iraq War</span></a><span data-dcnode-id="6834" instrument_node=""> and Hussein, hoping to gain the advantage over Iran, expanded relations with the Western nations and recanted Iraq's previous position towards Israel.</span><sup class="reference" data-dcnode-id="6831" id="cite_ref-uoooqvbu6_96-1"><a data-dcnode-id="6832" href="#cite_note-uoooqvbu6-96"><span data-dcnode-id="6833" instrument_node="">[96]</span></a></sup><span data-dcnode-id="6830" instrument_node="">
</span></p><span data-dcnode-id="6828" instrument_node="">
</span><h4 data-dcnode-id="6818"><span class="mw-headline" data-dcnode-id="6826" id="Contradictions"><span data-dcnode-id="6827" instrument_node="">Contradictions</span></span><span class="mw-editsection" data-dcnode-id="6819"><span class="mw-editsection-bracket" data-dcnode-id="6824"><span data-dcnode-id="6825" instrument_node="">[</span></span><a data-dcnode-id="6822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D35" title="Edit section: Contradictions"><span data-dcnode-id="6823" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6820"><span data-dcnode-id="6821" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6817" instrument_node="">
</span><p data-dcnode-id="6768"><span data-dcnode-id="6816" instrument_node="">In December 1979, relations between the Soviet Union and Iraq, though still very strong in private,</span><sup class="reference" data-dcnode-id="6813" id="cite_ref-soviraq_87-1"><a data-dcnode-id="6814" href="#cite_note-soviraq-87"><span data-dcnode-id="6815" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6812" instrument_node=""> soured greatly in public when Iraq condemned the </span><a data-dcnode-id="6810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="6811" instrument_node="">Soviets' invasion of Afghanistan</span></a><span data-dcnode-id="6809" instrument_node="">.</span><sup class="reference" data-dcnode-id="6806" id="cite_ref-soviraq_87-2"><a data-dcnode-id="6807" href="#cite_note-soviraq-87"><span data-dcnode-id="6808" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6805" instrument_node=""> After Iraq invaded Iran in September 1980, the Soviet Union, hoping to make Iran a new ally, cut off arms shipments to Iraq (and to Iran) as part of its efforts to induce a cease-fire.</span><sup class="reference" data-dcnode-id="6802" id="cite_ref-soviraq_87-3"><a data-dcnode-id="6803" href="#cite_note-soviraq-87"><span data-dcnode-id="6804" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6801" instrument_node=""> However, it also allowed Syria to continue to back Iran and ship Libyan and Eastern Bloc weapons to the country as well.</span><sup class="reference" data-dcnode-id="6798" id="cite_ref-98"><a data-dcnode-id="6799" href="#cite_note-98"><span data-dcnode-id="6800" instrument_node="">[98]</span></a></sup><span data-dcnode-id="6797" instrument_node=""> While Khomeini was strongly anti-American and had demonstrated this sentiment by calling United States "the </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Satan" title="Great Satan"><span data-dcnode-id="6796" instrument_node="">Great Satan</span></a><span data-dcnode-id="6794" instrument_node="">" and taking </span><a data-dcnode-id="6792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran_hostage_crisis" title="Iran hostage crisis"><span data-dcnode-id="6793" instrument_node="">US embassy workers hostage</span></a><span data-dcnode-id="6791" instrument_node="">, he also strongly opposed the Soviet Union, labeling the Communist belief a threat to Islam; and efforts by the Soviets to make Iran an ally further soured when Khomeini openly declared support the </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mujahideen" title="Mujahideen"><span data-dcnode-id="6790" instrument_node="">Afghan Mujahideen</span></a><span data-dcnode-id="6788" instrument_node=""> during the </span><a data-dcnode-id="6786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet%25E2%2580%2593Afghan_War" title="Soviet–Afghan War"><span data-dcnode-id="6787" instrument_node="">Soviet–Afghan War</span></a><span data-dcnode-id="6785" instrument_node=""> and refused to crack down on pro-Afghan protesters who consistently attacked the USSR embassy in Tehran.</span><sup class="reference" data-dcnode-id="6782" id="cite_ref-99"><a data-dcnode-id="6783" href="#cite_note-99"><span data-dcnode-id="6784" instrument_node="">[99]</span></a></sup><span data-dcnode-id="6781" instrument_node=""> In 1982, when it became clear that Iran would not align with the USSR after the Khomeini regime gained the upper hand in the Iran–Iraq War and invaded Iraqi territory,</span><sup class="reference" data-dcnode-id="6778" id="cite_ref-soviraq_87-4"><a data-dcnode-id="6779" href="#cite_note-soviraq-87"><span data-dcnode-id="6780" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6777" instrument_node=""> the Soviets resumed regular arm shipments to Iraq,</span><sup class="reference" data-dcnode-id="6774" id="cite_ref-soviraq_87-5"><a data-dcnode-id="6775" href="#cite_note-soviraq-87"><span data-dcnode-id="6776" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6773" instrument_node=""> but relations between the two nations were still politically strained and would not become strong in public again until early 1988.</span><sup class="reference" data-dcnode-id="6770" id="cite_ref-soviraq_87-6"><a data-dcnode-id="6771" href="#cite_note-soviraq-87"><span data-dcnode-id="6772" instrument_node="">[87]</span></a></sup><span data-dcnode-id="6769" instrument_node="">
</span></p><p data-dcnode-id="6726"><span data-dcnode-id="6767" instrument_node="">After 1966, a large Soviet military presence developed in Syria.</span><sup class="reference" data-dcnode-id="6764" id="cite_ref-vpppav_82-7"><a data-dcnode-id="6765" href="#cite_note-vpppav-82"><span data-dcnode-id="6766" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6763" instrument_node=""> Syria eventually became the Soviet military's most favored client not only in the Middle East, but throughout the Third World as well.</span><sup class="reference" data-dcnode-id="6760" id="cite_ref-vpppav_82-8"><a data-dcnode-id="6761" href="#cite_note-vpppav-82"><span data-dcnode-id="6762" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6759" instrument_node=""> By mid-1984, there were an estimated 13,000 Soviet and East European advisers in Syria.</span><sup class="reference" data-dcnode-id="6756" id="cite_ref-vpppav_82-9"><a data-dcnode-id="6757" href="#cite_note-vpppav-82"><span data-dcnode-id="6758" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6755" instrument_node=""> Though relations still remained strong,</span><sup class="reference" data-dcnode-id="6752" id="cite_ref-vpppav_82-10"><a data-dcnode-id="6753" href="#cite_note-vpppav-82"><span data-dcnode-id="6754" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6751" instrument_node=""> the Soviets' stance towards Syria's support for Iran changed dramatically when Iran further advanced into Iraqi territory and drew strong ire from the Soviets as it continued to suppress members of the pro-communist </span><a data-dcnode-id="6749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tudeh_Party_of_Iran" title="Tudeh Party of Iran"><span data-dcnode-id="6750" instrument_node="">Tudeh Party of Iran</span></a><span data-dcnode-id="6748" instrument_node="">.</span><sup class="reference" data-dcnode-id="6745" id="cite_ref-Mohiaddin_Mesbahi_1993_82_100-0"><a data-dcnode-id="6746" href="#cite_note-Mohiaddin_Mesbahi_1993_82-100"><span data-dcnode-id="6747" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6744" instrument_node=""> As a result, many of the advisers were withdrawn in 1985 and between 2,000 and 5,000 remained by 1986.</span><sup class="reference" data-dcnode-id="6741" id="cite_ref-vpppav_82-11"><a data-dcnode-id="6742" href="#cite_note-vpppav-82"><span data-dcnode-id="6743" instrument_node="">[82]</span></a></sup><span data-dcnode-id="6740" instrument_node=""> In February 1986, Iran successfully </span><a class="mw-redirect" data-dcnode-id="6738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Dawn_8" title="Operation Dawn 8"><span data-dcnode-id="6739" instrument_node="">captured</span></a><span data-dcnode-id="6737" instrument_node=""> the </span><a class="mw-redirect" data-dcnode-id="6735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Al-Faw_Peninsula" title="Al-Faw Peninsula"><span data-dcnode-id="6736" instrument_node="">Al-Faw Peninsula</span></a><span data-dcnode-id="6734" instrument_node=""> and the Soviet Union's stance in the </span><a data-dcnode-id="6732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran%25E2%2580%2593Iraq_War" title="Iran–Iraq War"><span data-dcnode-id="6733" instrument_node="">Iran–Iraq War</span></a><span data-dcnode-id="6731" instrument_node=""> completely shifted towards Iraq.</span><sup class="reference" data-dcnode-id="6728" id="cite_ref-Mohiaddin_Mesbahi_1993_82_100-1"><a data-dcnode-id="6729" href="#cite_note-Mohiaddin_Mesbahi_1993_82-100"><span data-dcnode-id="6730" instrument_node="">[100]</span></a></sup><span data-dcnode-id="6727" instrument_node="">
</span></p><p data-dcnode-id="6716"><span data-dcnode-id="6725" instrument_node="">The Soviet Union's foreign policy in the Middle East was contradictory. While the USSR first supported Israel, this relationship soon disintegrated as the Soviet Union felt threatened by Israel's need for security from the United States. The USSR turned to other Arab states in order to gain influence in the Arab world and to eliminate Western influence. The USSR viewed the Arab states as more important than Israel because they could help the USSR achieve its goal of spreading Communist influence. The USSR chose to support Egypt and Syria with arms in order to demonstrate its domination. The Soviet Union manipulated the Arab states against Israel in order to increase their dependence on the Soviet Union and to discourage Western powers from assisting Israel. The USSR hoped to be the only superpower influence in the Middle East.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="6718" style="white-space:nowrap;"><span data-dcnode-id="6724" instrument_node="">[</span><i data-dcnode-id="6720"><a data-dcnode-id="6721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="6722" title="This claim needs references to reliable sources. (January 2018)"><span data-dcnode-id="6723" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="6719" instrument_node="">]</span></sup><span data-dcnode-id="6717" instrument_node="">
</span></p><span data-dcnode-id="6715" instrument_node="">
</span><h3 data-dcnode-id="6705"><span class="mw-headline" data-dcnode-id="6713" id="Americas"><span data-dcnode-id="6714" instrument_node="">Americas</span></span><span class="mw-editsection" data-dcnode-id="6706"><span class="mw-editsection-bracket" data-dcnode-id="6711"><span data-dcnode-id="6712" instrument_node="">[</span></span><a data-dcnode-id="6709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D36" title="Edit section: Americas"><span data-dcnode-id="6710" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6707"><span data-dcnode-id="6708" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6704" instrument_node="">
</span><h4 data-dcnode-id="6694"><span class="mw-headline" data-dcnode-id="6702" id="Cuba"><span data-dcnode-id="6703" instrument_node="">Cuba</span></span><span class="mw-editsection" data-dcnode-id="6695"><span class="mw-editsection-bracket" data-dcnode-id="6700"><span data-dcnode-id="6701" instrument_node="">[</span></span><a data-dcnode-id="6698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D37" title="Edit section: Cuba"><span data-dcnode-id="6699" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6696"><span data-dcnode-id="6697" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6693" instrument_node="">
</span><link data-dcnode-id="6692" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6688" role="note"><span data-dcnode-id="6691" instrument_node="">Main article: </span><a data-dcnode-id="6689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba%25E2%2580%2593Soviet_Union_relations" title="Cuba–Soviet Union relations"><span data-dcnode-id="6690" instrument_node="">Cuba–Soviet Union relations</span></a></div><span data-dcnode-id="6687" instrument_node="">
</span><p data-dcnode-id="6658"><span data-dcnode-id="6686" instrument_node="">After the establishment of diplomatic ties with the </span><a data-dcnode-id="6684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6685" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6683" instrument_node=""> after the </span><a data-dcnode-id="6681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuban_Revolution" title="Cuban Revolution"><span data-dcnode-id="6682" instrument_node="">Cuban Revolution</span></a><span data-dcnode-id="6680" instrument_node=""> of 1959, </span><a data-dcnode-id="6678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cuba" title="Cuba"><span data-dcnode-id="6679" instrument_node="">Cuba</span></a><span data-dcnode-id="6677" instrument_node=""> became increasingly dependent on Soviet markets and military aid and was an ally of the Soviet Union during the </span><a data-dcnode-id="6675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="6676" instrument_node="">Cold War</span></a><span data-dcnode-id="6674" instrument_node="">. In 1972 Cuba joined the </span><a class="mw-redirect" data-dcnode-id="6672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COMECON" title="COMECON"><span data-dcnode-id="6673" instrument_node="">COMECON</span></a><span data-dcnode-id="6671" instrument_node="">, an economic organization of states designed to create co-operation among the communist </span><a class="mw-redirect" data-dcnode-id="6669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planned_economies" title="Planned economies"><span data-dcnode-id="6670" instrument_node="">planned economies</span></a><span data-dcnode-id="6668" instrument_node="">, which was dominated by its largest economy, the Soviet Union. </span><a data-dcnode-id="6666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow" title="Moscow"><span data-dcnode-id="6667" instrument_node="">Moscow</span></a><span data-dcnode-id="6665" instrument_node=""> kept in regular contact with </span><a data-dcnode-id="6663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Havana" title="Havana"><span data-dcnode-id="6664" instrument_node="">Havana</span></a><span data-dcnode-id="6662" instrument_node=""> and shared varying close relations until the end of the Soviet Union in 1991.  Cuba then entered an era of serious economic hardship, the </span><a data-dcnode-id="6660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Special_Period" title="Special Period"><span data-dcnode-id="6661" instrument_node="">Special Period</span></a><span data-dcnode-id="6659" instrument_node="">.
</span></p><span data-dcnode-id="6657" instrument_node="">
</span><h4 data-dcnode-id="6647"><span class="mw-headline" data-dcnode-id="6655" id="Grenada"><span data-dcnode-id="6656" instrument_node="">Grenada</span></span><span class="mw-editsection" data-dcnode-id="6648"><span class="mw-editsection-bracket" data-dcnode-id="6653"><span data-dcnode-id="6654" instrument_node="">[</span></span><a data-dcnode-id="6651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D38" title="Edit section: Grenada"><span data-dcnode-id="6652" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6649"><span data-dcnode-id="6650" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6646" instrument_node="">
</span><link data-dcnode-id="6645" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6641" role="note"><span data-dcnode-id="6644" instrument_node="">Main article: </span><a data-dcnode-id="6642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grenada%25E2%2580%2593Soviet_Union_relations" title="Grenada–Soviet Union relations"><span data-dcnode-id="6643" instrument_node="">Grenada–Soviet Union relations</span></a></div><span data-dcnode-id="6640" instrument_node="">
</span><p data-dcnode-id="6626"><b data-dcnode-id="6638"><span data-dcnode-id="6639" instrument_node="">Grenada-Soviet relations</span></b><span data-dcnode-id="6637" instrument_node=""> refers to the relations between </span><a data-dcnode-id="6635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Grenada" title="Grenada"><span data-dcnode-id="6636" instrument_node="">Grenada</span></a><span data-dcnode-id="6634" instrument_node="">, and the </span><a data-dcnode-id="6632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union" title="Soviet Union"><span data-dcnode-id="6633" instrument_node="">Soviet Union</span></a><span data-dcnode-id="6631" instrument_node="">. Diplomatic relations between Grenada and the Soviet Union were severed in November 1983 by the Governor General of Grenada. Eventually in 2002, Grenada re-established diplomatic relations with the newly formed Russian Federation.</span><sup class="reference" data-dcnode-id="6628" id="cite_ref-101"><a data-dcnode-id="6629" href="#cite_note-101"><span data-dcnode-id="6630" instrument_node="">[101]</span></a></sup><span data-dcnode-id="6627" instrument_node="">
</span></p><span data-dcnode-id="6625" instrument_node="">
</span><h4 data-dcnode-id="6615"><span class="mw-headline" data-dcnode-id="6623" id="United_States"><span data-dcnode-id="6624" instrument_node="">United States</span></span><span class="mw-editsection" data-dcnode-id="6616"><span class="mw-editsection-bracket" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">[</span></span><a data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D39" title="Edit section: United States"><span data-dcnode-id="6620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6614" instrument_node="">
</span><link data-dcnode-id="6613" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6609" role="note"><span data-dcnode-id="6612" instrument_node="">Main article: </span><a data-dcnode-id="6610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_Union%25E2%2580%2593United_States_relations" title="Soviet Union–United States relations"><span data-dcnode-id="6611" instrument_node="">Soviet Union–United States relations</span></a></div><span data-dcnode-id="6608" instrument_node="">
</span><p data-dcnode-id="6606"><span data-dcnode-id="6607" instrument_node="">Through even the toughest and most stagnant parts of the Cold War, diplomatic relations were still kept and even sought after between the United States and the Soviet Union. Whether for peace-making reasons or for negotiations, these agreements played an vital role in the Cold War.
</span></p><span data-dcnode-id="6605" instrument_node="">
</span><h5 data-dcnode-id="6595"><span class="mw-headline" data-dcnode-id="6603" id="Space_Race"><span data-dcnode-id="6604" instrument_node="">Space Race</span></span><span class="mw-editsection" data-dcnode-id="6596"><span class="mw-editsection-bracket" data-dcnode-id="6601"><span data-dcnode-id="6602" instrument_node="">[</span></span><a data-dcnode-id="6599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D40" title="Edit section: Space Race"><span data-dcnode-id="6600" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6597"><span data-dcnode-id="6598" instrument_node="">]</span></span></span></h5><span data-dcnode-id="6594" instrument_node="">
</span><link data-dcnode-id="6593" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6589" role="note"><span data-dcnode-id="6592" instrument_node="">Main article: </span><a data-dcnode-id="6590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Space_Race" title="Space Race"><span data-dcnode-id="6591" instrument_node="">Space Race</span></a></div><span data-dcnode-id="6588" instrument_node="">
</span><p data-dcnode-id="6558"><span data-dcnode-id="6587" instrument_node="">Between the years 1957 and 1958, U.S. President </span><a data-dcnode-id="6585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_D._Eisenhower" title="Dwight D. Eisenhower"><span data-dcnode-id="6586" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="6584" instrument_node=""> sought cooperative U.S.-Soviet space initiatives through a series of letters directed at Soviet leadership. These Soviet recipients included </span><a data-dcnode-id="6582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/General_Secretary_of_the_Communist_Party_of_the_Soviet_Union" title="General Secretary of the Communist Party of the Soviet Union"><span data-dcnode-id="6583" instrument_node="">First Secretary of the Communist Party</span></a><span data-dcnode-id="6581" instrument_node=""> </span><a data-dcnode-id="6579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="6580" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="6578" instrument_node=""> and </span><a data-dcnode-id="6576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_the_Soviet_Union" title="Premier of the Soviet Union"><span data-dcnode-id="6577" instrument_node="">Chairman of the Council of Ministers</span></a><span data-dcnode-id="6575" instrument_node=""> </span><a data-dcnode-id="6573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikolai_Bulganin" title="Nikolai Bulganin"><span data-dcnode-id="6574" instrument_node="">Nikolai Bulganin</span></a><span data-dcnode-id="6572" instrument_node="">. In these letters, Eisenhower suggested a protocol for peaceful space use. However, Khrushchev rejected the offer, feeling that his country was ahead of the United States in space-related technology after the successful launch of </span><a data-dcnode-id="6570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sputnik_1" title="Sputnik 1"><span data-dcnode-id="6571" instrument_node="">Sputnik 1</span></a><span data-dcnode-id="6569" instrument_node=""> on October 4, 1957. In response, Khrushchev presented a precondition for any future space agreements. Khrushchev demanded that the United States would first need to remove its nuclear-launch capabilities in </span><a data-dcnode-id="6567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Turkey" title="Turkey"><span data-dcnode-id="6568" instrument_node="">Turkey</span></a><span data-dcnode-id="6566" instrument_node="">. This signaled a future trend of space agreements as a means for </span><a data-dcnode-id="6564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_disarmament" title="Nuclear disarmament"><span data-dcnode-id="6565" instrument_node="">nuclear disarmament</span></a><span data-dcnode-id="6563" instrument_node="">.</span><sup class="reference" data-dcnode-id="6560" id="cite_ref-102"><a data-dcnode-id="6561" href="#cite_note-102"><span data-dcnode-id="6562" instrument_node="">[102]</span></a></sup><span data-dcnode-id="6559" instrument_node="">
</span></p><p data-dcnode-id="6543"><span data-dcnode-id="6557" instrument_node="">Despite the continued space competition between the United States and U.S.S.R., Khrushchev wrote a letter to U.S. president </span><a data-dcnode-id="6555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_F._Kennedy" title="John F. Kennedy"><span data-dcnode-id="6556" instrument_node="">John F. Kennedy</span></a><span data-dcnode-id="6554" instrument_node=""> detailing the possibility of future space cooperation between the two sworn rivals after American </span><a data-dcnode-id="6552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_Glenn" title="John Glenn"><span data-dcnode-id="6553" instrument_node="">John Glenn</span></a><span data-dcnode-id="6551" instrument_node=""> became the first American to orbit Earth on February 20, 1962. These discussions between the Soviet Union and the United States led to cooperation in three areas: weather data and future meteorology-related launches, the mapping of the </span><a data-dcnode-id="6549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earth%2527s_magnetic_field" title="Earth's magnetic field"><span data-dcnode-id="6550" instrument_node="">geomagnetic field</span></a><span data-dcnode-id="6548" instrument_node=""> of the Earth, and the relay of communication.</span><sup class="reference" data-dcnode-id="6545" id="cite_ref-:2_103-0"><a data-dcnode-id="6546" href="#cite_note-:2-103"><span data-dcnode-id="6547" instrument_node="">[103]</span></a></sup><span data-dcnode-id="6544" instrument_node="">
</span></p><span data-dcnode-id="6542" instrument_node="">
</span><h3 data-dcnode-id="6532"><span class="mw-headline" data-dcnode-id="6540" id="India"><span data-dcnode-id="6541" instrument_node="">India</span></span><span class="mw-editsection" data-dcnode-id="6533"><span class="mw-editsection-bracket" data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">[</span></span><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D41" title="Edit section: India"><span data-dcnode-id="6537" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6534"><span data-dcnode-id="6535" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6531" instrument_node="">
</span><link data-dcnode-id="6530" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6526" role="note"><span data-dcnode-id="6529" instrument_node="">Main article: </span><a data-dcnode-id="6527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indo-Soviet_Treaty_of_Friendship_and_Cooperation" title="Indo-Soviet Treaty of Friendship and Cooperation"><span data-dcnode-id="6528" instrument_node="">Indo-Soviet Treaty of Friendship and Cooperation</span></a></div><span data-dcnode-id="6525" instrument_node="">
</span><p data-dcnode-id="6494"><span data-dcnode-id="6524" instrument_node="">The relationship between the Soviet Union and India was a significant part of the Cold War. Both political and scientific in nature, this cooperation lasted for nearly 40 years. Over this span of nearly four decades, Soviet-Indian relations maintained through three pairs of leaders—</span><a data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jawaharlal_Nehru" title="Jawaharlal Nehru"><span data-dcnode-id="6523" instrument_node="">Jawaharlal Nehru</span></a><span data-dcnode-id="6521" instrument_node=""> and </span><a data-dcnode-id="6519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="6520" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="6518" instrument_node="">, </span><a data-dcnode-id="6516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indira_Gandhi" title="Indira Gandhi"><span data-dcnode-id="6517" instrument_node="">Indira Gandhi</span></a><span data-dcnode-id="6515" instrument_node=""> and </span><a data-dcnode-id="6513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="6514" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="6512" instrument_node="">, and </span><a data-dcnode-id="6510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rajiv_Gandhi" title="Rajiv Gandhi"><span data-dcnode-id="6511" instrument_node="">Rajiv Gandhi</span></a><span data-dcnode-id="6509" instrument_node=""> and </span><a data-dcnode-id="6507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="6508" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="6506" instrument_node="">.</span><sup class="reference" data-dcnode-id="6503" id="cite_ref-104"><a data-dcnode-id="6504" href="#cite_note-104"><span data-dcnode-id="6505" instrument_node="">[104]</span></a></sup><span data-dcnode-id="6502" instrument_node=""> This Indo-Soviet relationship can be seen being stemmed from India's distrust and general unsatisfactory feeling towards </span><a data-dcnode-id="6500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dwight_D._Eisenhower" title="Dwight D. Eisenhower"><span data-dcnode-id="6501" instrument_node="">Dwight D. Eisenhower</span></a><span data-dcnode-id="6499" instrument_node="">'s administration's insistence that Third World countries could not remain neutral during the Cold War and with American hesitation to consult with their governments on issues pertinent to these countries.</span><sup class="reference" data-dcnode-id="6496" id="cite_ref-105"><a data-dcnode-id="6497" href="#cite_note-105"><span data-dcnode-id="6498" instrument_node="">[105]</span></a></sup><span data-dcnode-id="6495" instrument_node="">
</span></p><p data-dcnode-id="6465"><span data-dcnode-id="6493" instrument_node="">India's pro-Soviet stance was professed when the government of Indira Gandhi broke with the rest of the non-communist world to embrace and support the </span><a data-dcnode-id="6491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Operation_Storm-333" title="Operation Storm-333"><span data-dcnode-id="6492" instrument_node="">Soviet invasion of Afghanistan</span></a><span data-dcnode-id="6490" instrument_node=""> at the UN General Assembly, despite earlier comments criticizing the operation.</span><sup class="reference" data-dcnode-id="6487" id="cite_ref-106"><a data-dcnode-id="6488" href="#cite_note-106"><span data-dcnode-id="6489" instrument_node="">[106]</span></a></sup><span data-dcnode-id="6486" instrument_node=""> The former ambassador, </span><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Inder_Kumar_Gujral" title="Inder Kumar Gujral"><span data-dcnode-id="6485" instrument_node="">Inder Kumar Gujral</span></a><span data-dcnode-id="6483" instrument_node="">, commented that the deep involvement of Pakistan in mobilizing the </span><a data-dcnode-id="6481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Afghan_mujahideen" title="Afghan mujahideen"><span data-dcnode-id="6482" instrument_node="">Afghan mujahideen</span></a><span data-dcnode-id="6480" instrument_node=""> was a concern for Indian security and stability, while also expressing India's "friendship" with the Soviets.</span><sup class="reference" data-dcnode-id="6477" id="cite_ref-107"><a data-dcnode-id="6478" href="#cite_note-107"><span data-dcnode-id="6479" instrument_node="">[107]</span></a></sup><span data-dcnode-id="6476" instrument_node=""> India was also the only country outside the Soviet bloc to fully recognize the </span><a data-dcnode-id="6474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_Kampuchea" title="People's Republic of Kampuchea"><span data-dcnode-id="6475" instrument_node="">People's Republic of Kampuchea</span></a><span data-dcnode-id="6473" instrument_node=""> after the </span><a data-dcnode-id="6471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cambodian%25E2%2580%2593Vietnamese_War" title="Cambodian–Vietnamese War"><span data-dcnode-id="6472" instrument_node="">Vietnamese invasion of Cambodia</span></a><span data-dcnode-id="6470" instrument_node="">.</span><sup class="reference" data-dcnode-id="6467" id="cite_ref-108"><a data-dcnode-id="6468" href="#cite_note-108"><span data-dcnode-id="6469" instrument_node="">[108]</span></a></sup><span data-dcnode-id="6466" instrument_node="">
</span></p><span data-dcnode-id="6464" instrument_node="">
</span><h4 data-dcnode-id="6454"><span class="mw-headline" data-dcnode-id="6462" id="Space_Cooperation"><span data-dcnode-id="6463" instrument_node="">Space Cooperation</span></span><span class="mw-editsection" data-dcnode-id="6455"><span class="mw-editsection-bracket" data-dcnode-id="6460"><span data-dcnode-id="6461" instrument_node="">[</span></span><a data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D42" title="Edit section: Space Cooperation"><span data-dcnode-id="6459" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6456"><span data-dcnode-id="6457" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6453" instrument_node="">
</span><p data-dcnode-id="6447"><span data-dcnode-id="6452" instrument_node="">Scientific cooperation between the Soviet Union and India began with the formal establishment of an Indo-Soviet Joint Committee of Scientists, which held its first meeting in January 1968.</span><sup class="reference" data-dcnode-id="6449" id="cite_ref-:0_109-0"><a data-dcnode-id="6450" href="#cite_note-:0-109"><span data-dcnode-id="6451" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6448" instrument_node="">
</span></p><p data-dcnode-id="6432"><span data-dcnode-id="6446" instrument_node="">The Soviet Union was a major contributor to India's space effort. Most notably, Soviet technical assistance in design and launching was paramount to the success of Indian satellites </span><a data-dcnode-id="6444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aryabhata_%28satellite%29" title="Aryabhata (satellite)"><span data-dcnode-id="6445" instrument_node="">Aryabhata</span></a><span data-dcnode-id="6443" instrument_node="">, </span><a data-dcnode-id="6441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhaskara_%28satellite%29" title="Bhaskara (satellite)"><span data-dcnode-id="6442" instrument_node="">Bhaskara-I</span></a><span data-dcnode-id="6440" instrument_node=""> and </span><a data-dcnode-id="6438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bhaskara_%28satellite%29" title="Bhaskara (satellite)"><span data-dcnode-id="6439" instrument_node="">Bhaskara-II</span></a><span data-dcnode-id="6437" instrument_node="">.</span><sup class="reference" data-dcnode-id="6434" id="cite_ref-:1_110-0"><a data-dcnode-id="6435" href="#cite_note-:1-110"><span data-dcnode-id="6436" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6433" instrument_node=""> When considering India's reputation for poverty and food insecurity at the time, outsiders began to wonder if India belonged to such a prestigious group of nations, or if it was only given the opportunity by the Soviet Union.
</span></p><p data-dcnode-id="6396"><span data-dcnode-id="6431" instrument_node="">Work on </span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aryabhata_%28satellite%29" title="Aryabhata (satellite)"><span data-dcnode-id="6430" instrument_node="">A'ryabhata</span></a><span data-dcnode-id="6428" instrument_node=""> began following an agreement between the </span><a data-dcnode-id="6426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_Space_Research_Organisation" title="Indian Space Research Organisation"><span data-dcnode-id="6427" instrument_node="">Indian Space Research Organization</span></a><span data-dcnode-id="6425" instrument_node=""> and the </span><a data-dcnode-id="6423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Sciences_of_the_Soviet_Union" title="Academy of Sciences of the Soviet Union"><span data-dcnode-id="6424" instrument_node="">USSR Academy of Sciences</span></a><span data-dcnode-id="6422" instrument_node=""> in May 1972. On April 19, 1975, less than one year after India's first successful </span><a data-dcnode-id="6420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapon" title="Nuclear weapon"><span data-dcnode-id="6421" instrument_node="">nuclear bomb</span></a><span data-dcnode-id="6419" instrument_node=""> </span><a data-dcnode-id="6417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nuclear_weapons_testing" title="Nuclear weapons testing"><span data-dcnode-id="6418" instrument_node="">test</span></a><span data-dcnode-id="6416" instrument_node=""> on May 18, 1974, the Soviet Union helped launch India's first satellite </span><a data-dcnode-id="6414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aryabhata_%28satellite%29" title="Aryabhata (satellite)"><span data-dcnode-id="6415" instrument_node="">Aryabhata</span></a><span data-dcnode-id="6413" instrument_node=""> from </span><a data-dcnode-id="6411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kapustin_Yar" title="Kapustin Yar"><span data-dcnode-id="6412" instrument_node="">Kapustin Yar</span></a><span data-dcnode-id="6410" instrument_node="">, a </span><a data-dcnode-id="6408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="6409" instrument_node="">Russian</span></a><span data-dcnode-id="6407" instrument_node=""> rocket launch and development site in </span><a data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Astrakhan_Oblast" title="Astrakhan Oblast"><span data-dcnode-id="6406" instrument_node="">Astrakhan Oblast</span></a><span data-dcnode-id="6404" instrument_node=""> using a </span><a data-dcnode-id="6402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kosmos-3M" title="Kosmos-3M"><span data-dcnode-id="6403" instrument_node="">Kosmos-3M</span></a><span data-dcnode-id="6401" instrument_node=""> launch vehicle. It was built by the ISRO, but the Soviets provided technical assistance and components such as solar cells, batteries, thermal paints, and tape recorders to aid in its proposed 6 month solar and atmospheric studies.</span><sup class="reference" data-dcnode-id="6398" id="cite_ref-:1_110-1"><a data-dcnode-id="6399" href="#cite_note-:1-110"><span data-dcnode-id="6400" instrument_node="">[110]</span></a></sup><span data-dcnode-id="6397" instrument_node=""> Though the satellite was expected to perform solar and atmospheric studies for 6 months, the experiments had to be closed down after 5 days due to a power supply problem.
</span></p><p data-dcnode-id="6387"><span data-dcnode-id="6395" instrument_node="">On June 7, 1979, Bhaskara-I was launched from </span><a data-dcnode-id="6393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kapustin_Yar" title="Kapustin Yar"><span data-dcnode-id="6394" instrument_node="">Kapustin Yar</span></a><span data-dcnode-id="6392" instrument_node=""> aboard the C-1 Intercosmos Launch Vehicle.</span><sup class="reference" data-dcnode-id="6389" id="cite_ref-:0_109-1"><a data-dcnode-id="6390" href="#cite_note-:0-109"><span data-dcnode-id="6391" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6388" instrument_node="">
</span></p><p data-dcnode-id="6381"><span data-dcnode-id="6386" instrument_node="">On November 20, 1981, Bhaskara-II was launched, providing nearly two thousand photos for ocean and land surface data.</span><sup class="reference" data-dcnode-id="6383" id="cite_ref-:0_109-2"><a data-dcnode-id="6384" href="#cite_note-:0-109"><span data-dcnode-id="6385" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6382" instrument_node="">
