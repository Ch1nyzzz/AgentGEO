</span></p><p data-dcnode-id="6366"><span data-dcnode-id="6380" instrument_node="">In April 1985, the </span><a data-dcnode-id="6378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_National_Science_Academy" title="Indian National Science Academy"><span data-dcnode-id="6379" instrument_node="">Indian National Science Academy</span></a><span data-dcnode-id="6377" instrument_node=""> and the </span><a data-dcnode-id="6375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russian_Academy_of_Sciences" title="Russian Academy of Sciences"><span data-dcnode-id="6376" instrument_node="">Soviet Academy of Sciences</span></a><span data-dcnode-id="6374" instrument_node=""> signed an agreement for joint research in applied mathematics and technology such as computer electronics, biotechnology, and silicon technology. On March 21, 1987, following </span><a data-dcnode-id="6372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rajiv_Gandhi" title="Rajiv Gandhi"><span data-dcnode-id="6373" instrument_node="">Rajiv Gandhi</span></a><span data-dcnode-id="6371" instrument_node="">'s visit to the Soviet Union, a protocol for cooperation in science and technology were signed, leading to new initiatives in laser technology, alternative energy sources, and electron accelerators.</span><sup class="reference" data-dcnode-id="6368" id="cite_ref-:0_109-3"><a data-dcnode-id="6369" href="#cite_note-:0-109"><span data-dcnode-id="6370" instrument_node="">[109]</span></a></sup><span data-dcnode-id="6367" instrument_node="">
</span></p><span data-dcnode-id="6365" instrument_node="">
</span><h3 data-dcnode-id="6355"><span class="mw-headline" data-dcnode-id="6363" id="Break_with_China"><span data-dcnode-id="6364" instrument_node="">Break with China</span></span><span class="mw-editsection" data-dcnode-id="6356"><span class="mw-editsection-bracket" data-dcnode-id="6361"><span data-dcnode-id="6362" instrument_node="">[</span></span><a data-dcnode-id="6359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D43" title="Edit section: Break with China"><span data-dcnode-id="6360" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6357"><span data-dcnode-id="6358" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6354" instrument_node="">
</span><link data-dcnode-id="6353" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6346" role="note"><span data-dcnode-id="6352" instrument_node="">Main articles: </span><a data-dcnode-id="6350" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sino-Soviet_split" title="Sino-Soviet split"><span data-dcnode-id="6351" instrument_node="">Sino-Soviet split</span></a><span data-dcnode-id="6349" instrument_node=""> and </span><a data-dcnode-id="6347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/History_of_Sino-Russian_relations" title="History of Sino-Russian relations"><span data-dcnode-id="6348" instrument_node="">History of Sino-Russian relations</span></a></div><span data-dcnode-id="6345" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6336"><div class="thumbinner" data-dcnode-id="6337" style="width:352px;"><a class="image" data-dcnode-id="6343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASino-Soviet_split_1980.svg"><img alt="" class="thumbimage" data-dcnode-id="6344" data-file-height="477" data-file-width="940" decoding="async" height="178" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/350px-Sino-Soviet_split_1980.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/525px-Sino-Soviet_split_1980.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/54/Sino-Soviet_split_1980.svg/700px-Sino-Soviet_split_1980.svg.png 2x" width="350"></a><span data-dcnode-id="6342" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6338"><div class="magnify" data-dcnode-id="6340"><a class="internal" data-dcnode-id="6341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ASino-Soviet_split_1980.svg" title="Enlarge"></a></div><span data-dcnode-id="6339" instrument_node="">Communist state alignments in 1980: pro-Soviet (red); pro-Chinese (yellow); and the non-aligned North Korea and Yugoslavia (black); Somalia had been pro-Soviet until 1977; and Cambodia (Kampuchea) had been pro-China until 1979</span></div></div></div><span data-dcnode-id="6335" instrument_node="">
</span><p data-dcnode-id="6295"><span data-dcnode-id="6334" instrument_node="">The </span><b data-dcnode-id="6332"><span data-dcnode-id="6333" instrument_node="">Sino-Soviet split</span></b><span data-dcnode-id="6331" instrument_node=""> (1956–1966) was the breaking of political relations between the </span><a class="mw-redirect" data-dcnode-id="6329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/People%2527s_Republic_of_China" title="People's Republic of China"><span data-dcnode-id="6330" instrument_node="">People's Republic of China</span></a><span data-dcnode-id="6328" instrument_node=""> (PRC) and the </span><a class="mw-redirect" data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Union_of_Soviet_Socialist_Republics" title="Union of Soviet Socialist Republics"><span data-dcnode-id="6327" instrument_node="">Union of Soviet Socialist Republics</span></a><span data-dcnode-id="6325" instrument_node=""> (USSR), caused by </span><a data-dcnode-id="6323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doctrine" title="Doctrine"><span data-dcnode-id="6324" instrument_node="">doctrinal</span></a><span data-dcnode-id="6322" instrument_node=""> divergences that arose from their different interpretations and practical applications of </span><a data-dcnode-id="6320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxism%25E2%2580%2593Leninism" title="Marxism–Leninism"><span data-dcnode-id="6321" instrument_node="">Marxism–Leninism</span></a><span data-dcnode-id="6319" instrument_node="">, as influenced by their respective geopolitics during the </span><a data-dcnode-id="6317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="6318" instrument_node="">Cold War</span></a><span data-dcnode-id="6316" instrument_node=""> (1947–1991).</span><sup class="reference" data-dcnode-id="6313" id="cite_ref-World_History_2000._p._769_111-0"><a data-dcnode-id="6314" href="#cite_note-World_History_2000._p._769-111"><span data-dcnode-id="6315" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6312" instrument_node=""> In the late 1950s and early 1960s, Sino-Soviet debates about the interpretation of </span><a data-dcnode-id="6310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orthodox_Marxism" title="Orthodox Marxism"><span data-dcnode-id="6311" instrument_node="">Orthodox Marxism</span></a><span data-dcnode-id="6309" instrument_node=""> became specific disputes about the Soviet Union's policies of national </span><a data-dcnode-id="6307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/De-Stalinization" title="De-Stalinization"><span data-dcnode-id="6308" instrument_node="">de-Stalinization</span></a><span data-dcnode-id="6306" instrument_node=""> and international </span><a data-dcnode-id="6304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Peaceful_coexistence" title="Peaceful coexistence"><span data-dcnode-id="6305" instrument_node="">peaceful coexistence</span></a><span data-dcnode-id="6303" instrument_node=""> with the Western world. Against that political background, the international relations of the PRC featured official belligerence towards the West, and an initial, public rejection of the Soviet Union's policy of peaceful coexistence between the Eastern and Western blocs, which Mao Zedong said was </span><a class="mw-redirect" data-dcnode-id="6301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Marxist_revisionism" title="Marxist revisionism"><span data-dcnode-id="6302" instrument_node="">Marxist revisionism</span></a><span data-dcnode-id="6300" instrument_node=""> by the Russian Communists.</span><sup class="reference" data-dcnode-id="6297" id="cite_ref-World_History_2000._p._769_111-1"><a data-dcnode-id="6298" href="#cite_note-World_History_2000._p._769-111"><span data-dcnode-id="6299" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6296" instrument_node="">
</span></p><p data-dcnode-id="6262"><span data-dcnode-id="6294" instrument_node="">Beginning in 1956, after </span><a data-dcnode-id="6292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nikita_Khrushchev" title="Nikita Khrushchev"><span data-dcnode-id="6293" instrument_node="">Nikita Khrushchev</span></a><span data-dcnode-id="6291" instrument_node=""> denounced Stalin and Stalinism in the speech </span><i data-dcnode-id="6288"><a data-dcnode-id="6289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/On_the_Cult_of_Personality_and_Its_Consequences" title="On the Cult of Personality and Its Consequences"><span data-dcnode-id="6290" instrument_node="">On the Cult of Personality and its Consequences</span></a></i><span data-dcnode-id="6287" instrument_node=""> (25 February 1956), the PRC and the USSR had progressively divergent interpretations of Marxist ideology; by 1961, their intractable differences of ideologic interpretation and praxis provoked the PRC's formal denunciation of </span><a class="mw-redirect" data-dcnode-id="6285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Soviet_communism" title="Soviet communism"><span data-dcnode-id="6286" instrument_node="">Soviet communism</span></a><span data-dcnode-id="6284" instrument_node=""> as the work of "revisionist traitors" in the USSR.</span><sup class="reference" data-dcnode-id="6281" id="cite_ref-World_History_2000._p._769_111-2"><a data-dcnode-id="6282" href="#cite_note-World_History_2000._p._769-111"><span data-dcnode-id="6283" instrument_node="">[111]</span></a></sup><span data-dcnode-id="6280" instrument_node=""> Among the </span><a class="mw-redirect" data-dcnode-id="6278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eastern_bloc" title="Eastern bloc"><span data-dcnode-id="6279" instrument_node="">Eastern bloc</span></a><span data-dcnode-id="6277" instrument_node=""> countries, the Sino-Soviet split was about who would lead the revolution for </span><a data-dcnode-id="6275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/World_communism" title="World communism"><span data-dcnode-id="6276" instrument_node="">world communism</span></a><span data-dcnode-id="6274" instrument_node="">, China or Russia, and to whom would the </span><a data-dcnode-id="6272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vanguardism" title="Vanguardism"><span data-dcnode-id="6273" instrument_node="">vanguard parties</span></a><span data-dcnode-id="6271" instrument_node=""> of the world turn for political advice, financial aid, and military assistance.</span><sup class="reference" data-dcnode-id="6268" id="cite_ref-:2_103-1"><a data-dcnode-id="6269" href="#cite_note-:2-103"><span data-dcnode-id="6270" instrument_node="">[103]</span></a></sup><span data-dcnode-id="6267" instrument_node=""> In that vein, the USSR and the PRC competed for ideological leadership through the communist parties native to the countries in their spheres of influence.</span><sup class="reference" data-dcnode-id="6264" id="cite_ref-112"><a data-dcnode-id="6265" href="#cite_note-112"><span data-dcnode-id="6266" instrument_node="">[112]</span></a></sup><span data-dcnode-id="6263" instrument_node="">
</span></p><p data-dcnode-id="6250"><span data-dcnode-id="6261" instrument_node="">The Sino-Soviet split transformed the geopolitics of the bi-polar cold war into a tri-polar cold war, and facilitated Sino-American rapprochement and the </span><a class="mw-redirect" data-dcnode-id="6259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/1972_Nixon_visit_to_China" title="1972 Nixon visit to China"><span data-dcnode-id="6260" instrument_node="">1972 Nixon visit to China</span></a><span data-dcnode-id="6258" instrument_node="">. It ended the era of "monolithic communism. Historically, the ideological Sino-Soviet split facilitated the Marxist–Leninist </span><i data-dcnode-id="6255"><a data-dcnode-id="6256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Realpolitik" title="Realpolitik"><span data-dcnode-id="6257" instrument_node="">Realpolitik</span></a></i><span data-dcnode-id="6254" instrument_node=""> by which Mao established the </span><a class="mw-redirect" data-dcnode-id="6252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Three_worlds_theory" title="Three worlds theory"><span data-dcnode-id="6253" instrument_node="">tri-polar geopolitics</span></a><span data-dcnode-id="6251" instrument_node=""> (PRC-USA-USSR) of the late-period Cold War.
</span></p><p data-dcnode-id="6248"><span data-dcnode-id="6249" instrument_node="">Historian Lorenz M. Lüthi said: 
</span></p><span data-dcnode-id="6247" instrument_node="">
</span><dl data-dcnode-id="6241"><dd data-dcnode-id="6242"><span data-dcnode-id="6246" instrument_node="">The Sino–Soviet split was one of the key events of the Cold War, equal in importance to the construction of the Berlin Wall, the Cuban Missile Crisis, the Second Vietnam War, and Sino-American Rapprochement. The split helped to determine the framework of the second half of the Cold War in general, and influenced the course of the Second Vietnam War, in particular. Like a nasty divorce, it left bad memories and produced myths of innocence on both sides.</span><sup class="reference" data-dcnode-id="6243" id="cite_ref-113"><a data-dcnode-id="6244" href="#cite_note-113"><span data-dcnode-id="6245" instrument_node="">[113]</span></a></sup></dd></dl><span data-dcnode-id="6240" instrument_node="">
</span><h3 data-dcnode-id="6230"><span class="mw-headline" data-dcnode-id="6238" id="Relations_with_Southeast_Asian_states"><span data-dcnode-id="6239" instrument_node="">Relations with Southeast Asian states</span></span><span class="mw-editsection" data-dcnode-id="6231"><span class="mw-editsection-bracket" data-dcnode-id="6236"><span data-dcnode-id="6237" instrument_node="">[</span></span><a data-dcnode-id="6234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D44" title="Edit section: Relations with Southeast Asian states"><span data-dcnode-id="6235" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6229" instrument_node="">
</span><p data-dcnode-id="6213"><a class="mw-redirect" data-dcnode-id="6227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Soviet_Union" title="The Soviet Union"><span data-dcnode-id="6228" instrument_node="">The Soviet Union</span></a><span data-dcnode-id="6226" instrument_node=""> gradually became heavily involved in the contest for influence in </span><a data-dcnode-id="6224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Southeast_Asia" title="Southeast Asia"><span data-dcnode-id="6225" instrument_node="">Southeast Asia</span></a><span data-dcnode-id="6223" instrument_node="">. Although the Soviet Union is usually associated with its diplomatic support for </span><a data-dcnode-id="6221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/North_Vietnam" title="North Vietnam"><span data-dcnode-id="6222" instrument_node="">North Vietnam</span></a><span data-dcnode-id="6220" instrument_node=""> during </span><a class="mw-redirect" data-dcnode-id="6218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_Vietnam_War" title="The Vietnam War"><span data-dcnode-id="6219" instrument_node="">the Vietnam War</span></a><span data-dcnode-id="6217" instrument_node="">, it also played a significant role in other Southeast Asian countries. Prior to the rise of President Suharto, the Soviet Union's largest recipient of arms aid between 1958 and 1965 was </span><a data-dcnode-id="6215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indonesia" title="Indonesia"><span data-dcnode-id="6216" instrument_node="">Indonesia</span></a><span data-dcnode-id="6214" instrument_node="">.
</span></p><span data-dcnode-id="6212" instrument_node="">
</span><h2 data-dcnode-id="6202"><span class="mw-headline" data-dcnode-id="6210" id="The_1970s_onwards"><span data-dcnode-id="6211" instrument_node="">The 1970s onwards</span></span><span class="mw-editsection" data-dcnode-id="6203"><span class="mw-editsection-bracket" data-dcnode-id="6208"><span data-dcnode-id="6209" instrument_node="">[</span></span><a data-dcnode-id="6206" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D45" title="Edit section: The 1970s onwards"><span data-dcnode-id="6207" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6204"><span data-dcnode-id="6205" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6201" instrument_node="">
</span><link data-dcnode-id="6200" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6196" role="note"><span data-dcnode-id="6199" instrument_node="">Main article: </span><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25A9tente" title="Détente"><span data-dcnode-id="6198" instrument_node="">Détente</span></a></div><span data-dcnode-id="6195" instrument_node="">
</span><p data-dcnode-id="6171"><span data-dcnode-id="6194" instrument_node="">In the 1970s, the Soviet Union achieved rough nuclear parity with the United States, and surpassed it by the end of that decade with the deployment of the </span><a class="mw-redirect" data-dcnode-id="6192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SS-18" title="SS-18"><span data-dcnode-id="6193" instrument_node="">SS-18</span></a><span data-dcnode-id="6191" instrument_node=""> missile. It perceived its own involvement as essential to the solution of any major international problem. Meanwhile, the </span><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cold_War" title="Cold War"><span data-dcnode-id="6190" instrument_node="">Cold War</span></a><span data-dcnode-id="6188" instrument_node=""> gave way to </span><i data-dcnode-id="6185"><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/D%25C3%25A9tente" title="Détente"><span data-dcnode-id="6187" instrument_node="">Détente</span></a></i><span data-dcnode-id="6184" instrument_node=""> and a more complicated pattern of international relations in which the world was no longer clearly split into two clearly opposed blocs. Less powerful countries had more room to assert their independence, and the two superpowers were partially able to recognize their common interest in trying to check the further spread and proliferation of nuclear weapons (</span><i data-dcnode-id="6182"><span data-dcnode-id="6183" instrument_node="">see</span></i><span data-dcnode-id="6181" instrument_node=""> </span><a class="mw-redirect" data-dcnode-id="6179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SALT_I" title="SALT I"><span data-dcnode-id="6180" instrument_node="">SALT I</span></a><span data-dcnode-id="6178" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/SALT_II" title="SALT II"><span data-dcnode-id="6177" instrument_node="">SALT II</span></a><span data-dcnode-id="6175" instrument_node="">, </span><a data-dcnode-id="6173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-Ballistic_Missile_Treaty" title="Anti-Ballistic Missile Treaty"><span data-dcnode-id="6174" instrument_node="">Anti-Ballistic Missile Treaty</span></a><span data-dcnode-id="6172" instrument_node="">).
</span></p><span data-dcnode-id="6170" instrument_node="">
</span><div class="thumb tleft" data-dcnode-id="6147"><div class="thumbinner" data-dcnode-id="6148" style="width:202px;"><a class="image" data-dcnode-id="6168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFord_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg"><img alt="" class="thumbimage" data-dcnode-id="6169" data-file-height="2400" data-file-width="3527" decoding="async" height="136" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/d/da/Ford_signing_accord_with_Brehznev%252C_November_24%252C_1974.jpg/200px-Ford_signing_accord_with_Brehznev%252C_November_24%252C_1974.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/d/da/Ford_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg/300px-Ford_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/d/da/Ford_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg/400px-Ford_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg 2x" width="200"></a><span data-dcnode-id="6167" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6149"><div class="magnify" data-dcnode-id="6165"><a class="internal" data-dcnode-id="6166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AFord_signing_accord_with_Brehznev%2C_November_24%2C_1974.jpg" title="Enlarge"></a></div><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leonid_Brezhnev" title="Leonid Brezhnev"><span data-dcnode-id="6164" instrument_node="">Leonid Brezhnev</span></a><span data-dcnode-id="6162" instrument_node=""> meets with </span><a data-dcnode-id="6160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gerald_Ford" title="Gerald Ford"><span data-dcnode-id="6161" instrument_node="">Gerald Ford</span></a><span data-dcnode-id="6159" instrument_node=""> in </span><a data-dcnode-id="6157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vladivostok" title="Vladivostok"><span data-dcnode-id="6158" instrument_node="">Vladivostok</span></a><span data-dcnode-id="6156" instrument_node=""> in November 1974 to sign a joint </span><a class="mw-redirect" data-dcnode-id="6154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Communiqu%25C3%25A9" title="Communiqué"><span data-dcnode-id="6155" instrument_node="">communiqué</span></a><span data-dcnode-id="6153" instrument_node=""> on the </span><a data-dcnode-id="6151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Strategic_Arms_Limitation_Talks" title="Strategic Arms Limitation Talks"><span data-dcnode-id="6152" instrument_node="">SALT</span></a><span data-dcnode-id="6150" instrument_node=""> treaty.</span></div></div></div><span data-dcnode-id="6146" instrument_node="">
</span><p data-dcnode-id="6141"><span data-dcnode-id="6145" instrument_node="">Elsewhere the Soviet Union had concluded friendship and cooperation treaties with a number of states in the non-communist world, especially among Third World and </span><a data-dcnode-id="6143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Non-Aligned_Movement" title="Non-Aligned Movement"><span data-dcnode-id="6144" instrument_node="">Non-Aligned Movement</span></a><span data-dcnode-id="6142" instrument_node=""> states. Notwithstanding some ideological obstacles, Moscow advanced state interests by gaining military footholds in strategically important areas throughout the Third World. Furthermore, the USSR continued to provide military aid for revolutionary movements in the Third World. For all these reasons, Soviet foreign policy was of major importance to the non-communist world and helped determine the tenor of international relations.
</span></p><p data-dcnode-id="6136"><span data-dcnode-id="6140" instrument_node="">Although myriad bureaucracies were involved in the formation and execution of Soviet foreign policy, the major policy guidelines were determined by the Politburo of the </span><a class="mw-redirect" data-dcnode-id="6138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CPSU" title="CPSU"><span data-dcnode-id="6139" instrument_node="">Communist Party</span></a><span data-dcnode-id="6137" instrument_node="">. The foremost objectives of Soviet foreign policy had been the maintenance and enhancement of national security and the maintenance of hegemony over Eastern Europe. Relations with the United States and Western Europe were also of major concern to Soviet foreign policy makers and, much as with the United States, relations with individual Third World states were at least partly determined by the proximity of each state to the border and to estimates of strategic significance.
</span></p><span data-dcnode-id="6135" instrument_node="">
</span><h2 data-dcnode-id="6125"><span class="mw-headline" data-dcnode-id="6133" id="Gorbachev_and_after"><span data-dcnode-id="6134" instrument_node="">Gorbachev and after</span></span><span class="mw-editsection" data-dcnode-id="6126"><span class="mw-editsection-bracket" data-dcnode-id="6131"><span data-dcnode-id="6132" instrument_node="">[</span></span><a data-dcnode-id="6129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DForeign_relations_of_the_Soviet_Union%26action%3Dedit%26section%3D46" title="Edit section: Gorbachev and after"><span data-dcnode-id="6130" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6127"><span data-dcnode-id="6128" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6124" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6109"><div class="thumbinner" data-dcnode-id="6110" style="width:192px;"><a class="image" data-dcnode-id="6122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg"><img alt="" class="thumbimage" data-dcnode-id="6123" data-file-height="4000" data-file-width="2663" decoding="async" height="285" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg/190px-President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/6/6b/President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg/285px-President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/6/6b/President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg/380px-President_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg 2x" width="190"></a><span data-dcnode-id="6121" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6111"><div class="magnify" data-dcnode-id="6119"><a class="internal" data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3APresident_Ronald_Reagan_and_Soviet_General_Secretary_Mikhail_Gorbachev_in_Red_Square_during_the_Moscow_Summit.jpg" title="Enlarge"></a></div><span data-dcnode-id="6118" instrument_node="">Gorbachev and </span><a data-dcnode-id="6116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ronald_Reagan" title="Ronald Reagan"><span data-dcnode-id="6117" instrument_node="">Reagan</span></a><span data-dcnode-id="6115" instrument_node=""> in Moscow during the </span><a data-dcnode-id="6113" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Moscow_Summit_%281988%29" title="Moscow Summit (1988)"><span data-dcnode-id="6114" instrument_node="">Moscow Summit</span></a><span data-dcnode-id="6112" instrument_node="">, 31 May 1988</span></div></div></div><span data-dcnode-id="6108" instrument_node="">
</span><p data-dcnode-id="6088"><span data-dcnode-id="6107" instrument_node="">When </span><a data-dcnode-id="6105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mikhail_Gorbachev" title="Mikhail Gorbachev"><span data-dcnode-id="6106" instrument_node="">Mikhail Gorbachev</span></a><span data-dcnode-id="6104" instrument_node=""> succeeded </span><a data-dcnode-id="6102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Konstantin_Chernenko" title="Konstantin Chernenko"><span data-dcnode-id="6103" instrument_node="">Konstantin Chernenko</span></a><span data-dcnode-id="6101" instrument_node=""> as General Secretary of the Communist Party in 1985, it signaled a dramatic change in Soviet foreign policy. Gorbachev put forth the doctrine of "</span><a data-dcnode-id="6099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_political_thinking" title="New political thinking"><span data-dcnode-id="6100" instrument_node="">new political thinking</span></a><span data-dcnode-id="6098" instrument_node="">", which in part pursued conciliatory policies toward the West instead of maintaining the Cold War status quo. The USSR exited Afghanistan, signed strategic arms reduction treaties with the United States. It did not attempt to stop the successful effort of all the East European satellite nations to declare their independence and expel the Communist leadership, 
issues about the status and borders of Germany were addressed in 1990, when the Soviet Union, along with the US, Britain and France, signed a </span><a data-dcnode-id="6096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Treaty_on_the_Final_Settlement_with_Respect_to_Germany" title="Treaty on the Final Settlement with Respect to Germany"><span data-dcnode-id="6097" instrument_node="">treaty on German reunification</span></a><span data-dcnode-id="6095" instrument_node=""> with the two German governments. After extensive negotiations, West Germany absorbed East Germany, with large cash payments made to Moscow. After the final dissolution of the Soviet Union on December 26, 1991, </span><a data-dcnode-id="6093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Russia" title="Russia"><span data-dcnode-id="6094" instrument_node="">Russia</span></a><span data-dcnode-id="6092" instrument_node=""> became the legal successor to the Soviet Union on the international stage, and in terms of treaties and agreements. Under </span><a data-dcnode-id="6090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Boris_Yeltsin" title="Boris Yeltsin"><span data-dcnode-id="6091" instrument_node="">Boris Yeltsin</span></a><span data-dcnode-id="6089" instrument_node="">, Russian foreign policy repudiated Marxism–Leninism as a guide to action, soliciting Western support for capitalist reforms in post-Soviet Russia.
</span></p><span data-dcnode-id="6087" instrument_node="">
