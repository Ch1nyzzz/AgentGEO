</span><h1 class="title" data-dcnode-id="464" id="page-title"><span data-dcnode-id="465" instrument_node="">What Is Economic Diplomacy and How Does It Work?</span></h1><span data-dcnode-id="463" instrument_node=""> </span><div class="tabs" data-dcnode-id="462"></div><span data-dcnode-id="461" instrument_node=""> </span></div><span data-dcnode-id="459" instrument_node="">
</span></div><span data-dcnode-id="457" instrument_node="">
</span><div class="row" data-dcnode-id="163"><span data-dcnode-id="456" instrument_node="">
</span><div class="col-sm-9" data-dcnode-id="284"><span data-dcnode-id="455" instrument_node="">
</span><div class="main-content-wrapper" data-dcnode-id="286"><span data-dcnode-id="454" instrument_node="">
</span><div class="region region-content" data-dcnode-id="288"><span data-dcnode-id="453" instrument_node="">
</span><div class="block block-system" data-dcnode-id="290" id="block-system-main"><span data-dcnode-id="452" instrument_node="">
</span><div class="content" data-dcnode-id="292"><span data-dcnode-id="451" instrument_node="">
</span><div about="/what-economic-diplomacy-and-how-does-it-work" class="node node-page clearfix" data-dcnode-id="294" id="node-33739" typeof="sioc:Item foaf:Document"><span data-dcnode-id="450" instrument_node="">
</span><span class="rdf-meta element-hidden" content="What Is Economic Diplomacy and How Does It Work?" data-dcnode-id="449" property="dc:title"></span><span data-dcnode-id="448" instrument_node="">
</span><div class="content" data-dcnode-id="296"><span data-dcnode-id="447" instrument_node="">
</span><div class="field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="298"><div class="field-items" data-dcnode-id="299"><div class="field-item even" data-dcnode-id="300" property="content:encoded"><div class="breadcrumb" data-dcnode-id="438"><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afsa.org/foreign-service-journal"><span data-dcnode-id="446" instrument_node="">The Foreign Service Journal</span></a><span data-dcnode-id="444" instrument_node=""> &gt; </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afsa.org/foreign-service-journal-januaryfebruary2019"><span data-dcnode-id="443" instrument_node="">January/February 2019</span></a><span data-dcnode-id="441" instrument_node=""> &gt; </span><a class="active" data-dcnode-id="439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afsa.org/what-economic-diplomacy-and-how-does-it-work"><span data-dcnode-id="440" instrument_node="">What Is Economic Diplomacy and How Does It Work?</span></a></div><span data-dcnode-id="437" instrument_node="">
</span><p class="introText" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">The U.S. Foreign Service is at the forefront of crafting policy and carrying out economic diplomacy to advance the strategic and security interests of the United States.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">BY TONY WAYNE</span></p><span data-dcnode-id="431" instrument_node="">
</span><div class="img350pxRight" data-dcnode-id="424" style="margin-bottom: 6px;"><img data-dcnode-id="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afsa.org/sites/default/files/fsj2019janFeb_01_img01.jpg&amp;raw"><br data-dcnode-id="429"><span data-dcnode-id="428" instrument_node="">
FSO Tony Wayne, at right, speaks with OECD Secretary General Angel Gurria about efforts to enhance the antibribery convention and other topics on the agenda at the May 2006 OECD ministerial meeting.</span><br data-dcnode-id="427"><span data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Courtesy of Tony Wayne</span></span></div><span data-dcnode-id="423" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">Economic statecraft and economic diplomacy involve using diplomatic skills with economic tools to advance a country’s economic, political and strategic goals. The overarching economic statecraft and the day-to-day economic diplomacy are enormously important parts of the United States’ international policy. Getting this right can provide a huge boost, just as getting it wrong can be very costly.</span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Economic statecraft and diplomacy are much broader than support for sales from U.S. farms and businesses overseas or support for the investments Americans make in other countries, as important as that work is for America’s prosperity. They include the use of economic sanctions to punish or deter bad actors in the world, ranging from terrorist financiers and drug smugglers to corrupt officials. They involve mobilizing international assistance and financing for partner countries emerging from conflicts or natural disasters. They involve building support to set and enforce international rules and norms so that corruption and bribery are less acceptable, for example, or to make trade in “conflict diamonds” and other smuggled minerals more difficult, or to facilitate international air transportation or telecommunications (think internet and cell phone) connectivity.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Economic statecraft forges policies to decide which countries merit U.S. financial and development assistance, how much and under what conditions. Then U.S. economic diplomacy negotiates agreements with host governments for effective use of that aid and, very importantly, works to assure effective implementation of aid and reform programs.</span></p><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Economic diplomacy includes building international coalitions to help countries recover from financial crises. It entails convincing host-government leaders to apply the policies and measures most likely to strengthen their economies and provide jobs for their people, even if the reforms have political costs.</span></p><span data-dcnode-id="411" instrument_node="">
</span><blockquote data-dcnode-id="408"><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Economic statecraft and diplomacy are much broader than support for sales from U.S. farms and businesses overseas or support for the investments Americans make in other countries.</span></p></blockquote><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">In all these areas, the U.S. Foreign Service is at the forefront of crafting policy and carrying out economic diplomacy for the good of the United States. The Foreign Service, and our Civil Service colleagues in the foreign affairs agencies, work with partners at Treasury, Commerce, the Office of the U.S. Trade Representative, Defense and other agencies to develop, implement and hone these approaches. In Washington, D.C., as well as overseas, Foreign Service officers are essential players in creating strategies, in winning agreement from partners and building international coalitions, and in implementing policies and programs to achieve good outcomes in other countries and regions. The Foreign Service brings unparalleled international knowledge and experience to the table in Washington that regularly help focus, refine and implement U.S. policies.</span></p><span data-dcnode-id="404" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">The United States has long practiced economic statecraft to open markets for U.S. goods and services and to boost global prosperity and stability, but over the last two decades increasing attention has been given to the added sway gained by using economic tools and diplomacy in a systematic, strategic way to support partners, to change or punish harmful behavior and to win support for U.S. international priorities. This is even more essential in a world where economic competition is increasingly fierce and not always fair, and where other governments may have much more influence in economic areas than they have in the military or other spheres. China’s growing international clout and its aggressive economic diplomacy is one example that highlights the urgent need for effective, multipronged economic statecraft by the United States.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">In this issue of The Foreign Service Journal, you will find outstanding examples of U.S. Foreign Service officers carrying out economic diplomacy as part of America’s broader foreign policy. I have seen this work flourish firsthand in Mexico, Europe, Afghanistan and Argentina. The emblematic cases that follow, drawn from my time as assistant secretary for the Bureau of Economic and Business Affairs (EB) from 2000 to 2006, illustrate the importance of Foreign Service networks and partnerships in Washington, D.C., and overseas.</span></p><span data-dcnode-id="398" instrument_node="">
</span><h2 data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">The Problem of Terrorist Financing</span></h2><span data-dcnode-id="395" instrument_node="">
</span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">On Sept. 11, 2001, I was traveling with Secretary of State Colin Powell in Lima, Peru, where, among other objectives, we were exploring with Peru’s president how the United States could use its economic tools to support that newly re-emerged democracy. This mission was disrupted by that day’s terrorist attacks. On the flight home and then with my colleagues in EB, we searched for ways the economic team at State could help define and build a strong international response to that attack.</span></p><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Previously several of us had worked to hone and strengthen the use of international economic sanctions as a tool of diplomacy, including working through differences with European partners. We had learned that a sanction approved by the United Nations Security Council under Chapter VII of the U.N. Charter had the force of law in many other countries. We suggested pursuing a U.N. Security Council resolution focused on sanctioning financial and other support for terrorism as an initial step.</span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">With approval from State Department leadership and the White House, we partnered with the Bureau of International Organization Affairs and the U.S. Mission to the U.N. to write and present a draft resolution; within a few days, the U.N. Security Council passed Resolution 1373. It was to become the “go to” international framework for stifling terrorist financing.</span></p><span data-dcnode-id="386" instrument_node="">
</span><blockquote data-dcnode-id="383"><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Economic officers have worked hard to ensure that the international growth of the internet and high tech supports America’s economic interests, as well as its commitment to the free flow of information.</span></p></blockquote><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">However, passing that resolution was just the start. We in EB partnered with the National Security Council, Treasury and the intelligence and law enforcement communities to craft a U.S. executive order along the same lines. Then, with partners in other State Department bureaus and in embassies around the world, we set out to build an international coalition to implement the U.N. resolution. We worked to persuade governments to change their own laws and practices to outlaw terrorist financing, to freeze assets and to build international partnerships so that even initially hesitant governments were willing to join the United States in “designating” individuals, nongovernmental organizations (NGOs), charities and banks who were helping fund terrorism.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">This was a long, hard process. In Washington, we had to forge interagency agreement on targets and tactics. Then our embassy teams had to persuade host governments to join in the effort. The debates in Washington were often intense, but Foreign Service expertise helped win interagency consensus on how to most effectively build an international coalition and win support in every part of the world.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">At State, as part of the process, EB hosted weekly interagency meetings that included all geographic bureaus to define the way forward and to coordinate work among embassies. In the months and years that followed, the United States rallied many countries to join the effort. They designated scores of entities for sanctions, froze more than a hundred million dollars in funds and assets, and made it much harder for others to fund terrorists. Each freeze was implemented globally within 48 hours. In a December 2005 report, the 9/11 Public Discourse Project, an NGO formed by some members of the 9/11 Commission to ensure implementation of the commission’s recommendations, identified the EB-led effort against terrorist financing as the most effective anti-terrorist work to date (giving it a grade of A-). Much of that success was fueled and steered by Foreign Service officers.</span></p><span data-dcnode-id="373" instrument_node="">
</span><h2 data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Support for Economic Reform, Reconstruction and Rebuilding</span></h2><span data-dcnode-id="370" instrument_node="">
</span><div class="img350pxRight" data-dcnode-id="363" style="margin-bottom: 6px;"><img data-dcnode-id="369" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//afsa.org/sites/default/files/fsj2019janFeb_01_img02.jpg&amp;raw"><br data-dcnode-id="368"><span data-dcnode-id="367" instrument_node="">
At a meeting of the Brazil Chamber of Commerce in São Paulo in April 2006, FSO Tony Wayne, third from left, encourages more U.S.-Brazil trade and commerce.</span><br data-dcnode-id="366"><span data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Courtesy of Tony Wayne</span></span></div><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Interestingly, the second highest score given by that same 2005 report on 9/11 recommendations was a “B+” for policies supporting economic reform in the regions of concern. In the fall of 2001, as EB began to work on blocking terrorist financing, it also began a concerted effort to develop initial economic support and reform packages for countries from Turkey to Pakistan that would be affected by the repercussions of the 9/11 attacks. In this EB worked closely with the relevant State geographic bureaus, as well as with USAID, Treasury, USTR, the NSC and, eventually, the international finance institutions.</span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">One priority focus was Afghanistan, thinking through and building international support for economic and other nonmilitary assistance for that country following the initial military actions against the Taliban regime and al-Qaida. EB stepped into the breach to lead efforts to organize three international donor conferences focused on Afghanistan. In coordination with State regional bureaus, the EB team worked with the U.N. Development Program and the World Bank, as well as with Japan, the European Union and the Persian Gulf countries.</span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">This was an intensive effort. For weeks during the run-up to the first Tokyo donors conference on Afghanistan, for example, we held twice-daily phone calls with the Japanese and other key sponsors to develop what became an internationally agreed-upon framework for assistance needs, to rally initial aid pledges and to achieve the return of Afghan assets from around the world to help the fledgling government in Kabul. The initial conferences were considered a success, and the focus shifted correctly to work on the ground in Afghanistan.</span></p><span data-dcnode-id="353" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">The Afghanistan conferences were precursors to subsequent, equally intense international reconstruction efforts led out of EB to help revive Iraq’s economy after toppling Saddam Hussein, to rebuild severely damaged parts of Southeast and South Asia after the 2004 tsunami and to support recovery from the terrible 2005 earthquake in Pakistan. In each of these cases, the economic teams at State, USAID and at our embassies around the world were essential in constructing international coalitions and mobilizing many billions of dollars in aid to help key partners. These efforts all included the nitty-gritty work of interagency decision-making in Washington; initiating frequent outreach to other governments, NGOs and businesses to build agreement; organizing successful gatherings overseas; and beginning the complex work of delivering aid, as well as trying to encourage best practices in recipient countries. This was economic diplomacy in vigorous action, with the Foreign Service front and center.</span></p><span data-dcnode-id="350" instrument_node="">
</span><blockquote data-dcnode-id="347"><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">The debates in Washington were often intense, but Foreign Service expertise helped win interagency consensus on how to most effectively build an international coalition to staunch terrorist financing.</span></p></blockquote><span data-dcnode-id="346" instrument_node="">
</span><h2 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">A Vast Array of Economic Diplomacy Issues</span></h2><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Beyond these striking examples, the EB team used its partnerships among State, U.S. embassies and U.S. agency colleagues daily across a host of issues during these years. This work included helping to ensure U.S. and global energy security via sufficient oil production in the Persian Gulf; the development of new oil deposits in the Caspian region, Africa and elsewhere; and helping bring renewable and other alternative energy sources into play for the European Union and others. The work involved organizing demarches by our embassies to change specific unfair practices vis-á-vis U.S. intellectual property in economies around the world, from Canada to Taiwan to Argentina. The work included building a new model for development assistance with the creation of the Millennium Challenge Corporation and a consensus on new development strategies among the Group of 8 countries. It entailed helping to engineer effective debt relief in Africa, for example, and getting our closest European partners to implement their anti-bribery commitments to level the field for U.S. companies and to reinforce good governance.</span></p><span data-dcnode-id="340" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">These efforts also included vastly expanding the number of Open Skies agreements around the world to support travel and tourism. Economic officers have worked hard to ensure that the international growth of the internet and high tech supports America’s economic interests as well as its commitment to the free flow of information. Also important was the invaluable work done to support many trade negotiations, specific commercial disputes and important sales opportunities for U.S. companies in different countries. In scores of instances, Foreign Service officers in Washington and overseas were essential to achieving good outcomes. And this vital work continues.</span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">The United States needs well-crafted and skillfully implemented economic statecraft for its prosperity and security. It needs effective day-to-day economic diplomacy by its Foreign Service officers to ensure that America’s statecraft achieves the best for our country.</span></p><span data-dcnode-id="334" instrument_node="">
</span><div class="authorBio" data-dcnode-id="325"><span data-dcnode-id="333" instrument_node="">

</span><p class="lastPara" data-dcnode-id="327"><em data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">Earl Anthony “Tony” Wayne retired from the Foreign Service as a Career Ambassador in 2015. He served as ambassador to Mexico and Argentina, deputy ambassador in Afghanistan, principal deputy assistant secretary in the Bureau of European and Eurasian Affairs and assistant secretary of State for economic and business affairs, among other positions. He is a member of the 2017-2019 AFSA Governing Board and serves as the association’s treasurer.</span></em></p><span data-dcnode-id="326" instrument_node="">
