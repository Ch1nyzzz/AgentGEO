</span><h1 data-dcnode-id="862"><font color="blue" data-dcnode-id="863" size="+2"><b data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">What Is GIS?</span></b></font></h1><span data-dcnode-id="861" instrument_node="">
</span><span data-dcnode-id="859" instrument_node="">
</span><span data-dcnode-id="857" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5311970143945864" data-ad-slot="5846466956" data-dcnode-id="856" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="855" instrument_node="">
</span><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">
</span></p><center data-dcnode-id="848"><img alt="GIS Map Themes" border="1" data-dcnode-id="849" height="171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/images/xwhat-is-gis-300x171.gif.pagespeed.ic.nisLWgJlbX.png&amp;raw" width="300"></center><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="846" instrument_node="">
</span><img data-dcnode-id="845" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="844" instrument_node="">
Maps have been used for thousands of years, but it is only within the last few decades that the technology has existed to combine maps with computer graphics and databases to create geographic information systems or GIS. The themes in the above graphic are only a small example of the wide array of information that can view or analyze with a GIS.
</span></p><p data-dcnode-id="839"><span data-dcnode-id="842" instrument_node="">
</span><font color="#787878" data-dcnode-id="840" face="Verdana,Arial,Helvetica" size="-2"><span data-dcnode-id="841" instrument_node="">Sponsors</span></font></p><p data-dcnode-id="828"><span data-dcnode-id="838" instrument_node="">
</span><span data-dcnode-id="836" instrument_node="">
</span><span data-dcnode-id="834" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-5311970143945864" data-ad-slot="5846466956" data-dcnode-id="833" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="832" instrument_node="">
</span><span data-dcnode-id="829" instrument_node="">
</span></p><p data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">
</span><img data-dcnode-id="826" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="825" instrument_node="">
GIS is used to display and analyze spatial data which are tied to databases. This connection is what gives GIS its power: maps can be drawn from the database and data can be referenced from the maps. When a database is updated, the associated map can be updated as well. GIS databases include a wide variety of information including: geographic, social, political, environmental, and demographic.
</span></p><p data-dcnode-id="820"><span data-dcnode-id="823" instrument_node="">
</span><img data-dcnode-id="822" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="821" instrument_node="">
GIS uses layers, called "themes," to overlay different types of information, much as some static maps use mylar overlays to add tiers of information to a geographic background. Each theme represents a category of information, such as roads or forest cover. As with the old mylar maps, the layers which are underneath remain visible while additional themes are placed above.
</span></p><p data-dcnode-id="798"><span data-dcnode-id="819" instrument_node="">
</span><img data-dcnode-id="818" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="817" instrument_node="">
With the belief that these sophisticated technologies should not be the province of a privileged few, Mapcruzin provides </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/free_gis.htm"><span data-dcnode-id="816" instrument_node="">free GIS resources</span></a><span data-dcnode-id="814" instrument_node="">, </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/download_mapcruz.htm"><span data-dcnode-id="813" instrument_node="">free GIS maps</span></a><span data-dcnode-id="811" instrument_node="">, a </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/learn_to_map/"><span data-dcnode-id="810" instrument_node="">free GIS tutorial</span></a><span data-dcnode-id="808" instrument_node=""> that uses a free gis program, and several low cost products, including our  </span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/geography_of_risk/fed_lands.htm"><span data-dcnode-id="807" instrument_node="">Indian and Federal Lands Maps</span></a><span data-dcnode-id="805" instrument_node="">, </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//downloadamap.com/"><span data-dcnode-id="804" instrument_node="">Toxic Facilities Maps</span></a><span data-dcnode-id="802" instrument_node=""> (now FREE also). Also, check our </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/gis-terms.htm"><span data-dcnode-id="801" instrument_node="">GIS Explained</span></a><span data-dcnode-id="799" instrument_node=""> page to learn more about the terminology of GIS and digital mapping.
</span></p><p data-dcnode-id="793"><span data-dcnode-id="797" instrument_node="">

Adapted from: </span><a data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.inforain.org/about_gis.htm"><span data-dcnode-id="796" instrument_node="">InfoRain</span></a><span data-dcnode-id="794" instrument_node="">
</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">
</span></p><hr data-dcnode-id="790" size="1" width="90%"><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">
</span></p><h3 data-dcnode-id="783"><font color="blue" data-dcnode-id="784"><b data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">How GIS Works</span></b></font></h3><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="781" instrument_node="">
</span><img data-dcnode-id="780" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="779" instrument_node="">
It is estimated that approximately 80% of all information has a "spatial" or geographic component. In other words, most information is tied to a place. So when making decisions about siting new facilities, creating hiking trails, protecting wetlands, directing emergency response vehicles, designating historic neighborhoods or redrawing legislative districts, geography plays a significant role.
</span></p><p data-dcnode-id="774"><span data-dcnode-id="777" instrument_node="">
</span><img data-dcnode-id="776" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="775" instrument_node="">
This is where GIS comes in. Geographic Information Systems (GIS) technology is a computer-based data collection, storage, and analysis tool that combines previously unrelated information into easily understood maps. But GIS is much more than maps. A GIS can perform complicated analytical functions and then present the results visually as maps, tables or graphs, allowing decision-makers to virtually see the issues before them and then select the best course of action.
</span></p><p data-dcnode-id="770"><span data-dcnode-id="773" instrument_node="">
</span><img data-dcnode-id="772" hspace="8" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mapcruzin.com/xdot.gif.pagespeed.ic.jAVPhXi7CK.png&amp;raw" vspace="0"><span data-dcnode-id="771" instrument_node="">
Add the Internet, and GIS offers a consistent and cost-effective means for the sharing and analysis of geographic data among government agencies, private industry, non-profit organizations, and the general public. 
</span></p><p data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">

Source: </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.state.nj.us/ogis/gis_works.html%2520New%2520Jersey%2520State"><span data-dcnode-id="768" instrument_node="">New Jersey State</span></a><span data-dcnode-id="766" instrument_node="">
