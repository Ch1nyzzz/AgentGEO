</span><main data-dcnode-id="253"><span data-dcnode-id="548" instrument_node="">
</span><article class="single-post" data-dcnode-id="255"><span data-dcnode-id="547" instrument_node="">
</span><header class="post-header" data-dcnode-id="524"><span data-dcnode-id="546" instrument_node=""> </span><p class="the-overline" data-dcnode-id="543"><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdt.org/area-of-focus/government-surveillance/"><span data-dcnode-id="545" instrument_node="">Government Surveillance</span></a></p><span data-dcnode-id="542" instrument_node=""> </span><h1 class="the-title" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Section 702: What It Is &amp; How It Works</span></h1><span data-dcnode-id="539" instrument_node=""> </span><p class="post-meta" data-dcnode-id="526"><span data-dcnode-id="538" instrument_node=""> </span><time class="the-date" data-dcnode-id="536" datetime="2017-02-15T10:10:08-05:00"><span data-dcnode-id="537" instrument_node="">February 15, 2017</span></time><span data-dcnode-id="535" instrument_node=""> </span><span class="separator" data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">/</span></span><span data-dcnode-id="532" instrument_node=""> </span><span class="the-byline" data-dcnode-id="528"><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdt.org/staff/greg-nojeim/"><span data-dcnode-id="531" instrument_node="">Greg Nojeim</span></a><span data-dcnode-id="529" instrument_node="">
</span></span><span data-dcnode-id="527" instrument_node="">
</span></p><span data-dcnode-id="525" instrument_node="">
</span></header><span data-dcnode-id="523" instrument_node=""> </span><section class="the-outer-content" data-dcnode-id="320"><span data-dcnode-id="522" instrument_node=""> </span><div class="the-content wysiwyg" data-dcnode-id="385"><p data-dcnode-id="511"><strong data-dcnode-id="519"><u data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">What Is It?</span></u></strong><span data-dcnode-id="518" instrument_node=""> Section 702 of the Foreign Intelligence Surveillance Act (FISA) is a statute that authorizes </span><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">the collection, use, and dissemination of electronic communications content</span></strong><span data-dcnode-id="515" instrument_node=""> stored by U.S. internet service providers (such as Google, Facebook, and Microsoft) or traveling across the internet’s “backbone” (with the compelled assistance of U.S. telecom providers such as AT&amp;T and Verizon). Section 702 sunsets on </span><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">December 31, 2017</span></strong><span data-dcnode-id="512" instrument_node="">.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="496"><strong data-dcnode-id="507"><u data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Are There Any Restrictions?</span></u></strong><span data-dcnode-id="506" instrument_node=""> Unlike “traditional” FISA surveillance, Section 702 does not require that the surveillance target be a suspected terrorist, spy, or other agent of a foreign power. Section 702 only requires that the targets be </span><strong data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">non-U.S. persons located abroad</span></strong><span data-dcnode-id="503" instrument_node="">, and that a </span><strong data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">“significant purpose” </span></strong><span data-dcnode-id="500" instrument_node="">of the surveillance be to obtain “foreign intelligence information” (the </span><em data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">primary</span></em><span data-dcnode-id="497" instrument_node=""> purpose of the surveillance can be something else entirely).</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="491"><strong data-dcnode-id="492"><u data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">How Does Section 702 Work?</span></u></strong></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="474"><strong data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">1) Certification</span></strong><span data-dcnode-id="487" instrument_node="">: On an annual basis, the Attorney General and Director of National Intelligence make “certifications” authorizing 702 surveillance programs and submit these certifications to the Foreign Intelligence Surveillance Court (FISC) for approval. These certifications 1) identify </span><strong data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">categories of foreign intelligence information</span></strong><span data-dcnode-id="484" instrument_node=""> to be gathered, 2) contain </span><strong data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Targeting Procedures</span></strong><span data-dcnode-id="481" instrument_node=""> and the </span><strong data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Minimization Procedures</span></strong><span data-dcnode-id="478" instrument_node=""> approved by the AG that are meant to ensure 702 acquisition is limited to non-U.S. persons abroad, 3) attest that the targeting and minimization procedures and additional guidelines adopted to ensure compliance are consistent with the Fourth Amendment, 4) attest that a </span><strong data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">“significant purpose”</span></strong><span data-dcnode-id="475" instrument_node=""> of the program is to obtain foreign intelligence information, 5) attest that the program uses a U.S. electronic communications service provider, and 6) attest that the program complies with the limitations spelled out by the statute.</span></p><span data-dcnode-id="473" instrument_node="">
</span><ul data-dcnode-id="465"><span data-dcnode-id="472" instrument_node="">
</span><li data-dcnode-id="467"><span data-dcnode-id="471" instrument_node="">If all the certification elements are present and the minimum requirements of the targeting and minimization procedures are met, the FISC </span><em data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">must </span></em><span data-dcnode-id="468" instrument_node="">approve the 702 surveillance program. The FISC plays no role in making the actual targeting decisions (such decisions are made by the NSA, with “nominations” from the CIA and FBI).</span></li><span data-dcnode-id="466" instrument_node="">
</span></ul><span data-dcnode-id="464" instrument_node="">
</span><p data-dcnode-id="458"><strong data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">2) Acquisition</span></strong><span data-dcnode-id="461" instrument_node="">: </span><em data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">There are currently two known forms of 702 collection:</span></em></p><span data-dcnode-id="457" instrument_node="">
</span><ul data-dcnode-id="439"><span data-dcnode-id="456" instrument_node="">
</span><li data-dcnode-id="449"><strong data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">PRISM</span></strong><span data-dcnode-id="453" instrument_node=""> collection: the government collects all communications content </span><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">to or from</span></strong><span data-dcnode-id="450" instrument_node=""> a targeted selector (such as an email address) directly from U.S.-based electronic communications service providers (such as Apple or Google). The NSA receives all raw (unminimized) PRISM-collected information and may also send such raw data to the CIA and FBI.</span></li><span data-dcnode-id="448" instrument_node="">
</span><li data-dcnode-id="441"><strong data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Upstream</span></strong><span data-dcnode-id="445" instrument_node=""> collection: the government collects all internet transactions that contain communications </span><strong data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">to, from, or “about”</span></strong><span data-dcnode-id="442" instrument_node=""> a targeted selector as the transactions flow through network gateways controlled by U.S.-based providers. Only the NSA may receive raw Upstream-collected information, but it may send such information to the CIA and FBI once it has gone through the NSA’s minimization process.</span></li><span data-dcnode-id="440" instrument_node="">
</span></ul><span data-dcnode-id="438" instrument_node="">
</span><p data-dcnode-id="434"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">3) Querying and Use in Criminal Cases</span></strong><span data-dcnode-id="435" instrument_node="">:</span></p><span data-dcnode-id="433" instrument_node="">
</span><ul data-dcnode-id="404"><span data-dcnode-id="432" instrument_node="">
</span><li data-dcnode-id="428"><strong data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Querying 702 Information in Government Databases</span></strong><span data-dcnode-id="429" instrument_node="">: The NSA, CIA, and FBI are permitted to query 702-acquired information by using a variety of search terms. Each individual agency’s own minimization procedures limit the search terms that analysts can use. However, it is unclear how these policies are enforced.</span></li><span data-dcnode-id="427" instrument_node="">
</span><li data-dcnode-id="420"><strong data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">The Backdoor Search Loophole</span></strong><span data-dcnode-id="424" instrument_node="">: The NSA, CIA, and FBI are all permitted to search 702-acquired information with U.S. person identifiers (such as names or addresses). Critics have dubbed this the “backdoor search” loophole, because it enables the government to obtain information that would have otherwise required a warrant. Today, the NSA and CIA can only query 702-gathered information with a U.S. person identifier after creating a “statement of facts showing that a query is reasonably likely to return foreign intelligence information.” However, </span><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">this restriction does not apply to the FBI</span></strong><span data-dcnode-id="421" instrument_node="">.</span></li><span data-dcnode-id="419" instrument_node="">
</span><li data-dcnode-id="406"><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Use in Criminal Court</span></strong><span data-dcnode-id="416" instrument_node="">: 702-acquired information </span><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">may be used as evidence against U.S. persons in criminal court</span></strong><span data-dcnode-id="413" instrument_node=""> for certain broad categories of “serious crimes.” For investigations that do not fall into one of those categories, there is no restriction on using 702-acquired information to obtain other evidence that </span><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">can</span></em><span data-dcnode-id="410" instrument_node=""> be used in court. The use of information gathered under 702 without a warrant against U.S. persons creates an </span><strong data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">end-run around the Fourth Amendment</span></strong><span data-dcnode-id="407" instrument_node="">, which requires a probable cause finding by an independent body.</span></li><span data-dcnode-id="405" instrument_node="">
</span></ul><span data-dcnode-id="403" instrument_node="">
</span><p data-dcnode-id="390"><em data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">For more information, please contact Gregory T. Nojeim, Director of CDT’s Freedom, Security &amp; Technology Project, at </span></em><a data-dcnode-id="398" href="mailto:gnojeim@cdt.org"><em data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">gnojeim@cdt.org</span></em></a><em data-dcnode-id="396"><span data-dcnode-id="397" instrument_node=""> and view CDT’s Statement for the Record about Section 702 reauthorization: </span></em><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdt.org/%3Fp%3D78385"><em data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">https://cdt.org/?p=78385</span></em></a><em data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">. &nbsp;</span></em></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">&nbsp;</span></p><span data-dcnode-id="386" instrument_node="">
