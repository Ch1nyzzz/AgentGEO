</span><div class="ti-disclosure-wrapper" data-dcnode-id="811"><span data-dcnode-id="814" instrument_node="">FinMasters content is free. When you purchase through referral links on our site, we earn a commission. </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finmasters.com/affiliate-disclosure/" rel="noopener" target="_blank"><span data-dcnode-id="813" instrument_node="">Advertiser Disclosure</span></a></div><span data-dcnode-id="810" instrument_node="">
</span><article class="post-33970 post type-post status-publish format-standard has-post-thumbnail hentry category-credit-cards category-extra-income" data-dcnode-id="547" id="post-33970"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Manufactured spending lets you qualify for the introductory spending bonuses on credit cards without depleting your financial reserves. Instead of purchasing traditional goods or services to meet the necessary thresholds, it involves buying things you can turn back into cash, which you can then use to pay your credit card bill.</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Manufactured spending can net you hundreds, if not thousands, of dollars in rewards. However, there are risks involved, so don’t rush into it without knowing how it works. Here’s what you should understand about the process to decide if it’s right for you.</span></p><span data-dcnode-id="803" instrument_node="">
</span><div class="su-spoiler su-spoiler-style-default su-spoiler-icon-arrow" data-anchor-in-url="no" data-dcnode-id="770" data-scroll-offset="0"><div class="su-spoiler-title" data-dcnode-id="797" role="button" tabindex="0"><span class="su-spoiler-icon" data-dcnode-id="802"></span><span data-dcnode-id="801" instrument_node="">📚 </span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">In this post:</span></strong><span data-dcnode-id="798" instrument_node=""> </span></div><div class="su-spoiler-content su-u-clearfix su-u-trim" data-dcnode-id="771"><span data-dcnode-id="796" instrument_node="">
</span><ul data-dcnode-id="773"><li data-dcnode-id="793"><a data-dcnode-id="794" href="#how-manufactured-spending-works"><span data-dcnode-id="795" instrument_node="">How Manufactured Spending Works</span></a></li><li data-dcnode-id="783"><a data-dcnode-id="791" href="#Manufactured-Spending-Strategies"><span data-dcnode-id="792" instrument_node="">Manufactured Spending Strategies</span></a><ul data-dcnode-id="784"><li data-dcnode-id="788"><a data-dcnode-id="789" href="#prepaid-visa-and-mastercard-gift-cards-money-orders"><span data-dcnode-id="790" instrument_node="">Prepaid Visa and Mastercard Gift Cards + Money Orders</span></a></li><li data-dcnode-id="785"><a data-dcnode-id="786" href="#funding-bank-accounts"><span data-dcnode-id="787" instrument_node="">Funding Bank Accounts</span></a></li></ul></li><li data-dcnode-id="780"><a data-dcnode-id="781" href="#the-legality-of-manufactured-spending"><span data-dcnode-id="782" instrument_node="">The Legality of Manufactured Spending</span></a></li><li data-dcnode-id="777"><a data-dcnode-id="778" href="#relation-to-credit-card-churning"><span data-dcnode-id="779" instrument_node="">Relation to Credit Card Churning</span></a></li><li data-dcnode-id="774"><a data-dcnode-id="775" href="#know-the-risks-and-start-slow"><span data-dcnode-id="776" instrument_node="">Know the Risks and Start Slow</span></a></li></ul><span data-dcnode-id="772" instrument_node="">
</span></div></div><span data-dcnode-id="769" instrument_node="">
</span><h2 data-dcnode-id="767" id="how-manufactured-spending-works"><span data-dcnode-id="768" instrument_node="">How Manufactured Spending Works</span></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">One of the primary ways that credit card companies attract new users is to offer lump-sum sign-up bonuses. These usually promise an enticing reward of points, cash, or miles. All you have to do is hit a certain spending level on the card within a brief introductory period.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">👉 </span><strong data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">For example</span></strong><span data-dcnode-id="759" instrument_node="">: in 2021, the Chase Sapphire Preferred card offered a whopping 100,000 in bonus points if you spent $4,000 on purchases within the first three months of opening your account. That’s equal to $1,250 toward travel through the Chase reward system or $1,000 in cash. </span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">As you can see, there are exciting rewards to be had. A $1,250 travel credit could easily cover a round-trip flight to a tropical destination of your choice.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">However, not everyone can afford to spend $4,000 on their credit card in three months. That works out to $1,333 per month, and you might have difficulty hitting that number without inflating your spending.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Credit card companies are hoping you’ll go out and buy that new flatscreen TV you’ve been thinking about or make some other big purchase to get you over the hump. They stand a better chance of making money off interest on your balance that way.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">Of course, while that’s good for them, it’s terrible for you. Credit cards carry an average interest rate of 16.16%</span><sup data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">1</span></sup><span data-dcnode-id="744" instrument_node="">. If you overstretch and get stuck making an $80 minimum monthly payment indefinitely to pay off a $4,000 balance, you’d pay a whopping $2,564 in interest before you finished.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Enter manufactured spending. You can use it to cover the difference between your natural spending levels and your credit card reward threshold. Or, if you’re more ambitious, you can use it to cover the entire amount, so you don’t ever have to worry about spending too much.</span></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Once you’ve reached your spending requirement, ideally generating additional cashback rewards or points in the process, you can use the money to pay off your credit card balance.</span></p><span data-dcnode-id="736" instrument_node="">
</span><h2 data-dcnode-id="734" id="Manufactured-Spending-Strategies"><span data-dcnode-id="735" instrument_node="">Manufactured Spending Strategies</span></h2><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Manufactured spending strategies tend to shift over time. When they become too well known, credit card companies or other third parties involved may feel like people are abusing the system. At that point, they may step in to limit a technique’s effectiveness.</span></p><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Fortunately, there are countless ways to manufacture spending, and people find new ones all the time. Once you understand how others do it, you’ll start to see opportunities yourself and learn to create your own strategies.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">The best techniques are:</span></p><span data-dcnode-id="724" instrument_node="">
</span><ul data-dcnode-id="717"><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Easy to complete repeatedly without calling undue attention to yourself or breaking any rules</span></li><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Inexpensive enough that you don’t diminish your rewards by paying unnecessary fees</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Reliably executable so you can confidently liquidate on the back end</span></li></ul><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Here are some examples of tried and true strategies that meet these requirements. They’ll give you a better picture of how manufactured spending looks in practice.</span></p><span data-dcnode-id="713" instrument_node="">
</span><h3 data-dcnode-id="711" id="prepaid-visa-and-mastercard-gift-cards-money-orders"><span data-dcnode-id="712" instrument_node="">Prepaid Visa and Mastercard Gift Cards + Money Orders</span></h3><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">One of the classic methods for manufacturing spending is to buy Visa and Mastercard gift cards and use them to pay for money orders payable to yourself.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">You’ll pay a small activation fee for the gift cards, usually somewhere between $5 and $10, but you typically won’t face any charges for buying them with a credit card. Credit card fees are the bane of manufactured spending.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">👉 </span><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">For example:</span></strong><span data-dcnode-id="700" instrument_node=""> if your landlord allows it, there’s often a fee of around 3% of your bill to pay your rent by credit card. At that rate, to reach a minimum spending threshold of $4,000, you’d pay $120 in fees, significantly eroding your potential reward. Buying gift cards is a way to avoid getting hit with these types of costs.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">You can usually find the lowest activation fees for gift cards at grocery stores. Depending on your credit card terms, that may also let you leverage a category bonus.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">For example, your card might offer additional points or discounts for spending at grocery stores, restaurants, and gas stations. You can also buy cards online through sites like </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.giftcards.com/" rel="noopener" target="_blank"><span data-dcnode-id="693" instrument_node="">GiftCards.com</span></a><span data-dcnode-id="691" instrument_node="">, but it’s typically more expensive.</span></p><span data-dcnode-id="689" instrument_node="">
</span><div class="wp-block-columns" data-dcnode-id="659"><span data-dcnode-id="688" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="683"><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">An important thing to keep in mind when using gift cards for manufactured spending is that your credit card issuer may decide to treat the transaction as a cash advance. That would trigger significant additional fees and interest, which you want to avoid at all costs.</span></p><span data-dcnode-id="684" instrument_node="">
</span></div><span data-dcnode-id="682" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="661"><span data-dcnode-id="681" instrument_node="">
</span><div class="ti-tweet-clear" data-dcnode-id="680"></div><span data-dcnode-id="679" instrument_node="">
</span><div class="ti-tweet_wrapper" data-dcnode-id="663"><span data-dcnode-id="678" instrument_node="">
</span><div class="ti-tweet_text" data-dcnode-id="673"><span data-dcnode-id="677" instrument_node="">
</span><a class="ctt" data-dcnode-id="675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DOne%2Bof%2Bthe%2Bclassic%2Bmethods%2Bfor%2Bmanufacturing%2Bspending%2Bis%2Bto%2Bbuy%2BVisa%2Band%2BMastercard%2B%2523giftcards%2Band%2Buse%2Bthem%2Bto%2Bpay%2Bfor%2Bmoney%2Borders%2Bpayable%2Bto%2Byourself%26via%3DFinMastersCom%26related%3DFinMastersCom%26url%3Dhttps%3A//finmasters.com/manufactured-spending/" target="_blank"><span data-dcnode-id="676" instrument_node="">One of the classic methods for manufacturing spending is to buy Visa and Mastercard #giftcards and use them to pay for money orders payable to yourself</span></a><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
</span><div class="ti-tweet_sharebtn" data-dcnode-id="665"><span data-dcnode-id="671" instrument_node="">
</span><a class="ctt" data-dcnode-id="667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/share%3Ftext%3DOne%2Bof%2Bthe%2Bclassic%2Bmethods%2Bfor%2Bmanufacturing%2Bspending%2Bis%2Bto%2Bbuy%2BVisa%2Band%2BMastercard%2B%2523giftcards%2Band%2Buse%2Bthem%2Bto%2Bpay%2Bfor%2Bmoney%2Borders%2Bpayable%2Bto%2Byourself%26via%3DFinMastersCom%26related%3DFinMastersCom%26url%3Dhttps%3A//finmasters.com/manufactured-spending/" target="_blank"><span data-dcnode-id="670" instrument_node="">Click To Tweet
</span><span data-dcnode-id="669"></span><span data-dcnode-id="668" instrument_node="">
</span></a><span data-dcnode-id="666" instrument_node="">
</span></div><span data-dcnode-id="664" instrument_node="">
</span></div><span data-dcnode-id="662" instrument_node="">
</span></div><span data-dcnode-id="660" instrument_node="">
</span></div><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Some ways to prevent that problem are to:</span></p><span data-dcnode-id="655" instrument_node="">
</span><ul data-dcnode-id="650"><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Buy your gift card in the same transaction as your grocery run</span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Turn off cash advances with your credit card provider</span></li></ul><span data-dcnode-id="649" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">💡 </span><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Tip: </span></strong><span data-dcnode-id="645" instrument_node="">You should also ask the gift card seller whether their gift cards show up as a cash advance or a purchase before you buy to be safe.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Once you have your gift card in hand, you can use them to purchase a money order that you make out to a bank account in your name. Money orders are like prepaid checks, which means you can deposit them directly into a bank account.</span></p><span data-dcnode-id="640" instrument_node="">
</span><h3 data-dcnode-id="638" id="funding-bank-accounts"><span data-dcnode-id="639" instrument_node="">Funding Bank Accounts</span></h3><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">When you open a new bank account, you need to deposit a minimum amount of money into it to get started. Usually, people do this by depositing cash, depositing checks, or making electronic transfers. However, using your credit card instead is one of the easiest ways to manufacture spending.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Unfortunately, banks have been cracking down on this strategy for years. Most limit the amount you can fund to a relatively low dollar amount or disallow it entirely. If the transaction does go through, it often registers as a cash advance anyway.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">If you’re going to give it a try, make sure you thoroughly research the bank and credit card in question first. Even then, you might end up triggering cash advance fees, so be prepared.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="621"><span data-dcnode-id="627" instrument_node="">📗 </span><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Learn More:</span></strong><span data-dcnode-id="624" instrument_node=""> Credit cards are powerful tools, but only if you know how to use them. Find out our favorite tips for wielding them well: </span><a data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finmasters.com/how-to-use-credit-cards-wisely/%3Fswcfpc%3D1"><span data-dcnode-id="623" instrument_node="">How to Use Credit Cards Wisely: 11 Rules to Live By</span></a></p><span data-dcnode-id="620" instrument_node="">
</span><h2 data-dcnode-id="618" id="the-legality-of-manufactured-spending"><span data-dcnode-id="619" instrument_node="">The Legality of Manufactured Spending</span></h2><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Manufactured spending is legal. No law says that you can’t use your credit card to pay for things like gift cards, money orders, or bank accounts to get your credit card rewards. In fact, credit card issuers are well aware that they’re taking a risk by offering these incentives.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">All financial institutions know there will be some people who manage to game their system. They’re just confident that they’ll still make a profit on average. That should tell you something about the dangers of manufactured spending.</span></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">However, while manufactured spending is not illegal, it is frowned upon. Financial institutions and vendors consistently revise their terms and conditions to block manufactured spending strategies. That’s why techniques typically become obsolete over time.</span></p><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">In addition, if your financial institution gets wind of your manufactured spending tactics or decides that your behavior is suspicious, they may lock or even cancel your account at any time.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">It’s a good idea to create accounts at separate banks for your manufactured spending. You don’t want to risk losing access to the funds in your primary checking account or ruining the relationship with your bank over a $500 credit card reward.</span></p><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="600" id="relation-to-credit-card-churning"><span data-dcnode-id="601" instrument_node="">Relation to Credit Card Churning</span></h2><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Manufactured spending is closely related to credit card churning, which is the process of continuously opening up credit cards, qualifying for the rewards, then closing them to avoid annual fees.</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The most dedicated churners regularly open up dozens of cards per year. They can generate impressive rewards, but the only way to sustain that much spending without going broke is to manufacture it.</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Unfortunately, the more often you manufacture your spending, the more likely you are to run into the risks involved, such as:</span></p><span data-dcnode-id="590" instrument_node="">
</span><ul data-dcnode-id="583"><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Being unable to liquidate your intermediary step back into cash</span></li><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Triggering a cash advance fee or racking up interest</span></li><li data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Getting your bank account locked or your credit card canceled</span></li></ul><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Even if you don’t manufacture your spending, banks often take steps to prevent credit card churning. For example, Chase’s infamous 5/24 rule will block your application for any of their accounts if you’ve opened five others, regardless of the institution, in the last five months.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="572"><span data-dcnode-id="578" instrument_node="">📗 </span><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Learn More:</span></strong><span data-dcnode-id="575" instrument_node=""> To get a more comprehensive understanding of credit card churning, check out our analysis of the strategy: </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finmasters.com/credit-card-churning/"><span data-dcnode-id="574" instrument_node="">Credit Card Churning: What Is It and Is It Worth It?</span></a></p><span data-dcnode-id="571" instrument_node="">
</span><h2 data-dcnode-id="569" id="know-the-risks-and-start-slow"><span data-dcnode-id="570" instrument_node="">Know the Risks and Start Slow</span></h2><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Manufactured spending has the potential to be highly lucrative, and the lure of easy money is powerful. However, the potential downsides are also substantial, especially for people who repeat the process multiple times as a part of their credit card churning strategy.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p class="has-light-blue-background-color has-background" data-dcnode-id="560"><span data-dcnode-id="564" instrument_node="">👉</span><strong data-dcnode-id="562"><span data-dcnode-id="563" instrument_node=""> For example</span></strong><span data-dcnode-id="561" instrument_node="">: Even if you churn properly, there can be significant implications for your credit. Every time you open up a credit card, you add a hard inquiry to your credit report. Too many of them, especially in quick succession, can significantly harm your credit score. </span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Even worse, if you make a mistake while churning or manufacturing spending, it can quickly wipe out your credit card reward and snowball into a significant expense. For example, cash advance fees can be as much as 5% of the amount advanced and carry an interest rate even higher than the base rate for traditional credit card balances.&nbsp;</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">If you’re going to engage in manufactured spending or credit card churning, make sure you know the risks and take steps to mitigate them as much as possible. Do your research, and make sure you have the financial resiliency to withstand an attempt gone wrong.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="549"><strong data-dcnode-id="550"><em data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">What’s your #1 advice for people looking to practice manufactured spending? Share your thoughts in the comments below!</span></em></strong></p><span data-dcnode-id="548" instrument_node="">
