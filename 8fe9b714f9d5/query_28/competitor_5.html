</span><figure aria-describedby="caption-attachment-59484" class="wp-caption alignnone" data-dcnode-id="635" id="attachment_59484" style="width: 800px"><img alt="What is Crowdfunding and How Does It Work?" class="wp-image-59484 lazyautosizes lazyloaded td-animation-stack-type0-2" data-dcnode-id="640" data-sizes="auto" data-src="https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg" data-srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-330x220.jpg 330w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-768x512.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-1024x682.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-450x300.jpg 450w" decoding="async" height="533" sizes="570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg&amp;raw" srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-330x220.jpg 330w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-768x512.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-1024x682.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-450x300.jpg 450w" width="800"><noscript data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">&lt;img class="wp-image-59484" src="https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg" alt="What is Crowdfunding and How Does It Work?" width="800" height="533" srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-330x220.jpg 330w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-768x512.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-1024x682.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image2-1-450x300.jpg 450w" sizes="(max-width: 800px) 100vw, 800px" data-eio="l" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="636" id="caption-attachment-59484"><span data-dcnode-id="637" instrument_node="">What is Crowdfunding and How Does It Work?</span></figcaption></figure><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="633" instrument_node="">In the Digital Age, business moves fast, and new innovations seem to be revolutionizing the business world every year. But while gimmicks and neat new concepts will come and go, one modern innovation has the potential to change everything about venture capital, investing and small business. That innovation is </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.investopedia.com/terms/c/crowdfunding.asp" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="632" instrument_node="">the idea of crowdfunding, and it is already having a big impact on entrepreneurs, investors and new business.</span></a></p><span data-dcnode-id="629" instrument_node="">
</span><h2 data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">What is crowdfunding?</span></h2><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">In its simplest form, crowdfunding is a way for startups to secure funding through the collective investments of individual people. While that may not sound like a revolutionary concept, social media and online platforms are providing a completely new way for potential business owners to pitch their ideas to a large number of people and gain the necessary capital to get off the ground.</span></p><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">This is important for startups because it is essentially the complete opposite of traditional methods for funding their business. When using traditional routes, an entrepreneur would need to develop his or her business plan and pitch it to a select few wealthy investors, one at a time. These traditional sources include venture capitalists,  business loans  and angel investors, and assuming you did not receive all of necessary funds in the first pitch, you may need to visit several sources, tailoring each pitch and strategy to each potential investor.</span></p><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">Crowdfunding essentially turns the entire </span><a data-dcnode-id="617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intelligenthq.com/how-long-does-it-take-to-become-a-physical-therapist/"><span data-dcnode-id="618" instrument_node="">process</span></a><span data-dcnode-id="616" instrument_node=""> upside-down. Instead of hunting for individual investors and making several different pitches, you would use a crowdfunding website to make one pitch and (hopefully) let the investors come to you. Investors search through the various new ideas, inventions, concepts and startups to find one that they feel is worth their investment.</span></p><span data-dcnode-id="614" instrument_node="">
</span><h2 data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">How does crowdfunding work?</span></h2><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">Of course, while crowdfunding is a great alternative to traditional methods of gaining capital for your startup, the money does not come for free. There are essentially </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundable.com/learn/resources/guides/crowdfunding-guide/what-is-crowdfunding"><span data-dcnode-id="609" instrument_node=""> three main types </span></a><span data-dcnode-id="607" instrument_node=""> of crowdfunding, and the major differences lie in the returns expected by investors.</span></p><span data-dcnode-id="605" instrument_node="">
</span><h3 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Donation-based</span></h3><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Actually, with this type of crowdfunding, the money almost does come for free. Aside from the fee charged by the crowdfunding website (which can be sizeable and is nothing to ignore), investors in this type do not expect to gain anything back from the money they put in. However, this technique is generally used only for nonprofits, charities, disaster relief and other such initiatives.</span></p><span data-dcnode-id="599" instrument_node="">
</span><h3 data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Rewards-based</span></h3><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">With this type of crowdfunding, those who invest in your new business do not necessarily expect a monetary return on their investment, but the return will come in the way of a specific benefit, product or reward from your company. This could be an advance release on your new video game, a pre-sale for your new kind of soap, special access to your new marketing concept or any other type of reward that people deem to be worth their investment.</span></p><span data-dcnode-id="593" instrument_node="">
</span><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Equity-based</span></h3><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Equity-based crowdfunding is more similar to traditional funding methods for startups. With this type, investors contribute to your startup and become equity owners in your new company. This will provide them with a financial return on their initial investment, as your business becomes profitable. This type of crowdfunding is limited to accredited investors and is generally used to gain larger amounts of capital. The amount could range anywhere from $50,000 all the way up to $10 million.</span></p><span data-dcnode-id="587" instrument_node="">
</span><figure aria-describedby="caption-attachment-59483" class="wp-caption alignnone" data-dcnode-id="581" id="attachment_59483" style="width: 800px"><img alt="" class="wp-image-59483 lazyautosizes lazyloaded td-animation-stack-type0-2" data-dcnode-id="586" data-sizes="auto" data-src="https://www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg" data-srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-360x203.jpg 360w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-768x432.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-1024x576.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-500x281.jpg 500w" decoding="async" height="450" sizes="570px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg&amp;raw" srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-360x203.jpg 360w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-768x432.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-1024x576.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-500x281.jpg 500w" width="800"><noscript data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">&lt;img class="wp-image-59483" src="https://www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg" alt="" width="800" height="450" srcset="https://www.intelligenthq.com/wp-content/uploads/2017/11/image1.jpg 1280w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-360x203.jpg 360w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-768x432.jpg 768w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-1024x576.jpg 1024w, https://www.intelligenthq.com/wp-content/uploads/2017/11/image1-500x281.jpg 500w" sizes="(max-width: 800px) 100vw, 800px" data-eio="l" /&gt;</span></noscript><figcaption class="wp-caption-text" data-dcnode-id="582" id="caption-attachment-59483"><span data-dcnode-id="583" instrument_node="">Benefits of crowdfunding</span></figcaption></figure><span data-dcnode-id="580" instrument_node="">
</span><h2 data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Benefits of Crowdfunding</span></h2><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">This concept is already revolutionizing investments in small business, and it is only going to grow in the future. It provides investors an opportunity to scroll through thousands of potential investment ideas and decide which ones may be worth their money. For entrepreneurs, there are even more meaningful advantages, including:</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="573" instrument_node="">A large scope of potential investors</span><br data-dcnode-id="572"><span data-dcnode-id="571" instrument_node="">
The efficiency of only creating one pitch for the world to see</span><br data-dcnode-id="570"><span data-dcnode-id="569" instrument_node="">
Combining marketing with your funding by letting the world know about your business</span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node="">
Validating your idea through monetary investments and feedback from investors</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">However, it is not without its downsides, as crowdfunding is still developing as a funding method. The fees charged by platforms and websites can be sizeable, and there is no timetable for your investments to come through. It will be up to you to decide if the benefits outweigh the drawbacks, but crowdfunding should definitely be a consideration when starting your business.</span></p><span data-dcnode-id="562" instrument_node="">
