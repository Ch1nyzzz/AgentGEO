sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780444595683" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="844"><a class="read-full-chapter-print" data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780444595683000274" rel="noopener" target="_blank"><span data-dcnode-id="850" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="845"><span data-dcnode-id="848" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="846" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780444595683000274</span></div></div></article><article class="snippet column" data-dcnode-id="736" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="751"><h2 class="u-font-serif u-text-light" data-dcnode-id="839" id="tp-snippet-chp-title-B9780080448947013853"><a class="anchor" data-aa-name="Qatar" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947013853"><span class="anchor-text" data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Qatar</span></span></a></h2><div class="size-l" data-dcnode-id="752"><cite data-dcnode-id="825"><p data-dcnode-id="826"><span data-dcnode-id="831"><span data-dcnode-id="838" instrument_node="">S.R. </span><span data-dcnode-id="836" instrument_node="">Salman</span><span data-dcnode-id="834" instrument_node="">, in</span><span data-dcnode-id="832" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Education (Third Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080448947/international-encyclopedia-of-education"><span class="anchor-text" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">International Encyclopedia of Education (Third Edition)</span></span></a><span data-dcnode-id="827" instrument_node="">, 2010</span></p></cite><section data-dcnode-id="753" id="B9780080448947013853-s0055"><h3 data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Higher Education</span></h3><p data-dcnode-id="821" id="B9780080448947013853-p0135"><span data-dcnode-id="822" instrument_node="">Qatar has a number of postsecondary institutions. These include the Qatar University (QU), the Seven United States Universities located at the Education City, the University of Calgary, which is a Canadian University, and Stenden University, which is a Dutch University.</span></p><p data-dcnode-id="819" id="B9780080448947013853-p0140"><span data-dcnode-id="820" instrument_node="">The QU is the only national university to have been established in 1977. It offers six areas of specialization: science, engineering, Sharia and Law, administration and economics, education, and business. The number of graduates in 2000–01 was 1445 (82% Qataris) and decreased to 1332 in 2005–06 (79% Qataris), with graduates from science and engineering representing ∼42% of the total.</span></p><p data-dcnode-id="817" id="B9780080448947013853-p0145"><span data-dcnode-id="818" instrument_node="">Since 1995, the Qatar Foundation (QF) established the Education City (EC), which accommodates some of the best world universities. In 1998, Virginia Commonwealth University School for Arts (VCUQ) started offering a bachelor of arts (BA) in design. It accommodates 190 students (2006–07 statistics with 189 being female and one, male). The Weill Cornell Medical College in Qatar (WCMC-Q) educates young people in this region to be physicians, biomedical researchers, and medical educators; it accommodates 148 students (2006–07, 77 female and 71 male). The Texas A&amp;M University at Qatar (TAMUQ) opened in 2003. It offers undergraduate degrees in chemical, electrical, mechanical, and petroleum engineering, and accommodates 178 students (2006–07, 108 males and 70 females). Carnegie Mellon University in Qatar offers undergraduate degrees in two of its most highly ranked programs – business and computer science – and it accommodates 118 students (2007–08, 76 female, 42 male). Georgetown University, established in 2005, offers programs leading to a bachelor’s degree in foreign service. The Faculty of Islamic Studies is an international center for Islamic thinking and dialog and is committed to enhancing research into the Islamic culture. The Northwestern University opened in 2008, and offers degree in journalism and communication and it is the newest institution to open a campus at the EC.</span></p><p data-dcnode-id="815" id="B9780080448947013853-p0150"><span data-dcnode-id="816" instrument_node="">In addition, 151 students study for a year in the Academic Bridge, which prepares students for entrance into the QF universities.</span></p><p data-dcnode-id="813" id="B9780080448947013853-p0155"><span data-dcnode-id="814" instrument_node="">The Stenden University is a Dutch-administered university that offers diploma, bachelor, and master of arts (MA) degrees in hospitality, leisure and tourism, business, retail, and service management. In 2006–07, there were 273 students, of whom 140 were female and 133 male. The Calgary University Faculty of Nursing opened in May 2007 – this Canadian university offers a bachelor of nursing (BN) program. The total student enrolment was 273, of which Qatari students represent 71%.</span></p><p data-dcnode-id="811" id="B9780080448947013853-p0160"><span data-dcnode-id="812" instrument_node="">The total number of students graduating in 2005–06, from all HEIs, was 2239 – among them, 69% were females and 64.8% were Qataris.</span></p><div data-dcnode-id="754"><p data-dcnode-id="805"><span data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">Part of the </span><span class="topic-highlight" data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">reform policy</span></span><span data-dcnode-id="807" instrument_node=""> is the creation of the HEIs. It aims to enhance the quality of higher education, and thus, it has created several scholarship programs, namely:</span></span></p><dl class="article-list" data-dcnode-id="755"><dt data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">•</span></dt><dd data-dcnode-id="798"><p data-dcnode-id="799" id="B9780080448947013853-mc0208"><em data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Emiri scholarship</span></em><span data-dcnode-id="800" instrument_node="">. Awarded to Qatari students with high grades from secondary schools. In 2005–06, there were 114 recipients of this scholarship – only six of them studied abroad and the rest in EC.</span></p></dd><dt data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">•</span></dt><dd data-dcnode-id="791"><p data-dcnode-id="792" id="B9780080448947013853-mc0209"><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">National scholarship</span></em><span data-dcnode-id="793" instrument_node="">. Intended for highly qualified students who are accepted in universities selected to be on the national list (250 universities highly ranked, but with lower ranking than the Emiri list, which has 50 universities). A total of 204 students received this scholarship for the year 2005–06.</span></p></dd><dt data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">•</span></dt><dd data-dcnode-id="784"><p data-dcnode-id="785" id="B9780080448947013853-mc0210"><em data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Employee scholarship</span></em><span data-dcnode-id="786" instrument_node="">. Offered in partnership with the public and private sectors on condition that the students study in HEI-approved universities. The number was 119.</span></p></dd><dt data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">•</span></dt><dd data-dcnode-id="777"><p data-dcnode-id="778" id="B9780080448947013853-mc0211"><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Pre-College (Academic Bridge in EC</span></em><span data-dcnode-id="779" instrument_node="">). The number was 127.</span></p></dd><dt data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">•</span></dt><dd data-dcnode-id="770"><p data-dcnode-id="771" id="B9780080448947013853-mc0212"><em data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">VET Diploma.</span></em><span data-dcnode-id="772" instrument_node=""> Usually, students who do not qualify to Emiri or National HEI-approved universities can study in QCNA. The total number of students enrolled was 90.</span></p></dd><dt data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">•</span></dt><dd data-dcnode-id="763"><p data-dcnode-id="764" id="B9780080448947013853-mc0213"><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Diploma, Qatar Aeronautical College</span></em><span data-dcnode-id="765" instrument_node="">. The number was 187.</span></p></dd><dt data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">•</span></dt><dd data-dcnode-id="756"><p data-dcnode-id="757" id="B9780080448947013853-mc0214"><em data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Pre-college grant.</span></em><span data-dcnode-id="758" instrument_node=""> This is for students who are accepted in Emiri and National Scholarship but need a pre-college additional academic preparation. The number of students enrolled in the United States, Canadian, and Australian institutions was 87, in Europe 256, and in the Middle East 261.</span></p></dd></dl></div></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="744"><a aria-describedby="tp-snippet-chp-title-B9780080448947013853" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947013853" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080448947" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="737"><a class="read-full-chapter-print" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080448947013853" rel="noopener" target="_blank"><span data-dcnode-id="743" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="738"><span data-dcnode-id="741" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="739" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780080448947013853</span></div></div></article><article class="snippet column" data-dcnode-id="656" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="671"><h2 class="u-font-serif u-text-light" data-dcnode-id="732" id="tp-snippet-chp-title-B9780128170243000076"><a class="anchor" data-aa-name="Smart City Scenarios" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="733" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128170243000076"><span class="anchor-text" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Smart City Scenarios</span></span></a></h2><div class="size-l" data-dcnode-id="672"><cite data-dcnode-id="712"><p data-dcnode-id="713"><span data-dcnode-id="718"><span data-dcnode-id="731" instrument_node="">Christopher </span><span data-dcnode-id="729" instrument_node="">Kirwan</span><span data-dcnode-id="727" instrument_node="">, </span><span data-dcnode-id="725" instrument_node="">Fu </span><span data-dcnode-id="723" instrument_node="">Zhiyong</span><span data-dcnode-id="721" instrument_node="">, in</span><span data-dcnode-id="719" instrument_node=""> </span></span><a class="anchor" data-aa-name="Smart Cities and Artificial Intelligence" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780128170243/smart-cities-and-artificial-intelligence"><span class="anchor-text" data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Smart Cities and Artificial Intelligence</span></span></a><span data-dcnode-id="714" instrument_node="">, 2020</span></p></cite><section data-dcnode-id="673" id="B9780128170243000076-s0145"><h3 data-dcnode-id="706"><span data-dcnode-id="711" instrument_node="">7.6.2</span><span data-dcnode-id="709" instrument_node=""> </span><span data-dcnode-id="707" instrument_node="">Object–action–outcome</span></h3><div data-dcnode-id="674"><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="675" id="B9780128170243000076-t0025"><div class="groups" data-dcnode-id="676"><table data-dcnode-id="677"><tbody data-dcnode-id="678"><tr class="valign-top" data-dcnode-id="696"><td data-dcnode-id="703"><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Object</span></em></td><td data-dcnode-id="700"><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Action</span></em></td><td data-dcnode-id="697"><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Outcome</span></em></td></tr><tr class="valign-top" data-dcnode-id="686"><td data-dcnode-id="693"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Stakeholders</span></strong></td><td data-dcnode-id="690"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Policy/Reform</span></strong></td><td data-dcnode-id="687"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Inclusiveness</span></strong></td></tr><tr class="valign-top" data-dcnode-id="679"><td data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">A government is only as good as its collective intelligence and that requires involvement of all stakeholders and users. Public consultations are a key to renewable political models, rather than secretive special interests prescribing policies that only benefit them. The entropy of these systems over time has led to a democratic deficit, in which voters are misinformed, governments are dysfunctional and elites are corrupted. The result is a downward spiral and erosion of institutions and ideology. Smart government has to counter these pathological trends to renew institutions, publics and stakeholders.</span></td><td data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">The action through which smart leadership and institutions are fostered is through reform, diagnosing and reconstructing the necessary social transformation. As automation comes online both in terms of job replacement and metagovernance, human-centered policies and regulations will shape how the city self-organizes effectively. Reform must take place system wide and give every individual the tools for community and self-development. As consistent with stakeholders, transparency through all processes ensures efficiency and integrity in the reform process.</span></td><td data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">The final key to smart government is its outcome, which is measured by inclusiveness and the consent of the governed. Citizen participation, user feedback and democratic processes secure inclusion, collaboration and access to services. The user/citizen is the final arbiter of smart governance, so that it can continually improve its processes and meet the needs of all people while evolving as a self-determining, self-regulating society through the power of inclusiveness.</span></td></tr></tbody></table></div></div></div></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="664"><a aria-describedby="tp-snippet-chp-title-B9780128170243000076" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128170243000076" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780128170243" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="657"><a class="read-full-chapter-print" data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128170243000076" rel="noopener" target="_blank"><span data-dcnode-id="663" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="658"><span data-dcnode-id="661" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="659" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780128170243000076</span></div></div></article><article class="snippet column" data-dcnode-id="602" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="617"><h2 class="u-font-serif u-text-light" data-dcnode-id="652" id="tp-snippet-chp-title-B9780128238950000257"><a class="anchor" data-aa-name="Land Reclamation and Restoration Strategies for Sustainable Development" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="653" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128238950000257"><span class="anchor-text" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Land Reclamation and Restoration Strategies for Sustainable Development</span></span></a></h2><div class="size-l" data-dcnode-id="618"><cite data-dcnode-id="638"><p data-dcnode-id="639"><span data-dcnode-id="644"><span data-dcnode-id="651" instrument_node="">Rebeka </span><span data-dcnode-id="649" instrument_node="">Sultana</span><span data-dcnode-id="647" instrument_node="">, in</span><span data-dcnode-id="645" instrument_node=""> </span></span><a class="anchor" data-aa-name="Modern Cartography Series" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/bookseries/modern-cartography-series"><span class="anchor-text" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Modern Cartography Series</span></span></a><span data-dcnode-id="640" instrument_node="">, 2021</span></p></cite><section data-dcnode-id="619" id="B9780128238950000257-s0080"><h3 data-dcnode-id="632"><span data-dcnode-id="637" instrument_node="">31.3.10</span><span data-dcnode-id="635" instrument_node=""> </span><span data-dcnode-id="633" instrument_node="">Previous land policy of government</span></h3><p data-dcnode-id="620" id="B9780128238950000257-p0140"><span data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">A complex problem arises in land </span><span class="topic-highlight" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">reform policy</span></span><span data-dcnode-id="628" instrument_node=""> in Bangladesh and that is suspicious land owner and frequent change in land ownership. Besides, the accuracy of land record is also a questionable issue. Unreliable land record, dearth of previous land record, anonymous lands are the dilemma for land reform program (</span></span><span data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Taslim, 1993</span></span><span data-dcnode-id="624" instrument_node="">). Land reclamation by the absent farmers becomes a problem in reform policy. The land grabbers take a chance to capture the land of absent farmers due to long-term absence. However, the first land regulation was formulated in 1825 which is recognized as Bengal Alluvion and Diluvion Regulation 1825. The regulation covers the newly accreted lands along with the other land reform issues. Furthermore, Bengal Rent Act was established in 1859 and Bengal Tenancy Act was articulated in 1885 providing tenant's rights on eroded land. In 1938, another amendment was recognized concerning the khas land issue. Another regulation was formulated in 1950 named the East Bengal State Acquisition and Tenancy Act 1950. After the independence of Bangladesh, Presidents order: 135 (August 4, 1972) was disseminated regarding land property reformation (</span><span data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Islam, 2003</span></span><span data-dcnode-id="621" instrument_node="">). The Act of 1994 (Act XV) provides the law of land accretion. According to the law, if eroded land arrives within 30 years of diluvion, the victim land owner will get back the land. In spite of having the Government policies regarding land reform, it is obvious that after the passage of time, different issues are emerged with land. Therefore, an update land reform policy should be formulated through surveying the issues and challenges of the sector. Moreover, accreted lands should be emphasized along with the khas lands for land reform policy.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="610"><a aria-describedby="tp-snippet-chp-title-B9780128238950000257" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128238950000257" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780128238950" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="603"><a class="read-full-chapter-print" data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128238950000257" rel="noopener" target="_blank"><span data-dcnode-id="609" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="604"><span data-dcnode-id="607" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="605" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780128238950000257</span></div></div></article><article class="snippet column" data-dcnode-id="561" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="576"><h2 class="u-font-serif u-text-light" data-dcnode-id="598" id="tp-snippet-chp-title-B9780080970868740608"><a class="anchor" data-aa-name="Urban Poverty in Neighborhoods" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868740608"><span class="anchor-text" data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Urban Poverty in Neighborhoods</span></span></a></h2><div class="size-l" data-dcnode-id="577"><cite data-dcnode-id="583"><p data-dcnode-id="584"><span data-dcnode-id="589"><span data-dcnode-id="597" instrument_node="">J.E. </span><span data-dcnode-id="595" instrument_node="">Grigsby</span><span data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">III</span></span><span data-dcnode-id="592" instrument_node="">, in</span><span data-dcnode-id="590" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of the Social &amp;amp; Behavioral Sciences (Second Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080970875/international-encyclopedia-of-the-social-and-behavioral-sciences"><span class="anchor-text" data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">International Encyclopedia of the Social &amp; Behavioral Sciences (Second Edition)</span></span></a><span data-dcnode-id="585" instrument_node="">, 2015</span></p></cite><section data-dcnode-id="578"><h3 data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Abstract</span></h3><p data-dcnode-id="579" id="B9780080970868740608-abspara0010"><span data-dcnode-id="580" instrument_node="">After nearly four decades of research and efforts at policy reform and program intervention, the number of persons in poverty is increasing and persons in poverty are becoming more and more concentrated. This article provides an overview of the history of poverty in America, its causes, and indicates why scholars and policy-makers should be concerned. The article concludes by calling for a more comprehensive approach to the solutions of poverty – one which takes into account the structural sources of poverty, its multigenerational roots, and the link between individual neighborhoods and regions.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="569"><a aria-describedby="tp-snippet-chp-title-B9780080970868740608" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868740608" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080970875" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="562"><a class="read-full-chapter-print" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780080970868740608" rel="noopener" target="_blank"><span data-dcnode-id="568" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="563"><span data-dcnode-id="566" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="564" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780080970868740608</span></div></div></article><article class="snippet column" data-dcnode-id="517" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="532"><h2 class="u-font-serif u-text-light" data-dcnode-id="557" id="tp-snippet-chp-title-B9780128007624000244"><a class="anchor" data-aa-name="Market Consolidation and Alignment" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128007624000244"><span class="anchor-text" data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Market Consolidation and Alignment</span></span></a></h2><div class="size-l" data-dcnode-id="533"><cite data-dcnode-id="543"><p data-dcnode-id="544"><span data-dcnode-id="549"><span data-dcnode-id="556" instrument_node="">Larry R. </span><span data-dcnode-id="554" instrument_node="">Kaiser</span><span data-dcnode-id="552" instrument_node="">, in</span><span data-dcnode-id="550" instrument_node=""> </span></span><a class="anchor" data-aa-name="The Transformation of Academic Health Centers" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780128007624/the-transformation-of-academic-health-centers"><span class="anchor-text" data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">The Transformation of Academic Health Centers</span></span></a><span data-dcnode-id="545" instrument_node="">, 2015</span></p></cite><section data-dcnode-id="534" id="B9780128007624000244-s0070"><h3 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Conclusion</span></h3><p data-dcnode-id="539" id="B9780128007624000244-p0250"><span data-dcnode-id="540" instrument_node="">Hospital consolidation is being driven by a number of factors, including policy reform promulgated by the ACA, the changing economic landscape, and declining reimbursements.</span></p><p data-dcnode-id="537" id="B9780128007624000244-p0255"><span data-dcnode-id="538" instrument_node="">There are a number of benefits in hospital consolidation and realignment including, but not limited to, increased access, higher value, and greater efficiency with cost savings as the potential end result. A number of studies, however, have shown that consolidation in many markets has been associated with increased prices that ultimately are passed on to the consumer. In hospital referral regions that are highly concentrated, the leverage gained by a dominant health system usually results in pricing favorable to the health system—specifically higher reimbursement rates. Often these higher rates are not just limited to the flagship institution but are enjoyed by the peripheral members of the system as well. Even in less concentrated markets, the reputation of a provider based on the physicians associated with that entity often results in significant leverage with a payer that recognizes a system as a “must have,” resulting in higher rates. Consumers make it known that they wish to have access to such a system or hospital, and thus the payer has to be willing to submit to the demands of such a provider.</span></p><p data-dcnode-id="535" id="B9780128007624000244-p0260"><span data-dcnode-id="536" instrument_node="">The combination of horizontal and vertical integration should give health systems the opportunity to deliver care more efficiently and at less cost, but these savings have not necessarily been passed on to individuals, employers, or the government. Alignment with physicians in order to fully realize efficiencies and control costs has become a major consideration for many health systems and underscores the importance of physician leadership within these systems. In most markets, consolidation among hospitals has remained under the radar of antitrust regulators—including the FTC and the Justice Department—underscoring the fact that the majority of mergers have not yet significantly stifled competition.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="525"><a aria-describedby="tp-snippet-chp-title-B9780128007624000244" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128007624000244" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780128007624" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="518"><a class="read-full-chapter-print" data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128007624000244" rel="noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="519"><span data-dcnode-id="522" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="520" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780128007624000244</span></div></div></article><article class="snippet column" data-dcnode-id="285" style="padding-right: 40px; padding-left: 0px; float: left;"><div class="snippet-content" data-dcnode-id="300"><h2 class="u-font-serif u-text-light" data-dcnode-id="513" id="tp-snippet-chp-title-B978008097086828094X"><a class="anchor" data-aa-name="Structural Adjustment in Africa: Implications for Social Work" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978008097086828094X"><span class="anchor-text" data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Structural Adjustment in Africa: Implications for Social Work</span></span></a></h2><div class="size-l" data-dcnode-id="301"><cite data-dcnode-id="499"><p data-dcnode-id="500"><span data-dcnode-id="505"><span data-dcnode-id="512" instrument_node="">Lengwe-Katembula J. </span><span data-dcnode-id="510" instrument_node="">Mwansa</span><span data-dcnode-id="508" instrument_node="">, in</span><span data-dcnode-id="506" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of the Social &amp;amp; Behavioral Sciences (Second Edition)" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780080970875/international-encyclopedia-of-the-social-and-behavioral-sciences"><span class="anchor-text" data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">International Encyclopedia of the Social &amp; Behavioral Sciences (Second Edition)</span></span></a><span data-dcnode-id="501" instrument_node="">, 2015</span></p></cite><section data-dcnode-id="302" id="B978008097086828094X-s0020"><h3 data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Structural Adjustment Programmes</span></h3><p data-dcnode-id="480" id="B978008097086828094X-p0070"><span data-dcnode-id="496" instrument_node="">This context of widespread prejudice and misrepresentation on a continental scale calls for debate on African development that lacks a monolithic approach, which focuses entirely on economics. Unfortunately, various scholars (</span><span data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Campbell and Loxley, 1989</span></span><span data-dcnode-id="493" instrument_node="">; </span><span data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Gibbon, 1995</span></span><span data-dcnode-id="490" instrument_node="">; </span><span data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Devarajan et&nbsp;al., 2001</span></span><span data-dcnode-id="487" instrument_node="">) have expressed a neocolonialist mind-set that prescribes the one-size-fits-all solutions inherent in the SAPs. SAPs are “a set of free market economic policy reforms imposed on developing countries by the Bretton Woods institutions: the IMF and the World Bank in the 1980s and 1990s … as a condition for receipt of loans” imposed on almost all sub-Sahara African countries (</span><span data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Gibbon, 1995</span></span><span data-dcnode-id="484" instrument_node="">; </span><span data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Savas, 1987</span></span><span data-dcnode-id="481" instrument_node="">). This led social welfare programs to plummet from massive budgetary cuts in social funding resulting from the economic financial crisis that affected almost all sub-Saharan Africa.</span></p><p data-dcnode-id="469" id="B978008097086828094X-p0075"><span data-dcnode-id="479" instrument_node="">The financial crisis on the continent worsened from the 1970s to the 1990s, causing the social welfare of millions of people to decline to the lowest level ever. According to the Human Development Report (2012), many countries in sub-Saharan Africa ranked low in the Human Development Index, combined with poor measures in human capabilities regarding health, education, and income (p. 16). The inability of many families to acquire food due to lack of agricultural input and disposable income meant millions of people in the region experienced food insecurity at household and personal level, and weakened health status from poor nutrition. In sub-Saharan Africa, 31% of the population was undernourished in 1990–1992 (UN, Millennium Development Goals Report, </span><span data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">2012b</span></span><span data-dcnode-id="476" instrument_node="">). In 1990, over 29% of children under age five were either moderately or severely underweight (UN, Millennium Development Goals Report, </span><span data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">2012b</span></span><span data-dcnode-id="473" instrument_node="">). Hungry children suffer from communicable diseases that are ordinarily preventable and treatable and succumb easily to death. The result is high infant mortality rates. Children in sub-Saharan Africa tend to join school late and drop out early. Malnourished expectant mothers in rural areas far from health facilities face the prospect of death while giving birth. Agricultural production is hampered by ill-health from malnutrition and diseases such as HIV and AIDS, malaria, and tuberculosis, which impact negatively on food production. All these factors feed into a vicious circle of poverty, which has scaled down in other parts of the world, but spiraled out of control in sub-Saharan Africa (</span><span data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Khumalo, 2009</span></span><span data-dcnode-id="470" instrument_node="">).</span></p><p data-dcnode-id="449" id="B978008097086828094X-p0080"><span data-dcnode-id="468" instrument_node="">At the same time, the economic crisis escalated as a result of a burgeoning external debt burden, the brain drain, capital flight, poor balance of payments, rising unemployment, infrastructure deterioration, growing budget deficits, inability to service internal and external debts, social inequalities, rampant inflation, negative interest rates (</span><span data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Ajayi and Khan, 2000</span></span><span data-dcnode-id="465" instrument_node="">) and corruption. Unequal terms of trade contributed to poor growth and caused the continent to become marginalized on the world trade stage and entrenched its position vis-a-vis lack of investment, negative growth, and poor economic performance (</span><span data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Adedeji, 1976, 2002</span></span><span data-dcnode-id="462" instrument_node="">). Dearth of investment in sub-Saharan Africa affected its capacity to export and caused the region to rely primarily on imported goods and services, turning these countries into net importers. The option for salvation, claimed the IMF and World Bank, was for sub-Saharan African nations to encourage a liberalized economic approach that would bring about growth and prosperity in both the short and long terms. The major thrust of the approach was based on growth of the economy, which, it was assumed, would eventually trickle down to deprived groups, including rural poor people. However, before that could happen, the state had to find money to launch a program of&nbsp;economic recovery. Without other ways of paying for it, many sub-Saharan countries were forced to seek financial assistance from the World Bank and IMF as the only source of funding (</span><span data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Gibbon, 1995</span></span><span data-dcnode-id="459" instrument_node="">; </span><span data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Devarajan et&nbsp;al., 2001</span></span><span data-dcnode-id="456" instrument_node="">). Funding came with conditionalities, including strict adherence to the adoption of the market economic model with private sector driven and free-market policies. Without other feasible options, the countries of sub-Sahara Africa were coerced into contracts for&nbsp;loans (</span><span data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Campbell and Loxley, 1989</span></span><span data-dcnode-id="453" instrument_node="">). This led many economies in&nbsp;the&nbsp;region to lose the ability to reorganize and relaunch their&nbsp;development agendas. The scarcity of capital and lack of adequate domestic savings ability led to financial chaos&nbsp;and&nbsp;economic collapse owing to hyperinflation, high unemployment rates, and lack of net investment for growth and development. The balance of payments could not be serviced and accumulated into huge debt, which over time, grew into an interminable debt burden (</span><span data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Ajayi and Khan, 2000</span></span><span data-dcnode-id="450" instrument_node="">). The concomitant offshoots of the crisis included severe shortage of goods and services and general hardships especially diswelfare and falling standards of living. The burden was heavier for rural areas than urban ones.</span></p><div data-dcnode-id="410"><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">The SAPs, as a model of economic recovery based on free market economic policy reforms, consisted of a series of measures that had to be accepted and strictly adhered to by debt-burdened African countries to obtain loans. SAPs were applied to every country in Africa, regardless of its historical, cultural, and material circumstances or particular country context. These SAPs consisted mainly of the following components:</span></p><dl class="article-list" data-dcnode-id="411"><dt data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">1.</span></dt><dd data-dcnode-id="442"><p data-dcnode-id="443" id="B978008097086828094X-p0090"><span data-dcnode-id="444" instrument_node="">Elimination of subsidies</span></p></dd><dt data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">2.</span></dt><dd data-dcnode-id="437"><p data-dcnode-id="438" id="B978008097086828094X-p0095"><span data-dcnode-id="439" instrument_node="">Reduction of public expenditure on social services</span></p></dd><dt data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">3.</span></dt><dd data-dcnode-id="432"><p data-dcnode-id="433" id="B978008097086828094X-p0100"><span data-dcnode-id="434" instrument_node="">Devaluation of national currencies coupled with foreign-exchange auctions</span></p></dd><dt data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">4.</span></dt><dd data-dcnode-id="427"><p data-dcnode-id="428" id="B978008097086828094X-p0105"><span data-dcnode-id="429" instrument_node="">Reliance on free market forces</span></p></dd><dt data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">5.</span></dt><dd data-dcnode-id="422"><p data-dcnode-id="423" id="B978008097086828094X-p0110"><span data-dcnode-id="424" instrument_node="">Privatization of public enterprises</span></p></dd><dt data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">6.</span></dt><dd data-dcnode-id="417"><p data-dcnode-id="418" id="B978008097086828094X-p0115"><span data-dcnode-id="419" instrument_node="">Liberalization of trade and inputs</span></p></dd><dt data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">7.</span></dt><dd data-dcnode-id="412"><p data-dcnode-id="413" id="B978008097086828094X-p0120"><span data-dcnode-id="414" instrument_node="">Downsizing of the public labor force</span></p></dd></dl></div><p data-dcnode-id="399" id="B978008097086828094X-p0125"><span data-dcnode-id="409" instrument_node="">(</span><span data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Adedeji, 2002</span></span><span data-dcnode-id="406" instrument_node="">; </span><span data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Chikulo, 1997</span></span><span data-dcnode-id="403" instrument_node="">; </span><span data-dcnode-id="401"><span data-dcnode-id="402" instrument_node="">Gibbon, 1995, 1993</span></span><span data-dcnode-id="400" instrument_node="">).</span></p><p data-dcnode-id="382" id="B978008097086828094X-p0130"><span data-dcnode-id="398" instrument_node="">The situation is akin to the contemporary phase of economic crisis being experienced in Southern Europe with consequences of extreme reduction in social spending and uneven distribution of incomes (</span><span data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Dominelli, 1990, 2010</span></span><span data-dcnode-id="395" instrument_node="">; </span><span data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Martin, 2012</span></span><span data-dcnode-id="392" instrument_node="">; </span><span data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Papadopoulos, 2012</span></span><span data-dcnode-id="389" instrument_node="">). There is total agreement about the economic crisis that engulfed the economies of sub-Saharan Africa and need to carry out reforms to resolve the crisis. However, disagreement arose over the particular model of economic recovery that had to be implemented. While some observers contend that SAPs were a necessity, others argue the contrary, and categorically believe that another credible alternative could have been implemented to address the continent's economic problem. SAPs were based on nondemocratic and unwarranted harsh methods without regards to the human aspect of development, which led to underdevelopment as is currently occurring in Southern Europe. For example, the UN Economic Commission for Africa provided an all-inclusive and sound alternative to SAPs in 1989 (</span><span data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Adedeji, 2002</span></span><span data-dcnode-id="386" instrument_node="">). This essentially offered an approach to development that considered the plight of humans. Another example was the African Alternative Framework, which called for ‘Adjustment with transformation’. The emphasis in these and similar models was on reducing the continent's reliance on external trade and financing, fostering food self-sufficiency, and promoting popular participation in economic planning and decision making. These all go against the imperialist expectations of the Bretton Woods institutions, their ideology and philosophy as Ioakimidis argued regarding Southern Europe (</span><span data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Ioakimidis, 2011</span></span><span data-dcnode-id="383" instrument_node="">).</span></p><p data-dcnode-id="359" id="B978008097086828094X-p0135"><span data-dcnode-id="381" instrument_node="">SAPs' focus was supposed to correct the economy but it ended up finding new sources of capital accumulation for multinational corporations who initially used the state apparatus in their countries of origin to secure the conditions that suited them. Thus, insufficient attention was paid to the social consequences of the proposed economic growth model with the introduction of free market enterprise to ‘eliminate trade and investment regulations’, improve foreign-exchange income, increase exports, and reduce domestic borrowing and expenditure on subsidies and social welfare. Despite the harsh conditions imposed by the IMF and the World Bank, countries had no choice but to take the loans and strings attached. Many donor countries tied their aid to the adoption of the SAPs (</span><span data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Devarajan et&nbsp;al., 2001</span></span><span data-dcnode-id="378" instrument_node="">; </span><span data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Jordan and Drakeford, 2012</span></span><span data-dcnode-id="375" instrument_node="">). The World Bank and IMF were adamant that the SAPs were necessary to bring about economic development and recovery with the usual ‘trickle down’ theory, which continued to have appeal (</span><span data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Jordan and Drakeford, 2012</span></span><span data-dcnode-id="372" instrument_node="">). In retrospect, the SAPs constituted a project doomed to failure even before it was implemented as argued by many observers (</span><span data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Adedeji, 1999</span></span><span data-dcnode-id="369" instrument_node="">: pp. 521–522, </span><span data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">2002</span></span><span data-dcnode-id="366" instrument_node="">; </span><span data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Dominelli, 1999</span></span><span data-dcnode-id="363" instrument_node="">; </span><span data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Campbell and Loxley, 1989</span></span><span data-dcnode-id="360" instrument_node="">: pp. 1–3).</span></p><p data-dcnode-id="351" id="B978008097086828094X-p0140"><span data-dcnode-id="358" instrument_node="">The countries of Africa were trapped for long periods in a never-ending debt repayment process through which the Bretton Woods institutions ensured rescheduling that enabled the arrangement to continue. The debt servicing design became the order of the day with a constant rise in rates of interest, which </span><span data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">Onimode (1987)</span></span><span data-dcnode-id="355" instrument_node=""> termed a ‘Ponzi scheme’ or fraudulent scam. Payments from debtor nations boosted domestic profits and made possible employment creation for the lenders while indebtedness, unemployment, and poverty in the debtor nations grew by leaps and bounds (</span><span data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Onimode, 1987</span></span><span data-dcnode-id="352" instrument_node="">: vol. 2).</span></p><p data-dcnode-id="325" id="B978008097086828094X-p0145"><span data-dcnode-id="350" instrument_node="">Despite the immense, growing burden caused by the SAPs, the IMF, World Bank, and creditor nations remained oblivious to the harsh economic hardships of poorer countries. This led&nbsp;to global outcry by organizations, individuals, activists, political leaders, the church, and Jubilee 2000 (</span><span data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">http://www.guardian.co.uk/global-development/2011/nov/15/vulture-funds-jersey-decisions</span></span><span data-dcnode-id="347" instrument_node="">; </span><span data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Carrasco et&nbsp;al., 2007</span></span><span data-dcnode-id="344" instrument_node="">) that felt that the debt had caused untold misery among children, women, and older people. Women and children, with their vulnerable socioeconomic positions, bore a disproportionate share of the burden created by SAPs (</span><span data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Mupedziswa and Gumbo, 1998</span></span><span data-dcnode-id="341" instrument_node="">). The world's conscience through leading figures, the Jubilee 2000 Movement and Jeffrey Sachs (</span><span data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">www.sgiquartely.org/feature/2000Jly.5html</span></span><span data-dcnode-id="338" instrument_node="">), and </span><span data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Greene and Khan (1990)</span></span><span data-dcnode-id="335" instrument_node=""> spoke out about the negative aspects of SAPs and made a determined effort to spearhead the cancellation of debt to give the ailing economies of sub-Saharan Africa an opportunity to recover. However, extreme poverty affected millions of people in the region as economies continued to experience deep recession. The absolute number of people living in extreme poverty reached 395&nbsp;million in 2005 but dropped to 386&nbsp;million by 2008 (a 5% reduction), while other regions demonstrated significant reductions in poverty. Nevertheless, the majority of people in sub-Sahara Africa continue to live below the absolute poverty rate of $1.25 a day (Millennium Development Goals Report, </span><span data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">2012b</span></span><span data-dcnode-id="332" instrument_node="">). For those in rural areas, or places of conflict, the debt burden was disproportionate. They faced crumbling infrastructure, lack of food security, relentless poverty, unemployment, and the devastation of diseases such as HIV and AIDS, tuberculosis, and malaria. They were confronted daily by declining life expectancy, unacceptably high rates of maternal and child mortality, and famine; while a few lived in unimaginable luxury, funded through ill-gotten gains, usually in urban areas or abroad. While the donor countries forgave the highly indebted countries by dropping the demand to pay any outstanding debt, nobody knows the extent of the negative impact of the SAPs and concomitant injury caused to the people of Africa. The African situation may sound outdated but should alarm Southern Europe. The crisis will be long and hard with consequences of rising unemployment, budgetary austerity, slowing of domestic economy, growth deficit, and a deterioration in living standards for majority of citizens (</span><span data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Das, 2008</span></span><span data-dcnode-id="329" instrument_node="">; </span><span data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Martin, 2012</span></span><span data-dcnode-id="326" instrument_node="">).</span></p><p data-dcnode-id="320" id="B978008097086828094X-p0150"><span data-dcnode-id="324" instrument_node="">Many groups including nongovernmental and humanitarian and grassroots organizations and churches saw through the actions of donor countries and lending institutions like the IMF and World Bank: the debtor nations were totally incapable of paying back the outstanding loans (</span><span data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Jeffrey Sachs, 2000</span></span><span data-dcnode-id="321" instrument_node="">). The debtor nations had more than paid back the original principal on the loans and the whole exercise of continued paying was a mockery by any standard. The situation led to worsening poverty outcomes and perpetual unequal relations thus entrenching inequalities and ever-growing gap between the rich and poor nations and individuals within sub-Saharan countries themselves.</span></p><p data-dcnode-id="303" id="B978008097086828094X-p0155"><span data-dcnode-id="319" instrument_node="">SAP's schemes led to the emergence of a new form of inequality between debtor and donor nations. Previously the parties had comprised the colonizers and colonized – a correlation, which ended at the time of independence when the countries of sub-Saharan Africa attained sovereign statehood. The new relationship, however, consisted of debtor and creditor countries. This relationship ushered in a new form of colonialism, which essentially ensured continuation of the domination of social, political, cultural, and economic relations by former colonial masters. Although </span><span data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Nkrumah (1965)</span></span><span data-dcnode-id="316" instrument_node=""> warned of such a relationship as neocolonialism and imperialism in which former colonial powers continued to&nbsp;maintain control or hegemony over former colonized countries and thus perpetuate colonialism in a new form, the issue has gone beyond this in the last few decades. Like in Southern Europe, the rise of large multinational corporations that have more economic clout than nation states and the rise of China as a global economic player has made Western governments play into the pockets of financial elites who are unaccountable to none but themselves (</span><span data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">Dominelli, 2009</span></span><span data-dcnode-id="313" instrument_node="">). This situation has led multinational corporations to act with impunity in their fraudulent activities throughout the globe to maintain their influence. Essentially, apart from Botswana, Mauritius, and South Africa the countries of Africa have become locked into new forms of independent/dependent relationships with Western governments and financial institutions. The unequal relationships imposed on these countries have undermined their sovereignty and virtually crafted them into marionettes of the West (</span><span data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Campbell and Loxley, 1989</span></span><span data-dcnode-id="310" instrument_node="">; </span><span data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Onimode, 1987</span></span><span data-dcnode-id="307" instrument_node="">). The end of the Cold War has not substantially altered these political and economic dynamics because developed countries continue to use methods of control over African countries. The entry of China on to the global scene has not changed these power relations, but worsened the situation for African countries (</span><span data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Heller, 2006</span></span><span data-dcnode-id="304" instrument_node="">; Ghosh, 2006).</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="293"><a aria-describedby="tp-snippet-chp-title-B978008097086828094X" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978008097086828094X" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780080970875" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="286"><a class="read-full-chapter-print" data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978008097086828094X" rel="noopener" target="_blank"><span data-dcnode-id="292" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="287"><span data-dcnode-id="290" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="288" instrument_node="">https://www.sciencedirect.com/science/article/pii/B978008097086828094X</span></div></div></article><article class="snippet column" data-dcnode-id="159" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="174"><h2 class="u-font-serif u-text-light" data-dcnode-id="281" id="tp-snippet-chp-title-B9781843345473500011"><a class="anchor" data-aa-name="Introduction: Socio-Economic Development in China – WTO Accession and Related Issues" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843345473500011"><span class="anchor-text" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Introduction: Socio-Economic Development in China – WTO Accession and Related Issues</span></span></a></h2><div class="size-l" data-dcnode-id="175"><cite data-dcnode-id="261"><p data-dcnode-id="262"><span data-dcnode-id="267"><span data-dcnode-id="280" instrument_node="">Parikshit K. </span><span data-dcnode-id="278" instrument_node="">Basu</span><span data-dcnode-id="276" instrument_node="">, </span><span data-dcnode-id="274" instrument_node="">Yapa M.W.Y. </span><span data-dcnode-id="272" instrument_node="">Bandara</span><span data-dcnode-id="270" instrument_node="">, in</span><span data-dcnode-id="268" instrument_node=""> </span></span><a class="anchor" data-aa-name="WTO Accession and Socio-Economic Development in China" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9781843345473/wto-accession-and-socio-economic-development-in-china"><span class="anchor-text" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">WTO Accession and Socio-Economic Development in China</span></span></a><span data-dcnode-id="263" instrument_node="">, 2009</span></p></cite><section data-dcnode-id="176" id="B9781843345473500011-s0015"><h3 data-dcnode-id="255"><span data-dcnode-id="260" instrument_node="">2</span><span data-dcnode-id="258" instrument_node=""> </span><span data-dcnode-id="256" instrument_node="">SOCIO-ECONOMIC IMPACTS OF CHINESE ECONOMIC GROWTH</span></h3><p data-dcnode-id="253" id="B9781843345473500011-p0035"><span data-dcnode-id="254" instrument_node="">There is no doubt that China has achieved miraculous economic growth in the recent past. However, doubts have been raised as to whether the accession to the WTO has significantly increased income and hence the well-being of the average Chinese population. It is also argued that higher income is brought about at a higher cost of deteriorating environmental standards which affect the health of the Chinese people, especially those who live in major industrial cities. Also, there is a wide spread perception that China’s accession to WTO has significantly increased social shocks, especially among the farming community, which comprises 70 per cent of China’s population, and contributed to poor health outcomes among the rural population. Moreover, studies suggest that the inequality in the distribution of economic benefits has widened after the introduction of far reaching economic reforms.</span></p><p data-dcnode-id="237" id="B9781843345473500011-p0040"><span data-dcnode-id="252" instrument_node="">Spatial disparity is one of the widely discussed issues in terms of inequality in recent Chinese economic development. One aspect of the spatial polarisation is in the distribution of FDI itself. It is evident that the majority of the FDI flowing into the country is attracted by the eastern and coastal provinces and, hence, the benefits of economic growth are not trickled down to the people living in the inland and western </span><span data-dcnode-id="251" id="B9781843345473500011-p5"></span><span data-dcnode-id="250" instrument_node="">provinces. As cited in </span><span data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Graham and Wada (2001)</span></span><span data-dcnode-id="247" instrument_node="">, FDI has significantly benefited the coastal regions, while most of the rest of China has benefited much less. </span><span data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Lemoine (2000)</span></span><span data-dcnode-id="244" instrument_node=""> and </span><span data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Dayal-Gulati and Husain (2000)</span></span><span data-dcnode-id="241" instrument_node=""> provided evidence to suggest that this outcome is not wholly the consequence of natural lactational advantages held by the coastal provinces, but it is, in part, the consequences of deliberate Chinese policy. In such a situation, policies more favourable to minimising an unequal distribution of FDI should be formulated and implemented soon. Even more recent studies suggest that this significant unequal FDI distribution still exists, and sufficient policy changes have not been introduced to address the issue. For example, </span><span data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Wei et al (2008)</span></span><span data-dcnode-id="238" instrument_node=""> examined this issue using a large panel dataset covering all the Chinese regions over a much longer period since initial policy reforms in 1978 (1979-2003), and concluded that FDI is highly unevenly distributed across the regions, with a very small share in the west region. Hence, it is this uneven distribution of FDI, rather than FDI itself, that has been the cause for regional income inequality. The study clearly stressed that FDI has to be directed to the west and central regions through preferential policies, and government intervention is needed to create a better environment for absorbing FDI to these relatively backward areas.</span></p><p data-dcnode-id="217" id="B9781843345473500011-p0045"><span data-dcnode-id="236" instrument_node="">Another factor that seems to reinforce the unequal distribution of the economic benefits of policy reforms is some existing policy barriers themselves that inhibit movements of labour between urban and rural areas. As </span><span data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Martin et al (2004)</span></span><span data-dcnode-id="233" instrument_node=""> observed, the Chinese labour market has been adversely affected by the various types of regulations that restrict the movement of workers from rural to urban areas</span><span data-dcnode-id="230"><sup data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">3</span></sup></span><span data-dcnode-id="229" instrument_node="">. Another hindering factor is the restrictions on the sale of farmland usage rights. Due to these restrictions, the farm families that move permanently out of agriculture may have to give up their land rights with no compensation (</span><span data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Martin et al 2004</span></span><span data-dcnode-id="226" instrument_node="">). At the same time, earnings of rural and urban households differ extensively, even for households with labourers of similar skill levels (</span><span data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Sicular and Zhao 2002</span></span><span data-dcnode-id="223" instrument_node="">). Thus, as </span><span data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Martin et al (2004)</span></span><span data-dcnode-id="220" instrument_node=""> pointed out, the significant barriers that exist between urban and rural labour markets, particularly for poor </span><span data-dcnode-id="219" id="B9781843345473500011-p6"></span><span data-dcnode-id="218" instrument_node="">households, depress income levels and make it more difficult for workers to respond positively to economic challenges and opportunities that emerge.</span></p><p data-dcnode-id="209" id="B9781843345473500011-p0050"><span data-dcnode-id="216" instrument_node="">The consequences of the uneven conditions in the Chinese labour market, in the rural sector in particular, should have adverse effects on poverty. Apparently, there exists a sharp contrast between urban and rural households in terms of the incidence of poverty (</span><span data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Martin et al 2004</span></span><span data-dcnode-id="213" instrument_node="">). Studies that reviewed the impact of WTO accession on income distribution and poverty revealed that most urban households and those who are relatively poor in particular, gained more from WTO accession. But it was not the case for rural households, the poorest of which experience noticeable reduction in their living standards. Further, these reductions reflect a combination of falling rural wages and an increase in the prices of goods consumed by poor households. (</span><span data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Chen and Ravallion 2004; Ianchovichina and Martin 2002</span></span><span data-dcnode-id="210" instrument_node="">)</span></p><p data-dcnode-id="198" id="B9781843345473500011-p0055"><span data-dcnode-id="208" instrument_node="">Inequality and the incidence of poverty could easily lead to deterioration in the level of human well-being, including health, education and welfare. Although income inequality in China has been widely studied over the years, existing evidence suggest that studies on the impact of income inequality on other dimensions of human well-being are limited. </span><span data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Zhang and Kanbur (2005)</span></span><span data-dcnode-id="205" instrument_node=""> provided some important insights in this regard. In general, </span><span data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Zhang and Kanbur (2005)</span></span><span data-dcnode-id="202" instrument_node=""> find that inequalities have increased across provinces and within provinces, between rural and urban areas and within rural and urban areas since the beginning of the reforms. Until the 1980s, China’s distributional policies had a strong bias towards urban residents, and compared to the level of social expenditure in cities, rural areas received far less. Despite the government’s certain (and limited) measures to minimise this gap, it seems to be widening with accession to WTO. After the policy reforms, most rural residents have been left out of healthcare coverage of any kind and paying for a health visit has become the norm (</span><span data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">Zhang and Kanbur 2005</span></span><span data-dcnode-id="199" instrument_node="">). This implies that increasing rural income inequality would translate into increasing health inequality, as village authorities do not have much fiscal power to provide public goods and services in poor areas under current fiscal arrangements. With the economic policy reforms, access to education and health care by the rural populace has further declined.</span></p><p data-dcnode-id="192" id="B9781843345473500011-p0060"><span data-dcnode-id="197" id="B9781843345473500011-p7"></span><span data-dcnode-id="196" instrument_node="">In terms of educational disparity, similar patterns have been observed. </span><span data-dcnode-id="194"><span data-dcnode-id="195" instrument_node="">Zhang and Kanbur (2005)</span></span><span data-dcnode-id="193" instrument_node=""> highlighted that rural and urban areas became increasingly polarised during the period 1981-1995. This study finds that the rural regional income inequality, measured by the Gini coefficient, increased form 13.7 per cent to 24.1 per cent during the period 1978-1998, while the Gini coefficient of rural illiteracy worsened even more rapidly from 14.5 per cent to 32.4 per cent during the same period. It also points out that the regional inequality in the provision of public education has increased since the late 1970s.</span></p><p data-dcnode-id="181" id="B9781843345473500011-p0065"><span data-dcnode-id="191" instrument_node="">Education is a vital area that shapes the future of a country. The Chinese education system is undergoing significant changes since the opening up of the economy in late-1970s. WTO membership has hastened the process. Confucianism is the cornerstone of traditional Chinese culture and the Chinese learning and teaching style that reflects its history and culture. The Confucian tradition advocates the value of education as seeking ultimate perfection or attaining sagehood. This refers to developing one’s potential to the fullest extent (</span><span data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Cooper 2007</span></span><span data-dcnode-id="188" instrument_node="">). Along with far reaching policy reforms in the Chinese economy, the education system in China is also being internationalised – both in terms of the style of learning and language. The popularity of the English language has accelerated at a phenomenal rate in the last fifty years and the teaching of English as a foreign language has become a major growth industry in China (</span><span data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Crystal 1997</span></span><span data-dcnode-id="185" instrument_node="">). English has taken up a position of power and knowledge – it is not so much as to how many speak the language but who, where and how they are positioned in the world. There is a close link between language and power and English has a confirmed power base. However, the implementation of the program in China has not been without conflict. Like any language, English is also shaped by historical, cultural, social, and political contexts (</span><span data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Pennycook 1994</span></span><span data-dcnode-id="182" instrument_node="">). History and culture have had a very strong influence in the teaching of the English language, or teaching generally, and the learning processes in China. Along with the language, the Western system of education is also impacting Chinese society through its growing popularity among the younger generation.</span></p><p data-dcnode-id="177" id="B9781843345473500011-p0070"><span data-dcnode-id="180" instrument_node="">Thus, the debate on the costs and benefits of the recent economic development in China has been far from over. More studies on the issues related to the distribution of </span><span data-dcnode-id="179" id="B9781843345473500011-p8"></span><span data-dcnode-id="178" instrument_node="">economic benefits to the populace, and the possible corrective policy measures, will emerge. The consensus today is more in line with the need for policy options that could minimise regional differences. This book will find itself a contributor to this course.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="167"><a aria-describedby="tp-snippet-chp-title-B9781843345473500011" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9781843345473500011" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9781843345473" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="169"><span data-dcnode-id="170" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print
