-edited by Soumitra Dutta, Bruno Lanvin,4 and Sacha Wunsch-Vincent.51Executive Dean, School of Innovation and Entrepreneurship, Peking University.2Associate Researcher, Institute of Quantitative Technical Economics, Chinese Academy of Social Sciences.3Associate Dean, School of Innovation and Entrepreneurship, Peking University.4Executive Director—Global Indices, INSEAD, Fontainebleau, France." data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="4155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128040256000034"><span class="anchor-text" data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">The Impact of Science and Technology Policies on Rapid Economic Development in China**This chapter is authored by Dongmin Chen,1 Shilin Zheng,2 and Lei Guo.3 The chapter has been adapted from an earlier version which appeared in the “Global Innovation Index 2015: Effective Innovation Policies for Development”, Chapter 6, pages 105–112 published by WIPO, Geneva, 2015. The Global Innovation Index 2015 report was co-edited by Soumitra Dutta, Bruno Lanvin,4 and Sacha Wunsch-Vincent.51Executive Dean, School of Innovation and Entrepreneurship, Peking University.2Associate Researcher, Institute of Quantitative Technical Economics, Chinese Academy of Social Sciences.3Associate Dean, School of Innovation and Entrepreneurship, Peking University.4Executive Director—Global Indices, INSEAD, Fontainebleau, France.</span></span></a></h2><div class="size-l" data-dcnode-id="4111"><cite data-dcnode-id="4134"><p data-dcnode-id="4135"><span data-dcnode-id="4140"><span data-dcnode-id="4153" instrument_node="">Lourdes </span><span data-dcnode-id="4151" instrument_node="">Casanova</span><span data-dcnode-id="4149" instrument_node="">, ... </span><span data-dcnode-id="4147" instrument_node="">Soumitra </span><span data-dcnode-id="4145" instrument_node="">Dutta</span><span data-dcnode-id="4143" instrument_node="">, in</span><span data-dcnode-id="4141" instrument_node=""> </span></span><a class="anchor" data-aa-name="Financing Entrepreneurship and Innovation in Emerging Markets" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="4137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/book/9780128040256/financing-entrepreneurship-and-innovation-in-emerging-markets"><span class="anchor-text" data-dcnode-id="4138"><span data-dcnode-id="4139" instrument_node="">Financing Entrepreneurship and Innovation in Emerging Markets</span></span></a><span data-dcnode-id="4136" instrument_node="">, 2018</span></p></cite><section data-dcnode-id="4112" id="B9780128040256000034-s0010"><h3 data-dcnode-id="4128"><span data-dcnode-id="4133" instrument_node="">3.1</span><span data-dcnode-id="4131" instrument_node=""> </span><span data-dcnode-id="4129" instrument_node="">Overview</span></h3><p data-dcnode-id="4115" id="B9780128040256000034-p0030"><span data-dcnode-id="4127" instrument_node="">Policy reform and innovation are key drivers of China’s remarkable economic growth.</span><span data-dcnode-id="4124"><sup data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">6</span></sup></span><span data-dcnode-id="4123" instrument_node=""> Since 1978, China has implemented a series of large-scale science and technology (S&amp;T) reforms that accelerated progress in higher education and research and development (R&amp;D). Thirty years of ongoing economic reforms have resulted in an average annual economic growth rate of more than 9%,</span><span data-dcnode-id="4120"><sup data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">7</span></sup></span><span data-dcnode-id="4119" instrument_node=""> an astonishing accomplishment for the country. In 2010, China’s Gross Domestic Product (GDP) surpassed Japan’s, making China the world’s second-largest economy. By 2014, China’s GDP reached $10 trillion: as of publication, it is one of only two countries in the world to have attained this level—the other is the United States.</span><span data-dcnode-id="4116"><sup data-dcnode-id="4117"><span data-dcnode-id="4118" instrument_node="">8</span></sup></span></p><p data-dcnode-id="4113" id="B9780128040256000034-p0035"><span data-dcnode-id="4114" instrument_node="">However, the 2008 global financial crisis disrupted the high growth rate of China’s manufacturing-based economy, which adapts or imitates traditional technologies from developed economies. As a result of this crisis, China was pressed to make structural economic reforms focused on building domestic innovation infrastructure, and increasing the competitiveness of its domestic research institutions. These updated policies have greatly influenced the country’s continuing economic development. In 2017, the Global Innovation Index (GII) ranked China at 22nd place worldwide. China also leads substantially in innovation among the BRICS nations (Brazil, Russia, India, China, and South Africa). China’s strongest index on the GII is in the Knowledge &amp; technology outputs pillar, in which it ranked 4th in 2017. This chapter provides an overview and analysis of the evolution of China’s S&amp;T policies and their impact over the past three decades. It also examines a new phase of policy change that could have extensive impacts in the coming decade.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="4103"><a aria-describedby="tp-snippet-chp-title-B9780128040256000034" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128040256000034" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="4104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780128040256" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="4096"><a class="read-full-chapter-print" data-dcnode-id="4101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780128040256000034" rel="noopener" target="_blank"><span data-dcnode-id="4102" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="4097"><span data-dcnode-id="4100" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="4098" instrument_node="">https://www.sciencedirect.com/science/article/pii/B9780128040256000034</span></div></div></article><article class="snippet column" data-dcnode-id="4049" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="4064"><h2 class="u-font-serif u-text-light" data-dcnode-id="4091" id="tp-snippet-chp-title-B978012373960500407X"><a class="anchor" data-aa-name="Worker Health and Safety, International Issues" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978012373960500407X"><span class="anchor-text" data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">Worker Health and Safety, International Issues</span></span></a></h2><div class="size-l" data-dcnode-id="4065"><cite data-dcnode-id="4077"><p data-dcnode-id="4078"><span data-dcnode-id="4083"><span data-dcnode-id="4090" instrument_node="">L. </span><span data-dcnode-id="4088" instrument_node="">London</span><span data-dcnode-id="4086" instrument_node="">, in</span><span data-dcnode-id="4084" instrument_node=""> </span></span><a class="anchor" data-aa-name="International Encyclopedia of Public Health" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="4080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/referencework/9780123739605/international-encyclopedia-of-public-health"><span class="anchor-text" data-dcnode-id="4081"><span data-dcnode-id="4082" instrument_node="">International Encyclopedia of Public Health</span></span></a><span data-dcnode-id="4079" instrument_node="">, 2008</span></p></cite><section data-dcnode-id="4066" id="B978012373960500407X-s0045"><h3 data-dcnode-id="4075"><span data-dcnode-id="4076" instrument_node="">Human Resources</span></h3><p data-dcnode-id="4067" id="B978012373960500407X-p0140"><span data-dcnode-id="4074" instrument_node="">Economic policy reform under globalization has also been synonymous with cutbacks on government spending and reductions in employment levels of public servants. Yet the control of occupational hazards requires a suitably qualified human resource base, particularly in developing countries where globalization has driven the expansion of sectors that are particularly difficult to regulate (viz., informal sector and precarious work). </span><span data-dcnode-id="4069"><span data-dcnode-id="4073" instrument_node="">Rantanen </span><em data-dcnode-id="4071"><span data-dcnode-id="4072" instrument_node="">et al</span></em><span data-dcnode-id="4070" instrument_node="">. (2004)</span></span><span data-dcnode-id="4068" instrument_node=""> argue that the ‘brain drain’ of occupational health professionals from developed to developing countries remains a key concern and this will have been exacerbated by the impact of HIV on the workforce of developing countries most affected by AIDS. Even though data on the pull and push factors specific to occupational health professional migration is scant, there is little reason to believe that occupational medicine and hygiene practitioners would be any different than colleagues in other health-care settings, who have left unsafe, unrewarding, and poorly remunerated jobs and moved in large numbers to countries of the north. Given the role of OHS in maintaining workplace productivity, failure to invest in occupational health capacity and retain human resources for occupational health will have adverse implications, not only for human health and the environment, but also for sustainability of economic development. These effects are experienced in precisely those countries with the most vulnerable economies in our globalized environment.</span></p></section></div></div><div class="snippet-ctas u-remove-if-print" data-dcnode-id="4057"><a aria-describedby="tp-snippet-chp-title-B978012373960500407X" class="view-chapter-button link-button link-button-primary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-snippet-read-full-chp" data-dcnode-id="4061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978012373960500407X" rel="noreferrer noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="4062"><span data-dcnode-id="4063" instrument_node="">View chapter</span></span></a><a class="link-button link-button-secondary column-width-in-sm-and-md" data-aa-name="" data-aa-region="aa-tp-purchase-book" data-dcnode-id="4058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.elsevier.com/books/T/A/9780123739605" rel="noopener" role="button" target="_blank"><span class="link-button-text" data-dcnode-id="4059"><span data-dcnode-id="4060" instrument_node="">Purchase book</span></span></a></div><div class="u-remove-if-not-print" data-dcnode-id="4050"><a class="read-full-chapter-print" data-dcnode-id="4055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B978012373960500407X" rel="noopener" target="_blank"><span data-dcnode-id="4056" instrument_node="">Read full chapter</span></a><div class="chapter-url-print" data-dcnode-id="4051"><span data-dcnode-id="4054" instrument_node="">URL:&nbsp;</span><span data-dcnode-id="4052" instrument_node="">https://www.sciencedirect.com/science/article/pii/B978012373960500407X</span></div></div></article><article class="snippet column" data-dcnode-id="843" style="padding-right: 0px; padding-left: 40px; float: right;"><div class="snippet-content" data-dcnode-id="858"><h2 class="u-font-serif u-text-light" data-dcnode-id="4045" id="tp-snippet-chp-title-B9780444595683000274"><a class="anchor" data-aa-name="Handbook of Computable General Equilibrium Modeling SET, Vols. 1A and 1B" data-aa-region="aa-tp-snippet-chp-title" data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/B9780444595683000274"><span class="anchor-text" data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">Handbook of Computable General Equilibrium Modeling SET, Vols. 1A and 1B</span></span></a></h2><div class="size-l" data-dcnode-id="859"><cite data-dcnode-id="4025"><p data-dcnode-id="4026"><span data-dcnode-id="4031"><span data-dcnode-id="4044" instrument_node="">Hans </span><span data-dcnode-id="4042" instrument_node="">Fehr</span><span data-dcnode-id="4040" instrument_node="">, ... </span><span data-dcnode-id="4038" instrument_node="">Laurence J. </span><span data-dcnode-id="4036" instrument_node="">Kotlikoff</span><span data-dcnode-id="4034" instrument_node="">, in</span><span data-dcnode-id="4032" instrument_node=""> </span></span><a class="anchor" data-aa-name="Handbook of Computable General Equilibrium Modeling" data-aa-region="aa-tp-snippet-bk-title" data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/handbook/handbook-of-computable-general-equilibrium-modeling"><span class="anchor-text" data-dcnode-id="4029"><span data-dcnode-id="4030" instrument_node="">Handbook of Computable General Equilibrium Modeling</span></span></a><span data-dcnode-id="4027" instrument_node="">, 2013</span></p></cite><section data-dcnode-id="860" id="B9780444595683000274-s0210"><h3 data-dcnode-id="4019"><span data-dcnode-id="4024" instrument_node="">27.4.3.1</span><span data-dcnode-id="4022" instrument_node=""> </span><span data-dcnode-id="4020" instrument_node="">Macroeconomic effects</span></h3><div data-dcnode-id="3263"><p data-dcnode-id="4014" id="B9780444595683000274-p0720"><span data-dcnode-id="4018" instrument_node="">The first policy reform assumes a gradual phase-out of the public pension system over a period of 40 years, i.e. pension replacement rates are linearly reduced to reach zero for new retirees from 2049 onwards. The simulation results are reported in the upper part of </span><span data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Table 27.19</span></span><span data-dcnode-id="4015" instrument_node="">. Not surprisingly, the privatization of the pension system in the US leads to a major reduction of the payroll tax burden. In 2060, this decline is almost 15 percentage points. Lower tax burdens translate in higher capital formation. There is however only a minor increase in the capital stock until mid-century and in 2060 it is even 1% lower than in the baseline path. This seems surprising, but can be explained when looking at the results of the other four regions. They obviously can increase their capital stocks over time since the higher capital supply of the US is shared internationally. Capital mainly flows to the Asian economies so that in 2060 the capital stock in China is 6.6% and in NEA 5.9% above its respective baseline value. This also translates into higher GDP growth in the Asian regions and smaller long-run GDP in the US. Note also the changes in skill-specific labor demand. Since less capital is now employed in the US, production of traded goods switches to the investment good sector which is less capital and high-skilled labor intensive, but uses more low- and medium-skilled labor. As a consequence, labor demand for high-skilled workers in the US is reduced and increases for the other both skill classes. The exactly opposite happens in the other regions especially in China.</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="3264" id="B9780444595683000274-t0100"><span class="captions" data-dcnode-id="4006"><span data-dcnode-id="4007"><p data-dcnode-id="4008" id="B9780444595683000274-tspara0110"><span class="label" data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">Table 27.19</span></span><span data-dcnode-id="4011" instrument_node="">. </span><span data-dcnode-id="4009" instrument_node="">Privatization of pension systems</span></p></span></span><div class="groups" data-dcnode-id="3274"><table data-dcnode-id="3275"><thead data-dcnode-id="3953"><tr class="rowsep-1 valign-top" data-dcnode-id="3988"><th data-dcnode-id="4005" scope="col"></th><th data-dcnode-id="4004" scope="col"></th><th data-dcnode-id="4003" scope="col"></th><th data-dcnode-id="4001" scope="col"><span data-dcnode-id="4002" instrument_node="">Capital</span></th><th class="rowsep-1" colspan="3" data-dcnode-id="3997" scope="col"><span data-dcnode-id="4000" instrument_node="">Labor demand</span><sup data-dcnode-id="3998"><span data-dcnode-id="3999" instrument_node="">a</span></sup></th><th data-dcnode-id="3995" scope="col"><span data-dcnode-id="3996" instrument_node="">Effective wage</span></th><th data-dcnode-id="3993" scope="col"><span data-dcnode-id="3994" instrument_node="">Payroll</span></th><th data-dcnode-id="3991" scope="col"><span data-dcnode-id="3992" instrument_node="">Average wage</span></th><th data-dcno n><span data-dcnode-id="2827" instrument_node=""> suggests, there are only modest effects on the economic development in the US. Effective wage tax rates are reduced compared to the baseline path. In 2060, this decline is 7.8 percentage points. The lower tax rates do not manifest themselves in higher GDPs. The reason is income effects on labor supply; agents in our model respond to their tax cuts by consuming more leisure, not working harder, which leaves aggregate output little changed from the baseline case. Obviously, factor prices are hardly changed in this unilateral policy reform (see </span><span data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">Table 27.20</span></span><span data-dcnode-id="2824" instrument_node="">). Since there are only minor international spillover effects, we do not report the simulation results for the other regions.</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="2341" id="B9780444595683000274-t0110"><span class="captions" data-dcnode-id="2815"><span data-dcnode-id="2816"><p data-dcnode-id="2817" id="B9780444595683000274-tspara0130"><span class="label" data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">Table 27.21</span></span><span data-dcnode-id="2820" instrument_node="">. </span><span data-dcnode-id="2818" instrument_node="">Limiting growth in healthcare benefits</span></p></span></span><div class="groups" data-dcnode-id="2351"><table data-dcnode-id="2352"><thead data-dcnode-id="2762"><tr class="rowsep-1 valign-top" data-dcnode-id="2797"><th class="align-char" data-dcnode-id="2814" scope="col"></th><th data-dcnode-id="2813" scope="col"></th><th data-dcnode-id="2812" scope="col"></th><th data-dcnode-id="2810" scope="col"><span data-dcnode-id="2811" instrument_node="">Capital</span></th><th class="rowsep-1" colspan="3" data-dcnode-id="2806" scope="col"><span data-dcnode-id="2809" instrument_node="">Labor demand</span><sup data-dcnode-id="2807"><span data-dcnode-id="2808 ly adjusting wage and consumption tax rates as in the baseline path. Thus, the intercept and the progressive term of the wage tax formula as well as the consumption tax rates are frozen at their year-2008 level until 2028 and are endogenously adjusted again from year 2029 onwards to balance the government’s budget. During the period 2009 and 2028 the public deficit is calculated endogenously given tax revenues. The new debt to output ratio reached at the beginning of year 2029 is kept fixed over the remaining years of the transition.</span></p><div data-dcnode-id="1847"><p data-dcnode-id="2330" id="B9780444595683000274-p0740"><span data-dcnode-id="2337" instrument_node="">When government expenditures are financed by public debt, US debt increases from initially 70% of GDP to 153% from 2029 onwards. Higher debt implies much higher wage and consumption tax rates in the medium and long run in order to finance increased interest payments. As reported in </span><span data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Table 27.22</span></span><span data-dcnode-id="2334" instrument_node="">, the average wage tax rate increases by 5.6 percentage points and the consumption tax rate by 7.6 percentage points in 2060 compared to their respective baseline values. As one would have expected, this development leads to lower capital and labor demand and thus smaller GDP in the medium run. In 2040, the US capital stock is 5% below the respective baseline value and GDP is reduced by 4.6%. However, in the longer run the capital stock is hardly changed compared to the baseline path. The reason is that less capital is invested abroad in order to pay for the higher debt burden. Consequently, capital stocks in the other four regions decline with respect to their baseline values. This development increases US labor demand and GDP, which improves by 2.6% compared to the year-2060 baseline level. The smaller worldwide capital supply increases the medium- and long-run interest rate, and decreases the wage rates for all three skill classes accordingly (see </span><span data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">Table 27.20</span></span><span data-dcnode-id="2331" instrument_node="">).</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="1848" id="B9780444595683000274-t0115"><span class="captions" data-dcnode-id="2322"><span data-dcnode-id="2323"><p data-dcnode-id="2324" id="B9780444595683000274-tspara0140"><span class="label" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Table 27.22</span></span><span data-dcnode-id="2327" instrument_node="">. </span><span data-dcnode-id="2325" instrument_node="">Debt financing of public expenditures</span></p></span></span><div class="groups" data-dcnode-id="1858"><table data-dcnode-id="1859"><thead data-dcnode-id="2269"><tr class="rowsep-1 valign-top" data-dcnode-id="2304"><th class="align-char" data-dcnode-id="2321" scope="col"></th><th data-dcnode-id="2320" scope="col"></th><th data-dcnode-id="2319" scope="col"></th><th data-dcnode-id="2317" scope="col"><span data-dcnode-id="2318" instrument_node="">Capital</span></th><th class="rowsep-1" colspan="3" data-dcnode-id="2313" scope="col"><span data-dcnode-id="2316" instrument_node="">Labor demand</span><sup data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">a</span></sup></th><th data-dcnode-id="2311" scope="col"><span data-dcnode-id="2312" instrument_node="">Effective wage</span></th><th data-dcnode-id="2309" scope="col"><span data-dcnode-id="2310" instrument_node="">Payroll</span></th><th data-dcnode-id="2307" scope="col"><span data-dcnode-id="2308" instrument_node="">Average Wage</span></th><th data-dcnode-id="2305" scope="col"><span data-dcnode-id="2306" instrument_node="">Consumption</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="2270"><th data-dcnode-id="2303" scope="col"></th><th data-dcnode-id="2301" scope="col"><span data-dcnode-id="2302" -id="1894"><span data-dcnode-id="1895" instrument_node="">0.2</span></td><td class="align-char" data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">0.1</span></td><td data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">−0.8</span></td><td class="align-char" data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">0.0</span></td><td data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">−0.2</span></td><td data-dcnode-id="1884"><span data-dcnode-id="1885" instrument_node="">−1.0</span></td></tr><tr class="valign-top" data-dcnode-id="1861"><td data-dcnode-id="1882"></td><td class="align-char" data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">2060</span></td><td data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">−0.6</span></td><td data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">−0.9</span></td><td data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">−0.3</span></td><td data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">−0.5</span></td><td data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">−0.5</span></td><td data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">−1.0</span></td><td class="align-char" data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">0.0</span></td><td data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">−0.2</span></td><td data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">−1.4</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="1849"></p><p data-dcnode-id="1850" id="B9780444595683000274-tspara0145"><span data-dcnode-id="1857" instrument_node="">Changes to the respective baseline values in </span><sup data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">a</span></sup><span data-dcnode-id="1854" instrument_node="">percent or </span><sup data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">b</span></sup><span data-dcnode-id="1851" instrument_node="">percentage points.</span></p><p></p></div></div><p data-dcnode-id="1845" id="B9780444595683000274-p0745"><span data-dcnode-id="1846" instrument_node="">The final scenarios are motivated by recent government policies to deal with the financial and economic crisis. In order to stabilize the economy all developed countries increased their government expenditures dramatically. The question of course is how these hikes in government expenses should be financed in the medium and long term. One way is to raise general taxes. The other way that most countries are currently following is to increase public debt. Of course, both alternatives lead to different macroeconomic and distributional effects.</span></p><p data-dcnode-id="1843" id="B9780444595683000274-p0750"><span data-dcnode-id="1844" instrument_node="">In the following, we therefore analyze how the different alternatives to finance the hike in public expenditures affect the economic development in our globalized world. Precisely, we assume an immediate increase of government expenditures (except the share of health benefits financed by general tax revenues) by 20%, which is maintained during the whole transition path. We then distinguish two options to finance the higher expenses: (i) They are financed by letting endogenous (wage and consumption) taxes balance the government budget, and (ii) Government expenditures are financed by public debt over a period of 10 years while wage and consumption tax rates are fixed during this time and adjust endogenously again from 2019 onwards.</span></p><div data-dcnode-id="1355"><p data-dcnode-id="1838" id="B9780444595683000274-p0755"><span data-dcnode-id="1842" instrument_node="">Consider first the closure of the US government’s budget by taxes as shown in </span><span data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">Table 27.23</span></span><span data-dcnode-id="1839" instrument_node="">. The 20% increase in education and remaining government expenditures means a sudden increase in overall expenditures in the US by 2.1% of GDP. In 2060, US government expenditures amount to 22.7% of GDP instead of 20.7% as in the baseline. Average wage tax rates in the US are raised by 1.6 percentage points during the baseline. The consumption tax rate in 2060 is 2.5 percentage points above its baseline value. The effects on the capital stock, labor demand and GDP are rather small. Also, factor prices remain fairly unchanged in this reform scenario.</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="1356" id="B9780444595683000274-t0120"><span class="captions" data-dcnode-id="1830"><span data-dcnode-id="1831"><p data-dcnode-id="1832" id="B9780444595683000274-tspara0150"><span class="label" data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Table 27.23</span></span><span data-dcnode-id="1835" instrument_node="">. </span><span data-dcnode-id="1833" instrument_node="">Hike in government expenditures financed by taxes</span></p></span></span><div class="groups" data-dcnode-id="1366"><table data-dcnode-id="1367"><thead data-dcnode-id="1777"><tr class="rowsep-1 valign-top" data-dcnode-id="1812"><th class="align-char" data-dcnode-id="1829" scope="col"></th><th data-dcnode-id="1828" scope="col"></th><th data-dcnode-id="1827" scope="col"></th><th data-dcnode-id="1825" scope="col"><span data-dcnode-id="1826" instrument_node="">Capital</span></th><th class="rowsep-1" colspan="3" data-dcnode-id="1821" scope="col"><span data-dcnode-id="1824" instrument_node="">Labor demand</span><sup data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">a</span></sup></th><th data-dcnode-id="1819" scope="col"><span data-dcnode-id="1820" instrument_node="">Effective wage</span></th><th data-dcnode-id="1817" scope="col"><span data-dcnode-id="1818" instrument_node="">Payroll</span></th><th data-dcnode-id="1815" scope="col"><span dat  to finance higher interest payments taxes have to increase in the medium and long run. Thus, in 2060 the average wage tax rate is now 5.2 percentage points above its respective baseline value and the consumption tax rate is increased by 8 percentage points. The macroeconomic effects are very similar to those shown in the scenario where the budget was financed by public debt without assuming a hike in government expenditures. The large tax increases lead to a reduced capital stock, labor demand and GDP in the medium run. However, after 2040 the capital stock recovers and labor demand exceeds the baseline values in all skill levels. Consequently, the US GDP level is increased by 3.1% in 2060. The reason for this development is that less capital flows from the US to the emerging markets. The lower capital formation in the US means a decrease in worldwide capital supply so that the interest rate is slightly increased during the transition path as reported in </span><span data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Table 27.20</span></span><span data-dcnode-id="1345" instrument_node="">. Consequently, the wage rates of all three income classes are suppressed slightly.</span></p><div class="tables colsep-0 rowsep-0 frame-topbot" data-dcnode-id="862" id="B9780444595683000274-t0125"><span class="captions" data-dcnode-id="1336"><span data-dcnode-id="1337"><p data-dcnode-id="1338" id="B9780444595683000274-tspara0160"><span class="label" data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">Table 27.24</span></span><span data-dcnode-id="1341" instrument_node="">. </span><span data-dcnode-id="1339" instrument_node="">Hike in government expenditures financed by debt</span></p></span></span><div class="groups" data-dcnode-id="872"><table data-dcnode-id="873"><thead data-dcnode-id="1283"><tr class="rowsep-1 valign-top" data-dcnode-id="1318"><th class="align-char" data-dcnode-id="1335" scope="col"></th><th data-dcnode-id="1334" scope="col"><
