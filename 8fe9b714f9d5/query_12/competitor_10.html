nt in Australian textile, clothing and footwear manufacturing (thousands of people) since 1984</span></div></div></div><span data-dcnode-id="3471" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3470" instrument_node="">Until </span><a data-dcnode-id="3468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Free_trade" title="Free trade"><span data-dcnode-id="3469" instrument_node="">trade liberalisation</span></a><span data-dcnode-id="3467" instrument_node=""> in the mid 1980s, Australia had a large </span><a data-dcnode-id="3465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Textile" title="Textile"><span data-dcnode-id="3466" instrument_node="">textile</span></a><span data-dcnode-id="3464" instrument_node=""> industry</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3457" style="white-space:nowrap;"><span data-dcnode-id="3463" instrument_node="">[</span><i data-dcnode-id="3459"><a data-dcnode-id="3460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3461" title="This claim needs references to reliable sources. (February 2010)"><span data-dcnode-id="3462" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3458" instrument_node="">]</span></sup><span data-dcnode-id="3456" instrument_node="">.  This decline continued through the first decade of the 21st century.</span><sup class="reference" data-dcnode-id="3453" id="cite_ref-trends07_42-0"><a data-dcnode-id="3454" href="#cite_note-trends07-42"><span data-dcnode-id="3455" instrument_node="">[42]</span></a></sup><span data-dcnode-id="3452" instrument_node=""> Since the 1980s, tariffs have steadily been reduced; in early 2010, the tariffs were reduced from 17.5 to 10 percent on clothing, and 7.5–10% to 5% for footwear and other textiles.</span><sup class="reference" data-dcnode-id="3449" id="cite_ref-43"><a data-dcnode-id="3450" href="#cite_note-43"><span data-dcnode-id="3451" instrument_node="">[43]</span></a></sup><span data-dcnode-id="3448" instrument_node="">
As of 2010, most textile manufacturing, even by Australian companies, is performed in Asia.
</span></p><span data-dcnode-id="3446" instrument_node="">
</span><h3 data-dcnode-id="3436"><span class="mw-headline" data-dcnode-id="3444" id="Mining"><span data-dcnode-id="3445" instrument_node="">Mining</span></span><span class="mw-editsection" data-dcnode-id="3437"><span class="mw-editsection-bracket" data-dcnode-id="3442"><span data-dcnode-id="3443" instrument_node="">[</span></span><a data-dcnode-id="3440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D15" title="Edit section: Mining"><span data-dcnode-id="3441" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3435" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3434" instrument_node="">The economic rise of China has produced a major demand for mining products, especially iron ore and coal.</span><sup class="reference" data-dcnode-id="3431" id="cite_ref-44"><a data-dcnode-id="3432" href="#cite_note-44"><span data-dcnode-id="3433" instrument_node="">[44]</span></a></sup><span data-dcnode-id="3430" instrument_node="">
</span></p><span data-dcnode-id="3428" instrument_node="">
</span><h4 data-dcnode-id="3418"><span class="mw-headline" data-dcnode-id="3426" id="Iron"><span data-dcnode-id="3427" instrument_node="">Iron</span></span><span class="mw-editsection" data-dcnode-id="3419"><span class="mw-editsection-bracket" data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">[</span></span><a data-dcnode-id="3422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D16" title="Edit section: Iron"><span data-dcnode-id="3423" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3417" instrument_node="">
</span><p data-dcnode-id="3383"><a data-dcnode-id="3415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Geoscience_Australia" title="Geoscience Australia"><span data-dcnode-id="3416" instrument_node="">Geoscience Australia</span></a><span data-dcnode-id="3414" instrument_node=""> calculates that the country's "</span><a class="mw-redirect" data-dcnode-id="3412" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_demonstrated_resources" title="Economic demonstrated resources"><span data-dcnode-id="3413" instrument_node="">economic demonstrated resources</span></a><span data-dcnode-id="3411" instrument_node="">" of iron currently amount to 24 </span><a data-dcnode-id="3409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tonne%23Derived_units" title="Tonne"><span data-dcnode-id="3410" instrument_node="">gigatonnes</span></a><span data-dcnode-id="3408" instrument_node="">, or 24&nbsp;billion tonnes.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="3401" style="white-space:nowrap;"><span data-dcnode-id="3407" instrument_node="">[</span><i data-dcnode-id="3403"><a data-dcnode-id="3404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="3405" title="This claim needs references to reliable sources. (February 2012)"><span data-dcnode-id="3406" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="3402" instrument_node="">]</span></sup><span data-dcnode-id="3400" instrument_node=""> The current production rate from the </span><a data-dcnode-id="3398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pilbara" title="Pilbara"><span data-dcnode-id="3399" instrument_node="">Pilbara</span></a><span data-dcnode-id="3397" instrument_node=""> region of </span><a data-dcnode-id="3395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Western_Australia" title="Western Australia"><span data-dcnode-id="3396" instrument_node="">Western Australia</span></a><span data-dcnode-id="3394" instrument_node=""> is approximately 430&nbsp;million tonnes a year and rising. Gavin Mudd (</span><a data-dcnode-id="3392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monash_University" title="Monash University"><span data-dcnode-id="3393" instrument_node="">Monash University</span></a><span data-dcnode-id="3391" instrument_node="">) and Jonathon Law (</span><a data-dcnode-id="3389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/CSIRO" title="CSIRO"><span data-dcnode-id="3390" instrument_node="">CSIRO</span></a><span data-dcnode-id="3388" instrument_node="">) expect it to be gone within 30–50 years and 56 years, respectively.</span><sup class="reference" data-dcnode-id="3385" id="cite_ref-45"><a data-dcnode-id="3386" href="#cite_note-45"><span data-dcnode-id="3387" instrument_node="">[45]</span></a></sup><span data-dcnode-id="3384" instrument_node=""> These 2010 estimates require on-going review to take into account shifting demand for lower-grade iron ore and improving mining and recovery techniques (allowing deeper mining below the groundwater table).
</span></p><p data-dcnode-id="3377"><span data-dcnode-id="3382" instrument_node="">Tensions remain high between management and labor unions.</span><sup class="reference" data-dcnode-id="3379" id="cite_ref-46"><a data-dcnode-id="3380" href="#cite_note-46"><span data-dcnode-id="3381" instrument_node="">[46]</span></a></sup><span data-dcnode-id="3378" instrument_node="">
</span></p><span data-dcnode-id="3376" instrument_node="">
</span><h4 data-dcnode-id="3366"><span class="mw-headline" data-dcnode-id="3374" id="Coal"><span data-dcnode-id="3375" instrument_node="">Coal</span></span><span class="mw-editsection" data-dcnode-id="3367"><span class="mw-editsection-bracket" data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">[</span></span><a data-dcnode-id="3370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D17" title="Edit section: Coal"><span data-dcnode-id="3371" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3368"><span data-dcnode-id="3369" instrument_node="">]</span></span></span></h4><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3352"><span data-dcnode-id="3364" instrument_node="">In 1984 Australia surpassed the US as the world's largest coal exporter.</span><sup class="reference" data-dcnode-id="3361" id="cite_ref-47"><a data-dcnode-id="3362" href="#cite_note-47"><span data-dcnode-id="3363" instrument_node="">[47]</span></a></sup><span data-dcnode-id="3360" instrument_node="">  One-third of Australia's coal exports were shipped from the Hunter Valley region of New South Wales, where coal mining and transport had begun nearly two centuries earlier. Coal River was the first name given by British settlers to the Hunter River after coal was found there in 1795. In 1804 the Sydney-based administration established a permanent convict settlement near the mouth of the Hunter River to mine and load the coal, predetermining the town's future as a coal port by naming it Newcastle. Today, Newcastle, NSW, is the largest coal port in the world. Now the state of Queensland is Australia's top coal producer, with its Bowen Basin the main source of black coal, and plans by miners such as </span><a data-dcnode-id="3358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gina_Rinehart" title="Gina Rinehart"><span data-dcnode-id="3359" instrument_node="">Gina Rinehart</span></a><span data-dcnode-id="3357" instrument_node=""> to open up the Galilee and Surat Basins to coal mining.  China became the main customer.</span><sup class="reference" data-dcnode-id="3354" id="cite_ref-48"><a data-dcnode-id="3355" href="#cite_note-48"><span data-dcnode-id="3356" instrument_node="">[48]</span></a></sup><span data-dcnode-id="3353" instrument_node="">
</span></p><span data-dcnode-id="3351" instrument_node="">
</span><h3 data-dcnode-id="3341"><span class="mw-headline" data-dcnode-id="3349" id="2020_recession"><span data-dcnode-id="3350" instrument_node="">2020 recession</span></span><span class="mw-editsection" data-dcnode-id="3342"><span class="mw-editsection-bracket" data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">[</span></span><a data-dcnode-id="3345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEconomic_history_of_Australia%26action%3Dedit%26section%3D18" title="Edit section: 2020 recession"><span data-dcnode-id="3346" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="3343"><span data-dcnode-id="3344" instrument_node="">]</span></span></span></h3><span data-dcnode-id="3340" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3339" instrument_node="">The </span><a data-dcnode-id="3337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic_in_Australia" title="COVID-19 pandemic in Australia"><span data-dcnode-id="3338" instrument_node="">Covid-19 pandemic reached Australia</span></a><span data-dcnode-id="3336" instrument_node=""> in January 2020. On 20 March, Australian borders were closed to all non-residents,</span><sup class="reference" data-dcnode-id="3333" id="cite_ref-closeborders_49-0"><a data-dcnode-id="3334" href="#cite_note-closeborders-49"><span data-dcnode-id="3335" instrument_node="">[49]</span></a></sup><span data-dcnode-id="3332" instrument_node=""> impacting especially tourism and the entry of overseas students. </span><a data-dcnode-id="3330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_distancing" title="Social distancing"><span data-dcnode-id="3331" instrument_node="">Social distancing</span></a><span data-dcnode-id="3329" instrument_node=""> rules were imposed on 21 March, and “non-essential” services were closed,</span><sup class="reference" data-dcnode-id="3326" id="cite_ref-4mrule_50-0"><a data-dcnode-id="3327" href="#cite_note-4mrule-50"><span data-dcnode-id="3328" instrument_node="">[50]</span></a></sup><sup class="reference" data-dcnode-id="3323" id="cite_ref-nonessential_51-0"><a data-dcnode-id="3324" href="#cite_note-nonessential-51"><span data-dcnode-id="3325" instrument_node="">[51]</span></a></sup><span data-dcnode-id="3322" instrument_node=""> which included social gathering venues such as pubs and clubs but, unlike many other countries, did not include most business operations such as construction, manufacturing and many retail categories.</span><sup class="reference" data-dcnode-id="3319" id="cite_ref-52"><a data-dcnode-id="3320" href="#cite_note-52"><span data-dcnode-id="3321" instrument_node="">[52]</span></a></sup><span data-dcnode-id="3318" instrument_node=""> A second wave of infections in Victoria emerged during May to June,</span><sup class="reference" data-dcnode-id="3315" id="cite_ref-53"><a data-dcnode-id="3316" href="#cite_note-53"><span data-dcnode-id="3317" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="3312" id="cite_ref-54"><a data-dcnode-id="3313" href="#cite_note-54"><span data-dcnode-id="3314" instrument_node="">[54]</span></a></sup><span data-dcnode-id="3311" instrument_node=""> and Victoria imposed a strict lockdown, which continued into September. State governments also imposed bans on cross state border movements.
</span></p><p data-dcnode-id="3298"><span data-dcnode-id="3309" instrument_node="">On 2 September 2020, as a result of the Covid-19 pandemic, Australia officially went into recession (defined as two quarters of negative growth) with GDP falling 7% in the June 2020 quarter, the largest drop on record. GDP fell 0.3% in the March quarter.</span><sup class="reference" data-dcnode-id="3306" id="cite_ref-55"><a data-dcnode-id="3307" href="#cite_note-55"><span data-dcnode-id="3308" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="3303" id="cite_ref-56"><a data-dcnode-id="3304" href="#cite_note-56"><span data-dcnode-id="3305" instrument_node="">[56]</span></a></sup><sup class="reference" data-dcnode-id="3300" id="cite_ref-57"><a data-dcnode-id="3301" href="#cite_note-57"><span data-dcnode-id="3302" instrument_node="">[57]</span></a></sup><span data-dcnode-id="3299" instrument_node="">
</span></p><span data-dcnode-id="3297" instrument_node="">
